Rang: 649
Wort: evitare
Wortart: vt
Wort mit Artikel: evitare
Femininum / Plural: ''
IPA: ''
Definition: vermeiden, ausweichen
Register: ''
Beispielsätze: |-
  Per *evitare* il traffico, ho preso una strada secondaria.
  Um den *Verkehr* zu vermeiden, habe ich eine Nebenstraße genommen.
  
  Il soldato vuole *evitare* ogni situazione pericolosa per proteggere i civili.
  Der *Soldat* will jede gefährliche Situation vermeiden, um die Zivilisten zu schützen.
  
  Se non avessi *evitato* quell’errore, ora avremmo molti più problemi.
  Hätte ich jenen *Fehler* nicht vermieden, hätten wir jetzt viel mehr Probleme.
  
  Mi ha consigliato di *evitare* quei quartieri dopo il tramonto, perché non sono sicuri.
  Sie hat mir geraten, diese *Zonen* nach Einbruch der Dunkelheit zu vermeiden, denn sie sind nicht sicher.
  
  Dovresti *evitare* di fare commenti simili in futuro, se non vuoi litigare.
  Du solltest *vermeiden*, ähnliche Kommentare in Zukunft zu machen, wenn du nicht streiten willst.
