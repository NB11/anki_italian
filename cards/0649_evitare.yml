Rang: 649
Wort: evitare
Wortart: v
Wort mit Artikel: evitare
Femininum / Plural: ''
IPA: ''
Definition: vermeiden, ausweichen
Register: ''
Beispielsätze: |-
  Devi *evitare* di guidare se hai bevuto troppo.
  Du *solltest* nicht fahren, wenn du zu viel getrunken *hast*.
  
  Lui cerca di *evitare* qualsiasi discussione con i colleghi.
  Er versucht, jede Diskussion mit den Kollegen zu *vermeiden*.
  
  Hai *evitato* il traffico prendendo una strada secondaria?
  Hast du den Stau *vermieden*, indem du eine Nebenstraße genommen *hast*?
  
  Bisogna *evitare* che i bambini tocchino i fornelli accesi.
  Man *muss* vermeiden, dass die Kinder an den eingeschalteten Herd *fassen*.
  
  Se avessi saputo la verità, avrei *evitato* di parlargli.
  Wenn ich die Wahrheit gewusst hätte, hätte ich *vermieden*, mit ihm zu *sprechen*.
