Rang: 713
Wort: spazio
Wortart: n.m
Wort mit Artikel: lo spazio
Femininum / Plural: spazi
IPA: ''
Definition: der Raum, -¨e, der Weltraum
Register: ''
Beispielsätze: |-
  Lo *spazio* tra queste due righe è troppo stretto per scrivere una frase completa.
  Der *Raum* zwischen diesen beiden Zeilen ist zu eng, um einen ganzen Satz zu schreiben.
  
  Se non hai *spazio* per il divano, possiamo spostarlo in un altro locale.
  Wenn du keinen *Raum* für das Sofa hast, können wir es in einen anderen Raum stellen.
  
  Quel pittore usa gli *spazi* vuoti per creare un effetto di profondità nelle sue opere.
  Dieser Maler nutzt die *Räume* zwischen den leeren Stellen, um eine Tiefenwirkung in seinen Werken zu erzeugen.
  
  Ho comprato una casa nuova con tanto *spazio* per organizzare i libri che ho accumulato negli anni.
  Ich habe ein neues Haus mit viel *Platz* gekauft, um all die Bücher unterzubringen, die ich über die Jahre angesammelt habe.
  
  Non ho mai visto un *spazio* così ordinato come il tuo ufficio: sembra di essere nello spazio urbano di una metropoli futuristica!
  Ich habe noch nie einen *Raum* so aufgeräumt gesehen wie dein Büro – es sieht aus, als wäre man im urbanen Raum einer futuristischen Metropole!
