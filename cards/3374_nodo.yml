Beispielsätze: |-
  Ho fatto un *nodo* alla cravatta prima della riunione importante.
  Ich habe einen *Knoten* in die Krawatte gemacht, bevor das wichtige Meeting begann.
  
  Il marinaio sciolse il *nodo* della fune con grande abilità.
  Der Matrose löste den *Knoten* des Seils mit großer Geschicklichkeit.
  
  Era così arrabbiato che avrebbe voluto stringere un *nodo* alla gola di qualcuno.
  Er war so wütend, dass er am liebsten jemandem einen *Knoten* in die Kehle gedreht hätte.
  
  Per la recita, ho aiutato la mia bambina a fare un *nodo* perfetto nelle scarpe.
  Für das Theaterstück half ich meiner Tochter, einen perfekten *Knoten* in ihre Schuhe zu machen.
  
  Nel laboratorio scientifico, annodare correttamente i fili è fondamentale per l’esperimento.
  Im wissenschaftlichen Labor ist es entscheidend, die Drähte richtig zu *verknoten*, um das Experiment erfolgreich durchzuführen.
