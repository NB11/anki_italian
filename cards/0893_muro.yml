Rang: 893
Wort: muro
Wortart: n.m
Wort mit Artikel: il muro
Femininum / Plural: muri
IPA: ''
Definition: die Mauer, -n
Register: ''
Beispielsätze: |-
  Ha dipinto un *muro* di un bellissimo colore blu.
  Er hat eine *Mauer* in einer wunderschönen Farbe Blau angestrichen.
  
  Dunque, vuoi che abbattiamo questo *muro* interno per ampliare la cucina?
  Also, willst du, dass wir diese *innere Mauer* entfernen, um die Küche zu vergrößern?
  
  Non si accorge quasi mai della differenza tra il *muro* e la parete, ma c'è!
  Er bemerkt fast nie den *Unterschied* zwischen der Mauer und der Wand, aber er ist da!
  
  Nel pomeriggio ho trovato il gatto che graffiava il *muro* vicino alla scatola di carne.
  Am Nachmittag habe ich die Katze erwischt, die an der *Mauer* neben der Schachtel mit Fleisch kratzte.
  
  Se il *muro* non fosse stato così spesso, avremmo forse sentito meno la pressione degli eroi che urlavano oltre di esso.
  Wenn die *Mauer* nicht so dick gewesen wäre, hätten wir den Druck der Helden, die jenseits von ihr brüllten, vielleicht weniger gespürt.
