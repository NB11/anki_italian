Rang: 3454
Wort: efficace
Wortart: adj
Wort mit Artikel: efficace
Femininum / Plural: ''
IPA: ''
Definition: wirksam, effektiv
Register: ''
Beispielsätze: |-
  Questo farmaco è *efficace* contro il dolore, ma ha effetti collaterali.
  Dieses Medikament ist *wirksam* gegen die Schmerzen, hat aber Nebenwirkungen.
  
  Credo che l’intervento del medico sia stato *efficace* nel risolvere il problema.
  Ich glaube, dass der Eingriff des Arztes *wirksam* war, um das Problem zu lösen.
  
  Se la terapia fosse *efficace*, non avremmo bisogno di cambiarla.
  Falls die Therapie *wirksam* wäre, müssten wir sie nicht ändern.
  
  Nonostante i ripetuti test, il nuovo prodotto non si è rivelato *efficace* come speravamo.
  Trotz der wiederholten Tests erwies sich das neue Produkt nicht als *wirksam*, wie wir hofften.
  
  Sarebbe *efficace* sostituire il vecchio sistema con uno più moderno, ma costerebbe troppo.
  Es wäre *wirksam*, das alte System durch ein moderneres zu ersetzen, aber das wäre zu teuer.
