Definition: bemerken, wahrnehmen, auffallen
Register: ''
Beispielsätze: |-
  Non *ho* ancora *notato* nulla di strano.
  Ich habe noch nichts *Bemerkenswertes* *bemerkt*.
  
  *Nota* se senti un rumore strano!
  *Wahrnehmst* du, wenn du ein seltsames Geräusch *hörst*?
  
