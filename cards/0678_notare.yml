  Falls du etwas *Bemerkenswertes* *wahrnehmen* *würdest*, solltest du die Polizei informieren.
  
  Credo che lui non *noterebbe* mai la differenza tra queste due foto.
  Ich glaube, er *würde* den Unterschied zwischen diesen beiden Fotos nie *bemerken*.
