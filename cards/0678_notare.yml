Rang: 678
Wort: notare
Wortart: vt
Wort mit Artikel: notare
Femininum / Plural: ''
IPA: ''
Definition: bemerken, wahrnehmen
Register: ''
Beispielsätze: |-
  Non *ho notato* che eri così stanco dopo il viaggio.
  Ich habe nicht *bemerkt*, dass du nach der Reise so müde warst.
  
  Se *noti* qualcosa di strano nella canzone, dimmelo subito!
  Wenn du etwas Seltsames in dem *Lied* bemerken würdest, sag es mir sofort!
  
  Il *detective* notò un dettaglio importante nella zona del crimine intorno alle ore 22.
  Der *Detektiv* nahm ein wichtiges Detail in der Zone der Straftat gegen 22 Uhr wahr.
  
  Credo che tu non *noti* quanto caldo faccia qui dentro.
  Ich glaube, du *bemerken* nicht, wie heiß es hier drinnen ist.
  
  Finché non *avrai notato* la differenza tra queste due situazioni, non potrai prendere la decisione giusta.
  Solange du den Unterschied zwischen diesen beiden Situationen nicht *bemerken* wirst, kannst du keine richtige Entscheidung treffen.
