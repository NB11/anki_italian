Rang: 2698
Wort: tormentare
Wortart: vt
Wort mit Artikel: tormentare
Femininum / Plural: ''
IPA: ''
Definition: quälen, peinigen
Register: ''
Beispielsätze: |-
  Il ricordo del passato lo *tormenta* ancora ogni notte.
  Die Erinnerung an die Vergangenheit *quält* ihn noch jede Nacht.
  
  È meglio *tormentarsi* con i rimpianti o imparare dagli errori?
  Ist es besser, sich mit Reue zu *quälen* oder aus Fehlern zu lernen?
  
  Paola si sente *tormentata* dalle aspettative dei genitori.
  Paola fühlt sich von den Erwartungen ihrer Eltern *gequält*.
  
  La solitudine *tormentava* il vecchio come un fantasma del passato.
  Die Einsamkeit *peinigte* den alten Mann wie ein Gespenst der Vergangenheit.
  
  Se non risolviamo questo problema, continuerà a *tormentarci* per anni.
  Wenn wir dieses Problem nicht lösen, wird es uns noch jahrelang *quälen*.
