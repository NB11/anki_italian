Rang: 1289
Wort: telefonare
Wortart: vi
Wort mit Artikel: telefonare
Femininum / Plural: ''
IPA: ''
Definition: anrufen, telefonieren
Register: ''
Beispielsätze: |-
  Se *telefoni* a Marco, chiedigli se viene al cinema con noi stasera.
  Wenn du Marco *anrufst*, frag ihn, ob er heute Abend mit uns ins Kino kommt.
  
  Ho provato a *telefonare* almeno dieci volte, ma non ha risposto nessuno.
  Ich habe versucht, mindestens zehnmal zu *telefonieren*, aber niemand hat geantwortet.
  
  Prima di partire, voleva *telefonare* a sua madre per salutarla.
  Bevor er aufbrach, wollte er seine Mutter *anrufen*, um sich zu verabschieden.
  
  Appena saprò le ultime notizie, *telefonerò* immediatamente a tutti i nostri amici.
  Sobald ich die neuesten Nachrichten weiß, werde ich sofort alle unsere Freunde *anrufen*.
  
  Secondo me, *telefonare* in piena notte è maleducato, a meno che non sia urgente.
  Meiner Meinung nach ist es unhöflich, mitten in der Nacht zu *telefonieren*, es sei denn, es ist dringend.
