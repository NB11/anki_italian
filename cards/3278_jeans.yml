Beispielsätze: |-
  Vorrei comprare un paio di *jeans* nuovi perché quelli vecchi sono diventati troppo stretti.
  Ich möchte ein Paar *Jeans* kaufen, weil die alten zu eng geworden sind.
  
  Quando hai comprato questi *jeans*? Li trovo molto belli!
  Wann hast du diese *Jeans* gekauft? Ich finde sie sehr schön!
  
  Mi ha detto che i *jeans* che indosso gli piacciono moltissimo, anche se sono un po’ scoloriti.
  Er hat mir gesagt, dass ihm die *Jeans*, die ich trage, sehr gut gefallen, obwohl sie ein bisschen verblasst sind.
  
  Se domani andiamo a fare shopping, porterò anche mia sorella perché vuole una nuova *jeans* per l’estate.
  Wenn wir morgen einkaufen gehen, bringe ich auch meine Schwester mit, weil sie eine neue *Jeans* für den Sommer will.
  
  Nonostante siano un po’ cari, i *jeans* di marca durano molto più a lungo rispetto a quelli economici.
  Obwohl sie ein bisschen teuer sind, halten Marken-*Jeans* viel länger als billige.
