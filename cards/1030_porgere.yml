Rang: 1030
Wort: porgere
Wortart: vt
Wort mit Artikel: porgere
Femininum / Plural: ''
IPA: ''
Definition: reichen, überreichen, geben
Register: ''
Beispielsätze: |-
  Mi *porgeresti* il sale, per favore?
  Könntest du mir bitte das *Salz reichen*?
  
  Il testimone ha *porguto* le sue scuse dopo la guardata.
  Der Zeuge hat seine Entschuldigung nach dem *Blickkontakt* ausgedrückt.
  
  Non dimenticare di *porgere* i documenti al padrone di casa durante la telefonata.
  Vergiss nicht, dem Vermieter die Unterlagen während des *Telefonats* zu reichen.
  
  Ha *porguto* la mano destra al vicino che aveva curato la sua malattia per settimane.
  Er hat dem Nachbarn, der seine *Krankheit* wochenlang behandelt hatte, die rechte Hand gereicht.
  
  Se avessi saputo che volevi la mia opinione, ti avrei *porguto* un consiglio più dettagliato.
  Wenn ich gewusst hätte, dass du meine Meinung willst, hätte ich dir einen *detaillierteren Rat* gegeben.
