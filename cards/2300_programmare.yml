Rang: 2300
Wort: programmare
Wortart: v
Wort mit Artikel: programmare
Femininum / Plural: ''
IPA: ''
Definition: planen, vorhaben, programmieren
Register: ''
Beispielsätze: |-
  Stasera *programmo* di andare al cinema con gli amici.
  Heute Abend *plane* ich, mit Freunden ins Kino zu gehen.
  
  Il regista ha *programmato* le riprese per il mese successivo, ma ora ci sono dei problemi tecnici.
  Der Regisseur hat die *Aufnahmen* für den nächsten Monat festgelegt, doch jetzt gibt es technische Probleme.
  
  Vorresti *programmare* una vacanza in montagna l'anno prossimo?
  Würdest du gerne einen Urlaub im Gebirge für nächstes Jahr *vorhaben*?
  
  Senza un piano chiaro, non possiamo *programmare* nulla di importante.
  Ohne einen klaren Plan können wir nichts Wichtiges *planen*.
  
  Se *programmi* bene le tue giornate, riesci a fare tutto senza stress inutile.
  Wenn du deine Tage gut *organisierst*, schaffst du alles ohne unnötigen Stress.
