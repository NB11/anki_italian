Rang: 1741
Wort: serpente
Wortart: n.m
Wort mit Artikel: il serpente
Femininum / Plural: serpenti
IPA: ''
Definition: die Schlange, -n
Register: ''
Beispielsätze: |-
  Nel giardino abbiamo visto *un serpente* che strisciava tra i cespugli.
  Im Garten haben wir *eine Schlange* gesehen, die zwischen den Büschen kroch.
  
  Sebbene *il serpente* sia velenoso, questo esemplare è innocuo.
  Obwohl *die Schlange* giftig ist, ist dieses Exemplar harmlos.
  
  Avresti dovuto avvertirmi che nel bosco c’era *un serpente*!
  Hättest du mir sagen müssen, dass es im Wald *eine Schlange* gibt!
  
  Ho paura dei *serpenti*, anche se so che non tutti sono pericolosi.
  Ich habe Angst vor *Schlangen*, obwohl ich weiß, dass nicht alle gefährlich sind.
  
  Mi hanno raccontato che *il serpente* che hai incontrato al parco era solo un innocuo colubro.
  Man hat mir erzählt, dass *die Schlange*, die du im Park getroffen hast, nur eine harmlose Ringelnatter war.
