Rang: 3316
Wort: ospitare
Wortart: vt
Wort mit Artikel: ospitare
Femininum / Plural: ''
IPA: ''
Definition: unterbringen, beherbergen
Register: ''
Beispielsätze: |-
  Il museo *ospita* una mostra temporanea di arte moderna.
  Das Museum *beherbergt* eine temporäre Ausstellung moderner Kunst.
  
  Spero che la nostra casa *ospiti* presto i tuoi genitori.
  Ich hoffe, dass unser Haus bald deine Eltern *unterbringt*.
  
  Il rifugio di montagna può *ospitare* fino a venti persone per la notte.
  Die Berghütte kann bis zu zwanzig Personen für die Nacht *unterbringen*.
  
  Se non ci fosse l’albergo, dove *ospiteremmo* tutti i partecipanti?
  Wenn es das Hotel nicht gäbe, wo würden wir alle Teilnehmer *unterbringen*?
  
  Il programma *ospita* anche una cena di gala dopo la conferenza.
  Das Programm *beherbergt* auch ein Galadinner nach der Konferenz.
