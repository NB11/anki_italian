Rang: 1676
Wort: cittadino
Wortart: n.m
Wort mit Artikel: il cittadino
Femininum / Plural: cittadini
IPA: ''
Definition: der Bürger, -
Register: ''
Beispielsätze: |-
  Il *cittadino* ha il diritto di votare alle elezioni.
  Der *Bürger* hat das Recht, bei Wahlen zu wählen.
  
  Tutti i *cittadini* italiani possono viaggiare nell’Unione Europea senza passaporto.
  Alle italienischen *Bürger* können ohne Reisepass in der Europäischen Union reisen.
  
  Il sindaco ha ringraziato ogni *cittadino* per il suo impegno durante la festa.
  Der Bürgermeister hat jeden *Bürger* für sein Engagement während des Festes gedankt.
  
  Se fossi un *cittadino* straniero, imparerei subito la lingua del Paese.
  Wenn ich ein ausländischer *Bürger* wäre, würde ich sofort die Sprache des Landes lernen.
  
  I *cittadini* che vivono vicino al parco vogliono che venga costruito un nuovo ingresso.
  Die *Bürger*, die nahe dem Park wohnen, wünschen sich einen neuen Eingang.
