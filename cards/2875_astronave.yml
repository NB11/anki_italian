Rang: 2875
Wort: astronave
Wortart: n.m
Wort mit Artikel: l'astronave
Femininum / Plural: astronavi
IPA: ''
Definition: das Raumschiff, -e
Register: ''
Beispielsätze: |-
  L’*astronave* si sta avvicinando alla stazione spaziale.
  Das *Raumschiff* nähert sich der Raumstation.
  
  Gli scienziati hanno progettato un’*astronave* innovativa.
  Die Wissenschaftler haben ein innovatives *Raumschiff* entworfen.
  
  Se avessi tempo, costruirei un’*astronave* tutta mia.
  Wenn ich Zeit hätte, würde ich ein *Raumschiff* ganz allein bauen.
  
  L’*astronave* che ha visto ieri appartiene a un’azienda privata.
  Das *Raumschiff*, das Sie gestern gesehen haben, gehört einem Privatunternehmen.
  
  Non appena l’*astronave* atterrerà, invieremo un messaggio di conferma.
  Sobald das *Raumschiff* landet, werden wir eine Bestätigungsnachricht senden.
