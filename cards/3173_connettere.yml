Rang: 3173
Wort: connettere
Wortart: v
Wort mit Artikel: connettere
Femininum / Plural: ''
IPA: ''
Definition: verbinden, *anschließen*
Register: ''
Beispielsätze: |-
  Per *connettere* il computer a internet, devi avere un buon router.
  Um den Computer mit dem Internet zu *verbinden*, brauchst du einen guten Router.
  
  Mi sembra che tu non sia riuscito a *connettere* i due fili correttamente.
  Ich glaube, dass du es nicht geschafft hast, die beiden Kabel richtig zu *anschließen*.
  
  Se non *connetti* il telefono al caricabatterie, la batteria si scaricherà presto.
  Wenn du das Telefon nicht an die Steckdose *anschließt*, wird der Akku bald leer sein.
  
  Gli hacker hanno cercato di *connettere* il loro software a un server protetto.
  Die Hacker haben versucht, ihre Software mit einem geschützten Server zu *verbinden*.
  
  Bisogna *connettere* questi due concetti per capire la teoria di Einstein.
  Man muss diese beiden Konzepte *verbinden*, um Einsteins Theorie zu verstehen.
Audio: ''
Notiz: ''
Dispersion: ''
