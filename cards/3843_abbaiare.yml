Rang: 3843
Wort: abbaiare
Wortart: vi
Wort mit Artikel: abbaiare
Femininum / Plural: ''
IPA: ''
Definition: bellen
Register: ''
Beispielsätze: |-
  Il cane nel giardino *abbaia* ogni volta che passa il postino.
  Der Hund im Garten *bellt* jedes Mal, wenn der Briefträger vorbeikommt.
  
  Non appena ha sentito il campanello, il cane ha iniziato a *abbaiare* freneticamente.
  Sobald er die Klingel hörte, begann der Hund, *zu bellen*.
  
  Se il cane continua a *abbaiare* così forte, sveglierà tutto il vicinato.
  Wenn der Hund weiter so laut *bellt*, wird er die ganze Nachbarschaft wecken.
  
  Il cane da guardia si è fermato ad *abbaiare* verso il cancello, ma poi è tornato tranquillo.
  Der Wachhund blieb stehen, um zum Tor hin *zu bellen*, doch dann beruhigte er sich wieder.
  
  Nonostante il freddo, il cane del vicino non smette di *abbaiare* contro ogni rumore sospetto.
  Trotz der Kälte hört der Hund des Nachbarn nicht auf, bei jedem verdächtigen Geräusch *zu bellen*.
