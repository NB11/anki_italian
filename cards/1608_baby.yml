Rang: 1608
Wort: baby
Wortart: adj
Wort mit Artikel: baby
Femininum / Plural: ''
IPA: ''
Definition: sehr klein, winzig
Register: ''
Beispielsätze: |-
  Ho visto un *baby* cane che giocava con la palla sulla scrivania.
  Ich habe einen *winzigen* Hund gesehen, der mit dem Ball auf dem Schreibtisch spielte.
  
  Questa *baby* stanza è perfetta per il nostro neonato, ma secondo il pediatra non è ancora sufficiente.
  Dieses *kleine* Kinderzimmer ist perfekt für unser Baby, aber laut dem Kinderarzt ist es noch nicht genügend.
  
  Quando il *baby* schermo si è rotto, ho dovuto avvisare il negozio per farmi sostituire la garanzia.
  Als der *kleine* Bildschirm kaputtging, musste ich den Laden benachrichtigen, damit sie meine Garantie ersetzen.
  
  Nonostante le sue *baby* dimensioni, il cucciolo ha già un vantaggio: è molto più veloce di quanto sembri!
  Trotz seiner *winzigen* Größe hat das Welpe bereits einen Vorteil: Es ist viel schneller, als es aussieht!
  
  Se il *baby* televisore non funziona, sarà una conseguenza del maltempo che ha danneggiato l’antenna esterna.
  Wenn der *kleine* Fernseher nicht funktioniert, wird das eine Folge des Unwetters sein, das die Außenantenne beschädigt hat.
