Rang: 1575
Wort: teatro
Wortart: n.m
Wort mit Artikel: il teatro
Femininum / Plural: teatri
IPA: ''
Definition: das Theater, -
Register: ''
Beispielsätze: |-
  Ieri sera siamo andati al *teatro* per vedere l'opera di Verdi.
  Gestern Abend sind wir ins *Theater* gegangen, um die Oper von Verdi zu sehen.
  
  Nonostante il suo grande talento, non ha ancora debuttato in un *teatro* importante.
  Trotz ihres großen Talents hat sie noch nicht in einem *Theater* von Bedeutung debütiert.
  
  Il ministro ha promesso di finanziare progetti culturali, tra cui la ristrutturazione del *teatro* cittadino.
  Der Minister hat zugesagt, kulturelle Projekte zu finanzieren, darunter die Renovierung des städtischen *Theaters*.
  
  Mia zia, che è un’esperta di musica, mi ha consigliato di visitare il *teatro* più antico della città.
  Meine Tante, die eine Musikexpertin ist, hat mir geraten, das älteste *Theater* der Stadt zu besuchen.
  
  Se avessi più tempo, frequenterei un corso di recitazione presso il *teatro* locale.
  Wenn ich mehr Zeit hätte, würde ich einen Schauspielkurs am örtlichen *Theater* besuchen.
