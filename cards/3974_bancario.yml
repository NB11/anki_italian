Beispielsätze: |-
  Ho aperto un *bancario* e ho depositato tutti i miei risparmi.
  Ich habe ein *bankmäßiges* Konto eröffnet und all meine Ersparnisse eingezahlt.
  
  Il direttore ha fatto un discorso *bancario* molto noioso durante la riunione.
  Der Direktor hielt eine *banktypische* Rede, die während der Besprechung sehr langweilig war.
  
  Se vuoi chiedere un prestito, devi compilare questo modulo *bancario*.
  Wenn du einen Kredit beantragen möchtest, musst du dieses *bankübliche* Formular ausfüllen.
  
  La crisi *bancaria* ha colpito molti istituti finanziari in Europa.
  Die *Bankenkrise* traf viele Finanzinstitute in Europa.
  
  Gli impiegati *bancari* lavorano sodo per garantire la sicurezza dei clienti.
  Die *Bankangestellten* arbeiten hart, um die Sicherheit der Kunden zu gewährleisten.
