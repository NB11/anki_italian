Rang: 2928
Wort: cacca
Wortart: n.f
Wort mit Artikel: la cacca
Femininum / Plural: cacche
IPA: ''
Definition: der Kot, -e
Register: ''
Beispielsätze: |-
  Secondo *cacca* del cane, sembra che abbia mangiato qualcosa di strano.
  Laut *des Hundehaufens* scheint er etwas Seltsames gefressen zu haben.
  
  La *cacca* fresca sulla strada indica che c'è un cane randagio qui vicino.
  Die frische *Scheiße* auf der Straße zeigt, dass es hier in der Nähe einen streunenden Hund gibt.
  
  Se trovi ancora *cacche* nel giardino, dovrai pulire subito!
  Wenn du noch *Haufen* im Garten findest, musst du sofort aufräumen!
  
  Ha detto che *cacca* è una parola volgare in molte lingue.
  Er sagte, dass *Scheiße* in vielen Sprachen ein vulgäres Wort ist.
  
  Nonostante la *cacca* sia sgradevole, gli scienziati la studiano per capire la salute dell'animale.
  Obwohl *der Kot* unangenehm ist, untersuchen Wissenschaftler ihn, um die Gesundheit des Tieres zu verstehen.
