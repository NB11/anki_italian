Rang: 51
Wort: volta
Wortart: n.f
Wort mit Artikel: la volta
Femininum / Plural: volte
IPA: ''
Definition: das Mal, -e
Register: ''
Beispielsätze: |-
  Questa è la *prima volta* che vengo in Italia.
  Das ist das *erste Mal*, dass ich nach Italien komme.
  
  Ci siamo incontrati tante *volte* l'anno scorso.
  Wir haben uns letztes Jahr so oft *getroffen*.
  
  Ogni volta che esco, porto l’ombrello.
  Jedes *Mal*, wenn ich ausgehe, nehme ich den Regenschirm mit.
  
  Quante *volte* hai letto questo libro?
  Wie oft hast du dieses Buch schon gelesen?
  
  La prossima volta verrò con te, promesso!
  Das *nächste Mal* komme ich mit dir, versprochen!
