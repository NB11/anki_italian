Rang: 4074
Wort: uccisione
Wortart: n.f
Wort mit Artikel: la uccisione
Femininum / Plural: uccisioni
IPA: ''
Definition: die Tötung, -en
Register: ''
Beispielsätze: |-
  La polizia sta indagando sulla *uccisione* del testimone oculare avvenuta la scorsa notte.
  Die Polizei ermittelt wegen der *Tötung* des Augenzeugen, die gestern Nacht stattfand.
  
  Se sapessi chi ha commesso questa *uccisione*, lo denuncierei immediatamente.
  Wenn ich wüsste, wer diese *Tötung* begangen hat, würde ich ihn sofort anzeigen.
  
  La *uccisione* dei leoni a scopo di bracconaggio è un reato gravissimo.
  Die *Tötung* von Löwen aus Wilderei ist eine schwere Straftat.
  
  Hanno arrestato l’uomo sospettato della *uccisione*, ma non ci sono ancora prove definitive.
  Sie haben den Mann festgenommen, der der *Tötung* verdächtigt wird, doch es gibt noch keine endgültigen Beweise.
  
  L’*uccisione* risale al Medioevo, ma le leggende su di essa sono ancora vive.
  Die *Tötung* geht auf das Mittelalter zurück, doch die Legenden darüber sind noch lebendig.
