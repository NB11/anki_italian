Rang: 1199
Wort: fucile
Wortart: n.m
Wort mit Artikel: il fucile
Femininum / Plural: fucili
IPA: ''
Definition: das Gewehr, -e
Register: ''
Beispielsätze: |-
  Il *fucile* è appeso al muro del salotto da generazioni.
  Das *Gewehr* hängt seit Generationen an der Wohnzimmerwand.
  
  I cacciatori hanno preso il *fucile* e sono partiti verso la foresta.
  Die Jäger haben das *Gewehr* genommen und sind in den Wald aufgebrochen.
  
  Nonostante il divieto, qualcuno ha usato un *fucile* durante la caccia.
  *Obwohl* es verboten ist, hat jemand ein Gewehr beim Jagen benutzt.
  
  Se avessi un *fucile*, potrei proteggere meglio la mia proprietà.
  Wenn ich ein *Gewehr* hätte, könnte ich mein Eigentum besser schützen.
  
  Il poliziotto ha estratto il *fucile* dalla fondina quando ha sentito spari in lontananza.
  Der Polizist zog das *Gewehr* aus dem Holster, als er in der Ferne Schüsse hörte.
