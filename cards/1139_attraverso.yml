Rang: 1139
Wort: attraverso
Wortart: adv
Wort mit Artikel: attraverso
Femininum / Plural: ''
IPA: ''
Definition: durch, über
Register: ''
Beispielsätze: |-
  Il fiume scorre *attraverso* la valle e poi sfocia nel mare.
  Der Fluss fließt *durch* das Tal und mündet dann ins Meer.
  
  Per raggiungere il college, devi passare *attraverso* questo parco solitario.
  Um das College zu erreichen, musst du *durch* diesen einsamen Park gehen.
  
  Il proiettile passò *attraverso* la corazza del carro armato senza fermarsi.
  Das Geschoss durchschlug die Panzerung des Panzers, ohne anzuhalten.
  
  Se vuoi arrivare alla montagna *attraverso* questo sentiero, devi avere molta pazienza.
  Wenn du den Berg *über* diesen Pfad erreichen willst, musst du viel Geduld haben.
  
  Il maestro spiegava la teoria mentre camminava *attraverso* l'aula silenziosa.
  Der Lehrer erklärte die Theorie, während er *durch* den stillen Hörsaal ging.
