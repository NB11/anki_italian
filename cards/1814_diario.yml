Rang: 1814
Wort: diario
Wortart: n.m
Wort mit Artikel: il diario
Femininum / Plural: diari
IPA: ''
Definition: das Tagebuch, -bücher
Register: ''
Beispielsätze: |-
  Ogni sera scrivo una pagina del *diario* prima di dormire.
  Jeden Abend schreibe ich eine Seite des *Tagebuchs*, bevor ich schlafe.
  
  Ho trovato nel cassetto il *diario* di mia nonna degli anni '50.
  Ich habe im Schubfach das *Tagebuch* meiner Großmutter aus den 50er Jahren gefunden.
  
  Se perderai il *diario*, perderai anche tutti i tuoi ricordi scritti.
  Wenn du das *Tagebuch* verlierst, verlierst du auch alle deine geschriebenen Erinnerungen.
  
  Credo che abbia bisogno di un *diario* nuovo, questo è pieno di macchie di cioccolato.
  Ich glaube, er braucht ein neues *Tagebuch*, dieses ist voller Schokoladenflecken.
  
  Quando ero piccolo, nascondevo i miei segreti più intimi in fondo al *diario* sotto il letto.
  Als ich klein war, versteckte ich meine intimsten Geheimnisse ganz unten in dem *Tagebuch* unter dem Bett.
