Rang: 3956
Wort: vescovo
Wortart: n.m
Wort mit Artikel: il vescovo
Femininum / Plural: vescovi
IPA: ''
Definition: der Bischof, Bischöfe
Register: ''
Beispielsätze: |-
  Il *vescovo* ha celebrato una messa solenne nella cattedrale.
  Der *Bischof* hat eine feierliche Messe in der Kathedrale gefeiert.
  
  Ho incontrato il *vescovo* durante la sua visita pastorale al nostro quartiere.
  Ich habe den *Bischof* während seines Pastoralbesuchs in unserem Viertel getroffen.
  
  I cittadini si aspettano che il nuovo *vescovo* risolva presto i problemi della diocesi.
  Die Bürger erwarten, dass der neue *Bischof* die Probleme der Diözese bald löst.
  
  Se il *vescovo* avesse saputo della raccolta disastrosa, avrebbe interrotto immediatamente il digiuno.
  Falls der *Bischof* von der katastrophalen Ernte gewusst hätte, hätte er das Fasten sofort abgebrochen.
  
  Il *vescovo* che ha rispettabile fama di saggezza guiderà la cerimonia di adozione del nuovo organo.
  Der *Bischof*, dem man eine respektable Weisheit nachsagt, wird die Adoptionszeremonie der neuen Orgel leiten.
