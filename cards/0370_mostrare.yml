Femininum / Plural: ''
IPA: ''
Definition: zeigen, vorführen
Register: ''
Beispielsätze: |-
  Mi puoi *mostrare* come si usa questa macchina fotografica?
  Kannst du mir *zeigen*, wie man diese Kamera benutzt?
  
  Il professore *ha mostrato* agli studenti un video interessante.
  Der Lehrer hat den Schülern ein interessantes Video *gezeigt*.
  
  Se vuoi, ti *mostrerò* la mia città domani.
  Wenn du möchtest, werde ich dir morgen meine Stadt *zeigen*.
  
  Lei *mostrava* sempre pazienza con i bambini.
  Sie zeigte den Kindern immer *Geduld*.
  
  Penso che lui *mostri* troppo poco entusiasmo per il progetto.
  Ich glaube, dass er für das Projekt zu wenig *Begeisterung zeigt*.
