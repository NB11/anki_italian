Rang: 1954
Wort: corrispondere
Wortart: v
Wort mit Artikel: corrispondere
Femininum / Plural: ''
IPA: ''
Definition: entsprechen, übereinstimmen
Register: ''
Beispielsätze: |-
  Il colore della tua camicia *corrisponde* perfettamente a quello della gonna.
  Die Farbe deines Hemdes *entspricht* perfekt derjenigen des Rocks.
  
  Mi sembra che la tua versione dei fatti non *corrisponda* con quella di tuo fratello.
  Mir scheint, dass deine Version der Tatsachen nicht mit der deines Bruders *übereinstimmt*.
  
  Se il documento non *corrisponde* alle richieste, dovremo rifiutarlo senza esitare.
  Falls das Dokument nicht allen Anforderungen *entspricht*, werden wir es ohne Zögern ablehnen müssen.
  
  Vorrei che tutti i nostri sforzi *corrispondano* ai principi che sosteniamo quotidianamente.
  Ich wünschte, dass alle unsere Bemühungen mit den Prinzipien *übereinstimmen*, die wir täglich vertreten.
  
  Nonostante le apparenze, il suo comportamento non *corrisponde* affatto alla sua fama di persona affidabile.
  Trotz aller Anscheins *entspricht* sein Verhalten ganz und gar nicht seinem Ruf als vertrauenswürdige Person.
