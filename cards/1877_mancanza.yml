Rang: 1877
Wort: mancanza
Wortart: n.f
Wort mit Artikel: la mancanza
Femininum / Plural: mancanze
IPA: ''
Definition: das Fehlen, der Mangel
Register: ''
Beispielsätze: |-
  Sento una forte *mancanza* di te ogni volta che parti.
  Ich spüre ein starkes *Fehlen* von dir, jedes Mal wenn du gehst.
  
  La *mancanza* di prove non ci permette di accusarlo.
  Das *Fehlen* von Beweisen erlaubt es uns nicht, ihn anzuklagen.
  
  Nonostante la *mancanza* di soldi, siamo riusciti a partire.
  Trotz des *Mangels* an Geld sind wir losgefahren.
  
  Se ci fosse meno *mancanza* di rispetto, lavorerebbe meglio.
  Wenn es weniger *Mangel* an Respekt gäbe, würde er besser arbeiten.
  
  La sua *mancanza* improvvisa ha sconvolto tutti i piani.
  Sein plötzliches *Fehlen* hat alle Pläne durcheinandergebracht.
