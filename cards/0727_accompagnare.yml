Rang: 727
Wort: accompagnare
Wortart: vt
Wort mit Artikel: accompagnare
Femininum / Plural: ''
IPA: ''
Definition: begleiten, mitkommen, führen
Register: ''
Beispielsätze: |-
  Ti *accompagno* alla stazione se vuoi.
  Ich *begleite* dich zum Bahnhof, wenn du möchtest.
  
  Abbiamo *accompagnato* gli ospiti fino all’ingresso.
  Wir haben die Gäste bis zum Eingang *begleitet*.
  
  Mi piacerebbe *accompagnarti* al concerto domani.
  Ich würde dich gerne morgen zum Konzert *mitkommen* lassen.
  
  Perché non mi *accompagni* a fare la spesa?
  Warum *kommst* du nicht mit, um einkaufen *zu gehen*?
  
  Sarebbe gentile se tu *accompagnassi* il bambino a scuola.
  Es wäre nett, wenn du das Kind zur Schule *begleitest*.
