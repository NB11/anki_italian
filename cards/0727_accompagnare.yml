Rang: 727
Wort: accompagnare
Wortart: v
Wort mit Artikel: accompagnare
Femininum / Plural: ''
IPA: ''
Definition: begleiten, mitkommen
Register: ''
Beispielsätze: |-
  Vuoi che ti *accompagni* a casa stasera?
  Willst du, dass ich dich heute Abend nach Hause *begleite*?
  
  Ho *accompagnato* mia sorella all’aeroporto perché aveva paura di prendere l’autobus da sola.
  Ich habe meine Schwester zum Flughafen *begleitet*, weil sie Angst hatte, allein den Bus zu nehmen.
  
  Se avessi saputo che eri malato, ti avrei *accompagnato* dal medico.
  Hätte ich gewusst, dass du krank bist, hätte ich dich zum Arzt *begleitet*.
  
  È meglio *accompagnare* i bambini a scuola piuttosto che lasciarli andare da soli.
  Es ist besser, die Kinder zur Schule zu *begleiten*, als sie allein gehen zu lassen.
  
  Gli amici mi hanno proposto di *accompagnarli* a quella festa così squallida: ho rifiutato immediatamente!
  Meine Freunde haben mir vorgeschlagen, sie zu dieser so schäbigen Party zu *begleiten* – ich habe sofort abgelehnt!
