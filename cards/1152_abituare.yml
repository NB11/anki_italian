Rang: 1152
Wort: abituare
Wortart: vt
Wort mit Artikel: abituare
Femininum / Plural: ''
IPA: ''
Definition: gewöhnen, sich angewöhnen
Register: ''
Beispielsätze: |-
  Devi *abituare* i tuoi occhi alla luce nella stanza buia.
  Du musst deine Augen an das Licht im dunklen Raum *gewöhnen*.
  
  Si è *abituato* a mangiare senza sale dopo la dieta.
  Er hat sich daran *gewöhnt*, nach der Diät ohne Salz zu essen.
  
  Credi che loro riusciranno *ad abituarsi* al clima del Nord?
  Glaubst du, sie werden sich an das Klima im Norden *gewöhnen* können?
  
  Questo allenatore vuole *abituare* la squadra a giocare meglio in trasferta.
  Dieser Trainer will die Mannschaft daran *gewöhnen*, auswärts besser zu spielen.
  
  Da quando ho perso il lavoro, sto cercando di *abituarmi* alla nuova routine.
  Seit ich meinen Job verloren habe, versuche ich mich an die neue Routine zu *gewöhnen*.
