Rang: 4371
Wort: picnic
Wortart: n.m
Wort mit Artikel: il picnic
Femininum / Plural: picnic
IPA: ''
Definition: das Picknick, -s
Register: ''
Beispielsätze: |-
  Abbiamo organizzato un *picnic* nel parco per festeggiare il compleanno di Luca.
  Wir haben ein *Picknick* im Park organisiert, um Lukas Geburtstag zu feiern.
  
  Nonostante il maltempo, il nostro *picnic* è stato un successo: abbiamo mangiato, riso e perfino ballato un po’.
  Trotz des schlechten Wetters war unser *Picknick* ein Erfolg: Wir haben gegessen, gelacht und sogar ein bisschen getanzt.
  
  Se avessi più tempo libero, farei un *picnic* ogni fine settimana con la mia famiglia.
  Wenn ich mehr Freizeit hätte, würde ich jedes Wochenende ein *Picknick* mit meiner Familie machen.
  
  Nel *picnic* di ieri abbiamo portato anche dei libri da leggere sotto l’albero.
  Bei dem *Picknick* von gestern haben wir auch ein paar Bücher mitgebracht, um unter dem Baum zu lesen.
  
  Mi dispiace, ma il *picnic* che volevi fare in spiaggia non sarà possibile: hanno vietato tutti gli assembramenti.
  Es tut mir leid, aber das *Picknick*, das du am Strand machen wolltest, wird nicht möglich sein: Sie haben alle Versammlungen verboten.
