Rang: 4273
Wort: timore
Wortart: n.m
Wort mit Artikel: il timore
Femininum / Plural: i timori
IPA: ''
Definition: die Furcht, -
Register: ''
Beispielsätze: |-
  Sento un *timore* quando devo parlare in pubblico.
  Ich spüre eine *Furcht*, wenn ich vor Publikum sprechen muss.
  
  Era il *timore* più grande della sua vita, ma alla fine lo ha superato.
  Es war die größte *Furcht* seines Lebens, doch am Ende hat er sie überwunden.
  
  Nonostante il *timore* dell’ignoto, decise di partire per l’Asia da solo.
  Trotz der *Furcht* vor dem Unbekannten beschloss er, allein nach Asien zu reisen.
  
  Il *timore* di non essere all’altezza lo accompagnava da sempre.
  Die *Furcht*, nicht gut genug zu sein, begleitete ihn schon immer.
  
  Se non avessi avuto questo *timore*, forse avrei accettato l’offerta di lavoro all’estero.
  Hätte ich diese *Furcht* nicht gehabt, vielleicht hätte ich das Jobangebot im Ausland angenommen.
