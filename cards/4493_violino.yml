Rang: 4493
Wort: violino
Wortart: n.m
Wort mit Artikel: il violino
Femininum / Plural: i violini
IPA: ''
Definition: die Violine, -n
Register: ''
Beispielsätze: |-
  Mio figlio impara a suonare *il violino* da quando aveva cinque anni.
  Mein Sohn lernt seit seinem fünften Lebensjahr *die Violine* zu spielen.
  
  Nel concerto di ieri sera, *il violino* solista ha catturato l’attenzione di tutto il pubblico.
  Beim Konzert gestern Abend hat *die Violine* des Solisten die Aufmerksamkeit des gesamten Publikums auf sich gezogen.
  
  Se avessi tempo, vorrei imparare a suonare *un violino* antico che ho trovato in soffitta.
  Wenn ich Zeit hätte, würde ich gerne *eine alte Violine* spielen lernen, die ich auf dem Dachboden gefunden habe.
  
  Nonostante la sua età, Maria suona ancora *il violino* con una precisione straordinaria.
  Trotz ihres Alters spielt Maria immer noch *die Violine* mit außergewöhnlicher Präzision.
  
  Ho regalato *un violino* al mio nipote per il suo diciottesimo compleanno, sperando che impari presto a suonarlo.
  Ich habe meinem Neffen zu seinem 18. Geburtstag *eine Violine* geschenkt in der Hoffnung, dass er bald darin spielen lernt.
