Rang: 536
Wort: cavallo
Wortart: n.m
Wort mit Artikel: il cavallo
Femininum / Plural: cavalli
IPA: ''
Definition: das Pferd, -e
Register: ''
Beispielsätze: |-
  Nel *cavallo* che ho comprato al mercato si sente un lieve zoppicamento.
  In dem *Pferd*, das ich auf dem Markt gekauft habe, hört man ein leichtes Hinken.
  
  Se vuoi arrivare in tempo, devi partire prima, perché il *cavallo* non corre così veloce come pensi.
  Wenn du pünktlich ankommen willst, musst du früher losfahren, denn das *Pferd* läuft nicht so schnell, wie du denkst.
  
  Il *cavallo* del presidente ha vinto la corsa nonostante il cattivo tempo di ieri.
  Das *Pferd* des Präsidenten hat das Rennen gewonnen, trotz des schlechten Wetters gestern.
  
  Non appena ho visto il *cavallo* bianco nel prato, mi sono ricordato di quando ero bambino e andavamo a cavallo insieme ai nonni.
  Kaum habe ich das *weiße Pferd* auf der Wiese gesehen, erinnerte ich mich daran, wie ich als Kind mit Opa und Oma reiten ging.
  
  Il contadino ha assicurato che il *cavallo* mangia solo cibo sano e che non lo fa lavorare troppo, il che mi convince assolutamente.
  Der Bauer versicherte, dass das *Pferd* nur gesundes Futter bekommt und dass man es nicht zu sehr arbeiten lässt, was mich völlig überzeugt.
