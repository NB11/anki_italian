Rang: 1058
Wort: arrendere
Wortart: vi
Wort mit Artikel: arrendere
Femininum / Plural: ''
IPA: ''
Definition: aufgeben, sich ergeben
Register: ''
Beispielsätze: |-
  Dopo giorni di lotta, la regina decise di *arrendersi* per salvare il suo popolo.
  Nach Tagen des Kampfes beschloss die *Königin*, sich zu ergeben, um ihr Volk zu retten.
  
  Non volevo *arrendermi*, ma la stanchezza era troppo grande.
  Ich wollte mich nicht *ergeben*, doch die Müdigkeit war zu groß.
  
  Il prigioniero giurò che non si sarebbe più *arrestato*, ma tutti sapevano che mentiva.
  Der Gefangene schwor, sich nie wieder *festnehmen* zu lassen, doch alle wussten, dass er log.
  
  Se non avessimo compreso in tempo il pericolo, ci saremmo *arrenduti* alla paura.
  Hätten wir die Gefahr nicht rechtzeitig *begriffen*, hätten wir uns der Angst hingegeben.
  
  Prima di *arrendersi*, controllò se il coltello fosse ancora al suo posto.
  Bevor er sich *ergab*, prüfte er, ob das Messer noch an seinem Platz lag.
