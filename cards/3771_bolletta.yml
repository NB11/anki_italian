Rang: 3771
Wort: bolletta
Wortart: n.f
Wort mit Artikel: la bolletta
Femininum / Plural: bollette
IPA: ''
Definition: die Rechnung, -en
Register: ''
Beispielsätze: |-
  Ho appena pagato la *bolletta* della luce che era scaduta la settimana scorsa.
  Ich habe gerade die *Rechnung* für Strom bezahlt, die vor einer Woche fällig war.
  
  Se non paghi la *bolletta* entro i termini, ti tagliano la fornitura.
  Wenn du die *Rechnung* nicht innerhalb der Frist bezahlst, wird dir die Versorgung gekappt.
  
  Mi hanno detto che la *bolletta* del gas è aumentata del 20% rispetto allo scorso anno.
  Man hat mir gesagt, dass die *Gasrechnung* im Vergleich zum letzten Jahr um 20% gestiegen ist.
  
  Nonostante abbia ridotto i consumi, la *bolletta* del telefono rimane alta.
  Trotz reduzierter Nutzung bleibt die *Telefonrechnung* hoch.
  
  Vorrei che qualcuno mi spiegasse come mai la *bolletta* dell’acqua è così cara quest’anno.
  Ich würde gerne wissen, warum die *Wasserrechnung* dieses Jahr so teuer ist.
