Beispielsätze: |-
  L'azienda sta per *ingaggiare* nuovi dipendenti per espandersi nel mercato asiatico.
  Das Unternehmen wird neue Mitarbeiter *einstellen*, um sich auf dem asiatischen Markt auszubreiten.
  
  Se avessi più certezza, potrei *ingaggiare* quella società senza dubbi.
  Wenn ich mehr *Gewissheit* hätte, könnte ich diese Firma ohne Zweifel engagieren.
  
  Il regista vuole *ingaggiare* attori anche di provenienza internazionale per il suo nuovo film.
  Der Regisseur möchte Schauspieler auch mit internationaler Herkunft für seinen neuen Film *engagieren*.
  
  Nonostante la sfortuna in questi mesi, riesco comunque a *ingaggiare* nuovi collaboratori ogni settimana.
  Trotz *Pech* in diesen Monaten schaffe ich es trotzdem, jede Woche neue Mitarbeiter einzustellen.
  
  Appena i fondi saranno disponibili, l'associazione potrà *ingaggiare* un esperto per la formazione degli indios nella giungla.
  Sobald die Mittel verfügbar sind, kann der Verein einen Experten für die Ausbildung von *Indianern* im Dschungel einstellen.
