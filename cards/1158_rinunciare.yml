Rang: 1158
Wort: rinunciare
Wortart: vi
Wort mit Artikel: rinunciare
Femininum / Plural: ''
IPA: ''
Definition: verzichten, aufgeben
Register: ''
Beispielsätze: |-
  Non posso *rinunciare* a questa opportunità, è troppo importante per me.
  Ich kann nicht auf *diese* Chance verzichten, sie ist zu wichtig für mich.
  
  Dopo tanti anni di fede, ha deciso di *rinunciare* alla religione organizzata.
  Nach so vielen Jahren des Glaubens hat er beschlossen, auf *organisierte* Religion zu verzichten.
  
  Se non *rinunci* a quel contratto, perderai tutto il tuo risparmio.
  Wenn du nicht auf *diesen* Vertrag verzichtest, verlierst du all dein gespartes Geld.
  
  Mi hanno detto che dovrei *rinunciare* a viaggiare, ma non ci penso proprio!
  Man hat mir gesagt, ich sollte darauf verzichten *zu reisen*, aber daran denke ich überhaupt nicht!
  
  Nonostante il dubbio, sapeva che avrebbe dovuto *rinunciare* a ciò che non era suo.
  Trotz des Zweifels wusste sie, dass sie auf das verzichten musste, was nicht ihr gehörte.
