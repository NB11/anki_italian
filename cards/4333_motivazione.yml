Rang: 4333
Wort: motivazione
Wortart: n.f
Wort mit Artikel: la motivazione
Femininum / Plural: motivazioni
IPA: ''
Definition: die Motivation, -en
Register: ''
Beispielsätze: |-
  La *motivazione* principale per studiare è la passione per la materia.
  Die *Motivation* für das Studium ist die Leidenschaft für das Fach.
  
  Nonostante le difficoltà, la sua *motivazione* non è mai venuta meno.
  Trotz aller Schwierigkeiten ist ihre *Motivation* nie geschwunden.
  
  Quali sono le tue *motivazioni* per accettare questo lavoro?
  Was sind deine *Motive*, diesen Job anzunehmen?
  
  Bisogna trovare una *motivazione* che duri nel tempo per raggiungere grandi obiettivi.
  Man muss eine *Motivation* finden, die über die Zeit Bestand hat, um große Ziele zu erreichen.
  
  La *motivazione* che lo spinge a correre è la voglia di superare i propri limiti.
  Die *Motivation*, die ihn zum Laufen treibt, ist der Wunsch, seine Grenzen zu überwinden.
