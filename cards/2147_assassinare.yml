Rang: 2147
Wort: assassinare
Wortart: vt
Wort mit Artikel: assassinare
Femininum / Plural: ''
IPA: ''
Definition: ermorden, töten
Register: ''
Beispielsätze: |-
  La polizia sospetta che qualcuno abbia voluto *assassinare* il famoso scrittore durante la sua conferenza a Milano.
  Die Polizei vermutet, dass jemand den berühmten Schriftsteller während seiner Konferenz in Mailand *ermorden* wollte.
  
  Se avessi il coraggio, non esiterei un secondo ad *assassinare* chi minaccia la mia famiglia senza esitazione!
  Wenn ich den Mut hätte, würde ich *töten*, wer meine Familie ohne Zögern bedroht!
  
  Era così arrabbiato che giurò di *assassinare* chiunque avesse tradito i suoi segreti durante l’allenamento.
  Er war so wütend, dass er schwor, *töten* zu wollen, wer auch immer während des Trainings seine Geheimnisse verraten hatte.
  
  Dicono che il mafioso avrebbe ordinato di *assassinare* il giudice che indagava sul caso, ma nessuno ha prove concrete.
  Man sagt, der *Mafioso* habe befohlen, den Richter zu ermorden, der den Fall untersuchte, aber niemand hat handfeste Beweise.
  
  Nonostante le minacce, nessuno riuscì a convincerlo a *assassinare* il suo principale per vendetta dopo il licenziamento ingiusto.
  Trotz der Drohungen konnte ihn niemand dazu überreden, seinen Chef aus Rache nach der ungerechtfertigten Entlassung *zu ermorden*.
