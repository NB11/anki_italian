Rang: 559
Wort: liberare
Wortart: v
Wort mit Artikel: liberare
Femininum / Plural: ''
IPA: ''
Definition: befreien, freilassen
Register: ''
Beispielsätze: |-
  Il governo vuole *liberare* tutti i prigionieri politici entro la fine dell'anno.
  Die Regierung will alle politischen Gefangenen bis Ende des Jahres *befreien*.
  
  Se *libererò* questo animale ferito, non sopravviverà nella natura selvaggia.
  Wenn ich dieses verletzte Tier *freilasse*, wird es in der Wildnis nicht überleben.
  
  La polizia ha deciso di *liberare* il sospettato dopo aver trovato prove della sua innocenza.
  Die Polizei hat beschlossen, den Verdächtigen *freizulassen*, nachdem sie Beweise für seine Unschuld gefunden hatte.
  
  Vorrei *liberare* il mio garage dal caos, ma non so da dove cominciare.
  Ich würde meine Garage vom Chaos *befreien*, aber ich weiß nicht, wo ich beginnen soll.
  
  Dopo che avranno *liberato* i cavalli dalla stalla, potremo finalmente andare a cavalcare.
  Nachdem sie die Pferde aus dem Stall *freigelassen haben*, können wir endlich reiten gehen.
