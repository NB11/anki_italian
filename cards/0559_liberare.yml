Beispielsätze: |-
  Gli ambientalisti vogliono *liberare* gli animali dallo sfruttamento.
  Die Umweltschützer wollen die Tiere von der Ausbeutung *befreien*.
  
  Se non paghi, non ti *libererò* dalla promessa!
  Wenn du nicht bezahlst, *befreie* ich dich nicht vom Versprechen!
  
  Ho *liberato* mia sorella dal suo impegno noioso.
  Ich habe meine Schwester von ihrer langweiligen Verpflichtung *befreit*.
  
  Bisogna *liberare* la piazza dalla spazzatura prima di tutto.
  Man muss den Platz erst einmal vom Müll *befreien*.
  
  Potrei *liberarti* da questo peso, se mi aiutassi.
  Ich könnte dich von dieser Last *befreien*, wenn du mir helfen würdest.
