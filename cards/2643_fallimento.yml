Rang: 2643
Wort: fallimento
Wortart: n.m
Wort mit Artikel: il fallimento
Femininum / Plural: i fallimenti
IPA: ''
Definition: das Scheitern
Register: ''
Beispielsätze: |-
  Dopo il *fallimento* della sua azienda, ha deciso di ricominciare da capo.
  Nach dem *Scheitern* seines Unternehmens beschloss er, ganz von vorne zu beginnen.
  
  Il manager ha attribuito il *fallimento* del progetto a una scarsa pianificazione.
  Der Manager schrieb den *Misserfolg* des Projekts einer schlechten Planung zu.
  
  Se non avessi tralasciato i dettagli, forse avremmo evitato il *fallimento*.
  Hätte ich die Details nicht übersehen, hätten wir vielleicht das *Scheitern* vermieden.
  
  Nonostante il *fallimento* ripetuto, continua a credere nel suo sogno.
  Trotz der wiederholten *Misserfolge* glaubt er weiter an seinen Traum.
  
  Hanno parlato a lungo del *fallimento* che ha segnato la loro carriera.
  Sie sprachen ausführlich über das *Scheitern*, das ihre Karriere geprägt hat.
