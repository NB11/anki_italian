Rang: 154
Wort: notte
Wortart: n.f
Wort mit Artikel: la notte
Femininum / Plural: notti
IPA: ''
Definition: die Nacht, -e, -ächte
Register: ''
Beispielsätze: |-
  La *notte* scorsa ho dormito bene.
  In der *vergangenen Nacht* habe ich gut geschlafen.
  
  Che cosa fai di solito di *notte*?
  Was machst du *nachts* normalerweise?
  
  Abbiamo camminato per tutta la *notte* sotto le stelle.
  Wir sind die ganze *Nacht* unter den Sternen gelaufen.
  
  Non ho paura del buio, ma della *notte* silenziosa sì.
  Ich habe keine Angst vor der Dunkelheit, aber vor der *stillen Nacht* schon.
  
  Domani sera partirò per un viaggio di una *notte*.
  Morgen Abend werde ich für eine *Nacht* verreisen.
