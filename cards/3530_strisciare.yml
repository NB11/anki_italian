Rang: 3530
Wort: strisciare
Wortart: v
Wort mit Artikel: strisciare
Femininum / Plural: ''
IPA: ''
Definition: gleiten, rutschen
Register: ''
Beispielsätze: |-
  Il gatto *ha strisciato* silenziosamente verso la preda.
  Die Katze ist *herangeschlichen*.
  
  Attento a non *strisciare* i piedi sul pavimento bagnato!
  Achte darauf, dass du nicht *rutschst*.
  
  Quando ho aperto la porta, il cane *strisciò* fuori senza fare rumore.
  Als ich die Tür öffnete, *schlich* der Hund hinaus.
  
  Non vorrei *strisciare* sulle vostre buone intenzioni, ma temo un inganno.
  Ich möchte mich nicht auf Ihre guten Absichten *zurechtlegen*, aber ich fürchte eine Täuschung.
  
  Se continui a *strisciare* la mano sulla scrivania, la vernice si rovinerà.
  Wenn du weiter mit der Hand über den Schreibtisch *gleitest*, wird der Lack beschädigt.
