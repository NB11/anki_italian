Rang: 4075
Wort: schizzo
Wortart: n.m
Wort mit Artikel: lo schizzo
Femininum / Plural: schizzi
IPA: ''
Definition: der Klecks, -e
Register: ''
Beispielsätze: |-
  Ho fatto uno *schizzo* di caffè sulla camicia bianca.
  Ich habe einen *Klecks* Kaffee auf das weiße Hemd gemacht.
  
  Guarda questi *schizzi* di pittura astratta che ho dipinto ieri.
  Schau dir diese *Kleckse* von abstrakter Malerei an, die ich gestern gemalt habe.
  
  Se non pulisci immediatamente, quello *schizzo* di salsa si secca e rimane per sempre.
  Wenn du es nicht sofort säuberst, trocknet dieser *Klecks* Sosse ein und bleibt für immer.
  
  Mi hanno incaricato di correggere gli *schizzi* nel progetto prima della presentazione.
  Ich wurde beauftragt, die *Kleckse* im Projekt vor der Präsentation zu korrigieren.
  
  Stranamente, il pittore ha aggiunto degli *schizzi* neri proprio al centro del dipinto.
  Seltsamerweise hat der Maler genau in die Mitte des Gemäldes einige *Kleckse* Schwarz hinzugefügt.
