Rang: 3070
Wort: portale
Wortart: n.m
Wort mit Artikel: il portale
Femininum / Plural: portali
IPA: ''
Definition: das Portal, -e
Register: ''
Beispielsätze: |-
  Il *portale* della chiesa è decorato con intagli antichi.
  Das *Portal* der Kirche ist mit alten Schnitzereien verziert.
  
  Attraverso il *portale* digitale puoi accedere a tutti i servizi.
  Durch das digitale *Portal* kannst du auf alle Dienste zugreifen.
  
  Hanno installato un *portale* di sicurezza per controllare gli ingressi.
  Sie haben ein Sicherheitstor installiert, um die Eingänge zu kontrollieren.
  
  Non appena varcò il *portale*, si trovò in un giardino incantato.
  Sobald er das *Portal* durchschritt, fand er sich in einem Zaubergarten wieder.
  
  Il *portale* online offre anche corsi di lingue straniere.
  Das Online-*Portal* bietet auch Kurse in Fremdsprachen an.
