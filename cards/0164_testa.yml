Rang: 164
Wort: testa
Wortart: n.f
Wort mit Artikel: la testa
Femininum / Plural: teste
IPA: ''
Definition: der Kopf, Köpfe
Register: ''
Beispielsätze: |-
  Mi *fa male la* *testa* dopo il viaggio.
  Mir tut *der Kopf* nach der Reise weh.
  
  Ha battuto la *testa* contro lo scaffale.
  Er hat sich *den Kopf* am Regal gestoßen.
  
  Che cosa c'è nella tua *testa*?
  Was geht dir *durch den Kopf*?
  
  La *testa* della lepre è molto piccola.
  *Der Kopf* des Hasen ist sehr klein.
  
  Non ti girare, ti dico solo che hai la *testa* troppo grande per quel cappello!
  Dreh dich nicht um, ich sage dir nur, dass *du* *den Kopf* viel zu groß für diesen Hut hast!
