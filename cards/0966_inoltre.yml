Rang: 966
Wort: inoltre
Wortart: adv
Wort mit Artikel: inoltre
Femininum / Plural: ''
IPA: ''
Definition: außerdem, zudem, darüber hinaus
Register: ''
Beispielsätze: |-
  Ho *inoltre* comprato un libro sulla storia italiana e un CD con musica classica.
  Ich habe *außerdem* ein Buch über italienische Geschichte und eine CD mit klassischer Musik gekauft.
  
  Maria è stanca, *inoltre* non ha ancora finito il suo progetto per domani.
  Maria ist müde, *darüber hinaus* hat sie ihr Projekt für morgen noch nicht beendet.
  
  Se vuoi imparare l’italiano, devi studiare ogni giorno; *inoltre*, è utile ascoltare podcast in lingua.
  Wenn du Italienisch lernen willst, musst du jeden Tag lernen; *außerdem* ist es nützlich, Podcasts in der Sprache zu hören.
  
  Abbiamo visitato Roma e Firenze, *inoltre* abbiamo fatto un giro per la Toscana in macchina.
  Wir haben Rom und Florenz besichtigt, *zudem* sind wir durch die Toskana gefahren.
  
  Non mi piace questo film, è noioso e, *inoltre*, gli attori recitano male.
  Ich mag diesen Film nicht, er ist langweilig und, *außerdem*, die Schauspieler spielen schlecht.
