Rang: 3693
Wort: chiodo
Wortart: n.m
Wort mit Artikel: il chiodo
Femininum / Plural: chiodi
IPA: ''
Definition: der Nagel, -¨
Register: ''
Beispielsätze: |-
  Ho bisogno di un *chiodo* per appendere questo quadro al muro.
  Ich brauche einen *Nagel*, um dieses Bild an die Wand zu hängen.
  
  L'*chiodo* che sporge dal muro è pericoloso, è meglio rimuoverlo.
  Der *Nagel*, der aus der Wand ragt, ist gefährlich, man sollte ihn entfernen.
  
  Se non avessimo trovato quel *chiodo* arrugginito, la costruzione sarebbe stata impossibile.
  Hätten wir jenen rostigen *Nagel* nicht gefunden, wäre der Bau unmöglich gewesen.
  
  Mi hanno detto che il *chiodo* che cerchi si trova nell'armadio in garage.
  Man hat mir gesagt, dass sich der *Nagel*, nach dem du suchst, im Schrank in der Garage befindet.
  
  Nonostante l'*chiodo* fosse troppo corto, l'artigiano riuscì a sistemarlo con abilità.
  Obwohl der *Nagel* zu kurz war, gelang es dem Handwerker, ihn geschickt zu befestigen.
