  Die Regierung kündigte neue Steuern an und förderte *gleichzeitig* Anreize für Unternehmen.
  
  Non riesco a concentrarmi quando parlano tutti *contemporaneamente* nella stanza.
  Ich kann mich nicht konzentrieren, wenn alle *gleichzeitig* im Raum sprechen.
