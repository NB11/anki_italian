Beispielsätze: |-
  Mentre cucinavo la pasta, *contemporaneamente* bolliva l'acqua.
  Während ich die Nudeln kochte, *kochte* gleichzeitig das Wasser.
  
  Studiava matematica e, *contemporaneamente*, ascoltava musica classica.
