Rang: 3643
Wort: postazione
Wortart: n.f
Wort mit Artikel: la postazione
Femininum / Plural: postazioni
IPA: ''
Definition: der Arbeitsplatz, Arbeitsstation
Register: ''
Beispielsätze: |-
  Ho bisogno di una *postazione* più comoda per lavorare al computer.
  Ich brauche einen *Arbeitsplatz* bequemer, um am Computer zu arbeiten.
  
  La *postazione* di emergenza è dotata di un estintore e di un pulsante di allarme.
  Die Notfall-*Arbeitsstation* ist mit einem Feuerlöscher und einem Alarmknopf ausgestattet.
  
  Spero che la *postazione* del nuovo dipendente sia presto pronta.
  Ich hoffe, dass der *Arbeitsplatz* des neuen Mitarbeiters bald fertig ist.
  
  In questa azienda ogni *postazione* è attrezzata con due monitor.
  In diesem Unternehmen ist jede *Arbeitsstation* mit zwei Bildschirmen ausgestattet.
  
  Se non trovi la tua *postazione*, chiedi al supervisore.
  Wenn du deinen *Arbeitsplatz* nicht findest, frag den Vorgesetzten.
