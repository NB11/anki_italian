Rang: 4271
Wort: fondazione
Wortart: n.f
Wort mit Artikel: la fondazione
Femininum / Plural: fondazioni
IPA: ''
Definition: die Gründung, -en
Register: ''
Beispielsätze: |-
  La *fondazione* di questa scuola risale al 1985.
  Die *Gründung* dieser Schule reicht bis 1985 zurück.
  
  Spero che la *fondazione* del museo avvenga entro l'anno.
  Ich hoffe, dass die *Gründung* des Museums noch in diesem Jahr erfolgt.
  
  La *fondazione* ha ricevuto una donazione molto generosa.
  Die *Gründung* hat eine sehr großzügige Spende erhalten.
  
  Dopo anni di preparativi, finalmente è avvenuta la *fondazione* della nuova associazione.
  Nach Jahren der Vorbereitungen hat schließlich die *Gründung* des neuen Vereins stattgefunden.
  
  La legge prevede che ogni *fondazione* debba avere un patrimonio iniziale minimo.
  Das Gesetz sieht vor, dass jede *Gründung* ein Mindeststartkapital haben muss.
