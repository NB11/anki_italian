Rang: 4122
Wort: monitor
Wortart: n.m
Wort mit Artikel: il monitor
Femininum / Plural: monitor
IPA: ''
Definition: der Bildschirm, -e
Register: ''
Beispielsätze: |-
  Ho acquistato un nuovo *monitor* per il mio computer da gaming.
  Ich habe einen neuen *Bildschirm* für meinen Gaming-Computer gekauft.
  
  Il *monitor* si è rotto proprio quando stavo finendo il progetto.
  Der *Bildschirm* ist genau kaputtgegangen, als ich das Projekt beendet habe.
  
  Se non pulisci spesso il *monitor*, la polvere può danneggiarlo.
  Wenn du den *Bildschirm* nicht regelmäßig reinigst, kann der Staub ihn beschädigen.
  
  I tecnici stanno installando il *monitor* più grande in ufficio.
  Die Techniker installieren gerade den größten *Bildschirm* im Büro.
  
  Mi hanno regalato un *monitor* con una risoluzione così alta che sembra un televisore.
  Sie haben mir einen *Bildschirm* geschenkt, dessen Auflösung so hoch ist, dass er wie ein Fernseher wirkt.
