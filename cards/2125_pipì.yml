Rang: 2125
Wort: pipì
Wortart: n.f
Wort mit Artikel: la pipì
Femininum / Plural: pipì
IPA: ''
Definition: der Urin
Register: ''
Beispielsätze: |-
  Dopo aver bevuto troppo caffè, devo andare in bagno perché ho la *pipì*.
  Nach zu viel Kaffee muss ich ins Bad, weil ich *Urin* habe.
  
  Il neonato ha fatto *pipì* addosso al pannolino.
  Das Baby hat in die Windel *Urin* gemacht.
  
  Mi scusi, dove posso trovare un bagno per fare *pipì*?
  Entschuldigung, wo finde ich eine Toilette, um *Urin* lassen zu können?
  
  La *pipì* del cane ha rovinato il prato del vicino.
  Der *Urin* des Hundes hat den Rasen des Nachbarn ruiniert.
  
  Avevo tanta sete che ho bevuto così tanto che alla fine ho perso il controllo e ho fatto *pipì* nelle mutande.
  Ich hatte solchen Durst, dass ich so viel getrunken habe, dass ich schließlich die Kontrolle verlor und mir in die *Unterhose* gemacht habe.
