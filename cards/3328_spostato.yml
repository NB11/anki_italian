Rang: 3328
Wort: spostato
Wortart: n.m
Wort mit Artikel: lo spostato
Femininum / Plural: gli spostati
IPA: ''
Definition: die *Versetzung*, die *Umlagerung*, die *Verschiebung*
Register: ''
Beispielsätze: |-
  Lo *spostato* dei libri ha creato molto caos nella biblioteca.
  Die *Verschiebung* der Bücher hat in der Bibliothek viel Chaos verursacht.
  
  Gli *spostati* di quest’anno vivono in una comunità per rifugiati.
  Die *Umlagerungen* dieses Jahres leben in einer Flüchtlingsgemeinschaft.
  
  Il sindaco ha parlato degli *spostati* dopo il terremoto.
  Der Bürgermeister hat über die *Versetzten* nach dem Erdbeben gesprochen.
  
  Volevo sapere se il mio ordine di *spostato* era stato accettato.
  Ich wollte wissen, ob meine *Versetzungs*-Bestellung angenommen worden war.
  
  Gli *spostati* culturali spesso trovano difficoltà ad adattarsi.
  Die *kulturellen Vertreibungen* verursachen oft Anpassungsschwierigkeiten.
