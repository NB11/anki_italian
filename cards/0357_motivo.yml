Rang: 357
Wort: motivo
Wortart: n.m
Wort mit Artikel: il motivo
Femininum / Plural: i motivi
IPA: ''
Definition: der Grund, Anlass
Register: ''
Beispielsätze: |-
  Qual è *il* *motivo* per cui sei triste?
  Was ist *der Grund*, warum du traurig bist?
  
  Non ho *un motivo* valido per partire adesso.
  Ich habe *keinen* gültigen *Grund*, jetzt loszufahren.
  
  *I motivi* di questa decisione sono complessi.
  *Die Gründe* für diese Entscheidung sind kompliziert.
  
  Non capisco *il motivo* di tanta confusione.
  Ich verstehe *den Grund* für soviel Verwirrung nicht.
  
  Se hai *un motivo*, dimmelo subito!
  Wenn du *einen Grund* hast, sag ihn mir sofort!
