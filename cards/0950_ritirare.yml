Rang: 950
Wort: ritirare
Wortart: vt
Wort mit Artikel: ritirare
Femininum / Plural: ''
IPA: ''
Definition: zurückziehen, abholen, einlösen, entziehen
Register: ''
Beispielsätze: |-
  Ho bisogno di *ritirare* il pacco che è arrivato ieri alla posta.
  Ich muss das Paket, das gestern bei der Post angekommen ist, *abholen*.
  
  Se non paghi la multa, ti possono *ritirare* la patente.
  Wenn du die Strafe nicht bezahlst, können sie dir den Führerschein *entziehen*.
  
  Vuoi che *ritiri* io i bambini da scuola oggi pomeriggio?
  Soll ich die Kinder heute Nachmittag von der Schule *abholen*?
  
  Dopo aver parlato con il direttore, ho deciso di *ritirare* la mia domanda di licenziamento.
  Nachdem ich mit dem Direktor gesprochen habe, habe ich beschlossen, meinen Kündigungsantrag *zurückzuziehen*.
  
  Domani mattina andrò in banca per *ritirare* i soldi dal mio conto.
  Morgen früh werde ich zur Bank gehen, um das Geld von meinem Konto *abzuheben*.
