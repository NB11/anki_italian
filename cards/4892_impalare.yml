Rang: 4892
Wort: impalare
Wortart: vt
Wort mit Artikel: impalare
Femininum / Plural: ''
IPA: ''
Definition: aufspießen, durchbohren
Register: ''
Beispielsätze: |-
  Nel Medioevo spesso si *impalava* chi veniva accusato di stregoneria.
  Im Mittelalter spießte man oft die, die man der Hexerei beschuldigte, auf.
  
  Non vorrei *impalarti* con un chiodo, ma stai attento!
  Ich würde dich nicht gern mit einem Nagel *aufspießen*, aber pass auf!
  
  Hanno minacciato di *impalarlo* se non avesse restituito il bottino.
  Sie drohten, ihn *aufzuspießen*, falls er die Beute nicht zurückgab.
  
  Se non *impali* presto quel legno storto, non sarà dritto neanche quando sarà asciutto.
  Wenn du diesen krummen Holzstab nicht *aufspießt*, wird er selbst beim Trocknen nicht gerade werden.
  
  Dice che lo *impalerebbero* senza esitare, ma secondo me scherza.
  Er sagt, sie würden ihn ohne zu zögern *aufspießen*, aber ich glaube, er scherzt.
