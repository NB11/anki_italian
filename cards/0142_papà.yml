Beispielsätze: |-
  Il *papà* lavora in ufficio ogni giorno.
  Der *Vater* arbeitet jeden Tag im Büro.
  
  Dov'è andato il *papà*?
  Wohin ist *Papa* gegangen?
  
  Mio *papà* cucina molto bene la pasta.
  Mein *Vater* kocht Nudeln sehr gut.
  
  Se avessi tempo, chiamerei il *papà* più spesso.
  Wenn ich Zeit hätte, würde ich *Papa* öfter anrufen.
  
  I *papà* di oggi sono molto diversi da quelli di una volta.
  Die *Väter* von heute sind sehr anders als die von früher.
