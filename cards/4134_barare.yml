Rang: 4134
Wort: barare
Wortart: vi
Wort mit Artikel: barare
Femininum / Plural: ''
IPA: ''
Definition: mogeln, schummeln, betrügen
Register: ''
Beispielsätze: |-
  Se vuoi vincere il torneo, non puoi *barare*, altrimenti verrai squalificato.
  Wenn du das Turnier gewinnen willst, kannst du nicht *mogeln*, sonst wirst du disqualifiziert.
  
  Il professore sospetta che qualcuno abbia *barato* durante l’esame di matematica.
  Der Lehrer vermutet, dass jemand während der Matheprüfung *geschummelt* hat.
  
  Non ti fidare di lui: ha l’abitudine di *barare* perfino nei giochi da tavolo.
  Vertrau ihm nicht: Er hat die Angewohnheit, *zu betrügen*, sogar bei Gesellschaftsspielen.
  
  Il sindaco promette di punire chiunque osi *barare* nelle procedure di appalto.
  Der Bürgermeister verspricht, jeden zu bestrafen, der es wagt, bei den Ausschreibungsverfahren *zu mogeln*.
  
  Era così stanco che, per finire il progetto in tempo, avrebbe *barato* volentieri.
  Er war so müde, dass er, um das Projekt rechtzeitig zu beenden, gerne *geschummelt* hätte.
