Wort: relativo
Wortart: adj
Wort mit Artikel: relativo
Femininum / Plural: ''
IPA: ''
Definition: relativ, betreffend
Register: ''
Beispielsätze: |-
  Il problema è *relativo* alla situazione economica attuale.
  Das Problem ist *relativ* zur aktuellen Wirtschaftslage.
  
  Nonostante la distanza, il costo di spedizione è *relativo* al peso.
  Trotz der Entfernung ist die Versandkosten *relativ* zum Gewicht.
  
  Studiava un concetto *relativo* alla fisica quantistica.
  Er studierte ein Konzept, das *relativ* zur Quantenphysik ist.
  
  La tua opinione è *relativa*: dipende dal punto di vista.
  Deine Meinung ist *relativ*: sie hängt vom Standpunkt ab.
  
  Hanno modificato il regolamento in modo *relativo* alla sicurezza.
  Sie haben die Vorschrift in einer Weise geändert, die *relativ* zur Sicherheit steht.
