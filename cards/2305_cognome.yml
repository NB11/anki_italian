Rang: 2305
Wort: cognome
Wortart: n.m
Wort mit Artikel: il cognome
Femininum / Plural: cognomi
IPA: ''
Definition: der Nachname, -n, Familienname
Register: ''
Beispielsätze: |-
  Non ricordo il *cognome* di quella famiglia, ma so che abitano qui da generazioni.
  Ich erinnere mich nicht an den *Nachnamen* dieser Familie, aber ich weiß, dass sie hier seit Generationen wohnen.
  
  Se vuoi partecipare al concorso, devi scrivere il tuo *cognome* e il tuo nome in stampatello.
  Wenn du am Wettbewerb teilnehmen möchtest, musst du deinen *Nachnamen* und Vornamen in Blockbuchstaben schreiben.
  
  Il *cognome* Rossi è molto diffuso in Italia, soprattutto in Toscana.
  Der *Nachname* Rossi ist in Italien sehr verbreitet, vor allem in der Toskana.
  
  Dopo il matrimonio, ha deciso di mantenere il proprio *cognome* invece di cambiarlo.
  Nach der Heirat hat sie beschlossen, ihren *Nachnamen* beizubehalten, statt ihn zu ändern.
  
  Nonostante la confusione, alla fine sono riuscito a trovare il *cognome* che cercavo nell’elenco telefonico.
  Trotz der Verwirrung bin ich schließlich in der Lage gewesen, den *Nachnamen*, den ich suchte, im Telefonbuch zu finden.
