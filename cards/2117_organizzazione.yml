Beispielsätze: |-
  La *organizzazione* dell’evento richiede molto tempo.
  Die *Organisation* der Veranstaltung benötigt viel Zeit.
  
  Credo che senza una buona *organizzazione* non si riesca a concludere nulla.
  Ich glaube, dass man ohne eine gute *Organisation* nichts zu Ende bringen kann.
  
  La nuova *organizzazione* del personale ha aumentato l’efficienza.
  Die neue *Organisation* des Personals hat die Effizienz gesteigert.
  
  Se avessimo seguito la *organizzazione* originale, avremmo risparmiato tempo.
  Wenn wir der ursprünglichen *Organisation* gefolgt wären, hätten wir Zeit gespart.
  
  L’*organizzazione* di questa fondazione è nota in tutto il mondo.
  Die *Organisation* dieser Stiftung ist weltweit bekannt.
