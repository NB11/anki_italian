Rang: 1935
Wort: veicolo
Wortart: n.m
Wort mit Artikel: il veicolo
Femininum / Plural: veicoli
IPA: ''
Definition: das Fahrzeug, -e
Register: ''
Beispielsätze: |-
  Il *veicolo* è parcheggiato davanti alla stazione.
  Das *Fahrzeug* ist vor dem Bahnhof geparkt.
  
  Dopo aver guidato per ore, finalmente abbiamo trovato un *veicolo* in affitto.
  Nach stundenlangem Fahren haben wir endlich ein *Fahrzeug* zum Mieten gefunden.
  
  Se non avessi il *veicolo*, dovrei prendere l'autobus ogni giorno.
  Wenn ich das *Fahrzeug* nicht hätte, müsste ich jeden Tag den Bus nehmen.
  
  Nonostante il traffico intenso, il *veicolo* procedeva a velocità costante.
  Trotz des starken Verkehrs fuhr das *Fahrzeug* mit konstanter Geschwindigkeit.
  
  L'unica soluzione per evitare ritardi è prenotare un *veicolo* di lusso.
  Die einzige Lösung, um Verspätungen zu vermeiden, ist die Reservierung eines *Fahrzeugs* der Luxusklasse.
