Rang: 3839
Wort: colombo
Wortart: n.m
Wort mit Artikel: il colombo
Femininum / Plural: colombe
IPA: ''
Definition: die Taube, -n
Register: ''
Beispielsätze: |-
  Ho visto un *colombo* che beccava le briciole per terra in piazza.
  Ich habe eine *Taube* gesehen, die die Krümel auf dem Boden pickte.
  
  Nonostante il traffico, il *colombo* volava alto nel cielo.
  Trotz des Verkehrs flog die *Taube* hoch am Himmel.
  
  Se avessi un *colombo* addomesticato, lo lascerei volare libero ogni mattina.
  Wenn ich eine zahme *Taube* hätte, würde ich sie jeden Morgen frei fliegen lassen.
  
  Credi che questo *colombo* abbia un messaggio da portare con sé?
  Glaubst du, dass diese *Taube* eine Nachricht bei sich trägt?
  
  Il *colombo* che ho trovato nel parco era ferito e non riusciva a volare.
  Die *Taube*, die ich im Park gefunden habe, war verletzt und konnte nicht fliegen.
