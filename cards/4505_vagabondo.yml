Rang: 4505
Wort: vagabondo
Wortart: n.m
Wort mit Artikel: il vagabondo
Femininum / Plural: i vagabondi
IPA: ''
Definition: der Landstreicher, - / der Obdachlose, -n
Register: ''
Beispielsätze: |-
  Quel *vagabondo* dorme sempre sotto il ponte vicino alla stazione.
  Jener *Obdachlose* schläft immer unter der Brücke nahe dem Bahnhof.
  
  Nonostante la pioggia, il *vagabondo* non si muoveva dal suo solito posto.
  Trotz des Regens rührte sich der *Landstreicher* nicht von seinem üblichen Platz.
  
  Vorrei aiutare il *vagabondo* che ho incontrato ieri, ma non so come fare.
  Ich würde gerne dem *Obdachlosen* helfen, den ich gestern getroffen habe, aber ich weiß nicht wie.
  
  Se fosse meno orgoglioso, il *vagabondo* accetterebbe l’aiuto che gli viene offerto.
  Wenn er weniger stolz wäre, würde der *Landstreicher* die Hilfe annehmen, die ihm angeboten wird.
  
  Anche quando la città cerca di nasconderlo, il *vagabondo* continua a esistere in ogni angolo.
  Auch wenn die Stadt versucht, ihn zu verstecken, existiert der *Obdachlose* in jeder Ecke weiter.
