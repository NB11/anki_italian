Rang: 1553
Wort: alice
Wortart: n.m
Wort mit Artikel: la alice
Femininum / Plural: le Alici
IPA: ''
Definition: der Vorname Alice
Register: ''
Beispielsätze: |-
  Conosco una ragazza di nome *Alice* che vive a Milano.
  Ich kenne ein Mädchen namens *Alice*, das in Mailand lebt.
  
  La *Alice* che ho conosciuto ieri al corso di italiano è molto simpatica.
  Die *Alice*, die ich gestern im Italienischkurs kennengelernt habe, ist sehr sympathisch.
  
  Hai visto dove ha posato la borsa la *Alice* di cui ti parlavo?
  Hast du gesehen, wo *Alice*, von der ich dir erzählt habe, ihre Tasche hingelegt hat?
  
  Se *Alice* non avesse perso il cellulare, avrebbe potuto chiamare subito i soccorsi.
  Wenn *Alice* ihr Handy nicht verloren hätte, hätte sie sofort die Hilfe rufen können.
  
  La *Alice* che lavora all’agenzia di viaggi ha promesso di descrivere tutte le novità del prossimo mese.
  Die *Alice*, die in der Reiseagentur arbeitet, hat versprochen, alle Neuerungen des nächsten Monats zu beschreiben.
