Rang: 1976
Wort: fegato
Wortart: n.m
Wort mit Artikel: il fegato
Femininum / Plural: fegati
IPA: ''
Definition: die Leber, -n
Register: ''
Beispielsätze: |-
  Il *fegato* è un organo essenziale per la metabolizzazione delle sostanze tossiche nel nostro corpo.
  Die *Leber* ist ein wichtiges Organ für die Entgiftung unseres Körpers.
  
  Dopo l’analisi, il medico ha scoperto che il *fegato* del paziente era gravemente danneggiato.
  Nach der Untersuchung stellte der Arzt fest, dass die *Leber* des Patienten schwer beschädigt war.
  
  Se non avessi bevuto così tanto alcol, il tuo *fegato* ora non soffrirebbe tanto.
  Hättest du nicht so viel Alkohol getrunken, würde deine *Leber* jetzt nicht so leiden.
  
  Penso che il *fegato* sia l’organo che più risente di uno stile di vita poco sano.
  Ich glaube, die *Leber* ist das Organ, das am meisten unter einem ungesunden Lebensstil leidet.
  
  Nonostante i progressi della medicina, non è ancora possibile sostituire completamente il *fegato* umano.
  Trotz medizinischer Fortschritte ist es noch nicht möglich, die menschliche *Leber* vollständig zu ersetzen.
