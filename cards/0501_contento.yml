Rang: 501
Wort: contento
Wortart: adj
Wort mit Artikel: contento
Femininum / Plural: contenti (m), contente (f)
IPA: ''
Definition: zufrieden, froh, glücklich
Register: ''
Beispielsätze: |-
  Sono *contento* perché ho passato l’esame con un voto molto buono.
  Ich bin *zufrieden*, weil ich die Prüfung mit einer sehr guten Note bestanden habe.
  
  Nonostante tutto, Marco rimane *contento* della sua scelta di trasferirsi.
  Trotz allem bleibt Marco *zufrieden* mit seiner Entscheidung, umzuziehen.
  
  Se avessi più tempo libero, sarei molto *contento*!
  Wenn ich mehr Freizeit hätte, wäre ich sehr *zufrieden*!
  
  La notizia che eri salvo mi ha reso molto *contento*.
  Die Nachricht, dass du in Sicherheit bist, hat mich sehr *froh* gemacht.
  
  Era *contenta* che la sua amica avesse trovato lavoro, perciò hanno festeggiato insieme al ristorante.
  Sie war *zufrieden*, dass ihre Freundin eine Arbeit gefunden hatte, deshalb haben sie zusammen im Restaurant gefeiert.
