Rang: 501
Wort: contento
Wortart: adj
Wort mit Artikel: contento
Femininum / Plural: contenti
IPA: ''
Definition: zufrieden, glücklich
Register: ''
Beispielsätze: |-
  *Sono molto contento* di averti rivisto dopo tanti anni.
  Ich bin *sehr zufrieden*, dich nach so vielen Jahren wiederzusehen.
  
  Non sembra *contenta* della sua nuova macchina fotografica.
  Sie scheint nicht *glücklich* mit ihrer neuen Kamera zu sein.
  
  Siamo stati *contenti* dell'aiuto che ci hai dato?
  Wart ihr *zufrieden* mit der Hilfe, die du uns gegeben hast?
  
  Se avessi più tempo, sarei *più contento* con il mio lavoro.
  Wenn ich mehr Zeit hätte, wäre ich *glücklicher* mit meiner Arbeit.
  
  I genitori erano *contenti* che la figlia avesse trovato un buon lavoro.
  Die Eltern waren *zufrieden*, dass die Tochter einen guten Job gefunden hatte.
