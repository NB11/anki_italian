Rang: 2273
Wort: misterioso
Wortart: adj
Wort mit Artikel: misterioso
Femininum / Plural: ''
IPA: ''
Definition: rätselhaft, geheimnisvoll, mysteriös
Register: ''
Beispielsätze: |-
  La stanza era avvolta da un silenzio *misterioso*.
  Das Zimmer war in eine *rätselhafte* Stille gehüllt.
  
  Penso che la sua risposta sia stata *misteriosa* come sempre.
  Ich glaube, dass seine Antwort wieder einmal *geheimnisvoll* war.
  
  Non sopporto quando qualcuno mi guarda con uno sguardo *misterioso* senza spiegare nulla.
  Ich kann es nicht ausstehen, wenn mich jemand mit einem *mysterischen* Blick ansieht, ohne etwas zu erklären.
  
  Ho trovato un messaggio *misterioso* nella mia casella della posta in arrivo.
  Ich habe eine *rätselhafte* Nachricht in meinem Posteingang gefunden.
  
  Anche se tutto sembra *misterioso*, alla fine la verità viene sempre a galla.
  Auch wenn alles *geheimnisvoll* erscheint, kommt die Wahrheit am Ende immer ans Licht.
