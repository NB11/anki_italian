Rang: 3343
Wort: estraneo
Wortart: n.m
Wort mit Artikel: lo estraneo
Femininum / Plural: gli estranei
IPA: ''
Definition: der Fremde, -n
Register: ''
Beispielsätze: |-
  Non mi fido di *estranei* che incontro per strada.
  Ich vertraue *fremden* Menschen nicht, die ich auf der Straße treffe.
  
  Lo *straniero* era stato accolto dalla sua zia, ma ora non sa più chi sia.
  Der *Fremde* war von seiner Tante aufgenommen worden, doch jetzt weiß er nicht mehr, wer sie ist.
  
  Ho conosciuto un *estraneo* che sosteneva di aver vissuto nello stesso quartiere anni fa.
  Ich habe einen *Fremden* kennengelernt, der behauptete, vor Jahren im selben Stadtteil gelebt zu haben.
  
  Se vedi un *estraneo* che si aggira per casa, chiama subito la polizia!
  Wenn du einen *Fremden* siehst, der sich im Haus herumtreibt, ruf sofort die Polizei!
  
  Nonostante *estranei* potessero frequentare la palestra, lui preferiva allenarsi da solo.
  Obwohl *Fremde* das Fitnessstudio besuchen durften, trainierte er lieber allein.
