Rang: 2709
Wort: vaso
Wortart: n.m
Wort mit Artikel: il vaso
Femininum / Plural: vasi
IPA: ''
Definition: die Vase, -n
Register: ''
Beispielsätze: |-
  Sulla *vaso* di ceramica c'è un bel disegno floreale.
  Auf der *Vase* aus Keramik gibt es ein schönes Blumenmuster.
  
  Ho rotto un *vaso* antico che apparteneva a mia nonna.
  Ich habe eine antike *Vase* zerbrochen, die meiner Großmutter gehörte.
  
  Non appena avrò tempo, sistemerò il *vaso* sulla mensola della finestra.
  Sobald ich Zeit habe, werde ich die *Vase* auf dem Fensterbrett platzieren.
  
  Se avessi più spazio, comprerei un *vaso* enorme per il salotto.
  Wenn ich mehr Platz hätte, würde ich eine riesige *Vase* für das Wohnzimmer kaufen.
  
  Ha detto che il *vaso* che hai scelto è identico a quello che possiede sua sorella.
  Er hat gesagt, dass die *Vase*, die du ausgewählt hast, identisch mit der ist, die seine Schwester besitzt.
