Rang: 2173
Wort: sintomo
Wortart: n.m
Wort mit Artikel: il sintomo
Femininum / Plural: sintomi
IPA: ''
Definition: das Symptom, -e
Register: ''
Beispielsätze: |-
  Il medico ha osservato attentamente il *sintomo* che il paziente descriveva da settimane.
  Der Arzt hat das *Symptom*, das der Patient seit Wochen beschrieb, genau beobachtet.
  
  Questi *sintomi* di stanchezza persistono nonostante il riposo prolungato.
  Diese *Symptome* der Erschöpfung halten trotz langer Erholung an.
  
  Se avverti questo *sintomo*, ti consiglio di rivolgerti immediatamente a un specialista.
  Wenn du dieses *Symptom* spürst, würde ich dir raten, dich sofort an einen Spezialisten zu wenden.
  
  Nonostante l’assenza di *sintomi* evidenti, il medico ha prescritto ulteriori analisi.
  Trotz Fehlens offensichtlicher *Symptome* hat der Arzt weitere Analysen verordnet.
  
  Il *sintomo* principale della malattia è la febbre alta, accompagnata da mal di gola.
  Das *Hauptsymptom* der Krankheit ist das hohe Fieber, begleitet von Halsschmerzen.
