  Wenn ich ein *Manager* wäre, würde ich sofort alle feuern, die die Fristen nicht einhalten.
  
  Il *manager* gli ha offerto un contratto a tempo indeterminato dopo due anni di ottimo lavoro.
  Der *Manager* hat ihm nach zwei Jahren hervorragender Arbeit einen unbefristeten Vertrag angeboten.
  
  Non credo che il *manager* approverebbe questa decisione così azzardata, non trovi?
  Ich glaube nicht, dass der *Manager* diese so riskante Entscheidung gutheißen würde, meinst du nicht auch?
