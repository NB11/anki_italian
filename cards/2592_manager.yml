Wort mit Artikel: il manager
Femininum / Plural: i manager
IPA: ''
Definition: der Manager, - / die Managerin, -nen
Register: ''
Beispielsätze: |-
  Il *manager* ha deciso di trasferirsi all'estero per considerazione della famiglia.
  Der *Manager* hat sich aus Rücksicht auf die Familie entschieden, ins Ausland umzuziehen.
  
  Chi è il *manager* di questa squadra di calcio? Vorrei parlargli urgentemente.
  Wer ist der *Teammanager* dieses Fußballteams? Ich müsste ihn dringend sprechen.
  
