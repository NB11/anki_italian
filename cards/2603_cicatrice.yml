Rang: 2603
Wort: cicatrice
Wortart: n.f
Wort mit Artikel: la cicatrice
Femininum / Plural: cicatrici
IPA: ''
Definition: die Narbe, -n
Register: ''
Beispielsätze: |-
  Dopo l’operazione il medico ha controllato attentamente la *cicatrice* per assicurarsi che non ci fossero infezioni.
  Nach der Operation hat der Arzt die *Narbe* sorgfältig kontrolliert, um sicherzustellen, dass es keine Infektionen gab.
  
  La *cicatrice* che si vede sul suo braccio racconta tutta la storia della sua infanzia difficile.
  Die *Narbe*, die man an seinem Arm sieht, erzählt die ganze Geschichte seiner schwierigen Kindheit.
  
  Nonostante la *cicatrice* sia ormai sbiadita, lui ricorda ancora il giorno dell’incidente con un certo shock.
  Obwohl die *Narbe* mittlerweile verblasst ist, erinnert er sich noch immer mit einem gewissen Schock an den Tag des Unfalls.
  
  Il chirurgo ha assicurato che la *cicatrice* diventerà meno visibile con il tempo e le giuste cure.
  Der Chirurg hat versichert, dass die *Narbe* mit der Zeit und der richtigen Pflege weniger sichtbar wird.
  
  Mentre parlava, ho notato una strana *cicatrice* sulla sua guancia che non avevo mai visto prima.
  Während er sprach, bemerkte ich eine seltsame *Narbe* auf seiner Wange, die ich zuvor noch nie gesehen hatte.
