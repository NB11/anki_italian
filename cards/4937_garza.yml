Rang: 4937
Wort: garza
Wortart: n.f
Wort mit Artikel: la garza
Femininum / Plural: garze
IPA: ''
Definition: die Gaze, -n
Register: ''
Beispielsätze: |-
  Il medico ha usato una *garza* sterile per pulire la ferita.
  Der Arzt hat eine *sterile Gaze* verwendet, um die Wunde zu reinigen.
  
  Dopo l’intervento, la *garza* è rimasta bendata per tre giorni.
  Nach dem Eingriff blieb die *Gaze* drei Tage lang verbunden.
  
  Vor di andare in ospedale, ho comprato delle *garze* nuove per il pronto soccorso di casa.
  Bevor ich ins Krankenhaus ging, habe ich neue *Gazen* für die Hausapotheke gekauft.
  
  La *garza* imbevuta di disinfettante ha alleviato il dolore della puntura.
  Die mit Desinfektionsmittel getränkte *Gaze* hat den Schmerz des Stichs gelindert.
  
  Se vuoi un effetto più forte, avvolgi la *garza* intorno al ghiaccio prima di applicarla.
  Wenn du eine stärkere Wirkung willst, wickle die *Gaze* vor dem Auflegen um das Eis.
