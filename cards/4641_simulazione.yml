Rang: 4641
Wort: simulazione
Wortart: n.f
Wort mit Artikel: la simulazione
Femininum / Plural: simulazioni
IPA: ''
Definition: die Simulation, -en
Register: ''
Beispielsätze: |-
  Il professore ha organizzato una *simulazione* dell'esame per preparare meglio gli studenti.
  Der Professor hat eine *Simulation* der Prüfung organisiert, um die Studenten besser vorzubereiten.
  
  Per la *simulazione* del volo spaziale, abbiamo usato un software molto avanzato.
  Für die *Simulation* des Raumflugs haben wir eine sehr fortschrittliche Software genutzt.
  
  Credi che questa *simulazione* dei dati sia abbastanza accurata per prendere una decisione?
  Glaubst du, dass diese *Simulation* der Daten genau genug ist, um eine Entscheidung zu treffen?
  
  La *simulazione* degli scenari di emergenza è prevista per domani mattina alle otto.
  Die *Simulation* der Notfallszenarien ist für morgen früh um acht Uhr vorgesehen.
  
  Nonostante la *simulazione* avesse previsto temperature più alte, oggi fa decisamente freddo.
  Obwohl die *Simulation* höhere Temperaturen vorhergesagt hatte, ist es heute eindeutig kalt.
