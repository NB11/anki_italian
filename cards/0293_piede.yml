  Der Hund hat sich seinen *Fuß* verletzt, als er durch die Dornen gelaufen ist.
  
  Con i *piedi* nella sabbia, guardavo le onde del mare.
  Mit den *Füßen* im Sand habe ich mir die Wellen des Meeres angesehen.
