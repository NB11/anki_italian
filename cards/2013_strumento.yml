Rang: 2013
Wort: strumento
Wortart: n.m
Wort mit Artikel: lo strumento
Femininum / Plural: strumenti
IPA: ''
Definition: das Werkzeug, das Instrument
Register: ''
Beispielsätze: |-
  Per *strumento* musicale intendo soprattutto il violino, perché lo suono da quando ero bambino.
  Für das *Instrument* meine ich vor allem die Geige, weil ich sie seit ich Kind bin spiele.
  
  Nonostante l’ingegnere avesse progettato un *strumento* innovativo, il prototipo non funzionava ancora.
  Obwohl der Ingenieur ein innovatives *Werkzeug* entworfen hatte, funktionierte der Prototyp noch nicht.
  
  Mi hanno detto che sarebbe stato necessario un *strumento* specifico per risolvere quel problema complicato.
  Man hat mir gesagt, dass ein spezifisches *Instrument* nötig wäre, um dieses komplizierte Problem zu lösen.
  
  Ho comprato un *strumento* per misurare l’umidità del terreno, così potrò prendermi cura meglio del mio giardino.
  Ich habe ein *Gerät* gekauft, um die Feuchtigkeit des Bodens zu messen, damit ich mich besser um meinen Garten kümmern kann.
  
  Lo scienziato aveva bisogno di un *strumento* molto delicato per analizzare i campioni di DNA senza rovinarli.
  Der Wissenschaftler brauchte ein sehr empfindliches *Gerät*, um die DNA-Proben zu analysieren, ohne sie zu beschädigen.
