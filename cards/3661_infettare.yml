Rang: 3661
Wort: infettare
Wortart: vt
Wort mit Artikel: infettare
Femininum / Plural: ''
IPA: ''
Definition: infizieren, anstecken
Register: ''
Beispielsätze: |-
  Il medico ha spiegato che un taglio non pulito può *infettare* la ferita.
  Der Arzt hat erklärt, dass eine nicht gereinigte Wunde sich *infizieren* kann.
  
  Sei preoccupato che il tuo gatto possa *infettare* gli altri animali in casa?
  Bist du besorgt, dass deine Katze die anderen Tiere im Haus *anstecken* könnte?
  
  Se non avessimo usato gli antibiotici, la ferita si sarebbe *infettata*, rendendo necessario l'intervento chirurgico.
  Hätten wir keine Antibiotika verwendet, hätte sich die Wunde *infiziert* und einen chirurgischen Eingriff nötig gemacht.
  
  Nonostante i rischi, molti continuano a praticare sesso non protetto senza preoccuparsi di *infettare* il partner.
  Trotz der Risiken haben viele weiterhin ungeschützten Geschlechtsverkehr, ohne sich Gedanken darüber zu machen, den Partner zu *infizieren*.
  
  Il governo ha avvertito che la mancanza di controlli potrebbe *infettare* anche regioni considerate finora sicure.
  Die Regierung hat gewarnt, dass mangelnde Kontrollen auch Regionen *anstecken* könnte, die bisher als sicher galten.
