Rang: 1351
Wort: trascinare
Wortart: vt
Wort mit Artikel: trascinare
Femininum / Plural: ''
IPA: ''
Definition: ziehen, schleppen
Register: ''
Beispielsätze: |-
  Non volevo *trascinare* questa scatola pesante da solo, ma non avevo scelta.
  Ich wollte diesen schweren Kasten nicht *allein ziehen*, aber ich hatte keine Wahl.
  
  L'ispettore ha *trascinato* il sospettato verso il furgone della polizia con forza.
  Der Inspektor hat den Verdächtigen *zur Polizeiwanne gezerrt*.
  
  Ha *trascinato* la conversazione su un argomento che non gli interessava affatto.
  Er hat das Gespräch auf ein Thema *gezogen*, das ihn überhaupt nicht interessierte.
  
  Malgrado la distanza, ho dovuto *trascinare* questo mobile per tutto il tragitto.
  Trotz der *Entfernung* musste ich dieses Möbelstück den ganzen Weg schleppen.
  
  Se avessi saputo che sarebbe stato così difficile, non avrei *trascinato* questa copia inutile per cento chilometri!
  Wenn ich gewusst hätte, dass es so schwer wird, hätte ich diese nutzlose *Abschrift* nicht über hundert Kilometer geschleppt!.
