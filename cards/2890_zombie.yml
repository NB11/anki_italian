Rang: 2890
Wort: zombie
Wortart: n.m
Wort mit Artikel: lo zombie
Femininum / Plural: zombie
IPA: ''
Definition: der Zombie, -s
Register: ''
Beispielsätze: |-
  Lo *zombie* si trascina lentamente verso l'ospedale abbandonato.
  Der *Zombie* schleicht sich langsam zum verlassenen Krankenhaus.
  
  Dicono che il regista abbia usato degli *zombie* veri nel suo film horror.
  Man sagt, der Regisseur habe echte *Zombies* in seinem Horrorfilm verwendet.
  
  Se avessi visto *zombie*, non sarei mai andato al cimitero di notte!
  Wenn ich *Zombies* gesehen hätte, wäre ich niemals nachts auf dem Friedhof gegangen!
  
  Lo scienziato vuole studiare il comportamento degli *zombie* nel loro habitat naturale.
  Der Wissenschaftler möchte das Verhalten der *Zombies* in ihrem natürlichen Lebensraum erforschen.
  
  Nonostante le leggende, gli *zombie* non esistono nella realtà.
  Trotz der Legenden gibt es *Zombies* in der Realität nicht.
