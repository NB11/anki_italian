Rang: 4381
Wort: compiacere
Wortart: v
Wort mit Artikel: compiacere
Femininum / Plural: ''
IPA: ''
Definition: gefallen, Freude bereiten
Register: ''
Beispielsätze: |-
  Mi *compiacerebbe* molto se venissi alla mia festa domani sera.
  Es würde mir sehr *gefallen*, wenn du zu meiner Party morgen Abend kommen würdest.
  
  Non so davvero perché tutto questo mi *compiaccia*: forse è solo ironia della sorte.
  Ich weiß wirklich nicht, warum mir das alles so *gefallen* sollte: vielleicht ist es einfach Ironie des Schicksals.
  
  Ti è *compiaciuto* quando hanno lodato il tuo lavoro in ufficio?
  Hat es dir *gefallen*, als sie deine Arbeit im Büro gelobt haben?
  
  Mi *compiacerebbe* sapere che hai trovato un buon impiego dopo la laurea.
  Es würde mir *Freude bereiten*, zu wissen, dass du nach dem Studium eine gute Beschäftigung gefunden hast.
  
  Sebbene non fosse perfetto, il piatto mi *compiacque* sufficientemente.
  Obwohl er nicht perfekt war, *gefiel* mir das Gericht ausreichend.
