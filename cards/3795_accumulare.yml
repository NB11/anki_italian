Rang: 3795
Wort: accumulare
Wortart: vt
Wort mit Artikel: accumulare
Femininum / Plural: ''
IPA: ''
Definition: anhäufen, *sammeln
Register: ''
Beispielsätze: |-
  Ho *accumulato* molti debiti negli ultimi anni per colpa delle spese superflue.
  Ich habe viele *Schulden* in den letzten Jahren wegen unnötiger Ausgaben angesammelt.
  
  Se non *accumuli* abbastanza prove, il tribunale non potrà condannarlo.
  Wenn du nicht genug *Beweise* sammelst, kann das Gericht ihn nicht verurteilen.
  
  Stiamo cercando un modo per *accumulare* energia solare in modo efficiente.
  Wir suchen nach einer Methode, um Sonnenenergie effizient zu *speichern*.
  
  Non *accumula* mai rancore, è sempre pronto a perdonare.
  Er *sammelt* nie Groll, er ist immer bereit zu verzeihen.
  
  Gli scienziati hanno *accumulato* dati per mesi prima di pubblicare i risultati.
  Die Wissenschaftler haben monatelang *Daten* gesammelt, bevor sie die Ergebnisse veröffentlichten.
