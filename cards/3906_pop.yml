Beispielsätze: |-
  Questa canzone *pop* è molto ascoltata dalle giovani generazioni.
  Dieses *populäre* Lied wird von den jungen Generationen viel gehört.
  
  Non mi piacciono i film troppo *pop*: preferisco quelli di nicchia.
  Ich mag Filme, die zu *mainstream* sind, nicht – ich mag Nischenfilme lieber.
  
  Dopo lo spettacolo, tutti parlavano del finale *pop* che aveva incantato il pubblico.
  Nach der Vorstellung sprachen alle über das *populäre* Finale, das das Publikum begeistert hatte.
  
  Anche se è un genere musicale *pop*, non lo trovo affatto interessante.
  Auch wenn es ein *populäres* Musikgenre ist, finde ich es überhaupt nicht interessant.
  
  Hanno scelto una location *pop* per la festa, con luci e musica che non passano inosservate.
  Sie haben für die Party einen *modernen* Ort gewählt, mit Lichtern und Musik, die nicht übersehen werden können.
