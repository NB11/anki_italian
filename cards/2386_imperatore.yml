Rang: 2386
Wort: imperatore
Wortart: n.m
Wort mit Artikel: l'imperatore
Femininum / Plural: imperatori
IPA: ''
Definition: der Kaiser, -
Register: ''
Beispielsätze: |-
  L'*imperatore* romano governò per molti anni un vastissimo impero.
  Der römische *Kaiser* regierte viele Jahre lang ein riesiges Reich.
  
  Se vuoi visitare la mostra sull’*imperatore* Augusto, prenota in anticipo.
  Wenn du die Ausstellung über Kaiser Augustus besuchen möchtest, buche bitte im Voraus.
  
  Gli storici discutono ancora se quell’*imperatore* sia stato un grande riformatore o solo un tiranno.
  Die Historiker streiten sich noch, ob dieser *Kaiser* ein großer Reformer oder nur ein Tyrann war.
  
  Nel film, l’*imperatore* appare come un personaggio crudele e spietato.
  In dem Film tritt der *Kaiser* als grausame und gnadenlose Figur auf.
  
  Gli ambasciatori dell’*imperatore* arrivarono a corte con un messaggio urgente.
  Die Botschafter des *Kaisers* trafen mit einer dringenden Nachricht am Hof ein.
