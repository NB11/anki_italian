Rang: 4949
Wort: graffiare
Wortart: v
Wort mit Artikel: graffiare
Femininum / Plural: ''
IPA: ''
Definition: kratzen, zerkratzen
Register: ''
Beispielsätze: |-
  Il gatto ha *graffiato* il divano nuovo ieri sera.
  Die Katze hat *das Sofa* gestern Abend zerkratzt.
  
  Non *graffiare* la porta, per favore, altrimenti dovrò farla riparare.
  Bitte *kratze* nicht die Tür, sonst muss ich sie reparieren lassen.
  
  Se il cane *graffia* troppo, usa uno spray repellente.
  Wenn der Hund zu stark *kratzt*, benutze ein Repellentspray.
  
  Lei ha detto che non vuole essere *graffiata* dai suoi gatti.
  Sie hat gesagt, dass sie nicht von ihren Katzen *gekratzt* werden möchte.
  
  Avrei preferito che lui non avesse *graffiato* il quadro durante la lite.
  Ich hätte lieber gehabt, wenn er nicht das Gemälde während des Streits zerkratzt hätte.
Audio: ''
Notiz: ''
