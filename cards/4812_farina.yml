Rang: 4812
Wort: farina
Wortart: n.f
Wort mit Artikel: la farina
Femininum / Plural: farine
IPA: ''
Definition: das Mehl, -e
Register: ''
Beispielsätze: |-
  Nella ricetta della torta serve solo *farina*, zucchero ed uova.
  In dem Kuchenrezept braucht man nur *Mehl*, Zucker und Eier.
  
  Ho comprato tre chili di *farina* integrale al negozio biologico.
  Ich habe drei Kilogramm *Vollkornmehl* im Bioladen gekauft.
  
  Se non aggiungi abbastanza *farina*, l'impasto sarà troppo liquido.
  Wenn man nicht genug *Mehl* hinzugibt, wird der Teig zu flüssig.
  
  La *farina* che hai usato ieri era scaduta da settimane!
  Das *Mehl*, das du gestern verwendet hast, war seit Wochen abgelaufen!
  
  Vorrei sapere se anche questa volta la *farina* proviene da coltivazioni sostenibili.
  Ich möchte wissen, ob auch dieses Mal das *Mehl* aus nachhaltigem Anbau stammt.
