Rang: 204
Wort: muovere
Wortart: vt
Wort mit Artikel: muovere
Femininum / Plural: ''
IPA: ''
Definition: bewegen, antreiben
Register: ''
Beispielsätze: |-
  Devo *muovere* questa scatola pesante, mi dai una mano?
  Ich muss diese schwere Box *bewegen*, gibst du mir eine Hand?
  
  Lui ha *muovuto* la macchina per parcheggiare meglio.
  Er hat das Auto *bewegt*, um besser zu parken.
  
  Se tu non *muovi* le gambe, non camminerai mai!
  Wenn du deine Beine nicht *bewegst*, wirst du nie laufen!
  
  Mia sorella vuole *muovere* il divano per pulire sotto.
  Meine Schwester möchte die Couch *bewegen*, um darunter zu putzen.
  
  Noi non *muoviamo* quasi mai i mobili in soggiorno.
  Wir *bewegen* die Möbel im Wohnzimmer fast nie.
