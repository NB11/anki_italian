Rang: 1748
Wort: sorveglianza
Wortart: n.f
Wort mit Artikel: la sorveglianza
Femininum / Plural: sorveglianze
IPA: ''
Definition: die Überwachung, die Beobachtung
Register: ''
Beispielsätze: |-
  La polizia ha aumentato la *sorveglianza* intorno alla banca dopo la rapina.
  Die Polizei hat die *Überwachung* um die Bank nach dem Überfall erhöht.
  
  Non mi piace avere una *sorveglianza* costante su di me, sembra di vivere in una prigione.
  Ich mag es nicht, eine ständige *Beobachtung* zu haben, es fühlt sich an, als würde ich in einem Gefängnis leben.
  
  Hanno installato telecamere per la *sorveglianza* del parcheggio, ma funzionano male.
  Sie haben Kameras für die *Überwachung* des Parkplatzes installiert, aber sie funktionieren schlecht.
  
  La *sorveglianza* notturna dell'ospedale è affidata a due guardie armate.
  Die nächtliche *Überwachung* des Krankenhauses wird von zwei bewaffneten Wachen übernommen.
  
  Con la *sorveglianza* digitale di oggi, ogni nostro movimento può essere tracciato.
  Mit der digitalen *Überwachung* von heute kann jede unserer Bewegungen zurückverfolgt werden.
