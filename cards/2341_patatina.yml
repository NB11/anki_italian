Beispielsätze: |-
  A volte mangio *patatine* guardando un film alla televisione.
  Manchmal esse ich *Chips*, während ich einen Film im Fernsehen schaue.
  
  Nonostante la dieta, non riesce a resistere alle *patatine* fritte.
  Trotz der Diät kann er dem *Pommes* nicht widerstehen.
  
  Mi hai fatto un regalo con una busta di *patatine* al gusto paprika?
  Hast du mir etwa ein Geschenk mit einem Beutel *Chips* im Paprika-Geschmack gemacht?
  
  Le *patatine* che hai comprato ieri sono già finite!
  Die *Chips*, die du gestern gekauft hast, sind schon alle!
  
  Se avessi saputo che preferivi le *patatine* al prosciutto, ti avrei portato queste.
  Hätte ich gewusst, dass du *Chips* mit Schinken bevorzugst, hätte ich dir diese mitgebracht.
