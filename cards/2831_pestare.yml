Rang: 2831
Wort: pestare
Wortart: vt
Wort mit Artikel: pestare
Femininum / Plural: ''
IPA: ''
Definition: zerdrücken, stampfen, schlagen
Register: ''
Beispielsätze: |-
  Ho visto il cuoco *pestare* l'aglio nel mortaio per la salsa.
  Ich habe gesehen, wie der Koch den Knoblauch im Mörser *zerdrückt* hat.
  
  Se continui a *pestare* i tasti del computer, si romperanno!
  Wenn du weiter die *Tasten* zerdrückst, gehen sie kaputt!
  
  Gli studenti hanno *pestato* le uve per fare il vino, come nella tradizione locale.
  Die Schüler haben die Trauben *gestampft*, um Wein zu machen, wie es in der Tradition üblich ist.
  
  Non *pestare* quelle uova sode, altrimenti si romperanno!
  Drück die hartgekochten Eier nicht *zer*, sonst gehen sie kaputt!
  
  Il nonno insegnava ai nipoti come *pestare* il peperoncino per i piatti tipici.
  Der Großvater lehrte seine Enkel, wie man Chili für typische Gerichte *zerdrückt*.
