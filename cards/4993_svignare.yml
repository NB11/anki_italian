Rang: 4993
Wort: svignare
Wortart: vi
Wort mit Artikel: svignare
Femininum / Plural: ''
IPA: ''
Definition: sich davonstehlen, abhauen
Register: ''
Beispielsätze: |-
  Non appena il professore si è girato, ho *svignato* dalla classe per andare in bagno.
  Sobald sich der Professor umgedreht hat, bin ich aus dem Klassenzimmer *weggeschlichen*.
  
  Secondo me, dovremmo *svignarcela* prima che arrivi la polizia, altrimenti è guai seri.
  Ich glaube, wir sollten uns *davonschleichen*, bevor die Polizei kommt, sonst gibt’s Ärger.
  
  Se avessimo *svignato* dalla festa prima, non avremmo incontrato quell’uomo tanto antipatico.
  Wenn wir uns von der Party *weggestohlen* hätten, hätten wir diesen unsympathischen Mann nicht getroffen.
  
  Appena il film è finito, tutti volevano *svignarsela* per evitare la folla che si era formata all’uscita.
  Kaum war der Film zu Ende, wollten sich alle *davonstehlen*, um das Gedränge am Ausgang zu vermeiden.
  
  Era così stanco che, dopo aver cenato, ha provato a *svignarsene* in camera senza farsi notare.
  Er war so müde, dass er nach dem Abendessen versuchte, sich leise ins Schlafzimmer *wegzuschleichen*.
