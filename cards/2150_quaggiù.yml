  Man sagt, dass es *hier unten* unter der Brücke einen geheimen Durchgang gibt, aber ich glaube das nicht.
  
  Mi avevano avvertito che *quaggiù* la corrente è molto forte, ma non ho dato retta al consiglio.
  Ich wurde gewarnt, dass die Strömung *hier unten* sehr stark ist, aber ich habe auf den Rat nicht gehört.
