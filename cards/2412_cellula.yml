Rang: 2412
Wort: cellula
Wortart: n.f
Wort mit Artikel: la cellula
Femininum / Plural: cellule
IPA: ''
Definition: die Zelle, -n
Register: ''
Beispielsätze: |-
  La *cellula* è l’unità fondamentale di tutti gli organismi viventi.
  Die *Zelle* ist die grundlegende Einheit aller lebenden Organismen.
  
  Hanno analizzato ogni *cellula* del tessuto tumorale per trovare una cura.
  Sie haben jede *Zelle* des Tumorgewebes analysiert, um eine Heilung zu finden.
  
  Se la *cellula* non riceve ossigeno, muore dopo pochi minuti.
  Wenn die *Zelle* keinen Sauerstoff erhält, stirbt sie nach wenigen Minuten.
  
  La scienziata studia come la *cellula* si divide durante la mitosi.
  Die Wissenschaftlerin untersucht, wie sich die *Zelle* während der Mitose teilt.
  
  Nonostante tutti gli studi, ancora non si conosce ogni funzione della *cellula* staminale.
  Trotz aller Studien kennt man noch nicht jede Funktion der Stamm-*Zelle*.
