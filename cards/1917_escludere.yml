Rang: 1917
Wort: escludere
Wortart: vt
Wort mit Artikel: escludere
Femininum / Plural: ''
IPA: ''
Definition: ausschließen, ausschließen, nicht einbeziehen
Register: ''
Beispielsätze: |-
  Il medico vuole *escludere* ogni altra possibilità prima di diagnosticare la malattia.
  Der Arzt möchte jede andere *Möglichkeit* ausschließen, bevor er die Krankheit diagnostiziert.
  
  Non possiamo *escludere* che ci siano stati degli errori nel calcolo.
  Wir können nicht *ausschließen*, dass es Fehler in der Berechnung gegeben hat.
  
  Se hai bevuto troppo, *escludiamo* che tu possa guidare stasera.
  Wenn du zu viel getrunken hast, *schließen wir aus*, dass du heute Abend fahren kannst.
  
  L'allenatore ha deciso di *escludere* il giocatore dalla squadra per indisciplina.
  Der Trainer hat beschlossen, den Spieler wegen undisziplinierten Verhaltens aus der Mannschaft *auszuschließen*.
  
  Nel tuo caso, dobbiamo *escludere* qualsiasi ipotesi di frode.
  In deinem Fall müssen wir jede Hypothese eines Betrugs *ausschließen*.
