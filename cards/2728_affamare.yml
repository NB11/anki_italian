Rang: 2728
Wort: affamare
Wortart: vt
Wort mit Artikel: affamare
Femininum / Plural: ''
IPA: ''
Definition: verhungern lassen, ausgehungert machen
Register: ''
Beispielsätze: |-
  Se non mangi per giorni, ti *affamerai* completamente.
  Wenn du Tage lang nichts isst, wirst du dich *zu Tode hungern*.
  
  La guerra *affama* milioni di persone ogni anno.
  Der Krieg *lässt* Millionen Menschen verhungern.
  
  Ho paura che il caldo *affami* le piante nel giardino.
  Ich habe Angst, dass die Hitze die Pflanzen im Garten *aushungern* lässt.
  
  È crudele *affamare* un animale per punizione.
  Es ist grausam, ein Tier *aushungern* zu lassen als Strafe.
  
  Dicono che la solitudine *affami* l’anima più del corpo.
  Man sagt, dass die Einsamkeit die Seele *aushungert* mehr als den Körper.
