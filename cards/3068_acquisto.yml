Rang: 3068
Wort: acquisto
Wortart: n.m
Wort mit Artikel: l'acquisto
Femininum / Plural: gli acquisti
IPA: ''
Definition: der Kauf, -äufe
Register: ''
Beispielsätze: |-
  Il *acquisto* di una casa è un passo importante nella vita.
  Der *Kauf* eines Hauses ist ein wichtiger Schritt im Leben.
  
  Dopo *acquisti* affrettati, ha speso tutti i suoi euro.
  Nach *Käufen* im Affekt hat sie ihr ganzes Geld ausgegeben.
  
  Hanno fatto un *acquisto* collettivo per risparmiare sui volumi.
  Sie haben einen *Kauf* im Kollektiv getätigt, um bei Büchern zu sparen.
  
  Se facesse un *acquisto* impulsivo, lo biasimerebbero.
  Wenn er einen impulsiven *Kauf* tätigte, würden sie ihn tadeln.
  
  L'*acquisto* di quel chip ha risolto molti problemi tecnici.
  Der *Kauf* jenes Chips hat viele technische Probleme gelöst.
