Rang: 450
Wort: ringraziare
Wortart: vt
Wort mit Artikel: ringraziare
Femininum / Plural: ''
IPA: ''
Definition: danken, sich bedanken, sich erkenntlich zeigen
Register: ''
Beispielsätze: |-
  Ti *ringrazio* moltissimo per il tuo aiuto.
  Ich *danke* dir sehr für deine Hilfe.
  
  Purtroppo non ho ancora potuto *ringraziare* la professoressa per la sua pazienza.
  Leider konnte ich die Lehrerin noch nicht für ihre Geduld *danken*.
  
  *Ringrazierei* volentieri tutti gli ospiti, ma purtroppo il tempo è poco.
  Ich *würde* alle Gäste gerne *danken*, aber leider ist die Zeit knapp.
  
  Non ti *ringrazio* per questa brutta notizia!
  Ich *danke* dir nicht für diese schlechte Nachricht!
  
  Vorrei che tu *ringraziassi* anche i tuoi genitori per il regalo.
  Ich möchte, dass du auch deinen Eltern für das Geschenk *dankst*.
