Rang: 1746
Wort: petto
Wortart: n.m
Wort mit Artikel: il petto
Femininum / Plural: petti
IPA: ''
Definition: die Brust, -¨e
Register: ''
Beispielsätze: |-
  Ho sentito un dolore al *petto* mentre facevo sport.
  Ich habe einen *Schmerz* in der Brust gespürt, während ich Sport machte.
  
  Mi batte forte il *petto* ogni volta che vedo quella attrice.
  Mir schlägt jedes Mal das *Herz* in der Brust, wenn ich diese Schauspielerin sehe.
  
  Il dottore mi ha detto di controllare spesso il mio *petto* per eventuali noduli.
  Der Arzt hat mir gesagt, ich solle meine *Brust* oft auf mögliche Knoten hin überprüfen.
  
  Con un respiro profondo, ho gonfiato il *petto* di orgoglio.
  Mit einem tiefen Atemzug habe ich meine *Brust* vor Stolz aufgebläht.
  
  Nonostante la paura, mantenne il *petto* fermo e continuò a camminare.
  Trotz der Angst blieb sein *Herz* standhaft, und er ging weiter.
