Rang: 1412
Wort: giacca
Wortart: n.f
Wort mit Artikel: la giacca
Femininum / Plural: giacche
IPA: ''
Definition: die Jacke, -n
Register: ''
Beispielsätze: |-
  La *giacca* che hai indossato ieri era molto elegante.
  Die *Jacke*, die du gestern getragen hast, war sehr elegant.
  
  Non dimenticare di mettere la *giacca* perché fuori fa freddo!
  Vergiss nicht, die *Jacke* anzuziehen, denn draußen ist es kalt!
  
  Ho comprato una *giacca* nuova che mi piace moltissimo, ma è costata il doppio!
  Ich habe eine neue *Jacke* gekauft, die mir sehr gefällt, aber sie hat das Doppelte gekostet!
  
  Se non vuoi prendere freddo, ti consiglio di infilare la *giacca* prima di uscire.
  Wenn du keine Erkältung riskieren willst, rate ich dir, die *Jacke* anzuziehen, bevor du rausgehst.
  
  La *giacca* che ho visto nella vetrina era bellissima, ma troppo cara per il mio budget.
  Die *Jacke*, die ich im Schaufenster gesehen habe, war wunderschön, aber für mein Budget zu teuer.
