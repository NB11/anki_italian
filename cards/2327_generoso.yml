Rang: 2327
Wort: generoso
Wortart: adj
Wort mit Artikel: generoso
Femininum / Plural: ''
IPA: ''
Definition: großzügig, freigiebig
Register: ''
Beispielsätze: |-
  Mio zio è sempre stato un uomo *generoso*, aiuta tutti senza chiedere nulla in cambio.
  Mein Onkel war immer ein *großzügiger* Mensch, der allen hilft, ohne etwas dafür zu verlangen.
  
  Se fossi *generosa* come te, regalerei a tutti una vacanza al mare!
  Wenn ich so *großzügig* wäre wie du, würde ich allen einen Urlaub am Meer schenken!
  
  Anche se il ristorante era caro, il servizio è stato *generoso* con le porzioni.
  Obwohl das Restaurant teuer war, war die Bedienung *großzügig* mit den Portionen.
  
  La sua donazione è stata così *generosa* che ha permesso di costruire una scuola nel villaggio.
  Seine Spende war so *großzügig*, dass damit eine Schule im Dorf gebaut werden konnte.
  
  Mi sorprende che tu l’abbia definito *generoso*, dato che non ha mai condiviso nulla con nessuno.
  Es überrascht mich, dass du ihn *großzügig* nennst, wo er doch noch nie etwas mit irgendwem geteilt hat.
