Rang: 580
Wort: zio
Wortart: n.m
Wort mit Artikel: lo zio
Femininum / Plural: zii
IPA: ''
Definition: der Onkel, -
Register: ''
Beispielsätze: |-
  Mio *zio* è un professore che insegna storia all’università.
  Mein *Onkel* ist ein Professor, der Geschichte an der Universität lehrt.
  
  Lo zio di Marco ha *ripreso* la sua vecchia attività dopo anni di pausa.
  Markos *Onkel* hat seine alte Tätigkeit nach Jahren Pause wieder aufgenommen.
  
  Nonostante il guaio, lo *zio* ha riso e ha detto che sarebbe tutto risolto finalmente.
  Trotz des *Problems* hat der Onkel gelacht und gesagt, es würde alles endlich gelöst.
  
  Se tu avvicinassi il cavallo, il *zio* si spaventerebbe e comincerebbe a gridare.
  Wenn du das *Pferd* annähern würdest, würde sich der Onkel erschrecken und anfangen zu schreien.
  
  Il programma prevede che lo *zio* porti tutti i nipoti a visitare il centro storico della città.
  Der Plan sieht vor, dass der *Onkel* alle Neffen in die Altstadt der Stadt mitnimmt.
