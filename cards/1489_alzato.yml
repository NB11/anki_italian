Rang: 1489
Wort: alzato
Wortart: n.m
Wort mit Artikel: l'alzato
Femininum / Plural: alzati
IPA: ''
Definition: der *Aufstand*, *Aufheben*, -
Register: ''
Beispielsätze: |-
  L'*alzato* dei prezzi ha causato grande preoccupazione tra i cittadini.
  Die *Erhöhung* der Preise hat große Besorgnis unter den Bürgern ausgelöst.
  
  Non sopportava più l'*alzato* del tono di voce del suo capo.
  Er ertrug das *Anheben* der Stimme seines Chefs nicht mehr.
  
  Dopo l'*alzato* della bandiera, tutti si sono fermati in segno di rispetto.
  Nach dem *Hissen* der Flagge blieben alle aus Respekt stehen.
  
  L'*alzato* dei salari è stato uno dei temi centrali del dibattito sindacale.
  Die *Erhöhung* der Löhne war eines der zentralen Themen der Gewerkschaftsdebatte.
  
  Il poliziotto notò subito l'*alzato* sospetto della voce del testimone durante l'interrogatorio.
  Der Polizist bemerkte sofort das verdächtige *Ansteigen* der Stimme des Zeugen während der Vernehmung.
