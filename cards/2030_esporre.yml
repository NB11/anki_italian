Rang: 2030
Wort: esporre
Wortart: vt
Wort mit Artikel: esporre
Femininum / Plural: ''
IPA: ''
Definition: ausstellen, darlegen, vortragen, präsentieren
Register: ''
Beispielsätze: |-
  Il museo vuole *esporre* una collezione di quadri moderni la prossima settimana.
  Das Museum möchte *ausstellen* eine moderne Gemälde-Sammlung nächste Woche.
  
  Non *espongo* mai i miei problemi personali al lavoro, è troppo rischioso.
  Ich *lege* niemals meine persönlichen Probleme im Job dar, es ist zu riskant.
  
  Se *esponessi* la tua idea con più convinzione, forse la commissione la prenderebbe sul serio.
  Wenn du deine Idee mit mehr Überzeugungskraft *vorbringen* würdest, vielleicht nähme die Kommission sie ernst.
  
  Gli scienziati stanno cercando di *esporre* le loro scoperte in modo chiaro e accessibile al pubblico.
  Die Wissenschaftler versuchen gerade, ihre Entdeckungen dem Publikum *verständlich darzulegen*.
  
  L’artista ha deciso di *esporre* solo i suoi dipinti meno conosciuti in questa mostra.
  Der Künstler hat beschlossen, in dieser Ausstellung nur seine weniger bekannten Gemälde *auszustellen*.
