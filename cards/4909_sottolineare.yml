Wortart: vt
Wort mit Artikel: sottolineare
Femininum / Plural: ''
IPA: ''
Definition: unterstreichen, betonen
Register: ''
Beispielsätze: |-
  Puoi *sottolineare* la parte importante del testo per me?
  Kannst du den wichtigen Teil des Textes für mich *unterstreichen*?
  
  Il professore ha *sottolineato* che la puntualità è fondamentale.
  Der Lehrer hat *betont*, dass Pünktlichkeit grundlegend ist.
  
  Se non *sottolinei* i tuoi errori, non imparerai mai!
  Wenn du deine Fehler nicht *unterstreichst*, wirst du es nie lernen!
  
  Avrei *sottolineato* la necessità di più tempo per il progetto.
  Ich hätte die Notwendigkeit von mehr Zeit für das Projekt *betont*.
  
  Anche se già *sottolineato*, ripeto: la sincerità è la chiave.
  Auch wenn es schon *betont* wurde, wiederhole ich: Aufrichtigkeit ist der Schlüssel.
