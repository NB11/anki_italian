Rang: 4960
Wort: comprensivo
Wortart: adj
Wort mit Artikel: comprensivo
Femininum / Plural: ''
IPA: ''
Definition: verständnisvoll, einfühlsam
Register: ''
Beispielsätze: |-
  Il professore era molto *comprensivo* con gli studenti che avevano difficoltà.
  Der Lehrer war sehr *verständnisvoll* gegenüber den Schülern, die Schwierigkeiten hatten.
  
  Nonostante il caos, suo marito rimase *comprensivo* e la aiutò a calmarsi.
  Trotz des Chaos blieb ihr Ehemann *verständnisvoll* und half ihr, sich zu beruhigen.
  
  Mi aspetto che i miei genitori siano *comprensivi* quando spiego loro i miei progetti.
  Ich erwarte, dass meine Eltern *verständnisvoll* sind, wenn ich ihnen meine Pläne erkläre.
  
  Se fossi stato *comprensivo* prima, non avresti litigato con lei.
  Wärst du früher *verständnisvoll* gewesen, hättest du dich nicht mit ihr gestritten.
  
  Avrei voluto un compagno di stanza più *comprensivo*, ma lui era sempre indifferente.
  Ich hätte mir einen verständnisvolleren Mitbewohner gewünscht, aber er war immer gleichgültig.
