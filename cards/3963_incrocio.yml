Rang: 3963
Wort: incrocio
Wortart: n.m
Wort mit Artikel: l'incrocio
Femininum / Plural: incroci
IPA: ''
Definition: die Kreuzung, -en
Register: ''
Beispielsätze: |-
  Devi girare a destra all’***incrocio*** con la strada principale.
  Du musst an der *Kreuzung* mit der Hauptstraße rechts abbiegen.
  
  Al ***incrocio*** c’è sempre tanto traffico, soprattutto la mattina.
  An der *Kreuzung* gibt es immer viel Verkehr, besonders morgens.
  
  Se non segui le indicazioni al ***incrocio***, finirai in una zona residenziale.
  Wenn du die Hinweise an der *Kreuzung* nicht befolgst, landest du in einem Wohngebiet.
  
  Hanno bloccato il ***incrocio*** per un controllo della polizia stradale.
  Sie haben die *Kreuzung* für eine Straßenverkehrskontrolle gesperrt.
  
  Non attraversare il ***incrocio*** quando il semaforo è rosso, mi raccomando!
  Überquere die *Kreuzung* nicht bei Rot, hörst du?
