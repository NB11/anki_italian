Rang: 723
Wort: licenziare
Wortart: vt
Wort mit Artikel: licenziare
Femininum / Plural: ''
IPA: ''
Definition: entlassen, kündigen
Register: ''
Beispielsätze: |-
  L'azienda ha deciso di *licenziare* tre dipendenti a causa della crisi economica.
  Das Unternehmen hat beschlossen, drei Mitarbeiter *zu entlassen*.
  
  Se non migliorate le vostre prestazioni, dovremo *licenziare* qualcuno.
  Wenn ihr eure Leistungen nicht verbessert, müssen wir jemanden *kündigen*.
  
  Dopo anni di lavoro, il direttore ha avuto il coraggio di *licenziare* il suo amico più fidato.
  Nach Jahren der Zusammenarbeit hat der Chef den Mut gehabt, seinen engsten Freund *zu entlassen*.
  
  Non capisco perché abbiano *licenziato* Marco: era sempre puntuale e competente.
  Ich verstehe nicht, warum sie Marco *gekündigt* haben: Er war immer pünktlich und kompetent.
  
  Se *licenziassi* tutti quelli che non mi piacciono, la mia azienda resterebbe vuota!
  Wenn ich alle entließe *die* mir nicht gefallen, wäre meine Firma leer!
