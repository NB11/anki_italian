Rang: 4083
Wort: profeta
Wortart: n.m
Wort mit Artikel: il profeta
Femininum / Plural: profeti
IPA: ''
Definition: der Prophet, -en
Register: ''
Beispielsätze: |-
  Molti *profeti* dell'Antico Testamento predissero la venuta del Messia.
  Viele *Propheten* des Alten Testaments sagten die Ankunft des Messias voraus.
  
  Se fossi un *profeta*, saprei come evitare questa catastrofe.
  Wenn ich ein *Prophet* wäre, würde ich wissen, wie man diese Katastrophe verhindert.
  
  Il *profeta* che incontrò sul monte era noto per i suoi miracoli.
  Der *Prophet*, den er auf dem Berg traf, war für seine Wunder bekannt.
  
  Dicono che il *profeta* avesse previsto anche la tua nascita, ma non ci credo!
  Man sagt, der *Prophet* habe sogar deine Geburt vorausgesagt, aber das glaube ich nicht!
  
  Fare il *profeta* non è mai facile, soprattutto quando nessuno ascolta.
  Ein *Prophet* zu sein ist nie einfach, besonders wenn niemand zuhört.
