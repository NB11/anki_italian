IPA: ''
Definition: das Narkotikum, Narkotika
Register: ''
Beispielsätze: |-
  Il medico ha prescritto *narcotico* per alleviare il dolore del paziente.
  Der Arzt hat das *Narkotikum* verschrieben, um die Schmerzen des Patienten zu lindern.
  
  Nonostante l’uso di *narcotico*, il paziente è ancora cosciente.
  Trotz der Anwendung des *Narkotikums* ist der Patient noch bei Bewusstsein.
  
  Se avessi bisogno di un *narcotico*, preferirei quelli a breve durata d’azione.
  Falls ich ein *Narkotikum* bräuchte, würde ich eines mit kurzer Wirkdauer wählen.
  
  Il professor Rossi sta studiando gli effetti dei *narcotici* sul cervello umano.
  Professor Rossi untersucht die Auswirkungen der *Narkotika* auf das menschliche Gehirn.
  
  Anche se il *narcotico* è illegale, molti lo utilizzano per sfuggire alla realtà.
  Obwohl das *Narkotikum* illegal ist, verwenden es viele, um der Realität zu entfliehen.
