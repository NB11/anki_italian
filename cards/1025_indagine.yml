Rang: 1025
Wort: indagine
Wortart: n.f
Wort mit Artikel: l'indagine
Femininum / Plural: indagini
IPA: ''
Definition: die Untersuchung, pl -en
Register: ''
Beispielsätze: |-
  L'*indagine* sulla malattia è ancora in corso.
  Die *Untersuchung* über die Krankheit läuft noch.
  
  Vuoi capturare il vero colpevole? Allora inizia una *indagine* accurata.
  Möchtest du den wahren Schuldigen *fangen*? Dann beginne eine genaue Untersuchung.
  
  Dopo che il testimone ha riferito i dettagli del delitto, è partita un'*indagine* ufficiale.
  Nachdem der *Zeuge* die Einzelheiten des Verbrechens berichtet hatte, wurde eine offizielle Untersuchung eingeleitet.
  
  Se non sappiamo ancora nulla, dobbiamo impedire che la *indagine* venga disturbata.
  Wenn wir noch nichts wissen, müssen wir verhindern, dass die *Untersuchung* gestört wird.
  
  L'*indagine* condotta dalla polizia ha permesso di catturare un boss della mafia.
  Die von der Polizei durchgeführte *Untersuchung* ermöglichte es, einen Boss der Mafia zu verhaften.
