Rang: 3509
Wort: ereditare
Wortart: v
Wort mit Artikel: ereditare
Femininum / Plural: ''
IPA: ''
Definition: erben, vererbt werden
Register: ''
Beispielsätze: |-
  Se non avessi *ereditato* questa villa dal nonno, non potrei permettermi una vita così lussuosa.
  Wenn ich dieses Haus nicht von meinem Opa *geerbt hätte*, könnte ich mir so ein luxuriöses Leben nicht leisten.
  
  Luigi ha deciso di *ereditare* l’impresa di famiglia piuttosto che venderla a un concorrente.
  Luigi hat beschlossen, den Familienbetrieb zu *erben*, statt ihn an einen Konkurrenten zu verkaufen.
  
  Nonostante il paraggio non fosse sicuro, volle *ereditare* la responsabilità di proteggere il villaggio.
  Obwohl die Umgebung nicht sicher war, wollte er die Verantwortung, das Dorf zu *erben* und zu schützen.
  
  Avrei voluto *ereditare* la sua stessa saggezza, ma purtroppo la vita non funziona così.
  Ich hätte seine gleiche *Weisheit* erben wollen, aber leider funktioniert das Leben so nicht.
  
  Dopo che il padre morì, toccò a lei *ereditare* non solo i debiti, ma anche la sua determinazione.
  Nachdem der Vater starb, fiel es ihr zu, nicht nur die Schulden, sondern auch seinen *ererbten* Willen zu erben.
