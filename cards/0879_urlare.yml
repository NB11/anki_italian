Rang: 879
Wort: urlare
Wortart: vi
Wort mit Artikel: urlare
Femininum / Plural: ''
IPA: ''
Definition: schreien, brüllen
Register: ''
Beispielsätze: |-
  Quando ho sentito la notizia, ho iniziato a *urlare* di gioia.
  Als ich die Nachricht hörte, begann ich vor Freude zu *schreien*.
  
  Il colonnello gli ordinò di *urlare* un comando, ma lui si rifiutò di farlo.
  Der Oberst befahl ihm, einen *Befehl* zu schreien, doch er weigerte sich.
  
  Mentre cucinavo, il cane ha iniziato a *urlare* improvvisamente vicino alla porta.
  Während ich kochte, begann der Hund plötzlich an der Tür zu *brüllen*.
  
  Se il bambino continuerà a *urlare* così, chiamerò la polizia.
  Wenn das Kind so weiter *schreit*, rufe ich die Polizei.
  
  Mi sono accorto che qualcuno stava *urlare* in lontananza, ma non ho capito le parole.
  Mir fiel auf, dass jemand in der Ferne *schrie*, aber ich verstand die Worte nicht.
