Rang: 3685
Wort: hockey
Wortart: n.m
Wort mit Artikel: lo hockey
Femininum / Plural: ''
IPA: ''
Definition: der Hockey, kein Plural
Register: ''
Beispielsätze: |-
  Negli ultimi anni, la popolarità dello *hockey* è aumentata in Europa.
  In den letzten Jahren ist die Beliebtheit von *Hockey* in Europa gestiegen.
  
  Vor lauter entusiasmo, hanno dimenticato che lo *hockey* si gioca su ghiaccio!
  Vor lauter Begeisterung haben sie vergessen, dass *Hockey* auf Eis gespielt wird!
  
  Non mi stupisce che tu abbia scelto lo *hockey*: è uno sport molto tattico.
  Es überrascht mich nicht, dass du *Hockey* gewählt hast: Es ist ein sehr taktischer Sport.
  
  Se vuoi imparare lo *hockey*, ti consiglio di iscriverti a un corso specialistico.
  Wenn du *Hockey* lernen willst, rate ich dir, dich für einen Spezialisten-Kurs anzumelden.
  
  Lo *hockey* su prato è meno diffuso dello hockey su ghiaccio, ma altrettanto spettacolare.
  *Hockey* auf Rasen ist weniger verbreitet als Hockey auf Eis, aber genauso spektakulär.
