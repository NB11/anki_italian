Rang: 4346
Wort: aspirare
Wortart: v
Wort mit Artikel: aspirare
Femininum / Plural: ''
IPA: ''
Definition: aspirieren, anstreben
Register: ''
Beispielsätze: |-
  Da bambino *aspirava* a diventare un architetto famoso.
  Als Kind *strebte* er danach, ein berühmter Architekt zu werden.
  
  Non *aspirare* a troppo denaro, ma a una vita pacifica e motivante.
  Du solltest nicht nach zu viel Geld *streben*, sondern nach einem friedlichen und motivierenden Leben.
  
  Ha *aspirato* a quel posto per mesi, ma alla fine non ce l’ha fatta.
  Er *strebte* monatelang nach dieser Stelle, aber am Ende hat er es nicht geschafft.
  
  Se *aspirerai* alla perfezione, perderai la gioia della creatività.
  Wenn du nach *Vollkommenheit* strebst, verlierst du die Freude an der Kreativität.
  
  Tutti *aspiravano* a sentirlo parlare, ma lui rimase in silenzio.
  Alle *strebten* danach, ihn sprechen zu hören, doch er blieb still.
