Rang: 3120
Wort: disordine
Wortart: n.m
Wort mit Artikel: il disordine
Femininum / Plural: i disordini
IPA: ''
Definition: die Unordnung, das Chaos
Register: ''
Beispielsätze: |-
  In camera tua c'è *disordine* ovunque, sembri un turbine di vestiti!
  In deinem Zimmer herrscht *Chaos* überall, du bist wie ein Tornado voller Kleidung!
  
  Senza una stanza ordinata non riesco a studiare, perché il *disordine* mi distrae troppo.
  Ohne ein aufgeräumtes Zimmer kann ich nicht lernen, weil mich das *Chaos* zu sehr ablenkt.
  
  Ho trovato il *disordine* che hai lasciato in cucina dopo la festa di ieri.
  Ich habe das *Durcheinander* entdeckt, das du gestern nach der Party in der Küche hinterlassen hast.
  
  Se non sistemi questo *disordine* immediatamente, non potrai ricevere nessuno a casa.
  Wenn du dieses *Chaos* nicht sofort in Ordnung bringst, kannst du niemanden zu Hause empfangen.
  
  Credo che tuo fratello abbia provocato *disordine* nella sua stanza per nascondere il vero problema.
  Ich glaube, dein Bruder hat in seinem Zimmer *Unordnung* verursacht, um das eigentliche Problem zu vertuschen.
