Rang: 2022
Wort: cavo
Wortart: n.m
Wort mit Artikel: il cavo
Femininum / Plural: cavi
IPA: ''
Definition: das Kabel, -
Register: ''
Beispielsätze: |-
  Ho bisogno di un *cavo* lungo per collegare il computer alla stampante.
  Ich brauche ein langes *Kabel*, um den Computer mit dem Drucker zu verbinden.
  
  Non funzionava perché il *cavo* di alimentazione era staccato.
  Es funktionierte nicht, weil das *Strom*kabel nicht eingesteckt war.
  
  Se tagli il *cavo*, perderai la connessione a Internet.
  Wenn du das *Kabel* durchschneidest, verlierst du die Internetverbindung.
  
  Mi hanno regalato un *cavo* di ricarica per il telefono, ma non funziona.
  Man hat mir ein *Ladekabel* für das Handy geschenkt, aber es funktioniert nicht.
  
  Prima di spostare il televisore, ricordati di staccare tutti i *cavi*.
  Bevor du den Fernseher umstellst, vergiss nicht, alle *Kabel* abzuziehen.
