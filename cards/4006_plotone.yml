Rang: 4006
Wort: plotone
Wortart: n.m
Wort mit Artikel: il plotone
Femininum / Plural: plotoni
IPA: ''
Definition: die Kompanie, -n
Register: ''
Beispielsätze: |-
  Il *plotone* marciò per ore sotto la pioggia battente.
  Die *Kompanie* marschierte stundenlang im strömenden Regen.
  
  Nonostante il pericolo, il *plotone* avanzò senza esitazioni.
  Trotz der Gefahr rückte die *Kompanie* ohne Zögern vor.
  
  Il comandante ordinò al *plotone* di fermarsi alle prime luci dell'alba.
  Der Kommandant befahl der *Kompanie*, bei Tagesanbruch anzuhalten.
  
  Se il *plotone* non fosse arrivato in tempo, la situazione sarebbe cambiata drasticamente.
  Wäre die *Kompanie* nicht rechtzeitig eingetroffen, hätte sich die Lage drastisch verändert.
  
  Chi aveva visto l'intero *plotone* fuggire in disordine rimase sconcertato.
  Wer die gesamte *Kompanie* in wilder Flucht gesehen hatte, war völlig fassungslos.
