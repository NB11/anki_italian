Rang: 3862
Wort: affascinare
Wortart: vt
Wort mit Artikel: affascinare
Femininum / Plural: ''
IPA: ''
Definition: faszinieren
Register: ''
Beispielsätze: |-
  Questo racconto *affascina* molto i bambini perché parla di un mondo magico.
  Diese Geschichte *fasziniert* die Kinder sehr, weil sie von einer magischen Welt handelt.
  
  Mi sono chiesto se veramente lo spettacolo ti *affascina* così tanto.
  Ich habe mich gefragt, ob dich die Show wirklich so sehr *fasziniert*.
  
  Nonostante i difetti, la città *affascina* tutti con la sua storia millenaria.
  Trotz ihrer Fehler *fasziniert* die Stadt alle mit ihrer jahrtausendelangen Geschichte.
  
  Se la cultura giapponese ti *affascina*, dovresti visitarla prima possibile.
  Wenn dich die japanische Kultur *fasziniert*, solltest du sie so schnell wie möglich besuchen.
  
  Era talmente *affascinato* dalla scienza che decise di diventare ricercatore.
  Er war so sehr von der Wissenschaft *fasziniert*, dass er beschloss, Forscher zu werden.
