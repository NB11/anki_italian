Rang: 4600
Wort: sella
Wortart: n.f
Wort mit Artikel: la sella
Femininum / Plural: selle
IPA: ''
Definition: der Sattel, -
Register: ''
Beispielsätze: |-
  La *sella* del cavallo è stata sostituita perché troppo vecchia.
  Der *Sattel* des Pferdes wurde ersetzt, weil er zu alt war.
  
  Dopo la passeggiata, il contadino controllò se la *sella* fosse ben fissata.
  Nach dem Spazierritt prüfte der Bauer, ob der *Sattel* gut befestigt war.
  
  Nonostante la pioggia, ho infilato una copertura sulla *sella* per proteggerla.
  Trotz des Regens habe ich eine Abdeckung über den *Sattel* gezogen, um ihn zu schützen.
  
  Se la *sella* non ti sta comoda, possiamo provare un modello diverso.
  Falls der *Sattel* dir nicht passt, können wir ein anderes Modell ausprobieren.
  
  La bambina sognava di avere una *sella* tutta sua per cavalcare in giardino.
  Das Mädchen träumte davon, einen eigenen *Sattel* zu haben, um im Garten zu reiten.
