Rang: 3044
Wort: giuramento
Wortart: n.m
Wort mit Artikel: il giuramento
Femininum / Plural: i giuramenti
IPA: ''
Definition: der Schwur, -e
Register: ''
Beispielsätze: |-
  Ha fatto un *giuramento* di fedeltà alla patria durante la cerimonia militare.
  Er hat einen *Schwur* auf das Vaterland während der Militärzeremonie abgelegt.
  
  Nonostante le promesse, ha infranto il *giuramento* fatto in tribunale.
  Trotz der Versprechen hat er den *Schwur*, der vor Gericht geleistet wurde, gebrochen.
  
  Ti scongiuro di mantenere il *giuramento* che abbiamo fatto insieme stanotte.
  Ich beschwöre dich, den *Schwur* einzuhalten, den wir gestern Nacht gemeinsam geleistet haben.
  
  Il *giuramento* di Ippocrate è ancora il fondamento dell’etica medica moderna.
  Der *Eid* des Hippokrates ist noch immer die Grundlage der modernen medizinischen Ethik.
  
  Se viola il *giuramento*, perderà l’onore e la fiducia di tutti.
  Wenn er den *Schwur* bricht, wird er Ehre und das Vertrauen aller verlieren.
