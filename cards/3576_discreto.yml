  Ich hoffe, dass dein Verhalten während des Treffens mit dem Kunden *diskret* bleibt.
  
  Nonostante l’età, mantiene un aspetto *discreto* e giovanile.
  Trotz seines Alters bewahrt er ein *diskretes* und jugendliches Aussehen.
  
  La polizia ha condotto un’indagine *discreta* senza destare sospetti.
  Die Polizei hat eine *diskrete* Untersuchung durchgeführt, ohne Verdacht zu erregen.
