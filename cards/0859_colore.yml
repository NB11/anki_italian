Rang: 859
Wort: colore
Wortart: n.m
Wort mit Artikel: il colore
Femininum / Plural: colori
IPA: ''
Definition: die Farbe, -n
Register: ''
Beispielsätze: |-
  Che *colore* preferisci per la tua stanza? Vorrei qualcosa di caldo e accogliente.
  Welche *Farbe* bevorzugst du für dein Zimmer? Ich möchte etwas Warmes und Gemütliches.
  
  Dopo il *colore* del cielo al tramonto, ho deciso di dipingere la mia camera di rosso.
  Nach der *Farbe* des Abendhimmels habe ich beschlossen, mein Zimmer rot zu streichen.
  
  Se non sapessi che il suo *colore* preferito è il blu, non avrei comprato questo regalo.
  Wenn ich nicht wüsste, dass seine Lieblings*Farbe* Blau ist, hätte ich dieses Geschenk nicht gekauft.
  
  La società ha avviato un progetto per ridurre l’uso di *colori* tossici nelle vernici.
  Die Gesellschaft hat ein Projekt gestartet, um die Verwendung giftiger *Farben* in Farben zu reduzieren.
  
  Nonostante il *colore* scuro della sua pelle, il colonnello non ha mai accettato il razzismo nella società.
  Trotz der dunklen *Farbe* seiner Haut hat der Oberst Rassismus in der Gesellschaft niemals akzeptiert.
