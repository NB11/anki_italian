Rang: 1304
Wort: minaccia
Wortart: n.f
Wort mit Artikel: la minaccia
Femininum / Plural: minacce
IPA: ''
Definition: die Drohung, -en
Register: ''
Beispielsätze: |-
  La polizia ha ricevuto una *minaccia* anonima al telefono.
  Die Polizei hat eine *anonyme* Drohung am Telefon erhalten.
  
  Se non vieni, ci saranno *minacce* ben più gravi!
  Wenn du nicht kommst, wird es *weitaus schwerwiegendere* Drohungen geben!
  
  Malgrado le *minacce* del vicino, ho deciso di frequentare il quartiere di sera.
  Trotz der *Drohungen* des Nachbarn habe ich beschlossen, das Viertel abends zu besuchen.
  
  Gli scienziati hanno avvertito che le *minacce* all’ambiente stanno diventando realtà.
  Die Wissenschaftler warnten, dass die *Bedrohungen* für die Umwelt zur Realität werden.
  
  Dubito che le sue *minacce* siano sincere: è solo un bluff.
  Ich *bezweifle*, dass seine Drohungen ernst gemeint sind: Es ist nur ein Bluff.
