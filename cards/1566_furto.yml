Rang: 1566
Wort: furto
Wortart: n.m
Wort mit Artikel: il furto
Femininum / Plural: furti
IPA: ''
Definition: der Diebstahl, -e
Register: ''
Beispielsätze: |-
  Il *furto* dei dati personali è un reato molto grave in questa nazione.
  Der *Diebstahl* von persönlichen Daten ist in dieser Nation ein sehr schweres Verbrechen.
  
  Hai sentito? Hanno denunciato un *furto* al museo durante la notte scorsa.
  Hast du gehört? Sie haben einen *Diebstahl* im Museum gestern Nacht gemeldet.
  
  Se avessi più sicurezza, non sarebbe successo alcun *furto* in questa casa.
  Wenn Sie mehr Sicherheit hätten, wäre kein *Diebstahl* in diesem Haus passiert.
  
  Secondo il poliziotto, la polizia indagherà il *furto* con grande attenzione.
  Laut dem *Polizisten* wird die Polizei den Diebstahl mit großer Sorgfalt untersuchen.
  
  Il *furto* dei gioielli è avvenuto proprio mentre gli ospiti erano al ristorante.
  Der *Diebstahl* der Schmuckstücke ist passiert, genau während die Gäste im Restaurant waren.
