Rang: 936
Wort: resistere
Wortart: v
Wort mit Artikel: resistere
Femininum / Plural: ''
IPA: ''
Definition: widerstehen, standhalten
Register: ''
Beispielsätze: |-
  Nonostante le *resistesse* per ore, alla fine cedette alla stanchezza.
  Trotz dass er stundenlang *widerstand*, gab er schließlich der Müdigkeit nach.
  
  Se avessi più forza di volontà, sapresti *resistere* alle tentazioni.
  Wenn du mehr Willenskraft hättest, würdest du den Versuchungen *standhalten* können.
  
  È difficile *resistere* al desiderio di mangiare un’enorme fetta di torta al cioccolato.
  Es fällt schwer, dem Wunsch nach einem riesigen Stück Schokoladenkuchen *zu widerstehen*.
  
  Gli antichi romani sapevano *resistere* a temperature estreme grazie alle loro abitudini.
  Die alten Römer wussten, unter extremen Temperaturen *standzuhalten*, dank ihrer Gewohnheiten.
  
  Anche se il prezzo era molto alto, decise di *resistere* e non acquistare quell’anello inutile.
  Obwohl der Preis sehr hoch war, beschloss er, *zuzuwarten* und diesen nutzlosen Ring nicht zu kaufen.
