Rang: 2346
Wort: preoccupazione
Wortart: n.f
Wort mit Artikel: la preoccupazione
Femininum / Plural: preoccupazioni
IPA: ''
Definition: die Sorge, -n
Register: ''
Beispielsätze: |-
  Non riesco a dormire perché ho una forte *preoccupazione* per l'esame di domani.
  Ich kann nicht schlafen, weil ich eine große *Sorge* wegen der Prüfung von morgen habe.
  
  La *preoccupazione* principale di Marco è trovare un buon lavoro dopo la laurea.
  Die größte *Sorge* von Marco ist es, nach dem Studium einen guten Job zu finden.
  
  Quando ho visto che la sua temperatura era alta, la mia *preoccupazione* è cresciuta immediatamente.
  Als ich sah, dass seine Temperatur hoch war, wuchs meine *Sorge* sofort.
  
  Penso che tu stia esagerando con questa *preoccupazione*: tutto andrà bene!
  Ich glaube, du übertreibst mit dieser *Sorge*: alles wird gut gehen!
  
  Nonostante le sue *preoccupazioni*, ha deciso di viaggiare da solo in quel paese lontano.
  Trotz seiner *Sorgen* hat er beschlossen, allein in dieses ferne Land zu reisen.
