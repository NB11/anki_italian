Wort: vuoto
Wortart: adj
Wort mit Artikel: vuoto
Femininum / Plural: ''
IPA: ''
Definition: leer, hohl, unbesetzt
Register: ''
Beispielsätze: |-
  La *vuota* bottiglia è rimasta sul tavolo dopo la festa.
  Die *leere* Flasche blieb nach der Feier auf dem Tisch.
  
  Nonostante abbia perso il lavoro, non si è *vuotato* di speranze.
  Trotz Jobverlust hat er sich nicht seiner *Hoffnungen* beraubt.
  
  Il direttore ha trovato il suo ufficio *vuoto* quando è arrivato alle nove.
  Der Direktor fand sein Büro *leer*, als er um neun Uhr ankam.
  
  Ho incaricato l'infermiere di controllare se la stanza era *vuota* prima di procedere con la pulizia.
  Ich habe den Krankenpfleger angewiesen zu prüfen, ob das Zimmer *frei* war, bevor wir mit der Reinigung fortfuhren.
  
  Anche se il teatro era *vuoto*, il cantante ha continuato a interpretare la sua canzone con grande passione.
  Obwohl das Theater *leer* war, sang der Künstler sein Lied weiterhin mit großer Leidenschaft.
