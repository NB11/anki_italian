Rang: 3794
Wort: competere
Wortart: v
Wort mit Artikel: competere
Femininum / Plural: ''
IPA: ''
Definition: konkurrieren, wetteifern
Register: ''
Beispielsätze: |-
  In questa azienda, tutti *competono* per ottenere una promozione.
  In diesem Unternehmen *konkurrieren* alle um eine Beförderung.
  
  Se non *competessi* con lui, non saresti così motivato a migliorare.
  Wenn du nicht mit ihm *wett-eiferst*, wärst du nicht so motiviert, dich zu verbessern.
  
  Credo che solo i migliori *competeranno* alla finale del torneo.
  Ich glaube, dass nur die Besten im Finale des Turniers *antreten* werden.
  
  È sorprendente come tu riesca a *competere* con avversari così forti.
  Es ist beeindruckend, wie du mit so starken Gegnern *konkurrierst*.
  
  Avrei voluto *competere* in quella gara, ma purtroppo ho perso l’occasione.
  Ich hätte an diesem Wettkampf *antreten* wollen, aber leider habe ich die Chance verpasst.
Audio: ''
