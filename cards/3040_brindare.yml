Rang: 3040
Wort: brindare
Wortart: vi
Wort mit Artikel: brindare
Femininum / Plural: ''
IPA: ''
Definition: anstoßen
Register: ''
Beispielsätze: |-
  Stasera *brinderemo* con champagne per festeggiare la vittoria.
  Heute Abend stoßen wir mit Champagner an, um den Sieg zu feiern.
  
  Se non *brindi* alla tua salute, almeno alza il bicchiere!
  Wenn du nicht auf deine Gesundheit *anstoß*, dann hebe wenigstens das Glas!
  
  Dopo la cerimonia, tutti *hanno brindato* con entusiasmo al nuovo presidente.
  Nach der Zeremonie *stießen* alle begeistert auf den neuen Präsidenten an.
  
  Prima di *brindare*, assicurati di avere un buon vino italiano in mano!
  Bevor du *anstoß*, stelle sicher, dass du einen guten italienischen Wein in der Hand hast!
  
  Mi piacerebbe *brindare* a te, ma non ho bevuto nulla!
  Ich würde gerne auf dich *anstoßen*, aber ich habe nichts getrunken!
