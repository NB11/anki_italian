Rang: 2970
Wort: sfondare
Wortart: v
Wort mit Artikel: sfondare
Femininum / Plural: ''
IPA: ''
Definition: durchbrechen, durchstoßen
Register: ''
Beispielsätze: |-
  Il tetto del garage *sfonderà* se non lo ripariamo subito.
  Das Garagendach wird *durchbrechen*, wenn wir es nicht sofort reparieren.
  
  Hanno *sfondato* la porta per salvare il cane intrappolato nell'incendio.
  Sie haben die Tür *durchbrochen*, um den Hund zu retten, der im Feuer eingeschlossen war.
  
  Se non stai attento, *sfonderai* lo schermo del cellulare con la penna.
  Wenn du nicht aufpasst, wirst du den Handydisplay *durchstoßen* mit dem Stift.
  
  Il film *sfonda* tutti i record al botteghino dopo la nomination agli Oscar.
  Der Film *durchbricht* alle Rekorde an der Kinokasse nach der Oscar-Nominierung.
  
  L'esercito *sfonderà* le linee nemiche all'alba, se il generale darà l'ordine.
  Die Armee wird die Feindeslinien bei Tagesanbruch *durchbrechen*, wenn der General den Befehl gibt.
