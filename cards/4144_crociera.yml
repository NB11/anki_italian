Rang: 4144
Wort: crociera
Wortart: n.f
Wort mit Artikel: la crociera
Femininum / Plural: crocere
IPA: ''
Definition: die Kreuzfahrt, -en
Register: ''
Beispielsätze: |-
  Quest’estate abbiamo prenotato una *crociera* nel Mediterraneo.
  Diesen Sommer haben wir eine *Kreuzfahrt* im Mittelmeer gebucht.
  
  Speriamo di vedere l’isola durante la nostra *crociera* di domani.
  Wir hoffen, die Insel während unserer *Kreuzfahrt* morgen zu sehen.
  
  Molti turisti scelgono questa compagnia per le sue *crocere* lussuose.
  Viele Touristen wählen diese Firma wegen ihrer luxuriösen *Kreuzfahrten*.
  
  Se avessi più tempo, farei una *crociera* intorno al mondo.
  Wenn ich mehr Zeit hätte, würde ich eine *Weltreise* auf einer Kreuzfahrt machen.
  
  Appena tornati dalla *crociera*, abbiamo ricevuto una recensione molto positiva.
  Sobald wir von der *Kreuzfahrt* zurückgekehrt sind, haben wir eine sehr positive Bewertung erhalten.
