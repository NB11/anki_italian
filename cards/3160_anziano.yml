Rang: 3160
Wort: anziano
Wortart: n.m
Wort mit Artikel: l'anziano
Femininum / Plural: gli *anziani*
IPA: ''
Definition: betagt, alter Mensch
Register: ''
Beispielsätze: |-
  L'*anziano* attraversò la strada con attenzione perché la vista non era più quella di una volta.
  Der *betagte* Mensch überquerte die Straße vorsichtig, weil das Sehvermögen nicht mehr dasselbe war.
  
  Gli *anziani* del quartiere si incontrano ogni giovedì al parco per giocare a carte.
  Die *betagten* Menschen des Stadtteils treffen sich jeden Donnerstag im Park, um Karten zu spielen.
  
  Mi sono accorta che l'ho offeso quando ho chiamato *anziano* quel signore senza volerlo.
  Ich merkte, dass ich ihn beleidigt hatte, als ich den Herrn unwissentlich *betagt* nannte.
  
  Nonostante sia *anziano*, mio nonno continua a viaggiare da solo in tutta Europa.
  Trotz seines *betagten* Alters reist mein Großvater weiterhin allein durch ganz Europa.
  
  Se non avessimo aiutato l'*anziano* a salire le scale, sarebbe caduto sicuramente.
  Hätten wir dem *betagten* Mann nicht geholfen, die Treppe hinaufzusteigen, wäre er sicher gestürzt.
