Rang: 1353
Wort: fonte
Wortart: n.f
Wort mit Artikel: la fonte
Femininum / Plural: fonti
IPA: ''
Definition: die Quelle, -n
Register: ''
Beispielsätze: |-
  Questa *fonte* di acqua fresca è molto antica e si trova nel bosco vicino al nostro paese.
  Diese *Quelle* mit frischem Wasser ist sehr alt und liegt im Wald in der Nähe unseres Dorfes.
  
  Ho trovato una *fonte* di informazioni affidabili per preparare il mio esame di fisica.
  Ich habe eine *Quelle* zuverlässiger Informationen gefunden, um mich auf meine Physikprüfung vorzubereiten.
  
  Secondo la *fonte* ufficiale, il concerto si terrà sabato alle 20:00 nel parco centrale.
  Laut der *offiziellen Quelle* findet das Konzert am Samstag um 20 Uhr im Zentralpark statt.
  
  Nonostante la *minaccia* di pioggia, abbiamo deciso di uscire perché la distanza era corta e l’erba era fresca.
  Trotz der *Drohung* mit Regen haben wir uns entschieden, rauszugehen, weil die Entfernung kurz und das Gras frisch war.
  
  L’ispettore ha confermato che la *fonte* del debito dell’albergo era legata a un atto di corruzione nella direzione.
  Der *Inspektor* bestätigte, dass die Quelle der Schulden des Hotels mit einer korrupten Handlung in der Führung zusammenhing.
