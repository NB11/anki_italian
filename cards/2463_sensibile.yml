Rang: 2463
Wort: sensibile
Wortart: adj
Wort mit Artikel: sensibile
Femininum / Plural: ''
IPA: ''
Definition: empfindsam, sensibel, feinfühlig
Register: ''
Beispielsätze: |-
  È una persona molto *sensibile* alle critiche altrui.
  Er ist eine sehr *sensible* Person gegenüber fremden Kritik.
  
  Nonostante l’accaduto, lei rimase *sensibile* al dolore degli altri.
  Trotz des Geschehenen blieb sie für den Schmerz anderer *empfindsam*.
  
  I genitori dovrebbero essere *sensibili* ai bisogni dei loro figli.
  Eltern sollten für die Bedürfnisse ihrer Kinder *sensibel* sein.
  
  Se fossi *sensibile* al rumore, non vivresti in città!
  Wenn du für Lärm *empfindlich* wärst, würdest du nicht in der Stadt leben!
  
  L’artista dipinse un quadro *sensibile* e profondo sull’amore.
  Die Künstlerin malte ein *sensibles* und tiefgründiges Gemälde über die Liebe.
