Rang: 3356
Wort: obbligo
Wortart: n.m
Wort mit Artikel: l'obbligo
Femininum / Plural: obblighi
IPA: ''
Definition: die Pflicht, -en
Register: ''
Beispielsätze: |-
  In Italia c'è *l'obbligo* di vaccinarsi per i bambini prima di iniziare la scuola.
  In Italien gibt es die *Pflicht*, Kinder vor Schulbeginn zu impfen.
  
  Non ti preoccupare per *l'obbligo* di presentare la dichiarazione dei redditi, ci penso io.
  Mach dir keine Sorgen wegen der *Pflicht*, die Steuererklärung abzugeben, ich kümmere mich darum.
  
  Se non rispetti *l'obbligo* di pagare le tasse, rischi sanzioni pesanti.
  Wenn du die *Pflicht*, Steuern zu zahlen, nicht einhältst, riskierst du hohe Strafen.
  
  Secondo la legge, c'è *l'obbligo* di avere un'assicurazione sanitaria per viaggiare in UE.
  Laut Gesetz besteht die *Pflicht*, eine Krankenversicherung für Reisen in der EU zu haben.
  
  Avevo pensato di ignorare *l'obbligo*, ma poi ho capito che era meglio rispettarlo.
  Ich hatte vor, die *Pflicht* zu ignorieren, doch dann verstand ich, dass es besser war, sie zu erfüllen.
