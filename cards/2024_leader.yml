Rang: 2024
Wort: leader
Wortart: n.m
Wort mit Artikel: il leader
Femininum / Plural: i leader
IPA: ''
Definition: der Anführer, - / die Anführerin, -nen
Register: ''
Beispielsätze: |-
  Il *leader* del gruppo ha preso la parola durante la riunione.
  Der *Anführer* der Gruppe hat während der Besprechung das Wort ergriffen.
  
  Chi sarà il prossimo *leader* della squadra dopo le dimissioni dell’attuale?
  Wer wird der nächste *Anführer* des Teams nach dem Rücktritt des aktuellen sein?
  
  I *leader* politici spesso devono prendere decisioni difficili in circostanze complesse.
  *Anführer* in der Politik müssen oft schwierige Entscheidungen unter komplexen Umständen treffen.
  
  Non mi fido di quel *leader*: ha sempre approfittato della situazione per i suoi interessi.
  Ich vertraue diesem *Anführer* nicht: er hat die Situation immer für seine eigenen Interessen ausgenutzt.
  
  Se i *leader* avessero ascoltato le preoccupazioni della popolazione, la rivolta non sarebbe scoppiata.
  Wenn die *Anführer* die Sorgen der Bevölkerung angehört hätten, wäre der Aufstand nicht ausgebrochen.
