Beispielsätze: |-
  Ha accettato solo dopo molto *esitare*.
  Er hat erst nach langem *Zögern* zugestimmt.
  
  Se avessi saputo prima, non avrei *esitato* a dirtelo.
  Hätte ich es früher gewusst, hätte ich nicht *gezögert*, es dir zu sagen.
  
  Non *esitate* a chiedere aiuto se avete bisogno.
  Zögert nicht, um Hilfe zu bitten, falls ihr welche braucht.
  
  Ha *esitato* prima di prendere una decisione definitiva.
  Er hat *gezögert*, bevor er eine endgültige Entscheidung getroffen hat.
  
  Perché *esiti*? Non c'è nulla da temere.
  Warum zögerst du? Es gibt nichts zu fürchten.
