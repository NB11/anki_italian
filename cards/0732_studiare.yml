Rang: 732
Wort: studiare
Wortart: v
Wort mit Artikel: studiare
Femininum / Plural: ''
IPA: ''
Definition: lernen, studieren
Register: ''
Beispielsätze: |-
  Dopo il pranzo devo ancora *studiare* per l'esame di domani.
  Nach dem *Mittagessen* muss ich noch für die Prüfung lernen.
  
  Se non *studiassi* di più, non supererai l'esame.
  Wenn du nicht mehr *lernen* würdest, bestehst du die Prüfung nicht.
  
  Ho incontrato Marco che *stava studiando* all'università per ore.
  Ich habe Marco getroffen, der stundenlang an der Universität *studiert* hat.
  
  Domani mattina *studierò* la lezione sull'attacco cardiaco.
  Morgen früh werde ich die Lektion über den Herzangriff *studieren*.
  
  Che tu *studi* o no, il risultato dipende da te.
  Ob du *lernst* oder nicht, das Ergebnis hängt von dir ab.
