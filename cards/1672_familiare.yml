Rang: 1672
Wort: familiare
Wortart: adj
Wort mit Artikel: familiare
Femininum / Plural: ''
IPA: ''
Definition: vertraut, bekannt, geläufig
Register: ''
Beispielsätze: |-
  Questa zona mi è *familiare* perché ci venivo da bambino.
  Diese Gegend ist mir **vertraut**, weil ich als Kind hierher kam.
  
  Non mi sembra *familiare* il modo in cui hai risolto il problema.
  Es erscheint mir nicht **bekannt**, wie du das Problem gelöst hast.
  
  Ho bisogno di una spiegazione più *familiare* per capire meglio.
  Ich brauche eine **geläufigere** Erklärung, um es besser zu verstehen.
  
  Anche se non è un ladro, il suo comportamento mi risulta *familiare*.
  Auch wenn er kein Dieb ist, kommt mir sein Verhalten **vertraut** vor.
  
  Il linguaggio che usi nei suoi romanzi è molto *familiare* ai lettori italiani.
  Die Sprache, die er in seinen Romanen verwendet, ist für italienische Leser sehr **bekannt**.
