Rang: 1159
Wort: uovo
Wortart: n.m
Wort mit Artikel: l'uovo
Femininum / Plural: le uova
IPA: ''
Definition: das Ei, -er
Register: ''
Beispielsätze: |-
  Ieri ho comprato *uova* fresche dal contadino vicino al villaggio.
  Gestern habe ich frische *Eier* vom Bauern beim Dorf gekauft.
  
  Nonostante il *dubbio*, continuiamo a mangiare uova ogni mattina per colazione.
  Trotz des *Zweifels* essen wir weiterhin jeden Morgen Eier zum Frühstück.
  
  Se *uova* così pregiate non le mangi, almeno cucinale per la festa di fede di tuo nipote!
  Wenn du diese so teuren *Eier* nicht isst, koche sie wenigstens für das Glaubensfest deines Neffen!
  
  L’*uovo* che hai appena rotto era probabilmente l’ultimo del pollaio, ma non c’era altro modo per identificare il ladro!
  Das *Ei*, das du gerade zerbrochen hast, war wahrscheinlich das letzte vom Hühnerstall, aber es gab keinen anderen Weg, den Dieb zu erkennen!
  
  Mi hanno detto che chi mangia tre *uova* la settimana migliora la conoscenza della matematica, ma non è ovvio!
  Man hat mir gesagt, dass wer drei *Eier* pro Woche isst, das Wissen in Mathematik verbessert – aber das ist nicht offensichtlich!
