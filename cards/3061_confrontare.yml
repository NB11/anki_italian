Rang: 3061
Wort: confrontare
Wortart: v
Wort mit Artikel: confrontare
Femininum / Plural: ''
IPA: ''
Definition: vergleichen, gegenüberstellen
Register: ''
Beispielsätze: |-
  Gli studiosi hanno *confrontato* i dati del 2023 con quelli degli anni precedenti.
  Die Wissenschaftler haben die Daten von 2023 mit denen der Vorjahre *verglichen*.
  
  Prima di *confrontare* le offerte, controlla sempre i prezzi al metro.
  Bevor du die Angebote *gegenüberstellst*, prüfe immer die Preise pro Meter.
  
  Se tu *confronti* la mia prospettiva con la tua, capirai meglio la situazione.
  Wenn du meine *Perspektive* mit deiner vergleichst, wirst du die Situation besser verstehen.
  
  Gli avvocati hanno *confrontato* le prove per trovare una contraddizione.
  Die Anwälte haben die Beweise *gegenübergestellt*, um einen Widerspruch zu finden.
  
  Mi piacerebbe *confrontare* questo volume con quello che ho letto l’anno scorso.
  Ich würde gerne dieses *Volumen* mit dem vergleichen, das ich letztes Jahr gelesen habe.
