Wort mit Artikel: rubare
Femininum / Plural: ''
IPA: ''
Definition: stehlen, klauen
Register: ''
Beispielsätze: |-
  Non *ruberai* mai nulla, vero?
  Du wirst *stehlen* doch nie etwas, oder?
  
  Hanno *rubato* la mia borsa ieri sera.
  Sie haben *gestohlen* meine Tasche gestern Abend.
  
  Chi *ruberebbe* un libro così prezioso?
  Wer würde ein so kostbares Buch *stehlen*?
  
  Se *rubassi* dei soldi, mi pentirei.
  Wenn ich Geld *stehlen* würde, würde ich es bereuen.
  
  È sbagliato *rubare*, anche in una situazione disperata.
  Es ist falsch, *zu stehlen*, auch in einer verzweifelten Situation.
