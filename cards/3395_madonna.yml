Rang: 3395
Wort: madonna
Wortart: n.f
Wort mit Artikel: la madonna
Femininum / Plural: madonne
IPA: ''
Definition: die Madonna
Register: ''
Beispielsätze: |-
  La *madonna* nella chiesa era raffigurata con il bambino in braccio.
  Die *Madonna* in der Kirche war mit dem Kind auf dem Arm dargestellt.
  
  Hanno trovato una statua antica della *madonna* nel giardino.
  Sie haben eine antike Statue der *Madonna* im Garten gefunden.
  
  Vor la *madonna* c'è un cero acceso che illumina l'abside.
  Vor der *Madonna* brennt eine Kerze, die den Altarraum erhellt.
  
  La *madonna* che custodisce la cappella è considerata miracolosa dai fedeli.
  Die *Madonna*, die die Kapelle beschützt, gilt den Gläubigen als wundertätig.
  
  In molte città italiane ci sono edicole con immagini della *madonna*.
  In vielen italienischen Städten gibt es Bildstöcke mit Darstellungen der *Madonna*.
