Rang: 3533
Wort: cervo
Wortart: n.m
Wort mit Artikel: il cervo
Femininum / Plural: cervi
IPA: ''
Definition: der Hirsch, -e
Register: ''
Beispielsätze: |-
  Nel bosco ho visto *cervi* che brucavano l'erba vicino al ruscello.
  Im Wald habe ich *Hirsche* gesehen, die nahe dem Bach Gras fraßen.
  
  Il *cervo* che abbiamo avvistato ieri è sparito stamattina.
  Der *Hirsch*, den wir gestern gesichtet haben, ist heute Morgen verschwunden.
  
  Se non ci fosse tanta caccia, nei boschi ci sarebbero molti più *cervi*.
  Wenn es nicht so viel Jagd gäbe, gäbe es in den Wäldern viel mehr *Hirsche*.
  
  È raro trovare un *cervo* adulto che si avvicina ai centri abitati.
  Es ist selten, einen ausgewachsenen *Hirsch* in der Nähe von Siedlungen zu finden.
  
  Nonostante il freddo, i *cervi* si muovevano con grazia tra gli alberi coperti di neve.
  Trotz der Kälte bewegten sich die *Hirsche* mit Anmut zwischen den schneebedeckten Bäumen.
