Rang: 334
Wort: colpire
Wortart: v
Wort mit Artikel: colpire
Femininum / Plural: ''
IPA: ''
Definition: treffen, schlagen, beeinflussen
Register: ''
Beispielsätze: |-
  Il giocatore *ha colpito* la palla con forza.
  Der Spieler hat den Ball mit *Wucht* getroffen.
  
  Il governo spera di *colpire* l’inflazione con nuove misure.
  Die Regierung hofft, die Inflation mit neuen Maßnahmen zu *beeinflussen*.
  
  *Colpisci* il bersaglio prima che scada il tempo!
  *Triff* die Zielscheibe, bevor die Zeit abläuft!
  
  Se *colpissi* il chiodo con precisione, la costruzione starebbe in piedi.
  Wenn du den Nagel mit *Präzision* triffst, würde das Gebäude stehen.
  
  Temo che questa notizia lo *colpirà* profondamente.
  Ich fürchte, diese Nachricht wird ihn tief *verletzen*.
