Rang: 2164
Wort: spettare
Wortart: vt
Wort mit Artikel: spettare
Femininum / Plural: ''
IPA: ''
Definition: dazugehören, gebühren
Register: ''
Beispielsätze: |-
  A chi *spetta* la vittoria? È ancora incerto.
  Wem *gehört* der Sieg? Er ist noch ungewiss.
  
  Mi *spetta* un premio per il lavoro svolto l’anno scorso.
  Mir *steht* eine Belohnung für die Arbeit des letzten Jahres zu.
  
  A te *spetta* decidere se accettare o rifiutare l’offerta.
  Dir *gebührt* die Entscheidung, ob du das Angebot annimmst oder ablehnst.
  
  Secondo il regolamento, a lui *spetta* il ruolo di vice.
  Laut Vorschrift *obliegt* ihm die Rolle des Stellvertreters.
  
  Spero che non *spetti* a me risolvere questo problema delicato.
  Ich hoffe, es *steht* mir nicht zu, dieses heikle Problem zu lösen.
