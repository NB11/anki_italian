Rang: 3064
Wort: sorgere
Wortart: vi
Wort mit Artikel: sorgere
Femininum / Plural: ''
IPA: ''
Definition: aufgehen, sich erheben
Register: ''
Beispielsätze: |-
  Il sole *sorge* lentamente dietro le montagne.
  Die Sonne *geht* langsam hinter den Bergen auf.
  
  Spera che domani *sorgerà* un nuovo giorno per lui.
  Er hofft, dass morgen ein neuer Tag für ihn *beginnt*.
  
  Ricordo come le prime stelle *sorsero* mentre eravamo al lago.
  Ich erinnere mich, wie die ersten Sterne *aufgingen*, als wir am See waren.
  
  La domanda è se un progetto del genere *sorgerà* davvero o è solo un'illusione.
  Die Frage ist, ob ein solches Projekt wirklich *sich ergibt* oder nur eine Illusion ist.
  
  Da quando il governo ha imposto nuove regole, *sorge* una resistenza ovunque.
  Seitdem die Regierung neue Regeln *vorgeschrieben* hat, erhebt sich überall Widerstand.
