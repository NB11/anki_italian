Rang: 2506
Wort: pescare
Wortart: v
Wort mit Artikel: pescare
Femininum / Plural: ''
IPA: ''
Definition: angeln, fischen
Register: ''
Beispielsätze: |-
  Domani mattina andrò al lago per *pescare* con mio nonno.
  Morgen früh werde ich zum See gehen, um mit meinem Opa zu *angeln*.
  
  Mio zio ha *pescato* un pesce enorme che pesava quasi due chili!
  Mein Onkel hat einen riesigen Fisch gefangen, der fast zwei Kilo wog!
  
  Se avessimo più tempo, *pescheremmo* anche nel fiume vicino.
  Wenn wir mehr Zeit hätten, würden wir auch im nahegelegenen Fluss *angeln*.
  
  Nonostante la pioggia, decidemmo di andare a *pescare* perché era una tradizione di famiglia.
  Trotz des Regens beschlossen wir zu *angeln*, denn es war eine Familientradition.
  
  Lui dice che sa benissimo come *pescare*, ma finora non ha mai preso nulla.
  Er behauptet, er wisse genau, wie man *angelt*, aber bisher hat er noch nie etwas gefangen.
