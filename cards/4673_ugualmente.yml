Rang: 4673
Wort: ugualmente
Wortart: adv
Wort mit Artikel: ugualmente
Femininum / Plural: ''
IPA: ''
Definition: ebenso, gleichfalls
Register: ''
Beispielsätze: |-
  Anche se non ti piaccio, ti rispetterò *ugualmente*.
  Auch wenn ich dir nicht gefalle, werde ich dich *ebenso* respektieren.
  
  Nonostante la pioggia, siamo usciti *ugualmente* a fare una passeggiata.
  Trotz des Regens sind wir *ebenso* spazieren gegangen.
  
  Dicono che il film sia brutto, ma io andrò *ugualmente* al cinema stasera.
  Man sagt, der Film sei schlecht, aber ich werde *trotzdem* heute Abend ins Kino gehen.
  
  Hai sbagliato, ma ti perdono *ugualmente*: imparerai presto.
  Du hast dich geirrt, aber ich vergebe dir *ebenso*: du wirst schnell lernen.
  
  Sebbene non abbia fame, mangerò *ugualmente* un po’ di minestra per cortesia.
  Obwohl ich keinen Hunger habe, werde ich *trotzdem* ein wenig Suppe aus Höflichkeit essen.
