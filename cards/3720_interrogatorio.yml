Rang: 3720
Wort: interrogatorio
Wortart: adj
Wort mit Artikel: interrogatorio
Femininum / Plural: ''
IPA: ''
Definition: verhörartig, *Frage*-artig, abfragend
Register: ''
Beispielsätze: |-
  L’avvocato ha posto domande *interrogatorie* per scoprire la verità.
  Der Anwalt hat *Frage*-artige Fragen gestellt, um die Wahrheit zu enthüllen.
  
  Il tono *interrogatorio* del poliziotto metteva a disagio l’imputato.
  Der *verhörartige* Ton des Polizisten machte den Angeklagten unwohl.
  
  Quel tipo di intervista era *interrogatorio* più che una conversazione.
  Diese Art von Interview war ein *Verhör* statt ein Gespräch.
  
  Anche se non era accusatorio, l’approccio rimaneva *interrogatorio*.
  Auch wenn es nicht anklagend war, blieb der Ansatz *fragenartig*.
  
  La polizia ha usato metodi *interrogatorii* per ottenere una confessione.
  Die Polizei nutzte *verhörartige* Methoden, um ein Geständnis zu erzwingen.
