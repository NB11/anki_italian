Rang: 2799
Wort: occupato
Wortart: adj
Wort mit Artikel: occupato
Femininum / Plural: ''
IPA: ''
Definition: besetzt, belegt
Register: ''
Beispielsätze: |-
  La linea telefonica è *occupata* da almeno dieci minuti.
  Die Telefonleitung ist seit mindestens zehn Minuten *besetzt*.
  
  Se il bagno è *occupato*, posso aspettare fuori?
  Wenn das Bad *belegt* ist, kann ich draußen warten?
  
  Mi dispiace, il mio telefono era *occupato* durante la tua chiamata.
  Tut mir leid, mein Telefon war während deines Anrufs *besetzt*.
  
  Spero che lo studio del dentista non sia più *occupato* quando arriviamo.
  Ich hoffe, dass das Zahnarztzimmer nicht mehr *belegt* ist, wenn wir ankommen.
  
  Il treno che volevo prendere era così *occupato* che non ho trovato posto a sedere.
  Der Zug, den ich nehmen wollte, war so *voll*, dass ich keinen Sitzplatz gefunden habe.
