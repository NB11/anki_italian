  Ich habe einen Roman gelesen, der in einer sehr fernen *Epoche* spielt.
  
  Non capisco perché giudichi l'*epoca* moderna con tanto disprezzo.
  Ich verstehe nicht, warum du die moderne *Epoche* mit so viel Verachtung beurteilst.
  
  In quell'*epoca* la gente credeva ancora ai segni del destino.
  In dieser *Epoche* glaubten die Menschen noch an die Zeichen des Schicksals.
  
  Spero che questa *epoca* di incertezze finisca presto.
  Ich hoffe, dass diese *Epoche* der Unsicherheit bald endet.
