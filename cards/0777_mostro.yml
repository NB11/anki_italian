Rang: 777
Wort: mostro
Wortart: n.m
Wort mit Artikel: il mostro
Femininum / Plural: mostri
IPA: ''
Definition: das Ungeheuer, - / die Bestie, -n
Register: ''
Beispielsätze: |-
  Il *mostro* compare improvvisamente dalla foresta buia.
  Das *Ungeheuer* erscheint plötzlich aus dem dunklen Wald.
  
  Credo che tu abbia incontrato un *mostro* nel tuo sogno, ma era solo suggestione.
  Ich glaube, du hast in deinem Traum ein *Ungeheuer* getroffen, aber es war nur Einbildung.
  
  Se i bambini non tornano a casa entro mezz'ora, chiamo qualcuno perché potrebbe esserci un *mostro* in questo quartiere.
  Wenn die Kinder nicht innerhalb von einer halben Stunde nach Hause kommen, rufe ich jemanden an, denn es *könnte* ein Ungeheuer in diesem Viertel geben.
  
  Lui ha dipinto un *mostro* così spaventoso che tutti urlano solo a guardarlo.
  Er hat ein so gruseliges *Ungeheuer* gemalt, dass alle beim Hinsehen schreien.
  
  A meno che non ci sia un *mostro* nascosto nel bagagliaio, possiamo partire senza paura.
  Solange kein *Ungeheuer* im Kofferraum versteckt ist, können wir ohne Angst losfahren.
