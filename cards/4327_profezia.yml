Rang: 4327
Wort: profezia
Wortart: n.f
Wort mit Artikel: la profezia
Femininum / Plural: profezie
IPA: ''
Definition: die Weissagung, -en
Register: ''
Beispielsätze: |-
  Secondo la *profezia* antica, il regno cadrà tra cento anni.
  Laut der alten *Weissagung* wird das Reich in hundert Jahren fallen.
  
  Molti credono che la sua *profezia* si avvererà presto.
  Viele glauben, dass sich seine *Vorhersage* bald erfüllen wird.
  
  La *profezia* era scritta su una pergamena antica, ma nessuno riuscì a decifrarla.
  Die *Weissagung* war auf eine alte Pergamentrolle geschrieben, doch niemand konnte sie entziffern.
  
  Se la *profezia* del veggente è vera, dobbiamo prepararci a un grande cambiamento.
  Falls die *Weissagung* des Sehers wahr ist, müssen wir uns auf eine große Veränderung vorbereiten.
  
  La sua *profezia* era così vaga che nessuno riuscì a coglierne il significato.
  Seine *Weissagung* war so vage, dass niemand ihre Bedeutung erfassen konnte.
