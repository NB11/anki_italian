Rang: 963
Wort: attore
Wortart: n.m
Wort mit Artikel: l'attore
Femininum / Plural: gli attori
IPA: ''
Definition: der Schauspieler, -
Register: ''
Beispielsätze: |-
  L'*attore* ha ricevuto molte congratulazioni per la sua recitazione in quel film magnifico.
  Der *Schauspieler* hat viele Glückwünsche für seine Darstellung in diesem herrlichen Film erhalten.
  
  Nonostante l'*attore* fosse molto stanco, continuò a provare per ore nel laboratorio chiuso.
  Obwohl der *Schauspieler* sehr müde war, probte er stundenlang im verschlossenen Labor.
  
  L'*attore* che recita la parte principale è già noto per altri episodi grandiosi in televisione.
  Der *Schauspieler*, der die Hauptrolle spielt, ist bereits für andere großartige Fernsehfolgen bekannt.
  
  Se l'*attore* non fosse così famoso, forse avrebbe più tempo da dedicare alla sua vita privata.
  Wenn der *Schauspieler* nicht so berühmt wäre, hätte er vielleicht mehr Zeit für sein Privatleben.
  
  La regista disse all'*attore*: "Il tuo intervento in questa scena dipende dal tuo interesse per il personaggio."
  Die Regisseurin sagte zum *Schauspieler*: "Dein Einsatz in dieser Szene hängt von deinem Interesse an der Figur ab."
