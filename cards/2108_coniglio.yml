Rang: 2108
Wort: coniglio
Wortart: n.m
Wort mit Artikel: il coniglio
Femininum / Plural: conigli
IPA: ''
Definition: das Kaninchen, -
Register: ''
Beispielsätze: |-
  Il *coniglio* saltella felice nel prato.
  Das *Kaninchen* hüpft fröhlich auf der Wiese.
  
  Ho visto un *coniglio* grigio attraversare la strada.
  Ich habe ein graues *Kaninchen* die Straße überqueren sehen.
  
  I *conigli* vivono in tane sotterranee per proteggersi dai predatori.
  Die *Kaninchen* leben in unterirdischen Bauen, um sich vor Raubtieren zu schützen.
  
  Se avessi un giardino, vorrei avere molti *conigli* domestici.
  Wenn ich einen Garten hätte, würde ich gerne viele zahme *Kaninchen* halten.
  
  Il veterinario ha detto che il *coniglio* del signor Rossi ha bisogno di più fibre nella dieta.
  Der Tierarzt hat gesagt, dass das *Kaninchen* von Herrn Rossi mehr Ballaststoffe in seiner Ernährung braucht.
