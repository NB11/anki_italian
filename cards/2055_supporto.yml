Rang: 2055
Wort: supporto
Wortart: n.m
Wort mit Artikel: il supporto
Femininum / Plural: supporti
IPA: ''
Definition: die Stütze, -n
Register: ''
Beispielsätze: |-
  Per rendere il tavolo più stabile, abbiamo aggiunto un *supporto* al centro.
  Um den Tisch stabiler zu machen, haben wir eine *Stütze* in der Mitte hinzugefügt.
  
  In questa nuova versione, il *supporto* per lo schermo è molto più robusto.
  In dieser neuen Version ist die *Unterstützung* für den Bildschirm viel stabiler.
  
  Nonostante il *supporto* tecnico sia efficiente, ho ancora difficoltà con il programma.
  Obwohl die *technische Unterstützung* effizient ist, habe ich immer noch Schwierigkeiten mit dem Programm.
  
  Se il *supporto* per la pianta non fosse così solido, cadrebbe dopo pochi giorni.
  Wenn die *Stütze* für die Pflanze nicht so stabil wäre, würde sie nach wenigen Tagen umfallen.
  
  Hai già ricevuto il *supporto* che avevi richiesto per il tuo progetto di ricerca?
  Hast du bereits die *Unterstützung* erhalten, die du für dein Forschungsprojekt angefordert hast?
