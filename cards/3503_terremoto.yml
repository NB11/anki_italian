Rang: 3503
Wort: terremoto
Wortart: n.m
Wort mit Artikel: il terremoto
Femininum / Plural: terremoti
IPA: ''
Definition: das Erdbeben, -
Register: ''
Beispielsätze: |-
  Il *terremoto* di ieri sera ha causato molti danni.
  Das *Erdbeben* von gestern Abend hat viele Schäden verursacht.
  
  Nonostante il *terremoto*, l’edificio ha resistito grazie alle sue fondamenta solide.
  Trotz des *Erdbebens* hielt das Gebäude dank seiner soliden Fundamente stand.
  
  Se dovesse verificarsi un *terremoto*, sapete dove trovare riparo?
  Falls ein *Erdbeben* auftreten sollte, wisst ihr, wo ihr Schutz finden könnt?
  
  Le autorità hanno emanato l’allerta dopo il *terremoto* di magnitudo 5.2.
  Die Behörden haben nach dem *Erdbeben* der Stärke 5,2 die Warnung herausgegeben.
  
  Il *terremoto* che ha colpito la zona è stato registrato come il più forte degli ultimi cinquant’anni.
  Das *Erdbeben*, das die Region erschütterte, wurde als das stärkste der letzten fünfzig Jahre registriert.
