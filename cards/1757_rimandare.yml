Rang: 1757
Wort: rimandare
Wortart: v
Wort mit Artikel: rimandare
Femininum / Plural: ''
IPA: ''
Definition: verschieben, vertagen, aufschieben
Register: ''
Beispielsätze: |-
  Dobbiamo *rimandare* la riunione perché non abbiamo ancora tutti i documenti necessari.
  Wir müssen die Besprechung *verschieben*, weil wir noch nicht alle Unterlagen haben.
  
  Se non fosse piovuto, avremmo *rimandato* il viaggio a domani.
  Wenn es nicht geregnet hätte, hätten wir die Reise auf morgen *vertagt*.
  
  Il direttore ha deciso di *rimandare* la decisione fino alla prossima settimana.
  Der Direktor hat beschlossen, die Entscheidung bis nächste Woche *aufzuschieben*.
  
  Perché hai voluto *rimandare* questo appuntamento? Era davvero urgente!
  Warum wolltest du diesen Termin *verschieben*? Er war wirklich dringend!
  
  Stavo per *rimandare* tutto, ma poi ho trovato una soluzione migliore.
  Ich war dabei, alles *aufzuschieben*, doch dann habe ich eine bessere Lösung gefunden.
