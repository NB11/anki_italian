Definition: wiedersehen, treffen
Register: ''
Beispielsätze: |-
  Spero di *rivederti* presto!
  Ich hoffe, dich bald wiederzusehen!
  
  Abbiamo *rivisto* quel film la settimana scorsa.
  Letzte Woche haben wir diesen Film wieder gesehen.
  
  Vuoi *rivedere* i vecchi amici domani?
  Willst du morgen die alten Freunde wieder treffen?
  
  Se *rivedessi* quella persona, ti riconoscerei subito.
  Wenn ich diese Person wiedersehen würde, würde ich sie sofort erkennen.
  
  Dopo anni, ci siamo *rivisti* per caso in treno.
  Nach Jahren sind wir zufällig im Zug wieder aufeinandergetroffen.
