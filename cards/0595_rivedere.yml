Rang: 595
Wort: rivedere
Wortart: vt
Wort mit Artikel: rivedere
Femininum / Plural: ''
IPA: ''
Definition: wiedersehen
Register: ''
Beispielsätze: |-
  Domenica mattina ho incontrato il mio amico d'infanzia e siamo andati a bere un caffè insieme. Insomma, *rivedere* le persone che hanno fatto parte della nostra vita è sempre speciale.
  Sonntagmorgen traf ich meinen Kindheitsfreund und wir gingen zusammen Kaffee trinken. Kurz gesagt, *wiederzusehen*, was Menschen betreffen haben, die Teil unseres Lebens waren, ist immer besonders.
  
  Quando tornerà tuo zio dall’estero? Speriamo di poterlo *rivedere* presto per parlare delle sue avventure.
  Wann wird dein Onkel aus dem Ausland zurückkehren? Hoffentlich können wir ihn *wiedersehen*, um über seine Abenteuer zu sprechen.
  
  Anche se non ci parliamo da anni, quando ho saputo che si è sposato ho subito pensato di *rivedere* quella persona che un tempo mi ha aiutato tanto.
  Auch wenn wir uns jahrelang nicht sprechen, als ich erfuhr, dass er geheiratet hat, dachte ich sofort daran, diese Person *wiederzusehen*, die mir einst so geholfen hat.
  
  Dopo tanti problemi con quel programma, finalmente siamo riusciti a *rivedere* la base del codice e a correggerlo completamente.
  Nach vielen Problemen mit diesem Programm ist es uns endlich gelungen, die Basis des Codes zu *überarbeiten* und es komplett zu korrigieren.
  
  Non vedo l’ora di *rivedere* Venezia in primavera: i colori, l’acqua e l’atmosfera generale sono semplicemente incredibili.
  Ich kann es kaum erwarten, Venedig im Frühling *wiederzusehen*: die Farben, das Wasser und die allgemeine Atmosphäre sind einfach unglaublich.
