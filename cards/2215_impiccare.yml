Rang: 2215
Wort: impiccare
Wortart: v
Wort mit Artikel: impiccare
Femininum / Plural: ''
IPA: ''
Definition: aufhängen, erhängen
Register: ''
Beispielsätze: |-
  Il boia *impiccò* il prigioniero alle prime luci dell'alba.
  Der Henker hing den Gefangenen bei Tagesanbruch *auf*.
  
  Se non paghi entro domani, *impiccherai* il tuo futuro!
  Wenn du nicht bis morgen zahlst, *hängst* du deine Zukunft auf!
  
  Dicono che il boia avesse *impiccato* più di cento uomini in una settimana.
  Man sagt, der Henker habe in einer Woche mehr als hundert Männer *aufgehängt*.
  
  Lasciami *impiccare* questo quadro al muro centrale, così si vede bene.
  Lass mich dieses Bild an der Hauptwand *aufhängen*, dann sieht man es gut.
  
  Nel Medioevo si *impiccava* per molto meno di un reato grave.
  Im Mittelalter *hing* man schon für viel kleinere Verbrechen auf.
