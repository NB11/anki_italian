Rang: 3647
Wort: ribelle
Wortart: n.m
Wort mit Artikel: il ribelle
Femininum / Plural: i ribelli
IPA: ''
Definition: der Rebell, -en
Register: ''
Beispielsätze: |-
  Il *ribelle* ha rifiutato di obbedire agli ordini del suo superiore.
  Der *Rebell* hat sich geweigert, den Befehlen seines Vorgesetzten zu gehorchen.
  
  Anche se aveva solo vent'anni, si comportava come un vero *ribelle* contro le ingiustizie sociali.
  Obwohl er erst zwanzig war, benahm er sich wie ein wahrer *Rebell* gegen soziale Ungerechtigkeiten.
  
  I *ribelli* sono stati accusati di aver organizzato un attentato durante la manifestazione di marzo.
  Die *Rebellen* wurden beschuldigt, einen Anschlag während der Demonstration im März organisiert zu haben.
  
  Se fossi stato un *ribelle* ai miei tempi, probabilmente avrei rotto con tutte le tradizioni familiari.
  Wenn ich zu meiner Zeit ein *Rebell* gewesen wäre, hätte ich wahrscheinlich mit allen Familientraditionen gebrochen.
  
  Il governo cerca di controllare ogni movimento dei *ribelli* che operano nelle paludi del sud.
  Die Regierung versucht, jede Bewegung der *Rebellen* zu kontrollieren, die in den Sümpfen des Südens operieren.
