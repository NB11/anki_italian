Rang: 3391
Wort: diploma
Wortart: n.m
Wort mit Artikel: il diploma
Femininum / Plural: diplomi
IPA: ''
Definition: das Diplom, -e
Register: ''
Beispielsätze: |-
  Dopo aver superato tutti gli esami, ho ricevuto *il diploma* con lode.
  Nach dem Bestehen aller Prüfungen habe ich *das Diplom* mit Auszeichnung erhalten.
  
  Mi hanno detto che *il diploma* di questa scuola è molto riconosciuto all'estero.
  Man hat mir gesagt, dass *das Diplom* dieser Schule im Ausland sehr anerkannt ist.
  
  Avrei voluto *il diploma* prima, ma non mi sono preparato abbastanza per gli esami.
  Ich hätte *das Diplom* früher machen wollen, aber ich habe mich nicht genug auf die Prüfungen vorbereitet.
  
  Nonostante avesse avuto problemi di salute, è riuscito a ottenere *il diploma* lo stesso anno.
  Trotz gesundheitlicher Probleme hat er *das Diplom* im selben Jahr geschafft.
  
  Se avessi studiato di più, oggi potrei vantarmi di avere *un diploma* prestigioso.
  Wenn ich mehr gelernt hätte, könnte ich heute mit einem prestigeträchtigen *Diplom* prahlen.
