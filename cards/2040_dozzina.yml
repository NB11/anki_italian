Wort mit Artikel: la dozzina
Femininum / Plural: dozzine
IPA: ''
Definition: das Dutzend, -e
Register: ''
Beispielsätze: |-
  Ho comprato una *dozzina* di uova al mercato per fare una torta.
  Ich habe ein *Dutzend* Eier auf dem Markt gekauft, um einen Kuchen zu machen.
  
  Ci sono *dozzine* di libri che vorrei leggere prima della fine dell'anno.
  Es gibt *Dutzende* Bücher, die ich vor Ende des Jahres lesen möchte.
  
  Sai che il prezzo dei pomodori è calato solo perché ne hanno appena portate alcune *dozzine* in più?
  Wusstest du, dass der Preis der Tomaten nur deshalb gefallen ist, weil gerade ein paar *Dutzend* mehr gebracht wurden?
  
  Nonostante abbia ordinato due *dozzine* di rose rosse, il fioraio ne ha mandate tre!
  Obwohl ich zwei *Dutzend* rote Rosen bestellt habe, hat mir der Florist drei geschickt!
  
  Se avessi una *dozzina* di mani, potrei fare tutto in un solo pomeriggio!
  Wenn ich ein *Dutzend* Hände hätte, könnte ich alles an einem einzigen Nachmittag erledigen!
