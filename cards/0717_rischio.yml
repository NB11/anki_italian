Rang: 717
Wort: rischio
Wortart: n.m
Wort mit Artikel: il rischio
Femininum / Plural: rischi
IPA: ''
Definition: das Risiko, -s/-i
Register: ''
Beispielsätze: |-
  Nonostante il *rischio*, ho deciso di affrontare quella situazione difficile da solo.
  Trotz des *Risikos* habe ich mich entschieden, diese schwierige Situation allein zu bewältigen.
  
  Se non firmate il contratto entro domani, correrete un *rischio* molto alto di perderlo.
  Wenn ihr den Vertrag nicht bis morgen unterschreibt, geht ihr ein sehr hohes *Risiko* ein, ihn zu verlieren.
  
  Quel medico ha salvato molte vite, ma ogni intervento comporta un *rischio* che non si può ignorare.
  Jener Arzt hat viele Leben gerettet, doch jeder Eingriff birgt ein *Risiko*, das man nicht ignorieren darf.
  
  Mi hanno detto che c'è un *rischio* di pioggia, ma secondo me è solo uno scherzo.
  Sie haben mir gesagt, dass ein *Risiko* für Regen besteht, aber ich glaube, es ist nur ein Spaß.
  
  È stato un *rischio* enorme accettare quel lavoro, ma alla fine ne è valsa la pena perché ho guadagnato molto.
  Es war ein enormes *Risiko*, diese Arbeit anzunehmen, aber am Ende hat es sich gelohnt, weil ich viel verdient habe.
