Rang: 3821
Wort: indicazione
Wortart: n.f
Wort mit Artikel: l'indicazione
Femininum / Plural: indicazioni
IPA: ''
Definition: die Angabe, -n, die Hinweis(e)
Register: ''
Beispielsätze: |-
  L'*indicazione* del medico era chiara: bere molta acqua e riposare.
  Die *Angabe* des Arztes war klar: viel Wasser trinken und sich ausruhen.
  
  Non ho capito l'*indicazione* per arrivare alla stazione, puoi ripetere?
  Ich habe die *Hinweise* zum Bahnhof nicht verstanden, kannst du es wiederholen?
  
  Le *indicazioni* stradali erano state aggiornate dopo il crollo di un ponte.
  Die *Verkehrshinweise* waren nach dem Einsturz einer Brücke aktualisiert worden.
  
  Seguendo le *indicazioni* del GPS, siamo arrivati senza problemi.
  Wenn wir den *Hinweisen* des Navigationsgeräts folgten, kamen wir problemlos an.
  
  Nell'*indicazione* del prodotto c’era scritto che conteneva arachidi.
  Auf der *Zutatenangabe* des Produkts stand geschrieben, dass es Erdnüsse enthielt.
