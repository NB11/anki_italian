Wort mit Artikel: certo
Femininum / Plural: ''
IPA: ''
Definition: sicher, gewiss
Register: ''
Beispielsätze: |-
  Sei *certo* di volere venire con noi?
  Bist du dir *sicher*, dass du mit uns kommen *willst*?
  
  Sì, sono *certo* che arriverò prima.
  Ja, ich bin mir *gewiss*, dass ich früher ankommen *werde*.
  
