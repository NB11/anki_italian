  Aber *natürlich* können wir dir *helfen*!
  
  Non sono *certo* che questo sia il modo giusto.
  Ich bin mir nicht *sicher*, ob das der richtige Weg ist.
  
  Ripetilo, *certo*?
  Wiederhole das, *stimmt’s*? *Sicher*? *Gewiss*?
