Rang: 1476
Wort: gas
Wortart: n.m
Wort mit Artikel: il gas
Femininum / Plural: gasi
IPA: ''
Definition: das Gas, -e
Register: ''
Beispielsätze: |-
  L'autista ha controllato il livello del *gas* nella bombola ma purtroppo era esaurito.
  Der Fahrer hat den *Gas*stand im Tank überprüft, aber er war leider leer.
  
  Le autorità hanno proposto di rilasciare un *gas* per proteggere la foresta dagli incendi.
  Die Behörden haben vorgeschlagen, ein *Gas* freizusetzen, um den Wald vor Bränden zu schützen.
  
  Aspetta che il *gas* si esaurisca del tutto prima di aggiungerne altro nel fornello.
  Warte, bis das *Gas* vollständig verbraucht ist, bevor du mehr in den Herd nachfüllst.
  
  Se il *gas* non arriva entro domani, l’azienda dovrà pagare una multa alle autorità locali.
  Falls das *Gas* bis morgen nicht ankommt, muss das Unternehmen eine Strafe an die örtlichen Behörden zahlen.
  
  Il responsabile della sicurezza ha stabilito che il *gas* deve essere controllato ogni sei mesi per evitare incidenti.
  Der Sicherheitsbeauftragte hat festgelegt, dass das *Gas* alle sechs Monate überprüft werden muss, um Unfälle zu vermeiden.
