Rang: 919
Wort: sognare
Wortart: v
Wort mit Artikel: sognare
Femininum / Plural: ''
IPA: ''
Definition: träumen
Register: ''
Beispielsätze: |-
  Da bambino *sognavo* di diventare un eroe.
  Als Kind habe ich davon *geträumt*, ein Held zu werden.
  
  Se *sognerai* di viaggiare per il mondo, dovrai risparmiare molto denaro.
  Wenn du davon *träumst*, um die Welt zu reisen, wirst du viel Geld sparen müssen.
  
  Nonostante la pressione al lavoro, riesco ancora a *sognare* ad occhi aperti.
  Trotz des *Drucks* bei der Arbeit kann ich mir immer noch etwas ausmalen.
  
  Quando ho visto l’anello, ho capito che *sognavo* ancora di lei.
  Als ich den *Ring* gesehen habe, wurde mir klar, dass ich immer noch von ihr geträumt hatte.
  
  Non *sognare* troppo in grande: basta che tu gestisca bene la situazione attuale.
  Träum nicht zu hoch hinaus: Es reicht, wenn du die aktuelle *Situation* gut behandelst.
