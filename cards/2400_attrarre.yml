Wort: attrarre
Wortart: vt
Wort mit Artikel: attrarre
Femininum / Plural: ''
IPA: ''
Definition: an*ziehen
Register: ''
Beispielsätze: |-
  Il magnete *attrae* i metalli ferrosi con grande forza.
  Der Magnet zieht die eisernen Metalle mit großer Kraft *an*.
  
  Nonostante la preoccupazione, riuscì a *attrarre* l’attenzione della folla per tutta la conferenza.
  Trotz der Sorge gelang es ihm, die Aufmerksamkeit der Menge während der gesamten Konferenz *anzuziehen*.
  
  Se avessimo più tempo, *attrarreste* anche loro al nostro progetto?
  Wenn wir mehr Zeit hätten, würden Sie dann auch andere zu unserem Projekt *ziehen*?
  
  È noto che la luna *attrae* le maree oceaniche ogni giorno.
  Es ist bekannt, dass der Mond täglich die Ozeanströme *anzieht*.
  
  Dopo anni di studio, finalmente è riuscito a *attrarre* l’interesse di un editore importante.
  Nach Jahren des Studiums ist es ihm endlich gelungen, das Interesse eines großen Verlegers *anzuziehen*.
