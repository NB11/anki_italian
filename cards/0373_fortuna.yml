Rang: 373
Wort: fortuna
Wortart: n.f
Wort mit Artikel: la fortuna
Femininum / Plural: fortune
IPA: ''
Definition: das Glück, die Fortune, das Schicksal
Register: ''
Beispielsätze: |-
  La *fortuna* ti sorride oggi!
  Das *Glück* lächelt dich heute zu!
  
  Non credere alla *fortuna*, credi al duro lavoro.
  Glaube nicht an das *Glück*, glaube an harte Arbeit.
  
  Abbiamo avuto una *fortuna* sfacciata ieri al casinò.
  Wir hatten *Glück* ohne Ende gestern im Casino.
  
  Se avessi saputo della sua *fortuna*, avrei accettato l'offerta.
  Wenn ich sein *Vermögen* gekannt hätte, hätte ich das Angebot angenommen.
  
  Che *fortuna* che hai trovato un parcheggio libero!
  Was für ein *Glück*, dass du einen freien Parkplatz gefunden hast!
