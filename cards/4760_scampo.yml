Rang: 4760
Wort: scampo
Wortart: n.m
Wort mit Artikel: lo scampo
Femininum / Plural: gli scampi
IPA: ''
Definition: der Ausweg, m
Register: ''
Beispielsätze: |-
  Non c'è *scampo* da questa situazione difficile.
  Es gibt keinen *Ausweg* aus dieser schwierigen Situation.
  
  Vorrei sapere se esiste uno *scampo* a questo problema.
  Ich würde gerne wissen, ob es einen *Ausweg* für dieses Problem gibt.
  
  Dopo lunghe riflessioni, trovò *lo scampo* che cercava in un altro paese.
  Nach langem Nachdenken fand er den *Ausweg*, den er suchte, in einem anderen Land.
  
  Se non troviamo *lo scampo* giusto, la situazione peggiorerà.
  Wenn wir nicht den richtigen *Ausweg* finden, wird sich die Lage verschlimmern.
  
  Hanno proposto un piano, ma ancora non sappiamo se sia davvero *lo scampo* necessario.
  Sie haben einen Plan vorgeschlagen, aber wir wissen noch nicht, ob es wirklich der nötige *Ausweg* ist.
