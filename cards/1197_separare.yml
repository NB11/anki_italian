Rang: 1197
Wort: separare
Wortart: vt
Wort mit Artikel: separare
Femininum / Plural: ''
IPA: ''
Definition: trennen, absondern, unterteilen
Register: ''
Beispielsätze: |-
  Dopo la *separazione* dei due paesi, dobbiamo ricostruire le relazioni diplomatiche.
  Nach der *Trennung* der zwei Länder müssen wir die diplomatischen Beziehungen wieder aufbauen.
  
  Credo che tu debba *separare* le uova prima di fare la frittata.
  Ich glaube, du musst die *Eier* trennen, bevor du das Omelett machst.
  
  La polizia ha deciso di *separare* i manifestanti in gruppi più piccoli per evitare scontri.
  Die Polizei hat beschlossen, die Demonstranten in kleinere *Gruppen* zu trennen, um Konflikte zu vermeiden.
  
  Se *separerai* le attività in base all’area geografica, la gestione sarà più semplice.
  Wenn du die *Tätigkeiten* nach dem Gebiet trennst, wird die Verwaltung einfacher sein.
  
  Nonostante il sesso, vogliamo *separare* la valutazione delle candidature dalla provenienza regionale.
  Trotz des *Geschlechts* wollen wir die Bewertung der Bewerbungen von der regionalen Herkunft trennen.
