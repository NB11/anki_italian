Rang: 1869
Wort: fattoria
Wortart: n.f
Wort mit Artikel: la fattoria
Femininum / Plural: fattorie
IPA: ''
Definition: der Bauernhof, -höfe
Register: ''
Beispielsätze: |-
  Mio nonno possiede una *fattoria* nel nord della Toscana.
  Mein Opa besitzt einen *Bauernhof* im Norden der Toskana.
  
  Durante la *fattoria* abbiamo imparato come si munge una mucca.
  Während des Besuchs auf dem *Bauernhof* haben wir gelernt, wie man eine Kuh melkt.
  
  Se avessi più tempo, vorrei vivere in una *fattoria* e coltivare le mie verdure.
  Wenn ich mehr Zeit hätte, würde ich auf einem *Bauernhof* leben und mein eigenes Gemüse anbauen.
  
  La *fattoria* che abbiamo visitato ieri si chiamava "Poggio Verde".
  Der *Bauernhof*, den wir gestern besucht haben, hieß "Poggio Verde".
  
  Nonostante le difficoltà, lui continua a gestire la sua *fattoria* con passione.
  Trotz der *Schwierigkeiten* führt er seinen Bauernhof weiterhin mit Leidenschaft.
