Rang: 314
Wort: affare
Wortart: n.m
Wort mit Artikel: l'affare
Femininum / Plural: gli affari
IPA: ''
Definition: die Sache, die Angelegenheit, das Geschäft
Register: ''
Beispielsätze: |-
  Questo è un *affare* molto importante per la nostra azienda.
  Das ist eine *Sache* von großer Bedeutung für unser Unternehmen.
  
  Gli *affari* vanno bene ultimamente?
  Gehen die *Geschäfte* in letzter Zeit gut?
  
  Ha risolto l'*affare* in pochi giorni.
  Er hat die *Angelegenheit* in wenigen Tagen geregelt.
  
  Non mi occupo mai dei loro *affari* privati.
  Ich kümmere mich nie um ihre *privaten Angelegenheiten*.
  
  Che *affare* strano! Non capisco cosa stia succedendo.
  Was für eine *merkwürdige Sache*! Ich verstehe nicht, was hier passiert.
