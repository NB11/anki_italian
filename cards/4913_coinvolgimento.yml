  Avrei voluto un maggiore *coinvolgimento* da parte della squadra durante l’allenamento.
  Ich hätte mir eine stärkere *Beteiligung* des Teams beim Training gewünscht.
  
  Il suo *coinvolgimento* emotivo nella storia ha commosso tutti gli spettatori.
