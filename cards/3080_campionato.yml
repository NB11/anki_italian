Beispielsätze: |-
  Il *campionato* di calcio inizia domani alle 15:00.
  Die *Meisterschaft* im Fußball beginnt morgen um 15:00.
  
  Giovanni ha vinto il *campionato* regionale due anni fa.
  Giovanni hat die regionale *Meisterschaft* vor zwei Jahren gewonnen.
  
  Nonostante la sconfitta, la squadra ha lottato per tutto il *campionato*.
  Trotz der Niederlage hat das Team während der gesamten *Meisterschaft* gekämpft.
  
  Quando avrai finito gli studi, vorresti seguire un *campionato* di basket?
  Wenn du mit dem Studium fertig bist, würdest du gern eine *Meisterschaft* im Basketball verfolgen?
  
  Il giornale scrive che il *campionato* sarà più lungo del solito a causa delle piogge.
  Die Zeitung schreibt, dass die *Meisterschaft* wegen der Regenfälle länger als üblich dauern wird.
