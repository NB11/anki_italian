Rang: 1117
Wort: contratto
Wortart: n.m
Wort mit Artikel: il contratto
Femininum / Plural: contratti
IPA: ''
Definition: der Vertrag, -¨e
Register: ''
Beispielsätze: |-
  Ho firmato un *contratto* di lavoro ieri mattina.
  Ich habe gestern Morgen einen *Vertrag* unterschrieben.
  
  Il *contratto* scade tra due settimane, quindi dobbiamo rinnovarlo.
  Der *Vertrag* läuft in zwei Wochen ab, also müssen wir ihn verlängern.
  
  Nonostante fossimo d'accordo, lui ha modificato alcune clausole del *contratto* senza dirmi nulla.
  Obwohl wir uns einig waren, hat er einige Klauseln des *Vertrags* ohne mein Wissen geändert.
  
  Prima di firmare, leggi attentamente ogni pagina del *contratto* per evitare sorprese.
  Lies vor dem Unterschreiben jedes Blatt des *Vertrags* sorgfältig, um böse Überraschungen zu vermeiden.
  
  Se non rispetti i termini del *contratto*, rischi di dover pagare delle penali.
  Wenn du die Bedingungen des *Vertrags* nicht einhältst, riskierst du, Strafgebühren zahlen zu müssen.
