Rang: 2518
Wort: respingere
Wortart: vt
Wort mit Artikel: respingere
Femininum / Plural: ''
IPA: ''
Definition: zurückweisen, abweisen
Register: ''
Beispielsätze: |-
  Il governo ha *respinto* la proposta di legge perché non era abbastanza concreta.
  Die Regierung hat den Gesetzesentwurf *zurückgewiesen*, weil er nicht konkret genug war.
  
  Se *respingi* il suo aiuto, lui si offenderà talmente che non ti parlerà mai più.
  Wenn du seine Hilfe *abweist*, wird er sich derartig beleidigt fühlen, dass er nie wieder mit dir sprechen wird.
  
  Nonostante le critiche, il regista non ha voluto *respingere* il progetto che aveva progettato con tanta passione.
  Trotz der Kritik wollte der Regisseur das Projekt, das er so leidenschaftlich *konzipiert* hatte, nicht zurückweisen.
  
  È meglio *respingere* le persone che ci manipolano, anche se ci lusingano con parole piacevoli.
  Es ist besser, Menschen, die uns manipulieren, *abzuweisen*, auch wenn sie uns mit angenehmen Worten schmeicheln.
  
  Il giudice dovrà *respingere* la richiesta di scarcerazione se il detenuto non dimostra di essere degno di fiducia.
  Der Richter muss den Antrag auf Freilassung *zurückweisen*, wenn der Häftling nicht zeigt, dass er des Vertrauens würdig ist.
