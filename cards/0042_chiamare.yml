Wort mit Artikel: chiamare
Femininum / Plural: ''
IPA: ''
Definition: rufen, nennen, anrufen
Register: ''
Beispielsätze: |-
  Devo *chiamare* mio fratello stasera.
  Ich muss *meinen* Bruder heute Abend *anrufen*.
  
  Come ti *chiami*?
  Wie *heißt* du?
  
  Loro *chiamano* sempre la mamma con affetto.
  Sie *nennen* die Mama immer liebevoll.
  
  Se *chiamassi* aiuto, arriverebbero subito.
  Wenn du um *Hilfe* *rufen* würdest, wären sie sofort da.
  
  Perché non hai *chiamato* il medico prima?
  Warum hast du den Arzt nicht früher *gerufen*?
