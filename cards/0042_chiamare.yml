Rang: 42
Wort: chiamare
Wortart: vt
Wort mit Artikel: chiamare
Femininum / Plural: ''
IPA: ''
Definition: rufen, anrufen, nennen
Register: ''
Beispielsätze: |-
  Sto *chiamando* mio fratello, ma non risponde.
  Ich *rufe* meinen Bruder an, aber er antwortet nicht.
  
  Perché non *chiami* un dottore quando non stai bene?
  Warum *rufst du* keinen Arzt an, wenn es dir nicht gut geht?
  
  Dopo l’incidente lo hanno *chiamato* al telefono.
  Nach dem Unfall haben sie ihn *angerufen*.
  
  Nel futuro *chiamerò* mio figlio Marco.
  In Zukunft *werde ich* meinen Sohn Marco *nennen*.
  
  Se fossi in te, *chiamerei* subito la polizia.
  Wenn ich du wäre, *würde ich* sofort die Polizei *rufen*.
