Rang: 3251
Wort: facoltà
Wortart: n.f
Wort mit Artikel: la facoltà
Femininum / Plural: facoltà
IPA: ''
Definition: die Fakultät, -en
Register: ''
Beispielsätze: |-
  Mio fratello si è iscritto alla *facoltà* di Medicina perché vuole diventare medico.
  Mein Bruder hat sich an der *Fakultät* für Medizin eingeschrieben, weil er Arzt werden will.
  
  In questa *facoltà* ci sono molti studenti stranieri, soprattutto dall'Asia.
  An dieser *Fakultät* gibt es viele ausländische Studenten, vor allem aus Asien.
  
  La *facoltà* di Economia ha organizzato un seminario sugli investimenti internazionali.
  Die *Fakultät* für Wirtschaftswissenschaften hat ein Seminar zu internationalen Investitionen organisiert.
  
  Dopo quattro anni alla *facoltà* di Giurisprudenza, ho finalmente ricevuto il mio certificato di laurea.
  Nach vier Jahren an der *Fakultät* für Jura habe ich endlich mein Abschlusszeugnis erhalten.
  
  Nonostante la *facoltà* sia molto impegnativa, molti studenti riescono a laurearsi in tempo.
  Obwohl die *Fakultät* sehr anspruchsvoll ist, schaffen es viele Studenten, rechtzeitig ihren Abschluss zu machen.
