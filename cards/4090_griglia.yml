Beispielsätze: |-
  Mi piace cucinare sulla *griglia* in giardino.
  Ich koche gern auf dem *Grill* im Garten.
  
  Ha dipinto un quadro con una *griglia* sottile sopra.
  Er hat ein Gemälde mit einem feinen *Gitter* darüber gemalt.
  
  Nonostante la *griglia* arrugginita, funziona ancora bene.
  Trotz des *rostigen Gitters* funktioniert es noch gut.
  
  Vor l'ho pulita accuratamente per eliminare ogni residuo di cibo.
  Vorher habe ich sie sorgfältig gereinigt, um jeden *Speiserest* zu entfernen.
  
  La *griglia* del parcheggio sembra troppo stretta per la mia macchina.
  Das *Parkplatzgitter* scheint zu eng für mein Auto zu sein.
