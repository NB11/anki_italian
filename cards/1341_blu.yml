Beispielsätze: |-
  Ho comprato una maglietta *blu* che si abbina perfettamente al tuo vestito particolare di sabato scorso.
  Ich habe ein *blaues* T-Shirt gekauft, das perfekt zu deinem besonderen Kleid vom letzten Samstag passt.
  
  Nonostante il pessimo tempo, il cielo al tramonto era di un *blu* intenso e straordinario.
  Trotz des *miserablen* Wetters war der Himmel bei Sonnenuntergang von einem tiefblauen und außergewöhnlichen Blau.
  
  L’ispettore ha osservato il lago da lontano: le sue acque cristalline riflettevano un *blu* quasi irreale.
  Der Inspektor beobachtete den See aus der Ferne: Sein kristallklares Wasser spiegelte ein fast unwirkliches *Blau*.
  
  Se domani avrò voglia di cambiare aria, forse andrò in un albergo sul mare con una stanza dalle pareti *blu* acceso.
  Wenn ich morgen Lust auf einen Luftwechsel habe, gehe ich vielleicht in ein Hotel am Meer mit einem Zimmer mit leuchtend *blauen* Wänden.
  
  Chiunque abbia visto il suo *blu* preferito nei suoi dipinti sa che il pittore aveva un talento davvero unico.
  Wer ihr bevorzugtes *Blau* in ihren Gemälden gesehen hat, weiß, dass die Malerin ein wirklich einzigartiges Talent besaß.
