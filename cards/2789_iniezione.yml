Rang: 2789
Wort: iniezione
Wortart: n.f
Wort mit Artikel: l'iniezione
Femininum / Plural: iniezioni
IPA: ''
Definition: die Spritze, -n
Register: ''
Beispielsätze: |-
  Il medico ha deciso di fare un'*iniezione* al paziente per alleviare il dolore.
  Der Arzt hat beschlossen, dem Patienten eine *Spritze* zu geben, um den Schmerz zu lindern.
  
  Dopo l'*iniezione*, la ferita è diventata meno sensibile.
  Nach der *Spritze* ist die Wunde weniger empfindlich geworden.
  
  Se avessi saputo che serviva un'*iniezione*, avrei portato con me la tessera sanitaria.
  Wenn ich gewusst hätte, dass eine *Spritze* nötig ist, hätte ich die Krankenversicherungskarte mitgenommen.
  
  L’infermiera sta preparando un’*iniezione* per il paziente che ha appena subito un intervento chirurgico.
  Die Krankenschwester bereitet gerade eine *Spritze* für den Patienten vor, der gerade operiert wurde.
  
  Nonostante la paura dell’*iniezione*, Marco ha accettato di farsi visitare dal dottore.
  Trotz der Angst vor der *Spritze* hat Marco zugestimmt, sich vom Arzt untersuchen zu lassen.
