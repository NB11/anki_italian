Rang: 2296
Wort: determinare
Wortart: vt
Wort mit Artikel: determinare
Femininum / Plural: ''
IPA: ''
Definition: bestimmen, festlegen, ermitteln
Register: ''
Beispielsätze: |-
  Gli scienziati cercano di *determinare* l'origine di questa malattia rara.
  Die Wissenschaftler versuchen den *Ursprung* dieser seltenen Krankheit zu ermitteln.
  
  Il giudice dovrà *determinare* le condizioni per la scarcerazione del detenuto.
  Der Richter wird die *Bedingungen* für die Freilassung des Gefangenen festlegen müssen.
  
  Non abbiamo ancora *determinato* chi dei due vincerà la gara domani.
  Wir haben noch nicht *bestimmt*, wer von beiden morgen das Rennen gewinnt.
  
  I tecnici hanno *determinato* che il problema è nel software e non nell'hardware.
  Die Techniker haben *festgestellt*, dass das Problem in der Software und nicht in der Hardware liegt.
  
  Se vuoi *determinare* la rotta, usa una bussola magnetica.
  Wenn du die *Route* bestimmen willst, nimm einen Kompass.
Audio: ''
Notiz: ''
Dispersion: ''
