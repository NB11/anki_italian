Rang: 116
Wort: servire
Wortart: vi
Wort mit Artikel: servire
Femininum / Plural: ''
IPA: ''
Definition: dienen, nützlich sein, servieren
Register: ''
Beispielsätze: |-
  Per viaggiare in Italia, *serve* un passaporto valido.
  Um nach Italien zu reisen, *braucht man* einen gültigen *Reisepass*.
  
  Ho *servito* la cena alle otto di sera.
  Ich habe das *Abendessen* um acht Uhr *serviert*.
  
  A che ora *servono* la colazione in questo albergo?
  Um wie viel Uhr *wird das Frühstück* in diesem Hotel *serviert*?
  
  Non *mi serve* aiuto per risolvere questo problema.
  Ich *brauche* keine *Hilfe*, um dieses Problem zu lösen.
  
  Se non *servisse* a nulla, perché lo stai facendo?
  Wenn es zu nichts *nütze* wäre, warum tust du es dann?
