Rang: 253
Wort: comprare
Wortart: vt
Wort mit Artikel: comprare
Femininum / Plural: ''
IPA: ''
Definition: kaufen, erwerben
Register: ''
Beispielsätze: |-
  Dove *compri* i libri di testo per la scuola?
  Wo *kaufst* du die Lehrbücher für die Schule?
  
  Ho *comprato* un nuovo smartphone ieri.
  Ich habe gestern ein neues Smartphone *gekauft*.
  
  Se avessi più soldi, *comprerei* una macchina nuova.
  Wenn ich mehr Geld hätte, würde ich mir ein neues Auto *kaufen*.
  
  Mia sorella *compra* sempre vestiti di seconda mano.
  Meine Schwester kauft immer Secondhand-Kleidung.
  
  Che ne pensi: dovremmo *comprare* una casa al mare o in montagna?
  Was meinst du: sollten wir ein Haus am Meer oder in den Bergen *kaufen*?
