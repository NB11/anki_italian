Wort: stanotte
Wortart: adv
Wort mit Artikel: stanotte
Femininum / Plural: ''
IPA: ''
Definition: heute Nacht, in dieser Nacht
Register: ''
Beispielsätze: |-
  Ha chiamato *stanotte* per dire che arriva tardi.
  Er hat *heute Nacht* angerufen, um zu sagen, dass er später ankommt.
  
  Se non dormi *stanotte*, domani sarai stanco.
  Wenn du *heute Nacht* nicht schläfst, wirst du morgen müde sein.
  
  Spero che *stanotte* non succeda nulla di strano a causa del temporale.
  Ich hoffe, dass *in dieser Nacht* nichts Seltsames wegen des Sturms passiert.
  
  Ho studiato fino a tardi per l’esame, ma *stanotte* dormo almeno otto ore.
  Ich habe bis spät für die Prüfung gelernt, aber *heute Nacht* schlafe ich mindestens acht Stunden.
  
  Il computer si è spento *stanotte* senza motivo, e ho perso tutto il lavoro.
  Der *Computer* hat sich heute Nacht ohne Grund ausgeschaltet, und ich habe die ganze Arbeit verloren.
