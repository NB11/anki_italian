Wort: affitto
Wortart: n.m
Wort mit Artikel: l'affitto
Femininum / Plural: affitti
IPA: ''
Definition: die Miete, -n
Register: ''
Beispielsätze: |-
  L'*affitto* di questo appartamento è troppo alto per me.
  Die *Miete* dieser Wohnung ist für mich zu hoch.
  
  Ho firmato il contratto per l'*affitto* della casa al mare.
  Ich habe den Vertrag für die *Miete* des Hauses am Meer unterschrieben.
  
  Spero di trovare un *affitto* più economico il mese prossimo.
  Ich hoffe, nächsten Monat eine günstigere *Miete* zu finden.
  
  Il proprietario ha aumentato l'*affitto* del 10%, ma gli inquilini si sono lamentati.
  Der Vermieter hat die *Miete* um 10% erhöht, doch die Mieter haben sich beschwert.
  
  Prima di firmare, controlla sempre l'importo dell'*affitto* nel contratto.
  Bevor du unterschreibst, prüfe immer den Betrag der *Miete* im Vertrag.
