Rang: 2082
Wort: leggenda
Wortart: n.f
Wort mit Artikel: la leggenda
Femininum / Plural: le leggende
IPA: ''
Definition: die Legende, -n
Register: ''
Beispielsätze: |-
  La *leggenda* racconta che un drago viveva in questa valle.
  Die *Legende* erzählt, dass ein Drache in diesem Tal lebte.
  
  Secondo la *leggenda* locale, il tesoro è ancora nascosto nel bosco.
  Laut der örtlichen *Legende* ist der Schatz noch immer im Wald versteckt.
  
  Non credo affatto alle *leggende* sui fantasmi di questo castello.
  Ich glaube überhaupt nicht an die *Legenden* über die Geister dieses Schlosses.
  
  La *leggenda* narra di un eroe che sconfisse un mostro con l’aiuto di un mago.
  Die *Legende* berichtet von einem Helden, der mit Hilfe eines Zauberers ein Monster besiegte.
  
  Molte *leggende* antiche parlano di creature mitologiche che governavano il mondo.
  Viele alte *Legenden* erzählen von mythologischen Wesen, die die Welt regierten.
