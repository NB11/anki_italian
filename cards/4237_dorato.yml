Rang: 4237
Wort: dorato
Wortart: adj
Wort mit Artikel: dorato
Femininum / Plural: ''
IPA: ''
Definition: golden, vergoldet, goldfarben
Register: ''
Beispielsätze: |-
  Il sole al tramonto ha dipinto il cielo di un rosa *dorato*.
  Die untergehende Sonne hat den Himmel in ein *goldenes* Rosa getaucht.
  
  Indossava un abito *dorato* che brillava sotto le luci della sala.
  Sie trug ein *goldenes* Kleid, das unter den Lichtern des Saales glänzte.
  
  Le sue labbra sembravano quasi *dorate* dopo aver mangiato la carota candita.
  Ihre Lippen wirkten fast *golden*, nachdem sie die kandierte Karotte gegessen hatte.
  
  L’oro *dorato* della corona risplendeva alla luce delle torce.
  Das *vergoldete* Gold der Krone leuchtete im Licht der Fackeln.
  
  Avrei preferito un tessuto meno pacchiano, ma era tutto quello che avevano in *dorato*!
  Ich hätte mir einen weniger grellen Stoff gewünscht, doch das Einzige, was sie in *goldener* Farbe hatten, war das hier!
