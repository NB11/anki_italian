Rang: 1692
Wort: conta
Wortart: n.m
Wort mit Artikel: il conta
Femininum / Plural: conti
IPA: ''
Definition: die Erzählung, -en; die Geschichte, die Geschichte
Register: ''
Beispielsätze: |-
  Mi ha raccontato un *conta* molto divertente sulla scimmia che rubava i biscotti dalla cassetta.
  Er hat mir eine sehr lustige *Geschichte* über den Affen erzählt, der die Kekse aus der Schachtel stahl.
  
  Nonostante il pazzesco rumore degli urli in *conta*, il papa ha continuato a tacere e pregare intorno alla piscina.
  Trotz des verrückten Lärms der *Geschichten* in den Schreien schwieg der Papst und betete weiterhin um das Schwimmbad herum.
  
  Il segretario ha riferito che la *conta* dei voti nella giuria risulta eccellente, pur essendo ancora in discussione.
  Der Sekretär berichtete, dass die *Auszählung* der Stimmen in der Jury hervorragend sich herausstellt, obwohl sie noch diskutiert wird.
  
  Il cittadino ha chiesto al simpatico allenatore quale *conta* sia più utile per allenare il football, mă pur non sa distinguere tra le due.
  Der Bürger hat den netten Trainer gefragt, welche *Erzählung* nützlicher ist, um Fußball zu trainieren, obwohl er die beiden nicht unterscheiden kann.
  
  Quando il fantasma ha spaccato il regno, nessuno ha osato assistere alla *conta* dei danni, ma il reggente ha premuto forte per ottenere un intervento urgente.
  Als der Geist das Königreich *zerbrach*, wagte es niemand, bei der Erzählung der Schäden dabei zu sein, doch der Regent hat hart gedrückt, um einen dringenden Einsatz zu erwirken.
