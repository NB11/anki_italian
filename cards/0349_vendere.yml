Femininum / Plural: ''
IPA: ''
Definition: verkaufen
Register: ''
Beispielsätze: |-
  Mio fratello *vende* macchine usate.
  Mein Bruder *verkauft* gebrauchte Autos.
  
  Hai *venduto* la tua vecchia bicicletta ieri?
  Hast du dein altes Fahrrad gestern *verkauft*?
  
  Se avessi più tempo, *venderei* anche questa casa.
  Wenn ich mehr Zeit hätte, *würde ich* auch dieses Haus *verkaufen*.
  
  Non appena troveremo un acquirente, *venderemo* il negozio.
  Sobald wir einen Käufer finden, *werden wir* den Laden *verkaufen*.
  
  È importante che lui *venda* i biglietti prima che finiscano.
  Es ist wichtig, dass er die Tickets *verkauft*, bevor sie ausverkauft sind.
