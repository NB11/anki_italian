Rang: 3022
Wort: costituire
Wortart: v
Wort mit Artikel: costituire
Femininum / Plural: ''
IPA: ''
Definition: bilden, einrichten, darstellen
Register: ''
Beispielsätze: |-
  Questo progetto *costituisce* una grande opportunità per la nostra azienda.
  Dieses Projekt *stellt* eine große Chance für unser Unternehmen dar.
  
  L’accordo *costituiva* la base per una collaborazione duratura tra i due paesi.
  Die Vereinbarung *bildete* die Grundlage für eine dauerhafte Zusammenarbeit zwischen den beiden Ländern.
  
  Secondo la normativa vigente, ogni società *costituisce* un’entità giuridica indipendente.
  Laut der geltenden Vorschriften *bildet* jede Gesellschaft eine eigenständige juristische Einheit.
  
  La commissione ha dichiarato che questo incarico *costituirebbe* un conflitto d’interessi.
  Die Kommission erklärte, dass diese Aufgabe einen Interessenkonflikt *darstellen würde*.
  
  Se non fosse per questa clausola, la situazione attuale *costituirebbe* un precedente pericoloso.
  Wenn es diese Klausel nicht gäbe, würde die aktuelle Situation einen gefährlichen Präzedenzfall *bilden*.
