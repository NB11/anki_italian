Rang: 1712
Wort: stendere
Wortart: v
Wort mit Artikel: stendere
Femininum / Plural: ''
IPA: ''
Definition: ausbreiten, dehnen, strecken
Register: ''
Beispielsätze: |-
  Per asciugare i panni veloce, dovresti *stendere* la biancheria in un luogo soleggiato.
  Um die Wäsche schnell zu trocknen, solltest du die Wäsche an einem sonnigen Ort *ausbreiten*.
  
  Non *stendere* troppo l’elastico, altrimenti si romperà.
  Dehne das Gummiband nicht zu sehr, sonst zerreißt es.
  
  Se avessi preparato tutto ieri, oggi non dovresti *stendere* i documenti con tanta fretta.
  Wenn du alles gestern vorbereitet hättest, müsstest du die Dokumente heute nicht mit so großer Eile *ausbreiten*.
  
  Ha detto che *stenderà* l’invito sul tavolo della sala da pranzo.
  Er hat gesagt, dass er die Einladung auf dem Esstisch *ausbreiten* wird.
  
  Nonostante fosse stanco, continuò a *stendere* la pasta per la pizza con pazienza.
  Trotz Müdigkeit breitete er den Pizzateig weiterhin geduldig aus.
