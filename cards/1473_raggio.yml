Rang: 1473
Wort: raggio
Wortart: n.m
Wort mit Artikel: il raggio
Femininum / Plural: raggi
IPA: ''
Definition: der Strahl, -en
Register: ''
Beispielsätze: |-
  Il *raggio* di sole entra dalla finestra e illumina la stanza.
  Der *Strahl* der Sonne kommt durch das Fenster und erleuchtet den Raum.
  
  Non mi piace quando mi punta il *raggio* della torcia direttamente negli occhi.
  Ich mag es nicht, wenn jemand mir den *Strahl* einer Taschenlampe direkt in die Augen richtet.
  
  Hanno misurato il *raggio* della Terra con una precisione straordinaria.
  Man hat den *Radius* der Erde mit außergewöhnlicher Präzision gemessen.
  
  Vorresti venire con me al concerto domani? Ho già due *raggi* per lo spettacolo!
  Möchtest du mit mir morgen zum Konzert kommen? Ich habe bereits zwei *Tickets* für die Show!
  
  Il *raggio* cosmico ha attraversato l’atmosfera senza causare danni.
  Der kosmische *Strahl* ist durch die Atmosphäre gedrungen, ohne Schäden zu verursachen.
