Rang: 4487
Wort: investitore
Wortart: n.m
Wort mit Artikel: l'investitore
Femininum / Plural: gli investitori
IPA: ''
Definition: der Investor, -en
Register: ''
Beispielsätze: |-
  L'*investitore* ha acquistato azioni per diversificare il suo portafoglio.
  Der *Investor* hat Aktien gekauft, um sein Portfolio zu diversifizieren.
  
  Spero che l'*investitore* non sia stato ingannato dalla sua frustrante esperienza precedente.
  Ich hoffe, dass der *Investor* nicht von seiner enttäuschenden vorherigen Erfahrung getäuscht worden ist.
  
  Se fossi l'*investitore*, non rischierei tutto il capitale in un solo progetto, malgrado le promesse ottimistiche.
  Wenn ich der *Investor* wäre, würde ich nicht das gesamte Kapital in nur ein Projekt stecken, trotzdem die optimistischen Versprechungen.
  
  La strategia dell'*investitore* si basa su dati economici e non su sballi momentanei.
  Die Strategie des *Investors* basiert auf wirtschaftlichen Daten und nicht auf momentanen Spaß.
  
  Nonostante le interferenze del governo, l'*investitore* è riuscito a ottenere profitti consistenti.
  Trotz der Einmischungen der Regierung ist es dem *Investor* gelungen, stabile Gewinne zu erzielen.
