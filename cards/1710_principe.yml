Rang: 1710
Wort: principe
Wortart: adj
Wort mit Artikel: principe
Femininum / Plural: ''
IPA: ''
Definition: vortrefflich, vorzüglich
Register: ''
Beispielsätze: |-
  Questo vino è davvero *principe*, uno dei migliori che abbia mai assaggiato.
  Dieser Wein ist wirklich *vorzüglich*, einer der besten, die ich je probiert habe.
  
  La sua performance è stata *principe*, tanto che tutti gli spettatori hanno applaudito a lungo.
  Seine Performance war *vortrefflich*, sodass das Publikum lange Beifall klatschte.
  
  Nonostante le difficoltà, ha offerto una soluzione *principe* al problema.
  Trotz der Schwierigkeiten bot er eine *vortreffliche* Lösung für das Problem an.
  
  I critici hanno definito il suo romanzo un capolavoro *principe*.
  Die Kritiker bezeichneten seinen Roman als ein *vortreffliches* Meisterwerk.
  
  Era un piatto semplice, ma preparato in modo *principe* con ingredienti freschi e speziati.
  Es war ein einfaches Gericht, aber *vortrefflich* zubereitet mit frischen und würzigen Zutaten.
