Rang: 876
Wort: fuggire
Wortart: vi
Wort mit Artikel: fuggire
Femininum / Plural: ''
IPA: ''
Definition: fliehen, entkommen, entfliehen
Register: ''
Beispielsätze: |-
  Il prigioniero riuscì finalmente a *fuggire* dalla prigione con l'aiuto di un amico.
  Der Gefangene konnte endlich aus dem Gefängnis *entkommen* mit Hilfe eines Freundes.
  
  Appena sentì il cane abbaiare, il ladro cominciò a *fuggire* per i vicoli del quartiere.
  Sobald er den Hund bellen hörte, begann der Dieb durch die Gassen des Viertels zu *fliehen*.
  
  Se avessi saputo che sarebbe venuto anche lui, avrei cercato di *fuggire* prima dell'arrivo.
  Wenn ich gewusst hätte, dass auch er kommen würde, hätte ich versucht, vor seiner Ankunft zu *entfliehen*.
  
  È meglio che tu vada via ora, prima che qualcuno si accorga di quello che hai fatto e decida di *fuggire*.
  Du solltest jetzt besser gehen, bevor jemand bemerkt, was du getan hast, und beschließt zu *fliehen*.
  
  Dicono che nel bosco vicino al lago ci sia un animale che ogni notte cerca di *fuggire* dalla fame.
  Man sagt, im Wald nahe dem See gebe es ein Tier, das jede Nacht versucht, vor dem Hunger zu *entkommen*.
