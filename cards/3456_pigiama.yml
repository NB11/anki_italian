Rang: 3456
Wort: pigiama
Wortart: n.m
Wort mit Artikel: il pigiama
Femininum / Plural: pigiami
IPA: ''
Definition: der Schlafanzug, -anzüge
Register: ''
Beispielsätze: |-
  Dopo una lunga giornata di lavoro, indosso sempre *il pigiama* e mi rilasso sul divano.
  Nach einem langen Arbeitstag ziehe ich immer *den Schlafanzug* an und entspanne mich auf dem Sofa.
  
  Ieri sera ho dimenticato di indossare *il pigiama* e ho dormito vestito, ma oggi ho speso ore a cercare di togliere le macchie.
  Gestern Abend habe ich vergessen, *den Schlafanzug* anzuziehen, und habe angezogen geschlafen, aber heute habe ich Stunden damit verbracht, die Flecken zu entfernen.
  
  Quando ero piccolo, mia nonna mi cuciva sempre *il pigiama* per Natale: era un regalo che aspettavo con grande entusiasmo.
  Als ich klein war, nähte meine Oma mir immer *den Schlafanzug* zu Weihnachten – ein Geschenk, auf das ich mich sehr freute.
  
  Nonostante fuori ci siano 40 gradi, mio fratello si ostina a dormire con *il pigiama*: dice che lo fa sentire protetto.
  Obwohl draußen 40 Grad sind, besteht mein Bruder darauf, mit *dem Schlafanzug* zu schlafen – er sagt, das gebe ihm ein Gefühl von Sicherheit.
  
  Se vuoi venire a dormire da me, porta *il pigiama*: in inverno fa freddo e preferisco non scaldare troppo la stanza.
  Wenn du bei mir schlafen kommen willst, bring *den Schlafanzug* mit: Im Winter ist es kalt und ich möchte das Zimmer nicht zu sehr heizen.
