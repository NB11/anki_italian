Rang: 2986
Wort: irruzione
Wortart: n.f
Wort mit Artikel: la irruzione
Femininum / Plural: irruzioni
IPA: ''
Definition: der Einbruch, -¨e
Register: ''
Beispielsätze: |-
  La polizia ha reagito immediatamente all’*irruzione* dei ladri in banca.
  Die Polizei reagierte sofort auf den *Einbruch* der Diebe in die Bank.
  
  Non appena si sentì un rumore, avvertii un senso di pericolo: era l’*irruzione* del temporale nella mia serenità.
  Sobald ich ein Geräusch hörte, spürte ich Gefahr: Es war das *Durchbrechen* des Sturms in meine Ruhe.
  
  Dopo *l’irruzione* dell’esercito nemico, il paese dovette essere evacuato velocemente.
  Nach dem *Einmarsch* der feindlichen Armee musste das Land schnell evakuiert werden.
  
  L’*irruzione* dei soldati nel villaggio ha causato una grande confusione tra la popolazione locale.
  Der *Einfall* der Soldaten in das Dorf verursachte große Verwirrung bei der einheimischen Bevölkerung.
  
  L’*irruzione* dell’acqua nel seminterrato ha danneggiato tutti i documenti importanti.
  Der *Einbruch* des Wassers in den Keller hat alle wichtigen Dokumente beschädigt.
