Rang: 1708
Wort: emozione
Wortart: n.f
Wort mit Artikel: l'emozione
Femininum / Plural: emozioni
IPA: ''
Definition: das Gefühl, -e
Register: ''
Beispielsätze: |-
  Provo un'*emozione* intensa ogni volta che vedo questo film.
  Ich spüre jedes Mal ein *Gefühl* der Intensität, wenn ich diesen Film sehe.
  
  Nonostante la pista sia difficile, la squadra ha ottenuto una vittoria che mi ha dato un'*emozione* indimenticabile.
  Obwohl die *Piste* schwierig ist, hat das Team einen Sieg errungen, der mir ein unvergessliches Gefühl gegeben hat.
  
  La notizia dell'*emozione* che hai provato durante il concerto mi ha fatto sorridere.
  Die Nachricht von dem *Gefühl*, das du während des Konzerts empfunden hast, hat mich lächeln lassen.
  
  Ho sentito un'*emozione* strana quando ho realizzato che il tempo passa così in fretta.
  Ich habe ein seltsames *Gefühl* gespürt, als mir klar wurde, dass die Zeit so schnell vergeht.
  
  Se avessi saputo che la tua *emozione* sarebbe stata così evidente, non ti avrei fatto quella domanda.
  Wenn ich gewusst hätte, dass dein *Gefühl* so offensichtlich sein würde, hätte ich dir diese Frage nicht gestellt.
