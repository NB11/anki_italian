Rang: 1429
Wort: amor
Wortart: n.m
Wort mit Artikel: l'amor
Femininum / Plural: amori
IPA: ''
Definition: die Liebe, -n
Register: ''
Beispielsätze: |-
  L'*amor* dei genitori verso i figli è spesso incondizionato.
  Die *Liebe* der Eltern zu den Kindern ist oft bedingungslos.
  
  Nonostante la *fuga* della banda, il proprietario riuscì a riavere il suo credito.
  Trotz der *Flucht* der Bande gelang es dem Besitzer, seinen Kredit zurückzubekommen.
  
  Se provasse un po’ di doppio *amor*, smetterebbe di essere così cinico!
  Wenn er ein bisschen *doppelte *Liebe* fühlen würde, würde er aufhören, so zynisch zu sein!
  
  L’insegnante propose un cambiamento nel ruolo dell’*amor* nella società moderna.
  Die *Lehrerin* schlug eine Veränderung in der Rolle der Liebe in der modernen Gesellschaft vor.
  
  Nonostante il disturbo dei vicini, riuscirono a godersi la serata tra *amori* passionali.
  Trotz der *Störung* der Nachbarn genossen sie den Abend voller leidenschaftlicher Liebe.
