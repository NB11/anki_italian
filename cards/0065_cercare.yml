Rang: 65
Wort: cercare
Wortart: v
Wort mit Artikel: cercare
Femininum / Plural: ''
IPA: ''
Definition: suchen, versuchen
Register: ''
Beispielsätze: |-
  Devo *cercare* le chiavi, non le trovo più.
  Ich muss die *Schlüssel* *suchen*, ich finde sie nicht mehr.
  
  *Cercavo* un ristorante economico quando ho trovato questo locale.
  Ich *suchte* ein günstiges Restaurant, als ich dieses Lokal fand.
  
  Hai *cercato* di chiamarmi ieri sera?
  Hast du versucht, mich gestern Abend *anzurufen*?
  
  Se *cercherai* bene, troverai la soluzione.
  Wenn du dich gut *bemühst*, wirst du die Lösung finden.
  
  Avrei *cercato* un albergo più vicino se avessi saputo.
  Ich hätte ein näheres Hotel *gesucht*, wenn ich es gewusst hätte.
