Rang: 3793
Wort: riabilitazione
Wortart: n.f
Wort mit Artikel: la riabilitazione
Femininum / Plural: riabilitazioni
IPA: ''
Definition: die Rehabilitation, -en
Register: ''
Beispielsätze: |-
  Dopo l'operazione, Marco ha iniziato *la riabilitazione* per tornare a camminare.
  Nach der OP hat Marco *die Rehabilitation* begonnen, um wieder zu gehen.
  
  In *riabilitazione* imparò a usare la stampella che gli avevano dato.
  In *der Rehabilitation* lernte er, die Krücke zu benutzen, die man ihm gegeben hatte.
  
  Se non farai *la riabilitazione*, potresti avere problemi a lungo termine.
  Wenn du *die Rehabilitation* nicht machst, könntest du langfristige Probleme bekommen.
  
  Ho sentito che la clinica dove andrai per *la riabilitazione* è molto attrezzata.
  Ich habe gehört, dass die Klinik, in die du für *die Rehabilitation* gehst, sehr gut ausgestattet ist.
  
  La *riabilitazione* richiede molta pazienza e costanza da parte del paziente.
  Die *Rehabilitation* erfordert viel Geduld und Ausdauer von Seiten des Patienten.
