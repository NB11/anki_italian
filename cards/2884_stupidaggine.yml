Rang: 2884
Wort: stupidaggine
Wortart: n.f
Wort mit Artikel: la stupidaggine
Femininum / Plural: stupidaggini
IPA: ''
Definition: die Dummheit, -en
Register: ''
Beispielsätze: |-
  Non capisco come tu possa definire un filmato come *stupidaggine*, dato che molti lo hanno trovato molto intelligente.
  Ich verstehe nicht, wie du ein Video als *Dummheit* bezeichnen kannst, obwohl viele es sehr klug fanden.
  
  Fare una *stupidaggine* del genere ti costerà una bella multa, se non stai attento!
  Wenn du so eine *Dummheit* machst, kostet es dich eine saftige Strafe, wenn du nicht aufpasst.
  
  Era solo una *stupidaggine* di gioventù, ma per fortuna non ebbe conseguenze gravi.
  Es war nur eine *Jugendsünde*, aber zum Glück hatte sie keine schweren Folgen.
  
  Nonostante l’avvertimento dell’insegnante, ha commesso un’altra *stupidaggine* ignorando il pericolo.
  Trotz der *Warnung* des Lehrers hat er wieder eine Dummheit begangen, indem er die Gefahr ignorierte.
  
  Secondo te, dire che la matematica è inutile è una semplice *stupidaggine* o una vera e propria ignoranza?
  Ist es nach dir eine einfache *Dummheit* oder schiere Unwissenheit zu sagen, dass Mathematik nutzlos ist?
