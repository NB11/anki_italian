Rang: 1568
Wort: neppure
Wortart: adv
Wort mit Artikel: neppure
Femininum / Plural: ''
IPA: ''
Definition: nicht einmal, auch nicht
Register: ''
Beispielsätze: |-
  Non ho *neppure* voglia di ascoltare questa canzone dopo l’ennesimo insulto del ministro politico.
  Ich habe nicht einmal Lust, dieses Lied zu hören *nach* der letzten Beleidigung des politischen Ministers.
  
  Il prigioniero ha accettato la sua sorte senza *neppure* chiedere spiegazioni al suo carceriere.
  Der Gefangene hat sein Schicksal akzeptiert, ohne dem Wärter auch nur eine Erklärung zu *fragen*.
  
  Avrei voluto dirti tutto, ma *neppure* un angelo potrebbe comprendere questa situazione assurda.
  Ich hätte dir alles sagen wollen, doch nicht einmal ein Engel könnte diese absurde Situation *verstehen*.
  
  Anche se studi molto, *neppure* un esperto sa spiegare questa scienza scientifico così complicata.
  Auch wenn man viel lernt, kann nicht einmal ein Experte diese *wissenschaftliche* so komplizierte Disziplin erklären.
  
  Maria non ha *neppure* pensato di denunciare il furto alla polizia, temendo le conseguenze di una dichiarazione pubblica.
  Maria hat nicht einmal daran gedacht, den Diebstahl der Polizei zu *melden*, aus Angst vor den Folgen einer öffentlichen Aussage.
