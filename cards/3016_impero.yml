Rang: 3016
Wort: impero
Wortart: n.m
Wort mit Artikel: l'impero
Femininum / Plural: imperii
IPA: ''
Definition: das Kaiserreich, -e
Register: ''
Beispielsätze: |-
  L'*impero* romano durò per secoli e dominò gran parte dell'Europa.
  Das *römische Kaiserreich* dauerte jahrhundertelang und beherrschte weite Teile Europas.
  
  Gli storici studiano ancora come l'*impero* di Carlo Magno sia crollato dopo la sua morte.
  Die Historiker untersuchen immer noch, wie das *Kaiserreich* Karls des Großen nach seinem Tod zerfiel.
  
  Se tu avessi vissuto nell'*impero* austro-ungarico, avresti parlato almeno tre lingue diverse.
  Hättest du im *kaiserreich* Österreich-Ungarn gelebt, hättest du mindestens drei Sprachen gesprochen.
  
  L'*impero* ottomano era noto per la sua tolleranza religiosa, almeno in alcuni periodi della sua storia.
  Das *osmanische Kaiserreich* war für seine religiöse Toleranz bekannt, zumindest in einigen Epochen seiner Geschichte.
  
  Nonostante le sconfitte, nessuno riuscì a distruggere completamente l'*impero* di Napoleone fino al 1815.
  Trotz der Niederlagen gelang es niemandem, das *Kaiserreich* Napoleons vollständig zu zerstören, bis ins Jahr 1815.
