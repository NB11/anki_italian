Rang: 849
Wort: accorgersi
Wortart: vr
Wort mit Artikel: accorgersi
Femininum / Plural: ''
IPA: ''
Definition: bemerken, wahrnehmen, realisieren
Register: ''
Beispielsätze: |-
  Mi sono *accorto* solo ora che ho dimenticato le chiavi in ufficio.
  Ich habe erst jetzt *bemerkt*, dass ich die Schlüssel im Büro vergessen habe.
  
  Se ti *accorgessi* di qualcosa di strano, chiamami subito!
  Wenn du etwas Seltsames *wahrnimmst*, ruf mich sofort an!
  
  Non *si accorge* mai dei dettagli più importanti, poverino.
  Er nimmt niemals die wichtigsten Details *wahr*, der Arme.
  
  Ti prego di *accorgerti* che senza di te questo progetto non può funzionare.
  Ich bitte dich inständig, *darüber nachzudenken*, dass dieses Projekt ohne dich nicht funktionieren kann.
  
  Avrei voluto *accorgermi* prima dell'inganno, ma purtroppo è andata così.
  Ich hätte den Betrug früher *bemerken* wollen, aber leider ist es anders gekommen.
Audio: ''
Notiz: ''
