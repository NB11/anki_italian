Rang: 420
Wort: cavolo
Wortart: n.m
Wort mit Artikel: il cavolo
Femininum / Plural: i cavoli
IPA: ''
Definition: der Kohl, -e
Register: ''
Beispielsätze: |-
  In inverno si mangiano spesso *cavoli* caldi con le salsicce.
  Im Winter isst man oft *Kohl* warm mit Würstchen.
  
  Hai mai provato a coltivare *cavoli* nel tuo orto?
  Hast du schon mal versucht, *Kohl* in deinem Garten anzubauen?
  
  Non mi piace affatto il sapore dei *cavoli* crudi.
  Ich mag den Geschmack von rohem *Kohl* überhaupt nicht.
  
  Il *cavolo* rosso è perfetto per insalate gustose.
  Roter *Kohl* ist perfekt für leckere Salate.
  
  Mio nonno diceva sempre che un *cavolo* ben cotto fa bene alla salute.
  Mein Opa pflegte immer zu sagen, dass gut gekochter *Kohl* der Gesundheit guttut.
