Rang: 3129
Wort: tacchino
Wortart: n.m
Wort mit Artikel: il tacchino
Femininum / Plural: i tacchini
IPA: ''
Definition: der Truthahn, -sähn
Register: ''
Beispielsätze: |-
  Nel *tacchino* ci sono molte proteine, quindi è una carne molto nutriente.
  Im *Truthahn* gibt es viel Eiweiß, daher ist es ein sehr nährstoffreiches Fleisch.
  
  Se non avessi perso l’occasione, avremmo mangiato il *tacchino* arrostito ieri sera.
  Wenn ich die Chance nicht verpasst hätte, hätten wir gestern Abend den gebratenen *Truthahn* gegessen.
  
  Ho comprato un *tacchino* intero per Natale perché mia nonna adora il suo sapore.
  Ich habe einen ganzen *Truthahn* zu Weihnachten gekauft, weil meine Oma seinen Geschmack liebt.
  
  Il cuoco ha preparato il *tacchino* con una salsa speziata che rende la carne ancora più saporita.
  Der Koch hat den *Truthahn* mit einer speziellen Sauce zubereitet, die das Fleisch noch aromatischer macht.
  
  Mi hanno regalato un *tacchino* di allevamento biologico, quindi posso mangiarlo senza preoccupazioni.
  Man hat mir einen *Truthahn* aus biologischer Zucht geschenkt, deshalb kann ich ihn ohne Bedenken essen.
