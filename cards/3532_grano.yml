Rang: 3532
Wort: grano
Wortart: n.m
Wort mit Artikel: il grano
Femininum / Plural: grani
IPA: ''
Definition: das Getreide, -
Register: ''
Beispielsätze: |-
  Il *grano* è uno degli alimenti base della dieta mediterranea.
  Das *Getreide* ist eines der Grundnahrungsmittel der mediterranen Ernährung.
  
  Questa terra produce solo un terzo del necessario per coltivare il *grano* locale.
  Dieses Land produziert nur ein Drittel der Menge, die nötig ist, um das örtliche *Getreide* anzubauen.
  
  Ho comprato due sacchi di *grano* per fare il pane fatto in casa.
  Ich habe zwei Säcke *Getreide* gekauft, um selbstgemachtes Brot zu backen.
  
  Gli agricoltori lamentano che il prezzo del *grano* è sceso troppo in questo periodo.
  Die Landwirte klagen darüber, dass der Preis für *Getreide* in dieser Zeit zu stark gesunken ist.
  
  Nonostante la siccità, il raccolto di *grano* sembra essere soddisfacente quest'anno.
  Trotz der Dürre scheint die *Getreide*ernte in diesem Jahr zufriedenstellend zu sein.
