Rang: 3162
Wort: infiltrarsi
Wortart: vi
Wort mit Artikel: infiltrarsi
Femininum / Plural: ''
IPA: ''
Definition: sich einschleichen, eindringen
Register: ''
Beispielsätze: |-
  Il ladro ha provato a *infiltrarsi* nella villa mentre tutti dormivano.
  Der Dieb versuchte, sich in die Villa einzuschleichen, während alle schliefen.
  
  Credo che dei dati sensibili si siano *infiltrati* nel sistema.
  Ich glaube, dass sensible Daten in das System eingedrungen sind.
  
  Se non avessimo *infiltrato* una spia tra i nemici, la guerra sarebbe finita male.
  Wenn wir nicht einen Spion unter die Feinde eingeschleust hätten, wäre der Krieg schlecht ausgegangen.
  
  La polizia sta cercando di capire chi si sia *infiltrato* tra i manifestanti.
  Die Polizei versucht herauszufinden, wer sich unter die Demonstranten eingeschlichen hat.
  
  Non appena si *infiltrò* la notizia sui social, scoppiò il panico.
  Sobald sich die Nachricht in den sozialen Medien verbreitete, brach Panik aus.
