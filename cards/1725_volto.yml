Rang: 1725
Wort: volto
Wortart: n.m
Wort mit Artikel: il volto
Femininum / Plural: volti
IPA: ''
Definition: das Gesicht, -er
Register: ''
Beispielsätze: |-
  Il *volto* di Maria era così stanco che decise di prendersi una pausa.
  Das *Gesicht* von Maria war so müde, dass sie beschloss, eine Pause zu machen.
  
  Nonostante il buio, riuscì a riconoscere il *volto* dell'attore sul palco.
  Trotz der Dunkelheit konnte er das *Gesicht* des Schauspielers auf der Bühne erkennen.
  
  Mentre camminava lungo il fiume, il *volto* gli si illuminò di un sorriso improvviso.
  Während er am Fluss entlangging, erhellte sich sein *Gesicht* plötzlich zu einem Lächeln.
  
  Se avessi saputo che sarebbe venuto, avrei preparato un *volto* diverso per la festa.
  Hätte ich gewusst, dass er kommen würde, hätte ich ein anderes *Gesicht* für das Fest vorbereitet.
  
  È difficile descrivere con parole l'emozione che provai nel vedere il *volto* di mio cugino dopo tanti anni.
  Es ist schwer in Worte zu fassen, welche Emotion ich spürte, als ich das *Gesicht* meines Cousins nach so vielen Jahren sah.
