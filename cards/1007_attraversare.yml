Rang: 1007
Wort: attraversare
Wortart: vt
Wort mit Artikel: attraversare
Femininum / Plural: ''
IPA: ''
Definition: durchqueren, überqueren
Register: ''
Beispielsätze: |-
  Il treno sta per *attraversare* il ponte sul fiume.
  Der Zug wird gleich die Brücke über den Fluss *überqueren*.
  
  Se vuoi arrivare alla stazione, devi *attraversare* questa strada trafficata.
  Wenn du zum Bahnhof kommen willst, musst du diese belebte Straße *überqueren*.
  
  Mentre camminavo, ho visto un poliziotto che cercava di *attraversare* la folla rumorosa.
  Während ich lief, sah ich einen Polizisten, der versuchte, durch die laute Menge zu *durchqueren*.
  
  Nonostante la calma apparente, il pericolo potrebbe *attraversare* ogni momento la nostra vita.
  Trotz der scheinbaren Ruhe könnte die Gefahr jeden Moment unser Leben *durchqueren*.
  
  Gli scienziati hanno inventato un dispositivo per *attraversare* i muri, ma è ancora in fase sperimentale.
  Die Wissenschaftler haben ein Gerät erfunden, um Wände zu *durchdringen*, es ist aber noch in der Experimentierphase.
