Rang: 4549
Wort: mascalzone
Wortart: n.m
Wort mit Artikel: il mascalzone
Femininum / Plural: mascalzoni
IPA: ''
Definition: der Schurke, -n
Register: ''
Beispielsätze: |-
  Quel *mascalzone* ha rubato il portafoglio davanti a tutti senza vergogna.
  Dieser *Schurke* hat die Geldbörse vor allen Leuten ohne Scham gestohlen.
  
  Il poliziotto arrestò l'*mascalzone* che aveva fatto saltare il bancomat.
  Der Polizist verhaftete den *Schurken*, der den Geldautomaten gesprengt hatte.
  
  Se incontrassi un *mascalzone* per strada, mi consigli di chiamare subito la polizia?
  Wenn ich einen *Schurken* auf der Straße treffen würde, soll ich dann sofort die Polizei anrufen?
  
  Giuro che quel *mascalzone* pagherà per tutto il male che ha fatto!
  Ich schwöre, dieser *Schurke* wird für all das Böse, das er angerichtet hat, zahlen!
  
  Il giudice condannò l'*mascalzone* a cinque anni di prigione per frode finanziaria.
  Der Richter verurteilte den *Schurken* zu fünf Jahren Gefängnis wegen Finanzbetrugs.
