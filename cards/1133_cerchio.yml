Rang: 1133
Wort: cerchio
Wortart: n.m
Wort mit Artikel: il cerchio
Femininum / Plural: cerchi
IPA: ''
Definition: der Kreis, -e
Register: ''
Beispielsätze: |-
  Disegna un *cerchio* perfetto sul foglio con una matita.
  Zeichne einen *Kreis* perfekt auf das Blatt mit einem Bleistift.
  
  Il *cerchio* metallico era arrugginito e pieno di buchi, quindi lo abbiamo sostituito.
  Der metallene *Kreis* war rostig und voller Löcher, deshalb haben wir ihn ersetzt.
  
  Mentre camminavo nel bosco, ho trovato un *cerchio* di pietre misterioso vicino alla montagna.
  Während ich im Wald spazierte, habe ich einen mysteriösen *Kreis* aus Steinen nahe dem Berg gefunden.
  
  Se non ti ricordi dove hai messo le chiavi, controlla sotto il *cerchio* di metallo sul tavolo.
  Wenn du dich nicht erinnerst, wo du die Schlüssel hingelegt hast, schau unter dem metallenen *Kreis* auf dem Tisch nach.
  
  Il tribunale ha deciso di stabilire un *cerchio* di sicurezza intorno all'edificio dopo la minaccia ricevuta.
  Das *Gericht* hat beschlossen, einen Sicherheitskreis um das Gebäude nach der erhaltenen Drohung zu errichten.
