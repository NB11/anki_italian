Rang: 2303
Wort: candela
Wortart: n.f
Wort mit Artikel: la candela
Femininum / Plural: candele
IPA: ''
Definition: die Kerze, -n
Register: ''
Beispielsätze: |-
  Mia nonna accende sempre una *candela* durante le feste religiose.
  Meine Oma zündet während der religiösen Feste immer eine *Kerze* an.
  
  Nel buio della stanza, l’unica luce proveniva da una piccola *candela* tremolante.
  Im Dunkeln des Raumes kam das einzige Licht von einer zitternden kleinen *Kerze*.
  
  Se spegni la *candela* troppo in fretta, la cera si rovescia dappertutto.
  Wenn du die *Kerze* zu schnell ausbläst, tropft das Wachs überall hin.
  
  Nonostante la tecnologia moderna, molte persone preferiscono ancora usare una *candela* per creare un’atmosfera romantica.
  Trotz moderner Technik bevorzugen viele Menschen immer noch, eine *Kerze* zu nutzen, um eine romantische Atmosphäre zu schaffen.
  
  La *candela* che hai acceso ieri sera è ancora sul tavolo della cucina.
  Die *Kerze*, die du gestern Abend angezündet hast, steht immer noch auf dem Küchentisch.
