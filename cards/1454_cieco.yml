Rang: 1454
Wort: cieco
Wortart: adj
Wort mit Artikel: cieco
Femininum / Plural: ''
IPA: ''
Definition: blind
Register: ''
Beispielsätze: |-
  L’*cieco* attraversa la strada con il bastone bianco.
  Der *Blinde* überquert die Straße mit dem weißen Stock.
  
  Vorresti *cieco* dall’emozione quando hai saputo la notizia?
  Würdest du *blind* vor Glück, als du die Nachricht erfuhrst?
  
  È un artista che dipinge con lo sguardo *cieco*, affidandosi solo al tatto.
  Es ist ein Künstler, der mit *blindem* Blick malt, indem er sich nur aufs Tasten verlässt.
  
  Purtroppo, molti *ciechi* faticano a trovare lavoro in questa azienda sociale.
  Leider haben viele *Blinde* Schwierigkeiten, in diesem sozialen Unternehmen Arbeit zu finden.
  
  Se fossi *cieca* dalla nascita, impiegheresti almeno un secolo a riconoscere i colori diretti di un tramonto.
  Wärst du von Geburt an *blind*, bräuchtest du mindestens ein Jahrhundert, um die direkten Farben eines Sonnenuntergangs zu erkennen.
