Rang: 2769
Wort: spagnolo
Wortart: n.m/f
Wort mit Artikel: lo spagnolo
Femininum / Plural: gli spagnoli
IPA: ''
Definition: der Spanier, die Spanierin; spanisch
Register: ''
Beispielsätze: |-
  Mio fratello ha sposato una donna *spagnola* di Madrid.
  Mein Bruder hat eine *spanische* Frau aus Madrid geheiratet.
  
  Lo *spagnolo* è una lingua melodica e affascinante.
  Das *Spanische* ist eine melodische und faszinierende Sprache.
  
  Nonostante viva in Italia, parla ancora *spagnolo* con i suoi genitori ogni settimana.
  Trotz ihres Lebens in Italien spricht sie noch *Spanisch* mit ihren Eltern jede Woche.
  
  Gli studenti hanno imparato una canzone *spagnola* durante la lezione ieri.
  Die Schüler haben gestern ein *spanisches* Lied im Unterricht gelernt.
  
  Se avessi tempo, vorrei visitare la Spagna per migliorare il mio *spagnolo*.
  Wenn ich Zeit hätte, würde ich nach Spanien reisen, um mein *Spanisch* zu verbessern.
