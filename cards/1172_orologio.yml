Rang: 1172
Wort: orologio
Wortart: n.m
Wort mit Artikel: l'orologio
Femininum / Plural: orologi
IPA: ''
Definition: die Uhr, -en
Register: ''
Beispielsätze: |-
  L'*orologio* che ho comprato ieri segna le ore esatte.
  Die *Uhr*, die ich gestern gekauft habe, zeigt die genaue Zeit an.
  
  Non mi ricordo mai a che ora ho dato il *orologio* a mio nipote.
  Ich erinnere mich nie daran, wann ich meinem Neffen die *Uhr* gegeben habe.
  
  Quando viaggi attraverso i fusi orari, è meglio osservare il proprio *orologio*.
  Wenn man durch Zeitzonen reist, ist es besser, auf die eigene *Uhr* zu schauen.
  
  Ho confessato al mio capo che ho dimenticato di *orologio* nella borsa dopo il viaggio.
  Ich habe meinem Chef gestanden, dass ich die *Uhr* nach der Reise in der Tasche vergessen habe.
  
  Se non aggiungi il *orologio* alla tua collezione, non potrai mai chiudere il cerchio delle tue attività.
  Wenn du die *Uhr* nicht zu deiner Sammlung hinzufügst, wirst du den Kreis deiner Tätigkeiten nie schließen können.
