Rang: 2661
Wort: concordare
Wortart: vi
Wort mit Artikel: concordare
Femininum / Plural: ''
IPA: ''
Definition: abstimmen, vereinbaren, übereinstimmen
Register: ''
Beispielsätze: |-
  Dobbiamo *concordare* l'orario di incontro per non avere conflitti con altri impegni.
  Wir müssen die *Übereinkunft* des Treffzeitpunkts treffen, um keine Konflikte mit anderen Verpflichtungen zu haben.
  
  Ha *concordato* con lei che arriverà in ritardo alla riunione di domani.
  Er hat eine *Absprache* mit ihr getroffen, dass er zum morgigen Meeting zu spät kommen wird.
  
  Nonostante le opinioni divergenti, tutti hanno *concordato* sul piano finale.
  Trotz der *unterschiedlichen* Meinungen haben alle dem Endplan zugestimmt.
  
  Se *concordate* le condizioni, possiamo firmare il contratto immediatamente.
  Wenn ihr die Bedingungen *einigt*, können wir den Vertrag sofort unterschreiben.
  
  È importante che tu *concordi* con il team prima di prendere decisioni così importanti.
  Es ist wichtig, dass du dich vor so wichtigen Entscheidungen mit dem Team *abstimmst*.
Audio: ''
Notiz: ''
Dispersion: ''
