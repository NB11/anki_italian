Rang: 1427
Wort: camicia
Wortart: n.f
Wort mit Artikel: la camicia
Femininum / Plural: camicie
IPA: ''
Definition: das Hemd, -en
Register: ''
Beispielsätze: |-
  La *camicia* che ho comprato ieri è troppo stretta per me, devo cambiarla direttamente in negozio.
  Das *Hemd*, das ich gestern gekauft habe, ist mir zu eng, ich muss es direkt im Geschäft umtauschen.
  
  Nelle *camicie* della nuova sezione ci sono anche modelli a maniche lunghe molto eleganti.
  In den *Hemden* der neuen Abschnitt gibt es auch sehr elegante Langarmmodelle.
  
  Mia moglie vuole che domattina metta la *camicia* bianca per l'appuntamento con il sindaco.
  Meine Frau will, dass ich morgen früh das weiße *Hemd* zum Termin mit dem Bürgermeister anziehe.
  
  Quella *camicia* a quadri appartiene a mio cugino, lui la indossa sempre quando va a caccia con la sua banda di amici.
  Jenes karierte *Hemd* gehört meinem Cousin, er trägt es immer, wenn er mit seiner Bande von Freunden auf die Jagd geht.
  
  Dopo il cambiamento di lavoro, Carlo ha indossato solo *camicie* a maniche corte perché gli sembra di avere più libertà.
  Nach dem *Wechsel* der Arbeitsstelle trägt Carlo nur noch kurzärmelige Hemden, weil es ihm freier vorkommt.
