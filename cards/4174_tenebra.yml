Rang: 4174
Wort: tenebra
Wortart: n.f
Wort mit Artikel: la tenebra
Femininum / Plural: tenebre
IPA: ''
Definition: die Dunkelheit, Finsternis
Register: ''
Beispielsätze: |-
  L’ho trovato nascosto nella *tenebra* più profonda del bosco.
  Ich habe ihn versteckt im *Dunkel* des tiefsten Waldes gefunden.
  
  Nonostante la *tenebra*, riuscì a leggere le ultime parole del messaggio.
  Trotz der *Finsternis* gelang es ihm, die letzten Worte der Nachricht zu lesen.
  
  Dicono che nelle *tenebre* della notte si nascondano le risposte più profonde.
  Man sagt, dass sich in der *Dunkelheit* der Nacht die tiefsten Antworten verbergen.
  
  Se avessi una torcia, potremmo illuminare questa *tenebra* e vedere meglio.
  Wenn wir eine Taschenlampe hätten, könnten wir diese *Dunkelheit* erhellen und besser sehen.
  
  Le *tenebre* avvolsero la città non appena il sole tramontò dietro le montagne.
  Die *Finsternis* umhüllte die Stadt, sobald die Sonne hinter den Bergen unterging.
