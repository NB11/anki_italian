Femininum / Plural: pellicole
IPA: ''
Definition: die Folie, -n, die Schicht, -en, der Film, -e
Register: ''
Beispielsätze: |-
  Questa *pellicola* protettiva è molto sottile e resistente.
  Diese *Folie* ist sehr dünn und robust.
  
  Hanno trovato una *pellicola* antica dietro il quadro durante il restauro.
  Sie fanden eine *Schicht* hinter dem Gemälde während der Restaurierung.
  
  La *pellicola* che hai usato per incartare il regalo è biodegradabile?
  Ist die *Folie*, die du zum Einpacken des Geschenks benutzt hast, biologisch abbaubar?
  
  Dopo il trattamento termico, sulla superficie si è formata una sottile *pellicola* di ossido.
  Nach der Wärmebehandlung bildete sich auf der Oberfläche eine dünne *Schicht* aus Oxid.
  
  Se non avessi dimenticato di staccare la *pellicola* protettiva, il vetro non si sarebbe graffiato.
  Hätte ich die schützende *Folie* nicht vergessen abzuziehen, wäre das Glas nicht zerkratzt worden.
