Rang: 1516
Wort: comportamento
Wortart: n.m
Wort mit Artikel: il comportamento
Femininum / Plural: i comportamenti
IPA: ''
Definition: das Verhalten, die Haltung
Register: ''
Beispielsätze: |-
  Il *comportamento* di tuo fratello è sempre stato esemplare.
  Das *Verhalten* deines Bruders war immer vorbildlich.
  
  Non capisco il motivo di questo *comportamento* davvero strano da parte sua.
  Ich verstehe den Grund für dieses *Verhalten* wirklich nicht.
  
  Secondo gli psicologi, un *comportamento* aggressivo può essere segno di rabbia repressa.
  Laut Psychologen kann ein aggressives *Verhalten* ein Zeichen für unterdrückten Ärger sein.
  
  Vorrei discutere il *comportamento* di Luca nei tuoi confronti; secondo me non è stato corretto.
  Ich möchte das *Verhalten* von Luca dir gegenüber besprechen; meiner Meinung nach war es nicht korrekt.
  
  Il *comportamento* degli animali può essere studiato per comprendere meglio la scienza della zoologia.
  Das *Verhalten* von Tieren kann untersucht werden, um die Wissenschaft der Zoologie besser zu verstehen.
