Rang: 2348
Wort: elio
Wortart: n.m
Wort mit Artikel: lo elio
Femininum / Plural: gli elii
IPA: ''
Definition: das Helium
Register: ''
Beispielsätze: |-
  La ricerca scientifica studia da tempo lo *elio* perché è un gas nobile molto stabile.
  Die wissenschaftliche Forschung untersucht seit Langem das *Helium*, weil es ein sehr stabiles Edelgas ist.
  
  Nelle stelle, come il Sole, l'*elio* è prodotto dalla fusione nucleare dell'idrogeno.
  In den Sternen wie der Sonne entsteht das *Helium* durch die Kernfusion von Wasserstoff.
  
  Gli esperimenti con lo *elio* liquido permettono di raggiungere temperature prossime allo zero assoluto.
  Experimente mit flüssigem *Helium* ermöglichen Temperaturen nahe dem absoluten Nullpunkt.
  
  Se non ci fosse lo *elio*, molti dispositivi medici non funzionerebbero correttamente.
  Wenn es kein *Helium* gäbe, funktionierten viele medizinische Geräte nicht richtig.
  
  Lo studente ha scritto un tema sull'importanza dello *elio* nello spazio profondo.
  Der Schüler hat einen Aufsatz über die Bedeutung von *Helium* im tiefen Weltraum geschrieben.
