Rang: 1318
Wort: vergognarsi
Wortart: vr
Wort mit Artikel: vergognarsi
Femininum / Plural: ''
IPA: ''
Definition: sich schämen
Register: ''
Beispielsätze: |-
  Mi sono *vergognato* quando ho fatto un errore così grande di fronte a tutti.
  Ich habe mich *geschämt*, als ich einen solchen großen Fehler vor allen gemacht habe.
  
  Dillo pure ad alta voce, non c’è bisogno di *vergognarsi* per chiedere aiuto!
  Sag es ruhig laut, man braucht sich nicht zu *schämen*, um Hilfe zu bitten!
  
  Anche se ha un sottotitolo pessimo, il film non mi fa *vergognare* di essere andato al cinema.
  Auch wenn er einen miserablen *Untertitel* hat, schäme ich mich nicht dafür, ins Kino gegangen zu sein.
  
  Mi *vergognerei* se sapessi che ho tradito un’amica, ma per fortuna non è successo.
  Ich würde mich *schämen*, wenn ich wüsste, dass ich eine Freundin verraten habe – zum Glück ist es nicht passiert.
  
  Dopo che hai perso quella copia del documento importante, ti senti così male che vorresti scomparire per non dover *vergognarti* ancora di più.
  Nachdem du die wichtige *Kopie* des Dokuments verloren hast, fühlst du dich so schlecht, dass du am liebsten verschwinden würdest, um dich nicht noch mehr schämen zu müssen.
