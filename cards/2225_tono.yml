Wort mit Artikel: il tono
Femininum / Plural: i toni
IPA: ''
Definition: der Ton, -öne
Register: ''
Beispielsätze: |-
  Il *tono* della sua voce era molto calmo, nonostante la situazione fosse tesa.
  Der *Ton* seiner Stimme war sehr ruhig, obwohl die Situation angespannt war.
  
  Non mi piace il *tono* con cui mi parli, sembri arrabbiato!
