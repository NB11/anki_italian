  Ich hätte einen respektvolleren *Ton* während des Arbeitstreffens bevorzugt.
  
  Il professore ha sottolineato l'importanza del *tono* nella recitazione.
  Der Professor hat die Bedeutung des *Tons* beim Schauspiel betont.
  
  Mi ha risposto con un *tono* talmente aggressivo che ho preferito tacere.
