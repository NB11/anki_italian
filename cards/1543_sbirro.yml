Rang: 1543
Wort: sbirro
Wortart: n.m
Wort mit Artikel: lo sbirro
Femininum / Plural: sbirri
IPA: ''
Definition: der Bulle, -n
Register: ''
Beispielsätze: |-
  Lo *sbirro* ha fermato l'uomo per denunciare un furto.
  Der *Bulle* hat den Mann wegen eines Diebstahls angezeigt.
  
  Se non fai il bravo, chiamerò lo *sbirro*!
  Wenn du nicht brav bist, rufe ich den *Bullen*!
  
  Il giornalista ha intervistato lo *sbirro* sulle recenti novità nella polizia.
  Der Journalist hat den *Bullen* zu den neueren Neuigkeiten bei der Polizei interviewt.
  
  Non mi fido di quello *sbirro*: mi sembra sempre ingannare qualcuno.
  Ich vertraue diesem *Bullen* nicht: er scheint immer jemanden hinterzugehen.
  
  Lo *sbirro* che abbiamo incontrato ieri assomiglia tanto a un nostro parente.
  Der *Bulle*, den wir gestern getroffen haben, ähnelt stark einem unserer Verwandten.
