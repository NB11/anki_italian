Beispielsätze: |-
  Se *chilometro* dopo chilometro continuiamo a camminare senza sosta, presto ci fermeremo.
  Wenn wir *Kilometer* für Kilometer weitergehen ohne Pause, werden wir bald stehen bleiben.
  
  Il treno ad alta velocità ha percorso ben duecento *chilometri* in meno di un’ora.
  Der Hochgeschwindigkeitszug hat ganze zweihundert *Kilometer* in weniger als einer Stunde zurückgelegt.
  
  Mi ha detto che abita a soli cinque *chilometri* da qui, ma ci ho messo mezz’ora ad arrivare!
  Er hat mir gesagt, dass er nur fünf *Kilometer* von hier wohnt, aber ich habe eine halbe Stunde gebraucht!
  
  Nonostante gli avessero garantito copertura sanitaria, molti si sono trovati a dover pagare di tasca propria centinaia di *chilometri* di viaggio per raggiungere l’ospedale più vicino.
  Obwohl ihnen eine Krankenversicherung zugesichert worden war, mussten sich viele selbst Hunderte von *Kilometern* Reisekosten zahlen, um das nächste Krankenhaus zu erreichen.
  
  Se insistere su questa tratta così lunga, finirà che dovrò chiedere al proprietario della banda se ha un *chilometro* in più da percorrere!
  Wenn Sie auf dieser so langen Strecke bestehen, werde ich am Ende den Besitzer der *Bande* fragen müssen, ob er noch einen Kilometer mehr zu fahren hat!
