Rang: 4143
Wort: grandezza
Wortart: n.f
Wort mit Artikel: la grandezza
Femininum / Plural: grandezze
IPA: ''
Definition: die Größe, -n
Register: ''
Beispielsätze: |-
  La *grandezza* di quest’opera d’arte lascia senza parole tutti i visitatori del museo.
  Die *Größe* dieses Kunstwerks lässt alle Besucher des Museums sprachlos.
  
  Nonostante la sua *grandezza*, il senatore rimase umile e accessibile a tutti.
  Trotz seiner *Größe* blieb der Senator bescheiden und für alle zugänglich.
  
  Hanno discusso a lungo sulla *grandezza* della vittoria ottenuta dalla federazione.
  Sie haben lange über die *Größe* des Sieges diskutiert, den der Bund errungen hatte.
  
  La *grandezza* del problema richiede una soluzione immediata e concreta.
  Die *Größe* des Problems erfordert eine sofortige und konkrete Lösung.
  
  È difficile comprendere appieno la *grandezza* di un’idea fino a quando non la si mette in pratica.
  Es ist schwierig, die *Größe* einer Idee vollständig zu begreifen, bis man sie in die Praxis umsetzt.
