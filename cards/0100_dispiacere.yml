Rang: 100
Wort: dispiacere
Wortart: v
Wort mit Artikel: dispiacere
Femininum / Plural: ''
IPA: ''
Definition: leidtun, bedauern
Register: ''
Beispielsätze: |-
  Mi *dispiace* molto per il tuo dolore.
  Es *tut mir* sehr *leid* wegen deines Schmerzes.
  
  *Dispiace* a te se parto così presto?
  *Bedauerst du es*, wenn ich so früh gehe?
  
  Ci *dispiace* che tu non possa venire.
  Es *tut uns leid*, dass du nicht kommen kannst.
  
  Ti *dispiace* se apro la finestra?
  *Stört es dich*, wenn ich das Fenster öffne?
  
  Mi *dispiacerebbe* molto se perdessi questo treno.
  Es würde mir sehr *leidtun*, wenn ich diesen Zug verpassen würde.
