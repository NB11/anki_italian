Rang: 2599
Wort: autore
Wortart: n.m
Wort mit Artikel: l'autore
Femininum / Plural: gli autori
IPA: ''
Definition: der Autor, -en
Register: ''
Beispielsätze: |-
  L'*autore* di questo romanzo ha vinto un premio prestigioso la scorsa settimana.
  Der *Autor* dieses Romans hat letzte Woche einen prestigeträchtigen Preis gewonnen.
  
  Chi è l'*autore* di quella canzone che hai ascoltato ieri sera?
  Wer ist der *Autor* dieses Liedes, das du gestern Abend gehört hast?
  
  Non so ancora chi sarà l'*autore* della relazione finale, ma lo scopriremo presto.
  Ich weiß noch nicht, wer der *Autor* des Abschlussberichts sein wird, aber wir werden es bald herausfinden.
  
  È l'*autore* stesso che ha firmato la copia del suo ultimo libro per me!
  Es ist der *Autor* selbst, der mir eine Kopie seines neuesten Buches signiert hat!
  
  L'*autore* di quel saggio ha un approccio molto originale alla materia.
  Der *Autor* dieses Essays hat einen sehr originellen Zugang zum Thema.
