Rang: 2907
Wort: movente
Wortart: n.m
Wort mit Artikel: il movente
Femininum / Plural: i moventi
IPA: ''
Definition: der Beweggrund, -¨e
Register: ''
Beispielsätze: |-
  Non capisco il *movente* di questo crimine così assurdo!
  Ich verstehe den *Beweggrund* für dieses so absurde Verbrechen nicht!
  
  Il giudice ha analizzato tutti i *moventi* del colpevole prima di emettere la sentenza.
  Der Richter hat alle *Beweggründe* des Schuldigen analysiert, bevor er das Urteil fällte.
  
  Secondo te, qual è stato il principale *movente* dell’omicidio?
  Was war Ihrer Meinung nach der Haupt-*Beweggrund* für den Mord?
  
  Anche se non condivido le tue idee, rispetto il tuo *movente* per agire in quel modo.
  Auch wenn ich deine Ideen nicht teile, respektiere ich deine *Beweggründe*, so zu handeln.
  
  In questo romanzo, l’autore esplora i *moventi* psicologici dei personaggi con grande profondità.
  In diesem Roman erkundet der Autor die psychologischen *Beweggründe* der Figuren mit großer Tiefe.
