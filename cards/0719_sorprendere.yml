Rang: 719
Wort: sorprendere
Wortart: vt
Wort mit Artikel: sorprendere
Femininum / Plural: ''
IPA: ''
Definition: überraschen
Register: ''
Beispielsätze: |-
  Non volevo *sorprendere* nessuno, ma il tuo regalo mi ha reso felice!
  Ich wollte *niemanden überraschen*, aber dein Geschenk hat mich glücklich gemacht!
  
  Se avessi saputo che sarebbe arrivato, avrei cercato di *sorprendere* di meno con la festa.
  Wenn ich gewusst hätte, dass er kommen würde, hätte ich versucht, *weniger Überraschung* mit der Feier zu machen.
  
  Mi dispiace di averti *sorpreso* con quella notizia, ma era necessario dirla subito.
  Es tut mir leid, dich mit dieser Nachricht *überrascht* zu haben, aber es war nötig, sie sofort zu sagen.
  
  Lui non sa che lo vogliamo *sorprendere* con un viaggio per il suo compleanno.
  Er weiß nicht, dass wir ihn mit einer Reise zu seinem *Geburtstag überraschen* wollen.
  
  Appena ho aperto la porta, mi hanno *sorpreso* con una festa a sorpresa per il mio diploma!
  Als ich die Tür geöffnet habe, haben sie mich mit einer Überraschungsparty zu meinem *Abschluss überrascht*!
