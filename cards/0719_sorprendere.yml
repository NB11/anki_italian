Wort mit Artikel: sorprendere
Femininum / Plural: ''
IPA: ''
Definition: überraschen
Register: ''
Beispielsätze: |-
  La notizia *ha* *sorpreso* *tutti* alla riunione.
  Die Nachricht *hat* alle bei der Versammlung *überrascht*.
  
  Mi *sorprende* che tu non sia venuto alla festa.
  Es *überrascht* mich, dass du nicht zur Party gekommen bist.
  
  Non volevo *sorprenderti*, ma dovevi saperlo!
  Ich wollte dich nicht *überraschen*, aber du hättest es wissen müssen!
  
  Lui cerca sempre di *sorprendere* la sua fidanzata con regali inaspettati.
  Er versucht immer, seine Freundin mit unerwarteten Geschenken zu *überraschen*.
  
  Sarebbe *sorpreso* se sapesse la verità.
  Er würde *überrascht* sein, wenn er die Wahrheit wüsste.
