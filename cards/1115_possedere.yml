Rang: 1115
Wort: possedere
Wortart: vt
Wort mit Artikel: possedere
Femininum / Plural: ''
IPA: ''
Definition: besitzen, haben
Register: ''
Beispielsätze: |-
  Marco *possiede* tre case in questa città, ma non vive in nessuna di esse.
  Marco besitzt drei Häuser in dieser Stadt, aber er lebt in keinem davon.
  
  Se *possiedi* quel libro, perché non me lo dai per un paio di giorni?
  Wenn du *besitzt* das Buch, warum gibst du es mir nicht für ein paar Tage?
  
  Avevo sempre sognato di *possedere* una telecamera professionale, e finalmente ci sono riuscito.
  Ich hatte immer davon geträumt, eine professionelle *Videokamera* zu besitzen, und endlich ist es mir gelungen.
  
  Nonostante *possedesse* una grande fortuna, non si considerava felice per niente.
  Auch wenn er ein großes Vermögen *besaß*, fühlte er sich überhaupt nicht glücklich.
  
  Chiunque *possa* possedere un’innocenza precedente, ha il diritto di essere giudicato con clemenza.
  Jeder, der eine vorherige *Unschuld* besessen hat, hat das Recht, mit Milde beurteilt zu werden.
