Definition: die Punktzahl, -en
Register: ''
Beispielsätze: |-
  Non ho capito come funziona il *punteggio* in questo gioco.
  Ich habe nicht verstanden, wie der *Punktestand* bei diesem Spiel funktioniert.
  
  Dopo l’esame, il professore ha pubblicato il *punteggio* online.
  Nach der Prüfung hat der Professor die *Punktzahl* online veröffentlicht.
  
  Se il *punteggio* non cambia entro un’ora, dovremo rivedere la strategia.
  Falls sich der *Punktestand* innerhalb einer Stunde nicht ändert, müssen wir die Strategie überdenken.
  
  Il *punteggio* finale è stato molto più basso di quanto mi aspettassi.
  Die *Endpunktzahl* war viel niedriger, als ich erwartet hatte.
  
  Durante la partita di hockey, il *punteggio* è salito inaspettatamente a 5-3.
  Während des Hockey-Spiels stieg der *Punktestand* unerwartet auf 5 zu 3.
