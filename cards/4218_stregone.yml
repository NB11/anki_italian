Rang: 4218
Wort: stregone
Wortart: n.m
Wort mit Artikel: lo stregone
Femininum / Plural: stregoni
IPA: ''
Definition: der Hexenmeister, -
Register: ''
Beispielsätze: |-
  Si dice che lo *stregone* viva nelle profondità della foresta da secoli.
  Man sagt, dass der *Hexenmeister* seit Jahrhunderten in den Tiefen des Waldes lebt.
  
  Chi ha bisogno di consultare uno *stregone* per risolvere un problema del genere?
  Wer muss schon einen *Hexenmeister* konsultieren, um ein solches Problem zu lösen?
  
  Lo *stregone* avrebbe guarito la ferita con un unguento misterioso, secondo la leggenda.
  Der *Hexenmeister* hätte die Wunde demnach mit einer geheimnisvollen Salbe geheilt.
  
  Se incontrassi uno *stregone*, non crederei alle sue parole senza prove concrete.
  Wenn ich einem *Hexenmeister* begegnete, würde ich seinen Worten nicht ohne handfeste Beweise glauben.
  
  Dicono che lo *stregone* abbia trasformato il principe in rana per una maledizione antica.
  Man sagt, der *Hexenmeister* habe den Prinzen durch einen alten Fluch in einen Frosch verwandelt.
