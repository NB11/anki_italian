Rang: 4279
Wort: enigma
Wortart: n.m
Wort mit Artikel: l'enigma
Femininum / Plural: gli enigmi
IPA: ''
Definition: das Rätsel, -
Register: ''
Beispielsätze: |-
  L’*enigma* della Sfinge ha affascinato gli studiosi per secoli.
  Das *Rätsel* der Sphinx hat die Gelehrten jahrhundertelang fasziniert.
  
  Nonostante le molte ricerche, l’*enigma* della scomparsa rimane irrisolto.
  Trotz zahlreicher Untersuchungen bleibt das *Rätsel* des Verschwindens ungelöst.
  
  Hai mai provato a risolvere un *enigma* che nessuno riesce a decifrare?
  Hast du schon einmal versucht, ein *Rätsel* zu lösen, das niemand entschlüsseln kann?
  
  Secondo lui, ogni *enigma* ha una soluzione, basta avere la pazienza di cercarla.
  Seiner Meinung nach hat jedes *Rätsel* eine Lösung – man muss nur geduldig suchen.
  
  L’*enigma* che tanto lo tormentava si rivelò essere un semplice malinteso.
  Das *Rätsel*, das ihn so quälte, stellte sich als simples Missverständnis heraus.
