Rang: 2899
Wort: lusso
Wortart: n.m
Wort mit Artikel: il lusso
Femininum / Plural: lussi
IPA: ''
Definition: der Luxus
Register: ''
Beispielsätze: |-
  Nel *lusso* della loro villa si sente l’influenza di una vita agiata.
  Im *Luxus* ihrer Villa spürt man den Einfluss eines sorgenfreien Lebens.
  
  Penso che spendere così tanto per un’auto sia un *lusso* inutile.
  Ich denke, so viel Geld für ein Auto auszugeben ist ein unnötiger *Luxus*.
  
  Non tutti possono permettersi il *lusso* di viaggiare in prima classe.
  Nicht jeder kann sich den *Luxus* leisten, in der ersten Klasse zu reisen.
  
  Se avessi vinto alla lotteria, avrei dato sfogo ad ogni *lusso* possibile.
  Wenn ich im Lotto gewonnen hätte, hätte ich mich jeder Form von *Luxus* hingeben können.
  
  È un *lusso* avere un giardino così grande in una città così affollata.
  Es ist ein *Luxus*, in einer so überfüllten Stadt einen so großen Garten zu besitzen.
