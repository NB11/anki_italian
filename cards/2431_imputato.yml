Rang: 2431
Wort: imputato
Wortart: n.m
Wort mit Artikel: l'imputato
Femininum / Plural: gli imputati
IPA: ''
Definition: der Angeklagte, -n
Register: ''
Beispielsätze: |-
  L'*imputato* ha dichiarato la sua innocenza durante il processo.
  Der *Angeklagte* hat seine Unschuld während des Prozesses betont.
  
  Gli avvocati difendono l'*imputato* con grande determinazione.
  Die Anwälte verteidigen den *Angeklagten* mit großer Entschlossenheit.
  
  Se l'*imputato* fosse colpevole, la giuria lo saprebbe già.
  Wenn der *Angeklagte* schuldig wäre, wüsste die Jury es bereits.
  
  L'*imputato*, che era stato assolto in primo grado, ora rischia una condanna.
  Der *Angeklagte*, der in erster Instanz freigesprochen worden war, riskiert nun eine Verurteilung.
  
  Chiunque sia l'*imputato*, la verità verrà fuori.
  Wer auch immer der *Angeklagte* ist, die Wahrheit wird ans Licht kommen.
