Rang: 135
Wort: tipo
Wortart: n.m
Wort mit Artikel: il tipo
Femininum / Plural: tipi
IPA: ''
Definition: die Art, der Typ, der Typus
Register: ''
Beispielsätze: |-
  Qual è il *tipo* di musica che ti piace di più?
  Was für ein *Typ* von Musik gefällt dir am besten?
  
  Quel *tipo* di comportamento è inaccettabile in ufficio.
  Diese *Art* von Verhalten ist in einem Büro inakzeptabel.
  
  Ci sono diversi *tipi* di caffè in Italia, ma preferisco l’espresso.
  Es gibt verschiedene *Typen* von Kaffee in Italien, aber ich bevorzuge den Espresso.
  
  Non mi sembra il *tipo* di persona che aiuterebbe senza chiedere nulla in cambio.
  Er scheint mir nicht der *Typ* von Person zu sein, der ohne etwas dafür zu verlangen helfen würde.
  
  Sai che *tipo* di pianta è questa? Non l’ho mai vista prima.
  Weißt du, welche *Art* von Pflanze das ist? Ich habe sie noch nie gesehen.
