Rang: 1033
Wort: leggero
Wortart: adj
Wort mit Artikel: leggero
Femininum / Plural: ''
IPA: ''
Definition: leicht, sanft, dünn
Register: ''
Beispielsätze: |-
  Il vento oggi è così *leggero* che le foglie si muovono appena.
  Der Wind ist heute so *leicht*, dass sich die Blätter kaum bewegen.
  
  Ho scelto un abito *leggero* per non avere troppo caldo durante il viaggio.
  Ich habe ein *leichtes* Kleid gewählt, um unterwegs nicht zu viel zu schwitzen.
  
  Nonostante il suo tono *leggero*, capii che nascondeva una profonda tristezza.
  Trotz seines *leichten* Tons merkte ich, dass er tiefe Traurigkeit verbarg.
  
  Per favore, parlami con un tocco *leggero* di ironia, così non mi offendo.
  Bitte sprich mit einem *leichten* Hauch von Ironie, damit ich mich nicht beleidigt fühle.
  
  Il detective seguì una pista *leggera* ma promettente tra i dettagli dell’indagine.
  Der Detektiv folgte einer *leichten*, aber vielversprechenden Spur unter den Einzelheiten der Untersuchung.
