Rang: 2853
Wort: intelligenza
Wortart: n.f
Wort mit Artikel: l'intelligenza
Femininum / Plural: intelligenze
IPA: ''
Definition: die Intelligenz, -en
Register: ''
Beispielsätze: |-
  La *intelligenza* artificiale sta rivoluzionando molti settori dell'industria.
  Die *künstliche Intelligenz* verändert viele Bereiche der Industrie.
  
  Nonostante la sua *intelligenza* fosse riconosciuta da tutti, lui preferiva imbrogliare negli esami.
  Trotz seiner von allen anerkannten *Intelligenz* bevorzugte er, bei Prüfungen zu schummeln.
  
  L'*intelligenza* del tuo cane è davvero sorprendente: capisce ogni tuo comando.
  Die *Intelligenz* deines Hundes ist wirklich beeindruckend: Er versteht jeden deiner Befehle.
  
  Hanno fondato una scuola per sviluppare l'*intelligenza* emotiva negli adolescenti.
  Sie haben eine Schule gegründet, um die *emotionale Intelligenz* bei Jugendlichen zu fördern.
  
  Se avessi usato la *intelligenza*, non avresti fatto un errore così grave!
  Hättest du die *Intelligenz* eingesetzt, hättest du keinen so schweren Fehler gemacht!
