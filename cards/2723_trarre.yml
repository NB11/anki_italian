Rang: 2723
Wort: trarre
Wortart: vt
Wort mit Artikel: trarre
Femininum / Plural: ''
IPA: ''
Definition: "*ziehen*, *ableiten*, *schöpfen*"
Register: ''
Beispielsätze: |-
  Non so quale conclusione *trarre* da questa situazione così confusa.
  Ich weiß nicht, welche Folgerung *man* aus dieser so verwirrenden Situation ziehen soll.
  
  I vincitori *trassero* un grande guadagno dalla loro vittoria.
  Die Sieger *zogen* einen großen Gewinn aus ihrem Sieg heraus.
  
  Per risolvere il problema, occorre *trarre* fuori tutti i dettagli importanti.
  Um das Problem zu lösen, muss man alle wichtigen Details *ans Licht bringen*.
  
  La polizia riuscì a *trarre* informazioni utili dal testimone reticente.
  Die Polizei schaffte es, brauchbare Informationen aus dem widerspenstigen Zeugen *herauszupressen*.
  
  Dicono che si possa *trarre* forza da ogni difficoltà, se ci si impegna abbastanza.
  Man sagt, man könne aus jeder Schwierigkeit *Kraft schöpfen*, wenn man sich genug anstrengt.
