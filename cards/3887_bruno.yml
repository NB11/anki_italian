Rang: 3887
Wort: bruno
Wortart: adj
Wort mit Artikel: bruno
Femininum / Plural: ''
IPA: ''
Definition: braun, dunkel, brünett, dunkelhaarig
Register: ''
Beispielsätze: |-
  Paolo ha comprato una camicia *bruna* con un fazzoletto dello stesso colore.
  Paolo hat ein *braunes* Hemd mit einem Taschentuch in derselben Farbe gekauft.
  
  La polizia ha trovato delle tracce di terra *bruna* vicino alla scena del delitto.
  Die Polizei fand Spuren von *dunkler* Erde nahe dem Tatort.
  
  Nonostante il caldo, preferisco vestirmi di colori *bruni* piuttosto che pastello.
  Trotz der Hitze ziehe ich *dunkle* Farben vor statt Pastelltöne.
  
  Il nonno aveva sempre i baffi e i capelli *bruni*, anche in età avanzata.
  Der Großvater hatte immer einen Schnurrbart und *dunkles* Haar, auch in hohem Alter.
  
  Se avessi i capelli *bruni* lisci, forse attirerei più sguardi in ufficio.
  Wenn ich glattes, *dunkles* Haar hätte, würde ich vielleicht mehr Blicke im Büro erhaschen.
