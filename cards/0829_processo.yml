Rang: 829
Wort: processo
Wortart: n.m
Wort mit Artikel: il processo
Femininum / Plural: processi
IPA: ''
Definition: der Prozess, -e
Register: ''
Beispielsätze: |-
  Stamattina *processo* è iniziato alle nove in punto davanti al giudice Rossi.
  Der *Prozess* hat heute Morgen um neun Uhr vor dem Richter Rossi begonnen.
  
  Nonostante le prove schiaccianti, il avvocato cerca ancora di bloccare il *processo* per ritardi procedurali.
  Trotz der erdrückenden Beweise versucht der Anwalt immer noch, den *Prozess* wegen Verfahrensverzögerungen zu blockieren.
  
  Dopo anni di discussioni, finalmente si è avviato un *processo* di riforma nella nostra società.
  Nach Jahren der Diskussionen wurde endlich ein Reform*prozess* in unserer Gesellschaft eingeleitet.
  
  Il nonno raccontava sempre che, nella sua età, aveva visto *processi* molto più lunghi e complicati di quello attuale.
  Der Großvater erzählte immer, dass er in seinem *Alter* viel längere und kompliziertere Prozesse gesehen hatte als den aktuellen.
  
  Sicuramente, se non fosse per quell’errore nel compito, il *processo* sarebbe già concluso.
  Bestimmt wäre der *Prozess* bereits abgeschlossen, wenn nicht dieser Fehler in der Aufgabe wäre.
