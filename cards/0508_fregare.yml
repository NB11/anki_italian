Wort: fregare
Wortart: vt
Wort mit Artikel: fregare
Femininum / Plural: ''
IPA: ''
Definition: betrügen, übervorteilen
Register: ''
Beispielsätze: |-
  Non *fregare* mai i tuoi amici, non è giusto.
  Betrüge *niemals* deine Freunde, das ist nicht fair.
  
  Lo hanno *fregato* con una truffa telefonica.
  Sie haben ihn mit einem Telefonbetrug *übertölpelt*.
  
  Se mi *fregate* ancora, non parlerò mai più con voi.
  Wenn ihr mich noch einmal *betrügt*, spreche ich nie wieder mit euch.
  
  Ci hanno *fregato* con il prezzo dei biglietti.
  Sie haben uns mit dem Ticketpreis *übers Ohr gehauen*.
  
  Spero che nessuno lo *freghe* domani al mercato.
  Ich hoffe, dass ihn morgen auf dem Markt niemand *übers Ohr haut*.
