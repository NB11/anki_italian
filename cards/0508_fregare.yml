Rang: 508
Wort: fregare
Wortart: v
Wort mit Artikel: fregare
Femininum / Plural: ''
IPA: ''
Definition: betrügen, schummeln
Register: ''
Beispielsätze: |-
  Non *fregare* i tuoi amici, perché poi nessuno ti crederà più.
  Betrüge deine Freunde nicht, denn dann wird dir später keiner mehr glauben.
  
  Se *fregassi* i documenti, finirei in prigione contro la legge.
  Wenn ich die Dokumente fälschen würde, landete ich im Gefängnis gegen das Gesetz.
  
  Ma perché hai *fregato* tutti quanti? È un errore che non puoi più correggere!
  Aber warum hast du alle betrogen? Das ist ein Fehler, den du nicht mehr korrigieren kannst!
  
  Lui dice che non ha *fregato* nessuno, ma io non gli credo affatto.
  Er sagt, er hätte niemanden betrogen, aber ich glaube ihm überhaupt nicht.
  
  Spero che tu non *fregassi* i nostri viaggiatori con mezzi così pazzi!
  Ich hoffe, du schummelst unsere Reisenden nicht mit so verrückten Mitteln!
