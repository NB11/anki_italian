Rang: 2468
Wort: affittare
Wortart: vt
Wort mit Artikel: affittare
Femininum / Plural: ''
IPA: ''
Definition: mieten
Register: ''
Beispielsätze: |-
  Vorrei *affittare* un appartamento in centro per tre mesi.
  Ich möchte eine Wohnung im Zentrum für drei Monate *mieten*.
  
  L’agenzia immobiliare ha *affittato* la villa a una coppia straniera.
  Das Immobilienbüro hat die Villa an ein internationales Paar *vermietet*.
  
  Se non avessi perso il lavoro, non dovrei *affittare* questa stanza così piccola!
  Hätte ich nicht die Arbeit verloren, müsste ich dieses winzige Zimmer nicht *mieten*!
  
  La legge stabilisce che il proprietario non può *affittare* un locale senza licenza.
  Das Gesetz besagt, dass der Vermieter ein Lokal nicht ohne Erlaubnis *vermieten* darf.
  
  Speravo che tu potessi *affittare* quella casa di campagna, ma hai detto di no.
  Ich hatte gehofft, dass du dieses Landhaus *mieten* könntest, aber du hast abgelehnt.
