Beispielsätze: |-
  Spero che tu *beva* un bicchiere d'acqua ogni mattina.
  Ich hoffe, dass du *trinkst* jeden Morgen ein Glas Wasser.
  
  Abbiamo *bevuto* tutto il vino durante la festa ieri sera.
  Wir haben gestern Abend den ganzen Wein *getrunken*.
  
  Che cosa preferiresti *bere* con questo piatto?
  Was würdest du lieber zu diesem Gericht *trinken*?
  
  Mio nonno *beveva* sempre il caffè dopo pranzo da giovane.
  Mein Opa *trank* immer nach dem Mittagessen Kaffee, als er jung war.
  
  Se avessi sete, *berresti* un tè o un caffè?
  Wenn du durstig wärst, würdest du *trinken* einen Tee oder einen Kaffee?
