Rang: 4697
Wort: intimità
Wortart: n.f
Wort mit Artikel: la intimità
Femininum / Plural: intimità
IPA: ''
Definition: die Intimität, -en, die Privatsphäre
Register: ''
Beispielsätze: |-
  La *intimità* è fondamentale per una relazione felice.
  Die *Intimität* ist fundamental für eine glückliche Beziehung.
  
  Non sopporto che qualcuno violi la mia *intimità* scrivendo sui miei appunti personali.
  Ich ertrage es nicht, wenn jemand meine *Privatsphäre* verletzt, indem er meine persönlichen Notizen liest.
  
  Aveva cercato la *intimità* di una cena a due, ma l’appuntamento era stato un fallimento.
  Sie hatte sich nach der *Intimität* eines Zweieressens gesehnt, doch das Date war ein Desaster gewesen.
  
  La psicologa gli consigliò di non confondere l’affetto con l’*intimità* indesiderata.
  Die Psychologin riet ihm, Zuneigung nicht mit unerwünschter *Intimität* zu verwechseln.
  
  L’*intimità* che condividevano in quei momenti era così profonda che non servivano parole.
  Die *Intimität*, die sie in diesen Momenten teilten, war so tief, dass keine Worte nötig waren.
