Rang: 1829
Wort: diamante
Wortart: n.m
Wort mit Artikel: il diamante
Femininum / Plural: diamanti
IPA: ''
Definition: der Diamant, -en
Register: ''
Beispielsätze: |-
  Ho trovato *diamante* in un anello antico che ho ereditato da mia nonna.
  Ich habe den *Diamanten* in einem alten Ring gefunden, den ich von meiner Großmutter geerbt habe.
  
  Se vuoi *diamanti* di qualità, devi acquistare da un gioielliere affidabile.
  Wenn du *Diamanten* von guter Qualität willst, musst du bei einem vertrauenswürdigen Juwelier kaufen.
  
  Credevo che *diamante* fosse affilato, ma in realtà è molto resistente.
  Ich dachte, der *Diamant* wäre scharf, aber er ist eigentlich sehr widerstandsfähig.
  
  Hanno rubato un *diamante* raro durante la mostra al museo.
  Sie haben einen seltenen *Diamanten* während der Ausstellung im Museum gestohlen.
  
  Nonostante la *diamante* fosse falsa, sembrava autentica a prima vista.
  Obwohl der *Diamant* falsch war, wirkte er auf den ersten Blick echt.
