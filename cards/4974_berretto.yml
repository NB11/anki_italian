Rang: 4974
Wort: berretto
Wortart: n.m
Wort mit Artikel: il berretto
Femininum / Plural: berretti
IPA: ''
Definition: die Mütze, -n
Register: ''
Beispielsätze: |-
  Durante l’inverno, il nonno indossa sempre *berretto* di lana per ripararsi dal freddo.
  Während des Winters trägt der Opa immer eine *Mütze* aus Wolle, um sich vor der Kälte zu schützen.
  
  Non appena ha visto la neve, Luca è corso fuori senza *berretto* e si è buscato un raffreddore.
  Kaum hatte er den Schnee gesehen, rannte Luca ohne eine *Mütze* hinaus und hat sich eine Erkältung geholt.
  
  Se vuoi acquistare un *berretto* alla moda, dai un’occhiata nel reparto accessori del grande magazzino.
  Wenn du eine modische *Mütze* kaufen möchtest, wirf einen Blick in die Accessoires-Abteilung des Kaufhauses.
  
  Appena entrato in casa, si è tolto *berretto* e sciarpa per non sporcare.
  Kaum war er ins Haus gekommen, zog er *Mütze* und Schal aus, um nichts schmutzig zu machen.
  
  Il *berretto* che hai scelto è forse un po’ troppo vivace per un’occasione così sobria.
  Die *Mütze*, die du ausgewählt hast, ist vielleicht ein bisschen zu auffällig für einen so schlichten Anlass.
