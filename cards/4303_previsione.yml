Rang: 4303
Wort: previsione
Wortart: n.f
Wort mit Artikel: la previsione
Femininum / Plural: previsioni
IPA: ''
Definition: die Vorhersage, Prognose
Register: ''
Beispielsätze: |-
  Secondo le *previsioni* meteorologiche, domani pioverà tutto il giorno.
  Laut den *Wettervorhersagen* wird es morgen den ganzen Tag regnen.
  
  La *previsione* della polizia sul luogo del delitto si è rivelata esatta.
  Die *Prognose* der Polizei zum Tatort erwies sich als korrekt.
  
  Ho letto la *previsione* del tempo per la settimana prossima, ma non ci credo.
  Ich habe die *Wettervorhersage* für nächste Woche gelesen, aber ich glaube ihr nicht.
  
  La sua *previsione* economica è stata troppo ottimista, purtroppo.
  Seine *Wirtschaftsprognose* war leider zu optimistisch.
  
  Nonostante la *previsione* di un temporale, siamo partiti lo stesso.
  Trotz der *Vorhersage* eines Gewitters sind wir trotzdem losgefahren.
