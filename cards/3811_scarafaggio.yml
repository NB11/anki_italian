Rang: 3811
Wort: scarafaggio
Wortart: n.m
Wort mit Artikel: lo scarafaggio
Femininum / Plural: gli scarafaggi
IPA: ''
Definition: der Kakerlak, -en
Register: ''
Beispielsätze: |-
  Nel *scarafaggio* c'è un certo fascino oscuro che affascina molti appassionati di insetti.
  In dem *Kakerlak* steckt eine gewisse düstere Faszination, die viele Insektenliebhaber begeistert.
  
  Se vedi uno *scarafaggio* in cucina, probabilmente dovresti chiamare il disinfestatore immediatamente.
  Wenn du eine *Kakerlak* in der Küche siehst, solltest du wahrscheinlich sofort den Schädlingsbekämpfer rufen.
  
  Lo *scarafaggio* che ho trovato in bagno era enorme, quasi spaventoso!
  Die *Kakerlak*, die ich im Bad gefunden habe, war riesig, fast erschreckend!
  
  Gli scienziati studiano da tempo il comportamento degli *scarafaggi* per capire come sopravvivono in ambienti estremi.
  Wissenschaftler erforschen seit Langem das Verhalten von *Kakerlaken*, um zu verstehen, wie sie in extremen Umgebungen überleben.
  
  Mi sono svegliato di notte perché ho sentito uno *scarafaggio* correre sul pavimento della camera da letto.
  Ich bin mitten in der Nacht aufgewacht, weil ich eine *Kakerlak* über den Boden meines Schlafzimmers huschen hörte.
