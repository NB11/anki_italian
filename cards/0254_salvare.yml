Rang: 254
Wort: salvare
Wortart: v
Wort mit Artikel: salvare
Femininum / Plural: ''
IPA: ''
Definition: retten, bewahren
Register: ''
Beispielsätze: |-
  Il pompiere è riuscito a *salvare* il bambino dalla casa in fiamme.
  Der Feuerwehrmann konnte das Kind aus dem brennenden Haus *retten*.
  
  Puoi *salvare* il file sul tuo chiavetta USB, per favore?
  Kannst du die Datei bitte auf deinem USB-Stick *abspeichern*?
  
  Dobbiamo *salvare* l’ambiente per le generazioni future.
  Wir müssen die Umwelt für zukünftige Generationen *bewahren*.
  
  Si sarebbe *salvato* se avesse reagiert prima.
  Er hätte sich *gerettet*, wenn er früher reagiert hätte.
  
  La polizia cerca di *salvare* le prove.
  Die Polizei versucht, die Beweise zu sichern.
