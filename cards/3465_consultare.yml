Rang: 3465
Wort: consultare
Wortart: v
Wort mit Artikel: consultare
Femininum / Plural: ''
IPA: ''
Definition: konsultieren, nachschlagen, befragen
Register: ''
Beispielsätze: |-
  Devo *consultare* il medico prima di prendere qualsiasi decisione.
  Ich muss den Arzt *konsultieren*, bevor ich eine Entscheidung treffe.
  
  Gli studenti *consultano* spesso il dizionario online durante le lezioni di italiano.
  Die Studenten *schlagen* oft das Online-Wörterbuch nach während der Italienischstunden.
  
  Se avessi bisogno di aiuto, potresti *consultare* un avvocato specializzato in diritto internazionale.
  Wenn du Hilfe brauchst, könntest du einen auf internationales Recht *spezialisierten* Anwalt befragen.
  
  Avevo *consultato* diversi siti prima di prenotare l’hotel per le vacanze.
  Ich hatte mehrere Websites *konsultiert*, bevor ich das Hotel für den Urlaub gebucht hatte.
  
  Spero che tu non *consulti* mai più quella persona così negativa!
  Ich hoffe, dass du diese so negative Person niemals wieder *konsultierst*!
