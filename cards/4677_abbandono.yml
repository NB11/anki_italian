Rang: 4677
Wort: abbandono
Wortart: n.m
Wort mit Artikel: l'abbandono
Femininum / Plural: gli abbandoni
IPA: ''
Definition: die Aufgabe, -n, das Verlassen
Register: ''
Beispielsätze: |-
  Non posso accettare l'*abbandono* della famiglia da parte sua.
  Ich kann das *Aufgeben* seiner Familie von seiner Seite nicht akzeptieren.
  
  Molti animali soffrono dell'*abbandono* da parte dei loro padroni.
  Viele Tiere leiden unter dem *Zurücklassen* durch ihre Besitzer.
  
  L'*abbandono* dei terreni agricoli ha trasformato il paesaggio in una desolazione.
  Die *Verwüstung* der landwirtschaftlichen Flächen hat die Landschaft in eine Öde verwandelt.
  
  Ha minacciato di denunciare l'*abbandono* del lavoro senza preavviso.
  Er hat gedroht, das *Unangekündigte-Verlassen* der Arbeit anzuzeigen.
  
  L'*abbandono* scolastico è un problema sociale che richiede interventi immediati.
  Der *Schulabbruch* ist ein soziales Problem, das sofortige Maßnahmen erfordert.
