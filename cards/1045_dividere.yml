Rang: 1045
Wort: dividere
Wortart: v
Wort mit Artikel: dividere
Femininum / Plural: ''
IPA: ''
Definition: teilen, aufteilen
Register: ''
Beispielsätze: |-
  Vorrei *dividere* la stanza con un amico per risparmiare.
  Ich möchte die Wohnung mit einem Freund *teilen* um Geld zu sparen.
  
  Non capisco perché tu voglia *dividere* le spese della carriera in due parti uguali.
  Ich verstehe nicht, warum du die Kosten der Karriere in zwei gleiche *Teile* aufteilen willst.
  
  Dopo la telefonata con la regina, ho dovuto *dividere* i documenti in due gruppi distinti.
  Nach dem Telefonat mit der Königin musste ich die Unterlagen in zwei *Gruppen* unterteilen.
  
  Se continui a *dividere* le tue energie così, non arriverai a fine mese.
  Wenn du deine Energie weiterhin so *zersplitterst*, wirst du es nicht bis Monatsende schaffen.
  
  L’avvocato ha giurato di *dividere* equamente l’eredità tra i due fratelli.
  Der Anwalt hat geschworen, das Erbe *gerecht* zwischen den beiden Brüdern zu teilen.
