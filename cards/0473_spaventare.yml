Rang: 473
Wort: spaventare
Wortart: vt
Wort mit Artikel: spaventare
Femininum / Plural: ''
IPA: ''
Definition: erschrecken, Angst machen
Register: ''
Beispielsätze: |-
  Il *rumore* improvviso mi ha *spaventato*!
  Das plötzliche *Geräusch* hat mich *erschreckt*!
  
  Non *spaventarti*! È solo un gatto.
  *Erschrick* nicht! Das ist nur eine Katze.
  
  Mi *spaventerebbe* sapere la verità.
  Es würde mich *erschrecken*, die Wahrheit zu erfahren.
  
  Fammi vedere chi ti ha *spaventato*!
  Zeig mir, wer dich *erschreckt* hat!
  
  Se non avessi urlato, forse non l’avrei *spaventato*.
  Wenn ich nicht geschrien hätte, hätte ich ihn vielleicht nicht *erschreckt*.
