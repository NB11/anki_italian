Rang: 4208
Wort: deporre
Wortart: v
Wort mit Artikel: deporre
Femininum / Plural: ''
IPA: ''
Definition: "*ablegen*, *niederlegen*, *absetzen*, *entthronen*"
Register: ''
Beispielsätze: |-
  Il re fu costretto a *deporre* la corona dopo la sconfitta elettorale.
  Der König wurde gezwungen, die Krone nach der *Wahl*niederlage abzusetzen.
  
  Prima di partire, ha il dovere di *deporre* le armi in caserma.
  Bevor er aufbricht, hat er die Pflicht, die Waffen in der Kaserne *niederzulegen*.
  
  Il giudice gli ordinerà di *deporre* come testimone domani alle dieci.
  Der Richter wird ihn anweisen, morgen um zehn Uhr als Zeuge *auszusagen*.
  
  Dopo anni di dominazione, il dittatore dovette *deporre* il potere a causa delle proteste.
  Nach Jahren der Herrschaft musste der Diktator die Macht aufgrund der Proteste *abgeben*.
  
  Se avessi delle prove, potresti *deporre* contro di lui in tribunale?
  Falls du Beweise hättest, könntest du gegen ihn vor Gericht *aussagen*?
Audio: ''
Notiz: ''
