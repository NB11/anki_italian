Rang: 1576
Wort: finora
Wortart: adv
Wort mit Artikel: finora
Femininum / Plural: ''
IPA: ''
Definition: bisher, bis jetzt
Register: ''
Beispielsätze: |-
  Non abbiamo ancora ricevuto alcuna risposta da parte dell'ufficio, *finora*.
  Wir haben bisher keine Antwort vom Büro erhalten.
  
  Il ministro ha promesso di risolvere il problema, ma *finora* non c’è stato alcun progresso.
  Der Minister hat versprochen, das Problem zu lösen, aber bisher gab es keinen Fortschritt.
  
  Nonostante i prigionieri abbiano cercato di rallentare la situazione, *finora* nessuno si è arreso.
  Obwohl die Gefangenen versucht haben, die Situation zu verlangsamen, hat sich bisher niemand ergeben.
  
  La scientifica indagine non ha ancora dato risultati concreti, *finora* solo ipotesi.
  Die wissenschaftliche Untersuchung hat bisher keine konkreten Ergebnisse geliefert, nur Hypothesen.
  
  Siamo grati per il vostro impegno, ma *finora* non abbiamo visto cambiamenti reali.
  Wir sind dankbar für Ihr Engagement, aber bisher haben wir keine echten Veränderungen gesehen.
