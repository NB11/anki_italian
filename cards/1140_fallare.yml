Rang: 1140
Wort: fallare
Wortart: vi
Wort mit Artikel: fallare
Femininum / Plural: ''
IPA: ''
Definition: fehlschlagen, versagen
Register: ''
Beispielsätze: |-
  Se *fallerai* quest’esame, dovrai ripetere l’anno.
  Wenn du die Prüfung *versagst*, musst du das Jahr wiederholen.
  
  Non mi preoccupo se *fallisce* il piano, tanto avevamo un obiettivo secondario.
  Ich mache mir keine Sorgen, wenn der Plan *fehlschlägt*, wir hatten ja ein Nebenziel.
  
  Il maestro temeva che *fallisse* la sua teoria dopo il fallimento dell’esperimento.
  Der Lehrer fürchtete, dass seine *Theorie* nach dem Misserfolg des Experiments versagte.
  
  Spero proprio che non *fallisca* la missione, ma ho qualche dubbio.
  Ich hoffe sehr, dass die Mission nicht *fehlschlägt*, aber ich habe einige Zweifel.
  
  Se *fallirà* l’intera operazione, ci saranno gravi conseguenze per tutti noi.
  Falls der gesamte Einsatz *scheitert*, wird es ernste Folgen für uns alle geben.
