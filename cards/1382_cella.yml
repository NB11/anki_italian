Rang: 1382
Wort: cella
Wortart: n.f
Wort mit Artikel: la cella
Femininum / Plural: celle
IPA: ''
Definition: die Zelle, -n
Register: ''
Beispielsätze: |-
  L'ispettore ha trovato una *cella* nascosta sotto l'albergo abbandonato.
  Der Inspektor hat eine *Zelle* unter dem verlassenen Hotel gefunden.
  
  Chiaramente, non tutti nella *sezione* civile volevano trascinare il debito come un macigno.
  Klar wollten nicht alle in der *zivilen* Abteilung die Schuld wie einen Klotz mit sich schleppen.
  
  Se avessimo *abitato* sull'ala ovest del liceo, avremmo sentito direttamente la provenienza del fumo.
  Wenn wir auf dem West*flügel* des Gymnasiums gewohnt hätten, hätten wir den Ursprung des Rauchs direkt vernommen.
  
  Il genio aveva previsto che la banda avrebbe usato una trappola nella *cella* sotterranea per attirarli.
  Das *Genie* hatte vorausgesehen, dass die Bande eine Falle in der unterirdischen Zelle nutzen würde, um sie anzulocken.
  
  Mentre l'assistente regalava un paradiso di fiori al killer colpevole, l'ispettore non poteva negare l'evidenza delle *celle* fotografate.
  Während der Assistent dem schuldigen *Killer* ein Paradies aus Blumen schenkte, konnte der Inspektor die Bilder der Zellen nicht leugnen.
