Rang: 3336
Wort: eleggere
Wortart: vt
Wort mit Artikel: eleggere
Femininum / Plural: ''
IPA: ''
Definition: wählen, auswählen, küren
Register: ''
Beispielsätze: |-
  In Italia *eleggono* il presidente della repubblica ogni sette anni.
  In Italien *wählen* sie den Präsidenten der Republik alle sieben Jahre.
  
  Se avessi più potere, *eleggerei* una donna come capo del governo.
  Wenn ich mehr Macht hätte, *würde* ich eine Frau zur Regierungschefin wählen.
  
  Ci chiediamo chi verrà *eletto* come nuovo rappresentante della lega.
  Wir fragen uns, wer als neuer Vertreter der Liga *gewählt* werden wird.
  
  Nonostante le polemiche, hanno deciso di *eleggere* lui come candidato ufficiale.
  Trotz der Kontroversen haben sie sich entschieden, ihn als offiziellen Kandidaten zu *küren*.
  
  Sembra che il popolo voglia *eleggere* qualcuno che cambi davvero le cose, non un politico tradizionale.
  Es scheint, als wolle das Volk jemanden *wählen*, der die Dinge wirklich verändert, nicht einen traditionellen Politiker.
