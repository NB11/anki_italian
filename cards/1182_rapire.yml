Rang: 1182
Wort: rapire
Wortart: vt
Wort mit Artikel: rapire
Femininum / Plural: ''
IPA: ''
Definition: entführen, kidnappen
Register: ''
Beispielsätze: |-
  I genitori temono che qualcuno possa *rapire* il loro figlio durante il viaggio al Nord.
  Die Eltern fürchten, dass jemand ihren Sohn während der Reise in den *Norden* entführen könnte.
  
  Se avessi saputo che il nipote sarebbe stato *rapito*, non avrei mai dato il mio do al ladro.
  Hätte ich gewusst, dass der *Neffe* entführt werden würde, hätte ich mein Geschenk dem Dieb nie gegeben.
