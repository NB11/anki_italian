Rang: 3638
Wort: soffitto
Wortart: n.m
Wort mit Artikel: il soffitto
Femininum / Plural: soffitti
IPA: ''
Definition: die Decke, -n
Register: ''
Beispielsätze: |-
  Il *soffitto* della mia stanza è bianco e molto alto.
  Die *Decke* meines Zimmers ist weiß und sehr hoch.
  
  Abbiamo trovato delle macchie sul *soffitto* che non c'erano prima.
  Wir haben Flecken an der *Decke* entdeckt, die vorher nicht da waren.
  
  Se il *soffitto* fosse più basso, ci sentiremmo soffocare.
  Wenn die *Decke* niedriger wäre, würden wir uns eingeengt fühlen.
  
  Nonostante la pioggia, il *soffitto* della veranda non ha mai perso una goccia d'acqua.
  Trotz des Regens hat die *Decke* der Veranda nie einen Wassertropfen durchgelassen.
  
  Quando ho visto che il *soffitto* della cucina iniziava a creparsi, ho chiamato immediatamente l'idraulico.
  Als ich sah, dass die *Decke* in der Küche Risse bekam, rief ich sofort den Klempner an.
