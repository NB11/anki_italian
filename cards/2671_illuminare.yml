Rang: 2671
Wort: illuminare
Wortart: v
Wort mit Artikel: illuminare
Femininum / Plural: ''
IPA: ''
Definition: beleuchten, erhellen
Register: ''
Beispielsätze: |-
  La luna *illumina* debolmente il bosco di notte.
  Der Mond *beleuchtet* den Wald in der Nacht schwach.
  
  Vorrei che qualcuno *illuminasse* la stanza senza accendere la luce.
  Ich *wünschte*, jemand würde den Raum erhellen, ohne das Licht einzuschalten.
  
  Il pittore ha deciso di *illuminare* il dipinto con colori più vivaci.
  Der Maler hat beschlossen, das Gemälde mit *lebendigeren* Farben zu beleuchten.
  
  Dopo il temporale, il sole ha finalmente *illuminato* il giardino.
  Nach dem Gewitter hat die Sonne den Garten endlich *erhellt*.
  
  Spero che la luna riesca a *illuminare* il sentiero, altrimenti dovremo usare la torcia.
  Ich hoffe, dass der Mond den Pfad *erhellen* kann, sonst müssen wir die Taschenlampe benutzen.
