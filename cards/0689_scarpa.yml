Rang: 689
Wort: scarpa
Wortart: n.f
Wort mit Artikel: la scarpa
Femininum / Plural: scarpe
IPA: ''
Definition: der Schuh, -e
Register: ''
Beispielsätze: |-
  Questa *scarpa* è troppo stretta per il mio piede.
  Dieser *Schuh* ist zu eng für meinen Fuß.
  
  Ho comprato delle *scarpe* nuove per la festa di compleanno di Marco.
  Ich habe neue *Schuhe* für Marcos Geburtstagsfeier gekauft.
  
  Se non ti metti le *scarpe*, non puoi uscire fuori perché c'è la neve intorno a casa.
  Wenn du dir die *Schuhe* nicht anziehst, kannst du nicht rausgehen, denn es liegt Schnee ringsum am Haus.
  
  La *scarpa* sinistra che ho ricevuto per errore è della misura sbagliata, quindi devo cambiarla nel negozio.
  Der linke *Schuh*, den ich versehentlich bekommen habe, hat die falsche Größe, also muss ich ihn im Geschäft umtauschen.
  
  Mentre correvo nel parco, ho notato che una *scarpa* mi faceva male al tallone, quindi ho dovuto fermarmi.
  Während ich im Park lief, merkte ich, dass mir ein *Schuh* an der Ferse wehtat, deshalb musste ich stehen bleiben.
