Beispielsätze: |-
  Questo vino *proviene* dalla Toscana, una regione famosa per i suoi vigneti.
  Dieser Wein *kommt* aus der Toskana, einer Region, die für ihre Weinberge bekannt ist.
  
  Da dove *provengono* i dati che hai analizzato nel tuo articolo?
  Woher *stammen* die Daten, die du in deinem Artikel analysiert hast?
  
  Molti turisti credono che il costume tradizionale *provenga* da questo quartiere, ma non è così.
  Viele Touristen glauben, dass die traditionelle Tracht aus diesem *Viertel kommt*, aber das stimmt nicht.
  
  Se *provenisse* da un Paese lontano, dovresti prenotare un visto prima di partecipare al convegno.
  Wenn *sie* aus einem fernen Land käme, müsstest du vor der Teilnahme an der Konferenz ein Visum beantragen.
  
  Gli scienziati sperano che il nuovo farmaco *provenga* da una pianta rara dell’Amazzonia per guarire questa malattia.
  Die Wissenschaftler hoffen, dass das neue Medikament aus einer seltenen Pflanze des Amazonas *stammen* wird, um diese Krankheit zu heilen.
