Wort mit Artikel: mica
Femininum / Plural: ''
IPA: ''
Definition: doch nicht, etwa
Register: ''
Beispielsätze: |-
  Non è *mica* facile come sembra!
  Das ist doch nicht *einfach* wie es scheint!
  
  Ma *mica* lo sapevo che partivi oggi!
  Das wusste ich doch nicht, dass du heute *losfährst*!
  
  Chi credi che sia? Un *mica* normale!
  Wer glaubst du, dass er ist? Ein *ganz und gar* normaler Mensch!
  
  Se pensi che sia colpa mia, ti sbagli di grosso. Non è *mica* vero!
  Wenn du denkst, es sei meine Schuld, liegst du völlig falsch. Das ist doch nicht *wahr*!
  
  Ma *mica* tutti amano il calcio, sai?
  Aber nicht *alle* lieben Fußball, weißt du?
