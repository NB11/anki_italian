Rang: 3934
Wort: mannaro
Wortart: adj
Wort mit Artikel: mannaro
Femininum / Plural: ''
IPA: ''
Definition: wolfsartig, werwolf-, mannig
Register: ''
Beispielsätze: |-
  La leggenda narra di un uomo *mannaro* che viveva nei boschi durante la luna piena.
  Die Legende erzählt von einem *wolfsartigen* Mann, der bei Vollmond in den Wäldern lebte.
  
  Dopo aver letto quel testo *mannaro*, mi sento ancora turbato.
  Nach dem Lesen jenes *werwolfartigen* Textes fühle ich mich immer noch verstört.
  
  Se il suo atteggiamento è così *mannaro*, forse dovremmo evitarlo.
  Falls sein Verhalten so *wolfsartig* ist, sollten wir ihn vielleicht meiden.
  
  È noto che i libretti dell’opera *mannara* sono spesso pieni di simboli oscuri.
  Es ist bekannt, dass die Libretti der *werwolfartigen* Oper oft voller dunkler Symbole sind.
  
  Gli antichi greci credevano che Zeus potesse assumere forme *mannare* per avvicinarsi agli umani.
  Die alten Griechen glaubten, Zeus könne *wolfsartige* Gestalten annehmen, um sich den Menschen zu nähern.
