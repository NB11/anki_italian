Rang: 305
Wort: preparare
Wortart: vt
Wort mit Artikel: preparare
Femininum / Plural: ''
IPA: ''
Definition: vorbereiten, zubereiten
Register: ''
Beispielsätze: |-
  Devo *preparare* una presentazione per domani.
  Ich muss eine *Präsentation* für morgen *vorbereiten*.
  
  Hanno *preparato* la cena insieme ai figli.
  Sie haben das Abendessen *zubereitet* zusammen mit den Kindern.
  
  Se avessi più tempo, *preparerei* un dolce squisito.
  Wenn ich mehr Zeit hätte, würde ich einen köstlichen *Kuchen vorbereiten*.
  
  È importante *prepararsi* prima dell’esame.
  Es ist wichtig, sich vor der *Prüfung vorzubereiten*.
  
  Ti aiuto a *preparare* i bagagli per il viaggio?
  Soll ich dir helfen, das *Gepäck für die Reise vorzubereiten*?
