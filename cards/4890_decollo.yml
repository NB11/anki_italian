Rang: 4890
Wort: decollo
Wortart: n.m
Wort mit Artikel: il decollo
Femininum / Plural: decolli
IPA: ''
Definition: der Start, -s
Register: ''
Beispielsätze: |-
  L'*decollo* del volo è stato ritardato a causa del maltempo.
  Der *Start* des Fluges wurde aufgrund des schlechten Wetters verzögert.
  
  Non dimenticare di spegnere il cellulare prima dell'*decollo*!
  Vergiss nicht, das Handy vor dem *Start* auszuschalten!
  
  Il pilota ha spiegato ai passeggeri che l'*decollo* avverrà tra dieci minuti.
  Der Pilot hat den Passagieren erklärt, dass der *Start* in zehn Minuten erfolgt.
  
  Durante l'*decollo* ho sentito un forte rumore nei motori.
  Beim *Start* habe ich ein starkes Geräusch in den Motoren gehört.
  
  Se l'*decollo* viene annullato, riceveremo un rimborso.
  Falls der *Start* abgesagt wird, erhalten wir eine Rückerstattung.
