IPA: ''
Definition: die Wohnung, -en
Register: ''
Beispielsätze: |-
  Ho trovato un *appartamento* in centro che ha una grande terrazza.
  Ich habe eine *Wohnung* im Zentrum gefunden, die eine große Terrasse hat.
  
  Non appena avrò finito di *appartamento* la tesi, potrò finalmente trasferirmi in un altro appartamento.
  Sobald ich die *These* fertiggestellt habe, kann ich endlich in eine andere Wohnung umziehen.
  
  Mi hanno detto che il *appartamento* di tua sorella è molto più grande del mio, ma non ci credo!
  Man hat mir gesagt, dass die *Wohnung* deiner Schwester viel größer ist als meine, aber ich glaube das nicht!
  
  Se avessi più *appartamento* tempo libero, andrei a visitare tutti i appartamenti storici della città.
  Wenn ich mehr *Wohnungs*-Zeit hätte, würde ich alle historischen Wohnungen der Stadt besuchen.
  
  Nonostante il *appartamento* sia piccolo, riesco a viverci comodamente da solo.
  Trotz der kleinen *Wohnung* kann ich darin bequem allein leben.
