Rang: 3202
Wort: appetito
Wortart: n.m
Wort mit Artikel: l'appetito
Femininum / Plural: appetiti
IPA: ''
Definition: der Appetit, -e
Register: ''
Beispielsätze: |-
  Ho perso *appetito* dopo aver visto quel film così triste.
  Ich habe *Appetit* nach diesem so traurigen Film verloren.
  
  Nonostante la fame, non vuole mangiare perché ha *appetito* solo per le cose dolci.
  Trotz des Hungers will er nicht essen, denn er hat *Appetit* nur auf Süßes.
  
  Se *appetito* non ti viene spontaneo, prova a cucinare qualcosa di nuovo!
  Falls *Appetit* nicht von selbst kommt, probiere etwas Neues zu kochen!
  
  Quando sento l’odore del pane appena sfornato, mi viene subito *appetito*.
  Wenn ich den Geruch von frisch gebackenem Brot rieche, bekomme ich sofort *Appetit*.
  
  Dopo la lunga camminata, il nostro *appetito* era così grande che abbiamo mangiato tutto in un baleno.
  Nach dem langen Spaziergang war unser *Appetit* so groß, dass wir alles im Nu aufgegessen haben.
