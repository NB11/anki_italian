Rang: 2405
Wort: investigatore
Wortart: n.m
Wort mit Artikel: l'investigatore
Femininum / Plural: gli investigatori
IPA: ''
Definition: der Ermittler, - / die -in, -innen
Register: ''
Beispielsätze: |-
  L'*investigatore* ha trovato una prova fondamentale per risolvere il caso.
  Der *Ermittler* hat einen entscheidenden Beweis gefunden, um den Fall zu lösen.
  
  Chi ha chiamato l'*investigatore* per indagare sul furto?
  Wer hat den *Ermittler* gerufen, um den Diebstahl zu untersuchen?
  
  Se fossi un *investigatore*, lavorerei su casi internazionali.
  Wenn ich ein *Ermittler* wäre, würde ich an internationalen Fällen arbeiten.
  
  L'*investigatore* di cui ti parlavo ha appena risolto un caso molto complicato.
  Der *Ermittler*, von dem ich dir erzählt habe, hat gerade einen sehr komplizierten Fall gelöst.
  
  Non appena l'*investigatore* arrivò, tutti i sospetti si zittirono.
  Sobald der *Ermittler* eintraf, verstummten alle Verdächtigen.
