Rang: 3841
Wort: sussurrare
Wortart: vi
Wort mit Artikel: sussurrare
Femininum / Plural: ''
IPA: ''
Definition: flüstern
Register: ''
Beispielsätze: |-
  Mi piace *sussurrare* quando racconto una storia ai miei figli prima di dormire.
  Ich mag es, wenn ich meinem Kindern eine Geschichte erzähle und dabei *flüstere*.
  
  Il medico gli ha consigliato di non *sussurrare* per qualche giorno dopo l'operazione.
  Der Arzt hat ihm geraten, nach der Operation für ein paar Tage nicht *zu flüstern*.
  
  Sentivo qualcuno *sussurrare* parole incomprensibili nel corridoio buio.
  Ich hörte jemanden im dunklen Flur Wörter *flüstern*, die ich nicht verstand.
  
  Se avessi saputo che potevi *sussurrare*, ti avrei chiesto di leggere la poesia ad alta voce!
  Wenn ich gewusst hätte, dass du *flüstern* kannst, hätte ich dich gebeten, das Gedicht laut vorzulesen!
  
  È meglio *sussurrare* i segreti che gridarli in pubblico.
  Es ist besser, Geheimnisse *zu flüstern*, als sie in der Öffentlichkeit zu brüllen.
