Rang: 1858
Wort: mezzanotte
Wortart: n.f
Wort mit Artikel: la mezzanotte
Femininum / Plural: mezzanotti
IPA: ''
Definition: die Mitternacht, -
Register: ''
Beispielsätze: |-
  Non ho dormito alle *mezzanotte* perché stavo leggendo un libro interessante.
  Ich habe nicht *um Mitternacht* geschlafen, weil ich ein interessantes Buch gelesen habe.
  
  Quando è arrivato il treno, era già passata da un’ora la *mezzanotte*.
  Als der Zug ankam, war *Mitternacht* schon eine Stunde vorüber.
  
  Ha giurato che non sarebbe più uscito dopo la *mezzanotte* da solo.
  Er hat geschworen, dass er nach *Mitternacht* nicht mehr allein ausgehen würde.
  
  La *mezzanotte* segna l’inizio di un nuovo giorno secondo il calendario tradizionale.
  Die *Mitternacht* markiert den Beginn eines neuen Tages nach dem traditionellen Kalender.
  
  Se non ti sbrighi, perderai l’occasione di arrivare prima della *mezzanotte* al concerto.
  Wenn du dich nicht beeilst, wirst du die Chance verlieren, vor *Mitternacht* beim Konzert anzukommen.
