Rang: 1029
Wort: destra
Wortart: n.f
Wort mit Artikel: la destra
Femininum / Plural: destre
IPA: ''
Definition: die rechte Seite, -n
Register: ''
Beispielsätze: |-
  Gira a *destra* alla prossima intersezione per raggiungere la stazione.
  Biegen Sie an der nächsten Kreuzung nach *rechts* ab, um den Bahnhof zu erreichen.
  
  La stanza a *destra* è quella che cerca, signor Rossi?
  Ist das Zimmer *rechts* das, das Sie suchen, Herr Rossi?
  
  Non mi sono accorto di avere sbagliato direzione finché non ho visto la piazza con la fontana a *destra*.
  Ich merkte erst, dass ich falsch abgebogen war, als ich den Platz mit dem Brunnen auf der *rechten* Seite sah.
  
  Dovevamo andare a *destra*, ma per errore abbiamo preso a sinistra e ci siamo persi nel centro commerciale.
  Wir hätten nach *rechts* abbiegen müssen, haben aber aus Versehen links abgebogen und uns im Einkaufszentrum verlaufen.
  
  Se continui dritto, la *destra* del supermercato è proprio dove ho parcheggiato l’auto ieri.
  Wenn du geradeaus weitergehst, ist die *rechte* Seite des Supermarkts genau dort, wo ich gestern geparkt habe.
