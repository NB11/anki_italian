Rang: 4318
Wort: radar
Wortart: n.m
Wort mit Artikel: il radar
Femininum / Plural: radar
IPA: ''
Definition: das Radar, -e
Register: ''
Beispielsätze: |-
  Il *radar* dell’aeroporto ha rilevato un aereo in avvicinamento.
  Das *Radar* des Flughafens hat ein sich näherndes Flugzeug erfasst.
  
  Secondo le previsioni, domani il *radar* mostrerà un forte temporale.
  Laut den Vorhersagen wird das *Radar* morgen ein starkes Gewitter anzeigen.
  
  Perché non ti fidi del *radar*? È uno strumento affidabile.
  Warum vertraust du dem *Radar* nicht? Es ist ein zuverlässiges Instrument.
  
  Il *radar* della polizia ha aiutato a catturare il rapitore prima che potesse scappare.
  Das *Radar* der Polizei half, den Entführer zu fassen, bevor er fliehen konnte.
  
  Nonostante il *radar* segnalasse pericoli, l’elicottero ha proseguito il volo.
  Obwohl das *Radar* Gefahren meldete, setzte der Hubschrauber seinen Flug fort.
