Rang: 1736
Wort: cassa
Wortart: n.f
Wort mit Artikel: la cassa
Femininum / Plural: casse
IPA: ''
Definition: die Kiste, -n, der Kasten, ¨
Register: ''
Beispielsätze: |-
  Ho comprato una *cassa* di legno per trasportare i libri.
  Ich habe *einen Kasten* aus Holz gekauft, um die Bücher zu transportieren.
  
  Non aprire quella *cassa* perché contiene oggetti fragili!
  Öffne *diesen Kasten* nicht, denn er enthält zerbrechliche Gegenstände!
  
  Alla stazione c’era una *cassa* con gli effetti personali del viaggiatore.
  Am Bahnhof gab es *einen Kasten* mit den persönlichen Sachen des Reisenden.
  
  Vor la caserma hanno trovato una *cassa* piena di munizioni abbandonate.
  Vor der Kaserne haben sie *einen Kasten* voller weggeworfener Munition gefunden.
  
  Se cerchi il documento, guarda nella *cassa* vicino alla porta.
  Wenn du das Dokument suchst, schau mal in *den Kasten* neben der Tür nach.
