Wort mit Artikel: la crema
Femininum / Plural: creme
IPA: ''
Definition: die Creme, -s
Register: ''
Beispielsätze: |-
  Ho bisogno di *crema* idratante per il viso dopo il sole.
  Ich brauche *Creme* für das Gesicht nach der Sonne.
  
  La *crema* pasticcera è usata in molte ricette italiane tradizionali.
  Die *Creme* wird in vielen traditionellen italienischen Rezepten verwendet.
  
  Nonostante il freddo, la *crema* sulle mani si assorbe rapidamente oggi.
  Trotz der Kälte wird die *Creme* an den Händen heute schnell aufgenommen.
  
  Avrei preferito una *crema* più leggera, ma mi hanno assicurato che questa fa bene alla pelle grassa.
  Ich hätte eine *Creme* vorgezogen, die leichter ist, aber sie versicherten mir, dass diese gut für fettige Haut ist.
  
  Sai che esistono *creme* che promettono di ridurre le rughe in poche settimane?
  Weißt du, dass es *Cremes* gibt, die versprechen, Falten in wenigen Wochen zu reduzieren?
