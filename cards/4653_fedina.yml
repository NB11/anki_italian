Rang: 4653
Wort: fedina
Wortart: n.f
Wort mit Artikel: la fedina
Femininum / Plural: fedine
IPA: ''
Definition: der Ausweis, -e
Register: ''
Beispielsätze: |-
  La *fedina* penale di quella persona è pulita, quindi può lavorare con i bambini.
  Der *Strafregisterauszug* dieser Person ist sauber, daher darf sie mit Kindern arbeiten.
  
  Ho bisogno della tua *fedina* per completare la domanda di assunzione.
  Ich brauche deinen *Ausweis* für die vollständige Bewerbung.
  
  Se avessi avuto una brutta *fedina*, non avrebbero assunto mio fratello.
  Wenn er einen schlechten *Leumund* gehabt hätte, hätten sie meinen Bruder nicht eingestellt.
  
  La polizia ha richiesto la *fedina* di tutti i partecipanti alla manifestazione.
  Die Polizei verlangte den *Ausweis* aller Teilnehmer der Demonstration.
  
  Nonostante la sua *fedina* irregolare, è riuscito a ottenere il prestito bancario.
  Trotz seines lückenhaften *Leumunds* gelang es ihm, den Bankkredit zu bekommen.
