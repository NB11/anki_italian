Rang: 865
Wort: allontanare
Wortart: vt
Wort mit Artikel: allontanare
Femininum / Plural: ''
IPA: ''
Definition: entfernen, wegschicken
Register: ''
Beispielsätze: |-
  Devo *allontanare* questo pensiero negativo dalla mia mente!
  Ich muss diesen negativen *Gedanken* aus meinem Kopf entfernen!
  
  Il colonnello ha ordinato di *allontanare* i soldati dal campo di battaglia.
  Der *Oberst* hat befohlen, die Soldaten vom Schlachtfeld wegzuschicken.
  
  Mi dispiace, ma dovrò *allontanare* lei dal progetto per mancanza di tempo.
  Es tut mir leid, aber ich muss Sie vom *Projekt* entfernen, weil die Zeit fehlt.
  
  Se non *allontani* subito il pesce dal ghiaccio, non lo mangeremo più!
  Wenn du den *Fisch* nicht sofort vom Eis entfernt, können wir ihn nicht mehr essen!
  
  Ho cercato di *allontanare* la pelle bruciata dal sole, ma è già tardi.
  Ich habe versucht, die *Haut* von der Sonne wegzubekommen, aber es ist schon zu spät.
