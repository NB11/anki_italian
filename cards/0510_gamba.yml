Rang: 510
Wort: gamba
Wortart: n.f
Wort mit Artikel: la gamba
Femininum / Plural: gambe
IPA: ''
Definition: das Bein, -e
Register: ''
Beispielsätze: |-
  Mi sono *rotta* la *gamba* giocando a calcio.
  Ich habe mir beim Fußball *das Bein* gebrochen.
  
  Le *gambe* di Marco sono molto lunghe.
  Die *Beine* von Marco sind sehr lang.
  
  Non riesco a camminare perché ho un dolore alla *gamba* destra.
  Ich kann nicht laufen, weil ich Schmerzen *in dem rechten Bein* habe.
  
  Mettiamo la sedia vicino alla *gamba* del tavolo per evitare che traballi.
  Wir stellen den Stuhl *an das Tischbein*, damit er nicht wackelt.
  
  Se non ti alleni, potresti avere problemi alle *gambe* più tardi.
  Wenn du dich nicht trainierst, könntest du später Probleme *mit den Beinen* bekommen.
