Rang: 510
Wort: gamba
Wortart: n.m
Wort mit Artikel: la gamba
Femininum / Plural: gambe
IPA: ''
Definition: das Bein, -e
Register: ''
Beispielsätze: |-
  La *gamba* destra mi fa ancora male dopo l’incidente di ieri.
  Das *Bein* rechts tut mir nach dem Unfall von gestern noch weh.
  
  Nonostante il dolore, ha continuato a correre finché non è arrivato al *fondo* della gara.
  Trotz des Schmerzes lief er weiter, bis er am *Ende* des Rennens ankam.
  
  Se continui a saltare così, ti romperai una *gamba*, lo sai?
  Wenn du so weiter springst, brichst du dir ein *Bein*, weißt du das?
  
  Ha presentato una nuova *informazione* contro i risultati della ricerca, ma nessuno gli ha dato assolutamente retta.
  Er hat eine neue *Information* gegen die Forschungsergebnisse vorgebracht, aber ihm hat absolut niemand zugehört.
  
  Chi credi di *convincere* con queste storie? La gente non è più contenta di prima.
  Wen glaubst du damit zu *überzeugen*? Die Leute sind nicht mehr zufrieden als vorher.
