Rang: 1622
Wort: ambulanza
Wortart: n.f
Wort mit Artikel: l'ambulanza
Femininum / Plural: ambulanze
IPA: ''
Definition: der Krankenwagen, -
Register: ''
Beispielsätze: |-
  L'*ambulanza* è arrivata in meno di dieci minuti dopo la chiamata.
  Der *Krankenwagen* ist in weniger als zehn Minuten nach dem Anruf angekommen.
  
  Se non chiami l'*ambulanza* immediatamente, potrebbe essere troppo tardi!
  Wenn du den *Krankenwagen* nicht sofort rufst, könnte es zu spät sein!
  
  L'*ambulanza* che hai visto al lago trasportava una persona con stomaco molto dolorante.
  Der *Krankenwagen*, den du am See gesehen hast, transportierte eine Person mit starken Magenschmerzen.
  
  Nonostante il disastro, non abbiamo chiamato l'*ambulanza* perché le ferite erano lievi.
  Trotz der *Katastrophe* haben wir keinen Krankenwagen gerufen, weil die Verletzungen leicht waren.
  
  Spero che l'*ambulanza* arrivi presto, perché la situazione sta diventando critica.
  Ich hoffe, dass der *Krankenwagen* schnell kommt, denn die Situation wird kritisch.
