Rang: 2505
Wort: secco
Wortart: adj
Wort mit Artikel: secco
Femininum / Plural: ''
IPA: ''
Definition: trocken, mager
Register: ''
Beispielsätze: |-
  Il pane è *secco* e non si può più mangiare.
  Das Brot ist *trocken* und man kann es nicht mehr essen.
  
  Dopo la pioggia, il terreno era ancora *secco* in alcuni punti.
  Nach dem Regen war der Boden an manchen Stellen noch *trocken*.
  
  Preferisco il vino *secco* a quello dolce.
  Ich bevorzuge den *trockenen* Wein gegenüber dem süßen.
  
  Il suo discorso è stato così *secco* che tutti hanno smesso di ascoltare.
  Seine Rede war so *trocken*, dass alle aufgehört haben zuzuhören.
  
  Le foglie cadute diventano *secche* in autunno.
  Die herabgefallenen Blätter werden im Herbst *trocken*.
