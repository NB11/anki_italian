Rang: 1449
Wort: filo
Wortart: n.m
Wort mit Artikel: il filo
Femininum / Plural: i fili
IPA: ''
Definition: die Schnur, -¨e, der Faden, -¨
Register: ''
Beispielsätze: |-
  Ho comprato *filo* blu per cucire la giacca che ho scambiato con un coraggioso giocatore tedesco.
  Ich habe *blauen Faden* gekauft, um die Jacke zu nähen, die ich mit einem mutigen deutschen Spieler getauscht habe.
  
  Il *filo* si è rotto proprio quando stavo per cucire l'orlo, che sfortuna!
  Der *Faden* ist genau in dem Moment gerissen, als ich den Saum nähen wollte – wie unglücklich!
  
  Credo che il *filo* di rame costerà almeno dieci centinaia di euro al chilometro nei prossimi mesi.
  Ich glaube, der *Kupferdraht* wird in den nächsten Monaten mindestens zehn Hunderte Euro pro Kilometer kosten.
  
  Nonostante il cambiamento delle leggi, le autorità non rilasceranno un *credito* a quell'azienda se non definiranno chiaramente il suo ruolo sociale.
  Trotz der Gesetzesänderungen werden die *Behörden* dem Unternehmen keinen Kredit gewähren, wenn es nicht klar seine gesellschaftliche Rolle definiert.
  
  Dammi quel *filo* rosso, per favore, ne ho bisogno per questo tentativo di ricucire il tessuto strappato della mia camicia preferita.
  Gib mir bitte diesen *roten Faden* – ich brauche ihn für diesen Versuch, den zerrissenen Stoff meines Lieblingshemdes wieder zusammenzunähen.
