Rang: 1682
Wort: biscotto
Wortart: n.m
Wort mit Artikel: il biscotto
Femininum / Plural: biscotti
IPA: ''
Definition: der Keks, -e
Register: ''
Beispielsätze: |-
  Mio zio ha preparato *biscotti* eccellenti per il compleanno di mia sorella.
  Mein Onkel hat *hervorragende Kekse* für den Geburtstag meiner Schwester gebacken.
  
  Non mangiare tutti *biscotti* in una volta, altrimenti avrai mal di pancia e dovrai vomitare!
  Iss nicht alle *Kekse* auf einmal, sonst bekommst du Bauchweh und musst dich übergeben!
  
  Dopo aver girato attorno al mucchio di *biscotti*, ho capito che qualcuno li aveva già mangiati prima di me.
  Nachdem ich *ringsherum* um den Haufen Kekse gegangen war, merkte ich, dass jemand sie schon vor mir gegessen hatte.
  
  Se vuoi eseguire una ricetta famigliare, aggiungi sempre un pizzico di cannella ai tuoi *biscotti*.
  Wenn du ein *vertrautes* Rezept ausführen möchtest, füg deinen Keksen immer eine Prise Zimt hinzu.
  
  Hanno organizzato una festa a tema anni '80, dove servivano *biscotti* a forma di rock e bevande analcoliche in lattine colorate.
  Sie haben eine Party im Stil der 80er organisiert, bei der es *Kekse* in Form von Felsen und alkoholfreie Getränke in bunt bedruckten Dosen gab.
