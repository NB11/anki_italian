Rang: 1206
Wort: rappresentare
Wortart: vt
Wort mit Artikel: rappresentare
Femininum / Plural: ''
IPA: ''
Definition: darstellen, repräsentieren
Register: ''
Beispielsätze: |-
  Questo dipinto *rappresenta* la vittoria del popolo italiano nella Seconda Guerra Mondiale.
  Dieses Gemälde *stellt* den Sieg des italienischen Volkes im Zweiten Weltkrieg dar.
  
  Se avessi più tempo, *rappresenterei* l’Italia ai Giochi Olimpici come atleta.
  Wenn ich mehr Zeit hätte, würde ich *repräsentiere* Italien bei den Olympischen Spielen als Athlet.
  
  Il sindaco ha dichiarato che il nuovo museo *rappresenterà* il nostro patrimonio culturale per le prossime generazioni.
  Der Bürgermeister hat erklärt, dass das neue Museum unser kulturelles Erbe für die nächsten Generationen *repräsentieren wird*.
  
  Non è giusto che un solo voto *rappresenti* tutto un popolo nelle decisioni politiche.
  Es ist nicht fair, dass eine einzige Stimme *das ganze Volk* in politischen Entscheidungen repräsentiert.
  
  Anche se molti politici cercano di *rappresentare* gli interessi dei cittadini, spesso finiscono per deluderli.
  Auch wenn viele Politiker versuchen, die Interessen der Bürger zu *vertreten*, enttäuschen sie sie oft.
