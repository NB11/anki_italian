Rang: 336
Wort: traduzione
Wortart: n.f
Wort mit Artikel: la traduzione
Femininum / Plural: traduzioni
IPA: ''
Definition: die Übersetzung, -en
Register: ''
Beispielsätze: |-
  Ho fatto una *traduzione* dal tedesco all'italiano.
  Ich habe eine *Übersetzung* vom Deutschen ins Italienische gemacht.
  
  La *traduzione* di questo testo è molto difficile.
  Die *Übersetzung* dieses Textes ist sehr schwierig.
  
  Avete già finito le *traduzioni* per domani?
  Habt ihr die *Übersetzungen* für morgen schon fertig?
  
  Spero che la *traduzione* sia corretta.
  Ich hoffe, dass die *Übersetzung* korrekt ist.
  
  L’editore ha letto tutte le *traduzioni* con attenzione.
  Der Herausgeber hat alle *Übersetzungen* aufmerksam gelesen.
