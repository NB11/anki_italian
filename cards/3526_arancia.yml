Rang: 3526
Wort: arancia
Wortart: n.f
Wort mit Artikel: l'arancia
Femininum / Plural: arance
IPA: ''
Definition: die Orange, -n
Register: ''
Beispielsätze: |-
  Ho comprato *arance* fresche al mercato stamattina.
  Ich habe heute Morgen frische *Orangen* am Markt gekauft.
  
  La *arancia* è il frutto simbolo della Sicilia, insieme al limone.
  Die *Orange* ist die Symbolfrucht Siziliens, zusammen mit der Zitrone.
  
  Se mangi troppa *arancia* a stomaco vuoto, potresti avere bruciore di stomaco.
  Wenn du zu viele *Orangen* auf nüchternen Magen isst, könntest du Sodbrennen bekommen.
  
  Vorrei sapere se questa macedonia contiene *arance* o solo pompelmi.
  Ich möchte wissen, ob dieser Obstsalat *Orangen* enthält oder nur Grapefruits.
  
  Nonostante il freddo, i nostri alberi da frutto sono pieni di *arance* quest’anno.
  Trotz der Kälte sind unsere Obstbäume dieses Jahr voller *Orangen*.
