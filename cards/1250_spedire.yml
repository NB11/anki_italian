Rang: 1250
Wort: spedire
Wortart: vt
Wort mit Artikel: spedire
Femininum / Plural: ''
IPA: ''
Definition: schicken, senden
Register: ''
Beispielsätze: |-
  Devo *spedire* questo pacco prima di domani mattina.
  Ich muss diesen *Paket* morgen früh schicken.
  
  Non oso *spedire* la lettera perché contiene un segreto.
  Ich *wage* nicht, den Brief zu senden, weil er ein Geheimnis enthält.
  
  Il comandante ha disposto di *spedire* i soldati al confine.
  Der *Befehlshaber* hat angeordnet, die Soldaten an die Grenze zu schicken.
  
  Se avessi più soldi, avrei *spedito* questo oggetto al mercato.
  Wenn ich mehr *Geld* hätte, hätte ich diesen Gegenstand auf den Markt gesendet.
  
  È necessario *spedire* la richiesta prima che scada il termine.
  Man muss den *Antrag* schicken, bevor die Frist abläuft.
