Rang: 3923
Wort: gonfiare
Wortart: v
Wort mit Artikel: gonfiare
Femininum / Plural: ''
IPA: ''
Definition: aufblasen, aufpumpen, aufblähen
Register: ''
Beispielsätze: |-
  Il meccanico ha *gonfiato* lo pneumatico della bicicletta con una pompa manuale.
  Der Mechaniker hat die Fahrradbereifung mit einer Handpumpe *aufgepumpt*.
  
  Se non *gonfi* il materassino, non galleggi sul lago!
  Wenn du die Luftmatratze nicht *aufpumpst*, kannst du nicht auf dem See schwimmen!
  
  La nonna mi ha spiegato che una volta si *gonfiavano* i palloncini a bocca.
  Meine Oma hat mir erklärt, dass man früher Ballons mit dem Mund *aufgeblasen* hat.
  
  Credo che il venditore abbia *gonfiato* troppo il prezzo di quella limousine usata.
  Ich glaube, der Verkäufer hat den Preis für diese gebrauchte Limousine zu sehr *aufgebläht*.
  
  Appena arriverò in spiaggia, *gonfierò* il mio gommone per fare un giro in mare.
  Sobald ich am Strand ankomme, werde ich mein Schlauchboot *aufpumpen*, um eine Runde auf dem Meer zu drehen.
