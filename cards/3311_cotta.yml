Rang: 3311
Wort: cotta
Wortart: n.m
Wort mit Artikel: il cotta
Femininum / Plural: le cotte
IPA: ''
Definition: die *Koteletts*, die *Rippchen*
Register: ''
Beispielsätze: |-
  Al ristorante ho ordinato una *cotta* alla griglia con contorno di patate.
  Im Restaurant habe ich ein gegrilltes *Kotelett* mit Pommerer als Beilage bestellt.
  
  Le *cotte* di maiale sono molto saporite, ma richiedono una cottura lenta.
  Die Schweine*rippchen* sind sehr schmackhaft, benötigen aber eine lange Garzeit.
  
  Mio nonno amava le *cotte* cucinate dalla nonna, diceva che non esistevano uguali.
  Mein Opa liebte die Schweine*koteletts*, die Oma zubereitete – er sagte, es gäbe nichts Gleichwertiges.
  
  Non so se preferisco le *cotte* di agnello o quelle di vitello, entrambe sono deliziose.
  Ich weiß nicht, ob ich Lamm- oder Kalbs*koteletts* bevorzuge – beide sind köstlich.
  
  Quando preparo il barbecue, non mancano mai le *cotte* marinate nel vino rosso.
  Wenn ich den Grill anwerfe, fehlen nie die im Rotwein marinierten *Rippchen*.
