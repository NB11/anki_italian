Rang: 4155
Wort: masturbare
Wortart: vi
Wort mit Artikel: masturbare
Femininum / Plural: ''
IPA: ''
Definition: sich *masturbieren*, *onanieren*
Register: ''
Beispielsätze: |-
  Spesso, quando non c'è molto da fare, mi capita di *masturbarmi* prima di addormentarmi.
  Oft, wenn ich nichts zu tun habe, *masturbiere* ich mich, bevor ich einschlafe.
  
  Dopo aver letto quel romanzo, ti sei mai *masturbato* pensando a una delle scene più vivide?
  Hast du dich nach dem Lesen dieses Romans je *masturbiert*, indem du an eine der lebhaftesten Szenen gedacht hast?
  
  Non giudico chi si *masturba*, purché lo faccia in modo discreto e rispettoso degli altri.
  Ich beurteile niemanden, der sich *masturbiert*, solange er es unauffällig und mit Respekt vor anderen tut.
  
  Se avessi tempo libero, ti *mastuberesti* più spesso o preferiresti dedicarti a hobby diversi?
  Wenn du Freizeit hättest, *masturbiertest* du dich öfter oder würdest du lieber anderen Hobbys nachgehen?
  
  È vero che alcuni studi suggeriscono che *masturbarsi* possa aiutare a ridurre lo stress, ma non tutti sono d'accordo su questo punto.
  Es stimmt zwar, dass einige Studien nahelegen, dass man sich *masturbieren* kann, um Stress abzubauen, aber nicht alle sind dieser Meinung.
