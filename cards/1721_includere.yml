Rang: 1721
Wort: includere
Wortart: v
Wort mit Artikel: includere
Femininum / Plural: ''
IPA: ''
Definition: einschließen, beinhalten
Register: ''
Beispielsätze: |-
  Il prezzo del viaggio *include* la colazione e la cena ogni giorno.
  Der Preis der Reise *beinhaltet* das Frühstück und das Abendessen jeden Tag.
  
  Ho bisogno di un programma che *includa* tutte le attività per la gita scolastica.
  Ich brauche ein Programm, das *beinhaltet* alle Aktivitäten für den Schulausflug.
  
  Nonostante il malinteso, loro volevano *includere* anche me nella decisione finale.
  Trotz des Missverständnisses wollten sie mich in die endgültige Entscheidung *einbeziehen*.
  
  Se il pacco non *includerà* le spese di spedizione, dovrò pagarle separatamente.
  Falls das Paket die Versandkosten nicht *enthalten wird*, muss ich sie separat zahlen.
  
  È essenziale *includere* le fonti in ogni ricerca scientifica per evitare accuse di plagio.
  Es ist notwendig, die Quellen in jede wissenschaftliche Arbeit *aufzunehmen*, um Plagiatsvorwürfe zu vermeiden.
