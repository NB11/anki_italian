Rang: 2156
Wort: tragedia
Wortart: n.f
Wort mit Artikel: la tragedia
Femininum / Plural: tragedie
IPA: ''
Definition: die Tragödie, -n
Register: ''
Beispielsätze: |-
  *Tragedia* vuole dire una storia con un finale infelice.
  Eine *Tragödie* bedeutet eine Geschichte mit einem unglücklichen Ende.
  
  Il regista temeva che la sua nuova opera fosse una *tragedia* moderna.
  Der Regisseur fürchtete, dass sein neues Werk eine moderne *Tragödie* sei.
  
  È necessario studiare le *tragedie* greche per capire la cultura antica.
  Man muss die griechischen *Tragödien* studieren, um die antike Kultur zu verstehen.
  
  Si dice che la vita sia una *tragedia* perché finisce sempre male.
  Man sagt, das Leben sei eine *Tragödie*, weil es immer schlecht endet.
  
  Nonostante l’inizio promettente, alla fine si rivelò essere una vera *tragedia* per tutti noi.
  Trotz des vielversprechenden Anfangs stellte es sich am Ende als eine echte *Tragödie* für uns alle heraus.
