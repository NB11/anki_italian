Rang: 1641
Wort: legame
Wortart: n.m
Wort mit Artikel: il legame
Femininum / Plural: legami
IPA: ''
Definition: die Bindung, -en; die Beziehung, -en
Register: ''
Beispielsätze: |-
  Il *legame* tra loro era molto forte fin dall'infanzia.
  Die *Bindung* zwischen ihnen war schon seit der Kindheit sehr stark.
  
  Nonostante il *legame* familiare, decise di trasferirsi all'estero.
  Trotz der *Beziehung* zur Familie beschloss sie, ins Ausland zu ziehen.
  
  Crede che il *legame* tra arte e politica sia fondamentale per cambiare la società.
  Sie glaubt, dass die *Verbindung* zwischen Kunst und Politik entscheidend ist, um die Gesellschaft zu verändern.
  
  Il *legame* che senti con la tua città natale non si spezza mai.
  Die *Bindung*, die du zu deiner Heimatstadt fühlst, reißt nie ab.
  
  Se rompi questo *legame*, perderai tutto ciò per cui hai lavorato.
  Wenn du diese *Beziehung* brichst, verlierst du alles, wofür du gearbeitet hast.
