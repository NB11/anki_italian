Beispielsätze: |-
  Mio figlio va all'*asilo* da settembre.
  Mein Sohn geht in den *Kindergarten* seit September.
  
  Ho lavorato nell'*asilo* per dieci anni e mi manca molto.
  Ich habe im *Kindergarten* zehn Jahre lang gearbeitet und vermisse es sehr.
  
  L'*asilo* vicino a casa nostra organizza una festa per i genitori.
  Der *Kindergarten* in unserer Nähe organisiert ein Fest für die Eltern.
  
  Non appena finirà la scuola, mio nipote inizierà l'*asilo*.
  Sobald die Schule vorbei ist, beginnt mein Neffe den *Kindergarten*.
  
  Se avessi più tempo, mi piacerebbe aprire un *asilo* bilingue.
  Wenn ich mehr Zeit hätte, würde ich gern einen zweisprachigen *Kindergarten* eröffnen.
