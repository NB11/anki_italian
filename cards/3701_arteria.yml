Rang: 3701
Wort: arteria
Wortart: n.f
Wort mit Artikel: l'arteria
Femininum / Plural: arterie
IPA: ''
Definition: die Arterie, -n
Register: ''
Beispielsätze: |-
  L’*arteria* principale del corpo umano trasporta il sangue ossigenato dal cuore a tutto l’organismo.
  Die *Hauptschlagader* transportiert sauerstoffreiches Blut vom Herzen in den gesamten Körper.
  
  Il medico ha scoperto un’ostruzione in quest’*arteria* che potrebbe causare seri problemi.
  Der Arzt hat eine Verstopfung in dieser *Arterie* entdeckt, die ernste Probleme verursachen könnte.
  
  Se l’*arteria* si rompe, è un’emergenza che richiede un intervento immediato.
  Wenn die *Arterie* reißt, ist das ein Notfall, der einen sofortigen Eingriff erfordert.
  
  Durante l’intervento, hanno riparato un’arteria danneggiata vicino al *cuore*.
  Während des Eingriffs haben sie eine beschädigte *Arterie* in der Nähe des Herzens repariert.
  
  La circolazione sanguigna dipende dal corretto funzionamento di tutte le *arterie* e vene.
  Der Blutkreislauf hängt von der korrekten Funktion aller *Arterien* und Venen ab.
