Rang: 421
Wort: partire
Wortart: vi
Wort mit Artikel: partire
Femininum / Plural: ''
IPA: ''
Definition: abreisen, weggehen, starten
Register: ''
Beispielsätze: |-
  Domani *partirò* presto per Roma.
  Morgen werde ich früh *nach Rom* *abreisen*.
  
  Sei triste perché stai *partendo*?
  Bist du traurig, weil du *weggehst*?
  
  Se *partissimo* oggi, arriveremmo domani.
  Wenn wir heute *abreisten*, würden wir morgen ankommen.
  
  *Parti* sempre all’ultimo momento!
  Du *gehst* immer in letzter Sekunde *weg*!
  
  Ho sentito che hai *partito* senza salutare.
  Ich habe gehört, dass du *abgereist* bist, ohne dich zu verabschieden.
