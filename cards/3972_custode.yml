Rang: 3972
Wort: custode
Wortart: n.m
Wort mit Artikel: il custode
Femininum / Plural: i custodi
IPA: ''
Definition: der Wärter, - / der Aufseher, -
Register: ''
Beispielsätze: |-
  Il *custode* del museo ci ha spiegato la storia delle opere esposte con grande dettaglio.
  Der *Wärter* des Museums hat uns die Geschichte der ausgestellten Werke mit großer Detailgenauigkeit erklärt.
  
  Durante il nostro viaggio in Egitto, abbiamo incontrato un *custode* che ci ha mostrato i segreti delle piramidi.
  Während unserer Reise in Ägypten trafen wir auf einen *Aufseher*, der uns die Geheimnisse der Pyramiden zeigte.
  
  Se non avessi dimenticato la chiave, non avremmo dovuto chiamare il *custode* di notte!
  Wenn ich den Schlüssel nicht vergessen hätte, hätten wir den *Wärter* nicht nachts rufen müssen!
  
  Il *custode*, che da trent'anni sorveglia quel palazzo, conosce ogni suo angolo.
  Der *Aufseher*, der dieses Gebäude seit dreißig Jahren bewacht, kennt jeden Winkel davon.
  
  Mi hanno detto che il *custode* ha avvertito delle irregolarità nell'impianto elettrico prima dell'incendio.
  Man hat mir gesagt, dass der *Wärter* vor dem Brand auf Unregelmäßigkeiten in der elektrischen Anlage hingewiesen hat.
