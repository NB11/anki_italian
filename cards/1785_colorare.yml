Rang: 1785
Wort: colorare
Wortart: v
Wort mit Artikel: colorare
Femininum / Plural: ''
IPA: ''
Definition: färben, ausmalen
Register: ''
Beispielsätze: |-
  Mi piace *colorare* i disegni quando sono stressato.
  Ich mag es, die Zeichnungen zu *färben*, wenn ich gestresst bin.
  
  Ha detto che avrebbe *colorato* il muro di blu, ma poi ha cambiato idea.
  Er sagte, er würde die Wand blau *färben*, aber dann hat er seine Meinung geändert.
  
  Se avessi più pazienza, potrei *colorare* questo quadro senza sbavature.
  Wenn ich mehr *Geduld* hätte, könnte ich dieses Gemälde ohne Kleckse färben.
  
  Mentre la bambina *colorava* il suo libro, il cane ha rovesciato i pennarelli.
  Während das Mädchen ihr Buch *färbte*, hat der Hund die Filzstifte umgeworfen.
  
  Peccato che non abbia finito di *colorare* quella figura, era così carina.
  Schade, dass er nicht fertig geworden ist, diese Figur zu *färben* – sie war so hübsch.
