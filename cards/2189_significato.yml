Rang: 2189
Wort: significato
Wortart: n.m
Wort mit Artikel: il significato
Femininum / Plural: i significati
IPA: ''
Definition: die Bedeutung, -en
Register: ''
Beispielsätze: |-
  Non capisco il *significato* di questa parola: puoi spiegarmelo per favore?
  Ich verstehe die *Bedeutung* dieses Wortes nicht: kannst du es mir bitte erklären?
  
  Il *significato* di quella frase poetica è molto profondo e difficile da afferrare al primo colpo.
  Die *Bedeutung* dieses poetischen Satzes ist sehr tief und schwer auf Anhieb zu begreifen.
  
  Secondo il dizionario, il *significato* originale di 'computer' era 'persona che calcola', non la macchina.
  Laut Wörterbuch war die ursprüngliche *Bedeutung* von 'Computer' 'eine Person, die rechnet', nicht die Maschine.
  
  Vorrei sapere qual è il *significato* di questo simbolo nell'antico tempio; forse c'entra qualcosa con la divinità.
  Ich möchte wissen, was die *Bedeutung* dieses Symbols im alten Tempel hat; vielleicht hat es etwas mit der Gottheit zu tun.
  
  Il filosofo ha dedicato tutta la sua vita a indagare il *significato* della felicità umana.
  Der Philosoph hat sein ganzes Leben damit verbracht, die *Bedeutung* des menschlichen Glücks zu erforschen.
