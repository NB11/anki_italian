Rang: 4642
Wort: crepa
Wortart: n.f
Wort mit Artikel: la crepa
Femininum / Plural: crepe
IPA: ''
Definition: der Riss, die Spalte, -e,-en
Register: ''
Beispielsätze: |-
  Ho notato una *crepa* nel muro del bagno che si allarga di giorno in giorno.
  Ich habe einen *Riss* in der Badezimmerwand bemerkt, der sich von Tag zu Tag vergrößert.
  
  Se non ripari quella *crepa*, il tetto potrebbe crollare durante la prossima tempesta.
  Wenn du diesen *Riss* nicht reparierst, könnte das Dach beim nächsten Sturm einstürzen.
  
  Il muratore mi ha chiesto se volevo chiamare anche lui a controllare la *crepa* nel salotto.
  Der Maurer fragte mich, ob ich ihn auch bitten wollte, den *Riss* im Wohnzimmer zu überprüfen.
  
  Dopo il terremoto, in tutta la città si contavano centinaia di *crepe* negli edifici storici.
  Nach dem Erdbeben zählte man in der ganzen Stadt Hunderte von *Rissen* in den historischen Gebäuden.
  
  La *crepa* nel vetro della finestra si è formata a causa del forte colpo ricevuto ieri sera.
  Der *Riss* in der Fensterscheibe hat sich durch den starken Schlag gestern Abend gebildet.
