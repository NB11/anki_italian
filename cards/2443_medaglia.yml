Rang: 2443
Wort: medaglia
Wortart: n.f
Wort mit Artikel: la medaglia
Femininum / Plural: medaglie
IPA: ''
Definition: die Medaille, -n
Register: ''
Beispielsätze: |-
  L'arbitro ha consegnato la *medaglia* d'oro al vincitore della gara di atletica.
  Der Schiedsrichter überreichte dem Sieger des Leichtathletikwettkampfs die *Medaille*.
  
  Nonostante il suo talento, non ha ricevuto alcuna *medaglia* in questa competizione.
  Trotz ihres Talents hat sie in diesem Wettbewerb keine *Medaille* erhalten.
  
  Se avessi gareggiato seriamente, forse avresti guadagnato anche tu una *medaglia*.
  Wenn du ernsthaft mitgemacht hättest, hättest du vielleicht ebenfalls eine *Medaille* gewonnen.
  
  La *medaglia* che hai trovato nello scavo storico sembra appartenere a un atleta del secolo scorso.
  Die *Medaille*, die du bei der historischen Ausgrabung gefunden hast, scheint einem Sportler des letzten Jahrhunderts zu gehören.
  
  Che tu vinca o perda, riceverai una *medaglia* per aver partecipato, come promesso dal comitato organizzatore.
  Ob du gewinnst oder verlierst, du bekommst eine *Medaille* für deine Teilnahme, wie vom Organisationskomitee versprochen.
