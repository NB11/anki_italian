Rang: 4160
Wort: scappata
Wortart: n.f
Wort mit Artikel: la scappata
Femininum / Plural: scappate
IPA: ''
Definition: die Flucht, -en
Register: ''
Beispielsätze: |-
  La *scappata* dal ristorante è stata così veloce che abbiamo perso la chiave della macchina.
  Die *Flucht* aus dem Restaurant war so schnell, dass wir den Autoschlüssel verloren haben.
  
  Dopo aver sentito il tuo messaggio, ho fatto una *scappata* in libreria per comprare il libro che mi avevi consigliato.
  Nachdem ich deine Nachricht gehört hatte, habe ich einen *Abstecher* in die Buchhandlung gemacht, um das Buch zu kaufen, das du mir empfohlen hattest.
  
  La *scappata* a Milano è stata così entusiasmante che non vedo l’ora di tornarci.
  Der *Ausflug* nach Mailand war so aufregend, dass ich mich jetzt schon darauf freue, wieder hinzufahren.
  
  Se vuoi evitare la *scappata* in metropolitana all’ora di punta, meglio prendere la bici.
  Wenn du den *Ansturm* in der U-Bahn zur Stoßzeit vermeiden willst, nimm lieber das Fahrrad.
  
  La sua *scappata* improvvisa ha lasciato tutti senza parole e nessuno sapeva come reagire.
  Sein plötzlicher *Aufbruch* hat alle sprachlos zurückgelassen und niemand wusste, wie er darauf reagieren sollte.
