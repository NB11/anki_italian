Rang: 3910
Wort: ammanettare
Wortart: vt
Wort mit Artikel: ammanettare
Femininum / Plural: ''
IPA: ''
Definition: Handfesseln anlegen
Register: ''
Beispielsätze: |-
  La polizia ha *ammanettato* il criminale senza difficoltà.
  Die Polizei hat den Kriminellen *ohne Widerstand* gefesselt.
  
  Se avessi rubato, ti avrebbero *ammanettato* immediatamente.
  Wenn du gestohlen hättest, hätte man dich *sofort* in Handschellen gelegt.
  
  Non è giusto *ammanettare* una persona prima del processo!
  Es ist nicht richtig, eine Person *vor dem Prozess* zu fesseln!
  
  Ho visto come l'hanno *ammanettato* in diretta televisiva.
  Ich habe gesehen, wie man ihn *live im Fernsehen* gefesselt hat.
  
  Prima di *ammanettarlo*, gli hanno letto i suoi diritti.
  Bevor man ihn *fesselte*, hat man ihm seine Rechte vorgelesen.
