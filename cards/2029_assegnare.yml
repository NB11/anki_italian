Rang: 2029
Wort: assegnare
Wortart: vt
Wort mit Artikel: assegnare
Femininum / Plural: ''
IPA: ''
Definition: zuweisen, zuteilen, übertragen
Register: ''
Beispielsätze: |-
  Il professore *ha assegnato* un compito difficile a tutti gli studenti.
  Der Professor hat *eine* schwierige Aufgabe allen Studenten zugewiesen.
  
  Vorrei *assegnare* questo compito al mio collaboratore più capace.
  Ich möchte diese Aufgabe *meinem* fähigsten Mitarbeiter zuweisen.
  
  La commissione sta per *assegnare* le borse di studio ai candidati più meritevoli.
  Die Kommission wird gleich *die* Stipendien den würdigsten Kandidaten zuweisen.
  
  Se non ti *assegnassero* il visto in tempo, dovresti avvisare l’ambasciata.
  Wenn sie dir den Visum nicht rechtzeitig zuweisen, solltest du die Botschaft informieren.
  
  È importante *assegnare* le risorse giuste al progetto giusto per ottenere risultati efficaci.
  Es ist wichtig, die richtigen Ressourcen *dem* richtigen Projekt zuzuweisen, um effektive Ergebnisse zu erzielen.
