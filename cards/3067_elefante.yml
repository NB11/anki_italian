Rang: 3067
Wort: elefante
Wortart: n.m
Wort mit Artikel: l'elefante
Femininum / Plural: gli elefanti
IPA: ''
Definition: der Elefant, -en
Register: ''
Beispielsätze: |-
  L'*elefante* in questo zoo ha una zanna rotta ma sembra comunque molto fiero.
  Der *Elefant* in diesem Zoo hat einen abgebrochenen Stoßzahn, wirkt aber trotzdem sehr stolz.
  
  Se non avessimo *elefanti* nel parco, molti turisti non verrebbero a visitarlo.
  Wenn wir keine *Elefanten* im Park hätten, würden viele Touristen nicht kommen, um ihn zu besichtigen.
  
  Mi hanno detto che l'*elefante* della savana viaggia fino a cinquanta chilometri al giorno in cerca di cibo.
  Man hat mir erzählt, dass der *Elefant* in der Savanne bis zu fünfzig Kilometer pro Tag auf Nahrungssuche wandert.
  
  Penso che un *elefante* adulto abbia un peso medio di circa cinque tonnellate.
  Ich glaube, ein ausgewachsener *Elefant* wiegt im Schnitt etwa fünf Tonnen.
  
  Prima che l'*elefante* fosse trasferito in un santuario, viveva in condizioni davvero disumane.
  Bevor der *Elefant* in ein Schutzgebiet verlegt wurde, lebte er unter wirklich unmenschlichen Bedingungen.
