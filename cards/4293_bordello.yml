Wort mit Artikel: il bordello
Femininum / Plural: bordelli
IPA: ''
Definition: das Bordell, -e
Register: ''
Beispielsätze: |-
  Il *bordello* era nascosto in una zona isolata della città.
  Das *Bordell* war in einer abgelegenen Gegend der Stadt versteckt.
  
  Dopo la perquisizione della polizia, il *bordello* rimase chiuso per settimane.
  Nach der Durchsuchung der Polizei blieb das *Bordell* wochenlang geschlossen.
  
  Nonostante le accuse, molti clienti continuavano a frequentare quel *bordello*.
  Trotz der Anschuldigungen besuchten viele Kunden weiterhin dieses *Bordell*.
  
  Il proprietario del *bordello* fu arrestato con l’accusa di sfruttamento della prostituzione.
  Der Besitzer des *Bordells* wurde wegen Ausbeutung der Prostitution festgenommen.
  
  Dicono che questo *bordello* abbia una storia così antica da sfiorare il leggendario.
  Man sagt, dieses *Bordell* habe eine so alte Geschichte, dass sie fast legendär ist.
