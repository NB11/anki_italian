Rang: 4762
Wort: impostore
Wortart: n.m
Wort mit Artikel: l'impostore
Femininum / Plural: gli impostori
IPA: ''
Definition: der Hochstapler, - / der Betrüger, -
Register: ''
Beispielsätze: |-
  L'*impostore* si è fatto passare per un medico per fregare i pazienti ingenui.
  Der *Hochstapler* gab sich als Arzt aus, um naive Patienten zu betrügen.
  
  Non è facile riconoscere l'*impostore* nascosto tra le persone di fiducia.
  Es ist nicht einfach, den *Betrüger* zu erkennen, der sich unter vertrauenswürdigen Personen versteckt.
  
  Se avessi saputo che era un *impostore*, non gli avrei affidato i miei risparmi.
  Wenn ich gewusst hätte, dass er ein *Hochstapler* ist, hätte ich ihm meine Ersparnisse nicht anvertraut.
  
  Chiunque si spacci come l'*impostore* che ha truffato mezzo paese finirà in prigione.
  Wer sich als der *Betrüger* ausgibt, der halb Land betrogen hat, landet im Gefängnis.
  
  In quel romanzo, l'*impostore* riesce a ingannare tutti fino all’ultima pagina.
  In diesem Roman gelingt es dem *Hochstapler*, alle bis zur letzten Seite zu täuschen.
