Rang: 3498
Wort: arrampicare
Wortart: vi
Wort mit Artikel: arrampicare
Femininum / Plural: ''
IPA: ''
Definition: klettern, besteigen
Register: ''
Beispielsätze: |-
  I ragazzi *arrampicano* sulla parete artificiale ogni sabato.
  Die Jungen *klettern* jeden Samstag an der Kletterwand.
  
  Nonostante la pioggia, abbiamo *arrampicato* fino alla cima.
  Trotz des Regens sind wir bis zum Gipfel *geklettert*.
  
  Avrei voluto *arrampicare* di più, ma il tempo non lo permetteva.
  Ich hätte gerne mehr *geklettert*, aber das Wetter ließ es nicht zu.
  
  Chi *arrampicherebbe* su quella roccia così pericolosa?
  Wer würde auf diesen so gefährlichen Felsen *klettern*?
  
  È indispensabile *arrampicarsi* con attenzione per evitare incidenti.
  Es ist unverzichtbar, beim *Klettern* sorgfältig vorzugehen, um Unfälle zu vermeiden.
