Rang: 4885
Wort: affermativo
Wortart: adj
Wort mit Artikel: affermativo
Femininum / Plural: ''
IPA: ''
Definition: bejahend, zustimmend, positiv
Register: ''
Beispielsätze: |-
  La sua risposta è stata *affermativa* quindi la commissione ha approvato la proposta.
  Seine Antwort war *bejahend*, deshalb hat die Kommission den Vorschlag genehmigt.
  
  Se il tuo tono non sarà *affermativo*, nessuno ti prenderà sul serio.
  Wenn dein Ton nicht *zustimmend* klingt, wird dich niemand ernst nehmen.
  
  Che tu dia una risposta *affermativa* o negativa, non ha alcuna importanza ora.
  Ob du eine *bejahende* oder negative Antwort gibst, spielt jetzt keine Rolle mehr.
  
  Dopo un lungo discorso, il direttore ha finalmente dato un segnale *affermativo*.
  Nach einer langen Rede hat der Direktor endlich ein *zustimmendes* Signal gegeben.
  
  Anche se l’esito non era *affermativo*, lui continuò a sperare.
  Auch wenn das Ergebnis nicht *positiv* ausfiel, hoffte er weiter.
