Rang: 1294
Wort: accomodare
Wortart: vt
Wort mit Artikel: accomodare
Femininum / Plural: ''
IPA: ''
Definition: unterbringen, anpassen, arrangieren
Register: ''
Beispielsätze: |-
  Il cameriere *accomodò* i clienti al tavolo vicino alla finestra.
  Der Kellner *unterbrachte* die Gäste an dem Tisch nah am Fenster.
  
  Può *accomodare* la sedia un po' più indietro? È troppo vicino.
  Kannst du den Stuhl ein wenig *zurückschieben*? Er ist zu nah.
  
  Non *accomodarti* alla situazione se non ti fa stare bene, lottiamo per cambiare!
  *Gewöhne* dich nicht an die Situation, wenn sie dir nicht guttut, wir kämpfen, um sie zu ändern!
  
  Ho provato a *accomodare* il divano, ma pesante com'è, non ci riesco.
  Ich versuchte, das Sofa zu *versetzen*, aber es ist zu schwer, ich schaffe es nicht.
  
  Se *accomodassi* i documenti con più cura, non li perderesti così spesso.
  Wenn du die Dokumente mit mehr Sorgfalt *ordnest*, würdest du sie nicht so oft verlieren.
Audio: ''
Notiz: ''
Dispersion: ''
