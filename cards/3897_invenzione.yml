Rang: 3897
Wort: invenzione
Wortart: n.f
Wort mit Artikel: l'invenzione
Femininum / Plural: invenzioni
IPA: ''
Definition: die Erfindung, -en
Register: ''
Beispielsätze: |-
  L'*invenzione* del telefono ha rivoluzionato le comunicazioni nel mondo.
  Die *Erfindung* des Telefons hat die Kommunikation in der Welt revolutioniert.
  
  Questa *invenzione* sembra uscita da un racconto di fantascienza, vero?
  Diese *Erfindung* scheint aus einer Science-Fiction-Geschichte zu stammen, oder?
  
  Nonostante l'*invenzione* sia geniale, non tutti ne apprezzano il valore.
  Trotz der genialen *Erfindung* schätzen nicht alle ihren Wert.
  
  L'*invenzione* di cui parliamo oggi è stata brevettata solo l'anno scorso.
  Die *Erfindung*, über die wir heute sprechen, wurde erst im letzten Jahr patentiert.
  
  Se avessi saputo dell'*invenzione* prima, avrei investito subito in quell'azienda.
  Hätte ich von der *Erfindung* früher gewusst, hätte ich sofort in diese Firma investiert.
