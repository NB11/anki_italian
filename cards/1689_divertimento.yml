Rang: 1689
Wort: divertimento
Wortart: n.m
Wort mit Artikel: il divertimento
Femininum / Plural: divertimenti
IPA: ''
Definition: der Spaß, -¨e, die Freude, -n
Register: ''
Beispielsätze: |-
  Ieri sera abbiamo passato un *divertimento* incredibile al concerto della band locale.
  Gestern Abend haben wir einen *Spaß* beim Konzert der lokalen Band erlebt.
  
  Nonostante la pioggia, il *divertimento* non è diminuito durante la festa all’aperto.
  Trotz des *Regens* ist der Spaß bei der Feier im Freien nicht weniger geworden.
  
  Che *divertimento* sarebbe stato andare al parcheggio a vedere le macchine nuove!
  Welcher *Spaß* wäre es gewesen, zum Parkplatz zu gehen und die neuen Autos zu sehen!
  
  Mi auguro che il *divertimento* dei bambini duri ancora per ore mentre giocano insieme.
  Ich hoffe, dass der *Spaß* der Kinder noch stundenlang anhält, während sie zusammen spielen.
  
  Se avessimo saputo del costo elevato del *divertimento*, avremmo scelto un’opzione più economica.
  Hätten wir von den hohen *Kosten* des Spaßes gewusst, hätten wir eine günstigere Option gewählt.
