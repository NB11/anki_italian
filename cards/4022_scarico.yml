Rang: 4022
Wort: scarico
Wortart: n.m
Wort mit Artikel: lo scarico
Femininum / Plural: scarichi
IPA: ''
Definition: der Auspuff, -e
Register: ''
Beispielsätze: |-
  Dallo *scarico* della macchina esce un fumo nero.
  Aus dem *Auspuff* des Autos kommt schwarzer Rauch.
  
  Il meccanico controlla lo *scarico* per vedere se ci sono perdite.
  Der Mechaniker prüft den *Auspuff*, um zu sehen, ob es Undichtigkeiten gibt.
  
  Dopo il lungo viaggio, lo *scarico* era rovente.
  Nach der langen Fahrt war der *Auspuff* glühend heiß.
  
  Hanno sostituito lo *scarico* della moto perché era arrugginito.
  Sie haben den *Auspuff* des Motorrads ersetzt, weil er verrostet war.
  
  Lo *scarico* della barca era molto efficiente, permetteva di navigare più veloci.
  Der *Auspuff* des Bootes war sehr effizient und ermöglichte höhere Geschwindigkeiten.
