Rang: 1027
Wort: guardata
Wortart: n.f
Wort mit Artikel: la guardata
Femininum / Plural: guardate
IPA: ''
Definition: der Blickkontakt, die *Guardata*
Register: ''
Beispielsätze: |-
  La *guardata* di Maria era così intensa che tutti si voltarono a guardarla.
  Der *Blick* von Maria war so intensiv, dass sich alle umdrehten, um sie anzusehen.
  
  Ho fatto una *guardata* veloce al menu prima di ordinare al ristorante.
  Ich warf einen schnellen *Blick* auf die Speisekarte, bevor ich im Restaurant bestellte.
  
  La *guardata* che mi ha lanciato il padrone del negozio era davvero minacciosa.
  Der *Blick*, den mir der Besitzer des Ladens zuwarf, war wirklich bedrohlich.
  
  Non mi piace quando qualcuno fa una *guardata* troppo lunga al cellulare degli altri.
  Ich mag es nicht, wenn jemand einen zu langen *Blick* auf das Handy anderer wirft.
  
  Dopo la *guardata* scambiata con il testimone, capii che c’era qualcosa da nascondere.
  Nach dem *Blick*, den ich mit dem Zeugen austauschte, wurde mir klar, dass etwas zu verbergen war.
