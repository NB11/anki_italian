Rang: 4764
Wort: liberamente
Wortart: adv
Wort mit Artikel: liberamente
Femininum / Plural: ''
IPA: ''
Definition: frei, ungehindert
Register: ''
Beispielsätze: |-
  Puoi camminare *liberamente* nel parco se non vai oltre il cancello.
  Du kannst *frei* im Park spazieren gehen, wenn du nicht über das Tor hinausgehst.
  
  Nonostante la sua timidezza, finalmente ha parlato *liberamente* con noi.
  Trotz seiner Schüchternheit hat er schließlich *frei* mit uns gesprochen.
  
  Il giudice ha lasciato che il testimone si esprimesse *liberamente* senza interromperlo.
  Der Richter ließ den Zeugen *frei* sprechen, ohne ihn zu unterbrechen.
  
  Dopo anni di controlli, finalmente vivono *liberamente* senza paura.
  Nach Jahren der Überwachung leben sie endlich *frei*, ohne Angst.
  
  Ha deciso di andarsene *liberamente*, senza dare spiegazioni a nessuno.
  Er hat beschlossen, *frei* zu gehen, ohne jemandem eine Erklärung zu geben.
