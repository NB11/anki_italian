Wort: dispositivo
Wortart: n.m
Wort mit Artikel: il dispositivo
Femininum / Plural: dispositivi
IPA: ''
Definition: das Gerät, die Vorrichtung, -e
Register: ''
Beispielsätze: |-
  Se non *dispositivo* funziona correttamente, non possiamo continuare l’esperimento.
  Wenn das *Gerät* nicht korrekt funktioniert, können wir das Experiment nicht fortsetzen.
  
  Il *dispositivo* che hai acquistato online è molto sofisticato e costoso.
  Das *Gerät*, das du online gekauft hast, ist sehr ausgeklügelt und teuer.
  
  Nonostante l’elevata *dispositivo* di sicurezza, qualcuno è riuscito a violare il sistema.
  Trotz der hohen Sicherheit *Vorrichtung* ist es jemandem gelungen, das System zu knacken.
  
  Avrei bisogno di un *dispositivo* che misuri la frequenza cardiaca durante lo sport.
  Ich bräuchte ein *Gerät*, das die Herzfrequenz während des Sports misst.
  
  Non appena il *dispositivo* sarà aggiustato, potremo metterlo in funzione di nuovo.
  Sobald das *Gerät* repariert sein wird, können wir es wieder in Betrieb nehmen.
