Femininum / Plural: informazioni
IPA: ''
Definition: die Information/Auskunft, -en
Register: ''
Beispielsätze: |-
  Puoi darmi *un'informazione* utile su questo ristorante?
  Kannst du mir *eine nützliche Information* über dieses Restaurant geben?
  
  Le *informazioni* sul traffico vengono aggiornate ogni ora.
  Die *Verkehrsmeldungen* werden stündlich aktualisiert.
  
  Ho bisogno di *un'informazione* precisa sul volo.
  Ich brauche *genaue Auskunft* über den Flug.
  
  Non ho ricevuto *alcune informazioni* sui corsi estivi.
  Ich habe *keine Informationen* zu den Sommerkursen erhalten.
  
  Spero che l'*informazione* che ho letto sia corretta.
  Ich hoffe, dass die *Information*, die ich gelesen habe, richtig ist.
