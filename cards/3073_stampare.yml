Rang: 3073
Wort: stampare
Wortart: vt
Wort mit Artikel: stampare
Femininum / Plural: ''
IPA: ''
Definition: drucken, ausdrucken
Register: ''
Beispielsätze: |-
  Devo *stampare* tre copie del contratto per domani mattina.
  Ich muss drei Kopien des Vertrags morgen früh *ausdrucken*.
  
  Hai già *stampato* i biglietti per il concerto, o li compriamo online?
  Hast du die Tickets für das Konzert schon *ausgedruckt*, oder kaufen wir sie online?
  
  Se non avessi *stampato* quella lettera così tardi, non avremmo perso il treno.
  Wenn ich diesen Brief nicht so spät *ausgedruckt* hätte, hätten wir den Zug nicht verpasst.
  
  Stamperò tutto il documento senza perdere un solo dettaglio, anche se ci vorranno ore.
  Ich werde das gesamte Dokument *ausdrucken*, ohne ein einziges Detail zu verpassen, auch wenn es Stunden dauert.
  
  Mi chiedevo se valesse la pena *stampare* questo articolo così lungo oppure leggerlo sullo schermo.
  Ich fragte mich, ob es sich lohnt, diesen langen Artikel zu *ausdrucken* oder ob ich ihn lieber am Bildschirm lese.
