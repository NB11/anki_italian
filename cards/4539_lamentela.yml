Rang: 4539
Wort: lamentela
Wortart: n.f
Wort mit Artikel: la lamentela
Femininum / Plural: le lamentele
IPA: ''
Definition: die Beschwerde, -n
Register: ''
Beispielsätze: |-
  Il vicino ha presentato *lamentela* per il rumore notturno alle autorità locali.
  Der Nachbar reichte die *Beschwerde* wegen des nächtlichen Lärms bei den örtlichen Behörden ein.
  
  Nonostante le ripetute *lamentele*, il problema non è stato risolto.
  Trotz der *Beschwerden* wurde das Problem nicht gelöst.
  
  Se avessi saputo che avrebbe fatto *lamentela*, mi sarei comportato diversamente.
  Wenn ich gewusst hätte, dass er *Beschwerde* einreichen würde, hätte ich mich anders verhalten.
  
  La sua *lamentela* era fondata, ma nessuno ha preso provvedimenti.
  Seine *Beschwerde* war berechtigt, aber niemand ergriff Maßnahmen.
  
  Non appena sentì dell’avvertimento, la società ricevette una *lamentela* formale da parte dei clienti.
  Sobald sie von der Warnung erfuhr, erhielt die Firma eine offizielle *Beschwerde* vonseiten der Kunden.
