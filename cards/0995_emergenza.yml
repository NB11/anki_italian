Beispielsätze: |-
  In caso di *emergenza*, chiama immediatamente il 118.
  Im Fall eines *Notfalls* ruf sofort die 118 an.
  
  Nonostante l’*emergenza*, il treno è partito in orario.
  Trotz des *Notfalls* ist der Zug pünktlich abgefahren.
  
  L’*emergenza* sanitaria ha richiesto l’intervento di molti colleghi.
  Die gesundheitliche *Notlage* erforderte das Eingreifen vieler Kollegen.
  
  Se non risolviamo subito questa *emergenza*, le conseguenze potrebbero essere disastrose.
  Wenn wir diese *Notlage* nicht sofort lösen, könnten die Folgen verheerend sein.
  
  Dopo l’*emergenza*, tutta la città si è stretta intorno ai cittadini colpiti.
  Nach dem *Notfall* hat sich die ganze Stadt um die betroffenen Bürger geschart.
