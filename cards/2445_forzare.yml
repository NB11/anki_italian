Rang: 2445
Wort: forzare
Wortart: vt
Wort mit Artikel: forzare
Femininum / Plural: ''
IPA: ''
Definition: zwingen, erzwingen
Register: ''
Beispielsätze: |-
  Il giudice non può *forzare* l’imputato a confessare senza prove concrete.
  Der Richter kann den Angeklagten nicht *ohne* Beweise zum Geständnis zwingen.
  
  Hanno cercato di *forzare* la porta del magazzino, ma senza successo.
  Sie haben versucht, die Tür des Lagers *mit Gewalt* zu öffnen, aber erfolglos.
  
  Se dovessi *forzare* una scelta tra lavoro e famiglia, preferirei la seconda.
  Wenn ich eine Wahl *zwingen* müsste, würde ich mich für die Familie entscheiden.
  
  L’investigatore non vuole *forzare* il terrorista a rivelare i suoi piani.
  Der Ermittler will den Terroristen nicht *mit Druck* zur Preisgabe seiner Pläne bringen.
  
  Non è giusto *forzare* un bambino a mangiare se non ha fame.
  Es ist nicht richtig, ein Kind *dazu* zu zwingen, zu essen, wenn es keinen Hunger hat.
