Rang: 3854
Wort: accoltellare
Wortart: vt
Wort mit Artikel: accoltellare
Femininum / Plural: ''
IPA: ''
Definition: mit einem Messer erstechen, verletzen
Register: ''
Beispielsätze: |-
  L’omicida ha *accoltellato* la vittima alle spalle prima di fuggire.
  Der *Mörder* hat das Opfer von hinten mit einem Messer erstochen, bevor er floh.
  
  Se avessi un coltello, ti *accoltellerei* per quello che hai fatto!
  Wenn ich ein Messer hätte, würde ich dich *mit einem Messer verletzen* für das, was du getan hast!
  
  Il testimone ha giurato che ha visto qualcuno *accoltellare* il gangster sottovoce.
  Der Zeuge hat geschworen, er habe jemanden *leise mit einem Messer erstechen* gesehen.
  
  Dopo aver *accoltellato* il poliziotto, i rapinatori sono scappati nel buio.
  Nachdem sie den Polizisten *mit einem Messer verletzt* hatten, flohen die Räuber in die Dunkelheit.
  
  Spero che nessuno *accoltellerebbe* un colombo in una piazza pubblica.
  Ich hoffe, dass niemand eine Taube auf einem öffentlichen Platz *mit einem Messer ersticht*.
