Rang: 3616
Wort: nido
Wortart: n.m
Wort mit Artikel: il nido
Femininum / Plural: nidi
IPA: ''
Definition: das Nest, -er
Register: ''
Beispielsätze: |-
  Gli uccellini hanno lasciato *nido* da poche settimane.
  Die Küken haben *das Nest* vor wenigen Wochen verlassen.
  
  Ho trovato un piccolo topo dentro il *nido* di paglia in soffitta.
  Ich habe eine kleine Maus in *dem Nest* aus Stroh auf dem Dachboden gefunden.
  
  Se non puliamo il *nido*, gli insetti potrebbero tornare.
  Wenn wir *das Nest* nicht reinigen, könnten die Insekten zurückkommen.
  
  Il *nido* di questa rondine è attaccato al balcone di casa mia.
  Das *Nest* dieser Schwalbe ist an meinem Balkon befestigt.
  
  I ricercatori hanno studiato da vicino come i pulcini lasciano il *nido* per la prima volta.
  Die Forscher haben genau untersucht, wie die Küken *das Nest* zum ersten Mal verlassen.
