Rang: 3829
Wort: gabinetto
Wortart: n.m
Wort mit Artikel: il gabinetto
Femininum / Plural: gabinetti
IPA: ''
Definition: der Schrank, -¨e
Register: ''
Beispielsätze: |-
  Ho trovato un *gabinetto* antico nel solaio della casa di campagna.
  Ich habe einen *Schrank* im Dachboden des Landhauses gefunden.
  
  Il *gabinetto* di questa camera è troppo stretto per entrarci comodamente.
  Der *Schrank* in diesem Zimmer ist zu eng, um bequem hineinzugehen.
  
  Nel *gabinetto* ci sono anche alcuni cassetti dove tengo le mie camicie.
  In dem *Schrank* befinden sich auch einige Schubladen, in denen ich meine Hemden aufbewahre.
  
  Avresti dovuto chiedere prima di aprire il *gabinetto*: conteneva dei documenti importanti!
  Du hättest vorher fragen sollen, bevor du den *Schrank* geöffnet hast: Er enthielt wichtige Dokumente!
  
  Se non trovi il vestito, controlla meglio nel *gabinetto* a destra dell'ingresso.
  Wenn du das Kleid nicht findest, schau nochmal in den *Schrank* rechts vom Eingang.
