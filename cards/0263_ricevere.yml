Rang: 263
Wort: ricevere
Wortart: vt
Wort mit Artikel: ricevere
Femininum / Plural: ''
IPA: ''
Definition: bekommen, erhalten, kriegen
Register: ''
Beispielsätze: |-
  Spero di *ricevere* una buona notizia presto.
  Ich hoffe, dass ich bald eine *gute* Nachricht *bekomme*.
  
  Hai già *ricevuto* la lettera che ti ho spedito?
  Hast du den Brief, den ich dir geschickt habe, schon *erhalten*?
  
  Se tu studi di più, *riceverai* un premio più grande.
  Wenn du mehr lernst, wirst du eine *größere* Belohnung *bekommen*.
  
  Non *ricevetti* nessuna risposta quando chiesi informazioni.
  Ich *erhielt* keine Antwort, als ich nach Informationen fragte.
  
  Avrei voluto *ricevere* un invito alla festa, ma purtroppo non è arrivato.
  Ich hätte eine Einladung zur Feier *bekommen* wollen, aber leider ist sie nicht angekommen.
