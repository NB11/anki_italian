Rang: 3267
Wort: frattura
Wortart: n.f
Wort mit Artikel: la frattura
Femininum / Plural: fratture
IPA: ''
Definition: der Bruch, -ü-e
Register: ''
Beispielsätze: |-
  Dopo la caduta, il medico ha diagnosticato una *frattura* del polso destro.
  Nach dem Sturz hat der Arzt einen *Bruch* des rechten Handgelenks diagnostiziert.
  
  Anche se non era grave, la *frattura* richiedeva comunque un periodo di immobilizzazione.
  Auch wenn sie nicht schwerwiegend war, erforderte der *Bruch* trotzdem eine Ruhigstellungsphase.
  
  L’ortopedico ha detto che la *frattura* si salderà in sei settimane senza complicazioni.
  Der Orthopäde sagte, der *Bruch* werde sich in sechs Wochen problemlos wieder verbinden.
  
  Chiunque abbia subito una *frattura* sa quanto possa essere dolorosa la riabilitazione.
  Wer schon einmal einen *Bruch* erlitten hat, weiß, wie schmerzhaft die Rehabilitation sein kann.
  
  È indispensabile che il paziente eviti qualsiasi movimento che possa aggravare la *frattura*.
  Es ist unerlässlich, dass der Patient jede Bewegung unterlässt, die den *Bruch* verschlimmern könnte.
