Rang: 4558
Wort: bussola
Wortart: n.f
Wort mit Artikel: la bussola
Femininum / Plural: bussole
IPA: ''
Definition: der Kompass, -e
Register: ''
Beispielsätze: |-
  Non riesco mai a trovare la *bussola* quando andiamo in montagna.
  Ich finde nie den *Kompass*, wenn wir in die Berge gehen.
  
  Se avessi avuto la *bussola* ieri, non ci saremmo persi nel bosco.
  Wenn ich gestern den *Kompass* gehabt hätte, wären wir nicht im Wald verloren gegangen.
  
  La *bussola* del capitano è stata trovata intatta dopo il naufragio.
  Der *Kompass* des Kapitäns wurde nach dem Schiffbruch unversehrt gefunden.
  
  Mi domando se questa *bussola* sia abbastanza precisa per un viaggio così lungo.
  Ich frage mich, ob dieser *Kompass* für so eine lange Reise genau genug ist.
  
  Anche se la *bussola* segna nord, senza una mappa non sappiamo dove siamo.
  Auch wenn der *Kompass* Norden anzeigt, wissen wir ohne eine Karte nicht, wo wir sind.
