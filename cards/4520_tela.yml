Rang: 4520
Wort: tela
Wortart: n.f
Wort mit Artikel: la tela
Femininum / Plural: tele
IPA: ''
Definition: der Leinwandstoff, die Leinwand, das Tuch
Register: ''
Beispielsätze: |-
  Ha dipinto un bellissimo paesaggio su una *tela* di lino.
  Er hat eine wunderschöne Landschaft auf eine *Leinwand* aus Leinen gemalt.
  
  Anche se era stanca, continuò a lavorare sulla *tela* fino al tramonto.
  Obwohl sie müde war, arbeitete sie weiter an der *Leinwand*, bis die Sonne unterging.
  
  Ti ricordi quella *tela* che abbiamo visto al museo? Era di un artista sconosciuto.
  Erinnerst du dich an jene *Leinwand*, die wir im Museum gesehen haben? Sie war von einem unbekannten Künstler.
  
  Prima di trasferirsi a Roma lavorava in una fabbrica che produceva *tele* per tende.
  Bevor sie nach Rom zog, arbeitete sie in einer Fabrik, die *Leinwände* für Vorhänge herstellte.
  
  Nonostante il suo talento, la *tela* rimase invenduta per mesi.
  Trotz ihres Talents blieb die *Leinwand* monatelang unverkauft.
