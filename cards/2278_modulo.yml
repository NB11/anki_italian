Beispielsätze: |-
  Ho bisogno di compilare *il modulo* prima di poter procedere con l'iscrizione.
  Ich muss das *Formular* ausfüllen, bevor ich mich anmelden kann.
  
  Gli studenti hanno discusso a lungo su come migliorare *il modulo* del corso online.
  Die Studierenden haben lange darüber diskutiert, wie man das *Modul* des Onlinekurses verbessern kann.
  
  Se non rispetti *il modulo* di questa procedura, non verrai considerato per la borsa di studio.
  Wenn du dich nicht an das *Schema* dieses Verfahrens hältst, wirst du nicht für das Stipendium berücksichtigt.
  
  L'azienda ha finalmente approvato *il modulo* per la nuova campagna pubblicitaria.
  Das Unternehmen hat endlich das *Modul* für die neue Werbekampagne genehmigt.
  
  Nonostante le critiche, *il modulo* di fisica del liceo rimane uno dei più completi in Italia.
  Trotz der Kritik bleibt das *Modul* in Physik der Oberschule eines der vollständigsten in Italien.
