Rang: 2738
Wort: individuare
Wortart: v
Wort mit Artikel: individuare
Femininum / Plural: ''
IPA: ''
Definition: ausfindig machen, feststellen, identifizieren
Register: ''
Beispielsätze: |-
  Hai *individuato* il punto debole dell’avversario durante la partita.
  Du hast den *Schwachpunkt* des Gegners während des Spiels festgestellt.
  
  Se non *individuiamo* l’errore al più presto, perdiamo il controllo del progetto.
  Wenn wir den Fehler nicht *sofort *ausfindig machen*, verlieren wir die Kontrolle über das Projekt.
  
  L’investigatore promise di *individuare* il colpevole entro una settimana.
  Der Ermittler versprach, den Täter innerhalb einer Woche zu *identifizieren*.
  
  Era difficile *individuare* la causa dell’incidente tra tante voci confuse.
  Es war schwer, die Ursache des Unfalls unter all den verwirrenden Aussagen *festzustellen*.
  
  Spero che tu riesca a *individuare* il difetto nel mio ragionamento.
  Ich hoffe, dass du den Fehler in meiner Argumentation *ausfindig machen* kannst.
