Rang: 2672
Wort: mazza
Wortart: n.f
Wort mit Artikel: la mazza
Femininum / Plural: mazze
IPA: ''
Definition: der Knüppel, -
Register: ''
Beispielsätze: |-
  Il contadino usa una *mazza* per battere il grano.
  Der Bauer schlägt das Getreide mit einem *Knüppel*.
  
  Hanno trovato una *mazza* di legno nel bosco vicino alla città.
  Sie fanden einen hölzernen *Knüppel* im Wald nahe der Stadt.
  
  Se avessi una *mazza* più pesante, romperesti la porta più facilmente.
  Wenn ich einen schwereren *Knüppel* hätte, würde ich die Tür leichter aufbrechen.
  
  La *mazza* che hai usato ieri è ancora sporca di terra.
  Der *Knüppel*, den du gestern benutzt hast, ist noch voller Erde.
  
  Non importa quanto sia forte, nessuno toccherà la *mazza* del principe senza permesso.
  Egal wie stark jemand ist, niemand wird den *Knüppel* des Principe ohne Erlaubnis anfassen.
