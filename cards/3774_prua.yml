Rang: 3774
Wort: prua
Wortart: n.m
Wort mit Artikel: la prua
Femininum / Plural: prue
IPA: ''
Definition: der Bug, Bug
Register: ''
Beispielsätze: |-
  La *prua* della nave solcava le acque calme del porto.
  Der *Bug* des Schiffes durchpflügte die ruhigen Gewässer des Hafens.
  
  Nonostante il mare mosso, la *prua* rimase stabile e resistente.
  Trotz der rauen See blieb der *Bug* stabil und widerstandsfähig.
  
  Se la *prua* fosse stata danneggiata, l’intera nave avrebbe rischiato di affondare.
  Wenn der *Bug* beschädigt worden wäre, hätte das ganze Schiff Gefahr gelaufen, unterzugehen.
  
  Gli ingegneri stanno valutando come rinforzare la *prua* per le prossime traversate.
  Die Ingenieure überlegen, wie sie den *Bug* für die nächsten Überfahrten verstärken können.
  
  La nave, con la sua *prua* affilata, tagliava le onde come un coltello attraverso il burro.
  Das Schiff mit seinem scharfen *Bug* schnitt durch die Wellen wie ein Messer durch Butter.
