Rang: 4349
Wort: maltrattare
Wortart: vt
Wort mit Artikel: maltrattare
Femininum / Plural: ''
IPA: ''
Definition: misshandeln, quälen
Register: ''
Beispielsätze: |-
  I genitori sono preoccupati perché alcuni ragazzi *maltrattano* il cane del quartiere.
  Die Eltern sind besorgt, weil einige Jugendliche den *Hund* des Viertels misshandeln.
  
  Se continuate a *maltrattare* il vostro corpo con quelle sostanze, rischiate seriamente la salute.
  Wenn ihr euren Körper durch diese Substanzen weiter *quält*, riskiert ihr ernsthaft eure Gesundheit.
  
  Era chiaro che avrebbe *maltrattato* le sue scarpe nuove appena ne avesse avuto l'occasione.
  Es war klar, dass er seine neuen Schuhe *misshandeln* würde, sobald er die Gelegenheit dazu hätte.
  
  Nonostante le accuse, il direttore giurò di non aver mai *maltrattato* nessun dipendente.
  Trotz der Anschuldigungen schwor der Direktor, niemals einen *Mitarbeiter* misshandelt zu haben.
  
  Gli animalisti hanno documentato come certi allevamenti *maltrattino* gli animali in modo sistematico.
  Tierschützer haben dokumentiert, wie bestimmte Zuchtbetriebe Tiere systematisch *quälen*.
