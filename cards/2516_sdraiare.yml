Rang: 2516
Wort: sdraiare
Wortart: vi
Wort mit Artikel: sdraiare
Femininum / Plural: ''
IPA: ''
Definition: sich hinlegen, sich ausstrecken
Register: ''
Beispielsätze: |-
  Dopo una lunga camminata, mi piace *sdraiarmi* sull’erba per rilassarmi.
  Nach einem langen Spaziergang lege ich mich gern auf das *Gras*, um mich zu entspannen.
  
  Se ti senti stanco, perché non vai a *sdraiarti* sul divano per un po’?
  Wenn du müde bist, warum legst du dich nicht für eine Weile auf das *Sofa*?
  
  Mentre leggevo, mio figlio si è *sdraiato* accanto a me e si è addormentato.
  Während ich las, hat sich mein Sohn neben mich *hingelegt* und ist eingeschlafen.
  
  In spiaggia, i turisti si *sdraiano* sui lettini per prendere il sole.
  Am Strand *legen* sich die Touristen auf die Liegen, um sich zu sonnen.
  
  Anche se la stanza era affollata, riuscì a *sdraiarsi* sul letto e riposare per mezz’ora.
  Auch wenn der Raum voll war, gelang es ihr, sich auf das *Bett* zu legen und eine halbe Stunde zu ruhen.
