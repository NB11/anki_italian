Wort mit Artikel: alieno
Femininum / Plural: ''
IPA: ''
Definition: fremd, fremdartig, außerirdisch
Register: ''
Beispielsätze: |-
  Questa *alieno* scoperta ha sconvolto gli scienziati di tutto il mondo.
  Diese *fremdartige* Entdeckung hat die Wissenschaftler auf der ganzen Welt erschüttert.
  
  Lui si sente un po’ *alieno* in questa nuova città così caotica.
  Er fühlt sich ein bisschen *fremd* in dieser neuen so chaotischen Stadt.
  
  Avrebbero voluto analizzare il materiale *alieno* prima di pubblicare i risultati.
  Sie hätten das *fremde* Material gerne analysiert, bevor sie die Ergebnisse veröffentlichten.
  
  Per fortuna, nessun *alieno* ha ancora invaso il nostro pianeta!
  Glücklicherweise hat noch kein *Außerirdischer* unseren Planeten invadiert!
  
  Nonostante le apparenze, la sua teoria non era poi così *alieno* dalla realtà.
  Trotz der äußeren Erscheinungen war seine Theorie nicht so *fremd* an der Realität.
