Rang: 1581
Wort: km
Wortart: n.m
Wort mit Artikel: il km
Femininum / Plural: km
IPA: ''
Definition: der Kilometer, -
Register: ''
Beispielsätze: |-
  La distanza tra Roma e Napoli è di circa 220 *km*.
  Die Entfernung zwischen Rom und Neapel beträgt etwa *220 Kilometer*.
  
  Ho guidato per 50 *km* senza fermarmi.
  Ich bin *50 Kilometer* gefahren, ohne anzuhalten.
  
  Se vai a 120 *km* all'ora in autostrada, rischi una multa.
  Wenn du auf der Autobahn *120 Kilometer pro Stunde* fährst, riskierst du eine Strafe.
  
  Il viaggio in treno copre solo 30 *km*, ma impiega un'ora.
  Die Zugfahrt deckt nur *30 Kilometer* ab, braucht aber eine Stunde.
  
  Hai percorso più di 1000 *km* in una settimana? È davvero tanto!
  Hast du mehr als *1.000 Kilometer* in einer Woche zurückgelegt? Das ist wirklich viel!
