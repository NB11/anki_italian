Rang: 1263
Wort: complicare
Wortart: vt
Wort mit Artikel: complicare
Femininum / Plural: ''
IPA: ''
Definition: komplizieren, erschweren
Register: ''
Beispielsätze: |-
  La *complico* molto quando non ascolti le mie spiegazioni.
  Sie *erschweren* es mir sehr, wenn du meinen Erklärungen nicht zuhörst.
  
  Se non hai i documenti, *complicherai* solo la situazione.
  Wenn du die Unterlagen nicht hast, wirst du die Lage *nur verschlimmern*.
  
  Il comandante ha *complicato* le operazioni con troppi ordini confusi.
  Der Kommandant hat die Aktionen durch zu viele widersprüchliche Befehle *kompliziert*.
  
  Credo che tu abbia *complicato* ancora di più le cose con quel discorso.
  Ich glaube, du hast die Dinge durch diese Rede noch *verkompliziert*.
  
  Senza la documentazione giusta, ogni decisione *complicherà* il processo.
  Ohne die richtige Unterlage wird jede Entscheidung den Prozess *erschweren*.
