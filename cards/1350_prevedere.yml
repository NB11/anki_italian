Rang: 1350
Wort: prevedere
Wortart: v
Wort mit Artikel: prevedere
Femininum / Plural: ''
IPA: ''
Definition: voraussehen, vorhersagen, vorbedenken, planen
Register: ''
Beispielsätze: |-
  Gli astronomi *prevedono* un’eclissi solare per il prossimo mese.
  Die Astronomen *sehen* eine Sonnenfinsternis für nächsten Monat vor.
  
  Se non avessi *previsto* questo problema, avremmo perso tutto il lavoro.
  Hätte ich dieses Problem nicht *vorausgesehen*, hätten wir die ganze Arbeit verloren.
  
  L’economista *prevede* una crescita economica decisamente positiva per l’anno prossimo.
  Der Ökonom *sagt* ein eindeutig positives Wirtschaftswachstum für nächstes Jahr voraus.
  
  Non è facile *prevedere* le reazioni del pubblico quando si tratta di arte contemporanea.
  Es ist nicht einfach, die Reaktionen des Publikums zu *voraussehen*, wenn es um zeitgenössische Kunst geht.
  
  Gli scienziati stanno cercando di *prevedere* l’evoluzione di questa nuova malattia.
  Die Wissenschaftler versuchen, die Entwicklung dieser neuen Krankheit zu *vorhersagen*.
