Rang: 2846
Wort: marinaio
Wortart: n.m
Wort mit Artikel: il marinaio
Femininum / Plural: marinai
IPA: ''
Definition: der Matrose, -n
Register: ''
Beispielsätze: |-
  Il *marinaio* ha trascorso molti anni in mare prima di ritirarsi.
  Der *Matrose* hat viele Jahre auf See verbracht, bevor er in Rente ging.
  
  Quando ho visto quel vecchio *marinaio* sulla spiaggia, mi ha raccontato storie affascinanti degli anni passati.
  Als ich jenen alten *Matrose* am Strand sah, erzählte er mir faszinierende Geschichten aus vergangenen Jahren.
  
  Se non fosse stato per il coraggio del *marinaio*, l’equipaggio sarebbe affondato con la nave.
  Wäre nicht der Mut des *Matrose* gewesen, das Besatzung wäre mit dem Schiff untergegangen.
  
  I giovani *marinai* devono imparare le basi della navigazione prima di imbarcarsi.
  Die jungen *Matrose* müssen die Grundlagen der Schifffahrt lernen, bevor sie anheuern.
  
  Spero che tuo fratello diventi un *marinaio* di successo, perché ama il mare più di qualsiasi altra cosa.
  Ich hoffe, dass dein Bruder ein erfolgreicher *Matrose* wird, denn er liebt das Meer mehr als alles andere.
