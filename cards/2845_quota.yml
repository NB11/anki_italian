Rang: 2845
Wort: quota
Wortart: n.f
Wort mit Artikel: la quota
Femininum / Plural: quote
IPA: ''
Definition: der Anteil, -e, die Quote, -n
Register: ''
Beispielsätze: |-
  La *quota* di partecipazione al congresso è di cento euro quest’anno.
  Die *Teilnahmegebühr* für den Kongress beträgt dieses Jahr hundert Euro.
  
  Nonostante la *quota* sia alta, molti hanno deciso di acquistare il biglietto.
  Obwohl die *Gebühr* hoch ist, haben sich viele entschieden, das Ticket zu kaufen.
  
  La *quota* di iscrizione alla nuova palestra include l’accesso alla piscina.
  Die *Anmeldegebühr* im neuen Fitnessstudio beinhaltet den Zugang zum Schwimmbad.
  
  Se superi la *quota* massima di studenti per classe, dovrai dividere gli alunni in due gruppi.
  Wenn du die *Höchstzahl* an Schülern pro Klasse überschreitest, musst du die Kinder in zwei Gruppen aufteilen.
  
  Hanno appena annunciato che la *quota* per il parcheggio sotterraneo sarà raddoppiata da domani.
  Sie haben gerade bekannt gegeben, dass die *Gebühr* für das Parkhaus ab morgen verdoppelt wird.
