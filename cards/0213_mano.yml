Rang: 213
Wort: mano
Wortart: n.f
Wort mit Artikel: la mano
Femininum / Plural: mani
IPA: ''
Definition: die Hand, Hände
Register: ''
Beispielsätze: |-
  Ho *infilato* la chiave nella *mano* sinistra.
  Ich habe den Schlüssel in die *linke Hand* gesteckt.
  
  Le *mani* di Leonardo erano molto abili.
  Leonardos *Hände* waren sehr geschickt.
  
  *Mano* a *mano*, imparerai l’italiano.
  *Hand* um *Hand* wirst du Italienisch lernen.
  
  Tieni la *mano* ferma mentre disegno.
  Halt deine *Hand* ruhig, während ich zeichne.
  
  Con un colpo di *mano*, ha aperto la porta a chiave.
  Mit einem *Hand*griff hat er die Tür aufgeschlossen.
