Rang: 2670
Wort: canna
Wortart: n.f
Wort mit Artikel: la canna
Femininum / Plural: cannae
IPA: ''
Definition: das Rohr, -e, der Halm, -e
Register: ''
Beispielsätze: |-
  La *canna* di bambù è molto resistente e viene usata per costruire mobili.
  Das *Rohr* aus Bambus ist sehr robust und wird zum Möbelbau verwendet.
  
  Dopo il temporale, abbiamo trovato alcune *cannae* di grano spezzate nel campo.
  Nach dem Sturm fanden wir einige *Halm*e von Weizen im Feld.
  
  Nonostante il disagio, ha continuato a lavorare con la *canna* di metallo in mano.
  Trotz des Unbehagens arbeitete er weiter, mit dem *Rohr* aus Metall in der Hand.
  
  Se vuoi coltivare la veronica, assicurati che la *canna* sia ben irrigata.
  Wenn du Veronica pflanzen möchtest, sorge dafür, dass der *Halm* gut bewässert wird.
  
  Nel laboratorio scientifico, la *canna* di vetro è uno strumento indispensabile per molti esperimenti.
  Im wissenschaftlichen Labor ist das *Rohr* aus Glas ein unverzichtbares Werkzeug für viele Experimente.
