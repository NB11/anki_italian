Rang: 3873
Wort: sosta
Wortart: n.f
Wort mit Artikel: la sosta
Femininum / Plural: soste
IPA: ''
Definition: die Pause, -n
Register: ''
Beispielsätze: |-
  Dopo tre ore di guida senza *sosta*, decisi di fermarmi a bere un caffè.
  Nach drei Stunden Fahrt ohne *Pause* beschloss ich, anzuhalten und einen Kaffee zu trinken.
  
  Nonostante la *sosta* improvvisata nel bar, arrivai comunque in ritardo alla riunione.
  Trotz der *kurzen Pause* im Café kam ich trotzdem zu spät zur Besprechung.
  
  La *sosta* obbligatoria di dieci minuti serve a prevenire l’affaticamento del conducente.
  Die *vorgeschriebene Pause* von zehn Minuten soll Ermüdung des Fahrers verhindern.
  
  Se avessi fatto una *sosta* più lunga, non mi sarei addormentato al volante.
  Wenn ich eine längere *Pause* eingelegt hätte, wäre ich nicht am Steuer eingeschlafen.
  
  È vietato parcheggiare qui, ma non è permessa nemmeno una *sosta* di cinque minuti.
  Hier darf man nicht parken, aber sogar eine *kurze Pause* von fünf Minuten ist verboten.
