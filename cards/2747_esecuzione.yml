Definition: die Ausführung, Durchführung, Vollstreckung
Register: ''
Beispielsätze: |-
  L'*esecuzione* di questo piano richiederà almeno due mesi di lavoro continuo.
  Die *Ausführung* dieses Plans braucht mindestens zwei Monate ununterbrochene Arbeit.
  
  La polizia ha assistito all'*esecuzione* di un ordine del tribunale ieri mattina.
  Die Polizei hat der *Vollstreckung* eines Gerichtsbeschlusses heute Morgen beigewohnt.
  
  Se vuoi assistere a una *esecuzione* artistica, vieni alla mostra di domani sera.
  Wenn du eine künstlerische *Ausführung* sehen möchtest, komm zur Ausstellung morgen Abend.
  
  L'*esecuzione* di quella condanna è stata rimandata perché si attende una nuova perizia.
  Die *Vollstreckung* dieses Urteils wurde verschoben, weil man ein neues Gutachten abwartet.
  
  Non capisco l'*esecuzione* di questo brano, sembra troppo meccanica e poco espressiva.
  Ich verstehe die *Ausführung* dieses Stücks nicht, sie wirkt zu mechanisch und ausdruckslos.
