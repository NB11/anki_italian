Rang: 4568
Wort: umido
Wortart: adj
Wort mit Artikel: umido
Femininum / Plural: ''
IPA: ''
Definition: feucht, nass
Register: ''
Beispielsätze: |-
  Il pane è *umido* perché l'ho lasciato fuori dal sacchetto.
  Das Brot ist *feucht*, weil ich es außerhalb der Tüte gelassen habe.
  
  Dopo la pioggia, il pavimento del balcone è ancora *umido*.
  Nach dem Regen ist der Balkonboden noch *nass*.
  
  Ho comprato un panno *umido* per pulire i vetri della macchina.
  Ich habe ein *feuchtes* Tuch gekauft, um die Autoscheiben zu reinigen.
  
  Anche se la stanza sembra asciutta, le pareti sono ancora *umide* al tatto.
  Auch wenn der Raum trocken scheint, fühlen sich die Wände noch *feucht* an.
  
  Se il terreno è troppo *umido*, le piante potrebbero marcire.
  Wenn der Boden zu *nass* ist, könnten die Pflanzen faulen.
