Rang: 2380
Wort: possesso
Wortart: n.m
Wort mit Artikel: il possesso
Femininum / Plural: i possessi
IPA: ''
Definition: der Besitz, -e
Register: ''
Beispielsätze: |-
  Il *possesso* di quella collana è molto antico, risale al diciottesimo secolo.
  Der *Besitz* dieser Halskette ist sehr alt, er stammt aus dem achtzehnten Jahrhundert.
  
  Nonostante il *possesso* di una villa al mare, continua a lavorare come insegnante.
  Trotz des *Besitzes* einer Villa am Meer arbeitet er weiterhin als Lehrer.
  
  Il giudice ha ordinato la confisca dei *possedimenti* illegali dell’organizzazione criminale.
  Der Richter ordnete die Beschlagnahmung der illegalen *Besitzungen* der kriminellen Organisation an.
  
  Da quando ha ottenuto il *possesso* dei documenti, la situazione è cambiata radicalmente.
  Seitdem sie den *Besitz* der Dokumente erhalten hat, hat sich die Situation radikal verändert.
  
  Il *possesso* di armi da fuoco è severamente regolamentato in questo paese.
  Der *Besitz* von Schusswaffen ist in diesem Land streng reguliert.
