Rang: 2971
Wort: carità
Wortart: n.f
Wort mit Artikel: la carità
Femininum / Plural: carità
IPA: ''
Definition: der/die Mildtätigkeit, Barmherzigkeit, Nächstenliebe
Register: ''
Beispielsätze: |-
  La *carità* non dovrebbe essere sfruttata per fini politici.
  Die *Nächstenliebe* sollte nicht für politische Zwecke ausgenutzt werden.
  
  Molti hanno elogiato la sua *carità* verso i bisognosi.
  Viele haben seine *Barmherzigkeit* gegenüber Bedürftigen gelobt.
  
  È una *carità* che va oltre le parole, agendo concretamente ogni giorno.
  Das ist eine *Mildtätigkeit*, die über Worte hinausgeht und jeden Tag konkret handelt.
  
  Se praticassimo davvero la *carità*, il mondo sarebbe diverso.
  Wenn wir *Barmherzigkeit* wirklich leben würden, wäre die Welt anders.
  
  La *carità* vera non si misura in denaro, ma nel tempo e nell’attenzione.
  Echte *Nächstenliebe* misst sich nicht in Geld, sondern in Zeit und Aufmerksamkeit.
