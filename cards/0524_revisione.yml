Rang: 524
Wort: revisione
Wortart: n.f
Wort mit Artikel: la revisione
Femininum / Plural: revisioni
IPA: ''
Definition: die Überprüfung, die Revision, die Nachprüfung, -en
Register: ''
Beispielsätze: |-
  Dopo la *revisione* del contratto, firma qui per favore.
  Nach der *Überprüfung* des Vertrags unterschreiben Sie bitte hier.
  
  Ho bisogno di una *revisione* urgente del mio rapporto finanziario.
  Ich brauche eine dringende *Nachprüfung* meiner finanziellen Verhältnisse.
  
  La *revisione* dell’auto è scaduta e devono farla subito.
  Die *Revision* des Autos ist abgelaufen und sie müssen sie sofort machen lassen.
  
  Se la *revisione* annuale non viene fatta, la patente può essere revocata.
  Wenn die jährliche *Überprüfung* nicht gemacht wird, kann der Führerschein entzogen werden.
  
  La *revisione* dei dati è necessaria prima di procedere con la creazione del nuovo gruppo di lavoro.
  Die *Revision* der Daten ist notwendig, bevor man mit der Erschaffung der neuen Arbeitsgruppe fortfährt.
