Rang: 3777
Wort: modesto
Wortart: adj
Wort mit Artikel: modesto
Femininum / Plural: ''
IPA: ''
Definition: bescheiden, zurückhaltend
Register: ''
Beispielsätze: |-
  Nonostante il suo successo, è *modesta* e non ama mettersi in mostra.
  Trotz ihres Erfolges ist sie *bescheiden* und stellt sich nicht in den Vordergrund.
  
  Avrei preferito un approccio più *modesto* alla situazione, invece di voler risolvere tutto subito.
  Ich hätte mir einen *zurückhaltenderen* Umgang mit der Situation gewünscht, statt alles sofort lösen zu wollen.
  
  I suoi obiettivi sembrano *modesti*, ma nascondono grandi ambizioni.
  Seine Ziele wirken *bescheiden*, doch dahinter verbergen sich große Ambitionen.
  
  Era così *modesto* che non ha mai parlato dei riconoscimenti che aveva ricevuto.
  Er war so *bescheiden*, dass er nie über die Auszeichnungen sprach, die er erhalten hatte.
  
  Se fossi stato *modesto*, avrei accettato l'aiuto che mi offrivano senza protestare.
  Wäre ich *bescheiden* gewesen, hätte ich die Hilfe, die man mir anbot, ohne zu murren angenommen.
