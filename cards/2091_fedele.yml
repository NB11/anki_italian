Rang: 2091
Wort: fedele
Wortart: adj
Wort mit Artikel: fedele
Femininum / Plural: ''
IPA: ''
Definition: treu, loyal, zuverlässig
Register: ''
Beispielsätze: |-
  Il cane del vicino è *fedele* e non abbandona mai il suo padrone.
  Der Hund des Nachbarn ist *treu* und verlässt seinen Besitzer nie.
  
  Spero che tu rimanga *fedele* alle tue promesse anche in futuro.
  Ich hoffe, dass du *treu* deinen Versprechen auch in Zukunft bleibst.
  
  Nonostante le difficoltà, rimase *fedele* ai suoi principi fino alla fine.
  Trotz der Schwierigkeiten blieb er *treu* seinen Prinzipien bis zum Ende.
  
  Se fossi *fedele* come un amico vero, non avresti questi problemi.
  Wärst du *treu* wie ein echter Freund, hättest du diese Probleme nicht.
  
  È raro trovare persone così *fedeli* nel lavoro come lui.
  Es ist selten, so *zuverlässige* Menschen in der Arbeit zu finden wie ihn.
