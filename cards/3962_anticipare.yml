Rang: 3962
Wort: anticipare
Wortart: vt
Wort mit Artikel: anticipare
Femininum / Plural: ''
IPA: ''
Definition: vorwegnehmen, vorverlegen
Register: ''
Beispielsätze: |-
  Devo *anticipare* il mio viaggio a Roma perché ho meno tempo del previsto.
  Ich muss meine Reise nach Rom *vorverlegen*, weil ich weniger Zeit habe als geplant.
  
  Se *anticipi* la scadenza, potrai evitare multe e altri problemi.
  Wenn du die Frist *vorziehst*, kannst du Strafen und andere Probleme vermeiden.
  
  Ho saputo che il direttore vuole *anticipare* l’incontro a domani mattina.
  Ich habe gehört, dass der Direktor das Treffen auf morgen früh *vorverlegen* möchte.
  
  Sarebbe meglio se tu *anticipassi* i pagamenti, così risparmieresti sugli interessi.
  Es wäre besser, wenn du die Zahlungen *vorziehst*, dann würdest du Zinsen sparen.
  
  Nonostante il maltempo, hanno deciso di *anticipare* la partenza della nave per evitare tempeste.
  Trotz des schlechten Wetters haben sie beschlossen, die Abfahrt des Schiffes *vorzuverlegen*, um Stürme zu vermeiden.
