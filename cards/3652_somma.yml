Rang: 3652
Wort: somma
Wortart: n.f
Wort mit Artikel: la somma
Femininum / Plural: somme
IPA: ''
Definition: die Summe, -n
Register: ''
Beispielsätze: |-
  Dopo aver calcolato tutti i costi, la *somma* totale è risultata molto più alta del previsto.
  Nach der Berechnung aller Kosten war die *Summe* viel höher als erwartet.
  
  Nonostante le difficoltà, siamo riusciti a raccogliere una *somma* considerevole per il progetto.
  Trotz der Schwierigkeiten konnten wir eine beträchtliche *Summe* für das Projekt sammeln.
  
  Se avessi saputo che la *somma* era sbagliata, avrei controllato i calcoli.
  Wenn ich gewusst hätte, dass die *Summe* falsch war, hätte ich die Berechnungen überprüft.
  
  La *somma* che hai scritto sul foglio non corrisponde a quella che ho calcolato io.
  Die *Summe*, die du auf das Blatt geschrieben hast, stimmt nicht mit meiner Berechnung überein.
  
  Vorrei sapere se quella *somma* include anche le spese di spedizione o no.
  Ich möchte wissen, ob diese *Summe* auch die Versandkosten beinhaltet oder nicht.
