Rang: 1558
Wort: patto
Wortart: n.m
Wort mit Artikel: il patto
Femininum / Plural: i patti
IPA: ''
Definition: der Vertrag, -träge
Register: ''
Beispielsätze: |-
  Il *patto* tra le due nazioni è stato firmato ieri dal ministro degli Esteri.
  Der *Vertrag* zwischen den beiden Nationen wurde gestern vom Außenminister unterzeichnet.
  
  Secondo il giornalista, avvenire un cambiamento nelle relazioni dopo il nuovo *patto* commerciale.
  Laut dem *Journalisten* wird sich nach dem neuen Handelsvertrag eine Veränderung in den Beziehungen ereignen.
  
  Se non rispetti il *patto*, rischi di diro rovinare la reputazione della tua azienda.
  Wenn du den *Vertrag* nicht einhältst, könntest du mit der Reputation deines Unternehmens direkt Schaden nehmen.
  
  Il politico ha fatto una dichiarazione in cui assicura che il *patto* verrà esaminato con attenzione.
  Der Politiker hat eine *Erklärung* abgegeben, in der er versichert, dass der Vertrag genau geprüft wird.
  
  Nonostante il *patto* firmato l'anno scorso, molti prigionieri sono ancora in attesa di soccorso umanitario.
  Trotz des vor einem Jahr unterzeichneten *Vertrags* warten viele Gefangene immer noch auf humanitäre Hilfe.
