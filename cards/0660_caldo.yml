Wort: caldo
Wortart: adj
Wort mit Artikel: caldo
Femininum / Plural: ''
IPA: ''
Definition: heiß, warm
Register: ''
Beispielsätze: |-
  Oggi fa *caldo*, quindi restiamo a casa invece di uscire.
  Heute ist es *heiß*, also bleiben wir zu Hause statt auszugehen.
  
  Se non avessi questo cappotto pesante, morirei di *caldo*!
  Wenn ich diesen dicken Mantel nicht hätte, würde ich vor *Hitze* sterben!
  
  Avendo preso un tè *caldo*, mi sono scottato la lingua.
  Da ich einen *heißen* Tee getrunken habe, habe ich mir die Zunge verbrannt.
  
  Credo che domani pioverà, ma che *caldo* ci sarà lo stesso!
  Ich glaube, morgen wird es regnen, aber die *Hitze* bleibt trotzdem!
  
  Finché non risolviamo questa questione, non potrò rilassarmi, anche se fuori fa *caldo* tremendo.
  Solange wir diese *Frage* nicht klären, kann ich mich nicht entspannen, auch wenn draußen eine schreckliche Hitze herrscht.
