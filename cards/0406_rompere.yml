Rang: 406
Wort: rompere
Wortart: v
Wort mit Artikel: rompere
Femininum / Plural: ''
IPA: ''
Definition: zerbrechen, brechen, kaputtmachen
Register: ''
Beispielsätze: |-
  Non *rompere* il vetro, per favore!
  Breche bitte nicht das *Glas*!
  
  Ieri ho *rotto* il cellulare cadendo dalle scale.
  Gestern habe ich das *Handy* zerbrochen, als ich die Treppe hinuntergefallen bin.
  
  Se non rispetti le regole, *romperai* la fiducia di tutti.
  Wenn du die Regeln nicht respektierst, wirst du das *Vertrauen* aller brechen.
  
  Credo che tu stia per *rompere* la promessa fatta a Marco.
  Ich glaube, du brichst gleich das *Versprechen*, das du Marco gegeben hast.
  
  Dopo averlo *rotto*, si è reso conto di quanto fosse costoso aggiustarlo.
  Als er es *zerbrochen* hatte, merkte er, wie teuer es war, es reparieren zu lassen.
Audio: ''
Notiz: ''
Dispersion: ''
