Rang: 4666
Wort: minestra
Wortart: n.f
Wort mit Artikel: la minestra
Femininum / Plural: minestre
IPA: ''
Definition: die Suppe, -n
Register: ''
Beispielsätze: |-
  Nel ristorante hanno servito una *minestra* molto saporita ieri sera.
  Im *Restaurant* haben sie gestern Abend eine sehr schmackhafte Suppe serviert.
  
  Per cena vorremmo una *minestra* calda, perché fuori fa freddo.
  Zum Abendessen möchten wir eine *warme* Suppe, denn draußen ist es kalt.
  
  La nonna prepara la *minestra* ogni domenica, seguendo la ricetta di famiglia.
  Die Oma kocht jede Sonntag eine *Suppe*, indem sie das Familienrezept befolgt.
  
  Se non hai fame, puoi ordinare solo una *minestra* leggera per non appesantirti.
  Wenn du keinen Hunger hast, kannst du nur eine *leichte* Suppe bestellen, um dich nicht zu belasten.
  
  Dopo la passeggiata nel bosco, abbiamo bevuto una *minestra* fumante per riscaldarci.
  Nach dem Spaziergang im Wald haben wir eine *dampfende* Suppe getrunken, um uns zu wärmen.
