Rang: 87
Wort: bisogno
Wortart: n.m
Wort mit Artikel: il bisogno
Femininum / Plural: bisogni
IPA: ''
Definition: das Bedürfnis, -se
Register: ''
Beispielsätze: |-
  Ho *bisogno* di un po' d'acqua dopo la camminata.
  Ich habe *Durst* nach dem Spaziergang.
  
  Se hai *bisogno* di aiuto, chiamami pure!
  Wenn du *Hilfe* brauchst, ruf mich einfach an!
  
  Aveva *bisogno* di soldi per pagare l'affitto.
  Sie *brauchte* Geld, um die Miete zu bezahlen.
  
  Senti mai *bisogno* di stare solo per un po'?
  Hast du manchmal *Lust* auf ein bisschen Zeit für dich?
  
  I suoi *bisogni* quotidiani includono mangiare e dormire.
  Seine täglichen *Bedürfnisse* sind Essen und Schlafen.
