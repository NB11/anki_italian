Rang: 1526
Wort: volontà
Wortart: n.f
Wort mit Artikel: la volontà
Femininum / Plural: volontà
IPA: ''
Definition: der Wille, -n
Register: ''
Beispielsätze: |-
  Ha preso la sua *volontà* molto sul serio e ha lavorato sodo per raggiungerla.
  Er hat seinen *Willen* sehr ernst genommen und hart gearbeitet, um ihn zu erreichen.
  
  Nonostante le difficoltà, la sua *volontà* di aiutare gli altri non è mai venuta meno.
  Trotz der Schwierigkeiten ist sein *Wille*, anderen zu helfen, nie nachgelassen.
  
  La *volontà* del popolo sarà decisiva per il futuro della nazione, ha detto il ministro.
  Der *Wille* des Volkes wird für die Zukunft der Nation entscheidend sein, sagte der Minister.
  
  Senza una chiara *volontà* politica, molte riforme rimangono lettera morta.
  Ohne einen klaren politischen *Willen* bleiben viele Reformen tote Buchstaben.
  
  La *volontà* di vincere è ciò che distingue i grandi atleti dagli altri.
  Der *Wille* zu siegen ist das, was große Sportler von den anderen unterscheidet.
