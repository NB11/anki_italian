Beispielsätze: |-
  Durante il *brindisi* abbiamo levato i bicchieri per festeggiare il successo del progetto.
  Während des *Trinkspruchs* haben wir die Gläser erhoben, um den Erfolg des Projekts zu feiern.
  
  Non appena il direttore avrà finito il suo *brindisi*, potremo cominciare la riunione.
  Sobald der Direktor seinen *Trinkspruch* beendet haben wird, können wir die Besprechung beginnen.
  
  Che *brindisi* stupendo hai fatto ieri sera durante la cena di matrimonio!
  Was für einen wunderbaren *Trinkspruch* hast du gestern Abend beim Hochzeitsessen gehalten!
  
  Avrei voluto fare un *brindisi* più lungo, ma purtroppo la batteria del microfono si è scaricata.
  Ich hätte einen längeren *Trinkspruch* halten wollen, aber leider war die Mikrofonbatterie leer.
  
  Se avessi saputo che avresti fatto un *brindisi* così commovente, avrei portato un fazzoletto.
  Wenn ich gewusst hätte, dass du einen so rührenden *Trinkspruch* halten würdest, hätte ich ein Taschentuch mitgebracht.
