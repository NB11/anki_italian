Rang: 4815
Wort: tossire
Wortart: vi
Wort mit Artikel: tossire
Femininum / Plural: ''
IPA: ''
Definition: husten
Register: ''
Beispielsätze: |-
  Mio figlio *tossisce* spesso dopo aver mangiato la cioccolata, forse ha un’allergia.
  Mein Sohn *hustet* oft nach dem Essen von Schokolade, vielleicht hat er eine Allergie.
  
  Se *tussissi* meno, dormirei molto meglio la notte.
  Wenn du weniger *hustest*, würde ich nachts viel besser schlafen.
  
  Il medico ha detto che *tossiva* perché aveva un’infezione alle vie respiratorie.
  Der Arzt hat gesagt, dass er *hustete*, weil er eine Infektion der Atemwege hatte.
  
  Anche se *tossiresti* per ore, io non mi preoccuperei troppo.
  Auch wenn du stundenlang *husten* würdest, würde ich mir nicht zu viele Sorgen machen.
  
  Non appena *tossì*, tutta la classe si girò verso di lui per capire che cosa fosse successo.
  Sobald er *hustete*, drehte sich die ganze Klasse zu ihm um, um zu verstehen, was passiert war.
