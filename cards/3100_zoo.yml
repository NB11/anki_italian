Rang: 3100
Wort: zoo
Wortart: n.m
Wort mit Artikel: lo zoo
Femininum / Plural: gli zoo
IPA: ''
Definition: der Zoo, -s
Register: ''
Beispielsätze: |-
  Lo *zoo* della città ha aperto un nuovo padiglione per i panda.
  Im *Zoo* der Stadt wurde ein neues Panda-Gebäude eröffnet.
  
  Durante la gita scolastica abbiamo visitato lo *zoo* e visto un elefante che mangiava una banana.
  Während des Schulausflugs besuchten wir den *Zoo* und sahen einen Elefanten, der eine Banane fraß.
  
  Se avessi più tempo, andrei ogni settimana allo *zoo* a fotografare gli animali esotici.
  Wenn ich mehr Zeit hätte, würde ich jede Woche in den *Zoo* gehen, um exotische Tiere zu fotografieren.
  
  Mio fratello lavora come veterinario nello *zoo* e si occupa soprattutto degli animali malati.
  Mein Bruder arbeitet als Tierarzt im *Zoo* und kümmert sich vor allem um kranke Tiere.
  
  Nonostante la pioggia, i bambini hanno insistito per andare allo *zoo* perché adorano gli animali.
  Trotz des Regens bestanden die Kinder darauf, in den *Zoo* zu gehen, weil sie Tiere lieben.
