Rang: 302
Wort: sacco
Wortart: n.m
Wort mit Artikel: il sacco
Femininum / Plural: sacchi
IPA: ''
Definition: der Sack, Säcke
Register: ''
Beispielsätze: |-
  Ho comprato *un sacco* di patate al mercato.
  Ich habe *einen Sack* Kartoffeln auf dem Markt gekauft.
  
  Porta *i sacchi* della spesa in cucina, per favore.
  Bringe *die Einkaufstüten* bitte in die Küche.
  
  C’erano *sacchi* di foglie secche in giardino dopo l’autunno.
  Es lagen *Säcke* voll trockener Blätter im Garten nach dem Herbst.
  
  Non ho mai visto *un sacco* di soldi così tanti in una sola volta!
  Ich habe noch nie *so einen Haufen Geld* auf einmal gesehen!
  
  Chiusi tutti *i sacchi* della spazzatura prima di uscire.
  Ich habe alle *Müllsäcke* verschlossen, bevor ich gegangen bin.
