Rang: 3308
Wort: schiantare
Wortart: v
Wort mit Artikel: schiantare
Femininum / Plural: ''
IPA: ''
Definition: zerbrechen, zerschmettern
Register: ''
Beispielsätze: |-
  Se *schianterai* quella bottiglia con tanta forza, perderai il rimborso del deposito.
  Wenn du die Flasche mit so viel Kraft *zerbrichst*, verlierst du die Pfandrückerstattung.
  
  Nonostante le mie obiezioni, lui ha *schiantato* la porta con una spallata.
  Trotz meiner Einwände hat er die Tür mit einem Sprung *zerschmettert*.
  
  Mi dispiace, ma ho *schiantato* accidentalmente il tuo bicchiere preferito.
  Es tut mir leid, aber ich habe versehentlich dein Lieblingsglas *zerbrochen*.
  
  Se continuerai a *schiantare* tutto quello che tocchi, finirai per rimanere senza nulla.
  Wenn du weiterhin alles, was du anfasst, *zerbrichst*, wird am Ende nichts mehr übrig bleiben.
  
  Dicono che si *schianterà* appena saprà la notizia, perché era molto legato al progetto.
  Man sagt, er wird *zusammenbrechen*, sobald er die Nachricht erfährt, weil das Projekt ihm sehr wichtig war.
