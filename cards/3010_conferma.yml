Rang: 3010
Wort: conferma
Wortart: n.f
Wort mit Artikel: la conferma
Femininum / Plural: conferme
IPA: ''
Definition: die Bestätigung, -en
Register: ''
Beispielsätze: |-
  La *conferma* della prenotazione è arrivata via e-mail.
  Die *Bestätigung* der Reservierung kam per E-Mail an.
  
  Aspetta la *conferma* del direttore prima di procedere.
  Warte auf die *Bestätigung* des Direktors, bevor du weitermachst.
  
  La *conferma* del suo arrivo ci ha sorpresi positivamente.
  Die *Bestätigung* ihrer Ankunft hat uns positiv überrascht.
  
  Non abbiamo ancora ricevuto la *conferma* dall’ospedale.
  Wir haben noch keine *Bestätigung* vom Krankenhaus erhalten.
  
  La *conferma* ufficiale sarà pubblicata domani sul sito istituzionale.
  Die offizielle *Bestätigung* wird morgen auf der Institutswebsite veröffentlicht.
