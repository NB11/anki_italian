Rang: 2096
Wort: incolpare
Wortart: vt
Wort mit Artikel: incolpare
Femininum / Plural: ''
IPA: ''
Definition: beschuldigen, verantwortlich machen
Register: ''
Beispielsätze: |-
  Il giudice ha deciso di *incolpare* l'imputato per il furto.
  Der Richter hat beschlossen, den Angeklagten für den Diebstahl zu *beschuldigen*.
  
  Non *incolpare* gli altri per i tuoi errori, assumiti la responsabilità.
  Beschuldige nicht die anderen für deine Fehler, übernimm die Verantwortung.
  
  Spero che nessuno *incolpi* te per quello che è successo ieri.
  Ich hoffe, dass niemand dich für das, was gestern passiert ist, *verantwortlich macht*.
  
  Se *incolperanno* me, dovrò dimostrare di essere innocente.
  Wenn sie mich *beschuldigen*, muss ich beweisen, dass ich unschuldig bin.
  
  Non volevo *incolparti*, ma le prove sembrano schiaccianti.
  Ich wollte dich nicht *verantwortlich machen*, aber die Beweise scheinen erdrückend.
