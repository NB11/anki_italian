Beispielsätze: |-
  Questo film è *realistico* come nessun altro.
  Dieser Film ist *realistisch* wie kein anderer.
  
  Se il budget fosse più alto, la sua idea sarebbe *realistica*.
  Wenn das Budget höher wäre, wäre seine Idee *realistisch*.
  
  Non mi sembra *realistico* che tu abbia finito tutto in un'ora.
  Es erscheint mir nicht *realistisch*, dass du alles in einer Stunde erledigt hast.
  
  Cerchiamo soluzioni *realistiche* che rispettino le risorse a disposizione.
  Wir suchen *realistische* Lösungen, die die verfügbaren Ressourcen berücksichtigen.
  
  Anche se non è semplice, dobbiamo rimanere *realistici* nei nostri obiettivi.
  Auch wenn es nicht einfach ist, müssen wir *realistisch* in unseren Zielen bleiben.
