Rang: 2182
Wort: gesto
Wortart: n.m
Wort mit Artikel: il gesto
Femininum / Plural: gesti
IPA: ''
Definition: die Geste, -n
Register: ''
Beispielsätze: |-
  Fai un *gesto* con la mano per salutare tuo fratello.
  Mache eine *Geste* mit der Hand, um deinen Bruder zu grüßen.
  
  Non mi piace quel *gesto* che hai fatto verso di lui.
  Mir gefällt diese *Geste* nicht, die du ihm gegenüber gemacht hast.
  
  Il *gesto* di offrire un fiore è molto attraente e gentile.
  Die *Geste*, eine Blume zu schenken, ist sehr anziehend und höflich.
  
  Avrei voluto un *gesto* più chiaro da parte sua durante il colloquio.
  Ich hätte mir eine deutlichere *Geste* von Ihrer Seite im Vorstellungsgespräch gewünscht.
  
  Ha perso il controllo e ha compiuto un *gesto* che non si sarebbe mai aspettato da sé stesso.
  Er hat die Kontrolle verloren und eine *Geste* vollzogen, die er sich selbst nie zugetraut hätte.
