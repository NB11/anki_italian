Wort: clown
Wortart: n.m
Wort mit Artikel: il clown
Femininum / Plural: clown
IPA: ''
Definition: der Clown, -s
Register: ''
Beispielsätze: |-
  Ho visto *clown* al circo ieri sera e ridevo così tanto che mi sono fatto male alla pancia.
  Ich habe den *Clown* im Zirkus gestern Abend gesehen und so sehr gelacht, dass mir der Bauch wehtat.
  
  Il *clown* che si esibiva al parco non era molto bravo, ma i bambini ridevano comunque.
  Der *Clown*, der im Park auftrat, war nicht besonders gut, aber die Kinder lachten trotzdem.
  
  Se fossi un *clown*, lavorerei in un ospedale per rendere più allegre le visite dei bambini malati.
  Wenn ich ein *Clown* wäre, würde ich in einem Krankenhaus arbeiten, um die Besuche kranker Kinder fröhlicher zu machen.
  
  Hanno assunto un *clown* per animare la festa di compleanno, ma alla fine aveva l’aria di essere più stressato di noi.
  Sie haben einen *Clown* engagiert, um die Geburtstagsfeier aufzumöbeln, aber am Ende sah er gestresster aus als wir.
  
  Non mi piacciono i *clown*: hanno un aspetto troppo inquietante e non mi fanno ridere affatto.
  Ich mag *Clowns* nicht: Sie sehen zu gruselig aus und bringen mich überhaupt nicht zum Lachen.
