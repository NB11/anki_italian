Rang: 736
Wort: sorpresa
Wortart: n.f
Wort mit Artikel: la sorpresa
Femininum / Plural: sorprese
IPA: ''
Definition: die Überraschung, -en
Register: ''
Beispielsätze: |-
  Quando ho aperto il regalo, ho avuto una *sorpresa* meravigliosa.
  Als ich das Geschenk geöffnet habe, hatte ich eine *wunderbare* Überraschung.
  
  Non mi aspetto nessuna *sorpresa* negativa dal mio capo oggi.
  Ich erwarte heute keine *negativen* Überraschungen von meinem Chef.
  
  Se la *sorpresa* sarà grande, festeggeremo tutta la notte!
  Wenn die Überraschung groß sein wird, feiern wir die ganze Nacht!
  
  Spero che la *sorpresa* per il suo compleanno sia un successo!
  Ich hoffe, dass die Überraschung zu seinem Geburtstag ein Erfolg wird!
  
  Era una *sorpresa* totale che l’amico ci avesse organizzato una festa a sorpresa.
  Es war eine *völlige* Überraschung, dass der Freund eine Geburtstagsfeier für uns organisiert hatte.
