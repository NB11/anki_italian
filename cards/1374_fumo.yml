Rang: 1374
Wort: fumo
Wortart: n.m
Wort mit Artikel: il fumo
Femininum / Plural: ''
IPA: ''
Definition: der Rauch, kein Pl.
Register: ''
Beispielsätze: |-
  Non vedo più nulla perché c'è troppo *fumo* nella stanza.
  Ich sehe nichts mehr, weil zu *viel Rauch* im Raum ist.
  
  Il *fumo* delle sigarette nuoce gravemente alla salute secondo l'avviso sanitari.
  Der *Rauch* von Zigaretten schadet der Gesundheit laut den Gesundheitshinweisen.
  
  Mia sorella ha detto che il *fumo* dei camini rende l'aria pesante nelle città.
  Meine Schwester hat gesagt, dass der *Rauch* aus den Kaminen die Luft in den Städten schwer macht.
  
  Se non spegniamo il fuoco, il *fumo* riempirà tutta la casa.
  Wenn wir das Feuer nicht löschen, wird der *Rauch* das ganze Haus füllen.
  
  L'ispettore ha vietato di produrre *fumo* nella stanza dove si trova l'archivio segreto.
  Der Inspektor hat verboten, in dem Raum, in dem das geheime Archiv liegt, *Rauch* zu erzeugen.
