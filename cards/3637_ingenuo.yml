Rang: 3637
Wort: ingenuo
Wortart: adj
Wort mit Artikel: ingenuo
Femininum / Plural: ''
IPA: ''
Definition: naiv, einfältig
Register: ''
Beispielsätze: |-
  Non essere così *ingenuo*, la gente spesso approfitta delle persone ingenuo come te.
  Sei nicht so *naiv*, die Leute nutzen oft einfältige Menschen wie dich aus.
  
  Ho trovato la sua risposta davvero *ingenua*, sembrava un bambino di cinque anni.
  Ich fand seine Antwort wirklich *naiv*, er klang wie ein fünfjähriges Kind.
  
  Se fossi più *ingenuo*, crederei che tutti siano buoni e onesti.
  Wenn ich *naiver* wäre, würde ich glauben, dass alle gut und ehrlich sind.
  
  Nonostante le prove contrarie, rimase *ingenua* e continuò a fidarsi degli sconosciuti.
  Trotz aller gegenteiligen Beweise blieb sie *einfältig* und vertraute Fremden weiter.
  
  Era troppo *ingenua* per capire che dietro quella gentilezza si nascondeva un secondo fine.
  Sie war zu *naiv*, um zu erkennen, dass sich hinter dieser Freundlichkeit ein Hintergedanke verbarg.
