Rang: 2491
Wort: esercitare
Wortart: v
Wort mit Artikel: esercitare
Femininum / Plural: ''
IPA: ''
Definition: üben, trainieren
Register: ''
Beispielsätze: |-
  Se vuoi *esercitare* la memoria, leggi un libro ogni giorno.
  Wenn du das *Gedächtnis* üben willst, lies jeden Tag ein Buch.
  
  Ho *esercitato* il pianoforte per due ore senza interruzione.
  Ich habe zwei Stunden am Klavier *geübt* ohne Pause.
  
  Gli atleti *esercitano* le loro capacità prima di ogni competizione.
  Die Sportler *trainieren* ihre Fähigkeiten vor jedem Wettbewerb.
  
  Vuoi *esercitare* lo spagnolo o il francese quest’anno?
  Willst du dieses Jahr Spanisch oder Französisch *üben*?
  
  Dopo aver *esercitato* il diritto per anni, è diventato avvocato.
  Nachdem er Jahre lang Recht *ausgeübt* hatte, wurde er Anwalt.
