Rang: 1217
Wort: suono
Wortart: n.m
Wort mit Artikel: il suono
Femininum / Plural: suoni
IPA: ''
Definition: der Klang, -¨e
Register: ''
Beispielsätze: |-
  Il *suono* della campana si sente da lontano.
  Der *Klang* der Glocke ist von Weitem zu hören.
  
  Non mi piace questo *suono* stridente, sembra sporco.
  Dieser quietschende *Klang* gefällt mir nicht, er klingt schmutzig.
  
  Se ascolti attentamente, senti un *suono* che non riesci a riconoscere - forse è un oggetto nudo che cade?
  Wenn du genau hinhörst, hörst du einen *Klang*, den du nicht zuordnen kannst – vielleicht fällt da ein nackter Gegenstand herunter?
  
  Mi hanno detto che il *suono* della natura è diverso in estate rispetto al nord.
  Man hat mir gesagt, dass der *Klang* der Natur im Sommer anders ist als im Norden.
  
  Nonostante l’accesso limitato, ha cercato di procurare un *suono* perfetto per la sua serie.
  Trotz des begrenzten *Zugangs* versuchte er, einen perfekten Klang für seine Serie zu besorgen.
