Rang: 694
Wort: guadagnare
Wortart: vt
Wort mit Artikel: guadagnare
Femininum / Plural: ''
IPA: ''
Definition: verdienen, gewinnen, erwerben
Register: ''
Beispielsätze: |-
  Vuoi *guadagnare* di più o preferisci un lavoro meno stressante?
  Willst du *mehr verdienen* oder einen weniger stressigen Job bevorzugen?
  
  Dopo aver bruciato tutti i documenti nel camino, decise di *guadagnarsi* da vivere come violinista al bar.
  Nachdem er alle Dokumente im Kamin *verbrannt* hatte, beschloss er, sich als Geiger in der Bar den Lebensunterhalt zu verdienen.
  
  Per evitare che il crimine aumenti intorno al luogo, il comune vuole *guadagnare* la fiducia dei cittadini con iniziative sociali.
  Um zu vermeiden, dass die Kriminalität an dem Ort ansteigt, will die Gemeinde das Vertrauen der Bürger mit sozialen Initiativen *gewinnen*.
  
  Se *guadagni* abbastanza questo mese, potremmo andare in vacanza in montagna per il tuo compleanno.
  Wenn du diesen Monat *genug verdienst*, könnten wir zum Geburtstag in die Berge fahren.
  
  Penso che meriti di *guadagnare* questo regalo: ha riparato la mia scarpa rotta senza chiedere nulla in cambio.
  Ich denke, er verdient dieses *Geschenk*: Er hat meinen kaputten Schuh repariert, ohne etwas dafür zu verlangen.
