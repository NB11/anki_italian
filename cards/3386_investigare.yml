Rang: 3386
Wort: investigare
Wortart: v
Wort mit Artikel: investigare
Femininum / Plural: ''
IPA: ''
Definition: ermitteln, untersuchen, recherchieren
Register: ''
Beispielsätze: |-
  Gli investigatori hanno iniziato a *investigare* sulle cause del disastro.
  Die Ermittler begannen die Ursachen des Unglücks zu *untersuchen*.
  
  Se vuoi sapere la verità, dovrai *investigare* a fondo.
  Wenn du die Wahrheit wissen willst, musst du gründlich *ermitteln*.
  
  La polizia sta *investigando* un clan mafioso da mesi.
  Die Polizei ermittelt seit Monaten in einem mafiösen *Clan*.
  
  Ho letto che stanno *investigando* sulla disgrazia accaduta in aprile.
  Ich habe gelesen, dass sie den *Unglücksfall* aus dem April untersuchen.
  
  Senza prove concrete, non potrai mai *investigare* seriamente.
  Ohne handfeste Beweise wirst du nicht ernsthaft *recherchieren* können.
