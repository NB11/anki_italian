Beispielsätze: |-
  Ho un forte mal di *gola* e devo prendere un tè caldo.
  Ich habe starke *Halsschmerzen* und muss einen heißen Tee trinken.
  
  La *gola* del cantante era molto sensibile dopo il concerto.
  Der *Rachen* des Sängers war nach dem Konzert sehr empfindlich.
  
  Quando hai bevuto qualcosa di troppo freddo, spesso ti fa male la *gola*.
  Wenn du etwas zu Kaltes trinkst, tut dir oft der *Hals* weh.
  
  Il medico mi ha detto che la mia *gola* è infiammata, quindi devo riposare la voce.
  Der Arzt hat mir gesagt, dass mein *Hals* entzündet ist, deshalb muss ich meine Stimme schonen.
  
  Nonostante il fumo, la sua *gola* era ancora abbastanza resistente.
  Trotz des Rauchens war ihr *Hals* noch ziemlich widerstandsfähig.
