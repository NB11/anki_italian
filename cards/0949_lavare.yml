Definition: waschen
Register: ''
Beispielsätze: |-
  Ogni mattina *lava* il viso con acqua fredda per svegliarsi meglio.
  Jeden Morgen *wäscht* er sich das Gesicht mit kaltem Wasser, um besser aufzuwachen.
  
  Se non *lavi* i piatti subito, gli avanzi causano cattivi odori in cucina.
  Wenn du die Teller nicht sofort *wäschst*, verursachen die Reste schlechte Gerüche in der Küche.
  
  Dopo aver *lavato* la macchina, ho trovato una macchia che non se ne andava.
  Nachdem ich das Auto *gewaschen* hatte, entdeckte ich einen Fleck, der nicht verschwand.
  
  Mi piacerebbe *lavare* questa camicia a mano, ma ho paura che si restringa.
  Ich würde dieses Hemd gern von Hand *waschen*, aber ich habe Angst, dass es einläuft.
  
  Il laboratorio in cui lavoro *lava* regolarmente le provette per evitare contaminazioni.
  In dem Labor, in dem ich arbeite, *wäscht* man die Reagenzgläser regelmäßig, um Kontaminationen zu vermeiden.
