Rang: 245
Wort: rispondere
Wortart: vt
Wort mit Artikel: rispondere
Femininum / Plural: ''
IPA: ''
Definition: antworten, erwidern
Register: ''
Beispielsätze: |-
  Devi *rispondere* al telefono prima che smetta di squillare.
  Du musst *antworten* am Telefon, bevor es aufhört zu läuten.
  
  Ha *risposto* con calma, anche se era arrabbiato.
  Er *hat* ruhig *geantwortet*, obwohl er wütend war.
  
  Vorrei *rispondere* per primo quando ci sarà il dibattito.
  Ich würde gerne als Erster *antworten*, wenn die Debatte stattfindet.
  
  Non so se saprò *rispondere* correttamente alla domanda del professore.
  Ich weiß nicht, ob ich die Frage des Professors richtig *beantworten* kann.
  
  Se *rispondessi* ai messaggi, non avresti questi problemi.
  Wenn du auf Nachrichten *antworten* *würdest*, hättest du diese Probleme nicht.
