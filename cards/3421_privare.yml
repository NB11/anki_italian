Rang: 3421
Wort: privare
Wortart: vt
Wort mit Artikel: privare
Femininum / Plural: ''
IPA: ''
Definition: berauben, entziehen, wegnehmen
Register: ''
Beispielsätze: |-
  Il giudice può *privare* il colpevole della sua libertà per molti anni.
  Der Richter kann dem Schuldigen seine Freiheit für viele Jahre *entziehen*.
  
  Non vorrei *privare* mio figlio della possibilità di viaggiare all’estero.
  Ich möchte meinem Sohn nicht die Möglichkeit, ins Ausland zu reisen, *nehmen*.
  
  Avrei *privato* quel criminale della sua arma, se fossi arrivato prima.
  Ich hätte dem Verbrecher seine Waffe *entzogen*, wenn ich früher angekommen wäre.
  
  Il governo minaccia di *privare* alcuni quartieri suburbani dei loro servizi essenziali.
  Die Regierung droht damit, einigen Vorstadtvierteln ihre essenziellen Dienstleistungen zu *entziehen*.
  
  Mi sembra ingiusto che abbiano *privato* quel cantante del suo diploma per un piccolo errore.
  Es erscheint mir ungerecht, dass man dem Sänger wegen eines kleinen Fehlers sein *Diplom* entzogen hat.
