Rang: 1691
Wort: dedicare
Wortart: v
Wort mit Artikel: dedicare
Femininum / Plural: ''
IPA: ''
Definition: widmen, zuwenden, schenken
Register: ''
Beispielsätze: |-
  Mi piacerebbe *dedicare* più tempo alla mia famiglia.
  Ich würde gerne mehr Zeit meiner Familie *widmen*.
  
  Gli scienziati hanno *dedicato* anni allo studio del clima.
  Die Wissenschaftler haben Jahre der Untersuchung des Klimas *gewidmet*.
  
  Vuoi *dedicare* questa canzone a qualcuno in particolare?
  Möchtest du dieses Lied jemand Bestimmtem *widmen*?
  
  Nonostante la stanchezza, ha continuato a *dedicarsi* al progetto con passione.
  Trotz der Müdigkeit hat er sich weiterhin mit Leidenschaft dem Projekt *gewidmet*.
  
  Se avessi tempo, *dedicherei* un intero secolo alla ricerca della pace.
  Wenn ich Zeit hätte, würde ich ein ganzes *Jahrhundert* der Suche nach Frieden widmen.
Audio: ''
Notiz: ''
