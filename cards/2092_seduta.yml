Rang: 2092
Wort: seduta
Wortart: n.f
Wort mit Artikel: la seduta
Femininum / Plural: sedute
IPA: ''
Definition: die Sitzung, -en
Register: ''
Beispielsätze: |-
  La *seduta* di terapia è iniziata alle tre del pomeriggio.
  Die *Sitzung* mit dem Therapeuten hat um drei Uhr nachmittags begonnen.
  
  Dopo una lunga *seduta* in ufficio, Maria era molto stanca.
  Nach einer langen *Sitzung* im Büro war Maria sehr müde.
  
  Credi che una *seduta* di gruppo possa aiutare più di una terapia individuale?
  Glaubst du, dass eine Gruppen-*Sitzung* mehr helfen kann als eine Einzeltherapie?
  
  Se avessi saputo che la *seduta* sarebbe durata così a lungo, avrei portato qualcosa da leggere.
  Hätte ich gewusst, dass die *Sitzung* so lange dauern würde, hätte ich etwas zum Lesen mitgebracht.
  
  La *seduta* di yoga che ho prenotato è stata posticipata a domani mattina.
  Die *Yoga-Sitzung*, die ich gebucht habe, wurde auf morgen früh verschoben.
