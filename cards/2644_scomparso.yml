Rang: 2644
Wort: scomparso
Wortart: adj
Wort mit Artikel: scomparso
Femininum / Plural: ''
IPA: ''
Definition: verschwunden, fehlend
Register: ''
Beispielsätze: |-
  L’anno scorso il suo cane è *scomparso* nel bosco vicino alla villa.
  Letzten Sommer ist sein Hund im Wald in der Nähe der *Villa* verschwunden.
  
  Dopo *scomparso* il responsabile del progetto, tutto l’istituto ha perso il filo del lavoro.
  Nach dem *Verschwinden* des Projektleiters hat das ganze Institut den Faden der Arbeit verloren.
  
  Secondo il giornale, sarebbe *scomparso* addirittura un diplomatico all’ambasciata.
  Laut der Zeitung soll sogar ein Diplomat in der *Botschaft* verschollen sein.
  
  Nonostante le ricerche, il relitto dell’aereo rimane *scomparso* nel deserto da mesi.
  Trotz der Suchaktionen bleibt das Wrack des Flugzeugs seit Monaten in der Wüste *verschwunden*.
  
  Se non fosse *scomparso* il file fotografico, avremmo potuto dimostrare la nostra tesi al comitato.
  Hätte die *fotografische* Datei nicht gefehlt, hätten wir unsere These vor dem Komitee beweisen können.
