Rang: 1996
Wort: sfidare
Wortart: vt
Wort mit Artikel: sfidare
Femininum / Plural: ''
IPA: ''
Definition: herausfordern, herausfordern
Register: ''
Beispielsätze: |-
  Non è il caso di *sfidare* la sorte con decisioni così azzardate!
  Es lohnt sich nicht, das *Schicksal* mit so riskanten Entscheidungen herauszufordern!
  
  Se vuoi vincere, devi *sfidare* te stesso prima degli altri.
  Wenn du gewinnen willst, musst du vor allen anderen dich selbst herausfordern.
  
  Gli antichi eroi greci amavano *sfidare* gli dei per dimostrare il loro valore.
  Die antiken griechischen Helden liebten es, die Götter herauszufordern, um ihren Mut zu beweisen.
  
  Non ho mai avuto il coraggio di *sfidare* mio padre quando ero piccolo.
  Ich habe es nie gewagt, meinen Vater herauszufordern, als ich klein war.
  
  La polizia dovrebbe *sfidare* i criminali invece di evitare i conflitti.
  Die Polizei sollte die Kriminellen herausfordern, statt Konflikte zu vermeiden.
