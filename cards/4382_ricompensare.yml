Rang: 4382
Wort: ricompensare
Wortart: vt
Wort mit Artikel: ricompensare
Femininum / Plural: ''
IPA: ''
Definition: belohnen, entschädigen
Register: ''
Beispielsätze: |-
  Il governo ha deciso di *ricompensare* chi ha segnalato il terrorismo nella scuola.
  Die Regierung beschloss, diejenigen zu *belohnen*, die den Terrorismus in der Schule gemeldet hatten.
  
  Se avessi aiutato di più, avrei meritato di essere *ricompensato* in qualche modo.
  Wenn ich mehr geholfen hätte, hätte ich verdient, auf irgendeine Weise *entschädigt* zu werden.
  
  Non è giusto *ricompensare* chi maltratta gli animali solo perché ha perso il lavoro.
  Es ist nicht gerecht, diejenigen zu *belohnen*, die Tiere misshandeln, nur weil sie ihren Job verloren haben.
  
  Il direttore ha promesso che laggiù verranno *ricompensati* tutti i dipendenti che hanno lavorato con ludicroso impegno durante il progetto.
  Der Direktor versprach, dass dort alle Mitarbeiter *belohnt* werden, die mit lächerlichem Einsatz während des Projekts gearbeitet haben.
  
  Credo che la natura *ricompensi* chi la rispetta, anche se spesso non lo vediamo subito.
  Ich glaube, die Natur *belohnt* diejenigen, die sie respektieren, auch wenn wir es oft nicht sofort sehen.
