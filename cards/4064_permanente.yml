Definition: dauerhaft, ständig
Register: ''
Beispielsätze: |-
  Vorrei un tatuaggio *permanente* sulla spalla, ma mi fanno paura gli aghi.
  Ich möchte ein *dauerhaftes* Tattoo auf der Schulter, aber ich habe Angst vor Nadeln.
  
  Anche se l'accordo sembrava *permanente*, dopo un anno hanno deciso di separarsi.
  Obwohl die Vereinbarung *dauerhaft* schien, haben sie sich nach einem Jahr entschieden, sich zu trennen.
  
  Credo che la sua rabbia sia *permanente* e non accetterà mai le mie scuse.
  Ich glaube, dass sein Ärger *dauerhaft* ist und er meine Entschuldigungen nie annehmen wird.
  
  Hanno scelto una soluzione *permanente* al problema della siccità, costruendo un acquedotto.
  Sie haben eine *dauerhafte* Lösung für das Dürreproblem gewählt, indem sie eine Wasserleitung gebaut haben.
  
  Nonostante le critiche, il suo ruolo nella squadra è rimasto *permanente* per dieci anni.
  Trotz der Kritik blieb seine Rolle im Team *dauerhaft* für zehn Jahre.
