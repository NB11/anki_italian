Rang: 3541
Wort: affidabile
Wortart: adj
Wort mit Artikel: affidabile
Femininum / Plural: ''
IPA: ''
Definition: zuverlässig, verlässlich, vertrauenswürdig
Register: ''
Beispielsätze: |-
  Questo *affidabile* sistema di allarme ci protegge da ogni pericolo.
  Dieses *zuverlässige* Alarmsystem schützt uns vor jeder Gefahr.
  
  Se non fosse *affidabile*, nessuno si fiderebbe di lui.
  Wenn er nicht *verlässlich* wäre, würde ihm niemand vertrauen.
  
  Dobbiamo trovare un partner *affidabile* per gestire questi affari così delicati.
  Wir müssen einen *vertrauenswürdigen* Partner finden, um diese heiklen Geschäfte zu führen.
  
  Ha sempre dimostrato di essere *affidabile*, anche nelle situazioni più complicate.
  Er hat sich immer als *zuverlässig* erwiesen, sogar in den schwierigsten Situationen.
  
  Pensavo fosse *affidabile*, invece ha tradito la mia fiducia.
  Ich dachte, er sei *verlässlich*, stattdessen hat er mein Vertrauen missbraucht.
