Rang: 3289
Wort: spazzare
Wortart: v
Wort mit Artikel: spazzare
Femininum / Plural: ''
IPA: ''
Definition: fegen, kehren
Register: ''
Beispielsätze: |-
  Ogni mattina devo *spazzare* il pavimento della cucina perché mia madre non vuole sporco.
  Jeden Morgen muss ich den Küchenfußboden *kehren*, weil meine Mutter keinen Schmutz will.
  
  Se *spazzassi* il balcone più spesso, ci troverei meno foglie secche e polvere.
  Wenn ich den Balkon öfter *kehren* würde, fände ich weniger trockene Blätter und Staub.
  
  Ha promesso che *spazzerà* per tutta la casa prima che arrivino gli ospiti questa sera.
  Er hat versprochen, dass er *kehren* wird, bevor die Gäste heute Abend kommen.
  
  Vorrei che tu *spazzassi* anche dietro l’armadio, perché lì si accumulano sempre i ragnatele.
  Ich möchte, dass du auch hinter dem Schrank *kehrst*, denn dort sammeln sich immer Spinnweben.
  
  Dopo aver finito di cucinare, ricordati di *spazzare* il pavimento per evitare che qualcuno scivoli sulla farina caduta.
  Erinner dich bitte daran, nach dem Kochen den Boden *zu kehren*, damit niemand auf das heruntergefallene Mehl ausrutscht.
