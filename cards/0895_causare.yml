Rang: 895
Wort: causare
Wortart: vt
Wort mit Artikel: causare
Femininum / Plural: ''
IPA: ''
Definition: verursachen, bewirken, hervorrufen
Register: ''
Beispielsätze: |-
  Lo *causa* è ancora sconosciuto, ma gli scienziati stanno indagando.
  Die *Ursache* ist noch unbekannt, aber die Wissenschaftler untersuchen es.
  
  Se fumate qui, *causerete* problemi di respirazione a tutti.
  Wenn ihr hier raucht, *werdet* ihr allen Atemprobleme verursachen.
  
  Non volevo *causare* alcun disagio, quindi ho cambiato i miei piani.
  Ich wollte *überhaupt keine* Unannehmlichkeiten hervorrufen, daher habe ich meine Pläne geändert.
  
  Ho letto che l’inquinamento *può causare* malattie gravi se non lo controlliamo.
  Ich habe gelesen, dass die Verschmutzung schwere Krankheiten *bewirken* kann, wenn wir sie nicht kontrollieren.
  
  Dunque, se non agiamo ora, *causeremo* danni enormi all’ambiente.
  Also, wenn wir jetzt nicht handeln, *werden* wir der Umwelt enorme Schäden verursachen.
