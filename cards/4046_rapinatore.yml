Rang: 4046
Wort: rapinatore
Wortart: n.m
Wort mit Artikel: il rapinatore
Femininum / Plural: rapinatori
IPA: ''
Definition: der Räuber, -
Register: ''
Beispielsätze: |-
  I *rapinatori* hanno rubato tutto il denaro dal bancone della banca.
  Die *Räuber* haben all das Geld von der Theke der Bank gestohlen.
  
  Chiudete gli occhi, non guardate il *rapinatore*!
  Schließt die Augen, schaut den *Räuber* nicht an!
  
  Se avessi saputo che era un *rapinatore*, non gli avrei aperto la porta.
  Wenn ich gewusst hätte, dass er ein *Räuber* war, hätte ich ihm nicht die Tür geöffnet.
  
  I poliziotti inseguono il *rapinatore* che ha appena aggredito una borsetta in centro.
  Die Polizisten verfolgen den *Räuber*, der gerade eine Handtasche im Zentrum angegriffen hat.
  
  Dicono che il *rapinatore* abbia confessato tutto sotto la pressione delle prove governative.
  Man sagt, der *Räuber* habe unter dem Druck der staatlichen Beweise alles gestanden.
