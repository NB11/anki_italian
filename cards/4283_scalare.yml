Rang: 4283
Wort: scalare
Wortart: vt
Wort mit Artikel: scalare
Femininum / Plural: ''
IPA: ''
Definition: besteigen, klettern, erklimmen
Register: ''
Beispielsätze: |-
  L'alpinista *scalerà* la montagna domani all'alba se il tempo lo permetterà.
  Der Bergsteiger wird den Berg morgen bei Sonnenaufgang *besteigen*, wenn das Wetter es zulässt.
  
  Ho visto un video in cui dei ragazzi *scalano* le pareti di un grattacielo di notte.
  Ich habe ein Video gesehen, in dem Jugendliche nachts die Wände eines Wolkenkratzers *erklettern*.
  
  Nonostante la sua *scalata* fosse affannosa, riuscì a raggiungere la cima in meno di due ore.
  Trotz seines *Kletterns* in atemlosem Tempo schaffte er es in weniger als zwei Stunden auf den Gipfel.
  
  Se avessi più tempo, *scalerei* il Monte Rosa l'estate prossima.
  Wenn ich mehr Zeit hätte, würde ich den Monte Rosa nächsten Sommer *besteigen*.
  
  Il gruppo di escursionisti, che *scalerà* il vulcano Etna, si prepara da settimane con un equipaggiamento apposito.
  Die Wandergruppe, die den Ätna *erklettern* wird, bereitet sich seit Wochen mit spezieller Ausrüstung vor.
