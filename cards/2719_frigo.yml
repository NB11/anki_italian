Rang: 2719
Wort: frigo
Wortart: n.m
Wort mit Artikel: il frigo
Femininum / Plural: frighi
IPA: ''
Definition: der Kühlschrank, -¨e
Register: ''
Beispielsätze: |-
  Metti la *frigo* in cucina per conservare gli alimenti freschi.
  Stell den *Kühlschrank* in die Küche, um die Lebensmittel frisch zu halten.
  
  Ho comprato una *frigo* nuova perché quella vecchia non raffreddava più bene.
  Ich habe einen neuen *Kühlschrank* gekauft, weil der alte nicht mehr gut kühlte.
  
  Se non lavi i piatti, finiranno dentro la *frigo*.
  Wenn du das Geschirr nicht wäschst, landet es im *Kühlschrank*.
  
  La *frigo* del ristorante è sempre piena di ingredienti lavorati.
  Der *Kühlschrank* des Restaurants ist immer voller verarbeiteter Zutaten.
  
  Mi hanno detto che la *frigo* è rotta, ma non è vero, funziona perfettamente!
  Man hat mir gesagt, der *Kühlschrank* sei kaputt, aber das stimmt nicht, er funktioniert einwandfrei!
