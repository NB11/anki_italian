Rang: 3587
Wort: leva
Wortart: n.m
Wort mit Artikel: la leva
Femininum / Plural: leve
IPA: ''
Definition: der Hebel, -
Register: ''
Beispielsätze: |-
  Con *leva* piccola bastano cinquanta newton per sollevare questo peso.
  Mit einem *kleinen Hebel* reichen fünfzig Newton, um dieses Gewicht zu heben.
  
  Lo strumento che hai in mano è una *leva* per aprire il coperchio metallico.
  Das Werkzeug in deiner Hand ist ein *Hebel*, um den Metalldeckel zu öffnen.
  
  È improbabile che tu riesca a spostare il macigno senza una *leva* abbastanza robusta.
  Es ist *unwahrscheinlich*, dass du den Felsbrocken ohne einen Hebel von ausreichender Stärke bewegen kannst.
  
  La *leva* del freno a mano si è bloccata e non si può più usare.
  Der *Hebel* der Handbremse hat sich verklemmt und lässt sich nicht mehr bedienen.
  
  Un ingegnere esperto sa calcolare le forze in gioco quando progetta una *leva* per un macchinario.
  Ein erfahrener Ingenieur weiß, die Kräfte zu berechnen, die wirken, wenn er einen *Hebel* für eine Maschine entwirft.
