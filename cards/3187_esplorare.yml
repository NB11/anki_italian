Rang: 3187
Wort: esplorare
Wortart: v
Wort mit Artikel: esplorare
Femininum / Plural: ''
IPA: ''
Definition: erforschen, erkunden
Register: ''
Beispielsätze: |-
  Gli scienziati vogliono *esplorare* il fondo dell’oceano per scoprire nuove specie.
  Die Wissenschaftler wollen *erkunden* den Meeresboden, um neue Arten zu entdecken.
  
  Se avessi più tempo, *esplorerei* ogni angolo di questa città medievale.
  Wenn ich mehr Zeit hätte, würde ich *erkunden* jede Ecke dieser mittelalterlichen Stadt.
  
  I turisti *esplorano* le rovine di Pompei con grande interesse.
  Die Touristen *erkunden* die Ruinen von Pompeji mit großem Interesse.
  
  Prima di firmare il contratto, vorrei *esplorare* tutte le opzioni disponibili.
  Bevor ich den Vertrag unterschreibe, möchte ich *erkunden* alle verfügbaren Optionen.
  
  Hanno *esplorato* la zona per giorni senza trovare alcuna traccia del fuggitivo.
  Sie haben die Gegend *erforscht* für Tage, ohne eine Spur des Flüchtlings zu finden.
