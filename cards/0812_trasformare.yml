  Ich hoffe, dass es dir gelingt, deine Träume *zu verwirklichen*.
  
  Stiamo per *trasformare* questo magazzino in un ristorante.
  Wir werden gerade diesen Lagerraum in ein Restaurant *umwandeln*.
  
  Se non *trasformi* il tuo atteggiamento, nessuno ti aiuterà.
  Wenn du deine Einstellung nicht *änderst*, wird dir niemand helfen.
