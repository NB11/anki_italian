Rang: 812
Wort: trasformare
Wortart: vt
Wort mit Artikel: trasformare
Femininum / Plural: ''
IPA: ''
Definition: verwandeln, umformen
Register: ''
Beispielsätze: |-
  Il *trasformista* riesce a trasformare la sua voce in pochi secondi.
  Der *Mime* kann seine Stimme in wenigen Sekunden verwandeln.
  
  Stanotte ho visto un sogno che sembrava *trasformarsi* in realtà.
  In dieser Nacht habe ich einen Traum gesehen, der sich wie *verwandelt* in Wirklichkeit.
  
  Il governo vuole *trasformare* l’industria per ridurre le emissioni di CO₂.
  Die Regierung will die Industrie *umformen*, um die CO₂-Emissionen zu reduzieren.
  
  Mentre passeggiavo lungo il mare, ho avuto l’idea di *trasformare* il mio romanzo in un film.
  Während ich am Meer entlangspazierte, kam mir die Idee, meinen Roman in einen Film *umzuformen*.
  
  Se tu *trasformassi* la tua rabbia in energia positiva, potresti ottenere molto di più.
  Wenn du deine Wut in positive Energie *umformst*, könntest du viel mehr erreichen.
