Rang: 1439
Wort: recente
Wortart: adj
Wort mit Artikel: recente
Femininum / Plural: ''
IPA: ''
Definition: kürzlich, neu, aktuell, frisch
Register: ''
Beispielsätze: |-
  Questo è un film *recente* che ha vinto molti premi l'anno scorso.
  Das ist ein *kürzlicher* Film, der viele Preise letztes Jahr gewonnen hat.
  
  Ho ricevuto un sms *recente* da Marco, che mi invita a cena domani.
  Ich habe eine *neue* SMS von Marco erhalten, der mich morgen zum Essen einlädt.
  
  Nonostante il *recente* cambiamento di direzione, l'azienda continua a crescere.
  Trotz der *kürzlichen* Richtungsänderung wächst das Unternehmen weiter.
  
  La notizia del suo *recente* fidanzamento ha sorpreso tutti noi.
  Die Nachricht von ihrer *frischen* Verlobung hat uns alle überrascht.
  
  Se avessi saputo dei suoi *recenti* problemi, non gli avrei proposto questo incarico.
  Wenn ich von seinen *aktuellen* Problemen gewusst hätte, hätte ich ihm diese Aufgabe nicht vorgeschlagen.
