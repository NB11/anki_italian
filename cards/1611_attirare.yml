Rang: 1611
Wort: attirare
Wortart: vt
Wort mit Artikel: attirare
Femininum / Plural: ''
IPA: ''
Definition: anziehen, anlocken, anziehen, erregen
Register: ''
Beispielsätze: |-
  Questo film *attira* l’attenzione di molti fan che amano le storie affascinanti.
  Dieser Film zieht die Aufmerksamkeit vieler *Fans* an, die faszinierende Geschichten lieben.
  
  Se non *attiri* l’attenzione del pubblico, la tua presentazione non sarà efficace.
  Wenn du die Aufmerksamkeit des Publikums nicht *anlockst*, wird deine Präsentation nicht effektiv sein.
  
  Il profumo di quella pizza *attira* tutti in cucina, anche quelli che non avevano fame.
  Der Geruch dieser Pizza lockt alle in die Küche, sogar diejenigen, die keinen Hunger hatten.
  
  La polizia ha avvisato che chiunque *attiri* l’attenzione su un furto verrà condannato.
  Die Polizei hat gewarnt, dass jeder, der die Aufmerksamkeit auf einen Diebstahl lenkt, verurteilt wird.
  
  Volevo *attirare* lo sguardo di Maria, ma lei guardava altrove senza neppure notare la mia presenza.
  Ich wollte Maries Blick auf mich lenken, aber sie schaute woanders hin und bemerkte mich *nicht einmal*.
