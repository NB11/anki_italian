Beispielsätze: |-
  Ho appeso *poster* colorati nella mia stanza per renderla più allegra.
  Ich habe *Poster* in meinem Zimmer aufgehängt, um es fröhlicher zu machen.
  
  Se vuoi vedere il nuovo *poster* del concerto, devi andare al negozio di dischi.
  Wenn du das neue Konzert-*Poster* sehen möchtest, musst du zum Plattenladen gehen.
  
  Hanno trovato un *poster* antico nel solaio della casa di campagna.
  Sie haben ein altes *Plakat* auf dem Dachboden des Landhauses gefunden.
  
  Non mettere troppi *poster* sulla parete, altrimenti sembra disordinato.
  Klebe nicht zu viele *Poster* an die Wand, sonst wirkt es unordentlich.
  
  Il *poster* pubblicitario era così grande che copriva quasi tutta la facciata del palazzo.
  Das Werbe-*Plakat* war so groß, dass es fast die ganze Fassade des Gebäudes bedeckte.
