Rang: 4720
Wort: scaffale
Wortart: n.m
Wort mit Artikel: lo scaffale
Femininum / Plural: gli scaffali
IPA: ''
Definition: das Regal, -e
Register: ''
Beispielsätze: |-
  Ho comprato un nuovo *scaffale* per la cucina perché quello vecchio era troppo piccolo.
  Ich habe ein neues *Regal* für die Küche gekauft, weil das alte zu klein war.
  
  Sullo *scaffale* in alto ci sono i libri che non usiamo spesso.
  Auf dem *Regal* oben stehen die Bücher, die wir nicht oft benutzen.
  
  Dovresti organizzare lo *scaffale* prima che arrivino gli ospiti.
  Du solltest das *Regal* aufräumen, bevor die Gäste kommen.
  
  Non trovo il mio dizionario: sarà finito su uno degli *scaffali* in soggiorno?
  Ich finde mein Wörterbuch nicht: wird es auf einem der *Regale* im Wohnzimmer liegen?
  
  Ha sistemato tutti i documenti importanti nello *scaffale* blindato dell'ufficio.
  Er hat alle wichtigen Unterlagen im gesicherten *Regal* des Büros geordnet.
