Rang: 1764
Wort: elettrico
Wortart: adj
Wort mit Artikel: elettrico
Femininum / Plural: ''
IPA: ''
Definition: elektrisch
Register: ''
Beispielsätze: |-
  Ho acquistato una macchina *elettrica* per ridurre le emissioni.
  Ich habe ein *elektrisches* Auto gekauft, um die Emissionen zu reduzieren.
  
  Il treno *elettrico* è più veloce di quello diesel.
  Der *elektrische* Zug ist schneller als der Diesellok.
  
  Vorrei una chitarra *elettrica*, ma non so suonarla ancora.
  Ich hätte gern eine *elektrische* Gitarre, aber ich kann sie noch nicht spielen.
  
  Il governo promuove l’uso di veicoli *elettrici* per combattere l’inquinamento.
  Die Regierung fördert die Nutzung *elektrischer* Fahrzeuge, um die Umweltverschmutzung zu bekämpfen.
  
  Si dice che le batterie *elettriche* durino più di quelle a benzina.
  Man sagt, dass *elektrische* Batterien länger halten als die mit Benzin.
