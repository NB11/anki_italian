Rang: 3786
Wort: astuto
Wortart: adj
Wort mit Artikel: astuto
Femininum / Plural: ''
IPA: ''
Definition: schlau, listig, durchtrieben
Register: ''
Beispielsätze: |-
  Il detective era *astuto* abbastanza da scoprire la verità senza lasciar tracce.
  Der Detektiv war *schlau* genug, um die Wahrheit zu entdecken, ohne Spuren zu hinterlassen.
  
  Non credere a tutto quello che ti dice: è un tipo *astuto* e sa come manipolare gli altri.
  Glaube nicht alles, was er dir sagt: Er ist ein *schlauer* Typ und weiß, wie man andere manipuliert.
  
  Se *astuto* fosse un difetto, allora i politici sarebbero tutti dei geni.
  Wenn *schlau* ein Fehler wäre, dann wären Politiker alle Genies.
  
  Avrei voluto essere più *astuto* quando ho accettato quel contratto così svantaggioso.
  Ich hätte *schlauer* sein sollen, als ich diesen so nachteiligen Vertrag annahm.
  
  Secondo il filosofo, l’essere umano è *astuto* per natura, poiché cerca sempre il proprio vantaggio.
  Laut dem Philosophen ist der Mensch von Natur aus *schlau*, weil er ständig seinen eigenen Vorteil sucht.
