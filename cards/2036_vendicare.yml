Rang: 2036
Wort: vendicare
Wortart: v
Wort mit Artikel: vendicare
Femininum / Plural: ''
IPA: ''
Definition: rächen
Register: ''
Beispielsätze: |-
  Il leone *vendicò* il suo territorio dopo che un altro maschio lo aveva invaso.
  Der Löwe *rächte* sein Revier, nachdem ein anderer Löwe es überfallen hatte.
  
  Molti credono che *vendicare* l’onore sia un dovere sacro.
  Viele glauben, dass es eine heilige Pflicht ist, *die Ehre* zu rächen.
  
  Se non *vendichiamo* l’affronto, perderemo il rispetto del capo della squadra.
  Wenn wir die Beleidigung nicht *rächen*, verlieren wir den Respekt des Anführers der Mannschaft.
  
  L’istinto di *vendicare* il fratello ferito guidava ogni sua azione.
  Der Instinkt, den verletzten Bruder zu *rächen*, bestimmte jede seiner Handlungen.
  
  Non mi importa di *vendicare* l’umiliazione: preferisco dimenticare.
  Mir ist es egal, die Demütigung zu *rächen* – ich ziehe es vor, sie zu vergessen.
