Rang: 1114
Wort: taxi
Wortart: n.m
Wort mit Artikel: il taxi
Femininum / Plural: taxi
IPA: ''
Definition: das Taxi, -s
Register: ''
Beispielsätze: |-
  Ho chiamato *il taxi* perché non ho voglia di prendere l'autobus stasera.
  Ich habe *das Taxi* gerufen, weil ich heute Abend keine Lust auf den Bus habe.
  
  Dove hai lasciato le chiavi *del taxi*, scusa?
  Wo hast du *des Taxis* Schlüssel hingelegt, entschuldige?
  
  Se non trovi parcheggio, prendi pure *il taxi* per tornare a casa.
  Wenn du keinen Parkplatz findest, nimm einfach *das Taxi*, um nach Hause zu kommen.
  
  Non appena arriviamo alla stazione, prenoteremo *un taxi* per l'aeroporto.
  Sobald wir am Bahnhof ankommen, werden wir *ein Taxi* zum Flughafen bestellen.
  
  Mio fratello lavora come autista di *taxi* da tre anni e guadagna abbastanza bene.
  Mein Bruder arbeitet seit drei Jahren als *Taxi*-Fahrer und verdient gut genug.
