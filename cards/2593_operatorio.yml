Rang: 2593
Wort: operatorio
Wortart: adj
Wort mit Artikel: operatorio
Femininum / Plural: ''
IPA: ''
Definition: chirurgisch, operativ
Register: ''
Beispielsätze: |-
  Il medico ha consigliato un intervento *operatorio* immediato per risolvere il problema.
  Der Arzt hat einen sofortigen *chirurgischen* Eingriff empfohlen, um das Problem zu lösen.
  
  Dopo l’operazione, ha avuto bisogno di cure *operatorie* per una settimana intera.
  Nach der Operation benötigte er eine Woche lang *operative* Nachsorge.
  
  La sala *operatoria* era pronta e gli strumenti sterilizzati.
  Der *Operationssaal* war vorbereitet und die Instrumente sterilisiert.
  
  Se il caso non fosse così grave, non ci sarebbero alternative *operatorie*.
  Wenn der Fall nicht so schwerwiegend wäre, gäbe es keine *operativen* Alternativen.
  
  Hanno scelto la terapia meno invasiva possibile, evitando così l’intervento *operatorio*.
  Sie wählten die am wenigsten invasive Therapie, um so den *chirurgischen* Eingriff zu vermeiden.
