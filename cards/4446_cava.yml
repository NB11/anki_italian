Rang: 4446
Wort: cava
Wortart: n.m
Wort mit Artikel: il cava
Femininum / Plural: cave
IPA: ''
Definition: der Steinbruch, -e
Register: ''
Beispielsätze: |-
  Mio zio lavora in una *cava* vicino a Carrara dove si estrae il marmo.
  Mein Onkel arbeitet in einem *Steinbruch* nahe Carrara, wo Marmor abgebaut wird.
  
  Le *cave* di questa zona sono famose per la loro pietra calcarea.
  Die *Steinbrüche* dieser Gegend sind berühmt für ihren Kalkstein.
  
  Prima di iniziare i lavori di costruzione, hanno dovuto verificare se ci fossero *cave* abbandonate sottoterra.
  Bevor sie mit den Bauarbeiten begannen, mussten sie prüfen, ob es verlassene *Steinbrüche* unter der Erde gab.
  
  La polizia ha bloccato l’accesso alla *cava* dove erano stati trovati reperti archeologici.
  Die Polizei hat den Zugang zu dem *Steinbruch* blockiert, in dem archäologische Funde entdeckt worden waren.
  
  Se avessi saputo che lì sotto c’era una *cava* infestata dai topi, non ci avrei mai fatto il pic-nic.
  Wenn ich gewusst hätte, dass es dort unten einen von Ratten verseuchten *Steinbruch* gibt, hätte ich dort nie ein Picknick gemacht.
