Rang: 1460
Wort: largo
Wortart: adj
Wort mit Artikel: largo
Femininum / Plural: ''
IPA: ''
Definition: weit, breit, groß
Register: ''
Beispielsätze: |-
  La *larga* strada permette il passaggio di due macchine assieme.
  Die *weite* Straße ermöglicht die Durchfahrt von zwei Autos zusammen.
  
  Ho comprato una camicia *larga* perché la mia preferita era in lavanderia.
  Ich habe ein *weites* Hemd gekauft, weil mein Lieblingshemd in der Wäsche war.
  
  Se il vestito ti sta *largo*, dovresti andare a un sarto per farlo adattare.
  Wenn das Kleid dir zu *weit* ist, solltest du zum Schneider gehen, damit er es anpasst.
  
  Il corridoio dell’aeroporto era così *largo* che potevano passarci due jet diretti a destinazioni diverse.
  Der Flughafenkorridor war so *breit*, dass zwei Flugzeuge gerade zu verschiedenen Zielen passieren konnten.
  
  Nonostante la critiche, l’artista rimase *largo* nei suoi giudizi e continuò a proporre nuove idee sociali.
  Trotz der Kritik blieb der Künstler in seinen Urteilen *großzügig* und schlug weiter neue gesellschaftliche Ideen vor.
