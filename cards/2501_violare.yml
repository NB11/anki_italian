Rang: 2501
Wort: violare
Wortart: vt
Wort mit Artikel: violare
Femininum / Plural: ''
IPA: ''
Definition: verletzen, brechen, vergewaltigen
Register: ''
Beispielsätze: |-
  È *violato* il protocollo durante l'incontro, quindi la riunione viene annullata.
  Es wird das *Protokoll* verletzt, deshalb wird die Besprechung abgesagt.
  
  Se avessi *violato* la legge, ora saresti in prigione.
  Hättest du das Gesetz *verletzt*, wärst du jetzt im Gefängnis.
  
  Non credere che sia facile *violare* un impegno preso con tanta serietà.
  Glaube nicht, dass es leicht ist, eine mit so viel Ernst *übernommene* Verpflichtung zu brechen.
  
  Dicono che abbia *violato* i diritti di molte persone senza rendersene conto.
  Manche sagen, er habe die Rechte vieler Menschen *verletzt*, ohne es zu merken.
  
  Quando sentì di essere stato *violato*, decise di querelare l'azienda.
  Als er spürte, dass er *getäuscht* worden war, beschloss er, das Unternehmen zu verklagen.
