Rang: 1499
Wort: strega
Wortart: n.f
Wort mit Artikel: la strega
Femininum / Plural: streghe
IPA: ''
Definition: die Hexe, -n
Register: ''
Beispielsätze: |-
  La *strega* ha preparato una pozione deliziosa con erbe del parco.
  Die *Hexe* hat einen köstlichen Trank mit Kräutern aus dem Park zubereitet.
  
  Ho visto una *strega* che si aggirava vicino al filo della ferrovia.
  Ich habe eine *Hexe* gesehen, die sich in der Nähe der Eisenbahnschiene bewegte.
  
  Se fossi un bambino, non crederesti alle storie sulle *streghe* che incendiano le case.
  Wenn ich ein Kind wäre, würde ich nicht an die Geschichten über *Hexen* glauben, die Häuser in Brand setzen.
  
  La *strega* ha sollevato il bimbo con un solo braccio, sorprendendo tutti gli spettatori.
  Die *Hexe* hat den Jungen mit einem einzigen Arm hochgehoben und alle Zuschauer verblüfft.
  
  Dicono che la *strega* viva in una casa comoda vicino al fiume, ma nessuno l'ha mai vista davvero.
  Man sagt, die *Hexe* lebe in einem bequemen Haus am Fluss, doch gesehen hat sie noch nie jemand wirklich.
