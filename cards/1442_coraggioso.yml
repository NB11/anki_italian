Rang: 1442
Wort: coraggioso
Wortart: adj
Wort mit Artikel: coraggioso
Femininum / Plural: ''
IPA: ''
Definition: mutig, tapfer, beherzt
Register: ''
Beispielsätze: |-
  Nonostante il dolore al *coraggioso*, ha continuato a correre fino al traguardo.
  Trotz der *Schmerzen* im Knie ist er bis zum Ziel gelaufen.
  
  È *coraggioso* chi affronta le difficoltà senza lamentarsi.
  Mutig ist, wer Schwierigkeiten ohne *Klagen* bewältigt.
  
  Se fossi stato *coraggioso*, avresti detto tutto al sindaco!
  Wärst du mutig gewesen, hättest du es dem *Bürgermeister* gesagt!
  
  Il *coraggioso* giocatore ha rifiutato di stuprare la palla nonostante la sconfitta.
  Der *tapfere* Spieler weigerte sich, den Ball zu schänden, obwohl sie verloren hatten.
  
  Credo che sia stato *coraggioso* a interrogare le autorità recentemente sulla pratica della pillola.
  Ich glaube, es war mutig, die Behörden *kürzlich* zur Praxis der Pille zu verhören.
