Rang: 1175
Wort: estate
Wortart: n.m
Wort mit Artikel: l'estate
Femininum / Plural: gli estati
IPA: ''
Definition: der Sommer
Register: ''
Beispielsätze: |-
  Quest'*estate* vogliamo viaggiare in Europa con la nostra nipote.
  Diesen *Sommer* wollen wir mit unserer Nichte nach Europa reisen.
  
  Se avessimo più *estati* da vivere, impareremmo molte lingue antiche.
  Wenn wir mehr *Sommer* zu leben hätten, würden wir viele alte Sprachen lernen.
  
  Nonostante il caldo, abbiamo trascorso l'*estate* al lago, praticando quasi ogni giorno.
  Trotz der Hitze verbrachten wir den *Sommer* am See, fast jeden Tag.
  
  Dicono che quest'*estate* sarà ancora più calda della precedente, chissà se sarà vero!
  Man sagt, dieser *Sommer* werde noch heißer als der vorherige – wer weiß, ob das stimmt!
  
  L'*estate* scorsa abbiamo sostenuto un piccolo progetto per il popolo locale vicino al cerchio dei lupi.
  Im vergangenen *Sommer* haben wir ein kleines Projekt für das lokale Volk in der Nähe des Wolfskreises unterstützt.
