Rang: 3164
Wort: riattaccare
Wortart: v
Wort mit Artikel: riattaccare
Femininum / Plural: ''
IPA: ''
Definition: wieder *anhängen*, wieder *auflegen*
Register: ''
Beispielsätze: |-
  Dopo aver parlato con sua madre, Marco ha *riattaccato* il telefono con un sospiro di sollievo.
  Nach dem Gespräch mit seiner Mutter hat Marco den Hörer mit *Erleichterung* wieder aufgelegt.
  
  Se non *riattacchi* la cornetta, la chiamata non sarà completata correttamente.
  Wenn du den Hörer nicht wieder *auflegst*, wird das Gespräch nicht richtig abgeschlossen.
  
  La polizia aveva *riattaccato* il telefono sotto intercettazione per giorni senza risultati.
  Die Polizei hatte den Hörer tagelang unter *Abhören* wieder neu verbunden, ohne Ergebnisse.
  
  Non appena avrò finito di parlare, *riattaccherò* la cornetta delicatamente per non disturbare gli altri.
  Sobald ich fertig gesprochen habe, werde ich den Hörer *wieder auflegen* vorsichtig, um die anderen nicht zu stören.
  
  Ogni volta che lo chiamavo, dopo cinque minuti *riattaccava* senza salutare, come se fosse scortese e non volesse parlare con me.
  Jedes Mal, wenn ich ihn anrief, legte er nach fünf Minuten *wieder auf*, ohne zu grüßen, als wäre er unhöflich und wollte nicht mit mir sprechen.
Audio: ''
Notiz: ''
Dispersion: ''
