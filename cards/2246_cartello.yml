Rang: 2246
Wort: cartello
Wortart: n.m
Wort mit Artikel: il cartello
Femininum / Plural: cartelli
IPA: ''
Definition: das Schild, -er
Register: ''
Beispielsätze: |-
  Attenzione, c'è un *cartello* che vieta di fumare nel corridoio.
  Achtung, es gibt ein *Schild*, das das Rauchen im Flur verbietet.
  
  Non capisco questo *cartello* stradale, possiamo tradurre la scritta per favore?
  Ich verstehe dieses Straßenschild nicht, können wir die Aufschrift bitte übersetzen?
  
  Il *cartello* sulla parete indicava l'uscita di emergenza in caso di incendio.
  Das Schild an der Wand zeigte den Notausgang im Brandfall an.
  
  Se avessi visto il *cartello* con la scritta 'vietato l'accesso', non sarei entrato.
  Wenn ich das Schild mit der Aufschrift 'Zutritt verboten' gesehen hätte, wäre ich nicht eingetreten.
  
  Hanno appeso un *cartello* gigante all'ingresso del parco per annunciare la chiusura temporanea.
  Sie haben ein riesiges Schild am Eingang des Parks aufgehängt, um die vorübergehende Schließung bekannt zu geben.
