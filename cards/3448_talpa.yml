Wort mit Artikel: la talpa
Femininum / Plural: talpe
IPA: ''
Definition: der Maulwurf, -¨e
Register: ''
Beispielsätze: |-
  Ho visto una *talpa* nel giardino mentre lavoravo la terra ieri mattina.
  Ich habe einen *Maulwurf* im Garten gesehen, während ich gestern Morgen den Boden bearbeitete.
  
  Nonostante la *talpa* abbia rovinato le mie piante, continuo a nutrire rispetto per questo animale.
  Obwohl der *Maulwurf* meine Pflanzen zerstört hat, empfinde ich weiterhin Respekt für dieses Tier.
  
  Se avessi saputo prima che la *talpa* si nascondeva qui, avrei chiamato un esperto di fauna selvatica.
  Hätte ich vorher gewusst, dass sich der *Maulwurf* hier versteckt, hätte ich einen Wildtierexperten gerufen.
  
  La *talpa* scava tunnel così profondi che è difficile accorgersi della sua presenza.
  Der *Maulwurf* gräbt so tiefe Tunnel, dass es schwer ist, seine Anwesenheit zu bemerken.
  
  Chiunque avesse incontrato quella *talpa* mentre scavava con tale forza?
  Wer hätte *Maulwurf* bei so kräftigem Graben antreffen können?
