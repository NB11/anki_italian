Rang: 568
Wort: costruire
Wortart: v
Wort mit Artikel: costruire
Femininum / Plural: ''
IPA: ''
Definition: bauen, errichten
Register: ''
Beispielsätze: |-
  L’architetto sta *costruendo* un palazzo moderno nel centro della città.
  Der Architekt *baut* gerade ein modernes Gebäude im Stadtzentrum.
  
  Se non avessi avuto fretta, avrei *costruito* una casa più grande.
  Wenn ich nicht in *Eile* gewesen wäre, hätte ich ein größeres Haus gebaut.
  
  Credi che *costruiranno* un ponte qui entro l’anno prossimo?
  Glaubst du, dass sie hier bis nächstes Jahr eine Brücke *bauen* werden?
  
  Mio nonno ha *costruito* questa tavola con le sue mani, era un falegname bravissimo.
  Mein Großvater hat diesen Tisch mit seinen eigenen Händen *gebaut*, er war ein ausgezeichneter Tischler.
  
  Dicono che *costruire* una relazione richiede tempo e pazienza.
  Man sagt, dass das *Bauen* einer Beziehung Zeit und Geduld erfordert.
