Rang: 1559
Wort: indicare
Wortart: v
Wort mit Artikel: indicare
Femininum / Plural: ''
IPA: ''
Definition: anzeigen, zeigen, nennen
Register: ''
Beispielsätze: |-
  Il giornalista deve *indicare* le sue fonti per evitare problemi legali.
  Der *Journalist* muss seine Quellen angeben, um rechtliche Probleme zu vermeiden.
  
  Se *indichi* il colpevole al ministro, potremmo risolvere il caso rapidamente.
  Wenn du den Schuldigen dem *Minister* nennst, könnten wir den Fall schnell lösen.
  
  La dichiarazione dell’esperto *indicherà* con precisione la causa del problema.
  Die *Erklärung* des Experten wird das Problem genau anzeigen.
  
  Vi prego di *indicare* sul modulo se avete già pagato la tassa.
  Bitte *geben* Sie auf dem Formular an, ob Sie die Gebühr bereits bezahlt haben.
  
  Il topo *indicherà* al sbirro la denuncia che ha trovato nella stanza.
  Die *Maus* wird dem Bullen den Bericht, den sie im Zimmer gefunden hat, zeigen.
Audio: ''
Notiz: ''
