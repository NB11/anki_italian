Rang: 3522
Wort: giustiziare
Wortart: v
Wort mit Artikel: giustiziare
Femininum / Plural: ''
IPA: ''
Definition: hinrichten, exekutieren
Register: ''
Beispielsätze: |-
  Il tribunale decise di *giustiziare* il criminale all'alba del giorno seguente.
  Das Gericht beschloss, den Verbrecher am folgenden Morgen zu *hinrichten*.
  
  Se avessi il potere, non *giustizierei* nessuno senza un processo equo.
  Wenn ich die Macht hätte, würde ich niemanden ohne ein faires Verfahren *hinrichten*.
  
  Il re ordinò di *giustiziare* il prigioniero per tradimento.
  Der König befahl, den Gefangenen wegen Hochverrats zu *exekutieren*.
  
  I soldati temevano che i nemici li avrebbero *giustiziati* se fossero stati catturati.
  Die Soldaten fürchteten, die Feinde würden sie *hinrichten*, falls sie gefangen genommen würden.
  
  Dopo la guerra, molti volevano *giustiziare* i collaborazionisti senza processo.
  Nach dem Krieg wollten viele die Kollaborateure ohne Prozess *hinrichten*.
