Rang: 4388
Wort: volantino
Wortart: n.m
Wort mit Artikel: il volantino
Femininum / Plural: volantini
IPA: ''
Definition: der Flyer, -
Register: ''
Beispielsätze: |-
  Ho ricevuto *volantino* per una nuova mostra d'arte alla galleria del centro.
  Ich habe *Flyer* für eine neue Kunstausstellung in der Galerie im Zentrum erhalten.
  
  Nel *volantino* c'era scritto che lo sconto era valido solo per i servizi prenotati entro giovedì.
  Auf dem *Flyer* stand, dass der Rabatt nur für Dienstleistungen galt, die bis Donnerstag gebucht wurden.
  
  Mia sorella distribuisce *volantini* per il negozio di suo marito ogni sabato mattina.
  Meine Schwester verteilt jeden Samstagmorgen *Flyer* für den Laden ihres Mannes.
  
  Se avessi visto *volantino* con l'indirizzo sbagliato, avresti potuto chiamare il numero riportato.
  Hättest du den *Flyer* mit der falschen Adresse gesehen, hättest du die angegebene Nummer anrufen können.
  
  Nonostante avesse *volantino* in tasca, non riuscì a ricordare dove avesse incontrato quella pubblicità così aggressiva.
  Obwohl er den *Flyer* in der Tasche hatte, konnte er sich nicht daran erinnern, wo er diese so aufdringliche Werbung gesehen hatte.
