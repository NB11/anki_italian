Rang: 1223
Wort: richiesta
Wortart: n.f
Wort mit Artikel: la richiesta
Femininum / Plural: richieste
IPA: ''
Definition: die Bitte, der Antrag, die Anfrage
Register: ''
Beispielsätze: |-
  Ha fatto una *richiesta* di informazioni al receptionist.
  Er hat eine *Bitte* um Informationen an den Rezeptionisten gestellt.
  
  Non capisco perché hai respinto la mia *richiesta* di aiuto.
  Ich verstehe nicht, warum du meine *Bitte* um Hilfe abgelehnt hast.
  
  Le *richieste* dei clienti sono sempre state soddisfatte in questa azienda.
  Die *Anfragen* der Kunden wurden in diesem Unternehmen immer erfüllt.
  
  Se avessi saputo le tue *richieste* prima, avrei organizzato tutto diversamente.
  Hätte ich deine *Wünsche* früher gekannt, hätte ich alles anders organisiert.
  
  Senza una *richiesta* formale non possiamo procedere con l'iscrizione.
  Ohne eine formelle *Anfrage* können wir die Anmeldung nicht vornehmen.
