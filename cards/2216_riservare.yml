Rang: 2216
Wort: riservare
Wortart: vt
Wort mit Artikel: riservare
Femininum / Plural: ''
IPA: ''
Definition: reservieren, zurücklegen, vorbehalten
Register: ''
Beispielsätze: |-
  Vorrei *riservare* un tavolo per quattro persone per stasera alle otto.
  Ich möchte heute Abend um acht Uhr einen Tisch für vier Personen *reservieren*.
  
  L’albergo *ha riservato* una stanza con vista sul mare solo ai clienti più affezionati.
  Das Hotel hat ein Zimmer mit Meerblick nur den *treuesten* Gästen vorbehalten.
  
  Non *riserverei* tutte le energie per domani, perché potrebbe presentarsi un problema urgente.
  Ich würde nicht alle Kräfte für morgen *zurücklegen*, denn es könnte ein dringendes Problem auftreten.
  
  Mi sembra che tu *stia riservando* un’accoglienza troppo fredda a questo progetto, dato che ha un significato eccezionale per l’umanità intera.
  Es scheint mir, dass du diesem Projekt eine zu kühle Aufnahme *bereitest*, obwohl es für die gesamte Menschheit eine außergewöhnliche Bedeutung hat.
  
  La polizia *ha riservato* una parte del deposito per sequestrare eventuali oggetti che potrebbero costituire un reato.
  Die Polizei hat einen Teil des Lagers *zurückgelegt*, um mögliche Gegenstände zu beschlagnahmen, die ein Verbrechen darstellen könnten.
