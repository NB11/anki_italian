Rang: 3546
Wort: atleta
Wortart: n.m/f
Wort mit Artikel: l'atleta
Femininum / Plural: "*atleti*"
IPA: ''
Definition: der Athlet, -en, die *Atleta*, -e
Register: ''
Beispielsätze: |-
  L'*atleta* ha vinto la medaglia d'oro dopo anni di duro allenamento.
  Der *Athlet* hat die Goldmedaille nach Jahren harter Ausbildung gewonnen.
  
  Se fossi un'*atleta* professionista, parteciperesti alle Olimpiadi ogni quattro anni?
  Wärst du ein*e professionell*e Athletin, würdest du alle vier Jahre an den Olympischen Spielen teilnehmen?
  
  L'*atleta* di cui parlavi ieri ha ottenuto un record mondiale.
  Die*der *Athlet*in, über die du gestern gesprochen hast, hat einen Weltrekord aufgestellt.
  
  Nonostante la pioggia, l'*atleta* ha completato la sua performance in modo impeccabile.
  Trotz des Regens hat der *Athlet* seine Performance makellos absolviert.
  
  Gli *atleti* che si allenano al mattino spesso ottengono risultati migliori.
  *Athleten*, die morgens trainieren, erreichen oft bessere Ergebnisse.
