Rang: 1330
Wort: atto
Wortart: n.m
Wort mit Artikel: l'atto
Femininum / Plural: atti
IPA: ''
Definition: die Handlung, -en, der Akt, -e
Register: ''
Beispielsätze: |-
  L'*atto* di generosità del medico ha salvato molte vite in quel quartiere povero.
  Die *Handlung* des Arztes hat in diesem armen Viertel viele Leben gerettet.
  
  Ti assicuro che il nostro *atto* di coraggio non passerà inosservato tra i colleghi.
  Ich versichere dir, dass unsere *Handlung* der Tapferkeit unter den Kollegen nicht unbemerkt bleibt.
  
  La polizia sta cercando di rintracciare l'*atto* vandalico che ha danneggiato la fontana al centro del paese.
  Die Polizei versucht, die *Akte* der Vandalismus zu ermitteln, die den Brunnen im Zentrum des Dorfes beschädigt hat.
  
  Senza un *atto* concreto, le nostre parole contro la guerra rimangono solo opinioni vuote.
  Ohne eine *konkrete Tat* bleiben unsere Worte gegen den Krieg nur leere Meinungen.
  
  Ho preparato tutti i documenti necessari per l'*atto* di vendita della casa, ma devo ancora firmarli.
  Ich habe alle notwendigen Unterlagen für den *Akt* des Hausverkaufs vorbereitet, aber ich muss sie noch unterschreiben.
