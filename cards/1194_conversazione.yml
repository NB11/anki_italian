Rang: 1194
Wort: conversazione
Wortart: n.f
Wort mit Artikel: la conversazione
Femininum / Plural: conversazioni
IPA: ''
Definition: das Gespräch, -e, die Unterhaltung, -en
Register: ''
Beispielsätze: |-
  Durante la *conversazione* al telefono con mia sorella, abbiamo parlato della nostra attività estiva.
  Während des *Gesprächs* mit meiner Schwester am Telefon haben wir über unsere Sommeraktivität gesprochen.
  
  Chissà se la *conversazione* di stasera con il pilota sarà interessante quanto quella di ieri.
  Wer *weiß*, ob das Gespräch heute Abend mit dem Piloten so interessant sein wird wie das von gestern.
  
  La *conversazione* che ho avuto con il mio ospite straniero mi ha fatto riflettere sulla giustizia sociale in diversi paesi.
  Die *Unterhaltung*, die ich mit meinem ausländischen Gast geführt habe, hat mich zum Nachdenken über soziale Gerechtigkeit in verschiedenen Ländern gebracht.
  
  Nonostante la *conversazione* fosse animata, non siamo riusciti a sostenere la nostra opinione fino alla fine.
  Obwohl die *Unterhaltung* lebhaft war, konnten wir unsere Meinung bis zum Ende nicht tragen.
  
  Se avessi più tempo, vorrei ricominciare una *conversazione* su temi che mi appassionano davvero.
  Wenn ich mehr Zeit hätte, würde ich gerne ein *Gespräch* über Themen beginnen, die mich wirklich begeistern.
