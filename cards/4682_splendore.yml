Rang: 4682
Wort: splendore
Wortart: n.m
Wort mit Artikel: il splendore
Femininum / Plural: i splendori
IPA: ''
Definition: der Glanz, die Pracht
Register: ''
Beispielsätze: |-
  Il *splendore* del sole al tramonto era indescrivibile.
  Der *Glanz* der untergehenden Sonne war unbeschreiblich.
  
  Nonostante la pioggia, il *splendore* dei colori autunnali rimaneva intenso.
  Trotz des Regens blieb der *Glanz* der Herbstfarben intensiv.
  
  Gli studiosi hanno ammirato il *splendore* di questa cattedrale medievale.
  Die Wissenschaftler bewunderten den *Glanz* dieser mittelalterlichen Kathedrale.
  
  Se avessi più tempo, vorrei godermi il *splendore* di questi paesaggi.
  Wenn ich mehr Zeit hätte, würde ich den *Glanz* dieser Landschaften genießen.
  
  È raro vedere tanta bellezza e *splendore* in un solo luogo.
  Es ist selten, so viel Schönheit und *Glanz* an einem Ort zu sehen.
