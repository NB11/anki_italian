Rang: 3914
Wort: tana
Wortart: n.f
Wort mit Artikel: la tana
Femininum / Plural: le tane
IPA: ''
Definition: der Bau, Höhle; der Unterschlupf, -e
Register: ''
Beispielsätze: |-
  Il coniglio è tornato nella *tana* dopo aver mangiato l'erba fresca.
  Der Hase ist in den *Bau* zurückgekehrt, nachdem er das frische Gras gefressen hat.
  
  Hanno trovato una *tana* nascosta nel bosco, piena di foglie secche.
  Sie haben ein verstecktes *Versteck* im Wald gefunden, voller trockener Blätter.
  
  Se vedo un piccione vicino alla *tana*, lo scaccio immediatamente.
  Wenn ich eine Taube in der Nähe des *Unterschlupfs* sehe, verjage ich sie sofort.
  
  La *tana* del riccio era così piccola che quasi non ci entravo.
  Der Igelbau war so klein, dass ich kaum hineingepasst habe.
  
  Dopo anni di ricerca, finalmente abbiamo scoperto la *tana* segreta della volpe.
  Nach Jahren der Suche haben wir endlich das geheime *Versteck* des Fuchses entdeckt.
