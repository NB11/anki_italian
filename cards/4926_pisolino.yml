Rang: 4926
Wort: pisolino
Wortart: n.m
Wort mit Artikel: il pisolino
Femininum / Plural: pisolini
IPA: ''
Definition: das Nickerchen, -
Register: ''
Beispielsätze: |-
  Dopo pranzo mi piace fare un *pisolino* di venti minuti.
  Nach dem Mittagessen mag ich ein *20-minütiges Nickerchen* machen.
  
  Il *pisolino* pomeridiano aiuta a ricaricare le energie, non trovi?
  Das *Nachmittagsnickerchen* hilft, die Energien wieder aufzuladen, nicht wahr?
  
  Se non hai dormito bene, un breve *pisolino* può essere molto sensato.
  Wenn du nicht gut geschlafen hast, kann ein kurzes *Nickerchen* sehr vernünftig sein.
  
  Ha fatto un *pisolino* così profondo che non l’ho sentito suonare il telefono.
  Er hat ein so tiefes *Nickerchen* gemacht, dass ich ihn nicht habe telefonieren hören.
  
  Quando ero piccolo, mia nonna mi metteva nella culla e poi mi lasciava fare un *pisolino* pomeridiano.
  Als ich klein war, legte mich meine Oma in die *Wiege* und ließ mich dann ein Nickerchen am Nachmittag machen.
