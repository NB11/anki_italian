Rang: 4330
Wort: pacifico
Wortart: adj
Wort mit Artikel: pacifico
Femininum / Plural: ''
IPA: ''
Definition: friedlich, friedfertig
Register: ''
Beispielsätze: |-
  Questa zona rurale è davvero *pacifica*: non si sente mai un rumore forte.
  Diese ländliche Gegend ist wirklich *friedlich*: Man hört nie ein lautes Geräusch.
  
  Se fossi *pacifico*, non avresti litigato con nessuno in seminario.
  Wenn du *friedlich* wärst, hättest du mit niemandem im Seminar gestritten.
  
  Nonostante il caos intorno, lui rimase *pacifico* e continuò a leggere la letteratura.
  Trotz des Chaos um ihn herum blieb er *friedlich* und las weiter die Literatur.
  
  Vorresti un mondo *pacifico* oppure preferisci quello attuale?
  Möchtest du eine *friedliche* Welt oder ziehst du die aktuelle vor?
  
  Anche se la situazione era tesa, riuscì a mantenersi *pacifico* durante l'intera sessione.
  Obwohl die Situation angespannt war, blieb er während der gesamten *Sitzung* friedlich.
