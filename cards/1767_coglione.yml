Rang: 1767
Wort: coglione
Wortart: adj
Wort mit Artikel: coglione
Femininum / Plural: ''
IPA: ''
Definition: dumm, blöd, doof, bescheuert
Register: ''
Beispielsätze: |-
  Quel ragazzo è proprio un *coglione* a non studiare per l’esame.
  Dieser Junge ist einfach ein *Dummkopf*, wenn er nicht für die Prüfung lernt.
  
  Mi hai fatto fare una figura da *coglione* davanti a tutti!
  Du hast mich vor allen zum *Idioten* gemacht!
  
  Secondo me è *coglione* pensare che vinceremo senza allenarci.
  Ich finde es *dumm* zu glauben, wir gewinnen ohne Training.
  
  Se credi che sia *coglione* da non capire, ti sbagli di grosso!
  Wenn du denkst, ich sei *blöd* und verstehe es nicht, liegst du falsch!
  
  È *coglione* pensare che la pubblicità non influenzi le persone.
  Es ist *dumm* zu glauben, Werbung beeinflusse die Menschen nicht.
