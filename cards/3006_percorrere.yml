Rang: 3006
Wort: percorrere
Wortart: v
Wort mit Artikel: percorrere
Femininum / Plural: ''
IPA: ''
Definition: "*durchqueren*, bereisen, zurücklegen, ablaufen"
Register: ''
Beispielsätze: |-
  Ogni estate *percorriamo* le Alpi in bicicletta con gli amici.
  Jeden Sommer *durchqueren* wir die Alpen mit dem Fahrrad mit den Freunden.
  
  L’esploratore *ha percorso* migliaia di chilometri nella giungla amazzonica.
  Der Entdecker *hat* tausende Kilometer durchquert im Amazonas-Dschungel.
  
  Non appena arrivo, vorrei *percorrere* il sentiero che porta al lago.
  Sobald ich ankomme, möchte ich den Weg, der zum See führt, *zurücklegen*.
  
  Gli storici sono convinti che i Maya *percorressero* queste vie commerciali secoli fa.
  Die Historiker sind überzeugt, dass die Maya diese Handelswege vor Jahrhunderten *bereist* haben.
  
  Se domani avessimo tempo, *percorreremmo* il centro storico della città a piedi.
  Wenn wir morgen Zeit hätten, *würden* wir das historische Zentrum der Stadt zu Fuß durchqueren.
