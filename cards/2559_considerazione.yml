Rang: 2559
Wort: considerazione
Wortart: n.f
Wort mit Artikel: la considerazione
Femininum / Plural: considerazioni
IPA: ''
Definition: die Überlegung, -en, die Rücksicht, die Rücksichtnahme
Register: ''
Beispielsätze: |-
  Prima di prendere una decisione, dobbiamo fare *considerazione* a lungo termine.
  Bevor wir eine Entscheidung treffen, müssen wir die langfristige *Überlegung* anstellen.
  
  Non hai nessuna *considerazione* per i sentimenti degli altri!
  Du hast keine *Rücksicht* auf die Gefühle der anderen!
  
  Dopo mesi di studio, la sua *considerazione* è cresciuta molto.
  Nach Monaten des Studiums ist seine *Überlegung* stark gewachsen.
  
  Avrei preferito che tu avessi mostrato più *considerazione* verso di lei.
  Ich hätte mir gewünscht, dass du mehr *Rücksicht* ihr gegenüber gezeigt hättest.
  
  La *considerazione* che nutro per te non è cambiata nonostante tutto.
  Die *Überlegung*, die ich für dich hege, hat sich trotz allem nicht verändert.
