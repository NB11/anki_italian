Rang: 4165
Wort: riporto
Wortart: n.m
Wort mit Artikel: il riporto
Femininum / Plural: i riporti
IPA: ''
Definition: der Rückruf, -e
Register: ''
Beispielsätze: |-
  Il *riporto* della squadra è fondamentale per il successo del progetto.
  Die *Rückmeldung* des Teams ist entscheidend für den Erfolg des Projekts.
  
  Dopo l’incontro, ho ricevuto un *riporto* dettagliato sulle decisioni prese.
  Nach dem Treffen habe ich einen *Bericht* über die getroffenen Entscheidungen erhalten.
  
  Il professor Rossi chiede sempre un *riporto* scritto dopo ogni seminario.
  Professor Rossi verlangt nach jedem Seminar immer einen *schriftlichen Bericht*.
  
  Non ho ancora finito il *riporto* sull’indagine che ho svolto la settimana scorsa.
  Ich habe den *Bericht* über die Untersuchung, die ich letzte Woche durchgeführt habe, noch nicht beendet.
  
  Se non consegni il *riporto* in tempo, rischi di prendere un brutto voto.
  Wenn du den *Bericht* nicht rechtzeitig abgibst, riskierst du eine schlechte Note.
