Rang: 1762
Wort: quadro
Wortart: n.m
Wort mit Artikel: il quadro
Femininum / Plural: i quadri
IPA: ''
Definition: das Gemälde, -
Register: ''
Beispielsätze: |-
  Nell’appartamento c’è un bellissimo *quadro* sopra il camino.
  In der Wohnung hängt ein wunderschönes *Gemälde* über dem Kamin.
  
  Hai visto il nuovo *quadro* che ho comprato alla mostra d’arte?
  Hast du das neue *Gemälde* gesehen, das ich auf der Kunstausstellung gekauft habe?
  
  Quando ero piccolo, mio nonno dipingeva dei bei *quadri* paesaggistici.
  Als ich klein war, malte mein Großvater schöne *Gemälde* mit Landschaften.
  
  Non mi piace questo *quadro*: i colori sono troppo scuri e l’atmosfera è cupa.
  Dieses *Gemälde* gefällt mir nicht: Die Farben sind zu dunkel und die Stimmung ist düster.
  
  Mi hanno regalato un *quadro* astratto per il mio compleanno, ma non lo so appendere.
  Zum Geburtstag haben sie mir ein abstraktes *Gemälde* geschenkt, aber ich weiß nicht, wie ich es aufhängen soll.
