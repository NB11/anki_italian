Rang: 2918
Wort: distribuire
Wortart: vt
Wort mit Artikel: distribuire
Femininum / Plural: ''
IPA: ''
Definition: verteilen, austeilen
Register: ''
Beispielsätze: |-
  Ogni mattina i bambini *distribuiscono* i quaderni ai compagni di classe.
  Jeden Morgen *verteilen* die Kinder die Hefte an ihre Mitschüler.
  
  Non appena avrò finito, *distribuirò* questi documenti a tutti gli impiegati.
  Sobald ich fertig bin, werde ich diese Dokumente an *alle* Angestellten austeilen.
  
  Se avessi un'astronave, la userei per *distribuire* cibo in tutto il mondo.
  Wenn ich ein Raumschiff hätte, würde ich damit Essen *weltweit verteilen*.
  
  Stanno *distribuendo* volantini per pubblicizzare il concerto di stasera.
  Sie *verteilen* Flyer, um das Konzert heute Abend zu bewerben.
  
  Malgrado la pioggia, hanno continuato a *distribuire* i giornali fino a tardi.
  Trotz des Regens haben sie weiter Zeitungen *verteilt*, bis spät in die Nacht.
