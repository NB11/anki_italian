Beispielsätze: |-
  Durante il temporale abbiamo visto un *flash* molto intenso nel cielo.
  Während des Gewitters sahen wir einen *Blitz* am Himmel.
  
  Il fotografo ha usato un *flash* per illuminare il soggetto al buio.
  Der Fotograf nutzte einen *Blitz* um das Motiv im Dunkeln auszuleuchten.
  
  Hanno installato un sistema di *flash* per segnalare il pericolo.
  Sie haben ein *Blitz*system installiert, um die Gefahr zu signalisieren.
  
  Se scatta la foto senza *flash*, non si vede nulla.
  Wenn das Foto ohne *Blitz* gemacht wird, sieht man nichts.
  
  L’artista ha creato un’opera con dei *flash* di luce intermittenti.
  Der Künstler schuf ein Werk mit *Blitzen* aus intermittierendem Licht.
