Rang: 4366
Wort: steroide
Wortart: n.m
Wort mit Artikel: lo steroide
Femininum / Plural: steroidi
IPA: ''
Definition: das Steroid, -e
Register: ''
Beispielsätze: |-
  Il medico ha prescritto allo sportivo di assumere *steroidi* per accelerare il recupero muscolare.
  Der Arzt hat dem Sportler geraten, *Steroide* einzunehmen, um die Muskelregeneration zu beschleunigen.
  
  Nonostante l’allenatore lo sconsigliasse, molti atleti usano illegalmente *steroidi* per migliorare le prestazioni.
  Trotz der Empfehlung des Trainers verwenden viele Sportler illegal *Steroide*, um ihre Leistung zu steigern.
  
  Se avessi saputo le conseguenze, non avrei mai fatto uso di *steroidi* durante la mia carriera.
  Hätte ich die Konsequenzen gekannt, hätte ich niemals *Steroide* während meiner Karriere verwendet.
  
  Gli scienziati stanno studiando gli effetti a lungo termine dell’abuso di *steroidi* sull’organismo umano.
  Wissenschaftler untersuchen die langfristigen Auswirkungen des *Steroide*-Missbrauchs auf den menschlichen Körper.
  
  Il controllo antidoping ha rilevato tracce di *steroidi* nel campione del ciclista, che è stato quindi squalificato.
  Die Dopingkontrolle hat im Blut des Radfahrers Spuren von *Steroiden* gefunden, weshalb er disqualifiziert wurde.
