Rang: 3425
Wort: finanziare
Wortart: vt
Wort mit Artikel: finanziare
Femininum / Plural: ''
IPA: ''
Definition: finanzieren, bezuschussen, unterstützen
Register: ''
Beispielsätze: |-
  Il governo *finanzia* molti progetti culturali nelle scuole per incentivare l’arte tra i giovani.
  Die Regierung *finanziert* viele Kulturprojekte an Schulen, um Kunst unter jungen Menschen zu fördern.
  
  Se non avessimo *finanziato* la ricerca, non avremmo scoperto la nuova medicina.
  Hätten wir die Forschung nicht *finanziert*, hätten wir das neue Medikament nicht entdeckt.
  
  Spero che la banca *finanzi* al più presto il nostro progetto di ristrutturazione.
  Ich hoffe, die Bank *finanziert* unser Sanierungsprojekt bald.
  
  Chi *finanzia* le campagne politiche di solito vuole qualcosa in cambio, non credi?
  Wer *finanziert* politische Wahlkämpfe, will normalerweise etwas dafür zurück – findest du nicht?
  
  È fondamentale che lo Stato *finanzi* adeguatamente l’istruzione pubblica per garantire pari opportunità.
  Es ist entscheidend, dass der Staat die öffentliche Bildung *finanziert*, um Chancengleichheit zu gewährleisten.
