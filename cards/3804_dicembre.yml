Rang: 3804
Wort: dicembre
Wortart: n.m
Wort mit Artikel: il dicembre
Femininum / Plural: dicembri
IPA: ''
Definition: der Dezember
Register: ''
Beispielsätze: |-
  Il *dicembre* è il mese più freddo dell'anno in Italia.
  Der *Dezember* ist der kälteste Monat des Jahres in Italien.
  
  Quest'anno il *dicembre* sarà più mite grazie al riscaldamento globale.
  Diesen *Dezember* wird es milder sein dank der globalen Erwärmung.
  
  Mio nonno dice sempre che a *dicembre* si mangiano le castagne arrosto.
  Mein Opa sagt immer, im *Dezember* isst man geröstete Kastanien.
  
  Prima di *dicembre* dobbiamo prenotare le vacanze natalizie, altrimenti non troveremo posto.
  Vor dem *Dezember* müssen wir die Weihnachtsferien buchen, sonst finden wir keine Unterkunft.
  
  È da *dicembre* che non vedo Luca, spero che stia bene.
  Seit *Dezember* habe ich Luca nicht mehr gesehen, ich hoffe, es geht ihm gut.
