Rang: 2739
Wort: consentire
Wortart: vt
Wort mit Artikel: consentire
Femininum / Plural: ''
IPA: ''
Definition: erlauben, ermöglichen
Register: ''
Beispielsätze: |-
  Il direttore non *consente* l’accesso al laboratorio senza autorizzazione del responsabile.
  Der Leiter gewährt den Zugang zum Labor nicht ohne die *Genehmigung* des Verantwortlichen.
  
  Se *consentissi* di lavorare di più, il progetto verrebbe finito in tempo.
  Wenn du *zulassen* würdest, mehr zu arbeiten, wäre das Projekt rechtzeitig fertig.
  
  Il sindaco ha *consentito* lo svolgimento della manifestazione nonostante le preoccupazioni per il caos che potrebbe generare.
  Der Bürgermeister hat die Durchführung der Veranstaltung *zugelassen*, trotz der Bedenken wegen des möglichen Chaos.
  
  Non *consentiremo* mai che tu entri di nuovo nel cortile senza permesso!
  Wir werden es *zulassen* nie wieder, dass du den Hof ohne Erlaubnis betrittst!
  
  È essenziale *consentire* ai cittadini di accedere alle informazioni pubbliche senza restrizioni.
  Es ist entscheidend, den Bürgern zu *ermöglichen*, auf alle öffentlichen Informationen ohne Einschränkungen zuzugreifen.
