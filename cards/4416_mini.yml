Rang: 4416
Wort: mini
Wortart: adj
Wort mit Artikel: mini
Femininum / Plural: ''
IPA: ''
Definition: mini, winzig, klein
Register: ''
Beispielsätze: |-
  Ho comprato una *mini* lampada per la scrivania che ha solo 10 centimetri di lunghezza.
  Ich habe eine *winzige* Lampe für den Schreibtisch gekauft, die nur 10 Zentimeter Länge hat.
  
  Il loro appartamento è così *mini* che la cucina funziona anche come sala da pranzo.
  Ihre Wohnung ist so *klein*, dass die Küche auch als Esszimmer funktioniert.
  
  Nonostante le dimensioni *mini*, questo orologio ha una batteria che dura mesi.
  Trotz der *winzigen* Größe hält diese Uhr eine Batterie monatelang.
  
  Vuoi davvero cucinare una *mini* pizza margherita con un solo pomodoro?
  Wirst du wirklich eine *kleine* margherita-Pizza mit nur einer Tomate kochen?
  
  Il ladro ha rubato solo una *mini* collana di perle dal negozio glorioso.
  Der Dieb hat nur eine *winzige* Perlenkette aus dem berühmten Laden gestohlen.
