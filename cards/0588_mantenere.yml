Rang: 588
Wort: mantenere
Wortart: vt
Wort mit Artikel: mantenere
Femininum / Plural: ''
IPA: ''
Definition: beibehalten, aufrechterhalten
Register: ''
Beispielsätze: |-
  È fondamentale *mantenere* un equilibrio tra lavoro e vita privata per stare bene.
  Es ist entscheidend, ein Gleichgewicht zwischen Arbeit und Privatleben *beizubehalten*, um sich wohlzufühlen.
  
  Nonostante le difficoltà, riuscì a *mantenere* la calma e risolvere il problema.
  Trotz der Schwierigkeiten gelang es ihm, die Ruhe zu *beibehalten* und das Problem zu lösen.
  
  Vorrei *mantenere* questa tradizione di famiglia, poiché è molto importante per noi.
  Ich möchte diese Familientradition *aufrechterhalten*, weil sie für uns sehr wichtig ist.
  
  Il governo cerca di *mantenere* la stabilità economica nonostante la crisi.
  Die Regierung versucht, die wirtschaftliche Stabilität *aufrechtzuerhalten*, trotz der Krise.
  
  Se *manteniamo* la disciplina, potremo raggiungere i nostri obiettivi entro l’anno.
  Wenn wir die Disziplin *beibehalten*, können wir unsere Ziele bis Jahresende erreichen.
