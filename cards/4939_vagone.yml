Rang: 4939
Wort: vagone
Wortart: n.m
Wort mit Artikel: il vagone
Femininum / Plural: vagoni
IPA: ''
Definition: der Eisenbahnwagen, -
Register: ''
Beispielsätze: |-
  Il *vagone* ristorante è sempre pieno durante i viaggi lunghi.
  Der *Speisewagen* ist während langer Reisen immer voll.
  
  Questo treno ha cinque *vagoni*, uno dei quali è occupato dalla polizia ferroviaria.
  Dieser Zug hat fünf *Wagen*, von denen einer von der Bahnpolizei besetzt ist.
  
  Dopo l’incidente, hanno sostituito l’intero *vagone* danneggiato con uno nuovo.
  Nach dem Unfall haben sie den gesamten beschädigten *Wagen* durch einen neuen ersetzt.
  
  Vor di partire, controlla che il *vagone* letto sia stato correttamente assegnato.
  Bevor ihr losfahrt, prüft, ob der *Schlafwagen* richtig zugewiesen wurde.
  
  Il *vagone* merci trasportava merci deperibili che dovevano arrivare a destinazione in fretta.
  Der *Güterwagen* transportierte verderbliche Waren, die schnell am Ziel ankommen mussten.
