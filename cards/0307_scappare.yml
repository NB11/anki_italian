Rang: 307
Wort: scappare
Wortart: vi
Wort mit Artikel: scappare
Femininum / Plural: ''
IPA: ''
Definition: flüchten, weglaufen
Register: ''
Beispielsätze: |-
  Ieri *sono scappato* dal cane che abbaiava forte.
  Gestern *bin ich vor* dem bellenden Hund *weggelaufen*.
  
  Non *scappare*, resta qui con noi!
  *Lauf nicht weg*, bleib hier bei uns!
  
  Se *scappi* ora, perderai l’autobus.
  Wenn du jetzt *wegläufst*, verpasst du den Bus.
  
  Dicono che voglia *scappare* dalla prigione.
  Sie sagen, er wolle aus dem Gefängnis *flüchten*.
  
  Perché *scappi* sempre quando ti chiamo?
  Warum *läufst du* jedes Mal weg, wenn ich dich rufe?
