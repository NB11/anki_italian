Rang: 1457
Wort: prestito
Wortart: n.m
Wort mit Artikel: il prestito
Femininum / Plural: prestiti
IPA: ''
Definition: die Leihgabe, -n, das Darlehen, -
Register: ''
Beispielsätze: |-
  Ho chiesto *un prestito* alla banca per comprare una nuova macchina.
  Ich habe mir *einen Kredit* von der Bank besorgt, um ein neues Auto zu kaufen.
  
  Il *prestito* che hai fatto al tuo amico non ti è stato ancora restituito, vero?
  Das *Darlehen*, das du deinem Freund gegeben hast, wurde dir leider noch nicht zurückgegeben, oder?
  
  Le *prestiti* universitarie sono molto diffuse tra gli studenti italiani.
  Studienkredite sind unter italienischen Studierenden sehr verbreitet.
  
  Nonostante *il prestito* sia stato grande, sono riuscito a restituirlo in meno di un anno grazie ai miei risparmi.
  Obwohl *das Darlehen* sehr hoch war, konnte ich es in weniger als einem Jahr mit meinen Ersparnissen zurückzahlen.
  
  Se vuoi aprire un’attività, forse dovresti considerare *un prestito* agevolato dallo stato.
  Wenn du ein Unternehmen gründen möchtest, solltest du vielleicht einen staatlich geförderten Kredit in Betracht ziehen.
