Rang: 4214
Wort: febbraio
Wortart: n.m
Wort mit Artikel: il febbraio
Femininum / Plural: febbri
IPA: ''
Definition: der Februar, -e
Register: ''
Beispielsätze: |-
  Quest’anno *febbraio* ha avuto ventotto giorni invece di ventinove.
  Dieses Jahr hatte der *Februar* achtundzwanzig statt neunundzwanzig Tage.
  
  Spero che a marzo smetta di fare freddo, perché *febbraio* è stato davvero rigido quest’inverno.
  Ich hoffe, im März hört es auf zu frieren, denn der *Februar* war diesen Winter richtig hart.
  
  Non ho mai visto così tanta neve in *febbraio* come quest’anno nel nord della Germania.
  Ich habe noch nie so viel Schnee im *Februar* gesehen wie dieses Jahr im Norden Deutschlands.
  
  A gennaio pensavo che *febbraio* sarebbe stato ancora più freddo, ma per fortuna mi sono sbagliato.
  Im Januar dachte ich, der *Februar* würde noch kälter werden, aber zum Glück habe ich mich geirrt.
  
  Durante *febbraio* abbiamo organizzato diversi eventi culturali, nonostante il clima avverso.
  Während des *Februars* haben wir mehrere Kulturveranstaltungen organisiert, trotz des widrigen Klimas.
