Rang: 1270
Wort: lottare
Wortart: v
Wort mit Artikel: lottare
Femininum / Plural: ''
IPA: ''
Definition: kämpfen, ringen
Register: ''
Beispielsätze: |-
  Stiamo *lottando* per una soluzione equa al problema della città.
  Wir *kämpfen* für eine faire Lösung des Stadtproblems.
  
  Se non avessi *lottato* così duramente, non avrei ottenuto nulla.
  Wenn ich nicht so hart *gekämpft* hätte, hätte ich nichts erreicht.
  
  Spero che tu possa *lottare* contro questa malattia con coraggio.
  Ich hoffe, du kannst mutig *gegen* diese Krankheit kämpfen.
  
  Lui *lottava* da anni per avere un permesso di lavoro, ma alla fine ce l'ha fatta.
  Er *kämpfte* seit Jahren um eine Arbeitserlaubnis, aber am Ende schaffte er es.
  
  Credo che dovremmo *lottare* insieme per migliorare la nostra situazione economica.
  Ich glaube, wir sollten gemeinsam *kämpfen*, um unsere wirtschaftliche Lage zu verbessern.
Audio: ''
Notiz: ''
Dispersion: ''
