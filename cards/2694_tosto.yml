Rang: 2694
Wort: tosto
Wortart: adj
Wort mit Artikel: tosto
Femininum / Plural: ''
IPA: ''
Definition: hart, fest, steif
Register: ''
Beispielsätze: |-
  Il pane *tosto* è difficile da masticare senza denti.
  Das *harte* Brot ist schwer zu kauen ohne Zähne.
  
  Se non scaldate la crema abbastanza, resterà *tosta* e granulosa.
  Wenn ihr die Creme nicht genug *erhitzt*, bleibt sie fest und körnig.
  
  Hai notato che la porta è *tosta* e non si apre da sola?
  Hast du bemerkt, dass die Tür *steif* ist und sich nicht von allein öffnet?
  
  Questa pizza è troppo *tosta* perché l’hai lasciata in forno per troppo tempo.
  Diese Pizza ist zu *hart*, weil du sie zu lange im Ofen gelassen hast.
  
  Anche se il metallo sembra *tosto*, può piegarsi sotto pressione prolungata.
  Auch wenn das Metall *fest* scheint, kann es sich unter langem Druck verbiegen.
