Rang: 2735
Wort: vergine
Wortart: adj
Wort mit Artikel: vergine
Femininum / Plural: ''
IPA: ''
Definition: jungfräulich, unberührt
Register: ''
Beispielsätze: |-
  La luna era così luminosa che sembrava *vergine* e pura.
  Der Mond war so hell, dass er wie *jungfräulich* und rein wirkte.
  
  Non credere a tutto quello che dicono: la *vergine* di ghiaccio è solo una leggenda.
  Glaube nicht alles, was man dir erzählt: die *jungfräuliche* Eisjungfrau ist nur eine Legende.
  
  Questo vino è prodotto da uve *vergini* raccolte manualmente.
  Dieser Wein wird aus *unberührten* Trauben von Hand geerntet.
  
  Dopo la tempesta, il bosco appariva *vergine* come se nessuno ci fosse mai entrato.
  Nach dem Sturm wirkte der Wald *jungfräulich*, als wäre noch nie jemand hineingegangen.
  
  I turisti cercavano una spiaggia *vergine*, lontano dal caos delle città.
  Die Touristen suchten einen *unberührten* Strand, weit weg vom Chaos der Städte.
