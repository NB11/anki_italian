Rang: 3815
Wort: sospensione
Wortart: n.f
Wort mit Artikel: la sospensione
Femininum / Plural: sospensioni
IPA: ''
Definition: der Aufschub, -aufschübe
Register: ''
Beispielsätze: |-
  Dopo l’incidente, la macchina ha avuto una *sospensione* di sei mesi per le riparazioni.
  Nach dem Unfall hatte das Auto eine *sechsmonatige Aussetzung* für die Reparaturen.
  
  Ho chiesto una *sospensione* del pagamento perché non ho ancora ricevuto lo stipendio.
  Ich habe eine *Aufschiebung* der Zahlung beantragt, da ich noch kein Gehalt erhalten habe.
  
  La *sospensione* delle lezioni è stata annunciata per domani a causa delle proteste degli studenti.
  Die *Aussetzung* des Unterrichts wurde morgen wegen der Studentenproteste angekündigt.
  
  Nonostante la *sospensione* dell’accordo, i due paesi continuano a dialogare.
  Trotz der *Aussetzung* des Abkommens führen die beiden Länder den Dialog fort.
  
  La *sospensione* della pena è stata concessa al detenuto per buona condotta.
  Die *Aussetzung* der Strafe wurde dem Häftling wegen guter Führung gewährt.
