Rang: 4713
Wort: segnalazione
Wortart: n.f
Wort mit Artikel: la segnalazione
Femininum / Plural: segnalazioni
IPA: ''
Definition: die Meldung, die Anzeige, die Hinweis
Register: ''
Beispielsätze: |-
  Il *segnalazione* di pericolo ha fatto scattare l'allarme antincendio.
  Die *Meldung* der Gefahr löste den Feueralarm aus.
  
  Dopo la *segnalazione* di un problema al motore, abbiamo chiamato il meccanico.
  Nach der *Meldung* eines Motorproblems riefen wir den Mechaniker.
  
  La polizia sta indagando su una nuova *segnalazione* di frode online.
  Die Polizei untersucht eine neue *Anzeige* von Online-Betrug.
  
  Secondo questa *segnalazione*, il prodotto è sicuro, ma io non ci credo affatto.
  Laut dieser *Meldung* ist das Produkt sicher, aber ich glaube das überhaupt nicht.
  
  La *segnalazione* scritta sul manuale era troppo piccola per essere letta.
  Die *Hinweis*-Schrift auf dem Handbuch war zu klein, um sie zu lesen.
