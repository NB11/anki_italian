Rang: 4941
Wort: motto
Wortart: n.m
Wort mit Artikel: il motto
Femininum / Plural: i motti
IPA: ''
Definition: der Spruch, -e, das Motto
Register: ''
Beispielsätze: |-
  Il *motto* di questa azienda è: "La qualità prima di tutto"
  Der *Spruch* dieses Unternehmens lautet: "Qualität steht an erster Stelle".
  
  Hanno scelto come *motto* della festa: "Vivi e lascia vivere"
  Sie haben als *Motto* der Feier gewählt: "Leben und leben lassen".
  
  Quel generale aveva come *motto* personale: "Servire la patria"
  Jener General hatte als persönlichen *Spruch*: "Dem Vaterland dienen".
  
  Il *motto* scolastico di questa scuola sottolinea l'importanza dell'onestà
  Der schulische *Spruch* dieser Schule betont die Bedeutung von Ehrlichkeit.
  
  Non ricordi il *motto* che hai scelto per il nostro gruppo?
  Erinnerst du dich nicht an den *Spruch*, den du für unsere Gruppe gewählt hast?
