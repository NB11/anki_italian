Wort: asciutto
Wortart: adj
Wort mit Artikel: asciutto
Femininum / Plural: ''
IPA: ''
Definition: trocken
Register: ''
Beispielsätze: |-
  Dopo la pioggia, l'aria era *asciutta* e fresca.
  Nach dem Regen war die Luft *trocken* und frisch.
  
  Questo vino è troppo *asciutto* per i miei gusti.
  Dieser Wein ist mir zu *trocken*.
  
  Se il pane non è *asciutto*, non si può fare il toast.
  Wenn das Brot nicht *trocken* ist, kann man kein Toast machen.
  
  La camicia è ancora *asciutta* nonostante il lavaggio.
  Das Hemd ist trotz des Waschens noch *trocken*.
  
  Credo che la tua pelle sia *asciutta* perché non bevi abbastanza acqua.
  Ich glaube, deine Haut ist *trocken*, weil du nicht genug Wasser trinkst.
