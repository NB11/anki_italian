Rang: 3156
Wort: tenuta
Wortart: n.f
Wort mit Artikel: la tenuta
Femininum / Plural: tenute
IPA: ''
Definition: der Besitz, -e, die Bewirtschaftung, -en
Register: ''
Beispielsätze: |-
  La *tenuta* di mio zio produce olio d'oliva di ottima qualità.
  Die *Bewirtschaftung* meines Onkels produziert Olivenöl bester Qualität.
  
  Dopo la *tenuta* dei documenti, finalmente possiamo firmare il contratto.
  Nach der *Archivierung* der Dokumente können wir endlich den Vertrag unterschreiben.
  
  Non sapevo che questa *tenuta* appartenesse alla famiglia da secoli.
  Ich wusste nicht, dass diese *Bewirtschaftung* der Familie seit Jahrhunderten gehört.
  
  La *tenuta* di questi terreni richiede molta pazienza e lavoro costante.
  Die *Bewirtschaftung* dieser Grundstücke erfordert viel Geduld und ständige Arbeit.
  
  Hanno venduto la *tenuta* perché non riuscivano più a curarla da soli.
  Sie haben die *Bewirtschaftung* verkauft, weil sie sie nicht mehr allein bewirtschaften konnten.
