Rang: 1321
Wort: rifare
Wortart: vt
Wort mit Artikel: rifare
Femininum / Plural: ''
IPA: ''
Definition: neu machen, wiederholen
Register: ''
Beispielsätze: |-
  Ultimamente devo *rifare* tutta la traduzione perché quella vecchia era pessima.
  In letzter Zeit muss ich die gesamte Übersetzung *neu machen*, weil die alte sehr schlecht war.
  
  Mi hanno detto di *rifare* l’articolo perché il sottotitolo non corrispondeva al testo.
  Man hat mir gesagt, ich soll den *Artikel neu machen*, weil der Untertitel nicht zum Text passte.
  
  Se non ti piacciono i risultati, puoi sempre *rifare* il test domani mattina.
  Wenn dir die Ergebnisse nicht gefallen, kannst du den Test morgen früh *wiederholen*.
  
  Gli scienziati vorrebbero *rifare* l’esperimento per verificare i dati ottenuti.
  Die Wissenschaftler möchten das Experiment *neu machen*, um die gewonnenen Daten zu überprüfen.
  
  Nonostante l’errore, non vuole *rifare* la domanda perché si vergogna della propria incertezza.
  Trotz des Fehlers will er die Frage nicht *wiederholen*, weil er sich für seine Unsicherheit schämt.
