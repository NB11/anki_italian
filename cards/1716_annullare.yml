Rang: 1716
Wort: annullare
Wortart: vt
Wort mit Artikel: annullare
Femininum / Plural: ''
IPA: ''
Definition: annullieren, aufheben, stornieren
Register: ''
Beispielsätze: |-
  Il giudice ha deciso di *annullare* la sentenza per mancanza di prove.
  Der Richter entschied, das Urteil wegen fehlender Beweise zu *annullieren*.
  
  Se non ti serve più il biglietto, puoi chiederci di *annullare* la prenotazione senza penale.
  Wenn du das Ticket nicht mehr brauchst, können wir die Buchung ohne Gebühr *annullieren*.
  
  Hanno promesso che domani *annullerebbero* il contratto se non rispettavano i termini.
  Sie versprachen, den Vertrag morgen *aufzuheben*, falls sie die Bedingungen nicht einhielten.
  
  Nonostante l’*annullamento* dell’invito, lui rimase convinto che fosse solo un malinteso.
  Trotz der *Aufhebung* der Einladung blieb er überzeugt, dass es nur ein Missverständnis war.
  
  Vorrei che tu mi spiegassi come *annullare* un pagamento fatto per errore sul mio conto corrente.
  Ich möchte, dass du mir erklärst, wie ich eine versehentlich getätigte Zahlung auf meinem Konto *annullieren* kann.
