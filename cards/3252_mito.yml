Rang: 3252
Wort: mito
Wortart: n.m
Wort mit Artikel: il mito
Femininum / Plural: i miti
IPA: ''
Definition: der Mythos, Mythen
Register: ''
Beispielsätze: |-
  Nel *mito* di Ercole si narra che l'eroe dovette affrontare dodici fatiche.
  In dem *Mythos* von Herakles wird erzählt, dass der Held zwölf Aufgaben meistern musste.
  
  Si dice che il *mito* di Re Artù sia ispirato a figure storiche reali.
  Man sagt, dass der *Mythos* um König Artus auf reale historische Figuren zurückgehen soll.
  
  Nonostante l'*mito* che la luna sia fatta di formaggio sia vecchio, molti bambini ci credono ancora.
  Obwohl der *Mythos*, dass der Mond aus Käse besteht, alt ist, glauben es viele Kinder noch immer.
  
  Gli storici cercano di separare la realtà dal *mito* per ricostruire eventi autentici.
  Die Historiker versuchen, die Realität von dem *Mythos* zu trennen, um authentische Ereignisse zu rekonstruieren.
  
  Hanno scritto un articolo per spiegare perché il *mito* di Atlantide affascina ancora tanta gente.
  Sie haben einen Artikel geschrieben, um zu erklären, warum der *Mythos* von Atlantis die Menschen noch immer so fasziniert.
