Rang: 3442
Wort: caverna
Wortart: n.f
Wort mit Artikel: la caverna
Femininum / Plural: caverne
IPA: ''
Definition: die Höhle, -n
Register: ''
Beispielsätze: |-
  Durante l'escursione in montagna abbiamo scoperto una *caverna* nascosta dietro una cascata.
  Während der Wanderung haben wir eine *Höhle* hinter einem Wasserfall entdeckt.
  
  Gli speleologi esplorano da mesi questa *caverna*, ma non hanno ancora trovato l’uscita.
  Die Höhlenforscher erkunden diese *Höhle* seit Monaten, aber sie haben den Ausgang noch nicht gefunden.
  
  Se avessi avuto paura, non mi sarei mai avventurato nella *caverna* buia.
  Wenn ich Angst gehabt hätte, wäre ich nie in die dunkle *Höhle* gegangen.
  
  La leggenda racconta che dentro questa *caverna* sia nascosto un tesoro segreto.
  Die Legende erzählt, dass in dieser *Höhle* ein geheimer Schatz versteckt ist.
  
  Non appena entrò nella *caverna*, sentì un’aria gelida che gli fece venire i brividi.
  Sobald er die *Höhle* betrat, spürte er eine eiskalte Luft, die ihm Gänsehaut verursachte.
