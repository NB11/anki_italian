Rang: 3379
Wort: riva
Wortart: n.f
Wort mit Artikel: la riva
Femininum / Plural: rive
IPA: ''
Definition: das Ufer, -
Register: ''
Beispielsätze: |-
  La *riva* del lago era coperta di fiori gialli quando siamo arrivati.
  Das *Ufer* des Sees war mit gelben Blumen bedeckt, als wir ankamen.
  
  Camminavamo lungo la *riva* del fiume, ascoltando il rumore dell'acqua.
  Wir gingen entlang des *Ufers* des Flusses und lauschten dem Geräusch des Wassers.
  
  Se avessi più tempo, trascorrerei le vacanze sulla *riva* del mare.
  Wenn ich mehr Zeit hätte, würde ich die Ferien am *Ufer* des Meeres verbringen.
  
  Dalla *riva* opposta si vedeva chiaramente il rifugio di montagna.
  Von der gegenüberliegenden *Ufer*seite aus sah man deutlich die Berghütte.
  
  Dopo la tempesta, la *riva* era disseminata di rami spezzati e detriti.
  Nach dem Sturm war das *Ufer* mit abgebrochenen Ästen und Trümmern übersät.
