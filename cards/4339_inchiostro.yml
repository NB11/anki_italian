Rang: 4339
Wort: inchiostro
Wortart: n.m
Wort mit Artikel: lo inchiostro
Femininum / Plural: gli inchiostri
IPA: ''
Definition: die Tinte, -n
Register: ''
Beispielsätze: |-
  Ho scritto la lettera con *inchiostro* blu perché preferisco questo colore.
  Ich habe den Brief mit *Tinte* in Blau geschrieben, weil ich diese Farbe bevorzuge.
  
  Il *inchiostro* della tua penna si è già seccato dopo solo un giorno di uso.
  Die *Tinte* deines Füllers ist schon nach nur einem Tag Benutzung eingetrocknet.
  
  Non appena aggiungerò un po' d’*inchiostro* al disegno, sarà finalmente completo.
  Sobald ich etwas *Tinte* zu der Zeichnung hinzufüge, wird sie endlich fertig sein.
  
  L’artista ha scelto *inchiostro* nero per creare un effetto drammatico nel suo dipinto.
  Der Künstler hat *Tinte* in Schwarz gewählt, um einen dramatischen Effekt in seinem Gemälde zu erzeugen.
  
  Se non pulisci bene la penna, il prossimo *inchiostro* che userai potrebbe sbavare.
  Wenn du den Füller nicht gründlich reinigst, könnte die nächste *Tinte*, die du verwendest, verlaufen.
