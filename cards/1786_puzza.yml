Rang: 1786
Wort: puzza
Wortart: n.f
Wort mit Artikel: la puzza
Femininum / Plural: puzze
IPA: ''
Definition: der Gestank, Pl. Gestänke
Register: ''
Beispielsätze: |-
  La *puzza* di pesce marcio riempiva la cucina dopo il tuo arrivo.
  Der *Gestank* von faulendem Fisch füllte die Küche nach deiner Ankunft.
  
  Non sopporto la *puzza* di sigarette nel mio ufficio.
  Ich kann den *Gestank* von Zigaretten in meinem Büro nicht ertragen.
  
  Ho sentito una forte *puzza* di gas vicino alla caldaia.
  Ich habe einen starken *Gestank* von Gas in der Nähe des Boilers gerochen.
  
  La *puzza* che emanava dal frigorifero era insopportabile.
  Der *Gestank*, der vom Kühlschrank ausging, war unerträglich.
  
  Se non eliminerai la *puzza* dal bagno, nessuno verrà più a trovarti.
  Wenn du den *Gestank* aus dem Bad nicht beseitigst, kommt niemand mehr zu dir.
