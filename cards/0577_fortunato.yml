Rang: 577
Wort: fortunato
Wortart: adj
Wort mit Artikel: fortunato
Femininum / Plural: fortunati (m), fortunate (f)
IPA: ''
Definition: glücklich, glückselig
Register: ''
Beispielsätze: |-
  Sono *fortunato* perché ho trovato un lavoro che mi piace circa un mese fa.
  Ich bin *glücklich*, weil ich vor etwa einem Monat eine Arbeit gefunden habe, die mir gefällt.
  
  Se avessi saputo che eri *fortunato*, ti avrei chiesto consiglio prima!
  Wenn ich gewusst hätte, dass du *glücklich* warst, hätte ich dich früher um Rat gebeten!
  
  Penso che lui si senta *fortunato* ad avere una famiglia così amorevole.
  Ich denke, dass er sich *glücklich* schätzt, eine so liebevolle Familie zu haben.
  
  Era *fortunata* la ragazza che ha vinto il premio, ma nessuno lo sapeva!
  Das Mädchen, das den Preis gewonnen hat, war *glücklich*, aber das wusste niemand!
  
  Saremo *fortunati* se il tempo rimarrà bello per il nostro viaggio in America.
  Wir werden *glücklich* sein, wenn das Wetter für unsere Reise nach Amerika schön bleibt.
