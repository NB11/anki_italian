Rang: 577
Wort: fortunato
Wortart: adj
Wort mit Artikel: fortunato
Femininum / Plural: ''
IPA: ''
Definition: glücklich, begünstigt
Register: ''
Beispielsätze: |-
  Sei *fortunato* ad avere un lavoro che ami.
  Du bist *glücklich*, eine Arbeit zu haben, die du liebst.
  
  Non mi sento *fortunato* oggi, tutto va storto.
  Ich fühle mich heute nicht *begünstigt*, alles geht schief.
  
  Se avessi vinto la lotteria, sarei stato molto *fortunato*.
  Wenn ich im Lotto gewonnen hätte, wäre ich sehr *glücklich* gewesen.
  
  È *fortunato* che abbia trovato la strada così in fretta.
  Es ist *glücklich*, dass er den Weg so schnell gefunden hat.
  
  Credi di essere più *fortunato* degli altri?
  Glaubst du, *glücklicher* zu sein als die anderen?
