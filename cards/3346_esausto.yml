Rang: 3346
Wort: esausto
Wortart: adj
Wort mit Artikel: esausto
Femininum / Plural: ''
IPA: ''
Definition: erschöpft, ausgelaugt
Register: ''
Beispielsätze: |-
  Dopo la maratona, Maria era *esausta* e non riusciva a muoversi.
  Nach dem Marathon war Maria *erschöpft* und konnte sich nicht bewegen.
  
  Nonostante fosse *esausto*, ha continuato a lavorare tutta la notte.
  Obwohl er *erschöpft* war, hat er die ganze Nacht weitergearbeitet.
  
  Mi dispiace, ma sono proprio *esausto* dopo questa lunga giornata.
  Es tut mir leid, aber ich bin wirklich *erschöpft* nach diesem langen Tag.
  
  Se fossi così *esausto*, andrei direttamente a letto senza pensare ad altro.
  Wenn ich so *erschöpft* wäre, würde ich direkt ins Bett gehen, ohne an etwas anderes zu denken.
  
  Nonostante il lungo viaggio, i viaggiatori non sembravano affatto *esausti*.
  Trotz der langen Reise wirkten die Reisenden überhaupt nicht *erschöpft*.
