Rang: 2307
Wort: guanto
Wortart: n.m
Wort mit Artikel: il guanto
Femininum / Plural: guanti
IPA: ''
Definition: der Handschuh, -e
Register: ''
Beispielsätze: |-
  Non dimenticare di indossare i *guanti* quando lavori in giardino, fa molto freddo!
  Vergiss nicht, die *Handschuhe* anzuziehen, wenn du im Garten arbeitest, es ist sehr kalt!
  
  Le mani di Marco erano così fredde che dovette comprarne un paio di *guanti* riscaldati.
  Marcos Hände waren so kalt, dass er sich ein Paar *Handschuhe* mit Heizfunktion kaufen musste.
  
  Ho perso uno dei *guanti* nel parco ieri sera, non so dove possa essere finito.
  Ich habe gestern Abend einen meiner *Handschuhe* im Park verloren, ich weiß nicht, wohin er verschwunden ist.
  
  Se vuoi partecipare alla caccia al tesoro, ti consiglio di portare dei *guanti* robusti, potrebbero servirti.
  Wenn du an der Schatzsuche teilnehmen möchtest, rate ich dir, robuste *Handschuhe* mitzubringen, die könnten dir nützlich sein.
  
  I *guanti* che hai comprato sono così eleganti che potresti indossarli anche a teatro!
  Die *Handschuhe*, die du gekauft hast, sind so elegant, dass du sie sogar im Theater tragen könntest!
