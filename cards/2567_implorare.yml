Rang: 2567
Wort: implorare
Wortart: v
Wort mit Artikel: implorare
Femininum / Plural: ''
IPA: ''
Definition: anflehen, inständig bitten, beschwören
Register: ''
Beispielsätze: |-
  Ha dovuto *implorare* il suo datore di lavoro per ottenere un aumento di stipendio.
  Er musste seinen Chef um *eine Gehaltserhöhung* anflehen.
  
  Se *implorassi* il giudice con sincerità, forse potrebbe mostrare clemenza.
  Wenn du den Richter *inständig bitten würdest*, würde er vielleicht Milde zeigen.
  
  La vittima *implorava* aiuto, ma nessuno la sentiva nel caos della festa.
  Das Opfer *flehte* um Hilfe, doch niemand hörte es im Trubel der Feier.
  
  Mi sembra che tu stia *implorando* il destino affinché cambi le cose per te.
  Es kommt mir vor, als würdest du das Schicksal *anflehen*, dass es für dich anders entscheidet.
  
  Dopo l’*implorare* senza fine, alla fine gli fu concessa una seconda possibilità.
  Nach dem endlosen *Beschwören* wurde ihm schließlich eine zweite Chance gewährt.
Audio: ''
Notiz: ''
