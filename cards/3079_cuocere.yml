Rang: 3079
Wort: cuocere
Wortart: v
Wort mit Artikel: cuocere
Femininum / Plural: ''
IPA: ''
Definition: kochen, backen, garen
Register: ''
Beispielsätze: |-
  Vuoi che *cuocia* la pasta per tutti gli invitati?
  Soll ich *die* Nudeln für alle Gäste kochen?
  
  Il pane che hai *cotto* stamattina è ancora caldo.
  Das Brot, das du heute Morgen *gebacken* hast, ist noch warm.
  
  Se avessi saputo che la carne era dura, avrei scelto di *cuocerla* più a lungo.
  Wenn ich gewusst hätte, dass das Fleisch zäh war, hätte ich es länger *garen* lassen.
  
  Dicono che chi non sa *cuocere* un uovo sodo non potrà mai diventare un bravo chef.
  Man sagt, wer ein *festes* Ei nicht kochen kann, wird niemals ein guter Koch.
  
  Stasera, dopo aver bevuto un bicchiere di vino, brinderemo perché domani inizieremo a *cuocere* il nostro primo libro di ricette.
  Heute Abend werden wir nach einem Glas Wein *anstoßen*, weil wir morgen anfangen werden, unser erstes Kochbuch zu erstellen.
