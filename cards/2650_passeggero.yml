Rang: 2650
Wort: passeggero
Wortart: n.m
Wort mit Artikel: il passeggero
Femininum / Plural: i passeggeri
IPA: ''
Definition: der Passagier, -e
Register: ''
Beispielsätze: |-
  Il *passeggero* ha dimenticato la sua valigia sul treno.
  Der *Passagier* hat seinen Koffer im Zug vergessen.
  
  Quanti *passeggeri* ci sono su questo volo per Berlino?
  Wie viele *Passagiere* sind auf diesem Flug nach Berlin?
  
  Il *passeggero* che viaggiava vicino al finestrino era molto silenzioso.
  Der *Passagier*, der am Fenster saß, war sehr still.
  
  Durante il temporale, tutti i *passeggeri* sono rimasti al sicuro nell’aeroporto.
  Während des Sturms blieben alle *Passagiere* sicher im Flughafen.
  
  Se non avessi perso il biglietto, il *passeggero* sarebbe potuto salire tranquillamente sull’aereo.
  Wenn er das Ticket nicht verloren hätte, *hätte der Passagier* problemlos ins Flugzeug steigen können.
