Beispielsätze: |-
  Il pianeta *terrestre* più vicino al sole è Mercurio.
  Der *irdische* Planet, der der Sonne am nächsten ist, ist Merkur.
  
  Questa creatura *terrestre* non può vivere sott’acqua come i pesci.
  Dieses *irdische* Wesen kann nicht wie Fische unter Wasser leben.
  
  Le esperienze *terrestri* spesso ci sembrano più intense di quelle spirituali.
  Die *irdischen* Erfahrungen wirken auf uns oft intensiver als die spirituellen.
  
  Se esistono forme di vita *terrestri* su Marte, gli scienziati ne sono ancora ignari.
  Falls es *irdische* Lebensformen auf dem Mars gibt, wissen die Wissenschaftler noch nichts davon.
  
  La natura *terrestre* sta subendo cambiamenti drastici a causa del riscaldamento globale.
  Die *irdische* Natur erlebt gerade drastische Veränderungen durch die globale Erwärmung.
