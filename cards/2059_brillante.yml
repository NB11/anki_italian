Rang: 2059
Wort: brillante
Wortart: adj
Wort mit Artikel: brillante
Femininum / Plural: ''
IPA: ''
Definition: glänzend, strahlend, glänzend, hell
Register: ''
Beispielsätze: |-
  Il sole era così *brillante* che ho dovuto indossare gli occhiali da sole.
  Die Sonne war so *strahlend*, dass ich die Sonnenbrille aufsetzen musste.
  
  Nonostante il *brillante* successo del suo libro, lo scrittore rimase modesto.
  Trotz des *glänzenden* Erfolgs seines Buches blieb der Schriftsteller bescheiden.
  
  Aveva una risata *brillante* che illuminava ogni stanza in cui entrava.
  Sie hatte ein *strahlendes* Lachen, das jeden Raum erhellte, in den sie trat.
  
  Idea *brillante*! Perché non ci ho pensato prima?
  *Tolle* Idee! Warum bin ich nicht früher darauf gekommen?
  
  Questo diamante è così *brillante* che sembra quasi luminoso di suo.
  Dieser Diamant ist so *glänzend*, dass er fast von selbst zu leuchten scheint.
