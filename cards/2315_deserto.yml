Rang: 2315
Wort: deserto
Wortart: n.m
Wort mit Artikel: il deserto
Femininum / Plural: deserti
IPA: ''
Definition: die Wüste, -n
Register: ''
Beispielsätze: |-
  Il *deserto* del Sahara è uno dei luoghi più caldi del mondo.
  Die *Wüste* der Sahara ist einer der heißesten Orte der Welt.
  
  Camminavamo nel *deserto* sotto un sole cocente per cinque ore.
  Wir liefen fünf Stunden lang in der *Wüste* unter einer glühenden Sonne.
  
  Chiunque voglia attraversare il *deserto* deve essere ben preparato.
  Wer die *Wüste* durchqueren will, muss gut vorbereitet sein.
  
  Il *deserto* di Atacama è così arido che alcune zone non hanno mai visto la pioggia.
  Die *Wüste* Atacama ist so trocken, dass einige Gebiete noch nie Regen gesehen haben.
  
  Se domani andremo nel *deserto*, portiamo tanta acqua e protezione solare.
  Wenn wir morgen in die *Wüste* gehen, nehmen wir viel Wasser und Sonnenschutz mit.
