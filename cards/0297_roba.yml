Rang: 297
Wort: roba
Wortart: n.f
Wort mit Artikel: la roba
Femininum / Plural: le robe
IPA: ''
Definition: die Sachen, das Zeug, die Dinge
Register: ''
Beispielsätze: |-
  Questa *roba* è molto pesante da portare.
  Diese *Sachen* sind sehr schwer zu tragen.
  
  Non mi piace tutta questa *roba* che hai comprato.
  Ich mag nicht all das *Zeug*, das du gekauft hast.
  
  Dove hai messo la *roba* sporca?
  Wo hast du die *Sachen* zum Waschen hingelegt?
  
  La *roba* che ho trovato in soffitta è molto vecchia.
  Das *Zeug*, das ich auf dem Dachboden gefunden habe, ist sehr alt.
  
  Secondo te, questa *roba* si può ancora usare?
  Meinst du, man kann diese *Sachen* noch gebrauchen?
