Rang: 633
Wort: proposito
Wortart: n.m
Wort mit Artikel: il proposito
Femininum / Plural: i propositi
IPA: ''
Definition: die Absicht
Register: ''
Beispielsätze: |-
  *Il* *proposito* di Luca è imparare l'italiano in un anno.
  *Die* *Absicht* von Luca ist es, Italienisch in einem Jahr zu lernen.
  
  Quest'anno ho fatto *un* *proposito*: leggere di più.
  Dieses Jahr habe ich *mir* *vorgenommen*: mehr zu lesen.
  
  Non hai rispettato *i tuoi* *propositi* di dieta.
  Du hast *deine* *Absichten* bezüglich der Diät nicht eingehalten.
  
  Secondo *il* mio *proposito*, partirò domani mattina.
  Laut *meiner* *Absicht* werde ich morgen früh aufbrechen.
  
  Che *proposito* hai per il nuovo anno?
  Welche *Absicht* hast du für das neue Jahr?
