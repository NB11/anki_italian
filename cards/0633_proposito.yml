Rang: 633
Wort: proposito
Wortart: n.m
Wort mit Artikel: il proposito
Femininum / Plural: i propositi
IPA: ''
Definition: die Absicht, der Vorsatz, die Zielsetzung
Register: ''
Beispielsätze: |-
  Non dimenticare di fissare un *proposito* per l'anno nuovo.
  Vergiss nicht, einen *Vorsatz* für das neue Jahr festzulegen.
  
  Conosco i tuoi *propositi*, ma non li realizzerai mai.
  Ich kenne deine *Absichten*, aber du wirst sie nie umsetzen.
  
  Ha fatto un *proposito* di mantenere una dieta equilibrata, ma dopo due settimane ha già abbandonato.
  Er hat sich vorgenommen, eine ausgewogene Ernährung beizubehalten, aber nach zwei Wochen hat er bereits aufgegeben.
  
  Se non rispettate i *propositi* che avete preso con voi stessi, come potrete mai migliorare?
  Wenn ihr die *Vorsätze*, die ihr euch selbst gesetzt habt, nicht einhaltet, wie könnt ihr euch dann jemals verbessern?
  
  Il *proposito* principale della sua vita era viaggiare per il mondo, sogno che realizzò prima dei trent'anni.
  Sein *Hauptziel* im Leben war, um die Welt zu reisen, ein Traum, den er vor seinem dreißigsten Geburtstag verwirklichte.
