Beispielsätze: |-
  Il *rientro* a casa dopo il viaggio è sempre emozionante per me.
  Die *Heimkehr* nach der Reise ist immer aufregend für mich.
  
  Dopo la pausa estiva ho fatto un *rientro* molto faticoso al lavoro.
  Nach der Sommerpause hatte ich eine sehr anstrengende *Rückkehr* zur Arbeit.
  
  Il *rientro* dei turisti dalla crociera è previsto per domani mattina.
  Die *Rückkehr* der Touristen von der Kreuzfahrt ist für morgen früh geplant.
  
  Non vedo l’ora del *rientro* a Milano dopo questa lunga assenza.
  Ich kann die *Heimkehr* nach Mailand nach dieser langen Abwesenheit kaum erwarten.
  
  Il *rientro* del pullman alla stazione centrale è stato segnalato dal conducente.
  Die *Rückkehr* des Reisebusses zum Hauptbahnhof wurde vom Fahrer gemeldet.
