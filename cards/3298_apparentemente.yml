Rang: 3298
Wort: apparentemente
Wortart: adv
Wort mit Artikel: apparentemente
Femininum / Plural: ''
IPA: ''
Definition: scheinbar, offenbar
Register: ''
Beispielsätze: |-
  Lui ha *apparentemente* dimenticato l’appuntamento, ma in realtà era solo in ritardo.
  Er hat den Termin nur *scheinbar* vergessen, aber eigentlich war er nur spät dran.
  
  *Apparentemente* tutto procedeva bene, ma sotto sotto c’erano grossi problemi.
  *Anscheinend* lief alles gut, aber insgeheim gab es große Probleme.
  
  Non ti fidare: *apparentemente* è gentile, ma in realtà è molto egoista.
  Trau ihm nicht: *offenbar* ist er freundlich, aber in Wirklichkeit ist er sehr egoistisch.
  
  Lei *apparentemente* sa tutto, ma in realtà nasconde molto.
  Sie *scheint* alles zu wissen, aber eigentlich verbirgt sie viel.
  
  Il film *apparentemente* parla di una storia d’amore, ma in realtà tratta temi politici.
  Der Film *wirkt* wie eine Liebesgeschichte, aber eigentlich behandelt er politische Themen.
