Rang: 2239
Wort: gabbia
Wortart: n.m
Wort mit Artikel: la gabbia
Femininum / Plural: gabbie
IPA: ''
Definition: der Käfig, -e
Register: ''
Beispielsätze: |-
  Il pappagallo è rinchiuso nella *gabbia* da quando si è ammalato.
  Der Papagei sitzt seit seiner Erkrankung in *einem Käfig*.
  
  Se avessi un cane, non lo metterei mai in una *gabbia* per tutto il giorno.
  Wenn ich einen Hund hätte, würde ich ihn nie den ganzen Tag in *einem Käfig* einsperren.
  
  Nella fattoria, le galline vengono tenute solo temporaneamente in una *gabbia* mobile.
  Auf dem Bauernhof werden die Hühner nur vorübergehend in *einem* mobilen Käfig gehalten.
  
  Hanno trovato un uccello ferito e l’hanno messo in una *gabbia* finché non si è rimesso.
  Sie fanden einen verletzten Vogel und setzten ihn in *einen Käfig*, bis er wieder gesund war.
  
  La *gabbia* di metallo era così piccola che il gatto non poteva girarsi dentro.
  Der Metall*käfig* war so klein, dass die Katze sich darin nicht einmal drehen konnte.
