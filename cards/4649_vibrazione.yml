Rang: 4649
Wort: vibrazione
Wortart: n.f
Wort mit Artikel: la vibrazione
Femininum / Plural: vibrazioni
IPA: ''
Definition: die Vibration, -en
Register: ''
Beispielsätze: |-
  La *vibrazione* del cellulare mi ha svegliato alle sei di mattina.
  Die *Vibration* meines Handys hat mich um sechs Uhr morgens geweckt.
  
  Sentivo una strana *vibrazione* provenire dal motore della macchina.
  Ich spürte eine seltsame *Vibration*, die vom Motor des Autos ausging.
  
  Dopo la scossa tellurica, le *vibrazioni* hanno continuato per diversi minuti.
  Nach dem Beben hielten die *Vibrationen* noch mehrere Minuten an.
  
  Per misurare la *vibrazione*, hanno usato un apposito sensore.
  Um die *Vibration* zu messen, nutzten sie einen speziellen Sensor.
  
  La *vibrazione* dell’altoparlante era così forte da far tremare i vetri.
  Die *Vibration* des Lautsprechers war so stark, dass sie die Scheiben zum Wackeln brachte.
