Rang: 2196
Wort: sorta
Wortart: n.m
Wort mit Artikel: la sorta
Femininum / Plural: le sorti
IPA: ''
Definition: die Art, -en, die Sorte, -n
Register: ''
Beispielsätze: |-
  Non conosciamo ancora la *sorta* di vita che ci aspetta dopo la laurea.
  Wir kennen noch nicht die *Art* von Leben, das uns nach dem Studium erwartet.
  
  La *sorta* dell’imperatore è sempre stata misteriosa per gli storici.
  Das *Schicksal* des Kaisers war für die Historiker immer ein Rätsel.
  
  Quale *sorta* di lavoro ti piacerebbe fare in futuro?
  Welche *Art* von Arbeit würdest du in Zukunft gerne machen?
  
  Dipende molto dalla *sorta* di persone con cui lavori.
  Es hängt sehr davon ab, welche *Art* von Menschen man dabei hat.
  
  Non giudicare una persona dalla *sorta* di vestiti che indossa.
  Urteile einen Menschen nicht nach der *Art* von Kleidung, die er trägt.
