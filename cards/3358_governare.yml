Rang: 3358
Wort: governare
Wortart: v
Wort mit Artikel: governare
Femininum / Plural: ''
IPA: ''
Definition: regieren, verwalten, führen
Register: ''
Beispielsätze: |-
  Molti cittadini sperano che il nuovo sindaco sappia *governare* con saggezza.
  Viele Bürger hoffen, dass der neue Bürgermeister mit Weisheit *regieren* kann.
  
  Se avessi il potere, *governerei* questo paese in modo molto diverso.
  Wenn ich die Macht hätte, würde ich dieses Land ganz anders *verwalten*.
  
  I filosofi antichi dibattevano su chi dovesse *governare* la città.
  Die antiken Philosophen diskutierten darüber, wer die Stadt *führen* sollte.
  
  Quando ero piccolo, credevo che il presidente potesse *governare* tutto a suo piacimento.
  Als ich klein war, glaubte ich, der Präsident könne alles nach Belieben *regieren*.
  
  È difficile *governare* una nazione senza il sostegno della maggioranza.
  Es ist schwer, eine Nation ohne Unterstützung der Mehrheit zu *verwalten*.
