Definition: fotografieren
Register: ''
Beispielsätze: |-
  Mi piace *fotografare* i paesaggi quando viaggio.
  Ich mag es, *Landschaften zu fotografieren*, wenn ich reise.
  
  Vorresti che ti *fotografassi* mentre mangi la pizza?
  Soll ich dich *fotografieren*, während du die Pizza isst?
  
  Ha promesso di *fotografare* ogni angolo della città prima di partire.
  Sie hat versprochen, *jeden Winkel der Stadt zu fotografieren*, bevor sie abreist.
  
  Se avessi tempo, *fotograferei* anche i dettagli più piccoli.
  Wenn ich Zeit hätte, würde ich auch die kleinsten Details *fotografieren*.
  
  È raro trovare qualcuno che sappia *fotografare* con tanta pazienza.
  Es ist selten, jemanden zu finden, der so geduldig *fotografieren* kann.
