Rang: 520
Wort: bocca
Wortart: n.f
Wort mit Artikel: la bocca
Femininum / Plural: bocche
IPA: ''
Definition: der Mund, -¨er
Register: ''
Beispielsätze: |-
  La *bocca* del re era piena di parole d'onore.
  Der *Mund* des Königs war voller Ehrenworte.
  
  Dopo aver scioccato il gruppo, nessuno osava aprire la *bocca* in sua presenza.
  Nachdem er die Gruppe erschreckt hatte, wagte niemand, den *Mund* in seiner Gegenwart zu öffnen.
  
  Mentre sistemava il caffè sulla tavola, ha accidentalmente rovesciato un intero bicchiere d'acqua sulla sua *bocca*.
  Während er den Kaffee auf den Tisch stellte, verschüttete er versehentlich ein ganzes Glas Wasser über seinen *Mund*.
  
  Se avessi saputo che stavi per aprire la *bocca* solo per spaventarci, non avrei accettato il tuo invito.
  Hätte ich gewusst, dass du den *Mund* nur öffnen würdest, um uns zu erschrecken, hätte ich deine Einladung nicht angenommen.
  
  Nella *bocca* del sistema, ogni errore può avere conseguenze serie.
  Im *Mund* des Systems kann jeder Fehler ernsthafte Folgen haben.
