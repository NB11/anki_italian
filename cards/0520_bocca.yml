  Vor dem Eingang hing ein Schild mit der Aufschrift „*Mund der Wahrheit*.“
  
  Chiudere *la bocca* mentre mastichi, è educato.
  Es ist höflich, *den Mund* zuzumachen, während du kaust.
  
  Non ricordo cosa ho detto con *la bocca* secca.
  Ich erinnere mich nicht, was ich mit *trockenem Mund* gesagt habe.
