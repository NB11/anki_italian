Rang: 1863
Wort: svellere
Wortart: vt
Wort mit Artikel: svellere
Femininum / Plural: ''
IPA: ''
Definition: ausreißen, herausziehen
Register: ''
Beispielsätze: |-
  La radice del fiore sembra difficile da *svellere* senza danneggiarla.
  Die Wurzel der Blume scheint schwer *auszureißen*, ohne sie zu beschädigen.
  
  Avrei voluto che tu *svellessi* quel poster dalla parete.
  Ich hätte gewünscht, dass du das Poster von der Wand *herausreißt*.
  
  Non appena avrò *svelto* questo chiodo, potremo appendere il quadro.
  Sobald ich diesen Nagel *ausgerissen* habe, können wir das Bild aufhängen.
  
  Se non riesci a *svelgere* la porta, forse dovremmo chiamare un fabbro.
  Wenn du die Tür nicht *aufbrechen* kannst, sollten wir vielleicht einen Schlüsseldienst rufen.
  
  Credo che lei sia in grado di *svellere* questo dente senza problemi.
  Ich glaube, sie kann diesen Zahn *ziehen*, ohne Probleme.
