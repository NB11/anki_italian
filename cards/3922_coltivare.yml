Rang: 3922
Wort: coltivare
Wortart: vt
Wort mit Artikel: coltivare
Femininum / Plural: ''
IPA: ''
Definition: anbauen, züchten
Register: ''
Beispielsätze: |-
  Mio nonno *coltiva* pomodori nel suo orto ogni estate.
  Mein Opa *baut* im Sommer Tomaten in seinem Garten an.
  
  Se avessimo più tempo, *coltiveremmo* anche delle erbe aromatiche sul balcone.
  Wenn wir mehr Zeit hätten, würden wir auch Kräuter auf dem Balkon *anbauen*.
  
  La cooperativa agricola *coltiva* prodotti biologici da oltre vent'anni, ottenendo sempre ottime rese.
  Die Landwirtschaftsgenossenschaft *baut* seit über zwanzig Jahren Bio-Produkte an und erzielt stets hervorragende Erträge.
  
  Gli ambientalisti chiedono che si *coltivino* varietà autoctone invece di specie invasive.
  Die Umweltschützer fordern, dass man einheimische Sorten *anbaut*, statt invasive Arten.
  
  Hai mai provato a *coltivare* le tue verdure? È più semplice di quanto sembri.
  Hast du schon mal versucht, dein eigenes Gemüse *anzubauen*? Das ist einfacher als es scheint.
