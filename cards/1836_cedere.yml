Rang: 1836
Wort: cedere
Wortart: v
Wort mit Artikel: cedere
Femininum / Plural: ''
IPA: ''
Definition: nachgeben, abtreten
Register: ''
Beispielsätze: |-
  Non *cedere* alla tentazione di mangiare troppi dolci!
  Gib nicht der *Versuchung* nach, zu viele Süßigkeiten zu essen!
  
  Se tu *cedessi* più spesso, avremmo meno litigi in famiglia.
  Wenn du öfter *nachgeben* würdest, hätten wir weniger Streit in der Familie.
  
  Il giocatore ha dovuto *cedere* il posto al compagno più giovane.
  Der Spieler musste seinen Platz dem jüngeren *Mannschaftskollegen* abtreten.
  
  Prima di *cedere* al ricatto, rifletti sulle conseguenze legali!
  Bevor du dem *Erpressung* nachgibst, bedenke die rechtlichen Konsequenzen!
  
  Nonostante le difficoltà, non voglio *cedere* ai miei obiettivi.
  Trotz der *Schwierigkeiten* möchte ich meinen Zielen nicht nachgeben.
