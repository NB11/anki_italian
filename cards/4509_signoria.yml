Rang: 4509
Wort: signoria
Wortart: n.f
Wort mit Artikel: la signoria
Femininum / Plural: signorie
IPA: ''
Definition: die Herrschaft, -en, die Gewalt, die Macht
Register: ''
Beispielsätze: |-
  Nel Medioevo, la *signoria* locale spesso governava con pugno di ferro.
  Im Mittelalter regierte die *Herrschaft* vor Ort oft mit eiserner Faust.
  
  La *signoria* di questo piccolo paese era contesa tra due famiglie nobili.
  Die *Herrschaft* über dieses kleine Dorf wurde zwischen zwei Adelsfamilien umstritten.
  
  Malgrado la *signoria* corrotta, la popolazione non si ribellò mai apertamente.
  Trotz der *korrupten Macht* erhob sich die Bevölkerung nie offen gegen sie.
  
  Se avessi il potere, abolirei ogni forma di *signoria* oppressiva.
  Wenn ich Macht hätte, würde ich jede Form von *unterdrückender Herrschaft* abschaffen.
  
  La *signoria* veneziana dominò il Mediterraneo per secoli grazie alla sua flotta potente.
  Die *venezianische Herrschaft* beherrschte jahrhundertelang das Mittelmeer dank ihrer mächtigen Flotte.
