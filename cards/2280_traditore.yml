Rang: 2280
Wort: traditore
Wortart: n.m
Wort mit Artikel: il traditore
Femininum / Plural: traditori
IPA: ''
Definition: der Verräter, -
Register: ''
Beispielsätze: |-
  Non mi fido più di lui perché è un *traditore* che ha tradito tutti i suoi amici.
  Ich vertraue ihm nicht mehr, weil er ein *Verräter* ist, der alle seine Freunde betrogen hat.
  
  Se verrai lesso, sarai considerato un *traditore* della nostra famiglia!
  Wenn du verräterisch handelst, wirst du als *Verräter* unserer Familie gelten!
  
  Il generale scoprì che il prigioniero era un *traditore* e lo fece arrestare immediatamente.
  Der General erfuhr, dass der Gefangene ein *Verräter* war, und ließ ihn sofort verhaften.
  
  Secondo la leggenda, il *traditore* tradì il suo popolo per un sacco di oro, ma alla fine fu punito severamente.
  Laut der Legende verriet der *Verräter* sein Volk für einen Sack Gold, wurde aber schließlich hart bestraft.
  
  Chiunque si allei con loro dovrebbe sapere che diventerebbe un *traditore* agli occhi di tutti.
  Wer sich mit ihnen verbündet, sollte wissen, dass er damit zum *Verräter* in den Augen aller wird.
