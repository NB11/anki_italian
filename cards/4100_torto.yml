Rang: 4100
Wort: torto
Wortart: n.m
Wort mit Artikel: il torto
Femininum / Plural: i torti
IPA: ''
Definition: das Unrecht, -e
Register: ''
Beispielsätze: |-
  Ha fatto un *torto* a suo fratello senza rendersene conto.
  Er hat seinem Bruder ein *Unrecht* angetan, ohne es zu merken.
  
  Nonostante il *torto* subito, lei gli ha perdonato tutto.
  Trotz des erlittenen *Unrechts* hat sie ihm alles vergeben.
  
  Credi che sia giusto chiedere scusa per questo *torto*?
  Glaubst du, es ist richtig, sich für dieses *Unrecht* zu entschuldigen?
  
  Se avessi saputo del *torto* che ti ho fatto, mi sarei scusato subito.
  Hätte ich gewusst, welches *Unrecht* ich dir angetan habe, hätte ich mich sofort entschuldigt.
  
  Non è un *torto* voler difendere i propri diritti, vero?
  Es ist kein *Unrecht*, seine Rechte zu verteidigen, oder?
