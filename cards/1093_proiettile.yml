Rang: 1093
Wort: proiettile
Wortart: n.m
Wort mit Artikel: il proiettile
Femininum / Plural: proiettili
IPA: ''
Definition: das Geschoss, -e
Register: ''
Beispielsätze: |-
  Il *proiettile* ha colpito il bersaglio con precisione sorprendente.
  Das *Geschoss* hat das Ziel mit überraschender Präzision getroffen.
  
  Dopo la guerra, molti *proiettili* sono stati raccolti nelle zone di combattimento.
  Nach dem Krieg wurden viele *Geschosse* in den Kampfgebieten eingesammelt.
  
  Se trovi un *proiettile* inesploso, non toccarlo e chiama subito le autorità.
  Wenn du eine *ungesprengte Granate* findest, berühre sie nicht und rufe sofort die Behörden.
  
  La polizia sta cercando il *proiettile* che ha ucciso il testimone durante il processo.
  Die Polizei sucht das *Geschoss*, das den Zeugen während des Verfahrens getötet hat.
  
  Nonostante l’età, l’ex soldato conserva ancora un *proiettile* del suo primo conflitto come ricordo.
  Trotz seines Alters bewahrt der ehemalige Soldat noch immer ein *Geschoss* aus seinem ersten Konflikt als Erinnerung.
