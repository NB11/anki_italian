Rang: 2376
Wort: cabina
Wortart: n.f
Wort mit Artikel: la cabina
Femininum / Plural: cabine
IPA: ''
Definition: die Kabine, -n
Register: ''
Beispielsätze: |-
  Ho prenotato una *cabina* privata in piscina perché preferisco non nuotare tra tanta gente.
  Ich habe eine *Kabine* privat im Schwimmbad gebucht, weil ich es nicht mag, zwischen so vielen Menschen zu schwimmen.
  
  Quando siamo arrivati all’aeroporto, abbiamo trovato tutte le *cabine* per il check-in già occupate.
  Als wir am Flughafen ankamen, hatten wir festgestellt, dass alle *Kabinen* für die Abfertigung bereits belegt waren.
  
  Se non trovi *una cabina* telefonica libera, possiamo usare il nostro cellulare.
  Wenn du keine freie *Telefonzelle* findest, können wir unser Handy benutzen.
  
  La *cabina* di pilotaggio dell’aereo sembrava molto moderna e piena di tecnologie avanzate.
  Die *Cockpitkabine* des Flugzeugs wirkte sehr modern und voller fortschrittlicher Technologien.
  
  Nonostante la pioggia, abbiamo deciso di fare una passeggiata fino alla *cabina* di legno vicino al lago.
  Trotz des Regens beschlossen wir, bis zur Holzhütte am See spazieren zu gehen.
