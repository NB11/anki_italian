Rang: 4091
Wort: vicinanza
Wortart: n.f
Wort mit Artikel: la vicinanza
Femininum / Plural: vicinanze
IPA: ''
Definition: die Nähe, -n
Register: ''
Beispielsätze: |-
  La *vicinanza* tra noi è cresciuta dopo quel viaggio insieme.
  Die *Nähe* zwischen uns ist nach dieser gemeinsamen Reise gewachsen.
  
  Non sopporto la *vicinanza* di quella persona; preferisco stare da solo.
  Ich ertrage die *Nähe* dieser Person nicht; ich ziehe es vor, allein zu sein.
  
  Ho sentito una strana *vicinanza* con lui fin dal primo incontro.
  Ich habe seit dem ersten Treffen eine seltsame *Nähe* zu ihm gespürt.
  
  La *vicinanza* del supermerato è comodissima per fare la spesa ogni giorno.
  Die *Nähe* des Supermarktes ist äußerst praktisch, um täglich einzukaufen.
  
  Se vuoi risolvere il problema, la *vicinanza* ai clienti è fondamentale.
  Wenn du das Problem lösen willst, ist die *Nähe* zu den Kunden entscheidend.
