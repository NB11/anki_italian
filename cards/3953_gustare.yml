Rang: 3953
Wort: gustare
Wortart: v
Wort mit Artikel: gustare
Femininum / Plural: ''
IPA: ''
Definition: schmecken, kosten, probieren
Register: ''
Beispielsätze: |-
  Mi *gusta* molto il gelato alla fragola che abbiamo mangiato ieri.
  Ich mag das Erdbeereis, das wir gestern gegessen haben, sehr.
  
  Non *gusterei* mai un cibo così piccante, mi brucerebbe lo stomaco!
  Ein solch scharfes Essen würde ich niemals *probieren*, das würde mir den Magen verbrennen!
  
  Spero che ti *sia* piaciuto il vino che ho scelto per cena.
  Ich hoffe, der Wein, den ich zum Abendessen ausgesucht habe, hat dir *geschmeckt*.
  
  Quando vado al mercato, mi piace *gustare* un po' di formaggio prima di comprarlo.
  Wenn ich auf den Markt gehe, probiere ich gerne ein bisschen Käse, bevor ich ihn kaufe.
  
  Mi hanno detto che se non *gusti* la cucina giapponese almeno una volta nella vita, non hai ancora vissuto davvero.
  Man hat mir gesagt, wenn man japanische Küche nicht wenigstens einmal im Leben *kostet*, hat man noch nicht wirklich gelebt.
