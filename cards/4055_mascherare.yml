Rang: 4055
Wort: mascherare
Wortart: vt
Wort mit Artikel: mascherare
Femininum / Plural: ''
IPA: ''
Definition: verbergen, tarnen, verschleiern
Register: ''
Beispielsätze: |-
  Hai provato a *mascherare* la tua delusione con un sorriso forzato?
  Versuchst du, deine Enttäuschung mit einem gezwungene*n Lächeln* zu verbergen?
  
  Nonostante l’oscurità della stanza, non riuscì a *mascherare* la sua paura.
  Trotz der Dunkelheit des Raumes konnte er seine Angst nicht *verbergen*.
  
  Per *mascherare* l’odore sgradevole del pesce, la mamma aggiunse spezie aromatiche.
  Um den unangenehme*n Geruch* des Fischs zu tarnen, fügte die Mutter aromatische Gewürze hinzu.
  
  Se avessi saputo *mascherare* meglio le tue emozioni, non avremmo litigato.
  Hättest du deine Gefühle besser *verhüllt*, hätten wir uns nicht gestritten.
  
  Gli scienziati studiano come gli animali riescano a *mascherare* la loro presenza ai predatori.
  Die Wissenschaftler untersuchen, wie Tiere es schaffen, ihre Anwesenheit vor Raubtieren zu *tarnen*.
