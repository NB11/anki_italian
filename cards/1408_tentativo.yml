Rang: 1408
Wort: tentativo
Wortart: n.m
Wort mit Artikel: il tentativo
Femininum / Plural: i tentativi
IPA: ''
Definition: der Versuch, -e
Register: ''
Beispielsätze: |-
  Dopo tre *tentativi* falliti, decise di cambiare strategia.
  Nach *drei* Versuchen schiefgegangen, beschloss sie, die Strategie zu ändern.
  
  È il suo primo *tentativo* di risolvere il problema da solo, ma sembra promettente.
  Es ist sein *erster Versuch*, das Problem allein zu lösen, aber es scheint vielversprechend.
  
  Pensavo che il *tentativo* di fuga sarebbe riuscito, ma la polizia li ha catturati in pochi minuti.
  Ich dachte, der *Fluchtversuch* würde gelingen, doch die Polizei fing sie innerhalb weniger Minuten.
  
  Che *tentativo*! Hai usato un metodo davvero ingegnoso per risolvere il problema.
  Was für ein *toller Versuch*! Du hast eine wirklich geniale Methode angewendet, um das Problem zu lösen.
  
  Se avessi fatto più *tentativi*, forse avresti imparato la lezione, ma hai rinunciato troppo presto.
  Hättest du mehr *Versuche* unternommen, vielleicht hättest du die Lehre gezogen, aber du hast zu schnell aufgegeben.
