Rang: 2809
Wort: evviva
Wortart: n.m
Wort mit Artikel: l'evviva
Femininum / Plural: gli evviva
IPA: ''
Definition: der Jubelruf, -e
Register: ''
Beispielsätze: |-
  Quando la squadra ha segnato, tutti hanno gridato *evviva*!
  Als die Mannschaft das Tor schoss, haben alle *Jubelrufe* gerufen!
  
  Davanti al palazzo del sindaco c’erano cartelloni con scritto *Evviva la libertà*!
  Vor dem Rathaus hingen Plakate mit der Aufschrift *Es lebe die Freiheit*!
  
  Nonostante la sconfitta, i tifosi hanno cantato *evviva* con orgoglio.
  Trotz der Niederlage sangen die Fans *Jubelrufe* voller Stolz.
  
  Se vincerà l’Italia, sentiremo *evviva* per tutta la notte!
  Wenn Italien gewinnt, werden wir die ganze Nacht lang *Jubelrufe* hören!
  
  Dopo l’annuncio della pace, si sono alzati grida di *evviva* da ogni angolo della piazza.
  Nach der Friedensbekanntgabe erhoben sich *Jubelrufe* von jedem Winkel des Platzes.
