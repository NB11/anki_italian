Rang: 751
Wort: occasione
Wortart: n.f
Wort mit Artikel: l'occasione
Femininum / Plural: occasioni
IPA: ''
Definition: die Gelegenheit, -en
Register: ''
Beispielsätze: |-
  Se hai perso *l’occasione* di studiare all’estero, potresti rimetterci per sempre.
  Wenn du *die Gelegenheit* verpasst hast, im Ausland zu studieren, könntest du sie für immer verlieren.
  
  Ho trovato *un’occasione* d’oro per comprare quel computer che volevo da mesi.
  Ich habe *eine goldene Gelegenheit* gefunden, diesen Computer zu kaufen, den ich seit Monaten wollte.
  
  Davanti alla sala piena di gente, non volevo *l’occasione* di ballare con lui.
  Vor dem vollen Saal wollte ich *die Gelegenheit* nicht verpassen, mit ihm zu tanzen.
  
  Non è *un’occasione* da buttare via: organizzeremo una festa per sorprendere gli amici.
  Das ist *keine Gelegenheit*, die man wegwirft: wir werden eine Party organisieren, um die Freunde zu überraschen.
  
  Suppongo che tu abbia perso *l’occasione* di vedere quella famosa stella al planetario, ieri sera.
  Ich nehme an, du hast *die Gelegenheit* verpasst, jenen berühmten Stern gestern Abend im Planetarium zu sehen.
