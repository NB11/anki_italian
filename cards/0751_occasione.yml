Rang: 751
Wort: occasione
Wortart: n.f
Wort mit Artikel: l'occasione
Femininum / Plural: occasioni
IPA: ''
Definition: die Gelegenheit, -en
Register: ''
Beispielsätze: |-
  Questa è un'*occasione* unica per imparare l'italiano!
  Das ist eine *Gelegenheit*, Italienisch zu lernen!
  
  Non ho perso *l'occasione* di visitare Roma.
  Ich habe die *Gelegenheit* nicht verpasst, Rom zu besuchen.
  
  Se avessi un po' di tempo, sfrutterei *l'occasione*.
  Wenn ich Zeit hätte, würde ich die *Gelegenza* nutzen.
  
  Credi che questa sia *l'occasione* giusta per chiedere un aumento?
  Glaubst du, das ist die richtige *Gelegenheit*, nach einer Gehaltserhöhung zu fragen?
  
  Avrei accettato *l'occasione* senza pensarci due volte.
  Ich hätte die *Gelegenheit* angenommen, ohne zweimal nachzudenken.
