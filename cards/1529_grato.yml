Rang: 1529
Wort: grato
Wortart: adj
Wort mit Artikel: grato
Femininum / Plural: grati
IPA: ''
Definition: dankbar
Register: ''
Beispielsätze: |-
  Sono *grato* per il tuo aiuto con i compiti.
  Ich bin *dankbar* für deine Hilfe bei den Hausaufgaben.
  
  Se fossi al suo posto, mi sentirei *grato* verso chi mi ha salvato.
  Wäre ich an seiner Stelle, würde ich mich *dankbar* gegenüber denen fühlen, die mich gerettet haben.
  
  Sebbene il risultato non sia perfetto, sono *grato* per il lavoro svolto.
  Obwohl das Ergebnis nicht perfekt ist, bin ich *dankbar* für die geleistete Arbeit.
  
  Mi ha scritto una lettera per dimostrare quanto fosse *grato* della mia presenza.
  Er schrieb mir einen Brief, um zu zeigen, wie *dankbar* er für meine Anwesenheit war.
  
  Sarei *grato* se potessi esprimere la mia gratitudine anche in pubblico.
  Ich wäre *dankbar*, wenn du meine Dankbarkeit auch öffentlich ausdrücken könntest.
