Rang: 2026
Wort: panico
Wortart: n.m
Wort mit Artikel: il panico
Femininum / Plural: i panici
IPA: ''
Definition: die Panik
Register: ''
Beispielsätze: |-
  Quando ha visto l'orso, ha avuto un *panico* improvviso.
  Als er den Bären sah, bekam er eine plötzliche *Panik*.
  
  Nonostante il *panico*, ha mantenuto la calma e chiamato la polizia.
  Trotz der *Panik* blieb sie ruhig und rief die Polizei an.
  
  Il film era così spaventoso che ho provato un *panico* irrazionale durante la scena finale.
  Der Film war so gruselig, dass ich während der letzten Szene eine irrationale *Panik* spürte.
  
  Se avessi saputo che c'era un terremoto, non sarei entrato in *panico* così velocemente.
  Wenn ich gewusst hätte, dass ein Erdbeben bevorstand, wäre ich nicht so schnell in *Panik* verfallen.
  
  La folla è scoppiata in *panico* quando qualcuno ha gridato 'Fuoco!'.
  Die Menschenmenge geriet in *Panik*, als jemand 'Feuer!' schrie.
