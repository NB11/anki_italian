Rang: 1244
Wort: prestare
Wortart: vt
Wort mit Artikel: prestare
Femininum / Plural: ''
IPA: ''
Definition: leihen, verleihen
Register: ''
Beispielsätze: |-
  Mi puoi *prestare* cinquanta euro fino a domani?
  Kannst du mir *bis morgen* fünfzig Euro leihen?
  
  Ha *prestato* la sua macchina a un amico che abita lontano.
  Er hat sein Auto *an einen Freund verliehen*, der weit weg wohnt.
  
  Se non avessi *prestato* il libro al professore, avrei finito il romanzo.
  Wenn ich dem Professor das Buch nicht *ausgeliehen hätte*, hätte ich den Roman beendet.
  
  Non vorrei *prestare* la mia moto a nessuno, è troppo preziosa.
  Ich würde *verleihen* niemandem mein Motorrad, es ist zu wertvoll.
  
  Lui ha promesso che *presterà* attenzione a ciò che gli dicono.
  Er hat versprochen, *aufmerksam zu sein*, was man ihm sagt.
