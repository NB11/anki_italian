Rang: 1544
Wort: topo
Wortart: n.m
Wort mit Artikel: il topo
Femininum / Plural: topi
IPA: ''
Definition: die Maus, -mäuse
Register: ''
Beispielsätze: |-
  Nel laboratorio scientifico stiamo osservando un *topo* bianco per studiare le sue reazioni.
  Im *Laboratorium* beobachten wir eine weiße Maus, um ihre Reaktionen zu studieren.
  
  I *topi* erano così veloci che non sono riuscito a catturarne nemmeno uno.
  Die *Mäuse* waren so schnell, dass ich keine einzige einfangen konnte.
  
  Hai mai sentito parlare del *topo* che viveva in quella casa abbandonata?
  Hast du schon mal von der *Maus* gehört, die in diesem verlassenen Haus lebte?
  
  Se vedrai un *topo* in cucina, chiama subito l’addetto alla manutenzione!
  Wenn du eine *Maus* in der Küche siehst, rufe sofort den Hausmeister!
  
  L’esperimento purtroppo è fallito perché il *topo* è scappato prima che potessimo raccogliere i dati necessari.
  Das Experiment ist leider gescheitert, weil die *Maus* entkam, bevor wir die nötigen Daten sammeln konnten.
