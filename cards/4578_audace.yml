Rang: 4578
Wort: audace
Wortart: adj
Wort mit Artikel: audace
Femininum / Plural: ''
IPA: ''
Definition: kühn, mutig, wagemutig, verwegen
Register: ''
Beispielsätze: |-
  Il suo atteggiamento *audace* durante la riunione ha sorpreso tutti i colleghi.
  Seine *gewagte* Haltung während der Besprechung hat alle Kollegen überrascht.
  
  Credo che sia un piano troppo *audace* per i nostri mezzi attuali.
  Ich glaube, es ist ein *kühn* Plan für unsere aktuellen Mittel.
  
  Nonostante la tempesta, il capitano ha preso una decisione *audace* per salvare la nave.
  Trotz des Sturms traf der Kapitän eine *entschlossene* Entscheidung, um das Schiff zu retten.
  
  Sarebbe stato *audace* da parte sua accettare l'incarico senza alcuna esperienza precedente.
  Es wäre *verwegen* von ihm gewesen, den Auftrag ohne vorherige Erfahrung anzunehmen.
  
  Il suo discorso *audace* alla conferenza ha ispirato molti giovani imprenditori.
  Seine *kühne* Rede auf der Konferenz hat viele junge Unternehmer inspiriert.
