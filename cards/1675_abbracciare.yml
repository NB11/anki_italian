Rang: 1675
Wort: abbracciare
Wortart: vt
Wort mit Artikel: abbracciare
Femininum / Plural: ''
IPA: ''
Definition: umarmen, umfassen, umarmen, einbeziehen
Register: ''
Beispielsätze: |-
  Nonno *abbracciava* il nipotino prima di andare a letto ogni sera.
  Opa *umarmen* das Enkelkind jeden Abend vor dem Schlafengehen.
  
  Se non *abbracceremo* la nuova tecnologia, perderemo il treno del progresso.
  Wenn wir die neue Technologie nicht *einbeziehen*, verpassen wir den Zug des Fortschritts.
  
  L’uomo, dopo aver trovato il ladro nel corridoio, decise di *abbracciare* la famiglia per calmarla.
  Der Mann, nachdem er den *Dieb* im Flur gefunden hatte, beschloss, die Familie zu umarmen, um sie zu beruhigen.
  
  Nonostante le assicurazioni promettono sicurezza, molti temono ancora di *abbracciare* il cambiamento.
  Auch wenn die *Versicherungen* Sicherheit versprechen, fürchten sich viele noch, die Veränderung anzunehmen.
  
  Il papa volle *abbracciare* i fedeli nonostante la pioggia battesse senza sosta sulla marina.
  Der Papst wollte die Gläubigen *umarmen*, obwohl der Regen ununterbrochen auf den Kai prasselte.
