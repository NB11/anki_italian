Rang: 600
Wort: occhiata
Wortart: n.f
Wort mit Artikel: lo occhiata
Femininum / Plural: occhiate
IPA: ''
Definition: der Blick, -e
Register: ''
Beispielsätze: |-
  Il poliziotto ha dato una *occhiata* alla patente dell'autista.
  Der Polizist hat einen *Blick* auf den Führerschein des Fahrers geworfen.
  
  Non ti azzardare a dare una *occhiata* ai miei appunti!
  Wage es nicht, einen *Blick* in meine Notizen zu werfen!
  
  Finalmente ho dato una *occhiata* al programma della conferenza generale.
  Endlich habe ich einen *Blick* auf das Programma der allgemeinen Konferenz geworfen.
  
  Ho bisogno di una *occhiata* più attenta riguardo a quel documento.
  Ich benötige einen genaueren *Blick* in Bezug auf jenes Dokument.
  
  Non appena l'ho vista, le ho rivolto una *occhiata* di sorpresa.
  Sobald ich sie gesehen habe, habe ich ihr einen *Blick* des Erstaunens zugeworfen.
