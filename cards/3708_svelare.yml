Rang: 3708
Wort: svelare
Wortart: vt
Wort mit Artikel: svelare
Femininum / Plural: ''
IPA: ''
Definition: enthüllen, aufdecken, offenbaren
Register: ''
Beispielsätze: |-
  Il detective ha *svelato* il mistero dopo mesi di indagini.
  Der Detektiv hat das Geheimnis nach Monaten der Ermittlungen *aufgedeckt*.
  
  Hanno promesso di *svelare* la verità al più presto, ma non l’hanno ancora fatto.
  Sie haben versprochen, die Wahrheit so schnell wie möglich *zu enthüllen*, aber sie haben es noch nicht getan.
  
  Se avessi saputo che mi avrebbe *svelato* tutti i suoi segreti, non gli avrei mai raccontato il mio.
  Wenn ich gewusst hätte, dass er mir *alle* seine Geheimnisse offenbaren würde, hätte ich ihm nie meine erzählt.
  
  L’ispettore spera di poter *svelare* il colpevole entro la fine della settimana.
  Der Inspektor hofft, den Täter noch vor Ende der Woche *überführen* zu können.
  
  È inevitabile che prima o poi qualcuno *sveli* la tua copertura.
  Es ist *unausweichlich*, dass früher oder später jemand deine Tarnung enthüllt.
