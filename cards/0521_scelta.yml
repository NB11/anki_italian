Rang: 521
Wort: scelta
Wortart: n.f
Wort mit Artikel: la scelta
Femininum / Plural: scelte
IPA: ''
Definition: die Wahl, -en
Register: ''
Beispielsätze: |-
  Qual è la *scelta* migliore per il viaggio di domani?
  Was ist die *beste Wahl* für die Reise von morgen?
  
  Nonostante il rapporto difficile con il presidente, ha fatto una *scelta* eroica.
  Trotz des *schwierigen Verhältnisses* mit dem Präsidenten traf er eine heldenhafte Entscheidung.
  
  Se avessi più tempo, rifarei la *scelta* di suonare il violino al posto del caffè.
  Wenn ich mehr Zeit hätte, würde ich die *Wahl*, Klavier statt Kaffee zu spielen, noch einmal treffen.
  
  La *scelta* di alzare la voce non era stata una intenzione, ma purtroppo ha spaventato Benissimo.
  Die *Entscheidung*, die Stimme zu erhöhen, war keine Absicht, aber sie hat Benissimo leider erschreckt.
  
  Dopo aver visto i risultati, si pentì della *scelta* di non sistemare la camera per tempo.
  Nach dem Betrachten der Ergebnisse bereute er die *Wahl*, das Zimmer nicht rechtzeitig einzurichten.
