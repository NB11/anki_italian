Rang: 2271
Wort: pesca
Wortart: n.m
Wort mit Artikel: il pesca
Femininum / Plural: pesche
IPA: ''
Definition: der Pfirsich, -e
Register: ''
Beispielsätze: |-
  Mio nonno coltiva *pesche* nel suo orto da oltre trent'anni.
  Mein Opa baut seit über dreißig Jahren *Pfirsiche* in seinem Garten an.
  
  Non mangiare quella *pesca*: ha un verme dentro!
  Iss diesen *Pfirsich* nicht: da ist ein Wurm drin!
  
  Se andiamo al mercato, comprerò due chili di *pesche* molto mature.
  Wenn wir zum Markt gehen, kaufe ich zwei Kilo sehr reife *Pfirsiche*.
  
  Hai mai assaggiato le *pesche* noce, che hanno un sapore così particolare?
  Hast du schon mal *Pfirsiche* mit Nussgeschmack probiert, die so besonders schmecken?
  
  Nonna dice che le *pesche* più dolci si trovano solo in questa zona della collina.
  Oma sagt, dass die süßesten *Pfirsiche* nur in dieser Zone des Hügels zu finden sind.
