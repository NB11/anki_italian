Rang: 4967
Wort: scartoffia
Wortart: n.f
Wort mit Artikel: la scartoffia
Femininum / Plural: le scartoffie
IPA: ''
Definition: der Papierkram, die Unterlagen
Register: ''
Beispielsätze: |-
  Devo sistemare *le scartoffie* prima della riunione di domani.
  Ich muss *den Papierkram* vor dem Meeting morgen sortieren.
  
  Dopo l’inaugurazione, la sindaca ha firmato una montagna di *scartoffie*.
  Nach der Eröffnung hat die Bürgermeisterin einen Berg *von Unterlagen* unterschrieben.
  
  Non sopporto più tutta questa *scartoffia* inutile che mi riempie la scrivania.
  Ich kann diesen ganzen überflüssigen *Papierkram* auf meinem Schreibtisch nicht mehr ertragen.
  
  Se vuoi aprire un’attività, preparati a gestire *scartoffie* di ogni genere.
  Wenn du ein Unternehmen gründen willst, musst du dich auf *Papierkram* aller Art einstellen.
  
  La *scartoffia* burocratica è il vero nemico dei piccoli imprenditori.
  Der bürokratische *Papierkram* ist der wahre Feind kleiner Unternehmer.
