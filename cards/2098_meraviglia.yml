Beispielsätze: |-
  La vista del mare dall’alto è una *meraviglia* senza fine.
  Die Aussicht auf das Meer von oben ist ein *Wunder* ohne Ende.
  
  Ho provato una *meraviglia* infinita quando ho visto il dipinto originale.
  Ich empfand ein *Wunder* der Unendlichkeit, als ich das Originalgemälde sah.
  
  La *meraviglia* di quella scoperta ha cambiato per sempre la scienza.
  Die *Wunder* dieser Entdeckung haben die Wissenschaft für immer verändert.
  
  Non riesco a descrivere la *meraviglia* che ho provato dinanzi a quei paesaggi.
  Ich kann das *Wunder* nicht beschreiben, das ich angesichts dieser Landschaften empfunden habe.
  
  Se avessi tempo, vorrei ammirare ogni *meraviglia* naturale del mondo.
  Wenn ich Zeit hätte, würde ich jedes *Wunder* der Natur auf der Welt bewundern.
