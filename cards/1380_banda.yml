Rang: 1380
Wort: banda
Wortart: n.f
Wort mit Artikel: la banda
Femininum / Plural: le bande
IPA: ''
Definition: die Bande, -n
Register: ''
Beispielsätze: |-
  La *banda* di ladri ha rubato molti gioielli durante la notte.
  Die *Bande* von Dieben hat viele Juwelen in der Nacht gestohlen.
  
  Nonostante le prove, l’ispettore ha negato l’esistenza della *banda*.
  Trotz der Beweise hat der Inspektor das Bestehen der *Bande* abgestritten.
  
  Se avessi più tempo, insisterei per smantellare quella *banda* criminale.
  Wenn ich mehr Zeit hätte, würde ich darauf beharren, jene kriminelle *Bande* zu zerschlagen.
  
  I poliziotti sospettano che la *banda* operi direttamente dalla fonte del crimine organizzato.
  Die Polizisten vermuten, dass die *Bande* direkt aus der Quelle der organisierten Kriminalität operiert.
  
  L’*ala* destra del loro movimento è stata smantellata dopo aver provocato un vero miracolo di caos.
  Der rechte *Flügel* ihrer Bewegung wurde zerschlagen, nachdem er ein echtes Wunder an Chaos ausgelöst hatte.
