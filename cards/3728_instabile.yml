Rang: 3728
Wort: instabile
Wortart: adj
Wort mit Artikel: instabile
Femininum / Plural: ''
IPA: ''
Definition: unstabil, labil
Register: ''
Beispielsätze: |-
  Il ponte è *instabile* dopo la tempesta e richiede delle riparazioni urgenti.
  Die Brücke ist nach dem Sturm *instabil* und benötigt dringend Reparaturen.
  
  Credo che il suo carattere sia *instabile*: passa dalla gioia alla tristezza in pochi minuti.
  Ich glaube, sein Charakter ist *labil*: Er wechselt innerhalb weniger Minuten von Freude zu Traurigkeit.
  
  Se avessimo saputo che il terreno era *instabile*, non avremmo costruito la casa lì.
  Wenn wir gewusst hätten, dass der Boden *unstabil* war, hätten wir das Haus nicht dort gebaut.
  
  Le condizioni meteorologiche rimangono *instabili* per tutto il fine settimana.
  Die Wetterbedingungen bleiben das gesamte Wochenende über *instabil*.
  
  Nonostante le apparenze, la sua posizione è *instabile* e potrebbe cambiare da un momento all'altro.
  Trotz des äußeren Anscheins ist seine Position *labil* und könnte sich jeden Moment ändern.
