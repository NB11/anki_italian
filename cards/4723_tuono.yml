Rang: 4723
Wort: tuono
Wortart: n.m
Wort mit Artikel: il tuono
Femininum / Plural: tuoni
IPA: ''
Definition: der Donner
Register: ''
Beispielsätze: |-
  Ho sentito un forte *tuono* ieri sera mentre guardavo la televisione.
  Ich habe gestern Abend einen starken *Donner* gehört, während ich ferngesehen habe.
  
  Se avessi saputo che sarebbe venuto un *tuono*, non sarei uscito di casa.
  Wenn ich gewusst hätte, dass ein *Donner* kommt, wäre ich nicht aus dem Haus gegangen.
  
  Quando *tuonò* così forte, tutti i bambini si nascosero sotto il letto.
  Als es so stark *donnerte*, versteckten sich alle Kinder unter dem Bett.
  
  Mi dispiace per il ritardo: c'è stato un *tuono* che ha fatto saltare la luce.
  Entschuldige die Verspätung: Es hat ein *Donner* gegeben, der den Strom hat ausfallen lassen.
  
  Nonostante il *tuono* che minacciava di rovinare la festa, alla fine tutto andò liscio.
  Trotz des *Donners*, der die Feier zu ruinieren drohte, ging am Ende alles glatt.
