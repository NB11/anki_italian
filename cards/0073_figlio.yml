Rang: 73
Wort: figlio
Wortart: n.m
Wort mit Artikel: il figlio
Femininum / Plural: i figli
IPA: ''
Definition: der Sohn, -söhne
Register: ''
Beispielsätze: |-
  Il *figlio* di Maria studia ingegneria.
  Der *Sohn* von Maria studiert Ingenieurwesen.
  
  Hai visto i *figli* di Luca?
  Hast du die *Söhne* von Luca gesehen?
  
  Mio *figlio* vuole diventare medico.
  Mein *Sohn* möchte Arzt werden.
  
  I *figli* giocano nel giardino.
  Die *Söhne* spielen im Garten.
  
  Spero che il tuo *figlio* superi l’esame.
  Ich hoffe, dass dein *Sohn* die Prüfung besteht.
