Rang: 73
Wort: figlio
Wortart: n.m
Wort mit Artikel: il figlio
Femininum / Plural: i figli
IPA: ''
Definition: der Sohn, -s̈öhne
Register: ''
Beispielsätze: |-
  Il *figlio* di Maria studia medicina all'università.
  Der *Sohn* von Maria studiert Medizin an der Universität.
  
  Quanti *figli* hai, Marco?
  Wie viele *Söhne* hast du, Marco?
  
  Il suo *figlio* è diventato ingegnere l'anno scorso.
  Sein *Sohn* ist letztes Jahr Ingenieur geworden.
  
  Mi piacerebbe avere un *figlio* che ama la musica.
  Ich hätte gerne einen *Sohn*, der Musik liebt.
  
  I *figli* di Giovanni giocano spesso in giardino.
  Die *Söhne* von Giovanni spielen oft im Garten.
