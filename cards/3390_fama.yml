Rang: 3390
Wort: fama
Wortart: n.f
Wort mit Artikel: la fama
Femininum / Plural: le fami
IPA: ''
Definition: der Ruf, der Ruhm
Register: ''
Beispielsätze: |-
  La *fama* di questo ristorante è cresciuta dopo la recensione sul giornale.
  Der *Ruf* dieses Restaurants ist nach der Zeitungskritik gewachsen.
  
  Nonostante la sua *fama*, lui rimase una persona umile e riservata.
  Trotz seines *Ruhms* blieb er ein bescheidener und zurückhaltender Mensch.
  
  La *fama* di quell’attore si sparse rapidamente in tutta Italia.
  Der *Ruhm* jenes Schauspielers verbreitete sich schnell in ganz Italien.
  
  Se vuoi conquistare la *fama* internazionale, devi lavorare sodo e avere fortuna.
  Wenn du den *Ruhm* in der Welt erlangen willst, musst du hart arbeiten und Glück haben.
  
  La *fama* di quella città come meta turistica è dovuta ai suoi monumenti unici.
  Der *Ruf* dieser Stadt als Reiseziel beruht auf ihren einzigartigen Monumenten.
