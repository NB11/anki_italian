Rang: 401
Wort: distruggere
Wortart: v
Wort mit Artikel: distruggere
Femininum / Plural: ''
IPA: ''
Definition: zerstören, vernichten
Register: ''
Beispielsätze: |-
  Gli scienziati *distruggono* molti ecosistemi con le loro attività.
  Die Wissenschaftler *zerstören* viele Ökosysteme mit ihren Aktivitäten.
  
  Se non avessimo agito, avrebbe *distrutto* tutto il villaggio.
  Hätten wir nicht gehandelt, hätte er das ganze Dorf *zerstört*.
  
  Credo che tu stia per *distruggere* la mia fiducia in te!
  Ich glaube, du wirst mein Vertrauen in dich *zerstören*!
  
  Abbiamo visto come la guerra *distrugge* intere città.
  Wir haben gesehen, wie der Krieg ganze Städte *zerstört*.
  
  Avrei preferito che non *distruggessi* quel documento importante.
  Ich hätte lieber gehabt, wenn du jenes wichtige Dokument nicht *zerstört* hättest.
