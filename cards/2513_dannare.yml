Rang: 2513
Wort: dannare
Wortart: v
Wort mit Artikel: dannare
Femininum / Plural: ''
IPA: ''
Definition: verdammen, verurteilen, bestrafen
Register: ''
Beispielsätze: |-
  La chiesa cattolica può *dannare* chi commette peccati gravi secondo i suoi dogmi.
  Die katholische Kirche kann diejenigen *verdammen*, die nach ihren Dogmen schwere Sünden begehen.
  
  Se non ti *dannerai* per i tuoi errori, non imparerai mai nulla.
  Wenn du dich für deine Fehler nicht *bestrafst*, wirst du nie etwas lernen.
  
  Molti credono che il destino possa *dannare* le persone per le loro scelte sbagliate.
  Viele glauben, dass das Schicksal Menschen für ihre falschen Entscheidungen *verurteilen* kann.
  
  Nonostante le sue azioni, nessuno ebbe il coraggio di *dannarlo* apertamente.
  Trotz seiner Taten hatte niemand den Mut, ihn offen zu *bestrafen*.
  
  Se *dannassero* i responsabili dell’inquinamento, forse il mondo sarebbe più pulito.
  Wenn sie die Verantwortlichen für die Umweltverschmutzung *verurteilen* würden, wäre die Welt vielleicht sauberer.
