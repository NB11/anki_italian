Rang: 4546
Wort: saldare
Wortart: vt
Wort mit Artikel: saldare
Femininum / Plural: ''
IPA: ''
Definition: löten
Register: ''
Beispielsätze: |-
  L'artigiano usa una torcia per *saldare* due pezzi di metallo insieme con precisione.
  Der Handwerker nutzt einen Brenner, um zwei Metallstücke zusammen zu *löten*.
  
  Se il circuito non funziona, dovrai *saldare* i fili staccati con attenzione.
  Falls der Schaltkreis nicht funktioniert, musst du die losen Drähte sorgfältig *löten*.
  
  Non appena avrò finito di *saldare* le parti, potrai testare il risultato.
  Sobald ich das *Löten* der Teile beendet habe, kannst du das Ergebnis testen.
  
  Anche se è complicato, lui preferisce *saldare* a mano piuttosto che affidarsi alla macchina.
  Obwohl es schwierig ist, *lötet* er lieber von Hand, statt sich auf die Maschine zu verlassen.
  
  Il tecnico ha spiegato che per *saldare* correttamente servono almeno tre anni di esperienza.
  Der Techniker erklärte, dass man für das korrekte *Löten* mindestens drei Jahre Erfahrung braucht.
