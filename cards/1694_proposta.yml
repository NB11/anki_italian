Rang: 1694
Wort: proposta
Wortart: n.f
Wort mit Artikel: la proposta
Femininum / Plural: proposte
IPA: ''
Definition: der Vorschlag, -schläge
Register: ''
Beispielsätze: |-
  La *proposta* del sindaco è stata accolta con entusiasmo dalla cittadinanza.
  Der *Vorschlag* des Bürgermeisters wurde von den Bürgern begeistert aufgenommen.
  
  Nonostante i costo elevati, la *proposta* di riqualificare il parco pubblico è stata approvata.
  Trotz der hohen *Kosten* wurde der Vorschlag zur Neugestaltung des Parks genehmigt.
  
  Il senatore ha avanzato una *proposta* per aumentare le tasse sulle sterline straniere.
  Der *Senator* hat einen Vorschlag zur Erhöhung der Steuern auf Fremdwährungen vorgelegt.
  
  La *proposta* di abolire il divertimento pubblico è stata subito contestata dalla giuria.
  Der *Vorschlag*, die öffentliche Unterhaltung abzuschaffen, wurde von der Jury sofort angefochten.
  
  Dopo lunghe discussioni, la *proposta* di costruire una nuova piscina è finalmente passata al voto.
  Nach langen *Diskussionen* ist der Vorschlag, ein neues Schwimmbad zu bauen, endlich zur Abstimmung gekommen.
