  Sie fand es immer entspannend, *kampfsportliche* Disziplinen wie Karate zu üben.
  
  Nonostante l’aspetto *marziale*, il suo tono di voce rimase calmo e rassicurante.
  Trotz des *kampfbetonten* Aussehens blieb ihre Stimme ruhig und beruhigend.
  
  Per proteggere la proprietà, aveva installato un sistema di allarme *marziale*.
  Um sein Eigentum zu schützen, hatte er ein *kampfbetontes* Alarmsystem installiert.
  
  Il film mostrava una battaglia con coreografie *marziali* incredibilmente elaborate.
