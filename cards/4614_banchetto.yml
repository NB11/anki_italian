Rang: 4614
Wort: banchetto
Wortart: n.m
Wort mit Artikel: il banchetto
Femininum / Plural: banchetti
IPA: ''
Definition: das Festmahl, -e
Register: ''
Beispielsätze: |-
  Ieri sera abbiamo organizzato un *banchetto* per celebrare il suo compleanno.
  Gestern Abend haben wir ein *Festmahl* zur Feier seines Geburtstags organisiert.
  
  Il sindaco ha indetto un *banchetto* ufficiale per il nuovo ambasciatore.
  Der Bürgermeister hat ein offizielles *Festmahl* für den neuen Botschafter angeordnet.
  
  Durante il *banchetto*, tutti hanno brindato alla salute della sposa.
  Während des *Festmahls* haben alle auf die Gesundheit der Braut angestoßen.
  
  Se avessimo più tempo, prepareremmo un *banchetto* sontuoso per gli ospiti.
  Wenn wir mehr Zeit hätten, würden wir ein üppiges *Festmahl* für die Gäste vorbereiten.
  
  Il *banchetto* era così sontuoso che nessuno riuscì a mangiare tutto.
  Das *Festmahl* war so üppig, dass niemand alles essen konnte.
