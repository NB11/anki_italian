Rang: 572
Wort: spalla
Wortart: n.f
Wort mit Artikel: la spalla
Femininum / Plural: spalle
IPA: ''
Definition: die Schulter, -n
Register: ''
Beispielsätze: |-
  Mi *dolce* la *spalla* destra dopo aver giocato a tennis.
  Mir tut die *rechte Schulter* nach dem Tennisspielen weh.
  
  Le *spalle* forti sono importanti per nuotare bene.
  Starke *Schultern* sind wichtig, um gut zu schwimmen.
  
  Si è rotto una *spalla* cadendo dalla bicicletta.
  Er hat sich beim Sturz vom Fahrrad eine *Schulter* gebrochen.
  
  Portava uno zaino pesante sulle *spalle*.
  Er trug einen schweren Rucksack auf den *Schultern*.
  
  Nonostante il dolore alla *spalla*, ha continuato a lavorare.
  Trotz der *Schulterschmerzen* hat er weitergearbeitet.
