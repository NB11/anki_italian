Rang: 572
Wort: spalla
Wortart: n.f
Wort mit Artikel: la spalla
Femininum / Plural: spalle
IPA: ''
Definition: die Schulter, -n
Register: ''
Beispielsätze: |-
  Dopo l'incidente, il medico ha controllato *la spalla* destra del paziente con attenzione.
  Nach dem Unfall hat der Arzt *die* rechte Schulter des Patienten genau untersucht.
  
  Mentre cantava, tenne una mano sulla *spalla* per mostrare vicinanza.
  Während er sang, legte er eine Hand auf *die Schulter*, um Nähe zu zeigen.
  
  Il cavallo si è avviato verso di noi, ma ha fatto un passo indietro quando gli ho posto una mano sulla *spalla*.
  Das Pferd kam auf uns zu, aber es machte einen Schritt zurück, als ich ihm eine Hand auf *die Schulter* legte.
  
  Nonostante la sua altezza, la *spalla* sinistra gli fa male da giorni e teme una slogatura.
  Trotz seiner Größe schmerzt *die* linke Schulter ihn seit Tagen, und er befürchtet eine Zerrung.
  
  Se vuoi indossare quella giacca, dovrai togliere *la spalla* destra dal manichino prima.
  Wenn du *die*se Jacke anziehen willst, musst du zunächst die rechte Schulter vom Kleiderbügel nehmen.
