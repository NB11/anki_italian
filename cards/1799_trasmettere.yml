Rang: 1799
Wort: trasmettere
Wortart: vt
Wort mit Artikel: trasmettere
Femininum / Plural: ''
IPA: ''
Definition: übertragen, senden
Register: ''
Beispielsätze: |-
  La televisione *trasmette* il film stasera alle otto.
  Das Fernsehen *überträgt* den Film heute Abend um acht.
  
  Se non *trasmettessimo* questi dati in tempo, perderemmo il contratto.
  Wenn wir diese Daten nicht *übertragen* würden, würden wir den Vertrag verlieren.
  
  Ha *trasmesso* le tue parole a tutti gli amici senza volerlo.
  Er hat deine Worte *allen* Freunden ungewollt übermittelt.
  
  L’antenna che *trasmette* il segnale è rotta.
  Die Antenne, die das Signal *sendet*, ist kaputt.
  
  Vorresti *trasmettere* la tua gioia a chi ti sta intorno piuttosto che trasmetterla solo tramite schermi?
  Würdest du deine Freude lieber an die Menschen um dich herum *weitergeben*, statt sie nur über Bildschirme auszustrahlen?
