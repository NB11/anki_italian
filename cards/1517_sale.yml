Rang: 1517
Wort: sale
Wortart: n.m
Wort mit Artikel: il sale
Femininum / Plural: sali
IPA: ''
Definition: das Salz, -e
Register: ''
Beispielsätze: |-
  Aggiungi un po' di *sale* per insaporire la zuppa.
  Füge etwas *Salz* hinzu, um die Suppe zu würzen.
  
  Non metterci troppo *sale*, altrimenti diventa immangiabile!
  Gib nicht zu viel *Salz* hinein, sonst wird es ungenießbar!
  
  Il *sale* di mare è più ricco di minerali rispetto a quello raffinato.
  Das *Meersalz* ist reicher an Mineralien als das raffinierte Salz.
  
  Vorresti che ti passassi il *sale* e il pepe?
  Soll ich dir *Salz* und Pfeffer reichen?
  
  Se vuoi che la pasta abbia gusto, devi usare il *sale* giusto nella cottura.
  Wenn du möchtest, dass die Nudeln schmecken, musst du die richtige Menge *Salz* beim Kochen verwenden.
