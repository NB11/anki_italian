Rang: 3175
Wort: affetto
Wortart: n.m
Wort mit Artikel: l'affetto
Femininum / Plural: gli affetti
IPA: ''
Definition: die Zuneigung, die Liebe, das Gefühl
Register: ''
Beispielsätze: |-
  L'*affetto* che provi per tua sorella è molto evidente.
  Die *Zuneigung*, die du für deine Schwester empfindest, ist sehr offensichtlich.
  
  Nonostante le discussioni, manteneva un grande *affetto* nei suoi confronti.
  Trotz der Streitigkeiten bewahrte er eine große *Zuneigung* ihr gegenüber.
  
  L'*affetto* che nutriamo per i nostri animali è qualcosa di unico.
  Die *Liebe*, die wir für unsere Tiere hegen, ist etwas Einzigartiges.
  
  Il professore ha parlato dell'*affetto* come di un sentimento necessario nella vita.
  Der Professor sprach von der *Zuneigung* als einem notwendigen Gefühl im Leben.
  
  L'*affetto* reciproco è alla base di ogni relazione duratura.
  Die gegenseitige *Zuneigung* ist die Grundlage jeder langfristigen Beziehung.
