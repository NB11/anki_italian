Rang: 4585
Wort: setacciare
Wortart: v
Wort mit Artikel: setacciare
Femininum / Plural: ''
IPA: ''
Definition: sieben, sieben durch
Register: ''
Beispielsätze: |-
  Prima di fare la *setacciamo* la farina per togliere eventuali grumi.
  Bevor wir das *Mehl* sieben, entfernen wir mögliche Klumpen.
  
  Il contadino *setacciava* il grano con una rete per separare la pula.
  Der Bauer *siebte* das Getreide mit einem Netz, um die Spreu zu trennen.
  
  Mi hanno consigliato di *setacciare* i documenti per trovare le fatture vecchie.
  Sie rieten mir, die Unterlagen zu *sieben*, um die alten Rechnungen zu finden.
  
  Se non *setacci* bene la sabbia, potrebbero rimanere sassi nel calcestruzzo.
  Wenn du den Sand nicht gut *siebst*, könnten Steine im Beton zurückbleiben.
  
  Stamani ho dovuto *setacciare* tutti i cassetti per trovare il mio passaporto smarrito.
  Heute Morgen musste ich alle Schubladen *sieben* und nach meinem verlorenen Pass suchen.
