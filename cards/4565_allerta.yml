Rang: 4565
Wort: allerta
Wortart: n.f
Wort mit Artikel: la allerta
Femininum / Plural: allerte
IPA: ''
Definition: die Warnung, -en, der Alarm, -e
Register: ''
Beispielsätze: |-
  La *allerta* per la tempesta è scattata ieri sera alle 20:00.
  Die *Warnung* vor dem Sturm war gestern um 20:00 Uhr ausgelöst worden.
  
  Se vedi un cane con la *allerta* accesa al collare, non toccarlo!
  Wenn du einen Hund mit der *Warnung* am Halsband siehst, berühre ihn nicht!
  
  Secondo il meteorologo, la *allerta* arancione resterà attiva per altre 24 ore.
  Laut dem Meteorologen bleibt die *Alarmuff* noch weitere 24 Stunden aktiv.
  
  Hanno emesso una *allerta* per un possibile attacco informatico nei prossimi giorni.
  Sie haben eine *Warnung* vor einem möglichen Cyberangriff in den nächsten Tagen herausgegeben.
  
  Il sindaco ha chiesto ai cittadini di rispettare la *allerta* per l’inquinamento dell’aria.
  Der Bürgermeister hat die Bürger gebeten, die *Vorsichtsmaßnahme* bei der Luftverschmutzung zu beachten.
