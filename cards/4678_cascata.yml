Rang: 4678
Wort: cascata
Wortart: n.f
Wort mit Artikel: la cascata
Femininum / Plural: cascate
IPA: ''
Definition: der Wasserfall, -¨e
Register: ''
Beispielsätze: |-
  La *cascata* del Niagara è una delle più famose al mondo per la sua potenza e bellezza.
  Der *Wasserfall* von Niagara ist einer der berühmtesten Wasserfälle der Welt wegen seiner Kraft und Schönheit.
  
  Dopo la pioggia, la *cascata* nel giardino era ancora più impetuosa e rumorosa del solito.
  Nach dem Regen war der *Wasserfall* im Garten noch heftiger und lauter als sonst.
  
  Nonostante il freddo, abbiamo deciso di visitare la *cascata* ghiacciata vicino al lago.
  Trotz der Kälte haben wir beschlossen, den *Wasserfall* in der Nähe des Sees zu besichtigen.
  
  Se avessimo più tempo, vorremmo vedere anche le *cascate* nascoste nella foresta pluviale.
  Wenn wir mehr Zeit hätten, würden wir auch die versteckten *Wasserfälle* im Regenwald sehen wollen.
  
  La guida ci ha spiegato che la *cascata* si è formata milioni di anni fa a causa dell'erosione della roccia.
  Der Guide hat uns erklärt, dass sich der *Wasserfall* vor Millionen von Jahren durch die Erosion des Gesteins gebildet hat.
