Rang: 1220
Wort: pietra
Wortart: n.m
Wort mit Artikel: la pietra
Femininum / Plural: pietre
IPA: ''
Definition: der Stein, -e
Register: ''
Beispielsätze: |-
  La *pietra* era così liscia che scivolava facilmente tra le dita.
  Der *Stein* war so glatt, dass er leicht zwischen den Fingern rutschte.
  
  Hai visto la *pietra* che ho trovato ieri al mercato?
  Hast du den *Stein* gesehen, den ich gestern auf dem Markt gefunden habe?
  
  Se non vuoi sporcarti, non toccare quella *pietra* così sporca!
  Wenn du dich nicht schmutzig machen willst, berühre diesen *Stein* nicht – er ist so dreckig!
  
  Credo che questa *pietra* rappresenti il limite del nostro accesso al giardino.
  Ich glaube, dieser *Stein* markiert die Grenze unseres Zugangs zum Garten.
  
  Nonostante la *pietra* fosse troppo pesante, riuscì a spostarla da sola.
  Obwohl der *Stein* zu schwer war, schaffte sie es, ihn allein zu bewegen.
