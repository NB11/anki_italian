Rang: 1780
Wort: torcere
Wortart: v
Wort mit Artikel: torcere
Femininum / Plural: ''
IPA: ''
Definition: drehen, winden
Register: ''
Beispielsätze: |-
  Se vuoi aprire questo barattolo, devi *torcere* il coperchio con forza.
  Wenn du dieses Glas öffnen willst, musst du den Deckel mit Kraft *drehen*.
  
  Quando il suo ginocchio si è infortunato, ha dovuto *torcersi* il piede per non cadere.
  Als sein Knie verletzt wurde, musste er sich den Fuß *verdrehen*, um nicht hinzufallen.
  
  Il pittore ha scelto di *torcere* i colori per creare un effetto psichedelico nel quadro.
  Der Maler hat beschlossen, die Farben zu *verdrehen*, um eine psychedelische Wirkung in dem Gemälde zu erzeugen.
  
  Non *torto* mai la verità, ma solo le parole quando sono ambigue.
  Ich *verdrehe* niemals die Wahrheit, sondern nur die Worte, wenn sie mehrdeutig sind.
  
  Se avessi la possibilità, *torceresti* il destino per evitare il divorzio?
  Wenn du die Möglichkeit hättest, würdest du das Schicksal *verdrehen*, um die Scheidung zu vermeiden?
