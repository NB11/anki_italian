Femininum / Plural: urine
IPA: ''
Definition: der Urin, -e
Register: ''
Beispielsätze: |-
  Il medico ha analizzato l'*urina* del paziente per diagnosticare l'infezione.
  Der Arzt hat den *Urin* des Patienten analysiert, um die Infektion zu diagnostizieren.
  
  Non appena hai finito di scrivere, puoi buttare via l'*urina* nel lavabo?
  Sobald du fertig bist zu schreiben, kannst du den *Urin* ins Waschbecken schütten?
  
  La scienza studia l'*urina* per rilevare eventuali anomalie nel metabolismo.
  Die Wissenschaft untersucht den *Urin*, um mögliche Störungen im Stoffwechsel zu erkennen.
  
  Se l'*urina* ha un colore scuro, potrebbe indicare disidratazione o problemi renali.
  Wenn der *Urin* eine dunkle Farbe hat, könnte das auf Dehydrierung oder Nierenprobleme hindeuten.
  
  Dopo la corsa, ho notato che l'*urina* era molto chiara, segno di una buona idratazione.
  Nach dem Laufen bemerkte ich, dass der *Urin* sehr hell war, ein Zeichen guter Flüssigkeitszufuhr.
