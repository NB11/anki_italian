Femininum / Plural: ''
IPA: ''
Definition: posten, veröffentlichen
Register: ''
Beispielsätze: |-
  Non *postare* foto personali sui social se non vuoi che tutti le vedano.
  Poste keine persönlichen Fotos in den sozialen Medien, wenn nicht alle sie sehen sollen.
  
  Sai già come *postare* correttamente un video su Instagram?
  Weißt du schon, wie man ein Video korrekt auf Instagram *postet*?
  
  Se non avessi *postato* quel commento ieri, oggi la discussione sarebbe diversa.
  Wenn du diesen Kommentar gestern nicht *gepostet* hättest, wäre die Diskussion heute anders.
  
  Mi chiedevo se valesse la pena *postare* quella notizia su un forum così specializzato.
  Ich fragte mich, ob es sich lohnt, diese Nachricht in einem so spezialisierten Forum zu *posten*.
  
  Chissà quante persone *posterebbero* il loro curriculum su LinkedIn se sapessero che il 70% delle offerte di lavoro passa proprio da lì.
  Wer weiß, wie viele Leute ihren Lebenslauf auf LinkedIn *posten* würden, wenn sie wüssten, dass 70% der Jobangebote genau darüber laufen.
