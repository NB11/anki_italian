Rang: 1626
Wort: corridoio
Wortart: n.m
Wort mit Artikel: il corridoio
Femininum / Plural: corridoi
IPA: ''
Definition: der Flur, -e
Register: ''
Beispielsätze: |-
  Dove si trova la uscita di emergenza? È alla fine del *corridoio* qui a destra.
  Wo befindet sich der *Notausgang*? Er ist am Ende des Flurs hier rechts.
  
  Mentre passeggiavo per il *corridoio*, ho sentito delle voci strane provenire dalla stanza del direttore.
  Während ich durch den *Flur* ging, hörte ich seltsame Stimmen aus dem Büro des Direktors kommen.
  
  Se vuoi raggiungere il bagno delle donne, devi attraversare tutto il *corridoio* e girare a sinistra.
  Wenn du die Damentoilette erreichen willst, musst du den gesamten *Flur* durchqueren und links abbiegen.
  
  Il *corridoio* dell’albergo era così stretto che quasi ci siamo dovuti girare di lato per passare con le valigie.
  Der *Flur* des Hotels war so schmal, dass wir uns fast seitlich drehen mussten, um mit den Koffer durchzukommen.
  
  In questo edificio moderno hanno eliminato i *corridoi* tradizionali, sostituendoli con spazi aperti e aree di passaggio luminose.
  In diesem modernen Gebäude haben sie die traditionellen *Flure* abgeschafft und durch offene Räume und hell erleuchtete Durchgangsbereiche ersetzt.
