Rang: 1946
Wort: minimo
Wortart: n.m
Wort mit Artikel: il minimo
Femininum / Plural: i minimi
IPA: ''
Definition: das Minimum, die Mindestmenge
Register: ''
Beispielsätze: |-
  Il *minimo* che puoi fare è scusarti per il tuo comportamento.
  Das *Minimum*, das du tun kannst, ist dich für dein Verhalten zu entschuldigen.
  
  Bis a *minimo* venti persone hanno partecipato alla riunione.
  Bis zu *mindestens* zwanzig Personen haben am Meeting teilgenommen.
  
  Non capisco perché abbia speso almeno il *minimo* necessario.
  Ich verstehe nicht, warum sie mindestens das *Minimum* Notwendige ausgegeben hat.
  
  Questo prezzo è il *minimo* che posso accettare per questo prodotto.
  Dieser Preis ist das *Minimum*, das ich für dieses Produkt akzeptieren kann.
  
  Dopo giorni di digiuno, aveva solo il *minimo* di energie per camminare.
  Nach Tagen des Fastens hatte sie gerade *geringste* Energie, um zu gehen.
