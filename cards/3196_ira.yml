Rang: 3196
Wort: ira
Wortart: n.m
Wort mit Artikel: l'ira
Femininum / Plural: le ire
IPA: ''
Definition: der Zorn, die Wut
Register: ''
Beispielsätze: |-
  Non riesco a controllare la *ira* quando qualcuno mi mente.
  Ich kann den *Zorn* nicht kontrollieren, wenn mich jemand anlügt.
  
  La sua *ira* era così intensa che tremavano tutti.
  Sein *Zorn* war so intensiv, dass alle zitterten.
  
  Se avessi saputo delle sue bugie, non ci sarebbe stata questa *ira*.
  Wenn ich von seinen Lügen gewusst hätte, gäbe es diesen *Zorn* nicht.
  
  Nascondere la *ira* è più difficile che fingere un sorriso.
  Den *Zorn* zu verbergen, ist schwieriger, als ein Lächeln vorzutäuschen.
  
  Gridò con tutta la *ira* che aveva in corpo.
  Er schrie mit all dem *Zorn*, der in ihm steckte.
