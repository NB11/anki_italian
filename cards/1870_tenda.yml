Rang: 1870
Wort: tenda
Wortart: n.f
Wort mit Artikel: la tenda
Femininum / Plural: tende
IPA: ''
Definition: das Zelt, -e, die Markise, -n
Register: ''
Beispielsätze: |-
  Ho comprato una nuova *tenda* da campeggio per l’estate.
  Ich habe ein neues *Zelt* für den Sommer gekauft.
  
  Non aprire la *tenda*, per favore, così non entra la luce.
  Öffne bitte nicht das *Zelt*, dann kommt kein Licht herein.
  
  La *tenda* del negozio era così bella che l’ho fotografata.
  Die *Markise* des Ladens war so schön, dass ich sie fotografiert habe.
  
  Se non richiudi bene la *tenda*, gli insetti entreranno dentro.
  Wenn du das *Zelt* nicht gut schließt, kommen Insekten hinein.
  
  Avevamo sistemato la *tenda* vicino al lago, ma la sera ha iniziato a piovere.
  Wir hatten das *Zelt* am See aufgestellt, aber am Abend fing es an zu regnen.
