Rang: 750
Wort: buonanotte
Wortart: n.f
Wort mit Artikel: la buonanotte
Femininum / Plural: ''
IPA: ''
Definition: Gute Nacht
Register: ''
Beispielsätze: |-
  Stasera andiamo a letto molto presto perché domani abbiamo un *buonanotte* importante.
  Heute Abend gehen wir sehr früh ins Bett, weil wir morgen einen *wichtigen Tag* haben.
  
  Quando sono tornato a casa tardi, mia madre mi ha gridato: '*Buonanotte*, non farlo mai più!
  Als ich spät nach Hause kam, hat mich meine Mutter angeschrien: '*Gute Nacht*, das machst du nie wieder!
  
  Davanti alla sala c’era un casino enorme, ma appena ho spento la TV è sceso un *buonanotte* completo.
  Vor dem Saal herrschte riesiges Chaos, aber sobald ich den Fernseher ausgemacht habe, herrschte absolute *Stille*.
  
  Ho organizzato una visita per le stelle cadenti, ma purtroppo il *buonanotte* è stato rovinato dalla pioggia.
  Ich habe einen Besuch für die Sternschnuppen organisiert, aber leider wurde der *schöne Abend* vom Regen ruiniert.
  
  Suppongo che dopo un volo così lungo tu sia stanco: '*buonanotte* e dormi bene!
  Ich nehme an, dass du nach so einem langen Flug müde bist: '*Gute Nacht* und schlaf gut!
