Rang: 3295
Wort: arrogante
Wortart: adj
Wort mit Artikel: arrogante
Femininum / Plural: ''
IPA: ''
Definition: arrogant, hochnäsig
Register: ''
Beispielsätze: |-
  Non sopporto quando qualcuno si comporta in modo *arrogante* con gli altri.
  Ich kann es nicht ertragen, wenn jemand sich *arrogant* anderen gegenüber verhält.
  
  Il professore ha trovato *arrogante* che gli studenti non ascoltassero le sue spiegazioni.
  Der Professor fand es *arrogant*, dass die Studenten seinen Erklärungen nicht zuhörten.
  
  Ti sembra *arrogante* che abbia rifiutato il tuo invito senza spiegazioni?
  Findest du es *arrogant*, dass er deine Einladung ohne Erklärung abgelehnt hat?
  
  Nonostante sia *arrogante* con tutti, tutti lo rispettano per la sua competenza.
  Obwohl er *arrogant* zu allen ist, respektieren alle ihn wegen seiner Kompetenz.
  
  Se non fosse stato così *arrogante*, avrebbe avuto molti più amici a lavoro.
  Wäre er nicht so *arrogant* gewesen, hätte er viel mehr Freunde im Job gehabt.
