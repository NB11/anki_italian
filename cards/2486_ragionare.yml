Rang: 2486
Wort: ragionare
Wortart: vi
Wort mit Artikel: ragionare
Femininum / Plural: ''
IPA: ''
Definition: nachdenken, überlegen, argumentieren
Register: ''
Beispielsätze: |-
  Prima di *ragionare* sulle prossime vacanze, dobbiamo controllare il nostro budget.
  Bevor du über die nächsten Ferien *nachdenkst*, müssen wir unser Budget prüfen.
  
  Il detenuto ha bisogno di *ragionare* sulla sua condotta passata per cambiare.
  Der Häftling muss über sein vergangenes Verhalten *nachdenken*, um sich zu ändern.
  
  Se *ragioniamo* troppo a lungo, perdiamo l'opportunità di agire.
  Wenn wir zu lange *überlegen*, verpassen wir die Chance zu handeln.
  
  Era evidente che stesse *ragionando* su come ripagare i suoi debiti.
  Es war offensichtlich, dass er darüber *nachdachte*, wie er seine Schulden zurückzahlen könnte.
  
  Chiunque voglia *ragionare* di politica deve studiare i fatti prima di esprimersi.
  Wer über Politik *diskutieren* möchte, muss die Fakten studieren, bevor er sich äußert.
