Beispielsätze: |-
  Non sopporto che quel *maniaco* parli sempre di matematica anche quando non serve.
  Ich kann es nicht ertragen, wenn dieser *Spinner* ständig über Mathematik redet, obwohl es nicht nötig ist.
  
  Se fossi uno *maniaco* del controllo, non affiderei mai questo compito a qualcuno di nuovo.
  Wenn ich ein *Spinner* in Sachen Kontrolle wäre, würde ich diese Aufgabe nie jemandem Neulingen überlassen.
  
  È stato arrestato perché si comportava come un *maniaco* in pubblico.
  Er wurde verhaftet, weil er sich in der Öffentlichkeit wie ein *Spinner* benommen hat.
  
  Magari tu fossi meno *maniaco* con le regole grammaticali!
  Wäre doch nur nicht so *verrückt nach* Grammatikregeln!
  
  Quel *maniaco* ha rovinato la festa con le sue ossessioni ridicole.
  Dieser *Spinner* hat mit seinen lächerlichen Besessenheiten die Party ruiniert.
