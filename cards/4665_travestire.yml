Rang: 4665
Wort: travestire
Wortart: v
Wort mit Artikel: travestire
Femininum / Plural: ''
IPA: ''
Definition: verkleiden
Register: ''
Beispielsätze: |-
  Al carnevale di Venezia, molti turisti si *travestono* da nobili veneziani.
  Zu Venedigs Karneval verkleiden sich viele Touristen als venezianische Adlige.
  
  Non volevo *travestire* il mio carattere, ma alla festa era necessario.
  Ich wollte meinen Charakter nicht *ver*kleiden, aber auf der Party war es nötig.
  
  Se avessi denunciato il ladro, avrei dovuto *travestire* il mio aspetto per evitare ritorsioni.
  Hätte ich den Dieb angezeigt, hätte ich mein Aussehen *verkleiden* müssen, um Repressalien zu vermeiden.
  
  Gli attori si sono *travestiti* da animali per attirare l'attenzione dei bambini.
  Die Schauspieler haben sich als Tiere *verkleidet*, um die Aufmerksamkeit der Kinder zu erregen.
  
  Per non essere riconosciuto, avrebbe potuto *travestirsi*, ma non ci pensò subito.
  Um nicht erkannt zu werden, hätte er sich *verkleiden* können, aber er dachte nicht sofort daran.
