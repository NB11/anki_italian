Rang: 1854
Wort: operare
Wortart: vi
Wort mit Artikel: operare
Femininum / Plural: ''
IPA: ''
Definition: operieren, funktionieren
Register: ''
Beispielsätze: |-
  Il medico *opera* il paziente da due ore senza interruzione.
  Der Arzt *operiert* den Patienten seit zwei Stunden ohne Unterbrechung.
  
  Questa macchina *opera* perfettamente, puoi usarla con fiducia.
  Diese Maschine *funktioniert* perfekt, du kannst sie mit Vertrauen benutzen.
  
  Spero che domani il sistema *operi* correttamente dopo l'aggiornamento.
  Ich hoffe, dass das System morgen nach dem Update *funktioniert*.
  
  Stavo leggendo mentre la fabbrica *operava* a pieno ritmo.
  Ich las gerade, während die Fabrik *in vollem Betrieb war*.
  
  Se non *operano* le valvole, tutta la struttura rischia di collassare.
  Wenn die Ventile nicht *funktionieren*, droht die gesamte Struktur einzustürzen.
