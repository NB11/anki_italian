Rang: 2584
Wort: attrezzo
Wortart: n.m
Wort mit Artikel: lo attrezzo
Femininum / Plural: attrezzi
IPA: ''
Definition: das Werkzeug, -e
Register: ''
Beispielsätze: |-
  Non dimenticare di portare *lo attrezzo* che ti ho prestato ieri!
  Vergiss nicht, *das Werkzeug* mitzubringen, das ich dir gestern geliehen habe!
  
  Dopo l’incidente, l’operaio ha perso l’uso di *uno attrezzo* molto importante.
  Nach dem Unfall hat der Arbeiter die Nutzung *eines Werkzeugs* verloren.
  
  Se vuoi costruire quella libreria, ti serviranno *degli attrezzi* speciali.
  Wenn du dieses Regal bauen willst, wirst du *spezielle Werkzeuge* brauchen.
  
  Lo zio mi ha insegnato a usare *lo attrezzo* per tagliare il legno correttamente.
  Mein Onkel hat mir gezeigt, *das Werkzeug* zum Holzschneiden richtig zu benutzen.
  
  Domani il negozio venderà *l’attrezzo* che hai visto in vetrina a un prezzo scontato.
  Morgen wird der Laden *das Werkzeug*, das du im Schaufenster gesehen hast, zu einem reduzierten Preis verkaufen.
