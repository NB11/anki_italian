Definition: psychiatrisch, seelisch
Register: ''
Beispielsätze: |-
  Dopo anni di sofferenza, è stato ricoverato in un reparto *psichiatrico* per ricevere cure specializzate.
  Nach Jahren des Leidens wurde er in eine *psychiatrische* Abteilung eingewiesen, um eine spezielle Behandlung zu erhalten.
  
  Secondo lo studio, l’impatto *psichiatrico* del lockdown è stato sottovalutato da molti governi.
  Laut der Studie wurde die *psychische* Auswirkung der Lockdowns von vielen Regierungen unterschätzt.
  
  Il paziente mostra disturbi *psichiatrici* che richiedono un approccio multidisciplinare.
  Der Patient weist *psychische* Störungen auf, die einen multidisziplinären Ansatz erfordern.
  
  Nonostante le apparenze, la sua condizione *psichiatrica* non è ancora stabile.
  Trotz der äußeren Anzeichen ist sein *psychischer* Zustand noch nicht stabil.
  
  Ha frequentato una clinica *psichiatrica* per diversi mesi prima di tornare a casa.
  Er besuchte monatelang eine *psychiatrische* Klinik, bevor er nach Hause zurückkehrte.
