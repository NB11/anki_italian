Rang: 271
Wort: possibile
Wortart: adj
Wort mit Artikel: possibile
Femininum / Plural: ''
IPA: ''
Definition: möglich, denkbar, machbar
Register: ''
Beispielsätze: |-
  È *possibile* arrivare in tempo se partiamo subito.
  Es ist *möglich*, pünktlich anzukommen, wenn wir sofort losfahren.
  
  Non è *possibile* fare tutto in un giorno.
  Es ist nicht *möglich*, alles an einem Tag zu erledigen.
  
  Dicono che sia *possibile* vincere la lotteria.
  Sie sagen, es sei *möglich*, die Lotterie zu gewinnen.
  
  Era *possibile* vedere le stelle stanotte.
  Es war *möglich*, die Sterne letzte Nacht zu sehen.
  
  Sarebbe *possibile* aiutarmi con questo problema?
  Wäre es *möglich*, mir mit diesem Problem zu helfen?
