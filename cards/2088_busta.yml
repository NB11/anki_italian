  Er hat die Anfrage gestern Morgen mit einem frankierten *Umschlag* verschickt.
  
  Se non trovi la *busta* giusta, chiedi alla reception.
  Wenn du den richtigen *Umschlag* nicht findest, frag an der Rezeption nach.
