Rang: 3037
Wort: sodo
Wortart: adj
Wort mit Artikel: sodo
Femininum / Plural: sodi
IPA: ''
Definition: fest, hart
Register: ''
Beispielsätze: |-
  Il pane che hai comprato ieri era troppo *sodo* per essere mangiato.
  Das Brot, das du gestern gekauft hast, war zu *hart*, um es zu essen.
  
  Dopo aver camminato per ore, le mie gambe si sentivano *sode* di fatica.
  Nach stundenlangem Laufen fühlten sich meine Beine vor *Müdigkeit* wie aus Holz an.
  
  Nonostante le proteste, il governo ha deciso di imporre un controllo *sodo* sulla privacy digitale.
  Trotz der Proteste beschloss die Regierung, eine strenge Kontrolle über die digitale *Privatsphäre* vorzuschreiben.
  
  Il cuoco consiglia di non impastare la pasta troppo a lungo, altrimenti diventa *soda*.
  Der Koch rät, den Teig nicht zu lange zu kneten, sonst wird er *fest*.
  
  Le prove raccolte dagli investigatori risultano *sode* contro l’imputato, ma il giudice aspetta ancora una conferma.
  Die von den Ermittlern gesammelten Beweise sind zwar *überzeugend*, aber der Richter wartet noch auf eine Bestätigung.
