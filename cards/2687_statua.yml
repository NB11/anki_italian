Rang: 2687
Wort: statua
Wortart: n.f
Wort mit Artikel: la statua
Femininum / Plural: statue
IPA: ''
Definition: die Statue, -n
Register: ''
Beispielsätze: |-
  La *statua* di Michelangelo è un capolavoro dell’arte rinascimentale.
  Die *Statue* von Michelangelo ist ein Meisterwerk der Renaissance-Kunst.
  
  Hanno trovato una *statua* antica nella cantina della vecchia villa.
  Sie haben eine antike *Statue* im Keller des alten Anwesens gefunden.
  
  Se vuoi scattare una foto alla *statua*, aspetta che il sole la illumini meglio.
  Wenn du ein Foto von der *Statue* machen willst, warte, bis die Sonne sie besser beleuchtet.
  
  La *statua* commemorativa verrà spostata nel nuovo parco cittadino entro la prossima settimana.
  Die Gedenk-*Statue* wird bis zur nächsten Woche in den neuen Stadtpark verlegt.
  
  Secondo gli storici, la *statua* rappresenta una divinità minore della cultura etrusca.
  Laut den Historikern stellt die *Statue* eine kleinere Gottheit der etruskischen Kultur dar.
