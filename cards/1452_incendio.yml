Rang: 1452
Wort: incendio
Wortart: n.m
Wort mit Artikel: l'incendio
Femininum / Plural: gli incendi
IPA: ''
Definition: der Brand, -¨e, der Großbrand, -¨e
Register: ''
Beispielsätze: |-
  L'*incendio* ha distrutto gran parte del bosco vicino al paese.
  Der *Brand* hat einen großen Teil des Waldes nahe dem Dorf zerstört.
  
  Il sindaco ha dichiarato lo stato di emergenza a causa dell'*incendio*.
  Der Bürgermeister hat wegen des *Großbrands* den Notstand erklärt.
  
  Se avessi saputo dell'*incendio*, non sarei partito per la vacanza.
  Hätte ich von dem *Brand* gewusst, wäre ich nicht in den Urlaub gefahren.
  
  Gli abitanti hanno ringraziato i pompieri che hanno spento l'*incendio* in poche ore.
  Die Bewohner dankten den Feuerwehrmännern, die den *Brand* in wenigen Stunden gelöscht haben.
  
  Purtroppo, l'*incendio* si è propagato così velocemente che non si è potuto fare nulla.
  Unglücklicherweise breitete sich der *Brand* so schnell aus, dass nichts mehr zu tun war.
