Rang: 3469
Wort: preliminare
Wortart: adj
Wort mit Artikel: preliminare
Femininum / Plural: ''
IPA: ''
Definition: vorläufig, einleitend
Register: ''
Beispielsätze: |-
  Abbiamo fatto un *preliminare* sondaggio per capire cosa vogliono gli elettori.
  Wir haben eine *vorläufige* Umfrage gemacht, um zu verstehen, was die Wähler wollen.
  
  Le indagini *preliminari* non hanno ancora stabilito le cause dell’incidente.
  Die *einleitenden* Ermittlungen haben die Ursachen des Unfalls noch nicht geklärt.
  
  Prima di firmare il contratto, è importante leggere le clausole *preliminari*.
  Bevor du den Vertrag unterschreibst, solltest du die *vorläufigen* Klauseln lesen.
  
  Gli esami *preliminari* suggeriscono che il trattamento potrebbe essere efficace, ma servono ulteriori test.
  Die *vorläufigen* Untersuchungen deuten darauf hin, dass die Behandlung wirksam sein könnte, aber weitere Tests sind nötig.
  
  La polizia ha avviato delle analisi *preliminari* per escludere qualsiasi pista falsa.
  Die Polizei hat *vorläufige* Analysen eingeleitet, um jede falsche Spur auszuschließen.
