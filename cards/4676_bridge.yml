Rang: 4676
Wort: bridge
Wortart: n.m
Wort mit Artikel: il bridge
Femininum / Plural: i ponti
IPA: ''
Definition: die *Brücke*, -n
Register: ''
Beispielsätze: |-
  Dobbiamo attraversare *il ponte* per raggiungere il paese dall'altra parte della baia.
  Wir müssen die *Brücke* überqueren, um das Dorf an der anderen Seite der Bucht zu erreichen.
  
  La *crepa* che si è formata sul ponte preoccupa gli ingegneri per la sua durata e sicurezza.
  Der Riss, der sich auf der *Brücke* gebildet hat, beunruhigt die Ingenieure wegen seiner Dauer und Sicherheit.
  
  Se non avessi perso la mappa, avremmo già trovato *il ponte* che porta alla fortezza.
  Wenn ich die Karte nicht verloren hätte, hätten wir die *Brücke* zur Festung schon gefunden.
  
  Gli ambientalisti propongono di costruire *un ponte* pedonale sopra il fiume per ridurre le emissioni dei guidatori.
  Die Umweltschützer schlagen vor, eine Fußgänger*brücke* über den Fluss zu bauen, um die Emissionen der Fahrer zu verringern.
  
  Nonostante la *simulazione*, nessuno sapeva esattamente quanto sarebbe durata la costruzione di quel ponte nel deserto.
  Trotz der Simulation wusste niemand genau, wie lange der Bau dieser *Brücke* in der Wüste dauern würde.
