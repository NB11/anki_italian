Rang: 1267
Wort: frequentare
Wortart: v
Wort mit Artikel: frequentare
Femininum / Plural: ''
IPA: ''
Definition: besuchen, regelmäßig gehen
Register: ''
Beispielsätze: |-
  Da quando *frequento* questo corso di cucina, ho imparato a preparare piatti molto gustosi.
  Seit ich diesen Kochkurs *besuche*, habe ich gelernt, sehr leckere Gerichte zuzubereiten.
  
  Se *frequenterai* la palestra almeno tre volte a settimana, vedrai presto dei risultati.
  Wenn du das Fitnessstudio mindestens dreimal pro Woche *besuchst*, wirst du bald Ergebnisse sehen.
  
  Mi hanno detto che lui *frequentava* un liceo prestigioso prima di trasferirsi all’università.
  Man hat mir gesagt, dass er vor dem Umzug zur Universität ein renommiertes Gymnasium *besucht hat*.
  
  Nonostante il vento forte, ho deciso di *frequentare* la scuola di musica stamattina.
  Trotz des starken *Windes* habe ich heute Morgen beschlossen, die Musikschule zu besuchen.
  
  Vorrei che tu *frequentassi* un corso di inglese per migliorare la tua pronuncia.
  Ich möchte, dass du einen Englischkurs *besuchst*, um deine Aussprache zu verbessern.
