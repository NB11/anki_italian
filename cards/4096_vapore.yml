Rang: 4096
Wort: vapore
Wortart: n.m
Wort mit Artikel: il vapore
Femininum / Plural: i vapori
IPA: ''
Definition: der Dampf, -e
Register: ''
Beispielsätze: |-
  Il *vapore* che esce dalla pentola è molto caldo, quindi stai attento!
  Der *Dampf*, der aus dem Topf steigt, ist sehr heiß, also sei vorsichtig!
  
  Ho comprato una macchina a *vapore* per il mio modello di treno.
  Ich habe eine *Dampf*maschine für mein Zugmodell gekauft.
  
  Non sapevo che il *vapore* potesse essere usato anche per generare energia elettrica.
  Ich wusste nicht, dass *Dampf* auch zur Stromerzeugung genutzt werden kann.
  
  Quando ho aperto la porta, ho visto un enorme sbuffo di *vapore* bianco uscire dal bollitore.
  Als ich die Tür öffnete, sah ich einen riesigen weißen *Dampf* aus dem Wasserkocher entweichen.
  
  Dicono che il *vapore* di queste acque termali abbia proprietà curative.
  Man sagt, dass der *Dampf* aus diesen Thermalquellen heilende Eigenschaften hat.
