Rang: 1148
Wort: sostenere
Wortart: vt
Wort mit Artikel: sostenere
Femininum / Plural: ''
IPA: ''
Definition: tragen, unterstützen, behaupten
Register: ''
Beispielsätze: |-
  L’università *sostiene* i progetti di ricerca innovativi con fondi specifici.
  Die *Universität* unterstützt innovative Forschungsprojekte mit speziellen Mitteln.
  
  Nonostante le minacce del lupo, il pastore decise di *sostenere* la sua decisione di rimanere nella valle.
  Trotz der *Drohungen* des Wolfes beschloss der Hirt, seine Entscheidung, im Tal zu bleiben, zu behaupten.
  
  Ho *sostenuto* l’esame di diritto con grande soddisfazione, anche se molti colleghi avevano dubbi sul risultato.
  Ich habe die Rechtsprüfung mit großer Zufriedenheit *bestanden*, obwohl viele Kollegen Zweifel am Ergebnis hatten.
  
  Gli attivisti vogliono *sostenere* una legge che limiti l’uso di plastica nella nostra città.
  Die Aktivisten wollen ein Gesetz *unterstützen*, das die Verwendung von Plastik in unserer Stadt begrenzt.
  
  Se avessi più conoscenze in fisica, potrei *sostenere* meglio la mia teoria sulle particelle elementari.
  Wenn ich mehr *Kenntnisse* in Physik hätte, könnte ich meine Theorie über Elementarteilchen besser begründen.
