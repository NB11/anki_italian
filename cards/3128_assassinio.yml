Rang: 3128
Wort: assassinio
Wortart: n.m
Wort mit Artikel: l'assassinio
Femininum / Plural: gli *assassini*
IPA: ''
Definition: der Mord, -e
Register: ''
Beispielsätze: |-
  L'*assassinio* del politico ha scioccato l'intera nazione.
  Der *Mord* an dem Politiker hat die ganze Nation erschüttert.
  
  Hanno arrestato l'uomo accusato dell'*assassinio* della cantante.
  Sie haben den Mann verhaftet, der des *Mordes* an der Sängerin beschuldigt wird.
  
  Secondo le ultime notizie, l'*assassinio* sarebbe avvenuto di notte.
  Laut den neuesten Nachrichten soll der *Mord* angeblich nachts passiert sein.
  
  Nonostante le prove, i familiari non vogliono credere all'*assassinio*.
  Trotz der Beweise wollen die Angehörigen nicht an den *Mord* glauben.
  
  L'*assassinio* di John F. Kennedy rimane uno dei più discussi della storia.
  Der *Mord* an John F. Kennedy bleibt einer der am meisten diskutierten der Geschichte.
