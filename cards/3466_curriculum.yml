Rang: 3466
Wort: curriculum
Wortart: n.m
Wort mit Artikel: il curriculum
Femininum / Plural: i curricula
IPA: ''
Definition: der Lebenslauf, Lebensläufe
Register: ''
Beispielsätze: |-
  Ho inviato il *curriculum* ieri mattina per quella posizione lavorativa.
  Ich habe den *Lebenslauf* gestern Morgen für diese Stelle geschickt.
  
  Nel *curriculum* devi specificare chiaramente le tue competenze linguistiche.
  Im *Lebenslauf* musst du deine Sprachkenntnisse klar angeben.
  
  Se avessi avuto un *curriculum* più completo, forse avrebbero preso in considerazione la mia candidatura.
  Wenn ich einen *Lebenslauf* mit mehr Details gehabt hätte, hätten sie vielleicht meine Bewerbung in Betracht gezogen.
  
  Il direttore delle risorse umane ha detto che il mio *curriculum* non corrispondeva alle aspettative della ditta.
  Der Personalchef sagte, dass mein *Lebenslauf* nicht den Erwartungen der Firma entsprach.
  
  Hai aggiornato il *curriculum* dopo aver frequentato quel corso di formazione?
  Hast du den *Lebenslauf* nach diesem Weiterbildungskurs aktualisiert?
