Rang: 2312
Wort: party
Wortart: n.f
Wort mit Artikel: la party
Femininum / Plural: party
IPA: ''
Definition: die Party, -s
Register: ''
Beispielsätze: |-
  Stasera andiamo alla *party* di compleanno di Marco, che è sempre molto divertente.
  Heute Abend gehen wir zur *Party* von Markus’ Geburtstag, die immer sehr lustig ist.
  
  Nonostante la *party* fosse stata programmata per le otto, siamo arrivati in ritardo a causa del traffico.
  Trotz der *Party*, die für acht Uhr geplant war, sind wir wegen des Staus zu spät angekommen.
  
  La *party* in giardino è stata rovinata dalla pioggia improvvisa che ha bagnato tutto il palco.
  Die *Party* im Garten wurde durch den plötzlichen Regen zerstört, der die ganze Bühne durchnässt hat.
  
  Se non avessi tanto studio domani, verrei volentieri alla tua *party* di inaugurazione.
  Wenn ich morgen nicht so viel zu lernen hätte, würde ich gerne zu deiner *Party* zur Einweihung kommen.
  
  Era così imbarazzante che, appena entrato alla *party*, ho notato che tutti indossavano maschere eleganti tranne me.
  Es war so peinlich, dass ich, sobald ich auf der *Party* ankam, bemerkte, dass alle außer mir elegante Masken trugen.
