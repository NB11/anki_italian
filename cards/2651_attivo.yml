Rang: 2651
Wort: attivo
Wortart: adj
Wort mit Artikel: attivo
Femininum / Plural: ''
IPA: ''
Definition: aktiv, tätig, rege
Register: ''
Beispielsätze: |-
  Mio fratello è *attivo* in molte associazioni sportive e culturali.
  Mein Bruder ist in vielen sportlichen und kulturellen Vereinen *aktiv*.
  
  Nonostante l'età, si sente ancora *attivo* e pieno di energie.
  Trotz seines Alters fühlt er sich noch immer *aktiv* und voller Energie.
  
  Lei vorrebbe *attivo* partecipare alla raccolta fondi, ma non sa come iniziare.
  Sie würde gerne *aktiv* an der Spendenaktion teilnehmen, weiß aber nicht, wie sie anfangen soll.
  
  I social media lo hanno reso più *attivo* politicamente negli ultimi mesi.
  Die sozialen Medien haben ihn in den letzten Monaten politisch *aktiver* werden lassen.
  
  Era così *attivo* durante la conferenza che tutti lo hanno notato.
  Er war während der Konferenz so *aktiv*, dass ihn alle bemerkt haben.
