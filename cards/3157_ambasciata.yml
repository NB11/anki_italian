Wort: ambasciata
Wortart: n.f
Wort mit Artikel: l'ambasciata
Femininum / Plural: ambasciate
IPA: ''
Definition: die Botschaft, -en
Register: ''
Beispielsätze: |-
  L’*ambasciata* italiana in Germania organizza una mostra di arte contemporanea la prossima settimana.
  Die italienische *Botschaft* in Deutschland organisiert nächste Woche eine Ausstellung für zeitgenössische Kunst.
  
  Mio cugino lavora nell’*ambasciata* come addetto culturale da cinque anni.
  Mein Cousin arbeitet seit fünf Jahren als Kulturattaché in der *Botschaft*.
  
  Credi che l’*ambasciata* possa aiutarci a ottenere un visto più velocemente?
  Glaubst du, dass die *Botschaft* uns helfen kann, ein Visum schneller zu bekommen?
  
  Durante il viaggio a Roma, abbiamo visitato l’*ambasciata* del nostro paese senza prenotare.
  Während unserer Reise nach Rom haben wir die *Botschaft* unseres Landes besucht, ohne vorher zu reservieren.
  
  Le ambasciate straniere a Berlino sono oltre cinquanta, secondo le ultime statistiche.
  Die ausländischen *Botschaften* in Berlin sind laut den neuesten Statistiken über fünfzig.
