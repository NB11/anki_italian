Rang: 4129
Wort: rispedire
Wortart: vt
Wort mit Artikel: rispedire
Femininum / Plural: ''
IPA: ''
Definition: zurückschicken, weiterschicken
Register: ''
Beispielsätze: |-
  Ho bisogno che tu *rispedisca* questo pacco al mittente.
  Ich brauche, dass du dieses Paket an den Absender *zurückschickst*.
  
  È meglio *rispedire* la lettera piuttosto che buttarla.
  Es ist besser, den Brief *zurückzuschicken* als ihn wegzuwerfen.
  
  Se il pacco non arriva, dobbiamo *rispedire* la merce.
  Wenn das Paket nicht ankommt, müssen wir die Ware *zurückschicken*.
  
  Hanno deciso di *rispedire* i migranti al confine.
  Sie haben beschlossen, die Migranten an der Grenze *zurückzuschicken*.
  
  Non puoi semplicemente *rispedire* le responsabilità a qualcun altro.
  Du kannst die Verantwortung nicht einfach an jemand anderen *zurückschicken*.
