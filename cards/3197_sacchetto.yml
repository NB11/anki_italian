Rang: 3197
Wort: sacchetto
Wortart: n.m
Wort mit Artikel: il sacchetto
Femininum / Plural: sacchetti
IPA: ''
Definition: der Beutel, -
Register: ''
Beispielsätze: |-
  Devo comprare un *sacchetto* di patatine per lo spuntino.
  Ich muss einen *Beutel* Chips für den Snack kaufen.
  
  Ha aperto il *sacchetto* troppo velocemente e tutto è caduto per terra.
  Sie hat den *Beutel* zu schnell geöffnet und alles ist auf den Boden gefallen.
  
  Se non hai un *sacchetto*, posso dartene uno dei miei.
  Wenn du keinen *Beutel* hast, kann ich dir einen meiner geben.
  
  Ha trovato un *sacchetto* di plastica sotto il divano, mentre cercava il telecomando.
  Sie fand einen *Beutel* Plastik unter dem Sofa, während sie die Fernbedienung suchte.
  
  Non dimenticare di prendere un *sacchetto* della spazzatura prima di uscire.
  Vergiss nicht, einen *Beutel* für den Müll mitzunehmen, bevor du gehst.
