Rang: 3763
Wort: irritare
Wortart: vt
Wort mit Artikel: irritare
Femininum / Plural: ''
IPA: ''
Definition: ärgern, reizen, provozieren
Register: ''
Beispielsätze: |-
  Se continui a fare così, *irriterai* tutti i tuoi colleghi!
  Wenn du so weitermachst, wirst du alle deine Kollegen *ärgern*!
  
  La pubblicità in televisione *irrita* molti telespettatori che preferiscono i programmi senza interruzioni.
  Die Werbung im Fernsehen *reizt* viele Zuschauer, die Programme ohne Unterbrechungen bevorzugen.
  
  Mi hanno detto che il rumore della strada *iria* ancora più chi chiude le finestre.
  Man hat mir gesagt, dass das Straßenlärm noch mehr *provozieren* würde, wer die Fenster schließt.
  
  È inutile *irritarsi* per cose del genere, tanto domani tutto sarà dimenticato.
  Es ist sinnlos, sich über solche Dinge zu *ärgern*, morgen wird alles ohnehin vergessen sein.
  
  Il fumo passivo *irrita* le vie respiratorie di chi non fuma, come dimostrano diversi studi scientifici.
  Der Passivrauch *reizt* die Atemwege von Nichtrauchern, wie mehrere wissenschaftliche Studien zeigen.
