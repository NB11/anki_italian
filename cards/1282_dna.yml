Wort mit Artikel: la dna
Femininum / Plural: DNA
IPA: ''
Definition: die DNA
Register: ''
Beispielsätze: |-
  Gli scienziati stanno studiando il *dna* di questa creatura per scoprire nuove proprietà.
  Die Wissenschaftler untersuchen die *DNA* dieses Wesens, um neue Eigenschaften zu entdecken.
  
  Se avessimo analizzato meglio il *dna*, avremmo evitato questo improvviso problema.
  Hätten wir die *DNA* besser analysiert, hätten wir dieses plötzliche Problem vermieden.
  
  È importante preservare il *dna* delle specie in via di estinzione, proprio come fanno gli ambientalisti.
  Es ist wichtig, die *DNA* bedrohter Arten zu bewahren, gerade so wie Umweltschützer es tun.
  
  Non dubito che lo studio sul *dna* avrà un grande premio a causa della sua utilità.
  Ich bezweifle nicht, dass die Studie über die *DNA* einen großen Preis erhalten wird, wegen ihrer Nützlichkeit.
  
  Il procuratore vuole analizzare il *dna* ritrovato sulla scena del crimine, all‘improvviso un dettaglio fondamentale.
  Der Staatsanwalt möchte die *DNA* untersuchen, die am Tatort gefunden wurde – plötzlich ein entscheidendes Detail.
