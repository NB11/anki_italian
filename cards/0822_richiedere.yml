Rang: 822
Wort: richiedere
Wortart: vt
Wort mit Artikel: richiedere
Femininum / Plural: ''
IPA: ''
Definition: erneut beantragen, nachfragen, anfordern
Register: ''
Beispielsätze: |-
  Il giudice *richiederà* la pena per il nemico del ricco Henry.
  Der Richter wird die *Strafe* für den Feind des reichen Henry erneut beantragen.
  
  Stamattina ho aiutato un don a *richiedere* la licenza per aprire un club vicino alla chiesa.
  Heute Morgen habe ich einem Herrn geholfen, die Genehmigung zu *beantragen*, um einen Club nahe der Kirche zu eröffnen.
  
  Nonostante il pensier di trasformare il pianeta, l’ex assassino *richiede* il suo cambio di pena.
  Trotz des Gedankens, den Planeten zu *verwandeln*, beantragt der ehemalige Mörder seine Strafumwandlung.
  
  Sicuramente *richiederete* più tempo per finire il compito, figliolo?
  Ihr werdet sicherlich *erneut nachfragen* müssen, ob du mehr Zeit brauchst, um die Aufgabe zu beenden, Sohn?
  
  La società *richiede* che il criminale sopporti la pena della dannazione per l’inferno.
  Die Gesellschaft *verlangt*, dass der Verbrecher die Höllenstrafe erduldet.
