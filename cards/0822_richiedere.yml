Definition: erneut beantragen, anfordern
Register: ''
Beispielsätze: |-
  Devo *richiedere* il visto per andare in Italia.
  Ich muss das *Visum* erneut *beantragen*, um nach Italien zu fahren.
  
  *Richiedi* sempre aiuto quando non capisci qualcosa?
  *Forderst* du immer *Hilfe an*, wenn du etwas nicht verstehst?
  
  Abbiamo *richiesto* un prestito alla banca.
  Wir haben bei der Bank einen *Kredit* *angefordert*.
  
  Se non hai la patente, dovrai *richiederla* entro un mese.
  Wenn du keinen Führerschein hast, musst du ihn innerhalb eines Monats *erneut beantragen*.
  
  Lavoro qui da cinque anni e ho intenzione di *richiedere* una promozione.
  Ich arbeite hier seit fünf Jahren und habe vor, eine *Beförderung* *anzufordern*.
