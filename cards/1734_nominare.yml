Rang: 1734
Wort: nominare
Wortart: v
Wort mit Artikel: nominare
Femininum / Plural: ''
IPA: ''
Definition: ernennen, nennen, bezeichnen
Register: ''
Beispielsätze: |-
  Il presidente ha *nominato* Maria come nuova direttrice del reparto.
  Der Präsident hat Maria zur neuen Abteilungsleiterin *ernannt*.
  
  Non riesco a credere che abbiano *nominato* proprio lui per quel premio.
  Ich kann nicht glauben, dass sie ausgerechnet ihn für diesen Preis *nominiert* haben.
  
  Se fossi stato tu, avrei *nominato* qualcuno con più esperienza per quel ruolo.
  Wärst du ich gewesen, hätte ich jemanden mit mehr Erfahrung für diese Rolle *ernannt*.
  
  Hanno *nominato* un comitato che si occuperà della riforma della legge.
  Sie haben einen Ausschuss *ernannt*, der sich um die Reform des Gesetzes kümmern wird.
  
  Dopo anni di lavoro, finalmente lo hanno *nominato* direttore generale della società.
  Nach Jahren der Arbeit haben sie ihn endlich zum Geschäftsführer des Unternehmens *ernannt*.
