Beispielsätze: |-
  Lo *aids* è una malattia che indebolisce il sistema immunitario.
  Das *Aids* ist eine Krankheit, die das Immunsystem schwächt.
  
  Purtroppo, ancora non esiste una cura definitiva per lo *aids*.
  Leider gibt es noch keine endgültige Heilung gegen das *Aids*.
  
  Se hai fatto un test per lo *aids*, saprai presto il risultato.
  Wenn du einen Test auf *Aids* gemacht hast, wirst du bald das Ergebnis wissen.
  
  Nonostante i progressi della medicina, lo *aids* rimane una grande sfida mondiale.
  Trotz medizinischer Fortschritte bleibt *Aids* eine große globale Herausforderung.
  
  La prevenzione è fondamentale per evitare la trasmissione dello *aids*.
  Prävention ist entscheidend, um die Übertragung von *Aids* zu vermeiden.
