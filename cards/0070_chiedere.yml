Beispielsätze: |-
  Vorrei *chiedere* un favore al mio vicino di casa.
  Ich möchte *den* Nachbarn um einen Gefallen *bitten*.
  
  Mi hai *chiesto* di venire, ma ho cambiato idea.
  Du hast *mich gefragt*, zu kommen, aber ich habe meine Meinung geändert.
  
  Se potessi, ti *chiederei* scusa mille volte!
  Wenn ich könnte, würde ich *dir* tausendmal *entschuldigen*!
  
  Non capisco perché gli abbia *chiesto* così tanto denaro.
  Ich verstehe nicht, warum du *ihm* so viel Geld *abverlangt hast*.
  
  Dimmi cosa vuoi, e ci *chiederò* al direttore.
  Sag mir, was du willst, und ich *werde den* Chef *darum bitten*.
