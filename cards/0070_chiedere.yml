Femininum / Plural: ''
IPA: ''
Definition: fragen, bitten, verlangen
Register: ''
Beispielsätze: |-
  Vorrei *chiedere* un’informazione alla reception.
  Ich möchte *fragen* eine Information an der Rezeption.
  
  Perché non gli hai *chiesto* aiuto?
  Warum hast du ihn nicht um *Hilfe* gebeten?
  
  Mi hanno *chiesto* di presentare il documento domani.
  Sie haben mich darum gebeten, das Dokument morgen vorzulegen.
  
  Se avessi bisogno, ti *chiederei* di venire.
  Falls ich Hilfe bräuchte, würde ich dich darum *bitten* zu kommen.
  
  È importante che tu gli *chieda* scusa per il ritardo.
  Es ist wichtig, dass du ihn um Entschuldigung für die Verspätung *bittest*.
