Rang: 1950
Wort: coscienza
Wortart: n.f
Wort mit Artikel: la coscienza
Femininum / Plural: le coscienze
IPA: ''
Definition: das Gewissen
Register: ''
Beispielsätze: |-
  La *coscienza* mi tormenta dopo che ho mentito al mio amico.
  Das *Gewissen* quält mich, nachdem ich meinen Freund angelogen habe.
  
  È importante avere una *coscienza* pulita prima di prendere una decisione difficile.
  Es ist wichtig, ein reines *Gewissen* zu haben, bevor man eine schwierige Entscheidung trifft.
  
  Se avessi agito secondo la tua *coscienza*, non ti saresti pentito ora.
  Hättest du nach deinem *Gewissen* gehandelt, würdest du dich jetzt nicht ärgern.
  
  La *coscienza* collettiva di una comunità si riflette nelle sue tradizioni e leggi.
  Das kollektive *Gewissen* einer Gemeinschaft spiegelt sich in ihren Traditionen und Gesetzen wider.
  
  Nonostante il pericolo, la sua *coscienza* gli ricordava di aiutare chi era in difficoltà.
  Trotz der Gefahr erinnerte ihn sein *Gewissen* daran, denen zu helfen, die in Not waren.
