Rang: 4305
Wort: teppista
Wortart: n.m
Wort mit Artikel: il teppista
Femininum / Plural: i teppisti
IPA: ''
Definition: der Rowdy, -s, der Rabauke, -n, der Vandale, -n
Register: ''
Beispielsätze: |-
  Il *teppista* ha rotto la finestra del negozio ieri sera.
  Der *Rowdy* hat gestern Abend das Fenster des Ladens zerschlagen.
  
  Secondo la polizia, il *teppista* si nasconde ancora in zona.
  Laut der Polizei versteckt sich der *Rabauke* noch in der Gegend.
  
  Se continuerai così, diventerai un *teppista* senza futuro.
  Wenn du so weitermachst, wirst du ein *Rowdy* ohne Zukunft.
  
  Non è giusto giudicare qualcuno solo perché ha l'aspetto di un *teppista*.
  Es ist nicht richtig, jemanden nur zu verurteilen, weil er wie ein *Vandale* aussieht.
  
  Il *teppista* che abbiamo visto scappare era armato di una spranga di ferro.
  Der *Rabauke*, der uns weglaufen sahen, war mit einer Eisenstange bewaffnet.
