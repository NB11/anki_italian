Rang: 4633
Wort: desolare
Wortart: v
Wort mit Artikel: desolare
Femininum / Plural: ''
IPA: ''
Definition: veröden, verwüsten
Register: ''
Beispielsätze: |-
  Dopo l’inondazione, la campagna sembrava *desolata* e senza vita.
  Nach der Flut wirkte die Landschaft *öde* und ohne Leben.
  
  Il rumore dei motori cominciò a *desolare* gli animali del bosco.
  Das Motorengeräusch begann, die Tiere im Wald *zu verängstigen*.
  
  Se *desolassimo* ogni speranza, perderemmo il senso della vita.
  Wenn wir jede *Hoffnung* veröden ließen, würden wir den Lebenssinn verlieren.
  
  Mi dispiace, ma il tuo discorso è così triste che *desola* anche me.
  Es tut mir leid, aber deine Rede ist so traurig, dass sie *bedrückt* auch mich.
  
  La notizia della sconfitta *desolò* l’intera squadra, che aveva lottato tanto.
  Die Nachricht der Niederlage *entmutigte* die gesamte Mannschaft, die so hart gekämpft hatte.
