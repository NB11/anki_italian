Beispielsätze: |-
  Gli scienziati hanno scoperto un nuovo *dinosauro* nel deserto del Gobi.
  Die Wissenschaftler haben einen neuen *Dinosaurier* in der Wüste Gobi entdeckt.
  
  Nel museo c'era uno scheletro di *dinosauro* che misurava più di 20 metri.
  Im Museum gab es ein *Dinosaurier*-Skelett, das über 20 Meter maß.
  
  Se avessi tempo, vorrei studiare l'estinzione dei *dinosauri*.
  Wenn ich Zeit hätte, würde ich mich mit dem Aussterben der *Dinosaurier* beschäftigen.
  
  I bambini erano affascinati dal modellino di *dinosauro* nella vetrina.
  Die Kinder waren vom *Dinosaurier*-Modell im Schaufenster fasziniert.
  
  La mostra sui *dinosauri* attira sempre molti visitatori.
  Die Ausstellung über *Dinosaurier* zieht immer viele Besucher an.
