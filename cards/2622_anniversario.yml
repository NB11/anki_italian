Rang: 2622
Wort: anniversario
Wortart: n.m
Wort mit Artikel: l'anniversario
Femininum / Plural: gli anniversari
IPA: ''
Definition: der Jahrestag, -e
Register: ''
Beispielsätze: |-
  Oggi è *l'anniversario* del loro matrimonio, quindi stanno festeggiando con una cena romantica.
  Heute ist der *Jahrestag* ihrer Hochzeit, deshalb feiern sie mit einem romantischen Abendessen.
  
  Ti ricordo che domani scade il termine per organizzare *l'anniversario* di nostro figlio.
  Ich erinnere dich daran, dass morgen die Frist für die Organisation des *Jahrestags* unseres Sohnes abläuft.
  
  Hanno programmato di trascorrere *l'anniversario* in una villa sul lago di Como, ma il tempo non è dei migliori.
  Sie haben vor, den *Jahrestag* in einer Villa am Comer See zu verbringen, aber das Wetter ist nicht besonders.
  
  Se non fosse per tutti i preparativi, *l'anniversario* sarebbe semplicemente una giornata come un'altra.
  Wenn nicht all die Vorbereitungen wären, wäre der *Jahrestag* einfach nur ein Tag wie jeder andere.
  
  È raro che qualcuno si ricordi di *l'anniversario* di un evento del genere, soprattutto se riguarda la storia locale.
  Es ist selten, dass sich jemand an den *Jahrestag* eines solchen Ereignisses erinnert, besonders wenn es die lokale Geschichte betrifft.
