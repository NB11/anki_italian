Rang: 4147
Wort: intervistare
Wortart: vt
Wort mit Artikel: intervistare
Femininum / Plural: ''
IPA: ''
Definition: interviewen
Register: ''
Beispielsätze: |-
  Il giornalista ha deciso di *intervistare* l’artista famoso per il suo nuovo album.
  Der Journalist hat beschlossen, den berühmten Künstler für sein neues Album zu *interviewen*.
  
  Se volessi *intervistare* il sindaco, dovrei prendere un appuntamento.
  Wenn ich den Bürgermeister *interviewen* wollte, müsste ich einen Termin machen.
  
  Credo che il programma dovrebbe *intervistare* anche alcuni testimoni dell’incidente.
  Ich glaube, die Sendung sollte auch einige Zeugen des Unfalls *interviewen*.
  
  Lei ha già *intervistato* tutti i partecipanti al convegno, giusto?
  Sie haben doch alle Teilnehmer der Konferenz schon *interviewt*, oder?
  
  Non appena avrò tempo, vorrei *intervistare* quella scrittrice che ha vinto il premio Nobel.
  Sobald ich Zeit habe, möchte ich diese Schriftstellerin, die den Nobelpreis gewonnen hat, *interviewen*.
