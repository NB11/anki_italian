  Dieses Buch analysiert die menschliche *Sexualität* aus historischer und kultureller Sicht.
  
  Secondo lo studio, il 60% dei giovani italiani ha ricevuto informazioni *sessuali* a scuola.
  Laut der Studie haben 60 % der jungen Italiener *sexuelle* Aufklärung in der Schule erhalten.
  
  Non è sempre facile accettare le proprie inclinazioni *sessuali*, ma è importante rimanere fedeli a se stessi.
  Es ist nicht immer einfach, die eigenen *sexuellen* Neigungen zu akzeptieren, doch es ist wichtig, sich selbst treu zu bleiben.
