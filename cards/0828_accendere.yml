Rang: 828
Wort: accendere
Wortart: v
Wort mit Artikel: accendere
Femininum / Plural: ''
IPA: ''
Definition: anzünden, einschalten, anmachen
Register: ''
Beispielsätze: |-
  Stamattina *ho acceso* la luce in cucina perché era buio.
  Heute Morgen *habe ich eingeschaltet* das Licht in der Küche, weil es dunkel war.
  
  Se non *accendete* il riscaldamento, resterete al freddo!
  Wenn ihr *einschaltet* die Heizung nicht, bleibt ihr in der Kälte!
  
  Il giudice promise che avrebbe *acceso* una luce sulla verità dei fatti.
  Der Richter versprach, dass er *anzünden* würde ein Licht auf die Wahrheit der Fakten.
  
  Mentre camminavo sulla spiaggia, ho visto un uomo che *accendeva* un falò vicino al mare.
  Während ich am Strand entlangging, sah ich einen Mann, der *anzündete* ein Lagerfeuer nahe dem Meer.
  
  Sicuramente *accenderai* quel computer, ma non funzionerà senza la password!
  Bestimmt *schaltest* du jenen Computer ein, aber er wird nicht funktionieren ohne das Passwort!.
