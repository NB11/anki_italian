Rang: 780
Wort: impossibile
Wortart: adj
Wort mit Artikel: impossibile
Femininum / Plural: ''
IPA: ''
Definition: unmöglich
Register: ''
Beispielsätze: |-
  È *impossibile* che io rimetta il documento nella borsa senza che nessuno se ne accorga.
  Es ist *unmöglich*, dass ich die Urkunde in die Tasche zurücklege, ohne dass es jemand merkt.
  
  Se non superi questo test, sarà *impossibile* per te frequentare il corso avanzato.
  Wenn du diese Prüfung nicht bestehst, wird es *unmöglich* für dich sein, den Fortgeschrittenenkurs zu besuchen.
  
  Secondo il tenente Henry, non è *impossibile* che il nemico abbia attraversato il fiume stanotte.
  Laut Leutnant Henry ist es nicht *unmöglich*, dass der Feind heute Nacht den Fluss überquert hat.
  
  Penso che sia *impossibile* trovare una soluzione senza il rispetto di tutte le parti coinvolte.
  Ich glaube, es ist *unmöglich*, eine Lösung zu finden, ohne dass alle Beteiligten Respekt zeigen.
  
  Dicono che per alcuni pazienti sia *impossibile* operarsi senza un miracolo.
  Man sagt, dass es für manche Patienten *unmöglich* ist, sich ohne ein Wunder operieren zu lassen.
