Rang: 953
Wort: cacciare
Wortart: vt
Wort mit Artikel: cacciare
Femininum / Plural: ''
IPA: ''
Definition: vertreiben, jagen, rauswerfen
Register: ''
Beispielsätze: |-
  Se *cacci* il gatto dalla cucina, non lo troverà più lì.
  Wenn du *vertreibst* die Katze aus der Küche, wirst du sie dort nicht mehr finden.
  
  Hanno *cacciato* fuori quel membro dalla riunione perché parlava troppo.
  Sie haben *rausgeworfen* jenes Mitglied aus der Besprechung, weil es zu viel geredet hatte.
  
  Spero che il governo non *cacci* i giovani dal mercato del lavoro con le sue politiche.
  Ich hoffe, dass die Regierung die Jugendlichen nicht *aus dem* Arbeitsmarkt durch ihre Politik vertreibt.
  
  Dopo l'incidente, decidedo di *cacciare* dal laboratorio quelle sostanze pericolose.
  Nach dem Vorfall entschieden sie sich, diese gefährlichen Substanzen aus dem *Labor *zu entfernen*".
  
  Se avessi più tempo, *caccerei* via tutti i fantasmi che mi perseguitano.
  Wenn ich mehr Zeit hätte, *würde ich vertreiben* alle Gespenster, die mich verfolgen.
