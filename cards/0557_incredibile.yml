Rang: 557
Wort: incredibile
Wortart: adj
Wort mit Artikel: incredibile
Femininum / Plural: incredibili
IPA: ''
Definition: unglaublich, sensationell
Register: ''
Beispielsätze: |-
  È *incredibile* quanto tu abbia imparato in così poco tempo!
  Es ist *unglaublich*, wie viel du in so kurzer Zeit gelernt hast!
  
  Questo film era davvero *incredibile*, non trovi?
  Dieser Film war wirklich *sensationell*, findest du nicht?
  
  Non mi sembra *incredibile* che abbia vinto il primo premio!
  Es erscheint mir nicht *unglaublich*, dass er den ersten Preis gewonnen hat!
  
  Sembri *incredibile* con questa nuova pettinatura!
  Du siehst *unglaublich* gut mit dieser neuen Frisur aus!
  
  È *incredibile* che non abbia chiamato dopo tutto questo tempo.
  Es ist *unglaublich*, dass er nach all dieser Zeit nicht angerufen hat.
