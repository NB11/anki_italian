Definition: unglaublich
Register: ''
Beispielsätze: |-
  Hai una memoria *incredibile*, ricordi ogni dettaglio!
  Du hast ein *unglaubliches* Gedächtnis, du erinnerst dich an jede Einzelheit!
  
  È *incredibile* come abbia risolto il problema così veloce!
  Es ist *unglaublich*, wie er das Problem so schnell gelöst hat!
  
  Se avessi scelto *qualunque* altro caffè, sarebbe stato meno buono.
  Hättest du *irgendeinen* anderen Kaffee gewählt, wäre er weniger gut gewesen.
  
  Non posso scommettere che tutto andrà *incredibilmente* bene.
  Ich *wage es nicht zu tippen*, dass alles so unglaublich gut laufen wird.
  
  Dopo sette ore di revisione, finalmente ho trovato l’errore *incredibile* nella lettera.
  Nach *sieben* Stunden Nachprüfung habe ich endlich den unglaublichen Fehler im Brief gefunden.
