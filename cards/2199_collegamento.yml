Rang: 2199
Wort: collegamento
Wortart: n.m
Wort mit Artikel: il collegamento
Femininum / Plural: collegamenti
IPA: ''
Definition: die Verbindung, -en
Register: ''
Beispielsätze: |-
  Il *collegamento* tra la stazione e l’albergo è molto comodo.
  Die *Verbindung* zwischen dem Bahnhof und dem Hotel ist sehr praktisch.
  
  Senza un *collegamento* internet stabile, non possiamo lavorare.
  Ohne eine stabile *Verbindung* zum Internet können wir nicht arbeiten.
  
  Vorresti che ti spiegassi il *collegamento* tra queste due teorie?
  Möchtest du, dass ich dir die *Verbindung* zwischen diesen beiden Theorien erkläre?
  
  Hanno annunciato che il *collegamento* ferroviario sarà ristrutturato entro l’anno prossimo.
  Sie haben bekannt gegeben, dass die *Verbindung* mit der Eisenbahn noch im nächsten Jahr renoviert wird.
  
  Mi dispiace, ma il *collegamento* che cercavi non esiste più.
  Es tut mir leid, aber die *Verbindung*, die du suchst, gibt es nicht mehr.
