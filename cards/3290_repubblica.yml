Rang: 3290
Wort: repubblica
Wortart: n.f
Wort mit Artikel: la repubblica
Femininum / Plural: repubbliche
IPA: ''
Definition: die Republik, -en
Register: ''
Beispielsätze: |-
  Oggi la *repubblica* compie cento anni e la città organizza varie celebrazioni.
  Heute feiert die *Republik* ihren hundertsten Geburtstag und die Stadt organisiert verschiedene Feiern.
  
  Credevo che la *repubblica* fosse più stabile, ma evidentemente ho sbagliato a giudicare.
  Ich dachte, die *Republik* sei stabiler, aber offensichtlich habe ich mich geirrt.
  
  Se la *repubblica* non fosse così corrotta, i cittadini avrebbero più fiducia nelle istituzioni.
  Wenn die *Republik* nicht so korrupt wäre, hätten die Bürger mehr Vertrauen in die Institutionen.
  
  Hanno proclamato la nascita della nuova *repubblica* dopo mesi di rivolta contro il regime precedente.
  Sie haben die Geburt der neuen *Republik* nach Monaten des Aufstands gegen das vorherige Regime ausgerufen.
  
  In questa *repubblica* la libertà di stampa è considerata un bene prezioso, ma purtroppo non dappertutto.
  In dieser *Republik* gilt die Pressefreiheit als kostbares Gut, leider aber nicht überall.
