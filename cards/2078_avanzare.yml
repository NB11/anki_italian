Rang: 2078
Wort: avanzare
Wortart: vi
Wort mit Artikel: avanzare
Femininum / Plural: ''
IPA: ''
Definition: übrig bleiben, verbleiben
Register: ''
Beispielsätze: |-
  Dopo aver mangiato, sono rimasti solo due biscotti che *avanzano* sul piatto.
  Nach dem Essen sind nur noch zwei Kekse *übrig geblieben* auf dem Teller.
  
  Se *avanzasse* qualche soldo, potremmo comprare un biglietto per il concerto.
  Wenn noch ein bisschen Geld *übrig wäre*, könnten wir ein Ticket für das Konzert kaufen.
  
  Devi mangiare tutta la pasta, altrimenti *avanza* e diventa secca!
  Du musst die ganze Pasta essen, sonst *bleibt* etwas übrig und wird trocken!
  
  Gli scienziati hanno scoperto che *avanza* ancora del tempo per risolvere il problema.
  Die Wissenschaftler haben herausgefunden, dass noch *Zeit übrig bleibt*, um das Problem zu lösen.
  
  Non preoccuparti, c'è sempre una soluzione anche quando *avanza* solo una minima possibilità.
  Mach dir keine Sorgen, es gibt immer eine Lösung, selbst wenn nur eine *winzige Chance übrig bleibt*.
