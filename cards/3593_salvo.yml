Rang: 3593
Wort: salvo
Wortart: n.m/f
Wort mit Artikel: il salvo
Femininum / Plural: salvi
IPA: ''
Definition: der/die/das *Rettete*, -
Register: ''
Beispielsätze: |-
  Grazie al *salvo* di un passante, il bambino è stato tirato fuori dall'acqua.
  Dank der *Rettung* eines Passanten wurde das Kind aus dem Wasser gezogen.
  
  Dopo il terremoto, molti volontari hanno offerto il loro *salvo* alle famiglie colpite.
  Nach dem Erdbeben boten viele Freiwillige den Betroffenen ihre *Hilfe* an.
  
  Il *salvo* è stato possibile solo perché qualcuno ha chiamato i soccorsi in tempo.
  Die *Rettung* gelang nur, weil jemand rechtzeitig den Notruf gewählt hatte.
  
  Nonostante i gravi danni, ci fu un *salvo* miracoloso che salvò l'intera squadra.
  Trotz der schweren Schäden gab es eine *Rettung* wie durch ein Wunder, die das ganze Team rettete.
  
  Il sindaco ha elogiato il coraggio di chi ha contribuito al *salvo* delle persone intrappolate.
  Der Bürgermeister lobte den Mut derer, die zur *Rettung* der Eingeschlossenen beigetragen hatten.
