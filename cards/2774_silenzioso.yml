Rang: 2774
Wort: silenzioso
Wortart: adj
Wort mit Artikel: silenzioso
Femininum / Plural: ''
IPA: ''
Definition: leise, still, ruhig
Register: ''
Beispielsätze: |-
  Il laboratorio è *silenzioso* perché tutti i macchinari sono spenti oggi.
  Das Labor ist *leise*, weil alle Maschinen heute ausgeschaltet sind.
  
  Vorresti un ambiente più *silenzioso* per studiare o preferisci un po’ di rumore di fondo?
  Möchtest du eine *ruhigere* Umgebung zum Lernen oder bevorzugst etwas Hintergrundlärm?
  
  Nonostante il trambusto fuori, dentro la chiesa era tutto *silenzioso*.
  Trotz des Trubels draußen war es drinnen in der Kirche *still*.
  
  Se l’ascensore fosse stato più *silenzioso*, nessuno si sarebbe accorto della nostra presenza.
  Wäre der Aufzug *leiser* gewesen, hätte niemand unsere Anwesenheit bemerkt.
  
  Il regista vuole delle scene *silenziose* per creare un’atmosfera di tensione.
  Der Regisseur möchte *stille* Szenen, um eine angespannte Atmosphäre zu schaffen.
