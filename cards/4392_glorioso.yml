Rang: 4392
Wort: glorioso
Wortart: adj
Wort mit Artikel: glorioso
Femininum / Plural: ''
IPA: ''
Definition: berühmt, ruhmvoll
Register: ''
Beispielsätze: |-
  Il film racconta la storia di un’impresa *gloriosa* che ha cambiato la nazione.
  Der Film erzählt die Geschichte eines *berühmten* Unternehmens, das das Land verändert hat.
  
  Nonostante l’età, ha vissuto una carriera *gloriosa* nel calcio.
  Trotz des Alters hat er eine *ruhmvolle* Karriere im Fußball erlebt.
  
  È *glorioso* vedere come abbia aiutato tanti senza chiedere nulla in cambio.
  Es ist *berühmt*, wie er so vielen geholfen hat, ohne etwas dafür zu verlangen.
  
  I soldati portano con sé il ricordo delle loro vittorie *gloriose*.
  Die Soldaten tragen die Erinnerung an ihre *ruhmvollen* Siege mit sich.
  
  Spera che il suo nuovo romanzo diventi *glorioso* come il precedente.
  Er hofft, dass sein neuer Roman *berühmt* wird wie der vorherige.
