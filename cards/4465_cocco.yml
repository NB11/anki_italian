Rang: 4465
Wort: cocco
Wortart: n.m
Wort mit Artikel: il cocco
Femininum / Plural: cocchi
IPA: ''
Definition: der Kokosnussbaum, -bäume
Register: ''
Beispielsätze: |-
  Ho comprato un pacchetto di *cocchi* per fare una torta eccezionale.
  Ich habe ein Paket *Kokosnüsse* gekauft, um einen tollen Kuchen zu machen.
  
  In questa *cocca* c'è ancora un po' di latte da bere.
  In dieser *Kokosnuss* ist noch etwas Milch zum Trinken.
  
  Mi hanno detto che al mercato vendono *cocchi* freschi solo al mattino.
  Man hat mir gesagt, dass sie auf dem Markt frische *Kokosnüsse* nur am Morgen verkaufen.
  
  Se vuoi provare a coltivare un *cocco* a casa, assicurati di avere molta luce e calore.
  Wenn du versuchen willst, eine *Kokospalme* zu Hause zu ziehen, stelle sicher, dass du viel Licht und Wärme hast.
  
  Dal terrazzo si vedono degli alberi di *cocco* che si muovono leggermente con il vento.
  Von der Terrasse aus sieht man einige *Kokospalmen*, die sich leicht mit dem Wind bewegen.
