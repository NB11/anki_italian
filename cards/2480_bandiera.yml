Rang: 2480
Wort: bandiera
Wortart: n.f
Wort mit Artikel: la bandiera
Femininum / Plural: bandiere
IPA: ''
Definition: die Flagge, -n
Register: ''
Beispielsätze: |-
  La *bandiera* italiana è di un verde, bianco e rosso molto vivaci.
  Die *Flagge* Italiens hat ein sehr lebendiges Grün, Weiß und Rot.
  
  Domani sventolerà la nuova *bandiera* della nostra scuola.
  Morgen wird die neue *Flagge* unserer Schule wehen.
  
  Nonostante il vento forte, la *bandiera* è rimasta ferma al suo posto.
  Trotz des starken Windes blieb die *Flagge* an ihrem Platz.
  
  Se vogliamo farci notare, issiamo una *bandiera* colorata.
  Wenn wir auffallen wollen, hissen wir eine bunte *Flagge*.
  
  L’architetto ha progettato un edificio con una *bandiera* gigante sulla facciata.
  Der Architekt hat ein Gebäude mit einer riesigen *Flagge* an der Fassade entworfen.
