Rang: 610
Wort: dolore
Wortart: n.m
Wort mit Artikel: il dolore
Femininum / Plural: dolori
IPA: ''
Definition: der Schmerz, -e
Register: ''
Beispielsätze: |-
  Dopo l'incidente ho provato un *dolore* insopportabile al braccio.
  Nach dem *Vor*all habe ich einen unerträglichen Schmerz im Arm gespürt.
  
  Nonostante il *dolore*, continuò a cantare durante il concerto di Natale.
  Trotz des *Schmerzes* sang er weiter beim Weihnachtskonzert.
  
  Se vuoi liberare gli altri dal *dolore*, devi aiutare chi soffre, come diceva Cristo.
  Wenn du andere von *Schmerz* befreien willst, musst du denen helfen, die leiden, wie Christus sagte.
  
  Avvicinati piano, senza fare rumore, perché il *dolore* è ancora troppo forte in questa compagnia di soldati.
  Komm langsam näher, ohne Lärm zu machen, denn der *Schmerz* ist in dieser Gesellschaft von Soldaten noch zu stark.
  
  Il *dolore* che provi ora è semplicemente la conseguenza di un guaio che hai cercato di fingere.
  Der *Schmerz*, den du jetzt empfindest, ist einfach die Folge eines Problems, das du vortäuschen wolltest.
