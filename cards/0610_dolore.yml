Rang: 610
Wort: dolore
Wortart: n.m
Wort mit Artikel: il dolore
Femininum / Plural: dolori
IPA: ''
Definition: der Schmerz, -e
Register: ''
Beispielsätze: |-
  Sento un *dolore* acuto alla schiena.
  Ich spüre einen *stechenden Schmerz* im Rücken.
  
  Il *dolore* è diminuito dopo la medicina.
  Der *Schmerz* ist nach der Medizin zurückgegangen.
  
  Non vorrei provare questo *dolore* mai più!
  Ich möchte diesen *Schmerz* nie wieder erleben!
  
  Ha sofferto *dolori* atroci per giorni.
  Er hat *qualvolle Schmerzen* tagelang erlitten.
  
  Il medico ha parlato di un *dolore* cronico.
  Der Arzt sprach von einem *chronischen Schmerz*.
