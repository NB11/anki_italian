Rang: 2102
Wort: orario
Wortart: n.m
Wort mit Artikel: l'orario
Femininum / Plural: orari
IPA: ''
Definition: der Stundenplan, -pläne / der Fahrplan, -pläne
Register: ''
Beispielsätze: |-
  L'*orario* delle lezioni di oggi è molto fitto.
  Der *Stundenplan* der heutigen Unterrichtsstunden ist sehr voll.
  
  Non ho ancora ricevuto l'*orario* dei treni per domani.
  Ich habe den *Fahrplan* für morgen noch nicht erhalten.
  
  Vorrei che l'*orario* fosse più flessibile, così potrei visitare la mostra.
  Ich wünschte, der *Stundenplan* wäre flexibler, dann könnte ich die Ausstellung besuchen.
  
  L'*orario* del museo è cambiato: apriamo alle nove invece che alle otto.
  Der *Fahrplan* des Museums hat sich geändert: Wir öffnen um neun statt um acht.
  
  Nonostante l'*orario* serale, ho deciso di andare alla puntata delle nove.
  Trotz des späten *Stundenplans* habe ich mich entschieden, die Folge um neun zu schauen.
