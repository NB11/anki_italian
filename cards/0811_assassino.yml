Rang: 811
Wort: assassino
Wortart: n.m
Wort mit Artikel: l'assassino
Femininum / Plural: assassini
IPA: ''
Definition: der Mörder, der Attentäter
Register: ''
Beispielsätze: |-
  L'*assassino* è stato arrestato dalla polizia questa mattina.
  Der *Mörder* wurde heute Morgen von der Polizei verhaftet.
  
  Chi è questo *assassino* di cui parlate?
  Wer ist dieser *Attentäter*, über den ihr sprecht?
  
  Gli *assassini* sono fuggiti dal carcere ieri notte.
  Die *Mörder* sind gestern Nacht aus dem Gefängnis geflohen.
  
  L'opinione pubblica teme che ci sia un nuovo *assassino* in libertà.
  Die Öffentlichkeit fürchtet, dass ein neuer *Mörder* frei herumläuft.
  
  Spero che nessun *assassino* possa nuocere alla mia famiglia.
  Ich hoffe, dass kein *Attentäter* meiner Familie schaden kann.
