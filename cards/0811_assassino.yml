Rang: 811
Wort: assassino
Wortart: n.m
Wort mit Artikel: l'assassino
Femininum / Plural: gli assassini
IPA: ''
Definition: der Mörder, -
Register: ''
Beispielsätze: |-
  L'*assassino* è fuggito attraverso il bosco vicino all'albero caduto.
  Der *Mörder* ist durch den Wald nahe dem gefallenen Baum geflohen.
  
  La polizia ha finalmente catturato l'*assassino* che aveva scomparso nella notte.
  Die Polizei hat endlich den *Mörder* gefasst, der verschwunden war in der Nacht.
  
  Se *stasera* vedrai un uomo sospetto vicino alla finestra, chiama la sicurezza!
  Wenn du *heute Abend* einen verdächtigen Mann nahe dem Fenster siehst, ruf die Sicherheit!
  
  Credo che l'*assassino* sia ancora tra noi, ma nessuno vuole parlarne apertamente.
  Ich glaube, der *Mörder* ist noch unter uns, aber niemand will offen darüber sprechen.
  
  L'*assassino* che ha ucciso il sergente Henry è stato condannato a trent'anni di pena detentiva.
  Der *Mörder*, der den Unteroffizier Henry getötet hat, wurde zu 30 Jahren Haftstrafe verurteilt.
