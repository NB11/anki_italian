Rang: 1276
Wort: sottotitolo
Wortart: n.m
Wort mit Artikel: il sottotitolo
Femininum / Plural: sottotitoli
IPA: ''
Definition: der Untertitel, -
Register: ''
Beispielsätze: |-
  Nel *sottotitolo* del film mancava una battuta fondamentale.
  Im *Untertitel* des Films fehlte ein entscheidender Satz.
  
  Se non capisci l’inglese, guarda il *sottotitolo* in italiano!
  Wenn du kein Englisch verstehst, schau dir den *Untertitel* auf Italienisch an!
  
  Ha aggiunto un *sottotitolo* ironico alla fine del video per spiegare il finale.
  Er *hat* einen ironischen Untertitel am Ende des Videos hinzugefügt, um das Ende zu erklären.
  
  Nonostante il *sottotitolo* chiaro, molti spettatori hanno dubitato della soluzione dell’enigma.
  Trotz des klaren *Untertitels* zweifelten viele Zuschauer an der Lösung des Rätsels.
  
  Il regista ha insistito affinché il *sottotitolo* fosse tradotto con precisione, senza alterare il senso.
  Der Regisseur bestand darauf, dass der *Untertitel* präzise übersetzt wurde, ohne den Sinn zu verändern.
