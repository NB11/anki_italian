Rang: 1484
Wort: ombra
Wortart: n.f
Wort mit Artikel: l'ombra
Femininum / Plural: ombre
IPA: ''
Definition: der Schatten, -
Register: ''
Beispielsätze: |-
  L'*ombra* dell'albero si allungava sul prato mentre il sole tramontava.
  Der *Schatten* des Baumes verlängerte sich über die Wiese, während die Sonne unterging.
  
  Nonostante la *ombra*, la temperatura era ancora troppo alta per stare all'aperto.
  Trotz des *Schattens* war die Temperatur noch zu hoch, um draußen zu bleiben.
  
  Hai visto quell'*ombra* vicino alla porta? Mi ha fatto venire i brividi!
  Hast du diesen *Schatten* neben der Tür gesehen? Mir ist eine Gänsehaut gekommen!
  
  Vorrei sedermi lì dove l'*ombra* della casa copre il giardino.
  Ich würde mich gerne dorthin setzen, wo der *Schatten* des Hauses den Garten bedeckt.
  
  Se avessimo più *ombre* sotto questi alberi, potremmo fare un picnic tranquillo.
  Wenn wir mehr *Schatten* unter diesen Bäumen hätten, könnten wir ein ruhiges Picknick machen.
