Rang: 782
Wort: caccia
Wortart: n.f
Wort mit Artikel: la caccia
Femininum / Plural: cacce
IPA: ''
Definition: die Jagd, -en
Register: ''
Beispielsätze: |-
  La *caccia* al tesoro di ieri è stata molto emozionante; abbiamo trovato un documento antico nel corso del gioco.
  Die *Jagd* nach dem Schatz von gestern war sehr aufregend; wir haben eine alte Urkunde im Kurs des Spiels gefunden.
  
  Gli eserciti medievali organizzeranno una grande *caccia* agli animali pericolosi per proteggere le specie locali.
  Die mittelalterlichen *Heere* werden eine große Jagd auf gefährliche Tiere organisieren, um die örtlichen Arten zu schützen.
  
  Se non rispetti le *pene* previste per la caccia illegale, costringerai gli animali in pericolo a scomparire dalla classe animale.
  Wenn du die Strafen für illegale *Jagd* nicht befolgst, zwingst du die gefährdeten Tiere dazu, aus der Tierklasse zu verschwinden.
  
  Non è giallo che la *caccia* notturna al mostro sia stata annullata? – Sì, il governo ha supposto un pericolo reale.
  Ist es nicht seltsam, dass die nächtliche *Jagd* auf das Ungeheuer abgesagt wurde? – Ja, die Regierung hat eine echte Gefahr vermutet.
  
  Dopo aver studiato le operazioni segrete del terzo reale, il tenente ha deciso di assumere un personale specializzato per la *caccia* al ladro.
  Nachdem er die geheimen *Operationen* des dritten wirklichen Königs studiert hatte, beschloss der Leutnant, für die Jagd nach dem Dieb ein privates Team einzustellen.
