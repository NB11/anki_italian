Wort mit Artikel: la caccia
Femininum / Plural: cacce
IPA: ''
Definition: die Jagd, die Verfolgung
Register: ''
Beispielsätze: |-
  La *caccia* al tesoro è molto emozionante.
  Die *Schatzsuche* ist sehr aufregend.
  
  Hanno organizzato una *caccia* in montagna.
  Sie haben eine *Jagd* in den Bergen organisiert.
  
  Che tipo di *caccia* preferisci?
  Welche Art von *Jagd* bevorzugst du?
  
  La *caccia* al cervo è vietata in questa zona.
  *Die Hirschjagd* ist in dieser Gegend verboten.
  
  Dopo la *caccia*, siamo tornati a casa stanchi.
  Nach der *Jagd* sind wir müde nach Hause zurückgekehrt.
