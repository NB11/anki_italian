Rang: 4323
Wort: vigilato
Wortart: adj
Wort mit Artikel: vigilato
Femininum / Plural: ''
IPA: ''
Definition: überwacht, kontrolliert
Register: ''
Beispielsätze: |-
  La polizia ha *vigilato* attentamente la zona per prevenire furti.
  Die Polizei hat die Zone sorgfältig *überwacht*, um Diebstähle zu verhindern.
  
  Nonostante fosse *vigilato* dai genitori, il ragazzo riuscì a uscire di nascosto.
  Obwohl er von seinen Eltern *kontrolliert* wurde, schaffte es der Junge, heimlich rauszugehen.
  
  Il sistema finanziario deve essere sempre *vigilato* per evitare frodi.
  Das Finanzsystem muss ständig *überwacht* werden, um Betrug zu vermeiden.
  
  Se fossi *vigilato* costantemente, mi sentirei molto a disagio.
  Wenn ich ständig *kontrolliert* würde, würde ich mich sehr unwohl fühlen.
  
  La prigione dove è detenuto il prigioniero politico è strettamente *vigilata* giorno e notte.
  Das Gefängnis, in dem der politische Gefangene inhaftiert ist, wird Tag und Nacht streng *überwacht*.
