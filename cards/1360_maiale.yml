Rang: 1360
Wort: maiale
Wortart: n.m
Wort mit Artikel: il maiale
Femininum / Plural: maiali
IPA: ''
Definition: das Schwein, -e
Register: ''
Beispielsätze: |-
  Ieri *maiale* al mercato costava solo cinque euro al chilo, un affare decisamente straordinario!
  Gestern kostete *Schwein* am Markt nur fünf Euro pro Kilo, ein Schnäppchen außergewöhnlich!
  
  Mio nonno aveva un allevamento di *maiali* in campagna, dove viveva insieme a tutta la famiglia.
  Mein Opa besaß einen *Schweine*hof auf dem Land, wo er mit der ganzen Familie lebte.
  
  Nonostante le critiche, lei insiste nel dire che il *maiale* al forno è la sua specialità assoluta.
  Trotz der Kritik *besteht* sie darauf, dass der Schweinebraten ihre absolute Spezialität ist.
  
  Se vuoi cucinare un piatto tipico toscano, prova a preparare i fagioli all’uccelletto con la *polpa di maiale* fresca.
  Wenn du ein typisches toskanisches Gericht kochen möchtest, versuche, Bohnen mit frischem *Schweine*fleisch zuzubereiten.
  
  L’ispettore ha trovato tracce di *maiale* nel ristorante, ma il proprietario ha negato ogni responsabilità.
  Der *Inspektor* fand Spuren von Schwein im Restaurant, doch der Besitzer leugnete jede Verantwortung.
