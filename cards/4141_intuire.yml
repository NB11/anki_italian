Rang: 4141
Wort: intuire
Wortart: v
Wort mit Artikel: intuire
Femininum / Plural: ''
IPA: ''
Definition: ahnen, vermuten, erahnen
Register: ''
Beispielsätze: |-
  Dai suoi occhi lucidi potevo *intuire* che nascondeva qualcosa di brutto.
  Aus seinen glänzenden Augen konnte ich *ahnen*, dass er etwas Schlimmes verbarg.
  
  Nonostante le apparenze, lei riuscì a *intuire* la verità nascosta dietro quella facciata.
  Trotz der Erscheinungen gelang es ihr, die *vermutete* Wahrheit hinter dieser Fassade zu erahnen.
  
  Chi avrebbe mai potuto *intuire* che la piccola Lisa sarebbe diventata una famosa artista?
  Wer hätte je *ahnen* können, dass die kleine Lisa eine berühmte Künstlerin werden würde?
  
  Se avessi *intuito* prima le sue intenzioni, non mi sarei fidato di lui.
  Wenn ich seine Absichten früher *erahnt* hätte, hätte ich ihm nicht vertraut.
  
  Bis a quando non *intuirai* il reale significato delle sue parole, non potrai giudicare il suo comportamento.
  Bis du die eigentliche Bedeutung seiner Worte *erahnst*, kannst du sein Verhalten nicht beurteilen.
