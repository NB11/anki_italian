Beispielsätze: |-
  Ho bisogno di un *consulente* che mi aiuti a risolvere questo problema fiscale.
  Ich brauche einen *Berater*, der mir hilft, dieses steuerliche Problem zu lösen.
  
  Il *consulente* ci ha spiegato molto chiaramente come funziona la nuova legge.
  Der *Berater* hat uns sehr klar erklärt, wie das neue Gesetz funktioniert.
  
  Se fossi stato un *consulente* più esperto, avrei evitato questo errore.
  Wenn ich ein erfahrenerer *Berater* gewesen wäre, hätte ich diesen Fehler vermieden.
  
  Mi hanno raccomandato un *consulente* che lavora particolarmente bene con le start-up innovative.
  Man hat mir einen *Berater* empfohlen, der besonders gut mit innovativen Start-ups zusammenarbeitet.
  
  Spero che il *consulente* riesca a trovare una soluzione prima della scadenza del contratto.
  Ich hoffe, dass es dem *Berater* gelingt, eine Lösung vor Vertragsablauf zu finden.
