Rang: 4877
Wort: nostalgia
Wortart: n.f
Wort mit Artikel: la nostalgia
Femininum / Plural: nostalgie
IPA: ''
Definition: die *Nostalgie*, der Sehnsucht
Register: ''
Beispielsätze: |-
  Quando ascolto quella canzone provo sempre una forte *nostalgia* per la mia infanzia in montagna.
  Wenn ich das Lied höre, spüre ich immer eine starke *Sehnsucht* nach meiner Kindheit in den Bergen.
  
  Nonostante il miglioramento della situazione, sentiva ancora un senso di *nostalgia* per il tempo andato.
  Trotz der *Verbesserung* der Situation spürte er noch immer ein Gefühl der Sehnsucht nach vergangenen Zeiten.
  
  È inutile che tu abbia questo sguardo pieno di *nostalgia*, ormai tutto è cambiato per sempre.
  Es ist sinnlos, dass du diesen Blick voller *Sehnsucht* hast – alles hat sich für immer geändert.
  
  La *nostalgia* per la sua terra natale lo accompagnava anche dopo vent’anni lontano da lì.
  Die *Sehnsucht* nach seiner Heimat begleitete ihn auch nach zwanzig Jahren fern von dort.
  
  Sai che molti emigrati provano una *nostalgia* così forte da tornare indietro per visite brevi ma frequenti?
  Wusstest du, dass viele Auswanderer eine so starke *Sehnsucht* empfinden, dass sie für kurze, aber häufige Besuche zurückkehren?
