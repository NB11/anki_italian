Rang: 4987
Wort: giurisdizione
Wortart: n.f
Wort mit Artikel: la giurisdizione
Femininum / Plural: giurisdizioni
IPA: ''
Definition: die Rechtsprechung, -en
Register: ''
Beispielsätze: |-
  La *giurisdizione* italiana non si applica a questo caso specifico perché si tratta di un reato commesso all'estero.
  Die *Rechtsprechung* Italiens gilt für diesen speziellen Fall nicht, da die Straftat im Ausland begangen wurde.
  
  Secondo la costituzione, la *giurisdizione* suprema spetta alla Corte Costituzionale.
  Laut der Verfassung obliegt die oberste *Rechtsprechung* dem Verfassungsgericht.
  
  Il giudice ha stabilito che la *giurisdizione* del tribunale competente è quella del luogo del reato.
  Der Richter stellte fest, dass die *Rechtsprechung* des zuständigen Gerichts die des Tatorts ist.
  
  Molti cittadini sono confusi riguardo a quale *giurisdizione* si applichi alla loro situazione legale.
  Viele Bürger sind verwirrt, welche *Rechtsprechung* in ihrer rechtlichen Situation gilt.
  
  La *giurisdizione* amministrativa si occupa di controversie tra cittadini e pubblica amministrazione.
  Die verwaltungsgerichtliche *Rechtsprechung* befasst sich mit Streitigkeiten zwischen Bürgern und öffentlicher Verwaltung.
