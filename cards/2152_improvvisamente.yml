  Er erhielt *plötzlich* einen Anruf von seinem Chef und musste zur Arbeit laufen.
  
  Non appena ha aperto il pacco, *improvvisamente* è partito un allarme antincendio.
  Sobald er das Paket öffnete, ging *plötzlich* ein Feueralarm los.
