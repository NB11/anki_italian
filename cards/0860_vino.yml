Rang: 860
Wort: vino
Wortart: n.m
Wort mit Artikel: il vino
Femininum / Plural: vini
IPA: ''
Definition: der Wein, -e
Register: ''
Beispielsätze: |-
  Vorrei bere un *vino* rosso, per favore.
  Ich möchte bitte einen *rot*en Wein trinken.
  
  Il *vino* che hai scelto è davvero eccellente, lo apprezzo molto.
  Der *Wein*, den du ausgewählt hast, ist wirklich hervorragend, ich schätze ihn sehr.
  
  Nonostante il *vino* sia buono, ho deciso di non berlo stasera perché devo guidare.
  Obwohl der *Wein* gut ist, habe ich beschlossen, ihn heute Abend nicht zu trinken, weil ich fahren muss.
  
  Se avessimo più *vino*, potremmo offrire anche ai tuoi studenti che sono presenti in aula.
  Wenn wir mehr *Wein* hätten, könnten wir auch deinen Studenten etwas anbieten, die im Klassenraum anwesend sind.
  
  Mi hanno detto che il *vino* di questa cantina si trasforma in qualcosa di straordinario dopo dieci anni.
  Man hat mir gesagt, dass der *Wein* aus diesem Keller nach zehn Jahren zu etwas Außergewöhnlichem verwandelt wird.
