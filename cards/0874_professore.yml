Rang: 874
Wort: professore
Wortart: n.m
Wort mit Artikel: il professore
Femininum / Plural: professori
IPA: ''
Definition: der Professor, -en
Register: ''
Beispielsätze: |-
  Il *professore* spiega la lezione di storia con grande entusiasmo.
  Der *Professor* erklärt die Geschichtsstunde mit großer Begeisterung.
  
  Ho incontrato il *professore* privato di mia sorella ieri pomeriggio.
  Ich habe den *Privatlehrer* meiner Schwester gestern Nachmittag getroffen.
  
  Spero che il *professore* approvi il mio progetto di ricerca.
  Ich hoffe, dass der *Professor* mein Forschungsprojekt genehmigt.
  
  Mi hanno detto che il *professore* ha rifiutato la richiesta di ritardare l’esame.
  Man hat mir gesagt, dass der *Professor* die Bitte um Prüfungsverschiebung abgelehnt hat.
  
  Se tu fossi più attento, il *professore* non ti avrebbe beccato a copiare durante il compito.
  Wenn du aufmerksamer wärst, hätte dich der *Professor* nicht beim Abschreiben erwischt.
