Rang: 4306
Wort: lite
Wortart: n.m
Wort mit Artikel: il lite
Femininum / Plural: i liti
IPA: ''
Definition: das Licht, -er
Register: ''
Beispielsätze: |-
  Non accendere il *lite* della torcia, abbiamo bisogno di buio per nasconderci.
  Schalte das *Licht* der Taschenlampe nicht ein, wir brauchen Dunkelheit, um uns zu verstecken.
  
  Ho acceso il *lite* solo per qualche secondo per leggere la mappa.
  Ich habe das *Licht* nur für ein paar Sekunden eingeschaltet, um die Karte zu lesen.
  
  Speravo che il *lite* della luna penetrasse attraverso le tende, ma era troppo debole.
  Ich hatte gehofft, dass das *Licht* des Mondes durch die Vorhänge drang, aber es war zu schwach.
  
  Se vedi un *lite* improvviso nel bosco, non avvicinarti subito: potrebbe essere pericoloso.
  Wenn du ein plötzliches *Licht* im Wald siehst, geh nicht sofort darauf zu: Es könnte gefährlich sein.
  
  Studiavo meglio quando c’era il *lite* naturale del sole e non quello artificiale della lampada.
  Ich lernte besser, wenn das natürliche *Licht* der Sonne und nicht das künstliche der Lampe vorhanden war.
