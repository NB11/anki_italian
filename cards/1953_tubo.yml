Rang: 1953
Wort: tubo
Wortart: n.m
Wort mit Artikel: il tubo
Femininum / Plural: tubi
IPA: ''
Definition: das Rohr, -e
Register: ''
Beispielsätze: |-
  Il *tubo* dell'acqua nella mia cucina ha iniziato a perdere ieri sera.
  Das *Rohr* der Wasserleitung in meiner Küche hat gestern Abend angefangen zu lecken.
  
  Non mi piace quando i *tubi* del riscaldamento fanno rumore di notte.
  Ich mag es nicht, wenn die *Heizungsrohre* nachts Geräusche machen.
  
  Ha ordinato dei *tubi* di plastica per il suo nuovo acquario, ma sono arrivati rotti.
  Er hat Plastik*rohre* für sein neues Aquarium bestellt, aber sie sind beschädigt angekommen.
  
  L'idraulico mi ha spiegato che, se il *tubo* è incrostato, potrebbe esplodere domani.
  Der Klempner hat mir erklärt, dass wenn das *Rohr* verkalkt ist, es morgen platzen könnte.
  
  Quando ho cercato di aggiustare il *tubo* della doccia, ho allagato tutto il bagno.
  Als ich versuchte, das Dusch*rohr* zu reparieren, habe ich das ganze Bad geflutet.
