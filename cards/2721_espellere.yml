Rang: 2721
Wort: espellere
Wortart: vt
Wort mit Artikel: espellere
Femininum / Plural: ''
IPA: ''
Definition: ausstoßen, entfernen, entlassen
Register: ''
Beispielsätze: |-
  Il direttore ha deciso di *espellere* l’impiegato che non rispettava le regole.
  Der Direktor hat beschlossen, den Mitarbeiter, der die Regeln nicht befolgte, zu *entlassen*.
  
  Se non paghi la cauzione, potresti essere *espulso* dallo stadio.
  Wenn du die Kaution nicht bezahlst, könntest du aus dem Stadion *geworfen* werden.
  
  Il medico ha spiegato che i pazienti gravemente malati vanno *espulsi* dal reparto di terapia intensiva.
  Der Arzt hat erklärt, dass schwer kranke Patienten aus der Intensivstation *verlegt* werden müssen.
  
  Hanno minacciato di *espellere* gli studenti che non avessero superato gli esami di fine anno.
  Sie haben gedroht, die Studenten, die die Abschlussprüfungen nicht bestehen würden, zu *verweisen*.
  
  Non appena scopriranno chi ha diffuso quelle voci, lo *espelleranno* dal partito.
  Sobald sie herausfinden, wer diese Gerüchte verbreitet hat, werden sie ihn aus der Partei *ausschließen*.
