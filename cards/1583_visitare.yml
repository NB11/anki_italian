Rang: 1583
Wort: visitare
Wortart: vt
Wort mit Artikel: visitare
Femininum / Plural: ''
IPA: ''
Definition: besuchen
Register: ''
Beispielsätze: |-
  Domani *visiteremo* il museo con la nostra classe.
  Morgen werden wir das Museum mit unserer Klasse *besuchen*.
  
  Se avessi più tempo, *visitarei* tutti i paesi europei.
  Wenn ich mehr Zeit hätte, würde ich *besuchen* alle europäischen Länder.
  
  Mio zio *visita* spesso la sua famiglia a Napoli, nonostante sia molto lontano.
  Mein Onkel *besucht* oft seine Familie in Neapel, obwohl es sehr weit ist.
  
  Hanno deciso di *visitare* il parco nazionale prima che faccia troppo caldo.
  Sie haben beschlossen, den Nationalpark zu *besuchen*, bevor es zu heiß wird.
  
  Vorresti *visitare* quella mostra d'arte di cui tutti parlano?
  Möchtest du diese Kunstausstellung *besuchen*, über die alle sprechen?
