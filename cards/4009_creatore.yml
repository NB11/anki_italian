Beispielsätze: |-
  Molte religioni descrivono un *creatore* dell'universo.
  Viele Religionen beschreiben einen *Schöpfer* des Universums.
  
  Chi è secondo te il più grande *creatore* della storia del cinema?
  Wer ist deiner Meinung nach der größte *Schöpfer* der Filmgeschichte?
  
  L’artista si considera un *creatore* di emozioni attraverso i suoi dipinti.
  Der Künstler sieht sich als *Schöpfer* von Emotionen durch seine Gemälde.
  
  Gli antichi greci credevano che Zeus fosse il *creatore* del tuono.
  Die alten Griechen glaubten, dass Zeus der *Schöpfer* des Donners war.
  
  Il laboratorio sta cercando un nuovo *creatore* di soluzioni innovative.
  Das Labor sucht einen neuen *Schöpfer* innovativer Lösungen.
