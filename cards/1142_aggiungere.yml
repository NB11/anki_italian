Rang: 1142
Wort: aggiungere
Wortart: vt
Wort mit Artikel: aggiungere
Femininum / Plural: ''
IPA: ''
Definition: hinzufügen, ergänzen
Register: ''
Beispielsätze: |-
  Per preparare la pizza, devi *aggiungere* il sale e pepe alla farina prima di mescolare.
  Um den Teig vor dem Mischen zuzubereiten, musst du *Salz* und Pfeffer hinzufügen.
  
  Il maestro ha spiegato che, secondo teoria moderna, possiamo *aggiungere* nuove prove a questa ricerca.
  Der Lehrer erklärte, dass wir laut moderner *Theorie* neue Nachweise zu dieser Forschung ergänzen können.
  
  Se non *aggiungi* questi dati al rapporto, perderemo informazioni essenziali.
  Wenn du diese *Angaben* dem Bericht nicht hinzufügst, verlieren wir wichtige Informationen.
  
  Dopo aver fatto una pausa, *aggiungeremo* al progetto anche il parere del lupo, che vive accanto al villaggio.
  Nach der *Pause* werden wir zum Projekt auch die Meinung des Wolfes ergänzen, der neben dem Dorf lebt.
  
  Avrei voluto *aggiungere* un cerchio rosso al disegno, ma ho sbagliato a prendere le misure.
  Ich hätte einen roten *Kreis* zur Zeichnung hinzufügen wollen, aber ich habe mich beim Messen vertan.
