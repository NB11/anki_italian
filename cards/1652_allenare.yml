Rang: 1652
Wort: allenare
Wortart: vt
Wort mit Artikel: allenare
Femininum / Plural: ''
IPA: ''
Definition: trainieren, üben
Register: ''
Beispielsätze: |-
  Il calciatore si *allena* ogni mattina alle sei per migliorare la sua resistenza.
  Der Fußballer *trainiert* jeden Morgen um sechs Uhr, um seine Ausdauer zu verbessern.
  
  Se non ti *allenerai* di più, non vincerai la prossima gara lì al parco.
  Wenn du dich nicht mehr *trainierst*, gewinnst du das nächste Rennen im Park nicht.
  
  Mentre il prete recitava la preghiera, i bambini *allenavano* le loro voci nel coro della chiesa.
  Während der Priester das Gebet vortrug, *übt*en die Kinder ihre Stimmen im Chor der Kirche.
  
  Le analisi mostrano che il paziente ha *allenato* troppo i muscoli senza riposo, il che ha peggiorato la sua crisi.
  Die Analysen zeigen, dass der Patient seine Muskeln zu sehr *trainiert* hat, ohne Pause, was seine Krise verschlimmert hat.
  
  Vorrei che tu *allenassi* meno, perché ultimamente hai l’aria molto stanca e il traffico vicino al magazzino non aiuta.
  Ich wünschte, du würdest weniger *trainieren*, denn in letzter Zeit siehst du sehr müde aus und der Verkehr nahe dem Lager hilft auch nicht.
