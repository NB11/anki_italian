Rang: 3317
Wort: compilare
Wortart: vt
Wort mit Artikel: compilare
Femininum / Plural: ''
IPA: ''
Definition: ausfüllen, vervollständigen
Register: ''
Beispielsätze: |-
  Devi *compilare* questo modulo prima di poter procedere con l'iscrizione.
  Du musst dieses Formular *ausfüllen*, bevor du dich einschreiben kannst.
  
  Se avessi più tempo, avrei *compilato* anche la domanda per la borsa di studio.
  Wenn ich mehr Zeit gehabt hätte, hätte ich auch den *Antrag* für das Stipendium ausgefüllt.
  
  È importante che tutti *compilino* correttamente la parte riguardante i dati personali.
  Es ist wichtig, dass alle den Teil mit den persönlichen Daten richtig *ausfüllen*.
  
  Dopo aver *compilato* il modulo, porta tutto all'ufficio competente entro domani.
  Nachdem du das Formular *ausgefüllt* hast, bringe alles morgen zur zuständigen Behörde.
  
  Spero che tu riesca a *compilare* la domanda prima che scada il termine.
  Ich hoffe, dass es dir gelingt, den Antrag *auszufüllen*, bevor die Frist abläuft.
