Definition: noch, noch immer
Register: ''
Beispielsätze: |-
  Non ho finito il libro, devo leggerlo *ancor* un paio di capitoli.
  Ich habe das Buch noch nicht beendet, ich muss noch ein paar Kapitel lesen.
  
