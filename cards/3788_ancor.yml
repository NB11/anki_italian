  Ich glaube, sie ist noch nicht bereit für diese schwierige Entscheidung.
  
  Nonostante gli sforzi, *ancor* non abbiamo trovato una soluzione al problema.
  Trotz unserer Bemühungen haben wir noch keine Lösung für das Problem gefunden.
  
  Dopo tanti anni di amicizia, si sentiva quasi *ancor* una sconosciuta tra loro.
  Nach so vielen Jahren Freundschaft fühlte sie sich fast noch immer wie eine Fremde unter ihnen.
