Rang: 4319
Wort: cardinale
Wortart: n.m
Wort mit Artikel: il cardinale
Femininum / Plural: cardinali
IPA: ''
Definition: der Kardinal, -e
Register: ''
Beispielsätze: |-
  Il *cardinale* ha guidato la cerimonia religiosa con grande autorità.
  Der *Kardinal* leitete die religiöse Zeremonie mit großer Autorität.
  
  Nonostante l’età avanzata, il *cardinale* partecipa attivamente alle discussioni ecclesiastiche.
  Trotz seines hohen Alters nimmt der *Kardinal* aktiv an den kirchlichen Diskussionen teil.
  
  Se il *cardinale* avesse saputo delle gravi accuse, avrebbe reagito diversamente.
  Hätte der *Kardinal* von den schweren Vorwürfen gewusst, hätte er anders reagiert.
  
  I vescovi si riunirono per eleggere un nuovo *cardinale* da Roma.
  Die Bischöfe trafen sich, um einen neuen *Kardinal* aus Rom zu wählen.
  
  L’articolo spiega come il *cardinale* sia una figura chiave nella gerarchia ecclesiastica.
  Der Artikel erklärt, wie der *Kardinal* eine Schlüsselrolle in der kirchlichen Hierarchie einnimmt.
