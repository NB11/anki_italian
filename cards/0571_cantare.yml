Rang: 571
Wort: cantare
Wortart: v
Wort mit Artikel: cantare
Femininum / Plural: ''
IPA: ''
Definition: singen
Register: ''
Beispielsätze: |-
  Ogni sera *canto* una canzone per mia figlia prima che si addormenti.
  Jeden Abend *singe* ich ein Lied für meine Tochter, bevor sie einschläft.
  
  Se avessi più tempo, *canterei* in un coro gospel questa settimana.
  Wenn ich mehr Zeit hätte, *würde ich* in einem Gospelsängerchor singen diese Woche.
  
  Nonostante il dolore, ha continuato a *cantare* fino alla fine dello spettacolo, come se nulla fosse.
  Trotz des Schmerzes hat er bis zum Ende der Vorstellung weiter *gesungen*, als wäre nichts gewesen.
  
  Mi dispiace che tu non sia venuto: abbiamo *cantato* davvero bene insieme ieri sera!
  Es tut mir leid, dass du nicht gekommen bist: wir haben gestern Abend wirklich gut zusammen *gesungen*!
  
  Ho sentito che *canterà* domani alla festa di Natale, ma non so quale canzone sceglierà.
  Ich habe gehört, dass er morgen auf der Weihnachtsfeier *singen wird*, aber ich weiß nicht, welches Lied er wählen wird.
