Rang: 643
Wort: spingere
Wortart: vt
Wort mit Artikel: spingere
Femininum / Plural: ''
IPA: ''
Definition: drücken, schieben, treiben
Register: ''
Beispielsätze: |-
  Devo *spingere* questa porta pesante per aprirla.
  Ich muss diese schwere Tür *drücken*, um sie zu öffnen.
  
  Hai *spinto* il carrello abbastanza forte?
  Hast du den Einkaufswagen *geschoben* genug stark?
  
  Non *spingere* quella scala, è pericoloso!
  Schieb die Leiter nicht, das ist gefährlich!
  
  Mi ha detto di non *spingere* troppo forte.
  Er hat mir gesagt, ich solle nicht zu stark *drücken*.
  
  Se non avessi *spinto* quel bottone, non si sarebbe acceso.
  Wenn ich diesen Knopf nicht *gedrückt* hätte, hätte es sich nicht eingeschaltet.
