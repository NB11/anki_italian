Rang: 643
Wort: spingere
Wortart: vt
Wort mit Artikel: spingere
Femininum / Plural: ''
IPA: ''
Definition: drücken, schieben
Register: ''
Beispielsätze: |-
  Devi *spingere* il pulsante rosso per avviare il macchinario.
  Du musst den roten Knopf *drücken*, um die Maschine zu starten.
  
  Mio fratello ha *spinto* l'uscio con violenza e la porta si è rotta.
  Mein Bruder hat die Tür *mit Gewalt aufgestoßen*, und sie ist kaputtgegangen.
  
  Secondo la polizia, qualcuno ha *spinto* l'uomo giù dalle scale deliberatamente.
  Laut Polizei hat jemand den Mann *die Treppe hinuntergestoßen*, und zwar absichtlich.
  
  Se non *spingete* più forte, la cassa non si muoverà di un millimetro.
  Wenn ihr nicht *kräftiger schiebt*, wird die Kiste sich kein bisschen bewegen.
  
  Il detective sapeva che qualcuno aveva *spinto* il sospettato a confessare con minacce.
  Der Detektiv wusste, dass jemand den Verdächtigen *mit Drohungen dazu gebracht hatte*, ein Geständnis abzulegen.
