Rang: 2832
Wort: brivido
Wortart: n.m
Wort mit Artikel: il brivido
Femininum / Plural: i brividi
IPA: ''
Definition: das Frösteln, der Schauer, der Schauder
Register: ''
Beispielsätze: |-
  Ho sentito un *brivido* lungo la schiena quando ho visto quell'ombra misteriosa.
  Ich habe einen *Schauer* den Rücken hinuntergespürt, als ich jenen mysteriösen Schatten sah.
  
  Durante l'inverno, a volte provo dei *brividi* così forti da battere i denti.
  Im Winter habe ich manchmal solche starken *Schauer*, dass ich mit den Zähnen klappere.
  
  Non sarebbe un problema se non avessi sempre questi *brividi* senza motivo apparente.
  Es wäre kein Problem, wenn ich nicht immer diese *Schauer* ohne ersichtlichen Grund hätte.
  
  Mi hanno detto che è normale avere dei *brividi* dopo un'operazione, ma tu come ti senti ora?
  Man hat mir gesagt, dass es normal ist, nach einer Operation *Schauer* zu haben, aber wie fühlst du dich jetzt?
  
  Anche se cerco di non pensarci, ogni tanto un *brivido* mi attraversa quando ripenso a quella situazione.
  Auch wenn ich versuche, nicht daran zu denken, durchzuckt mich ab und zu ein *Schauer*, wenn ich mich an diese Situation erinnere.
