Rang: 1483
Wort: piatto
Wortart: n.m
Wort mit Artikel: il piatto
Femininum / Plural: piatti
IPA: ''
Definition: der Teller, - / die Schüssel, -n / das Gericht, -e
Register: ''
Beispielsätze: |-
  Mio figlio ha rovesciato il *piatto* di pasta a tavola stamattina.
  Mein Sohn hat den *Teller* mit Nudeln am Tisch umgeworfen.
  
  Vuoi ancora un po' di questo *piatto* delizioso che ho cucinato?
  Möchtest du noch etwas von diesem *köstlichen* Gericht, das ich gekocht habe?
  
  Dopo aver interrogato il giocatore tedesco, lo hanno rilasciato senza *piatto* d'accusa.
  Nachdem sie den deutschen Spieler verhört hatten, ließen sie ihn ohne *Anklage* frei.
  
  Ho comprato tre *piatti* nuovi per la festa, ma non sono ancora arrivati.
  Ich habe drei neue *Schüsseln* für die Feier gekauft, aber sie sind noch nicht angekommen.
  
  Se vuoi provare un *piatto* tipico della regione, ti consiglio di andare in quel ristorante vicino al parco.
  Wenn du ein typisches Gericht der Region probieren möchtest, rate ich dir, in das Restaurant nahe am Park zu gehen.
