Rang: 4884
Wort: culla
Wortart: n.f
Wort mit Artikel: la culla
Femininum / Plural: culle
IPA: ''
Definition: die Wiege, -n
Register: ''
Beispielsätze: |-
  La *culla* del neonato era di legno intagliato a mano.
  Die *Wiege* des Neugeborenen war aus handgeschnitztem Holz.
  
  Hanno trovato la *culle* abbandonata nel parco, ma non sapevano di chi fosse.
  Sie fanden die *Wiege* im Park verlassen vor, wussten aber nicht, wem sie gehörte.
  
  Se non avessi quella *culla*, mia figlia non dormirebbe così bene di notte.
  Wenn ich diese *Wiege* nicht hätte, würde meine Tochter nachts nicht so gut schlafen.
  
  La *culle* che mi hanno regalato è così pesante che devo chiamare qualcuno per spostarla.
  Die *Wiege*, die sie mir geschenkt haben, ist so schwer, dass ich jemanden rufen muss, um sie zu bewegen.
  
  Mentre cucinavo, ho cantato una ninna nanna per la *culla* del piccolo.
  Während ich kochte, habe ich dem kleinen *Wiege* ein Schlaflied gesungen.
