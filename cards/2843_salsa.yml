  Wenn du eine scharfe Soße möchtest, gib etwas Chilipulver dazu.
  
  La *salsa* che hai fatto ieri è ancora nel frigorifero?
  Ist die Soße, die du gestern gemacht hast, noch im Kühlschrank?
  
  Durante il congresso, Vanessa presenterà una nuova *salsa* a base di melissa e agrumi.
