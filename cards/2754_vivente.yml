Rang: 2754
Wort: vivente
Wortart: adj
Wort mit Artikel: vivente
Femininum / Plural: ''
IPA: ''
Definition: lebendig
Register: ''
Beispielsätze: |-
  Questo è l’unico *vivente* esemplare di questa specie rara in Europa.
  Das ist das einzige *lebende* Exemplar dieser seltenen Art in Europa.
  
  I bambini chiedono se esiste ancora un lupo *vivente* in queste montagne.
  Die Kinder fragen, ob es noch einen lebenden Wolf in diesen Bergen gibt.
  
  Nonostante le condizioni avverse, la pianta è ancora *vivente* e fiorisce ogni primavera.
  Trotz der widrigen Bedingungen ist die Pflanze noch *lebend* und blüht jeden Frühling.
  
  Gli studiosi hanno trovato un organismo *vivente* nelle profondità del mare che emette luce.
  Die Forscher haben einen lebenden Organismus in der Tiefe des Meeres gefunden, der Licht aussendet.
  
  Se non ci fosse l’acqua, nessun essere *vivente* potrebbe sopravvivere su questo pianeta.
  Ohne Wasser könnte kein *lebendes* Wesen auf diesem Planeten überleben.
