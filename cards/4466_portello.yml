Rang: 4466
Wort: portello
Wortart: n.m
Wort mit Artikel: il portello
Femininum / Plural: portelli
IPA: ''
Definition: die Luke, -n
Register: ''
Beispielsätze: |-
  Il *portello* del veicolo spaziale si è aperto lentamente, permettendo agli astronauti di uscire.
  Die *Luke* des Raumschiffs öffnete sich langsam und ermöglichte es den Astronauten auszusteigen.
  
  Non toccare il *portello* dell’ascensore, potrebbe essere ancora caldo!
  Fass die *Tür* des Aufzugs nicht an, sie könnte noch heiß sein!
  
  Il meccanico ha riparato il *portello* danneggiato della macchina.
  Der Mechaniker hat die beschädigte *Tür* des Wagens repariert.
  
  Se senti un rumore strano, controlla prima il *portello* del bagagliaio.
  Wenn du ein seltsames Geräusch hörst, überprüfe zuerst die *Tür* der Kofferraumklappe.
  
  Il *portello* posteriore della cucina era rimasto aperto per tutta la notte, attirando insetti.
  Die hintere *Tür* der Küche blieb die ganze Nacht offen und lockte Insekten an.
