Rang: 1874
Wort: ruota
Wortart: n.f
Wort mit Artikel: la ruota
Femininum / Plural: ruote
IPA: ''
Definition: das Rad, Räder
Register: ''
Beispielsätze: |-
  Ho *ruote* molto resistenti sulla mia bici da corsa.
  Ich habe *Räder* an meinem Rennrad, die sehr robust sind.
  
  La *ruota* del carro si è rotta proprio mentre trasportavamo la merce.
  Das *Rad* des Wagens ist genau in dem Moment kaputtgegangen, als wir die Ware beförderten.
  
  Se avessi avuto una *ruota* di scorta, non sarei rimasto bloccato in mezzo alla strada.
  Wenn ich ein Ersatz-*Rad* gehabt hätte, wäre ich nicht mitten auf der Straße stecken geblieben.
  
  Quando ho visto che la *ruota* posteriore della mia moto era gonfia, ho chiamato l’officina.
  Als ich sah, dass das Hinter-*Rad* meines Motorrads platt war, habe ich die Werkstatt angerufen.
  
  Era così stanco che, dopo aver spinto il carro con le *ruote* bloccate, si è sdraiato a terra per riposare.
  Er war so erschöpft, dass er sich nach dem Schieben des Karrens mit den blockierten *Rädern* einfach auf den Boden legte, um sich auszuruhen.
