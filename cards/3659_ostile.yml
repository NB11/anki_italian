Rang: 3659
Wort: ostile
Wortart: adj
Wort mit Artikel: ostile
Femininum / Plural: ''
IPA: ''
Definition: feindselig, feindlich, antagonistisch
Register: ''
Beispielsätze: |-
  Non mi piace *ostile* nei confronti dei colleghi, meglio essere sempre collaborativi.
  Ich mag es nicht, wenn man *feindselig* gegenüber Kollegen ist, besser ist es immer kooperativ zu sein.
  
  Il suo atteggiamento *ostile* durante la riunione ha sorpreso tutti i presenti.
  Seine *feindliche* Haltung während der Besprechung hat alle Anwesenden überrascht.
  
  Nonostante le differenze, cercammo di mantenere un clima non *ostile* nel gruppo.
  Trotz der Unterschiede versuchten wir, eine nicht *feindselige* Stimmung in der Gruppe zu bewahren.
  
  Se avessi saputo che sarebbe stato così *ostile*, avrei evitato di parlargli.
  Wenn ich gewusst hätte, dass er so *feindlich* sein würde, hätte ich vermieden, mit ihm zu sprechen.
  
  Credo che l’atmosfera sia diventata *ostile* proprio a causa dei continui litigi.
  Ich glaube, dass die Stimmung erst durch die ständigen Streitigkeiten *feindselig* geworden ist.
