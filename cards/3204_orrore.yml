Rang: 3204
Wort: orrore
Wortart: n.m
Wort mit Artikel: lo orrore
Femininum / Plural: gli orrori
IPA: ''
Definition: das Entsetzen, der Schrecken, die Grusel
Register: ''
Beispielsätze: |-
  Il regista ha girato un film pieno di *orrore* e paura.
  Der Regisseur hat einen Film voller *Entsetzen* und Angst gedreht.
  
  Provo un profondo *orrore* per la violenza gratuita.
  Ich empfinde eine tiefe *Ablehnung* gegenüber grundloser Gewalt.
  
  Lo *orrore* che ho provato al telegiornale era immenso.
  Das *Grauen*, das ich in der Nachrichtensendung empfand, war enorm.
  
  Non posso credere che tu abbia assistito a tanta *orrore* senza reagire!
  Ich kann nicht glauben, dass du solches *Entsetzen* miterlebt hast, ohne zu reagieren!
  
  Era un romanzo che descriveva con precisione gli *orrori* della guerra.
  Es war ein Roman, der die *Schrecknisse* des Krieges präzise beschrieb.
