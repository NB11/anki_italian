Rang: 2231
Wort: generazione
Wortart: n.f
Wort mit Artikel: la generazione
Femininum / Plural: generazioni
IPA: ''
Definition: die Generation, -en
Register: ''
Beispielsätze: |-
  Questa *generazione* è molto diversa da quella dei nostri genitori.
  Diese *Generation* ist sehr unterschiedlich von der der Eltern.
  
  Non capisco perché la *generazione* di mio nonno fosse così rigida.
  Ich verstehe nicht, warum die *Generation* meines Großvaters so streng war.
  
  La *generazione* futura dovrà affrontare sfide che noi non conosciamo.
  Die zukünftige *Generation* wird Herausforderungen bewältigen müssen, die wir nicht kennen.
  
  Mio nonno ricordava con nostalgia la *generazione* degli anni ’60.
  Mein Großvater erinnerte sich sehnsüchtig an die *Generation* der 60er-Jahre.
  
  Le idee di questa *generazione* sono molto innovative rispetto alle precedenti.
  Die Ideen dieser *Generation* sind im Vergleich zu den vorherigen sehr innovativ.
