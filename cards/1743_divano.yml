Rang: 1743
Wort: divano
Wortart: n.m
Wort mit Artikel: il divano
Femininum / Plural: divani
IPA: ''
Definition: das Sofa, -s
Register: ''
Beispielsätze: |-
  Ho comprato un *divano* nuovo per il soggiorno ieri.
  Ich habe gestern ein neues *Sofa* für das Wohnzimmer gekauft.
  
  Ti piace il *divano* che abbiamo visto nel negozio?
  Gefällt dir das *Sofa*, das wir im Laden gesehen haben?
  
  Sul *divano* c'è una coperta che ho fatto io.
  Auf dem *Sofa* liegt eine Decke, die ich selbst gemacht habe.
  
  Se non ti dispiace, possiamo sederci sul *divano* in salotto.
  Wenn es dir recht ist, können wir uns auf das *Sofa* im Wohnzimmer setzen.
  
  Questo *divano* è così comodo che mi addormento sempre quando ci sto sdraiato sopra.
  Dieses *Sofa* ist so bequem, dass ich immer einschlafe, wenn ich mich darauf ausstrecke.
