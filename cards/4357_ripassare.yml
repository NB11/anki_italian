Rang: 4357
Wort: ripassare
Wortart: v
Wort mit Artikel: ripassare
Femininum / Plural: ''
IPA: ''
Definition: wiederholen, nachbereiten
Register: ''
Beispielsätze: |-
  Prima dell'esame devo *ripassare* tutte le formule di matematica che abbiamo studiato.
  Vor der Prüfung muss ich alle mathematischen Formeln *wiederholen*, die wir durchgenommen haben.
  
  Non ho capito bene l'argomento, potresti aiutarmi a *ripassare* insieme stasera?
  Ich habe das Thema nicht richtig verstanden, könntest du mir helfen, es heute Abend gemeinsam *nachzubereiten*?
  
  Durante le vacanze ho trovato il tempo per *ripassare* un po' di letteratura inglese che avevo trascurato.
  Während der Ferien fand ich Zeit, die englische Literatur, die ich vernachlässigt hatte, *wieder* durchzugehen.
  
  Se *ripassassi* gli appunti più spesso, non avresti problemi agli esami.
  Wenn du die Notizen öfter *wiederholst*, hättest du keine Probleme bei den Prüfungen.
  
  Dopo aver *ripassato* per due ore, finalmente mi sento pronto per la verifica di domani.
  Nachdem ich zwei Stunden *nachbereitet* habe, fühle ich mich endlich bereit für die Prüfung von morgen.
