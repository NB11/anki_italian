Beispielsätze: |-
  Ho fatto la *spesa* al mercato stamattina prima di andare al lavoro.
  Ich habe den *Einkauf* auf dem Markt heute Morgen vor der Arbeit erledigt.
  
  Nonostante il *vento* forte, sono andato a comprare la birra per la festa che festeggiamo domani.
  Trotz des starken *Windes* bin ich gegangen, um das Bier für die Party zu kaufen, die wir morgen feiern.
  
  Se avessi più tempo, andrei a fare la *spesa* in quel piccolo negozio vicino alla pietra miliare.
  Wenn ich mehr Zeit hätte, würde ich den *Einkauf* in diesem kleinen Laden in der Nähe des Meilensteins erledigen.
  
  La *spesa* online è comoda, ma secondo me non sostituisce l’atmosfera vivace di un vero mercato.
  Der Online-*Einkauf* ist praktisch, aber meiner Meinung nach ersetzt er nicht die lebendige Atmosphäre eines echten Markts.
  
  Dopo aver finito la *spesa*, ho dovuto tornare a casa perché avevo dimenticato il portafoglio sotto il tetto del garage.
  Nach dem *Einkauf* musste ich nach Hause zurückkehren, weil ich die Geldbörse unter dem Dach der Garage vergessen hatte.
