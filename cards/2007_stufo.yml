Rang: 2007
Wort: stufo
Wortart: adj
Wort mit Artikel: stufo
Femininum / Plural: ''
IPA: ''
Definition: genervt, gelangweilt, überdrüssig
Register: ''
Beispielsätze: |-
  Sono *stufa* di ascoltare le tue lamentele ogni giorno.
  Ich bin *genervt* von deinen Beschwerden jeden Tag.
  
  Mi ha detto che era *stufo* di quella situazione e voleva andarsene.
  Er hat mir gesagt, dass er *überdrüssig* dieser Situation war und gehen wollte.
  
  Nonostante fossi *stufa* del lavoro, ho deciso di rimanere per i soldi.
  Obwohl ich *genervt* von der Arbeit war, habe ich beschlossen zu bleiben – wegen des Geldes.
  
  Sei *stufa* di questa vita da single? Forse dovresti provare qualcosa di nuovo.
  Bist du *gelangweilt* von diesem Single-Leben? Vielleicht solltest du etwas Neues ausprobieren.
  
  Doveva essere un viaggio divertente, ma sono diventato *stufo* dopo poche ore.
  Es sollte eine lustige Reise werden, aber ich wurde *überdrüssig* nach wenigen Stunden.
