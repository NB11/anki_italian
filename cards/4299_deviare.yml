Rang: 4299
Wort: deviare
Wortart: v
Wort mit Artikel: deviare
Femininum / Plural: ''
IPA: ''
Definition: abweichen, umleiten
Register: ''
Beispielsätze: |-
  Per *deviare* il traffico, la polizia ha chiuso la strada principale.
  Um den Verkehr umzuleiten, hat die Polizei die Hauptstraße *gesperrt*.
  
  Se tu *deviassi* il fiume, potremmo costruire un ponte qui.
  Wenn du den Fluss *umleitest*, könnten wir hier eine Brücke bauen.
  
  Il treno ha *deviazioni* a causa dei lavori sulla linea ferroviaria.
  Der Zug hat *Umleitungen* wegen der Bauarbeiten auf der Strecke.
  
  La discussione ha *deviato* su argomenti personali, rendendo tutto più complicato.
  Die Diskussion ist auf persönliche Themen *abgewandert*, was alles komplizierter machte.
  
  Gli scienziati hanno proposto di *deviare* l'asteroide dalla sua rotta per evitare una collisione.
  Die Wissenschaftler haben vorgeschlagen, den Asteroiden aus seiner Bahn zu *ablenken*, um eine Kollision zu vermeiden.
