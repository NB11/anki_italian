Rang: 2227
Wort: lancia
Wortart: n.f
Wort mit Artikel: la lancia
Femininum / Plural: lance
IPA: ''
Definition: die Lanze, -n
Register: ''
Beispielsätze: |-
  Il cavaliere impugnò con forza la *lancia* prima della battaglia.
  Der Ritter packte mit aller Kraft die *Lanze* vor der Schlacht.
  
  Nella cappella del castello si vedono ancora le *lance* appese alle pareti.
  In der Schlosskapelle hängen noch immer die *Lanzen* an den Wänden.
  
  Nonostante tutto, lui non volle rinunciare alla sua *lancia* benché fosse danneggiata.
  Trotz allem wollte er auf seine *Lanze* nicht verzichten, obwohl sie beschädigt war.
  
  Ogni *lancia* antica era un simbolo di potere e di onore nel medioevo.
  Jede alte *Lanze* war im Mittelalter ein Symbol von Macht und Ehre.
  
  Vedendo che la *lancia* era troppo pesante, scelse un'altra arma più maneggevole.
  Als er merkte, dass die *Lanze* zu schwer war, wählte er eine andere, handlichere Waffe.
