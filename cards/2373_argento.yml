Rang: 2373
Wort: argento
Wortart: n.m
Wort mit Artikel: l'argento
Femininum / Plural: argenti
IPA: ''
Definition: das Silber
Register: ''
Beispielsätze: |-
  L'*argento* è un metallo molto pregiato che non arrugginisce facilmente.
  Das *Silber* ist ein sehr wertvolles Metall, das nicht so schnell rostet.
  
  Ho comprato una collana d'*argento* per la festa della mamma.
  Ich habe eine *Silber*kette für den Muttertag gekauft.
  
  Se avessi un lingotto d'*argento*, lo venderei per pagare i debiti.
  Wenn ich einen *Silber*barren hätte, würde ich ihn verkaufen, um meine Schulden zu begleichen.
  
  Gli scavi archeologici hanno riportato alla luce molti oggetti d'*argento* dell'epoca romana.
  Die Ausgrabungen haben viele Gegenstände aus *Silber* aus der Römerzeit ans Licht gebracht.
  
  Nonostante il prezzo basso, questo anello non è d'*argento*, ma solo placcato.
  Trotz des niedrigen Preises ist dieser Ring nicht aus *Silber*, sondern nur versilbert.
