Rang: 2714
Wort: deprimere
Wortart: v
Wort mit Artikel: deprimere
Femininum / Plural: ''
IPA: ''
Definition: deprimieren, niederdrücken, bedrücken
Register: ''
Beispielsätze: |-
  Il brutto tempo *deprime* molto le persone che soffrono di depressione.
  Das schlechte Wetter *drückt* die Menschen, die unter Depressionen leiden, sehr niederdrück.
  
  Mi sento triste ogni volta che la mia squadra perde, non so perché mi *deprime* così tanto.
  Ich fühle mich traurig, jedes Mal wenn mein Team verliert, ich weiß nicht warum es mich so *bedrückt*.
  
  Se tu *deprimessi* sempre i tuoi amici con le tue lamentele, presto non ne vorrebbero più sapere di te.
  Wenn du deine Freunde stets mit deinen Klagen *niederdrück* würdest, würden sie bald nichts mehr von dir wissen wollen.
  
  È stato dimostrato che il rumore costante *deprime* il sistema nervoso e riduce la produttività.
  Es wurde nachgewiesen, dass ständiger Lärm das Nervensystem *bedrückt* und die Produktivität verringert.
  
  Spero che nessuno *deprima* più la nostra amica dopo questa brutta notizia, abbiamo bisogno di sostenerci a vicenda.
  Ich hoffe, dass nach dieser schlechten Nachricht niemand mehr unsere Freundin *niederdrück*, wir müssen uns gegenseitig unterstützen.
