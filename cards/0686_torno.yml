Rang: 686
Wort: torno
Wortart: n.f
Wort mit Artikel: la torno
Femininum / Plural: ritorni
IPA: ''
Definition: die Rückkehr, -en
Register: ''
Beispielsätze: |-
  Dopo un anno all'estero, finalmente è avvenuto il suo *ritorno*.
  Nach einem Jahr im Ausland ist seine *Rückkehr* endlich geschehen.
  
  Il *ritorno* del sole mi rende felice.
  Die *Rückkehr* der Sonne macht mich glücklich.
  
  Non vedo l'ora del *ritorno* a casa.
  Ich freue mich auf die *Rückkehr* nach Hause.
  
  Il *ritorno* dell'inverno quest'anno è stato molto precoce.
  Die *Rückkehr* des Winters war dieses Jahr sehr früh.
  
  Aspetta il *ritorno* del suo amico con ansia.
  Sie wartet mit Sehnsucht auf die *Rückkehr* ihres Freundes.
