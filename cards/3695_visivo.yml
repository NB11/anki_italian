Beispielsätze: |-
  L’artista ha creato un’esperienza *visiva* molto coinvolgente per il pubblico.
  Der Künstler schuf eine sehr ansprechende *visuelle* Erfahrung für das Publikum.
  
  Nonostante i problemi *visivi*, riesce a leggere senza occhiali.
  Trotz *visueller* Probleme schafft er es, ohne Brille zu lesen.
  
  La percezione *visiva* può essere influenzata da fattori psicologici.
  Die *visuelle* Wahrnehmung kann von psychologischen Faktoren beeinflusst werden.
  
  Per il suo progetto ha bisogno di un aiuto *visivo*, non solo teorico.
  Für sein Projekt braucht er *visuelle* Unterstützung, nicht nur theoretische.
  
  Il regista ha dato grande importanza all’aspetto *visivo* del film.
  Der Regisseur legte großen Wert auf den *visuellen* Aspekt des Films.
