Rang: 4391
Wort: carogna
Wortart: n.m
Wort mit Artikel: il carogna
Femininum / Plural: le carogne
IPA: ''
Definition: der Abschaum, der Bodensatz
Register: ''
Beispielsätze: |-
  Quella *carogna* non ha aiutato nessuno durante il crollo del ponte.
  Jener *Abschaum* hat niemandem während des Einsturzes der Brücke geholfen.
  
  Pensavo di conoscere quella persona, ma si è rivelata una vera *carogna*.
  Ich dachte, diese Person zu kennen, doch sie entpuppte sich als ein wahrer *Bodensatz*.
  
  Se continui a maltrattare gli animali, verrai trattato come una *carogna*!
  Wenn du weiter Tiere *quälst*, wird man dich wie Abschaum behandeln!
  
  Il paramedico ha trovato la *carogna* di un animale nel sotterraneo dell’ospedale.
  Der *Sanitäter* fand den Abschaum eines Tieres im unterirdischen Bereich des Krankenhauses.
  
  Nonostante la sua *carogna* di carattere, tutti lo lodavano per la sua competenza.
  Trotz seiner *Abschaum*-art lobten ihn alle für seine Kompetenz.
