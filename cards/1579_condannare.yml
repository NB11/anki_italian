Rang: 1579
Wort: condannare
Wortart: v
Wort mit Artikel: condannare
Femininum / Plural: ''
IPA: ''
Definition: verurteilen, bestrafen
Register: ''
Beispielsätze: |-
  Il giudice ha *condannato* l'imputato a dieci anni di prigione per il suo crimine.
  Der Richter hat den Angeklagten zu zehn Jahren Gefängnis für sein Verbrechen *verurteilt*.
  
  Se avessimo *condannato* subito il ladro, forse non avrebbe rubato di nuovo.
  Wenn wir den Dieb sofort *verurteilt* hätten, hätte er vielleicht nicht wieder gestohlen.
  
  La società si aspetta che la legge *condanni* ogni forma di discriminazione, ma purtroppo non sempre accade.
  Die Gesellschaft erwartet, dass das Gesetz jede Form von Diskriminierung *bestraft*, aber leider passiert das nicht immer.
  
  Avendo *condannato* con fermezza ogni tipo di violenza, la nuova legge mira a proteggere i più deboli.
  Indem man jede Art von Gewalt nachdrücklich *verurteilt*, zielt das neue Gesetz darauf ab, die Schwächsten zu schützen.
  
  Prima di *condannare* qualcuno, bisognerebbe riflettere sulle possibili scuse che potrebbero avere attenuanti.
  Bevor man jemanden *verurteilt*, sollte man über mögliche Entschuldigungen mit mildernden Umständen nachdenken.
