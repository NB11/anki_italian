Rang: 3394
Wort: autunno
Wortart: n.m
Wort mit Artikel: l'autunno
Femininum / Plural: gli autunni
IPA: ''
Definition: der Herbst, -e
Register: ''
Beispielsätze: |-
  Quest’anno l’*autunno* è arrivato con tre settimane di ritardo rispetto alla media.
  Dieses Jahr ist der *Herbst* drei Wochen später gekommen als im Durchschnitt.
  
  Nonostante la pioggia, il parco in *autunno* è ancora più bello con i colori delle foglie.
  Trotz des Regens ist der Park im *Herbst* mit den Farben der Blätter noch schöner.
  
  Se l’*autunno* non fosse così umido, potremmo fare tante passeggiate nel bosco.
  Wenn der *Herbst* nicht so feucht wäre, könnten wir viele Spaziergänge im Wald machen.
  
  Ricordo ancora quando da bambino raccoglievo le castagne durante ogni *autunno*.
  Ich erinnere mich noch, wie ich als Kind jeden *Herbst* Kastanien sammelte.
  
  Dicono che l’*autunno* sia la stagione più romantica per viaggiare in Italia.
  Man sagt, der *Herbst* sei die romantischste Jahreszeit, um in Italien zu reisen.
