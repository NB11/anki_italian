Rang: 4126
Wort: onnipotente
Wortart: adj
Wort mit Artikel: onnipotente
Femininum / Plural: ''
IPA: ''
Definition: allmächtig
Register: ''
Beispielsätze: |-
  Gli scienziati cercano una teoria *onnipotente* che spieghi l'universo.
  Die Wissenschaftler suchen eine *allmächtige* Theorie, die das Universum erklärt.
  
  Se Dio è *onnipotente*, perché permette il male?
  Wenn Gott *allmächtig* ist, warum lässt er das Böse zu?
  
  Il potere *onnipotente* del re era temuto da tutti.
  Die *allmächtige* Macht des Königs wurde von allen gefürchtet.
  
  Non credere che tu sia *onnipotente*: commetti ancora errori.
  Glaube nicht, dass du *allmächtig* bist: du machst immer noch Fehler.
  
  I governi sognano un controllo *onnipotente* sulla popolazione.
  Die Regierungen träumen von einer *allmächtigen* Kontrolle über die Bevölkerung.
