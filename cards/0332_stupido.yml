Rang: 332
Wort: stupido
Wortart: adj
Wort mit Artikel: stupido
Femininum / Plural: stupidi (masch.), stupide (fem.)
IPA: ''
Definition: dumm, albern
Register: ''
Beispielsätze: |-
  Non essere *stupido*, ascolta i consigli degli altri.
  Sei nicht *dumm*, höre auf die Ratschläge der anderen.
  
  Hai fatto una scelta davvero *stupida* ieri sera.
  Du hast gestern Abend eine wirklich *dumme* Entscheidung getroffen.
  
  Perché sei così *stupido* da non capire subito?
  Warum bist du so *dumm*, dass du es nicht sofort verstehst?
  
  Mi sembra *stupido* non provare almeno una volta.
  Es erscheint mir *albern*, es nicht wenigstens einmal zu versuchen.
  
  Se fossi meno *stupida*, avresti già risolto il problema.
  Wenn du weniger *dumm* wärst, hättest du das Problem schon gelöst.
