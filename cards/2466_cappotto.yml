Rang: 2466
Wort: cappotto
Wortart: n.m
Wort mit Artikel: il cappotto
Femininum / Plural: cappotti
IPA: ''
Definition: der Mantel, -¨
Register: ''
Beispielsätze: |-
  Oggi fa molto freddo, quindi indosserò *il cappotto* che ho comprato l'inverno scorso.
  Heute ist es sehr kalt, deshalb ziehe ich den Mantel an, den ich letzten Winter gekauft habe.
  
  Hai visto *un cappotto* nero appeso all'attaccapanni dell'ingresso?
  Hast du den schwarzen Mantel gesehen, der am Garderobenhaken hängt?
  
  Se avessi saputo che sarebbe nevicato, avrei portato *il cappotto* più pesante.
  Wenn ich gewusst hätte, dass es schneien würde, hätte ich den wärmsten Mantel mitgenommen.
  
  Questo *cappotto* è così pesante che a stento riesco a muovermi con questo sole.
  Dieser Mantel ist so schwer, dass ich mich kaum bei dieser Sonne bewegen kann.
  
  Vorrei regalare *un cappotto* a mia sorella, ma non so quale colore preferisce.
  Ich würde meiner Schwester gern einen Mantel schenken, aber ich weiß nicht, welche Farbe ihr am besten gefällt.
