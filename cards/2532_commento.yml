Rang: 2532
Wort: commento
Wortart: n.m
Wort mit Artikel: il commento
Femininum / Plural: commenti
IPA: ''
Definition: die Bemerkung, -en, der Kommentar, -e
Register: ''
Beispielsätze: |-
  Ho letto un *commento* molto interessante su questo libro.
  Ich habe eine sehr interessante *Bemerkung* über dieses Buch gelesen.
  
  Il professore ha fatto un *commento* dettagliato sulla tua tesina.
  Der Professor hat einen detaillierten *Kommentar* zu deiner Hausarbeit gemacht.
  
  Senza il tuo *commento*, non avrei capito il significato di quella frase.
  Ohne deinen *Kommentar* hätte ich den Sinn dieses Satzes nicht verstanden.
  
  Gli studenti hanno scritto dei *commenti* molto critici sul nuovo protocollo del ministero.
  Die Studenten haben sehr kritische *Bemerkungen* zum neuen Protokoll des Ministeriums geschrieben.
  
  Secondo il tuo *commento*, pensi che dovremmo cambiare strategia?
  Deiner *Bemerkung* nach zu urteilen, glaubst du, wir sollten die Strategie ändern?
