Rang: 2351
Wort: drago
Wortart: n.m
Wort mit Artikel: il drago
Femininum / Plural: draghi
IPA: ''
Definition: der Drache, -n
Register: ''
Beispielsätze: |-
  Nel libro ci sono illustrazioni di un *drago* che sputa fuoco.
  In dem Buch gibt es Illustrationen von einem *Drach*en, der Feuer speit.
  
  I bambini hanno paura del *drago* nella fiaba della nonna.
  Die Kinder haben Angst vor dem *Drach*en in dem Märchen der Großmutter.
  
  Se avessi un *drago*, volerei sulle Alpi ogni fine settimana.
  Wenn ich einen *Drach*en hätte, würde ich jedes Wochenende über die Alpen fliegen.
  
  Il *drago* che hanno visto i turisti era solo un scherzo di carnevale.
  Der *Drach*e, den die Touristen gesehen haben, war nur ein Karnevalsscherz.
  
  Dicono che nel Medioevo alcuni *draghi* fossero considerati protettori dei villaggi.
  Man sagt, dass im Mittelalter einige *Drach*en als Beschützer der Dörfer galten.
