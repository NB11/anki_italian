Rang: 3921
Wort: cipolla
Wortart: n.f
Wort mit Artikel: la cipolla
Femininum / Plural: cipolle
IPA: ''
Definition: die Zwiebel, -n
Register: ''
Beispielsätze: |-
  Per cucinare il soffritto, devi soffriggere *cipolla* tritata finemente nell'olio.
  Um das Soffritto zuzubereiten, musst du die fein gehackte *Zwiebel* in Öl anbraten.
  
  Hai aggiunto troppe *cipolle* nel sugo, che ora sa troppo di acido.
  Du hast zu viele *Zwiebeln* in die Sauce gegeben, jetzt schmeckt sie zu scharf.
  
  Nonostante il dolore, non volle piangere, ma il sapore della *cipolla* tagliente gli strappò un gemito.
  Trotz des Schmerzes wollte er nicht *weinen*, doch der Geschmack der scharfen Zwiebel entlockte ihm einen Stöhnlaut.
  
  Se avessi saputo che la *cipolla* era marcia, non l’avrei mai comprata al mercato.
  Hätte ich gewusst, dass die *Zwiebel* faul war, hätte ich sie nie auf dem Markt gekauft.
  
  La ricetta richiede che la *cipolla* venga caramellizzata lentamente per mezz’ora.
  Das Rezept verlangt, dass die *Zwiebel* langsam eine halbe Stunde lang karamellisiert wird.
