Rang: 2646
Wort: compromettere
Wortart: vt
Wort mit Artikel: compromettere
Femininum / Plural: ''
IPA: ''
Definition: gefährden, beeinträchtigen
Register: ''
Beispielsätze: |-
  Se continui a *compromettere* la tua salute, rischi gravi conseguenze.
  Wenn du deine Gesundheit ständig *gefährdest*, riskierst du schwere Folgen.
  
  Non volevo *compromettere* il nostro rapporto di amicizia con i miei errori.
  Ich wollte unsere Freundschaft nicht durch meine Fehler *beeinträchtigen*.
  
  Temo che questa decisione possa *compromettere* gli sforzi degli scienziati.
  Ich fürchte, diese Entscheidung könnte die Bemühungen der Wissenschaftler *gefährden*.
  
  Hai *compromesso* il progetto non rispettando le scadenze stabilite.
  Du hast das Projekt *beeinträchtigt*, indem du die festgelegten Fristen nicht eingehalten hast.
  
  Anche se ti prego, non *compromettere* la reputazione dell'istituto con azioni avventate.
  Auch wenn ich dich bitte, gefährde den Ruf des Instituts nicht mit unüberlegten Handlungen.
Audio: ''
Notiz: ''
Dispersion: ''
