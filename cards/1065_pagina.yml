Rang: 1065
Wort: pagina
Wortart: n.f
Wort mit Artikel: la pagina
Femininum / Plural: pagine
IPA: ''
Definition: die Seite, -n
Register: ''
Beispielsätze: |-
  Ho letto attentamente *pagina* dopo pagina del romanzo che mi hai prestato.
  Ich habe *Seite* für Seite des Romans gelesen, den du mir geliehen hast.
  
  Nel rapporto dell’indagine, *pagina* 12 contiene tutte le informazioni false che abbiamo scoperto.
  Im Untersuchungsbericht enthält *Seite* 12 alle falschen Informationen, die wir entdeckt haben.
  
  Quando scrivi la tua tesi, ricorda di *pagina* la bibliografia correttamente secondo le norme locali.
  Wenn du deine Abschlussarbeit schreibst, vergiss nicht, das *Seite*nverzeichnis nach den örtlichen Richtlinien zu gestalten.
  
  Mi sono accorto solo ora che *pagina* 45 è mancante dal libro che ho comprato online.
  Mir ist erst jetzt aufgefallen, dass aus dem Buch, das ich online gekauft habe, *Seite* 45 fehlt.
  
  La professoressa ha suggerito di dividere il testo in tre *pagine* separate per una lettura più leggera e chiara.
  Die Professorin hat vorgeschlagen, den Text in drei separate *Seiten* zu unterteilen, damit die Lektüre leichter und klarer wird.
