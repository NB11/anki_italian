Rang: 3539
Wort: molo
Wortart: n.m
Wort mit Artikel: il molo
Femininum / Plural: moli
IPA: ''
Definition: der Kai, -s
Register: ''
Beispielsätze: |-
  Il *molo* è affollato di pescatori che preparano le loro reti.
  Der *Kai* ist voll mit Fischern, die ihre Netze vorbereiten.
  
  Ho visto una barca attraccare al *molo* numero cinque ieri sera.
  Ich habe gestern Abend gesehen, wie ein Boot am *Kai* Nummer fünf anlegte.
  
  Se non ci fosse il *molo*, come faremmo a scaricare le merci?
  Wenn es den *Kai* nicht gäbe, wie würden wir die Waren entladen?
  
  Il *molo* che abbiamo visitato durante la gita era molto antico e ben conservato.
  Der *Kai*, den wir beim Ausflug besichtigt haben, war sehr alt und gut erhalten.
  
  Avrei preferito passeggiare sul *molo* piuttosto che stare chiuso in ufficio tutto il giorno.
  Ich hätte lieber auf dem *Kai* spazieren gehen wollen, als den ganzen Tag im Büro eingesperrt zu sein.
