Rang: 2849
Wort: comporre
Wortart: vt
Wort mit Artikel: comporre
Femininum / Plural: ''
IPA: ''
Definition: zusammensetzen, komponieren
Register: ''
Beispielsätze: |-
  Devi *comporre* correttamente i numeri della password se vuoi accedere al sistema.
  Du musst die Zahlen des Passwortes korrekt *zusammensetzen*, um Zugang zum System zu erhalten.
  
  Il musicista ha *composto* una sinfonia per celebrare i cento anni della scuola.
  Der Musiker hat eine Sinfonie komponiert, um das hundertjährige Bestehen der Schule zu feiern.
  
  Non appena avrò tempo, *comporrò* una mail dettagliata sull’argomento.
  Sobald ich Zeit habe, werde ich eine detaillierte E-Mail zu dem Thema *zusammensetzen*.
  
  Se avessi studiato più approfonditamente, avresti capito che l’opera era stata *composta* da un autore sconosciuto.
  Hättest du gründlicher studiert, hättest du verstanden, dass das Werk von einem unbekannten Autor *komponiert* worden war.
  
  È fondamentale *comporre* il proprio curriculum in modo chiaro e professionale per trovare lavoro.
  Es ist grundlegend, den Lebenslauf klar und professionell *zusammenzusetzen*, um Arbeit zu finden.
