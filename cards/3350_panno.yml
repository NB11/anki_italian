Rang: 3350
Wort: panno
Wortart: n.m
Wort mit Artikel: il panno
Femininum / Plural: i panni
IPA: ''
Definition: der Lappen, -
Register: ''
Beispielsätze: |-
  Ho usato un *panno* umido per pulire il tavolo sporco.
  Ich habe ein *Tuch* benutzt, um den schmutzigen Tisch zu reinigen.
  
  Non dimenticare di stendere i *panni* prima che piova.
  Vergiss nicht, die *Lappen* auszubreiten, bevor es regnet.
  
  Per sgrassare la padella, servirà un *panno* asciutto e un po' di detersivo.
  Um die Pfanne zu entfetten, brauchst du ein *Tuch* und etwas Spülmittel.
  
  Mio fratello lavora in una fabbrica di *panni* da lavoro molto resistenti.
  Mein Bruder arbeitet in einer Fabrik, die sehr robuste *Arbeitslappen* herstellt.
  
  Se non hai un *panno* a portata di mano, puoi usare la maglietta per togliere la polvere.
  Falls du kein *Tuch* griffbereit hast, kannst du das T-Shirt nehmen, um den Staub abzuwischen.
