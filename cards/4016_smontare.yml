Rang: 4016
Wort: smontare
Wortart: vt
Wort mit Artikel: smontare
Femininum / Plural: ''
IPA: ''
Definition: demontieren, abbauen, abmontieren, abnehmen
Register: ''
Beispielsätze: |-
  Il meccanismo è rotto, non riesco a *smontarlo* senza aiuto.
  Der Mechanismus ist kaputt, ich schaff es nicht, ihn *auseinanderzubauen* ohne Hilfe.
  
  Dopo la gara, gli organizzatori iniziano a *smontare* le tribune.
  Nach dem Wettkampf beginnen die Veranstalter damit, die Tribünen *abzubauen*.
  
  Se non lo *smontiamo* ora, domani ci vorrà il doppio del tempo.
  Wenn wir es jetzt nicht *demontieren*, brauchen wir morgen doppelt so lange.
  
  Mi hanno detto che sarebbe facile *smontare* quella vecchia libreria, ma non è vero!
  Man hat mir gesagt, es wäre leicht, dieses alte Bücherregal *abzubauen*, aber dem ist nicht so!
  
  Prima di dipingere il muro, dovrai *smontare* gli scaffali che gli sono appesi.
  Bevor du die Wand streichst, musst du die Regale *abnehmen*, die daran hängen.
