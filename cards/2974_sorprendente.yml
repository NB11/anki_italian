Rang: 2974
Wort: sorprendente
Wortart: adj
Wort mit Artikel: sorprendente
Femininum / Plural: ''
IPA: ''
Definition: überraschend, verblüffend
Register: ''
Beispielsätze: |-
  Ho ricevuto una notizia *sorprendente* ieri sera.
  Ich habe gestern Abend eine *überraschende* Nachricht erhalten.
  
  Nonostante la sua età, la sua memoria è ancora *sorprendente*.
  Trotz ihres Alters ist ihr Gedächtnis noch *verblüffend*.
  
  L’esploratore aveva un piano *sorprendente* per trovare l’ingresso nascosto.
  Der Entdecker hatte einen *überraschenden* Plan, um den versteckten Eingang zu finden.
  
  È *sorprendente* quanto velocemente si sia diffusa la notizia!
  Es ist *verblüffend*, wie schnell sich die Nachricht verbreitet hat!
  
  Ho trovato un’idea così *sorprendente* che non sapevo cosa rispondere.
  Ich habe eine so *überraschende* Idee gefunden, dass ich nicht wusste, was ich antworten sollte.
