Rang: 4367
Wort: impiego
Wortart: n.m
Wort mit Artikel: l'impiego
Femininum / Plural: impieghi
IPA: ''
Definition: der Einsatz, -sätze, die Beschäftigung, -en
Register: ''
Beispielsätze: |-
  Il *impiego* che ho trovato è molto interessante e ben pagato.
  Die *Beschäftigung*, die ich gefunden habe, ist sehr interessant und gut bezahlt.
  
  Hanno ridotto il numero degli *impieghi* nel settore pubblico negli ultimi anni.
  Sie haben die *Einsätze* im öffentlichen Sektor in den letzten Jahren reduziert.
  
  Vorrei congratularmi per il nuovo *impiego* che hai ottenuto!
  Ich möchte dir zu der neuen *Stellung* gratulieren, die du bekommen hast!
  
  Nonostante il *impiego* fisico, si sente ancora stanco ogni sera.
  Trotz der *Beschäftigung* fühlt er sich jeden Abend noch müde.
  
  Appena saprò le condizioni del *impiego*, ti informerò subito.
  Sobald ich die Bedingungen der *Anstellung* kenne, werde ich dich sofort informieren.
