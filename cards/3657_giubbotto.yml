Rang: 3657
Wort: giubbotto
Wortart: n.m
Wort mit Artikel: il giubbotto
Femininum / Plural: giubbotti
IPA: ''
Definition: die Jacke, -n
Register: ''
Beispielsätze: |-
  Fa freddo oggi, quindi indosso sempre *il giubbotto* quando esco.
  Es ist kalt heute, deshalb trage ich immer die *Jacke*, wenn ich ausgehe.
  
  Questo *giubbotto* è troppo stretto, dovrei allungare le maniche.
  Diese *Jacke* ist zu eng, ich sollte die Ärmel verlängern.
  
  Mio fratello ha comprato un *giubbotto* di pelle nero per l’inverno.
  Mein Bruder hat eine schwarze Leder*jacke* für den Winter gekauft.
  
  Dopo la pioggia, ho appeso *il giubbotto* bagnato vicino al termosifone.
  Nach dem Regen habe ich die nasse *Jacke* in der Nähe der Heizung aufgehängt.
  
  Nonostante il freddo, lei ha preferito non indossare *il giubbotto*, perché le sembra scomodo.
  Trotz der Kälte hat sie beschlossen, die *Jacke* nicht anzuziehen, weil sie ihr unbequem erscheint.
