Rang: 4824
Wort: orlo
Wortart: n.m
Wort mit Artikel: l'orlo
Femininum / Plural: orli
IPA: ''
Definition: der Saum, -¨e
Register: ''
Beispielsätze: |-
  Ho deciso di cucire un *orlo* alla gonna perché era troppo lunga.
  Ich habe beschlossen, einen *Saum* an den Rock zu nähen, weil er zu lang war.
  
  Sul *orlo* della sciarpa c'è un bellissimo ricamo floreale.
  An dem *Saum* des Schals ist eine wunderschöne Blumengravur.
  
  Mentre passeggiavo nel parco, ho notato un *orlo* strappato nei pantaloni del bambino.
  Als ich im Park spazieren ging, ist mir ein *Saum* in der Hose des Kindes aufgefallen.
  
  Se vuoi che il vestito non si impigli, dovresti stirare bene l’*orlo* prima di cucirlo.
  Wenn du möchtest, dass das Kleid nicht hängen bleibt, solltest du den *Saum* vorher gut bügeln, bevor du ihn nähst.
  
  Dicono che, secondo alcune tradizioni, cucire un *orlo* la sera di Capodanno porta fortuna.
  Man sagt, dass es nach manchen Traditionen Glück bringt, wenn man an Silvester einen *Saum* näht.
