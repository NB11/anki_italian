Rang: 761
Wort: esercito
Wortart: n.m
Wort mit Artikel: l'esercito
Femininum / Plural: eserciti
IPA: ''
Definition: das Heer, -e
Register: ''
Beispielsätze: |-
  L'*esercito* italiano ha partecipato a una grande esercitazione calma e intelligente in Sicilia con tenente esperti.
  Das *Heer* hat an einer ruhigen und klugen Übung in Sizilien mit erfahrenen Leutnants teilgenommen.
  
  Se avessimo più fondi, potremmo organizzare una parata con l'*esercito* e lo spazio aereo coinvolto.
  Wenn wir mehr Geld hätten, könnten wir eine Parade mit dem *Heer* und der Beteiligung des Weltraums organisieren.
  
  Nonostante il pericolo di attacchi, l'*esercito* rimane in silenzio nelle zone di guerra povere di risorse.
  Trotz der Gefahr von Angriffen bleibt das *Heer* in den ressourcenschwachen Kriegsgebieten stumm.
  
  Il generale ha detto che l'*esercito* deve superare ogni sfida senza rischiare la vita dei soldati pazienti.
  Der General sagte, dass das *Heer* jede Herausforderung überwinden muss, ohne das Leben der geduldigen Soldaten zu riskieren.
  
  Dicono che un giorno l'*esercito* ritornerà vittorioso, portando oro e documenti storici sorprendenti.
  Man sagt, dass das *Heer* eines Tages siegreich zurückkehren wird und Gold sowie erstaunliche historische Urkunden mitbringt.
