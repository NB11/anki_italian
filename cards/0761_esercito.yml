Rang: 761
Wort: esercito
Wortart: n.m
Wort mit Artikel: l'esercito
Femininum / Plural: gli eserciti
IPA: ''
Definition: die Armee, das Heer
Register: ''
Beispielsätze: |-
  *L'esercito* italiano è molto rispettato all'estero.
  Die *italienische Armee* wird im Ausland sehr respektiert.
  
  Mio fratello serve *nell'esercito* da dieci anni.
  Mein Bruder dient seit zehn Jahren *in der Armee*.
  
  Gli *eserciti* europei collaborano per la pace mondiale.
  Die *Armeen* Europas arbeiten für den Weltfrieden zusammen.
  
  Credi che *l'esercito* possa difendere il paese da una guerra?
  Glaubst du, dass *die Armee* das Land vor einem Krieg schützen kann?
  
  Se vincesse le elezioni, *l'esercito* avrebbe più fondi.
  Wenn er die Wahlen gewinnen würde, hätte *die Armee* mehr Geld.
