Rang: 3420
Wort: psicopatico
Wortart: adj
Wort mit Artikel: psicopatico
Femininum / Plural: ''
IPA: ''
Definition: psychopathisch, wahnsinnig
Register: ''
Beispielsätze: |-
  Il comportamento *psicopatico* di quell'uomo ha spaventato tutti alla festa.
  Das *psychopathische* Verhalten dieses Mannes hat alle auf der Party erschreckt.
  
  Nonostante le apparenze, non era davvero *psicopatico*, ma solo molto nervoso.
  Trotz seines Aussehens war er nicht wirklich *psychopathisch*, sondern nur sehr nervös.
  
  Se fosse *psicopatico*, non potrebbe mai mantenere un lavoro per più di un mese.
  Wenn er *psychopathisch* wäre, könnte er nie länger als einen Monat einen Job behalten.
  
  Lo psichiatra ha detto che il paziente non era *psicopatico*, ma solo depresso.
  Der Psychiater sagte, der Patient sei nicht *psychopathisch*, sondern nur depressiv.
  
  Una relazione con una persona *psicopatica* finisce sempre male, lo sanno tutti.
  Eine Beziehung mit einer *psychopathischen* Person endet immer schlecht, das weiß jeder.
