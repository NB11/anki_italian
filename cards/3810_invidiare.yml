Rang: 3810
Wort: invidiare
Wortart: vt
Wort mit Artikel: invidiare
Femininum / Plural: ''
IPA: ''
Definition: beneiden, neidisch sein auf
Register: ''
Beispielsätze: |-
  Non *invidio* mai nessuno per i suoi soldi, perché la felicità non si compra.
  Ich *beneide* niemanden um sein Geld, denn Glück lässt sich nicht kaufen.
  
  Se avessi saputo che era così difficile, forse non ti *avrei* invidiato per il tuo successo.
  Hätte ich gewusst, wie schwer es ist, hätte ich dich vielleicht nicht um deinen Erfolg *beneidet*.
  
  Mentre tutti *invidiano* la sua voce, lei preferisce stare in silenzio.
  Während alle ihre Stimme *beneiden*, zieht sie es vor, zu schweigen.
  
  È normale *invidiare* un artista che riesce a esprimere così bene le proprie emozioni?
  Ist es normal, einen Künstler *beneiden* zu können, der seine Gefühle so gut ausdrückt?
  
  Senza *invidiare* nessuno, lui si concentra solo sul migliorare ogni giorno.
  Ohne jemanden zu *beneiden*, konzentriert er sich nur darauf, jeden Tag besser zu werden.
