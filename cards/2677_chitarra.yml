Rang: 2677
Wort: chitarra
Wortart: n.f
Wort mit Artikel: la chitarra
Femininum / Plural: chitarre
IPA: ''
Definition: die Gitarre, -n
Register: ''
Beispielsätze: |-
  Mio fratello suona la *chitarra* tutte le sere dopo cena.
  Mein Bruder spielt *die Gitarre* jeden Abend nach dem Abendessen.
  
  Vorrei comprare una nuova *chitarra* per il mio compleanno.
  Ich möchte eine neue *Gitarre* zu meinem Geburtstag kaufen.
  
  Durante il concerto, la *chitarra* elettrica di Luca è stata l’anima della band.
  Während des Konzerts war *die Gitarre* von Luca die Seele der Band.
  
  Sai che mio zio ha restaurato una *chitarra* del 1800?
  Weißt du, dass mein Onkel eine *Gitarre* aus dem Jahr 1800 restauriert hat?
  
  Nonostante il disagio, continuava a strimpellare le corde della sua *chitarra* fino a tarda notte.
  Trotz des Unbehagens klimperte er bis spät in die Nacht an den Saiten *seiner Gitarre*.
