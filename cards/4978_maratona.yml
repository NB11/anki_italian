Rang: 4978
Wort: maratona
Wortart: n.m
Wort mit Artikel: la maratona
Femininum / Plural: maratone
IPA: ''
Definition: der Marathonlauf, -läufe
Register: ''
Beispielsätze: |-
  Quest'anno la *maratona* di New York si svolgerà in novembre.
  In diesem Jahr wird der *Marathon* von New York im November stattfinden.
  
  Dopo aver corso la *maratona*, Maria aveva le gambe che tremavano.
  Nachdem Maria den *Marathon* gelaufen war, zitterten ihr die Beine.
  
  Se non ti alleni abbastanza, non riuscirai a finire la *maratona* senza fermarti.
  Wenn du dich nicht genug trainierst, wirst du den *Marathon* nicht ohne Pause beenden können.
  
  Mi hanno detto che vincere una *maratona* non è solo questione di velocità, ma anche di resistenza.
  Man hat mir gesagt, dass der Gewinn eines *Marathons* nicht nur eine Frage der Schnelligkeit, sondern auch der Ausdauer ist.
  
  La *maratona* cittadina è stata annullata a causa del cattivo tempo, cosa che ha deluso molti partecipanti.
  Der Stadt-*Marathon* wurde wegen des schlechten Wetters abgesagt, was viele Teilnehmer enttäuschte.
