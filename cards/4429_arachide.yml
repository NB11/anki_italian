Rang: 4429
Wort: arachide
Wortart: n.f
Wort mit Artikel: l'arachide
Femininum / Plural: arachidi
IPA: ''
Definition: die Erdnuss, -nüsse
Register: ''
Beispielsätze: |-
  Ho trovato delle *arachidi* tostate nel sacchetto della spesa.
  Ich habe *geröstete Erdnüsse* im Einkaufsbeutel gefunden.
  
  Mia sorella è allergica alle *arachidi*, quindi evitiamo di comprarle.
  Meine Schwester ist *allergisch gegen Erdnüsse*, deshalb kaufen wir sie nicht.
  
  La ricetta prevedeva di aggiungere burro di *arachide* al composto.
  Das Rezept sah vor, *Erdnussbutter* in die Masse zu geben.
  
  Se vuoi uno snack sano, mangia pure qualche *arachide*, non te ne pentirai!
  Wenn du einen gesunden Snack möchtest, iss ruhig ein paar *Erdnüsse* – du wirst es nicht bereuen!
  
  L’olio di *arachide* viene spesso usato nella cucina asiatica per friggere.
  Das *Erdnussöl* wird in der asiatischen Küche oft zum Braten verwendet.
