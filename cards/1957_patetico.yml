Rang: 1957
Wort: patetico
Wortart: adj
Wort mit Artikel: patetico
Femininum / Plural: ''
IPA: ''
Definition: peinlich, lächerlich, erbärmlich
Register: ''
Beispielsätze: |-
  Secondo me il suo tentativo di scusarsi era proprio *patetico*.
  Seiner Meinung nach war sein Versuch, sich zu entschuldigen, einfach *peinlich*.
  
  Non posso credere che tu abbia pianto per una storia così *patetica*!
  Ich kann nicht glauben, dass du wegen einer so *erbärmlichen* Geschichte geweint hast!
  
  La sua performance sul palco sembrava *patetica*, ma il pubblico rideva.
  Seine Leistung auf der Bühne wirkte *lächerlich*, aber das Publikum lachte.
  
  La situazione era diventata *patetica*, con tutti che urlavano senza motivo.
  Die Situation war *peinlich* geworden, mit allen, die grundlos schrien.
  
  Hanno definito *patetico* il modo in cui si aggrappava alle regole senza senso.
  Sie bezeichneten die Art, wie er sich an unsinnige Regeln klammerte, als *erbärmlich*.
