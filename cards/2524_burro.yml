Rang: 2524
Wort: burro
Wortart: n.m
Wort mit Artikel: il burro
Femininum / Plural: burri
IPA: ''
Definition: die Butter, -n
Register: ''
Beispielsätze: |-
  A colazione mangio sempre pane con *burro* e marmellata.
  Zum Frühstück esse ich immer Brot mit *Butter* und Marmelade.
  
  Se non hai *burro*, puoi sostituirlo con l’olio d’oliva.
  Falls du keine *Butter* hast, kannst du sie durch Olivenöl ersetzen.
  
  Nel libro c’era una ricetta che richiedeva due etti di *burro* fuso.
  In dem Buch gab es ein Rezept, das zweihundert Gramm flüssige *Butter* erforderte.
  
  Quando ero piccolo, mia nonna metteva sempre un po’ di *burro* sui miei toast caldi.
  Als ich klein war, hat meine Großmutter immer etwas *Butter* auf meine warmen Toastscheiben getan.
  
  Nonostante il divieto di portare *burro* a bordo, lui l’ha nascosto nel suo bagaglio a mano.
  Trotz des Verbotes, *Butter* an Bord zu bringen, hat er sie in seinem Handgepäck versteckt.
