Definition: richtig, genau, fair
Register: ''
Beispielsätze: |-
  È *giusto* che tu studi ogni giorno per migliorare.
  Es ist *richtig*, dass du jeden Tag lernst, um dich zu verbessern.
  
  Hai fatto la scelta *giusta* a venire qui.
  Du hast die *richtige* Wahl getroffen, hierherzukommen.
  
  Non è *giusto* che lui paghi sempre tutto.
  Es ist nicht *fair*, dass er immer alles bezahlt.
  
  Credi che sia *giusto* così?
  Glaubst du, dass das *richtig* so ist?
  
  La tua opinione è *giusta*, ma dobbiamo essere flessibili.
  Deine Meinung ist *richtig*, aber wir müssen flexibel sein.
