Beispielsätze: |-
  Il *linguaggio* del corpo può rivelare molto su una persona.
  Die *Sprache* des Körpers kann viel über eine Person verraten.
  
  Studiare diversi *linguaggi* di programmazione è fondamentale oggi.
  Verschiedene *Programmiersprachen* zu lernen ist heute entscheidend.
  
  Non capivo il *linguaggio* che usavano in quella serie televisiva.
  Ich verstand die *Sprache* nicht, die sie in dieser Fernsehserie verwendeten.
  
  Il *linguaggio* musicale trasmette emozioni senza bisogno di parole.
  Die *musikalische Sprache* vermittelt Gefühle ohne Worte.
  
  Hanno sviluppato un *linguaggio* segreto per comunicare in prigione.
  Sie entwickelten eine *Geheimsprache*, um im Gefängnis zu kommunizieren.
