Rang: 3979
Wort: ignoto
Wortart: adj
Wort mit Artikel: ignoto
Femininum / Plural: ''
IPA: ''
Definition: unbekannt, fremd
Register: ''
Beispielsätze: |-
  Abbiamo ricevuto un pacco *ignoto* indirizzato a te.
  Wir haben ein *unbekanntes* Paket erhalten, das an dich adressiert ist.
  
  L’articolo parla di un fenomeno *ignoto* alla scienza.
  Der Artikel handelt von einem der Wissenschaft *fremden* Phänomen.
  
  Chi sia stato a scrivere quelle parole *ignote* rimane un mistero.
  Wer jene *unbekannten* Worte geschrieben hat, bleibt ein Rätsel.
  
  Se non conosci la risposta, chiedi a qualcuno che ne sa di più, *ignoto* a te ma noto ad altri.
  Wenn du die Antwort nicht weißt, frag jemanden, der mehr weiß als du – dir *fremd*, anderen aber bekannt.
  
  La polizia sta indagando su un caso che coinvolge un personaggio *ignoto* ai media.
  Die Polizei untersucht einen Fall, der eine Person einbezieht, die den Medien *unbekannt* ist.
