Rang: 1524
Wort: prigioniero
Wortart: n.m/f
Wort mit Artikel: il prigioniero
Femininum / Plural: prigionieri
IPA: ''
Definition: der/die Gefangene, -n
Register: ''
Beispielsätze: |-
  Il *prigioniero* è stato trasferito in un'altra cella.
  Der *Gefangene* wurde in eine andere Zelle verlegt.
  
  Sebbene fossi *prigioniero*, ho vissuto momenti di grande forza interiore.
  Obwohl ich *Gefangener* war, erlebte ich Momente innerer Stärke.
  
  I soldati hanno catturato i *prigionieri* dopo una lunga battaglia.
  Die Soldaten haben die *Gefangenen* nach einer langen Schlacht gefangen genommen.
  
  Se fossi *prigioniero* in un posto del genere, cercherei di fuggire.
  Wenn ich *Gefangener* an so einem Ort wäre, würde ich versuchen zu fliehen.
  
  La polizia ha bisogno di prove concrete per liberare un *prigioniero*.
  Die Polizei braucht handfeste Beweise, um einen *Gefangenen* freizulassen.
