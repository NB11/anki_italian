Rang: 4863
Wort: tassista
Wortart: n.m
Wort mit Artikel: il tassista
Femininum / Plural: i tassisti
IPA: ''
Definition: der Taxifahrer, -
Register: ''
Beispielsätze: |-
  Il *tassista* ha parcheggiato vicino all'albergo che ci aveva prenotato.
  Der *Taxifahrer* hat nahe dem Hotel geparkt, das wir gebucht hatten.
  
  Se avessi bisogno di un passaggio, chiamerei un *tassista* che conosco.
  Wenn ich einen Fahrservice bräuchte, würde ich einen *Taxifahrer* anrufen, den ich kenne.
  
  Il *tassista* che hai incontrato ieri sera guidava come un pazzo!
  Der *Taxifahrer*, den du gestern Abend getroffen hast, ist wie ein Verrückter gefahren!
  
  Non appena scenderemo, andremo a pagare il *tassista*.
  Sobald wir ausgestiegen sind, werden wir dem *Taxifahrer* den Betrag zahlen.
  
  Spero che il *tassista* conosca una scorciatoia per evitare il traffico.
  Ich hoffe, dass der *Taxifahrer* eine Abkürzung kennt, um den Stau zu umgehen.
