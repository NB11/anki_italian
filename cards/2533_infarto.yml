Rang: 2533
Wort: infarto
Wortart: n.m
Wort mit Artikel: l'infarto
Femininum / Plural: infarti
IPA: ''
Definition: der Herzinfarkt, -e
Register: ''
Beispielsätze: |-
  Dopo aver avvertito un forte dolore al petto, *l'infarto* è stato purtroppo confermato dai medici.
  Nach einem starken Brustschmerz wurde der *Herzinfarkt* leider von den Ärzten bestätigt.
  
  Se non *si trattasse di un infarto*, perché avrebbe quel pallore e quella sudorazione fredda?
  Wenn es kein *Herzinfarkt* wäre, warum hätte sie dann diese Blässe und diesen kalten Schweiß?
  
  Avrei chiamato l'ambulanza immediatamente se avessi sospettato *un infarto*.
  Ich hätte sofort den Krankenwagen gerufen, wenn ich *einen Herzinfarkt* vermutet hätte.
  
  È fondamentale agire in fretta quando si verifica *un infarto*, perché ogni minuto conta.
  Es ist entscheidend, schnell zu handeln, wenn *ein Herzinfarkt* auftritt, denn jede Minute zählt.
  
  Benché avesse ignorato i sintomi iniziali, alla fine *l'infarto* gli ha salvato la vita, spingendolo a farsi controllare.
  Obwohl er die anfänglichen Symptome ignoriert hatte, hat ihn schließlich der *Herzinfarkt* gezwungen, sich untersuchen zu lassen und so sein Leben gerettet.
