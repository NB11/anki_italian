Rang: 3398
Wort: binario
Wortart: n.m
Wort mit Artikel: il binario
Femininum / Plural: binari
IPA: ''
Definition: das Gleis, -e
Register: ''
Beispielsätze: |-
  Aspetta sul *binario* 5, il treno parte tra cinque minuti.
  Warte am *Gleis* 5, der Zug fährt in fünf Minuten ab.
  
  Il *binario* della metropolitana era affollato come al solito.
  Das U-Bahn-*Gleis* war wie immer überfüllt.
  
  Mi chiedo se questo *binario* sia ancora in servizio dopo i lavori.
  Ich frage mich, ob dieses *Gleis* nach den Bauarbeiten noch in Betrieb ist.
  
  Ha perso il treno perché si è fermato al *binario* sbagliato.
  Er hat den Zug verpasst, weil er am falschen *Gleis* stand.
  
  I binari della ferrovia erano coperti di foglie in autunno.
  Die Eisenbahn*gleise* waren im Herbst mit Blättern bedeckt.
