Rang: 4364
Wort: cespuglio
Wortart: n.m
Wort mit Artikel: il cespuglio
Femininum / Plural: cespugli
IPA: ''
Definition: der Strauch, -üche
Register: ''
Beispielsätze: |-
  Nel giardino c'è un *cespuglio* di rose che fiorisce ogni primavera.
  Im Garten gibt es einen *Strauch* mit Rosen, der jeden Frühling blüht.
  
  Non toccare quel *cespuglio*: potrebbe nascondere un nido di vespe.
  Berühre jenen *Strauch* nicht: Er könnte ein Wespennest verbergen.
  
  Ho tagliato i rami secchi del *cespuglio* per farlo crescere meglio.
  Ich habe die trockenen Äste des *Strauchs* abgeschnitten, damit er besser wächst.
  
  Se vedi un *cespuglio* di more, raccoglile solo se sono mature.
  Wenn du einen *Heidelbeerstrauch* siehst, pflücke die Beeren nur, wenn sie reif sind.
  
  Il lupo si nascose dietro un *cespuglio* per osservare la preda indisturbato.
  Der Wolf verbarg sich hinter einem *Strauch*, um seine Beute ungestört zu beobachten.
