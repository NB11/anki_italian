Rang: 4839
Wort: abortire
Wortart: v
Wort mit Artikel: abortire
Femininum / Plural: ''
IPA: ''
Definition: "*abortire*, eine Fehlgeburt haben"
Register: ''
Beispielsätze: |-
  La cagna ha *abortito* dopo un lungo periodo di stress, il veterinario è molto preoccupato.
  Die Hündin hat nach einer langen Stressphase *abortiert*, der Tierarzt ist sehr besorgt.
  
  Se sapessi che il cane è incinta, non la farei *abortire* per nessun motivo al mondo.
  Wenn ich wüsste, dass die Hündin trächtig ist, würde ich sie um nichts auf der Welt *abortieren* lassen.
  
  Nonostante i farmaci, molte pazienti hanno dovuto *abortire* a causa di complicazioni gravi.
  Trotz Medikamenten mussten viele Patientinnen wegen schwerer Komplikationen *abortieren*.
  
  Molti dicono che *abortire* sia un atto crudele, ma ogni caso va valutato individualmente.
  Viele sagen, *abortieren* sei eine grausame Tat, doch jeder Fall muss einzeln bewertet werden.
  
  Se fossi stata più attenta, forse non avrei dovuto *abortire* il nostro cucciolo tanto tempo fa.
  Wenn ich damals vorsichtiger gewesen wäre, hätte ich vielleicht unseren Welpen damals nicht *abortieren* müssen.
