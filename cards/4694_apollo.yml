Rang: 4694
Wort: apollo
Wortart: n.m
Wort mit Artikel: il apollo
Femininum / Plural: apolli
IPA: ''
Definition: der Apollo
Register: ''
Beispielsätze: |-
  Gli antichi greci consideravano *Apollo* il dio del sole e delle arti.
  Die alten Griechen sahen *Apollo* als Gott der Sonne und der Künste.
  
  Se non fosse caduto dal cielo, *Apollo* sarebbe ancora lì a vegliare su di noi.
  Wenn er nicht vom Himmel gefallen wäre, würde *Apollo* immer noch über uns wachen.
  
  Nel museo ho visto una statua di *Apollo* che impugna una lira.
  Im Museum habe ich eine Statue von *Apollo* gesehen, die eine Leier hält.
  
  Credi che *Apollo* possa perdonare chi ha tradito la sua fiducia?
  Glaubst du, dass *Apollo* demjenigen verzeihen kann, der sein Vertrauen missbraucht hat?
  
  Dicono che *Apollo*, prima di diventare dio, fosse un semplice pastore.
  Man sagt, dass *Apollo* vor seiner Zeit als Gott ein einfacher Hirte war.
