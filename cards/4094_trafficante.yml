Rang: 4094
Wort: trafficante
Wortart: n.m
Wort mit Artikel: il trafficante
Femininum / Plural: trafficanti
IPA: ''
Definition: der Händler, - / der Schieber, -
Register: ''
Beispielsätze: |-
  Il *trafficante* è stato arrestato dalla polizia dopo mesi di indagini.
  Der *Händler* wurde nach Monaten der Ermittlungen von der Polizei verhaftet.
  
  Secondo la legge, chi vende droga è un *trafficante* di sostanze stupefacenti.
  Laut dem Gesetz ist, wer Drogen verkauft, ein *Schieber* von Rauschmitteln.
  
  I *trafficanti* di armi operano spesso nel dark web, sfuggendo ai controlli.
  *Händler* von Waffen agieren oft im Dark Web und entgehen so den Kontrollen.
  
  Se non denunci i *trafficanti*, stai collaborando con loro.
  Wenn du die *Händler* nicht meldest, arbeitest du mit ihnen zusammen.
  
  I *trafficanti* di diamanti fingevano di essere gioiellieri legittimi.
  Die *Schieber* von Diamanten gaben sich als legitime Juweliere aus.
