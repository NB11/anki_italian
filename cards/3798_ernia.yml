Rang: 3798
Wort: ernia
Wortart: n.f
Wort mit Artikel: l'ernia
Femininum / Plural: ernie
IPA: ''
Definition: der Bruch, -¨e
Register: ''
Beispielsätze: |-
  Il medico ha diagnosticato un'*ernia* all'inguine dopo la visita accurata.
  Der Arzt hat nach der gründlichen Untersuchung ein *Leistenbruch* diagnostiziert.
  
  Se non tratti l'*ernia*, potrebbero esserci gravi complicazioni in futuro.
  Wenn du den *Bruch* nicht behandelst, könnte es später zu schweren Komplikationen kommen.
  
  Si dice che mangiare fibre aiuti a prevenire l'*ernia* del disco.
  Man sagt, dass der Verzehr von Ballaststoffen dazu beiträgt, einen *Bandscheibenvorfall* zu verhindern.
  
  L'*ernia* che aveva da ragazzo si è riacutizzata con l'età.
  Der *Bruch*, den er als Junge hatte, hat sich mit den Jahren wieder verschlimmert.
  
  Ha subito un intervento per risolvere l'*ernia* ombelicale che lo infastidiva da mesi.
  Er unterzog sich einer Operation, um den *Nabelbruch* zu beheben, der ihn monatelang belastet hatte.
