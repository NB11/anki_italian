Rang: 4693
Wort: assurdità
Wortart: n.f
Wort mit Artikel: l'assurdità
Femininum / Plural: assurdità
IPA: ''
Definition: die Absurdität, Absurdheiten
Register: ''
Beispielsätze: |-
  C'è una *assurdità* nel suo ragionamento che rende difficile seguirlo.
  Es gibt eine *Absurdität* in seiner Argumentation, die ihn schwer verständlich macht.
  
  Dopo la discussione, ha capito l'*assurdità* della sua posizione.
  Nach der Diskussion erkannte er die *Absurdität* seiner Haltung.
  
  Non capisci l'*assurdità* di questa situazione? È davvero ridicolo!
  Erkennst du nicht die *Absurdität* dieser Situation? Es ist wirklich lächerlich!
  
  L'*assurdità* del caso ha spinto tutti a chiedersi se fosse vero.
  Die *Absurdität* des Falls ließ alle fragen, ob es wahr sei.
  
  Nonostante l'*assurdità* delle accuse, dovrà affrontare le conseguenze.
  Trotz der *Absurdität* der Vorwürfe muss er die Konsequenzen tragen.
