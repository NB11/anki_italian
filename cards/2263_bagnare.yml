Rang: 2263
Wort: bagnare
Wortart: v
Wort mit Artikel: bagnare
Femininum / Plural: ''
IPA: ''
Definition: nass machen, befeuchten, durchnässen
Register: ''
Beispielsätze: |-
  Se non *bagni* le piante, moriranno entro una settimana.
  Wenn du die Pflanzen nicht *befeuchtest*, sterben sie binnen einer Woche.
  
  Mi sono accorto troppo tardi che qualcuno aveva *bagnato* il pavimento della cucina.
  Ich habe zu spät bemerkt, dass jemand den Küchenboden *nass gemacht* hatte.
  
  Nonostante abbia *bagnato* la camicia di sudore, continua a dire che sta bene.
  Obwohl er das Hemd mit Schweiß *durchnässt* hat, beharrt er darauf, dass es ihm gut geht.
  
  Se avessi *bagnato* meglio il terreno prima, il seme sarebbe germogliato prima.
  Hätte ich den Boden vorher besser *bewässert*, wäre der Samen früher gekeimt.
  
  La notizia lo aveva così sconvolto che gli vennero gli occhi lucidi, come se stesse per *bagnare* le ciglia di lacrime.
  Die Nachricht hatte ihn so erschüttert, dass ihm die Augen feucht wurden, als würden sie gleich vor Tränen *befeuchtet*.
