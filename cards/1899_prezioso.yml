Rang: 1899
Wort: prezioso
Wortart: adj
Wort mit Artikel: prezioso
Femininum / Plural: ''
IPA: ''
Definition: wertvoll, kostbar
Register: ''
Beispielsätze: |-
  Questo anello è davvero *prezioso* perché contiene un diamante raro.
  Dieser Ring ist wirklich *wertvoll*, weil er einen seltenen Diamanten enthält.
  
  Nonostante la *preziosa* esperienza all’estero, decise di tornare in Italia.
  Trotz der *wertvollen* Erfahrung im Ausland beschloss er, nach Italien zurückzukehren.
  
  Se avessi saputo quanto è *prezioso* questo libro, non l’avrei venduto!
  Wenn ich gewusst hätte, wie *wertvoll* dieses Buch ist, hätte ich es nicht verkauft!
  
  La collana di perle era così *preziosa* che dovette chiuderla in una cassaforte.
  Die Perlenkette war so *wertvoll*, dass sie sie in einem Safe einschließen musste.
  
  Credo che questa collana antica sia ancora più *preziosa* di quanto sembri a prima vista.
  Ich glaube, diese antike Halskette ist noch *wertvoller*, als es auf den ersten Blick scheint.
