Rang: 1816
Wort: miliardo
Wortart: n.m
Wort mit Artikel: il miliardo
Femininum / Plural: miliardi
IPA: ''
Definition: die Milliarde, -n
Register: ''
Beispielsätze: |-
  Il governo ha speso *un miliardo* di euro per la ricostruzione delle scuole dopo il terremoto.
  Die Regierung hat *eine Milliarde* Euro für den Wiederaufbau der Schulen nach dem Erdbeben ausgegeben.
  
  Gli scienziati stimano che il valore dell’azienda raggiungerà i cinque *miliardi* entro il prossimo anno.
  Die Wissenschaftler schätzen, dass der Wert des Unternehmens *fünf Milliarden* innerhalb des nächsten Jahres erreichen wird.
  
  Se vincerò alla lotteria, donerò metà dei miei *miliardi* in beneficenza.
  Wenn ich in der Lotterie gewinne, werde ich die Hälfte meiner *Milliarden* für wohltätige Zwecke spenden.
  
  Non posso credere che abbia speso tutto il suo *miliardo* in così poco tempo!
  Ich kann nicht glauben, dass er sein gesamtes *Milliard* in so kurzer Zeit ausgegeben hat!
  
  Era convinto che il progetto avrebbe richiesto almeno un *miliardo*, ma alla fine ne sono bastati cinquanta milioni.
  Er war überzeugt, dass das Projekt mindestens *eine Milliarde* benötigen würde, aber am Ende reichten fünfzig Millionen.
