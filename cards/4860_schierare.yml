Rang: 4860
Wort: schierare
Wortart: v
Wort mit Artikel: schierare
Femininum / Plural: ''
IPA: ''
Definition: in Stellung bringen, aufstellen
Register: ''
Beispielsätze: |-
  Il capitano decide di *schierare* la squadra in difesa stretta.
  Der Kapitän entscheidet sich, die Mannschaft in strikter *Aufstellung* zu stellen.
  
  Dopo l’infortunio, l’allenatore dovette *schierare* un nuovo attaccante.
  Nach der Verletzung musste der Trainer einen neuen Stürmer *aufstellen*.
  
  Se vuoi vincere, è importante *schierare* i giocatori giusti sin dall’inizio.
  Wenn du gewinnen willst, ist es wichtig, die richtigen Spieler von Anfang an *aufzustellen*.
  
  Gli studiosi si sono chiesti se sia possibile *schierare* nuove tecnologie nella lotta all’AIDS.
  Die Wissenschaftler fragten sich, ob es möglich ist, neue Technologien in der *Bekämpfung* von Aids einzusetzen.
  
  Non appena il direttore avrà approvato il progetto, potremo *schierare* le risorse necessarie.
  Sobald der Direktor das Projekt genehmigt hat, können wir die erforderlichen Ressourcen *einsetzen*.
