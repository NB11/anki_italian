Rang: 2183
Wort: sinceramente
Wortart: adv
Wort mit Artikel: sinceramente
Femininum / Plural: ''
IPA: ''
Definition: aufrichtig, ehrlich
Register: ''
Beispielsätze: |-
  Ho detto *sinceramente* quello che pensavo senza paura di offendere nessuno.
  Ich habe *aufrichtig* gesagt, was ich dachte, ohne Angst, jemanden zu beleidigen.
  
  *Sinceramente*, preferirei rimanere a casa stasera invece di uscire.
  *Ehrlich*, ich würde lieber heute Abend zu Hause bleiben, statt auszugehen.
  
  Nonostante il fallimento, lui ha continuato a lavorare *sinceramente* per migliorare.
  Trotz des Scheiterns arbeitete er *aufrichtig* weiter daran, sich zu verbessern.
  
  Credo che tu debba essere *sinceramente* grato per ciò che hai, non assumere tutto come dato.
  Ich glaube, du solltest *aufrichtig* dankbar sein für das, was du hast, und nicht alles als selbstverständlich annehmen.
  
  Dice *sinceramente* che non sa come comportarsi in questa situazione difficile.
  Er sagt *ehrlich*, dass er nicht weiß, wie er sich in dieser schwierigen Situation verhalten soll.
