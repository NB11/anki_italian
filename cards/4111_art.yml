Rang: 4111
Wort: art
Wortart: n.f
Wort mit Artikel: l'art
Femininum / Plural: arti
IPA: ''
Definition: die Kunst, -e
Register: ''
Beispielsätze: |-
  Secondo me l’**arte** contemporanea* è difficile da capire.
  Meiner Meinung nach ist die *Kunst* der Gegenwart schwer zu verstehen.
  
  Questa galleria espone opere d’*arte* provenienti da tutto il mondo.
  Diese Galerie zeigt *Kunst*werke aus aller Welt.
  
  Se avessi più tempo, studierei l’**arte** rinascimentale
  Würde ich mehr Zeit haben, würde ich die *Kunst* der Renaissance studieren.
  
  Credi che l’*arte* moderna possa migliorare la società o sia solo un’*arte** fine a se stessa?
  Glaubst du, dass die moderne *Kunst* die Gesellschaft verbessern kann oder nur eine Kunst um ihrer selbst willen ist?
  
  L’*arte* per lui era un modo per esprimere ciò che provava dentro, nonostante le difficoltà della vita.
  Die *Kunst* war für ihn ein Weg, das auszudrücken, was er innerlich fühlte, trotz der Lebensschwierigkeiten.
