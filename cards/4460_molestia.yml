Rang: 4460
Wort: molestia
Wortart: n.f
Wort mit Artikel: la molestia
Femininum / Plural: molestie
IPA: ''
Definition: die Belästigung, -en
Register: ''
Beispielsätze: |-
  Dopo il *molestia* sul treno, la donna ha sporto denuncia alla polizia.
  Nach der *Belästigung* im Zug hat die Frau Anzeige bei der Polizei erstattet.
  
  Nonostante la *molestia* subita, ha preferito non parlarne con nessuno.
  Trotz der erlittenen *Belästigung* wollte sie mit niemandem darüber sprechen.
  
  Se avessi subito una *molestia* simile, anch’io avrei reagito così.
  Wenn ich eine ähnliche *Belästigung* erlebt hätte, hätte ich genauso reagiert.
  
  La legge considera ogni forma di *molestia* sul lavoro come un reato grave.
  Das Gesetz betrachtet jede Form von *Belästigung* am Arbeitsplatz als schweres Vergehen.
  
  Hanno organizzato un incontro per discutere di come prevenire ogni *molestia* in ufficio.
  Sie haben ein Treffen organisiert, um darüber zu sprechen, wie man jede *Belästigung* im Büro verhindern kann.
