Rang: 1227
Wort: disporre
Wortart: v
Wort mit Artikel: disporre
Femininum / Plural: ''
IPA: ''
Definition: anordnen, verfügen, bereitstellen, arrangieren
Register: ''
Beispielsätze: |-
  Il comandante ha *disposto* i soldati in formazione per la parata militare.
  Der Kommandant hat die Soldaten zur Parade *angeordnet*.
  
  Prima di partire, *disponiamo* sempre di tutto il necessario per il viaggio.
  Bevor wir losfahren, *verfügen* wir immer über alles Notwendige für die Reise.
  
  Se tu potessi *disporre* del tempo che vuoi, cosa faresti nel nord dell’Italia?
  Wenn du über die Zeit *verfügen* könntest, die du möchtest, was würdest du im Norden Italiens machen?
  
  La legge *dispone* che tutti i cittadini hanno diritto all’accesso alle cure mediche.
  Das Gesetz *verfügt*, dass alle Bürger ein Recht auf medizinische Versorgung haben.
  
  Non vorrei *disporre* di così pochi soldi per l’affitto di questo appartamento, è assurdo!
  Ich möchte nicht über so wenig Geld für diese Wohnung *verfügen*, das ist absurd!
Audio: ''
Notiz: ''
Dispersion: ''
