Rang: 1647
Wort: mucchio
Wortart: n.m
Wort mit Artikel: il mucchio
Femininum / Plural: i mucchi
IPA: ''
Definition: der Haufen, -
Register: ''
Beispielsätze: |-
  Ho trovato *un mucchio* di libri vecchi in soffitta.
  Ich habe *einen Haufen* alter Bücher auf dem Dachboden gefunden.
  
  Anche se c'è *un mucchio* di lavoro, non posso aiutarti oggi.
  Auch wenn es *einen Haufen* Arbeit gibt, kann ich dir heute nicht helfen.
  
  Dopo la festa c'era *un mucchio* di bottiglie vuote sul tavolo.
  Nach der Party lag *ein Haufen* leerer Flaschen auf dem Tisch.
  
  Il sindaco ha parlato di *un mucchio* di problemi da risolvere.
  Der Bürgermeister sprach von *einer Menge* Probleme, die es zu lösen gilt.
  
  Dicono che *i mucchi* di rifiuti vicino al lago attirino sempre più mosche.
  Man sagt, dass *die Müllhaufen* in der Nähe des Sees immer mehr Fliegen anlocken.
