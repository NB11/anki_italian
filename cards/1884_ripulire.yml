Rang: 1884
Wort: ripulire
Wortart: vt
Wort mit Artikel: ripulire
Femininum / Plural: ''
IPA: ''
Definition: sauber machen, reinigen
Register: ''
Beispielsätze: |-
  Devi *ripulire* la stanza prima che arrivino gli ospiti.
  Du musst *die* *Zimmer* sauber machen, bevor die Gäste kommen.
  
  Mi piacerebbe *ripulire* il giardino domani mattina all’alba, quando non fa troppo caldo.
  Ich würde gerne morgen früh bei *der Morgendämmerung* den Garten reinigen, wenn es nicht zu heiß ist.
  
  Nonostante la spazzatura sia dappertutto, lui non vuole *ripulire* il garage.
  Obwohl *der Müll* überall ist, will er die Garage nicht sauber machen.
  
  Se avessi più tempo, avrei *ripulito* tutto il magazzino di materiali vecchi.
  Wenn ich mehr Zeit hätte, hätte ich das ganze Lager von alten *Materialien* gereinigt.
  
  Lei sostiene che sia necessario *ripulire* tutte le prove prima che arrivi la polizia.
  Sie behauptet, es sei nötig, alle *Hinweise* zu beseitigen, bevor die Polizei eintrifft.
