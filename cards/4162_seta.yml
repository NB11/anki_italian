Rang: 4162
Wort: seta
Wortart: n.f
Wort mit Artikel: la seta
Femininum / Plural: sete
IPA: ''
Definition: die Seide, -n
Register: ''
Beispielsätze: |-
  Questa camicia è fatta di *seta* pura e costa molto.
  Dieses Hemd ist aus rein*er Seide* und kostet viel.
  
  Ho comprato una cravatta di *seta* che mi ha regalato mio nonno.
  Ich habe einen Seiden-Schlips gekauft, den mir mein Großvater geschenkt *hat*.
  
  Mi piacerebbe sapere come si produce la *seta* nei secoli passati.
  Ich würde gerne wissen, wie man im letzten Jahrhundert *Seide* hergestellt hat.
  
  La *seta* delle mie lenzuola è così morbida che mi fa dormire bene.
  Die *Seide* meiner Bettwäsche ist so weich, dass ich gut schlafe.
  
  Se non avessi problemi economici, comprerei solo vestiti in *seta*.
  Wenn ich keine finanziellen Probleme hätte, würde ich mir nur Kleidung aus *Seide* kaufen.
