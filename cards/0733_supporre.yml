Rang: 733
Wort: supporre
Wortart: v
Wort mit Artikel: supporre
Femininum / Plural: ''
IPA: ''
Definition: annehmen, vermuten
Register: ''
Beispielsätze: |-
  Io *suppongo* che lui arrivi tardi stasera.
  Ich *nehme an*, dass er heute Abend spät ankommt.
  
  Che cosa *supponi* tu di solito quando senti questa notizia?
  Was *vermutest* du üblich, wenn du diese Nachricht hörst?
  
  Loro hanno *supposto* che noi fossimo già partiti.
  Sie haben *angenommen*, dass wir schon abgefahren sind.
  
  Se *supponiamo* che domani piova, prenoteremo un ombrello.
  Wenn wir *annehmen*, dass es morgen regnet, werden wir einen Schirm buchen.
  
  Non *supporre* che tutto sia già organizzato, ci vuole ancora tempo!
  *Nimm nicht an*, dass alles schon organisiert ist, es braucht noch Zeit!
