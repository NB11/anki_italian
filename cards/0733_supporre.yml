Rang: 733
Wort: supporre
Wortart: v
Wort mit Artikel: supporre
Femininum / Plural: ''
IPA: ''
Definition: annehmen, vermuten
Register: ''
Beispielsätze: |-
  Non *suppongo* che tu abbia già finito il progetto senza aiuto.
  Ich *nehme an*, dass du das Projekt schon ohne Hilfe beendet hast.
  
  Se *supponiamo* che il treno arrivi in orario, arriveremo in tempo per la lezione.
  Wenn wir *annehmen*, dass der Zug pünktlich ankommt, kommen wir rechtzeitig zur Lektion.
  
  Mi hanno detto che hai *supposto* che fossi stanco, ma non è vero!
  Man hat mir gesagt, du *hättest angenommen*, ich sei müde, aber das stimmt nicht!
  
  Che cosa *supponi* che accadrà dopo che avrai organizzato questa festa meravigliosa?
  Was *vermutest* du, wird passieren, nachdem du diese wunderbare Feier organisiert hast?
  
  È sbagliato *supporre* che tutti vogliano ballare a questa serata.
  Es ist falsch zu *annehmen*, dass alle an diesem Abend tanzen möchten.
