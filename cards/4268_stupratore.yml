Rang: 4268
Wort: stupratore
Wortart: n.m
Wort mit Artikel: lo stupratore
Femininum / Plural: stupratori
IPA: ''
Definition: der Vergewaltiger, -
Register: ''
Beispielsätze: |-
  La polizia ha arrestato lo *stupratore* dopo una lunga indagine.
  Die Polizei hat den *Vergewaltiger* nach einer langen Ermittlung verhaftet.
  
  Chiunque commetta atti simili merita di essere processato come *stupratore*.
  Jeder, der solche Taten begeht, verdient es, als *Vergewaltiger* verurteilt zu werden.
  
  Lo *stupratore* avrebbe confessato tutto se non fosse fuggito dalla prigione.
  Der *Vergewaltiger* hätte alles gestanden, wenn er nicht aus dem Gefängnis geflohen wäre.
  
  Nonostante le prove, i giudici non sono sicuri che lui sia lo *stupratore* giusto.
  Trotz der Beweise sind die Richter nicht sicher, dass er der richtige *Vergewaltiger* ist.
  
  Dicono che lo *stupratore* agisse con una freddezza disumana durante il reato.
  Sie sagen, der *Vergewaltiger* habe mit unmenschlicher Kälte während der Tat gehandelt.
