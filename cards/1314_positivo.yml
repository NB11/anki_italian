Rang: 1314
Wort: positivo
Wortart: adj
Wort mit Artikel: positivo
Femininum / Plural: ''
IPA: ''
Definition: positiv
Register: ''
Beispielsätze: |-
  La sua risposta è stata *positiva*, anzi, più che soddisfacente.
  Seine Antwort war *positiv*, vielmehr mehr als zufriedenstellend.
  
  Dopo aver frequentato quel corso, ho un'opinione *positiva* su di loro.
  Nachdem ich den Kurs besucht hatte, habe ich eine *positive* Meinung über sie.
  
  Nonostante il pesante fallimento, il suo atteggiamento rimaneva *positivo*.
  Trotz des schweren Scheiterns blieb seine Haltung *positiv*.
  
  I risultati del test sono *positivi*, quindi non c'è motivo per l'allarme.
  Die Testergebnisse sind *positiv*, also gibt es keinen Grund für den Alarm.
  
  Credo che la sua recensione sia stata troppo *positiva*, non del tutto sincera.
  Ich glaube, dass seine Bewertung zu *positiv* war, nicht ganz ehrlich.
