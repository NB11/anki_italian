Wort mit Artikel: la tasca
Femininum / Plural: tasche
IPA: ''
Definition: die Tasche, -n
Register: ''
Beispielsätze: |-
  Ho trovato *la tasca* della giacca piena di monete.
  Ich habe *die Tasche* der Jacke voller Münzen gefunden.
  
