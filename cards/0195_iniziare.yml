Rang: 195
Wort: iniziare
Wortart: vi
Wort mit Artikel: iniziare
Femininum / Plural: ''
IPA: ''
Definition: anfangen, beginnen
Register: ''
Beispielsätze: |-
  Io *inizio* a studiare alle otto di mattina.
  Ich *beginne* um acht Uhr morgens mit dem Lernen.
  
  Quando hai *iniziato* a suonare la chitarra?
  Wann hast du angefangen, Gitarre zu spielen?
  
  Lui vorrebbe *iniziare* un nuovo progetto il mese prossimo.
  Er würde gerne nächstes Monat ein neues Projekt *anfangen*.
  
  Noi abbiamo *iniziato* la riunione senza di te.
  Wir haben das Meeting ohne dich *begonnen*.
  
  Che dite, *iniziamo* la cena o aspettiamo gli altri?
  Sollen wir das Abendessen *anfangen* oder warten wir auf die anderen?
