Beispielsätze: |-
  A Roma la *margherita* è considerata la pizza più classica e semplice.
  In Rom gilt die *Pizza Margherita* als klassischste und einfachste Pizza.
  
  Non ho mai mangiato una *margherita* così buona come quella che abbiamo ordinato ieri sera.
  Ich habe noch nie eine *Pizza Margherita* gegessen, die so gut war wie die, die wir gestern Abend bestellt haben.
  
  Se vuoi preparare una *margherita* perfetta, devi usare ingredienti di qualità e stenderla sottilissima.
  Wenn du eine perfekte *Pizza Margherita* zubereiten willst, musst du hochwertige Zutaten verwenden und den Teig sehr dünn ausrollen.
  
  La *margherita* che ho visto sulla pagina Instagram del ristorante sembrava invitante, ma al primo morso ho capito che era congelata.
  Die *Pizza Margherita*, die ich auf der Instagram-Seite des Restaurants gesehen habe, sah verlockend aus, aber beim ersten Bissen merkte ich, dass sie tiefgekühlt war.
  
  Se non ti piacciono gli strati troppo spessi, ordina una *margherita* senza mozzarella strappata, ma tagliata a cubetti regolari.
  Wenn dir die Schichten zu dick sind, bestell eine *Pizza Margherita* ohne zerfetzte Mozzarella, sondern mit gleichmäßig gewürfelter.
