Rang: 3256
Wort: donatore
Wortart: n.m
Wort mit Artikel: il donatore
Femininum / Plural: donatori
IPA: ''
Definition: der Spender, -
Register: ''
Beispielsätze: |-
  Il *donatore* ha donato il suo sangue per salvare una vita.
  Der *Spender* hat sein Blut gespendet, um ein Leben zu retten.
  
  Guardando la lista dei *donatori*, ho visto che molti hanno più di sessant'anni.
  Beim Betrachten der Liste der *Spender* sah ich, dass viele über sechzig Jahre alt sind.
  
  Se fossi una *donatrice*, lo farei sicuramente ogni anno.
  Wenn ich eine *Spenderin* wäre, würde ich es bestimmt jedes Jahr tun.
  
  Il medico ha ringraziato il *donatore* per il suo gesto generoso.
  Der Arzt dankte dem *Spender* für seine großzügige Tat.
  
  Nonostante la *donazione*, il paziente ha bisogno di un altro donatore compatibile.
  Trotz der Spende braucht der Patient einen weiteren *Spender*, der kompatibel ist.
