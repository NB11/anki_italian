Rang: 2778
Wort: scontare
Wortart: v
Wort mit Artikel: scontare
Femininum / Plural: ''
IPA: ''
Definition: abziehen, nachlassen, Rabatt *gewähren*
Register: ''
Beispielsätze: |-
  Se compro due magliette, mi *scontano* il 20% sulla seconda.
  Wenn ich zwei T-Shirts kaufe, *gewähren* sie mir 20% Rabatt auf das zweite.
  
  Hanno deciso di *scontare* il prezzo perché il prodotto era danneggiato.
  Sie haben beschlossen, den Preis *abzuziehen*, weil das Produkt beschädigt war.
  
  Non *scontiamo* mai i libri di testo, sono sempre al prezzo pieno.
  Wir *gewähren* nie Rabatt auf Lehrbücher, sie sind immer zum vollen Preis.
  
  Se avessi saputo che era in saldo, avrei aspettato per *scontare* tutto.
  Wenn ich gewusst hätte, dass es im Sale war, hätte ich gewartet, um alles *nachzulassen*.
  
  Mi hanno detto che la tua azienda *sconta* solo per pagamenti in contanti.
  Man hat mir gesagt, dass deine Firma nur bei Barzahlung *abzieht*.
