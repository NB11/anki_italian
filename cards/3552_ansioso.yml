Rang: 3552
Wort: ansioso
Wortart: adj
Wort mit Artikel: ansioso
Femininum / Plural: ''
IPA: ''
Definition: besorgt, ängstlich, ungeduldig
Register: ''
Beispielsätze: |-
  È *ansioso* perché aspetta i risultati degli esami da giorni.
  Er ist *besorgt*, weil er seit Tagen auf die Prüfungsergebnisse wartet.
  
  Sono *ansiosa* di sapere se ho superato il colloquio di lavoro.
  Ich bin *ungeduldig*, zu wissen, ob ich das Vorstellungsgespräch bestanden habe.
  
  Lui diventa sempre *ansioso* quando si avvicina il momento di parlare in pubblico.
  Er wird immer *ängstlich*, wenn der Zeitpunkt naht, vor Publikum zu sprechen.
  
  Nonostante le rassicurazioni, continuo a sentirmi *ansiosa* riguardo al viaggio.
  Trotz der Beruhigungen fühle ich mich immer noch *besorgt* wegen der Reise.
  
  Se fossi al tuo posto, mi preoccuperei molto di meno e vivrei meno *ansioso*.
  Wäre ich an deiner Stelle, würde ich mir viel weniger Sorgen machen und weniger *ängstlich* leben.
