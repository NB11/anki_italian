Rang: 3903
Wort: importo
Wortart: n.m
Wort mit Artikel: l'importo
Femininum / Plural: importi
IPA: ''
Definition: der Betrag, -räge
Register: ''
Beispielsätze: |-
  L'*importo* totale della bolletta è di 200 euro.
  Der *gesamte* Betrag der Rechnung beträgt 200 Euro.
  
  Non ho ancora controllato l'*importo* della fattura che mi hai mandato.
  Ich habe den *Betrag* der Rechnung, die du mir geschickt hast, noch nicht überprüft.
  
  Se paghi in contanti, loro accettano solo banconote sopra i 50 euro, quindi l'*importo* deve essere sufficiente.
  Wenn du bar bezahlst, akzeptieren sie nur Scheine über 50 Euro, also muss der *Betrag* entsprechend sein.
  
  Mi hanno detto che l'*importo* del risarcimento sarà stabilito dal giudice entro la fine del mese.
  Man hat mir gesagt, dass der *Betrag* der Entschädigung bis Ende des Monats vom Richter festgelegt wird.
  
  Spero che l'*importo* richiesto per l'iscrizione non sia troppo alto quest'anno.
  Ich hoffe, dass der *Betrag*, der für die Anmeldung verlangt wird, dieses Jahr nicht zu hoch ist.
