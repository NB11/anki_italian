Rang: 707
Wort: dì
Wortart: n.m
Wort mit Artikel: il dì
Femininum / Plural: dì
IPA: ''
Definition: der Tag, -e
Register: ''
Beispielsätze: |-
  Il *dì* che ti ho incontrato ho capito tutto.
  An dem *Tag*, an dem ich dich getroffen habe, habe ich alles verstanden.
  
  Ho lavorato senza sosta per tre *dì* di fila.
  Ich habe drei *Tage* hintereinander ohne Pause gearbeitet.
  
  Non ricordo più che cosa ho fatto negli ultimi *dì*.
  Ich kann mich nicht mehr daran erinnern, was ich in den letzten *Tagen* gemacht habe.
  
  Se mi chiedi di nuovo, ti faccio vedere il *dì* che ti ho regalato la sciarpa meravigliosa!
  Wenn du mich noch einmal fragst, zeige ich dir den *Tag*, an dem ich dir den wunderbaren Schal geschenkt habe!
  
  I *dì* feriali sono sempre più stressanti rispetto ai weekend.
  Die *Tage* unter der Woche sind immer stressiger als die Wochenenden.
