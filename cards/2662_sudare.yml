Rang: 2662
Wort: sudare
Wortart: vi
Wort mit Artikel: sudare
Femininum / Plural: ''
IPA: ''
Definition: schwitzen
Register: ''
Beispielsätze: |-
  Dopo aver corso per un'ora, Marco *sudava* molto.
  Nach einer Stunde Laufen *schwitze* Marco stark.
  
  Se non *sudassi* così tanto, potresti allenarti più a lungo.
  Wenn du nicht so *schwitzen* würdest, könntest du länger trainieren.
  
  Credo che tu abbia *sudato* troppo durante l'esercizio.
  Ich glaube, du hast dich beim Training zu sehr *abgequält*.
  
  Ha *sudato* freddo quando ha visto il fantasma.
  Er hat *geschwitzt* vor Angst, als er das Gespenst sah.
  
  Nonostante il caldo, gli operai *sudavano* senza sosta per finire in tempo.
  Trotz der Hitze *schwitzten* die Arbeiter unablässig, um rechtzeitig fertig zu werden.
