Rang: 2565
Wort: tigre
Wortart: n.m
Wort mit Artikel: la tigre
Femininum / Plural: tigri
IPA: ''
Definition: der Tiger, -
Register: ''
Beispielsätze: |-
  Avrei voluto vedere una *tigre* nello zoo di Roma, ma purtroppo era in quarantena.
  Ich hätte gerne einen *Tiger* im Zoo von Rom gesehen, aber leider war er in Quarantäne.
  
  Mentre passeggiavo al *cimitero*, ho percepito una presenza inquietante che mi ha fatto venire i brividi.
  Während ich auf dem *Friedhof* spazierte, nahm ich eine unheimliche Präsenz wahr, die mir eine Gänsehaut bereitete.
  
  Dicono che la *tigre* sia un animale solitario, ma lo abbiamo vista giocare con i cuccioli tutto il pomeriggio.
  Man sagt, der *Tiger* sei ein Einzelgänger, aber wir haben ihn den ganzen Nachmittag mit den Jungtieren spielen sehen.
  
  Se avessi il coraggio di *tigre*, affronteresti quella situazione senza esitare, ma tu hai sempre paura di tutto.
  Wenn du den Mut eines *Tigers* hättest, würdest du diese Situation ohne zu zögern angehen, doch du hast vor allem Angst.
  
  La *tigre* del Bengala, con il suo manto arancione e nero, è uno degli animali più affascinanti che esistano.
  Der *Tiger* aus Bengalen, mit seinem orange-schwarzen Fell, ist eines der faszinierendsten Tiere, die es gibt.
