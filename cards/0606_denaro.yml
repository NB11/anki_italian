Rang: 606
Wort: denaro
Wortart: n.m
Wort mit Artikel: il denaro
Femininum / Plural: denari
IPA: ''
Definition: das Geld, die Knete
Register: ''
Beispielsätze: |-
  Ho bisogno di *denaro* per comprare questo libro.
  Ich brauche *Geld*, um dieses Buch zu kaufen.
  
  Quanto *denaro* hai in tasca?
  Wie viel *Geld* hast du in der Tasche?
  
  Non ho speso neanche un *denaro* di quel regalo.
  Ich habe nicht einen *Cent* von diesem Geschenk ausgegeben.
  
  Il *denaro* non fa la felicità, ma aiuta.
  Geld macht nicht glücklich, aber es hilft.
  
  Ha trovato un sacchetto pieno di *denari* per strada.
  Er hat eine Tasche voller *Münzen* auf der Straße gefunden.
