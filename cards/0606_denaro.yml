Rang: 606
Wort: denaro
Wortart: n.m
Wort mit Artikel: il denaro
Femininum / Plural: denari
IPA: ''
Definition: das Geld, -er
Register: ''
Beispielsätze: |-
  Hai ancora qualche *denaro* nella tasca dei pantaloni?
  Hast du noch *Geld* in der Hosentasche?
  
  Nonostante la guardia lo minacciasse, l’uomo continuò a contare il suo *denaro* con calma.
  Trotz der Drohung des *Wächters* zählte der Mann das Geld gelassen weiter.
  
  Se avessi *denaro*, comprerei un biglietto per vedere il cristo nella cappella.
  Wenn ich *Geld* hätte, würde ich eine Eintrittskarte kaufen, um den Christus in der Kapelle zu sehen.
  
  Dopo il guaio con la polizia, dovette nascondere tutto il suo *denaro* sotto il materasso.
  Nach dem *Problem* mit der Polizei musste er sein ganzes Geld unter der Matratze verstecken.
  
  Ma quando tornò a casa, trovò solo una lista di spese che aveva fatto con il *denaro* rubato.
  Doch als er nach Hause kam, fand er nur eine *Liste* mit Ausgaben, die er mit dem gestohlenen Geld getätigt hatte.
