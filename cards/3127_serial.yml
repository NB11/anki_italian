  Sie haben bekannt gegeben, dass die *Serie* der Sommerkonzerte aufgrund der widrigen Wetterbedingungen auf Juli verschoben wird.
  
  La *serie* di esperimenti condotti nel laboratorio ha portato a risultati sorprendenti, ma richiedono ulteriori verifiche.
  Die *Serie* der Experimente, die im Labor durchgeführt wurden, hat überraschende Ergebnisse geliefert, die jedoch weiterer Überprüfungen bedürfen.
