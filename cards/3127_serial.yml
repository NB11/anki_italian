Beispielsätze: |-
  La *serie* televisiva che ho appena finito è davvero avvincente e piena di colpi di scena.
  Die *Serie*, die ich gerade beendet habe, ist wirklich packend und voller Wendungen.
  
  Non riesco a capire perché questa *serie* di errori continui a ripetersi nel reparto clinico.
  Ich verstehe nicht, warum sich diese *Serie* von Fehlern im klinischen Bereich immer wiederholt.
  
  Se avessi più tempo, mi piacerebbe seguire una *serie* storica sulle grandi scoperte mediche.
  Wenn ich mehr Zeit hätte, würde ich gern eine *Serie* über große medizinische Entdeckungen verfolgen.
  
