Rang: 3055
Wort: appassionare
Wortart: vt
Wort mit Artikel: appassionare
Femininum / Plural: ''
IPA: ''
Definition: begeistern, faszinieren
Register: ''
Beispielsätze: |-
  La nuova serie di documentari *appassiona* molti spettatori ogni sera.
  Die neue Dokumentationsreihe begeistert jeden Abend viele Zuschauer.
  
  Mi chiedevo se quel romanzo potesse *appassionare* anche te.
  Ich fragte mich, ob dieser Roman auch dich *faszinieren* könnte.
  
  Nonostante la pioggia, i turisti continuavano a *appassionarsi* per le bellezze della città.
  Trotz des Regens *faszinierten* sich* die Touristen weiterhin für die Schönheiten der Stadt.
  
  È stato meraviglioso vedere come la musica classica riesca a *appassionare* anche i giovani.
  Es war wunderbar zu sehen, wie klassische Musik sogar junge Leute *fesseln* kann.
  
  Se non ti *appassiona* quello che fai, forse dovresti cambiare lavoro!
  Wenn dich das, was du tust, nicht *begeistert*, solltest du vielleicht den Job wechseln!
