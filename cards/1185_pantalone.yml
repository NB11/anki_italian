Rang: 1185
Wort: pantalone
Wortart: n.m
Wort mit Artikel: il pantalone
Femininum / Plural: i pantaloni
IPA: ''
Definition: die Hose, -n
Register: ''
Beispielsätze: |-
  Non mi piacciono questi *pantaloni*, sono troppo stretti.
  Diese *Hose* gefällt mir nicht, sie ist zu eng.
  
  Ho comprato un paio di *pantaloni* nuovi per il viaggio in Sicilia.
  Ich habe mir eine neue *Hose* für die Reise nach Sizilien gekauft.
  
  Sai dove posso trovare *pantaloni* con tasche grandi? Ne ho bisogno per lavoro.
  Weißt du, wo ich *Hosen* mit großen Taschen finden kann? Ich brauche sie für die Arbeit.
  
  Ieri ho visto un uomo con *pantaloni* di pelle nera al mercato.
  Gestern habe ich einen Mann mit einer schwarzen Leder*hose* am Markt gesehen.
  
  Questi *pantaloni* sono così comodi che li indosso ogni giorno, anche al lavoro.
  Diese *Hose* ist so bequem, dass ich sie jeden Tag trage, sogar bei der Arbeit.
