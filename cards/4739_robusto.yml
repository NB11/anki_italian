Rang: 4739
Wort: robusto
Wortart: adj
Wort mit Artikel: robusto
Femininum / Plural: ''
IPA: ''
Definition: robust, kräftig, widerstandsfähig
Register: ''
Beispielsätze: |-
  Questo ragazzo è davvero *robusto* per la sua età.
  Dieser Junge ist wirklich *kräftig* für sein Alter.
  
  La bambina ha scelto un giocattolo *robusto* per giocare all'aperto.
  Das Mädchen hat ein *robustes* Spielzeug zum Spielen im Freien gewählt.
  
  Il tavolo deve essere *robusto* perché regga tutto il peso.
  Der Tisch muss *widerstandsfähig* sein, um das ganze Gewicht zu tragen.
  
  Nonostante l'età, mio nonno ha ancora un fisico *robusto*.
  Trotz seines Alters hat mein Großvater immer noch einen *kräftigen* Körperbau.
  
  Le scarpe da trekking devono essere *robuste* e impermeabili.
  Wanderschuhe müssen *widerstandsfähig* und wasserdicht sein.
