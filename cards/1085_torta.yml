Rang: 1085
Wort: torta
Wortart: n.f
Wort mit Artikel: la torta
Femininum / Plural: torte
IPA: ''
Definition: der Kuchen, -
Register: ''
Beispielsätze: |-
  Mia nonna prepara sempre una *torta* al cioccolato per il mio compleanno.
  Meine Oma backt immer einen *Kuchen* mit Schokolade zu meinem Geburtstag.
  
  Ho provato a fare una *torta*, ma il risultato è stato un completo disastro!
  Ich habe versucht, einen *Kuchen* zu backen, aber das Ergebnis war eine totale Katastrophe!
  
  Nonostante fossi stanco, sono riuscito a finire la *torta* prima che arrivassero gli ospiti.
  Trotz meiner Müdigkeit schaffte ich es, den *Kuchen* fertig zu backen, bevor die Gäste kamen.
  
  Se avessi più tempo, preparerei una *torta* senza glutine che piace a tutti.
  Wenn ich mehr Zeit hätte, würde ich einen glutenfreien *Kuchen* backen, der allen schmeckt.
  
  Ha detto che la migliore *torta* che abbia mai assaggiato era quella di sua madre, la quale la preparava ogni domenica.
  Er sagte, der beste *Kuchen*, den er je gegessen habe, sei der seiner Mutter gewesen, die jeden Sonntag einen backte.
