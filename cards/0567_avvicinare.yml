Rang: 567
Wort: avvicinare
Wortart: vt
Wort mit Artikel: avvicinare
Femininum / Plural: ''
IPA: ''
Definition: annähern, heranbringen
Register: ''
Beispielsätze: |-
  Devo *avvicinare* la sedia per raggiungere meglio il tavolo.
  Ich muss den Stuhl *näher rücken*, um besser an den Tisch zu kommen.
  
  Non *avvicinare* troppo la bocca all’animale, potrebbe mordere!
  Bring dein Gesicht nicht zu nah an das Tier heran, es könnte beißen!
  
  Hanno deciso di *avvicinare* le due città con un ponte nuovo.
  Sie haben beschlossen, die beiden Städte mit einer neuen Brücke *einander anzunähern*.
  
  Se non *avvicini* la scala, non riesco a dipingere il soffitto!
  Wenn du die Leiter nicht *heranbringst*, schaffe ich es nicht, die Decke zu streichen!
  
  Il poliziotto ha *avvicinato* il testimone per sentire meglio la sua voce.
  Der Polizist hat den Zeugen *herangeholt*, um seine Stimme besser zu verstehen.
