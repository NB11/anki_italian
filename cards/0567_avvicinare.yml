Rang: 567
Wort: avvicinare
Wortart: vt
Wort mit Artikel: avvicinare
Femininum / Plural: ''
IPA: ''
Definition: sich nähern, näher bringen
Register: ''
Beispielsätze: |-
  Devo *avvicinare* la sedia al tavolo.
  Ich muss *mir* den Stuhl *ans* Tisch *heranrücken*.
  
  Non ti *avvicinare* troppo al cane!
  *Komm* dem Hund nicht *zu* nah!
  
  L’aereo sta per *avvicinarsi* alla pista di atterraggio.
  Das Flugzeug wird sich *bald* der Landebahn *nähern*.
  
  Ti *avvicineresti* se avessi il coraggio?
  *Würdest* du *dich* *nähern*, wenn du den Mut *hättest*?
  
  Spero che tu non *avvicini* mai più quella persona.
  Ich hoffe, du *bringst* dich *niemals* wieder *dieser* Person *näher*.
