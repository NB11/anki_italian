Rang: 818
Wort: compito
Wortart: n.m
Wort mit Artikel: il compito
Femininum / Plural: compiti
IPA: ''
Definition: die Aufgabe, -n, die Hausaufgabe, -n
Register: ''
Beispielsätze: |-
  Devo finire il mio *compito* prima di cena, altrimenti il professore si arrabbierà.
  Ich muss meine *Aufgabe* vor dem Abendessen beenden, sonst wird der Lehrer wütend.
  
  Lo studente ha consegnato il *compito* in ritardo perché la professoressa ha spiegato male l’argomento ieri.
  Der Schüler hat die *Hausaufgabe* verspätet abgegeben, weil die Lehrerin das Thema gestern schlecht erklärt hatte.
  
  Se non hai fatto il *compito*, non puoi certo pretendere di essere promosso, figliolo.
  Wenn du die *Aufgabe* nicht gemacht hast, kannst du sicher nicht erwarten befördert zu werden, Sohn.
  
  Anche se il *compito* era difficile, Maria l’ha svolto con attenzione e senza errori.
  Obwohl die *Aufgabe* schwer war, hat Maria sie sorgfältig und fehlerfrei erledigt.
  
  Il giudice ha ordinato che gli alunni ripetano il *compito* perché era pieno di errori grammaticali.
  Der Richter hat angeordnet, dass die Schüler die *Aufgabe* wiederholen müssen, weil sie voller Grammatikfehler war.
