Rang: 3828
Wort: carbone
Wortart: n.m
Wort mit Artikel: il carbone
Femininum / Plural: carboni
IPA: ''
Definition: die Kohle, -n
Register: ''
Beispielsätze: |-
  Durante l'inverno, *carbone* viene spesso usato per riscaldare le case.
  Während des Winters wird *Kohle* oft verwendet, um Häuser zu heizen.
  
  Ho trovato un sacco di *carbone* nel camino della vecchia villa.
  Ich habe einen Sack *Kohle* im Kamin der alten Villa gefunden.
  
  Se vuoi che il fuoco arda più a lungo, aggiungi un po' di *carbone* acceso.
  Wenn du möchtest, dass das Feuer länger brennt, gib etwas glühende *Kohle* hinzu.
  
  Nonostante l'età, il camino bruciava ancora bene grazie al *carbone* di ottima qualità.
  Trotz des Alters brannte der Kamin immer noch gut dank der hochwertigen *Kohle*.
  
  I minatori estraevano *carbone* dalle profonde gallerie sotterranee.
  Die Bergleute förderten *Kohle* aus den tiefen unterirdischen Stollen.
