Beispielsätze: |-
  Nel suo discorso ha messo un *accento* particolare sull’educazione civica.
  In seiner Rede hat er besonderes *Gewicht* auf die politische Bildung gelegt.
  
  Non senti che c’è un *accento* sbagliato in questa parola?
  Hörst du nicht, dass in diesem Wort ein falscher *Betonung* liegt?
  
  Gli *accenti* regionali rendono la lingua italiana così ricca e variegata.
  Die regionalen *Akzente* machen die italienische Sprache so reich und vielfältig.
  
  Ha voglia di sapere quale *accento* si usa in questa canzone famosa.
  Er möchte wissen, welchen *Akzent* man in diesem berühmten Lied verwendet.
  
  Se non impari l’*accento* giusto, rischi di essere frainteso.
