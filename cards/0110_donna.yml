Rang: 110
Wort: donna
Wortart: n.f
Wort mit Artikel: la donna
Femininum / Plural: donne
IPA: ''
Definition: die Frau, -en
Register: ''
Beispielsätze: |-
  La *donna* legge un libro interessante.
  Die *Frau* liest ein interessantes Buch.
  
  Avete visto qualche *donna* in questa piazza?
  Habt ihr einige *Frauen* auf diesem Platz gesehen?
  
  Non conosco quella *donna* laggiù.
  Ich kenne diese *Frau* dort nicht.
  
  Le *donne* nella nostra famiglia sono molto indipendenti.
  Die *Frauen* in unserer Familie sind sehr unabhängig.
  
  Se fossi una *donna*, viaggerei molto di più.
  Wenn ich eine *Frau* wäre, würde ich viel mehr reisen.
