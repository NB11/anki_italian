Rang: 921
Wort: dipendere
Wortart: vi
Wort mit Artikel: dipendere
Femininum / Plural: ''
IPA: ''
Definition: abhängen von, beruhen auf
Register: ''
Beispielsätze: |-
  La decisione *dipende* da te, quindi scegli con cura.
  Die Entscheidung *hängt von dir ab*, also wähle sorgfältig.
  
  Ho capito che tutto *dipendeva* dalla pressione che avevano messo su di noi.
  Ich verstand, dass alles von dem *Druck* abhing, den sie auf uns ausgeübt hatten.
  
  Se non *dipendesse* dal professore, non studierei così tanto.
  Wenn es nicht vom *Professor* abhinge, würde ich nicht so viel lernen.
  
  Dicono che il prezzo *dipenda* non solo dalla qualità, ma anche dal desiderio di pagare.
  Sie sagen, der *Preis* hängt nicht nur von der Qualität ab, sondern auch vom Wunsch, zu zahlen.
  
  Avresti dovuto sapere che ogni scelta *dipende* da come hai agito prima.
  Du hättest wissen müssen, dass jede Wahl davon *abhängt*, wie du zuvor gehandelt hast.
