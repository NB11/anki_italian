Rang: 2616
Wort: religioso
Wortart: adj
Wort mit Artikel: religioso
Femininum / Plural: ''
IPA: ''
Definition: "*religiös*, andächtig, fromm"
Register: ''
Beispielsätze: |-
  La cerimonia *religiosa* è iniziata alle otto in punto.
  Die *religiöse* Zeremonie begann um genau acht Uhr.
  
  Nonostante la sua fede *religiosa*, preferisce un approccio più laico alla vita.
  Obwohl sein *religiöser* Glaube tief ist, bevorzugt er einen säkulareren Weg im Leben.
  
  Il monaco trascorse l’intera giornata in preghiera *religiosa* e meditazione.
  Der Mönch verbrachte den ganzen Tag in *religiöser* Andacht und Meditation.
  
  Gli studiosi discutono se il suo atteggiamento sia davvero *religioso* o solo superstizioso.
  Die Gelehrten diskutieren, ob seine Haltung wirklich *religiös* oder nur abergläubisch ist.
  
  Il suo impegno *religioso* non è mai venuto meno, nemmeno in tempi difficili.
  Sein *religiöser* Einsatz ließ nie nach, nicht einmal in schwierigen Zeiten.
