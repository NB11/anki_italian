Rang: 1601
Wort: lì
Wortart: adv
Wort mit Artikel: lì
Femininum / Plural: ''
IPA: ''
Definition: dort, da
Register: ''
Beispielsätze: |-
  Alice ha lasciato le chiavi *lì* sulla scrivania ieri sera.
  Alice hat die Schlüssel *dort* gestern Abend auf dem Schreibtisch liegen lassen.
  
