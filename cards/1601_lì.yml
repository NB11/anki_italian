  Ich habe es *dort* gefunden, wo du es gesagt hattest, in der Nähe des Sees.
  
  Dovresti mettere la scatola *lì*, accanto al modello che ti ho mostrato.
  Du solltest die Kiste *dort* hinstellen, neben das Modell, das ich dir gezeigt habe.
  
  *Lì* al teatro si sono verificati i problemi con la qualità del suono durante la terapia.
  *Dort* im Theater gab es Probleme mit der Tonqualität während der Therapie.
