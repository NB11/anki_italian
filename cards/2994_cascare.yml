Rang: 2994
Wort: cascare
Wortart: vi
Wort mit Artikel: cascare
Femininum / Plural: ''
IPA: ''
Definition: fallen, stürzen
Register: ''
Beispielsätze: |-
  Stai attento! Non *cascare* di nuovo come l'altra volta.
  Pass auf! *Fallen* du nicht wieder wie letztes Mal.
  
  Se non avessi perso l'equilibrio, non *sarei cascato* dalle scale.
  Wenn ich nicht das Gleichgewicht verloren hätte, *wäre ich* nicht die Treppe heruntergefallen.
  
  Credo che domani *cadrà* un sacco di pioggia.
  Ich glaube, morgen *wird* es stark regnen.
  
  Nonostante la sua età avanzata, *è caduto* solo perché il pavimento era scivoloso.
  Trotz seines hohen Alters *ist er* nur gestürzt, weil der Boden glatt war.
  
  Se il pavimento non fosse stato così lucido, non *sarebbe cascato*.
  Wenn der Boden nicht so glatt gewesen wäre, *wäre er* nicht gefallen.
