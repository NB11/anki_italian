Rang: 3291
Wort: appropriare
Wortart: v
Wort mit Artikel: appropriare
Femininum / Plural: ''
IPA: ''
Definition: sich aneignen, anmaßend benutzen
Register: ''
Beispielsätze: |-
  Il direttore si è *appropriato* dei fondi destinati ai poveri senza alcuna autorizzazione.
  Der Direktor hat sich *die Gelder* angeeignet, die für Arme bestimmt waren, ohne jede Berechtigung.
  
  Non è giusto che alcuni *si appropriino* delle idee altrui senza riconoscimento.
  Es ist nicht fair, dass sich manche *die Ideen* anderer ohne Anerkennung aneignen.
  
  Lei temeva che lui potesse *appropriarsi* della sua eredità dopo la morte del padre.
  Sie fürchtete, er könnte sich *ihres Erbes* nach dem Tod des Vaters aneignen.
  
  Se non avessimo controllato i documenti, avrebbero potuto *appropriarsi* dell’intero patrimonio.
  Hätten wir die Dokumente nicht überprüft, hätten sie sich *des gesamten Vermögens* aneignen können.
  
  È inaccettabile che un politico *si approprii* delle risorse pubbliche per scopi personali.
  Es ist unannehmbar, dass sich ein Politiker *öffentliche Ressourcen* für private Zwecke aneignet.
