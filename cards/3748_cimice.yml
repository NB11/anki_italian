Rang: 3748
Wort: cimice
Wortart: n.f
Wort mit Artikel: la cimice
Femininum / Plural: cimici
IPA: ''
Definition: die Wanze, -n
Register: ''
Beispielsätze: |-
  Stasera ho trovato una *cimice* che si nascondeva dietro l’armadio.
  Gestern Abend habe ich *eine Wanze* gefunden, die sich hinter dem Schrank versteckte.
  
  Le *cimici* dei letti possono causare prurito e fastidio.
  *Wanzen* können Juckreiz und Unannehmlichkeiten verursachen.
  
  La polizia ha eseguito una perquisizione perché sospettava che ci fossero *cimici* nella stanza.
  Die Polizei führte eine Durchsuchung durch, weil sie vermutete, dass es *Wanzen* im Raum gab.
  
  Non appena ho visto quella *cimice*, ho capito che bisognava agire in fretta.
  Sobald ich *die Wanze* gesehen habe, wusste ich, dass wir schnell handeln mussten.
  
  È disgustoso pensare che qualcuno possa vivere con la costante presenza di *cimici* in casa.
  Es ist widerlich, sich vorzustellen, dass jemand ständig mit dem *Vorhandensein von Wanzen* im Haus leben muss.
