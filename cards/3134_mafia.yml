Rang: 3134
Wort: mafia
Wortart: n.f
Wort mit Artikel: la mafia
Femininum / Plural: mafie
IPA: ''
Definition: die Mafia, -
Register: ''
Beispielsätze: |-
  La *mafia* è stata oggetto di numerose inchieste giornalistiche negli ultimi anni.
  Die *Mafia* war in den letzten Jahren Gegenstand zahlreicher journalistischer Untersuchungen.
  
  Se non contrasti la *mafia* per tempo, rischi di sottovalutare il suo potere.
  Wenn du die *Mafia* nicht rechtzeitig bekämpfst, riskierst du, ihre Macht zu unterschätzen.
  
  Molti politici hanno cercato di collaborare con la *mafia*, ma alla fine ne sono stati vittime.
  Viele Politiker haben versucht, mit der *Mafia* zusammenzuarbeiten, doch am Ende wurden sie selbst zu Opfern.
  
  Credi che la *mafia* possa essere sconfitta senza l'aiuto delle istituzioni?
  Glaubst du, dass die *Mafia* ohne die Hilfe der Institutionen besiegt werden kann?
  
  Dicono che in questa regione la *mafia* controlli ancora il mercato edilizio, anche se ufficialmente è stata dichiarata sconfitta.
  Man sagt, dass in dieser Region die *Mafia* den Baumarkt trotz offizieller Niederlage weiterhin kontrolliert.
