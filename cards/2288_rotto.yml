Rang: 2288
Wort: rotto
Wortart: adj
Wort mit Artikel: rotto
Femininum / Plural: ''
IPA: ''
Definition: kaputt, zerbrochen, beschädigt
Register: ''
Beispielsätze: |-
  Il vetro è *rotto*, non si può più usare.
  Das Glas ist *kaputt*, man kann es nicht mehr benutzen.
  
  Ho trovato un vaso *rotto* nella cantina.
  Ich habe eine *zerbrochene* Vase im Keller gefunden.
  
  Spero che la televisione non sia *rotta*, ne ho bisogno per lavorare.
  Ich hoffe, dass der Fernseher nicht *kaputt* ist, ich brauche ihn für die Arbeit.
  
  L’amico mi ha detto che il suo telefono era *rotto* proprio ieri.
  Der Freund hat mir gesagt, dass sein Handy gestern genau *kaputtgegangen* ist.
  
  Se il computer è *rotto*, possiamo chiedere al tecnico di controllarlo subito.
  Wenn der Computer *defekt* ist, können wir den Techniker bitten, ihn gleich zu überprüfen.
