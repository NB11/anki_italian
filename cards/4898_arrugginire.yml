Rang: 4898
Wort: arrugginire
Wortart: vi
Wort mit Artikel: arrugginire
Femininum / Plural: ''
IPA: ''
Definition: rosten, rostig werden
Register: ''
Beispielsätze: |-
  Se lasci la bicicletta all’addiaccio, *arruginirà* in fretta.
  Wenn du das Fahrrad im Freien lässt, wird es schnell *rosten*.
  
  Non sapevo che il ferro potesse *arrugginire* così velocemente in montagna.
  Ich wusste nicht, dass Metall in den Bergen so schnell *rosten* kann.
  
  Dopo tanti anni in cantina, la vecchia chiave ha iniziato a *arrugginire*.
  Nach so vielen Jahren im Keller begann der alte Schlüssel *rosten*.
  
  Se non proteggi i coltelli, dopo un po’ cominceranno a *arrugginire*.
  Wenn du die Messer nicht schützt, werden sie nach einer Weile *rosten*.
  
  Nonostante la vernice protettiva, il cancello cominciò a *arrugginire* a causa dell’umidità.
  Trotz des Schutzanstrichs begann das Tor wegen der Feuchtigkeit *rosten*.
