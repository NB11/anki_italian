Rang: 3242
Wort: vulnerabile
Wortart: adj
Wort mit Artikel: vulnerabile
Femininum / Plural: ''
IPA: ''
Definition: verletzlich, anfällig, empfindlich
Register: ''
Beispielsätze: |-
  Il cucciolo di leone è ancora molto *vulnerabile* senza la madre.
  Das Löwenjunge ist ohne die Mutter noch sehr *verletzlich*.
  
  Anche se sembra forte, in realtà è *vulnerabile* alle critiche.
  Auch wenn er stark wirkt, ist er in Wirklichkeit *anfällig* für Kritik.
  
  La sua *vulnerabilità* era evidente quando parlava delle sue paure.
  Seine *Verletzlichkeit* war offensichtlich, als er von seinen Ängsten sprach.
  
  Il sistema è *vulnerabile* agli attacchi informatici se non viene aggiornato regolarmente.
  Das System ist *anfällig* für Cyberangriffe, wenn es nicht regelmäßig aktualisiert wird.
  
  Non vorrei che qualcuno approfittasse della tua *vulnerabilità* in questa situazione.
  Ich möchte nicht, dass jemand deine *Verletzlichkeit* in dieser Situation ausnutzt.
