Rang: 4101
Wort: rassicurare
Wortart: vt
Wort mit Artikel: rassicurare
Femininum / Plural: ''
IPA: ''
Definition: beruhigen, versichern
Register: ''
Beispielsätze: |-
  Il medico ha *rassicurato* la paziente dicendo che la sua guarigione sarà completa.
  Der Arzt hat die Patientin *beruhigt* und gesagt, dass ihre Heilung vollständig sein wird.
  
  Vorrei *rassicurarvi* sul fatto che i vostri documenti sono al sicuro.
  Ich möchte euch *versichern*, dass eure Dokumente sicher sind.
  
  Nonostante le voci sulla cospirazione, il sindaco ha *rassicurato* i cittadini che la situazione è sotto controllo.
  Trotz der Gerüchte über die Verschwörung hat der Bürgermeister die Bürger *beruhigt* und versichert, dass die Lage unter Kontrolle ist.
  
  Se avessi saputo che eri preoccupato, ti avrei *rassicurato* immediatamente!
  Hätte ich gewusst, dass du besorgt bist, hätte ich dich sofort *beruhigt*!
  
  Gli amici hanno cercato di *rassicurarlo* dopo che aveva letto le assurde accuse su internet.
  Die Freunde haben versucht ihn zu *beruhigen*, nachdem er die absurden Vorwürfe im Internet gelesen hatte.
