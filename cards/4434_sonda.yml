Rang: 4434
Wort: sonda
Wortart: n.m
Wort mit Artikel: la sonda
Femininum / Plural: sonde
IPA: ''
Definition: die Sonde, -n
Register: ''
Beispielsätze: |-
  Il medico ha inserito una *sonda* per misurare la temperatura interna del paziente.
  Der Arzt hat eine *Sonde* eingeführt, um die innere Temperatur des Patienten zu messen.
  
  Durante l’esperimento, gli scienziati hanno perso il controllo della *sonda* spaziale.
  Während des Experiments verloren die Wissenschaftler die Kontrolle über die *Sonde*.
  
  Nonostante i rischi, hanno deciso di inviare una *sonda* su Marte per raccogliere dati.
  Trotz der Risiken beschlossen sie, eine *Sonde* zum Mars zu schicken, um Daten zu sammeln.
  
  La *sonda* ha rilevato un’anomalia nel campo magnetico terrestre vicino al Polo Nord.
  Die *Sonde* registrierte eine Anomalie im Magnetfeld der Erde nahe dem Nordpol.
  
  Dopo settimane di lavoro, finalmente hanno ricevuto i dati dalla *sonda* sottomarina.
  Nach Wochen der Arbeit erhielten sie endlich die Daten von der Unterwasser-*Sonde*.
