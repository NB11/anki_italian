Wort: schifoso
Wortart: adj
Wort mit Artikel: schifoso
Femininum / Plural: ''
IPA: ''
Definition: ekelhaft, widerlich
Register: ''
Beispielsätze: |-
  Il cibo in quel ristorante era *schifoso*, ho vomitato subito dopo averlo mangiato.
  Das Essen in diesem Restaurant war *ekelhaft*, ich musste mich sofort übergeben.
  
  Non sopporto la tua aria da *schifoso*, smettila di fare il superiore!
  Ich kann deine *überheblich*-Attitüde nicht ertragen, hör auf, dich für etwas Besseres zu halten!
  
  Se avessi visto quel film, avresti capito quanto sia *schifoso* il personaggio principale.
  Wenn du diesen Film gesehen hättest, wärst du darauf gekommen, wie *abstoßend* die Hauptfigur ist.
  
  Era così *schifoso* quel prodotto pubblicizzato che nessuno l’ha acquistato.
  Dieses beworbene Produkt war derart *widerlich*, dass es niemand gekauft hat.
  
  Quella battuta mi sembrò così *schifosa* che preferii non ridere per educazione.
  Dieser Witz kam mir so *peinlich* vor, dass ich aus Höflichkeit lieber nicht lachte.
