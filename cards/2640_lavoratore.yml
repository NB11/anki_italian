Rang: 2640
Wort: lavoratore
Wortart: n.m
Wort mit Artikel: il lavoratore
Femininum / Plural: lavoratori
IPA: ''
Definition: der Arbeiter, -
Register: ''
Beispielsätze: |-
  Il *lavoratore* ha consegnato il rapporto allo sviluppo del prodotto.
  Der *Arbeiter* hat den Bericht an die Produktentwicklung geliefert.
  
  Quando il *lavoratore* è arrivato, la macchina era già operativa.
  Als der *Arbeiter* ankam, war die Maschine schon betriebsbereit.
  
  Il *lavoratore* che ha appena finito il turno è stanco, ma soddisfatto.
  Der *Arbeiter*, der gerade Feierabend hat, ist müde, aber zufrieden.
  
  Se il *lavoratore* avesse giustificato meglio il ritardo, non ci sarebbero stati problemi.
  Wenn der *Arbeiter* die Verspätung besser begründet hätte, gäbe es keine Probleme.
  
  Il *lavoratore* che indossa uno spencer blu è il nuovo manager.
  Der *Arbeiter*, der einen blauen Blazer trägt, ist der neue Manager.
