Rang: 2482
Wort: priorità
Wortart: n.f
Wort mit Artikel: la priorità
Femininum / Plural: priorità
IPA: ''
Definition: die Priorität, -en
Register: ''
Beispielsätze: |-
  Devi dare la *priorità* agli impegni lavorativi prima di tutto.
  Du musst den arbeitsbezogenen Verpflichtungen *Priorität* geben.
  
  Non capisco perché tu abbia considerato la *priorità* sbagliata in questa situazione.
  Ich verstehe nicht, warum du in dieser Situation die falsche *Priorität* gesetzt hast.
  
  Se avessi stabilito le tue *priorità* con più attenzione, non saresti così stressato ora.
  Hättest du deine *Prioritäten* sorgfältiger festgelegt, wärst du jetzt nicht so gestresst.
  
  È evidente che la *priorità* assoluta debba essere la salute dei detenuti in questa prigione.
  Es ist offensichtlich, dass die absolute *Priorität* die Gesundheit der Häftlinge in diesem Gefängnis sein muss.
  
  Bis a domani mattina, stabiliamo insieme quali siano le nostre *priorità* per il progetto.
  Bis morgen früh legen wir gemeinsam fest, welche unsere *Prioritäten* für das Projekt sind.
