Rang: 3968
Wort: razzista
Wortart: adj
Wort mit Artikel: razzista
Femininum / Plural: razziste
IPA: ''
Definition: rassistisch
Register: ''
Beispielsätze: |-
  Purtroppo in alcuni ambienti esiste ancora un atteggiamento *razzista* che va combattuto.
  Leider gibt es in manchen Kreisen noch eine *rassistische* Haltung, die bekämpft werden muss.
  
  Non sopporto chi giudica le persone per il colore della pelle: è davvero *razzista*!
  Ich kann es nicht ertragen, wenn Menschen nach der Hautfarbe beurteilt werden – das ist einfach *rassistisch*!
  
  Sebbene abbia un atteggiamento *razzista*, cerca di nasconderlo di fronte agli amici.
  Obwohl er eine *rassistische* Einstellung hat, versucht er, sie vor seinen Freunden zu verbergen.
  
  Se continuerai con queste battute *razziste*, non vorrai più frequentare questa compagnia.
  Wenn du diese *rassistischen* Witze weiter machst, wirst du bald nicht mehr dazugehören wollen.
  
  Credo che la sua opinione *razzista* derivi più dalla paura che dall’odio vero e proprio.
  Ich glaube, dass seine *rassistische* Meinung eher aus Angst als aus richtigem Hass resultiert.
