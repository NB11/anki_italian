Rang: 959
Wort: difendere
Wortart: vt
Wort mit Artikel: difendere
Femininum / Plural: ''
IPA: ''
Definition: verteidigen, beschützen
Register: ''
Beispielsätze: |-
  Il *difende* sempre i suoi amici dagli attacchi ingiusti.
  Er *verteidigt* immer seine Freunde gegen ungerechte Angriffe.
  
  Se non avessimo *difeso* il nostro territorio, lo avrebbero invaso.
  Wenn wir unser Territorium nicht *verteidigt* hätten, hätten sie es überfallen.
  
  Che tu *difenda* questa posizione assurda mi sembra ridicolo!
  Dass du diese absurde Position *verteidigst*, kommt mir lächerlich vor!
  
  Il team ha bisogno di qualcuno che *difenda* i loro interessi durante la riunione.
  Das Team braucht jemanden, der ihre Interessen während der Besprechung *verteidigt*.
  
  Perché vuoi *difendere* qualcuno che ti tratta così male?
  Warum willst du jemanden *verteidigen*, der dich so schlecht behandelt?
