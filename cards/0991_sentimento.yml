Rang: 991
Wort: sentimento
Wortart: n.m
Wort mit Artikel: il sentimento
Femininum / Plural: sentimenti
IPA: ''
Definition: das Gefühl, -e
Register: ''
Beispielsätze: |-
  Non provo nessun *sentimento* quando guardo quel film tanto famoso.
  Ich empfinde *keine Gefühle*, wenn ich diesen berühmten Film ansehe.
  
  Durante il nostro discorso, ho rivelato il mio *sentimento* più profondo.
  In unserem Gespräch habe ich mein tiefstes *Gefühl* verraten.
  
  Ha confessato che il suo *sentimento* per lei era solo amicizia, non amore.
  Er gestand, dass sein *Gefühl* für sie nur Freundschaft, nicht Liebe war.
  
  Se avessi saputo il tuo *sentimento*, non ti avrei fatto del male.
  Hätte ich dein *Gefühl* gekannt, hätte ich dir nicht wehgetan.
  
  Nonostante la litigata, provavo un *sentimento* di nostalgia per quei giorni del periodo passato.
  Trotz des Streits empfand ich ein *Gefühl* der Sehnsucht nach jenen Tagen der Vergangenheit.
