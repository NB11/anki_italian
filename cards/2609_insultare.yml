Rang: 2609
Wort: insultare
Wortart: vt
Wort mit Artikel: insultare
Femininum / Plural: ''
IPA: ''
Definition: beleidigen, beschimpfen
Register: ''
Beispielsätze: |-
  Non è educato *insultare* le persone solo perché non sono d’accordo con te.
  Es ist nicht höflich, Leute zu *beleidigen*, nur weil sie nicht mit dir übereinstimmen.
  
  Se continui a *insultare* il tuo vicino, finirà per sporgere denuncia.
  Wenn du deinen Nachbarn weiter *beschimpfst*, wird er Anzeige erstatten.
  
  Non mi aspetto che tu *insulti* chiunque abbia un’opinione diversa dalla tua.
  Ich erwarte nicht, dass du jeden *beleidigen* wirst, der eine andere Meinung hat als du.
  
  Avrei preferito che non *insultassi* il cuoco davanti a tutti gli ospiti.
  Ich hätte lieber gesehen, wenn du den Koch nicht vor allen Gästen *beleidigt* hättest.
  
  Nonostante l’astio, lui evitava di *insultare* chiunque, anche i suoi nemici.
  Trotz des Grolls vermied er es, jemanden zu *beleidigen*, sogar seine Feinde.
