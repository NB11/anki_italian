Rang: 2395
Wort: cravatta
Wortart: n.m
Wort mit Artikel: la cravatta
Femininum / Plural: cravatte
IPA: ''
Definition: die Krawatte, -n
Register: ''
Beispielsätze: |-
  Hai scelto una *cravatta* blu per l'intervista?
  Hast du für das Vorstellungsgespräch eine *Krawatte* in Blau gewählt?
  
  L'uomo ha sistemato accuratamente la *cravatta* prima di entrare nell'aula magna.
  Der Mann hat seine *Krawatte* sorgfältig gerichtet, bevor er den Hörsaal betrat.
  
  Senza la *cravatta* non sarebbe entrato nel ristorante elegante, diciamo la verità!
  Ohne *Krawatte* wäre er nicht in das Nobelrestaurant hineingekommen, ganz klar!
  
  Mi hanno detto che la sua *cravatta* era di seta pregiata, ma non riesco a crederci.
  Man hat mir erzählt, seine *Krawatte* sei aus edler Seide gewesen, aber ich kann es kaum glauben.
  
  Quando ti metti una *cravatta* troppo stretta, dopo un'ora ti viene mal di testa, vero?
  Wenn man sich eine *Krawatte* zu eng bindet, bekommt man nach einer Stunde Kopfschmerzen, nicht wahr?
