Rang: 485
Wort: re
Wortart: n.m
Wort mit Artikel: il re
Femininum / Plural: re
IPA: ''
Definition: der König, -e
Register: ''
Beispielsätze: |-
  Il *re* governa il regno con saggezza.
  Der *König* regiert das Königreich mit Weisheit.
  
  Chi ha detto che il *re* è malato?
  Wer hat gesagt, dass der *König* krank ist?
  
  I *rei* medievali indossavano corone pesanti.
  Die mittelalterlichen *Könige* trugen schwere Kronen.
  
  Il *re* vuole parlare con il suo consigliere privato.
  Der *König* möchte mit seinem Privatberater sprechen.
  
  Se fossi un *re*, abolirei tutte le tasse!
  Wenn ich *König* wäre, würde ich alle Steuern abschaffen!
