Rang: 1671
Wort: attorno
Wortart: adv
Wort mit Artikel: attorno
Femininum / Plural: ''
IPA: ''
Definition: umher, ringsherum
Register: ''
Beispielsätze: |-
  Gli investigatori hanno trovato delle tracce *attorno* al luogo del delitto.
  Die Ermittler fanden Spuren *umher* am Tatort.
  
  Cammina *attorno* alla piazza ammirando gli edifici storici.
  Er läuft *ringsherum* um den Platz und bewundert die historischen Gebäude.
  
  Hanno disposto i tavoli *attorno* al camino per creare un'atmosfera accogliente.
  Sie haben die Tische *um den* Kamin herum aufgestellt, um eine gemütliche Atmosphäre zu schaffen.
  
  I ladri si sono aggirati *attorno* all'edificio prima di decidere quale porta forzare.
  Die Diebe schlichen *um das* Gebäude herum, bevor sie sich für eine Tür zum Aufbrechen entschieden.
  
  Pur di non annegare, nuotò *attorno* alla barca danneggiata fino all'arrivo dell'ambulanza.
  Um nicht zu ertrinken, schwamm er *um das* beschädigte Boot herum, bis der Krankenwagen eintraf.
