Rang: 3102
Wort: cassia
Wortart: n.f
Wort mit Artikel: la cassia
Femininum / Plural: cassie
IPA: ''
Definition: die Kassie, -n
Register: ''
Beispielsätze: |-
  La *cassia* si usa spesso in cucina per aromatizzare i dolci.
  Die *Kassie* wird oft in der Küche verwendet, um Süßspeisen zu aromatisieren.
  
  Ho comprato una confezione di *cassia* al negozio biologico ieri.
  Ich habe gestern eine Packung *Kassie* im Bioladen gekauft.
  
  Se vuoi un dolce profumato, aggiungi un bastoncino di *cassia* alla ricetta.
  Wenn du ein duftendes Dessert möchtest, füge ein Stück *Kassie* zum Rezept hinzu.
  
  La *cassia* che hai scelto è più sottile di quella che ho usato l'altra volta.
  Die *Kassie*, die du ausgewählt hast, ist dünner als die, die ich letztes Mal verwendet habe.
  
  Nel libro di cucina c'è una ricetta per un dolce al *cassia* che sembra delizioso.
  Im Kochbuch gibt es ein Rezept für ein *Kassie*-Dessert, das köstlich aussieht.
