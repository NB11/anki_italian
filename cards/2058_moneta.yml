Rang: 2058
Wort: moneta
Wortart: n.f
Wort mit Artikel: la moneta
Femininum / Plural: monete
IPA: ''
Definition: die Münze, -n
Register: ''
Beispielsätze: |-
  In questa borsa ho trovato una *moneta* antica di valore inestimabile.
  In dieser Tasche habe ich eine *Münze* von unschätzbarem Wert gefunden.
  
  Nonostante la crisi, lui ha sempre risparmiato ogni *moneta* che trovava.
  Trotz der Krise hat er jede *Münze*, die er fand, immer gespart.
  
  Se vuoi comprare questo libro, ti serviranno almeno venti *monete* di rame.
  Wenn du dieses Buch kaufen willst, wirst du mindestens zwanzig *Münzen* aus Kupfer brauchen.
  
  La *moneta* da due euro è caduta sotto il letto e non la troviamo più.
  Die *Münze* zu zwei Euro ist unter das Bett gefallen, und wir finden sie nicht mehr.
  
  Nonostante il *monetina* dell'autobus sia aumentato, preferisco usare i mezzi pubblici ogni giorno.
  Auch wenn das *Münzgeld* für den Bus gestiegen ist, bevorzuge ich es, die öffentlichen Verkehrsmittel täglich zu nutzen.
