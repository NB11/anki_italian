Rang: 3856
Wort: insegna
Wortart: n.m
Wort mit Artikel: il insegna
Femininum / Plural: insegne
IPA: ''
Definition: das Schild, -er
Register: ''
Beispielsätze: |-
  Ho visto *insegna* con il nome del ristorante quando siamo arrivati lì ieri sera.
  Ich habe das *Schild* mit dem Namen des Restaurants gesehen, als wir gestern Abend dort ankamen.
  
  Sulla porta dell’ufficio c’era un’*insegna* che indicava "Vietato l’ingresso ai non autorizzati".
  An der Bürotür hing ein *Schild*, das "Betreten für Unbefugte verboten" anzeigte.
  
  Se gironzoli per il centro, noterai che ogni negozio ha la sua *insegna* luminosa.
  Wenn du durch die Innenstadt schlendert, wirst du sehen, dass jedes Geschäft sein eigenes *leuchtendes Schild* hat.
  
  Mio padre ha comprato una *insegna* di legno per il nostro giardino che dice "Benvenuti".
  Mein Vater hat ein hölzernes *Schild* für unseren Garten gekauft, auf dem „Willkommen“ steht.
  
  Non capisco perché quella *insegna* sia stata sostituita: forse avevano problemi con il colore.
  Ich verstehe nicht, warum dieses *Schild* ersetzt wurde – vielleicht hatten sie Probleme mit der Farbe.
