Rang: 3492
Wort: rospo
Wortart: n.m
Wort mit Artikel: il rospo
Femininum / Plural: rospi
IPA: ''
Definition: die Kröte, -n
Register: ''
Beispielsätze: |-
  Nel giardino di mia nonna ho visto un *rospo* verde vicino al laghetto.
  Im Garten meiner Großmutter habe ich eine *Kröte* in der Nähe des Teichs gesehen.
  
  Se non avessi schiacciato il *rospo*, ora starebbe saltando nel prato.
  Wenn ich die *Kröte* nicht zertreten hätte, würde sie jetzt im Gras springen.
  
  Mi domando se questo *rospo* sia velenoso o solo una comune specie innocua.
  Ich frage mich, ob diese *Kröte* giftig ist oder nur eine harmlose Art.
  
  Quando ero piccolo, mio fratello maggiore mi terrorizzava con storie di *rospi* magici che trasformavano la gente in ranocchie.
  Als ich klein war, hat mich mein älterer Bruder mit Geschichten von magischen *Kröten* verängstigt, die Menschen in Frösche verwandeln.
  
  Nonostante sia brutto esteticamente, il *rospo* è un animale utile per l'ecosistema perché mangia insetti dannosi.
  Obwohl er hässlich aussieht, ist die *Kröte* ein nützliches Tier für das Ökosystem, weil sie schädliche Insekten frisst.
