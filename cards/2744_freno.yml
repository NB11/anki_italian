Beispielsätze: |-
  Devi controllare *i freni* della bicicletta prima della partenza.
  Du musst *die Bremsen* vom Fahrrad vor der Abfahrt prüfen.
  
  Ho azionato *il freno* d’emergenza perché ho visto un cane in mezzo alla strada.
