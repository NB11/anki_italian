  Der Mechaniker hat mir gesagt, dass *die Bremsen* meines Autos schon abgenutzt sind und ersetzt werden müssen.
  
  Mentre guidavo, ho notato che *il freno a mano* non funzionava correttamente.
  Während ich fuhr, ist mir aufgefallen, dass *die Handbremse* nicht richtig funktionierte.
  
  Se non usi *i freni* in discesa, rischi di non poter controllare la velocità.
  Wenn du *die Bremsen* beim Bergabfahren nicht benutzt, riskierst du, die Geschwindigkeit nicht kontrollieren zu können.
