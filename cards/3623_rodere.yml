Rang: 3623
Wort: rodere
Wortart: v
Wort mit Artikel: rodere
Femininum / Plural: ''
IPA: ''
Definition: nagen, abfressen
Register: ''
Beispielsätze: |-
  Il topo *rode* il formaggio con grande entusiasmo.
  Die Maus *frisst* den Käse mit großer Begeisterung.
  
  Non volevo che i tarli *rodessero* la struttura del letto.
  Ich wollte nicht, dass die Holzwürmer die Struktur des Bettes *zerfressen*.
  
  Se avessi saputo che l’ansia ti avrebbe fatto *rodere* le unghie, ti avrei aiutato prima!
  Wenn ich gewusst hätte, dass dich die Angst dazu bringen würde, dir die *Nägel abzufressen*, hätte ich dir früher geholfen!
  
  È meglio che la psicologa mi spieghi perché *rode* dentro di me questa rabbia.
  Es ist besser, wenn mir die Psychologin erklärt, warum es in mir *nagt* diese Wut.
  
  Avrei preferito che il dubbio non *rodesse* già da mesi le nostre certezze.
  Ich hätte es vorgezogen, dass der Zweifel nicht schon seit Monaten unsere Gewissheiten *zerfrisst*.
