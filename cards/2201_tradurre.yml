Rang: 2201
Wort: tradurre
Wortart: vt
Wort mit Artikel: tradurre
Femininum / Plural: ''
IPA: ''
Definition: übersetzen
Register: ''
Beispielsätze: |-
  Devo *tradurre* questo articolo dall'italiano in tedesco entro domani.
  Ich muss diesen Artikel vom Italienischen ins Deutsche *übersetzen* bis morgen.
  
  Il commissario ha *tradotto* le dichiarazioni del testimone in modo molto accurato.
  Der Kommissar hat die Aussagen des Zeugen sehr genau *übersetzt*.
  
  Se tu avessi studiato più, avresti potuto *tradurre* questo testo senza problemi.
  Hättest du mehr gelernt, hättest du diesen Text problemlos *übersetzen* können.
  
  Credo che lui stia cercando qualcuno che sappia *tradurre* dal giapponese in italiano.
  Ich glaube, dass er jemanden sucht, der Japanisch ins Italienische *übersetzen* kann.
  
  Al convegno di giovedì verranno *tradotte* alcune poesie in molte lingue diverse.
  Am Donnerstag-Kongress werden einige Gedichte in viele verschiedene Sprachen *übersetzt*.
