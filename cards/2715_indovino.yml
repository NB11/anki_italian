Rang: 2715
Wort: indovino
Wortart: n.m
Wort mit Artikel: il indovino
Femininum / Plural: gli indovini
IPA: ''
Definition: der Hellseher, -
Register: ''
Beispielsätze: |-
  L'*indovino* prevede che domani pioverà, ma io non ci credo.
  Der *Hellseher* sagt voraus, dass es morgen regnet, aber ich glaube ihm nicht.
  
  Nel Medioevo gli *indovini* erano molto rispettati dalla popolazione.
  Im Mittelalter wurden *Hellseher* von der Bevölkerung sehr respektiert.
  
  Se fossi stato un *indovino*, avrei capito che quel viaggio sarebbe finito in rovina.
  Wäre ich ein *Hellseher* gewesen, hätte ich gewusst, dass diese Reise im Chaos enden würde.
  
  Gli *indovini* moderni spesso usano metodi scientifici per localizzare perdite d’acqua nelle case.
  Moderne *Hellseher* nutzen oft wissenschaftliche Methoden, um Wasserverluste in Häusern zu lokalisieren.
  
  Nonostante le sue previsioni, l'*indovino* non riuscì a evitare il disastro che aveva predetto.
  Trotz seiner Vorhersagen konnte der *Hellseher* die Katastrophe, die er vorhergesagt hatte, nicht verhindern.
