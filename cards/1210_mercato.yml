Rang: 1210
Wort: mercato
Wortart: n.m
Wort mit Artikel: il mercato
Femininum / Plural: i mercati
IPA: ''
Definition: der Markt, -¨e
Register: ''
Beispielsätze: |-
  In questa città c'è un bellissimo *mercato* dove si vendono prodotti freschi ogni sabato mattina.
  In dieser *Stadt* gibt es einen wunderschönen Markt, auf dem jeden Samstagmorgen frische Produkte verkauft werden.
  
  Se vuoi comprare delle uova fresche, ti consiglio di andare al *mercato* vicino alla piazza principale.
  Wenn du *frische Eier* kaufen möchtest, empfehle ich dir den Markt in der Nähe des Hauptplatzes.
  
  Molti turisti visitano il *mercato* di Napoli per assaporare i prodotti tipici della regione.
  Viele Touristen besuchen den *Markt* von Neapel, um die typischen regionalen Produkte zu probieren.
  
  Ho speso più di cento euro al *mercato* stamattina, perché c'erano delle offerte davvero interessanti.
  Ich habe heute Morgen über hundert Euro auf dem *Markt* ausgegeben, weil es wirklich interessante Angebote gab.
  
  Vorrei che il *mercato* fosse aperto anche la domenica, visto che molti lavorano durante la settimana.
  Ich wünschte, der *Markt* würde auch sonntags geöffnet sein, da viele Leute unter der Woche arbeiten.
