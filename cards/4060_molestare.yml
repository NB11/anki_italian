Rang: 4060
Wort: molestare
Wortart: v
Wort mit Artikel: molestare
Femininum / Plural: ''
IPA: ''
Definition: belästigen, stören
Register: ''
Beispielsätze: |-
  Non *molestare* il cane se non vuoi che ti morda.
  Belästige* den Hund nicht, sonst könnte er dich beißen.
  
  Mi dispiace che tu lo *stia molestando* senza motivo.
  Es tut mir leid, dass du ihn grundlos belästigst*.
  
  Lui *ha molestato* la sua compagna di classe più volte prima di essere scoperto.
  Er hat seine Mitschülerin mehrmals *belästigt**, bis er ertappt wurde.
  
  Se *molesterai* qualcuno in pubblico, rischi una denuncia.
  Wenn du jemanden in der Öffentlichkeit *belästigst**, riskierst du eine Anzeige.
  
  È importante che nessuno *molesti* i testimoni durante il processo.
  Es ist wichtig, dass niemand die Zeugen während des Prozesses *belästigt**.
