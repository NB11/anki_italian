Beispielsätze: |-
  Il calendario *scolastico* della regione include molte festività locali e nazionali.
  Der *schulische* Kalender der Region umfasst viele lokale und nationale Feiertage.
  
  Dopo l’incidente, lo studente ha avuto bisogno di un supporto *scolastico* extra per recuperare le lezioni perse.
  Nach dem Unfall brauchte der Schüler zusätzliche *schulische* Unterstützung, um den versäumten Unterricht nachzuholen.
  
  Se avessi saputo che il progetto era *scolastico*, avrei partecipato con più entusiasmo.
  Wenn ich gewusst hätte, dass das Projekt *schulisch* war, hätte ich mit mehr Begeisterung teilgenommen.
  
  Il consigliere comunale ha proposto un aumento delle ore *scolastiche* per migliorare la qualità dell’istruzione.
  Der Stadtrat hat eine Erhöhung der *schulischen* Stunden vorgeschlagen, um die Bildungsqualität zu verbessern.
  
  Nonostante le difficoltà, l’insegnante ha sempre incoraggiato gli alunni a partecipare alle attività *scolastiche* extrascolastiche.
  Trotz der Schwierigkeiten hat die Lehrerin die Schüler stets ermutigt, an den *schulischen* und außerschulischen Aktivitäten teilzunehmen.
