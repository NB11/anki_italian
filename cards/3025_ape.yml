Rang: 3025
Wort: ape
Wortart: n.f
Wort mit Artikel: l'ape
Femininum / Plural: api
IPA: ''
Definition: die Biene, -n
Register: ''
Beispielsätze: |-
  L'*ape* produce miele tutto l'anno, ma in estate è più attiva.
  Die *Biene* produziert das ganze Jahr über Honig, aber im Sommer ist sie aktiver.
  
  Sai che senza *api* molte piante non potrebbero riprodursi?
  Weißt du, dass ohne *Bienen* viele Pflanzen sich nicht vermehren könnten?
  
  Ho visto un alveare così grande che sembrava brulicare di *api*.
  Ich habe einen so großen Bienenstock gesehen, dass er von *Bienen* zu wimmeln schien.
  
  Se non proteggiamo l'*ape*, rischiamo di perdere molti frutti della terra.
  Wenn wir die *Biene* nicht schützen, riskieren wir, viele Früchte der Erde zu verlieren.
  
  L'*ape* regina, che nessuno di noi aveva notato all'inizio, si distingueva per le sue dimensioni maggiori.
  Die *Bienen*königin, die wir zunächst alle übersehen hatten, zeichnete sich durch ihre größeren Ausmaße aus.
