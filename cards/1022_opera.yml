Rang: 1022
Wort: opera
Wortart: n.f
Wort mit Artikel: l'opera
Femininum / Plural: opere
IPA: ''
Definition: das Werk, -e, die Oper, -n
Register: ''
Beispielsätze: |-
  L’*opera* di Verdi è molto famosa nel mondo intero.
  Das *Werk* von Verdi ist auf der ganzen Welt sehr bekannt.
  
  Durante la nostra vacanza in Sicilia abbiamo assistito a un’*opera* al teatro di Catania.
  Während unseres Urlaubs auf Sizilien haben wir eine *Oper* im Theater von Catania besucht.
  
  Hai mai visto un’*opera* lirica dal vivo? Non capita spesso a tutti.
  Hast du jemals eine *Oper* live gesehen? Das geschieht schließlich nicht oft.
  
  L’*opera* completa di questo pittore sarà esposta in una mostra a Milano il mese prossimo.
  Das gesamte *Werk* dieses Malers wird in einer Ausstellung in Mailand nächsten Monat präsentiert.
  
  Quando ero piccolo, mio nonno mi leggeva sempre un capitolo di un’*opera* di avventura prima di dormire.
  Als ich klein war, las mir mein Großvater immer ein Kapitel aus einem *Werk* über Abenteuer vor dem Schlafengehen vor.
