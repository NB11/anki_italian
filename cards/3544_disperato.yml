Rang: 3544
Wort: disperato
Wortart: adj
Wort mit Artikel: disperato
Femininum / Plural: ''
IPA: ''
Definition: verzweifelt, hoffnungslos
Register: ''
Beispielsätze: |-
  Il suo sguardo *disperato* mostrava quanto fosse preoccupato per l'esito dell'esame.
  Sein *verzweifelter* Blick zeigte, wie sehr er sich um das Prüfungsergebnis sorgte.
  
  Anche se era *disperata*, continuò a lottare per realizzare i suoi sogni.
  Obwohl sie *hoffnungslos* war, kämpfte sie weiter, um ihre Träume zu verwirklichen.
  
  Il film termina con una scena *disperata*, quando il protagonista si getta nel vuoto.
  Der Film endet mit einer *verzweifelten* Szene, in der der Protagonist ins Leere springt.
  
  Era *disperato* perché non trovava più il suo portafoglio perso la mattina stessa.
  Er war *verzweifelt*, weil er seine am selben Morgen verlorene Geldbörse nicht wiederfand.
  
  Quando sentì gridare, ebbe un attimo di panico e si gettò in una fuga *disperata*.
  Als er Schreie hörte, packte ihn eine Sekunde Panik, und er stürmte in einem *verzweifelten* Fluchtversuch davon.
