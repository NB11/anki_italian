Definition: davon, darüber, davon
Register: ''
Beispielsätze: |-
  Quanti libri hai letto? Ne *ho* letti tre.
  Wie viele Bücher hast du gelesen? *Davon* habe ich drei gelesen.
  
  Non so nulla di questa storia, e tu *ne* sai qualcosa?
  Ich weiß nichts von dieser Geschichte, weißt du *davon* etwas?
  
  Ho comprato delle mele e *ne* ho mangiate due.
  Ich habe Äpfel gekauft und *davon* zwei gegessen.
  
  Parlavano della vacanza, ma non *ne* parlavano volentieri.
  Sie sprachen über den Urlaub, aber sie sprachen nicht gern *darüber*.
  
  Se hai bisogno di aiuto, *ne* ho già parlato con lei.
  Wenn du Hilfe brauchst, *darüber* habe ich schon mit ihr gesprochen.
