Rang: 1908
Wort: femmina
Wortart: n.f
Wort mit Artikel: la femmina
Femininum / Plural: femmine
IPA: ''
Definition: das Weibchen, -
Register: ''
Beispielsätze: |-
  Nel nostro allevamento abbiamo una *femmina* di leone che si chiama Luna.
  In unserem Streichelzoo haben wir ein *Weibchen* von Löwin, das Luna heißt.
  
  La *femmina* del panda pesa molto meno del maschio, purtroppo.
  Das *Weibchen* des Pandas wiegt leider viel weniger als das Männchen.
  
  Ho visto una *femmina* di cardellino con le penne molto colorate vicino al balcone.
  Ich habe ein *Weibchen* von Stieglitz mit sehr farbenfrohen Federn in der Nähe des Balkons gesehen.
  
  Se osservi meglio il nido, noterai che ci sono due uova: una è più grande perché contiene una *femmina*.
  Wenn du das Nest genauer betrachtest, wirst du merken, dass es zwei Eier gibt: eines ist größer, weil es ein *Weibchen* enthält.
  
  La *femmina* di questo insetto depone le uova solo in primavera.
  Das *Weibchen* dieses Insekts legt die Eier erst im Frühling ab.
