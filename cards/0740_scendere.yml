Rang: 740
Wort: scendere
Wortart: vi
Wort mit Artikel: scendere
Femininum / Plural: ''
IPA: ''
Definition: hinuntergehen, aussteigen, absteigen
Register: ''
Beispielsätze: |-
  Oggi *scendo* le scale di corsa perché ho fretta.
  Heute *laufe ich* die Treppe *hinunter*, weil ich es eilig habe.
  
  Ieri sera *siamo scesi* dall’autobus alla fermata sbagliata.
  Gestern Abend *stiegen wir* an der falschen Haltestelle *aus*.
  
  Se *scenderai* dal treno a Roma, dovrai prendere un altro mezzo.
  Wenn du am Bahnhof *aussteigst*, musst du ein anderes Verkehrsmittel nehmen.
  
  Spero che domani *scendano* presto al piano di sotto.
  Ich hoffe, dass sie morgen früh *herunterkommen*.
  
  Mio padre *scendeva* sempre in cantina quando eravamo piccoli.
  Mein Vater *stieg* immer in den Keller *hinunter*, als wir klein waren.
