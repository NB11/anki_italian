Rang: 740
Wort: scendere
Wortart: v
Wort mit Artikel: scendere
Femininum / Plural: ''
IPA: ''
Definition: hinuntergehen, aussteigen, sinken
Register: ''
Beispielsätze: |-
  Devo *scendere* le scale perché l'ascensore è rotto oggi.
  Ich muss die Treppe *hinuntergehen*, weil der Aufzug heute kaputt ist.
  
  Appena *scendi* dal treno, mandami un messaggio, così vengo a prenderti alla stazione.
  Sobald du aus dem Zug *aussteigst*, schick mir eine Nachricht, dann hole ich dich am Bahnhof ab.
  
  Se *scenderai* ancora di livello, dovrai ripetere la lezione di matematica che hai perso.
  Falls du noch weiter im Niveau *sinkst*, musst du die Mathe-Lektion wiederholen, die du verpasst hast.
  
  Ha un aspetto così stanco che sembra che debba *scendere* dal letto dopo una notte in bianco.
  Er sieht so erschöpft aus, als müsste er nach einer schlaflosen Nacht aus dem Bett *hinuntergehen*.
  
  Non appena il sole inizia a *scendere*, la temperatura nella sala cala bruscamente.
  Sobald die Sonne beginnt zu *sinken*, fällt die Temperatur im Saal stark.
