Rang: 1561
Wort: conseguenza
Wortart: n.f
Wort mit Artikel: la conseguenza
Femininum / Plural: conseguenze
IPA: ''
Definition: die Folge, -n, Konsequenz, -en
Register: ''
Beispielsätze: |-
  A causa della tua *conseguenza*, abbiamo perso molto tempo.
  Wegen deines *Verhaltens* haben wir viel Zeit verloren.
  
  Nonostante le *conseguenze*, continuammo con il nostro piano.
  Trotz der *Konsequenzen* setzten wir unseren Plan fort.
  
  La *conseguenza* di questo errore sarà grave, lo sapete vero?
  Die *Folge* dieses Fehlers wird schwerwiegend sein, das wisst ihr doch, oder?
  
  Ho riflettuto sulle *conseguenze* delle mie azioni e ora mi pento.
  Ich habe über die *Konsequenzen* meines Handelns nachgedacht und bereue es jetzt.
  
  La *conseguenza* immediata fu un rallentamento del traffico in tutta la città.
  Die *Folge* war sofort eine Verlangsamung des Verkehrs in der ganzen Stadt.
