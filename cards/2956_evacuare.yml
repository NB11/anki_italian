Rang: 2956
Wort: evacuare
Wortart: v
Wort mit Artikel: evacuare
Femininum / Plural: ''
IPA: ''
Definition: evakuieren, räumen
Register: ''
Beispielsätze: |-
  A causa dell’alluvione, la polizia *ha evacuato* tutti gli abitanti del villaggio.
  Wegen der Flutwelle hat die Polizei *alle* Dorfbewohner evakuiert.
  
  Se il terremoto *evacuasse* la città, dove andreste?
  Falls das Erdbeben die Stadt *evakuieren würde*, wohin würdet ihr gehen?
  
  Il sindaco ha ordinato di *evacuare* immediatamente l’ospedale.
  Der Bürgermeister hat befohlen, das Krankenhaus *sofort zu evakuieren*.
  
  Nonostante il pericolo, nessuno voleva *evacuare* l’edificio.
  Trotz der Gefahr wollte niemand das Gebäude *evakuieren*.
  
  Dopo che la bomba fu disinnescata, le autorità decisero di *evacuare* la zona circostante.
  Nachdem die Bombe entschärft wurde, beschlossen die Behörden, das umliegende Gebiet *zu evakuieren*.
