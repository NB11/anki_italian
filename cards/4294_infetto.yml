Beispielsätze: |-
  Il paziente ha una ferita *infetta* che richiede immediatamente un trattamento.
  Der Patient hat eine *infizierte* Wunde, die sofort behandelt werden muss.
  
  Dopo aver toccato il topo morto, aveva le mani *infette* di germi.
  Nachdem er die tote Maus berührt hatte, waren seine Hände mit *infizierten* Keimen bedeckt.
  
  Se lasci la ferita scoperta, diventerà *infetta* in poche ore.
  Wenn du die Wunde unbedeckt lässt, wird sie in wenigen Stunden *infiziert*.
  
  Il medico temeva che la puntura *infetta* potesse causare complicazioni.
  Der Arzt fürchtete, dass die *infizierte* Injektion Komplikationen verursachen könnte.
  
  Anche se la malattia sembra lieve, è meglio evitare qualsiasi contatto con fluidi *infetti*.
  Auch wenn die Krankheit leicht erscheint, sollte man jeden Kontakt mit *infizierten* Flüssigkeiten vermeiden.
