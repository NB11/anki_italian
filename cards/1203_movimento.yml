Rang: 1203
Wort: movimento
Wortart: n.m
Wort mit Artikel: il movimento
Femininum / Plural: movimenti
IPA: ''
Definition: die Bewegung, -en
Register: ''
Beispielsätze: |-
  Il *movimento* delle mani durante la conversazione è ovvio.
  Die *Bewegung* der Hände während des Gesprächs ist offensichtlich.
  
  Dopo aver rinunciato a reggere il pugno, ha avvertito un *movimento* improvviso nell’area della spalla sinistra.
  Nachdem er darauf *verzichtet* hatte, die Faust zu halten, spürte er eine plötzliche Bewegung im Bereich der linken Schulter.
  
  Lo psicologo ritiene che un *movimento* ripetitivo possa deludere le aspettative del suo paziente.
  Der Psychologe glaubt, dass eine repetitive *Bewegung* die Erwartungen seines Patienten enttäuschen könnte.
  
  Per procurare il finanziamento necessario, il pilota ha sottolineato l’urgente *movimento* verso nord.
  Um die nötige Finanzierung zu *beschaffen*, betonte der Pilot die dringende Bewegung in Richtung Norden.
  
  Malgrado lo sporco sulla sua panca, il socio non ha osato giudicare il *movimento* del suo vicino che tentava di pulire le scarpe.
  Trotz der Verschmutzung auf seiner Bank wagte es das Mitglied nicht, die *Bewegung* seines Nachbarn zu kritisieren, der versuchte, seine Schuhe zu reinigen.
