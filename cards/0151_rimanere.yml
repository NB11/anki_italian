Rang: 151
Wort: rimanere
Wortart: v
Wort mit Artikel: rimanere
Femininum / Plural: ''
IPA: ''
Definition: bleiben, übrig sein, erhalten bleiben
Register: ''
Beispielsätze: |-
  Vorrei *rimanere* a casa stasera invece che uscire.
  Ich möchte heute Abend zu *Hause bleiben* statt auszugehen.
  
  Quanto tempo *rimani* a Roma durante il tuo viaggio?
  Wie lange *bleibst du* während deiner Reise in Rom?
  
  Dopo la festa sono *rimaste* solo poche persone.
  Nach der Feier sind nur wenige Leute *geblieben*.
  
  Credo che *rimarremo* buoni amici per sempre.
  Ich glaube, wir *werden* immer gute Freunde *bleiben*.
  
  Se non avessi perso il treno, ora *sarei rimasto* a Milano.
  Wenn ich den Zug nicht verpasst hätte, *wäre ich* jetzt in Mailand *geblieben*.
