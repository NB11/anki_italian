Rang: 4561
Wort: mulo
Wortart: n.m
Wort mit Artikel: il mulo
Femininum / Plural: muli
IPA: ''
Definition: der Maultier, -
Register: ''
Beispielsätze: |-
  Il *mulo* non può riprodurre perché è sterile.
  Das *Maultier* kann sich nicht fortpflanzen, weil es unfruchtbar ist.
  
  Nonostante il terreno viscido, il *mulo* continuò a camminare senza scivolare.
  Trotz des *glitschigen* Bodens ging das Maultier weiter, ohne auszurutschen.
  
  Se avessi un *mulo*, lo userei per trasportare i bagagli in montagna.
  Wenn ich ein *Maultier* hätte, würde ich es nutzen, um das Gepäck im Gebirge zu transportieren.
  
  Il contadino è arrabbiato perché il *mulo* ha calpestato il suo campo di grano.
  Der Bauer ist wütend, weil das *Maultier* sein Weizenfeld zertrampelt hat.
  
  Credimi, quel *mulo* è più testardo di te: se non vuole muoversi, non si muove!
  Glaub mir, dieses *Maultier* ist noch stur wie du: Wenn es sich nicht bewegen will, dann bewegt es sich nicht!
