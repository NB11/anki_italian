Rang: 3978
Wort: funzionario
Wortart: n.m
Wort mit Artikel: il funzionario
Femininum / Plural: i funzionari
IPA: ''
Definition: der Beamte, -n
Register: ''
Beispielsätze: |-
  Il *funzionario* ha firmato il documento senza controllare bene i dettagli.
  Der *Beamte* hat das Dokument unterschrieben, ohne die Details genau zu prüfen.
  
  Non sapevo che fossi diventato un *funzionario* pubblico: come mai questa scelta?
  Ich wusste nicht, dass du zum *Beamten* geworden bist: Warum diese Entscheidung?
  
  Se il *funzionario* avesse spiegato meglio, non ci sarebbero stati tanti malintesi.
  Hätte der *Beamte* es besser erklärt, gäbe es nicht so viele Missverständnisse.
  
  I *funzionari* che lavorano in questo ufficio sono molto preparati e disponibili.
  Die *Beamten*, die in diesem Büro arbeiten, sind sehr qualifiziert und hilfsbereit.
  
  Secondo il regolamento, il *funzionario* deve rispettare scadenze precise per ogni pratica.
  Laut Vorschrift muss der *Beamte* bei jeder Akte genaue Fristen einhalten.
