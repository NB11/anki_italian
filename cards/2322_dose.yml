Rang: 2322
Wort: dose
Wortart: n.f
Wort mit Artikel: la dose
Femininum / Plural: dosi
IPA: ''
Definition: die Dosis, -en
Register: ''
Beispielsätze: |-
  Il medico mi ha prescritto una *dose* più alta di questo farmaco.
  Der Arzt hat mir eine *höhere Dosis* dieses Medikaments verschrieben.
  
  Ogni sera prendo una *dose* di vitamine per rafforzare le difese immunitarie.
  Jeden Abend nehme ich eine *Dosis* Vitamine, um die Abwehrkräfte zu stärken.
  
  Durante l’esperimento si sono misurate diverse *dosi* di radiazioni per valutarne gli effetti.
  Während des Experiments wurden verschiedene *Dosen* Strahlung gemessen, um ihre Auswirkungen zu bewerten.
  
  Se non prendi la *dose* giusta, il farmaco non avrà nessun effetto.
  Wenn du nicht die richtige *Dosis* nimmst, wird das Medikament keine Wirkung haben.
  
  Hanno aumentato la *dose* di caffè nella ricetta originale perché era troppo debole.
  Sie haben die *Dosis* Kaffee im ursprünglichen Rezept erhöht, weil es zu schwach war.
