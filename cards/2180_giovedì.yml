IPA: ''
Definition: der Donnerstag, -e
Register: ''
Beispielsätze: |-
  Che ne dici di incontrarci *giovedì* prossimo per lavorare sul progetto?
  Was hältst du davon, uns *am nächsten Donnerstag* zu treffen, um am Projekt zu arbeiten?
  
  Ho già prenotato una visita guidata per *giovedì* alle 15:00.
  Ich habe bereits eine Führung für *Donnerstag* um 15 Uhr gebucht.
  
