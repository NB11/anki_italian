  Wusstest du, dass *ein Donnerstag* in einigen Kulturen als Unglückstag gilt?
  
  Se domani è martedì, allora *giovedì* sarà tra due giorni.
  Wenn morgen Dienstag ist, dann ist *Donnerstag* in zwei Tagen.
  
  Domani devo fare un colloquio di lavoro che cadrà di *giovedì* prossimo.
  Morgen habe ich ein Vorstellungsgespräch, das auf *nächsten Donnerstag* fällt.
