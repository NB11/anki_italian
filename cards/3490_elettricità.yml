Rang: 3490
Wort: elettricità
Wortart: n.f
Wort mit Artikel: la elettricità
Femininum / Plural: elettricità
IPA: ''
Definition: die Elektrizität
Register: ''
Beispielsätze: |-
  La *elettricità* è essenziale per la vita moderna.
  Die *Elektrizität* ist essenziell für das moderne Leben.
  
  Non sopporto quando *elettricità* si interrompe durante un temporale.
  Ich kann es nicht leiden, wenn die *Elektrizität* während eines Gewitters ausfällt.
  
  Se avessi saputo quanto costerebbe l’*elettricità* questo inverno, avrei speso meno.
  Wenn ich gewusst hätte, wie viel die *Elektrizität* diesen Winter kosten würde, hätte ich weniger ausgegeben.
  
  È importante che tutti risparmino *elettricità* per aiutare l’ambiente.
  Es ist wichtig, dass alle *Elektrizität* sparen, um der Umwelt zu helfen.
  
  La *elettricità* statica mi fa sempre venire la pelle d’oca.
  Die statische *Elektrizität* lässt mir immer eine Gänsehaut kommen.
