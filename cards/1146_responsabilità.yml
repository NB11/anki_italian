Rang: 1146
Wort: responsabilità
Wortart: n.f
Wort mit Artikel: la responsabilità
Femininum / Plural: responsabilità
IPA: ''
Definition: die Verantwortung, -en
Register: ''
Beispielsätze: |-
  La *responsabilità* di guidare spetta al maestro che ha molta esperienza con le montagne innevate.
  Die *Verantwortung* zu fahren liegt bei dem Lehrer, der viel Erfahrung mit den verschneiten Bergen hat.
  
  Se non assumi la tua *responsabilità*, chi lo farà al posto tuo?
  Wenn du deine *Verantwortung* nicht übernimmst, wer wird es dann für dich tun?
  
  Abbiamo discusso della *responsabilità* civile nell’evento organizzato dalla università.
  Wir haben über die zivile *Verantwortung* bei der von der Universität organisierten Veranstaltung gesprochen.
  
  Avrei voluto aiutare, ma non volevo assumermi la *responsabilità* degli errori altrui.
  Ich hätte helfen wollen, aber ich wollte die *Verantwortung* für die Fehler anderer nicht übernehmen.
  
  Chiunque ricopra questo ruolo deve rendersi conto che la *responsabilità* è grande e non può essere presa alla leggera.
  Wer auch immer diese Rolle bekleidet, muss sich bewusst sein, dass die *Verantwortung* groß ist und nicht leicht genommen werden darf.
