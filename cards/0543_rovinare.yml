Rang: 543
Wort: rovinare
Wortart: vt
Wort mit Artikel: rovinare
Femininum / Plural: ''
IPA: ''
Definition: zerstören, ruinieren, kaputt machen
Register: ''
Beispielsätze: |-
  Se *rovin*i l’orologio che mi hai prestato, dovrai pagare il danno.
  Wenn du die Uhr, die du mir geliehen hast, *zerstörst*, musst du den Schaden zahlen.
  
  Penso che la pioggia abbia *rovinato* la scena all’aperto che avevamo organizzato.
  Ich denke, der Regen hat die Szene im Freien, die wir organisiert hatten, *ruiniert*.
  
  Non volevo *rovinare* il vostro appuntamento, ma dovevo dirtelo.
  Ich wollte euer Treffen nicht *kaputtmachen*, aber ich musste es dir sagen.
  
  Spero che nessuno *rovin*i la sorpresa con un commento sbagliato.
  Ich hoffe, dass niemand die Überraschung mit einem falschen Kommentar *ruiniert*.
  
  Se *rovin*asse il rapporto con i colleghi, sarebbe un errore grave da considerare.
  Wenn du die Beziehung zu den Kollegen *zerstören* würdest, wäre das ein schwerwiegender Fehler, den man bedenken muss.
