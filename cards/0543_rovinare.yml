Rang: 543
Wort: rovinare
Wortart: vt
Wort mit Artikel: rovinare
Femininum / Plural: ''
IPA: ''
Definition: zerstören, verderben, ruinieren
Register: ''
Beispielsätze: |-
  Se *rovinate* il vestito nuovo, dovrete comprarne un altro.
  Wenn ihr das neue *Kleid* *zerstört*, müsst ihr ein neues kaufen.
  
  Penso che abbia *rovinato* la sorpresa svelandola troppo presto.
  Ich denke, er hat die Überraschung *ruiniert*, weil er sie zu früh verraten hat.
  
  Non vogliamo *rovinare* la festa con i nostri litigi.
  Wir wollen die *Feier* nicht mit unseren Streitereien *ruinieren*.
  
  Secondo me, la pioggia ha *rovinato* i nostri piani per il picnic.
  Meiner Meinung nach hat der Regen unsere *Pläne* für das Picknick *ruiniert*.
  
  Se avessi ascoltato i consigli, forse non avresti *rovinato* tutto.
  Hättest du auf die Ratschläge gehört, hättest du vielleicht nicht alles *ruiniert*.
