Rang: 2000
Wort: stretto
Wortart: adj
Wort mit Artikel: stretto
Femininum / Plural: ''
IPA: ''
Definition: eng, schmal, fest
Register: ''
Beispielsätze: |-
  Il sentiero tra le montagne è così *stretto* che possiamo camminare solo in fila indiana.
  Der Pfad zwischen den Bergen ist so *eng*, dass wir nur im Gänsemarsch gehen können.
  
  Questa maglietta mi sembra troppo *stretta*, forse dovrei prendere una taglia più grande.
  Dieses T-Shirt scheint mir zu *eng*, vielleicht sollte ich eine Größe größer nehmen.
  
  Il rapporto tra loro era così *stretto* che nessuno riusciva a dividerli.
  Das Verhältnis zwischen ihnen war so *fest*, dass es niemand auseinanderbringen konnte.
  
  Non hai notato che il passaggio verso il giardino è diventato più *stretto* dopo l’alluvione?
  Hast du nicht bemerkt, dass der Durchgang zum Garten nach der Flut schmaler geworden ist?
  
  Anche se la strada è più *stretta* qui, non perdiamoci d’animo e proseguiamo!
  Auch wenn die Straße hier schmaler ist, lass uns nicht den Mut verlieren und weitergehen!
