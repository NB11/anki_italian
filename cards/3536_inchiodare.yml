Rang: 3536
Wort: inchiodare
Wortart: vt
Wort mit Artikel: inchiodare
Femininum / Plural: ''
IPA: ''
Definition: festnageln, anheften
Register: ''
Beispielsätze: |-
  Il falegname *ha inchiodato* la tavola al muro per sistemare lo scaffale.
  Der Tischler hat die Platte an der Wand *festgenagelt*, um das Regal zu befestigen.
  
  Non *inchiodare* la porta, perché domani la sostituiremo del tutto.
  Nagel die Tür *nicht fest*, denn morgen ersetzen wir sie komplett.
  
  Se *inchiodi* bene ogni pezzo, la struttura resterà solida per anni.
  Wenn du jedes Teil gut *festnagelst*, bleibt die Konstruktion jahrelang stabil.
  
  Il ladro *è stato inchiodato* dalle prove della polizia, senza possibilità di fuga.
  Der Dieb wurde durch die Beweise der Polizei *festgenagelt* und hatte keine Fluchtmöglichkeit.
  
  Non volevo *inchiodare* il poster con i chiodi, ma con la colla.
  Ich wollte das Poster nicht mit Nägeln *festnageln*, sondern mit Kleber.
