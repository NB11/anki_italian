Rang: 4820
Wort: meccanico
Wortart: n.m
Wort mit Artikel: il meccanico
Femininum / Plural: i meccanici
IPA: ''
Definition: der Mechaniker, -
Register: ''
Beispielsätze: |-
  Mio zio è un *meccanico* molto esperto e ripara macchine da decenni.
  Mein Onkel ist ein sehr erfahrener *Mechaniker* und repariert seit Jahrzehnten Autos.
  
  Avrei bisogno di un *meccanico* che mi aiuti con il motore della macchina.
  Ich bräuchte einen *Mechaniker*, der mir mit dem Motor des Autos hilft.
  
  Il *meccanico* che ha aggiustato la mia moto lavora in quel garage in periferia.
  Der *Mechaniker*, der mein Motorrad repariert hat, arbeitet in dieser Werkstatt am Stadtrand.
  
  Ho chiamato il *meccanico* perché la mia auto non parte più.
  Ich habe den *Mechaniker* gerufen, weil mein Auto nicht mehr anspringt.
  
  Se il *meccanico* finisce presto, potremo partire entro un’ora.
  Wenn der *Mechaniker* schnell fertig ist, können wir innerhalb einer Stunde losfahren.
