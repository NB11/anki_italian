Rang: 833
Wort: studente
Wortart: n.m
Wort mit Artikel: lo studente
Femininum / Plural: gli studenti
IPA: ''
Definition: der Student, -en
Register: ''
Beispielsätze: |-
  Lo *studente* deve consegnare il compito entro domani.
  Der *Student* muss die Hausaufgabe bis morgen übergeben.
  
  I *studenti* che ho incontrato stamattina discutevano di un progetto interessante.
  Die *Studenten*, die ich heute Morgen getroffen habe, haben über ein interessantes Projekt diskutiert.
  
  Non è impossibile che uno *studente* vinca il premio per il miglior elaborato di inglese.
  Es ist nicht unmöglich, dass ein *Student* den Preis für die beste englische Arbeit gewinnt.
  
  Il giudice ha voluto ascoltare anche il parere dell’ex *studente* che ora è un ricco imprenditore.
  Der Richter wollte auch die Meinung des *ehemaligen Studenten* hören, der jetzt ein reicher Unternehmer ist.
  
  Spero che lo *studente* che mancava ieri sia finalmente presente oggi in classe.
  Ich hoffe, dass der *Student*, der gestern fehlte, heute endlich anwesend ist.
