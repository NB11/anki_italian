Rang: 3992
Wort: bancone
Wortart: n.m
Wort mit Artikel: il bancone
Femininum / Plural: banconi
IPA: ''
Definition: die Theke, -n
Register: ''
Beispielsätze: |-
  Al bar *bancone* ci sono molti clienti che ordinano caffè.
  Am die *Theke* gibt es viele Kunden, die Kaffee bestellen.
  
  Il *bancone* della reception era pieno di documenti da firmare.
  Die *Theke* der Rezeption war voller Dokumente zum Unterschreiben.
  
  Avrei bisogno di un tavolo vicino al *bancone* per vedere chi entra.
  Ich bräuchte einen Tisch in der Nähe der *Theke*, um zu sehen, wer hereinkommt.
  
  Sul *bancone* della cucina c’erano delle mele che stavo per mangiare.
  Auf der *Theke* der Küche lagen Äpfel, die ich gleich essen wollte.
  
  Non toccare nulla sul *bancone*, altrimenti si sporca tutto!
  Fass nichts auf der *Theke* an, sonst wird alles schmutzig!
