Rang: 4170
Wort: oriente
Wortart: n.m
Wort mit Artikel: l'oriente
Femininum / Plural: gli orienti
IPA: ''
Definition: der Osten
Register: ''
Beispielsätze: |-
  Il sole sorge a *oriente* al mattino.
  Die Sonne geht morgens im *Osten* auf.
  
  Non riesco a distinguere tra *oriente* e occidente senza bussola.
  Ich kann *Osten* und Westen ohne Kompass nicht unterscheiden.
  
  Molti turisti visitano templi antichi per ammirare l’alba verso *oriente*.
  Viele Touristen besuchen antike Tempel, um den Sonnenaufgang im *Osten* zu bewundern.
  
  La città di Kyoto è famosa per i suoi templi rivolti a *oriente*.
  Die Stadt Kyoto ist berühmt für ihre nach *Osten* ausgerichteten Tempel.
  
  Se segui la stella polare, camminerai verso *oriente*.
  Wenn du dem Polarstern folgst, wirst du nach *Osten* gehen.
