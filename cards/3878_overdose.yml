Rang: 3878
Wort: overdose
Wortart: n.f
Wort mit Artikel: la overdose
Femininum / Plural: sovradosi
IPA: ''
Definition: die Überdosis, Überdosen
Register: ''
Beispielsätze: |-
  Ha assunto una *sovradosi* di farmaci per errore.
  Er hat aus Versehen eine *Überdosis* an Medikamenten eingenommen.
  
  La *sovradosi* di eroina può essere fatale in pochi minuti.
  Eine *Überdosis* Heroin kann innerhalb weniger Minuten tödlich enden.
  
  Nonostante il divieto, qualcuno ha distribuito una *sovradosi* in discoteca.
  Trotz des Verbots hat jemand eine *Überdosis* in der Diskothek verteilt.
  
  Se avessi assunto una *sovradosi*, ti saresti sentito male immediatamente.
  Wenn du eine *Überdosis* eingenommen hättest, wärst du sofort krank geworden.
  
  La polizia ha trovato tracce di una *sovradosi* in casa dell’accusato.
  Die Polizei fand Spuren einer *Überdosis* in der Wohnung des Angeklagten.
