Rang: 1331
Wort: sprecare
Wortart: v
Wort mit Artikel: sprecare
Femininum / Plural: ''
IPA: ''
Definition: verschwendet, vergeudet, z. B. Zeit, Geld
Register: ''
Beispielsätze: |-
  Non *spreca* mai tempo prezioso lavorando senza una maniera efficace.
  Er *verschwendet* nie wertvolle Zeit damit, ohne eine wirksame Art und Weise zu arbeiten.
  
  Se *sprechi* così tanta energia, presto ti sentirai stanco.
  Wenn du so viel Energie *vergeudest*, wirst du dich bald erschöpft fühlen.
  
  Lui ha *sprecato* un’occasione straordinaria per partecipare alla conferenza.
  Er hat eine *außergewöhnliche* Chance verspielt, um an der Konferenz teilzunehmen.
  
  Non è giusto che la società *sprechi* risorse naturali senza rintracciare alternative.
  Es ist nicht fair, dass die Gesellschaft natürliche Ressourcen *verschwendet*, ohne nach Alternativen zu suchen.
  
  Penso che *sprecherebbe* tempo e denaro se cercasse di rifare tutto da solo.
  Ich denke, er würde Zeit und Geld *verschwenden*, wenn er versuchen würde, alles allein erneut zu machen.
