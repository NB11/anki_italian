Rang: 2035
Wort: sciogliere
Wortart: v
Wort mit Artikel: sciogliere
Femininum / Plural: ''
IPA: ''
Definition: schmelzen, lösen, befreien, auflösen
Register: ''
Beispielsätze: |-
  Alcuni scienziati stanno cercando di *sciogliere* il ghiaccio artico per studiare i virus intrappolati al suo interno.
  Einige Wissenschaftler versuchen, das arktische Eis zu *schmelzen*, um die dort eingeschlossenen Viren zu untersuchen.
  
  Non *sciogliere* mai il cioccolato al microonde, altrimenti brucia!
  *Schmelze* die Schokolade niemals in der Mikrowelle, sonst verbrennt sie!
  
  Il giudice ha ordinato di *sciogliere* il vincolo contrattuale tra le due società.
  Der Richter hat angeordnet, die vertragliche Bindung zwischen den beiden Unternehmen *aufzuheben*.
  
  Se non scioglierai i nodi nella corda, non potremo continuare il nostro cammino.
  Wenn du die Knoten im Seil nicht *löst*, können wir unseren Weg nicht fortsetzen.
  
  Mi hanno detto che il calore può *sciogliere* anche i sentimenti più ostinati.
  Man hat mir erzählt, dass selbst die hartnäckigsten Gefühle durch Wärme *schmelzen* können.
