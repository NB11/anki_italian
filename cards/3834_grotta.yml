Rang: 3834
Wort: grotta
Wortart: n.f
Wort mit Artikel: la grotta
Femininum / Plural: grotte
IPA: ''
Definition: die Höhle, -n
Register: ''
Beispielsätze: |-
  Gli speleologi hanno scoperto una nuova *grotta* nelle Alpi che potrebbe contenere antichissime pitture rupestri.
  Die Höhlenforscher haben eine neue *Höhle* in den Alpen entdeckt, die uralte Höhlenmalereien enthalten könnte.
  
  Il tesoro era nascosto in una *grotta* inaccessibile, protetto da pesanti massi e da un labirinto di cunicoli.
  Der Schatz war in einer *Höhle* versteckt, die unzugänglich war und von schweren Felsen sowie einem Labyrinth von Gängen geschützt wurde.
  
  Se non avessimo seguito le indicazioni del vecchio pastore, avremmo perso l'ingresso della *grotta*.
  Wenn wir den *Hinweisen* des alten Hirten nicht gefolgt wären, hätten wir den Höhleneingang verpasst.
  
  L’eremita preferiva vivere nella solitudine della *grotta* piuttosto che in mezzo alla folla del villaggio.
  Der Einsiedler zog es vor, in der Einsamkeit der *Höhle* zu leben, statt in der Menge des Dorfes.
  
  Dicono che nella *grotta* vicino al mare si nascondano dei lingotti d'oro, ma nessuno è mai riuscito a trovarli.
  Man sagt, in der *Höhle* nahe dem Meer würden Goldbarren versteckt, doch es ist noch niemandem gelungen, sie zu finden.
