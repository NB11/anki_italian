Rang: 1095
Wort: accanto
Wortart: adv
Wort mit Artikel: accanto
Femininum / Plural: ''
IPA: ''
Definition: neben, daneben
Register: ''
Beispielsätze: |-
  Il cane si è sdraiato *accanto* a me mentre leggevo.
  Der Hund legte sich *neben* mich, während ich las.
  
  Se guardi *accanto* alla porta, trovi la chiave.
  Wenn du *daneben* zur Tür schaust, findest du den Schlüssel.
  
  Ha deciso di sistemare la libreria *accanto* alla finestra, perché lì c'è più luce.
  Er beschloss, das Bücherregal *neben* das Fenster zu stellen, wo mehr Licht ist.
  
  Dovresti controllare anche *accanto* all'armadio, non si sa mai cosa può nascondersi.
  Du solltest auch *neben* den Schrank schauen, man weiß ja nie, was sich dort versteckt.
  
  Mentre aspettavamo sotto la pioggia, un *accanto* a noi ha acceso la radio per distrarsi.
  Während wir im Regen warteten, schaltete jemand *neben* uns das Radio ein, um sich abzulenken.
