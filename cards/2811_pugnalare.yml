Rang: 2811
Wort: pugnalare
Wortart: vt
Wort mit Artikel: pugnalare
Femininum / Plural: ''
IPA: ''
Definition: mit einem Messer erstechen, ermorden
Register: ''
Beispielsätze: |-
  L’uomo ha *pugnalato* l’avversario durante la lite.
  Der Mann hat den Gegner während des Streits *erstochen*.
  
  Se avessi un coltello, potrei *pugnalare* qualcuno in un attimo.
  Wenn ich ein Messer hätte, könnte ich jemanden in einem Moment *erstechen*.
  
  Il medico ha detto che la ferita è stata causata da un oggetto *pugnalato* circolare.
  Der Arzt sagte, die Wunde sei von einem *eingestochenen* runden Gegenstand verursacht worden.
  
  Cercate di non *pugnalare* nessuno con parole taglienti, vero?
  Ihr versucht doch wohl, niemanden mit scharfen Worten zu *erstechen*, oder?
  
  La polizia sospetta che qualcuno abbia voluto *pugnalare* il sindaco durante il discorso.
  Die Polizei vermutet, jemand habe den Bürgermeister während der Rede *erstechen wollen*.
Audio: ''
Notiz: ''
Dispersion: ''
