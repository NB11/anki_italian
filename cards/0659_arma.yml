Rang: 659
Wort: arma
Wortart: n.f
Wort mit Artikel: l'arma
Femininum / Plural: armi
IPA: ''
Definition: die Waffe, -n
Register: ''
Beispielsätze: |-
  L'*arma* che hai trovato è molto pericolosa e dovresti chiamare la polizia immediatamente.
  Die *Waffe*, die du gefunden hast, ist sehr gefährlich und du solltest die Polizei sofort anrufen.
  
  In quella zona del negozio si trovano varie *armi* antiche, che sono molto interessanti per i collezionisti.
  In dieser Zone des Geschäfts befinden sich verschiedene antike *Waffen*, die für Sammler sehr interessant sind.
  
  Se continui a spingere così forte, dovrai coprire la ferita dell'*arma*, perché potrebbe infettarsi.
  Wenn du weiterhin so stark drängst, musst du die Wunde der *Waffe* abdecken, denn sie könnte sich entzünden.
  
  Nonostante avessimo tentato di evitare ogni *arma* durante il trasferimento, abbiamo trovato un coltello in mezzo ai bagagli.
  Obwohl wir versucht hatten, während des Umzugs jede *Waffe* zu vermeiden, haben wir ein Messer inmitten des Gepäcks gefunden.
  
  Il detective ha dimostrato che l'*arma* del delitto non era stata abbandonata nel luogo del crimine, ma trasportata altrove.
  Der Detektiv hat bewiesen, dass die *Waffe* des Verbrechens nicht am Tatort zurückgelassen, sondern woanders hingebracht worden war.
