Rang: 1817
Wort: consegna
Wortart: n.f
Wort mit Artikel: la consegna
Femininum / Plural: consegne
IPA: ''
Definition: die Lieferung, -en
Register: ''
Beispielsätze: |-
  La *consegna* del pacco è prevista per domani pomeriggio.
  Die *Lieferung* des Pakets ist für morgen Nachmittag vorgesehen.
  
  Non posso uscire: aspetto la *consegna* di un documento importante.
  Ich kann nicht rausgehen: Ich warte auf die *Lieferung* eines wichtigen Dokuments.
  
  Dopo la *consegna*, controlla subito che tutto sia in ordine.
  Nach der *Lieferung* prüfe sofort, ob alles in Ordnung ist.
  
  Se la *consegna* non arriva entro venerdì, fammi sapere.
  Falls die *Lieferung* bis Freitag nicht ankommt, gib mir Bescheid.
  
  La *consegna* del regalo è stata un gesto molto premuroso.
  Die *Lieferung* des Geschenks war eine sehr fürsorgliche Geste.
