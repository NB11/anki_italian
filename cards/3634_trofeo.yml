Rang: 3634
Wort: trofeo
Wortart: n.m
Wort mit Artikel: il trofeo
Femininum / Plural: trofei
IPA: ''
Definition: der Pokal, -e
Register: ''
Beispielsätze: |-
  L’allenatore ha ricevuto un *trofeo* molto pesante dopo la vittoria.
  Der Trainer hat einen *Pokal* erhalten, der sehr schwer war.
  
  Questo *trofeo* antico risale al 1920 e ha un valore inestimabile per la nostra famiglia.
  Dieser *Pokal* stammt aus dem Jahr 1920 und ist für unsere Familie unermesslich wertvoll.
  
  Nella vetrina del museo c’è un *trofeo* vinto da mio nonno molti anni fa.
  Im Schaukasten des Museums steht ein *Pokal*, den mein Großvater vor vielen Jahren gewonnen hat.
  
  Se vincerai la gara, riceverai un bellissimo *trofeo* in legno di quercia.
  Wenn du das Rennen gewinnst, erhältst du einen wunderschönen *Pokal* aus Eichenholz.
  
  Nonostante la loro sconfitta, hanno comunque meritato un *trofeo* di consolazione per lo spirito sportivo.
  Trotz ihrer Niederlage haben sie trotzdem einen *Pokal* für den sportlichen Geist verdient.
