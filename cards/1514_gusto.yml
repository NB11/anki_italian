Rang: 1514
Wort: gusto
Wortart: n.m
Wort mit Artikel: il gusto
Femininum / Plural: i gusti
IPA: ''
Definition: der Geschmack, die Vorliebe
Register: ''
Beispielsätze: |-
  Non mi piace il *gusto* di questo piatto perché è troppo piccante.
  Der *Geschmack* dieses Gerichts gefällt mir nicht, weil es zu scharf ist.
  
  Con il *gusto* della cioccolata fondente non ci sono paragoni.
  Mit dem *Geschmack* der Zartbitterschokolade gibt es keinen Vergleich.
  
  Hai scelto questo vino solo per il *gusto* o anche per il prezzo?
  Hast du diesen Wein nur wegen des *Geschmacks* oder auch wegen des Preises gewählt?
  
  Mi dispiace, ma non ho il *gusto* per il cioccolato che mangi di solito.
  Es tut mir leid, aber ich habe *keine Lust* auf die Schokolade, die du normalerweise isst.
  
  Il *gusto* di ogni persona è diverso, quindi non giudicare gli altri senza capire.
  Der *Geschmack* jeder Person ist anders, urteile also nicht über andere, ohne sie zu verstehen.
