Rang: 804
Wort: figliolo
Wortart: n.m
Wort mit Artikel: il figliolo
Femininum / Plural: figlioli
IPA: ''
Definition: der Sohn, -söhne
Register: ''
Beispielsätze: |-
  Mio *figliolo* ha sette anni e frequenta la classe elementare.
  Mein *Sohn* ist sieben Jahre alt und besucht die Grundschulklasse.
  
  Il *figliolo* del sergente Henry è stato molto calmo durante la discussione.
  Der *Sohn* des Unteroffiziers Henry blieb während der Diskussion sehr gelassen.
  
  Se non ti affretti, *figliolo*, perderai il corso di matematica!
  Wenn du dich nicht beeilst, *Sohn*, verpasst du den Mathekurs!
  
  Il *figliolo* del giudice ha superato l’operazione senza pena.
  Der *Sohn* des Richters hat die Operation ohne große Schmerzen überstanden.
  
  Dicono che il *figliolo* del nonno sia partito per un viaggio in Inghilterra.
  Man erzählt, der *Sohn* des Großvaters sei zu einer Reise nach England aufgebrochen.
