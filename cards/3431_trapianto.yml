Beispielsätze: |-
  Il *trapianto* di organi è un intervento medico molto delicato.
  Die *Transplantation* von Organen ist ein sehr heikler medizinischer Eingriff.
  
  Dopo il *trapianto* di cuore, deve seguire una terapia immunosoppressiva per tutta la vita.
  Nach der *Transplantation* des Herzens muss er lebenslang eine immunsuppressive Therapie erhalten.
  
  Mi hanno detto che il *trapianto* di fegato ha un alto tasso di successo in questa clinica.
  Man hat mir gesagt, dass die *Transplantation* der Leber in dieser Klinik eine hohe Erfolgsquote hat.
  
  Se il *trapianto* fallisce, ci sono sempre nuove possibilità da considerare.
  Wenn die *Transplantation* fehlschlägt, gibt es immer noch neue Möglichkeiten zu prüfen.
  
  Il medico ha parlato di un *trapianto* di midollo osseo come unica soluzione.
  Der Arzt hat von einer *Transplantation* des Knochenmarks als einziger Lösung gesprochen.
