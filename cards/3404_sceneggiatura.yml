Rang: 3404
Wort: sceneggiatura
Wortart: n.f
Wort mit Artikel: la sceneggiatura
Femininum / Plural: sceneggiature
IPA: ''
Definition: das Drehbuch, -e
Register: ''
Beispielsätze: |-
  Ha scritto una *sceneggiatura* per un film che uscirà l’anno prossimo.
  Er hat ein *Drehbuch* für einen Film geschrieben, der nächstes Jahr erscheinen wird.
  
  La *sceneggiatura* che hai letto ieri sera è molto originale, peccato che sia incompleta.
  Das *Drehbuch*, das du gestern Abend gelesen hast, ist sehr originell, schade, dass es unvollständig ist.
  
  Sai chi ha firmato la *sceneggiatura* di quel famoso festival estivo?
  Weißt du, wer das *Drehbuch* jenes berühmten Sommerfestivals unterzeichnet hat?
  
  Se vuoi diventare regista, devi imparare a scrivere una *sceneggiatura* convincente.
  Wenn du Regisseur werden willst, musst du lernen, ein überzeugendes *Drehbuch* zu schreiben.
  
  Nella *sceneggiatura* ci sono diversi errori di continuità che vanno corretti prima delle riprese.
  In dem *Drehbuch* gibt es mehrere Kontinuitätsfehler, die vor den Dreharbeiten korrigiert werden müssen.
