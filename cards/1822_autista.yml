Rang: 1822
Wort: autista
Wortart: n.m
Wort mit Artikel: l'autista
Femininum / Plural: gli autisti
IPA: ''
Definition: der Fahrer, -
Register: ''
Beispielsätze: |-
  L'*autista* aspetta i passeggeri davanti alla stazione.
  Der *Fahrer* wartet auf die Fahrgäste vor dem Bahnhof.
  
  L'*autista* che ci ha portati a Roma era molto gentile.
  Der *Fahrer*, der uns nach Rom gefahren hat, war sehr freundlich.
  
  Ho chiamato un *autista* privato per la serata.
  Ich habe einen privaten *Fahrer* für den Abend gerufen.
  
  Se non ci fosse l'*autista*, dovremmo prendere il treno.
  Wenn es den *Fahrer* nicht gäbe, müssten wir den Zug nehmen.
  
  L'*autista* ha perso l'orientamento a causa della tempesta.
  Der *Fahrer* hat sich wegen des Sturms verirrt.
