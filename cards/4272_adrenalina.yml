Rang: 4272
Wort: adrenalina
Wortart: n.f
Wort mit Artikel: l'adrenalina
Femininum / Plural: adrenaline
IPA: ''
Definition: das Adrenalin, -e
Register: ''
Beispielsätze: |-
  Quando ho visto l'orso, ho sentito un'ondata di *adrenalina* attraversarmi il corpo.
  Als ich den Bären sah, spürte ich eine Welle *Adrenalin*, die meinen Körper durchströmte.
  
  Lo sport estremo mi dà sempre tanta *adrenalina* da non volerne più smettere.
  Extremsport gibt mir immer so viel *Adrenalin*, dass ich nicht mehr aufhören möchte.
  
  La polizia sospetta che l'imputato avesse in corpo una dose di *adrenalina* artificiale durante il delitto.
  Die Polizei vermutet, dass der Angeklagte während der Tat eine künstliche *Adrenalin*-Dosis im Körper hatte.
  
  Che emozione provare la prossima volta che proverai l'*adrenalina* di un lancio con il paracadute!
  Wie aufregend es sein wird, beim nächsten Mal das *Adrenalin* eines Fallschirmsprungs zu spüren!
  
  Nonostante l'*adrenalina* del momento, riuscì a mantenere la calma e a chiamare i soccorsi.
  Trotz des *Adrenalins* in diesem Moment blieb er ruhig und rief die Rettungskräfte.
