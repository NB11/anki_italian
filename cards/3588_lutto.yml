Rang: 3588
Wort: lutto
Wortart: n.m
Wort mit Artikel: il lutto
Femininum / Plural: lutti
IPA: ''
Definition: die Trauer, Trauerfall
Register: ''
Beispielsätze: |-
  Dopo la morte del padre, la famiglia ha vissuto un periodo di *lutto* molto profondo.
  Nach dem Tod des Vaters durchlebte die Familie eine Phase tiefer *Trauer*.
  
  In questo paese, quando c'è un *lutto* nella comunità, tutti si riuniscono per sostenere la famiglia colpita.
  In diesem Ort versammelt man sich bei einem *Trauerfall* in der Gemeinde, um die betroffene Familie zu unterstützen.
  
  Lei non ha ancora superato il *lutto* per la perdita del suo cane, che era il suo compagno di tutta una vita.
  Sie hat den *Trauerfall* um den Verlust ihres Hundes, der ihr Lebensgefährte war, noch nicht überwunden.
  
  Il sindaco ha espresso le sue condoglianze alla famiglia e ha ricordato che il *lutto* deve essere rispettato in silenzio.
  Der Bürgermeister drückte sein Beileid der Familie aus und erinnerte daran, dass der *Trauerfall* respektvoll in Stille begangen werden muss.
  
  Anche se il *lutto* sembra insopportabile, con il tempo diventa più facile affrontare la perdita.
  Auch wenn der *Trauerfall* unerträglich scheint, wird es mit der Zeit leichter, den Verlust zu bewältigen.
