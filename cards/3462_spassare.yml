Rang: 3462
Wort: spassare
Wortart: v
Wort mit Artikel: spassare
Femininum / Plural: ''
IPA: ''
Definition: ausgelassen sein, Spaß haben, sich vergnügen
Register: ''
Beispielsätze: |-
  In *spassiamo* sempre quando siamo con i nostri amici al lago.
  Wir *amüsieren* uns immer, wenn wir mit unseren Freunden am See sind.
  
  Se non *spasseremo* abbastanza in vacanza, torneremo a lavoro stanco.
  Wenn wir uns im Urlaub nicht *ausgiebig vergnügen*, kommen wir erschöpft zur Arbeit zurück.
  
  Mi dispiace, ma non *spasso* quando devo lavorare fino a tardi.
  Es tut mir leid, aber ich *habe keinen Spaß*, wenn ich bis spät arbeiten muss.
  
  Vorrei che tu *spassassi* di più invece di preoccuparti sempre.
  Ich wünschte, du würdest dich *mehr amüsieren*, statt dich ständig Sorgen zu machen.
  
  Nonostante la nebbia, ci *spassammo* moltissimo durante quella gita in montagna.
  Trotz des Nebels *hatten* wir viel Spaß bei dieser Bergwanderung.
