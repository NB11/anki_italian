Rang: 1871
Wort: ammirare
Wortart: vt
Wort mit Artikel: ammirare
Femininum / Plural: ''
IPA: ''
Definition: bewundern
Register: ''
Beispielsätze: |-
  Non riesco a *ammirare* abbastanza la tua abilità nel disegnare.
  Ich kann deine *Fähigkeit*, zu zeichnen, gar nicht genug bewundern.
  
  Mia madre *ammira* moltissimo la poesia di Montale, nonostante la trovi difficile.
  Meine Mutter *bewundert* die Gedichte von Montale überaus, obwohl sie sie schwer findet.
  
  Se vieni al concerto, potrai *ammirare* dal vivo il cantante che hai sempre ascoltato alla radio.
  Wenn du zum Konzert kommst, wirst du den Sänger, den du immer im Radio *hörst*, live bewundern können.
  
  Dice che *ammirava* soprattutto la sua pazienza, anche quando tutti gli altri volevano cedere.
  Er sagt, dass er vor allem ihre *Geduld* bewunderte, selbst als alle anderen nachgeben wollten.
  
  Nel frattempo in cui aspetto l’autobus, *ammiro* i dettagli delle statue lungo la strada.
  Während ich auf den Bus warte, *bewundere* ich die Details der Statuen entlang der Straße.
