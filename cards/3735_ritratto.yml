Rang: 3735
Wort: ritratto
Wortart: n.m
Wort mit Artikel: il ritratto
Femininum / Plural: ritratti
IPA: ''
Definition: das Porträt, -s
Register: ''
Beispielsätze: |-
  Nel museo c'è un *ritratto* molto antico di un famoso pittore fiorentino.
  Im Museum gibt es ein sehr altes *Porträt* eines berühmten florentinischen Malers.
  
  Non appena ho visto il *ritratto*, ho capito che si trattava di mia nonna da giovane.
  Sobald ich das *Porträt* sah, wusste ich, dass es meine Großmutter als junge Frau war.
  
  Se avessi tempo, vorrei dipingere un *ritratto* della mia famiglia per regalarglielo.
  Wenn ich Zeit hätte, würde ich ein *Porträt* meiner Familie malen, um es ihr zu schenken.
  
  I critici d'arte affermano che il *ritratto* di Leonardo è uno dei più belli mai realizzati.
  Die Kunstkritiker behaupten, dass das *Porträt* von Leonardo eines der schönsten ist, das jemals geschaffen wurde.
  
  Ho regalato un *ritratto* dipinto a mano alla mia fidanzata per il nostro anniversario.
  Ich habe meiner Freundin zum Jahrestag ein handgemaltes *Porträt* geschenkt.
