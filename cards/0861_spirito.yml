Rang: 861
Wort: spirito
Wortart: n.m
Wort mit Artikel: lo spirito
Femininum / Plural: gli spiriti
IPA: ''
Definition: der Geist, -er
Register: ''
Beispielsätze: |-
  Non credere allo *spirito*: è solo superstizione!
  Glaube nicht dem *Geist*: das ist nur Aberglaube!
  
  Lo *spirito* della libertà ha guidato la nostra società nel ventesimo secolo.
  Der *Geist* der Freiheit prägte unsere Gesellschaft im zwanzigsten Jahrhundert.
  
  Dicono che questo vino abbia lo *spirito* di un tempo passato.
  Man sagt, dieser *Wein* habe den Geist einer vergangenen Zeit.
  
  Dopo anni di ricerca, abbiamo finalmente ritrovato lo *spirito* originale di quel progetto.
  Nach Jahren der Forschung haben wir schließlich den ursprünglichen *Geist* dieses Projekts wiedergefunden.
  
  È importante che tu tenga vivo lo *spirito* creativo nelle tue attività quotidiane.
  Es ist wichtig, dass du den kreativen *Geist* in deinen täglichen Aktivitäten am Leben hältst.
