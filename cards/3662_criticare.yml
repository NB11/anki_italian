Rang: 3662
Wort: criticare
Wortart: vt
Wort mit Artikel: criticare
Femininum / Plural: ''
IPA: ''
Definition: kritisieren, bemängeln
Register: ''
Beispielsätze: |-
  Non *critichi* mai le decisioni del tuo supervisore senza prima riflettere.
  Du solltest die Entscheidungen deines *Vorgesetzten* nicht einfach kritisieren, ohne vorher nachzudenken.
  
  I giornali hanno *criticato* aspramente la nuova legge proposta dal governo.
  Die Zeitungen haben das neue Gesetz scharf *kritisiert*, das die Regierung vorgeschlagen hatte.
  
  È meglio che tu *critichi* gli errori degli altri solo se hai prove concrete.
  Es wäre besser, wenn du die Fehler anderer nur *kritisierst*, wenn du konkrete Beweise hast.
  
  Se avessi *criticato* meno il tuo compagno di squadra, forse vincereste la partita!
  Wenn du deinen Teamkollegen weniger *kritisiert* hättest, vielleicht hättet ihr das Spiel gewonnen!
  
  I critici *criticano* spesso le opere d’arte contemporanea senza capirne il valore.
  Kritiker *kritisieren* häufig zeitgenössische Kunstwerke, ohne ihren Wert zu begreifen.
