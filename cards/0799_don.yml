Rang: 799
Wort: don
Wortart: n.m
Wort mit Artikel: il don
Femininum / Plural: i don
IPA: ''
Definition: der Herr, -en (kirchlicher Titel)
Register: ''
Beispielsätze: |-
  Il *don* della chiesa locale è molto rispettato nella comunità.
  Der *Herrn* der örtlichen Kirche wird in der Gemeinde sehr respektiert.
  
  Ho incontrato il *don* mentre tornavo da una passeggiata lungo il mare.
  Ich bin dem *Herrn* begegnet, als ich von einem Spaziergang am Meer zurückkehrte.
  
  Nonostante la sua età, il *don* riesce a sopportare tutte le difficoltà con calma.
  Trotz seines *Alters* gelingt es dem Herrn, alle Schwierigkeiten mit Ruhe zu ertragen.
  
  Se il *don* non avesse consegnato quei documenti al governo, forse non avremmo saputo la verità.
  Wenn der *Herr* jene Unterlagen nicht an die Regierung übergeben hätte, hätten wir die Wahrheit vielleicht nicht erfahren.
  
  Mi ha detto il *don* che la caccia ai mostri sarebbe finita sicuramente bene, anche se era impossibile.
  Der *Herr* hat mir gesagt, dass die Jagd auf die Ungeheuer sicherlich gut enden würde, auch wenn es unmöglich schien.
