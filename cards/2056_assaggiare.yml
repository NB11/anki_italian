Rang: 2056
Wort: assaggiare
Wortart: vt
Wort mit Artikel: assaggiare
Femininum / Plural: ''
IPA: ''
Definition: kosten, probieren
Register: ''
Beispielsätze: |-
  Voglio *assaggiare* questa nuova ricetta che ho trovato online.
  Ich möchte diese neue Rezeptur *probieren*, die ich online gefunden habe.
  
  Non appena ho *assaggiato* il vino, ho capito che era di qualità scadente.
  Sobald ich den Wein *gekostet* hatte, merkte ich, dass er von schlechter Qualität war.
  
  Se avessi più tempo, ti inviterei a *assaggiare* i piatti tipici della nostra regione.
  Wenn ich mehr Zeit hätte, würde ich dich einladen, die typischen Gerichte unserer Region zu *kosten*.
  
  È raro che un scienziato riesca a *assaggiare* il frutto del suo lavoro prima che venga pubblicato.
  Es ist selten, dass ein Wissenschaftler die Früchte seiner Arbeit *kosten* kann, bevor sie veröffentlicht wird.
  
  Avresti dovuto *assaggiare* il dolce prima di giudicarlo, invece hai detto che era troppo dolce!
  Du hättest den Kuchen *kosten* sollen, bevor du ein Urteil gefällt hast – stattdessen sagtest du, er sei zu süß!
