Rang: 1989
Wort: onorare
Wortart: v
Wort mit Artikel: onorare
Femininum / Plural: ''
IPA: ''
Definition: ehren, würdigen
Register: ''
Beispielsätze: |-
  Il sindaco vuole *onorare* i vincitori della gara cittadina con una medaglia d'oro.
  Der Bürgermeister möchte die Gewinner des Stadtwettbewerbs mit einer Goldmedaille *ehren*.
  
  Speriamo che questa cerimonia serva a *onorare* la memoria di quelli che hanno lottato per la libertà.
  Wir hoffen, dass diese Zeremonie dazu dient, der Erinnerung an diejenigen, die für die Freiheit gekämpft haben, *zu ehren*.
  
  Non basta promettere di *onorare* la tradizione, bisogna viverla ogni giorno.
  Es reicht nicht, zu versprechen, die Tradition zu *ehren* – man muss sie jeden Tag leben.
  
  Se avessi saputo che volevate *onorare* anche me, avrei preparato un discorso più lungo!
  Hätte ich gewusst, dass ihr auch mich *ehren* wolltet, hätte ich eine längere Rede vorbereitet!
  
  Gli antichi romani usavano *onorare* i loro dei con sacrifici e preghiere.
  Die alten Römer pflegten ihre Götter durch Opfer und *Gebete zu ehren*.
