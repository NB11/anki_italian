Beispielsätze: |-
  Ieri ho visto un documentario che *filmava* la vita degli orsi polari nell’Artico.
  Gestern habe ich eine Dokumentation gesehen, die das Leben der Eisbären in der Arktis *filmte*.
  
  Se avessi una telecamera, *filmerei* il matrimonio di mia sorella domani.
  Wenn ich eine Kamera hätte, würde ich die Hochzeit meiner Schwester morgen *filmen*.
  
  Non è giusto che abbiano *filmato* la scena senza il mio permesso!
  Es ist nicht fair, dass sie die Szene ohne meine Erlaubnis *gefilmt* haben!
  
  Appena arriveranno gli attori, inizieremo a *filmare* la scena principale del film.
  Sobald die Schauspieler ankommen, werden wir die Hauptszene des Films *filmen* beginnen.
  
  Avevo tanto paura che qualcuno potesse *filmare* il nostro bacio segreto nel parco.
  Ich hatte so viel Angst, dass jemand unseren heimlichen Kuss im Park *filmen* könnte.
