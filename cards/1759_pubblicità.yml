  Non sopporto quando la *pubblicità* interrompe un film al momento più avvincente.
  Ich ertrage es nicht, wenn die *Werbung* einen Film in dem spannendsten Moment unterbricht.
  
  La *pubblicità* sui social media è diventata indispensabile per ogni attività commerciale.
