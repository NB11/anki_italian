Rang: 2711
Wort: vistare
Wortart: vt
Wort mit Artikel: vistare
Femininum / Plural: ''
IPA: ''
Definition: besuchen, bereisen, aufsuchen
Register: ''
Beispielsätze: |-
  Spero che tu possa *visitare* questo bellissimo museo durante il tuo viaggio a Firenze.
  Ich hoffe, dass du dieses wundervolle Museum während deiner Reise nach Florenz *besuchen* kannst.
  
  Se non hai ancora *visitato* la nuova mostra al Palazzo delle Esposizioni, dovresti farlo al più presto.
  Wenn du die neue Ausstellung im Palazzo delle Esposizioni noch nicht *besucht* hast, solltest du das bald tun.
  
  Nonostante la pioggia, abbiamo deciso di *visitare* le rovine del Foro Romano per via della sua importanza storica.
  Trotz des Regens haben wir beschlossen, die Ruinen des Forum Romanum wegen ihrer historischen Bedeutung zu *besuchen*.
  
  Mi hanno detto che molti turisti stranieri vogliono *visitare* la città di Venezia prima che venga sommersa dall'acqua alta.
  Man hat mir gesagt, dass viele ausländische Touristen die Stadt Venedig *besuchen* wollen, bevor sie vom Hochwasser überflutet wird.
  
  Prima di partire, ho voluto *visitare* tutti i luoghi che mia nonna mi aveva descritto nelle sue lettere.
  Bevor ich abgereist bin, wollte ich alle Orte *besuchen*, die meine Großmutter in ihren Briefen beschrieben hatte.
