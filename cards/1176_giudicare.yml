Rang: 1176
Wort: giudicare
Wortart: vt
Wort mit Artikel: giudicare
Femininum / Plural: ''
IPA: ''
Definition: beurteilen, bewerten, verurteilen
Register: ''
Beispielsätze: |-
  Secondo te, chi ha ragione? Non possiamo *giudicare* così in fretta.
  Wer hat deiner Meinung nach recht? Wir können nicht so schnell *urteilen*.
  
  Il giudice deve *giudicare* con imparzialità, anche se è difficile.
  Der Richter muss *urteilen* unparteiisch, auch wenn es schwerfällt.
  
  Se avessi più dati, forse saprei meglio come *giudicare* questa situazione.
  Hätte ich mehr *Angaben*, wüsste ich vielleicht besser, wie ich diese Situation beurteilen sollte.
  
  Non giudicare un libro dalla copertina, ma *giudicare* i suoi contenuti è fondamentale.
  Be *urteile* ein Buch nicht nach seinem Einband, aber bewerten seinen Inhalt ist entscheidend.
  
  Anche se ti delude, non dovresti *giudicare* troppo in fretta le sue azioni.
  Auch wenn er dich *enttäuscht*, solltest du seine Taten nicht zu schnell verurteilen.
