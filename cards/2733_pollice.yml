Rang: 2733
Wort: pollice
Wortart: n.m
Wort mit Artikel: il pollice
Femininum / Plural: pollici
IPA: ''
Definition: der Daumen, -
Register: ''
Beispielsätze: |-
  Mi sono ferito il *pollice* mentre tagliavo la legna.
  Ich habe mir den *Daumen* verletzt, während ich Holz gespalten habe.
  
  Non appena ho visto la statua, ho capito che il suo *pollice* era rotto.
  Sobald ich die Statue gesehen habe, ist mir aufgefallen, dass ihr *Daumen* abgebrochen war.
  
  Se non avessi *pollice* opposto, non sarei riuscito a fermare la porta.
  Hätte ich nicht den *Daumen* dagegengehalten, hätte ich die Tür nicht aufhalten können.
  
  Si dice che chi ha un *pollice* verde coltiva piante magnifiche.
  Man sagt, wer einen grünen *Daumen* hat, zieht wundervolle Pflanzen.
  
  Avrai bisogno del *pollice* per premere quel pulsante difficile da raggiungere.
  Du wirst den *Daumen* brauchen, um diesen schwer erreichbaren Knopf zu drücken.
