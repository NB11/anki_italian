Definition: terrorisieren, einschüchtern
Register: ''
Beispielsätze: |-
  Il *terrorizza* la cittadinanza con le sue minacce costanti.
  Er *terrorisiert* die Bevölkerung mit seinen ständigen Drohungen.
  
  Dopo che lo hanno licenziato, ha iniziato a *terrorizzare* i suoi ex colleghi al bar.
  Nachdem sie ihn entlassen hatten, begann er, seine ehemaligen Kollegen in der Bar zu *terrorisieren*.
  
  La polizia sospetta che qualcuno stia cercando di *terrorizzare* la comunità con messaggi anonimi.
  Die Polizei vermutet, dass jemand versucht, die Gemeinschaft mit anonyme Nachrichten zu *terrorisieren*.
  
  Se continui a *terrorizzare* tuo fratello, non avrai più amici.
  Wenn du deinen Bruder weiter *terrorisierst*, wirst du keine Freunde mehr haben.
  
  Anche se non volevo, mi sono lasciato *terrorizzare* dalle sue parole allarmistiche.
  Auch wenn ich es nicht wollte, habe ich mich von seinen alarmierenden Worten *terrorisieren* lassen.
