Rang: 2916
Wort: individuo
Wortart: n.m
Wort mit Artikel: l'individuo
Femininum / Plural: gli individui
IPA: ''
Definition: das Individuum, -dui
Register: ''
Beispielsätze: |-
  L'*individuo* che hai incontrato è uno dei sospettati nel caso della truffa al casinò.
  Das *Individuum*, das du getroffen hast, ist einer der Verdächtigen im Fall des Betrugs im Kasino.
  
  Non è facile capire veramente un *individuo* se non si conosce il suo movente.
  Es ist nicht einfach, ein *Individuum* wirklich zu verstehen, wenn man seinen Beweggrund nicht kennt.
  
  In questa città ci sono molti *individui* che vivono ai margini della società.
  In dieser Stadt gibt es viele *Individuen*, die am Rande der Gesellschaft leben.
  
  Secondo l’*individuo* che ha chiamato la polizia, il furto sarebbe avvenuto intorno alle venti.
  Laut dem *Individuum*, das die Polizei gerufen hat, soll der Diebstahl gegen zwanzig Uhr passiert sein.
  
  Gli psicologi studiano il comportamento dell’*individuo* per comprendere meglio la psiche umana.
  Psychologen untersuchen das Verhalten des *Individuums*, um die menschliche Psyche besser zu verstehen.
