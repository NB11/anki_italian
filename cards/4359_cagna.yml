Rang: 4359
Wort: cagna
Wortart: n.f
Wort mit Artikel: la cagna
Femininum / Plural: cagne
IPA: ''
Definition: die Hündin, -nen
Register: ''
Beispielsätze: |-
  La *cagna* del vicino ha appena avuto dei cuccioli.
  Die *Hündin* des Nachbarn hat gerade Junge bekommen.
  
  Non mi fido di quella *cagna*, sembra sempre arrabbiata.
  Ich vertraue dieser *Hündin* nicht, sie wirkt immer wütend.
  
  Se avessi un cane, vorrei una *cagna* molto socievole.
  Wenn ich einen Hund hätte, würde ich mir eine sehr *Hündin* zulegen.
  
  La polizia ha trovato tracce della *cagna* scomparsa vicino al parco.
  Die Polizei hat Spuren der verschwundenen *Hündin* in der Nähe des Parks gefunden.
  
  Mia nonna ha sempre avuto fiducia nella *cagna* del contadino, che le teneva compagnia.
  Meine Großmutter hatte immer Vertrauen in die *Hündin* des Bauern, die ihr Gesellschaft leistete.
