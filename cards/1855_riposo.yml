Rang: 1855
Wort: riposo
Wortart: n.m
Wort mit Artikel: il riposo
Femininum / Plural: riposi
IPA: ''
Definition: die Erholung, die Ruhe
Register: ''
Beispielsätze: |-
  Dopo una lunga giornata di lavoro, ho bisogno di un po' di *riposo* per ricaricare le energie.
  Nach einem langen Arbeitstag brauche ich etwas *Erholung*, um meine Energie wieder aufzuladen.
  
  Nonostante la stanchezza, non riuscì a trovare il *riposo* che cercava.
  Trotz der Müdigkeit konnte er die *Ruhe*, die er suchte, nicht finden.
  
  La domenica mattina amo leggere il giornale mentre ascolto il *riposo* della natura fuori dalla finestra.
  Am Sonntagmorgen lese ich gern die Zeitung, während ich die *Stille* der Natur vor dem Fenster genieße.
  
  Se avessi più tempo libero, prenderei un *riposo* in montagna ogni mese.
  Wenn ich mehr Freizeit hätte, würde ich jeden Monat eine *Erholung* in den Bergen verbringen.
  
  Il medico le consigliò di prendersi un *riposo* assoluto per almeno due settimane.
  Der Arzt riet ihr zu einer *vollständigen Ruhe* von mindestens zwei Wochen.
