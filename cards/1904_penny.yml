Rang: 1904
Wort: penny
Wortart: n.m
Wort mit Artikel: il penny
Femininum / Plural: penny
IPA: ''
Definition: der Cent, -s
Register: ''
Beispielsätze: |-
  Mi dispiace, non ho *penny* per la macchina del caffè.
  Es tut mir leid, ich habe *keine Cents* für den Kaffeautomaten.
  
  Ho trovato un *penny* per terra mentre camminavo nel parco.
  Ich habe eine *1-Cent-Münze* am Boden gefunden, während ich im Park spazieren ging.
  
  Se non hai *penny*, puoi usare una moneta da due euro, tanto è lo stesso.
  Wenn du *keine Cents* hast, kannst du eine Zwei-Euro-Münze nehmen, das ist dasselbe.
  
  Chiunque abbia perso un *penny* in quest’aula, può ritirarlo in segreteria.
  Wer eine *1-Cent-Münze* im Hörsaal verloren hat, kann sie im Sekretariat abholen.
  
  Nonostante il *penny* sia poco valore, a volte porta fortuna.
  Auch wenn der *Cent* wenig wert ist, bringt er manchmal Glück.
