Rang: 1306
Wort: rintracciare
Wortart: vt
Wort mit Artikel: rintracciare
Femininum / Plural: ''
IPA: ''
Definition: aufspüren, ausfindig machen
Register: ''
Beispielsätze: |-
  Non so come *rintracciare* quella creatura misteriosa che ho visto al parco.
  Ich weiß nicht, wie ich dieses seltsame Wesen *aufspüren* kann, das ich im Park gesehen habe.
  
  La polizia è riuscita a *rintracciare* i testimoni dell’incidente solo dopo settimane di indagini.
  Die Polizei konnte die Zeugen des Unfalls erst nach wochenlangen Ermittlungen *ausfindig machen*.
  
  Se avessimo il suo numero, potremmo *rintracciare* subito il cameriere che ci ha servito ieri sera.
  Wenn wir seine Nummer hätten, könnten wir sofort den Kellner *ausfindig machen*, der uns gestern Abend bedient hat.
  
  Quest’articolo spiega in dettaglio come *rintracciare* le fonti di inquinamento nel quartiere.
  Dieser Artikel erklärt detailliert, wie man die Quellen der Verschmutzung im Viertel *ausfindig machen* kann.
  
  Dicono che, con un po’ di pazienza, si può *rintracciare* anche una persona scomparsa da anni.
  Man sagt, dass man mit etwas Geduld sogar eine seit Jahren verschwundene Person *ausfindig machen* kann.
