Rang: 3124
Wort: intercettare
Wortart: vt
Wort mit Artikel: intercettare
Femininum / Plural: ''
IPA: ''
Definition: abfangen, abhören, aufdecken
Register: ''
Beispielsätze: |-
  La polizia è riuscita a *intercettare* una telefonata sospetta ieri sera.
  Die Polizei konnte einen verdächtigen Anruf ***abfangen*** gestern Abend.
  
  Se non avessero *intercettato* quel segnale, il piano nemico sarebbe andato avanti.
  Hätten sie dieses Signal nicht ***aufgedeckt***, wäre der feindliche Plan weitergelaufen.
  
  Credo che qualcuno stia cercando di *intercettare* i nostri dati personali.
  Ich glaube, jemand versucht, unsere persönlichen Daten ***abzuhören***.
  
  Hanno *intercettato* una conversazione tra due spie durante il campionato.
  Sie haben ein Gespräch zwischen zwei Spionen während der ***Meisterschaft** *abgefangen**.
  
  L’agente sapeva già dove sarebbe stato *intercettato* il messaggio segreto.
  Der Agent wusste bereits, wo die geheime Nachricht ***aufgedeckt*** werden würde.
