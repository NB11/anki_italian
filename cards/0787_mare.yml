Rang: 787
Wort: mare
Wortart: n.m
Wort mit Artikel: il mare
Femininum / Plural: mari
IPA: ''
Definition: das Meer, -e
Register: ''
Beispielsätze: |-
  Quest'estate abbiamo trascorso una settimana meravigliosa al *mare* Azzurro.
  Diesen Sommer haben wir eine wunderbare Woche am *Meer* Azzurro verbracht.
  
  Lui ha nuotato per ore nel *mare* nonostante il pericolo corrente.
  Er ist stundenlang im *Meer* geschwommen, trotz der starken Strömung.
  
  Nonostante la tempesta, il pescatore è riuscito a tornare a riva con la sua barca dal *mare* agitato.
  Trotz des Sturms gelang es dem Fischer, mit seinem Boot vom *Meer* der Wildwelle zurückzukehren.
  
  Dopo la sorpresa che ci hai fatto, abbiamo deciso di trascorrere il fine settimana al *mare* invece che in montagna.
  Nach der *Überraschung*, die du uns bereitet hast, haben wir beschlossen, das Wochenende am Meer statt in den Bergen zu verbringen.
  
  Il governo sta cercando di proteggere le coste perché il *mare* sta scomparendo a causa dell'innalzamento delle acque.
  Die Regierung versucht, die Küsten zu schützen, weil das *Meer* aufgrund des steigenden Wasserspiegels verschwindet.
