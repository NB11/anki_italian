Rang: 2641
Wort: fisso
Wortart: adj
Wort mit Artikel: fisso
Femininum / Plural: ''
IPA: ''
Definition: fest, starr, stetig
Register: ''
Beispielsätze: |-
  Ha *fisso* lo sguardo su di me, come se volesse capire ogni mia parola.
  Er hat den *Blick* fest auf mich gerichtet, als wollte er jedes meiner Worte verstehen.
  
  Il suo *fisso* desiderio di vincere lo spinge a lavorare senza sosta.
  Sein *starrer* Wunsch zu gewinnen treibt ihn an, unermüdlich zu arbeiten.
  
  Anche dopo tanti anni, la sua opinione rimane *fissa*: non cambierà mai idea.
  Auch nach vielen Jahren bleibt seine Meinung *fest*: er wird seine Meinung nie ändern.
  
  Lavorava con un'attenzione *fissa* ai dettagli, senza mai distrarsi.
  Er arbeitete mit *fester* Aufmerksamkeit auf Details, ohne sich jemals abzulenken.
  
  Nonostante le critiche, il suo atteggiamento rimaneva *fisso*: non avrebbe ceduto.
  Trotz der Kritik blieb seine *starre* Haltung gleich: Er würde nicht nachgeben.
