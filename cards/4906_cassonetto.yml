Rang: 4906
Wort: cassonetto
Wortart: n.m
Wort mit Artikel: il cassonetto
Femininum / Plural: i cassonetti
IPA: ''
Definition: die Mülltonne, -n
Register: ''
Beispielsätze: |-
  Devi buttare la spazzatura nel *cassonetto* della plastica.
  Du musst den Müll in den *Mülltonne* für Plastik werfen.
  
  Quel *cassonetto* è pieno fino all'orlo, chiama la nettezza urbana!
  Diese *Mülltonne* ist bis zum Rand voll, rufe den Entsorgungsservice an!
  
  Ho visto un gatto che rovistava dentro il *cassonetto* dei rifiuti organici.
  Ich habe eine Katze gesehen, die in der *Mülltonne* mit organischen Abfällen wühlt.
  
  Se il *cassonetto* non viene svuotato regolarmente, puzza terribilmente.
  Wenn die *Mülltonne* nicht regelmäßig geleert wird, stinkt es fürchterlich.
  
  Porta questo sacchetto al *cassonetto* più vicino, per favore.
  Bringe bitte diesen Beutel zum nächstgelegenen *Mülltonne*.
