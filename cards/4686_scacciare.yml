Rang: 4686
Wort: scacciare
Wortart: vt
Wort mit Artikel: scacciare
Femininum / Plural: ''
IPA: ''
Definition: vertreiben, wegjagen
Register: ''
Beispielsätze: |-
  Il poliziotto riuscì a *scacciare* i cani randagi dalla piazza prima che causassero problemi.
  Der Polizist schaffte es, *die* streunenden Hunde vom Platz zu vertreiben, bevor sie Unheil anrichteten.
  
  Se non avessi *scacciato* quel fastidioso venditore, non avrei potuto lavorare in pace.
  Wenn ich *den* lästigen Verkäufer nicht weggejagt hätte, hätte ich nicht ungestört arbeiten können.
  
  La nonna mi ha detto che da piccola usava *scacciare* le mosche con un ventaglio.
  Meine Oma hat mir erzählt, dass sie als Kind Fliegen mit einem Fächer *vertreiben* musste.
  
  Ho letto che i pescatori spesso *scacciano* gli squali con rumori forti per proteggere le reti.
  Ich habe gelesen, dass Fischer Haie oft mit lauten Geräuschen *vertreiben*, um die Netze zu schützen.
  
  Dopo la lite, lui cercò di *scacciare* i cattivi ricordi dalla sua mente, ma inutilmente.
  Nach dem Streit versuchte er vergeblich, die schlechten Erinnerungen aus seinem Kopf zu *vertreiben*.
