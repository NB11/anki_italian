Rang: 1528
Wort: chilo
Wortart: n.m
Wort mit Artikel: il chilo
Femininum / Plural: chili
IPA: ''
Definition: das Kilogramm, -e
Register: ''
Beispielsätze: |-
  Questo pacco pesa almeno due *chili*, ma non ne sono sicuro.
  Dieses Paket wiegt mindestens zwei *Kilogramm*, aber ich bin mir nicht sicher.
  
  Nel terzo secolo a.C. Archimede dimostrò che la corona era di oro puro grazie al peso specifico di un *chilo* di metallo.
  Im dritten Jahrhundert v. Chr. bewies Archimedes durch das spezifische Gewicht eines *Kilogramms* Metall, dass die Krone aus reinem Gold war.
  
  Se compri due *chili* di mele, ti faccio lo sconto sul terzo!
  Wenn du zwei *Kilogramm* Äpfel kaufst, gebe ich dir beim dritten Rabatt!
  
  Ho ordinato due *chili* di farina per preparare il pane, ma il corriere ne ha portati solo uno.
  Ich habe zwei *Kilogramm* Mehl für das Brot bestellt, aber der Kurier hat nur eines geliefert.
  
  Appena avrò perso questi cinque *chili* in più, finalmente mi sentirò a mio agio con questo costume da strega.
  Sobald ich diese fünf zusätzlichen *Kilogramm* verloren habe, werde ich mich endlich in diesem Hexenkostüm wohlfühlen.
