Rang: 2235
Wort: annunciare
Wortart: v
Wort mit Artikel: annunciare
Femininum / Plural: ''
IPA: ''
Definition: ankündigen, bekannt geben
Register: ''
Beispielsätze: |-
  Il sindaco ha *annunciato* che la cerimonia avrà luogo domani alle 15.
  Der Bürgermeister hat *angekündigt*, dass die Zeremonie morgen um 15 Uhr stattfinden wird.
  
  Non sapevo come *annunciare* la brutta notizia ai miei genitori.
  Ich wusste nicht, wie ich die schlechte Nachricht *meinen* Eltern beibringen sollte.
  
  Se avessi saputo della festa, avrei *annunciato* il mio arrivo prima!
  Wenn ich von der Party gewusst hätte, hätte ich meine Ankunft früher *bekannt gegeben*!
  
  L'azienda *annuncerà* i risultati finanziari nella conferenza di giovedì prossimo.
  Das Unternehmen wird die finanziellen Ergebnisse in der Konferenz am kommenden Donnerstag *veröffentlichen*.
  
  È importante che tu *annunci* i cambiamenti al team con chiarezza.
  Es ist wichtig, dass du die Änderungen *dem Team* mit Klarheit mitteilst.
