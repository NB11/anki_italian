Rang: 2841
Wort: fraintendere
Wortart: v
Wort mit Artikel: fraintendere
Femininum / Plural: ''
IPA: ''
Definition: falsch verstehen, missverstehen
Register: ''
Beispielsätze: |-
  Se *fraintendi* il significato della frase, potresti offenderlo senza volerlo.
  Wenn du die Bedeutung des Satzes *falsch verstehst*, könntest du ihn versehentlich beleidigen.
  
  Ho avuto l’impressione che tu *fraintendessi* le mie intenzioni quando ti ho detto di venire più tardi.
  Ich hatte den Eindruck, dass du meine Absichten *missverstanden* hast, als ich dir sagte, später zu kommen.
  
  Non vorrei che *fraintendiate* il mio tono: non sto rimproverando nessuno.
  Ich möchte nicht, dass ihr meinen Ton *falsch versteht*: Ich tadle niemanden.
  
  Credo che lui abbia *frainteso* completamente la situazione e ora è arrabbiato per nulla.
  Ich glaube, er hat die Situation *falsch verstanden* und ist jetzt völlig unnötig wütend.
  
  Se non chiarisci bene, molti potrebbero *fraintendere* le tue parole e nasceranno incomprensioni.
  Wenn du es nicht klarstellst, könnten viele deine Worte *missverstehen* und es entstehen Missverständnisse.
