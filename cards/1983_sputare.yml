Rang: 1983
Wort: sputare
Wortart: vt
Wort mit Artikel: sputare
Femininum / Plural: ''
IPA: ''
Definition: ausspucken, speien
Register: ''
Beispielsätze: |-
  Non *sputare* per terra, è maleducato e dannoso per l'ambiente.
  Spucke nicht *auf* den Boden, das ist unhöflich und schadet der Umwelt.
  
  Il medico gli ha ordinato di *sputare* in un contenitore sterile per l'esame.
  Der Arzt hat ihm angeordnet, in einen sterilen Behälter *auszuspucken*.
  
  Se *sputi* sempre a terra quando tossisci, rischi di infettare gli altri.
  Wenn du beim Husten immer *ausspuckst*, riskierst du, andere anzustecken.
  
  Dopo aver *sputato* il chewing gum nel cestino, si è sentito sollevato.
  Nachdem er den Kaugummi in den Mülleimer *gespuckt* hatte, fühlte er sich erleichtert.
  
  Stava per *sputare* il boccone disgustato, ma si è trattenuto per educazione.
  Er wollte den widerlichen Bissen *ausspucken*, aber er hielt sich aus Höflichkeit zurück.
