Wort: tonto
Wortart: adj
Wort mit Artikel: tonto
Femininum / Plural: ''
IPA: ''
Definition: dumm
Register: ''
Beispielsätze: |-
  Perché hai accettato quella *tonta* scusa del suo amico?
  Warum hast du dir diese *dumme* Ausrede seines Freundes anhören lassen?
  
  Se credi che sia *tonto* perché non ho capito, ti sbagli di grosso!
  Wenn du denkst, ich sei *dumm*, weil ich es nicht verstanden habe, liegst du völlig falsch!
  
  È così *tonta* da non rendersi conto del pericolo in cui si trova.
  Sie ist so *dumm*, dass sie die Gefahr, in der sie sich befindet, gar nicht bemerkt.
  
  Spero che non sia tanto *tonto* da farsi fregare di nuovo!
  Ich hoffe, er ist nicht *so* dumm, dass er sich noch einmal über den Tisch ziehen lässt!
  
  Era una situazione così *tonta* che non sapevo se ridere o piangere.
  Die Situation war so *dumm*, dass ich nicht wusste, ob ich lachen oder weinen sollte.
