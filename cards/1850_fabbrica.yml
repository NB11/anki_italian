Rang: 1850
Wort: fabbrica
Wortart: n.f
Wort mit Artikel: la fabbrica
Femininum / Plural: fabbriche
IPA: ''
Definition: die Fabrik, -en
Register: ''
Beispielsätze: |-
  La *fabbrica* di automobili chiude alle cinque del pomeriggio.
  Die Autofabrik schließt um fünf Uhr am Nachmittag.
  
  Ho visitato una *fabbrica* dove producono mobili su misura.
  Ich habe eine Fabrik besucht, in der maßgefertigte Möbel *hergestellt* werden.
  
  Se la *fabbrica* non aumenta la produzione, perderemo il contratto.
  Wenn die Fabrik die Produktion nicht steigert, verlieren wir den Vertrag.
  
  Loro hanno assunto cento operai perché la *fabbrica* sta crescendo rapidamente.
  Sie haben hundert Arbeiter eingestellt, weil die Fabrik schnell wächst.
  
  Dicono che la *fabbrica* verrà spostata all'estero per ridurre i costi.
  Man sagt, die Fabrik wird ins Ausland verlegt, um die Kosten zu senken.
