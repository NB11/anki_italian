Rang: 2230
Wort: obiezione
Wortart: n.f
Wort mit Artikel: la obiezione
Femininum / Plural: obiezioni
IPA: ''
Definition: der Einwand, -¨e, der Protest, -e
Register: ''
Beispielsätze: |-
  Nonostante la sua *obiezione*, la legge è stata approvata senza modifiche.
  Trotz seines *Einwands* wurde das Gesetz ohne Änderungen verabschiedet.
  
  Se hai qualche *obiezione* contro questo piano, parlamene subito!
  Falls du irgendwelche *Einwände* gegen diesen Plan hast, sag mir Bescheid!
  
  La sua principale *obiezione* riguardava il costo del progetto, che trovava eccessivo.
  Sein Haupt*Einwand* bezog sich auf die Kosten des Projekts, die er für zu hoch hielt.
  
  Avrei accettato la proposta se non ci fossero state forti *obiezioni* da parte del consiglio.
  Ich hätte den Vorschlag angenommen, wenn es nicht starke *Einwände* seitens des Rats gegeben hätte.
  
  Chiunque voglia sollevare un'*obiezione* deve farlo entro domani mattina.
  Wer einen *Einwand* erheben möchte, muss dies bis morgen früh tun.
