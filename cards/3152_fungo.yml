Rang: 3152
Wort: fungo
Wortart: n.m
Wort mit Artikel: il fungo
Femininum / Plural: funghi
IPA: ''
Definition: der Pilz, -e
Register: ''
Beispielsätze: |-
  In autunno ami raccogliere *funghi* nel bosco con la tua famiglia?
  Ist es im Herbst dein Hobby, *Pilze* im Wald mit deiner Familie zu sammeln?
  
  Non mangiare quel *fungo*: potrebbe essere velenoso!
  Iss jenen *Pilz* nicht: er könnte giftig sein!
  
  Ho trovato un *fungo* così strano che ho chiamato il botanico.
  Ich habe einen so seltsamen *Pilz* gefunden, dass ich den Botaniker gerufen habe.
  
  Sebbene piovesse molto, sono riuscito a trovare qualche *fungo* commestibile.
  Obwohl es sehr geregnet hat, konnte ich ein paar *Pilze* finden, die essbar sind.
  
  Dicono che nel sottobosco vicino alla cascata ci siano *funghi* giganti ogni primavera.
  Man sagt, im Unterholz nahe des Wasserfalls gebe es jeden Frühling riesige *Pilze*.
