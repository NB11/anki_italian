Rang: 3927
Wort: qualificare
Wortart: vt
Wort mit Artikel: qualificare
Femininum / Plural: ''
IPA: ''
Definition: qualifizieren, bewerten, einstufen
Register: ''
Beispielsätze: |-
  Il commissario deve *qualificare* il delitto come premeditato.
  Der Kommissar muss die Straftat als vorsätzlich *qualifizieren*.
  
  Le sue competenze *qualificano* perfettamente per questo incarico.
  Seine Fähigkeiten *qualifizieren* ihn perfekt für diese Position.
  
  Se avessi più tempo, riuscirei a *qualificare* meglio il progetto.
  Wenn ich mehr Zeit hätte, könnte ich das Projekt besser *qualifizieren*.
  
  Il giudice ha deciso di *qualificare* l'atto come reato di odio.
  Der Richter hat beschlossen, die Tat als Hassdelikt zu *qualifizieren*.
  
  Non tutti i corsi riescono a *qualificare* gli studenti per il mercato del lavoro.
  Nicht alle Kurse schaffen es, die Studenten für den Arbeitsmarkt zu *qualifizieren*.
Audio: ''
Notiz: ''
Dispersion: ''
