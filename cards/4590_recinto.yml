Rang: 4590
Wort: recinto
Wortart: n.m
Wort mit Artikel: il recinto
Femininum / Plural: i recinti
IPA: ''
Definition: der Zaun, -¨e
Register: ''
Beispielsätze: |-
  Il cane è fuggito dal *recinto* mentre il guardiano era distratto.
  Der Hund ist aus dem *Zaun* geflohen, während der Wärter abgelenkt war.
  
  Vuoi che costruisca un *recinto* nuovo per le pecore?
  Soll ich einen neuen *Zaun* für die Schafe bauen?
  
  Nonostante le *recinzioni* robuste, qualche agnello si era perso nel bosco.
  Trotz der stabilen *Zäune* hatte sich ein Lamm im Wald verlaufen.
  
  Se avessi più tempo, rinforzerei il *recinto* intorno al giardino.
  Wenn ich mehr Zeit hätte, würde ich den *Zaun* um den Garten verstärken.
  
  Il *recinto* che hai visto stamani è stato costruito dai detenuti del lavoro esterno.
  Der *Zaun*, den du heute Morgen gesehen hast, wurde von den Häftlingen der Außenarbeit gebaut.
