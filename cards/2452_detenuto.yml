Rang: 2452
Wort: detenuto
Wortart: n.m
Wort mit Artikel: il detenuto
Femininum / Plural: detenuti
IPA: ''
Definition: der Häftling, -e
Register: ''
Beispielsätze: |-
  Il *detenuto* ha chiesto un colloquio con il direttore della prigione.
  Der *Häftling* hat ein Gespräch mit dem Gefängnisdirektor verlangt.
  
  Dopo dieci anni, il *detenuto* è stato scarcerato per buona condotta.
  Nach zehn Jahren wurde der *Häftling* wegen guter Führung entlassen.
  
  La polizia sta cercando di identificare un *detenuto* evaso questa notte.
  Die Polizei versucht, einen geflohenen *Häftling* zu identifizieren.
  
  Se il *detenuto* violerà le regole, perderà i privilegi.
  Wenn der *Häftling* gegen die Regeln verstößt, verliert er seine Privilegien.
  
  Il giudice ha emesso una condanna più severa per questo *detenuto* recidivo.
  Der Richter hat für diesen rückfälligen *Häftling* ein härteres Urteil gefällt.
