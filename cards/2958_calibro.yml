Beispielsätze: |-
  Questo *calibro* è perfetto per misurare con precisione il diametro del foro.
  Dieses *Kaliber* ist perfekt, um den Durchmesser des Lochs genau zu messen.
  
  Non sai quale *calibro* usare? Guarda sull’elenco delle misure standard.
  Weißt du nicht, welches *Kaliber* du verwenden sollst? Schau einfach in der Liste der Standardmaße nach.
  
  Il meccanico ha scelto un *calibro* più grande perché quello piccolo non bastava.
  Der Mechaniker hat ein größeres *Kaliber* ausgewählt, weil das kleine nicht genügt hat.
  
  Con questo nuovo *calibro* digitale si ottengono risultati ancora più accurati.
  Mit diesem neuen digitalen *Kaliber* erhält man noch genauere Ergebnisse.
  
  Se vuoi controllare la profondità del solco, uso un *calibro* a profondità a colonna.
  Wenn du die Tiefe der Nut überprüfen willst, verwende ich ein Säulen-*Kaliber* für die Tiefe.
