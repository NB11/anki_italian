Rang: 2361
Wort: bentornato
Wortart: n.m
Wort mit Artikel: il bentornato
Femininum / Plural: i bentornati
IPA: ''
Definition: die Rückkehr, -e
Register: ''
Beispielsätze: |-
  Ecco *l'bentornato* dopo tanto tempo, come ti senti?
  Da ist die Rückkehr nach langer Zeit, wie fühlst du dich?
  
  Il suo *bentornato* è stato celebrato con una grande festa in suo onore.
  Seine Rückkehr wurde mit einer großen Feier zu seinen Ehren gefeiert.
  
  Non vedo l'ora del *bentornato* di mio fratello dall'estero.
  Ich kann die Rückkehr meines Bruders aus dem Ausland kaum erwarten.
  
  Dopo anni di viaggio, finalmente si aspetta il *bentornato* a casa propria.
  Nach Jahren des Reisens erwartet er endlich seine Rückkehr nach Hause.
  
  Il *bentornato* del sole dopo l'inverno ha rallegrato tutti.
  Die Rückkehr der Sonne nach dem Winter hat alle erheitert.
