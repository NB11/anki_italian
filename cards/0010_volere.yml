Beispielsätze: |-
  Che cosa *vuoi* mangiare stasera?
  Was *willst* du heute Abend *essen*?
  
  Ho *voluto* partire presto, ma il treno era in ritardo.
  Ich *habe* früh *abfahren wollen*, aber der Zug hatte Verspätung.
  
  Se *volessi* venire con noi, ti aspetteremmo.
  Wenn du mit uns *kommen würdest*, würden wir auf dich *warten*.
  
  *Vorrà* piovere, guarda che nuvole scure!
  Es *wird* gleich *regnen*, sieh mal die dunklen Wolken!
  
  Non ti *ho* mai *voluto* ingannare, credimi!
  Ich *habe* dich nie *täuschen wollen*, glaub mir!
