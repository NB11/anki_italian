Rang: 1913
Wort: rifugio
Wortart: n.m
Wort mit Artikel: il rifugio
Femininum / Plural: rifugi
IPA: ''
Definition: der Zufluchtort, -e
Register: ''
Beispielsätze: |-
  Dopo un lungo viaggio, abbiamo finalmente trovato *un rifugio* per la notte.
  Nach *einer langen Reise* haben wir schließlich eine Zuflucht für die Nacht gefunden.
  
  Il *rifugio* di montagna era già pieno, quindi abbiamo dormito in tenda vicino al lago.
  Das *Berghaus* war bereits voll, also haben wir im Zelt am See geschlafen.
  
  Mi hanno consigliato di prendere *il rifugio* diurno, perché è più economico e vicino alla città.
  Man hat mir geraten, *das Tagesheim* zu nehmen, weil es günstiger und stadtnah ist.
  
  Se non troviamo *un rifugio* prima di sera, dovremo accamparci all’aperto, sfortunatamente!
  Wenn wir vor Einbruch der Dunkelheit kein *Obdach* finden, müssen wir leider im Freien zelten.
  
  Durante la passeggiata abbiamo visto *un rifugio* abbandonato, ma non sapevamo se fosse sicuro entrarci.
  Während *des Spaziergangs* haben wir eine verlassene Hütte gesehen, aber wir wussten nicht, ob es sicher war, hineinzugehen.
