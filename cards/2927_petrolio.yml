Rang: 2927
Wort: petrolio
Wortart: n.m
Wort mit Artikel: il petrolio
Femininum / Plural: petroli
IPA: ''
Definition: das Erdöl, -e
Register: ''
Beispielsätze: |-
  Il *petrolio* è una risorsa naturale molto importante per molti paesi.
  Das *Erdöl* ist eine sehr wichtige natürliche Ressource für viele Länder.
  
  Nel 2023 il prezzo del *petrolio* ha raggiunto livelli record a causa della guerra.
  Im Jahr 2023 erreichte der Preis für *Erdöl* Rekordwerte wegen des Krieges.
  
  Se non ci fosse il *petrolio*, molti settori dell’economia dovrebbero cambiare drasticamente.
  Wenn es das *Erdöl* nicht gäbe, müssten viele Sektoren der Wirtschaft drastisch wechseln.
  
  La transizione energetica punta a ridurre la dipendenza dal *petrolio* entro il 2050.
  Die Energiewende zielt darauf ab, die Abhängigkeit vom *Erdöl* bis 2050 zu verringern.
  
  Nonostante le alternative, il *petrolio* rimane il combustibile più usato al mondo.
  Trotz Alternativen bleibt das *Erdöl* der am meisten genutzte Brennstoff weltweit.
