Rang: 1905
Wort: governatore
Wortart: n.m
Wort mit Artikel: il governatore
Femininum / Plural: governatori
IPA: ''
Definition: der Gouverneur, -e
Register: ''
Beispielsätze: |-
  Il *governatore* ha firmato il decreto stamattina.
  Der *Gouverneur* hat das Dekret heute Morgen unterzeichnet.
  
  Spero che il nuovo *governatore* sappia risolvere la crisi economica.
  Ich hoffe, dass der neue *Gouverneur* die Wirtschaftskrise lösen kann.
  
  Chiunque diventi *governatore* deve essere preparato ad affrontare molte sfide.
  Wer auch immer *Gouverneur* wird, muss bereit sein, viele Herausforderungen zu meistern.
  
  Il *governatore* in carica ha ricevuto una standing ovation durante il convegno.
  Der amtierende *Gouverneur* erhielt stehende Ovationen während der Konferenz.
  
  Sebbene il *governatore* abbia promesso riforme, molti cittadini sono scettici.
  Obwohl der *Gouverneur* Reformen versprochen hat, sind viele Bürger skeptisch.
