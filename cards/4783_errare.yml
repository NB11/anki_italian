Rang: 4783
Wort: errare
Wortart: v
Wort mit Artikel: errare
Femininum / Plural: ''
IPA: ''
Definition: irren, sich irren, falsch liegen
Register: ''
Beispielsätze: |-
  Credo che tu *erri*, se pensi che tutto sia semplice come sembra.
  Ich glaube, du *liegst* falsch, wenn du denkst, dass alles so einfach ist.
  
  Se avessi *errato* nel calcolo, avremmo perso molto tempo.
  Wenn ich mich im *Berechnen* geirrt hätte, hätten wir viel Zeit verloren.
  
  È meglio *errare* e imparare, piuttosto che non provare mai nulla.
  Es ist besser, sich zu *irren* und zu lernen, als niemals etwas zu versuchen.
  
  Dicono che la maggioranza degli uomini *erri* almeno una volta nella vita.
  Man sagt, dass die *Mehrheit* der Menschen sich mindestens einmal im Leben irrt.
  
  Nonostante *errasse* spesso, il suo intuito era comunque prezioso per il team.
  Obwohl er sich oft *irrt*, war seine Intuition dennoch wertvoll für das Team.
