Beispielsätze: |-
  *Accade* spesso che piova improvvisamente in montagna.
  Es *geschieht* oft, dass es plötzlich im Gebirge regnet.
  
  Cosa *è* accad*uto* ieri sera al parco?
  Was *ist* gestern Abend im Park *passiert*?
  
  Mi auguro che non *accada* nulla di spiacevole.
  Ich hoffe, dass nichts Unangenehmes *passiert*.
  
  Se *accadesse* un problema, chiamami subito!
  Falls ein Problem *passiert*, ruf mich sofort an!
  
  Non posso credere che tutto ciò sia *accaduto* proprio a me.
  Ich kann nicht glauben, dass mir das alles *passiert* ist.
