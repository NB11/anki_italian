Rang: 3606
Wort: allungare
Wortart: v
Wort mit Artikel: allungare
Femininum / Plural: ''
IPA: ''
Definition: verlängern, ausdehnen, strecken
Register: ''
Beispielsätze: |-
  Per raggiungere la scatola sullo scaffale più alto, dovrai *allungare* il braccio.
  Um die Schachtel auf dem höchsten Regal zu erreichen, musst du den Arm *ausstrecken*.
  
  Se *allunghi* troppo il collo, ti verrà un torcicollo!
  Wenn du den Hals zu sehr *reckst*, bekommst du einen steifen Nacken!
  
  Nonostante la sua età, non volle farsi aiutare e continuò a *allungare* il percorso per passeggiare.
  Trotz ihres Alters wollte sie keine Hilfe und verlängerte weiterhin den Spazierweg.
  
  Dicono che *allunghino* le scadenze dei concorsi pubblici per favorire alcune persone.
  Man sagt, sie *dehnen* die Fristen öffentlicher Wettbewerbe, um bestimmte Leute zu begünstigen.
  
  Dopo aver ricevuto la soffiata dal suo amico, decise di non *allungare* la discussione con il capo e si licenziò immediatamente.
  Nachdem er den Tipp von seinem Freund erhalten hatte, beschloss er, die Diskussion mit dem Chef *nicht zu verlängern*, und kündigte sofort.
