Rang: 1684
Wort: pazzesco
Wortart: adj
Wort mit Artikel: pazzesco
Femininum / Plural: ''
IPA: ''
Definition: verrückt, irre, wahnsinnig
Register: ''
Beispielsätze: |-
  Il comportamento del *pazzesco* artista ha stupito tutti gli spettatori.
  Das Verhalten des *verrückten* Künstlers hat alle Zuschauer verblüfft.
  
  Spero che questa festa non diventi *pazzesca* come l'ultima volta!
  Ich hoffe, dass diese Party nicht *wahnsinnig* wird wie das letzte Mal!
  
  Il progetto sembrava semplice, ma i risultati sono risultati *pazzeschi*.
  Das Projekt schien einfach, aber die Ergebnisse waren *irrsinnig*.
  
  Anche se piove, la moda autunnale è *pazzesca* come sempre.
  Auch wenn es regnet, ist die Herbstmode *irrwitzig* wie immer.
  
  Quando il cantante ha iniziato a urlare, la folla ha gridato di *pazzesco* entusiasmo.
  Als der Sänger zu schreien begann, brach die Menge in *wahnsinnige* Begeisterung aus.
