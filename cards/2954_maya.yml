  Der Historiker analysiert die Bräuche der alten *Maya*, um ihre Kultur zu verstehen.
  
  Vuoi visitare le rovine dei *maya* durante il tuo viaggio in Messico?
  Möchtest du die Ruinen der *Maya* während deiner Reise in Mexiko besichtigen?
  
  Nonostante le difficoltà, i discendenti dei *maya* preservano ancora le loro tradizioni.
  Trotz der Schwierigkeiten bewahren die Nachkommen der *Maya* noch immer ihre Traditionen.
  
  Gli archeologi hanno scoperto un nuovo sito appartenente alla civiltà dei *maya* nella giungla.
