Rang: 2740
Wort: svanire
Wortart: vi
Wort mit Artikel: svanire
Femininum / Plural: ''
IPA: ''
Definition: verschwinden, sich auflösen
Register: ''
Beispielsätze: |-
  Il fumo delle sigarette *svanisce* lentamente nell'aria.
  Der Rauch der Zigaretten *verschwindet* langsam in der Luft.
  
  Dopo una lunga discussione, le sue paure *sono svanite* nel nulla.
  Nach einer langen Diskussion *verschwanden* seine Ängste spurlos.
  
  Se non camminiamo più veloci, la nebbia *svanirà* prima che arriviamo al lago.
  Wenn wir nicht schneller gehen, *wird* der Nebel verschwinden, bevor wir am See ankommen.
  
  Credevo che la magia *svanisse* con la realtà, ma mi sbagliavo.
  Ich dachte, dass die Magie mit der Realität *verschwände*, aber ich lag falsch.
  
  Non appena il sole è tramontato, il paesaggio *è svanito* nella notte profonda.
  Sobald die Sonne untergegangen ist, *verschwand* die Landschaft in tiefster Nacht.
