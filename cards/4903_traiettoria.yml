Rang: 4903
Wort: traiettoria
Wortart: n.f
Wort mit Artikel: la traiettoria
Femininum / Plural: traiettorie
IPA: ''
Definition: die Flugbahn, -en
Register: ''
Beispielsätze: |-
  La *traiettoria* del proiettile è stata calcolata con precisione dal computer.
  Die Flugbahn des Geschosses wurde vom Computer *berechnet*.
  
  Se non cambi la *traiettoria* del volo, atterreremo in ritardo.
  Wenn du die Flugbahn des Fluges nicht änderst, landen wir *verspätet*.
  
  L’ingegnere ha studiato la *traiettoria* del razzo prima del lancio.
  Der Ingenieur hat die Flugbahn der Rakete vor dem Start *untersucht*.
  
  La *traiettoria* dell’aereo era così bassa che abbiamo visto chiaramente le case sotto di noi.
  Die Flugbahn des Flugzeugs war so niedrig, dass wir die Häuser unter uns *deutlich* sehen konnten.
  
  Vor dirompere in lacrime, cercò di seguire la *traiettoria* delle sue emozioni nella mente.
  Bevor sie in Tränen ausbrach, versuchte sie, die Flugbahn ihrer *Gefühle* im Kopf zu folgen.
