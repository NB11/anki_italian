Rang: 2675
Wort: entusiasta
Wortart: n.m/f
Wort mit Artikel: l'entusiasta
Femininum / Plural: gli entusiasti/le entusiaste
IPA: ''
Definition: der Enthusiast, -en, die *Entusiasta*, -i
Register: ''
Beispielsätze: |-
  L'*entusiasta* ha assistito a ogni concerto della band senza mai perdersi una nota.
  Der *Enthusiast* hat jedes Konzert der Band besucht, ohne jemals einen Ton zu verpassen.
  
  Mio fratello è un *entusiasta* dei videogiochi e passa intere giornate a giocare.
  Mein Bruder ist ein *Enthusiast* für Videospiele und verbringt ganze Tage damit zu spielen.
  
  Nonostante il fallimento, rimasi *entusiasta* del progetto e volli continuare.
  Trotz des Scheiterns blieb ich *Enthusiast* für das Projekt und wollte weitermachen.
  
  Gli *entusiasti* del nuovo film si sono radunati fuori dal cinema per l’uscita.
  Die *Enthusiasten* des neuen Films haben sich vor dem Kino für die Premiere versammelt.
  
  Si dice che solo i *entusiasti* veri riescano a trasmettere la propria passione agli altri.
  Man sagt, dass nur *Enthusiasten* es schaffen, ihre Leidenschaft auf andere zu übertragen.
