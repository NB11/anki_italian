Rang: 3023
Wort: biasimare
Wortart: v
Wort mit Artikel: biasimare
Femininum / Plural: ''
IPA: ''
Definition: tadeln, kritisieren
Register: ''
Beispielsätze: |-
  Non *biasimo* chi cerca di migliorarsi ogni giorno.
  Ich *tadle* nicht, wer sich jeden Tag verbessern will.
  
  Il giudice *ha biasimato* l’imputato per la sua condotta iniqua.
  Der Richter *hat* den Angeklagten für sein ungerechtes Verhalten getadelt.
  
  Sarei stato felice se avessi *biasimato* la sua decisione in modo più gentile.
  Ich wäre glücklich gewesen, wenn ich seine Entscheidung *freundlicher getadelt* hätte.
  
  Sebbene tu sia stanco, non *biasimo* il tuo entusiasmo per questo progetto.
  Auch wenn du müde bist, *tadle* ich nicht deinen Enthusiasmus für dieses Projekt.
  
  Se *biasimassi* troppo severamente, potresti ferire i suoi sentimenti involontariamente.
  Wenn du *zu streng tadeln* würdest, könntest du seine Gefühle ungewollt verletzen.
