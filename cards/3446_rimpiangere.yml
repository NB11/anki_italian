Rang: 3446
Wort: rimpiangere
Wortart: v
Wort mit Artikel: rimpiangere
Femininum / Plural: ''
IPA: ''
Definition: bedauern, vermissen
Register: ''
Beispielsätze: |-
  Dopo *rimpiangere* la sua decisione, ha cercato di rimediare.
  Nach dem *Bedauern* seiner Entscheidung versuchte er, es wiedergutzumachen.
  
  Non *rimpiangerò* mai di aver scelto questa avenue per vivere.
  Ich werde es nie *bedauern*, diese Allee für mein Leben gewählt zu haben.
  
  Se dovessi *rimpiangere* qualcosa, sarebbe il tempo perso in nebbia.
  Wenn ich etwas *bedauern* müsste, wäre es die in Nebel verlorene Zeit.
  
  Mi sembra che tu *rimpianga* ogni scelta che facciamo insieme.
  Mir scheint, als *bedauerst* du jede Entscheidung, die wir gemeinsam treffen.
  
  Hanno detto che non avrebbero *rimpianto* nulla, neanche il viaggio a quella regione isolata.
  Sie sagten, sie würden nichts *bedauern*, nicht einmal die Reise in diese abgelegene Region.
