Rang: 3651
Wort: avverare
Wortart: vi
Wort mit Artikel: avverare
Femininum / Plural: ''
IPA: ''
Definition: sich erfüllen, wahr werden
Register: ''
Beispielsätze: |-
  Spero che il tuo sogno di viaggiare nello spazio *avveri* presto!
  Ich hoffe, dass dein Traum, durchs All zu reisen, sich *erfüllt*.
  
  I tuoi timori si sono *avverati*: la banca ha chiuso improvvisamente.
  Deine Befürchtungen haben sich *erfüllt*: die Bank hat plötzlich geschlossen.
  
  Se non *si avverasse* quello che ho previsto, dovrò chiedere aiuto a uno specialista.
  Falls sich das, was ich vorausgesagt habe, nicht *erfüllt*, muss ich einen Spezialisten um Hilfe bitten.
  
  È incredibile come questa sua *avverata* profezia abbia cambiato le sorti della città.
  Es ist unglaublich, wie sich diese *eingetroffene* Prophezeiung das Schicksal der Stadt verändert hat.
  
  Potrebbe *avverarsi* che domani ci sia un cambiamento climatico globale, ma nessuno lo sa per certo.
  Es könnte sich *erfüllen*, dass es morgen einen weltweiten Klimawandel gibt – aber das weiß niemand sicher.
