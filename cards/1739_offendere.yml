Rang: 1739
Wort: offendere
Wortart: vt
Wort mit Artikel: offendere
Femininum / Plural: ''
IPA: ''
Definition: beleidigen, kränken, verletzen
Register: ''
Beispielsätze: |-
  Non volevo *offendere* nessuno con le mie parole, mi dispiace davvero.
  Ich wollte niemanden mit meinen Worten *beleidigen*, es tut mir wirklich leid.
  
  Se *offendi* spesso le persone senza rendersene conto, dovresti riflettere di più.
  Wenn du andere oft *kränken*, ohne es zu merken, solltest du mehr nachdenken.
  
  Stavo per *offendere* qualcuno, ma mi sono fermato appena ho capito l’errore.
  Ich hätte fast jemanden *beleidigt*, aber ich habe mich gestoppt, sobald ich den Fehler erkannt habe.
  
  Nonostante il litigio, lei non si lascerà *offendere* facilmente da te.
  Trotz des Streits lässt sie sich nicht so leicht von dir *verletzen*.
  
  È così sensibile che si sente *offeso* perfino per un commento innocuo.
  Er ist so empfindlich, dass er sich sogar durch eine harmlose Bemerkung *beleidigt* fühlt.
