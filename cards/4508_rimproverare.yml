Rang: 4508
Wort: rimproverare
Wortart: vt
Wort mit Artikel: rimproverare
Femininum / Plural: ''
IPA: ''
Definition: tadeln, zurechtweisen
Register: ''
Beispielsätze: |-
  Il professore *rimproverò* lo studente per il suo comportamento in classe.
  Der Lehrer tadelte den Schüler für sein Verhalten im Unterricht.
  
  Nonostante gli avvertimenti, continuava a *rimproverare* i colleghi senza motivo.
  Trotz der Warnungen tadelte er die Kollegen ständig ohne Grund.
  
  Se avessi saputo che eri stato tu a rompere il vetro, non ti avrei *rimproverato* così duramente.
  Wenn ich gewusst hätte, dass du das Glas zerbrochen hast, hätte ich dich nicht so hart getadelt.
  
  Le madri spesso *rimproverano* i figli per la loro mancanza di responsabilità.
  Mütter tadeln ihre Kinder oft für ihre mangelnde Verantwortung.
  
  Mi dispiace di averti *rimproverato* poco fa, è solo che ero molto arrabbiato.
  Es tut mir leid, dass ich dich gerade getadelt habe, ich war einfach sehr wütend.
Audio: ''
Notiz: ''
