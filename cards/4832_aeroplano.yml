Rang: 4832
Wort: aeroplano
Wortart: n.m
Wort mit Artikel: l'aeroplano
Femininum / Plural: gli aerei
IPA: ''
Definition: das Flugzeug, -e
Register: ''
Beispielsätze: |-
  L'*aeroplano* è decollato in perfetto orario nonostante le condizioni meteo avverse.
  Das *Flugzeug* ist trotz der widrigen Wetterbedingungen pünktlich gestartet.
  
  Se prenoti in anticipo, trovi spesso biglietti per l'*aeroplano* a prezzi molto convenienti.
  Wenn du früh buchst, findest du oft Tickets für das *Flugzeug* zu sehr günstigen Preisen.
  
  Mi hanno detto che tra due anni inaugureranno un nuovo aeroporto proprio in periferia.
  Man hat mir gesagt, dass sie in zwei Jahren einen neuen Flughafen genau in der *Peripherie* eröffnen werden.
  
  Non appena l'*aeroplano* atterrò, i passeggeri iniziarono ad applaudire.
  Sobald das *Flugzeug* landete, begannen die Passagiere zu applaudieren.
  
  Vorrei tanto sapere chi ha progettato l'*aeroplano* che abbiamo visto ieri al museo.
  Ich würde wirklich gerne wissen, wer das *Flugzeug* entworfen hat, das wir gestern im Museum gesehen haben.
