Rang: 722
Wort: guardo
Wortart: n.m
Wort mit Artikel: lo guardo
Femininum / Plural: guardoni
IPA: ''
Definition: er/sie/es schaut, blickt
Register: ''
Beispielsätze: |-
  Lo *guardone* ha osservato la scena senza essere notato.
  Der *Spanner* hat die Szene beobachtet, ohne bemerkt zu werden.
  
  I *guardoni* del cinema sono spesso molto rumorosi.
  Die *Kinozuschauer* sind oft sehr laut.
  
  Il *guardone* è stato denunciato per molestie.
  Der *Spanner* wurde wegen Belästigung angezeigt.
  
  Non voglio essere chiamato *guardone* per sbaglio!
  Ich möchte nicht versehentlich *Spanner* genannt werden!
  
  I *guardoni* hanno applaudito calorosamente alla fine dello spettacolo.
  Die *Zuschauer* haben am Ende der Vorstellung kräftig applaudiert.
