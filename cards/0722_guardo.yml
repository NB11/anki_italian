Rang: 722
Wort: guardo
Wortart: n.m
Wort mit Artikel: il guardo
Femininum / Plural: sguardi
IPA: ''
Definition: der Blick, -e
Register: ''
Beispielsätze: |-
  Non sopporto il suo *guardo* fisso, sembra che mi giudichi sempre.
  Ich kann seinen *Blick* nicht ertragen, es wirkt, als würde er mich ständig beurteilen.
  
  Dallo *guardo* della gente capisco che la situazione è grave.
  Aus dem *Blick* der Leute verstehe ich, dass die Situation ernst ist.
  
  Con un *guardo* veloce ho notato che il libro era ancora sul tavolo.
  Mit einem *Blick* habe ich bemerkt, dass das Buch noch auf dem Tisch lag.
  
  Il suo *guardo* era così intenso che mi ha fatto arrossire immediatamente.
  Sein *Blick* war so intensiv, dass ich sofort rot wurde.
  
  Non mi piace il *guardo* che hai rivolto a quella povera donna per strada.
  Mir gefällt der *Blick* nicht, den du der armen Frau auf der Straße zugeworfen hast.
