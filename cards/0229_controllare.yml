Rang: 229
Wort: controllare
Wortart: v
Wort mit Artikel: controllare
Femininum / Plural: ''
IPA: ''
Definition: prüfen, kontrollieren
Register: ''
Beispielsätze: |-
  Devo *controllare* la temperatura della stanza.
  Ich muss die *Temperatur* des Zimmers *prüfen*.
  
  Chi *controllerebbe* i documenti senza un mandato?
  Wer würde die Unterlagen *kontrollieren*, ohne einen Durchsuchungsbefehl zu haben?
  
  *Controlla* se il treno parte alle 15 o alle 16.
  *Prüfe*, ob der Zug um 15 Uhr oder um 16 Uhr *abfährt*.
  
  Non so se ho *controllato* bene i conti.
  Ich weiß nicht, ob ich die *Rechnungen* gut *geprüft* habe.
  
  Vor di partire, *controllerei* ancora una volta tutto l’equipaggiamento.
  Vor dem *Abfahrt* würde ich noch einmal die gesamte *Ausrüstung* *kontrollieren*.
