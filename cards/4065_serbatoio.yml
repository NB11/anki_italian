Rang: 4065
Wort: serbatoio
Wortart: n.m
Wort mit Artikel: il serbatoio
Femininum / Plural: serbatoi
IPA: ''
Definition: der Behälter, -
Register: ''
Beispielsätze: |-
  Il *serbatoio* della macchina è quasi vuoto, dobbiamo fare benzina.
  Der *Behälter* des Autos ist fast leer, wir müssen tanken.
  
  Durante la guerra, hanno usato il *serbatoio* per nascondere le armi.
  Während des Krieges haben sie den *Behälter* genutzt, um die Waffen zu verstecken.
  
  Non sapevo che questo *serbatoio* fosse così pesante da sollevare.
  Ich wusste nicht, dass dieser *Behälter* so schwer zu heben ist.
  
  Appena ho aperto il *serbatoio*, ho sentito un odore strano.
  Sobald ich den *Behälter* geöffnet habe, roch ich einen seltsamen Geruch.
  
  Se il *serbatoio* si riempie troppo, il motore potrebbe avere problemi.
  Wenn der *Behälter* zu voll wird, könnte der Motor Probleme bekommen.
