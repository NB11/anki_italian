  Er fragt mich *ständig*, ob ich die Arbeit schon fertig habe – das ist nervenaufreibend.
  
  L’automobile emetteva *continuamente* un rumore strano che preoccupava tutti.
  Das Auto machte *ständig* ein komisches Geräusch, was alle beunruhigte.
