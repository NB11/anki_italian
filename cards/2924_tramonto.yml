Rang: 2924
Wort: tramonto
Wortart: n.m
Wort mit Artikel: il tramonto
Femininum / Plural: tramonti
IPA: ''
Definition: der Sonnenuntergang, -e
Register: ''
Beispielsätze: |-
  Mentre camminavamo verso casa, abbiamo ammirato il *tramonto* sulla spiaggia.
  Während wir nach Hause gingen, bewunderten wir den *Sonnenuntergang* am Strand.
  
  Dicono che dopo il *tramonto* non sia più sicuro girare per la città da soli.
  Sie sagen, dass nach dem *Sonnenuntergang* es nicht mehr sicher ist, allein durch die Stadt zu laufen.
  
  Se avessi più tempo, vorrei catturare ogni *tramonto* con la macchina fotografica.
  Wenn ich mehr Zeit hätte, würde ich jeden *Sonnenuntergang* mit der Kamera festhalten.
  
  È bello che tu abbia pensato di prenotare un tavolo con vista sul *tramonto* per stasera.
  Es ist schön, dass du an einen Tisch mit Blick auf den *Sonnenuntergang* für heute Abend gedacht hast.
  
  L’idea di partire proprio al *tramonto* mi sembra romantica, ma forse è solo una stupidaggine.
  Die Idee, genau beim *Sonnenuntergang* loszufahren, kommt mir zwar romantisch vor, aber vielleicht ist es wirklich nur eine Dummheit.
