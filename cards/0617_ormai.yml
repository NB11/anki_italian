Rang: 617
Wort: ormai
Wortart: adv
Wort mit Artikel: ormai
Femininum / Plural: ''
IPA: ''
Definition: jetzt, bereits, schon
Register: ''
Beispielsätze: |-
  *Ormai* sono le otto di sera, quindi andiamo a dormire.
  Es ist *jetzt* acht Uhr abends, also gehen wir schlafen.
  
  *Ormai* ti conosco abbastanza bene per capire che non dirai la verità.
  Ich kenne dich *bereits* gut genug, um zu wissen, dass du die Wahrheit nicht sagen wirst.
  
  Non cambierà *ormai* nulla, purtroppo.
  Es wird *jetzt* leider nichts mehr ändern.
  
  *Ormai* che ci sei, perché non resti a cena con noi?
  *Da du schon* hier bist, warum bleibst du nicht zum Abendessen bei uns?
  
  Siamo *ormai* a metà del percorso, ma la strada è ancora lunga.
  Wir sind *bereits* auf halber Strecke, aber der Weg ist noch lang.
