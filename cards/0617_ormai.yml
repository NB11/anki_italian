Rang: 617
Wort: ormai
Wortart: adv
Wort mit Artikel: ormai
Femininum / Plural: ''
IPA: ''
Definition: mittlerweile, nun
Register: ''
Beispielsätze: |-
  Ho aspettato per un’ora, ma *ormai* non ha più senso restare qui.
  Ich habe eine Stunde gewartet, aber *nun* ergibt es keinen Sinn mehr, hier zu bleiben.
  
  Ieri ho visto dei ragazzi che cantavano *ormai* stanchi sotto l’albero di Natale.
  Gestern habe ich Jugendliche gesehen, die *mittlerweile* müde unter dem Weihnachtsbaum sangen.
  
  Sebbene fosse un dolore terribile, *ormai* sapevo che dovevo mantenere la calma per risolvere la questione.
  Obwohl es ein schrecklicher Schmerz war, wusste ich *mittlerweile*, dass ich ruhig bleiben musste, um die Frage zu lösen.
  
  Dicono che gli studi sul cancro abbiano fatto passi da gigante, ma *ormai* la ricerca è ancora in una fase delicata.
  Man sagt, dass die Krebsforschung große Fortschritte gemacht hat, aber *nun* befindet sie sich noch in einer heiklen Phase.
  
  Dopo tanti anni, ho capito che *ormai* non è più il momento di arrendersi, ma di lottare per il nostro futuro.
  Nach so vielen Jahren habe ich verstanden, dass *mittlerweile* nicht mehr die Zeit ist, um aufzugeben, sondern für unsere Zukunft zu kämpfen.
