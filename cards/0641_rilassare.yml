Rang: 641
Wort: rilassare
Wortart: v
Wort mit Artikel: rilassare
Femininum / Plural: ''
IPA: ''
Definition: entspannen, lockern
Register: ''
Beispielsätze: |-
  Dopo una lunga giornata di lavoro, mi piace *rilassare* con della musica calma.
  Nach einem langen Arbeitstag mag ich mich mit ruhiger *Musik* entspannen.
  
  Se *rilassi* i muscoli ogni sera, non soffrirai più di dolore alla schiena.
  Wenn du die Muskeln jeden Abend *lockerst*, wirst du keine Rückenschmerzen mehr haben.
  
  Non sapevo che volessi *rilassarti* al mare invece che camminare per la città.
  Ich wusste nicht, dass du dich am Meer *entspannen* wolltest, statt durch die Stadt zu laufen.
  
  Appena arrivo a casa, *rilasso* la mente leggendo un libro interessante.
  Sobald ich nach Hause komme, *entspanne* ich mich, indem ich ein interessantes Buch lese.
  
  Spero che questo weekend riuscirai finalmente a *rilassarti* senza pensieri.
  Ich hoffe, dass du am Wochenende endlich in der Lage bist, dich ohne Gedankensorgen zu *entspannen*.
