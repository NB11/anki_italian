Rang: 641
Wort: rilassare
Wortart: v
Wort mit Artikel: rilassare
Femininum / Plural: ''
IPA: ''
Definition: entspannen, lockern
Register: ''
Beispielsätze: |-
  Dopo una lunga giornata di lavoro, mi piace *rilassarmi* con una tazza di tè.
  Nach einem langen Arbeitstag entspanne ich mich gern mit einer Tasse Tee.
  
  Se *rilassi* troppo spesso, non riuscirai a mantenere la concentrazione necessaria.
  Wenn du dich zu oft entspannst, kannst du die nötige Konzentration nicht aufrechterhalten.
  
  Ho bisogno di *rilassarmi* prima dell’esame domani mattina.
  Ich muss mich vor der Prüfung morgen früh entspannen.
  
  Perché non *rilassate* le spalle? Siete tutti tesi.
  Warum entspannt ihr die Schultern nicht? Ihr seid alle verspannt.
  
  Mi piacerebbe che tutti si *rilassassero* un po’ di più nella vita.
  Ich würde mir wünschen, dass sich alle im Leben ein bisschen mehr entspannen.
