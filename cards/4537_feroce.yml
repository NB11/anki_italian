Rang: 4537
Wort: feroce
Wortart: adj
Wort mit Artikel: feroce
Femininum / Plural: ''
IPA: ''
Definition: wild, grausam, wild
Register: ''
Beispielsätze: |-
  Il lupo è un animale *feroce* che vive nelle foreste del Nord Italia.
  Der Wolf ist ein *wildes* Tier, das in den Wäldern Norditaliens lebt.
  
  Nonostante il suo aspetto *feroce*, il gattino è davvero timido.
  Trotz seines *wilden* Aussehens ist das Kätzchen wirklich schüchtern.
  
  Gli ambientalisti denunciano la *ferocia* di alcune pratiche di caccia illegale.
  Die Umweltschützer klagen die *Grausamkeit* einiger illegaler Jagdpraktiken an.
  
  Se avvistiamo un animale *feroce* nella città, dobbiamo chiamare immediatamente i vigili.
  Wenn wir ein *wildes* Tier in der Stadt entdecken, müssen wir sofort die Polizei anrufen.
  
  Il comportamento *feroce* del concorrente durante la competizione ha sorpreso tutti.
  Das *wilde* Verhalten des Konkurrenten während des Wettbewerbs hat alle überrascht.
