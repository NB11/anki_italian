Rang: 816
Wort: speranza
Wortart: n.f
Wort mit Artikel: la speranza
Femininum / Plural: speranze
IPA: ''
Definition: die Hoffnung, -en
Register: ''
Beispielsätze: |-
  La *speranza* è l'ultima a morire, dicono molti.
  Die *Hoffnung* stirbt zuletzt, sagen viele.
  
  Nonostante le difficoltà, mantengo sempre la *speranza* di un futuro migliore.
  Trotz der Schwierigkeiten behalte ich immer die *Hoffnung* auf eine bessere Zukunft.
  
  Se perderai la *speranza*, perderai anche la ragione di andare avanti.
  Wenn du die *Hoffnung* verlierst, verlierst du auch den Grund weiterzumachen.
  
  La *speranza* che mio nonno abbia ragione mi aiuta a superare questa pena.
  Die *Hoffnung*, dass mein Großvater recht hat, hilft mir, diesen Schmerz zu ertragen.
  
  Nonostante tutto, lui non riesce ad abbandonare la *speranza* di incontrarla un giorno.
  Trotz allem kann er die *Hoffnung* nicht aufgeben, sie eines Tages zu treffen.
