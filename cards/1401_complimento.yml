Rang: 1401
Wort: complimento
Wortart: n.m
Wort mit Artikel: il complimento
Femininum / Plural: i complimenti
IPA: ''
Definition: das Kompliment, -e
Register: ''
Beispielsätze: |-
  Ho ricevuto molti *complimenti* per il mio nuovo vestito durante la festa ieri sera.
  Ich habe viele *Komplimente* für mein neues Kleid auf der Party gestern Abend erhalten.
  
  Se non fosse per i tuoi *complimenti* costanti, non mi sentirei mai sicuro di me stesso.
  Wenn es nicht deine ständigen *Komplimente* wären, würde ich mich nie sicher fühlen.
  
  Il sindaco ha fatto *complimenti* al genio del liceo per i suoi risultati eccezionali.
  Der Bürgermeister machte dem *Genie* des Gymnasiums Komplimente für seine außergewöhnlichen Leistungen.
  
  Stavo per rispondere al *complimento*, ma poi ho notato che era solo una battuta provocatoria.
  Ich wollte gerade auf das *Kompliment* antworten, als mir auffiel, dass es nur ein provokanter Spruch war.
  
  Non sopporto quando le persone esagerano con i *complimenti* che non meritano davvero.
  Ich kann es nicht ausstehen, wenn Leute mit *Komplimenten* übertrieben, die sie gar nicht verdienen.
