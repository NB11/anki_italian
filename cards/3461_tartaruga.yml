Rang: 3461
Wort: tartaruga
Wortart: n.f
Wort mit Artikel: la tartaruga
Femininum / Plural: tartarughe
IPA: ''
Definition: die Schildkröte, -n
Register: ''
Beispielsätze: |-
  La *tartaruga* si muove molto lentamente ma può vivere per decenni.
  Die *Schildkröte* bewegt sich sehr langsam, kann aber jahrzehntelang leben.
  
  Se vedo una *tartaruga* in giardino, la osservo con attenzione.
  Wenn ich eine *Schildkröte* im Garten sehe, beobachte ich sie aufmerksam.
  
  Dove hai trovato questa *tartaruga*? È rarissima in questa regione!
  Wo hast du diese *Schildkröte* gefunden? Sie ist sehr selten in dieser Region!
  
  Credo che una *tartaruga* abbia attraversato il sentiero mentre eravamo in agosto.
  Ich glaube, eine *Schildkröte* ist über den Pfad gekrochen, während wir im August dort waren.
  
  Nonostante sia distante dalla sua sfera naturale, la *tartaruga* sembra adattarsi bene al nuovo ambiente.
  Obwohl sie weit weg von ihrer natürlichen *Sphäre* ist, scheint sich die Schildkröte gut an die neue Umgebung anzupassen.
