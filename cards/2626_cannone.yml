Rang: 2626
Wort: cannone
Wortart: n.m
Wort mit Artikel: il cannone
Femininum / Plural: cannoni
IPA: ''
Definition: die Kanone, -n
Register: ''
Beispielsätze: |-
  Il *cannone* sparò un colpo durante la parata militare di ieri mattina.
  Die *Kanone* feuerte einen Schuss während der Militärparade gestern Morgen.
  
  Non appena ho sentito il fragore del *cannone*, ho capito che eravamo sotto attacco.
  Sobald ich den Donner der *Kanone* hörte, wusste ich, dass wir unter Beschuss standen.
  
  Durante la visita al museo, il turista volle sapere tutto sul funzionamento del *cannone* medievale.
  Während des Museumsbesuchs wollte der Tourist alles über die Funktionsweise der mittelalterlichen *Kanone* wissen.
  
  Se avessimo un *cannone* più moderno, la nostra artiglieria sarebbe invincibile.
  Wenn wir eine modernere *Kanone* hätten, wäre unsere Artillerie unbesiegbar.
  
  Nonostante l'età, il vecchio *cannone* del forte riuscì ancora a sparare con precisione.
  Trotz seines Alters konnte die alte *Kanone* der Festung noch präzise feuern.
