Rang: 4704
Wort: intrattenere
Wortart: vt
Wort mit Artikel: intrattenere
Femininum / Plural: ''
IPA: ''
Definition: unterhalten, beschäftigen
Register: ''
Beispielsätze: |-
  La zia *intrattiene* i bambini con un gioco di carte mentre preparo la cena.
  Die Tante *unterhält* die Kinder mit einem Kartenspiel, während ich das Abendessen vorbereite.
  
  Mi dispiace, ma non posso *intrattenere* te ora perché ho molto da fare.
  Tut mir leid, aber ich kann *dich* jetzt nicht unterhalten, weil ich viel zu tun habe.
  
  Il museo *intrattenne* i visitatori con una mostra interattiva che spiegava l’evoluzione delle specie.
  Das Museum *unterhielt* die Besucher mit einer interaktiven Ausstellung, die die Evolution der Arten erklärte.
  
  Se avessi tempo, *intrattenerei* gli ospiti con delle storie divertenti sulle mie vacanze.
  Wenn ich Zeit hätte, würde ich die Gäste mit lustigen Geschichten über meinen Urlaub *unterhalten*.
  
  È importante *intrattenere* la mente con attività stimolanti per prevenire la noia.
  Es ist wichtig, den Geist mit anregenden Aktivitäten zu *unterhalten*, um Langeweile zu vermeiden.
