Rang: 1594
Wort: tazza
Wortart: n.f
Wort mit Artikel: la tazza
Femininum / Plural: tazze
IPA: ''
Definition: die Tasse, -n
Register: ''
Beispielsätze: |-
  Mi sono dimenticato di lavare *tazza* prima di uscire.
  Ich habe vergessen, die *Tasse* vor dem Gehen abzuwaschen.
  
  Nonostante la *tazza* fosse rotta, l’ho rimessa a posto con della colla.
  Obwohl die *Tasse* kaputt war, habe ich sie mit Kleber wieder heil gemacht.
  
  Se avessimo una *tazza* più grande, potremmo servire tutti il caffè insieme.
  Wenn wir eine größere *Tasse* hätten, könnten wir allen zusammen den Kaffee servieren.
  
  Ho comprato una *tazza* con sopra la foto della mia gatta, che si chiama Alice.
  Ich habe eine *Tasse* mit dem Foto meiner Katze gekauft, die Alice heißt.
  
  Quando la mamma vide la *tazza* rotta, capì subito chi era stato.
  Als die Mutter die kaputte *Tasse* sah, wusste sie sofort, wer es gewesen war.
