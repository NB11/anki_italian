Rang: 4675
Wort: formale
Wortart: adj
Wort mit Artikel: formale
Femininum / Plural: formali
IPA: ''
Definition: formell, förmlich
Register: ''
Beispielsätze: |-
  Il contratto richiede una firma *formale* da parte del direttore.
  Der Vertrag erfordert eine *förmliche* Unterschrift des Direktors.
  
  Senza un invito *formale* non possiamo entrare nella festa privata.
  Ohne eine *formelle* Einladung können wir nicht zur privaten Feier kommen.
  
  La risposta che hai dato era troppo *formale* per una conversazione amichevole.
  Die Antwort, die du gegeben hast, war zu *förmlich* für ein lockeres Gespräch.
  
  Gli venne in mente solo dopo che la richiesta del visto era troppo *formale* e poco personale.
  Er fiel es erst später ein, dass die Visumsanfrage zu *formell* und wenig persönlich war.
  
  Se avessimo seguito le procedure *formali*, l’operazione sarebbe durata settimane.
  Hätten wir die *formellen* Verfahren befolgt, hätte die Operation Wochen gedauert.
