Beispielsätze: |-
  Non è consigliabile fumare *marijuana* senza conoscere i rischi sanitari.
  Es ist nicht ratsam, *Marihuana* zu rauchen, ohne die gesundheitlichen Risiken zu kennen.
  
  La legge italiana vieta la vendita di *marijuana* senza prescrizione medica.
  Das italienische Gesetz verbietet den Verkauf von *Marihuana* ohne ärztliches Rezept.
  
  Ho sentito che alcuni pazienti usano *marijuana* per alleviare il dolore cronico.
  Ich habe gehört, dass einige Patienten *Marihuana* verwenden, um chronische Schmerzen zu lindern.
  
  Se continuerai a fumare *marijuana* così spesso, rischi di compromettere la tua memoria.
  Wenn du weiterhin so oft *Marihuana* rauchst, riskierst du, dein Gedächtnis zu beeinträchtigen.
  
  Nonostante la sua reputazione, *marijuana* può avere effetti benefici in dosi controllate.
  Trotz seines Rufs kann *Marihuana* in kontrollierten Dosen positive Wirkungen haben.
