Rang: 1370
Wort: liceo
Wortart: n.m
Wort mit Artikel: il liceo
Femininum / Plural: licei
IPA: ''
Definition: das Gymnasium, -een
Register: ''
Beispielsätze: |-
  Mio fratello frequenta *liceo* classico perché ama la letteratura antica.
  Mein Bruder besucht ein *Gymnasium*, weil er die antike Literatur liebt.
  
  Dopo la maturità al *liceo*, molti studenti vanno all’università.
  Nach dem Abitur am *Gymnasium* studieren die meisten Schüler an einer Universität.
  
  Sei mai stato a un *liceo* dove si insegna in due lingue?
  Warst du schon einmal an einem *Gymnasium*, an dem zweisprachig unterrichtet wird?
  
  Il preside del nostro *liceo* ha annunciato che quest’anno ci sarà una festa speciale.
  Der Schulleiter unseres *Gymnasiums* hat angekündigt, dass es dieses Jahr ein besonderes Fest geben wird.
  
  Per scegliere il *liceo* giusto, dovresti anche considerare la distanza da casa tua.
  Um das richtige *Gymnasium* auszuwählen, solltest du auch die Entfernung von deinem Zuhause berücksichtigen.
