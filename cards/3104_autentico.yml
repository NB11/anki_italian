Rang: 3104
Wort: autentico
Wortart: adj
Wort mit Artikel: autentico
Femininum / Plural: ''
IPA: ''
Definition: echt, authentisch
Register: ''
Beispielsätze: |-
  Questo dipinto sembra *autentico*, ma in realtà è una copia perfetta.
  Dieses Gemälde scheint *authentisch* zu sein, ist aber eine perfekte Kopie.
  
  Credo che questa storia sia la più *autentica* che abbia mai sentito.
  Ich glaube, dass diese Geschichte die *authentischste* ist, die ich je gehört habe.
  
  Per essere considerato *autentico*, un documento deve avere una firma originale.
  Um als *echt* zu gelten, muss ein Dokument eine Originalunterschrift haben.
  
  Ha speso una fortuna per un orologio che si è rivelato *autentico*.
  Er hat ein Vermögen für eine Uhr ausgegeben, die sich als *echt* herausstellte.
  
  Anche se non è *autentico*, questo filmato sembra molto convincente.
  Auch wenn es nicht *authentisch* ist, wirkt dieses Filmmaterial sehr überzeugend.
