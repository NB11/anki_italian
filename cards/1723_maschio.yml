Rang: 1723
Wort: maschio
Wortart: n.m
Wort mit Artikel: il maschio
Femininum / Plural: maschi
IPA: ''
Definition: das Männchen, - / der Mann, -¨er
Register: ''
Beispielsätze: |-
  Secondo recenti studi, il *maschio* è più vulnerabile alle malattie cardiache.
  Laut aktuellen Studien ist das *Männchen* anfälliger für Herzerkrankungen.
  
  Quel cane è un *maschio*, ho controllato la sua scheda veterinaria.
  Dieser Hund ist ein *Männchen*, ich habe seine Tierkarte überprüft.
  
  In molti mammiferi il *maschio* ha dimensioni più grandi della femmina.
  Bei vielen Säugetieren ist das *Männchen* größer als das Weibchen.
  
  Li ho visti insieme: lui è evidentemente un *maschio* molto forte.
  Ich habe sie zusammen gesehen: Er ist offensichtlich ein sehr starker *Mann*.
  
  Il *maschio* della famiglia si occupa spesso delle riparazioni domestiche.
  Das *Männchen* in der Familie übernimmt oft die Hausreparaturen.
