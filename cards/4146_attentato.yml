Rang: 4146
Wort: attentato
Wortart: n.m
Wort mit Artikel: lo attentato
Femininum / Plural: gli attentati
IPA: ''
Definition: das Attentat, -e
Register: ''
Beispielsätze: |-
  Dopo *attentato* di ieri, la polizia ha interrogato diversi testimoni.
  Nach dem *Attentat* von gestern hat die Polizei mehrere Zeugen befragt.
  
  I politici hanno condannato con fermezza l'*attentato* terroristico.
  Die Politiker haben das terroristische *Attentat* entschieden verurteilt.
  
  L'*attentato* è stato sventato grazie a un tempestivo intervento delle forze dell'ordine.
  Das *Attentat* wurde durch ein rechtzeitiges Eingreifen der Sicherheitskräfte verhindert.
  
  Se avessi saputo dei rischi, non avrei partecipato a quella manifestazione dove c'è stato l'*attentato*.
  Wenn ich die Risiken gekannt hätte, hätte ich an der Demonstration, wo das *Attentat* stattfand, nicht teilgenommen.
  
  Purtroppo, l'*attentato* ha causato numerose vittime innocenti nella folla radunata in piazza.
  Leider hat das *Attentat* zahlreiche unschuldige Opfer in der versammelten Menschenmenge verursacht.
