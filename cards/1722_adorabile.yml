Rang: 1722
Wort: adorabile
Wortart: adj
Wort mit Artikel: adorabile
Femininum / Plural: ''
IPA: ''
Definition: niedlich, liebenswert
Register: ''
Beispielsätze: |-
  Questo cucciolo è *adorabile* e tutti lo vogliono accarezzare.
  Dieses Welpe ist *niedlich* und alle wollen ihn streicheln.
  
  Penso che il suo sorriso sia *adorabile*, non trovi?
  Ich finde, ihr Lächeln ist *liebenswert*, meinst du nicht?
  
  Hanno definito la bambina *adorabile* perché rideva senza sosta.
  Sie haben das Mädchen als *niedlich* bezeichnet, weil es ununterbrochen lachte.
  
  Se fosse più *adorabile*, probabilmente riceverebbe ancora più attenzioni.
  Wenn es noch *liebenswerter* wäre, würde es wahrscheinlich noch mehr Aufmerksamkeit bekommen.
  
  È *adorabile* come cerca di nascondersi dietro le mie gambe ogni volta che sente un rumore forte.
  Es ist *niedlich*, wie es sich jedes Mal hinter meinen Beinen versteckt, wenn es ein lautes Geräusch hört.
