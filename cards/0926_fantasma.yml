Rang: 926
Wort: fantasma
Wortart: n.m
Wort mit Artikel: il fantasma
Femininum / Plural: fantasmi
IPA: ''
Definition: das Gespenst, -er
Register: ''
Beispielsätze: |-
  Dicono che in quel *fantasma* abiti uno spirito inquieto da secoli.
  Man sagt, dass in diesem *Gespenst* ein unruhiger Geist seit Jahrhunderten wohnt.
  
  Se *fantasmi* esistono, allora la mia teoria sull'aldilà è corretta!
  Wenn *Gespenster* existieren, dann ist meine Theorie über das Jenseits richtig!
  
  Il professore ha spiegato che alcuni *fantasmi* sono solo ricordi che non vogliamo levare.
  Der *Professor* hat erklärt, dass einige Gespenster nur Erinnerungen sind, die wir nicht loswerden wollen.
  
  Nonostante le condizioni avverse, gli eroi hanno continuato ad agire nonostante il *fantasma* che li spaventava.
  Trotz der widrigen *Bedingungen* haben die Helden weiter gehandelt, obwohl sie von dem Gespenst erschreckt wurden.
  
  Ho sentito che nell'hotel vicino al muro c'è un passaggio segreto, ma nessuno vuole entrarci per paura del *fantasma* lì nascosto.
  Ich habe gehört, dass es in dem *Hotel* in der Nähe der Mauer einen geheimen Durchgang gibt, aber niemand will hineingehen aus Angst vor dem dort versteckten Gespenst.
