Rang: 3882
Wort: crescita
Wortart: n.f
Wort mit Artikel: la crescita
Femininum / Plural: crescite
IPA: ''
Definition: das Wachstum, das Zunehmen
Register: ''
Beispielsätze: |-
  La *crescita* economica di questo paese è molto lenta negli ultimi anni.
  Das *Wachstum* der Wirtschaft dieses Landes ist in den letzten Jahren sehr langsam.
  
  Abbiamo notato una notevole *crescita* della popolazione nel nostro quartiere.
  Wir haben ein beträchtliches *Zunehmen* der Bevölkerung in unserem Viertel beobachtet.
  
  Nonostante la recessione, la *crescita* delle vendite online rimane costante.
  Trotz der Rezession bleibt das *Wachstum* der Online-Verkäufe konstant.
  
  La *crescita* delle piante dipende molto dalla quantità di acqua e luce che ricevono.
  Das *Wachstum* der Pflanzen hängt stark von der Menge an Wasser und Licht ab, die sie erhalten.
  
  Il governo spera che l’introduzione di nuove tasse favorisca la *crescita* industriale.
  Die Regierung hofft, dass die Einführung neuer Steuern das *Wachstum* der Industrie begünstigt.
