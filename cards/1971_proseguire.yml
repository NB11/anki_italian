Rang: 1971
Wort: proseguire
Wortart: vi
Wort mit Artikel: proseguire
Femininum / Plural: ''
IPA: ''
Definition: fortfahren, weitergehen, fortsetzen
Register: ''
Beispielsätze: |-
  Nonostante la pioggia, decidemmo di *proseguire* il nostro viaggio verso la montagna.
  Trotz des Regens beschlossen wir, unsere Reise in die Berge *fortzusetzen*.
  
  Se avessi saputo la verità, avrei voluto *proseguire* le indagini da solo.
  Hätte ich die Wahrheit gekannt, hätte ich die Ermittlungen allein *fortführen* wollen.
  
  Anche se era tardi, *proseguirono* a discutere dei loro progetti futuri.
  Auch wenn es spät war, *setzten* sie die Diskussion über ihre Zukunftspläne fort.
  
  Lui *proseguiva* a scrivere romanzi gialli che diventavano bestseller.
  Er *setzte* das Schreiben von Krimiromanen fort, die zu Bestsellern wurden.
  
  Quando il direttore se ne andò, tutti pensarono che sarebbe stato meglio *proseguire* senza di lui.
  Als der Direktor ging, dachte jeder, es wäre besser, ohne ihn *weiterzumachen*.
