Rang: 16
Wort: vedere
Wortart: vt
Wort mit Artikel: vedere
Femininum / Plural: ''
IPA: ''
Definition: sehen, ansehen
Register: ''
Beispielsätze: |-
  Oggi *vedo* un bel film al cinema.
  Heute *sehe* ich einen schönen Film im Kino.
  
  Ieri *ha visto* la sua amica in piazza.
  Gestern *hat* er *seine* Freundin auf dem Platz *gesehen*.
  
  *Vedi* quella casa in fondo alla strada?
  *Siehst* du jenes Haus am Ende der Straße?
  
  Spero che *veda* presto la luce del sole.
  Ich hoffe, dass er bald das Sonnenlicht *sieht*.
  
  Se *vedrai* questo spettacolo, mi darai ragione.
  Wenn du *dieses* Spektakel *siehst*, wirst du mir recht geben.
