Rang: 3679
Wort: fragile
Wortart: adj
Wort mit Artikel: fragile
Femininum / Plural: ''
IPA: ''
Definition: zerbrechlich, zart
Register: ''
Beispielsätze: |-
  Il vaso di cristallo è molto *fragile*, quindi maneggialo con cura.
  Die Kristallvase ist sehr *zerbrechlich*, also handle sie vorsichtig.
  
  Secondo la mia opinione, le relazioni tra loro sono troppo *fragili* per durare a lungo.
  Meiner Meinung nach sind die Beziehungen zwischen ihnen zu *fragil*, um lange zu halten.
  
  Avevano promesso che la tregua sarebbe stata *fragile*, ma nessuno si aspettava un conflitto.
  Sie hatten versprochen, dass der Waffenstillstand *zerbrechlich* sein würde, aber niemand rechnete mit einem Konflikt.
  
  Se il vetro fosse *fragile* come sembra, si romperebbe già con un colpo di vento.
  Wenn das Glas so *zerbrechlich* wäre wie es aussieht, würde es schon bei einem Windstoß brechen.
  
  Nonostante le sue *fragili* Difese, riuscì a sorprenderci con la sua forza.
  Trotz seiner *zerbrechlichen* Abwehr überraschte er uns mit seiner Stärke.
