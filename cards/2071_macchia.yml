Rang: 2071
Wort: macchia
Wortart: n.f
Wort mit Artikel: la macchia
Femininum / Plural: macchie
IPA: ''
Definition: der Fleck, -e
Register: ''
Beispielsätze: |-
  Ho comprato un vestito nuovo, ma per *macchia* di vino sulla camicia che ho fatto a una festa.
  Ich habe ein neues Kleid gekauft, aber wegen eines *Flecks* von Wein auf meinem Hemd, den ich bei einer Party gemacht habe.
  
  La *macchia* di olio sul tappeto si vede ancora dopo il lavaggio.
  Der *Fleck* von Öl auf dem Teppich ist auch nach dem Waschen noch sichtbar.
  
  Se metti la lana in lavatrice a 60 gradi, la *macchia* di grasso non verrà via.
  Wenn du die Wolle bei 60 Grad in die Waschmaschine gibst, wird der *Fleck* von Fett nicht verschwinden.
  
  Si dice che al ristorante abbia ordinato una dozzina di *macchie* di vino per decorare il pavimento.
  Man sagt, dass er im Restaurant ein Dutzend *Flecken* Wein bestellt hat, um den Boden zu dekorieren.
  
  Nonostante abbia usato il *macchia* di legno, la superficie non è ancora perfettamente liscia.
  Trotz der Verwendung des *Fleckenentferners* ist die Oberfläche immer noch nicht perfekt glatt.
