Rang: 759
Wort: corso
Wortart: n.m
Wort mit Artikel: il corso
Femininum / Plural: corsi
IPA: ''
Definition: der Kurs, -e, die Kursstufe, -n
Register: ''
Beispielsätze: |-
  Ho appena finito un *corso* di italiano molto intenso presso la scuola della mia città.
  Ich habe gerade einen sehr intensiven *Italienischkurs* an der Schule meiner Stadt abgeschlossen.
  
  Se vuoi imparare a cucinare, ti consiglio di frequentare un *corso* di cucina giapponese.
  Wenn du kochen lernen möchtest, empfehle ich dir, einen *Kochkurs* für japanische Küche zu besuchen.
  
  Nonostante la *corsa* contro il tempo, il professore riuscì a spiegare tutti gli argomenti del corso.
  Trotz des *Laufs* gegen die Zeit schaffte es der Professor, alle Themen des Kurses zu erklären.
  
  Il *corso* di laurea in ingegneria richiede molti anni di studio e grande dedizione.
  Das *Studium* der Ingenieurwissenschaften erfordert viele Studienjahre und große Hingabe.
  
  Durante la serata culturale, hanno presentato un nuovo *corso* di pittura che inizierà a marzo.
  Während des Kulturabends haben sie einen neuen *Malkurs* vorgestellt, der im März beginnt.
