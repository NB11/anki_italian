Rang: 530
Wort: indossare
Wortart: vt
Wort mit Artikel: indossare
Femininum / Plural: ''
IPA: ''
Definition: tragen, anziehen
Register: ''
Beispielsätze: |-
  Oggi *indosso* una camicia blu.
  Heute *trage* ich ein blaues Hemd.
  
  Hai già *indossato* la giacca nuova?
  Hast du die neue Jacke schon *angezogen*?
  
  Domani *indosserò* un completo elegante.
  Morgen werde ich einen eleganten Anzug *tragen*.
  
  *Indossavamo* sempre scarpe comode quando camminavamo molto.
  Wir *zogen* immer bequeme Schuhe an, wenn wir viel liefen.
  
  Se fossi ricco, *indosserei* solo abiti di marca.
  Wenn ich reich wäre, würde ich nur Markenkleidung *tragen*.
