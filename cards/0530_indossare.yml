Rang: 530
Wort: indossare
Wortart: vt
Wort mit Artikel: indossare
Femininum / Plural: ''
IPA: ''
Definition: tragen, anziehen, anlegen
Register: ''
Beispielsätze: |-
  Ogni mattina devo *indosso* una camicia bianca per lavorare.
  Jeden Morgen muss ich mir ein weißes Hemd *anziehen*.
  
  Se non ti piace la gonna che hai *indossato* ieri, puoi cambiarla oggi stesso.
  Wenn dir der Rock, den du gestern *getragen hast*, nicht gefällt, kannst du ihn heute noch wechseln.
  
  Vuoi che ti *indossi* la giacca per uscire o preferisci restare senza?
  Soll ich dir die Jacke *anziehen*, um rauszugehen, oder möchtest du lieber ohne bleiben?
  
  Ha promesso di *indossare* la cravatta almeno una volta alla settimana durante il viaggio d’affari.
  Er hat versprochen, während der Geschäftsreise mindestens einmal pro Woche die Krawatte *anzuziehen*.
  
  Credi che basterà *indossare* un vestito elegante per impressionare il presidente o serve qualcosa di più?
  Glaubst du, es reicht, ein elegantes Kleid zu *tragen*, um den Präsidenten zu beeindrucken, oder braucht es noch mehr?
