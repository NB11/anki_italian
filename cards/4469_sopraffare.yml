Rang: 4469
Wort: sopraffare
Wortart: vt
Wort mit Artikel: sopraffare
Femininum / Plural: ''
IPA: ''
Definition: überwältigen, überwinden
Register: ''
Beispielsätze: |-
  La folla ha *sopraffatto* i poliziotti durante la protesta violenta.
  Die Menge hat die Polizisten während der gewaltsamen Proteste *überwältigt*.
  
  Se non avessi *sopraffatto* le mie paure, non avrei mai accettato quel lavoro.
  Hätte ich meine Ängste nicht *überwunden*, hätte ich die Stelle nie angenommen.
  
  Dicono che l’odio *sopraffà* ogni razionalità in questi momenti storici.
  Man sagt, dass der Hass in diesen historischen Momenten jede Rationalität *überwältigt*.
  
  Spero che l’esercito riesca a *sopraffare* i ribelli nel giro di poche settimane.
  Ich hoffe, dass das Militär die Rebellen innerhalb weniger Wochen *überwältigen* kann.
  
  Era così stanco che la stanchezza gli *sopraffà* subito dopo il pasto.
  Er war so müde, dass ihn die Müdigkeit sofort nach dem Essen *überwältigte*.
