Rang: 3582
Wort: soffiata
Wortart: n.f
Wort mit Artikel: la soffiata
Femininum / Plural: soffiate
IPA: ''
Definition: der/die Atemstoß, der Hauch
Register: ''
Beispielsätze: |-
  Il medico ha fatto una *soffiata* per controllare le vie respiratorie del paziente.
  Der Arzt hat einen *Atemstoß* gemacht, um die Atemwege des Patienten zu prüfen.
  
  Una forte *soffiata* di vento ha fatto cadere il ombrello che tenevo in mano.
  Ein kräftiger *Hauch* Wind hat den Regenschirm fallen lassen, den ich in der Hand hielt.
  
  Dopo la corsa, aveva una *soffiata* di fiato corto e dovette fermarsi.
  Nach dem Lauf hatte er einen *Atemstoß* und musste stehen bleiben.
  
  Nonostante la *soffiata* di aria fredda, il fuoco non si spense mai completamente.
  Trotz des *Luftstoßes* erlosch das Feuer nie vollständig.
  
  La *soffiata* delle sue labbra era così leggera che quasi non si sentiva.
  Der *Hauch* aus ihren Lippen war so leicht, dass man ihn kaum spürte.
