Rang: 4851
Wort: reattore
Wortart: n.m
Wort mit Artikel: il reattore
Femininum / Plural: reattori
IPA: ''
Definition: der Reaktor, -en
Register: ''
Beispielsätze: |-
  Nel *reattore* nucleare si produce energia grazie alla fissione dell'uranio.
  Im *Reaktor* wird durch Kernspaltung Energie erzeugt.
  
  Hanno costruito un nuovo *reattore* per aumentare la produzione di elettricità.
  Sie haben einen neuen *Reaktor* gebaut, um die Stromproduktion zu steigern.
  
  Se il *reattore* dovesse guastarsi, ci sarebbe un grave pericolo.
  Falls der *Reaktor* ausfällt, bestünde große Gefahr.
  
  Gli scienziati stanno studiando come rendere i *reattori* ancora più sicuri.
  Die Wissenschaftler erforschen, wie man *Reaktoren* noch sicherer machen kann.
  
  Il governo ha deciso di chiudere tutti i vecchi *reattori* entro il 2030.
  Die Regierung hat beschlossen, bis 2030 alle alten *Reaktoren* stillzulegen.
