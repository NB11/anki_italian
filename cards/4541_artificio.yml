Rang: 4541
Wort: artificio
Wortart: n.m
Wort mit Artikel: l'artificio
Femininum / Plural: artifici
IPA: ''
Definition: die List, der Kunstgriff, -e
Register: ''
Beispielsätze: |-
  L’*artificio* di Leonardo era famoso in tutta Europa.
  Der *Kunstgriff* Leonardos war in ganz Europa bekannt.
  
  Nonostante l’*artificio*, l’inganno fu presto scoperto.
  Trotz des *Kunstgriffs* wurde der Betrug schnell entdeckt.
  
  Secondo me, questo è un *artificio* inutile per risolvere il problema.
  Meiner Meinung nach ist das ein nutzloser *Kunstgriff*, um das Problem zu lösen.
  
  L’*artificio* del prestidigitazione sembra magia, ma è solo abilità.
  Der *Kunstgriff* der Zauberkunst scheint Magie, ist aber nur Fingerfertigkeit.
  
  Hanno usato un *artificio* per attirare la sua attenzione.
  Sie haben einen *Kunstgriff* verwendet, um seine Aufmerksamkeit zu erregen.
