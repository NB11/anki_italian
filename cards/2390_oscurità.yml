Rang: 2390
Wort: oscurità
Wortart: n.f
Wort mit Artikel: l'oscurità
Femininum / Plural: oscurità
IPA: ''
Definition: die Dunkelheit, die Finsternis
Register: ''
Beispielsätze: |-
  Quando entriamo in questa stanza, siamo colpiti da una *oscurità* totale.
  Wenn wir diesen Raum betreten, werden wir von einer *Dunkelheit* völlig erfasst.
  
  Nonostante la *oscurità*, riuscì a trovare la chiave nella tasca del cappotto.
  Trotz der *Dunkelheit* schaffte er es, den Schlüssel in der Manteltasche zu finden.
  
  In *oscurità* completa, mi sembra di sentire voci che si ripetono all'infinito.
  In völliger *Dunkelheit* scheint es mir, als hörte ich Stimmen, die sich endlos wiederholen.
  
  La *oscurità* della cantina nascondeva molti segreti del passato familiare.
  Die *Dunkelheit* des Kellers verbarg viele Geheimnisse der familiären Vergangenheit.
  
  Se domani dovremo uscire di notte, portiamo una torcia per non restare immersi nella *oscurità*.
  Wenn wir morgen nachts raus müssen, nehmen wir eine Taschenlampe mit, um nicht in der *Dunkelheit* gefangen zu bleiben.
