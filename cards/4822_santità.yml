Rang: 4822
Wort: santità
Wortart: n.f
Wort mit Artikel: la santità
Femininum / Plural: santità
IPA: ''
Definition: die Heiligkeit
Register: ''
Beispielsätze: |-
  La *santità* di una persona si vede nei suoi atti quotidiani.
  Die *Heiligkeit* einer Person zeigt sich in ihren alltäglichen Handlungen.
  
  Molti credono che solo il papa possa raggiungere la *santità*.
  Viele glauben, dass nur der Papst die *Heiligkeit* erreichen kann.
  
  L'eroico gesto di lui ha portato alla sua *santità*.
  Seine heldenhafte Tat hat zu seiner *Heiligkeit* geführt.
  
  Per molti la *santità* è un ideale irraggiungibile.
  Für viele ist die *Heiligkeit* ein unerreichbares Ideal.
  
  La Chiesa cattolica canonizza chi dimostra una vita di *santità*.
  Die katholische Kirche kanonisierst nur, wer ein Leben der *Heiligkeit* nachweist.
