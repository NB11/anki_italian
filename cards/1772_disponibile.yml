Rang: 1772
Wort: disponibile
Wortart: adj
Wort mit Artikel: disponibile
Femininum / Plural: ''
IPA: ''
Definition: verfügbar, bereit
Register: ''
Beispielsätze: |-
  Il negozio è *disponibile* solo fino alle 18:00 oggi.
  Das Geschäft ist nur bis 18 Uhr heute *verfügbar*.
  
  Siamo *disponibili* a firmare il contratto domani mattina.
  Wir sind morgen früh bereit, den Vertrag zu *unterschreiben*.
  
  Nonostante l'incidente, l'ascensore rimane *disponibile* per gli altri inquilini.
  Trotz des Unfalls bleibt der Aufzug für die anderen Mieter *benutzbar*.
  
  I biglietti sono *disponibili* per due settimane presso tutti gli sportelli.
  Die Tickets sind für zwei Wochen an allen Schaltern *erhältlich*.
  
  Se fossi *disponibile* stasera, potremmo andare a cena insieme.
  Wärst du heute Abend *frei*, könnten wir zusammen zu Abend essen.
