Rang: 1337
Wort: albergo
Wortart: n.m
Wort mit Artikel: l'albergo
Femininum / Plural: alberghi
IPA: ''
Definition: das Hotel, -s
Register: ''
Beispielsätze: |-
  L'*albergo* in cui abbiamo soggiornato la settimana scorsa era straordinario!
  Das *Hotel*, in dem wir letzte Woche übernachtet haben, war fantastisch!
  
  Nonostante la distanza, sono riuscito a rintracciare l'*albergo* che cercavo.
  Trotz der *Entfernung* gelang es mir, das Hotel ausfindig zu machen, das ich suchte.
  
  Se non fosse per il *trucco*, la maestà del volto non apparirebbe così perfetta.
  Wenn es nicht das *Make-up* gäbe, würde die Erhabenheit des Gesichts nicht so perfekt erscheinen.
  
  L'ispettore ha detto che l'*albergo* potrebbe essere coinvolto nella trappola.
  Der *Inspektor* sagte, das Hotel könnte in die Falle verwickelt sein.
  
  Speravo che l'*albergo* avesse un giardino così bello da accomodare tutti gli ospiti.
  Ich hatte gehofft, dass das *Hotel* einen so schönen Garten hätte, um alle Gäste unterzubringen.
