Rang: 2807
Wort: imbrogliare
Wortart: v
Wort mit Artikel: imbrogliare
Femininum / Plural: ''
IPA: ''
Definition: betrügen, täuschen, schummeln, manipulieren
Register: ''
Beispielsätze: |-
  Non devi mai *imbrogliare* agli esami, altrimenti rischi di essere bocciato.
  Du darfst bei Prüfungen niemals *betrügen*, sonst riskierst du durchzufallen.
  
  Se vuoi *imbrogliare* il sistema, prima devi capire come funziona veramente.
  Wenn du das System *manipulieren* willst, musst du vorher verstehen, wie es wirklich funktioniert.
  
  Secondo te è giusto *imbrogliare* per ottenere una promozione, anche se non te la meriti?
  Findest du es in Ordnung, *zu schummeln*, um eine Beförderung zu bekommen, obwohl du sie nicht verdienst?
  
  La polizia ha scoperto che l’uomo cercava di *imbrogliare* le assicurazioni con dei documenti falsi.
  Die Polizei hat herausgefunden, dass der Mann versuchte, die Versicherungen mit gefälschten Unterlagen zu *täuschen*.
  
  È meglio perdere una partita onestamente che vincere *imbrogliando*, perché l’onestà conta più di tutto.
  Es ist besser, ehrlich eine Partie zu verlieren, als sie durch *Betrug* zu gewinnen, denn Ehrlichkeit zählt mehr als alles andere.
