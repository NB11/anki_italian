Rang: 4491
Wort: vicepresidente
Wortart: n.m
Wort mit Artikel: il vicepresidente
Femininum / Plural: vicepresidenti
IPA: ''
Definition: der Vizepräsident, -en / die Vizepräsidentin, -nen
Register: ''
Beispielsätze: |-
  Il *vicepresidente* ha parlato alla conferenza al posto del presidente assente.
  Der *Vizepräsident* hat auf der Konferenz für den abwesenden Präsidenten gesprochen.
  
  Anche se era molto giovane, è stato nominato *vicepresidente* della società.
  Obwohl er sehr jung war, wurde er zum *Vizepräsidenten* der Firma ernannt.
  
  Durante la riunione si discuteva se il *vicepresidente* dovesse avere più potere decisionale.
  Während der Besprechung wurde darüber diskutiert, ob der *Vizepräsident* mehr Entscheidungsbefugnis haben sollte.
  
  Se non fosse stato per il *vicepresidente*, l’accordo sarebbe fallito.
  Wäre es nicht für den *Vizepräsidenten* gewesen, wäre die Vereinbarung gescheitert.
  
  I colleghi lo rispettano perché il *vicepresidente* ascolta sempre i loro suggerimenti.
  Seine Kollegen respektieren ihn, weil der *Vizepräsident* immer auf ihre Vorschläge hört.
