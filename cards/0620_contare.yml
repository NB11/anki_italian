Rang: 620
Wort: contare
Wortart: v
Wort mit Artikel: contare
Femininum / Plural: ''
IPA: ''
Definition: zählen, zählen auf
Register: ''
Beispielsätze: |-
  Devi *contare* fino a dieci per calmarti dopo la corsa.
  Du musst dich *beruhigen*, indem du bis zehn zählst.
  
  Non *contiamo* su di te per l’aiuto finanziario, purtroppo.
  Wir *rechnen* nicht mehr mit deiner finanziellen Unterstützung, leider.
  
  Se avessi tempo, vorrei *contare* tutte le stelle del cielo stasera.
  Wenn ich Zeit hätte, würde ich heute Abend alle Sterne am Himmel *zählen* wollen.
  
  Dicono che gli italiani *contino* molto sulla famiglia nelle difficoltà.
  Man sagt, dass Italiener sich in Schwierigkeiten sehr auf die Familie *verlassen*.
  
  Ho *contato* almeno cinquanta persone alla festa di Natale dello zio.
  Ich habe auf der Weihnachtsfeier meines Onkels mindestens fünfzig Personen *gezählt*.
