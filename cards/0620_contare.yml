Rang: 620
Wort: contare
Wortart: v
Wort mit Artikel: contare
Femininum / Plural: ''
IPA: ''
Definition: zählen, berechnen, zählen auf
Register: ''
Beispielsätze: |-
  Io *conto* fino a dieci.
  Ich *zähle* bis zehn.
  
  Quanto *conta* questa fattura?
  Wie viel *kostet* diese Rechnung?
  
  *Conta* su di me per il tuo aiuto!
  Du kannst dich auf mich *verlassen* für deine Hilfe!
  
  Noi abbiamo *contato* tutte le penne nel cassetto.
  Wir haben alle Stifte in der Schublade *gezählt*.
  
  Se *contassi* fino a cento, dormirai meglio.
  Wenn du bis hundert *zählst*, wirst du besser schlafen.
