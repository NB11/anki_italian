Rang: 2510
Wort: allenatore
Wortart: n.m
Wort mit Artikel: l'allenatore
Femininum / Plural: gli allenatori
IPA: ''
Definition: der Trainer, -
Register: ''
Beispielsätze: |-
  L'*allenatore* ha gridato ai suoi giocatori di correre più velocemente.
  Der *Trainer* hat seinen Spielern zugerufen, schneller zu laufen.
  
  Vor lauter insulti l'*allenatore* ha rassegnato le dimissioni.
  Vor lauter Beleidigungen hat der *Trainer* seinen Rücktritt erklärt.
  
  Se l'*allenatore* non fosse stato così severo, la squadra avrebbe perso meno spesso.
  Wenn der *Trainer* nicht so streng gewesen wäre, hätte die Mannschaft seltener verloren.
  
  L'*allenatore* della nazionale brasiliana è stato elogiato per il suo metodo innovativo.
  Der *Trainer* der brasilianischen Nationalmannschaft wurde für seine innovative Methode gelobt.
  
  Chi vorrebbe mai lavorare come *allenatore* in una città così caotica?
  Wer würde schon gern als *Trainer* in einer so chaotischen Stadt arbeiten?
