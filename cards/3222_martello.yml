Beispielsätze: |-
  Il *martello* è uno strumento indispensabile per i lavori manuali.
  Der *Hammer* ist ein unverzichtbares Werkzeug für handwerkliche Arbeiten.
  
  Ho bisogno di un *martello* più pesante per questo chiodo.
  Ich brauche einen *schwereren Hammer* für diesen Nagel.
  
  L'artigiano ha usato il *martello* con precisione per assemblare il mobile.
  Der Handwerker hat den *Hammer* präzise verwendet, um das Möbelstück zusammenzubauen.
  
  Senza un *martello* non potremmo attaccare la mensola al muro.
  Ohne einen *Hammer* könnten wir das Regal nicht an die Wand hängen.
  
  Il *martello* che ho comprato ieri è già arrugginito.
  Der *Hammer*, den ich gestern gekauft habe, ist schon verrostet.
