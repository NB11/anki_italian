Rang: 3130
Wort: adolescente
Wortart: n.m/f
Wort mit Artikel: l'adolescente
Femininum / Plural: gli adolescenti
IPA: ''
Definition: der/die Jugendliche, -n
Register: ''
Beispielsätze: |-
  L'*adolescente* ha vinto il campionato regionale di calcio.
  Der *Jugendliche* hat die regionale Fußballmeisterschaft gewonnen.
  
  Non *adolescente* ma adulto può firmare questo contratto.
  Nicht der *Jugendliche*, sondern Erwachsene dürfen diesen Vertrag unterschreiben.
  
  I genitori di un *adolescente* spesso devono frenare il suo entusiasmo per gli sport estremi.
  Eltern eines *Jugendlichen* müssen oft dessen Begeisterung für Extremsport bremsen.
  
  L'*adolescente* che ho incontrato al parco era molto creativo e parlava di pittura come se fosse un dipinto.
  Der *Jugendliche*, den ich im Park getroffen habe, war sehr kreativ und sprach von Malerei, als wäre sie ein Gemälde.
  
  Gli *adolescenti* di oggi sembrano più consapevoli dei rischi dell'alcol rispetto a quelli di dieci anni fa.
  Die *Jugendlichen* von heute wirken sich der Risiken von Alkohol bewusster als vor zehn Jahren.
