Rang: 3668
Wort: mescolare
Wortart: vt
Wort mit Artikel: mescolare
Femininum / Plural: ''
IPA: ''
Definition: mischen, vermengen
Register: ''
Beispielsätze: |-
  Per preparare la *mescoliamo* gli ingredienti in una ciotola grande.
  Um die Zutaten zu *mischen*, nehmen wir eine große Schüssel.
  
  Il cuoco ha *mescolato* con cura gli aromi per ottenere un sapore unico.
  Der Koch hat die Gewürze *gemischt*, um einen einzigartigen Geschmack zu erzielen.
  
  Non mi piace quando la gente *mescola* le carte in modo disordinato.
  Ich mag es nicht, wenn jemand die Karten *durcheinander mischt*.
  
  Se *mescolerai* troppo in fretta, l'impasto non lieviterà correttamente.
  Wenn du zu schnell *rührst*, geht der Teig nicht richtig auf.
  
  Avrei voluto che tu *avessi mescolato* il composto come ti avevo spiegato.
  Ich hätte mir gewünscht, du hättest die Mischung so *gemischt*, wie ich es dir erklärt hatte.
Audio: ''
