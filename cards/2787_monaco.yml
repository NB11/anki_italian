Rang: 2787
Wort: monaco
Wortart: n.m
Wort mit Artikel: il monaco
Femininum / Plural: monaci
IPA: ''
Definition: der Mönch, -e
Register: ''
Beispielsätze: |-
  Nel monastero vivono diversi *monaci* che pregano molte ore al giorno.
  In dem Kloster leben mehrere *Mönche*, die viele Stunden am Tag beten.
  
  Il *monaco* che hai visto ieri indossa un saio scuro e cammina lentamente per il sentiero.
  Der *Mönch*, den du gestern gesehen hast, trägt eine dunkle Kutte und geht langsam den Pfad entlang.
  
  Se vorrai diventare *monaco*, dovrai seguire una formazione spirituale molto rigorosa.
  Wenn du *Mönch* werden willst, musst du eine sehr strenge geistige Ausbildung durchlaufen.
  
  Nonostante le difficoltà, il *monaco* continuò a dedicarsi alla preghiera senza mai individuare una via d’uscita.
  Trotz der Schwierigkeiten widmete sich der *Mönch* weiterhin dem Gebet, ohne jemals einen Ausweg zu finden.
  
  I *monaci* del convento cucinano il pane nel forno antico che risale al Medioevo.
  Die *Mönche* des Klosters backen das Brot in einem alten Backofen, der aus dem Mittelalter stammt.
