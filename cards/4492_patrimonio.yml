Beispielsätze: |-
  L'Italia ha un *patrimonio* artistico e culturale immenso che attira milioni di turisti ogni anno.
  Italien hat ein *Erbe* an Kunst und Kultur, das Millionen Touristen jährlich anzieht.
  
  Nonostante le difficoltà economiche, la famiglia è riuscita a preservare il suo *patrimonio* di terreni agricoli.
  Trotz wirtschaftlicher Schwierigkeiten gelang es der Familie, ihr *Besitz* an Ackerland zu bewahren.
  
  Il *patrimonio* genetico di questa specie è stato studiato da numerosi ricercatori per decenni.
  Das *Erbe* dieser Art wurde jahrzehntelang von vielen Forschern untersucht.
  
  Se avessi ereditato un *patrimonio* così grande, sapresti come gestirlo responsabilmente?
  Wenn du ein solch großes *Erbe* geerbt hättest, wüsstest du, wie du es verantwortungsvoll verwalten könntest?
  
  I paesi più poveri spesso non riescono a proteggere il loro *patrimonio* ambientale a causa della mancanza di risorse.
  Ärmere Länder schaffen es oft nicht, ihr *Erbe* an Umwelt zu schützen, weil ihnen Ressourcen fehlen.
