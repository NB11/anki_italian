Rang: 4601
Wort: formidabile
Wortart: adj
Wort mit Artikel: formidabile
Femininum / Plural: ''
IPA: ''
Definition: hervorragend, großartig, fantastisch
Register: ''
Beispielsätze: |-
  Il regista ha girato un film *formidabile* che ha vinto molti premi.
  Der Regisseur hat einen *hervorragenden* Film gedreht, der viele Preise gewonnen hat.
  
  Non ho mai assaggiato una pizza così *formidabile* in vita mia!
  Ich habe noch nie eine so *großartige* Pizza in meinem Leben gegessen!
  
  È *formidabile* come riesce a risolvere problemi complessi in pochi minuti.
  Es ist *fantastisch*, wie er es schafft, komplexe Probleme in wenigen Minuten zu lösen.
  
  Secondo me, questo vino è davvero *formidabile* per la sua qualità e il suo prezzo.
  Meiner Meinung nach ist dieser Wein wirklich *hervorragend* für seine Qualität und seinen Preis.
  
  La squadra ha mostrato un gioco *formidabile* durante tutta la partita.
  Die Mannschaft hat während des gesamten Spiels ein *großartiges* Spiel gezeigt.
