Rang: 4530
Wort: corsia
Wortart: n.f
Wort mit Artikel: la corsia
Femininum / Plural: corsie
IPA: ''
Definition: der Gang, -¨e, die Spur, -en
Register: ''
Beispielsätze: |-
  Stai nella *corsia* di destra se vai dritto, altrimenti devi svoltare a sinistra.
  Du bist auf der *Spur* rechts, wenn du geradeaus fährst, sonst musst du links abbiegen.
  
  Dopo l’incidente hanno dovuto chiudere temporaneamente la *corsia* veloce dell’autostrada.
  Nach dem Unfall mussten sie die *Fahrspur* für schnellen Verkehr auf der Autobahn vorübergehend schließen.
  
  In ospedale, la *corsia* dei pazienti gravi era già piena quando siamo arrivati.
  Im Krankenhaus war die *Krankenstation* für schwere Fälle bereits überfüllt, als wir ankamen.
  
  L’autista ha perso il controllo proprio nella *corsia* di sorpasso, causando un tamponamento.
  Der Fahrer verlor die Kontrolle genau in der *Überholspur*, was zu einem Auffahrunfall führte.
  
  Se vuoi evitare il traffico, prendi la *corsia* meno frequentata che porta verso il centro.
  Wenn du den Verkehr vermeiden willst, nimm die *Spur*, die weniger befahren ist und ins Zentrum führt.
