Rang: 4148
Wort: metropolitana
Wortart: n.f
Wort mit Artikel: la metropolitana
Femininum / Plural: metropolitane
IPA: ''
Definition: die U-Bahn, -en
Register: ''
Beispielsätze: |-
  Prendo la *metropolitana* ogni mattina alle otto per andare al lavoro.
  Ich nehme die *U-Bahn* jeden Morgen um acht Uhr, um zur Arbeit zu fahren.
  
  Sai che linea della *metropolitana* porta direttamente in centro?
  Weißt du, welche Linie der *U-Bahn* direkt ins Zentrum fährt?
  
  Nonostante la *metropolitana* arrivi puntuale, oggi ho perso la coincidenza.
  Obwohl die *U-Bahn* pünktlich ankommt, habe ich heute den Anschluss verpasst.
  
  Se prenoti online, la *metropolitana* risulterà molto più economica rispetto al taxi.
  Wenn du online buchst, wird die *U-Bahn* deutlich günstiger als ein Taxi sein.
  
  Ho salutato Luca mentre saliva sulla *metropolitana* alla fermata di Piazza Garibaldi.
  Ich habe Luca begrüßt, als er an der Haltestelle Piazza Garibaldi in die *U-Bahn* einstieg.
