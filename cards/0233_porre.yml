  Ich hoffe, dass du diesem Zustand ein *Ende* setzt.
  
  Se *ponessi* più attenzione, non sbaglieresti.
  Wenn du mehr *Aufmerksamkeit* schenken würdest, würdest du keine Fehler machen.
