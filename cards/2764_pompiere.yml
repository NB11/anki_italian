Rang: 2764
Wort: pompiere
Wortart: n.m
Wort mit Artikel: il pompiere
Femininum / Plural: i pompieri
IPA: ''
Definition: die Feuerwehr, -en
Register: ''
Beispielsätze: |-
  Il *pompiere* ha salvato il gatto dall'albero.
  Der *Feuerwehrmann* hat die Katze vom Baum gerettet.
  
  Ho parlato con un *pompiere* dopo l'incendio.
  Ich habe mit einem *Feuerwehrmann* nach dem Brand gesprochen.
  
  Se fossi più coraggioso, diventerei *pompiere*.
  Wenn ich mutiger wäre, würde ich *Feuerwehrmann* werden.
  
  I *pompieri* arrivano sempre in fretta quando c'è un pericolo.
  Die *Feuerwehrleute* kommen immer schnell, wenn Gefahr besteht.
  
  Vorrei ringraziare il *pompiere* che ha estinto l'incendio nella mia cucina.
  Ich möchte dem *Feuerwehrmann* danken, der den Brand in meiner Küche gelöscht hat.
