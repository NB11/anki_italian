Rang: 4380
Wort: sequestrare
Wortart: vt
Wort mit Artikel: sequestrare
Femininum / Plural: ''
IPA: ''
Definition: beschlagnahmen, sequestrieren
Register: ''
Beispielsätze: |-
  La polizia ha *sequestrato* una grossa quantità di droga durante un controllo stradale.
  Die Polizei hat eine große Menge Drogen *beschlagnahmt*.
  
  Se *sequestrassero* la mia auto per errore, come potrei dimostrarlo?
  Wenn sie mein Auto *beschlagnahmen* würden, wie könnte ich das nachweisen?
  
  L’azienda temeva che qualcuno potesse *sequestrare* i suoi brevetti più importanti.
  Das Unternehmen fürchtete, dass jemand seine wichtigsten Patente *beschlagnahmen* könnte.
  
  Il giudice ha ordinato di *sequestrare* i beni del ricco imprenditore accusato di evasione fiscale.
  Der Richter hat angeordnet, das Vermögen des reichen Unternehmers, der der Steuerhinterziehung beschuldigt wird, zu *beschlagnahmen*.
  
  Nonostante le sue conquiste, l’artista temeva che la fama potesse *sequestrargli* la libertà di creare senza pressioni.
  Trotz seiner Erfolge fürchtete der Künstler, dass der Ruhm seine Freiheit, ohne Druck zu *beschlagnahmen*, einschränken könnte.
