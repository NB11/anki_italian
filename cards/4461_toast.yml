  Im Kühlschrank ist nichts außer zwei Scheiben von altem *Toast*.
  
  Quando ero bambino, mia madre mi preparava *toast* solo la domenica mattina.
  Als ich ein Kind war, hat meine Mutter mir sonntagsmorgens immer *Toast* gemacht.
  
  Se avessi saputo che avresti perso il treno, ti avrei preparato dei *toast* da portare via.
  Wenn ich gewusst hätte, dass du den Zug verpasst, hätte ich dir *Toast* zum Mitnehmen vorbereitet.
