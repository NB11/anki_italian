Rang: 2197
Wort: canto
Wortart: n.m
Wort mit Artikel: il canto
Femininum / Plural: canti
IPA: ''
Definition: der Gesang, -¨e
Register: ''
Beispielsätze: |-
  Il *canto* degli uccelli mi sveglia ogni mattina e mi mette di buon umore.
  Der *Gesang* der Vögel weckt mich jeden Morgen und hebt meine Stimmung.
  
  Hai ascoltato l'ultimo *canto* dell'opera di Puccini? È straordinario.
  Hast du den letzten *Gesang* aus Puccinis Oper gehört? Er ist außergewöhnlich.
  
  Nonostante il dolore, il suo *canto* era ancora pieno di speranza e forza.
  Trotz des Schmerzes war ihr *Gesang* noch voller Hoffnung und Stärke.
  
  Il poeta ha dedicato molti versi al *canto* delle sirene nel poema epico.
  Der Dichter hat viele Verse dem *Gesang* der Sirenen in seinem Epos gewidmet.
  
  Se avessi una voce così bella, anch'io vorrei fare del *canto* la mia professione, come quel canto che abbiamo sentito al concerto di ieri.
  Wenn ich eine solche Stimme hätte, würde ich ebenfalls den *Gesang* zu meinem Beruf machen, so wie diesen Gesang, den wir gestern im Konzert gehört haben.
