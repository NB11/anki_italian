Rang: 1981
Wort: carica
Wortart: n.f
Wort mit Artikel: la carica
Femininum / Plural: cariche
IPA: ''
Definition: die Ladung, -en; die Charge, -n
Register: ''
Beispielsätze: |-
  La *carica* della batteria è quasi esaurita, dobbiamo ricaricarla al più presto.
  Die *Ladung* der Batterie ist fast leer, wir müssen sie so schnell wie möglich aufladen.
  
  Hanno avviato una nuova *carica* di merci per il mercato europeo.
  Sie haben eine neue *Charge* Waren für den europäischen Markt gestartet.
  
  Non appena la *carica* elettrica sarà completata, il telefono riaccenderà automaticamente.
  Sobald die elektrische *Ladung* abgeschlossen ist, wird sich das Telefon automatisch wieder einschalten.
  
  Ogni *carica* di esplosivo deve essere maneggiata con estrema attenzione.
  Jede *Ladung* Sprengstoff muss mit äußerster Vorsicht gehandhabt werden.
  
  La *carica* del generatore è sufficiente per alimentare tutto l’impianto per due ore.
  Die *Ladung* des Generators reicht aus, um die gesamte Anlage zwei Stunden lang zu versorgen.
