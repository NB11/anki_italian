Rang: 442
Wort: arrabbiare
Wortart: vi
Wort mit Artikel: arrabbiare
Femininum / Plural: ''
IPA: ''
Definition: sich ärgern
Register: ''
Beispielsätze: |-
  Quando *arrabbia*, non parla con nessuno.
  Wenn er *sich ärgert*, spricht er mit niemandem.
  
  Mi sono *arrabbiato* perché hai rotto il mio bicchiere!
  Ich habe *mich geärgert*, weil du mein Glas kaputt gemacht hast!
  
  Non *arrabbiarti* per così poco!
  *Ärgere dich* nicht über so etwas!
  
  Se non *arrabbiassi* così spesso, staresti meglio.
  Wenn du *dich nicht ständig ärgern* würdest, ginge es dir besser.
  
  Stamattina *si è arrabbiato* con il suo capo.
  Heute Morgen hat er *sich über seinen Chef geärgert*.
