Beispielsätze: |-
  Non vorrei *azzardare* un giudizio senza avere tutte le informazioni necessarie.
  Ich würde *wagen* kein Urteil, ohne alle Informationen zu haben.
  
  Se *azzarderai* un passo falso, perderai la fiducia di tutti.
  Wenn du *riskierst* einen Fehler zu machen, verlierst du das Vertrauen aller.
  
  Hanno deciso di *azzardare* la loro fortuna in un mercato finanziario molto incerto.
  Sie haben beschlossen, ihr Glück in einem sehr unsicheren Finanzmarkt zu *wagen*.
  
  Mi dispiace, ma non posso *azzardare* una previsione su come andrà questa situazione.
  Es tut mir leid, aber ich kann keine Prognose *wagen*, wie sich diese Situation entwickeln wird.
  
  Anche se *azzardereste* la vostra reputazione per questo progetto, non garantisce il successo.
  Auch wenn ihr euren Ruf für dieses Projekt *riskieren* würdet, garantiert es keinen Erfolg.
