Rang: 3366
Wort: vomito
Wortart: n.m
Wort mit Artikel: il vomito
Femininum / Plural: vomiti
IPA: ''
Definition: das Erbrechen
Register: ''
Beispielsätze: |-
  Dopo aver mangiato troppo, ho avuto un *vomito* improvviso.
  Nach dem vielen Essen hatte ich plötzlich *Erbrechen*.
  
  Il medico mi ha chiesto da quanto tempo soffro di *vomito* mattutino.
  Der Arzt fragte mich, seit wann ich unter *morgendlichem Erbrechen* leide.
  
  Se *il vomito* non passa entro ventiquattro ore, consulta un medico.
  Wenn *das Erbrechen* nicht innerhalb von 24 Stunden aufhört, such einen Arzt auf.
  
  Durante il viaggio in nave, molti passeggeri hanno lamentato *vomito* a causa del mare mosso.
  Auf der Schiffsreise klagten viele Passagiere über *Erbrechen* wegen der starken Wellen.
  
  Nonostante l’influenza, il paziente ha rifiutato *il vomito*, preferendo combatterlo con rimedi naturali.
  Trotz der Grippe lehnte der Patient *das Erbrechen* ab und bekämpfte es lieber mit Hausmitteln.
