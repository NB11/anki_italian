Rang: 4454
Wort: quarantena
Wortart: n.f
Wort mit Artikel: la quarantena
Femininum / Plural: quarantene
IPA: ''
Definition: die Quarantäne, -n
Register: ''
Beispielsätze: |-
  La *quarantena* è stata estesa a causa di un nuovo focolaio.
  Die *Quarantäne* wurde wegen eines neuen Ausbruchs verlängert.
  
  Durante la *quarantena* ho imparato a cucinare piatti nuovi.
  Während der *Quarantäne* habe ich gelernt, neue Gerichte zu kochen.
  
  Se avessi saputo che sarebbe durata così a lungo, mi sarei organizzato meglio durante la *quarantena*.
  Hätte ich gewusst, dass sie so lange dauert, hätte ich mich während der *Quarantäne* besser organisiert.
  
  Dicono che la *quarantena* serva a prevenire la diffusione del virus.
  Man sagt, dass die *Quarantäne* die Ausbreitung des Virus verhindern soll.
  
  Molti temono che la *quarantena* stia indebolendo l’economia.
  Viele befürchten, dass die *Quarantäne* die Wirtschaft schwächt.
