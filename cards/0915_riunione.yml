Rang: 915
Wort: riunione
Wortart: n.f
Wort mit Artikel: la riunione
Femininum / Plural: riunioni
IPA: ''
Definition: die Besprechung, -en, das Treffen, -
Register: ''
Beispielsätze: |-
  La *riunione* di oggi è stata molto produttiva e abbiamo deciso di gestire il progetto internamente.
  Die *Besprechung* heute war sehr produktiv und wir haben beschlossen, das Projekt innerlich zu führen.
  
  Sai quando si terrà la prossima *riunione* del consiglio? Devo avvertire il professore che parteciperà.
  Weißt du, wann die nächste *Besprechung* des Rates stattfindet? Ich muss den Professor warnen, dass er teilnimmt.
  
  Se *riuniremo* tutti i risultati, forse potremo presentare un risultato migliore alla riunione di domani.
  Wenn wir alle *Ergebnisse* sammeln, können wir vielleicht bei der Besprechung morgen ein besseres Ergebnis vorlegen.
  
  Nonostante sia chiuso l’ufficio, la *riunione* si è tenuta lo stesso per urgenti questioni di lavoro.
  Obwohl das Büro *geschlossen* ist, fand die Besprechung trotzdem wegen dringender Arbeitsfragen statt.
  
  Durante la *riunione* avvertii una strana pressione sul petto, ma nessuno parve fuggire o urlare come mi aspettavo.
  Während der *Besprechung* spürte ich einen seltsamen Druck auf der Brust, doch niemand schien zu fliehen oder zu schreien, wie ich erwartet hatte.
