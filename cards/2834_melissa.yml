Rang: 2834
Wort: melissa
Wortart: n.f
Wort mit Artikel: la melissa
Femininum / Plural: melisse
IPA: ''
Definition: die Melisse, -n
Register: ''
Beispielsätze: |-
  Ho comprato una pianta di *melissa* perché il suo profumo è rilassante.
  Ich habe eine *Melisse*-Pflanze gekauft, weil ihr Duft entspannend ist.
  
  L'erborista mi ha consigliato di usare le foglie di *melissa* per il tè.
  Der Kräuterhändler hat mir geraten, *Melissen*-Blätter für den Tee zu verwenden.
  
  Non sono sicuro se questa pianta sia *melissa* o qualcos'altro, bisognerebbe distinguere meglio.
  Ich bin mir nicht sicher, ob diese Pflanze *Melisse* ist oder etwas anderes – man sollte das genauer unterscheiden.
  
  La *melissa* cresce bene in questo clima, ma ha bisogno di molta acqua.
  Die *Melisse* wächst in diesem Klima gut, braucht aber viel Wasser.
  
  Se non avessi dimenticato la bustina di *melissa*, il tè sarebbe stato perfetto.
  Wenn ich nicht die *Melisse*-Tüte vergessen hätte, wäre der Tee perfekt gewesen.
