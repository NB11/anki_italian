Rang: 1897
Wort: giudizio
Wortart: n.m
Wort mit Artikel: il giudizio
Femininum / Plural: giudizi
IPA: ''
Definition: der Rat, -schläge, das Urteil, -e
Register: ''
Beispielsätze: |-
  Non ho ancora dato il *giudizio* sul tuo nuovo progetto.
  Ich habe mein *Urteil* über dein neues Projekt noch nicht gegeben.
  
  Secondo il *giudizio* dell’esperto, questa pittura è un capolavoro.
  Laut dem *Urteil* des Experten ist dieses Gemälde ein Meisterwerk.
  
  Prima di prendere una decisione, ascolterò il *giudizio* di tutti voi.
  Bevor ich eine Entscheidung treffe, höre ich mir die *Meinung* von euch allen an.
  
  Il *giudizio* che hai dato su Luca era troppo severo, secondo me.
  Dein *Urteil* über Luca war meiner Meinung nach zu hart.
  
  Non mi fido molto del suo *giudizio*: è sempre troppo ottimista.
  Ich vertraue seinem *Rat* nicht besonders – er ist immer zu optimistisch.
