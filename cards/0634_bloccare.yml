Rang: 634
Wort: bloccare
Wortart: v
Wort mit Artikel: bloccare
Femininum / Plural: ''
IPA: ''
Definition: blockieren, sperren, verhindern
Register: ''
Beispielsätze: |-
  Il *blocco* del traffico nel centro ha causato ritardi per dieci minuti a tutti i veicoli.
  Die *Blockade* des Verkehrs im Zentrum hat zu Verspätungen von zehn Minuten für alle Fahrzeuge geführt.
  
  Se *blocchi* il segreto con quella chiamata, metterai in pericolo tutta la relazione.
  Wenn du das Geheimnis mit diesem Anruf *blockierst*, gefährdest du die ganze Beziehung.
  
  Hanno *bloccato* l’accesso al palazzo perché la posizione era pericolosa secondo il detective.
  Sie haben den Zugang zum Gebäude *blockiert*, weil die Position nach dem Detektiv gefährlich war.
  
  Avrei *bloccato* io stesso questa lista di droga se avessi saputo che era così terribile.
  Ich hätte selbst diese Liste mit Drogen *blockiert*, wenn ich gewusst hätte, dass sie so furchtbar war.
  
  Nonostante il ritardo, siamo riusciti a *bloccare* il dolore con una medicina simile a quella usata spesso dai pazienti.
  Trotz der Verspätung konnten wir den Schmerz mit einem Medikament *blockieren*, das oft bei Patienten verwendet wird.
