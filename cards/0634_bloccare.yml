Definition: blockieren, sperren, stoppen
Register: ''
Beispielsätze: |-
  Devi *bloccare* il portone prima che qualcuno entri.
  Du musst das Tor *blockieren*, bevor jemand hereinkommt.
  
  I vigili hanno *bloccato* la strada per i lavori.
  Die Polizisten haben die Straße wegen der Bauarbeiten *gesperrt*.
  
  *Bloccherai* il tuo telefono se non lo aggiorni.
  Du wirst dein Handy *sperren*, wenn du es nicht aktualisierst.
  
  Vorrei che mi *bloccassero* su Instagram, non sopporto più i loro post.
  Ich wünschte, sie würden mich auf Instagram *blockieren*, ich halte ihre Posts nicht mehr aus.
  
  Il sistema *ha bloccato* il pagamento perché la carta era scaduta.
  Das System hat die Zahlung *gesperrt*, weil die Karte abgelaufen war.
