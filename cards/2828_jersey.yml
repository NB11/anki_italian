Rang: 2828
Wort: jersey
Wortart: n.m
Wort mit Artikel: il jersey
Femininum / Plural: jersey
IPA: ''
Definition: das Trikot, -s
Register: ''
Beispielsätze: |-
  Al negozio di sport hanno una selezione molto ampia di *jersey* di varie squadre.
  Im Sportladen haben sie eine sehr große Auswahl an *Trikots* verschiedener Teams.
  
  Dopo la vittoria, il calciatore ha indossato il suo *jersey* della nazionale per giorni.
  Nach dem Sieg trug der Fußballer tagelang sein *Nationaltrikot*.
  
  Non sapevo che questo modello di *jersey* fosse così richiesto quest’anno.
  Ich wusste nicht, dass dieses *Trikot*-Modell dieses Jahr so gefragt sein würde.
  
  Ha regalato al figlio un *jersey* del suo calciatore preferito per il compleanno.
  Er schenkte seinem Sohn zum Geburtstag ein *Trikot* seines Lieblingsfußballers.
  
  Se vuoi un *jersey* personalizzato, dovrai pagare un po’ di più.
  Wenn du ein personalisiertes *Trikot* möchtest, wirst du etwas mehr zahlen müssen.
