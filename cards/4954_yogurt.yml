  Er sagt, dass der abgelaufene *Joghurt* noch gegessen werden kann, aber ich glaube ihm nicht.
  
  Porta dello *yogurt* alla festa, così almeno qualcosa di sano c'è.
  Bringe etwas *Joghurt* zur Feier mit, damit wenigstens etwas Gesundes dabei ist.
