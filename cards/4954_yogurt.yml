Beispielsätze: |-
  Per colazione mangio *yogurt* con miele e noci.
  Zum Frühstück esse ich *Joghurt* mit Honig und Nüssen.
  
  Non ho trovato lo *yogurt* al supermercato vicino a casa.
  Ich habe den *Joghurt* nicht im Supermarkt in meiner Nähe gefunden.
  
