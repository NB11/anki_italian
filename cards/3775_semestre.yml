Rang: 3775
Wort: semestre
Wortart: n.m
Wort mit Artikel: il semestre
Femininum / Plural: i semestri
IPA: ''
Definition: das Halbjahr, -e
Register: ''
Beispielsätze: |-
  Quest'anno ho deciso di studiare all'estero per un *semestre* completo.
  Dieses Jahr habe ich beschlossen, ein ganzes *Semester* im Ausland zu studieren.
  
  Durante il terzo *semestre* ho seguito un corso molto interessante sulla letteratura italiana.
  Während des dritten *Semesters* habe ich einen sehr interessanten Kurs über italienische Literatur besucht.
  
  Se avessi saputo prima, non avrei aspettato l'ultimo *semestre* per laurearmi!
  Wenn ich es früher gewusst hätte, hätte ich nicht bis zum letzten *Semester* gewartet, um mein Studium abzuschließen!
  
  Il professore ha annunciato che il prossimo *semestre* ci sarà un viaggio di studio a Roma, di cui non vedo l'ora.
  Der Professor hat angekündigt, dass es im nächsten *Semestre* eine Studienreise nach Rom geben wird, auf die ich mich schon sehr freue.
  
  Nonostante le difficoltà, ho superato tutti gli esami di questo *semestre* e sono molto soddisfatto del risultato.
  Trotz der Schwierigkeiten habe ich alle Prüfungen dieses *Semesters* bestanden und bin mit dem Ergebnis sehr zufrieden.
