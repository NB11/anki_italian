Rang: 4794
Wort: demolire
Wortart: v
Wort mit Artikel: demolire
Femininum / Plural: ''
IPA: ''
Definition: abreißen, niederreißen, zerstören
Register: ''
Beispielsätze: |-
  Il comune ha deciso di *demolire* l'edificio fatiscente per costruire un parcheggio.
  Die Stadtverwaltung hat beschlossen, das verfallene Gebäude *abzureißen*, um einen Parkplatz zu bauen.
  
  Se non avessero *demolito* le fondamenta, la casa non sarebbe crollata.
  Wenn sie die Fundamente nicht *zerstört* hätten, wäre das Haus nicht eingestürzt.
  
  Vorrei sapere chi ha il coraggio di *demolire* una cappella del settimo secolo!
  Ich möchte wissen, wer den Mut hat, eine Kapelle aus dem siebten Jahrhundert *niederzureißen*!
  
  Dopo la sconfitta, la tifoseria non riuscì a *demolire* la delusione dei giocatori.
  Nach der Niederlage konnte die Fangemeinde die *Enttäuschung* der Spieler nicht lähmen.
  
  Anche se lo ritieni un truffatore, non puoi semplicemente *demolire* la sua reputazione con un articolo giornalistico.
  Auch wenn du ihn für einen *Betrüger* hältst, kannst du seinen Ruf nicht einfach mit einem Zeitungsartikel zerstören.
