Rang: 4853
Wort: rimpianto
Wortart: n.m
Wort mit Artikel: il rimpianto
Femininum / Plural: i rimpianti
IPA: ''
Definition: die Reue, der Kummer
Register: ''
Beispielsätze: |-
  Ho un *rimpianto* per non aver viaggiato di più da giovane.
  Ich habe eine *Reue*, weil ich in meiner Jugend nicht mehr gereist bin.
  
  Il suo *rimpianto* più grande è non aver studiato medicina quando ne aveva la possibilità.
  Seine größte *Reue* ist es, nicht Medizin studiert zu haben, als er die Chance dazu hatte.
  
  Nonostante il *rimpianto*, continuò a lavorare con la stessa determinazione di sempre.
  Trotz der *Reue* arbeitete er weiterhin mit derselben Entschlossenheit wie immer.
  
  Se potessi tornare indietro, cancellerei il *rimpianto* che porto dentro da anni.
  Wenn ich zurückgehen könnte, würde ich die *Reue* löschen, die ich seit Jahren in mir trage.
  
  Il *rimpianto* che provava era così profondo che decise di scrivere una lettera a colei che aveva perso.
  Die *Reue*, die er empfand, war so tief, dass er beschloss, einen Brief an diejenige zu schreiben, die er verloren hatte.
