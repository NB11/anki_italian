  Wo hast du die Schlüssel hingelegt? – *Hier sind* sie!
  
  *Ecco* una buona idea per il weekend.
  *Da ist* eine gute Idee für das Wochenende.
  
  Non trovo la penna. – *Ecco* perché non scrivi nulla!
  Ich finde den Stift nicht. – *Deshalb* schreibst du nichts!
