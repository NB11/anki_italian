Rang: 2454
Wort: caramella
Wortart: n.f
Wort mit Artikel: la caramella
Femininum / Plural: caramelle
IPA: ''
Definition: das Bonbon, -s, die Süßigkeit, -en
Register: ''
Beispielsätze: |-
  Ho comprato una *caramella* alla menta perché mi fa venire sete.
  Ich habe ein *Mundbonbon* mit Minzgeschmack gekauft, weil es mich durstig macht.
  
  Non mangiare troppe *caramelle*, altrimenti ti vengono i denti cariati!
  Iss nicht zu viele *Bonbons*, sonst bekommst du Karies!
  
  La nonna mi ha regalato una scatola piena di *caramelle* di tutti i gusti possibili.
  Oma hat mir eine Schachtel mit *Süßigkeiten* aller möglichen Geschmacksrichtungen geschenkt.
  
  Se avessi ancora fame, mangerei volentieri un'altra *caramella* al cioccolato.
  Falls ich noch Hunger hätte, würde ich gern ein weiteres *Schokoladenbonbon* essen.
  
  L’ispettore ha trovato una *caramella* masticata vicino alla scena del delitto, ma non è ancora chiaro cosa significhi.
  Der Ermittler hat ein *Bonbon*, das er halb gegessen hat, am Tatort gefunden, aber es ist noch unklar, was das bedeutet.
