Rang: 878
Wort: avvertire
Wortart: v
Wort mit Artikel: avvertire
Femininum / Plural: ''
IPA: ''
Definition: bemerken, warnen, spüren
Register: ''
Beispielsätze: |-
  Non *avvertire* alcun dolore nel braccio sinistro può essere un segno di problemi circolatori.
  Keinen *Schmerz* im linken Arm zu spüren kann ein Zeichen für Kreislaufprobleme sein.
  
  Il colonnello *avverte* i soldati che la missione sarà pericolosa.
  Der *Oberst* warnt die Soldaten, dass die Mission gefährlich sein wird.
  
  Mi *avvertono* che il vino ha un colore strano; dovrei berlo affatto?
  Sie *warnen* mich, dass der Wein eine seltsame Farbe hat; sollte ich ihn überhaupt nicht trinken?
  
  Se *avverti* una pressione al petto, chiamerò subito il medico.
  Wenn du einen *Druck* auf der Brust spürst, rufe ich sofort den Arzt.
  
  Non *avvertivo* la sua presenza finché non ho raccolto il suo profumo nell’aria.
  Ich *bemerkte* seine Anwesenheit erst, als ich sein Parfüm in der Luft eingeatmet hatte.
