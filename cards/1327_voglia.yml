Rang: 1327
Wort: voglia
Wortart: n.f
Wort mit Artikel: la voglia
Femininum / Plural: voglie
IPA: ''
Definition: der Wunsch, -¨e
Register: ''
Beispielsätze: |-
  Ho una *voglia* improvvisa di mangiare un gelato al cioccolato.
  Ich habe einen *plötzlichen* Wunsch, ein Schokoladeneis zu essen.
  
  Se avessi *voglia* di partecipare alla festa, chiamami pure!
  Falls du *Lust* hast, an der Party teilzunehmen, ruf mich einfach an!
  
  La *voglia* di libertà lo spinse a lasciare l'impiego sicuro.
  Der *Wunsch* nach Freiheit trieb ihn dazu, seinen sicheren Job zu kündigen.
  
  Avevo tanta *voglia* di abbracciarti che ho preso il primo treno.
  Ich hatte so *Lust*, dich zu umarmen, dass ich den ersten Zug genommen habe.
  
  Nonostante la *voglia* di dire la verità, alla fine ho taciuto per non ferirlo.
  Trotz des *Wunsches*, die Wahrheit zu sagen, habe ich am Ende geschwiegen, um ihn nicht zu verletzen.
