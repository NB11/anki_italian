Rang: 3672
Wort: marciapiede
Wortart: n.m
Wort mit Artikel: il marciapiede
Femininum / Plural: marciapiedi
IPA: ''
Definition: der Gehweg, -e
Register: ''
Beispielsätze: |-
  Mentre *marciapiede* era bagnato, ho fatto attenzione a non scivolare.
  Während *des Gehwegs* nass war, habe ich darauf geachtet, nicht auszurutschen.
  
  Il cane ha iniziato a rincorrere la sua palla proprio sul *marciapiede*.
  Der Hund begann, seinen Ball genau auf *dem Gehweg* zu jagen.
  
  Speravano che il *marciapiede* fosse stato riparato entro domani.
  Sie hofften, dass *der Gehweg* bis morgen repariert sein würde.
  
  Se avessi visto un *marciapiede* libero, mi sarei seduto lì.
  Wenn ich einen freien *Gehweg* gesehen hätte, hätte ich mich dort hingesetzt.
  
  Chiunque attraversi la strada senza usare il *marciapiede* rischia una multa.
  Wer die Straße überquert, ohne *den Gehweg* zu nutzen, riskiert ein Bußgeld.
