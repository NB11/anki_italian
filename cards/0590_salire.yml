Rang: 590
Wort: salire
Wortart: vi
Wort mit Artikel: salire
Femininum / Plural: ''
IPA: ''
Definition: hinaufgehen, besteigen, hochsteigen, einsteigen
Register: ''
Beispielsätze: |-
  Devi *salire* le scale per arrivare al secondo piano.
  Du musst *die Treppen* hinaufgehen, um in die zweite Etage zu kommen.
  
  Quando hai *salito* sull’autobus, ho già trovato un posto.
  Als du *in den Bus eingestiegen* bist, hatte ich schon einen Platz gefunden.
  
  Se *salirò* sulla montagna domani, ti porterò una foto.
  Wenn ich morgen *den Berg besteigen* werde, bringe ich dir ein Foto mit.
  
  È meglio che tu non *salga* su quella scala rotta, potrebbe rovinare tutto!
  Es ist besser, dass du nicht *auf diese kaputte Leiter steigst*, sonst zerstörst du noch alles!
  
  Nonostante il guaio con il programma, abbiamo deciso di *salire* lo stesso sulla torre.
  Trotz des *Problems* mit dem Plan haben wir beschlossen, trotzdem auf den Turm zu steigen.
