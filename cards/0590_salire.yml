Rang: 590
Wort: salire
Wortart: vi
Wort mit Artikel: salire
Femininum / Plural: ''
IPA: ''
Definition: hinaufgehen, besteigen, einsteigen
Register: ''
Beispielsätze: |-
  Oggi *saliamo* le scale a piedi perché l'ascensore è rotto.
  Heute *gehen wir* die Treppe hinauf, weil der Aufzug kaputt ist.
  
  Vuoi *salire* con me in montagna questo fine settimana?
  Möchtest du diesen Samstag mit mir in die Berge *hinaufgehen*?
  
  Sono *salito* sul tetto per aggiustare l'antenna.
  Ich bin aufs Dach *gestiegen*, um die Antenne zu reparieren.
  
  Se *sali* su quel treno sbagliato, farai tardi all'appuntamento.
  Wenn du in diesen falschen Zug *einsteigst*, kommst du zu spät zum Termin.
  
  Domani *saliremo* in cima alla torre per la vista panoramica.
  Morgen werden wir auf die Spitze des Turms *hinaufsteigen*, um die Aussicht zu genießen.
