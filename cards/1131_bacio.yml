Rang: 1131
Wort: bacio
Wortart: n.m
Wort mit Artikel: il bacio
Femininum / Plural: baci
IPA: ''
Definition: der Kuss, -¨e
Register: ''
Beispielsätze: |-
  Quando si incontrano, lui le dà sempre un *bacio* sulla guancia.
  Wenn sie sich treffen, gibt er ihr immer *einen Kuss* auf die Wange.
  
  Nonostante la perdita precedente, hanno deciso di regalarsi un *bacio* come segno di speranza.
  Trotz des *vorherigen Verlusts* haben sie beschlossen, sich einen Kuss als Zeichen der Hoffnung zu schenken.
  
  Il *bacio* che gli ha dato aveva un sapore di nostalgia e dolcezza.
  Der *Kuss*, den sie ihm gegeben hat, hatte einen Geschmack von Nostalgie und Süße.
  
  Se avessi saputo che mi avrebbe dato un *bacio*, non sarei partito così presto dal college.
  Wenn ich gewusst hätte, dass sie mir *einen Kuss* geben würde, wäre ich nicht so früh vom College losgefahren.
  
  Nel mezzo della confusione, lui le ha sussurrato: "Questo *bacio* è per ricordarti chi siamo veramente."
  Inmitten des Durcheinanders flüsterte er ihr zu: "Dieser *Kuss* soll dich daran erinnern, wer wir wirklich sind."
