Rang: 2568
Wort: cretino
Wortart: adj
Wort mit Artikel: cretino
Femininum / Plural: ''
IPA: ''
Definition: dumm, blöd, albern
Register: ''
Beispielsätze: |-
  Quel *cretino* ha rovesciato il caffè per la terza volta oggi!
  Dieser *Dummkopf* hat den Kaffee schon zum dritten Mal heute verschüttet!
  
  Mi sembra *cretino* pensare che tutto si sistemerà da solo.
  Es kommt mir *albern* vor, zu glauben, dass sich alles von allein regelt.
  
  Se continui a comportarti così, rischi di sembrare *cretino* davanti a tutti.
  Wenn du dich weiter so benimmst, wirst du noch *dumm* dastehen.
  
  Non puoi prendere decisioni così *cretine* quando si tratta di un affare importante!
  Du kannst doch keine so *blöden* Entscheidungen treffen, wenn es um ein wichtiges Geschäft geht!
  
  Era così *cretino* da credere alle sue promesse vuote.
  Er war so *dumm*, diesen leeren Versprechungen zu glauben.
