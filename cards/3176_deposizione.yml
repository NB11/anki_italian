Rang: 3176
Wort: deposizione
Wortart: n.f
Wort mit Artikel: la deposizione
Femininum / Plural: deposizioni
IPA: ''
Definition: die Aussage, -n
Register: ''
Beispielsätze: |-
  La *deposizione* del testimone è avvenuta ieri in tribunale.
  Die *Aussage* des Zeugen fand gestern vor Gericht statt.
  
  Secondo la legge, la *deposizione* deve essere volontaria.
  Laut Gesetz muss die *Aussage* freiwillig sein.
  
  Ha fatto una *deposizione* dettagliata durante il processo.
  Er hat eine detaillierte *Aussage* während des Prozesses gemacht.
  
  La polizia ha registrato la *deposizione* dell’imputato.
  Die Polizei hat die *Aussage* des Angeklagten aufgezeichnet.
  
  Senza la tua *deposizione*, non potremmo procedere con l’indagine.
  Ohne deine *Aussage* könnten wir die Ermittlungen nicht fortsetzen.
