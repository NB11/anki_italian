Rang: 2372
Wort: calore
Wortart: n.m
Wort mit Artikel: il calore
Femininum / Plural: i calori
IPA: ''
Definition: die Wärme, die Hitze
Register: ''
Beispielsätze: |-
  Oggi fa così tanto *calore* che preferisco restare a casa.
  Heute ist es so viel *Wärme*, dass ich lieber zu Hause bleibe.
  
  Il *calore* del camino riscaldava tutta la stanza.
  Die *Wärme* des Kamins erwärmte den ganzen Raum.
  
  Avverto un improvviso *calore* alle mani quando indosso i guanti.
  Ich spüre eine plötzliche *Hitze* in den Händen, wenn ich die Handschuhe anziehe.
  
  Gli scienziati studiano come immagazzinare il *calore* solare.
  Die Wissenschaftler untersuchen, wie man die *Wärme* der Sonne speichern kann.
  
  Durante la maratona, il *calore* esterno non aiuta certo le prestazioni.
  Während des Marathons hilft die äußere *Hitze* sicher nicht bei den Leistungen.
