Rang: 4613
Wort: jeep
Wortart: n.m
Wort mit Artikel: il jeep
Femininum / Plural: jeep
IPA: ''
Definition: das Geländefahrzeug, -e
Register: ''
Beispielsätze: |-
  Ho comprato una *jeep* usata per esplorare le foreste del Canada.
  Ich habe ein gebrauchtes *Geländefahrzeug* gekauft, um die Wälder Kanadas zu erkunden.
  
  La *jeep* del nonno è ancora in ottime condizioni dopo trent’anni.
  Der *Geländewagen* meines Großvaters ist nach dreißig Jahren immer noch in einwandfreiem Zustand.
  
  Se avessi più soldi, comprerei una *jeep* nuova per il nostro viaggio in Africa.
  Wenn ich mehr Geld hätte, würde ich ein neues *Geländefahrzeug* für unsere Reise nach Afrika kaufen.
  
  Nonostante la pioggia, la *jeep* è riuscita a superare il sentiero fangoso senza problemi.
  Trotz des Regens schaffte es das *Geländefahrzeug*, den matschigen Pfad problemlos zu überwinden.
  
  Chiunque voglia avventurarsi nel deserto dovrebbe avere almeno una *jeep* affidabile.
  Wer sich in die Wüste wagen will, sollte mindestens ein zuverlässiges *Geländefahrzeug* besitzen.
