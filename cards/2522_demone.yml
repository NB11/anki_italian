Rang: 2522
Wort: demone
Wortart: n.m
Wort mit Artikel: il demone
Femininum / Plural: demoni
IPA: ''
Definition: der Dämon, -en
Register: ''
Beispielsätze: |-
  Nel Medioevo si credeva che *demoni* tormentassero le anime dei peccatori.
  Im Mittelalter glaubte man, dass *Dämonen* die Seelen der Sünder quälten.
  
  Nonostante le difficoltà, lui non si lasciò sopraffare dal *demone* della pigrizia.
  Trotz der Schwierigkeiten ließ er sich nicht von dem *Dämon* der Faulheit überwältigen.
  
  Ti sei mai chiesto quali *demoni* abitano dentro ognuno di noi, nascosti nell’ombra?
  Hast du dich jemals gefragt, welche *Dämonen* in jedem von uns wohnen, verborgen im Schatten?
  
  Il film parlava di un *demone* che possedeva una bambina innocente, ma alla fine fu sconfitto.
  Der Film handelte von einem *Dämon*, der ein unschuldiges Mädchen besessen hatte, doch am Ende wurde er besiegt.
  
  Se vuoi liberarti dei tuoi *demoni*, devi affrontarli prima di tutto dentro di te.
  Wenn du deine *Dämonen* loswerden willst, musst du dich ihnen zunächst in dir selbst stellen.
