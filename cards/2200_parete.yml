Rang: 2200
Wort: parete
Wortart: n.f
Wort mit Artikel: la parete
Femininum / Plural: pareti
IPA: ''
Definition: die Wand, -¨e
Register: ''
Beispielsätze: |-
  La *parete* della camera da letto è dipinta di un blu molto chiaro.
  Die *Wand* des Schlafzimmers ist in einem sehr hellen Blau gestrichen.
  
  Hanno trovato un foro nella *parete* che portava direttamente in cantina.
  Sie haben ein Loch in der *Wand* gefunden, das direkt in den Keller führte.
  
  Se vuoi appendere quel quadro, dovresti prima verificare la stabilità della *parete*.
  Wenn du dieses Bild aufhängen möchtest, solltest du vorher die Stabilität der *Wand* überprüfen.
  
  La *parete* sud della casa riceve sempre più sole al pomeriggio.
  Die *südliche Wand* des Hauses bekommt nachmittags immer mehr Sonne.
  
  Mentre puliva, ha notato che la vernice della *parete* si stava scrostando.
  Während er putzte, bemerkte er, dass sich die Farbe der *Wand* ablöste.
