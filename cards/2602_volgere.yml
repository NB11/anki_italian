Rang: 2602
Wort: volgere
Wortart: v
Wort mit Artikel: volgere
Femininum / Plural: ''
IPA: ''
Definition: lenken, richten, umdrehen
Register: ''
Beispielsätze: |-
  Il sole sta *volgendo* verso ovest, segnalando la fine della giornata.
  Die Sonne ist dabei, sich nach Westen zu *richten*, und signalisiert so das Ende des Tages.
  
  Ha *volto* lo sguardo verso di me con un sorriso misterioso.
  Er hat seinen Blick für einen Moment mit einem geheimnisvollen Lächeln zu mir *gedreht*.
  
  Spero che la situazione non *volga* al peggio nel prossimo futuro.
  Ich hoffe, dass sich die Lage nicht im nächsten Moment zum Schlechtesten *wendet*.
  
  Il comitato sta *volgendo* la sua attenzione verso lo sviluppo di nuove strategie.
  Das Komitee richtet seine Aufmerksamkeit gerade auf die *Entwicklung* neuer Strategien.
  
  Quando ho sentito quella notizia, il mio pensiero si è immediatamente *volto* a mio padre.
  Als ich diese Nachricht gehört habe, hat sich mein Gedanke sofort meinem Vater zu*gewandt*.
