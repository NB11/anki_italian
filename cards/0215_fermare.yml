Wort: fermare
Wortart: vt
Wort mit Artikel: fermare
Femininum / Plural: ''
IPA: ''
Definition: anhalten, stoppen
Register: ''
Beispielsätze: |-
  Devi *fermare* la macchina al semaforo rosso.
  Du musst das Auto an der roten Ampel *anhalten*.
  
  Il treno è *fermo* alla stazione da dieci minuti.
  Der Zug steht seit zehn Minuten am Bahnhof *still*.
  
  *Fermati* un attimo, per favore!
  *Halt* bitte einen Moment an!
  
  Se non *fermi* quella discussione, uscirò dalla stanza.
  Wenn du dieses Gespräch nicht *beendest*, verlasse ich den Raum.
  
  Vorrebbero che l’autobus si *fermi* davanti all’albergo.
  Sie würden gerne haben, dass der Bus vor dem Hotel *hält*.
