Rang: 3954
Wort: cereale
Wortart: n.m
Wort mit Artikel: il cereale
Femininum / Plural: cereali
IPA: ''
Definition: das Getreide, -
Register: ''
Beispielsätze: |-
  Oggi a colazione ho mangiato *cereale* con il latte e un po’ di miele.
  Heute zum Frühstück habe ich *Getreide* mit Milch und etwas Honig gegessen.
  
  Nel magazzino c’è un *cereale* particolare che arriva solo da una piccola azienda agricola in Sicilia.
  In dem Lagerhaus gibt es ein besonderes *Getreide*, das nur von einem kleinen Bauernhof in Sizilien kommt.
  
  Se non aggiungi abbastanza acqua al *cereale*, rimarrà secco e duro.
  Wenn du dem *Getreide* nicht genug Wasser hinzugibst, bleibt es trocken und hart.
  
  Mi hanno chiesto se preferisco il *cereale* integrale o quello raffinato.
  Man hat mich gefragt, ob ich *Vollkorngetreide* oder das raffinierte Getreide bevorzuge.
  
  Nonostante la siccità, la raccolta del *cereale* è stata migliore del previsto grazie alle piogge di dicembre.
  Trotz der Dürre war die *Getreide*ernte besser als erwartet dank der Regenfälle im Dezember.
