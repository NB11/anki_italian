  Es ist *bemerkenswert*, wie alle diese wichtige Einzelheit vergessen haben.
  
  La sua risposta è stata così *notevole* che il professore ha deciso di pubblicarla.
  Seine Antwort war so *bemerkenswert*, dass der Professor beschlossen hat, sie zu veröffentlichen.
