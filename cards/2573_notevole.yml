Definition: bemerkenswert, außergewöhnlich
Register: ''
Beispielsätze: |-
  Questa è una scoperta *notevole* che potrebbe rivoluzionare la scienza.
  Das ist eine *bemerkenswerte* Entdeckung, die die Wissenschaft revolutionieren könnte.
  
  Il regista ha girato un film con una scena *notevole* che mi ha lasciato senza parole.
  Der Regisseur hat einen Film mit einer *außergewöhnlichen* Szene gedreht, die mich sprachlos gelassen hat.
  
