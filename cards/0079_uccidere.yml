Rang: 79
Wort: uccidere
Wortart: vt
Wort mit Artikel: uccidere
Femininum / Plural: ''
IPA: ''
Definition: töten, ermorden
Register: ''
Beispielsätze: |-
  Il cacciatore *uccise* un lupo nella foresta.
  Der Jäger *tötete* einen Wolf im Wald.
  
  Se *ucciderai* quel topo, prendi un veleno forte.
  Wenn du diese Maus *tötest*, nimm ein starkes Gift.
  
  Non vorrei mai *uccidere* nessuno, neanche un insetto.
  Ich würde niemanden *töten*, nicht einmal ein Insekt.
  
  Credi che i lupi *uccidano* solo per fame?
  Glaubst du, dass Wölfe nur aus Hunger *töten*?
  
  Spero che non *ucciderai* mai un animale senza motivo.
  Ich hoffe, du wirst nie ein Tier *töten* ohne Grund.
