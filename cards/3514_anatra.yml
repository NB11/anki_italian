Rang: 3514
Wort: anatra
Wortart: n.f
Wort mit Artikel: la anatra
Femininum / Plural: anatre
IPA: ''
Definition: die Ente, -n
Register: ''
Beispielsätze: |-
  Ho visto *un'*anatra nel lago vicino a casa mia.
  Ich habe *eine Ente* in dem See in der Nähe meines Hauses gesehen.
  
  Le *anatre* del parco sono molto rumorose al mattino.
  Die *Enten* im Park sind morgens sehr laut.
  
  Se avessi più tempo, andrei a dare da mangiare alle *anatre* al laghetto.
  Wenn ich mehr Zeit hätte, würde ich den *Enten* am Teich Futter geben.
  
  Non sapevo che queste *anatre* fossero così aggressive con i passanti.
  Ich wusste nicht, dass diese *Enten* so aggressiv gegenüber Passanten sind.
  
  Mi hanno detto che la *anatra* maschio ha un piumaggio più colorato di quella femmina.
  Man hat mir gesagt, dass die männliche *Ente* ein farbenfroheres Gefieder als die weibliche hat.
