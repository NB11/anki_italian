Rang: 2620
Wort: avversario
Wortart: n.m
Wort mit Artikel: l'avversario
Femininum / Plural: gli avversari
IPA: ''
Definition: der Gegner, -
Register: ''
Beispielsätze: |-
  L'*avversario* ha vinto la partita con un risultato notevole.
  Der *Gegner* hat das Spiel mit einem bemerkenswerten Ergebnis gewonnen.
  
  Non ho ancora scelto il mio *avversario* per il torneo di domani.
  Ich habe meinen *Gegner* für das Turnier morgen noch nicht ausgewählt.
  
  Credo che il nostro *avversario* sia più forte di quanto sembri.
  Ich glaube, dass unser *Gegner* stärker ist, als er scheint.
  
  Durante la discussione, l'*avversario* ha citato molti dati per giustificare la sua posizione.
  Während der Diskussion hat der *Gegner* viele Daten zitiert, um seine Position zu begründen.
  
  Gli *avversari* si sono affrontati in una battaglia epica che è durata giorni.
  Die *Gegner* haben sich in einer epischen Schlacht gemessen, die Tage dauerte.
