Wort mit Artikel: l'oca
Femininum / Plural: oche
IPA: ''
Definition: die Gans, -ä-e
Register: ''
Beispielsätze: |-
  L'*oca* cammina barcollando nel cortile.
  Die *Gans* watschelt über den Hof.
  
  Abbiamo comprato un'*oca* per il pranzo di festa.
  Wir haben eine *Gans* für das Festmahl gekauft.
  
  Le *oche* disturbano i vicini con il loro starnazzare.
  Die *Gänse* stören die Nachbarn mit ihrem Gekrächze.
  
  Mi ha regalato un'*oca* di porcellana.
  Er hat mir eine *Gans* aus Porzellan geschenkt.
  
  Questa *oca* fa più uova delle altre.
  Diese *Gans* legt mehr Eier als die anderen.
