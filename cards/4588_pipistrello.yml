Beispielsätze: |-
  Di notte vola un *pipistrello* sopra il parco cittadino.
  Nachts fliegt eine *Fledermaus* über den Stadtpark.
  
  Il veterinario ha salvato un *pipistrello* ferito trovato nel giardino.
  Der Tierarzt hat eine verletzte *Fledermaus* gerettet, die im Garten gefunden wurde.
  
  Credi che il *pipistrello* mangi insetti come dice la leggenda?
  Glaubst du, dass die *Fledermaus* Insekten frisst, wie die Legende sagt?
  
  Se senti un rumore sotto il tetto, potrebbe essere un *pipistrello* che si è rifugiato lì.
  Wenn du ein Geräusch unter dem Dach hörst, könnte es eine *Fledermaus* sein, die sich dort versteckt hat.
  
  I ricercatori studiano come i *pipistrelli* si orientano usando l'ecolocalizzazione.
  Die Forscher untersuchen, wie sich *Fledermäuse* mit Echoortung orientieren.
