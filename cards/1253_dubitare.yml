Rang: 1253
Wort: dubitare
Wortart: v
Wort mit Artikel: dubitare
Femininum / Plural: ''
IPA: ''
Definition: zweifeln, bezweifeln
Register: ''
Beispielsätze: |-
  Non *dubito* che tu abbia ragione, ma preferisco essere prudente.
  Ich *zweifle* nicht daran, dass du recht hast, aber ich möchte lieber vorsichtig sein.
  
  Se *dubiterai* troppo, perderai ogni opportunità di osare.
  Wenn du zu sehr *zweifelst*, wirst du jede Chance verlieren, zu wagen.
  
  Ti prego di non *dubitare* mai delle mie parole, perché dico sempre la verità.
  Bitte *zweifle* nie an meinen Worten, denn ich sage immer die Wahrheit.
  
  Lei *dubitava* che la soluzione fosse così semplice, ma alla fine aveva torto.
  Sie *zweifelte* daran, dass die Lösung so einfach sei, doch am Ende hatte sie Unrecht.
  
  Senza *dubitare* un secondo, lui accettò la richiesta del comandante.
  Ohne auch nur einen *Zweifel* zu hegen, nahm er die Bitte des Kommandanten an.
