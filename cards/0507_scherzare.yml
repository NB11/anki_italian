Definition: scherzen, Spaß machen
Register: ''
Beispielsätze: |-
  Stai *scherzando*? Non ci credo!
  Scherzt *du*? Das glaube ich nicht!
  
  Ieri sera abbiamo *scherzato* per tutta la cena.
  Gestern Abend haben wir die ganze Zeit *gescherzt*.
  
  Non *scherzare* con il fuoco, è pericoloso!
  Spiel nicht mit dem Feuer, das ist gefährlich!
  
  Se *scherzi* troppo spesso, gli altri non ti prendono più sul serio.
  Wenn du zu oft *scherzt*, nehmen dich die anderen nicht mehr ernst.
  
  Avrei *scherzato* volentieri, ma lui non rideva mai.
  Ich hätte gerne *gescherzt*, aber er hat nie gelacht.
