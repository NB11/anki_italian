Rang: 507
Wort: scherzare
Wortart: vi
Wort mit Artikel: scherzare
Femininum / Plural: ''
IPA: ''
Definition: scherzen
Register: ''
Beispielsätze: |-
  Non ti preoccupare, *scherzavo* solo con te!
  Mach dir keine Sorgen, ich habe nur mit dir *gescherzt*.
  
  Vedo che ti ha detto di tutto per *scherzare*, ma non ci provi più.
  Ich sehe, dass er dir alles gesagt hat, um zu *scherzen*, aber nicht mehr.
  
  Ma secondo te avere lo stesso *scherzare* con la morte è normale?
  Aber meinst du wirklich, dass es normal ist, mit dem Tod zu *scherzen*?
  
  Se proprio vuoi *scherzare*, fallo almeno con qualcosa di divertente!
  Wenn du unbedingt *scherzen* willst, dann wenigstens mit etwas Lustigem!
  
  Perché *scherzare* quando il capo annuncia tagli al personale? È una cosa seria!
  Warum *scherzt* man, wenn der Chef Entlassungen ankündigt? Das ist ernst!
