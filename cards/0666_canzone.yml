Rang: 666
Wort: canzone
Wortart: n.f
Wort mit Artikel: la canzone
Femininum / Plural: canzoni
IPA: ''
Definition: das Lied, -er
Register: ''
Beispielsätze: |-
  La *canzone* che hai scelto è davvero simile a quella che ascoltavo ieri sera.
  Das *Lied*, das du ausgewählt hast, ist wirklich dem ähnlich, das ich gestern Abend gehört habe.
  
  Ho comprato un biglietto per il concerto, ma ormai la *canzone* che volevo sentire è già finita.
  Ich habe eine Eintrittskarte für das Konzert gekauft, aber mittlerweile ist das *Lied*, das ich hören wollte, schon vorbei.
  
  Se vuoi rilassare la mente, ascolta questa *canzone* tranquilla che parla di luoghi lontani.
  Wenn du dein *Gehirn* entspannen möchtest, hör dir dieses ruhige Lied an, das von fernen Orten erzählt.
  
  La polizia ha bloccato la zona intorno al luogo del crimine perché cercavano tracce di droga vicino alla *canzone* sbagliata.
  Die Polizei hat die *Zone* um den Ort des Verbrechens abgesperrt, weil sie Spuren von Drogen in der Nähe des falschen Lieds suchten.
  
  Mi hanno detto che questa *canzone* dimostra l’amore per la musica, ma non ne sono sicuro.
  Sie haben mir gesagt, dass dieses *Lied* die Liebe zur Musik zeigt, aber ich bin mir nicht sicher.
