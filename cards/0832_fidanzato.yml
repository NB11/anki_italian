Rang: 832
Wort: fidanzato
Wortart: n.m/f
Wort mit Artikel: il/la fidanzato
Femininum / Plural: fidanzati/fidanzate
IPA: ''
Definition: der Verlobte / die Verlobte, -n
Register: ''
Beispielsätze: |-
  Il *fidanzato* di Maria è venuto a trovarla stamattina.
  Der *Verlobte* von Maria ist heute Morgen zu ihr gekommen.
  
  Voglio presentarti il mio *fidanzato* inglese che ho conosciuto al club.
  Ich möchte dir meinen englischen *Verlobten* vorstellen, den ich im Club kennengelernt habe.
  
  Se non rispetti la nostra libertà, come credi che il tuo *fidanzato* possa accettarlo?
  Wenn du unsere Freiheit nicht respektierst, wie glaubst du, dass dein *Verlobter* das akzeptieren kann?
  
  I genitori non volevano che la loro figlia sposasse il *fidanzato* ricco perché sospettavano di lui.
  Die Eltern wollten nicht, dass ihre Tochter den reichen *Verlobten* heiratet, weil sie Verdacht gegen ihn hegten.
  
  Dopo dieci anni di relazione, lui ha chiesto alla sua *fidanzata* di sposarlo sulla barca al tramonto.
  Nach zehn Jahren Beziehung hat er seiner *Verlobten* auf dem Boot bei Sonnenuntergang einen Heiratsantrag gemacht.
