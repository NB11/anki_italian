Rang: 1717
Wort: impressione
Wortart: n.f
Wort mit Artikel: l'impressione
Femininum / Plural: impressioni
IPA: ''
Definition: der Eindruck, Eindrücke
Register: ''
Beispielsätze: |-
  Non ho ancora avuto il tempo di fare una *impressione* sul nuovo film.
  Ich habe noch keine Zeit gehabt, einen *Eindruck* von dem neuen Film zu gewinnen.
  
  La tua *impressione* sui nostri colleghi è stata molto positiva.
  Dein *Eindruck* von unseren Kollegen war sehr positiv.
  
  Credo che la *impressione* generale sia stata migliore del previsto.
  Ich glaube, der *Eindruck* insgesamt war besser als erwartet.
  
  Dopo aver parlato con lui, ho cambiato la mia *impressione* su questa situazione.
  Nachdem ich mit ihm gesprochen hatte, habe ich meinen *Eindruck* von dieser Situation geändert.
  
  La *impressione* che dà questa città è proprio magica, eppure c'è molta polvere per strada.
  Der *Eindruck*, den diese Stadt vermittelt, ist wirklich magisch, und doch liegt viel Staub auf der Straße.
