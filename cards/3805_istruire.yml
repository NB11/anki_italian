Rang: 3805
Wort: istruire
Wortart: vt
Wort mit Artikel: istruire
Femininum / Plural: ''
IPA: ''
Definition: unterrichten, anleiten
Register: ''
Beispielsätze: |-
  L'insegnante *istruisce* gli studenti con grande pazienza ogni giorno.
  Die Lehrerin *unterrichtet* die Schüler jeden Tag mit großer Geduld.
  
  Se vuoi imparare a suonare la chitarra, ti consiglio di *istruirti* con un maestro esperto.
  Wenn du Gitarre lernen willst, rate ich dir, dich bei einem erfahrenen Lehrer *anzuleiten*.
  
  Il capo ha deciso di *istruire* il nuovo impiegato sulle procedure di sicurezza.
  Der Chef hat beschlossen, den neuen Mitarbeiter in die Sicherheitsverfahren *einzuweisen*.
  
  Spero che tu riesca a *istruire* tuo fratello minore nel modo giusto.
  Ich hoffe, dass du deinen jüngeren Bruder richtig *belehren* kannst.
  
  Molti genitori preferiscono *istruire* i figli a casa anziché mandarli a scuola.
  Viele Eltern ziehen es vor, ihre Kinder zu Hause zu *unterrichten*, statt sie zur Schule zu schicken.
