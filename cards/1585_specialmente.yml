Rang: 1585
Wort: specialmente
Wortart: adv
Wort mit Artikel: specialmente
Femininum / Plural: ''
IPA: ''
Definition: besonders, insbesondere
Register: ''
Beispielsätze: |-
  Ho *specialmente* apprezzato il tuo impegno nel completare il progetto in tempo.
  Ich habe *besonders* dein Engagement geschätzt, das Projekt rechtzeitig abzuschließen.
  
  Maria non vuole *specialmente* che tu denunci suo fratello per quel furto.
  Maria will *besonders* nicht, dass du ihren Bruder wegen dieses Diebstahls anzeigst.
  
  Questo ristorante è noto *specialmente* per la qualità dei suoi piatti, anche se la attesa è troppo lunga.
  Dieses Restaurant ist *besonders* für die Qualität seiner Gerichte bekannt, auch wenn die Wartezeit zu lang ist.
  
  Non ho visto *specialmente* nulla di strano nel pavimento della stanza, tranne qualche topo che scappava.
  Ich habe *besonders* nichts Ungewöhnliches am Boden des Zimmers gesehen, außer ein paar Mäusen, die wegliefen.
  
  Filippo, *specialmente* se sei un esperto, dovresti sapere che ogni conseguenza delle tue azioni deve essere ponderata.
  Filippo, *besonders* wenn du ein Experte bist, solltest du wissen, dass jede Konsequenz deiner Handlungen abgewogen werden muss.
