Rang: 1298
Wort: fornire
Wortart: vt
Wort mit Artikel: fornire
Femininum / Plural: ''
IPA: ''
Definition: liefern, bereitstellen
Register: ''
Beispielsätze: |-
  L'azienda *fornisce* software di sicurezza alle banche da oltre dieci anni.
  Das Unternehmen liefert Banken seit über zehn Jahren Sicherheitssoftware.
  
  Se non avessi dubitato, ti avrei *fornito* subito le informazioni necessarie per la spesa.
  Hätte ich nicht gezweifelt, hätte ich dir *sofort* die nötigen Informationen für den Einkauf gegeben.
  
  Il cameriere ci *fornirà* i drink che abbiamo ordinato prima che inizia la gara alla televisione.
  Der Kellner wird uns die Getränke, die wir bestellt haben, *bringen*, bevor das Rennen im Fernsehen beginnt.
  
  Nonostante le difficoltà, loro *hanno fornito* aiuto a tutte le creature bisognose nel quartiere.
  Trotz der Schwierigkeiten haben sie allen bedürftigen Wesen im Viertel Hilfe *geleistet*.
  
  Vorresti che la stampa *fornisse* articoli con sottotitoli più chiari per il pubblico?
  Würdest du *wollen*, dass die Presse Artikel mit klareren Untertiteln für das Publikum verfasst?
