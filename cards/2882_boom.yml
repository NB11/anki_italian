Rang: 2882
Wort: boom
Wortart: n.m
Wort mit Artikel: il boom
Femininum / Plural: alberi
IPA: ''
Definition: der Baum, Bäume
Register: ''
Beispielsätze: |-
  Nel giardino c'è un *boom* molto antico che ha più di cento anni.
  Im Garten steht ein *Baum*, der über hundert Jahre alt ist.
  
  D'estate preferisco passeggiare sotto gli *boom* per godere dell'ombra.
  Im Sommer gehe ich lieber unter den *Bäumen* spazieren, um den Schatten zu genießen.
  
  Se pianti un *boom* oggi, tra vent'anni avrai un grande albero.
  Wenn du heute einen *Baum* pflanzt, wirst du in zwanzig Jahren einen großen Baum haben.
  
  Gli *boom* secolari del parco attirano molti turisti ogni anno.
  Die uralten *Bäume* im Park ziehen jedes Jahr viele Touristen an.
  
  Non tagliare quell'*boom* senza un permesso: è protetto dalla legge.
  Fälle diesen *Baum* nicht ohne Erlaubnis – er steht unter Naturschutz.
