Rang: 4597
Wort: selezione
Wortart: n.f
Wort mit Artikel: la selezione
Femininum / Plural: selezioni
IPA: ''
Definition: die Auswahl, die Auswahlmöglichkeit, Sortierung
Register: ''
Beispielsätze: |-
  La *selezione* dei candidati avviene in base alle competenze e all’esperienza professionale.
  Die *Auswahl* der Bewerber erfolgt anhand der Fähigkeiten und Berufserfahrung.
  
  Dopo aver fatto la *selezione* dei documenti, mi sono resa conto che mancava il certificato.
  Nach der *Sortierung* der Unterlagen bemerkte ich, dass das Zertifikat fehlte.
  
  La *selezione* dei libri per la biblioteca scolastica richiede molto tempo.
  Die *Auswahl* der Bücher für die Schulbibliothek dauert sehr lange.
  
  Se la *selezione* dei partecipanti non fosse stata così accurata, non avremmo vinto la gara.
  Wenn die *Auswahl* der Teilnehmer nicht so sorgfältig gewesen wäre, hätten wir den Wettbewerb nicht gewonnen.
  
  La *selezione* dei vincitori del concorso avverrà domani mattina alle dieci.
  Die *Ziehung* der Gewinner des Wettbewerbs findet morgen früh um zehn Uhr statt.
