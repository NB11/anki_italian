Rang: 2356
Wort: coperta
Wortart: n.f
Wort mit Artikel: la coperta
Femininum / Plural: coperte
IPA: ''
Definition: die Decke, -n
Register: ''
Beispielsätze: |-
  Non trovo più la *coperta* che ho messo ieri sera sul divano.
  Ich finde die *Decke* nicht mehr, die ich gestern Abend auf die Couch gelegt habe.
  
  La *coperta* di lana tiene caldo anche nelle notti più fredde.
  Die *Decke* aus Wolle hält auch in den kältesten Nächten warm.
  
  Quando ero malata, mia madre mi ha avvolto nelle *coperte* per farmi stare meglio.
  Als ich krank war, hat mich meine Mutter in *Decken* eingewickelt, um mich besser zu fühlen.
  
  Hanno trovato una *coperta* sporca abbandonata vicino al fiume.
  Sie haben eine schmutzige *Decke* am Flussufer gefunden.
  
  Se avessi una *coperta* più pesante, dormirei molto meglio in inverno.
  Wenn ich eine schwerere *Decke* hätte, würde ich im Winter viel besser schlafen.
