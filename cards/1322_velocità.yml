Rang: 1322
Wort: velocità
Wortart: n.f
Wort mit Artikel: la velocità
Femininum / Plural: velocità
IPA: ''
Definition: die Geschwindigkeit, Schnelligkeit
Register: ''
Beispielsätze: |-
  La *velocità* massima in autostrada è di 130 chilometri all’ora.
  Die *höchstgeschwindigkeit* auf der Autobahn beträgt 130 Stundenkilometer.
  
  Nonostante *velocità* alte, l’autista è riuscito a evitare l’incidente.
  Trotz der *hohen Geschwindigkeit* konnte der Fahrer den Unfall vermeiden.
  
  Se aumenti ancora la *velocità*, rischi di prendere una multa.
  Wenn du die *Geschwindigkeit* weiter erhöhst, riskierst du ein Knöllchen.
  
  Credo che la *velocità* con cui lavori sia davvero straordinaria.
  Ich glaube, die *Geschwindigkeit*, mit der du arbeitest, ist wirklich außergewöhnlich.
  
  La polizia ha rilevato una *velocità* di 200 km/h in un centro abitato.
  Die Polizei hat eine *Geschwindigkeit* von 200 km/h in einem Wohngebiet gemessen.
