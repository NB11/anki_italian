  Das *Blatt*, das du geschrieben hast, war voller Rechtschreibfehler.
  
  Mi passeresti quel *foglio* con la lista della spesa?
  Kannst du mir mal das *Blatt* mit der Einkaufsliste reichen?
  
  Se vuoi cancellare, usa un *foglio* di carta assorbente.
  Wenn du etwas ausradieren möchtest, nimm ein *Blatt* Küchenpapier.
