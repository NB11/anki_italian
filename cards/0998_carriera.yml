Rang: 998
Wort: carriera
Wortart: n.f
Wort mit Artikel: la carriera
Femininum / Plural: carriere
IPA: ''
Definition: die Laufbahn, -en, die Karriere, -n
Register: ''
Beispielsätze: |-
  Dopo *una carriera* di successo come attore, vuole dedicarsi alla pesca.
  Nach *einer erfolgreichen Karriere* als Schauspieler möchte er sich dem Angeln widmen.
  
  Nonostante *la carriera* frenetica, trova sempre tempo per godere di un tè al bar.
  Trotz seiner hektischen *Karriere* findet er immer Zeit für eine Tasse Tee in der Bar.
  
  Credo che *la carriera* politica richieda molta pazienza e abilità nel discorso.
  Ich glaube, dass *eine politische Karriere* viel Geduld und Redegeschick erfordert.
  
  Se non avessi accettato *quella carriera*, ora lavorerei in un ristorante a sud della città.
  Wenn ich *diese Laufbahn* nicht angenommen hätte, würde ich jetzt in einem Restaurant im Süden der Stadt arbeiten.
  
  Dopo *la carriera* militare, molti ex soldati faticano a rientrare nella vita civile.
  Nach *der Militärlaufbahn* fällt es vielen ehemaligen Soldaten schwer, in den zivilen Alltag zurückzukehren.
