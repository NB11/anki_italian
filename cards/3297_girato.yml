Rang: 3297
Wort: girato
Wortart: n.m
Wort mit Artikel: il girato
Femininum / Plural: girati
IPA: ''
Definition: der Film, -e
Register: ''
Beispielsätze: |-
  Ho visto un *girato* molto interessante al cinema ieri sera.
  Ich habe gestern Abend einen sehr *interessanten Film* im Kino gesehen.
  
  Quel regista ha realizzato diversi *girati* in questa regione negli ultimi anni.
  Jener Regisseur hat in den letzten Jahren mehrere *Filme* in dieser Region gedreht.
  
  Mi hanno detto che il loro nuovo *girato* è ancora in fase di montaggio.
  Man hat mir gesagt, dass ihr neuer *Film* sich noch in der Montagephase befindet.
  
  Durante il viaggio abbiamo girato un *girato* amatoriale con la mia fotocamera.
  Während der Reise haben wir einen amateurhaften *Film* mit meiner Kamera gedreht.
  
  Il *girato* in bianco e nero è diventato un vero capolavoro del cinema muto.
  Der *Film* in Schwarz-Weiß wurde zu einem echten Meisterwerk des Stummfilms.
