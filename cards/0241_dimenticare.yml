Beispielsätze: |-
  Non *dimenticare* di chiudere la porta a chiave!
  Vergiss nicht, die Tür abzuschließen!
  
  Mi dispiace, ho *dimenticato* il tuo compleanno.
  Tut mir leid, ich habe deinen Geburtstag vergessen.
  
  Se *dimenticherai* l’appuntamento, chiamami per favore.
  Wenn du den Termin vergisst, rufe mich bitte an.
  
  Non credevo che tu *dimenticassi* così in fretta il nostro accordo.
  Ich hätte nicht gedacht, dass du unsere Absprache so schnell vergisst.
  
  Vorrei che non *dimenticassi* mai il valore della famiglia.
  Ich wünschte, du würdest den Wert der Familie nie vergessen.
