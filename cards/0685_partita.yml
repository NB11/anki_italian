Rang: 685
Wort: partita
Wortart: n.f
Wort mit Artikel: la partita
Femininum / Plural: partite
IPA: ''
Definition: das Spiel, -e; die Partie, -n
Register: ''
Beispielsätze: |-
  I giocatori hanno giocato una *partita* molto intensa ieri sera.
  Die Spieler haben ein *Spiel* sehr intensiv gestern Abend gespielt.
  
  Nonostante il proposito di evitare il crimine, la polizia non è riuscita a bloccare la *partita* illegale.
  Trotz des Vorsatzes, das Verbrechen zu vermeiden, gelang es der Polizei nicht, die illegale *Partie* zu sperren.
  
  Vorresti accompagnarmi alla *partita* di calcio domani sera?
  Würdest du mich morgen Abend zu dem Fußball-*Spiel* begleiten?
  
  È necessario dimostrare la tua innocenza prima che inizi la *partita* ufficiale.
  Es ist notwendig, deine Unschuld zu *beweisen*, bevor das offizielle Spiel beginnt.
  
  La squadra ha vinto la *partita* in modo inaspettato, ma il pubblico non se ne è accorto perché era tutto intorno al luogo dell'evento.
  Die Mannschaft gewann das *Spiel* unerwartet, aber das Publikum bemerkte es nicht, weil es sich rings um den Ort der Veranstaltung befand.
