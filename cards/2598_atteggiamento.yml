Rang: 2598
Wort: atteggiamento
Wortart: n.m
Wort mit Artikel: l'atteggiamento
Femininum / Plural: gli atteggiamenti
IPA: ''
Definition: die Haltung, die Einstellung, die Einstellungweise
Register: ''
Beispielsätze: |-
  L'*atteggiamento* del manager nei confronti dei dipendenti è cambiato radicalmente dopo la fusione.
  Die *Haltung* des Managers den Mitarbeitern gegenüber hat sich nach der Fusion radikal geändert.
  
  Non sopporto il suo *atteggiamento* arrogante quando parla con gli impiegati.
  Ich kann seine *arrogante *Einstellung* nicht ertragen, wenn er mit den Angestellten spricht.
  
  Ha mostrato un *atteggiamento* molto collaborativo durante il trasferimento della sede.
  Er zeigte eine sehr *kooperative *Haltung während der Übersiedlung* des Hauptsitzes.
  
  Se avessi il suo *atteggiamento* nei confronti della fatica, probabilmente non sarei così stanco.
  Wenn ich seine *Einstellung* zur Anstrengung hätte, wäre ich wahrscheinlich nicht so müde.
  
  L'*atteggiamento* degli spettatori è stato esemplare durante l’asta di beneficenza.
  Die *Haltung* der Zuschauer war vorbildlich während der Benefiz-Auktion.
