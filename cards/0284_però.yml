Rang: 284
Wort: però
Wortart: adv
Wort mit Artikel: però
Femininum / Plural: ''
IPA: ''
Definition: aber, jedoch, dennoch
Register: ''
Beispielsätze: |-
  Mi piace il caffè, *però* preferisco il tè.
  Ich mag Kaffee, *aber* ich bevorzuge Tee.
  
  È caro, *però* molto buono.
  Es ist teuer, *doch* sehr gut.
  
  Non ho fame, *però* mangio un gelato.
  Ich habe keinen Hunger, *trotzdem* esse ich ein Eis.
  
  Volevo venire, *però* non ho potuto.
  Ich wollte kommen, *aber* ich konnte nicht.
  
  È tardi, *però* possiamo ancora uscire.
  Es ist spät, *doch* wir können noch ausgehen.
