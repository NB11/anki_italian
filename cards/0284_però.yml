Rang: 284
Wort: però
Wortart: adv
Wort mit Artikel: però
Femininum / Plural: ''
IPA: ''
Definition: aber, jedoch, allerdings
Register: ''
Beispielsätze: |-
  Voglio venire, *però* non ho tempo oggi.
  Ich möchte kommen, *aber* ich habe heute keine Zeit.
  
  È caro, *però* di ottima qualità.
  Es ist teuer, *jedoch* von bester Qualität.
  
  Non mi piace la pizza, *però* la mangio ugualmente.
  Ich mag Pizza nicht, *allerdings* esse ich sie trotzdem.
  
  Mi piace molto questo film, *però* preferisco quello.
  Ich mag diesen Film sehr, *aber* ich bevorzuge jenen.
  
  Ha fatto un errore, *però* ha imparato da esso.
  Er hat einen Fehler gemacht, *allerdings* hat er daraus gelernt.
