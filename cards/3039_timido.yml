Rang: 3039
Wort: timido
Wortart: adj
Wort mit Artikel: timido
Femininum / Plural: ''
IPA: ''
Definition: schüchtern, scheu
Register: ''
Beispielsätze: |-
  Maria è una ragazza molto *timida* e arrossisce facilmente.
  Maria ist ein sehr *schüchternes* Mädchen und errötet schnell.
  
  Se fossi meno *timido*, riusciresti a parlare con tutti!
  Wenn du weniger *schüchtern* wärst, könntest du mit allen reden!
  
  Nonostante fosse *timido*, ha osato chiedere un aumento al suo capo.
  Obwohl er *schüchtern* war, hat er es gewagt, eine Gehaltserhöhung vom Chef zu verlangen.
  
  I bambini *timidi* spesso si nascondono dietro i genitori.
  Schüchterne Kinder verstecken sich oft hinter ihren Eltern.
  
  Sembra che tu sia ancora più *timido* quando lo incontri di persona.
  Es scheint, als wärst du noch *schüchterner*, wenn du ihn persönlich triffst.
