Rang: 1510
Wort: agenzia
Wortart: n.f
Wort mit Artikel: l'agenzia
Femininum / Plural: agenzie
IPA: ''
Definition: die Agentur, -en
Register: ''
Beispielsätze: |-
  L'*agenzia* immobiliare ci ha trovato un delizioso appartamento in centro.
  Die *Immobilienagentur* hat uns eine köstliche Wohnung im Zentrum gefunden.
  
  Se vuoi prenotare, devi chiamare l'*agenzia* al più presto!
  Wenn du buchen willst, musst du die *Agentur* so schnell wie möglich anrufen!
  
  L'*agenzia* di viaggi offre anche prestiti a condizioni favorevoli.
  Die *Reiseagentur* bietet auch Darlehen zu günstigen Bedingungen an.
  
  L'*agenzia* dove lavoro ha investito molto nell'internet negli ultimi anni.
  Die *Agentur*, wo ich arbeite, hat in den letzten Jahren viel in das Internet investiert.
  
  Mi hanno detto che l'*agenzia* esamina ogni candidato con molta attenzione.
  Mir wurde gesagt, dass die *Agentur* jeden Bewerber mit großer Sorgfalt untersucht.
