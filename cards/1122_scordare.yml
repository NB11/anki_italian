Rang: 1122
Wort: scordare
Wortart: v
Wort mit Artikel: scordare
Femininum / Plural: ''
IPA: ''
Definition: vergessen, entfallen
Register: ''
Beispielsätze: |-
  Non *scordo* mai di augurare buon compleanno ai miei amici.
  Ich vergesse niemals, meinen Freunden zum Geburtstag zu gratulieren.
  
  Se *scordi* la password, puoi resettarla cliccando su "password dimenticata".
  Wenn du das *Passwort* vergisst, kannst du es durch Klicken auf "Passwort vergessen" zurücksetzen.
  
  Spero proprio di non *scordare* di chiudere la porta prima di uscire!
  Ich hoffe sehr, dass mir nicht *einfällt* zu vergessen, die Tür zu schließen, bevor ich gehe!
  
  Nonostante la confusione, lei non *scordò* neanche per un attimo il suo obiettivo principale.
  Trotz der Verwirrung *vergaß* sie nicht einen einzigen Moment ihr wichtigstes Ziel.
  
  Non è normale che tu *scordi* tutte le raccomandazioni del dottore soprattutto dopo un intervento così rischioso!
  Es ist nicht normal, dass du alle *Empfehlungen* des Arztes vor allem nach einem so riskanten Eingriff vergisst!
