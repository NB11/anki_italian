Rang: 2906
Wort: volante
Wortart: n.m
Wort mit Artikel: il volante
Femininum / Plural: volanti
IPA: ''
Definition: das Steuerrad, -¨er
Register: ''
Beispielsätze: |-
  Il pilota ha perso il controllo dell’aereo perché il *volante* si è bloccato improvvisamente.
  Der Pilot verlor die Kontrolle über das Flugzeug, weil *das Steuerrad* plötzlich blockierte.
  
  Nonostante la nebbia, il *volante* dell’auto rispondeva perfettamente ai comandi del guidatore.
  Trotz des Nebels reagierte *das Steuerrad* des Autos perfekt auf die Befehle des Fahrers.
  
  Se avessi un elicottero, vorrei un *volante* con comandi touch anche per i principianti.
  Wenn ich einen Hubschrauber hätte, würde ich *ein Steuerrad* mit Touch-Bedienung sogar für Anfänger wollen.
  
  Dopo l’incidente, hanno sostituito il *volante* danneggiato con uno nuovo di zecca.
  Nach dem Unfall tauschten sie *das beschädigte Steuerrad* gegen ein nagelneues aus.
  
  Nel mio sogno ho guidato una nave spaziale con un *volante* futuristico e sensori olografici.
  In meinem Traum steuerte ich ein Raumschiff mit *einem futuristischen Steuerrad* und holografischen Sensoren.
