Rang: 3553
Wort: artistico
Wortart: adj
Wort mit Artikel: artistico
Femininum / Plural: artistici, artistiche
IPA: ''
Definition: künstlerisch
Register: ''
Beispielsätze: |-
  Ho visitato un museo con opere *artistiche* davvero straordinarie ieri.
  Ich habe gestern ein Museum mit wirklich außergewöhnlichen *künstlerischen* Werken besucht.
  
  Per essere un pittore famoso, il suo stile è sorprendentemente *artistico*.
  Um ein berühmter Maler zu sein, ist sein Stil überraschend *künstlerisch*.
  
  Spero che questa mostra *artistica* riceva il consenso del pubblico.
  Ich hoffe, dass diese *künstlerische* Ausstellung die Zustimmung des Publikums erhält.
  
  Le sue capacità *artistiche* sono state decisive per il successo del progetto.
  Seine *künstlerischen* Fähigkeiten waren entscheidend für den Erfolg des Projekts.
  
  Nonostante fosse un *artistico* in erboristeria, il negozio vendeva anche oggetti artistici.
  Obwohl er ein *Kräuterkundiger* war, verkaufte das Geschäft auch künstlerische Gegenstände.
