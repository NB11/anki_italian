Rang: 1680
Wort: circondare
Wortart: vt
Wort mit Artikel: circondare
Femininum / Plural: ''
IPA: ''
Definition: umgeben, einschließen
Register: ''
Beispielsätze: |-
  La polizia ha *circondato* l'edificio dopo l'allarme bomba.
  Die Polizei hat das Gebäude nach der Bombenalarm *umgeben*.
  
  Se non *circondi* l'area con una recinzione, gli animali entreranno nel giardino.
  Wenn du das Gelände nicht mit einem Zaun *umgibst*, werden die Tiere in den Garten kommen.
  
  Nonostante la nebbia, gli scout sono riusciti a *circondare* il campo nemico.
  Trotz des Nebels gelang es den Pfadfindern, das feindliche Lager zu *umzingeln*.
  
  Il sindaco vuole che *circondiamo* il parco con alberi per proteggerlo dal traffico.
  Der Bürgermeister möchte, dass wir den Park mit Bäumen *umgeben*, um ihn vor dem Verkehr zu schützen.
  
  Appena abbiamo visto le fiamme, abbiamo cercato di *circondare* il fuoco con acqua e coperte.
  Sobald wir die Flammen sahen, versuchten wir, das Feuer mit Wasser und Decken zu *einschließen*.
