Wort mit Artikel: il pianto
Femininum / Plural: pianti
IPA: ''
Definition: das Weinen, -
Register: ''
Beispielsätze: |-
  Dopo la notizia triste, tutti hanno visto il suo *pianto* disperato.
  Nach der traurigen Nachricht sahen alle sein *Weinen*.
  
  Nonostante il *pianto* della bambina, la madre rimase ferma nella sua decisione.
  Trotz des *Weinens* des Kindes blieb die Mutter in ihrer Entscheidung.
  
  Il *pianto* improvviso del neonato svegliò tutta la famiglia.
  Das plötzliche *Weinen* des Neugeborenen weckte die ganze Familie.
  
  Se avessi saputo che ti avrebbe fatto questo *pianto*, non te l’avrei mai detto.
  Wenn ich gewusst hätte, dass es dieses *Weinen* bei dir auslösen würde, hätte ich es dir nie gesagt.
  
  Che senso ha il *pianto* di chi non vuole vedere la realtà?
  Welchen Sinn hat das *Weinen* derer, die die Realität nicht sehen wollen?
