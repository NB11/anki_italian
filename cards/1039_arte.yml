Rang: 1039
Wort: arte
Wortart: n.f
Wort mit Artikel: l'arte
Femininum / Plural: arti
IPA: ''
Definition: die Kunst, -¨e
Register: ''
Beispielsätze: |-
  L'*arte* contemporanea spesso cattura emozioni attraverso i dettagli più piccoli.
  Die *Kunst* fängt oft Gefühle durch die kleinsten Einzelheiten ein.
  
  Sai che l'*arte* rinascimentale dura da secoli senza perdere valore?
  Weißt du, dass die *Kunst* der Renaissance seit Jahrhunderten ihren Wert nicht verliert?
  
  Mi hanno detto che la regina ama collezionare opere d'*arte*, soprattutto di artisti francesi.
  Man hat mir gesagt, die *Königin* sammelt gerne Werke der Kunst, besonders von französischen Künstlern.
  
  Se disturbi durante la visita del museo, l'*arte* non potrà comunicare nulla.
  Wenn du während des Museumsbesuchs *störst*, kann die Kunst sich nicht mitteilen.
  
  L'*arte* riferita in quel libro è così leggera che sembra muoversi da sola.
  Die in diesem Buch *beschriebene* Kunst ist so sanft, dass sie sich selbst zu bewegen scheint.
