Rang: 774
Wort: esempio
Wortart: n.m
Wort mit Artikel: l'esempio
Femininum / Plural: esempi
IPA: ''
Definition: das Beispiel, -e
Register: ''
Beispielsätze: |-
  Puoi dare un *esempio* di come si usa questo codice?
  Kannst du ein *Beispiel* dafür geben, wie man diesen Code verwendet?
  
  Nonostante le *esempi* che ho letto, non ho ancora capito la regola.
  Trotz der *Beispiele*, die ich gelesen habe, verstehe ich die Regel immer noch nicht.
  
  Se non segui le istruzioni, altrimenti ti licenzieranno senza *esempio*.
  Wenn du die Anweisungen nicht befolgst, werden sie dich ohne *Beispiel* entlassen.
  
  Il professore ha portato molti *esempi* tratti dalla realtà africana per spiegare il problema.
  Der Professor brachte viele *Beispiele* aus der afrikanischen Realität, um das Problem zu erklären.
  
  Avrei voluto un *esempio* più chiaro, ma purtroppo non ce ne sono stati forniti.
  Ich hätte mir ein klareres *Beispiel* gewünscht, aber leider wurden keine gegeben.
