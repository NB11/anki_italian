Rang: 3663
Wort: affidamento
Wortart: n.m
Wort mit Artikel: l'affidamento
Femininum / Plural: affidamenti
IPA: ''
Definition: das Vertrauen, die Zuversicht
Register: ''
Beispielsätze: |-
  Dopo la lunga chiacchierata con la psicologa, ho acquistato fiducia nel futuro, ma senza *affidamento* tutto sarebbe stato più difficile.
  Nach dem langen Gespräch mit der Psychologin habe ich Zuversicht für die Zukunft gewonnen, doch ohne *Vertrauen* wäre alles schwieriger gewesen.
  
  La polizia ha perso *l’affidamento* nello stato della strada dopo la pioggia battente.
  Die Polizei hat das *Vertrauen* in den Zustand der Straße nach dem Dauerregen verloren.
  
  Nonostante gli errori commessi, il suo *affidamento* nella squadra non è mai venuto meno.
  Trotz der begangenen Fehler schwand sein *Vertrauen* in das Team nie.
  
  L’*affidamento* reciproco è la base di ogni relazione duratura, non credi?
  Das gegenseitige *Vertrauen* ist die Grundlage jeder dauerhaften Beziehung, findest du nicht?
  
  Hanno perso *l’affidamento* nel progetto quando i finanziamenti sono stati tagliati improvvisamente.
  Sie verloren das *Vertrauen* in das Projekt, als die Finanzierung plötzlich gestrichen wurde.
