Rang: 2308
Wort: influenza
Wortart: n.f
Wort mit Artikel: la influenza
Femininum / Plural: influenze
IPA: ''
Definition: die Grippe, -n
Register: ''
Beispielsätze: |-
  Quest'anno molti studenti hanno preso *l'influenza* e sono rimasti a casa per una settimana.
  Dieses Jahr haben viele Schüler *die Grippe* bekommen und sind eine Woche zu Hause geblieben.
  
  Se non ti vaccini, rischi di ammalarti di *influenza* più facilmente.
  Wenn du dich nicht impfst, riskierst du, dich leichter mit *Grippe* anzustecken.
  
  Mia nonna dice sempre che *l'influenza* non si cura con gli antibiotici, ma solo con riposo e liquidi.
  Meine Oma sagt immer, dass man *die Grippe* nicht mit Antibiotika behandelt, sondern nur mit Ruhe und Flüssigkeit.
  
  Nonostante abbia bevuto tanta tisana, l'*influenza* gli ha dato la febbre alta per tre giorni.
  Trotz des vielen Teetrinkens hat ihm *die Grippe* drei Tage lang hohes Fieber bereitet.
  
  Penso che sia meglio prevenire *l'influenza* con una dieta equilibrata piuttosto che doverla combattere dopo.
  Ich glaube, es ist besser, *die Grippe* mit einer ausgewogenen Ernährung vorzubeugen, statt sie danach bekämpfen zu müssen.
