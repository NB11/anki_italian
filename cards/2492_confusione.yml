Rang: 2492
Wort: confusione
Wortart: n.f
Wort mit Artikel: la confusione
Femininum / Plural: le confusioni
IPA: ''
Definition: das Durcheinander, die Unordnung, der Lärm
Register: ''
Beispielsätze: |-
  C'è tanta *confusione* in questa stanza che non riesco a concentrarmi.
  Es gibt so viel *Unordnung* in diesem Raum, dass ich mich nicht konzentrieren kann.
  
  Nonostante la *confusione* generale, lui rimase calmo e prese le decisioni giuste.
  Trotz der allgemeinen *Unruhe* blieb er ruhig und traf die richtigen Entscheidungen.
  
  Se avessi saputo della *confusione* che avrebbe causato, non avrei proposto quella soluzione.
  Wenn ich gewusst hätte, welche *Unordnung* das verursachen würde, hätte ich diese Lösung nicht vorgeschlagen.
  
  La *confusione* tra i documenti dell’archivio è stata sistemata solo dopo giorni di lavoro.
  Das *Durcheinander* unter den Archivdokumenten wurde erst nach Tagen der Arbeit beseitigt.
  
  Chiedi al vicino se può abbassare la musica: c’è troppa *confusione* per studiare.
  Frag den Nachbarn, ob er die Musik leiser stellen kann: Es gibt zu viel *Krach*, um zu lernen.
