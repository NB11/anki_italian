Rang: 3071
Wort: allucinazione
Wortart: n.f
Wort mit Artikel: l'allucinazione
Femininum / Plural: allucinazioni
IPA: ''
Definition: die Halluzination, -en
Register: ''
Beispielsätze: |-
  L'*allucinazione* può essere un sintomo di stress o di malattia mentale.
  Die *Halluzination* kann ein Symptom von Stress oder einer psychischen Erkrankung sein.
  
  Nel film, il protagonista viveva *allucinazioni* terrificanti ogni notte.
  Im Film erlebte der Protagonist jede Nacht *Halluzinationen*, die ihn fürchterlich ängstigten.
  
  Secondo lo studio, le *allucinazioni* sono più comuni di quanto si creda.
  Laut der Studie sind *Hallucinationen* häufiger, als man denkt.
  
  Dopo aver letto quel romanzo, ho avuto *allucinazioni* per settimane!
  Nach der Lektüre dieses Romans hatte ich wochenlang *Halluzinationen*!
  
  Se hai *allucinazioni*, dovresti subito consultare un medico.
  Wenn du *Halluzinationen* hast, solltest du sofort einen Arzt aufsuchen.
