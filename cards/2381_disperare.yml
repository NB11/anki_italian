Rang: 2381
Wort: disperare
Wortart: vi
Wort mit Artikel: disperare
Femininum / Plural: ''
IPA: ''
Definition: verzweifeln, die Hoffnung verlieren
Register: ''
Beispielsätze: |-
  Non *dispero* mai, anche se le cose sembrano impossibili.
  Ich *verzweifle* nie, selbst wenn die Dinge unmöglich scheinen.
  
  Se avessi saputo che sarebbe andata così male, avrei *disperato* immediatamente.
  Wenn ich gewusst hätte, dass es so schlecht ausgeht, hätte ich sofort *die Hoffnung verloren*.
  
  Non *disperare* di trovare una soluzione: forse il problema è risolvibile.
  Werd nicht *verzweifelt*, eine Lösung zu finden – vielleicht ist das Problem lösbar.
  
  Tutti *disperano* quando la situazione diventa troppo difficile da controllare.
  Alle *verzweifeln*, wenn die Lage zu unkontrollierbar wird.
  
  Mi hanno detto che non c'è più nulla da fare, ma io non *dispero* ancora.
  Man hat mir gesagt, dass nichts mehr zu tun ist, doch ich *verzweifle* noch nicht.
Audio: ''
Notiz: ''
Dispersion: ''
