Rang: 4825
Wort: patrigno
Wortart: n.m
Wort mit Artikel: il patrigno
Femininum / Plural: patrigni
IPA: ''
Definition: der Stiefvater, -väter
Register: ''
Beispielsätze: |-
  Mio *patrigno* lavora come banchiere a Milano.
  Mein *Stiefvater* arbeitet als Bankier in Mailand.
  
  Non sopporto quando il mio *patrigno* finge di essere perfetto.
  Ich kann es nicht ertragen, wenn mein *Stiefvater* so tut, als wäre er perfekt.
  
  Se avessi un *patrigno* più indulgente, la nostra famiglia sarebbe più felice.
  Hätte ich einen nachsichtigeren *Stiefvater*, wäre unsere Familie glücklicher.
  
  Mia madre ha sposato un *patrigno* che adoro perché è molto paziente.
  Meine Mutter hat einen *Stiefvater* geheiratet, den ich sehr mag, weil er sehr geduldig ist.
  
  Il *patrigno* di Luca, che è polacco, ha organizzato una festa per Pasqua molto accurata.
  Lukas *Stiefvater*, der Polacke ist, hat ein sehr sorgfältig geplantes Osterfest organisiert.
