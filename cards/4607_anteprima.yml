Rang: 4607
Wort: anteprima
Wortart: n.f
Wort mit Artikel: la anteprima
Femininum / Plural: anteprime
IPA: ''
Definition: die Vorschau, -en
Register: ''
Beispielsätze: |-
  Non vedo l'ora di vedere la *anteprima* del nuovo film di Nolan.
  Ich kann die *Vorschau* des neuen Nolan-Films kaum erwarten.
  
  Durante la *anteprima* del romanzo, l'autore ha parlato delle sue ispirazioni.
  Während der *Vorschau* des Romans sprach der Autor über seine Inspirationen.
  
  Ha partecipato a una *anteprima* esclusiva solo perché era un combattente della critica cinematografica.
  Er nahm an einer exklusiven *Vorschau* teil, weil er ein Kritiker war.
  
  La *anteprima* del concerto è stata trasmessa in diretta su YouTube.
  Die *Vorschau* des Konzerts wurde live auf YouTube ausgestrahlt.
  
  Dopo che ebbe visto la *anteprima*, decise di non acquistare il biglietto per lo spettacolo.
  Nachdem er die *Vorschau* gesehen hatte, beschloss er, keine Karte für die Vorstellung zu kaufen.
