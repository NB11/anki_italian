Rang: 1468
Wort: incubo
Wortart: n.m
Wort mit Artikel: l'incubo
Femininum / Plural: incubi
IPA: ''
Definition: der Albtraum, -e
Register: ''
Beispielsätze: |-
  Non riesco a dormire perché ho fatto un *incubo* stanotte.
  Ich kann nicht schlafen, weil ich letzte Nacht einen *Albtraum* hatte.
  
  Se continui a guardare quel film dell'orrore, avrai un *incubo*!
  Wenn du diesen Horrorfilm weiter schaust, wirst du *Alpträume* bekommen!
  
  Il *incubo* di Marco era quello di essere in ritardo per il suo aeroporto.
  Marcellos *Albtraum* war, zu spät zum Flughafen zu kommen.
  
  Dicono che se sogni un *incubo*, significa che hai credito con il destino.
  Man sagt, wenn man einen *Albtraum* träumt, hat man Glück beim Schicksal.
  
  Dopo aver visto quell'incendio in televisione, ho avuto un *incubo* per giorni.
  Nachdem ich diesen *Brand* im Fernsehen gesehen hatte, hatte ich tagelang Alpträume.
