Rang: 855
Wort: aperto
Wortart: adj
Wort mit Artikel: aperto
Femininum / Plural: ''
IPA: ''
Definition: geöffnet, offen
Register: ''
Beispielsätze: |-
  La finestra rimane *aperta* tutta la notte perché fa troppo caldo.
  Das *Fenster* bleibt die ganze Nacht geöffnet, weil es zu warm ist.
  
  Ho notato che il negozio non era ancora *aperto* quando sono arrivato.
  Ich habe gemerkt, dass der Laden noch nicht *geöffnet* war, als ich ankam.
  
  Se domani il museo fosse *aperto*, vorrei visitarlo con te, figliolo.
  Wenn morgen das Museum *geöffnet* wäre, würde ich es gern mit dir besuchen, Sohn.
  
  Dopo aver *aperto* la scatola, ho trovato una traccia affatto normale.
  Nachdem ich die *Schachtel* geöffnet hatte, fand ich eine überhaupt nicht normale Spur.
  
  Il colonnello vuole che il cancello rimanga *aperto* per consentire il passaggio delle truppe.
  Der *Oberst* will, dass das Tor geöffnet bleibt, um den Truppen Durchgang zu ermöglichen.
