Rang: 2478
Wort: coma
Wortart: n.m
Wort mit Artikel: il coma
Femininum / Plural: comi
IPA: ''
Definition: das Koma, -s
Register: ''
Beispielsätze: |-
  Il paziente è in *coma* da tre giorni dopo l'incidente.
  Der Patient ist seit drei Tagen im *Koma* nach dem Unfall.
  
  Nonostante il *coma*, il suo corpo reagiva ancora agli stimoli esterni.
  Trotz des *Komas* reagierte ihr Körper noch auf äußere Reize.
  
  I medici temono che possa uscire dal *coma* solo tra settimane.
  Die Ärzte befürchten, dass er erst in Wochen aus dem *Koma* erwachen könnte.
  
  La famiglia chiede preghiere affinché lui esca presto dal *coma*.
  Die Familie bittet um Gebete, dass er bald aus dem *Koma* erwachen möge.
  
  Il neurologo ha confermato che il paziente è ancora in stato di *coma* irreversibile.
  Der Neurologe hat bestätigt, dass der Patient sich noch in einem irreversiblen *Koma*-Zustand befindet.
