Rang: 864
Wort: sopravvivere
Wortart: vi
Wort mit Artikel: sopravvivere
Femininum / Plural: ''
IPA: ''
Definition: überleben, durchkommen
Register: ''
Beispielsätze: |-
  Dopo il naufragio, riuscì a *sopravvivere* nutrendosi solo di pesci crudi.
  Nach dem Schiffbruch schaffte er es, sich allein von rohem *Fisch* zu ernähren.
  
  Nonostante la crisi economica, molte piccole imprese sono riuscite a *sopravvivere* grazie a progetti innovativi.
  Trotz der Wirtschaftskrise konnten viele kleine Unternehmen dank innovativer *Projekte* überleben.
  
  Se non ci fosse stata la sua determinazione, non saremmo *sopravvissuti* a quella tempesta.
  Wenn es nicht seinen Entschlossenheit gegeben hätte, hätten wir diesen Sturm nicht *überstanden*.
  
  Gli scienziati studiano come gli animali riescano a *sopravvivere* in ambienti estremi.
  Wissenschaftler untersuchen, wie Tiere in extremen Umgebungen *überleben* können.
  
  Credi davvero che potremo *sopravvivere* senza energia elettrica per più di un giorno?
  Glaubst du wirklich, dass wir ohne elektrische *Energie* länger als einen Tag auskommen würden?
