Rang: 424
Wort: nave
Wortart: n.f
Wort mit Artikel: la nave
Femininum / Plural: navi
IPA: ''
Definition: das Schiff, -e
Register: ''
Beispielsätze: |-
  La *nave* parte domani mattina alle otto.
  Das *Schiff* fährt morgen früh um acht ab.
  
  Quante *navi* sono arrivate nel porto oggi?
  Wie viele *Schiffe* sind heute im Hafen angekommen?
  
  La mia zia lavora come capitano su una *nave* da crociera.
  Meine Tante arbeitet als Kapitänin auf einem Kreuzfahrt*schiff*.
  
  Non ho mai visto una *nave* così grande in vita mia!
  Ich habe noch nie ein so großes *Schiff* in meinem Leben gesehen!
  
  Le *navi* mercantili trasportano merci in tutto il mondo.
  Die Handel*schiffe* transportieren Waren auf der ganzen Welt.
