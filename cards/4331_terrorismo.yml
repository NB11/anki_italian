Femininum / Plural: i terrorismi
IPA: ''
Definition: der Terrorismus, -
Register: ''
Beispielsätze: |-
  Il *terrorismo* è un problema globale che richiede cooperazione internazionale.
  Der *Terrorismus* ist ein globales Problem, das internationale Zusammenarbeit erfordert.
  
  Molti paesi stanno combattendo il *terrorismo* con nuove leggi e strategie di sicurezza.
  Viele Länder bekämpfen den *Terrorismus* mit neuen Gesetzen und Sicherheitsstrategien.
  
  Secondo gli esperti, la radice del *terrorismo* spesso risiede in condizioni socioeconomiche difficili.
  Laut Experten liegt die Wurzel des *Terrorismus* oft in schwierigen sozioökonomischen Bedingungen.
  
  Il governo ha annunciato che investirà ulteriori risorse per debellare il *terrorismo* entro cinque anni.
  Die Regierung hat angekündigt, weitere Ressourcen zu investieren, um den *Terrorismus* innerhalb von fünf Jahren auszurotten.
  
  Nonostante gli sforzi, il *terrorismo* continua a rappresentare una minaccia costante per la pace mondiale.
  Trotz der Bemühungen stellt der *Terrorismus* nach wie vor eine ständige Bedrohung für den Weltfrieden dar.
