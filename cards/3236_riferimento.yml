Rang: 3236
Wort: riferimento
Wortart: n.m
Wort mit Artikel: il riferimento
Femininum / Plural: riferimenti
IPA: ''
Definition: die Referenz, der Bezug, die Angabe, -en
Register: ''
Beispielsätze: |-
  Il professore ha fatto un *riferimento* molto preciso alla teoria di Einstein nella sua lezione di fisica.
  Der Professor hat einen *Bezug* zur Theorie von Einstein in seiner Physikvorlesung gemacht.
  
  Per scrivere una tesi, devi includere almeno cinque *riferimenti* bibliografici validi.
  Um eine Abschlussarbeit zu schreiben, musst du mindestens fünf *Angaben* zu gültiger Literatur einbeziehen.
  
  Non capisco questo passaggio del libro: manca un *riferimento* chiaro al contesto storico.
  Ich verstehe diese Passage im Buch nicht: Es fehlt ein *klarer Bezug* zum historischen Kontext.
  
  Il museo ha aggiunto un pannello con i *riferimenti* per ogni opera esposta.
  Das Museum hat eine Tafel mit den *Angaben* zu jedem ausgestellten Werk hinzugefügt.
  
  Quando parli di arte moderna, è sempre utile un *riferimento* alle correnti del passato.
  Wenn du über moderne Kunst sprichst, ist ein *Bezug* zu den Strömungen der Vergangenheit immer nützlich.
