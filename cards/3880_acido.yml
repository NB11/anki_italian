Rang: 3880
Wort: acido
Wortart: adj
Wort mit Artikel: acido
Femininum / Plural: ''
IPA: ''
Definition: sauer, scharf (Geschmack)
Register: ''
Beispielsätze: |-
  Questo limone è troppo *acido* per mangiarlo così.
  Diese Zitrone ist zu *sauer*, um sie so zu essen.
  
  Il vino che hai scelto è *acido*: secondo me è andato a male.
  Der Wein, den du gewählt hast, ist *sauer* – meiner Meinung nach ist er verdorben.
  
  Quando avrò finito di cucinare, ci vorrà ancora un po’ di tempo prima che la salsa diventi meno *acida*.
  Wenn ich mit dem Kochen fertig bin, wird es noch ein bisschen dauern, bis die Sauce weniger *sauer* wird.
  
  Non mangiare quella mela, è *acida*: preferisco quelle dolci!
  Iss diesen Apfel nicht, er ist *sauer* – ich mag lieber die süßen!
  
  Se il latte diventa *acido*, significa che è scaduto da tempo.
  Wenn die Milch *sauer* wird, bedeutet das, dass sie schon lange abgelaufen ist.
