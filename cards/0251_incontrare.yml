Rang: 251
Wort: incontrare
Wortart: vt
Wort mit Artikel: incontrare
Femininum / Plural: ''
IPA: ''
Definition: treffen, begegnen
Register: ''
Beispielsätze: |-
  Domani *incontrerò* i miei amici al caffè.
  Morgen werde ich meine Freunde im Café *treffen*.
  
  Non *ho incontrato* nessuno per strada oggi.
  Ich habe heute niemanden auf der Straße *getroffen*.
  
  *Incontri* spesso tua sorella al mercato?
  Triffst du deine Schwester oft auf dem Markt *?
  
  Se *incontrassi* Marco, digli di chiamarmi.
  Wenn du Marco *triffst*, sag ihm, er soll mich anrufen.
  
  Avrei voluto *incontrare* la zia, ma era in viaggio.
  Ich hätte meine Tante gerne *getroffen*, aber sie war auf Reisen.
