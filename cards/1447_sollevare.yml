Rang: 1447
Wort: sollevare
Wortart: vt
Wort mit Artikel: sollevare
Femininum / Plural: ''
IPA: ''
Definition: heben, anheben, aufrichten
Register: ''
Beispielsätze: |-
  Devi *sollevare* questa scatola con attenzione perché è molto fragile.
  Du musst diesen Karton mit *Sorgfalt* anheben, weil er sehr zerbrechlich ist.
  
  Il sindaco ha proposto di *sollevare* la tassa sulla benzina per finanziare progetti sociali.
  Der Bürgermeister hat vorgeschlagen, die Steuer auf Benzin zu *erheben*, um soziale Projekte zu finanzieren.
  
  Mia figlia vuole *sollevare* la bandiera italiana durante la festa della scuola.
  Meine Tochter möchte die italienische Flagge an ihrer *Schulfest* hissen.
  
  Se non puoi *sollevare* questo peso da solo, chiedi aiuto a un collega.
  Wenn du dieses Gewicht nicht allein *heben* kannst, bitte einen Kollegen um Hilfe.
  
  La polizia ha dovuto *sollevare* la barriera per far passare l'ambulanza.
  Die Polizei musste die *Schranke* anheben, um den Krankenwagen durchzulassen.
