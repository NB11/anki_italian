Rang: 4292
Wort: defunto
Wortart: adj
Wort mit Artikel: defunto
Femininum / Plural: ''
IPA: ''
Definition: verstorben, tot
Register: ''
Beispielsätze: |-
  Dopo la cerimonia *defunta* della nonna, tutti tornarono a casa a riposare.
  Nach der *verstorbenen* Zeremonie der Oma kamen alle zurück nach Hause, um sich auszuruhen.
  
  È triste vedere un albero *defunto* nel giardino che un tempo era così rigoglioso.
  Es ist traurig, einen *toten* Baum im Garten zu sehen, der einst so üppig war.
  
  La famiglia del *defunto* volle che il ricordo rimasse vivo con una lapide particolare.
  Die Familie des *Verstorbenen* wollte, dass die Erinnerung durch einen besonderen Grabstein lebendig blieb.
  
  Nonostante fosse *defunto*, il suo spirito sembrava ancora aleggiare nella stanza.
  Obwohl er *tot* war, schien sein Geist noch immer im Raum zu schweben.
  
  Hanno trovato una lettera scritta dalla moglie del *defunto* molti anni dopo la sua scomparsa.
  Sie fanden einen Brief, den die Ehefrau des *Verstorbenen* viele Jahre nach seinem Verschwinden geschrieben hatte.
