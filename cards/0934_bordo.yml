Rang: 934
Wort: bordo
Wortart: n.m
Wort mit Artikel: il bordo
Femininum / Plural: bordi
IPA: ''
Definition: der Rand, -¨er
Register: ''
Beispielsätze: |-
  Il *bordo* della tavola è un po' scheggiato perché ci hanno gettato sopra delle cose pesanti.
  Der *Rand* des Tisches ist etwas abgesplittert, weil man schwere Dinge darauf geworfen hat.
  
  Naturalmente, ho rispettato il *bordo* giallo che segnava la zona vietata vicino al cadavere.
  Natürlich habe ich den gelben *Rand* respektiert, der die Sperrzone neben der Leiche markierte.
  
  Se vuoi sapere a chi appartiene questo anello, guarda bene il *bordo* interno dove è inciso un simbolo.
  Wenn du wissen willst, wem dieser Ring gehört, sieh dir genau den inneren *Rand* an, wo ein Symbol eingraviert ist.
  
  L'edificio aveva un *bordo* arancione che indicava il punto in cui bisognava concentrare l'attenzione per la sicurezza.
  Das Gebäude hatte einen orangefarbenen *Rand*, der den Punkt markierte, auf den man sich aus Sicherheitsgründen konzentrieren musste.
  
  Dopo il ritorno dalla riunione, ho trovato un *bordo* del tavolo rovinato: qualcuno deve aver lanciato una bottiglia con forza.
  Nach der Rückkehr von der Besprechung fand ich einen *Rand* des Tisches beschädigt: Jemand muss eine Flasche mit voller Wucht geworfen haben.
