Rang: 3282
Wort: sasso
Wortart: n.m
Wort mit Artikel: il sasso
Femininum / Plural: sassi
IPA: ''
Definition: der Stein, -e
Register: ''
Beispielsätze: |-
  Il *sasso* che hai lanciato ha rotto il vetro della finestra.
  Der *Stein*, den du geworfen hast, hat die Fensterscheibe zerbrochen.
  
  In montagna abbiamo trovato molti *sassi* interessanti per la nostra collezione.
  Im Gebirge haben wir viele *Steine* für unsere Sammlung gefunden.
  
  Se continui a lanciare *sassi* nell'acqua, creerai bellissime increspature.
  Wenn du weiterhin *Steine* ins Wasser wirfst, entstehen wunderschöne Wellen.
  
  Il *sasso* che rotolò giù per il pendio sembrava gigante dalla nostra distanza.
  Der *Stein*, der den Hang hinabrollte, wirkte aus unserer Entfernung riesig.
  
  Dopo la frana, per strada erano rimasti solo *sassi* e detriti.
  Nach dem Erdrutsch lagen auf der Straße nur noch *Steine* und Schutt.
