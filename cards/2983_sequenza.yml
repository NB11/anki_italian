Wort mit Artikel: la sequenza
Femininum / Plural: sequenze
IPA: ''
Definition: die Abfolge, -n
Register: ''
Beispielsätze: |-
  La *sequenza* dell’alfabeto italiano è molto simile a quella tedesca.
  Die *Abfolge* des italienischen Alphabets ist der deutschen sehr ähnlich.
  
  Non appena ho udito quella *sequenza* di note, ho capito che era la mia canzone preferita.
  Sobald ich diese *Abfolge* von Tönen hörte, wusste ich, dass es mein Lieblingslied war.
  
  Per eseguire il test devi seguire scrupolosamente la *sequenza* dei passaggi indicati nel foglio.
  Um den Test durchzuführen, musst du die *Abfolge* der Schritte auf dem Blatt genau beachline.
  
  Mi piacerebbe che tu studiassi la *sequenza* dei movimenti di questa danza antica.
  Ich würde mir wünschen, dass du die *Abfolge* der Bewegungen dieses alten Tanzes lernst.
  
  La *sequenza* della spedizione è stata modificata all’ultimo momento a causa del maltempo.
  Die *Abfolge* der Expedition wurde in letzter Sekunde wegen des schlechten Wetters geändert.
