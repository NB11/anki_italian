Rang: 846
Wort: affatto
Wortart: adv
Wort mit Artikel: affatto
Femininum / Plural: ''
IPA: ''
Definition: überhaupt nicht, ganz und gar nicht
Register: ''
Beispielsätze: |-
  Non mi piace *affatto* questo nuovo progetto che il nostro colonnello ha proposto.
  Ich mag *überhaupt nicht* dieses neue Projekt, das unser Oberst vorgeschlagen hat.
  
  Era *affatto* convinto che il processo contro l’assassino avrebbe fatto giustizia, ma in realtà si sbagliava di pelle.
  Er war *ganz und gar nicht* überzeugt, dass der Prozess gegen den Mörder Gerechtigkeit bringen würde, aber in Wahrheit irrte er sich zutiefst.
  
  Dopo tanti anni di servizio, non mi sento *affatto* stanco, anzi ho ancora molta energia.
  Nach so vielen Jahren *Dienst* fühle ich mich überhaupt nicht müde, im Gegenteil, ich habe noch viel Energie.
  
  Credi che questa immagine sia reale? — *Affatto*, è solo un segno del nostro pensiero distorto.
  Glaubst du, dieses *Bild* ist real? — Ganz und gar nicht, es ist nur ein Zeichen unseres verzerrten Gedanken.
  
  Se non accendi la cucina altrimenti, resteremo *affatto* senza cena e i figlioli avranno affatto fame.
  Wenn du den *Herd* nicht anders anmachst, haben wir überhaupt nichts zum Abendessen und die Söhne werden überhaupt keinen Hunger haben.
