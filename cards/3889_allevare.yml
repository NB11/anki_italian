Rang: 3889
Wort: allevare
Wortart: vt
Wort mit Artikel: allevare
Femininum / Plural: ''
IPA: ''
Definition: aufziehen, züchten
Register: ''
Beispielsätze: |-
  Paolo *allevava* colombe nel suo cortile dietro la ferrovia.
  Paolo *züchtete* Tauben in seinem Hof hinter der Eisenbahn.
  
  Se vuoi *allevare* un cane, devi avere molto tempo e pazienza.
  Wenn du einen Hund *aufziehen* willst, brauchst du viel Zeit und Geduld.
  
  I contadini del villaggio *allevano* maiali secondo metodi tradizionali.
  Die Bauern des Dorfes *ziehen* Schweine nach traditionellen Methoden auf.
  
  Dopo la donazione, decidemmo di *allevare* alcuni piccioni per la pace.
  Nach der Spende beschlossen wir, einige Tauben für den Frieden zu *züchten*.
  
  Il vecchietto mi confidò che avrebbe voluto *allevare* i suoi nipoti come se fossero figli suoi.
  Der kleine Alte vertraute mir an, dass er seine Enkel gerne wie eigene Kinder *aufgezogen* hätte.
