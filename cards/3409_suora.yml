  Die *Nonnen* verwalten das Waisenhaus seit vielen Jahren.
  
  Se fossi più coraggioso, diventerei una *suora*.
  Wenn ich mutiger wäre, würde ich *Nonne* werden.
  
  La *suora* che hai conosciuto lavora in un ospedale lontano.
  Die *Nonne*, die du kennengelernt hast, arbeitet in einem Krankenhaus weit weg.
