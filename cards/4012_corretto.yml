Rang: 4012
Wort: corretto
Wortart: adj
Wort mit Artikel: corretto
Femininum / Plural: ''
IPA: ''
Definition: richtig, korrekt
Register: ''
Beispielsätze: |-
  Hai dato la risposta *corretta* per primo!
  Du hast die *richtige* Antwort als Erster gegeben!
  
  È tutto *corretto* quello che hai scritto nel documento.
  Alles, was du im Dokument geschrieben hast, ist *korrekt*.
  
  Credo che il suo parere sia *corretto*, anche se non mi convince.
  Ich glaube, dass seine Meinung *richtig* ist, auch wenn sie mich nicht überzeugt.
  
  Se avessi seguito le istruzioni, il risultato sarebbe stato *corretto*.
  Wenn du die Anweisungen befolgt hättest, wäre das Ergebnis *korrekt* gewesen.
  
  Non è affatto *corretto* dire che l’autore non abbia considerato questa possibilità.
  Es ist ganz und gar nicht *richtig* zu sagen, der Autor habe diese Möglichkeit nicht in Betracht gezogen.
