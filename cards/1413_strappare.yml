Rang: 1413
Wort: strappare
Wortart: vt
Wort mit Artikel: strappare
Femininum / Plural: ''
IPA: ''
Definition: reißen, abreißen, zerreißen, herausreißen
Register: ''
Beispielsätze: |-
  Il proprietario ha dovuto *strappare* il contratto perché ilinquente non ha rispettato l'altezza della clausola sulla sicurezza.
  Der Besitzer musste den Vertrag *zerreißen*, weil der Verbrecher die Sicherheitsklausel nicht eingehalten hat.
  
  Domenica mattina in liceo abbiamo visto un fumatore che cercava di *strappare* una battuta di troppo da un poster della scuola.
  Am Sonntagmorgen haben wir im Gymnasium einen Raucher beobachtet, der versuchte, einen zu frechen Witz von einem Schulplakat *abzureißen*.
  
  La banda ha minacciato di *strappare* la copertura dei federali se non avessero lasciato la città entro un centinaio di chilometri.
  Die Bande hat gedroht, die *Bundes*abdeckung abzureißen, falls sie die Stadt nicht innerhalb von ein paar hundert Kilometern verlassen würden.
  
  Quel professore di ruolo stupendo mi ha consigliato di non *strappare* le pagine di pratica troppo spesso, altrimenti perderò il filo degli esercizi.
  Dieser großartige Lehrer hat mir geraten, die Übungsseiten nicht zu oft *herauszureißen*, sonst verliere ich den Faden der Aufgaben.
  
  Mentre cercavo di infilare la valigia nella cella del treno, ho visto un uomo che cercava di *strappare* via un assegno da un giornale per nasconderlo direttamente sotto al sedile.
  Als ich versuchte, den Koffer in die Zugzelle zu stecken, sah ich einen Mann, der versuchte, einen Scheck aus einer Zeitung *herauszureißen*, um ihn direkt unter dem Sitz zu verstecken.
