Rang: 2627
Wort: metallo
Wortart: n.m
Wort mit Artikel: il metallo
Femininum / Plural: metalli
IPA: ''
Definition: das Metall, -e
Register: ''
Beispielsätze: |-
  Il *metallo* più usato nell’industria moderna è l’acciaio perché è resistente e malleabile.
  Das am häufigsten verwendete *Metall* in der modernen Industrie ist Stahl, weil es widerstandsfähig und formbar ist.
  
  Hanno trovato un *metallo* prezioso durante gli scavi archeologici vicino a Roma.
  Sie fanden ein wertvolles *Metall* während der Ausgrabungen nahe Rom.
  
  Non sapevo che il rame fosse un *metallo* così buon conduttore di elettricità.
  Ich wusste nicht, dass Kupfer ein so guter elektrischer Leiter ist.
  
  Se avessi un blocco di *metallo* puro, lo userei per creare opere d’arte moderne.
  Wenn ich einen Block reinen *Metalls* hätte, würde ich ihn für moderne Kunstwerke verwenden.
  
  I ricercatori stanno studiando come il *metallo* si comporta ad altissime temperature.
  Die Forscher untersuchen, wie sich das *Metall* bei extrem hohen Temperaturen verhält.
