Rang: 3088
Wort: fulmine
Wortart: n.m
Wort mit Artikel: il fulmine
Femininum / Plural: fulmini
IPA: ''
Definition: der Blitz, -e
Register: ''
Beispielsätze: |-
  Ho visto un *fulmine* attraversare il cielo durante la tempesta.
  Ich habe einen *Blitz* am Himmel während des Sturms gesehen.
  
  Se il *fulmine* colpisce un albero, può provocare un incendio.
  Wenn der *Blitz* einen Baum trifft, kann er einen Brand verursachen.
  
  Non uscire durante un temporale, perché il *fulmine* è pericoloso.
  Gehe nicht während eines Gewitters hinaus, denn der *Blitz* ist gefährlich.
  
  Mi chiedevo se quel *fulmine* fosse stato davvero così forte come mi avevano raccontato.
  Ich fragte mich, ob dieser *Blitz* wirklich so stark gewesen war, wie man mir erzählt hatte.
  
  Nonostante il *fulmine* abbia colpito la casa, i danni sono stati minimi.
  Obwohl der *Blitz* das Haus getroffen hat, waren die Schäden minimal.
