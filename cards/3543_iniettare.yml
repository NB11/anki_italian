Rang: 3543
Wort: iniettare
Wortart: vt
Wort mit Artikel: iniettare
Femininum / Plural: ''
IPA: ''
Definition: spritzen, injizieren
Register: ''
Beispielsätze: |-
  Il medico *inietta* il vaccino nel braccio del paziente ogni mattina.
  Der Arzt spritzt *den Impfstoff* in den Arm des Patienten jeden Morgen.
  
  Se non *iniettiamo* l'insulina in tempo, potrebbero esserci gravi conseguenze.
  Wenn wir das Insulin nicht rechtzeitig *spritzen*, könnte es ernste Folgen geben.
  
  Nel laboratorio stanno cercando di *iniettare* geni nelle cellule per curare la malattia.
  Im Labor versuchen sie, Gene in die Zellen zu *injizieren*, um die Krankheit zu heilen.
  
  Ho sentito che dovrò *iniettarmi* qualcosa per l'allergia, ma non so ancora cosa.
  Ich habe gehört, dass ich mir etwas gegen die Allergie *spritzen* muss, aber ich weiß noch nicht was.
  
  L’infermiere avvertì che senza un’esperienza accurata potevamo far male quando *iniettavamo* la sostanza nel muscolo.
  Der Pfleger warnte, dass wir ohne sorgfältige Erfahrung den Muskel verletzen konnten, wenn wir die Substanz *injizierten*.
