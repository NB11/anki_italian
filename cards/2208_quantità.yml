Rang: 2208
Wort: quantità
Wortart: n.f
Wort mit Artikel: la quantità
Femininum / Plural: quantità
IPA: ''
Definition: die Menge, -n, Anzahl, -en
Register: ''
Beispielsätze: |-
  Vorrei acquistare una grande *quantità* di libri in offerta.
  Ich möchte eine große *Menge* an Büchern im Angebot kaufen.
  
  Nonostante l’abbondanza, si lamenta sempre della scarsa *quantità* di cibo.
  Trotz des Überflusses beschwert er sich immer über die *Anzahl* des Essens.
  
  La *quantità* di rifiuti prodotti ogni anno è allarmante.
  Die *Menge* an Müll, die jährlich produziert wird, ist alarmierend.
  
  Se aumenti la *quantità* di acqua, le piante cresceranno meglio.
  Wenn du die *Menge* an Wasser erhöhst, werden die Pflanzen besser wachsen.
  
  Credo che tu abbia sbagliato a calcolare la *quantità* di farina necessaria per la ricetta.
  Ich glaube, du hast die *Menge* an Mehl, die für das Rezept benötigt wird, falsch berechnet.
