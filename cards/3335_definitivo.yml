Rang: 3335
Wort: definitivo
Wortart: adj
Wort mit Artikel: definitivo
Femininum / Plural: ''
IPA: ''
Definition: endgültig, definitiv
Register: ''
Beispielsätze: |-
  Nonostante l’opinione *definitiva* del giudice, l’imputato continuò a sperare in un appello.
  Trotz der *endgültigen* Meinung des Richters hoffte der Angeklagte weiterhin auf ein Berufungsverfahren.
  
  Per loro è *definitivo*: lasciano la città il mese prossimo.
  Für sie ist es *endgültig*: Sie verlassen die Stadt nächsten Monat.
  
  Secondo te, la sua decisione è stata *definitiva* o può ancora cambiare idea?
  Meinst du, seine Entscheidung war *definitiv* oder kann er noch seine Meinung ändern?
  
  Il contratto è stato firmato e quindi la scelta è *definitiva*.
  Der Vertrag wurde unterzeichnet und daher ist die Wahl *endgültig*.
  
  Nonostante le promesse, la sua risposta rimase *definitiva*: no.
  Trotz der Versprechen blieb seine Antwort *definitiv*: nein.
