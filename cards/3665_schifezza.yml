Rang: 3665
Wort: schifezza
Wortart: n.f
Wort mit Artikel: la schifezza
Femininum / Plural: schifezze
IPA: ''
Definition: die Sauerei, -en, die Gemeinheit, -en
Register: ''
Beispielsätze: |-
  Questa *schifezza* mi ha fatto venire voglia di vomitare!
  Dieser *Dreck* hat mich zum Kotzen gebracht!
  
  Non sopporto più questa *schifezza* che hai fatto ieri sera!
  Ich ertrage diesen *Mist*, den du gestern Abend gemacht hast, nicht mehr!
  
  Se continui così, finirà in una *schifezza* senza precedenti.
  Wenn du so weitermachst, endet es in einem *Skandal* ohnegleichen.
  
  Ha chiamato la polizia perché c’era una *schifezza* nel suo giardino.
  Er hat die Polizei gerufen, weil sich *Schmutz* in seinem Garten befand.
  
  Non è solo una *schifezza*, ma anche un affronto alla nostra amicizia.
  Das ist nicht nur eine *Gemeinheit*, sondern auch eine Beleidigung für unsere Freundschaft.
