Rang: 4998
Wort: smarrire
Wortart: v
Wort mit Artikel: smarrire
Femininum / Plural: ''
IPA: ''
Definition: verlieren, verlegen, vermissen
Register: ''
Beispielsätze: |-
  Ho *smarrito* le chiavi di casa e ora non riesco a entrare.
  Ich habe die *Schlüssel* nach Hause verloren und komme jetzt nicht hinein.
  
  Se *smarrissi* la strada, chiederei indicazioni a qualcuno perbene.
  Wenn ich mich *verliefe*, würde ich jemanden verständnisvollen nach dem Weg fragen.
  
  Credo che Marco *abbia smarrito* la pazienza dopo quella umiliazione in ufficio.
  Ich glaube, Marco hat nach dieser *Demütigung* im Büro die Geduld verloren.
  
  Da quando *si è smarrito* nella foresta, non si è più visto alcun segno di lui.
  Seit er sich im Wald *verlaufen* hat, hat man keine Spur mehr von ihm gesehen.
  
  Spero che tu non *smarrisca* mai il tuo berretto, sarebbe un peccato.
  Ich hoffe, du verlierst nie deine *Mütze*, das wäre wirklich schade.
