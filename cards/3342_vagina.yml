Rang: 3342
Wort: vagina
Wortart: n.f
Wort mit Artikel: la vagina
Femininum / Plural: vagine
IPA: ''
Definition: die Vagina, -nen
Register: ''
Beispielsätze: |-
  La *vagina* è un organo interno del corpo femminile.
  Die *Vagina* ist ein inneres Organ des weiblichen Körpers.
  
  Durante l’esame ginecologico, il medico osserva attentamente la *vagina*.
  Während der gynäkologischen Untersuchung beobachtet der Arzt genau die *vagina*.
  
  Ha parlato con un’amica delle sue paure legate alla *vagina* dopo il parto.
  Sie hat mit einer Freundin über ihre Ängste in Verbindung mit der *vagina* nach der Geburt gesprochen.
  
  Le infezioni della *vagina* possono causare fastidio e bruciore.
  Infektionen der *vagina* können Beschwerden und Brennen verursachen.
  
  La cura della salute intima include anche la protezione della *vagina* dalle irritazioni.
  Die Pflege der Intimgesundheit umfasst auch den Schutz der *vagina* vor Reizungen.
