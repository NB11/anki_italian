Rang: 2844
Wort: filmato
Wortart: n.m
Wort mit Artikel: il filmato
Femininum / Plural: filmati
IPA: ''
Definition: das Video, -s
Register: ''
Beispielsätze: |-
  Ho caricato un *filmato* della gita scolastica sulla piattaforma online.
  Ich habe ein *Video* des Schulausflugs auf die Online-Plattform hochgeladen.
  
  Il *filmato* dell’incidente mostra chiaramente chi ha attraversato con il rosso.
  Das *Video* des Unfalls zeigt eindeutig, wer bei Rot gefahren ist.
  
  Non appena avrò finito di montare il *filmato*, te lo invierò via email.
  Sobald ich das *Video* fertig geschnitten habe, sende ich es dir per E-Mail zu.
  
  Hanno inviato un *filmato* proprio come prova per il processo in tribunale.
  Sie haben ein *Video* als Beweis für den Prozess vor Gericht geschickt.
  
  Nel *filmato* si distingue a malapena il volto della persona fotografata.
  Auf dem *Video* erkennt man das Gesicht der fotografierten Person kaum.
