Rang: 3580
Wort: paranoico
Wortart: adj
Wort mit Artikel: paranoico
Femininum / Plural: ''
IPA: ''
Definition: paranoid, misstrauisch
Register: ''
Beispielsätze: |-
  È *paranoico* che non risponda al telefono, forse è successo qualcosa.
  Er ist *paranoid*, dass er nicht ans Telefon geht, vielleicht ist etwas passiert.
  
  Non essere *paranoico*, non c'è motivo di sospettare di tutti.
  Sei nicht *paranoid*, es gibt keinen Grund, alle zu verdächtigen.
  
  Se fossi stato *paranoico* anche lui avrebbe intuito il pericolo.
  Wäre ich *paranoid* gewesen, hätte auch er die Gefahr geahnt.
  
  È *paranoico* al punto da controllare la posta tre volte al giorno.
  Er ist so *paranoid*, dass er die Post dreimal am Tag kontrolliert.
  
  Sebbene alcuni lo considerino *paranoico*, le sue preoccupazioni non erano del tutto infondate.
  Obwohl einige ihn für *paranoid* halten, waren seine Sorgen nicht ganz unbegründet.
