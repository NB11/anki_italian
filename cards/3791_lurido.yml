Rang: 3791
Wort: lurido
Wortart: adj
Wort mit Artikel: lurido
Femininum / Plural: ''
IPA: ''
Definition: schmutzig, dreckig
Register: ''
Beispielsätze: |-
  Il cane ha le zampe *luride* dopo aver giocato nel fango.
  Der Hund hat *schmutzige* Pfoten, nachdem er im Schlamm gespielt hat.
  
  Mi hai fatto un regalo con una scatola *lurida* piena di polvere?
  Hast du mir ein Geschenk in einer *dreckigen* Schachtel voller Staub gemacht?
  
  È meglio non toccare quella parete, perché è *lurida* di sporco vecchio.
  Es ist besser, diese Wand nicht anzufassen, denn sie ist *schmutzig* von altem Dreck.
  
  Nonostante le mani *luride*, il meccanico riuscì a riparare la valvola in tempo.
  Trotz der *schmutzigen* Hände schaffte es der Mechaniker, das Ventil rechtzeitig zu reparieren.
  
  Se avessi visto il suo viso *lurido*, avresti capito subito che aveva litigato con qualcuno.
  Hättest du sein *schmutziges* Gesicht gesehen, hättest du sofort verstanden, dass er sich mit jemandem gestritten hatte.
