Rang: 1731
Wort: ascensore
Wortart: n.m
Wort mit Artikel: l'ascensore
Femininum / Plural: ascensori
IPA: ''
Definition: der Aufzug, Aufzüge
Register: ''
Beispielsätze: |-
  Ho chiamato l'*ascensore* perché non volevo fare le scale.
  Ich habe den *Aufzug* gerufen, weil ich keine Lust hatte, die Treppe zu nehmen.
  
  Dove posso trovare l'*ascensore* più vicino?
  Wo finde ich den nächsten *Aufzug*?
  
  L'*ascensore* era fuori servizio per manutenzione tutto il giorno.
  Der *Aufzug* war den ganzen Tag wegen Wartungsarbeiten außer Betrieb.
  
  Non usare mai l'*ascensore* durante un incendio!
  Benutze den *Aufzug* niemals bei einem Brand!
  
  Mentre aspettavo l'*ascensore*, ho visto un topo correre via.
  Während ich auf den *Aufzug* wartete, sah ich eine Ratte weglaufen.
