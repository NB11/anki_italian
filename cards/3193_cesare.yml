Rang: 3193
Wort: cesare
Wortart: n.m
Wort mit Artikel: il cesare
Femininum / Plural: cesari
IPA: ''
Definition: der Kaiserschnitt, -e
Register: ''
Beispielsätze: |-
  La madre ha richiesto un *cesare* a causa delle complicazioni durante il parto.
  Die Mutter hat einen *Kaiserschnitt* wegen der Komplikationen während der Geburt verlangt.
  
  Se il bambino non nasce spontaneamente, si ricorre al *cesare* per la sua salute.
  Wenn das Baby nicht spontan geboren wird, greift man zum *Kaiserschnitt* für seine Gesundheit.
  
  Il dottore ha spiegato che il *cesare* è stato necessario e ha salvato la vita della madre e del neonato.
  Der Arzt erklärte, dass der *Kaiserschnitt* notwendig war und das Leben von Mutter und Neugeborenem rettete.
  
  Hanno programmato il *cesare* per questo pomeriggio alle tre per evitare ulteriori rischi.
  Sie haben den *Kaiserschnitt* für heute Nachmittag um drei geplant, um weitere Risiken zu vermeiden.
  
  Dopo il *cesare*, la donna ha bisogno di almeno sei settimane per una completa ripresa fisica.
  Nach dem *Kaiserschnitt* braucht die Frau mindestens sechs Wochen für eine vollständige körperliche Erholung.
