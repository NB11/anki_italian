Rang: 892
Wort: incinta
Wortart: adj
Wort mit Artikel: incinta
Femininum / Plural: ''
IPA: ''
Definition: schwanger
Register: ''
Beispielsätze: |-
  Maria è *incinta* del suo primo figlio e aspetta un maschietto.
  Maria ist *schwanger* mit ihrem ersten Kind und erwartet einen Jungen.
  
  Non sapevo che fosse *incinta* quando l’ho incontrata ieri pomeriggio al mercato.
  Ich wusste nicht, dass sie *schwanger* war, als ich sie gestern Nachmittag auf dem Markt getroffen habe.
  
  Mi ha detto che non si sente affatto *incinta*, anche se tutti notano la sua pancia enorme.
  Sie hat mir gesagt, dass sie sich *überhaupt nicht* schwanger fühlt, obwohl alle ihren riesigen Bauch bemerken.
  
  Se fossi *incinta*, avrei già acquistato una scatola di vitamine per il bambino, non credi?
  Wenn ich *schwanger* wäre, hätte ich schon eine Schachtel Vitamine für das Baby gekauft, meinst du nicht?
  
  Nonostante la differenza di età, la coppia ha deciso di avere un figlio mentre lui era ancora professore all’università.
  Trotz des Altersunterschieds entschied sich das Paar, ein Kind zu bekommen, während er noch Professor an der Universität war.
