Wortart: v
Wort mit Artikel: dovere
Femininum / Plural: ''
IPA: ''
Definition: müssen, schulden
Register: ''
Beispielsätze: |-
  Devo *andare* a scuola ogni giorno.
  Ich *muss* jeden Tag zur Schule *gehen*.
  
  Abbiamo *dovuto* aspettare un’ora alla stazione.
  Wir *mussten* eine Stunde am Bahnhof *warten*.
  
  Se avessi più tempo, *dovrei* imparare il giapponese.
  Wenn ich mehr Zeit hätte, *müsste* ich Japanisch *lernen*.
  
  Che cosa *devi* fare stasera?
  Was *musst* du heute Abend *machen*?
  
  Credo che tu *debba* studiare di più per l’esame.
  Ich glaube, du *solltest* für die Prüfung mehr *lernen*.
