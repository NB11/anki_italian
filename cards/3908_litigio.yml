Rang: 3908
Wort: litigio
Wortart: n.m
Wort mit Artikel: il litigio
Femininum / Plural: litigi
IPA: ''
Definition: der Streit, -e, der Zank
Register: ''
Beispielsätze: |-
  Dopo il *litigio* con Paolo, Maria se ne andò sbattendo la porta.
  Nach dem *Streit* mit Paolo ging Maria wütend weg.
  
  Credo che il *litigio* tra loro sia stato inevitabile dopo anni di incomprensioni.
  Ich glaube, der *Zank* zwischen ihnen war nach Jahren von Missverständnissen unvermeidbar.
  
  Se avessimo evitato il *litigio*, forse oggi saremmo ancora amici.
  Wenn wir den *Streit* vermieden hätten, wären wir heute vielleicht noch Freunde.
  
  Il *litigio* scoppiò all’improvviso quando lui scoprì il tradimento.
  Der *Zank* brach plötzlich aus, als er den Betrug entdeckte.
  
  Nonostante il *litigio* di ieri sera, domani andremo insieme al concerto.
  Trotz des *Streits* von gestern Abend gehen wir morgen zusammen zum Konzert.
