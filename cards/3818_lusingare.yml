Rang: 3818
Wort: lusingare
Wortart: vt
Wort mit Artikel: lusingare
Femininum / Plural: ''
IPA: ''
Definition: schmeicheln
Register: ''
Beispielsätze: |-
  Non amare *lusingare* gli altri con complimenti vuoti, ma sii sincero.
  Es ist nicht gut, andere mit leeren Komplimenten zu *schmeicheln*, sei ehrlich.
  
  Il politico cercava di *lusingare* gli elettori con promesse ambiziose.
  Der Politiker versuchte, die Wähler mit ehrgeizigen Versprechen zu *schmeicheln*.
  
  Credo che tu stia cercando di *lusingare* me con quel tuo sorriso, ma non ci casco.
  Ich glaube, du versuchst gerade, mich mit diesem Lächeln zu *schmeicheln*, aber ich falle nicht darauf herein.
  
  Se avessi saputo che avrebbe *lusingato* la mia vanità, non glielo avrei nemmeno detto.
  Hätte ich gewusst, dass er meine Eitelkeit *schmeicheln* würde, hätte ich es ihm nicht einmal gesagt.
  
  Dice che non vuole *lusingare* nessuno, ma in fondo ama troppo ricevere attenzioni.
  Er sagt, er wolle niemanden *schmeicheln*, aber tief in seinem Herzen liebt er es, Aufmerksamkeit zu erhalten.
