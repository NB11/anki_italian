Rang: 1699
Wort: sconfiggere
Wortart: vt
Wort mit Artikel: sconfiggere
Femininum / Plural: ''
IPA: ''
Definition: besiegen, schlagen
Register: ''
Beispielsätze: |-
  La nostra squadra è riuscita finalmente a *sconfiggere* i campioni in carica dopo mesi di allenamento intenso.
  Unser Team hat es endlich geschafft, die Titelverteidiger nach monatelangem Training zu *besiegen*.
  
  Dopo aver assistito a quell’intervento, lo spettacolo di *sconfiggere* il male mi è parso ancora più importante.
  Nach diesem Einsatz erschien mir die Vorstellung, das Böse zu *besiegen*, noch wichtiger.
  
  Se vuoi *sconfiggere* la pigrizia, devi cambiare le tue abitudini quotidiane, cittadino.
  Wenn Sie Ihre Faulheit *besiegen* wollen, müssen Sie Ihre täglichen Gewohnheiten ändern, Bürger.
  
  La giuria ha giudicato eccellente il modo in cui l’avvocato è riuscito a *sconfiggere* l’accusa.
  Die Jury hielt die Art und Weise, in der der Anwalt die Anklage zu *besiegen* vermochte, für hervorragend.
  
  Malgrado le difficoltà, lui promise di *sconfiggere* la malattia e di tornare presto a giocare a football.
  Trotz der Schwierigkeiten versprach er, die Krankheit zu *besiegen* und bald wieder Fußball zu spielen.
