Rang: 1026
Wort: seguito
Wortart: n.m
Wort mit Artikel: il seguito
Femininum / Plural: i seguiti
IPA: ''
Definition: die Folge, die Fortsetzung, die Nachwirkung
Register: ''
Beispielsätze: |-
  Dopo la sua *seguito*, tutti aspettavano con grande curiosità cosa sarebbe accaduto.
  Nach seiner *Folge* warteten alle mit großer Neugier, was passieren würde.
  
  Il *seguito* di quella battaglia cambiò il corso della guerra interamente.
  Die *Folge* dieser Schlacht änderte den gesamten Verlauf des Krieges.
  
  Nonostante i *seguiti* negativi, lui non volle rinunciare alla sua carriera.
  Trotz der negativen *Folgen* wollte er auf seine Karriere nicht verzichten.
  
  Il medico ha spiegato che lo *seguito* della malattia era inevitabile senza un intervento tempestivo.
  Der Arzt erklärte, dass die *Fortsetzung* der Krankheit ohne einen schnellen Eingriff unvermeidbar war.
  
  Conosci qualcuno che abbia avuto un brutto *seguito* dopo quella telefonata alle tre del mattino?
  Kennst du jemanden, der nach diesem *Anruf* um drei Uhr morgens eine schlechte Nachwirkung hatte?
