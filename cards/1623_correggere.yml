Rang: 1623
Wort: correggere
Wortart: vt
Wort mit Artikel: correggere
Femininum / Plural: ''
IPA: ''
Definition: korrigieren
Register: ''
Beispielsätze: |-
  Il professore ha deciso di *correggere* i compiti degli studenti entro domani.
  Der Lehrer hat beschlossen, die Hausaufgaben der Schüler bis morgen zu *korrigieren*.
  
  Se tu *correggessi* sempre gli errori, avresti meno problemi a scuola.
  Wenn du Fehler immer *korrigieren* würdest, hättest du weniger Probleme in der Schule.
  
  È importante che tu *corregga* immediatamente le informazioni sbagliate nel documento.
  Es ist wichtig, dass du die falschen Informationen im Dokument sofort *korrigierst*.
  
  Non appena avrò finito di leggere, ti aiuterò a *correggere* il testo.
  Sobald ich mit dem Lesen fertig bin, helfe ich dir, den Text zu *korrigieren*.
  
  Avrei voluto *correggere* il suo errore, ma era già tardi per intervenire.
  Ich hätte seinen Fehler gerne *korrigiert*, aber es war schon zu spät einzugreifen.
