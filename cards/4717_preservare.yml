Rang: 4717
Wort: preservare
Wortart: v
Wort mit Artikel: preservare
Femininum / Plural: ''
IPA: ''
Definition: bewahren, erhalten
Register: ''
Beispielsätze: |-
  Gli ambientalisti cercano di *preservare* le foreste pluviali per le future generazioni.
  Umweltschützer versuchen, den Regenwald für die zukünftigen Generationen zu *bewahren*.
  
  Se non avessimo *preservato* questi documenti, non sapremmo nulla del nostro passato.
  Hätten wir diese Dokumente nicht *erhalten*, wüssten wir nichts über unsere Vergangenheit.
  
  È importante *preservare* le tradizioni locali, affinché non vadano perdute.
  Es ist wichtig, die lokalen Traditionen zu *bewahren*, damit sie nicht verloren gehen.
  
  Il museo si impegna a *preservare* le opere d’arte per secoli.
  Das Museum bemüht sich, die Kunstwerke für Jahrhunderte zu *erhalten*.
  
  Per *preservare* la salute, dovresti evitare cibi troppo grassi e zuccherati.
  Um die Gesundheit zu *erhalten*, solltest du zu fettige und zuckerhaltige Lebensmittel vermeiden.
