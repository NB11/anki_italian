Rang: 4672
Wort: associare
Wortart: v
Wort mit Artikel: associare
Femininum / Plural: ''
IPA: ''
Definition: verbinden, verknüpfen, assoziieren
Register: ''
Beispielsätze: |-
  Non amo *associare* i ricordi dolorosi agli amici.
  Ich mag *verbinden* schmerzhafte Erinnerungen nicht mit Freunden.
  
  Volevo *associare* il tuo nome al progetto fin dall'inizio.
  Ich wollte deinen Namen mit dem Projekt von Anfang an *verbinden*.
  
  È importante *associare* i verbi regolari alle loro desinenze.
  Es ist wichtig, regelmäßige Verben mit ihren Endungen zu *verbinden*.
  
  Ho imparato a *associare* l'odore del caffè al risveglio mattutino.
  Ich habe gelernt, den Geruch von Kaffee mit dem morgendlichen Aufwachen zu *asozieren*.
  
  Secondo la psicologia, si tende a *associare* la sofferenza a esperienze passate.
  Laut Psychologie neigt man dazu, Leid mit vergangenen Erfahrungen zu *verknüpfen*.
Audio: ''
Notiz: ''
Dispersion: ''
