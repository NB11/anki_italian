Rang: 4044
Wort: lattina
Wortart: n.f
Wort mit Artikel: la lattina
Femininum / Plural: lattine
IPA: ''
Definition: die Dose, -n
Register: ''
Beispielsätze: |-
  Non *lattina* è aperta, ma la bottiglia.
  Nicht die *Dose* ist geöffnet, sondern die Flasche.
  
  Ho comprato tre *lattine* di bibita al supermercato.
  Ich habe drei *Dosen* mit Getränken im Supermarkt gekauft.
  
  La *lattina* di birra era ancora piena quando l’ho trovata.
  Die *Dose* Bier war noch voll, als ich sie gefunden habe.
  
  Vuoi che apra un’altra *lattina* di Coca-Cola?
  Soll ich noch eine weitere *Dose* Cola öffnen?
  
  Dopo aver bevuto, ha schiacciato la *lattina* con rabbia.
  Nachdem er getrunken hatte, hat er die *Dose* wütend zerdrückt.
