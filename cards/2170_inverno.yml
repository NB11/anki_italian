Rang: 2170
Wort: inverno
Wortart: n.m
Wort mit Artikel: l'inverno
Femininum / Plural: gli inverni
IPA: ''
Definition: der Winter, -
Register: ''
Beispielsätze: |-
  Quest’anno *l’inverno* è stato molto freddo, con tanta neve.
  Dieser *Winter* war sehr kalt mit viel Schnee.
  
  Se avessi saputo che *l’inverno* sarebbe stato così rigido, avrei comprato un cappotto più pesante.
  Hätte ich gewusst, wie streng der *Winter* wird, hätte ich mir einen wärmeren Mantel gekauft.
  
  Durante *l’inverno* tutti i bambini vogliono giocare a costruire pupazzi di neve.
  Im *Winter* wollen alle Kinder Schneemänner bauen.
  
  Nonostante *l’inverno* sia finito, si sente ancora un po’ di freddo.
  Obwohl der *Winter* vorbei ist, ist es noch etwas kalt.
  
  Vor *l’inverno* prossimo dobbiamo preparare la caldaia, altrimenti avremo problemi.
  Vor dem nächsten *Winter* müssen wir den Heizkessel vorbereiten, sonst gibt es Probleme.
