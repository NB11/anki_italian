Rang: 674
Wort: medico
Wortart: n.m
Wort mit Artikel: il medico
Femininum / Plural: medici
IPA: ''
Definition: der Arzt, Ärzte
Register: ''
Beispielsätze: |-
  Il *medico* visita il paziente ogni mattina.
  Der *Arzt* untersucht den Patienten jeden Morgen.
  
  I *medici* lavorano in ospedale.
  Die *Ärzte* arbeiten im Krankenhaus.
  
  Domani andrò dal *medico* per un controllo.
  Morgen gehe ich zum *Arzt* zur Kontrolle.
  
  Se hai la febbre, chiama un *medico*.
  Wenn du Fieber hast, rufe einen *Arzt* an.
  
  Vor cinquanta anni i *medici* non avevano questi strumenti.
  Vor fünfzig Jahren hatten die *Ärzte* diese Instrumente nicht.
