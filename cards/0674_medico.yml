Rang: 674
Wort: medico
Wortart: n.m
Wort mit Artikel: il medico
Femininum / Plural: medici
IPA: ''
Definition: der Arzt, -e
Register: ''
Beispielsätze: |-
  Il *medico* che ha visitato mio padre lavora in questo ospedale da vent'anni.
  Der *Arzt*, der meinen Vater untersucht hat, arbeitet seit zwanzig Jahren in diesem Krankenhaus.
  
  Vorresti diventare un *medico* come tuo fratello maggiore?
  Möchtest du *Arzt* wie dein älterer Bruder werden?
  
  Nonostante fosse stanchissimo, il *medico* ha continuato a lavorare senza droga né pause.
  Obwohl er völlig erschöpft war, arbeitete der *Arzt* weiter ohne Drogen oder Pausen.
  
  Se avessi tempo, andrei a trovare il *medico* che mi ha salvato la vita l'anno scorso in quella zona pericolosa.
  Wenn ich Zeit hätte, würde ich den *Arzt* besuchen, der mir voriges Jahr in dieser gefährlichen Zone das Leben gerettet hat.
  
  Ho saputo che quel *medico* famoso è stato accusato di aver falsificato le sue ricerche, ma il giudice non ha ancora preso una decisione definitiva.
  Ich habe gehört, dass dieser berühmte *Arzt* beschuldigt wird, seine Forschungen gefälscht zu haben, aber der Richter hat noch keine endgültige Entscheidung getroffen.
