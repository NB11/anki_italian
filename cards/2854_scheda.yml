Rang: 2854
Wort: scheda
Wortart: n.f
Wort mit Artikel: la scheda
Femininum / Plural: schede
IPA: ''
Definition: die Karte, -n
Register: ''
Beispielsätze: |-
  Devi compilare accuratamente la *scheda* per partecipare al concorso.
  Du musst die *Karte* sorgfältig ausfüllen, um am Wettbewerb teilzunehmen.
  
  Nella *scheda* tecnica ci sono tutti i dati necessari per l'installazione del software.
  Auf der *technischen Karte* stehen alle notwendigen Daten für die Softwareinstallation.
  
  Ho perso la *scheda* SIM del mio telefono nuovo, devo comprarne un'altra.
  Ich habe die *SIM-Karte* meines neuen Handys verloren, ich muss mir eine neue kaufen.
  
  La *scheda* madre del computer si è bruciata e ora non funziona più nulla.
  Das *Hauptplatine* des Computers ist durchgebrannt und jetzt funktioniert nichts mehr.
  
  Hanno inviato una *scheda* di valutazione affinché i clienti possano esprimere la loro opinione.
  Sie haben eine *Bewertungskarte* geschickt, damit die Kunden ihre Meinung äußern können.
