Rang: 1032
Wort: osso
Wortart: n.m
Wort mit Artikel: l'osso
Femininum / Plural: ossa
IPA: ''
Definition: der Knochen, -
Register: ''
Beispielsätze: |-
  Non mi piace *l'osso* di questo pollo, sembra troppo duro.
  Ich mag den *Knochen* von diesem Hähnchen nicht, er scheint zu hart.
  
  Il medico ha detto che *l'osso* rotto guarirà in poche settimane.
  Der Arzt sagte, dass der *Knochenbruch* in wenigen Wochen heilen wird.
  
  Ho trovato un *osso* molto antico nel mio giardino durante lo scavo.
  Ich habe einen sehr alten *Knochen* in meinem Garten beim Ausgraben gefunden.
  
  Se continui a battere *l'osso* con quel martello, rischi di romperlo.
  Wenn du weiter auf den *Knochen* mit diesem Hammer schlägt, riskierst du, ihn zu brechen.
  
  Nonostante il dolore al *osso* del collo, i medici hanno confermato che non c'è nessuna frattura.
  Trotz der Schmerzen am *Knochen* im Hals haben die Ärzte bestätigt, dass kein Bruch vorliegt.
