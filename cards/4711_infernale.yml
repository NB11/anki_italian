  Er träumte von einer entspannten Reise, doch fand sich in einem *schrecklichen* Klima wieder.
  
  Il rumore *infernale* del cantiere non mi fa dormire di notte.
  Der *lärmende* Baustellenlärm lässt mich nachts nicht schlafen.
