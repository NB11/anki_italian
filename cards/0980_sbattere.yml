Rang: 980
Wort: sbattere
Wortart: vt
Wort mit Artikel: sbattere
Femininum / Plural: ''
IPA: ''
Definition: schlagen, peitschen, klatschen
Register: ''
Beispielsätze: |-
  Il vento *sbatté* violentemente le finestre per tutta la notte, impedendoci di dormire.
  Der Wind *peitschte* heftig die Fenster die ganze Nacht hindurch, sodass wir nicht schlafen konnten.
  
  Ha *sbattuto* gli uova con una frusta per preparare la torta di cui ti ho parlato ieri.
  Er hat die Eier mit einem Schneebesen *geschlagen*, um den Kuchen zuzubereiten, von dem ich dir gestern erzählt habe.
  
  Se avessi ascoltato i consigli del medico, forse non avresti *sbattuto* contro questa malattia tanto presto.
  Hättest du auf den Rat des Arztes gehört, hättest du dich vielleicht nicht so schnell diese *Krankheit* zugezogen.
  
  Mentre il poliziotto cercava di cacciare i manifestanti dalla piazza, qualcuno gli gridò di non *sbattere* la porta in faccia a chi aveva bisogno di aiuto.
  Während der *Polizist* versuchte, die Demonstranten aus dem Platz zu vertreiben, rief ihm jemand zu, er solle die Tür nicht vor denen zuschlagen, die Hilfe brauchten.
  
  Dopo aver *sbattuto* il progetto sul tavolo del direttore, gli ho detto che era ancora da perfezionare prima di presentarlo al consiglio.
  Nachdem ich das Projekt wütend auf den Tisch des Direktors *geschlagen* hatte, sagte ich ihm, dass es vor der Präsentation an den Vorstand noch verbessert werden müsse.
