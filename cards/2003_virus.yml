Rang: 2003
Wort: virus
Wortart: n.m
Wort mit Artikel: il virus
Femininum / Plural: i virus
IPA: ''
Definition: das Virus, Viren
Register: ''
Beispielsätze: |-
  L’*virus* si diffonde molto velocemente in ambienti affollati.
  Das *Virus* verbreitet sich sehr schnell in überfüllten Umgebungen.
  
  La scienza sta cercando di capire come neutralizzare questo *virus*.
  Die Wissenschaft versucht herauszufinden, wie man dieses *Virus* unschädlich machen kann.
  
  Se avessi saputo di avere l’*virus*, non sarei venuto a lavoro.
  Hätte ich gewusst, dass ich das *Virus* habe, wäre ich nicht zur Arbeit gekommen.
  
  I medici hanno rilevato la presenza di un *virus* sconosciuto in quel territorio.
  Die Ärzte haben das Vorhandensein eines unbekannten *Virus* in diesem Gebiet festgestellt.
  
  Prima di mangiare, lava sempre le mani per evitare il contagio da *virus*.
  Wasche dir vor dem Essen immer die Hände, um eine Ansteckung mit *Viren* zu vermeiden.
