Rang: 377
Wort: parere
Wortart: vi
Wort mit Artikel: parere
Femininum / Plural: ''
IPA: ''
Definition: scheinen, meinen
Register: ''
Beispielsätze: |-
  Mi *pare* che tu abbia ragione.
  Es *scheint* mir, dass du recht hast.
  
  *Pensi* che sia una buona idea?
  *Meinst* du, dass das eine gute Idee *ist*?
  
  Mi è *parso* di vedere un fantasma.
  Mir ist es *vorgekommen*, als hätte ich einen Geist gesehen.
  
  Secondo me, *parrebbe* meglio aspettare.
  Meiner Meinung nach *würde es* besser *sein*, zu warten.
  
  Che *ne pensi* di questo film?
  Was *meinst* du über diesen Film?
