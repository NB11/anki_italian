Rang: 2794
Wort: vietare
Wortart: v
Wort mit Artikel: vietare
Femininum / Plural: ''
IPA: ''
Definition: verbieten, untersagen
Register: ''
Beispielsätze: |-
  Il sindaco ha *vietato* l’accesso alla piazza per la manifestazione.
  Der Bürgermeister hat den Zugang zum Platz für die Veranstaltung *verboten*.
  
  Mi dispiace, ma è *vietato* fumare in questa zona.
  Es tut mir leid, aber das Rauchen ist in diesem Bereich *untersagt*.
  
  Il regolamento scolastico *vieta* agli studenti di usare il telefono durante le lezioni.
  Die Schulordnung *verbietet* den Schülerinnen und Schülern, während des Unterrichts das Handy zu benutzen.
  
  Se *vieterai* queste pubblicità, perderai molti clienti.
  Wenn du diese Werbung *verbietest*, verlierst du viele Kundinnen und Kunden.
  
  La legge *vieta* che si costruisca vicino al fiume senza autorizzazione.
  Das Gesetz *verbietet* es, ohne Genehmigung am Fluss zu bauen.
