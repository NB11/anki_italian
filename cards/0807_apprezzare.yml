Rang: 807
Wort: apprezzare
Wortart: v
Wort mit Artikel: apprezzare
Femininum / Plural: ''
IPA: ''
Definition: schätzen, würdigen, wertschätzen
Register: ''
Beispielsätze: |-
  Non *apprezzo* affatto questi film così violenti che mostrano solo mostri e sangue!
  Ich *schätze* diese so gewalttätigen Filme, die nur Ungeheuer und Blut zeigen, überhaupt nicht!
  
  Il sergente ha detto che dobbiamo *apprezzare* il lavoro dei nostri soldati perché è molto duro.
  Der *Unteroffizier* hat gesagt, dass wir die Arbeit unserer Soldaten würdigen müssen, weil sie sehr hart ist.
  
  Nonostante la pena che prova, Maria continua a *apprezzare* la vita con grande fiducia nel futuro.
  Trotz des *Schmerzes*, den sie empfindet, schätzt Maria das Leben weiterhin mit großem Vertrauen in die Zukunft.
  
  Se non *apprezzerai* le piccole cose, non troverai mai la felicità, altrimenti continuerai a essere insoddisfatto.
  Wenn du die kleinen Dinge nicht *würdigst*, wirst du niemals Glück finden, sonst wirst du weiterhin unzufrieden sein.
  
  Dopo aver discusso a lungo, hanno capito che era necessario *apprezzare* le idee di tutti, anche quelle del governo presente.
  Nach einem langen Gespräch haben sie verstanden, dass es nötig war, die Ideen aller zu *wertschätzen*, sogar die der gegenwärtigen Regierung.
