Rang: 4048
Wort: sottrarre
Wortart: v
Wort mit Artikel: sottrarre
Femininum / Plural: ''
IPA: ''
Definition: abziehen, subtrahieren, entziehen
Register: ''
Beispielsätze: |-
  Se vuoi *sottrarre* 5 da 20, otterrai 15.
  Wenn du *5* von 20 abziehst, erhältst du 15.
  
  Il governo ha deciso di *sottrarre* fondi alla cultura per finanziare l’esercito.
  Die Regierung hat beschlossen, der Kultur *Geldmittel zu entziehen*, um das Militär zu finanzieren.
  
  Non mi *sottrarrò* alle mie responsabilità, anche se la situazione è difficile.
  Ich werde mich meinen Pflichten nicht *entziehen*, selbst wenn die Lage schwierig ist.
  
  Gli scienziati hanno cercato di *sottrarre* il rumore di fondo dal segnale ricevuto.
  Die Wissenschaftler haben versucht, das Hintergrundgeräusch vom empfangenen Signal *abzuziehen*.
  
  Se non ti *sottrai* alle promesse fatte, perderai la nostra fiducia in modo definitivo.
  Wenn du dich nicht allen gemachten Versprechen *entziehst*, wirst du unser Vertrauen endgültig verlieren.
