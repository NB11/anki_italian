Rang: 4965
Wort: emotivamente
Wortart: adv
Wort mit Artikel: emotivamente
Femininum / Plural: ''
IPA: ''
Definition: emotional
Register: ''
Beispielsätze: |-
  Ha reagito *emotivamente* quando ha saputo della vincita del figlio.
  Er hat *emotional* reagiert, als er vom Sieg seines Sohnes erfuhr.
  
  Non sempre è facile rimanere razionali: a volte ci lasciamo guidare *emotivamente*.
  Es ist nicht immer einfach, rational zu bleiben: Manchmal lassen wir uns *emotional* leiten.
  
  Il film era così *emotivamente* intenso che molti spettatori hanno pianto.
  Der Film war so *emotional* intensiv, dass viele Zuschauer weinten.
  
  Sebbene avesse promesso di restare calma, si è lasciata coinvolgere *emotivamente* dalla discussione.
  Obwohl sie versprochen hatte, ruhig zu bleiben, ließ sie sich *emotional* in die Diskussion hineinziehen.
  
  È importante imparare a gestire le proprie emozioni e non reagire sempre *emotivamente* a tutto.
  Es ist wichtig, seine Gefühle zu managen und nicht auf alles *emotional* zu reagieren.
