Rang: 360
Wort: correre
Wortart: vi
Wort mit Artikel: correre
Femininum / Plural: ''
IPA: ''
Definition: laufen, rennen
Register: ''
Beispielsätze: |-
  Ogni mattina *corro* nel parco per mantenermi in forma.
  Jeden Morgen *laufe* ich im Park, um mich fit zu halten.
  
  Se *corressi* più veloce, vinceresti la gara.
  Wenn du *liefe*st schneller, würdest du das Rennen gewinnen.
  
  Sono stanco perché ieri *ho corso* per due ore.
  Ich bin müde, weil ich gestern zwei Stunden *gelaufen* bin.
  
  Domani *correremo* insieme al mare?
  Laufen wir morgen zusammen am Meer?
  
  Avrei *corso* volentieri, ma pioveva troppo.
  Ich *wäre* gerne *gelaufen*, aber es hat zu sehr geregnet.
