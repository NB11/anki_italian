Rang: 2893
Wort: dipendente
Wortart: n.m/f
Wort mit Artikel: il dipendente
Femininum / Plural: i dipendenti
IPA: ''
Definition: der Angestellte, -n, die Angestellte, -n
Register: ''
Beispielsätze: |-
  Il *dipendente* ha lavorato fino a tardi per completare il progetto in tempo.
  Der *Angestellte* hat bis spät gearbeitet, um das Projekt rechtzeitig abzuschließen.
  
  Ha chiamato la *dipendente* che si occupa delle risorse umane per chiarire i suoi dubbi.
  Sie rief die *Angestellte* an, die sich um die Personalabteilung kümmert, um ihre Zweifel zu klären.
  
  Spero che il nuovo *dipendente* si abitui presto alle procedure dell’azienda.
  Ich hoffe, dass sich der neue *Angestellte* bald an die Abläufe des Unternehmens gewöhnt.
  
  La *dipendente* che ho incontrato ieri ha ricevuto un premio per la sua professionalità.
  Die *Angestellte*, die ich gestern kennengelernt habe, hat einen Preis für ihre Professionalität erhalten.
  
  Se fossi *dipendente* di questa società, approfitterei dei benefit che offre.
  Wäre ich *Angestellter* dieser Firma, würde ich die Benefits nutzen, die sie anbietet.
