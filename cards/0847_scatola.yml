Rang: 847
Wort: scatola
Wortart: n.f
Wort mit Artikel: la scatola
Femininum / Plural: scatole
IPA: ''
Definition: die Schachtel, -n
Register: ''
Beispielsätze: |-
  Ho trovato una *scatola* di cioccolatini sul tavolo della cucina.
  Ich habe eine *Schachtel* Pralinen auf dem Küchentisch gefunden.
  
  Il nonno mi ha regalato una *scatola* piena di fotografie di famiglia.
  Der *Großvater* hat mir eine Schachtel voller Familienfotos geschenkt.
  
  Dobbiamo consegnare questa *scatola* al colonnello entro stasera, certamente non possiamo aspettare.
  Wir müssen diese *Schachtel* bis heute Abend dem Oberst aushändigen, wir können sicherlich nicht warten.
  
  Ho riposto tutti i documenti in una *scatola* di metallo per proteggerli dal fuoco.
  Ich habe alle Dokumente in einer Metall*schachtel* aufbewahrt, um sie vor Feuer zu schützen.
  
  La *scatola* che hai ricevuto contiene un regalo per il tuo fidanzato, me lo ha detto la nostra amica senza affatto pensarci.
  Die *Schachtel*, die du bekommen hast, enthält ein Geschenk für deinen Verlobten, unsere Freundin hat es mir gesagt, ohne ganz und gar darüber nachzudenken.
