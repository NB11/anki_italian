Rang: 4261
Wort: peccatore
Wortart: n.m
Wort mit Artikel: il peccatore
Femininum / Plural: i peccatori
IPA: ''
Definition: der Sünder, -
Register: ''
Beispielsätze: |-
  Anche il *peccatore* più incallito può pentirsi e cambiare vita.
  Auch der *Sünder* mit der schwersten Last kann bereuen und sein Leben ändern.
  
  Non giudicare il *peccatore*, ma osserva la sua condotta.
  Richte nicht über den *Sünder*, sondern beobachte sein Verhalten.
  
  Se fossi un *peccatore*, chiederei perdono e cercherei la via della virtù.
  Wäre ich ein *Sünder*, würde ich um Vergebung bitten und nach der Tugend streben.
  
  La chiesa accoglie *i peccatori* senza giudizio, offrendo loro speranza.
  Die Kirche nimmt *Sünder* ohne Verurteilung auf und bietet ihnen Hoffnung.
  
  Dio perdona i peccati del *peccatore* che si pente con sincerità.
  Gott vergibt dem *Sünder*, der aufrichtig bereut.
