Rang: 2691
Wort: cauzione
Wortart: n.f
Wort mit Artikel: la cauzione
Femininum / Plural: cauzioni
IPA: ''
Definition: die Kaution, -en
Register: ''
Beispielsätze: |-
  Per affittare l’appartamento è necessaria una *cauzione* di 500 euro.
  Für die Wohnung ist eine *Kaution* von 500 Euro erforderlich.
  
  Se non restituisci il libro in biblioteca, dovrai pagare una *cauzione* aggiuntiva.
  Wenn du das Buch nicht zurückgibst, musst du eine zusätzliche *Kaution* zahlen.
  
  La *cauzione* verrà rimborsata solo se l’apparecchio non viene danneggiato.
  Die *Kaution* wird nur erstattet, wenn das Gerät nicht beschädigt wird.
  
  Hanno richiesto una *cauzione* molto alta perché il noleggio è di lusso.
  Sie verlangten eine sehr hohe *Kaution*, weil die Miete luxuriös ist.
  
  Ho versato la *cauzione* ieri, ma ancora non ho ricevuto la conferma.
  Ich habe die *Kaution* gestern eingezahlt, aber noch keine Bestätigung erhalten.
