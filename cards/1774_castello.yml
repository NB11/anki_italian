Rang: 1774
Wort: castello
Wortart: n.m
Wort mit Artikel: il castello
Femininum / Plural: castelli
IPA: ''
Definition: die Burg, -en
Register: ''
Beispielsätze: |-
  Il *castello* sulla collina sembra uscito da una fiaba.
  Die *Burg* auf dem Hügel sieht aus, als käme sie aus einem Märchen.
  
  Hanno restaurato il *castello* medievale vicino al nostro paese.
  Sie haben die mittelalterliche *Burg* in der Nähe unseres Dorfes restauriert.
  
  Se domani pioverà, non visiteremo il *castello* in cima alla montagna.
  Wenn es morgen regnet, werden wir die *Burg* auf dem Berg nicht besichtigen.
  
  Nonostante l’età, il *castello* conserva ancora tutte le sue torri originali.
  Trotz seines Alters bewahrt die *Burg* noch alle ihre ursprünglichen Türme.
  
  Il principe promise alla fanciulla che avrebbe difeso il *castello* con la sua vita.
  Der Prinz versprach dem Mädchen, die *Burg* mit seinem Leben zu verteidigen.
