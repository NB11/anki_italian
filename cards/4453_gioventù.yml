Rang: 4453
Wort: gioventù
Wortart: n.f
Wort mit Artikel: la gioventù
Femininum / Plural: gioventù
IPA: ''
Definition: die Jugend
Register: ''
Beispielsätze: |-
  La *gioventù* di oggi ha idee molto diverse rispetto a quella di cinquant'anni fa.
  Die *Jugend* von heute hat sehr unterschiedliche Ideen als die vor fünfzig Jahren.
  
  Nel mio romanzo ho descritto la *gioventù* come un periodo di scoperte e sogni infranti.
  In meinem Roman habe ich die *Jugend* als eine Phase von Entdeckungen und gebrochenen Träumen beschrieben.
  
  Se avessi la possibilità di rivivere la *gioventù*, cambierei sicuramente alcune decisioni.
  Wenn ich die Möglichkeit hätte, die *Jugend* noch einmal zu erleben, würde ich sicher einige Entscheidungen ändern.
  
  La *gioventù* che si ribella contro le ingiustizie sociali può cambiare il mondo.
  Die *Jugend*, die sich gegen soziale Ungerechtigkeiten rebelliert, kann die Welt verändern.
  
  Molti affermano che senza una forte *gioventù* non c'è futuro per una nazione.
  Viele sagen, dass es ohne eine starke *Jugend* keine Zukunft für eine Nation gibt.
