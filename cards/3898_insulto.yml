Rang: 3898
Wort: insulto
Wortart: n.m
Wort mit Artikel: l'insulto
Femininum / Plural: insulti
IPA: ''
Definition: die Beleidigung, -en
Register: ''
Beispielsätze: |-
  Non sopporto chi usa *insulti* gratuiti per offendere gli altri.
  Ich kann es nicht ertragen, wenn jemand *Beleidigungen* grundlos verwendet, um andere zu verletzen.
  
  Paolo si è infuriato dopo aver ricevuto quell’*insulto* in pubblico.
  Paolo ist wütend geworden, nachdem er diese *Beleidigung* in der Öffentlichkeit erhalten hatte.
  
  Credi che un semplice *insulto* possa ferire davvero qualcuno?
  Glaubst du, dass eine einfache *Beleidigung* jemanden wirklich verletzen kann?
  
  Lei ha reagito con calma, nonostante l’*insulto* ricevuto.
  Sie reagierte gelassen, trotz der erhaltenen *Beleidigung*.
  
  Se qualcuno ti rivolge un *insulto*, meglio ignorarlo che rispondere.
  Wenn dich jemand mit einer *Beleidigung* anspricht, ist es besser, sie zu ignorieren, als zu antworten.
