Rang: 47
Wort: mettere
Wortart: vt
Wort mit Artikel: mettere
Femininum / Plural: ''
IPA: ''
Definition: setzen, stellen, legen, tun, anziehen
Register: ''
Beispielsätze: |-
  Devo *mettere* la chiave sulla tavola.
  Ich muss den *Schlüssel* auf den Tisch *legen*.
  
  Marta ha *messo* i libri nello zaino.
  Marta hat die Bücher in den *Rucksack* *gelegt*.
  
  Perché non *mettono* le scarpe fuori?
  Warum *stellen* sie die Schuhe nicht vor die Tür?
  
  Stasera *metterò* il vestito nuovo per la festa.
  Heute Abend werde ich das *neue Kleid* zur Party *anziehen*.
  
  Vorresti *mettere* un po’ di sale nel sugo?
  Möchtest du ein bisschen *Salz* in die Soße *tun*?
