Rang: 1042
Wort: cancellare
Wortart: vt
Wort mit Artikel: cancellare
Femininum / Plural: ''
IPA: ''
Definition: löschen, entfernen, ausradieren
Register: ''
Beispielsätze: |-
  Devo *cancellare* questi file dal computer perché sono pieni di virus.
  Ich muss diese Dateien vom Computer *löschen*, weil sie voller Viren sind.
  
  Se non *cancelli* quella frase, non potrà capire il senso del messaggio.
  Wenn du diesen Satz nicht *entfernst*, wird er den Sinn der Nachricht nicht begreifen.
  
  Hanno *cancellato* la partita a causa della pioggia che durava da giorni.
  Sie haben das Spiel wegen des Regens, der tagelang *dauerte*, abgesagt.
  
  Non appena avrò tempo, *cancellerò* il mio profilo da quella piattaforma sociale.
  Sobald ich Zeit habe, werde ich mein Profil von dieser sozialen Plattform *löschen*.
  
  Il professore voleva *cancellare* l’appello, ma la regina degli studenti lo ha convinto a mantenerlo.
  Der Professor wollte die Anwesenheitsliste *streichen*, aber die Königin der Studenten überredete ihn, sie beizubehalten.
