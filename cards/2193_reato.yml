Rang: 2193
Wort: reato
Wortart: n.m
Wort mit Artikel: il reato
Femininum / Plural: reati
IPA: ''
Definition: das Verbrechen, -
Register: ''
Beispielsätze: |-
  Se commetti un *reato*, devi affrontare le conseguenze della legge.
  Wenn du ein *Verbrechen* begehst, musst du die Konsequenzen des Gesetzes tragen.
  
  Il commissario sospetta che dietro questo *reato* ci sia un movente passionale.
  Der Kommissar vermutet, dass hinter diesem *Verbrechen* ein Leidenschaftsmotiv steckt.
  
  Nonostante l’indagine approfondita, il *reato* rimane ancora irrisolto.
  Trotz der gründlichen Ermittlung bleibt das *Verbrechen* weiterhin ungelöst.
  
  Hanno arrestato l’imputato solo dopo che è stato provato il suo *reato* con delle prove schiaccianti.
  Sie haben den Angeklagten erst festgenommen, nachdem sein *Verbrechen* mit überwältigenden Beweisen bewiesen wurde.
  
  Secondo la legge, il *reato* di omicidio è considerato uno dei più gravi e viene punito severamente.
  Nach dem Gesetz gilt das *Verbrechen* Mord als eines der schwerwiegendsten und wird hart bestraft.
