Rang: 2724
Wort: cortile
Wortart: n.m
Wort mit Artikel: il cortile
Femininum / Plural: i cortili
IPA: ''
Definition: der Hof, -¨e
Register: ''
Beispielsätze: |-
  Il *cortile* della mia casa è molto grande e ha molti alberi.
  Der *Hof* meines Hauses ist sehr groß und hat viele Bäume.
  
  I bambini giocavano nel *cortile* della scuola finché non è cominciato a piovere.
  Die Kinder spielten auf dem *Hof* der Schule, bis es zu regnen begann.
  
  Mentre passeggiavo, ho visto un gatto nero che attraversava il *cortile* in fretta.
  Während ich spazierte, sah ich eine schwarze Katze, die schnell den *Hof* überquerte.
  
  Se vuoi un po’ di pace, siediti nel *cortile* sul retro della villa, dove non si sente il traffico.
  Wenn du ein bisschen Ruhe möchtest, setz dich in den *Hof* hinter der Villa, wo man keinen Verkehr hört.
  
  Nonostante il caos, il *cortile* del palazzo rimase pulito grazie alla manutenzione costante.
  Trotz des Chaos blieb der *Hof* des Gebäudes dank der ständigen Wartung sauber.
