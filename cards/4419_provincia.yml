Rang: 4419
Wort: provincia
Wortart: n.f
Wort mit Artikel: la provincia
Femininum / Plural: province
IPA: ''
Definition: die Provinz, -en
Register: ''
Beispielsätze: |-
  Vivo in una *provincia* tranquilla vicino al mare.
  Ich lebe in einer *ruhigen* Provinz in der Nähe des Meeres.
  
  La *provincia* di Siena è famosa per le sue colline e i suoi paesaggi.
  Die *Provinz* von Siena ist berühmt für ihre Hügel und Landschaften.
  
  Spero che il governo aiuti le *province* più povere d'Italia.
  Ich hoffe, dass die Regierung den *ärmsten Provinzen* Italiens hilft.
  
  Dopo la conquista romana, molte *province* furono inglobate nell'impero.
  Nach der *Eroberung* der Römer wurden viele Provinzen in das Reich eingegliedert.
  
  Nell'atto di ribellarsi, lui gridò che non avrebbe più accettato le decisioni della *provincia*.
  Bei seinem Versuch, sich zu *rebellieren*, schrie er, dass er die Entscheidungen der Provinz nicht länger akzeptieren würde.
