Rang: 930
Wort: sveglio
Wortart: adj
Wort mit Artikel: sveglio
Femininum / Plural: ''
IPA: ''
Definition: wach, aufgeweckt
Register: ''
Beispielsätze: |-
  Mio fratello è un ragazzo *sveglio* che impara le lingue molto in fretta.
  Mein Bruder ist ein *aufgeweckter* Junge, der Sprachen sehr schnell lernt.
  
  Se fossi *sveglia* prima delle otto, potremmo andare a correre insieme.
  Wenn ich *wach* wäre vor acht Uhr, könnten wir zusammen laufen gehen.
  
  Nonostante sia *sveglio* da ore, continua a bere caffè per concentrarsi meglio.
  Obwohl er *wach* ist seit Stunden, trinkt er weiterhin Kaffee, um sich besser zu konzentrieren.
  
  Vorresti un cane *sveglio* che avverta subito se qualcuno cerca di entrare in casa?
  Möchtest du einen *wachsamen* Hund, der sofort warnt, wenn jemand versucht, ins Haus zu kommen?
  
  L’eroe rimase *sveglio* tutta la notte per sorvegliare il passaggio segreto.
  Der Held blieb die ganze Nacht *wach*, um den geheimen Durchgang zu bewachen.
