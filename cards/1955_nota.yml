Rang: 1955
Wort: nota
Wortart: n.f
Wort mit Artikel: la nota
Femininum / Plural: note
IPA: ''
Definition: die Note, -n
Register: ''
Beispielsätze: |-
  Ho ricevuto una *nota* positiva dal professore di matematica per il mio impegno.
  Ich habe eine *positive Note* vom Mathelehrer für mein Engagement erhalten.
  
  Nonostante la *nota* stonata, il cantante ha ricevuto applausi scroscianti dal pubblico.
  Trotz der *schiefen Note* erhielt der Sänger tosenden Applaus vom Publikum.
  
  Se avessi studiato di più, non avrei preso una *nota* così bassa in fisica.
  Wenn ich mehr gelernt hätte, hätte ich nicht so eine *schlechte Note* in Physik bekommen.
  
  La *nota* a piè di pagina spiega come citare correttamente la fonte nel testo.
  Die *Fußnote* erklärt, wie man die Quelle im Text korrekt zitiert.
  
  Mi hanno consegnato la *nota* spese per le spese di viaggio sostenute.
  Mir wurde die *Kostenabrechnung* für die entstandenen Reisekosten ausgehändigt.
