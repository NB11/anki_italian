Rang: 4996
Wort: lontanamente
Wortart: adv
Wort mit Artikel: lontanamente
Femininum / Plural: ''
IPA: ''
Definition: in ferner, lockerer Weise
Register: ''
Beispielsätze: |-
  Mi ha guardato *lontanamente*, come se non mi conoscesse affatto.
  Er hat mich *fern* angesehen, als würde er mich überhaupt nicht kennen.
  
  Sebbene il problema sia serio, la soluzione proposta sembra *lontanamente* plausibile.
  Obwohl das Problem ernst ist, erscheint die vorgeschlagene Lösung *oberflächlich* plausibel.
  
  Dicono che questo vino sappia di *lontanamente* zucchero bruciato, ma io non lo percepisco.
  Man sagt, dieser Wein schmecke *vage* nach gebranntem Zucker, aber ich nehme es nicht wahr.
  
  Non ho idea di come sia possibile risolvere la questione, *lontanamente* efficace potrebbe essere solo una pausa.
  Ich habe keine Ahnung, wie man die Frage lösen könnte – *ansatzweise* wirksam wäre vielleicht nur eine Pause.
  
  La sua replica era *lontanamente* spiritosa, ma nessuno ha riso; forse il contesto non aiutava.
  Seine Antwort war *in etwa* witzig, aber niemand lachte – vielleicht passte der Kontext einfach nicht.
