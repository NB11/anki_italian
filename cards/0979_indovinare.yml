Rang: 979
Wort: indovinare
Wortart: v
Wort mit Artikel: indovinare
Femininum / Plural: ''
IPA: ''
Definition: raten, erraten
Register: ''
Beispielsätze: |-
  Non so se ho *indovinato* la risposta giusta o no.
  Ich weiß nicht, ob ich die richtige Antwort *geraten* habe oder nicht.
  
  Se *indovino* il numero della lotteria, vincerò milioni!
  Wenn ich die Lottozahl *rate*, gewinne ich Millionen!
  
  Il detective cerca di *indovinare* chi ha rubato il famoso dipinto nel laboratorio.
  Der Detective versucht zu *erraten*, wer das berühmte Gemälde im Labor gestohlen hat.
  
  Vorrei *indovinare* che cosa stai pensando in questo momento.
  Ich würde *geraten*, was du gerade denkst.
  
  È impossibile *indovinare* come andrà a finire questa storia, ma è grandioso seguirla.
  Es ist unmöglich zu *erraten*, wie diese Geschichte endet, doch es ist herrlich, ihr zu folgen.
