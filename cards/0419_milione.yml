Rang: 419
Wort: milione
Wortart: n.m
Wort mit Artikel: il milione
Femininum / Plural: milioni
IPA: ''
Definition: die Million, Millionen
Register: ''
Beispielsätze: |-
  Vivo in una città con *un milione* di abitanti.
  Ich lebe in einer Stadt mit *einer Million* Einwohnern.
  
  Ci sono *milioni* di stelle nel cielo notturno.
  Es gibt *Millionen* von Sternen am Nachthimmel.
  
  Vor un secolo questo paese aveva solo cinquantamila abitanti, oggi ne ha *un milione*.
  Vor einem Jahrhundert hatte dieses Land nur fünfzigtausend Einwohner, heute hat es *eine Million*.
  
  Sognavo di possedere *un milione* di euro, ma non è successo.
  Ich träumte davon, *eine Million* Euro zu besitzen, aber es ist nicht passiert.
  
  Se avessi *un milione*, comprerei una casa in campagna.
  Wenn ich *eine Million* hätte, würde ich ein Haus auf dem Land kaufen.
