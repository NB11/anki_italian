Rang: 126
Wort: posto
Wortart: n.m
Wort mit Artikel: il posto
Femininum / Plural: i posti
IPA: ''
Definition: der Ort, Platz; die Stelle
Register: ''
Beispielsätze: |-
  Dove hai trovato *posto* in questa macchina piena?
  Wo hast du *Platz* in diesem vollen Auto gefunden?
  
  Hanno cambiato *posto* durante la conferenza.
  Sie sind während der Konferenz *umgestiegen*.
  
  Il *posto* migliore per vedere il tramonto è sulla collina.
  Der *beste Ort*, um den Sonnenuntergang zu sehen, ist auf dem Hügel.
  
  Cerchi un *posto* tranquillo per studiare?
  Suchst du einen *ruhigen Ort*, um zu lernen?
  
  Al *posto* di Maria parlerà il suo collega.
  An *Stelle* von Maria wird ihr Kollege sprechen.
