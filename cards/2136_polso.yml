Rang: 2136
Wort: polso
Wortart: n.m
Wort mit Artikel: il polso
Femininum / Plural: polsi
IPA: ''
Definition: das Handgelenk, -e
Register: ''
Beispielsätze: |-
  Mio figlio si è rotto *il polso* giocando a calcio ieri.
  Mein Sohn hat sich beim Fußballspielen gestern das *Handgelenk* gebrochen.
  
  Il medico ha controllato attentamente *il polso* del paziente prima dell’operazione.
  Der Arzt hat vor der Operation den *Puls* des Patienten genau überprüft.
  
  Non vorrei che tu ti facessi male a *il polso* facendo così tanta forza!
  Ich möchte nicht, dass du dir das *Handgelenk* verletzt, wenn du so viel Kraft anwendest!
  
  Anche se non sentiva nulla, il dottore volle verificare *il polso* una seconda volta.
  Obwohl er nichts spürte, wollte der Arzt den *Puls* ein zweites Mal überprüfen.
  
  Mi raccomando, se ti fa male *il polso*, vieni subito a farti visitare!
  Pass auf, wenn dir das *Handgelenk* wehtut, komm sofort zur Untersuchung!
