Rang: 4275
Wort: sponsor
Wortart: n.m
Wort mit Artikel: lo sponsor
Femininum / Plural: sponsor
IPA: ''
Definition: der Sponsor, -en
Register: ''
Beispielsätze: |-
  Lo *sponsor* principale della manifestazione sportiva è un’azienda che produce scarpe sportive.
  Der *Hauptsponsor* der Sportveranstaltung ist ein Unternehmen, das Sportschuhe herstellt.
  
  Vorrei ringraziare il nostro caro *sponsor* per il generoso contributo offerto al progetto.
  Ich möchte unseren lieben *Sponsor* für den großzügigen Beitrag zum Projekt danken.
  
  Senza lo *sponsor* non sarebbe stato possibile organizzare questa mostra d’arte contemporanea.
  Ohne den *Sponsor* wäre es nicht möglich gewesen, diese Ausstellung zeitgenössischer Kunst zu organisieren.
  
  I *sponsor* locali hanno deciso di finanziare solo progetti che rispettano l’ambiente.
  Die *lokalen Sponsoren* haben beschlossen, nur Projekte zu finanzieren, die die Umwelt respektieren.
  
  L’azienda ha trovato uno *sponsor* disposto a investire milioni di euro nel nuovo stabilimento.
  Das Unternehmen hat einen *Sponsor* gefunden, der bereit ist, Millionen Euro in den neuen Standort zu investieren.
