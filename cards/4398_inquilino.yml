Rang: 4398
Wort: inquilino
Wortart: n.m
Wort mit Artikel: il inquilino
Femininum / Plural: gli inquilini
IPA: ''
Definition: der Mieter, -
Register: ''
Beispielsätze: |-
  Il *inquilino* del terzo piano non paga mai l'affitto in tempo.
  Der *Mieter* der dritten Etage zahlt die Miete nie pünctlich.
  
  Ho incontrato un ex *inquilino* che viveva qui prima di me.
  Ich habe einen ehemaligen *Mieter* getroffen, der vor mir hier gewohnt hat.
  
  Spero che il nuovo *inquilino* sia più responsabile del precedente.
  Ich hoffe, dass der neue *Mieter* verantwortungsbewusster als der Vorgänger ist.
  
  Il proprietario ha cacciato l'*inquilino* perché non rispettava le regole.
  Der Vermieter hat den *Mieter* rausgeworfen, weil er die Regeln nicht beachtet hat.
  
  L'*inquilino* si lamenta spesso del rumore proveniente dal piano di sopra.
  Der *Mieter* beschwert sich oft über den Lärm aus der oberen Wohnung.
