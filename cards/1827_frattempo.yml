Rang: 1827
Wort: frattempo
Wortart: n.m
Wort mit Artikel: il frattempo
Femininum / Plural: i frattempi
IPA: ''
Definition: die Zwischenzeit, währenddessen
Register: ''
Beispielsätze: |-
  Ho finito il lavoro e *frattempo* ho ascoltato un podcast.
  Ich habe die Arbeit beendet und in der *Zwischenzeit* einen Podcast gehört.
  
  Aspetta qui, nel *frattempo* preparerò il caffè.
  Warte hier, in der *Zwischenzeit* mache ich den Kaffee.
  
  Non volevo disturbarti, ma *frattempo* è successo qualcosa di importante.
  Ich wollte dich nicht stören, aber in der *Zwischenzeit* ist etwas Wichtiges passiert.
  
  Mentre studiavo, *frattempo* telefonò mia madre per chiedere come stessi.
  Während ich lernte, rief meine Mutter in der *Zwischenzeit* an, um zu fragen, wie es mir geht.
  
  Porta fuori la spazzatura e, *frattempo*, io sparecchio la tavola.
  Bring den Müll raus und in der *Zwischenzeit* räume ich den Tisch ab.
