Rang: 2580
Wort: solitario
Wortart: adj
Wort mit Artikel: solitario
Femininum / Plural: ''
IPA: ''
Definition: einsam, allein, zurückgezogen
Register: ''
Beispielsätze: |-
  Dopo la *solitaria* passeggiata in montagna, tornò a casa molto stanco.
  Nach dem *einsamen* Spaziergang in den Bergen kam er sehr müde nach Hause.
  
  Credo che abbia scelto una vita *solitaria* per evitare i drammi degli altri.
  Ich glaube, er hat sich für ein *einsam* Leben entschieden, um die Dramen anderer zu vermeiden.
  
  Nonostante fosse sempre *solitario*, aveva molti amici che lo apprezzavano.
  Obwohl er immer *einsam* war, hatte er viele Freunde, die ihn schätzten.
  
  Se fossi più *solitaria*, probabilmente scriverei un romanzo.
  Wenn ich *einsamer* wäre, würde ich wahrscheinlich einen Roman schreiben.
  
  Il suo carattere *solitario* non gli permetteva di frequentare feste affollate.
  Sein *einsamer* Charakter erlaubte es ihm nicht, vollbesetzte Feste zu besuchen.
