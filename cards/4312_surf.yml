Rang: 4312
Wort: surf
Wortart: n.m
Wort mit Artikel: il surf
Femininum / Plural: surf
IPA: ''
Definition: das Surfbrett, -er
Register: ''
Beispielsätze: |-
  Mio fratello ha comprato un nuovo *surf* per le sue vacanze in Portogallo.
  Mein Bruder hat ein neues *Surfbrett* für seinen Urlaub in Portugal gekauft.
  
  Durante la tempesta, il *surf* è stato trascinato lontano dalla spiaggia.
  Während des Sturms wurde das *Surfbrett* weit vom Strand weggerissen.
  
  Questo *surf* è così leggero che riesco a portarlo anche in aereo.
  Dieses *Surfbrett* ist so leicht, dass ich es sogar im Flugzeug mitnehmen kann.
  
  I surfisti si riuniscono ogni mattina per approfittare delle onde perfette.
  Die Surfer versammeln sich jeden Morgen, um die perfekten Wellen zu nutzen.
  
  Nonostante l’età, continua a cavalcare le onde con il suo vecchio *surf* di legno.
  Trotz seines Alters surft er weiterhin auf den Wellen mit seinem alten *Surfbrett* aus Holz.
