Rang: 1531
Wort: moto
Wortart: n.m
Wort mit Artikel: la moto
Femininum / Plural: moti
IPA: ''
Definition: die Bewegung, -en
Register: ''
Beispielsätze: |-
  La *moto* di Marco è molto veloce e rumorosa.
  Marcos *Motorrad* ist sehr schnell und laut.
  
  Dopo il finale della gara, la *moto* del vincitore è stata fotografata da ogni giornalista.
  Nach dem Finale des Rennens wurde das *Motorrad* des Siegers von jedem Journalisten fotografiert.
  
  Dicono che la *moto* di tuo fratello sia un modello molto adatto per le strade di montagna.
  Man sagt, das *Motorrad* deines Bruders sei ein sehr geeignetes Modell für Bergstraßen.
  
  Se avessi una *moto*, potrei arrivare a lavoro molto più velocemente e non dovrei prendere l’internet tutti i giorni.
  Wenn ich ein *Motorrad* hätte, könnte ich viel schneller zur Arbeit kommen und müsste nicht jeden Tag das Internet nutzen.
  
  La *moto* che hai appena comprato sembra nuova, ma in realtà è un modello prodotto molti anni fa.
  Das *Motorrad*, das du gerade gekauft hast, sieht neu aus, ist aber eigentlich ein vor vielen Jahren hergestelltes Modell.
