Rang: 2464
Wort: violentare
Wortart: v
Wort mit Artikel: violentare
Femininum / Plural: ''
IPA: ''
Definition: vergewaltigen, schänden
Register: ''
Beispielsätze: |-
  L’imputato è stato accusato di aver *violentato* la vittima in un vicolo buio.
  Der *Angeklagte* wurde beschuldigt, das Opfer in einer dunklen Gasse vergewaltigt zu haben.
  
  Se qualcuno osasse *violentare* una donna, dovrebbe affrontare la giustizia italiana.
  Wenn jemand es wagen würde, eine Frau zu *vergewaltigen*, müsste er sich der italienischen Justiz stellen.
  
  Era così triste che temeva di essere *violentata* dal suo carattere solitario.
  Sie war so traurig, dass sie fürchtete, von ihrem einsamen *Charakter* vergewaltigt zu werden.
  
  Non permetterò che qualcuno *violenti* la dignità di questa comunità.
  Ich werde nicht zulassen, dass jemand die Würde dieser Gemeinschaft *vergewaltigt*.
  
  Avrei preferito morire piuttosto di essere *violentata* da un estraneo.
  Ich hätte mich lieber getötet, als von einem Fremden *vergewaltigt* zu werden.
