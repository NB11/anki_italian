Rang: 4243
Wort: uragano
Wortart: n.m
Wort mit Artikel: l'uragano
Femininum / Plural: uragani
IPA: ''
Definition: der Orkan, -e
Register: ''
Beispielsätze: |-
  L'*uragano* ha devastato la costa orientale della Sicilia ieri sera.
  Der *Orkan* hat die Ostküste Siziliens gestern Abend verwüstet.
  
  Se avessimo saputo dell'*uragano* in arrivo, avremmo cancellato il picnic.
  Wenn wir vom bevorstehenden *Orkan* gewusst hätten, hätten wir das Picknick abgesagt.
  
  Nonostante la potenza dell'*uragano*, gli abitanti del paese hanno aiutato i vicini a riparare i tetti.
  Trotz der Kraft des *Orkans* haben die Dorfbewohner ihren Nachbarn beim Reparieren der Dächer geholfen.
  
  Spero che questo *uragano* non ritardi la partenza del nostro volo transatlantico.
  Ich hoffe, dass dieser *Orkan* unseren Transatlantikflug nicht verzögert.
  
  L'*uragano* che ha colpito le Filippine ha causato danni incalcolabili, secondo quanto riferito dal telegiornale.
  Der *Orkan*, der die Philippinen getroffen hat, hat laut Nachrichtensendung unermessliche Schäden verursacht.
