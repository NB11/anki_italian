Rang: 2679
Wort: dimettere
Wortart: v
Wort mit Artikel: dimettere
Femininum / Plural: ''
IPA: ''
Definition: entlassen, kündigen, zurücktreten
Register: ''
Beispielsätze: |-
  Il direttore ha minacciato di *dimettere* tre impiegati se non migliorano le prestazioni.
  Der Leiter hat damit gedroht, drei Mitarbeiter zu *entlassen*, wenn sich ihre Leistungen nicht verbessern.
  
  Dopo il litigio con il capo, Marco ha deciso di *dimettersi* spontaneamente.
  Nach dem Streit mit dem Chef hat Marco beschlossen, von selbst *zurückzutreten*.
  
  Se non pagano gli stipendi, molti lavoratori dovranno *dimettersi* per necessità.
  Wenn sie die Löhne nicht zahlen, werden viele Arbeiter aus Not *kündigen müssen*.
  
  L'azienda ha dovuto *dimettere* metà dello staff a causa della crisi economica.
  Das Unternehmen musste die Hälfte des Personals aufgrund der Wirtschaftskrise *entlassen*.
  
  Appena avranno trovato un accordo, i dipendenti potranno *dimettersi* senza problemi.
  Sobald sie eine Einigung finden, können die Angestellten problemlos *zurücktreten*.
