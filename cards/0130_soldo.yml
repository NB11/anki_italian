Rang: 130
Wort: soldo
Wortart: n.m
Wort mit Artikel: il soldo
Femininum / Plural: soldi
IPA: ''
Definition: das Geld, -er, die Münze, -n
Register: ''
Beispielsätze: |-
  Quanto *soldo* hai in tasca?
  Wie viel *Geld* hast du in der Tasche?
  
  Ieri ho trovato un *soldo* per terra.
  Gestern habe ich eine *Münze* auf dem Boden gefunden.
  
  Non ho abbastanza *soldi* per comprare quel libro.
  Ich habe nicht genug *Geld*, um dieses Buch zu kaufen.
  
  Quando avevi dieci anni, quante *soldi* ricevevi dai tuoi genitori?
  Als du zehn Jahre alt warst, wie viel *Geld* hast du von deinen Eltern bekommen?
  
  Se avessi più *soldi*, andrei in vacanza in Giappone.
  Wenn ich mehr *Geld* hätte, würde ich nach Japan in Urlaub fahren.
