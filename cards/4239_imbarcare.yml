Rang: 4239
Wort: imbarcare
Wortart: vt
Wort mit Artikel: imbarcare
Femininum / Plural: ''
IPA: ''
Definition: an Bord bringen, ein*schiffen
Register: ''
Beispielsätze: |-
  Il capitano vuole *imbarcare* i passeggeri prima delle otto di sera.
  Der Kapitän möchte die Passagiere vor acht Uhr *an Bord* bringen.
  
  Se avessi finito in tempo, avrei potuto *imbarcare* sul volo delle diciassette.
  Wenn ich rechtzeitig fertig geworden wäre, hätte ich den Flug um fünf *an Bord* bringen können.
  
  Nonostante la complicazione, siamo riusciti a *imbarcare* i bagagli senza ritardi.
  Trotz der *Komplikation* sind wir dazu gekommen, das Gepäck ohne Verspätung einzuschiffen.
  
  La compagnia aerea ci chiede di presentarci all’aeroporto almeno due ore prima di *imbarcare*.
  Die Fluggesellschaft verlangt von uns, uns mindestens zwei Stunden vor dem *Einchecken* am Flughafen einzufinden.
  
  Qualcuno ha visto quando hanno iniziato a *imbarcare* ?
  Hat jemand gesehen, wann man begonnen hat, die Leute *an Bord zu bringen*?
Audio: ''
Notiz: ''
Dispersion: ''
