Rang: 2426
Wort: barbaro
Wortart: n.m
Wort mit Artikel: il barbaro
Femininum / Plural: i barbari
IPA: ''
Definition: der Barbar, -en
Register: ''
Beispielsätze: |-
  La storia ricorda molti *barbari* che hanno invaso l'Impero Romano.
  Die Geschichte erinnert sich an viele *Barbaren*, die das Römische Reich überfallen haben.
  
  Gli archeologi hanno trovato resti di un villaggio di *barbari* nel nord della Germania.
  Die Archäologen haben Überreste eines Dorfes von *Barbaren* im Norden Deutschlands gefunden.
  
  Secondo lo storico, i *barbari* erano meno sviluppati della civiltà romana.
  Laut dem Historiker waren die *Barbaren* weniger entwickelt als die römische Zivilisation.
  
  I romani chiamavano *barbari* tutti coloro che non parlavano latino.
  Die Römer nannten all jene *Barbaren*, die kein Latein sprachen.
  
  La leggenda racconta che un *barbaro* abbia sconfitto un imperatore con la sola forza delle braccia.
  Die Legende erzählt, dass ein *Barbar* einen Kaiser allein durch die Kraft seiner Arme besiegt habe.
