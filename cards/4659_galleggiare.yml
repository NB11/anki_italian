Rang: 4659
Wort: galleggiare
Wortart: vi
Wort mit Artikel: galleggiare
Femininum / Plural: ''
IPA: ''
Definition: schwimmen, treiben
Register: ''
Beispielsätze: |-
  Quella nave vecchia *galleggia* ancora nonostante tutto.
  Dieses alte Schiff *schwimmt* immer noch trotz allem.
  
  Se non avessi il salvagente, non *galleggerei* così bene.
  Wenn ich die Schwimmweste nicht hätte, *schwämme* ich nicht so gut.
  
  Il pescatore ha detto che nel lago *galleggiavano* molte foglie secche.
  Der Fischer sagte, im See *trieben* viele trockene Blätter.
  
  Che cosa *galleggia* in questa baia? È solo un rottame o qualcosa di più?
  Was *schwimmt* in dieser Bucht? Ist es nur ein Schrott oder etwas mehr?
  
  Dopo la tempesta, tutte le barche *galleggiavano* capovolte vicino alla riva.
  Nach dem Sturm *trieben* alle Boote kieloben nahe dem Ufer.
