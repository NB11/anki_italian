Rang: 3639
Wort: seccare
Wortart: vi
Wort mit Artikel: seccare
Femininum / Plural: ''
IPA: ''
Definition: trocknen, austrocknen, lästig werden
Register: ''
Beispielsätze: |-
  Il sole forte *secca* i vestiti stesi in giardino.
  Die starke Sonne *trocknet* die auf der Leine hängende Wäsche.
  
  Mi *secca* quando la gente parla ad alta voce in biblioteca.
  Es *wird mir lästig*, wenn Leute in der Bibliothek laut sprechen.
  
  Ho *seccato* la pasta troppo a lungo, ora è dura.
  Ich habe die Nudeln zu lange *getrocknet*, jetzt sind sie hart.
  
  Ti *secca* se apro la finestra? Fa troppo caldo qui.
  Stört es dich, wenn ich das Fenster öffne? Hier ist es zu warm.
  
  Anche se pioveva spesso, la terra non si è *seccata* completamente.
  Obwohl es oft regnete, ist die Erde nicht komplett *ausgetrocknet*.
Audio: ''
Notiz: ''
Dispersion: ''
