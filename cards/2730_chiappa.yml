Rang: 2730
Wort: chiappa
Wortart: n.f
Wort mit Artikel: la chiappa
Femininum / Plural: chiappe
IPA: ''
Definition: das Gesäß, die Pobacken
Register: ''
Beispielsätze: |-
  Mi sono tagliato mentre tagliavo la legna e mi sono fatto male a una *chiappa*.
  Ich habe mich geschnitten, während ich Holz gehackt habe, und mir das *Gesäß* verletzt.
  
  Dopo la caduta dalla bicicletta sentivo un dolore acuto alle *chiappe*.
  Nach dem Sturz vom *Fahrrad* spürte ich einen stechenden Schmerz in den Pobacken.
  
  Non appena ho sentito qualcuno ridere alle mie *chiappe*, ho capito che era uno scherzo.
  Sobald ich jemanden über meine *Pobacken* lachen hörte, wusste ich, dass es ein Scherz war.
  
  Se la vacca avesse calpestato le *chiappe* di qualcuno, ci sarebbe stata una grande rissa nello stadio?
  Wenn die *Kuh* jemandem auf die Pobacken getreten wäre, gäbe es dann eine große Schlägerei im Stadion?
  
  Ha detto che le sue *chiappe* sono così sensibili che non sopporta nemmeno i pantaloni stretti.
  Er hat gesagt, dass sein *Gesäß* so empfindlich ist, dass er nicht einmal enge Hosen erträgt.
