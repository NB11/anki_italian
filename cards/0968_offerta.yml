  Ohne ein konkretes *Angebot* kann ich mich nicht entscheiden, was ich kaufe.
  
  Vorrei sapere se l'*offerta* per la nostra vacanza include i biglietti aerei.
  Ich möchte wissen, ob das *Angebot* für unseren Urlaub die Flugtickets mit einbezieht.
  
  L'*offerta* dell'albergo era così vantaggiosa che abbiamo prenotato subito.
  Das *Angebot* des Hotels war so günstig, dass wir sofort gebucht haben.
