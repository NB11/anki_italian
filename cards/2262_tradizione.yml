Rang: 2262
Wort: tradizione
Wortart: n.f
Wort mit Artikel: la tradizione
Femininum / Plural: tradizioni
IPA: ''
Definition: die Tradition, -en
Register: ''
Beispielsätze: |-
  *Tradizione* vuole che in questa festa si mangi il panettone.
  *Tradition* sagt, dass man zu diesem Fest Panettone isst.
  
  Molte *tradizioni* locali stanno scomparendo a causa della globalizzazione.
  Viele lokale *Traditionen* verschwinden wegen der Globalisierung.
  
  Vorrei che le nostre *tradizioni* fossero tramandate alle future generazioni.
  Ich wünschte, unsere *Traditionen* würden an die zukünftigen Generationen weitergegeben.
  
  Questa ricetta fa parte della nostra *tradizione* familiare da secoli.
  Dieses Rezept gehört seit Jahrhunderten zu unserer familiären *Tradition*.
  
  Nonostante i cambiamenti, loro vogliono mantenere viva la *tradizione* del presepe a Natale.
  Trotz der Veränderungen wollen sie die *Tradition* der Krippe zu Weihnachten am Leben halten.
