Rang: 2008
Wort: buio
Wortart: n.m
Wort mit Artikel: il buio
Femininum / Plural: i bui
IPA: ''
Definition: die Dunkelheit, Finsternis
Register: ''
Beispielsätze: |-
  Non amo camminare di notte perché il *buio* mi fa paura.
  Ich gehe nicht gern nachts spazieren, weil die *Dunkelheit* mir Angst macht.
  
  Dopo che è sceso il sole, il *buio* ha avvolto tutto il paese.
  Nachdem die Sonne untergegangen war, hat die *Dunkelheit* das ganze Dorf eingehüllt.
  
  Se vuoi approfittare del *buio* per scappare, fallo ora!
  Wenn du die *Dunkelheit* ausnutzen willst, um zu fliehen, dann tu es jetzt!
  
  Nonostante il *buio* fitto, abbiamo trovato la strada di casa.
  Trotz der dichten *Dunkelheit* haben wir den Weg nach Hause gefunden.
  
  Dicono che nel *buio* si sentano strani rumori provenire dal bosco.
  Man sagt, dass man in der *Dunkelheit* seltsame Geräusche aus dem Wald hören kann.
