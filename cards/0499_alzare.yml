  Wenn du *die Hand hebst*, wird die Lehrerin dich aufrufen.
  
  Domani *alzerò* i prezzi di tutti i prodotti.
  Morgen werde ich die Preise *aller Produkte erhöhen*.
  
  Vuoi che *alziamo* le tende e andiamo a casa tua?
  Sollen wir *die Zelte abbrechen* und zu dir nach Hause gehen?
