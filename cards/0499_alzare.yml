Rang: 499
Wort: alzare
Wortart: vt
Wort mit Artikel: alzare
Femininum / Plural: ''
IPA: ''
Definition: heben, erhöhen, aufstehen
Register: ''
Beispielsätze: |-
  Devo *alzare* il volume della televisione, non sento nulla.
  Ich muss *die Lautstärke* des Fernsehers *erhöhen*, ich höre nichts.
  
  Mario si è *alzato* tardi stamattina.
  Mario ist heute Morgen *spät aufgestanden*.
  
  Se *alzi* la mano, la professoressa ti chiamerà.
  Wenn du *die Hand hebst*, wird die Lehrerin dich aufrufen.
  
  Domani *alzerò* i prezzi di tutti i prodotti.
  Morgen werde ich die Preise *aller Produkte erhöhen*.
  
  Vuoi che *alziamo* le tende e andiamo a casa tua?
  Sollen wir *die Zelte abbrechen* und zu dir nach Hause gehen?
