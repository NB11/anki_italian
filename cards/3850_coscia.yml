  Man hat mir gesagt, dass man den *Oberschenkel* wegen des Bruchs operieren müsste, aber ich habe beschlossen zu warten.
  
  Sai che un tempo le donne indossavano corsetti per rendere la *coscia* più snella?
  Weißt du, dass Frauen früher Korsetts trugen, um den *Oberschenkel* schlanker wirken zu lassen?
