Beispielsätze: |-
  Dopo la *coscia* di pollo ho bevuto un bicchiere d'acqua.
  Nach dem *Oberschenkel* vom Hähnchen habe ich ein Glas Wasser getrunken.
  
  Non mi sono accorta di avere un tatuaggio sulla *coscia* sinistra.
  Ich habe nicht bemerkt, dass ich ein Tattoo am *linken Oberschenkel* habe.
  
  Se non avessi sbagliato la dieta, ora la mia *coscia* non sarebbe così grassa.
  Wenn ich mich nicht falsch ernährt hätte, wäre mein *Oberschenkel* jetzt nicht so dick.
  
