Rang: 712
Wort: sala
Wortart: n.f
Wort mit Artikel: la sala
Femininum / Plural: sale
IPA: ''
Definition: der Saal, -säle
Register: ''
Beispielsätze: |-
  La *sala* è piena di gente che aspetta l’inizio del concerto.
  Der *Raum* ist voller Leute, die auf den Beginn des Konzerts warten.
  
  Se vuoi prenotare la *sala* per il tuo compleanno, devi chiamare subito il ristorante.
  Wenn du den *Räum* für deinen Geburtstag reservieren willst, musst du sofort das Restaurant anrufen.
  
  Nonostante il caldo insopportabile, la *sala* del cinema era gremita di spettatori entusiasti.
  Trotz der unerträglichen *Hitze* war der Kinoraum* voll mit begeisterten Zuschauern.
  
  La polizia ha circondato la *sala* dove si teneva l’incontro segreto.
  Die Polizei hat den *Raum*, in dem die geheime Besprechung stattfand, umstellt.
  
  Hanno decorato la *sala* con palloncini blu per il battesimo di suo figlio.
  Sie haben den *Raum* mit blauen Luftballons für die Taufe seines Sohnes geschmückt.
