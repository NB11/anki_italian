Rang: 2819
Wort: autostrada
Wortart: n.f
Wort mit Artikel: l'autostrada
Femininum / Plural: autostrade
IPA: ''
Definition: die Autobahn, -en
Register: ''
Beispielsätze: |-
  L'*autostrada* A1 collega Milano a Napoli in circa 8 ore di viaggio.
  Die *Autobahn* A1 verbindet Mailand mit Neapel in etwa 8 Stunden Fahrt.
  
  Non volevo prendere l'*autostrada* perché preferisco le strade secondarie.
  Ich wollte die *Autobahn* nicht nehmen, weil ich Nebenstraßen bevorzuge.
  
  Se non avessimo perso l'uscita, avremmo già percorso 50 chilometri sull'*autostrada*.
  Wenn wir die Ausfahrt nicht verpasst hätten, wären wir schon 50 Kilometer auf der *Autobahn* gefahren.
  
  I vigili stanno controllando se tutti i veicoli sull'*autostrada* rispettino i limiti di velocità.
  Die Polizisten überprüfen, ob alle Fahrzeuge auf der *Autobahn* die Geschwindigkeitsbegrenzungen einhalten.
  
  Appena usciamo da questo *autostrada*, possiamo fare una sosta in un'area di servizio.
  Sobald wir diese *Autobahn* verlassen, können wir an einer Raststätte eine Pause einlegen.
