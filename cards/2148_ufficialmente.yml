Rang: 2148
Wort: ufficialmente
Wortart: adv
Wort mit Artikel: ufficialmente
Femininum / Plural: ''
IPA: ''
Definition: offiziell
Register: ''
Beispielsätze: |-
  Il presidente ha annunciato *ufficialmente* la sua candidatura per le prossime elezioni.
  Der Präsident hat *offiziell* seine Kandidatur für die nächsten Wahlen angekündigt.
  
  Non ho ancora saputo *ufficialmente* se ho superato l'esame di guida.
  Ich habe noch nicht *offiziell* erfahren, ob ich die Führerscheinprüfung bestanden habe.
  
  Secondo le fonti, la notizia sarà diffusa *ufficialmente* domani mattina alle nove.
  Laut den Quellen wird die Nachricht morgen früh um neun *offiziell* verbreitet.
  
  Ha detto che la decisione verrà presa *ufficialmente* solo tra una settimana, dopo ulteriori verifiche.
  Er hat gesagt, die Entscheidung wird *offiziell* erst in einer Woche nach weiteren Überprüfungen getroffen.
  
  Il sindaco ha fatto sapere che il nuovo regolamento entrerà in vigore *ufficialmente* dal primo del mese prossimo.
  Der Bürgermeister ließ wissen, dass die neue Regelung ab dem ersten nächsten Monat *offiziell* in Kraft tritt.
