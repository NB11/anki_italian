Rang: 270
Wort: verità
Wortart: n.f
Wort mit Artikel: la verità
Femininum / Plural: verità
IPA: ''
Definition: die Wahrheit, -en
Register: ''
Beispielsätze: |-
  La *verità* è che non abbiamo finito il progetto.
  Die *Wahrheit* ist, dass wir das Projekt nicht beendet haben.
  
  Non credere a tutto ciò che senti, a volte la *verità* è nascosta.
  Glaube nicht allem, was du hörst, manchmal ist die *Wahrheit* verborgen.
  
  Mi hai detto la *verità* su quello che è successo?
  Hast du mir die *Wahrheit* über das erzählt, was passiert ist?
  
  Vorrei che tutti dicessero la *verità* senza paura.
  Ich wünschte, alle würden die *Wahrheit* ohne Angst sagen.
  
  Le *verità* più semplici sono spesso le più dure da accettare.
  Die einfachsten *Wahrheiten* sind oft die härtesten zu akzeptieren.
