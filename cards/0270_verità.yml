Rang: 270
Wort: verità
Wortart: n.f
Wort mit Artikel: la verità
Femininum / Plural: verità
IPA: ''
Definition: die Wahrheit, -en
Register: ''
Beispielsätze: |-
  La *verità* è sempre importante da dire.
  Die *Wahrheit* ist immer wichtig zu sagen.
  
  Non credo che tu stia dicendo tutta la *verità*.
  Ich glaube nicht, dass du die ganze *Wahrheit* erzählst.
  
  Avere il coraggio di affrontare la *verità* è segno di forza.
  Den Mut zu haben, der *Wahrheit* ins Auge zu blicken, ist Zeichen von Stärke.
  
  Se sapessi la *verità*, non saresti così sicuro di te.
  Wenn du die *Wahrheit* wüsstest, wärst du nicht so selbstsicher.
  
  La *verità* può essere dolorosa, ma alla fine fa bene sapere tutto.
  Die *Wahrheit* kann schmerzhaft sein, aber am Ende tut es gut, alles zu wissen.
