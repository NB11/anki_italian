Rang: 972
Wort: rosa
Wortart: n.f
Wort mit Artikel: la rosa
Femininum / Plural: rose
IPA: ''
Definition: die Rose, -n
Register: ''
Beispielsätze: |-
  Ho ricevuto un mazzo di *rose* rosse per il mio compleanno.
  Ich habe einen Strauß *roter Rosen* zu meinem Geburtstag bekommen.
  
  Nel giardino ci sono così tante *rose* che sembra una distesa di colori.
  Im Garten gibt es so viele *Rosen*, dass es wie eine Farbenpracht erscheint.
  
  La signora ha detto che le *rose* nel suo vaso sono le più profumate che abbia mai avuto.
  Die Dame sagte, dass die *Rosen* in ihrer Vase die duftendsten sind, die sie jemals hatte.
  
  Spero che domani trovi le *rose* che ho ordinato per l’inaugurazione del laboratorio.
  Ich hoffe, dass wir morgen die *Rosen* finden, die ich für die Eröffnung des Labors bestellt habe.
  
  Nonostante il *rosa* fosse il colore della sua maglietta preferita, lui la trovò inutile dopo averla lavata.
  Obwohl das *Rosa* die Farbe ihres Lieblingst-Shirts war, hielt er es nach dem Waschen für nutzlos.
