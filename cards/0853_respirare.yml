Rang: 853
Wort: respirare
Wortart: vt
Wort mit Artikel: respirare
Femininum / Plural: ''
IPA: ''
Definition: atmen
Register: ''
Beispielsätze: |-
  Mentre *respiravo* profondamente, ho notato un peccato nei suoi pensieri.
  Während ich tief *atmete*, bemerkte ich einen Fehler in seinen Gedanken.
  
  Se *respiri* lentamente, potrai calmarti e discutere con il giudice più serenamente.
  Wenn du langsam *atmest*, kannst du dich beruhigen und ruhiger mit dem Richter diskutieren.
  
  Il colonnello ordinò di *respirare* profondamente prima di dare il segnale di partenza.
  Der *Oberst* befahl, vor dem Signal zum Start tief zu atmen.
  
  Vor di *respirare* l’aria viziata della prigione, il assassino chiuse gli occhi per un momento.
  Bevor der *Mörder* die verbrauchte Luft des Gefängnisses einatmete, schloss er für einen Moment die Augen.
  
  Nonostante la dannazione che lo circondava, riuscì a *respirare* la libertà anche in inferno.
  Trotz des *Fluchs*, der ihn umgab, schaffte er es, selbst in der Hölle die Freiheit zu atmen.
