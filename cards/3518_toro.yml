Rang: 3518
Wort: toro
Wortart: n.m
Wort mit Artikel: il toro
Femininum / Plural: tori
IPA: ''
Definition: der Stier, -e
Register: ''
Beispielsätze: |-
  Il *toro* ruggisce per attirare le mucche nel pascolo.
  Der *Stier* brüllt, um die Kühe auf die Weide zu locken.
  
  Nel film western il *toro* è spesso simbolo di forza e coraggio.
  Im Westernfilm ist der *Stier* oft ein Symbol für Stärke und Mut.
  
  Se il *toro* fosse più mansueto, i contadini non avrebbero così tante preoccupazioni durante la mungitura.
  Wenn der *Stier* zahmer wäre, hätten die Bauern nicht so viele Sorgen während des Melkens.
  
  Nonostante la curva dell'arena, il matador riuscì a evitare il *toro* all'ultimo momento.
  Trotz der Kurve der Arena gelang es dem Matador, dem *Stier* im letzten Moment auszuweichen.
  
  Hanno organizzato una corrida dove i *tori* devono correre tra la folla per strada.
  Sie haben eine Stierlauf-Veranstaltung organisiert, bei der die *Stiere* durch die Menge auf der Straße laufen müssen.
