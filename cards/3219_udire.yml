Rang: 3219
Wort: udire
Wortart: v
Wort mit Artikel: udire
Femininum / Plural: ''
IPA: ''
Definition: hören
Register: ''
Beispielsätze: |-
  Non *udiamo* più nulla da quando è iniziato il notiziario televisivo.
  Wir *hören* nichts mehr, seit die Nachrichtensendung begonnen hat.
  
  Mi piacerebbe *udire* un concerto di quel famoso musicista il prossimo ottobre.
  Ich würde gern ein Konzert dieses berühmten Musikers im *Oktober* *hören*.
  
  Se avessi saputo che stavi male, sarei venuto a *udire* la tua versione della storia.
  Hätte ich gewusst, dass du krank bist, wäre ich gekommen, um deine **Aussage* zu hören*.
  
  Spero che tu possa *udire* la compassione nelle sue parole quando ti racconterà tutto.
  Ich hoffe, du kannst die **Zuneigung* in seinen Worten hören*, wenn er dir alles erzählt.
  
  Nonostante la chiusura della fabbrica, gli abitanti del paese continuano a *udire* il rumore delle macchine di notte.
  Trotz der Schließung der Fabrik **hören** die Dorfbewohner nachts noch das Geräusch der Maschinen.
