Rang: 954
Wort: difesa
Wortart: n.f
Wort mit Artikel: la difesa
Femininum / Plural: difese
IPA: ''
Definition: die Verteidigung, -en
Register: ''
Beispielsätze: |-
  Il governo ha annunciato una nuova *difesa* per proteggere i dati dei cittadini.
  Die Regierung hat eine neue *Verteidigung* angekündigt, um die Daten der Bürger zu schützen.
  
  Nonostante la *difesa* fosse ben organizzata, l’attacco nemico riuscì a penetrare le linee.
  Trotz der gut organisierten *Verteidigung* gelang es dem Feindangriff, die Linien zu durchdringen.
  
  Hanno assunto un avvocato famoso per migliorare la *difesa* nel processo.
  Sie haben einen berühmten Anwalt eingestellt, um die *Verteidigung* im Prozess zu verbessern.
  
  La *difesa* del calciatore è stata elogiata dopo la partita contro la squadra avversaria.
  Die *Verteidigung* des Spielers wurde nach dem Spiel gegen die gegnerische Mannschaft gelobt.
  
  Se la *difesa* non fosse stata così solida, la città avrebbe subito enormi danni durante il terremoto.
  Wenn die *Verteidigung* nicht so solide gewesen wäre, hätte die Stadt während des Erdbebens enorme Schäden erlitten.
