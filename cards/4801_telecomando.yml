Rang: 4801
Wort: telecomando
Wortart: n.m
Wort mit Artikel: il telecomando
Femininum / Plural: telecomandi
IPA: ''
Definition: die Fernbedienung, -en
Register: ''
Beispielsätze: |-
  Non trovo più *il telecomando* della televisione, forse l'ho perso in soggiorno.
  Ich finde die *Fernbedienung* des Fernsehers nicht mehr, vielleicht habe ich sie im Wohnzimmer verloren.
  
  Mia moglie mi ha detto di spegnere la TV con *il telecomando* invece di urlare.
  Meine Frau hat mir gesagt, den Fernseher mit der *Fernbedienung* auszuschalten, statt zu schreien.
  
  Dopo che hai acceso la luce con *il telecomando* della smart home, la stanza è diventata più accogliente.
  Nachdem du das Licht mit der *Fernbedienung* der Smart-Home-Anlage eingeschaltet hast, ist der Raum gemütlicher geworden.
  
  Se non trovi *il telecomando* del condizionatore, puoi regolarlo manualmente sul pannello frontale.
  Wenn du die *Fernbedienung* der Klimaanlage nicht findest, kannst du sie manuell an der Vorderseite einstellen.
  
  Appena ho premuto un tasto su *il telecomando* sbagliato, è partita la registrazione invece della pausa.
  Sobald ich eine Taste an der falschen *Fernbedienung* gedrückt habe, startete die Aufnahme statt der Pause.
