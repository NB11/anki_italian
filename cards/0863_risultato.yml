Rang: 863
Wort: risultato
Wortart: n.m
Wort mit Artikel: il risultato
Femininum / Plural: risultati
IPA: ''
Definition: das Ergebnis, -se
Register: ''
Beispielsätze: |-
  Dopo mesi di lavoro, abbiamo finalmente visto il *risultato* di tanto sforzo.
  Nach Monaten der Arbeit haben wir endlich das *Ergebnis* all dieser Mühe gesehen.
  
  Nonostante le difficoltà, il *risultato* finale del progetto è stato eccellente, infatti tutti ne sono soddisfatti.
  Trotz der Schwierigkeiten war das *Ergebnis* des Projekts hervorragend, actually sind alle damit zufrieden.
  
  Se non studiassi di più, il *risultato* dell'esame non sarebbe così buono, non credi?
  Wenn du nicht mehr lernen würdest, wäre das *Ergebnis* der Prüfung nicht so gut, findest du nicht?
  
  Il colonnello ci ha detto che il *risultato* dell'esercitazione militare sarà annunciato domani mattina alle nove.
  Der Oberst sagte uns, dass das *Ergebnis* der Militärübung morgen um neun Uhr bekannt gegeben wird.
  
  Nonostante le tracce di sangue sulla scena, il *risultato* dell'indagine non è ancora chiaro e molti sospettano che sia stato un assassino.
  Trotz der Blutspuren am Tatort ist das *Ergebnis* der Ermittlungen noch unklar, und viele vermuten einen Mörder.
