Rang: 2254
Wort: fidanzare
Wortart: v
Wort mit Artikel: fidanzare
Femininum / Plural: ''
IPA: ''
Definition: sich verloben
Register: ''
Beispielsätze: |-
  Anna e Marco si sono *fidanzati* dopo due anni di frequentazione.
  Anna und Marco haben sich nach zwei Jahren *verlobt*.
  
  Se non ti *fidanzi* presto, perderai la tua occasione migliore.
  Wenn du dich nicht bald *verlobst*, verpasst du deine beste Chance.
  
  Era così felice che avrebbe voluto *fidanzarsi* con chiunque pur di non rimanere sola.
  Sie war so glücklich, dass sie sich mit irgendwem *verlobt* hätte, nur um nicht allein zu bleiben.
  
  Mi hanno detto che si *fidanzerà* ufficialmente il mese prossimo.
  Mir wurde gesagt, dass er sich nächsten Monat offiziell *verlobt*.
  
  Spero che un giorno troverò qualcuno con cui *fidanzarmi* per davvero e non solo per convenzione sociale.
  Ich hoffe, dass ich eines Tages jemanden finde, mit dem ich mich wirklich *verloben* kann und nicht nur aus gesellschaftlicher Konvention.
