Rang: 867
Wort: carne
Wortart: n.f
Wort mit Artikel: la carne
Femininum / Plural: carni
IPA: ''
Definition: das Fleisch, Plural selten
Register: ''
Beispielsätze: |-
  La *carne* di manzo è molto gustosa, ma quella di pollo è più leggera.
  Das *Fleisch* vom Rind ist sehr schmackhaft, aber das vom Huhn ist leichter.
  
  Se mangi troppa *carne* rossa, rischi problemi alla salute secondo la società moderna.
  Wenn du zu viel *Fleisch* isst, riskierst du Gesundheitsprobleme, wie die moderne Gesellschaft sagt.
  
  Ho comprato della *carne* fresca al mercato, ma il pensiero di cucinarla mi stressa un po’.
  Ich habe frisches *Fleisch* auf dem Markt gekauft, aber der Gedanke, es zuzubereiten, macht mir ein bisschen Stress.
  
  Nonostante la siccità, gli allevatori continuano a produrre *carne* per soddisfare la domanda della popolazione.
  Trotz der Dürre produzieren die Viehzüchter weiterhin *Fleisch*, um die Nachfrage der Bevölkerung zu decken.
  
  Dimmi, preferisci la *carne* alla griglia o quella al forno? Dunque, cosa scegli oggi?
  Sag mir, bevorzugst du *Fleisch* vom Grill oder im Ofen? Also, was wählst du heute?
