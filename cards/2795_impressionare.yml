Rang: 2795
Wort: impressionare
Wortart: v
Wort mit Artikel: impressionare
Femininum / Plural: ''
IPA: ''
Definition: beeindrucken, wirken auf
Register: ''
Beispielsätze: |-
  La performance del cantante ha *impressionato* tutto il pubblico presente.
  Die Leistung des Sängers hat das gesamte anwesende Publikum *beeindruckt*.
  
  Nonostante l’età avanzata, il pittore *impressiona* ancora con i suoi quadri straordinari.
  Trotz seines hohen Alters *wirkt* der Maler noch immer mit seinen außergewöhnlichen Bildern auf.
  
  Mi chiedo se la sua opinione *impressionerà* anche il direttore del museo.
  Ich frage mich, ob seine Meinung auch den Museumsdirektor *beeindrucken wird*.
  
  È raro trovare un film che riesca a *impressionare* così profondamente come questo.
  Es ist selten, einen Film zu finden, der so tiefgreifend *wirken kann* wie dieser.
  
  La notizia della scoperta ha *impressionato* tutto il team di ricerca, che ora lavora con ancora più entusiasmo.
  Die Nachricht der Entdeckung hat das gesamte Forschungsteam *beeindruckt*, das nun mit noch mehr Begeisterung arbeitet.
