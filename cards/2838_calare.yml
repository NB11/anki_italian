Rang: 2838
Wort: calare
Wortart: vi
Wort mit Artikel: calare
Femininum / Plural: ''
IPA: ''
Definition: abnehmen, sinken, fallen
Register: ''
Beispielsätze: |-
  La temperatura sta *calando* velocemente a causa del vento freddo.
  Die Temperatur *sinkt* schnell wegen des kalten Windes.
  
  Se non *calassi* le aspettative, rimarresti deluso.
  Wenn du die Erwartungen nicht *senkst*, wirst du enttäuscht sein.
  
  Dopo la guerra, il prezzo del petrolio ha *calato* bruscamente.
  Nach dem Krieg ist der Ölpreis *stark gefallen*.
  
  Credo che domani *calerà* la pressione atmosferica.
  Ich glaube, dass morgen der Luftdruck *sinkt*.
  
  Non appena il sole *è calato*, abbiamo acceso le luci.
  Sobald die Sonne *untergegangen* ist, haben wir die Lampen eingeschaltet.
