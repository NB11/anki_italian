Rang: 404
Wort: luce
Wortart: n.f
Wort mit Artikel: la luce
Femininum / Plural: luci
IPA: ''
Definition: das Licht, -er
Register: ''
Beispielsätze: |-
  La *luce* nella stanza è troppo debole.
  Das *Licht* im Zimmer ist zu schwach.
  
  Hai acceso la *luce* in bagno?
  Hast du das *Licht* im Bad angeschaltet?
  
  Domani installeremo delle nuove *luci* in salotto.
  Morgen installieren wir neue *Lichter* im Wohnzimmer.
  
  Non riesco a vedere senza la *luce* della lampada.
  Ich kann ohne das *Licht* der Lampe nichts sehen.
  
  Spero che la *luce* del sole duri ancora un’ora.
  Ich hoffe, dass das *Licht* der Sonne noch eine Stunde anhält.
