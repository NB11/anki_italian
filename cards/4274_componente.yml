Rang: 4274
Wort: componente
Wortart: n.m
Wort mit Artikel: il componente
Femininum / Plural: componenti
IPA: ''
Definition: der Bestandteil, -e
Register: ''
Beispielsätze: |-
  Questa macchina ha tre *componenti* principali: motore, batteria e telaio.
  Diese Maschine hat drei *Hauptbestandteile*: Motor, Batterie und Rahmen.
  
  Non dimenticare di aggiungere un'altra *componente* al tuo progetto.
  Vergiss nicht, eine weitere *Komponente* zu deinem Projekt hinzuzufügen.
  
  L'ingegnere ha analizzato ogni *componente* del dispositivo per trovare il difetto.
  Der Ingenieur hat jede *Komponente* des Geräts analysiert, um den Fehler zu finden.
  
  Se manca una *componente* fondamentale, il sistema non funzionerà correttamente.
  Wenn eine grundlegende *Komponente* fehlt, funktioniert das System nicht richtig.
  
  Gli scienziati hanno studiato i *componenti* chimici del nuovo farmaco.
  Die Wissenschaftler haben die *chemischen Bestandteile* des neuen Medikaments untersucht.
