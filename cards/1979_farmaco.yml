Beispielsätze: |-
  Il medico ha prescritto un *farmaco* che dovrei prendere ogni mattina.
  Der Arzt hat mir ein *Medikament* verschrieben, das ich jeden Morgen einnehmen soll.
  
  Devi ricordarti di assumere regolarmente questo *farmaco* per ottenere i migliori risultati.
  Du musst dich daran erinnern, dieses *Medikament* regelmäßig einzunehmen, um die besten Ergebnisse zu erzielen.
  
  Ho letto attentamente il foglietto illustrativo del *farmaco* prima di iniziare la terapia.
  Ich habe den Beipackzettel des *Arzneimittels* sorgfältig gelesen, bevor ich mit der Therapie begonnen habe.
  
  Se non rispetti il dosaggio del *farmaco*, potresti avere effetti collaterali.
  Wenn du die Dosierung des *Medikaments* nicht einhältst, könntest du Nebenwirkungen haben.
  
  Il paziente ha chiesto al dottore se esiste un *farmaco* più economico ma altrettanto efficace.
  Der Patient hat den Arzt gefragt, ob es ein günstigeres *Medikament* gibt, das genauso wirksam ist.
