Beispielsätze: |-
  L'*anno* scorso sono andato in *Italia* per la prima volta.
  Im *vergangenen Jahr* bin ich zum ersten Mal nach *Italien* gereist.
  
  Quanti *anni* hai? Dimmi la verità!
  Wie viele *Jahre* bist du alt? Sag mir die Wahrheit!
  
  Spero che il *prossimo anno* sia migliore dell'ultimo.
  Ich hoffe, dass das *nächste Jahr* besser sein wird als das letzte.
  
  Negli *anni* Novanta la tecnologia era molto diversa.
  In den *Neunzigerjahren* war die Technologie ganz anders.
  
  Ogni *anno* festeggiamo il nostro anniversario con una cena speciale.
  Jedes *Jahr* feiern wir unser Jubiläum mit einem besonderen Abendessen.
