Rang: 2289
Wort: favoloso
Wortart: adj
Wort mit Artikel: favoloso
Femininum / Plural: ''
IPA: ''
Definition: fantastisch, großartig, wunderbar
Register: ''
Beispielsätze: |-
  Questo film è semplicemente *favoloso*, non trovi?
  Dieser Film ist einfach *fantastisch*, findest du nicht?
  
  Ho visitato un ristorante dove il servizio era *favoloso* nonostante la folla di clienti.
  Ich habe ein Restaurant besucht, wo der Service *fantastisch* war, trotz der Menschenmenge an Gästen.
  
  Se avessi più tempo, mi piacerebbe vedere un concerto dal *favoloso* palco di questo teatro.
  Wenn ich mehr Zeit hätte, würde ich gern ein Konzert auf der *fantastischen* Bühne dieses Theaters sehen.
  
  Era *favoloso* vedere la danza tradizionale durante la festa del paese, malgrado l'imbarazzo iniziale.
  Es war *wunderbar*, den traditionellen Tanz beim Dorffest zu sehen, trotz der anfänglichen Verlegenheit.
  
  Spero che il regista abbia preparato una versione *favolosa* del romanzo per lo schermo grande.
  Ich hoffe, dass der Regisseur eine *fantastische* Version des Romans für die große Leinwand vorbereitet hat.
