Rang: 2581
Wort: pattuglia
Wortart: n.f
Wort mit Artikel: la pattuglia
Femininum / Plural: pattuglie
IPA: ''
Definition: die Patrouille, -n
Register: ''
Beispielsätze: |-
  La *pattuglia* militare è partita all’alba per sorvegliare il confine.
  Die militärische *Patrouille* ist bei Tagesanbruch aufgebrochen, um die Grenze zu überwachen.
  
  Il comandante ha ordinato che la *pattuglia* perlustrasse la zona dopo il rapporto dell’impiegato.
  Der Kommandant hat befohlen, dass die *Patrouille* die Gegend nach dem Bericht des Angestellten durchsuchen soll.
  
  Nonostante la stanchezza, la *pattuglia* è riuscita a tornare alla base in tempo.
  Trotz der Müdigkeit ist es der *Patrouille* gelungen, rechtzeitig zur Basis zurückzukehren.
  
  Se la *pattuglia* avesse perso il contatto radio, avremmo dovuto intervenire immediatamente.
  Wenn die *Patrouille* den Funkkontakt verloren hätte, hätten wir sofort eingreifen müssen.
  
  La *pattuglia* notturna ha avvistato un squalo vicino alla costa, ma non si è avvicinata.
  Die nächtliche *Patrouille* hat einen Hai in Küstennähe gesichtet, aber sich nicht genähert.
