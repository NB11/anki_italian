Rang: 4181
Wort: pila
Wortart: n.f
Wort mit Artikel: la pila
Femininum / Plural: le pile
IPA: ''
Definition: die Batterie, -n, die Taschenlampe, -n, der Stapel, -
Register: ''
Beispielsätze: |-
  Dove hai messo *la pila* che ti ho prestato ieri?
  Wo hast du *die Batterie* hingelegt, die ich dir gestern geliehen habe?
  
  Non trovo più *la pila* del telecomando e non posso cambiare canale.
  Ich finde *die Taschenlampe* der Fernbedienung nicht mehr und kann den Kanal nicht wechseln.
  
  Prima di partire, controlla che tutte *le pile* delle luci di emergenza siano cariche.
  Kontrolliere vor der Abfahrt, dass *die Batterien* der Notleuchten geladen sind.
  
  Ha comprato una *pila* di libri interessanti in libreria, ma non li leggerà mai tutti.
  Er hat einen *Stapel* interessanter Bücher in der Buchhandlung gekauft, wird sie aber nie alle lesen.
  
  Se non funziona, sostituisci *la pila* del sensore di movimento con una nuova.
  Wenn es nicht funktioniert, ersetze *die Batterie* des Bewegungsmelders durch eine neue.
