Rang: 1086
Wort: college
Wortart: n.m
Wort mit Artikel: il college
Femininum / Plural: college
IPA: ''
Definition: das College, -s
Register: ''
Beispielsätze: |-
  Dopo aver finito il liceo, vorrei iscrivermi a un *college* a Milano per studiare economia.
  Nach dem Abitur möchte ich mich an einem *College* in Mailand einschreiben, um Wirtschaft zu studieren.
  
  Nonostante sia difficile, i *college* statunitensi offrono molte opportunità per gli studenti internazionali.
  Trotz der Schwierigkeiten bieten amerikanische *Colleges* vielen internationalen Studierenden viele Chancen.
  
  Il *college* che ho scelto si trova vicino al porto, dove ogni giorno vedo navi militari passare.
  Das *College*, das ich gewählt habe, liegt nahe dem Hafen, wo ich täglich militärische Schiffe vorbeifahren sehe.
  
  Se non ti senti sicuro, forse dovresti informare il direttore del *college* prima di prendere una decisione.
  Falls du dich unsicher fühlst, solltest du vielleicht den Direktor des *Colleges* informieren, bevor du eine Entscheidung triffst.
  
  I *college* privati costano di più, ma garantiscono una migliore guida agli studenti rispetto a quelli pubblici.
  Private *Colleges* sind teurer, bieten den Studierenden aber eine bessere Führung als staatliche Einrichtungen.
