Rang: 2203
Wort: giocattolo
Wortart: n.m
Wort mit Artikel: il giocattolo
Femininum / Plural: giocattoli
IPA: ''
Definition: das Spielzeug, -e
Register: ''
Beispielsätze: |-
  Questo *giocattolo* è rotto, non funziona più.
  Dieses *Spielzeug* ist kaputt, es funktioniert nicht mehr.
  
  Ho comprato un nuovo *giocattolo* per mio figlio perché quello vecchio non gli piaceva più.
  Ich habe ein neues *Spielzeug* für meinen Sohn gekauft, weil ihm das alte nicht mehr gefallen hat.
  
  Quando ero piccolo, passavo ore intere a giocare con il mio *giocattolo* preferito.
  Als ich klein war, verbrachte ich stundenlang damit, mit meinem Lieblings-*Spielzeug* zu spielen.
  
  Non sapevo che il *giocattolo* che hai regalato fosse così fragile: si è rotto al primo uso!
  Ich wusste nicht, dass das *Spielzeug*, das du geschenkt hast, so zerbrechlich ist: Es ist beim ersten Gebrauch kaputtgegangen!
  
  Se vuoi che tuo figlio impari a condividere, dagli un *giocattolo* che possa prestare agli altri bambini.
  Wenn du möchtest, dass dein Kind teilt, gib ihm ein *Spielzeug*, das es den anderen Kindern ausleihen kann.
