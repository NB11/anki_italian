Rang: 3312
Wort: recentemente
Wortart: adv
Wort mit Artikel: recentemente
Femininum / Plural: ''
IPA: ''
Definition: vor kurzem, neulich
Register: ''
Beispielsätze: |-
  Ho finito il progetto *recentemente*, quindi ora posso rilassarmi un po’.
  Ich habe das Projekt *kürzlich* abgeschlossen, also kann ich jetzt etwas entspannen.
  
  Dicono che abbia trovato lavoro *recentemente* come programmatore.
  Man sagt, er habe *kürzlich* als Programmierer eine Stelle gefunden.
  
  Sembra che Maria abbia cambiato *recentemente* il suo stile di vita.
  Es scheint, als hätte Maria *kürzlich* ihren Lebensstil geändert.
  
  L’ho incontrato *recentemente* al supermercato, ma non sapeva della festa.
  Ich habe ihn *kürzlich* im Supermarkt getroffen, aber er wusste nichts von der Party.
  
  Se avessi saputo la verità *recentemente*, non avrei firmato quel contratto.
  Wenn ich die Wahrheit *kürzlich* gewusst hätte, hätte ich diesen Vertrag nicht unterschrieben.
