Rang: 3426
Wort: legato
Wortart: adj
Wort mit Artikel: legato
Femininum / Plural: ''
IPA: ''
Definition: gebunden, verbunden
Register: ''
Beispielsätze: |-
  Il musicista ha scritto una melodia *legata* alle emozioni dell’autunno.
  Der Musiker hat eine Melodie, die an die Emotionen des **Herbsts* gebunden* ist, komponiert.
  
  Dopo l’incidente, le rotte aeree sono state *legate* a controlli più severi.
  Nach dem Unfall wurden die Flugrouten an strengere **Kontrollen* gebunden*.
  
  Il regista vuole una sceneggiatura in cui il destino dei personaggi sia *legato* in modo indissolubile.
  Der Regisseur will ein Drehbuch, in dem das Schicksal der Figuren untrennbar **miteinander verbunden** ist.
  
  Le tradizioni di questa regione sono profondamente *legate* alla cultura contadina del passato.
  Die Traditionen dieser **Region* sind tief mit der bäuerlichen Kultur der Vergangenheit verbunden*.
  
  Se non fosse *legato* alle promesse fatte, potrebbe cambiare lavoro senza rimorsi.
  Wenn er nicht an die gegebenen Versprechen **gebunden** wäre, könnte er den Job ohne Reue wechseln.
