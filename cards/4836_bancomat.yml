Rang: 4836
Wort: bancomat
Wortart: n.m
Wort mit Artikel: il bancomat
Femininum / Plural: bancomat
IPA: ''
Definition: der Geldautomat, -en
Register: ''
Beispielsätze: |-
  Dove si trova il *bancomat* più vicino?
  Wo befindet sich der nächste *Geldautomat*?
  
  Ho prelevato 200 euro dal *bancomat* in piazza.
  Ich habe 200 Euro am *Geldautomaten* auf dem Platz abgehoben.
  
  Non riesco a ricordare il codice del *bancomat*.
  Ich kann mich nicht an die *PIN* des Geldautomaten erinnern.
  
  Se non funziona il *bancomat*, possiamo andare in banca domani.
  Wenn der *Geldautomat* nicht funktioniert, können wir morgen zur Bank gehen.
  
  Il *bancomat* della mia banca è sempre affollato la mattina.
  Der *Geldautomat* meiner Bank ist morgens immer überlaufen.
