Rang: 937
Wort: registrare
Wortart: vt
Wort mit Artikel: registrare
Femininum / Plural: ''
IPA: ''
Definition: aufnehmen, registrieren
Register: ''
Beispielsätze: |-
  Abbiamo deciso di *registrare* ogni dettaglio dell’incontro per non dimenticare nulla.
  Wir haben beschlossen, jede Einzelheit des Treffens zu *aufnehmen*, damit wir nichts vergessen.
  
  Il medico ha consigliato di *registrare* la terapia per monitorare meglio l’evoluzione.
  Der Arzt hat empfohlen, die Therapie zu *dokumentieren*, um den Fortschritt besser zu verfolgen.
  
  Stanno per *registrare* un nuovo brano in studio, ma non sanno ancora il titolo.
  Sie werden bald ein neues Lied im Studio *aufnehmen*, aber sie kennen den Titel noch nicht.
  
  Senza *registrare* la conversazione, non possiamo provare ciò che è stato detto.
  Ohne die Aufnahme des Gesprächs können wir nicht beweisen, was gesagt wurde.
  
  Se avessero *registrato* la conferenza, avrebbe potuto analizzarne i contenuti con calma.
  Hätten sie den Vortrag aufgenommen, hätte er dessen Inhalte in Ruhe analysieren können.
