  Wenn ich gewusst hätte, dass es so kompliziert ist, hätte ich meine Pläne *etwas* geändert.
  
  Nonostante fosse *leggermente* in ritardo, riuscì comunque ad arrivare in tempo.
  Obwohl er *etwas* verspätet war, schaffte er es trotzdem, pünktlich anzukommen.
  
  Dopo la pioggia, l'odore di terra bagnata era *leggermente* più intenso del solito.
  Nach dem Regen war der Geruch der nassen Erde *etwas* intensiver als sonst.
