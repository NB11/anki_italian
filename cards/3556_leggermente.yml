Wort mit Artikel: leggermente
Femininum / Plural: ''
IPA: ''
Definition: leicht, schwach
Register: ''
Beispielsätze: |-
  Maria si sente *leggermente* stanca dopo la passeggiata.
  Maria fühlt sich *leicht* müde nach dem Spaziergang.
  
