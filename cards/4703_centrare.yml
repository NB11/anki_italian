  Ich hoffe, dass du den entscheidenden Punkt dieses Problems *triffst*.
  
  Lui dice di aver *centrato* il centro della città in dieci minuti.
  Er sagt, er habe das Stadtzentrum in zehn Minuten erreicht.
  
  Non è semplice *centrare* il giusto equilibrio tra lavoro e vita privata.
  Es ist nicht einfach, die richtige Balance zwischen Arbeit und Privatleben zu *finden*.
