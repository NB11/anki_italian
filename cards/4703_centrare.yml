Beispielsätze: |-
  Non *centri* proprio mai quando giochi a freccette!
  Du triffst aber auch nie wenn du Dart spielst!
  
  Se *centri* il bersaglio al primo colpo, vincerai la gara.
  Wenn du das *Ziel* beim ersten Schuss triffst, wirst du das Spiel gewinnen.
  
