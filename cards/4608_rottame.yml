Rang: 4608
Wort: rottame
Wortart: n.m
Wort mit Artikel: il rottame
Femininum / Plural: i rottami
IPA: ''
Definition: der Schrott, -e
Register: ''
Beispielsätze: |-
  Il meccanico ha trovato *rottame* dappertutto nel garage dopo l’alluvione.
  Der Mechaniker hat überall *Schrott* im Garage nach dem Hochwasser gefunden.
  
  Non buttare quello *rottame* nella spazzatura normale: è riciclabile!
  Wirf diesen *Schrott* nicht in den normalen Müll: Er ist recycelbar!
  
  Ho comprato un’automobile usata solo perché costava come *rottame* di metallo.
  Ich habe ein gebrauchtes Auto gekauft, nur weil es so viel wie *Schrott* aus Metall kostete.
  
  Durante la guerra molti edifici erano ridotti a *rottame* dal bombardamento.
  Während des Krieges waren viele Gebäude durch die Bombardierung zu *Schrott* reduziert worden.
  
  Se non ti servi più di quel motorino, portalo al centro di raccolta dei *rottami*.
  Wenn du diesen Motorroller nicht mehr brauchst, bring ihn zum Schrottplatz.
