Rang: 608
Wort: questione
Wortart: n.f
Wort mit Artikel: la questione
Femininum / Plural: questioni
IPA: ''
Definition: die Frage, -n, die Angelegenheit, -en, das Problem, -e
Register: ''
Beispielsätze: |-
  La *questione* è molto complicata e richiede una discussione approfondita tra tutti i partecipanti.
  Die *Frage* ist sehr kompliziert und erfordert eine gründliche Diskussion zwischen allen Teilnehmern.
  
  Nonostante tutto, lui ha risolto la *questione* in meno di un'ora semplicemente parlando con la guardia di turno.
  Trotz allem hat er die *Angelegenheit* in weniger als einer Stunde gelöst, indem er einfach mit der Wache sprach.
  
  Credi davvero che questa *questione* possa essere risolta senza il consiglio degli esperti?
  Glaubst du wirklich, dass diese *Frage* ohne den Rat der Experten gelöst werden kann?
  
  Se non risolvi subito la *questione*, ci sarà un altro terribile incidente nel centro della città.
  Wenn du die *Angelegenheit* nicht sofort löst, wird es einen weiteren schrecklichen Vorfall im Stadtzentrum geben.
  
  La *questione* di cui parlava suo zio riguarda il mantenimento delle regole nella compagnia di soldati.
  Die *Frage*, über die sein Onkel sprach, betrifft die Einhaltung der Regeln in der Gesellschaft der Soldaten.
