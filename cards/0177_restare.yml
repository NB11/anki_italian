Wort mit Artikel: restare
Femininum / Plural: ''
IPA: ''
Definition: bleiben
Register: ''
Beispielsätze: |-
  Dopo la lezione, vorrei *restare* un po’ in biblioteca.
  Nach der Stunde möchte ich ein bisschen in der Bibliothek *bleiben*.
  
  Se piove, *restiamo* a casa invece di uscire.
  Wenn es regnet, *bleiben* wir zu Hause statt rauszugehen.
  
  Dove hai *restato* ieri sera? Non ti ho visto al ristorante.
  Wo bist du gestern Abend *geblieben*? Ich habe dich im Restaurant nicht gesehen.
  
  *Resteresti* volentieri in questa città se avessi la possibilità?
  *Würdest* du gern in dieser Stadt *bleiben*, wenn du die Möglichkeit hättest?
  
  È importante che tu *resti* concentrato durante l’esame.
  Es ist wichtig, dass du dich während der Prüfung *konzentrierst*.
