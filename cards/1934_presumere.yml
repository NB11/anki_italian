Rang: 1934
Wort: presumere
Wortart: v
Wort mit Artikel: presumere
Femininum / Plural: ''
IPA: ''
Definition: annehmen, vermuten
Register: ''
Beispielsätze: |-
  Non *presumo* nulla senza prove concrete, perché ogni giudizio affrettato è pericoloso.
  Ich *vermute* nichts ohne konkrete Beweise, denn jedes vorschnelle Urteil ist gefährlich.
  
  Se *presumi* che lui sia colpevole, dovresti verificare le sue dichiarazioni prima di accusarlo.
  Wenn du *annahmst*, dass er schuldig ist, solltest du seine Aussagen überprüfen, bevor du ihn beschuldigst.
  
  Nonostante tutto, gli investigatori continuano a *presumere* che il colpevole si nasconda nel reparto abbandonato.
  Trotz allem nehmen die Ermittler weiterhin an, dass sich der Täter in der verlassenen *Abteilung* versteckt.
  
  Avrei *presunto* un finale diverso, ma la realtà supera spesso ogni previsione.
  Ich hätte ein anderes Ende *angenommen*, aber die Realität übertrifft oft jede Vorhersage.
  
  È meglio non *presumere* troppo delle intenzioni altrui, perché la vicenda può riservare sorprese inaspettate.
  Es ist besser, nicht zu viel über die Absichten anderer zu *vermuten*, denn der Vorfall kann unerwartete Überraschungen bereithalten.
