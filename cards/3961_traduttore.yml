Rang: 3961
Wort: traduttore
Wortart: n.m
Wort mit Artikel: il traduttore
Femininum / Plural: traduttori
IPA: ''
Definition: der Übersetzer, -
Register: ''
Beispielsätze: |-
  Il *traduttore* ha lavorato tutta la notte per finire il documento.
  Der *Übersetzer* hat die ganze Nacht gearbeitet, um das Dokument fertigzustellen.
  
  Mi serve un *traduttore* che conosca bene il tedesco e lo spagnolo.
  Ich brauche einen *Übersetzer*, der Deutsch und Spanisch sehr gut beherrscht.
  
  Se non avessi studiato le lingue, non sarei diventato un *traduttore*.
  Wenn ich nicht Sprachen studiert hätte, wäre ich kein *Übersetzer* geworden.
  
  Gli *traduttori* spesso devono risolvere ambiguità nei testi originali.
  Die *Übersetzer* müssen häufig Mehrdeutigkeiten in den Originaltexten klären.
  
  Hai già scelto tra i candidati per il posto di *traduttore* ufficiale?
  Hast du dich schon zwischen den Bewerbern für die Stelle als offizieller *Übersetzer* entschieden?
