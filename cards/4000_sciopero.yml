Wort mit Artikel: lo sciopero
Femininum / Plural: scioperi
IPA: ''
Definition: der Streik, -s
Register: ''
Beispielsätze: |-
  I lavoratori hanno proclamato *scioperi* a tempo indeterminato per protestare contro i licenziamenti.
  Die Arbeiter haben unbegrenzte *Streiks* ausgerufen, um gegen die Entlassungen zu protestieren.
  
  Il sindacato ha minacciato uno *sciopero* generale se le trattative falliranno.
  Die Gewerkschaft hat einen General*streik* angedroht, falls die Verhandlungen scheitern.
  
  Durante *lo sciopero* degli autisti, molti pendolari hanno dovuto camminare per chilometri.
  Während des Fahrer*streiks* mussten viele Pendler kilometerweit zu Fuß gehen.
  
  Hanno indetto *scioperi* a scacchiera per non paralizzare completamente il settore.
  Sie haben *Streiks* nach dem Schachbrettmuster einberufen, um den Sektor nicht vollständig lahmzulegen.
  
  Lo *sciopero* della fame del prigioniero ha attirato l’attenzione dei media internazionali.
  Der Hunger*streik* des Gefangenen hat die Aufmerksamkeit internationaler Medien erregt.
