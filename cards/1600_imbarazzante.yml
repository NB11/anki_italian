Rang: 1600
Wort: imbarazzante
Wortart: adj
Wort mit Artikel: imbarazzante
Femininum / Plural: ''
IPA: ''
Definition: peinlich, unangenehm
Register: ''
Beispielsätze: |-
  È stato *imbarazzante* quando ho fatto un errore davanti a tutti al teatro.
  Es war *peinlich*, als ich einen Fehler vor allen im Theater gemacht habe.
  
  Ho trovato *imbarazzante* che nessuno l’abbia avvisato del ritardo della pizza.
  Ich fand es *peinlich*, dass ihn niemand über die Verspätung der Pizza benachrichtigt hat.
  
  Se avessi saputo che sarebbe stato così *imbarazzante*, non sarei mai andato a quella festa.
  Wenn ich gewusst hätte, dass es so *peinlich* werden würde, wäre ich nie zu der Party gegangen.
  
  La situazione era *imbarazzante*: lui continuava a badare solo alla sua tazza senza dire una parola.
  Die Situation war *unangenehm*: Er passte nur auf seine Tasse auf, ohne ein Wort zu sagen.
  
  È *imbarazzante* che tu non abbia soddisfatto ancora le qualità richieste dal modello lavorativo.
  Es ist *peinlich*, dass du die vom Arbeitsmodell verlangten Qualitäten noch nicht erfüllt hast.
