Rang: 2005
Wort: scienziato
Wortart: n.m
Wort mit Artikel: lo scienziato
Femininum / Plural: gli scienziati
IPA: ''
Definition: der Wissenschaftler, -
Register: ''
Beispielsätze: |-
  Molti *scienziati* lavorano per trovare una cura contro il virus che si è diffuso recentemente.
  Viele *Wissenschaftler* arbeiten daran, ein Heilmittel gegen das Virus zu finden, das sich kürzlich verbreitet hat.
  
  Lo *scienziato* era così assorbito nel suo esperimento che non si accorse del farmaco caduto per terra.
  Der *Wissenschaftler* war so in sein Experiment vertieft, dass er das Medikament bemerkte nicht, das auf den Boden gefallen war.
  
  Se fossi *scienziato*, mi piacerebbe sviluppare nuove tecnologie per aiutare l’ambiente.
  Wenn ich *Wissenschaftler* wäre, würde ich gerne neue Technologien entwickeln, um der Umwelt zu helfen.
  
  Nel laboratorio c’era un *scienziato* che aveva appena completato un esperimento faticoso.
  Im Labor gab es einen *Wissenschaftler*, der soeben ein anstrengendes Experiment abgeschlossen hatte.
  
  Nonostante le circostanze difficili, lo *scienziato* continuò a studiare i dati raccolti.
  Trotz der schwierigen Umstände setzte der *Wissenschaftler* seine Untersuchungen der gesammelten Daten fort.
