Rang: 2929
Wort: circuito
Wortart: n.m
Wort mit Artikel: il circuito
Femininum / Plural: circuiti
IPA: ''
Definition: der Kreislauf, -ä-e
Register: ''
Beispielsätze: |-
  Il *circuito* elettrico della mia casa è stato aggiornato la scorsa settimana.
  Der *Stromkreislauf* in meinem Haus wurde letzte Woche aktualisiert.
  
  Hai già visto il *circuito* di Formula 1 di Monza? È spettacolare!
  Hast du den *Kreislauf* der Formel-1-Rennstrecke von Monza schon gesehen? Er ist atemberaubend!
  
  Senza un *circuito* chiuso non ci sarebbe corrente nel mio esperimento.
  Ohne einen *geschlossenen Kreislauf* gäbe es keinen Strom in meinem Experiment.
  
  Il *circuito* idraulico del bagno perde acqua da giorni, ma nessuno lo ripara.
  Der *hydraulische Kreislauf* im Bad läuft seit Tagen aus, aber niemand repariert ihn.
  
  Se non ripari il *circuito*, l’intero sistema smetterà di funzionare entro domani.
  Wenn du den *Kreislauf* nicht reparierst, wird das ganze System morgen nicht mehr funktionieren.
