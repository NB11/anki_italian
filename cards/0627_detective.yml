Rang: 627
Wort: detective
Wortart: n.m
Wort mit Artikel: il detective
Femininum / Plural: detective
IPA: ''
Definition: der Detektiv, -e
Register: ''
Beispielsätze: |-
  Il *detective* ha risolto il caso dopo una lunga ricerca in quel studio laggiù.
  Der *Detektiv* hat den Fall nach einer langen Forschung in jenem Studio dort unten gelöst.
  
  Nonostante il coraggio, il *detective* temeva ciò che avrebbe trovato in quella posizione pericolosa.
  Trotz des Muts fürchtete der *Detektiv*, was er in jener gefährlichen Position vorfinden würde.
  
  Se avessi saputo della lista, avrei avvertito il *detective* prima che partisse per la base remota.
  Wenn ich von der Liste gewusst hätte, hätte ich den *Detektiv* gewarnt, bevor er zur abgelegenen Basis aufgebrochen ist.
  
  Il *detective* guardò la linea del tempo e contò i dieci giorni mancanti al futuro incerto.
  Der *Detektiv* betrachtete die Linie der Zeit und zählte die zehn fehlenden Tage bis zur unsicheren Zukunft.
  
  È ora che il *detective* si occupi di quella terribile relazione tra gli zii e il soldato scomparso.
  Es ist Zeit, dass sich der *Detektiv* um jene schreckliche Beziehung zwischen den Onkeln und dem verschwundenen Soldaten kümmert.
