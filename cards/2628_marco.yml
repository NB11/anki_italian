Rang: 2628
Wort: marco
Wortart: n.m
Wort mit Artikel: il marco
Femininum / Plural: marcatori
IPA: ''
Definition: der Rahmen, -
Register: ''
Beispielsätze: |-
  Il *marco* di questa porta è molto antico e fatto di legno pregiato.
  Der *Rahmen* dieser Tür ist sehr alt und aus edlem Holz.
  
  Quando ho sbagliato a scrivere, ho immediatamente cancellato il *marco* rosso che il correttore aveva evidenziato.
  Als ich einen Fehler gemacht hatte, habe ich sofort den *roten Rahmen* gelöscht, den die Rechtschreibprüfung markiert hatte.
  
  Nonostante il *marco* dorato sia pesante, riesco a sollevarlo senza problemi.
  Obwohl der *goldene Rahmen* schwer ist, kann ich ihn problemlos anheben.
  
  Nel museo c'era un dipinto famoso con un *marco* moderno che contrastava con lo stile classico dell'opera.
  Im Museum gab es ein berühmtes Gemälde mit einem *modernen Rahmen*, der im Kontrast zum klassischen Stil des Werks stand.
  
  Ho comprato un *marco* per foto che mi hanno regalato per il mio battesimo, anche se non ho ancora trovato la cornice adatta.
  Ich habe einen *Fotorahmen* gekauft, den man mir zur Taufe geschenkt hat, obwohl ich noch keinen passenden Bilderrahmen gefunden habe.
