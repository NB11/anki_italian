Rang: 3540
Wort: indipendente
Wortart: adj
Wort mit Artikel: indipendente
Femininum / Plural: ''
IPA: ''
Definition: unabhängig
Register: ''
Beispielsätze: |-
  Il ragazzo vuole diventare *indipendente* il prima possibile.
  Der Junge will so schnell wie möglich *unabhängig* werden.
  
  Nonostante sia molto giovane, ha già una vita *indipendente* dalla famiglia.
  Trotz seines jungen Alters führt er bereits ein *unabhängiges* Leben von der Familie.
  
  Voleva partire da sola, ma alla fine ha accettato l’aiuto di suo fratello per non sentirsi troppo *indipendente*.
  Sie wollte allein losfahren, aber am Ende akzeptierte sie die Hilfe ihres Bruders, um sich nicht zu *unabhängig* zu fühlen.
  
  Penso che solo una persona *indipendente* possa prendere decisioni così difficili.
  Ich glaube, nur eine *unabhängige* Person kann solche schwierigen Entscheidungen treffen.
  
  Se fossi *indipendente* finanziariamente, viaggerei di più.
  Wenn ich finanziell *unabhängig* wäre, würde ich mehr reisen.
