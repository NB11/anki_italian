Rang: 1193
Wort: procurare
Wortart: v
Wort mit Artikel: procurare
Femininum / Plural: ''
IPA: ''
Definition: besorgen, beschaffen, verursachen, beschaffen
Register: ''
Beispielsätze: |-
  Devo *procurare* un regalo per il compleanno di mia nipote.
  Ich muss ein Geschenk für den Geburtstag meiner Nichte *besorgen*.
  
  Non so come *procurare* i documenti necessari per il visto.
  Ich weiß nicht, wie ich die notwendigen Dokumente für das Visum *beschaffen* soll.
  
  Se non avessi *procurato* quelle informazioni in tempo, avremmo perso la causa.
  Wenn ich diese Informationen nicht rechtzeitig *besorgt* hätte, hätten wir den Prozess verloren.
  
  Stavolta dobbiamo *procurare* una sistemazione vicino al centro, non fuori città.
  Dieses Mal müssen wir eine Unterkunft nahe dem Zentrum *besorgen*, nicht außerhalb der Stadt.
  
  Si dice che il governo voglia *procurare* fondi per le zone colpite dal terremoto.
  Man sagt, die Regierung wolle Gelder für die vom Erdbeben betroffenen Gebiete *beschaffen*.
