Rang: 3894
Wort: sudore
Wortart: n.m
Wort mit Artikel: il sudore
Femininum / Plural: sudori
IPA: ''
Definition: der Schweiß (Singular)
Register: ''
Beispielsätze: |-
  Dopo la corsa, *sudore* gli colava dalla fronte.
  Nach dem Laufen lief *Schweiß* ihm von der Stirn.
  
  Se non usi la crema, potresti avere troppo *sudore* ai piedi.
  Wenn du die *Creme* nicht verwendest, könnte es zu viel Schweiß an den Füßen geben.
  
  L’allenatore disse: "Il *sudore* che vedete oggi sarà la vostra gloria domani."
  Der Trainer sagte: "Der *Schweiß*, den ihr heute seht, wird euer Ruhm morgen sein."
  
  Nonostante l’aria condizionata, il *sudore* mi bagnava la camicia.
  Trotz der Klimaanlage *Schweiß* tränkte mein Hemd.
  
  La donna si asciugava il *sudore* dalla fronte con un fazzoletto di carta.
  Die Frau wischte sich *Schweiß* von der Stirn mit einem Papiertaschentuch.
