Rang: 3982
Wort: precisamente
Wortart: adv
Wort mit Artikel: precisamente
Femininum / Plural: ''
IPA: ''
Definition: genau, präzise
Register: ''
Beispielsätze: |-
  Vuoi sapere *precisamente* quando arriverà il treno?
  Willst du wissen, *wann genau* der Zug ankommt?
  
  Ha insistito che arrivasse *precisamente* alle otto per non perdere il volo.
  Er bestand darauf, dass sie *pünktlich* um acht kam, um den Flug nicht zu verpassen.
  
  Non sono sicuro, ma *precisamente* a quest'ora dovrebbe essere al parco con la sua famiglia.
  Ich bin mir nicht sicher, aber *genau* zu dieser Uhrzeit sollte er mit seiner Familie im Park sein.
  
  Dice che se non segui le istruzioni *precisamente*, il macchinario non funzionerà.
  Er sagt, wenn man die Anweisungen nicht *genauestens* befolgt, funktioniert die Maschine nicht.
  
  È *precisamente* questa la ragione per cui dobbiamo agire subito, prima che sia troppo tardi.
  Genau *das* ist der Grund, warum wir sofort handeln müssen, bevor es zu spät ist.
