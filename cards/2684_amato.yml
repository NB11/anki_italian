Beispielsätze: |-
  La sua canzone *amata* è diventata un successo mondiale.
  Sein *geliebtes* Lied wurde ein Welterfolg.
  
  Anche dopo tanti anni, il loro amore rimane *amato* e forte.
  Auch nach so vielen Jahren bleibt ihre Liebe *geschätzt* und stark.
  
