  Nonostante i problemi, il suo lavoro rimane *amato* dal pubblico.
  Trotz der Probleme bleibt seine Arbeit vom Publikum *geschätzt*.
  
  La *amata* tradizione di Natale è stata mantenuta in famiglia.
  Die *geliebte* Weihnachtsradition wurde in der Familie beibehalten.
