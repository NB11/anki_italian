Rang: 2083
Wort: pallottola
Wortart: n.f
Wort mit Artikel: la pallottola
Femininum / Plural: pallottole
IPA: ''
Definition: die Gewehrkugel, -n
Register: ''
Beispielsätze: |-
  Il cacciatore ha sparato una *pallottola* contro il cervo.
  Der Jäger hat eine *Gewehrkugel* auf den Hirsch abgefeuert.
  
  Durante la guerra hanno trovato molte *pallottole* arrugginite nel terreno.
  Im Krieg haben sie zahlreiche *Gewehrkugeln* im Boden gefunden.
  
  Se senti un colpo di pistola, potrebbe essere una *pallottola* che ha colpito il muro.
  Wenn du einen Pistolenschuss hörst, könnte es eine *Gewehrkugel* sein, die die Wand getroffen hat.
  
  Le *pallottole* moderne sono progettate per penetrare meglio i materiali.
  Moderne *Gewehrkugeln* sind dafür konzipiert, Materialien besser zu durchdringen.
  
  Hanno sparato una *pallottola* in aria per segnalare il pericolo.
  Sie haben eine *Gewehrkugel* in die Luft abgefeuert, um die Gefahr zu signalisieren.
