Rang: 1695
Wort: percento
Wortart: n.m
Wort mit Artikel: il percento
Femininum / Plural: percenti
IPA: ''
Definition: das Prozent, -e
Register: ''
Beispielsätze: |-
  Il *percento* di sconto per i clienti fedeli è del venti percento!
  Der Rabatt*prozentsatz* für treue Kunden beträgt zwanzig Prozent!
  
  Se investi mille euro con un *percento* di interesse del cinque, dopo un anno avrai milletrentacinque euro.
  Wenn du tausend Euro zu einem Zins*prozentsatz* von fünf investierst, hast du nach einem Jahr eintausendfünfunddreißig Euro.
  
  Nonostante l’alta qualità, il *percento* di difetti nel prodotto è stato dell’uno percento.
  Trotz hoher Qualität betrug der Fehler*prozentsatz* bei dem Produkt ein Prozent.
  
  Il governo ha promesso di ridurre del trenta *percento* le tasse per le piccole imprese entro il prossimo anno.
  Die Regierung hat versprochen, die Steuern für kleine Unternehmen innerhalb des nächsten Jahres um dreißig *Prozent* zu senken.
  
  Sebbene molti cittadini temano per il futuro, solo il quindici *percento* degli elettori ha risposto al sondaggio.
  Obwohl viele Bürger sich vor der Zukunft fürchten, haben nur fünfzehn *Prozent* der Wähler die Umfrage beantwortet.
