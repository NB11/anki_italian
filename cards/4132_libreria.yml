Rang: 4132
Wort: libreria
Wortart: n.f
Wort mit Artikel: la libreria
Femininum / Plural: librerie
IPA: ''
Definition: die Buchhandlung, -en
Register: ''
Beispielsätze: |-
  La *libreria* vicino alla stazione vende libri di ogni genere.
  Die *Buchhandlung* in der Nähe des Bahnhofs verkauft Bücher aller Art.
  
  Ho trovato un romanzo antico in una piccola *libreria* di paese.
  Ich habe einen alten Roman in einer kleinen *Buchhandlung* im Dorf gefunden.
  
  Se cerchi libri usati, dovresti andare in quella *libreria* vicino al fiume.
  Wenn du gebrauchte Bücher suchst, solltest du in die *Buchhandlung* in der Nähe des Flusses gehen.
  
  Ha aperto una nuova *libreria* specializzata in libri di viaggio.
  Er/Sie hat eine neue *Buchhandlung* eröffnet, die sich auf Reisebücher spezialisiert.
  
  Nonostante la crisi, la *libreria* ha resistito grazie ai clienti fedeli.
  Trotz der Krise hat die *Buchhandlung* dank treuer Kunden überlebt.
