Beispielsätze: |-
  La *teoria* della relatività di Einstein rivoluzionò la fisica moderna.
  Die *Theorie* der Relativität von Einstein revolutionierte die moderne Physik.
  
  Nonostante le sue convinzioni, quella *teoria* si rivelò del tutto FALSO.
  Trotz seiner Überzeugungen stellte sich diese *Theorie* als völlig falsch heraus.
  
  Si dice che la *teoria* del complotto sia molto diffusa tra i locale di quella zona.
  Man sagt, die *Verschwörungstheorie* sei unter den Einwohnern dieser Gegend weit verbreitet.
  
  Secondo una *teoria* economica, dividere i compiti aumenta l’efficienza del gruppo.
  Laut einer *ökonomischen Theorie* erhöht die Aufteilung der Aufgaben die Effizienz der Gruppe.
  
