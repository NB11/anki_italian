Rang: 4705
Wort: supportare
Wortart: vt
Wort mit Artikel: supportare
Femininum / Plural: ''
IPA: ''
Definition: unterstützen, ertragen
Register: ''
Beispielsätze: |-
  Mia sorella mi *supporta* sempre quando ho bisogno di aiuto.
  Meine Schwester *unterstützt* mich immer, wenn ich Hilfe brauche.
  
  Non riesco più a *supportare* il rumore del traffico ogni mattina.
  Ich *ertrage* den Lärm des Verkehrs jeden Morgen nicht mehr.
  
  Spero che tu *supporti* la mia decisione di cambiare lavoro.
  Ich hoffe, du *unterstützt* meine Entscheidung, den Job zu wechseln.
  
  Lui ha *supportato* la squadra con grande entusiasmo durante la partita.
  Er hat die Mannschaft während des Spiels mit großer Begeisterung *unterstützt*.
  
  Se avessi più tempo, *supporterei* un’associazione benefica.
  Wenn ich mehr Zeit hätte, würde ich eine Wohltätigkeitsorganisation *unterstützen*.
Audio: ''
Notiz: ''
Dispersion: ''
