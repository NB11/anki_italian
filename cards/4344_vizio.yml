Rang: 4344
Wort: vizio
Wortart: n.m
Wort mit Artikel: il vizio
Femininum / Plural: vizi
IPA: ''
Definition: die Sucht, -en, das Laster
Register: ''
Beispielsätze: |-
  Non dovresti assecondare il *vizio* di mangiare troppi dolci tutte le sere.
  Du solltest die *Sucht*, jede Abend zu viele Süßigkeiten zu essen, nicht unterstützen.
  
  Secondo la sua amica, il *vizio* di fumare gli rovinerà la salute.
  Seiner Freundin zufolge wird ihn die *Sucht* zu rauchen die Gesundheit ruinieren.
  
  Era un *vizio* che si era portato dietro sin dall'adolescenza e nessuno era riuscito a farglielo abbandonare.
  Es war eine *Sucht*, die er seit der Adoleszenz mit sich herumtrug, und niemand hatte es geschafft, ihn davon zu befreien.
  
  Se scopri che tuo figlio ha un *vizio* nascosto, cerca di parlarci prima di giudicarlo.
  Wenn du merkst, dass dein Sohn eine verborgene *Sucht* hat, versuche, mit ihm zu reden, bevor du ihn verurteilst.
  
  Il medico gli ha detto che il *vizio* del caffè è meno dannoso di quello delle sigarette.
  Der Arzt hat ihm gesagt, dass die *Sucht* nach Kaffee weniger schädlich ist als die nach Zigaretten.
