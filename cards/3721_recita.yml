Rang: 3721
Wort: recita
Wortart: n.f
Wort mit Artikel: la recita
Femininum / Plural: recite
IPA: ''
Definition: das Theaterstück, -e; die Aufführung, -en
Register: ''
Beispielsätze: |-
  Stasera *recita* una commedia molto divertente al teatro comunale.
  Heute Abend wird eine sehr lustige Komödie *aufgeführt*.
  
  Non vedo l’ora che *reciti* il tuo monologo alla festa di domani.
  Ich kann es kaum erwarten, dass du dein Monolog *darbringst*.
  
  La compagnia teatrale *recita* questa tragedia per la prima volta in Italia.
  Die Theatertruppe *führt* dieses Drama zum ersten Mal in Italien auf.
  
  Dopo che avrai provato per settimane, *reciterai* la parte del protagonista con grande successo.
  Nachdem du wochenlang geprobt hast, wirst du die Hauptrolle mit großem Erfolg *spielen*.
  
  Credo che *reciti* meglio quando sei nervoso, la tua espressione diventa più intensa.
  Ich glaube, dass du besser *spielst*, wenn du nervös bist: dein Gesichtsausdruck wird intensiver.
