Rang: 33
Wort: grazia
Wortart: n.f
Wort mit Artikel: la grazia
Femininum / Plural: grazie
IPA: ''
Definition: die Anmut, die Gnade
Register: ''
Beispielsätze: |-
  La *grazia* del ballerino era evidente durante la performance.
  Die *Anmut* des Tänzers war bei der Aufführung offensichtlich.
  
  Abbiamo ricevuto *grazie* per il nostro aiuto.
  Wir erhielten *Gnade* für unsere Hilfe.
  
  Con *grazie* per il regalo, è molto gentile da parte sua.
  Mit *Dank* für das Geschenk, das ist sehr nett von Ihnen.
  
  Le *grazie* della natura sono infinite.
  Die *Wohltaten* der Natur sind unendlich.
  
  Vorrei ringraziare tutti per la loro *grazia* nel perdonarmi.
  Ich möchte allen für ihre *Gnade* danken, mir vergeben zu haben.
