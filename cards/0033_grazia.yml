Rang: 33
Wort: grazia
Wortart: n.f
Wort mit Artikel: la grazia
Femininum / Plural: grazie
IPA: ''
Definition: die Gnade, die Anmut
Register: ''
Beispielsätze: |-
  La *grazia* di Maria è evidente in ogni suo gesto.
  Die *Anmut* von Maria ist in jeder ihrer Bewegungen offensichtlich.
  
  Chiedono la *grazia* per un detenuto.
  Sie bitten um die *Gnade* für einen Häftling.
  
  Per tua *grazia* ho trovato lavoro!
  Durch deine *Gnade* habe ich eine Arbeit gefunden!
  
  Le *grazie* sono importanti in un ballerino.
  Die *Anmut* ist bei einem Tänzer wichtig.
  
  Spero che Dio conceda la sua *grazia* a noi tutti.
  Ich hoffe, dass Gott uns allen seine *Gnade* schenkt.
