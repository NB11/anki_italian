Rang: 3171
Wort: fagiolo
Wortart: n.m
Wort mit Artikel: il fagiolo
Femininum / Plural: fagioli
IPA: ''
Definition: die Bohne, -n
Register: ''
Beispielsätze: |-
  A cena mangeremo un piatto di *fagioli* bianchi con pancetta affumicata.
  Zum Abendessen werden wir einen Teller mit *Bohnen* und Speck essen.
  
  Non sapevo che la nonna coltivasse così tanti *fagioli* nel suo orto.
  Ich wusste nicht, dass Oma so viele *Bohnen* in ihrem Garten anbaut.
  
  Se non ti piacciono i *fagioli* in umido, posso prepararti una zuppa di lenticchie.
  Wenn dir die *Bohnen* im Eintopf nicht schmecken, kann ich dir eine Linsensuppe kochen.
  
  Ho trovato un *fagiolo* tra i documenti vecchi che stavo buttando via.
  Ich habe eine *Bohne* zwischen den alten Dokumenten gefunden, die ich wegwerfen wollte.
  
  Ė importante cuocere bene i *fagioli* secchi prima di mangiarli, altrimenti possono essere tossici.
  Es ist wichtig, die getrockneten *Bohnen* gut zu kochen, bevor man sie isst, sonst können sie giftig sein.
