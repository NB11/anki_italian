Beispielsätze: |-
  La cultura *occidentale* ha radici antiche e profonde.
  Die *westliche* Kultur hat alte und tiefe Wurzeln.
  
  Molti politici discutono sulle differenze tra valori *occidentali* e orientali.
  Viele Politiker diskutieren über die Unterschiede zwischen *westlichen* und östlichen Werten.
  
  Nonostante le critiche, lui rimane sempre un sostenitore della società *occidentale*.
  Trotz der Kritik bleibt er immer ein Befürworter der *westlichen* Gesellschaft.
  
  Se avessi più tempo, approfondirei la storia delle tradizioni *occidentali*.
  Wenn ich mehr Zeit hätte, würde ich die Geschichte der *westlichen* Traditionen vertiefen.
  
  La sua visione del mondo è fortemente influenzata dalla filosofia *occidentale*.
  Seine Weltsicht wird stark von der *westlichen* Philosophie beeinflusst.
