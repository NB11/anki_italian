Rang: 3174
Wort: generare
Wortart: v
Wort mit Artikel: generare
Femininum / Plural: ''
IPA: ''
Definition: erzeugen, hervorbringen, verursachen
Register: ''
Beispielsätze: |-
  La centrale elettrica *genera* energia per tutta la città.
  Das Kraftwerk *erzeugt* Energie für die ganze Stadt.
  
  Il calore *genera* vapore nello scaldabagno.
  Die Hitze *erzeugt* Dampf in dem Wasserkocher.
  
  Se avessi più tempo, potrei *generare* un business plan migliore.
  Wenn ich mehr Zeit hätte, könnte ich einen besseren Businessplan *erzeugen*.
  
  Gli scienziati temono che questo esperimento possa *generare* un nuovo tipo di batteri pericolosi.
  Die Wissenschaftler befürchten, dass dieses Experiment einen neuen, gefährlichen Bakterientyp *hervorbringen* könnte.
  
  La rabbia che *genera* certi conflitti sociali è spesso difficile da controllare.
  Der Zorn, der solche sozialen Konflikte *verursacht*, lässt sich oft nur schwer kontrollieren.
Audio: ''
