Rang: 3087
Wort: asciugare
Wortart: vt
Wort mit Artikel: asciugare
Femininum / Plural: ''
IPA: ''
Definition: trocken wischen, trocknen
Register: ''
Beispielsätze: |-
  Dopo aver lavato i panni, li devo ancora *asciugare* con l'asciugatrice.
  Nach dem Waschen muss ich sie noch in *trockenen*.
  
  Mentre *asciugava* i capelli, ha finito di prepararsi per la festa.
  Während sie sich die Haare *trocken* wischte, beendete sie die Vorbereitungen für die Party.
  
  Se non *asciugherai* subito quella macchia, rimarrà per sempre sulle tue scarpe nuove.
  Wenn du diesen Fleck nicht sofort *trocknest*, wird er für immer an deinen neuen Schuhen bleiben.
  
  Mi raccomando, *asciuga* bene i bicchieri prima di riporli nella credenza!
  Pass aber auf, trockne die Gläser gut *ab*, bevor du sie in den Schrank räumst!
  
  Avrei voluto aiutarti, ma non sapevo come *asciugare* questa pozzanghera senza uno strofinaccio.
  Ich hätte dir gerne geholfen, aber ich wusste nicht, wie ich diese Pfütze *trocknen* sollte, ohne ein Küchentuch.
