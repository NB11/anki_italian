Beispielsätze: |-
  La musica *spirituale* può essere molto emozionante durante i concerti gospel.
  Die *geistliche* Musik kann bei Gospelkonzerten sehr bewegend sein.
  
  Molte persone cercano un senso *spirituale* nella loro vita quotidiana.
  Viele Menschen suchen einen *spirituellen* Sinn in ihrem Alltag.
  
  Il libro che ho letto tratta di esperienze *spirituali* profondissime.
  Das Buch, das ich gelesen habe, handelt von tiefen *spirituellen* Erfahrungen.
  
  La comunità organizza un ritiro *spirituale* ogni anno in novembre.
  Die Gemeinde veranstaltet jedes Jahr im *November* eine geistliche Auszeit.
  
  Non tutti riconoscono la bellezza di un percorso *spirituale* come questo.
  Nicht alle erkennen die Schönheit eines solchen *spirituellen* Weges an.
