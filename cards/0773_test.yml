Beispielsätze: |-
  Devo prepararmi per il *test* di domani, quindi non posso uscire questa sera.
  Ich muss mich auf den *Test* von morgen vorbereiten, also kann ich heute Abend nicht ausgehen.
  
  Se non superi questo *test*, dovrai ripetere l’anno scolastico.
  Wenn du diesen *Test* nicht bestehst, musst du das Schuljahr wiederholen.
  
