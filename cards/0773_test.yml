  Die Lehrerin hat uns gesagt, dass die *Prüfung* schwieriger als erwartet sein wird.
  
  Si suppone che tu abbia studiato per il *test* di matematica, ma non vedo nessun appunto!
  Man nimmt an, dass du für den *Test* in Mathe gelernt hast, aber ich sehe keine Notizen!
  
  Quando hai ricevuto il risultato del *test*? Speravo in una sorpresa positiva.
