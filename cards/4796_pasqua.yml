Rang: 4796
Wort: pasqua
Wortart: n.f
Wort mit Artikel: la pasqua
Femininum / Plural: pasque
IPA: ''
Definition: das Osterfest
Register: ''
Beispielsätze: |-
  Quest'anno la *Pasqua* cade molto presto, già a marzo.
  Dieses Jahr fällt das *Ostern* sehr früh, bereits im März.
  
  Durante la *Pasqua* molti italiani vanno in vacanza al mare.
  Während des *Osters* fahren viele Italiener ans Meer in den Urlaub.
  
  Se non avessi lavorato, sarei andato in montagna per la *Pasqua*.
  Wenn ich nicht gearbeitet hätte, wäre ich zum *Ostern* in die Berge gefahren.
  
  La *Pasqua* è una festa che celebra la resurrezione di Cristo secondo la tradizione cristiana.
  Das *Ostern* ist ein Fest, das die Auferstehung Christi nach der christlichen Tradition feiert.
  
  Hanno organizzato una grande caccia alle uova proprio per la *Pasqua* dello scorso anno.
  Sie haben eine große Eiersuche genau zu dem *Ostern* des vergangenen Jahres organisiert.
