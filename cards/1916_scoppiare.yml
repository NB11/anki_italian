Rang: 1916
Wort: scoppiare
Wortart: vi
Wort mit Artikel: scoppiare
Femininum / Plural: ''
IPA: ''
Definition: platzen, ausbrechen, losbrechen
Register: ''
Beispielsätze: |-
  Il pallone ha *scoppiato* mentre lo gonfiavo perché era troppo vecchio.
  Der Ballon ist *geplatzt*, während ich ihn aufgepumpt habe, weil er zu alt war.
  
  Temevo che la tensione tra di loro *scoppiasse* in una lite violenta.
  Ich fürchtete, dass die Spannung zwischen ihnen in einen *ausgearteten* Streit umschlägt.
  
  Appena ha sentito la notizia, gli è venuta voglia di *scoppiare* in lacrime.
  Sobald er die Nachricht gehört hatte, packte ihn der Drang, in *Tränen auszubrechen*.
  
  Probabilmente *scoppierà* un temporale nel pomeriggio, secondo le previsioni.
  Wahrscheinlich wird es heute Nachmittag ein *Gewitter* geben, wie es die Vorhersagen andeuten.
  
  Non appena il direttore firmerà il contratto, potremo *scoppiare* in un applauso di sollievo.
  Sobald der Chef den Vertrag unterschreibt, können wir vor Erleichterung in *Beifall ausbrechen*.
