Rang: 3718
Wort: immischiare
Wortart: vi
Wort mit Artikel: immischiare
Femininum / Plural: ''
IPA: ''
Definition: sich einmischen, sich einmischen in
Register: ''
Beispielsätze: |-
  Non *immischiarti* negli affari degli altri, non sta bene.
  Mische dich nicht in die Angelegenheiten *anderer* ein, das gehört sich nicht.
  
  Se non smetti di *immischiarti*, perderai ogni fiducia in te.
  Wenn du nicht aufhörst, dich einzumischen, wirst du jedes Vertrauen in *dich* verlieren.
  
  Lui si è *immischiato* nella discussione senza essere invitato.
  Er hat sich in die Diskussion eingemischt, ohne eingeladen *worden* zu sein.
  
  Non capisco perché ti *immischi* sempre nelle mie decisioni.
  Ich verstehe nicht, warum du dich immer in meine Entscheidungen *einmischst*.
  
  Ti prego, non *immischiarti* nelle cose che non ti riguardano!
  Bitte mische dich nicht in Dinge ein, die dich *nichts angehen*!
