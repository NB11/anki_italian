Rang: 384
Wort: divertire
Wortart: v
Wort mit Artikel: divertire
Femininum / Plural: ''
IPA: ''
Definition: unterhalten, amüsieren
Register: ''
Beispielsätze: |-
  Mi *diverte* molto giocare a calcio con gli amici.
  Es *macht mir* viel Spaß, mit Freunden Fußball zu spielen.
  
  Non *diverti* mai nessuno con le tue battute?
  Unterhältst du niemanden jemals mit deinen Witzen?
  
  Si *è divertito* moltissimo alla festa ieri sera.
  Er *hat sich* gestern Abend auf der Party *sehr amüsiert*.
  
  Vorresti *divertirti* di più durante le vacanze?
  Möchtest du dich im Urlaub *mehr amüsieren*?
  
  Se non *divertirai* i bambini, saranno noiosi.
  Wenn du die Kinder nicht *unterhältst*, werden sie langweilig sein.
