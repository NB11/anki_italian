Wort mit Artikel: divertire
Femininum / Plural: ''
IPA: ''
Definition: unterhalten, amüsieren
Register: ''
Beispielsätze: |-
  Mi *diverte* molto giocare a calcio con gli amici.
  Es *macht mir* viel Spaß, mit Freunden Fußball zu spielen.
  
