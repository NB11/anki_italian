Rang: 57
Wort: saio
Wortart: n.m
Wort mit Artikel: il saio
Femininum / Plural: sai
IPA: ''
Definition: der Mantel, -ä-er
Register: ''
Beispielsätze: |-
  Indosso un *saio* di lana in inverno.
  Ich trage einen *Mantel* aus Wolle im Winter.
  
  I frati indossavano un *saio* semplice.
  Die Mönche trugen einen einfachen *Mantel*.
  
  Che *saio* elegante hai indossato alla festa!
  Was für einen eleganten *Mantel* hast du zur Feier getragen!
  
  Vor anni ho comprato quel *saio* al mercato.
  Vor Jahren habe ich diesen *Mantel* auf dem Markt gekauft.
  
  I *sai* vecchi sono nell'armadio della nonna.
  Die alten *Mäntel* sind im Schrank der Großmutter.
