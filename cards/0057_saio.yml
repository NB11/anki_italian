Rang: 57
Wort: saio
Wortart: n.m
Wort mit Artikel: il saio
Femininum / Plural: sai
IPA: ''
Definition: das Mönchsgewand, -er
Register: ''
Beispielsätze: |-
  Il monaco indossa un *saio* nero durante la cerimonia.
  Der Mönch trägt während der Zeremonie ein *schwarzes Mönchsgewand*.
  
  Nei monasteri medievali i monaci indossavano dei *sai* lunghi e semplici.
  In mittelalterlichen Klöstern trugen die Mönche lange und einfache *Mönchsgewänder*.
  
  Ti piace il colore del *saio* di questo frate?
  Gefällt dir die Farbe des *Mönchsgewandes* dieses Bruders?
  
  Nei dipinti antichi spesso si vedono uomini vestiti con *sai* scuri.
  In alten Gemälden sieht man oft Männer, die dunkle *Mönchsgewänder* tragen.
  
  Il *saio* del priore era più elegante di quelli degli altri monaci.
  Das *Mönchsgewand* des Priors war eleganter als die der anderen Mönche.
