Rang: 1823
Wort: figurare
Wortart: v
Wort mit Artikel: figurare
Femininum / Plural: ''
IPA: ''
Definition: erscheinen, vorkommen, figurieren
Register: ''
Beispielsätze: |-
  Nel romanzo *figurano* molti personaggi storici, ma solo uno è reale.
  In dem Roman kommen viele historische Figuren vor, aber nur eine ist real.
  
  Se *figurerai* nella lista dei vincitori, riceverai un premio.
  Wenn du in der Liste der Gewinner *erscheinen* wirst, erhältst du einen Preis.
  
  Mi sorprende che nella foto non *figuri* il mio cane, anche se era lì!
  Es überrascht mich, dass auf dem Foto mein Hund nicht *vorkommt*, obwohl er dort war!
  
  Il regista ha deciso di *figurare* come attore nel suo ultimo film.
  Der Regisseur hat beschlossen, als Schauspieler in seinem letzten Film zu *erscheinen*.
  
  Nonostante le ricerche, nell'enciclopedia non *figurava* alcuna menzione di quell'inventore.
  Trotz der Recherchen *wurde* in der Enzyklopädie keinerlei Erwähnung dieses Erfinders gefunden.
Audio: ''
Notiz: ''
