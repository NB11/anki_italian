Rang: 2803
Wort: disattivare
Wortart: v
Wort mit Artikel: disattivare
Femininum / Plural: ''
IPA: ''
Definition: deaktivieren, ausschalten
Register: ''
Beispielsätze: |-
  Devi *disattivare* il telefono in aereo per evitare interferenze.
  Du musst das Telefon im Flugzeug *abschalten*, um Störungen zu vermeiden.
  
  Se non *disattivi* l’allarme, la polizia arriverà tra cinque minuti.
  Wenn du den Alarm nicht *deaktivierst*, wird die Polizei in fünf Minuten ankommen.
  
  Stavo per *disattivare* la luce quando ho sentito un rumore strano.
  Ich war dabei, das Licht *auszuschalten*, als ich ein seltsames Geräusch hörte.
  
  Vorrei che tu *disattivassi* la suoneria, è troppo fastidiosa.
  Ich wünschte, du würdest den Klingelton *ausschalten*, er ist zu störend.
  
  Dopo aver *disattivato* il forno, ho aperto la porta per far uscire il calore.
  Nachdem ich den Backofen *abgeschaltet* hatte, öffnete ich die Tür, um die Hitze entweichen zu lassen.
