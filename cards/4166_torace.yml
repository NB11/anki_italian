Rang: 4166
Wort: torace
Wortart: n.m
Wort mit Artikel: il torace
Femininum / Plural: i toraci
IPA: ''
Definition: der Brustkorb, -
Register: ''
Beispielsätze: |-
  Il *torace* di Marco è molto muscoloso dopo gli allenamenti in palestra.
  Die *Brustkorb* von Marco ist nach den Workouts im Gym sehr muskulös.
  
  Durante l’esame medico hanno controllato attentamente il *torace* del paziente.
  Während der ärztlichen Untersuchung haben sie den *Brustkorb* des Patienten genau kontrollato.
  
  Se vuoi proteggere il *torace* dagli urti, indossa una maglia protettiva.
  Wenn du deinen *Brustkorb* vor Stößen schützen willst, trag ein Schutzshirt.
  
  Nonostante la frattura, il *torace* del corridore era ancora stabile e gli permetteva di finire la gara.
  Trotz des Bruchs war der *Brustkorb* des Läufers noch stabil und ermöglichte ihm, das Rennen zu beenden.
  
  Il medico ha detto che un dolore acuto al *torace* può essere segno di problemi cardiaci e deve essere indagato subito.
  Der Arzt sagte, ein stechender Schmerz im *Brustkorb* könne auf Herzprobleme hindeuten und müsse sofort abgeklärt werden.
