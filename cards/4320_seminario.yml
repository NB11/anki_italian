Rang: 4320
Wort: seminario
Wortart: n.m
Wort mit Artikel: il seminario
Femininum / Plural: seminari
IPA: ''
Definition: das Seminar, -e
Register: ''
Beispielsätze: |-
  Oggi tengo un *seminario* sull’intelligenza artificiale al dipartimento di informatica.
  Heute halte ich ein *Seminar* über künstliche Intelligenz an der Informatikfakultät.
  
  Vorresti partecipare al *seminario* di domani sulla letteratura contemporanea?
  Möchtest du an dem *Seminar* morgen über zeitgenössische Literatur teilnehmen?
  
  Il *seminario* di storia romana è stato spostato nella sala B a causa dell’affluenza.
  Das *Seminar* über römische Geschichte wurde wegen des Andrangs in den Saal B verlegt.
  
  Dopo il *seminario* sulla fisica quantistica, discuteremo anche di teppisti che cercano di capire l’argomento.
  Nach dem *Seminar* über Quantenphysik werden wir auch über Rowdys diskutieren, die versuchen, das Thema zu begreifen.
  
  Se avessi frequentato il *seminario* di psicologia, avresti capito meglio le dinamiche del gruppo.
  Hättest du das *Seminar* über Psychologie besucht, hättest du die Gruppendynamik besser verstanden.
