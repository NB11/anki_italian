Rang: 1909
Wort: vicenda
Wortart: n.f
Wort mit Artikel: la vicenda
Femininum / Plural: vicende
IPA: ''
Definition: der Vorfall, -fälle, das Ereignis, -se, die Geschichte, -n
Register: ''
Beispielsätze: |-
  Questa *vicenda* è successa durante il mio viaggio in Giappone.
  Diese *Geschichte* ist während meiner Reise nach Japan passiert.
  
  Non capisco perché si parli sempre della stessa *vicenda* al lavoro.
  Ich verstehe nicht, warum man im Büro immer von derselben *Sache* redet.
  
  La *vicenda* ha coinvolto molti dipendenti del reparto logistica.
  Der *Vorfall* hat viele Mitarbeiter der Logistikabteilung betroffen.
  
  Dopo aver analizzato la *vicenda*, sembra che ci sia stato un disguido.
  Nachdem man die *Ereignisse* analysiert hat, scheint es eine Verwechslung gegeben zu haben.
  
  Mi raccomandano di non raccontare a nessuno questa *vicenda*, è molto delicata.
  Man rät mir, niemandem von diesen *Vorfällen* zu erzählen, sie sind sehr heikel.
