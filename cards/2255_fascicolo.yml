Rang: 2255
Wort: fascicolo
Wortart: n.m
Wort mit Artikel: il fascicolo
Femininum / Plural: i fascicoli
IPA: ''
Definition: die Akte, -n; der Ordner, -
Register: ''
Beispielsätze: |-
  Dovresti archiviare questo *fascicolo* nella cartella blu sulla scrivania.
  Du solltest diese *Akte* in den blauen Ordner auf dem Schreibtisch ablegen.
  
  Nel *fascicolo* del paziente ci sono tutte le analisi cliniche degli ultimi cinque anni.
  In der *Akte* des Patienten sind alle klinischen Analysen der letzten fünf Jahre enthalten.
  
  Non mi hai ancora restituito il *fascicolo* che ti ho prestato settimana scorsa?
  Hast du mir die *Akte*, die ich dir letzte Woche geliehen habe, noch nicht zurückgegeben?
  
  Il professore ha aperto il *fascicolo* e ha iniziato a spiegare i dati raccolti.
  Der Professor hat die *Akte* geöffnet und begann, die gesammelten Daten zu erklären.
  
  Se non trovi quel documento, cerca nel terzo *fascicolo* a sinistra dello scaffale.
  Wenn du dieses Dokument nicht findest, schau im dritten *Ordner* links auf dem Regal nach.
