Rang: 4780
Wort: piega
Wortart: n.f
Wort mit Artikel: la piega
Femininum / Plural: le pieghe
IPA: ''
Definition: die Falte, -n
Register: ''
Beispielsätze: |-
  La camicia ha bisogno di una *piega* sulle spalle perché è troppo larga.
  Das Hemd braucht eine *Falte* an der Schulter, weil es zu groß ist.
  
  Dopo aver stirato la tovaglia, tutte le *pieghe* sono scomparse.
  Nach dem Bügeln des Tischtuchs sind alle *Falten* verschwunden.
  
  Nonostante la *piega* precisa della gonna, non mi piace come sta.
  Trotz der präzisen *Falte* an dem Rock gefällt mir die Art, wie sie sitzt, nicht.
  
  Ha fatto una *piega* troppo marcata nella camicia, sembra stropicciata.
  Er hat eine zu starke *Falte* in das Hemd gebügelt, es sieht zerknittert aus.
  
  La *piega* del lenzuolo sul letto sembra fatta apposta per nascondere un difetto.
  Die *Falte* des Lakens auf dem Bett scheint absichtlich gemacht zu sein, um einen Fehler zu verstecken.
