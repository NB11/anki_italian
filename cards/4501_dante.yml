Rang: 4501
Wort: dante
Wortart: n.m
Wort mit Artikel: il dante
Femininum / Plural: i danti
IPA: ''
Definition: der Dante
Register: ''
Beispielsätze: |-
  Il poeta *Dante* è considerato uno dei più grandi scrittori della lingua italiana.
  Der Dichter *Dante* gilt als einer der größten Schriftsteller der italienischen Sprache.
  
  Ho letto una biografia su *Dante* durante le vacanze estive.
  Ich habe eine Biografie über *Dante* in den Sommerferien gelesen.
  
  Nessuno può negare l’influenza che *Dante* ha avuto sulla letteratura mondiale.
  Niemand kann den Einfluss bestreiten, den *Dante* auf die Weltliteratur hatte.
  
  Nel museo c’era anche una statua di *Dante* con la sua caratteristica corona di alloro.
  Im Museum gab es auch eine Statue von *Dante* mit seinem typischen Lorbeerkranz.
  
  Se studiassi di più, potresti finalmente capire perché *Dante* usava così tante metafore nei suoi versi.
  Wenn du mehr lernen würdest, könntest du endlich verstehen, warum *Dante* so viele Metaphern in seinen Versen verwendete.
