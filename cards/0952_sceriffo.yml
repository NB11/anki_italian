Rang: 952
Wort: sceriffo
Wortart: n.m
Wort mit Artikel: lo sceriffo
Femininum / Plural: sceriffi
IPA: ''
Definition: der Sheriff, -s
Register: ''
Beispielsätze: |-
  Lo *sceriffo* ha arrestato il bandito durante il passaggio di confine.
  Der *Sheriff* hat den Banditen während des Grenzübergangs festgenommen.
  
  Se vuoi lavorare in questo paese, dipendi dall’autorità dello *sceriffo*.
  Wenn du in diesem Land arbeiten willst, *abhängst* du von der Autorität des Sheriffs.
  
  Gli abitanti del paese elogiano la velocità con cui lo *sceriffo* ha risolto il caso grave.
  Die Dorfbewohner loben die Schnelligkeit, mit der der *Sheriff* den ernsten Fall gelöst hat.
  
  In questa città, lo *sceriffo* è rispettato anche dai membri della sinistra.
  In dieser Stadt wird der *Sheriff* sogar von den Linken respektiert.
  
  Lo *sceriffo* preferisce agire da solo, senza bisogno di una riunione di emergenza.
  Der *Sheriff* handelt lieber allein, ohne die Notwendigkeit einer Notbesprechung.
