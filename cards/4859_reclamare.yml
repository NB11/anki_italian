Rang: 4859
Wort: reclamare
Wortart: vt
Wort mit Artikel: reclamare
Femininum / Plural: ''
IPA: ''
Definition: reklamieren, beanstanden, zurückfordern
Register: ''
Beispielsätze: |-
  Se il prodotto è difettoso, puoi *reclamare* il rimborso presso il negozio.
  Wenn das Produkt defekt ist, kannst du die *Rückerstattung* beim Geschäft beanspruchen.
  
  Il cliente *ha reclamato* perché la consegna è arrivata con tre giorni di ritardo.
  Der Kunde *hat reklamiert*, weil die Lieferung drei Tage zu spät angekommen ist.
  
  Nonostante il problema, lui preferisce non *reclamare* e risolvere la situazione in modo amichevole.
  Trotz des Problems *beanstandet* er lieber nicht und löst die Situation auf freundliche Weise.
  
  Dopo aver *reclamato* il rimborso, ho ricevuto una lettera di scuse dalla compagnia.
  Nachdem ich die *Rückerstattung* zurückgefordert hatte, erhielt ich einen Entschuldigungsbrief von der Firma.
  
  Se non puoi *reclamare* i tuoi diritti, chi ti difenderà allora?
  Wenn du deine Rechte nicht *einfordern* kannst, wer wird dich dann verteidigen?
