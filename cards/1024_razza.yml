Rang: 1024
Wort: razza
Wortart: n.f
Wort mit Artikel: la razza
Femininum / Plural: razze
IPA: ''
Definition: die Art, -en, die Rasse, -n
Register: ''
Beispielsätze: |-
  La *razza* di questo cane è molto rara nel nord Europa.
  Die *Art* dieses Hundes ist im Norden Europas sehr selten.
  
  Non capisco perché hai scelto una *razza* così aggressiva per il tuo appartamento.
  Ich verstehe nicht, warum du eine so *aggressive Rasse* für deine Wohnung ausgewählt hast.
  
  Se vuoi un cane da guardia, consulta qualcuno che conosce le varie *razze* disponibili.
  Wenn du einen Wachhund möchtest, solltest du jemanden fragen, der die verschiedenen *Rassen* kennt.
  
  Dicono che la *razza* di questo vino sia coltivata solo in certe regioni francesi, ma non ne sono sicuro.
  Man sagt, dass die *Art* dieses Weins nur in bestimmten französischen Regionen angebaut wird, aber ich bin mir nicht sicher.
  
  La polizia ha catturato un cane di una *razza* particolare, che era fuggito dal suo padrone a Milano.
  Die Polizei hat einen Hund einer *besonderen Rasse* gefangen, der in Mailand seinem Besitzer entlaufen war.
