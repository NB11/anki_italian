Rang: 3554
Wort: aspettativa
Wortart: n.f
Wort mit Artikel: l'aspettativa
Femininum / Plural: aspettative
IPA: ''
Definition: die Erwartung, -en, die Aussicht, -en
Register: ''
Beispielsätze: |-
  L'*aspettativa* di vita in Italia è aumentata negli ultimi decenni.
  Die *Erwartung* an Lebensdauer in Italien ist in den letzten Jahrzehnten gestiegen.
  
  Non ho nessuna *aspettativa* riguardo al risultato dell'esame.
  Ich habe kaum eine *Erwartung* bezüglich des Prüfungsergebnisses.
  
  Le *aspettative* dei genitori verso i figli possono essere troppo alte.
  Die *Aussichten* der Eltern auf ihre Kinder können zu hoch sein.
  
  Secondo te, qual è la tua *aspettativa* di carriera per i prossimi cinque anni?
  Was ist deine *Aussicht* auf die berufliche Laufbahn in den nächsten fünf Jahren, denkst du?
  
  Hanno creato delle *aspettative* che poi non sono state soddisfatte.
  Sie haben *Erwartungen* geweckt, die später nicht erfüllt wurden.
