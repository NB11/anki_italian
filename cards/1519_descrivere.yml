Rang: 1519
Wort: descrivere
Wortart: vt
Wort mit Artikel: descrivere
Femininum / Plural: ''
IPA: ''
Definition: beschreiben, schildern
Register: ''
Beispielsätze: |-
  Il giornalista deve *descrivere* con precisione l’accaduto per il suo articolo.
  Der Journalist muss das Geschehene für seinen Artikel *genau beschreiben*.
  
  Se vuoi sapere come funziona, ti posso *descrivere* passo dopo passo ogni passaggio.
  Wenn du wissen willst, wie es funktioniert, kann ich dir jeden Schritt *genau beschreiben*.
  
  Dopo aver osservato il personaggio per settimane, sono riuscito a *descrivere* il suo comportamento nei minimi dettagli.
  Nachdem ich die Figur wochenlang beobachtet hatte, konnte ich ihr Verhalten bis ins Detail *beschreiben*.
  
  Penso che dovremmo *descrivere* meglio la situazione prima di concludere un accordo con quell’agenzia.
  Ich denke, wir sollten die Situation *besser beschreiben*, bevor wir mit dieser Agentur einen Vertrag abschließen.
  
  Non riesco a *descrivere* la mia rabbia quando ho visto che qualcuno aveva morduto il mio cioccolato gratis!
  Ich kann meine Wut nicht *beschreiben*, als ich sah, dass jemand meine kostenlose Schokolade angebissen hatte!
