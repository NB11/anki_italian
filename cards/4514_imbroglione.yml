Rang: 4514
Wort: imbroglione
Wortart: n.m
Wort mit Artikel: il imbroglione
Femininum / Plural: gli imbroglioni
IPA: ''
Definition: der Betrüger, - / die Betrügerin, -nen
Register: ''
Beispielsätze: |-
  Quell'*imbroglione* è stato denunciato perché ha venduto prodotti falsi al mercato.
  Dieser *Betrüger* wurde angezeigt, weil er gefälschte Produkte auf dem Markt verkauft hat.
  
  Non fidarti di lui, è un vero *imbroglione* che ti ingannerà di sicuro.
  Vertrau ihm nicht, er ist ein echter *Betrüger*, der dich bestimmt betrügen wird.
  
  Gli *imbroglioni* hanno rubato tutti i soldi durante la fiera di arte moderna.
  Die *Betrüger* haben während der Kunstmesse alle Gelder gestohlen.
  
  Se qualcuno ti offre un affare troppo bello per essere vero, probabilmente è un *imbroglione*.
  Wenn dir jemand ein Geschäft anbietet, das zu schön ist, um wahr zu sein, ist es wahrscheinlich ein *Betrüger*.
  
  Hanno arrestato l'*imbroglione* che aveva truffato decine di persone negli ultimi semestri.
  Sie haben den *Betrüger* festgenommen, der in den letzten Halbjahren Dutzende Menschen betrogen hatte.
