Rang: 741
Wort: rimettere
Wortart: v
Wort mit Artikel: rimettere
Femininum / Plural: ''
IPA: ''
Definition: zurückgeben, zurücklegen, wieder anziehen
Register: ''
Beispielsätze: |-
  Devo *rimettere* a posto i libri dopo averli presi in prestito dalla biblioteca.
  Ich muss die Bücher wieder *an ihren Platz zurücklegen*, nachdem ich sie aus der Bibliothek entliehen habe.
  
  Se non ti senti bene, *rimettili* gli occhiali da sole che ti ho prestato.
  Wenn du dich nicht gut fühlst, zieh dir die Sonnenbrille *wieder auf*, die ich dir geliehen habe.
  
  Non è giusto che *rimetta* sempre lui al banco il computer dopo ogni uso.
  Es ist nicht fair, dass er nach jedem Gebrauch den Computer *immer wieder an seinen Platz zurückstellt*.
  
  Ho promesso di *rimettere* le chiavi nella scatola dove le ho trovate, ma le ho perse di nuovo.
  Ich habe versprochen, die Schlüssel *zurück in die Kiste zu legen*, wo ich sie gefunden habe, aber ich habe sie erneut verloren.
  
  Quando tornai a casa, *rimisi* il cappotto nell’armadio e chiamai subito Maria per sapere come stesse suo padre dopo l’attacco.
  Als ich nach Hause zurückkehrte, *legte* ich den Mantel wieder in den Schrank und rief sofort Maria an, um zu erfahren, wie es ihrem Vater nach dem Angriff ging.
