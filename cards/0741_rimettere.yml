Rang: 741
Wort: rimettere
Wortart: vt
Wort mit Artikel: rimettere
Femininum / Plural: ''
IPA: ''
Definition: zurücklegen, wieder hinstellen
Register: ''
Beispielsätze: |-
  Devi *rimettere* il libro sullo scaffale dopo averlo preso.
  Du musst das Buch nach dem Nehmen wieder *auf* das Regal *zurücklegen*.
  
  *Rimetterai* mai la mia penna dove l’ho trovata?
  Wirst du jemals meinen Stift wieder dorthin *zurücklegen*, wo ich ihn gefunden habe?
  
  Ho *rimesso* le chiavi sul tavolo perché non sapevo dove fossero.
  Ich habe die Schlüssel wieder *auf* den Tisch *gelegt*, weil ich nicht wusste, wo sie waren.
  
  Se *rimetti* sempre le scarpe in ordine, non le perderai!
  Wenn du die Schuhe immer wieder *an ihren Platz zurückbringst*, wirst du sie nicht verlieren!
  
  Non mi ricordo dove ho *rimesso* il mio portafoglio…
  Ich erinnere mich nicht mehr, wo ich meinen Geldbeutel *wieder hingelegt* habe…
