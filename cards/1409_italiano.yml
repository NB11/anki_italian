Rang: 1409
Wort: italiano
Wortart: adj
Wort mit Artikel: italiano
Femininum / Plural: ''
IPA: ''
Definition: italienisch, italiensch
Register: ''
Beispielsätze: |-
  Il compleanno di Maria era molto *italiano*: mangiavamo pizza e ascoltavamo canzoni di Eros Ramazzotti.
  Martas Geburtstag war sehr *italienisch*: wir aßen Pizza und hörten Eros Ramazzottis Lieder.
  
  Dopo dieci anni all’estero, finalmente sente di essere tornato a casa in un posto *italiano*.
  Nach zehn Jahren im Ausland fühlt er sich endlich wieder an einem *italienischen* Ort zu Hause.
  
  Anche se vive in Germania, prepara sempre un caffè *italiano* per cominciare la giornata.
  Auch wenn er in Deutschland lebt, bereitet er sich immer einen *italienischen* Kaffee für den Tagesbeginn zu.
  
  La cultura *italiana* è famosa per la sua cucina, l’arte e la moda straordinarie.
  Die *italienische* Kultur ist berühmt für ihre Küche, Kunst und außergewöhnliche Mode.
  
  Nonostante l’inverno, il mercato di Natale a Bolzano aveva un’atmosfera *italiana* con vin brulé e dolci natalizi tipici.
  Trotz des Winters hatte der Weihnachtsmarkt in Bozen eine *italienische* Atmosphäre mit Glühwein und typischen Weihnachtsleckereien.
