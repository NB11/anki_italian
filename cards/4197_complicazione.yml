Rang: 4197
Wort: complicazione
Wortart: n.f
Wort mit Artikel: la complicazione
Femininum / Plural: complicazioni
IPA: ''
Definition: die Komplikation, -en
Register: ''
Beispielsätze: |-
  A causa di una *complicazione* imprevista il progetto è stato rinviato di due settimane.
  Aufgrund einer unerwarteten *Komplikation* wurde das Projekt um zwei Wochen verschoben.
  
  Nonostante le *complicazioni* durante il viaggio, siamo riusciti ad arrivare a destinazione in tempo.
  Trotz der *Komplikationen* auf der Reise sind wir pünktlich am Ziel angekommen.
  
  Se ci fossero delle *complicazioni* nella procedura, dovresti immediatamente avvisare la direzione.
  Falls es *Komplikationen* im Verfahren gibt, solltest du sofort die Leitung informieren.
  
  La *complicazione* principale era che non avevamo ancora ricevuto i documenti necessari per partire.
  Die Haupt*komplikation* war, dass wir die notwendigen Dokumente für die Abreise noch nicht erhalten hatten.
  
  Chiunque affronti questa operazione deve essere preparato a eventuali *complicazioni* che potrebbero verificarsi.
  Wer sich dieser Operation unterzieht, muss auf mögliche *Komplikationen* vorbereitet sein.
