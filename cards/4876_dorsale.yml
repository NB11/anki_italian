IPA: ''
Definition: Rücken-, dorsal
Register: ''
Beispielsätze: |-
  La parte *dorsale* della mano è spesso più chiara del palmo.
  Der *rückwärtige* Teil der Hand ist oft heller als die Handfläche.
  
  Il medico mi ha spiegato che la colonna *dorsale* sostiene tutto il peso della schiena.
  Der Arzt hat mir erklärt, dass die *Wirbelsäule* das ganze Gewicht des Rückens trägt.
  
  Se avverti dolore nella zona *dorsale*, potresti avere un problema ai reni.
  Wenn du Schmerzen in der *Rücken*-Region spürst, könnte es ein Problem mit den Nieren sein.
  
  Lo squalo martello ha una pinna *dorsale* molto particolare.
  Der Hammerhai hat eine sehr spezielle *Rückenflosse*.
  
  Dopo l’incidente, gli hanno fatto una radiografia per controllare le vertebre *dorsali*.
  Nach dem Unfall haben sie ihm ein Röntgenbild gemacht, um die *Brustwirbel* zu überprüfen.
