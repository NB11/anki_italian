Rang: 4140
Wort: forbice
Wortart: n.f
Wort mit Artikel: la forbice
Femininum / Plural: forbici
IPA: ''
Definition: die Schere, -n
Register: ''
Beispielsätze: |-
  Non riesco a trovare *le forbici* per tagliare questo foglio.
  Ich kann *die Schere* nicht finden, um dieses Blatt zu schneiden.
  
  Con *una forbice* ben affilata tagliamo il cartone senza sforzo.
  Mit *einer scharfen Schere* schneiden wir den Karton mühelos.
  
  Se avessi *le forbici* giuste, potrei modificare il disegno in modo preciso.
  Hätte ich *die richtige Schere*, könnte ich die Zeichnung exakt anpassen.
  
  Dove hai messo *la forbice* che avevamo usato ieri sera per le decorazioni?
  Wohin hast du *die Schere* gesteckt, die wir gestern Abend für die Dekorationen benutzt haben?
  
  Quando la *forbice* non taglia bene, è meglio cambiarla perché diventa pericolosa.
  Wenn *die Schere* nicht gut schneidet, sollte man sie wechseln, denn sie wird gefährlich.
