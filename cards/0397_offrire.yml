Femininum / Plural: ''
IPA: ''
Definition: anbieten, offerieren
Register: ''
Beispielsätze: |-
  Ti *offro* il mio posto.
  Ich *biete* dir meinen Platz *an*.
  
  Ieri ci ha *offerto* un caffè.
  Gestern hat er uns einen Kaffee *angeboten*.
  
  *Offriresti* anche a me questo favore?
  Würdest du mir diesen Dienst *anbieten*?
  
  Mi ha *offerto* un regalo.
  Sie hat mir ein Geschenk *offeriert*.
  
  Dice che può *offrirci* una soluzione.
  Er sagt, dass er uns eine Lösung *anbieten* kann.
