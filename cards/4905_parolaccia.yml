Rang: 4905
Wort: parolaccia
Wortart: n.f
Wort mit Artikel: la parolaccia
Femininum / Plural: parolacce
IPA: ''
Definition: der Fluch, Flüche
Register: ''
Beispielsätze: |-
  Non dire *parolacce* davanti ai bambini, per favore!
  Sag bitte keine *Flüche* vor den Kindern!
  
  Quando ha ricevuto la multa, il tassista ha urlato una *parolaccia* che ha fatto arrossire persino il poliziotto.
  Als der Taxifahrer die Strafe bekam, fluchte er so laut, dass sogar der Polizist errötete.
  
  Se avessi saputo che sarebbe finita così, avrei evitato qualsiasi *parolaccia* inutile.
  Wenn ich gewusst hätte, wie es endet, hätte ich jeden unnötigen *Fluch* vermieden.
  
  Nel suo discorso, il politico ha usato parole rispettose anche se alcuni gli hanno rimproverato qualche *parolaccia* passata.
  In seiner Rede gebrauchte der Politiker respektvolle Worte, obwohl ihm manche frühere *Flüche* vorgeworfen hatten.
  
  Mio nonno diceva sempre che chi dice *parolacce* ha un vocabolario poverino e poche idee.
  Mein Großvater pflegte stets zu sagen, wer *flucht*, habe ein mageres Vokabular und wenig Ideen.
