Rang: 329
Wort: spiegare
Wortart: vt
Wort mit Artikel: spiegare
Femininum / Plural: ''
IPA: ''
Definition: erklären, erklären
Register: ''
Beispielsätze: |-
  Devi *spiegare* di nuovo perché sei arrivato in ritardo.
  Du musst *erklären*, warum du zu spät gekommen bist.
  
  Mi *ha spiegato* la lezione con molta pazienza.
  Sie hat mir die Lektion mit viel Geduld *erklärt*.
  
  *Spiega* sempre tutto con esempi concreti.
  Er *erklärt* alles immer mit konkreten Beispielen.
  
  Vorrei che qualcuno mi *spiegasse* questo problema matematico.
  Ich würde mir wünschen, dass mir jemand dieses Matheproblem *erklärt*.
  
  Avrebbero dovuto *spiegare* le regole del gioco prima di iniziare.
  Sie hätten die Spielregeln *erklären* sollen, bevor sie angefangen haben.
