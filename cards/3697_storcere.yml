Rang: 3697
Wort: storcere
Wortart: v
Wort mit Artikel: storcere
Femininum / Plural: ''
IPA: ''
Definition: verdrehen, verzerren
Register: ''
Beispielsätze: |-
  Mi fa male la schiena e devo *storcere* il busto ogni volta che mi chino.
  Mir tut der Rücken weh und ich muss *mich* verdrehen, jedes Mal wenn ich mich bücke.
  
  Se *storcerai* troppo la bocca, nessuno ti prenderà sul serio!
  Wenn du *deinen* Mund zu sehr verziehst, nimmt dich niemand ernst!
  
  Dicono che lui abbia *storto* i fatti per sembrare innocente.
  Sie sagen, er habe *die* Tatsachen verdreht, um unschuldig zu wirken.
  
  Bisognava *storcere* il collo per vedere oltre la siepe alta.
  Man musste *sich* verrenken, um über den hohen Zaun zu schauen.
  
  Lei è così brava a *storcere* le labbra che sembra abbia sempre un segreto.
  Sie ist so gut darin, *ihre* Lippen zu verziehen, als hätte sie immer ein Geheimnis.
