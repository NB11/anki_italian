Rang: 2074
Wort: equipaggio
Wortart: n.m
Wort mit Artikel: l'equipaggio
Femininum / Plural: gli equipaggi
IPA: ''
Definition: die Besatzung, -en
Register: ''
Beispielsätze: |-
  L'*equipaggio* della nave ha lavorato senza sosta per giorni.
  Die *Besatzung* des Schiffes arbeitete tagelang ohne Pause.
  
  Non appena l'*equipaggio* fu pronto, il capitano diede ordine di salpare.
  Sobald die *Besatzung* bereit war, gab der Kapitän den Befehl zum Auslaufen.
  
  Se l'*equipaggio* fosse stato più numeroso, il viaggio sarebbe stato meno impegnativo.
  Wenn die *Besatzung* zahlreicher gewesen wäre, hätte die Reise weniger anspruchsvoll ausgesehen.
  
  L'*equipaggio*, composto da esperti marinai, riuscì a superare la tempesta.
  Die *Besatzung*, bestehend aus erfahrenen Seeleuten, schaffte es, den Sturm zu überstehen.
  
  È necessario che l'*equipaggio* segua scrupolosamente le procedure di sicurezza.
  Es ist nötig, dass die *Besatzung* die Sicherheitsverfahren penibel befolgt.
