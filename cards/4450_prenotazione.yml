Rang: 4450
Wort: prenotazione
Wortart: n.f
Wort mit Artikel: la prenotazione
Femininum / Plural: prenotazioni
IPA: ''
Definition: die Reservierung, -en
Register: ''
Beispielsätze: |-
  Ho fatto *prenotazione* per un tavolo al ristorante alle 20:00.
  Ich habe eine *Reservierung* für einen Tisch im Restaurant um 20:00 Uhr gemacht.
  
  La *prenotazione* per il volo è già stata confermata dal personale.
  Die *Reservierung* für den Flug ist bereits vom Personal bestätigt worden.
  
  Se non avessi la *prenotazione*, non potrei entrare all’evento esclusivo.
  Wenn ich keine *Reservierung* hätte, könnte ich nicht zur exklusiven Veranstaltung kommen.
  
  Ha perso la *prenotazione* quando il sistema ha avuto un guasto improvviso.
  Er hat die *Reservierung* verloren, als das System plötzlich einen Defekt hatte.
  
  Vorrei sapere se esiste la possibilità di annullare *prenotazione* senza penale.
  Ich würde gerne wissen, ob es die Möglichkeit gibt, die *Reservierung* ohne Strafe zu stornieren.
