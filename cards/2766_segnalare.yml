Rang: 2766
Wort: segnalare
Wortart: vt
Wort mit Artikel: segnalare
Femininum / Plural: ''
IPA: ''
Definition: melden, anzeigen, hinweisen
Register: ''
Beispielsätze: |-
  Se *segnalano* un guasto alla linea ferroviaria, la circolazione viene interrotta immediatamente.
  Man *meldet* einen Schaden an der Bahnstrecke, dann wird der Verkehr sofort unterbrochen.
  
  Il custode ha *segnalato* la violazione delle norme di sicurezza nel cortile della scuola.
  Der Hausmeister hat die *Verletzung* der Sicherheitsvorschriften im Hof der Schule gemeldet.
  
  Ti consiglio di *segnalare* qualunque inquietante rumore che senti di notte nel tuo appartamento.
  Ich rate dir, jedes *beunruhigende* Geräusch, das du nachts in deiner Wohnung hörst, zu melden.
  
  Se *segnalasse* il problema prima, adesso non avremmo questa situazione complicata.
  Wenn er das Problem früher *gemeldet hätte*, hätten wir jetzt keine so komplizierte Situation.
  
  La polizia ha *segnalato* che tre drogati sono stati espulsi dalla galleria vicino alla stazione centrale.
  Die Polizei hat *gemeldet*, dass drei Drogenabhängige aus dem Tunnel nahe dem Hauptbahnhof entfernt wurden.
