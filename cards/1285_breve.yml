  Da die Zeit *kurz* war, entschieden wir uns, einen schnellen Kaffee zu trinken.
  
  Lei è orgogliosa della sua *breve* carriera, ma vorrebbe migliorare ancora.
  Sie ist stolz auf ihre *kurze* Karriere, möchte sich aber noch verbessern.
  
  Se il viaggio è *breve*, preferisco camminare invece di prendere l'auto.
  Wenn die Reise *kurz* ist, laufe ich lieber, statt das Auto zu nehmen.
  
  Nonostante fosse ubriaco, ricordava ogni *breve* istante di quella notte.
