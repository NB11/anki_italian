Rang: 1778
Wort: perdono
Wortart: n.m
Wort mit Artikel: il perdono
Femininum / Plural: i perdoni
IPA: ''
Definition: die Vergebung, die Verzeihung
Register: ''
Beispielsätze: |-
  Ti chiedo *perdono* per il ritardo, ma il traffico era impossibile.
  Ich bitte dich um *Vergebung* für die Verspätung, aber der Verkehr war unmöglich.
  
  Dopo anni di odio, decise finalmente di concedere *perdono* al suo nemico.
  Nach Jahren des Hasses beschloss er schließlich, seinem Feind *Verzeihung* zu gewähren.
  
  Che *perdono* può esserci per un simile atto di crudeltà?
  Welche *Vergebung* kann es für eine solche Grausamkeit geben?
  
  Il sacerdote ascoltò la sua confessione e gli diede *perdono*.
  Der Priester hörte seine Beichte und schenkte ihm *Vergebung*.
  
  Non meritava il tuo *perdono*, ma te l’ho concesso lo stesso.
  Er verdiente deine *Verzeihung* nicht, aber ich habe sie dir trotzdem gewährt.
