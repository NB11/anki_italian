Rang: 4866
Wort: gradino
Wortart: n.m
Wort mit Artikel: il gradino
Femininum / Plural: gradini
IPA: ''
Definition: die Stufe, -n
Register: ''
Beispielsätze: |-
  Saliamo *gradino* per gradino fino al terzo piano senza ascensore.
  Wir steigen *Stufe für Stufe* bis in die dritte Etage ohne Aufzug hinauf.
  
  Il *gradino* rotto del balcone rappresentava un pericolo per i bambini.
  Die *defekte Stufe* auf dem Balkon stellte eine Gefahr für die Kinder dar.
  
  Se salirai un *gradino* alla volta, arriverai in cima senza fatica.
  Wenn du *Stufe um Stufe* hinaufgehst, wirst du oben ankommen, ohne dich anzustrengen.
  
  Ha perso l’equilibrio proprio sull’ultimo *gradino* delle scale mobili.
  Er verlor genau auf der *letzten Stufe* der Rolltreppe das Gleichgewicht.
  
  Mi sono accorto solo ora che manca un *gradino* sull’ingresso posteriore della villa.
  Ich habe erst jetzt gemerkt, dass *eine Stufe* am Hintereingang der Villa fehlt.
