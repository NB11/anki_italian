Rang: 1911
Wort: incarico
Wortart: n.m
Wort mit Artikel: l'incarico
Femininum / Plural: incarichi
IPA: ''
Definition: der Auftrag, -träge
Register: ''
Beispielsätze: |-
  Il direttore gli ha affidato un *incarico* molto importante per il progetto europeo.
  Der Direktor hat ihm einen *Auftrag* für das europäische Projekt anvertraut.
  
  Senza un *incarico* formale non posso procedere con le modifiche al codice.
  Ohne einen *formellen Auftrag* kann ich die Änderungen am Code nicht durchführen.
  
  Mi hanno dato l’*incarico* di organizzare la conferenza internazionale a Milano.
  Sie haben mir den *Auftrag* gegeben, die internationale Konferenz in Mailand zu organisieren.
  
  Se avessi ricevuto prima l’*incarico*, avrei avuto più tempo per preparare la presentazione.
  Hätte ich den *Auftrag* früher erhalten, hätte ich mehr Zeit gehabt, die Präsentation vorzubereiten.
  
  L’*incarico* che hai ricevuto sembra davvero complesso, ma sono sicuro che ce la farai!
  Der *Auftrag*, den du erhalten hast, scheint wirklich komplex zu sein, aber ich bin sicher, du schaffst das!
