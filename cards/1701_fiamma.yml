Rang: 1701
Wort: fiamma
Wortart: n.f
Wort mit Artikel: la fiamma
Femininum / Plural: fiamme
IPA: ''
Definition: die Flamme, -n
Register: ''
Beispielsätze: |-
  La *fiamma* del camino riscaldava tutta la stanza.
  Die *Flamme* des Kamins wärmte den ganzen Raum.
  
  Hanno spento la *fiamma* della candela prima di uscire.
  Sie haben die *Flamme* der Kerze gelöscht, bevor sie gingen.
  
  Nonostante il vento, la *fiamma* non si è spenta.
  Trotz des Windes erlosch die *Flamme* nicht.
  
  Vorresti accendere la *fiamma* sotto la pentola?
  Möchtest du die *Flamme* unter dem Topf anzünden?
  
  La *fiamma* dell'amore non si è mai spenta in loro.
  Die *Flamme* der Liebe erlosch nie in ihnen.
