Rang: 1290
Wort: maestà
Wortart: n.f
Wort mit Artikel: la maestà
Femininum / Plural: maestà
IPA: ''
Definition: die Majestät, Erhabenheit, Würde
Register: ''
Beispielsätze: |-
  La *maestà* di questo dipinto è impressionante e rende ogni visita al museo un’esperienza unica.
  Die *Erhabenheit* dieses Gemäldes ist beeindruckend und macht jeden Besuch im Museum zu einem einzigartigen Erlebnis.
  
  In questa zona rurale la *maestà* della natura si mostra soprattutto nelle albe e nei tramonti.
  In dieser ländlichen Gegend zeigt sich die *Erhabenheit* der Natur besonders bei Sonnenauf- und untergängen.
  
  Il re ha ricevuto la *maestà* con grande rispetto e ha ascoltato attentamente i suoi consigli.
  Der König hat die *Majestät* mit großem Respekt empfangen und ihre Ratschläge aufmerksam angehört.
  
  Nonostante le difficoltà, la *maestà* del suo carattere non è mai venuta meno.
  Trotz der Schwierigkeiten ist die *Würde* seines Charakters nie geschwunden.
  
  La *maestà* del palazzo reale attira ogni anno migliaia di turisti da tutto il mondo.
  Die *Erhabenheit* des königlichen Palastes zieht jedes Jahr Tausende Touristen aus aller Welt an.
