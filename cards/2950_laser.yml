Beispielsätze: |-
  La tecnologia moderna usa spesso il *laser* per tagliare i metalli con precisione.
  Die moderne Technologie verwendet oft den *Laser*, um Metalle mit Präzision zu schneiden.
  
  Se vuoi rimuovere un tatuaggio, il medico può consigliare un trattamento con il *laser*.
  Wenn Sie ein Tattoo entfernen möchten, kann Ihnen der Arzt eine *Laser*-Behandlung empfehlen.
  
  Nel laboratorio abbiamo osservato come il *laser* influenzi la velocità di alcune reazioni chimiche.
  Im Labor haben wir beobachtet, wie der *Laser* die Geschwindigkeit einiger chemischer Reaktionen beeinflusst.
  
  Non tutti sanno che esistono diversi tipi di *laser*, ognuno adatto a scopi specifici.
  Nicht jeder weiß, dass es verschiedene Arten von *Lasern* gibt, von denen jede für spezifische Zwecke geeignet ist.
  
  Appena entrati nel negozio di elettronica, il venditore ci ha mostrato un dispositivo che emette un debole *laser* rosso.
  Sobald wir den Elektronikladen betraten, zeigte uns der Verkäufer ein Gerät, das einen schwachen roten *Laser* aussendet.
