Rang: 1633
Wort: funzione
Wortart: n.f
Wort mit Artikel: la funzione
Femininum / Plural: funzioni
IPA: ''
Definition: die Funktion, -en
Register: ''
Beispielsätze: |-
  La *funzione* di questo pulsante è spegnere il computer immediatamente.
  Die *Funktion* dieser Taste ist, den Computer sofort auszuschalten.
  
  Nonostante l’errore, la *funzione* principale del programma funziona ancora.
  Trotz des Fehlers arbeitet die *Funktion* des Programms immer noch.
  
  Mi domando quale sarà la *funzione* di questo dispositivo strano che ho trovato in magazzino.
  Ich frage mich, was die *Funktion* dieses seltsamen Geräts ist, das ich im Lager gefunden habe.
  
  Se non conosci la *funzione* di ogni tasto, rischi di premere quello sbagliato ed eseguire un comando indesiderato.
  Wenn du die *Funktion* jeder Taste nicht kennst, riskierst du, die falsche zu drücken und einen unerwünschten Befehl auszuführen.
  
  Secondo l’analisi del prete, la *funzione* dei simboli sulla tomba indica una benedizione speciale per chi lì vi è sepolto.
  Laut der *Analyse* des Priesters deutet die Funktion der Symbole auf dem Grab auf einen besonderen Segen für die dort Bestatteten hin.
