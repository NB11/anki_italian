Rang: 2903
Wort: ansia
Wortart: n.f
Wort mit Artikel: l'ansia
Femininum / Plural: ansie
IPA: ''
Definition: die Angst, -¨e
Register: ''
Beispielsätze: |-
  Ho sempre provato un po' *ansia* prima di ogni esame importante.
  Ich habe immer ein bisschen *Angst* vor jeder wichtigen Prüfung gehabt.
  
  Nonostante l'*ansia* crescente, riuscì a mantenere la calma.
  Trotz der wachsenden *Angst* gelang es ihm, ruhig zu bleiben.
  
  Se avessi saputo che sarebbe finita male, avrei evitato di *ansia* così tanto.
  Wenn ich gewusst hätte, dass es schlecht enden würde, hätte ich so viel *Angst* vermieden.
  
  Era l'*ansia* che lo spingeva a lavorare così duramente ogni giorno.
  Es war die *Angst*, die ihn dazu trieb, jeden Tag so hart zu arbeiten.
  
  Pensa che una piccola *ansia* possa essere perfino utile.
  Er denkt, dass ein bisschen *Angst* sogar nützlich sein kann.
