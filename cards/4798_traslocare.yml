Rang: 4798
Wort: traslocare
Wortart: v
Wort mit Artikel: traslocare
Femininum / Plural: ''
IPA: ''
Definition: umziehen, umsiedeln
Register: ''
Beispielsätze: |-
  Dopo dieci anni nel *traslocare*, finalmente abbiamo trovato una casa che ci piace.
  Nach zehn Jahren des *Umziehens* haben wir endlich ein Haus gefunden, das uns gefällt.
  
  Se *traslocassi* a Milano, dovrei imparare l’italiano molto in fretta!
  Wenn ich nach Mailand *umziehen* würde, müsste ich schnell Italienisch lernen!
  
  La ditta che ci ha aiutato a *traslocare* era molto professionale, ma anche cara.
  Die Firma, die uns beim *Umziehen* geholfen hat, war sehr professionell, aber auch teuer.
  
  Non appena finirò l’università, penso di *traslocare* in un’altra città per lavoro.
  Sobald ich mein Studium beendet habe, möchte ich in eine andere Stadt zum Arbeiten *umziehen*.
  
  Era così difficile *traslocare* che alla fine abbiamo chiamato degli amici per aiutarci.
  Es war so schwierig, dass wir am Ende Freunde um Hilfe gebeten haben, um *umzuziehen*.
