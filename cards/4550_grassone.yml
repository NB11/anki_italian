Rang: 4550
Wort: grassone
Wortart: n.m
Wort mit Artikel: il grassone
Femininum / Plural: i grassoni
IPA: ''
Definition: der Fettklumpen, -
Register: ''
Beispielsätze: |-
  Mio nonno ha trovato un *grassone* di formaggio nel frigorifero.
  Mein Großvater hat im Kühlschrank einen Fettklumpen Käse gefunden.
  
  Non mangiare quel *grassone*, potrebbe essere andato a male!
  Iss diesen Fettklumpen nicht, der könnte verdorben sein!
  
  Avrei voluto assaggiare il dolce, ma era pieno di *grassoni* di panna montata.
  Ich hätte gern den Kuchen probiert, aber er war voller Fettklumpen Schlagsahne.
  
  Ha comprato un etto di burro e si è accorto che conteneva dei *grassoni* duri.
  Er hat ein Pfund Butter gekauft und bemerkt, dass sie harte Fettklumpen enthielt.
  
  Ti assicuro che nel latte non ci sono *grassoni*: è solo scremato!
  Ich versichere dir, dass in der Milch keine Fettklumpen sind: Sie ist nur entrahmt!
