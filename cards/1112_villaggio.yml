Rang: 1112
Wort: villaggio
Wortart: n.m
Wort mit Artikel: il villaggio
Femininum / Plural: villaggi
IPA: ''
Definition: das Dorf, -¨er
Register: ''
Beispielsätze: |-
  Il *villaggio* era così piccolo che aveva solo una piazza centrale.
  Das *Dorf* war so klein, dass es nur einen zentralen Platz hatte.
  
  Durante le vacanze, abbiamo visitato un *villaggio* di pescatori sulla costa.
  Im Urlaub haben wir ein Fischer*dorf* an der Küste besucht.
  
  Credi che il direttore voglia costruire un nuovo ospedale nel nostro *villaggio*?
  Glaubst du, dass der Direktor ein neues Krankenhaus in unserem Dorf errichten will?
  
  Il maestro ha spiegato agli studenti che il *villaggio* era stato fondato secoli fa.
  Der Lehrer hat den Schülern erklärt, dass das Dorf vor Jahrhunderten gegründet worden war.
  
  Persino la radio locale ha parlato del *villaggio* misterioso in cui nessuno vive più.
  Sogar der lokale Radiosender hat über das mysteriöse Dorf berichtet, in dem niemand mehr wohnt.
