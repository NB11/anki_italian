Rang: 376
Wort: lontano
Wortart: adj
Wort mit Artikel: lontano
Femininum / Plural: lontani (m.), lontane (f.)
IPA: ''
Definition: fern, weit
Register: ''
Beispielsätze: |-
  Roma è *lontana* da Berlino.
  Rom ist *weit* von Berlin entfernt.
  
  Vorrei una casa più *lontana* dal centro.
  Ich möchte ein Haus weiter *weg* vom Zentrum.
  
  Ieri ho visto un treno *lontanissimo*.
  Gestern habe ich einen *extrem* weit entfernten Zug gesehen.
  
  Non andare così *lontano*, per favore!
  Gehe bitte nicht so *weit* weg!
  
  Spero che i miei genitori siano ancora *lontani*.
  Ich hoffe, dass meine Eltern noch weit weg sind.
