Rang: 187
Wort: mandare
Wortart: vt
Wort mit Artikel: mandare
Femininum / Plural: ''
IPA: ''
Definition: schicken, senden, senden
Register: ''
Beispielsätze: |-
  Voglio *mandare* questa lettera alla nonna.
  Ich möchte diesen *Brief* an die Oma *schicken*.
  
  Gli hanno *mandato* un messaggio molto chiaro.
  Sie haben ihm eine sehr klare *Nachricht* *gesendet*.
  
  Perché non *mandi* un’e-mail a Marco per chiedergli scusa?
  Warum *schickst* du Marco nicht eine *E-Mail*, um dich zu entschuldigen?
  
  Se avessi tempo, ti *manderei* dei fiori ogni settimana.
  Wenn ich Zeit hätte, würde ich dir jede Woche *Blumen schicken*.
  
  Hanno *mandato* gli inviti a tutti gli amici per la festa.
  Sie haben die *Einladungen* an alle Freunde zur Party *geschickt*.
