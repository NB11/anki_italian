Rang: 4551
Wort: fondamento
Wortart: n.m
Wort mit Artikel: il fondamento
Femininum / Plural: fondamenti
IPA: ''
Definition: das Fundament, die Grundlage
Register: ''
Beispielsätze: |-
  Il *fondamento* della nostra amicizia è la fiducia reciproca.
  Das *Fundament* unserer Freundschaft ist das gegenseitige Vertrauen.
  
  Senza un *fondamento* solido, nessun edificio può resistere alle intemperie.
  Ohne ein *solides Fundament* kann kein Gebäude den Unwettern standhalten.
  
  I filosofi cercano da secoli di definire i *fondamenti* della morale umana.
  Philosophen versuchen seit Jahrhunderten, die *Grundlagen* der menschlichen Moral zu definieren.
  
  Le leggi della fisica sono *fondamenti* imprescindibili per ogni scienziato.
  Die Gesetze der Physik sind *unverzichtbare Grundlagen* für jeden Wissenschaftler.
  
  Anche se talvolta sembra traballante, il *fondamento* del nostro progetto rimane intatto.
  Auch wenn er manchmal wackelig erscheint, bleibt das *Fundament* unseres Projekts unversehrt.
