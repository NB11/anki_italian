Rang: 2399
Wort: destinare
Wortart: vt
Wort mit Artikel: destinare
Femininum / Plural: ''
IPA: ''
Definition: bestimmen, zuweisen, widmen
Register: ''
Beispielsätze: |-
  Il governo *destina* fondi per la cultura ogni anno.
  Die Regierung *widmet* jedes Jahr Gelder der Kultur.
  
  Vorresti sapere a chi hanno *destinato* la stanza degli ospiti?
  Möchtest du wissen, wem sie das Gästezimmer *zugewiesen* haben?
  
  Nonostante le preoccupazioni, hanno *destinato* tempo alla famiglia.
  Trotz der *Sorgen* haben sie sich Zeit für die Familie genommen.
  
  Se avessi più soldi, *destinerei* tutto alla ricerca scientifica.
  Wenn ich mehr Geld hätte, würde ich alles der wissenschaftlichen Forschung *widmen*.
  
  I soldati *destinati* alla missione sono stati istruiti per settimane.
  Die für die Mission *bestimmten* Soldaten wurden wochenlang ausgebildet.
