Rang: 1618
Wort: partner
Wortart: n.m
Wort mit Artikel: il partner
Femininum / Plural: partner
IPA: ''
Definition: der Partner, -
Register: ''
Beispielsätze: |-
  Il *partner* commerciale ci ha aiutato a risolvere la crisi economica.
  Der *Geschäftspartner* hat uns geholfen, die wirtschaftliche Krise zu lösen.
  
  Non ho ancora incontrato il mio nuovo *partner* di stanza alla scrivania accanto alla finestra.
  Ich habe meinen neuen *Mitbewohner* an dem Schreibtisch neben dem Fenster noch nicht getroffen.
  
  Se il *partner* non avesse reagito in tempo, sarebbe stato un vero disastro!
  Wenn der *Partner* nicht rechtzeitig reagiert hätte, wäre es eine echte Katastrophe gewesen!
  
  Chi credi che sia il *partner* ideale per un viaggio in bosco? Uno che non ha paura del buio?
  Wer, glaubst du, ist der ideale *Begleiter* für einen Ausflug in den Wald? Einer, der sich vor der Dunkelheit nicht fürchtet?
  
  Dicono che il *partner* di Luca sia un noto prete russo, ma io non l’ho mai visto in chiesa.
  Man sagt, dass der *Partner* von Luca ein bekannter russischer Priester ist, aber ich habe ihn noch nie in der Kirche gesehen.
