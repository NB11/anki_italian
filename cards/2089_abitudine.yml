Femininum / Plural: abitudini
IPA: ''
Definition: die Gewohnheit, -en
Register: ''
Beispielsätze: |-
  L'*abitudine* di bere un caffè al mattino è molto diffusa in Italia.
  Die *Gewohnheit*, morgens einen Kaffee zu trinken, ist in Italien weit verbreitet.
  
  Aveva l'*abitudine* di leggere un capitolo prima di dormire ogni sera.
  Er hatte die *Gewohnheit*, jeden Abend vor dem Schlafengehen ein Kapitel zu lesen.
  
  Non vorrei perdere l'*abitudine* di fare sport regolarmente.
  Ich möchte die *Gewohnheit*, regelmäßig Sport zu treiben, nicht verlieren.
  
  È un'*abitudine* che si tramanda da generazioni nella mia famiglia.
  Es ist eine *Gewohnheit*, die sich in meiner Familie seit Generationen überliefert.
  
  Se cambiassi la tua *abitudine*, potresti ottenere risultati migliori.
  Wenn du deine *Gewohnheit* ändern würdest, könntest du bessere Ergebnisse erzielen.
