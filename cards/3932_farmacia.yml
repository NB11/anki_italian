Rang: 3932
Wort: farmacia
Wortart: n.f
Wort mit Artikel: la farmacia
Femininum / Plural: farmacie
IPA: ''
Definition: die Apotheke, -n
Register: ''
Beispielsätze: |-
  Ho bisogno di andare alla *farmacia* per comprare delle medicine.
  Ich muss zur *Apotheke* gehen, um Medikamente zu kaufen.
  
  Domani aprirà una nuova *farmacia* vicino alla stazione.
  Morgen wird in der Nähe des Bahnhofs eine neue *Apotheke* eröffnet.
  
  Se hai mal di testa, chiedi in *farmacia* un analgesico.
  Wenn du Kopfschmerzen hast, frag in der *Apotheke* nach einem Schmerzmittel.
  
  La *farmacia* del quartiere offre anche consulenza medica gratuita.
  Die *Apotheke* im Viertel bietet auch kostenlose medizinische Beratung an.
  
  Nonostante la pioggia, la *farmacia* era ancora affollata di clienti.
  Trotz des Regens war die *Apotheke* immer noch voll mit Kunden.
