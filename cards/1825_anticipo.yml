Rang: 1825
Wort: anticipo
Wortart: n.m
Wort mit Artikel: l'anticipo
Femininum / Plural: anticipi
IPA: ''
Definition: die Vorauszahlung, der Vorschuss
Register: ''
Beispielsätze: |-
  Ho fatto un *anticipo* di duecento euro per prenotare la camera.
  Ich habe eine *Vorauszahlung* von zweihundert Euro geleistet, um das Zimmer zu reservieren.
  
  Se chiedi un *anticipo* sullo stipendio, dimmi subito!
  Wenn du einen *Vorschuss* auf das Gehalt brauchst, sag es mir sofort!
  
  Aveva già ricevuto un *anticipo* sulla sua eredità.
  Er hatte schon einen *Vorschuss* auf sein Erbe erhalten.
  
  Non mi piacciono gli *anticipi* senza garanzie.
  Ich mag keine *Vorauszahlungen* ohne Sicherheiten.
  
  Senza un *anticipo* non posso iniziare il lavoro.
  Ohne einen *Vorschuss* kann ich die Arbeit nicht beginnen.
