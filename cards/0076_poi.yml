Rang: 76
Wort: poi
Wortart: adv
Wort mit Artikel: poi
Femininum / Plural: ''
IPA: ''
Definition: dann, danach, später
Register: ''
Beispielsätze: |-
  Dopo aver finito i compiti, *poi* andrò al parco.
  Nachdem ich die Hausaufgaben beendet habe, werde ich *dann* in den Park gehen.
  
  Abbiamo visitato Roma e *poi* siamo andati a Firenze.
  Wir haben Rom besucht und *dann* sind wir nach Florenz gefahren.
  
  Puoi chiamarmi *poi* stasera, se vuoi.
  Du kannst mich *später* heute Abend anrufen, wenn du möchtest.
  
  Ho perso il treno, quindi *poi* ho dovuto aspettare quello successivo.
  Ich habe den Zug verpasst, deshalb musste ich *dann* auf den nächsten warten.
  
  Prima di mangiare, lavati le mani; *poi* sarà tutto pronto.
  Bevor du isst, wasche dir die Hände; *danach* ist alles fertig.
