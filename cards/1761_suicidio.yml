Rang: 1761
Wort: suicidio
Wortart: n.m
Wort mit Artikel: il suicidio
Femininum / Plural: suicidi
IPA: ''
Definition: der Selbstmord, -e
Register: ''
Beispielsätze: |-
  Dopo l'ultima *suicidio* nella scuola, è stato necessario rafforzare la sorveglianza.
  Nach dem letzten *Selbstmord* in der Schule war es nötig, die Überwachung zu verstärken.
  
  Si dice che l'*suicidio* non sia mai la soluzione, ma molti non riescono a vedere alternative.
  Man sagt, der *Selbstmord* sei niemals die Lösung, aber viele können keine Alternativen erkennen.
  
  Il medico ha testimoniato che il paziente era in una fase critica dopo aver tentato il *suicidio*.
  Der Arzt hat bezeugt, dass der Patient sich in einer kritischen *Phase* befand, nachdem er den Selbstmord versucht hatte.
  
  Spero che nessuno sia spinto a compiere un *suicidio* per colpa di un fallimento.
  Ich hoffe, dass niemand dazu getrieben wird, wegen eines Scheiterns einen *Selbstmord* zu begehen.
  
  L'*suicidio* di mio zio ha lasciato un vuoto che non si riempirà mai.
  Der *Selbstmord* meines Onkels hat eine Lücke hinterlassen, die nie gefüllt werden wird.
