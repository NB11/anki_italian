Rang: 514
Wort: tagliare
Wortart: vt
Wort mit Artikel: tagliare
Femininum / Plural: ''
IPA: ''
Definition: schneiden, zuschneiden
Register: ''
Beispielsätze: |-
  Devo *tagliare* la carta per il progetto.
  Ich muss das Papier für das Projekt *schneiden*.
  
  Lui *taglierebbe* il pane se avesse un coltello affilato.
  Er würde das Brot *schneiden*, wenn er ein scharfes Messer hätte.
  
  Hai già *tagliato* le verdure per la zuppa?
  Hast du das Gemüse für die Suppe schon *geschnitten*?
  
  Sarebbe meglio se *tagliassi* la torta in parti uguali.
  Es wäre besser, wenn du den Kuchen in gleiche Teile *schneidest*.
  
  Non *taglierò* i capelli finché non saranno abbastanza lunghi.
  Ich werde mir die Haare nicht *schneiden*, bis sie lang genug sind.
