Rang: 514
Wort: tagliare
Wortart: vt
Wort mit Artikel: tagliare
Femininum / Plural: ''
IPA: ''
Definition: schneiden, zerschneiden, hacken
Register: ''
Beispielsätze: |-
  Devi *tagliare* la pizza in otto fette uguali per tutti.
  Du musst die Pizza in acht gleiche Stücke *schneiden* für alle.
  
  Mio nonno ha *tagliato* il bosco per creare un sentiero nuovo.
  Mein Opa hat den Wald *gerodet*, um einen neuen Weg zu schaffen.
  
  Se non hai un coltello, non puoi *tagliare* questo pane duro!
  Wenn du kein Messer hast, kannst du dieses harte Brot nicht *schneiden*!
  
  Mi dispiace, ma non riesco a *tagliare* questa carne: è troppo cruda.
  Tut mir leid, aber ich kann dieses Fleisch nicht *schneiden* – es ist zu roh.
  
  Il cuoco ha spiegato agli apprendisti come *tagliare* le verdure correttamente.
  Der Koch hat den Lehrlingen gezeigt, wie man Gemüse *schneidet*.
Audio: ''
Notiz: ''
Dispersion: ''
