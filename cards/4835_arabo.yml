Beispielsätze: |-
  La cultura *araba* è molto affascinante e ricca di tradizioni antiche.
  Die *arabische* Kultur ist sehr faszinierend und reich an alten Traditionen.
  
  Mio zio ha sposato una donna *araba* e ora vivono insieme a Dubai.
  Mein Onkel hat eine *arabische* Frau geheiratet und jetzt leben sie zusammen in Dubai.
  
  Ho letto un libro che spiega l’influenza *araba* nella matematica moderna.
  Ich habe ein Buch gelesen, das den *arabischen* Einfluss auf die moderne Mathematik erklärt.
  
  Nonostante le differenze, la signora Alì si sente perfettamente *araba* anche se vive da trent’anni in Italia.
  Trotz der Unterschiede fühlt sich Frau Alì trotzdem perfekt *arabisch*, obwohl sie seit dreißig Jahren in Italien lebt.
  
  Gli studenti hanno discusso animatamente se l’architettura *araba* sia più bella di quella europea.
  Die Schüler haben hitzig diskutiert, ob die *arabische* Architektur schöner ist als die europäische.
