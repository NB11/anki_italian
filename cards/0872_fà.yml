Rang: 872
Wort: fà
Wortart: v
Wort mit Artikel: fà
Femininum / Plural: ''
IPA: ''
Definition: machen, tun
Register: ''
Beispielsätze: |-
  Cosa *fà* il colonnello per gestire il progetto?
  Was *macht* der Oberst, um das Projekt zu führen?
  
  Se non ti *fà* piacere, dimmelo pure, non c'è problema.
  Wenn es dir nicht *gefällt*, sag es mir ruhig, das ist überhaupt kein Problem.
  
  Mi hanno detto che lui *fa* sempre tutto da solo, ma non è vero.
  Man hat mir gesagt, dass er immer alles allein *macht*, aber das stimmt nicht.
  
  Vorrei sapere perché non mi *fa* avere un segnale chiaro.
  Ich würde gerne wissen, warum er mir kein klares Signal *macht*.
  
  Dunque, *faceva* finta di non accorgersi della differenza tra noi due.
  Also *tat* er so, als würde er den Unterschied zwischen uns beiden nicht bemerken.
