Rang: 830
Wort: progetto
Wortart: n.m
Wort mit Artikel: il progetto
Femininum / Plural: progetti
IPA: ''
Definition: das Projekt, -e
Register: ''
Beispielsätze: |-
  Il *progetto* di costruire una nuova chiesa è molto ambizioso.
  Das *Projekt*, eine neue Kirche zu bauen, ist sehr ehrgeizig.
  
  Stamattina il giudice ha discusso con l’ex nemico del *progetto* di pace.
  Heute Morgen hat der Richter mit dem *Ex*-Feind über das Friedensprojekt diskutiert.
  
  La società ha presentato un *progetto* per trasformare il mare in un parco privato.
  Die Gesellschaft hat ein *Projekt* vorgestellt, um das Meer in einen privaten Park zu verwandeln.
  
  Se non finiamo in tempo il *progetto*, perderemo la speranza di ottenere finanziamenti.
  Wenn wir das *Progetto* nicht rechtzeitig abschließen, verlieren wir die Hoffnung auf Finanzierung.
  
  L’assassino ha detto che nessun *progetto* al mondo può cambiare il suo destino di dannazione.
  Der Mörder sagte, dass kein *Projekt* auf der Welt sein Schicksal des Fluchs ändern könne.
