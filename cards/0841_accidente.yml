Rang: 841
Wort: accidente
Wortart: n.m
Wort mit Artikel: lo accidente
Femininum / Plural: gli incidenti
IPA: ''
Definition: der Unfall, -¨e, die Panne, -n
Register: ''
Beispielsätze: |-
  Lo *incidente* è avvenuto stamattina vicino alla stazione.
  Der *Unfall* ist heute Morgen in der Nähe des Bahnhofs passiert.
  
  Il colonnello ha riferito che non ci sono stati *incidenti* durante la missione.
  Der Oberst hat berichtet, dass es während der Mission keine *Unfälle* gegeben hat.
  
  Nonostante il cambio di programma, nessun *incidente* ha rovinato la nostra libertà.
  Trotz der Programmänderung hat kein *Unfall* unsere Freiheit zerstört.
  
  Se avessi guidato più piano, forse non ci sarebbe stato questo *incidente* con il pesce sul tetto della macchina.
  Wenn ich langsamer gefahren wäre, hätte es vielleicht diesen *Unfall* mit dem Fisch auf dem Autodach nicht gegeben.
  
  Il giudice ha detto che lo *incidente* è stato causato da un segnale stradale poco visibile.
  Der Richter hat gesagt, dass der *Unfall* durch ein schlecht sichtbares Signal verursacht wurde.
