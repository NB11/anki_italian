Rang: 575
Wort: laggiù
Wortart: adv
Wort mit Artikel: laggiù
Femininum / Plural: ''
IPA: ''
Definition: da unten, dort unten
Register: ''
Beispielsätze: |-
  Vedi quel *laggiù*? È il mio cane che sta giocando con il suo pallone.
  Siehst du den da unten? Es ist mein Hund, der mit seinem Ball spielt.
  
  Non andare *laggiù*, perché c'è ancora molto guaio dopo l'incidente di ieri.
  Geh nicht dorthin, denn dort ist noch viel Ärger nach dem Vorfall von gestern.
  
  Se scommettere è quello che vuoi, allora guarda *laggiù* e punta sul cavallo nero.
  Wenn du wetten willst, dann schau da unten und setz auf das schwarze Pferd.
  
  Dopo la ripresa della programma, incontreremo i nostri amici proprio *laggiù* vicino al braccio della statua.
  Nach der Wiederaufnahme des Programms werden wir unsere Freunde genau dort unten nahe dem Arm der Statue treffen.
  
  Non *considerare* la cattivo situazione laggiù come un fallimento, ma piuttosto come un'opportunità per risolvere tutto finalmente.
  Betrachte die schlechte Situation da unten nicht als Scheitern, sondern eher als eine Chance, alles endlich zu lösen.
