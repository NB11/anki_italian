Rang: 575
Wort: laggiù
Wortart: adv
Wort mit Artikel: laggiù
Femininum / Plural: ''
IPA: ''
Definition: da unten, dort unten
Register: ''
Beispielsätze: |-
  Guarda *laggiù*, c'è un cane che gioca con una palla!
  Schau *da unten*, da spielt ein Hund mit einem Ball!
  
  Non vedo nulla quaggiù, ma *laggiù* forse c'è qualcosa.
  Ich sehe hier unten nichts, aber *dort unten* vielleicht etwas.
  
  *Laggiù* dove stiamo andando, ci sono molti alberi.
  Dort unten, wo wir hingehen, gibt es viele Bäume.
  
  Dimmi cosa vedi *laggiù* vicino al fiume.
  Sag mir, was du *dort unten* am Fluss siehst.
  
  Se continui a camminare verso *laggiù*, troverai la risposta.
  Wenn du weiter in Richtung *da unten* gehst, wirst du die Antwort finden.
