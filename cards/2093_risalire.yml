Rang: 2093
Wort: risalire
Wortart: v
Wort mit Artikel: risalire
Femininum / Plural: ''
IPA: ''
Definition: wieder hinaufsteigen, zurückgehen zu
Register: ''
Beispielsätze: |-
  Le temperature hanno iniziato a *risalire* dopo settimane di freddo intenso.
  Die Temperaturen begannen nach wochenlanger Kälte wieder *anzusteigen*.
  
  Vuoi *risalire* all’origine di questo problema?
  Möchtest du die *Ursache* dieses Problems wieder aufdecken?
  
  Dopo la pausa, gli studenti hanno dovuto *risalire* in classe senza fare rumore.
  Nach der Pause mussten die Schüler leise wieder *in* den Klassenraum zurückkehren.
  
  Se non *risaliamo* al vero colpevole, questa situazione non si risolverà mai.
  Wenn wir nicht den wahren *Täter* wieder entdecken, wird sich diese Situation nie lösen.
  
  I prezzi degli immobili hanno continuato a *risalire* anche durante la crisi economica.
  Die Immobilienpreise sind sogar während der Wirtschaftskrise weiter *angestiegen*.
