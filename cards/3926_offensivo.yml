Rang: 3926
Wort: offensivo
Wortart: adj
Wort mit Artikel: offensivo
Femininum / Plural: ''
IPA: ''
Definition: beleidigend, provozierend, verletzend
Register: ''
Beispielsätze: |-
  Non dire cose *offensive* agli altri, altrimenti i tuoi amici si offenderanno!
  Sag keine *beleidigenden* Dinge zu anderen, sonst werden sich deine Freunde beleidigt fühlen!
  
  Quell’articolo di giornale è stato considerato *offensivo* dalla comunità LGBTQ+.
  Jener Zeitungsartikel wurde von der LGBTQ+-Community als *beleidigend* empfunden.
  
  Se continui con quel tono, potresti risultare *offensivo* senza volerlo.
  Wenn du in diesem Ton weitermachst, könntest du ungewollt *verletzend* wirken.
  
  Ho ricevuto una recensione *offensiva* sul mio romanzo da parte di un lettore scontento.
  Ich habe eine *verletzende* Rezension meines Romans von einem unzufriedenen Leser erhalten.
  
  La polizia ha arrestato un uomo perché aveva usato parole *offensive* durante una manifestazione.
  Die Polizei hat einen Mann festgenommen, weil er während einer Demonstration *beleidigende* Worte gebraucht hatte.
