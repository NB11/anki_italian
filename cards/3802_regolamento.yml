Rang: 3802
Wort: regolamento
Wortart: n.m
Wort mit Artikel: il regolamento
Femininum / Plural: regolamenti
IPA: ''
Definition: die Vorschrift, -en
Register: ''
Beispielsätze: |-
  Secondo il *regolamento* della scuola, gli studenti devono indossare l'uniforme.
  Laut der *Vorschrift* der Schule müssen die Schüler die Uniform tragen.
  
  Il nuovo *regolamento* sulla privacy entrerà in vigore il prossimo mese.
  Die neue *Vorschrift* zum Datenschutz tritt nächsten Monat in Kraft.
  
  Nonostante il *regolamento* vieti l'uso del telefono in classe, molti lo fanno lo stesso.
  Obwohl die *Vorschrift* die Handynutzung im Unterricht verbietet, tun es viele trotzdem.
  
  Se non rispetti il *regolamento*, rischi sanzioni disciplinari.
  Wenn du die *Vorschrift* nicht befolgst, riskierst du disziplinarische Maßnahmen.
  
  Il *regolamento* interno dell'azienda è stato aggiornato recentemente per migliorare l'efficienza.
  Die interne *Vorschrift* des Unternehmens wurde kürzlich aktualisiert, um die Effizienz zu steigern.
