Rang: 563
Wort: semplicemente
Wortart: adv
Wort mit Artikel: semplicemente
Femininum / Plural: ''
IPA: ''
Definition: einfach, bloß, nur
Register: ''
Beispielsätze: |-
  Ho *semplicemente* detto la verità senza pensare alle conseguenze.
  Ich habe *einfach* die Wahrheit gesagt, ohne an die Folgen zu denken.
  
  La tua risposta è *semplicemente* sbagliata, non c'è altra spiegazione.
  Deine *Antwort* ist einfach falsch, es gibt keine andere Erklärung.
  
  Se *semplicemente* tagliassi il pane in modo più regolare, starebbe meglio nel cestino.
  Wenn du das Brot *einfach* gleichmäßiger schneidest, würde es besser in den Korb passen.
  
  Dice che tutto è *semplicemente* una questione di tempo, ma io non ci credo.
  Er sagt, dass alles *einfach* eine Frage der Zeit ist, aber ich glaube ihm nicht.
  
  Non ho fretta, posso sistemare questo guaio *semplicemente* sistemando ogni dettaglio con calma.
  Ich habe keine *Eile*, ich kann dieses Problem einfach lösen, indem ich jedes Detail in Ruhe ordne.
