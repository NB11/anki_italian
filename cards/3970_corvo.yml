Rang: 3970
Wort: corvo
Wortart: n.m
Wort mit Artikel: il corvo
Femininum / Plural: corvi
IPA: ''
Definition: der Rabe, -n
Register: ''
Beispielsätze: |-
  Ho visto un *corvo* nero sul davanzale della finestra stamattina.
  Ich habe heute Morgen einen *Raben* auf der Fensterbank gesehen.
  
  Il *corvo* gracchia rumorosamente disturbando la quiete del giardino.
  Der *Rabe* krächzt so laut, dass er die Ruhe im Garten stört.
  
  Se non avessi spaventato il *corvo*, sarebbe ancora qui a beccare le briciole.
  Wenn ich den *Raben* nicht erschreckt hätte, wäre er noch hier und würde die Krümel picken.
  
  Mi hanno detto che il *corvo* sulla torre è considerato un segno di sfortuna.
  Man hat mir erzählt, dass der *Rabe* auf dem Turm als Unglückszeichen gilt.
  
  Non appena il *corvo* si è posato sul tetto, il cane ha iniziato ad abbaiare senza sosta.
  Sobald sich der *Rabe* auf das Dach gesetzt hat, hat der Hund ohne Unterlass zu bellen begonnen.
