Rang: 3309
Wort: filare
Wortart: v
Wort mit Artikel: filare
Femininum / Plural: ''
IPA: ''
Definition: in einer Reihe laufen, hintereinandergehen
Register: ''
Beispielsätze: |-
  I ragazzi *filano* uno dietro l’altro per entrare in classe senza fare caos.
  Die Schüler *laufen* einer hinter dem anderen, um ohne Chaos in den Klassenraum zu kommen.
  
  Dopo il film, la gente cominciò a *filare* verso l’uscita.
  Nach dem Film begannen die Leute *in Richtung* Ausgang zu laufen.
  
  Se avessimo *filato* più in fretta, avremmo perso il treno.
  Wenn wir schneller *gelaufen* wären, hätten wir den Zug verpasst.
  
  Dicono che il serpente abbia iniziato a *filare* verso il bosco.
  Man sagt, die Schlange habe begonnen, *in Richtung* Wald zu laufen.
  
  Nonostante il dolore, riuscì a *filare* fino all’infermeria.
  Trotz des Schmerzes schaffte er es, bis zum Krankenzimmer zu *laufen*.
Audio: ''
Notiz: ''
Dispersion: ''
