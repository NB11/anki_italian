Rang: 4463
Wort: aggeggio
Wortart: n.m
Wort mit Artikel: il aggeggio
Femininum / Plural: gli aggeggi
IPA: ''
Definition: die Vorrichtung, -en, das Ding, -e
Register: ''
Beispielsätze: |-
  Non so proprio a cosa serva questo *aggeggio* nella mia cucina.
  Ich weiß einfach nicht, wozu diese *Vorrichtung* in meiner Küche dienen soll.
  
  Ho trovato un *aggeggio* strano mentre stavo riordinando il garage.
  Ich habe ein seltsames *Ding* gefunden, während ich die Garage aufgeräumt habe.
  
  L’*aggeggio* che hai comprato sembra uscito da un film di fantascienza.
  Die *Vorrichtung*, die du gekauft hast, sieht aus wie aus einem Science-Fiction-Film.
  
  Non toccare quell’*aggeggio*! Potrebbe essere pericoloso.
  Fass das *Ding* nicht an! Es könnte gefährlich sein.
  
  L’ingegnere ha spiegato come funziona ogni singolo *aggeggio* nella fabbrica.
  Der Ingenieur hat erklärt, wie jedes einzelne *Ding* in der Fabrik funktioniert.
