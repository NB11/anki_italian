Rang: 1040
Wort: informare
Wortart: vt
Wort mit Artikel: informare
Femininum / Plural: ''
IPA: ''
Definition: informieren, benachrichtigen, mitteilen
Register: ''
Beispielsätze: |-
  Ti prego di *informare* la polizia immediatamente non appena avrai visto l’accaduto.
  Ich bitte dich, die Polizei sofort zu *informieren*, sobald du das Geschehene gesehen hast.
  
  Quando ho visitato quella isola, ho cercato di *informare* gli abitanti sui pericoli che impediscono la cattura dei pesci.
  Als ich diese Insel besuchte, versuchte ich, die Bewohner über die Gefahren zu *informieren*, die das Fangen der Fische verhindern.
  
  Non vorrei *informare* il tuo padrone del fatto che hai mollato il lavoro senza dare preavviso, ma devo farlo.
  Ich möchte deinen Herrn nicht davon *informieren*, dass du die Arbeit ohne Vorwarnung verlassen hast, aber ich muss es tun.
  
  Spero che tu riesca a *informare* i tuoi colleghi della faccenda prima che arrivi il nuovo direttore, così non ci disturbano.
  Ich hoffe, dass du es schaffst, deine Kollegen über die Angelegenheit zu *informieren*, bevor der neue Direktor eintrifft, damit sie uns nicht stören.
  
  Se avessi saputo che volevi studiare arte, ti avrei *informato* prima che la regina avesse chiuso il suo colloquio con la direttrice della scuola.
  Hätte ich gewusst, dass du Kunst studieren wolltest, hätte ich dich *informiert*, bevor die Königin ihr Gespräch mit der Schulleiterin beendet hatte.
