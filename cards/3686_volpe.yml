Rang: 3686
Wort: volpe
Wortart: n.m
Wort mit Artikel: la volpe
Femininum / Plural: volpi
IPA: ''
Definition: der Fuchs, Füchse
Register: ''
Beispielsätze: |-
  La *volpe* rossa attraversò il bosco al tramonto.
  Der *Fuchs* lief durch den Wald bei Sonnenuntergang.
  
  Non ho mai visto una *volpe* così intelligente come quella nel documentario.
  Ich habe noch nie einen so klugen *Fuchs* wie den im Dokumentarfilm gesehen.
  
  Se incontrassi una *volpe* nel parco, la osserverei da lontano senza disturbare.
  Wenn ich einem *Fuchs* im Park begegnete, würde ich ihn aus der Ferne beobachten, ohne ihn zu stören.
  
  Mi hanno detto che la *volpe* ha rubato un pollo nel pollaio del vicino.
  Man hat mir erzählt, dass der *Fuchs* ein Huhn aus dem Hühnerstall des Nachbarn gestohlen hat.
  
  Anche se la *volpe* sembra furba, alcuni cacciatori la rispettano per la sua astuzia.
  Obwohl der *Fuchs* schlau wirkt, respektieren ihn manche Jäger für seine List.
