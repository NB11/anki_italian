Rang: 2508
Wort: vena
Wortart: n.f
Wort mit Artikel: la vena
Femininum / Plural: vene
IPA: ''
Definition: die Ader, -n
Register: ''
Beispielsätze: |-
  Il medico ha prelevato il sangue da una *vena* del braccio.
  Der Arzt hat aus einer *Ader* am Arm Blut abgenommen.
  
  Nonostante la ferita, la *vena* non sanguinava più.
  Trotz der Wunde blutete die *Ader* nicht mehr.
  
  In *vena* c’era un coagulo che minacciava di bloccare la circolazione.
  In der *Ader* befand sich ein Gerinnsel, das die Durchblutung bedrohte.
  
  Se avessi saputo che eri così *sensibile*, non avrei parlato di quel tema.
  Wenn ich gewusst hätte, dass du so *empfindsam* bist, hätte ich dieses Thema nicht angesprochen.
  
  I ricercatori hanno scoperto che questa *vena* contiene un ormone sconosciuto.
  Die Forscher haben herausgefunden, dass diese *Ader* ein unbekanntes Hormon enthält.
