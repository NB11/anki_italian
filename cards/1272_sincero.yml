Rang: 1272
Wort: sincero
Wortart: adj
Wort mit Artikel: sincero
Femininum / Plural: ''
IPA: ''
Definition: ehrlich, aufrichtig
Register: ''
Beispielsätze: |-
  Sei sempre *sincero* con i tuoi amici, anche quando le notizie non sono positive.
  Sei immer *ehrlich* zu deinen Freunden, auch wenn die Nachrichten nicht positiv sind.
  
  Credo che lui sia più *sincero* di quanto voglia ammettere.
  Ich glaube, dass er *ehrlicher* ist, als er zugeben möchte.
  
  Non fu *sincera* quando disse di non aver visto il vento soffiare forte quel giorno.
  Sie war nicht *ehrlich*, als sie behauptete, den starken Wind an diesem Tag nicht gesehen zu haben.
  
  Se fossi *sincero*, ammetteresti che la tua soluzione al problema era sbagliata!
  Wenn du *ehrlich* wärst, würdest du zugeben, dass deine Lösung für das Problem falsch war!
