Wort: lana
Wortart: n.f
Wort mit Artikel: la lana
Femininum / Plural: lane
IPA: ''
Definition: die Wolle, -n
Register: ''
Beispielsätze: |-
  La *lana* di questo maglione è molto morbida e calda.
  Die *Wolle* dieses Pullovers ist sehr weich und warm.
  
  Non *ho lana* sufficiente per finire il lavoro a maglia prima della partenza.
  Ich habe nicht *genug Wolle*, um die Strickarbeit vor der Abreise zu beenden.
  
  Se tu *avessi usato lana* più spessa, il cappello sarebbe venuto più resistente.
  Wenn du *dickere Wolle* benutzt hättest, wäre die Mütze widerstandsfähiger geworden.
  
  È strano che in questa cerimonia non ci sia un sacro gesto con la *lana* come simbolo.
  Es ist seltsam, dass es bei dieser *Zeremonie* keine heilige Geste mit der Wolle als Symbol gibt.
  
  Vorrei un maglione fatto con *lana* di pecora italiana, gradirebbe un campione prima di ordinare?
  Ich hätte gerne einen Pullover aus italienischer *Schafwolle* – möchten Sie eine Probe, bevor Sie bestellen?
