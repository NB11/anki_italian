Rang: 1292
Wort: trucco
Wortart: n.m
Wort mit Artikel: il trucco
Femininum / Plural: trucchi
IPA: ''
Definition: die Schminke, der Trick, -s/-e
Register: ''
Beispielsätze: |-
  Il *trucco* che hai usato per l'esame è stato davvero ingegnoso.
  Der *Trick*, den du für die Prüfung verwendet hast, war wirklich clever.
  
  Vuoi del *trucco* per coprire quelle occhiaie sotto gli occhi?
  Möchtest du *Schminke*, um diese Augenringe darunter zu bedecken?
  
  Ha confessato di aver fatto un *trucco* durante il gioco per vincere la gara.
  Er hat zugegeben, einen *Trick* im Spiel gemacht zu haben, um am Wettbewerb zu gewinnen.
  
  Nonostante il *trucco* sofisticato, il suo viso sembrava ancora stanco sotto le luci del pubblico.
  Trotz der ausgeklügelten *Schminke* sah ihr Gesicht unter den Lichtern des Publikums immer noch müde aus.
  
  Se avessi saputo che il *trucco* sarebbe durato così poco, non mi sarei disturbata a metterlo.
  Wenn ich gewusst hätte, dass die *Schminke* so kurz hält, hätte ich mir die Mühe sparen können.
