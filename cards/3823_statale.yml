Beispielsätze: |-
  La scuola *statale* è gratuita in Italia, ma alcune famiglie preferiscono quelle private per qualità superiore.
  Die *staatliche* Schule ist in Italien kostenlos, aber einige Familien bevorzugen private Schulen wegen besserer Qualität.
  
  Per il concorso pubblico serve un diploma *statale* riconosciuto dal Ministero dell'Istruzione.
  Für den öffentlichen Wettbewerb ist ein *staatliches* Diplom erforderlich, das vom Bildungsministerium anerkannt wird.
  
  Se vuoi lavorare nella polizia, devi superare un esame *statale* molto selettivo.
  Wenn du bei der Polizei arbeiten möchtest, musst du eine *staatliche* Prüfung bestehen, die sehr selektiv ist.
  
  Le ferrovie *statali* italiane hanno subito molti tagli negli ultimi anni, riducendo i servizi.
  Die *staatlichen* italienischen Eisenbahnen haben in den letzten Jahren viele Kürzungen erfahren, was die Dienstleistungen reduziert hat.
  
  Nonostante i problemi economici, il governo ha aumentato i fondi per le infrastrutture *statali* nel bilancio 2024.
  Trotz der wirtschaftlichen Probleme hat die Regierung die Mittel für *staatliche* Infrastruktur im Haushalt 2024 erhöht.
