Rang: 2883
Wort: eccezione
Wortart: n.f
Wort mit Artikel: l'eccezione
Femininum / Plural: eccezioni
IPA: ''
Definition: die Ausnahme, -n
Register: ''
Beispielsätze: |-
  L'*eccezione* conferma la regola, come dice il proverbio.
  Die *Ausnahme* bestätigt die Regel, wie das Sprichwort sagt.
  
  È un'*eccezione* che tu arrivi così tardi senza preavviso.
  Es ist eine *Ausnahme*, dass du so spät ohne Vorwarnung ankommst.
  
  Fanno *eccezioni* per i clienti abituali, ma non sempre.
  Sie machen *Ausnahmen* für Stammkunden, aber nicht immer.
  
  Non accettiamo *eccezioni* quando si tratta di sicurezza.
  Wir akzeptieren keine *Ausnahmen*, wenn es um Sicherheit geht.
  
  Questa *eccezione* è stata concessa solo perché sei un amico di lunga data.
  Diese *Ausnahme* wurde nur gewährt, weil du ein alter Freund bist.
