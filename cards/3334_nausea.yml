Rang: 3334
Wort: nausea
Wortart: n.f
Wort mit Artikel: la nausea
Femininum / Plural: nausee
IPA: ''
Definition: die Übelkeit, Brechreiz
Register: ''
Beispielsätze: |-
  Dopo aver bevuto troppo *nausea* mi ha assalito improvvisamente.
  Nach zu viel Trinken hat mich plötzlich *Übelkeit* ergriffen.
  
  Il medico mi ha chiesto se soffro di *nausea* al mattino.
  Der Arzt fragte mich, ob ich morgens unter *Übelkeit* leide.
  
  Aveva *nausea* solo a guardarli mentre ballavano in modo così sgraziato.
  Ihn anzusehen, wie sie so unbeholfen tanzten, löste bei ihr *Übelkeit* aus.
  
  Nonostante la *nausea*, riuscì a presentarsi all’esame senza problemi.
  Trotz der *Übelkeit* schaffte er es, zur Prüfung zu kommen, ohne Probleme.
  
  Spera che dopo un’ora di aria fresca la *nausea* passi del tutto.
  Sie hofft, dass die *Übelkeit* nach einer Stunde an der frischen Luft ganz vergeht.
