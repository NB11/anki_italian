Rang: 836
Wort: colonnello
Wortart: n.m
Wort mit Artikel: il colonnello
Femininum / Plural: colonnelli
IPA: ''
Definition: der Oberst, -e
Register: ''
Beispielsätze: |-
  Il *colonnello* ha ricevuto una medaglia per il suo coraggio durante la missione.
  Der *Oberst* hat eine Medaille für seinen Mut während der Mission erhalten.
  
  Quando ero in servizio, mio nonno era un *colonnello* dell’esercito britannico.
  Als ich im Dienst war, war mein *Großvater* ein Oberst der britischen Armee.
  
  Il *colonnello* ha ordinato di evacuare il villaggio vicino alla chiesa abbandonata.
  Der *Oberst* hat befohlen, das Dorf neben der verlassenen Kirche zu evakuieren.
  
  Sai che il *colonnello* di cui parlavi è stato trasferito in una base segreta in Inghilterra?
  Weißt du, dass der *Oberst*, über den du gesprochen hast, in eine geheime Basis in England versetzt wurde?
  
  Nonostante l’età, il *colonnello* continua a sopportare le fatiche della carriera militare con grande determinazione e salute.
  Trotz des *Alters* erträgt der Oberst die Mühen der Militärlaufbahn mit großer Entschlossenheit und Gesundheit.
