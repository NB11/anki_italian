Rang: 3212
Wort: sbarra
Wortart: n.f
Wort mit Artikel: la sbarra
Femininum / Plural: sbarre
IPA: ''
Definition: die Stange, -n
Register: ''
Beispielsätze: |-
  La *sbarra* di metallo è troppo pesante per essere sollevata da sola.
  Die *Stange* aus Metall ist zu schwer, um sie allein zu heben.
  
  Hanno appeso il cartello giallo sopra la *sbarra* del parcheggio.
  Sie haben das Schild über die *Stange* der Parklücke gehängt.
  
  Quando ho visto la *sbarra* abbassata, ho capito che il passaggio era chiuso.
  Als ich die *Stange* heruntergelassen sah, wusste ich, dass die Durchfahrt gesperrt war.
  
  Le *sbarre* della gabbia erano così strette che l'animale non poteva scappare.
  Die *Stangen* des Käfigs waren so eng, dass das Tier nicht entkommen konnte.
  
  Dopo aver superato la *sbarra* dell'esame, ho finalmente ottenuto la patente.
  Nachdem ich die *Stange* der Prüfung bestanden hatte, habe ich endlich den Führerschein bekommen.
