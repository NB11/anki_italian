Rang: 2052
Wort: becco
Wortart: n.m
Wort mit Artikel: il becco
Femininum / Plural: becci
IPA: ''
Definition: der Schnabel, -
Register: ''
Beispielsätze: |-
  L'uccello ha il *becco* giallo brillante.
  Der Vogel hat einen *schnabel* in leuchtendem Gelb.
  
  Dopo aver mangiato troppo dolce, gli doleva il *becco*.
  Nach zu vielen Süßigkeiten tat ihm der *Schnabel* weh.
  
  Il pappagallo imita la voce umana con il suo *becco*.
  Der Papagei ahmt mit seinem *Schnabel* die menschliche Stimme nach.
  
  Se il *becco* dell'uccello è sporco, potrebbe avere un'infezione.
  Wenn der *Schnabel* des Vogels schmutzig ist, könnte er eine Infektion haben.
  
  Quei pappagalli hanno i *becci* così simili che è difficile distinguerli.
  Diese Papageien haben *Schnäbel*, die einander so gleichen, dass man sie kaum unterscheiden kann.
