Rang: 1783
Wort: afferrare
Wortart: v
Wort mit Artikel: afferrare
Femininum / Plural: ''
IPA: ''
Definition: ergreifen, packen, greifen nach
Register: ''
Beispielsätze: |-
  Ho dovuto *afferrare* la maniglia perché il treno stava per fermarsi bruscamente.
  Ich musste den *Griff* ergreifen, weil der Zug abrupt bremsen würde.
  
  Non appena la notizia è arrivata, tutti volevano *afferrare* la prima possibilità di lavoro.
  Sobald die Nachricht eintraf, wollten alle die *erste* Chance nutzen.
  
  Se tu avessi *afferrato* l’occasione quando eri giovane, oggi non ti troveresti in questa situazione.
  Wenn du die *Gelegenheit* gepackt hättest, als du jung warst, stündest du heute nicht in dieser Lage.
  
  Appena ho visto quel serpente strisciante, ho cercato di *afferrarlo* per portarlo lontano dal sentiero.
  Sobald ich diese *schlängelnde* Schlange sah, versuchte ich, sie zu fassen, um sie vom Weg wegzutragen.
  
  Malgrado l’acqua fosse gelida, sono riuscito a *afferrare* la cima della roccia prima che la corrente mi trascinasse via.
  Trotz des eiskalten Wassers gelang es mir, den *Gipfel* des Felsens zu packen, bevor die Strömung mich fortriss.
