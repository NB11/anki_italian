Rang: 2702
Wort: accedere
Wortart: vi
Wort mit Artikel: accedere
Femininum / Plural: ''
IPA: ''
Definition: Zugang haben, betreten, zugreifen
Register: ''
Beispielsätze: |-
  Per *accedere* al sito web devi inserire la tua password.
  Um auf die Website zu *zugreifen*, musst du dein Passwort eingeben.
  
  Se non hai i diritti, non puoi *accedere* a quella cartella.
  Wenn du keine Rechte hast, kannst du nicht auf diesen Ordner *zugreifen*.
  
  Ho cercato di *accedere* al sistema, ma non ci sono riuscito.
  Ich habe versucht, auf das System zu *zugreifen*, aber es ist mir nicht gelungen.
  
  Finché non ti autorizzeranno, non potrai *accedere* all’archivio segreto.
  Bis sie dich autorisieren, wirst du nicht auf das geheime Archiv *zugreifen* können.
  
  Nonostante gli ostacoli, alla fine riuscì a *accedere* all’area riservata.
  Trotz der Hindernisse gelang es ihm schließlich, auf den geschützten Bereich zu *zugreifen*.
Audio: ''
Notiz: ''
Dispersion: ''
