Rang: 1656
Wort: football
Wortart: n.m
Wort mit Artikel: il football
Femininum / Plural: i football
IPA: ''
Definition: der Fußball, -bälle
Register: ''
Beispielsätze: |-
  Durante la partita di ieri tutti volevano vedere solo lo *football* giocato dai bambini.
  Während des Spiels wollten alle gestern nur den von Kindern gespielten *Fußball* sehen.
  
  Mi hanno detto che stai cercando un *football* usato per allenare la squadra, giusto?
  Man hat mir gesagt, du suchst einen gebrauchten *Fußball*, um das Team zu trainieren, stimmt’s?
  
  Se vinceremo il torneo, il premio sarà un *football* firmato da tutti i giocatori.
  Wenn wir das Turnier gewinnen, wird der Preis ein von allen Spielern unterschriebener *Fußball* sein.
  
  Ha prestato il suo *football* a un senatore che giocava in un parco pubblicitario.
  Er hat seinen *Fußball* einem Senator geliehen, der in einem Werbepark spielte.
  
  Nonostante la crisi economica, molti continuano a comprare *football* nuovi di ogni versione.
  Trotz der Wirtschaftskrise kaufen viele weiterhin *Fußbälle* in jeder Version.
