Rang: 1344
Wort: negare
Wortart: v
Wort mit Artikel: negare
Femininum / Plural: ''
IPA: ''
Definition: leugnen, abstreiten, verweigern
Register: ''
Beispielsätze: |-
  L’avvocato ha *negato* categoricamente le accuse contro il suo cliente durante la conferenza stampa.
  Der Anwalt hat die Vorwürfe gegen seinen Mandanten während der Pressekonferenz *abgestritten*.
  
  Nonostante le prove evidenti, lui continua a *negare* di aver rubato il cellulare dal tavolo.
  Trotz der klaren Beweise *leugnet* er weiterhin, das Handy vom Tisch gestohlen zu haben.
  
  Se tu *negassi* ogni responsabilità, sarebbe molto difficile trovare una soluzione al problema.
  Wenn du jede Verantwortung *abstreiten* würdest, wäre es sehr schwer, eine Lösung für das Problem zu finden.
  
  Il sindaco ha dichiarato che non *negherà* il sostegno finanziario alla scuola, nonostante le critiche nazionali.
  Der Bürgermeister hat erklärt, dass er die finanzielle Unterstützung für die Schule nicht *verweiger* wird, trotz der nationalen Kritik.
  
  Lei si vergognerebbe di *negare* l’aiuto che le abbiamo offerto dopo tutto quello che ha fatto per noi.
  Sie würde sich schämen, die Hilfe *abzulehnen*, die wir ihr angeboten haben, nachdem sie so viel für uns getan hat.
