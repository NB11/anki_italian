Rang: 1441
Wort: attendere
Wortart: v
Wort mit Artikel: attendere
Femininum / Plural: ''
IPA: ''
Definition: warten
Register: ''
Beispielsätze: |-
  Non vedo l’ora di *attendere* la tua risposta.
  Ich kann es kaum erwarten, auf deine *Antwort* zu warten.
  
  Se non *attendi* un secondo, ti perderai il treno!
  Wenn du nicht einen Moment *wartest*, wirst du den Zug verpassen!
  
  Avrei *atteso* volentieri alla fermata, ma ero in ritardo.
  Ich hätte gerne an der Haltestelle *gewartet*, war aber zu spät dran.
  
  Credo che *attenderemo* a lungo il prossimo autobus.
  Ich glaube, wir werden lange auf den nächsten Bus *warten* müssen.
  
  L’insegnante ci ha detto di *attendere* in classe finché non fosse arrivato il nuovo giocatore dall’Italia.
  Die Lehrerin hat uns gesagt, wir sollten im Klassenzimmer *warten*, bis der neue Spieler aus Italien da sein würde.
