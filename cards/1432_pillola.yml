Rang: 1432
Wort: pillola
Wortart: n.f
Wort mit Artikel: la pillola
Femininum / Plural: pillole
IPA: ''
Definition: die Tablette, -n, die Pille, -n
Register: ''
Beispielsätze: |-
  Il medico mi ha prescritto *pillole* per il mal di testa.
  Der Arzt hat mir *Tabletten* gegen die Kopfschmerzen verschrieben.
  
  Prendi una *pillola* ogni mattina per controllare la pressione.
  Nimm jeden Morgen eine *Tablette*, um den Blutdruck zu kontrollieren.
  
  Se non ti senti meglio dopo due giorni, aumenta il dosaggio delle *pillole*.
  Wenn du dich nach zwei Tagen nicht besser fühlst, erhöhe die Dosis der *Pillen*.
  
  La *pillola* anticoncezionale richiede attenzione per essere efficace.
  Die *Pille* zur Empfängnisverhütung erfordert Sorgfalt, um wirksam zu sein.
  
  Ha bevuto un bicchiere d'acqua per mandare giù le *pillole* amare.
  Er hat ein Glas Wasser getrunken, um die *Tabletten* herunterzuspülen.
