Rang: 1968
Wort: progettare
Wortart: vt
Wort mit Artikel: progettare
Femininum / Plural: ''
IPA: ''
Definition: planen, entwerfen, konzipieren
Register: ''
Beispielsätze: |-
  Gli architetti stanno *progettando* un nuovo quartiere residenziale nel centro della città.
  Die Architekten sind dabei, ein neues Wohnviertel im Stadtzentrum zu *planen*.
  
  Se volessi *progettare* una casa, vorrei un grande giardino e molta luce naturale.
  Wenn ich ein Haus *entwerfen* wollte, würde ich einen großen Garten und viel natürliches Licht wollen.
  
  Gli ingegneri hanno *progettato* un sistema che riduce i consumi energetici del 30%.
  Die Ingenieure haben ein System *konzipiert*, das den Energieverbrauch um 30 % senkt.
  
  È importante *progettare* la propria carriera con attenzione per evitare errori futuri.
  Es ist wichtig, die eigene Karriere sorgfältig zu *planen*, um zukünftige Fehler zu vermeiden.
  
  La commissione ha approvato il piano che era stato *progettato* dalla squadra di esperti.
  Die Kommission hat den Plan genehmigt, der von dem Expertenteam *entworfen* worden war.
