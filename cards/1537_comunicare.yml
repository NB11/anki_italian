Rang: 1537
Wort: comunicare
Wortart: v
Wort mit Artikel: comunicare
Femininum / Plural: ''
IPA: ''
Definition: kommunizieren, übermitteln
Register: ''
Beispielsätze: |-
  Per *comunicare* efficacemente con gli studenti, il professore utilizza anche il linguaggio del corpo.
  Um *kommunizieren* effektiv mit den Schülern zu können, nutzt der Professor auch die Körpersprache.
  
  La polizia deve *comunicare* al pubblico ogni decisione presa riguardo al caso.
  Die Polizei muss dem Publikum jede Entscheidung, die zum Fall getroffen wurde, *kommunizieren*.
  
  Se non sapete *comunicare* i vostri bisogni, nessuno potrà aiutarvi.
  Wenn ihr eure Bedürfnisse nicht *kommunizieren* könnt, wird euch niemand helfen können.
  
  Il ministro ha annunciato che lancerà una campagna per *comunicare* meglio le riforme.
  Der Minister hat angekündigt, dass er eine Kampagne starten wird, um die Reformen besser *zu kommunizieren*.
  
  Gli scienziati *comunicano* i risultati delle loro ricerche attraverso articoli e conferenze.
  Die Wissenschaftler *kommunizieren* die Ergebnisse ihrer Forschungen durch Artikel und Konferenzen.
