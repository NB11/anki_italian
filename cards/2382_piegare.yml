Rang: 2382
Wort: piegare
Wortart: v
Wort mit Artikel: piegare
Femininum / Plural: ''
IPA: ''
Definition: biegen, falten, falzen
Register: ''
Beispielsätze: |-
  Devi *piegare* il foglio a metà prima di metterlo nella busta.
  Du musst das Blatt in der *Mitte* falten, bevor du es in den Umschlag legst.
  
  L'architetto ha fatto *piegare* la lamiera secondo il progetto.
  Der Architekt hat das Blech *biegen* lassen, wie im Plan vorgesehen.
  
  Se *piegassi* il coperchio della scatola, la chiuderei molto più facilmente.
  Wenn du den Deckel der Box *falten* würdest, könnte ich sie viel leichter schließen.
  
  Ha *piegato* il ginocchio per raccogliere la patatina caduta.
  Er hat das Knie *gebeugt*, um die heruntergefallene Kartoffelchips aufzuheben.
  
  Bisogna *piegare* la mappa con cura per non rovinarla.
  Man muss die Karte mit Sorgfalt *falten*, um sie nicht zu beschädigen.
