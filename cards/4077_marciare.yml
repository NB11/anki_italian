Rang: 4077
Wort: marciare
Wortart: vi
Wort mit Artikel: marciare
Femininum / Plural: ''
IPA: ''
Definition: marschieren
Register: ''
Beispielsätze: |-
  La *marcia* dei soldati durò tutta la notte senza sosta.
  Die *Marsch* der Soldaten dauerte die ganze Nacht ohne Pause.
  
  Se non ti affretti, rischi di *marciare* da solo verso la sconfitta.
  Wenn du dich nicht beeilst, wirst du vielleicht gezwungen *marciere* allein zur Niederlage.
  
  Nonostante la pioggia, i ragazzi hanno continuato a *marciare* verso la meta prefissata.
  Trotz des Regens sind die Jungen weiter *marciert*, um das gesteckte Ziel zu erreichen.
  
  Stammi vicino, così non dovrai *marciare* isolato in mezzo alla folla.
  Bleib in meiner Nähe, sonst musst du *marcieren* allein mitten in der Menge.
  
  Chi ti ha detto che dovresti *marciare* proprio ora, senza una ragione valida?
  Wer hat dir gesagt, dass du jetzt unbedingt *marcieren* musst, ohne einen triftigen Grund?
