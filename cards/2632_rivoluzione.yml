Beispielsätze: |-
  La *rivoluzione* industriale ha cambiato per sempre il modo di lavorare.
  Die *Revolution* hat die Art zu arbeiten für immer verändert.
  
  Credi che questa *rivoluzione* digitale sia davvero necessaria?
  Glaubst du, dass diese digitale *Revolution* wirklich nötig ist?
  
  Dopo la *rivoluzione* del 1989, molti paesi dell'Est hanno aperto alle riforme.
  Nach der *Revolution* von 1989 haben viele Länder Osteuropas sich Reformen geöffnet.
  
  Se non ci fosse stata la *rivoluzione* francese, l'Europa avrebbe ancora i monarchi assoluti.
  Wenn es die französische *Revolution* nicht gegeben hätte, gäbe es in Europa noch absolute Monarchien.
  
  La *rivoluzione* che stiamo vivendo nel campo dell'intelligenza artificiale preoccupa molti scienziati.
  Die *Revolution*, die wir gerade im Bereich der künstlichen Intelligenz erleben, beunruhigt viele Wissenschaftler.
