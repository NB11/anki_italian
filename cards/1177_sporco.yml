Rang: 1177
Wort: sporco
Wortart: adj
Wort mit Artikel: sporco
Femininum / Plural: ''
IPA: ''
Definition: schmutzig, dreckig
Register: ''
Beispielsätze: |-
  Questa maglietta è *sporca* perché ho giocato a calcio tutto il pomeriggio.
  Dieses T-Shirt ist *schmutzig*, weil ich den ganzen Nachmittag Fußball gespielt habe.
  
  Non mi piace questo ristorante: il bagno era *sporco* e puzzava di fumo.
  Ich mag dieses Restaurant nicht: die Toilette war *schmutzig* und roch nach Rauch.
  
  Se hai le mani *sporche*, non toccare i documenti nuovi!
  Wenn du *schmutzige* Hände hast, berühre die neuen Dokumente nicht!
  
  Il lupo ha lasciato delle *impronte sporche* sulla neve vicino alla baita.
  Der Wolf hat *schmutzige Spuren* im Schnee nahe der Hütte hinterlassen.
  
  Pensavo che il parco fosse pulito, ma invece era ricoperto di cartacce e *sporcizia*!
  Ich dachte, der Park sei sauber, aber stattdessen war er voller Papiermüll und *Dreck*!
