Rang: 981
Wort: testimone
Wortart: n.m
Wort mit Artikel: il testimone
Femininum / Plural: testimoni
IPA: ''
Definition: der Zeuge, -n
Register: ''
Beispielsätze: |-
  Il *testimone* ha dichiarato di aver visto tutto durante l'episodio della lite.
  Der *Zeuge* hat erklärt, er habe alles während der Streit-Episode gesehen.
  
  Avresti dovuto chiamare il *testimone* principale per testimoniare in tribunale.
  Du hättest den wichtigsten *Zeugen* anrufen müssen, um im Gericht auszusagen.
  
  Nonostante l'odore di fumo nel ristorante, il *testimone* ha confermato di non aver visto nessuno fumare.
  Trotz des Rauchgeruchs im Restaurant bestätigte der *Zeuge*, niemanden rauchen gesehen zu haben.
  
  Quando il poliziotto chiese chi avesse visto la scena, solo un *testimone* si fece avanti coraggioso.
  Als der Polizist fragte, wer die Szene gesehen habe, meldete sich nur ein mutiger *Zeuge*.
  
  Il *testimone* oculare affermò che il ladro indossava una giacca blu, ma nessuno volle credergli.
  Der Augen*zeuge* behauptete, der Dieb habe eine blaue Jacke getragen, doch ihm wollte niemand glauben.
