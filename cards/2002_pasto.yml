Rang: 2002
Wort: pasto
Wortart: n.m
Wort mit Artikel: il pasto
Femininum / Plural: i pasti
IPA: ''
Definition: die Mahlzeit, -en
Register: ''
Beispielsätze: |-
  Dopo aver preparato *il pasto*, ho chiamato tutti a tavola per mangiare insieme.
  Nach der Zubereitung der *Mahlzeit* habe ich alle an den Tisch gerufen, um zusammen zu essen.
  
  Vor di andare a letto, preferisco fare uno spuntino leggero invece di un *pasto* abbondante.
  Vor dem Schlafengehen ziehe ich einen leichten Snack statt einer *Mahlzeit* vor.
  
  Se non hai tempo per un *pasto* completo, almeno prendi una barretta di cereali.
  Wenn du keine Zeit für eine vollständige *Mahlzeit* hast, nimm wenigstens einen Müsliriegel.
  
  È importante che i bambini facciano almeno tre *pasti* al giorno per crescere sani.
  Es ist wichtig, dass Kinder mindestens drei *Mahlzeiten* am Tag zu sich nehmen, um gesund zu wachsen.
  
  Quando ero in viaggio, ho saltato un *pasto* perché ero troppo occupato a visitare la città.
  Auf der Reise habe ich eine *Mahlzeit* ausgelassen, weil ich zu sehr damit beschäftigt war, die Stadt zu erkunden.
