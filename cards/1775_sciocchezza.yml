Rang: 1775
Wort: sciocchezza
Wortart: n.f
Wort mit Artikel: la sciocchezza
Femininum / Plural: sciocchezze
IPA: ''
Definition: die Dummheit, -en
Register: ''
Beispielsätze: |-
  Non dire *sciocchezze*, per favore!
  Sag bitte keine *Dummheiten*!
  
  Le sue decisioni sono piene di *sciocchezze* che danneggiano tutti.
  Seine Entscheidungen sind voller *Dummheiten*, die alle schaden.
  
  Era solo una *sciocchezza* che ho detto senza pensare.
  Es war nur eine *Dummheit*, die ich unüberlegt gesagt habe.
  
  Non credere a ogni *sciocchezza* che senti in giro!
  Glaub nicht jede *Dummheit*, die du irgendwo hörst!
  
  Se avessi ascoltato i tuoi consigli, non avrei commesso questa *sciocchezza*.
  Hätte ich auf deine Ratschläge gehört, hätte ich diese *Dummheit* nicht begangen.
