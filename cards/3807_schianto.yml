Rang: 3807
Wort: schianto
Wortart: n.m
Wort mit Artikel: lo schianto
Femininum / Plural: gli schianti
IPA: ''
Definition: der Aufprall, der Zusammenstoß
Register: ''
Beispielsätze: |-
  Dopo *schianto* così forte, temo che l’auto sia danneggiata irreparabilmente.
  Nach *Aufprall* so stark fürchte ich, dass das Auto irreparabel beschädigt ist.
  
  Lo *schianto* dei piatti a terra ha fatto sobbalzare tutti gli invitati.
  Das *Zusammenschlagen* der Teller auf dem Boden ließ alle Gäste zusammenzucken.
  
  Ho sentito un *schianto* improvviso fuori dalla porta: era il mio vicino che cadeva dalle scale.
  Ich hörte ein plötzliches *Aufprallen* vor der Tür: Es war mein Nachbar, der die Treppe hinunterstürzte.
  
  In quella curva pericolosa ci fu uno *schianto* tremendo tra due camion.
  In dieser gefährlichen Kurve gab es einen *Zusammenstoß* zwischen zwei Lastwagen.
  
  Nonostante il *schianto* violento, il conducente riuscì a uscire dalla macchina senza gravi ferite.
  Trotz des *Aufpralls* schaffte es der Fahrer, ohne schwere Verletzungen aus dem Auto zu steigen.
