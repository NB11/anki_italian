Rang: 1654
Wort: cerca
Wortart: n.f
Wort mit Artikel: la cerca
Femininum / Plural: cerche
IPA: ''
Definition: die Suche
Register: ''
Beispielsätze: |-
  La *cerca* del tesoro è iniziata ieri mattina.
  Die *Suche* nach dem Schatz hat gestern Morgen begonnen.
  
  Dopo la *cerca* affannosa, finalmente l’hanno trovato rifugio in un piccolo rifugio di montagna.
  Nach der anstrengenden *Suche* fanden sie endlich Unterschlupf in einer kleinen Berghütte.
  
  La *cerca* di gloria lo ha spinto a compiere azioni estreme, anche se sapeva che erano disgustose e sbagliate.
  Die *Suche* nach Ruhm trieb ihn zu extremen Taten, obwohl er wusste, dass sie ekelhaft und falsch waren.
  
  Nonostante la *cerca* meticolosa, non sono riusciti a trovare il ladro nei magazzini della città.
  Trotz der sorgfältigen *Suche* gelang es ihnen nicht, den Dieb in den Lagerhäusern der Stadt zu finden.
  
  La *cerca* dell’ambulanza è stata inutile: il traffico peggiorava di minuto in minuto.
  Die *Suche* nach dem Krankenwagen war vergeblich: der Verkehr verschlechterte sich von Minute zu Minute.
