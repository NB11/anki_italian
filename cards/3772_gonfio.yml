Rang: 3772
Wort: gonfio
Wortart: adj
Wort mit Artikel: gonfio
Femininum / Plural: ''
IPA: ''
Definition: aufgeblasen, geschwollen
Register: ''
Beispielsätze: |-
  Dopo la puntura di ape, il suo braccio era *gonfio* e rosso.
  Nach dem Bienenstich war sein Arm *aufgeblasen* und rot.
  
  Non mangiare quel fungo, potrebbe renderti lo stomaco *gonfio*!
  Iss diesen Pilz nicht, er könnte dir den Magen *aufblähen*!
  
  Ha comprato delle scarpe così *gonfie* da non poterle indossare.
  Er hat Schuhe gekauft, die so *aufgebläht* waren, dass er sie nicht tragen konnte.
  
  È meglio che tu controlli la ruota *gonfia* prima di partire.
  Du solltest besser den *aufgepumpten* Reifen vor der Abfahrt prüfen.
  
  Quando ha saputo la verità, si è sentito il petto *gonfio* di rabbia.
  Als er die Wahrheit erfuhr, fühlte er sich mit Wut *aufgeblasen*.
