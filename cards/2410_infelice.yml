Rang: 2410
Wort: infelice
Wortart: adj
Wort mit Artikel: infelice
Femininum / Plural: ''
IPA: ''
Definition: unglücklich, traurig
Register: ''
Beispielsätze: |-
  Mi sento *infelice* quando il tempo è grigio e piovoso.
  Ich fühle mich *unglücklich*, wenn das Wetter grau und regnerisch ist.
  
  Anche se la festa era rumorosa, lei rimase *infelice* dentro di sé.
  Auch wenn die Party laut war, blieb sie innerlich *traurig*.
  
  Vorrei che tu fossi meno *infelice* dopo il tradimento del tuo amico.
  Ich wünschte, du wärst nach dem Verrat deines Freundes weniger *unglücklich*.
  
  È *infelice* che la sua domanda sia stata respinta senza spiegazione.
  Es ist *traurig*, dass seine Frage ohne Erklärung abgelehnt wurde.
  
  Dicono che essere *infelici* a volte è necessario per apprezzare la felicità.
  Manchmal sagt man, *unglücklich* zu sein, ist nötig, um Glück zu schätzen.
