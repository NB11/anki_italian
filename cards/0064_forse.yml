Rang: 64
Wort: forse
Wortart: adv
Wort mit Artikel: forse
Femininum / Plural: ''
IPA: ''
Definition: vielleicht, unter Umständen
Register: ''
Beispielsätze: |-
  Non so se verrai, *forse* sì, *forse* no.
  Ich weiß nicht, ob du kommst, *vielleicht* ja, *vielleicht* nein.
  
  *Forse* domani pioverà, portati l'ombrello.
  *Vielleicht* regnet es morgen, nimm deinen Regenschirm mit.
  
  Non sono sicuro, ma *forse* verrà anche lei alla festa.
  Ich bin mir nicht sicher, aber *vielleicht* kommt sie auch zur Party.
  
  Perché non glielo chiedi? *Forse* ti aiuterà.
  Warum fragst du ihn nicht? *Vielleicht* wird er dir helfen.
  
  *Forse* hai ragione, ma non ne sono convinto.
  *Vielleicht* hast du recht, aber ich bin nicht überzeugt.
