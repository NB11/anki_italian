Rang: 64
Wort: forse
Wortart: adv
Wort mit Artikel: forse
Femininum / Plural: ''
IPA: ''
Definition: vielleicht, möglicherweise
Register: ''
Beispielsätze: |-
  Non so se verrai, *forse* sì, *forse* no.
  Ich weiß nicht, ob du kommst, *vielleicht* ja, *vielleicht* nein.
  
  *Forse* domani andremo al mare, se il tempo lo permette.
  *Vielleicht* gehen wir morgen ans Meer, wenn das Wetter es zulässt.
  
  Hai fame? – *Forse* un pochino, ma non tanto.
  Hast du Hunger? – *Vielleicht* ein bisschen, aber nicht so sehr.
  
  Credo che *forse* sia meglio partire presto.
  Ich glaube, es ist *möglicherweise* besser, früh loszufahren.
  
  *Forse* non hai capito bene quello che ho detto.
  Du hast *vielleicht* nicht verstanden, was ich gesagt habe.
