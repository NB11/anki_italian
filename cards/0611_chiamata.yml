Rang: 611
Wort: chiamata
Wortart: n.f
Wort mit Artikel: la chiamata
Femininum / Plural: chiamate
IPA: ''
Definition: der Anruf, -e
Register: ''
Beispielsätze: |-
  Ho ricevuto *una chiamata* importante da mio zio alle otto di mattina.
  Ich habe *einen Anruf* von meinem Onkel um acht Uhr morgens erhalten.
  
  Se non rispondo alla *chiamata*, richiamerò non appena possibile.
  Wenn ich nicht auf *den Anruf* antworte, rufe ich so schnell wie möglich zurück.
  
  Ha fatto *una chiamata* segreta per mantenere il suo segreto completamente nascosto.
  Er hat *einen geheimen Anruf* getätigt, um sein Geheimnis völlig verborgen zu halten.
  
  Non dimenticare che domani c'è *una chiamata* importante con il centro di ricerca.
  Vergiss nicht, dass morgen *ein wichtiges Gespräch* mit dem Forschungszentrum ansteht.
  
  Era così spaventata che non riuscì a fare nemmeno *una chiamata* di aiuto.
  Sie war so verängstigt, dass sie nicht einmal *einen Hilferuf* absetzen konnte.
