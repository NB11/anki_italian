Rang: 2859
Wort: indio
Wortart: n.m
Wort mit Artikel: lo indio
Femininum / Plural: gli indi
IPA: ''
Definition: der Indio, -s
Register: ''
Beispielsätze: |-
  Lo *indio* era un abile cacciatore nella giungla amazzonica.
  Der *Indio* war ein geschickter Jäger im amazonischen Dschungel.
  
  Gli archeologi hanno trovato tracce di un antico villaggio degli *indi* nel nord del Brasile.
  Die Archäologen fanden Spuren eines alten Dorfes der *Indios* im Norden Brasiliens.
  
  Se fossi nato nel XVI secolo, forse avrei vissuto come un *indio* nelle colonie spagnole.
  Wenn ich im 16. Jahrhundert geboren wäre, hätte ich vielleicht wie ein *Indio* in den spanischen Kolonien gelebt.
  
  Gli *indi* utilizzavano piante medicinali che oggi sono studiate dalla scienza moderna.
  Die *Indios* nutzten Heilpflanzen, die heute von der modernen Wissenschaft untersucht werden.
  
  Credi che gli *indi* avessero una cultura più avanzata di quanto pensiamo?
  Glaubst du, dass die *Indios* eine fortschrittlichere Kultur hatten, als wir denken?
