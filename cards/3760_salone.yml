Femininum / Plural: saloni
IPA: ''
Definition: der Salon, -s
Register: ''
Beispielsätze: |-
  I *saloni* storici di Firenze sono pieni di opere d’arte e affreschi stupendi.
  In den *Salons* von Florenz sind historische Werke und wundervolle Fresken.
  
  Abbiamo organizzato una festa nel *salone* principale della villa per celebrare il matrimonio.
  Wir haben im *Hauptsaal* der Villa eine Feier zur Hochzeit organisiert.
  
  Non appena entrerai nel *salone*, noterai l’ampia vetrata con vista sul mare.
  Sobald du den *Salon* betrittst, wirst du das große Fenster mit Meerblick bemerken.
  
  Il *salone* degli ambasciatori era stato allestito con cura per l’incontro diplomatico internazionale.
  Der *Empfangssaal* der Botschafter war sorgfältig für das internationale Treffen vorbereitet worden.
  
  Vorresti visitare il *salone* dove si tengono le mostre temporanee del museo?
  Möchtest du den *Ausstellungsraum* besichtigen, in dem die temporären Ausstellungen des Museums stattfinden?
