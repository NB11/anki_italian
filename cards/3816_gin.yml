Rang: 3816
Wort: gin
Wortart: n.m
Wort mit Artikel: il gin
Femininum / Plural: gins
IPA: ''
Definition: der Gin, -s
Register: ''
Beispielsätze: |-
  Mi piace bere un *gin* tonic a fine serata.
  Ich trinke gerne einen *Gin* Tonic am Abend.
  
  Nel suo bar preferito servono un *gin* fatto in casa davvero eccellente.
  In seiner Lieblingsbar gibt es einen hausgemachten *Gin* von hervorragender Qualität.
  
  Non sapevo che esistesse un *gin* con il gusto di zucca e cannella.
  Ich wusste nicht, dass es einen *Gin* mit Geschmack von Kürbis und Zimt gibt.
  
  Se avessi tempo, ti farei assaggiare il mio *gin* alle erbe aromatiche.
  Wenn ich Zeit hätte, würde ich dir meinen *Gin* mit Kräutern zum Probieren anbieten.
  
  Hanno chiuso l’azienda perché il *gin* che producevano non vendeva abbastanza.
  Sie haben das Unternehmen geschlossen, weil der *Gin*, den sie herstellten, nicht genug verkauft hat.
