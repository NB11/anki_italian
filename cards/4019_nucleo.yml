Rang: 4019
Wort: nucleo
Wortart: n.m
Wort mit Artikel: il nucleo
Femininum / Plural: nuclei
IPA: ''
Definition: der Kern, -e
Register: ''
Beispielsätze: |-
  Il *nucleo* della questione è che non hai capito gli accordi.
  Der *Kern* des Problems ist, dass du die Vereinbarungen nicht verstanden hast.
  
  Hanno trovato un *nucleo* familiare molto solido.
  Sie haben einen sehr stabilen *Kern* der Familie gefunden.
  
  Se avessi saputo cosa c'è dentro questo *nucleo*, non l'avrei mai aperto!
  Wenn ich gewusst hätte, was in diesem *Kern* steckt, hätte ich ihn niemals geöffnet!
  
  Nel *nucleo* di ogni cellula si trova il DNA.
  Im *Kern* jeder Zelle befindet sich die DNA.
  
  Il *nucleo* della squadra è composto da giovani talenti, come il nostro nuovo corvo svizzero.
  Der *Kern* des Teams besteht aus jungen Talenten, wie unserem neuen Raben aus der Schweiz.
