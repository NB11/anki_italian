  Man sagt, dass *der Leitartikel* dieser Woche sehr wichtig ist, um die politische Lage zu verstehen.
  
  Vorresti che ti spiegassi di nuovo *l'articolo* che riguarda le proprietà immobiliari in campagna?
  Möchtest du, dass ich dir *den Abschnitt* über Immobilieneigentum auf dem Land noch einmal erkläre?
