Wort mit Artikel: la capsula
Femininum / Plural: capsule
IPA: ''
Definition: die Kapsel, -n
Register: ''
Beispielsätze: |-
  Ho trovato una *capsula* vuota nel mio zaino.
  Ich habe eine *Kapsel* in meinem Rucksack gefunden.
  
  La *capsula* del farmaco si sciolse rapidamente nello stomaco.
  Die *Kapsel* des Medikaments löste sich schnell im Magen auf.
  
  Se vuoi contattarmi, invia un messaggio nella *capsula* del tempo che ho nascosto nel giardino.
  Wenn du mich kontaktieren willst, schick eine Nachricht in die *Zeitkapsel*, die ich im Garten versteckt habe.
  
  La *capsula* spaziale atterrò senza problemi nel deserto.
  Die Raum*kapsel* landete problemlos in der Wüste.
  
  Hai mai aperto una *capsula* di caffè per vedere se il contenuto è ancora buono?
  Hast du schon mal eine Kaffee*kapsel* geöffnet, um zu prüfen, ob der Inhalt noch gut ist?
