Rang: 1678
Wort: premere
Wortart: v
Wort mit Artikel: premere
Femininum / Plural: ''
IPA: ''
Definition: drücken, pressen
Register: ''
Beispielsätze: |-
  Devi *premere* questo pulsante per avviare l’ascensore.
  Du musst *drücken* diesen Knopf, um den Aufzug in Betrieb zu setzen.
  
  Non *premere* troppo forte, potrebbe rompersi!
  Drück nicht zu stark, sonst könnte es kaputtgehen!
  
  Se *premi* più volte la leva, il meccanismo non risponde correttamente.
  Wenn du den Hebel mehrere Male *drückst*, reagiert der Mechanismus nicht richtig.
  
  Ha *premuto* il campanello, ma nessuno ha risposto.
  Er hat *gedrückt* die Klingel, aber es hat niemand geantwortet.
  
  Potresti *premere* il tasto pausa mentre finisco di parlare?
  Könntest du *drücken* die Pausetaste, während ich fertig spreche?
