Rang: 3550
Wort: venditore
Wortart: n.m
Wort mit Artikel: il venditore
Femininum / Plural: i venditori
IPA: ''
Definition: der Verkäufer, -
Register: ''
Beispielsätze: |-
  Se hai bisogno di aiuto, chiedi al *venditore* che sta lì vicino alla cassa.
  Falls du Hilfe brauchst, frag den *Verkäufer*, der dort an der Kasse steht.
  
  Quel negozio ha assunto tre nuovi *venditori* la scorsa settimana.
  Dieses Geschäft hat letzte Woche drei neue *Verkäufer* eingestellt.
  
  Nonostante la crisi, il *venditore* ha continuato a lavorare con onestà e dedizione ogni giorno.
  Trotz der Krise hat der *Verkäufer* jeden Tag mit Ehrlichkeit und Hingabe weitergearbeitet.
  
  Mi ha detto il *venditore* che questa macchina costa più di cinquantamila euro.
  Der *Verkäufer* hat mir erklärt, dass dieses Auto über fünfzigtausend Euro kostet.
  
  Ho incontrato il *venditore* che cercava un erede per la sua piccola libreria in centro.
  Ich habe den *Verkäufer* getroffen, der einen Erben für seine kleine Buchhandlung im Zentrum suchte.
