Wort: intelligente
Wortart: adj
Wort mit Artikel: intelligente
Femininum / Plural: ''
IPA: ''
Definition: klug, intelligent, schlau
Register: ''
Beispielsätze: |-
  Marco è un ragazzo *intelligente* che studia molto e prende sempre bei voti.
  Marco ist ein *kluger* Junge, der viel lernt und immer gute Noten bekommt.
  
  Nonostante il rumore in sala, gli studenti rimanevano *intelligenti* e concentrati durante l’esame.
  Trotz des Lärms im Saal blieben die Schüler *intelligent* und konzentriert während der Prüfung.
  
  Se fossi *intelligente*, non avresti ripetuto lo stesso errore due volte, vero?
  Wärst du *klug*, hättest du denselben Fehler nicht zweimal gemacht, oder?
  
  Credo che la persona più *intelligente* nella classe fosse quella che ha trovato la soluzione al problema.
  Ich glaube, die Person, die am *intelligentesten* in der Klasse war, war die, die die Lösung des Problems fand.
  
  Spero che domani il nuovo computer non sia troppo lento per lui, perché è *intelligente* e merita tecnologia di qualità.
  Ich hoffe, dass der neue Computer morgen nicht zu langsam für ihn ist, denn er ist *intelligent* und verdient qualitativ hochwertige Technik.
