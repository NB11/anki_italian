Rang: 4175
Wort: pannello
Wortart: n.m
Wort mit Artikel: il pannello
Femininum / Plural: i pannelli
IPA: ''
Definition: die Platte, -n, das Paneel
Register: ''
Beispielsätze: |-
  Ho acquistato *pannelli* solari per ridurre la bolletta della luce.
  Ich habe *Solarplatten* gekauft, um die Stromrechnung zu senken.
  
  Durante la ristrutturazione, hanno sostituito tutti gli *pannelli* delle finestre.
  Bei der Renovierung haben sie alle *Scheiben* der Fenster ausgetauscht.
  
  Il *pannello* di controllo è in fondo alla stanza, vicino alla porta.
  Das *Bedienfeld* befindet sich am Ende des Raumes, nahe der Tür.
  
  Stavo per cadere, ma ho agguantato un *pannello* di legno sporgente.
  Ich wäre fast gestürzt, aber ich habe eine vorstehende *Holzplatte* gepackt.
  
  Nei laboratori di fisica si usano spesso *pannelli* di vetro per gli esperimenti.
  In Physiklaboren werden häufig *Glasplatten* für Experimente verwendet.
