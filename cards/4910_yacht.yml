Rang: 4910
Wort: yacht
Wortart: n.m
Wort mit Artikel: lo yacht
Femininum / Plural: yacht
IPA: ''
Definition: die Yacht, -en
Register: ''
Beispielsätze: |-
  La nostra *yacht* è ormeggiata al porto di Venezia da mesi.
  Unsere *Yacht* liegt seit Monaten im Hafen von Venedig vor Anker.
  
  Se avessimo più tempo, compreremmo una seconda *yacht* per le vacanze.
  Wenn wir mehr Zeit hätten, würden wir eine zweite *Yacht* für die Ferien kaufen.
  
  Il capitano spiega alle persone a bordo come si governa la *yacht*.
  Der Kapitän erklärt den Leuten an Bord, wie man die *Yacht* steuert.
  
  Le *yacht* dei ricchi sono spesso dotate di ogni comfort moderno.
  Die *Yachten* der Reichen sind oft mit jedem modernen Komfort ausgestattet.
  
  Dopo aver venduto la casa, hanno investito tutti i soldi in una lussuosa *yacht*.
  Nachdem sie das Haus verkauft hatten, haben sie all ihr Geld in eine luxuriöse *Yacht* investiert.
