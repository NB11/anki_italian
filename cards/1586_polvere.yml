Rang: 1586
Wort: polvere
Wortart: n.f
Wort mit Artikel: la polvere
Femininum / Plural: polveri
IPA: ''
Definition: der Staub, -
Register: ''
Beispielsätze: |-
  Ho trovato *polvere* dappertutto dopo il lavoro in giardino.
  Ich habe *Staub* überall nach der Gartenarbeit gefunden.
  
  Gli archeologi studiano le antiche *polveri* per scoprire segreti del passato.
  Die Archäologen untersuchen die alten *Stäube*, um Geheimnisse der Vergangenheit zu entdecken.
  
  Se non pulisci, la *polvere* si accumula in pochi giorni.
  Wenn du nicht sauber machst, sammelt sich *Staub* in wenigen Tagen an.
  
  Ha aperto la finestra per far uscire tutta la *polvere* che c’era nella stanza.
  Er/sie hat das Fenster geöffnet, um all den *Staub* aus dem Zimmer zu lassen.
  
  La *polvere* di stelle è ciò che resta delle stelle morte milioni di anni fa.
  Der *Staub* der Sterne ist das, was von den vor Millionen Jahren gestorbenen Sternen übrig bleibt.
