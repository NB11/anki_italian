Rang: 1779
Wort: invito
Wortart: n.m
Wort mit Artikel: l'invito
Femininum / Plural: inviti
IPA: ''
Definition: die Einladung, -en
Register: ''
Beispielsätze: |-
  Non ho ricevuto nessun *invito* per la festa di stasera, purtroppo.
  Ich habe keine *Einladung* zur Party heute Abend erhalten.
  
  Ti mando un *invito* digitale per il concerto, così non lo perdi.
  Ich schicke dir eine digitale *Einladung* für das Konzert, damit du sie nicht verpasst.
  
  Ho accettato l’*invito* dei miei amici per una gita in montagna.
  Ich habe die *Einladung* meiner Freunde für einen Ausflug in die Berge angenommen.
  
  Se non ricevi l’*invito* entro domani, ricordami di inviarlo di nuovo.
  Wenn du die *Einladung* bis morgen nicht erhältst, erinnere mich daran, sie noch einmal zu schicken.
  
  L’*invito* che hai ricevuto è valido solo se lo firmi entro una settimana.
  Die *Einladung*, die du erhalten hast, ist nur gültig, wenn du sie innerhalb einer Woche unterschreibst.
