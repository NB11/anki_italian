Rang: 2630
Wort: tensione
Wortart: n.f
Wort mit Artikel: la tensione
Femininum / Plural: tensioni
IPA: ''
Definition: die Spannung, -en
Register: ''
Beispielsätze: |-
  La *tensione* nella stanza era palpabile dopo l'annuncio del licenziamento.
  Die *Spannung* im Raum war nach der Kündigungsankündigung greifbar.
  
  Nonostante la *tensione* tra i due, cercarono di lavorare insieme al progetto.
  Trotz der *Spannung* zwischen den beiden versuchten sie, am Projekt zusammenzuarbeiten.
  
  Avrei voluto ridurre la *tensione* con una battuta, ma nessuno rise.
  Ich hätte die *Spannung* gern mit einem Scherz gemindert, doch niemand lachte.
  
  Se la *tensione* elettrica supera i limiti, il circuito si interrompe automaticamente.
  Wenn die elektrische *Spannung* die Grenzen überschreitet, unterbricht sich der Stromkreis automatisch.
  
  La *tensione* nei muscoli aumenta quando si fa sport ad alta intensità.
  Die *Spannung* in den Muskeln steigt, wenn man Sport mit hoher Intensität betreibt.
