Rang: 1135
Wort: inviare
Wortart: vt
Wort mit Artikel: inviare
Femininum / Plural: ''
IPA: ''
Definition: schicken, senden
Register: ''
Beispielsätze: |-
  Devi *inviare* questa lettera al tribunale entro domani.
  Du musst diesen Brief bis morgen *ans Gericht* schicken.
  
  Se non avessi *inviato* il messaggio, non sarei venuto a sapere la verità.
  Wenn ich die Nachricht nicht *gesendet* hätte, hätte ich die Wahrheit nicht erfahren.
  
  L'infermiere mi ha chiesto se volevo *inviare* un messaggio alla mia famiglia.
  Der Krankenpfleger hat mich gefragt, ob ich meiner Familie eine Nachricht *schicken* wollte.
  
  Non appena avremo l'obiettivo chiaro, *invieremo* il progetto al direttore.
  Sobald wir das klare *Ziel* haben, werden wir das Projekt dem Direktor senden.
  
  Stamattina ho dimenticato di *inviare* la mail al college per l'iscrizione.
  Heute Morgen habe ich vergessen, die E-Mail an das *College* für die Einschreibung zu schicken.
