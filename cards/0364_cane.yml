Rang: 364
Wort: cane
Wortart: n.m
Wort mit Artikel: il cane
Femininum / Plural: cani
IPA: ''
Definition: der Hund, -e
Register: ''
Beispielsätze: |-
  Il *cane* abbaia quando sente rumori strani.
  Der *Hund* bellt, wenn er seltsame Geräusche hört.
  
  Hai visto il mio *cane*? È scappato via!
  Hast du meinen *Hund* gesehen? Er ist weggelaufen!
  
  Vorrei un *cane*, ma mia madre ha paura dei cani.
  Ich würde gern einen *Hund* haben, aber meine Mutter hat Angst vor Hunden.
  
  I *cani* sono fedeli, ma anche i gatti possono esserlo.
  *Hunde* sind treu, aber auch Katzen können es sein.
  
  Se avessi un *cane*, lo porterei tutti i giorni al parco.
  Wenn ich einen *Hund* hätte, würde ich ihn jeden Tag in den Park bringen.
