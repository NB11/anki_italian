Rang: 3819
Wort: bucato
Wortart: n.m
Wort mit Artikel: il bucato
Femininum / Plural: i bucati
IPA: ''
Definition: die Wäsche, -n
Register: ''
Beispielsätze: |-
  Ho appena finito di stirare *il bucato* che ho lavato ieri.
  Ich habe gerade die *Wäsche* gebügelt, die ich gestern gewaschen habe.
  
  Mia madre mi ha sempre insegnato che bisogna separare *il bucato* bianco da quello colorato.
  Meine Mutter hat mir immer beigebracht, dass man die *Wäsche* weiß von der bunten trennen muss.
  
  Nonostante il temporale, *il bucato* steso fuori non si è bagnato di nuovo.
  Trotz des Gewitters hat sich die auf der Leine hängende *Wäsche* nicht wieder nass geregelt.
  
  Se non metti *il bucato* in lavatrice, dovrai lavarlo a mano domani.
  Wenn du die *Wäsche* nicht in die Waschmaschine gibst, musst du sie morgen von Hand waschen.
  
  Dicono che *il bucato* si asciuga più in fretta se lo stendi al sole piuttosto che all'ombra.
  Man sagt, die *Wäsche* trocknet schneller, wenn man sie in die Sonne hängt, statt im Schatten.
