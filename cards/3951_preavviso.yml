Rang: 3951
Wort: preavviso
Wortart: n.m
Wort mit Artikel: il preavviso
Femininum / Plural: i preavvisi
IPA: ''
Definition: die Vorwarnung, -en
Register: ''
Beispielsätze: |-
  Non partire senza *preavviso*, altrimenti non posso organizzare il viaggio.
  Verlasse die Wohnung nicht ohne *Vorwarnung*, sonst kann ich die Reise nicht organisieren.
  
  Il *preavviso* di licenziamento deve essere inviato almeno due settimane prima.
  Die Kündigungs*vorwarnung* muss mindestens zwei Wochen vorher geschickt werden.
  
  Arriveremo a breve, quindi fammi sapere se hai bisogno di qualche *preavviso* speciale.
  Wir kommen gleich an, also lass mich wissen, ob du eine besondere *Vorwarnung* brauchst.
  
  Secondo il regolamento, ogni dipendente riceve un *preavviso* scritto prima di eventuali provvedimenti disciplinari.
  Laut Vorschrift erhält jeder Mitarbeiter eine schriftliche *Vorwarnung*, bevor es zu disziplinarischen Maßnahmen kommt.
  
  Se non avessi dato *preavviso* per tempo, la prenotazione sarebbe stata annullata automaticamente.
  Hätte ich die *Vorwarnung* nicht rechtzeitig gegeben, wäre die Reservierung automatisch storniert worden.
