Rang: 1570
Wort: staccare
Wortart: vt
Wort mit Artikel: staccare
Femininum / Plural: ''
IPA: ''
Definition: abtrennen, losmachen, trennen
Register: ''
Beispielsätze: |-
  Devo *staccare* il manifesto dal muro perché è vecchio e rovinato.
  Ich muss das Schild von der Wand *ablösen*, weil es alt und beschädigt ist.
  
  Quando ha sentito la notizia, non sapeva più come *staccare* lo sguardo dallo schermo.
  Als er die Nachricht hörte, wusste er nicht mehr, wie er den Blick vom Bildschirm *lösen* sollte.
  
  Il prigioniero cercava di *staccare* le mani dalla corda che lo legava, ma invano.
  Der Gefangene versuchte, seine Hände vom Seil, das ihn fesselte, zu *befreien*, doch vergeblich.
  
  Prima di partire, *stacca* la spina del computer per evitare di sprecare energia.
  Bevor du gehst, *ziehe* den Stecker des Computers, um Energieverschwendung zu vermeiden.
  
  Gli esperti hanno consigliato di *staccare* il dispositivo dalla rete elettrica per un’ora ogni giorno.
  Die Experten haben geraten, das Gerät für eine Stunde täglich vom Stromnetz zu *trennen*.
