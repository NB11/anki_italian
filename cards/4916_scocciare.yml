Rang: 4916
Wort: scocciare
Wortart: vt
Wort mit Artikel: scocciare
Femininum / Plural: ''
IPA: ''
Definition: belästigen, stören, nerven
Register: ''
Beispielsätze: |-
  Non voglio *scocciare* i vicini con la musica ad alto volume.
  Ich will die Nachbarn nicht mit lauter Musik *stören*.
  
  Mi *scoccia* quando qualcuno mi interrompe mentre lavoro.
  Es *nervt* mich, wenn mich jemand beim Arbeiten unterbricht.
  
  Se non la smettete di *scocciare*, mi costringete a chiamare la polizia!
  Wenn ihr nicht aufhört, mich zu *belästigen*, seid ihr gezwungen, die Polizei zu rufen!
  
  Mi dispiace se il rumore della strada ti ha *scocciato* durante il sonno.
  Es tut mir leid, wenn dich das Verkehrslärm während des Schlafs *gestört* hat.
  
  Credo che stia per *scocciare* qualcuno con le sue continue lamentele.
  Ich glaube, er wird gleich jemanden mit seinen ständigen Klagen *nerven*.
Audio: ''
Notiz: ''
