Rang: 703
Wort: coinvolgere
Wortart: vt
Wort mit Artikel: coinvolgere
Femininum / Plural: ''
IPA: ''
Definition: einbeziehen, verwickeln
Register: ''
Beispielsätze: |-
  Il regista vuole *coinvolgere* il pubblico nella storia.
  Der Regisseur möchte das Publikum in die Geschichte *einbeziehen*.
  
  Perché hai *coinvolto* tuo fratello in questa faccenda complicata?
  Warum hast du deinen Bruder in diese komplizierte Angelegenheit *verwickelt*?
  
  Se fossi al suo posto, non *coinvolgerei* nessuno in questo problema.
  Wenn ich an seiner Stelle wäre, würde ich niemanden in dieses Problem *einbeziehen*.
  
  L’indagine ha *coinvolto* molte persone innocenti.
  Die Ermittlung hat viele unschuldige Menschen *verwickelt*.
  
  Spero che tu non *coinvolga* altri nei tuoi errori!
  Ich hoffe, dass du andere nicht in deine Fehler *verwickelst*!
