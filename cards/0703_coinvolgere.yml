Rang: 703
Wort: coinvolgere
Wortart: vt
Wort mit Artikel: coinvolgere
Femininum / Plural: ''
IPA: ''
Definition: einbeziehen, einbinden, beteiligen
Register: ''
Beispielsätze: |-
  Spero che la polizia riesca a *coinvolgere* anche altri testimoni nell’indagine.
  Ich hoffe, dass die Polizei auch andere Zeugen in die Ermittlungen *einbeziehen* kann.
  
  Se vuoi *coinvolgere* me in questa missione, devi essere più chiaro con le tue richieste.
  Wenn du mich in diese *Mission* einbinden willst, musst du deine Forderungen klarer äußern.
  
  La festa sarà *coinvolta* tutta la famiglia, come ogni anno per il tuo compleanno.
  Zur Feier werden die ganze Familie *beteiligt*, wie jedes Jahr zu deinem Geburtstag.
  
  Nonostante il parere contrario, hanno deciso di *coinvolgere* anche i bambini nella decisione.
  Trotz gegenteiliger Meinung haben sie beschlossen, auch die Kinder in die *Entscheidung* einzubinden.
  
  Se il regista riesce a *coinvolgere* così profondamente gli attori, chiunque vorrebbe lavorare con lui.
  Wenn es dem Regisseur gelingt, die Schauspieler so tief zu *begeistern*, würde jeder gern mit ihm arbeiten.
