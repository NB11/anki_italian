Rang: 3296
Wort: incidere
Wortart: vt
Wort mit Artikel: incidere
Femininum / Plural: ''
IPA: ''
Definition: einschneiden, prägen, einwirken auf
Register: ''
Beispielsätze: |-
  Questo romanzo *incide* profondamente sulla mia visione della vita.
  Dieser Roman *prägt* meine Lebenssicht tief.
  
  L’artista *ha inciso* un disegno sulla pietra con grande abilità.
  Der Künstler hat ein Bild mit großer Geschicklichkeit *in den Stein geschnitten*.
  
  Se non *incidi* la verdura prima, non potrai cucinarla bene.
  Wenn du das Gemüse nicht vorher *schneidest*, kannst du es nicht gut zubereiten.
  
  È triste vedere come la tecnologia *incida* sulle relazioni umane.
  Es ist traurig zu sehen, wie die Technologie die zwischenmenschlichen Beziehungen *beeinflusst*.
  
  Spero che il tuo intervento *incida* positivamente sul progetto.
  Ich hoffe, dass dein Eingreifen das Projekt positiv *beeinflusst*.
