Rang: 4769
Wort: balcone
Wortart: n.m
Wort mit Artikel: il balcone
Femininum / Plural: balconi
IPA: ''
Definition: der Balkon, -e oder -i
Register: ''
Beispielsätze: |-
  Il *balcone* della mia casa affaccia sul mare e ci passo ogni sera a leggere.
  Der *Balkon* meines Hauses geht aufs Meer hinaus und ich verbringe jeden Abend dort mit Lesen.
  
  Non ho visto chi ha sbattuto la porta del *balcone* stamattina, ma era sicuramente qualcuno di frettoloso.
  Ich habe nicht gesehen, wer heute Morgen die *Balkontür* zugeschlagen hat, aber es war sicher jemand in Eile.
  
  Se avessi un *balcone*, ci metterei delle piante grasse e un piccolo tavolo per prendere il caffè.
  Wenn ich einen *Balkon* hätte, würde ich dort Sukkulenten und einen kleinen Tisch zum Kaffee trinken hinstellen.
  
  Mia nonna mi raccontava sempre che da giovane saliva sul *balcone* per guardare le stelle cadenti.
  Meine Großmutter erzählte mir immer, dass sie als junges Mädchen auf den *Balkon* stieg, um Sternschnuppen zu beobachten.
  
  L’appartamento che sto cercando ha un *balcone* spazioso, ma costa molto più di quanto posso permettermi.
  Die Wohnung, nach der ich suche, hat einen geräumigen *Balkon*, kostet aber viel mehr, als ich mir leisten kann.
