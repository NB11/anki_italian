Rang: 2202
Wort: alcol
Wortart: n.m
Wort mit Artikel: l'alcol
Femininum / Plural: gli alcoli
IPA: ''
Definition: der Alkohol, -e
Register: ''
Beispielsätze: |-
  L’*alcol* in eccesso nuoce alla salute.
  Der übermäßige *Alkohol* schadet der Gesundheit.
  
  Non bevono mai *alcol* durante la settimana.
  Sie trinken *Alkohol* nie während der Woche.
  
  Se avessi saputo che ti fa male l’*alcol*, avrei smesso prima.
  Wenn ich gewusst hätte, dass dir *Alkohol* schadet, hätte ich früher aufgehört.
  
  Dicono che il vino senza *alcol* sia più piacevole di tanti discorsi.
  Sie sagen, dass der alkoholfreie Wein *angenehmer* ist als viele Reden.
  
  Nonostante il divieto, molti giovani consumano *alcol* di nascosto.
  Trotz des Verbots konsumieren viele Jugendliche heimlich *Alkohol*.
