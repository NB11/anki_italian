Rang: 1612
Wort: prete
Wortart: n.m
Wort mit Artikel: il prete
Femininum / Plural: preti
IPA: ''
Definition: der Priester, -
Register: ''
Beispielsätze: |-
  Il *prete* nella chiesa ha benedetto i fedeli durante la funzione religiosa.
  Der *Priester* in der Kirche hat die Gläubigen während der religiösen Zeremonie gesegnet.
  
  Nonostante la conseguenza del furto nella cittadina, il *prete* ha continuato a predicare ogni domenica.
  Trotz der *Folge* des Diebstahls im Ort predigte der Priester jeden Sonntag weiter.
  
  Se avessi saputo che il *prete* avrebbe fatto quella predica imbarazzante, non sarei venuto al teatro con te!
  Wenn ich gewusst hätte, dass der *Priester* diese peinliche Predigt halten würde, wäre ich nicht mit dir ins Theater gegangen!
  
  Il *prete* ha visitato gli ammalati in ospedale e li ha pregato per una guarigione affrettata.
  Der *Priester* hat die Kranken im Krankenhaus besucht und für eine schnelle Genesung zu ihnen gebetet.
  
  Secondo la visione del vescovo, il *prete* dovrebbe specialmente badare alle famiglie in crisi.
  Laut der *Vorstellung* des Bischofs sollte der Priester sich besonders um Familien in der Krise kümmern.
