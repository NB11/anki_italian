Rang: 2422
Wort: candidato
Wortart: n.m
Wort mit Artikel: il candidato
Femininum / Plural: candidati
IPA: ''
Definition: der Kandidat, -en
Register: ''
Beispielsätze: |-
  Il *candidato* ha superato tutti i test di selezione con grande successo.
  Der *Kandidat* hat alle Auswahlverfahren mit großem Erfolg bestanden.
  
  Nonostante le critiche, il *candidato* alla presidenza non ha ritirato la sua candidatura.
  Trotz der Kritik hat der *Kandidat* für das Präsidentenamt seine Bewerbung nicht zurückgezogen.
  
  Vorrei sapere se il *candidato* di cui parli è davvero affidabile.
  Ich würde gerne wissen, ob der *Kandidat*, über den du sprichst, wirklich vertrauenswürdig ist.
  
  Speravamo che il *candidato* più esperto ottenesse la posizione, ma alla fine hanno scelto un altro.
  Wir hatten gehofft, dass der erfahrenste *Kandidat* die Stelle bekommt, aber am Ende haben sie sich für jemand anderen entschieden.
  
  È fondamentale che ogni *candidato* conosca bene le regole del concorso prima di presentare domanda.
  Es ist essenziell, dass jeder *Kandidat* die Wettbewerbsregeln genau kennt, bevor er sich bewirbt.
