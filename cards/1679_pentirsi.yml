Rang: 1679
Wort: pentirsi
Wortart: vr
Wort mit Artikel: pentirsi
Femininum / Plural: ''
IPA: ''
Definition: bereuen
Register: ''
Beispielsätze: |-
  Mi *pento* di non aver studiato di più quando ero all'università.
  Ich *bereue* es, nicht mehr gelernt zu haben, als ich an der Universität war.
  
  Se avessi saputo le conseguenze, forse non mi sarei mai *pentito* di quella decisione.
  Wenn ich die Konsequenzen gekannt hätte, hätte ich mich vielleicht nie *daran* bereut.
  
  Nonostante l'assicurazione copra molti rischi, lui continua a *pentirsi* di aver firmato quel contratto.
  Trotz der Versicherung, die viele Risiken abdeckt, *bereut* er es weiterhin, diesen Vertrag unterzeichnet zu haben.
  
  Prima di *pentirti*, aspetta che la funzione del prodotto risulti chiara.
  *Bereue* es nicht, bevor sich die Funktion des Produkts als klar herausstellt.
  
  Quando la scimmia ha visto il mucchio di banane, ha iniziato a saltare attorno gridando, ma poi si è *pentita* di non aver agito con più calma.
  Als der Affe den Haufen Bananen sah, begann er herumzuspringen und zu schreien, *bereute* es dann aber, nicht ruhiger gehandelt zu haben.
