Rang: 813
Wort: infatti
Wortart: adv
Wort mit Artikel: infatti
Femininum / Plural: ''
IPA: ''
Definition: tatsächlich, in der Tat
Register: ''
Beispielsätze: |-
  Non piove più *infatti* il cielo si è rasserenato nel giro di un'ora.
  Es regnet nicht mehr, *tatsächlich* hat sich der Himmel innerhalb einer Stunde aufgeklärt.
  
  Marco diceva che sarebbe arrivato tardi, e *infatti* lo abbiamo visto entrare solo verso mezzanotte.
  Marco sagte, er würde spät ankommen, und *tatsächlich* haben wir ihn erst gegen Mitternacht hereinkommen sehen.
  
  La situazione sembrava disperata, ma *infatti* il governo ha trovato una soluzione rapida ed efficace.
  Die Lage schien aussichtslos, aber *tatsächlich* hat die Regierung eine schnelle und wirksame Lösung gefunden.
  
  Pensavo che avresti fallito il test, e *infatti* hai preso un brutto voto.
  Ich dachte, du würdest die Prüfung nicht bestehen, und *tatsächlich* hast du eine schlechte Note bekommen.
  
  Non mi fidavo di quella scusa, e *infatti* quando ho controllato era tutto falso come temevo.
  Ich habe mir diese Ausrede nicht zu Herzen genommen, und *tatsächlich* war alles falsch, wie ich befürchtet hatte.
