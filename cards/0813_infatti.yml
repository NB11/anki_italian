Rang: 813
Wort: infatti
Wortart: adv
Wort mit Artikel: infatti
Femininum / Plural: ''
IPA: ''
Definition: tatsächlich, in der Tat, ja
Register: ''
Beispielsätze: |-
  Sai che domani piove? *Infatti* ho visto le previsioni.
  Weißt du, dass es morgen regnet? *Tatsächlich* habe ich die Vorhersagen gesehen.
  
  Lui dice di essere stanco, *infatti* si è addormentato subito.
  Er sagt, er sei müde, *in der Tat* ist er sofort eingeschlafen.
  
  Non mi aspettavo questo risultato, ma *infatti* era proprio così.
  Ich habe dieses Ergebnis nicht erwartet, aber *ja*, es war genau so.
  
  Dicono che l’albergo sia caro, e *infatti* costa molto.
  Sie sagen, das Hotel sei teuer, und *tatsächlich* kostet es viel.
  
  *Infatti*, non avevo voglia di uscire, ho preferito restare a casa.
  *In der Tat* hatte ich keine Lust auszugehen, ich blieb lieber zu Hause.
