Rang: 3024
Wort: scandalo
Wortart: n.m
Wort mit Artikel: lo scandalo
Femininum / Plural: scandali
IPA: ''
Definition: der Skandal, -e
Register: ''
Beispielsätze: |-
  Lo *scandalo* ha coinvolto diversi politici di alto rango.
  Der *Skandal* hat mehrere Politiker hohen Ranges betroffen.
  
  Non mi sembra giusto che tutti parlino di questo *scandalo* senza conoscere i fatti.
  Es scheint mir nicht richtig, dass alle über diesen *Skandal* reden, ohne die Fakten zu kennen.
  
  Se scoprirai un nuovo *scandalo*, dovrai informare immediatamente il direttore.
  Wenn du einen neuen *Skandal* aufdeckst, musst du sofort den Direktor informieren.
  
  L'ho saputo solo perché mia sorella lavora in un giornale che ha pubblicato un articolo sul *scandalo*.
  Ich habe es erst erfahren, weil meine Schwester in einer Zeitung arbeitet, die einen Artikel über den *Skandal* veröffentlicht hat.
  
  Spero che questo *scandalo* non provochi ulteriori divisioni nella nostra comunità.
  Ich hoffe, dass dieser *Skandal* keine weiteren Spaltungen in unserer Gemeinschaft verursacht.
