Rang: 4195
Wort: color
Wortart: n.m
Wort mit Artikel: il color
Femininum / Plural: colori
IPA: ''
Definition: die Farbe, -n
Register: ''
Beispielsätze: |-
  Che *colore* hai scelto per la tua nuova macchina?
  Welche *Farbe* hast du für dein neues Auto gewählt?
  
  Il pittore mescolava i *colori* sulla tavolozza con attenzione.
  Der Maler mischte die *Farben* auf der Palette sorgfältig.
  
  Non ricordo più quale *colore* avesse la sua camicia quella sera.
  Ich erinnere mich nicht mehr, welche *Farbe* sein Hemd an diesem Abend hatte.
  
  Vorresti cambiare il *colore* delle pareti nel tuo ufficio?
  Möchtest du die *Farbe* der Wände in deinem Büro ändern?
  
  I *colori* della bandiera italiana sono verde, bianco e rosso.
  Die *Farben* der italienischen Flagge sind Grün, Weiß und Rot.
