Rang: 2595
Wort: lira
Wortart: n.f
Wort mit Artikel: la lira
Femininum / Plural: lire
IPA: ''
Definition: die Lira, Lire
Register: ''
Beispielsätze: |-
  Nel 2002 l’Italia ha abbandonato la *lira* in favore dell’euro.
  Italien hat im Jahr 2002 die *Lira* durch den Euro ersetzt.
  
  Se avessi ancora qualche *lira* vecchia, potrei venderle come souvenir!
  Wenn ich noch ein paar alte *Lire* hätte, könnte ich sie als Souvenir verkaufen!
  
  La nonna mi ha regalato delle *lire* d’oro che aveva nascosto durante la guerra.
  Meine Oma hat mir einige goldene *Lire* geschenkt, die sie während des Krieges versteckt hatte.
  
  Nonostante il passaggio all’euro, molti italiani ricordano con nostalgia la *lira* e i suoi valori.
  Trotz des Übergangs zum Euro erinnern sich viele Italiener sehnsüchtig an die *Lira* und ihre Werte.
  
  Nel museo ho visto una moneta da cento *lire* con l’effige del re Umberto I.
  Im Museum habe ich eine Hundert-*Lira*-Münze mit dem Porträt von König Umberto I. gesehen.
