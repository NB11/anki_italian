Rang: 1235
Wort: orgoglioso
Wortart: adj
Wort mit Artikel: orgoglioso
Femininum / Plural: ''
IPA: ''
Definition: stolz
Register: ''
Beispielsätze: |-
  Lui è *orgoglioso* di aver superato l'esame con un voto eccellente.
  Er ist *stolz*, die Prüfung mit einer 1 bestanden zu haben.
  
  Nonostante l'assurdo della situazione, Maria rimaneva *orgogliosa* delle sue scelte.
  Trotz der *absurden* Lage blieb Maria stolz auf ihre Entscheidungen.
  
  Siamo *orgogliosi* di far parte di questa serie di eventi così innovativi.
  Wir sind *stolz*, Teil dieser Serie so innovativer Veranstaltungen zu sein.
  
  Se fossi al tuo posto, non sarei così *orgoglioso* dei risultati ottenuti finora.
  Wäre ich an deiner Stelle, wäre ich nicht so *stolz* auf die bisher erreichten Ergebnisse.
  
  È *orgoglioso* del suo stile unico che rappresenta la sua personalità al massimo.
  Er ist *stolz* auf seinen Stil, der seine Persönlichkeit perfekt darstellt.
