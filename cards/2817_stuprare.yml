Wort mit Artikel: stuprare
Femininum / Plural: ''
IPA: ''
Definition: vergewaltigen
Register: ''
Beispielsätze: |-
  Lui è stato arrestato perché ha *stuprato* una donna durante una festa.
  Er wurde festgenommen, weil er eine Frau *während einer Feier vergewaltigt* hat.
  
  Se avessi saputo cosa è successo, avrei *stuprato* il colpevole con un coltello!
  Wenn ich gewusst hätte, was passiert ist, hätte ich den Täter *mit einem Messer erstochen*!
  
  È importante che la polizia *stupri* con fermezza ogni caso di violenza sessuale.
  Es ist wichtig, dass die Polizei jeden Fall von sexualisierter Gewalt *konsequent verfolgt*.
  
  Hanno detto che nessuno avrebbe osato *stuprare* una giovane monaca nel convento.
  Sie sagten, niemand hätte gewagt, eine junge *Nonne* im Kloster zu vergewaltigen.
  
  Quando scoprirai chi ha *stuprato* quella beneficenza, sarai sconvolto.
  Wenn du herausfindest, wer diese *Wohltätigkeitsorganisation betrogen* hat, wirst du schockiert sein.
