Rang: 4115
Wort: cucchiaio
Wortart: n.m
Wort mit Artikel: il cucchiaio
Femininum / Plural: cucchiai
IPA: ''
Definition: der Löffel, -
Register: ''
Beispielsätze: |-
  Metti il *cucchiaio* nella tazza prima di versare il tè, altrimenti scotta.
  Stell den *Löffel* in die Tasse, bevor du den Tee eingießt, sonst verbrennt er.
  
  Ho rotto il *cucchiaio* di legno mentre cercavo di mescolare la zuppa troppo calda.
  Ich habe den *Löffel* aus Holz kaputt gemacht, weil ich versucht habe, die viel zu heiße Suppe umzurühren.
  
  Se non trovi il *cucchiaio*, usa un cucchiaino, ma non sporcare tutta la cucina!
  Wenn du den *Löffel* nicht findest, nimm einen Teelöffel, aber verschmutze nicht die ganze Küche!
  
  Il *cucchiaio* d’argento che hai perso l’altro ieri era un regalo di mia nonna, quindi cercalo bene!
  Den *Löffel* aus Silber, den du vorgestern verloren hast, war ein Geschenk meiner Großmutter, also such ihn gründlich!
  
  Nonostante abbia perso tre *cucchiai* questa settimana, continuo a mangiare la minestra senza problemi.
  Obwohl ich diese Woche drei *Löffel* verloren habe, esse ich weiter die Suppe ohne Probleme.
