Rang: 1921
Wort: scrittore
Wortart: n.m
Wort mit Artikel: lo scrittore
Femininum / Plural: gli scrittori
IPA: ''
Definition: der Schriftsteller, - / der Autor, -en
Register: ''
Beispielsätze: |-
  Lo *scrittore* ha pubblicato il suo ultimo romanzo la settimana scorsa.
  Der *Schriftsteller* hat letzte Woche seinen neuesten Roman veröffentlicht.
  
  Se fossi un *scrittore*, scriverei solo storie di avventura.
  Wenn ich ein *Schriftsteller* wäre, würde ich nur Abenteuergeschichten schreiben.
  
  Credo che lui sia lo *scrittore* più famoso della sua generazione.
  Ich glaube, dass er der *Schriftsteller* der berühmteste seiner Generation ist.
  
  Ho incontrato lo *scrittore* di cui tutti parlano alla presentazione del libro.
  Ich habe den *Schriftsteller* getroffen, über den alle sprechen, bei der Buchvorstellung.
  
  Dopo aver vinto il premio, lo *scrittore* è diventato ancora più richiesto.
  Nachdem er den Preis gewonnen hat, ist der *Schriftsteller* noch gefragter geworden.
