Rang: 3594
Wort: fazzoletto
Wortart: n.m
Wort mit Artikel: il fazzoletto
Femininum / Plural: fazzoletti
IPA: ''
Definition: das Taschentuch, -"er
Register: ''
Beispielsätze: |-
  Mi hai dato il *fazzoletto* perché ho un raffreddore terribile.
  Du hast mir das *Taschentuch* gegeben, weil ich fürchterlich Schnupfen habe.
  
  Se trovi un *fazzoletto* sporco per terra, gettalo nella pattumiera.
  Wenn du ein schmutziges *Taschentuch* auf dem Boden findest, wirf es in den Mülleimer.
  
  Avrei bisogno di un *fazzoletto* pulito per starnutire, per favore!
  Ich bräuchte ein sauberes *Taschentuch*, um zu niesen, bitte!
  
  Il medico mi ha detto che tengo sempre in borsa un *fazzoletto* di stoffa.
  Der Arzt hat mir gesagt, dass ich immer ein Stoff-*Taschentuch* in meiner Tasche habe.
  
  Ho visto che hai in mano un *fazzoletto* con ricami, è un regalo?
  Ich habe gesehen, dass du ein besticktes *Taschentuch* in der Hand hältst, ist das ein Geschenk?
