Rang: 1151
Wort: vampiro
Wortart: n.m
Wort mit Artikel: il vampiro
Femininum / Plural: i vampiri
IPA: ''
Definition: der Vampir, -e
Register: ''
Beispielsätze: |-
  Nella legenda si dice che il *vampiro* non può attraversare l'acqua senza essere identificato dall'ombra.
  In der Legende heißt es, dass der *Vampir* kein Wasser überqueren kann, ohne vom Schatten identifiziert zu werden.
  
  Se incontrassi un *vampiro*, non vorrei che mi stringesse la mano, ma forse vorrei sapere qualcosa sulla sua conoscenza dell’antica cultura.
  Wenn ich einem *Vampir* begegnete, würde ich nicht wollen, dass er mir die Hand drückt, aber vielleicht wollte ich etwas über sein Wissen der alten Kultur erfahren.
  
  Dicono che questo antico castello sia abitato da un *vampiro* che possiede poteri straordinari, ma nessuno ha mai osservato questa creatura direttamente.
  Man sagt, dass dieses alte Schloss von einem *Vampir* bewohnt wird, der außergewöhnliche Kräfte besitzt, doch niemand hat dieses Wesen je direkt beobachtet.
  
  Caro nipote, ricorda che non devi mai confondere un *vampiro* con un lupo mannaro, anche se entrambi minacciano la sicurezza del villaggio.
  Lieber Neffe, erinnere dich, dass du niemals einen *Vampir* mit einem Werwolf verwechseln darfst, auch wenn beide die Sicherheit des Dorfes bedrohen.
  
  È indispensabile che il governo ufficiale identifichi i *vampiri* prima che possano esplodere la loro influenza nel termine di qualche anno.
  Es ist unerlässlich, dass die staatliche Regierung die *Vampire* identifiziert, bevor sie ihren Einfluss innerhalb von einigen Jahren explodieren lassen können.
