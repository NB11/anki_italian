Rang: 2104
Wort: infrangere
Wortart: vt
Wort mit Artikel: infrangere
Femininum / Plural: ''
IPA: ''
Definition: brechen, verletzen
Register: ''
Beispielsätze: |-
  Il mago giurò di non *infrangere* mai il giuramento fatto alla sua fedele apprendista.
  Der Zauberer schwor, den Eid gegenüber seiner *treuen* Schülerin nie zu brechen.
  
  Se *infrangi* questa legge, rischi di danneggiare la reputazione della tua impresa.
  Wenn du dieses Gesetz *brichst*, gefährdest du den Ruf deines Unternehmens.
  
  L’aggressione era così violenta che sembrava *infrangere* ogni limite della decenza umana.
  Der Angriff war so brutal, dass er jeden Anstand zu *brechen* schien.
  
  Gli scienziati temono che le nuove normative *infrangano* il progresso globale raggiunto finora.
  Die Wissenschaftler befürchten, dass die neuen Vorschriften den bisher erreichten weltweiten Fortschritt *brechen*.
  
  Dicevano che nessuno avrebbe mai potuto *infrangere* il sortilegio inciso su quella roccia antica.
  Sie sagten, niemand könne jemals den Fluch brechen, der in diesen alten Felsen geritzt war.
