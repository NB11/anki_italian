Rang: 4842
Wort: custodire
Wortart: vt
Wort mit Artikel: custodire
Femininum / Plural: ''
IPA: ''
Definition: bewachen, hüten, behüten, aufbewahren
Register: ''
Beispielsätze: |-
  Il museo *custodisce* opere d’arte di valore inestimabile.
  Das Museum bewacht Kunstwerke von unschätzbarem Wert.
  
  Hai *custodito* i miei documenti mentre ero via?
  Hast du meine Dokumente *hüten* müssen, während ich weg war?
  
  Non *custodirò* mai i tuoi segreti se continui a tradirmi.
  Ich werde deine Geheimnisse nie *bewahren*, wenn du mich weiterhin verrätst.
  
  I soldati *custodivano* il confine con grande attenzione durante la guerra fredda.
  Die Soldaten *hüteten* die Grenze mit großer Aufmerksamkeit während des Kalten Krieges.
  
  È importante *custodire* con cura le tradizioni familiari di generazione in generazione.
  Es ist wichtig, die Familientraditionen von Generation zu Generation *aufzubewahren*.
Audio: ''
Notiz: ''
Dispersion: ''
