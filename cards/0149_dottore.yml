Rang: 149
Wort: dottore
Wortart: n.m
Wort mit Artikel: il dottore
Femininum / Plural: dottori
IPA: ''
Definition: der Arzt, Ärzte
Register: ''
Beispielsätze: |-
  *Il dottore* sta visitando il paziente.
  Der *Arzt* untersucht gerade den Patienten.
  
  Devo andare dal *dottore* domani mattina.
  Ich muss morgen früh zum *Arzt* gehen.
  
  Spero che il *dottore* arrivi presto.
  Ich hoffe, dass der *Arzt* bald kommt.
  
  Che *dottore* ti ha visitato l'altra volta?
  Welcher *Arzt* hat dich letztes Mal untersucht?
  
  Siamo andati dallo stesso *dottore* per anni.
  Wir sind jahrelang zum gleichen *Arzt* gegangen.
