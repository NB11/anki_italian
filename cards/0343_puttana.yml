Rang: 343
Wort: puttana
Wortart: n.f
Wort mit Artikel: la puttana
Femininum / Plural: puttane
IPA: ''
Definition: die Hure, Nutte, Schlampe
Register: ''
Beispielsätze: |-
  Maria è *puttana* da almeno dieci anni.
  Maria ist *eine Hure* seit mindestens zehn Jahren.
  
  Non dire *puttana* in questa casa!
  Sag nicht *Schlampe* in diesem Haus!
  
  Chi è quella *puttana* che ride sempre?
  Wer ist dieses Mädchen, das immer *lacht*?
  
  Non sopporto che mi chiami *puttana*!
  Ich ertrage es nicht, dass du mich *Hure* nennst!
  
  Le *puttane* della strada hanno bisogno di aiuto.
  Die *Huren* auf der Straße brauchen Hilfe.
