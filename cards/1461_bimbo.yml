Rang: 1461
Wort: bimbo
Wortart: n.m
Wort mit Artikel: il bimbo
Femininum / Plural: i bimbi
IPA: ''
Definition: der Junge, -n
Register: ''
Beispielsätze: |-
  Il *bimbo* gioca felicemente nel parco con gli amici italiani.
  Der *Junge* spielt glücklich im Park mit den italienischen Freunden.
  
  Mio figlio, che è il *bimbo* preferito del nonno, ha ricevuto una giacca nuova.
  Mein Sohn, der der *Lieblingsjunge* des Großvaters ist, hat eine neue Jacke bekommen.
  
  Gli operatori della corte hanno interrogato il *bimbo* sulle recenti decisioni dell’azienda.
  Die Gerichtsbeamten haben den *Jungen* zu den aktuellen Entscheidungen des Unternehmens befragt.
  
  Se il *bimbo* fosse più coraggioso, non avrebbe paura di parlare con le autorità.
  Wenn der *Junge* mutiger wäre, hätte er keine Angst, mit den Behörden zu sprechen.
  
  Il *bimbo* che ho visto stamattina all’aeroporto sembrava molto stanco dopo il lungo volo.
  Der *Junge*, den ich heute Morgen am Flughafen gesehen habe, wirkte nach dem langen Flug sehr müde.
