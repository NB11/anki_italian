Rang: 95
Wort: tenere
Wortart: vt
Wort mit Artikel: tenere
Femininum / Plural: ''
IPA: ''
Definition: halten, festhalten, aufbewahren
Register: ''
Beispielsätze: |-
  Devo *tenere* questo documento in un luogo sicuro.
  Ich muss dieses Dokument an einem sicheren Ort *aufbewahren*.
  
  Vuoi che *tenga* io il cane mentre sei via?
  Soll ich den Hund *halten*, während du weg bist?
  
  *Tenete* la porta aperta per favore!
  Haltet bitte die Tür *offen*!
  
  Credevo che lei *tenesse* alla sua privacy, ma si sbagliava.
  Ich dachte, sie *lege* Wert auf ihre Privatsphäre, aber ich lag falsch.
  
  Se avessi tempo, *terrei* un diario ogni giorno.
  Wenn ich Zeit hätte, würde ich jeden Tag ein Tagebuch *führen*.
