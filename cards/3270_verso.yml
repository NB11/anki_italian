Rang: 3270
Wort: verso
Wortart: n.m
Wort mit Artikel: il verso
Femininum / Plural: i versi
IPA: ''
Definition: die Richtung, -en
Register: ''
Beispielsätze: |-
  Il vento soffia sempre *verso* la costa quando tira la tramontana.
  Der Wind weht immer *in Richtung* der Küste, wenn der Nordwind weht.
  
  Non so *verso* quale direzione devo andare per trovare l'ufficio postale.
  Ich weiß nicht, *in welche* Richtung ich gehen muss, um das Postamt zu finden.
  
  Ha cercato aiuto *verso* sera, quando la solitudine si faceva più pesante.
  Er/sie suchte Hilfe *gegen* Abend, als die Einsamkeit schwerer wurde.
  
  Gli studenti si sono messi a gridare *verso* il cielo, protestando contro la decisione del rettore.
  Die Student:innen begannen, *gegen* den Himmel zu schreien und protestierten gegen die Entscheidung des Rektors.
  
  Il treno parte *verso* le cinque del pomeriggio, quindi dobbiamo sbrigarci.
  Der Zug fährt *gegen* fünf Uhr nachmittags ab, also müssen wir uns beeilen.
