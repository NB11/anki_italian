Beispielsätze: |-
  L'*antidoto* per questo veleno è molto raro da trovare.
  Das *Gegenmittel* für dieses Gift ist sehr selten zu finden.
  
  Se non trovi l'*antidoto* in tempo, rischi di morire.
  Wenn du das *Gegenmittel* nicht rechtzeitig findest, riskierst du zu sterben.
  
  Hanno prodotto un nuovo *antidoto* contro i morsi dei serpenti.
  Sie haben ein neues *Gegenmittel* gegen Schlangenbisse hergestellt.
  
  L'*antidoto* che mi hai dato ha funzionato alla perfezione.
  Das *Gegenmittel*, das du mir gegeben hast, hat perfekt gewirkt.
  
  Prima che arrivasse l'*antidoto*, il paziente era già in condizioni critiche.
  Bevor das *Gegenmittel* ankam, war der Patient bereits in kritischem Zustand.
