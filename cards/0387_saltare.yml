Rang: 387
Wort: saltare
Wortart: v
Wort mit Artikel: saltare
Femininum / Plural: ''
IPA: ''
Definition: springen, hüpfen, überspringen
Register: ''
Beispielsätze: |-
  Ogni mattina *saltiamo* la corda per riscaldarci.
  Jeden Morgen *springen* wir Seil, um uns aufzuwärmen.
  
  Perché *hai saltato* quella parte del capitolo?
  Warum *hast du* diesen Teil des Kapitels *übersprungen*?
  
  Se *salterai* il semaforo rosso, pagherai una multa.
  Wenn du *bei Rot über die Ampel springst*, bekommst du ein Bußgeld.
  
  Non *saltiamo* a conclusioni affrettate!
  *Ziehen wir* bitte keine voreiligen Schlüsse!
  
  Il cane *saltò* felice quando vide il suo padrone.
  Der Hund *sprang* fröhlich, als er seinen Besitzer sah.
Audio: ''
Notiz: ''
Dispersion: ''
