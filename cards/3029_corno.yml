Rang: 3029
Wort: corno
Wortart: n.m
Wort mit Artikel: il corno
Femininum / Plural: corni
IPA: ''
Definition: das Horn, Hörner
Register: ''
Beispielsätze: |-
  Il musicista soffia nel *corno* per produrre un suono potente.
  Der Musiker bläst in das *Horn*, um einen kräftigen Klang zu erzeugen.
  
  Durante la caccia, abbiamo visto un cervo con grandi *corni*.
  Während der Jagd haben wir einen Hirsch mit großen *Hörnern* gesehen.
  
  Non appena ha aperto la porta, il cane ha abbaiato verso il *corno* dell’angolo.
  Sobald er die Tür geöffnet hat, hat der Hund in Richtung des *Horns* in der Ecke gebellt.
  
  Gli antichi romani usavano il *corno* per chiamare le truppe alla battaglia.
  Die alten Römer nutzten das *Horn*, um die Truppen zur Schlacht zu rufen.
  
  Se trovassi un *corno* d’oro nel bosco, pensi che sia un tesoro o solo un oggetto strano?
  Wenn du ein goldenes *Horn* im Wald finden würdest, meinst du, das wäre ein Schatz oder nur ein seltsames Objekt?
