Rang: 4817
Wort: scorciatoia
Wortart: n.f
Wort mit Artikel: la scorciatoia
Femininum / Plural: scorciatoie
IPA: ''
Definition: der Abkürzungsweg, Umweg
Register: ''
Beispielsätze: |-
  Quando ero piccolo, ho scoperto una *scorciatoia* attraverso il bosco che portava a scuola.
  Als ich klein war, habe ich einen *Abkürzungsweg* durch den Wald zur Schule entdeckt.
  
  Non prendere *scorciatoie* quando guidi di notte, potresti perderti.
  Nimm nachts keine *Abkürzungswege*, du könntest dich verlaufen.
  
  Per arrivare prima, seguo spesso questa *scorciatoia*, anche se poi devo attraversare il parco.
  Um schneller anzukommen, nehme ich oft diesen *Abkürzungsweg*, auch wenn ich dann den Park durchqueren muss.
  
  Se vuoi evitare il traffico, la *scorciatoia* dietro la stazione è la migliore soluzione.
  Wenn du den Verkehr vermeiden willst, ist die *Abkürzung* hinter dem Bahnhof die beste Lösung.
  
  Ha trovato una *scorciatoia* per finire il progetto prima della scadenza, ma rischia di sbagliare.
  Er hat einen *Abkürzungsweg* gefunden, um das Projekt vor dem Ablauf zu beenden, aber er riskiert, Fehler zu machen.
