Rang: 54
Wort: piacere
Wortart: vi
Wort mit Artikel: piacere
Femininum / Plural: ''
IPA: ''
Definition: gefallen, mögen
Register: ''
Beispielsätze: |-
  Mi *piace* molto leggere libri gialli.
  Mir *gefällt* es sehr, Kriminalromane zu lesen.
  
  Ti *piacciono* i film di fantascienza?
  *Gefallen* dir Science-Fiction-Filme?
  
  A Paola non *piaceva* affatto cucinare.
  *Gefiel* Paola das Kochen überhaupt nicht.
  
  Mi *piacerebbe* visitare la Toscana l’anno prossimo.
  Ich *würde* gerne im nächsten Jahr die Toskana *besuchen*.
  
  Mi dispiace, ma non lo *piacerebbe* a nessuno di noi.
  Es tut mir leid, aber das würde *niemanden* von uns *mögen*.
