Rang: 54
Wort: piacere
Wortart: vi
Wort mit Artikel: piacere
Femininum / Plural: ''
IPA: ''
Definition: gefallen, mögen
Register: ''
Beispielsätze: |-
  Mi *piace* molto il gelato alla fragola.
  Ich *mag* Erdbeereis sehr.
  
  Ti è *piaciuto* il film ieri sera?
  *Hat* dir der Film gestern Abend *gefallen*?
  
  Mi *piaceva* giocare a calcio quando ero bambino.
  Ich *hatte* es gern, Fußball zu spielen, als ich ein Kind war.
  
