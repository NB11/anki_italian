Rang: 3191
Wort: duca
Wortart: n.m
Wort mit Artikel: il duca
Femininum / Plural: duchi
IPA: ''
Definition: der Herzog, -e
Register: ''
Beispielsätze: |-
  Il *duca* di Milano governava una grande tenuta agricola.
  Der *Herzog* von Mailand regierte einen großen landwirtschaftlichen Besitz.
  
  Durante il Medioevo, molti *duchi* erano potenti signori della guerra.
  Im Mittelalter waren viele *Herzöge* mächtige Kriegsherren.
  
  Il professor Rossi, che era un *duca* per lignaggio, amava studiare la storia delle civiltà antiche.
  Professor Rossi, der von Abstammung ein *Herzog* war, liebte es, die Geschichte alter Kulturen zu studieren.
  
  Dicono che il *duca* abbia concesso la garanzia per il salvataggio del villaggio.
  Man sagt, der *Herzog* habe die Garantie für die Rettung des Dorfes gewährt.
  
  Se tu fossi un *duca*, come vorresti che fosse il tuo stemma?
  Wenn du ein *Herzog* wärst, wie sähe dein Wappen aus?
