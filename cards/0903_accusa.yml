Rang: 903
Wort: accusa
Wortart: n.f
Wort mit Artikel: la accusa
Femininum / Plural: accuse
IPA: ''
Definition: die Anklage, -n
Register: ''
Beispielsätze: |-
  La *accusa* contro l’imputato è stata respinta dal giudice per mancanza di prove.
  Die *Anklage* gegen den Angeklagten wurde vom Richter wegen fehlender Beweise abgelehnt.
  
  Se fossi il giudice, non avrei mai avanzato un’*accusa* così debole.
  Wenn ich Richter wäre, hätte ich niemals eine so schwache *Anklage* erhoben.
  
  L’avvocato difensore cercherà di smontare ogni *accusa* durante il processo.
  Der Verteidiger wird versuchen, jede *Anklage* während des Prozesses zu widerlegen.
  
  Hanno ritirato l’*accusa* dopo che il testimone ha confessato di aver mentito.
  Sie haben die *Anklage* zurückgezogen, nachdem der Zeuge gestanden hat, gelogen zu haben.
  
  Nonostante le molte *accuse*, lei è sempre rimasta calma e sicura di sé.
  Trotz der vielen *Anklagen* blieb sie stets ruhig und selbstsicher.
