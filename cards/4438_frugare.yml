Rang: 4438
Wort: frugare
Wortart: v
Wort mit Artikel: frugare
Femininum / Plural: ''
IPA: ''
Definition: herumwühlen, durchstöbern
Register: ''
Beispielsätze: |-
  Mentre *frugava* nella sua borsa, non si accorse che qualcuno lo osservava attentamente.
  Während er *herumwühlte* in seiner Tasche, bemerkte er nicht, dass ihn jemand genau beobachtete.
  
  La polizia ha *frugato* l’appartamento alla ricerca di prove.
  Die Polizei hat die Wohnung durchstöbert um Beweise zu finden.
  
  Se avessi tempo, *frugerei* in quella scatola piena di ricordi.
  Wenn ich Zeit hätte, würde ich *durchstöbern* diese Kiste voller Erinnerungen.
  
  Dicono che nel suo archivio ci siano documenti che potrebbero essere *frugati* dagli investigatori.
  Man sagt, in seinem Archiv gebe es Dokumente, die von den Ermittlern *durchstöbert* werden könnten.
  
  Nonostante il divieto, qualcuno ha *frugato* nei cassetti dell’ufficio del direttore.
  Trotz des Verbots hat jemand in den Schubladen des Direktorbüros *herumgewühlt*.
