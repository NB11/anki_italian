Rang: 4032
Wort: lucido
Wortart: adj
Wort mit Artikel: lucido
Femininum / Plural: ''
IPA: ''
Definition: glänzend, glatt, blank
Register: ''
Beispielsätze: |-
  Il pavimento deve essere *lucido* per la cerimonia di stasera.
  Der Boden muss für die Zeremonie heute Abend *glänzend* sein.
  
  Non sapevo che la tua *lucida* superficie fosse così fragile!
  Ich wusste nicht, dass deine *glatte* Oberfläche so zerbrechlich ist!
  
  Ha strofinato il vetro finché non è diventato perfettamente *lucido*.
  Er hat die Scheibe so lange poliert, bis sie perfekt *blank* wurde.
  
  La scrivania era coperta di polvere, ma il piano rimaneva *lucido* sotto.
  Der Schreibtisch war voller Staub, doch die Platte blieb darunter *glatt*.
  
  Porta sempre uno specchio *lucido* nella borsetta per i controlli di sicurezza.
  Er trägt immer einen *glänzenden* Spiegel in der Handtasche für Sicherheitskontrollen.
