Rang: 4555
Wort: gestione
Wortart: n.f
Wort mit Artikel: la gestione
Femininum / Plural: gestioni
IPA: ''
Definition: die Verwaltung, -en
Register: ''
Beispielsätze: |-
  La *gestione* del progetto è affidata a un team specializzato.
  Die *Verwaltung* des Projekts wird einem spezialisierten Team übertragen.
  
  Dopo la sua *gestione* fallimentare, l'azienda ha chiuso i battenti.
  Nach seiner gescheiterten *Verwaltung* hat das Unternehmen zugemacht.
  
  Sarebbe meglio affidare la *gestione* di questo ufficio a qualcuno più esperto.
  Es wäre besser, die *Verwaltung* dieses Büros jemandem mit mehr Erfahrung zu überlassen.
  
  La *gestione* dei dati personali deve rispettare la legge sulla privacy.
  Die *Verwaltung* personenbezogener Daten muss das Datenschutzgesetz einhalten.
  
  Con una *gestione* così inefficiente, non c'è da stupirsi se i clienti sono insoddisfatti.
  Bei einer so ineffizienten *Verwaltung* wundert es nicht, dass die Kunden unzufrieden sind.
