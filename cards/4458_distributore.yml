Rang: 4458
Wort: distributore
Wortart: n.m
Wort mit Artikel: il distributore
Femininum / Plural: distributori
IPA: ''
Definition: der Automat, -en
Register: ''
Beispielsätze: |-
  Dove posso trovare un *distributore* di benzina aperto di notte?
  Wo kann ich eine Tankstelle finden, die *nachts* geöffnet hat?
  
  Prima di partire ho riempito il serbatoio al *distributore* vicino alla stazione.
  Vor der Abfahrt habe ich den Tank an der Tankstelle *nahe* dem Bahnhof gefüllt.
  
  Non funzionava nessun *distributore* di bevande nel parco, così ho comprato una bottiglia d'acqua altrove.
  Kein Getränke*automat* im Park funktionierte, also kaufte ich woanders eine Wasserflasche.
  
  Il *distributore* automatico di caffè è stato aggiustato ieri sera, ora funziona perfettamente.
  Der Kaffee*automat* wurde gestern Abend repariert und funktioniert jetzt perfekt.
  
  Se non trovi il *distributore* giusto, chiedi a qualcuno che lo ha usato recentemente.
  Wenn du nicht den richtigen *Automaten* findest, frag jemanden, der ihn kürzlich benutzt hat.
