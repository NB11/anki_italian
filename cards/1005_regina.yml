Rang: 1005
Wort: regina
Wortart: n.f
Wort mit Artikel: la regina
Femininum / Plural: regine
IPA: ''
Definition: die Königin, -nen
Register: ''
Beispielsätze: |-
  La *regina* ha firmato il decreto questa mattina nella capitale.
  Die *Königin* hat heute Morgen das Dekret in der Hauptstadt unterzeichnet.
  
  Se vuoi visitare il palazzo reale, devi prenotare *regina* in anticipo.
  Wenn du den Königspalast besichtigen möchtest, musst du *Königin* im Voraus buchen.
  
  Tutti credevano che la *regina* fosse malata, ma in realtà era solo un raffreddore.
  Alle dachten, die *Königin* sei krank, aber in Wahrheit hatte sie nur eine Erkältung.
  
  Secondo la leggenda, la *regina* non aveva eredi maschi, quindi la corona passò al cugino.
  Laut der Sage hatte die *Königin* keine männlichen Erben, daher ging die Krone an den Cousin über.
  
  Quando il sceriffo arrivò al confine dell’isola, trovò la *regina* che aspettava sulla spiaggia.
  Als der *Sheriff* an der Grenze der Insel ankam, traf er die Königin, die am Strand wartete.
