Definition: wecken, aufwecken
Register: ''
Beispielsätze: |-
  Mi *sveglio* alle sette ogni mattina.
  Ich *wache* jeden Morgen um sieben Uhr *auf*.
  
  Hai già *svegliato* tuo fratello per la scuola?
  Hast du deinen Bruder schon für die Schule *aufgeweckt*?
  
  Domani Carlo verrà a *svegliarmi* alle cinque.
  Morgen wird Carlo mich um fünf Uhr *aufwecken*.
  
  Mi dispiace, non volevo *svegliarti* ieri sera.
  Es tut mir leid, ich wollte dich gestern Abend nicht *aufwecken*.
  
  Se non *svegliamo* presto il cane, perderemo il treno.
  Wenn wir den Hund nicht bald *aufwecken*, verpassen wir den Zug.
