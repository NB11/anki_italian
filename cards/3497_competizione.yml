Rang: 3497
Wort: competizione
Wortart: n.f
Wort mit Artikel: la competizione
Femininum / Plural: competizioni
IPA: ''
Definition: der Wettbewerb, -e, die Konkurrenz
Register: ''
Beispielsätze: |-
  La *competizione* tra le due squadre era molto accesa durante il campionato.
  Der *Wettbewerb* zwischen den beiden Teams war während der Meisterschaft sehr hitzig.
  
  Nonostante abbia perso, non provo alcun rancore nei confronti del vincitore della *competizione*.
  Obwohl ich verloren habe, empfinde ich keinen *Groll* gegen den Sieger des Wettbewerbs.
  
  Se avessi saputo della *competizione* di cucina, avrei partecipato sicuramente con una mia ricetta di salsiccia.
  Wenn ich von dem Koch-*Wettbewerb* gewusst hätte, hätte ich bestimmt mit einem eigenen Wurst-Rezept teilgenommen.
  
  È fondamentale che gli organizzatori garantiscano la trasparenza della *competizione*, altrimenti gli atleti potrebbero sentirsi truffati.
  Es ist entscheidend, dass die Veranstalter die Transparenz des *Wettbewerbs* garantieren, sonst könnten sich die Athleten betrogen fühlen.
  
  Dopo mesi di allenamento, finalmente ho vinto la prima *competizione* di arrampicata della mia vita.
  Nach Monaten des Trainings habe ich endlich meinen ersten Kletter-*Wettbewerb* gewonnen.
