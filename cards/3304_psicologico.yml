Wort: psicologico
Wortart: adj
Wort mit Artikel: psicologico
Femininum / Plural: ''
IPA: ''
Definition: psychologisch
Register: ''
Beispielsätze: |-
  Lo studio ha evidenziato un impatto *psicologico* molto forte sulla popolazione dopo l’incidente.
  Die Studie zeigte eine sehr starke *psychologische* Auswirkung auf die Bevölkerung nach dem Unfall.
  
  Se avessi un problema *psicologico*, andrei da uno specialista senza esitare.
  Hätte ich ein *psychologisches* Problem, würde ich sofort zu einem Spezialisten gehen.
  
  Nonostante le difficoltà economiche, la loro famiglia ha resistito grazie a un forte equilibrio *psicologico*.
  Trotz der wirtschaftlichen Schwierigkeiten hielt ihre Familie durch dank einer starken *psychologischen* Stabilität.
  
  I test *psicologici* rivelano spesso tratti della personalità che non sospettavamo.
  *Psychologische* Tests offenbaren oft Persönlichkeitsmerkmale, die wir nicht vermuteten.
  
  È *psicologicamente* provato che le relazioni sane migliorano la qualità della vita.
  Es ist *psychologisch* nachgewiesen, dass gesunde Beziehungen die Lebensqualität verbessern.
