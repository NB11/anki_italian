Rang: 2499
Wort: puzzare
Wortart: v
Wort mit Artikel: puzzare
Femininum / Plural: ''
IPA: ''
Definition: stinken, riechen
Register: ''
Beispielsätze: |-
  Questo formaggio *puzza* da lontano perché è andato a male.
  Dieser Käse *stinkt* schon von Weitem, weil er verdorben ist.
  
  Non capisco perché la stanza *puzzi* di fumo dopo che ho aperto la finestra.
  Ich verstehe nicht, warum das Zimmer nach Rauch *riecht*, obwohl ich das Fenster geöffnet habe.
  
  Hai sentito? Il cane *puzzava* di pesce quando è tornato dalla passeggiata.
  Hast du es bemerkt? Der Hund *roch* nach Fisch, als er vom Spaziergang zurückkam.
  
  Se il latte *puzzerà* dopo due giorni in frigo, buttalo via subito.
  Wenn die Milch nach zwei Tagen im Kühlschrank *stinken* wird, wirf sie sofort weg.
  
  Era *puzzato* di sudore dopo aver corso sotto il sole per mezz'ora.
  Er *roch* nach Schweiß, nachdem er eine halbe Stunde lang in der Sonne gelaufen war.
