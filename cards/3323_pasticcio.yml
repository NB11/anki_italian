Rang: 3323
Wort: pasticcio
Wortart: n.m
Wort mit Artikel: il pasticcio
Femininum / Plural: i pasticci
IPA: ''
Definition: der Teigkuchen, die Pastete, das Durcheinander
Register: ''
Beispielsätze: |-
  Ho preparato un *pasticcio* di carne per cena, ma si è bruciato in forno.
  Ich habe einen *Teigkuchen* aus Fleisch zum Abendessen zubereitet, aber er ist im Ofen angebrannt.
  
  Il *pasticcio* in cui ti trovi ora è colpa di decisioni sbagliate prese tempo fa.
  Das *Durcheinander*, in dem du dich jetzt befindest, ist das Ergebnis von Fehlentscheidungen, die du vor längerer Zeit getroffen hast.
  
  Spero che il *pasticcio* diplomatico tra i due paesi trovi presto una soluzione.
  Ich hoffe, dass das diplomatische *Durcheinander* zwischen den beiden Ländern bald eine Lösung findet.
  
  Non avrei mai pensato di finire in un simile *pasticcio* dopo aver firmato quel contratto.
  Ich hätte nie gedacht, dass ich nach der Unterzeichnung dieses Vertrags in einem solchen *Durcheinander* landen würde.
  
  Quando ero piccolo, facevo sempre un *pasticcio* di fango in giardino dopo la pioggia.
  Als ich klein war, habe ich nach dem Regen immer einen *Teigkuchen* aus Matsch im Garten gemacht.
