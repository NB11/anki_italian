Rang: 1349
Wort: debito
Wortart: n.m
Wort mit Artikel: il debito
Femininum / Plural: i debiti
IPA: ''
Definition: die Schuld, -en
Register: ''
Beispielsätze: |-
  Ho un *debito* con la banca da quando ho acquistato l’auto.
  Ich habe eine *Schuld* bei der Bank, seit ich das Auto gekauft habe.
  
  Se non paghi il *debito*, l’ispettore potrebbe sequestrare il tuo albergo.
  Wenn du die *Schuld* nicht begleichst, könnte der Inspektor dein Hotel beschlagnahmen.
  
  Aveva accumulato così tanti *debiti* che dovette rifare il suo particolare guardaroba.
  Er/Sie hatte so viele *Schulden* angehäuft, dass er/sie sich die besondere Garderobe neu machen musste.
  
  Chiunque nasconde un *debito* nasconde anche la vergogna che ne deriva.
  Wer eine *Schuld* versteckt, verbirgt auch die damit verbundene Scham.
  
  Senza un *debito* da pagare, la sua vita sarebbe decisamente più serena.
  Ohne eine *Schuld*, die zu begleichen ist, wäre sein/ihr Leben eindeutig entspannter.
