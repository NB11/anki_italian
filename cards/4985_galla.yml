Rang: 4985
Wort: galla
Wortart: n.m
Wort mit Artikel: la galla
Femininum / Plural: galle
IPA: ''
Definition: der Apfelbrand, -äpfel
Register: ''
Beispielsätze: |-
  Mia nonna usa sempre la *galla* di mele per preparare il sidro fatto in casa.
  Meine Oma verwendet immer den *Apfelbrand* von Äpfeln zur Herstellung des selbstgemachten Apfelweins.
  
  È scoppiata una *galla* su questo albero da frutto, ma non abbiamo ancora capito il motivo.
  An diesem Obstbaum ist ein *Apfelbrand* aufgeplatzt, aber wir haben noch nicht herausgefunden, warum.
  
  Se vuoi una bevanda analcolica, puoi sostituire il vino con il succo di *galla* fermentato.
  Wenn du ein alkoholfreies Getränk möchtest, kannst du den Wein durch fermentierten *Apfelbrand*-Saft ersetzen.
  
  Questa ricetta richiede una *galla* matura, altrimenti il sapore non sarà intenso.
  Dieses Rezept verlangt einen reifen *Apfelbrand*, sonst wird der Geschmack nicht intensiv sein.
  
  Nel frutteto abbiamo notato che le *galle* compaiono soprattutto dopo le piogge primaverili.
  In der Obstplantage haben wir festgestellt, dass der *Apfelbrand* vor allem nach den Frühlingsregen auftritt.
