Rang: 1425
Wort: proporre
Wortart: vt
Wort mit Artikel: proporre
Femininum / Plural: ''
IPA: ''
Definition: vorschlagen, unterbreiten
Register: ''
Beispielsätze: |-
  Il sindaco *propone* di costruire una nuova scuola nella sezione centrale della città.
  Der Bürgermeister *schlägt* vor, eine neue Schule in dem zentralen Abschnitt der Stadt zu bauen.
  
  Se vuoi dimagrire, ti consiglio di *proporre* al tuo insegnante un programma di dieta più equilibrato.
  Wenn du abnehmen willst, rate ich dir, deinem Lehrer ein ausgewogeneres Ernährungsprogramm *vorzuschlagen*.
  
  Nonostante il disturbo, lui *propone* di andare direttamente alla banda per risolvere il problema.
  Trotz der Störung *schlägt* er vor, direkt zur Bande zu gehen, um das Problem zu lösen.
  
  Mi hanno detto che *propone* di regalare un doppios a sua moglie per il compleanno.
  Man hat mir gesagt, dass er *vorschlägt*, seiner Frau zum Geburtstag eine doppelte Portion zu schenken.
  
  Il proprietario dell'azienda ci *propone* un nuovo ruolo nel progetto, ma dobbiamo parlarne seriamente insieme.
  Der Besitzer des Unternehmens *unterbreitet* uns eine neue Rolle im Projekt, aber wir müssen darüber ernsthaft gemeinsam sprechen.
