Rang: 4869
Wort: drive
Wortart: n.f
Wort mit Artikel: la drive
Femininum / Plural: le drive
IPA: ''
Definition: die Fahrt, -en
Register: ''
Beispielsätze: |-
  La *drive* è stata molto lunga e faticosa a causa del traffico intenso.
  Die *Fahrt* war sehr lang und anstrengend wegen des starken Verkehrs.
  
  Spero che la tua *drive* di ritorno sia più tranquilla della andata!
  Ich hoffe, dass deine *Fahrt* zurück ruhiger als die Hinfahrt ist!
  
  Durante la *drive* notturna abbiamo visto delle stelle cadenti magnifiche.
  Bei der nächtlichen *Fahrt* haben wir wunderschöne Sternschnuppen gesehen.
  
  Se avessimo preso la *drive* attraverso la valle, saremmo arrivati prima.
  Wenn wir die *Fahrt* durchs Tal genommen hätten, wären wir früher angekommen.
  
  Mi dispiace per il ritardo, ma a causa di un incidente la *drive* è stata bloccata per due ore.
  Es tut mir leid für die Verspätung, aber wegen eines Unfalls war die *Fahrt* für zwei Stunden blockiert.
