Rang: 709
Wort: tv
Wortart: n.m
Wort mit Artikel: il tv
Femininum / Plural: televisori
IPA: ''
Definition: der Fernseher, -
Register: ''
Beispielsätze: |-
  Ho comprato un *televisore* nuovo perché quello vecchio non funzionava più.
  Ich habe einen *Fernseher* gekauft, weil der alte nicht mehr funktioniert hat.
  
  Mentre mangiavo il pranzo, mio fratello guardava il *televisore* in cucina.
  Während ich das Mittagessen gegessen habe, hat mein Bruder den *Fernsehapparat* in der Küche angeschaut.
  
  Non permetto ai bambini di guardare troppo spesso il *televisore* la sera.
  Ich erlaube den Kindern nicht, abends zu oft den *Fernseher* zu schauen.
  
  Se avessi più tempo, vorrei comprare un *televisore* con uno schermo grande.
  Wenn ich mehr Zeit hätte, würde ich mir einen *Fernseher* mit einem großen Bildschirm kaufen.
  
  Nonostante le molte offerte, non ho ancora deciso quale *televisore* acquistare per il soggiorno.
  Trotz der vielen Angebote habe ich mich noch nicht entschieden, welchen *Fernseher* ich für das Wohnzimmer kaufen soll.
