Rang: 2631
Wort: veronica
Wortart: n.f
Wort mit Artikel: la veronica
Femininum / Plural: le veroniche
IPA: ''
Definition: die Veronica (Pflanzenname)
Register: ''
Beispielsätze: |-
  Ho trovato una *Veronica* nel mio giardino che fiorisce ogni primavera.
  Ich habe eine *Veronica* in meinem Garten gefunden, die jeden Frühling blüht.
  
  La *Veronica* è una pianta che ama l'ombra e l'umidità.
  Die *Veronica* ist eine Pflanze, die Schatten und Feuchtigkeit liebt.
  
  Vorresti piantare qualche *Veronica* nel tuo balcone?
  Möchtest du ein paar *Veronicas* auf deinen Balkon pflanzen?
  
  La *Veronica* che ho ricevuto in regalo era già fiorita.
  Die *Veronica*, die ich geschenkt bekommen habe, war bereits in Blüte.
  
  Le *Veroniche* blu sono le mie preferite tra tutte le varietà.
  Die blauen *Veronicas* sind meine Lieblingsvarietäten von allen.
