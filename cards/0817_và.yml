Rang: 817
Wort: và
Wortart: v
Wort mit Artikel: và
Femininum / Plural: ''
IPA: ''
Definition: gehen, fahren
Register: ''
Beispielsätze: |-
  Dove *và* di bello con quella valigia pesante?
  Wohin geht er denn mit diesem schweren Koffer?
  
  Il *va* dal dottore perché non si sente bene da giorni.
  Er *geht* zum Arzt, weil er sich seit Tagen nicht gut fühlt.
  
  Se avessi tempo, *andrei* al mare invece di lavorare.
  Wenn ich Zeit hätte, *würde* ich sicherlich ans Meer fahren, statt zu arbeiten.
  
  Nonostante la pioggia, *va* sempre a caccia con il suo amico Henry.
  Trotz des Regens *geht* er immer mit seinem Freund Henry auf die Jagd.
  
  Chi *va* alla chiesa per consegnare la lettera al don?
  Wer *geht* zur Kirche, um dem Herrn die Nachricht zu überbringen?
