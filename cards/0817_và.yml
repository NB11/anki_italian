Wort mit Artikel: và
Femininum / Plural: ''
IPA: ''
Definition: gehen
Register: ''
Beispielsätze: |-
  Lui *va* al lavoro ogni mattina alle otto.
  Er *geht* jeden Morgen um acht zur Arbeit.
  
  *Vai* spesso al cinema con i tuoi amici?
  *Gehst* du oft mit deinen Freunden ins Kino?
  
  Non *vado* mai a correre di sera perché fa freddo.
  Ich *gehe* nie abends laufen, weil es kalt ist.
  
  Domani *andrò* al mare se il tempo sarà bello.
  Morgen *werde ich* ans Meer gehen, wenn das Wetter schön ist.
  
  Lei disse che *sarebbe andata* in biblioteca dopo la scuola.
  Sie sagte, sie *würde* nach der Schule in die Bibliothek gehen.
