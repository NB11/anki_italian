Rang: 4287
Wort: invertire
Wortart: v
Wort mit Artikel: invertire
Femininum / Plural: ''
IPA: ''
Definition: umkehren, umdrehen, umstellen
Register: ''
Beispielsätze: |-
  Se vuoi *invertire* la rotta della barca, devi tirare forte la corda a sinistra.
  Wenn du die Fahrtrichtung des Bootes *umkehren* willst, musst du das Seil links stark ziehen.
  
  Hanno *invertito* l’ordine di arrivo perché c’era stato un errore nella preparazione della gara.
  Sie haben die Ankunftsreihenfolge *umgestellt*, weil es einen Fehler bei der Vorbereitung des Wettbewerbs gab.
  
  Non è facile *invertire* una decisione che hai preso anni fa, ma forse oggi posso processare diversamente quella scelta.
  Es ist nicht leicht, eine Entscheidung, die du vor Jahren getroffen hast, *umzukehren*, aber heute kann ich diese Wahl vielleicht anders verarbeiten.
  
  Il giudice ha ordinato di *invertire* la sentenza perché sono emerse prove inconsapevoli che scagionano l’imputato.
  Der Richter hat angeordnet, das Urteil *umzudrehen*, weil unerwartete Beweise den Angeklagten entlasten.
  
  Quando *invertirai* la rotta della tua vita? Oppure preferisci perseverare in questa direzione fatale?
  Wann wirst du die Richtung deines Lebens *umkehren*? Oder möchtest du lieber in dieser verhängnisvollen Richtung verharren?
