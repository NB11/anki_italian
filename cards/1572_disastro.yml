Rang: 1572
Wort: disastro
Wortart: n.m
Wort mit Artikel: il disastro
Femininum / Plural: disastri
IPA: ''
Definition: die Katastrophe, -n
Register: ''
Beispielsätze: |-
  Dopo l’**disastro** naturale, molti abitanti della nazione* hanno perso la loro casa.
  Nach der *Katastrophe* haben viele Einwohner der Nation ihr Haus verloren.
  
  Il ministro ha deciso di descrivere al pubblico le vere conseguenze dello *disastro*.
  Der Minister hat beschlossen, die wahren *Folgen* der Katastrophe der Öffentlichkeit zu beschreiben.
  
  Se avessero seguito le norme, forse l’**disastro*** non sarebbe accaduto.
  Wenn sie die Regeln befolgt hätten, wäre die *Katastrophe* vielleicht nicht passiert.
  
  Secondo gli scienziati, il ***disastro*** ambientale ha influenzato il clima per anni.
  Laut den Wissenschaftlern hat die umwelt*Katastrophe* das Klima jahrelang beeinflusst.
  
  Nonostante il gravissimo *disastro*, i soccorsi sono arrivati in tempo per salvare molte vite.
  Trotz der schweren *Katastrophe* kamen die Rettungskräfte rechtzeitig, um viele Leben zu retten.
