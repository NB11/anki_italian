Definition: positionieren, anordnen
Register: ''
Beispielsätze: |-
  Dobbiamo *posizionare* il radar su una collina per coprire l'intera zona.
  Wir müssen das Radar auf einem Hügel *positionieren*, um das gesamte Gebiet abzudecken.
  
  Il candidato si chiede dove *posizionare* il proprio limite nella ricerca della perfezione.
  Der Bewerber fragt sich, wo er die eigene Grenze bei der Suche nach Perfektion *setzen* soll.
  
  Inserisci il chip nel lettore per *posizionare* correttamente il dispositivo.
  Stecke den Chip in das Lesegerät, damit das Gerät richtig *positioniert* wird.
  
  Se *posizionerai* il server in questa stanza, otterrai una migliore connessione di rete.
  Wenn du den *Server* in diesem Raum aufstellst, wirst du eine bessere Netzwerkverbindung erhalten.
  
  Nonostante l'immobile fosse vecchio, gli architetti riuscirono a *posizionare* gli elementi strutturali in modo armonioso.
  Obwohl das *Gebäude* alt war, gelang es den Architekten, die Bauelemente harmonisch anzuordnen.
