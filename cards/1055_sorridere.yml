Rang: 1055
Wort: sorridere
Wortart: vi
Wort mit Artikel: sorridere
Femininum / Plural: ''
IPA: ''
Definition: lächeln
Register: ''
Beispielsätze: |-
  Quando la *sorride*, tutti si sentono felici intorno a lei.
  Wenn sie *lächelt*, fühlen sich alle um sie herum glücklich.
  
  Avrei voluto *sorridere* di più, ma ero troppo stanco dopo il viaggio.
  Ich hätte gern mehr *lächeln* wollen, aber ich war nach der Reise zu müde.
  
  Vorrei che tu *sorridessi* più spesso, anche nei momenti difficili.
  Ich wünschte, du würdest öfter *lächeln*, auch in schwierigen Momenten.
  
  Dopo aver ricevuto la notizia, non riuscì a *sorridere* per giorni.
  Nachdem sie die Nachricht erhalten hatte, konnte sie tagelang nicht *lächeln*.
  
  Non appena la reggente lo vide, cominciò a *sorridere* e gli porse la mano.
  Sobald die Regentin ihn sah, begann sie zu *lächeln* und reichte ihm die Hand.
