Beispielsätze: |-
  L'*etichetta* sui vestiti è sempre importante per sapere come lavarli correttamente.
  Das *Etikett* auf den Kleidern ist immer wichtig, um zu wissen, wie man sie wäscht.
  
  Nonostante le sue origini modeste, ha acquisito una *etichetta* di celebrità grazie ai social media.
  Trotz seines bescheidenen Ursprungs hat er durch die sozialen Medien den *Ruf* eines Prominenten erlangt.
  
  Se non rispetti l'*etichetta* in questa scuola, potresti avere problemi con gli insegnanti severi.
  Wenn du dich nicht an die *Regeln* dieser Schule hältst, könntest du mit den strengen Lehrern Ärger bekommen.
  
  Ha letto l'*etichetta* del farmaco tre volte prima di assumere la dose prescritta.
  Er hat das *Etikett* des Medikaments dreimal gelesen, bevor er die verschriebene Dosis eingenommen hat.
  
  Secondo l'*etichetta* di questo vino, si consiglia di berlo a una temperatura di 16 gradi.
  Laut dem *Etikett* dieser Weinflasche empfiehlt es sich, ihn bei einer Temperatur von 16 Grad zu trinken.
