Rang: 1616
Wort: bersaglio
Wortart: n.m
Wort mit Artikel: il bersaglio
Femininum / Plural: bersagli
IPA: ''
Definition: das Ziel, -e
Register: ''
Beispielsätze: |-
  Il *bersaglio* è stato spostato di cinque km più in là.
  Das *Ziel* wurde fünf km weiter nach hinten verschoben.
  
  Nonostante la crisi, sono riusciti a centrare il *bersaglio* con precisione.
  Trotz der *Krise* schafften sie es, das Ziel präzise zu treffen.
  
  Se non badate al *bersaglio*, rischiate di fallire l'obiettivo.
  Wenn ihr euch nicht um das *Ziel* kümmert, riskiert ihr, das Vorhaben zu verfehlen.
  
  Il *bersaglio* della nostra terapia è migliorare la qualità della vita.
  Das *Ziel* unserer Therapie ist es, die Lebensqualität zu verbessern.
  
  Quell'attore recita sempre la stessa parte, ma oggi ha centrato il *bersaglio* con una versione nuova.
  Jener *Schauspieler* spielt immer dieselbe Rolle, doch heute traf er mit einer neuen Version ins Ziel.
