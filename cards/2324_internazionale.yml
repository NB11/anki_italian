Beispielsätze: |-
  L'accordo *internazionale* per la riduzione delle emissioni è stato firmato ieri.
  Das *internationale* Abkommen zur Reduzierung der Emissionen wurde gestern unterzeichnet.
  
  Se avessi più risorse, potremmo organizzare un torneo *internazionale* di calcio.
  Wenn wir mehr Ressourcen hätten, könnten wir ein *internationales* Fußballturnier organisieren.
  
