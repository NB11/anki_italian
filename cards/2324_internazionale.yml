  Trotz der Finanzkrise verzeichnete die *internationale* Messe in Mailand großen Erfolg.
  
  Le organizzazioni *internazionali* spesso lavorano per risolvere conflitti tra paesi.
  Die *internationalen* Organisationen arbeiten oft daran, Konflikte zwischen Ländern zu lösen.
  
  È necessario che tutti i cittadini rispettino le normative *internazionali* per la sicurezza.
  Es ist notwendig, dass alle Bürger die *internationalen* Sicherheitsvorschriften einhalten.
