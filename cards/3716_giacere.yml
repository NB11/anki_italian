Rang: 3716
Wort: giacere
Wortart: vi
Wort mit Artikel: giacere
Femininum / Plural: ''
IPA: ''
Definition: liegen, sich befinden
Register: ''
Beispielsätze: |-
  Il cadavere *giaceva* sul pavimento da ore, ancora caldo.
  Die Leiche *lag* seit Stunden auf dem Boden, noch warm.
  
  Dopo la lunga camminata, abbiamo deciso di *giacere* all'ombra di un albero.
  Nach dem langen Marsch beschlossen wir, uns im Schatten eines Baumes *auszustrecken*.
  
  Lo scrittore spera che il suo nuovo romanzo *giaccia* ancora sui scaffali delle librerie.
  Der Autor hofft, dass sein neuer Roman noch immer in den Regalen der Buchhandlungen *zu finden ist*.
  
  La città antica *giace* sepolta sotto metri di terra da secoli.
  Die antike Stadt *liegt* seit Jahrhunderten unter Metern von Erde begraben.
  
  Se non ti muovi, finirò per *giacere* qui come un defunto.
  Wenn du dich nicht bewegst, werde ich hier wie ein Toter *herumliegen*.
