Rang: 544
Wort: insomma
Wortart: adv
Wort mit Artikel: insomma
Femininum / Plural: ''
IPA: ''
Definition: kurz gesagt, nun, also
Register: ''
Beispielsätze: |-
  Che ne pensi del film? *Insomma*… non è male, ma poteva essere migliore.
  Was denkst du über den Film? *Kurz gesagt*… er ist nicht schlecht, aber er hätte besser sein können.
  
  *Insomma*, possiamo andare al cinema o no?
  *Also*, können wir ins Kino gehen oder nicht?
  
  Non sapevo cosa fare, *insomma* ho deciso di restare a casa.
  Ich wusste nicht, was ich tun sollte, *nun* habe ich beschlossen, zu Hause zu bleiben.
  
  Sei soddisfatto del risultato? - *Insomma*… potevo fare di meglio.
  Bist du mit dem Ergebnis zufrieden? - *Kurz gesagt*… ich hätte es besser machen können.
  
  Non ho voglia di discutere, *insomma*! Lasciami in pace!
  Ich habe keine Lust zu diskutieren, *also*! Lass mich in Ruhe!
