Rang: 544
Wort: insomma
Wortart: adv
Wort mit Artikel: insomma
Femininum / Plural: ''
IPA: ''
Definition: kurz gesagt, schließlich
Register: ''
Beispielsätze: |-
  Non so esattamente cosa sia successo, *insomma* è stato un disastro!
  Ich weiß nicht genau, was passiert ist, *kurz gesagt* war es eine Katastrophe!
  
  Hai fatto il caffè? Bene, *insomma* ho bisogno di energia per il viaggio.
  Hast du den *Kaffee* gemacht? Gut, schließlich brauche ich Energie für die Reise.
  
  Non capiva nulla di quello che dicevo, *insomma* ho rinunciato a spiegare.
  Er verstand nichts von dem, was ich sagte, *schließlich* habe ich aufgegeben, es zu erklären.
  
  Ci ha promesso di sistemare tutto entro oggi, ma *insomma* è ancora tutto in scompiglio!
  Er hat versprochen, alles heute zu regeln, aber *schließlich* herrscht immer noch Chaos!
  
  Diceva che sarebbe arrivato presto, ma *insomma* non si è visto neanche dopo un’ora.
  Er sagte, er würde bald ankommen, aber *schließlich* ist er selbst nach einer Stunde nicht aufgetaucht.
