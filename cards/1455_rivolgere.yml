Rang: 1455
Wort: rivolgere
Wortart: vt
Wort mit Artikel: rivolgere
Femininum / Plural: ''
IPA: ''
Definition: richten, wenden, lenken
Register: ''
Beispielsätze: |-
  Ti prego di *rivolgere* lo sguardo verso di me durante la presentazione.
  Ich bitte dich, deinen Blick *auf mich zu richten* während der Präsentation.
  
  Vorrei *rivolgere* alcune domande al responsabile dell’azienda, se possibile.
  Ich möchte dem *Verantwortlichen* des Unternehmens ein paar Fragen stellen, wenn möglich.
  
  Non saprei proprio chi altro *rivolgere* questa richiesta così delicata.
  Ich wüsste wirklich nicht, wen ich sonst mit dieser so heiklen Bitte *ansprechen* sollte.
  
  Se avrò tempo, domattina *rivolgerò* una mail al direttore per chiarire la situazione.
  Falls ich Zeit habe, werde ich morgen früh dem Direktor eine E-Mail *schicken*, um die Situation zu klären.
  
  È stato il suo atteggiamento a *rivolgere* l’attenzione di tutti su di lui in modo inaspettato.
  Es war ihre Haltung, die alle Blicke unerwartet *auf ihn lenkte*.
