Rang: 1984
Wort: giovanotto
Wortart: n.m
Wort mit Artikel: il giovanotto
Femininum / Plural: giovanotti
IPA: ''
Definition: junger Mann, junger Kerl
Register: ''
Beispielsätze: |-
  Quel *giovanotto* sta leggendo un romanzo interessante.
  Jener *junge Mann* liest einen interessanten Roman.
  
  Non ho mai visto un *giovanotto* così atletico come lui.
  Ich habe noch nie einen *jungen Kerl* so athletisch wie ihn gesehen.
  
  Il *giovanotto* che hai incontrato ieri è il fratello di Lucia?
  Der *junge Mann*, den du gestern getroffen hast, ist Lucias Bruder?
  
  Sembrava un *giovanotto* molto intelligente, ma ha fatto degli errori stupidi.
  Er wirkte wie ein sehr kluger *junger Kerl*, aber er hat dumme Fehler gemacht.
  
  Appena ho visto il *giovanotto* attraversare la strada con tanta fretta, ho capito che c’era qualcosa di strano.
  Sobald ich den *jungen Mann* mit so großer Eile die Straße überqueren sah, wusste ich, dass etwas Seltsames im Gange war.
