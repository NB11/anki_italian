Rang: 4897
Wort: cappuccino
Wortart: n.m
Wort mit Artikel: il cappuccino
Femininum / Plural: i cappuccini
IPA: ''
Definition: der Cappuccino, -s
Register: ''
Beispielsätze: |-
  Vorrei un *cappuccino* con un cornetto, per favore.
  Ich möchte einen *Cappuccino* mit einem Croissant, bitte.
  
  Ha ordinato un *cappuccino* ma gli hanno portato un caffè lungo per errore.
  Er hat einen *Cappuccino* bestellt, aber sie haben ihm aus Versehen einen langen Kaffee gebracht.
  
  Sai che in alcuni paesi il *cappuccino* dopo le 11 di mattina non si beve più?
  Weißt du, dass man in manchen Ländern nach 11 Uhr morgens keinen *Cappuccino* mehr trinkt?
  
  Se avessi tempo, berrei ogni mattina un *cappuccino* seduto al bar.
  Wenn ich Zeit hätte, würde ich jeden Morgen einen *Cappuccino* in der Bar trinken.
  
  Nonostante sia a dieta, non riesce a rinunciare al suo *cappuccino* serale.
  Trotz seiner Diät kann er auf seinen abendlichen *Cappuccino* nicht verzichten.
