Rang: 4051
Wort: scopa
Wortart: n.f
Wort mit Artikel: la scopa
Femininum / Plural: scope
IPA: ''
Definition: der Besen, -
Register: ''
Beispielsätze: |-
  Ho spazzato il pavimento con una *scopa* nuova.
  Ich habe den Boden mit einem *neuen Besen* gefegt.
  
  La *scopa* elettrica ha risparmiato un sacco di fatica alle nostre mani!
  Der *Staubsauger* hat uns in den Händen viel Mühe erspart!
  
  Se non avessi perso la *scopa*, ora non dovrei comprare un'altra.
  Wenn ich den *Besen* nicht verloren hätte, müsste ich mir jetzt keinen neuen kaufen.
  
  Quando ero piccolo, mio nonno mi insegnò a usare la *scopa* per pulire il cortile.
  Als ich klein war, zeigte mir mein Opa, wie man den *Besen* benutzt, um den Hof zu kehren.
  
  Nonostante la *scopa* fosse rotta, riuscì comunque a pulire tutta la stanza in mezz’ora.
  Obwohl der *Besen* kaputt war, schaffte sie es trotzdem, das ganze Zimmer in einer halben Stunde zu reinigen.
