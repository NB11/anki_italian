Rang: 4254
Wort: disperdere
Wortart: v
Wort mit Artikel: disperdere
Femininum / Plural: ''
IPA: ''
Definition: zerstreuen, verschwinden lassen
Register: ''
Beispielsätze: |-
  Il vento ha *disperso* le nuvole in pochi minuti.
  Der Wind hat die Wolken in wenigen Minuten *zerstreut*.
  
  Se non *disperdi* i tuoi dubbi, non riuscirai a concentrarti.
  Wenn du deine Zweifel nicht *zerstreust*, wirst du dich nicht konzentrieren können.
  
  L’avvocato sperava di *disperdere* le accuse contro il suo cliente.
  Der Anwalt hoffte, die Anschuldigungen gegen seinen Mandanten *zu entkräften*.
  
  La polizia ha cercato di *disperdere* la folla durante la protesta.
  Die Polizei versuchte, die Menschenmenge während der Proteste *auseinanderzutreiben*.
  
  Dopo la tempesta, la nebbia cominciò a *disperdersi* lentamente.
  Nach dem Sturm begann sich der Nebel langsam *zu verziehen*.
