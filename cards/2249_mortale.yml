Rang: 2249
Wort: mortale
Wortart: adj
Wort mit Artikel: mortale
Femininum / Plural: ''
IPA: ''
Definition: sterblich, tödlich
Register: ''
Beispielsätze: |-
  Gli esseri umani sono *mortali*, ma alcune leggende narrano di creature immortali.
  Der Mensch ist *sterblich*, aber einige Legenden erzählen von unsterblichen Wesen.
  
  Questa sostanza è *mortale* se ingerita in grandi quantità, avverte il cartello.
  Diese Substanz ist *tödlich*, wenn sie in großen Mengen eingenommen wird, warnt das Schild.
  
  Non vorrei sembrarti cinico, ma la guerra è una realtà *mortale* che distrugge intere generazioni.
  Ich möchte nicht zynisch klingen, aber der Krieg ist eine *tödliche* Realität, die ganze Generationen zerstört.
  
  Il medico ha spiegato che il paziente ha una ferita *mortale* al petto e non ci sono speranze.
  Der Arzt erklärte, der Patient habe eine *tödliche* Wunde an der Brust, und es gebe keine Hoffnung.
  
  Gli antichi greci credevano che gli dei fossero *mortali* solo in determinate circostanze.
  Die alten Griechen glaubten, die Götter seien nur unter bestimmten Umständen *sterblich*.
