Rang: 3845
Wort: iniziativa
Wortart: n.f
Wort mit Artikel: l'iniziativa
Femininum / Plural: iniziative
IPA: ''
Definition: die Initiative, -n
Register: ''
Beispielsätze: |-
  Ha avuto l'*iniziativa* di organizzare una raccolta fondi per la riabilitazione dei bambini.
  Er hatte die *Initiative*, eine Spendenaktion für die Rehabilitation von Kindern zu organisieren.
  
  Senza una chiara *iniziativa* da parte del governo, molti problemi rimangono irrisolti.
  Ohne eine klare *Initiative* seitens der Regierung bleiben viele Probleme ungelöst.
  
  Avrei dovuto prendere *un'iniziativa* prima che fosse troppo tardi.
  Ich hätte eine *Initiative* ergreifen sollen, bevor es zu spät war.
  
  L'*iniziativa* del sindaco per ridurre l'inquinamento ha ricevuto molti consensi.
  Die *Initiative* des Bürgermeisters zur Reduzierung der Umweltverschmutzung fand viel Zustimmung.
  
  Spetta a te avere l'*iniziativa* e proporre nuove idee al team.
  Es liegt an dir, die *Initiative* zu ergreifen und dem Team neue Ideen vorzuschlagen.
