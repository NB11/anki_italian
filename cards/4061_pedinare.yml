Rang: 4061
Wort: pedinare
Wortart: vt
Wort mit Artikel: pedinare
Femininum / Plural: ''
IPA: ''
Definition: beschatten, beschatten, nachspionieren
Register: ''
Beispielsätze: |-
  La polizia ha *pedinato* il rapinatore per diverse ore prima dell'arresto.
  Die Polizei hat den Räuber mehrere Stunden lang *beschattet* bevor sie ihn festnahmen.
  
  Se *pedinerai* qualcuno senza motivo, potresti avere problemi legali.
  Wenn du jemanden ohne Grund *bespitzelst*, könntest du rechtliche Probleme bekommen.
  
  Mi sembra che qualcuno mi *pedini* da quando sono uscito di casa.
  Mir scheint, jemand *spioniert* mir nach, seit ich das Haus verlassen habe.
  
  Nonostante le proteste dei cittadini, il governo continua a *pedinare* gli oppositori politici.
  Trotz der Proteste der Bürger lässt die Regierung die politischen Gegner weiterhin *beschatten*.
  
  Ho incaricato un investigatore di *pedinare* mio marito perché sospettavo un tradimento.
  Ich habe einen Privatdetektiv beauftragt, meinen Mann zu *beschatten*, weil ich einen Betrug vermutete.
