Rang: 4931
Wort: testata
Wortart: n.f
Wort mit Artikel: la testata
Femininum / Plural: testate
IPA: ''
Definition: der Schlag, -äge, die Schlagzeile, -n
Register: ''
Beispielsätze: |-
  Il giornale ha pubblicato una *testata* scandalosa sulla politica italiana.
  Die Zeitung hat eine *Schlagzeile* über die italienische Politik veröffentlicht.
  
  Durante la partita ha subito una *testata* inaspettata dall'avversario.
  Während des Spiels hat er einen *Schlag* vom Gegner abbekommen.
  
  La *testata* del romanzo era così emozionante che l'ho letto in una sola sera.
  Der *Titel* des Romans war so fesselnd, dass ich ihn an einem Abend durchlas.
  
  Hanno usato la *testata* di un elmetto per rompere la porta.
  Sie haben die *Stirnseite* eines Helms benutzt, um die Tür einzuschlagen.
  
  La *testata* del letto era in legno massiccio, molto antico.
  Das *Kopfende* des Bettes war aus massivem Holz und sehr alt.
