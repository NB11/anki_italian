Rang: 4358
Wort: rivoltare
Wortart: vt
Wort mit Artikel: rivoltare
Femininum / Plural: ''
IPA: ''
Definition: umdrehen, wenden, umstülpen
Register: ''
Beispielsätze: |-
  Il cuoco *rivolta* la frittata con delicatezza per non romperla.
  Der Koch dreht das Omelett mit Vorsicht um, um es nicht zu brechen.
  
  Non *rivoltare* la pagina finché non avrai letto tutto il capitolo!
  Drehe die Seite nicht um, solange du das ganze Kapitel nicht gelesen hast!
  
  Gli investigatori hanno *rivoltato* l’appartamento intero per cercare indizi.
  Die Ermittler haben die ganze Wohnung *auf den Kopf gestellt*, um Hinweise zu finden.
  
  Se *rivoltassimo* le carte sul tavolo, perderemmo il gioco.
  Wenn wir die Karten auf dem Tisch umdrehen würden, würden wir das Spiel verlieren.
  
  Si dice che gli antichi alchimisti cercassero di *rivoltare* i metalli in oro.
  Man sagt, die alten Alchemisten hätten versucht, Metalle in Gold umzuwandeln.
Audio: ''
Notiz: ''
