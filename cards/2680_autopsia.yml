Rang: 2680
Wort: autopsia
Wortart: n.f
Wort mit Artikel: la autopsia
Femininum / Plural: autopsie
IPA: ''
Definition: die Obduktion, -en
Register: ''
Beispielsätze: |-
  Il medico legale ha eseguito *l’autopsia* sul cadavere questa mattina.
  Der Rechtsmediziner hat *die Obduktion* an der Leiche heute Morgen durchgeführt.
  
  Senza *un’autopsia* approfondita non possiamo sapere la causa della morte.
  Ohne *eine gründliche Obduktion* können wir die Todesursache nicht feststellen.
  
  Secondo il rapporto, *l’autopsia* ha rivelato una ferita da arma da fuoco alla testa.
  Dem Bericht zufolge hat *die Obduktion* eine Schusswunde am Kopf aufgedeckt.
  
  Se ci fossero dubbi sulla morte violenta, bisognerebbe ordinare *l’autopsia*.
  Bei Zweifeln an einem gewaltsamen Tod müsste man *eine Obduktion* anordnen.
  
  È stato istituito un nuovo protocollo che prevede *l’autopsia* in tutti i casi di morte improvvisa.
  Es wurde ein neues Protokoll eingeführt, das *die Obduktion* in allen Fällen von plötzlichem Tod vorsieht.
