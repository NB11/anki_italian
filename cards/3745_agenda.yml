Rang: 3745
Wort: agenda
Wortart: n.f
Wort mit Artikel: l'agenda
Femininum / Plural: agende
IPA: ''
Definition: die Agenda, -en
Register: ''
Beispielsätze: |-
  L'ho messa nell'*agenda* per non dimenticarla.
  Ich habe sie in der *Agenda* vermerkt, um sie nicht zu vergessen.
  
  Domani devo aggiornare la mia *agenda* con le nuove scadenze.
  Morgen muss ich meine *Agenda* mit den neuen Fristen aktualisieren.
  
  Mi ha mostrato l'*agenda* piena di impegni, era davvero fitta.
  Sie zeigte mir die *Agenda*, die voller Termine war – sie war wirklich vollgepackt.
  
  Spero che questa *agenda* digitale ti aiuti a organizzare meglio il lavoro.
  Ich hoffe, dass dich diese digitale *Agenda* bei der besseren Arbeitsorganisation unterstützt.
  
  Non appena trovo il mio *agenda*, ti dirò esattamente quando possiamo incontrarci.
  Sobald ich meine *Agenda* finde, sage ich dir genau, wann wir uns treffen können.
