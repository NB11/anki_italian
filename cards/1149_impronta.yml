Rang: 1149
Wort: impronta
Wortart: n.f
Wort mit Artikel: l'impronta
Femininum / Plural: impronte
IPA: ''
Definition: der Abdruck, -¨e, die Spur, -en
Register: ''
Beispielsätze: |-
  L'*impronta* digitale permette di identificare una persona con sicurezza.
  Das *Fingerabdruck* ermöglicht es, eine Person sicher zu identifizieren.
  
  Dopo la pioggia, ho trovato un'*impronta* di scarpa nel fango vicino al ponte.
  Nach dem Regen habe ich eine *Spur* im Schlamm in der Nähe der Brücke gefunden.
  
  La polizia ha usato l'*impronta* lasciata sulla scena del crimine per trovare il colpevole.
  Die Polizei hat die *Spur*, die am Tatort hinterlassen wurde, genutzt, um den Täter zu finden.
  
  Se non avessi dimenticato le chiavi, avremmo potuto evitare questo *impronta* sulla porta!
  Wenn ich nicht die Schlüssel vergessen hätte, hätten wir diese *Delle* an der Tür vermeiden können!
  
  Nonostante il freddo, abbiamo camminato attraverso il villaggio fino a raggiungere la montagna, dove abbiamo osservato un'*impronta* di lupo nella neve.
  Trotz der *Kälte* sind wir durch das Dorf bis zum Berg gewandert, wo wir eine Wolfsspur im Schnee beobachtet haben.
