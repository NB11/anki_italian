  Es ist wichtig, dass du *persönlich* die Dokumente vor der Lieferung überprüfst, vertraue nicht anderen.
  
  Se *personalmente* avessi visto quello che è successo, non ci avrei creduto neanche io.
  Wenn ich *persönlich* gesehen hätte, was passiert ist, hätte ich es selbst nicht geglaubt.
