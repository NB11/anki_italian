Rang: 2663
Wort: spuntare
Wortart: v
Wort mit Artikel: spuntare
Femininum / Plural: ''
IPA: ''
Definition: sprossen, keimen, auftauchen
Register: ''
Beispielsätze: |-
  I semi hanno *spuntato* dopo appena due giorni di pioggia.
  Die Samen sind nach nur zwei Regentagen *aufgekeimt*.
  
  Non appena il sole *spunterà*, andremo a fare una passeggiata in campagna.
  Sobald die Sonne *aufgeht*, werden wir einen Spaziergang auf dem Land machen.
  
  Mi domando quando *spunteranno* finalmente i primi germogli nel mio giardino.
  Ich frage mich, wann in meinem Garten endlich die ersten Triebe *sprossen*.
  
  Nel documentario hanno spiegato perché quest’anno le rose *spuntano* con due settimane di anticipo.
  Im Dokumentarfilm haben sie erklärt, warum die Rosen dieses Jahr zwei Wochen früher *aufspießen*.
  
  Se *spuntasse* un’alternativa valida, sarei il primo ad adottarla.
  Wenn eine *brauchbare Alternative *auftauchen* würde, wäre ich der Erste, der sie übernimmt.
