Rang: 2693
Wort: domestico
Wortart: adj
Wort mit Artikel: domestico
Femininum / Plural: ''
IPA: ''
Definition: häuslich, Haus-, inländisch
Register: ''
Beispielsätze: |-
  Il gatto *domestico* dorme tutto il giorno sul divano.
  Die *haus*katze schläft den ganzen Tag auf dem Sofa.
  
  Abbiamo adottato un cane che, nonostante sia *domestico*, ha ancora molta energia.
  Wir haben einen Hund adoptiert, der, obwohl er *haus*tiermäßig ist, noch viel Energie hat.
  
  La routine *domestica* può essere diversa da paese a paese.
  Die *haus*haltsroutine kann von Land zu Land unterschiedlich sein.
  
  Nonostante il lavoro *domestico* sia faticoso, molti lo svolgono con passione.
  Obwohl die *haus*arbeit anstrengend ist, erledigen sie viele mit Leidenschaft.
  
  Vorrei assumere una *domestica* che mi aiuti con le faccende, ma al momento non posso permettermelo.
  Ich würde gerne eine *Haus*hälterin einstellen, die mir hilft, aber im Moment kann ich mir das nicht leisten.
