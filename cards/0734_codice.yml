Rang: 734
Wort: codice
Wortart: n.m
Wort mit Artikel: il codice
Femininum / Plural: codici
IPA: ''
Definition: der Code, -s / der Kode, -s
Register: ''
Beispielsätze: |-
  Non ho capito il *codice* di accesso al sito web.
  Ich habe das *Zugangscode* der Website nicht verstanden.
  
  Il poliziotto ha trovato un *codice* nascosto nel telefonino del sospettato.
  Der Polizist hat einen versteckten *Code* auf dem Handy des Verdächtigen gefunden.
  
  Se inserisci il *codice* sbagliato, il sistema si bloccherà automaticamente.
  Wenn du den falschen *Code* eingibst, wird das System automatisch gesperrt.
  
  Gli hacker cercano sempre di violare i *codici* di sicurezza più complessi.
  Hacker versuchen immer, die komplexesten *Codes* für Sicherheitssysteme zu knacken.
  
  Mio fratello lavora in una società che sviluppa *codici* per applicazioni bancarie.
  Mein Bruder arbeitet in einer Firma, die *Codes* für Bankanwendungen entwickelt.
