Rang: 43
Wort: capire
Wortart: vt
Wort mit Artikel: capire
Femininum / Plural: ''
IPA: ''
Definition: verstehen, begreifen
Register: ''
Beispielsätze: |-
  Non *capisco* perché non vuoi venire con noi.
  Ich *verstehe* nicht, warum du nicht mit uns kommen willst.
  
  *Capirai* tutto quando leggerai il manuale.
  Du *wirst alles verstehen*, wenn du die Anleitung liest.
  
  Speravo che lui *capisse* meglio il problema.
  Ich hoffte, dass er das Problem besser *versteht*.
  
  *Capiamo* sempre perfettamente le istruzioni.
  Wir *begreifen* die Anweisungen immer perfekt.
  
  Se avessi parlato più chiaro, *avrei capito* subito.
  Wenn du deutlicher gesprochen hättest, *hätte ich es sofort verstanden*.
