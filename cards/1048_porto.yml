Rang: 1048
Wort: porto
Wortart: n.m
Wort mit Artikel: il porto
Femininum / Plural: porti
IPA: ''
Definition: der Hafen, -
Register: ''
Beispielsätze: |-
  Il *porto* di Napoli è uno dei più importanti del Mediterraneo.
  Der *Hafen* von Neapel ist einer der wichtigsten des Mittelmeers.
  
  Hanno attraversato il *porto* in barca per raggiungere l’isola.
  Sie haben den *Hafen* mit dem Boot überquert, um die Insel zu erreichen.
  
  Se vuoi fare una passeggiata, passeggia lungo il *porto* di sera.
  Wenn du spazieren gehen möchtest, gehe abends am *Hafen* entlang.
  
  Il capitano ha riferito che il *porto* sarà chiuso per lavori fino a domani.
  Der Kapitän hat mitgeteilt, dass der *Hafen* bis morgen wegen Arbeiten geschlossen bleibt.
  
  Quel *porto* è così grande che ci vogliono due giorni per visitarlo tutto.
  Dieser *Hafen* ist so groß, dass man zwei Tage braucht, um ihn vollständig zu besichtigen.
