Wort: fico
Wortart: n.m
Wort mit Artikel: il fico
Femininum / Plural: fichi
IPA: ''
Definition: die Feige, -n
Register: ''
Beispielsätze: |-
  Ho comprato *fichi* freschi al mercato.
  Ich habe *Feigen* am Markt gekauft.
  
  D’estate mi piace mangiare un *fico* direttamente dall’albero.
  Im Sommer esse ich gern eine *Feige* direkt vom Baum.
  
  Non sapevo che questo dolce contiene *fichi* secchi!
  Ich wusste nicht, dass dieser Kuchen *Feigen* enthält!
  
  I *fichi* che hanno comprato ieri sono già maturi.
  Die *Feigen*, die sie gestern gekauft haben, sind schon reif.
  
  Se vuoi un dessert con *fichi*, ti consiglio questa ricetta.
  Wenn du ein Dessert mit *Feigen* möchtest, empfehle ich dir dieses Rezept.
