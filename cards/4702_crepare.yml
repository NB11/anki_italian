Rang: 4702
Wort: crepare
Wortart: vi
Wort mit Artikel: crepare
Femininum / Plural: ''
IPA: ''
Definition: abkratzen, verrecken
Register: ''
Beispielsätze: |-
  Se *crepi* domani, chi ti rimpiangerà?
  Wenn du morgen *abkratzt*, wer wird dich dann vermissen?
  
  Ha *crepato* di fame dopo il lungo viaggio.
  Er ist vor Hunger fast *verreckt* nach der langen Reise.
  
  Credevo che l’acqua *crepasse* il cemento, ma mi sbagliavo.
  Ich dachte, das Wasser würde den Beton *zerfressen*, aber ich lag falsch.
  
  Se non aggiusti quel computer, finirà per *crepare* di noia!
  Wenn du diesen Computer nicht reparierst, geht er mir noch vor *Langeweile kaputt*!
  
  Lo staff dice che la stampante è già lì lì per *crepare*.
  Das Personal sagt, der Drucker steht kurz davor zu *verrecken*.
