Rang: 3565
Wort: creazione
Wortart: n.f
Wort mit Artikel: la creazione
Femininum / Plural: creazioni
IPA: ''
Definition: die Schöpfung, -en, die Erschaffung, -en
Register: ''
Beispielsätze: |-
  La *creazione* dell’universo è un mistero che affascina scienziati e filosofi.
  Die *Schöpfung* des Universums ist ein Rätsel, das Wissenschaftler und Philosophen fasziniert.
  
  Secondo la leggenda, Prometeo rubò il fuoco agli dei per donarlo agli uomini nella sua *creazione* più audace.
  Der Legende nach stahl Prometheus den Göttern das Feuer, um es den Menschen in seiner kühnsten *Erschaffung* zu schenken.
  
  La mostra presentava una *creazione* artistica che mescolava tecniche antiche e moderne.
  Die Ausstellung zeigte eine künstlerische *Schöpfung*, die antike und moderne Techniken vermischte.
  
  Dopo anni di studio, ha finalmente pubblicato la sua *creazione* letteraria più originale.
  Nach Jahren des Studiums veröffentlichte sie endlich ihre originellste literarische *Erschaffung*.
  
  La *creazione* di questo nuovo quartiere ha sollevato molte polemiche tra gli abitanti.
  Die *Erschöpfung* dieses neuen Stadtviertels hat unter den Anwohnern viele Kontroversen ausgelöst.
