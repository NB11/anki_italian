Rang: 4925
Wort: dinamite
Wortart: n.m
Wort mit Artikel: il dinamite
Femininum / Plural: dinamiti
IPA: ''
Definition: das Dynamit, -e
Register: ''
Beispielsätze: |-
  I ladri hanno nascosto *dinamite* nel magazzino per rubare il bottino.
  Die Diebe haben *Dynamit* im Lager versteckt, um die Beute zu stehlen.
  
  L’artiglieria usa esplosivi simili alla *dinamite* per colpire le postazioni nemiche.
  Die *Artillerie* verwendet Sprengstoff, der der Dynamit ähnlich ist, um feindliche Stellungen zu treffen.
  
  Se *dinamiti* un albero in giardino, rischi di spaventare tutto il vicinato!
  Wenn du einen Baum im Garten mit *Dynamit* sprengst, erschrickst du möglicherweise die ganze Nachbarschaft!
  
  Il fuochista ha detto che senza *dinamite* non si può demolire quel vecchio ponte.
  Der Feuerwerker sagte, dass man ohne *Dynamit* diese alte Brücke nicht abreißen könne.
  
  Pensavo che stessero costruendo un tunnel, invece hanno trovato solo *dinamite* abbandonata.
  Ich dachte, sie bauten einen Tunnel, stattdessen fanden sie nur liegengebliebenes *Dynamit*.
