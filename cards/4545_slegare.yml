Rang: 4545
Wort: slegare
Wortart: vt
Wort mit Artikel: slegare
Femininum / Plural: ''
IPA: ''
Definition: losbinden, lösen
Register: ''
Beispielsätze: |-
  Non *slega* mai il cane senza guinzaglio, potrebbe scappare.
  Du bindest den Hund nie ohne Leine *los*, er könnte weglaufen.
  
  Il marinaio *ha slegato* la barca dal molo con movimenti rapidi.
  Der Matrose hat das Boot *vom Steg losgebunden* mit schnellen Bewegungen.
  
  Se *slegate* quel nodo, potrete aprire la scatola più facilmente.
  Wenn ihr diesen Knoten *löst*, könnt ihr die Kiste leichter öffnen.
  
  Volevo *slegare* la mia promessa, ma non sapevo come fare senza offendere.
  Ich wollte mein Versprechen *lösen*, aber ich wusste nicht, wie ich das tun sollte, ohne zu beleidigen.
  
  Appena *slegato* il pacco, il gattino saltò fuori con entusiasmo.
  Sobald das Paket *gelöst* war, sprang das Kätzchen begeistert heraus.
