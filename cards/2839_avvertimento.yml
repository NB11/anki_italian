Rang: 2839
Wort: avvertimento
Wortart: n.m
Wort mit Artikel: l'avvertimento
Femininum / Plural: avvertimenti
IPA: ''
Definition: die Warnung, -en
Register: ''
Beispielsätze: |-
  Il capo gli ha dato un *avvertimento* per il ritardo ripetuto.
  Der Chef hat ihm eine *Warnung* für die wiederholte Verspätung gegeben.
  
  Senza un *avvertimento* adeguato, non puoi pretendere che tutti capiscano il rischio.
  Ohne eine angemessene *Warnung* kannst du nicht erwarten, dass alle das Risiko verstehen.
  
  Gli ho mandato un SMS con l'*avvertimento* di non aprire allegati sconosciuti.
  Ich habe ihm eine SMS mit der *Warnung* geschickt, keine unbekannten Anhänge zu öffnen.
  
  L'*avvertimento* del medico gli ha salvato la vita, evitando un intervento inutile.
  Die *Warnung* des Arztes hat ihm das Leben gerettet, indem ein unnötiger Eingriff vermieden wurde.
  
  In caso di *avvertimento* errato, l’amministrazione potrebbe essere citata in giudizio.
  Bei einer falschen *Warnung* könnte die Verwaltung verklagt werden.
