Rang: 4946
Wort: lobo
Wortart: n.m
Wort mit Artikel: il lobo
Femininum / Plural: lobi
IPA: ''
Definition: der Wolf, -e
Register: ''
Beispielsätze: |-
  Nel bosco ho visto *lobo* che ululava alla luna.
  Im Wald habe ich den *Wolf* gesehen, der den Mond anheulte.
  
  Non credere alle favole in cui *lobo* è sempre il cattivo.
  Glaube nicht an Märchen, in denen der *Wolf* immer der Böse ist.
  
  Se avessimo più rispetto per la natura, *lobo* non sarebbe in pericolo.
  Wenn wir mehr Respekt vor der Natur hätten, wäre der *Wolf* nicht gefährdet.
  
  Il *lobo* che hai fotografato in montagna era enorme.
  Der *Wolf*, den du in den Bergen fotografiert hast, war riesig.
  
  Dicono che l’ululato del *lobo* porti sfortuna, ma io non ci credo.
  Man sagt, das Heulen des *Wolfes* bringe Unglück, aber ich glaube nicht daran.
