Rang: 4899
Wort: sterminare
Wortart: v
Wort mit Artikel: sterminare
Femininum / Plural: ''
IPA: ''
Definition: ausrotten, vernichten, tilgen
Register: ''
Beispielsätze: |-
  Gli scienziati cercano un modo per *sterminare* il virus prima che si diffonda ulteriormente.
  Die Wissenschaftler suchen einen Weg, das Virus *auszurotten*, bevor es sich weiterverbreitet.
  
  Se non avessimo *sterminato* i topi in cantina, ora ci sarebbero ovunque.
  Hätten wir die Mäuse im Keller nicht *vernichtet*, wären sie jetzt überall.
  
  Il governo ha ordinato di *sterminare* la popolazione di insetti dannosi per salvare i raccolti.
  Die Regierung hat befohlen, die Population schädlicher Insekten *auszurotten*, um die Ernten zu retten.
  
  Molti credono che sia impossibile *sterminare* completamente la povertà in questo secolo.
  Viele glauben, es sei unmöglich, die Armut in diesem Jahrhundert *gänzlich zu tilgen*.
  
  Nonostante i suoi sforzi, non riuscì a *sterminare* del tutto la popolazione di ratti sul tetto.
  Trotz aller Bemühungen konnte er die Rattenpopulation auf dem Dach nicht *gänzlich ausrotten*.
