Rang: 2258
Wort: collina
Wortart: n.f
Wort mit Artikel: la collina
Femininum / Plural: colline
IPA: ''
Definition: der Hügel, -
Register: ''
Beispielsätze: |-
  Dalla cima della *collina* si gode una vista spettacolare sulla valle sottostante.
  Vom Gipfel des *Hügels* aus hat man einen spektakulären Blick über das Tal darunter.
  
  Ho camminato per due ore per raggiungere la *collina* che si vede in lontananza.
  Ich bin zwei Stunden gegangen, um den *Hügel* zu erreichen, der in der Ferne zu sehen ist.
  
  Se avessi una casa, vorrei che fosse costruita su una *collina*, vicino al mare.
  Wenn ich ein Haus hätte, würde ich es auf einem *Hügel* in der Nähe des Meeres bauen lassen.
  
  La *collina* era coperta di fiori gialli quando ci siamo arrivati in primavera.
  Der *Hügel* war mit gelben Blumen bedeckt, als wir im Frühling ankamen.
  
  Anche se la *collina* sembra piccola da lontano, salireci richiede molta fatica.
  Auch wenn der *Hügel* aus der Ferne klein aussieht, erfordert das Hinaufsteigen viel Anstrengung.
