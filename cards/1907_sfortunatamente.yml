Rang: 1907
Wort: sfortunatamente
Wortart: adv
Wort mit Artikel: sfortunatamente
Femininum / Plural: ''
IPA: ''
Definition: leider, unglücklicherweise
Register: ''
Beispielsätze: |-
  Arrivato al treno, ho visto che *sfortunatamente* era già partito.
  Als ich am Zug ankam, sah ich, dass er *leider* schon abgefahren war.
  
  *Sfortunatamente*, non potrò venire alla festa stasera, ho troppo lavoro da finire.
  *Unglücklicherweise* werde ich heute Abend nicht zur Party kommen können, ich habe zu viel Arbeit zu erledigen.
  
  Abbiamo perso l'aereo, *sfortunatamente*, perché il traffico era insopportabile.
  Wir haben das Flugzeug verpasst, *leider*, weil der Verkehr unerträglich war.
  
  Era un'occasione unica, ma *sfortunatamente* non abbiamo potuto approfittarne.
  Es war eine einmalige Gelegenheit, aber *leider* konnten wir sie nicht nutzen.
  
  Ho seguito tutti i consigli, eppure *sfortunatamente* non ha funzionato come speravo.
  Ich habe alle Ratschläge befolgt, und trotzdem hat es *leider* nicht so funktioniert, wie ich gehofft hatte.
