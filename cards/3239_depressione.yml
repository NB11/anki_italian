Definition: die Depression, -en
Register: ''
Beispielsätze: |-
  Spero che tu riesca a superare presto questa *depressione*.
  Ich hoffe, dass du diese *Depression* bald überwinden kannst.
  
  La *depressione* economica ha colpito molti paesi europei nel 2008.
  Die *Wirtschaftsdepression* traf 2008 viele europäische Länder.
  
  Nonostante la *depressione*, continua a lavorare con grande impegno.
  Trotz der *Depression* arbeitet sie weiterhin mit großem Einsatz.
  
  Secondo gli ultimi studi, la *depressione* è in aumento tra i giovani.
  Laut aktuellen Studien nimmt die *Depression* bei Jugendlichen zu.
  
  Se avessi saputo che soffriva di *depressione*, avrei cercato di aiutarlo prima.
  Wenn ich gewusst hätte, dass er unter *Depressionen* litt, hätte ich versucht, ihm früher zu helfen.
