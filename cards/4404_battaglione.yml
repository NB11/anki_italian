Rang: 4404
Wort: battaglione
Wortart: n.m
Wort mit Artikel: il battaglione
Femininum / Plural: i battaglioni
IPA: ''
Definition: die Abteilung, -en
Register: ''
Beispielsätze: |-
  L'italiano ha formato un *battaglione* di volontari per la guerra del Risorgimento.
  Der Italiener hat eine *Abteilung* von Freiwilligen für den Risorgimento-Krieg gebildet.
  
  Il generale ha ordinato che il *battaglione* si posizioni vicino al fiume.
  Der General hat befohlen, dass sich die *Abteilung* nahe des Flusses positioniert.
  
  Nonostante la sconfitta, il *battaglione* è stato onorato per il suo valore.
  Trotz der Niederlage wurde die *Abteilung* für ihren Mut geehrt.
  
  Vor di partire per la missione, sottufficiali hanno spiegato come il *battaglione* agirà se attaccato.
  Bevor sie zum Einsatz aufbrachen, erklärten Unteroffiziere, wie sich die *Abteilung* verhalten wird, falls sie angegriffen wird.
  
  Il nemico ha cercato di sabotare il nostro *battaglione* prima dell’alba.
  Der Feind versuchte, unsere *Abteilung* noch vor Tagesanbruch zu sabotieren.
