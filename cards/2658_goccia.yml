Rang: 2658
Wort: goccia
Wortart: n.f
Wort mit Artikel: la goccia
Femininum / Plural: gocce
IPA: ''
Definition: der Tropfen, -
Register: ''
Beispielsätze: |-
  Dopo la pioggia, *goccia* d'acqua pendeva dal tetto.
  Nach dem Regen hing ein *Tropfen* Wasser von der Decke.
  
  Nonostante il caldo, non è caduta neanche una *goccia* di sudore.
  Trotz der Hitze ist kein einziger *Tropfen* Schweiß gefallen.
  
  Le *gocce* di caffè macchiavano la tovaglia bianca.
  Die *Tropfen* von Kaffee befleckten das weiße Tischtuch.
  
  Se avessi bevuto una *goccia* in più, non avrei guidato.
  Wenn ich einen *Tropfen* mehr getrunken hätte, wäre ich nicht gefahren.
  
  La dottoressa gli chiese se avesse notato una *goccia* di sangue nelle urine.
  Die Ärztin fragte ihn, ob er einen *Tropfen* Blut im Urin bemerkt habe.
