Beispielsätze: |-
  La *foresta* è silenziosa al mattino presto.
  Der *Wald* ist morgens früh still.
  
  Ho visto un lupo mentre camminavo nella *foresta*.
  Ich habe einen Wolf gesehen, während ich durch *den Wald* ging.
  
  Se tu avessi più tempo, potresti esplorare ogni angolo della *foresta*.
  Wenn du mehr Zeit hättest, könntest du jede Ecke *des Waldes* erkunden.
  
  La *foresta* che ho visitato l'estate scorsa era piena di funghi.
  *Der Wald*, den ich letzten Sommer besucht habe, war voller Pilze.
  
  Dicono che in quella *foresta* si nascondano ancora animali misteriosi.
  Man sagt, in *diesem Wald* verstecken sich noch mysteriöse Tiere.
