Rang: 3519
Wort: erede
Wortart: n.m/f
Wort mit Artikel: l'erede
Femininum / Plural: gli eredi
IPA: ''
Definition: der Erbe, -n / die Erbin, -nen
Register: ''
Beispielsätze: |-
  Il notaio ha informato l'*erede* che dovrà firmare molti documenti per l'eredità.
  Der Notar hat den *Erben* darüber informiert, dass er viele Dokumente für das Erbe unterschreiben muss.
  
  Nonostante la sua giovane età, Maria si è dimostrata l'unica *erede* degna del titolo nobiliare.
  Trotz ihres jungen Alters hat sich Maria als die einzige *Erbin* des Adelstitels erwiesen.
  
  Gli avvocati discutono su chi sarà l'*erede* principale di quella vasta proprietà familiare.
  Die Anwälte streiten darüber, wer der Haupt*erbe* dieses großen Familienbesitzes sein wird.
  
  L'*erede* apparente ha rinunciato ai propri diritti a favore del fratello minore.
  Der scheinbare *Erbe* hat zugunsten des jüngeren Bruders auf seine Rechte verzichtet.
  
  Se non ci fosse stato un accordo, il patrimonio sarebbe finito in mani sbagliate, senza un chiaro *erede* a proteggerlo.
  Ohne eine Einigung wäre das Vermögen in falsche Hände geraten, ohne einen klaren *Erben*, der es beschützt.
