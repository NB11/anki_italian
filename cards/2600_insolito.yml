Rang: 2600
Wort: insolito
Wortart: adj
Wort mit Artikel: insolito
Femininum / Plural: ''
IPA: ''
Definition: ungewöhnlich, außergewöhnlich
Register: ''
Beispielsätze: |-
  Ho trovato un *insolito* disegno sul muro della mia camera da letto.
  Ich habe eine *ungewöhnliche* Zeichnung an der Wand meines Schlafzimmers gefunden.
  
  È davvero *insolito* che tu non abbia fame dopo tanta fatica.
  Es ist wirklich *außergewöhnlich*, dass du nach so viel Anstrengung keinen Hunger hast.
  
  Avrei voluto un comportamento più *insolito* durante l'intervista per sorprendere il manager.
  Ich hätte ein *ungewöhnlicheres* Verhalten während des Interviews an den Tag legen wollen, um den Manager zu überraschen.
  
  Nonostante l'*insolito* silenzio, nessuno si preoccupò del servo solitario.
  Trotz der *außergewöhnlichen* Stille kümmerte sich niemand um den einsamen Diener.
  
  Il medico disse che era *insolito* che il battito cardiaco fosse così regolare dopo l'attacco di panico.
  Der Arzt sagte, es sei *ungewöhnlich*, dass der Herzschlag nach dem Schock so regelmäßig sei.
