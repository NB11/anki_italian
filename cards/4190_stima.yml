Beispielsätze: |-
  La *stima* del valore della casa è molto accurata.
  Die *Schätzung* des Wertes des Hauses ist sehr genau.
  
  Secondo gli esperti, la *stima* dei danni supera i dieci milioni di euro.
  Laut den Experten übersteigt die *Schätzung* der Schäden zehn Millionen Euro.
  
  Nonostante la *stima* iniziale fosse ottimistica, i costi reali sono stati ancora più alti.
  Trotz der anfangs optimistischen *Schätzung* waren die tatsächlichen Kosten noch höher.
  
  La *stima* degli studiosi sulla datazione del reperto è stata confermata dalla tecnologia moderna.
  Die *Schätzung* der Wissenschaftler zum Alter des Fundstücks wurde durch moderne Technik bestätigt.
  
  Vorrei una *stima* dettagliata prima di iniziare i lavori di ristrutturazione.
  Ich möchte vor Beginn der Renovierungsarbeiten eine detaillierte *Schätzung*.
