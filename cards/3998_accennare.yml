Rang: 3998
Wort: accennare
Wortart: v
Wort mit Artikel: accennare
Femininum / Plural: ''
IPA: ''
Definition: andeuten, vorschlagen
Register: ''
Beispielsätze: |-
  Ha *accennato* di voler partire presto, ma non ha ancora deciso nulla.
  Er hat *angedeutet*, früh losfahren zu wollen, aber er hat noch nichts entschieden.
  
  Non *accennare* a quello che hai visto, altrimenti tutti si preoccupano!
  *Erwähne* das, was du gesehen hast, nicht, sonst machen sich alle Sorgen!
  
  Se *accennerò* ai problemi finanziari, potresti aiutarmi a trovare una soluzione?
  Wenn ich *andeute* auf die finanziellen Probleme, könntest du mir helfen, eine Lösung zu finden?
  
  Il professore ha *accennato* che l’esame potrebbe essere più difficile del previsto.
  Der Professor hat *angedeutet*, dass die Prüfung schwieriger werden könnte als erwartet.
  
  Smettila di *accennare* alla sua fragilità, potrebbe offendersi.
  Hör auf, auf seine *Verwundbarkeit* hinzuweisen, er könnte sich beleidigt fühlen.
