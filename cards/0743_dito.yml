Rang: 743
Wort: dito
Wortart: n.m
Wort mit Artikel: il dito
Femininum / Plural: diti
IPA: ''
Definition: der Finger, -
Register: ''
Beispielsätze: |-
  Mi sono tagliato *il dito* con un coltello.
  Ich habe mich mit einem Messer an *dem Finger* geschnitten.
  
  Quanti *diti* ha una mano?
  Wie viele *Finger* hat eine Hand?
  
  Non mi piace che qualcuno mi tocchi *i diti* dei piedi!
  Ich mag es nicht, wenn mich jemand an *den Zehen* berührt!
  
  Ha mostrato *il dito* indice come segno di approvazione.
  Er zeigte *den Zeigefinger* als Zeichen der Zustimmung.
  
  Vorrei tanto avere delle mani con sei *diti*!
  Ich würde gerne Hände mit sechs *Fingern* haben!
