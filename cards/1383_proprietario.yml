Rang: 1383
Wort: proprietario
Wortart: n.m
Wort mit Artikel: il proprietario
Femininum / Plural: proprietari
IPA: ''
Definition: der Besitzer, -
Register: ''
Beispielsätze: |-
  Il *proprietario* dell'albergo ha assunto un nuovo assistente per migliorare il servizio.
  Der *Besitzer* des Hotels hat einen neuen Assistenten eingestellt, um den Service zu verbessern.
  
  Nonostante le difficoltà, il *proprietario* non vuole sprecare il denaro del debbito.
  Trotz der Schwierigkeiten will der *Besitzer* das Geld der Schuld nicht verschwendet.
  
  Il *proprietario* ha fatto chiaramente capire che non inselterà alcuna responsabilità per eventuali danni.
  Der *Besitzer* hat klar gemacht, dass er keine Verantwortung für mögliche Schäden leugnen wird.
  
  Se il *proprietario* non garantisce la copertura, rischiamo di dover pagare di più.
  Wenn der *Besitzer* den Schutz nicht garantiert, riskieren wir, mehr zahlen zu müssen.
  
  È difficile trovare un *proprietario* che sia disposto a regalare un maiale a un estraneo.
  Es ist schwer, einen *Besitzer* zu finden, der bereit ist, ein Schwein an einen Fremden zu verschenken.
