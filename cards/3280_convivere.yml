Rang: 3280
Wort: convivere
Wortart: vi
Wort mit Artikel: convivere
Femininum / Plural: ''
IPA: ''
Definition: zusammenleben, koexistieren
Register: ''
Beispielsätze: |-
  Molti animali riescono a *convivere* pacificamente nello stesso habitat.
  Viele Tiere können friedlich im selben Lebensraum *koexistieren*.
  
  Dopo la separazione, hanno scelto di *convivere* come buoni amici.
  Nach der Trennung haben sie beschlossen, als gute Freunde *zusammenzuleben*.
  
  È stato difficile *convivere* con la mia solitudine dopo il trasloco.
  Es war schwierig, mit meiner Einsamkeit nach dem Umzug *zusammenzuleben*.
  
  Se vogliamo risolvere la crisi, dobbiamo imparare a *convivere* nonostante le differenze.
  Wenn wir die Krise lösen wollen, müssen wir lernen, trotz der Unterschiede *zusammenzuleben*.
  
  Nonostante litigi frequenti, riescono sempre a *convivere* in armonia.
  Trotz häufiger Streitereien schaffen sie es immer, in Harmonie *zusammenzuleben*.
