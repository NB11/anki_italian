Rang: 1062
Wort: interrompere
Wortart: vt
Wort mit Artikel: interrompere
Femininum / Plural: ''
IPA: ''
Definition: unterbrechen, abbrechen
Register: ''
Beispielsätze: |-
  Non posso *interrompere* questa telefonata, devo prima finire!
  Ich kann diesen *Anruf* nicht unterbrechen, ich muss ihn zuerst beenden!
  
  Il direttore ha *interrotto* la riunione improvvisamente senza spiegare il motivo.
  Der *Direktor* hat die Besprechung plötzlich abgebrochen ohne den Grund zu erklären.
  
  Se non avessi *interrotto* il collega, avremmo già finito il progetto!
  Wenn ich den Kollegen nicht *unterbrochen* hätte, hätten wir das Projekt schon beendet!
  
  È importante che tu *interrompa* immediatamente le indagini illegali.
  Es ist wichtig, dass du die *Untersuchungen* sofort abbrichst.
  
  L’avvocato suggerisce di *interrompere* qualsiasi contatto con quella persona sospetta.
  Der Anwalt rät dazu, jeden *Kontakt* zu dieser verdächtigen Person abzubrechen.
Audio: ''
Notiz: ''
Dispersion: ''
