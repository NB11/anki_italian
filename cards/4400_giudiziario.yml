IPA: ''
Definition: gerichtlich, judiziell
Register: ''
Beispielsätze: |-
  Il processo *giudiziario* è stato lungo e complesso.
  Das *gerichtliche* Verfahren war lang und kompliziert.
  
  Secondo il parere *giudiziario*, l’imputato deve essere assolto.
  Laut der *judiziellen* Einschätzung muss der Angeklagte freigesprochen werden.
  
  La procedura *giudiziaria* richiede molta pazienza.
  Das *gerichtliche* Verfahren erfordert viel Geduld.
  
  Hanno richiesto un’interruzione del procedimento *giudiziario* per raccogliere nuove prove.
  Sie verlangten eine Unterbrechung des *gerichtlichen* Verfahrens, um neue Beweise zu sammeln.
  
  Se il documento non è *giudiziario*, non può essere utilizzato in tribunale.
  Falls das Dokument nicht *gerichtlich* ist, kann es nicht vor Gericht verwendet werden.
