Rang: 2100
Wort: impresa
Wortart: n.f
Wort mit Artikel: l'impresa
Femininum / Plural: imprese
IPA: ''
Definition: das Unternehmen, -
Register: ''
Beispielsätze: |-
  L'*impresa* ha aperto una nuova filiale a Milano la settimana scorsa.
  Das *Unternehmen* hat letzte Woche eine neue Filiale in Mailand eröffnet.
  
  Nonostante le difficoltà, la nostra *impresa* sta crescendo molto velocemente.
  Trotz der Schwierigkeiten wächst unser *Unternehmen* sehr schnell.
  
  Se avessi un po' più di soldi, fonderei una *impresa* tutta mia.
  Wenn ich ein bisschen mehr Geld hätte, würde ich ein eigenes *Unternehmen* gründen.
  
  L'*impresa* per cui lavoro è famosa per la sua innovazione nel settore tecnologico.
  Das *Unternehmen*, für das ich arbeite, ist für seine Innovation im Technologiesektor bekannt.
  
  Nonostante la *impresa* fosse fallita, i suoi dipendenti hanno deciso di continuare il progetto insieme.
  Obwohl das *Unternehmen* pleite war, beschlossen seine Mitarbeiter, das Projekt gemeinsam weiterzuführen.
