Rang: 4792
Wort: immunità
Wortart: n.f
Wort mit Artikel: l'immunità
Femininum / Plural: immunità
IPA: ''
Definition: die Immunität
Register: ''
Beispielsätze: |-
  L'*immunità* di gregge protegge anche chi non può essere vaccinato.
  Die *Gruppenimmunität* schützt auch diejenigen, die nicht geimpft werden können.
  
  Molti sostengono che l'*immunità* naturale sia più forte di quella artificiale.
  Viele behaupten, dass die *natürliche Immunität* stärker ist als die künstliche.
  
  Non dà per scontata la tua *immunità* dopo il vaccino: fissa un richiamo!
  Nimm deine *Immunität* nach der Impfung nicht als selbstverständlich hin: vereinbare eine Auffrischung!
  
  Se hai dubbi sulla tua *immunità*, parlane con il medico di base.
  Falls du Zweifel an deiner *Immunität* hast, sprich mit deinem Hausarzt.
  
  La scienza studia come l'*immunità* cambi con l'età o con nuove varianti.
  Die Wissenschaft untersucht, wie sich die *Immunität* mit dem Alter oder neuen Varianten verändert.
