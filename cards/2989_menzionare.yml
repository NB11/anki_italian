Rang: 2989
Wort: menzionare
Wortart: v
Wort mit Artikel: menzionare
Femininum / Plural: ''
IPA: ''
Definition: erwähnen
Register: ''
Beispielsätze: |-
  Nel suo discorso, il politico *menzionò* più volte il problema della disoccupazione.
  In seiner Rede *erwähnte* der Politiker das Problem der Arbeitslosigkeit mehrmals.
  
  Vorrei *menzionare* che domani non sarò presente alla riunione.
  Ich möchte *darauf hinweisen*, dass ich morgen nicht an der Besprechung teilnehmen werde.
  
  Ha *menzionato* un fatto molto interessante che non conoscevo affatto.
  Er *hat* eine sehr interessante Tatsache erwähnt, die mir völlig unbekannt war.
  
  Non vorrei *menzionare* ancora una volta lo stesso soggetto, ma la situazione è grave.
  Ich möchte das Thema nicht immer wieder *ansprechen*, aber die Lage ist ernst.
  
  Se *menzionerai* il suo nome, si offenderà immediatamente.
  Wenn du seinen Namen *erwähnst*, wird er sich sofort beleidigt fühlen.
