Rang: 2267
Wort: origine
Wortart: n.f
Wort mit Artikel: l'origine
Femininum / Plural: origini
IPA: ''
Definition: der Ursprung, -e; die Herkunft, -e
Register: ''
Beispielsätze: |-
  Credo che l’*origine* di questa leggenda sia molto antica.
  Ich glaube, dass der *Ursprung* dieser Legende sehr alt ist.
  
  Nonostante la distanza, abbiamo scoperto che l’*origine* comune dei nostri antenati è la stessa.
  Trotz der Entfernung haben wir herausgefunden, dass der *Ursprung* unserer Vorfahren derselbe ist.
  
  Vorrei sapere qual è stata l’*origine* di questo conflitto, perché non ha senso!
  Ich würde gerne wissen, was der *Ursprung* dieses Konflikts war, denn das ergibt keinen Sinn!
  
  Se avessimo indagato meglio, avremmo trovato l’*origine* del problema molto prima.
  Wenn wir besser ermittelt hätten, hätten wir den *Ursprung* des Problems viel früher gefunden.
  
  È probabile che l’*origine* di questa malattia sia nelle abitudini alimentari dei secoli passati.
  Es ist wahrscheinlich, dass der *Ursprung* dieser Krankheit in den Essgewohnheiten vergangener Jahrhunderte liegt.
