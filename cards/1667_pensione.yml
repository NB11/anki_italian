Rang: 1667
Wort: pensione
Wortart: n.f
Wort mit Artikel: la pensione
Femininum / Plural: pensioni
IPA: ''
Definition: die Pension, -en
Register: ''
Beispielsätze: |-
  Dopo trent'anni di lavoro, ha deciso di andare in *pensione*.
  Nach dreißig Jahren Arbeit hat er beschlossen, in den *Ruhestand* zu gehen.
  
  La *pensione* che abbiamo prenotato è proprio in centro città.
  Die *Pension*, die wir gebucht haben, liegt direkt im Stadtzentrum.
  
  Se non avessi risparmiato, ora dovrei lavorare anche in *pensione*.
  Wenn ich nicht gespart hätte, müsste ich jetzt auch im *Ruhestand* arbeiten.
  
  Mi hanno detto che la *pensione* tipica italiana offre molto più del semplice alloggio.
  Man hat mir gesagt, dass eine typisch italienische *Pension* viel mehr als nur Unterkunft bietet.
  
  Anche se è piccola, la loro *pensione* è sempre piena di turisti soddisfatti.
  Obwohl sie klein ist, ist ihre *Pension* immer voller zufriedener Touristen.
