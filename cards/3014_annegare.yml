Rang: 3014
Wort: annegare
Wortart: v
Wort mit Artikel: annegare
Femininum / Plural: ''
IPA: ''
Definition: "*ertrinken*, versinken"
Register: ''
Beispielsätze: |-
  Spero che nessuno *anneghi* nella piscina quando non ci sono guardie.
  Ich hoffe, dass niemand *ertrinkt* im Pool, wenn keine Wachen da sind.
  
  Se avessi più tempo, mi piacerebbe *annegare* nella lettura di quel libro.
  Wenn ich mehr Zeit hätte, würde ich mich gerne in dem Buch *versinken*.
  
  La polizia ha discovered che l’uomo si era *annegato* nel fiume la scorsa settimana.
  Die Polizei hat herausgefunden, dass sich der Mann letzte Woche im Fluss *ertränkt* hatte.
  
  Nonostante il pericolo, alcuni continuavano a *annegare* nelle acque gelide.
  Trotz der Gefahr *ertranken* einige weiterhin im eiskalten Wasser.
  
  Se non fosse per la corrente, forse non si sarebbe *annegato* così facilmente.
  Wäre da nicht die Strömung, hätte er sich vielleicht nicht so leicht *ertränkt*.
