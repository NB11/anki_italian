Rang: 3781
Wort: raffreddore
Wortart: n.m
Wort mit Artikel: il raffreddore
Femininum / Plural: i raffreddori
IPA: ''
Definition: die Erkältung, -en
Register: ''
Beispielsätze: |-
  Quest'inverno ho preso *il raffreddore* tre volte perché la casa è troppo umida.
  Diesen *Winter* habe ich mich dreimal erkältet, weil das Haus zu feucht ist.
  
  Non uscire con *il raffreddore* o potresti peggiorare la situazione!
  Geh nicht mit *einer Erkältung* raus, sonst könntest du die Situation verschlimmern!
  
  Credo che abbia *il raffreddore* perché starnutisce di continuo da ieri.
  Ich glaube, er *hat sich erkältet*, weil er seit gestern ständig niest.
  
  Se avessi saputo che ti avrebbe dato fastidio, non ti avrei mandato *il raffreddore* del vicino!
  Wenn ich gewusst hätte, dass dich das stört, hätte ich dir *die Erkältung* des Nachbarn nicht "geschickt"!
  
  Dopo aver bevuto una bevanda calda, *il raffreddore* sembrava meno fastidioso.
  Nachdem ich ein warmes *Getränk* getrunken hatte, schien die Erkältung weniger lästig zu sein.
