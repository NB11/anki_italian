Rang: 2686
Wort: soffiare
Wortart: v
Wort mit Artikel: soffiare
Femininum / Plural: ''
IPA: ''
Definition: blasen, wehen, pusten
Register: ''
Beispielsätze: |-
  Il vento *soffia* forte stamattina e fa volare le foglie secche per tutta la strada.
  Der Wind *weht* heute Morgen stark und lässt die trockenen Blätter durch die ganze Straße fliegen.
  
  Mentre preparavo la torta, ho notato che il forno non *soffiava* abbastanza aria calda.
  Während ich den Kuchen vorbereitete, bemerkte ich, dass der Ofen nicht genug warme *Luft blies*.
  
  Se non *soffierai* sulle braci, il fuoco si spegnerà in pochi minuti.
  Wenn du nicht auf die Glut *pustest*, wird das Feuer in wenigen Minuten ausgehen.
  
  Il medico mi ha consigliato di *soffiare* in questo dispositivo per misurare la mia capacità polmonare.
  Der Arzt empfahl mir, in dieses *Gerät zu blasen*, um meine Lungenkapazität zu messen.
  
  Ho visto un bambino che *soffiava* le candeline sulla torta di compleanno con grande entusiasmo.
  Ich sah, wie ein Kind die Kerzen auf dem Geburtstagskuchen mit großer Begeisterung *ausgeblasen* hatte.
