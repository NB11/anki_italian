Rang: 1711
Wort: commissione
Wortart: n.f
Wort mit Artikel: la commissione
Femininum / Plural: commissioni
IPA: ''
Definition: die Provision, -en, die Kommission
Register: ''
Beispielsätze: |-
  Ho pagato una *commissione* del 5% per il trasferimento.
  Ich habe eine *Provision* von 5% für die Überweisung bezahlt.
  
  La *commissione* vuole esaminare tutti i documenti domattina.
  Der *Kommission* will alle Dokumente morgen früh prüfen.
  
  Se non rispetti le regole, la *commissione* ti penalizzerà.
  Wenn du die Regeln nicht einhältst, wird dich die *Kommission* bestrafen.
  
  La *commissione* per l’organizzazione dello spettacolo era molto alta.
  Die *Provision* für die Organisation der Veranstaltung war sehr hoch.
  
  Non capisco perché abbiano rifiutato la mia *commissione* per il progetto.
  Ich verstehe nicht, warum sie meine *Kommission* für das Projekt abgelehnt haben.
