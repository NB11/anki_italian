Rang: 3133
Wort: indiano
Wortart: n.f/m
Wort mit Artikel: l'indiano
Femininum / Plural: indiani
IPA: ''
Definition: der Inder, - / die *Inderin*, -nen
Register: ''
Beispielsätze: |-
  L'*indiano* ha viaggiato per anni attraverso il paese per documentare la cultura dei nativi.
  Der *Inder* ist jahrelang durch das Land gereist, um die Kultur der Ureinwohner zu dokumentieren.
  
  Se non fosse *indiana*, probabilmente non capirebbe la complessità delle caste.
  Wenn sie keine *Inderin* wäre, würde sie die Komplexität der Kasten wahrscheinlich nicht verstehen.
  
  Gli studiosi hanno apprezzato molto il contributo *indiano* alla matematica antica.
  Die Gelehrten haben den Beitrag der *indischen* Mathematik zur antiken Mathematik sehr geschätzt.
  
  Non sapevo che la nuova collega fosse *indiana*, anche se il suo cognome è molto comune lì.
  Ich wusste nicht, dass die neue Kollegin *Inderin* ist, obwohl ihr Nachname dort sehr verbreitet ist.
  
  Dicono che la cucina *indiana* sia tra le più varie e speziate al mondo.
  Man sagt, dass die *indische* Küche zu den vielfältigsten und würzigsten der Welt gehört.
