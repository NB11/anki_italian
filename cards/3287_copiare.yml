Rang: 3287
Wort: copiare
Wortart: v
Wort mit Artikel: copiare
Femininum / Plural: ''
IPA: ''
Definition: abschreiben, kopieren
Register: ''
Beispielsätze: |-
  Non *copiare* mai i compiti di un compagno, perché è ingiusto!
  Du sollst die Hausaufgaben eines Mitschülers nie *abschreiben*, denn das ist ungerecht!
  
  Se non comprendi la lezione, *copia* dagli appunti del tuo vicino per una tregua!
  Wenn du die Lektion nicht verstehst, *kopiere* die Notizen deines Nachbarn für eine Pause!
  
  Il professore ha detto che chi *copia* all’esame verrà bocciato.
  Der Professor hat gesagt, dass jeder, der beim Examen *abschreibt*, durchfallen wird.
  
  Mi ha spiegato che *copiare* è un’abitudine che porta alla depressione, se non controllata.
  Er hat mir erklärt, dass *Abschreiben* eine Gewohnheit ist, die zu Depressionen führt, wenn sie nicht kontrolliert wird.
  
  Speravo che tu non *copiassi* il documento originale senza riferimento, ma evidentemente ho bisogno di controllare io stesso.
  Ich hatte gehofft, dass du das Originaldokument nicht ohne *Angabe* abschreibst, aber offensichtlich muss ich selbst nachschauen.
