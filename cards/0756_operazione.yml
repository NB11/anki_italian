Rang: 756
Wort: operazione
Wortart: n.f
Wort mit Artikel: l'operazione
Femininum / Plural: operazioni
IPA: ''
Definition: die Operation, -en
Register: ''
Beispielsätze: |-
  Dopo l'*operazione*, il paziente ha dovuto seguire una dieta molto rigorosa per alcune settimane.
  Nach der *Operation* musste der Patient mehrere Wochen eine sehr strenge Diät einhalten.
  
  Ho sentito che la sua *operazione* è riuscita perfettamente, per fortuna non c'è stato nessun rischio.
  Ich habe gehört, dass seine *Operation* perfekt verlaufen ist – glücklicherweise gab es kein Risiko.
  
  Se non avessero scoperto il tumore in tempo, questa *operazione* sarebbe risultata molto più complicata.
  Wenn sie den Tumor nicht rechtzeitig entdeckt hätten, wäre diese *Operation* viel komplizierter ausgefallen.
  
  L'*operazione* dei vigili del fuoco è durata due giorni interi, ma alla fine hanno salvato tutti i cittadini.
  Die *Operation* der Feuerwehrleute dauerte zwei ganze giorni, aber am Ende konnten sie alle Bürger retten.
  
  Il chirurgo ha detto che senza questa *operazione* le sue condizioni sarebbero peggiorate notevolmente entro pochi mesi.
  Der Arzt sagte, ohne diese *Operation* wären seine Beschwerden innerhalb weniger mesi deutlich schlimmer geworden.
