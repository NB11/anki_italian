Rang: 3562
Wort: cartone
Wortart: n.m
Wort mit Artikel: il cartone
Femininum / Plural: cartoni
IPA: ''
Definition: die Pappe, -n
Register: ''
Beispielsätze: |-
  Ho comprato *il cartone* della pizza per fare un lavoro scolastico.
  Ich habe den *Pappkarton* der Pizza für eine Schulaufgabe gekauft.
  
  Nel magazzino ci sono molti *cartoni* pieni di libri vecchi.
  Im Lager gibt es viele *Pappkartons*, die mit alten Büchern gefüllt sind.
  
  Se avessi tempo, ti aiuterei a scontornare *il cartone* per il regalo.
  Wenn ich Zeit hätte, würde ich dir helfen, den *Pappkarton* für das Geschenk auszuschneiden.
  
  Nonostante piovesse, abbiamo portato a casa solo *il cartone* della spesa, non le bottiglie.
  Obwohl es regnete, haben wir nur den *Pappkarton* vom Einkauf mitgenommen, nicht die Flaschen.
  
  Spero che domani arrivi *il cartone* delle scarpe nuove che ho ordinato online.
  Ich hoffe, dass morgen der *Pappkarton* mit den neuen Schuhen ankommt, die ich online bestellt habe.
