Rang: 603
Wort: ammettere
Wortart: v
Wort mit Artikel: ammettere
Femininum / Plural: ''
IPA: ''
Definition: zugeben, einräumen, eingestehen
Register: ''
Beispielsätze: |-
  Non voglio *ammettere* di aver sbagliato, ma in fondo lo so bene.
  Ich will nicht *zugeben*, dass ich mich geirrt habe, aber im Grunde weiß ich es genau.
  
  L’avvocato ha consigliato al suo cliente di *ammettere* le proprie colpe per ottenere uno sconto di pena.
  Der Anwalt hat seinem Mandanten geraten, *einzuräumen*, dass er schuldig ist, um eine Strafmilderung zu erhalten.
  
  Se *ammettiamo* che il progetto non è perfetto, possiamo migliorarlo insieme.
  Wenn wir *zugeben*, dass das Projekt nicht perfekt ist, können wir es gemeinsam verbessern.
  
  Era così ostinato che non riuscì mai a *ammettere* di avere torto.
  Er war so stur, dass er nie einsehen konnte, *einzuräumen*, dass er Unrecht hatte.
  
  Dopo lunghe discussioni, la giuria dovette *ammettere* che le prove erano insufficienti.
  Nach langen Diskussionen musste die Jury *eingestehen*, dass die Beweise unzureichend waren.
