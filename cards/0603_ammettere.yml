Rang: 603
Wort: ammettere
Wortart: v
Wort mit Artikel: ammettere
Femininum / Plural: ''
IPA: ''
Definition: zugeben, eingestehen, akzeptieren
Register: ''
Beispielsätze: |-
  Non posso *ammettere* che tu abbia ragione senza prove.
  Ich kann nicht *zugeben*, dass du ohne Beweise recht hast.
  
  Dopo ore di discussione, alla fine ha *ammesso* il suo errore.
  Nach stundenlangem Diskutieren hat er schließlich *eingestanden*, dass er sich geirrt hat.
  
  *Ammettiamo* che tu abbia ragione: cosa cambierebbe di concreto?
  *Nehmen wir an*, du hättest recht: was würde sich konkret ändern?
  
  È difficile *ammettere* i propri fallimenti davanti agli altri.
  Es ist schwer, seine *Fehler vor anderen einzusehen*.
  
  Se *ammettessi* più spesso i tuoi limiti, forse ti giudicherebbero meno severamente.
  Wenn du öfter deine Grenzen *zugeben würdest*, würden dich die anderen vielleicht weniger hart beurteilen.
