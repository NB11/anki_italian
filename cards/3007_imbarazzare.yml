Rang: 3007
Wort: imbarazzare
Wortart: vt
Wort mit Artikel: imbarazzare
Femininum / Plural: ''
IPA: ''
Definition: jemanden in Verlegenheit bringen, verlegen machen
Register: ''
Beispielsätze: |-
  La sua osservazione mi *imbarazza* profondamente.
  Seine Bemerkung bringt mich *in tiefe Verlegenheit*.
  
  Ho paura di *imbarazzare* il mio capo davanti a tutti.
  Ich habe Angst, meinen Chef *vor allen in Verlegenheit zu bringen*.
  
  Se non fossi così timido, non mi farebbe *imbarazzare* così spesso.
  Wenn ich nicht so schüchtern wäre, würde er mich nicht so oft *in Verlegenheit bringen*.
  
  È stato *imbarazzante* quando tutti hanno riso della mia risposta.
  Es war *peinlich*, als alle über meine Antwort gelacht haben.
  
  Non volevo *imbarazzarti*, scusami se ho fatto una domanda troppo personale.
  Ich wollte dich nicht *in Verlegenheit bringen*, entschuldige, wenn ich eine zu persönliche Frage gestellt habe.
Audio: ''
Notiz: ''
Dispersion: ''
