Rang: 1999
Wort: nutrire
Wortart: vt
Wort mit Artikel: nutrire
Femininum / Plural: ''
IPA: ''
Definition: ernähren, füttern
Register: ''
Beispielsätze: |-
  Questa pianta *nutre* le api tutto l'anno, anche in inverno.
  Diese Pflanze *ernährt* die Bienen das ganze Jahr über, sogar im Winter.
  
  Il contadino non sapeva più come *nutrire* le sue galline dopo che il mangime era finito.
  Der Bauer wusste nicht mehr, wie er seine Hühner *füttern* sollte, nachdem das Futter aufgebraucht war.
  
  Se avessi tempo, vorrei *nutrire* i piccioni in piazza, ma mia madre dice che è patetico.
  Wenn ich Zeit hätte, würde ich die Tauben auf dem Platz *füttern*, aber meine Mutter sagt, es sei peinlich.
  
  I genitori devono *nutrire* i figli con cibo sano per farli crescere forti.
  Eltern müssen ihre Kinder mit gesundem Essen *ernähren*, damit sie stark wachsen.
  
  Non appena arriverò al rifugio, *nutrirò* i cavalli con l'avena che ho portato.
  Sobald ich in der Hütte ankomme, werde ich die Pferde mit dem Hafer *füttern*, den ich mitgebracht habe.
