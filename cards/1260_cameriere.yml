Rang: 1260
Wort: cameriere
Wortart: n.m
Wort mit Artikel: il cameriere
Femininum / Plural: camerieri
IPA: ''
Definition: der Kellner, -
Register: ''
Beispielsätze: |-
  Il *cameriere* ci ha portato il conto dopo che abbiamo finito di mangiare.
  Der *Kellner* brachte uns die Rechnung, nachdem wir fertig gegessen hatten.
  
  Vorrei parlare con il *cameriere* che ha servito al nostro tavolo ieri sera.
  Ich möchte mit dem *Kellner* sprechen, der uns gestern Abend bedient hat.
  
  Nonostante sia molto affollato, il *cameriere* è rimasto calmo e professionale.
  Trotz der großen Menge blieb der *Kellner* ruhig und professionell.
  
  Se fossi arrivato prima, avrei chiesto al *cameriere* se c’era un tavolo libero al balcone.
  Wenn ich früher gekommen wäre, hätte ich den *Kellner* gefragt, ob es einen freien Tisch auf dem Balkon gab.
  
  Che il *cameriere* sia ancora in cucina a preparare gli ordini non mi stupisce affatto, dato lo show di clienti che si è creato.
  Dass der *Kellner* noch in der Küche ist, um die Bestellungen vorzubereiten, überrascht mich nicht, bei der Schau, die die Gäste veranstaltet haben.
