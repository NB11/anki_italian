Rang: 3797
Wort: maglione
Wortart: n.m
Wort mit Artikel: il maglione
Femininum / Plural: maglioni
IPA: ''
Definition: der Pullover, -
Register: ''
Beispielsätze: |-
  Ho comprato un *maglione* di lana molto caldo per l'inverno.
  Ich habe einen sehr warmen *Pullover* aus Wolle gekauft.
  
  Quel *maglione* blu che indossi oggi è proprio bello!
  Dieser blaue *Pullover*, den du heute trägst, ist wirklich schön!
  
  Mi hanno detto che il *maglione* che volevi acquistare è già esaurito.
  Man hat mir gesagt, dass der *Pullover*, den du kaufen wolltest, bereits ausverkauft ist.
  
  Avrei voluto regalarti un *maglione* per Natale, ma non ho trovato la taglia giusta.
  Ich hätte dir zu Weihnachten gerne einen *Pullover* geschenkt, aber ich habe die richtige Größe nicht gefunden.
  
  Se avessi più spazio nell'armadio, comprerei altri tre *maglioni* come questo.
  Wenn ich mehr Platz im Schrank hätte, würde ich noch drei weitere *Pullover* wie diesen kaufen.
