Rang: 688
Wort: spostare
Wortart: v
Wort mit Artikel: spostare
Femininum / Plural: ''
IPA: ''
Definition: verschieben, bewegen, umstellen
Register: ''
Beispielsätze: |-
  Devi *spostare* la sedia perché è d’intralcio.
  Du musst den Stuhl *verschieben*, weil er im Weg steht.
  
  Spero che tu non abbia bisogno di *spostare* l’appuntamento di nuovo.
  Ich hoffe, du musst den Termin nicht schon wieder *verschieben*.
  
  Anche se non volevi, hai *spostato* tutte le mie cose nello scaffale sbagliato.
  Auch wenn du es nicht wolltest, hast du all meine Sachen ins *falsche* Regal verschoben.
  
  Se non ti dispiace, potresti *spostare* il divano vicino alla finestra?
  Wenn es dir nichts ausmacht, könntest du die Couch ans Fenster *verschieben*?
  
  Hanno deciso di *spostare* la partenza alle otto per evitare il traffico.
  Sie haben beschlossen, die Abfahrt auf acht Uhr zu *verschieben*, um Staus zu vermeiden.
Audio: ''
