Rang: 3411
Wort: critico
Wortart: adj
Wort mit Artikel: critico
Femininum / Plural: ''
IPA: ''
Definition: kritisch, entscheidend
Register: ''
Beispielsätze: |-
  Il medico ha fatto un'analisi *critica* dei risultati degli esami.
  Der Arzt hat eine *kritische* Analyse der Testergebnisse gemacht.
  
  Senza un atteggiamento *critico*, non si può progredire nella ricerca.
  Ohne eine *kritische* Haltung kann man in der Forschung nicht vorankommen.
  
  I giudici hanno espresso un parere *critico* sulla nuova legge.
  Die Richter haben eine *kritische* Stellungnahme zum neuen Gesetz abgegeben.
  
  Non essere così *critico* con te stesso, ogni sbaglio aiuta a imparare.
  Sei nicht so *kritisch* zu dir selbst, jeder Fehler hilft beim Lernen.
  
  Il regista ha ricevuto molte recensioni *critiche* per il suo ultimo film.
  Der Regisseur hat viele *kritische* Rezensionen für seinen neuesten Film erhalten.
