Rang: 2959
Wort: ricoprire
Wortart: vt
Wort mit Artikel: ricoprire
Femininum / Plural: ''
IPA: ''
Definition: bedecken, überziehen, einnehmen
Register: ''
Beispielsätze: |-
  Il ghiaccio *ricopre* il lago durante l'inverno.
  Das Eis *bedeckt* den See im Winter.
  
  Ha *ricoperto* la parete di murales colorati che rappresentano la sua città.
  Er hat die Wand mit bunten Wandbildern *bedeckt*, die seine Stadt darstellen.
  
  L'inquinamento *ricopre* ormai tutta la valle, purtroppo.
  Die Verschmutzung *überzieht* mittlerweile das ganze Tal, leider.
  
  Se non avessi *ricoperto* la pentola, il sugo si sarebbe bruciato.
  Wenn ich den Topf nicht *bedeckt* hätte, wäre die Sauce angebrannt.
  
  Dopo la conferenza, dovremmo *ricoprire* un incarico importante nella nuova associazione.
  Nach der Konferenz sollten wir einen wichtigen Posten im neuen Verein *übernehmen*.
