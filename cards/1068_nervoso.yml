Rang: 1068
Wort: nervoso
Wortart: adj
Wort mit Artikel: nervoso
Femininum / Plural: ''
IPA: ''
Definition: nervös, gereizt, ungeduldig
Register: ''
Beispielsätze: |-
  Mario è *nervoso* perché ha perso il suo collo nella confusione dell’aeroporto.
  Mario ist *nervös*, weil er seinen Hals im Chaos des Flughafens verloren hat.
  
  Se fossi al tuo posto, mi *nerverei* troppo a stare in piedi per ore senza mangiare.
  Wenn ich an deiner Stelle wäre, würde ich mich zu sehr *nervös* machen, stundenlang ohne Essen zu stehen.
  
  La polizia sospetta che l’uomo fosse *nervoso* perché aveva commesso un errore nella sua indagine.
  Die Polizei vermutet, dass der Mann *nervös* war, weil er einen Fehler in seiner Untersuchung begangen hatte.
  
  Nonostante sia un animale molto capace, il cane si è mostrato *nervoso* durante la visita dal veterinario.
  Obwohl es ein sehr fähiges Tier ist, zeigte der Hund sich während des Besuchs beim veterinär *nervös*.
  
  Dopo aver curato la ferita e aver proceduto con calma, la dottoressa ha spiegato che il paziente era solo un po’ *nervoso* per la sensazione di dolore.
  Nachdem sie die Wunde behandelt und ruhig vorgegangen war, erklärte die Ärztin, dass der Patient nur ein bisschen *nervös* wegen des Schmerzgefühls war.
