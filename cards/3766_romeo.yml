Rang: 3766
Wort: romeo
Wortart: n.m
Wort mit Artikel: il romeo
Femininum / Plural: romei
IPA: ''
Definition: der Romeo, -s
Register: ''
Beispielsätze: |-
  Giulio è *Romeo* e recita la parte del amante nella recita scolastica.
  Giulio ist *Romeo* und spielt die Rolle des Liebhabers im Schultheaterstück.
  
  Se incontri un *Romeo* che scrive poesie d’amore, stai attento alle sue intenzioni.
  Wenn du einem *Romeo* begegnest, der Liebesgedichte schreibt, sei vorsichtig mit seinen Absichten.
  
  Il regista ha scelto Fabio come *Romeo* perché la sua recitazione era molto intensa.
  Der Regisseur hat Fabio als *Romeo* ausgewählt, weil seine Schauspielkunst sehr intensiv war.
  
  Chiunque osi baciare Giulietta senza essere *Romeo* finirà in guai seri.
  Wer es wagt, Giulia zu küssen, ohne *Romeo* zu sein, wird in große Schwierigkeiten geraten.
  
  Da quando hai deciso di interpretare *Romeo*, la tua recitazione è migliorata moltissimo.
  Seit du beschlossen hast, *Romeo* zu spielen, hat sich dein Schauspiel enorm verbessert.
