Beispielsätze: |-
  Ho mangiato *soltanto* un panino a pranzo perché non avevo fame.
  Ich habe *nur* ein Brötchen zum Mittag gegessen, weil ich keinen Hunger hatte.
  
  Se vuoi venire con me, devi arrivare *soltanto* alle otto, non un minuto dopo.
  Wenn du mit mir kommen willst, musst du *nur* um acht Uhr ankommen, nicht eine Minute später.
  
  Pensavo che ci fossero dieci invitati, ma *soltanto* cinque si sono presentati.
  Ich dachte, es wären zehn Gäste gekommen, aber *nur* fünf sind erschienen.
  
  Ha detto che avrebbe pagato *soltanto* la metà del prezzo, non l’intero importo.
  Er hat gesagt, er würde *nur* die Hälfte des Preises zahlen, nicht den ganzen Betrag.
  
  *Soltanto* dopo aver finito i compiti ho potuto uscire con gli amici, anche se ero stufo di studiare.
  *Erst* nachdem ich die Hausaufgaben fertig hatte, konnte ich mit den Freunden ausgehen, obwohl ich keine Lust mehr auf Lernen hatte.
