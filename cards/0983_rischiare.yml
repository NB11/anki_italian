Rang: 983
Wort: rischiare
Wortart: v
Wort mit Artikel: rischiare
Femininum / Plural: ''
IPA: ''
Definition: riskieren, wagen
Register: ''
Beispielsätze: |-
  Se non *rischi*, non guadagni nulla.
  Wenn du nicht *riskierst*, gewinnst du nichts.
  
  Ha *rischiato* la vita per salvare il suo amico.
  Er hat sein Leben *riskiert*, um seinen Freund zu retten.
  
  Non *rischierei* mai tutto il mio patrimonio in un solo progetto.
  Ich würde mein gesamtes Vermögen niemals in einem einzigen Projekt *riskieren*.
  
  Stiamo per *rischiare* tutto quello che abbiamo costruito negli ultimi anni.
  Wir stehen kurz davor, alles zu *riskieren*, was wir in den letzten Jahren aufgebaut haben.
  
  Mi dispiace, ma non possiamo *rischiare* che qualcuno ci riconosca al ristorante famoso.
  Es tut mir leid, aber wir können nicht *riskieren*, dass uns jemand im berühmten Restaurant erkennt.
