Rang: 910
Wort: chiuso
Wortart: adj
Wort mit Artikel: chiuso
Femininum / Plural: chiusi
IPA: ''
Definition: geschlossen, zu, verschlossen
Register: ''
Beispielsätze: |-
  La porta è *chiusa* perché il professore sta dando l'esame nel laboratorio interno.
  Die Tür ist *geschlossen*, weil der Professor die Prüfung im inneren Labor abhält.
  
  Anche se il negozio è *chiuso*, ho sentito urlare qualcuno dentro l'edificio abbandonato.
  Auch wenn das Geschäft *geschlossen* ist, habe ich jemanden im verlassenen Gebäude schreien gehört.
  
  Dopo che il cadavere fu trovato, ogni passaggio rimase *chiuso* per settimane per le indagini.
  Nachdem die Leiche gefunden wurde, blieb jeder Durchgang für Wochen *geschlossen*, um die Ermittlungen abzuwickeln.
  
  Vorrei sapere se la ferrovia sarà *chiusa* durante il ritorno degli eroi dalla battaglia.
  Ich möchte wissen, ob die Bahnstrecke während der Rückkehr der Helden aus der Schlacht *geschlossen* sein wird.
  
  Il prezzo di quell'hotel è alto perché, purtroppo, la piscina è *chiusa* e non c'è altro colore nella struttura.
  Der Preis dieses Hotels ist hoch, weil leider das Schwimmbad *geschlossen* ist und es keine andere Farbe im Gebäude gibt.
