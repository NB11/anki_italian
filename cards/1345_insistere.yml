Rang: 1345
Wort: insistere
Wortart: vi
Wort mit Artikel: insistere
Femininum / Plural: ''
IPA: ''
Definition: bestehen auf, darauf *beharren*
Register: ''
Beispielsätze: |-
  Nonostante la sua *insistenza*, non ho cambiato idea.
  Trotz seiner *Einsicht* habe ich meine Meinung nicht geändert.
  
  Il medico *insiste* che tu stia a letto almeno una settimana.
  Der Arzt *besteht darauf*, dass du mindestens eine Woche im Bett bleibst.
  
  Se *insisterai* abbastanza, forse ti aiuterò con il progetto.
  Wenn du *dich entscheiden genug* wirst, helfe ich dir vielleicht bei dem Projekt.
  
  È inutile *insistere* su questo argomento, nessuno ti ascolterà.
  Es ist sinnlos, auf diesem Thema zu *beharren*, niemand wird dir zuhören.
  
  Anche se *insistette* per ore, non riuscì a convincerla.
  Selbst als er stundenlang *darauf bestand*, gelang es ihm nicht, sie zu überzeugen.
Audio: ''
Notiz: ''
Dispersion: ''
