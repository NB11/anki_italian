Rang: 4567
Wort: fattura
Wortart: n.f
Wort mit Artikel: la fattura
Femininum / Plural: fatture
IPA: ''
Definition: die Rechnung, -en
Register: ''
Beispielsätze: |-
  Ho ricevuto *la fattura* per il pagamento dell'elettricità.
  Ich habe die *Rechnung* für die Stromzahlung erhalten.
  
  Vorrei sapere se *le fatture* di gennaio sono già state inviate.
  Ich möchte wissen, ob die *Rechnungen* von Januar schon verschickt wurden.
  
  L'azienda ha emesso *una fattura* molto dettagliata per il nostro ordine.
  Die Firma hat *eine Rechnung* ausgestellt, die sehr detailliert ist.
  
  Non appena riceveremo *la fattura* finale, potremo chiudere il progetto.
  Sobald wir *die finale Rechnung* erhalten, können wir das Projekt abschließen.
  
  Mi dispiace, ma *la fattura* del ristorante includeva anche servizi che non abbiamo richiesto.
  Es tut mir leid, aber *die Rechnung* des Restaurants beinhaltete auch Dienstleistungen, die wir nicht bestellt haben.
