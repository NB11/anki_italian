Rang: 3534
Wort: novembre
Wortart: n.m
Wort mit Artikel: il novembre
Femininum / Plural: ''
IPA: ''
Definition: der November
Register: ''
Beispielsätze: |-
  In *novembre* le giornate si accorciano e fa sempre più freddo.
  Im *November* werden die Tage kürzer und es wird immer kälter.
  
  Non ho ancora fatto la raccolta delle olive di *novembre*, quest’anno.
  Ich habe die Olivenernte im *November* dieses Jahr noch nicht gemacht.
  
  Se *novembre* sarà mite, potremo ancora passeggiare nel parco.
  Wenn der *November* mild wird, können wir noch im Park spazieren gehen.
  
  Ha scelto proprio *novembre* per annunciare il suo ritiro dal calcio!
  Er hat ausgerechnet im *November* seinen Rücktritt vom Fußball bekannt gegeben!
  
  Era il *novembre* del 1989 quando cadde il muro di Berlino.
  Es war der *November* 1989, als die Berliner Mauer fiel.
