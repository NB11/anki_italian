Rang: 4054
Wort: armatura
Wortart: n.f
Wort mit Artikel: l'armatura
Femininum / Plural: armature
IPA: ''
Definition: die Rüstung, -en
Register: ''
Beispielsätze: |-
  L'*armatura* medievale era spesso fatta di metallo pesante e proteggeva il cavaliere dai colpi in battaglia.
  Die mittelalterliche *Rüstung* bestand oft aus schwerem Metall und schützte den Ritter vor Schlägen im Kampf.
  
  Hanno trovato una *armatura* antica durante gli scavi archeologici vicino al fiume.
  Sie fanden eine antike *Rüstung* während der archäologischen Ausgrabungen nahe dem Fluss.
  
  Sebbene l'*armatura* fosse costosa, molti cavalieri preferivano portarla per sicurezza.
  Obwohl die *Rüstung* teuer war, trugen viele Ritter sie gern aus Sicherheitsgründen.
  
  L’*armatura* di questo cavaliere pesa più di trenta chilogrammi, quindi deve allenarsi spesso.
  Die *Rüstung* dieses Ritters wiegt über dreißig Kilogramm, weshalb er sich oft trainieren muss.
  
  Nonostante le leggende, nessuna *armatura* era davvero indistruttibile.
  Trotz der Legenden war keine *Rüstung* wirklich unzerstörbar.
