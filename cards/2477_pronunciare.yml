Rang: 2477
Wort: pronunciare
Wortart: v
Wort mit Artikel: pronunciare
Femininum / Plural: ''
IPA: ''
Definition: aussprechen
Register: ''
Beispielsätze: |-
  Vuoi *pronunciare* quella parola in modo corretto per favore?
  Willst du dieses Wort bitte richtig *aussprechen*?
  
  L’imputato ha dovuto *pronunciare* una frase in tribunale.
  Der Angeklagte musste einen Satz im Gerichtssaal *aussprechen*.
  
  Credo che tu abbia *pronunciato* male il nome di questa città.
  Ich glaube, du hast den Namen dieser Stadt falsch *ausgesprochen*.
  
  Se non impari a *pronunciare* le parole italiane, non potrai mai parlare fluentemente.
  Wenn du nicht lernst, italienische Wörter *auszusprechen*, wirst du nie fließend sprechen können.
  
  Il giudice gli ha concesso un’ora per *pronunciare* le sue ultime parole.
  Der Richter gewährte ihm eine Stunde, um seine letzten Worte *auszusprechen*.
