Beispielsätze: |-
  La *tonnellata* di carbone servirà per riscaldare l’appartamento tutto l’inverno.
  Die *Tonne* Kohle wird ausreichen, um die Wohnung den ganzen Winter zu heizen.
  
  Quante *tonnellate* di rifiuti vengono prodotte ogni anno in questa città?
  Wie viele * Tonnen* Müll werden jedes Jahr in dieser Stadt produziert?
  
  Hanno calcolato che per costruire il ponte ci vorranno almeno 500 *tonnellate* d’acciaio.
  Sie haben berechnet, dass für den Bau der Brücke mindestens 500 *Tonnen* Stahl benötigt werden.
  
  Il camion trasportava un carico di 12 *tonnellate* di sabbia.
  Der Lastwagen transportierte eine Ladung von 12 *Tonnen* Sand.
  
  Se non riduciamo le emissioni, presto supereremo le 2 *tonnellate* di CO₂ pro persona all’anno.
  Wenn wir die Emissionen nicht reduzieren, werden wir bald die 2 *Tonnen* CO₂ pro Person und Jahr überschreiten.
