Beispielsätze: |-
  Il problema *idraulico* nel bagno è davvero fastidioso.
  Das *Wasser*problem im Bad ist wirklich lästig.
  
  Ho chiamato l'idraulico perché lo scarico non smette di gocciolare.
  Ich rief den *Sanitärinstallateur*, weil das Abflussrohr weiterhin tropft.
  
  Le tubature *idrauliche* di questo palazzo sono vecchissime e arrugginite.
  Die *Rohr*leitungen in diesem Gebäude sind uralt und verrostet.
  
  Nonostante l'allerta per le piogge, l'impianto *idraulico* ha resistito senza problemi.
  Trotz der *Warnung* vor Regen hat die Wasserversorgung problemlos gehalten.
  
  L'idraulico ha detto che il guasto era dovuto a un uso improprio del sifone.
  Der *Sanitärinstallateur* erklärte, die Störung sei durch falsche Nutzung des Siphons entstanden.
