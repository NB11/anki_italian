Rang: 2041
Wort: spaventoso
Wortart: adj
Wort mit Artikel: spaventoso
Femininum / Plural: ''
IPA: ''
Definition: gruselig, erschreckend, fürchterlich
Register: ''
Beispielsätze: |-
  La storia che mi hai raccontato era così *spaventosa* che non sono riuscito a dormire tutta la notte.
  Die Geschichte, die du mir erzählt hast, war so *gruselig*, dass ich die ganze Nacht nicht schlafen konnte.
  
  Nonostante l’aspetto *spaventoso* del mostro, il bambino riuscì a rimanere calmo.
  Trotz des *erschreckenden* Aussehens des Monsters blieb das Kind ruhig.
  
  Ho visto un film così *spaventoso* che mia sorella ha chiuso gli occhi per tutto il terzo atto.
  Ich habe einen *gruseligen* Film gesehen, sodass meine Schwester die Augen die ganze dritte Szene über geschlossen hielt.
  
  È *spaventoso* quanto velocemente si stia diffondendo quel virus nel territorio locale.
  Es ist *erschreckend*, wie schnell sich dieses Virus auf dem lokalen Gebiet ausbreitet.
  
  La notizia del loro fallimento è stata davvero *spaventosa* per tutti noi, ma non dobbiamo cedere al panico.
  Die Nachricht von ihrem Scheitern war für uns alle wirklich *fürchterlich*, aber wir dürfen nicht in Panik verfallen.
