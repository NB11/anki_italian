Rang: 2265
Wort: palco
Wortart: n.m
Wort mit Artikel: il palco
Femininum / Plural: i palchi
IPA: ''
Definition: die Bühne, -n
Register: ''
Beispielsätze: |-
  L'attore è salito sul *palco* per ricevere il pubblico.
  Der Schauspieler ist auf die *Bühne* gestiegen, um das Publikum zu empfangen.
  
  Il regista ha spiegato che il *palco* sarà allestito domani mattina.
  Der Regisseur hat erklärt, dass die *Bühne* morgen früh aufgebaut wird.
  
  Non mi piace cantare sul *palco*: ho troppa paura di sbagliare.
  Ich singe nicht gern auf der *Bühne*: Ich habe zu viel Angst, einen Fehler zu machen.
  
  Quando ero piccolo, sognavo di suonare la chitarra su un *palco* illuminato dai riflettori.
  Als ich klein war, träumte ich davon, auf einer von Scheinwerfern beleuchteten *Bühne* Gitarre zu spielen.
  
  Il *palco* principale del teatro è stato restaurato per la nuova stagione.
  Die Haupt-*Bühne* des Theaters wurde für die neue Spielzeit restauriert.
