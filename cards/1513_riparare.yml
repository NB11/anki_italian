Rang: 1513
Wort: riparare
Wortart: v
Wort mit Artikel: riparare
Femininum / Plural: ''
IPA: ''
Definition: reparieren, beheben
Register: ''
Beispielsätze: |-
  Il meccanico *ripara* la macchina del signor Rossi ogni settimana.
  Der Mechaniker *repariert* das Auto von Herrn Rossi jede Woche.
  
  Se non *riparerai* il tetto, pioverà dentro casa durante l’inverno.
  Wenn du das Dach nicht *reparierst*, wird es im Winter ins Haus hineinregnen.
  
  Ho chiamato l’elettricista perché la lavatrice non *ripara* più da sola.
  Ich habe den Elektriker gerufen, weil die Waschmaschine sich nicht mehr selbst *repariert*.
  
  L’artefice promise di *riparare* lo strumento antico entro domani sera.
  Der Handwerker versprach, das antike Instrument bis morgen Abend zu *reparieren*.
  
  Dato che il computer non funzionava, dovette assumere un tecnico che sapesse *riparare* i circuiti danneggiati.
  Da der Computer nicht funktionierte, musste er einen Techniker einstellen, der beschädigte Schaltkreise *reparieren* konnte.
