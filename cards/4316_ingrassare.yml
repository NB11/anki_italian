Rang: 4316
Wort: ingrassare
Wortart: v
Wort mit Artikel: ingrassare
Femininum / Plural: ''
IPA: ''
Definition: Fett ansetzen, mästen
Register: ''
Beispielsätze: |-
  Dopo le vacanze lui è *ingrassato* di due chili!
  Nach den Ferien hat er *zwei Kilo zugenommen*!
  
  Se mangi troppo dolci, rischi di *ingrassare* velocemente.
  Wenn du zu viele Süßigkeiten isst, riskierst du, *schnell zuzunehmen*.
  
  Il medico gli ha consigliato di non *ingrassare* ulteriormente.
  Der Arzt hat ihm geraten, *nicht weiter zuzunehmen*.
  
  Era così magro che ogni boccone lo faceva *ingrassare*!
  Er war so dünn, dass jeder Bissen ihn *dicker werden ließ*!
  
  Per non *ingrassare*, lei evita i cibi fritti e va in piscina ogni giorno.
  Um *nicht zuzunehmen*, meidet sie frittierte Speisen und geht jeden Tag ins Schwimmen.
