Rang: 2474
Wort: nervo
Wortart: n.m
Wort mit Artikel: il nervo
Femininum / Plural: i nervi
IPA: ''
Definition: der Nerv, -en
Register: ''
Beispielsätze: |-
  Sono venuto da te perché mi tremano *i nervi* quando guardo quel film horror.
  Ich bin zu dir gekommen, weil mir die *Nerven* zittern, wenn ich diesen Horrorfilm ansehe.
  
  Il medico mi ha detto che devo rimanere a riposo perché ho un’infiammazione a *un nervo* del collo.
  Der Arzt hat mir gesagt, dass ich Ruhe halten muss, weil ich eine Entzündung an *einem Nerv* im Nacken habe.
  
  Se senti un dolore acuto a *un nervo*, dovresti farti controllare subito dal neurologo.
  Wenn du einen stechenden Schmerz an *einem Nerv* spürst, solltest du dich sofort vom Neurologen untersuchen lassen.
  
  A volte è difficile mantenere la calma quando *i nervi* sono tesi per lo stress lavorativo.
  Manchmal ist es schwer, ruhig zu bleiben, wenn *die Nerven* durch den Arbeitsstress angespannt sind.
  
  Nonostante *il nervo* lesionato, il violinista ha continuato a suonare e ha vinto il concorso.
  Trotz der beschädigten *Nerven* hat der Geiger weitergespielt und den Wettbewerb gewonnen.
