Rang: 791
Wort: nemico
Wortart: n.m
Wort mit Artikel: il nemico
Femininum / Plural: nemici
IPA: ''
Definition: der Feind, -e
Register: ''
Beispielsätze: |-
  Il *nemico* dell’impero minacciava di attaccare presto.
  Der *Feind* des Reiches drohte bald anzugreifen.
  
  Ho temuto tanto questo *nemico* fin da quando ero piccolo.
  Ich habe diesen *Feind* schon seit ich klein war so sehr gefürchtet.
  
  Nonostante il *nemico* fosse vicino, siamo rimasti calmi.
  Obwohl der *Feind* nah war, blieben wir ruhig.
  
  Se il *nemico* non fosse stato sconfitto, tutto sarebbe andato male.
  Wenn der *Feind* nicht besiegt worden wäre, wäre alles schiefgegangen.
  
  Dicono che il *nemico* stia scendendo dal terzo piano.
  Man sagt, dass der *Feind* gerade aus dem dritten Stock kommt.
