Rang: 791
Wort: nemico
Wortart: n.m
Wort mit Artikel: il nemico
Femininum / Plural: nemici
IPA: ''
Definition: der Feind, -e
Register: ''
Beispielsätze: |-
  Il *nemico* è stato sconfitto nell'ultima battaglia.
  Der *Feind* wurde in der letzten Schlacht besiegt.
  
  Non dimenticare mai i tuoi vecchi *nemici*.
  Vergiss deine alten *Feinde* nie.
  
  Hai veramente un *nemico* in ufficio?
  Hast du wirklich einen *Feind* im Büro?
  
  Siamo *nemici* da quando ha tradito la nostra fiducia.
  Wir sind *Feinde*, seit er unser Vertrauen verraten hat.
  
  I *nemici* di ieri oggi sono nostri alleati.
  Die *Feinde* von gestern sind heute unsere Verbündeten.
