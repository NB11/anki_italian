Rang: 3406
Wort: seminterrato
Wortart: n.m
Wort mit Artikel: il seminterrato
Femininum / Plural: seminterrati
IPA: ''
Definition: der Keller, -
Register: ''
Beispielsätze: |-
  La casa ha un *seminterrato* molto ampio dove custodiamo le vecchie fotografie di famiglia.
  Das Haus hat einen *Keller*, in dem wir die alten Familienfotos aufbewahren.
  
  Dopo l’alluvione, è stato necessario svuotare tutto il *seminterrato*.
  Nach der Flut musste der gesamte *Keller* geräumt werden.
  
  Non scendo mai nel *seminterrato* da solo, perché è troppo buio e rumoroso.
  Ich gehe nie allein in den *Keller*, denn es ist dort zu dunkel und laut.
  
  Hanno trasformato il *seminterrato* in un laboratorio per esperimenti scientifici.
  Sie haben den *Keller* in ein wissenschaftliches Labor für Experimente umgebaut.
  
  Se hai bisogno di spazio, puoi usare il *seminterrato* per depositare gli oggetti ingombranti.
  Falls du Platz brauchst, kannst du den *Keller* nutzen, um sperrige Gegenstände unterzustellen.
