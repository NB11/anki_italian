Rang: 1358
Wort: civile
Wortart: adj
Wort mit Artikel: civile
Femininum / Plural: ''
IPA: ''
Definition: zivil, bürgerlich, *gesittet*
Register: ''
Beispielsätze: |-
  Il comportamento di Marco è stato decisamente *civile* durante l'incontro con l'ispettore.
  Markos Verhalten war während des Treffens mit dem Inspektor *entschieden* höflich.
  
  Credi che sia *civile* sprecare così tanto tempo davanti alla televisione?
  Findest du es *höflich*, so viel Zeit vor dem Fernseher zu verschwendet?
  
  Nonostante le tensioni, la discussione rimase *civile* grazie all'intervento dell'assistente.
  Trotz der Spannungen blieb das Gespräch *gesittet*, dank des Eingreifens der Assistentin.
  
  Vorrei un parere *civile* su come affrontare questa situazione senza provocare ulteriori problemi.
  Ich hätte gern eine *zivile* Meinung, wie man diese Situation löst, ohne weitere Probleme hervorzurufen.
  
  La polizia ha confermato che l'atto compiuto dal cittadino era *civile* e non violento.
  Die Polizei bestätigte, dass die Handlung des Bürgers *zivil* und nicht gewalttätig war.
