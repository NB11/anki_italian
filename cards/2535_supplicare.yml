Rang: 2535
Wort: supplicare
Wortart: vt
Wort mit Artikel: supplicare
Femininum / Plural: ''
IPA: ''
Definition: anflehen, inständig bitten
Register: ''
Beispielsätze: |-
  Ti *supplico* di non partire stasera, per favore!
  Ich *flehe* dich an, heute Abend nicht abzureisen.
  
  Il prigioniero si mise in ginocchio e cominciò a *supplicare* la guardia per avere clemenza.
  Der Gefangene kniete nieder und begann, den Wärter um *Gnade zu flehen*.
  
  Anche se era stanco, non volle *supplicare* per un giorno di riposo in più.
  Obwohl er müde war, wollte er nicht *um einen weiteren Ruhetag bitten*.
  
  Non *supplicare* mai il destino, ma lotta per ciò che desideri.
  Bitte das Schicksal niemals an, sondern kämpfe für das, was du willst.
  
  Se avessi saputo quanto ti amava, forse avrei *supplicato* perdono in tempo.
  Wenn ich gewusst hätte, wie sehr er dich liebt, hätte ich vielleicht rechtzeitig um *Vergebung gefleht*.
