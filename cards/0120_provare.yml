Rang: 120
Wort: provare
Wortart: v
Wort mit Artikel: provare
Femininum / Plural: ''
IPA: ''
Definition: versuchen, ausprobieren, empfinden
Register: ''
Beispielsätze: |-
  Mi piacerebbe *provare* quella torta al cioccolato.
  Ich würde gerne *diesen* Schokoladenkuchen *probieren* (*ausprobieren*).
  
  Se fossi in te, *proverei* a studiare di più per l'esame.
  Wenn ich du wäre, würde ich *versuchen* (*ausprobieren*), mehr für die Prüfung zu lernen.
  
  Che cosa provi quando ascolti questa canzone?
  Was *empfindest* (*fühlst*) du, wenn du dieses Lied hörst?
  
  Abbiamo *provato* ad aprire la porta, ma era bloccata.
  Wir haben versucht (*probiért*), die Tür zu öffnen, aber sie war blockiert.
  
  Non si *provino* a chiamare prima di arrivare!
  Versuchen (*ausprobieren*) Sie nicht, anzurufen, bevor Sie ankommen!
Audio: ''
Notiz: ''
Dispersion: ''
