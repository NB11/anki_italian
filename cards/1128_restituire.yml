Rang: 1128
Wort: restituire
Wortart: vt
Wort mit Artikel: restituire
Femininum / Plural: ''
IPA: ''
Definition: zurückgeben, zurückerstatten
Register: ''
Beispielsätze: |-
  Devi *restituire* il libro alla biblioteca entro domani, altrimenti ti costerà una multa.
  Du musst das Buch in *der* Bibliothek bis morgen zurückgeben, sonst kostet es dich eine Strafe.
  
  Ho *restituito* quella maglia perché aveva un buco nascosto nella cucitura.
  Ich habe den Pullover *zurückgegeben*, weil er ein verstecktes Loch in der Naht hatte.
  
  Se non mi sbaglio, Marco avrebbe dovuto *restituire* il documento al tribunale precedente alla scadenza del termine.
  Wenn ich mich nicht irre, hätte Marco *das* Dokument vor Ablauf der Frist an das Gericht zurückgeben müssen.
  
  Gli hanno chiesto di *restituire* la spada successivamente all’arma bianca dell’avversario, soprattutto per evitare il conflitto.
  Man bat ihn, das Schwert nach der Blankwaffe des Gegners *zurückzugeben*, vor allem um einen Konflikt zu vermeiden.
  
  Prima che l’ufficiale potesse *restituire* il passaporto, il collega aveva già identificato lo sbaglio nel visto.
  Bevor der Beamte den Pass *zurückgeben* konnte, hatte der Kollege bereits den Fehler im Visum erkannt.
