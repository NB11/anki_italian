Rang: 4867
Wort: sgombrare
Wortart: vt
Wort mit Artikel: sgombrare
Femininum / Plural: ''
IPA: ''
Definition: räumen, frei machen, ausräumen
Register: ''
Beispielsätze: |-
  Devo *sgombrare* la soffitta prima che arrivi la pioggia.
  Ich muss den Dachboden ausräumen, bevor es regnet.
  
  Dopo la festa hanno aiutato a *sgombrare* il salone dalle bottiglie vuote.
  Nach der Feier halfen sie, den Saal von leeren Flaschen zu räumen.
  
  Se non *sgombri* subito quella scrivania, non potrai lavorare!
  Wenn du den Schreibtisch nicht sofort freiräumst, kannst du nicht arbeiten!
  
  Hanno chiamato i vigili del fuoco per *sgombrare* la strada dopo l’incidente.
  Sie haben die Feuerwehr gerufen, um die Straße nach dem Unfall freizuräumen.
  
  Avrei preferito che avessero *sgombrato* la stanza prima del nostro arrivo.
  Ich hätte lieber gehabt, wenn sie das Zimmer vor unserer Ankunft freigeräumt hätten.
