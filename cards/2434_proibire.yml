Rang: 2434
Wort: proibire
Wortart: v
Wort mit Artikel: proibire
Femininum / Plural: ''
IPA: ''
Definition: verbieten, untersagen
Register: ''
Beispielsätze: |-
  Il sindaco ha *proibito* l’uso di fuochi d’artificio nel centro città.
  Der Bürgermeister hat den Gebrauch von Feuerwerk im Stadtzentrum *verboten*.
  
  Se vuoi perderti in questa *proibizione*, chiedi a un avvocato esperto.
  Wenn du dich bei diesem *Verbot* verlieren willst, frag einen erfahrenen Anwalt.
  
  Speravo che la legge avrebbe *proibito* quelle sostanze tossiche, ma purtroppo non è successo.
  Ich hatte gehofft, dass das Gesetz diese giftigen *Stoffe* verbieten würde, aber leider ist es nicht passiert.
  
  Hanno *proibito* di parlare ad alta voce durante la cerimonia religiosa.
  Sie haben es *verboten*, während der religiösen Zeremonie laut zu sprechen.
  
  Avrei preferito che *proibissero* l’accesso ai minori a quel film violento.
  Ich hätte es bevorzugt, wenn sie den Zugang von Minderjährigen zu diesem gewalttätigen Film *verboten* hätten.
