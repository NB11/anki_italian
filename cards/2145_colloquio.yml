Rang: 2145
Wort: colloquio
Wortart: n.m
Wort mit Artikel: il colloquio
Femininum / Plural: i colloqui
IPA: ''
Definition: das Vorstellungsgespräch, -e
Register: ''
Beispielsätze: |-
  Ieri ho avuto un *colloquio* di lavoro molto interessante con l'impresa che vuole assumermi.
  Gestern hatte ich ein *Vorstellungsgespräch* mit dem Unternehmen, das mich einstellen möchte.
  
  Se non studi, non avrai nessuna chance di superare il *colloquio* di domani.
  Wenn du nicht lernst, hast du keine *Chance*, das Vorstellungsgespräch morgen zu bestehen.
  
  Il *colloquio* con il preside è stato molto delicato, perché ha parlato delle possibili sanzioni per chi infrange le regole.
  Das *Gespräch* mit dem Rektor war sehr heikel, weil er über mögliche Strafen für diejenigen sprach, die die Regeln brechen.
  
  Quando farai il *colloquio* per il posto da insegnante, porta una copia del tuo curriculum e dei certificati.
  Wenn du das *Vorstellungsgespräch* für die Stelle als Lehrer machst, bring eine Kopie deines Lebenslaufs und der Zeugnisse mit.
  
  Ho saputo che ti hanno chiamato per un secondo *colloquio*, ma non dire nulla a nessuno finché non sarai sicuro.
  Ich habe gehört, dass sie dich zu einem zweiten *Gespräch* eingeladen haben, aber sag niemandem etwas, bis du sicher bist.
