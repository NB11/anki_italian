Rang: 4295
Wort: somministrare
Wortart: v
Wort mit Artikel: somministrare
Femininum / Plural: ''
IPA: ''
Definition: verabreichen, geben
Register: ''
Beispielsätze: |-
  Il medico *somministra* la medicina al paziente ogni mattina alle otto.
  Der Arzt verabreicht dem Patienten jeden Morgen um acht Uhr *
  
  Se fossi un paramedico, avrei *somministrato* l’antidoto immediatamente.
  Wenn ich Sanitäter wäre, hätte ich das Antidot sofort gegeben *
  
  La polizia sta *somministrando* i test ai sospettati per scoprire la verità.
  Die Polizei nimmt den Verdächtigen Tests ab, um die Wahrheit herauszufinden *
  
  È importante che l’insegnante *somministri* la prova di valutazione in modo equo.
  Es ist wichtig, dass der Lehrer die Bewertung gleichmäßig durchführt *
  
  Non appena arriverà il farmaco, inizieremo a *somministrarlo* ai malati.
  Sobald das Medikament ankommt, werden wir es den Kranken zuführen *
Audio: ''
Notiz: ''
