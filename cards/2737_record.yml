Rang: 2737
Wort: record
Wortart: n.m
Wort mit Artikel: il record
Femininum / Plural: record
IPA: ''
Definition: der Rekord, -e
Register: ''
Beispielsätze: |-
  Il *record* mondiale dei 100 metri è stato battuto ieri da un atleta giamaicano.
  Der weltweite *Rekord* über 100 Meter ist gestern von einem jamaikanischen Athleten gebrochen worden.
  
  Non riesco a credere che abbia stabilito un *record* così difficile da superare.
  Ich kann nicht glauben, dass er einen so schwer zu überbietenden *Rekord* aufgestellt hat.
  
  Se continui così, batterai il tuo stesso *record* personale entro la fine della stagione.
  Wenn du so weitermachst, wirst du deinen eigenen persönlichen *Rekord* bis zum Saisonende schlagen.
  
  Il libro che sto leggendo è pieno di *record* straordinari su animali e piante.
  Das Buch, das ich gerade lese, ist voller außergewöhnlicher *Rekorde* über Tiere und Pflanzen.
  
  Secondo il giornale, domani verranno annunciati i nuovi *record* di vendita dell’azienda.
  Laut Zeitung werden morgen die neuen Verkaufs*rekorde* des Unternehmens bekannt gegeben.
