Wort: terroristico
Wortart: adj
Wort mit Artikel: terroristico
Femininum / Plural: ''
IPA: ''
Definition: terroristisch, terrorismushintergründig
Register: ''
Beispielsätze: |-
  L'attacco *terroristico* ha scosso l'intera nazione.
  Der *terroristische* Angriff hat die ganze Nation erschüttert.
  
  Nonostante le misure di sicurezza, un attentato *terroristico* è avvenuto ieri sera.
  Trotz der Sicherheitsvorkehrungen ereignete sich ein *terroristischer* Anschlag gestern Abend.
  
  Le autorità hanno scoperto una cellula *terroristica* prima che potesse agire.
  Die Behörden entdeckten eine *terroristische* Zelle, bevor sie handeln konnte.
  
  Gli investigatori sospettano un movente *terroristico* dietro l'esplosione.
  Die Ermittler vermuten einen *terroristischen* Hintergrund hinter der Explosion.
  
  Se avessimo saputo dei piani *terroristici*, avremmo avvertito le forze dell'ordine.
  Hätten wir von den *terroristischen* Plänen gewusst, hätten wir die Sicherheitskräfte gewarnt.
