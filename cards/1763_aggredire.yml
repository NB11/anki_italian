Rang: 1763
Wort: aggredire
Wortart: vt
Wort mit Artikel: aggredire
Femininum / Plural: ''
IPA: ''
Definition: angreifen, überfallen
Register: ''
Beispielsätze: |-
  Il cane ha *aggredito* il postino senza alcun motivo.
  Der Hund hat den Briefträger *angegriffen* ohne jeden Grund.
  
  Se dovessi *aggredire* qualcuno, spero che tu abbia una buona ragione.
  Wenn du jemanden *überfallen* müsstest, hoffe ich, dass du einen guten Grund hast.
  
  Temeva che il ladro potesse *aggredirlo* durante la notte nel vicolo oscuro.
  Er fürchtete, dass der Dieb ihn nachts in der *finsteren* Gasse überfallen könnte.
  
  La polizia ha riferito che l’uomo ha *aggredito* due turisti in pieno centro.
  Die Polizei berichtete, dass der Mann zwei Touristen im Stadtzentrum *angegriffen* hat.
  
  Credo che non *aggredirei* mai qualcuno, anche se fossi provocato.
  Ich glaube nicht, dass ich jemanden *angreifen* würde, selbst wenn ich provoziert würde.
