Rang: 3325
Wort: rigido
Wortart: adj
Wort mit Artikel: rigido
Femininum / Plural: ''
IPA: ''
Definition: steif, starr, hart
Register: ''
Beispielsätze: |-
  Il filo metallico è diventato *rigido* dopo essere stato esposto al freddo.
  Der Metalldraht ist *steif* geworden, nachdem er der Kälte ausgesetzt war.
  
  Non mi piace questo materasso perché è troppo *rigido* per la mia schiena.
  Ich mag diese Matratze nicht, weil sie für meinen Rücken zu *hart* ist.
  
  La sua opinione *rigida* sulle regole non convince nessuno.
  Ihre *starre* Meinung zu den Regeln überzeugt niemanden.
  
  Dopo la pioggia, il terreno era così *rigido* che non potevamo scavare.
  Nach dem Regen war der Boden so *hart*, dass wir nicht graben konnten.
  
  Il professore ha una visione *rigida* della disciplina, ma è rispettato da tutti.
  Der Professor hat eine *starre* Vorstellung von Disziplin, wird aber von allen respektiert.
