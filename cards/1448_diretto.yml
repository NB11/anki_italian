Rang: 1448
Wort: diretto
Wortart: adj
Wort mit Artikel: diretto
Femininum / Plural: ''
IPA: ''
Definition: direkt, gerade, direkt
Register: ''
Beispielsätze: |-
  Il treno che parte da qui è *diretto* a Milano senza fermate intermedie.
  Der Zug, der hier abfährt, fährt *direkt* nach Mailand ohne Zwischenstopps.
  
  Mi ha guardato con uno sguardo *diretto* e intenso che mi ha fatto sentire a disagio.
  Er hat mich mit einem *direkten* und intensiven Blick angesehen, der mich unwohl fühlen ließ.
  
  Se vuoi arrivare in tempo, prendi la strada *diretta* invece di quella che passa dal centro.
  Wenn du rechtzeitig ankommen willst, nimm die *direkte* Straße und nicht die, die durch das Zentrum führt.
  
  Secondo me, non hai risposto in modo *diretto* alla domanda del professore, ma hai girato intorno al problema.
  Meiner Meinung nach hast du die Frage des Lehrers nicht *direkt* beantwortet, sondern bist um das Problem herumgegangen.
  
  Finalmente ho trovato il documento *diretto* che parlava di questo cambiamento recentemente proposto dal sindaco.
  Endlich habe ich das *direkte* Dokument gefunden, das von dieser kürzlich vom Bürgermeister vorgeschlagenen Veränderung spricht.
