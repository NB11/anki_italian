Rang: 1820
Wort: aggiustare
Wortart: v
Wort mit Artikel: aggiustare
Femininum / Plural: ''
IPA: ''
Definition: reparieren, korrigieren, richten
Register: ''
Beispielsätze: |-
  Mio nonno ha *aggiustato* il vecchio orologio che non funzionava più.
  Mein Opa hat die alte Uhr, die nicht mehr funktionierte, *repariert*.
  
  Il tecnico promette che riuscirà a *aggiustare* il computer entro domani.
  Der Techniker verspricht, dass er den Computer bis morgen *reparieren* kann.
  
  Se avessi più tempo, *aggiusterei* finalmente quella sedia scomoda in soggiorno.
  Wenn ich mehr Zeit hätte, würde ich endlich diesen unbequemen Stuhl im Wohnzimmer *reparieren*.
  
  Lui dice che non serve comprare un nuovo frigorifero, perché si può *aggiustare* quello vecchio con poca spesa.
  Er sagt, man brauche keinen neuen Kühlschrank zu kaufen, denn man könne den alten mit wenig Aufwand *reparieren*.
  
  Nonostante le difficoltà, hanno trovato un modo per *aggiustare* l’invito ricevuto ieri sera.
  Trotz der Schwierigkeiten haben sie einen Weg gefunden, die gestern Abend erhaltene *Einladung* zu korrigieren.
