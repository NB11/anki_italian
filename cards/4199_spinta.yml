Rang: 4199
Wort: spinta
Wortart: n.f
Wort mit Artikel: la spinta
Femininum / Plural: spinte
IPA: ''
Definition: der Stoß, die Schubkraft, der Schub
Register: ''
Beispielsätze: |-
  Il calciatore ha dato una *spinta* all'avversario per rubargli il pallone.
  Der Fußballspieler gab dem Gegner einen *Stoß*, um ihm den Ball abzunehmen.
  
  La *spinta* dell'acqua ha fatto muovere la barca senza bisogno di remi.
  Der *Schub* des Wassers ließ das Boot ohne Ruder losfahren.
  
  Dopo la *spinta* violenta, l'uomo è caduto all'indietro.
  Nach dem heftigen *Stoß* fiel der Mann rückwärts hin.
  
  La scienza studia le *spinte* che provocano i terremoti.
  Die Wissenschaft untersucht die *Kräfte*, die Erdbeben auslösen.
  
  Se non dai una *spinta* decisa alla porta, non si apre da sola.
  Wenn du der Tür keinen kräftigen *Schub* gibst, öffnet sie sich nicht von allein.
