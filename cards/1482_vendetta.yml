Rang: 1482
Wort: vendetta
Wortart: n.f
Wort mit Artikel: la vendetta
Femininum / Plural: vendette
IPA: ''
Definition: die Rache, -n
Register: ''
Beispielsätze: |-
  Dopo anni di *vendetta*, finalmente ha trovato la pace interiore.
  Nach Jahren der *Rache* fand er endlich inneren Frieden.
  
  La sua *vendetta* non portò altro che sofferenza a entrambi.
  Seine *Rache* brachte nur beiden Leid ein.
  
  Se continuerai con questa *vendetta*, perderai tutti i tuoi amici.
  Wenn du mit dieser *Rache* weitermachst, verlierst du alle deine Freunde.
  
  Nonostante la *vendetta*, la loro amicizia rimase intatta.
  Trotz der *Rache* blieb ihre Freundschaft unversehrt.
  
  Chi non perdona per una *vendetta* perde il rispetto degli altri.
  Wer für eine *Rache* nicht vergibt, verliert den Respekt der anderen.
