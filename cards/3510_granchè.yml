Rang: 3510
Wort: granchè
Wortart: adv
Wort mit Artikel: granchè
Femininum / Plural: ''
IPA: ''
Definition: kaum, fast nicht
Register: ''
Beispielsätze: |-
  Non ho *granchè* mangiato perché non avevo fame.
  Ich habe *kaum* gegessen, weil ich keinen Hunger hatte.
  
  Dicono che piova, ma ne *granchè* sono sicuro!
  Sie sagen, es regne, aber ich bin mir *kaum* sicher!
  
  Il negozio era *granchè* affollato come al solito.
  Das Geschäft war *kaum* überlaufen wie sonst.
  
  Se avessi i soldi, comprerei qualcosa, ma *granchè* ne ho.
  Wenn ich das Geld hätte, würde ich etwas kaufen, aber ich habe *kaum* welches.
  
  Nonostante le difficoltà, lui *granchè* si lamenta mai.
  Trotz der Schwierigkeiten beschwert er sich *kaum* jemals.
