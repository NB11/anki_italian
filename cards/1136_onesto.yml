Rang: 1136
Wort: onesto
Wortart: adj
Wort mit Artikel: onesto
Femininum / Plural: ''
IPA: ''
Definition: ehrlich, integer, aufrichtig
Register: ''
Beispielsätze: |-
  È *onesto* dire che non mi fido più di lui dopo quel che ha fatto.
  Es ist *ehrlich* zu sagen, dass ich ihm nach dem, was er getan hat, nicht mehr vertraue.
  
  Se fossi *onesta* con te stessa, ammetteresti di aver sbagliato.
  Wenn du *ehrlich* zu dir selbst wärst, würdest du zugeben, dass du dich vertan hast.
  
  Non sempre le persone *oneste* vengono premiate, purtroppo.
  Nicht immer werden *ehrliche* Menschen belohnt, leider.
  
  Credo che sia importante educare i figli ad essere *onesti* in ogni situazione.
  Ich glaube, dass es wichtig ist, Kinder darin zu erziehen, in jeder Situation *ehrlich* zu sein.
  
  Avresti dovuto essere *onesto* fin dall’inizio, invece di nascondere la verità.
  Du hättest von Anfang an *ehrlich* sein müssen, anstatt die Wahrheit zu verheimlichen.
