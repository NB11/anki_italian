Rang: 4722
Wort: storiella
Wortart: n.f
Wort mit Artikel: la storiella
Femininum / Plural: storielle
IPA: ''
Definition: die kleine Geschichte, die Anekdote
Register: ''
Beispielsätze: |-
  La nonna ci raccontava sempre una *storiella* della sua infanzia quando veniva a trovarci.
  Oma erzählte uns immer eine *kleine Geschichte* aus ihrer Kindheit, wenn sie uns besuchte.
  
  Questa *storiella* che hai inventato è davvero divertente, ma un po' assurda.
  Diese *Anekdote*, die du erfunden hast, ist wirklich lustig, aber etwas absurd.
  
  Non mi piace quando ascolto una *storiella* noiosa durante la lezione di storia.
  Ich mag es nicht, wenn ich während der Geschichtsstunde eine *langweilige Geschichte* anhören muss.
  
  La *storiella* che hai sentito al telegiornale era falsa e inventata di sana pianta.
  Die *kleine Geschichte*, die du in den Nachrichten gehört hast, war erfunden und frei erfunden.
  
  Leggi questa *storiella* e poi dimmi cosa ne pensi dei personaggi principali.
  Lies diese *Anekdote* und sag mir anschließend, was du über die Hauptfiguren denkst.
