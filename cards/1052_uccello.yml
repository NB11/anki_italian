Rang: 1052
Wort: uccello
Wortart: n.m
Wort mit Artikel: l'uccello
Femininum / Plural: uccelli
IPA: ''
Definition: der Vogel, -
Register: ''
Beispielsätze: |-
  Mentre camminavo nel bosco, ho sentito un *uccello* cantare melodiosamente.
  Während ich im Wald spazierte, hörte ich einen *Vogel* melodisch singen.
  
  Domenica scorsa abbiamo visto uno stormo di *uccelli* sopra l’isola.
  Am vergangenen Sonntag sahen wir einen Schwarm *Vögel* über der Insel.
  
  Se fossi in te, comprerei una gabbia elegante per il tuo *uccello* domestico.
  Wenn ich du wäre, würde ich einen eleganten Käfig für deinen *Vogel* kaufen.
  
  Avendo dimenticato di chiudere la finestra, l’*uccello* è volato via dalla stanza.
  Da ich das Fenster offen gelassen hatte, war der *Vogel* aus dem Zimmer geflogen.
  
  Ti ho comprato un regalo: si tratta di un libro che spiega come allevare un *uccello* esotico.
  Ich habe dir ein Geschenk gekauft: Es handelt sich um ein Buch, das erklärt, wie man einen exotischen *Vogel* züchtet.
