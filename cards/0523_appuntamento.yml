Rang: 523
Wort: appuntamento
Wortart: n.m
Wort mit Artikel: l'appuntamento
Femininum / Plural: appuntamenti
IPA: ''
Definition: der Termin, -e, die Verabredung, die Verabredungen
Register: ''
Beispielsätze: |-
  Domani ho un *appuntamento* dal dottore alle tre e mezza.
  Morgen habe ich um halb vier einen *Termin* beim Arzt.
  
  Sai che Marco ha rotto il *appuntamento* con Lucia ieri sera?
  Weißt du, dass Marco gestern Abend die *Verabredung* mit Lucia abgesagt hat?
  
  Non vedo l’ora del nostro *appuntamento* per discutere del rapporto tra i due paesi.
  Ich freue mich schon auf unser *Treffen*, um über das Verhältnis zwischen den beiden Ländern zu sprechen.
  
  Se domani non avrò *appuntamento* con il presidente, potremmo organizzare una riunione con tutto il gruppo.
  Falls ich morgen keinen *Termin* mit dem Präsidenten habe, könnten wir eine Besprechung mit der ganzen Gruppe organisieren.
  
  Dopo aver sistemato ogni cosa al fondo, ho dovuto prendere un *appuntamento* urgente dal dentista.
  Nachdem ich alles am Boden eingerichtet hatte, musste ich dringend einen *Termin* beim Zahnarzt machen.
