Rang: 256
Wort: immaginare
Wortart: v
Wort mit Artikel: immaginare
Femininum / Plural: ''
IPA: ''
Definition: sich vorstellen, denken
Register: ''
Beispielsätze: |-
  Non riesco *ad immaginare* come sia vivere senza internet.
  Ich kann mir nicht *vorstellen*, wie es ist, ohne Internet zu leben.
  
  *Immaginati* la scena: siamo su una spiaggia deserta al tramonto.
  *Stell dir* die Szene vor: Wir sind an einem menschenleeren Strand bei Sonnenuntergang.
  
  Lei aveva *immaginato* uno scenario molto diverso per la sua carriera.
  Sie hatte sich ein *völlig anderes* Szenario für ihre Karriere *ausgemalt*.
  
  Credi che possiamo *immaginare* un futuro senza smartphone?
  Glaubst du, dass wir uns eine Zukunft *ohne* Smartphones *vorstellen können*?
  
  Se *immaginassi* di essere al mio posto, capiresti la mia decisione.
  Wenn du *dir vorstelltest*, an meiner Stelle zu sein, würdest du meine Entscheidung verstehen.
