Rang: 147
Wort: usare
Wortart: v
Wort mit Artikel: usare
Femininum / Plural: ''
IPA: ''
Definition: benutzen, verwenden, gebrauchen
Register: ''
Beispielsätze: |-
  Posso *usare* il tuo telefono per un momento?
  Kann ich dein *Telefon* einen Moment *benutzen*?
  
  Lui *usa* sempre la stessa penna per scrivere.
  Er *verwendet* immer denselben *Füller*, um zu schreiben.
  
  Abbiamo *usato* l’ascensore invece delle scale.
  Wir haben den *Aufzug* anstatt der Treppe *benutzt*.
  
  Vorrei che non *usassi* questo computer vecchio.
  Ich möchte, dass du diesen alten *Computer* nicht *verwendest*.
  
  Domani userò la macchina nuova per andare al lavoro.
  Morgen werde ich das neue *Auto* fahren, um zur Arbeit zu *gehen*.
