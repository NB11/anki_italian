Rang: 1226
Wort: vento
Wortart: n.m
Wort mit Artikel: il vento
Femininum / Plural: venti
IPA: ''
Definition: der Wind, -e
Register: ''
Beispielsätze: |-
  Oggi *vento* soffia molto forte, quindi stai attento mentre guidi il camion!
  Heute bläst der *Wind* sehr stark, also sei vorsichtig, während du den Lastwagen fährst!
  
  Senza *vento*, le barche a vela non possono muovere in alto mare, non trovi?
  Ohne *Wind* können die Segelboote sich nicht auf hoher See bewegen, meinst du nicht?
  
  Il sindaco ha proposto di ridurre l’uso delle sigarette nei parchi dove soffia forte il *vento*.
  Der Bürgermeister hat vorgeschlagen, den Gebrauch der *Zigaretten* in Parks, wo starker Wind weht, zu verringern.
  
  Se il *vento* non cala entro stasera, non potremo festeggiare il compleanno sotto il tetto del giardino.
  Wenn der *Wind* bis heute Abend nicht nachlässt, können wir nicht den Geburtstag unter dem Dach des Gartens feiern.
  
  Dicono che un *vento* così freddo non sia naturale a luglio, quindi molti ospiti si sono lamentati.
  Man sagt, ein so kalter *Wind* sei im Juli nicht normal, deshalb haben sich viele Gäste beschwert.
