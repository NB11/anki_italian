Rang: 3412
Wort: agosto
Wortart: n.m
Wort mit Artikel: l'agosto
Femininum / Plural: ''
IPA: ''
Definition: der August
Register: ''
Beispielsätze: |-
  In *agosto* andiamo sempre al mare con la nostra famiglia.
  Im *August* fahren wir immer mit unserer Familie ans Meer.
  
  Non vedo l'ora che arrivi *agosto* per rilassarmi finalmente!
  Ich kann es kaum erwarten, dass der *August* kommt, um endlich zu entspannen!
  
  È stato durante le vacanze di *agosto* dell'anno scorso che ho conosciuto mia moglie.
  Es war während der *August*-Ferien im letzten Jahr, dass ich meine Frau kennengelernt habe.
  
  Se fossi in vacanza in *agosto*, preferirei la montagna al mare.
  Wenn ich im *August* Urlaub hätte, würde ich lieber in die Berge als ans Meer fahren.
  
  Mi ricordo che nel *agosto* del 2020 non c'era quasi nessuno in spiaggia a causa delle restrizioni.
  Ich erinnere mich, dass es im *August* 2020 aufgrund der Beschränkungen kaum jemanden am Strand gab.
