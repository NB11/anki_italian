Rang: 3146
Wort: allergico
Wortart: adj
Wort mit Artikel: allergico
Femininum / Plural: ''
IPA: ''
Definition: allergisch, überempfindlich
Register: ''
Beispielsätze: |-
  Mio fratello è *allergico* alle noci, quindi deve stare attento a ciò che mangia.
  Mein Bruder ist *allergisch* auf Nüsse, daher muss er aufpassen, was er isst.
  
  Se fossi *allergico* al polline, eviterei di uscire nei giorni di primavera.
  Wenn ich *allergisch* auf Pollen wäre, würde ich an Frühlings­tagen nicht rausgehen.
  
  Non sapevo che fossi *allergico* alle fragole, altrimenti non ti avrei preparato questa macedonia.
  Ich wusste nicht, dass du *allergisch* auf Erdbeeren bist, sonst hätte ich dir diesen Obstsalat nicht gemacht.
  
  La bambina ha lo stesso rash della madre, quindi è probabile che sia *allergica* al lattice.
  Das Mädchen hat denselben Ausschlag wie die Mutter, also ist sie wahrscheinlich *allergisch* auf Latex.
  
  Appena ho sentito lo starnuto del cane, ho capito che era *allergico* ai pollini della cassia che ho appena vista nel mio giardino.
  Sobald ich das Niesen des Hundes hörte, wusste ich, dass er *allergisch* auf den Pollen der Kassie war, die ich gerade in meinem Garten gesehen habe.
