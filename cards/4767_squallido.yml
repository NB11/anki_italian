Rang: 4767
Wort: squallido
Wortart: adj
Wort mit Artikel: squallido
Femininum / Plural: ''
IPA: ''
Definition: armselig, armseliger, armseligsten
Register: ''
Beispielsätze: |-
  L’appartamento che gli hanno affittato sembra *squallido* e trascurato.
  Die Wohnung, die sie ihm vermietet haben, sieht *armselig* und heruntergekommen aus.
  
  Nonostante le *squallide* condizioni della prigione, riuscì a mantenere la dignità.
  Trotz der *armseligen* Gefängnisbedingungen gelang es ihm, seine Würde zu bewahren.
  
  Se avessi saputo che il locale era così *squallido*, non sarei mai entrato.
  Wenn ich gewusst hätte, dass das Lokal so *armselig* ist, wäre ich nie hineingegangen.
  
  Le sue scuse erano piene di promesse *squallide* e vuote.
  Seine Entschuldigungen waren voller *armseliger*, leerer Versprechungen.
  
  Hanno definito la situazione *squallida* pur di non affrontare il vero problema.
  Sie bezeichneten die Situation als *armselig*, nur um das eigentliche Problem zu umgehen.
