Rang: 1811
Wort: tempesta
Wortart: n.f
Wort mit Artikel: la tempesta
Femininum / Plural: tempeste
IPA: ''
Definition: der Sturm, -¨e
Register: ''
Beispielsätze: |-
  La *tempesta* ha distrutto molte case nel villaggio.
  Der *Sturm* hat viele Häuser im Dorf zerstört.
  
  Spero che non ci sarà una *tempesta* durante il nostro viaggio.
  Ich hoffe, dass es während unserer Reise keinen *Sturm* geben wird.
  
  La *tempesta* di ieri sera ha fatto cadere molti alberi.
  Der *Sturm* von gestern Abend hat viele Bäume umgeworfen.
  
  Se ci fosse stata una *tempesta*, non avremmo potuto uscire.
  Wenn es einen *Sturm* gegeben hätte, hätten wir nicht ausgehen können.
  
  Non mi piace quando si avvicina una *tempesta*: fa tanta paura!
  Ich mag es nicht, wenn sich ein *Sturm* nähert: Das ist so beängstigend!
