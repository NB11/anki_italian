Rang: 2885
Wort: morso
Wortart: n.m
Wort mit Artikel: il morso
Femininum / Plural: morsi
IPA: ''
Definition: der Biss, -e
Register: ''
Beispielsätze: |-
  Il cane ha dato un *morso* al postino che è fuggito spaventato.
  Der Hund hat dem Briefträger einen *Biss* gegeben, der erschrocken geflohen ist.
  
  Dopo il *morso* della zanzara mi è venuta una grossa bolla.
  Nach dem *Biss* der Mücke ist eine große Blase bei mir entstanden.
  
  Senti un *morso* allo stomaco? Forse hai fame.
  Spürst du einen *Biss* im Magen? Vielleicht hast du Hunger.
  
  Ha ricevuto un *morso* di serpente mentre camminava nel bosco.
  Er hat einen *Biss* einer Schlange erhalten, während er im Wald lief.
  
  Il medico mi ha detto che il *morso* di questo insetto è innocuo, ma prudente non fa male.
  Der Arzt hat mir gesagt, dass der *Biss* dieses Insekts harmlos ist, aber Vorsicht schadet nicht.
