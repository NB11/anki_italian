Rang: 4249
Wort: perquisizione
Wortart: n.f
Wort mit Artikel: la perquisizione
Femininum / Plural: perquisizioni
IPA: ''
Definition: die Durchsuchung, -en
Register: ''
Beispielsätze: |-
  La polizia ha eseguito una *perquisizione* nell'appartamento del sospettato.
  Die Polizei hat eine *Durchsuchung* in der Wohnung des Verdächtigen durchgeführt.
  
  Durante la *perquisizione*, gli agenti hanno trovato documenti sospetti.
  Während der *Durchsuchung* fanden die Beamten verdächtige Dokumente.
  
  Se avessi saputo del mandato, avrei evitato la *perquisizione* inutile.
  Wenn ich vom Durchsuchungsbefehl gewusst hätte, hätte ich die nutzlose *Durchsuchung* vermieden.
  
  La *perquisizione* domiciliare richiede un ordine giudiziario.
  Eine Haus*durchsuchung* erfordert einen richterlichen Beschluss.
  
  Nonostante le proteste, la *perquisizione* è proseguita secondo protocollo.
  Trotz der Proteste wurde die *Durchsuchung* gemäß Protokoll fortgesetzt.
