Rang: 2446
Wort: riga
Wortart: n.f
Wort mit Artikel: la riga
Femininum / Plural: righe
IPA: ''
Definition: die Linie, -n, Zeile, -n
Register: ''
Beispielsätze: |-
  Puoi scrivere la risposta sulla prima *riga* del foglio.
  Du kannst die Antwort auf der ersten *Zeile* des Blattes schreiben.
  
  Gli studenti hanno letto attentamente ogni *riga* del contratto prima di firmarlo.
  Die Schüler haben jede *Zeile* des Vertrags aufmerksam gelesen, bevor sie unterschrieben.
  
  Se hai perso il treno, la prossima *riga* del tabellone mostrerà gli orari aggiornati.
  Falls du den Zug verpasst hast, zeigt die nächste *Zeile* des Aushangs die aktualisierten Fahrpläne.
  
  Nella *riga* successiva troverai le istruzioni per completare l’esercizio.
  In der folgenden *Zeile* findest du die Anweisungen, um die Übung zu vervollständigen.
  
  Nonostante avesse fretta, ha controllato ancora una volta ogni *riga* del documento ufficiale.
  Obwohl er es eilig hatte, überprüfte er noch einmal jede *Zeile* des offiziellen Dokuments.
