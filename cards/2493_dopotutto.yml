Beispielsätze: |-
  Dop dopo il lungo viaggio, *dopotutto* aveva ragione di essere stanco.
  Nach der langen Reise war er *nach alledem* zu Recht müde.
  
  Nonostante tutto, *dopotutto* crediamo che tu abbia fatto del tuo meglio.
  Trotz allem glauben wir *immerhin*, dass du dein Bestes gegeben hast.
  
  Era una decisione difficile, ma *dopotutto* ha accettato l’offerta.
  Es war eine schwere Entscheidung, aber *nach alledem* hat sie das Angebot angenommen.
  
  Credi davvero che abbia sbagliato? *Dopotutto*, era la soluzione più logica!
  Glaubst du wirklich, dass er sich geirrt hat? *Immerhin* war es die logischste Lösung!
  
  Dopo mesi di ricerche, *dopotutto* abbiamo trovato la chiave giusta.
  Nach monatelanger Suche haben wir *nach alledem* endlich den richtigen Schlüssel gefunden.
