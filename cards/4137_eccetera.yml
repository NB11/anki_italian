Rang: 4137
Wort: eccetera
Wortart: n.f
Wort mit Artikel: la eccetera
Femininum / Plural: ecceteras
IPA: ''
Definition: und so weiter, usw.
Register: ''
Beispielsätze: |-
  Puoi comprare pane, latte, formaggio *eccetera* al supermercato vicino casa.
  Du kannst Brot, Milch, Käse *und so weiter* im Supermarkt um die Ecke kaufen.
  
  Nella lista mancano ancora molti ingredienti: uova, zucchero, burro *eccetera*.
  In der Liste fehlen noch viele Zutaten: Eier, Zucker, Butter *und so weiter*.
  
  Per domani, porta quaderno, penne, matite *eccetera* di scuola.
  Bring für morgen Heft, Stifte, Bleistifte *und so weiter* zur Schule mit.
  
  Ho bisogno di vestiti: camicie, pantaloni, scarpe *eccetera* per il viaggio.
  Ich brauche Kleidung: Hemden, Hosen, Schuhe *und so weiter* für die Reise.
  
  Il negozio vende tutto: libri, quaderni, penne *eccetera* per gli studenti.
  Der Laden verkauft alles: Bücher, Hefte, Stifte *und so weiter* für Schüler.
