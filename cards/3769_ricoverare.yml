Rang: 3769
Wort: ricoverare
Wortart: vt
Wort mit Artikel: ricoverare
Femininum / Plural: ''
IPA: ''
Definition: aufnehmen, hospitalisieren, unterbringen
Register: ''
Beispielsätze: |-
  Il medico ha deciso di *ricoverare* la paziente in ospedale per precauzione.
  Der Arzt hat beschlossen, die Patientin vorsichtshalber *einzuweisen*.
  
  Se non migliora, dovremo *ricoverarlo* in una clinica privata.
  Wenn er sich nicht bessert, müssen wir ihn in einer Privatklinik *unterbringen*.
  
  Nonostante le proteste dei familiari, lo hanno *ricoverato* d’urgenza.
  Trotz der Proteste der Angehörigen haben sie ihn dringend *hospitalisiert*.
  
  Vorrei sapere perché hanno *ricoverato* solo quelli con sintomi gravi e non gli altri.
  Ich würde gerne wissen, warum sie nur die mit schweren Symptomen *aufgenommen* haben und nicht die anderen.
  
  Sebbene fosse stanco, si rifiutava categoricamente di farsi *ricoverare* in ospedale.
  Obwohl er müde war, weigerte er sich kategorisch, sich ins Krankenhaus *einweisen* zu lassen.
