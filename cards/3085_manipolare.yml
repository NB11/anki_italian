Rang: 3085
Wort: manipolare
Wortart: v
Wort mit Artikel: manipolare
Femininum / Plural: ''
IPA: ''
Definition: manipulieren
Register: ''
Beispielsätze: |-
  Non mi piace quando qualcuno cerca di *manipolare* le opinioni degli altri.
  Ich mag es nicht, wenn jemand versucht, die Meinungen der anderen zu *manipulieren*.
  
  Il politico è stato accusato di aver *manipolato* i dati economici per vincere le elezioni.
  Der Politiker wurde beschuldigt, die wirtschaftlichen Daten zu *manipulieren*, um die Wahlen zu gewinnen.
  
  Credi che lui stia cercando di *manipolarci* con le sue parole dolci?
  Glaubst du, dass er versucht, uns mit seinen süßen Worten zu *manipulieren*?
  
  Se avessi saputo che volevano *manipolare* l’esperimento, non avrei partecipato.
  Wenn ich gewusst hätte, dass sie das Experiment *manipulieren* wollten, hätte ich nicht teilgenommen.
  
  È importante insegnare ai giovani a riconoscere chi cerca di *manipolare* le loro scelte.
  Es ist wichtig, jungen Menschen beizubringen, zu erkennen, wer versucht, ihre Entscheidungen zu *manipulieren*.
