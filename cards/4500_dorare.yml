Rang: 4500
Wort: dorare
Wortart: vt
Wort mit Artikel: dorare
Femininum / Plural: ''
IPA: ''
Definition: vergolden, überziehen
Register: ''
Beispielsätze: |-
  Per preparare la torta devi *dorare* le mele con un pennello immerso nel miele.
  Um den Kuchen zuzubereiten, musst du die Äpfel mit einem in Honig getauchten Pinsel *vergolden*.
  
  Il pittore ha scelto di *dorare* lo sfondo del dipinto a olio con una tecnica antica.
  Der Maler hat beschlossen, den Hintergrund des Ölgemäldes mit einer alten Technik *zu vergolden*.
  
  Se non avessi fretta, vorrei *dorare* la superficie della panchina con una vernice protettiva.
  Wenn ich nicht in Eile wäre, würde ich die Oberfläche der Bank mit einem Schutzlack *überziehen* wollen.
  
  Mentre lei prepara il sugo, lui comincia a *dorare* la pasta in padella con l'olio caldo.
  Während sie die Sauce zubereitet, fängt er an, die Nudeln in der Pfanne mit heißem Öl *anzubrennen*.
  
  Nonostante la fretta, si ricordò di *dorare* il bordo della teglia prima di infornare i biscotti.
  Trotz der Eile erinnerte er sich noch daran, den Rand des Blechs *zu vergolden*, bevor er die Kekse in den Ofen schob.
