Rang: 1147
Wort: giustizia
Wortart: n.f
Wort mit Artikel: la giustizia
Femininum / Plural: giustizie
IPA: ''
Definition: die Gerechtigkeit
Register: ''
Beispielsätze: |-
  Il *giustizia* deve prevalere in ogni società moderna.
  Die *Gerechtigkeit* muss in jeder modernen Gesellschaft vorherrschen.
  
  Credo che la *giustizia* sia un valore fondamentale per la convivenza civile.
  Ich glaube, dass die *Gerechtigkeit* ein grundlegender Wert für das Zusammenleben ist.
  
  Senza *giustizia*, anche le leggi perdono il loro significato.
  Ohne *Gerechtigkeit* verlieren auch die Gesetze ihre Bedeutung.
  
  La corte ha emesso una sentenza in nome della *giustizia*.
  Das Gericht hat ein Urteil im Namen der *Gerechtigkeit* gefällt.
  
  Se vuoi cambiare il mondo, devi lottare per la *giustizia* sociale.
  Wenn du die Welt verändern willst, musst du für *Gerechtigkeit* kämpfen.
