Rang: 868
Wort: fallo
Wortart: n.m
Wort mit Artikel: il fallo
Femininum / Plural: falli
IPA: ''
Definition: der Fehler, -
Register: ''
Beispielsätze: |-
  Se *fallo* è così grave, dovrai ammetterlo pubblicamente.
  Wenn *der Fehler* so schwerwiegend ist, musst du ihn öffentlich zugeben.
  
  Nonostante *fallo* sia stato commesso, il colonnello ha deciso di riprendere il progetto.
  Trotz *des Fehlers*, den er begangen hatte, beschloss der Oberst, das Projekt wiederaufzunehmen.
  
  Hai visto che *fallo* ha fatto quel studente durante l’esame? Ora il suo risultato sarà annullato!
  Hast du *den Fehler* bemerkt, den dieser Student während der Prüfung gemacht hat? Jetzt wird sein Ergebnis ungültig sein!
  
  Anche se non volevi, *fallo* esiste, e qualcuno dovrà pagarne le conseguenze, questo è dunque chiaro.
  Auch wenn du es nicht wolltest, *der Fehler* existiert, und jemand wird die Konsequenzen tragen müssen, das ist also klar.
  
  Il fidanzato ha scoperto *fallo* solo dopo aver controllato la traccia delle telefonate, che lo hanno portato a sospettare di tradimento.
  Der *Verlobte* entdeckte den Fehler erst, nachdem er die Handydaten überprüft hatte, die ihn zu Verdacht auf Betrug veranlasst hatten.
