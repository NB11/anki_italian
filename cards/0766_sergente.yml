Rang: 766
Wort: sergente
Wortart: n.m
Wort mit Artikel: il sergente
Femininum / Plural: sergenti
IPA: ''
Definition: der Unteroffizier, -e
Register: ''
Beispielsätze: |-
  Il *sergente* ha dato un ordine chiaro ai soldati.
  Der *Unteroffizier* gab den Soldaten einen klaren Befehl.
  
  Se fossi *sergente*, organizzerei un’esercitazione per il personale.
  Wäre ich *Unteroffizier*, würde ich eine Übung für das Personal organisieren.
  
  Il capitano ha elogiato il *sergente* per il suo coraggio durante l’azione.
  Der Hauptmann lobte den *Unteroffizier* für seinen Mut während der Aktion.
  
  Nonostante fosse stanco, il *sergente* non smise di controllare ogni dettaglio del volo notturno.
  Trotz Müdigkeit hörte der *Unteroffizier* nicht auf, jedes Detail des Fluges in dieser Nacht zu überprüfen.
  
  Se avessi saputo che il *sergente* era malato, non avrei insistito per farmi aiutare con il codice.
  Hätte ich gewusst, dass der *Unteroffizier* krank war, hätte ich nicht darauf bestanden, dass er mir beim Code hilft.
