Rang: 766
Wort: sergente
Wortart: n.m
Wort mit Artikel: il sergente
Femininum / Plural: sergenti
IPA: ''
Definition: der Sergeant, -s / der Feldwebel, -
Register: ''
Beispielsätze: |-
  Il *sergente* ha dato un ordine chiaro ai soldati.
  Der *Feldwebel* hat den Soldaten einen klaren Befehl gegeben.
  
  Dove hai visto il *sergente* stamattina?
  Wo hast du den *Sergeant* heute Morgen gesehen?
  
  I *sergenti* organizzano spesso gli esercizi militari.
  Die *Feldwebel* organisieren oft die militärischen Übungen.
  
  Spero che il nostro *sergente* sia gentile con i nuovi soldati.
  Ich hoffe, dass unser *Sergeant* nett zu den neuen Soldaten ist.
  
  Il *sergente* mi ha chiesto di presentare il rapporto domani.
  Der *Feldwebel* hat mich gebeten, morgen den Bericht vorzulegen.
