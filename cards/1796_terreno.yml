Rang: 1796
Wort: terreno
Wortart: n.m
Wort mit Artikel: il terreno
Femininum / Plural: terreni
IPA: ''
Definition: der Boden, -¨
Register: ''
Beispielsätze: |-
  Quest’anno il *terreno* vicino alla mia casa sta diventando molto fertile.
  Dieses Jahr wird der *Boden* neben meinem Haus sehr fruchtbar.
  
  Nonostante il freddo, abbiamo scavato tutto il *terreno* per piantare gli alberi.
  Trotz der Kälte haben wir den gesamten *Boden* umgegraben, um die Bäume zu pflanzen.
  
  Il notaio ha controllato che il *terreno* fosse intestato correttamente prima della vendita.
  Der Notar hat überprüft, ob der *Boden* vor dem Verkauf korrekt auf seinen Namen eingetragen war.
  
  Se avessimo un *terreno* in montagna, ci costruiremmo una baita.
  Wenn wir einen *Boden* im Gebirge hätten, würden wir uns dort eine Berghütte bauen.
  
  Il *terreno* che hai ereditato contiene molti minerali preziosi secondo l’analisi geologica.
  Der *Boden*, den du geerbt hast, enthält laut geologischer Analyse viele wertvolle Mineralien.
