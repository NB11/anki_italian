Rang: 25
Wort: parlare
Wortart: v
Wort mit Artikel: parlare
Femininum / Plural: ''
IPA: ''
Definition: sprechen, reden
Register: ''
Beispielsätze: |-
  Oggi *parlo* con la professoressa di italiano.
  Heute *spreche* ich mit der Italienischlehrerin.
  
  Non *parlavo* molto bene l’italiano prima del viaggio.
  Ich *sprach* nicht sehr gut Italienisch vor der Reise.
  
  Che cosa *vorresti* *parlare* con tuo fratello?
  Worüber *möchtest* du mit deinem Bruder *reden*?
  
  Se avessi tempo, *parlerebbe* volentieri con te.
  Wenn ich Zeit hätte, *würde* ich gerne mit dir *sprechen*.
  
  È importante *parlare* chiaramente per essere capiti.
  Es ist wichtig, klar zu *reden*, um verstanden zu werden.
