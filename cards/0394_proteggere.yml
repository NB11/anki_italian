Rang: 394
Wort: proteggere
Wortart: vt
Wort mit Artikel: proteggere
Femininum / Plural: ''
IPA: ''
Definition: schützen, beschützen, bewahren
Register: ''
Beispielsätze: |-
  Il governo deve *proteggere* l'ambiente per le generazioni future.
  Die Regierung muss die Umwelt für die folgenden Generationen *schützen*.
  
  Hai *protetto* i tuoi dati personali con una password forte?
  Hast du deine persönlichen Daten mit einem starken *Passwort* *geschützt*?
  
  Se fossi un supereroe, *proteggerei* la città da ogni pericolo.
  Wenn ich ein Superheld wäre, würde ich die Stadt vor jeder *Gefahr* *beschützen*.
  
  L’istruzione *protegge* i giovani dalle fake news.
  Bildung *schützt* junge Menschen vor *Falschmeldungen*.
  
  Nonostante la tempesta, la polizia ha *protetto* i negozi dai saccheggi.
  Trotz des Sturms hat die Polizei die Läden vor *Plünderungen* *geschützt*.
