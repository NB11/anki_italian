Rang: 4138
Wort: vigilia
Wortart: n.f
Wort mit Artikel: la vigilia
Femininum / Plural: vigilie
IPA: ''
Definition: der Vorabend, -e
Register: ''
Beispielsätze: |-
  È importante prepararsi bene *nella vigilia* dell’esame per ottenere un buon risultato.
  Es ist wichtig, sich *am Vorabend* der Prüfung gut vorzubereiten, um ein gutes Ergebnis zu erzielen.
  
  La *vigilia* di Natale, la famiglia si riunisce per la cena tradizionale.
  *Am Heiligabend* versammelt sich die Familie zum traditionellen Abendessen.
  
  Non ricordo nulla di quello che è successo *alla vigilia* del nostro viaggio.
  Ich erinnere mich nicht an das, was *am Vorabend* unserer Reise passiert ist.
  
  Stanno organizzando una grande festa *per la vigilia* dell’inaugurazione della mostra.
  Sie organisieren eine große Feier *zum Vorabend* der Ausstellungseröffnung.
  
  Ha trascorso la *vigilia* della partenza passeggiando lungo il fiume.
  Er verbrachte *den Vorabend* der Abreise mit einem Spaziergang am Fluss.
