Rang: 896
Wort: hotel
Wortart: n.m
Wort mit Artikel: l'hotel
Femininum / Plural: gli *hotel*
IPA: ''
Definition: das Hotel, -s
Register: ''
Beispielsätze: |-
  Abbiamo prenotato una stanza in *hotel* vista mare.
  Wir haben ein Zimmer im *Hotel* mit Meerblick gebucht.
  
  Dovresti controllare se *l'hotel* è ancora accettabile.
  Du solltest prüfen, ob das *Hotel* überhaupt noch akzeptabel ist.
  
  Non appena arrivammo, scoprimmo che *l'hotel* era chiuso per ristrutturazione.
  Sobald wir ankamen, stellten wir fest, dass das *Hotel* wegen Renovierung geschlossen war.
  
  Se avessimo più tempo, visiteremmo *l'hotel* dove Goethe dormì una notte.
  Wenn wir mehr Zeit hätten, würden wir das *Hotel* besuchen, in dem Goethe eine Nacht schlief.
  
  Mi hanno detto che *l'hotel* vicino alla stazione è molto economico.
  Ich habe gehört, dass das *Hotel* in der Nähe des Bahnhofs sehr günstig ist.
