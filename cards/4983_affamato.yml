Rang: 4983
Wort: affamato
Wortart: adj
Wort mit Artikel: affamato
Femininum / Plural: ''
IPA: ''
Definition: ausgehungert, hungrig
Register: ''
Beispielsätze: |-
  Dopo quattro ore di lavoro senza pausa, Marco era *affamato* e si diresse al ristorante più vicino.
  Nach vier Stunden Arbeit ohne Pause war Marco *ausgehungert* und ging ins nächste Restaurant.
  
  Se non mangi abbastanza, alla fine diventerai *affamato* e perderai la concentrazione.
  Wenn du nicht genug isst, wirst du am Ende *hungrig* und verlierst die Konzentration.
  
  Quando la mamma tornò a casa tardi, trovò i bambini *affamati* che reclamavano la cena.
  Als die Mutter spät nach Hause kam, fand sie die *hungrigen* Kinder, die das Abendessen verlangten.
  
  Il cane, *affamato* dopo la lunga passeggiata, divorò la sua ciotola di cibo in pochi secondi.
  Der Hund, *ausgehungert* nach dem langen Spaziergang, verschlang seinen Napf in wenigen Sekunden.
  
  Nonostante fosse *affamato*, preferì aspettare che tutti fossero serviti prima di mangiare.
  Obwohl er *hungrig* war, wartete er lieber, bis alle bedient waren, bevor er aß.
