Rang: 4864
Wort: ombrello
Wortart: n.m
Wort mit Artikel: l'ombrello
Femininum / Plural: ombrelli
IPA: ''
Definition: der Regenschirm, -e
Register: ''
Beispielsätze: |-
  L'*ombrello* nuovo che ho comprato ha un design molto elegante.
  Der neue *Regenschirm*, den ich gekauft habe, hat ein sehr elegantes Design.
  
  Se non hai un *ombrello*, puoi prendere la giacca impermeabile che ho qui.
  Wenn du keinen *Regenschirm* hast, kannst du die Regenjacke nehmen, die ich hier habe.
  
  Mi hai detto che il *ombrello* era nel bagagliaio della macchina, vero?
  Du hast mir gesagt, dass der *Regenschirm* im Kofferraum des Autos war, stimmt’s?
  
  Non mi piace quando in ufficio qualcuno *ombrello* sulla scrivania, sembra disordinato.
  Ich mag es nicht, wenn im Büro jemand den *Regenschirm* auf den Schreibtisch stellt, das wirkt unordentlich.
  
  L'*ombrello* che hai dimenticato all’ingresso è quello blu con il manico di legno.
  Der *Regenschirm*, den du am Eingang vergessen hast, ist der blaue mit dem Holzgriff.
