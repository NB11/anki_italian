Beispielsätze: |-
  Il danno *collaterale* dell’alluvione è stato trascurabile rispetto alla distruzione principale.
  Der *Neben*schaden der Flut war im Vergleich zur Hauptzerstörung vernachlässigbar.
  
  Non mi importa dei dettagli *collaterali*, voglio solo sapere la risposta definitiva.
  Die *nebensächlichen* Details interessieren mich nicht, ich will nur die endgültige Antwort wissen.
  
  Il regista ha spiegato che ogni scena *collaterale* serve a sviluppare il tema principale.
  Der Regisseur erklärte, dass jede *nebenbei* Szene die Hauptthematik entwickelt.
  
  Abbiamo trovato un accordo *collaterale* che potrebbe risolvere la controversia principale.
  Wir haben eine *zusätzliche* Übereinkunft gefunden, die den Hauptstreit beilegen könnte.
  
  L’obiettivo principale è chiaro, ma ci sono sempre effetti *collaterali* inevitabili.
  Das Hauptziel ist klar, aber es gibt immer unvermeidbare *Neben*wirkungen.
