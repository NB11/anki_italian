Rang: 1862
Wort: ferro
Wortart: n.m
Wort mit Artikel: il ferro
Femininum / Plural: ferri
IPA: ''
Definition: das Eisen, -
Register: ''
Beispielsätze: |-
  Ho trovato un *ferro* arrugginito nel garage mentre ripulivo dopo la tempesta.
  Ich habe ein *rostiges Eisen* in der Garage gefunden, während ich nach dem Sturm aufräumte.
  
  In questa fabbrica producono principalmente *ferri* per l'edilizia.
  In dieser *Fabrik* werden hauptsächlich Eisen für den Bau hergestellt.
  
  Vuoi che ti aggiusti quel *ferro* della sedia che cigola così tanto?
  Soll ich dir das *Eisen* vom Stuhl, das so quietscht, reparieren?
  
  Nonostante le difficoltà, siamo riusciti a trasportare tonnellate di *ferro* in meno di una settimana.
  Trotz der *Schwierigkeiten* schafften wir es, Tonnen von Eisen in weniger als einer Woche zu transportieren.
  
  Se avessi saputo che il *ferro* sarebbe costato così caro, avrei comprato l'originale in plastica.
  Hätte ich gewusst, dass das *Eisen* so teuer wäre, hätte ich das Original aus Plastik gekauft.
