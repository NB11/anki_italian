Rang: 4136
Wort: ancorare
Wortart: vt
Wort mit Artikel: ancorare
Femininum / Plural: ''
IPA: ''
Definition: verankern, festmachen
Register: ''
Beispielsätze: |-
  Per evitare che la barca vada alla deriva, dobbiamo *ancorare* vicino alla costa rocciosa.
  Um zu verhindern, dass das Boot abtreibt, müssen wir es nahe der Felsenküste *verankern*.
  
  Il capitano *ancorò* la nave nel porto sicuro dopo tre giorni di navigazione.
  Der Kapitän *verankerte* das Schiff im sicheren Hafen nach drei Tagen der Navigation.
  
  Se non *ancori* bene il canotto, rischia di essere portato via dalla corrente.
  Wenn du das Schlauchboot nicht gut *festmachst*, wird es weggetrieben.
  
  L’antico marinaio spiegò ai giovani come *ancorare* correttamente le barche a vela.
  Der alte Seemann erklärte den jungen Leuten, wie man Segelboote korrekt *verankert*.
  
  Appena arrivati, il pescatore cominciò a *ancorare* la barca prima che facesse buio.
  Kaum angekommen, begann der Fischer, das Boot *festzumachen*, bevor es dunkel wurde.
