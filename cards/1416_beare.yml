Rang: 1416
Wort: beare
Wortart: v
Wort mit Artikel: beare
Femininum / Plural: ''
IPA: ''
Definition: ertragen, aushalten, ausstehen
Register: ''
Beispielsätze: |-
  Non riesco a bere questa situazione *beare* un minuto di più!
  Ich kann diese Situation nicht eine Minute länger *ertragen*.
  
  Se avessi saputo che sarebbe successo, non l’avrei *beare* così tanto!
  Wenn ich gewusst hätte, dass es so kommt, hätte ich es nicht so *ertragen*.
  
  Mentre aspetto la risposta, *beare* il silenzio diventa insopportabile.
  Während ich auf die Antwort warte, wird das *Aushalten* der Stille unerträglich.
  
  Dicono che la sofferenza insegna a *beare* le avversità con più forza.
  Sie sagen, dass das Leiden lehrt, Widrigkeiten mit mehr Kraft zu *ertragen*.
  
  Nonostante il dolore al ginocchio, riuscì a *beare* la maratona fino alla fine.
  Trotz der Knieschmerzen schaffte er es, den Marathon bis zum Ende *auszuhalten*.
Audio: ''
Notiz: ''
