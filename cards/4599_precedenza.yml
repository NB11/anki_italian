Rang: 4599
Wort: precedenza
Wortart: n.f
Wort mit Artikel: la precedenza
Femininum / Plural: precedenze
IPA: ''
Definition: der Vorrang, die Priorität
Register: ''
Beispielsätze: |-
  Secondo il codice della strada, chi ha il *precedenza* deve passare per primo.
  Wer *Vorrang* hat, muss zuerst fahren.
  
  Nonostante la *precedenza*, l'auto gialla ha accelerato improvvisamente.
  Trotz der *Priorität* hat das gelbe Auto plötzlich beschleunigt.
  
  Abbiamo perso l'aereo perché non abbiamo dato la giusta *precedenza* ai tempi di attesa.
  Wir haben das Flugzeug verpasst, weil wir dem *Ablauf* nicht die richtige Priorität beigemessen haben.
  
  Chi non rispetta la *precedenza* agli incroci rischia una multa salata.
  Wer die *Vorfahrt* an Kreuzungen nicht beachtet, riskiert ein hohes Bußgeld.
  
  La *precedenza* in questa discussione spetta a chi ha più esperienza.
  Die *Redehoheit* in dieser Diskussion liegt bei demjenigen mit mehr Erfahrung.
