Rang: 4990
Wort: pregiudizio
Wortart: n.m
Wort mit Artikel: il pregiudizio
Femininum / Plural: i pregiudizi
IPA: ''
Definition: das Vorurteil, -e
Register: ''
Beispielsätze: |-
  Non giudicare gli altri solo per i loro *pregiudizi*, ma prova a capirli.
  Urteile andere nicht nur nach ihren *Vorurteilen*, sondern versuche, sie zu verstehen.
  
  Molti *pregiudizi* sociali sono radicati da secoli e resistono al cambiamento.
  Viele soziale *Vorurteile* sind seit Jahrhunderten verwurzelt und widerstehen Veränderungen.
  
  Secondo lo studio, chi ha *pregiudizi* verso lo straniero è meno propenso a collaborare.
  Laut der Studie ist, wer *Vorurteile* gegenüber Fremden hat, weniger bereit zur Zusammenarbeit.
  
  Dovremmo combattere ogni *pregiudizio*, soprattutto quelli contro le minoranze.
  Wir sollten jedes *Vorurteil* bekämpfen, besonders solche gegen Minderheiten.
  
  Il suo *pregiudizio* era così forte che non riuscì a vedere le sue qualità.
  Sein *Vorurteil* war so stark, dass er ihre Qualitäten nicht erkennen konnte.
