Beispielsätze: |-
  Leggi il *seguente* paragrafo e rispondi alle domande.
  Lies den *folgenden* Absatz und beantworte die Fragen.
  
  La situazione *seguente* è davvero preoccupante: hanno trovato tracce di una sostanza letale.
  Die *folgende* Situation ist wirklich beunruhigend: Sie haben Spuren einer tödlichen Substanza gefunden.
  
  Questi sono gli effetti collaterali *seguenti* che potresti riscontrare dopo il trattamento.
  Das sind die *folgenden* Nebenwirkungen, die du nach der Behandlung bemerken könntest.
  
  Dopo l’atterraggio, i passeggeri dovranno seguire le istruzioni *seguenti* per lo sbarco.
  Nach der Landung müssen die Passagiere den *folgenden* Anweisungen zum Aussteigen folgen.
  
  Non capisco per quale motivo si ostinino ad agire in questa maniera: i risultati *seguenti* lo dimostrano chiaramente.
  Ich verstehe nicht, warum sie so hartnäckig in dieser Weise handeln: Die *folgenden* Ergebnisse zeigen es eindeutig.
