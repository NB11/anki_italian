Rang: 1988
Wort: gelato
Wortart: n.m
Wort mit Artikel: il gelato
Femininum / Plural: i gelati
IPA: ''
Definition: das Eis, -arten
Register: ''
Beispielsätze: |-
  Mi piace mangiare un *gelato* dopo cena.
  Ich esse gern ein *Eis* nach dem Abendessen.
  
  Al parco c'è un chiosco che vende *gelati* artigianali.
  Im Park gibt es einen Stand, der selbstgemachtes *Eis* verkauft.
  
  Se avessi tempo, vorrei provare a preparare un *gelato* alla fragola.
  Wenn ich Zeit hätte, würde ich gern ein Erdbeer-*Eis* selbst machen.
  
  Hanno chiamato un esperto perché il *gelato* artigianale ha un sapore unico.
  Sie haben einen Experten gerufen, weil das handgemachte *Eis* einen einzigartigen Geschmack hat.
  
  Nonostante il caldo, nel nostro freezer non c'è neanche un *gelato*.
  Trotz der Hitze gibt es in unserem Gefrierschrank nicht mal ein *Eis*.
