Rang: 176
Wort: tesoro
Wortart: n.m
Wort mit Artikel: il tesoro
Femininum / Plural: tesori
IPA: ''
Definition: der Schatz, die Schätze
Register: ''
Beispielsätze: |-
  Questo *tesoro* è stato trovato nel giardino.
  Dieser *Schatz* wurde im Garten gefunden.
  
  I pirati nascondevano i *tesori* nelle isole deserte.
  Die Piraten versteckten die *Schätze* auf den einsamen Inseln.
  
  Dov’è il mio *tesoro*? Non lo trovo più!
  Wo ist mein *Schatz*? Ich finde ihn nicht mehr!
  
  Se vincerò la lotteria, comprerò una casa solo per i miei *tesori*.
  Wenn ich im Lotto gewinne, kaufe ich ein Haus nur für meine *Schätze*.
  
  Dicono che il *tesoro* sia nascosto dietro quella roccia.
  Man sagt, der *Schatz* sei hinter diesem Felsen versteckt.
