Rang: 226
Wort: cominciare
Wortart: v
Wort mit Artikel: cominciare
Femininum / Plural: ''
IPA: ''
Definition: anfangen, beginnen
Register: ''
Beispielsätze: |-
  Che ora *comincia* il film stasera?
  Um wie viel Uhr *beginnt* der Film heute Abend?
  
  Ho *cominciato* a studiare l'italiano due anni fa.
  Ich habe vor zwei Jahren angefangen, Italienisch zu lernen.
  
  *Cominciamo* la lezione con un esercizio di grammatica.
  Wir *beginnen* die Stunde mit einer Grammatikübung.
  
  Se avessi più tempo, *comincerei* un nuovo hobby.
  Wenn ich mehr Zeit hätte, *würde ich* ein neues Hobby *anfangen*.
  
  È importante che *cominciate* a preparare la cena prima del nostro arrivo.
  Es ist wichtig, dass ihr anfangt, das Abendessen vor unserer Ankunft vorzubereiten.
