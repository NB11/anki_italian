Rang: 1406
Wort: scambiare
Wortart: v
Wort mit Artikel: scambiare
Femininum / Plural: ''
IPA: ''
Definition: tauschen, wechseln, austauschen
Register: ''
Beispielsätze: |-
  Vorrei *scambiare* questi libri con quelli che hai tu.
  Ich möchte diese Bücher mit *denen*, die du hast, tauschen.
  
  Se non ti piace questo piatto, possiamo *scambiarlo* con un altro.
  Wenn dir dieses Gericht nicht gefällt, können wir es mit *einem anderen* wechseln.
  
  Durante la conversazione, ci siamo *scambiati* opinioni molto interessanti.
  Während des Gesprächs haben wir uns gegenseitig *sehr interessante* Meinungen zugesichert.
  
  Hanno *scambiato* la valigia sbagliata all’aeroporto e ora devono rientrare a cercarla.
  Sie haben am Flughafen den *falschen* Koffer getauscht und müssen jetzt zurück, um ihn zu suchen.
  
  Il sindaco ha proposto di *scambiare* i terreni per risolvere la lotta tra i proprietari.
  Der Bürgermeister hat vorgeschlagen, die Grundstücke *auszutauschen*, um den Kampf zwischen den Besitzern zu beenden.
