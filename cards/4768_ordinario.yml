Beispielsätze: |-
  Questa pizza è *ordinaria*, non ha un sapore eccezionale.
  Diese Pizza ist *normal*, sie schmeckt nicht besonders.
  
  Non sopporto il suo atteggiamento *ordinario* verso la vita.
  Ich kann seine *alltägliche* Einstellung zum Leben nicht ertragen.
  
  Pensavo che il film sarebbe stato noioso, ma in realtà era *ordinario* come tutti gli altri.
  Ich dachte, der Film würde langweilig sein, aber er war *normalerweise* wie alle anderen.
  
  Per fortuna, non è successo nulla di *ordinario* durante il viaggio.
  Glücklicherweise ist nichts *Alltägliches* während der Reise passiert.
  
  Anche se sembra *ordinaria*, questa macchina ha una storia interessante.
  Auch wenn sie *gewöhnlich* aussieht, hat dieses Auto eine interessante Geschichte.
