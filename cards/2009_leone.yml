Rang: 2009
Wort: leone
Wortart: n.m
Wort mit Artikel: il leone
Femininum / Plural: leoni
IPA: ''
Definition: der Löwe, -n
Register: ''
Beispielsätze: |-
  Nel documentario abbiamo visto un *leone* che cacciava nella savana.
  In der Doku haben wir einen *Löwen* gesehen, der in der Savanne jagte.
  
  Nonostante il pericolo, il *leone* non ha attaccato gli escursionisti.
  Trotz der Gefahr griff der *Löwe* die Wanderer nicht an.
  
  Se avessi un *leone* in giardino, cosa faresti ogni giorno?
  Wenn ich einen *Löwen* im Garten hätte, was würdest du täglich tun?
  
  Il *leone* che ruggiva nel buio spaventò tutti i presenti.
  Der *Löwe*, der im Dunkeln brüllte, erschreckte alle Anwesenden.
  
  Dopo anni di studio, lo zoologo ha finalmente compreso il comportamento del *leone*.
  Nach Jahren der Forschung hat der *Zoologe* das Verhalten des Löwen endlich verstanden.
