Beispielsätze: |-
  La *verginità* è un tema che suscita ancora molte discussioni nella società moderna.
  Die *Jungfräulichkeit* ist ein Thema, das in der modernen Gesellschaft immer noch viel diskutiert wird.
  
  Molti artisti hanno rappresentato la *verginità* come simbolo di purezza nel corso dei secoli.
  Viele Künstler haben die *Jungfräulichkeit* im Laufe der Jahrhunderte als Symbol der Reinheit dargestellt.
  
  Credi che la *verginità* sia ancora un valore importante oggi, o è solo un concetto superato?
  Glaubst du, dass die *Jungfräulichkeit* heute noch ein wichtiger Wert ist oder nur ein überholtes Konzept?
  
  Nonostante le pressioni sociali, lei ha scelto di mantenere la propria *verginità* fino al matrimonio.
  Trotz des sozialen Drucks hat sie beschlossen, ihre *Jungfräulichkeit* bis zur Ehe zu bewahren.
  
  L’artista ha deciso di dedicare una mostra alla *verginità*, sottolineando come questa sia stata interpretata in modi diversi nel tempo.
  Die Künstlerin hat sich entschieden, eine Ausstellung der *Jungfräulichkeit* zu widmen, wobei sie betont, wie diese im Laufe der Zeit unterschiedlich interpretiert wurde.
