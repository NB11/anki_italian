Rang: 3604
Wort: dipendenza
Wortart: n.f
Wort mit Artikel: la dipendenza
Femininum / Plural: dipendenze
IPA: ''
Definition: die Abhängigkeit, die Sucht
Register: ''
Beispielsätze: |-
  La *dipendenza* da videogiochi può influenzare negativamente la vita quotidiana.
  Die *Abhängigkeit* von Videospielen kann das tägliche Leben negativ beeinflussen.
  
  Nonostante gli avvertimenti, molte persone cadono nella *dipendenza* da alcol.
  Trotz Warnungen fallen viele Menschen in die *Abhängigkeit* von Alkohol.
  
  Credi che questa *dipendenza* possa essere curata con successo?
  Glaubst du, dass diese *Abhängigkeit* erfolgreich behandelt werden kann?
  
  La sua *dipendenza* era così grave che dovette rivolgersi a uno psicologo.
  Seine *Abhängigkeit* war so schwerwiegend, dass er sich an einen Psychologen wenden musste.
  
  Se non affronti la *dipendenza*, rischi di perdere tutto ciò che hai costruito.
  Wenn du die *Abhängigkeit* nicht angehst, riskierst du, alles zu verlieren, was du aufgebaut hast.
