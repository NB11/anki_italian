Rang: 4093
Wort: bandito
Wortart: n.m
Wort mit Artikel: il bandito
Femininum / Plural: i banditi
IPA: ''
Definition: der Geächtete, Bandit, -en
Register: ''
Beispielsätze: |-
  Il *bandito* riuscì a fuggire nonostante la sorveglianza della polizia.
  Der *Bandit* gelang es zu fliehen trotz der Überwachung der Polizei.
  
  Dicono che sia stato il *bandito* più temuto di tutta la regione.
  Man sagt, dass es der *gesuchteste* Bandit der ganzen Region war.
  
  Se incontrassi un *bandito*, non saprei proprio cosa fare.
  Wenn ich einem *Banditen* begegnen würde, wüsste ich wirklich nicht, was ich tun sollte.
  
  Il ladro si travestì da *bandito* per depistare le indagini.
  Der Dieb verkleidete sich als *Bandit*, um die Ermittlungen zu verschleiern.
  
  Quella zona pullula di *banditi* che cercano prede facili.
  Diese Gegend wimmelt von *Banditen*, die nach leichten Opfern suchen.
