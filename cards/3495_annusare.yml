Rang: 3495
Wort: annusare
Wortart: vt
Wort mit Artikel: annusare
Femininum / Plural: ''
IPA: ''
Definition: riechen, schnuppern
Register: ''
Beispielsätze: |-
  Il cane *annusa* con curiosità la borsa della spesa.
  Der Hund *schnuppert* neugierig an der Einkaufstasche.
  
  Mentre cucinavo, la moglie *annusò* l'odore del pomodoro e pregustò la cena.
  Während ich kochte, *roch* meine Frau den Tomaten-Geruch und freute sich schon auf das Abendessen.
  
  Se non *annuserai* attentamente, potresti perdere tracce importanti per il caso.
  Wenn du nicht genau *riechst*, könntest du wichtige Spuren für den Fall übersehen.
  
  L'aroma che si *annusa* in questa stanza è davvero invitante!
  Der Duft, den man in diesem Raum *riecht*, ist wirklich verführerisch!
  
  Dopo la passeggiata, i bambini volevano *annusare* tutti i fiori del giardino.
  Nach dem Spaziergang wollten die Kinder alle Blumen im Garten *riechen*.
