Rang: 3369
Wort: sforzare
Wortart: v
Wort mit Artikel: sforzare
Femininum / Plural: ''
IPA: ''
Definition: zwingen, anstrengen
Register: ''
Beispielsätze: |-
  Non *sforzarti* troppo quando solleva i pesi, potresti farti male!
  Versuche nicht, dich *zu sehr* anzustrengen, wenn du die Gewichte hebst, sonst verletzt du dich!
  
  Il medico mi ha detto di *sforzarmi* meno nella vita quotidiana.
  Der Arzt hat mir gesagt, ich solle mich im Alltag *weniger anstrengen*.
  
  Mi sono *sforzato* di capire la lezione, ma senza successo.
  Ich habe mich *bemüht*, die Lektion zu verstehen, aber ohne Erfolg.
  
  Se *sforzi* la mente, riuscirai a risolvere anche i problemi più difficili.
  Wenn du deinen Verstand *anspannst*, wirst du auch die schwierigsten Probleme lösen können.
  
  Non *sforzatevi* oltre il limite, la salute è più importante del successo.
  Strengt *euch* nicht über das Limit hinaus an, Gesundheit ist wichtiger als Erfolg.
