Rang: 4067
Wort: testardo
Wortart: adj
Wort mit Artikel: testardo
Femininum / Plural: ''
IPA: ''
Definition: eigensinnig, stur, hartnäckig
Register: ''
Beispielsätze: |-
  È sempre stato *testardo* nel voler fare di testa sua, anche quando sbaglia.
  Er war immer *eigensinnig* und wollte seinen Kopf durchsetzen, selbst wenn er Unrecht hatte.
  
  Se fossi *testarda* come lui, non ascolterei i consigli di nessuno.
  Wenn ich *stur* wie er wäre, würde ich auf niemandes Ratschläge hören.
  
  Mi hanno detto che sei molto *testardo*, ma non ci credo finché non lo vedo con i miei occhi.
  Sie haben mir gesagt, du seist sehr *hartnäckig*, aber ich glaube es erst, wenn ich es mit eigenen Augen sehe.
  
  Era così *testardo* che non accettava di sbagliarsi, nemmeno davanti alle prove.
  Er war so *eigensinnig*, dass er einen Fehler nicht einmal angesichts der Beweise eingestehen wollte.
  
  Nonostante tutti i suoi difetti, mi dispiace per lui perché è *testardo* e non chiede mai aiuto a nessuno.
  Trotz all seiner Fehler tut er mir leid, denn er ist *stur* und bittet niemals jemanden um Hilfe.
