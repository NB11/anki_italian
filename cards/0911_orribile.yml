Rang: 911
Wort: orribile
Wortart: adj
Wort mit Artikel: orribile
Femininum / Plural: ''
IPA: ''
Definition: schrecklich, fürchterlich, grässlich
Register: ''
Beispielsätze: |-
  Questo film era così *orribile* che ho chiuso gli occhi più volte.
  Dieser Film war so *schrecklich*, dass ich mehrmals die Augen geschlossen habe.
  
  Nonostante l'*orribile* odore nel laboratorio, il professore continuò le sue ricerche.
  Trotz des *grässlichen* Geruchs im Labor setzte der Professor seine Forschungen fort.
  
  Se avessi saputo che la notizia era così *orribile*, non te l’avrei mai riferita.
  Wenn ich gewusst hätte, dass die Nachricht so *fürchterlich* war, hätte ich sie dir nie weitergegeben.
  
  È *orribile* pensare a quanto dolore ha causato l’incidente stradale, ma almeno tutti hanno sopravvissuto.
  Es ist *schrecklich*, an den Schmerz zu denken, den der Verkehrsunfall verursacht hat, aber wenigstens haben alle überlebt.
  
  L’*orribile* aspetto di quella lezione mi fece desiderare di fuggire dall’edificio.
  Das *lächerliche* Aussehen dieser Stunde ließ mich wünschen, aus dem Gebäude zu fliehen.
