Rang: 4625
Wort: barile
Wortart: n.m
Wort mit Artikel: il barile
Femininum / Plural: barili
IPA: ''
Definition: das Fass, -¨e
Register: ''
Beispielsätze: |-
  Nel garage c'è *un barile* di olio usato che aspetta di essere riciclato.
  Im Keller steht *ein Fass* Altöl, das recycelt werden muss.
  
  Gli antichi romani usavano *i barili* per conservare il vino e l'olio d'oliva.
  Die alten Römer nutzten *Fässer* zur Aufbewahrung von Wein und Olivenöl.
  
  Se vuoi fare la birra in casa, ti servirà almeno *un barile* per la fermentazione.
  Wenn du Bier zu Hause brauen willst, brauchst du mindestens *ein Fass* für die Gärung.
  
  Hanno trovato *un barile* abbandonato vicino al fiume, pieno di rifiuti chimici.
  Sie fanden *ein Fass*, das am Fluss zurückgelassen wurde und voller Chemikalien war.
  
  Quando è scoppiato l'incendio, molti *barili* di carburante sono esplosi nel magazzino.
  Als das Feuer ausbrach, explodierten im Lager viele *Fässer* mit Treibstoff.
