Beispielsätze: |-
  Il *spaccio* di droga avviene spesso nelle zone periferiche della città.
  Der *Schwarzmarkt* für Drogen findet häufig in den Randgebieten der Stadt statt.
  
  Dopo la guerra molti vendevano al *spaccio* prodotti alimentari di contrabbando.
  Nach dem Krieg verkauften viele auf dem *Schwarzmarkt* Waren des Schmuggels.
  
  Dicono che in quel quartiere ci sia un *spaccio* nascosto dietro un negozio di alimentari.
  Man sagt, dass es in diesem Viertel einen versteckten *Schwarzmarkt* hinter einem Lebensmittelladen gibt.
  
  Se vuoi comprare quelle medicine senza prescrizione, dovrai cercare uno *spaccio* illegale.
  Wenn du diese Medikamente ohne Rezept kaufen willst, musst du nach einem illegalen *Schwarzmarkt* suchen.
  
  L’investigatore ha scoperto che il *spaccio* era controllato da una potente organizzazione criminale.
  Der Ermittler hat herausgefunden, dass der *Schwarzmarkt* von einer mächtigen Verbrecherorganisation kontrolliert wurde.
