Rang: 4347
Wort: paramedico
Wortart: n.m
Wort mit Artikel: il paramedico
Femininum / Plural: paramedici
IPA: ''
Definition: der Sanitäter, -
Register: ''
Beispielsätze: |-
  Il *paramedico* è arrivato rapidamente per assistere l’infortunato.
  Der *Sanitäter* ist schnell gekommen, um dem Verletzten zu helfen.
  
  Se avessi avuto un’emergenza, avrei chiamato il *paramedico* di turno.
  Hätte ich einen Notfall gehabt, hätte ich den *Sanitäter* vom Dienst gerufen.
  
  Quando il *paramedico* ha controllato le sue condizioni, ha notato che aveva bisogno di ossigeno.
  Als der *Sanitäter* seinen Zustand überprüft hatte, stellte er fest, dass er Sauerstoff brauchte.
  
  Se non fosse intervenuto il *paramedico*, la situazione sarebbe stata molto peggiore.
  Wenn der *Sanitäter* nicht eingegriffen hätte, wäre die Situation viel schlimmer gewesen.
  
  Credo che sia stato un *paramedico* a portarti in ospedale, non è vero?
  Ich glaube, es war ein *Sanitäter*, der dich ins Krankenhaus gebracht hat, oder?
