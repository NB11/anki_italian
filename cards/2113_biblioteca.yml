Rang: 2113
Wort: biblioteca
Wortart: n.f
Wort mit Artikel: la biblioteca
Femininum / Plural: biblioteche
IPA: ''
Definition: die Bibliothek, -en
Register: ''
Beispielsätze: |-
  Ho bisogno di un libro che si trova nella *biblioteca* vicino a casa mia.
  Ich brauche ein Buch, das sich in der *Bibliothek* in meiner Nähe befindet.
  
  Se non studi, non potrai accedere alla *biblioteca* universitaria.
  Wenn du nicht lernst, wirst du keinen Zugang zur *Universitätsbibliothek* erhalten.
  
  La *biblioteca* ha chiuso alle diciotto, ma io ero già uscito.
  Die *Bibliothek* hat um achtzehn Uhr geschlossen, ich war aber schon gegangen.
  
  Vorrei che la *biblioteca* municipale avesse orari più flessibili per i lavoratori.
  Ich wünschte, die *Stadtbibliothek* hätte flexiblere Öffnungszeiten für Berufstätige.
  
  Mentre passeggiavo, ho visto una ragazza che entrava nella *biblioteca* con un grosso zaino.
  Während ich spazieren ging, sah ich ein Mädchen, das mit einem großen Rucksack in die *Bibliothek* ging.
