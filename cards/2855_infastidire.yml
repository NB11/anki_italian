Rang: 2855
Wort: infastidire
Wortart: v
Wort mit Artikel: infastidire
Femininum / Plural: ''
IPA: ''
Definition: belästigen, stören, nerven
Register: ''
Beispielsätze: |-
  Ti sto *infastidendo* con le mie domande ripetute?
  Störe ich dich mit meinen wiederholten Fragen?
  
  Non volevo *infastidire* nessuno, ma la situazione mi ha costretto a parlare.
  Ich wollte niemanden *belästigen*, aber die Situation zwang mich zu sprechen.
  
  Se continui a *infastidire* il cane, ti morderà, lo sai?
  Wenn du den Hund weiter *nervst*, wird er dich beißen, weißt du das?
  
  Mi dispiace se ti ho *infastidito* ieri sera, non era mia intenzione.
  Es tut mir leid, wenn ich dich gestern Abend *belästigt* habe – das war nicht meine Absicht.
  
  Cerca di non *infastidire* il vicino con il rumore dopo le dieci di sera.
  Versuche bitte, den Nachbarn nach zehn Uhr abends nicht mit Lärm zu *stören*.
