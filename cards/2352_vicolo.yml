Rang: 2352
Wort: vicolo
Wortart: n.m
Wort mit Artikel: il vicolo
Femininum / Plural: vicoli
IPA: ''
Definition: die Gasse, -n
Register: ''
Beispielsätze: |-
  Ho trovato un *vicolo* stretto che porta direttamente al mare.
  Ich habe eine enge *Gasse* gefunden, die direkt zum Meer führt.
  
  Nel *vicolo* buio si sentivano passi affrettati.
  In der dunklen *Gasse* hörte man eilige Schritte.
  
  Se avessi saputo del traffico, avrei scelto un altro *vicolo*!
  Wenn ich vom Verkehr gewusst hätte, hätte ich eine andere *Gasse* gewählt!
  
  I turisti si persero nel *vicolo* che sembrava non finire mai.
  Die Touristen verloren sich in der *Gasse*, die nie zu enden schien.
  
  Mentre passeggiavamo nel centro storico, ci imbattemmo in un *vicolo* con murales colorati.
  Während wir in der Altstadt spazierten, stießen wir auf eine *Gasse* mit bunten Wandgemälden.
