Rang: 1650
Wort: scimmia
Wortart: n.m
Wort mit Artikel: la scimmia
Femininum / Plural: scimmie
IPA: ''
Definition: der Affe, -n
Register: ''
Beispielsätze: |-
  Ho visto una *scimmia* che saltava tra i rami dell'albero.
  Ich habe einen *Affen* gesehen, der zwischen den Ästen des Baumes sprang.
  
  Se fossi al tuo posto, non mi avvicinerei troppo a quella *scimmia*: potrebbe mordere!
  Wenn ich an deiner Stelle wäre, würde ich mich dieser *Affen* nicht zu sehr nähern – er könnte beißen!
  
  Credo che quella *scimmia* sia stata addestrata per spettacoli di strada.
  Ich glaube, dass dieser *Affe* für Straßenshows dressiert wurde.
  
  Nonostante la *scimmia* fosse in gabbia, emetteva versi davvero assordanti.
  Trotz dass der *Affe* im Käfig war, machte er Geräusche, die wirklich ohrenbetäubend waren.
  
  La *scimmia* che hai fotografato al parco era una specie rara, secondo il biologo.
  Der *Aff*e, den du im Park fotografiert hast, war laut dem Biologen eine seltene Art.
