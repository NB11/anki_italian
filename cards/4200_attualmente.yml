Rang: 4200
Wort: attualmente
Wortart: adv
Wort mit Artikel: attualmente
Femininum / Plural: ''
IPA: ''
Definition: gegenwärtig, zurzeit
Register: ''
Beispielsätze: |-
  Il governo *attualmente* sta discutendo una nuova legge elettorale.
  Die Regierung diskutiert *derzeit* ein neues Wahlgesetz.
  
  Dove *attualmente* abiti, Luigi? Non ti ho più visto da mesi!
  Wo wohnst du *derzeit*, Luigi? Ich habe dich monatelang nicht gesehen!
  
  Anche se *attualmente* la situazione sembra stabile, non dobbiamo abbassare la guardia.
  Auch wenn die Situation *zurzeit* stabil erscheint, dürfen wir nicht nachlässig werden.
  
  *Attualmente* non sto seguendo alcun corso universitario, ma spero di riprendere presto gli studi.
  *Derzeit* besuche ich keinen akademischen Kurs, aber ich hoffe, bald wieder mit dem Studium zu beginnen.
  
  L’azienda ha *attualmente* un contributo significativo nel mercato delle pile elettriche.
  Das Unternehmen hat *momentan* einen beträchtlichen Marktanteil bei Batterien.
