Rang: 1718
Wort: reazione
Wortart: n.f
Wort mit Artikel: la reazione
Femininum / Plural: reazioni
IPA: ''
Definition: die Reaktion, -en
Register: ''
Beispielsätze: |-
  La *reazione* dell’ambasciatore è stata molto diplomatica.
  Die *Reaktion* des Botschafters war sehr diplomatisch.
  
  Nonostante l’allarme, la *reazione* dei cittadini è stata perfettamente calma.
  Trotz der Warnung war die *Reaktion* der Bürger vollkommen ruhig.
  
  Secondo gli scienziati, una *reazione* chimica eppure spiegata solo in parte ha causato l’incidente.
  Laut den Wissenschaftlern verursachte eine chemische *Reaktion*, die dennoch nur teilweise erklärt ist, den Unfall.
  
  Se avessi saputo prima, la mia *reazione* sarebbe stata diversa.
  Wenn ich es früher gewusst hätte, wäre meine *Reaktion* anders ausgefallen.
  
  La *reazione* che interessa di più ai medici è quella del paziente al nuovo farmaco.
  Die *Reaktion*, die die Ärzte am meisten interessiert, ist die des Patienten auf das neue Medikament.
