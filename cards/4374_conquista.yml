Rang: 4374
Wort: conquista
Wortart: n.f
Wort mit Artikel: la conquista
Femininum / Plural: conquiste
IPA: ''
Definition: die Eroberung, -en
Register: ''
Beispielsätze: |-
  La *conquista* di quel territorio è avvenuta secoli fa.
  Die *Eroberung* dieses Gebiets erfolgte vor Jahrhunderten.
  
  Credo che la *conquista* della pace sia più importante di qualsiasi vittoria militare.
  Ich glaube, dass die *Eroberung* des Friedens wichtiger ist als jeder militärische Sieg.
  
  Dopo la *conquista* del cuore della folla, il politico fu acclamato da tutti.
  Nach der *Eroberung* der Herzen der Menge wurde der Politiker von allen gefeiert.
  
  La *conquista* dello spazio continua a ispirare scienziati di tutto il mondo.
  Die *Eroberung* des Weltraums inspiriert weiterhin Wissenschaftler auf der ganzen Welt.
  
  Se la *conquista* di quella cima non fosse stata così difficile, molti più alpinisti ci avrebbero provato.
  Wenn die *Eroberung* dieses Gipfels nicht so schwierig gewesen wäre, hätten sich viele mehr Bergsteiger daran versucht.
