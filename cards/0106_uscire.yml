Register: ''
Beispielsätze: |-
  Stasera *uscirò* con gli amici a mangiare una pizza.
  Heute Abend *werde ich* mit Freunden ausgehen, um eine Pizza zu essen.
  
  Perché non *esci* mai da solo? È noioso stare sempre a casa.
  Warum gehst du nie allein aus? Es ist langweilig, immer zu Hause zu bleiben.
  
  Mario *è uscito* tardi ieri sera perché aveva tanto da fare in ufficio.
  Mario *ist* gestern Abend spät ausgegangen, weil er im Büro viel zu tun hatte.
  
  Se *uscissi* più spesso, incontreresti nuove persone.
  Wenn du öfter ausgingst, würdest du neue Leute kennenlernen.
  
  Scusi, a che ora *devo uscire* per prendere l’autobus alle sette?
  Entschuldigung, um wie viel Uhr *muss ich* losgehen, um den Bus um sieben Uhr zu nehmen?
