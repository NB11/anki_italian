Rang: 3163
Wort: oltrepassare
Wortart: vt
Wort mit Artikel: oltrepassare
Femininum / Plural: ''
IPA: ''
Definition: übertreten, überschreiten, hinausgehen über
Register: ''
Beispielsätze: |-
  Il veicolo ha *oltrepassato* il limite di velocità sulle strade provinciali.
  Das Fahrzeug hat die *Geschwindigkeitsbegrenzung* auf den Landstraßen übertreten.
  
  Prima di firmare, assicurati di *oltrepassare* tutti i punti del contratto con attenzione.
  Bevor du unterschreibst, musst du alle Punkte des Vertrags mit Bedacht *durchgehen*.
  
  La squadra avversaria non riuscì a *oltrepassare* la nostra difesa durante la partita.
  Die gegnerische Mannschaft konnte unsere *Abwehr* während des Spiels nicht durchbrechen.
  
  Se *oltrepassi* il confine senza documenti, rischi di essere multato dalle autorità doganali.
  Wenn du die *Grenze* ohne Papiere überschreitest, riskierst du eine Strafe der Zollbehörde.
  
  Il governo ha proposto una legge che potrebbe *oltrepassare* i limiti della costituzione attuale.
  Die Regierung hat ein Gesetz vorgeschlagen, das die *Grenzen* der aktuellen Verfassung überschreiten könnte.
