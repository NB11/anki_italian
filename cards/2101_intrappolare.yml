Rang: 2101
Wort: intrappolare
Wortart: vt
Wort mit Artikel: intrappolare
Femininum / Plural: ''
IPA: ''
Definition: einfangen, fangen, *in die Falle locken*
Register: ''
Beispielsätze: |-
  Il cacciatore ha *intrappolato* un lupo nel bosco che aveva attaccato le pecore.
  Der Jäger hat den Wolf, der die Schafe angegriffen hatte, *in die Falle gelockt*.
  
  Se non stai attento, rischi di *intrappolarti* in una situazione senza via d’uscita.
  Wenn du nicht aufpasst, kannst du dich leicht *in eine ausweglose Situation fangen*.
  
  La polizia ha usato delle telecamere per *intrappolare* i ladri che rubavano al supermarket.
  Die Polizei hat Kameras genutzt, um die Diebe, die im Supermarkt stahlen, *auf frischer Tat zu ertappen*.
  
  Gli ambientalisti vogliono *intrappolare* insetti rari per studiarne il comportamento.
  Die Umweltschützer wollen seltene Insekten *einfangen*, um ihr Verhalten zu studieren.
  
  La leggenda racconta che un mago riuscì a *intrappolare* un drago in una grotta incantata.
  Die Legende erzählt, dass ein Zauberer einen Drachen in einer verzauberten Höhle *einfangen* konnte.
