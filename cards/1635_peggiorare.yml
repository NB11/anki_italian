Rang: 1635
Wort: peggiorare
Wortart: vi
Wort mit Artikel: peggiorare
Femininum / Plural: ''
IPA: ''
Definition: sich verschlechtern, schlimmer werden
Register: ''
Beispielsätze: |-
  Dopo la *peggiorato* situazione economica, molti cittadini hanno paura.
  Nach der *verschlechterten* wirtschaftlichen Lage haben viele Bürger Angst.
  
  Se non *peggiori* la tua dieta, perderai peso velocemente.
  Wenn du deine Ernährung nicht *verschlechterst*, wirst du schnell abnehmen.
  
  Credo che il rapporto tra loro stia per *peggiorare*, specialmente dopo quell'incidente imbarazzante.
  Ich glaube, dass sich ihre Beziehung bald *verschlechtern* wird, besonders nach diesem peinlichen Vorfall.
  
  Nonostante la terapia, le sue condizioni non hanno fatto che *peggiorare* negli ultimi mesi.
  Trotz der Therapie haben sich seine Zustände in den letzten Monaten nur *verschlechtert*.
  
  Appena ho visto il *peggiorato* stato della macchina, ho capito che bisognava sostituire il motore.
  Sobald ich den *verschlechterten* Zustand des Autos sah, wusste ich, dass der Motor ersetzt werden musste.
