Rang: 564
Wort: fingere
Wortart: v
Wort mit Artikel: fingere
Femininum / Plural: ''
IPA: ''
Definition: vortäuschen, heucheln, simulieren
Register: ''
Beispielsätze: |-
  Lui *finge* di essere malato per non andare a lavoro.
  Er *täuscht* Krankheit vor, um nicht zur Arbeit zu gehen.
  
  Non *fingere* di non capire!
  *Tu* kannst doch nicht *so tun*, als würdest du es nicht verstehen!
  
  Secondo me, lei *finge* la gioia solo per non deludere gli altri.
  Ich glaube, sie *simuliert* Freude nur, um andere nicht zu enttäuschen.
  
  Avrei *finto* la felicità se fossi stato al tuo posto.
  Ich hätte Glück *vorgeheuchelt*, wenn ich an deiner Stelle gewesen wäre.
  
  Molti *fingono* di essere felici sui social, ma in realtà non lo sono.
  Viele *täuschen* auf sozialen Medien Glück vor, doch in Wahrheit sind sie es nicht.
