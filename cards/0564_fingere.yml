Rang: 564
Wort: fingere
Wortart: v
Wort mit Artikel: fingere
Femininum / Plural: ''
IPA: ''
Definition: vortäuschen, simulieren
Register: ''
Beispielsätze: |-
  Stanno *fingendo* di essere felici per non far preoccupare i genitori.
  Sie *täuschen* Glück vor, um die Eltern nicht zu beunruhigen.
  
  Se avessi *finto* di capire, non avresti fatto errori così gravi.
  Wenn du *vorgegaukelt* hättest zu verstehen, hättest du keine so groben Fehler gemacht.
  
  Non credevo che lei avrebbe *finto* di non sapere nulla dell’accaduto!
  Ich hätte nicht gedacht, dass sie *so tun würde*, als wüsste sie nichts von dem Vorfall!
  
  Per *fingere* di essere un esperto, devi studiare molto di più.
  Um dich als Experten *auszugeben*, musst du viel mehr lernen.
  
  Credo che lui stia *fingendo* solo perché ha paura della verità.
  Ich glaube, er *täuscht* nur vor, weil er Angst vor der Wahrheit hat.
