  Wenn wir dieses *Gen* verändert hätten, wäre das Experiment gescheitert.
  
  I ricercatori hanno trovato una sequenza di *geni* che potrebbe spiegare la resistenza alle medicine.
  Die Forscher haben eine Abfolge von *Genen* entdeckt, die die Resistenz gegen Medikamente erklären könnte.
