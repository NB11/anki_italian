Wort: fisicamente
Wortart: adv
Wort mit Artikel: fisicamente
Femininum / Plural: ''
IPA: ''
Definition: körperlich, physisch
Register: ''
Beispielsätze: |-
  Si è rotto una gamba e ora *fisicamente* non può camminare.
  Er hat sich ein Bein gebrochen und kann sich *körperlich* nicht bewegen.
  
  Per vincere la gara devi essere *fisicamente* molto preparato.
  Um das Rennen zu gewinnen, musst du dich *körperlich* sehr vorbereiten.
  
  Dopo l’incidente *fisicamente* si sente ancora debole, ma migliora ogni giorno.
  Nach dem Unfall fühlt er sich *körperlich* noch schwach, aber er wird jeden Tag besser.
  
  Non è *fisicamente* possibile arrivare in tempo se non prendi il treno.
  Es ist *körperlich* nicht möglich, rechtzeitig anzukommen, wenn du nicht den Zug nimmst.
  
  Il medico gli ha detto che deve seguire una dieta *fisicamente* attiva.
  Der Arzt hat ihm gesagt, dass er eine *körperlich* aktive Ernährung einhalten muss.
