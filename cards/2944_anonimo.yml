Rang: 2944
Wort: anonimo
Wortart: adj
Wort mit Artikel: anonimo
Femininum / Plural: anonimi
IPA: ''
Definition: anonym, namenlos
Register: ''
Beispielsätze: |-
  Non so chi abbia scritto questa lettera *anonima* perché non c'è firma.
  Ich weiß nicht, wer diesen *anonymen* Brief geschrieben hat, weil keine Unterschrift da ist.
  
  Se vuoi restare *anonimo*, non firmare il documento.
  Wenn du *anonym* bleiben willst, unterschreib das Dokument nicht.
  
  La polizia ha ricevuto una chiamata *anonima* che segnalava un traffico di droga.
  Die Polizei hat einen *anonymen* Anruf erhalten, der Drogenhandel meldete.
  
  Hanno reso pubblico un sondaggio *anonimo* sulla soddisfazione dei dipendenti.
  Sie haben eine *anonyme* Umfrage zur Zufriedenheit der Mitarbeiter veröffentlicht.
  
  Anche se il messaggio era *anonimo*, capii subito chi l'aveva scritto.
  Obwohl die Nachricht *anonym* war, wusste ich sofort, wer sie geschrieben hatte.
