Rang: 2652
Wort: divergere
Wortart: vi
Wort mit Artikel: divergere
Femininum / Plural: ''
IPA: ''
Definition: auseinandergehen, sich unterscheiden
Register: ''
Beispielsätze: |-
  Le due teorie scientifiche *divergono* in modo significativo riguardo all'origine dell'universo.
  Die beiden wissenschaftlichen Theorien *unterscheiden sich* deutlich was den Ursprung des Universums betrifft.
  
  Dopo anni di amicizia, le loro opinioni hanno iniziato a *divergere* profondamente.
  Nach Jahren der Freundschaft begannen ihre Meinungen sich *stark voneinander zu entfernen*.
  
  Gli esperti temono che le due proposte legislative *divergano* su questioni fondamentali.
  Die Experten befürchten, dass die beiden Gesetzesentwürfe in grundlegenden Punkten *auseinanderklaffen*.
  
  È sorprendente come i risultati dell'indagine *divergessero* da ciò che ci si aspettava.
  Es ist erstaunlich, wie die Ergebnisse der Untersuchung von den Erwartungen *abwichen*.
  
  Se i loro interessi non *divergeno* di più, forse potrebbero collaborare con successo.
  Wenn ihre Interessen sich nicht noch mehr *unterscheiden*, könnten sie vielleicht erfolgreich zusammenarbeiten.
