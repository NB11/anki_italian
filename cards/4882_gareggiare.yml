Rang: 4882
Wort: gareggiare
Wortart: vi
Wort mit Artikel: gareggiare
Femininum / Plural: ''
IPA: ''
Definition: wettkämpfen, konkurrieren
Register: ''
Beispielsätze: |-
  Gli atleti *gareggiano* per vincere la medaglia d'oro.
  Die Athleten *wettkämpfen* um die Goldmedaille zu gewinnen.
  
  Se *gareggiassi* con lui, perderesti sicuramente!
  Wenn du mit ihm *wettkämpftest*, würdest du sicher verlieren!
  
  Il ciclista ha *gareggiato* per ore sotto la pioggia battente.
  Der Radfahrer hat stundenlang unter dem starken Regen *konkurriert*.
  
  Nonostante la sua inesperienza, ha deciso di *gareggiare* nel torneo regionale.
  Trotz seiner Unerfahrenheit hat er beschlossen, in dem Regionalturnier zu *wettkämpfen*.
  
  È fondamentale che tutti *gareggino* con lealtà e rispetto reciproco.
  Es ist wichtig, dass alle *konkurrieren* mit Fairness und gegenseitigem Respekt.
