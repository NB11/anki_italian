Rang: 4971
Wort: rush
Wortart: n.m
Wort mit Artikel: il rush
Femininum / Plural: i rush
IPA: ''
Definition: das Gedränge, -
Register: ''
Beispielsätze: |-
  Durante il *rush* del mattino in metropolitana, ho perso il mio treno per un soffio.
  Während des *Gedränges* am Morgen in der U-Bahn habe ich meinen Zug nur knapp verpasst.
  
  C'è stato un enorme *rush* di turisti all'inaugurazione del museo moderno.
  Es gab ein enormes *Gedränge* von Touristen bei der Eröffnung des modernen Museums.
  
  Se non riesci a gestire questo *rush* di clienti da solo, chiamami!
  Wenn du dieses *Gedränge* an Kunden nicht allein bewältigen kannst, rufe mich!
  
  Non sopporto il *rush* dell'ora di punta ogni sera in centro.
  Ich kann das *Gedränge* der Rushhour jeden Abend im Zentrum nicht ausstehen.
  
  Il sindaco ha promesso di risolvere il problema del *rush* quotidiano nelle strade principali della città.
  Der Bürgermeister hat versprochen, das Problem des täglichen *Gedränges* in den Hauptstraßen der Stadt zu lösen.
