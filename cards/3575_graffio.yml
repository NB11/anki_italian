Rang: 3575
Wort: graffio
Wortart: n.m
Wort mit Artikel: il graffio
Femininum / Plural: graffi
IPA: ''
Definition: die Kratzspur, -en; der Kratzer, -
Register: ''
Beispielsätze: |-
  Il gatto ha lasciato un *graffio* sulla porta di legno.
  Die Katze hat eine *Kratzspur* an der Holztür hinterlassen.
  
  Dopo la lotta, si vedevano diversi *graffi* sulle sue braccia.
  Nach dem Kampf sah man mehrere *Kratzer* an ihren Armen.
  
  Non toccare quella superficie: c'è un *graffio* profondo che si vede a malapena.
  Berühre diese Oberfläche nicht: Es gibt eine *Kratzspur*, die man kaum sieht.
  
  Il medico ha notato un *graffio* sulla pelle vicino alla ferita.
  Der Arzt hat eine *Kratzspur* auf der Haut in der Nähe der Wunde bemerkt.
  
  Se trovi un *graffio* sul finestrino, non preoccuparti: è solo un segno superficiale.
  Wenn du eine *Kratzspur* am Seitenfenster findest, mach dir keine Sorgen: Es ist nur eine oberflächliche Markierung.
