Rang: 1997
Wort: rilevare
Wortart: vt
Wort mit Artikel: rilevare
Femininum / Plural: ''
IPA: ''
Definition: feststellen, erkennen, hervorheben
Register: ''
Beispielsätze: |-
  Vorrei *rilevare* che questa soluzione è la più economica di tutte.
  Ich möchte *hervorheben*, dass diese Lösung die günstigste von allen ist.
  
  Il professore ha *rilevato* un errore nel compito dello studente.
  Der Professor hat *festgestellt*, dass der Schüler einen Fehler in der Aufgabe gemacht hat.
  
  Per *rilevare* i dati, premi semplicemente questo pulsante.
  Um die Daten *abzurufen*, musst du einfach nur diesen Knopf drücken.
  
  Se *rilevassi* un calo della qualità, dovremmo subito intervenire.
  Wenn du *erkennen* würdest, dass die Qualität sinkt, müssten wir sofort eingreifen.
  
  Mi hanno incaricato di *rilevare* le condizioni del mercato locale.
  Ich wurde beauftragt, die *Bedingungen* des lokalen Marktes zu analysieren.
