Rang: 3812
Wort: sporgere
Wortart: v
Wort mit Artikel: sporgere
Femininum / Plural: ''
IPA: ''
Definition: herausstrecken, ausstrecken
Register: ''
Beispielsätze: |-
  Il cane *sporge* la testa dal finestrino dell’auto.
  Der Hund *streckt* den Kopf aus dem Autofenster heraus.
  
  Non *sporgere* troppo dal balcone, potrebbe essere pericoloso!
  Streck dich nicht zu weit über das Balkongeländer, das könnte gefährlich sein!
  
  Ha spinto la lettera nella buca delle lettere senza *sporgere* la mano.
  Er hat den Brief in den Briefkasten gesteckt, ohne die Hand *herauszustrecken*.
  
  Per vedere meglio, mi *sporsi* verso lo schermo del computer.
  Um besser sehen zu können, *streckte* ich mich zum Computerbildschirm hin.
  
  Se non *sporgi* correttamente la lingua, il medico non può esaminarti la gola.
  Wenn du die Zunge nicht richtig *herausstreckst*, kann der Arzt deine Kehle nicht untersuchen.
