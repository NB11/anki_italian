Rang: 3964
Wort: scadenza
Wortart: n.f
Wort mit Artikel: la scadenza
Femininum / Plural: scadenze
IPA: ''
Definition: der Ablauf, -äufe, die Frist, -en
Register: ''
Beispielsätze: |-
  La *scadenza* del contratto è tra due mesi, dobbiamo affrettarci a rinnovarlo.
  Die *Frist* des Vertrages läuft in zwei Monaten ab, wir müssen uns beeilen, ihn zu verlängern.
  
  Se non paghi entro la *scadenza*, verrai segnalato come cattivo pagatore.
  Wenn du nicht innerhalb der *Frist* zahlst, wirst du als säumiger Zahler gemeldet.
  
  Ricordati che la *scadenza* per iscriversi al corso è domani alle ore 12.
  Denk daran, dass die *Anmeldefrist* für den Kurs morgen um 12 Uhr abläuft.
  
  Hai già controllato se la *scadenza* della patente è vicina? Ti consiglio di prenotare la revisione.
  Hast du schon überprüft, ob die *Gültigkeitsdauer* deines Führerscheins bald abläuft? Ich rate dir, die Überprüfung vorzubuchen.
  
  La *scadenza* per presentare la domanda di partecipazione al concorso è stata prorogata di una settimana.
  Die *Einreichungsfrist* für die Bewerbung zum Wettbewerb wurde um eine Woche verlängert.
