Rang: 871
Wort: raccogliere
Wortart: vt
Wort mit Artikel: raccogliere
Femininum / Plural: ''
IPA: ''
Definition: sammeln, ernten, pflücken
Register: ''
Beispielsätze: |-
  Ogni autunno, gli studenti *raccolgono* le foglie secche nel parco per il progetto di scienze.
  Jeden Herbst *sammeln* die Schüler die trockenen Blätter im Park für das Wissenschaftsprojekt.
  
  Se vuoi *raccogliere* prove contro di lui, devi essere molto attento ai dettagli.
  Wenn du *Beweise* gegen ihn sammelst, musst du sehr auf Details achten.
  
  Ho *raccolto* abbastanza coraggio per dire la verità, anche se sapevo che avrebbe richiesto delle conseguenze.
  Ich habe genug Mut *gesammelt*, um die Wahrheit zu sagen, obwohl ich wusste, dass das erneut beantragen werden würde.
  
  La polizia ha *raccolto* diverse tracce sulla scena del crimine, ma nessuna era utile.
  Die Polizei hat mehrere *Spuren* am Tatort gesammelt, aber keine war hilfreich.
  
  Domani mattina andrò nel bosco a *raccogliere* funghi, a patto che il tempo lo permetta.
  Morgen früh gehe ich in den Wald *Pilze zu sammeln*, vorausgesetzt das Wetter erlaubt es.
