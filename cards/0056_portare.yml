Rang: 56
Wort: portare
Wortart: vt
Wort mit Artikel: portare
Femininum / Plural: ''
IPA: ''
Definition: bringen, tragen, mitbringen
Register: ''
Beispielsätze: |-
  Domani *porterò* i libri a scuola.
  Morgen werde ich die Bücher zur Schule *bringen*.
  
  Mi hanno *portato* un regalo bellissimo!
  Sie haben mir ein wunderschönes Geschenk *mitgebracht*.
  
  Porti sempre la borsa pesante?
  *Trägst* du immer diese schwere Tasche?
  
  Vorrei che tu *portassi* più pazienza.
  Ich wünschte, du würdest mehr *Geduld haben*.
  
  L’hanno portato in ospedale dopo l’incidente.
  Nach dem Unfall haben sie ihn ins Krankenhaus *gebracht*.
