Rang: 2848
Wort: missile
Wortart: n.m
Wort mit Artikel: il missile
Femininum / Plural: missili
IPA: ''
Definition: die Rakete, -n
Register: ''
Beispielsätze: |-
  Il *missile* è stato lanciato dalla base militare alle 3 del mattino.
  Die *Rakete* wurde um 3 Uhr morgens von der Militärbasis abgefeuert.
  
  Sai che i *missili* possono trasportare testate nucleari?
  Weißt du, dass *Raketen* nukleare Sprengköpfe transportieren können?
  
  Se avessimo più fondi, potremmo sviluppare *missili* più precisi.
  Wenn wir mehr Geld hätten, könnten wir präzisere *Raketen* entwickeln.
  
  Nonostante l’avvertimento, hanno lanciato il *missile* verso il bersaglio sbagliato.
  Trotz der *Warnung* haben sie die Rakete auf das falsche Ziel abgefeuert.
  
  L’ingegnere ha spiegato che disattivare un *missile* è un’operazione molto rischiosa.
  Der Ingenieur erklärte, dass das Deaktivieren einer *Rakete* eine sehr gefährliche Operation ist.
