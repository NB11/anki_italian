Rang: 1810
Wort: disegno
Wortart: n.m
Wort mit Artikel: il disegno
Femininum / Plural: disegni
IPA: ''
Definition: die Zeichnung, -en
Register: ''
Beispielsätze: |-
  Il *disegno* che hai fatto è molto dettagliato e preciso.
  Die *Zeichnung*, die du gemacht hast, ist sehr detailliert und präzise.
  
  Non riesco a capire il *disegno* che hai appeso al muro: cosa rappresenta esattamente?
  Ich verstehe die *Zeichnung* nicht, die du an die Wand gehängt hast: was stellt sie genau dar?
  
  Ho trovato un vecchio *disegno* di mio nonno tra le sue cose; era un architetto famoso.
  Ich habe eine alte *Zeichnung* meines Großvaters zwischen seinen Sachen gefunden; er war ein berühmter Architekt.
  
  Se avessi tempo, farei un *disegno* a matita per la tua stanza, così potrai scegliere quello che preferisci.
  Wenn ich Zeit hätte, würde ich eine *Zeichnung* in Bleistift für dein Zimmer machen, damit du die aussuchen kannst, die dir am besten gefällt.
  
  Il professore ha detto che il vostro *disegno* deve rispettare la struttura che abbiamo studiato ieri.
  Der Lehrer hat gesagt, dass eure *Zeichnung* die Struktur beachten muss, die wir gestern durchgenommen haben.
