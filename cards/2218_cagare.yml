Rang: 2218
Wort: cagare
Wortart: v
Wort mit Artikel: cagare
Femininum / Plural: ''
IPA: ''
Definition: scheißen, kacken
Register: ''
Beispielsätze: |-
  Oggi devo *cagare* prima di uscire, sono in ritardo.
  Heute muss ich *scheißen*, bevor ich gehe, ich bin spät dran.
  
  Se non *caghi* ora, ti pentirai quando non troverai un bagno.
  Wenn du jetzt nicht *kackst*, wirst du es bereuen, wenn du keine Toilette findest.
  
  Stamattina ha *cagato* così tanto che si sentiva debole.
  Dieses Morgen hat er *geschissen* so viel, dass er sich schwach fühlte.
  
  Quando gli ho chiesto se volesse andare in bagno, mi ha risposto: ‘Non devo *cagare*, grazie.’
  Als ich ihn fragte, ob er auf die Toilette müsse, antwortete er mir: „Ich muss nicht *scheißen*, danke.“
  
  Se avessi saputo che dovevo *cagare* alle sei di mattina, non avrei bevuto quel latte.
  Hätte ich gewusst, dass ich um sechs Uhr morgens *scheißen* müsste, hätte ich diese Milch nicht getrunken.
