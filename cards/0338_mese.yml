Rang: 338
Wort: mese
Wortart: n.m
Wort mit Artikel: il mese
Femininum / Plural: mesi
IPA: ''
Definition: der Monat, -e
Register: ''
Beispielsätze: |-
  In *gennaio* inizia un nuovo *mese*.
  Im *Januar* beginnt ein neuer *Monat*.
  
  Quanti *mesi* ci sono in un anno?
  Wie viele *Monate* hat ein Jahr?
  
  Ho visitato Roma *l'ultimo mese*.
  Ich habe Rom *im letzten Monat* besucht.
  
  I *mesi* estivi sono giugno, luglio e agosto.
  Die *Sommer*monate sind Juni, Juli und August.
  
  Vorrei prenotare una vacanza per i prossimi *mesi*.
  Ich möchte einen Urlaub für die nächsten *Monate* buchen.
