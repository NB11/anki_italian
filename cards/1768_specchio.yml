Rang: 1768
Wort: specchio
Wortart: n.m
Wort mit Artikel: lo specchio
Femininum / Plural: specchi
IPA: ''
Definition: der Spiegel, -
Register: ''
Beispielsätze: |-
  Mi sono guardato nello *specchio* per sistemarmi i capelli prima della riunione.
  Ich habe mich im *Spiegel* angesehen, um meine Haare vor dem Meeting zu richten.
  
  Non ho mai visto un *specchio* così antico come quello del museo.
  Ich habe noch nie einen so alten *Spiegel* gesehen wie den im Museum.
  
  Se rompi quel *specchio*, porti sfortuna secondo la leggenda!
  Wenn du diesen *Spiegel* zerbrichst, bringst du nach der Legende Unglück.
  
  Ha comprato un *specchio* moderno per riflettere meglio la luce nella stanza.
  Sie hat einen modernen *Spiegel* gekauft, der das Licht im Zimmer besser reflektiert.
  
  L’artista ha dipinto il suo autoritratto su uno *specchio* rotto, creando un’opera unica.
  Der Künstler hat sein Selbstporträt auf einen zerschlagenen *Spiegel* gemalt und so ein einzigartiges Werk geschaffen.
