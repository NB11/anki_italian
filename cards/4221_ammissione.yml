Rang: 4221
Wort: ammissione
Wortart: n.f
Wort mit Artikel: l'ammissione
Femininum / Plural: le ammissioni
IPA: ''
Definition: die Zulassung, der Zugang
Register: ''
Beispielsätze: |-
  L'*ammissione* all'università richiede un buon voto di maturità.
  Die *Zulassung* an der Universität erfordert eine gute Abiturnote.
  
  Ogni candidato deve presentare la domanda di *ammissione* entro la scadenza.
  Jeder Bewerber muss den *Zugang*antrag innerhalb der Frist einreichen.
  
  L'*ammissione* gratuita alle mostre è riservata ai residenti della città.
  Der *Zutritt* zu den Ausstellungen ist für Stadtbewohner kostenlos.
  
  Hanno negato l'*ammissione* allo studente a causa di un errore nella documentazione.
  Sie haben dem Studenten die *Zulassung* wegen eines Fehlers in den Unterlagen verweigert.
  
  L'*ammissione* ai corsi avanzati dipende dalle competenze linguistiche.
  Die *Zulassung* zu den Fortgeschrittenenkursen hängt von den Sprachkenntnissen ab.
