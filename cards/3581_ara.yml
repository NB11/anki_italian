Rang: 3581
Wort: ara
Wortart: n.m
Wort mit Artikel: l'ara
Femininum / Plural: ari
IPA: ''
Definition: der Altar, -e
Register: ''
Beispielsätze: |-
  Hanno trovato un'*ara* antica durante gli scavi archeologici vicino al tempio.
  Sie haben einen *Altar* während der archäologischen Ausgrabungen neben dem Tempel gefunden.
  
  L'*ara* principale della chiesa è decorata con pregiate opere d’arte.
  Der *Hauptaltar* der Kirche ist mit kostbaren Kunstwerken verziert.
  
  Nel museo c’è un modello in scala di un’*ara* romana del I secolo d.C.
  Im Museum gibt es ein maßstabsgetreues Modell eines römischen *Altars* aus dem 1. Jahrhundert n. Chr.
  
  Gli studiosi discutono ancora l’uso esatto di ogni *ara* nei rituali antichi.
  Die Gelehrten diskutieren immer noch über die genaue Verwendung jedes *Altars* in den antiken Ritualen.
  
  Se visitate Pompei, non perdetevi l’*ara* del tempio di Apollo.
  Wenn ihr Pompeji besucht, dürft ihr den *Altar* im Tempel des Apollo nicht verpassen.
