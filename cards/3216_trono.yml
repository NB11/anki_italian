Rang: 3216
Wort: trono
Wortart: n.m
Wort mit Artikel: il trono
Femininum / Plural: troni
IPA: ''
Definition: der Thron, -e
Register: ''
Beispielsätze: |-
  Il re si sedette sul *trono* durante la cerimonia di incoronazione.
  Der König setzte sich auf den *Thron* während der Krönungszeremonie.
  
  Dopo secoli di guerra, il popolo riuscì finalmente a rovesciare il tiranno che sedeva sul *trono*.
  Nach Jahrhunderten des Krieges gelang es dem Volk endlich, den Tyrannen zu stürzen, der auf dem *Thron* saß.
  
  Si dice che chiunque sieda sul *trono* diventi orgoglioso e perduto nel potere.
  Man sagt, dass jeder, der auf dem *Thron* sitzt, stolz und in der Macht verloren wird.
  
  Il museo espone uno splendido *trono* dorato del diciassettesimo secolo.
  Das Museum zeigt einen prächtigen vergoldeten *Thron* aus dem siebzehnten Jahrhundert.
  
  Quando il duca abdicò, nessuno sembrava adatto a sedersi sul *trono* rimasto vacante.
  Als der Herzog abdankte, schien niemand geeignet zu sein, sich auf den vakanten *Thron* zu setzen.
