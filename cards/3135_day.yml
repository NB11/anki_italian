Rang: 3135
Wort: day
Wortart: n.m
Wort mit Artikel: il day
Femininum / Plural: i giorni
IPA: ''
Definition: der Tag, -e
Register: ''
Beispielsätze: |-
  Oggi è un *giorno* soleggiato, perfetto per una passeggiata.
  Heute ist ein *Tag* mit Sonnenschein, perfekt für einen Spaziergang.
  
  Ho trascorso l'intero *giorno* a studiare per l'esame di domani.
  Ich habe den ganzen *Tag* damit verbracht, für die Prüfung von morgen zu lernen.
  
  Ricordo ancora quel *giorno* in cui ci siamo conosciuti al parco.
  Ich erinnere mich noch an jenen *Tag*, als wir uns im Park kennengelernt haben.
  
  Non appena finirà questo *giorno*, andrò a letto perché sono stanco morto.
  Sobald dieser *Tag* vorbei ist, werde ich ins Bett gehen, weil ich todmüde bin.
  
  Se domani farà bel tempo, visiteremo tutti i monumenti della *città* in un solo giorno.
  Wenn das Wetter morgen gut ist, werden wir alle Sehenswürdigkeiten der *Stadt* an einem einzigen Tag besichtigen.
