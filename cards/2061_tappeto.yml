Rang: 2061
Wort: tappeto
Wortart: n.m
Wort mit Artikel: il tappeto
Femininum / Plural: tappeti
IPA: ''
Definition: der Teppich, -e
Register: ''
Beispielsätze: |-
  Ho comprato un *tappeto* rosso per la sala da pranzo.
  Ich habe einen *roten Teppich* für das Esszimmer gekauft.
  
  Non appena entriamo, togliamo sempre le scarpe per non sporcare il *tappeto* di casa.
  Sobald wir hereinkommen, ziehen wir immer die Schuhe aus, um den *Teppich* im Haus nicht zu verschmutzen.
  
  Mi hanno detto che quel *tappeto* persiano era così antico da essere considerato un vero gioiello.
  Man hat mir gesagt, dass dieser *persische Teppich* so alt war, dass er als echtes Juwel galt.
  
  Quando ho visto quel *tappeto* con disegni geometrici, ho subito pensato a un artista contemporaneo.
  Als ich diesen *Teppich* mit geometrischen Mustern sah, dachte ich sofort an einen zeitgenössischen Künstler.
  
  Dopo aver pulito il *tappeto*, la stanza sembrava più luminosa e accogliente.
  Nachdem wir den *Teppich* gereinigt hatten, wirkte der Raum heller und einladender.
