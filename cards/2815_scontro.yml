Rang: 2815
Wort: scontro
Wortart: n.m
Wort mit Artikel: lo scontro
Femininum / Plural: scontri
IPA: ''
Definition: der Zusammenstoß, -e
Register: ''
Beispielsätze: |-
  Dopo lo *scontro* tra i due veicoli, la polizia ha chiamato i soccorsi.
  Nach dem *Zusammenstoß* zwischen den beiden Fahrzeugen hat die Polizei die Rettungskräfte gerufen.
  
  Il conducente ha denunciato lo *scontro* con un albero a causa della nebbia.
  Der Fahrer hat den *Zusammenstoß* mit einem Baum wegen des Nebels gemeldet.
  
  Nonostante lo *scontro* sia stato violento, nessuno ha riportato gravi ferite.
  Trotz des *Zusammenstoßes*, der heftig war, hat niemand schwere Verletzungen davontragen.
  
  Se ci fosse stato uno *scontro* frontale, le conseguenze sarebbero state disastrose.
  Wenn es zu einem frontalen *Zusammenstoß* gekommen wäre, hätten die Folgen verheerend sein können.
  
  Lo *scontro* tra le due squadre ha interrotto la partita per mezz’ora.
  Der *Zusammenstoß* zwischen den beiden Mannschaften hat das Spiel für eine halbe Stunde unterbrochen.
