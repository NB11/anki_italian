Rang: 2025
Wort: professor
Wortart: n.m
Wort mit Artikel: il professor
Femininum / Plural: i professori
IPA: ''
Definition: der Professor, -en
Register: ''
Beispielsätze: |-
  Il *professore* ha spiegato la lezione con molta chiarezza.
  Der *Professor* hat die Lektion mit großer Klarheit erklärt.
  
  Non ho ancora incontrato il *professore* di fisica di questa università.
  Ich habe den *Professor* für Physik dieser Universität noch nicht getroffen.
  
  Se il *professore* approva il progetto, potremo proseguire con le ricerche.
  Wenn der *Professor* das Projekt genehmigt, können wir die Forschungen fortsetzen.
  
  I *professori* universitari devono spesso aggiornare le loro conoscenze.
  Universitäts*professoren* müssen oft ihr Wissen aktualisieren.
  
  Spero che il *professore* non stupisca troppo gli studenti con le sue domande oggi.
  Ich hoffe, dass der *Professor* die Studenten heute nicht mit seinen Fragen zu sehr erstaunt.
