Rang: 3062
Wort: pirata
Wortart: n.m
Wort mit Artikel: il pirata
Femininum / Plural: pirati
IPA: ''
Definition: der Pirat, -en
Register: ''
Beispielsätze: |-
  Il *pirata* ha rubato un sacco di merci preziose dalla nave mercantile.
  Der *Pirat* hat eine Menge wertvoller Waren von dem Handelsschiff gestohlen.
  
  Chi sarebbe così folle da assumere un *pirata* come pirata per il suo equipaggio?
  Wer wäre so verrückt, einen *Piraten* als Teil seiner Besatzung anzustellen?
  
  Nonostante le molte leggende, nessun *pirata* ha mai trovato il tesoro nascosto sull'isola.
  Trotz vieler Legenden hat kein *Pirat* den versteckten Schatz auf der Insel gefunden.
  
  Se avessi vissuto nel XVII secolo, avrei potuto diventare un *pirata* famoso come Barbanera.
  Wenn ich im 17. Jahrhundert gelebt hätte, wäre ich vielleicht ein berühmter *Pirat* wie Blackbeard geworden.
  
  I libri di storia parlano spesso dei *pirati* che infestavano il Mar dei Caraibi.
  Geschichtsbücher erzählen oft von den *Piraten*, die die Karibik unsicher machten.
