Beispielsätze: |-
  Vuoi un *bicchiere* d'acqua o preferisci il succo di frutta?
  Möchtest du ein *Glas* Wasser oder bevorzugst du den Fruchtsaft?
  
  Ho rotto il *bicchiere* mentre lavavo i piatti ieri sera.
  Ich habe das *Glas* zerbrochen, als ich gestern Abend das Geschirr spülte.
  
  Se avessi saputo che il vino era così buono, avrei portato un altro *bicchiere*.
  Wenn ich gewusst hätte, dass der Wein so gut ist, hätte ich ein weiteres *Glas* mitgebracht.
  
  Mi passi quel *bicchiere*? È l’unico che è rimasto pulito.
  Kannst du mir mal jenes *Glas* geben? Es ist das einzige, das noch sauber ist.
  
  Porta due *bicchieri* in terrazza, così possiamo brindare al nuovo anno.
  Bring zwei *Gläser* auf die Terrasse, damit wir auf das neue Jahr anstoßen können.
