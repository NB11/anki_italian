Rang: 2244
Wort: ferito
Wortart: n.m/f
Wort mit Artikel: il ferito
Femininum / Plural: feriti
IPA: ''
Definition: das *Verletzte*, die *Verletzten*
Register: ''
Beispielsätze: |-
  Molti *feriti* sono stati trasportati in ospedale dopo l’incidente.
  Viele *Verletzten* wurden nach dem Unfall ins Krankenhaus gebracht.
  
  La *ferita* del soldato è stata medicata con cura dal medico della clinica.
  Die *Verletzung* des Soldaten wurde vom Arzt der Klinik sorgfältig versorgt.
  
  Se avessi visto un *ferito*, avrei chiamato subito l’ambulanza.
  Wenn ich einen *Verletzten* gesehen hätte, hätte ich sofort den Krankenwagen gerufen.
  
  Credo che ci siano dei *feriti* tra i passeggeri dell’autobus.
  Ich glaube, es gibt *Verletzte* unter den Fahrgästen des Busses.
  
  Anche se non è *ferito* gravemente, dovrebbe comunque farsi visitare da un dottore.
  Auch wenn er nicht schwer *verletzt* ist, sollte er sich trotzdem von einem Arzt untersuchen lassen.
