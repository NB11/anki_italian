Rang: 2247
Wort: rivolere
Wortart: v
Wort mit Artikel: rivolere
Femininum / Plural: ''
IPA: ''
Definition: zurückverlangen, wiederhaben wollen
Register: ''
Beispielsätze: |-
  Dopo mesi di discussioni, gli ho *rivoluto* il libro che mi aveva prestato.
  Nach Monaten der Diskussionen habe ich *das Buch zurückverlangt*, das er mir geliehen hatte.
  
  Se *rivuoi* la tua libertà, allora fatti avanti e lotta per ottenerla!
  Wenn du *deine Freiheit zurückverlangst*, dann tritt vor und kämpfe darum, sie zu bekommen!
  
  Non *rivogliono* i loro soldi indietro, ma pretendono soddisfazione.
  Sie *verlangen ihr Geld nicht zurück*, sondern bestehen auf Genugtuung.
  
  Ti assicuro che non *rivorrò* il favore che mi hai fatto.
  Ich versichere dir, dass ich *den Gefallen nicht wiederhaben will*, den du mir getan hast.
  
  Se *rivogli* la fiducia degli altri, dovrai dimostrare di essere degno di nuovo.
  Wenn du *das Vertrauen der anderen zurückverlangst*, musst du beweisen, dass du es wieder verdienst.
