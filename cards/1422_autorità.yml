Rang: 1422
Wort: autorità
Wortart: n.f
Wort mit Artikel: l'autorità
Femininum / Plural: autorità
IPA: ''
Definition: die Behörde, die Autorität, -en
Register: ''
Beispielsätze: |-
  L'*autorità* locale ha approvato il progetto di costruzione del nuovo ponte.
  Die *lokale Behörde* hat das Bauprojekt der neuen Brücke genehmigt.
  
  Nonostante i due *autorità* fossero in disaccordo, trovarono una soluzione comune.
  Obwohl die beiden *Autoritäten* nicht einer Meinung waren, fanden sie eine gemeinsame Lösung.
  
  Se avessi un certo potere, vorrei che l'*autorità* fosse davvero giusta per tutti.
  Wenn ich eine gewisse Macht hätte, möchte ich, dass die *Autorität* wirklich für alle fair wäre.
  
  L'*autorità* giudiziaria sta indagando sulla fuga del prigioniero dalla cella numero cinque.
  Die *Justizbehörde* ermittelt über die Flucht des Häftlings aus Zelle Nummer fünf.
  
  Le *autorità* federali hanno richiesto urgentemente la collaborazione di tutti i proprietari dei terreni circostanti.
  Die *Bundesbehörden* haben dringend die Zusammenarbeit aller Grundstücksbesitzer in der Umgebung angefordert.
