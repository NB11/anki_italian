Rang: 675
Wort: birra
Wortart: n.f
Wort mit Artikel: la birra
Femininum / Plural: birre
IPA: ''
Definition: das Bier, -e
Register: ''
Beispielsätze: |-
  Non bevo mai *birra* perché non mi piace il sapore amaro.
  Ich trinke nie *Bier*, weil mir der bittere Geschmack nicht gefällt.
  
  Al ristorante hanno ordinato *birra* e qualcosa da mangiare.
  Im Restaurant haben sie *Bier* und etwas zu essen bestellt.
  
  Se continui a bere così tanta *birra*, ti farà male al fegato.
  Wenn du weiterhin so viel *Bier* trinkst, wird es deiner Leber schaden.
  
  Ho visto nel negozio una *birra* artigianale che ho voluto provare.
  Ich habe im Geschäft ein Craft-*Bier* gesehen, das ich ausprobieren wollte.
  
  Mi hanno detto che la *birra* migliore si trova in una piccola zona fuori città.
  Man hat mir gesagt, dass das beste *Bier* in einer kleinen Gegend außerhalb der Stadt zu finden ist.
