Rang: 676
Wort: ferire
Wortart: vt
Wort mit Artikel: ferire
Femininum / Plural: ''
IPA: ''
Definition: verletzen, verwunden
Register: ''
Beispielsätze: |-
  Non volevo *ferire* i tuoi sentimenti, ma a volte le parole possono fare male più delle armi.
  Ich wollte deine *Gefühle nicht verletzen*, aber manchmal können Worte mehr wehtun als Waffen.
  
  Il detective ha dimostrato che l’uomo ha *ferito* la vittima con un oggetto contundente.
  Der Detektiv hat *bewiesen*, dass der Mann das Opfer mit einem stumpfen Gegenstand verwundet hat.
  
  Se continui a spingere così forte, potresti *ferire* qualcuno senza volerlo, quindi fai attenzione.
  Wenn du so stark schiebst, könntest du jemanden *verletzen*, ohne es zu wollen – sei also vorsichtig.
  
  Ha detto che non avrebbe mai permesso a nessuno di *ferire* il suo cane, che considera parte della famiglia.
  Er sagte, er würde niemals zulassen, dass jemand seinen Hund *verletzt*, den er als Teil der Familie betrachtet.
  
  Nonostante il dolore, ha cercato di sorridere per non *ferire* ulteriormente chi gli stava vicino.
  Trotz des Schmerzes versuchte er zu lächeln, um diejenigen, die ihm nahestanden, nicht noch mehr *zu verletzen*.
