Rang: 4338
Wort: risposare
Wortart: v
Wort mit Artikel: risposare
Femininum / Plural: ''
IPA: ''
Definition: wieder heiraten, erneut heiraten
Register: ''
Beispielsätze: |-
  Dopo anni di vedovanza, Signora Rossi ha deciso di *risposarsi* con un uomo molto gentile.
  Nach Jahren der Witwenschaft hat Frau Rossi beschlossen, sich mit einem sehr netten Mann wieder zu *verheiraten*.
  
  Se non avessi perso il mio lavoro, forse non avrei avuto il coraggio di *risposarmi* così presto!
  Wenn ich meine Arbeit nicht verloren hätte, hätte ich vielleicht nicht den Mut gehabt, mich so schnell wieder *zu verheiraten*!
  
  In molti paesi, le persone anziane che perdono il coniuge non osano *risposarsi* per paura di essere giudicate.
  In vielen Ländern wagen es ältere Menschen, die ihren Ehepartner verlieren, nicht, sich wieder *zu verheiraten*, aus Angst, verurteilt zu werden.
  
  Mi ha confessato che vorrebbe *risposarsi*, ma non sa come dirlo ai suoi figli.
  Er hat mir gestanden, dass er sich wieder *verheiraten* möchte, aber nicht weiß, wie er es seinen Kindern sagen soll.
  
  Tu credi che sia meglio non *risposarsi* dopo un divorzio, per non confondere i figli?
  Meinst du, es ist besser, sich nach einer Scheidung nicht wieder *zu verheiraten*, um die Kinder nicht zu verwirren?
