Rang: 3574
Wort: demonio
Wortart: n.m
Wort mit Artikel: il demonio
Femininum / Plural: demoni
IPA: ''
Definition: der Dämon, -en
Register: ''
Beispielsätze: |-
  Il prete ha scacciato *il demonio* dal corpo del ragazzo.
  Der Priester hat *den Dämon* aus dem Körper des Jungen vertrieben.
  
  Molti credono che *un demonio* si nasconda in quella vecchia casa abbandonata.
  Viele glauben, dass sich *ein Dämon* in diesem verlassenen alten Haus versteckt.
  
  Se avessi visto *questo demonio* ieri notte, avresti avuto paura anche tu!
  Wenn du *diesen Dämon* gestern Nacht gesehen hättest, hättest du auch Angst bekommen!
  
  Nonostante i suoi *demoni* interiori, è riuscito a realizzare grandi opere artistiche.
  Trotz seiner inneren *Dämonen* gelang es ihm, große künstlerische Werke zu schaffen.
  
  Dicono che *il demonio* preferisca agire nelle notti senza luna.
  Man sagt, dass *der Dämon* in mondlosen Nächten am liebsten handelt.
