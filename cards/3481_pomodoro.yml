Rang: 3481
Wort: pomodoro
Wortart: n.m
Wort mit Artikel: il pomodoro
Femininum / Plural: pomodori
IPA: ''
Definition: die Tomate, -n
Register: ''
Beispielsätze: |-
  Oggi ho comprato *pomodoro* freschi dal mercato.
  Heute habe ich *Tomaten* frisch vom Markt gekauft.
  
  Se cucini la pasta, non dimenticare di aggiungere il *pomodoro* tagliato a pezzetti.
  Wenn du die Pasta kochst, vergiss nicht, die *Tomate* in Stücke geschnitten hinzuzufügen.
  
  Vorrei un piatto di penne al *pomodoro* e basilico, per favore.
  Ich hätte gern eine Portion Penne mit *Tomatensauce* und Basilikum, bitte.
  
  Il contadino ha detto che quest’anno il *pomodoro* è andato a male a causa della pioggia.
  Der Bauer hat gesagt, dass in diesem Jahr die *Tomaten* wegen des Regens verdorben sind.
  
  Nonostante l’intromettere della suocera, Maria riuscì a preparare una salsa al *pomodoro* deliziosa.
  Trotz des *Einmischens* der Schwiegermutter gelang es Maria, eine köstliche Tomatensauce zuzubereiten.
