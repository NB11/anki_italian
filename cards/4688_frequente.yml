Rang: 4688
Wort: frequente
Wortart: adj
Wort mit Artikel: frequente
Femininum / Plural: ''
IPA: ''
Definition: häufig, oft vorkommend
Register: ''
Beispielsätze: |-
  È *frequente* che la pioggia inizi senza previo avviso in questa zona.
  Es ist *häufig*, dass der Regen hier ohne Vorwarnung beginnt.
  
  Se avessi più tempo, visiterei i musei con *frequenza* maggiore.
  Wenn ich mehr Zeit hätte, würde ich die Museen mit *größerer Häufigkeit* besuchen.
  
  Nonostante la *frequenza* delle chiamate, lui non ha mai risposto.
  Trotz der *Häufigkeit* der Anrufe hat er nie geantwortet.
  
  Chiunque abbia un *frequente* bisogno di caffè dovrebbe limitarsi a un massimo di due tazze al giorno.
  Wer einen *häufigen* Kaffeebedarf hat, sollte sich auf maximal zwei Tassen pro Tag beschränken.
  
  È *frequente* che gli studenti dimentichino scadenze importanti prima degli esami.
  Es kommt *häufig* vor, dass Studenten wichtige Fristen vor den Prüfungen vergessen.
