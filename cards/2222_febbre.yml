Rang: 2222
Wort: febbre
Wortart: n.f
Wort mit Artikel: la febbre
Femininum / Plural: febbri
IPA: ''
Definition: das Fieber, -
Register: ''
Beispielsätze: |-
  La *febbre* alta non accenna a scendere nonostante abbia preso medicine.
  Das *Fieber* geht trotz der eingenommenen Medikamente nicht zurück.
  
  Se hai la *febbre*, dovresti rimanere a letto e bere molti liquidi.
  Wenn du *Fieber* hast, solltest du im Bett bleiben und viel trinken.
  
  Mi hanno detto che questa *febbre* passerà entro domani mattina, ma ho paura delle complicazioni.
  Man hat mir gesagt, dass dieses *Fieber* bis morgen früh vorbei sein wird, aber ich habe Angst vor Komplikationen.
  
  Nonostante la *febbre* persistente, ha deciso di andare al lavoro ugualmente, cosa che non gli consiglio affatto.
  Trotz des anhaltenden *Fiebers* hat er sich entschieden, zur Arbeit zu gehen, was ich ihm überhaupt nicht rate.
  
  La *febbre* dei neonati richiede sempre un controllo immediato dal pediatra.
  Das *Fieber* von Neugeborenen erfordert immer eine sofortige Kontrolle beim Kinderarzt.
