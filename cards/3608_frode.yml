Rang: 3608
Wort: frode
Wortart: n.f
Wort mit Artikel: la frode
Femininum / Plural: frodi
IPA: ''
Definition: der Betrug, die Täuschung
Register: ''
Beispielsätze: |-
  La *frode* finanziaria può portare a pesanti sanzioni penali.
  Der *Betrug* kann schwere strafrechtliche Konsequenzen nach sich ziehen.
  
  Se scopri una *frode* nel contratto, dovresti immediatamente segnalarla.
  Wenn Sie eine *Täuschung* im Vertrag entdecken, sollten Sie sie sofort melden.
  
  La polizia ha indagato per mesi prima di scoprire chi fosse dietro quella *frode* milionaria.
  Die Polizei ermittelte monatelang, bevor sie herausfand, wer hinter diesem *Betrug* in Millionenhöhe steckte.
  
  Molte *frodi* online sfruttano l’ingenuità delle persone anziane.
  Viele *Täuschungen* im Internet nutzen die Gutgläubigkeit älterer Menschen aus.
  
  Nonostante le prove, l’imputato negò ogni *frode*, dichiarandosi innocente.
  Trotz der Beweise bestritt der Angeklagte jeden *Betrug* und behauptete, unschuldig zu sein.
