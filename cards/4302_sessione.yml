Beispielsätze: |-
  La *sessione* di terapia dura un’ora e mezza.
  Die *Sitzung* dauert eineinhalb Stunden.
  
  Dopo la *sessione* di allenamento, mi sento sempre molto stanco.
  Nach der *Sitzung* fühle ich mich immer sehr müde.
  
  Hai partecipato alla *sessione* di ieri sera sull’intelligenza artificiale?
  Hast du an der *Sitzung* gestern Abend über künstliche Intelligenz teilgenommen?
  
  Nonostante la *sessione* fosse noiosa, ho cercato di prendere appunti dettagliati.
  Obwohl die *Sitzung* langweilig war, versuchte ich, detaillierte Notizen zu machen.
  
  La *sessione* straordinaria del Consiglio è stata convocata per discutere la crisi economica.
  Die außerordentliche *Sitzung* des Rates wurde einberufen, um die Wirtschaftskrise zu besprechen.
