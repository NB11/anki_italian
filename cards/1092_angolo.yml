Rang: 1092
Wort: angolo
Wortart: n.m
Wort mit Artikel: l'angolo
Femininum / Plural: angoli
IPA: ''
Definition: die Ecke, -n
Register: ''
Beispielsätze: |-
  Mi piace sedere nell'*angolo* della stanza dove c'è più luce.
  Ich sitze gerne in der *Ecke* des Raumes, wo es mehr Licht gibt.
  
  Il direttore ha trovato il documento nascosto in un *angolo* della scrivania.
  Der Direktor fand das Dokument in einer *Ecke* seines Schreibtischs versteckt.
  
  Nonostante il rumore della radio, riuscivo a concentrarmi solo nell'*angolo* più tranquillo della biblioteca.
  Trotz des Geräusches vom *Radio* konnte ich mich nur in der Ecke der Bibliothek konzentrieren.
  
  Se cerchi la bottiglia d'acqua, guarda nell'*angolo* vicino alla porta.
  Wenn du die Wasserflasche suchst, schau in die *Ecke* neben der Tür.
  
  Arrivando nella stazione, ho visto un uccello posato proprio sull'*angolo* del tetto.
  Als ich am Bahnhof ankam, sah ich einen Vogel, der genau auf der *Ecke* des Daches saß.
