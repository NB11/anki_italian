Rang: 3019
Wort: imporre
Wortart: vt
Wort mit Artikel: imporre
Femininum / Plural: ''
IPA: ''
Definition: auferlegen, vorschreiben, erzwingen
Register: ''
Beispielsätze: |-
  Il governo *imporrà* nuove tasse per finanziare l'istruzione pubblica.
  Die Regierung wird neue Steuern *auferlegen*, um das öffentliche Bildungssystem zu finanzieren.
  
  I genitori *hanno imposto* al figlio una severa disciplina per i suoi comportamenti problematici.
  Die Eltern haben ihrem Sohn eine strenge Disziplin *vorgeschrieben*, wegen seines problematischen Verhaltens.
  
  Se ti *imponesse* di lavorare senza pause, come reagiresti?
  Wenn er dir *vorschreiben würde*, ohne Pause zu arbeiten, wie würdest du reagieren?
  
  È giusto che un insegnante *imposizioni* regole chiare agli alunni, ma sempre con rispetto.
  Es ist richtig, dass ein Lehrer den Schülern klare Regeln *auferlegt*, aber stets mit Respekt.
  
  Il capo ha *imposto* che tutti usino lo stesso programma di lavoro, nonostante le proteste del team.
  Der Chef hat *erzwungen*, dass alle dasselbe Arbeitsprogramm nutzen, trotz der Proteste des Teams.
