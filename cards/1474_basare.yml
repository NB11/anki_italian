Rang: 1474
Wort: basare
Wortart: vi
Wort mit Artikel: basare
Femininum / Plural: ''
IPA: ''
Definition: basieren, beruhen
Register: ''
Beispielsätze: |-
  La teoria *si basa* su ricerche recenti, che sono state pubblicate solo la settimana scorsa.
  Die Theorie *beruht* auf kürzlich veröffentlichten Forschungen.
  
  Per decidere, il responsabile vuole *basarsi* sulle opinioni dei giocatori anziché sulle sue convinzioni personali.
  Um zu entscheiden, will der *Verantwortliche* sich lieber auf die Meinungen der Spieler stützen als auf seine persönlichen Überzeugungen.
  
  Purtroppo, non possiamo *basarci* solo sulle promesse dell’azienda, ma dobbiamo vedere i fatti concreti.
  Leider können wir uns nicht nur auf die Versprechungen des *Unternehmens* stützen, sondern müssen die konkreten Fakten sehen.
  
  Gli scienziati sperano che la nuova medicina *si basi* su principi solidi e non solo su supposizioni.
  Die Wissenschaftler hoffen, dass sich das neue Medikament auf soliden Prinzipien *stützt* und nicht nur auf bloßen Vermutungen.
  
  Se avessi più tempo, mi piacerebbe *basare* il mio romanzo su una storia vera vissuta in questo quartiere durante l’incendio dello scorso anno.
  Wenn ich mehr Zeit hätte, würde ich meinen Roman gern auf einer wahren Geschichte aufbauen, die in diesem Viertel beim *Brand* letzten Jahres erlebt wurde.
