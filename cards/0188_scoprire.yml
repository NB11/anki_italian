Wort mit Artikel: scoprire
Femininum / Plural: ''
IPA: ''
Definition: entdecken, herausfinden, aufdecken
Register: ''
Beispielsätze: |-
  Gli archeologi hanno *scoperto* una tomba antica nel deserto.
  Die Archäologen haben ein antikes Grab im *entdeckt*.
  
  Vorrei *scoprire* il segreto della tua felicità.
  Ich würde gerne das Geheimnis deines *Glücks* *aufdecken*.
  
  Non scoprirai mai cosa ho fatto sabato sera!
  Du wirst nie *herausfinden*, was ich Samstagabend gemacht habe!
  
  Spero che tu *scopra* presto la verità.
  Ich hoffe, dass du bald die *Wahrheit* *entdeckst*.
  
  Avrei voluto *scoprire* questo ristorante prima!
  Ich hätte dieses Restaurant gerne früher *entdeckt*.
