Rang: 3243
Wort: costola
Wortart: n.f
Wort mit Artikel: la costola
Femininum / Plural: costole
IPA: ''
Definition: die Rippe, -n
Register: ''
Beispielsätze: |-
  Il medico ha esaminato *la costola* sinistra del paziente dopo l'incidente.
  Der Arzt hat die *linke Rippe* des Patienten nach dem Unfall untersucht.
  
  Mentre camminava, si è accorto di un dolore improvviso alla *costola* destra.
  Während er ging, bemerkte er einen plötzlichen Schmerz in der *rechten Rippe*.
  
  Nelle antiche statue romane, *le costole* sono spesso ben definite.
  In den antiken römischen Statuen sind die *Rippen* oft gut definiert.
  
  Ha detto che sente un fastidio sotto la *costola*, ma non sa cosa sia.
  Er sagte, er spüre ein Unbehagen unter der *Rippe*, wisse aber nicht, was es ist.
  
  Il fisioterapista mi ha consigliato di fare esercizi per rafforzare *le costole* dopo la frattura.
  Der Physiotherapeut hat mir geraten, nach dem Bruch Übungen zu machen, um die *Rippen* zu stärken.
