Rang: 4496
Wort: gattino
Wortart: n.m
Wort mit Artikel: il gattino
Femininum / Plural: gattini
IPA: ''
Definition: das Kätzchen, -
Register: ''
Beispielsätze: |-
  Ho trovato *un gattino* abbandonato vicino al mio cancello.
  Ich habe *ein Kätzchen* verlassen in der Nähe meines Gatters gefunden.
  
  Non appena *il gattino* ha visto la scatola, ci è saltato dentro immediatamente.
  Sobald *das Kätzchen* den Karton sah, sprang es sofort hinein.
  
  Se avessi saputo che *i gattini* sono così vivaci, avrei adottato due invece di uno!
  Wenn ich gewusst hätte, dass *Kätzchen* so lebhaft sind, hätte ich zwei statt eines adoptiert!
  
  Mentre preparavo la cena, *un gattino* nero si è intrufolato in cucina e ha rubato un pezzo di pane.
  Während ich das Abendessen zubereitete, schlich sich *ein Kätzchen* in die Küche und stibitzte ein Stück Brot.
  
  Credo che *il gattino* di Maria sia più piccolo di quello che ho visto ieri al parco.
  Ich glaube, *das Kätzchen* von Maria ist kleiner als das, das ich gestern im Park gesehen habe.
