Beispielsätze: |-
  Il dottore mi ha prescritto un *medicinale* contro il mal di testa.
  Der Arzt hat mir ein *Medikament* gegen die Kopfschmerzen verschrieben.
  
  Dove hai messo il *medicinale* che ti ho dato stamani?
  Wo hast du das *Arzneimittel* hingelegt, das ich dir heute Morgen gegeben habe?
  
  Anche se il *medicinale* è amaro, devo prenderlo tre volte al giorno.
  Auch wenn das *Medikament* bitter schmeckt, muss ich es dreimal täglich einnehmen.
  
  Ho comprato questi *medicinali* al negozio di erboristeria in centro.
  Ich habe diese *Arzneimittel* im Kräuterladen im Zentrum gekauft.
  
  Se non assumi il *medicinale* regolarmente, non avrai alcun effetto positivo.
  Wenn du das *Medikament* nicht regelmäßig einnimmst, wirst du keine positive Wirkung spüren.
