Rang: 4510
Wort: capanno
Wortart: n.m
Wort mit Artikel: il capanno
Femininum / Plural: capanni
IPA: ''
Definition: die Hütte, -n
Register: ''
Beispielsätze: |-
  Abbiamo trovato un *capanno* abbandonato nel bosco dove la gente si nascondeva durante la guerra.
  Wir haben eine verlassene *Hütte* im Wald gefunden, in der sich die Leute während des Krieges versteckt hatten.
  
  Sai che vicino al lago c'è un *capanno* dove si possono affittare le barche?
  Wusstest du, dass es nahe dem See eine *Hütte* gibt, in der man Boote mieten kann?
  
  Nonostante la pioggia, abbiamo dormito nel *capanno* per tutta la notte.
  Trotz des Regens haben wir die ganze Nacht in der *Hütte* geschlafen.
  
  Il *capanno* degli attrezzi era pieno di utensili arrugginiti e vecchi vasi.
  Die Geräte-*Hütte* war voller rostiger Werkzeuge und alter Töpfe.
  
  Se vuoi un po' di privacy, puoi nasconderti nel *capanno* in fondo al giardino.
  Wenn du etwas Privatsphäre möchtest, kannst du dich in die *Hütte* am Ende des Gartens zurückziehen.
