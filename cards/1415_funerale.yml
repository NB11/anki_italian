Rang: 1415
Wort: funerale
Wortart: n.m
Wort mit Artikel: il funerale
Femininum / Plural: i funerali
IPA: ''
Definition: die Beerdigung, -en
Register: ''
Beispielsätze: |-
  La famiglia ha organizzato un *funerale* molto solenne per il nonno scomparso.
  Die Familie hat eine sehr würdevollen *Beerdigung* für den verstorbenen Großvater organisiert.
  
  Sai se ci sarà un *funerale* pubblico per il sindaco stupendo che è appena morto?
  Weißt du, ob es eine öffentliche *Beerdigung* für den großartigen Bürgermeister gibt, der gerade gestorben ist?
  
  Nonostante la lotta contro il male, la nonna ha voluto un *funerale* semplice senza troppo fumo e lacrime.
  Trotz des Kampfes gegen das Übel wollte die Großmutter eine einfache *Beerdigung* ohne zu viel Rauch und Tränen.
  
  Se avessi saputo che sarebbe stato un *funerale* così commovente, non avrei esagerato con le battute nelle settimane precedenti.
  Wenn ich gewusst hätte, dass es eine so rührende *Beerdigung* sein würde, hätte ich die Witze in den vorangegangenen Wochen nicht übertrieben.
  
  Dopo il *funerale*, la banda della polizia ha suonato una canzone doppia per onorare il proprietario del bar italiano che aveva aiutato molti durante la sua vita.
  Nach der *Beerdigung* spielte die Polizeikapelle ein doppeltes Lied, um den Besitzer der italienischen Bar zu ehren, der im Laufe seines Lebens vielen geholfen hatte.
