Rang: 4081
Wort: cantiere
Wortart: n.m
Wort mit Artikel: il cantiere
Femininum / Plural: cantieri
IPA: ''
Definition: die Baustelle, -n
Register: ''
Beispielsätze: |-
  Il *cantiere* edile è stato chiuso per mancanza di sicurezza.
  Die *Baustelle* wurde wegen mangelnder Sicherheit geschlossen.
  
  Mentre passavo, vidi operai che lavoravano al *cantiere*.
  Als ich vorbeiging, sah ich Arbeiter, die auf der *Baustelle* arbeiteten.
  
  Se avessi saputo che ci sarebbe stato un *cantiere*, avrei preso un’altra strada.
  Wenn ich gewusst hätte, dass es eine *Baustelle* geben würde, hätte ich eine andere Straße genommen.
  
  Il sindaco ha inaugurato ufficialmente il nuovo *cantiere* navale.
  Der Bürgermeister hat die neue *Werft* offiziell eingeweiht.
  
  Anche se il *cantiere* sembra caotico, lì dentro c’è molta organizzazione.
  Auch wenn die *Baustelle* chaotisch wirkt, herrscht dort drinnen viel Ordnung.
