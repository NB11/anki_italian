Rang: 4668
Wort: insensibile
Wortart: adj
Wort mit Artikel: insensibile
Femininum / Plural: ''
IPA: ''
Definition: gefühllos, gleichgültig
Register: ''
Beispielsätze: |-
  È *insensibile* alle critiche degli altri, non gli importa nulla.
  Er ist *gefühllos* gegenüber den Kritik der anderen, es ist ihm egal.
  
  Dopo l’incidente, il suo atteggiamento verso la vita è diventato *insensibile* al dolore.
  Nach dem Unfall wurde seine Einstellung gegenüber dem Leben *gleichgültig* gegenüber dem Schmerz.
  
  Mi sembra *insensibile* che tu non abbia reagito quando ha detto quelle brutte parole.
  Es erscheint mir *gefühllos*, dass du nicht reagiert hast, als er diese harten Worte sagte.
  
  È *insensibile* al freddo, non si veste mai abbastanza per l’inverno.
  Er ist *gefühllos* gegenüber der Kälte, er kleidet sich nie warm genug für den Winter.
  
  Non essere *insensibile* alle sofferenze degli animali, cerca di aiutare!
  Sei nicht *gefühllos* gegenüber dem Leiden der Tiere, versuche zu helfen!
