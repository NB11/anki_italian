Rang: 4265
Wort: ambizioso
Wortart: adj
Wort mit Artikel: ambizioso
Femininum / Plural: ''
IPA: ''
Definition: ehrgeizig, ambitionsvoll
Register: ''
Beispielsätze: |-
  Marco è un ragazzo *ambizioso* che vuole diventare medico entro vent'anni.
  Marco ist ein *ehrgeiziger* Junge, der in zwanzig Jahren Arzt werden will.
  
  La sua proposta era troppo *ambiziosa* per essere realizzabile in così poco tempo.
  Sein Vorschlag war zu *ambitioniert*, um in so kurzer Zeit realisierbar zu sein.
  
  Se fossi stato più *ambizioso*, avresti raggiunto i tuoi obiettivi molto prima.
  Wärst du *ehrgeiziger* gewesen, hättest du deine Ziele viel früher erreicht.
  
  Il progetto dell'architetto è risultato *ambizioso* ma troppo costoso per il comune.
  Das Projekt des Architekten erwies sich als *ambitioniert*, aber zu teuer für die Gemeinde.
  
  Nonostante le difficoltà, lei rimane una persona *ambiziosa* che non si arrende mai.
  Trotz der Schwierigkeiten bleibt sie eine *ehrgeizige* Person, die niemals aufgibt.
