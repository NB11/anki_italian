Rang: 503
Wort: calmare
Wortart: vt
Wort mit Artikel: calmare
Femininum / Plural: ''
IPA: ''
Definition: beruhigen, besänftigen
Register: ''
Beispielsätze: |-
  Il medico gli ha dato un farmaco per *calmare* il dolore.
  Der Arzt hat ihm ein Medikament gegeben, um den Schmerz zu *beruhigen*.
  
  Nonostante la situazione difficile, cerca di *calmare* gli animi nel gruppo.
  Trotz der schwierigen Situation versucht sie, die Gemüter in der Gruppe zu *besänftigen*.
  
  Se tu avessi *calmato* il cane prima, ora non abbaia più.
  Wenn du den Hund vorher *beruhigt* hättest, würde er jetzt nicht mehr bellen.
  
  Bisogna *calmare* le acque prima di prendere decisioni importanti.
  Man muss die Gemüter *beruhigen*, bevor man wichtige Entscheidungen trifft.
  
  Pensavo che urlare avrebbe aiutato, ma in realtà bisognava solo *calmare* le persone.
  Ich dachte, Schreien würde helfen, aber eigentlich musste man die Leute nur *beruhigen*.
