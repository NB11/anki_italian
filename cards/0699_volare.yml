Wort mit Artikel: volare
Femininum / Plural: ''
IPA: ''
Definition: fliegen
Register: ''
Beispielsätze: |-
  Mi piacerebbe *volare* sopra la città di notte per vedere tutte le luci accese.
  Ich würde gerne über die Stadt bei Nacht *fliegen*, um all die Lichter an zu sehen.
  
  Se non avessi paura dell’altezza, potrei *volare* con questo paracadute.
  Falls ich keine Höhenangst hätte, könnte ich mit diesem Fallschirm *fliegen*.
  
  Gli aerei moderni riescono a *volare* per ore senza fermarsi.
  Moderne Flugzeuge schaffen es, stundenlang ohne Pause zu *fliegen*.
  
  Quando ero bambino, sognavo sempre di *volare* come un uccello sopra il parco vicino a casa.
  Als Kind habe ich immer davon geträumt, wie ein Vogel über den Park *zu fliegen*, der bei uns in der Nähe war.
  
  Dicono che sia difficile *volare* quando il vento è troppo forte, ma molti piloti ci riescono comunque.
  Es heißt, dass es schwer ist zu *fliegen*, wenn der Wind zu stark ist, aber viele Piloten schaffen es trotzdem.
