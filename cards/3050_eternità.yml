Rang: 3050
Wort: eternità
Wortart: n.f
Wort mit Artikel: l'eternità
Femininum / Plural: eternità
IPA: ''
Definition: die Ewigkeit, Endlosigkeit
Register: ''
Beispielsätze: |-
  Il filosofo parlava dell’*eternità* come concetto che va oltre il tempo umano.
  Der Philosoph sprach von der *Ewigkeit* als einem Konzept, das über die menschliche Zeit hinausgeht.
  
  Dicono che l’*eternità* sia solo un’illusione temporanea.
  Man sagt, die *Ewigkeit* sei nur eine vorübergehende Illusion.
  
  Nessuno sa davvero cosa sia l’*eternità*, ma tutti vorrebbero scoprirlo.
  Niemand weiß wirklich, was die *Ewigkeit* ist, aber alle würden es gern herausfinden.
  
  L’*eternità* sembra sfuggirci ogni volta che cerchiamo di afferrarla.
  Die *Ewigkeit* entzieht sich uns jedes Mal, wenn wir versuchen, sie zu greifen.
  
  Credi che un giorno potremo vivere nell’*eternità* come nei film di fantascienza?
  Glaubst du, dass wir eines Tages wie in Science-Fiction-Filmen in der *Ewigkeit* leben können?
