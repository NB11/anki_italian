Rang: 1669
Wort: agitare
Wortart: v
Wort mit Artikel: agitare
Femininum / Plural: ''
IPA: ''
Definition: schütteln, rühren, aufregen
Register: ''
Beispielsätze: |-
  Il barista deve *agitare* bene il cocktail prima di servirlo.
  Der Barkeeper muss den Cocktail gut *schütteln*, bevor er ihn serviert.
  
  Non *agitare* il liquido nella bottiglia, altrimenti si rovescerà!
  Schüttle die Flüssigkeit nicht in der Flasche, sonst verschüttest du sie!
  
  Si consiglia di *agitare* il flacone prima dell’uso per mescolare bene i principi attivi.
  Es wird empfohlen, die Flasche vor der Anwendung zu *schütteln*, um die Wirkstoffe gut zu vermischen.
  
  L’autista del tram dovrà *agitare* i passeggeri affinché scendano alle prossime fermate.
  Der Straßenbahnfahrer müsste die Fahrgäste *aufregen*, damit sie an den nächsten Haltestellen aussteigen.
  
  Anche se non volevi, hai finito per *agitare* molto la situazione con le tue parole.
  Auch wenn du es nicht wolltest, hast du am Ende die Lage mit deinen Worten stark *aufgeregt*.
