Rang: 517
Wort: fretta
Wortart: n.f
Wort mit Artikel: la fretta
Femininum / Plural: frette
IPA: ''
Definition: die Eile
Register: ''
Beispielsätze: |-
  Non ho tempo da perdere, ho *fretta* per andare all'appuntamento.
  Ich habe keine Zeit zu verlieren, ich habe *Eile*, um zum Termin zu kommen.
  
  Se avessi *fretta*, prendi il treno direttamente senza fermarti in città.
  Wenn du *eilig* hättest, nimm direkt den Zug ohne in der Stadt anzuhalten.
  
  È meglio non guidare con *fretta*, perché aumenta il rischio di incidenti.
  Es ist besser, nicht in *Eile* zu fahren, denn das erhöht das Unfallrisiko.
  
  Ho fatto *fretta* per finire il rapporto prima della scadenza, ma ora ho molti errori da sistemare.
  Ich habe mich *beeilt*, um den Bericht vor der Frist zu beenden, doch jetzt muss ich viele Fehler korrigieren.
  
  Nonostante la *fretta*, lui ha deciso di aiutare il gruppo a trovare una soluzione semplice.
  Trotz der *Eile* hat er beschlossen, der Gruppe zu helfen, eine einfache Lösung zu finden.
