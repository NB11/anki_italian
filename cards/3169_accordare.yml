Rang: 3169
Wort: accordare
Wortart: vt
Wort mit Artikel: accordare
Femininum / Plural: ''
IPA: ''
Definition: gewähren, erteilen, zubilligen
Register: ''
Beispielsätze: |-
  Il governo *accorderà* un aiuto finanziario alle famiglie bisognose entro la fine dell'anno.
  Die Regierung wird den bedürftigen Familien eine finanzielle *Hilfe* bis zum Jahresende gewähren.
  
  Secondo la legge, il giudice può *accordare* la libertà provvisoria se non ci sono rischi di fuga.
  Laut Gesetz kann der Richter die vorläufige *Freiheit* zubilligen, wenn keine Fluchtgefahr besteht.
  
  Non appena avrò finito la pratica, ti *accorderò* il prestito che hai richiesto.
  Sobald ich die Unterlagen fertig habe, *erteile* ich dir den gewünschten Kredit gewähren.
  
  Il direttore ha deciso di *accordare* una proroga per la consegna del progetto.
  Der Direktor hat beschlossen, eine Fristverlängerung für die Abgabe des Projekts *gewähren*.
  
  Se dimostrerai di essere affidabile, ti *accorderò* piena fiducia in futuro.
  Wenn du dich als zuverlässig erweist, *erteile* ich dir in Zukunft volles Vertrauen gewähren.
