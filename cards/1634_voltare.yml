Rang: 1634
Wort: voltare
Wortart: v
Wort mit Artikel: voltare
Femininum / Plural: ''
IPA: ''
Definition: drehen, wenden, abbiegen
Register: ''
Beispielsätze: |-
  Devi *voltare* a destra al prossimo semaforo se vuoi andare al lago.
  Du musst nach rechts *abbiegen* an der nächsten Ampel, wenn du zum See fahren willst.
  
  Se non *voltiamo* presto, perderemo l'autobus che va a visitare il prete in quella chiesa lì.
  Wenn wir nicht *abbiegen* bald, verpassen wir den Bus, der den Priester in dieser Kirche besucht.
  
  Lui avrebbe già *voltato* per la strada principale se non si fosse perso nella crisi del traffico.
  Er wäre schon auf die Hauptstraße *abgebogen*, wenn er sich nicht im Verkehrschaos verlaufen hätte.
  
  Lei mi disse che non sapeva quale direzione prendere e dovette *voltare* più volte prima di trovare l'ingresso giusto.
  Sie sagte mir, dass sie nicht wusste, welche Richtung sie nehmen sollte, und *abbiegen* musste mehrere Male, bevor sie den richtigen Eingang fand.
  
  È imbarazzante *voltare* le spalle a qualcuno mentre recita una poesia, ma lui lo fece specialmente per attirare l'attenzione.
  Es ist peinlich, jemandem den Rücken zu *wenden*, während er ein Gedicht vorträgt, aber er tat es besonders, um Aufmerksamkeit zu erregen.
