Rang: 2259
Wort: croce
Wortart: n.f
Wort mit Artikel: la croce
Femininum / Plural: croci
IPA: ''
Definition: das Kreuz, -e
Register: ''
Beispielsätze: |-
  Ha messo una *croce* sul documento per firmarlo.
  Er hat ein *Kreuz* auf das Dokument gesetzt, um es zu unterschreiben.
  
  Nella chiesa c'è una bellissima *croce* d'oro.
  In der Kirche gibt es ein wunderschönes goldenes *Kreuz*.
  
  Dicono che quella *croce* porti sfortuna a chi la tocca.
  Sie sagen, dass dieses *Kreuz* Unglück bringt, wer es berührt.
  
  Aveva promesso di non mettere più nessuna *croce* sui suoi quadri.
  Er hatte versprochen, nie wieder ein *Kreuz* auf seine Bilder zu malen.
  
  La *croce* di ferro al collo era l'unico segno della sua fede.
  Das eiserne *Kreuz* am Hals war das einzige Zeichen seines Glaubens.
