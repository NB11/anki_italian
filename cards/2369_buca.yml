Rang: 2369
Wort: buca
Wortart: n.f
Wort mit Artikel: la buca
Femininum / Plural: buche
IPA: ''
Definition: das Loch, -öcher
Register: ''
Beispielsätze: |-
  Dopo la pioggia, *buca* per strada era piena d’acqua.
  Nach dem Regen war das *Loch* auf der Straße voller Wasser.
  
  Ho trovato una *buca* nel muro della mia stanza.
  Ich habe ein *Loch* in der Wand meines Zimmers gefunden.
  
  Se non stai attento, finirai in una *buca* mentre cammini nel bosco.
  Wenn du nicht aufpasst, landest du in einem *Loch*, während du im Wald läufst.
  
  La *buca* scavata dagli archeologi ha rivelato reperti antichi.
  Das von den Archäologen gegrabene *Loch* hat antike Funde freigelegt.
  
  Mentre scavava, ha scoperto una *buca* che portava a un tunnel segreto.
  Beim Graben entdeckte er ein *Loch*, das zu einem Geheimtunnel führte.
