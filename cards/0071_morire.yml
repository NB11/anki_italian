Wort mit Artikel: morire
Femininum / Plural: ''
IPA: ''
Definition: sterben
Register: ''
Beispielsätze: |-
  Non voglio *morire* senza aver realizzato i miei sogni.
  Ich will nicht *sterben*, ohne meine Träume verwirklicht zu haben.
  
  La vecchia casa è ormai sul punto di *morire* di vecchiaia.
  Das alte Haus steht kurz davor, *sterben* weil alt.
  
  Se non mangi, potresti *morire* di fame.
  Wenn du nicht isst, könntest du vor Hunger *sterben*.
  
  Tutti gli esseri viventi prima o poi devono *morire*.
  Alle Lebewesen müssen irgendwann *sterben*.
  
  Spero che tu non debba mai *morire* solo.
  Ich hoffe, dass du niemals allein *sterben* musst.
