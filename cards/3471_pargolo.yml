Rang: 3471
Wort: pargolo
Wortart: n.m
Wort mit Artikel: il pargolo
Femininum / Plural: pargoli
IPA: ''
Definition: das Kind, der Junge, das Baby
Register: ''
Beispielsätze: |-
  Ho visto *pargoli* che giocavano nel parco con tanta allegria.
  Ich habe *Kinder* gesehen, die fröhlich im Park spielten.
  
  Il *pargolo* di mio fratello ha solo due anni ma sa già contare fino a dieci.
  Der *Junge* meines Bruders ist erst zwei Jahre alt, kann aber schon bis zehn zählen.
  
  Nonostante la sua età, il nonno tratta ogni *pargolo* con una pazienza infinita.
  Trotz seines Alters behandelt der Großvater jedes *Kind* mit unendlicher Geduld.
  
  Il libro racconta la storia di un *pargolo* che scopre un mondo magico sotto il suo letto.
  Das Buch erzählt die Geschichte eines *Kindes*, das eine magische Welt unter seinem Bett entdeckt.
  
  Se avessi un *pargolo*, gli insegnerei l'importanza del rispetto per la natura.
  Wenn ich ein *Kind* hätte, würde ich ihm die Bedeutung des Respekts vor der Natur beibringen.
