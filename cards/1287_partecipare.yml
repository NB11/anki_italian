Rang: 1287
Wort: partecipare
Wortart: vi
Wort mit Artikel: partecipare
Femininum / Plural: ''
IPA: ''
Definition: teilnehmen, mitmachen
Register: ''
Beispielsätze: |-
  Vuoi *partecipare* alla gara di domani o preferisci guardare dal pubblico?
  Möchtest du am Rennen von morgen *teilnehmen* oder lieber vom Publikum aus zuschauen?
  
  Nonostante fosse ubriaco, Marco insisteva a *partecipare* alla discussione politica.
  Trotz seines Rausches bestand Marco darauf, sich an der politischen *Diskussion* zu beteiligen.
  
  La procura avrebbe dovuto *partecipare* all’incontro per chiarire la situazione.
  Die Staatsanwaltschaft hätte sich an dem Treffen *beteiligen* müssen, um die Lage zu klären.
  
  Se avessi più tempo libero, *parteciperei* volentieri a un corso di cucina per migliorare le mie abilità.
  Wenn ich mehr freie Zeit hätte, würde ich gerne an einem Kochkurs *teilnehmen*, um meine Fähigkeiten zu verbessern.
  
  Era talmente importante che l’agenzia volle *partecipare* personalmente all’organizzazione della nuova campagna pubblicitaria.
  Es war so bedeutsam, dass die Agentur unbedingt persönlich an der Organisation der neuen Werbe*kampagne* mitwirken wollte.
