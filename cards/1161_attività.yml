Rang: 1161
Wort: attività
Wortart: n.f
Wort mit Artikel: l'attività
Femininum / Plural: attività
IPA: ''
Definition: die Tätigkeit, die Aktivität, -en
Register: ''
Beispielsätze: |-
  Che *attività* ti piacerebbe fare nel tempo libero?
  Welche *Aktivitäten* möchtest du in deiner Freizeit machen?
  
  L'*attività* principale del nostro villaggio è l’agricoltura, ma stiamo cercando di diversificarci.
  Die *Hauptaktivität* unseres Dorfes ist die Landwirtschaft, aber wir versuchen, uns zu diversifizieren.
  
  Nonostante lo sbaglio, ha continuato la sua *attività* con grande determinazione.
  Trotz des Fehlers setzte er seine *Tätigkeit* mit großer Entschlossenheit fort.
  
  Se avessi più tempo, comincerei un’*attività* che ho sempre rimandato: imparare il pianoforte.
  Wenn ich mehr Zeit hätte, würde ich eine *Aktivität* beginnen, die ich immer aufgeschoben habe: Klavier lernen.
  
  È importante che tu scelga un’*attività* che ti appassioni davvero, altrimenti rinuncerai presto.
  Es ist wichtig, dass du eine *Aktivität* wählst, die dich wirklich begeistert, sonst gibst du bald auf.
