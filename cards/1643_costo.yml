Rang: 1643
Wort: costo
Wortart: n.m
Wort mit Artikel: il costo
Femininum / Plural: i costi
IPA: ''
Definition: die Kosten, die Kosten
Register: ''
Beispielsätze: |-
  Il *costo* di questa vacanza è molto alto, ma vale la pena.
  Die *Kosten* dieses Urlaubs sind sehr hoch, aber es lohnt sich.
  
  Nonostante i *costi* elevati, hanno deciso di acquistare la nuova versione dell’auto.
  Trotz der hohen *Kosten* haben sie sich für den Kauf der neuen Autoversion entschieden.
  
  Qual è il *costo* dell’abbonamento alla palestra?
  Was sind die *Kosten* für das Fitnessstudio-Abo?
  
  Se riduciamo i *costi*, potremo risparmiare abbastanza per la terapia.
  Wenn wir die *Kosten* senken, können wir genug für die Therapie sparen.
  
  Il *costo* totale dell’affitto è più basso di quanto pensassi.
  Die gesamten *Kosten* für die Miete sind niedriger, als ich dachte.
