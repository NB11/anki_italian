Rang: 4802
Wort: interpretazione
Wortart: n.f
Wort mit Artikel: la interpretazione
Femininum / Plural: interpretazioni
IPA: ''
Definition: die Interpretation, -en
Register: ''
Beispielsätze: |-
  La *interpretazione* di quel ruolo da parte dell’attore è stata straordinaria.
  Die *Interpretation* dieser Rolle durch den Schauspieler war außergewöhnlich.
  
  Non condivido la tua *interpretazione* di quei versi di Dante.
  Ich teile deine *Deutung* dieser Verse von Dante nicht.
  
  Secondo molti critici, la *interpretazione* più fedele di Amleto è quella di Branagh.
  Laut vielen Kritikern ist Branaghs *Aufführung* von Hamlet die treueste.
  
  Dopo secoli di studi, gli storici hanno ancora diverse *interpretazioni* dello stesso evento.
  Nach Jahrhunderten der Forschung haben Historiker noch immer verschiedene *Auslegungen* dieses Ereignisses.
  
  La *interpretazione* della legge da parte del giudice è stata molto discussa.
  Die *Auslegung* des Gesetzes durch den Richter wurde viel diskutiert.
