Rang: 625
Wort: solito
Wortart: n.m
Wort mit Artikel: il solito
Femininum / Plural: i soliti
IPA: ''
Definition: die Gewohnheit, üblich
Register: ''
Beispielsätze: |-
  *Il solito* è che arrivi tardi quando sei stanco.
  Die *Gewohnheit* ist, dass du spät ankommst, wenn du müde bist.
  
  Non sopporto più *i soliti* problemi di traffico in città.
  Ich ertrage die *üblichen* Verkehrsprobleme in der Stadt nicht mehr.
  
  Domani affronteremo di nuovo *il solito* argomento in classe, vero?
  Morgen werden wir in der Klasse wieder *das übliche* Thema besprechen, richtig?
  
  Non è *il solito* modo di fare alla fine di una lunga giornata.
  Das ist nicht die *Gewohnheit* am Ende eines langen Tages.
  
  Questa volta lascerai perdere *i soliti* discorsi e farai qualcosa di diverso?
  Diesmal lässt du die *üblichen* Diskussionen fallen und tust etwas anderes?
