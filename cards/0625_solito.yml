Rang: 625
Wort: solito
Wortart: n.m
Wort mit Artikel: il solito
Femininum / Plural: i soliti
IPA: ''
Definition: die Gewohnheit, Gewohnheiten
Register: ''
Beispielsätze: |-
  Al *solito* bar vicino a casa mia ci sono sempre molti clienti.
  In der *Gewohnheit* nahen Bar bei mir gibt es immer viele Kunden.
  
  Non posso credere che tu abbia perso il *solito* treno per Roma!
  Ich kann nicht glauben, dass du den *üblichen* Zug nach Rom verpasst hast!
  
  Ogni mattina il *solito* rumore del traffico mi sveglia prima del necessario.
  Jeden Morgen weckt mich das *gewöhnliche* Lärm des Verkehrs zu früh.
  
  Anche se è sabato, indosso il *solito* maglione rosso per non cambiare abitudini.
  Auch wenn es Samstag ist, trage ich den *üblichen* roten Pullover, um meine Gewohnheiten nicht zu ändern.
  
  Dopo tanti anni, il *solito* saluto del vicino è diventato un rituale quotidiano.
  Nach so vielen Jahren ist der *gewöhnliche* Gruß des Nachbarn zu einem täglichen Ritual geworden.
