Rang: 2174
Wort: deposito
Wortart: n.m
Wort mit Artikel: il deposito
Femininum / Plural: depositi
IPA: ''
Definition: die Anzahlung, die Kaution, der Lagerort, der Depot
Register: ''
Beispielsätze: |-
  Ho lasciato un *deposito* di 200 euro per prenotare l'appartamento.
  Ich habe eine *Anzahlung* von 200 Euro für die Wohnung hinterlassen.
  
  Il *deposito* bancario garantisce la sicurezza dei tuoi soldi.
  Das *Depot* bei der Bank sichert dein Geld.
  
  Dove hai messo il *deposito* delle bottiglie vuote? Lo ritrovo solo domani mattina.
  Wo hast du das *Lager* der leeren Flaschen hingetan? Ich finde es erst morgen früh wieder.
  
  Il *deposito* di una parte dello stipendio sul conto corrente è ormai classico per molti dipendenti.
  Die *Verbuchung* eines Teils des Gehalts auf das Girokonto ist für viele Angestellte mittlerweile üblich.
  
  Se non restituisci il libro in biblioteca entro una settimana, dovrai pagare una multa sul *deposito* che hai versato.
  Wenn du das Buch nicht innerhalb einer Woche in der Bibliothek zurückgibst, musst du eine Strafe auf die *Kaution* zahlen, die du hinterlegt hast.
