Rang: 1088
Wort: infermiere
Wortart: n.m./n.f.
Wort mit Artikel: l'infermiere
Femininum / Plural: gli infermieri / le infermiere
IPA: ''
Definition: der Krankenpfleger, - / die Krankenschwester, -n
Register: ''
Beispielsätze: |-
  L'*infermiere* ha controllato la pressione al paziente ogni ora.
  Der *Krankenpfleger* hat den Blutdruck des Patienten jede Stunde überprüft.
  
  Se avessi studiato medicina, oggi potrei essere un *infermiere* specializzato.
  Wenn ich Medizin studiert hätte, könnte ich heute ein *Krankenpfleger* mit Fachrichtung sein.
  
  La *infermiera* del reparto pediatrico è molto gentile con tutti i bambini.
  Die *Krankenschwester* auf der Kinderstation ist sehr nett zu allen Kindern.
  
  Anche se era stanco, l'*infermiere* non ha voluto mollare e ha finito il suo turno.
  Auch wenn er müde war, hat der *Krankenpfleger* nicht aufgeben wollen und hat seine Schicht beendet.
