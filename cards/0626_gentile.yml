Rang: 626
Wort: gentile
Wortart: adj
Wort mit Artikel: gentile
Femininum / Plural: ''
IPA: ''
Definition: höflich, freundlich
Register: ''
Beispielsätze: |-
  Il signor Rossi è sempre *gentile* con i suoi vicini.
  Herr Rossi ist immer *höflich* zu seinen Nachbarn.
  
  Sei stata molto *gentile* ad aiutarmi con i bagagli.
  Es war sehr *freundlich* von dir, mir mit dem Gepäck zu helfen.
  
  Non sempre le persone *gentili* ricevono il riconoscimento che meritano.
  Nicht immer erhalten *höfliche* Menschen die Anerkennung, die sie verdienen.
  
  Vorresti essere più *gentile* con tuo fratello?
  Wärst du bitte *freundlicher* zu deinem Bruder?
  
  Anche se era stanco, rimase *gentile* con tutti i clienti.
  Auch wenn er müde war, blieb er *freundlich* zu allen Kunden.
