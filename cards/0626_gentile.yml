Rang: 626
Wort: gentile
Wortart: adj
Wort mit Artikel: gentile
Femininum / Plural: ''
IPA: ''
Definition: freundlich, nett, liebenswürdig, höflich
Register: ''
Beispielsätze: |-
  Sei sempre stato così *gentile* con me, grazie di tutto!
  Du warst immer so *freundlich* zu mir, danke für alles!
  
  La signora al negozio ci ha rivolto un sorriso *gentile*.
  Die Verkäuferin hat uns ein *freundliches* Lächeln zugeworfen.
  
  Nonostante la situazione, ha mantenuto un tono *gentile* durante la conversazione.
  Trotz der Situation bewahrte er einen *freundlichen* Ton im Gespräch.
  
  Mi ha fatto un favore *gentile* senza che glielo chiedessi.
  Er hat mir einen *niedlichen* Gefallen getan, ohne dass ich ihn darum gebeten hätte.
  
  Se fossi stato più *gentile* con lei, non avrebbe reagito così male.
  Wärst du *nett* zu ihr gewesen, hätte sie nicht so schlecht reagiert.
