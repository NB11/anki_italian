Rang: 361
Wort: tizio
Wortart: n.m
Wort mit Artikel: il tizio
Femininum / Plural: i tizi
IPA: ''
Definition: der Typ, der Kerl
Register: ''
Beispielsätze: |-
  Quel *tizio* lì sembra simpatico.
  Dieser *Typ* da wirkt sympathisch.
  
  Chi è quel *tizio* che hai incontrato ieri?
  Wer ist dieser *Mann*, den du gestern getroffen hast?
  
  Questi *tizi* sono sempre in ritardo.
  Diese *Kerle* sind immer zu spät.
  
  Quel *tizio* di ieri ha chiamato di nuovo.
  Der *Fremde* von gestern hat schon wieder angerufen.
  
  Non fidarti di quel *tizio*, non mi sembra affidabile.
  Trau diesem *Typen* nicht, der wirkt nicht vertrauenswürdig.
