Rang: 3650
Wort: astronauta
Wortart: n.m
Wort mit Artikel: l'astronauta
Femininum / Plural: gli astronauti
IPA: ''
Definition: der Astronaut, -en
Register: ''
Beispielsätze: |-
  L'*astronauta* ha trascorso sei mesi nello spazio sulla Stazione Spaziale Internazionale.
  Der *Astronaut* hat sechs Monate im Weltraum auf der Internationalen Raumstation verbracht.
  
  Credi davvero che un *astronauta* possa vivere su Marte per un anno senza problemi?
  Glaubst du wirklich, dass ein *Astronaut* ein Jahr lang auf dem Mars ohne Probleme leben könnte?
  
  Se fossi un *astronauta*, porterei con me un manuale di riparazioni per ogni evenienza.
  Wenn ich ein *Astronaut* wäre, würde ich ein Reparaturhandbuch für jeden Fall mitnehmen.
  
  L'*astronauta* che ha partecipato all'inchiesta ha denunciato un problema di sicurezza nella navicella.
  Der *Astronaut*, der an der Ermittlung teilgenommen hat, hat ein Sicherheitsproblem in der Raumkapsel gemeldet.
  
  Gli *astronauti* provenienti da diversi paesi lavorano insieme nonostante le barriere linguistiche.
  Die *Astronauten*, die aus verschiedenen Ländern stammen, arbeiten trotz sprachlicher Barrieren zusammen.
