Rang: 3667
Wort: diminuire
Wortart: v
Wort mit Artikel: diminuire
Femininum / Plural: ''
IPA: ''
Definition: verringern, nachlassen, reduzieren
Register: ''
Beispielsätze: |-
  Dopo mesi di allenamento intenso, la sua stanchezza ha iniziato a *diminuire*.
  Nach Monaten intensiven Trainings begann seine Müdigkeit *nachzulassen*.
  
  Se *diminuisse* la pressione, il paziente starebbe meglio entro un'ora.
  Wenn der Druck *sinken würde*, würde es dem Patienten innerhalb einer Stunde besser gehen.
  
  Gli scienziati sostengono che il consumo di zuccheri ha la tendenza a *diminuire* con l'età.
  Wissenschaftler behaupten, der Zuckerkonsum hat die Tendenz, mit dem Alter *zu sinken*.
  
  Ho notato che il livello dell'acqua nel serbatoio ha *diminuito* rapidamente durante la notte.
  Ich habe bemerkt, dass der Wasserstand im Tank während der Nacht schnell *gesunken* ist.
  
  Nonostante le difficoltà, credi che la fiducia in te stesso possa *diminuire* mai completamente?
  Trotz aller Schwierigkeiten, glaubst du, dass das Vertrauen in dich selbst jemals völlig *verschwinden* kann?
