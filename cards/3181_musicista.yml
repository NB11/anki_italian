Rang: 3181
Wort: musicista
Wortart: n.f/m
Wort mit Artikel: il/la musicista
Femininum / Plural: musicisti/musiciste
IPA: ''
Definition: der Musiker, - / die Musikerin, -nen
Register: ''
Beispielsätze: |-
  Il *musicista* ha composto una canzone molto famosa l'anno scorso.
  Der *Musiker* hat letztes Jahr einen sehr bekannten Song komponiert.
  
  Spero che il *musicista* arrivi presto perché il concerto sta per iniziare.
  Ich hoffe, dass der *Musiker* bald ankommt, denn das Konzert beginnt gleich.
  
  Non sapevo che il tuo fratello maggiore fosse un *musicista* così talentuoso!
  Ich wusste nicht, dass dein älterer Bruder ein so *talentierter Musiker* ist!
  
  Se fossi un *musicista* famoso, girerei il mondo in tour.
  Wenn ich ein *berühmter Musiker* wäre, würde ich die Welt auf Tournee bereisen.
  
  Il *musicista* che ha suonato ieri sera alla festa era davvero straordinario.
  Der *Musiker*, der gestern Abend auf der Feier gespielt hat, war wirklich außergewöhnlich.
