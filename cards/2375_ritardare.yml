Rang: 2375
Wort: ritardare
Wortart: vi
Wort mit Artikel: ritardare
Femininum / Plural: ''
IPA: ''
Definition: sich verspäten, verzögern
Register: ''
Beispielsätze: |-
  Il treno è *ritardato* di venti minuti a causa della nebbia.
  Der Zug hat sich *verspätet* um zwanzig Minuten wegen des Nebels.
  
  Se non *ritardi* troppo, arriveremo prima delle otto.
  Wenn du dich nicht zu sehr *verzögerst*, kommen wir vor acht Uhr an.
  
  Era normale che il medico *ritardasse*, considerato l’affollamento dell’aula.
  Es war normal, dass der Arzt sich *verspätete*, angesichts der vollen Hörsaals.
  
  Abbiamo deciso di partire senza aspettare, perché *ritardare* avrebbe rovinato i nostri piani.
  Wir haben beschlossen ohne Wartezeit loszufahren, denn sich zu *verzögern* hätte unsere Pläne ruiniert.
  
  Mi dispiace, ma dovremo *ritardare*: sulla strada c’è stato un incidente che ha bloccato tutto il traffico.
  Es tut mir leid, aber wir werden uns *verspäten*: Auf der Straße gab es einen Unfall, der den gesamten Verkehr blockiert hat.
