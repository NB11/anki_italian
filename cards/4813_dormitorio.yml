Rang: 4813
Wort: dormitorio
Wortart: n.m
Wort mit Artikel: il dormitorio
Femininum / Plural: dormitori
IPA: ''
Definition: der Schlafsaal, -säle
Register: ''
Beispielsätze: |-
  Gli studenti condividono *dormitorio* con due compagni di stanza.
  Die Studenten teilen sich mit zwei Mitbewohnern das *Schlafzimmer*.
  
  Quest’anno il *dormitorio* universitario è in ristrutturazione, quindi abito a casa.
  Dieses Jahr steht das studentische *Schlafsaal* wegen Sanierung leer, deshalb wohne ich zu Hause.
  
  Se non trovi una stanza, potresti provare a chiedere al *dormitorio* della città.
  Falls du kein Zimmer findest, könntest du beim städtischen *Schlafsaal* nachfragen.
  
  Nonostante il *dormitorio* sia rumoroso, molti lo preferiscono per la socializzazione.
  Trotz des lauten *Schlafsaals* ziehen es viele aus Gründen der Geselligkeit vor.
  
  Il regolamento del *dormitorio* vieta feste notturne dopo le ventidue.
  Die Hausordnung des *Schlafsaals* verbietet nächtliche Partys nach 22 Uhr.
