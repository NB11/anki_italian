Rang: 4741
Wort: intimidire
Wortart: v
Wort mit Artikel: intimidire
Femininum / Plural: ''
IPA: ''
Definition: einschüchtern, unter Druck setzen
Register: ''
Beispielsätze: |-
  Il capo cerca sempre di *intimidire* i suoi impiegati con le sue urla.
  Der Chef versucht immer, seine Mitarbeiter durch seine Schreie zu *einschüchtern*.
  
  Se non lo avessi *intimidito* con i tuoi modi autoritari, forse avrebbe reagito diversamente.
  Hättest du ihn nicht durch deine autoritären Manieren *eingeschüchtert*, hätte er vielleicht anders reagiert.
  
  Non volevo *intimidire* nessuno, ma solo far valere le mie ragioni.
  Ich wollte niemanden *einschüchtern*, sondern nur meine Gründe geltend machen.
  
  È impressionante come riesca a *intimidire* anche le persone più sicure di sé.
  Es ist beeindruckend, wie es ihm gelingt, sogar selbstsichere Menschen zu *einschüchtern*.
  
  Nonostante i tentativi di *intimidirlo*, non ha mai ceduto alle minacce.
  Trotz aller Versuche, ihn zu *einschüchtern*, hat er sich nie den Drohungen gebeugt.
