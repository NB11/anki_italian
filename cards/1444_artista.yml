Rang: 1444
Wort: artista
Wortart: n.m/f
Wort mit Artikel: l'artista
Femininum / Plural: artisti
IPA: ''
Definition: der Künstler, - / die Künstlerin, -nen
Register: ''
Beispielsätze: |-
  L’*artista* ha dipinto un stupendo paesaggio in pochi minuti.
  Der *Künstler* hat eine wunderbare Landschaft in wenigen Minuten gemalt.
  
  Ho sentito dire che questo *artista* vive da stupendo in una villa con altezza di trenta metri.
  Ich habe gehört, dass dieser *Künstler* in einer Villa mit Höhe von dreißig Metern herrlich lebt.
  
  Se tu fossi un *artista*, quale ruolo preferiresti avere nel mondo del cinema?
  Wenn du ein *Künstler* wärst, welche Rolle würdest du lieber in der Filmbranche übernehmen?
  
  Nonostante il cambiamento climatico, molti *artisti* non smettono di lavorare dappertutto.
  Trotz des Klimawandels hören viele *Künstler* nicht auf, überall zu arbeiten.
  
  Il sindaco ha voluto rilasciare un complimento pubblico all’*artista* per il suo splendido contributo alla cultura cittadina.
  Der Bürgermeister wollte dem Künstler für seinen *großartigen* Beitrag zur Stadtkultur öffentlich Komplimente machen.
