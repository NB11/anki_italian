Rang: 3836
Wort: grattare
Wortart: v
Wort mit Artikel: grattare
Femininum / Plural: ''
IPA: ''
Definition: kratzen, abkratzen, abschaben
Register: ''
Beispielsätze: |-
  Se *gratti* troppo forte, la pelle si irrita.
  Wenn du zu stark *kratzt*, reizt du die Haut.
  
  Ho *grattato* via la vernice dal muro con una spatola.
  Ich habe die Farbe mit einem Spachtel von der Wand *abgekratzt*.
  
  Stasera, dopo cena, vorrei *grattare* un po’ di formaggio sopra la pasta.
  Heute Abend möchte ich nach dem Essen etwas Käse über die Pasta *reiben*.
  
  Il gatto continuava a *grattare* la porta perché voleva entrare.
  Die Katze kratzte weiterhin an der Tür, weil sie hineinwollte.
  
  Se non avessi *grattato* quel biglietto, non avrei saputo che era un indizio.
  Hätte ich den Zettel nicht *aufgekratzt*, hätte ich nicht gewusst, dass es ein Hinweis war.
