Rang: 273
Wort: occupare
Wortart: vt
Wort mit Artikel: occupare
Femininum / Plural: ''
IPA: ''
Definition: besetzen, beschäftigen
Register: ''
Beispielsätze: |-
  L'ufficio *occupa* tre piani dell'edificio.
  Das Büro *besetzt* drei Stockwerke des Gebäudes.
  
  Chi *ha occupato* il mio posto?
  Wer *hat* meinen Platz *besetzt*?
  
  Vorrei *occuparmi* di questo progetto.
  Ich würde mich gerne mit diesem Projekt *beschäftigen*.
  
  Se avessi tempo, *occuperei* quello spazio.
  Wenn ich Zeit hätte, *würde* ich den Raum *besetzen*.
  
  È importante che il governo *occupi* questo problema.
  Es ist wichtig, dass die Regierung dieses Problem *löst*.
