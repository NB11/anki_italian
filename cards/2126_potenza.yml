Rang: 2126
Wort: potenza
Wortart: n.f
Wort mit Artikel: la potenza
Femininum / Plural: potenze
IPA: ''
Definition: die Macht, Fähigkeit, -en
Register: ''
Beispielsätze: |-
  La *potenza* militare di questo paese è impressionante.
  Die *militärische Macht* dieses Landes ist beeindruckend.
  
  Non capisco la *potenza* di questo computer moderno.
  Ich verstehe nicht die *Leistung* dieses modernen Computers.
  
  Era necessario aumentare la *potenza* dei motori per vincere la gara.
  Es war nötig, die *Leistung* der Motoren zu steigern, um das Rennen zu gewinnen.
  
  La scienza studia la *potenza* delle forze naturali, come quella del vento.
  Die Wissenschaft untersucht die *Macht* natürlicher Kräfte, wie die des Windes.
  
  Anche se sembra fragile, la sua *potenza* interiore è straordinaria.
  Auch wenn sie zerbrechlich wirkt, ist ihre *innere Stärke* außergewöhnlich.
