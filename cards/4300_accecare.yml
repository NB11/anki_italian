Rang: 4300
Wort: accecare
Wortart: v
Wort mit Artikel: accecare
Femininum / Plural: ''
IPA: ''
Definition: blenden, erblinden lassen
Register: ''
Beispielsätze: |-
  La luce intensa del sole può *accecare* chi guarda direttamente.
  Das helle Sonnenlicht kann jemanden *blenden*, der direkt hinschaut.
  
  Dopo l’incidente, molti temevano che la vista potesse *accecare* il ferito.
  Nach dem Unfall fürchteten viele, dass die Sicht den Verletzten *erblinden* lassen könnte.
  
  Mi hanno detto che se fissi un laser direttamente, rischi di *accecarti*.
  Man hat mir gesagt, dass man, wenn man einen Laser direkt anschaut, riskiert, sich *die Augen zu blenden*.
  
  Il fumo acre del fuoco *accecò* tutti i presenti nella stanza.
  Der beißende Rauch des Feuers *ließ* alle Anwesenden in dem Raum erblinden.
  
  Si dice che il potere assoluto possa *accecare* anche le persone più oneste.
  Man sagt, dass absolute Macht selbst die ehrlichsten Menschen *blenden* kann.
