Rang: 4193
Wort: abile
Wortart: adj
Wort mit Artikel: abile
Femininum / Plural: ''
IPA: ''
Definition: geschickt, kompetent, fähig
Register: ''
Beispielsätze: |-
  L'ispettore è risultato *abile* nell'individuare la frode finanziaria.
  Der Inspektor war *fähig*, den Finanzbetrug zu ermitteln.
  
  Se fossi *abile* come lui, risolverei il problema in un attimo.
  Wenn ich so *kompetent* wie er wäre, würde ich das Problem sofort lösen.
  
  È importante formare operai *abili* che sappiano usare le macchine moderne.
  Es ist wichtig, *geschickte* Arbeiter auszubilden, die moderne Maschinen bedienen können.
  
  Il pittore ha dimostrato di essere *abile* nel catturare la luce nei suoi quadri.
  Der Maler hat *bewiesen*, dass er die Lichtführung in seinen Gemälden beherrscht.
  
  Gli investigatori hanno trovato un uomo *abile* nei travestimenti.
  Die Ermittler fanden einen Mann, der sich in *Verstellungen* als geschickt erwies.
