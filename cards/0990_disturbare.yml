Rang: 990
Wort: disturbare
Wortart: vt
Wort mit Artikel: disturbare
Femininum / Plural: ''
IPA: ''
Definition: stören, unterbrechen, belästigen
Register: ''
Beispielsätze: |-
  Mi dispiace, non volevo *disturbarti* mentre studiavi.
  Es tut mir leid, ich wollte dich nicht beim Lernen *stören*.
  
  Il rumore dei vicini sta per *disturbare* tutti gli ospiti dell’albergo.
  Der Lärm der Nachbarn wird allen Gästen des Hotels bald *zusetzen*.
  
  Se *disturbi* il gatto quando dorme, reagirà con rabbia e potrebbe graffiarti.
  Wenn du die *Katze* beim Schlafen belästigst, wird sie wütend reagieren und dich vielleicht kratzen.
  
  Non appena avrò finito di registrare questo episodio, non vorrei che qualcuno mi *disturbasse*.
  Sobald ich diese *Folge* aufgenommen habe, möchte ich nicht, dass mich jemand unterbricht.
  
  Per favore, aspetta un attimo: non posso *disturbare* il testimone proprio ora che sta testimoniando.
  Bitte warte einen Moment: Ich kann den *Zeugen* jetzt nicht stören, wo er gerade aussagt.
