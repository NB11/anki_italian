Rang: 1915
Wort: lacrima
Wortart: n.f
Wort mit Artikel: la lacrima
Femininum / Plural: lacrime
IPA: ''
Definition: die Träne, -n
Register: ''
Beispielsätze: |-
  Dopo aver letto quella notizia triste, *lacrima* mi è scesa lungo la guancia.
  Nach dem Lesen dieser traurigen Nachricht ist mir eine *Träne* die Wange hinuntergelaufen.
  
  Nonostante la *lacrima* che le rigava il volto, riuscì a mantenere la calma durante l'interrogatorio.
  Trotz der *Träne*, die ihr über das Gesicht lief, blieb sie während der Befragung ruhig.
  
  Avrei voluto trattenere ogni *lacrima*, ma non ci riuscii di fronte a tanta emozione.
  Ich hätte jede *Träne* zurückhalten wollen, aber angesichts so viel Emotion konnte ich es nicht.
  
  Se avessi saputo che avrebbe versato una *lacrima*, non avrei fatto quella domanda così diretta.
  Wenn ich gewusst hätte, dass sie eine *Träne* vergießen würde, hätte ich diese so direkte Frage nicht gestellt.
  
  Nel romanzo, la protagonista piange così tanto che non riesco a contare tutte le *lacrime*.
  In dem Roman weint die Protagonistin so sehr, dass ich alle *Tränen* nicht zählen kann.
