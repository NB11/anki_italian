Definition: der Bluterguss, -e
Register: ''
Beispielsätze: |-
  Dopo la *livido* sulla gamba, non riesco più a camminare correttamente.
  Nach dem *Bluterguss* am Bein kann ich nicht mehr richtig laufen.
  
  Si è formata una *livido* enorme dopo la caduta dallo skateboard.
  Es hat sich ein riesiger *Bluterguss* nach dem Sturz vom Skateboard gebildet.
  
  Il medico ha detto che la *livido* sparirà tra qualche settimana.
  Der Arzt hat gesagt, dass der *Bluterguss* in einigen Wochen verschwinden wird.
  
  Nonostante la *livido* dolorosa, il pugile ha continuato a combattere.
  Trotz des schmerzhaften *Blutergusses* hat der Boxer weitergekämpft.
  
  Le *livide* sul viso dell’informatore erano visibili anche da lontano.
  Die *Blutergüsse* im Gesicht des Informanten waren sogar aus der Ferne sichtbar.
