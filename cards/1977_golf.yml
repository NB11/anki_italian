Beispielsätze: |-
  Domani andrò a giocare a *golf* con i miei amici.
  Morgen werde ich mit meinen Freunden *Golf* spielen.
  
  Nel *golf* è fondamentale mantenere la calma sotto pressione.
  Beim *Golf* ist es entscheidend, unter Druck ruhig zu bleiben.
  
  Ho comprato un nuovo set di mazze da *golf* perché quelle vecchie erano consumate.
  Ich habe mir einen neuen Satz Golfschläger gekauft, weil die alten abgenutzt waren.
  
  Se avessi più tempo libero, mi piacerebbe imparare a giocare a *golf*.
  Wenn ich mehr Freizeit hätte, würde ich gerne *Golf* lernen.
  
  Nonostante la pioggia, abbiamo deciso di continuare la partita di *golf*.
