Beispielsätze: |-
  Lo *nazista* fuggì in America dopo la guerra, dove visse in anonymat per decenni.
  Der *Nazi* floh nach Amerika nach dem Krieg, wo er jahrzehntelang in Anonymität lebte.
  
  Un documentario ha intervistato un ex *nazista* che ora vive in Argentina.
  Eine Dokumentation hat einen ehemaligen *Nazi* interviewt, der jetzt in Argentinien lebt.
  
  Chiunque collabori con un *nazista* oggi commette un reato politico grave.
  Wer heute mit einem *Nazi* zusammenarbeitet, begeht ein schweres politisches Delikt.
  
  I simboli *nazisti* sono ancora vietati in molti paesi europei.
  *Nazistische* Symbole sind in vielen europäischen Ländern noch immer verboten.
  
  Non sapeva che suo nonno fosse stato un *nazista*: lo ha scoperto solo dopo la sua morte.
  Er wusste nicht, dass sein Großvater ein *Nazi* gewesen war – er erfuhr es erst nach dessen Tod.
