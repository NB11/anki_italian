Rang: 2301
Wort: intervenire
Wortart: vi
Wort mit Artikel: intervenire
Femininum / Plural: ''
IPA: ''
Definition: eingreifen, einschreiten
Register: ''
Beispielsätze: |-
  Se non *intervieni* ora, la situazione peggiorerà ancora di più.
  Wenn du jetzt nicht *eingreifst*, wird sich die Situation noch weiter verschlimmern.
  
  Il sindaco ha promesso di *intervenire* per risolvere il problema dei rifiuti tossici.
  Der Bürgermeister hat versprochen, *einzugreifen*, um das Problem der Giftmüllentsorgung zu lösen.
  
  Quando ho visto che qualcuno rubava la borsa, ho deciso di *intervenire*.
  Als ich sah, dass jemand die Handtasche stahl, beschloss ich zu *einschreiten*.
  
  Spero che la polizia *intervenga* prima che sia troppo tardi.
  Ich hoffe, die Polizei *greift ein*, bevor es zu spät ist.
  
  Dopo la lite, sarebbe utile che qualcuno *intervenisse* per calmare gli animi.
  Nach dem Streit wäre es hilfreich, wenn jemand *eingreifen* würde, um die Gemüter zu beruhigen.
