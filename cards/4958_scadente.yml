Rang: 4958
Wort: scadente
Wortart: adj
Wort mit Artikel: scadente
Femininum / Plural: ''
IPA: ''
Definition: minderwertig, schlecht, ungenießbar
Register: ''
Beispielsätze: |-
  La qualità di questo prodotto è davvero *scadente* e non tornerei a comprarlo.
  Die Qualität dieses Produkts ist wirklich *minderwertig* und ich würde es nie wieder kaufen.
  
  Nonostante le critiche, ha trovato il film *scadente* ma divertente.
  Trotz der Kritik fand er den Film zwar *schlecht*, aber unterhaltsam.
  
  Questa carne sembra *scadente*, meglio non mangiarla.
  Dieses Fleisch sieht *ungenießbar* aus, besser isst man es nicht.
  
  Hanno servito un gelato così *scadente* che ho dovuto buttarlo via.
  Sie haben ein so *schlechtes* Eis serviert, dass ich es wegwerfen musste.
  
  Secondo lui, la sua prestazione è stata *scadente*, ma gli altri lo lodano.
  Seiner Meinung nach war seine Leistung *minderwertig*, aber die anderen loben ihn.
