Rang: 632
Wort: ovviamente
Wortart: adv
Wort mit Artikel: ovviamente
Femininum / Plural: ''
IPA: ''
Definition: offensichtlich, klarerweise
Register: ''
Beispielsätze: |-
  Dato che sei stato preparato bene, *ovviamente* passerai l'esame senza problemi.
  Da du gut vorbereitet bist, wirst du die Prüfung *offensichtlich* mit Leichtigkeit bestehen.
  
  Non so perché hai dubitato di me, *ovviamente* ho ragione come sempre!
  Ich weiß nicht, warum du an mir gezweifelt hast, *klarerweise* habe ich wie immer recht!
  
  Se conti fino a dieci e non trovi l'errore, *ovviamente* non lo cercherai con impegno.
  Wenn du bis zehn zählst und den Fehler nicht findest, wirst du dich *offensichtlich* nicht richtig anstrengen.
  
  Hai perso i contatti con zio Marco, ma *ovviamente* lui non si ricorda più di te, ormai siete completamente estranei.
  Du hast den Kontakt zu Onkel Marco verloren, aber *klarerweise* erinnert er sich nicht mehr an dich – mittlerweile seid ihr völlig Fremde.
  
  Dopo che hai trascurato la tua relazione per mesi, *ovviamente* lei si è stancata e vuole parlare di futuro.
  Nachdem du deine Beziehung monatelang vernachlässigt hast, hat *offensichtlich* sie genug und will über die Zukunft sprechen.
