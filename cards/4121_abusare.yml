Rang: 4121
Wort: abusare
Wortart: v
Wort mit Artikel: abusare
Femininum / Plural: ''
IPA: ''
Definition: missbrauchen, überbeanspruchen
Register: ''
Beispielsätze: |-
  Non dovresti *abusare* della tua fiducia nei confronti degli altri.
  Du solltest das Vertrauen *misbrauchen* nicht.
  
  Dicono che abbia *abusato* dei suoi poteri per anni senza che nessuno se ne accorgesse.
  Er hat seine Macht offenbar jahrelang *missbraucht*, ohne dass es jemand bemerkte.
  
  Se continuerai a *abusare* delle medicine, rischi di rovinarti il fegato.
  Wenn du die Medikamente weiterhin *überbeanspruchst*, riskierst du, deine Leber zu ruinieren.
  
  Non è giusto che *abusi* della gentilezza di tuo fratello così spesso!
  Es ist nicht fair, dass du die Freundlichkeit *missbrauchst* deines Bruders ständig so oft missbrauchst!
  
  Ha giurato di non *abusare* mai più della pazienza del suo migliore amico.
  Er schwor, nie wieder die Geduld *zu missbrauchen* seines besten Freundes.
Audio: ''
Notiz: ''
Dispersion: ''
