Rang: 1776
Wort: orso
Wortart: n.m
Wort mit Artikel: l'orso
Femininum / Plural: orsi
IPA: ''
Definition: der Bär, -en
Register: ''
Beispielsätze: |-
  L'*orso* bruno vive nelle foreste dell'Europa settentrionale.
  Der *Bär* lebt in den Wäldern Nord-europas.
  
  Se hai visto un *orso* nel giardino, chiama immediatamente la polizia.
  Wenn du einen *Bär* im Garten gesehen hast, ruf sofort die Polizei an.
  
  Mi piacerebbe vedere un *orso* polare dal vivo, ma non ne ho mai avuto il coraggio.
  Ich würde gerne einen *Bär* in freier Wildbahn sehen, habe aber nie den Mut dazu gehabt.
  
  Gli *orsi* sono animali intelligenti, ma non bisogna mai sottovalutarli.
  Die *Bären* sind intelligente Tiere, aber man sollte sie nie unterschätzen.
  
  Dopo aver visitato lo zoo, il bambino voleva un peluche a forma di *orso* per Natale.
  Nach dem Zoobesuch wünschte sich das Kind einen *Bären*-Plüsch zum Weihnachtsfest.
