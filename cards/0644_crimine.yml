Rang: 644
Wort: crimine
Wortart: n.m
Wort mit Artikel: il crimine
Femininum / Plural: crimini
IPA: ''
Definition: das Verbrechen, die Straftat, -en
Register: ''
Beispielsätze: |-
  L’ispettore sta indagando su un *crimine* avvenuto nella zona industriale della città.
  Der Inspector untersucht ein *Verbrechen*, das sich in der Industriezone der Stadt ereignet hat.
  
  Penso che sia stato commesso un *crimine* simile anche l’anno scorso, ma non sono sicuro.
  Ich glaube, dass damals ein *Verbrechen* derselben Art verübt wurde, aber ich bin mir nicht sicher.
  
  Se scoprirai chi ha commesso questo *crimine*, riceverai una ricompensa di diecimila euro.
  Falls du herausfindest, wer dieses *Verbrechen* begangen hat, bekommst du eine Belohnung von zehntausend Euro.
  
  Nonostante le prove, il giudice ha dichiarato che il *crimine* non è stato dimostrato.
  Trotz der Beweise erklärte der Richter, dass das *Verbrechen* nicht nachgewiesen wurde.
  
  Magari potessimo prevenire ogni *crimine* prima che accada, ma purtroppo non è possibile.
  Wenn wir doch jedes *Verbrechen* verhindern könnten, bevor es passiert – aber leider ist das nicht möglich.
