Rang: 2823
Wort: menzogna
Wortart: n.f
Wort mit Artikel: la menzogna
Femininum / Plural: menzogne
IPA: ''
Definition: die Lüge, -n
Register: ''
Beispielsätze: |-
  È importante dire la verità e non raccontare *menzogne* ai bambini.
  Es ist wichtig, die Wahrheit zu sagen und den Kindern *Lügen* nicht zu erzählen.
  
  Non credo a quella *menzogna*, sembra troppo assurda per essere vera.
  Ich glaube dieser *Lüge* nicht, sie kommt mir zu absurd vor, um wahr zu sein.
  
  La *menzogna* che hai inventato per scusarti non mi ha convinto minimamente.
  Die *Lüge*, die du dir ausgedacht hast, um dich zu entschuldigen, hat mich keineswegs überzeugt.
  
  Spero che questa volta non ti inventerai una *menzogna* per giustificarti di nuovo.
  Ich hoffe, dass du dir dieses Mal keine *Lüge* ausdenkst, um dich wieder zu rechtfertigen.
  
  Se scopro che mi hai detto una *menzogna*, la nostra amicizia finirà subito.
  Wenn ich herausfinde, dass du mir eine *Lüge* erzählt hast, endet unsere Freundschaft sofort.
