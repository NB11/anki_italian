Rang: 1998
Wort: appendere
Wortart: vt
Wort mit Artikel: appendere
Femininum / Plural: ''
IPA: ''
Definition: hängen, aufhängen
Register: ''
Beispielsätze: |-
  Domani devo *appendere* i quadri nuovi in salotto.
  Morgen muss ich die neuen Bilder im Wohnzimmer *aufhängen*.
  
  Ha *appeso* il cappotto nell'armadio perché era bagnato.
  Er hat den Mantel im Schrank *aufgehängt*, weil er nass war.
  
  Non sapevo dove *appendere* la giacca, così l'ho lasciata sul divano.
  Ich wusste nicht, wo ich die Jacke *aufhängen* sollte, also habe ich sie auf dem Sofa liegen lassen.
  
  Se tu *appendessi* le tende, la stanza sembrerebbe più accogliente.
  Wenn du die Vorhänge *aufhängst*, würde der Raum gemütlicher wirken.
  
  Mi raccomando di *appendere* il prosciutto in un luogo fresco e asciutto.
  Ich empfehle dir dringend, den Schinken an einem kühlen und trockenen Ort *aufzuhängen*.
