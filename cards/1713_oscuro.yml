Rang: 1713
Wort: oscuro
Wortart: adj
Wort mit Artikel: oscuro
Femininum / Plural: ''
IPA: ''
Definition: dunkel, finster
Register: ''
Beispielsätze: |-
  Ho comprato una lampada per rendere la stanza *oscura* meno deprimente.
  Ich habe eine Lampe gekauft, um den *dunklen* Raum weniger deprimierend zu machen.
  
  Nonostante il cielo *oscuro*, siamo partiti per il viaggio in macchina.
  Trotz des *dunklen* Himmels sind wir zur Autofahrt aufgebrochen.
  
  Spero che tu non abbia scelto un *oscuro* angolo per appendere quel quadro.
  Ich hoffe, du hast nicht eine *düstere* Ecke für die Aufhängung dieses Bildes gewählt.
  
  Era un *oscuro* segreto che solo i nostri nonni conoscevano.
  Es war ein *dunkles* Geheimnis, das nur unsere Großeltern kannten.
  
  Se avessi saputo quanto sarebbe stata *oscura* la stanza senza luce, avrei portato una candela.
  Wenn ich gewusst hätte, wie *dunkel* der Raum ohne Licht sein würde, hätte ich eine Kerze mitgenommen.
