Rang: 3559
Wort: decesso
Wortart: n.m
Wort mit Artikel: il decesso
Femininum / Plural: decessi
IPA: ''
Definition: der Tod, -e
Register: ''
Beispielsätze: |-
  Il *decesso* improvviso del signor Rossi ha sconvolto tutta la famiglia.
  Der *Tod* plötzlich des Herrn Rossi hat die ganze Familie erschüttert.
  
  Dopo il *decesso* del nonno, abbiamo ereditato la casa al mare.
  Nach dem *Tod* des Großvaters haben wir das Haus am Meer geerbt.
  
  Nonostante le cure, il *decesso* del paziente è avvenuto dopo due giorni.
  Trotz der Behandlung ist der *Tod* des Patienten nach zwei Tagen eingetreten.
  
  Hanno annunciato il *decesso* del noto scrittore durante la conferenza stampa.
  Sie haben den *Tod* des bekannten Schriftstellers während der Pressekonferenz bekannt gegeben.
  
  Il *decesso* della regina è stato un evento di portata storica per il paese.
  Der *Tod* der Königin war ein Ereignis von historischer Tragweite für das Land.
