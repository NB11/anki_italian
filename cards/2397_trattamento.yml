Rang: 2397
Wort: trattamento
Wortart: n.m
Wort mit Artikel: il trattamento
Femininum / Plural: trattamenti
IPA: ''
Definition: die Behandlung, -en
Register: ''
Beispielsätze: |-
  Il medico ha deciso di iniziare un *trattamento* specifico per la sua malattia.
  Der Arzt hat beschlossen, eine *Behandlung* für ihre Krankheit zu beginnen.
  
  Dopo due settimane di *trattamento*, le sue condizioni sono migliorate notevolmente.
  Nach zwei Wochen *Behandlung* haben sich ihre Bedingungen deutlich verbessert.
  
  Se avessi seguito il *trattamento* fino alla fine, ora non avresti più problemi.
  Wenn du die *Behandlung* bis zum Ende befolgt hättest, hättest du jetzt keine Probleme mehr.
  
  Penso che un *trattamento* alternativo potrebbe dare risultati migliori.
  Ich glaube, eine alternative *Behandlung* könnte bessere Ergebnisse liefern.
  
  Il protocollo prevede un *trattamento* che dura almeno tre mesi.
  Das Protokoll sieht eine *Behandlung* vor, die mindestens drei Monate dauert.
