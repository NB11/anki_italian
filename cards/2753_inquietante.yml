Rang: 2753
Wort: inquietante
Wortart: adj
Wort mit Artikel: inquietante
Femininum / Plural: inquietanti
IPA: ''
Definition: beunruhigend, alarmierend, unheimlich
Register: ''
Beispielsätze: |-
  Il film che abbiamo visto ieri sera aveva una scena *inquietante* che mi ha dato i brividi.
  Der Film, den wir gestern Abend gesehen haben, hatte eine *beunruhigende* Szene, die mir eine Gänsehaut bereitete.
  
  Non capisco perché tu trovi così *inquietante* la sua richiesta di aiuto.
  Ich verstehe nicht, warum du seine Bitte um Hilfe so *alarmierend* findest.
  
  Ha ricevuto una notizia *inquietante* riguardo al progetto che stiamo seguendo.
  Er hat eine *beunruhigende* Nachricht über das Projekt erhalten, das wir gerade verfolgen.
  
  È normale che tu ti senta così *inquietante* dopo quello che è successo alla festa?
  Ist es normal, dass du dich nach dem, was auf der Party passiert ist, so *unheimlich* fühlst?
  
  La polizia sta cercando di capire se dietro il suo comportamento c’è una ragione *inquietante*.
  Die Polizei versucht herauszufinden, ob hinter seinem Verhalten ein *beunruhigender* Grund steckt.
