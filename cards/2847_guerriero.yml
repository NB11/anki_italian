Rang: 2847
Wort: guerriero
Wortart: n.m
Wort mit Artikel: il guerriero
Femininum / Plural: guerrieri
IPA: ''
Definition: der Krieger, -
Register: ''
Beispielsätze: |-
  Il *guerriero* nella leggenda era noto per il suo coraggio e la sua astuzia.
  Der *Krieger* in der Legende war für seinen Mut und seine Schlauheit bekannt.
  
  Quella tribù era stata fondata da un antico *guerriero* che aveva unito molte famiglie.
  Dieser Stamm war von einem alten *Krieger* gegründet worden, der viele Familien vereinigt hatte.
  
  Se fossi nato in un'altra epoca, sarei diventato un *guerriero* per difendere il mio popolo.
  Wäre ich in einer anderen Epoche geboren worden, hätte ich ein *Krieger* werden können, um mein Volk zu verteidigen.
  
  I *guerrieri* di quella città combattevano sempre all'alba vicino al fiume.
  Die *Krieger* dieser Stadt kämpften immer bei Tagesanbruch am Fluss.
  
  Il museo espone una spada che apparteneva a un *guerriero* sconosciuto ma leggendario.
  Das Museum zeigt ein Schwert, das einem unbekannten, aber legendären *Krieger* gehörte.
