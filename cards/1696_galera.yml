Rang: 1696
Wort: galera
Wortart: n.f
Wort mit Artikel: la galera
Femininum / Plural: galere
IPA: ''
Definition: das Gefängnis, -se
Register: ''
Beispielsätze: |-
  Quel *galera* è stato chiuso molti anni fa, ma la gente ne parla ancora.
  Jenes *Gefängnis* wurde vor vielen Jahren geschlossen, aber die Leute reden noch immer darüber.
  
  Se non dai retta a tuo padre, finiresti di nuovo in *galera* per ubriachezza.
  Wenn du nicht auf deinen Vater hörst, würdest du wieder *im Gefängnis* landen wegen Trunkenheit.
  
  Lo stesso senatore ha proposto una legge per migliorare le condizioni nelle *galere* italiane.
  Der *gleiche* Senator hat ein Gesetz vorgeschlagen, um die Zustände in den italienischen Gefängnissen zu verbessern.
  
  Dopo che lo hanno arrestato, l’ho visto solo una volta, quando era in *galera* a Roma.
  Nachdem sie ihn *verhaftet hatten*, habe ich ihn nur einmal gesehen, als er im Gefängnis in Rom war.
  
  Dicono che ci sia un mucchio di persone che vogliono evadere da quella *galera* vicino al mare.
  Man sagt, es gebe eine Menge Leute, die aus jenem *Gefängnis* nahe dem Meer fliehen wollen.
