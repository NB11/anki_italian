Rang: 4354
Wort: rotolare
Wortart: v
Wort mit Artikel: rotolare
Femininum / Plural: ''
IPA: ''
Definition: rollen, wälzen
Register: ''
Beispielsätze: |-
  Il cane ama *rotolarsi* nell'erba fresca dopo la passeggiata.
  Der Hund liebt es sich *im* frischen Gras zu wälzen.
  
  Se non avessi frenato in tempo, la valigia avrebbe continuato a *rotolare* giù per la scalinata.
  Hätte ich nicht rechtzeitig gebremst, hätte der Koffer weiter die Treppe *hinuntergerollt*.
  
  Mentre preparavo la cena, ho sentito che qualcosa *rotolava* sotto il mobile della cucina.
  Während ich das Abendessen vorbereitete, hörte ich, wie etwas unter dem Küchenschrank *rollte*.
  
  Secondo il reportage del reporter, la palla di neve cominciò a *rotolare* sempre più veloce verso il villaggio.
  Laut dem Bericht des *Reporters* begann der Schneeball immer schneller ins Dorf hinunterzurollen.
  
  Nonostante le previsioni di un crollo imminente, la moneta continuò a *rotolare* inaspettatamente verso l'alto.
  Trotz der Prognose eines bevorstehenden *Einsturzes* stieg die Währung unerwartet weiter an.
