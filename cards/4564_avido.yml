Rang: 4564
Wort: avido
Wortart: adj
Wort mit Artikel: avido
Femininum / Plural: ''
IPA: ''
Definition: gierig, habgierig, gefräßig
Register: ''
Beispielsätze: |-
  Era così *avido* che non condivideva mai il cibo con nessuno.
  Er war so *gierig*, dass er das Essen nie mit jemandem teilte.
  
  Dopo la vincita, si comportò in modo estremamente *avido* e pretese la metà di tutto.
  Nach dem Gewinn verhielt er sich extrem *habgierig* und beanspruchte die Hälfte von allem.
  
  Avrei preferito un amico meno *avido* per questa collaborazione.
  Ich hätte mir einen weniger *gierigen* Freund für diese Zusammenarbeit gewünscht.
  
  Nonostante avesse milioni, rimaneva *avido* e continuava a rubare piccole cose.
  Obwohl er Millionen besaß, blieb er *gefräßig* und stahl weiterhin kleine Dinge.
  
  Se fossi stato *avido* come lui, non avrei esitato a sfruttare la situazione a mio favore.
  Wäre ich so *gierig* wie er gewesen, hätte ich die Situation nicht gezögert zu meinem Vorteil ausgenutzt.
