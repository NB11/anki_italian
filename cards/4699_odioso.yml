Rang: 4699
Wort: odioso
Wortart: adj
Wort mit Artikel: odioso
Femininum / Plural: ''
IPA: ''
Definition: hasserfüllt, verhasst
Register: ''
Beispielsätze: |-
  È così *odioso* che nessuno vuole più parlargli.
  Er ist so *verhasst*, dass niemand mehr mit ihm sprechen will.
  
  Mi sembra *odioso* il modo in cui tratta i colleghi.
  Mir kommt seine Art, die Kollegen zu behandeln, *hasserfüllt* vor.
  
  Sarebbe stato *odioso* da parte mia non aiutarti quando ne avevo la possibilità.
  Es wäre *hasserfüllt* von mir gewesen, dir nicht zu helfen, als ich die Möglichkeit dazu hatte.
  
  Tutti sanno che il suo comportamento è *odioso*, ma nessuno lo dice in faccia.
  Alle wissen, dass sein Verhalten *hasserfüllt* ist, aber es sagt es ihm niemand ins Gesicht.
  
  Se fossi in te, eviterei un uomo così *odioso* in futuro.
  An deiner Stelle würde ich einen so *verhassten* Mann in Zukunft meiden.
