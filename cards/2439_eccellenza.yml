Rang: 2439
Wort: eccellenza
Wortart: n.f
Wort mit Artikel: l'eccellenza
Femininum / Plural: eccellenze
IPA: ''
Definition: die Exzellenz
Register: ''
Beispielsätze: |-
  L'*eccellenza* del vino italiano è riconosciuta in tutto il mondo.
  Die *Exzellenz* des italienischen Weins ist weltweit anerkannt.
  
  Il professore ha ricevuto un premio di *eccellenza* per le sue ricerche.
  Der Professor hat einen *Exzellenza*-Preis für seine Forschungen erhalten.
  
  Era sua abitudine cercare sempre l'*eccellenza* in ogni progetto che intraprendeva.
  Es war seine Gewohnheit, stets nach *Exzellenz* in jedem Projekt zu streben, das er begann.
  
  La giuria ha decretato che questo ristorante è un vero simbolo di *eccellenza* culinaria.
  Die Jury hat beschlossen, dass dieses Restaurant ein echtes Symbol *kulinarischer Exzellenz* ist.
  
  Nonostante lo scetticismo, alla fine tutti dovettero ammettere la sua *eccellenza*.
  Trotz des Skeptizismus mussten am Ende alle seine *Exzellenz* anerkennen.
