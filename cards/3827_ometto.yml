Rang: 3827
Wort: ometto
Wortart: n.m
Wort mit Artikel: il ometto
Femininum / Plural: ometi
IPA: ''
Definition: der Zwerg, -e
Register: ''
Beispielsätze: |-
  Il nonno ride sempre quando vede *l'ometto* del paese che cammina con passo sicuro.
  Der Opa lacht immer, wenn er den *Zwerg* aus dem Dorf sieht, der selbstsicher geht.
  
  Mi hanno raccontato che in Giappone ci sono ancora alcuni *ometi* che praticano arti marziali.
  Man hat mir erzählt, dass es in Japan noch einige *Zwerge* gibt, die Kampfsport betreiben.
  
  Nonostante sia un *ometto*, riesce a raggiungere gli scaffali più alti senza bisogno di scale.
  Obwohl er nur ein *Zwerg* ist, kommt er an die obersten Regale, ohne eine Leiter zu brauchen.
  
  L'*ometto* che hai visto ieri al mercato vendeva delle figurine rare che collezionavo da anni.
  Der *Zwerg*, den du gestern auf dem Markt gesehen hast, verkaufte seltene Figuren, die ich seit Jahren sammle.
  
  Se avessi un *ometto* come vicino di casa, mi aiuterebbe a spostare i mobili pesanti senza problemi.
  Wenn ich einen *Zwerg* als Nachbarn hätte, würde er mir ohne Probleme helfen, schwere Möbel zu verrücken.
