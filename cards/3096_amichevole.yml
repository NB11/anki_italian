Definition: freundlich, offen
Register: ''
Beispielsätze: |-
  Il nuovo vicino ha un atteggiamento *amichevole* che mi ha subito messo a mio agio.
  Der neue Nachbar hat eine *freundliche* Art, die mich sofort wohlfühlen ließ.
  
  Se non fossi così *amichevole* con tutti, forse non avresti così tanti amici.
  Wenn du nicht so *freundlich* zu allen wärst, hättest du vielleicht nicht so viele Freunde.
  
  Nonostante il tono formale, il suo sorriso risultava *amichevole* e accogliente.
  Trotz des formellen Tons wirkte sein Lächeln *freundlich* und einladend.
  
  Spero che il vostro rapporto resti *amichevole* anche dopo questa discussione.
  Ich hoffe, dass eure Beziehung auch nach dieser Diskussion *freundlich* bleibt.
  
  Era così *amichevole* da ricordarmi un irlandese che ho conosciuto in June al campus universitario.
  Er war so *freundlich*, dass er mich an einen Iren erinnerte, den ich im Juni auf dem Universitätscampus kennengelernt hatte.
