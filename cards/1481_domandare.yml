Rang: 1481
Wort: domandare
Wortart: vt
Wort mit Artikel: domandare
Femininum / Plural: ''
IPA: ''
Definition: fragen, nachfragen, bitten
Register: ''
Beispielsätze: |-
  Vorrei *domandare* se puoi aiutarmi con i compiti di matematica.
  Ich möchte *fragen*, ob du mir mit den Matheaufgaben helfen kannst.
  
  Il giornalista ha *domandato* al calciatore responsabile dell’incidente se si sente in colpa.
  Der Journalist hat den für den Unfall *verantwortlichen* Spieler gefragt, ob er sich schuldig fühlt.
  
  Non sapevo come *domandare* al cameriere dove si trova il bagno più vicino.
  Ich wusste nicht, wie ich den Kellner *fragen* sollte, wo die nächste Toilette ist.
  
  Se avessi il coraggio, gli *domanderei* direttamente cosa nasconde dietro quel sorriso falso.
  Wenn ich den Mut hätte, würde ich ihn direkt *fragen*, was er hinter diesem falschen Lächeln verbirgt.
  
  L’insegnante *domandò* alla classe quale fosse la loro opinione sul problema sociale più recente.
  Der Lehrer *fragte* die Klasse, was ihre Meinung zum aktuellsten sozialen Problem sei.
