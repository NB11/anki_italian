Rang: 4464
Wort: sconoscere
Wortart: v
Wort mit Artikel: sconoscere
Femininum / Plural: ''
IPA: ''
Definition: nicht kennen, unbekannt sein
Register: ''
Beispielsätze: |-
  Non *sconosco* nemmeno il nome di quella persona, figurati qualcosa di più.
  Ich kenne nicht einmal den Namen dieser Person, geschweige denn etwas anderes.
  
  Se *sconoscessi* la verità, ti avvertirei senza esitazione.
  Wenn ich die Wahrheit *kenne*, würde ich dich ohne Zögern warnen.
  
  Non mi capacito che tu *sconosca* la differenza tra generosità e egoismo.
  Ich begreife nicht, dass du den Unterschied zwischen Großzügigkeit und Egoismus *nicht kennst*.
  
  Avrei voluto *sconoscere* per sempre quella decisione sbagliata che ho preso.
  Ich hätte diese falsche Entscheidung für immer *unbekannt bleiben lassen* wollen.
  
  Si dice che molti *sconoscano* i propri limiti finché non è troppo tardi.
  Man sagt, viele *kennen* ihre eigenen Grenzen erst, wenn es zu spät ist.
Audio: ''
Notiz: ''
Dispersion: ''
