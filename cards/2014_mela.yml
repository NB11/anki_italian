Rang: 2014
Wort: mela
Wortart: n.f
Wort mit Artikel: la mela
Femininum / Plural: mele
IPA: ''
Definition: der Apfel, -äpfel
Register: ''
Beispielsätze: |-
  Ho comprato *mela* e banana al mercato stamattina.
  Ich habe *Apfel* und Banane auf dem Markt gekauft.
  
  Non è una *mela* normale, ma una varietà rara che ho trovato solo in montagna.
  Es ist kein normaler *Apfel*, sondern eine seltene Sorte, die ich nur im Gebirge gefunden habe.
  
  Se avessi *mela* più dolce, preparerei una torta deliziosa oggi.
  Wenn ich einen süßeren *Apfel* hätte, würde ich heute einen köstlichen Kuchen backen.
  
  Mi hai detto che preferisci la *mela* cotta a quella cruda?
  Du hast mir gesagt, dass du den gekochten *Apfel* dem rohen vorziehst?
  
  Credo che questa ricetta richieda almeno due *mela*, altrimenti non viene bene.
  Ich glaube, dieses Rezept erfordert mindestens zwei *Äpfel*, sonst gelingt es nicht.
