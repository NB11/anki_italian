Rang: 3113
Wort: dipinto
Wortart: n.m
Wort mit Artikel: il dipinto
Femininum / Plural: dipinti
IPA: ''
Definition: das Gemälde, -e
Register: ''
Beispielsätze: |-
  Questo *dipinto* di Caravaggio è considerato uno dei più importanti del Seicento.
  Dieses *Gemälde* von Caravaggio gilt als eines der wichtigsten des 17. Jahrhunderts.
  
  Nel museo ci sono tanti *dipinti* che raffigurano scene mitologiche.
  In dem Museum gibt es viele *Gemälde*, die mythologische Szenen darstellen.
  
  Se avessi più tempo, vorrei imparare a riconoscere i diversi stili dei *dipinti* rinascimentali.
  Wenn ich mehr Zeit hätte, würde ich lernen, die verschiedenen Stile der Renaissance-*Gemälde* zu erkennen.
  
  Nonostante sia un *dipinto* moderno, molti visitatori lo trovano incomprensibile.
  Obwohl es ein modernes *Gemälde* ist, finden es viele Besucher unverständlich.
  
  È proprio vero che l’autore di questo *dipinto* non ha mai firmato nessuna delle sue opere?
  Stimmt es wirklich, dass der Autor dieses *Gemäldes* nie eines seiner Werke unterschrieben hat?
