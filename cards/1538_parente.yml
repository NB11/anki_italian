Rang: 1538
Wort: parente
Wortart: n.m
Wort mit Artikel: il parente
Femininum / Plural: parenti
IPA: ''
Definition: der Verwandte, -n
Register: ''
Beispielsätze: |-
  Mio *parente* abita in una grande città vicino al mare.
  Mein *Verwandter* lebt in einer großen Stadt in der Nähe des Meeres.
  
  Non vedo i miei *parenti* da molto tempo, ma li sento spesso al telefono.
  Ich sehe meine *Verwandten* zwar nicht oft, aber ich telefoniere oft mit ihnen.
  
  Se avessi tempo, andrei a trovare questo *parente* che abita all'estero.
  Wenn ich Zeit hätte, würde ich diesen *Verwandten* im Ausland besuchen.
  
  Credo che sia importante mantenere i contatti con i *parenti* più stretti.
  Ich glaube, es ist wichtig, Kontakt zu den engsten *Verwandten* zu halten.
  
  Il *parente* che ho incontrato ieri mi ha raccontato tante cose interessanti sulla scienza e sulla sua professione.
  Der *Verwandte*, den ich gestern getroffen habe, hat mir viele interessante Dinge über die Wissenschaft und seinen Beruf erzählt.
