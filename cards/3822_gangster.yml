Beispielsätze: |-
  Il *gangster* è stato arrestato dalla polizia dopo una lunga caccia all'uomo.
  Der *Gangster* wurde von der Polizei nach einer langen Fahndung verhaftet.
  
  Dicono che questo *gangster* avesse molti nascondigli sparsi per la città.
  Man sagt, dieser *Gangster* habe viele Verstecke in der ganzen Stadt gehabt.
  
  Se fossi un *gangster*, preferirei svendere le armi piuttosto che usarle.
  Wenn ich ein *Gangster* wäre, würde ich die Waffen lieber verschleudern als sie zu benutzen.
  
  Anche se il *gangster* era astuto, alla fine è stato scoperto grazie a una soffiata anonima.
  Auch wenn der *Gangster* schlau war, wurde er am Ende durch einen anonymen Tipp entlarvt.
  
  Il film che ho visto ieri parlava di un *gangster* che voleva riabilitarsi dopo una vita di crimini.
  Der Film, den ich gestern gesehen habe, handelte von einem *Gangster*, der sich nach einem Leben voller Verbrechen rehabilitieren wollte.
