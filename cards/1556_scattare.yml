Rang: 1556
Wort: scattare
Wortart: vt
Wort mit Artikel: scattare
Femininum / Plural: ''
IPA: ''
Definition: auslösen, fotografieren
Register: ''
Beispielsätze: |-
  Il fotografo ha deciso di *scattare* una foto al tramonto per la sua nuova campagna pubblicitaria.
  Der *Fotograf* beschloss, ein Foto beim Sonnenuntergang für seine neue Werbekampagne aufzunehmen.
  
  Dopo aver esaminato la scena del crimine, lo sbirro riuscì a *scattare* alcune foto rilevanti per l’indagine.
  Nachdem er die Tatort-Szene *untersucht* hatte, konnte der Bulle einige relevante Fotos für die Ermittlungen aufnehmen.
  
  Se avessi la macchina fotografica, *scatterei* subito una foto al topo che si nasconde sotto il tavolo.
  Wenn ich eine Kamera hätte, würde ich sofort ein Foto von der *Maus* machen, die sich unter dem Tisch versteckt.
  
  Nonostante la pioggia, il giornalista continuò a *scattare* foto degli eventi per la sua inchiesta sul costume sociale.
  Trotz des Regens *machte* der Journalist weiterhin Fotos der Ereignisse für seine Reportage über gesellschaftliche Haltung.
  
  Prima di spedire la carter, assicurati di *scattare* una foto di ogni documento che inserisci al suo interno.
  Bevor du die *Tasche* abschickst, mache sicher ein Foto von jedem Dokument, das du einfügst.
