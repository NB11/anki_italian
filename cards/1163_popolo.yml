Rang: 1163
Wort: popolo
Wortart: n.m
Wort mit Artikel: il popolo
Femininum / Plural: popoli
IPA: ''
Definition: das Volk, -¨er
Register: ''
Beispielsätze: |-
  Il *popolo* italiano ha una lunga tradizione culinaria che si tramanda da generazioni.
  Das *Volk* der Italiener hat eine lange kulinarische Tradition, die über Generationen weitergegeben wird.
  
  Se non *popoli* la stanza vuota, chiamiamo un taxi per andare al villaggio vicino.
  Wenn du den leeren Raum nicht *bevölkerst*, rufen wir ein Taxi, um zum nahen Dorf zu fahren.
  
  Secondo il contratto ufficiale, il *popolo* ha il diritto di esprimere la propria opinione.
  Laut dem offiziellen Vertrag hat das *Volk* das Recht, seine Meinung zu äußern.
  
  Dicono che il *popolo* di questa città sia molto ospitale, ma io non ho ancora avuto occasione di osservarlo da vicino.
  Man sagt, das *Volk* dieser Stadt sei sehr gastfreundlich, aber ich hatte noch keine Gelegenheit, es näher zu betrachten.
  
  Quando il *popolo* si unì per sostenere la giustizia, riuscì a ottenere ciò che desiderava.
  Als sich das *Volk* vereinte, um die Gerechtigkeit zu tragen, gelang es ihm, zu bekommen, was es wollte.
