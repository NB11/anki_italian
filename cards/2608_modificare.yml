Rang: 2608
Wort: modificare
Wortart: v
Wort mit Artikel: modificare
Femininum / Plural: ''
IPA: ''
Definition: ändern, abwandeln, modifizieren
Register: ''
Beispielsätze: |-
  Il governo *modifica* spesso le leggi per adattarle alle nuove esigenze della società.
  Die Regierung ändert oft die Gesetze, um sie an die neuen Bedürfnisse der Gesellschaft *anzupassen*.
  
  Se tu *modifichi* il progetto, ricordati di aggiornare anche il preventivo.
  Wenn du das Projekt *abänderst*, vergiss nicht, auch die Kostenvoranschlag zu aktualisieren.
  
  Il direttore ha *modificato* il piano di lavoro perché c’erano troppe imprevisti.
  Der Manager hat den Arbeitsplan *abgewandelt*, weil es zu viele unvorhergesehene Ereignisse gab.
  
  Vorrei che tu *modificassi* il tuo atteggiamento nei confronti di questa situazione.
  Ich wünschte, du *ändertest* deine Haltung gegenüber dieser Situation.
  
  Nonostante le proteste, hanno *modificato* il regolamento senza il consenso della maggioranza.
  Trotz der Proteste haben sie die Vorschriften *abgeändert*, ohne die Zustimmung der Mehrheit.
