Rang: 2347
Wort: erica
Wortart: n.m
Wort mit Artikel: l'erica
Femininum / Plural: eriche
IPA: ''
Definition: das Heidekraut, Heidekräuter
Register: ''
Beispielsätze: |-
  L’*erica* fiorisce nei prati in autunno.
  Das *Heidekraut* blüht im Herbst auf den Wiesen.
  
  Ho visto un campo pieno di *eriche* viola durante la nostra escursione.
  Ich habe während unseres Ausflugs ein Feld voller violetter *Heidekräuter* gesehen.
  
  Se avessi più tempo, vorrei imparare a coltivare l’*erica* nel mio giardino.
  Wenn ich mehr Zeit hätte, würde ich gerne lernen, *Heidekraut* in meinem Garten anzubauen.
  
  È necessario proteggere le *eriche* che crescono nelle riserve naturali.
  Es ist nötig, die *Heidekräuter*, die in Naturschutzgebieten wachsen, zu schützen.
  
  Dicono che l’*erica* possa sopravvivere anche nei terreni più poveri di nutrienti.
  Man sagt, dass *Heidekraut* sogar in nährstoffärmsten Böden überleben kann.
