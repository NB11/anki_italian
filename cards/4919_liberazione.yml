Rang: 4919
Wort: liberazione
Wortart: n.f
Wort mit Artikel: la liberazione
Femininum / Plural: liberazioni
IPA: ''
Definition: die Befreiung, die Freilassung
Register: ''
Beispielsätze: |-
  La *liberazione* dei prigionieri è avvenuta senza spargimento di sangue.
  Die *Befreiung* der Gefangenen ist ohne Blutvergießen erfolgt.
  
  Molti celebrano l'anniversario della *liberazione* del paese.
  Viele feiern den Jahrestag der *Befreiung* des Landes.
  
  Dopo la guerra, la città ha vissuto un periodo di *liberazione* e rinascita.
  Nach dem Krieg erlebte die Stadt eine Zeit der *Befreiung* und Wiedergeburt.
  
  La *liberazione* degli animali dallo zoo ha suscitato grande emozione.
  Die *Freilassung* der Tiere aus dem Zoo hat große Emotionen ausgelöst.
  
  Nonostante le difficoltà, la *liberazione* è arrivata più presto del previsto.
  Trotz der Schwierigkeiten kam die *Befreiung* früher als erwartet.
