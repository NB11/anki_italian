Rang: 2344
Wort: piazzare
Wortart: vt
Wort mit Artikel: piazzare
Femininum / Plural: ''
IPA: ''
Definition: platzieren, aufstellen, unterbringen
Register: ''
Beispielsätze: |-
  Devi *piazzare* il divano vicino alla finestra per avere più luce.
  Du musst das Sofa *platzieren* nahe am Fenster, um mehr Licht zu haben.
  
  Ha *piazzato* la sua candidatura per il posto di lavoro senza rifletterci abbastanza.
  Er hat seine Bewerbung für die Stelle *untergebracht*, ohne genug nachzudenken.
  
  Se avessi tempo, *piazzerei* questi libri nella libreria nuova.
  Wenn ich Zeit hätte, würde ich diese Bücher im neuen Regal *aufstellen*.
  
  Il direttore vuole *piazzare* te in un ruolo di responsabilità domani mattina.
  Der Direktor will dich morgen früh in eine verantwortungsvolle Rolle *platzieren*.
  
  Nonostante la confusione, lei riuscì a *piazzare* tutti i documenti nei giusti cartella prima della scadenza.
  Trotz der Verwirrung schaffte sie es, alle Dokumente in die richtigen *Ordner* zu unterbringen vor Ablauf der Frist.
