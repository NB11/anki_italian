Rang: 1316
Wort: fallire
Wortart: vi
Wort mit Artikel: fallire
Femininum / Plural: ''
IPA: ''
Definition: misslingen, scheitern
Register: ''
Beispielsätze: |-
  Ultimamente molti progetti *falliscono* prima ancora di cominciare.
  In letzter Zeit *scheitern* viele Projekte schon bevor sie beginnen.
  
  Se non studierai abbastanza, *fallirai* l’esame di maturità.
  Wenn du nicht genug lernst, wirst du die Abiturprüfung *nicht bestehen*.
  
  Pensavo che il suo progetto fosse solido, ma *è fallito* dopo pochi mesi!
  Ich dachte, sein Projekt sei solide, aber es *ist nach wenigen Monaten gescheitert*.
  
  Nonostante l’impegno, il negozio ha *fallito* a causa della concorrenza sleale.
  Trotz aller Mühe *ist* das Geschäft wegen unfairem Wettbewerb bankrottgegangen.
  
  Dicono che *fallire* sia l’unica maniera per imparare qualcosa di nuovo.
  Man sagt, *zu scheitern* sei der einzige Weg, um etwas Neues zu lernen.
