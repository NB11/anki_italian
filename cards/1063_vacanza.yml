Rang: 1063
Wort: vacanza
Wortart: n.f
Wort mit Artikel: la vacanza
Femininum / Plural: vacanze
IPA: ''
Definition: der Urlaub, -e
Register: ''
Beispielsätze: |-
  Quest'anno andrò in *vacanza* con la mia famiglia in Sicilia.
  Dieses Jahr werde ich mit meiner Familie in den *Urlaub* nach Sizilien fahren.
  
  Dopo *vacanze* così lunghe, abbiamo bisogno di riposarci un po'.
  Nach so langen *Ferien* brauchen wir etwas Erholung.
  
  Spero che la tua *vacanza* a Berlino sia stata fantastica!
  Ich hoffe, dass dein *Urlaub* in Berlin toll war!
  
  Se avessi più tempo, prenoterei una *vacanza* al mare.
  Wenn ich mehr Zeit hätte, würde ich einen *Urlaub* am Meer buchen.
  
  La *vacanza* che mi hai consigliato era perfetta per ricaricare le energie.
  Der *Urlaub*, den du mir empfohlen hast, war perfekt, um Energie zu tanken.
