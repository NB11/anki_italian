Rang: 1186
Wort: socio
Wortart: n.m
Wort mit Artikel: il socio
Femininum / Plural: soci
IPA: ''
Definition: das Mitglied, -er
Register: ''
Beispielsätze: |-
  Il *socio* del club ha organizzato una raccolta fondi per finanziare l’area ricreativa dei bambini.
  Das *Mitglied* des Clubs hat eine Spendenaktion organisiert, um das Spielbereich der Kinder zu finanzieren.
  
  Chissà quante responsabilità avrà ogni *socio* di questa associazione così grande!
  Wer weiß, wie viele *Verantwortungen* jedes Mitglied dieser so großen Organisation haben wird!
  
  Dopo che il parlamento ha approvato la nuova legge, ogni *socio* dovrà sostenere le modifiche.
  Nachdem das Parlament das neue Gesetz verabschiedet hat, muss jedes *Mitglied* die Änderungen unterstützen.
  
  Se fossi un *socio* di una serie famosa, imparerei a giudicare le situazioni con più attenzione.
  Wenn ich ein *Mitglied* einer berühmten Serie wäre, würde ich lernen, Situationen mit mehr Aufmerksamkeit zu beurteilen.
  
  L’ospite ha osservato che, attraverso le attività di questa associazione, ogni *socio* può lasciare un’impronta positiva.
  Der Gast hat beobachtet, dass durch die Aktivitäten dieses Vereins jedes *Mitglied* eine positive Spur hinterlassen kann.
