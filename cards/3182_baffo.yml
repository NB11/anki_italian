Rang: 3182
Wort: baffo
Wortart: n.m
Wort mit Artikel: il baffo
Femininum / Plural: baffi
IPA: ''
Definition: der Schnurrbart, -bärte
Register: ''
Beispielsätze: |-
  Il gatto ha perso un *baffo* durante la lotta con il cane.
  Die Katze hat sich einen *Schnurrbart* während des Kampfes mit dem Hund verloren.
  
  Nonostante i *baffi* folti, il nonno aveva una risata molto dolce.
  Trotz seines dichten *Schnurrbartes* hatte der Großvater ein sehr sanftes Lachen.
  
  L'uomo con i *baffi* neri è entrato nella stanza senza bussare.
  Der Mann mit dem schwarzen *Schnurrbart* ist ohne anzuklopfen ins Zimmer gekommen.
  
  Devi tagliare i tuoi *baffi*: sembri un musicista rock degli anni '80!
  Du musst deinen *Schnurrbart* schneiden: Du siehst aus wie ein Rockmusiker der 80er!
  
  Era così affascinante che aveva perfino i *baffi* perfettamente in ordine.
  Er war so charmant, dass er sogar seinen *Schnurrbart* perfekt in Ordnung hatte.
