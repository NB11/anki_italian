Rang: 1291
Wort: gridare
Wortart: v
Wort mit Artikel: gridare
Femininum / Plural: ''
IPA: ''
Definition: schreien, rufen
Register: ''
Beispielsätze: |-
  Quando hai *gridato* così forte, tutti si sono voltati a guardarti.
  Als du so laut *geschrien* hast, haben sich alle zu dir umgedreht.
  
  Non vorrei *gridare* in un luogo pubblico, sarebbe sconveniente.
  Ich möchte nicht in der Öffentlichkeit *schreien*, das wäre unangemessen.
  
  Il bambino ha iniziato a *gridare* non appena ha visto il cane spaventoso che lo inseguiva.
  Das Kind begann zu *schreien*, sobald es den erschreckenden Hund sah, der es verfolgte.
  
  Se avessimo chiamato un premio più alto, forse non avrebbero *gridato* tanto per essere ascoltati.
  Hätten wir einen höheren *Preis* ausgesetzt, hätten sie vielleicht nicht so laut geschrien, um gehört zu werden.
  
  Appena il cameriere ci ha detto che il ristorante era chiuso, mio fratello ha cominciato a *gridare* contro il proprietario, ma poi si è calmato quando ha capito che era una situazione temporanea.
  Sobald der *Kellner* uns sagte, dass das Restaurant geschlossen war, begann mein Bruder, gegen den Besitzer zu schreien, beruhigte sich aber, als er verstand, dass es nur vorübergehend war.
