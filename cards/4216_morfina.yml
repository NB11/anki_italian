Rang: 4216
Wort: morfina
Wortart: n.m
Wort mit Artikel: la morfina
Femininum / Plural: le morfine
IPA: ''
Definition: das Morphin, -
Register: ''
Beispielsätze: |-
  Il medico ha deciso di somministrare *morfina* al paziente per alleviare il dolore intenso.
  Der Arzt hat entschieden, *Morphin* dem Patienten zu verabreichen, um die starken Schmerzen zu lindern.
  
  Nella clinica *morfina* viene utilizzata con cautela controllandone sempre il dosaggio.
  In der Klinik wird *Morphin* vorsichtig eingesetzt, wobei die Dosierung immer kontrolliert wird.
  
  Se avverti un dolore insopportabile, il medico potrebbe prescriverti *morfina*.
  Wenn du einen unerträglichen Schmerz verspürst, könnte der Arzt dir *Morphin* verschreiben.
  
  L’uso prolungato di *morfina* può causare dipendenza e altri effetti collaterali.
  Der langfristige Gebrauch von *Morphin* kann Abhängigkeit und andere Nebenwirkungen verursachen.
  
  Gli infermieri hanno spiegato che *morfina* deve essere somministrata solo in casi estremi.
  Die Pfleger haben erklärt, dass *Morphin* nur in extremen Fällen verabreicht werden darf.
