Rang: 1704
Wort: lunedì
Wortart: n.m
Wort mit Artikel: il lunedì
Femininum / Plural: i lunedì
IPA: ''
Definition: der Montag, -e
Register: ''
Beispielsätze: |-
  Domani *lunedì* devo andare dal dentista alle otto.
  Morgen *Montag* muss ich um acht zum Zahnarzt gehen.
  
  Se *lunedì* non piove, faremo una gita al fiume.
  Wenn es am *Montag* nicht regnet, machen wir einen Ausflug zum Fluss.
  
  Avresti dovuto ricordarti che *lunedì* c’era l’esame!
  Du hättest dich daran erinnern müssen, dass am *Montag* die Prüfung war!
  
  Ho prenotato il tavolo per *lunedì* sera in quella pista nuova al centro.
  Ich habe den Tisch für *Montag* Abend in dieser neuen Bahn im Zentrum reserviert.
  
  Nonostante fosse *lunedì*, il locale era affollato di colleghi che festeggiavano la vittoria del fine settimana.
  Obwohl es *Montag* war, war das Lokal voll mit Kollegen, die den Sieg vom Wochenende feierten.
