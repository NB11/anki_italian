Femininum / Plural: gli attacchi
IPA: ''
Definition: der Angriff, -¨e, der Anschlag, der Überfall
Register: ''
Beispielsätze: |-
  Dopo l'*attacco* terroristico, la polizia ha chiuso il centro città intorno al luogo dell'evento.
  Nach dem *Anschlag* hat die Polizei die Innenstadt um den Ort des Geschehens gesperrt.
  
  Il medico ha detto che questi continui *attacchi* di tosse sono necessari per diagnosticare la malattia.
  Der Arzt hat gesagt, dass diese fortwährenden *Hustenanfälle* für die Diagnose notwendig sind.
  
  Nonostante l'*attacco* a sorpresa della squadra avversaria, i nostri giocatori sono riusciti a vincere la partita grazie a una grande decisione del loro allenatore.
  Trotz des überraschenden *Angriffs* der gegnerischen Mannschaft haben unsere Spieler das Spiel dank einer wichtigen Entscheidung ihres Trainers gewinnen können.
  
  La polizia sta indagando su un possibile *attacco* avvenuto ieri notte in un negozio vicino alla stazione.
  Die Polizei ermittelt zu einem möglichen *Überfall*, der gestern Nacht in einem Geschäft nahe dem Bahnhof stattfand.
  
  Se vuoi evitare un altro *attacco* di fame prima del pranzo, dovresti mangiare qualcosa di dolce come un regalo di compleanno.
  Wenn du einen weiteren *Hungeranfall* vor dem Mittagessen vermeiden willst, solltest du etwas Süßes wie ein Geburtstagsgeschenk essen.
