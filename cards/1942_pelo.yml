Rang: 1942
Wort: pelo
Wortart: n.m
Wort mit Artikel: il pelo
Femininum / Plural: peli
IPA: ''
Definition: das Haar, -e, das Fell, -e
Register: ''
Beispielsätze: |-
  Ho trovato un *pelo* nero sul maglione bianco.
  Ich habe ein *Haar* auf dem weißen Pullover gefunden.
  
  Il cane ha perso molti *peli* durante la muta.
  Der Hund hat während des Fellwechsels viele *Haare* verloren.
  
  Non riesco a togliere questo *pelo* dalla camicia!
  Ich bekomme dieses *Haar* nicht von dem Hemd weg!
  
  Se avessi un cane, dovrei sempre raccogliere i suoi *peli* dal pavimento.
  Wenn ich einen Hund hätte, müsste ich ständig seine *Haare* vom Boden sammeln.
  
  Il *pelo* di questo gatto è così lungo che sembra una pelliccia.
  Das *Fell* dieser Katze ist so lang, dass es wie ein Pelz wirkt.
