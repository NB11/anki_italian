Wort mit Artikel: la madre
Femininum / Plural: madri
IPA: ''
Definition: die Mutter, Mütter
Register: ''
Beispielsätze: |-
  La *madre* di Marco è molto gentile.
  Die *Mutter* von Marco ist sehr nett.
  
  Ho chiamato la mia *madre* ieri sera.
  Ich habe gestern Abend meine *Mutter* angerufen.
  
  Dove è la *madre* di Giulia? Non la vedo da molto tempo.
  Wo ist die *Mutter* von Giulia? Ich habe sie lange nicht gesehen.
  
  Se fossi ricco, aiuterei la *madre* di tutti i giorni.
  Wenn ich reich wäre, würde ich die *Mutter* von jedem Tag unterstützen.
  
  Le *madri* italiane cucinano spesso la pasta in casa.
  Italienische *Mütter* kochen oft Pasta selbst.
