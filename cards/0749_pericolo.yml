Rang: 749
Wort: pericolo
Wortart: n.m
Wort mit Artikel: il pericolo
Femininum / Plural: i pericoli
IPA: ''
Definition: die Gefahr, -en
Register: ''
Beispielsätze: |-
  C'è un *pericolo* di incendio nel bosco.
  Es besteht *Gefahr* eines Waldbrandes.
  
  Abbiamo superato molti *pericoli* durante il viaggio.
  Wir haben viele *Gefahren* während der Reise überwunden.
  
  Non sottovalutare il *pericolo* di guidare stanchi.
  Unterschätze die *Gefahr*, müde zu fahren nicht.
  
  Chi mi avverte se c'è un *pericolo*?
  Wer warnt mich, wenn eine *Gefahr* besteht?
  
  Il *pericolo* maggiore è rappresentato dai terremoti nella zona.
  Die größte *Gefahr* geht von Erdbeben in der Region aus.
