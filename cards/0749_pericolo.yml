Rang: 749
Wort: pericolo
Wortart: n.m
Wort mit Artikel: il pericolo
Femininum / Plural: pericoli
IPA: ''
Definition: die Gefahr, -en
Register: ''
Beispielsätze: |-
  Non sottovalutare il *pericolo* quando attraversi la strada di notte.
  Unterschätze nicht die *Gefahr*, wenn du nachts die Straße überquerst.
  
  Ha promesso sotto giuro che non avrebbe mai ripetuto quel *pericolo*.
  Er hat unter *Eid* geschworen, dass er diese Gefahr nie wieder eingehen würde.
  
  La situazione in quel livello della metropolitana è diventata un vero casino, con così tanti *pericoli* nascosti.
  Die Situation in dieser *U-Bahn*-Ebene ist zum echten Chaos geworden, mit so vielen versteckten Gefahren.
  
  Se non rispetterai le regole, finirai per coinvolgere anche te in un *pericolo* inutile.
  Wenn du die Regeln nicht einhältst, wirst du dich am Ende in eine unnötige *Gefahr* verwickeln.
  
  Spero che domani nessuno osi scherzare con la sicurezza di quel *pericolo* in montagna.
  Ich hoffe, dass morgen niemand es wagt, mit der Sicherheit dieser *Gefahr* in den Bergen zu scherzen.
