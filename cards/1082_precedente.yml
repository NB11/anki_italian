Definition: vorherig, vorhergehend
Register: ''
Beispielsätze: |-
  La *precedente* stagione è stata più piovosa di questa.
  Die *vorherige* Jahreszeit war regnerischer als diese.
  
  Ho parlato con il direttore riguardo al caso *precedente*.
  Ich habe mich mit dem Direktor über den *vorherigen* Fall unterhalten.
  
  Nonostante il *precedente* avvertimento, ha continuato a guidare senza cintura.
  Trotz der *vorherigen* Warnung fuhr er weiter ohne Sicherheitsgurt.
  
  La pagina che stai leggendo è la *precedente* rispetto a quella che cerchi.
  Die Seite, die du liest, ist die *vorherige* gegenüber der, die du suchst.
  
  Dobbiamo considerare anche le esperienze *precedenti* del candidato.
  Wir müssen auch die *vorherigen* Erfahrungen des Bewerbers berücksichtigen.
