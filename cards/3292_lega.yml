Beispielsätze: |-
  La *lega* di calcio italiana è molto competitiva.
  Die italienische *Liga* ist sehr wettbewerbsfähig.
  
  Hanno formato una *lega* segreta contro il governo.
  Sie haben eine geheime *Liga* gegen die Regierung gebildet.
  
  Non sapevo che esistesse una *lega* così stretta tra loro.
  Ich wusste nicht, dass es eine so enge *Liga* zwischen ihnen gibt.
  
  La *lega* automobilistica organizza gare ogni anno.
  Die Automobil-*Liga* veranstaltet jedes Jahr Rennen.
  
  Se la *lega* si scioglierà, molti perderanno il lavoro.
  Wenn die *Liga* sich auflöst, werden viele ihre Arbeit verlieren.
