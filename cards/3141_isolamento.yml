  Nach der Diagnose benötigte sie mehrere Wochen *isolamento* im Krankenhaus.
  
  Sentiva che il suo *isolamento* da parte dei colleghi fosse ingiusto.
  Er hatte das Gefühl, dass sein *isolamento* von den Kollegen unfair war.
  
  Durante la pandemia per molti il *isolamento* è diventato abitudine.
  Während der Pandemie wurde das *isolamento* für viele zur Gewohnheit.
  
  Aveva paura del *isolamento* invernale, quando le giornate sono brevi.
  Sie fürchtete sich vor dem *isolamento* im Winter, wenn die Tage kurz sind.
