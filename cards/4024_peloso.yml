Rang: 4024
Wort: peloso
Wortart: adj
Wort mit Artikel: peloso
Femininum / Plural: ''
IPA: ''
Definition: behaart, pelzig
Register: ''
Beispielsätze: |-
  Il cane che hai visto è molto *peloso* e ha bisogno di essere spazzolato spesso.
  Der Hund, den du gesehen hast, ist sehr *behaart* und muss oft gebürstet werden.
  
  La sua personalità *pelosa* e sdolcinata mi irrita profondamente.
  Seine *verschmitzte* und künstlich süße Art geht mir richtig auf die Nerven.
  
  Andiamo a trovare un cucciolo *peloso* che hai sempre desiderato adottare?
  Sollen wir den *pelzigen* Welpen besuchen, den du immer adoptieren wolltest?
  
  Benché fosse estate, portava una giacca *pelosa* per nascondere le sue paure.
  Obwohl es Sommer war, trug er eine *behaarte* Jacke, um seine Ängste zu verbergen.
  
  Non sapevo che la mia gatta fosse così *pelosa* finché non l'ho accarezzata per la prima volta.
  Ich wusste nicht, dass meine Katze so *behaart* ist, bis ich sie zum ersten Mal gestreichelt habe.
