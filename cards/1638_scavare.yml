Femininum / Plural: ''
IPA: ''
Definition: graben, ausgraben
Register: ''
Beispielsätze: |-
  Archeologi stanno *scavando* nel sito romano da settimane senza trovare nulla di affascinante.
  Archäologen *graben* seit Wochen auf der römischen Stätte, ohne etwas Faszinierendes zu finden.
  
  È importante *scavare* con delicatezza per non danneggiare i reperti antichi nel magazzino.
  Es ist wichtig, behutsam zu *graben*, um keine alten Funde im Lager zu beschädigen.
  
  Se non avessi *scavato* quel corridoio, non avremmo mai trovato la tomba nascosta lì dietro.
  Wenn ich diesen Flur nicht *ausgegraben* hätte, hätten wir das versteckte Grab dahinter nie gefunden.
  
  Gli studiosi *scaveranno* domani la versione originale di questa lettera, ma sostengono che potrebbe essere disgustosa.
  Die Gelehrten werden morgen diese Version des Briefes *ausgraben*, aber sie glauben, sie könnte ekelhaft sein.
  
  Anche se i ladri hanno rubato tutto, *scavare* più a fondo potrebbe rivelare prove utili per l’analisi della polizia.
  Auch wenn die Diebe alles gestohlen haben, könnte *ausgraben* noch nützliche Beweise für die polizeiliche Analyse zutage fördern.
