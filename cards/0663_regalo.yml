  Die *Geschenke* zu Weihnachten sind immer aufregend.
  
  Questo *regalo* è stato fatto a mano da mia sorella.
  Dieses *Geschenk* wurde von meiner Schwester selbst gemacht.
  
  Non sapevo che avessi preparato un *regalo* per me!
  Ich wusste nicht, dass du ein *Geschenk* für mich vorbereitet hast!
