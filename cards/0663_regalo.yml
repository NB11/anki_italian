Rang: 663
Wort: regalo
Wortart: n.m
Wort mit Artikel: il regalo
Femininum / Plural: regali
IPA: ''
Definition: das Geschenk, -e
Register: ''
Beispielsätze: |-
  Ho ricevuto un *regalo* molto originale per il mio compleanno.
  Ich habe ein sehr originelles *Geschenk* zu meinem Geburtstag bekommen.
  
  Questo *regalo* che hai portato è davvero simile a quello che ho già comprato.
  Dieses *Geschenk*, das du gebracht hast, ist wirklich ähnlich zu dem, das ich schon gekauft habe.
  
  Se non ti dispiace, vorrei *regalare* a Maria questo libro che ho letto sopra.
  Wenn es dir nichts ausmacht, möchte ich Maria dieses Buch geben, das ich oben gelesen habe.
  
  Nonostante il ritardo, Luigi non ha dimenticato di fare un *regalo* alla moglie per il loro anniversario.
  Trotz der *Verspätung* hat Luigi nicht vergessen, seiner Frau zum Hochzeitstag ein Geschenk zu machen.
  
  Mi hanno detto che in quella zona vendono *regali* molto particolari, ma io non ci sono mai stato.
  Man hat mir gesagt, dass man in dieser *Zone* sehr besondere Geschenke verkauft, aber ich war noch nie dort.
