Rang: 1166
Wort: area
Wortart: n.f
Wort mit Artikel: l'area
Femininum / Plural: aree
IPA: ''
Definition: das Gebiet, der Bereich, die Fläche
Register: ''
Beispielsätze: |-
  L'*area* di questo parco è molto vasta e ricca di alberi antichi.
  Das *Gebiet* dieses Parks ist sehr groß und reich an alten Bäumen.
  
  Ho un appartamento in un'*area* residenziale molto tranquilla vicino al centro.
  Ich habe eine Wohnung in einem *Bereich*, der sehr ruhig und zentral gelegen ist.
  
  L'*area* di parcheggio davanti al palazzo è sempre piena la mattina.
  Das *Parkgebiet* vor dem Gebäude ist morgens immer voll.
  
  Se non conosci l'*area*, è meglio chiedere indicazioni a qualcuno che ci abita da anni.
  Wenn du dich in dem *Bereich* nicht auskennst, frag lieber jemanden, der schon jahrelang dort wohnt.
  
  L'*area* protetta per i lupi si trova attraverso il cerchio di montagna che osserveremo dopo la pausa.
  Das *Schutzgebiet* für die Wölfe liegt jenseits des Bergkreises, den wir nach der Pause beobachten werden.
