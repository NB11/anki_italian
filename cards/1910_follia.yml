Rang: 1910
Wort: follia
Wortart: n.f
Wort mit Artikel: la follia
Femininum / Plural: follie
IPA: ''
Definition: der Wahnsinn, die Verrücktheit
Register: ''
Beispielsätze: |-
  La *follia* di quel regista è famosa in tutto il mondo.
  Die *Verrücktheit* dieses Regisseurs ist weltweit bekannt.
  
  Ha agito con tale *follia* che nessuno riuscì a fermarlo.
  Er handelte mit solcher *Verrücktheit*, dass ihn niemand aufhalten konnte.
  
  Non capisco perché tu voglia difendere questa *follia*!
  Ich verstehe nicht, warum du diese *Verrücktheit* verteidigen willst!
  
  Se non fosse per la sua *follia*, non avrebbe mai realizzato quel progetto.
  Wenn es nicht seine *Verrücktheit* wäre, hätte er dieses Projekt nie verwirklicht.
  
  La *follia* dei tempi moderni sembra non avere limiti.
  Die *Verrücktheit* der modernen Zeiten scheint keine Grenzen zu kennen.
