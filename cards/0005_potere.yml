Wortart: v
Wort mit Artikel: potere
Femininum / Plural: ''
IPA: ''
Definition: können, dürfen
Register: ''
Beispielsätze: |-
  Posso *potere* venire con te stasera?
  Darf ich *darf* heute Abend mit dir mitkommen?
  
  Non *potuto* capire la lezione di matematica.
  Ich habe die Mathematikstunde nicht *verstanden*.
  
  Nel futuro *potrai* viaggiare ovunque vorrai.
  In der Zukunft wirst du *werden* können, überall hinzureisen, wohin du möchtest.
  
  Se *potessi*, ti aiuterei volentieri!
  Wenn ich *könnte*, würde ich dir gern helfen!
  
  Poteva parlare tre lingue quando era giovane.
  Er konnte drei Sprachen sprechen, als er jung war.
