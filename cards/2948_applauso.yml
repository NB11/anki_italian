Rang: 2948
Wort: applauso
Wortart: n.m
Wort mit Artikel: l'applauso
Femininum / Plural: applausi
IPA: ''
Definition: der Applaus, -e
Register: ''
Beispielsätze: |-
  Dopo il concerto *applauso* è stato lungo e caloroso.
  Nach dem Konzert war der *Applaus* lang und begeistert.
  
  Gli spettatori hanno rivolto un *applauso* scrosciante al direttore d'orchestra.
  Die Zuschauer spendeten dem Dirigenten einen *Applaus*.
  
  Nonostante l'errore, il pubblico ha dato un *applauso* di solidarietà all'attore.
  Trotz des Fehlers spendete das Publikum dem Schauspieler einen *Applaus* der Solidarität.
  
  Se avessimo vinto, avremmo meritato un *applauso* ancora più grande.
  Hätten wir gewonnen, hätten wir einen *Applauso* noch mehr verdient.
  
  L'*applauso* finale ha riempito il teatro di emozione e soddisfazione.
  Der abschließende *Applauso* erfüllte das Theater mit Emotion und Zufriedenheit.
