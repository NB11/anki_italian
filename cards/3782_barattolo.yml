Rang: 3782
Wort: barattolo
Wortart: n.m
Wort mit Artikel: il barattolo
Femininum / Plural: barattoli
IPA: ''
Definition: das Glas, -¨er
Register: ''
Beispielsätze: |-
  Ho trovato un *barattolo* di marmellata nel frigorifero, ma era scaduto da mesi.
  Ich habe ein *Glas* Marmelade im Kühlschrank gefunden, aber es war seit Monaten abgelaufen.
  
  Mentre camminavo nel bosco, ho visto un *barattolo* vuoto abbandonato tra i cespugli.
  Während ich im Wald spazieren ging, habe ich ein leeres *Glas* zwischen den Büschen liegen sehen.
  
  Se non chiudi bene il *barattolo*, il contenuto si asciugherà in pochi giorni.
  Wenn du das *Glas* nicht gut verschließt, trocknet der Inhalt in wenigen Tagen aus.
  
  Il *barattolo* che ci hanno dato al ristorante conteneva delle olive molto gustose.
  Das *Glas*, das sie uns im Restaurant gegeben haben, enthielt sehr leckere Oliven.
  
  Nonostante l’*barattolo* fosse rotto, siamo riusciti a recuperare quasi tutto il miele che conteneva.
  Obwohl das *Glas* kaputt war, konnten wir fast den gesamten Honig, den es enthielt, retten.
