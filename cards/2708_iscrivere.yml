Rang: 2708
Wort: iscrivere
Wortart: v
Wort mit Artikel: iscrivere
Femininum / Plural: ''
IPA: ''
Definition: einschreiben, anmelden
Register: ''
Beispielsätze: |-
  Devi *iscriverti* al corso entro domani per non perdere il posto.
  Du musst dich *einschreiben* bis morgen, um den Platz nicht zu verlieren.
  
  L’università *iscrive* gli studenti nuovi ogni anno a settembre.
  Die Universität *schreibt* die neuen Studenten jeden September ein.
  
  Se non *iscriverai* il bambino alla scuola materna, non potrà frequentarla.
  Wenn du das Kind nicht *anmeldest*, kann es den Kindergarten nicht besuchen.
  
  Ho già *iscritto* la squadra al torneo, quindi ora dobbiamo prepararci al meglio.
  Ich habe die Mannschaft bereits *angemeldet*, also müssen wir uns jetzt bestmöglich vorbereiten.
  
  Ti consiglio di *iscriverti* alla newsletter per ricevere aggiornamenti sulle lezioni.
  Ich rate dir, dich für den Newsletter *anzumelden*, um Updates zu den Kursen zu erhalten.
