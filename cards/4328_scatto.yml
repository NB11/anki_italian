Beispielsätze: |-
  Lo *scatto* della macchina fotografica avviene in un millesimo di secondo.
  Der *Auslöser* der Kamera erfolgt in einer tausendstel Sekunde.
  
  Ho sentito uno *scatto* improvviso quando ho aperto la porta.
  Ich habe ein plötzliches *Klicken* gehört, als ich die Tür öffnete.
  
  Il detective sospetta che nell’omicidio ci sia stato un *scatto* di rabbia.
  Der Detective vermutet, dass es beim Mord einen *Ausbruch* von Wut gab.
  
  Non appena ho premuto il pulsante, si è sentito un forte *scatto* metallico.
  Sobald ich den Knopf gedrückt habe, hörte man ein starkes metallisches *Klicken*.
  
  Il rapimento è avvenuto in un *scatto* di distrazione da parte dei genitori.
  Die Entführung ist in einem *Moment* der Unachtsamkeit der Eltern passiert.
