Rang: 1456
Wort: velocemente
Wortart: adv
Wort mit Artikel: velocemente
Femininum / Plural: ''
IPA: ''
Definition: schnell, zügig
Register: ''
Beispielsätze: |-
  L’insegnante ha corretto i compiti *velocemente* prima della pausa.
  Der Lehrer hat die Hausaufgaben vor der Pause schnell korrigiert.
  
  Se corri *velocemente*, giungerai in tempo per l’aereo domattina.
  Wenn du schnell läufst, wirst du morgen früh pünktlich am Flughafen ankommen.
  
  Ho strappato la giacca perché incazzarsi *velocemente* è inutile.
  Ich habe die Jacke zerrissen, weil es nutzlos ist, sich schnell aufzuregen.
  
  La pillola agisce *velocemente*, ma è meglio non eccitare troppo il paziente.
  Die Tablette wirkt schnell, aber es ist besser, den Patienten nicht zu sehr aufzuregen.
  
  Il giocatore ha saltato il filo *velocemente* per non sollevare sospetti.
  Der Spieler ist schnell über das Seil gesprungen, um keinen Verdacht zu erregen.
