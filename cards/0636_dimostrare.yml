Rang: 636
Wort: dimostrare
Wortart: v
Wort mit Artikel: dimostrare
Femininum / Plural: ''
IPA: ''
Definition: beweisen, zeigen, demonstrieren
Register: ''
Beispielsätze: |-
  Per *dimostrare* la sua teoria, il detective ha analizzato tutte le prove con cura.
  Um *seine Theorie zu beweisen*, hat der Detektiv alle Beweise sorgfältig analysiert.
  
  Non *dimostrare* troppo entusiasmo se non vuoi sembrare simile a un venditore di biglietti strappati.
  Zeigen Sie nicht *zu viel Begeisterung*, sonst wirken Sie wie ein Ticketverkäufer.
  
  La polizia è riuscita a *dimostrare* che il soldato aveva rubato il denaro dalla lista di cassa.
  Die Polizei konnte nachweisen, dass der *Soldat* das Geld aus der Kassenliste gestohlen hatte.
  
  Se vuoi *dimostrare* di avere coraggio, allora saliamo insieme su quel aereo pericoloso!
  Wenn Sie *Mut beweisen* wollen, dann steigen wir zusammen in dieses gefährliche Flugzeug!
  
  Gli scienziati vogliono *dimostrare* che esiste una relazione tra dolore cronico e droga illegale.
  Die Wissenschaftler möchten nachweisen, dass es einen *Zusammenhang* zwischen chronischen Schmerzen und illegalen Drogen gibt.
