Rang: 1302
Wort: copia
Wortart: n.f
Wort mit Artikel: la copia
Femininum / Plural: copie
IPA: ''
Definition: die Kopie, -n, die Abschrift
Register: ''
Beispielsätze: |-
  Ho fatto *una copia* del documento perché l'originale era sporco.
  Ich habe *eine Kopie* des Dokuments gemacht, weil das Original schmutzig war.
  
  La professoressa controlla *le copie* degli studenti ma trova molti errori.
  Die Lehrerin prüft *die Kopien* der Schüler, aber sie findet viele Fehler.
  
  Vorrei sapere se hai *una copia* di quell'articolo retro pubblicato la settimana scorsa.
  Ich würde gerne wissen, ob du *eine Kopie* dieses Retro-Artikels hast, der letzte Woche veröffentlicht wurde.
  
  Se non hai *la copia* del contratto, io non posso firmare nulla.
  Wenn du *die Kopie* des Vertrags nicht hast, kann ich nichts unterschreiben.
  
  Hanno rubato *le copie* dei quadri dal museo, ma la polizia sta cercando di risolvere il caso.
  Sie haben *die Kopien* der Gemälde aus dem Museum gestohlen, aber die Polizei versucht, den Fall zu lösen.
