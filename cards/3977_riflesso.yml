Rang: 3977
Wort: riflesso
Wortart: n.m
Wort mit Artikel: il riflesso
Femininum / Plural: i riflessi
IPA: ''
Definition: das Spiegelbild, -er; der Reflex, -e
Register: ''
Beispielsätze: |-
  Ho visto un *riflesso* molto nitido nello specchio.
  Ich habe ein sehr klares *Spiegelbild* im Spiegel gesehen.
  
  La luce del sole ha creato un *riflesso* sull'acqua.
  Das Sonnenlicht hat einen *Reflex* auf dem Wasser erzeugt.
  
  Non ho notato il *riflesso* della tua macchina fotografica.
  Ich habe den *Reflex* deiner Kamera nicht bemerkt.
  
  Nel buio si distinguevano solo i *riflessi* delle stelle.
  Im Dunkeln sah man nur die *Reflexe* der Sterne.
  
  Se non pulisci la finestra, compariranno dei *riflessi* fastidiosi.
  Wenn du das Fenster nicht putzt, werden störende *Spiegelungen* entstehen.
