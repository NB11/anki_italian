Rang: 2437
Wort: avvelenare
Wortart: vt
Wort mit Artikel: avvelenare
Femininum / Plural: ''
IPA: ''
Definition: vergiften
Register: ''
Beispielsätze: |-
  L'*avvelenò* lentamente con una sostanza sconosciuta.
  Er *vergiftete* ihn langsam mit einer unbekannten Substanz.
  
  Se non *avveleniamo* questi topi, distruggeranno il raccolto.
  Wenn wir diese Ratten nicht *vergiften*, werden sie die Ernte zerstören.
  
  Temo che qualcuno abbia cercato di *avvelenare* il nostro cane con il cibo.
  Ich fürchte, jemand hat versucht, unseren Hund mit dem Futter zu *vergiften*.
  
  Avrebbero *avvelenato* l’imperatore, se i soldati non fossero arrivati in tempo.
  Sie hätten den *Kaiser* vergiftet, wenn die Soldaten nicht rechtzeitig eingetroffen wären.
  
  È stato arrestato perché sospettano che *avveleni* il vino dei suoi concorrenti.
  Er wurde verhaftet, weil man vermutet, dass er den Wein seiner Konkurrenten *vergiftet*.
