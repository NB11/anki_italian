Rang: 645
Wort: intorno
Wortart: adv
Wort mit Artikel: intorno
Femininum / Plural: ''
IPA: ''
Definition: um herum, ringsum
Register: ''
Beispielsätze: |-
  C'è una *intorno* alla piazza che sembra molto affollata stamattina.
  Es gibt einen *Rundweg* um den Platz, der heute Morgen sehr voll wirkt.
  
  Non appena il sole tramonta, gli insetti iniziano a volare *intorno* alla lampada.
  Sobald die *Sonne* untergeht, beginnen Insekten um die Lampe zu fliegen.
  
  Ho camminato *intorno* al lago per rilassare la mente dopo una lunga giornata al lavoro.
  Ich bin um den *See* gelaufen, um meinen Geist nach einem langen Arbeitstag zu entspannen.
  
  La polizia ha bloccato *intorno* alla zona del crimine per evitare che testimoni si avvicinino.
  Die Polizei hat *rund um* die Kriminalitätszone blockiert, um zu verhindern, dass Zeugen sich nähern.
  
  Se guardi da vicino, noterai che il disegno ha piccoli punti colorati *intorno* al centro.
  Wenn du genau hinschaust, wirst du merken, dass die Zeichnung kleine bunte Punkte *rund um* die Mitte hat.
