Rang: 1050
Wort: data
Wortart: n.m
Wort mit Artikel: il data
Femininum / Plural: i dati
IPA: ''
Definition: der Tag, -e
Register: ''
Beispielsätze: |-
  Oggi è il *data* di consegna del progetto che stiamo preparando da mesi.
  Heute ist der *Tag* der Projektlieferung, das wir seit Monaten vorbereiten.
  
  Le *dati* del tuo esperimento confermano la mia ipotesi, quindi potremmo pubblicare insieme.
  Die *Daten* deines Experiments bestätigen meine Hypothese, also könnten wir gemeinsam veröffentlichen.
  
  Se avessi saputo che i *dati* erano sbagliati, avrei cancellato tutto prima di inviarli.
  Hätte ich gewusst, dass die *Daten* falsch waren, hätte ich alles gelöscht, bevor ich es verschickt hätte.
  
  La polizia sta analizzando i *dati* delle telecamere per trovare il colpevole dell’arresto di ieri.
  Die Polizei analysiert die *Daten* der Kameras, um den Täter der gestrigen Verhaftung zu finden.
  
  Domani mattina dovremo controllare tutti i *dati* prima di prendere una decisione così importante per la nostra carriera.
  Morgen früh müssen wir alle *Daten* überprüfen, bevor wir eine so wichtige Entscheidung für unsere Karriere treffen.
