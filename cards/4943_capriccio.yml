Rang: 4943
Wort: capriccio
Wortart: n.m
Wort mit Artikel: il capriccio
Femininum / Plural: i capricci
IPA: ''
Definition: die Laune, -n, die Marotte, -n
Register: ''
Beispielsätze: |-
  A volte fa *capricci* se non ottiene ciò che vuole.
  Manchmal macht er *Launen*, wenn er nicht bekommt, was er will.
  
  Il suo *capriccio* di ieri sera era davvero insopportabile.
  Seine *Marotte* von gestern Abend war wirklich unerträglich.
  
  Non assecondare ogni *capriccio* del bambino, altrimenti crescerà viziato.
  Befriedige nicht jede *Laune* des Kindes, sonst wird es verwöhnt aufwachsen.
  
  Era tutto un *capriccio*, non aveva davvero bisogno di quella macchina nuova.
  Es war nur eine *Marotte*, er brauchte das neue Auto eigentlich nicht.
  
  Mi dispiace, ma non posso cedere a ogni tuo *capriccio*.
  Es tut mir leid, aber ich kann nicht jeder deiner *Launen* nachgeben.
