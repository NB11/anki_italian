Rang: 1690
Wort: discussione
Wortart: n.f
Wort mit Artikel: la discussione
Femininum / Plural: discussioni
IPA: ''
Definition: die Diskussion, -en
Register: ''
Beispielsätze: |-
  Dopo la *discussione* con il senatore, i cittadini erano ancora confusi riguardo alle prossime elezioni.
  Nach der *Diskussion* mit dem Senator waren die Bürger immer noch verwirrt über die nächsten Wahlen.
  
  Nonostante la *discussione* animata, hanno deciso di collaborare al progetto futuro.
  Trotz der *Diskussion* beschlossen sie, beim zukünftigen Projekt zusammenzuarbeiten.
  
  La *discussione* tra i due amanti risultò essere più profonda di quanto si aspettassero.
  Die *Diskussion* zwischen den beiden Liebhabern erwies sich als tiefer, als sie erwartet hatten.
  
  Se avessi assistito alla *discussione* in parlamento, avresti capito meglio le posizioni dei partiti.
  Hättest du der *Diskussion* im Parlament beigewohnt, hättest du die Positionen der Parteien besser verstanden.
  
  La *discussione* sulla nuova legge ha diviso l’opinione pubblica in modo pazzesco.
  Die *Diskussion* über das neue Gesetz hat die öffentliche Meinung auf irre Art und Weise gespalten.
