Rang: 304
Wort: nascondere
Wortart: vt
Wort mit Artikel: nascondere
Femininum / Plural: ''
IPA: ''
Definition: verstecken, verbergen, verheimlichen
Register: ''
Beispielsätze: |-
  Devo *nascondere* questo documento importante.
  Ich muss dieses wichtige Dokument *verstecken*.
  
  Hai *nascosto* le chiavi di casa di nuovo!
  Du hast schon wieder die Hausschlüssel *versteckt*!
  
  Non vorrei *nascondere* la verità ai miei genitori.
  Ich würde die Wahrheit meinen Eltern nicht *verheimlichen* wollen.
  
  Dov’ è la scatola che hai *nascosto* sotto il letto?
  Wo ist die Kiste, die du unter dem Bett *versteckt* hast?
  
  Se volessi *nasconderci* qualcosa, te lo direi apertamente.
  Wenn ich dir etwas *verbergen* wollte, würde ich es dir offen sagen.
