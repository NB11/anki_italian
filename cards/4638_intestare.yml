Rang: 4638
Wort: intestare
Wortart: vt
Wort mit Artikel: intestare
Femininum / Plural: ''
IPA: ''
Definition: übertragen, überschreiben
Register: ''
Beispielsätze: |-
  Hanno *intestato* la casa ai figli per evitare problemi con il fisco.
  Sie haben das Haus auf die Kinder *übertragen*, um Probleme mit dem Finanzamt zu vermeiden.
  
  Vorrei *intestare* il terreno a mio nipote, ma devo prima chiedere il parere del notaio.
  Ich würde das Grundstück auf meinen Neffen *übertragen*, aber ich muss erst den Notar um Rat fragen.
  
  L’eredità fu *intestata* solo a lui, senza che i fratelli potessero opporsi.
  Das Erbe wurde nur ihm *übertragen*, ohne dass die Brüder widersprechen konnten.
  
  Se *intesterai* l’auto a tuo fratello, dovrai firmare parecchi documenti in questura.
  Wenn du den Wagen auf deinen Bruder *übertragen* wirst, musst du mehrere Dokumente im Polizeipräsidium unterschreiben.
  
  Il giudice ha stabilito che il contratto di vendita non può essere *intestato* a due persone diverse contemporaneamente.
  Der Richter hat entschieden, dass der Kaufvertrag nicht gleichzeitig auf zwei verschiedene Personen *übertragen* werden kann.
