Rang: 4192
Wort: materasso
Wortart: n.m
Wort mit Artikel: il materasso
Femininum / Plural: materassi
IPA: ''
Definition: die Matratze, -n
Register: ''
Beispielsätze: |-
  Ho comprato un *materasso* nuovo perché quello vecchio era troppo duro.
  Ich habe eine neue *Matratze* gekauft, weil die alte zu hart war.
  
  Durante la vigilia di Natale, abbiamo sistemato il *materasso* per gli ospiti in soggiorno.
  Am *Vorabend* von Weihnachten haben wir die Matratze für die Gäste im Wohnzimmer aufgestellt.
  
  Mi hanno regalato un *materasso* così comodo che non voglio più alzarmi!
  Man hat mir eine *Matratze* geschenkt, die so bequem ist, dass ich nicht mehr aufstehen möchte!
  
  Dormire su un *materasso* troppo sottile può causare mal di schiena.
  Auf einer zu dünnen *Matratze* zu schlafen, kann Rückenschmerzen verursachen.
  
  Il negozio offre la manutenzione gratuita del *materasso* per i primi due anni.
  Das Geschäft bietet die kostenlose *Wartung* der Matratze für die ersten zwei Jahre an.
