Rang: 2219
Wort: cucciolo
Wortart: n.m
Wort mit Artikel: il cucciolo
Femininum / Plural: cuccioli
IPA: ''
Definition: das Jungtier, -e; der Welpe, -n
Register: ''
Beispielsätze: |-
  Ho visto *cuccioli* di cane giocare nel parco ieri pomeriggio.
  Ich habe gestern Nachmittag Hunde*welpen* im Park spielen gesehen.
  
  Questo *cucciolo* somiglia molto a quello che abbiamo visto ieri durante la passeggiata.
  Dieser Welpe ähnelt sehr dem, den wir gestern beim Spaziergang gesehen haben.
  
  Se non avessi *cuccioli*, non dovrei preoccuparmi di portarmi dietro una scorta di crocchette.
  Wenn ich keine Welpen hätte, müsste ich mir nicht um eine Reserve an Kroketten sorgen.
  
  Appena il *cucciolo* è stato portato alla clinica, hanno iniziato le cure urgenti.
  Sobald der Welpe in die Klinik gebracht wurde, begannen die dringenden Behandlungen.
  
  È davvero *cucciolo* che non sa ancora stare sulla paglia senza fare danni!
  Es ist wirklich ein Welpe, der noch nicht einmal auf dem Stroh sitzen kann, ohne etwas kaputtzumachen!
