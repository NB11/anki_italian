Beispielsätze: |-
  La *natura* offre molte opportunità per rilassarsi e godersi il tempo libero.
  Die *Natur* bietet viele Chancen, um sich zu entspannen und die Freizeit zu genießen.
  
  Dopo aver visto che la *natura* intorno al porto era così incontaminata, ho deciso di non arrendere mai.
  Nachdem ich gesehen hatte, dass die *Natur* um den Hafen so unberührt war, beschloss ich, nie aufzugeben.
  
  In questa stagione dell'anno, la *natura* si risveglia e diventa ancora più affascinante con ogni data.
  In dieser Jahreszeit des Jahres erwacht die *Natur* und wird mit jedem Tag noch faszinierender.
  
  Spero che il direttore del college possa capire l'importanza della *natura* per il nostro benessere psicologico.
  Ich hoffe, dass der College-Direktor die Bedeutung der *Natur* für unser psychisches Wohlbefinden verstehen kann.
  
  Se avessi conosciuto prima questi dati, avrei puntato di più sulla conservazione della *natura*, soprattutto in aree locali.
  Wenn ich diese Daten früher gekannt hätte, hätte ich mehr auf den Schutz der *Natur*, besonders in örtlichen Gebieten, gesetzt.
