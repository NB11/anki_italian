Rang: 594
Wort: lista
Wortart: n.f
Wort mit Artikel: la lista
Femininum / Plural: liste
IPA: ''
Definition: die Liste, -n
Register: ''
Beispielsätze: |-
  Secondo il programma, dobbiamo controllare la *lista* delle cose da fare ogni mattina.
  Laut dem Plan müssen wir die *Liste* der zu erledigenden Dinge jeden Morgen überprüfen.
  
  Non sapevo che avessi fatto una *lista* di tutte le regole da seguire, ma insomma, è una buona idea!
  Ich wusste nicht, dass du eine *Liste* mit allen zu befolgenden Regeln erstellt hattest, aber kurz gesagt, es ist eine gute Idee!
  
  Dopo aver battuto il guaio nel nostro progetto, finalmente abbiamo creato una *lista* di priorità con l’aiuto dello zio esperto.
  Nachdem wir das Problem in unserem Projekt behoben hatten, haben wir schließlich mit Hilfe des erfahrenen Onkels eine *Liste* mit Prioritäten erstellt.
  
  Credo che tu debba aggiungere anche il consiglio del centro di ricerca per completare la *lista* definitiva.
  Ich glaube, du solltest auch den Rat des Forschungszentrums hinzufügen, um die endgültige *Liste* zu vervollständigen.
  
  Ho paura che quella *lista* segreta possa riguardare qualcosa che non vogliamo liberare affatto!
  Ich fürchte, dass diese geheime *Liste* etwas betrifft, das wir ganz und gar nicht befreien wollen!
