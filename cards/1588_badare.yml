Rang: 1588
Wort: badare
Wortart: vi
Wort mit Artikel: badare
Femininum / Plural: ''
IPA: ''
Definition: aufpassen, achten, sich kümmern
Register: ''
Beispielsätze: |-
  Devi *badare* al cane mentre sono al lavoro, altrimenti si annoia.
  Du musst *auf den Hund achten*, während ich bei der Arbeit bin, sonst langweilt er sich.
  
  Mi raccomando, *badate* ai vostri passi mentre camminate nel bosco.
  Pass bitte *auf deine Schritte auf*, während du im Wald läufst.
  
  Se non *badiamo* ai dettagli, possiamo fare errori gravi.
  Wenn wir nicht *auf Details achten*, können wir schwere Fehler machen.
  
  Ha detto che *baderà* lui al suo fratello minore durante il viaggio.
  Er hat gesagt, dass er *sich um seinen jüngeren Bruder kümmern wird* während der Reise.
  
  Nonostante la pioggia, dobbiamo *badare* a questi documenti importanti.
  Trotz des Regens müssen wir *auf diese wichtigen Dokumente achten*.
Audio: ''
Notiz: ''
Dispersion: ''
