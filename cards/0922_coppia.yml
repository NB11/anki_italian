Beispielsätze: |-
  Ho comprato una *coppia* di scarpe nuove per il viaggio.
  Ich habe ein *Paar* neue Schuhe für die Reise gekauft.
  
  La *coppia* di professori che conosciamo ha avuto un figlio.
  Das *Paar* von Professoren, das wir kennen, hat ein Kind bekommen.
  
  Dopo aver litigato, è meglio che la *coppia* si riposi un po’ prima della riunione.
  Nach dem Streit wäre es besser, wenn sich das *Paar* vor dem Treffen etwas ausruht.
  
  È incredibile quanto una *coppia* possa cambiare la condizione di una persona.
  Es ist unglaublich, wie ein *Paar* die Lage einer Person verändern kann.
  
  Se vuoi realizzare il tuo desiderio di viaggiare, devi prima trovare una *coppia* di biglietti convenienti.
  Wenn du deinen *Wunsch*, zu verreisen, erfüllen willst, musst du zunächst ein Paar günstige Tickets finden.
