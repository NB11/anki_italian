Rang: 2932
Wort: confidare
Wortart: vi
Wort mit Artikel: confidare
Femininum / Plural: ''
IPA: ''
Definition: vertrauen, sich verlassen
Register: ''
Beispielsätze: |-
  Mi *confido* sempre nei miei amici quando ho bisogno di aiuto.
  Ich *vertraue* immer meinen Freunden, wenn ich Hilfe brauche.
  
  Non *confidare* troppo nelle apparenze, potrebbe essere un inganno.
  *Verlassen* Sie sich nicht zu sehr auf den Schein, es könnte eine Täuschung sein.
  
  Lui non *confidava* mai nelle promesse dei politici e aveva ragione.
  Er *vertraute* nie den Versprechen der Politiker, und das hatte er richtig gemacht.
  
  Se *confiderai* nel tuo intuito, troverai la soluzione giusta.
  Wenn du deinem Instinkt *vertraust*, wirst du die richtige Lösung finden.
  
  Mi *confidò* che aveva paura di fallire, ma non volle parlarne con nessuno.
  Er *vertraute* mir an, dass er Angst vor dem Scheitern hatte, aber mit niemandem darüber sprechen wollte.
Audio: ''
Notiz: ''
Dispersion: ''
