Rang: 4933
Wort: sfilata
Wortart: n.f
Wort mit Artikel: la sfilata
Femininum / Plural: sfilate
IPA: ''
Definition: die Modenschau, -en
Register: ''
Beispielsätze: |-
  Ogni anno a Milano c'è una *sfilata* di moda molto famosa.
  Jedes Jahr gibt es in Mailand eine *Modenschau* von hohem Ruf.
  
  La *sfilata* autunnale ha mostrato le nuove tendenze della stagione.
  Die *Modenschau* für den Herbst hat die neuen Trends der Saison präsentiert.
  
  Non vedo l'ora di partecipare a una *sfilata* così originale!
  Ich kann es kaum erwarten, an einer so originellen *Modenschau* teilzunehmen.
  
  Dopo la *sfilata*, tutti hanno applaudito gli stilisti che vi hanno preceduto.
  Nach der *Modenschau* haben alle den Designern applaudiert, die ihr vorangegangen waren.
  
  È difficile organizzare una *sfilata* senza coinvolgere molti stilisti sensati.
  Es ist schwierig, eine *Modenschau* zu organisieren ohne viele vernünftige Designer einzubinden.
