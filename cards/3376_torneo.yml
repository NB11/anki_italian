Rang: 3376
Wort: torneo
Wortart: n.m
Wort mit Artikel: il torneo
Femininum / Plural: tornei
IPA: ''
Definition: das Turnier, -e
Register: ''
Beispielsätze: |-
  Quest'anno *torneo* si svolgerà in Francia invece che in Italia.
  Das *Turnier* findet dieses Jahr in Frankreich statt, statt in Italien.
  
  Nonostante l'infortunio, è riuscito a vincere il *torneo* di scacchi.
  Trotz der Verletzung gelang es ihm, das Schach-*Turnier* zu gewinnen.
  
  Il club organizza ogni estate un *torneo* di pallavolo per giovani.
  Der Verein veranstaltet jedes Jahr im Sommer ein Volleyball-*Turnier* für Jugendliche.
  
  Negli anni '50 partecipò a un *torneo* internazionale di tennis dove incontrò la futura moglie.
  In den 1950er Jahren nahm er an einem internationalen Tennis-*Turnier* teil, wo er seine zukünftige Frau kennenlernte.
  
  Se vincerai questo *torneo*, potrai qualificarti per le Olimpiadi.
  Wenn du dieses *Turnier* gewinnst, kannst du dich für die Olympischen Spiele qualifizieren.
