Rang: 4420
Wort: zingaro
Wortart: n.m
Wort mit Artikel: lo zingaro
Femininum / Plural: zingari
IPA: ''
Definition: der Zigeuner, -
Register: ''
Beispielsätze: |-
  Lo *zingaro* vendeva tappeti colorati nella piazza del paese.
  Der *Zigeuner* verkaufte bunte Teppiche auf dem Dorfplatz.
  
  I carabinieri hanno fermato lo *zingaro* perché viaggiava senza documenti.
  Die Carabinieri haben den *Zigeuner* angehalten, weil er ohne Papiere unterwegs war.
  
  Mio nonno ricordava ancora gli *zingari* che passavano ogni estate nel suo villaggio.
  Mein Opa erinnerte sich noch an die *Zigeuner*, die jeden Sommer durch sein Dorf zogen.
  
  Se incontrassi uno *zingaro* per strada, gli chiederei di leggere il futuro nella mano.
  Wenn ich einen *Zigeuner* auf der Straße träfe, würde ich ihn bitten, mir die Zukunft aus der Hand zu lesen.
  
  Lo *zingaro* che abitava alla periferia della città era noto per la sua generosità.
  Der *Zigeuner*, der am Stadtrand wohnte, war für seine Großzügigkeit bekannt.
