Rang: 3705
Wort: falco
Wortart: n.m
Wort mit Artikel: il falco
Femininum / Plural: i falchi
IPA: ''
Definition: der Falke, -n
Register: ''
Beispielsätze: |-
  Il *falco* plana silenzioso sopra la valle cercando prede.
  Der *Falke* gleitet still über das Tal auf der Suche nach Beute.
  
  Non credo che questo *falco* abbia catturato già tre conigli in un’ora.
  Ich glaube nicht, dass dieser *Falke* bereits drei Kaninchen in einer Stunde gefangen hat.
  
  Se avessi un’arma, vorrei sparare a ogni *falco* che distrugge i nidi degli uccellini.
  Wenn ich eine Waffe hätte, würde ich jeden *Falken* erschießen, der die Nester kleiner Vögel zerstört.
  
  Il biologo ha spiegato che il *falco* pellegrino è una specie protetta in tutta Europa.
  Der Biologe erklärte, dass der Wander*falke* in ganz Europa eine geschützte Art ist.
  
  Sembra che il *falco* stia per piombare sul topo che si muove sotto di lui.
  Es sieht so aus, als würde der *Falke* auf die Maus herabstürzen, die sich unter ihm bewegt.
