Rang: 348
Wort: realtà
Wortart: n.f
Wort mit Artikel: la realtà
Femininum / Plural: realtà
IPA: ''
Definition: die Realität, Wirklichkeit
Register: ''
Beispielsätze: |-
  La *realtà* spesso è più strana della *finzione*, *perciò* molti scrittori preferiscono ispirarsi al vero.
  Die *Realität* ist oft seltsamer als die *Fiktion*, *deshalb* bevorzugen viele Schriftsteller, sich an der Wahrheit zu orientieren.
  
  Nonostante le difficoltà, lei è riuscita a *creare* una *realtà* lavorativa soddisfacente in *gran* poco tempo.
  Trotz der Schwierigkeiten ist es ihr gelungen, eine *zufriedenstellende Arbeitsrealität* in *kurzer Zeit* zu schaffen.
  
  Vorrei che tu mi dicessi se questa è la *realtà* o solo un *sogno* da cui sto per svegliarmi *contro* la mia volontà.
  Ich möchte, dass du mir sagst, ob das die *Realität* ist oder nur ein *Traum*, aus dem ich gegen meinen Willen aufwache.
  
  Nel *sistema* giudiziario italiano, la *realtà* dei fatti conta più delle parole di un *presidente* che non *vale* più di un soldo bucato.
  Im italienischen *Justizsystem* zählt die *Tatsächlichkeit* der Fakten mehr als die Worte eines *Präsidenten*, der keinen Pfennig wert ist.
  
  Dopo *aver* *passato* vent’anni in *prigione*, la sua *realtà* era così diversa dal mondo esterno che non sapeva più cosa fosse *onore*.
  Nach *zwanzig Jahren im Gefängnis* war seine *Realität* so anders als die Außenwelt, dass er nicht mehr wusste, was *Ehre* bedeutet.
