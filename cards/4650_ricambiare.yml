Rang: 4650
Wort: ricambiare
Wortart: vt
Wort mit Artikel: ricambiare
Femininum / Plural: ''
IPA: ''
Definition: zurückgeben, erwidern, vergelten
Register: ''
Beispielsätze: |-
  Nonostante il suo regalo costoso, lei non volle *ricambiare* con nulla.
  Trotz seines teuren Geschenks wollte sie nichts *zurückgeben*.
  
  Se tu mi aiutassi, io ti *ricambierei* volentieri il favore.
  Wenn du mir helfen würdest, würde ich dir den Gefallen *erwidern*.
  
  Mi sembra strano che lui non abbia *ricambiato* il mio sorriso.
  Es kommt mir seltsam vor, dass er mein Lächeln nicht *erwidert* hat.
  
  Dopo aver ricevuto la lettera, lei decise di *ricambiare* visitando la sua casa.
  Nachdem sie den Brief erhalten hatte, beschloss sie, seinen Besuch mit einem Gegenbesuch zu *vergelten*.
  
  Per *ricambiare* la gentilezza, gli offrì una cena squisita.
  Als *Gegenleistung* für seine Freundlichkeit bot sie ihm ein exquisites Abendessen an.
Audio: ''
Notiz: ''
Dispersion: ''
