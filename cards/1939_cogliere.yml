Rang: 1939
Wort: cogliere
Wortart: vt
Wort mit Artikel: cogliere
Femininum / Plural: ''
IPA: ''
Definition: pflücken, sammeln, ergreifen
Register: ''
Beispielsätze: |-
  Se vuoi *cogliere* una rosa dal giardino, stai attento alle spine.
  Wenn du eine Rose im Garten *pflückst*, pass bitte auf die Dornen auf.
  
  Ha *colto* il momento giusto per chiedere un aumento di stipendio.
  Er hat den *richtigen* Moment ergriffen, um eine Gehaltserhöhung zu verlangen.
  
  Non mi sembra che tu abbia *colto* il senso della mia domanda.
  Ich glaube nicht, dass du den Sinn meiner Frage *erfasst* hast.
  
  Spero che domani riesca a *cogliere* dei funghi nel bosco vicino.
  Ich hoffe, dass er morgen im nahen Wald Pilze *sammeln* kann.
  
  Avrei preferito che lui *avesse colto* l’occasione quando la situazione era ancora favorevole.
  Ich hätte es vorgezogen, wenn er die Gelegenheit *genutzt hätte*, als die Situation noch günstig war.
