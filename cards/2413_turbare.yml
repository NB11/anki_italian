Rang: 2413
Wort: turbare
Wortart: v
Wort mit Artikel: turbare
Femininum / Plural: ''
IPA: ''
Definition: stören, verwirren, beunruhigen
Register: ''
Beispielsätze: |-
  Non volevo *turbare* la vostra quiete, scusate se ho interrotto.
  Ich wollte eure Ruhe nicht *stören*, entschuldigt die Unterbrechung.
  
  Il rumore improvviso ha *turbato* il suo sonno profondo.
  Das plötzliche Geräusch hat seinen tiefen Schlaf *beunruhigt*.
  
  Spero che la notizia non ti abbia *turbato* troppo.
  Ich hoffe, die Nachricht hat dich nicht zu sehr *verwirrt*.
  
  L’idea di dover partire domani *turbava* i suoi piani per il fine settimana.
  Die Vorstellung, morgen losfahren zu müssen, *störte* ihre Wochenendpläne.
  
  Se mai qualcuno dovesse *turbare* la pace della tua famiglia, fammi sapere.
  Falls jemals jemand den Frieden deiner Familie *stören* sollte, lass es mich wissen.
Audio: ''
Notiz: ''
Dispersion: ''
