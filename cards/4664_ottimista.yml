Rang: 4664
Wort: ottimista
Wortart: n.m
Wort mit Artikel: l'ottimista
Femininum / Plural: gli ottimisti
IPA: ''
Definition: der Optimist, -en
Register: ''
Beispielsätze: |-
  Nonostante le difficoltà, lui rimane *ottimista* e crede che tutto andrà bene.
  Trotz der Schwierigkeiten bleibt er *optimistisch* und glaubt, dass alles gut gehen wird.
  
  Se fossi *ottimista* come te, affronteresti ogni problema con più entusiasmo.
  Wenn ich so *optimistisch* wie du wäre, würde ich jedes Problem mit mehr Begeisterung angehen.
  
  È proprio da lui essere così *ottimista* quando si tratta di viaggi avventurosi.
  Genau typisch für ihn ist es, bei abenteuerlichen Reisen so *optimistisch* zu sein.
  
  Gli *ottimisti* spesso vedono soluzioni dove gli altri vedono solo problemi.
  *Optimisten* sehen oft Lösungen, wo andere nur Probleme sehen.
  
  Sii *ottimista*: domani il sole splenderà di sicuro!
  Sei *optimistisch*: Morgen wird die Sonne bestimmt scheinen!
