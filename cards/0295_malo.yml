Rang: 295
Wort: malo
Wortart: adj
Wort mit Artikel: malo
Femininum / Plural: ''
IPA: ''
Definition: schlecht, böse, fies
Register: ''
Beispielsätze: |-
  Questo cibo *è molto malo* per la salute.
  Dieses Essen ist *sehr schlecht* für die Gesundheit.
  
  Non essere *malo* con tuo fratello!
  Sei nicht *böse* zu deinem Bruder!
  
  Penso che il suo comportamento sia un po' *malo*.
  Ich finde, dass ihr Verhalten ein bisschen *fies* ist.
  
  Spero che non sia *malo* come sembra.
  Ich hoffe, dass er nicht *böse* ist, wie es scheint.
  
  Secondo te, è *malo* giudicare le persone senza conoscerle?
  Findest du es *schlecht*, Menschen zu verurteilen, ohne sie zu kennen?
