Rang: 1070
Wort: giurare
Wortart: v
Wort mit Artikel: giurare
Femininum / Plural: ''
IPA: ''
Definition: schwören, versprechen
Register: ''
Beispielsätze: |-
  Il testimone ha *giurato* di dire la verità davanti al giudice.
  Der Zeuge hat *geschworen*, vor dem Richter die Wahrheit zu sagen.
  
  Se vuoi che ti creda, devi *giurare* che non eri lì quella sera.
  Wenn du willst, dass ich dir glaube, musst du *schwören*, dass du an diesem Abend nicht dort warst.
  
  Nonostante avesse *giurato* di non farlo più, ha mollato tutto e se n’è andato.
  Obwohl er *geschworen* hatte, es nicht wieder zu tun, hat er alles aufgegeben und ist gegangen.
  
  È importante *giurare* fedeltà alla patria, ma non tutti lo prendono sul serio.
  Es ist wichtig, der Heimat *Treue zu schwören*, aber nicht alle nehmen das ernst.
  
  Dopo l’incidente, chi *giura* di non bere alcolici non sempre mantiene la parola.
  Nach dem Unfall *schwören* zwar viele, keinen Alkohol zu trinken, aber nicht alle halten ihr Wort.
