Rang: 4947
Wort: leggendario
Wortart: adj
Wort mit Artikel: leggendario
Femininum / Plural: ''
IPA: ''
Definition: legendär, sagenumwoben
Register: ''
Beispielsätze: |-
  La bandiera *leggendaria* sventolava su tutto il paese durante la festa.
  Die *legendäre* Flagge wehte über dem ganzen Land während des Festes.
  
  Dopo aver letto la sua biografia, ho capito perché è considerato un eroe *leggendario*.
  Nachdem ich seine Biografie gelesen hatte, verstand ich, warum er als *legendärer* Held gilt.
  
  Se avessi tempo, visiterei il castello *leggendario* di cui mi hai parlato.
  Wenn ich Zeit hätte, würde ich die *legendäre* Burg besuchen, von der du erzählt hast.
  
  Credo che la sua fama sia dovuta a una leggenda *leggendaria* tramandata nei secoli.
  Ich glaube, sein Ruf verdankt sich einer *legendären* Sage, die über Jahrhunderte überliefert wurde.
  
  Nonostante le difficoltà, ha mantenuto uno spirito *leggendario* anche in età avanzata.
  Trotz der Schwierigkeiten bewahrte er einen *legendären* Geist bis ins hohe Alter.
