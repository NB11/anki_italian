Rang: 2365
Wort: saggio
Wortart: adj
Wort mit Artikel: saggio
Femininum / Plural: ''
IPA: ''
Definition: weise, klug
Register: ''
Beispielsätze: |-
  Il professor Rossi è un uomo *saggio* che dà sempre ottimi consigli ai suoi studenti.
  Professor Rossi ist ein *weiser* Mann, der seinen Studenten stets hervorragende Ratschläge gibt.
  
  Nonostante la sua età avanzata, la nonna Maria rimane molto *saggiamente* con le sue decisioni finanziarie.
  Trotz ihres hohen Alters trifft Oma Maria ihre finanziellen Entscheidungen sehr *weise*.
  
  Ho letto un articolo *saggio* sul cambiamento climatico che mi ha davvero aperto gli occhi.
  Ich habe einen *klugen* Artikel über den Klimawandel gelesen, der mir wirklich die Augen geöffnet hat.
  
  Se fossi più *saggio*, non avrei accettato quel lavoro stressante solo per i soldi.
  Wäre ich *klüger*, hätte ich diesen stressigen Job nicht nur wegen des Geldes angenommen.
  
  I genitori sperano che i loro figli diventino persone *sagge* e responsabili.
  Die Eltern hoffen, dass ihre Kinder zu *weisen* und verantwortungsvollen Menschen werden.
