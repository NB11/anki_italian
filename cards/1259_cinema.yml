Rang: 1259
Wort: cinema
Wortart: n.m
Wort mit Artikel: il cinema
Femininum / Plural: cinema
IPA: ''
Definition: das Kino, -s
Register: ''
Beispielsätze: |-
  Mi piace molto andare al *cinema* con gli amici il sabato sera.
  Mir gefällt es sehr, samstags abends mit Freunden ins *Kino* zu gehen.
  
  Quel grande *cinema* in centro ha proiettato tutti i nuovi film.
  Dieses große *Kino* im Zentrum hat alle neuen Filme gezeigt.
  
  Se vuoi vedere un film indipendente, cerca un *cinema* di quartiere.
  Wenn du einen Independent-Film sehen willst, suche ein *Kino* im Viertel.
  
  Non ho ancora capito perché hanno chiuso quel *cinema* vicino a casa tua.
  Ich habe immer noch nicht verstanden, warum sie dieses *Kino* in deiner Nähe geschlossen haben.
  
  Il nostro regista preferisce proiettare i suoi film direttamente in un *cinema* all’aperto.
  Unser Lieblingsregisseur zeigt seine Filme lieber direkt in einem Open-Air-*Kino*.
