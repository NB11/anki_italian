Rang: 2494
Wort: comitato
Wortart: n.m
Wort mit Artikel: il comitato
Femininum / Plural: i comitati
IPA: ''
Definition: das Komitee, -s / der Ausschuss, -üsse
Register: ''
Beispielsätze: |-
  Il *comitato* ha organizzato una raccolta fondi per la nuova biblioteca.
  Das *Komitee* hat eine Spendensammlung für die neue Bibliothek organisiert.
  
  Nonostante le controversie, il *comitato* ha mantenuto la sua decisione.
  Trotz der Kontroversen hat das *Komitee* seine Entscheidung beibehalten.
  
  Se questo *comitato* fallisce, dovremo formare un altro gruppo di lavoro.
  Wenn dieses *Komitee* scheitert, müssen wir eine neue Arbeitsgruppe bilden.
  
  Chiunque voglia far parte del *comitato* deve presentare una candidatura entro domani.
  Wer Teil des *Ausschusses* werden möchte, muss sich bis morgen bewerben.
  
  Il sindaco ha ringraziato il *comitato* per l’impegno profuso nel progetto.
  Der Bürgermeister hat dem *Ausschuss* für das Engagement in dem Projekt gedankt.
