Rang: 4486
Wort: aragosta
Wortart: n.m
Wort mit Artikel: l'aragosta
Femininum / Plural: aragoste
IPA: ''
Definition: der Hummer, -
Register: ''
Beispielsätze: |-
  Al ristorante ho ordinato una zuppa di *aragosta* che era semplicemente squisita.
  Im Restaurant habe ich eine Hummer-Suppe bestellt, die einfach köstlich *war*.
  
  Nonostante il prezzo elevato, l'*aragosta* è un piatto molto pregiato.
  Trotz des hohen Preises ist der Hummer ein sehr wertvolles Gericht.
  
  Se vedi un *aragosta* viva nel mercato, sappi che è freschissima.
  Wenn du einen lebenden Hummer auf dem Markt siehst, weißt du, dass er frisch *ist*.
  
  In quella baia gli abitanti pescavano *aragoste* con le nasse ogni mattina.
  In dieser Bucht fingen die Einwohner jeden Morgen Hummer mit den Reusen.
  
  L'*aragosta* che ho cucinato ieri sera non aveva il sapore che mi aspettavo.
  Der Hummer, den ich gestern Abend gekocht habe, hatte nicht den Geschmack, den ich *erwartete*.
