Rang: 4222
Wort: carota
Wortart: n.f
Wort mit Artikel: la carota
Femininum / Plural: carote
IPA: ''
Definition: die Karotte, -n
Register: ''
Beispielsätze: |-
  Luigi ha comprato cinque *carote* al mercato perché gli servono per la cena.
  Luigi hat fünf *Karotten* auf dem Markt gekauft, weil er sie fürs Abendessen braucht.
  
  Se aggiungi una *carota* al sugo, lo renderà più dolce e profumato.
  Wenn du eine *Karotte* in die Sauce gibst, wird sie süßer und aromatischer.
  
  La nonna disse ai nipoti: "Non mangiate la *carota* cruda se non è biologica!".
  Die Oma sagte zu den Enkeln: "Esst die *Karotte* nicht roh, wenn sie nicht aus biologischem Anbau ist!".
  
  Dopo aver sbucciato le *carote*, le tagliò a rondelle sottili per la zuppa.
  Nachdem sie die *Karotten* geschält hatte, schnitt sie sie für die Suppe in dünne Scheiben.
  
  Il contadino promise che quest’anno le *carote* sarebbero state più grandi perché ha usato un nuovo fertilizzante.
  Der Bauer versprach, dass die *Karotten* dieses Jahr größer sein würden, weil er einen neuen Dünger verwendet hatte.
