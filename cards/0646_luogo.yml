Rang: 646
Wort: luogo
Wortart: n.m
Wort mit Artikel: il luogo
Femininum / Plural: i luoghi
IPA: ''
Definition: der Ort, -e, die Stelle, -n
Register: ''
Beispielsätze: |-
  Il *luogo* in cui ci siamo incontrati era molto romantico.
  Der *Ort*, an dem wir uns getroffen haben, war sehr romantisch.
  
  Non ricordi il *luogo* esatto dove hai parcheggiato la macchina?
  Erinnerst du dich nicht an den *genauen Ort*, wo du das Auto geparkt hast?
  
  È cambiato il *luogo* della riunione di domani alle 15.
  Der *Ort* des Treffens morgen um 15 Uhr hat sich geändert.
  
  Vorrei sapere il *luogo* di nascita di Leonardo da Vinci.
  Ich möchte den *Geburtsort* von Leonardo da Vinci wissen.
  
  In questo *luogo* si respira un’atmosfera magica.
  An diesem *Ort* spürt man eine magische Atmosphäre.
