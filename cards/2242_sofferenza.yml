Rang: 2242
Wort: sofferenza
Wortart: n.f
Wort mit Artikel: la sofferenza
Femininum / Plural: sofferenze
IPA: ''
Definition: das Leid, -e
Register: ''
Beispielsätze: |-
  La *sofferenza* di molti animali nei circhi è ormai evidente a tutti.
  Das *Leid* vieler Tiere in Zirkussen ist mittlerweile offensichtlich.
  
  Dopo l’incidente, ha provato una *sofferenza* che non credeva possibile.
  Nach dem Unfall spürte er eine *Qual*, die er nicht für möglich gehalten hätte.
  
  Anche se il male fisico è passato, la *sofferenza* emotiva rimane.
  Obwohl der körperliche Schmerz vorbei ist, bleibt die seelische *Belastung*.
  
  La *sofferenza* di chi perde un figlio è qualcosa che non si può descrivere a parole.
  Das *Leid* derer, die ein Kind verlieren, ist etwas, das man nicht in Worte fassen kann.
  
  Benchè sia una *sofferenza* breve, la febbre alta può essere molto pericolosa per i bambini piccoli.
  Auch wenn es eine kurze *Qual* ist, kann hohes Fieber für kleine Kinder sehr gefährlich sein.
