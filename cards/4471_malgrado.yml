Rang: 4471
Wort: malgrado
Wortart: adv
Wort mit Artikel: malgrado
Femininum / Plural: ''
IPA: ''
Definition: trotzdem, dennoch, obwohl
Register: ''
Beispielsätze: |-
  Ho perso il treno, *malgrado* fossi partito con mezz'ora di anticipo.
  Ich habe den Zug verpasst, *trotz* dass ich eine halbe Stunde früher losgefahren war.
  
  Maria ha accettato il lavoro *malgrado* le condizioni fossero pessime.
  Maria hat die Stelle angenommen, *trotz* der schlechten Bedingungen.
  
  Non uscirò stasera, *malgrado* tu mi abbia invitato più volte.
  Ich werde heute Abend nicht ausgehen, *trotzdem* du mich mehrmals eingeladen hast.
  
  *Malgrado* le previsioni meteo annunciassero pioggia, siamo andati al mare.
  *Trotz* der Wettervorhersage, die Regen angekündigt hatte, sind wir ans Meer gefahren.
  
  *Malgrado* l'opposizione dei vicini, il sindaco ha deciso di costruire il nuovo parco.
  *Trotz* des Widerstands der Nachbarn hat der Bürgermeister beschlossen, den neuen Park zu bauen.
