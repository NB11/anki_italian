Rang: 3053
Wort: barone
Wortart: n.m
Wort mit Artikel: il barone
Femininum / Plural: i baroni
IPA: ''
Definition: der Baron, -e
Register: ''
Beispielsätze: |-
  Il *barone* possiede una grande tenuta nella campagna toscana.
  Der *Baron* besitzt ein großes Anwesen in der toskanischen Landschaft.
  
  Il re donò il titolo di *barone* al suo fedele servo per i servizi resi.
  Der König verlieh *Baron*-Titel seinem treuen Diener für dessen Dienste.
  
  Tutti sanno che il *barone* è un uomo molto ricco, ma nessuno sa da dove provenga la sua fortuna.
  Jeder weiß, dass der *Baron* ein sehr reicher Mann ist, aber niemand kennt den Ursprung seines Vermögens.
  
  Il *barone*, che era noto per il suo carattere severo, fece radunare i contadini nella piazza del paese.
  Der *Baron*, der für seinen strengen Charakter bekannt war, ließ die Bauern auf dem Dorfplatz versammeln.
  
  Sebbene il *barone* fosse rispettato, molti lo biasimavano per le tasse troppo alte che imponeva.
  Obwohl der *Baron* respektiert wurde, kritisierten ihn viele für die hohen Steuern, die er vorschrieb.
