Rang: 518
Wort: voce
Wortart: n.f
Wort mit Artikel: la voce
Femininum / Plural: voci
IPA: ''
Definition: die Stimme, -n
Register: ''
Beispielsätze: |-
  La *voce* del cantante era così bella che tutti applaudirono entusiasti.
  Die *Stimme* des Sängers war so schön, dass alle begeistert applaudierten.
  
  Credo che tu abbia una *voce* molto chiara, come quella di un attore professionista.
  Ich glaube, du hast eine sehr klare *Stimme*, wie die eines Profi-Schauspielers.
  
  Se avessi una *voce* così potente, potrei gridare anche dalla cima di questa montagna!
  Wenn ich eine so kräftige *Stimme* hätte, könnte ich sogar von diesem Berg aus rufen!
  
  Nonostante avesse paura, riuscì a mantenere ferma la *voce* quando parlò in pubblico.
  Trotz seiner Angst gelang es ihm, die *Stimme* ruhig zu halten, als er vor Publikum sprach.
  
  La *voce* di quell’uomo misterioso sembrava provenire da un altro mondo, tanto era profonda e strana.
  Die *Stimme* dieses mysteriösen Mannes klang so, als käme sie aus einer anderen Welt – so tief und fremd war sie.
