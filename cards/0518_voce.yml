Rang: 518
Wort: voce
Wortart: n.f
Wort mit Artikel: la voce
Femininum / Plural: voci
IPA: ''
Definition: die Stimme, Stimme, Stimmen
Register: ''
Beispielsätze: |-
  La *voce* del cantante è molto bella.
  Die *Stimme* des Sängers ist sehr schön.
  
  Hai sentito la mia *voce* al telefono?
  Hast du meine *Stimme* am Telefon gehört?
  
  Nelle favole la *voce* di un animale può essere magica.
  In Märchen kann die *Stimme* eines Tieres magisch sein.
  
  Non mi fido delle *voci* che circolano in ufficio.
  Ich vertraue den *Gerüchten*, die im Büro kursieren, nicht.
  
  La prego di abbassare la *voce*: il bambino dorme.
  Bitte sprechen Sie leiser: Das Kind schläft.
