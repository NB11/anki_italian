Rang: 4784
Wort: animare
Wortart: vt
Wort mit Artikel: animare
Femininum / Plural: ''
IPA: ''
Definition: beleben, animieren
Register: ''
Beispielsätze: |-
  Il regista cerca di *animare* la scena con una musica più energetica.
  Der Regisseur versucht, die Szene mit *energetischerer* Musik zu beleben.
  
  Non *animare* troppo i bambini prima di andare a letto!
  Erreg die Kinder vor dem Schlafengehen nicht zu sehr *!*
  
  La scienziata ha *animato* il dibattito con le sue ricerche innovative.
  Die Wissenschaftlerin hat die Diskussion mit ihren innovativen Forschungen *belebt*.
  
  Se *animassi* anche tu la festa, sarebbe molto più divertente!
  Wenn du die Party auch *belebst*, wäre sie viel lustiger!
  
  È importante che la comunità *animata* dai volontari non perda la speranza.
  Es ist wichtig, dass die von den Freiwilligen *belebte* Gemeinschaft die Hoffnung nicht verliert.
