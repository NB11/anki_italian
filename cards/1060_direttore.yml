Definition: der Direktor, -en, der Leiter, -
Register: ''
Beispielsätze: |-
  Il *direttore* ha convocato una riunione per domani mattina alle nove.
  Der *Direktor* hat ein Meeting für morgen früh um neun einberufen.
  
  Nonostante le difficoltà, il *direttore* è riuscito a confermare i risultati dell’indagine.
  Trotz der Schwierigkeiten gelang es dem *Direktor*, die Ergebnisse der Untersuchung zu bestätigen.
  
  Se fossi il *direttore*, non contatterei tutti i padroni degli animali senza prima verificare i loro documenti.
  Wäre ich der *Direktor*, würde ich nicht alle Besitzer der Tiere kontaktieren, ohne vorher ihre Papiere zu überprüfen.
  
  La notizia che il *direttore* avrebbe cancellato il progetto ha causato una grande sensazione tra i colleghi.
  Die Nachricht, dass der *Direktor* das Projekt hätte löschen sollen, hat unter den Kollegen große Aufregung ausgelöst.
  
  Il *direttore*, che aveva una fiducia incrollabile nel suo team, decise di dividere le responsabilità con i suoi migliori collaboratori.
  Der *Direktor*, der ein unerschütterliches Vertrauen in sein Team hatte, beschloss, die Verantwortlichkeiten mit seinen besten Mitarbeitern zu teilen.
