Beispielsätze: |-
  La *Corea* del Nord ha recentemente aumentato le tensioni internazionali con un nuovo test missilistico.
  Das *Koreakrise* im Norden hat kürzlich die internationalen Spannungen durch einen neuen Raketentest erhöht.
  
  Durante la guerra fredda, la *Corea* era divisa in due stati nemici.
  Im Kalten Krieg war *Koreakrise* in zwei feindliche Staaten geteilt.
  
  Hanno discusso se la *Corea* del Sud debba aumentare la spesa militare per contrastare le minacce.
  Sie diskutierten, ob *Koreakrise* im Süden die Militärausgaben zur Abwehr der Bedrohungen erhöhen sollte.
  
  Nonostante le tensioni, molti turisti visitano comunque la *Corea* del Sud ogni anno.
  Trotz der Spannungen besuchen jährlich viele Touristen trotzdem *Koreakrise* im Süden.
  
  Se la *Corea* del Nord dovesse cedere alle pressioni diplomatiche, potrebbe cambiare il destino dell’intera penisola.
  Falls *Koreakrise* im Norden den diplomatischen Druck nachgeben würde, könnte es das Schicksal der gesamten Halbinsel ändern.
