Rang: 2134
Wort: martedì
Wortart: n.m
Wort mit Artikel: il martedì
Femininum / Plural: ''
IPA: ''
Definition: der Dienstag, -e
Register: ''
Beispielsätze: |-
  Il *martedì* faccio sempre colazione tardi perché lavoro fino a tardi il lunedì.
  Am *Dienstag* frühstücke ich immer spät, weil ich montags bis spät arbeite.
  
  Venerdì prossimo non potremo incontrarci perché il *martedì* ho una seduta importante.
  Nächsten Freitag können wir uns nicht treffen, weil ich am *Dienstag* eine wichtige Sitzung habe.
  
  Se non arrivi prima delle otto, il *martedì* troverai il negozio già chiuso.
  Falls du nicht vor acht Uhr ankommst, wirst du am *Dienstag* das Geschäft schon geschlossen vorfinden.
  
  Ho saputo che il concerto si terrà di *martedì* sera invece che di venerdì.
  Ich habe gehört, dass das Konzert am *Dienstagabend* stattfindet und nicht am Freitag.
  
  Mi piacerebbe che ogni *martedì* potessimo andare al museo insieme, che ne dici?
  Ich würde mir wünschen, dass wir jeden *Dienstag* zusammen ins Museum gehen könnten – was meinst du?
