Rang: 701
Wort: visita
Wortart: n.f
Wort mit Artikel: la visita
Femininum / Plural: visite
IPA: ''
Definition: der Besuch, -e
Register: ''
Beispielsätze: |-
  Ho fatto una *visita* al museo ieri pomeriggio.
  Ich habe gestern Nachmittag eine *Besichtigung* des Museums gemacht.
  
  La *visita* dal medico era molto lunga oggi.
  Der *Arztbesuch* heute war sehr lang.
  
  Che tipo di *visita* preferisci quando viaggi?
  Welche Art von *Besuch* bevorzugst du, wenn du reist?
  
  Senza la *visita* guidata non avremmo capito nulla.
  Ohne die *geführte Besichtigung* hätten wir nichts verstanden.
  
  Le *visite* in ospedale sono sempre tristi.
  Die *Besuche* im Krankenhaus sind immer traurig.
