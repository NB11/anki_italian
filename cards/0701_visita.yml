Rang: 701
Wort: visita
Wortart: n.f
Wort mit Artikel: la visita
Femininum / Plural: visite
IPA: ''
Definition: der Besuch, -e
Register: ''
Beispielsätze: |-
  La *visita* del medico è necessaria per la salute.
  Der Besuch des Arztes ist *notwendig* für die Gesundheit.
  
  Dopo la *visita* al negozio ho comprato due scarpe nuove.
  Nach dem Besuch im Geschäft habe ich zwei neue Schuhe gekauft.
  
  Spero che la sua *visita* al museo sia meravigliosa.
  Ich hoffe, dass sein Besuch im Museum wunderbar ist.
  
  La *visita* dei nonni dura solo un giorno, ma ci porta sempre tanta gioia.
  Der Besuch der Großeltern dauert nur einen Tag, aber er bringt uns immer viel Freude.
  
  Se hai tempo, accompagna tua sorella durante la *visita* dal dentista.
  Wenn du Zeit hast, begleite deine Schwester während des Besuchs beim Zahnarzt.
