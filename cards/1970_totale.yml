Rang: 1970
Wort: totale
Wortart: adj
Wort mit Artikel: totale
Femininum / Plural: ''
IPA: ''
Definition: gesamt, vollständig
Register: ''
Beispielsätze: |-
  La somma *totale* della spesa ammonta a cento euro.
  Die *gesamte* Summe des Einkaufs beträgt hundert Euro.
  
  Non ha capito il *totale* disinteresse che provavi per la sua idea.
  Er hat dein *völliges* Desinteresse für seine Idee nicht verstanden.
  
  Se avessi saputo il danno *totale*, avrei chiamato subito i vigili del fuoco.
  Wenn ich den *vollen* Schaden gekannt hätte, hätte ich sofort die Feuerwehr gerufen.
  
  Che cosa rappresenta il *totale* delle perdite? Non può essere così tanto!
  Was stellt der *Gesamt*-Verlust dar? Das kann doch nicht so viel sein!
  
  La *totale* mancanza di rispetto lo ha fatto arrabbiare profondamente.
  Die *völlige* Respektlosigkeit hat ihn zutiefst wütend gemacht.
