Rang: 1883
Wort: indizio
Wortart: n.m
Wort mit Artikel: l'indizio
Femininum / Plural: indizi
IPA: ''
Definition: der Hinweis, -e, die Spur, -en
Register: ''
Beispielsätze: |-
  Non abbiamo ancora trovato *indizi* concreti sul caso.
  Wir haben noch keine *konkreten Hinweise* auf den Fall gefunden.
  
  Secondo l’investigatore, l’*indizio* più importante è stato ignorato.
  Laut dem Ermittler wurde der *wichtigste Hinweis* ignorato.
  
  Se avessimo un nuovo *indizio*, potremmo risolvere il mistero.
  Wenn wir einen neuen *Hinweis* hätten, könnten wir das Rätsel lösen.
  
  Ha confessato solo dopo aver visto *indizi* inconfutabili.
  Er hat erst gestanden, nachdem er *unbestreitbare Beweise* gesehen hatte.
  
  Ogni *indizio* conta, anche quelli apparentemente insignificanti.
  Jeder *Hinweis* zählt, auch die scheinbar unwichtigen.
