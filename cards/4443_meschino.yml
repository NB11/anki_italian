Rang: 4443
Wort: meschino
Wortart: adj
Wort mit Artikel: meschino
Femininum / Plural: ''
IPA: ''
Definition: armselig, gemein, geizig
Register: ''
Beispielsätze: |-
  Non è *meschino* preoccuparsi per il benessere dei propri figli.
  Es ist nicht *armselig*, sich um das Wohlbefinden der eigenen Kinder zu sorgen.
  
  Quell’uomo ha un atteggiamento così *meschino* da infastidire tutti gli inquilini del palazzo.
  Dieser Mann hat eine so *gemeine* Haltung, dass alle Mieter des Gebäudes genervt sind.
  
  Secondo la psicologia, le persone *meschine* spesso agiscono per invidia o paura.
  Laut der *Psychologie* handeln geizige Menschen oft aus Neid oder Angst.
  
  Nonostante il successo, si sente *meschino* perché non riesce a condividere niente con gli altri.
  Trotz des Erfolgs fühlt er sich *armselig*, weil er nichts mit anderen teilen kann.
  
  È *meschino* da parte tua criticare chi lotta disperatamente per un futuro migliore.
  Es ist *gemein* von dir, jemanden zu kritisieren, der sich verzweifelt für eine bessere Zukunft einsetzt.
