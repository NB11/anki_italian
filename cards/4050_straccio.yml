Beispielsätze: |-
  Ho comprato *stracci* vecchi per pulire il pavimento sporco.
  Ich habe alte *Lumpen* gekauft, um den schmutzigen Boden zu putzen.
  
  Dopo la festa, c'erano *stracci* sparsi dappertutto sul pavimento.
  Nach der Party lagen überall *Lumpen* verstreut auf dem Boden.
  
  Se vuoi, posso portarti alcuni *stracci* per lucidare i vetri della macchina.
  Falls du möchtest, kann ich dir ein paar *Lumpen* mitbringen, um die Autofenster zu polieren.
  
  Non buttare via questi *stracci*, potrebbero ancora servire per qualcosa.
  Wirf diese *Lumpen* nicht weg, sie könnten noch nützlich sein.
  
  Mi ricordo che mia nonna usava sempre *stracci* di cotone per lavare i piatti.
  Ich erinnere mich, dass meine Oma immer Baumwoll*lumpen* zum Abwasch benutzt hat.
