Rang: 1329
Wort: assistente
Wortart: n.m./n.f.
Wort mit Artikel: assistente
Femininum / Plural: ''
IPA: ''
Definition: der Assistent, -en, die Assistentin, -nen
Register: ''
Beispielsätze: |-
  Il *assistente* del direttore ha organizzato la riunione per domani mattina.
  Der *Assistent* des Direktors hat das Meeting für morgen Vormittag organisiert.
  
  Ho parlato con l’*assistente* che mi ha spiegato la nuova procedura passo passo.
  Ich habe mit der *Assistentin* gesprochen, die mir das neue Verfahren Schritt für Schritt erklärt hat.
  
  Senza un buon *assistente* in ufficio, tutto diventa molto più complicato, vero?
  Ohne eine gute *Assistentin* im Büro wird alles viel komplizierter, nicht wahr?
  
  Se avessi un *assistente* così efficiente, potrei partecipare a quel convegno senza preoccuparmi.
  Wenn ich so einen effizienten *Assistenten* hätte, könnte ich an dieser Konferenz teilnehmen, ohne mir Sorgen zu machen.
  
  L’*assistente* medico mi ha detto che devo prendere le medicine tre volte al giorno, ma non ricordo mai l’ora giusta.
  Der *Assistent* Arzt hat mir gesagt, dass ich die Medikamente dreimal täglich nehmen muss, aber ich vergesse die richtige Zeit immer.
