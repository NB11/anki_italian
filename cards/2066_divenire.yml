Beispielsätze: |-
  Con l’età, la sua memoria *è divenuta* molto fragile.
  Mit der Zeit ist sein Gedächtnis *zurückgegangen*.
  
  Se non studierai di più, *diventerai* uno sciocco come lui.
  Wenn du nicht mehr lernst, wirst du *ein Dummkopf wie er*.
  
  Temo che il team *sia divenuto* troppo sicuro di sé dopo la vittoria.
  Ich fürchte, dass die Mannschaft nach dem Sieg *zu selbstsicher geworden ist*.
  
  Non appena avrà finito di leggere, *diventerà* un vero leader.
  Sobald er mit dem Lesen fertig ist, wird er *ein wahrer Anführer*.
  
  Era inevitabile che la situazione *diventasse* insostenibile senza un supporto commerciale.
  Es war unvermeidlich, dass die Situation *unhaltbar wurde* ohne wirtschaftliche Hilfe.
