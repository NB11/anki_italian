Rang: 3432
Wort: addirsi
Wortart: vi
Wort mit Artikel: addirsi
Femininum / Plural: ''
IPA: ''
Definition: passen, sich eignen
Register: ''
Beispielsätze: |-
  Questo vestito non *si addice* affatto a una festa formale.
  Dieses Kleid *passt* überhaupt nicht zu einer formellen Feier.
  
  Mi chiedevo se questo lavoro *si addicesse* alle mie competenze.
  Ich fragte mich, ob dieser Job *sich eignen* würde für meine Fähigkeiten.
  
  Dicono che il giallo *si addica* al tuo carattere, invece il rosso no.
  Man sagt, dass Gelb *zu* deinem Charakter passt, aber Rot nicht.
  
  Se il colore *si addice* al tuo stile, allora compralo!
  Wenn die Farbe *zu* deinem Stil passt, dann kauf sie dir!
  
  Non credevo che questa situazione *si addicesse* a una coppia sposata.
  Ich hätte nicht gedacht, dass diese Situation *zu* einem verheirateten Paar passt.
