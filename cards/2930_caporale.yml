Rang: 2930
Wort: caporale
Wortart: n.m
Wort mit Artikel: il caporale
Femininum / Plural: caporali
IPA: ''
Definition: der Unteroffizier, -e
Register: ''
Beispielsätze: |-
  Il *caporale* sta istruendo i soldati nella piazza d’armi.
  Der *Unteroffizier* bildet die Soldaten auf dem Kasernenhof aus.
  
  Se fossi più bravo, diventerei un *caporale* in pochi mesi.
  Wenn ich besser wäre, würde ich in wenigen Monaten ein *Unteroffizier*.
  
  Non è facile comandare come un *caporale*, soprattutto in guerra.
  Es ist nicht einfach, wie ein *Unteroffizier* zu befehligen, besonders im Krieg.
  
  Il *caporale* che hai conosciuto ieri si è arruolato da poco.
  Der *Unteroffizier*, den du gestern kennengelernt hast, hat sich erst kürzlich eingeschrieben.
  
  Dopo l’addestramento avanzato, molti *caporali* vengono promossi sergenti.
  Nach der Fortbildung werden viele *Unteroffiziere* zu Feldwebeln befördert.
