Rang: 2459
Wort: muscolo
Wortart: n.m
Wort mit Artikel: il muscolo
Femininum / Plural: muscoli
IPA: ''
Definition: der Muskel, -n
Register: ''
Beispielsätze: |-
  Durante l'allenamento ho sentito un dolore al *muscolo* della gamba destra.
  Während des Trainings spürte ich einen Schmerz im *Muskel* des rechten Beins.
  
  Il fisioterapista mi ha detto di fare degli esercizi per rinforzare i *muscoli* della schiena.
  Der Physiotherapeut hat mir gesagt, ich solle Übungen machen, um die *Muskeln* des Rückens zu stärken.
  
  Se non alleni i *muscoli* regolarmente, perderai la forza che hai guadagnato.
  Wenn du die *Muskeln* nicht regelmäßig trainierst, wirst du die Kraft, die du gewonnen hast, verlieren.
  
  Ha un *muscolo* contratto che gli causa molta fastidio quando si muove.
  Er hat einen verspannten *Muskel*, der ihm große Probleme bereitet, wenn er sich bewegt.
  
  I *muscoli* si sviluppano meglio se mangi abbastanza proteine ogni giorno.
  Die *Muskeln* entwickeln sich besser, wenn du täglich genug Proteine isst.
