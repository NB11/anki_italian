Rang: 3416
Wort: distante
Wortart: adj
Wort mit Artikel: distante
Femininum / Plural: ''
IPA: ''
Definition: entfernt, fern, weit weg
Register: ''
Beispielsätze: |-
  Dopo *distante* viaggio, finalmente siamo arrivati a Roma.
  Nach *langer* Reise sind wir endlich in Rom angekommen.
  
  La stazione è *distante* meno di un chilometro dal centro.
  Der Bahnhof ist *weniger als* einen Kilometer vom Zentrum entfernt.
  
  Ho saputo che il tuo ufficio è *distante* dal mio, ma non sapevo quanto.
  Ich habe gehört, dass dein Büro *weit von* meinem entfernt ist, aber nicht wie sehr.
  
  Se la spiaggia fosse *distante* di più, preferirei restare in città.
  Wenn der Strand *weiter entfernt* wäre, würde ich lieber in der Stadt bleiben.
  
  Credo che la verità sia *distante* anni luce da ciò che racconta.
  Ich glaube, die Wahrheit ist *Lichtjahre von* dem entfernt, was er erzählt.
