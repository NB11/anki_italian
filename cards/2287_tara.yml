Rang: 2287
Wort: tara
Wortart: n.f
Wort mit Artikel: la tara
Femininum / Plural: tare
IPA: ''
Definition: der Tara-Wert, die Tara
Register: ''
Beispielsätze: |-
  Il peso della scatola include *tara* del contenitore.
  Das Gewicht der Schachtel enthält den *Tara-Wert* des Behälters.
  
  Hanno calcolato *tara* e peso netto separatamente per il documento.
  Sie haben den *Tara-Wert* und das Nettogewicht in der Rechnung getrennt berechnet.
  
  La *tara* di questo camion supera i duecento chili.
  Die *Tara* dieses LKWs beträgt über zweihundert Kilogramm.
  
  Se non sottrai *tara* dal lordo, il calcolo è sbagliato.
  Wenn du die *Tara* nicht vom Bruttogewicht abziehst, ist die Berechnung falsch.
  
  La dogana chiede sempre di dichiarare *tara* nei documenti di trasporto.
  Der Zoll verlangt immer die Angabe des *Tara-Werts* in den Frachtpapieren.
