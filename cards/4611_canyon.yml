Rang: 4611
Wort: canyon
Wortart: n.m
Wort mit Artikel: il canyon
Femininum / Plural: canyon
IPA: ''
Definition: der Canyon, -s
Register: ''
Beispielsätze: |-
  Il *canyon* del Colorado è famoso in tutto il mondo per le sue pareti rocciose imponenti.
  Der *Canyon* von Colorado ist weltweit für seine imposanten Felswände bekannt.
  
  Durante la nostra escursione abbiamo attraversato un *canyon* stretto e profondo.
  Während unserer Wanderung durchquerten wir einen engen und tiefen *Canyon*.
  
  Se visiterai l’Arizona, non perdere il Grand *Canyon* al tramonto.
  Wenn du Arizona besuchst, verpasse nicht den Grand *Canyon* bei Sonnenuntergang.
  
  Gli escursionisti si sono accampati ai margini del *canyon* per ammirare le stelle.
  Die Wanderer lagerten am Rand des *Canyons*, um die Sterne zu bewundern.
  
  Il geologo ha spiegato come si formano i *canyon* attraverso l’erosione dell’acqua nel corso di milioni di anni.
  Der Geologe erklärte, wie *Canyons* durch die Erosion von Wasser über Millionen von Jahren entstehen.
