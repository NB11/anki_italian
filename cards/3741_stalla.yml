Rang: 3741
Wort: stalla
Wortart: n.f
Wort mit Artikel: la stalla
Femininum / Plural: stalle
IPA: ''
Definition: der Stall, -¨e
Register: ''
Beispielsätze: |-
  La *stalla* dei contadini era piena di odore di fieno e letame.
  Der *Stall* der Bauern war voller Heu- und Mistgeruch.
  
  Mentre cercavamo il gatto, abbiamo trovato una *stalla* abbandonata dietro il bosco.
  Während wir die Katze suchten, fanden wir einen verlassenen *Stall* hinter dem Wald.
  
  Se non avessimo riparato il tetto della *stalla*, le pecore sarebbero bagnate ora.
  Wenn wir das Dach des *Stalls* nicht repariert hätten, wären die Schafe jetzt nass.
  
  I turisti rimangono sempre affascinati dalle vecchie *stalle* di montagna con le loro finestre piccole.
  Die Touristen sind immer fasziniert von den alten *Ställen* in den Bergen mit ihren kleinen Fenstern.
  
  Dopo la tempesta, la *stalla* era l'unico posto dove potevamo ripararci dalla pioggia battente.
  Nach dem Sturm war der *Stall* der einzige Ort, an dem wir uns vor dem strömenden Regen schützen konnten.
