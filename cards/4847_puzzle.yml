Rang: 4847
Wort: puzzle
Wortart: n.m
Wort mit Artikel: il puzzle
Femininum / Plural: i puzzle
IPA: ''
Definition: das Puzzle, -s
Register: ''
Beispielsätze: |-
  Mi piacciono i *puzzle* perché sono rilassanti dopo il lavoro.
  Mir gefallen *Puzzles*, weil sie nach der Arbeit entspannend sind.
  
  Non trovo più l’ultimo pezzo del *puzzle* che abbiamo iniziato ieri.
  Ich finde das letzte Stück des *Puzzles* nicht mehr, das wir gestern angefangen haben.
  
  Questo *puzzle* ha ben 1000 pezzi, ci vorrà tutta la sera!
  Dieses *Puzzle* hat ganze 1000 Teile – dafür brauchen wir den ganzen Abend!
  
  Ho regalato un bellissimo *puzzle* tridimensionale a mio nipote per Natale.
  Ich habe meinem Neffen zu Weihnachten ein wunderschönes dreidimensionales *Puzzle* geschenkt.
  
  Anche se è complicato, non abbandono mai il mio *puzzle* a metà strada.
  Auch wenn es kompliziert ist, gebe ich mein *Puzzle* niemals auf, bevor es fertig ist.
