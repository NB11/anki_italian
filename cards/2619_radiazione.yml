Rang: 2619
Wort: radiazione
Wortart: n.f
Wort mit Artikel: la radiazione
Femininum / Plural: radiazioni
IPA: ''
Definition: die Strahlung, -en
Register: ''
Beispielsätze: |-
  La *radiazione* ultravioletta può danneggiare la pelle se non si usa una crema protettiva.
  Die *Ultraviolettstrahlung* kann die Haut schädigen, wenn man keine Sonnencreme verwendet.
  
  Gli scienziati studiano l’effetto della *radiazione* sull’ambiente da anni.
  Wissenschaftler untersuchen seit Jahren die Auswirkung der *Strahlung* auf die Umwelt.
  
  Se hai ricevuto una forte dose di *radiazioni*, consulta immediatamente un medico.
  Wenn du eine hohe Dosis *Strahlung* abbekommen hast, suche sofort einen Arzt auf.
  
  Secondo il report, la *radiazione* emessa da questo apparecchio è inferiore ai limiti di sicurezza.
  Laut dem Bericht liegt die von diesem Gerät ausgehende *Strahlung* unter den Sicherheitsgrenzen.
  
  Non sapevo che le *radiazioni* potessero anche essere utilizzate per curare certi tumori.
  Mir war nicht klar, dass *Strahlungen* auch zur Behandlung bestimmter Tumore eingesetzt werden können.
