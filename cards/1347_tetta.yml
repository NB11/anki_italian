Rang: 1347
Wort: tetta
Wortart: n.f
Wort mit Artikel: la tetta
Femininum / Plural: tette
IPA: ''
Definition: die *Brust*, -¨e, die Titte, -n
Register: ''
Beispielsätze: |-
  La *tetta* sinistra è leggermente più grande di quella destra, ma non me ne vergogno affatto.
  Die linke *Brust* ist etwas größer als die rechte, aber ich schäme mich überhaupt nicht dafür.
  
  Quel pittore del Rinascimento dipingeva le *tette* delle donne con una particolare attenzione ai dettagli anatomici.
  Jener Renaissance-Maler stellte die *Brüste* der Frauen mit besonderer Aufmerksamkeit auf anatomische Details dar.
  
  Nonostante le critiche, lei ha sempre indossato vestiti che mettevano in risalto le sue *tette* perfettamente proporzionate.
  Trotz der Kritik trug sie immer Kleidung, die ihre *üppigen Brüste* perfekt zur Geltung brachte.
  
  Il medico mi ha assicurato che le *tette* sono sane, ma consiglia di fare una mammografia ogni due anni per sicurezza.
  Der Arzt versicherte mir, dass die *Brust* gesund ist, rät aber trotzdem zu einer Mammographie alle zwei Jahre zur Sicherheit.
  
  In alcune culture le *tette* sono considerate simbolo di fertilità e femminilità, mentre in altre vengono nascoste per pudore.
  In einigen Kulturen gelten *Brüste* als Symbol für Fruchtbarkeit und Weiblichkeit, während sie in anderen aus Scham bedeckt werden.
