Rang: 835
Wort: segnale
Wortart: n.m
Wort mit Artikel: il segnale
Femininum / Plural: segnali
IPA: ''
Definition: das Signal, -e
Register: ''
Beispielsätze: |-
  Il *seguale* luminoso sulla strada è rotto da ieri sera.
  Das *Signal* an der Straße ist seit gestern Abend kaputt.
  
  Nonostante il *segnale* di pericolo, molti guidatori non rallentano.
  Trotz des *Warningsignals* bremsen viele Fahrer nicht ab.
  
  Hanno installato un nuovo *segnale* stradale vicino alla chiesa.
  Sie haben ein neues Straßenschild in der Nähe der Kirche aufgestellt.
  
  Se non rispetti i *segnali*, finirai nei guai con la polizia.
  Wenn du die *Signale* nicht beachtest, wirst du Ärger mit der Polizei bekommen.
  
  Il *segnale* di fumo era un messaggio in codice per i pescatori in mare.
  Das Rauch*signal* war eine verschlüsselte Nachricht für die Fischer auf dem Meer.
