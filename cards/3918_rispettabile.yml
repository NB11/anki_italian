Rang: 3918
Wort: rispettabile
Wortart: adj
Wort mit Artikel: rispettabile
Femininum / Plural: ''
IPA: ''
Definition: respektabel, achtbar
Register: ''
Beispielsätze: |-
  È una persona *rispettabile* che gode di grande stima nella comunità.
  Er ist eine *respektable* Person, die in der Gemeinde großes Ansehen genießt.
  
  Non mi sembra *rispettabile* che tu parli così dei tuoi colleghi.
  Es erscheint mir nicht *achtbar*, dass du so über deine Kollegen sprichst.
  
  Questa società è considerata *rispettabile* da tutti i suoi clienti.
  Diese Firma wird von allen ihren Kunden als *respektabel* angesehen.
  
  Se fossi un genitore, vorrei che mio figlio frequentasse ambienti *rispettabili*.
  Wäre ich ein Elternteil, würde ich wollen, dass mein Kind *respektable* Umgebungen besucht.
  
  Nonostante l’età, ha sempre mantenuto un aspetto *rispettabile* e dignitoso.
  Trotz des Alters hat er stets ein *achtbares* und würdevolles Erscheinungsbild bewahrt.
