Rang: 92
Wort: finire
Wortart: vi
Wort mit Artikel: finire
Femininum / Plural: ''
IPA: ''
Definition: enden, beenden, fertig sein
Register: ''
Beispielsätze: |-
  Quando *finisce* il film, usciamo?
  Wenn *endet* der Film, gehen wir raus?
  
  Ho *finito* di studiare alle otto di sera.
  Ich habe um acht Uhr abends *aufgehört*, zu lernen.
  
  *Finiresti* il progetto entro domani, per favore?
  *Könntest* du das Projekt bis morgen *beenden*, bitte?
  
  Non *finiamo* mai di ridere!
  Wir *hören* nie auf, zu lachen!
  
  Spero che *finisca* presto la conferenza.
  Ich hoffe, dass die Konferenz bald *vorbei ist*.
