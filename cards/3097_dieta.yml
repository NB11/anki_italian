Rang: 3097
Wort: dieta
Wortart: n.f
Wort mit Artikel: la dieta
Femininum / Plural: diete
IPA: ''
Definition: die Diät, -en
Register: ''
Beispielsätze: |-
  Seguo una *dieta* equilibrata perché ho bisogno di energia.
  Ich folge einer *ausgewogenen Diät*, weil ich Energie brauche.
  
  Se mangi troppo cioccolato, la tua *dieta* non sarà sana.
  Wenn du zu viel Schokolade isst, wird deine *Ernährung* nicht gesund sein.
  
  Ha iniziato una *dieta* senza glutine perché è celiaca.
  Sie hat eine *glutenfreie Diät* begonnen, weil sie Zöliakie hat.
  
  La *dieta* mediterranea è famosa per i suoi benefici.
  Die *mediterrane Ernährung* ist für ihre Vorteile bekannt.
  
  Molti non rispettano la *dieta* che i medici consigliano dopo l’intervento.
  Viele halten sich nicht an die *Diät*, die die Ärzte nach dem Eingriff empfehlen.
