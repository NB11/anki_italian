Rang: 940
Wort: accusare
Wortart: vt
Wort mit Artikel: accusare
Femininum / Plural: ''
IPA: ''
Definition: anklagen, beschuldigen
Register: ''
Beispielsätze: |-
  Il giudice ha *accusato* l'imputato di furto con prove convincenti.
  Der Richter hat den Angeklagten *mit* überzeugenden Beweisen beschuldigt.
  
  Nonostante le accuse, lei continua a *accusare* gli altri di essere incompetenti.
  Trotz der Vorwürfe beschuldigt sie weiterhin andere, inkompetent zu sein.
  
  Il marito *accusò* la moglie di tradimento, ma era tutto falso.
  Der Ehemann *klagte* seine Frau des Betrugs an, doch es war alles falsch.
  
  Se avessi saputo la verità, non avrei osato *accusare* il mio migliore amico ingiustamente.
  Hätte ich die Wahrheit gekannt, hätte ich nicht gewagt, meinen besten Freund zu Unrecht *anzuklagen*.
  
  La polizia ha deciso di non *accusare* il ragazzo, poiché non c'erano prove sufficienti.
  Die Polizei hat beschlossen, den Jungen nicht zu *beschuldigen*, da es keine ausreichenden Beweise gab.
