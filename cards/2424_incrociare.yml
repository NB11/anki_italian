Rang: 2424
Wort: incrociare
Wortart: v
Wort mit Artikel: incrociare
Femininum / Plural: ''
IPA: ''
Definition: kreuzen, überqueren
Register: ''
Beispielsätze: |-
  Mentre camminavo per strada, ho *incrociato* un vecchio amico che non vedevo da anni.
  Während ich die Straße entlangging, habe ich einen alten Freund *überquert*, den ich seit Jahren nicht mehr gesehen habe.
  
  Se *incroci* le gambe in quel modo, potresti avere problemi di circolazione.
  Wenn du die Beine *kreuzst*, könntest du Kreislaufprobleme bekommen.
  
  Il poliziotto gli disse: "Non *incroci* le braccia, sta fermo!"
  Der Polizist sagte zu ihm: "Kreuz die Arme nicht, bleib stehen!".
  
  Stavo per attraversare la strada quando ho visto che un'auto stava *incrociando* la sua corsia troppo velocemente.
  Ich wollte die Straße überqueren, als ich sah, dass ein Auto seine Fahrbahn zu schnell *querte*.
  
  Nonostante il traffico intenso, lei riuscì a *incrociare* lo sguardo del suo fidanzato dall'altra parte della piazza.
  Trotz des starken Verkehrs gelang es ihr, den Blick ihres Verlobten auf der anderen Seite des Platzes *zu kreuzen*.
