Rang: 212
Wort: amore
Wortart: n.m
Wort mit Artikel: l'amore
Femininum / Plural: amori
IPA: ''
Definition: die Liebe
Register: ''
Beispielsätze: |-
  L'*amore* vero non si compra né si vende.
  Wahre *Liebe* kauft man nicht und verkauft sie auch nicht.
  
  Quello che provi per lei è un *amore* sincero.
  Was du für sie empfindest, ist eine ehrliche *Liebe*.
  
  Spero che il loro *amore* duri per sempre.
  Ich hoffe, dass ihre *Liebe* für immer hält.
  
  Gli *amori* giovanili spesso non durano a lungo.
  Jugendliche *Lieben* halten oft nicht lange.
  
  Non esiste un solo tipo di *amore* nella vita.
  Es gibt nicht nur eine Art von *Liebe* im Leben.
