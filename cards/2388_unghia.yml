Rang: 2388
Wort: unghia
Wortart: n.f
Wort mit Artikel: l'unghia
Femininum / Plural: unghie
IPA: ''
Definition: der Nagel, -ä
Register: ''
Beispielsätze: |-
  Ho *unghie* troppo lunghe, devo tagliarle prima della festa.
  Ich habe zu lange *Nägel*, ich muss sie vor der Party schneiden.
  
  Mentre scavava in giardino, ha trovato una *unghia* fossilizzata.
  Während er im Garten grub, fand er einen fossilen *Nagel*.
  
  Credi che *unghie* dipinte di rosso attirino l'attenzione?
  Glaubst du, dass mit roter Farbe bemalte *Nägel* Aufmerksamkeit erregen?
  
  Se non curi la *unghia* infetta, rischi infezioni gravi.
  Wenn du den entzündeten *Nagel* nicht behandelst, riskierst du schwere Infektionen.
  
  Da quando ha smesso di mangiare carne, le sue *unghie* sono diventate più delicate.
  Seitdem er kein Fleisch mehr isst, sind seine *Nägel* viel empfindlicher geworden.
