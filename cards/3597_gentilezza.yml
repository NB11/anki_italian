Rang: 3597
Wort: gentilezza
Wortart: n.f
Wort mit Artikel: la gentilezza
Femininum / Plural: gentilezze
IPA: ''
Definition: die Freundlichkeit, -en
Register: ''
Beispielsätze: |-
  La sua *gentilezza* nei miei confronti mi ha davvero commosso durante il funerale.
  Seine *Freundlichkeit* mir gegenüber hat mich während der Beerdigung wirklich tief berührt.
  
  Nonostante la sua fretta, il cameriere ha trovato il tempo di mostrarmi una *gentilezza* inaspettata.
  Trotz seiner Hast fand der Kellner Zeit, mir eine unerwartete *Freundlichkeit* zu zeigen.
  
  Credo che la *gentilezza* sia la virtù più sottovalutata nella società moderna.
  Ich glaube, dass *Freundlichkeit* die am meisten unterschätzte Tugend in der modernen Gesellschaft ist.
  
  Se avessi ricevuto anche solo un po’ di *gentilezza* in quel momento difficile, forse non mi sarei sentito così solo.
  Hätte ich in diesem schwierigen Moment auch nur ein bisschen *Freundlichkeit* erfahren, hätte ich mich vielleicht nicht so allein gefühlt.
  
  Mi hanno detto che la *gentilezza* degli sconosciuti in questa città è leggendaria, e finora non mi ha deluso.
  Man hat mir erzählt, dass die *Freundlichkeit* von Fremden in dieser Stadt legendär ist, und bisher hat sie mich nicht enttäuscht.
