Rang: 550
Wort: temere
Wortart: v
Wort mit Artikel: temere
Femininum / Plural: ''
IPA: ''
Definition: fürchten, bangen
Register: ''
Beispielsätze: |-
  Non *temo* niente, sono molto coraggioso!
  Ich *fürchte* nichts, ich bin sehr mutig!
  
  Avevo *temuto* che non arrivassi in tempo.
  Ich hatte *gefürchtet*, dass du nicht rechtzeitig ankommst.
  
  *Temiamo* che il viaggio possa essere pericoloso.
  Wir *fürchten*, dass die Reise gefährlich sein könnte.
  
  Perché *temi* sempre il buio?
  Warum *fürchtest* du dich immer vor der Dunkelheit?
  
  Se *temevo* di sbagliare, evitavo di agire.
  Wenn ich *fürchtete*, einen Fehler zu machen, vermied ich es zu handeln.
