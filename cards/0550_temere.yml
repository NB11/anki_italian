Rang: 550
Wort: temere
Wortart: v
Wort mit Artikel: temere
Femininum / Plural: ''
IPA: ''
Definition: fürchten, sich fürchten
Register: ''
Beispielsätze: |-
  Ho *temuto* che il treno arrivasse in ritardo a causa del cattivo tempo.
  Ich habe *gefürchtet*, dass der Zug wegen des schlechten Wetters zu spät ankommt.
  
  Lei *teme* sempre che qualcuno fregare i suoi dati personali online.
  Sie *fürchtet* immer, dass jemand ihre persönlichen Daten im Internet betrügt.
  
  Nonostante l'errore, lui rimase tranquillo e continuò a *temere* solo per la salute della sorella.
  Trotz des *Fehlers* blieb er ruhig und fürchtete sich nur um die Gesundheit seiner Schwester.
  
  Se *temessi* l'effetto negativo del caffè, smetterei di berlo la sera.
  Wenn ich die *Wirkung* des Kaffees fürchten würde, würde ich aufhören, ihn abends zu trinken.
  
  Gli insegnanti *temevano* che gli studenti non studiassero abbastanza prima della revisione.
  Die Lehrer *fürchteten*, dass die Schüler vor der Revision nicht genug lernten.
