Rang: 3349
Wort: sire
Wortart: n.m
Wort mit Artikel: il sire
Femininum / Plural: i siri
IPA: ''
Definition: die Sire, -n
Register: ''
Beispielsätze: |-
  Nel Medioevo, il *sire* aveva un ruolo centrale nella società feudale.
  Im Mittelalter hatte der *Sire* eine zentrale Rolle in der feudalen Gesellschaft.
  
  Chiunque osi contraddire il *sire* rischia severe punizioni.
  Wer es wagt, den *Sire* zu widersprechen, riskiert harte Strafen.
  
  Il cavaliere giurò fedeltà al suo *sire* prima della battaglia.
  Der Ritter schwor seinem *Sire* vor der Schlacht die Treue.
  
  Un tempo, ogni *sire* governava sulle sue terre con pugno di ferro.
  Früher regierte jeder *Sire* über sein Land mit eiserner Faust.
  
  Il *sire* era temuto da tutti, anche dai suoi stessi consiglieri.
  Der *Sire* wurde von allen gefürchtet, sogar von seinen eigenen Beratern.
