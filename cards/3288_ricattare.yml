Rang: 3288
Wort: ricattare
Wortart: vt
Wort mit Artikel: ricattare
Femininum / Plural: ''
IPA: ''
Definition: erpressen, zwingen
Register: ''
Beispielsätze: |-
  L’avvocato ha minacciato di *ricattare* il politico se non avesse ritirato la legge.
  Der Anwalt hat gedroht, den Politiker zu *erpressen*, wenn er das Gesetz nicht zurückzieht.
  
  Non puoi *ricattare* qualcuno solo perché ha un segreto!
  Du kannst niemanden nur *erpressen*, weil er ein Geheimnis hat!
  
  Hanno scoperto che il vicino *ricattava* la moglie per nascondere i suoi debiti.
  Sie haben herausgefunden, dass der Nachbar seine Frau *erpresste*, um seine Schulden zu verbergen.
  
  Se avessi saputo che mi avrebbe *ricattato*, non gli avrei mai dato quelle informazioni.
  Wenn ich gewusst hätte, dass er mich *erpressen* würde, hätte ich ihm niemals diese Informationen gegeben.
  
  Il giornalista scrive che il boss *ricattava* tutti i commercianti della zona per controllare il quartiere.
  Der Journalist schreibt, dass der Boss alle Händler des Viertels *erpresste*, um die Gegend zu kontrollieren.
