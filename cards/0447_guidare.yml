Wort mit Artikel: guidare
Femininum / Plural: ''
IPA: ''
Definition: fahren, steuern, lenken
Register: ''
Beispielsätze: |-
  Mio padre *guida* molto attentamente.
  Mein Vater fährt *sehr* sorgfältig.
  
  Chi ha *guidato* l'auto ieri sera?
  Wer hat gestern Abend *das Auto gefahren*?
  
  Domani *guideremo* fino a Milano.
  Morgen *werden wir bis Mailand fahren*.
  
  Vorrebbe *guidare* lui stesso la barca.
  Er möchte das Boot selbst *steuern*.
  
  Sebbene non abbia la patente, *guida* sempre.
  Obwohl er keinen Führerschein hat, fährt er *immer*.
