Rang: 3330
Wort: sgualdrina
Wortart: n.f
Wort mit Artikel: la sgualdrina
Femininum / Plural: sgualdrine
IPA: ''
Definition: das Flittchen, -
Register: ''
Beispielsätze: |-
  Non dovresti giudicare gli altri chiamandoli *sgualdrine*, non è rispettoso.
  Du solltest andere nicht als *Flittchen* bezeichnen, das ist nicht respektvoll.
  
  In quel locale si mormorava che la donna vestita di rosso fosse una *sgualdrina* degli anni Trenta.
  In diesem Lokal wurde geflüstert, dass die Frau in Rot ein *Flittchen* der 1930er war.
  
  Se qualcuno ti chiama *sgualdrina*, non devi prendere sul serio le sue parole offensive.
  Wenn dich jemand *Flittchen* nennt, solltest du seine beleidigenden Worte nicht ernst nehmen.
  
  La *sgualdrina* del romanzo scandalizzava tutti con i suoi comportamenti dissoluti.
  Die *Flittchen* aus dem Roman schockierte alle mit ihrem zügellosen Lebenswandel.
  
  Quella sera, al ballo mascherato, una sconosciuta si spacciava per *sgualdrina* del Settecento.
  An diesem Abend gab sich auf dem Maskenball eine Unbekannte als *Flittchen* des 18. Jahrhunderts aus.
