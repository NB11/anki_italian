Rang: 3551
Wort: coordinata
Wortart: n.f
Wort mit Artikel: la coordinata
Femininum / Plural: coordinate
IPA: ''
Definition: die Koordinate, -n
Register: ''
Beispielsätze: |-
  Per trovare il punto esatto sulla mappa, ho bisogno delle *coordinate* precise.
  Für den genauen Ort auf der Karte brauche ich die *Koordinaten*.
  
  La polizia ha rintracciato il cellulare grazie alle *coordinate* GPS.
  Die Polizei hat das Handy anhand der GPS-*Koordinaten* geortet.
  
  Se non inserisci le *coordinate* giuste, il GPS non ti porta da nessuna parte.
  Wenn du die richtigen *Koordinaten* nicht eingibst, führt dich das GPS nirgendwohin.
  
  Nell’esercizio di matematica dobbiamo calcolare le *coordinate* del punto P sul piano cartesiano.
  In der Matheaufgabe müssen wir die *Koordinaten* des Punkts P auf der Koordinatenebene berechnen.
  
  Dovevi inviarmi le *coordinate* del luogo dell’incontro, invece me le hai dimenticate di nuovo!
  Du hättest mir die *Koordinaten* des Treffpunkts schicken sollen, stattdessen hast du sie schon wieder vergessen!
