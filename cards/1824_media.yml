Rang: 1824
Wort: media
Wortart: n.f
Wort mit Artikel: la media
Femininum / Plural: medie
IPA: ''
Definition: das Medium, Medien
Register: ''
Beispielsätze: |-
  La *media* di età dei partecipanti è 35 anni.
  Das *Durchschnittsalter* der Teilnehmer beträgt 35 Jahre.
  
  Non condividere informazioni personali sulle *medie* sociali.
  Teile keine persönlichen Daten auf *sozialen Medien*.
  
  La *media* aritmetica di questi numeri è 10.
  Der *arithmetische Mittelwert* dieser Zahlen ist 10.
  
  Hanno annunciato sulla *media* che il concerto sarà annullato.
  Sie haben in den *Medien* bekannt gegeben, dass das Konzert abgesagt wird.
  
  La *media* mobile aiuta a prevedere le tendenze economiche.
  Der *gleitende Durchschnitt* hilft, wirtschaftliche Trends vorherzusagen.
