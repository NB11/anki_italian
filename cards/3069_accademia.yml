Rang: 3069
Wort: accademia
Wortart: n.f
Wort mit Artikel: l'accademia
Femininum / Plural: accademie
IPA: ''
Definition: die Akademie, -n
Register: ''
Beispielsätze: |-
  L'*accademia* ha organizzato un convegno internazionale sulle nuove tecnologie.
  Die *Akademie* hat eine internationale Konferenz zu neuen Technologien organisiert.
  
  Nonostante sia molto giovane, studia all'*accademia* di belle arti da due anni.
  Trotz ihres jungen Alters studiert sie seit zwei Jahren an der *Akademie* der bildenden Künste.
  
  Se volessi diventare pittore famoso, dovresti frequentare prima qualche *accademia*.
  Wenn du ein berühmter Maler werden wolltest, müsstest du vorher eine *Akademie* besuchen.
  
  L'*accademia* ha respinto il suo progetto di ricerca perché troppo ambizioso.
  Die *Akademie* hat sein Forschungsprojekt abgelehnt, weil es zu ehrgeizig war.
  
  Chissà se domani l'*accademia* annuncerà la vincita di una borsa di studio per studenti meritevoli.
  Wer weiß, ob die *Akademie* morgen die Vergabe eines Stipendiums für besonders leistungsstarke Studenten bekannt gibt.
