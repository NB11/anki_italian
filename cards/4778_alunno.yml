Rang: 4778
Wort: alunno
Wortart: n.m
Wort mit Artikel: l'alunno
Femininum / Plural: alunni
IPA: ''
Definition: der Schüler, -
Register: ''
Beispielsätze: |-
  L'*alunno* ha dimenticato il libro di storia a casa e ora deve chiedere aiuto al suo compagno.
  Der *Schüler* hat das Geschichtsbuch zu Hause vergessen und muss jetzt seinen Mitschüler um Hilfe bitten.
  
  Se fossi un *alunno* modello, avrei studiato di più per l'esame di matematica.
  Wenn ich ein *Muster*schüler wäre, hätte ich für die Matheprüfung mehr gelernt.
  
  L'insegnante ha notato che l'*alunno* non seguiva la lezione e gli ha chiesto di prestare attenzione.
  Der Lehrer hat bemerkt, dass der *Schüler* dem Unterricht nicht folgte, und hat ihn gebeten, aufzupassen.
  
  Dopo aver corretto i compiti, la professoressa ha chiamato l'*alunno* più bravo della classe per una verifica orale.
  Nachdem sie die Hausaufgaben korrigiert hatte, rief die Lehrerin den *besten Schüler* der Klasse für eine mündliche Prüfung.
  
  È inaccettabile che un *alunno* venga trattato con così poco rispetto da parte dei suoi compagni.
  Es ist *inakzeptabel*, dass ein Schüler von seinen Mitschülern so respektlos behandelt wird.
