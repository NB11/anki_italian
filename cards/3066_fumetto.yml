Rang: 3066
Wort: fumetto
Wortart: n.m
Wort mit Artikel: il fumetto
Femininum / Plural: fumetti
IPA: ''
Definition: der Comic, -s
Register: ''
Beispielsätze: |-
  Leggo sempre *fumetti* la domenica mattina con una tazza di caffè.
  Ich lese immer *Comics* sonntagmorgens mit einer Tasse Kaffee.
  
  Quel *fumetto* è così avvincente che non riesco a metterlo giù!
  Dieser *Comic* ist so spannend, dass ich ihn nicht weglegen kann!
  
  Si dice che il primo *fumetto* moderno sia nato negli Stati Uniti nei primi del Novecento.
  Man sagt, der erste moderne *Comic* sei zu Beginn des 20. Jahrhunderts in den USA entstanden.
  
  Ho regalato un *fumetto* raro a mio nipote per il suo compleanno.
  Ich habe meinem Neffen zum Geburtstag einen seltenen *Comic* geschenkt.
  
  Nonostante la sua fama di autore drammatico, ha scritto anche qualche *fumetto* satirico.
  Trotz seines Rufs als Dramatiker hat er auch einige satirische *Comics* geschrieben.
