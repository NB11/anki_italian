Rang: 3832
Wort: sganciare
Wortart: v
Wort mit Artikel: sganciare
Femininum / Plural: ''
IPA: ''
Definition: abwerfen, lösen, entkoppeln
Register: ''
Beispielsätze: |-
  Il pilota militare ha *sganciato* le bombe sul bersaglio nemico.
  Der Pilot hat *die Bomben* auf das feindliche Ziel geworfen.
  
  Se non *sganci* la cintura, l’airbag non si aprirà in caso di schianto.
  Wenn du *den Gurt* nicht löst, öffnet sich der Airbag im Fall eines Aufpralls nicht.
  
  La nave *sgancerà* l’ancora domattina all’alba, purché il tempo non peggiori.
  Das Schiff wird den Anker *morgen früh lösen*, vorausgesetzt das Wetter verschlechtert sich nicht.
  
  Nonostante la sospensione del progetto, hanno continuato a *sganciare* risorse per mantenerlo temporaneamente in vita.
  Trotz der *Aufschiebung* des Projekts haben sie weiterhin Mittel freigegeben, um es vorübergehend am Leben zu halten.
  
  Il meccanico mi ha suggerito di *sganciare* il termostato per raffreddare troppo il motore.
  Der Mechaniker hat mir empfohlen, den Thermostat zu *lösen*, um den Motor zu stark abzukühlen.
