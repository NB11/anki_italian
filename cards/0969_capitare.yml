Rang: 969
Wort: capitare
Wortart: vi
Wort mit Artikel: capitare
Femininum / Plural: ''
IPA: ''
Definition: passieren, vorkommen, geschehen
Register: ''
Beispielsätze: |-
  Se *capita* di sentire un rumore strano, non ti preoccupare, è solo il vento.
  Wenn es *passiert*, einen seltsamen Lärm zu hören, mach dir keine Sorgen, es ist nur der Wind.
  
  Mi hanno detto che *capitava* spesso in questa città durante l’estate del 1987.
  Man hat mir erzählt, dass es *vorkam* oft in dieser Stadt während des Sommers 1987.
  
  Non sapevo se *capiterei* mai l’occasione di incontrarti di nuovo, ma eccoti qui!
  Ich wusste nicht, ob es mir jemals *gelingen würde*, dich wiederzusehen, aber da bist du ja!
  
  È inutile *capitasse* tutto insieme senza una ragione!
  Es ist nutzlos, wenn *alles auf einmal passiert* ohne einen Grund!
  
  Quando *capiterà* di visitare la mostra, portami con te, così godiamo insieme di tanta magnificenza.
  Wenn es *passieren wird*, die Ausstellung zu besuchen, nimm mich mit, damit wir gemeinsam so viel Großartiges genießen.
