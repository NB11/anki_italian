Rang: 2387
Wort: confessione
Wortart: n.f
Wort mit Artikel: la confessione
Femininum / Plural: confessioni
IPA: ''
Definition: das Bekenntnis, -isse; das Geständnis, -isse
Register: ''
Beispielsätze: |-
  La *confessione* del prete è un sacramento importante nella Chiesa cattolica.
  Das *Bekenntnis* des Priesters ist ein wichtiges Sakrament in der katholischen Kirche.
  
  Dopo settimane di indagini, ha fatto una *confessione* completa dei suoi crimini alla polizia.
  Nach wochenlangen Ermittlungen hat er ein vollständiges *Geständnis* seiner Verbrechen bei der Polizei abgelegt.
  
  Nonostante le prove contro di lui, il giudice ha rifiutato la sua *confessione* perché ottenuta sotto coercizione.
  Trotz der Beweise gegen ihn hat der Richter sein *Geständnis* abgelehnt, weil es unter Zwang zustande kam.
  
  La *confessione* di Maria durante l’intervista ha sorpreso tutti i presenti in studio.
  Das *Bekenntnis* von Maria während des Interviews hat alle Anwesenden im Studio überrascht.
  
  Hai mai sentito parlare di una *confessione* pubblica che ha scatenato una grande preoccupazione nella comunità?
  Hast du schon einmal von einem öffentlichen *Bekenntnis* gehört, das große Sorge in der Gemeinde ausgelöst hat?
