Rang: 1728
Wort: calcio
Wortart: n.m
Wort mit Artikel: il calcio
Femininum / Plural: i calci
IPA: ''
Definition: der Fußball, Fußballschlag, Tritt
Register: ''
Beispielsätze: |-
  Ieri *calcio* la palla con tutta la forza che avevo.
  Ich habe den Ball mit aller Kraft *getreten*.
  
  Il giocatore ha segnato un *calcio* di punizione perfetto.
  Der Spieler hat einen perfekten Freistoß *geschossen*.
  
  Non sopporto quando qualcuno dà *calci* al muro solo per frustrazione.
  Ich kann es nicht leiden, wenn jemand vor Wut gegen die Wand *tritt*.
  
  Se non avessi *calciato* la palla così male, avremmo vinto la partita.
  Hätte ich den Ball nicht so schlecht *getreten*, hätten wir das Spiel gewonnen.
  
  Mi hanno detto che il *calcio* in Italia è uno sport molto seguito.
  Ich habe gehört, dass in Italien der *Fußball* ein sehr beliebter Sport ist.
