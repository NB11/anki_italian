Rang: 3677
Wort: rifornimento
Wortart: n.m
Wort mit Artikel: il rifornimento
Femininum / Plural: i rifornimenti
IPA: ''
Definition: die Betankung, -en
Register: ''
Beispielsätze: |-
  Prima di partire per il viaggio in *rifornimento* di benzina al distributore vicino a casa.
  Vor der Abfahrt habe ich am Tankstelle in der Nähe zu Hause *getankt*.
  
  Durante la maratona, gli organizzatori hanno predisposto dei punti di *rifornimento* ogni cinque chilometri.
  Während des Marathons haben die Organisatoren alle fünf Kilometer *Tankstellen* eingerichtet.
  
  Se non fai un buon *rifornimento* di carburante, rischi di rimanere senza benzina in autostrada.
  Wenn du keine gute *Betankung* mit Kraftstoff machst, riskierst du, auf der Autobahn ohne Benzin dazustehen.
  
  Il pilota ha richiesto un *rifornimento* d'emergenza perché il serbatoio era quasi vuoto.
  Der Pilot verlangte eine Notfall-*Betankung*, weil der Tank fast leer war.
  
  Grazie al *rifornimento* costante, la missione spaziale è potuta proseguire senza intoppi.
  Dank der ständigen *Betankung* konnte die Weltraummission ohne Probleme fortgesetzt werden.
