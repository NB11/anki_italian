Rang: 3817
Wort: cemento
Wortart: n.m
Wort mit Artikel: il cemento
Femininum / Plural: cementi
IPA: ''
Definition: der Zement, -e
Register: ''
Beispielsätze: |-
  Il *cemento* si indurisce rapidamente se non viene lavorato in fretta.
  Der *Zement* härtet schnell aus, wenn er nicht schnell verarbeitet wird.
  
  Gli operai hanno versato il *cemento* nella cassaforma per gettare le fondamenta della casa.
  Die Arbeiter haben den *Zement* in die Schalung gegossen, um das Fundament des Hauses zu gießen.
  
  Se aggiungi troppo *cemento* alla malta, rischi di rovinare la miscela.
  Wenn du zu viel *Zement* in den Mörtel gibst, riskierst du, das Gemisch zu ruinieren.
  
  Il *cemento* armato è fondamentale per costruire edifici antisismici, ma la sua qualità dipende dalla miscela.
  Der *Zement* mit Stahl ist grundlegend für den Bau erdbebensicherer Gebäude, aber seine Qualität hängt von der Mischung ab.
  
  Nonostante la pioggia, sono riusciti a stendere un sottile strato di *cemento* prima che arrivasse la sera.
  Trotz des Regens schafften sie es, noch eine dünne Schicht *Zement* zu verlegen, bevor der Abend kam.
