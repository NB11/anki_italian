Rang: 4017
Wort: democrazia
Wortart: n.f
Wort mit Artikel: la democrazia
Femininum / Plural: democrazie
IPA: ''
Definition: die Demokratie, -n
Register: ''
Beispielsätze: |-
  In Italia la *democrazia* è stata introdotta dopo la seconda guerra mondiale.
  In Italien wurde die *Demokratie* nach dem Zweiten Weltkrieg eingeführt.
  
  Molti giovani non capiscono l’importanza della *democrazia* nei loro paesi.
  Viele Jugendliche verstehen die Bedeutung der *Demokratie* in ihren Ländern nicht.
  
  Se la *democrazia* non fosse difesa, perderemmo molte libertà fondamentali.
  Wenn die *Demokratie* nicht verteidigt werden würde, verlören wir viele grundlegende Freiheiten.
  
  Chiunque voglia partecipare alla *democrazia* dovrebbe informarsi prima sulle elezioni.
  Wer an der *Demokratie* teilnehmen möchte, sollte sich vorher über die Wahlen informieren.
  
  La *democrazia* non esiste senza una stampa libera e indipendente.
  Eine *Demokratie* existiert nicht ohne eine freie und unabhängige Presse.
