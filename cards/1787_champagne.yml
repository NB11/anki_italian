Beispielsätze: |-
  Durante la festa abbiamo bevuto solo *champagne* ghiacciato.
  Während der Feier haben wir nur *eisgekühlten* Champagner getrunken.
  
  Se avessi vinto alla lotteria, avrei ordinato una cassa di *champagne* per tutti.
  Wenn ich im Lotto gewonnen hätte, hätte ich eine Kiste *Champagner* für alle bestellt.
  
  Il *champagne* che abbiamo ordinato ieri non era abbastanza fresco per essere servito.
  Der *Champagner*, den wir gestern bestellt haben, war nicht kalt genug, um serviert zu werden.
  
  Mi chiedono spesso quale sia il mio *champagne* preferito tra quelli francesi.
  Man fragt mich oft, welcher *Champagner* unter den französischen mein Liebling sei.
  
  Porta due bottiglie di *champagne* in camera: domani festeggiamo il nostro anniversario.
  Bring zwei Flaschen *Champagner* ins Zimmer: Morgen feiern wir unseren Jahrestag.
