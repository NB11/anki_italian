Wort: centimetro
Wortart: n.m
Wort mit Artikel: il centimetro
Femininum / Plural: centimetri
IPA: ''
Definition: das Zentimeter, -
Register: ''
Beispielsätze: |-
  Questo righello misura fino a *centimetro* in centimetri.
  Dieses Lineal misst in *Zentimetern*.
  
  Ho bisogno di una misura precisa: solo *centimetro* in più farebbe la differenza.
  Ich brauche eine präzise Messung: schon *ein Zentimeter* mehr würde den Unterschied machen.
  
  Se tagli *centimetro* dopo centimetro, otterrai la lunghezza desiderata.
  Wenn du *Zentimeter* für Zentimeter schneidest, erhältst du die gewünschte Länge.
  
  L’asta metallica è lunga esattamente venti *centimetri* e pesa meno di un grammo.
  Die Metallstange ist genau zwanzig *Zentimeter* lang und wiegt weniger als ein Gramm.
  
  Non sapevo che la distanza fosse di pochi *centimetri*, altrimenti avrei preso un metro più lungo.
  Ich wusste nicht, dass die Entfernung nur wenige *Zentimeter* betrug, sonst hätte ich ein längeres Maßband genommen.
