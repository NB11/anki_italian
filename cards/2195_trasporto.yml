  Wenn der *Transport* nicht bis morgen ankommt, haben wir ein Problem.
  
  Il commissario sospetta che il *trasporto* della droga fosse organizzato da un uomo potente.
  Der Kommissar vermutet, dass der *Transport* der Drogen von einem mächtigen Mann organisiert wurde.
