Rang: 3538
Wort: delinquente
Wortart: n.m/f
Wort mit Artikel: il delinquente
Femininum / Plural: i delinquenti
IPA: ''
Definition: der/die Verbrecher/in, -/-nen
Register: ''
Beispielsätze: |-
  Il *delinquente* è stato arrestato dalla polizia dopo una lunga caccia.
  Der *Verbrecher* wurde von der Polizei nach einer langen Fahndung verhaftet.
  
  Mio zio era un *delinquente* prima di redimersi.
  Mein Onkel war ein *Verbrecher*, bevor er sich besserte.
  
  Se fossi un *delinquente*, fuggirei all’estero.
  Wenn ich ein *Verbrecher* wäre, würde ich ins Ausland fliehen.
  
  Hanno trovato prove contro i *delinquenti* che hanno rapinato la banca.
  Sie haben Beweise gegen die *Verbrecher* gefunden, die die Bank überfallen haben.
  
  Il giudice ha ordinato di incarcerare il *delinquente* per vent’anni.
  Der Richter hat angeordnet, den *Verbrecher* für zwanzig Jahre einzusperren.
