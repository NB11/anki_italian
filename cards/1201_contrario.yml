Rang: 1201
Wort: contrario
Wortart: n.m
Wort mit Artikel: il contrario
Femininum / Plural: i contrari
IPA: ''
Definition: das Gegenteil, umgekehrte Bedeutung
Register: ''
Beispielsätze: |-
  È tutto il *contrario* di quello che pensavo.
  Es ist genau das *Gegenteil* von dem, was ich dachte.
  
  Non fare il *contrario* di ciò che ti ho detto, per favore.
  Tu dir bitte nicht das *Gegenteil* von dem, was ich dir gesagt habe.
  
  Per molti il *contrario* di 'felice' è 'triste'.
  Für viele ist das *Gegenteil* von 'fröhlich' 'traurig'.
  
  Sebbene sembrasse assurdo, risultò essere il *contrario* della realtà.
  Auch wenn es absurd schien, stellte sich heraus, dass es das *Gegenteil* der Wahrheit war.
  
  Questa volta non farò il *contrario* delle tue indicazioni, promesso!
  Dieses Mal werde ich nicht das *Gegenteil* deiner Anweisungen tun, versprochen!
