Rang: 1003
Wort: durare
Wortart: vi
Wort mit Artikel: durare
Femininum / Plural: ''
IPA: ''
Definition: dauern
Register: ''
Beispielsätze: |-
  Quanto tempo *dura* ancora la tua pausa caffè? Non vorrei disturbare la mia calma.
  Wie lange *dauert* deine Kaffeepause noch? Ich möchte meine Ruhe nicht stören.
  
  Se *durerà* questo traffico, arriveremo in ritardo alla stazione e perderemo il nostro turno.
  Wenn der Stau *dauert*, kommen wir zu spät zum Bahnhof und verpassen unsere Reihe.
  
  La malattia *è durata* settimane intere, ma finalmente il paziente si è ripreso completamente.
  Die *Krankheit* dauerte Wochen lang, aber der Patient hat sich endlich vollständig erholt.
  
  Nonostante il discorso lungo, la conferenza *è durata* solo un’ora, per fortuna!
  Trotz der langen *Rede* dauerte die Konferenz nur eine Stunde – zum Glück!
  
  Se avessimo prenotato in anticipo, non *durerebbe* tanto aspettare il nostro tavolo al ristorante.
  Hätten wir früher reserviert, *dauerte* das Warten auf unseren Tisch im Restaurant nicht so lange.
