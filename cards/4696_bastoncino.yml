Beispielsätze: |-
  Per fare gli gnocchi servono delle *bastoncini* di patata lessata.
  Für Gnocchi braucht man *Stäbchen* aus gekochten Kartoffeln.
  
  Il *bastoncino* di zenzero si può grattugiare direttamente nella minestra.
  Das *Stäbchen* Ingwer kann man direkt in die Suppe reiben.
  
  Dopo aver acceso la griglia, ho preparato dei *bastoncini* di pane per l’antipasto.
  Nachdem ich den Grill angezündet hatte, habe ich *Stäbchen* aus Brot für die Vorspeise zubereitet.
  
  Se vuoi provare qualcosa di nuovo, prova a intingere i *bastoncini* di carota nel guacamole.
  Wenn du etwas Neues ausprobieren möchtest, tauche die *Stäbchen* aus Karotte in Guacamole.
  
  Mi hanno regalato un kit per fare i *bastoncini* di latte gelato fatto in casa.
  Man hat mir ein Set geschenkt, um selbst *Stäbchen* aus Milcheis herzustellen.
