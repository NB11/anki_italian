Rang: 1472
Wort: indagare
Wortart: v
Wort mit Artikel: indagare
Femininum / Plural: ''
IPA: ''
Definition: untersuchen, ermitteln, erforschen
Register: ''
Beispielsätze: |-
  La polizia ha iniziato a *indagare* sul caso dopo che ha ricevuto una nuova testimonianza.
  Die Polizei begann, *den Fall* zu untersuchen, nachdem sie eine neue Zeugenaussage erhalten hatte.
  
  Se vuoi capire meglio la situazione, dovresti *indagare* sulle cause del problema assieme ai tuoi colleghi responsabili.
  Wenn du die Situation besser verstehen willst, solltest du die Ursachen des Problems *gemeinsam mit* deinen zuständigen Kollegen ermitteln.
  
  Le autorità hanno deciso di *indagare* più a fondo prima di stabilire chi sia responsabile dell’incendio recente.
  Die Behörden beschlossen, *die Angelegenheit* genauer zu erforschen, bevor sie festlegten, wer für den kürzlichen Brand verantwortlich ist.
  
  Non appena giungeremo a Berlino, cominceremo a *indagare* su chi ha rilasciato il prestito a quella azienda tedesca.
  Sobald wir in Berlin *ankommen*, werden wir ermitteln, wer der deutschen Firma das Darlehen gewährt hat.
  
  Purtroppo, non possiamo *indagare* su questo argomento sociale senza il supporto delle organizzazioni competenti.
  Leider können wir dieses *gesellschaftliche* Thema nicht untersuchen, ohne die Unterstützung der zuständigen Organisationen zu erhalten.
