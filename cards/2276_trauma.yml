Rang: 2276
Wort: trauma
Wortart: n.m
Wort mit Artikel: il trauma
Femininum / Plural: i traumi
IPA: ''
Definition: das Trauma, Traumen
Register: ''
Beispielsätze: |-
  Dopo l’incidente, ha sofferto di un *trauma* che nessuno riusciva a comprendere.
  Nach dem Unfall litt er an einem *Trauma*, das niemand nachvollziehen konnte.
  
  Credi che anche tu abbia bisogno di terapia per superare questo *trauma*?
  Glaubst du, dass auch du eine Therapie brauchst, um dieses *Trauma* zu überwinden?
  
  Era un *trauma* collettivo per tutta la comunità, che ancora oggi ne porta le conseguenze.
  Es war ein kollektives *Trauma* für die ganze Gemeinde, die die Folgen bis heute trägt.
  
  Nonostante il *trauma*, i soldati sono tornati a combattere con uno spirito indomito.
  Trotz des *Traumas* kehrten die Soldaten mit ungebrochenem Kampfgeist zurück.
  
  Se non affronti il *trauma* ora, rischi che si ripresenti in futuro sotto forma di incubi.
  Wenn du das *Trauma* jetzt nicht verarbeitest, könnte es sich in Zukunft in Albträumen wieder melden.
