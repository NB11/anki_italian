Wort: quassù
Wortart: adv
Wort mit Artikel: quassù
Femininum / Plural: ''
IPA: ''
Definition: da hier herauf
Register: ''
Beispielsätze: |-
  Non ti vedo *quassù*, vieni più vicino!
  Ich sehe dich *da oben* nicht, komm näher!
  
  Se saliamo ancora, troveremo un rifugio *quassù* sulla montagna.
  Wenn wir noch weiter steigen, finden wir eine Unterkunft *da oben* auf dem Berg.
  
  Mi hanno detto che *quassù* d’inverno fa molto freddo.
  Man hat mir gesagt, dass es *hier oben* im Winter sehr kalt wird.
  
  Non vuoi restare *quassù* con me per sempre?
  Willst du nicht für immer *hier oben* bei mir bleiben?
  
  Anche se *quassù* c’è meno rumore, non riesco a concentrarmi.
  Auch wenn es *hier oben* weniger Lärm gibt, kann ich mich nicht konzentrieren.
