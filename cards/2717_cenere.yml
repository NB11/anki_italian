Rang: 2717
Wort: cenere
Wortart: n.f
Wort mit Artikel: la cenere
Femininum / Plural: ceneri
IPA: ''
Definition: die Asche
Register: ''
Beispielsätze: |-
  Dopo l’incendio è rimasta solo *cenere* sul pavimento.
  Nach dem Brand blieb nur *Asche* auf dem Boden.
  
  Soffia via la *cenere* dal tavolo prima di mangiare.
  Blase die *Asche* vom Tisch, bevor du isst.
  
  La *cenere* del vulcano ha coperto interi paesi.
  Die *Asche* des Vulkans hat ganze Dörfer bedeckt.
  
  Mi hanno detto che quella *cenere* viene da un’eruzione storica.
  Man hat mir gesagt, dass diese *Asche* von einem historischen Ausbruch stammt.
  
  Se non pulisci la *cenere* dal camino, rischi un incendio.
  Wenn du die *Asche* aus dem Kamin nicht reinigst, riskierst du ein Feuer.
