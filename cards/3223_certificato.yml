Rang: 3223
Wort: certificato
Wortart: n.m
Wort mit Artikel: il certificato
Femininum / Plural: certificati
IPA: ''
Definition: die Bescheinigung, -en, das Zertifikat, -e
Register: ''
Beispielsätze: |-
  Devi presentare un *certificato* di residenza per aprire un conto in banca.
  Du musst ein *Zertifikat* über den Wohnsitz vorlegen, um ein Konto zu eröffnen.
  
  Ho ricevuto il *certificato* che conferma la mia partecipazione al corso avanzato.
  Ich habe das *Zertifikat* erhalten, das meine Teilnahme am Aufbaukurs bestätigt.
  
  Senza questo *certificato* non potrai accedere all’esame finale.
  Ohne dieses *Zertifikat* wirst du nicht zur Abschlussprüfung zugelassen.
  
  Il *certificato* medico attesta che sono idoneo a guidare.
  Das *Attest* bescheinigt, dass ich fahrtauglich bin.
  
  Non ho ancora ritirato il mio *certificato* di laurea, ma arriverà tra due settimane.
  Ich habe mein *Diplom* noch nicht abgeholt, aber es kommt in zwei Wochen.
