Rang: 1467
Wort: noioso
Wortart: adj
Wort mit Artikel: noioso
Femininum / Plural: ''
IPA: ''
Definition: langweilig, öde
Register: ''
Beispielsätze: |-
  Questa lezione è *noiosa*, preferirei fare qualcos'altro.
  Diese Lektion ist *langweilig*, ich würde lieber etwas anderes machen.
  
  Il film era così *noioso* che mi sono addormentato dopo dieci minuti.
  Der Film war so *öde*, dass ich nach zehn Minuten eingeschlafen bin.
  
  Credi che il suo discorso sarà *noioso* come al solito?
  Glaubst du, dass seine Rede wieder *langweilig* wie immer sein wird?
  
  Purtroppo, la conferenza di ieri era davvero *noiosa* e molti se ne sono andati presto.
  Leider war die gestrige Konferenz wirklich *öde* und viele sind früh gegangen.
  
  Spero che non sia *noioso* come l'incontro precedente, ci siamo annoiati tutti.
  Ich hoffe, es ist nicht so *öde* wie das letzte Treffen – da haben wir uns alle gelangweilt.
