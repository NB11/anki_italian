Rang: 3166
Wort: frammento
Wortart: n.m
Wort mit Artikel: il frammento
Femininum / Plural: frammenti
IPA: ''
Definition: das Bruchstück, -e, das Fragment, -e
Register: ''
Beispielsätze: |-
  Dopo l’esplosione sono rimasti solo *frammenti* della bottiglia.
  Nach der Explosion blieben nur *Bruchstücke* der Flasche übrig.
  
  Il detective ha trovato un piccolo *frammento* di vetro vicino alla scena del crimine.
  Der Detektiv fand ein kleines *Fragment* von Glas nahe dem Tatort.
  
  Se avessi letto di più, non avresti questi *frammenti* di sapere così confusi.
  Wenn du mehr gelesen hättest, hättest du nicht diese *Bruchstücke* an so verwirrtem Wissen.
  
  Nel museo hanno esposto *frammenti* di antiche ceramiche greche.
  Im Museum haben sie *Fragmente* antiker griechischer Keramik ausgestellt.
  
  Dicono che questo antico testo sia composto da *frammenti* di diversi autori.
  Sie sagen, dieser alte Text bestehe aus *Fragmenten* verschiedener Autoren.
