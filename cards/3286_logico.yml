  Es ist *logisch*, dass du nach so einem anstrengenden Tag müde bist.
  
  Non mi sembra *logico* che abbia rifiutato un'offerta così vantaggiosa.
  Es erscheint mir nicht *logisch*, dass er ein solch vorteilhaftes Angebot abgelehnt hat.
  
  Perché il tuo piano non sia *logico*, dovresti spiegare meglio ogni passaggio.
  Damit dein Plan *logisch* ist, solltest du jeden Schritt genauer erklären.
