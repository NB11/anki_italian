Rang: 1
Wort: essere
Wortart: v
Wort mit Artikel: essere
Femininum / Plural: ''
IPA: ''
Definition: sein, sich befinden
Register: ''
Beispielsätze: |-
  Lui *è* un bravissimo insegnante di matematica.
  Er *ist* ein hervorragender Mathematiklehrer.
  
  Dove *siete stati* ieri sera? *Siamo stati* al cinema.
  Wo *wart ihr* gestern Abend? *Wir waren* im Kino.
  
  Se io *fossi* ricco, comprerei una casa al mare.
  Wenn ich reich *wäre*, würde ich ein Haus am Meer kaufen.
  
  *Sarò* felice di rivederti dopo tanto tempo!
  Ich *werde* mich freuen, dich nach so langer Zeit wiederzusehen!
  
  Lei *era* stanca dopo il lungo viaggio.
  Sie *war* nach der langen Reise müde.
