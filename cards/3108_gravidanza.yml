Rang: 3108
Wort: gravidanza
Wortart: n.f
Wort mit Artikel: la gravidanza
Femininum / Plural: gravidanze
IPA: ''
Definition: die Schwangerschaft, -en
Register: ''
Beispielsätze: |-
  La *gravidanza* della mia amica è arrivata alla trentottesima settimana.
  Die *Schwangerschaft* meiner Freundin ist in der achtunddreißigsten Woche.
  
  Durante la *gravidanza* è importante seguire una dieta equilibrata.
  Während der *Schwangerschaft* ist es wichtig, eine ausgewogene Diät zu befolgen.
  
  Hanno scoperto la *gravidanza* solo dopo due mesi di ritardo.
  Sie haben die *Schwangerschaft* erst nach zwei Monaten Verspätung entdeckt.
  
  Se avessi saputo della tua *gravidanza*, ti avrei fatto gli auguri prima!
  Wenn ich von deiner *Schwangerschaft* gewusst hätte, hätte ich dir früher gratuliert!
  
  La durata media di una *gravidanza* umana è di circa quaranta settimane.
  Die durchschnittliche Dauer einer menschlichen *Schwangerschaft* beträgt etwa vierzig Wochen.
