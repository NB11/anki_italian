Rang: 3103
Wort: riscontro
Wortart: n.m
Wort mit Artikel: il riscontro
Femininum / Plural: riscontri
IPA: ''
Definition: die Übereinstimmung, -en
Register: ''
Beispielsätze: |-
  Abbiamo ricevuto un *riscontro* positivo dalla direzione riguardo al nuovo progetto.
  Wir haben eine *Übereinstimmung* von der Leitung zum neuen Projekt erhalten.
  
  Il *riscontro* tra le due versioni del contratto è stato immediato.
  Die *Übereinstimmung* zwischen den beiden Versionen des Vertrags war sofort erkennbar.
  
  Non mi aspettavo un *riscontro* così rapido da parte dei colleghi.
  Ich habe keine so schnelle *Übereinstimmung* vonseiten der Kollegen erwartet.
  
  Dopo mesi di attesa, finalmente c’è stato un *riscontro* alle nostre richieste.
  Nach Monaten des Wartens gab es endlich eine *Übereinstimmung* zu unseren Forderungen.
  
  Il *riscontro* della polizia sulle indagini ha confermato i nostri sospetti.
  Die *Übereinstimmung* der Polizei zu den Ermittlungen hat unsere Vermutungen bestätigt.
