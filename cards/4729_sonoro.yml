Rang: 4729
Wort: sonoro
Wortart: adj
Wort mit Artikel: sonoro
Femininum / Plural: ''
IPA: ''
Definition: tönend, klangvoll
Register: ''
Beispielsätze: |-
  Il suono *sonoro* della campana riempì la piazza di silenzio.
  Das *tönende* Geläut der Glocke füllte den Platz mit Stille.
  
  Nonostante il rumore, si udì un canto *sonoro* provenire dal balcone.
  Trotz des Lärms hörte man einen *klangvollen* Gesang vom Balkon.
  
  Il regista scelse una musica *sonora* per enfatizzare la scena drammatica.
  Der Regisseur wählte eine *klangvolle* Musik, um die dramatische Szene zu unterstreichen.
  
  Era così *sonora* la sua voce che si udiva anche in fondo al corridoio.
  Seine Stimme war so *tönend*, dass man sie noch am Ende des Gangs hörte.
  
  I colori *sonori* del tramonto riflettevano la profondità del cielo.
  Die *klangvollen* Farben des Sonnenuntergangs spiegelten die Tiefe des Himmels.
