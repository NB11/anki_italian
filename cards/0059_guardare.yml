Rang: 59
Wort: guardare
Wortart: v
Wort mit Artikel: guardare
Femininum / Plural: ''
IPA: ''
Definition: ansehen, anschauen
Register: ''
Beispielsätze: |-
  Che cosa *guardate* alla televisione stasera?
  Was *schaut* ihr heute Abend im Fernsehen *an*?
  
  Ho *guardato* quel film già due volte.
  Ich habe jenen Film bereits zweimal *angesehen*.
  
  *Guarda*, laggiù c'è un cane che insegue un gatto!
  *Schau mal*, dort hinten läuft ein Hund, der eine Katze *jagt*!
  
  Se avessi più tempo, *guarderei* documentari interessanti.
  Wenn ich mehr Zeit hätte, *würde ich* interessante Dokus *anschauen*.
  
  Ti *guardo* mentre cucini: sei molto brava!
  Ich *beobachte* dich beim Kochen – du bist sehr gut!
