Wort mit Artikel: guardare
Femininum / Plural: ''
IPA: ''
Definition: ansehen, betrachten, schauen
Register: ''
Beispielsätze: |-
  Mi piace *guardare* i film al cinema con gli amici.
  Ich sehe mir *gerne* Filme im Kino mit Freunden *an*.
  
  Che cosa stai *guardando* alla televisione stasera?
  Was *siehst* du dir heute Abend im Fernsehen *an*?
  
  Abbiamo *guardato* un documentario molto interessante ieri sera.
  Wir haben uns gestern Abend eine sehr interessante Dokumentation *angesehen*.
  
  Vorrei che tu *guardassi* meglio la strada mentre guidi.
  Ich möchte, dass du dir die Straße beim Fahren besser *ansiehst*.
  
  Se avessi tempo, *guarderei* quella serie tv che tutti parlano.
  Wenn ich Zeit hätte, würde ich mir diese Serie, von der alle reden, *ansehen*.
