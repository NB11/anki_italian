Rang: 3305
Wort: sedurre
Wortart: vt
Wort mit Artikel: sedurre
Femininum / Plural: ''
IPA: ''
Definition: verführen, verführen
Register: ''
Beispielsätze: |-
  Lui ha provato a *sedurre* la sua collega con dei regali costosi.
  Er hat versucht, *seine* Kollegin mit teuren Geschenken zu verführen.
  
  Se non la smetti di *sedurre* tutti, perderai la tua reputazione!
  Wenn du nicht aufhörst, *alle* zu verführen, wirst du deinen Ruf verlieren!
  
  Che cosa ti spinge a *sedurre* gli altri invece di essere onesto?
  Was treibt dich dazu, *andere* zu verführen, anstatt ehrlich zu sein?
  
  Nonostante il suo carattere apparente semplice, sapeva *sedurre* chiunque incontrasse.
  Trotz *seines* scheinbar einfachen Charakters wusste er, jeden zu verführen, den er traf.
  
  Chi avrebbe mai detto che avrebbe usato il suo talento per *sedurre* così tante persone?
  Wer hätte gedacht, dass er sein Talent einsetzen würde, um so viele Leute zu *verführen*?
