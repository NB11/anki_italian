Beispielsätze: |-
  Devo *aprire* la finestra perché fa caldo.
  Ich muss das *Fenster öffnen*, weil es heiß ist.
  
  Ha *aperto* il regalo con grande emozione.
  Er/sie hat das *Geschenk* mit großer Emotion geöffnet.
  
  *Apri* la porta per favore, ho le mani occupate!
  *Öffne* bitte die Tür, ich habe die Hände voll!
  
  Che cosa stai per *aprire*?
  Was wirst du gleich *öffnen*?
  
  Se avessimo le chiavi, *apriremmo* subito la cassaforte.
  Wenn wir den Schlüssel hätten, würden wir den *Tresor* sofort öffnen.
