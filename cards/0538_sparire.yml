Beispielsätze: |-
  Il sole *sparisce* dietro le montagne al tramonto.
  Die Sonne *verschwindet* hinter den Bergen beim Sonnenuntergang.
  
  Ho paura che i miei soldi siano *spariti* dalla borsa.
  Ich habe Angst, dass mein Geld aus der Tasche *verschwunden* ist.
  
  *Sparireste* mai senza lasciare traccia?
