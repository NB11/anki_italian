  Er war so müde, dass er in sein Zimmer *verschwand*, ohne etwas zu sagen.
  
  Dicono che se *sparisce* la luna, la notte diventa più buia.
  Man sagt, wenn der Mond *verschwindet*, wird die Nacht dunkler.
