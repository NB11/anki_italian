Rang: 538
Wort: sparire
Wortart: vi
Wort mit Artikel: sparire
Femininum / Plural: ''
IPA: ''
Definition: verschwinden, untertauchen
Register: ''
Beispielsätze: |-
  Non riesco a credere che il mio *sia sparito* dalla scrivania così all’improvviso.
  Ich kann nicht glauben, dass mein *verschwunden* ist, so plötzlich vom Schreibtisch.
  
  Se non risolvi questo problema, il tuo lavoro *scomparirà* nel nulla.
  Wenn du dieses Problem nicht löst, wird deine Arbeit im Nichts *verschwinden*.
  
  Appena ho aperto la porta, il gatto è *sparito* nel buio della notte.
  Sobald ich die Tür geöffnet habe, ist die Katze in der Dunkelheit der Nacht *verschwunden*.
  
  Avrei voluto parlarti prima che *sparissi* per sempre dalla mia vita.
  Ich hätte mit dir sprechen wollen, bevor du für immer aus meinem Leben *verschwindest*.
  
  Dicono che chi non rispetta gli accordi *scomparirà* presto dal mercato.
  Man sagt, wer die Absprachen nicht einhält, wird bald vom Markt *verschwinden*.
