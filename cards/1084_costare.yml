Rang: 1084
Wort: costare
Wortart: vi
Wort mit Artikel: costare
Femininum / Plural: ''
IPA: ''
Definition: kosten, wert sein
Register: ''
Beispielsätze: |-
  Quanto *costa* questa bottiglia di vino locale?
  Wie viel *kostet* diese Flasche lokalen Wein?
  
  Se non avessi avuto abbastanza soldi, non avrei potuto *costato* così caro il mio viaggio a Roma.
  Hätte ich nicht genug Geld gehabt, hätte meine Reise nach Rom mich nicht so viel *gekostet*.
  
  Dicono che la felicità non *costi* nulla, ma tutti sembrano disposti a pagarci un prezzo altissimo.
  Man sagt, Glück *kostet* nichts, doch alle scheinen bereit, einen sehr hohen Preis dafür zu zahlen.
  
  Ho appena saputo che il nuovo direttore del dipartimento di arte vuole cancellare tutte le vecchie procedure perché non *costino* troppo tempo agli impiegati.
  Ich habe gerade erfahren, dass der neue Leiter der Kunstabteilung alle alten Verfahren löschen möchte, weil sie den Angestellten zu viel Zeit *kosten* würden.
  
  Prima di procedere con l’acquisto di questa telecamera, vorrei sapere se *costerà* più della precedente, dato che lo scopo è migliorare la qualità delle nostre riprese.
  Bevor ich diesen Videokamera-Kauf tätige, möchte ich wissen, ob sie mehr *kosten* wird als die vorherige, da das Ziel ist, die Qualität unserer Aufnahmen zu verbessern.
