Rang: 156
Wort: mondo
Wortart: n.m
Wort mit Artikel: il mondo
Femininum / Plural: mondi
IPA: ''
Definition: die Welt, -en
Register: ''
Beispielsätze: |-
  Il *mondo* è pieno di sorprese sorprendenti.
  Die *Welt* ist voller überraschender Überraschungen.
  
  Abbiamo visitato molti *mondi* diversi durante il nostro viaggio.
  Wir haben während unserer Reise viele *Welten* besucht.
  
  Vorrei conoscere ogni angolo di questo *mondo*!
  Ich würde jeden Winkel dieser *Welt* kennenlernen!
  
  Il *mondo* intero ha parlato di questa scoperta scientifica.
  Die gesamte *Welt* hat von dieser wissenschaftlichen Entdeckung gesprochen.
  
  Credi che esista un altro *mondo* oltre al nostro?
  Glaubst du, dass es eine andere *Welt* neben unserer gibt?
