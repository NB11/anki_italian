Beispielsätze: |-
  Ho comprato una nuova *televisione* con schermo curvo.
  Ich habe einen neuen *Fernseher* mit gewölbtem Bildschirm gekauft.
  
  Non sopporto quando la *televisione* trasmette pubblicità senza sosta.
  Ich kann es nicht ausstehen, wenn der *Fernseher* ununterbrochen Werbung ausstrahlt.
  
  La *televisione* che abbiamo visto ieri sera era davvero commovente.
  Der *Fernseher*, den wir gestern Abend gesehen haben, war wirklich rührend.
  
  Domani installeranno la nuova *televisione* in soggiorno.
  Morgen wird der neue *Fernseher* im Wohnzimmer installiert.
  
  Se non spegni quella *televisione*, non dormirò mai!
  Wenn du diesen *Fernseher* nicht ausschaltest, werde ich nie einschlafen können!
