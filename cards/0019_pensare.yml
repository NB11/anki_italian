Rang: 19
Wort: pensare
Wortart: v
Wort mit Artikel: pensare
Femininum / Plural: ''
IPA: ''
Definition: denken, nachdenken, glauben
Register: ''
Beispielsätze: |-
  Sto *pensando* a te ogni giorno.
  Ich *denke* jeden Tag an dich.
  
  Non *ho pensato* di dirtelo prima.
  Ich *habe* nicht *daran gedacht*, es dir vorher zu sagen.
  
  *Pensavi* di venire con noi?
  *Dachtest* du, du würdest mit uns kommen?
  
  È importante *pensare* alle conseguenze.
  Es ist wichtig, über die *Konsequenzen* nachzudenken.
  
  *Penseresti* di aiutarmi domani?
  *Würdest* du morgen *nachdenken*, mir zu helfen?
