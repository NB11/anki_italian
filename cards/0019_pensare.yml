Rang: 19
Wort: pensare
Wortart: v
Wort mit Artikel: pensare
Femininum / Plural: ''
IPA: ''
Definition: denken, nachdenken, überlegen
Register: ''
Beispielsätze: |-
  Devo *pensare* alle tue parole.
  Ich muss *über* deine Worte nachdenken.
  
  Hai già *pensato* di restituire il libro?
  Hast du schon *daran* gedacht, das Buch zurückzugeben?
  
  Lui *pensa* sempre alla sua famiglia.
  Er *denkt* ständig an seine Familie.
  
  Dovremmo *pensare* tutti insieme a questo.
  Wir sollten gemeinsam darüber *nachdenken*.
  
  Se fossi ricco, non *penserei* ad altro.
  Wenn ich reich wäre, würde ich an nichts anderes *denken*.
