Rang: 4384
Wort: legna
Wortart: n.f
Wort mit Artikel: la legna
Femininum / Plural: legne
IPA: ''
Definition: das Brennholz, -
Register: ''
Beispielsätze: |-
  D’inverno accendiamo sempre *legna* nel camino per riscaldarci.
  Im Winter verbrennen wir immer *Brennholz* im Kamin, um uns zu wärmen.
  
  Dopo la festa abbiamo trovato la *legna* per il falò ancora impilata in giardino.
  Nach der Feier haben wir *das Brennholz* für das Lagerfeuer noch im Garten aufgeschichtet gefunden.
  
  Se non troviamo abbastanza *legna*, dovremo rinunciare al barbecue di sabato.
  Wenn wir nicht genug *Brennholz* finden, müssen wir auf das Barbecue am Samstag verzichten.
  
  La *legna* che hai comprato ha un odore così intenso da riempire tutta la cucina!
  Das *Brennholz*, das du gekauft hast, riecht so intensiv, dass es die ganze Küche erfüllt!
  
  Mi raccomando, copri la *legna* con un telo così non si bagna prima di essere usata.
  Pass aber auf, decke *das Brennholz* mit einer Plane ab, damit es nicht nass wird, bevor es benutzt wird.
