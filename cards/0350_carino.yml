Beispielsätze: |-
  Il tuo cane è *carino*, vero?
  Dein Hund ist *niedlich*, oder?
  
  Questo regalo è molto *carino* da parte tua.
  Dieses Geschenk ist sehr *liebenswert* von dir.
  
  I negozi in questa via sono *carini* ma un po' cari.
  Die Läden in dieser Straße sind *hübsch*, aber ein bisschen teuer.
  
  Spero che tu trovi qualcuno *carino* prima o poi.
  Ich hoffe, du findest irgendwann jemanden *liebenswert*.
  
  Erano *carini* con me quando ero malato.
  Sie waren *nett* zu mir, als ich krank war.
