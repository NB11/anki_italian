Rang: 513
Wort: risposta
Wortart: n.f
Wort mit Artikel: la risposta
Femininum / Plural: risposte
IPA: ''
Definition: die Antwort, -en
Register: ''
Beispielsätze: |-
  Non ho ancora ricevuto la *risposta* che aspettavo da giorni.
  Ich habe immer noch nicht die *Antwort* erhalten, die ich seit Tagen erwarte.
  
  Se tu fossi più gentile, riceveresti una *risposta* migliore!
  Wenn du netter wärst, würdest du eine *bessere Antwort* bekommen!
  
  La *risposta* che hai dato era completamente sbagliata, purtroppo.
  Die *Antwort*, die du gegeben hast, war leider völlig falsch.
  
  Dimmi subito la verità senza *risposta* evasiva!
  Sag mir sofort die Wahrheit ohne *ausweichende Antwort*!
  
  Nonostante la sua preoccupazione, la *risposta* del presidente fu molto tranquilla.
  Trotz seiner Besorgnis war die *Antwort* des Präsidenten sehr ruhig.
