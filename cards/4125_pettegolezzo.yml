Rang: 4125
Wort: pettegolezzo
Wortart: n.m
Wort mit Artikel: il pettegolezzo
Femininum / Plural: i pettegolezzi
IPA: ''
Definition: der Klatsch, -e
Register: ''
Beispielsätze: |-
  Spero che tu non creda a tutti questi *pettegolezzi* che girano in ufficio.
  Ich hoffe, dass du nicht all diesen *Klatsch* glaubst, der im Büro umhergeht.
  
  Quel *pettegolezzo* su di lei si è rivelato completamente falso dopo poche settimane.
  Dieser *Klatsch* über sie stellte sich nach wenigen Wochen als völlig falsch heraus.
  
  Non raccontare certi *pettegolezzi*; potrebbero offendere qualcuno senza volerlo!
  Erzähl nicht solche *Klatschgeschichten*; sie könnten jemanden ungewollt verletzen!
  
  Nel romanzo, il *pettegolezzo* tra i vicini diventa addirittura la causa di un conflitto familiare.
  Im Roman wird der *Klatsch* zwischen den Nachbarn sogar zur Ursache eines Familienkonflikts.
  
  Se ascolti troppi *pettegolezzi*, rischi di rovinare le tue relazioni sociali.
  Wenn du zu viel *Klatsch* hörst, riskierst du, deine sozialen Beziehungen zu ruinieren.
