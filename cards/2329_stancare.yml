Rang: 2329
Wort: stancare
Wortart: vt
Wort mit Artikel: stancare
Femininum / Plural: ''
IPA: ''
Definition: müde machen, erschöpfen
Register: ''
Beispielsätze: |-
  Lungo viaggio *stanca* anche il più robusto dei viaggiatori.
  Lange Reisen machen auch den robustesten Reisenden *müde*.
  
  Se non ti riposi, ti *stancarai* in un attimo.
  Wenn du dich nicht ausruhst, wirst du dich sofort *erschöpfen*.
  
  Mi hanno detto che questo lavoro *stanca* più di quanto sembra.
  Man hat mir gesagt, dass diese Arbeit mehr *ermüdet*, als es scheint.
  
  Non volevo *stancarti* con le mie domande ripetute, ma ho bisogno di capire.
  Ich wollte dich mit meinen wiederholten Fragen nicht *ermüden*, aber ich muss es verstehen.
  
  Dopo una settimana di lavoro, mi sento *stancato* da ogni cosa, anche dalla musica.
  Nach einer Woche Arbeit fühle ich mich durch alles *erschöpft*, sogar von der Musik.
Audio: ''
Notiz: ''
Dispersion: ''
