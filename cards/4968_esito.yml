Rang: 4968
Wort: esito
Wortart: n.m
Wort mit Artikel: l'esito
Femininum / Plural: esiti
IPA: ''
Definition: das Ergebnis, die Folge, die Konsequenz
Register: ''
Beispielsätze: |-
  L'*esito* dell'esame è stato eccellente, non mi aspettavo un voto così alto.
  Das *Ergebnis* der Prüfung war hervorragend, ich hatte nicht mit so einer guten Note gerechnet.
  
  Nonostante tutti gli sforzi, l'*esito* della riunione è stato deludente per molti partecipanti.
  Trotz aller Bemühungen war das *Ergebnis* des Treffens für viele Teilnehmer enttäuschend.
  
  L'*esito* positivo del progetto ha permesso all'azienda di ricevere nuovi finanziamenti.
  Das positive *Ergebnis* des Projekts ermöglichte es dem Unternehmen, neue Finanzmittel zu erhalten.
  
  Temo che l'*esito* di questa trattativa non sia favorevole per nessuno dei due Paesi coinvolti.
  Ich fürchte, das *Ergebnis* dieser Verhandlungen ist für keines der beiden Länder vorteilhaft.
  
  Se vuoi sapere l'*esito* della tua domanda, controlla la bacheca delle comunicazioni domani mattina.
  Falls du das *Ergebnis* deiner Bewerbung wissen möchtest, schau morgen früh am schwarzen Brett nach.
