Rang: 1216
Wort: sguardo
Wortart: n.m
Wort mit Artikel: lo sguardo
Femininum / Plural: sguardi
IPA: ''
Definition: der Blick, -e
Register: ''
Beispielsätze: |-
  Non posso dimenticare *lo sguardo* che mi ha rivolto quando siamo partiti.
  Ich kann den *Blick* nicht vergessen, den er mir zuwarf, als wir losfuhren.
  
  Ha uno *sguardo* molto profondo che sembra leggere dentro di me.
  Sie hat einen sehr *tiefen Blick*, der mich durchdringt.
  
  Con *lo sguardo* fisso sul portafoglio, ha capito al volo che la situazione era difficile.
  Mit dem *Blick* auf die Geldbörse begriff er sofort, dass die Lage schwierig war.
  
  Dalla finestra ho notato *lo sguardo* di lui che cercava di attirare la mia attenzione.
  Vom Fenster aus bemerkte ich den *Blick* von ihm, der versuchte, meine Aufmerksamkeit zu erregen.
  
  Dopo *lo sguardo* che ci siamo scambiati, ho capito che tra noi c’era qualcosa di speciale.
  Nach dem *Blick*, den wir uns schenkten, wusste ich, dass zwischen uns etwas Besonderes war.
