Rang: 4779
Wort: passero
Wortart: n.m
Wort mit Artikel: il passero
Femininum / Plural: passeri
IPA: ''
Definition: der Sperling, -
Register: ''
Beispielsätze: |-
  Mentre camminavo in città, ho visto un *passero* appollaiato sul balcone di un bar.
  Während ich in der Stadt ging, sah ich einen *Sperling* auf dem Balkon einer Bar sitzen.
  
  Se non ci fossero le gabbie, tutti gli *passeri* volerebbero via dal giardino dello zoo.
  Wenn es keine Käfige gäbe, würden alle *Sperlinge* aus dem Garten des Zoos wegfliegen.
  
  Il *passero* che ho trovato ferito non riusciva più a volare da solo.
  Der *Sperling*, den ich verletzt fand, konnte nicht mehr allein fliegen.
  
  Ho comprato dei semi di girasole per attirare i *passeri* nel mio giardino, ma vengono solo i piccioni.
  Ich habe Sonnenblumenkerne gekauft, um die *Sperlinge* in meinen Garten zu locken, aber es kommen nur Tauben.
  
  Chiunque uccida un *passero* in questa zona rischia una multa salata, perché sono protetti dalla legge.
  Wer einen *Sperling* in dieser Gegend tötet, riskiert eine hohe Geldstrafe, denn sie stehen unter Artenschutz.
