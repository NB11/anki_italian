Rang: 1154
Wort: reggere
Wortart: v
Wort mit Artikel: reggere
Femininum / Plural: ''
IPA: ''
Definition: halten, stützen, ertragen
Register: ''
Beispielsätze: |-
  Devi *reggere* il peso con entrambe le mani, altrimenti il vaso si romperà.
  Du musst das Gewicht mit beiden *Händen halten*, sonst geht die Vase kaputt.
  
  Nonostante le minacce, il piccolo villaggio continuò a *reggere* con coraggio.
  Trotz der *Drohungen* hielt das kleine Dorf weiter mit Mut stand.
  
  Il ponte *regge* il traffico di centinaia di taxi ogni giorno senza problemi.
  Die Brücke *trägt* den Verkehr von hunderten Taxis jeden Tag problemlos.
  
  Mi hanno detto che lui *reggerebbe* questa responsabilità senza esitare, ma non ne sono sicuro.
  Man hat mir gesagt, er würde diese *Verantwortung* ohne Zögern tragen, aber ich bin mir nicht sicher.
  
  Se non *reggi* l’equilibrio, finirai per cadere giù dalla montagna, quindi stai attento!
  Wenn du das Gleichgewicht nicht *hältst*, wirst du den Berg hinunterfallen, also pass auf!
