Rang: 3944
Wort: sennò
Wortart: adv
Wort mit Artikel: sennò
Femininum / Plural: ''
IPA: ''
Definition: sonst, andernfalls
Register: ''
Beispielsätze: |-
  Devi studiare di più, *sennò* non passerai l'esame!
  Du musst mehr lernen, *sonst* bestehst du die Prüfung nicht!
  
  Se non hai la chiave, ti farà entrare il vicino, *sennò* dovrai aspettare me.
  Wenn du den Schlüssel nicht hast, lässt dich der Nachbar rein — *andernfalls* musst du auf mich warten.
  
  Portami un panino, *sennò* mangio solo questa cipolla che ho trovato nella borsa!
  Bring mir ein Brötchen mit, *sonst* esse ich nur diese Zwiebel, die ich in der Tasche gefunden habe!
  
  Abbiamo prenotato al ristorante per le otto, ma se c'è fila *sennò* possiamo andare a bere qualcosa al bar qui vicino.
  Wir haben für acht Uhr reserviert, aber falls es eine Schlange gibt, können wir *sonst* auch etwas an der Bar hier in der Nähe trinken gehen.
  
  Fai come ti dico, *sennò* mi arrabbio davvero e questo non ti conviene!
  Mach, was ich sage, *sonst* werde ich richtig wütend — und das wäre nicht gut für dich!
