Rang: 3558
Wort: dimissione
Wortart: n.f
Wort mit Artikel: la dimissione
Femininum / Plural: dimissioni
IPA: ''
Definition: die Kündigung, -en
Register: ''
Beispielsätze: |-
  Dopo anni di lavoro, ha ricevuto la *dimissione* senza preavviso.
  Nach Jahren der Arbeit hat er die *Kündigung* ohne Vorwarnung erhalten.
  
  Se non migliora, la *dimissione* sarà inevitabile secondo il regolamento.
  Falls er sich nicht bessert, wird die *Kündigung* nach der Vorschrift unvermeidbar sein.
  
  La *dimissione* volontaria offre alcuni vantaggi fiscali in Italia.
  Die freiwillige *Kündigung* bietet in Italien einige steuerliche Vorteile.
  
  Nonostante le proteste dei colleghi, la *dimissione* è stata confermata dal direttore.
  Trotz der Proteste der Kollegen wurde die *Kündigung* vom Direktor bestätigt.
  
  Stanno valutando se accettare la *dimissione* o cercare un accordo con l'azienda.
  Sie überlegen, ob sie die *Kündigung* annehmen oder eine Einigung mit dem Unternehmen suchen sollen.
