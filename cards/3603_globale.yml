Beispielsätze: |-
  Il problema *globale* del cambiamento climatico richiede soluzioni coordinate a livello internazionale.
  Das *globale* Problem des Klimawandels erfordert international koordinierte Lösungen.
  
  Nonostante i progressi, la povertà rimane un fenomeno *globalmente* diffuso.
  Trotz Fortschritten bleibt Armut ein *global* verbreitetes Phänomen.
  
  Le aziende stanno cercando strategie *globali* per affrontare la crisi economica.
  Die Unternehmen suchen nach *globalen* Strategien, um die Wirtschaftskrise zu bewältigen.
  
  È *globalmente* riconosciuto che l’istruzione è la chiave per lo sviluppo sostenibile.
  Es ist *weltweit* anerkannt, dass Bildung der Schlüssel für nachhaltige Entwicklung ist.
  
  L’impatto *globale* della pandemia ha costretto molti paesi a rivedere le proprie politiche sanitarie.
  Die *globale* Auswirkung der Pandemie hat viele Länder gezwungen, ihre Gesundheitspolitiken zu überdenken.
