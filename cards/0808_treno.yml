Rang: 808
Wort: treno
Wortart: n.m
Wort mit Artikel: il treno
Femininum / Plural: treni
IPA: ''
Definition: die Eisenbahn, -en
Register: ''
Beispielsätze: |-
  Il *treno* per Roma parte alle otto di sera dalla stazione centrale.
  Der Zug nach Rom fährt um acht Uhr abends vom Hauptbahnhof *ab*.
  
  Mentre aspettavo alla fermata, ho visto un *treno* merci che passava.
  Während ich an der Haltestelle wartete, sah ich einen Güterzug *vorbeifahren*.
  
  Se non arrivi in tempo, altrimenti perderai il *treno* per Milano.
  Wenn du nicht rechtzeitig ankommst, verpasst du sonst den Zug *nach* Mailand.
  
  Ho saputo che il *treno* regionale ha subito un cambio di orario per un problema tecnico.
  Ich habe gehört, dass der Regionalzug eine Umstellung des Fahrplans wegen eines technischen Problems *erlebt hat*.
  
  Quando ero piccolo, sognavo di viaggiare con un *treno* ad alta velocità attraverso l’Europa.
  Als ich klein war, träumte ich davon, mit einem Hochgeschwindigkeitszug durch *Europa* zu reisen.
