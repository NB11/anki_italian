Rang: 4285
Wort: consistere
Wortart: vi
Wort mit Artikel: consistere
Femininum / Plural: ''
IPA: ''
Definition: bestehen aus, beruhen auf
Register: ''
Beispielsätze: |-
  La soluzione *consiste* in una combinazione di elementi chimici.
  Die Lösung *besteht* aus einer Kombination von chemischen Elementen.
  
  Secondo il contratto, il pagamento *consisterà* in tre rate annuali.
  Laut Vertrag wird die Zahlung aus drei jährlichen Raten *bestehen*.
  
  La felicità non può *consistere* solo nel denaro.
  Glück kann nicht nur aus Geld *bestehen*.
  
  Il successo di questo progetto *consisterà* nell’efficienza del team.
  Der Erfolg dieses Projekts wird in der Effizienz des Teams *bestehen*.
  
  Per risolvere il problema, *consiste* nel trovare la causa principale.
  Um das Problem zu lösen, *besteht* es darin, die Hauptursache zu finden.
