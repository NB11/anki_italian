Rang: 4765
Wort: reggimento
Wortart: n.m
Wort mit Artikel: il reggimento
Femininum / Plural: reggimenti
IPA: ''
Definition: das Regiment, -er
Register: ''
Beispielsätze: |-
  Il *reggimento* di fanteria ha partecipato a una esercitazione militare di due settimane.
  Die *Infanterieeinheit* hat an einer zweiwöchigen Militärübung teilgenommen.
  
  Nonostante le difficoltà logistiche, il *reggimento* riuscì a raggiungere la posizione assegnata in tempo.
  Trotz logistischer Schwierigkeiten gelang es der *Einheit*, die zugewiesene Position rechtzeitig zu erreichen.
  
  Se il *reggimento* fosse stato meglio equipaggiato, avrebbe potuto vincere lo scontro decisivo.
  Wenn die *Einheit* besser ausgerüstet gewesen wäre, hätte sie die entscheidende Schlacht gewinnen können.
  
  Il tenente ordinò che il *reggimento* si ritirasse verso le colline per evitare l'accerchiamento.
  Der Leutnant befahl, dass sich die *Einheit* zu den Hügeln zurückzog, um die Einkreisung zu vermeiden.
  
  Durante l'assedio, il *reggimento* ricevette rinforzi nonostante le condizioni meteorologiche avverse.
  Während der Belagerung erhielt die *Einheit* Verstärkung, trotz der widrigen Wetterbedingungen.
