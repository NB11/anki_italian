Rang: 196
Wort: continuare
Wortart: v
Wort mit Artikel: continuare
Femininum / Plural: ''
IPA: ''
Definition: fortsetzen, weitermachen
Register: ''
Beispielsätze: |-
  Io *continuo* a studiare l'italiano ogni giorno.
  Ich *mache* weiter jeden Tag Italienisch.
  
  Vuoi che *continuiamo* con il progetto domani?
  Sollen wir morgen mit dem Projekt *fortsetzen*?
  
  Lui non *ha continuato* a lavorare lì dopo la scadenza.
  Er *hat* dort nicht weiter*gearbeitet* nach der Frist.
  
  Se *continuassi* a piovere, non potremmo uscire.
  Falls es weiter*regnen* *würde*, könnten wir nicht rausgehen.
  
  Spero che tu *continui* a migliorare il tuo italiano.
  Ich hoffe, dass du dein Italienisch weiter*verbessern* wirst.
