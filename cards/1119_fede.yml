Rang: 1119
Wort: fede
Wortart: n.f
Wort mit Artikel: la fede
Femininum / Plural: fedi
IPA: ''
Definition: der Glaube, -n
Register: ''
Beispielsätze: |-
  La *fede* è importante per molti credenti in tutto il mondo.
  Der *Glaube* ist für viele Gläubige auf der ganzen Welt wichtig.
  
  Nonostante i dubbi, mantenne salda la sua *fede*.
  Trotz seiner *Zweifel* hielt er seinen Glauben fest.
  
  Ha giurato sulla *fede* dei suoi antenati.
  Er hat auf den *Glauben* seiner Vorfahren geschworen.
  
  Senza *fede* nella giustizia, non avrebbe denunciato il furto.
  Ohne *Glauben* an Gerechtigkeit hätte er den Diebstahl nicht angezeigt.
  
  La *fede* che provava per lui sembrava incondizionata, perfino quando tutto crollava.
  Der *Glaube*, den sie für ihn empfand, schien bedingungslos, selbst wenn alles zusammenbrach.
