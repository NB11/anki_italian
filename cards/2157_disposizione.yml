Rang: 2157
Wort: disposizione
Wortart: n.f
Wort mit Artikel: la disposizione
Femininum / Plural: disposizioni
IPA: ''
Definition: die Anordnung, Verfügung, -en
Register: ''
Beispielsätze: |-
  Secondo la *disposizione* del direttore, tutti devono lavorare di sabato.
  Laut der *Verfügung* des Direktors müssen alle am Samstag arbeiten.
  
  Mi ha dato piena *disposizione* su come organizzare il progetto.
  Er hat mir volle *Verfügung* über die Projektorganisation gegeben.
  
  La *disposizione* degli arredi nel nuovo ufficio è molto moderna.
  Die *Anordnung* der Möbel im neuen Büro ist sehr modern.
  
  Non capisco le vostre *disposizioni*: cosa devo fare prima?
  Ich verstehe eure *Anweisungen* nicht: was soll ich zuerst tun?
  
  Nella *disposizione* del problema matematico c’era un errore che ho corretto.
  In der *Formulierung* der Mathematikaufgabe gab es einen Fehler, den ich korrigiert habe.
