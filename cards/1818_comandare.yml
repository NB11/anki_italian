Rang: 1818
Wort: comandare
Wortart: vt
Wort mit Artikel: comandare
Femininum / Plural: ''
IPA: ''
Definition: befehlen, anweisen
Register: ''
Beispielsätze: |-
  Il generale *comanda* ai soldati di avanzare immediatamente.
  Der General befiehlt *den* Soldaten, sofort vorzurücken.
  
  Se tu *comanderesti* meglio la squadra, vinceremmo di più.
  Wenn du *das* Team besser anweisen würdest, würden wir öfter gewinnen.
  
  Ho sentito dire che il direttore *comanderà* le operazioni domani.
  Ich habe gehört, dass der Direktor morgen *die* Operationen leiten wird.
  
  È importante che tu *comandi* con fermezza in questa situazione difficile.
  Es ist wichtig, dass du in dieser schweren Situation *entschlossen anleitest*.
  
  Perché mai *comandi* gli altri come se fossero burattini?
  Warum *befiehlst* du den anderen, als wären sie Marionetten?
