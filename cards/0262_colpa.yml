Rang: 262
Wort: colpa
Wortart: n.f
Wort mit Artikel: la colpa
Femininum / Plural: colpe
IPA: ''
Definition: die Schuld, -en
Register: ''
Beispielsätze: |-
  Non è *colpa* *mia*, ma tua!
  Es ist nicht *meine Schuld*, sondern deine!
  
  Hai detto che la *colpa* è dell’insegnante?
  Hast du gesagt, dass die *Schuld* beim Lehrer liegt?
  
  Secondo me, non c’è nessuna *colpa* da trovare.
  Meiner Meinung nach gibt es keine *Schuld*, die man finden könnte.
  
  Mi assumo tutta la *colpa* per il disastro!
  Ich übernehme die ganze *Schuld* für das Chaos!
  
  È meglio chiedere scusa che scaricare la *colpa* sugli altri.
  Es ist besser, sich zu entschuldigen, als die *Schuld* auf andere abzuwälzen.
