Femininum / Plural: ''
IPA: ''
Definition: helfen
Register: ''
Beispielsätze: |-
  Posso *aiutarti* con i compiti di matematica?
  Kann ich dir *bei* den Matheaufgaben *helfen*?
  
  Ieri ho *aiutato* mio nonno a sistemare il giardino.
  Gestern habe ich meinen Opa beim Gärtnern *geholfen*.
  
  Vorrebbe che qualcuno lo *aiutasse* con il trasloco.
  Er hätte gerne, dass ihm jemand beim Umzug *hilft*.
  
  Se avessi più tempo, ti *aiuterei* volentieri.
  Wenn ich mehr Zeit hätte, würde ich dir gern *helfen*.
  
  Dicono che *aiutare* gli altri dia felicità.
  Sie sagen, dass das *Helfen* anderen Glück bringt.
