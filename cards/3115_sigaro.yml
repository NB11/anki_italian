Beispielsätze: |-
  Mio nonno fuma sempre un *sigaro* dopo cena.
  Mein Opa raucht immer eine *Zigarre* nach dem Abendessen.
  
  Ho comprato una scatola di *sigari* di ottima qualità al negozio di lusso.
  Ich habe eine Schachtel *Zigarren* von hervorragender Qualität im Luxusladen gekauft.
  
  Se vuoi gustare un vero *sigaro* cubano, devi andare a L’Avana.
  Wenn du eine echte kubanische *Zigarre* probieren willst, musst du nach Havanna fahren.
  
  Nonostante il divieto, alcuni continuano a fumare il *sigaro* nei ristoranti.
  Trotz des Verbots rauchen manche weiterhin im Restaurant eine *Zigarre*.
  
  Il *sigaro* che ho ricevuto in regalo aveva un aroma delizioso ma troppo intenso per me.
  Die *Zigarre*, die ich als Geschenk bekommen habe, hatte ein köstliches Aroma, aber war mir zu intensiv.
