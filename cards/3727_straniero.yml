Rang: 3727
Wort: straniero
Wortart: n.m
Wort mit Artikel: lo straniero
Femininum / Plural: stranieri
IPA: ''
Definition: der Ausländer, -
Register: ''
Beispielsätze: |-
  Lo *straniero* ha chiesto indicazioni al poliziotto che era di pattuglia sul marciapiede rumoroso.
  Der *Ausländer* hat den Polizisten, der auf dem lauten Gehweg Streife ging, nach dem Weg gefragt.
  
  Nonostante sia nato qui, si sente ancora uno *straniero* nella sua stessa città.
  Obwohl er hier geboren ist, fühlt er sich noch immer wie ein *Ausländer* in seiner eigenen Stadt.
  
  Avrei voluto parlargli, ma era troppo timido per rivolgermi a quello *straniero* che sedeva da solo al bar.
  Ich hätte mit ihm sprechen wollen, aber er war zu schüchtern, um sich an den *Ausländer* zu wenden, der allein an der Bar saß.
  
  Se non fosse stato per il suo passaporto, nessuno avrebbe capito che era uno *straniero* così integrato.
  Wenn es nicht sein Pass gewesen wäre, hätte niemand verstanden, dass er ein so integrierter *Ausländer* war.
  
  Il sindaco ha promesso che faciliteranno l’integrazione degli *stranieri* che vogliono rimanere definitivamente.
  Der Bürgermeister hat versprochen, dass sie die Integration der *Ausländer*, die für immer bleiben wollen, erleichtern werden.
