Rang: 3359
Wort: ritiro
Wortart: n.m
Wort mit Artikel: il ritiro
Femininum / Plural: ritiri
IPA: ''
Definition: der Rückzug, -e
Register: ''
Beispielsätze: |-
  Dopo la sconfitta, il capitano annunciò *ritiro* della squadra dalla competizione.
  Nach der Niederlage verkündete der Kapitän den *Rückzug* der Mannschaft vom Wettbewerb.
  
  Il generale ordinò *ritiro* immediato delle truppe verso la base.
  Der General befahl den sofortigen *Rückzug* der Truppen zur Basis.
  
  Nonostante la sconfitta, il giocatore considerava *ritiro* ancora prematuro.
  Trotz der Niederlage hielt der Spieler einen *Rückzug* noch für verfrüht.
  
  Il *ritiro* forzato dall’infermeria preoccupò tutto lo spogliatoio.
  Der *Rückzug* auf die Krankenstation beunruhigte die gesamte Umkleide.
  
  Se vinco ancora, forse sarà il momento di pensare al *ritiro* definitivo.
  Wenn ich noch gewinne, ist vielleicht der Moment für einen endgültigen *Rückzug* gekommen.
