Rang: 4415
Wort: indebolire
Wortart: vt
Wort mit Artikel: indebolire
Femininum / Plural: ''
IPA: ''
Definition: schwächen, abschwächen
Register: ''
Beispielsätze: |-
  Il troppo *indebolisce* il carattere delle persone pigre.
  Zu viel *schwächt* den Charakter fauler Menschen.
  
  L'ospedale temeva che il virus potesse *indebolire* ulteriormente gli anziani.
  Das Krankenhaus fürchtete, dass das Virus die Senioren *abschwächen* könnte.
  
  Se non avessi riposato, la malattia avrebbe continuato a *indebolire* il tuo sistema immunitario.
  Hättest du dich nicht ausgeruht, hätte die Krankheit dein Immunsystem weiter *geschwächt*.
  
  Gli scienziati stanno cercando un modo per *indebolire* le cellule tumorali senza danneggiare quelle sane.
  Die Wissenschaftler suchen eine Methode, um die Tumorzellen zu *schwächen*, ohne gesunde Zellen zu schädigen.
  
  Nonostante la pioggia non riuscì a *indebolire* il morale dei soldati durante la battaglia.
  Trotz des Regens gelang es nicht, die Moral der Soldaten während der Schlacht zu *schwächen*.
