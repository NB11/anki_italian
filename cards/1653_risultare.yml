Rang: 1653
Wort: risultare
Wortart: vi
Wort mit Artikel: risultare
Femininum / Plural: ''
IPA: ''
Definition: sich herausstellen
Register: ''
Beispielsätze: |-
  Dopo l’esame, è *risultato* che avevo preso un voto alto.
  Nach der Prüfung hat es sich *herausgestellt*, dass ich eine gute Note bekommen hatte.
  
  Questa decisione potrebbe *risultare* molto costosa per la nostra azienda.
  Diese Entscheidung könnte *sich als* sehr teuer für unser Unternehmen erweisen.
  
  Mi sembra strano che il libro *risulti* tanto interessante per loro, dato che non leggono mai.
  Es kommt mir seltsam vor, dass das Buch *sich als* so interessant für sie erweist, obwohl sie nie lesen.
  
  Se non studierai, *risulterai* impreparato all’esame finale.
  Wenn du nicht lernst, *wirst du* bei der Abschlussprüfung unvorbereitet dastehen.
  
  È inutile che continui a nascondere la verità: alla fine tutto *risulterà* chiaro a tutti.
  Es hat keinen Sinn, die Wahrheit weiter zu verstecken: am Ende *wird* alles klar werden.
