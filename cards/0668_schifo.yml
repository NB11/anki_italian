Rang: 668
Wort: schifo
Wortart: n.m
Wort mit Artikel: lo schifo
Femininum / Plural: schifi
IPA: ''
Definition: der Ekel, die Abscheu
Register: ''
Beispielsätze: |-
  Provo *schifo* quando vedo qualcuno che spreca il cibo attorno a me.
  Ich empfinde *Ekel*, wenn ich sehe, wie jemand das Essen um mich herum verschwendet.
  
  Non capisco perché abbia provato *schifo* durante l'intervento, dato che era eccellente.
  Ich verstehe nicht, warum du *Abscheu* bei dem Eingriff empfunden hast, obwohl er hervorragend war.
  
  Se mi costringi a mangiare quel biscotto, mi verrai a pentirti di aver creato tanto *schifo*!
  Wenn du mich zwingst, diesen Keks zu essen, wirst du es *bereuen*, so viel Abscheu erzeugt zu haben!
  
  È un *pazzesco* che la giuria abbia assegnato il premio a una proposta tanto banale, senza riconoscere il valore del lavoro originale.
  Es ist einfach *verrückt*, dass die Jury den Preis für einen so banalen Vorschlag vergeben hat, ohne den Wert der ursprünglichen Arbeit zu erkennen.
  
  Lo *schifo* che provo per questa situazione è tale che preferirei essere rinchiuso in galera piuttosto che doverla sopportare un altro secondo.
  Der *Ekel*, den ich für diese Situation empfinde, ist so groß, dass ich lieber im Gefängnis sitzen würde, als sie noch eine Sekunde länger ertragen zu müssen.
