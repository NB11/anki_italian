Rang: 668
Wort: schifo
Wortart: n.m
Wort mit Artikel: lo schifo
Femininum / Plural: schifi
IPA: ''
Definition: der Ekel
Register: ''
Beispielsätze: |-
  Mi fa *schifo* questo cibo.
  Dieses Essen *ekelt* mich *an*.
  
  Che *schifo*! Hai le mani sporche.
  Wie *eklig*! Du hast schmutzige Hände.
  
  Provavo *schifo* quando l'ho visto.
  Ich *ekelte mich*, als ich ihn gesehen habe.
  
  Non capisco perché provi *schifo* per i ragni.
  Ich verstehe nicht, warum du dir vor Spinnen *ekelst*.
  
  Se avessi visto quella scena, ti sarebbe venuto *schifo* anche a te.
  Wenn du diese Szene gesehen hättest, hätte sie auch dir *Ekel* bereitet.
