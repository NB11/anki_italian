Rang: 1335
Wort: abitare
Wortart: vi
Wort mit Artikel: abitare
Femininum / Plural: ''
IPA: ''
Definition: wohnen, leben
Register: ''
Beispielsätze: |-
  Dove *abiti* tu? Io abito in una casa vicino alla spiaggia.
  Wo *wohnst* du? Ich wohne in einem Haus nahe dem Strand.
  
  Mio nonno *abitava* in un piccolo paese in montagna, ma ora abita vicino a noi.
  Mein Opa *lebte* in einem kleinen Dorf in den Bergen, aber jetzt wohnt er bei uns.
  
  Se *abitassi* più vicino all'ufficio, non dovresti prendere l'autobus ogni mattina.
  Wenn du näher am Büro *wohnst*, müsstest du nicht jeden Morgen den Bus nehmen.
  
  Spero che tra qualche anno potremo *abitare* insieme in una città dove c'è molta magia.
  Ich hoffe, dass wir in ein paar Jahren zusammen in einer Stadt *wohnen* können, in der es viel Magie gibt.
  
  Nonostante la distanza, loro *abitano* da anni nella stessa zona, perché si sentono molto legati al luogo.
  Trotz der *Entfernung* wohnen sie seit Jahren in derselben Gegend, weil sie sich sehr mit dem Ort verbunden fühlen.
