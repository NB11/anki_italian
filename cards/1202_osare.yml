Rang: 1202
Wort: osare
Wortart: v
Wort mit Artikel: osare
Femininum / Plural: ''
IPA: ''
Definition: wagen
Register: ''
Beispielsätze: |-
  Non *oserei* mai dire una bugia a un ospite così gentile.
  Ich würde einem so netten *Gast* niemals eine Lüge sagen.
  
  Anche se è *assurdo*, lui osa darsi del vino ogni sera.
  Obwohl es *absurd* ist, wagt er es, sich jeden Abend Wein zu gönnen.
  
  Lei *oserebbe* scalare quella montagna, se avesse più merito?
  Würde sie diesen Berg besteigen, wenn sie mehr *Verdienst* hätte?
  
  Dopo aver *abituato* il suo socio alla routine, finalmente osò proporre un cambiamento.
  Nachdem er seinen *Mitglied* an die Routine gewöhnt hatte, wagte er es endlich, eine Veränderung vorzuschlagen.
  
  C’è chi *osa* giudicare un’intera serie basandosi su un solo episodio.
  Es gibt Leute, die es *wagen*, eine ganze Serie aufgrund einer einzigen Folge zu beurteilen.
