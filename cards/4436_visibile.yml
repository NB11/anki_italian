Rang: 4436
Wort: visibile
Wortart: adj
Wort mit Artikel: visibile
Femininum / Plural: ''
IPA: ''
Definition: sichtbar, erkennbar
Register: ''
Beispielsätze: |-
  La luna era *visibile* anche nelle aree più illuminate della città.
  Der Mond war sogar in den hellsten Gebieten der Stadt *sichtbar*.
  
  Nonostante la nebbia, la sagoma della montagna risultava ancora *visibile* all’orizzonte.
  Trotz des Nebels war die Silhouette des Berges am Horizont noch *erkennbar*.
  
  Era *visibile* nei suoi occhi quanto fosse preoccupata per l’esame.
  Es war in ihren Augen *sichtbar*, wie sehr sie sich vor der Prüfung fürchtete.
  
  I documenti rimangono *visibili* a tutti gli utenti autorizzati del sistema.
  Die Dokumente bleiben allen autorisierten Benutzern des Systems *sichtbar*.
  
  La scritta sul muro, ormai sbiadita, era appena *visibile* alla luce della torcia.
  Die Schrift an der Wand, mittlerweile verblasst, war im Schein der Taschenlampe kaum *erkennbar*.
