Rang: 1753
Wort: cenare
Wortart: v
Wort mit Artikel: cenare
Femininum / Plural: ''
IPA: ''
Definition: zu Abend essen
Register: ''
Beispielsätze: |-
  Stasera *ceniamo* al ristorante cinese che hai trovato sulla mappa.
  Heute Abend *essen wir* in dem chinesischen Restaurant, das du auf der Karte gefunden hast.
  
  Se non avessi così tanto lavoro, potremmo *cenare* insieme più spesso.
  Wenn ich nicht so viel Arbeit hätte, könnten wir öfter *zu Abend essen*.
  
  Mi piacerebbe sapere se hai già preparato la cena o se dobbiamo *cenare* fuori.
  Ich würde gerne wissen, ob du schon das Abendessen vorbereitet hast oder ob wir *zu Abend essen* gehen müssen.
  
  Quando ero piccolo, mia nonna mi diceva che dovevo *cenare* per avere le forze per giocare a calcio il giorno dopo.
  Als ich klein war, sagte mir meine Oma, dass ich *zu Abend essen* musste, um am nächsten Tag beim Fußballspielen Kraft zu haben.
  
  Nonostante la fiamma oscura, abbiamo deciso di *cenare* ugualmente sulla terrazza con il riscaldamento acceso.
  Trotz der dunklen Flamme haben wir beschlossen, trotzdem auf der Terrasse mit der Heizung an zu *zu Abend essen*.
