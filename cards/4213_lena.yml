Rang: 4213
Wort: lena
Wortart: n.f
Wort mit Artikel: la lena
Femininum / Plural: le lene
IPA: ''
Definition: die Energie, die Kraft; die Ausdauer
Register: ''
Beispielsätze: |-
  Dopo la maratona, ho perso tutta la *lena* e sono crollato a terra.
  Nach dem Marathon hatte ich keine *Energie* mehr und bin zusammengebrochen.
  
  Con *lena* e determinazione, riuscì a scalare la montagna.
  Mit *Ausdauer* und Entschlossenheit schaffte er es, den Berg zu besteigen.
  
  Nonostante la *lena*, il lavoro non era ancora finito.
  Trotz meiner *Kraft* war die Arbeit noch nicht beendet.
  
  La *lena* di quel ragazzo è davvero ammirevole, non si stanca mai.
  Die *Ausdauer* dieses Jungen ist wirklich bewundernswert, er wird nie müde.
  
  Se hai perso la *lena*, forse dovresti riposare un po’.
  Wenn du deine *Energie* verloren hast, solltest du vielleicht ein wenig ausruhen.
