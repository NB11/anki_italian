Definition: "*passen*, aufeinanderpassen"
Register: ''
Beispielsätze: |-
  Le parti del puzzle *combaciano* perfettamente.
  Die Teile des Puzzles *passen* perfekt zusammen.
  
  Se i due documenti *combaciano*, allora probabilmente sono autentici.
  Wenn die beiden Dokumente *passen*, dann sind sie wahrscheinlich echt.
  
  Ho verificato se i numeri nelle tabelle *combaciano*.
  Ich habe geprüft, ob die Zahlen in den Tabellen *passen*.
  
  Perché i pezzi della macchina *combacino*, bisogna regolarli con molta precisione.
  Damit die Teile der Maschine *passen*, muss man sie sehr sorgfältig einstellen.
  
  Il meccanico dice che le nuove guarnizioni *combaceranno* perfettamente.
  Der Mechaniker sagt, dass die neuen Dichtungen genau *passen* werden.
