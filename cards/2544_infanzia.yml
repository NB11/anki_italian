Rang: 2544
Wort: infanzia
Wortart: n.f
Wort mit Artikel: l'infanzia
Femininum / Plural: infanzie
IPA: ''
Definition: die Kindheit, -en
Register: ''
Beispielsätze: |-
  Durante la mia *infanzia* ho vissuto in un piccolo paese vicino al mare.
  Während meiner *Kindheit* habe ich in einem kleinen Dorf nahe dem Meer gewohnt.
  
  Mia nonna mi raccontava sempre storie del suo *infanzia* in campagna.
  Meine Großmutter erzählte mir immer Geschichten aus ihrer *Kindheit* auf dem Land.
  
  L'*infanzia* è un periodo della vita che non si dimentica facilmente.
  Die *Kindheit* ist eine Lebensphase, die man nicht so leicht vergisst.
  
  Se ripenso alla mia *infanzia*, mi viene sempre in mente il profumo dei fiori nel giardino di casa.
  Wenn ich an meine *Kindheit* zurückdenke, fällt mir immer wieder der Duft der Blumen im Garten meines Elternhauses ein.
  
  Era un sogno della mia *infanzia* diventare una famosa attrice, ma poi ho scelto un'altra strada.
  Es war ein Traum meiner *Kindheit*, eine berühmte Schauspielerin zu werden, doch später wählte ich einen anderen Weg.
