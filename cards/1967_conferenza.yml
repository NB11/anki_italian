  Die *Konferenz* war so lang, dass ich meinen Zug verpasst habe.
  
  Stasera ci sarà una *conferenza* sul cambiamento climatico alla biblioteca comunale.
  Heute Abend findet in der Stadtbibliothek eine *Konferenz* zum Klimawandel statt.
  
  Nonostante la stanchezza, ho seguito tutta la *conferenza* con attenzione.
  Trotz meiner Müdigkeit habe ich der gesamten *Konferenz* aufmerksam gefolgt.
