Beispielsätze: |-
  Ho partecipato a una *conferenza* molto interessante sulla storia dell’arte.
  Ich habe an einer *Konferenz* über Kunstgeschichte teilgenommen.
  
  Speriamo che l’esito della *conferenza* sia positivo per tutti i partecipanti.
