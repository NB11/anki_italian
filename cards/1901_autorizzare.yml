Rang: 1901
Wort: autorizzare
Wortart: vt
Wort mit Artikel: autorizzare
Femininum / Plural: ''
IPA: ''
Definition: genehmigen, erlauben
Register: ''
Beispielsätze: |-
  Il sindaco ha *autorizzato* la costruzione del nuovo parco nella periferia della città.
  Der Bürgermeister hat den Bau des neuen Parks am Stadtrand *genehmigt*.
  
  Prima di partire, ricorda di *autorizzare* tutti i pagamenti online sul tuo conto corrente.
  Bevor du losfährst, vergiss nicht, alle Online-Zahlungen auf deinem Konto *zu erlauben*.
  
  Se non ci fossero leggi specifiche, chiunque potrebbe *autorizzare* qualsiasi cosa senza controllo.
  Wenn es keine spezifischen Gesetze gäbe, könnte jeder alles ohne Kontrolle *genehmigen*.
  
  Il direttore generale ha *autorizzato* l’assunzione di dieci nuovi dipendenti nel reparto vendite.
  Der Generaldirektor hat die Einstellung von zehn neuen Mitarbeitern in der Vertriebs*abteilung* genehmigt.
  
  Nonostante le sue proteste, il giudice non ha *autorizzato* il rilascio anticipato del detenuto.
  Trotz seiner Proteste hat der Richter die vorzeitige Freilassung des Gefangenen nicht *genehmigt*.
