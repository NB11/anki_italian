Rang: 3803
Wort: fica
Wortart: n.f
Wort mit Artikel: la fica
Femininum / Plural: fiche
IPA: ''
Definition: die Feige, -n
Register: ''
Beispielsätze: |-
  Ho trovato una *fica* molto dolce sul bancone della frutteria.
  Ich habe eine sehr süße *Feige* auf der Theke des Obstladens gefunden.
  
  Non mi piacciono le *fiche* troppo mature perché sono troppo dolci.
  Ich mag die *Feigen* nicht zu reif, denn sie sind zu süß.
  
  Ha detto che domani comprerà delle *fiche* per la colazione di domenica.
  Sie hat gesagt, dass sie morgen *Feigen* für das Sonntagsfrühstück kaufen wird.
  
  Se vuoi preparare una macedonia originale, aggiungi alcune *fiche* tagliate a pezzetti.
  Wenn du einen originellen Obstsalat zubereiten willst, füge einige in Stücke geschnittene *Feigen* hinzu.
  
  Le *fiche* secche sono ottime per accompagnare un buon vino rosso.
  Getrocknete *Feigen* passen hervorragend zu einem guten Rotwein.
