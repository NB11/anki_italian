Rang: 526
Wort: effetto
Wortart: n.m
Wort mit Artikel: l'effetto
Femininum / Plural: effetti
IPA: ''
Definition: die Wirkung, -en
Register: ''
Beispielsätze: |-
  Il farmaco ha un *effetto* immediato sul mal di testa.
  Das Medikament hat eine *Wirkung* auf die Kopfschmerzen.
  
  Nonostante la sua *effetto* sia visibile, molti non lo notano.
  Obwohl seine *Wirkung* sichtbar ist, bemerken es viele nicht.
  
  Avresti dovuto studiare gli *effetti* collaterali del medicinale.
  Du hättest die *Nebenwirkungen* des Medikaments studieren sollen.
  
  L’*effetto* di questa legge sarà evidente solo tra alcuni anni.
  Die *Wirkung* dieses Gesetzes wird erst in einigen Jahren offensichtlich sein.
  
  Chiunque voglia ottenere risultati deve considerare l’*effetto* delle proprie azioni.
  Wer Ergebnisse erzielen will, muss die *Wirkung* seiner Handlungen bedenken.
