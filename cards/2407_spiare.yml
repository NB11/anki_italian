Rang: 2407
Wort: spiare
Wortart: v
Wort mit Artikel: spiare
Femininum / Plural: ''
IPA: ''
Definition: spionieren, ausspionieren
Register: ''
Beispielsätze: |-
  Il detective ha iniziato a *spiare* il sospettato da giorni.
  Der Detektiv hat begonnen, den Verdächtigen seit Tagen *auszuspionieren*.
  
  Non vorrei *spiare* la conversazione privata dei miei amici.
  Ich möchte das private Gespräch meiner Freunde nicht *ausspionieren*.
  
  Se avessero *spiato* meglio, avrebbero scoperto la verità prima.
  Hätten sie besser *spioniert*, hätten sie die Wahrheit früher entdeckt.
  
  È vietato *spiare* i documenti riservati dell'ufficio.
  Es ist verboten, die vertraulichen Dokumente des Büros *auszuspionieren*.
  
  Molti paesi si dedicano a *spiare* i nemici per ottenere informazioni strategiche.
  Viele Länder widmen sich dem *Ausspionieren* von Feinden, um strategische Informationen zu erhalten.
