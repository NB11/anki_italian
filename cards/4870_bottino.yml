Rang: 4870
Wort: bottino
Wortart: n.m
Wort mit Artikel: il bottino
Femininum / Plural: i bottini
IPA: ''
Definition: die Beute, die Beute der Diebe
Register: ''
Beispielsätze: |-
  Il poliziotto ha trovato *il bottino* nascosto nella cantina.
  Der Polizist hat *die Beute* versteckt im Keller gefunden.
  
  Gli investigatori pensano che *il bottino* sia stato diviso tra i complici.
  Die Ermittler glauben, dass *die Beute* zwischen den Komplizen aufgeteilt worden ist.
  
  Se *il bottino* fosse stato più pesante, il ladro non avrebbe potuto trasportarlo da solo.
  Wenn *die Beute* schwerer gewesen wäre, hätte der Dieb sie nicht allein transportieren können.
  
  Dicono che durante la rapina *il bottino* sia stato nascosto persino dentro un bidone della spazzatura.
  Man sagt, dass während des Raubs *die Beute* sogar in einem Mülleimer versteckt wurde.
  
  Nonostante *il bottino* fosse stato recuperato, molti oggetti mancavano ancora.
  Obwohl *die Beute* zurückerlangt wurde, fehlten noch viele Gegenstände.
