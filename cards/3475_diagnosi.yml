Rang: 3475
Wort: diagnosi
Wortart: n.f
Wort mit Artikel: la diagnosi
Femininum / Plural: diagnosi
IPA: ''
Definition: die Diagnose, -n
Register: ''
Beispielsätze: |-
  Il medico ha fatto una *diagnosi* accurata dopo aver analizzato tutti gli esami.
  Der Arzt hat eine *Diagnose* gestellt, nachdem er alle Untersuchungen analysiert hatte.
  
  Se la *diagnosi* è sbagliata, le cure potrebbero essere inefficaci.
  Wenn die *Diagnose* falsch ist, könnten die Behandlungen unwirksam sein.
  
  Hanno discusso a lungo sulla *diagnosi* preliminare del loro caro.
  Sie haben lange über die *Diagnose* ihres Angehörigen diskutiert.
  
  La *diagnosi* definitiva arriverà solo dopo i risultati del secondo esame.
  Die endgültige *Diagnose* wird erst nach den Ergebnissen der zweiten Untersuchung kommen.
  
  Nonostante la difficile *diagnosi*, Maria ha mantenuto un animo forte.
  Trotz der schwierigen *Diagnose* behielt Maria einen starken Mut bei.
