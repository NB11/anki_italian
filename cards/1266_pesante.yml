Rang: 1266
Wort: pesante
Wortart: adj
Wort mit Artikel: pesante
Femininum / Plural: ''
IPA: ''
Definition: schwer, gewichtig, stark
Register: ''
Beispielsätze: |-
  Questo *pesante* abito di lana mi tiene al caldo in inverno.
  Dieses *schwere* Kleid aus Wolle hält mich im Winter warm.
  
  Il comandante ha notato un *pesante* sospetto nello sguardo della spia.
  Der Kommandant bemerkte einen *schweren* Verdacht in dem Blick des Spions.
  
  Secondo il postino, il pacco è troppo *pesante* per essere spedito senza permesso.
  Laut dem Postboten ist das Paket zu *schwer*, um ohne Erlaubnis verschickt zu werden.
  
  Se avessi saputo che il lavoro sarebbe stato così *pesante*, avrei accettato meno richieste.
  Wenn ich gewusst hätte, dass die Arbeit so *schwer* wird, hätte ich weniger Anfragen angenommen.
  
  È *pesante* il fatto che tu abbia ignorato la nostra precisa richiesta di migliorare la qualità.
  Es ist *gewichtig*, dass du unsere genaue Bitte, die Qualität zu verbessern, ignoriert hast.
