Rang: 1982
Wort: gradire
Wortart: v
Wort mit Artikel: gradire
Femininum / Plural: ''
IPA: ''
Definition: gern haben, mögen, wünschen
Register: ''
Beispielsätze: |-
  Ti *gradirei* un caffè o preferisci un tè?
  Ich *würde* dir gern einen Kaffee anbieten, oder möchtest du lieber einen Tee?
  
  Ho *gradito* molto la tua ospitalità durante il viaggio.
  Ich habe deine Gastfreundschaft während der Reise sehr *geschätzt*.
  
  Se avessi tempo, *gradirei* assistere a quella conferenza sui cambiamenti climatici.
  Wenn ich Zeit hätte, *würde* ich gern an dieser Konferenz zu den Klimaveränderungen teilnehmen.
  
  Nonostante tutto, lui *gradisce* ancora la presenza dei suoi amici più cari.
  Trotz allem *schätzt* er immer noch die Anwesenheit seiner engsten Freunde.
  
  Spero che tu *gradisca* questo piccolo regalo come segno della mia riconoscenza.
  Ich hoffe, dass du dieses kleine Geschenk als Zeichen meiner Dankbarkeit *gern annimmst*.
