Rang: 3590
Wort: audizione
Wortart: n.f
Wort mit Artikel: la audizione
Femininum / Plural: audizioni
IPA: ''
Definition: das Vorsprechen, -
Register: ''
Beispielsätze: |-
  Dopo mesi di preparazione, finalmente ho avuto la mia prima *audizione* per il ruolo principale.
  Nach Monaten der Vorbereitung hatte ich endlich mein erstes *Vorsprechen* für die Hauptrolle.
  
  Sai che Mario ha perso l’*audizione* perché ha dimenticato il testo a casa?
  Weißt du, dass Mario das *Vorsprechen* verloren hat, weil er den Text zu Hause vergessen hat?
  
  Nonostante l’ansia, ha superato la *audizione* con una performance impeccabile.
  Trotz der Angst hat sie das *Vorsprechen* mit einer makellosen Vorstellung bestanden.
  
  Se avessi più tempo per studiare, forse avrei passato anche la seconda *audizione*.
  Wenn ich mehr Zeit zum Üben gehabt hätte, hätte ich vielleicht auch das zweite *Vorsprechen* geschafft.
  
  L’*audizione* è stata così difficile che solo due candidati su venti sono stati chiamati per la seconda fase.
  Das *Vorsprechen* war so anspruchsvoll, dass nur zwei von zwanzig Kandidaten zur zweiten Runde eingeladen wurden.
