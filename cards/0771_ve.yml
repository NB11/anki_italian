Rang: 771
Wort: ve
Wortart: adv
Wort mit Artikel: ve
Femininum / Plural: ''
IPA: ''
Definition: dahin, dorthin
Register: ''
Beispielsätze: |-
  Per favore, mangia la mela e *ve* ne metti un’altra nel frigo.
  Iss bitte den Apfel und leg *dahin* noch einen in den Kühlschrank.
  
  Ho sentito un rumore strano dietro di me e *ve* mi sono girato di scatto.
  Ich hörte ein seltsames Geräusch hinter mir und drehte *mich* dahin um.
  
  Se non ti serve più questa chiave, *ve* la puoi buttare.
  Wenn du diesen Schlüssel nicht mehr brauchst, kannst du *ihn* dorthin werfen.
  
  Il cane corse verso il parco e *ve* sparì dietro un cespuglio.
  Der Hund lief zum Park und verschwand *dahin* hinter einem Busch.
  
  Quando hai finito con il libro, *ve* lo lasci sulla scrivania, per favore?
  Wenn du mit dem Buch fertig bist, legst du *es* dorthin auf den Schreibtisch, bitte?
