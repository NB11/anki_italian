Rang: 857
Wort: pomeriggio
Wortart: n.m
Wort mit Artikel: il pomeriggio
Femininum / Plural: i pomeriggi
IPA: ''
Definition: der Nachmittag, -e
Register: ''
Beispielsätze: |-
  Vengo da te *pomeriggio* perché devo finire il compito prima di domani.
  Ich komme am *Nachmittag* zu dir, weil ich die Hausaufgabe bis morgen erledigen muss.
  
  Sai già cosa farai questo *pomeriggio* dopo la lezione di italiano?
  Weißt du schon, was du heute *Nachmittag* nach der Italienischstunde machen wirst?
  
  Era un *pomeriggio* tranquillo quando ho trovato una foto del mio colonnello nel cassetto della cucina.
  Es war ein ruhiger *Nachmittag*, als ich ein Foto meines Obersts in der Küchenschublade fand.
  
  Se volevamo andare al lago, avremmo dovuto partire *pomeriggio* presto, altrimenti non ce l’avremmo fatta.
  Wenn wir zum See wollten, hätten wir am *Nachmittag* früh losfahren müssen, sonst hätten wir es nicht geschafft.
  
  Mi piacerebbe che tu venissi con me *pomeriggio*, così possiamo risparmiare energia e camminare insieme.
  Ich würde mich freuen, wenn du am *Nachmittag* mit mir kommen könntest, dann können wir Energie sparen und gemeinsam laufen.
