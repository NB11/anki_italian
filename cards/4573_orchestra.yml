Rang: 4573
Wort: orchestra
Wortart: n.m
Wort mit Artikel: l'orchestra
Femininum / Plural: gli orchestri
IPA: ''
Definition: das Orchester, -
Register: ''
Beispielsätze: |-
  L'*orchestra* sinfonica eseguirà Beethoven stasera al teatro contemporaneamente all'opera moderna.
  Das *Sinfonieorchester* wird heute Abend Beethoven im Theater gleichzeitig mit der modernen Oper aufführen.
  
  Dopo anni di gestione caotica, il direttore decise di sciogliere definitivamente l'*orchestra* storica della città.
  Nach Jahren chaotischer Verwaltung beschloss der Dirigent, das historische *Orchester* der Stadt endgültig aufzulösen.
  
  Nonostante sia un dilettante, suona la tromba nell'*orchestra* del quartiere ogni mercoledì.
  Obwohl er ein Laie ist, spielt er jeden Mittwoch Trompete im *Orchester* des Stadtteils.
  
  L'*orchestra* che ascolti al parco è composta interamente da musicisti canadesi venuti in tour in Italia.
  Das *Orchester*, das du im Park hörst, besteht ausschließlich aus kanadischen Musikern, die auf Tour in Italien sind.
  
  Se vuoi un biglietto per l'*orchestra*, ti consiglio di prenotare almeno un mese prima, perché va sempre esaurito.
  Wenn du eine Karte für das *Orchester* möchtest, rate ich dir, mindestens einen Monat im Voraus zu buchen, denn sie ist immer ausverkauft.
