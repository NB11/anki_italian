Rang: 246
Wort: sposare
Wortart: vt
Wort mit Artikel: sposare
Femininum / Plural: ''
IPA: ''
Definition: heiraten, vermählen
Register: ''
Beispielsätze: |-
  Marco vuole *sposare* la sua fidanzata il prossimo anno.
  Marco möchte seine Verlobte nächstes Jahr *heiraten*.
  
  *Sposarsi* in una chiesa antica è il sogno di molti.
  *Heiraten* in einer alten Kirche ist der Traum vieler.
  
  Se non ti affretti, non potrai *sposarla* prima dell’estate.
  Wenn du dich nicht beeilst, kannst du sie vor dem Sommer nicht *heiraten*.
  
  Vor cinquant’anni, molti si *sposavano* molto giovani.
  Vor fünfzig Jahren *heirateten* viele sehr jung.
  
  Credi che dovremmo *sposarci* nonostante i problemi finanziari?
  Glaubst du, wir sollten *heiraten*, trotz der finanziellen Probleme?
