Rang: 569
Wort: nascere
Wortart: vi
Wort mit Artikel: nascere
Femininum / Plural: ''
IPA: ''
Definition: geboren werden
Register: ''
Beispielsätze: |-
  I neonati *nascono* con un riflesso di suzione.
  Neugeborene kommen mit einem Saugreflex *zur Welt*.
  
  Se avessi saputo che sarebbe *nato* in aprile, gli avrei comprato un regalo.
  Wenn ich gewusst hätte, dass er im April *geboren wird*, hätte ich ihm ein Geschenk gekauft.
  
  È incredibile come ogni essere umano *nasca* con un destino diverso.
  Es ist unglaublich, wie jeder Mensch mit einem anderen Schicksal *geboren wird*.
  
  Dicono che i gemelli *nascono* più spesso nelle famiglie dove ci sono già stati casi simili.
  Man sagt, dass Zwillinge häufiger in Familien *zur Welt kommen*, in denen es bereits ähnliche Fälle gab.
  
  Nonostante tutte le difficoltà, lei *è nata* per cantare.
  Trotz aller Schwierigkeiten ist sie *zum Singen geboren*.
