Wort mit Artikel: affrontare
Femininum / Plural: ''
IPA: ''
Definition: etwas angehen, anpacken
Register: ''
Beispielsätze: |-
  Devi *affrontare* i tuoi problemi invece di evitarli.
  Du musst deine *Probleme* *angehen*, anstatt sie zu *vermeiden*.
  
  Abbiamo *affrontato* la situazione con calma.
  Wir haben die *Situation* mit Ruhe *angepackt*.
  
  *Affronterai* mai la tua paura del buio?
  Wirst du jemals deine *Angst vor der Dunkelheit* *bewältigen*?
  
  Se *affrontassi* il problema prima, non saresti così stressato.
  Wenn du das *Problem* früher *angegangen* *wärst*, wärst du nicht so *gestresst*.
  
  Dobbiamo *affrontare* questa decisione insieme.
  Wir müssen diese *Entscheidung* gemeinsam *bewältigen*.
