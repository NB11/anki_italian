Rang: 667
Wort: affrontare
Wortart: v
Wort mit Artikel: affrontare
Femininum / Plural: ''
IPA: ''
Definition: konfrontieren, angehen, bewältigen
Register: ''
Beispielsätze: |-
  Stamattina ho dovuto *affrontare* un problema al lavoro che durava da settimane.
  Heute Morgen musste ich *ein Problem* bei der Arbeit bewältigen, das seit Wochen bestand.
  
  Se vuoi *affrontare* questa situazione difficile, devi restare calmo e usare il cervello.
  Wenn du diese schwierige Situation *meisterst*, musst du ruhig bleiben und dein Gehirn benutzen.
  
  I detective hanno finalmente deciso di *affrontare* il crimine organizzato in questa zona.
  Die *Detektive* haben sich endlich entschlossen, die organisierte Kriminalität in dieser Zone anzugehen.
  
  Nonostante la fame, continuò a lavorare senza *affrontare* la situazione.
  Trotz *Hungers* arbeitete er weiter, ohne die Situation zu lösen.
  
  Ora che siamo in ritardo, *affrontiamo* il problema insieme per trovare una soluzione.
  Da wir *Verspätung* haben, gehen wir das Problem gemeinsam an, um eine Lösung zu finden.
