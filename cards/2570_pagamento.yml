Rang: 2570
Wort: pagamento
Wortart: n.m
Wort mit Artikel: il pagamento
Femininum / Plural: i pagamenti
IPA: ''
Definition: die Zahlung, -en
Register: ''
Beispielsätze: |-
  Non ho ancora ricevuto il *pagamento* della fattura di agosto.
  Ich habe die *Zahlung* für die Augustrechnung noch nicht erhalten.
  
  Il commerciante ha accettato solo dopo aver visto la garanzia del *pagamento*.
  Der Händler akzeptierte es erst, nachdem er die *Zahlung*sgarantie gesehen hatte.
  
  Se non arrivi puntuale, il *pagamento* potrebbe subire un ritardo.
  Falls du nicht pünktlich kommst, könnte die *Zahlung* sich verzögern.
  
  L’azienda ha bloccato il *pagamento* fino a quando non verrà fornita la documentazione completa.
  Das Unternehmen hat die *Zahlung* gesperrt, bis die vollständigen Unterlagen vorliegen.
  
  Non appena avrò il *pagamento*, ti invierò la conferma via e-mail.
  Sobald ich die *Zahlung* erhalten habe, schicke ich dir die Bestätigung per E-Mail.
