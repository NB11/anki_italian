Rang: 4786
Wort: incisione
Wortart: n.f
Wort mit Artikel: l'incisione
Femininum / Plural: incisioni
IPA: ''
Definition: die Gravur, -en, die Einritzung, -en, der Einschnitt, -e
Register: ''
Beispielsätze: |-
  L’*incisione* sul legno era così dettagliata da sembrare un’opera d’arte.
  Die *Gravur* auf dem Holz war so detailliert, dass sie wie ein Kunstwerk wirkte.
  
  Nella cappella c’era un altare con un’*incisione* che rappresentava la vita di san Francesco.
  Auf dem Altar war eine *Einschneidung*, die das Leben des heiligen Franziskus darstellte.
  
  Se non avessimo trovato quella *incisione* sul muro, non avremmo scoperto il passaggio segreto.
  Hätten wir jene *Einritzung* an der Wand nicht entdeckt, hätten wir den geheimen Durchgang nicht gefunden.
  
  Gli esperti stanno studiando l’*incisione* rupestre per capire il significato dei simboli.
  Die Experten untersuchen die *Gravur* in Felsen, um die Bedeutung der Symbole zu verstehen.
  
  Nonostante l’*incisione* fosse antica, si leggevano ancora chiaramente le lettere incise.
  Obwohl die *Einritzung* alt war, waren die eingravierten Buchstaben noch deutlich lesbar.
