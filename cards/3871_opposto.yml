Rang: 3871
Wort: opposto
Wortart: adj
Wort mit Artikel: opposto
Femininum / Plural: ''
IPA: ''
Definition: entgegengesetzt, gegensätzlich
Register: ''
Beispielsätze: |-
  Il tuo parere è *opposto* al mio, ma lo rispetterò comunque.
  Deine Meinung ist *entgegengesetzt* zu meiner, aber ich werde sie trotzdem respektieren.
  
  Anche se sembra tutto chiaro, la realtà è *opposta* a ciò che pensi.
  Auch wenn es alles klar scheint, ist die Realität *gegensätzlich* zu dem, was du denkst.
  
  Ho scelto una direzione *opposta* a quella suggerita dalla mappa, ma ho trovato un tesoro nascosto.
  Ich habe eine *entgegengesetzte* Richtung zu der gewählt, die auf der Karte vorgeschlagen wurde, aber ich habe einen versteckten Schatz gefunden.
  
  Il risultato del test è stato *opposto* alle aspettative, ma ora sappiamo la verità.
  Das Testergebnis war *gegenteilig* zu den Erwartungen, aber jetzt wissen wir die Wahrheit.
  
  Non pensare che sia *opposto* a cambiare idea, semplicemente ho bisogno di più tempo.
  Denke nicht, dass ich *entgegengesetzt* zu einem Meinungsumschwung bin – ich brauche einfach mehr Zeit.
