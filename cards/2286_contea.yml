Rang: 2286
Wort: contea
Wortart: n.f
Wort mit Artikel: la contea
Femininum / Plural: contee
IPA: ''
Definition: die Grafschaft, -en
Register: ''
Beispielsätze: |-
  La *contea* di Toscana fu governata per secoli da potenti famiglie nobiliari.
  Die *Grafschaft* Toskana wurde jahrhundertelang von mächtigen Adelsfamilien regiert.
  
  Nel Medioevo molte *contee* erano indipendenti e si governavano da sole.
  Im Mittelalter waren viele *Grafschaften* unabhängig und regierten sich selbst.
  
  La *contea* si estendeva su un territorio molto vasto, fino ai confini con il mare.
  Die *Grafschaft* erstreckte sich über ein sehr großes Gebiet bis an die Meeresküste.
  
  Se volessi visitare ogni *contea* d’Italia, mi servirebbero mesi di viaggio.
  Wenn ich jede *Grafschaft* Italiens besuchen wollte, bräuchte ich Monate für die Reise.
  
  La *contea* di cui parli era famosa per le sue tradizioni culturali.
  Die *Grafschaft*, von der du sprichst, war für ihre kulturellen Traditionen bekannt.
