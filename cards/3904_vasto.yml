Beispielsätze: |-
  L’oceano Pacifico è un mare *vasto* che copre un terzo della superficie terrestre.
  Der Pazifische Ozean ist ein *gewaltiges* Meer, das ein Drittel der Erdoberfläche bedeckt.
  
