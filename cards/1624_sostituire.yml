Rang: 1624
Wort: sostituire
Wortart: vt
Wort mit Artikel: sostituire
Femininum / Plural: ''
IPA: ''
Definition: ersetzen, austauschen, auswechseln
Register: ''
Beispielsätze: |-
  Ho bisogno di *sostituire* il vecchio computer con uno nuovo per lavorare più velocemente.
  Ich muss den alten Computer durch einen neuen *ersetzen*, um schneller zu arbeiten.
  
  Il sindaco ha deciso di *sostituire* i semafori rotti nel centro della città entro la settimana prossima.
  Der Bürgermeister hat beschlossen, die defekten Ampeln im Stadtzentrum bis nächste Woche *auszutauschen*.
  
  Se non avessi *sostituito* quella pizza disgustosa con un panino, mi sarei sentito molto male.
  Wenn ich diese *ekelhafte Pizza* nicht durch ein Brötchen ersetzt hätte, hätte ich mich sehr schlecht gefühlt.
  
  La versione originale del film è stata criticata, ma il regista vuole *sostituire* alcune scene prima dell’uscita definitiva.
  Die Originalfassung des Films wurde kritisiert, doch der Regisseur möchte einige Szenen vor dem endgültigen Kinostart *austauschen*.
  
  Dopo l’incidente, la polizia ha dovuto *sostituire* l’ambulanza danneggiata con un’altra versione del veicolo.
  Nach dem Unfall musste die Polizei den beschädigten *Krankenwagen* durch eine andere Version des Fahrzeugs ersetzen.
