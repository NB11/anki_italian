Rang: 1620
Wort: spiegazione
Wortart: n.f
Wort mit Artikel: la spiegazione
Femininum / Plural: spiegazioni
IPA: ''
Definition: die Erklärung, -en
Register: ''
Beispielsätze: |-
  La *spiegazione* del professore è stata molto affascinante e ha attirato l'attenzione di tutti gli studenti.
  Die *Erklärung* des Professors war sehr faszinierend und zog die Aufmerksamkeit aller Studenten auf sich.
  
  Non capisco questa *spiegazione*: neppure dopo aver letto il libro riesco a seguirla!
  Ich verstehe diese *Erklärung* nicht: nicht einmal nach dem Lesen des Buches kann ich ihr folgen!
  
  Se avessi dato una *spiegazione* più chiara, la crisi si sarebbe evitata.
  Wenn du eine klarere *Erklärung* gegeben hättest, wäre die Krise vermieden worden.
  
  La polizia sta ancora cercando la *spiegazione* per l’esplosione nel centro commerciale.
  Die Polizei sucht immer noch nach der *Erklärung* für die Explosion im Einkaufszentrum.
  
  Nonostante la *spiegazione* dettagliata, molti hanno peccato di superficialità nell’analisi.
  Trotz der detaillierten *Erklärung* haben viele bei der Analyse von Oberflächlichkeit gesündigt.
