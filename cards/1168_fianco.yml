Rang: 1168
Wort: fianco
Wortart: n.m
Wort mit Artikel: il fianco
Femininum / Plural: i fianchi
IPA: ''
Definition: die Seite, -n
Register: ''
Beispielsätze: |-
  Ho un dolore al *fianco* destro dopo aver giocato a tennis.
  Ich habe Schmerzen an der *einen* Seite nach dem Tennis spielen.
  
  Dalla *fianco* della montagna si gode una vista spettacolare.
  Von der *Seite* des Berges hat man eine spektakuläre Aussicht.
  
  Camminava *fianco* a me senza dire una parola.
  Er ging *neben* mir, ohne ein Wort zu sagen.
  
  Se senti un fastidio al *fianco*, dovresti controllare con il medico.
  Wenn du ein Unwohlsein an der *Seite* spürst, solltest du es vom Arzt abklären lassen.
  
  Ha perso il *fianco* del contratto perché non ha letto le clausole.
  Er hat die *Seite* des Vertrags übersehen, weil er die Klauseln nicht gelesen hat.
