Beispielsätze: |-
  Se vuoi avere successo, devi pensare *diversamente* dagli altri.
  Wenn du erfolgreich sein willst, musst du *anders* denken als die anderen.
  
  Nonostante la pioggia, siamo usciti *diversamente* da come previsto.
  Trotz des Regens sind wir *anders* ausgegangen als geplant.
  
  Mi ha detto che sarebbe venuto, ma poi ha fatto *diversamente*.
  Er hat mir gesagt, dass er kommen würde, aber dann hat er sich *anders* entschieden.
  
  Questo libro è scritto *diversamente* rispetto agli altri che ho letto.
  Dieses Buch ist *anders* geschrieben als die anderen, die ich gelesen habe.
  
  Se *diversamente* da me, hai già visto quel film, dimmelo!
  Wenn du *anders* als ich diesen Film schon gesehen hast, sag es mir!
