  Quando ho aperto la scatola, ho trovato un anello di colore *enorme* che brillava come non mai sotto la luna.
  Als ich die ***Schachtel** öffnete, fand ich einen *Ring* in einer *riesigen* *Farbe*, der nie so unter dem *Mond** geleuchtet hatte.
