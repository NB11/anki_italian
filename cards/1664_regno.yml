Rang: 1664
Wort: regno
Wortart: n.m
Wort mit Artikel: il regno
Femininum / Plural: regni
IPA: ''
Definition: das Königreich, -e
Register: ''
Beispielsätze: |-
  Il *regno* di Napoli fu un importante stato preunitario italiano.
  Das *Königreich* Neapel war ein wichtiger voritalienischer Staat.
  
  Dopo la guerra molti cittadini speravano in un *regno* di pace e prosperità.
  Nach dem Krieg hofften viele Bürger auf ein *Königreich* des Friedens und Wohlstands.
  
  Nonostante i problemi, il *regno* riuscì a mantenere la sua indipendenza per secoli.
  Trotz der Probleme gelang es dem *Königreich*, seine Unabhängigkeit jahrhundertelang zu bewahren.
  
  Gli storici discutono ancora se il *regno* di Sardegna abbia posto fine al Medioevo in Italia.
  Die Historiker diskutieren noch, ob das *Königreich* Sardinien das Mittelalter in Italien beendete.
  
  Il *regno* di Prussia divenne una potenza militare dopo le riforme di Federico II.
  Das *Königreich* Preußen wurde nach den Reformen Friedrichs II. zu einer Militärmacht.
