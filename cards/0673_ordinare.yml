Rang: 673
Wort: ordinare
Wortart: v
Wort mit Artikel: ordinare
Femininum / Plural: ''
IPA: ''
Definition: ordnen, anordnen, bestellen, befehlen
Register: ''
Beispielsätze: |-
  Devi *ordinare* i tuoi pensieri prima di scrivere il saggio.
  Du musst *deine* Gedanken ordnen, bevor du den Aufsatz schreibst.
  
  Se *ordini* con calma, riceverai un caffè simile a quello che ho preso io.
  Wenn du *bestellst* in Ruhe, bekommst du einen Kaffee ähnlich wie den, den ich genommen habe.
  
  Il detective ha *ordinato* ai sospettati di non lasciare la zona intorno al luogo del crimine.
  Der Detektiv hat *befohlen*, dass die Verdächtigen die Zone um den Tatort nicht verlassen dürfen.
  
  Avrei *ordinato* un piatto vegetariano, ma il ristorante non lo prepara più spesso.
  Ich hätte einen vegetarischen Teller *bestellt*, aber das Restaurant bereitet ihn nicht mehr so oft zu.
  
  Non appena *ordinerai* i documenti, potrai trasferire l'appartamento in modo necessario.
  Sobald du die Unterlagen *sortierst*, kannst du die Wohnung auf die erforderliche Weise umziehen.
