Definition: dunkelbraun, schwarzhäutig
Register: ''
Beispielsätze: |-
  Ho comprato delle scarpe *moro* per l’inverno.
  Ich habe dunkelbraune Schuhe für den Winter gekauft.
  
  È *moro* chi è nato in Africa, ma anche chi ha la pelle scura.
  Schwarzhäutig ist, wer in Afrika geboren wurde, aber auch wer dunkle Haut hat.
  
