Rang: 3230
Wort: coro
Wortart: n.m
Wort mit Artikel: il coro
Femininum / Plural: cori
IPA: ''
Definition: der Chor, -e
Register: ''
Beispielsätze: |-
  Il *coro* della scuola ha vinto il primo premio al concorso nazionale.
  Der *Schulchor* hat den ersten Preis beim nationalen Wettbewerb gewonnen.
  
  Mentre camminavo, ho sentito un *coro* di voci provenire dalla piazza.
  Während ich lief, hörte ich einen *Chor* von Stimmen aus dem Platz kommen.
  
  Se avessi tempo, canterei nel *coro* gospel della mia parrocchia.
  Wenn ich Zeit hätte, würde ich im *Gospelchor* meiner Gemeinde singen.
  
  Credi che un *coro* moderno possa esprimere le stesse emozioni di uno classico?
  Glaubst du, dass ein *moderner Chor* dieselben Gefühle ausdrücken kann wie ein klassischer?
  
  Il regista ha scelto un *coro* di attori per interpretare i cittadini nella commedia.
  Der Regisseur hat einen *Chor* von Schauspielern gewählt, um in der Komödie die Bürger darzustellen.
