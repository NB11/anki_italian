Rang: 842
Wort: comando
Wortart: n.m
Wort mit Artikel: il comando
Femininum / Plural: comandi
IPA: ''
Definition: der Befehl, -e
Register: ''
Beispielsätze: |-
  Il *comando* del colonnello era chiaro: non compiere azioni avventate.
  Der *Befehl* des Obersts war klar: Sie sollten keine riskanten Aktionen unternehmen.
  
  Nonostante i *comandi* del giudice, l’assassino ha continuato a discutere con la sua avvocato.
  Trotz der *Anweisungen* des Richters hat der Mörder weiterhin mit seiner Anwältin diskutieren.
  
  Il generale ha emanato un *comando* speciale per trasformare la base militare in un centro di addestramento.
  Der General hat einen speziellen *Befehl* erlassen, um die Militärbasis in ein Trainingszentrum umzuwandeln.
  
  Stamattina ho ricevuto il *comando* di consegnare il documento al giudice entro domani.
  Heute Morgen habe ich den *Auftrag* erhalten, das Dokument bis morgen dem Richter auszuhändigen.
  
  Se avessi saputo i *comandi* segreti, avrei potuto evitare questa discussione inutile.
  Hätte ich die geheimen *Befehle* gekannt, hätte ich diese sinnlose Unterhaltung vermeiden können.
