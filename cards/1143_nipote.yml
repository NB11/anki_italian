Rang: 1143
Wort: nipote
Wortart: n.f/m
Wort mit Artikel: il nipote
Femininum / Plural: nipoti
IPA: ''
Definition: der Neffe, -n / die Nichte, -n
Register: ''
Beispielsätze: |-
  Il *nipote* di mio zio vive in montagna con sua moglie e i loro due figli.
  Der *Neffe* meines Onkels lebt in den Bergen mit seiner Frau und ihren beiden Kindern.
  
  La zia ha chiesto al *nipote* se vuole venire con noi al lago domani.
  Die Tante hat den *Neffen* gefragt, ob er morgen mit uns zum See kommen möchte.
  
  I *nipoti* di Maria hanno preparato una festa a sorpresa per il suo compleanno, anche se era una teoria che non sarebbero venuti.
  Marias *Enkelkinder* haben eine Überraschungsparty zu ihrem Geburtstag vorbereitet, obwohl es eine Theorie gab, dass sie nicht kommen würden.
  
  Se il *nipote* avesse saputo delle minacce, avrebbe avvisato la polizia invece di stare zitto così a lungo.
  Wenn der *Neffe* von den Drohungen gewusst hätte, hätte er die Polizei informiert, statt so lange zu schweigen.
  
  Ho invitato il *nipote* che abita accanto a noi per condividere la conoscenza che ho acquisito all’università durante lo studio dell’arte moderna.
  Ich habe den *Neffen*, der neben uns wohnt, eingeladen, um das Wissen zu teilen, das ich an der Universität während des Studiums der modernen Kunst erworben habe.
