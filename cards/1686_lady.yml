Rang: 1686
Wort: lady
Wortart: n.f
Wort mit Artikel: la lady
Femininum / Plural: signore
IPA: ''
Definition: die Dame, -n
Register: ''
Beispielsätze: |-
  La *signora* Rossi è una persona molto rispettata nella nostra comunità.
  Die *Dame* Rossi ist eine sehr respektierte Person in unserer Gemeinde.
  
  Vorrei presentarti la mia nuova amica, è una *signora* davvero simpatica e gentile.
  Ich möchte dir meine neue Freundin vorstellen, sie ist eine wirklich *nette Dame* und freundlich.
  
  In quel ristorante, la *signora* alla cassa mi ha servito con grande cortesia.
  In diesem Restaurant hat mir die *Dame* an der Kasse mit großer Höflichkeit gedient.
  
  Se hai bisogno di aiuto, chiedi a quella *signora* lì, conosco solo di vista.
  Wenn du Hilfe brauchst, frag diese *Dame* dort, ich kenne sie nur vom Sehen.
  
  La *signora* che abita al terzo piano è una scrittrice famosa, nonostante abbia più di ottant’anni.
  Die *Dame*, die im dritten Stock wohnt, ist eine berühmte Schriftstellerin, obwohl sie über achtzig Jahre alt ist.
