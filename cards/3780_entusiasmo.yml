Rang: 3780
Wort: entusiasmo
Wortart: n.m
Wort mit Artikel: lo entusiasmo
Femininum / Plural: entusiasmi
IPA: ''
Definition: die Begeisterung, -en
Register: ''
Beispielsätze: |-
  Con *entusiasmo* ho accolto la notizia della tua vittoria.
  Mit *Begeisterung* habe ich die Nachricht deines Sieges entgegengenommen.
  
  Nonostante l’ora tarda, nello sguardo dei bambini c’era ancora *entusiasmo*.
  Trotz der späten Stunde lag in den Blicken der Kinder noch *Begeisterung*.
  
  L’*entusiasmo* dei turisti era palpabile mentre osservavano il panorama.
  Die *Begeisterung* der Touristen war spürbar, während sie die Aussicht bewunderten.
  
  Se provi *entusiasmo* per questo progetto, allora fallo sapere al team.
  Wenn du *Begeisterung* für dieses Projekt spürst, dann lass es das Team wissen.
  
  L’*entusiasmo* che metteva nell’insegnare era contagioso per tutti gli studenti.
  Die *Begeisterung*, die sie beim Unterrichten ausstrahlte, steckte alle Schüler an.
