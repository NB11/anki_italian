Rang: 4994
Wort: sfilare
Wortart: v
Wort mit Artikel: sfilare
Femininum / Plural: ''
IPA: ''
Definition: ziehen, schlängeln, ausziehen
Register: ''
Beispielsätze: |-
  Il serpente si è *sfilato* dalla stretta gabbia senza difficoltà.
  Die Schlange hat sich *aus* der engen Kiste geschlängelt.
  
  Dopo il discorso, molti invitati volevano *sfilare* davanti al sindaco per ringraziarlo.
  Nach der Rede wollten viele Gäste *vorbeiziehen*, um sich beim Bürgermeister zu bedanken.
  
  Mi sono accorta solo dopo che mi *sfilavano* la borsa di mano mentre parlavo con te.
  Ich merkte erst später, wie sie mir die Tasche *wegrissen*, als ich mit dir sprach.
  
  Se avessimo più tempo, *sfilaremo* tutti i documenti prima della scadenza.
  Wenn wir mehr Zeit hätten, würden wir alle *Unterlagen durchsehen* vor Ablauf.
  
  Il coro si è fatto largo tra la folla che cercava di *sfilare* per vedere meglio.
  Der Chor bahnte sich einen Weg durch die Menge, die sich *durchdrängelte*, um besser zu sehen.
