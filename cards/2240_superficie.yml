Rang: 2240
Wort: superficie
Wortart: n.f
Wort mit Artikel: la superficie
Femininum / Plural: superfici
IPA: ''
Definition: die Oberfläche, -n
Register: ''
Beispielsätze: |-
  La *superficie* dell’acqua era calma e rifletteva il cielo blu.
  Die *Oberfläche* des Wassers war ruhig und spiegelte den blauen Himmel.
  
  Hanno misurato la *superficie* del tavolo per sapere se entrava nella stanza.
  Sie haben die *Oberfläche* des Tisches gemessen, um zu wissen, ob er in den Raum passt.
  
  Nonostante la *superficie* liscia, il ghiaccio era scivoloso.
  Trotz der glatten *Oberfläche* war das Eis rutschig.
  
  La *superficie* della luna è coperta di crateri da impatto.
  Die *Oberfläche* des Mondes ist mit Einschlagkratern bedeckt.
  
  Vor di applicare la vernice, pulisci bene la *superficie* del legno.
  Bevor du den Lack aufträgst, reinige gründlich die *Oberfläche* des Holzes.
