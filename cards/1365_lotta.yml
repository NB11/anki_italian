Rang: 1365
Wort: lotta
Wortart: n.f
Wort mit Artikel: la lotta
Femininum / Plural: lotte
IPA: ''
Definition: der Kampf, die Kämpfe
Register: ''
Beispielsätze: |-
  La *lotta* contro il crimine richiede grande coraggio.
  Der Kampf gegen das Verbrechen erfordert großen *Mut*.
  
  Dopo anni di *lotte*, finalmente hanno ottenuto la vittoria che aspettavano.
  Nach Jahren des *Kampfes* haben sie endlich den Sieg erreicht, den sie sich wünschten.
  
  Nonostante la *lotta* politica, il governo ha deciso di negare ogni responsabilità.
  Trotz des politischen *Kampfes* hat die Regierung beschlossen, jede Verantwortung zu leugnen.
  
  La *lotta* per i diritti civili è ancora lunga e difficile, ma dobbiamo insistere.
  Der Kampf für Bürgerrechte ist noch lang und hart, aber wir müssen *darauf beharren*.
  
  Se avessi saputo che sarebbe stata una *lotta* così dura, forse avrei rinunciato al progetto.
  Hätte ich gewusst, dass es ein so harter *Kampf* sein würde, hätte ich das Projekt vielleicht aufgegeben.
