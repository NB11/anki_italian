Rang: 3355
Wort: muso
Wortart: n.m
Wort mit Artikel: il muso
Femininum / Plural: musi
IPA: ''
Definition: die Schnauze, -n
Register: ''
Beispielsätze: |-
  Il cane ha abbaiato perché qualcuno gli ha colpito *muso* con un bastone.
  Der Hund hat gebellt, weil ihm jemand die *Schnauze* mit einem Stock getroffen hat.
  
  Mio fratello sostiene che il suo gatto abbia un *muso* più intelligente della media.
  Mein Bruder behauptet, seine Katze habe eine besonders *schlaue Schnauze*.
  
  Non mi fiderei di un cane che ha un *muso* troppo corto, sembra malato.
  Ich würde einem Hund mit einer *zu kurzen Schnauze* nicht trauen – der sieht krank aus.
  
  Era così arrabbiato che avrebbe voluto picchiare qualcuno in *muso*, ma si è trattenuto.
  Er war so wütend, dass er jemandem am liebsten eine *auf die Schnauze* hätte geben wollen, hat sich aber zurückgehalten.
  
  Ho visto un documentario in cui un biologo spiegava perché i cani hanno un *muso* tanto sensibile.
  Ich habe eine Dokumentation gesehen, in der ein Biologe erklärte, warum Hunde eine so *empfindliche Schnauze* haben.
