Beispielsätze: |-
  Il direttore ha deciso di *rimpiazzare* l’addetto alle vendite perché non raggiungeva gli obiettivi.
  Der Leiter hat beschlossen, den Verkäufer zu *ersetzen*, weil er die Ziele nicht erreichte.
  
  Se avessi un babysitter, potrei *rimpiazzare* mia sorella che è sempre esausta dopo il lavoro.
  Wenn ich eine *Babysitterin* hätte, könnte ich meine Schwester, die nach der Arbeit immer erschöpft ist, ersetzen.
  
  È necessario *rimpiazzare* il software obsoleto con una versione più moderna per migliorare l’efficienza.
  Es ist nötig, die veraltete Software durch eine modernere Version zu *ersetzen*, um die Effizienz zu verbessern.
  
  Credi che potremmo *rimpiazzare* i vecchi mobili con qualcosa di più funzionale?
  Glaubst du, wir könnten die alten Möbel durch etwas *Praktisches* ersetzen?
  
  Non appena trovo un sostituto, *rimpiazzerò* Laura che ha accettato un altro incarico.
  Sobald ich einen Ersatz gefunden habe, werde ich Laura, die einen anderen Posten angenommen hat, *ersetzen*.
