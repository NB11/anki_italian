Rang: 1326
Wort: direzione
Wortart: n.f
Wort mit Artikel: la direzione
Femininum / Plural: direzioni
IPA: ''
Definition: die Richtung, die Richtung, die Führung
Register: ''
Beispielsätze: |-
  Segui *la direzione* che ti ho indicato per arrivare alla stazione.
  Folge der *Richtung*, die ich dir angegeben habe, um zum Bahnhof zu kommen.
  
  Non sapevo in che *direzione* andare, quindi ho chiesto informazioni.
  Ich wusste nicht, in welche *Richtung* ich gehen sollte, also habe ich nachgefragt.
  
  Il sindaco ha assunto la *direzione* del progetto dopo il fallimento precedente.
  Der Bürgermeister hat die *Führung* des Projekts nach dem vorherigen Scheitern übernommen.
  
  La polizia ha perso le tracce del fuggitivo nella *direzione* del bosco.
  Die Polizei verlor die Spur des Flüchtlings in *Richtung* des Waldes.
  
  Secondo la sua *direzione*, dobbiamo girare a destra tra cento metri.
  Laut seiner *Anweisung* müssen wir in hundert Metern rechts abbiegen.
