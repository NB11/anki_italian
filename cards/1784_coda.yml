Rang: 1784
Wort: coda
Wortart: n.f
Wort mit Artikel: la coda
Femininum / Plural: code
IPA: ''
Definition: der Schwanz, -¨e, der Stau, -s
Register: ''
Beispielsätze: |-
  La *coda* del cane era molto lunga e folta.
  Der *Schwanz* des Hundes war sehr lang und buschig.
  
  A causa di un incidente, c'è una lunga *coda* sull'autostrada.
  Aufgrund eines Unfalls gibt es eine lange *Stau* auf der Autobahn.
  
  Se non avessimo perso tempo, non avremmo perso la *coda* della lezione.
  Wenn wir keine Zeit verloren hätten, hätten wir den *Schwanz* der Stunde nicht verpasst.
  
  Ha dipinto una *coda* di pesce sul suo quadro moderno.
  Er malte einen Fisch*schwanz* auf sein modernes Gemälde.
  
  La *coda* della frase era così confusa che non si capiva più il senso.
  Das *Ende* des Satzes war so verwirrend, dass man den Sinn nicht mehr verstand.
