Rang: 1486
Wort: concludere
Wortart: vt
Wort mit Artikel: concludere
Femininum / Plural: ''
IPA: ''
Definition: abschließen, beenden
Register: ''
Beispielsätze: |-
  Devo *concludere* la riunione entro le cinque per non perdere il volo.
  Ich muss die Besprechung bis fünf Uhr *beenden*, um den Flug nicht zu verpassen.
  
  L'artista ha *concluso* il suo dipinto con grande soddisfazione del pubblico.
  Der Künstler hat sein Gemälde mit großer Zufriedenheit des Publikums *abgeschlossen*.
  
  Non appena avrò *concluso* le indagini, ti comunicherò i risultati.
  Sobald ich die Ermittlungen *beendet* habe, teile ich dir die Ergebnisse mit.
  
  Se *concludessi* il progetto in tempo, riceveresti una ricompensa.
  Wenn du das Projekt rechtzeitig *abschließen* würdest, würdest du eine Belohnung erhalten.
  
  È importante che tu *concluda* la relazione prima della scadenza.
  Es ist wichtig, dass du den Bericht vor der Frist *beendest*.
