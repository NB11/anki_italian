Rang: 3319
Wort: coinquilino
Wortart: n.m.
Wort mit Artikel: il coinquilino
Femininum / Plural: coinquilini
IPA: ''
Definition: der Mitbewohner, - / die Mitbewohnerin, -nen
Register: ''
Beispielsätze: |-
  Ho conosciuto il mio *coinquilino* solo recentemente perché vive in un altro piano.
  Ich habe meinen *Mitbewohner* erst vor kurzem kennengelernt, weil er in einer anderen Etage wohnt.
  
  Se il *coinquilino* non rispetta le regole, la convivenza diventa difficile.
  Wenn der *Mitbewohner* die Regeln nicht einhält, wird das Zusammenleben schwierig.
  
  Il *coinquilino* ha detto che si sarebbe occupato delle pulizie, ma non ha ancora spazzato il corridoio.
  Der *Mitbewohner* hatte versprochen, sich um die Reinigung zu kümmern, aber er hat den Flur noch nicht gekehrt.
  
  Ho prestato la mia macchina fotografica al *coinquilino* affinché potesse fotografare la nuova mensa dell’università.
  Ich habe meinem *Mitbewohner* meine Kamera geliehen, damit er die neue Mensa der Universität fotografieren kann.
  
  Per fortuna il *coinquilino* è logico e non cerca mai discussioni inutili.
  Glücklicherweise ist der *Mitbewohner* logisch und sucht nie nutzlose Diskussionen.
