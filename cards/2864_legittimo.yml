Rang: 2864
Wort: legittimo
Wortart: adj
Wort mit Artikel: legittimo
Femininum / Plural: ''
IPA: ''
Definition: rechtmäßig, legitim, berechtigt
Register: ''
Beispielsätze: |-
  Hanno fatto una richiesta *legittima* per ottenere il risarcimento.
  Sie haben einen *legitimen* Antrag gestellt, um die Entschädigung zu erhalten.
  
  Secondo la legge, ogni decisione deve essere *legittima* e trasparente.
  Laut Gesetz muss jede Entscheidung *rechtmäßig* und transparent sein.
  
  Non è *legittimo* che tu pretenda tutto il merito per un lavoro di squadra.
  Es ist nicht *berechtigt*, dass du dir den gesamten Ruhm für Teamarbeit anmaßt.
  
  La polizia ha verificato se il suo comportamento fosse *legittimo* in quella circostanza.
  Die Polizei überprüfte, ob sein Verhalten in dieser Situation *legal* war.
  
  Se il contratto non è *legittimo*, potremmo avere seri problemi legali.
  Wenn der Vertrag nicht *rechtmäßig* ist, könnten wir ernsthafte rechtliche Probleme bekommen.
