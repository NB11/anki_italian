Rang: 2299
Wort: seno
Wortart: n.m
Wort mit Artikel: il seno
Femininum / Plural: i seni
IPA: ''
Definition: die Brust, -¨e
Register: ''
Beispielsätze: |-
  Dopo la gravidanza, molte donne notano un cambiamento nel proprio *seno*.
  Nach der Schwangerschaft bemerken viele Frauen eine Veränderung an ihrer *Brust*.
  
  Il medico le chiese di togliersi la maglietta per esaminare il *seno* con attenzione.
  Der Arzt bat sie, das T-Shirt auszuziehen, um die *Brust* genau zu untersuchen.
  
  Durante l’esame, il paziente sembrava provare un po’ di *seno* ma non disse nulla.
  Während der Untersuchung schien der Patient etwas *Schmerzen* in der Brust zu spüren, aber er sagte nichts.
  
  La scultura rappresentava una figura femminile con un *seno* molto pronunciato, simbolo di fertilità.
  Die Skulptur stellte eine Frauenfigur mit einer sehr ausgeprägten *Brust* dar, ein Symbol für Fruchtbarkeit.
  
  Nonostante l’età, il suo *seno* era ancora fermo e senza segni di cedimento.
  Trotz ihres Alters war ihre *Brust* noch straff und ohne Anzeichen von Erschlaffung.
