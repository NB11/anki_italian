Rang: 4804
Wort: solletico
Wortart: n.m
Wort mit Artikel: il solletico
Femininum / Plural: solletichi
IPA: ''
Definition: das Kitzeln
Register: ''
Beispielsätze: |-
  Ho un *solletico* fastidioso sulla mano che non se ne va.
  Ich habe ein *kitzelndes* Gefühl auf der Hand, das nicht verschwindet.
  
  Quando ero piccolo, mia madre mi faceva il *solletico* sotto le ascelle.
  Als ich klein war, hat mir meine Mutter unter den Achseln *gekitzelt*.
  
  Non sopporto il *solletico* perché mi fa ridere in modo incontrollabile.
  Ich *kann* das Kitzeln nicht ausstehen, weil es mich unkontrolliert zum Lachen bringt.
  
  Se mi tocchi il collo, provo sempre un *solletico* insopportabile.
  Wenn du mir den Hals berührst, spüre ich immer ein unerträgliches *Kitzeln*.
  
  Secondo te, perché alcune persone provano più *solletico* di altre?
  Warum, glaubst du, spüren manche Menschen mehr *Kitzeln* als andere?
