Rang: 4406
Wort: rinfrescare
Wortart: v
Wort mit Artikel: rinfrescare
Femininum / Plural: ''
IPA: ''
Definition: abkühlen, erfrischen
Register: ''
Beispielsätze: |-
  Dopo la lunga camminata, ci siamo fermati a *rinfrescare* sotto un albero.
  Nach dem langen Spaziergang haben wir uns unter einem Baum *abgekühlt*.
  
  Se avessi un condizionatore, potrei *rinfrescare* tutta la stanza in pochi minuti.
  Wenn ich eine Klimaanlage hätte, könnte ich den ganzen Raum in wenigen Minuten *kühlen*.
  
  Il medico le ha consigliato di *rinfrescare* la fronte con un panno umido.
  Der Arzt hat ihr geraten, die Stirn mit einem feuchten Tuch zu *kühlen*.
  
  Appena arrivato in città, ho sentito il bisogno di *rinfrescare* la mia memoria sugli indirizzi degli amici.
  Kaum in der Stadt angekommen, hatte ich das Bedürfnis, mein Gedächtnis über die Adressen meiner Freunde zu *auffrischen*.
  
  Il gelato alla menta sembra fatto apposta per *rinfrescare* il palato in una giornata calda.
  Das Minzeis scheint extra dafür gemacht zu sein, den Gaumen an einem heißen Tag zu *erfrischen*.
