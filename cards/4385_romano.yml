Definition: der *Römer*
Register: ''
Beispielsätze: |-
  Questa pizza ha un sapore molto *romano*, con un tocco di origano e formaggio pecorino.
  Diese Pizza hat einen sehr *römischen* Geschmack, mit einer Note Oregano und Pecorino.
  
  Ho visitato il Colosseo e ho letto che fu costruito dagli antichi *romani*.
  Ich habe das Kolosseum besucht und gelesen, dass es von den alten *Römern* erbaut wurde.
  
  Nonostante sia *romano*, preferisco la cucina napoletana alle specialità del Lazio.
  Obwohl ich *Römer* bin, bevorzuge ich die neapolitanische Küche den Spezialitäten Latiums.
  
  Il museo espone una statua di un gladiatore dell'epoca dei *romani*.
  Das Museum zeigt eine Statue eines Gladiators aus der Zeit der *Römer*.
  
  Se fossi nato duemila anni fa, sarei sicuramente stato un soldato *romano*.
  Wenn ich vor zweitausend Jahren geboren worden wäre, wäre ich sicherlich ein Soldat der *Römer* gewesen.
