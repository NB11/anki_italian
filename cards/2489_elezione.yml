Rang: 2489
Wort: elezione
Wortart: n.f
Wort mit Artikel: la elezione
Femininum / Plural: elezioni
IPA: ''
Definition: die Wahl, -en
Register: ''
Beispielsätze: |-
  La *elezione* del nuovo presidente avverrà domani alle 15:00.
  Die *Wahl* des neuen Präsidenten findet morgen um 15:00 Uhr statt.
  
  Spero che la *elezione* avvenga in modo trasparente e senza brogli.
  Ich hoffe, dass die *Wahl* transparent und ohne Wahlbetrug stattfindet.
  
  Dopo la *elezione* del sindaco, ci fu una grande festa in piazza.
  Nach der *Wahl* des Bürgermeisters gab es ein großes Fest auf dem Platz.
  
  La commissione ha confermato la data della *elezione*, che si terrà a giugno.
  Die Kommission hat das Datum der *Wahl* bestätigt, die im Juni stattfindet.
  
  Se vincessi la *elezione*, cambierei subito alcune leggi fondamentali.
  Wenn ich die *Wahl* gewinne, würde ich sofort einige grundlegende Gesetze ändern.
