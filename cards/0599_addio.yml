Rang: 599
Wort: addio
Wortart: n.m
Wort mit Artikel: l'addio
Femininum / Plural: addii
IPA: ''
Definition: der Abschied, -e
Register: ''
Beispielsätze: |-
  Domani partirò per Parigi, quindi *addio* a tutti!
  Morgen reise ich nach Paris, also *Abschied* von allen!
  
  Ha dato un ultimo *addio* ai suoi amici prima di partire.
  Er gab einen letzten *Abschied* seinen Freunden, bevor er abreiste.
  
  Non è un vero *addio*, ci rivedremo presto!
  Das ist kein wahrer *Abschied*, wir sehen uns bald wieder!
  
  Con un mesto *addio* si separò dalla sua famiglia.
  Mit einem traurigen *Abschied* trennte er sich von seiner Familie.
  
  Che *addio* commovente hanno ricevuto i vincitori!
  Was für ein bewegender *Abschied* wurde den Gewinnern zuteil!
