Rang: 599
Wort: addio
Wortart: n.m
Wort mit Artikel: l'addio
Femininum / Plural: addii
IPA: ''
Definition: der Abschied, -e
Register: ''
Beispielsätze: |-
  Dobbiamo dire *addio* ai nostri amici prima di partire.
  Wir müssen uns von unseren Freunden verabschieden, bevor wir gehen.
  
  Quando hai visto tuo zio per l'ultima volta? Ho detto *addio* a lui due anni fa.
  Wann hast du deinen Onkel zum letzten Mal gesehen? Ich habe mich vor zwei Jahren von ihm *verabschiedet*.
  
  Non volevo credere che fosse un *addio* definitivo, ma purtroppo era così.
  Ich wollte nicht glauben, dass es ein endgültiger Abschied sein würde, aber leider war es so.
  
  Prima di *addii* affettuosi, abbiamo trascorso una settimana insieme in montagna.
  Vor den zärtlichen Verabschiedungen haben wir eine Woche miteinander in den Bergen verbracht.
  
  Anche se non lo ammetto, ogni *addio* mi rende ancora molto triste.
  Auch wenn ich es nicht zugebe, macht mich jeder Abschied immer noch sehr traurig.
