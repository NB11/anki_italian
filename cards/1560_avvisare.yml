Rang: 1560
Wort: avvisare
Wortart: vt
Wort mit Artikel: avvisare
Femininum / Plural: ''
IPA: ''
Definition: benachrichtigen, informieren, warnen
Register: ''
Beispielsätze: |-
  Devi *avvisare* il ministro prima della conferenza stampa di novità importanti.
  Du musst den *Minister* vor der Pressekonferenz über wichtige Neuigkeiten informieren.
  
  Ho chiamato l’agenzia perché non ho ancora *avvisato* il personaggio principale.
  Ich habe die *Agentur* angerufen, weil ich die Hauptfigur noch nicht benachrichtigt habe.
  
  Se *avvisi* troppo tardi, il prigioniero potrebbe scappare.
  Wenn du zu spät *warnst*, könnte der Gefangene fliehen.
  
  Gli esperti vogliono *avvisare* il governo della scientifico attività del topo nel laboratorio.
  Die Experten wollen die Regierung vor den *wissenschaftlichen* Aktivitäten der Maus im Labor warnen.
  
  Lei *avviserà* tutti i parenti quando il dono sarà pronto da consegnare.
  Sie wird alle *Verwandten* inforieren, sobald das Geschenk zur Übergabe bereit ist.
