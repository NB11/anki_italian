Rang: 3149
Wort: sporcare
Wortart: v
Wort mit Artikel: sporcare
Femininum / Plural: ''
IPA: ''
Definition: verschmutzen, dreckig machen, beschmutzen
Register: ''
Beispielsätze: |-
  Non *sporcare* il pavimento con le scarpe sporche!
  Verschmutze* den Boden nicht mit den schmutzigen Schuhen!
  
  Se non avessi *sporcato* la camicia con il sugo, l’avrei indossata oggi.
  Wenn ich das Hemd nicht mit der Soße *beschmutzt* hätte, hätte ich es heute getragen.
  
  È importante insegnare ai bambini a non *sporcarsi* le mani di cibo.
  Es ist wichtig, den Kindern beizubringen, sich die Hände nicht mit Essen *schmutzig* zu machen.
  
  Nonostante il divieto, qualcuno ha continuato a *sporcarsi* le strade con i mozziconi di sigarette.
  Trotz des Verbots hat jemand weiter die Straßen mit Zigarettenstummeln *verschmutzt*.
  
  Avresti dovuto avvertirmi che la lavatrice non avrebbe pulito bene se avessi *sporcato* le lenzuola con il vino rosso!
  Hättest du mich warnen sollen, dass die Waschmaschine die Laken nicht gut reinigen würde, wenn du sie mit Rotwein *beschmutzt* hättest!
