Rang: 1966
Wort: terminare
Wortart: v
Wort mit Artikel: terminare
Femininum / Plural: ''
IPA: ''
Definition: beenden, abschließen, aufhören
Register: ''
Beispielsätze: |-
  Devo *terminare* questo incarico entro domani.
  Ich muss diesen *Auftrag* bis morgen beenden.
  
  Se non avessi *terminato* i compiti, avrei preso un brutto voto.
  Wenn ich die Hausaufgaben nicht *beendet* hätte, hätte ich eine schlechte Note bekommen.
  
  Penso che lui *terminerà* gli studi l’anno prossimo.
  Ich denke, dass er das Studium nächstes Jahr *abschließen* wird.
  
  È importante che tu *termin*i il lavoro in tempo.
  Es ist wichtig, dass du die Arbeit rechtzeitig *beendest*.
  
  Stavo per *terminare* la birra quando ho sentito la notizia.
  Ich war dabei, das Bier *auszutrinken*, als ich die Nachricht hörte.
