Rang: 4008
Wort: immondizia
Wortart: n.m
Wort mit Artikel: l'immondizia
Femininum / Plural: immondizie
IPA: ''
Definition: der Müll, -
Register: ''
Beispielsätze: |-
  I *rifiuti* domestici devono essere smaltiti correttamente per proteggere l'ambiente.
  Die *Abfallstoffe* müssen ordnungsgemäß entsorgt werden, um die Umwelt zu schützen.
  
  Durante la *immondizia* notturna, si sente spesso il rumore dei camion della nettezza urbana.
  Während der nächtlichen *Müllabfuhr* hört man oft das Geräusch der Müllwagen.
  
  Spero che domani finiscano di raccogliere tutta la *immondizia* accumulata per strada.
  Ich hoffe, dass sie morgen die angesammelte *Abfälle* an der Straße einsammeln.
  
  Se non avessimo gettato la *immondizia* in modo sbagliato, ora il quartiere sarebbe più pulito.
  Wenn wir den *Müll* nicht falsch entsorgt hätten, wäre das Viertel jetzt sauberer.
  
  Chiunque abbia gettato quella *immondizia* qui vicino al parco dovrebbe vergognarsi!
  Wer auch immer den *Abfall* dort in der Nähe des Parks weggeworfen hat, sollte sich schämen!
