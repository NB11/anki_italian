Rang: 3480
Wort: scrittura
Wortart: n.f
Wort mit Artikel: la scrittura
Femininum / Plural: scritture
IPA: ''
Definition: die Schrift, -en
Register: ''
Beispielsätze: |-
  La *scrittura* di Leonardo da Vinci è molto difficile da leggere.
  Die *Schrift* von Leonardo da Vinci ist sehr schwer zu lesen.
  
  Dopo anni di studio, ha finalmente ottenuto una *scrittura* con la casa editrice.
  Nach Jahren des Studiums hat er endlich einen *Vertrag* mit dem Verlag bekommen.
  
  Mi hanno insegnato che la *scrittura* a mano migliora la memoria.
  Man hat mir beigebracht, dass die *Handschrift* das Gedächtnis verbessert.
  
  La *scrittura* del suo romanzo è così fluida che sembra scritta in un fiato.
  Die *Abfassung* seines Romans ist so flüssig, dass sie in einem Atemzug geschrieben scheint.
  
  Nonostante la sua fama, la *scrittura* per la televisione gli ha causato molti problemi.
  Trotz seines Ruhmes hat ihm die *Drehbucharbeit* fürs Fernsehen viele Probleme bereitet.
