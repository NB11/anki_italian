Rang: 2006
Wort: istinto
Wortart: n.m
Wort mit Artikel: lo istinto
Femininum / Plural: gli istinti
IPA: ''
Definition: der Instinkt, -e
Register: ''
Beispielsätze: |-
  Spesso l’*istinto* ci aiuta a prendere decisioni quando la ragione non basta.
  Oft hilft uns der *Instinkt*, wenn die Vernunft nicht ausreicht.
  
  Ho seguito il mio *istinto* e ho scelto di non andare alla festa.
  Ich habe meinem *Instinkt* gefolgt und beschlossen, nicht zur Party zu gehen.
  
  Credi che un animale agisca solo per *istinto* o anche per abitudine?
  Glaubst du, dass ein Tier nur aus *Instinkt* handelt oder auch aus Gewohnheit?
  
  Quando ha visto il pericolo, il suo *istinto* di protezione si è subito attivato.
  Als er die Gefahr sah, aktivierte sich sofort sein Schutz*instinkt*.
  
  È raro trovare un cane che non segua il proprio *istinto* quando sente l’odore della preda.
  Es ist selten, einen Hund zu finden, der seinem *Instinkt* nicht folgt, wenn er die Beute wittert.
