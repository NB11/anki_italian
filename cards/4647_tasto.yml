Wort: tasto
Wortart: n.m
Wort mit Artikel: il tasto
Femininum / Plural: i tasti
IPA: ''
Definition: die Taste, -n
Register: ''
Beispielsätze: |-
  Premi *l'asterisco* sulla tastiera per confermare l'operazione.
  Drücke die *Taste* auf der Tastatur, um die Operation zu bestätigen.
  
  Non riesco a trovare il *tasto* della pausa sul telecomando.
  Ich kann die *Taste* für die Pause auf der Fernbedienung nicht finden.
  
  Se avessi saputo che il *tasto* era rotto, avrei chiamato il tecnico.
  Wenn ich gewusst hätte, dass die *Taste* kaputt war, hätte ich den Techniker gerufen.
  
  Mi ha spiegato come funziona il *tasto* di accensione della lavatrice.
  Er hat mir erklärt, wie die *Taste* zum Einschalten der Waschmaschine funktioniert.
  
  Dopo aver premuto il *tasto* sbagliato, il computer si è bloccato.
  Nachdem ich die falsche *Taste* gedrückt hatte, ist der Computer eingefroren.
