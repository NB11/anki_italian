Rang: 1961
Wort: convenire
Wortart: vi
Wort mit Artikel: convenire
Femininum / Plural: ''
IPA: ''
Definition: sich lohnen, passen, vereinbaren
Register: ''
Beispielsätze: |-
  Mi chiedevo se *convenisse* prenotare il volo con così poco preavviso.
  Ich fragte mich, ob es sich *gelohnt hätte*, den Flug mit so kurzer Vorlaufzeit zu buchen.
  
  Se vuoi risparmiare tempo, *conviene* prendere l’autobus invece della macchina.
  Wenn du Zeit sparen willst, *passen* sich Bus statt Auto zu nehmen.
  
  Ha detto che gli *conviene* accettare l’incarico, anche se è faticoso.
  Er sagte, es *passe* für ihn, den Auftrag anzunehmen, auch wenn es anstrengend ist.
  
  Penso che a lei *convenga* andare in biblioteca oggi, ci sono molti libri nuovi.
  Ich denke, es *lohnt sich* für sie, heute in die Bibliothek zu gehen, es gibt viele neue Bücher.
