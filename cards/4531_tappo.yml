Rang: 4531
Wort: tappo
Wortart: n.m
Wort mit Artikel: il tappo
Femininum / Plural: tappi
IPA: ''
Definition: der Verschluss, -üsse
Register: ''
Beispielsätze: |-
  Ho trovato il *tappo* della bottiglia sotto il tavolo.
  Ich habe den *Verschluss* der Flasche unter dem Tisch gefunden.
  
  Non riesco a togliere questo *tappo*, è troppo stretto!
  Ich bekomme diesen *Verschluss* nicht ab, er ist zu eng!
  
  Se non chiudi bene il *tappo*, il vino andrà a male.
  Wenn du den *Verschluss* nicht richtig schließt, geht der Wein kaputt.
  
  Ho perso il *tappo* della pentola a pressione, ora non posso cucinare.
  Ich habe den *Verschluss* des Schnellkochtopfs verloren, jetzt kann ich nicht kochen.
  
  Il meccanico mi ha detto che il *tappo* del serbatoio è rotto e va sostituito.
  Der Mechaniker hat mir gesagt, dass der *Verschluss* des Tanks kaputt ist und ersetzt werden muss.
