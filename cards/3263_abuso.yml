Rang: 3263
Wort: abuso
Wortart: n.m
Wort mit Artikel: l'abuso
Femininum / Plural: abusi
IPA: ''
Definition: der Missbrauch, -bräuche
Register: ''
Beispielsätze: |-
  L’*abuso* di potere è inaccettabile in una società democratica.
  Der *Missbrauch* von Macht ist in einer demokratischen Gesellschaft inakzeptabel.
  
  Hanno denunciato l’*abuso* dei minori nella scuola dove studiava suo cognato.
  Sie haben den *Missbrauch* an Minderjährigen in der Schule angezeigt, in der ihr Schwager studierte.
  
  Se scoprissero un *abuso*, la polizia interverrebbe immediatamente.
  Wenn sie einen *Missbrauch* entdecken würden, würde die Polizei sofort eingreifen.
  
  È fondamentale prevenire ogni forma di *abuso* nei confronti dei più vulnerabili.
  Es ist entscheidend, jede Form von *Missbrauch* gegenüber den verletzlichsten Personen zu verhindern.
  
  Nonostante l’*abuso* di alcol, continua a guidare la sua macchina senza problemi.
  Trotz des *Missbrauchs* von Alkohol fährt er mit seinem Auto problemlos weiter.
