Rang: 752
Wort: tenente
Wortart: n.m
Wort mit Artikel: il tenente
Femininum / Plural: tenenti
IPA: ''
Definition: der Leutnant, -e
Register: ''
Beispielsätze: |-
  Il *tenente* ha ricevuto una medaglia per il suo coraggio.
  Der *Leutnant* hat eine Medaille für seinen Mut erhalten.
  
  Siamo andati a *tenente* a salutare prima della partenza.
  Wir sind zum *Leutnant* gegangen, um uns vor der Abreise zu verabschieden.
  
  Se fossi più ambizioso, forse diventerei *tenente* prima.
  Wenn ich ehrgeiziger wäre, würde ich vielleicht früher *Leutnant* werden.
  
  Il *tenente* che hai incontrato ieri lavora nella stessa stazione di polizia.
  Der *Leutnant*, den du gestern getroffen hast, arbeitet im selben Polizeirevier.
  
  Nonostante la sua giovane età, il *tenente* ha già guidato diverse operazioni di successo.
  Trotz seines jungen Alters hat der *Leutnant* bereits mehrere erfolgreiche Einsätze geleitet.
