Rang: 1164
Wort: deludere
Wortart: vt
Wort mit Artikel: deludere
Femininum / Plural: ''
IPA: ''
Definition: enttäuschen
Register: ''
Beispielsätze: |-
  Temo di aver *deluso* la mia famiglia con i miei scarsi risultati a scuola.
  Ich fürchte, ich habe *enttäuscht*, was meine Familie mit meinen schlechten schulischen Ergebnissen erwartet.
  
  Se non manterrà la promessa, *deluderà* tutti quanti.
  Falls er das *Versprechen* nicht hält, wird er enttäuschen, was alle erwarten.
  
  È stato difficile *deludere* qualcuno che ti ha sempre sostenuto così tanto.
  Es war schwer, jemanden zu *enttäuschen*, der dich immer so sehr unterstützt hat.
  
  Non sopporto quando le persone *deludono* la mia fiducia.
  Ich kann es nicht ertragen, wenn Leute mein *Vertrauen* enttäuschen.
  
  Chissà se le sue scuse *deluderanno* chi ha aspettato tanto a lungo.
  Wer weiß, ob seine *Entschuldigungen* die Menschen enttäuschen, die so lange gewartet haben.
