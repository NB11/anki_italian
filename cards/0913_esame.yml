  Trotz intensivem Lernen hat er eine schlechte Note in der *Prüfung* in Matematik bekommen.
  
  Se superi questo *esame*, potrai frequentare l’università che desideri.
  Wenn du diese *Prüfung* bestehst, kannst du die Universität deiner Wahl besuchen.
  
  Mi hanno detto che l'*esame* scritto è più difficile di quello orale.
  Man hat mir gesagt, dass die schriftliche *Prüfung* schwieriger als die mündliche ist.
  
  Avrei voluto prepararmi meglio per l'*esame*, ma non ho avuto tempo.
  Ich hätte mich besser auf die *Prüfung* vorbereiten sollen, aber ich hatte keine Zeit.
