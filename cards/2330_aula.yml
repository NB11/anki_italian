Rang: 2330
Wort: aula
Wortart: n.f
Wort mit Artikel: la aula
Femininum / Plural: aule
IPA: ''
Definition: der Hörsaal, -säle
Register: ''
Beispielsätze: |-
  Gli studenti aspettano nella *aula* prima dell’esame.
  Die Studenten warten im *Hörsaal* vor der Prüfung.
  
  La professoressa ha spiegato la lezione in questa *aula* per tutto l’anno.
  Die Professorin hat in diesem *Hörsaal* das ganze Jahr unterrichtet.
  
  Domani ci sarà un seminario nella *aula* magna.
  Morgen findet im *Großen Hörsaal* ein Seminar statt.
  
  Se non trovi il tuo posto, chiedi alla segreteria in quale *aula* devi andare.
  Wenn du deinen Platz nicht findest, frag im Sekretariat, in welchen *Hörsaal* du gehen musst.
  
  Vor l’anno scorso questa *aula* era piena di studenti, ma ora si è svuotata.
  Vor letztem Jahr war dieser *Hörsaal* voller Studenten, aber jetzt ist er leer.
