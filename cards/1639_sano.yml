Rang: 1639
Wort: sano
Wortart: adj
Wort mit Artikel: sano
Femininum / Plural: ''
IPA: ''
Definition: gesund, wohlauf
Register: ''
Beispielsätze: |-
  Dopo la malattia, Marco si sente finalmente *sano* di nuovo.
  Nach der Krankheit fühlt sich Marco endlich wieder *gesund*.
  
  Anche se non dormi bene, credi di essere *sano*?
  Glaubst du etwa, dass du *gesund* bist, obwohl du schlecht schläfst?
  
  Il dottore ha detto che mio nonno, pur essendo anziano, è ancora *sano* come un pesce.
  Der Arzt hat gesagt, dass mein Großvater, obwohl er alt ist, immer noch *kerngesund* ist.
  
  Credo che una dieta equilibrata sia la chiave per vivere *sano* a lungo.
  Ich glaube, dass eine ausgewogene Ernährung der Schlüssel ist, um lange *gesund* zu leben.
  
  Se fossi più *sano*, non avresti bisogno di così tanti farmaci, non credi?
  Wenn du *gesünder* wärst, bräuchtest du nicht so viele Medikamente, oder?
