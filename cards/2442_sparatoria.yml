Rang: 2442
Wort: sparatoria
Wortart: n.f
Wort mit Artikel: la sparatoria
Femininum / Plural: sparatorie
IPA: ''
Definition: das Schießen, die Schießerei, der Schusswechsel
Register: ''
Beispielsätze: |-
  Hanno sentito una *sparatoria* in lontananza durante la notte.
  Sie haben einen *Schusswechsel* in der Ferne während der Nacht gehört.
  
  La polizia ha evacuato l’area dopo la *sparatoria* nel centro commerciale.
  Die Polizei hat das Gebiet nach der *Schießerei* im Einkaufszentrum evakuiert.
  
  Non esiste alcuna giustificazione per una *sparatoria* come quella di ieri.
  Es gibt keine Rechtfertigung für eine *Schießerei* wie die von gestern.
  
  La *sparatoria* è durata meno di un minuto, ma ha fatto molti feriti.
  Der *Schusswechsel* dauerte weniger als eine Minute, hat aber viele Verletzte verursacht.
  
  Se ci fosse stata una *sparatoria*, avremmo chiamato immediatamente la polizia.
  Wenn es einen *Schusswechsel* gegeben hätte, hätten wir sofort die Polizei gerufen.
