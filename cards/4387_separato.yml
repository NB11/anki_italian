Rang: 4387
Wort: separato
Wortart: adj
Wort mit Artikel: separato
Femininum / Plural: separati (m), separate (f)
IPA: ''
Definition: getrennt, einzeln
Register: ''
Beispielsätze: |-
  Le due stanze sono *separate* da un corridoio stretto.
  Die zwei Zimmer sind durch einen schmalen Korridor *getrennt*.
  
  Hanno vissuto *separatamente* per anni prima del divorzio.
  Sie haben *getrennt* jahrelang gelebt, bevor sie sich scheiden ließen.
  
  Il pacco era *separato* in due parti per facilitare il trasporto.
  Das Paket war in zwei *getrennte* Teile zerlegt worden, um den Transport zu erleichtern.
  
  Vorrei prenotare due camere *separate* per me e mio fratello.
  Ich möchte zwei *getrennte* Zimmer für mich und meinen Bruder buchen.
  
  La polizia ha trovato documenti *separati* in due buste diverse.
  Die Polizei fand *getrennte* Dokumente in zwei verschiedenen Umschlägen.
