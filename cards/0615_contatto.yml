Rang: 615
Wort: contatto
Wortart: n.m
Wort mit Artikel: il contatto
Femininum / Plural: i contatti
IPA: ''
Definition: der Kontakt, die Kontakte
Register: ''
Beispielsätze: |-
  Per favore, *contatto* con il tuo medico se hai dubbi sulla salute.
  Bitte *Kontakt* zu deinem Arzt auf, wenn du Zweifel an deiner Gesundheit hast.
  
  Ho perso il *contatto* con molti amici semplicemente perché siamo andati in città diverse.
  Ich habe den *Kontakt* zu vielen Freunden verloren, einfach weil wir in verschiedene Städte gezogen sind.
  
  Il *contatto* tra le persone è diventato meno frequento dopo la pandemia, ma pian piano si sta tornando alla normalità.
  Der *Kontatto* zwischen den Menschen ist nach der Pandemie seltener geworden, doch langsam normalisiert es sich wieder.
  
  Vorrei mantenere un *contatto* più stretto con il mio zio, che vive laggiù in Sicilia.
  Ich würde gerne einen engeren *Kontakt* zu meinem Onkel halten, der dort unten in Sizilien lebt.
  
  Non fingere che questo sia un *contatto* casuale: sapevi benissimo che avrei chiamato dopo lo studio.
  Tu *Kontakt* ist nicht zufällig – du wusstest genau, dass ich nach dem Studio anrufen würde.
