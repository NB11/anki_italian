Rang: 3641
Wort: compromesso
Wortart: n.m
Wort mit Artikel: il compromesso
Femininum / Plural: compromessi
IPA: ''
Definition: der Kompromiss, -e
Register: ''
Beispielsätze: |-
  Abbiamo trovato un *compromesso* che soddisfa entrambe le parti.
  Wir haben einen *Kompromiss* gefunden, der beide Seiten zufriedenstellt.
  
  Nonostante il *compromesso* proposto, non hanno raggiunto un accordo.
  Trotz des vorgeschlagenen *Kompromisses* haben sie keine Einigung erzielt.
  
  Se non accettate il *compromesso*, dovremo trovare un'altra soluzione.
  Wenn ihr den *Kompromiss* nicht akzeptiert, müssen wir eine andere Lösung finden.
  
  Il *compromesso* tra i due governi è stato raggiunto dopo lunghe trattative.
  Der *Kompromiss* zwischen den beiden Regierungen wurde nach langen Verhandlungen erzielt.
  
  Senza un *compromesso* serio, la situazione rischia di peggiorare.
  Ohne einen ernsthaften *Kompromiss* droht sich die Lage zu verschlechtern.
