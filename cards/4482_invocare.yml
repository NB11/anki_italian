Rang: 4482
Wort: invocare
Wortart: v
Wort mit Artikel: invocare
Femininum / Plural: ''
IPA: ''
Definition: anrufen, herbeirufen, beschwören
Register: ''
Beispielsätze: |-
  I sacerdoti *invocano* gli dei durante la cerimonia.
  Die Priester rufen die Götter während der Zeremonie an.
  
  Nonostante il pericolo, decise di *invocare* l’aiuto degli alleati.
  Trotzdem beschloss sie, die Hilfe der Verbündeten herbeizurufen.
  
  Se avessi saputo, avrei *invocato* la legge per difendermi.
  Wenn ich es gewusst hätte, hätte ich das Gesetz angerufen, um mich zu verteidigen.
  
  I fantasmi sembrano *invocati* dalla leggenda del luogo.
  Die Geister scheinen von der Legende des Ortes *beschworen* zu werden.
  
  L’artista ha *invocato* il suo genio per creare un capolavoro unico.
  Der Künstler rief sein Genie herbei, um ein einzigartiges Meisterwerk zu schaffen.
Audio: ''
Notiz: ''
Dispersion: ''
