Rang: 4908
Wort: lampadina
Wortart: n.f
Wort mit Artikel: la lampadina
Femininum / Plural: lampadine
IPA: ''
Definition: die Glühbirne, -n
Register: ''
Beispielsätze: |-
  Ho sostituito la *lampadina* fulminata nel corridoio.
  Ich habe die *Glühbirne* im Flur gewechselt.
  
  Nonostante la stanza fosse buia, Maria continuò a leggere senza accendere la *lampadina* da tavolo.
  Obwohl der Raum dunkel war, las Maria weiter, ohne die *Tischleuchte* einzuschalten.
  
  La *lampadina* che hai comprato costa solo due euro, ma ne durerà più di sei mesi.
  Die *Glühbirne*, die du gekauft hast, kostet nur zwei Euro, aber sie hält mehr als sechs Monate.
  
  Se non trovi la *lampadina* adatta, chiedi al negoziante di aiutarti a cercare.
  Wenn du die passende *Glühbirne* nicht findest, bitte den Verkäufer, dir beim Suchen zu helfen.
  
  Quando arriverà il nuovo inquilino, dovremo controllare tutte le *lampadine* per vedere quali vanno sostituite.
  Wenn der neue Mieter einzieht, müssen wir alle *Glühbirnen* kontrollieren, um zu sehen, welche ersetzt werden müssen.
