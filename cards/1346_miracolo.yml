Rang: 1346
Wort: miracolo
Wortart: n.m
Wort mit Artikel: il miracolo
Femininum / Plural: i miracoli
IPA: ''
Definition: das Wunder, -
Register: ''
Beispielsätze: |-
  È stato un *miracolo* che tu sia arrivato in tempo nonostante il traffico.
  Es war ein *Wunder*, dass du trotz des Verkehrs rechtzeitig angekommen bist.
  
  I medici non credevano che quel *miracolo* di guarigione fosse possibile.
  Die Ärzte glaubten nicht, dass diese *Wunder*heilung möglich sei.
  
  Dopo aver trovato quell’atto di magia, credettero a un *miracolo*.
  Nachdem sie diese Magiehandlung gefunden hatten, glaubten sie an ein *Wunder*.
  
  Se ci aiuti, sarà un *miracolo* se riusciremo a finire tutto per venerdì.
  Wenn du uns hilfst, wird es ein *Wunder*, wenn wir alles bis Freitag schaffen.
  
  Dicono che questo *miracolo* di guarigione provenga da un’erba speciale che cresce solo nel loro giardino.
  Man sagt, dieses *Wunder* der Heilung stamme von einem besonderen Kraut, das nur in ihrem Garten wächst.
