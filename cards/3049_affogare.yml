Rang: 3049
Wort: affogare
Wortart: v
Wort mit Artikel: affogare
Femininum / Plural: ''
IPA: ''
Definition: ertränken, ertrinken
Register: ''
Beispielsätze: |-
  Se *affoghi* la polvere nella vernice, il colore sarà meno intenso.
  Wenn du den Staub im Lack *ertränkst*, wird die Farbe weniger intensiv.
  
  Il nuotatore aveva paura di *affogare* nelle acque gelide del lago.
  Der Schwimmer hatte Angst, in den eiskalten Gewässern des Sees zu *ertrinken*.
  
  Secondo la leggenda, gli dei vollero *affogare* la città per punire gli abitanti.
  Der Legende nach wollten die Götter die Stadt bestrafen, indem sie sie *ertränkten*.
  
  Nonostante il temporaneo sollievo, temeva di *affogare* nei suoi stessi debiti.
  Trotz vorübergehender Erleichterung fürchtete er, in seinen eigenen Schulden zu *versinken*.
  
  Se non avessi chiuso bene le valvole, l’acqua sarebbe potuta *affogare* il motore.
  Hätte ich die Ventile nicht richtig geschlossen, wäre das Wasser in den Motor *eingedrungen*.
