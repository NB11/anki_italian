Rang: 2049
Wort: punizione
Wortart: n.f
Wort mit Artikel: la punizione
Femininum / Plural: punizioni
IPA: ''
Definition: die Strafe, -n
Register: ''
Beispielsätze: |-
  Il professore ha deciso di dare una *punizione* a tutta la classe per il loro comportamento scortese.
  Der Professor hat beschlossen, der ganzen Klasse eine *Strafe* zu geben wegen ihres unhöflichen Verhaltens.
  
  Se non studi, riceverai una *punizione* più severa del solito.
  Wenn du nicht lernst, wirst du eine *Strafe* erhalten, die strenger als sonst ist.
  
  Gli studenti temono quella *punizione* perché include ore di esercizi extra.
  Die Schüler fürchten jene *Strafe*, weil sie zusätzliche Übungsstunden beinhaltet.
  
  Nonostante la *punizione*, continuava a disturbare la lezione con battute stupide.
  Trotz der *Strafe* störte er weiterhin den Unterricht mit dummen Witzen.
  
  Era convinto che la *punizione* fosse ingiusta, ma nessuno lo volle ascoltare.
  Er war überzeugt, dass die *Strafe* unfair war, doch niemand wollte ihn anhören.
