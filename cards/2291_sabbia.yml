Rang: 2291
Wort: sabbia
Wortart: n.f
Wort mit Artikel: la sabbia
Femininum / Plural: sabbie
IPA: ''
Definition: der Sand
Register: ''
Beispielsätze: |-
  La *sabbia* della spiaggia era calda sotto i nostri piedi.
  Der *Sand* des Strandes war heiß unter unseren Füßen.
  
  Ho trovato una conchiglia incastrata nella *sabbia* ancora umida.
  Ich habe eine Muschel gefunden, die im noch feuchten *Sand* steckte.
  
  Se non fosse per la *sabbia*, non esisterebbe nessun deserto.
  Wenn es den *Sand* nicht gäbe, würde es keine Wüste geben.
  
  I bambini hanno costruito un castello di *sabbia* così alto che quasi toccava il cielo.
  Die Kinder haben eine Sandburg gebaut, die so hoch war, dass sie fast den Himmel berührte.
  
  La *sabbia* del Sahara copre circa un terzo dell'Africa.
  Der *Sand* der Sahara bedeckt etwa ein Drittel Afrikas.
