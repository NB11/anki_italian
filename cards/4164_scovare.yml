Rang: 4164
Wort: scovare
Wortart: vt
Wort mit Artikel: scovare
Femininum / Plural: ''
IPA: ''
Definition: aufspüren, ausfindig machen
Register: ''
Beispielsätze: |-
  I detective sono riusciti a *scovare* il ladro dopo settimane di indagini.
  Die Ermittler konnten den Dieb nach wochenlangen Ermittlungen *aufspüren*.
  
  Se vuoi trovare un buon ristorante, devi *scovare* le recensioni nascoste tra i commenti.
  Wenn du ein gutes Restaurant finden willst, musst du die versteckten Bewertungen unter den Kommentaren *ausfindig machen*.
  
  Il giornalista ha *scovato* una storia scandalosa che nessuno osava pubblicare.
  Der Journalist hat eine skandalöse Geschichte *aufgedeckt*, die niemand zu veröffentlichen wagte.
  
  Dopo mesi di ricerche, gli scienziati hanno finalmente *scovato* i batteri responsabili della malattia.
  Nach monatelanger Forschung haben die Wissenschaftler endlich die Bakterien, die für die Krankheit verantwortlich sind, *ausfindig gemacht*.
  
  Non sarà facile *scovare* un appartamento così economico in centro città.
  Es wird nicht leicht sein, eine so günstige Wohnung im Stadtzentrum *zu finden*.
