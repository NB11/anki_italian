Rang: 982
Wort: turno
Wortart: n.m
Wort mit Artikel: il turno
Femininum / Plural: turni
IPA: ''
Definition: die Reihe, die Schicht, der turnus
Register: ''
Beispielsätze: |-
  Il mio *turno* inizia alle otto di mattina al ristorante.
  Meine *Reihe* beginnt um acht Uhr morgens im Restaurant.
  
  Aspetta il tuo *turno* prima di parlare con il direttore.
  Warte auf deinen *Turnus*, bevor du mit dem Direktor sprichst.
  
  Durante lo *turno* di notte, il poliziotto ha registrato un episodio sospetto nel laboratorio.
  Während der *Nachtschicht* hat der Polizist einen verdächtigen Vorfall im Labor aufgenommen.
  
  Se non finisci il lavoro entro il tuo *turno*, dovrai farlo nel prossimo.
  Wenn du die Arbeit nicht innerhalb deiner *Schicht* beendest, musst du sie in der nächsten nachholen.
  
  Il *turno* del medico è stato interrotto da una chiamata d'emergenza al reparto di psichiatria.
  Der *Dienst* des Arztes wurde durch einen Notruf in der Psychiatrie unterbrochen.
