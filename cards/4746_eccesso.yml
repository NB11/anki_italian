Rang: 4746
Wort: eccesso
Wortart: n.m
Wort mit Artikel: l'eccesso
Femininum / Plural: gli eccessi
IPA: ''
Definition: der Überschuss, der Exzess
Register: ''
Beispielsätze: |-
  Questa macchina consuma un *eccesso* di carburante a velocità elevate.
  Diese Maschine verbraucht einen *übermäßigen* Anteil an Treibstoff bei hohen Geschwindigkeiten.
  
  Non puoi accettare un *eccesso* di responsabilità senza un adeguato supporto.
  Du kannst *übermäßige* Verantwortung nicht ohne entsprechende Unterstützung annehmen.
  
  L'*eccesso* di cibo durante le feste ha portato a problemi digestivi.
  Der *übermäßige* Konsum von Essen während der Feiertage führte zu Verdauungsproblemen.
  
  Gli esperti hanno sottolineato che un *eccesso* di zucchero danneggia la salute.
  Die Experten betonten, dass ein *übermäßiger* Zuckerkonsum der Gesundheit schadet.
  
  In caso di *eccesso* di calore, è consigliabile bere molta acqua.
  Bei *übermäßiger* Hitze wird empfohlen, viel Wasser zu trinken.
