  Non ho fame, *cioè* ho già mangiato molto.
  Ich habe keinen Hunger, *das heißt* ich habe schon viel gegessen.
  
  Studi italiano, *cioè* hai una buona pronuncia.
  Du lernst Italienisch, *das heißt* du hast eine gute Aussprache.
  
  Dobbiamo partire presto, *cioè* entro un’ora.
  Wir müssen früh losfahren, *nämlich* innerhalb einer Stunde.
  
  Lui è un’attore famoso, *cioè* tutti lo conoscono.
  Er ist ein berühmter Schauspieler, *das heißt* alle kennen ihn.
