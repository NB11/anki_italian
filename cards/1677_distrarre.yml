Rang: 1677
Wort: distrarre
Wortart: vt
Wort mit Artikel: distrarre
Femininum / Plural: ''
IPA: ''
Definition: ablenken, zerstreuen
Register: ''
Beispielsätze: |-
  Il rumore dei *distrarrà* mentre cerco di studiare?
  Wird das Geräusch dich *ablenken*, während ich versuche zu lernen?
  
  Quando ho sentito l’urlo, sono subito tornato indietro per *distrarmi*.
  Als ich den Schrei hörte, bin ich sofort zurückgekehrt, um mich zu *zerstreuen*.
  
  Non volevo *distrarre* l’insegnante durante la lezione di storia moderna.
  Ich wollte den Lehrer nicht während der Geschichtsstunde *ablenken*.
  
  Purtroppo le notizie *distraggono* sempre la sua attenzione di lavoro.
  Leider *zerstreuen* die Nachrichten immer seine Arbeitsaufmerksamkeit.
  
  Se non ti *distrai* con i videogiochi, riuscirai a finire il compito in tempo.
  Wenn du dich nicht mit Videospielen *ablenkst*, wirst du die Aufgabe rechtzeitig beenden können.
