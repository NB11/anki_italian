Rang: 951
Wort: gatto
Wortart: n.m
Wort mit Artikel: il gatto
Femininum / Plural: gatti
IPA: ''
Definition: die Katze, -n
Register: ''
Beispielsätze: |-
  Il *gatto* nero che ho visto al hotel sembra molto curioso.
  Die *Katze* schwarz, die ich im Hotel gesehen habe, wirkt sehr neugierig.
  
  Se il *gatto* non fosse chiuso in cucina, potremmo cucinare in pace.
  Wenn die *Katze* nicht in der Küche geschlossen wäre, könnten wir in Ruhe kochen.
  
  Ha trovato un *gatto* randagio che si comportava in modo orribile verso gli altri animali.
  Er hat eine streunende *Katze* gefunden, die sich den anderen Tieren gegenüber schrecklich benahm.
  
  Dicono che ogni *gatto* abbia sette vite, ma non tutti ci credono.
  Man sagt, dass jede *Katze* sieben Leben hat, doch nicht alle glauben daran.
  
  Appena entreremo in questa stanza, osserveremo se il *gatto* reagisce a ciò che accade intorno.
  Sobald wir diesen Raum betreten, werden wir beobachten, ob die *Katze* auf das reagiert, was um sie herum passiert.
