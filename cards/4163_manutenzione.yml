Rang: 4163
Wort: manutenzione
Wortart: n.f
Wort mit Artikel: la manutenzione
Femininum / Plural: manutenzioni
IPA: ''
Definition: die Wartung, -en
Register: ''
Beispielsätze: |-
  La *manutenzione* dei macchinari richiede almeno due operai.
  Die *Wartung* der Maschinen erfordert mindestens zwei Arbeiter.
  
  Dopo un anno senza *manutenzione*, l’ascensore ha smesso di funzionare.
  Nach einem Jahr ohne *Wartung* hat der Aufzug seinen Dienst eingestellt.
  
  Se vuoi che la tua auto duri, non sottovalutare la *manutenzione* periodica.
  Wenn dein Auto lange halten soll, unterschätze nicht die regelmäßige *Wartung*.
  
  Nella *manutenzione* dei computer, è fondamentale aggiornare spesso i software.
  Bei der *Wartung* von Computern ist es entscheidend, die Software häufig zu aktualisieren.
  
  Ho letto che la *manutenzione* delle piste ciclabili costa meno di quella delle strade normali.
  Ich habe gelesen, dass die *Wartung* von Radwegen weniger kostet als die von normalen Straßen.
