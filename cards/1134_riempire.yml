Rang: 1134
Wort: riempire
Wortart: vt
Wort mit Artikel: riempire
Femininum / Plural: ''
IPA: ''
Definition: füllen, erfüllen
Register: ''
Beispielsätze: |-
  Devo *riempire* questo modulo prima di inviarlo.
  Ich muss dieses Formular *ausfüllen*, bevor ich es absende.
  
  L’azienda ha *riempito* le casse di prodotti per la vendita natalizia.
  Die Firma hat die Regale mit Waren für den Weihnachtsverkauf *gefüllt*.
  
  Se avessi tempo, *riempirei* il modulo con più dettagli.
  Wenn ich Zeit hätte, würde ich das Formular mit mehr Details *ausfüllen*.
  
  Il magistrato chiede di *riempire* il modulo per la denuncia perdita auto.
  Der Richter verlangt, dass man das Formular für die Anzeige über den *Verlust* des Autos ausfüllt.
  
  Non appena abbiamo finito, *riempiamo* i bicchieri per brindare bacio affettuoso.
  Sobald wir fertig sind, *füllen* wir die Gläser, um auf einen herzlichen Kuss anzustoßen.
