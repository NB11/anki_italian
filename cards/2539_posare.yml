Rang: 2539
Wort: posare
Wortart: vt
Wort mit Artikel: posare
Femininum / Plural: ''
IPA: ''
Definition: legen, setzen, stellen
Register: ''
Beispielsätze: |-
  Dopo aver pulito il tavolo, vuoi che *posi* i libri qui?
  Nach dem Tisch putzen, soll ich die Bücher *dort hinlegen*?
  
  Non *poserò* più in dubbio le sue parole, dopo quello che è successo.
  Ich werde seine Worte *nicht mehr in Frage stellen*, nachdem das passiert ist.
  
  Mentre *posava* la chitarra sul letto, notò che una corda si era allentata.
  Während er die Gitarre *auf das Bett legte*, bemerkte er, dass eine Saite locker war.
  
  Se avessi le mani libere, *poserei* subito il telefono per aiutarti.
  Wenn ich die Hände frei hätte, würde ich sofort das Handy *weglegen*, um dir zu helfen.
  
  Chiunque *posi* le chiavi sulla mensola prima di uscire deve ricordarsi di prenderle al ritorno.
  Wer den *Schlüssel auf das Regalbrett legt*, bevor er geht, muss sich daran erinnern, ihn beim Zurückkommen mitzunehmen.
