Rang: 1407
Wort: assegno
Wortart: n.m
Wort mit Artikel: l'assegno
Femininum / Plural: assegni
IPA: ''
Definition: der Scheck, -s
Register: ''
Beispielsätze: |-
  Ho ricevuto *l'assegno* di stipendio questo mattino e l'ho subito depositato in banca.
  Ich habe *den Gehaltsscheck* heute Morgen erhalten und sofort auf mein Konto eingezahlt.
  
  Il proprietario del ristorante ha offerto un *assegno* come garanzia per il prestito.
  Der Besitzer des Restaurants hat einen *Scheck* als Sicherheit für das Darlehen angeboten.
  
  Se non avessi *l'assegno* da firmare, potremmo evitare questa pratica burocratica noiosa.
  Wenn ich den zu unterschreibenden *Scheck* nicht hätte, könnten wir diese lästige Bürokratie vermeiden.
  
  Mio padre mi ha scritto un *assegno* per il compleanno, ma l'ho perso nei pantaloni a ginocchio.
  Mein Vater hat mir einen *Scheck* zum Geburtstag geschrieben, aber ich habe ihn in der Hose am Knie verloren.
  
  La polizia ha trovato un *assegno* falso nella cella del detenuto che era fuggito dalla fuga poco prima.
  Die Polizei fand einen gefälschten *Scheck* in der Zelle des Gefangenen, der kurz vorher aus der Flucht entkommen war.
