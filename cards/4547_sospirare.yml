Rang: 4547
Wort: sospirare
Wortart: vi
Wort mit Artikel: sospirare
Femininum / Plural: ''
IPA: ''
Definition: seufzen
Register: ''
Beispielsätze: |-
  Ogni volta che *sospira*, sembra che stia ricordando qualcosa di doloroso.
  Jedes Mal, wenn er *seufzt*, scheint es, als würde er sich an etwas Schmerzhaftes erinnern.
  
  Se avessimo *sospirato* meno, forse avremmo agito prima.
  Wenn wir weniger *geseufzt* hätten, hätten wir vielleicht früher gehandelt.
  
  Dante scriveva che chi *sospira* troppo spesso perde la forza di combattere.
  Dante schrieb, dass wer zu oft *seufzt*, die Kraft verliert, zu kämpfen.
  
  Non vorrei *sospirare* come un personaggio di un romanzo del Settecento.
  Ich möchte nicht wie eine Figur aus einem Roman des 18. Jahrhunderts *seufzen*.
  
  Anche se *sospira* in continuazione, continua a lavorare con grande determinazione.
  Auch wenn er ständig *seufzt*, arbeitet er mit großer Entschlossenheit weiter.
