Rang: 232
Wort: comunque
Wortart: adv
Wort mit Artikel: comunque
Femininum / Plural: ''
IPA: ''
Definition: jedenfalls, trotzdem
Register: ''
Beispielsätze: |-
  Non è perfetto, *comunque* è molto buono.
  Es ist nicht perfekt, *aber* es ist sehr gut.
  
  *Comunque* vada la giornata, cercherò di essere felice.
  *Wie auch immer* der Tag verläuft, ich werde versuchen, glücklich zu sein.
  
  Non mi piace il tempo, *comunque* uscirò a fare una passeggiata.
  Das Wetter gefällt mir nicht, *trotzdem* gehe ich spazieren.
  
  Abbiamo perso il treno? *Comunque* possiamo prendere il prossimo.
  Haben wir den Zug verpasst? *Jedenfalls* können wir den nächsten nehmen.
  
  *Comunque* tu decida, ti appoggerò.
  *Wie auch immer* du dich entscheidest, ich werde dich unterstützen.
