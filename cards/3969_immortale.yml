Rang: 3969
Wort: immortale
Wortart: adj
Wort mit Artikel: immortale
Femininum / Plural: ''
IPA: ''
Definition: "*unsterblich*, ewig"
Register: ''
Beispielsätze: |-
  Molti miti parlano di eroi *immortali* che non invecchiano mai.
  Viele Mythen erzählen von *unsterblichen* Helden, die niemals altern.
  
  Anche dopo secoli, la sua fama rimane *immortale* nella storia dell'arte.
  Selbst nach Jahrhunderten bleibt sein Ruhm *unsterblich* in der Kunstgeschichte.
  
  Credeva di essere *immortale*, ma la malattia ha dimostrato il contrario.
  Er glaubte, *unsterblich* zu sein, doch die Krankheit bewies das Gegenteil.
  
  L'amore tra loro sembrava *immortale*, resistendo a ogni ostacolo.
  Ihre Liebe schien *unsterblich*, widerstand sie doch jedem Hindernis.
  
  La leggenda narra che gli dei abbiano reso *immortale* il guerriero per il suo coraggio.
  Die Legende erzählt, dass die Götter den Krieger für seinen Mut *unsterblich* gemacht haben.
