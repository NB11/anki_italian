Rang: 4706
Wort: vigile
Wortart: n.m
Wort mit Artikel: il vigile
Femininum / Plural: vigili
IPA: ''
Definition: der Polizist, -en
Register: ''
Beispielsätze: |-
  Il *vigile* sta regolando il traffico alla rotonda.
  Der *Polizist* regelt gerade den Verkehr am Kreisverkehr.
  
  Non ho visto se il *vigile* multava la macchina.
  Ich habe nicht gesehen, ob der *Polizist* das Auto geblitzt hat.
  
  Se non avessi superato il *vigile*, avrei fatto tardi all’appuntamento.
  Wenn der *Polizist* mich nicht durchgewinkt hätte, wäre ich zu spät zum Termin gekommen.
  
  Hanno chiamato il *vigile* perché c’era un incidente in mezzo alla strada.
  Sie haben den *Polizisten* gerufen, weil es einen Unfall in der Mitte der Straße gab.
  
  Spero che il *vigile* non mi fermi per il mio documento scaduto.
  Ich hoffe, dass der *Polizist* mich nicht wegen meines abgelaufenen Ausweises anhält.
