Rang: 933
Wort: indirizzo
Wortart: n.m
Wort mit Artikel: l'indirizzo
Femininum / Plural: gli indirizzi
IPA: ''
Definition: die Adresse, -n
Register: ''
Beispielsätze: |-
  Puoi trovare l'*indirizzo* dell'albergo sul sito ufficiale.
  Sie können die *Adresse* des Hotels auf der offiziellen Website finden.
  
  Ho scritto l'*indirizzo* su un pezzo di carta, ma ora non lo trovo più.
  Ich habe die *Adresse* auf einen Zettel geschrieben, finde sie aber jetzt nicht mehr.
  
  L'*indirizzo* che mi hai dato è sbagliato: non esiste questo palazzo.
  Die *Adresse*, die du mir gegeben hast, ist falsch: Dieses Gebäude gibt es gar nicht.
  
  Hanno cambiato l'*indirizzo* della nostra scuola l'anno scorso.
  Sie haben die *Adresse* unserer Schule letztes Jahr geändert.
  
  Se non conosci l'*indirizzo* esatto, possiamo cercarlo insieme su internet.
  Wenn Sie die genaue *Adresse* nicht kennen, können wir sie gemeinsam im Internet suchen.
