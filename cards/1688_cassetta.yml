Rang: 1688
Wort: cassetta
Wortart: n.f
Wort mit Artikel: la cassetta
Femininum / Plural: cassette
IPA: ''
Definition: die Kiste, -n, der Karton, -s, die Schachtel, -n
Register: ''
Beispielsätze: |-
  Ho trovato una *cassetta* di biscotti nella dispensa.
  Ich habe eine *Kiste* mit Keksen im Vorratsschrank gefunden.
  
  Il sindaco ha annunciato che costruiranno un nuovo *parcheggio* per le macchine.
  Der Bürgermeister hat angekündigt, dass sie einen neuen *Parkplatz* für die Autos bauen werden.
  
  Non ricordavo dove avessi messo quella *cassetta* degli attrezzi, ma alla fine l’ho ritrovata sotto il letto.
  Mir fiel nicht ein, wo ich die *Werkzeugkiste* hingelegt hatte, aber schließlich fand ich sie unter dem Bett wieder.
  
  Se vuoi spedire quei libri, ti servono delle *cassette* robuste per proteggerli.
  Wenn du diese Bücher verschicken willst, brauchst du *stabile Kartons*, um sie zu schützen.
  
  Mentre scavavo in giardino, ho scoperto una vecchie *cassetta* di metallo piena di fotografie familiari.
  Während ich im Garten grub, stieß ich auf eine alte *Metallkiste*, die voll mit Familienfotos war.
