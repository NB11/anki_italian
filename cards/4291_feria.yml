Wort: feria
Wortart: n.f
Wort mit Artikel: la feria
Femininum / Plural: ferie
IPA: ''
Definition: die Ferien pl
Register: ''
Beispielsätze: |-
  Quest'anno le *ferie* estive dureranno tre settimane invece di due.
  Diese Sommer*ferien* werden drei Wochen statt zwei dauern.
  
  Dopo anni di lavoro senza pause, finalmente ha ottenuto due settimane di *ferie* pagate.
  Nach Jahren ohne Pause hat er endlich zwei Wochen bezahlte *Ferien* bekommen.
  
  Se prenoti le *ferie* ora, potrai approfittare di uno sconto del 10%.
  Wenn du die *Ferien* jetzt buchst, kannst du von 10 % Rabatt profitieren.
  
  Le *ferie* natalizie sono sempre un periodo di grande traffico in autostrada.
  Die Weihnachts*ferien* sind immer eine Zeit mit starkem Verkehr auf der Autobahn.
  
  Durante le *ferie* ho finalmente trovato il tempo di leggere tutti i libri che volevo.
  Während der *Ferien* habe ich endlich Zeit gefunden, alle Bücher zu lesen, die ich wollte.
