Rang: 1191
Wort: assurdo
Wortart: adj
Wort mit Artikel: assurdo
Femininum / Plural: ''
IPA: ''
Definition: absurd, unsinnig
Register: ''
Beispielsätze: |-
  Secondo me è *assurdo* che il governo non conceda più fondi per la scuola pubblica.
  Meiner Meinung nach ist es *absurd*, dass die Regierung keine Förderung mehr für die öffentliche Schule gewährt.
  
  Per fortuna il nonno ha *osservato* che il nipote vuole rinunciare a tutto per seguire i suoi sogni.
  Zum Glück hat der Opa *beobachtet*, dass der Neffe auf alles verzichten will, um seinen Träumen zu folgen.
  
  Chi aggiungerebbe una regola così *assurda* in una società civile?
  Wer würde eine solche *unsinnige* Regel in einer zivilisierten Gesellschaft hinzufügen?
  
  Stavolta crediamo che sia *assurdo* giudicare le persone dal loro punteggio nei video-game.
  Dieses Mal finden wir es *absurd*, Menschen nach ihrer Punktzahl in Videospielen zu bewerten.
  
  È *assurda* la decisione di spendere così tanti soldi per un ospite che non rispetta nemmeno l’orario di arrivo.
  Es ist *absurd*, so viel Geld für einen Gast auszugeben, der nicht mal die Ankunftszeit respektiert.
