Rang: 1410
Wort: ruolo
Wortart: n.m
Wort mit Artikel: il ruolo
Femininum / Plural: ruoli
IPA: ''
Definition: die Rolle, -n
Register: ''
Beispielsätze: |-
  Nel suo nuovo film ha ottenuto il *ruolo* protagonista.
  In seinem neuen Film hat er die *Hauptrolle* erhalten.
  
  Nonostante lo sfuggisse da anni, il *ruolo* di direttore generale gli fu offerto direttamente dall’azienda.
  Obwohl er es jahrelang vermieden hatte, wurde ihm die *Position* des Generaldirektors direkt vom Unternehmen angeboten.
  
  Il sindaco ha dichiarato che cambierà il *ruolo* della polizia municipale nella lotta al crimine organizzato.
  Der Bürgermeister erklärte, dass er die *Aufgabe* der Stadtpolizei im Kampf gegen die organisierte Kriminalität ändern werde.
  
  Se avessi saputo che il *ruolo* di insegnante richiede tanta pazienza, forse non avrei scelto questa pratica.
  Wenn ich gewusst hätte, dass die *Rolle* des Lehrers so viel Geduld erfordert, hätte ich vielleicht diese Übung nicht gewählt.
  
  La banda fu arrestata perché aveva infiltrato un agente sotto copertura nel *ruolo* di proprietario di un bar.
  Die Bande wurde festgenommen, weil sie einen verdeckten Ermittler als *Besitzer* einer Bar eingeschleust hatte.
