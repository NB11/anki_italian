Rang: 4667
Wort: irritante
Wortart: adj
Wort mit Artikel: irritante
Femininum / Plural: ''
IPA: ''
Definition: nervig, lästig, störend
Register: ''
Beispielsätze: |-
  Questo rumore è davvero *irritante* quando cerco di concentrarmi.
  Dieses Geräusch ist wirklich *nervig*, wenn ich mich konzentrieren will.
  
  Non sopporto le sue battute *irritanti* durante le riunioni.
  Ich ertrage seine *lästigen* Witze während der Besprechungen nicht.
  
  Spero che il vicino non tenga più quella musica *irritante* tutta la notte.
  Ich hoffe, der Nachbar spielt nicht mehr diese *störende* Musik die ganze Nacht.
  
  Ieri ho litigato con un collega perché trovava *irritante* il mio modo di lavorare.
  Gestern habe ich mich mit einem Kollegen gestritten, weil er meine Arbeitsweise *lästig* fand.
  
  Anche se sei *irritante* a volte, sei comunque un caro amico.
  Auch wenn du manchmal *nervig* bist, bist du trotzdem ein guter Freund.
