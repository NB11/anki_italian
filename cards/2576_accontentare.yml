Rang: 2576
Wort: accontentare
Wortart: vt
Wort mit Artikel: accontentare
Femininum / Plural: ''
IPA: ''
Definition: zufriedenstellen, befriedigen
Register: ''
Beispielsätze: |-
  Mi *accontenterebbe* molto ricevere una risposta positiva dal direttore.
  Mich würde es sehr *zufriedenstellen*, eine positive Antwort vom Direktor zu erhalten.
  
  Non importa se non ti *accontento*, l’importante è che tu sia felice.
  Es macht nichts, wenn ich dich nicht *zufriedenstelle*, wichtig ist nur, dass du glücklich bist.
  
  Il negoziante ha accettato di *accontentare* la richiesta del cliente, malgrado fosse molto esigente.
  Der Händler hat sich bereit erklärt, die *Bitte* des Kunden zu befriedigen, obwohl dieser sehr anspruchsvoll war.
  
  Se non ti *accontenti* del tuo stipendio, perché non cerchi un altro lavoro?
  Wenn du mit deinem *Gehalt* nicht zufrieden bist, warum suchst du dann keine andere Arbeit?
  
  Il regista riesce sempre a *accontentare* sia gli attori che il pubblico con i suoi film.
  Der Regisseur schafft es immer, sowohl die Schauspieler als auch das Publikum mit seinen Filmen zu *befriedigen*.
