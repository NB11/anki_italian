Rang: 763
Wort: stà
Wortart: vi
Wort mit Artikel: stà
Femininum / Plural: ''
IPA: ''
Definition: stehen, sich befinden
Register: ''
Beispielsätze: |-
  Maria *sta* leggendo un libro interessante nella sala.
  Maria *steht* in einem interessanten Buch in dem Saal.
  
  Se non *stai* attento, finirai per sbagliare il codice.
  Wenn du nicht *aufmerksam bist*, wirst du den Code falsch eingeben.
  
  Non *stavo* male ieri, ma oggi mi sento stanco.
  Es ging mir gestern nicht schlecht, aber heute fühle ich mich *müde*.
  
  Credo che lui *stia* cercando di organizzare le cose in pace.
  Ich glaube, er versucht, die Dinge in *Ruhe* zu organisieren.
  
  Quando il *tenente* stette in piedi, tutti gli eserciti si fermarono.
  Als der *Leutnant* stand, blieben alle Heere stehen.
