Rang: 1094
Wort: suggerire
Wortart: vt
Wort mit Artikel: suggerire
Femininum / Plural: ''
IPA: ''
Definition: vorschlagen, empfehlen
Register: ''
Beispielsätze: |-
  Il *suggerisce* sempre ai colleghi di prendere una pausa quando sono troppo stressati.
  Er *schlägt* seinen Kollegen immer vor, eine Pause zu machen, wenn sie zu gestresst sind.
  
  Ho *suggerito* alla mia sorella di leggere un libro molto interessante durante le vacanze.
  Ich habe meiner Schwester *empfohlen*, während des Urlaubs ein sehr interessantes Buch zu lesen.
  
  Se non sai come procedere, *suggerirei* di chiedere consiglio al direttore del dipartimento.
  Wenn du nicht weiterweißt, würde ich *vorschlagen*, den Abteilungsleiter um Rat zu fragen.
  
  È utile che tu *suggerisca* una soluzione concreta invece di limitarti a criticare.
  Es ist hilfreich, wenn du eine konkrete Lösung *vorschlägst*, anstatt nur zu kritisieren.
  
  Malgrado tutti i problemi, nessuno osava *suggerire* di cancellare il progetto principale.
  Trotz aller Probleme wagte es niemand, vorzuschlagen, das Hauptprojekt *zu löschen*.
