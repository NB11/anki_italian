Rang: 2433
Wort: carattere
Wortart: n.m
Wort mit Artikel: il carattere
Femininum / Plural: caratteri
IPA: ''
Definition: der Charakter, -e, -s
Register: ''
Beispielsätze: |-
  Il *carattere* di Marco è molto forte, ma a volte è troppo impulsivo.
  Der *Charakter* von Marco ist sehr stark, aber manchmal ist er zu impulsiv.
  
  Nonostante l’*carattere* difficile, riesco a lavorare bene con lei.
  Trotz des schwierigen *Charakters* schaffe ich es, gut mit ihr zu arbeiten.
  
  Hanno elogiato il *carattere* generoso di mia nonna, che aiutava sempre chi aveva bisogno.
  Sie lobten den großzügigen *Charakter* meiner Großmutter, die immer denen half, die es brauchten.
  
  Credo che il *carattere* di un leader si mostri nei momenti difficili.
  Ich glaube, der *Charakter* eines Anführers zeigt sich in schwierigen Momenten.
  
  Se avesse un *carattere* più paziente, risolverebbe meglio i conflitti al lavoro.
  Wenn er einen geduldigeren *Charakter* hätte, würde er Konflikte bei der Arbeit besser lösen.
