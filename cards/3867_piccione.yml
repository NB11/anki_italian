Rang: 3867
Wort: piccione
Wortart: n.m
Wort mit Artikel: il piccione
Femininum / Plural: piccioni
IPA: ''
Definition: die Taube, -n
Register: ''
Beispielsätze: |-
  Nel parco ho visto *piccione* grigio che mangiava le briciole.
  Im Park habe ich die *Taube* gesehen, die Krümel fraß.
  
  Il *piccione* si è posato sul davanzale della finestra.
  Die *Taube* hat sich auf die Fensterbank gesetzt.
  
  Se non ci fossero i gatti, *piccioni* invaderebbero la città.
  Wenn es keine Katzen gäbe, würden die *Tauben* die Stadt überfluten.
  
  Mi hanno raccontato che un tempo *piccioni* venivano usati per portare messaggi.
  Man hat mir erzählt, dass *Tauben* früher benutzt wurden, um Nachrichten zu überbringen.
  
  Non sapevo che tuo *piccione* fosse così addomesticato!
  Ich wusste nicht, dass deine *Taube* so zahm ist!
