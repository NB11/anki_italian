Rang: 3058
Wort: gita
Wortart: n.f
Wort mit Artikel: la gita
Femininum / Plural: gite
IPA: ''
Definition: der Ausflug, -¨e
Register: ''
Beispielsätze: |-
  Quest’estate abbiamo fatto una *gita* in montagna con i bambini.
  Diesen Sommer haben wir einen *Ausflug* ins Gebirge mit den Kindern gemacht.
  
  Non vedo l’ora di prenotare la *gita* scolastica del prossimo mese!
  Ich freue mich schon darauf, den schulischen *Ausflug* nächsten Monat zu buchen.
  
  Ha proposto una *gita* in barca, ma poi ha cambiato idea perché pioveva.
  Er hat einen *Ausflug* mit dem Boot vorgeschlagen, aber dann änderte er seine Meinung, weil es regnete.
  
  Se avessimo più tempo, faremmo una *gita* a Venezia per vedere il Carnevale.
  Wenn wir mehr Zeit hätten, würden wir einen *Ausflug* nach Venedig machen, um den Karneval zu sehen.
  
  La *gita* che ho prenotato include la visita a un antico monastero e un pranzo tipico.
  Der *Ausflug*, den ich gebucht habe, beinhaltet den Besuch eines alten Klosters und ein typisches Mittagessen.
