Rang: 1507
Wort: diro
Wortart: adj
Wort mit Artikel: diro
Femininum / Plural: ''
IPA: ''
Definition: direkt, unumwunden
Register: ''
Beispielsätze: |-
  È necessario essere *diro* con lui se vogliamo risolvere la situazione velocemente.
  Es ist nötig, *direkt* mit ihm zu sein, wenn wir die Situation schnell lösen wollen.
  
  Mi ha dato una risposta *dira* che non lasciava spazio a dubbi.
  Er hat mir eine *direkte* Antwort gegeben, die keinen Raum für Zweifel ließ.
  
  La polizia ha richiesto un resoconto *diro* dell’accaduto.
  Die Polizei verlangte einen *direkten* Bericht über den Vorfall.
  
  Non sempre le cose vanno come vorremmo, ma dobbiamo rimanere *diri* di fronte alle difficoltà.
  Nicht immer laufen die Dinge so, wie wir es möchten, aber wir müssen *direkt* vor den Schwierigkeiten stehen.
