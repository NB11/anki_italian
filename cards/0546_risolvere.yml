Rang: 546
Wort: risolvere
Wortart: v
Wort mit Artikel: risolvere
Femininum / Plural: ''
IPA: ''
Definition: lösen, klären, beheben
Register: ''
Beispielsätze: |-
  Credo che dovrai *risolvere* questo problema al più presto.
  Ich glaube, du wirst *lösen* dieses Problem so schnell wie möglich.
  
  Non sapevo che avessi già *risolto* la faccenda con lui!
  Ich wusste nicht, dass du die Sache mit ihm schon *geklärt* hattest!
  
  Se avessi più tempo, forse *risolverei* tutto senza fretta.
  Wenn ich mehr Zeit hätte, würde ich vielleicht alles ohne *Eile* lösen.
  
  È fondamentale *risolvere* la situazione prima che peggiori ancora.
  Es ist entscheidend, die Situation zu *beheben*, bevor sie noch schlimmer wird.
  
  Mi hanno detto che *risolveranno* qualsiasi errore tu abbia fatto.
  Man hat mir gesagt, dass sie jeden *Fehler*, den du gemacht hast, beheben werden.
Audio: ''
Notiz: ''
Dispersion: ''
