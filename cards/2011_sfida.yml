Rang: 2011
Wort: sfida
Wortart: n.f
Wort mit Artikel: la sfida
Femininum / Plural: sfide
IPA: ''
Definition: die Herausforderung, -en
Register: ''
Beispielsätze: |-
  Questa *sfida* richiede molta preparazione e pazienza.
  Diese *Herausforderung* erfordert viel Vorbereitung und Geduld.
  
  Non so se accettare la *sfida* che mi hai proposto.
  Ich weiß nicht, ob ich die *Herausforderung* annehmen soll, die du mir vorgeschlagen hast.
  
  Se perderai questa *sfida*, non potrai più competere con noi.
  Wenn du diese *Herausforderung* verlierst, kannst du nicht mehr mit uns konkurrieren.
  
  La mia amica ha vinto la *sfida* più difficile della sua vita.
  Meine Freundin hat die schwierigste *Herausforderung* ihres Lebens gewonnen.
  
  Lui ha accettato la *sfida* senza nemmeno pensarci.
  Er hat die *Herausforderung* angenommen, ohne auch nur einen Moment nachzudenken.
