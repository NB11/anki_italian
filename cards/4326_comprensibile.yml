Rang: 4326
Wort: comprensibile
Wortart: adj
Wort mit Artikel: comprensibile
Femininum / Plural: ''
IPA: ''
Definition: verständlich
Register: ''
Beispielsätze: |-
  La spiegazione del professore era *comprensibile* nonostante la complessità dell'argomento.
  Die Erklärung des Professors war *verständlich* trotz der Komplexität des Themas.
  
  Non trovo affatto *comprensibile* perché tu abbia reagito in quel modo.
  Ich finisco *verständlich*, warum du so reagiert hast.
  
  Spero che le tue parole risultino *comprensibili* anche dopo questa lunga discussione.
  Ich hoffe, dass deine Worte *verständlich* bleiben, auch nach dieser langen Diskussion.
  
  Per me è *comprensibile* che tu sia stanco dopo una giornata così faticosa.
  Es ist für mich *verständlich*, dass du nach so einem anstrengenden Tag müde bist.
  
  Anche se il testo era scritto in modo astruso, alla fine l'idea risultava *comprensibile* grazie al contesto.
  Obwohl der Text abgehoben geschrieben war, war die Idee am Ende durch den Kontext *verständlich*.
