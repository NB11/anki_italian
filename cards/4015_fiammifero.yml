Rang: 4015
Wort: fiammifero
Wortart: n.m
Wort mit Artikel: il fiammifero
Femininum / Plural: fiammiferi
IPA: ''
Definition: das Streichholz, -hölzer
Register: ''
Beispielsätze: |-
  Ho bisogno di un *fiammifero* per accendere la candela.
  Ich brauche ein *Streichholz*, um die Kerze anzuzünden.
  
  Non trovi *fiammiferi* nella sua borsetta?
  Findest du *Streichhölzer* in ihrer Handtasche?
  
  Se non avessi perso il *fiammifero*, ora non saremmo al buio.
  Wenn ich das *Streichholz* nicht verloren hätte, wären wir jetzt nicht im Dunkeln.
  
  È vietato accendere *fiammiferi* in alcuni musei per motivi di sicurezza.
  In einigen Museen ist es verboten, *Streichhölzer* aus Sicherheitsgründen anzuzünden.
  
  Ricordo che da bambino rubavo sempre un *fiammifero* dal pacchetto dei miei genitori per giocare.
  Ich erinnere mich, dass ich als Kind immer eine *Streichholz* aus der Packung meiner Eltern geklaut habe, um damit zu spielen.
