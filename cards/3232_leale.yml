Rang: 3232
Wort: leale
Wortart: adj
Wort mit Artikel: leale
Femininum / Plural: ''
IPA: ''
Definition: treu, loyal
Register: ''
Beispielsätze: |-
  Anche se molti amici l'hanno abbandonato, lui è rimasto *leale* alla sua promessa.
  Auch wenn ihn viele Freunde verlassen haben, blieb er *treu* seinem Versprechen.
  
  Non mi fido di chi non è *leale* con gli amici più cari.
  Ich vertraue niemandem, der *loyal* zu seinen engsten Freunden ist.
  
  Il cane è stato così *leale* da seguire il suo padrone anche in condizioni pericolose.
  Der Hund war so *treu*, dass er seinem Besitzer sogar unter gefährlichen Bedingungen folgte.
  
  Spero che i nostri alleati rimangano *leali* in questa difficile situazione.
  Ich hoffe, dass unsere Verbündeten in dieser schwierigen Lage *loyal* bleiben.
  
  Un vero amico non giudica, ma rimane *leale* anche quando sbagli.
  Ein wahrer Freund verurteilt nicht, sondern bleibt *treu*, selbst wenn man Fehler macht.
