Beispielsätze: |-
  Il cielo oggi è di un *azzurro* così intenso che sembra dipinto.
  Der Himmel ist heute in einem so intensiven *himmelblau*, dass er gemalt zu sein scheint.
  
  Non hai mai visto un mare così *azzurro* come in Grecia.
  Du hast noch nie ein so *himmelblaues* Meer gesehen wie in Griechenland.
  
  Vorresti una maglietta di che colore? – Un *azzurro* chiaro, per favore.
  Welche Farbe möchtest du für das T-Shirt? – Ein helles *himmelblau*, bitte.
  
  Era così stanco che i suoi occhi erano diventati *azzurri* per la stanchezza.
  Er war so erschöpft, dass seine Augen vor Müdigkeit *himmelblau* wurden.
  
  Anche se il vestito era *azzurro*, lei lo trovava troppo scuro per l’estate.
  Obwohl das Kleid *himmelblau* war, fand sie es für den Sommer zu dunkel.
