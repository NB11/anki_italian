Rang: 1234
Wort: proprietà
Wortart: n.f
Wort mit Artikel: la proprietà
Femininum / Plural: proprietà
IPA: ''
Definition: das Eigentum, -e, der Besitz
Register: ''
Beispielsätze: |-
  La *proprietà* di quel terreno appartiene alla famiglia Rossi da generazioni.
  Das *Eigentum* dieses Grundstücks gehört der Familie Rossi seit Generationen.
  
  Dopo il divorzio, ha perso ogni *proprietà* su quella casa, ma continua a pagare l’affitto.
  Nach der Scheidung verlor er jedes *Eigentum* an diesem Haus, zahlt aber weiterhin die Miete.
  
  Quella società ha venduto tutte le sue *proprietà* immobiliari per ridurre i debiti.
  Dieses Unternehmen hat alle seine Immobilien-*Besitzungen* verkauft, um Schulden abzubauen.
  
  Secondo il contratto, devi dimostrare di essere il legittimo proprietario della *proprietà*.
  Laut Vertrag musst du nachweisen, dass du der rechtmäßige Eigentümer des *Besitzes* bist.
  
  Nonostante le difficoltà economiche, ha mantenuto intatta la *proprietà* della sua azienda familiare.
  Trotz wirtschaftlicher Schwierigkeiten hat er den *Besitz* seines Familienbetriebs bewahrt.
