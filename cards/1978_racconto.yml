Rang: 1978
Wort: racconto
Wortart: n.m
Wort mit Artikel: il racconto
Femininum / Plural: racconti
IPA: ''
Definition: die Erzählung, -en
Register: ''
Beispielsätze: |-
  Mi piace leggere un *racconto* di Italo Calvino prima di dormire.
  Ich mag es, eine *Erzählung* von Italo Calvino vor dem Schlafengehen zu lesen.
  
  Nel suo ultimo libro ha scritto un *racconto* ambientato nella foresta.
  In seinem letzten Buch hat er eine *Erzählung* geschrieben, die im Wald spielt.
  
  Non mi convince il finale del *racconto* che hai trovato online.
  Das Ende der *Erzählung*, die du online gefunden hast, überzeugt mich nicht.
  
  Se avessi tempo, scriverei un *racconto* su questa situazione così buffa!
  Wenn ich Zeit hätte, würde ich eine *Erzählung* über diese so komische Situation schreiben!
  
  Ha pubblicato un *racconto* che corrisponde totalmente alla sua visione dell’epoca.
  Er hat eine *Erzählung* veröffentlicht, die völlig seiner Sicht auf die Epoche entspricht.
