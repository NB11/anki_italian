Beispielsätze: |-
  Il signore *crudele* ha ordinato ai suoi servi di picchiare gli animali.
  Der *grausame* Herr ließ seine Diener die Tiere schlagen.
  
  Mi sembra *crudele* che tu abbia giudicato il suo operato senza prove.
  Es erscheint mir *grausam*, dass du sein Handeln ohne Beweise verurteilt hast.
  
  Se fossi *crudele*, non esiterei a chiudere questa porta per sempre.
  Wäre ich *grausam*, würde ich zögern, diese Tür für immer zu schließen.
  
  È *crudele* come il destino abbia giocato con quelle persone innocenti.
  Es ist *grausam*, wie das Schicksal mit diesen unschuldigen Menschen gespielt hat.
  
  Nonostante la *crudeltà* del nemico, i soldati non si arresero mai.
  Trotz der *Grausamkeit* des Feindes gaben die Soldaten nie auf.
