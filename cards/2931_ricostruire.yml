Rang: 2931
Wort: ricostruire
Wortart: vt
Wort mit Artikel: ricostruire
Femininum / Plural: ''
IPA: ''
Definition: wiederaufbauen, erneuern
Register: ''
Beispielsätze: |-
  Gli ingegneri devono *ricostruire* il ponte distrutto dalla tempesta prima dell’inverno.
  Die Ingenieure müssen die von dem Sturm zerstörte Brücke vor dem Winter *wiederaufbauen*.
  
  Dopo la guerra hanno *ricostruito* la città dalle sue ceneri.
  Nach dem Krieg haben sie die Stadt aus ihrer Asche *erneut aufgebaut*.
  
  Se non avessero *ricostruito* il muro in tempo, i ladri sarebbero entrati.
  Wenn sie die Mauer nicht rechtzeitig *wiederhergestellt* hätten, wären die Diebe reingekommen.
  
  L’azienda sta per *ricostruire* la sua reputazione dopo lo scandalo.
  Das Unternehmen wird demnächst seinen Ruf nach dem Skandal *wiederherstellen* müssen.
  
  Anche se mi chiedono di *ricostruire* ogni dettaglio, non ci riesco.
  Selbst wenn sie mich bitten, jedes Detail *wiederzugeben*, schaffe ich es nicht.
