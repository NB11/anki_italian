Rang: 4685
Wort: bollire
Wortart: v
Wort mit Artikel: bollire
Femininum / Plural: ''
IPA: ''
Definition: kochen, sieden
Register: ''
Beispielsätze: |-
  L'acqua *bolliva* già da dieci minuti quando ho aggiunto la pasta.
  Das Wasser *kochte* bereits seit zehn Minuten, als ich die Nudeln hinzugefügte.
  
  Se *farai bollire* il latte troppo a lungo, si formerà una pelle sulla superficie.
  Wenn du die Milch zu lange *siedest*, bildet sich eine Haut auf der Oberfläche.
  
  Non sapevo che la pentola a pressione facesse *bollire* l'acqua in un minuto!
  Ich wusste nicht, dass der Schnellkochtopf das Wasser in einer Minute *zum Kochen bringt*!
  
  Il cuoco ha detto che sarebbe meglio se tu *avessi bollito* le patate prima di friggerle.
  Der Koch sagte, es wäre besser gewesen, wenn du die Kartoffeln *vor dem Braten gekocht* hättest.
  
  Anche se *bollisse* per ore, quel liquido non cambierebbe proprietà.
  Auch wenn es stundenlang *siedete*, würde sich diese Flüssigkeit nicht verändern.
