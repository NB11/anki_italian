Rang: 445
Wort: colpo
Wortart: n.m
Wort mit Artikel: il colpo
Femininum / Plural: colpi
IPA: ''
Definition: der Schlag, der Stoß, der Hieb
Register: ''
Beispielsätze: |-
  Ha ricevuto un *colpo* improvviso alla schiena.
  Er hat einen *Schlag* plötzlich auf den Rücken erhalten.
  
  Questo *colpo* di stato ha cambiato la storia del paese.
  Dieser *Staatsstreich* hat die Geschichte des Landes verändert.
  
  Non ho mai dato un *colpo* a nessuno in tutta la mia vita.
  Ich habe in meinem ganzen Leben noch nie einen *Hieb* gegeben.
  
  Mi ha fatto un *colpo* di telefono alle tre del mattino!
  Er hat mir um drei Uhr morgens einen *Anruf* gemacht!
  
  Quel pugile ha subìto molti *colpi* durante il match.
  Dieser Boxer hat viele *Schläge* während des Kampfes erlitten.
