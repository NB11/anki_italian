Rang: 1089
Wort: fiume
Wortart: n.m
Wort mit Artikel: il fiume
Femininum / Plural: fiumi
IPA: ''
Definition: der Fluss, Flüsse
Register: ''
Beispielsätze: |-
  Il *fiume* attraversa la città e sfocia nel mare.
  Der *Fluss* durchquert die Stadt und mündet ins Meer.
  
  Vi ricordate quando abbiamo fatto una gita lungo il *fiume* Tevere?
  Erinnert ihr euch, als wir eine Ausflugstour am *Fluss* Tiber gemacht haben?
  
  La polizia ha bloccato l’accesso al *fiume* perché l’acqua era inquinata.
  Die Polizei hat den Zugang zum *Fluss* gesperrt, weil das Wasser verschmutzt war.
  
  Se non ci fosse il *fiume*, questa vallata sarebbe un deserto.
  Wenn es den *Fluss* nicht gäbe, wäre dieses Tal eine Wüste.
  
  I pescatori hanno catturato molti pesci nel *fiume* vicino al mio paese.
  Die Fischer haben im *Fluss* nahe meinem Dorf viele Fische gefangen.
