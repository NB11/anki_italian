Rang: 2285
Wort: udienza
Wortart: n.f
Wort mit Artikel: l'udienza
Femininum / Plural: udienze
IPA: ''
Definition: die Anhörung, die Verhandlung
Register: ''
Beispielsätze: |-
  L'*udienza* è stata fissata per domani mattina alle nove.
  Die *Verhandlung* ist für morgen früh um neun Uhr angesetzt.
  
  Durante l'*udienza* il giudice ha ascoltato attentamente tutte le testimonianze.
  Während der *Anhörung* hat der Richter alle Zeugenaussagen aufmerksam angehört.
  
  Non vedo l’ora che finisca questa *udienza* noiosa e inutile.
  Ich kann es kaum erwarten, dass diese langweilige und unnötige *Anhörung* vorbei ist.
  
  Se non arrivi in tempo all'*udienza*, il giudice potrebbe annullare tutto.
  Wenn du nicht rechtzeitig zur *Verhandlung* kommst, könnte der Richter alles absagen.
  
  Ha organizzato l'*udienza* con un metodo così rigido che nessuno osava parlare.
  Er hat die *Verhandlung* mit einer so starren Methode organisiert, dass niemand zu sprechen wagte.
