Rang: 4789
Wort: vegetariano
Wortart: n.m
Wort mit Artikel: il vegetariano
Femininum / Plural: vegetariani
IPA: ''
Definition: der Vegetarier, - / die Vegetarierin, -nen
Register: ''
Beispielsätze: |-
  Mio fratello è *vegetariano* da cinque anni e si sente molto bene.
  Mein Bruder ist seit fünf Jahren *vegetarisch* und fühlt sich sehr gut.
  
  In questo ristorante non servono piatti con carne, ma solo opzioni *vegetariane*.
  In diesem Restaurant gibt es keine Fleischgerichte, sondern nur *vegetarische* Optionen.
  
  Ho incontrato una coppia di amici *vegetariani* che organizza cene a tema ogni mese.
  Ich habe ein *vegetarisches* Paar kennengelernt, das jeden Monat Themenabende organisiert.
  
  Se non mangi *vegetariano*, non puoi partecipare alla degustazione di questa settimana.
  Wenn du nicht *vegetarisch* isst, kannst du an der Verkostung dieser Woche nicht teilnehmen.
  
  È *vegetariano*, ma ogni tanto mangia il pesce perché gli manca il sapore della carne.
  Er ist *Vegetarier*, aber manchmal isst er Fisch, weil ihm der Geschmack von Fleisch fehlt.
