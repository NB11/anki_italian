Rang: 1987
Wort: approfittare
Wortart: v
Wort mit Artikel: approfittare
Femininum / Plural: ''
IPA: ''
Definition: ausnutzen, nützen
Register: ''
Beispielsätze: |-
  Se vuoi *approfittare* di questa offerta, devi decidere subito.
  Wenn du *nutze* dieses Angebot aus, musst du sofort entscheiden.
  
  Hanno *approfittato* del caos per scappare dalla prigione.
  Sie haben das Chaos *ausgenutzt*, um aus dem Gefängnis zu fliehen.
  
  Non dovremmo *approfittare* della gentilezza degli altri senza ricambiare.
  Wir sollten die Freundlichkeit anderer nicht *ausnutzen*, ohne uns zu revanchieren.
  
  Lui *approfitterebbe* di qualsiasi occasione per fare soldi.
  Er würde jede Gelegenheit *nutzen*, um Geld zu machen.
  
  Spero che tu non stia cercando di *approfittarti* della mia situazione difficile.
  Ich hoffe, dass du nicht versuchst, *aus meiner schwierigen Situation Nutzen zu ziehen*.
Audio: ''
Notiz: ''
Dispersion: ''
