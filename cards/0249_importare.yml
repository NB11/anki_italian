Rang: 249
Wort: importare
Wortart: vi
Wort mit Artikel: importare
Femininum / Plural: ''
IPA: ''
Definition: wichtig sein, bedeuten
Register: ''
Beispielsätze: |-
  Non *mi importa* di quello che dicono gli altri.
  Es ist mir *egal*, was die anderen sagen.
  
  *Importa* molto che tu arrivi in tempo per la riunione.
  Es ist sehr *wichtig*, dass du pünktlich zum Meeting kommst.
  
  Secondo te, *importa* davvero se piove o no?
  Meinst du, es *spielt wirklich eine Rolle*, ob es regnet oder nicht?
  
  Mi *importava* solo che fossi felice.
  Mir ging es nur darum, dass du glücklich warst.
  
  Non *importerebbe* nulla se vincessi la lotteria.
  Es würde mir *nichts ausmachen*, wenn ich die Lotterie gewänne.
