  Mi *importava* solo che fossi felice.
  Mir ging es nur darum, dass du glücklich warst.
  
  Non *importerebbe* nulla se vincessi la lotteria.
  Es würde mir *nichts ausmachen*, wenn ich die Lotterie gewänne.
