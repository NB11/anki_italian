Wort: bastare
Wortart: vi
Wort mit Artikel: bastare
Femininum / Plural: ''
IPA: ''
Definition: reichen, ausreichen
Register: ''
Beispielsätze: |-
  Basta *bastare* per oggi.
  Es *reicht* für heute.
  
  Mi *basta* un caffè per svegliarmi.
  Ein Kaffee *reicht* mir zum Aufwachen.
  
  Non *basterà* mai il tempo per tutto?
  Wird die Zeit wohl *ausreichen*, um alles zu erledigen?
  
  Se *basterà*, potremo partire domani.
  Wenn es *ausreicht*, können wir morgen losfahren.
  
  Mi chiedo se ti *basteranno* questi soldi.
  Ich frage mich, ob dir dieses Geld *reichen* wird.
