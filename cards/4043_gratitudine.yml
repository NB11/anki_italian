Rang: 4043
Wort: gratitudine
Wortart: n.f
Wort mit Artikel: la gratitudine
Femininum / Plural: gratitudini
IPA: ''
Definition: die Dankbarkeit, -en
Register: ''
Beispielsätze: |-
  Provo una *gratitudine* immensa per tutto ciò che hai fatto per me.
  Ich empfinde eine *unermessliche Dankbarkeit* für alles, was du für mich getan hast.
  
  La *gratitudine* è un sentimento che si dovrebbe coltivare ogni giorno.
  Die *Dankbarkeit* ist ein Gefühl, das man jeden Tag pflegen sollte.
  
  Nonostante lo sbaglio, ho letto nei suoi occhi una *gratitudine* sincera.
  Trotz des Fehlers habe ich in seinen Augen eine *ehrliche Dankbarkeit* gelesen.
  
  Se non fosse per la tua *gratitudine*, non saprei come ringraziarti abbastanza.
  Wenn es deine *Dankbarkeit* nicht gäbe, wüsste ich nicht, wie ich dir genug danken sollte.
  
  È raro trovare persone che esprimano la *gratitudine* senza aspettarsi nulla in cambio.
  Es ist selten, Menschen zu finden, die die *Dankbarkeit* ausdrücken, ohne etwas dafür zu erwarten.
