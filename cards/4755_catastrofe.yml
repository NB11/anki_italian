Rang: 4755
Wort: catastrofe
Wortart: n.f
Wort mit Artikel: la catastrofe
Femininum / Plural: catastrofi
IPA: ''
Definition: die Katastrophe, -n
Register: ''
Beispielsätze: |-
  La *catastrofe* naturale ha distrutto intere città in pochi minuti.
  Die *Katastrophe* hat ganze Städte in wenigen Minuten zerstört.
  
  Se non avessimo agito in tempo, sarebbe stata una *catastrofe* totale.
  Wenn wir nicht rechtzeitig gehandelt hätten, wäre es eine *Katastrophe* gewesen.
  
  Tutti si chiedono chi sia responsabile di questa *catastrofe* ambientale.
  Alle fragen sich, wer für diese *Katastrophe* verantwortlich ist.
  
  Nonostante le previsioni, la *catastrofe* è stata evitata all'ultimo secondo.
  Trotz der Prognosen wurde die *Katastrofe* in letzter Sekunde abgewendet.
  
  La *catastrofe* economica degli anni Trenta ha cambiato la storia mondiale.
  Die *Katastrophe* der dreißiger Jahre hat die Weltgeschichte verändert.
