Rang: 3520
Wort: farfalla
Wortart: n.f
Wort mit Artikel: la farfalla
Femininum / Plural: farfalle
IPA: ''
Definition: der Schmetterling, -e
Register: ''
Beispielsätze: |-
  Nel giardino ho visto svolazzare una *farfalla* blu.
  Im Garten habe ich einen *Schmetterling* in Blau gesehen.
  
  Mio figlio, un piccolo pargolo, si diverte a rincorrere le *farfalle* nel parco.
  Mein Sohn, ein kleines *Kind*, hat Spaß daran, im Park den Schmetterlingen hinterherzulaufen.
  
  Nonostante il freddo, la *farfalla* è sopravvissuta ed ha continuato a volare.
  Trotz der Kälte überlebte der *Schmetterling* und flog weiter.
  
  Se incontrassi una *farfalla* rara, la catturerei per mostrarla agli amici.
  Wenn ich einen seltenen *Schmetterling* träfe, würde ich ihn fangen, um ihn meinen Freunden zu zeigen.
  
  La *farfalla*, simbolo di trasformazione, si posa sui fiori del giardino ogni mattina.
  Der *Schmetterling*, ein Symbol der Verwandlung, setzt sich jeden Morgen auf die Blumen im Garten.
