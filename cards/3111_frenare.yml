Rang: 3111
Wort: frenare
Wortart: v
Wort mit Artikel: frenare
Femininum / Plural: ''
IPA: ''
Definition: bremsen, verlangsamen, stoppen
Register: ''
Beispielsätze: |-
  Quando vedi un *frenare* brusco in autostrada, metti subito la freccia.
  Wenn du ein *plötzliches Bremsen* auf der Autobahn siehst, gib sofort das Blinklicht.
  
  Se avessi *frenato* prima, non avremmo sbattuto contro quel camion!
  Wenn du früher *gebremst* hättest, wären wir nicht gegen diesen LKW geknallt!
  
  Non sai quanto vorrei *frenare* questo momento per godermelo più a lungo.
  Du kannst dir nicht vorstellen, wie sehr ich diesen Moment *anhalten* möchte, um ihn länger zu genießen.
  
  Credo che il governo dovrebbe *frenare* gli sprechi negli ospedali pubblici.
  Ich glaube, die Regierung sollte die Verschwendung in öffentlichen Krankenhäusern *eindämmen*.
  
  Non *frenerei* la mia passione per la musica nemmeno se qualcuno me lo chiedesse!
  Ich würde meine Leidenschaft für Musik nicht *zurückhalten*, selbst wenn mich jemand darum bitten würde!
