Rang: 363
Wort: interessare
Wortart: v
Wort mit Artikel: interessare
Femininum / Plural: ''
IPA: ''
Definition: interessieren
Register: ''
Beispielsätze: |-
  Mi *interessa* molto la storia italiana.
  Mich *interessiert* die italienische Geschichte sehr.
  
  Non ci *interessano* le tue scuse.
  Deine Ausreden *interessieren* uns nicht.
  
  A chi *interesserebbe* un film del genere?
  Wer hätte Interesse an so einem Film?
  
  Lui dice che lo *interessava* solo il risultato.
  Er sagt, ihn *interessierte* nur das Ergebnis.
  
  Se *interessassi* di più, sapresti già la risposta.
  Wenn du dich mehr *interessieren* würdest, wüsstest du die Antwort schon.
