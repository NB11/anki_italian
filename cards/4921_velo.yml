Rang: 4921
Wort: velo
Wortart: n.m
Wort mit Artikel: il velo
Femininum / Plural: veli
IPA: ''
Definition: der Schleier, -
Register: ''
Beispielsätze: |-
  La sposa indossava un *velo* bianco che le copriva il viso.
  Die Braut trug einen *Schleier*, der ihr Gesicht bedeckte.
  
  Nel Medioevo, le donne nobili portavano spesso un *velo* per coprirsi i capelli.
  Im Mittelalter trugen adlige Frauen oft einen *Schleier*, um ihre Haare zu bedecken.
  
  Nonostante il *velo* fosse trasparente, non potevo vedere chi fosse dietro di esso.
  Obwohl der *Schleier* durchsichtig war, konnte ich nicht erkennen, wer sich dahinter befand.
  
  Avrei voluto togliermi il *velo* prima della cerimonia, ma la tradizione lo vietava.
  Ich hätte mir den *Schleier* gerne vor der Zeremonie abgenommen, aber die Tradition verbot es.
  
  Il *velo* della nebbia mattutina si dissolse lentamente con il sorgere del sole.
  Der *Schleier* des Morgennebels löste sich langsam mit dem Sonnenaufgang auf.
