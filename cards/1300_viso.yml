Rang: 1300
Wort: viso
Wortart: n.m
Wort mit Artikel: il viso
Femininum / Plural: visi
IPA: ''
Definition: das Gesicht, -er
Register: ''
Beispielsätze: |-
  Il *viso* del bambino era tutto sporco dopo aver mangiato il gelato.
  Das *Gesicht* des Kindes war ganz schmutzig, nachdem es das Eis gegessen hatte.
  
  Ho un neo proprio sul *viso*, lo vedi?
  Ich habe einen Leberfleck genau auf dem *Gesicht* – siehst du ihn?
  
  Se vuoi che ti riconosca, togliti il cappello che nasconde il *viso*.
  Wenn du, dass ich dich erkenne, musst du den Hut abnehmen, der das *Gesicht* verdeckt.
  
  Quella creatura aveva un *viso* così strano che quasi spaventava il pubblico.
  Jenes Wesen hatte ein *Gesicht*, das so seltsam war, dass es fast das Publikum erschreckte.
  
  Anche se ultimamente frequento meno il quartiere, ho notato che il *viso* di quel cameriere è sempre allegro.
  Obwohl ich in letzter Zeit weniger das Viertel besuche, habe ich gemerkt, dass das *Gesicht* dieses Kellners immer fröhlich ist.
