Rang: 2233
Wort: scivolare
Wortart: vi
Wort mit Artikel: scivolare
Femininum / Plural: ''
IPA: ''
Definition: ausrutschen, gleiten
Register: ''
Beispielsätze: |-
  Stamattina ho *scivolato* sul pavimento bagnato mentre portavo la spesa.
  Ich bin heute Morgen auf dem nassen Boden *ausgerutscht*, während ich die Einkäufe trug.
  
  Se non avessi frenato in tempo, sarei *scivolato* giù per la scarpata.
  Wenn ich nicht rechtzeitig gebremst hätte, wäre ich den Abhang *hinuntergerutscht*.
  
  La primavera è la stagione in cui la gente inizia a *scivolare* nella pigrizia.
  Im Frühling ist die Jahreszeit, in der die Leute in Faulheit *hinabgleiten*.
  
  Il cane ha *scivolato* sotto il letto per nascondersi dal rumore forte.
  Der Hund ist unter das Bett *gerutscht*, um sich vor dem lauten Geräusch zu verstecken.
  
  Avrei voluto aiutarlo, ma non appena ho provato a muovermi, sono *scivolato* a terra a mia volta.
  Ich hätte ihm helfen wollen, aber sobald ich mich bewegen wollte, bin ich meinerseits zu Boden *gerutscht*.
