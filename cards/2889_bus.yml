Rang: 2889
Wort: bus
Wortart: n.m
Wort mit Artikel: il bus
Femininum / Plural: i bus
IPA: ''
Definition: der Bus, -se
Register: ''
Beispielsätze: |-
  I *bus* della città sono sempre affollati nelle ore di punta.
  Die *Busse* der Stadt sind immer in den Stoßzeiten überfüllt.
  
  Se perdi il *bus*, dovrai aspettare almeno un’ora per il prossimo.
  Wenn du den *Bus* verpasst, musst du mindestens eine Stunde auf den nächsten warten.
  
  Mi hanno detto che il *bus* per la stazione parte alle diciotto e trenta.
  Man hat mir gesagt, dass der *Bus* zum Bahnhof um halb sieben abfährt.
  
  Nonostante il traffico, sono riuscito a prendere il *bus* giusto.
  Trotz des Verkehrs konnte ich den richtigen *Bus* erwischen.
  
  Quel *bus* che hai visto non fa questa linea, devi aver frainteso!
  Dieser *Bus*, den du gesehen hast, fährt diese Strecke nicht – du musst dich geirrt haben!
