Rang: 2999
Wort: capra
Wortart: n.f
Wort mit Artikel: la capra
Femininum / Plural: capre
IPA: ''
Definition: die Ziege, -n
Register: ''
Beispielsätze: |-
  Nel villaggio tutti amano *capra* di zio Marco, perché dà un latte molto buono.
  Im Dorf lieben alle die *Ziege* von Onkel Marco, weil sie eine sehr gute Milch gibt.
  
  Se avessi un terreno, comprerei almeno tre *capre* per produrre formaggio a casa.
  Wenn ich ein Grundstück hätte, würde ich mindestens drei *Ziegen* kaufen, um zu Hause Käse herzustellen.
  
  La *capra* che abbiamo visto al mercato aveva le corna molto lunghe e impressionanti.
  Die *Ziege*, die wir auf dem Markt gesehen haben, hatte sehr lange und beeindruckende Hörner.
  
  Dicono che tenere *capre* richieda molto impegno, ma i risultati valgono la pena.
  Man sagt, dass Ziegen zu halten viel Einsatz erfordert, aber die Ergebnisse lohnen sich.
  
  Non sapevo che la *capra* fosse così intelligente da imparare a aprire il cassetto della cucina!
  Ich wusste nicht, dass die *Ziege* so klug ist, dass sie die Küchenschublade öffnen kann!
