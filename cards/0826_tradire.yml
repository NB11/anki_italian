Rang: 826
Wort: tradire
Wortart: vt
Wort mit Artikel: tradire
Femininum / Plural: ''
IPA: ''
Definition: betrügen, verraten
Register: ''
Beispielsätze: |-
  Il *tradito* Henry non vuole più parlare con suo figlio dopo che lo ha tradito con la sua migliore amica.
  Der *betrogene* Henry will nicht mehr mit seinem Sohn reden, nachdem er ihn mit seiner besten Freundin betrogen hat.
  
  Certamente, se scoprirai che qualcuno ti ha *tradito*, dovrai discuterne con calma per non fare pazzie.
  Sicherlich musst du, wenn du herausfindest, dass dich jemand *verraten* hat, ruhig darüber diskutieren, um keine Dummheiten zu machen.
  
  I giudici hanno il compito di scoprire se l’imputato ha *tradito* la società con i suoi crimini.
  Die Richter haben die Aufgabe herauszufinden, ob der Angeklagte die Gesellschaft mit seinen Verbrechen *verraten* hat.
  
  Stamattina la mia fidanzata mi ha detto che non sopporta più di *tradire* il proprio pensiero solo per piacere agli altri.
  Heute Morgen hat mir meine Verlobte gesagt, dass sie es nicht mehr *ertragen* kann, ihren eigenen Gedanken nur zu gefallen, zu verraten.
  
  Se non avessi *tradito* la tua fiducia, forse avresti ancora il potere di costringere qualcuno a fare ciò che vuoi.
  Wenn du nicht das Vertrauen in mich *verraten* hättest, hättest du vielleicht noch die Macht, jemanden dazu zu zwingen, zu tun, was du willst.
