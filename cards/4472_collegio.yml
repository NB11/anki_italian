Rang: 4472
Wort: collegio
Wortart: n.m
Wort mit Artikel: il collegio
Femininum / Plural: collegi
IPA: ''
Definition: das Internat, -e
Register: ''
Beispielsätze: |-
  Mio figlio frequenta *il collegio* a Milano da due anni.
  Mein Sohn besucht *das Internat* seit zwei Jahren in Mailand.
  
  Ho sentito dire che *il collegio* ha organizzato una gita al lago di Como.
  Ich habe gehört, dass *das Internat* einen Ausflug zum Comer See organisiert hat.
  
  Nonostante la distanza, *il collegio* offre un ambiente familiare molto accogliente.
  Trotz der Entfernung bietet *das Internat* eine sehr familiäre und gastfreundliche Umgebung.
  
  Se avessi più tempo, vorrei visitare *il collegio* dove mio nonno studiava.
  Wenn ich mehr Zeit hätte, würde ich *das Internat* besuchen, an dem mein Großvater studiert hat.
  
  Credi che *il collegio* sia ancora il modo migliore per formare i giovani di oggi?
  Glaubst du, dass *das Internat* immer noch die beste Art ist, die Jugend von heute zu formen?
