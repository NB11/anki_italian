Rang: 4536
Wort: esibizione
Wortart: n.f
Wort mit Artikel: l'esibizione
Femininum / Plural: esibizioni
IPA: ''
Definition: die Darbietung, -en
Register: ''
Beispielsätze: |-
  L'*esibizione* dei violinisti è stata così emozionante che il pubblico ha applaudito per cinque minuti.
  Die *Darbietung* der Geiger war so ergreifend, dass das Publikum fünf Minuten lang Beifall klatschte.
  
  Dopo l'*esibizione* al teatro, il cantante si è riposato nello spogliatoio.
  Nach der *Darbietung* im Theater hat sich der Sänger in der Umkleidekabine ausgeruht.
  
  Spero che l'*esibizione* di domani venga registrata per l'audio, così possiamo riascoltarla in seguito.
  Ich hoffe, dass die *Darbietung* von morgen aufgenommen wird, damit wir sie später anhören können.
  
  Nonostante l'*esibizione* fosse breve, il messaggio del conferenziere è stato molto chiaro.
  Obwohl die *Darbietung* kurz war, war die Botschaft des Redners sehr klar.
  
  L'*esibizione* del gattino sul palco è stata così divertente che tutti hanno riso a crepapelle.
  Die *Darbietung* des Kätzchens auf der Bühne war so lustig, dass alle lachen mussten.
