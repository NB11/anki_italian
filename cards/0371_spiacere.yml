Rang: 371
Wort: spiacere
Wortart: vi
Wort mit Artikel: spiacere
Femininum / Plural: ''
IPA: ''
Definition: missfallen, bedauern
Register: ''
Beispielsätze: |-
  Mi *spiace* che tu non possa venire alla festa.
  Es *missfällt* mir, dass du nicht zur Party kommen kannst.
  
  *Spiaccio* davvero di doverti dire questo.
  Es *bedauere* wirklich, dir das sagen zu müssen.
  
  Ti è *spiacuto* che abbia perso il treno?
  Hat es dich *geärgert*, dass ich den Zug verpasst habe?
  
  Mi *spiacerebbe* molto se non potessimo incontrarci domani.
  Es würde mir sehr *missfallen*, wenn wir uns morgen nicht treffen könnten.
  
  Non *spiacerti* se arrivo un po' in ritardo, vero?
  Es wird dich nicht *stören*, wenn ich etwas zu spät komme, oder?
