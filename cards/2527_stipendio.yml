Rang: 2527
Wort: stipendio
Wortart: n.m
Wort mit Artikel: lo stipendio
Femininum / Plural: stipendi
IPA: ''
Definition: das Gehalt, -¨er
Register: ''
Beispielsätze: |-
  Quest'anno ho ricevuto uno *stipendio* più alto del solito grazie alle mie buone prestazioni.
  Dieses Jahr habe ich ein *höheres Gehalt* als sonst wegen meiner guten Leistungen bekommen.
  
  Il comitato ha deciso di aumentare lo *stipendio* base di tutti i dipendenti a partire da gennaio.
  Der Ausschuss hat beschlossen, das *Grundgehalt* aller Angestellten ab Januar zu erhöhen.
  
  Nonostante le difficoltà economiche, lo *stipendio* di Luca gli permette ancora di vivere dignitosamente.
  Trotz der wirtschaftlichen Schwierigkeiten ermöglicht *Lukas Gehalt* ihm noch, ein würdevolles Leben zu führen.
  
  Se avessi accettato quel lavoro all'estero, il mio *stipendio* sarebbe quasi raddoppiato!
  Wenn ich diese Arbeit im Ausland angenommen hätte, wäre mein *Gehalt* fast doppelt so hoch!
  
  Lo *stipendio* minimo in Italia dovrebbe essere aumentato per migliorare le condizioni di vita dei lavoratori.
  Das *Mindestgehalt* in Italien sollte erhöht werden, um die Lebensbedingungen der Arbeitnehmer zu verbessern.
