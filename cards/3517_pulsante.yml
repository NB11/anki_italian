Rang: 3517
Wort: pulsante
Wortart: n.m
Wort mit Artikel: il pulsante
Femininum / Plural: pulsanti
IPA: ''
Definition: der Knopf, die Knöpfe
Register: ''
Beispielsätze: |-
  Premi il *pulsante* rosso per spegnere la macchina.
  Drück den *Knopf* rot, um die Maschine auszuschalten.
  
  Non trovo il *pulsante* della luminosità sullo schermo del mio cellulare.
  Ich finde den *Knopf* für die Helligkeit auf dem Bildschirm meines Handys nicht.
  
  Se avessi premuto il *pulsante* giusto, avremmo vinto la competizione tecnologica!
  Wenn ich den richtigen *Knopf* gedrückt hätte, hätten wir den Technologie-Wettbewerb gewonnen!
  
  Era un meccanismo semplice: un solo *pulsante* avviava tutto il processo.
  Es war ein einfacher Mechanismus: Ein einziger *Knopf* startete den gesamten Prozess.
  
  Mi dispiace, ma il *pulsante* dell’ascensore non funziona da settimane.
  Es tut mir leid, aber der *Knopf* des Aufzugs funktioniert schon seit Wochen nicht.
