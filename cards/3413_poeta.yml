Rang: 3413
Wort: poeta
Wortart: n.m
Wort mit Artikel: il poeta
Femininum / Plural: poeti
IPA: ''
Definition: der Dichter, -
Register: ''
Beispielsätze: |-
  Il *poeta* legge le sue poesie durante il festival autunnale in piazza.
  Der *Dichter* liest seine Gedichte während des herbstlichen Festivals auf dem Platz.
  
  Non sapevo che il mio vicino fosse un famoso *poeta*, fino a quando lessi la sua raccolta.
  Ich wusste nicht, dass mein Nachbar ein berühmter *Dichter* war, bis ich seine Gedichtsammlung las.
  
  Se fossi nata in un’altra epoca, avrei voluto diventare *poeta* piuttosto che critico letterario.
  Wäre ich in einer anderen Epoche geboren worden, hätte ich *Dichterin* werden wollen statt Literaturkritikerin.
  
  Il *poeta* che ha scritto questa struggente ode è scomparso nel disgrazia di guerra.
  Der *Dichter*, der diese ergreifende Ode geschrieben hat, ist im Kriegsunglück verschwunden.
  
  Anche se non gli è stato assegnato il premio, il *poeta* ha ricevuto elogi dalla stampa per la sua sceneggiatura innovativa.
  Auch wenn ihm der Preis nicht zuerkannt wurde, erhielt der *Dichter* von der Presse Lob für sein innovatives Drehbuch.
