Rang: 560
Wort: guaio
Wortart: n.m
Wort mit Artikel: il guaio
Femininum / Plural: guaì
IPA: ''
Definition: das Problem, -e, die Schwierigkeit, -en
Register: ''
Beispielsätze: |-
  Mi sono cacciato in un *guaio* perché ho perso il mio portafoglio con tutta la documentazione.
  Ich habe mir *Probleme* eingehandelt, weil ich meine Geldbörse mit allen Dokumenten verloren habe.
  
  Non è un *guaio* se arrivi in ritardo, ma almeno avvisa!
  Es ist *kein Problem*, wenn du zu spät kommst, aber sag wenigstens Bescheid!
  
  Con tutte queste *guaì* non riesco a concentrarmi sul lavoro.
  Bei all diesen *Schwierigkeiten* schaffe ich es nicht, mich auf die Arbeit zu konzentrieren.
  
  Se non risolvi subito questo *guaio*, perderai la fiducia di tutti quanti.
  Wenn du diese *Schwierigkeit* nicht sofort löst, wirst du das Vertrauen aller verlieren.
  
  Era un *guaio* generale, ma finalmente abbiamo trovato una soluzione.
  Es war eine *allgemeine Schwierigkeit*, aber schließlich haben wir eine Lösung gefunden.
