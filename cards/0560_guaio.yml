IPA: ''
Definition: der Ärger, die Schwierigkeit, -s
Register: ''
Beispielsätze: |-
  Ho *guai* con il computer, non funziona più.
  Ich habe *Ärger* mit dem Computer, er funktioniert nicht mehr.
  
