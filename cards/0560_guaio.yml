  Abbiamo risolto il *guaio* della macchina, ora va bene.
  Wir haben den *Ärger* mit dem Auto behoben, jetzt läuft es gut.
  
  Credi che sia un *guaio* serio o solo un piccolo problema?
  Glaubst du, dass es ein *ernstes Problem* ist oder nur eine kleine Sache?
