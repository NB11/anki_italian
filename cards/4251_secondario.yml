Beispielsätze: |-
  La sua *secondaria* importanza non significa che possiamo ignorarla del tutto.
  Ihre *sekundäre* Bedeutung bedeutet nicht, dass wir sie komplett ignorieren können.
  
  Credo che tu stia sottovalutando un aspetto *secondario*, ma non per questo meno rilevante.
  Ich glaube, du unterschätzt einen *nebensächlichen* Aspekt, der deshalb nicht weniger relevant ist.
  
  Nonostante le critiche, la sua opera rimane *secondaria* rispetto ai grandi maestri del Rinascimento.
  Trotz der Kritik bleibt sein Werk *untergeordnet* im Vergleich zu den großen Meistern der Renaissance.
  
  Il problema *secondario* era la mancanza di fondi, ma ne discuteremo più tardi.
  Das *sekundäre* Problem war die fehlende Finanzierung, aber darüber sprechen wir später.
  
  Se avessimo più tempo, potremmo approfondire questi dettagli *secondari*, ma purtroppo no.
  Wenn wir mehr Zeit hätten, könnten wir auf diese *nebensächlichen* Details eingehen, aber leider nicht.
