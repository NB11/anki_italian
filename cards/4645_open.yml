Beispielsätze: |-
  La *apertura* nel muro era così stretta che ci passava appena un gatto.
  Das *Loch* in der Mauer war so eng, dass gerade mal eine Katze hindurchpasste.
  
  Non puoi ignorare l'*apertura* sulla porta della cantina, potrebbe essere pericolosa!
  Du kannst die *Öffnung* an der Kellertür nicht ignorieren, sie könnte gefährlich sein!
  
  Mi sorprende che ci siano ancora molte *aperture* nei documenti storici che non sono state analizzate.
  Es überrascht mich, dass es noch viele *Öffnungen* in historischen Dokumenten gibt, die nicht analysiert wurden.
  
  Dovresti controllare se l'*apertura* del camino è libera prima di accenderlo d’inverno.
  Du solltest prüfen, ob der *Schornstein* frei ist, bevor du ihn im Winter anheizt.
  
  L’*apertura* di credito che hai ottenuto dalla banca ti permette di spendere fino a 2000 euro.
  Die *Kreditlinie*, die du von der Bank erhalten hast, erlaubt es dir, bis zu 2000 Euro auszugeben.
