Rang: 2701
Wort: autorizzazione
Wortart: n.f
Wort mit Artikel: l'autorizzazione
Femininum / Plural: autorizzazioni
IPA: ''
Definition: die Genehmigung, Erlaubnis, Bewilligung
Register: ''
Beispielsätze: |-
  Per entrare in *autorizzazione* è necessario compilare un modulo online.
  Für den Eintritt ist eine *Genehmigung* erforderlich, für das man ein Online-Formular ausfüllen muss.
  
  Non ho ancora ricevuto l'*autorizzazione* per visitare il museo chiuso per restauro.
  Ich habe die *Erlaubnis*, das wegen Renovierung geschlossene Museum zu besuchen, noch nicht erhalten.
  
  L'*autorizzazione* che hai firmato ieri scadrà tra due mesi.
  Die *Genehmigung*, die du gestern unterschrieben hast, läuft in zwei Monaten ab.
  
  Se non ottieni l'*autorizzazione' necessaria, non puoi accedere all'archivio storico.
  Falls du die erforderliche *Bewilligung* nicht erhältst, darfst du nicht auf das historische Archiv zugreifen.
  
  Hanno finalmente concesso l'*autorizzazione' per la manifestazione che si terrà in piazza domani sera.
  Sie haben endlich die *Genehmigung* für die Veranstaltung erteilt, die morgen Abend auf dem Platz stattfindet.
