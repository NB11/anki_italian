Rang: 2936
Wort: tortura
Wortart: n.f
Wort mit Artikel: la tortura
Femininum / Plural: torture
IPA: ''
Definition: die Folter, -n
Register: ''
Beispielsätze: |-
  Durante la *tortura*, l’uomo ha confessato tutto.
  Während der *Folter* hat der Mann alles gestanden.
  
  Pensavo che la *tortura* fosse illegale in Europa.
  Ich dachte, die *Folter* sei in Europa illegal.
  
  Ha subito questa *tortura* per settimane senza dire una parola.
  Er hat diese *Folter* wochenlang erlitten, ohne ein Wort zu sagen.
  
  La *tortura* psicologica è altrettanto crudele di quella fisica.
  Die psychologische *Folter* ist genauso grausam wie die physische.
  
  Se avessi saputo della *tortura* in quella prigione, non ci sarei mai andato.
  Wenn ich von der *Folter* in diesem Gefängnis gewusst hätte, wäre ich niemals hingegangen.
