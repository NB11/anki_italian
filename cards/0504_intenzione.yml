Rang: 504
Wort: intenzione
Wortart: n.f
Wort mit Artikel: la intenzione
Femininum / Plural: intenzioni
IPA: ''
Definition: die Absicht, -en
Register: ''
Beispielsätze: |-
  Ho *l'intenzione* di visitare Roma l'anno prossimo.
  Ich habe *die Absicht*, nächstes Jahr Rom zu besuchen.
  
  Qual è *la tua intenzione* per il futuro?
  Was sind *deine Absichten* für die Zukunft?
  
  Non avevo *l'intenzione* di offenderlo, scusami.
  Ich hatte nicht *die Absicht*, ihn zu beleidigen, entschuldige mich.
  
  Le sue *intenzioni* sono sempre serie.
  Seine *Absichten* sind immer ernst.
  
  È importante chiarire *le proprie intenzioni* prima di agire.
  Es ist wichtig, *seine Absichten* vor dem Handeln klar zu machen.
