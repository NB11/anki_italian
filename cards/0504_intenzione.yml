Rang: 504
Wort: intenzione
Wortart: n.f
Wort mit Artikel: l'intenzione
Femininum / Plural: intenzioni
IPA: ''
Definition: die Absicht, -en
Register: ''
Beispielsätze: |-
  Avevo *l'*intenzione di partire presto, ma poi ho cambiato idea.
  Ich hatte die *Absicht*, früh loszufahren, aber dann habe ich meine Meinung geändert.
  
  Nonostante *l'*intenzione di studiare, si è distratto per tutta la giornata.
  Trotz der *Absicht* zu lernen, hat er sich den ganzen Tag abgelenkt.
  
  Mi avevi promesso che avresti fatto *l'*intenzione di aiutarlo, ma non l'hai fatto!
  Du hattest mir versprochen, die *Absicht* zu haben, ihm zu helfen, aber das hast du nicht gemacht!
  
  Se tu avessi *l'*intenzione di venire, dovresti dirmelo prima del viaggio.
  Falls du die *Absicht* hast zu kommen, solltest du es mir vor der Reise sagen.
  
  Non capisco perché non realizzi *l'*intenzione di chiamare i tuoi genitori ogni settimana.
  Ich verstehe nicht, warum du nicht die *Absicht* hast, deine Eltern jede Woche anzurufen.
