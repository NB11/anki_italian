Rang: 3422
Wort: barzelletta
Wortart: n.f
Wort mit Artikel: la barzelletta
Femininum / Plural: barzellette
IPA: ''
Definition: der Witz, -e / die Anekdote, -n
Register: ''
Beispielsätze: |-
  Ieri sera ho raccontato *barzelletta* così divertente che tutti hanno riso a crepapelle.
  Gestern Abend habe ich *einen Witz* erzählt, der so lustig war, dass alle sich vor Lachen nicht mehr halten konnten.
  
  Lui sa sempre inventare delle *barzellette* molto originali, anche se a volte sono un po’ volgari.
  Er kann immer *Witze* erfinden, die sehr originell sind, auch wenn sie manchmal etwas vulgär sind.
  
  La *barzelletta* che hai appena sentito è vecchia come il cucco, ma sembra che nessuno se ne sia accorto.
  Der *Witz*, den du gerade gehört hast, ist uralt, aber es scheint, als hätte es niemand gemerkt.
  
  Se vuoi vincere il torneo di cabaret, devi preparare almeno dieci *barzellette* davvero spiritose.
  Wenn du das Kabarett-Turnier gewinnen willst, musst du mindestens zehn *Witze* vorbereiten, die richtig witzig sind.
  
  Nonostante la sua fama di persona seria, anche il professore adora ascoltare una *barzelletta* ogni tanto.
  Trotz seines Rufs als ernsthafter Mensch hört auch der Professor *einen Witz* gern hin und wieder.
