Rang: 843
Wort: pelle
Wortart: n.f
Wort mit Artikel: la pelle
Femininum / Plural: pelli
IPA: ''
Definition: die Haut, -häute
Register: ''
Beispielsätze: |-
  Il *pelle* del tuo cane è molto morbida.
  Die *Haut* deines Hundes ist sehr weich.
  
  Hanno trovato una rara *pelle* di serpente nello zoo.
  Sie haben eine seltene *Haut* einer Schlange im Zoo gefunden.
  
  Nonostante l’età, la *pelle* della nonna era ancora liscia.
  Trotz des *Alters* war die Haut der Großmutter noch glatt.
  
  Il giudice ha discusso a lungo del *pelle* dell’imputato come prova.
  Der Richter hat lange über die *Haut* des Angeklagten als Beweis diskutiert.
  
  Certamente, la *pelle* dei pesci è molto elastica per nuotare.
  Sicherlich ist die *Haut* der Fische sehr elastisch zum Schwimmen.
