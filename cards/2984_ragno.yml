Rang: 2984
Wort: ragno
Wortart: n.m
Wort mit Artikel: il ragno
Femininum / Plural: ragni
IPA: ''
Definition: die Spinne, -n
Register: ''
Beispielsätze: |-
  Ho trovato *un ragno* nella mia camera da letto che sembra molto velenoso.
  Ich habe eine *Spinne* in meinem Schlafzimmer gefunden, die sehr giftig zu sein scheint.
  
  Mio figlio ha una paura terribile dei *ragni*, gli fanno venire i brividi.
  Mein Sohn hat eine schreckliche *Angst* vor Spinnen, die lassen ihn erschauern.
  
  Non sapevo che esistessero *ragni* così grandi in questa regione, è davvero sorprendente!
  Ich wusste nicht, dass es in dieser Region so große *Spinnen* gibt, das ist wirklich verblüffend!
  
  Se vedi *un ragno* che attraversa la strada, meglio non calpestarlo, potrebbe essere innocuo.
  Wenn du eine *Spinne* siehst, die die Straße überquert, tritt lieber nicht darauf, sie könnte harmlos sein.
  
  In quell’associazione si occupano dello studio delle *ragni* velenosi per scopi medici.
  In diesem Verein beschäftigen sie sich mit der Erforschung giftiger *Spinnen* zu medizinischen Zwecken.
