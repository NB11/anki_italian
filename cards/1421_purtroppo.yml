Rang: 1421
Wort: purtroppo
Wortart: adv
Wort mit Artikel: purtroppo
Femininum / Plural: ''
IPA: ''
Definition: leider, unglücklicherweise
Register: ''
Beispielsätze: |-
  Mi dispiace, ma *purtroppo* non posso venire alla festa di domani sera.
  Es tut mir leid, aber *leider* kann ich nicht zur Party morgen Abend kommen.
  
  Dopo *purtroppo* tanti tentativi falliti, ho deciso di chiedere aiuto al mio insegnante.
  Nach *unglücklicherweise* so vielen gescheiterten Versuchen habe ich beschlossen, meinen Lehrer um Hilfe zu bitten.
  
  Domenica prossima avremmo dovuto fare un escursione, *purtroppo* ha iniziato a piovere a dirotto.
  Am nächsten Sonntag hätten wir eine Wanderung machen sollen, *leider* hat es dann angefangen in Strömen zu regnen.
  
  Nonostante gli avvertimenti del dottore, ha continuato a *purtroppo* fumare due pacchetti al giorno.
  Trotz der Warnungen des Arztes hat er *leider* weiterhin zwei Packungen am Tag geraucht.
  
  Volevo regalarti un libro stupendo, *purtroppo* è sparito dalla mia libreria proprio stamattina.
  Ich wollte dir ein wunderbares Buch schenken, *leider* ist es genau heute Morgen aus meinem Bücherregal verschwunden.
