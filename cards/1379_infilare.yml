Rang: 1379
Wort: infilare
Wortart: v
Wort mit Artikel: infilare
Femininum / Plural: ''
IPA: ''
Definition: hineinstecken, durchziehen, anziehen
Register: ''
Beispielsätze: |-
  Stasera *infilo* la camicia nei pantaloni per essere più elegante.
  Heute Abend *ziehe* ich das Hemd in die Hose hinein, um eleganter zu wirken.
  
  Quando ero piccolo, mi piaceva *infilare* le mani nelle tasche del cappotto.
  Als ich klein war, steckte ich mir gern die Hände in die *Taschen* des Mantels hinein.
  
  Se hai voglia di una doccia calda, *infilati* subito sotto il getto d'acqua.
  Falls du Lust auf eine heiße Dusche hast, *zieh dich* sofort unter den Wasserstrahl hinein.
  
  Il ladro ha provato a *infilare* la mano nella trappola del detective, ma era troppo tardi.
  Der Dieb versuchte, seine Hand in die *Falle* des Detektivs hineinzustecken, aber es war zu spät.
  
  La nonna mi ha detto: «Se vuoi *infilare* le chiavi nella porta, fallo con attenzione!».
  Oma sagte zu mir: »Wenn du die Schlüssel im Türschloss *hineinstecken* willst, mach es bitte vorsichtig!«
