Rang: 1960
Wort: chiarire
Wortart: v
Wort mit Artikel: chiarire
Femininum / Plural: ''
IPA: ''
Definition: klären, aufklären
Register: ''
Beispielsätze: |-
  Devi *chiarire* la situazione con il tuo capo prima che sia troppo tardi.
  Du musst die Situation mit deinem Chef *klären*, bevor es zu spät ist.
  
  Il detective sta cercando di *chiarire* gli ultimi dettagli del mistero prima di chiudere il caso.
  Der Detektiv versucht, die letzten Details des *Rätsels* aufzuklären, bevor er den Fall schließt.
  
  Sfortunatamente, non è ancora riuscito a *chiarire* perché la macchina ha smesso di funzionare.
  Unglücklicherweise hat er es noch nicht geschafft *aufzuklären*, warum das Auto stehengeblieben ist.
  
  Prima di partire, vorrei *chiarire* un’ultima volta tutti i punti del contratto.
  Bevor ich gehe, möchte ich alle Punkte des Vertrags ein letztes Mal *klären*.
  
  Se vuoi che la comunità ti ascolti, devi prima *chiarire* le tue intenzioni.
  Wenn die Gemeinschaft dich hören soll, musst du erst deine Absichten *klarstellen*.
