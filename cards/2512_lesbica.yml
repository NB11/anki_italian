Rang: 2512
Wort: lesbica
Wortart: n.f
Wort mit Artikel: la lesbica
Femininum / Plural: lesbiche
IPA: ''
Definition: die Lesbe, -n
Register: ''
Beispielsätze: |-
  Lei è una *lesbica* orgogliosa e vive apertamente con la sua compagna.
  Sie ist eine *stolze Lesbe* und lebt offen mit ihrer Partnerin zusammen.
  
  Nel libro si parla di una famiglia che ha *lesbiche* tra i membri.
  In dem Buch wird von einer Familie gesprochen, die *Lesben* unter ihren Mitgliedern hat.
  
  Le persone discriminate spesso chiedono più rispetto per le *lesbiche*.
  Diskriminierte Menschen fordern oft mehr Respekt für *Lesben*.
  
  La *lesbica* che frequentava la nostra scuola è diventata una nota attivista.
  Die *Lesbe*, die unsere Schule besuchte, ist zu einer bekannten Aktivistin geworden.
  
  Non tutti accettano senza problemi la presenza di coppie *lesbiche* nel quartiere.
  Nicht alle akzeptieren problemlos das Vorhandensein von *lesbischen* Paaren im Viertel.
