Rang: 1599
Wort: terapia
Wortart: n.f
Wort mit Artikel: la terapia
Femininum / Plural: terapie
IPA: ''
Definition: die Therapie, -n
Register: ''
Beispielsätze: |-
  Da quando ha iniziato la *terapia*, il paziente ha mostrato grandi progressi nella sua salute mentale.
  Seit er die *Therapie* begonnen hat, zeigte der Patient große Fortschritte in seiner psychischen Gesundheit.
  
  Se non avessi interrotto la *terapia*, ora starei molto meglio di così.
  Wenn ich die *Therapie* nicht abgebrochen hätte, ginge es mir jetzt viel besser als jetzt.
  
  Il medico gli ha consigliato una *terapia* a base di farmaci naturali per alleviare il dolore.
  Der Arzt hat ihm eine *Therapie* mit natürlichen Medikamenten empfohlen, um den Schmerz zu lindern.
  
  Nonostante la *terapia* fosse lunga e faticosa, alla fine si è ripreso completamente.
  Obwohl die *Therapie* lang und anstrengend war, hat er sich am Ende vollständig erholt.
  
  Mi ha detto che, secondo la sua esperienza, la *terapia* di gruppo dà risultati sorprendentemente rapidi.
  Er hat mir gesagt, dass seiner Erfahrung nach die Gruppentherapie erstaunlich schnelle Ergebnisse bringt.
