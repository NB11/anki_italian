Rang: 4413
Wort: macchiare
Wortart: vt
Wort mit Artikel: macchiare
Femininum / Plural: ''
IPA: ''
Definition: flecken, beflecken, verschmutzen
Register: ''
Beispielsätze: |-
  Non *macchiare* il tavolo con il vino rosso!
  Flecken Sie den Tisch nicht mit dem Rotwein!
  
  Se *macchierai* il vestito, dovrai cambiarlo tutto.
  Wenn Sie das Kleid *beflecken*, müssen Sie es komplett wechseln.
  
  L’inchiostro *ha macchiato* la camicia mentre scriveva la lettera.
  Die Tinte *hat* die Bluse verschmutzt, während sie den Brief schrieb.
  
  Vorrei sapere chi *ha macchiato* il pavimento della cucina con della salsa di pomodoro.
  Ich würde gerne wissen, wer den Küchenboden mit Tomatensauce *befleckt hat*.
  
  Dopo aver *macchiato* la tovaglia con l’olio, ha cercato di pulirla inutilmente.
  Nachdem sie die Tischdecke mit Öl *befleckt hatte*, versuchte sie vergeblich, sie zu reinigen.
