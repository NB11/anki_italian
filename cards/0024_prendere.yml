Rang: 24
Wort: prendere
Wortart: vt
Wort mit Artikel: prendere
Femininum / Plural: ''
IPA: ''
Definition: nehmen, holen, ergreifen
Register: ''
Beispielsätze: |-
  Vuoi *prendere* un caffè con me?
  Möchtest du *nehmen* einen *Kaffee* mit mir?
  
  Ho *preso* l’autobus alle otto di mattina.
  Ich habe *genommen* den Bus um acht Uhr morgens.
  
  Domani *prenderemo* il treno per Roma.
  Morgen *werden wir nehmen* den Zug nach Rom.
  
  Se avessi fame, *prenderei* un panino.
  Wenn ich hunger hätte, *würde ich nehmen* ein Brötchen.
  
  Credo che lui *prenda* sempre l’ascensore.
  Ich glaube, dass er immer den Aufzug *nimmt*.
