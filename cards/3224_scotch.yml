Rang: 3224
Wort: scotch
Wortart: n.m
Wort mit Artikel: lo scotch
Femininum / Plural: scotch
IPA: ''
Definition: der Scotch, -s
Register: ''
Beispielsätze: |-
  Ho comprato *scotch* di una marca molto conosciuta perché mi hanno detto che è migliore.
  Ich habe *Scotch* einer sehr bekannten Marke gekauft, weil man mir sagte, dass er besser ist.
  
  Non bevo mai *scotch* prima di guidare, per rispetto delle regole della strada.
  Ich trinke nie *Single Malt Whisky* vor dem Autofahren, aus Respekt vor den Straßenverkehrsregeln.
  
  Gli appassionati di whisky preferiscono spesso *scotch* invecchiati oltre dieci anni.
  Whisky-Liebhaber bevorzugen oft *alten schottischen Whisky*, der über zehn Jahre gereift ist.
  
  Ha regalato una bottiglia di *scotch* a suo suocero per il suo compleanno.
  Er hat seinem Schwiegervater zum Geburtstag eine Flasche *schottischen Whisky* geschenkt.
  
  Se vuoi provare un *scotch* particolare, ti consiglio quello prodotto nell’isola di Islay.
  Wenn du einen besonderen *Single Malt Whisky* probieren möchtest, empfehle ich dir den aus der Insel Islay.
