Rang: 4743
Wort: tranquillare
Wortart: v
Wort mit Artikel: tranquillare
Femininum / Plural: ''
IPA: ''
Definition: beruhigen, beruhigte, beruhigt
Register: ''
Beispielsätze: |-
  Dopo la discussione con suo fratello, Marco ha provato a *tranquillare* la situazione con parole rassicuranti.
  Nach der Diskussion mit seinem Bruder versuchte Marco, die Situation mit beruhigenden Worten zu *beruhigen*.
  
  Nonostante la delusione per l’esame fallito, la professoressa riesce sempre a *tranquillare* gli studenti.
  Trotz der *Enttäuschung* über die durchgefallene Prüfung schafft es die Professorin immer, die Studenten zu beruhigen.
  
  Il padre, vedendo che il figlio era molto agitato, gli mise una mano sulla spalla per *tranquillarlo*.
  Als der Vater sah, dass der Sohn sehr aufgeregt war, legte er ihm eine Hand auf die Schulter, um ihn zu *beruhigen*.
  
  Credo che sarebbe meglio se tu provassi a *tranquillare* gli animi prima della riunione importante.
  Ich glaube, es wäre besser, wenn du versuchen würdest, die Gemüter vor dem wichtigen Meeting zu *beruhigen*.
  
  Appena arrivò la notizia che il tornado aveva risparmiato il paese, tutti si misero a *tranquillarsi* e festeggiare.
  Sobald die Nachricht kam, dass der Tornado das Dorf verschont hatte, begannen alle, sich zu *beruhigen* und zu feiern.
