Rang: 1527
Wort: rallentare
Wortart: vi
Wort mit Artikel: rallentare
Femininum / Plural: ''
IPA: ''
Definition: langsamer werden, reduzieren
Register: ''
Beispielsätze: |-
  Il traffico *rallentò* di colpo perché c’era un incidente sulla strada principale.
  Der Verkehr *verlangsamte sich* plötzlich, weil es einen Unfall auf der Hauptstraße gab.
  
  Se *rallenterai* il ritmo, riuscirai a finire il progetto senza errori.
  Wenn du das *Tempo verlangsamst*, wirst du das Projekt ohne Fehler abschließen können.
  
  Mi chiedevo perché il treno avesse *rallentato* proprio nel tratto più panoramico.
  Ich fragte mich, warum der Zug genau in der schönsten Strecke *langsamer geworden* war.
  
  L’economia sta per *rallentare* a causa della crisi politica attuale.
  Die Wirtschaft wird sich aufgrund der aktuellen politischen Krise *verlangsamen*.
  
  Prima di rispondere, prese un respiro profondo per *rallentare* il battito del cuore.
  Bevor er antwortete, holte er tief Luft, um den Herzschlag zu *verlangsamen*.
