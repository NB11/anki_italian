Wort: cadere
Wortart: vi
Wort mit Artikel: cadere
Femininum / Plural: ''
IPA: ''
Definition: fallen, hinfallen
Register: ''
Beispielsätze: |-
  Se non attenti, potresti *cadere* dalle scale.
  Wenn du nicht aufpasst, könntest du *fallen* die Treppe hinunter.
  
  Il vaso è *caduto* a terra e si è rotto.
  Die Vase ist zu Boden *gefallen* und kaputtgegangen.
  
  Secondo le previsioni, domani *cadranno* le temperature.
  Laut Vorhersagen werden morgen die Temperaturen *fallen*.
  
  Mi dispiace, ma *cade* ancora la pioggia.
  Es tut mir leid, aber es *fällt* immer noch Regen.
  
  Se *cadessi* nel buio, non saprei dove andare.
  Wenn du im Dunkel *fielst*, wüsste ich nicht, wohin du gehen sollst.
