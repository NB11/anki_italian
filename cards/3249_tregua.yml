Rang: 3249
Wort: tregua
Wortart: n.f
Wort mit Artikel: la tregua
Femininum / Plural: tregue
IPA: ''
Definition: die Waffenruhe, die Pause
Register: ''
Beispielsätze: |-
  Dopo mesi di combattimenti, finalmente è stata raggiunta una *tregua* tra i due paesi.
  Nach Monaten des Kampfes wurde endlich eine *Waffenruhe* zwischen den beiden Ländern erreicht.
  
  Nei negoziati di pace, la *tregua* è stata proposta come primo passo per la riconciliazione.
  In den Friedensverhandlungen wurde die *Waffenruhe* als erster Schritt zur Versöhnung vorgeschlagen.
  
  I soldati hanno approfittato della *tregua* per riposarsi e riorganizzare le truppe.
  Die Soldaten nutzten die *Pause*, um sich auszuruhen und die Truppen neu zu organisieren.
  
  Speriamo che questa *tregua* duri abbastanza a lungo da permettere un dialogo costruttivo.
  Wir hoffen, dass diese *Waffenruhe* lange genug anhält, um einen konstruktiven Dialog zu ermöglichen.
  
  La *tregua* improvvisa ha colto tutti di sorpresa, nessuno se l’aspettava.
  Die plötzliche *Waffenruhe* hat alle überrascht, niemand hatte sie erwartet.
