Rang: 1930
Wort: mistero
Wortart: n.m
Wort mit Artikel: il mistero
Femininum / Plural: misteri
IPA: ''
Definition: das Rätsel, Geheimnis, Mysterium
Register: ''
Beispielsätze: |-
  Molti *misteri* della storia antica non sono mai stati risolti.
  Viele Rätsel* der alten Geschichte sind nie gelöst worden.
  
  Se scoprirai la soluzione di questo *mistero*, riceverai un premio speciale.
  Wenn du die Lösung dieses Rätsels* herausfindest, bekommst du eine besondere Belohnung.
  
  Nonostante le ricerche, il *mistero* della stanza chiusa rimase irrisolto.
  Trotz der Untersuchungen blieb das Rätsel* des verschlossenen Raumes ungelöst.
  
  Credi che esista un *mistero* più grande dell'oceano?
  Glaubst du, dass es ein größeres Rätsel* gibt als den Ozean?
  
  Secondo lo scrittore, ogni *mistero* nasconde una verità nascosta.
  Laut dem Autor* verbirgt sich hinter jedem Rätsel* eine verborgene Wahrheit.
