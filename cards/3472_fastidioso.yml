Rang: 3472
Wort: fastidioso
Wortart: adj
Wort mit Artikel: fastidioso
Femininum / Plural: ''
IPA: ''
Definition: lästig, nervig, ärgerlich
Register: ''
Beispielsätze: |-
  Quel *fastidioso* vicino bussa sempre alle tre di notte con delle scuse ridicole.
  Dieser *nervige* Nachbar klopft immer um drei Uhr nachts mit lächerlichen Ausreden.
  
  Spero che tu non ritenga *fastidioso* se ti chiedo un favore così grande.
  Ich hoffe, du findest es nicht *ärgerlich*, wenn ich dich um so eine große Gefälligkeit bitte.
  
  Era *fastidiosissimo* stare chiusi in casa con quella nebbia fitta che non si alzava mai.
  Es war *verdammt lästig*, im Haus eingeschlossen zu sein mit diesem dichten Nebel, der sich einfach nicht lichtete.
  
  Seppur *fastidioso*, il regolamento impone di indossare il casco in questa categoria di pista.
  Auch wenn es *lästig* ist, schreibt die Regel vor, in dieser Pistenkategorie einen Helm zu tragen.
  
  Hanno definito *fastidioso* quel professor psicopatico che non smetteva di criticare ogni dettaglio.
  Sie nannten ihn *nervig*, diesen psychopathischen Lehrer, der keine einzige Kleinigkeit ausließ zu kritisieren.
