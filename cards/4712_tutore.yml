Rang: 4712
Wort: tutore
Wortart: n.m
Wort mit Artikel: il tutore
Femininum / Plural: tutori
IPA: ''
Definition: der Betreuer, -
Register: ''
Beispielsätze: |-
  Il *tutore* di Marco ha organizzato un incontro per aiutarlo con i compiti.
  Der *Betreuer* von Marco hat ein Treffen organisiert, um ihm bei den Hausaufgaben zu helfen.
  
  Chi è il *tutore* che si occupa dello stage di Luca?
  Wer ist der *Betreuer*, der sich um das Praktikum von Luca kümmert?
  
  Se non fosse per il suo *tutore*, non avrebbe superato l’esame così brillantemente.
  Wenn es nicht seinen *Betreuer* gegeben hätte, hätte er die Prüfung nicht so glänzend bestanden.
  
  Il *tutore* gli ha spiegato l’equazione con pazienza, ma lui non ha ancora capito.
  Der *Betreuer* hat ihm die Gleichung geduldig erklärt, aber er hat es immer noch nicht verstanden.
  
  Avrei voluto ringraziare il mio *tutore* per tutto il supporto durante l’anno.
  Ich hätte meinem *Betreuer* für die gesamte Unterstützung während des Jahres danken wollen.
