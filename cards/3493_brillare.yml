Rang: 3493
Wort: brillare
Wortart: v
Wort mit Artikel: brillare
Femininum / Plural: ''
IPA: ''
Definition: glänzen, leuchten
Register: ''
Beispielsätze: |-
  Le stelle *brillano* intensamente stasera nel cielo limpido.
  Die Sterne *leuchten* heute Abend intensiv am klaren Himmel.
  
  Se avessi una lampada magica, vorrei che *brillasse* sempre.
  Wenn ich eine Zauberlampe hätte, möchte ich, dass sie *leuchtet*.
  
  Il sole *brilla* sulle acque del lago creando riflessi incantevoli.
  Die Sonne *leuchtet* auf dem Wasser des Sees und erzeugt bezaubernde Reflexe.
  
  Secondo le previsioni, domani il cielo *brillerà* di un azzurro intenso.
  Laut der Vorhersage wird der Himmel morgen in einem intensiven Blau *leuchten*.
  
  Era triste vedere come la sua speranza continuasse a *brillare* nonostante tutto.
  Es war traurig zu sehen, wie seine Hoffnung trotz allem weiter *leuchtete*.
