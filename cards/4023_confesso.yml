Rang: 4023
Wort: confesso
Wortart: adj
Wort mit Artikel: confesso
Femininum / Plural: ''
IPA: ''
Definition: geständig
Register: ''
Beispielsätze: |-
  Il prigioniero era *confesso* dopo lunghe indagini.
  Der Gefangene war *geständig* nach langen Untersuchungen.
  
  Non ero *confesso* delle mie azioni, ma non potevo negare tutto.
  Ich war *geständig* in Bezug auf meine Taten nicht, aber ich konnte nicht alles abstreiten.
  
  Anche se *confesso*, non mi sento ancora libero dalla colpa.
  Auch wenn ich *geständig* bin, fühle ich mich noch nicht von der Schuld frei.
  
  L'avvocato sperava che il suo cliente diventasse *confesso* per ottenere una pena minore.
  Der Anwalt hoffte, dass sein Mandant *geständig* wurde, um eine geringere Strafe zu erhalten.
  
  Sei *confesso* di aver sbagliato, ma non vuoi chiedere perdono.
  Du bist *geständig*, einen Fehler gemacht zu haben, aber du willst nicht um Vergebung bitten.
