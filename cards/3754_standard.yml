Rang: 3754
Wort: standard
Wortart: n.m
Wort mit Artikel: lo standard
Femininum / Plural: gli standard
IPA: ''
Definition: der Standard, -s
Register: ''
Beispielsätze: |-
  Il *standard* di vita in questa città è molto alto rispetto ad altre regioni italiane.
  Der *Standard* an Lebensqualität in dieser Stadt ist im Vergleich zu anderen italienischen Regionen sehr hoch.
  
  Non tutti rispettano lo *standard* previsto per la sicurezza sui cantieri edili.
  Nicht alle halten den vorgeschriebenen *Standard* für Sicherheit auf Baustellen ein.
  
  Vorremmo modificare il *standard* attuale per renderlo più accessibile a tutti.
  Wir möchten den aktuellen *Standard* ändern, um ihn für alle zugänglicher zu machen.
  
  L’UE ha fissato degli *standard* rigorosi per le emissioni delle automobili.
  Die EU hat strenge *Standards* für die Emissionen von Autos festgelegt.
  
  Questo prodotto non rispetta più gli *standard* di qualità richiesti dal mercato.
  Dieses Produkt entspricht nicht mehr den Qualitäts*standards*, die der Markt verlangt.
