Beispielsätze: |-
  L'*ospite* ha portato un dono agli abitanti del villaggio.
  Der *Gast* hat den Bewohnern des Dorfes ein Geschenk gebracht.
  
  Chi ha invitato l'*ospite* che non abbiamo ancora visto?
  Wer hat den *Gast* eingeladen, den wir noch nicht gesehen haben?
  
  Nonostante la situazione difficile, l'*ospite* è rimasto calmo e fiducioso.
  *Trotz* der schwierigen Situation blieb der Gast ruhig und zuversichtlich.
  
  Se l'*ospite* fosse partito prima, non avrebbe incontrato il lupo.
  Wäre der *Gast* früher abgefahren, hätte er den Wolf nicht getroffen.
  
  Mi chiedevo se l'*ospite* avrebbe restituito il libro che aveva preso in prestito.
  Ich fragte mich, ob der *Gast* das Buch, das er ausgeliehen hatte, zurückgeben würde.
