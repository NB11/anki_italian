Rang: 716
Wort: azione
Wortart: n.f
Wort mit Artikel: l'azione
Femininum / Plural: azioni
IPA: ''
Definition: die Aktion, -en, die Handlung, -en
Register: ''
Beispielsätze: |-
  Oggi ho deciso di intraprendere una nuova *azione* per migliorare la mia vita.
  Heute habe ich beschlossen, eine neue *Aktion* zu unternehmen, um mein Leben zu verbessern.
  
  L'*azione* dei volontari è stata meravigliosa durante la missione.
  Die *Aktion* der Freiwilligen war während der Mission wunderbar.
  
  Se non affronti questa *azione* con coraggio, non meriterai mai il successo.
  Wenn du diese *Handlung* nicht mutig angehst, wirst du nie Erfolg verdienen.
  
  Credo che ogni *azione* abbia delle conseguenze, che si tratti di un semplice gesto o di una grande impresa.
  Ich glaube, dass jede *Aktion* Konsequenzen hat, sei es eine einfache Geste oder ein großes Unterfangen.
  
  L'*azione* che hai compiuto oggi dimostra il tuo valore, anche se pochissimi lo hanno notato.
  Die *Aktion*, die du heute durchgeführt hast, zeigt deinen Wert, obwohl es nur wenige bemerkt haben.
