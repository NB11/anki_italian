Rang: 4107
Wort: navigare
Wortart: v
Wort mit Artikel: navigare
Femininum / Plural: ''
IPA: ''
Definition: segeln, navigieren
Register: ''
Beispielsätze: |-
  Gli antichi navigatori *navigavano* usando le stelle come guida.
  Die alten Seefahrer *navigierten* mit den Sternen als Orientierung.
  
  Se vuoi *navigare* in internet, devi avere una connessione veloce.
  Wenn du *im Internet surfen* willst, brauchst du eine schnelle Verbindung.
  
  Domani mattina *navigheremo* per ore lungo la costa della Sardegna.
  Morgen früh werden wir stundenlang entlang der Küste Sardiniens *kursieren*.
  
  Nonostante la tempesta, il capitano riuscì a *navigare* verso il porto sicuro.
  Trotz des Sturms gelang es dem Kapitän, zum sicheren Hafen *zu navigieren*.
  
  Vorrei che tu *navigassi* con più prudenza su quei siti sconosciuti.
  Ich wünschte, du würdest beim *Surfen* in jenen unbekannten Seiten vorsichtiger sein.
Audio: ''
Notiz: ''
