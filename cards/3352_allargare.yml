Rang: 3352
Wort: allargare
Wortart: v
Wort mit Artikel: allargare
Femininum / Plural: ''
IPA: ''
Definition: verbreitern, erweitern
Register: ''
Beispielsätze: |-
  L’architetto ha deciso di *allargare* la porta per far passare i mobili più grandi.
  Der Architekt hat beschlossen, die Tür zu *verbreitern*, um größere Möbel durchzubringen.
  
  Se vuoi *allargare* la tua cerchia di amici, partecipa a eventi sociali.
  Wenn du deinen Freundeskreis *erweitern* willst, nimm an gesellschaftlichen Events teil.
  
  Il sindaco ha promesso di *allargare* il parcheggio vicino al municipio.
  Der Bürgermeister hat versprochen, den Parkplatz nahe dem Rathaus zu *vergrößern*.
  
  Ho dovuto *allargare* i pantaloni perché non mi entravano più dopo la dieta.
  Ich musste die Hose *weiter machen*, weil sie nach der Diät nicht mehr passte.
  
  Gli scienziati stanno cercando modi per *allargare* la durata di vita delle batterie.
  Die Wissenschaftler suchen nach Wegen, die Lebensdauer der Batterien zu *verlängern*.
