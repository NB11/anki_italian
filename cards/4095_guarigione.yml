Rang: 4095
Wort: guarigione
Wortart: n.f
Wort mit Artikel: la guarigione
Femininum / Plural: guarigioni
IPA: ''
Definition: die Heilung, -en
Register: ''
Beispielsätze: |-
  Dopo settimane di cure, finalmente si è avuta la *guarigione* completa del paziente.
  Nach Wochen der Behandlung gab es schließlich die vollständige *Heilung* des Patienten.
  
  Credo che la *guarigione* richiederà almeno altri due mesi di fisioterapia.
  Ich glaube, die *Heilung* wird mindestens weitere zwei Monate Physiotherapie erfordern.
  
  La sua *guarigione* è stata una sorpresa per tutti, dato che la prognosi era riservata.
  Seine *Heilung* war für alle eine Überraschung, da die Prognose ungünstig war.
  
  Per accelerare la *guarigione*, il medico le ha consigliato di seguire una dieta equilibrata.
  Um die *Heilung* zu beschleunigen, riet ihr der Arzt zu einer ausgewogenen Ernährung.
  
  Nonostante la ferita fosse grave, con le cure adeguate è avvenuta una rapida *guarigione* dei tessuti.
  Trotz der schweren Verletzung kam es mit den richtigen Behandlungen zu einer schnellen *Heilung* des Gewebes.
