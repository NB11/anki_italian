Rang: 3888
Wort: riparlare
Wortart: v
Wort mit Artikel: riparlare
Femininum / Plural: ''
IPA: ''
Definition: wieder sprechen, erneut besprechen
Register: ''
Beispielsätze: |-
  Vorrei *riparlare* con te di questo problema più tardi, quando saremo più tranquilli.
  Ich möchte das Problem später mit dir *wieder besprechen*, wenn wir ruhiger sind.
  
  Dopo la riunione, il direttore ha promesso di *riparlare* della proposta con il comitato.
  Nach der Besprechung hat der Direktor versprochen, den Vorschlag mit dem Ausschuss *erneut zu besprechen*.
  
  È inutile *riparlare* di un argomento che è già stato deciso così chiaramente.
  Es ist sinnlos, über ein Thema *erneut zu sprechen*, das bereits so klar beschlossen wurde.
  
  Se *riparliamo* di politica, finisce sempre che litighiamo.
  Wenn wir *wieder über Politik sprechen*, endet es immer damit, dass wir streiten.
  
  Ha giurato che non avrebbe mai più *riparlato* con la sua ex, ma la nostalgia a volte lo costringeva.
  Er hatte geschworen, nie wieder mit seiner Ex zu *sprechen*, doch manchmal zwang ihn die Sehnsucht dazu.
