Rang: 1390
Wort: ginocchio
Wortart: n.m
Wort mit Artikel: il ginocchio
Femininum / Plural: ginocchia
IPA: ''
Definition: das Knie, -e
Register: ''
Beispielsätze: |-
  Mi sono fatto male al *ginocchio* mentre giocavo a calcio.
  Ich habe mir beim Fußballspielen das *Knie* verletzt.
  
  L'ispettore controllò attentamente il *ginocchio* ferito del sospettato.
  Der *Inspektor* untersuchte sorgfältig das verletzte Knie des Verdächtigen.
  
  Dopo la caduta, il dolore al *ginocchio* era così forte che non riusciva a camminare.
  Nach dem Sturz war der Schmerz im *Knie* so stark, dass er nicht gehen konnte.
  
  La nonna gli mise un bendaggio freddo sul *ginocchio* gonfio.
  Die Großmutter legte ihm einen kalten Umschlag auf das geschwollene *Knie*.
  
  Nonostante il *ginocchio* dolente, ha insistito per partecipare alla maratona.
  Trotz des schmerzenden *Knies* besteht er darauf, am Marathon teilzunehmen.
