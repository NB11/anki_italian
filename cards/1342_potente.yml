Rang: 1342
Wort: potente
Wortart: adj
Wort mit Artikel: potente
Femininum / Plural: ''
IPA: ''
Definition: mächtig, stark, leistungsstark
Register: ''
Beispielsätze: |-
  Il computer *potente* di Luca riesce a risolvere problemi complessi in pochi secondi.
  Der *leistungsstarke* Computer von Luca schafft es, komplexe Probleme in Sekunden zu lösen.
  
  Ho visto un motore *potente* che può spingere questa barca a ottanta chilometri all’ora.
  Ich habe einen *mächtigen* Motor gesehen, der dieses Boot auf achtzig Stundenkilometer bringen kann.
  
  Nonostante le pessime condizioni atmosferiche, l’aereo ha decollato grazie ai suoi motori *potenti* e alla bravura del pilota.
  Trotz der *miserablen* Wetterbedingungen ist das Flugzeug dank seiner starken Triebwerke und der Fähigkeiten des Piloten gestartet.
  
  Le parole particolari di sua madre, pronunciate con una voce *potente*, hanno convinto tutti ad aiutarla nel giardino.
  Die *besonderen* Worte seiner Mutter, die mit einer starken Stimme gesprochen wurden, haben alle überzeugt, ihr im Garten zu helfen.
  
  Se avessi un’auto *potente* come quella, potrei raggiungere la spiaggia a cento chilometri all’ora senza problemi.
  Wenn ich ein *leistungsstarkes* Auto wie dieses hätte, könnte ich den Strand mit hundert Stundenkilometern ohne Probleme erreichen.
