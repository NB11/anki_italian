Rang: 2856
Wort: oscar
Wortart: n.m
Wort mit Artikel: il oscar
Femininum / Plural: gli *oscar*
IPA: ''
Definition: der Oscar, -
Register: ''
Beispielsätze: |-
  Ieri sera hanno assegnato gli *Oscar* nella hall principale del teatro.
  Gestern Abend wurden die *Oscars* in der HauptSaal des Theaters verliehen.
  
  Non so se vincerò un *Oscar*, ma ci provo con tutte le mie forze.
  Ich weiß nicht, ob ich einen *Oscar* gewinne, aber ich gebe mir alle Mühe.
  
  Se avessi guadagnato più soldi, avrei acquistato una statuetta dell'*Oscar* come quella.
  Hätte ich mehr Geld verdient, hätte ich eine *Oscar*-Statuette wie diese gekauft.
  
  Mi hanno detto che il film che ho amato di più non ha nemmeno ricevuto la nomination per l'*Oscar*.
  Man hat mir gesagt, dass der Film, den ich am meisten mochte, nicht einmal für den *Oscar* nominiert wurde.
  
  Appena avrà l'*Oscar* in mano, correrà a posarlo sullo scaffale più alto.
  Sobald er den *Oscar* in den Händen hält, wird er ihn auf das höchste Regal stellen.
