Rang: 3713
Wort: scortare
Wortart: vt
Wort mit Artikel: scortare
Femininum / Plural: ''
IPA: ''
Definition: begleiten, eskortieren
Register: ''
Beispielsätze: |-
  La polizia ha dovuto *scortare* il testimone fino al tribunale per proteggerlo dalla stampa ostile.
  Die Polizei musste den Zeugen zum Gericht *begleiten*, um ihn vor der feindseligen Presse zu schützen.
  
  Se vuoi mangiare le olive piccanti, fammi sapere, ti *scorterò* alla dispensa.
  Wenn du die scharfen Oliven essen möchtest, sag Bescheid, ich *werde* dich zur Vorratskammer begleiten.
  
  Il fantino era così abile che riusciva a *scortare* il cavallo anche tra la folla senza problemi.
  Der Reiter war so geschickt, dass er das Pferd selbst durch die Menge *eskortieren* konnte.
  
  Nonostante le critiche, hanno deciso di *scortare* il progetto fino alla sua realizzazione.
  Trotz der Kritik haben sie beschlossen, das Projekt bis zu seiner Umsetzung *zu begleiten*.
  
  Vorrei che qualcuno mi *scortasse* in questa serata solitaria, ma purtroppo non ho amici disponibili.
  Ich wünschte, jemand würde mich an diesem einsamen Abend *eskortieren*, aber leider habe ich keine verfügbaren Freunde.
