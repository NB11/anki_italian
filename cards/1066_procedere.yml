Rang: 1066
Wort: procedere
Wortart: v
Wort mit Artikel: procedere
Femininum / Plural: ''
IPA: ''
Definition: fortfahren, vorgehen, *procedere*
Register: ''
Beispielsätze: |-
  Dopo l'arresto del sospettato, gli inquirenti devono *procedere* con l’indagine per trovare prove concrete.
  Nach der *Verhaftung* des Verdächtigen müssen die Ermittler mit der Untersuchung fortfahren, um handfeste Beweise zu finden.
  
  Se non vuoi *procedere* con il progetto, dimmelo ora così possiamo informare il direttore.
  Wenn du nicht mit dem *Projekt* fortfahren möchtest, sag es mir jetzt, damit wir den Leiter informieren können.
  
  Stavo per *procedere* all’acquisto, ma poi ho cancellato tutto dalla memoria perché ho cambiato idea.
  Ich war dabei, den *Kauf* vorzunehmen, doch dann habe ich alles aus dem Gedächtnis gelöscht, weil ich es mir anders überlegt habe.
  
  Nonostante le difficoltà, il medico ha continuato a *procedere* con la terapia per curare al meglio il paziente.
  Trotz der Schwierigkeiten setzte der Arzt die *Behandlung* fort, um den Patienten bestmöglich zu heilen.
  
  Appena il poliziotto ha smesso di puntare la telecamera sul sospettato, questo ha iniziato a *procedere* verso l’uscita del locale.
  Sobald der Polizist aufgehört hatte, die *Videokamera* auf den Verdächtigen zu richten, begann dieser, auf den Ausgang des örtlichen Ladens zuzumarschieren.
