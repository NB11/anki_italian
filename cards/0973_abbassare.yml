Rang: 973
Wort: abbassare
Wortart: v
Wort mit Artikel: abbassare
Femininum / Plural: ''
IPA: ''
Definition: senken, herunterlassen, herabsetzen
Register: ''
Beispielsätze: |-
  Devi *abbassare* la voce quando parli in pubblico per non disturbare gli altri.
  Du musst *die Stimme* senken, wenn du vor Publikum sprichst, um andere nicht zu stören.
  
  Per favore, *abbassa* il volume della televisione, altrimenti non riesco a sentire il telefono.
  Bitte *verringere* die Lautstärke des Fernsehers, sonst kann ich das Telefon nicht hören.
  
  Se *abbasserai* la temperatura del forno, la torta uscirà più morbida.
  Wenn du die Temperatur des Ofens *herabsetzt*, wird der Kuchen weicher.
  
  Il poliziotto gli ordinò di *abbassare* le mani per non sembrare minaccioso.
  Der Polizist befahl ihm, *die Hände* zu senken, um nicht bedrohlich zu wirken.
  
  Anche se mi aveva promesso di *abbassare* il prezzo, non mantenne la parola data.
  Auch wenn er mir versprach, den Preis zu *senken*, hielt er sein Versprechen nicht ein.
Audio: ''
Notiz: ''
