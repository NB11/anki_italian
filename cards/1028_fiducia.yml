Rang: 1028
Wort: fiducia
Wortart: n.f
Wort mit Artikel: la fiducia
Femininum / Plural: fiducie
IPA: ''
Definition: das Vertrauen, das Zutrauen
Register: ''
Beispielsätze: |-
  Ho *fiducia* nei mei amici.
  Ich habe *Vertrauen* in meine Freunde.
  
  Perdette *fiducia* nelle sue capacità immediatamente dopo l’incidente alla bicicletta.
  Er verlor das *Vertrauen* in seine Fähigkeiten sofort nach dem Fahrradunfall.
  
  Lei ha *fiducia* che suo fratello dica la verità: una questione d’onore.
  Sie *vertraut* darauf, dass ihr Bruder die Wahrheit gibt — eine Frage der Ehre.
  
  Senza *fiducia* tra marito e moglie non può durare il matrimonio.
  Ohne *Vertrauen* zwischen Ehemann und Ehefrau kann die Ehe nicht dauern.
  
  Il giudice ha perso *fiducia* nel testimone dopo che questi aveva reso dichiarazioni contraddittorie.
  Der *Richter* verlor das Vertrauen in den Zeugen, nachdem dieser widersprüchliche Aussagen gemacht hatte.
