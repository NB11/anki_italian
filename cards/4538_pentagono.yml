Rang: 4538
Wort: pentagono
Wortart: n.m
Wort mit Artikel: il pentagono
Femininum / Plural: pentagoni
IPA: ''
Definition: das Fünfeck, -e
Register: ''
Beispielsätze: |-
  Il *pentagono* è una figura geometrica con cinque lati.
  Das *Fünfeck* ist eine geometrische Figur mit fünf Seiten.
  
  Nell’esercizio di matematica abbiamo disegnato un *pentagono* perfetto.
  In der Matheübung haben wir ein perfektes *Fünfeck* gezeichnet.
  
  L’analista ha spiegato che il *pentagono* regolare ha tutti gli angoli di 108 gradi.
  Der Analyst erklärte, dass das regelmäßige *Fünfeck* alle Winkel von 108 Grad hat.
  
  Gli antichi greci conoscevano già le proprietà del *pentagono* inscritto in una circonferenza.
  Die alten Griechen kannten bereits die Eigenschaften des *Fünfecks*, das in einen Kreis einbeschrieben ist.
  
  Nonostante la complessità, è possibile calcolare l’area di un *pentagono* irregolare con alcune formule specifiche.
  Trotz der Komplexität lässt sich die Fläche eines unregelmäßigen *Fünfecks* mit spezifischen Formeln berechnen.
