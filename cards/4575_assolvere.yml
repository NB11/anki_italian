Rang: 4575
Wort: assolvere
Wortart: v
Wort mit Artikel: assolvere
Femininum / Plural: ''
IPA: ''
Definition: befreien, freisprechen, erfüllen, absolvieren
Register: ''
Beispielsätze: |-
  Il giudice ha deciso di *assolvere* l’imputato per mancanza di prove.
  Der Richter hat beschlossen, den Angeklagten *freizusprechen* wegen mangelnder Beweise.
  
  Nonostante le difficoltà, Maria è riuscita a *assolvere* tutti gli esami con voti eccellenti.
  Trotz der Schwierigkeiten ist es Maria gelungen, alle Prüfungen mit *hervorragenden* Noten zu absolvieren.
  
  Il compito del professore è quello di *assolvere* i suoi doveri con dedizione e scrupolo.
  Die Aufgabe des Professors ist es, seine Pflichten mit Hingabe und *Gründlichkeit* zu erfüllen.
  
  Se avessi più tempo, potrei *assolvere* questo incarico in modo impeccabile.
  Wenn ich mehr Zeit hätte, könnte ich diesen Auftrag *mustergültig* erledigen.
  
  La polizia ha già provveduto a *assolvere* le indagini, ma non tutti sono convinti della sua conclusione.
  Die Polizei hat bereits dafür gesorgt, die Ermittlungen *abzuschließen*, aber nicht alle sind von ihrem Fazit überzeugt.
