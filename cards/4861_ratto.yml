Wort: ratto
Wortart: adj
Wort mit Artikel: ratto
Femininum / Plural: ''
IPA: ''
Definition: zu schnell, zu hastig
Register: ''
Beispielsätze: |-
  Ha preso una decisione *ratta* senza riflettere abbastanza.
  Er traf eine *zu schnelle* Entscheidung, ohne genug nachzudenken.
  
  Corri *ratto* prima che arrivi la polizia!
  Lauf *zu hastig*, bevor die Polizei eintrifft!
  
  Nonostante la *ratta* fuga, il ladro è stato catturato dopo pochi isolati.
  Trotz der *zu hastigen* Flucht wurde der Dieb nach wenigen Straßen festgenommen.
  
  Se avessi parlato *ratta*, ora non saremmo in questa situazione imbarazzante.
  Wenn ich *zu schnell* gesprochen hätte, wären wir jetzt nicht in dieser peinlichen Situation.
  
  Non è *ratto* nei suoi movimenti, ma sa sempre quello che fa.
  Er ist nicht *zu hastig* in seinen Bewegungen, aber er weiß immer, was er tut.
