Rang: 4068
Wort: ambizione
Wortart: n.f
Wort mit Artikel: l'ambizione
Femininum / Plural: ambizioni
IPA: ''
Definition: der Ehrgeiz, -e
Register: ''
Beispielsätze: |-
  Nonostante la sua *ambizione* sfrenata, non è riuscito a ottenere il posto che desiderava.
  Trotz seines *Ehrgeizes* schaffte er es nicht, die Stelle zu bekommen, die er wollte.
  
  La *ambizione* di molti giovani li spinge a studiare con grande impegno.
  Die *Ehrgeiz* vieler junger Leute motiviert sie dazu, mit großem Einsatz zu lernen.
  
  Era convinto che la sua *ambizione* dovesse essere nascosta agli altri per non sembrare arrogante.
  Er war überzeugt, dass er seinen *Ehrgeiz* vor anderen verbergen musste, um nicht arrogant zu wirken.
  
  Se non avessi avuto tanta *ambizione*, non avrei mai fondato la mia azienda.
  Hätte ich nicht so viel *Ehrgeiz* besessen, hätte ich mein Unternehmen nie gegründet.
  
  La *ambizione* che nutriva per il successo lo rendeva spesso insoddisfatto dei risultati ottenuti.
  Der *Ehrgeiz*, den er für den Erfolg hegte, machte ihn oft unzufrieden mit den erreichten Ergebnissen.
