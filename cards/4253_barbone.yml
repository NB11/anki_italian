Rang: 4253
Wort: barbone
Wortart: n.m
Wort mit Artikel: il barbone
Femininum / Plural: barboni
IPA: ''
Definition: der Obdachlose, -n
Register: ''
Beispielsätze: |-
  Il *barbone* dormiva sotto il ponte vicino al fiume.
  Der *Obdachlose* schlief unter der Brücke nahe dem Fluss.
  
  Se vedi un *barbone*, offrigli qualcosa da mangiare, potrebbe essere affamato.
  Wenn du einen *Obdachlosen* siehst, biete ihm etwas zu essen an, er könnte hungrig sein.
  
  L’associazione aiuta i *barboni* a trovare un lavoro e una casa.
  Die Organisation hilft den *Obdachlosen*, einen Job und eine Wohnung zu finden.
  
  Il sindaco ha annunciato che costruirà nuovi rifugi per i *barboni* in città.
  Der Bürgermeister hat angekündigt, dass er neue Unterkünfte für die *Obdachlosen* in der Stadt bauen wird.
  
  Sebbene fosse un *barbone*, aveva una cultura e una dignità che sorprendevano tutti.
  Obwohl er ein *Obdachloser* war, hatte er eine Bildung und Würde, die alle überraschten.
