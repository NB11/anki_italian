Rang: 3711
Wort: furia
Wortart: n.f
Wort mit Artikel: la furia
Femininum / Plural: furie
IPA: ''
Definition: die Wut, die Raserei
Register: ''
Beispielsätze: |-
  Quando sente parlare di corruzione, prova una *furia* incontrollabile.
  Wenn er von Korruption hört, überkommt ihn eine *Wut*.
  
  Per la tua *furia*, hai rotto anche la sedia più resistente!
  Wegen deiner *Raserei* hast du sogar den stabilsten Stuhl kaputt gemacht!
  
  Nonostante la *furia* dell’avversario, il campione rimase calmo e vinse il match.
  Obwohl der Gegner in *Wut* geriet, blieb der Champion ruhig und gewann das Spiel.
  
  Se continui così, la sua *furia* sarà inevitabile: preparati a scusarti.
  Wenn du so weitermachst, wird seine *Wut* unvermeidlich sein – bereite dich auf eine Entschuldigung vor.
  
  La *furia* degli elementi durante la tempesta lasciò tutti senza parole.
  Die *Raserei* der Elemente während des Sturms ließ alle sprachlos zurück.
