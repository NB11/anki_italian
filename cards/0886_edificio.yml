Rang: 886
Wort: edificio
Wortart: n.m
Wort mit Artikel: l'edificio
Femininum / Plural: gli edifici
IPA: ''
Definition: das Gebäude, -
Register: ''
Beispielsätze: |-
  L'*edificio* che vedi lì è stato costruito nel 1920 e ospita una biblioteca molto antica.
  Das *Gebäude*, das du siehst, wurde 1920 gebaut und beherbergt eine sehr alte Bibliothek.
  
  Il colonnello ha ordinato di evacuare l'*edificio* dopo aver ricevuto un segnale di pericolo.
  Der Oberst befahl, das *Gebäude* zu evakuieren, nachdem er ein Gefahrensignal erhalten hatte.
  
  Se avessi saputo che l'*edificio* sarebbe stato chiuso per restauri, non sarei venuto oggi.
  Wenn ich gewusst hätte, dass das *Gebäude* wegen Renovierungen geschlossen sein würde, wäre ich heute nicht gekommen.
  
  Nonostante le differenze di stile, tutti gli *edifici* del quartiere si integrano bene nel paesaggio urbano.
  Trotz der Stilunterschiede fügen sich alle *Gebäude* des Viertels gut in die städtische Landschaft ein.
  
  Appena uscito dall'*edificio*, ho ritrovato la mia scatola delle medicine che credevo perduta.
  Sobald ich aus dem *Gebäude* herauskam, fand ich meine Medikamentenschachtel wieder, die ich verloren glaubte.
