Beispielsätze: |-
  Guarda, c'è un insetto piccolo vicino al *margine* del tavolo.
  Schau, da ist ein kleines Insekt in der Nähe des *Randes* des Tisches.
  
  Il *margine* di questo libro è troppo stretto per scrivere appunti.
  Der *Rand* dieses Buches ist zu schmal, um Notizen zu schreiben.
  
  Sul *margine* della carta ho disegnato una linea per separare le due sezioni.
  Am *Rand* des Papiers habe ich eine Linie gezeichnet, um die beiden Abschnitte zu trennen.
  
  Si è seduto sul *margine* del letto e ha sospirare profondamente.
  Er hat sich auf den *Rand* des Bettes gesetzt und tief geseufzt.
  
  Non superare il *margine* di velocità indicato dal limite.
  Überschreite nicht den *Rand* der Geschwindigkeit, der durch das Limit angezeigt wird.
