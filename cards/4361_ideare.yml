Rang: 4361
Wort: ideare
Wortart: vt
Wort mit Artikel: ideare
Femininum / Plural: ''
IPA: ''
Definition: imaginieren, ersinnen
Register: ''
Beispielsätze: |-
  L'architetto ha *ideato* un ponte che unisce due quartieri della città.
  Der *Architekt* hat eine Brücke ersonnen, die zwei Stadtteile verbindet.
  
  Se *ideassi* un romanzo, scriverei di un detective che risolvesse il terrorismo con l’aiuto di un server sicuro.
  Wenn ich einen Roman *ersinnen* würde, würde ich von einem Detektiv schreiben, der Terrorismus mit Hilfe eines sicheren Servers löst.
  
  La polizia sospetta che un gruppo clandestino stia *ideando* un attacco contro la stazione ferroviaria.
  Die Polizei vermutet, dass eine *heimliche* Gruppe einen Angriff gegen den Bahnhof plant.
  
  Ho *ideato* una soluzione al problema che ci affligge da mesi, ma nessuno sembra capire la motivazione dietro di essa.
  Ich habe eine Lösung für das Problem *ersonnen*, das uns seit Monaten quält, aber niemand scheint die Motivation dahinter zu verstehen.
  
  Anche se *ideassi* il piano perfetto, servirebbe qualcuno che lo realizzi, come un paramedico pronto all’azione.
  Auch wenn ich den *perfekten* Plan ausdenken würde, bräuchte es jemanden, der ihn umsetzt – etwa einen Sanitäter, der bereit ist zu handeln.
