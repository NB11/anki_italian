Rang: 1941
Wort: benzina
Wortart: n.f
Wort mit Artikel: la benzina
Femininum / Plural: benzine
IPA: ''
Definition: das Benzin, -e
Register: ''
Beispielsätze: |-
  Ho bisogno di *benzina* per il mio motorino.
  Ich brauche *Benzin* für mein Moped.
  
  Al distributore ho chiesto dove si trova l'erogatore di *benzina* verde.
  Am Tankstellenautomaten habe ich gefragt, wo sich der *Benzin*-Auslass für Super befindet.
  
  Nonostante la *benzina* fosse cara, abbiamo continuato il viaggio.
  Trotz des teuren *Benzins* setzten wir die Reise fort.
  
  Se finisce la *benzina*, il motore smette di funzionare.
  Wenn das *Benzin* ausgeht, bleibt der Motor stehen.
  
  La stazione di servizio dove ho fatto rifornimento di *benzina* è chiusa oggi.
  Die Tankstelle, an der ich *Benzin* getankt habe, ist heute geschlossen.
