Rang: 4396
Wort: stretta
Wortart: n.f
Wort mit Artikel: la stretta
Femininum / Plural: strette
IPA: ''
Definition: der Griff, die *Enge*
Register: ''
Beispielsätze: |-
  Ho sentito una *stretta* improvvisa al petto e ho chiamato il paramedico immediatamente.
  Ich spürte einen plötzlichen *Griff* an der Brust und rief sofort den Sanitäter.
  
  La *stretta* della mano del dottore mi rassicurò che tutto sarebbe andato bene.
  Der *Griff* der Hand des Arztes beruhigte mich, dass alles gut ausgehen würde.
  
  Nonostante la *stretta* del tempo, riuscì a consegnare il progetto puntuale come sempre.
  Trotz der *Enge* der Zeit schaffte er es, das Projekt pünktlich wie immer abzugeben.
  
  La polizia ha effettuato una *stretta* nel quartiere dopo la segnalazione di attività sospette.
  Die Polizei führte eine *Eroberung* im Viertel nach dem Hinweis auf verdächtige Aktivitäten durch.
  
  La *stretta* dell’abbraccio di tua madre è qualcosa che non dimenticherai mai.
  Die *Enge* der Umarmung deiner Mutter ist etwas, das du nie vergessen wirst.
