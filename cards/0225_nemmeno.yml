Rang: 225
Wort: nemmeno
Wortart: adv
Wort mit Artikel: nemmeno
Femininum / Plural: ''
IPA: ''
Definition: auch nicht, nicht einmal
Register: ''
Beispielsätze: |-
  Non ho *nemmeno* fame oggi.
  Ich habe *nicht einmal* heute Hunger.
  
  *Nemmeno* io so cosa fare.
  *Auch ich* weiß nicht, was ich tun soll.
  
  Non è venuto, *nemmeno* dopo la chiamata.
  Er ist nicht gekommen, *nicht einmal* nach dem Anruf.
  
  Hai provato a chiedere? – No, *nemmeno* quello.
  Hast du gefragt? – Nein, *nicht einmal das*.
  
  Se non riesci tu, *nemmeno* io ci riuscirò.
  Wenn du es nicht schaffst, werde *ich es auch nicht* schaffen.
