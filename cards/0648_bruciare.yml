Rang: 648
Wort: bruciare
Wortart: v
Wort mit Artikel: bruciare
Femininum / Plural: ''
IPA: ''
Definition: brennen, anzünden
Register: ''
Beispielsätze: |-
  Il fuoco *brucia* la legna nel camino mentre leggiamo un libro interessante.
  Das Feuer *brennt* das Holz im Kamin, während wir ein *interessantes* Buch lesen.
  
  Se non spegni subito la candela, *brucerà* tutto il biglietto della lotteria!
  Wenn du die Kerze nicht sofort löschst, *wird* das ganze *Los*abbrennen**.
  
  Il detective sapeva che qualcuno aveva *bruciato* le prove nel forno della cucina.
  Der **Detektiv* wusste, dass jemand die Beweise im Backofen verbrannt* hatte.
  
  Sono stato così imprevidente da dimenticare che la griglia *brucia* tutto se la metti troppo vicino al cibo.
  Ich war so unvorsichtig, zu vergessen, dass der Grill alles *verbrennt*, wenn man ihn zu nah ans Essen stellt.
  
  Avrei voluto *bruciare* le lettere della mia vecchia relazione, ma mi sono fermato a metà.
  Ich hätte die Briefe aus meiner alten **Beziehung* fast verbrannt, aber ich blieb in der Hälfte* stecken.
