  Dicono che il sole *bruciasse* troppo forte oggi.
  Sie sagen, dass die Sonne heute zu stark *gebrannt* hat.
  
  Vorresti *bruciare* i ricordi dolorosi o dimenticarli?
  Möchtest du schmerzhafte Erinnerungen *verbrennen* oder einfach vergessen?
