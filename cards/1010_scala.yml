Rang: 1010
Wort: scala
Wortart: n.f
Wort mit Artikel: la scala
Femininum / Plural: scale
IPA: ''
Definition: die Treppe, -n
Register: ''
Beispielsätze: |-
  Saliamo *scala* per raggiungere il nostro appartamento al terzo piano.
  Wir steigen die *Treppe* hinauf, um zu unserer Wohnung im dritten Stock zu gelangen.
  
  La *scala* di emergenza è dietro l’angolo, sotto il cartello giallo.
  Die Notfall-*Treppe* befindet sich hinter der Ecke, unter dem gelben Schild.
  
  Mentre scendevo *scala*, ho incontrato il vicino che saliva con la spesa.
  Als ich die *Treppe* hinabstieg, traf ich den Nachbarn, der mit seinen Einkäufen hinaufging.
  
  Se non ci fossero gli ascensori, dovremmo sempre usare *la scala* e scale sarebbero molto faticose.
  Wenn es keine Aufzüge gäbe, müssten wir immer die *Treppe* benutzen und Treppen wären sehr anstrengend.
  
  Hai già trovato il biglietto che ho lasciato sulla *scala* mobile qualche giorno fa?
  Hast du den Zettel schon gefunden, den ich vor ein paar Tagen auf der Roll-*Treppe* liegen gelassen habe?
