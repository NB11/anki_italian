Rang: 3339
Wort: acceso
Wortart: adj
Wort mit Artikel: acceso
Femininum / Plural: ''
IPA: ''
Definition: angeschaltet, eingeschaltet
Register: ''
Beispielsätze: |-
  La lampada è *accesa* tutta la notte perché nessuno si ricordava di spegnerla.
  Die Lampe blieb die ganze Nacht *eingeschaltet*, weil sich niemand daran erinnerte, sie auszuschalten.
  
  Hai già verificato se il forno è ancora *acceso*?
  Hast du schon nachgeprüft, ob der Ofen noch *angeschaltet* ist?
  
  Era così buio che tutti i fari delle macchine sarebbero dovuti rimanere *accesi*.
  Es war so dunkel, dass alle Scheinwerfer der Autos *eingeschaltet* bleiben hätten müssen.
  
  Non appena il sole spunta, la luce *accesa* nella stanza diventa inutile.
  Sobald die Sonne aufgeht, wird das *eingeschaltete* Licht im Zimmer überflüssig.
  
  Se avessi spento il televisore mentre uscivi, ora non starebbe ancora *acceso* e risparmieremmo corrente.
  Wenn du den Fernseher beim Rausgehen ausgeschaltet hättest, wäre er jetzt nicht mehr *eingeschaltet* und wir würden Strom sparen.
