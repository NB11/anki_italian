Rang: 4548
Wort: intrufolare
Wortart: v
Wort mit Artikel: intrufolare
Femininum / Plural: ''
IPA: ''
Definition: sich einschleichen, sich einschleichen
Register: ''
Beispielsätze: |-
  Il ladro ha provato a *intrufolarsi* nella villa senza fare rumore.
  Der Dieb versuchte sich *einzuschleichen* in die Villa ohne Lärm zu machen.
  
  Se non stai attento, il gattino può *intrufolarsi* anche lì dove non vorresti.
  Wenn du nicht aufpasst, kann sich das Kätzchen *einschleichen* wo du es nicht möchtest.
  
  Secondo le voci, qualcuno si è *intrufolato* tra i concorrenti durante la gara.
  Gerüchten zufolge hat sich jemand unter die *Konkurrenten* eingeschlichen während des Wettbewerbs.
  
  Mi dispiace, ma non è giusto che tu *intrufoli* le tue opinioni come se fossero verità assolute.
  Es tut mir leid, aber es ist nicht richtig, dass du deine Meinungen *einschleichst*, als wären sie absolute Wahrheiten.
  
  Nonostante la discrezione, qualcuno si è *intrufolato* durante la cerimonia di rinnovamento della signoria.
  Trotz der *Diskretion* hat sich jemand während der Erneuerungszeremonie der Herrschaft eingeschlichen.
