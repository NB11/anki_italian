Rang: 3869
Wort: pianoforte
Wortart: n.m
Wort mit Artikel: il pianoforte
Femininum / Plural: pianoforti
IPA: ''
Definition: das Klavier, -e
Register: ''
Beispielsätze: |-
  Mio figlio suona *pianoforte* da quando aveva cinque anni.
  Mein Sohn spielt seit seinem fünften Lebensjahr *Klavier*.
  
  Per essere un *pianoforte* così antico, il suono è ancora molto chiaro.
  Für ein so altes *Klavier* klingt der Ton noch immer sehr klar.
  
  Non sapevo che avessi un *pianoforte* a coda in salotto!
  Ich wusste nicht, dass du einen Flügel im Wohnzimmer hast!
  
  Devi accordare *pianoforte* prima di ogni concerto, altrimenti le note non suonano giuste.
  Du musst das *Klavier* vor jedem Konzert stimmen, sonst klingen die Töne nicht richtig.
  
  Mentre il nonno riparava *pianoforte*, ho imparato quanto sia delicato questo strumento.
  Während mein Opa das *Klavier* reparierte, habe ich gelernt, wie empfindlich dieses Instrument ist.
