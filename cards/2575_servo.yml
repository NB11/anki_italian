Rang: 2575
Wort: servo
Wortart: n.m
Wort mit Artikel: il servo
Femininum / Plural: servi
IPA: ''
Definition: der Diener, -
Register: ''
Beispielsätze: |-
  Il *servo* portò il vino al signore durante la cena.
  Der *Diener* brachte dem Herrn während des Abendessens den Wein.
  
  Chi ha assunto quel *servo* che si è licenziato ieri?
  Wer hat diesen *Diener* eingestellt, der gestern gekündigt hat?
  
  Sebbene il *servo* fosse stanco, continuò a lavorare fino a tardi.
  Obwohl der *Diener* müde war, arbeitete er bis spät weiter.
  
  Avrei voluto che il *servo* avesse più considerazione per i miei amici!
  Ich hätte gewünscht, dass der *Diener* mehr Rücksicht auf meine Freunde genommen hätte!
  
  Nel romanzo, il *servo* scoprì un segreto che avrebbe cambiato tutto.
  Im Roman entdeckte der *Diener* ein Geheimnis, das alles verändern würde.
