Rang: 2398
Wort: scorrere
Wortart: vi
Wort mit Artikel: scorrere
Femininum / Plural: ''
IPA: ''
Definition: fließen, ablaufen, vorbeiziehen
Register: ''
Beispielsätze: |-
  Il fiume *scorre* lentamente attraverso la valle verdeggiante.
  Der Fluss fließt langsam durch das grüne Tal.
  
  Se l’acqua non *scorre* bene, dobbiamo pulire i tubi della cucina.
  Wenn das Wasser nicht gut *fließt*, müssen wir die Rohre in der Küche reinigen.
  
  Mentre leggevo, le lacrime mi *scorrevano* sulle guance senza che me ne accorgessi.
  Während ich las, *flossen* mir die Tränen über die Wangen, ohne dass ich es bemerkte.
  
  Il tempo *scorre* inesorabile, portando con sé ricordi e nuove preoccupazioni.
  Die Zeit *fließt* unaufhaltsam dahin und bringt Erinnerungen und neue Sorgen mit sich.
  
  Ti garantisco che il progetto *scorrerà* senza intoppi, purché segua le istruzioni ragionevoli del responsabile.
  Ich versichere dir, dass das Projekt *ablaufen* wird, ohne Probleme zu machen, solange du den vernünftigen Anweisungen des Verantwortlichen folgst.
