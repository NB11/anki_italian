Rang: 279
Wort: tirare
Wortart: vt
Wort mit Artikel: tirare
Femininum / Plural: ''
IPA: ''
Definition: ziehen, werfen, schießen
Register: ''
Beispielsätze: |-
  Posso *tirare* questo cassetto? È bloccato.
  Kann ich *ziehen* diese Schublade? Sie ist blockiert.
  
  *Tiriamo* un calcio al pallone dopo pranzo.
  Lass uns *schießen* einen Ball nach dem Mittagessen.
  
  Il cane ha *tirato* il guinzaglio con forza.
  Der Hund hat *gezogen* die Leine mit Kraft.
  
  Se non *tiri*, perderemo la partita!
  Wenn du nicht *wirfst*, werden wir das Spiel verlieren!
  
  Avrei voluto che tu *tirassi* più forte ieri.
  Ich hätte gewollt, dass du *gezogen* hättest stärker gestern.
