Rang: 918
Wort: medicina
Wortart: n.f
Wort mit Artikel: la medicina
Femininum / Plural: medicine
IPA: ''
Definition: das Medikament, -e
Register: ''
Beispielsätze: |-
  Devo prendere *medicina* tutte le mattine prima di colazione.
  Ich muss *Medikamente* jeden Morgen vor dem Frühstück nehmen.
  
  Il medico mi ha prescritto una nuova *medicina* per l’emicrania.
  Der Arzt hat mir ein neues *Medikament* gegen Migräne verschrieben.
  
  Nonostante l’effetto della *medicina*, il dolore non è ancora del tutto scomparso.
  Trotz der Wirkung des *Medikaments* ist der Schmerz noch nicht ganz verschwunden.
  
  Se non prendi regolarmente *medicina*, rischi di stare peggio.
  Wenn du die *Medikamente* nicht regelmäßig nimmst, riskierst du, dich schlechter zu fühlen.
  
  La *medicina* che hai preso ieri aveva un sapore amarissimo.
  Das *Medikament*, das du gestern genommen hast, hatte einen extrem bitteren Geschmack.
