Rang: 1162
Wort: pilota
Wortart: n.m
Wort mit Artikel: il pilota
Femininum / Plural: piloti
IPA: ''
Definition: der Pilot, -en
Register: ''
Beispielsätze: |-
  Il *pilota* ha riempiuto i serbatoi prima del decollo, come prevede il contratto con la compagnia aerea.
  Der *Pilot* hat die Tanks vor dem Start gefüllt, wie es der Vertrag mit der Fluggesellschaft vorsieht.
  
  Non ricordo più il nome del *pilota* che ha salvato il villaggio dalla minaccia dei lupi.
  Ich erinnere mich nicht mehr an den Namen des *Piloten*, der das Dorf vor der Bedrohung durch die Wölfe gerettet hat.
  
  Se domani il *pilota* non parteciperà alla conferenza stampa, sarà un vero peccato per tutti noi.
  Wenn der *Pilot* morgen nicht an der Pressekonferenz teilnimmt, wird das ein großer Verlust für uns alle sein.
  
  Il regolamento antico concedeva ai *piloti* speciali privilegi durante i viaggi ufficiali.
  Die alten Vorschriften gewährten den *Piloten* besondere Privilegien bei offiziellen Reisen.
  
  Secondo la conoscenza comune, solo un *pilota* esperto può superare questi termini di volo.
  Nach allgemeinem Wissen kann nur ein erfahrener *Pilot* diese Flugbedingungen erfüllen.
