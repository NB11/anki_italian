Rang: 2214
Wort: sacrificio
Wortart: n.m
Wort mit Artikel: il sacrificio
Femininum / Plural: sacrifici
IPA: ''
Definition: das Opfer, -
Register: ''
Beispielsätze: |-
  Ha fatto *un grande sacrificio* per aiutare la sua famiglia.
  Er hat ein *Opfer* gebracht, um seiner Familie zu helfen.
  
  Nonostante *i sacrifici*, non riuscì a finire gli studi.
  Trotz seiner *Opfer* schaffte er es nicht, sein Studium abzuschließen.
  
  Penso che *il sacrificio* richiesto sia troppo grande.
  Ich glaube, das geforderte *Opfer* ist zu groß.
  
  Se avessi saputo dei *sacrifici* che avrebbe dovuto fare, l’avrei avvisato.
  Hätte ich gewusst, welche *Opfer* er bringen musste, hätte ich ihn gewarnt.
  
  È noto per il suo *sacrificio* in favore degli altri.
  Er ist für sein *Opfer* zugunsten anderer bekannt.
