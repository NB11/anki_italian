IPA: ''
Definition: der Rekrut, -en
Register: ''
Beispielsätze: |-
  Il *recluta* è stato assegnato al plotone numero cinque dopo l’addestramento di base.
  Der *Rekrut* wurde nach der Grundausbildung der Kompanie Nummer fünf zugewiesen.
  
  Nonostante fosse molto giovane, il *recluta* riuscì a superare tutte le prove senza difficoltà.
  Trotz seines jungen Alters schaffte es der *Rekrut*, alle Prüfungen mühelos zu bestehen.
  
  Se tu fossi un ufficiale, come tratteresti un *recluta* che sbaglia spesso?
  Wenn du Offizier wärst, wie würdest du einen *Rekrut* behandeln, der oft Fehler macht?
  
  Il capitano decise che il *recluta* avrebbe lavorato nel nucleo logistico per qualche settimana.
  Der Hauptmann beschloss, dass der *Rekrut* für einige Wochen im logistischen Kernbereich arbeiten würde.
  
  Credi davvero che un *recluta* possa diventare un buon funzionario governativo in futuro?
  Glaubst du wirklich, dass ein *Rekrut* einmal ein guter Beamter werden kann?
