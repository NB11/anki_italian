Rang: 970
Wort: litigare
Wortart: vi
Wort mit Artikel: litigare
Femininum / Plural: ''
IPA: ''
Definition: streiten, sich zanken
Register: ''
Beispielsätze: |-
  Non *litigano* quasi mai, perché hanno una coppia molto armoniosa.
  Sie *streiten* sich fast nie, weil sie ein sehr harmonisches Paar haben.
  
  Se *litigassi* con tutti, nessuno vorrebbe lavorare nel tuo laboratorio!
  Wenn du dich mit jedem *zankst*, würde niemand in deinem Labor arbeiten wollen!
  
  Spero che non *litighino* durante la calma di questa sera così tranquilla.
  Ich hoffe, sie *streiten* sich nicht in der Ruhe dieses so ruhigen Abends.
  
  Avrei *litigato* volentieri con lui, ma alla fine ho preferito ascoltare il suo interesse per il progetto.
  Ich hätte mich gerne mit ihm *gestritten*, aber am Ende hörte ich lieber seinem Interesse für das Projekt zu.
  
  Perché *litigate* sempre per uscite così banali? Dovreste trovare argomenti più importanti!
  Warum *zankt* ihr euch immer über solche Ausgänge? Ihr solltet wichtigere Themen finden!
