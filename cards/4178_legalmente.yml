Rang: 4178
Wort: legalmente
Wortart: adv
Wort mit Artikel: legalmente
Femininum / Plural: ''
IPA: ''
Definition: rechtlich
Register: ''
Beispielsätze: |-
  Il contratto è stato firmato *legalmente* da entrambe le parti.
  Der Vertrag wurde von beiden Seiten *rechtlich* unterzeichnet.
  
  Non puoi semplicemente ignorare le norme che sono state *legalmente* approvate.
  Du kannst nicht einfach die Normen ignorieren, die *rechtlich* verabschiedet wurden.
  
  Se agisci *legalmente*, eviti qualsiasi problema con la polizia.
  Wenn du dich *rechtlich* verhältst, vermeidest du Probleme mit der Polizei.
  
  La società ha agito *legalmente*, ma molti cittadini non lo approvano.
  Die Firma handelte *rechtlich*, aber viele Bürger stimmen dem nicht zu.
  
  Per essere *legalmente* riconosciuto, il documento deve essere vidimato da un notaio.
  Damit es *rechtlich* anerkannt wird, muss das Dokument von einem Notar beglaubigt werden.
