Rang: 296
Wort: magari
Wortart: adv
Wort mit Artikel: magari
Femininum / Plural: ''
IPA: ''
Definition: vielleicht, hoffentlich
Register: ''
Beispielsätze: |-
  Vorrei *magari* un caffè prima di partire.
  Ich hätte *vielleicht* gerne einen Kaffee, bevor ich losgehe.
  
  *Magari* potessi venire con noi!
  *Hoffentlich* könnte ich mit euch kommen!
  
  Lui dice che *magari* arriverà in ritardo.
  Er sagt, dass er *vielleicht* zu spät ankommt.
  
  *Magari* avessi più tempo per studiare!
  *Hoffentlich* hätte ich mehr Zeit zum Lernen!
  
  Domani *magari* andremo al mare, se il tempo sarà bello.
  Morgen *vielleicht* gehen wir ans Meer, wenn das Wetter schön ist.
