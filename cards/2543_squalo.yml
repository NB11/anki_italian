Rang: 2543
Wort: squalo
Wortart: n.m
Wort mit Artikel: lo squalo
Femininum / Plural: squali
IPA: ''
Definition: der Hai, -e
Register: ''
Beispielsätze: |-
  Lo *squalo* nuota nelle acque profonde dell'oceano Pacifico.
  Der *Hai* schwimmt in den tiefen Gewässern des Pazifiks.
  
  Nonostante il pericolo, molti subacquei si avvicinano allo *squalo* per osservarlo da vicino.
  Trotz der Gefahr nähern sich viele Taucher dem *Hai*, um ihn aus der Nähe zu betrachten.
  
  Se avessi un acquario enorme, vorrei avere uno *squalo* bianco come ospite d'onore.
  Wenn ich ein riesiges Aquarium hätte, würde ich einen weißen *Hai* als Ehrengast haben wollen.
  
  Lo *squalo* che abbiamo visto al documentario era lungo almeno sette metri.
  Der *Hai*, den wir in der Dokumentation gesehen haben, war mindestens sieben Meter lang.
  
  Credi davvero che lo *squalo* possa riconoscere l'odore del sangue a chilometri di distanza?
  Glaubst du wirklich, dass der *Hai* den Blutgeruch auf Kilometer Entfernung erkennen kann?
