Rang: 4973
Wort: tabulato
Wortart: n.m
Wort mit Artikel: il tabulato
Femininum / Plural: tabulati
IPA: ''
Definition: die Tabelle, -en
Register: ''
Beispielsätze: |-
  Il *tabulato* con i risultati è pronto per la riunione.
  Die *Tabelle* mit den Ergebnissen ist bereit für die Besprechung.
  
  Ha controllato attentamente ogni voce del *tabulato* prima di inviarlo.
  Er hat jeden Eintrag der *Tabelle* sorgfältig geprüft, bevor er sie verschickt hat.
  
  Se vuoi vedere i dati storici, guarda il *tabulato* rosso che ho stampato.
  Wenn du die historischen Daten sehen möchtest, schau auf die rote *Tabelle*, die ich ausgedruckt habe.
  
  Nella relazione ci sono diversi *tabulati* che mostrano l’andamento delle vendite.
  Im Bericht gibt es mehrere *Tabellen*, die den Verkaufstrend zeigen.
  
  Appena finisco di aggiornare il *tabulato*, te lo mando via email.
  Sobald ich die *Tabelle* aktualisiert habe, schicke ich sie dir per E-Mail.
