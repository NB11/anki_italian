Rang: 1666
Wort: tuttavia
Wortart: adv
Wort mit Artikel: tuttavia
Femininum / Plural: ''
IPA: ''
Definition: dennoch, trotzdem
Register: ''
Beispielsätze: |-
  Il progetto era costoso, *tuttavia* ne valeva la pena.
  Das Projekt war teuer, *trotzdem* hat es sich gelohnt.
  
  Non ho capito la spiegazione, *tuttavia* ho provato a eseguire l’esercizio.
  Ich habe die Erklärung nicht verstanden, *dennoch* habe ich versucht, die Übung durchzuführen.
  
  Avrei voluto aiutarti, *tuttavia* non ero in città quel giorno.
  Ich hätte dir helfen wollen, *aber* ich war an diesem Tag nicht in der Stadt.
  
  Il traffico era intenso, *tuttavia* siamo arrivati in tempo alla stazione.
  Der Verkehr war stark, *trotzdem* sind wir rechtzeitig am Bahnhof angekommen.
  
  Nonostante la pioggia, il lavoro continuò; *tuttavia*, i risultati peggiorarono.
  Trotz des Regens ging die Arbeit weiter; *trotzdem* verschlechterten sich die Ergebnisse.
