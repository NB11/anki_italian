Rang: 4116
Wort: risonanza
Wortart: n.f
Wort mit Artikel: la risonanza
Femininum / Plural: risonanze
IPA: ''
Definition: der Nachhall, die Resonanz
Register: ''
Beispielsätze: |-
  La *risonanza* magnetica è un esame molto comune in medicina.
  Die *Magnetresonanz* ist eine sehr häufige Untersuchung in der Medizin.
  
  Nonostante le difficoltà, la *risonanza* del suo discorso ha colpito tutti i presenti.
  Trotz der Schwierigkeiten hat die *Resonanz* seiner Rede alle Anwesenden beeindruckt.
  
  Gli scienziati stanno studiando le *risonanze* delle particelle subatomiche.
  Die Wissenschaftler untersuchen die *Resonanzen* subatomarer Teilchen.
  
  Se avessi più tempo, approfondirei lo studio della *risonanza* acustica.
  Wenn ich mehr Zeit hätte, würde ich das Studium der *akustischen Resonanz* vertiefen.
  
  La *risonanza* politica di quell’evento si è protratta per settimane nei media.
  Die *politische Resonanz* jenes Ereignisses hielt sich wochenlang in den Medien.
