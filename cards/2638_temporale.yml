Rang: 2638
Wort: temporale
Wortart: adj
Wort mit Artikel: temporale
Femininum / Plural: ''
IPA: ''
Definition: stürmisch, zeitlich
Register: ''
Beispielsätze: |-
  Stasera ci sarà un *temporale* improvviso secondo il meteo.
  Heute Abend wird es einen plötzlichen *Sturm* geben laut Wettervorhersage.
  
  Ha preso una decisione *temporale* che non soddisfa tutti.
  Er hat eine *zeitliche* Entscheidung getroffen, die nicht alle zufriedenstellt.
  
  Nonostante il *temporale*, siamo arrivati in tempo alla festa.
  Trotz des *Gewitters* sind wir rechtzeitig zur Feier gekommen.
  
  Questo accordo ha una validità *temporale* di cinque anni.
  Dieses Abkommen hat eine *zeitliche* Gültigkeit von fünf Jahren.
  
  Se avessi saputo che sarebbe stato un *temporale* così forte, non sarei uscito.
  Wenn ich gewusst hätte, dass ein so schweres *Gewitter* kommt, wäre ich nicht rausgegangen.
