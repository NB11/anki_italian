Rang: 2498
Wort: tremendo
Wortart: adj
Wort mit Artikel: tremendo
Femininum / Plural: ''
IPA: ''
Definition: extrem, gewaltig, enorm
Register: ''
Beispielsätze: |-
  Dopo la notizia della vincita, ha provato una gioia *tremenda*.
  Nach der Nachricht des Gewinns empfand er eine *unglaubliche* Freude.
  
  Quello che hai fatto è una cosa *tremenda* nei suoi confronti.
  Was du ihm angetan hast, ist eine *unverzeihliche* Tat.
  
  Nonostante l'*estremo* freddo, sono usciti senza cappotto.
  Trotz der *extremen* Kälte sind sie ohne Mantel rausgegangen.
  
  Il film era così *tremendo* che molti spettatori se ne sono andati dopo il primo atto.
  Der Film war so *schrecklich*, dass viele Zuschauer nach dem ersten Akt gingen.
  
  Spero che tu non abbia una reazione *tremenda* a questa semplice domanda.
  Ich hoffe, du reagierst nicht mit einer *heftigen* Antwort auf diese einfache Frage.
