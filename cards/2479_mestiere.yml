Rang: 2479
Wort: mestiere
Wortart: n.m
Wort mit Artikel: il mestiere
Femininum / Plural: i mestieri
IPA: ''
Definition: der Beruf, -e
Register: ''
Beispielsätze: |-
  Il *mestiere* del mio padre è molto antico e affascinante.
  Das *Handwerk* meines Vaters ist sehr alt und faszinierend.
  
  Perché hai scelto questo *mestiere* così particolare?
  Warum hast du diesen so speziellen *Beruf* gewählt?
  
  Nel Medioevo, molti *mestieri* erano ereditari e si tramandavano di padre in figlio.
  Im Mittelalter waren viele *Berufe* erblich und wurden vom Vater an den Sohn weitergegeben.
  
  Se non avessi questo *mestiere*, non potrei permettermi la mia vita da detenuto a tempo pieno.
  Falls ich diesen *Beruf* nicht hätte, könnte ich mir mein Leben als Häftling nicht leisten.
  
  Era un *mestiere* che richiedeva una grande pazienza e una mano ferma.
  Es war ein *Beruf*, der viel Geduld und eine ruhige Hand erforderte.
