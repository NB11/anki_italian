Rang: 2804
Wort: freccia
Wortart: n.f
Wort mit Artikel: la freccia
Femininum / Plural: freccie
IPA: ''
Definition: der Pfeil, -e
Register: ''
Beispielsätze: |-
  Ho seguito la *freccia* gialla sul pavimento per trovare l’uscita.
  Ich habe dem *Pfeil* auf dem Boden zum Ausgang gefolgt.
  
  Non vedere la *freccia* del cambio può causare incidenti.
  Das *Pfeil*-Symbol für die Gangschaltung nicht zu sehen, kann zu Unfällen führen.
  
  Nel traffico urbano, la *freccia* indica la direzione da prendere.
  Im Stadtverkehr zeigt der *Pfeil* die Richtung an, die man nehmen soll.
  
  Non appena la *freccia* lampeggiava, ho girato a destra senza esitare.
  Sobald der *Pfeil* blinkte, bog ich ohne zu zögern rechts ab.
  
  Fammi sapere se la *freccia* sullo schermo diventa verde.
  Lass mich wissen, wenn der *Pfeil* auf dem Bildschirm grün wird.
