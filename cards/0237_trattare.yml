Femininum / Plural: ''
IPA: ''
Definition: behandeln, abhandeln
Register: ''
Beispielsätze: |-
  Il medico *tratta* i pazienti con cura.
  Der Arzt *behandelt* die Patienten mit Vorsicht.
  
  Hanno *trattato* questo argomento in dettaglio.
  Sie haben dieses Thema *abgehandelt*.
  
  Vorresti *trattare* questo problema con più rispetto?
  Würdest du dieses Problem *behandeln* mit etwas mehr Respekt?
  
  È importante sapere come *trattare* gli errori.
  Es ist wichtig zu wissen, wie man Fehler *behandelt*.
  
  Se tu *trattassi* meglio le persone, ti rispetterebbero di più.
  Wenn du die Leute *behandeln* würdest, würden sie dich mehr respektieren.
