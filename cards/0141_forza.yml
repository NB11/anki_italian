Rang: 141
Wort: forza
Wortart: n.f
Wort mit Artikel: la forza
Femininum / Plural: forze
IPA: ''
Definition: die Kraft, die Stärke
Register: ''
Beispielsätze: |-
  La *forza* di questo motore è impressionante.
  Die *Kraft* dieses Motors ist beeindruckend.
  
  Hanno usato tutta la loro *forza* per sollevare la cassa.
  Sie haben ihre ganze *Stärke* eingesetzt, um die Kiste zu heben.
  
  Credi nella *forza* del destino?
  Glaubst du an die *Macht* des Schicksals?
  
  Le *forze* dell’ordine sono intervenute rapidamente.
  Die *Behörden* griffen schnell ein.
  
  Non sottovalutare la *forza* della volontà umana.
  Unterschätze nicht die *Kraft* des menschlichen Willens.
