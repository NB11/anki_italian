Rang: 2736
Wort: parto
Wortart: n.m
Wort mit Artikel: il parto
Femininum / Plural: i parti
IPA: ''
Definition: die Abreise, der Start, der Aufbruch
Register: ''
Beispielsätze: |-
  Il suo *parto* per Milano è previsto per domani mattina alle 6:30.
  Seine *Abreise* nach Mailand ist für morgen früh um 6:30 Uhr vorgesehen.
  
  Nonostante il *parto* fosse alle 5, abbiamo perso il treno per un pelo.
  Trotz der *Abreise* um 5 Uhr haben wir den Zug knapp verpasst.
  
  Ho saputo del suo *parto* solo ieri sera, quando mi ha chiamato disperato.
  Ich habe von seiner *Abreise* erst gestern Abend erfahren, als er mich verzweifelt angerufen hat.
  
  Il *parto* della nave da crociera è stato ritardato a causa del maltempo.
  Die *Abfahrt* des Kreuzfahrtschiffs wurde wegen des schlechten Wetters verschoben.
  
  Se il *parto* fosse stato più tardi, avremmo perso l’appuntamento con l’avvocato.
  Wenn der *Aufbruch* später gewesen wäre, hätten wir den Termin mit dem Anwalt verpasst.
