Rang: 2020
Wort: talmente
Wortart: adv
Wort mit Artikel: talmente
Femininum / Plural: ''
IPA: ''
Definition: so sehr, derartig
Register: ''
Beispielsätze: |-
  È *talmente* stanco che si è addormentato sul divano senza neanche togliersi le scarpe.
  Er ist *so sehr* müde, dass er auf dem Sofa eingeschlafen ist, ohne sich die Schuhe auszuziehen.
  
  Non sapevo che avessi scritto un romanzo, *talmente* era il tuo segreto!
  Ich wusste nicht, dass du einen Roman geschrieben hattest – *so sehr* war es dein Geheimnis!
  
  Il film era *talmente* noioso che ho cambiato canale dopo cinque minuti.
  Der Film war *so sehr* langweilig, dass ich nach fünf Minuten den Sender gewechselt habe.
  
  Questa volta il risultato è stato *talmente* positivo che la squadra ha festeggiato tutta la notte.
  Dieses Mal war das Ergebnis *so sehr* positiv, dass das Team die ganze Nacht gefeiert hat.
  
  Mi dispiace, ma sono *talmente* oberato di lavoro che non posso accettare altri impegni.
  Es tut mir leid, aber ich bin *so sehr* mit Arbeit überlastet, dass ich keine weiteren Verpflichtungen annehmen kann.
