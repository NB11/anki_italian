Rang: 3891
Wort: carrello
Wortart: n.m
Wort mit Artikel: il carrello
Femininum / Plural: carrelli
IPA: ''
Definition: der Einkaufswagen, -
Register: ''
Beispielsätze: |-
  Devo *carrelli* per la spesa al supermercato.
  Ich brauche *Einkaufswagen* für den Supermarkteinkauf.
  
  Hai dimenticato di prendere un *carrello* prima di entrare nel reparto ortofrutta!
  Du hast vergessen, dir einen *Einkaufswagen* zu nehmen, bevor du in die Obst- und Gemüseabteilung gegangen bist!
  
  Il *carrello* della spesa era pieno di prodotti regionali che ho comprato al mercato.
  Der *Einkaufswagen* war voll mit regionalen Produkten, die ich auf dem Markt gekauft habe.
  
  Spero che questo nuovo *carrello* sia più resistente di quello vecchio.
  Ich hoffe, dass dieser neue *Einkaufswagen* stabiler ist als der alte.
  
  Mentre spingeva il *carrello*, parlava al telefono con suo figlio.
  Während er den *Einkaufswagen* schob, telefonierte er mit seinem Sohn.
