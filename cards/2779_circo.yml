Rang: 2779
Wort: circo
Wortart: n.m
Wort mit Artikel: il circo
Femininum / Plural: circhi
IPA: ''
Definition: der Zirkus, -se
Register: ''
Beispielsätze: |-
  Ieri sera sono andato al *circo* con la mia famiglia e abbiamo visto acrobati e clown spettacolari.
  Gestern Abend bin ich mit meiner Familie in den *Zirkus* gegangen und haben akrobatische und clowneske Vorführungen gesehen.
  
  Nel *circo*, alcuni animali vengono addestrati per eseguire numeri che lasciano il pubblico a bocca aperta.
  Im *Zirkus* werden manche Tiere dressiert, um Kunststücke zu zeigen, die das Publikum verblüffen.
  
  Non sapevo che tuo fratello lavorasse nel *circo* come trapezista: che emozione forte!
  Ich wusste nicht, dass dein Bruder im *Zirkus* als Trapezkünstler arbeitet: wie aufregend!
  
  Dopo lo spettacolo del *circo*, tutti i bambini volevano farsi autografare dai protagonisti.
  Nach der *Zirkus*vorstellung wollten alle Kinder Autogramme von den Hauptdarstellern haben.
  
  Se domani andrai al *circo*, porta il biglietto che ti ho spedito via mail.
  Wenn du morgen in den *Zirkus* gehst, nimm das Ticket mit, das ich dir per E-Mail geschickt habe.
