Rang: 1536
Wort: soccorso
Wortart: n.m
Wort mit Artikel: il soccorso
Femininum / Plural: i soccorsi
IPA: ''
Definition: die Hilfe, die Rettung
Register: ''
Beispielsätze: |-
  Il *soccorso* è arrivato in pochi minuti dopo il nostro appello.
  Die *Hilfe* kam innerhalb weniger Minuten nach unserem Appell.
  
  Abbiamo chiamato il *soccorso* perché la situazione diventava critica.
  Wir haben die *Rettung* gerufen, weil die Situation kritisch wurde.
  
  Grazie al *soccorso* tempestivo dei vigili del fuoco, nessuno si è fatto male.
  Dank des *Hilfe* der Feuerwehr hat sich niemand verletzt.
  
  Il *soccorso* sanitario ha stabilizzato il paziente prima del trasporto in ospedale.
  Die *Rettung* hat den Patienten vor dem Transport ins Krankenhaus stabilisiert.
  
  Non dimenticherò mai il *soccorso* che mi hai offerto in quel momento difficile.
  Ich werde die *Hilfe*, die du mir in diesem schwierigen Moment angeboten hast, nie vergessen.
