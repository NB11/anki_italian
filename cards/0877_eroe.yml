Rang: 877
Wort: eroe
Wortart: n.m
Wort mit Artikel: l'eroe
Femininum / Plural: eroi
IPA: ''
Definition: der Held, -en, die Heldin, -nen
Register: ''
Beispielsätze: |-
  L'*eroe* del film ha salvato la città da un mostro affamato di carne umana.
  Der *Held* des Films hat die Stadt vor einem menschenfleischfressenden Monster gerettet.
  
  Se fossi un *eroe*, accenderei un segnale luminoso per aiutare i dispersi nella foresta.
  Wenn ich ein *Held* wäre, würde ich ein leuchtendes Signal anzünden, um die Vermissten im Wald zu helfen.
  
  Nonostante avesse rifiutato ogni comando del colonnello, l'*eroe* è stato comunque decorato per il suo coraggio.
  Obwohl er jeden *Befehl* des Obersten abgelehnt hatte, wurde der Held dennoch für seinen Mut ausgezeichnet.
  
  La gente racconta che l'*eroe* sapesse respirare sott’acqua, proprio come uno spirito del mare.
  Die Leute erzählen, dass der *Held* unter Wasser atmen konnte, genau wie ein Meergeist.
  
  Dunque, l'*eroe* ha trovato la traccia del suo fidanzato scomparso in quella scatola di ricordi.
  Also hat der *Held* die Spur seines verschwundenen Verlobten in dieser Schachtel mit Erinnerungen gefunden.
