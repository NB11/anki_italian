Rang: 887
Wort: ritorno
Wortart: n.m
Wort mit Artikel: il ritorno
Femininum / Plural: ritorni
IPA: ''
Definition: die Rückkehr, -en
Register: ''
Beispielsätze: |-
  Il *ritorno* del colonnello era atteso con grande preoccupazione.
  Die *Rückkehr* des Obersts wurde mit großer Sorge erwartet.
  
  Nonostante abbia rifiutato la proposta, non ha cambiato idea sul suo *ritorno*.
  Obwohl er das Angebot abgelehnt hat, hat er seine Meinung über seine *Rückkehr* nicht geändert.
  
  Domani leggeremo sul giornale le notizie sul suo *ritorno* dalla missione.
  Morgen werden wir in der Zeitung die Nachrichten über seine *Rückkehr* aus der Mission lesen.
  
  Se avessi trovato una traccia, forse avrei capito il motivo del suo *ritorno* improvviso.
  Wenn ich eine Spur gefunden hätte, hätte ich vielleicht den Grund seiner plötzlichen *Rückkehr* verstanden.
  
  Il suo *ritorno* a casa dopo tanti anni fu un momento di grande emozione per tutta la famiglia.
  Seine *Rückkehr* nach Hause nach so vielen Jahren war ein Moment großer Emotion für die ganze Familie.
