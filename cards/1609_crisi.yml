Rang: 1609
Wort: crisi
Wortart: n.f
Wort mit Artikel: la crisi
Femininum / Plural: crisi
IPA: ''
Definition: die Krise, -en
Register: ''
Beispielsätze: |-
  La *crisi* economica del 2008 ha avuto conseguenze disastrose in tutto il mondo.
  Die *Krise* von 2008 hatte weltweit verheerende Konsequenzen.
  
  Anche se lo *stomaco* gli bruciava, volle cucinare una pizza per i suoi amici.
  Obwohl ihm der *Magen* brannte, wollte er eine Pizza für seine Fans backen.
  
  Credo che si stia sottovalutando la *crisi* ambientale, specialmente in questo bosco vicino alla città.
  Ich glaube, die ökologische *Krise* wird unterschätzt, besonders in diesem Wald hier.
  
  Nonostante le proteste dei cittadini, il governo non ha ancora indicato una soluzione alla *crisi* abitativa.
  Trotz der Bürgerproteste hat die Regierung noch keine Lösung für die Wohnungs-*Krise* genannt.
  
  Se avessi saputo della *crisi* politica che avrebbe colpito il paese, avrei rinunciato al viaggio, ma è successo tutto così in fretta.
  Hätte ich vom kommenden politischen *Chaos* gewusst, hätte ich die Reise abgesagt, doch alles passierte so schnell.
