Beispielsätze: |-
  La *roccia* si erge maestosa sulla cima della montagna.
  Der *Felsen* ragt majestätisch am Gipfel des Berges auf.
  
  Dopo la pioggia il sentiero era scivoloso come una *roccia* bagnata.
  Nach dem Regen war der Pfad so glatt wie ein nasser *Felsen*.
  
  Nonostante le difficoltà, il team è riuscito a scalare ogni *roccia* difficile.
  Trotz der Schwierigkeiten gelang es dem *Team*, jeden schwierigen Felsen zu bezwingen.
  
  Se avessi saputo che c’era una *roccia* così instabile, non sarei venuto.
  Hätte ich gewusst, dass es hier einen so instabilen *Felsen* gibt, wäre ich nicht gekommen.
  
  È sorprendente come l’acqua abbia scavato questa *roccia* nel corso dei secoli.
  Es ist erstaunlich, wie das Wasser diesen *Felsen* im Laufe der Jahrhunderte ausgehöhlt hat.
