Rang: 902
Wort: grave
Wortart: adj
Wort mit Artikel: grave
Femininum / Plural: ''
IPA: ''
Definition: ernst, schwerwiegend
Register: ''
Beispielsätze: |-
  Il medico ha una *grave* responsabilità verso i suoi pazienti.
  Der Arzt hat eine *ernste* Verantwortung seinen Patienten gegenüber.
  
  Se non curate la ferita, può diventare *gravi*ssima!
  Wenn ihr die Wunde nicht behandelt, kann sie *sehr schwerwiegend* werden!
  
  Abbiamo saputo che la situazione è *più grave* di quanto pensassimo.
  Wir haben erfahren, dass die Lage *ernster* ist als wir dachten.
  
  Quel *grave* errore ha causato molti problemi al progetto.
  Jener *schwere* Fehler hat dem Projekt viele Probleme bereitet.
  
  Dunque, *gravissima* è la condizione del paziente che abbiamo appena ricoverato.
  Also, der Zustand des Patienten, den wir gerade aufgenommen haben, ist *äußerst schwerwiegend*.
