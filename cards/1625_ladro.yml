Rang: 1625
Wort: ladro
Wortart: n.m
Wort mit Artikel: il ladro
Femininum / Plural: ladri
IPA: ''
Definition: der Dieb, -e
Register: ''
Beispielsätze: |-
  Il *ladro* ha rubato il portafoglio dal cassetto della scrivania mentre ero al teatro.
  Der *Dieb* hat die Geldbörse aus der Schublade des Schreibtischs gestohlen, während ich im Theater war.
  
  Ho sentito che i *ladri* sono fuggiti verso il bosco dopo il furto in banca.
  Ich habe gehört, dass die *Diebe* nach dem Banküberfall in den Wald geflohen sind.
  
  Se finora non hai trovato il *ladro*, chi credi che possa aver rubato quei documenti?
  Wenn du den *Dieb* bisher nicht gefunden hast, wer könnte dann diese Dokumente gestohlen haben?
  
  Dicono che questo *ladro* sia noto nella città per i suoi crimini sofisticati.
  Man sagt, dieser *Dieb* sei in der Stadt für seine raffinierten Verbrechen bekannt.
  
  Appena ho visto il *ladro* scappare, ho chiamato subito la polizia.
  Sobald ich den *Dieb* fliehen sah, habe ich sofort die Polizei gerufen.
