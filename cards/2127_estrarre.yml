Wort mit Artikel: estrarre
Femininum / Plural: ''
IPA: ''
Definition: herausziehen, extrahieren
Register: ''
Beispielsätze: |-
  Il dentista deve *estrarre* questo dente molto delicato.
  Der Zahnarzt muss diesen *zarten* Zahn ziehen.
  
  Ha *estratto* il coltello dal fodero con grande attenzione.
  Er hat das Messer langsam aus der Scheide *gezogen*.
  
  Se vuoi *estrare* informazioni da un database, devi usare la query giusta.
  Wenn du Daten aus einer Datenbank *abrufen* willst, musst du die richtige Abfrage nutzen.
  
  L’archeologo ha impiegato mesi per *estrarre* l’artefatto dal terreno.
  Der Archäologe brauchte Monate, um den Fund aus dem Boden *auszugraben*.
  
  Non saremo mai in grado di *estrarre* la verità da una persona che non vuole parlare.
  Wir werden die Wahrheit von jemandem, der nicht reden will, nie *entlocken* können.
