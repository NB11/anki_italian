Rang: 2523
Wort: ispirare
Wortart: v
Wort mit Artikel: ispirare
Femininum / Plural: ''
IPA: ''
Definition: inspirieren, inspirierend wirken
Register: ''
Beispielsätze: |-
  La sua arte riesce a *ispirare* molte persone in tutto il mondo.
  Seine Kunst gelingt es, viele Menschen auf der ganzen Welt zu *inspirieren*.
  
  Vorrei che tu *ispirassi* i tuoi studenti a leggere di più.
  Ich wünschte, du würdest deine Schüler dazu *inspirieren*, mehr zu lesen.
  
  Se non ti *ispira* nulla di nuovo, forse dovresti cambiare ambiente.
  Wenn dich nichts Neues mehr *inspiriert*, solltest du vielleicht die Umgebung wechseln.
  
  È stato il suo coraggio a *ispirare* la nascita di questa iniziativa.
  Es war ihr Mut, der die Entstehung dieser Initiative *inspiriert* hat.
  
  Spero che questa storia riesca a *ispirare* anche te a non arrenderti mai.
  Ich hoffe, dass diese Geschichte auch dich dazu *inspirieren* wird, nie aufzugeben.
