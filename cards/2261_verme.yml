Rang: 2261
Wort: verme
Wortart: n.m
Wort mit Artikel: il verme
Femininum / Plural: vermi
IPA: ''
Definition: der Wurm, -würmer
Register: ''
Beispielsätze: |-
  Ho trovato *un verme* nel mio piatto di insalata ieri sera.
  Ich habe *einen Wurm* in meinem Salatteller gestern Abend gefunden.
  
  Se continui a scavare così, *vermi* usciranno dal terreno.
  Wenn du so weitergräbst, werden *Würmer* aus dem Boden kommen.
  
  La nonna ha detto che *i vermi* sono buoni per la pesca.
  Oma hat gesagt, dass *Würmer* gut zum Angeln sind.
  
  Mi hanno spiegato che *il verme* della mela è un parassita comune.
  Sie haben mir erklärt, dass *der Wurm* im Apfel ein häufiger Parasit ist.
  
  Anche se odio *i vermi*, devo ammettere che sono utili per la natura.
  Auch wenn ich *Würmer* hasse, muss ich zugeben, dass sie nützlich für die Natur sind.
