Rang: 2105
Wort: preside
Wortart: n.m/f
Wort mit Artikel: il preside
Femininum / Plural: presidenti
IPA: ''
Definition: der Rektor, -en / die Rektorin, -nen
Register: ''
Beispielsätze: |-
  Il *presidente* della commissione ha annunciato la sua candidatura per le prossime elezioni.
  Der *Rektor* der Kommission hat seine Kandidatur für die nächsten Wahlen angekündigt.
  
  Dopo anni di servizio, la *presidentessa* ha deciso di ritirarsi.
  Nach Jahren im Amt hat sich die *Rektorin* entschieden, zurückzutreten.
  
  Chi è il *presidente* del consiglio d’amministrazione in questa società?
  Wer ist der *Rektor* des Aufsichtsrats in diesem Unternehmen?
  
  Se il *presidente* firma questo documento, l’accordo sarà valido.
  Wenn der *Rektor* dieses Dokument unterschreibt, wird die Vereinbarung gültig sein.
  
  La *presidente* ha convocato una seduta straordinaria per discutere il caso.
  Die *Rektorin* hat eine außerordentliche Sitzung einberufen, um den Fall zu besprechen.
