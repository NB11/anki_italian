Rang: 925
Wort: interesse
Wortart: n.m
Wort mit Artikel: l'interesse
Femininum / Plural: interessi
IPA: ''
Definition: das Interesse, -n
Register: ''
Beispielsätze: |-
  L'*interesse* per la storia dell'arte è cresciuto dopo la visita al museo.
  Das *Interesse* für Kunstgeschichte ist nach dem Museumsbesuch gewachsen.
  
  Non capisco perché abbia perso l'*interesse* per i suoi studi universitari.
  Ich verstehe nicht, warum er das *Interesse* an seinem Studium verloren hat.
  
  Il professore ha destato l'*interesse* degli studenti con una lezione affascinante su Galileo.
  Der Professor hat mit einer faszinierenden Vorlesung über Galileo das *Interesse* der Studenten geweckt.
  
  Mi sembra che tu abbia un *interesse* particolare per le lingue straniere, vero?
  Es scheint mir, dass du ein besonderes *Interesse* für Fremdsprachen hast, stimmt das?
  
  Nonostante le condizioni avverse, continuarono a nutrire l'*interesse* per quella ricerca scientifica.
  Trotz widriger Bedingungen setzten sie ihr *Interesse* an dieser wissenschaftlichen Forschung fort.
