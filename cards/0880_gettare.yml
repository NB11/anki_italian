Rang: 880
Wort: gettare
Wortart: v
Wort mit Artikel: gettare
Femininum / Plural: ''
IPA: ''
Definition: werfen, schleudern, wegwerfen
Register: ''
Beispielsätze: |-
  Devi *gettare* via la spazzatura se vuoi andare a fare una passeggiata nel parco.
  Du musst den Müll *wegwerfen*, wenn du eine Runde im Park machen willst.
  
  Il soldato ha *gettato* il fucile a terra dopo aver ricevuto l’ordine di ritirarsi.
  Der Soldat hat das Gewehr auf den Boden *geworfen*, nachdem er den Befehl zum Rückzug erhalten hatte.
  
  Ho *gettato* uno sguardo di disprezzo al mio fidanzato, perché ha dimenticato il nostro anniversario.
  Ich habe meinem *Verlobten* einen verächtlichen Blick zugeworfen, weil er unseren Jahrestag vergessen hatte.
  
  Se non avessi *gettato* quella scatola nella spazzatura, avremmo trovato la traccia che cercavamo.
  Wenn ich diese *Schachtel* nicht in den Müll geworfen hätte, hätten wir die Spur gefunden, nach der wir suchten.
  
  Non appena vedremo un segno, dovremo *gettare* il nostro progetto nel cassetto e fuggire immediatamente.
  Sobald wir ein *Signal* sehen, müssen wir unser Projekt in die Schublade werfen und sofort fliehen.
