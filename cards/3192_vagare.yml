Rang: 3192
Wort: vagare
Wortart: vi
Wort mit Artikel: vagare
Femininum / Plural: ''
IPA: ''
Definition: umherirren, herumwandern
Register: ''
Beispielsätze: |-
  Dopo la pioggia, molti *vagano* per cercare funghi nel bosco.
  Nach dem Regen *irren* viele durch den Wald, um Pilze zu suchen.
  
  Qualcuno dice che lo spirito del duca vaga ancora per la tenuta di famiglia.
  Manche sagen, dass der Geist des Herzogs noch immer über das Familienanwesen *streift*.
  
  Ho visto un cane che *vagava* senza padron per la piazza del paese.
  Ich habe einen Hund gesehen, der ohne Besitzer durch den Dorfplatz *irrte*.
  
  Se non troviamo la strada, dovremo *vagare* per ore nel bosco fitto.
  Wenn wir den Weg nicht finden, müssen wir stundenlang durch den dichten Wald *irren*.
  
  Il poeta scrive che gli uomini *vagano* come ombre nella loro stessa vita.
  Der Dichter schreibt, dass die Menschen wie Schatten durch ihr eigenes Leben *irren*.
