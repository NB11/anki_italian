Rang: 769
Wort: reale
Wortart: adj
Wort mit Artikel: reale
Femininum / Plural: ''
IPA: ''
Definition: real, wirklich
Register: ''
Beispielsätze: |-
  Questa è una *storia* *reale* che mi ha raccontato mio nonno.
  Das ist eine *wahre* Geschichte, die mir mein Großvater erzählt hat.
  
  Sogno un mondo *più reale* di questo.
  Ich träume von einer *wirklicheren* Welt als dieser.
  
  La sua paura non era *completamente reale*.
  Seine Angst war nicht *ganz echt*.
  
  Credi che queste informazioni siano *reali*?
  Glaubst du, dass diese Informationen *wahr* sind?
  
  Non si vive nel *reale*, ma tra sogno e realtà.
  Man lebt nicht in der *Realität*, sondern zwischen Traum und Wirklichkeit.
