Rang: 769
Wort: reale
Wortart: adj
Wort mit Artikel: reale
Femininum / Plural: ''
IPA: ''
Definition: echt, wirklich; real
Register: ''
Beispielsätze: |-
  La polizia deve verificare se la sua paura è *reale* o solo immaginaria.
  Die Polizei muss überprüfen, ob seine Angst *echt* oder nur eingebildet ist.
  
  Penso che questa sia la decisione più *reale* che abbiamo preso finora.
  Ich glaube, das ist die *wirklichste* Entscheidung, die wir bisher getroffen haben.
  
  Il suo *reale* desiderio era vivere in pace, ma la guerra glielo ha impedito.
  Sein *echter* Wunsch war es, in Frieden zu leben, doch der Krieg hat ihn daran gehindert.
  
  Nonostante il *reale* pericolo, hanno deciso di continuare il volo notturno.
  Trotz der *tatsächlichen* Gefahr beschlossen sie, den Nachtflug fortzusetzen.
  
  Se vuoi comprendere il suo *reale* carattere, devi osservarla quando è calma e non sotto stress.
  Wenn du ihren *wahren* Charakter verstehen willst, musst du sie beobachten, wenn sie ruhig ist und nicht unter Stress steht.
