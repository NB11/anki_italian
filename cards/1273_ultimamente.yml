Rang: 1273
Wort: ultimamente
Wortart: adv
Wort mit Artikel: ultimamente
Femininum / Plural: ''
IPA: ''
Definition: in letzter Zeit
Register: ''
Beispielsätze: |-
  Ultimamente ho notato che il *cameriere* del ristorante non è più così gentile come prima.
  In letzter Zeit habe ich bemerkt, dass der Kellner des Restaurants nicht mehr so höflich wie früher ist.
  
  Nonostante sia molto stanco, dorme male *ultimamente*, forse a causa dello stress.
  Obwohl er sehr müde ist, schläft er seit einiger Zeit schlecht, vielleicht wegen des Stresses.
  
  Lavoro molto e non ho tempo per uscire, *ultimamente* preferisco restare a casa a leggere.
  Ich arbeite viel und habe keine Zeit, auszugehen. In letzter Zeit ziehe ich es vor, zu Hause zu bleiben und zu lesen.
  
  Ho saputo che *ultimamente* hanno comprato una villa al mare con un tetto particolare.
  Ich habe gehört, dass sie sich in letzter Zeit eine Villa am Meer mit einem besonderen Dach gekauft haben.
  
  Sembra che *ultimamente* ci siano sempre più persone che dubitano delle soluzioni proposte.
  Es scheint, dass es in letzter Zeit immer mehr Menschen gibt, die an den vorgeschlagenen Lösungen zweifeln.
