Rang: 4256
Wort: celia
Wortart: n.f
Wort mit Artikel: la celia
Femininum / Plural: le celie
IPA: ''
Definition: die Schalkhaftigkeit, der Scherz
Register: ''
Beispielsätze: |-
  Il professore non ha apprezzato la *celia* dello studente durante la lezione.
  Der Professor hat den *Scherz* des Schülers während der Stunde nicht geschätzt.
  
  Nelle sue lettere, ride di ogni *celia* e battuta acidula.
  In seinen Briefen lacht er über jeden *Scherz* und jede bissige Bemerkung.
  
  Se non fosse per la sua *celia*, nessuno lo sopporterebbe a lungo.
  Wenn es nicht seinen *Scherz* gäbe, würde ihn niemand lange ertragen.
  
  La *celia* tra amici, anche se esagerata, rafforza i legami.
  Der *Scherz* unter Freunden, selbst wenn er übertrieben ist, stärkt die Bindungen.
  
  Ho sorriso leggendo la *celia* scritta in fondo alla pagina.
  Ich lächelte, als ich den *Scherz* las, der am Ende der Seite stand.
