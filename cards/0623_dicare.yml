Rang: 623
Wort: dicare
Wortart: v
Wort mit Artikel: dicare
Femininum / Plural: ''
IPA: ''
Definition: widmen, weihen, widmen zu
Register: ''
Beispielsätze: |-
  Gli artisti *dedicano* la loro arte ai grandi maestri del passato.
  Die Künstler *widmen* ihre Kunst den großen Meistern der Vergangenheit.
  
  Questo libro è *dedicato* a mia nonna, che mi ha insegnato l’amore per la lettura.
  Dieses Buch ist *meiner Großmutter gewidmet*, die mir die Liebe zum Lesen beigebracht hat.
  
  *Dedicherai* il tuo tempo libero a imparare una nuova lingua?
  *Wirst du* deine Freizeit *dazu verwenden*, eine neue Sprache zu lernen?
  
  Se avessi tempo, *dedicherei* ogni giorno a viaggiare per il mondo.
  Wenn ich Zeit hätte, *würde ich* jeden Tag *darauf verwenden* zu reisen.
  
  È importante che tu *dedichi* la massima attenzione allo studio per l’esame.
  Es ist wichtig, dass du deinem Studium für die Prüfung *volle Aufmerksamkeit widmest*.
