Rang: 623
Wort: dicare
Wortart: vt
Wort mit Artikel: dicare
Femininum / Plural: ''
IPA: ''
Definition: weihen, widmen, erklären
Register: ''
Beispielsätze: |-
  Molti genitori *dicano* i figli alla religione cattolica.
  Viele Eltern *weisen* ihre Kinder in den katholischen Glauben ein.
  
  Se avessi più tempo, *dicherei* la mia vita alla musica.
  Wenn ich mehr Zeit hätte, *widmete* ich mein Leben der Musik würde.
  
  L’artista ha *dicato* il suo ultimo dipinto a una persona molto simpatica.
  Der Künstler hat sein letztes Gemälde einer sehr *sympathischen* Person gewidmet.
  
  Nonostante le critiche, continuerò a *dicare* la mia energia a questo progetto.
  Trotz der Kritik werde ich meine Energie weiterhin diesem Projekt *widmen*.
  
  Il papa ha *dicato* una chiesa nuova ieri mattina.
  Der Papst hat gestern Morgen eine neue Kirche *geweiht*.
