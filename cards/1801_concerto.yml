Rang: 1801
Wort: concerto
Wortart: n.m
Wort mit Artikel: il concerto
Femininum / Plural: i concerti
IPA: ''
Definition: das Konzert, -e
Register: ''
Beispielsätze: |-
  Stasera andiamo a *concerto* di quella famosa band jazz.
  Heute Abend gehen wir zu *dem* Konzert dieser berühmten Jazzband.
  
  Domani sera ci sarà un *concerto* gratuito in piazza.
  Morgen Abend wird es ein kostenloses *Konzert* auf dem Platz geben.
  
  Ho sentito dire che il *concerto* è stato annullato a causa della pioggia.
  Ich habe gehört, dass das *Konzert* wegen des Regens abgesagt wurde.
  
  Vorrei tanto partecipare a un *concerto* all’Arena di Verona, ma i biglietti costano troppo.
  Ich würde so gern an einem *Konzert* in der Arena von Verona teilnehmen, aber die Tickets sind zu teuer.
  
  Non vedo l’ora che arrivi il *concerto*: sarà un’esperienza indimenticabile!
  Ich kann es kaum erwarten, bis das *Konzert* beginnt: Es wird ein unvergessliches Erlebnis!
