  Se vuoi che ti rispetti, devi agire in modo *onorevole*.
  Wenn du willst, dass man dich respektiert, musst du dich *ehrenhaft* verhalten.
  
  È raro trovare politici davvero *onorevoli* al giorno d’oggi.
  Es ist selten, heute wirklich *anständige* Politiker zu finden.
