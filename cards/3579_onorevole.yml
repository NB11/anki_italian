Beispielsätze: |-
  Il giudice ha una reputazione *onorevole* nella comunità legale.
  Der Richter hat einen *ehrenwerten* Ruf in der Rechtsgemeinschaft.
  
  Nonostante le critiche, rimase un uomo *onorevole* fino alla fine.
  Trotz der Kritik blieb er bis zum Ende ein *ehrbarer* Mann.
  
