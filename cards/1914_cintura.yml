Rang: 1914
Wort: cintura
Wortart: n.f
Wort mit Artikel: la cintura
Femininum / Plural: cinture
IPA: ''
Definition: der Gürtel, -
Register: ''
Beispielsätze: |-
  Portava sempre una *cintura* nera con una fibbia d'argento.
  Er trug immer einen *schwarzen Gürtel* mit einer silbernen Schnalle.
  
  Se *cintura* di sicurezza non è allacciata, l'auto non parte.
  Wenn *der Sicherheitsgurt* nicht angelegt ist, startet das Auto nicht.
  
  Ho perso la *cintura* che mi avevi regalato ieri.
  Ich habe den *Gürtel*, den du mir gestern geschenkt hast, verloren.
  
  Dovresti metterti la *cintura* prima di guidare, è pericoloso!
  Du solltest *den Gürtel* anlegen, bevor du fährst, das ist gefährlich!
  
  Nelle palestre moderne si usano *cinture* speciali per sollevare pesi pesanti.
  In modernen Fitnessstudios verwendet man *spezielle Gürtel* zum Heben schwerer Gewichte.
