Rang: 2521
Wort: incantesimo
Wortart: n.m
Wort mit Artikel: l'incantesimo
Femininum / Plural: gli incantesimi
IPA: ''
Definition: die Verzauberung, -en
Register: ''
Beispielsätze: |-
  L'*incantesimo* che hai letto nel libro è molto antico e potente.
  Die *Verzauberung*, die du im Buch gelesen hast, ist sehr alt und mächtig.
  
  Credi davvero che un semplice *incantesimo* possa risolvere tutti i problemi?
  Glaubst du wirklich, dass eine einfache *Verzauberung* alle Probleme lösen kann?
  
  Lanciai un *incantesimo* per proteggere la mia casa dagli spiriti maligni.
  Ich warf eine *Verzauberung* aus, um mein Haus vor bösen Geistern zu schützen.
  
  Secondo la leggenda, l'*incantesimo* si spezzò solo dopo cento anni.
  Der Legende nach zerbrach die *Verzauberung* erst nach hundert Jahren.
  
  Se avessi pronunciato correttamente le parole, l'*incantesimo* avrebbe funzionato.
  Hättest du die Wörter richtig *ausgesprochen*, dann hätte die Verzauberung gewirkt.
