Rang: 267
Wort: salva
Wortart: n.f
Wort mit Artikel: la salva
Femininum / Plural: salvezze
IPA: ''
Definition: die Rettung, -en
Register: ''
Beispielsätze: |-
  La *salvezza* dei bambini è stata possibile grazie al coraggio dei soccorritori.
  Die *Rettung* der Kinder war dank des Mutes der Rettungskräfte möglich.
  
  Molte persone credono che la *salvezza* dell'ambiente dipenda dalle nostre azioni quotidiane.
  Viele glauben, dass das *Überleben* der Umwelt von unserem täglichen Handeln abhängt.
  
  Dopo il naufragio, la *salvezza* per i naufraghi arrivò solo al mattino.
  Nach dem Schiffbruch kam die *Rettung* für die Schiffbrüchigen erst am Morgen.
  
  La *salvezza* dell'anima è un tema centrale nella teologia cristiana.
  Das *Heil* der Seele ist ein zentrales Thema in der christlichen Theologie.
  
  Con l'aiuto del suo cane, riuscì a trovare la *salvezza* nella foresta.
  Mit Hilfe ihres Hundes konnte sie in dem Wald das *Überleben* finden.
