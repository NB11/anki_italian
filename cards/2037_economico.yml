Rang: 2037
Wort: economico
Wortart: adj
Wort mit Artikel: economico
Femininum / Plural: ''
IPA: ''
Definition: günstig, preiswert, sparsam
Register: ''
Beispielsätze: |-
  Questo ristorante offre un *economico* menù della sera ogni venerdì.
  Dieses Restaurant bietet jeden Freitag ein *günstiges* Abendmenü an.
  
  Se prenoti con anticipo, trovi voli molto *economici* per la Sicilia.
  Wenn du früh buchst, findest du sehr *preiswerte* Flüge nach Sizilien.
  
  Nonostante il *economico* parcheggio vicino alla stazione, preferisco andare a piedi.
  Obwohl der *günstige* Parkplatz in der Nähe des Bahnhofs ist, gehe ich lieber zu Fuß.
  
  Abbiamo scelto una soluzione *economica* per la vacanza, ma pur sempre comoda.
  Wir haben eine *sparsame* Lösung für den Urlaub gewählt, die trotzdem bequem ist.
  
  Credo che sia meglio un prodotto *economico* ma di buona qualità, piuttosto che uno caro e scadente.
  Ich glaube, dass ein *preiswertes* Produkt mit guter Qualität besser ist als ein teures und minderwertiges.
