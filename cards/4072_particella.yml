Rang: 4072
Wort: particella
Wortart: n.f
Wort mit Artikel: la particella
Femininum / Plural: particelle
IPA: ''
Definition: das Teilchen, -
Register: ''
Beispielsätze: |-
  Nella *particella* del DNA è contenuta l’informazione genetica.
  In dem *Teilchen* der DNA ist die genetische Information enthalten.
  
  Gli scienziati hanno isolato una *particella* sconosciuta durante l’esperimento.
  Die Wissenschaftler haben ein unbekanntes *Teilchen* während des Experiments isoliert.
  
  Se vuoi analizzare questa sostanza, devi dividere anche le sue *particelle* più piccole.
  Wenn du diesen Stoff analysieren willst, musst du auch seine kleinsten *Teilchen* teilen.
  
  La *particella* che hai trovato nel laboratorio sembra provenire da un meteorite.
  Das *Teilchen*, das du im Labor gefunden hast, scheint von einem Meteoriten zu stammen.
  
  Le *particelle* di polvere si sono depositate su tutti i mobili della stanza.
  Die Staub*teilchen* haben sich auf allen Möbeln im Raum abgelagert.
