  Abbiamo *riuscito* a vincere la partita grazie alla nostra squadra.
  Wir haben es *geschafft*, das Spiel dank unseres Teams zu gewinnen.
  
  Se vi prepari meglio, *riuscirete* sicuramente all'esame.
  Wenn ihr euch besser vorbereitet, werdet ihr die Prüfung *sicher schaffen*.
