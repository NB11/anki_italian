  Für die Stelle brauchte sie ein *anständiges* professionelles Auftreten.
  
  Chiunque si accontenterebbe di un risultato *decentemente* buono dopo tanto sforzo.
  Nach so viel Mühe würde sich jeder mit einem *zufriedenstellenden* Ergebnis begnügen.
