Rang: 809
Wort: dannazione
Wortart: n.f
Wort mit Artikel: la dannazione
Femininum / Plural: dannazioni
IPA: ''
Definition: der Fluch, -¨e
Register: ''
Beispielsätze: |-
  La *dannazione* del demonio era temuta da tutti in quel piccolo villaggio.
  Der *Fluch* des Dämons wurde in dem kleinen Dorf von allen gefürchtet.
  
  Non riesco a credere che abbia pronunciato una *dannazione* così forte contro suo figlio.
  Ich kann nicht glauben, dass er einen so harten *Fluch* gegen seinen Sohn ausgesprochen hat.
  
  Se avessi saputo il costo della *dannazione*, non avrei mai accettato quel lavoro.
  Hätte ich die Konsequenzen des *Fluchs* gekannt, hätte ich diese Arbeit niemals angenommen.
  
  La strega disse che la sua *dannazione* avrebbe colpito chiunque avesse tradito la promessa fatta nel giardino.
  Die Hexe sagte, ihr *Fluch* würde jeden treffen, der das Versprechen brach, das im Garten gegeben worden war.
  
  È meglio evitare di parlare di *dannazione* in un luogo pubblico, soprattutto con bambini presenti.
  Es ist besser, in der Öffentlichkeit nicht über *Flüche* zu sprechen, besonders wenn Kinder anwesend sind.
