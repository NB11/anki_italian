Rang: 171
Wort: vivere
Wortart: vi
Wort mit Artikel: vivere
Femininum / Plural: ''
IPA: ''
Definition: leben
Register: ''
Beispielsätze: |-
  Io *vivo* in Italia da cinque anni.
  Ich *lebe* seit fünf Jahren in Italien.
  
  Loro *vivranno* felici per sempre, secondo la favola.
  Sie werden laut Märchen für immer glücklich *leben*.
  
  Da quando hai *vissuto* a Berlino?
  Seit wann hast du in Berlin *gelebt*?
  
  Se *vivessi* in montagna, respireresti aria più pulita.
  Wenn du in den Bergen *leben* würdest, würdest du sauberere Luft atmen.
  
  È importante *vivere* il presente senza preoccuparsi troppo del futuro.
  Es ist wichtig, die Gegenwart zu *leben*, ohne sich zu sehr um die Zukunft zu sorgen.
