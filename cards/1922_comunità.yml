Rang: 1922
Wort: comunità
Wortart: n.f
Wort mit Artikel: la comunità
Femininum / Plural: comunità
IPA: ''
Definition: die Gemeinschaft, -en
Register: ''
Beispielsätze: |-
  La *comunità* locale ha organizzato una festa per raccogliere fondi.
  Die *lokale Gemeinschaft* hat ein Fest organisiert, um Geld zu sammeln.
  
  Molti abitanti della *comunità* si sono uniti per proteggere l’ambiente.
  Viele Bewohner der *Gemeinschaft* haben sich zusammengeschlossen, um die Umwelt zu schützen.
  
  C’è chi dice che questa *comunità* sia la più accogliente della regione.
  Manche sagen, dass diese *Gemeinschaft* die einladendste der Region ist.
  
  Se la *comunità* non interverrà, il problema non potrà essere risolto.
  Wenn die *Gemeinschaft* nicht eingreift, kann das Problem nicht gelöst werden.
  
  La *comunità* scientifica sta analizzando i dati raccolti recentemente.
  Die *wissenschaftliche Gemeinschaft* analysiert gerade die kürzlich gesammelten Daten.
