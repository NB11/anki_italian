Rang: 4053
Wort: cospirazione
Wortart: n.f
Wort mit Artikel: la cospirazione
Femininum / Plural: cospirazioni
IPA: ''
Definition: die Verschwörung, -en
Register: ''
Beispielsätze: |-
  La polizia ha scoperto una *cospirazione* contro il governo.
  Die Polizei hat eine *Verschwörung* gegen die Regierung entdeckt.
  
  È convinto che dietro ogni evento ci sia una *cospirazione* organizzata da potenti.
  Er ist überzeugt, dass hinter jedem Ereignis eine von Mächtigen organisierte *Verschwörung* steckt.
  
  Se avessi saputo della *cospirazione*, avrei agito diversamente.
  Hätte ich von der *Verschwörung* gewusst, hätte ich anders gehandelt.
  
  La *cospirazione* è stata smascherata grazie a un testimone coraggioso.
  Die *Verschwörung* wurde durch einen mutigen Zeugen aufgedeckt.
  
  Pensano che la *cospirazione* fosse solo un'invenzione dei media.
  Sie glauben, die *Verschwörung* sei nur eine Erfindung der Medien gewesen.
