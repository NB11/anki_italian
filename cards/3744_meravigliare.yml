Rang: 3744
Wort: meravigliare
Wortart: vt
Wort mit Artikel: meravigliare
Femininum / Plural: ''
IPA: ''
Definition: verblüffen, erstaunen, in Erstaunen versetzen
Register: ''
Beispielsätze: |-
  La bellezza del paesaggio *ha meravigliato* tutti i turisti che lo hanno visitato.
  Die Schönheit der Landschaft hat *alle* in Erstaunen versetzt.
  
  Mi *meraviglia* che tu non abbia ancora risposto alla mia domanda, è così importante!
  Es *wundert* mich, dass du meine Frage noch nicht beantwortet hast – sie ist doch so wichtig!
  
  Lo scienziato rimase *meravigliato* davanti alla scoperta che aveva meravigliato la comunità intera.
  Der Wissenschaftler blieb *verblüfft* angesichts der Entdeckung, die die ganze Gemeinschaft in Erstaunen versetzte.
  
  Non *meravigliarti* se domani piove, è una stagione instabile.
  Wundere dich nicht, wenn es morgen regnet – die Jahreszeit ist *unstabil*.
  
  Avrei *meravigliato* anche me stesso con quella risposta, se non fossi stato così sicuro di me.
  Ich hätte *mich selbst* mit dieser Antwort in Erstaunen versetzt, wenn ich mir nicht so sicher gewesen wäre.
