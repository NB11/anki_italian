Rang: 2162
Wort: polmone
Wortart: n.m
Wort mit Artikel: il polmone
Femininum / Plural: i polmoni
IPA: ''
Definition: die Lunge, -n
Register: ''
Beispielsätze: |-
  Il medico ha detto che il *polmone* di Marco è ancora un po' debole dopo l'influenza.
  Der Arzt sagte, dass Marcos *Lunge* nach der Grippe noch etwas schwach ist.
  
  Se avessi saputo dei rischi del fumo, non avrei mai iniziato a *polmoni* così giovani!
  Wenn ich die Risiken des Rauchens gewusst hätte, hätte ich mir nie *Lungen* so früh ruiniert!
  
  Nonostante l’allergia, Giulia riesce a correre anche senza *polmone* irritato.
  Trotz der Allergie schafft es Giulia zu laufen, ohne dass ihr *Lunge* gereizt wird.
  
  Lo pneumologo ha spiegato che il *polmone* sinistro mostra segni di compromissione, ma si può ancora intervenire.
  Der Lungenarzt erklärte, dass der linke *Lunge* Anzeichen einer Beeinträchtigung zeigt, aber man noch eingreifen kann.
  
  È fondamentale proteggere i *polmoni* dall’inquinamento urbano, soprattutto nei centri cittadini.
  Es ist entscheidend, die *Lungen* vor städtischer Verschmutzung zu schützen, besonders in Großstädten.
