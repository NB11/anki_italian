Rang: 4895
Wort: precedere
Wortart: vt
Wort mit Artikel: precedere
Femininum / Plural: ''
IPA: ''
Definition: vorangehen, vorausgehen
Register: ''
Beispielsätze: |-
  La polizia *precede* l’ambulanza per aprire la strada ai soccorsi.
  Die Polizei geht dem Krankenwagen *voraus*, um die Rettungskräfte freizubekommen.
  
  Nel dialogo, le sue parole *precedono* sempre quelle dell’interlocutore.
  In dem Dialog gehen seine Worte immer denen des Gesprächspartners *voraus*.
  
  Il treno *precederà* l’autobus di circa venti minuti.
  Der Zug wird dem Bus um etwa zwanzig Minuten *vorausgehen*.
  
  Se *precedi* troppo la marcia, rischi di perdere il controllo del veicolo.
  Wenn du den Gang zu *voraus* schaltest, riskierst du, die Kontrolle über das Fahrzeug zu verlieren.
  
  Era fondamentale che il fatto *precedente* venisse chiarito prima della decisione.
  Es war entscheidend, dass die *vorherige* Tatsache geklärt wurde, bevor die Entscheidung fiel.
