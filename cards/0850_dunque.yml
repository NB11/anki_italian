Rang: 850
Wort: dunque
Wortart: adv
Wort mit Artikel: dunque
Femininum / Plural: ''
IPA: ''
Definition: also, daher, also
Register: ''
Beispielsätze: |-
  Stamattina *dunque* il colonnello ha ricevuto un segnale importante dal comando centrale.
  Heute Morgen hat der Oberst also ein wichtiges Signal vom Hauptquartier erhalten.
  
  Il giudice ha rifiutato il suo compito, *dunque* dovrà cercarne un altro.
  Der Richter hat seine Aufgabe abgelehnt, also muss er sich eine andere suchen.
  
  Se non ti accorgi della differenza, *dunque* hai un problema con la pelle.
  Wenn du den Unterschied nicht bemerkst, hast du also ein Problem mit der Haut.
  
  I suoi ex amici hanno tradito la fiducia, *dunque* lui non li apprezza più.
  Seine ehemaligen Freunde haben das Vertrauen verraten, also schätzt er sie nicht mehr.
