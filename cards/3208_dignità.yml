Rang: 3208
Wort: dignità
Wortart: n.f
Wort mit Artikel: la dignità
Femininum / Plural: dignità
IPA: ''
Definition: die Würde, die würdevolle Haltung
Register: ''
Beispielsätze: |-
  Nelle società democratiche, rispettare la *dignità* di ogni persona è fondamentale.
  In demokratischen Gesellschaften ist es fundamental, die *Würde* jeder Person zu respektieren.
  
  L'avvocato difese il suo cliente con *dignità*, nonostante le accuse.
  Der Anwalt verteidigte seinen Mandanten mit *würdevoller Haltung*, trotz der Anschuldigungen.
  
  Per me, la *dignità* conta più della ricchezza materiale.
  Für mich zählt die *Würde* mehr als materieller Reichtum.
  
  Ha perso la *dignità* quando ha accettato quella proposta indecente.
  Er hat die *Würde* verloren, als er diesen unangemessenen Vorschlag annahm.
  
  Nonostante le difficoltà, mantenne sempre la sua *dignità* con fierezza.
  Trotz der Schwierigkeiten bewahrte sie stets ihre *Würde* mit Stolz.
