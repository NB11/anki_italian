Rang: 1262
Wort: cucinare
Wortart: v
Wort mit Artikel: cucinare
Femininum / Plural: ''
IPA: ''
Definition: kochen
Register: ''
Beispielsätze: |-
  Mio nonno *cucinava* la pasta fresca ogni domenica.
  Meine Oma *kochte* Frischnudeln jeden Sonntag.
  
  Stasera vorrei *cucinare* un risotto ai funghi, ma ho paura che non venga bene.
  Heute Abend würde ich gerne ein Pilzrisotto *kochen*, aber ich fürchte, es wird nicht gelingen.
  
  Se avessi più tempo, *cucinerei* piatti che richiedono lunghe preparazioni, come il brasato.
  Wenn ich mehr Zeit hätte, würde ich Gerichte *kochen*, die lange Zubereitung erfordern, wie z.B. einen Schmorbraten.
  
  Ho visto alla televisione un cuoco che sta *cucinando* con ingredienti molto particolari.
  Ich habe im Fernsehen einen Koch gesehen, der gerade mit sehr besonderen Zutaten *kocht*.
  
  Nonostante abbia provato molte volte, non riesco ancora a *cucinare* gli gnocchi perfetti.
  Trotz vieler Versuche gelingt es mir immer noch nicht, perfekte Gnocchi zu *kochen*.
