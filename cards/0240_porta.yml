Rang: 240
Wort: porta
Wortart: n.f
Wort mit Artikel: la porta
Femininum / Plural: porte
IPA: ''
Definition: die Tür, -en
Register: ''
Beispielsätze: |-
  La *porta* della cucina è aperta.
  Die *Tür* der Küche ist offen.
  
  Hai chiuso tutte le *porte* prima di uscire?
  Hast du alle *Türen* geschlossen, bevor du gegangen bist?
  
  Vor l'entrata c'è una *porta* a due battenti.
  Vor dem Eingang gibt es eine *Doppeltür*.
  
  Non riesco ad aprire la *porta* del garage.
  Ich schaffe es nicht, die *Garagentür* zu öffnen.
  
  Se la *porta* non si chiude bene, chiamerò il falegname.
  Wenn die *Tür* nicht richtig schließt, rufe ich den Tischler.
