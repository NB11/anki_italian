Rang: 2472
Wort: tocco
Wortart: n.m
Wort mit Artikel: il tocco
Femininum / Plural: tocchi
IPA: ''
Definition: der Sinnesreiz, -e
Register: ''
Beispielsätze: |-
  Quando *tocchi* il vetro, senti una sensazione fredda.
  Wenn du das *Glas* berührst, spürst du eine kalte Empfindung.
  
  Non riesco a credere che abbia dato un *tocco* così lieve sulla tastiera.
  Ich kann nicht glauben, dass er einen so leichten *Tastendruck* auf der Tastatur gegeben hat.
  
  L’artista usa *tocchi* delicati per creare le sfumature nel dipinto.
  Der Künstler verwendet sanfte *Pinselstriche*, um die Nuancen im Gemälde zu schaffen.
  
  Con un singolo *tocco* sulla spalla, lo invitò a sedersi vicino a lui.
  Mit einer einzigen *Berührung* an der Schulter lud er ihn ein, sich neben ihn zu setzen.
  
  I *tocchi* di pittura che ha aggiunto hanno trasformato completamente l’opera.
  Die Farb*striche*, die er hinzugefügt hat, haben das Werk vollständig verändert.
