Rang: 2317
Wort: extra
Wortart: n.m
Wort mit Artikel: l'extra
Femininum / Plural: gli extra
IPA: ''
Definition: die Extragebühr, -en
Register: ''
Beispielsätze: |-
  Questo albergo applica un *extra* per i servizi aggiuntivi come la colazione.
  Dieses Hotel erhebt eine *Extragebühr* für zusätzliche Leistungen wie das Frühstück.
  
  Devi pagare un *extra* se vuoi una camera con vista sul mare.
  Du musst eine *Extragebühr* zahlen, wenn du ein Zimmer mit Meerblick möchtest.
  
  Mi hanno chiesto un *extra* inaspettato per il noleggio della barca, ma ho rifiutato.
  Sie haben mir eine unerwartete *Extragebühr* für die Bootsmiete abverlangt, aber ich habe abgelehnt.
  
  Se prenoti con largo anticipo, spesso l’albergo non applica *extra* per le prenotazioni anticipate.
  Wenn du sehr früh buchst, erhebt das Hotel oft keine *Extragebühren* für Frühbuchungen.
  
  Il ristorante include nel prezzo principale alcuni *extra* come il caffè e il dolce finale.
  Das Restaurant berechnet in seinem Hauptpreis einige *Extras* wie den Kaffee und das Dessert am Ende.
