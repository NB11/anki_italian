Rang: 672
Wort: firmare
Wortart: v
Wort mit Artikel: firmare
Femininum / Plural: ''
IPA: ''
Definition: unterschreiben, signieren
Register: ''
Beispielsätze: |-
  Devi *firmare* il contratto prima di domani.
  Du musst den Vertrag vor morgen *unterschreiben*.
  
  Ha *firmato* un autografo per la sua fan più gentile.
  Er hat ein Autogramm für seine *liebenswürdigste* Fan unterschrieben.
  
  Se non *firma* questo documento, non possiamo procedere con il trasferimento.
  Wenn er dieses Dokument nicht *unterschreibt*, können wir den Transfer nicht durchführen.
  
  Mi piacerebbe che tu *firmassi* la petizione per questa legge necessaria.
  Ich würde mich freuen, wenn du die Petition für dieses *erforderliche* Gesetz unterschreibst.
  
  Abbiamo appena *firmato* un accordo con una zona commerciale della città.
  Wir haben gerade ein Abkommen mit einer Handels*zone* der Stadt unterzeichnet.
