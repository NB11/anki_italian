  Der Bauernhof neben dem Dorf verkauft nur *biologische* Milch.
  
  Le leggi europee impongono standard molto rigorosi per i cibi *biologici*.
  Die europäischen Gesetze verlangen sehr strenge Standards für *biologische* Lebensmittel.
  
  Vorrei sapere se questo vino è *biologico* o no, perché preferisco quelli naturali.
