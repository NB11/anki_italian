Rang: 3418
Wort: rovesciare
Wortart: vt
Wort mit Artikel: rovesciare
Femininum / Plural: ''
IPA: ''
Definition: umkippen, stürzen, übergießen
Register: ''
Beispielsätze: |-
  Stai attento! Non *rovesciare* quel bicchiere di vino rosso sul tappeto persiano.
  Pass auf! Du darfst den *Wein* nicht auf den persischen Teppich umkippen.
  
  Hanno deciso di *rovesciare* il governo dopo anni di corruzione diffusa.
  Sie beschlossen, die Regierung nach Jahren weit verbreiteter Korruption zu *stürzen*.
  
  Se avessi tenuto il vaso con più attenzione, non lo avresti *rovesciato* sul pavimento bagnato.
  Hättest du die Vase sorgfältiger gehalten, hättest du sie nicht auf den nassen Boden *umgestürzt*.
  
  Mentre preparava la cena, mia sorella inavvertitamente *rovesciò* il latte bollente sulla sua mano.
  Während sie das Abendessen zubereitete, schüttete meine Schwester versehentlich die *kochende Milch* auf ihre Hand.
  
  Il sindaco vuole *rovesciare* la situazione economica della regione entro il prossimo anno.
  Der Bürgermeister will die wirtschaftliche *Lage* der Region innerhalb des nächsten Jahres umkehren.
