Rang: 1221
Wort: comune
Wortart: adj
Wort mit Artikel: comune
Femininum / Plural: ''
IPA: ''
Definition: häufig, üblich, gemeinsam
Register: ''
Beispielsätze: |-
  Questa è una decisione *comune* tra gli amici.
  Das ist eine *häufige* Entscheidung unter Freunden.
  
  Stavolta vogliamo un approccio diverso, non quello *comune*.
  Dieses Mal wollen wir einen anderen Ansatz, nicht den *üblichen*.
  
  Il problema *comune* dei nuovi arrivati è la lingua.
  Das *häufigste* Problem der Neuankömmlinge ist die Sprache.
  
  Non è *comune* trovare un mercato così pulito nella capitale.
  Es ist nicht *normal*, einen so sauberen Markt in der Hauptstadt zu finden.
  
  Hai mai visto una realtà così *comune* trasformarsi in qualcosa di straordinario?
  Hast du jemals eine so *gewöhnliche* Realität gesehen, die sich in etwas Außergewöhnliches verwandelt?
