Rang: 4369
Wort: piombo
Wortart: n.m
Wort mit Artikel: il piombo
Femininum / Plural: piombi
IPA: ''
Definition: das Blei, -e
Register: ''
Beispielsätze: |-
  La *piombo* è un metallo molto pesante usato in molti settori industriali.
  Das *Blei* ist ein sehr schweres Metall, das in vielen Industriezweigen verwendet wird.
  
  Hanno trovato una statua antica fatta di *piombo* puro nel giardino.
  Man hat eine antike Statue aus reinem *Blei* im Garten gefunden.
  
  Nonostante il *piombo* sia tossico, viene ancora impiegato in alcune batterie.
  Obwohl *Blei* giftig ist, wird es immer noch in einigen Batterien eingesetzt.
  
  Se il tetto è vecchio, potrebbe contenere lastre di *piombo* che andrebbero sostituite.
  Wenn das Dach alt ist, könnte es *Blei*platten enthalten, die ersetzt werden müssten.
  
  Gli studiosi stanno analizzando la composizione di un antico manoscritto scritto con inchiostro a base di *piombo*.
  Die Forscher analysieren die Zusammensetzung einer alten Handschrift, die mit *Blei*haltiger Tinte geschrieben wurde.
