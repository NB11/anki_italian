Rang: 4889
Wort: artiglieria
Wortart: n.f
Wort mit Artikel: l'artiglieria
Femininum / Plural: artiglierie
IPA: ''
Definition: die Artillerie, -en
Register: ''
Beispielsätze: |-
  L'*artiglieria* moderna è molto più precisa di quella della Prima guerra mondiale.
  Die *moderne Artillerie* ist viel präziser als die des Ersten Weltkriegs.
  
  Gli storici hanno scoperto che l'*artiglieria* fu decisiva nella battaglia di Waterloo.
  Die Historiker haben herausgefunden, dass die *Artillerie* in der Schlacht von Waterloo entscheidend war.
  
  Se avessimo più cannoni, potremmo schierare meglio l'*artiglieria*.
  Wenn wir mehr Geschütze hätten, könnten wir die *Artillerie* besser in Stellung bringen.
  
  Il generale ordinò di aprire il fuoco con l'*artiglieria* nonostante le perdite civili.
  Der General befahl, mit der *Artillerie* das Feuer zu eröffnen, trotz der zivilen Verluste.
  
  Nonostante i danni, l'*artiglieria* nemica continuò a colpire la nostra posizione.
  Trotz der Schäden feuerte die *feindliche Artillerie* weiterhin auf unsere Stellung.
