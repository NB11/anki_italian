Rang: 792
Wort: scopare
Wortart: vi
Wort mit Artikel: scopare
Femininum / Plural: ''
IPA: ''
Definition: ficken, bumsen
Register: ''
Beispielsätze: |-
  Stasera andremo al *scopare* in discoteca, sempre che tu ci tenga ancora a me.
  Heute Abend gehen wir *ficken* in den Club, falls du mich noch magst.
  
  Nonostante avesse detto che non avrebbe più *scopato* con lui, alla fine ha ceduto per debolezza.
  Obwohl sie gesagt hatte, dass sie nicht mehr *mit ihm schlafen* würde, hat sie schließlich aus Schwäche nachgegeben.
  
  Se non la smetti di urlare, ti costringerò a *scopare* da solo, tanto è inutile!
  Wenn du nicht aufhörst zu schreien, zwinge ich dich *allein zu bumsen*, es hat ja doch keinen Sinn!
  
  Dopo che avranno finito di *scopare*, potrebbero mangiare qualcosa insieme a me e il terzo della classe.
  Nachdem sie fertig sind *zu ficken*, könnten sie etwas mit mir und dem Dritten aus der Klasse essen.
  
  Non mi importa se *scopare* con un nemico è contro ogni rispetto: la guerra porta anche queste situazioni assurde.
  Es ist mir egal, ob *mit einem Feind zu schlafen* gegen jeden Respekt verstößt: Der Krieg bringt auch diese absurden Situationen mit sich.
