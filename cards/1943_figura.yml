Rang: 1943
Wort: figura
Wortart: n.m
Wort mit Artikel: la figura
Femininum / Plural: figure
IPA: ''
Definition: die Figur, -en, der Charakter, -e
Register: ''
Beispielsätze: |-
  Nel romanzo *figura* un personaggio molto complesso e ambiguo.
  In dem Roman *entspringt* eine sehr komplexe und ambivalente Figur.
  
  La *figura* del padre nella sua opera è sempre molto protettiva.
  Die *Figur* des Vaters in seinem Werk ist stets sehr beschützend.
  
  Hanno criticato la *figura* pubblica del sindaco dopo lo scandalo.
  Sie haben das öffentliche *Bild* des Bürgermeisters nach dem Skandal kritisiert.
  
  Quella *figura* misteriosa apparve solo per un attimo nella stanza.
  Diese mysteriöse *Gestalt* erschien nur für einen Moment im Raum.
  
  Per la festa, ognuno deve indossare una *figura* simbolica del proprio Paese.
  Zum Fest muss jeder eine symbolische *Figur* seines Landes tragen.
