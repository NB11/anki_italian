Rang: 1232
Wort: sospetto
Wortart: n.m
Wort mit Artikel: il sospetto
Femininum / Plural: i sospetti
IPA: ''
Definition: der Verdacht, die Vermutung
Register: ''
Beispielsätze: |-
  Il poliziotto ha un *sospetto* molto concreto su chi abbia commesso il reato.
  Der Polizist hat einen sehr konkreten *Verdacht*, wer die Tat begangen haben könnte.
  
  Non ho alcun *sospetto* che tu stia mentendo, ma devo controllare i fatti.
  Ich habe keinen einzigen *Verdacht*, dass du lügst – aber ich muss die Fakten überprüfen.
  
  Se avessi avuto dei *sospetti*, li avrei subito rivelati alla polizia.
  Falls ich *Verdacht* gehabt hätte, hätte ich ihn sofort der Polizei gemeldet.
  
  È solo un *sospetto* senza prove, non possiamo agire basandoci su questo.
  Es ist nur ein *Verdacht* ohne Beweise – darauf können wir keine Maßnahmen stützen.
  
  Quando hai visto per la prima volta il *sospetto* vicino alla scena del crimine?
  Wann hast du den *Verdächtigen* zum ersten Mal in der Nähe des Tatorts gesehen?
