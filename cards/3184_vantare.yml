Rang: 3184
Wort: vantare
Wortart: v
Wort mit Artikel: vantare
Femininum / Plural: ''
IPA: ''
Definition: prahlen, angeben
Register: ''
Beispielsätze: |-
  Non *vantare* troppo la tua vittoria, dopotutto hai avuto fortuna.
  Prahle nicht zu sehr mit deinem Sieg, schließlich hattest du Glück.
  
  Si dice che il sindaco *vantasse* relazioni pericolose con la mafia.
  Man sagt, der Bürgermeister *prahle* mit gefährlichen Verbindungen zur Mafia.
  
  Se *vanti* troppo i tuoi successi, nessuno ti crederà più.
  Wenn du mit deinen Erfolgen zu sehr *prahlt*, wird dir niemand mehr glauben.
  
  Avrei *vantato* il mio record personale, ma nessuno mi ascoltava.
  Ich hätte mit meiner persönlichen Bestleistung *geprahlt*, aber niemand hörte mir zu.
  
  È meglio tacere le proprie capacità che *vantarsi* senza motivo.
  Es ist besser, seine Fähigkeiten zu verschweigen, als sich ohne Grund zu *brüsten*.
