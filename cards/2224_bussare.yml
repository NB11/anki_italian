Rang: 2224
Wort: bussare
Wortart: vi
Wort mit Artikel: bussare
Femininum / Plural: ''
IPA: ''
Definition: klopfen, anklopfen
Register: ''
Beispielsätze: |-
  Senti qualcuno che *busso* alla porta d’ingresso.
  Hörst du jemanden, der *klopft* an der Haustür?
  
  Se tu *busserai* più forte, forse ci sentiranno.
  Wenn du *anklopfst* lauter, vielleicht hören sie uns.
  
  Mentre i ragazzi giocavano, qualcuno *bussava* con insistenza.
  Während die Kinder spielten, *klopfte* jemand beharrlich.
  
  Non vorrei che *bussassero* proprio ora, aspetto una telefonata importante.
  Ich möchte nicht, dass sie *anklopfen* genau jetzt, ich erwarte einen wichtigen Anruf.
  
  Una volta *busso* e poi vado via, non ho voglia di aspettare oltre.
  Ich *klopfe* einmal und dann gehe ich weg, ich habe keine Lust, länger zu warten.
