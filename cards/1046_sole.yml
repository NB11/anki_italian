Rang: 1046
Wort: sole
Wortart: n.m
Wort mit Artikel: il sole
Femininum / Plural: i soli
IPA: ''
Definition: die Sonne
Register: ''
Beispielsätze: |-
  In estate *sole* splende più forte di tutto il giorno.
  Im Sommer scheint die *Sonne* den ganzen Tag stärker.
  
  *Sole* di mezzogiorno scottava tanto che non si poteva uscire senza cappello.
  Die Mittags-*sonne* brannte so stark, dass man ohne Hut nicht hinausgehen konnte.
  
  Credi che *sole* abbia aiutato la crescita di queste piante?
  Glaubst du, dass die *Sonne* das Wachstum dieser Pflanzen gefördert hat?
  
  Se avessi più *sole* in inverno, mi godrei di più il giardino.
  Wenn es im Winter mehr *Sonne* gäbe, würde ich den Garten viel mehr genießen.
  
  *Sole* che tramonta dietro quella collina è uno spettacolo meraviglioso.
  Die *Sonne*, die hinter diesem Hügel untergeht, ist ein wunderschönes Schauspiel.
