Rang: 3201
Wort: turista
Wortart: n.m
Wort mit Artikel: il turista
Femininum / Plural: i turisti
IPA: ''
Definition: der Tourist, -en
Register: ''
Beispielsätze: |-
  Il *turista* ha scattato una foto al Colosseo mentre visitava Roma.
  Der *Tourist* hat ein Foto vom Kolosseum gemacht, während er Rom besuchte.
  
  I *turisti* che arrivano in città spesso si fermano in questa piazza affollata.
  Die *Touristen*, die in die Stadt kommen, bleiben oft auf diesem belebten Platz stehen.
  
  Ho incontrato un *turista* giapponese che cercava l'indirizzo della stazione.
  Ich habe einen japanischen *Touristen* getroffen, der nach der Adresse des Bahnhofs suchte.
  
  Se fossi un *turista*, vorrei esplorare anche i paesi limitrofi.
  Wenn ich ein *Tourist* wäre, würde ich auch die umliegenden Länder erkunden.
  
  I turisti che visitano Venezia spesso si perdono tra i canali affascinanti.
  Die *Touristen*, die Venedig besuchen, verirren sich oft in den faszinierenden Kanälen.
