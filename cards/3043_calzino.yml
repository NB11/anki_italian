Rang: 3043
Wort: calzino
Wortart: n.m
Wort mit Artikel: il calzino
Femininum / Plural: calzini
IPA: ''
Definition: die Socke, -n
Register: ''
Beispielsätze: |-
  Non riesco a trovare il mio *calzino* blu, è sparito nel bucato!
  Ich kann meine *Socke* nicht finden, sie ist in der Wäsche verschwunden!
  
  Mentre correvo, ho notato che un *calzino* si era sfilato dal piede.
  Als ich lief, bemerkte ich, dass sich ein *Strumpf* vom Fuß gelöst hatte.
  
  Avvolgendo i regali, ho dimenticato di mettere un *calzino* come confezione regalo.
  Beim Einwickeln der Geschenke habe ich vergessen, als Geschenkverpackung eine *Socke* zu verwenden.
  
  Si dice che indossare calzini di lana aiuti a prevenire i crampi ai polpacci, ma non ne sono sicuro.
  Man sagt, dass das Tragen von Woll*strümpfen* Wadenkrämpfe verhindert, aber ich bin mir nicht sicher.
  
  Quando ho aperto il cassetto, ho visto che tutti i *calzini* erano spariti tranne uno solitario.
  Als ich die Schublade öffnete, stellte ich fest, dass alle *Socken* verschwunden waren bis auf eine einsame.
