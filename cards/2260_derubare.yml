Rang: 2260
Wort: derubare
Wortart: v
Wort mit Artikel: derubare
Femininum / Plural: ''
IPA: ''
Definition: berauben, ausrauben
Register: ''
Beispielsätze: |-
  I ladri hanno *derubato* la signora anziana di tutti i suoi risparmi.
  Die Diebe haben der alten Frau *alle* ihre Ersparnisse beraubt.
  
  Se qualcuno ti *deruba*, devi chiamare immediatamente la polizia.
  Wenn dich jemand *beraubt*, musst du sofort die Polizei rufen.
  
  L’uomo minacciò di *derubare* il negozio se non gli avessero dato i soldi.
  Der Mann drohte, das Geschäft zu *berauben*, falls sie ihm das Geld nicht geben würden.
  
  Credi che sarà possibile *derubare* un museo così ben sorvegliato?
  Glaubst du, es wird möglich sein, ein Museum, das so gut bewacht *ist*, zu berauben?
  
  Mi hanno detto che qualcuno ha provato a *derubarmi* mentre dormivo, ma non ci è riuscito.
  Man hat mir gesagt, jemand habe versucht, mich zu *berauben*, während ich schlief, aber es ist ihm nicht gelungen.
