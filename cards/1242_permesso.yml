Rang: 1242
Wort: permesso
Wortart: adj
Wort mit Artikel: il permesso
Femininum / Plural: i permessi
IPA: ''
Definition: erlaubt, gestattet
Register: ''
Beispielsätze: |-
  È *permesso* includere animali nell'abitazione?
  Ist es *erlaubt*, Tiere in der Wohnung zu halten?
  
  Questo locale è *permesso* solo agli invitati con un abito elegante.
  Dieser Raum ist nur Gästen mit einem eleganten *Kleid* gestattet.
  
  L'accesso al mercato centrale è *permesso* solo ai fornitori con un permesso speciale.
  Der *Zugang* zum zentralen Markt ist nur Händlern mit einer Sondererlaubnis gestattet.
  
  Credo che sia *permesso* fumare fuori dal tetto dell'edificio, ma non dentro.
  Ich glaube, es ist *erlaubt*, vor dem Dach des Gebäudes zu rauchen, aber nicht drinnen.
  
  Se non hai il *permesso* scritto, non puoi disporre delle proprietà altrui, altrimenti è un reato.
  Wenn du keine schriftliche Erlaubnis hast, darfst du fremdes *Eigentum* nicht anordnen – sonst ist das ein Vergehen.
