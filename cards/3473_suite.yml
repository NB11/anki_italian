Beispielsätze: |-
  In questo hotel c'è una *suite* con vista sul mare che costa molto di più delle altre camere.
  In diesem Hotel gibt es eine *Suite* mit Meerblick, die viel teurer ist als die anderen Zimmer.
  
  Dopo il lavoro ho prenotato una *suite* in un albergo di lusso per rilassarmi.
  Nach der Arbeit habe ich eine *Suite* in einem Luxushotel gebucht, um mich zu erholen.
  
  Quando arrivò all'aeroporto, gli fu assegnata una *suite* in prima classe senza alcun costo aggiuntivo.
  Als er am Flughafen ankam, wurde ihm eine *Suite* in der First Class ohne zusätzliche Kosten zugewiesen.
  
  La *suite* presidenziale del palazzo era riservata solo agli ospiti più importanti dello stato.
  Die Präsidenten-*Suite* des Palastes war nur den wichtigsten Gästen des Staates vorbehalten.
  
  Se volessi regalare un soggiorno indimenticabile, prenoterei una *suite* in un resort di lusso alle Maldive.
  Wenn ich einen unvergesslichen Aufenthalt verschenken wollte, würde ich eine *Suite* in einem Luxusresort auf den Malediven buchen.
