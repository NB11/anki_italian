Rang: 1498
Wort: rabbia
Wortart: n.f
Wort mit Artikel: la rabbia
Femininum / Plural: rabie
IPA: ''
Definition: der Ärger, Wut; die Wut
Register: ''
Beispielsätze: |-
  Non riesco a controllare la *rabbia* quando vedo tanta ingiustizia nel mondo.
  Ich kann meinen *Zorn* nicht kontrollieren, wenn ich so viel Ungerechtigkeit in der Welt sehe.
  
  La *rabbia* dell'artista nei confronti della critica era evidente durante l'intervista.
  Die *Wut* des Künstlers gegenüber der Kritik war während des Interviews offensichtlich.
  
  Se hai tanta *rabbia* dentro di te, cerca di esprimerla in modo costruttivo, non distruttivo.
  Wenn du so viel *Wut* in dir hast, versuche, sie konstruktiv und nicht zerstörerisch auszudrücken.
  
  È normale provare *rabbia* quando qualcuno tradisce la tua amicizia.
  Es ist normal, *Wut* zu empfinden, wenn jemand deine Freundschaft verrät.
  
  La *rabbia* che senti è solo l'inizio: rifletti prima di agire d'impulso.
  Die *Wut*, die du spürst, ist erst der Anfang – überlege, bevor du impulsiv handelst.
