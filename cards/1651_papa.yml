Rang: 1651
Wort: papa
Wortart: n.m
Wort mit Artikel: il papa
Femininum / Plural: ''
IPA: ''
Definition: der Papst, -e
Register: ''
Beispielsätze: |-
  Il *papa* ha visitato la chiesa locale ieri pomeriggio.
  Der *Papst* hat gestern Nachmittag die örtliche Kirche besucht.
  
  Mentre il *papa* parlava, molti fedeli hanno pianto dalla gloria e dalla commozione.
  Während der *Papst* sprach, weinten viele Gläubige vor Ruhm und Rührung.
  
  Se il *papa* non avesse annullato la visita, milioni di persone sarebbero venute a Roma.
  Wenn der *Papst* den Besuch nicht abgesagt hätte, wären Millionen Menschen nach Rom gekommen.
  
  Ho sentito dire che il nuovo *papa* è molto giovane e carismatico, ma non ci credo finché non lo vedo.
  Ich habe gehört, dass der neue *Papst* sehr jung und charismatisch ist, aber ich glaube es erst, wenn ich ihn sehe.
  
  Il *papa*, che tutti chiamano con affetto "Francesco", viene dall'Argentina e ama molto gli animali.
  Der *Papst*, den alle liebevoll „Franziskus“ nennen, kommt aus Argentinien und liebt Tiere.
