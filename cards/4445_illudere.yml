Rang: 4445
Wort: illudere
Wortart: v
Wort mit Artikel: illudere
Femininum / Plural: ''
IPA: ''
Definition: täuschen, sich *irreführen*
Register: ''
Beispielsätze: |-
  Non volevo *illudere* te, ma la realtà è diversa da come sembra.
  Ich wollte dich nicht *täuschen*, aber die Realität ist anders, als es scheint.
  
  Si lasciò *illudere* dalle sue promesse vuote per mesi interi.
  Er ließ sich monatelang von seinen leeren Versprechungen *irreführen*.
  
  Se avessi saputo che avrebbe *illuso* anche lei, non sarei stato così ingenuo.
  Wenn ich gewusst hätte, dass er auch sie *getäuscht* hätte, wäre ich nicht so naiv gewesen.
  
  Stai cercando di *illuderti* che tutto si sistemerà da solo?
  Versuchst du dir *vorzumachen*, dass sich alles von selbst regelt?
  
  Spero di non *illuderti* con questo consiglio, ma è l’unica via possibile.
  Ich hoffe, ich *täusche* dich nicht mit diesem Rat, aber es ist der einzige mögliche Weg.
