Rang: 2178
Wort: dea
Wortart: n.f
Wort mit Artikel: la dea
Femininum / Plural: dee
IPA: ''
Definition: die Göttin, -nen
Register: ''
Beispielsätze: |-
  Gli antichi greci credevano che Zeus fosse il *dea* del cielo.
  Die alten Griechen glaubten, Zeus sei der *Göttin* des Himmels.
  
  Se tu fossi una *dea*, quale potere vorresti avere?
  Wenn du eine *Göttin* wärst, welche Macht würdest du dir wünschen?
  
  L'*dea* Atena era protettrice della saggezza e della guerra strategica.
  Die *Göttin* Athene war die Beschützerin der Weisheit und des strategischen Krieges.
  
  Non credere che ogni *dea* sia benevola con gli umani.
  Glaube nicht, dass jede *Göttin* den Menschen wohlgesonnen ist.
  
  L'*dea* della fortuna a volte sorride anche ai più umili.
  Die *Göttin* des Glücks lächelt manchmal sogar den Demütigsten zu.
