Rang: 3083
Wort: giugno
Wortart: n.m
Wort mit Artikel: il giugno
Femininum / Plural: i giugno
IPA: ''
Definition: der Juni
Register: ''
Beispielsätze: |-
  Il matrimonio è previsto per *giugno* dell’anno prossimo.
  Die Hochzeit ist für *Juni* nächsten Jahres geplant.
  
  Quest’anno *giugno* è stato molto piovoso, non trovi?
  Dieser *Juni* war sehr regnerisch, findest du nicht?
  
  Se avessi saputo che *giugno* è così caldo a Roma, sarei venuto prima.
  Wenn ich gewusst hätte, dass *Juni* in Rom so heiß ist, wäre ich früher gekommen.
  
  Dopo *giugno*, inizieranno i corsi estivi all’università.
  Nach *Juni* beginnen die Sommerkurse an der Universität.
  
  È meglio prenotare le vacanze già a maggio, prima che arrivi *giugno*.
  Man sollte den Urlaub schon im Mai buchen, bevor *Juni* beginnt.
