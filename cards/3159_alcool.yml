Rang: 3159
Wort: alcool
Wortart: n.m
Wort mit Artikel: l'alcool
Femininum / Plural: alcoholi
IPA: ''
Definition: der Alkohol, -e
Register: ''
Beispielsätze: |-
  L'*alcol* può danneggiare il fegato se consumato in eccesso.
  Der *Alkohol* kann die Leber schädigen, wenn er im Übermaß konsumiert wird.
  
  Ha bevuto troppo e ora ha bisogno di un *alcol* test.
  Er hat zu viel getrunken und braucht jetzt einen *Alkohol*test.
  
  Nonostante il parere del medico, continua a bere *alcol* ogni sera.
  Trotz der ärztlichen Meinung trinkt er jeden Abend weiterhin *Alkohol*.
  
  Dopo quell'incidente, ha giurato di non toccare più alcun *alcol*.
  Nach diesem Unfall hat er geschworen, nie wieder *Alkohol* anzurühren.
  
  La polizia ha dovuto intervenire perché alcuni *alcoli* erano tossici.
  Die Polizei musste eingreifen, weil einige *Alkohole* giftig waren.
