Rang: 4109
Wort: federazione
Wortart: n.f
Wort mit Artikel: la federazione
Femininum / Plural: federazioni
IPA: ''
Definition: der Bund, -e, der Verband, -bände
Register: ''
Beispielsätze: |-
  La *federazione* sportiva ha approvato nuove regole per i prossimi Giochi Olimpici.
  Der *Verband* hat neue Regeln für die nächsten Olympischen Spiele genehmigt.
  
  Senza una solida *federazione*, le piccole squadre non avrebbero alcuna possibilità di competere.
  Ohne einen starken *Bund* hätten die kleinen Teams keine Chance zu konkurrieren.
  
  La *federazione* ha convocato tutti i rappresentanti regionali per discutere il nuovo statuto.
  Der *Verband* hat alle Regionalvertreter einberufen, um die neue Satzung zu besprechen.
  
  Malgrado i recenti dissidi, la *federazione* è riuscita a mantenere l’unità tra i suoi membri.
  Trotz der jüngsten Streitigkeiten gelang es dem *Verband*, die Einheit unter seinen Mitgliedern zu wahren.
  
  Se la *federazione* non avesse reagito in tempo, la crisi avrebbe potuto compromettere l’intero settore.
  Hätte der *Verband* nicht rechtzeitig gehandelt, hätte die Krise den gesamten Bereich gefährden können.
