Rang: 1992
Wort: territorio
Wortart: n.m
Wort mit Artikel: il territorio
Femininum / Plural: i territori
IPA: ''
Definition: das Gebiet, -e
Register: ''
Beispielsätze: |-
  Il *territorio* dell'Italia è molto variegato, con montagne, coste e pianure.
  Das *Gebiet* Italiens ist sehr vielfältig mit Bergen, Küsten und Ebenen.
  
  Dopo la guerra, il *territorio* della città era completamente distrutto e dovette essere ricostruito.
  Nach dem Krieg war das *Gebiet* der Stadt vollständig zerstört und musste wieder aufgebaut werden.
  
  Secondo molte fonti, il *territorio* di questa regione è abitato da antiche popolazioni celtiche.
  Laut vielen Quellen *entspricht* das Gebiet dieser Region uralten keltischen Siedlungen.
  
  Nonostante le difficoltà, vogliamo difendere il nostro *territorio* a ogni costo.
  Trotz der Schwierigkeiten wollen wir unser *Gebiet* um jeden Preis verteidigen.
  
  Il sindaco ha annunciato che il *territorio* comunale sarà ampliato per includere nuovi quartieri residenziali.
  Der Bürgermeister hat angekündigt, dass das kommunale *Gebiet* um neue Wohnviertel erweitert wird.
