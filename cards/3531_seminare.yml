Rang: 3531
Wort: seminare
Wortart: v
Wort mit Artikel: seminare
Femininum / Plural: ''
IPA: ''
Definition: säen
Register: ''
Beispielsätze: |-
  Gli agricoltori *seminano* il grano ogni autunno per avere un buon raccolto in primavera.
  Die Bauern *säen* im Herbst das Getreide, um im Frühling eine gute Ernte zu haben.
  
  Se vuoi che crescano i tulipani, devi *seminare* i bulbi in autunno.
  Wenn die Tulpen wachsen sollen, musst du die Zwiebeln im Herbst *säen*.
  
  Il contadino ha *seminato* più di cento chilometri quadrati di terreno, ma la siccità ha rovinato tutto.
  Der Bauer hat über hundert Quadratkilometer Land *gesät*, doch die Dürre hat alles vernichtet.
  
  Suggerisci di *seminare* anche delle erbe aromatiche nel giardino per attirare le farfalle?
  Sollten wir auch Kräuter im Garten *säen*, um Schmetterlinge anzulocken?
  
  Finché non *seminano* i semi giusti, non potranno mai ottenere rose di quella specie rara.
  Solange sie nicht die richtigen Samen *säen*, werden sie niemals Rosen dieser seltenen Art erhalten.
