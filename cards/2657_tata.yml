Rang: 2657
Wort: tata
Wortart: n.f
Wort mit Artikel: la tata
Femininum / Plural: tate
IPA: ''
Definition: die Kinderfrau, -en
Register: ''
Beispielsätze: |-
  La *tata* di mio fratello è molto gentile con i suoi figli.
  Die *Kinderfrau* meines Bruders ist sehr nett zu seinen Kindern.
  
  Ho chiamato la *tata* perché mio figlio ha la febbre alta.
  Ich habe die *Kinderfrau* angerufen, weil mein Sohn hohes Fieber hat.
  
  La *tata* che aveva assunto mia madre è partita per un viaggio di un mese.
  Die *Kinderfrau*, die meine Mutter eingestellt hatte, ist für einen Monat verreist.
  
  Se tu fossi la *tata*, cosa faresti con questi bambini così vivaci?
  Wenn du die *Kinderfrau* wärst, was würdest du mit diesen so lebhaften Kindern machen?
  
  La *tata* ci aveva avvertiti che il bambino avrebbe pianto appena ci avesse lasciati.
  Die *Kinderfrau* hatte uns gewarnt, dass das Kind sofort weinen würde, sobald sie uns verließe.
