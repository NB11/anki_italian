Beispielsätze: |-
  A *shopping* in centro offre tante possibilità per risparmiare.
  Das *Einkaufen* im Zentrum bietet viele Möglichkeiten zum Sparen.
  
  Se vuoi andare a fare *shopping* con me, dobbiamo partire presto altrimenti il traffico sarà insopportabile.
  Wenn du mit mir *shoppen* gehen willst, müssen wir früh losfahren, sonst wird der Verkehr unerträglich.
  
  Durante le vacanze ad agosto abbiamo fatto parecchi *shopping* per comprare souvenir per gli amici.
  Während des Urlaubs im *August* haben wir einige Einkaufstouren gemacht, um Souvenirs für Freunde zu kaufen.
  
  Fare *shopping* online è comodo, ma spesso si rischia di spendere più del previsto.
  *Online einzukaufen* ist praktisch, aber oft riskiert man, mehr auszugeben als geplant.
  
  Nonostante il suo *shopping* compulsivo, Maria riesce sempre a risparmiare qualcosa alla fine del mese.
  Trotz ihres *krankhaften Einkaufswahns* schafft es Maria immer, am Monatsende etwas zu sparen.
