Rang: 3842
Wort: tiratore
Wortart: n.m
Wort mit Artikel: il tiratore
Femininum / Plural: i tiratori
IPA: ''
Definition: der Schütze, -n
Register: ''
Beispielsätze: |-
  Il *tiratore* scelse con attenzione il bersaglio prima di sparare.
  Der *Schütze* wählte sorgfältig das Ziel, bevor er schoss.
  
  Se fossi un *tiratore* scelto, lavorerei per le forze speciali.
  Wäre ich ein *Schütze*, würde ich für Spezialeinheiten arbeiten.
  
  Il poliziotto interrogò il *tiratore* dopo lo sparo al bersaglio.
  Der Polizist verhörte den *Schützen*, nachdem der Schuss auf die Zielscheibe abgefeuert wurde.
  
  I *tiratori* si allenano ogni giorno al poligono di tiro.
  Die *Schützen* trainieren jeden Tag auf dem Schießstand.
  
  Il *tiratore* nascosto dietro il muro attendeva il segnale per agire.
  Der hinter der Mauer versteckte *Schütze* wartete auf das Signal, um zu handeln.
