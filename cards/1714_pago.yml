Rang: 1714
Wort: pago
Wortart: adj
Wort mit Artikel: pago
Femininum / Plural: ''
IPA: ''
Definition: bezahlt, beglichen
Register: ''
Beispielsätze: |-
  Ho dimenticato di *pagare* il conto del ristorante ieri sera.
  Ich habe vergessen, *die* Rechnung im Restaurant gestern Abend zu bezahlen.
  
  Se non sei *pagato* regolarmente, come fai a vivere?
  Wenn du nicht regelmäßig *bezahlt* wirst, wie kommst du dann über die Runden?
  
  Mi hanno assicurato che il lavoro sarà *pagato* molto bene.
  Mir wurde versichert, dass die Arbeit sehr gut *bezahlt* wird.
  
  Vorrei un appartamento in cui l'affitto sia già *pagato*.
  Ich hätte gern eine Wohnung, in der die Miete schon *bezahlt* ist.
  
  Non è normale che un medico non sia *pagato* per le ore di guardia.
  Es ist nicht normal, dass ein Arzt für Bereitschaftsdienst nicht *bezahlt* wird.
