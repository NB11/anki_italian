Rang: 4215
Wort: menu
Wortart: n.m
Wort mit Artikel: il menu
Femininum / Plural: i menu
IPA: ''
Definition: die Speisekarte, -n
Register: ''
Beispielsätze: |-
  Al ristorante abbiamo scelto tre piatti dal *menu* che ci ha consigliato il cameriere.
  In dem Restaurant haben wir drei Gerichte aus der *Speise*karte gewählt, die uns der Kellner empfohlen hat.
  
  Se vuoi sapere quali sono i piatti del giorno, chiedi pure il *menu* aggiornato in reception.
  Falls du wissen möchtest, welche Gerichte es heute gibt, frag einfach nach der aktualisierten *Speise*karte an der Rezeption.
  
  Nel *menu* del giorno ci sono sempre piatti stagionali e ricette tipiche della regione.
  In der Tages*speise*karte gibt es immer saisonale Gerichte und typische Rezepte der Region.
  
  Ti prego di controllare il *menu* prima di ordinare, perché spesso cambiano le offerte speciali.
  Bitte schau dir die *Speise*karte vor dem Bestellen an, denn die Sonderangebote ändern sich oft.
  
  Il cuoco ha aggiunto al *menu* un nuovo dessert a base di fragole e cioccolato fondente.
  Der Koch hat ein neues Dessert auf der *Speise*karte hinzugefügt, das auf Erdbeeren und dunkler Schokolade basiert.
