Rang: 2992
Wort: distintivo
Wortart: n.m
Wort mit Artikel: il distintivo
Femininum / Plural: distintivi
IPA: ''
Definition: das Abzeichen, -
Register: ''
Beispielsätze: |-
  Dopo l'addestramento militare gli hanno consegnato un *distintivo* che dimostra il suo grado.
  Nach der militärischen Ausbildung hat ihm man ihm ein *Abzeichen* verliehen, das seinen Rang nachweist.
  
  Non sapevo che per entrare bisognasse mostrare un *distintivo* speciale!
  Ich wusste nicht, dass man ein besonderes *Abzeichen* vorzeigen musste, um einzutreten!
  
  Il *distintivo* che portava al petto era quello di una leggendaria unità di ricognizione.
  Das *Abzeichen*, das er auf der Brust trug, gehörte zu einer legendären Aufklärungseinheit.
  
  Se vuoi accedere all'area riservata, ti servirà un *distintivo* con codice a barre.
  Wenn du den Sicherheitsbereich betreten willst, brauchst du ein *Abzeichen* mit Strichcode.
  
  Ho notato che il suo *distintivo* era identico a quello che indossava un agente nell'ufficio postale.
  Mir ist aufgefallen, dass sein *Abzeichen* genau dasselbe war wie das eines Beamten im Postamt.
