Rang: 996
Wort: porco
Wortart: adj
Wort mit Artikel: porco
Femininum / Plural: porci
IPA: ''
Definition: schweinisch, dreckig, gemein
Register: ''
Beispielsätze: |-
  Il *porco* atteggiamento dell’attore ha fatto litigare la rosa con il poliziotto.
  Die *schweinische* Haltung des Schauspielers hat dazu geführt, dass die Rose mit dem Polizisten gestritten hat.
  
  Sebbene il gatto fosse in stia, il suo *porco* odore riempiva il laboratorio.
  Obwohl die Katze im Käfig war, verbreitete ihr *dreckiger* Geruch das ganze Labor.
  
  Il *sceriffo* avrebbe abbassato la difesa, se non avesse riferito l’unità di rischiare il turno.
  Der Sheriff hätte die Verteidigung reduziert, wenn er nicht von der Einheit berichtet hätte, die *riskierte*, die Reihe zu verlieren.
  
  Cercavo la calma, ma *il porco* discorso del testimone non mi permetteva di capire il destino.
  Ich suchte Ruhe, doch die *gemeine* Aussage des Zeugen ließ mich das Schicksal nicht erkennen.
  
  Dopo aver catturato *il porco* che disturbava il ristorante, il poliziotto lo ha portato immediatamente in stazione.
  Nachdem sie das *dreckige* Schwein gefangen hatten, das das Restaurant störte, brachte der Polizist es sofort zum Bahnhof.
