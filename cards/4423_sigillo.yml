Rang: 4423
Wort: sigillo
Wortart: n.m
Wort mit Artikel: il sigillo
Femininum / Plural: sigilli
IPA: ''
Definition: das Siegel, -
Register: ''
Beispielsätze: |-
  Il notaio ha apposto il *sigillo* ufficiale sull'atto notarile per renderlo valido.
  Der Notar hat das *offizielle Siegel* auf die Urkunde gesetzt, um sie gültig zu machen.
  
  Nel Medioevo, i re usavano i *sigilli* per autenticare i documenti reali.
  Im Mittelalter nutzten Könige *Siegel*, um königliche Dokumente zu beglaubigen.
  
  Non spezzare il *sigillo* della scatola se vuoi conservare la garanzia del prodotto.
  Zerstöre nicht das *Siegels* der Box, wenn du die Produktgarantie behalten möchtest.
  
  Il detective ha trovato un *sigillo* nascosto sotto il tappeto che non avrebbe dovuto esserci.
  Der Detektiv fand ein *verstecktes Siegel* unter dem Teppich, das dort nicht hätte sein dürfen.
  
  Anche se il *sigillo* era rovinato, la lettera continuò a essere letta con grande interesse.
  Obwohl das *Siegels* beschädigt war, wurde der Brief trotzdem mit großem Interesse gelesen.
