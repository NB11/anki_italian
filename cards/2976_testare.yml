Femininum / Plural: ''
IPA: ''
Definition: testen
Register: ''
Beispielsätze: |-
  Il laboratorio *testa* regolarmente la resistenza dei nuovi materiali.
  Das Labor testet regelmäßig die Widerstandsfähigkeit der neuen Materialien.
  
  Dopo aver *testato* il circuito, il tecnico ci ha assicurato che funziona perfettamente.
  Nachdem sie den Kreislauf getestet hatten, versicherte uns der Techniker, dass er perfekt funktioniert.
  
  Vor di partire per la spedizione, vogliamo *testare* tutte le attrezzature marino.
  Bevor wir zur Expedition aufbrechen, wollen wir alle Ausrüstungen marinen *testen*.
  
  I ricercatori stanno cercando di *testare* una nuova teoria sulla profondità degli oceani.
  Die Forscher versuchen, eine neue Theorie über die Tiefe der Ozeane zu testen.
  
  Se vuoi *testare* la tua pazienza, prova a risolvere questo indovinello.
  Wenn du deine Geduld testen möchtest, versuche, dieses Rätsel zu lösen.
