Rang: 3625
Wort: scortese
Wortart: adj
Wort mit Artikel: scortese
Femininum / Plural: ''
IPA: ''
Definition: unfreundlich, unhöflich
Register: ''
Beispielsätze: |-
  Non essere *scortese* con gli anziani, è molto maleducato.
  Sei nicht *unfreundlich* zu den Alten, das ist sehr ungehobelt.
  
  Mi ha risposto in modo *scortese*, senza alcun rispetto.
  Er hat mir in einer *unhöflichen* Weise geantwortet, ohne jeden Respekt.
  
  È così *scortese* da non salutare nemmeno i vicini!
  Er ist so *unfreundlich*, dass er nicht einmal die Nachbarn grüßt!
  
  Se fossi più gentile, non saresti così *scortese* con tutti.
  Wenn du freundlicher wärst, wärst du nicht so *unfreundlich* zu allen.
  
  Anche se era stanco, non avrebbe dovuto essere così *scortese* verso il suo supervisore.
  Auch wenn er müde war, hätte er nicht so *unfreundlich* zu seinem Vorgesetzten sein dürfen.
