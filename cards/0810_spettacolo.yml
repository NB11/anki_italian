IPA: ''
Definition: die *Veranstaltung*, -en, die *Show*, -s
Register: ''
Beispielsätze: |-
  Il teatro ospita stasera uno *spettacolo* di danza contemporanea straordinario.
  Das Theater zeigt heute Abend eine *Veranstaltung* mit modernem Tanz.
  
  Dopo l’ennesimo *spettacolo* del cantante, i fan non volevano ancora andare via.
  Nach der *Show* des Sängers wollten die Fans immer noch nicht gehen.
  
  Non che mi aspettassi un *spettacolo* del genere, ma devo ammetterlo: è stato eccezionale.
  Ich habe mir *keine* solche Veranstaltung erwartet, aber ich muss zugeben: Es war großartig.
  
  Se non altro, lo *spettacolo* di ieri sera ci ha fatto dimenticare i problemi della giornata.
  Wenigstens hat uns die *Show* von gestern Abend die Tagesprobleme ablenken lassen.
  
  Che tu lo creda o no, ho visto uno *spettacolo* che sconvolge i sensi ogni volta.
  Ob du es glaubst oder nicht, ich habe eine *Veranstaltung* gesehen, die die Sinne jedes Mal erschüttert.
