Rang: 4161
Wort: universitario
Wortart: adj
Wort mit Artikel: universitario
Femininum / Plural: ''
IPA: ''
Definition: universitär, akademisch
Register: ''
Beispielsätze: |-
  Mio fratello frequenta un corso *universitario* di giurisprudenza.
  Mein Bruder besucht einen *universitären* Jurastudiengang.
  
  Nonostante le difficoltà economiche, ha completato i suoi studi *universitari* con ottimi risultati.
  Trotz finanziellen Schwierigkeiten hat er sein *universitäres* Studium mit ausgezeichneten Ergebnissen abgeschlossen.
  
  Era il giorno in cui si sarebbe laureato, ma la cerimonia *universitaria* era stata rinviata a causa della pioggia.
  Es war der Tag, an dem er seinen Abschluss machen sollte, doch die *universitäre* Feier war wegen des Regens verschoben worden.
  
  La ricerca *universitaria* in questo campo ha ricevuto un finanziamento significativo dagli enti pubblici.
  Die *universitäre* Forschung auf diesem Gebiet hat von öffentlichen Stellen eine bedeutende Förderung erhalten.
  
  Se avessi più tempo, frequenterei un master *universitario* all'estero.
  Wenn ich mehr Zeit hätte, würde ich einen *universitären* Master im Ausland absolvieren.
