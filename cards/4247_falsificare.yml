Rang: 4247
Wort: falsificare
Wortart: vt
Wort mit Artikel: falsificare
Femininum / Plural: ''
IPA: ''
Definition: fälschen, verfälschen
Register: ''
Beispielsätze: |-
  L’artista ha *falsificato* diversi dipinti di Picasso.
  Der Künstler hat mehrere Gemälde von Picasso *gefälscht*.
  
  Se scoprono che hai *falsificato* la firma, perderai la causa.
  Wenn man entdeckt, dass du die Unterschrift *gefälscht* hast, wirst du den Prozess verlieren.
  
  Per *falsificare* un documento è necessario avere molta attenzione.
  Um ein Dokument zu *fälschen*, ist viel Vorsicht nötig.
  
  Gli scienziati temono che qualcuno possa *falsificare* i risultati della ricerca.
  Die Wissenschaftler fürchten, dass jemand die Forschungsergebnisse *fälschen* könnte.
  
  Dopo aver *falsificato* i dati finanziari, l’azienda è stata denunciata.
  Nachdem das Unternehmen die Finanzdaten *gefälscht* hatte, wurde es angezeigt.
