Rang: 760
Wort: albero
Wortart: n.m
Wort mit Artikel: l'albero
Femininum / Plural: alberi
IPA: ''
Definition: der Baum, Bäume
Register: ''
Beispielsätze: |-
  Ho visto un *albero* molto grande nel parco.
  Ich habe einen *riesigen Baum* im Park gesehen.
  
  Gli *alberi* di questa foresta sono secolari.
  Die *Bäume* dieses Waldes sind jahrhundertealt.
  
  Vor casa mia c'è un *albero* di mele.
  Vor meinem Haus steht ein *Apfelbaum*.
  
  Non tagliare *l'albero*, per favore!
  Fäll den *Baum* bitte nicht!
  
  Gli scoiattoli saltano da un *albero* all'altro.
  Die Eichhörnchen springen von einem *Baum* zum anderen.
