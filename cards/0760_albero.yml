Rang: 760
Wort: albero
Wortart: n.m
Wort mit Artikel: l'albero
Femininum / Plural: alberi
IPA: ''
Definition: der Baum, -¨e
Register: ''
Beispielsätze: |-
  Nel giardino del mio vicino c'è un *albero* secolare che ha sempre attirato molti uccelli.
  In dem Garten meines Nachbarn steht ein uralter *Baum*, der immer viele Vögel angelockt hat.
  
  Se non avessimo tagliato quel *albero*, ora la nostra casa sarebbe più ombreggiata.
  Hätten wir jenen *Baum* nicht gefällt, wäre unser Haus jetzt schattiger.
  
  Mi hanno raccontato che nel parco cittadino c'è un *albero* che fiorisce solo di notte, che strano!
  Man hat mir erzählt, im Stadtpark gebe es einen *Baum*, der nur nachts blühe – wie seltsam!
  
  Porta pazienza, tra poco arriverà qualcuno ad aiutarti a potare il *albero* nel cortile.
  Sei geduldig, gleich kommt jemand, um dir zu helfen, den *Baum* im Hof zu beschneiden.
  
  Spero che quest'anno la pioggia non danneggi i giovani *alberi* che abbiamo piantato in primavera.
  Ich hoffe, dass der Regen dieses Jahr den jungen *Bäumen* nichts anhaben wird, die wir im Frühling gepflanzt haben.
