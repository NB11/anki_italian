Rang: 2171
Wort: eccezionale
Wortart: adj
Wort mit Artikel: eccezionale
Femininum / Plural: ''
IPA: ''
Definition: außergewöhnlich, herausragend
Register: ''
Beispielsätze: |-
  Questo è un ristorante *eccezionale*, con una cucina che non ho mai provato altrove.
  Dieses ist ein *außergewöhnliches* Restaurant mit einer Küche, die ich nirgendwo sonst probiert habe.
  
  Ho sentito che il nuovo film di Nolan è davvero *eccezionale*: dovresti vederlo al più presto.
  Ich habe gehört, dass Nolans neuer Film wirklich *herausragend* ist: Du solltest ihn so schnell wie möglich sehen.
  
  Nonostante la sua età, conserva una memoria *eccezionale* che lascia tutti a bocca aperta.
  Trotz seines Alters besitzt er ein *außergewöhnliches* Gedächtnis, das alle sprachlos macht.
  
  Questa soluzione è semplicemente *eccezionale*: risolve il problema in pochi minuti.
  Diese Lösung ist wirklich *herausragend*: Sie löst das Problem in wenigen Minuten.
  
  La performance della cantante è stata così *eccezionale* che il pubblico si è alzato in piedi.
  Der Auftritt der Sängerin war so *außergewöhnlich*, dass das Publikum aufstand.
