Rang: 4086
Wort: contaminare
Wortart: vt
Wort mit Artikel: contaminare
Femininum / Plural: ''
IPA: ''
Definition: verunreinigen, verschmutzen, verseuchen, verpesten
Register: ''
Beispielsätze: |-
  Se non vogliamo *contaminare* l’acqua del fiume, dobbiamo smaltire correttamente i rifiuti industriali.
  Wenn wir das Wasser des Flusses nicht *verseuchen* wollen, müssen wir die Industrieabfälle korrekt entsorgen.
  
  Lo scienziato ha avvertito che se le emissioni non diminuiranno, rischiamo di *contaminare* l’intero ecosistema.
  Der Wissenschaftler warnte, dass wir, falls die Emissionen nicht sinken, das gesamte Ökosystem *verschmutzen* könnten.
  
  L’uso eccessivo di pesticidi può *contaminare* il suolo per molti anni.
  Der übermäßige Einsatz von Pestiziden kann den Boden für viele Jahre *verunreinigen*.
  
  Per evitare di *contaminare* gli alimenti, lava sempre bene le mani prima di cucinare.
  Um zu verhindern, die Lebensmittel zu *verseuchen*, wasche dir immer gründlich die Hände, bevor du kochst.
  
  Gli ambientalisti temono che le microplastiche possano *contaminare* anche le acque sotterranee.
  Die Umweltschützer befürchten, dass Mikroplastik auch das Grundwasser *belasten* könnte.
