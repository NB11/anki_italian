  La macchina è rimasta *ferma* per ore a causa del traffico.
  Das Auto ist stundenlang wegen des Verkehrs *stehen geblieben*.
  
  Rimani *fermo* un attimo, per favore!
  Bleib bitte *still* stehen einen Moment!
  
  Le sue opinioni non sono mai *ferme*, cambiano spesso.
  Seine Meinungen sind nie *fest*, sie ändern sich oft.
