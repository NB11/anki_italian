Rang: 2490
Wort: affondare
Wortart: v
Wort mit Artikel: affondare
Femininum / Plural: ''
IPA: ''
Definition: versinken, untergehen
Register: ''
Beispielsätze: |-
  La nave *affondò* in meno di dieci minuti dopo la collisione.
  Das Schiff *versank* in weniger als zehn Minuten nach der Kollision.
  
  Hanno detto che non lasceranno *affondare* il loro progetto nonostante le difficoltà.
  Sie sagten, sie würden ihr *Projekt* nicht untergehen lassen, trotz der Schwierigkeiten.
  
  Se non avessimo agito in tempo, la barca avrebbe potuto *affondare* completamente.
  Wenn wir nicht rechtzeitig gehandelt hätten, wäre das Boot komplett *versunken*.
  
  È evidente che la società *affonda* lentamente a causa della mancanza di strategie.
  Es ist *offensichtlich*, dass die Gesellschaft langsam versinkt wegen des Fehlens von Strategien.
  
  Molti credono che il capitale umano sia ciò che impedisce all’azienda di *affondare*.
  Viele glauben, dass das Humankapital ist, was das Unternehmen daran *hindert unterzugehen*.
