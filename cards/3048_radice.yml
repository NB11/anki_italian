Rang: 3048
Wort: radice
Wortart: n.f
Wort mit Artikel: la radice
Femininum / Plural: radici
IPA: ''
Definition: die Wurzel, -n
Register: ''
Beispielsätze: |-
  Gli scienziati stanno studiando la *radice* di questa pianta medicinale da mesi.
  Die Wissenschaftler untersuchen die *Wurzel* dieser Heilpflanze seit Monaten.
  
  Ho trovato una *radice* molto antica durante gli scavi archeologici.
  Ich habe eine sehr alte *Wurzel* während der Ausgrabungen gefunden.
  
  Se non annaffi le piante, la *radice* non riuscirà a prendere acqua dal suolo.
  Wenn du die Pflanzen nicht gießt, wird die *Wurzel* kein Wasser aus dem Boden aufnehmen können.
  
  La *radice* del problema è che non abbiamo abbastanza finanziamenti per il progetto.
  Die *Wurzel* des Problems ist, dass wir nicht genug Geld für das Projekt haben.
  
  Dopo la tempesta, molte *radici* degli alberi sono rimaste scoperte.
  Nach dem Sturm blieben viele Baum*wurzeln* freigelegt.
