Rang: 4511
Wort: viscido
Wortart: adj
Wort mit Artikel: viscido
Femininum / Plural: ''
IPA: ''
Definition: schlüpfrig, glitschig, fettig
Register: ''
Beispielsätze: |-
  La superficie del lago era così *viscida* che quasi scivolavo con le scarpe da ginnastica.
  Die Oberfläche des Sees war so *schlüpfrig*, dass ich fast mit meinen Turnschuhen ausgerutscht wäre.
  
  Quel politico ha un modo di parlare così *viscido* che nessuno gli crede più.
  Dieser Politiker hat eine so *fettige* Art zu reden, dass ihm niemand mehr glaubt.
  
  Non toccare quei funghi, perché potrebbero essere *viscidi* e velenosi!
  Fass diese Pilze nicht an, denn sie könnten *glitschig* und giftig sein!
  
  Dopo la pioggia, il pavimento del balcone è rimasto *viscido* per ore.
  Nach dem Regen blieb der Boden des Balkons stundenlang *schlüpfrig*.
  
  Mi hanno detto che il cameriere ha le mani *viscide* quando serve il cibo.
  Man hat mir gesagt, dass der Kellner *glitschige* Hände hat, wenn er das Essen serviert.
