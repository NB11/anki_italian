Rang: 3826
Wort: curvatura
Wortart: n.f
Wort mit Artikel: la curvatura
Femininum / Plural: curvature
IPA: ''
Definition: die Krümmung, -en
Register: ''
Beispielsätze: |-
  La *curvatura* della strada costringe gli automobilisti a rallentare.
  Die *Krümmung* der Straße zwingt Autofahrer zum Langsamfahren.
  
  Ho notato una *curvatura* anomala nel metallo dopo l'incidente.
  Ich habe eine ungewöhnliche *Krümmung* im Metall nach dem Unfall bemerkt.
  
  L'ingegnere ha verificato la *curvatura* dell'arco prima di firmare il progetto.
  Der Ingenieur hat die *Krümmung* des Bogens vor der Unterschrift überprüft.
  
  Nonostante la *curvatura* del tubo, l'acqua scorreva senza problemi.
  Trotz der *Krümmung* des Rohres floss das Wasser ohne Probleme.
  
  La *curvatura* del vetro era così precisa che sembrava un miraggio.
  Die *Krümmung* des Glases war so präzise, dass sie wie eine Fata Morgana wirkte.
