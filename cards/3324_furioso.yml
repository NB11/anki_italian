Rang: 3324
Wort: furioso
Wortart: adj
Wort mit Artikel: furioso
Femininum / Plural: ''
IPA: ''
Definition: wütend, zornig, rasend
Register: ''
Beispielsätze: |-
  Marco era *furioso* perché qualcuno gli aveva rubato la bicicletta.
  Marco war *wütend*, weil ihm jemand das Fahrrad gestohlen hatte.
  
  Nonostante le sue parole gentili, lei rimase *furiosa* dentro di sé.
  Trotz seiner harmlosen Worte blieb sie innerlich *zornig*.
  
  Saremmo *furiosi* se scoprissimo che ci hanno mentito tutti.
  Wir wären *rasend*, wenn wir herausfänden, dass uns alle angelogen haben.
  
  Il capo gridò con una voce così *furiosa* che tutti tacquero immediatamente.
  Der Chef brüllte mit einer so *wütenden* Stimme, dass alle sofort verstummten.
  
  Anche se cercò di nasconderlo, era chiaro che era *furioso* per il risultato della partita.
  Obwohl er es zu verbergen suchte, war offensichtlich, dass er *zornig* über das Spielergebnis war.
