Rang: 3779
Wort: condoglianza
Wortart: n.f
Wort mit Artikel: la condoglianza
Femininum / Plural: condoglianze
IPA: ''
Definition: das Beileid, die Kondolenz
Register: ''
Beispielsätze: |-
  Abbiamo ricevuto molte *condoglianze* dopo la scomparsa del nostro caro amico.
  Wir haben viele *Beileidskundgebungen* nach dem Tod unseres lieben Freundes erhalten.
  
  Le *condoglianze* della comunità sono state molto sentite e sincere.
  Die *Kondolenzen* der Gemeinschaft waren sehr herzlich und aufrichtig.
  
  Nonostante il dolore, le *condoglianze* del vicino ci hanno fatto bene.
  Trotz der Trauer haben uns die *Beileidsbekundungen* des Nachbarn gutgetan.
  
  Ha espresso le sue *condoglianze* con poche ma significative parole.
  Er hat sein *Beileid* mit wenigen, aber bedeutungsvollen Worten ausgedrückt.
  
  La famiglia attende ancora le *condoglianze* ufficiali delle autorità.
  Die Familie wartet noch auf die offiziellen *Kondolenzbekundungen* der Behörden.
