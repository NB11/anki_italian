Rang: 2777
Wort: colonna
Wortart: n.f
Wort mit Artikel: la colonna
Femininum / Plural: colonne
IPA: ''
Definition: die Säule, -n
Register: ''
Beispielsätze: |-
  La *colonna* portante del palazzo è stata danneggiata durante il terremoto.
  Die *tragende* Säule des Gebäudes wurde während des Erdbebens beschädigt.
  
  Ho visto una *colonna* di fumo nero alzarsi dal bosco dietro casa mia.
  Ich sah eine *Säule* aus schwarzem Rauch vom Wald hinter meinem Haus aufsteigen.
  
  Nel museo c’era una *colonna* romana con iscrizioni in latino che affascinavano tutti i visitatori.
  Im Museum stand eine römische Säule mit lateinischen Inschriften, die alle Besucher begeisterte.
  
  Se la *colonna* vertebrale non è allineata correttamente, possono insorgere problemi di postura.
  Wenn die Wirbelsäule nicht richtig ausgerichtet ist, können Haltungsschäden auftreten.
  
  Costruire una *colonna* di sostegno in cemento richiede precisione e calcoli accurati.
  Den Bau einer Beton-Stütz*säule* erfordert Präzision und genaue Berechnungen.
