Rang: 2569
Wort: mercoledì
Wortart: n.m
Wort mit Artikel: il mercoledì
Femininum / Plural: i mercoledì
IPA: ''
Definition: der Mittwoch, -e
Register: ''
Beispielsätze: |-
  Oggi è *mercoledì*, quindi dobbiamo andare dal medico alle tre.
  Heute ist *Mittwoch*, also müssen wir um drei zum Arzt gehen.
  
  Non vedo l'ora che arrivi *mercoledì* per vedere la nuova serie televisiva!
  Ich kann es kaum erwarten, dass *Mittwoch* kommt, um die neue Serie zu sehen!
  
  Lunedì scorso ho lavorato tutto il giorno, ma *mercoledì* finalmente ho avuto tempo per te.
  Letzten Montag habe ich den ganzen Tag gearbeitet, aber *Mittwoch* hatte ich endlich Zeit für dich.
  
  Se *mercoledì* non esci con gli amici, almeno fammi sapere se vieni a cena da noi!
  Wenn du *Mittwoch* nicht mit Freunden ausgehst, sag mir wenigstens, ob du zu uns zum Essen kommst!
  
  Era il *mercoledì* di settembre quando decidemmo di trasferirci in questa città.
  Es war ein *Mittwoch* im September, als wir beschlossen, in diese Stadt zu ziehen.
