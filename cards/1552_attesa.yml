Rang: 1552
Wort: attesa
Wortart: n.f
Wort mit Artikel: la attesa
Femininum / Plural: attese
IPA: ''
Definition: die Wartezeit, -en
Register: ''
Beispielsätze: |-
  Dopo *attesa* di due ore, finalmente siamo entrati nel negozio.
  Nach *Wartezeit* von zwei Stunden sind wir endlich in das Geschäft gegangen.
  
  La *attesa* al telefono è stata molto lunga ieri.
  Das *Warten* am Telefon war gestern sehr lang.
  
  Nonostante la prolungata *attesa*, nessuno ci ha ancora ricevuto.
  Trotz der verlängerten *Wartezeit* hat uns noch niemand empfangen.
  
  Spero che la tua *attesa* non sia troppo tediosa.
  Ich hoffe, dass dein *Warten* nicht zu langweilig ist.
  
  La *attesa* del treno è finalmente finita quando abbiamo visto arrivare il nostro politico locale.
  Die *Wartezeit* auf den Zug hat endlich ein Ende, als wir unseren lokalen Politiker ankommen sahen.
