Rang: 1605
Wort: disgustoso
Wortart: adj
Wort mit Artikel: disgustoso
Femininum / Plural: ''
IPA: ''
Definition: ekelhaft, widerlich, abscheulich
Register: ''
Beispielsätze: |-
  Il cibo in quel ristorante era così *disgustoso* che ho dovuto chiamare il cameriere per lamentarmi.
  Das Essen in diesem Restaurant war so *ekelhaft*, dass ich den Kellner rufen musste, um mich zu beschweren.
  
  Alice si è coperta la bocca con la mano, perché il pesce che ha mangiato aveva un odore *disgustoso*.
  Alice hielt sich die Hand vor den Mund, denn der Fisch, den sie gegessen hatte, roch *widerlich*.
  
  Anche se non volevo, ho dovuto ammettere che il piatto che ho ordinato era *disgustoso* e senza alcuna qualità.
  Auch wenn ich es nicht wollte, musste ich zugeben, dass das Gericht, das ich bestellt hatte, *ekelhaft* und von schlechter Qualität war.
  
  Non capisco come tu possa mangiare quella pizza: per me è semplicemente *disgustosa*, specialmente quella condita con il tonno.
  Ich verstehe nicht, wie du diese Pizza essen kannst: Für mich ist sie einfach *widerlich*, besonders die mit Thunfisch.
  
  Hanno proposto un nuovo piatto al menù, ma dopo averne sentito la descrizione, mi è subito venuto il dubbio che sarebbe stato *disgustoso*.
  Sie haben ein neues Gericht auf die Speisekarte gesetzt, aber nachdem ich die Beschreibung gehört hatte, kam mir sofort der Verdacht, dass es *ekelhaft* sein würde.
