Rang: 1841
Wort: fila
Wortart: n.f
Wort mit Artikel: la fila
Femininum / Plural: file
IPA: ''
Definition: die Schlange, -n, die Reihe, -n
Register: ''
Beispielsätze: |-
  La *fila* al supermercato era molto lunga oggi.
  Die *Schlange* im Supermarkt war heute sehr lang.
  
  Dopo la lezione, gli studenti si misero in *fila* per uscire.
  Nach der Stunde stellten sich die Schüler in *Reihe*, um hinauszugehen.
  
  Vor il teatro c’era una lunga *fila* di persone in attesa.
  Vor dem Theater stand eine lange *Schlange* von wartenden Menschen.
  
  Ho perso la *fila* quando mi sono fermato a parlare con un amico.
  Ich habe die *Reihe* verloren, als ich stehen blieb, um mit einem Freund zu reden.
  
  La *fila* dei prodotti sullo scaffale è organizzata per categoria.
  Die *Reihe* der Produkte im Regal ist nach Kategorien geordnet.
