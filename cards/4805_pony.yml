Rang: 4805
Wort: pony
Wortart: n.m
Wort mit Artikel: il pony
Femininum / Plural: i pony
IPA: ''
Definition: das Pony, -s
Register: ''
Beispielsätze: |-
  Mio figlio ha ricevuto un *pony* per il suo compleanno, che ha chiamato "Stella".
  Mein Sohn hat zum Geburtstag ein *Pony* bekommen, das er "Stella" nennt.
  
  Nel *pony* c'è qualcosa di magico, che fa tornare indietro nel tempo.
  In dem *Pony* steckt etwas Magisches, das einen in die Vergangenheit zurückversetzt.
  
  Quando ero piccolo, sognavo di avere un *pony*, ma poi ho scoperto che sono allergica.
  Als ich klein war, träumte ich davon, ein *Pony* zu haben, aber dann habe ich gemerkt, dass ich allergisch bin.
  
  Il *pony* del vicino è fuggito e ha attraversato tutto il quartiere.
  Das *Pony* des Nachbarn ist ausgebüxt und hat das ganze Viertel durchquert.
  
  Se avessi un *pony* come il tuo, lo porterei alle manifestazioni cittadine!
  Wenn ich ein *Pony* wie deines hätte, würde ich es zu den Stadtfesten mitnehmen!
