Rang: 4152
Wort: anomalia
Wortart: n.f
Wort mit Artikel: l'anomalia
Femininum / Plural: anomalie
IPA: ''
Definition: die Abweichung, die Unregelmäßigkeit
Register: ''
Beispielsätze: |-
  Abbiamo rilevato un’*anomalia* nel funzionamento del software che potrebbe causare dei problemi.
  Wir haben eine *Abweichung* in der Funktionsweise der Software festgestellt, die Probleme verursachen könnte.
  
  L’*anomalia* climatica di quest’estate ha sorpreso tutti gli scienziati.
  Die *Unregelmäßigkeit* im Klima dieses Sommers hat alle Wissenschaftler überrascht.
  
  Nonostante l’*anomalia*, il sistema ha continuato a funzionare senza interruzioni.
  Trotz der *Abweichung* funktionierte das System ohne Unterbrechungen weiter.
  
  Credi che l’*anomalia* genetica possa essere ereditata dai figli?
  Glaubst du, dass die *genetische Abweichung* an die Kinder vererbt werden kann?
  
  L’*anomalia* rilevata nel bilancio dell’azienda richiede un’indagine approfondita.
  Die im Unternehmenshaushalt festgestellte *Unregelmäßigkeit* erfordert eine gründliche Untersuchung.
