Rang: 1610
Wort: recitare
Wortart: v
Wort mit Artikel: recitare
Femininum / Plural: ''
IPA: ''
Definition: vortragen, spielen, darstellen
Register: ''
Beispielsätze: |-
  L’attore ha imparato a memoria tutte le battute per poter *recitare* bene la parte.
  Der Schauspieler hat alle Dialogzeilen auswendig gelernt, um die Rolle gut *zu spielen*.
  
  Dopo la terapia, si sente abbastanza forte da *recitare* di nuovo in pubblico.
  Nach der Therapie fühlt er sich stark genug, um wieder *vorzutragen*.
  
  Benché sia molto timido, gli ho consigliato di *recitare* perché gli piacciono le storie.
  Obwohl er sehr schüchtern ist, habe ich ihm geraten zu *spielen*, weil er Geschichten mag.
  
  Quando ha visto il suo nome sul manifesto, non riusciva a credere di dover *recitare* in quella commedia.
  Als er seinen Namen auf dem Plakat sah, konnte er nicht glauben, dass er in dieser Komödie *mitspielen* musste.
  
  Se non avessi firmato quel patto sciocco, ora non dovrei *recitare* in questa pièce così noiosa!
  Hätte ich diesen dummen Vertrag nicht unterschrieben, müsste ich jetzt nicht in diesem öden Stück *auftreten*!
