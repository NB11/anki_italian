Rang: 4988
Wort: coccodrillo
Wortart: n.m
Wort mit Artikel: il coccodrillo
Femininum / Plural: coccodrilli
IPA: ''
Definition: das Krokodil, -e
Register: ''
Beispielsätze: |-
  Nel fiume abbiamo visto un *coccodrillo* che nuotava lentamente tra le canne.
  Im Fluss haben wir ein *Krokodil* gesehen, das langsam zwischen den Schilfrohren schwamm.
  
  Il documentario mostrava come i *coccodrilli* si mimetizzino nell’ambiente palustre.
  Die Dokumentation zeigte, wie *Krokodile* sich in sumpfiger Umgebung tarnen.
  
  Se avessi un milione di euro, comprerei uno zoo solo per proteggere i *coccodrilli* in via di estinzione.
  Wenn ich eine Million Euro hätte, würde ich einen Zoo kaufen, nur um vom Aussterben bedrohte *Krokodile* zu schützen.
  
  È raro trovare un *coccodrillo* in questa zona, ma la settimana scorsa ne hanno avvistato uno vicino alla diga.
  Es ist selten, ein *Krokodil* in dieser Gegend zu finden, doch letzte Woche haben sie eines in der Nähe des Damms gesichtet.
  
  Molti turisti rimangono affascinati quando osservano i *coccodrilli* mentre si crogiolano al sole sulle rive del lago.
  Viele Touristen sind fasziniert, wenn sie *Krokodile* beobachten, die sich an den Ufern des Sees in der Sonne räkeln.
