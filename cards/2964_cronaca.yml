Rang: 2964
Wort: cronaca
Wortart: n.f
Wort mit Artikel: la cronaca
Femininum / Plural: cronache
IPA: ''
Definition: die Chronik, -en
Register: ''
Beispielsätze: |-
  Il giornalista ha scritto un articolo sulla *cronaca* nera di quella città.
  Der Journalist hat einen Artikel über die *Kriminalchronik* dieser Stadt geschrieben.
  
  Non mi interessa la *cronaca* rosa, preferisco le notizie serie.
  Die *Klatschchronik* interessiert mich nicht, ich bevorzuge ernsthafte Nachrichten.
  
  Nella *cronaca* sportiva di oggi c'è la vittoria della nostra squadra.
  In der heutigen *Sportchronik* steht der Sieg unserer Mannschaft.
  
  Se vuoi sapere cosa è successo, leggi la *cronaca* degli eventi nel giornale di ieri.
  Wenn du wissen willst, was passiert ist, lies die *Chronik* der Ereignisse in der Zeitung von gestern.
  
  La *cronaca* locale riporta spesso notizie di piccoli paesi che altrimenti nessuno conoscerebbe.
  Die *Lokalchronik* berichtet oft über kleine Dörfer, die sonst niemand kennen würde.
