Rang: 2998
Wort: cranio
Wortart: n.m
Wort mit Artikel: il cranio
Femininum / Plural: crani
IPA: ''
Definition: der Schädel, -
Register: ''
Beispielsätze: |-
  Il *cranio* umano ha una forma diversa da quello degli animali.
  Der *Schädel* des Menschen hat eine andere Form als der der Tiere.
  
  Durante lo scavo, gli archeologi hanno trovato un *cranio* molto antico.
  Während der Ausgrabung fanden die Archäologen einen sehr alten *Schädel*.
  
  Il medico ha detto che dopo l’incidente il *cranio* è fratturato ma non c’è emorragia interna.
  Der Arzt sagte, dass nach dem Unfall der *Schädel* gebrochen, aber keine innere Blutung vorliegt.
  
  Se *cranio* viene usato come metafora per indicare una persona testarda, è un errore comune.
  Wenn *Schädel* als Metapher für einen sturköpfigen Menschen verwendet wird, ist das ein häufiger Irrtum.
  
  Nonostante l’età, il *cranio* del professore conserva una lucidità impressionante.
  Trotz des Alters besitzt der *Schädel* des Professors eine beeindruckende Klarheit.
