Rang: 2362
Wort: richiamo
Wortart: n.m
Wort mit Artikel: il richiamo
Femininum / Plural: richiami
IPA: ''
Definition: der Ruf, -e, der Appell, -e
Register: ''
Beispielsätze: |-
  Il *richiamo* dell'uccello era molto melodioso.
  Der *Ruf* des Vogels war sehr melodisch.
  
  Hanno bisogno di un *richiamo* per ricordarsi della scadenza.
  Sie brauchen einen *Appell*, um an die Frist zu erinnern.
  
  Nonostante il *richiamo* del padrone, il cane non tornò indietro.
  Trotz des *Rufs* des Herrchens kehrte der Hund nicht zurück.
  
  Il *richiamo* dei pompieri ha svegliato tutto il vicinato.
  Der *Appell* der Feuerwehrleute weckte die ganze Nachbarschaft.
  
  Senza un chiaro *richiamo*, molti non capiranno il messaggio.
  Ohne einen klaren *Appell* werden viele die Botschaft nicht verstehen.
