Rang: 4571
Wort: granata
Wortart: n.f
Wort mit Artikel: la granata
Femininum / Plural: granate
IPA: ''
Definition: die Granate, -n
Register: ''
Beispielsätze: |-
  La *granata* esplose con un boato assordante vicino al nostro accampamento.
  Die *Granate* explodierte mit einem ohrenbetäubenden Knall nahe unserem Lager.
  
  In quell'armeria vendevano anche vecchie *granate* arrugginite.
  In jenem Waffenladen verkauften sie auch alte, verrostete *Granaten*.
  
  Se avessimo trovato una *granata* inesplosa, avremmo chiamato subito gli artificieri.
  Wenn wir eine nicht detonierte *Granate* gefunden hätten, hätten wir sofort die Kampfmittelbeseitiger gerufen.
  
  Il soldato estrasse la sicura della *granata* con mani tremanti prima di lanciarla.
  Der Soldat riss den Sicherungsstift der *Granate* mit zitternden Händen heraus, bevor er sie warf.
  
  Dopo la guerra, molti parchi pubblici furono chiusi perché potevano ancora nascondere *granate* sepolte.
  Nach dem Krieg wurden viele öffentliche Parks gesperrt, weil sie noch vergrabenen *Granaten* verbergen konnten.
