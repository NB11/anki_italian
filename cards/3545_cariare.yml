Rang: 3545
Wort: cariare
Wortart: v
Wort mit Artikel: cariare
Femininum / Plural: ''
IPA: ''
Definition: kariieren, kariös werden
Register: ''
Beispielsätze: |-
  Il dentista mi ha detto che se non lavo i denti regolarmente i denti possono *cariarsi*.
  Der Zahnarzt hat mir gesagt, dass sich die Zähne *kariieren* können, wenn ich sie nicht regelmäßig putze.
  
  Nonostante la *cariatura* del dente, il paziente non ha voluto curarsi.
  Trotz der *Kariierung* des Zahns wollte sich der Patient nicht behandeln lassen.
  
  Se avessi usato un dentifricio al fluoro da giovane, non mi sarebbe *cariato* nessun dente.
  Wenn ich als junger Mensch eine fluoridhaltige Zahnpasta benutzt hätte, hätte sich *kein* Zahn kariieren müssen.
  
  Si dice che lo zucchero *caria* i denti, ma anche le bevande acide possono avere lo stesso effetto.
  Man sagt, der Zucker *kariiert* die Zähne, aber auch säurehaltige Getränke können den gleichen Effekt haben.
  
  Quando *cariava* i denti, cercava sempre di rimandare la visita dal dentista.
  Als sich seine Zähne *kariierten*, versuchte er immer wieder, den Zahnarztbesuch aufzuschieben.
