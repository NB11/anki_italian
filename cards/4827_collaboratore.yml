Rang: 4827
Wort: collaboratore
Wortart: n.m/f
Wort mit Artikel: il collaboratore
Femininum / Plural: collaboratori
IPA: ''
Definition: der Mitarbeiter, - / die Mitarbeiterin, -nen
Register: ''
Beispielsätze: |-
  Il *collaboratore* ha presentato il progetto con grande entusiasmo.
  Der *Mitarbeiter* hat das Projekt mit großer Begeisterung vorgestellt.
  
  La *collaboratrice* che lavora qui da un anno è molto efficiente.
  Die *Mitarbeiterin*, die seit einem Jahr hier arbeitet, ist sehr leistungsfähig.
  
  Se avesse un *collaboratore* più affidabile, il lavoro procederebbe meglio.
  Wenn er einen *zuverlässigeren Mitarbeiter* hätte, würde die Arbeit besser voranschreiten.
  
  Tutti i *collaboratori* del dipartimento sono stati invitati alla conferenza.
  Alle *Mitarbeiter* der Abteilung wurden zur Konferenz eingeladen.
  
  Il capo ha elogiato il *collaboratore* che ha risolto brillantemente il problema.
  Der Chef hat den *Mitarbeiter* gelobt, der das Problem glänzend gelöst hat.
