Rang: 1962
Wort: sforzo
Wortart: n.m
Wort mit Artikel: lo sforzo
Femininum / Plural: gli sforzi
IPA: ''
Definition: die Anstrengung, -en
Register: ''
Beispielsätze: |-
  Dopo *sforzi* prolungati ho bisogno di una pausa.
  Nach *Anstrengungen* brauche ich eine Pause.
  
  Ha fatto *uno sforzo* enorme per superare l'esame.
  Er hat sich für das Bestehen der Prüfung *extra angestrengt*.
  
  Credo che tu abbia sottovalutato *lo sforzo* necessario.
  Ich glaube, du hast *die benötigte Anstrengung* unterschätzt.
  
  Nonostante *gli sforzi* di tutti, il progetto è fallito.
  Trotz *aller Anstrengungen* ist das Projekt gescheitert.
  
  Lo *sforzo* mentale richiesto era superiore alle sue capacità.
  Die *geistige Anstrengung*, die verlangt wurde, überstieg seine Fähigkeiten.
