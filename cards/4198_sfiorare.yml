Beispielsätze: |-
  Il gatto ha *sfiorato* la mia mano mentre dormivo.
  Die Katze hat meine Hand leicht *berührt*, während ich schlief.
  
  Hai *sfiorato* un argomento molto delicato nella tua discussione.
  Du hast ein sehr heikles Thema in deiner Diskussion nur *gestreift*.
  
  Senza accorgermene, *sfiorai* il vetro rovente e scottai.
  Ohne es zu merken, habe ich das heiße Glas *gestreift* und mich verbrannt.
  
  Se *sfiorerai* questo pulsante, il sistema andrà in standby.
  Wenn du diesen Knopf *leicht berührst*, schaltet sich das System in den Standby-Modus.
  
  Non volevo offenderlo, ho appena *sfiorato* l’argomento della sua lite con Marco.
  Ich wollte ihn nicht beleidigen, ich habe nur *angedeutet*, dass er mit Marco Streit hatte.
