Rang: 3976
Wort: ginnastica
Wortart: n.f
Wort mit Artikel: la ginnastica
Femininum / Plural: ginnastiche
IPA: ''
Definition: die Gymnastik, -
Register: ''
Beispielsätze: |-
  Dopo la pausa pranzo faccio sempre un po' di *ginnastica* per sgranchirmi le gambe.
  Nach der Mittagspause mache ich immer ein bisschen *Gymnastik*, um meine Beine zu lockern.
  
  La mia professoressa di scienze motorie ci ha insegnato una nuova sequenza di *ginnastica* artistica.
  Meine Sportlehrerin hat uns eine neue Abfolge aus *Turnen* beigebracht.
  
  Se non pratici regolarmente *ginnastica*, rischi di perdere flessibilità e forza muscolare.
  Wenn du nicht regelmäßig *Gymnastik* betreibst, riskierst du Flexibilität und Muskelkraft zu verlieren.
  
  Il medico ha consigliato a Marco di fare *ginnastica* correttiva per risolvere i problemi alla schiena.
  Der Arzt hat Marco empfohlen, *Krankengymnastik* zu machen, um die Rückenprobleme zu beheben.
  
  Anche se la *ginnastica* non è il mio sport preferito, mi aiuta a mantenermi in forma.
  Auch wenn *Turnen* nicht mein Lieblingssport ist, hilft es mir, in Form zu bleiben.
