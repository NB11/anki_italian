Rang: 3457
Wort: aggirare
Wortart: vt
Wort mit Artikel: aggirare
Femininum / Plural: ''
IPA: ''
Definition: umgehen, herumgehen
Register: ''
Beispielsätze: |-
  Per *aggirare* il divieto di accesso, devi prendere una strada secondaria.
  Um das Zugangs*verbot* zu umgehen, musst du eine Nebenstraße nehmen.
  
  Il governo sta cercando di *aggirare* le norme ambientali con questa nuova legge.
  Die Regierung versucht, die Umwelt*normen* mit diesem neuen Gesetz zu umgehen.
  
  Se vuoi *aggirare* il traffico, esci presto e prendi la tangenziale.
  Wenn du den Verkehr *umgehen* willst, fahre früh los und nimm die Umgehungsstraße.
  
  Gli investigatori accusano l’azienda di aver *aggirato* le leggi fiscali per anni.
  Die Ermittler werfen dem Unternehmen vor, jahrelang die Steuer*gesetze* umgangen zu haben.
  
  Dovevo *aggirare* la folla per arrivare al palco in tempo.
  Ich musste die Menschenmenge *umgehen*, um rechtzeitig zur Bühne zu kommen.
