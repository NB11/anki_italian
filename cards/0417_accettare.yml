Rang: 417
Wort: accettare
Wortart: v
Wort mit Artikel: accettare
Femininum / Plural: ''
IPA: ''
Definition: akzeptieren, annehmen
Register: ''
Beispielsätze: |-
  Non voglio *accettare* questo regalo, non è appropriato.
  Ich will dieses *Geschenk* nicht *annehmen*, es ist unangemessen.
  
  Ha deciso di *accettare* la nuova offerta di lavoro.
  Er hat sich entschieden, das neue *Jobangebot* anzunehmen.
  
  *Accetta* queste condizioni se vuoi unirti al club?
  *Akzeptierst* du diese Bedingungen, wenn du dem Club beitreten willst?
  
  Spero che tu possa *accettare* le mie scuse sincere.
  Ich hoffe, du kannst meine aufrichtigen *Entschuldigungen* annehmen.
  
  Avrei accettato volentieri se avessero chiesto prima.
  Ich hätte es gerne angenommen, wenn sie vorher gefragt hätten.
