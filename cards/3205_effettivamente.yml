Rang: 3205
Wort: effettivamente
Wortart: adv
Wort mit Artikel: effettivamente
Femininum / Plural: ''
IPA: ''
Definition: tatsächlich, in der Tat
Register: ''
Beispielsätze: |-
  Ho *effettivamente* trovato il portafoglio che credevo perso.
  Ich habe das Portemonnaie, das ich für verloren hielt, *tatsächlich* gefunden.
  
  È *effettivamente* vero che non ci sono più biglietti per il concerto.
  Es ist *in der Tat* wahr, dass es keine Tickets mehr für das Konzert gibt.
  
  Dice di essere stanco, ma *effettivamente* non ha fatto nulla tutto il giorno.
  Er sagt, er sei müde, aber er hat *tatsächlich* den ganzen Tag nichts gemacht.
  
  Se vuoi *effettivamente* imparare l’italiano, devi praticare ogni giorno.
  Wenn du *tatsächlich* Italienisch lernen willst, musst du jeden Tag üben.
  
  Mi dispiace, ma *effettivamente* non posso aiutarti in questo momento.
  Es tut mir leid, aber ich kann dir *in der Tat* im Moment nicht helfen.
