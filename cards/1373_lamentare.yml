Rang: 1373
Wort: lamentare
Wortart: v
Wort mit Artikel: lamentare
Femininum / Plural: ''
IPA: ''
Definition: beklagen, bedauern, lamentieren
Register: ''
Beispielsätze: |-
  Dopo la *lamentò* per ore di non essere stato invitato alla festa.
  Er *klagte* stundenlang darüber, nicht zur Party eingeladen worden zu sein.
  
  È inutile *lamentarsi* della pioggia quando non puoi fare nulla per evitarla.
  Es ist sinnlos, sich über den Regen zu *beklagen*, wenn man nichts dagegen tun kann.
  
  Spero che non *lamenterai* troppo quando scoprirai che il viaggio è stato annullato.
  Ich hoffe, du wirst dich nicht zu sehr *beklagen*, wenn du erfährst, dass die Reise abgesagt wurde.
  
  Si *lamentano* sempre di tutto, anche se in realtà stanno abbastanza bene.
  Sie *klagen* immer über alles, obwohl sie eigentlich ganz gut dran sind.
  
  Se avessi *lamentato* meno e agito di più, forse le cose sarebbero andate meglio.
  Wenn du weniger *beklagt* und mehr gehandelt hättest, wären die Dinge vielleicht besser gelaufen.
