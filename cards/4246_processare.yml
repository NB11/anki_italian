Rang: 4246
Wort: processare
Wortart: v
Wort mit Artikel: processare
Femininum / Plural: ''
IPA: ''
Definition: verarbeiten, bearbeiten, abwickeln
Register: ''
Beispielsätze: |-
  Oggi il computer *processa* i dati molto velocemente.
  Heute *verarbeitet* der Computer die Daten sehr schnell.
  
  Se non *processi* correttamente le informazioni, potresti sbagliare la risposta.
  Wenn du die Informationen nicht *bearbeitest*, könntest du die Antwort falsch machen.
  
  L’avvocato ha detto che vorrebbe *processare* l’azienda per frode.
  Der Anwalt hat gesagt, dass er die Firma wegen Betrugs *verklagen* möchte.
  
  Dopo che avrò *processato* tutti i file, potrai scaricarli sul tuo computer.
  Nachdem ich alle Dateien *bearbeitet* habe, kannst du sie auf deinen Computer herunterladen.
  
  Si discute se sia giusto *processare* chi ha commesso errori in buona fede.
  Es wird diskutiert, ob es richtig ist, diejenigen *zur Rechenschaft zu ziehen*, die Fehler in gutem Glauben begangen haben.
