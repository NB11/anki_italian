Wortart: vi
Wort mit Artikel: obbedire
Femininum / Plural: ''
IPA: ''
Definition: gehorchen
Register: ''
Beispielsätze: |-
  I bambini devono *obbedire* ai genitori senza discutere.
  Kinder müssen den Eltern *gehorchen* ohne zu diskutieren.
  
  Se non *obbedirò* agli ordini, perderò il mio lavoro.
  Wenn ich den Befehlen nicht *gehorche*, verliere ich meinen Job.
  
  Hai *obbedito* alle volte che ti ho detto cosa fare?
  Hast du jedes Mal *gehorcht*, wenn ich dir gesagt habe, was zu tun ist?
  
  Nonostante la confusione, tutti hanno *obbedito* al protocollo di emergenza.
  Trotz des Durcheinanders haben alle dem Notfallprotokoll *gehorcht*.
  
  Chi non *obbedisce* alle leggi della natura finirà per pentirsene dopotutto.
  Wer den Gesetzen der Natur nicht *gehorcht*, wird es nach alledem bereuen.
