Rang: 917
Wort: impegnare
Wortart: vt
Wort mit Artikel: impegnare
Femininum / Plural: ''
IPA: ''
Definition: verpflichten, sich binden
Register: ''
Beispielsätze: |-
  Devo *impegnare* la mia parola per aiutarti domani.
  Ich muss mein Wort *verpflichten*, um dir morgen zu helfen.
  
  Se *impegnassi* di più, supereresti l’esame senza problemi.
  Wenn du dich *verpflichten* würdest, würdest du die Prüfung problemlos bestehen.
  
  L’azienda ha *impegnato* tutti i suoi dipendenti a rispettare le nuove regole.
  Das Unternehmen hat alle seine Mitarbeiter *verpflichtet*, die neuen Regeln zu beachten.
  
  Non so se voglio *impegnarmi* in una relazione così seria a vent’anni.
  Ich weiß nicht, ob ich mich in so eine ernsthafte Beziehung mit zwanzig Jahren *verpflichten* will.
  
  Anche se il professore gli avesse *impegnato* la parola, lui avrebbe tradito la fiducia.
  Auch wenn der Professor ihm sein Wort *verpflichtet* hätte, hätte er das Vertrauen verraten.
