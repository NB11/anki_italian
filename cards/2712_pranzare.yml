Rang: 2712
Wort: pranzare
Wortart: vi
Wort mit Artikel: pranzare
Femininum / Plural: ''
IPA: ''
Definition: zu Mittag essen
Register: ''
Beispielsätze: |-
  Dopo il lavoro *pranzerò* sempre con i miei colleghi al ristorante vicino.
  Nach der Arbeit werde ich immer mit meinen Kollegen im Restaurant in der Nähe *zu Mittag essen*.
  
  Papà, ricordi quando *pranzavamo* tutti insieme durante le vacanze estive?
  Papa, erinnerst du dich, als wir alle zusammen während der Sommerferien *zu Mittag aßen*?
  
  Anche se odio cucinare, *pranzerò* volentieri con questa zuppa che hai preparato.
  Obwohl ich nicht gern koche, werde ich gerne mit dieser Suppe, die du zubereitet hast, *zu Mittag essen*.
  
  Mi dispiace, ma non ho tempo di *pranzare* perché devo finire questo rapporto per domani.
  Es tut mir leid, aber ich habe keine Zeit, *zu Mittag zu essen*, weil ich diesen Bericht bis morgen fertigstellen muss.
  
  È importante che *pranzi* regolarmente, altrimenti ti sentirai stanco tutto il pomeriggio.
  Es ist wichtig, dass du regelmäßig *zu Mittag isst*, sonst fühlst du dich den ganzen Nachmittag müde.
