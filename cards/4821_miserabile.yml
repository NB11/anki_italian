Rang: 4821
Wort: miserabile
Wortart: adj
Wort mit Artikel: miserabile
Femininum / Plural: ''
IPA: ''
Definition: erbärmlich, jämmerlich
Register: ''
Beispielsätze: |-
  Il suo aspetto era così *miserabile* che nessuno riuscì a riconoscere in lui il famoso attore.
  Sein Aussehen war so *erbärmlich*, dass ihn niemand als den berühmten Schauspieler erkannte.
  
  Credo che la situazione economica diventerà ancora più *miserabile* nei prossimi anni.
  Ich glaube, dass die wirtschaftliche Lage in den kommenden Jahren noch *jämmerlicher* wird.
  
  È triste vedere come alcune persone vivano in condizioni così *miserabili* nonostante gli aiuti umanitari.
  Es ist traurig zu sehen, wie einige Menschen trotz humanitärer Hilfe in so *erbärmlichen* Verhältnissen leben.
  
  Se avessi saputo quanto sarebbe stato *miserabile* questo viaggio, non avrei mai accettato l’invito.
  Wenn ich gewusst hätte, wie *jämmerlich* diese Reise sein würde, hätte ich die Einladung nie angenommen.
  
  I politici promettono sempre di migliorare la vita dei più *miserabili*, ma poi non fanno nulla.
  Die Politiker versprechen immer, das Leben der *ärmsten* zu verbessern, aber dann tun sie nichts.
