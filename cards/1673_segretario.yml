Rang: 1673
Wort: segretario
Wortart: n.m
Wort mit Artikel: il segretario
Femininum / Plural: segretari
IPA: ''
Definition: der Sekretär, -e
Register: ''
Beispielsätze: |-
  Il *segretario* del sindaco ha organizzato una riunione urgente per domani mattina.
  Der *Sekretär* des Bürgermeisters hat ein dringendes Treffen für morgen Vormittag organisiert.
  
  Penso che il *segretario* abbia eseguito correttamente le istruzioni ricevute.
  Ich denke, dass der *Sekretär* die erhaltenen Anweisungen richtig ausgeführt hat.
  
  Mentre ero al *segretariato*, ho incontrato un simpatico collega che lavora qui da anni.
  Während ich im *Sekretariat* war, habe ich einen sympathischen Kollegen getroffen, der schon seit Jahren hier arbeitet.
  
  Se il *segretario* non fosse arrivato in tempo, avremmo dovuto sostituire la sua funzione in fretta.
  Wenn der *Sekretär* nicht rechtzeitig angekommen wäre, hätten wir seine Funktion schnell ersetzen müssen.
  
  Chiunque aspiri a diventare *segretario* di un’importante azienda deve dimostrare grande organizzazione e affidabilità.
  Wer *Sekretär* eines wichtigen Unternehmens werden will, muss großes Organisationstalent und Zuverlässigkeit beweisen.
