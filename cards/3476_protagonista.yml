Rang: 3476
Wort: protagonista
Wortart: n.m
Wort mit Artikel: il protagonista
Femininum / Plural: protagonisti
IPA: ''
Definition: die Hauptfigur, -en; Protagonist
Register: ''
Beispielsätze: |-
  Nel romanzo, *il protagonista* lotta contro i suoi demoni interiori.
  Im Roman kämpft *der Protagonist* gegen seine inneren Dämonen.
  
  Chi è *protagonista* nel film che abbiamo visto ieri?
  Wer ist *Protagonist* in dem Film, den wir gestern gesehen haben?
  
  Gli attori principali hanno creato un personaggio *protagonista* memorabile.
  Die Hauptdarsteller haben eine unvergessliche *Hauptfigur* erschaffen.
  
  Sebbene fosse solo un *protagonista* secondario, la sua presenza catturò l'attenzione di tutti.
  Auch wenn er nur eine Neben-*Hauptfigur* war, zog seine Anwesenheit alle Aufmerksamkeit auf sich.
  
  Se fossi *protagonista* di una storia, come sarebbe secondo te?
  Wenn du *Protagonist* einer Geschichte wärst, wie würde sie deiner Meinung nach aussehen?
