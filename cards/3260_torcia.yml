Rang: 3260
Wort: torcia
Wortart: n.f
Wort mit Artikel: la torcia
Femininum / Plural: torce
IPA: ''
Definition: die Fackel, -n
Register: ''
Beispielsätze: |-
  Durante la *torcia* notturna, abbiamo visto le stelle più chiaramente.
  Während der *Fackel* haben wir die Sterne klarer gesehen.
  
  Il pompiere ha acceso la *torcia* per illuminare il corridoio buio.
  Der Feuerwehrmann hat die *Fackel* eingeschaltet, um den dunklen Flur zu erleuchten.
  
  Nonostante la luce della *torcia*, il sentiero rimaneva difficile da percorrere.
  Trotz des Lichts der *Fackel* blieb der Pfad schwer zu begehen.
  
  La *torcia* elettrica è più pratica di quella a petrolio.
  Die elektrische *Fackel* ist praktischer als die mit Petroleum.
  
  Se avessimo una *torcia* migliore, potremmo lavorare anche di notte.
  Wenn wir eine bessere *Fackel* hätten, könnten wir auch nachts arbeiten.
