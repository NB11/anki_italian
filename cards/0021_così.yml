Rang: 21
Wort: così
Wortart: adv
Wort mit Artikel: così
Femininum / Plural: ''
IPA: ''
Definition: so, auf diese Weise
Register: ''
Beispielsätze: |-
  Non mi piace *così*.
  Das gefällt mir *nicht so*.
  
  *Così* parlò il saggio.
  *So* sprach der Weise.
  
  Vai *così* veloce che mi spaventi!
  Du fährst *so* schnell, dass du mich erschreckst!
  
  Se fosse *così* facile, lo farebbero tutti.
  Wenn es *so* einfach wäre, täten sie es alle.
  
  Dimmi *così*: ti piace davvero questo regalo?
  Sag mir *so*: gefällt dir dieses Geschenk wirklich?
