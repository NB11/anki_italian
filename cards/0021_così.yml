Rang: 21
Wort: così
Wortart: adv
Wort mit Artikel: così
Femininum / Plural: ''
IPA: ''
Definition: so, auf diese Weise
Register: ''
Beispielsätze: |-
  Ho fatto *così* perché non sapevo l'altro modo.
  Ich habe es *so* gemacht, weil ich die andere Art nicht kannte.
  
  *Così* non va bene, prova ancora!
  *So* geht das nicht, versuche es noch einmal!
  
  Non mi piace come hai fatto, fallo *così* invece.
  Mir gefällt nicht, wie du es gemacht hast, mach es stattdessen *so*.
  
  Ha reagito *così* perché era molto arrabbiato.
  Er hat *so* reagiert, weil er sehr wütend war.
  
  Vorrei sapere come hai ottenuto questo risultato, *così* potrei imparare.
  Ich möchte wissen, wie du zu diesem Ergebnis gekommen bist, damit ich es lernen kann.
