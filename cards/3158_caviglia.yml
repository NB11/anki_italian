Rang: 3158
Wort: caviglia
Wortart: n.f
Wort mit Artikel: la caviglia
Femininum / Plural: caviglie
IPA: ''
Definition: der Knöchel, -
Register: ''
Beispielsätze: |-
  Dopo la *caviglia* slogata, il medico le ha consigliato di applicare ghiaccio ogni due ore.
  Nach dem verstauchten *Knöchel* hat ihr der Arzt geraten, alle zwei Stunden Eis zu verwenden.
  
  La *caviglia* le doleva da giorni, ma non voleva vedere un medico.
  Ihr *Knöchel* schmerzte seit Tagen, aber sie wollte keinen Arzt aufsuchen.
  
  Se avessi una *caviglia* così robusta, potrei correre senza problemi ogni mattina.
  Wenn ich einen so belastbaren *Knöchel* hätte, könnte ich jeden Morgen problemlos laufen.
  
  Nonostante il dolore alla *caviglia*, riuscì a completare la maratona con uno sforzo incredibile.
  Trotz des *Knöchel*-Schmerzes schaffte sie es, den Marathon mit unglaublicher Anstrengung zu beenden.
  
  Credevo che fosse solo una semplice distorsione alla *caviglia*, ma in realtà era una frattura.
  Ich dachte, es sei nur eine leichte Verstauchung des *Knöchels*, aber es war tatsächlich ein Bruch.
