  Se il tiratore è *debole* con la sinistra, dovrebbe allenarsi di più.
  Wenn der Schütze mit der linken Hand *schwach* ist, sollte er mehr trainieren.
  
  Nonostante l'aspetto *debole*, la sua conversazione rivelava una mente profonda.
