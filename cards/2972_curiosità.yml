Rang: 2972
Wort: curiosità
Wortart: n.f
Wort mit Artikel: la curiosità
Femininum / Plural: le curiosità
IPA: ''
Definition: die Neugier, Wissbegier, Neugierde
Register: ''
Beispielsätze: |-
  La *curiosità* è il motore principale della conoscenza.
  Die *Neugier* ist der Hauptantrieb der Erkenntnis.
  
  Non ho mai visto un tramonto così spettacolare, la mia *curiosità* è stata soddisfatta completamente.
  Ich habe noch nie einen so spektakulären Sonnenuntergang gesehen, meine *Neugier* wurde vollends gestillt.
  
  Per quanto riguarda la *curiosità* scientifica, molti ricercatori viaggiano fino alle profondità degli oceani.
  Was die wissenschaftliche *Neugier* angeht, begeben sich viele Forscher in die Tiefen der Ozeane.
  
  Senza la *curiosità* di un bambino non potremmo mai imparare nuove cose ogni giorno.
  Ohne die *Neugier* eines Kindes könnten wir jeden Tag keine neuen Dinge lernen.
  
  La *curiosità* lo spinse ad aprire il cassetto, nonostante sapesse che non avrebbe dovuto farlo.
  Die *Neugier* trieb ihn dazu, die Schublade zu öffnen, obwohl er wusste, dass er es nicht tun sollte.
