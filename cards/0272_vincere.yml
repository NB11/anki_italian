Rang: 272
Wort: vincere
Wortart: v
Wort mit Artikel: vincere
Femininum / Plural: ''
IPA: ''
Definition: gewinnen, siegen
Register: ''
Beispielsätze: |-
  L'Italia ha *vinto* la partita contro la Germania.
  Italien hat *das Spiel* gegen Deutschland *gewonnen*.
  
  *Vinci* mai quando giochi a scacchi?
  *Gewinnst* du jemals, wenn du Schach spielst?
  
  Se studiassi di più, *vinceresti* sicuramente l'esame.
  Wenn du mehr lernen *würdest*, *bestündest* du die Prüfung sicher.
  
  Che soddisfazione quando *hai vinto* la corsa!
  Welche Befriedigung, als du *das Rennen gewonnen hast*!
  
  Tutti sperano che la nostra squadra *vinca* il campionato.
  Alle hoffen, dass unsere Mannschaft *die Meisterschaft gewinnt*.
