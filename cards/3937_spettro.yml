Rang: 3937
Wort: spettro
Wortart: n.m
Wort mit Artikel: lo spettro
Femininum / Plural: spettri
IPA: ''
Definition: das Gespenst, -er
Register: ''
Beispielsätze: |-
  Lo *spettro* del passato non lo abbandona mai.
  Der *Geist* der Vergangenheit lässt ihn nie los.
  
  Credi davvero che in questa vecchia casa viva un *spettro*?
  Glaubst du wirklich, dass in diesem alten Haus ein *Gespenst* spukt?
  
  Se avessimo visto lo *spettro* di sua sorella, avremmo urlato dallo spavento.
  Wenn wir den *Geist* seiner Schwester gesehen hätten, hätten wir vor Schreck geschrien.
  
  Lo *spettro* di guerra aleggiava su tutto il continente.
  Der *Gespenster*-Zug des Krieges schwebte über dem gesamten Kontinent.
  
  Chiunque osi disturbare lo *spettro* nelle sue apparizioni avrà guai seri.
  Wer es wagt, den *Geist* in seinen Erscheinungen zu stören, wird große Probleme bekommen.
