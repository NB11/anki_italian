Rang: 3126
Wort: sobrio
Wortart: adj
Wort mit Artikel: sobrio
Femininum / Plural: ''
IPA: ''
Definition: nüchtern, besonnen, maßvoll
Register: ''
Beispielsätze: |-
  Dopo la festa lunga, Marco rimase *sobrio* anche se tutti gli altri avevano bevuto troppo.
  Nach der langen Feier blieb Marco *nüchtern*, obwohl alle anderen zu viel getrunken hatten.
  
  La polizia ha trovato un *sobrio* rapporto clinico sul caso.
  Die Polizei fand einen *besonnenen* klinischen Bericht zu dem Fall.
  
  Nonostante le critiche, rimase *sobrio* e non si lasciò coinvolgere.
  Trotz der Kritik blieb er *maßvoll* und ließ sich nicht mitreißen.
  
  Se fossi *sobrio*, non avresti mai accettato quella proposta così rischiosa.
  Wärst du *nüchtern*, hättest du diesen riskanten Vorschlag nie akzeptiert.
  
  Il medico gli consigliò di condurre uno stile di vita *sobrio* per migliorare la salute.
  Der Arzt riet ihm, einen *besonnenen* Lebensstil zu führen, um die Gesundheit zu verbessern.
