Rang: 3487
Wort: gelare
Wortart: vi
Wort mit Artikel: gelare
Femininum / Plural: ''
IPA: ''
Definition: erfrieren, gefrieren, erstarren
Register: ''
Beispielsätze: |-
  Stamattina fuori *gelava* così tanto che perfino la benzina nel serbatoio si è trasformata in un blocco di ghiaccio.
  Heute Morgen war es draußen so kalt, dass sogar der Kraftstoff im Tank zu einem Eisklumpen *gefror*.
  
  Ho paura che domani, se non metto la crema, la mia pelle possa *gelare* al sole di mezzogiorno.
  Ich habe Angst, dass meine Haut morgen, wenn ich keine Creme auftrage, in der Mittagssonne *erfriert*.
  
  Era già stato in montagna e sapeva che ad alte quote l'acqua nelle tubature può *gelare* in pochissimo tempo.
  Er war schon in den Bergen gewesen und wusste, dass das Wasser in den Rohren bei großer Höhe in kürzester Zeit *gefriert*.
  
  Si dice che il freddo intenso possa *gelare* il sangue nelle vene e trasformare anche il coraggio in timore.
  Man sagt, dass extreme Kälte das Blut in den Adern *erstarren* lässt und sogar den Mut in Furcht verwandeln kann.
  
  Se non avessimo acceso il riscaldamento, i nostri risparmi sarebbero *gelati* nel conto corrente come se fossero una statua di ghiaccio.
  Wenn wir die Heizung nicht eingeschaltet hätten, wären unsere Ersparnisse auf dem Konto *erstarrt*, als wären sie eine Eisskulptur.
