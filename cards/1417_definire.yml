Rang: 1417
Wort: definire
Wortart: v
Wort mit Artikel: definire
Femininum / Plural: ''
IPA: ''
Definition: definieren, festlegen
Register: ''
Beispielsätze: |-
  Non è facile *definire* i confini di un concetto così ampio.
  Es ist nicht einfach, die Grenzen eines so weiten Konzepts zu *definieren*.
  
  Secondo il sindaco, bisogna *definire* nuove regole per la lotta al fumo nelle piazze.
  Dem Bürgermeister zufolge muss man neue Regeln zur *Definition* des Kampfes gegen den Rauch auf den Plätzen definieren.
  
  Ho provato a *definire* con precisione la mia posizione sul cambiamento climatico, ma è difficile.
  Ich habe versucht, meine Position zum Klimawandel genau zu *bestimmen*, aber es ist schwierig.
  
  Se vuoi *definire* le tue priorità, devi prima analizzare la situazione seriamente.
  Wenn du deine Prioritäten *definieren* willst, musst du die Situation zunächst ernsthaft analysieren.
  
  Gli scienziati cercano di *definire* con chiarezza il ruolo dell'inquinamento nella diffusione del cancro.
  Die Wissenschaftler versuchen, die Rolle der Verschmutzung bei der Ausbreitung des Krebses klar zu *definieren*.
