Rang: 1328
Wort: trappola
Wortart: n.f
Wort mit Artikel: la trappola
Femininum / Plural: trappole
IPA: ''
Definition: die *Falle*, -n
Register: ''
Beispielsätze: |-
  Il cacciatore ha messo una *trappola* nel bosco per catturare la volpe.
  Der Jäger hat eine *Falle* im Wald aufgestellt, um den Fuchs zu fangen.
  
  Non cadere nella *trappola* che ti hanno teso i truffatori!
  Fallen Sie nicht in die *Falle*, die Ihnen die Betrüger gestellt haben!
  
  Hanno installato delle *trappole* elettriche per proteggere il giardino dagli animali.
  Sie haben elektrische *Fallen* installiert, um den Garten vor Tieren zu schützen.
  
  Se vuoi ottenere questo risultato, devi evitare la *trappola* della fretta.
  Wenn Sie dieses Ergebnis erreichen wollen, müssen Sie die *Falle* der Eile vermeiden.
  
  La *trappola* per topi era posizionata vicino alla dispensa, ma nessuno dei due roditori ci è caduto.
  Die Mausefalle stand neben der Vorratskammer, aber keiner der beiden Nagetiere ist hineingetappt.
