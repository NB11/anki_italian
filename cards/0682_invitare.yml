Rang: 682
Wort: invitare
Wortart: vt
Wort mit Artikel: invitare
Femininum / Plural: ''
IPA: ''
Definition: einladen
Register: ''
Beispielsätze: |-
  Mia sorella vuole *invitare* tutti i suoi amici al compleanno.
  Meine Schwester möchte alle ihre Freunde zum *Geburtstag* einladen.
  
  Se non smetti di *invitare* gente a casa mia, dovrò bloccare l’ingresso!
  Wenn du nicht aufhörst, Leute in meine Wohnung einzuladen, muss ich den Zugang *verhindern*!
  
  Ho appena saputo che Marco vorrebbe *invitare* quella cantante famosa al nostro pranzo di Natale.
  Soeben habe ich erfahren, dass Marco diese berühmte Sängerin zu unserem *Mittagessen* an Weihnachten einladen möchte.
  
  Sarebbe necessario *invitare* più persone per dimostrare il successo dell’evento, secondo il regolamento.
  Es wäre nötig, mehr Leute einzuladen, um den Erfolg der Veranstaltung gemäß der *Verordnung* zu beweisen.
  
  Nonostante la fame, dovremmo evitare di *invitare* troppi sconosciuti in questo luogo isolato.
  Trotz des *Hungers* sollten wir es vermeiden, zu viele Fremde an diesen abgelegenen Ort einzuladen.
