Rang: 1665
Wort: spaccare
Wortart: vt
Wort mit Artikel: spaccare
Femininum / Plural: ''
IPA: ''
Definition: zerbrechen, spalten, kaputtmachen
Register: ''
Beispielsätze: |-
  Il contadino *spacca* la legna con un’accetta ogni mattina.
  Der Bauer *spaltet* das Holz jeden Morgen mit einer Axt.
  
  Se continui a *spaccare* tutto, finirai per rovinare tutti gli attrezzi!
  Wenn du weiter *kaputtmachst*, wirst du am Ende alle Werkzeuge ruinieren!
  
  Ho visto un ragazzo che *spaccava* una bottiglia contro il muro per protestare.
  Ich habe einen Jungen gesehen, der eine Flasche gegen die Wand *zerschlug*, um zu protestieren.
  
  Non appena il ladro ha sentito le sirene, ha cominciato a *spaccare* la serratura per scappare.
  Sobald der Dieb die Sirenen hörte, fing er an, das Schloss *aufzubrechen*, um zu fliehen.
  
  Secondo l’analisi, il terremoto potrebbe *spaccare* il muro portante dell’edificio.
  Laut der Analyse könnte das Erdbeben die tragende Wand des Gebäudes *zum Einsturz bringen*.
