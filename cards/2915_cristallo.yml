Rang: 2915
Wort: cristallo
Wortart: n.m
Wort mit Artikel: il cristallo
Femininum / Plural: cristalli
IPA: ''
Definition: der Kristall, -e
Register: ''
Beispielsätze: |-
  Durante la *cristallo* ha notato una crepa sottile che non c'era prima.
  Während des *Kristalls* ist ihm ein feiner Riss aufgefallen, den es vorher nicht gab.
  
  Vorrei comprare un vaso di *cristallo* per la collezione di mia nonna.
  Ich würde gerne eine *Kristall*-Vase für die Sammlung meiner Großmutter kaufen.
  
  Gli scienziati studiano la struttura del *cristallo* per scoprire nuovi materiali.
  Die Wissenschaftler untersuchen die Struktur des *Kristalls*, um neue Materialien zu entdecken.
  
  L'arredatore ha scelto arredi in *cristallo* per rendere la stanza più elegante.
  Der Einrichter hat Möbel aus *Kristall* gewählt, um den Raum eleganter wirken zu lassen.
  
  Nonostante la *cristallo* fosse fragile, sopravvisse all'ultimo trasloco.
  Obwohl der *Kristall* zerbrechlich war, überstand er den letzten Umzug unbeschadet.
