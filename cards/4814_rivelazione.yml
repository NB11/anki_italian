Rang: 4814
Wort: rivelazione
Wortart: n.f
Wort mit Artikel: la rivelazione
Femininum / Plural: rivelazioni
IPA: ''
Definition: die Enthüllung, -en
Register: ''
Beispielsätze: |-
  La *rivelazione* del segreto ha scioccato tutti gli invitati alla festa.
  Die *Enthüllung* des Geheimnisses hat alle Gäste auf der Feier erschüttert.
  
  Nonostante le *rivelazioni* dei testimoni, il caso rimane ancora irrisolto.
  Trotz der *Enthüllungen* der Zeugen bleibt der Fall weiterhin ungelöst.
  
  Era convinto che la *rivelazione* della verità lo avrebbe aiutato a essere perdonato.
  Er war überzeugt, dass die *Enthüllung* der Wahrheit ihm helfen würde, Vergebung zu finden.
  
  Le *rivelazioni* della stampa scandalistica hanno creato un clima di diffidenza nella città.
  Die *Enthüllungen* der Boulevardpresse haben ein Klima des Misstrauens in der Stadt geschaffen.
  
  Se avessi saputo della *rivelazione* anticipata, avrei avvertito subito le autorità.
  Hätte ich von der vorzeitigen *Enthüllung* gewusst, hätte ich sofort die Behörden informiert.
