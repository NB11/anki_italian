Rang: 3009
Wort: sigillare
Wortart: vt
Wort mit Artikel: sigillare
Femininum / Plural: ''
IPA: ''
Definition: versiegeln, abdichten
Register: ''
Beispielsätze: |-
  Dopo aver firmato il *sigillato* il documento per renderlo ufficiale.
  Nachdem er das Dokument *versiegelt* hatte, um es offiziell zu machen.
  
  L’artigiano usa la cera per *sigillare* i barattoli di marmellata.
  Der Handwerker nutzt Wachs, um die Marmeladengläser *abzudichten*.
  
  Se non *sigilli* correttamente il tubo, perderà pressione.
  Wenn du das Rohr nicht *versiegelst*, verliert es Druck.
  
  La polizia scientifica è arrivata per *sigillare* la scena del crimine.
  Die Spurensicherung ist gekommen, um die *Tatortstelle* zu versiegeln.
  
  Quando avrai *sigillato* il pacco, puoi spedirlo.
  Sobald du das Paket *versiegelt* hast, kannst du es aufgeben.
