Rang: 2511
Wort: cimitero
Wortart: n.m
Wort mit Artikel: il cimitero
Femininum / Plural: cimiteri
IPA: ''
Definition: der Friedhof, -¨e
Register: ''
Beispielsätze: |-
  Visitiamo spesso *il cimitero* per onorare i nostri defunti.
  Wir besuchen oft den *Friedhof*, um unsere Verstorbenen zu ehren.
  
  Molti turisti rimangono affascinati dagli antichi *cimiteri* di questa città.
  Viele Touristen bleiben von den alten *Friedhöfen* dieser Stadt fasziniert.
  
  Dicono che passeggiare tra le tombe del *cimitero* porti sfortuna.
  Man sagt, dass Spaziergänge zwischen den Gräbern des *Friedhofs* Unglück bringen.
  
  Ho trovato una rosa appassita accanto alla tomba nel *cimitero*.
  Ich habe eine welke Rose neben dem Grab auf dem *Friedhof* gefunden.
  
  Nonostante la pioggia, abbiamo deciso di recarci al *cimitero* per la commemorazione.
  Trotz des Regens haben wir beschlossen, zum *Friedhof* für die Gedenkfeier zu gehen.
