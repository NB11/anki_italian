Rang: 2333
Wort: intervista
Wortart: n.f
Wort mit Artikel: l'intervista
Femininum / Plural: interviste
IPA: ''
Definition: das Interview, -s
Register: ''
Beispielsätze: |-
  Giorgio ha fatto un'*intervista* molto interessante a un famoso attore ieri sera.
  Giorgio hat gestern Abend ein *Interview* mit einem berühmten Schauspieler geführt.
  
  Sai chi ha scritto questo articolo? Secondo me, l'*intervista* al sindaco è stata preparata male.
  Weißt du, wer diesen Artikel geschrieben hat? Ich glaube, das *Interview* mit dem Bürgermeister war schlecht vorbereitet.
  
  L'*intervista* che abbiamo ascoltato oggi in classe parlava di cambiamenti climatici.
  Das *Interview*, das wir heute im Unterricht gehört haben, handelte von Klimaveränderungen.
  
  Se vuoi lavorare come giornalista, devi imparare a fare un'*intervista* in modo professionale.
  Wenn du als Journalist arbeiten willst, musst du lernen, ein *Interview* professionell zu führen.
  
  L'*intervista* che gli hanno fatto dopo la vittoria era così emozionante che tutti abbiamo pianto.
  Das *Interview*, das sie ihm nach dem Sieg gemacht haben, war so bewegend, dass wir alle geweint haben.
