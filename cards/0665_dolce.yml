Rang: 665
Wort: dolce
Wortart: adj
Wort mit Artikel: dolce
Femininum / Plural: ''
IPA: ''
Definition: süß, lieblich, sanft
Register: ''
Beispielsätze: |-
  Questo è un *dolce* profumo che mi ricorda la nostra infanzia in campagna.
  Das ist ein *sanfter* Duft, der mich an unsere Kindheit auf dem Land erinnert.
  
  Credo che abbia fatto la scelta giusta, anche se non era *dolce* come sembrava.
  Ich glaube, er hat die richtige Entscheidung getroffen, auch wenn sie nicht so *harmlos* war, wie sie schien.
  
  Ti prego, non essere così *dolce* con me, altrimenti mi farai piangere!
  Bitte sei nicht so *lieb* zu mir, sonst muss ich weinen!
  
  La sua voce era così *dolce* che tutti si fermarono ad ascoltarla, dimenticando ogni problema.
  Ihre Stimme war so *sanft*, dass alle stehenblieben, um zuzuhören und alle Sorgen vergaßen.
  
  Se avessi saputo che il finale sarebbe stato così *dolce*, non avrei mai abbandonato la serie dopo il terzo episodio.
  Hätte ich gewusst, dass das Ende so *rührend* wird, hätte ich die Serie nach der dritten Folge nie verlassen.
