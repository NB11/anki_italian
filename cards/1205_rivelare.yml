Rang: 1205
Wort: rivelare
Wortart: vt
Wort mit Artikel: rivelare
Femininum / Plural: ''
IPA: ''
Definition: enthüllen, aufdecken, offenbaren
Register: ''
Beispielsätze: |-
  Non volevo *rivelare* il segreto della mia amica, ma alla fine l’ho fatto.
  Ich wollte das Geheimnis meiner Freundin nicht *enthüllen*, aber am Ende habe ich es doch getan.
  
  Se *rivelerai* la verità, nessuno ti crederà più.
  Wenn du die Wahrheit *aufdeckst*, wird dir niemand mehr glauben.
  
  Hanno *rivelato* un complotto che avrebbe distrutto il paese.
  Sie haben eine Verschwörung *enthüllt*, die das Land zerstört hätte.
  
  Anche se non è ovvio, dobbiamo *rivelare* la causa di questo problema.
  Auch wenn es nicht *offensichtlich* ist, müssen wir die Ursache dieses Problems offenbaren.
  
  Ti prego, non *rivelare* a nessuno dove ho nascosto il do per tuo compleanno!
  Bitte *enthüll* niemandem, wo ich das Geschenk für deinen Geburtstag versteckt habe!
