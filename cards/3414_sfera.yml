  Die *Öffentlichkeit* sollte nicht von privaten Interessen beeinflusst werden.
  
  Dopo anni di studio, ha capito che la *sfera* dei suoi interessi era cambiata drasticamente.
  Nach Jahren des Studiums hat er begriffen, dass sich die *Sphäre* seiner Interessen drastisch verändert hatte.
