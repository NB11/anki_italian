Beispielsätze: |-
  La *sfera* terrestre è solo una piccola parte dell'universo.
  Die *Erdkugel* ist nur ein kleiner Teil des Universums.
  
  Hanno trovato una *sfera* di metallo nel parco ieri sera.
  Sie haben gestern Abend eine *Kugel* aus Metall im Park gefunden.
  
