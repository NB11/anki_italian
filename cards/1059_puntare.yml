Rang: 1059
Wort: puntare
Wortart: vt
Wort mit Artikel: puntare
Femininum / Plural: ''
IPA: ''
Definition: zielen, richten, anpeilen
Register: ''
Beispielsätze: |-
  Il cecchino *punta* il bersaglio con estrema precisione.
  Der Scharfschütze zielt mit extremer Präzision auf das *Ziel*.
  
  Ho bisogno di *puntare* gli occhi sul documento per comprendere il senso della frase.
  Ich muss den Blick auf das Dokument richten, um den Sinn des Satzes zu *begreifen*.
  
  Se non *punterai* le risorse giuste, il progetto non avrà seguito nel tempo.
  Wenn du nicht die richtigen Ressourcen einsetzt, wird das Projekt langfristig keine *Fortsetzung* haben.
  
  Anche se il sospetto *puntava* verso di loro, non c'erano prove concrete per arrestarlo.
  Auch wenn der Verdacht auf sie *zielte*, gab es keine Beweise, um ihn zu verhaften.
  
  Gli scienziati *puntano* a trovare una cura per quella malattia rara entro cinque anni.
  Die Wissenschaftler *zielen* darauf ab, innerhalb von fünf Jahren eine Behandlung für diese seltene Krankheit zu finden.
