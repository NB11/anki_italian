Rang: 3293
Wort: robbia
Wortart: n.f
Wort mit Artikel: la robbia
Femininum / Plural: robbie
IPA: ''
Definition: die Krappwurzel, -n
Register: ''
Beispielsätze: |-
  In passato la *robbia* veniva usata per tingere i tessuti di rosso.
  Früher wurde *Krappwurzel* zum Rotfärben von Stoffen verwendet.
  
  La pianta della *robbia* predilige i terreni calcarei e ben esposti al sole.
  Die *Krappwurzel* gedeiht am besten in kalkhaltigen und sonnigen Böden.
  
  Non sapevo che l’estratto di *robbia* fosse così prezioso in erboristeria!
  Ich wusste nicht, dass der *Krappwurzel*-Extrakt so wertvoll in der Kräuterheilkunde ist!
  
  Molti artigiani preferiscono ancora tingere con la *robbia* per ottenere un colore autentico.
  Viele Handwerker färben ihre Stoffe noch immer mit *Krappwurzel*, um eine authentische Farbe zu erzielen.
  
  La *robbia* è stata a lungo sostituita dai coloranti sintetici, ma oggi sta tornando di moda.
  Zwar wurde die *Krappwurzel* lange von synthetischen Farbstoffen verdrängt, doch heute erlebt sie ein Comeback.
