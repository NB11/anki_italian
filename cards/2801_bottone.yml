Rang: 2801
Wort: bottone
Wortart: n.m
Wort mit Artikel: il bottone
Femininum / Plural: bottoni
IPA: ''
Definition: der Knopf, -¨
Register: ''
Beispielsätze: |-
  Mi sono accorto che manca un *bottone* alla tua camicia.
  Mir ist aufgefallen, dass deinem Hemd ein *Knopf* fehlt.
  
  Ho premuto il *bottone* rosso per chiamare l’ascensore.
  Ich habe den roten *Knopf* gedrückt, um den Aufzug zu rufen.
  
  Non toccare quel *bottone*: è molto delicato e potrebbe rompersi.
  Fass diesen *Knopf* nicht an: Er ist sehr empfindlich und könnte kaputtgehen.
  
  Se premi quel *bottone*, la macchina partirà automaticamente.
  Wenn du diesen *Knopf* drückst, startet die Maschine automatisch.
  
  Il *bottone* che ho trovato per terra non appartiene alla mia giacca.
  Der *Knopf*, den ich auf dem Boden gefunden habe, gehört nicht zu meiner Jacke.
