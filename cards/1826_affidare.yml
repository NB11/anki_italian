Rang: 1826
Wort: affidare
Wortart: vt
Wort mit Artikel: affidare
Femininum / Plural: ''
IPA: ''
Definition: anvertrauen, übertragen
Register: ''
Beispielsätze: |-
  Ho deciso di *affidare* il mio gatto a un amico durante le vacanze.
  Ich habe beschlossen, meine Katze während der Ferien *an* einen Freund zu übergeben.
  
  Se non puoi occupartene tu, perché non *affidi* il problema a qualcun altro?
  Wenn du dich nicht darum kümmern kannst, warum *übergibst* du das Problem nicht einfach jemand anderem?
  
  Il sindaco *ha affidato* la gestione del parco a un’associazione ambientalista.
  Der Bürgermeister hat die Verwaltung des Parks einer Umweltschutzorganisation *übergeben*.
  
  Mi hanno detto che non è saggio *affidarsi* a persone sconosciute in città.
  Man hat mir gesagt, dass es nicht klug ist, sich in der Stadt auf Fremde zu *verlassen*.
  
  Non appena riceverai le istruzioni, potrai *affidare* il progetto al nuovo team.
  Sobald du die Anweisungen erhältst, kannst du das Projekt dem neuen Team *übertragen*.
