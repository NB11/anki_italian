Rang: 4806
Wort: guscio
Wortart: n.m
Wort mit Artikel: il guscio
Femininum / Plural: i gusci
IPA: ''
Definition: die Schale, -n
Register: ''
Beispielsätze: |-
  Il riccio si nasconde sotto *il guscio* quando si sente minacciato.
  Der Igel versteckt sich unter *der Schale*, wenn er sich bedroht fühlt.
  
  Ho trovato un *guscio* di noce bellissimo sulla spiaggia.
  Ich habe *eine Schale* aus einer Nuss wunderschön am Strand gefunden.
  
  Non sapevo che anche le tartarughe marine depongono le uova dentro *un guscio* simile a quello delle galline.
  Ich wusste nicht, dass auch Meeresschildkröten ihre Eier in *einer Schale*, die der von Hühnern ähnelt, ablegen.
  
  Mentre pulivo il camino, ho visto che era pieno di *gusci* di insetti bruciati.
  Während ich den Kamin reinigte, sah ich, dass er voller von verbrannten *Schalen* von Insekten war.
  
  Se avessi saputo che bisognava rompere *il guscio* prima di cucinare, non avrei gettato via la zucca!
  Wenn ich gewusst hätte, dass man *die Schale* vorher aufbrechen muss, bevor man den Kürbis kocht, hätte ich ihn nicht weggeworfen!
