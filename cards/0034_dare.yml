  Morgen gebe ich dir die endgültige *Antwort*.
  
  Se avessi tempo, ti darei volentieri una mano.
  Wenn ich Zeit hätte, würde ich dir gerne *helfen*.
  
  Che cosa le hanno *dato* per il suo compleanno?
  Was haben sie ihr zum *Geburtstag geschenkt*?
