Wort mit Artikel: dare
Femininum / Plural: ''
IPA: ''
Definition: geben
Register: ''
Beispielsätze: |-
  Ti *dò* volentieri il mio libro.
  Ich gebe dir gerne mein *Buch*.
  
  Mi hanno *dato* questa ricetta da mia nonna.
  Sie haben mir dieses *Rezept* von meiner Oma *gegeben*.
  
  Perché non ci *dai* una mano con i bagagli?
  Warum hilfst du uns nicht mit dem *Gepäck*?
  
  Vorrei che mi *dessero* più tempo per finire il progetto.
  Ich wünschte, sie würden mir mehr *Zeit* geben, um das Projekt zu beenden.
  
  Se avessi soldi, ti *darei* volentieri un prestito.
  Wenn ich Geld hätte, würde ich dir gerne ein *Darlehen* geben.
