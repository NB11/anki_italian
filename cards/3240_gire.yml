Wort mit Artikel: gire
Femininum / Plural: ''
IPA: ''
Definition: drehen
Register: ''
Beispielsätze: |-
  Per aprire questa scatoletta, devi *girare* la manopola in senso antiorario.
  Um diese Dose zu öffnen, musst du am *Griff*
  
  Mentre *giravamo* per la città vecchia, abbiamo perso l’orientamento.
  Während wir durch die Altstadt *irrten*, verloren wir die Orientierung.
  
  Se avessi tempo, mi piacerebbe *girare* un cortometraggio tutto da solo.
  Wenn ich Zeit hätte, würde ich gerne einen Kurzfilm ganz allein *drehen*.
  
  Il regista ha deciso di *girare* la scena in una location all’aperto per darle più realismo.
  Der Regisseur beschloss, die Szene an einem Außenort zu *drehen*, um ihr mehr Realismus zu verleihen.
  
  Nonostante la pioggia, continuammo a *girare* finché il produttore non ci chiamò per arrêtés.
  Trotz des Regens drehten wir weiter, bis der Produzent uns zum *Aufhören* aufforderte.
