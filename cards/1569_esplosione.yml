Rang: 1569
Wort: esplosione
Wortart: n.f
Wort mit Artikel: l'esplosione
Femininum / Plural: esplosioni
IPA: ''
Definition: die Explosion, -en
Register: ''
Beispielsätze: |-
  L'*esplosione* del vulcano è stata così potente che ha scosso tutta l'isola.
  Die *Explosion* des Vulkans war so stark, dass sie die ganze Insel erschüttert hat.
  
  Se sentiamo il rumore di un'*esplosione*, dobbiamo subito chiamare i soccorsi.
  Wenn wir das Geräusch einer *Explosion* hören, müssen wir sofort den Rettungsdienst rufen.
  
  L'*esplosione* nello stabilimento chimico ha causato gravi danni ambientali, secondo quanto dichiarato dal ministro dell'ambiente.
  Die *Explosion* in der Chemiefabrik hat schwere Umweltschäden verursacht, wie der Umweltminister mitteilte.
  
  Dopo l'*esplosione* nel centro commerciale, la polizia ha avvisato la cittadinanza di evitare la zona.
  Nach der *Explosion* im Einkaufszentrum hat die Polizei die Bürger aufgefordert, das Gebiet zu meiden.
  
  Nonostante l'*esplosione* dei prezzi del carburante, molti lavoratori continuano ad andare al lavoro in moto.
  Trotz der *Explosion* der Kraftstoffpreise fahren viele Arbeiter weiterhin mit dem Motorrad zur Arbeit.
