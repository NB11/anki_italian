Rang: 4070
Wort: sballare
Wortart: vi
Wort mit Artikel: sballare
Femininum / Plural: ''
IPA: ''
Definition: sehr hoch sein, einen *Kick* haben, abheben
Register: ''
Beispielsätze: |-
  Dopo aver bevuto due caffè, mi sentivo *sballato* tutto il giorno.
  Nach zwei Kaffees war ich den ganzen Tag *high*.
  
  Non *sballare* troppo con gli alcolici, potrebbe farti male.
  Mach dich nicht zu sehr *zudröhnen* mit Alkohol, das könnte dir schaden.
  
  Si dice che dopo tre bicchieri di grappa uno *sballi* senza accorgersene.
  Man sagt, dass man nach drei Gläsern Grappa *abhebt*, ohne es zu merken.
  
  Se *sballi* troppo spesso, rischi di perdere il controllo.
  Wenn du dich zu oft *berauschst*, riskierst du den Kontrollverlust.
  
  Nonostante il divieto, alcuni ragazzi continuano a *sballare* in discoteca.
  Trotz des Verbots *drehen* sich einige Jugendliche in der Disco weiterhin einen Laden.
Audio: ''
Notiz: ''
Dispersion: ''
