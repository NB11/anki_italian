Rang: 4770
Wort: postino
Wortart: n.m
Wort mit Artikel: il postino
Femininum / Plural: postini
IPA: ''
Definition: der Briefträger, -
Register: ''
Beispielsätze: |-
  Il *postino* ha consegnato una lettera importante al signor Rossi.
  Der *Briefträger* hat dem Herrn Rossi einen wichtigen Brief zugestellt.
  
  Non ho visto il *postino* stamattina: avrà lavorato altrove?
  Ich habe den *Briefträger* heute Morgen nicht gesehen: wird er woanders gearbeitet haben?
  
  Se avessi saputo che il *postino* passava oggi, gli avrei dato una lettera da spedire.
  Wenn ich gewusst hätte, dass der *Briefträger* heute vorbeikommt, hätte ich ihm einen Brief zum Abschicken gegeben.
  
  Chissà quando arriverà il nuovo *postino*: spero che sia più veloce dell’attuale.
  Wer weiß, wann der neue *Briefträger* ankommt: Ich hoffe, dass er schneller ist als der aktuelle.
  
  L’impiegato allo sportello ha detto che il *postino* arriverà tra un’ora, non prima.
  Der Angestellte am Schalter hat gesagt, dass der *Briefträger* in einer Stunde ankommt, nicht früher.
