Rang: 4846
Wort: alcolista
Wortart: n.m
Wort mit Artikel: l'alcolista
Femininum / Plural: gli alcolisti
IPA: ''
Definition: der Alkoholiker, -
Register: ''
Beispielsätze: |-
  L'*alcolista* ha deciso di chiedere aiuto per smettere di bere.
  Der *Alkoholiker* hat beschlossen, um Hilfe zu bitten, um aufzuhören zu trinken.
  
  Se tu fossi un *alcolista*, cosa ti direbbe il medico?
  Wenn du ein *Alkoholiker* wärst, was würde dir der Arzt sagen?
  
  Gli *alcolisti* cronici spesso hanno problemi di salute gravi.
  Chronische *Alkoholiker* haben oft schwere gesundheitliche Probleme.
  
  Molti credono che l'*alcolista* non possa mai guarire completamente, ma non è vero.
  Viele glauben, dass ein *Alkoholiker* nie vollständig heilen kann, aber das stimmt nicht.
  
  Nonostante fosse un *alcolista*, è riuscito a rientrare nella società grazie al sostegno dei famigliari.
  Trotz *Alkoholiker* ist es ihm gelungen, dank der Unterstützung der Familie wieder in die Gesellschaft zurückzukehren.
