Beispielsätze: |-
  Roma è una città *famosissima* per la sua storia millenaria e i suoi monumenti.
  Rom ist eine *berühmte* Stadt für ihre jahrtausendealte Geschichte und ihre Denkmäler.
  
  Il regista ha appena lanciato il suo film più *famoso* al festival di Cannes.
  Der Regisseur hat gerade seinen *berühmtesten* Film auf dem Festival von Cannes vorgestellt.
  
  Credi davvero che quell’attore sia così *famoso* come dicono i giornali?
  Glaubst du wirklich, dass dieser Schauspieler so *berühmt* ist, wie die Zeitungen behaupten?
  
  Il suo ultimo romanzo, diventato *famoso* in pochi mesi, ha vinto diversi premi.
  Sein letzter Roman, der in wenigen Monaten *berühmt* wurde, hat diverse Preise gewonnen.
  
  Se avessi tempo, visiterei tutti i luoghi *famosi* di questa città, ma purtroppo dipende dal periodo.
  Wenn ich Zeit hätte, würde ich alle *berühmten* Orte dieser Stadt besuchen, aber leider hängt das vom Zeitraum ab.
