Rang: 2860
Wort: interferire
Wortart: vi
Wort mit Artikel: interferire
Femininum / Plural: ''
IPA: ''
Definition: einmischen, beeinträchtigen
Register: ''
Beispielsätze: |-
  Non dovresti *interferire* negli affari degli altri se non sei stato invitato.
  Du solltest dich nicht in die Angelegenheiten anderer einmischen, wenn du nicht eingeladen bist.
  
  Ho visto che stavi cercando di *interferire* nella nostra conversazione, ma non ci sei riuscito.
  Ich habe gesehen, dass du versucht hast, in unser Gespräch einzugreifen, aber es ist dir nicht gelungen.
  
  Se *interferirai* troppo presto nel progetto, rischi di rovinare tutto il lavoro fatto finora.
  Wenn du zu früh in das Projekt eingreifst, riskierst du, all die bisher geleistete Arbeit zu ruinieren.
  
  Il governo vuole fermare chi cerca di *interferire* con le elezioni democratiche.
  Die Regierung möchte diejenigen stoppen, die versuchen, in die demokratischen Wahlen einzugreifen.
  
  È inutile che tu *interferisca* ora: la decisione è già stata presa e non può essere cambiata.
  Es ist sinnlos, dass du jetzt noch eingreifst: Die Entscheidung ist bereits gefallen und kann nicht mehr geändert werden.
