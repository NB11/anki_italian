Rang: 3101
Wort: balena
Wortart: n.m
Wort mit Artikel: la balena
Femininum / Plural: balene
IPA: ''
Definition: der Wal, -e
Register: ''
Beispielsätze: |-
  La *balena* blu è l’animale più grande del mondo.
  Der *Wal* ist das größte Tier der Welt.
  
  Dicono che vicino all’isola ci sia una *balena* che nuota saltando fuori dall’acqua.
  Man erzählt, dass es in der Nähe der Insel einen *Wal* gibt, der aus dem Wasser springt.
  
  Se hai visto una *balena* durante la gita, racconta com’era!
  *Wenn* du einen Wal während des Ausflugs gesehen hast, beschreib, wie er aussah!
  
  Ho letto che gli scienziati studieranno il comportamento della *balena* per anni.
  Ich habe gelesen, dass die Wissenschaftler das Verhalten des *Wals* jahrelang erforschen werden.
  
  Avrei voluto vedere una *balena* durante il viaggio in Islanda, ma purtroppo non ci siamo riusciti.
  Ich hätte gern einen *Wal* während der Reise nach Islanda gesehen, aber leider ist es uns nicht gelungen.
