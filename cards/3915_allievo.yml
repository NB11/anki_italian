Rang: 3915
Wort: allievo
Wortart: n.m
Wort mit Artikel: l'allievo
Femininum / Plural: allievi
IPA: ''
Definition: der Schüler, -
Register: ''
Beispielsätze: |-
  L'*allievo* ha studiato molto per l'esame di matematica.
  Der *Schüler* hat für die Matheprüfung sehr viel gelernt.
  
  La professoressa elogia ogni *allievo* che partecipa attivamente alle lezioni.
  Die Lehrerin lobt jeden *Schüler*, der aktiv am Unterricht teilnimmt.
  
  Se fosti un *allievo* modello, riceveresti una menzione speciale.
  Wenn du ein *Schüler* mit Vorbildfunktion wärst, würdest du eine besondere Erwähnung erhalten.
  
  Gli *allievi* che hanno superato il test potranno partecipare alla gita in montagna.
  Die *Schüler*, die den Test bestanden haben, dürfen am Ausflug in die Berge teilnehmen.
  
  L'*allievo* che ho incontrato ieri al parco si chiama Paolo e suona il pianoforte.
  Der *Schüler*, den ich gestern im Park getroffen habe, heißt Paolo und spielt Klavier.
