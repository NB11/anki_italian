Rang: 942
Wort: laboratorio
Wortart: n.m
Wort mit Artikel: il laboratorio
Femininum / Plural: laboratori
IPA: ''
Definition: das Labor, -e
Register: ''
Beispielsätze: |-
  In questo *laboratorio* si studiano le reazioni chimiche più innovative.
  In diesem *Labor* werden die innovativsten chemischen Reaktionen erforscht.
  
  Hai mai visitato un *laboratorio* di fisica nucleare? È impressionante!
  Hast du jemals ein *Labor* für Kernphysik besucht? Es ist beeindruckend!
  
  La polizia scientifica è entrata nel *laboratorio* dove era stato registrato il danno.
  Die Kriminalpolizei betrat das *Labor*, in dem der Schaden aufgenommen worden war.
  
  Se vuoi fare esperienza in questo campo, devi lavorare in un *laboratorio* attrezzato.
  Wenn du Erfahrung in diesem Bereich sammeln möchtest, musst du in einem gut ausgestatteten *Labor* arbeiten.
  
  I ricercatori rimangono chiusi nel *laboratorio* per giorni per concentrarsi sullo studio.
  Die Forscher bleiben tagelang in dem *Labor* eingeschlossen, um sich auf die Untersuchung zu konzentrieren.
