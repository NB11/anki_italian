Beispielsätze: |-
  Ho trovato un anello d'*oro* in spiaggia ieri.
  Ich habe gestern einen *Gold*-Ring am Strand gefunden.
  
  Questo bracciale è fatto tutto d'*oro* vero?
  Dieser Armreif ist ganz aus echtem *Gold* gemacht?
  
  L'*oro* è un metallo molto prezioso.
  Das *Gold* ist ein sehr wertvolles Metall.
  
  Vor molti secoli, gli alchimisti cercavano di trasformare i metalli in *oro*.
  Vor vielen Jahrhunderten versuchten Alchemisten, Metalle in *Gold* zu verwandeln.
  
  Non tutti possono permettersi gioielli d'*oro*.
  Nicht jeder kann sich *Gold*-Schmuck leisten.
