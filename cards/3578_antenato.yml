Rang: 3578
Wort: antenato
Wortart: n.m
Wort mit Artikel: l'antenato
Femininum / Plural: antenati
IPA: ''
Definition: der Vorfahre, die Vorfahren
Register: ''
Beispielsätze: |-
  Gli *antenati* degli italiani erano spesso contadini che lavoravano la terra.
  Die *Vorfahren* der Italiener waren oft Bauern, die das Land bestellten.
  
  Ho scoperto che uno dei miei *antenati* era un nobile del Settecento.
  Ich habe entdeckt, dass einer meiner *Vorfahren* ein Adliger des 18. Jahrhunderts war.
  
  Se non avessimo preservato i ricordi dei nostri *antenati*, oggi sapremmo molto meno sulla nostra storia.
  Wenn wir die Erinnerungen unserer *Vorfahren* nicht bewahrt hätten, wüssten wir heute viel weniger über unsere Geschichte.
  
  Gli scienziati studiano il DNA degli *antenati* per capire meglio l'evoluzione umana.
  Die Wissenschaftler untersuchen die DNA der *Vorfahren*, um die menschliche Evolution besser zu verstehen.
  
  I reperti archeologici ci aiutano a ricostruire la vita dei nostri *antenati* migliaia di anni fa.
  Archäologische Funde helfen uns, das Leben unserer *Vorfahren* vor Tausenden von Jahren zu rekonstruieren.
