Beispielsätze: |-
  Ho ricevuto un *dono* molto speciale dalla mia famiglia.
  Ich habe ein sehr besonderes *Geschenk* von meiner Familie bekommen.
  
  Qual è il tuo *dono* preferito tra quelli che hai ricevuto?
  Was ist dein Lieblings*geschenk* unter den erhaltenen?
  
  Spero che questo *dono* ti piaccia e che lo usi spesso.
  Ich hoffe, dass dir dieses *Geschenk* gefällt und du es oft benutzt.
  
  Quando aprirai il *dono* che ti ho mandato?
  Wann wirst du das *Geschenk*, das ich dir geschickt habe, öffnen?
  
  Nonostante sia piccolo, questo *dono* ha un grande valore sentimentale.
  Obwohl es klein ist, hat dieses *Geschenk* einen großen sentimentalischen Wert.
