Rang: 2079
Wort: succhiare
Wortart: v
Wort mit Artikel: succhiare
Femininum / Plural: ''
IPA: ''
Definition: aussaugen, saugen, lutschen
Register: ''
Beispielsätze: |-
  Il neonato *succhia* avidamente il latte dal biberon.
  Das Neugeborene *saugt* gierig die Milch aus der Flasche.
  
  Se non lavi i denti, *succhierai* lo zucchero che rimane incastrato tra i molari.
  Wenn du dir nicht die Zähne putzt, wirst du den *Zucker*, der zwischen den Backenzähnen hängen bleibt, aussaugen.
  
  Mi dispiace, ma ho *succhiato* tutto il succo della cola che mi avevi offerto!
  Tut mir leid, aber ich habe die ganze *Cola*, die du mir angeboten hattest, aufgesogen.
  
  Il bambino *succhiava* il pollice ogni volta che provava vergogna.
  Das Kind *lutschte* an seinem Daumen, jedes Mal wenn es sich schämte.
  
  Il mago *succhiò* l'olio dal tappeto per mostrare il suo potere infinito.
  Der *Zauberer* sog das Öl aus dem Teppich heraus, um seine grenzenlose Macht zu demonstrieren.
