Rang: 4402
Wort: ribellare
Wortart: vr
Wort mit Artikel: ribellare
Femininum / Plural: ''
IPA: ''
Definition: sich *rebellieren*, auflehnen
Register: ''
Beispielsätze: |-
  Gli studenti si sono *ribellati* contro le regole troppo severe della scuola.
  Die Studenten haben sich gegen die zu strengen Regeln *aufgelehnt*.
  
  Se tu *ti ribellassi* più spesso, forse ascolterebbero di più le tue idee.
  Wenn du dich öfter *rebellierst*, würden sie vielleicht mehr auf deine Ideen hören.
  
  L’inquilino si è *ribellato* quando il padrone di casa ha minacciato di sfrattarlo senza preavviso.
  Der Mieter hat sich *aufgelehnt*, als der Vermieter damit gedroht hat, ihn ohne Vorwarnung zu kündigen.
  
  Anche se la situazione era disperata, nessuno osava *ribellarsi*.
  Auch wenn die Situation verzweifelt war, *rebellierte* sich niemand.
  
  Ci *ribelliamo* contro ogni forma di ingiustizia sociale nel nostro quartiere.
  Wir *rebellieren* uns gegen jede Form von sozialer Ungerechtigkeit in unserem Viertel.
Audio: ''
Notiz: ''
Dispersion: ''
