Rang: 4033
Wort: strato
Wortart: n.m
Wort mit Artikel: lo strato
Femininum / Plural: strati
IPA: ''
Definition: die Schicht, -en
Register: ''
Beispielsätze: |-
  Lo *strato* di ozono protegge la Terra dai raggi ultravioletti.
  Die *Schicht* aus Ozon schützt die Erde vor ultravioletten Strahlen.
  
  Hanno trovato uno *strato* di pittura antica sotto il muro.
  Sie haben eine *Schicht* alter Farbe unter der Wand gefunden.
  
  Nonostante lo *strato* di ghiaccio, il lago era ancora navigabile.
  Trotz der *Schicht* aus Eis war der See noch schiffbar.
  
  L'architetto ha aggiunto un altro *strato* di isolamento per risparmiare energia.
  Der Architekt hat eine weitere *Schicht* Isolierung hinzugefügt, um Energie zu sparen.
  
  Bisognava rimuovere lo *strato* superficiale di sporco prima di dipingere.
  Man musste zuerst die oberflächliche *Schicht* aus Schmutz entfernen, bevor man malen konnte.
