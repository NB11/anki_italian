Rang: 1108
Wort: montagna
Wortart: n.f
Wort mit Artikel: la montagna
Femininum / Plural: montagne
IPA: ''
Definition: der Berg, -e
Register: ''
Beispielsätze: |-
  La *montagna* più alta d'Italia è il Monte Bianco.
  Der *höchste Berg* Italiens ist der Mont Blanc.
  
  Durante le vacanze abbiamo deciso di scalare una *montagna* vicino al lago.
  Im Urlaub beschlossen wir, einen *Berg* in der Nähe des Sees zu besteigen.
  
  Se non avessi interrotto il direttore, avremmo discusso la nuova guida per la prossima escursione in *montagna*.
  Wenn du den *Direktor* nicht unterbrochen hättest, hätten wir die neue Führung für die nächste Bergtour besprochen.
  
  Nonostante il freddo, abbiamo trascorso l'intera giornata sulla *montagna* a scattare foto con la telecamera.
  Trotz der *Kälte* verbrachten wir den ganzen Tag auf dem Berg, um Fotos mit der Videokamera zu machen.
  
  Dicono che chi arriva in cima alla *montagna* più alta della regione riceve un premio speciale.
  Man sagt, dass man ein besonderes Preis erhält, wenn man auf den *höchsten Berg* der Region klettert.
