  Obwohl er ein *pünktlicher* Patient ist, wird er vom Arzt nie rechtzeitig empfangen.
  
  Se fossi stato *puntuale* come gli altri, non avresti perso l’inizio del film!
  Wärst du *pünktlich* gewesen wie die anderen, hättest du nicht den Anfang des Films verpasst!
  
  La *puntuale* consegna dei documenti è essenziale per evitare sanzioni.
  Die *pünktliche* Lieferung der Dokumente ist entscheidend, um Strafen zu vermeiden.
