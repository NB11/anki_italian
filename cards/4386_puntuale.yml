Definition: pünktlich, zuverlässig, genau
Register: ''
Beispielsätze: |-
  Il treno arriva sempre *puntuale* nonostante il traffico intenso.
  Der Zug kommt immer *pünktlich* trotz des starken Verkehrs.
  
  Vorrei che fossi *puntuale* per una volta invece di arrivare tardi!
  Ich möchte, dass du mal *pünktlich* bist, statt zu spät zu kommen!
  
