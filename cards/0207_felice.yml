Rang: 207
Wort: felice
Wortart: adj
Wort mit Artikel: felice
Femininum / Plural: felici
IPA: ''
Definition: glücklich, zufrieden, froh
Register: ''
Beispielsätze: |-
  Sono *felice* perché domani parto per le vacanze!
  Ich bin *glücklich*, weil ich morgen in den Urlaub fahre!
  
  Lui sembra *felice* nonostante tutto.
  Er wirkt *zufrieden*, trotz allem.
  
  Non eravate *felici* di quella decisione?
  Wart ihr mit dieser Entscheidung nicht *froh*?
  
  Spero che tutti siano *felici* alla festa.
  Ich hoffe, dass alle auf der Party *glücklich* sind.
  
  Dopo la vittoria si sentiva davvero *felice*.
  Nach dem Sieg fühlte er sich wirklich *glücklich*.
