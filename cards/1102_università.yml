  Ich habe den Direktor der *Universität* im Hauptkorridor getroffen.
  
  L’*università* che ho scelto offre molti corsi di laurea in lingue straniere.
  Die *Universität*, die ich gewählt habe, bietet viele Studiengänge in Fremdsprachen an.
  
  Era una studentessa brillante, ma ha dovuto interrompere gli studi all’*università* per problemi familiari.
  Sie war eine brillante Studentin, aber sie musste das Studium an der *Universität* aus familiären Gründen unterbrechen.
