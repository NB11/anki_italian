Beispielsätze: |-
  Mio fratello studia all'*università* di Bologna da tre anni.
  Mein Bruder studiert an der *Universität* von Bologna seit drei Jahren.
  
  Se non superi l’esame, dovrai lasciare l’*università* subito.
  Wenn du die Prüfung nicht bestehst, musst du die *Universität* sofort verlassen.
  
