Rang: 987
Wort: catturare
Wortart: vt
Wort mit Artikel: catturare
Femininum / Plural: ''
IPA: ''
Definition: fangen, fangen, einfangen
Register: ''
Beispielsätze: |-
  Il *catturato* dello sceriffo era un bandito pericoloso che aveva rubato molti cavalli.
  Der vom Sheriff *gefangene* Verbrecher war ein gefährlicher Bandit, der viele Pferde gestohlen hatte.
  
  Se non avessi *catturato* quel topo, avrebbe mangiato tutto il formaggio del laboratorio.
  Wenn ich die Maus nicht *gefangen* hätte, hätte sie den gesamten Käse im Labor aufgegessen.
  
  Credo che il poliziotto riuscirà a *catturare* l’attore famoso che ha rubato il dipinto nel museo.
  Ich glaube, der Polizist wird den berühmten Schauspieler *fangen*, der das Gemälde im Museum gestohlen hat.
  
  Non appena abbassarono il coperchio della stia, il gatto riuscì a *catturare* un topo vicino al bordo della scatola.
  Sobald sie den Deckel des Käfigs *herunterließen*, gelang es der Katze, eine Maus nahe dem Rand der Box zu fangen.
  
  Chiunque riesca a *catturare* il pesce più grande del lago riceverà un’offerta speciale al ristorante qui vicino.
  Wer es schafft, den größten Fisch des Sees zu *fangen*, erhält ein besonderes Angebot im hiesigen Restaurant.
