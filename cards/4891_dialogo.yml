Rang: 4891
Wort: dialogo
Wortart: n.m
Wort mit Artikel: il dialogo
Femininum / Plural: dialoghi
IPA: ''
Definition: der Dialog, -e
Register: ''
Beispielsätze: |-
  Dopo *dialogo* con il medico, ho capito meglio la situazione.
  Nach dem *Dialog* mit dem Arzt habe ich die Situation besser verstanden.
  
  Ci vorrebbe un *dialogo* più aperto tra le due parti.
  Es braucht einen offeneren *Dialog* zwischen den beiden Seiten.
  
  Avevo sperato in un *dialogo* costruttivo, ma è finita in lite.
  Ich hatte auf einen konstruktiven *Dialog* gehofft, aber es endete im Streit.
  
  Se ci fosse stato un *dialogo* prima, forse non sarebbe successo.
  Wenn es vorher einen *Dialog* gegeben hätte, wäre es vielleicht nicht passiert.
  
  Il *dialogo* tra loro due è sempre molto interessante da ascoltare.
  Der *Dialog* zwischen den beiden ist immer sehr interessant zu hören.
