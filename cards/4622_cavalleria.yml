Rang: 4622
Wort: cavalleria
Wortart: n.f
Wort mit Artikel: la cavalleria
Femininum / Plural: cavallerìe
IPA: ''
Definition: der Ritterstand, -stände
Register: ''
Beispielsätze: |-
  La *cavalleria* medievale era famosa per il suo coraggio e la sua lealtà.
  Der *Ritterstand* des Mittelalters war berühmt für seinen Mut und seine Loyalität.
  
  Nel Medioevo, la *cavalleria* aveva un ruolo fondamentale nella società.
  Im Mittelalter hatte der *Ritterstand* eine zentrale Rolle in der Gesellschaft.
  
  Molti giovani aspiravano a entrare nell'ordine della *cavalleria*.
  Viele junge Männer strebten danach, in den *Ritterstand* aufgenommen zu werden.
  
  La *cavalleria* di ieri è stata sostituita oggi da altri valori.
  Der *Ritterstand* von gestern wurde heute durch andere Werte ersetzt.
  
  Nonostante le leggende, la *cavalleria* non era sempre così onorevole come si crede.
  Trotz der Legenden war der *Ritterstand* nicht immer so ehrenhaft, wie man glaubt.
