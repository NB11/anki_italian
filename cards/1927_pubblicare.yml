Rang: 1927
Wort: pubblicare
Wortart: vt
Wort mit Artikel: pubblicare
Femininum / Plural: ''
IPA: ''
Definition: veröffentlichen
Register: ''
Beispielsätze: |-
  L'editore ha deciso di *pubblicare* il romanzo entro la fine dell'anno.
  Der Verleger hat beschlossen, den Roman bis zum Jahresende zu *veröffentlichen*.
  
  Molti scrittori preferiscono *pubblicare* le proprie opere in formato digitale.
  Viele Autoren bevorzugen es, ihre Werke digital zu *veröffentlichen*.
  
  Se avessi tempo, vorrei *pubblicare* un articolo scientifico sulla mancanza di ricerche in questo campo.
  Wenn ich Zeit hätte, würde ich gerne einen wissenschaftlichen Artikel über den *Mangel* an Forschung auf diesem Gebiet veröffentlichen.
  
  È necessario verificare tutte le informazioni prima di *pubblicare* un articolo online.
  Es ist nötig, alle Informationen zu überprüfen, bevor man einen Artikel online *veröffentlicht*.
  
  Mi hanno raccomandato di evitare di *pubblicare* foto personali sui social network.
  Sie haben mir empfohlen, persönliche Fotos in sozialen Netzwerken zu *veröffentlichen* zu vermeiden.
