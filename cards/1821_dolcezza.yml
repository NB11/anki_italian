Rang: 1821
Wort: dolcezza
Wortart: n.f
Wort mit Artikel: la dolcezza
Femininum / Plural: dolcezze
IPA: ''
Definition: die Süße, -n
Register: ''
Beispielsätze: |-
  La *dolcezza* di questa torta al cioccolato è semplicemente ineguagliabile.
  Die *Süße* dieses Schokoladenkuchens ist einfach unübertroffen.
  
  Se avessi saputo la *dolcezza* delle sue parole, non mi sarei arrabbiato così tanto.
  Wenn ich die *Süße* seiner Worte gekannt hätte, wäre ich nicht so wütend geworden.
  
  Dopo che il cane ebbe leccato il miele, la sua *dolcezza* gli aveva tolto ogni voglia di abbaiare.
  Nachdem der Hund Honig geleckt hatte, hatte ihm die *Süße* jeden Wunsch zu bellen genommen.
  
  Per quanto provi a resistere, la *dolcezza* di questo vino mi costringe a berne ancora un bicchiere.
  So sehr ich mich auch sträube, die *Süße* dieses Weins zwingt mich, noch ein Glas zu trinken.
  
  Nonostante le difficoltà, la *dolcezza* del loro incontro riuscì a sciogliere ogni risentimento.
  Trotz der Schwierigkeiten konnte die *Süße* ihres Treffens jeden Groll auflösen.
