Rang: 2282
Wort: miseria
Wortart: n.f
Wort mit Artikel: la miseria
Femininum / Plural: miserie
IPA: ''
Definition: das Elend, die Not, die Armut
Register: ''
Beispielsätze: |-
  La *miseria* nel quartiere è aumentata negli ultimi anni.
  Die *Armut* im Stadtteil ist in den letzten Jahren gestiegen.
  
  Nonostante la *miseria*, mantenne sempre la dignità.
  Trotz der *Not* bewahrte sie stets ihre Würde.
  
  Se non fosse per la *miseria* di cui soffre, potrebbe essere felice.
  Wenn er nicht unter der *Armut*, die ihn quält, leiden würde, könnte er glücklich sein.
  
  La *miseria* economica spinge molte persone a emigrare.
  Die *wirtschaftliche Not* treibt viele Menschen zur Auswanderung.
  
  Dicono che la *miseria* sia il peggiore dei mali, ma la fame lo è ancora di più.
  Sie sagen, die *Not* sei das schlimmste Übel, aber der Hunger ist es noch mehr.
