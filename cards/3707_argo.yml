Rang: 3707
Wort: argo
Wortart: n.m
Wort mit Artikel: l'argo
Femininum / Plural: gli argi
IPA: ''
Definition: der Argwohn, -
Register: ''
Beispielsätze: |-
  Il detective nutriva un *argo* sospetto verso l’uomo che aveva un alibi perfetto.
  Der Detektiv hegte einen *Argwohn* gegenüber dem Mann, der ein perfektes Alibi hatte.
  
  Solo dopo molti anni di *argo* e dubbi, la verità venne finalmente alla luce.
  Erst nach vielen Jahren des *Argwohns* und Zweifels kam die Wahrheit endlich ans Licht.
  
  Non vorrei essere giudicato per il mio *argo* verso le sue decisioni, ma preferisco essere prudente.
  Ich möchte nicht für meinen *Argwohn* gegenüber seinen Entscheidungen verurteilt werden, aber ich bin lieber vorsichtig.
  
  L’*argo* dei genitori verso quel quartiere era comprensibile dopo gli episodi di delitto avvenuti lì.
  Der *Argwohn* der Eltern gegenüber diesem Viertel war nach den dortigen Verbrechen verständlich.
  
  Con *argo* e diffidenza, aveva sempre tenuto d’occhio il comportamento di quel imbroglione prima di fidarsi.
  Mit *Argwohn* und Misstrauen hatte er stets das Verhalten dieses Betrügers beobachtet, bevor er ihm vertraute.
