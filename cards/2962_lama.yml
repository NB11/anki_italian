Rang: 2962
Wort: lama
Wortart: n.m
Wort mit Artikel: il lama
Femininum / Plural: lamas
IPA: ''
Definition: das Lama, -s
Register: ''
Beispielsätze: |-
  In Perù molti allevatori possiedono *lamas* da secoli per il trasporto e la lana.
  In Peru besitzen viele Züchter seit Jahrhunderten *Lamas* für Transport und Wolle.
  
  Il veterinario ha visitato *il lama* che zoppicava da giorni e gli ha prescritto un antinfiammatorio.
  Der Tierarzt hat das *Lama* untersucht, das seit Tagen hinkte, und ihm ein entzündungshemmendes Mittel verschrieben.
  
  Se avessi un *lama* nel giardino, lo chiamerei "Pablo" e gli darei mele ogni mattina.
  Wenn ich ein *Lama* im Garten hätte, würde ich es "Pablo" nennen und ihm jeden Morgen Äpfel geben.
  
  Dopo la passeggiata, il rumore delle sue unghie sulle pietre ha fatto *lamas* comparire tra gli alberi.
  Nach dem Spaziergang hat das Geräusch seiner Hufe auf den Steinen dazu geführt, dass *Lamas* zwischen den Bäumen auftauchten.
  
  Sebbene *il lama* sia un animale docile, non mi fiderei mai di avvicinarmi ai cuccioli senza precauzioni.
  Auch wenn das *Lama* ein sanftmütiges Tier ist, würde ich mich den Jungtieren niemals ohne Vorsichtsmaßnahmen nähern.
