Rang: 3734
Wort: cercatore
Wortart: n.m
Wort mit Artikel: il cercatore
Femininum / Plural: i cercatori
IPA: ''
Definition: der Suchende, der Finder, der Sucher
Register: ''
Beispielsätze: |-
  Il *cercatore* di tesori ha trovato una mappa antica nel bosco.
  Der *Schatzsucher* hat eine alte Karte im Wald gefunden.
  
  Sono stato assunto come *cercatore* di talenti per l'azienda.
  Ich wurde als *Talentfinder* für das Unternehmen eingestellt.
  
  Il *cercatore* di funghi si alza presto ogni mattina per andarlo a raccogliere.
  Der *Pilzsucher* steht jeden Morgen früh auf, um sie zu sammeln.
  
  Questo *cercatore* di prove ha risolto il caso in poche ore.
  Dieser *Beweiserheber* hat den Fall in wenigen Stunden gelöst.
  
  Se fossi un *cercatore* di avventure, partirei subito per il deserto.
  Wenn ich ein *Abenteuersucher* wäre, würde ich sofort in die Wüste aufbrechen.
