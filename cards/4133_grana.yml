Rang: 4133
Wort: grana
Wortart: n.m
Wort mit Artikel: il grana
Femininum / Plural: grani
IPA: ''
Definition: der Hartkäse, -e
Register: ''
Beispielsätze: |-
  Come condimento per la pasta, *grana* è insostituibile in molte ricette italiane.
  Als Zutat für Pasta ist *Hartkäse* in vielen italienischen Rezepten unverzichtbar.
  
  Ho comprato due *grana* al mercato perché servivano per il risotto.
  Ich habe zwei *Hartkäse* auf dem Markt gekauft, weil sie für das Risotto benötigt wurden.
  
  Sai che tipo di *grana* preferisci per le tue tagliatelle al tartufo?
  Weißt du, welche *Art von Hartkäse* du für deine Tagliatelle mit Trüffel bevorzugst?
  
  Nonostante il prezzo alto, *grana* di qualità superiore dà un sapore unico ai piatti.
  Trotz des hohen Preises verleiht *qualitativ hochwertiger Hartkäse* den Gerichten einen einzigartigen Geschmack.
  
  Mi hanno regalato un pezzo di *grana* stagionato di oltre tre anni, una vera prelibatezza.
  Mir wurde ein Stück *drei Jahre gereifter Hartkäse* geschenkt – eine wahre Delikatesse.
