Rang: 1485
Wort: identità
Wortart: n.f
Wort mit Artikel: l'identità
Femininum / Plural: identità
IPA: ''
Definition: die Identität, -en
Register: ''
Beispielsätze: |-
  Dopo *l’identità* falsificata, il detective ha iniziato a indagare sulla vera origine del documento.
  Nach der gefälschten *Identität* begann der Detective die wahre Herkunft des Dokuments zu untersuchen.
  
  Credo che la *identità* digitale sia ora più importante di quella fisica, soprattutto per i giocatori online.
  Ich glaube, die digitale *Identität* ist mittlerweile wichtiger als die physische, besonders für Online-Spieler.
  
  Per stabilire la tua *identità* al parco, hai bisogno di un documento con foto, vero?
  Um deine *Identität* im Park festzustellen, brauchst du ein Fotoausweisdokument, oder?
  
  La polizia ha interrogato il sospetto sotto stretta protezione per proteggere la sua *identità* durante il processo.
  Die Polizei verhörte den Verdächtigen unter strengem Schutz, um seine *Identität* während des Verfahrens zu schützen.
  
  Se cambia *identità*, può sfuggire alla vendetta di chi ha subito ribrezzo per la sua violenza gratuita?
  Wenn er seine *Identität* ändert, kann er dann der Rache derjenigen entkommen, die seinen Gewalttaten ausgesetzt waren?
