Wort: criminale
Wortart: adj
Wort mit Artikel: criminale
Femininum / Plural: ''
IPA: ''
Definition: kriminell, verbrecherisch
Register: ''
Beispielsätze: |-
  L'inchiesta ha rivelato un traffico *criminale* tra diversi paesi europei.
  Die Ermittlung hat einen *kriminellen* Handel zwischen mehreren europäischen Ländern enthüllt.
  
  Se avessi saputo che era un uomo *criminale*, non gli avrei mai affidato i miei risparmi.
  Hätte ich gewusst, dass er ein *krimineller* Mann war, hätte ich ihm niemals meine Ersparnisse anvertraut.
  
  Il giudice ha stabilito che l'atto da lui compiuto era *criminale* secondo la legge.
  Der Richter hat festgestellt, dass die Tat, die er begangen hatte, *kriminell* nach dem Gesetz war.
  
  Nonostante le prove, molti si chiedono se l'accusa sia davvero *criminale* o solo un malinteso.
  Trotz der Beweise fragen sich viele, ob der Vorwurf wirklich *kriminell* ist oder nur ein Missverständnis.
  
  Il film racconta la storia di un gruppo di adolescenti che si divertono a commettere atti *criminali* per noia.
  Der Film erzählt die Geschichte einer Gruppe von Jugendlichen, die sich aus Langeweile mit *kriminellen* Handlungen vergnügen.
