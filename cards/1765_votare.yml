Rang: 1765
Wort: votare
Wortart: vt
Wort mit Artikel: votare
Femininum / Plural: ''
IPA: ''
Definition: wählen, abstimmen
Register: ''
Beispielsätze: |-
  Domani *votaremo* per il nuovo presidente del consiglio.
  Morgen werden wir den neuen Ministerpräsidenten *wählen*.
  
  Se non ti piace il risultato, puoi *votare* per un altro candidato alle prossime elezioni.
  Falls dir das Ergebnis nicht gefällt, kannst du bei der nächsten Wahl einen anderen Kandidaten *wählen*.
  
  Nonostante la sua età, non ha mai smesso di *votare* alle elezioni locali.
  Trotz ihres Alters hat sie nie aufgehört, bei den Kommunalwahlen zu *wählen*.
  
  Ci hanno detto che chi non *vota* perde il diritto di lamentarsi in seguito.
  Man hat uns gesagt, wer nicht *wählt*, verliert das Recht, sich später zu beschweren.
  
  Prima di *votare*, ho letto attentamente il programma di ogni partito.
  Vor dem *Wählen* habe ich das Programm jeder Partei sorgfältig gelesen.
