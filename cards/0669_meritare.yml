Rang: 669
Wort: meritare
Wortart: v
Wort mit Artikel: meritare
Femininum / Plural: ''
IPA: ''
Definition: verdienen, wert sein, Anrecht haben
Register: ''
Beispielsätze: |-
  Secondo te, chi *merita* questo premio così prestigioso?
  Wer *verdient* deiner Meinung nach diesen so prestigeträsen Preis?
  
  Se fossi in te, *meriterebbero* almeno una seconda possibilità dopo tutto lo sbagliato che hanno fatto.
  Wenn ich du wäre, *würden sie* es wenigstens verdienen, nach allem Falschen, das sie gemacht haben, noch eine zweite Chance zu bekommen.
  
  Nonostante l'ovviamente cattiva reputazione della zona, molti abitanti della città *hanno meritato* di essere ricordati come eroi locali.
  Trotz des *offensichtlich* schlechten Rufs der Zone haben viele Stadtbewohner es verdient, als lokale Helden in Erinnerung zu bleiben.
  
  Mi hanno detto che, se avessi lavorato sodo come loro, *meriteresti* anche tu una promozione entro la fine dell'anno.
  Man hat mir gesagt, dass du es *verdienen* würdest, eine Beförderung bis Ende des Jahres zu bekommen, wenn du genauso hart arbeiten würdest wie sie.
  
  La legge dice che chi *merita* una ricompensa per aver salvato una vita deve riceverla, indipendentemente dalla posizione sociale.
  Das *Gesetz* besagt, dass jeder, der es verdient, eine Belohnung für die Rettung eines Lebens erhält, unabhängig von der sozialen Position.
