Rang: 669
Wort: meritare
Wortart: v
Wort mit Artikel: meritare
Femininum / Plural: ''
IPA: ''
Definition: verdienen, erhalten
Register: ''
Beispielsätze: |-
  Lui *merita* un premio per il suo duro lavoro.
  Er *verdient* eine Auszeichnung für seine harte Arbeit.
  
  Secondo me, questa volta non *meriti* di perdere.
  Meiner Meinung nach *verdient* du es diesmal nicht, zu verlieren.
  
  Siamo convinti che lui *meriterebbe* più attenzione da parte nostra.
  Wir sind überzeugt, dass er mehr Aufmerksamkeit von uns *verdienen würde*.
  
  Hai davvero *meritato* questo successo con tutto l’impegno che ci hai messo!
  Du hast diesen Erfolg wirklich *verdient* mit all dem Einsatz, den du hineingesteckt hast!
  
  Se studiassi di più, *meriteresti* un voto migliore in italiano.
  Wenn du mehr lernen würdest, *würdest* du eine bessere Note in Italienisch *verdienen*.
