Wort: stare
Wortart: vi
Wort mit Artikel: stare
Femininum / Plural: ''
IPA: ''
Definition: sich befinden, bleiben
Register: ''
Beispielsätze: |-
  Come *stai* oggi?
  Wie *befindest* du dich heute?
  
  Lui *sta* zitto per tutto il film.
  Er *bleibt* die ganze Zeit still während des Films.
  
  Domani *starò* a casa tutto il giorno.
  Morgen *werde ich* den ganzen Tag zu Hause *bleiben*.
  
  Vuoi che *stia* zitto mentre parli?
  Soll ich *still bleiben*, während du sprichst?
  
  Se *starai* attento, capirai tutto subito.
  Wenn du *aufmerksam *bleibst*, wirst du alles sofort verstehen.
