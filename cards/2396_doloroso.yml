Rang: 2396
Wort: doloroso
Wortart: adj
Wort mit Artikel: doloroso
Femininum / Plural: ''
IPA: ''
Definition: schmerzhaft, qualvoll
Register: ''
Beispielsätze: |-
  La notizia della sua morte è stata *dolorosa* per tutti i familiari.
  Die Nachricht von seinem Tod war *schmerzhaft* für alle Familienmitglieder.
  
  Ricordo ancora il parto come un'esperienza *dolorosa* ma indimenticabile.
  Ich erinnere mich noch an die Geburt als eine *qualvolle*, aber unvergessliche Erfahrung.
  
  Se avessi saputo che sarebbe stato così *doloroso*, non avrei accettato.
  Hätte ich gewusst, dass es so *schmerzhaft* sein würde, hätte ich nicht zugestimmt.
  
  Il medico mi ha assicurato che, nonostante *dolorosa*, l'operazione avrà successo.
  Der Arzt versicherte mir, dass die Operation trotz *schmerzhaften* Folgen erfolgreich sein wird.
  
  Era *doloroso* per lui riconoscere i propri errori dopo tanti anni.
  Es war *qualvoll* für ihn, seine eigenen Fehler nach so vielen Jahren einzusehen.
