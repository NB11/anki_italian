Rang: 2133
Wort: resistenza
Wortart: n.f
Wort mit Artikel: la resistenza
Femininum / Plural: resistenze
IPA: ''
Definition: der Widerstand, -stände
Register: ''
Beispielsätze: |-
  La *resistenza* alla corrente è maggiore nei materiali isolanti.
  Der *Widerstand* gegen den Strom ist in isolierenden Materialien größer.
  
  Dopo l'aggressione, la vittima ha mostrato una forte *resistenza* psicologica.
  Nach dem *Angriff* zeigte das Opfer einen starken Widerstand auf psychischer Ebene.
  
  Gli scienziati studiano la *resistenza* dei nuovi materiali alle alte temperature.
  Die Wissenschaftler untersuchen die *Widerstandsfähigkeit* der neuen Materialien bei hohen Temperaturen.
  
  La polizia ha dovuto aumentare la *resistenza* perché l'edificio era in fiamme.
  Die Polizei musste den *Widerstand* verstärken, weil das Gebäude in Flammen stand.
  
  Nonostante la *resistenza* dei cittadini, il progetto è stato approvato lo stesso.
  Trotz des *Widerstands* der Bürger wurde das Projekt trotzdem genehmigt.
