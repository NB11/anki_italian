Rang: 679
Wort: fronte
Wortart: n.f
Wort mit Artikel: la fronte
Femininum / Plural: fronti
IPA: ''
Definition: die Stirn, -en
Register: ''
Beispielsätze: |-
  La *fronte* di Maria è alta e liscia.
  Die *Stirn* von Maria ist hoch und glatt.
  
  Hai una ruga sulla *fronte*?
  Hast du eine *Falte* auf der *Stirn*?
  
  Dobbiamo studiare la *fronte* di questa montagna.
  Wir müssen die *Schulter* dieses Berges studieren.
  
  Le sue parole mi hanno colpito in *fronte*.
  Seine Worte haben mich an der *Stirn* getroffen.
  
  L’esercito avanzava verso la *fronte* del nemico.
  Das Heer rückte zur *Front* des Feindes vor.
