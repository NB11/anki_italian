Rang: 1385
Wort: lieto
Wortart: adj
Wort mit Artikel: lieto
Femininum / Plural: ''
IPA: ''
Definition: froh, glücklich, zufrieden
Register: ''
Beispielsätze: |-
  Anche se *lieto* di incontrarti, devo dirtelo: hai sprecato il mio tempo di nuovo!
  Auch wenn ich *froh* bin, dich zu treffen, muss ich es dir sagen: Du hast meine Zeit wieder verschwendet!
  
  L’ispettore sembra *lieto* dei risultati della sezione federale, ma io non ne sono convinto.
  Der Inspektor scheint *zufrieden* mit den Ergebnissen des Abschnitts, aber ich bin es nicht.
  
  Mi hanno regalato una battuta, ma al mattino non ho voglia di ridere, sono ancora un po’ *lieto* della domenica scorsa.
  Man hat mir einen *Witz* erzählt, aber am Morgen habe ich keine Lust zu lachen – ich bin immer noch ein bisschen froh über den letzten Sonntag.
  
  È *lieto* che tu abbia confessato la tua parte nella lotta, ma ora dobbiamo prevedere le conseguenze, o no?
  Ich bin *erleichtert*, dass du deine Rolle im Kampf zugegeben hast, doch jetzt müssen wir die Folgen voraussehen, nicht wahr?
  
  L’albergo offre una colazione *lieta*, che sia primavera o autunno, chiara fonte di soddisfazione per ogni civile cliente.
  Das Hotel bietet ein *fröhliches* Frühstück, sei es Frühling oder Herbst – eine klare Quelle der Zufriedenheit für jeden gesitteten Gast.
