Rang: 121
Wort: favore
Wortart: n.m
Wort mit Artikel: il favore
Femininum / Plural: i favori
IPA: ''
Definition: die Gunst, der Gefallen
Register: ''
Beispielsätze: |-
  Mi hai fatto un grande *favore* ieri.
  Du hast mir gestern einen großen *Gefallen* getan.
  
  Chiedi un *favore* a tua sorella?
  Fragst du deine Schwester um einen *Gefallen*?
  
  Non dimenticherò mai il tuo *favore*.
  Ich werde deine *Gunst* nie vergessen.
  
  Se hai bisogno di un *favore*, chiamami!
  Wenn du einen *Gefallen* brauchst, ruf mich an!
  
  Lui ha accettato il *favore* senza esitare.
  Er hat den *Gefallen* ohne zu zögern angenommen.
