Rang: 38
Wort: signore
Wortart: n.m
Wort mit Artikel: il signore
Femininum / Plural: signori
IPA: ''
Definition: der Herr, -en
Register: ''
Beispielsätze: |-
  Il *signore* legge il giornale ogni mattina.
  Der *Herr* liest jeden Morgen die Zeitung.
  
  Buongiorno, *signore* Rossi, come sta oggi?
  Guten Morgen, *Herr* Rossi, wie geht es Ihnen heute?
  
  Molti *signori* preferiscono bere il caffè dopo cena.
  Viele *Herren* trinken gerne Kaffee nach dem Abendessen.
  
  Chi è quel *signore* con gli occhiali?
  Wer ist dieser *Herr* mit der Brille?
  
  I *signori* dottori hanno visitato il paziente stamattina.
  Die *Herren* Ärzte haben den Patienten heute Morgen untersucht.
