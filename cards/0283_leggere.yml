Rang: 283
Wort: leggere
Wortart: vt
Wort mit Artikel: leggere
Femininum / Plural: ''
IPA: ''
Definition: lesen
Register: ''
Beispielsätze: |-
  Domani *leggerò* un libro interessante.
  Morgen werde ich ein interessantes *Buch lesen*.
  
  Lui *ha letto* il giornale stamattina.
  Er hat heute Morgen die *Zeitung gelesen*.
  
  *Leggi* ad alta voce, per favore!
  *Lies* bitte laut vor!
  
  Se avessi tempo, *leggeresti* di più.
  Wenn du Zeit hättest, würdest du *mehr lesen*.
  
  Credo che tu *legga* troppo velocemente.
  Ich glaube, dass du zu schnell *liest*.
