Rang: 662
Wort: idiota
Wortart: adj
Wort mit Artikel: idiota
Femininum / Plural: ''
IPA: ''
Definition: idiotisch, dumm
Register: ''
Beispielsätze: |-
  È *idiota* pensare che la Terra sia piatta dopo tutte le prove scientifiche.
  Es ist *idiotisch*, zu denken, die Erde sei flach, nachdem alle wissenschaftlichen Beweise dagegen sprechen.
  
  Questa decisione *idiota* ci farà perdere tempo e risorse.
  Diese *idiotische* Entscheidung wird uns Zeit und Ressourcen kosten.
  
  Sei proprio *idiota* se credi che ti aiuterò dopo quello che hai fatto!
  Du bist wirklich *idiotisch*, wenn du glaubst, ich helfe dir nach dem, was du getan hast!
  
  Ho conosciuto un tizio *idiota* che ha cercato di vendermi un biglietto falso per il concerto.
  Ich habe einen *idiotischen* Typen kennengelernt, der mir eine gefälschte Eintrittskarte für das Konzert verkaufen wollte.
  
  Se avessi usato il cervello invece di questa logica *idiota*, avresti evitato il ritardo.
  Wenn du dein Gehirn benutzt hättest statt dieser *idiotischen* Logik, hättest du die Verspätung vermieden.
