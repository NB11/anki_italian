Rang: 3098
Wort: giochetto
Wortart: n.m
Wort mit Artikel: il giochetto
Femininum / Plural: i giochetti
IPA: ''
Definition: das Spielzeug, -e
Register: ''
Beispielsätze: |-
  Mio figlio ha trovato *giochetto* sotto il letto.
  Mein Sohn hat das *Spielzeug* unter dem Bett gefunden.
  
  Non buttare via *giochetto* rotto, potremmo aggiustarlo!
  Wirf das kaputte *Spielzeug* nicht weg, wir könnten es reparieren!
  
  Da bambino amava quel *giochetto* di legno che gli avevo regalato.
  Als Kind liebte er dieses hölzerne *Spielzeug*, das ich ihm geschenkt hatte.
  
  Ho chiesto se puoi prestarmi il tuo *giochetto* preferito per una settimana.
  Ich habe gefragt, ob du mir dein Lieblings-*Spielzeug* für eine Woche leihen kannst.
  
  Il negozio vende anche *giochetti* in legno, non solo quelli di plastica.
  Der Laden verkauft auch hölzerne *Spielzeuge*, nicht nur Plastik-Spielzeuge.
