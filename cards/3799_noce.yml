Rang: 3799
Wort: noce
Wortart: n.m
Wort mit Artikel: la noce
Femininum / Plural: noci
IPA: ''
Definition: die Nuss, Nüsse
Register: ''
Beispielsätze: |-
  Ho comprato un *nocciolo* per piantare un albero di noci nel giardino.
  Ich habe einen *Nussbaum* gekauft, um einen Nussbaum im Garten zu pflanzen.
  
  Mentre camminavo nel bosco, ho trovato una *noce* caduta da un albero secolare.
  Während ich im Wald spazierte, fand ich eine *Nuss*, die von einem uralten Baum gefallen war.
  
  Nonostante il *nocciolo* sia sano, preferisco evitare le noci perché mi provocano allergia.
  Obwohl der *Nussbaum* gesund ist, meide ich lieber Nüsse, weil sie bei mir Allergien auslösen.
  
  Se avessi saputo che il *nocciolo* produce così tante noci, avrei piantato dieci alberi invece di uno solo!
  Wenn ich gewusst hätte, dass der *Nussbaum* so viele Nüsse trägt, hätte ich zehn Bäume statt nur einen gepflanzt!
  
  È curioso come il sapore delle *noci* crude sia diverso da quello delle noci tostate, vero?
  Es ist schon merkwürdig, dass der Geschmack von rohen *Nüssen* sich von dem gerösteter Nüsse unterscheidet, oder?
