Rang: 3699
Wort: tempismo
Wortart: n.m
Wort mit Artikel: il tempismo
Femininum / Plural: tempismi
IPA: ''
Definition: das Timing, Timing
Register: ''
Beispielsätze: |-
  Non hai proprio *tempismo*: sarebbero dovuti arrivare dopo di noi.
  Du hast gar kein *Timing*: Sie hätten nach uns kommen sollen.
  
  Il suo *tempismo* è impeccabile: ha venduto proprio prima che il mercato crollasse.
  Sein *Timing* ist perfekt: Er hat genau verkauft, bevor der Markt abstürzte.
  
  Aveva un *tempismo* eccezionale nel cambiare discorso quando la situazione diventava imbarazzante.
  Er hatte ein außergewöhnliches *Timing*, um das Thema zu wechseln, wenn die Situation peinlich wurde.
  
  Credo che il *tempismo* di questa mossa sia fondamentale per il successo dell’operazione.
  Ich glaube, das *Timing* dieses Zuges ist entscheidend für den Erfolg der Operation.
  
  Se vuoi cogliere le migliori occasioni, devi avere un buon *tempismo*.
  Wenn du die besten Gelegenheiten ergreifen willst, musst du ein gutes *Timing* haben.
