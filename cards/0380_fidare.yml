Rang: 380
Wort: fidare
Wortart: vi
Wort mit Artikel: fidare
Femininum / Plural: ''
IPA: ''
Definition: vertrauen, sich verlassen auf
Register: ''
Beispielsätze: |-
  Non *fido* mai sui miei colleghi per lavoro importante.
  Ich *vertraue* meinen Kollegen nie wichtige Arbeit an.
  
  *Fidati* di me, questa volta funzionerà!
  *Vertrau* mir, dieses Mal wird es klappen!
  
  Non si dovrebbe *fidare* ciecamente di chi non si conosce.
  Man sollte denen nicht blind *vertrauen*, die man nicht kennt.
  
  Mi *fido* che arriverai in tempo per la festa.
  Ich *vertraue* darauf, dass du rechtzeitig zur Feier kommst.
  
  Se *fidassi* di più te stesso, avresti più successo.
  Wenn du dir selbst mehr *vertraust* hättest, wärst du erfolgreicher.
