Rang: 1508
Wort: esaminare
Wortart: vt
Wort mit Artikel: esaminare
Femininum / Plural: ''
IPA: ''
Definition: untersuchen, prüfen
Register: ''
Beispielsätze: |-
  Il medico deve *esaminare* attentamente il paziente per diagnosticare la malattia.
  Der Arzt muss den Patienten *untersuchen*, um die Krankheit zu diagnostizieren.
  
  Ho *esaminato* tutti i documenti prima di firmare il contratto di prestito.
  Ich habe alle Unterlagen *geprüft*, bevor ich den Kreditvertrag unterschrieben habe.
  
  Sarebbe necessario *esaminare* più da vicino le cause del caos nel quartiere.
  Es wäre nötig, die Ursachen des Chaos im Viertel *genauer zu untersuchen*.
  
  Nonostante la presenza di un criminale, nessuno osava *esaminare* il suo vero volto.
  Trotz der Anwesenheit eines Verbrechers wagte es niemand, sein wahres Gesicht *offenzulegen*.
  
  Gli scienziati stanno cercando di *esaminare* il legame tra il consumo di cioccolato e la capacità di concentrarsi.
  Die Wissenschaftler versuchen, den Zusammenhang zwischen Schokoladenkonsum und Konzentrationsfähigkeit *zu erforschen*.
