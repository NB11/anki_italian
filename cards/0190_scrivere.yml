Definition: schreiben
Register: ''
Beispielsätze: |-
  Io *scrivo* una lettera al mio amico ogni settimana.
  Ich *schreibe* meinem Freund jede Woche einen *Brief*.
  
  Hai *scritto* il compito di italiano? Sì, l’ho già finito.
  Hast du die *Hausaufgabe* auf *Italienisch* *geschrieben*? Ja, ich habe sie schon *beendet*.
  
  Stasera *scriverò* un articolo per il giornale.
  Heute Abend werde ich einen *Artikel* für die *Zeitung* *schreiben*.
  
  Vorrei che tu *scrivessi* più dettagliatamente.
  Ich *wünschte*, du *würdest* genauer *schreiben*.
  
  Ieri sera *scrissi* un messaggio a Maria, ma non mi ha risposto.
  Gestern Abend *schrieb* ich Maria eine *Nachricht*, aber sie hat mir nicht *geantwortet*.
