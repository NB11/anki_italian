Beispielsätze: |-
  La mia sorella maggiore suona la chitarra in una *band* jazz.
  Meine ältere Schwester spielt Gitarre in einer *Jazzband*.
  
  Hanno fondato questa *band* più di dieci anni fa, ma sono ancora molto famosi.
  Sie haben diese *Band* vor über zehn Jahren gegründet, sind aber immer noch sehr bekannt.
  
  Non appena finirò l’università, vorrei unirmi a una *band* indipendente.
  Sobald ich mein Studium beendet habe, möchte ich einer *Independentband* beitreten.
  
  La *band* ha deciso di sospendere la tournée per problemi di salute del cantante.
  Die *Band* hat beschlossen, die Tournee wegen gesundheitlicher Probleme des Sängers auszusetzen.
  
  In quel locale si esibisce sempre una *band* dal vivo ogni venerdì sera.
  In diesem Lokal tritt jeden Freitagabend immer eine *Liveband* auf.
