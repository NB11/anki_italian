Rang: 3315
Wort: confuso
Wortart: adj
Wort mit Artikel: confuso
Femininum / Plural: ''
IPA: ''
Definition: verwirrt, durcheinander
Register: ''
Beispielsätze: |-
  Sono *confuso* perché non capisco le istruzioni del professore.
  Ich bin *verwirrt*, weil ich die Anweisungen des Professors nicht verstehe.
  
  Se fossi *confuso*, chiederesti chiarimenti invece di rimanere in silenzio.
  Wenn du *durcheinander* wärst, würdest du um Klärung bitten anstatt zu schweigen.
  
  Era *confusa* dalla risposta ambigua del politico, che non chiariva nulla.
  Sie war *verwirrt* durch die mehrdeutige Antwort der Politikerin, die nichts klärte.
  
  Anche senza spiegazioni, non mi sento *confuso*, perché ho studiato molto.
  Auch ohne Erklärungen fühle ich mich nicht *verwirrt*, denn ich habe viel gelernt.
  
  Spero che non ti sia *confuso* dopo aver letto tutti quei dati tecnici.
  Ich hoffe, dass du dich nicht *durcheinander* gebracht hast, nachdem du all diese technischen Daten gelesen hast.
