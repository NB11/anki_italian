Rang: 3943
Wort: spontaneo
Wortart: adj
Wort mit Artikel: spontaneo
Femininum / Plural: spontanei (m), spontanee (f)
IPA: ''
Definition: spontan, ungezwungen, ungekünstelt
Register: ''
Beispielsätze: |-
  Ha fatto una domanda *spontanea* durante la conferenza.
  Er stellte eine *spontane* Frage während der Konferenz.
  
  La sua risata era così *spontanea* che tutti si sono messi a ridere con lei.
  Ihr Lachen war so *ungezwungen*, dass alle mit ihr lachten.
  
  Se fossi stato più *spontaneo*, avresti accettato l'invito senza pensarci troppo.
  Wärst du *spontaner* gewesen, hättest du die Einladung ohne langes Nachdenken angenommen.
  
  Non amo le persone troppo *spontanee*: preferisco chi riflette prima di agire.
  Ich mag keine *ungezwungenen* Menschen: Ich bevorzuge diejenigen, die vor dem Handeln nachdenken.
  
  Era un gesto *spontaneo* quando ha visto la sua foto tra le vecchie lettere.
  Es war eine *spontane* Geste, als sie sein Foto zwischen den alten Briefen sah.
