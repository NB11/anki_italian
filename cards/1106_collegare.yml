Rang: 1106
Wort: collegare
Wortart: vt
Wort mit Artikel: collegare
Femininum / Plural: ''
IPA: ''
Definition: verbinden, anschließen
Register: ''
Beispielsätze: |-
  Per *collegare* il computer alla rete, devi usare un cavo ethernet.
  Um den Computer *mit* dem Netzwerk zu verbinden, musst du ein Ethernetkabel benutzen.
  
  Il direttore ha deciso di *collegare* il dipartimento di fisica a quello di ingegneria.
  Der *Leiter* hat beschlossen, die Physik-Abteilung mit der Ingenieurs-Abteilung zu verbinden.
  
  Se non riesci a *collegare* la batteria, controlla i cavi vicino al peso della macchina.
  Falls du die Batterie nicht *anschließen* kannst, prüfe die Kabel in der Nähe des Gewichts des Wagens.
  
  Prima che esploda la radio, cerca di *collegare* l'impianto di emergenza alla centrale.
  Bevor das *Radio* explodiert, versuche, die Notstromanlage mit der Zentrale zu verbinden.
  
  Credevo che avresti *collegato* la teoria alla pratica durante la vacanza, invece hai solo chiacchierato.
  Ich dachte, du würdest die *Theorie* während des Urlaubs mit der Praxis verbinden, stattdessen hast du nur geredet.
