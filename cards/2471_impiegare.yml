Beispielsätze: |-
  Questo progetto richiede almeno due settimane per essere *impiegato* correttamente.
  Dieses Projekt erfordert mindestens zwei Wochen, um es *einzusetzen*.
  
  Non *impiegare* troppe risorse su cose inutili, altrimenti il budget finisce presto.
  Du solltest nicht zu viele Ressourcen für nutzlose Dinge *aufwenden*, sonst ist das Budget schnell aufgebraucht.
  
  Mi hanno detto che dovrei *impiegare* questo nuovo software per la gestione dei dati.
  Man hat mir gesagt, ich sollte diese neue Software zur Datenverwaltung *nutzen*.
  
  Se non *impieghi* tutto il tempo necessario per studiare, non passerai l'esame.
  Wenn du nicht die ganze benötigte Zeit zum Lernen *aufwendest*, wirst du die Prüfung nicht bestehen.
  
  È evidente che lo Stato *impiega* molti fondi per la sicurezza nazionale ogni anno.
  Es ist offensichtlich, dass der Staat jährlich viele Gelder für die nationale Sicherheit *einsetzt*.
