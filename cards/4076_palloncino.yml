Rang: 4076
Wort: palloncino
Wortart: n.m
Wort mit Artikel: il palloncino
Femininum / Plural: palloncini
IPA: ''
Definition: der Luftballon, -e
Register: ''
Beispielsätze: |-
  Ho comprato *palloncini* colorati per la festa di compleanno di mio figlio.
  Ich habe bunte *Luftballons* für die Geburtstagsfeier meines Sohnes gekauft.
  
  Mentre passeggiavo, un *palloncino* rosso è volato via dal mio mazzo.
  Während ich spazierte, ist ein roter *Luftballon* aus meinem Bündel davongeflogen.
  
  Non *palloncino* che hai perso stamattina era decorato con stelle dorate.
  Der *Luftballon*, den du heute Morgen verloren hast, war mit goldenen Sternen verziert.
  
  Se avessi avuto un *palloncino* in più, l’avrei attaccato al soffitto.
  Wenn ich einen *Luftballon* mehr gehabt hätte, hätte ich ihn an die Decke gehängt.
  
  Vorrei che qualcuno mi regalasse un *palloncino* gigante per il mio compleanno!
  Ich würde mir wünschen, dass mir jemand einen riesigen *Luftballon* zu meinem Geburtstag schenkt!
