Rang: 4351
Wort: crollo
Wortart: n.m
Wort mit Artikel: il crollo
Femininum / Plural: i crolli
IPA: ''
Definition: der Einsturz, -¨e
Register: ''
Beispielsätze: |-
  Dopo il terremoto *crollo* molti edifici nel centro della città.
  Nach dem Erdbeben gab es viele *Einstürze* von Gebäuden im Stadtzentrum.
  
  Nonostante le previsioni ottimistiche, il *crollo* del ponte è stato inevitabile.
  Trotz der optimistischen Vorhersagen war der *Einsturz* der Brücke unvermeidbar.
  
  Gli ingegneri stanno studiando le cause del *crollo* della struttura metallica.
  Die Ingenieure untersuchen die Ursachen für den *Einsturz* der Metallkonstruktion.
  
  Se il *crollo* della borsa continua, perderemo tutti i nostri risparmi.
  Falls der *Einsturz* der Börse anhält, verlieren wir all unsere Ersparnisse.
  
  Era così deprimente vedere il *crollo* di tutte le sue speranze dopo quell’errore.
  Es war so bedrückend, den *Einsturz* all seiner Hoffnungen nach diesem Fehler zu sehen.
