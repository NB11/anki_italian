Rang: 1491
Wort: capacità
Wortart: n.f
Wort mit Artikel: la capacità
Femininum / Plural: capacità
IPA: ''
Definition: die Fähigkeit, -en
Register: ''
Beispielsätze: |-
  Ha una *capacità* straordinaria di risolvere problemi complicati.
  Er hat eine außergewöhnliche *Fähigkeit*, komplizierte Probleme zu lösen.
  
  Non sapevo che la sua *capacità* di parlare tedesco fosse così buona.
  Ich wusste nicht, dass seine *Fähigkeit*, Deutsch zu sprechen, so gut war.
  
  Gli scienziati stanno studiando la *capacità* del cervello di adattarsi a nuove situazioni.
  Die Wissenschaftler untersuchen die *Fähigkeit* des Gehirns, sich an neue Situationen anzupassen.
  
  La *capacità* di ascolto è fondamentale per costruire un’amicizia duratura.
  Die *Fähigkeit* zuzuhören ist grundlegend, um eine dauerhafte Freundschaft aufzubauen.
  
  Dopo sollevare quel carico pesante, mi sono reso conto della mia *capacità* fisica limitata.
  Nachdem ich diese schwere *Ladung* gehoben hatte, merkte ich, wie begrenzt meine körperliche Fähigkeit war.
