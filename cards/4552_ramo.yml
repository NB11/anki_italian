  Il *ramo* che hai tagliato era pieno di fiori appena sbocciati.
  Der *Ast*, den du abgeschnitten hast, war voller frisch aufgeblühter Blüten.
  
  Per fortuna il *ramo* non ha colpito nessuno quando è caduto dal fico.
  Zum Glück hat der *Ast* niemanden getroffen, als er von dem Feigenbaum fiel.
