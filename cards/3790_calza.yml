Rang: 3790
Wort: calza
Wortart: n.f
Wort mit Artikel: la calza
Femininum / Plural: calze
IPA: ''
Definition: der Strumpf, -¨e
Register: ''
Beispielsätze: |-
  Mia nonna indossa sempre *calze* di lana durante l’inverno perché ha sempre freddo ai piedi.
  Meine Oma trägt immer *Strümpfe* aus Wolle im Winter, weil ihre Füße immer frieren.
  
  Le *calze* che hai comprato ieri sono troppo strette e mi fanno male.
  Die *Strümpfe*, die du gestern gekauft hast, sind zu eng und tun mir weh.
  
  Se avessi saputo che oggi faceva così freddo, avrei messo le *calze* termiche!
  Hätte ich gewusst, dass es heute so kalt wird, dann hätte ich *Thermounterwäsche-Strümpfe* angezogen!
  
  Nonostante la *calza* abbia un buco, continua a indossarla perché le porta fortuna.
  Obwohl der *Strumpf* ein Loch hat, trägt sie ihn weiter, weil er ihr Glück bringen soll.
  
  Vorrei che le *calze* fossero più spesse, così non avrò freddo ai piedi quando andrò in montagna.
  Ich wünschte, die *Strümpfe* wären dicker, dann würden mir die Füße nicht frieren, wenn ich in die Berge fahre.
