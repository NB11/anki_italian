Rang: 786
Wort: chiesa
Wortart: n.f
Wort mit Artikel: la chiesa
Femininum / Plural: chiese
IPA: ''
Definition: die Kirche, -n
Register: ''
Beispielsätze: |-
  Ieri abbiamo visitato *la chiesa* del paese.
  Gestern haben wir *die Kirche* des Dorfes besucht.
  
  In *chiesa* si prega in silenzio.
  In *der Kirche* betet man in Stille.
  
  Le *chiese* medievali sono molto affascinanti.
  *Die mittelalterlichen Kirchen* sind sehr faszinierend.
  
  Hai mai partecipato a una messa in *chiesa*?
  Hast du jemals an einer Messe in *der Kirche* teilgenommen?
  
  Domani andrò *alla chiesa* nuova per il concerto.
  Morgen werde ich in *die neue Kirche* für das Konzert gehen.
