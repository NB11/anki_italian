Rang: 786
Wort: chiesa
Wortart: n.f
Wort mit Artikel: la chiesa
Femininum / Plural: chiese
IPA: ''
Definition: die Kirche, -n
Register: ''
Beispielsätze: |-
  Quando siamo andati in centro, abbiamo visto una *chiesa* molto antica che si chiamava San Pietro.
  Als wir ins Zentrum gingen, haben wir eine sehr alte *Kirche* gesehen, die San Pietro hieß.
  
  Se vuoi partecipare alla funzione, devi essere in *chiesa* almeno dieci minuti prima.
  Wenn du am Gottesdienst teilnehmen möchtest, musst du mindestens zehn Minuten vor der *Kirche* sein.
  
  Dopo la *chiesa* abbiamo fatto una passeggiata lungo il fiume, che era molto tranquillo stanotte.
  Nach der *Kirche* sind wir an dem sehr ruhigen Fluss entlangspaziert heute Nacht.
  
  La *chiesa* che abbiamo visitato ieri si trovava in una piazza piena di persone che ballavano sotto gli alberi.
  Die *Kirche*, die wir gestern besichtigt haben, stand auf einem Platz voller Menschen, die unter den Bäumen tanzten.
  
  Nonostante il pericolo, alcuni pazienti hanno scelto di rimettersi in *chiesa* per trovare un po’ di pace interiore.
  Trotz der Gefahr haben einige Patienten die *Kirche* besucht, um etwas innere Ruhe zu finden.
