Rang: 4816
Wort: spavento
Wortart: n.m
Wort mit Artikel: lo spavento
Femininum / Plural: gli spaventi
IPA: ''
Definition: der Schreck, -e
Register: ''
Beispielsätze: |-
  Ho provato un *spavento* quando ho visto il ragno sul mio letto.
  Ich habe einen *Schreck* bekommen, als ich die Spinne auf meinem Bett gesehen habe.
  
  Mi ricordo ancora dello *spavento* di quella notte di tempesta.
  Ich erinnere mich noch an den *Schreck* in jener stürmischen Nacht.
  
  Pensa che sia uno *spavento* inutile preoccuparsi così tanto del futuro.
  Sie glauben, dass es ein *unbegründeter Schreck* ist, sich so sehr um die Zukunft zu sorgen.
  
  Se non avessi visto il cartello, avrei avuto un *spavento* ancora peggiore.
  Wenn ich das Schild nicht gesehen hätte, hätte ich einen *viel schlimmeren Schreck* bekommen.
  
  Quando il treno è deragliato, i passeggeri hanno avuto un *spavento* collettivo.
  Als der Zug entgleist ist, haben die Fahrgäste einen *kollektiven Schreck* erlebt.
