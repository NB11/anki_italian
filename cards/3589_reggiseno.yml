Rang: 3589
Wort: reggiseno
Wortart: n.m
Wort mit Artikel: il reggiseno
Femininum / Plural: reggiseni
IPA: ''
Definition: der Büstenhalter, -
Register: ''
Beispielsätze: |-
  Ho bisogno di un *reggiseno* più comodo per il viaggio in aereo.
  Ich brauche einen *bequemeren BH* für den Flug.
  
  La cameriera ha rovesciato il caffè proprio sul *reggiseno* della cliente.
  Die Kellnerin hat den Kaffee genau auf den *BH* der Kundin verschüttet.
  
  Non indossavo il *reggiseno* quando sono caduta dalla bicicletta ieri.
  Ich trug keinen *BH*, als ich gestern vom Fahrrad fiel.
  
  Se avessi saputo che sarebbe piovuto, avrei portato un *reggiseno* impermeabile.
  Hätte ich gewusst, dass es regnen würde, hätte ich einen *wasserdichten BH* mitgenommen.
  
  Mi hanno detto che quel *reggiseno* è il modello più venduto in questo negozio, ma non mi convince affatto.
  Man hat mir gesagt, dass dieser *BH* das meistverkaufte Modell in diesem Laden ist, aber er überzeugt mich überhaupt nicht.
