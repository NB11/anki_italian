Rang: 630
Wort: trasferire
Wortart: vt
Wort mit Artikel: trasferire
Femininum / Plural: ''
IPA: ''
Definition: umziehen, transferieren, befördern
Register: ''
Beispielsätze: |-
  Ho deciso di *trasferire* in un altro paese per lavoro perché è più sicuro e il salario è migliore.
  Ich habe beschlossen, in ein anderes Land umzuziehen, denn es ist sicherer und das Gehalt ist besser.
  
  Il detective dovrà *trasferire* le prove al laboratorio per l’analisi, altrimenti non serviranno a nulla.
  Der Detektiv *muss* die Beweise ins Labor bringen lassen, sonst nützen sie nichts.
  
  Dopo l’incontro con lo zio, vorrei *trasferire* tutti i soldati alla base militare il prima possibile.
  Nach dem Treffen mit dem Onkel möchte ich alle Soldaten so schnell wie möglich zur Militärbasis verlegen.
  
  Se avessi completamente pulito la lista，saremmo già pronti a *trasferire* il denaro al tuo conto.
  Wenn ich die Liste völlig abgearbeitet hätte, hätten wir das Geld bereits auf dein Konto überwiesen.
  
  Nonostante la terribile questione, hanno deciso di *trasferire* i documenti segreti in un luogo più sicuro domani mattina.
  Trotz der schrecklichen Angelegenheit haben sie beschlossen, die geheimen Unterlagen morgen früh an einen sichereren Ort zu bringen.
