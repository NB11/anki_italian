Rang: 1749
Wort: segnare
Wortart: vt
Wort mit Artikel: segnare
Femininum / Plural: ''
IPA: ''
Definition: markieren, eintragen
Register: ''
Beispielsätze: |-
  Nella partita di calcio, il capitano ha *segnato* il gol della vittoria al 90° minuto.
  In dem Fußballspiel hat der Kapitän *das entscheidende Tor* markiert.
  
  Ti consiglio di *segnare* tutti gli appuntamenti nella tua agenda per non dimenticarli.
  Ich rate dir, alle Termine in deinem Kalender *einzutragen*, damit du sie nicht vergisst.
  
  Anche se la soluzione sembra *segnata*, non dobbiamo sottovalutare gli ostacoli.
  Auch wenn die Lösung *vorbestimmt* zu sein scheint, dürfen wir die Hindernisse nicht unterschätzen.
  
  Dopo aver *segnato* l’indirizzo sul foglio, mi sono accorto di aver sbagliato a copiarlo.
  Nachdem ich die Adresse auf das Blatt *eingetragen* hatte, merkte ich, dass ich sie falsch abgeschrieben hatte.
  
  Il professore vuole che *segniamo* almeno tre errori nella traduzione prima di correggerla.
  Der Professor möchte, dass wir mindestens drei Fehler in der Übersetzung *markieren*, bevor wir sie korrigieren.
