Femininum / Plural: ''
IPA: ''
Definition: bluten
Register: ''
Beispielsätze: |-
  Il ragazzo si è tagliato il dito e ha iniziato a *sanguinare*.
  Der Junge hat sich in den Finger geschnitten und beginnt zu *bluten*.
  
  Anche se la ferita non è profonda, continuerà a *sanguinare* ancora un po’.
  Auch wenn die Wunde nicht tief ist, wird sie noch ein bisschen *bluten*.
  
  Ho notato che la sua ferita *sanguinava* molto più del previsto.
  Ich habe bemerkt, dass seine Wunde viel mehr *blutete*, als ich erwartet hatte.
  
  Se la ferita non smette di *sanguinare*, dovrai andare dal medico.
  Wenn die Wunde nicht aufhört zu *bluten*, musst du zum Arzt gehen.
  
  Dopo il taglio, la ferita cominciò a *sanguinare* abbondantemente, spaventando tutti.
  Nach dem Schnitt begann die Wunde stark zu *bluten* und erschreckte alle.
