Rang: 3186
Wort: commedia
Wortart: n.f
Wort mit Artikel: la commedia
Femininum / Plural: commedie
IPA: ''
Definition: die Komödie, -n
Register: ''
Beispielsätze: |-
  Ieri sera abbiamo visto al teatro una *commedia* divertentissima che parlava di un incidente tra due politici rivali.
  Gestern Abend haben wir im Theater eine *Komödie* gesehen, die von einem Streit zwischen zwei rivalisierenden Politikern handelte.
  
  Nonostante la *commedia* fosse scritta cento anni fa, ridevamo ancora alle battute più scontate del terzo atto.
  Obwohl die *Komödie* vor hundert Jahren geschrieben wurde, lachten wir immer noch über die offensichtlichsten Witze im dritten Akt.
  
  Se non avessi letto la recensione, non avrei mai pensato che una *commedia* così scadente potesse avere tanto successo al botteghino.
  Hätte ich die Kritik nicht gelesen, hätte ich nie gedacht, dass eine so schlechte *Komödie* so viel Erfolg an der Abendkasse haben könnte.
  
  La *commedia* dell’arte nasce dal bisogno di intrattenere il pubblico con personaggi tipici e battute improvvisate.
  Die *Komödie* dell’arte entstand aus dem Bedürfnis heraus, das Publikum mit typischen Figuren und improvisierten Witzen zu unterhalten.
  
  Dopo lo spettacolo, l’attore principale ha confessato che detestava interpretare la *commedia* per via del testo troppo banale.
  Nach der Vorstellung gestand der Hauptdarsteller, dass er die Rolle in der *Komödie* hasste, weil der Text zu abgedroschen war.
