Wortart: adv
Wort mit Artikel: giù
Femininum / Plural: ''
IPA: ''
Definition: unten, hinunter
Register: ''
Beispielsätze: |-
  Sono *giù* in cantina a cercare un vecchio libro.
  Ich bin *unten* im Keller und suche ein altes Buch.
  
  Non gettare i rifiuti *giù* per le scale!
  Wirf den Müll nicht *hinunter* die Treppe!
  
  Il gatto è sceso *giù* dal tavolo da solo.
  Die Katze ist *hinunter* vom Tisch allein heruntergestiegen.
  
  Guarda *giù* dalla finestra: il parco è bellissimo!
  Schau *unten* aus dem Fenster: der Park ist wunderschön!
  
  Questo ascensore non va più *giù*, purtroppo.
  Dieser Aufzug fährt leider nicht mehr *hinunter*.
