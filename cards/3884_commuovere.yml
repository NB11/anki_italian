Rang: 3884
Wort: commuovere
Wortart: v
Wort mit Artikel: commuovere
Femininum / Plural: ''
IPA: ''
Definition: bewegen, rühren, ergreifen
Register: ''
Beispielsätze: |-
  La storia di quel *commuove* tutti profondamente.
  Die Geschichte von dem *berührt* alle tief.
  
  Mi sono commosso quando ho visto quel film per la prima volta.
  Ich habe mich *bewegt*, als ich den Film zum ersten Mal gesehen habe.
  
  Nonostante le sue parole dure, la sua gentilezza mi ha *commosso* fino alle lacrime.
  Trotz seiner harten Worte hat mich seine Freundlichkeit bis zu den Tränen *gerührt*.
  
  Se tu fossi meno egoista, forse la tua famiglia non si sarebbe *commosso* per la tua scelta.
  Wenn du weniger egoistisch wärst, hätte sich deine Familie vielleicht nicht für deine Wahl *bewegt*.
  
  Credo che la notizia lo *commuoverà* più di quanto immagini.
  Ich glaube, die Nachricht wird ihn mehr *bewegen*, als du denkst.
