Rang: 511
Wort: insegnare
Wortart: vt
Wort mit Artikel: insegnare
Femininum / Plural: ''
IPA: ''
Definition: lehren, unterrichten
Register: ''
Beispielsätze: |-
  Mio padre vuole *insegnare* l’italiano a mio fratello minore.
  Mein Vater will *unterrichten* Italienisch meinem jüngeren Bruder.
  
  Se avessi più tempo, *insegneresti* anche musica agli studenti?
  Wenn du mehr Zeit hättest, *würdest du* auch Musik den Schülern unterrichten?
  
  L’insegnante ci ha detto che domani *insegnerà* una poesia famosa di Dante.
  Die Lehrerin hat uns gesagt, dass sie morgen ein berühmtes Gedicht von Dante *unterrichten wird*.
  
  È importante *insegnare* ai bambini il rispetto per gli altri, non solo le materie scolastiche.
  Es ist wichtig, den Kindern die Achtung vor anderen beizubringen, nicht nur die Schulfächer.
  
  Dopo che avrò finito l’università, voglio *insegnare* in una scuola all’estero per un anno.
  Nachdem ich die Universität abgeschlossen habe, möchte ich ein Jahr lang an einer Schule im Ausland *unterrichten*.
