Rang: 4447
Wort: secchio
Wortart: n.m
Wort mit Artikel: il secchio
Femininum / Plural: secchi
IPA: ''
Definition: der Eimer, -
Register: ''
Beispielsätze: |-
  Ho dimenticato *il secchio* sotto l'albero in giardino.
  Ich habe *den Eimer* unter dem Baum im Garten vergessen.
  
  Non appena il temporale è scoppiato, abbiamo riempito *i secchi* d'acqua per innaffiare le piante.
  Sobald der Sturm losbrach, haben wir *die Eimer* mit Wasser gefüllt, um die Pflanzen zu gießen.
  
  Il *secchio* che hai comprato ieri è troppo piccolo per portare tutta la spazzatura.
  Der *Eimer*, den du gestern gekauft hast, ist zu klein, um all den Müll zu tragen.
  
  Mentre pulivo il garage, ho trovato un vecchio *secchio* arrugginito dietro l'armadio.
  Während ich die Garage aufräumte, fand ich einen alten, verrosteten *Eimer* hinter dem Schrank.
  
  Mi hanno detto che se svuoti *il secchio* della spazzatura ogni sera, eviti i cattivi odori in casa.
  Man hat mir gesagt, wenn du *den Mülleimer* jeden Abend leerst, vermeidest du schlechte Gerüche im Haus.
