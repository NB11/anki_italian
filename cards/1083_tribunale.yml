Rang: 1083
Wort: tribunale
Wortart: n.m
Wort mit Artikel: il tribunale
Femininum / Plural: tribunali
IPA: ''
Definition: das Gericht, -e
Register: ''
Beispielsätze: |-
  Il giudice ha emesso la sentenza dopo due ore di udienza al *tribunale* locale.
  Der Richter hat das Urteil nach zwei Stunden Verhandlung am *Gericht* verkündet.
  
  Dopo aver sospettato a lungo, hanno finalmente portato le prove al *tribunale*.
  Nach langem *Verdächtigen* haben sie endlich die Beweise zum Gericht gebracht.
  
  Se avessimo saputo il valore delle prove, non avremmo mai cancellato quel file importante per il *tribunale*.
  Wenn wir den *Wert* der Beweise gekannt hätten, hätten wir diese wichtige Datei für das Gericht nie gelöscht.
  
  Il *tribunale* ha deciso che l'imputato è innocente, nonostante le accuse del direttore della società.
  Das *Gericht* hat beschlossen, dass der Angeklagte unschuldig ist, trotz der Anschuldigungen des Leiters der Firma.
  
  Nonostante la perdita di tempo, hanno comunque insistito per presentare l'appello al *tribunale* supremo.
  Trotz des *Verlusts* an Zeit haben sie trotzdem darauf bestanden, den Einspruch beim Gericht der höchsten Instanz einzureichen.
