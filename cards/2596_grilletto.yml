Rang: 2596
Wort: grilletto
Wortart: n.m
Wort mit Artikel: il grilletto
Femininum / Plural: grillettoni
IPA: ''
Definition: der Abzug, -züge
Register: ''
Beispielsätze: |-
  Quando sparo, tengo sempre il dito sul *grilletto* per non perdere tempo.
  Wenn ich schieße, halte ich immer den Finger am *Abzug*, um keine Zeit zu verlieren.
  
  Il *grilletto* della pistola era bloccato e non riuscivo a sparare.
  Der *Abzug* der Pistole war blockiert und ich konnte nicht schießen.
  
  Non appena senti che il *grilletto* si muove, premi con decisione.
  Sobald du hörst, dass sich der *Abzug* bewegt, drück entschlossen.
  
  Il poliziotto gli ordinò di non toccare il *grilletto* della sua arma.
  Der Polizist befahl ihm, den *Abzug* seiner Waffe nicht zu berühren.
  
  Mi hanno insegnato che un errore sul *grilletto* può costare la vita.
  Sie haben mir beigebracht, dass ein Fehler am *Abzug* das Leben kosten kann.
