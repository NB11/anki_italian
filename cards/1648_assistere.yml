Rang: 1648
Wort: assistere
Wortart: v
Wort mit Artikel: assistere
Femininum / Plural: ''
IPA: ''
Definition: beistehen, helfen, teilnehmen, beiwohnen
Register: ''
Beispielsätze: |-
  Il medico *assiste* il paziente durante la terapia con grande attenzione.
  Der Arzt *steht* dem Patienten während der Therapie mit großer Aufmerksamkeit bei.
  
  Se *assisterai* alla funzione religiosa, indossa abiti formali, prete consiglia sempre così.
  Wenn du der religiösen *Funktion* beiwohnst, zieh formelle Kleidung an, rät der Priester immer.
  
  Molti hanno *assistito* alla crisi politica senza poter intervenire, è stato imbarazzante.
  Viele haben der politischen *Krise* beigewohnt, ohne eingreifen zu können – es war peinlich.
  
  Non appena avrò finito il corso, *assisterò* a una visione teatrale con i miei compagni di partner.
  Sobald ich den Kurs beendet habe, werde ich einer theatralischen *Vorstellung* mit meinen Partnern beiwohnen.
  
  Nonostante il traffico, siamo riusciti a *assistere* in tempo al concerto, grazie alla spiegazione dettagliata del marinaio.
  Trotz des *Verkehrs* konnten wir rechtzeitig dem Konzert beiwohnen, dank der detaillierten Erklärung des Kaisers.
