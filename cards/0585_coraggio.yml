Rang: 585
Wort: coraggio
Wortart: n.m
Wort mit Artikel: il coraggio
Femininum / Plural: i coraggi
IPA: ''
Definition: der Mut, die Kühnheit
Register: ''
Beispielsätze: |-
  Non avere *coraggio* può comportare molti guaio nella vita.
  Kein *Mut* kann viele Probleme im Leben mit sich bringen.
  
  Finalmente ho trovato il *coraggio* di presentare il mio programma agli americano.
  Endlich habe ich den *Mut* gefunden, mein Programm den Amerikanern vorzustellen.
  
  Se non avessi avuto *coraggio*, avrei temuto di ammarazzare quel cavallo ferito.
  Wenn ich keinen *Mut* gehabt hätte, hätte ich gefürchtet, dieses verletzte Pferd zu töten.
  
  Nonostante la guardia fosse lì, lei ebbe il *coraggio* di avvicinare il cristo senza riguardo.
  Trotz des *Wächters* dort hatte sie den Mut, sich Christus ohne Rücksicht zu nähern.
  
  Dimmi: quando è normale avere *coraggio* e quando è semplicemente fingere?
  Sag mir: Wann ist es normal, *Mut* zu haben, und wann ist es einfach nur vortäuschen?
