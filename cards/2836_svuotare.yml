Rang: 2836
Wort: svuotare
Wortart: vt
Wort mit Artikel: svuotare
Femininum / Plural: ''
IPA: ''
Definition: leeren, entleeren, ausleeren
Register: ''
Beispielsätze: |-
  Devi *svuotare* la lavastoviglie prima di caricarla di nuovo.
  Du musst die Spülmaschine *leeren*, bevor du sie wieder einräumst.
  
  Il monaco *svuota* la ciotola del cane ogni mattina alle sette.
  Der Mönch *entleert* den Napf des Hundes jeden Morgen um sieben.
  
  Hai già *svuotato* il cassetto dove tieni le ricevute della beneficenza?
  Hast du das Fach, in dem die Quittungen der Wohltätigkeit liegen, schon *geleert*?
  
  Se non *svuoti* subito il frigorifero, il cibo andrà a male.
  Wenn du den Kühlschrank nicht sofort *entleerst*, wird das Essen verderben.
  
  Credi che l'amministrazione voglia *svuotare* il fondo per la beneficenza?
  Glaubst du, die Verwaltung will den Topf der Wohltätigkeit *ausleeren*?
