Rang: 4745
Wort: inaccettabile
Wortart: adj
Wort mit Artikel: inaccettabile
Femininum / Plural: ''
IPA: ''
Definition: inakzeptabel, untragbar
Register: ''
Beispielsätze: |-
  Questo comportamento è *inaccettabile* in qualsiasi contesto lavorativo.
  Dieses Verhalten ist *inakzeptabel* in jedem Arbeitskontext.
  
  Non puoi dire che la sua idea è *inaccettabile* senza prima ascoltare le sue ragioni.
  Du kannst nicht sagen, dass seine Idee *inakzeptabel* ist, ohne seine Gründe erst anzuhören.
  
  Se avessi saputo che era così *inaccettabile*, non avrei mai accettato la proposta.
  Wenn ich gewusst hätte, dass es so *inakzeptable* war, hätte ich das Angebot nie angenommen.
  
  È *inaccettabile* che qualcuno sprechi cibo quando ci sono persone che non hanno niente da mangiare.
  Es ist *inakzeptabel*, wenn jemand Essen verschwendet, obwohl es Menschen gibt, die nichts zu essen haben.
