Rang: 1660
Wort: eccellente
Wortart: adj
Wort mit Artikel: eccellente
Femininum / Plural: eccellenti
IPA: ''
Definition: hervorragend, ausgezeichnet, großartig, erstklassig, herausragend
Register: ''
Beispielsätze: |-
  Il film che ho visto ieri era *eccellente*, molto meglio di quanto mi aspettassi.
  Der Film, den ich gestern gesehen habe, war *hervorragend*, viel besser als ich erwartet habe.
  
  Questa versione del software è decisamente *eccellente* rispetto alla precedente, ha molte più funzioni.
  Diese Version der Software ist eindeutig *ausgezeichnet* im Vergleich zur vorherigen, sie hat viel mehr Funktionen.
  
  Nonostante la crisi economica, la sua azienda è riuscita a mantenere risultati *eccellenti*.
  Trotz der wirtschaftlichen *Krise* ist es seinem Unternehmen gelungen, hervorragende Ergebnisse zu halten.
  
  Devono ancora eseguire un’analisi *eccellente* di questi dati per capire le cause del problema.
  Sie müssen noch eine *ausgezeichnete* Analyse dieser Daten durchführen, um die Ursachen des Problems zu verstehen.
  
  Se il suo partner non fosse così simpatico, il viaggio non sarebbe stato *eccellente* come è stato.
  Wenn sein *Partner* nicht so sympathisch wäre, wäre die Reise nicht so großartig geworden, wie sie war.
