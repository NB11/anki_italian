Rang: 418
Wort: buttare
Wortart: v
Wort mit Artikel: buttare
Femininum / Plural: ''
IPA: ''
Definition: wegwerfen, fortwerfen, auswerfen, entsorgen
Register: ''
Beispielsätze: |-
  Non *buttare* la spazzatura nella strada!
  Wirf den Müll nicht auf die Straße!
  
  Hai *buttato* via la bottiglia di plastica?
  Hast du die Plastikflasche weggeworfen?
  
  Se non ti serve più quel libro, *buttalo* nel riciclo.
  Wenn du das Buch nicht mehr brauchst, wirf es in den Recycling.
  
  Stanno per *buttare* giù il vecchio ponte.
  Sie werden bald die alte Brücke abreißen.
  
  Domani *butteremo* via tutte le foglie secche.
  Morgen werden wir alle trockenen Blätter wegwerfen.
