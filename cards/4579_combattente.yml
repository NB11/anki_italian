Rang: 4579
Wort: combattente
Wortart: n.m
Wort mit Artikel: il combattente
Femininum / Plural: combattenti
IPA: ''
Definition: der Kämpfer, -
Register: ''
Beispielsätze: |-
  Il *combattente* della Resistenza italiana fu un eroe nazionale.
  Der *Kämpfer* der italienischen Résistance war ein Nationalheld.
  
  I *combattenti* si sono allenati duramente prima della battaglia.
  Die *Kämpfer* haben sich hart vor der Schlacht trainiert.
  
  Se fossi un *combattente*, cosa farei per difendere il mio paese?
  Wenn ich ein *Kämpfer* wäre, was würde ich tun, um mein Land zu verteidigen?
  
  È raro trovare un *combattente* che non abbia perso qualche amico in guerra.
  Es ist selten, einen *Kämpfer* zu finden, der im Krieg nicht einen Freund verloren hat.
  
  I veterani, che erano *combattenti* valorosi, ricevettero una medaglia speciale.
  Die Veteranen, die tapfere *Kämpfer* gewesen waren, erhielten eine besondere Medaille.
