Beispielsätze: |-
  Il *nonno* legge un libro al dito ferito del nipote con calma.
  Der *Großvater* liest mit Ruhe ein Buch an dem verletzten Finger seines Enkels.
  
  Quando ero piccolo, il mio *nonno* era un paziente molto calmo durante le tempeste.
  Als ich klein war, blieb mein *Großvater* während der Stürme ein sehr ruhiger Patient.
  
  Se tu avessi ascoltato il *nonno*, altrimenti avresti sbagliato anche tu il test.
  Wenn du auf den *Großvater* gehört hättest, hättest du sonst auch den Test nicht bestanden.
  
  Il *nonno* di Luca non vuole che vada al club inglese perché è impossibile controllarlo stanotte.
  Lucas *Großvater* will nicht, dass er heute Nacht in den englischen Club geht, weil es unmöglich ist, ihn zu kontrollieren.
  
  Mi piacerebbe tanto che il mio *nonno* venisse ancora una volta al nostro ballo di matrimonio in chiesa.
  Ich würde mir so wünschen, dass mein *Großvater* noch einmal zu unserem Hochzeitstanz in der Kirche kommt.
