Rang: 2129
Wort: schiacciare
Wortart: v
Wort mit Artikel: schiacciare
Femininum / Plural: ''
IPA: ''
Definition: zerdrücken, zermahlen, zerdrücken
Register: ''
Beispielsätze: |-
  Devi *schiacciare* bene l’aglio nel mortaio per ottenere una pasta sottile.
  Du musst den Knoblauch im Mörser *zerdrücken*, um eine feine Paste zu erhalten.
  
  Non *schiacciare* troppo quel pulsante, altrimenti si romperà!
  Drück diesen Knopf nicht zu fest *herunter*, sonst geht er kaputt!
  
  Se non avessi *schiacciato* il frutto così violentemente, il succo sarebbe ancora buono.
  Wenn du die Frucht nicht so brutal *zermalmt* hättest, wäre der Saft noch gut gewesen.
  
  Ho sentito che vorresti *schiacciare* quella bottiglia vuota per fare spazio nel bidone.
  Ich habe gehört, dass du die leere Flasche *zusammenquetschen* möchtest, um Platz in der Tonne zu schaffen.
  
  Mentre attraversavo la strada, una pallottola mi ha sfiorato la spalla senza *schiacciare* l’osso.
  Als ich die Straße überquerte, streifte mich eine Gewehrkugel an der Schulter, ohne den Knochen *zu brechen*.
