Rang: 605
Wort: camminare
Wortart: vi
Wort mit Artikel: camminare
Femininum / Plural: ''
IPA: ''
Definition: laufen, gehen, spazieren
Register: ''
Beispielsätze: |-
  Ogni mattina *cammino* per mezz'ora nel parco.
  Jeden Morgen *gehe* ich eine halbe Stunde im Park *spazieren*.
  
  Se non *camminerai* abbastanza, non perderai peso.
  Wenn du nicht genug *läufst*, wirst du nicht abnehmen.
  
  Mi dispiace, ma ieri non *ho camminato* molto.
  Es tut mir leid, aber gestern bin ich nicht viel *gelaufen*.
  
  Non vorrei *camminare* così tanto sotto la pioggia.
  Ich möchte nicht so viel bei *Regen laufen*.
  
  Che ne dici se domani *camminassimo* fino al lago?
  Was hältst du davon, wenn wir morgen bis zum See *laufen* würden?
