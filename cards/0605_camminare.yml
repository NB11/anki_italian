Rang: 605
Wort: camminare
Wortart: vi
Wort mit Artikel: camminare
Femininum / Plural: ''
IPA: ''
Definition: laufen, gehen, spazieren
Register: ''
Beispielsätze: |-
  Dopo pranzo mi piace *camminare* un po’ nel parco vicino a casa.
  Nach dem Mittagessen gehe ich gern ein bisschen im Park in der Nähe spazieren.
  
  Se vuoi dimagrire, devi *camminare* almeno trenta minuti al giorno.
  Wenn du abnehmen willst, musst du *laufen* mindestens dreißig Minuten pro Tag.
  
  Credo che domani pioverà, quindi non potremo *camminare* in montagna come programmato.
  Ich glaube, morgen wird es regnen, also können wir nicht wie geplant in den Bergen *gehen*.
  
  Ho visto un cane che *camminava* tranquillo lungo il fiume senza il padrone.
  Ich habe einen Hund gesehen, der ganz ohne Besitzer ruhig *spazierte*.
  
  Non appena avrò finito lo studio, uscirò a *camminare* per schiarirmi le idee.
  Sobald ich das Lernen beendet habe, gehe ich spazieren, um mir die Gedanken zu klären.
