Rang: 1912
Wort: mostra
Wortart: n.f
Wort mit Artikel: la mostra
Femininum / Plural: mostre
IPA: ''
Definition: die Ausstellung, -en
Register: ''
Beispielsätze: |-
  La *mostra* d'arte moderna è stata visitata da migliaia di persone la settimana scorsa.
  Die *Ausstellung* moderner Kunst wurde letzte Woche von Tausenden besucht.
  
  Non appena arriverà il catalogo, organizzerò una *mostra* personale nella galleria del centro.
  Sobald der Katalog eintrifft, werde ich eine persönliche *Ausstellung* in der Galerie im Zentrum organisieren.
  
  Se avessi più fondi, potrei allestire una *mostra* itinerante in tutta Italia.
  Wenn ich mehr Mittel hätte, könnte ich eine Wander-*Ausstellung* in ganz Italien einrichten.
  
  La *mostra* che hai visto ieri al museo è stata chiusa anticipatamente per problemi organizzativi.
  Die *Ausstellung*, die du gestern im Museum gesehen hast, wurde vorzeitig wegen organisatorischer Probleme geschlossen.
  
  Appena finito lo scavo archeologico, allestiremo una *mostra* con i reperti ritrovati.
  Sobald die archäologische Ausgrabung abgeschlossen ist, werden wir eine *Ausstellung* mit den gefundenen Artefakten einrichten.
