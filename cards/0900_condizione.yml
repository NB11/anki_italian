Rang: 900
Wort: condizione
Wortart: n.f
Wort mit Artikel: la condizione
Femininum / Plural: condizioni
IPA: ''
Definition: die Bedingung, -en, die Lage, -n
Register: ''
Beispielsätze: |-
  Non possiamo partecipare alla festa *della condizione* meteorologica avversa.
  Wir können nicht an der Feier teilnehmen *wegen der* widrigen Wetterlage.
  
  La *condizione* fisica del paziente è migliorata dopo l’esperienza in ospedale.
  Der körperliche Zustand des Patienten hat sich nach dem Krankenhausaufenthalt verbessert.
  
  Se non rispetti *la condizione* del contratto, dovrai pagare il prezzo dello strappo.
  Wenn du die Vertragsbedingungen nicht einhältst, musst du den Preis für die Vertragsstrafe zahlen.
  
  Malgrado *le condizioni* interne del mercato, l’hotel ha registrato un enorme afflusso di ospiti estivi.
  Trotz der inneren Marktsituation verzeichnete das Hotel einen riesigen Zustrom von Gästen.
  
  Mi sono accorto *della condizione* precaria di Maria quando ho notato il suo aspetto stanco durante il pomeriggio al parco.
  Ich habe Marias prekäre Lage bemerkt, als ich ihr erschöpftes Aussehen am Nachmittag im Park wahrnahm.
