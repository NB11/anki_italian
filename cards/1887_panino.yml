Beispielsätze: |-
  Al bar ho ordinato un *panino* con prosciutto e formaggio.
  In der Bar habe ich ein *Brötchen* mit Schinken und Käse bestellt.
  
  Vuoi che ti prepari un *panino* per pranzo?
  Soll ich dir ein *Brötchen* zum Mittagessen machen?
  
  I *panini* che ho mangiato ieri erano squisiti.
  Die *Brötchen*, die ich gestern gegessen habe, waren köstlich.
  
  Se non mangi qualcosa, prendi almeno un *panino* al volo.
  Wenn du nichts isst, nimm wenigstens ein *Brötchen* zwischendurch.
  
  Mi hanno detto che il *panino* al tonno è molto buono qui.
  Sie haben mir gesagt, dass das *Brötchen* mit Thunfisch hier sehr gut ist.
