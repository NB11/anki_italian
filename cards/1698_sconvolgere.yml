Rang: 1698
Wort: sconvolgere
Wortart: vt
Wort mit Artikel: sconvolgere
Femininum / Plural: ''
IPA: ''
Definition: erschüttern, aufwühlen, umwerfen
Register: ''
Beispielsätze: |-
  Il giudizio della giuria ha *sconvolto* gli animi dei cittadini che speravano in un verdetto diverso.
  Das Urteil der *Jury* hat die Gemüter der Bürger, die auf ein anderes Ergebnis gehofft hatten, aufgewühlt.
  
  Non mi *sconvolge* più nulla da quando ho visto cosa succede nella nostra città ogni giorno.
  Mich *erschüttert* nichts mehr, seit ich gesehen habe, was in unserer Stadt jeden Tag passiert.
  
  Se avessi saputo che i dati sarebbero *sconvolti* da un errore così grave, avrei controllato meglio.
  Wenn ich gewusst hätte, dass die Daten durch einen so schweren *Fehler* umgeworfen würden, hätte ich besser nachgeprüft.
