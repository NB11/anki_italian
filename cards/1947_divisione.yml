Rang: 1947
Wort: divisione
Wortart: n.f
Wort mit Artikel: la divisione
Femininum / Plural: divisioni
IPA: ''
Definition: die Aufteilung, -en, die Teilung, -en
Register: ''
Beispielsätze: |-
  Dopo la *divisione* dei compiti, abbiamo finito il progetto in tempo.
  Nach der *Aufteilung* der Aufgaben haben wir das Projekt rechtzeitig beendet.
  
  La *divisione* del territorio tra i due Stati ha causato tensioni.
  Die *Teilung* des Gebiets zwischen den beiden Staaten hat zu Spannungen geführt.
  
  Credo che la *divisione* delle spese sia stata equa.
  Ich glaube, dass die *Aufteilung* der Kosten fair war.
  
  Non sopporto sempre questa *divisione* dei ruoli nella nostra squadra.
  Ich ertrage nicht immer diese *Aufteilung* der Rollen in unserem Team.
  
  Se facciamo una *divisione* più chiara, lavoreremo meglio.
  Wenn wir eine klarere *Aufteilung* machen, werden wir besser arbeiten.
