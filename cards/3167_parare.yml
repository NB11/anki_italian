Rang: 3167
Wort: parare
Wortart: vt
Wort mit Artikel: parare
Femininum / Plural: ''
IPA: ''
Definition: abwehren, abblocken
Register: ''
Beispielsätze: |-
  Il portiere è riuscito a *parare* il rigore all’ultimo secondo della partita.
  Der Torwart hat den Elfmeter in der letzten *Sekunde des Spiels* abgewehrt.
  
  Se non avessimo *parato* quel colpo, ora saremmo nei guai.
  Wenn wir diesen *Angriff nicht abgewehrt* hätten, hätten wir jetzt Ärger.
  
  Il soldato ha *parato* con il braccio lo shrapnel che gli avrebbe perforato la carne.
  Der Soldat hat die *Splitter, die ihn sonst verletzt hätten*, mit dem Arm abgewehrt.
  
  Vor di *parare* le critiche, l’amministratore ha preferito scusarsi pubblicamente.
  Bevor er die *Kritik abwehrte*, entschuldigte sich der Verwalter lieber öffentlich.
  
  Credi che un muro di cemento possa *parare* un’esplosione simile?
  Glaubst du, eine Betonmauer kann eine solche *Explosion *abblocken*?
