Beispielsätze: |-
  Ho ottenuto *lo sconto* del 20% sul computer grazie alla promozione attuale.
  Ich habe mir *den Rabatt* von 20 % auf den Computer dank der aktuellen Werbung gesichert.
  
  Anche se *sconto* non c'era, ho comprato quel vestito perché mi piaceva molto.
  Obwohl es *keinen Rabatt* gab, habe ich das Kleid gekauft, weil es mir sehr gefiel.
  
  Ricordati di chiedere *lo sconto* se paghi in contanti.
  Erinnere dich daran, *den Rabatt* zu verlangen, wenn du bar bezahlst.
  
  Il negozio offre *sconti* solo a chi porta un curriculum in cui si è collaborato con ditte estere.
  Das Geschäft gewährt *Rabatte* nur denen, die einen Lebenslauf vorlegen, in dem sie mit ausländischen Firmen zusammengearbeitet haben.
  
  Se hai *lo sconto* del 15% ma devi pagare le spedizioni, alla fine risparmi poco.
  Wenn du *den Rabatt* von 15 % hast, aber die Versandkosten zahlen musst, sparst du am Ende kaum etwas.
