Rang: 3872
Wort: dissanguare
Wortart: vt
Wort mit Artikel: dissanguare
Femininum / Plural: ''
IPA: ''
Definition: ausbluten lassen, verbluten
Register: ''
Beispielsätze: |-
  Se non *dissangui* immediatamente la ferita, il paziente potrebbe morire.
  Wenn du die Wunde nicht sofort *ausbluten lässt*, könnte der Patient sterben.
  
  Il veterinario ha deciso di *dissanguare* il cane per prevenire l’emorragia interna.
  Der Tierarzt hat beschlossen, den Hund *verbluten zu lassen*, um die innere Blutung zu verhindern.
  
  Non sapevo che tu sapessi *dissanguare* un maiale prima della macellazione!
  Ich wusste nicht, dass du ein Schwein vor der Schlachtung *ausbluten lassen* kannst!
  
  Per quanto la medicina moderna sia avanzata, ci sono ancora casi in cui si rischia di *dissanguare* un paziente durante un’operazione.
  So fortschrittlich die moderne Medizin auch ist, es gibt immer noch Fälle, in denen man einen Patienten während einer Operation *verbluten lassen* könnte.
  
  Se lui avesse *dissanguato* il pollo correttamente, non avrebbe perso metà del sangue sul pavimento della cucina.
  Wenn er das Huhn richtig *ausbluten gelassen* hätte, hätte er nicht die Hälfte des Blutes auf dem Küchenboden verloren.
