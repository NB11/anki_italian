Rang: 4227
Wort: trascurare
Wortart: vt
Wort mit Artikel: trascurare
Femininum / Plural: ''
IPA: ''
Definition: vernachlässigen
Register: ''
Beispielsätze: |-
  Non *trascurare* i tuoi doveri scolastici, altrimenti rischi di essere bocciato.
  Vernachlässige deine schulischen Pflichten nicht, sonst riskierst du durchzufallen.
  
  Il governo è stato accusato di *trascurare* le esigenze dei cittadini più poveri.
  Die Regierung wurde beschuldigt, die Bedürfnisse der ärmsten Bürger zu *vernachlässigen*.
  
  Mentre leggevo, ho *trascurato* il telefono che squillava insistentemente.
  Während ich las, habe ich das ständig klingelnde Telefon *vernachlässigt*.
  
  Se non avessi *trascurato* le raccomandazioni del medico, non saresti così malato ora.
  Hättest du die Empfehlungen des Arztes nicht *vernachlässigt*, wärst du jetzt nicht so krank.
  
  È importante che nessuno *trascuri* la manutenzione di questo macchinario, dato che è fondamentale per la sicurezza.
  Es ist wichtig, dass niemand die Wartung dieser Maschine *vernachlässigt*, da sie für die Sicherheit entscheidend ist.
