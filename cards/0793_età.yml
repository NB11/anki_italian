Rang: 793
Wort: età
Wortart: n.f
Wort mit Artikel: l'età
Femininum / Plural: età
IPA: ''
Definition: das Alter, -
Register: ''
Beispielsätze: |-
  Non so ancora quanti anni abbia: avrà *l’età* del mio dito?
  Ich weiß noch nicht, wie *alt* sie ist: Ist sie etwa alt wie mein Finger?
  
  Mia nonna ha superato *l’età* dei suoi genitori di vent’anni.
  Meine Großmutter hat *das Alter* ihrer Eltern um zwanzig Jahre übertreffen.
  
  Credo che *l’età* non sia altro che un numero, ma secondo il governo la pensano diversamente.
  Ich glaube, *das Alter* ist nur eine Zahl, aber laut der Regierung sehen sie das anders.
  
  Se non rispetti *l’età* dei tuoi nemici, correrai altrimenti il rischio di finire in prigione.
  Wenn du *das Alter* deiner Feinde nicht respektierst, wirst du sonst schnell im Gefängnis landen.
  
  Diceva sempre che *l’età* non conta, purché si abbia il coraggio di superare ogni pericolo.
  Er sagte immer, *das Alter* zählt nicht, solange man den Mut hat, jede Gefahr zu überwinden.
