Rang: 4242
Wort: zecca
Wortart: n.f
Wort mit Artikel: la zecca
Femininum / Plural: zecche
IPA: ''
Definition: die Zecke, -n
Register: ''
Beispielsätze: |-
  Dopo la passeggiata in campagna, ho trovato una *zecca* sul mio braccio.
  Nach dem Spaziergang in der Natur fand ich eine *Zecke* an meinem Arm.
  
  La *zecca* si è attaccata alla pelle del cane e ha bisogno di essere rimossa con attenzione.
  Die *Zecke* hat sich an der Haut des Hundes festgesetzt und muss vorsichtig entfernt werden.
  
  Se non si controlla subito, la *zecca* può trasmettere malattie pericolose.
  Wenn man sie nicht sofort entfernt, kann die *Zecca* gefährliche Krankheiten übertragen.
  
  Ho chiamato il medico perché la *zecca* si era conficcata troppo nella pelle.
  Ich habe den Arzt angerufen, weil sich die *Zecke* zu tief in die Haut gebohrt hatte.
  
  Nel bosco abbiamo visto una *zecca* che strisciava sul tronco di un albero.
  Im Wald haben wir eine *Zecke* gesehen, die über den Stamm eines Baumes kroch.
