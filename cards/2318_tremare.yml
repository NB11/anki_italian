Rang: 2318
Wort: tremare
Wortart: vi
Wort mit Artikel: tremare
Femininum / Plural: ''
IPA: ''
Definition: zittern
Register: ''
Beispielsätze: |-
  Durante il discorso, si vedeva che *tremava* di paura di fronte alla folla.
  Während der Rede sah man, dass sie vor der *Menschenmenge* zitterte.
  
  Ho sentito che la terra *tremò* violentemente durante la notte scorsa.
  Ich habe gehört, dass die Erde letzte Nacht *stark gezittert* hat.
  
  Se *tremi* di freddo, prendi una coperta dal cassetto!
  Wenn du *zitterst*, nimm eine Decke aus der Schublade!
  
  Speravo che non *tremassi* così tanto prima della performance, ma alla fine è andato tutto bene.
  Ich hoffte, dass du vor dem Auftritt nicht so *zitterst*, aber am Ende ist alles gut gegangen.
  
  Il cane cominciò a *tremare* non appena sentì il rumore dei tuoni in lontananza.
  Der Hund begann zu *zittern*, sobald er das Donnergrollen in der Ferne hörte.
