Rang: 4128
Wort: schizzare
Wortart: vi
Wort mit Artikel: schizzare
Femininum / Plural: ''
IPA: ''
Definition: spritzen, sprühen, sprudeln
Register: ''
Beispielsätze: |-
  Dalla pentola *schizzano* gocce d'olio bollente quando la metto sul fuoco.
  Aus dem Topf *spritzen* heiße Öltropfen, wenn ich ihn auf die Herdplatte stelle.
  
  Vuoi vedere come *schizza* l'acqua dalla fontana vicino al parco?
  Willst du sehen, wie *sprudelt* das Wasser aus dem Brunnen neben dem Park?
  
  Se non chiudi il rubinetto, l'acqua *schizzerà* dappertutto e allagherà il bagno.
  Wenn du den Wasserhahn nicht zudrehst, wird das Wasser *spritzen* und das Bad überfluten.
  
  Era così arrabbiato che ha iniziato a *schizzare* inchiostro ovunque mentre strappava il foglio.
  Er war so wütend, dass er anfing, *Tinte zu spritzen*, wohin er nur konnte, während er das Blatt zerriss.
  
  Questa vernice *schizza* via con un solo strato, senza bisogno di passare due volte.
  Diese Farbe *spritzt* schon mit einer einzigen Schicht ab, ohne dass man zweimal streichen muss.
