Rang: 4566
Wort: vaccino
Wortart: n.m
Wort mit Artikel: il vaccino
Femininum / Plural: vaccini
IPA: ''
Definition: der Impfstoff, -e
Register: ''
Beispielsätze: |-
  Il *vaccino* contro il COVID-19 ha salvato milioni di vite.
  Der *Impfstoff* gegen COVID-19 hat Millionen Leben gerettet.
  
  Nonostante la campagna vaccinale, ci sono ancora molte persone che non si sottopongono al *vaccino*.
  Trotz der Impfkampagne gibt es noch viele Menschen, die sich nicht dem *Impfstoff* unterziehen.
  
  È fondamentale che il governo garantisca la distribuzione del *vaccino* a tutti i cittadini.
  Es ist entscheidend, dass die Regierung die Verteilung des *Impfstoffs* an alle Bürger sicherstellt.
  
  Se avessi saputo che il *vaccino* era sicuro, mi sarei vaccinato prima.
  Wenn ich gewusst hätte, dass der *Impfstoff* sicher war, hätte ich mich früher impfen lassen.
  
  Il medico mi ha consigliato di fare il *vaccino* antinfluenzale ogni autunno.
  Der Arzt hat mir geraten, jeden Herbst die *Impfung* gegen Grippe durchführen zu lassen.
