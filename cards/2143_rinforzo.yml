Rang: 2143
Wort: rinforzo
Wortart: n.m
Wort mit Artikel: il rinforzo
Femininum / Plural: i rinforzi
IPA: ''
Definition: die Verstärkung, -en
Register: ''
Beispielsätze: |-
  Questo *rinforzo* strutturale è necessario per sostenere il peso aggiuntivo.
  Diese strukturelle *Verstärkung* ist nötig, um das zusätzliche Gewicht zu tragen.
  
  Stiamo discutendo l’idea di un *rinforzo* militare nella regione.
  Wir diskutieren die Idee einer militärischen *Verstärkung* in der Region.
  
  Dopo l’infortunio, ha avuto bisogno di un *rinforzo* psicologico prima di tornare in campo.
  Nach der Verletzung brauchte er eine psychologische *Verstärkung*, bevor er aufs Feld zurückkehrte.
  
  I soldati aspettano l’arrivo dei *rinforzi* che dovrebbero arrivare entro sera.
  Die Soldaten warten auf die Ankunft der *Verstärkungen*, die bis zum Abend eintreffen sollten.
  
  Il *rinforzo* del team è stato fondamentale per vincere la partita di martedì.
  Die *Verstärkung* des Teams war entscheidend, um das Spiel am Dienstag zu gewinnen.
