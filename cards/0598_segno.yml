  Der Lehrer hat ein *Zeichen* an die Tafel geschrieben, um die Basis der grammatischen Regel zu zeigen.
  
  Se avessi *segni* di approvazione da parte sua, mi sentirei più sicuro.
  Wenn ich *Zeichen* der Zustimmung von ihm hätte, würde ich mich sicherer fühlen.
