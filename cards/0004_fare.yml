Rang: 4
Wort: fare
Wortart: v
Wort mit Artikel: fare
Femininum / Plural: ''
IPA: ''
Definition: machen, tun, schaffen
Register: ''
Beispielsätze: |-
  Che cosa *fai* questo pomeriggio?
  Was *machst* du heute Nachmittag?
  
  Ieri *ho fatto* una lunga passeggiata nel parco.
  Gestern *bin* ich einen langen Spaziergang im Park *gegangen*.
  
  Se avessi tempo, *farei* un viaggio in Italia.
  Wenn ich Zeit hätte, *würde* ich eine Reise nach Italien *machen*.
  
  Loro *fanno* sempre i compiti a casa.
  Sie *machen* immer die Hausaufgaben zu Hause.
  
  Bis domani *avrò fatto* tutto il lavoro necessario.
  Bis morgen *werde* ich alle notwendige Arbeit *erledigt haben*.
