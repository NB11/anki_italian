Rang: 4
Wort: fare
Wortart: v
Wort mit Artikel: fare
Femininum / Plural: ''
IPA: ''
Definition: machen, tun, handeln
Register: ''
Beispielsätze: |-
  Oggi *faccio* una passeggiata nel parco.
  Heute *mache* ich einen Spaziergang im Park.
  
  Che cosa *hai fatto* ieri sera?
  Was *hast du* gestern Abend *gemacht*?
  
  Se potessi, *farei* un viaggio in Giappone.
  Wenn ich könnte, *würde ich* eine Reise nach Japan *machen*.
  
  *Fate* attenzione quando attraversate la strada!
  *Passt auf*, wenn ihr die Straße überquert!
  
  Spero che *facciate* buon viaggio!
  Ich hoffe, dass ihr eine *gute Reise macht*!
