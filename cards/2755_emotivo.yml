Rang: 2755
Wort: emotivo
Wortart: adj
Wort mit Artikel: emotivo
Femininum / Plural: ''
IPA: ''
Definition: emotional, gefühlsbetont
Register: ''
Beispielsätze: |-
  È una persona molto *emotiva* quando guarda i film drammatici.
  Er ist sehr *emotional*, wenn er dramatische Filme sieht.
  
  Mi sembra che tu sia *emotivo* più del solito oggi.
  Mir scheint, dass du heute *gefühlsbetont* bist wie sonst nicht.
  
  Non essere troppo *emotivo*, cerca di mantenere la calma durante l'esame.
  Sei nicht zu *emotional*, versuche ruhig zu bleiben während der Prüfung.
  
  Ho trovato il suo discorso così *emotivo* che mi sono commosso.
  Ich fand seine Rede so *emotional*, dass ich gerührt war.
  
  Sarebbe *emotiva* la reazione se scoprisse la verità sulla sua famiglia?
  Wäre ihre Reaktion *gefühlsbetont*, wenn sie die Wahrheit über ihre Familie erfahren würde?
