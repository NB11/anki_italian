Beispielsätze: |-
  Marco *flirta* con Giulia da settimane, ma lei non sembra interessata.
  Marco *flirtet* seit Wochen mit Giulia, aber sie scheint nicht interessiert.
  
  Se avessi il coraggio, *flirterei* con quella celebrità.
  Wenn ich den Mut hätte, würde ich mit diesem Star *flirten*.
  
  Mi sono accorto che hai iniziato a *flirtare* con la mia amica, quindi è meglio che ci salutiamo.
  Ich habe gemerkt, dass du angefangen hast, mit meiner Freundin zu *flirten*, also sollten wir uns verabschieden.
  
  Spero che non *flirti* troppo con le ragazze al festival, perché poi ci sono problemi.
  Ich hoffe, du *flirtest* nicht zu sehr mit den Mädchen beim Festival, denn sonst gibt es Ärger.
  
  Dice che vorrebbe *flirtare* con te, ma io penso che sia solo un modo per attirare la tua attenzione.
  Er sagt, er würde gerne mit dir *flirten*, aber ich glaube, das ist nur eine Art, deine Aufmerksamkeit zu gewinnen.
