Rang: 261
Wort: seguire
Wortart: vt
Wort mit Artikel: seguire
Femininum / Plural: ''
IPA: ''
Definition: folgen, verfolgen, beachten
Register: ''
Beispielsätze: |-
  Stasera *seguo* il telegiornale per sapere le ultime notizie.
  Heute Abend *verfolge* ich die Nachrichten, um die neuesten Meldungen zu erfahren.
  
  Hai *seguito* le istruzioni che ti ho dato ieri?
  Hast du *den Anweisungen gefolgt*, die ich dir gestern gegeben habe?
  
  Se *seguirai* il consiglio di tuo padre, tutto andrà meglio.
  Wenn du *auf den Rat deines Vaters hörst*, wird bald alles besser gehen.
  
  Non è necessario *seguire* questa moda solo perché è popolare.
  Es ist nicht nötig, *diesen Trend mitzumachen*, nur weil er gerade angesagt ist.
  
  Mi dispiace, ma *seguiamo* una dieta speciale al momento.
  Es tut mir leid, aber *wir halten gerade eine spezielle Ernährungsweise ein*.
