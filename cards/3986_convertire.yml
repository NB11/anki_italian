Rang: 3986
Wort: convertire
Wortart: vt
Wort mit Artikel: convertire
Femininum / Plural: ''
IPA: ''
Definition: umwandeln, konvertieren, verwandeln
Register: ''
Beispielsätze: |-
  Il sacerdote vuole *convertire* i suoi fedeli a una nuova religione.
  Der Priester will seine Gläubigen in eine neue Religion *bekehren*.
  
  Se non *converti* i dati entro domani, perderai l’accesso al sistema.
  Wenn du die Daten bis morgen nicht *konvertierst*, verlierst du den Zugriff auf das System.
  
  Ha *convertito* la sua passione per la cucina in un lavoro redditizio.
  Er hat seine Leidenschaft fürs Kochen in einen lukrativen Job *umgewandelt*.
  
  Spero che prima o poi tu riesca a *convertire* anche lui alle tue idee.
  Ich hoffe, dass du ihn irgendwann doch noch zu deinen Ideen *bekehren* kannst.
  
  Gli ingegneri stanno cercando di *convertire* l’energia solare in elettricità con un nuovo metodo.
  Die Ingenieure versuchen gerade, Sonnenenergie mit einer neuen Methode in Strom *umzuwandeln*.
