Rang: 1549
Wort: obbligare
Wortart: vt
Wort mit Artikel: obbligare
Femininum / Plural: ''
IPA: ''
Definition: zwingen, verpflichten
Register: ''
Beispielsätze: |-
  Il governo *obbliga* tutti i cittadini a pagare le tasse.
  Die Regierung zwingt alle Bürger, Steuern zu zahlen.
  
  Se non *obbligherà* il ladro a restituire il denaro, sarà denunciato alla polizia.
  Wenn er den Dieb nicht *verpflichtet*, das Geld zurückzugeben, wird er bei der Polizei angezeigt.
  
  La legge *obbligava* le donne a indossare un costume specifico in pubblico.
  Das Gesetz *verpflichtete* Frauen dazu, ein bestimmtes Kostüm in der Öffentlichkeit zu tragen.
  
  Mi *obbligarono* ad aiutare il prigioniero perché ero l’unico in grado di riparare la corda.
  Sie *zwangen* mich, dem Gefangenen zu helfen, weil ich der Einzige war, der das Seil reparieren konnte.
  
  Nonostante la sua volontà di non *obbligare* nessuno, dovette intervenire per evitare una rapina.
  Trotz seines *Willens*, niemanden zu verpflichten, musste er eingreifen, um einen Raubüberfall zu verhindern.
