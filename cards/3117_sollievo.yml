Rang: 3117
Wort: sollievo
Wortart: n.m
Wort mit Artikel: il sollievo
Femininum / Plural: sollievi
IPA: ''
Definition: die Erleichterung, -en
Register: ''
Beispielsätze: |-
  Dopo la notizia della sua guarigione ho provato un grande *sollievo*.
  Nach der Nachricht seiner Genesung spürte ich große *Erleichterung*.
  
  Era così stanco che la pausa gli diede un immenso *sollievo*.
  Er war so erschöpft, dass die Pause ihm eine große *Erleichterung* brachte.
  
  Nonostante la sconfitta, il suo *sollievo* era evidente nel sorriso sereno.
  Trotz der Niederlage war seine *Erleichterung* in seinem entspannten Lächeln sichtbar.
  
  Avrei voluto provare un po' di *sollievo*, ma la situazione restava incerta.
  Ich hätte mir etwas *Erleichterung* gewünscht, aber die Situation blieb ungewiss.
  
  Il medico gli assicurò che, se avesse seguìto le cure, avrebbe trovato *sollievo* presto.
  Der Arzt versicherte ihm, dass er bei Befolgung der Therapie bald *Erleichterung* finden würde.
