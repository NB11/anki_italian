Rang: 1584
Wort: reagire
Wortart: vi
Wort mit Artikel: reagire
Femininum / Plural: ''
IPA: ''
Definition: reagieren
Register: ''
Beispielsätze: |-
  Quando ho sentito la notizia, ho subito *reagito* con rabbia.
  Als ich die Nachricht hörte, habe ich sofort mit Zorn *reagiert*.
  
  L’esperto ha consigliato di non *reagire* troppo in fretta alle critiche.
  Der Experte hat geraten, nicht zu schnell auf Kritiken zu *reagieren*.
  
  Se avessi saputo delle conseguenze, non avrei *reagito* in quel modo.
  Hätte ich die Konsequenzen gekannt, hätte ich nicht so *reagiert*.
  
  Gli alunni *reagiscono* spesso con entusiasmo alle spiegazioni del professore noto.
  Die Schüler *reagieren* oft mit Begeisterung auf die Erklärungen des bekannten Lehrers.
  
  Nonostante l’angoscia, lei ha cercato di *reagire* con lucidità di fronte alla novità sconvolgente.
  Trotz der Angst hat sie versucht, angesichts der erschütternden Neuigkeit besonnen zu *reagieren*.
