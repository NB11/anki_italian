Rang: 561
Wort: ammazzare
Wortart: v
Wort mit Artikel: ammazzare
Femininum / Plural: ''
IPA: ''
Definition: töten, umbringen, ermorden
Register: ''
Beispielsätze: |-
  Se *ammazzi* un ragno con la mano, potresti pentirtene dopo.
  Wenn du eine Spinne mit *der Hand* tötest, könntest du es später bereuen.
  
  Il poliziotto temeva che qualcuno *ammazzasse* il testimone prima del processo.
  Der Polizist fürchtete, jemand könnte den Zeugen vor dem Prozess *töten*.
  
  Era così arrabbiato che avrebbe *ammazzato* chiunque gli avesse risposto male.
  Er war so wütend, dass er jeden *getötet* hätte, der ihm frech geantwortet hätte.
  
  Voleva *ammazzare* il tempo mentre aspettava l’arrivo della sua amica, leggendo una lettera.
  Er wollte sich die *Zeit* vertreiben, während er auf die Ankunft seiner Freundin wartete, indem er einen Brief las.
  
  In qualche film americano *ammazzano* il cattivo con un solo colpo, ma nella realtà non funziona così.
  In einigen amerikanischen Filmen *töten* sie den Bösewicht mit einem einzigen Schuss, aber in der Realität funktioniert das nicht so.
