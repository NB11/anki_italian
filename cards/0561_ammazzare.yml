Rang: 561
Wort: ammazzare
Wortart: v
Wort mit Artikel: ammazzare
Femininum / Plural: ''
IPA: ''
Definition: töten, umbringen
Register: ''
Beispielsätze: |-
  Non vorrei mai *ammazzare* un insetto innocuo.
  Ich möchte niemals ein unschädliches Insekt *töten*.
  
  Dicono che l'assassino abbia *ammazzato* tre persone.
  Sie sagen, der Mörder habe drei Menschen *umgebracht*.
  
  Se continui così, *ammazzerai* la tua piante!
  Wenn du so weitermachst, *bringst* du deine Pflanzen *um*!
  
  Perché hai *ammazzato* il topo con la trappola?
  Warum hast du die Maus mit der Falle *getötet*?
  
  Spero di non *ammazzare* mai nessuno in vita mia.
  Ich hoffe, ich *bringe* niemals irgendjemanden in meinem Leben *um*.
