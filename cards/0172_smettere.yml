Rang: 172
Wort: smettere
Wortart: v
Wort mit Artikel: smettere
Femininum / Plural: ''
IPA: ''
Definition: aufhören, beenden
Register: ''
Beispielsätze: |-
  Devi *smettere* di fumare per la tua salute.
  Du musst mit dem *Rauchen* aufhören für deine Gesundheit.
  
  *Ho smesso* di lavorare alle sei ieri.
  Ich *habe* gestern um sechs Uhr *aufgehört* zu arbeiten.
  
  Non *smetterai* mai di amare quella canzone?
  Wirst du jemals aufhören, dieses Lied zu lieben?
  
  Se *smettessi* di piovere, andremmo al parco.
  Wenn es *aufhören würde* zu regnen, würden wir in den Park gehen.
  
  *Smettila* di parlare così forte!
  Hör auf, so laut zu reden!
