Rang: 1655
Wort: augurare
Wortart: v
Wort mit Artikel: augurare
Femininum / Plural: ''
IPA: ''
Definition: wünschen, jmdm. Glück *wünschen*
Register: ''
Beispielsätze: |-
  Il prete *augura* una buona giornata a tutti i fedeli durante la messa.
  Der Priester *wünscht* allen Gläubigen einen guten Tag während der Messe.
  
  Se potessi *augurare* qualcosa a tuo figlio, che cosa sarebbe secondo te?
  Wenn du deinem Sohn etwas *wünschen* könntest, was wäre es deiner Meinung nach?
  
  Nonostante la crisi, vogliamo *augurare* un futuro migliore ai nostri figli.
  Trotz der *Krise* wollen wir unseren Kindern eine bessere Zukunft wünschen.
  
  Ti *auguro* di trovare presto un buon lavoro, non importa quanto sia difficile la situazione attuale.
  Ich *wünsche* dir, dass du bald eine gute Arbeit findest, egal wie schwierig die aktuelle Lage ist.
  
  Che tu possa *augurare* un po’ di felicità anche agli altri, non solo a te stesso!
  Dass du anderen ein bisschen Glück *wünschen* kannst, nicht nur dir selbst!
