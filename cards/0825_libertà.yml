Rang: 825
Wort: libertà
Wortart: n.f
Wort mit Artikel: la libertà
Femininum / Plural: libertà
IPA: ''
Definition: die Freiheit, -en
Register: ''
Beispielsätze: |-
  La *libertà* è un diritto fondamentale di ogni persona.
  Die *Freiheit* ist ein grundlegendes Recht jeder Person.
  
  Non hai ancora capito il valore della *libertà* di scelta.
  Du hast den Wert der *Freiheit* der Wahl noch nicht verstanden.
  
  Vor cinquant'anni molti chiedevano più *libertà* politica.
  Vor fünfzig Jahren forderten viele mehr politische *Freiheit*.
  
  Dobbiamo difendere la nostra *libertà* di parola.
  Wir müssen unsere *Freiheit* der Rede verteidigen.
  
  Senza *libertà* non esiste vera felicità.
  Ohne *Freiheit* gibt es kein echtes Glück.
