Rang: 825
Wort: libertà
Wortart: n.f
Wort mit Artikel: la libertà
Femininum / Plural: libertà
IPA: ''
Definition: die Freiheit, -en
Register: ''
Beispielsätze: |-
  Dopo *libertà* vissuta in America, è tornato in Italia per stare vicino alla famiglia.
  Nach *Freiheit*, die er in Amerika gelebt hatte, kehrte er nach Italien zurück, um bei der Familie zu sein.
  
  Credo che *libertà* sia il valore più importante per ogni essere umano.
  Ich glaube, dass *Freiheit* der wichtigste Wert für jedes menschliche Wesen ist.
  
  Se non avessi perso il treno, sarei ancora *libero* di viaggiare dove voglio.
  Wenn ich den Zug nicht verpasst hätte, wäre ich noch *frei*, dorthin zu reisen, wo ich will.
  
  Molti giovani lottano per ottenere più *libertà* dai genitori.
  Viele Jugendliche kämpfen darum, mehr *Freiheit* von ihren Eltern zu erhalten.
  
  La *libertà* di parola è fondamentale in una società democratica, disse il giudice Henry nella sua conferenza.
  Die *Redefreiheit* ist in einer demokratischen Gesellschaft entscheidend, sagte Richter Henry in seinem Vortrag.
