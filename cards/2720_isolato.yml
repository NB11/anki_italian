Rang: 2720
Wort: isolato
Wortart: n.m
Wort mit Artikel: l'isolato
Femininum / Plural: isolati
IPA: ''
Definition: die Insel, -n
Register: ''
Beispielsätze: |-
  L'*isolato* di Murano è famoso per i suoi vetrai storici.
  Die Insel Murano ist berühmt für ihre historischen Glasbläser.
  
  Gli *isolati* del centro storico sono molto antichi e pieni di segreti.
  Die *Inseln* der Altstadt sind sehr alt und voller Geheimnisse.
  
  Vorrei visitare un *isolato* dove non ci sono turisti, lontano dal caos.
  Ich möchte eine *Insel* besuchen, wo es keine Touristen gibt – fern von dem Chaos.
  
  Benchè l'*isolato* sia piccolo, offre molti ristoranti tipici.
  Obwohl die *Insel* klein ist, gibt es dort viele typische Restaurants.
  
  Abbiamo affittato una casa sull'*isolato* di fronte alla spiaggia.
  Wir haben ein Haus auf der *Insel* direkt gegenüber dem Strand gemietet.
