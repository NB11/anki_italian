Rang: 1973
Wort: completare
Wortart: vt
Wort mit Artikel: completare
Femininum / Plural: ''
IPA: ''
Definition: beenden, abschließen, vervollständigen
Register: ''
Beispielsätze: |-
  Devo *completare* il modulo prima di consegnarlo all’impiegato.
  Ich muss das Formular *bevor* ich es dem Beamten abgebe.
  
  Se non *completi* gli esercizi entro domani, riceverai una nota negativa.
  Wenn du die Übungen nicht *beendest* bis morgen, bekommst du eine schlechte Note.
  
  Spero che possiamo *completare* questo progetto entro la fine del mese.
  Ich hoffe, dass wir dieses Projekt bis Ende des Monats *abschließen* können.
  
  Era talmente stanco che non riuscì a *completare* nemmeno una frase.
  Er war so müde, dass er nicht einmal einen Satz *beenden* konnte.
  
  Non appena il treno partirà, inizierò a *completare* la relazione che ho lasciato a casa.
  Sobald der Zug abgefahren ist, werde ich damit beginnen, den Bericht zu *fertigstellen*, den ich zu Hause gelassen habe.
