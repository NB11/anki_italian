Rang: 3733
Wort: infuriare
Wortart: vt
Wort mit Artikel: infuriare
Femininum / Plural: ''
IPA: ''
Definition: wütend machen, in Wut versetzen
Register: ''
Beispielsätze: |-
  Le continue interruzioni *infuriano* il direttore, che ha perso la pazienza.
  Die ständigen Unterbrechungen machen den *Leiter* wütend, der die Geduld verliert.
  
  Mi *infurio* quando qualcuno butta la spazzatura dal finestrino della macchina.
  Es *macht mich wütend*, wenn jemand den Müll aus dem Autofenster wirft.
  
  Il rumore del trapano *infuriava* la mamma mentre cercava di dormire.
  Das Geräusch der Bohrmaschine *machte die Mama wütend*, während sie versuchte zu schlafen.
  
  Se non la smetti di urlare, *infurierai* tutti i vicini!
  Wenn du nicht aufhörst zu schreien, *wirst du alle Nachbarn in Wut versetzen*!
  
  Era così stanco che basta il caffè a *infuriarlo* ulteriormente.
  Er war so müde, dass allein der Kaffee ihn noch *weiter wütend macht*.
