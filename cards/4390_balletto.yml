Rang: 4390
Wort: balletto
Wortart: n.m
Wort mit Artikel: il balletto
Femininum / Plural: i balletti
IPA: ''
Definition: das Ballett, -s
Register: ''
Beispielsätze: |-
  Mio figlio studia danza classica e vorrebbe *ballare* il balletto a teatro.
  Mein Sohn studiert klassischen Tanz und würde gerne *Ballett* im Theater tanzen.
  
  Il coreografo ha deciso di mettere in scena un nuovo *balletto* ispirato alla mitologia greca.
  Der Choreograf hat beschlossen, ein neues *Ballett* zur griechischen Mythologie aufzuführen.
  
  Nonostante il freddo, siamo andati al teatro per vedere lo spettacolo di *balletto* che avevamo prenotato.
  Trotz der Kälte sind wir ins Theater gegangen, um die *Ballett*-Aufführung zu sehen, die wir gebucht hatten.
  
  Se avessi tempo, mi piacerebbe prendere lezioni di *balletto*, ma ora sono troppo occupata.
  Wenn ich Zeit hätte, würde ich gerne *Ballett*-Unterricht nehmen, aber jetzt bin ich zu beschäftigt.
  
  Il *balletto* moderno spesso rompe con le tradizioni classiche, ma non sempre il pubblico lo apprezza.
  Das moderne *Ballett* bricht oft mit klassischen Traditionen, aber das Publikum schätzt es nicht immer.
