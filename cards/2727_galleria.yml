Rang: 2727
Wort: galleria
Wortart: n.f
Wort mit Artikel: la galleria
Femininum / Plural: gallerie
IPA: ''
Definition: der Tunnel, die Galerie
Register: ''
Beispielsätze: |-
  La *galleria* sotterranea collega due quartieri della città.
  Der unterirdische *Tunnel* verbindet zwei Stadtteile.
  
  Hanno aperto una nuova *galleria* d’arte moderna ieri sera.
  Sie haben gestern Abend eine neue *Galerie* für moderne Kunst eröffnet.
  
  Se non fosse per la *galleria* di servizio, non potremmo accedere ai binari.
  Ohne den Service-*Tunnel* könnten wir nicht zu den Gleisen gelangen.
  
  La polizia ha localizzato il fuggitivo nella *galleria* abbandonata.
  Die Polizei hat den Flüchtling in der verlassenen *Galerie* aufgefunden.
  
  Spero che questa *galleria* di quadri venga visitata da molti amanti dell’arte.
  Ich hoffe, dass diese *Galerie* mit Gemälden von vielen Kunstliebhabern besucht wird.
