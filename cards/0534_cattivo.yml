Rang: 534
Wort: cattivo
Wortart: adj
Wort mit Artikel: cattivo
Femininum / Plural: ''
IPA: ''
Definition: schlecht, böse, schlimm
Register: ''
Beispielsätze: |-
  Credo che tu abbia un atteggiamento *cattivo* nei suoi confronti.
  Ich glaube, dass du eine *schlechte* Haltung gegenüber ihm hast.
  
  Se fossi in te, non avrei accettato quel *cattivo* consiglio.
  Wenn ich du wäre, hätte ich diesen *schlechten* Rat nicht angenommen.
  
  Non mi piace quando fai il *cattivo* con i bambini piccoli.
  Ich mag es nicht, wenn du dich *böse* gegenüber kleinen Kindern benimmst.
  
  Quella decisione è stata *cattiva*: ha causato molti problemi.
  Diese Entscheidung war *schlimm*: sie hat viele Probleme verursacht.
  
  Non importa quanto tu sia *cattivo*, alla fine tutti hanno bisogno di un po' di gentilezza.
  Egal wie *schlecht* du auch bist, am Ende braucht jeder ein bisschen Freundlichkeit.
