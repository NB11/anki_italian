Rang: 534
Wort: cattivo
Wortart: adj
Wort mit Artikel: cattivo
Femininum / Plural: ''
IPA: ''
Definition: schlecht, böse
Register: ''
Beispielsätze: |-
  Quel *cattivo* cane abbaia sempre.
  Dieser *böse* Hund bellt immer.
  
  Non essere *cattivo* con tuo fratello!
  Sei nicht *böse* zu deinem Bruder!
  
  È stato molto *cattivo* con me ieri.
  Er war gestern sehr *schlecht* zu mir.
  
  Credi che sia un *cattivo* insegnante?
  Glaubst du, dass er ein *schlechter* Lehrer ist?
  
  I *cattivi* ragazzi non ascoltano mai.
  Die *bösen* Kinder hören nie zu.
