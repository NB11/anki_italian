Definition: das Netzwerk, -e
Register: ''
Beispielsätze: |-
  Il *network* di questa città è molto esteso e ben organizzato.
  Das *Netzwerk* dieser Stadt ist sehr ausgedehnt und gut organisiert.
  
  Hanno costruito un *network* di protezione per gli animali in via di estinzione.
  Sie haben ein *Netzwerk* zum Schutz gefährdeter Tiere aufgebaut.
  
  Senza un *network* affidabile, la trasmissione dei dati diventa difficile.
  Ohne ein zuverlässiges *Netzwerk* wird die Datenübertragung schwierig.
  
  Il *network* aziendale include anche partner stranieri.
  Das Firmen-*Netzwerk* umfasst auch ausländische Partner.
  
  Vorresti espandere il tuo *network* professionale con un corso di aggiornamento?
  Möchtest du dein berufliches *Netzwerk* mit einem Fortbildungskurs erweitern?
