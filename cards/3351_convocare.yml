Rang: 3351
Wort: convocare
Wortart: vt
Wort mit Artikel: convocare
Femininum / Plural: ''
IPA: ''
Definition: einberufen, vorladen
Register: ''
Beispielsätze: |-
  Il sindaco ha *convocato* una riunione urgente per discutere la nuova tassa.
  Der Bürgermeister hat ein dringendes Treffen zur Diskussion der neuen *Steuer* einberufen.
  
  L’allenatore *convocò* i giocatori più giovani per l’allenamento di domani.
  Der Trainer berief die jüngeren Spieler für das Training morgen *vor*.
  
  Non posso credere che abbiano *convocato* una seduta straordinaria solo per questo problema.
  Ich kann nicht glauben, dass sie eine außerordentliche Sitzung nur wegen dieses Problems einberufen haben.
  
  Se fossi il preside, *convocerei* immediatamente i genitori di quel ragazzo.
  Wenn ich der Schulleiter wäre, würde ich sofort die Eltern dieses Jungen *vorladen*.
  
  Il giudice decise di *convocare* l’imputato affinché potesse chiarire la sua posizione.
  Der Richter entschied, den Angeklagten *vorzuladen*, damit er seine Position klären konnte.
