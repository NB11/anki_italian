Rang: 642
Wort: legge
Wortart: n.f
Wort mit Artikel: la legge
Femininum / Plural: leggi
IPA: ''
Definition: das Gesetz, -e
Register: ''
Beispielsätze: |-
  La *legge* italiana vieta questo comportamento.
  Das *italienische Gesetz* verbietet dieses Verhalten.
  
  Hanno approvato una nuova *legge* sul lavoro.
  Sie haben ein neues *Gesetz* zum Thema Arbeit verabschiedet.
  
  Secondo la *legge*, tutti sono uguali dinanzi alla giustizia.
  Laut dem *Gesetz* sind alle vor dem Gesetz gleich.
  
  Dobbiamo rispettare la *legge* per vivere in una società ordinata.
  Wir müssen das *Gesetz* einhalten, um in einer geordneten Gesellschaft zu leben.
  
  Chi non rispetta la *legge* deve affrontare delle conseguenze.
  Wer das *Gesetz* nicht beachtet, muss mit Konsequenzen rechnen.
