Rang: 737
Wort: documento
Wortart: n.m
Wort mit Artikel: il documento
Femininum / Plural: documenti
IPA: ''
Definition: die Urkunde, -n
Register: ''
Beispielsätze: |-
  Devi presentare il *documento* alla reception prima di entrare nella sala conferenze.
  Du musst den *Ausweis* an der Rezeption vor dem Betreten des Konferenzsaals vorlegen.
  
  Ho perso il mio *documento* d’identità e devo andare al commissariato a denunciarlo.
  Ich habe meinen *Personalausweis* verloren und muss zur Polizeiwache, um ihn zu melden.
  
  Nel caso tu non abbia con te il *documento*, non potrai partecipare alla partita di domani.
  Falls du deinen *Ausweis* nicht dabei hast, kannst du am morgigen Spiel nicht teilnehmen.
  
  Gli archivi dell’ufficio sono pieni di *documenti* vecchi che nessuno legge più.
  Die Akten des Büros sind voller alter *Dokumente*, die niemand mehr liest.
  
  Quando ho aperto la borsa, ho trovato un *documento* che non ricordavo di aver messo lì dentro.
  Als ich meine Tasche geöffnet habe, habe ich ein *Dokument* gefunden, das ich nicht mehr eingesteckt hatte.
