Rang: 1071
Wort: innocente
Wortart: adj
Wort mit Artikel: innocente
Femininum / Plural: ''
IPA: ''
Definition: unschuldig, unschuldige, Unschuldige
Register: ''
Beispielsätze: |-
  L'avvocato difende un uomo *innocente* che è stato accusato ingiustamente.
  Der Anwalt verteidigt einen *unschuldigen* Mann, der zu Unrecht angeklagt wurde.
  
  Nonostante le prove, il giudice ritenne la donna *innocente* e la assolse.
  Trotz der Beweise hielt der Richter die Frau für *unschuldig* und sprach sie frei.
  
  Credi davvero che Marco sia *innocente*, o hai dei dubbi?
  Glaubst du wirklich, dass Marco *unschuldig* ist, oder hast du Zweifel?
  
  Il documentario racconta la storia di un *innocente* che ha trascorso anni in prigione per un crimine non commesso.
  Die Dokumentation erzählt die Geschichte eines *Unschuldigen*, der Jahre im Gefängnis verbracht hat für ein Verbrechen, das er nicht begangen hat.
  
  Se foste tutti un po’ più *innocenti*, il mondo sarebbe meno complicato.
  Wenn ihr alle ein bisschen *unschuldiger* wärt, wäre die Welt weniger kompliziert.
