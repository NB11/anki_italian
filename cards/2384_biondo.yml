Beispielsätze: |-
  La bambina ha i capelli *biondi* e gli occhi azzurri.
  Das Mädchen hat *blonde* Haare und blaue Augen.
  
  Se non fosse per quei capelli *biondi*, non lo riconoscerei.
  Wenn es nicht die *blonden* Haare wären, würde ich ihn nicht erkennen.
  
  I suoi amici dicono che ha un aspetto *biondo* molto naturale.
  Seine Freunde sagen, dass er sehr natürlich *blond* aussieht.
  
  Vorrei tingermi i capelli *biondi*, ma temo di non stare bene con questa carnagione.
  Ich würde mir gerne die Haare *blond* färben, aber ich fürchte, das steht mir nicht.
  
  Nella foto di classe spicca un ragazzo con i ricci *biondi*, che sembra appena uscito da un film degli anni Cinquanta.
  Auf dem Klassenfoto fällt ein Junge mit *blonden* Locken auf, der wirkt, als wäre er einem Film aus den Fünfzigern entsprungen.
