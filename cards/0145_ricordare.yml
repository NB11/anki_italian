Rang: 145
Wort: ricordare
Wortart: vt
Wort mit Artikel: ricordare
Femininum / Plural: ''
IPA: ''
Definition: sich erinnern
Register: ''
Beispielsätze: |-
  Ti *ricordo* di comprare il pane oggi.
  Ich *erinnere* dich daran, heute Brot zu kaufen.
  
  Non *ho ricordato* il suo nome ieri sera.
  Ich *habe* ihren Namen gestern Abend nicht *erinnert*.
  
  Speravo che tu *ricordassi* la data del suo compleanno.
  Ich hoffte, dass du an ihren Geburtstag *dich erinnern würdest*.
  
  Come *ricordare* tutte queste parole velocemente?
  Wie kann man sich alle diese Wörter schnell *merken*?
  
  Mi piacerebbe che lui *avesse ricordato* il nostro appuntamento.
  Ich wünschte, er *hätte* unser Treffen *in Erinnerung behalten*.
