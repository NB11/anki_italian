Rang: 2110
Wort: telefonico
Wortart: adj
Wort mit Artikel: telefonico
Femininum / Plural: ''
IPA: ''
Definition: telefonisch
Register: ''
Beispielsätze: |-
  Ha ricevuto una chiamata *telefonica* dal suo medico alle tre di notte.
  Er hat einen *telefonischen* Anruf von seinem Arzt um drei Uhr nachts erhalten.
  
  Nonostante la distanza, il contatto *telefonico* tra loro è rimasto costante.
  Trotz der Entfernung blieb der *telefonische* Kontakt zwischen ihnen konstant.
  
  Se avessi bisogno di aiuto, ti darei subito un numero *telefonico* di emergenza.
  Falls ich Hilfe bräuchte, würde ich dir sofort eine *telefonische* Notrufnummer geben.
  
  La polizia ha avviato un'indagine *telefonica* per risalire al chiamante misterioso.
  Die Polizei hat eine *telefonische* Ermittlung eingeleitet, um den mysteriösen Anrufer zu identifizieren.
  
  È vietato utilizzare la linea *telefonica* durante gli esami scritti.
  Die *telefonische* Leitung darf während der schriftlichen Prüfungen nicht genutzt werden.
