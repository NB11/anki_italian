Rang: 814
Wort: società
Wortart: n.f
Wort mit Artikel: la società
Femininum / Plural: società
IPA: ''
Definition: die Gesellschaft, -en
Register: ''
Beispielsätze: |-
  La *società* moderna deve affrontare molte sfide ambientali che il governo non riesce a sopportare.
  Die moderne *Gesellschaft* muss viele Umweltprobleme bewältigen, die die Regierung nicht ertragen kann.
  
  Nonostante il cambio tecnologico, la *società* italiana resta molto legata alle tradizioni personali.
  Trotz des technologischen *Wandels* bleibt die italienische Gesellschaft sehr mit individuellen Traditionen verbunden.
  
  Se la *società* non inizia a discutere seriamente del problema, andremo incontro a una dannazione collettiva.
  Wenn die *Gesellschaft* nicht beginnt, das Problem ernsthaft zu besprechen, werden wir einer kollektiven Verdammnis entgegeneilen.
  
  L’ex sergente ha confessato che la *società* militare lo aveva costretto ad azioni che giudica peccato.
  Der ehemalige *Unteroffizier* hat gestanden, dass die militärische Gesellschaft ihn zu Taten gezwungen hat, die er als Sünde empfindet.
  
  Stanotte, mentre passeggiavo vicino al mare, ho visto una fata che mi ha parlato della *società* perduta dei pianeti.
  Heute Nacht, als ich am *Meer* entlangging, sah ich eine Fee, die mir von der verlorenen Gesellschaft der Planeten erzählte.
