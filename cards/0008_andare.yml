Wort: andare
Wortart: vi
Wort mit Artikel: andare
Femininum / Plural: ''
IPA: ''
Definition: gehen, fahren
Register: ''
Beispielsätze: |-
  Domani *andrò* in montagna con i miei amici.
  Morgen *werde ich* in die Berge mit meinen Freunden *fahren*.
  
  *Vai* spesso in palestra?
  *Geht* er/sie oft ins Fitnessstudio?
  
  Spero che *tu vada* alla festa stasera.
  Ich hoffe, dass *du zur Party heute Abend gehst*.
  
  *Andavamo* spesso al lago da bambini.
  Wir *gingen* oft zum See, als wir Kinder *waren*.
  
  Se *andassi* più piano, non sbaglierei la strada.
  Wenn *du langsamer fährst*, würde ich die Straße nicht *verfehlen*.
