Rang: 4495
Wort: piuma
Wortart: n.f
Wort mit Artikel: la piuma
Femininum / Plural: piume
IPA: ''
Definition: die Feder, -n
Register: ''
Beispielsätze: |-
  Ho trovato una *piuma* bianca sul letto mentre facevo le pulizie.
  Ich habe *eine Feder* auf dem Bett gefunden, während ich geputzt habe.
  
  Nonostante il freddo, la *piuma* sul cuscino sembrava ancora calda al tatto.
  Trotz der Kälte fühlte sich *die Feder* auf dem Kissen noch warm an.
  
  Se avessi una *piuma* così morbida, la userei per scrivere poesie!
  Wenn ich eine so weiche *Feder* hätte, würde ich damit Gedichte schreiben!
  
  Dicono che trovare una *piuma* nera porti sfortuna, ma io non ci credo.
  Man sagt, dass das Finden einer schwarzen *Feder* Unglück bringt, aber ich glaube nicht daran.
  
  La *piuma* che hai in mano è di un uccello raro, dovresti portarla in un museo!
  Die *Feder*, die du in der Hand hältst, stammt von einem seltenen Vogel – du solltest sie in ein Museum bringen!
