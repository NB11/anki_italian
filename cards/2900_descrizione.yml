Beispielsätze: |-
  Nella *descrizione* del film c'era un grande entusiasmo per i personaggi principali.
  In der *Beschreibung* des Films gab es große Begeisterung für die Hauptfiguren.
  
  Ho letto con attenzione la *descrizione* dettagliata dell’itinerario prima di partire.
  Ich habe die detaillierte *Beschreibung* der Route aufmerksam gelesen, bevor ich losfuhr.
  
  La *descrizione* che hai fatto del nuovo ristorante è molto più invitante delle recensioni online.
  Die *Beschreibung*, die du vom neuen Restaurant gemacht hast, ist viel einladender als die Online-Bewertungen.
  
  Nonostante la sua *descrizione* accurata, non siamo riusciti a trovare il negozio che cercavamo.
  Trotz der genauen *Beschreibung* haben wir den Laden, den wir suchten, nicht gefunden.
  
  La *descrizione* del paesaggio che hai scritto sembra tratta da un romanzo romantico ottocentesco.
  Die *Beschreibung* der Landschaft, die du geschrieben hast, wirkt wie aus einem romantischen Roman des 19. Jahrhunderts.
