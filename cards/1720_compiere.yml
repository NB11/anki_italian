Rang: 1720
Wort: compiere
Wortart: v
Wort mit Artikel: compiere
Femininum / Plural: ''
IPA: ''
Definition: vollenden, ausführen, begehen, vollbringen
Register: ''
Beispielsätze: |-
  Mio cugino ha *compiuto* 30 anni ieri sera con una grande festa.
  Mein Cousin hat sein *dreißigstes* Lebensjahr vollendet.
  
  Spero che tu possa *compiere* tutti i tuoi sogni prima della pensione.
  Ich hoffe, dass du alle deine Träume *verwirklichen* kannst, bevor du in Rente gehst.
  
  La polizia indaga perché qualcuno ha *compiuto* un attentato nei confronti del politico.
  Die Polizei ermittelt, weil jemand einen Anschlag auf den Politiker *versucht hat zu verüben*.
  
  Non appena avrai *compiuto* questa commissione, potrai uscire dal lavoro.
  Sobald du diese Aufgabe *erledigt* hast, darfst du die Arbeit verlassen.
  
  Se non *compi* il pagamento entro il quarto, dovrai annullare l'iscrizione.
  Wenn du die Zahlung nicht *leistest* innerhalb der Frist, musst du die Anmeldung stornieren.
