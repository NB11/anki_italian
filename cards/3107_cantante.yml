Rang: 3107
Wort: cantante
Wortart: n.m/f
Wort mit Artikel: il cantante
Femininum / Plural: cantanti
IPA: ''
Definition: der Sänger, - / die Sängerin, -nen
Register: ''
Beispielsätze: |-
  Il *cantante* ha ricevuto un premio per la sua nuova canzone.
  Der *Sänger* hat einen Preis für seinen neuen Song erhalten.
  
  Chi è quel *cantante* che ha partecipato all'ultimo campionato musicale?
  Wer ist dieser *Sänger*, der am letzten Musikwettbewerb teilgenommen hat?
  
  Sebbene fosse stanco, il *cantante* si esibì con grande energia davanti al pubblico.
  Obwohl er müde war, *sang* der Sänger mit großer Energie vor dem Publikum.
  
  Ho sentito dire che la *cantante* irlandese registrerà un nuovo album il prossimo giugno.
  Ich habe gehört, dass die irische *Sängerin* im nächsten Juni ein neues Album aufnehmen wird.
  
  Se fossi un *cantante*, vorrei esibirmi in un grande stadio invece che in un piccolo campus.
  Wenn ich ein *Sänger* wäre, würde ich in einem großen Stadion auftreten und nicht auf einem kleinen Campus.
