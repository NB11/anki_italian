Rang: 2531
Wort: tempio
Wortart: n.m
Wort mit Artikel: il tempio
Femininum / Plural: i templi
IPA: ''
Definition: der Tempel, -
Register: ''
Beispielsätze: |-
  Il *tempio* greco è stato costruito migliaia di anni fa.
  Der *Tempel* wurde vor Tausenden von Jahren erbaut.
  
  Credo che tu abbia dimenticato le chiavi dentro al *tempio*.
  Ich glaube, du hast die Schlüssel *im Tempel* vergessen.
  
  Se avessi più tempo, visiterei ogni *tempio* della città.
  Wenn ich mehr Zeit hätte, würde ich jeden *Tempel* in der Stadt besuchen.
  
  Non appena entrerà in vigore il nuovo protocollo, il *tempio* verrà protetto meglio.
  Sobald das neue Protokoll in Kraft tritt, wird der *Tempel* besser geschützt werden.
  
  Dopotutto, il *tempio* non era solo un luogo di culto, ma anche un rifugio.
  Nach alledem war der *Tempel* nicht nur ein Ort der Anbetung, sondern auch eine Zuflucht.
