Rang: 4656
Wort: collocare
Wortart: vt
Wort mit Artikel: collocare
Femininum / Plural: ''
IPA: ''
Definition: platzieren, anordnen, unterbringen
Register: ''
Beispielsätze: |-
  Dove possiamo *collocare* questo scaffale affinché non intralci il passaggio?
  Wo können wir das Regal *platzieren*, damit es nicht im Weg steht?
  
  Il pittore ha deciso di *collocare* il ritratto proprio di fronte alla porta d’ingresso.
  Der Maler hat beschlossen, das Porträt genau *gegenüber* der Eingangstür anzubringen.
  
  Bisogna *collocare* questi documenti in un archivio sicuro prima che qualcuno li perda.
  Man muss diese Dokumente in einem sicheren Archiv *unterbringen*, bevor jemand sie verliert.
  
  Se *collocassi* la lampada lì, la luce sarebbe perfetta per leggere un libro.
  Wenn du die Lampe dort *platzierst*, wäre das Licht perfekt zum Lesen eines Buches.
  
  La scultura è stata *collocata* nel giardino comunale per celebrare l’anniversario della città.
  Die Skulptur wurde im *städtischen* Garten aufgestellt, um das Jubiläum der Stadt zu feiern.
