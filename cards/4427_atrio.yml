Rang: 4427
Wort: atrio
Wortart: n.m
Wort mit Artikel: l'atrio
Femininum / Plural: atri
IPA: ''
Definition: die Vorhalle, -n, der Eingangsbereich
Register: ''
Beispielsätze: |-
  L'*atrio* della villa era arredato con mobili antichi e un grande specchio dorato.
  Der *Eingangsbereich* der Villa war mit antiken Möbeln und einem großen goldenen Spiegel eingerichtet.
  
  Mentre entravo, ho notato che l'*atrio* odorava di legno fresco e di cera.
  Als ich eintrat, bemerkte ich, dass der *Eingangsbereich* nach frischem Holz und Wachs roch.
  
  Credevi davvero di trovare la chiave proprio nell'*atrio*? Ma non è lì!
  Glaubst du etwa, du würdest den Schlüssel *genau im Eingangsbereich* finden? Der ist doch gar nicht dort!
  
  Se il ladro avesse fatto rumore nell'*atrio*, l'allarme sarebbe scattato immediatamente.
  Wenn der Dieb im *Eingangsbereich* Lärm gemacht hätte, wäre der Alarm sofort ausgelöst worden.
  
  L'*atrio* della stazione era affollato di viaggiatori in attesa del treno per Milano.
  Der *Eingangsbereich* des Bahnhofs war voller Reisender, die auf den Zug nach Mailand warteten.
