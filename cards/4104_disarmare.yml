Rang: 4104
Wort: disarmare
Wortart: vt
Wort mit Artikel: disarmare
Femininum / Plural: ''
IPA: ''
Definition: entwaffnen, deaktivieren
Register: ''
Beispielsätze: |-
  Il governo ha deciso di *disarmare* tutte le milizie ribelli entro la fine dell'anno.
  Die Regierung hat beschlossen, alle Rebellenmilizien bis Jahresende zu *entwaffnen*.
  
  Finalmente hanno *disarmato* la bomba che minacciava il quartiere.
  Endlich haben sie die Bombe, die das Viertel bedrohte, zu *deaktivieren*.
  
  Se *disarmassero* gli aggressori prima delle trattative, forse ci sarebbero meno vittime.
  Wenn sie die Angreifer vor den Verhandlungen *entwaffnen* würden, gäbe es vielleicht weniger Opfer.
  
  Hanno fatto di tutto per *disarmare* la protesta, ma la gente non ha ceduto.
  Sie haben alles versucht, um die Proteste zu *deeskalieren*, aber die Menschen sind nicht nachgegeben.
  
  L'esercito riuscì a *disarmare* il nemico senza sparare un colpo.
  Die Armee schaffte es, den Feind zu *entwaffnen*, ohne einen Schuss abzugeben.
Audio: ''
Notiz: ''
Dispersion: ''
