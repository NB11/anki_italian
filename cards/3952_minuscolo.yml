Definition: winzig, sehr klein
Register: ''
Beispielsätze: |-
  Ho trovato un *minuscolo* insetto sul mio foglio.
  Ich habe ein *winziges* Insekt auf meinem Blatt gefunden.
  
  Questo appartamento ha una cucina *minuscola* ma ben organizzata.
  Diese Wohnung hat eine *winzige* Küche, aber gut organisiert.
  
