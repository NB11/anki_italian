  Obwohl sie *winzig* war, erwies sich ihre Idee als genial.
  
  Hai visto quel *minuscolo* pulsante? Non si trova mai!
  Hast du diesen *winzigen* Knopf gesehen? Den findet man nie!
  
  La scritta era così *minuscola* che ho dovuto usare una lente d’ingrandimento.
  Die Schrift war so *winzig*, dass ich eine Lupe brauchte.
