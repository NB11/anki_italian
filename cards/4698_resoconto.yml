Rang: 4698
Wort: resoconto
Wortart: n.m
Wort mit Artikel: il resoconto
Femininum / Plural: resoconti
IPA: ''
Definition: der Bericht, -e
Register: ''
Beispielsätze: |-
  Il giornalista ha scritto un accurato *resoconto* degli ultimi avvenimenti politici.
  Der Journalist hat einen genauen *Bericht* über die letzten politischen Ereignisse geschrieben.
  
  Secondo il *resoconto* della polizia, il furto è stato compiuto durante la notte.
  Laut dem *Bericht* der Polizei wurde der Diebstahl in der Nacht begangen.
  
  Vorrei leggere il *resoconto* finanziario dell'azienda per capire la situazione.
  Ich möchte den finanziellen *Bericht* des Unternehmens lesen, um die Lage zu verstehen.
  
  Il professor Rossi ha presentato un *resoconto* dettagliato della sua ricerca all'ultimo convegno.
  Professor Rossi hat auf der letzten Konferenz einen detaillierten *Bericht* über seine Forschung vorgestellt.
  
  Il *resoconto* meteorologico prevede piogge abbondanti per domani in tutta la regione.
  Der Wetter*bericht* sagt für morgen reichlich Regen in der gesamten Region voraus.
