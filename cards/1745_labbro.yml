Rang: 1745
Wort: labbro
Wortart: n.m
Wort mit Artikel: il labbro
Femininum / Plural: le labbra
IPA: ''
Definition: die Lippe, -n
Register: ''
Beispielsätze: |-
  Si è morso *il labbro* per non ridere quando ha sentito quella battuta buffa.
  Er hat sich *die Lippe* gebissen, um nicht zu lachen, als er den witzigen Spruch hörte.
  
  Le sue labbra erano screpolate *per il freddo* invernale.
  Seine *Lippen* waren durch die winterliche Kälte spröde.
  
  Nonostante il dolore, si è trattenuto dal toccarsi *il labbro* gonfio per l’urto.
  Trotz des Schmerzes hielt er sich davon ab, sich *die geschwollene Lippe* nach dem Stoß zu berühren.
  
  Se avessi tempo, mi piacerebbe studiare come il rossetto influenzi la percezione di *il labbro* in fotografia.
  Wenn ich Zeit hätte, würde ich gerne untersuchen, wie Lippenstift die Wahrnehmung von *der Lippe* in Fotos beeinflusst.
  
  Ha confessato che si era pentito di aver lasciato che *il labbro* inferiore si colorisse di viola dopo la scottatura.
  Er gestand, dass er es bereute, *die Unterlippe* nach der Verbrennung lila werden zu lassen.
