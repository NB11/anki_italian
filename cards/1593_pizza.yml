Rang: 1593
Wort: pizza
Wortart: n.f
Wort mit Artikel: la pizza
Femininum / Plural: pizze
IPA: ''
Definition: die Pizza, Pizzen
Register: ''
Beispielsätze: |-
  Mia zia ha cucinato una *pizza* deliziosa per la cena di ieri.
  Meine Tante hat eine *leckere Pizza* zum Abendessen gestern gekocht.
  
  Vorrei sapere se in questo ristorante c’è ancora qualche *pizza* rimasta.
  Ich möchte wissen, ob in diesem Restaurant noch *Pizza* übrig ist.
  
  Dopo la lunga attesa in coda, abbiamo finalmente ricevuto la nostra *pizza*.
  Nach der langen Wartezeit in der Schlange haben wir endlich unsere *Pizza* erhalten.
  
  Se non hai fame, almeno assaggia un pezzetto di *pizza* che ho ordinato apposta per te!
  Wenn du keinen Hunger hast, probier wenigstens ein Stück *Pizza*, das ich extra für dich bestellt habe!
  
  Il cuoco ha promesso di preparare una *pizza* con gli ingredienti più freschi della stagione.
  Der Koch hat versprochen, eine *Pizza* mit den frischesten Zutaten der Saison zuzubereiten.
