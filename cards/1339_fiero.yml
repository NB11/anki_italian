Rang: 1339
Wort: fiero
Wortart: adj
Wort mit Artikel: fiero
Femininum / Plural: ''
IPA: ''
Definition: stolz, überzeugt, erfreut
Register: ''
Beispielsätze: |-
  È *fiero* del suo figlio che ha vinto il premio straordinario in matematica.
  Er ist *stolz* auf seinen Sohn, der den außergewöhnlichen Preis in Mathematik gewonnen hat.
  
  La regina mostrava un’espressione *fiera* durante la cerimonia di gala, piena di maestà.
  Die Königin zeigte einen *stolzen* Gesichtsausdruck während der Gala-Zeremonie, voller Würde.
  
  Anche se ha fallito, lui non sembra *fiero* di sé, anzi, si vergogna molto.
  Auch wenn er *gescheitert* ist, wirkt er nicht stolz auf sich, im Gegenteil, er schämt sich sehr.
  
  Dopo aver guarito dalla malattia, Marco si sente *fiero* di avercela fatta da solo.
  Nachdem er von der Krankheit *geheilt* wurde, fühlt sich Marco stolz, es allein geschafft zu haben.
  
  Sai che Giulia ha ricevuto una copia del suo primo dipinto? Ne è *fiera* decisamente!
  Wusstest du, dass Giulia eine *Kopie* ihres ersten Gemäldes erhalten hat? Davon ist sie eindeutig stolz!
