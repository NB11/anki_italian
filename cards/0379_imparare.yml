Rang: 379
Wort: imparare
Wortart: v
Wort mit Artikel: imparare
Femininum / Plural: ''
IPA: ''
Definition: lernen, erlernen
Register: ''
Beispielsätze: |-
  Vuoi *imparare* l'italiano con me?
  Möchtest du *lernen*, Italienisch mit mir *zu lernen*?
  
  Ho imparato molte cose utili durante il corso.
  Ich habe während des Kurses viele nützliche Dinge *gelernt*.
  
  Speriamo che tu impari presto!
  Wir hoffen, dass du bald *lernst*!
  
  Avrei voluto imparare a nuotare da bambino.
  Ich hätte als Kind schwimmen *lernen* wollen.
  
  Stanno imparando l’italiano da soli, senza insegnante.
  Sie lernen Italienisch selbstständig, ohne Lehrer *zu lernen*.
