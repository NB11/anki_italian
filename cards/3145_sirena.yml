Rang: 3145
Wort: sirena
Wortart: n.f
Wort mit Artikel: la sirena
Femininum / Plural: sirene
IPA: ''
Definition: die Sirene, -n
Register: ''
Beispielsätze: |-
  Ho sentito *sirene* che suonavano in lontananza durante l'atterraggio notturno.
  Ich habe *Sirenen* gehört, die während der nächtlichen Landung ertönten.
  
  Non mi stupisce che abbiate incontrato *sirene* in quel supermercato vicino al porto.
  Es überrascht mich nicht, dass ihr in dem Supermarkt nahe am Hafen *Sirenen* angetroffen habt.
  
  Se fossi consapevole dei pericoli, eviteresti di nuotare dove ci sono *sirene* che emettono suoni acuti.
  Wenn du dir der Gefahren bewusst wärst, würdest du dort nicht schwimmen, wo *Sirenen* schrille Töne von sich geben.
  
  È pericoloso avvicinarsi troppo alle *sirene* quando sono in modalità di avvertimento.
  Es ist gefährlich, den *Sirenen* zu nahe zu kommen, wenn sie in Warnmodus sind.
  
  Quando la *sirena* dell'allarme antincendio si è attivata, tutti sono fuggiti in preda al terrore.
  Als die Alarm-*Sirene* losging, sind alle in panischer Angst geflohen.
