Rang: 2503
Wort: orgoglio
Wortart: n.m
Wort mit Artikel: l'orgoglio
Femininum / Plural: gli orgogli
IPA: ''
Definition: der Stolz, -e
Register: ''
Beispielsätze: |-
  L’***orgoglio*** di Maria la spinse a rifiutare qualsiasi aiuto, anche quando ne aveva bisogno.
  Der ***Stolz*** von Maria trieb sie dazu, jede Hilfe abzulehnen, obwohl sie sie brauchte.
  
  Nonostante la sconfitta, la squadra mantenne un forte senso di ***orgoglio*** nazionale.
  Trotz der Niederlage behielt das Team ein starkes Gefühl von nationalem ***Stolz***.
  
  È chiaro che il suo ***orgoglio** gli impedisce di riconoscere di aver sbagliato, dopotutto*.
  Es ist offensichtlich, dass sein ***Stolz** ihn daran hindert, seinen Fehler einzusehen – nach alledem*.
  
  L’***orgoglio*** di essere italiano si riflette nelle sue tradizioni culinarie tramandate da generazioni.
  Der ***Stolz***, Italiener zu sein, spiegelt sich in ihren kulinarischen Traditionen wider, die über Generationen weitergegeben wurden.
  
  Il detenuto parlò dell’***orgoglio*** con cui aveva vissuto, nonostante le difficili condizioni in carcere.
  Der Häftling sprach von dem ***Stolz***, mit dem er gelebt hatte, trotz der schwierigen Haftbedingungen.
