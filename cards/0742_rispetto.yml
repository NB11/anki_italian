Rang: 742
Wort: rispetto
Wortart: n.m
Wort mit Artikel: il rispetto
Femininum / Plural: rispetti
IPA: ''
Definition: der Respekt, -e
Register: ''
Beispielsätze: |-
  Devi avere *rispetto* per gli anziani e per chi ha più esperienza di te.
  Du musst *Respekt* vor alten Menschen und vor denen haben, die mehr Erfahrung haben.
  
  Mi hanno licenziato perché non mostravo abbastanza *rispetto* nei confronti dei colleghi.
  Ich wurde entlassen, weil ich meinen Kollegen gegenüber nicht genug *Respekt* gezeigt habe.
  
  Il *rispetto* reciproco è fondamentale in qualsiasi relazione, sia personale che professionale.
  Gegenseitiger *Respekt* ist in jeder Beziehung, privat wie beruflich, grundlegend.
  
  Dopo lo scherzo di ieri sera, provo un po’ di *rispetto* per lui, anche se è uno spiritoso.
  Nach dem Streich gestern Abend empfinde ich etwas *Respekt* für ihn, auch wenn er ein Scherzkeks ist.
  
  Per ottenere il massimo dal tuo lavoro, devi avere *rispetto* per ogni dettaglio, anche il più piccolo.
  Um das Beste aus deiner Arbeit herauszuholen, musst du *Respekt* vor jedem Detail haben, auch dem kleinsten.
