Rang: 3778
Wort: samurai
Wortart: n.m
Wort mit Artikel: il samurai
Femininum / Plural: i samurai
IPA: ''
Definition: der Samurai, -s
Register: ''
Beispielsätze: |-
  Nel *samurai* giapponesi erano sia guerrieri che filosofi.
  Japanische *Samurai* waren sowohl Krieger als auch Philosophen.
  
  L’invasione del Giappone avrebbe distrutto la cultura dei *samurai*.
  Die Invasion Japans hätte die Kultur der *Samurai* zerstört.
  
  Chi vorrebbe *samurai* come guardie del corpo al giorno d’oggi?
  Wer möchte heute schon *Samurai* als Leibwächter?
  
  Un *samurai* senza spada è come un pescatore senza rete.
  Ein *Samurai* ohne Schwert ist wie ein Fischer ohne Netz.
  
  I *samurai* erano noti per il loro codice d’onore, il bushido.
  Die *Samurai* waren bekannt für ihren Ehrenkodex, den Bushido.
