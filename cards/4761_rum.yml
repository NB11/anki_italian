Rang: 4761
Wort: rum
Wortart: n.m
Wort mit Artikel: il rum
Femininum / Plural: rum
IPA: ''
Definition: der Rum, -s
Register: ''
Beispielsätze: |-
  Bevo un *rum* con il lime per rilassarmi dopo il lavoro.
  Ich trinke einen *Rum* mit Limette, um mich nach der Arbeit zu entspannen.
  
  In quel bar servono un *rum* così forte che ci vuole mezz’ora per sentirne gli effetti.
  In dieser Bar gibt es einen *Rum*, der so stark ist, dass es eine halbe Stunde dauert, bis man seine Wirkung spürt.
  
  Se continuerai a bere *rum* tutti i giorni, ti rovinerai il fegato.
  Wenn du weiterhin jeden Tag *Rum* trinkst, zerstörst du dir die Leber.
  
  Ho trovato una bottiglia di *rum* nascosta dietro lo scaffale della cucina.
  Ich habe eine Flasche *Rum* hinter dem Regal in der Küche gefunden.
  
  Il nonno raccontava sempre che durante la guerra beveva *rum* per scaldarsi, anche se non gli piaceva.
  Der Großvater erzählte immer, dass er im Krieg *Rum* trank, um sich zu wärmen, obwohl er ihn nicht mochte.
