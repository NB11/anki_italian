Rang: 3960
Wort: manovra
Wortart: n.f
Wort mit Artikel: la manovra
Femininum / Plural: manovre
IPA: ''
Definition: die Manöver, -
Register: ''
Beispielsätze: |-
  Il pilota ha eseguito una *manovra* di emergenza per evitare lo scontro.
  Der Pilot führte ein *Manöver* zur Notfallvermeidung durch.
  
  Nonostante la *manovra* del sindaco, la città non ha migliorato la raccolta dei rifiuti.
  Trotz des *Manövers* des Bürgermeisters verbesserte die Stadt die Müllabfuhr nicht.
  
  Spero che quella *manovra* politica non provochi una rivolta.
  Ich hoffe, dass dieses politische *Manöver* keinen Aufstand auslöst.
  
  La *manovra* militare è stata nascosta ai media per evitare polemiche.
  Das militärische *Manöver* wurde vor den Medien verborgen, um Streit zu vermeiden.
  
  Se non cambi questa *manovra*, perderai tutte le approvazioni necessarie.
  Wenn du dieses *Manöver* nicht änderst, verlierst du alle erforderlichen Zustimmungen.
