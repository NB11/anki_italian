Rang: 1781
Wort: donare
Wortart: vt
Wort mit Artikel: donare
Femininum / Plural: ''
IPA: ''
Definition: schenken, spenden, stiften, geben
Register: ''
Beispielsätze: |-
  Mi piacerebbe *donare* questi libri alla biblioteca del mio paese.
  Ich möchte diese Bücher an die *Bibliothek* meines Dorfes schenken.
  
  La regina ha deciso di *donare* metà del suo patrimonio in beneficenza.
  Die Königin hat beschlossen, die Hälfte ihres Vermögens in *Wohltätigkeit* zu spenden.
  
  Se avessi più soldi, vorrei *donare* un’ala nuova all’ospedale.
  Wenn ich mehr Geld hätte, würde ich dem Krankenhaus einen neuen Flügel *spenden*.
  
  È importante *donare* il sangue regolarmente per aiutare chi ne ha bisogno.
  Es ist wichtig, regelmäßig Blut zu *spenden*, um denen zu helfen, die es brauchen.
  
  Non appena avrò finito di leggere questo romanzo, potrò *donarlo* al mio amico che lo aspetta da mesi.
  Sobald ich diesen Roman ausgelesen habe, kann ich ihn meinem Freund *schenken*, der seit Monaten darauf wartet.
