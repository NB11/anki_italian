Rang: 1880
Wort: portafoglio
Wortart: n.m
Wort mit Artikel: il portafoglio
Femininum / Plural: i portafogli
IPA: ''
Definition: der Geldbeutel, -
Register: ''
Beispielsätze: |-
  Ho perso *il portafoglio* ieri sera in metropolitana.
  Ich habe *den Geldbeutel* gestern Abend in der U-Bahn verloren.
  
  Dov’è *il portafoglio* che ti ho dato per il compleanno?
  Wo ist *der Geldbeutel*, den ich dir zum Geburtstag gegeben habe?
  
  Se *il portafoglio* non si trova, dovrai fare una denuncia alla polizia.
  Wenn *der Geldbeutel* sich nicht findet, musst du Anzeige bei der Polizei erstatten.
  
  L’uomo, con *il portafoglio* vuoto, decise di tornare a casa a piedi.
  Der Mann, mit *dem leeren Geldbeutel*, beschloss, zu Fuß nach Hause zu gehen.
  
  Appena ho visto *il portafoglio* sul banco, l’ho subito raccolto per restituirlo.
  Sobald ich *den Geldbeutel* auf dem Tresen gesehen habe, habe ich ihn sofort aufgehoben, um ihn zurückzugeben.
