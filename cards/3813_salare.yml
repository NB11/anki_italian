Rang: 3813
Wort: salare
Wortart: v
Wort mit Artikel: salare
Femininum / Plural: ''
IPA: ''
Definition: salzen
Register: ''
Beispielsätze: |-
  Nonna *salava* sempre la pasta prima di aggiungere l'acqua.
  Oma *salzte* immer die Nudeln, bevor sie das Wasser hinzugab.
  
  Se non *sali* la minestra, rischi che sia insipida.
  Wenn du die Suppe nicht *salzt*, riskierst du, dass sie fade schmeckt.
  
  Ho dimenticato di *salare* il pollo prima di metterlo in forno.
  Ich habe vergessen, das Hähnchen zu *salzen*, bevor ich es in den Ofen geschoben habe.
  
  La nonna mi ha insegnato che si deve *salare* l'acqua per la pasta solo dopo che bolle.
  Oma hat mir beigebracht, dass man das Nudelwasser erst *salzen* soll, wenn es kocht.
  
  Chi vorrebbe cucinare un piatto che non è stato *salato* come si deve?
  Wer würde ein Gericht essen wollen, das nicht ausreichend *gesalzen* wurde?
