Rang: 3995
Wort: svizzero
Wortart: n.m/f
Wort mit Artikel: lo svizzero
Femininum / Plural: svizzeri
IPA: ''
Definition: der/die Schweizer/in, -
Register: ''
Beispielsätze: |-
  Il nonno di Paolo è un *svizzero* che vive a Zurigo da trent'anni.
  Opa von Paolo ist ein *Schweizer*, der seit dreißig Jahren in Zürich lebt.
  
  Dove hai comprato questo delizioso formaggio? È svizzero, vero?
  Wo hast du diesen leckeren Käse gekauft? Er ist *schweizerisch*, oder?
  
  Le due sorelle, che sono *svizzere*, lavorano entrambi in un albergo di lusso.
  Die zwei Schwestern, die *Schweizerinnen* sind, arbeiten beide in einem Luxushotel.
  
  Se avessi più tempo, visiteremmo la Svizzera e incontreremmo degli *svizzeri* molto cordiali.
  Wenn wir mehr Zeit hätten, würden wir die Schweiz besuchen und sehr freundliche *Schweizer* treffen.
  
  Nonostante sia italiano, mi piacerebbe studiare come i *svizzeri* organizzano il loro sistema bancario.
  Auch wenn ich Italiener bin, würde ich gerne studieren, wie die *Schweizer* ihr Bankensystem organisieren.
