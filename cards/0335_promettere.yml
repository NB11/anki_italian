Rang: 335
Wort: promettere
Wortart: vt
Wort mit Artikel: promettere
Femininum / Plural: ''
IPA: ''
Definition: versprechen, zusagen
Register: ''
Beispielsätze: |-
  Ti *prometto* che arriverò in orario domani.
  Ich *verspreche* dir, dass ich morgen pünktlich ankomme.
  
  Hanno *promesso* di aiutarci con il trasloco.
  Sie haben *zugesagt*, uns beim Umzug zu helfen.
  
  Promettimi che non lo dirai a nessuno!
  *Versprich* mir, dass du es niemandem sagst!
  
  Se avrai successo, *prometterai* molto di più in futuro.
  Wenn du Erfolg hast, wirst du *versprechen* noch viel mehr in der Zukunft.
  
  Non so se potrò mantenere la promessa che vi ho *promesso*.
  Ich weiß nicht, ob ich das Versprechen halten kann, das ich euch *versprochen* habe.
