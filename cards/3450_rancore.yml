Rang: 3450
Wort: rancore
Wortart: n.m
Wort mit Artikel: il rancore
Femininum / Plural: rancori
IPA: ''
Definition: der Groll, -
Register: ''
Beispielsätze: |-
  Non nutro *rancore* nei suoi confronti nonostante tutto ciò che è successo.
  Ich hege *Groll* ihm gegenüber trotz all dessen, was passiert ist.
  
  Il suo volto era pieno di *rancore* quando gli hai detto la verità.
  Sein Gesicht war voller *Groll*, als du ihm die Wahrheit gesagt hast.
  
  Era così *rancore* che non riuscì a perdonare nemmeno dopo anni.
  Es war so viel *Groll* in ihm, dass er selbst nach Jahren nicht vergeben konnte.
  
  Se avessi saputo che avrebbe sviluppato tanto *rancore*, non avrei agito in quel modo.
  Hätte ich gewusst, dass er so viel *Groll* entwickeln würde, hätte ich anders gehandelt.
  
  Il *rancore* tra fratelli spesso nasce da piccoli malintesi che crescono nel tempo.
  Der *Groll* zwischen Geschwistern entsteht oft aus kleinen Missverständnissen, die mit der Zeit wachsen.
