Rang: 2923
Wort: pesare
Wortart: v
Wort mit Artikel: pesare
Femininum / Plural: ''
IPA: ''
Definition: wiegen, abwägen
Register: ''
Beispielsätze: |-
  Quanto pesa *peserai* in una settimana?
  Wie viel wirst du in einer Woche *wiegen*?
  
  Ho visto che *pesa* ancora troppo per essere sano.
  Ich habe gesehen, dass er noch zu viel *wiegt*, um gesund zu sein.
  
  Non capisco perché *pesi* sempre queste decisioni prima di agire.
  Ich verstehe nicht, warum du immer diese Entscheidungen *abwägst*, bevor du handelst.
  
  Se *pesassi* meglio i pro e i contro, non sbaglieresti!
  Wenn du die Vor- und Nachteile besser *abwägest*, würdest du keinen Fehler machen!
  
  La bilancia *pesava* 2 chili in meno rispetto a ieri, un sollievo!
  Die Waage *wog* 2 Kilogramm weniger als gestern – eine Erleichterung!
