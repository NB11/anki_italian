Rang: 3485
Wort: liquore
Wortart: n.m
Wort mit Artikel: il liquore
Femininum / Plural: liquori
IPA: ''
Definition: der Likör, -e
Register: ''
Beispielsätze: |-
  Non bere troppo *liquore* a cena, potrebbe farti male.
  Trink nicht zu viel *Likör* beim Abendessen, das könnte dir schaden.
  
  Ho trovato una bottiglia di *liquore* invecchiato nello scantinato.
  Ich habe eine Flasche *Likör* mit Alterung im Keller gefunden.
  
  Quando eri piccolo, tuo nonno ti offriva sempre un *liquore* fatto in casa.
  Als du klein warst, hat dein Großvater dir immer einen selbstgemachten *Likör* angeboten.
  
  Se vuoi comprare un *liquore* pregiato, cerca nei negozi specializzati.
  Wenn du einen hochwertigen *Likör* kaufen möchtest, suche in Fachgeschäften.
  
  Malgrado il divieto, alcuni continuano a produrre *liquore* di contrabbando.
  Trotz des Verbots stellen einige weiterhin *Likör* in Schwarzarbeit her.
