Rang: 3892
Wort: spietato
Wortart: adj
Wort mit Artikel: spietato
Femininum / Plural: ''
IPA: ''
Definition: gnadenlos, erbarmungslos, skrupellos
Register: ''
Beispielsätze: |-
  Il giudice ha preso una decisione *spietata* nei confronti del criminale.
  Der Richter hat eine *gnadenlose* Entscheidung gegenüber dem Verbrecher gefällt.
  
  Lui è così *spietato* che non ha esitato ad abbandonare la sua famiglia per denaro.
  Er ist so *erbarmungslos*, dass er nicht gezögert hat, seine Familie für Geld zu verlassen.
  
  Il nemico, *spietato* e crudele, non meritava nessuna pietà.
  Der Feind, *gnadenlos* und grausam, verdiente kein bisschen Mitleid.
  
  Anche se sembrava gentile, aveva un cuore *spietato* quando si trattava di affari.
  Auch wenn er nett wirkte, hatte er ein *erbarmungsloses* Herz, wenn es um Geschäfte ging.
  
  La guerra ha mostrato il lato più *spietato* dell’umanità, senza alcuna speranza di redenzione.
  Der Krieg hat die *gnadenloseste* Seite der Menschheit gezeigt, ohne jede Hoffnung auf Erlösung.
