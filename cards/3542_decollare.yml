Rang: 3542
Wort: decollare
Wortart: vi
Wort mit Artikel: decollare
Femininum / Plural: ''
IPA: ''
Definition: abheben, starten
Register: ''
Beispielsätze: |-
  L’aereo sta per *decollare* nonostante il maltempo.
  Das Flugzeug wird trotz des schlechten Wetters *abheben*.
  
  Se avessimo prenotato prima, non saremmo dovuti *decollare* di notte.
  Wenn wir früher gebucht hätten, hätten wir nicht nachts *starten* müssen.
  
  Ho visto l’aquila *decollare* dal tetto della chiesa.
  Ich habe gesehen, wie der Adler vom Dach der Kirche *abgehoben* hat.
  
  Il pilota ha ordinato di *decollare* immediatamente per evitare il temporale.
  Der Pilot hat befohlen, sofort zu *starten*, um das Gewitter zu vermeiden.
  
  Benché il volo fosse economico, ci garantirono che l’aereo non avrebbe tardato a *decollare*.
  Obwohl der Flug günstig war, versicherten sie uns, dass das Flugzeug nicht lange auf den *Abflug* warten würde.
