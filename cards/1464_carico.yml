Rang: 1464
Wort: carico
Wortart: n.m
Wort mit Artikel: il carico
Femininum / Plural: carichi
IPA: ''
Definition: die Ladung, -en
Register: ''
Beispielsätze: |-
  Il *carico* di questa spedizione è molto pesante.
  Die *Ladung* dieser Sendung ist sehr schwer.
  
  Ho visto un *carico* di legname arrivare al porto.
  Ich habe eine *Ladung* Holz am Hafen ankommen sehen.
  
  Non capivo perché ci fosse tanto *carico* sulla bilancia.
  Ich verstand nicht, warum so viel *Ladung* auf der Waage war.
  
  Dopo lo sciopero, il *carico* di merci è rimasto bloccato per giorni.
  Nach dem Streik blieb die *Ladung* an Waren tagelang blockiert.
  
  Il camionista controllava sempre attentamente il *carico* prima di partire.
  Der LKW-Fahrer prüfte immer sorgfältig die *Ladung*, bevor er losfuhr.
