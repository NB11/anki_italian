Rang: 1853
Wort: carro
Wortart: n.m
Wort mit Artikel: il carro
Femininum / Plural: carri
IPA: ''
Definition: der Wagen, -, der Karren, -
Register: ''
Beispielsätze: |-
  Il *carro* è pieno di mele.
  Der *Wagen* ist voller Äpfel.
  
  Ha comprato un *carro* nuovo per trasportare i mobili.
  Er hat einen neuen *Karren* gekauft, um die Möbel zu transportieren.
  
  Mentre il *carro* avanzava lentamente, scoprimmo una struttura misteriosa.
  Während der *Wagen* langsam vorwärtsfuhr, entdeckten wir eine geheimnisvolle Struktur.
  
  Se avessi tempo, aggiusterei il *carro* che si è rotto ieri.
  Wenn ich Zeit hätte, würde ich den *Karren* reparieren, der gestern kaputtgegangen ist.
  
  Nonostante la tempesta, l’autista riuscì a guidare il *carro* fino a casa.
  Trotz des *Sturms* schaffte es der Fahrer, den Wagen bis nach Hause zu fahren.
