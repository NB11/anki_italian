Beispielsätze: |-
  Durante la *militare* esercitazione gli ufficiali hanno impartito ordini precisi ai soldati.
  Während der *militärischen* Übung haben die Offiziere den Soldaten präzise Befehle erteilt.
  
  Ha scelto una carriera *militare* perché ama difendere il suo paese.
  Er hat eine *militärische* Laufbahn gewählt, weil er sein Land verteidigen möchte.
  
  La notizia del colpo di stato *militare* ha sconvolto l'intera regione.
  Die Nachricht vom *militärischen* Putsch hat die gesamte Region erschüttert.
  
  È vietato fotografare le installazioni *militari*; è una questione di sicurezza nazionale.
  Es ist verboten, *militärische* Anlagen zu fotografieren; es ist eine Frage der nationalen Sicherheit.
  
  I soldati hanno dovuto seguire un addestramento *militare* molto rigoroso prima di partire per la missione.
  Die Soldaten mussten eine sehr strenge *militärische* Ausbildung durchlaufen, bevor sie in den Einsatz aufbrachen.
