Rang: 1118
Wort: termine
Wortart: n.m
Wort mit Artikel: il termine
Femininum / Plural: termini
IPA: ''
Definition: das Ende, der Termin, -e / -e
Register: ''
Beispielsätze: |-
  Il *termine* di scadenza per la domanda di iscrizione è domani alle 14:00.
  Die *Frist* für das Anmeldeformular endet morgen um 14 Uhr.
  
  Durante la riunione abbiamo discusso il *termine* ultimo per consegnare il progetto, ma nessuno sapeva rispondere con precisione.
  Während der Besprechung haben wir den *Zeitpunkt* der letzten Abgabe diskutiert, aber niemand konnte genau antworten.
  
  Se non rispetti il *termine* che hai fissato, dovrai pagare una multa.
  Wenn du den *Termin*, den du gesetzt hast, nicht einhältst, musst du eine Strafe zahlen.
  
  Il *termine* del dibattito era previsto per le 18, ma si è protratto fino alle 19:30 a causa delle numerose domande dei presenti.
  Die *Frist* der Diskussion war für 18 Uhr geplant, aber sie zog sich bis 19:30 wegen der vielen Fragen der Anwesenden hin.
  
  Nonostante abbia chiesto più volte un’estensione, il professore ha detto che il *termine* non può essere modificato.
  Obwohl er mehrmals um eine Verlängerung gebeten hat, sagte der Professor, dass der *Zeitpunkt* nicht geändert werden kann.
