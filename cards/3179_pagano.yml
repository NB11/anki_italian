Rang: 3179
Wort: pagano
Wortart: adj
Wort mit Artikel: pagano
Femininum / Plural: ''
IPA: ''
Definition: heidnisch, ungläubig
Register: ''
Beispielsätze: |-
  Nella nostra classe ci sono alcuni studenti *pagani* che non celebrano il Natale.
  In unserer Klasse gibt es einige *heidnische* Schüler, die Weihnachten nicht feiern.
  
  Gli antichi romani erano soliti pregare dei *pagani* prima delle battaglie.
  Die alten Römer pflegten vor Schlachten *heidnische* Götter anzubeten.
  
  Hanno scelto di seguire una religione naturalista e *pagana* invece delle tradizioni tradizionali.
  Sie haben beschlossen, eine naturistische und *heidnische* Religion statt der traditionellen Traditionen zu folgen.
  
  I loro rituali *pagani* includono danze intorno al fuoco durante il solstizio d'estate.
  Ihre *heidnischen* Rituale beinhalten Tänze um das Feuer zur Sommersonnenwende.
  
  Molti festival moderni hanno radici in feste *pagane* molto antiche.
  Viele moderne Feste haben Wurzeln in sehr alten *heidnischen* Festen.
