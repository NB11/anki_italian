Rang: 4742
Wort: alloggiare
Wortart: vi
Wort mit Artikel: alloggiare
Femininum / Plural: ''
IPA: ''
Definition: unterkommen, logieren
Register: ''
Beispielsätze: |-
  In questa città *alloggiamo* in un albergo molto antico.
  In dieser Stadt *übernachten* wir in einem sehr alten Hotel.
  
  Se non troviamo un posto dove *alloggiare*, dovremo dormire in macchina.
  Wenn wir keine *Unterkunft* finden, werden wir im Auto schlafen müssen.
  
  Mi hanno detto che potremmo *alloggiare* da loro durante il viaggio.
  Sie haben mir gesagt, dass wir während der Reise bei ihnen *unterkommen* könnten.
  
  Temeva che nessuno volesse *alloggiare* in una casa così isolata.
  Er fürchtete, niemand würde in einem so abgelegenen Haus *logieren* wollen.
  
  Non appena arrivammo, l’oste ci fece sapere che potevamo *alloggiare* nelle stanze al primo piano.
  Sobald wir ankamen, ließ uns der Wirt wissen, dass wir in den Zimmern im ersten Stock *unterkommen* könnten.
