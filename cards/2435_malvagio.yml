Beispielsätze: |-
  Il film racconta la storia di un *malvagio* tiranno che opprime il popolo per decenni.
  Der Film erzählt die Geschichte eines *bösen* Tyrannen, der das Volk jahrzehntelang unterdrückt.
  
  Nonostante il suo aspetto gentile, si è rivelato *malvagio* e crudele.
  Trotz seines freundlichen Aussehens entpuppte er sich als *böse* und grausam.
  
  Credi davvero che quell'uomo *malvagio* possa cambiare il suo carattere perbene?
  Glaubst du wirklich, dass dieser *böse* Mann seinen guten Charakter ändern kann?
  
  Il giudice condannò l'imputato perché le prove dimostravano la sua natura *malvagia*.
  Der Richter verurteilte den *Angeklagten*, weil die Beweise seine böse Natur bewiesen.
  
  Se avessi saputo che era così *malvagio*, non avrei mai accettato il suo aiuto.
  Hätte ich gewusst, dass er so *böse* war, hätte ich seine Hilfe nie angenommen.
