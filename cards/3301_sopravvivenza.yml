Rang: 3301
Wort: sopravvivenza
Wortart: n.f
Wort mit Artikel: la sopravvivenza
Femininum / Plural: sopravvivenze
IPA: ''
Definition: das Überleben, das Fortbestehen
Register: ''
Beispielsätze: |-
  La *sopravvivenza* dell’umanità dipende dalla nostra capacità di proteggere l’ambiente.
  Das *Überleben* der Menschheit hängt von unserer Fähigkeit ab, die Umwelt zu schützen.
  
  Dopo il naufragio, la loro *sopravvivenza* fu possibile grazie alla scorta d’acqua.
  Nach dem Schiffbruch war ihr *Fortbestehen* nur durch den Wasservorrat möglich.
  
  Gli studiosi discutono se la *sopravvivenza* di questa specie sia ormai impossibile.
  Die Wissenschaftler diskutieren, ob das *Überleben* dieser Art mittlerweile unmöglich ist.
  
  La *sopravvivenza* di molte tradizioni culturali rischia di scomparire senza il nostro impegno.
  Das *Fortbestehen* vieler kultureller Traditionen droht ohne unser Engagement zu verschwinden.
  
  Per la *sopravvivenza* del progetto servono ulteriori fondi da parte dei donatori.
  Für das *Fortbestehen* des Projekts werden zusätzliche Mittel von den Spendern benötigt.
