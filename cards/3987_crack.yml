Rang: 3987
Wort: crack
Wortart: n.m
Wort mit Artikel: il crack
Femininum / Plural: i crack
IPA: ''
Definition: die Ritze, -n, der Riss, -e
Register: ''
Beispielsätze: |-
  C'è un piccolo *crack* nel vetro del finestrino che va riparato prima della partenza.
  Es gibt eine kleine *Ritze* im Fensterglas, die vor der Abfahrt repariert werden muss.
  
  Durante l'esposizione d'arte moderna, gli organizzatori hanno notato un *crack* nella parete che ospitava il dipinto principale.
  Während der modernen Kunstausstellung bemerkten die Organisatoren einen *Riss* in der Wand, die das Hauptgemälde beherbergte.
  
  Se non ripari subito quel *crack* nel muro, l'umidità entrerà e danneggerà la stanza.
  Wenn du diese *Ritze* in der Wand nicht sofort reparierst, dringt Feuchtigkeit ein und beschädigt den Raum.
  
  Lo scienziato ha osservato attentamente il *crack* che si era formato sulla superficie del materiale sotto stress.
  Der Wissenschaftler beobachtete genau den *Riss*, der sich auf der Oberfläche des unter Spannung stehenden Materials gebildet hatte.
  
  Dopo l'incidente, sulla fiancata della macchina si era creato un *crack* che richiedeva una verniciatura completa.
  Nach dem Unfall entstand an der Seite des Autos ein *Riss*, der eine vollständige Lackierung erforderte.
