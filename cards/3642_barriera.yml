Rang: 3642
Wort: barriera
Wortart: n.f
Wort mit Artikel: la barriera
Femininum / Plural: barriere
IPA: ''
Definition: die Sperre, -n, die Barriere, -n
Register: ''
Beispielsätze: |-
  La *barriera* linguistica può essere difficile da superare per chi studia una nuova lingua.
  Die sprachliche *Barriere* kann für Lernende einer neuen Sprache schwer zu überwinden sein.
  
  Hanno costruito una *barriera* di cemento per proteggere il villaggio dalle inondazioni di marzo.
  Sie haben eine Beton-*Barriere* errichtet, um das Dorf vor den März-Fluten zu schützen.
  
  Se non ci fosse questa *barriera*, tutti i clienti potrebbero entrare senza controllo.
  Gäbe es diese *Barriere* nicht, könnten alle Kunden unkontrolliert eintreten.
  
  Gli ambientalisti chiedono di abbattere tutte le *barriere* che ostacolano la migrazione degli animali.
  Die Umweltschützer fordern, alle *Barrieren* abzubauen, die die Tierwanderung behindern.
  
  La *barriera* del suono è stata infranta dall’aereo supersonico qualche decina di anni fa.
  Die Schall-*Barriere* wurde vor einigen Jahrzehnten von dem Überschallflugzeug durchbrochen.
