Rang: 3218
Wort: contadino
Wortart: n.m
Wort mit Artikel: il contadino
Femininum / Plural: contadini
IPA: ''
Definition: der Bauer, -n
Register: ''
Beispielsätze: |-
  Il *contadino* ara la terra ogni mattina all'alba.
  Der *Bauer* pflügt jeden Morgen bei Tagesanbruch das Land.
  
  Vorrei che tu conoscessi il *contadino* che ha salvato il raccolto dalla grandine.
  Ich wünschte, du würdest den *Bauern* kennenlernen, der die Ernte vor dem Hagel gerettet hat.
  
  Se fossi un *contadino*, coltiverei soprattutto pomodori bio.
  Wenn ich ein *Bauer* wäre, würde ich vor allem Bio-Tomaten anbauen.
  
  Ho incontrato un *contadino* che vanta una collezione di attrezzi antichi.
  Ich habe einen *Bauern* getroffen, der mit einer Sammlung alter Werkzeuge prahlt.
  
  I *contadini* di questa zona organizzano ogni anno una fiera agricola.
  Die *Bauern* dieser Gegend veranstalten jedes Jahr eine Landwirtschaftsmesse.
