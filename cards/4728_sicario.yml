Rang: 4728
Wort: sicario
Wortart: n.m
Wort mit Artikel: il sicario
Femininum / Plural: sicari
IPA: ''
Definition: der Auftragskiller, -
Register: ''
Beispielsätze: |-
  Il *sicario* è stato arrestato dalla polizia dopo un lungo inseguimento.
  Der *Auftragskiller* wurde nach einer langen Verfolgung von der Polizei verhaftet.
  
  Nonostante le minacce, il testimone ha rifiutato di *sicarizzare* il suo vicino.
  Trotz der Drohungen weigerte sich der Zeuge, seinen Nachbarn zum *Auftragskiller* zu machen.
  
  Se avessi saputo chi fosse il *sicario*, non avrei accettato quel lavoro.
  Wenn ich gewusst hätte, wer der *Auftragskiller* war, hätte ich diese Arbeit nicht angenommen.
  
  Il giudice ha condannato il *sicario* all’ergastolo per l’omicidio commesso.
  Der Richter verurteilte den *Auftragskiller* wegen des begangenen Mordes zu lebenslanger Freiheitsstrafe.
  
  È inutile discutere con chi si nasconde dietro un *sicario*: non risponderà mai direttamente.
  Es ist sinnlos, mit jemandem zu diskutieren, der sich hinter einem *Auftragskiller* versteckt – er wird nie direkt antworten.
