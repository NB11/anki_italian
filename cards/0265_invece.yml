Rang: 265
Wort: invece
Wortart: adv
Wort mit Artikel: invece
Femininum / Plural: ''
IPA: ''
Definition: dagegen, stattdessen
Register: ''
Beispielsätze: |-
  Pensavo che sarebbe arrivato tardi, *invece* è arrivato in orario.
  Ich dachte, er würde spät ankommen, *hingegen* ist er pünktlich angekommen.
  
  Non mi piace il caffè, *invece* la mia sorella lo ama.
  Ich mag keinen Kaffee, *meine Schwester hingegen* liebt ihn.
  
  Hai detto che volevi venire, *invece* sei rimasto a casa?
  Du hast gesagt, dass du kommen wolltest, *stattdessen* bist du zu Hause geblieben?
  
  *Invece* di studiare, ha guardato un film per tutta la sera.
  Anstatt zu lernen, hat er den ganzen Abend lang einen Film geschaut.
  
  Lui vuole andare al mare, *invece* io preferisco la montagna.
  Er will ans Meer fahren, *ich hingegen* bevorzuge die Berge.
