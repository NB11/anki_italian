Rang: 4620
Wort: acchiappare
Wortart: vt
Wort mit Artikel: acchiappare
Femininum / Plural: ''
IPA: ''
Definition: fangen, ergreifen
Register: ''
Beispielsätze: |-
  Il cane è riuscito finalmente a *acchiappare* la palla che gli ho lanciato.
  Der Hund konnte endlich den Ball *fangen*, den ich ihm geworfen habe.
  
  Se non avessi *acchiappato* quel treno, sarei arrivato troppo tardi in ufficio.
  Wenn ich den Zug nicht *ergriffen* hätte, wäre ich zu spät im Büro angekommen.
  
  Il gatto si è nascosto sotto il letto e nessuno riesce a *acchiapparlo*.
  Die Katze hat sich unter dem Bett versteckt und niemand kann sie *fangen*.
  
  Mi dispiace, ma non ho ancora *acchiappato* il concetto di cui parlavi.
  Es tut mir leid, aber ich habe den *Gedanken*, über den du gesprochen hast, noch nicht erfasst.
  
  Prima che il ladro potesse fuggire, la polizia riuscì a *acchiapparlo* con l’aiuto delle telecamere.
  Bevor der Dieb fliehen konnte, gelang es der Polizei, ihn mithilfe der Kameras zu *ergreifen*.
