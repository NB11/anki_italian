Rang: 905
Wort: riposare
Wortart: vi
Wort mit Artikel: riposare
Femininum / Plural: ''
IPA: ''
Definition: sich erholen, ausruhen
Register: ''
Beispielsätze: |-
  Dopo la maratona tutti volevano *riposare* un po’ prima di tornare a casa.
  Nach dem Marathon wollten alle *sich erholen* etwas, bevor sie nach Hause zurückkehrten.
  
  Se non avessi *riposato* così tanto, non ti saresti ammalato di nuovo!
  Wenn du dich nicht so oft *ausgeruht* hättest, wärst du nicht wieder krank geworden!
  
  La nonna mi ha detto che dovrei *riposare* almeno otto ore al giorno per stare meglio.
  Oma hat mir gesagt, ich solle *mich erholen* mindestens acht Stunden pro Tag, um mich besser zu fühlen.
  
  Non appena avrò finito di leggere questo libro, andrò a *riposare* in poltrona con una tazza di tè caldo.
  Sobald ich dieses Buch ausgelesen habe, werde ich *mich ausruhen* im Sessel mit einer Tasse heißen Tee.
  
  Pur essendo stanco, non osava *riposare*: la scadenza del progetto era troppo vicina.
  Obwohl er müde war, *sich auszuruhen* wagte er nicht: der Projekttermin war zu nah.
