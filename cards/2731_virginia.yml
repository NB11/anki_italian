Rang: 2731
Wort: virginia
Wortart: n.f
Wort mit Artikel: la virginia
Femininum / Plural: virginie
IPA: ''
Definition: die Virginiazigarette, -n
Register: ''
Beispielsätze: |-
  Mio nonno fumava sempre *Virginia* quando guardava la televisione.
  Mein Opa rauchte immer *Virginia-Zigaretten*, wenn er fernsah.
  
  Le *Virginia* sono diventate più rare rispetto a cinquanta anni fa.
  *Virginia-Zigaretten* sind seltener geworden als vor fünfzig Jahren.
  
  Non ho mai provato una *Virginia*, ma mia zia dice che sono troppo forti.
  Ich habe noch nie eine *Virginia* probiert, aber meine Tante sagt, sie sind zu stark.
  
  Le sigarette *Virginia* erano la marca preferita di molti soldati durante la guerra.
  *Virginia-Zigaretten* waren die bevorzugte Marke vieler Soldaten im Krieg.
  
  Se vuoi acquistare delle *Virginia*, guarda prima se il tabaccaio le ha in magazzino.
  Wenn du *Virginia-Zigaretten* kaufen möchtest, schau vorher, ob der Tabakladen sie auf Lager hat.
