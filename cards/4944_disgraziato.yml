Rang: 4944
Wort: disgraziato
Wortart: adj
Wort mit Artikel: disgraziato
Femininum / Plural: ''
IPA: ''
Definition: unglücklich, unglückselig
Register: ''
Beispielsätze: |-
  Il film era così *disgraziato* che la sala si svuotò in pochi minuti.
  Der Film war so *unglücklich*, dass sich der Saal in wenigen Minuten leerte.
  
  Nonostante le difficoltà, la sua risposta fu *disgraziatamente* sbagliata.
  Trotz der Schwierigkeiten war ihre Antwort *unglücklicherweise* falsch.
  
  Vorrei che tu non fossi stato così *disgraziato* nelle tue scelte.
  Ich wünschte, du wärst nicht so *unglücklich* in deinen Entscheidungen gewesen.
  
  La sua faccia *disgraziata* dopo la sconfitta era impagabile.
  Sein *unglückliches* Gesicht nach der Niederlage war unbezahlbar.
  
  Anche se è *disgraziato*, continua a sorridere come se nulla fosse.
  Auch wenn er *unglücklich* ist, lächelt er weiter, als wäre nichts geschehen.
