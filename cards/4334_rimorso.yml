Rang: 4334
Wort: rimorso
Wortart: n.m
Wort mit Artikel: il rimorso
Femininum / Plural: i rimorsi
IPA: ''
Definition: das Schuldgefühl, -e
Register: ''
Beispielsätze: |-
  Dopo aver mentito alla madre, provava un forte *rimorso*.
  Nach der Lüge gegenüber der Mutter empfand sie ein starkes *Schuldgefühl*.
  
  Nonostante il tempo passato, il *rimorso* per quella decisione non lo abbandona ancora.
  Trotz der vergangenen Zeit lässt ihn das *Schuldgefühl* für diese Entscheidung nicht los.
  
  Se avessi saputo le conseguenze, avrei evitato quell'errore che ora mi tormenta con il *rimorso*.
  Hätte ich die Konsequenzen gekannt, hätte ich den Fehler vermieden, der mich jetzt mit *Schuldgefühl* quält.
  
  Il *rimorso* lo ha spinto a chiedere scusa, anche se era tardi.
  Das *Schuldgefühl* trieb ihn dazu, sich zu entschuldigen, obwohl es zu spät war.
  
  Chi non prova *rimorso* dopo un tradimento non ha cuore.
  Wer nach einem Verrat kein *Schuldgefühl* empfindet, hat kein Herz.
