Beispielsätze: |-
  Loro hanno deciso di *fondare* una nuova società per affrontare le sfide del mercato.
  Sie haben beschlossen, ein neues Unternehmen zu *gründen*, um die Herausforderungen des Marktes zu bewältigen.
  
  Se avessi più coraggio, *fonderei* un’associazione per aiutare i giovani in difficoltà.
  Wenn ich mehr Mut hätte, würde ich einen Verein *gründen*, um Jugendlichen in Not zu helfen.
  
  Il sindaco ha annunciato che *fonderà* un comitato per promuovere il turismo locale.
  Der Bürgermeister hat angekündigt, dass er ein Komitee *gründen* wird, um den lokalen Tourismus zu fördern.
  
  È importante che tu *fondi* delle basi solide prima di avventurarti in progetti più ambiziosi.
  Es ist wichtig, dass du feste Grundlagen *gründest*, bevor du dich in ambitioniertere Projekte wagst.
  
  Ha fatto di tutto per *fondare* una famiglia serena, ma purtroppo non ci è riuscito.
  Er hat alles versucht, um eine *gründen* harmonische Familie aufzubauen, aber leider ist ihm das nicht gelungen.
