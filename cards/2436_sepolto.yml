Rang: 2436
Wort: sepolto
Wortart: adj
Wort mit Artikel: sepolto
Femininum / Plural: ''
IPA: ''
Definition: begraben, bestattet
Register: ''
Beispielsätze: |-
  Il tesoro *sepolto* nel giardino è stato trovato dopo anni di ricerche.
  Der im Garten *begrabene* Schatz wurde nach Jahren der Suche gefunden.
  
  Le radici *sepolte* sotto la neve faticano a respirare.
  Die unter dem Schnee *begrabenen* Wurzeln kämpfen um Luft.
  
  Mi sembra che quel ricordo sia ormai *sepolto* per sempre.
  Es kommt mir vor, als wäre diese Erinnerung für immer *bestattet*.
  
  Nei romanzi, spesso il protagonista scopre una verità *sepolta* nel passato.
  In Romanen entdeckt der Protagonist oft eine im Verborgenen *bestattete* Wahrheit.
  
  Le sue emozioni *sepolte* sotto la superficialità apparivano all'improvviso in un momento di debolezza.
  Die unter der Oberfläche *vergrabenen* Gefühle zeigten sich plötzlich in einem Moment der Schwäche.
