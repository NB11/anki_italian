Rang: 2776
Wort: cristiano
Wortart: adj
Wort mit Artikel: cristiano
Femininum / Plural: cristiani
IPA: ''
Definition: christlich, gläubig
Register: ''
Beispielsätze: |-
  Credo che la sua visione del mondo sia profondamente *cristiana*.
  Ich glaube, dass seine Weltsicht tief *christlich* geprägt ist.
  
  Non tutte le feste italiane hanno un'origine *cristiana*, ma molte sì.
  Nicht alle italienischen Feste haben einen *christlichen* Ursprung, aber viele schon.
  
  Il sacerdote invitò i fedeli a vivere secondo principi *cristiani*.
  Der Priester forderte die Gläubigen auf, nach *christlichen* Grundsätzen zu leben.
  
  Se fossi *cristiano*, andrei in chiesa ogni domenica.
  Wäre ich *christlich*, würde ich jeden Sonntag in die Kirche gehen.
  
  Le sue azioni dimostrano una morale tipicamente *cristiana*, anche se lui non è praticante.
  Seine Handlungen zeigen eine typisch *christliche* Moral, auch wenn er nicht gläubig ist.
