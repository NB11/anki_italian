Wort: parcheggiare
Wortart: v
Wort mit Artikel: parcheggiare
Femininum / Plural: ''
IPA: ''
Definition: parken
Register: ''
Beispielsätze: |-
  Non *parcheggiare* mai in seconda fila, perché è vietato dalla legge.
  Parke niemals in der zweiten Reihe, weil es von dem Gesetz *verboten* ist.
  
  Dopo aver *parcheggiato* l'auto vicino al museo, siamo andati a fare una passeggiata.
  Nachdem wir das Auto in der Nähe von dem Museum *geparkt* hatten, sind wir spazieren gegangen.
  
  Se *parcheggerai* qui, dovrai fare attenzione alle multe che gli agenti controllano spesso.
  Wenn du hier *parken* wirst, musst du auf die Strafzettel aufpassen, die die Beamten oft kontrollieren.
  
  Avrei voluto *parcheggiare* nel garage, ma era già pieno e così ho dovuto lasciare l’auto in strada.
  Ich hätte in der Garage *parken* wollen, aber sie war schon voll und so habe ich das Auto auf der Straße lassen müssen.
  
  Mentre stavo per *parcheggiare*, ho notato che qualcuno aveva graffiato la portiera della mia macchina.
  Als ich gerade *parken* wollte, habe ich bemerkt, dass jemand die Tür meines Autos zerkratzt hatte.
