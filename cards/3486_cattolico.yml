Rang: 3486
Wort: cattolico
Wortart: adj
Wort mit Artikel: cattolico
Femininum / Plural: ''
IPA: ''
Definition: katholisch, römisch-katholisch
Register: ''
Beispielsätze: |-
  La nostra famiglia è *cattolica* da generazioni e partecipa alla messa ogni domenica.
  Unsere Familie ist seit Generationen *katholisch* und geht jeden Sonntag zur Messe.
  
  Credo che il Papa sia una figura *cattolica* molto influente nel mondo.
  Ich glaube, dass der Papst eine sehr einflussreiche *katholische* Figur in der Welt ist.
  
  Se vuoi un matrimonio *cattolico*, devi seguire alcune regole della Chiesa.
  Wenn du eine *katholische* Hochzeit möchtest, musst du einige Regeln der Kirche befolgen.
  
  Non mi importa se qualcuno è *cattolico* o no, l’importante è essere buone persone.
  Es ist mir egal, ob jemand *katholisch* ist oder nicht – wichtig ist es, ein guter Mensch zu sein.
  
  La scuola che frequenta tuo figlio è di ispirazione *cattolica* ma accoglie tutti senza distinzione.
  Die Schule, die dein Sohn besucht, hat eine *katholische* Prägung, nimmt aber alle ohne Unterschied auf.
