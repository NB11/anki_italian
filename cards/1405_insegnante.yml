Rang: 1405
Wort: insegnante
Wortart: n.m
Wort mit Artikel: il insegnante
Femininum / Plural: gli insegnanti
IPA: ''
Definition: der Lehrer, - / die Lehrerin, -nen
Register: ''
Beispielsätze: |-
  Il *insegnante* ha spiegato molto chiaramente il problema della fisica.
  Der *Lehrer* hat das physikalische Problem sehr klar erklärt.
  
  Non appena ho visto il *insegnante*, ho ricordato tutte le battute che mi aveva raccontato a scuola.
  Sobald ich den *Lehrer* sah, erinnerte ich mich an alle Witze, die er mir in der Schule erzählt hatte.
  
  Se fossi stato più attento, il *insegnante* non avrebbe dovuto spiegare nuovamente l’argomento.
  Wenn ich aufmerksamer gewesen wäre, hätte der *Lehrer* das Thema nicht nochmal erklären müssen.
  
  L’uomo che ha appena parlato è l’*insegnante* di matematica della nostra scuola.
  Der Mann, der gerade gesprochen hat, ist der *Mathematiklehrer* unserer Schule.
  
  Domani mattina il *insegnante* arriverà direttamente dalla centrale di polizia, dove ha partecipato a una riunione.
  Morgen früh wird der *Lehrer* direkt vom Haupt-Polizeirevier kommen, wo er an einer Besprechung teilgenommen hat.
