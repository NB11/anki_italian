Beispielsätze: |-
  Il *lettore* ha apprezzato molto il romanzo che gli ho regalato per Natale.
  Der *Leser* hat den Roman, den ich ihm zu Weihnachten geschenkt habe, sehr geschätzt.
  
  Chi è il *lettore* ideale per questo tipo di libri?
  Wer ist der *ideale Leser* für diese Art von Büchern?
  
  Sebbene sia un *lettore* esigente, ha trovato questo articolo abbastanza scorrevole.
  Obwohl er ein *anspruchsvoller Leser* ist, fand er diesen Artikel ziemlich flüssig.
  
  Non appena il *lettore* volgerà pagina, scoprirà il vero colpevole della storia.
  Sobald der *Leser* die Seite umblättert, wird er den wahren Schuldigen der Geschichte entdecken.
  
  Mi hanno detto che il *lettore* di questo quotidiano è in calo negli ultimi mesi.
  Man hat mir gesagt, dass die *Leserschaft* dieser Zeitung in den letzten Monaten rückläufig ist.
