Rang: 4435
Wort: capolavoro
Wortart: n.m
Wort mit Artikel: il capolavoro
Femininum / Plural: capolavori
IPA: ''
Definition: das Meisterwerk, -e
Register: ''
Beispielsätze: |-
  Questo dipinto è considerato un *capolavoro* del Rinascimento italiano.
  Dieses Gemälde gilt als *Meisterwerk* der italienischen Renaissance.
  
  Gli studiosi discutono se questo romanzo sia davvero un *capolavoro* o solo un successo commerciale.
  Die Gelehrten diskutieren, ob dieser Roman wirklich ein *Meisterwerk* oder nur ein kommerzieller Erfolg ist.
  
  Il regista ha presentato il suo nuovo film come un *capolavoro* ancora in lavorazione, ma molti aspettano conferma.
  Der Regisseur hat seinen neuen Film als ein *Meisterwerk* in Arbeit vorgestellt, doch viele warten auf Bestätigung.
  
  Anche se alcune critiche non sono positive, molti considerano la mostra un *capolavoro* assoluto di arte contemporanea.
  Auch wenn einige Kritiken nicht positiv sind, betrachten viele die Ausstellung als ein *Meisterwerk* der zeitgenössischen Kunst.
  
  Non tutti sono d’accordo che quel *capolavoro* sia stato compreso appieno al suo tempo.
  Nicht alle sind sich einig, dass jenes *Meisterwerk* zu seiner Zeit vollends verstanden wurde.
