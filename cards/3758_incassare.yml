Rang: 3758
Wort: incassare
Wortart: vt
Wort mit Artikel: incassare
Femininum / Plural: ''
IPA: ''
Definition: einnehmen, kassieren
Register: ''
Beispielsätze: |-
  Dopo la vittoria, la squadra è riuscita a *incassare* anche i premi delle sponsorizzazioni.
  Nach dem Sieg gelang es dem Team, auch die Sponsorengelder *einzunehmen*.
  
  Se non *incasserai* almeno cento euro domani, non potrai pagare l’affitto.
  Wenn du morgen nicht mindestens hundert Euro *kassierst*, kannst du die Miete nicht zahlen.
  
  L’azienda ha *incassato* molto meno di quanto previsto nel bilancio trimestrale.
  Das Unternehmen hat viel weniger *eingenommen* als im Quartalsbericht prognostiziert.
  
  Nonostante la sconfitta, il giocatore ha continuato a *incassare* applausi dal pubblico entusiasta.
  Trotz der Niederlage erntete der Spieler weiterhin *Beifall* vom begeisterten Publikum.
  
  Se avessimo saputo che avrebbe *incassato* tutto il bottino, non avremmo accettato l’affare.
  Hätten wir gewusst, dass er die gesamte Beute *einkassieren* würde, hätten wir den Deal nicht angenommen.
