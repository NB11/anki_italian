Rang: 3144
Wort: femminuccia
Wortart: n.m
Wort mit Artikel: il femminuccia
Femininum / Plural: i femminucce
IPA: ''
Definition: das Weichei, -er
Register: ''
Beispielsätze: |-
  Non essere una *femminuccia*, affronta la paura!
  Sei kein *Weichei*, geh der Angst entgegen!
  
  Secondo lui, chi gioca a *femminucce* è poco maschile.
  Seiner Meinung nach ist, wer *Weicheier* spielt, wenig männlich.
  
  Ho sempre pensato che fosse una *femminuccia*, ma mi sbagliavo.
  Ich dachte immer, er sei ein *Weichei*, aber ich lag falsch.
  
  Se continui a fare la *femminuccia*, non otterrai mai il rispetto degli altri.
  Wenn du weiter wie ein *Weichei* handelst, wirst du nie Respekt bekommen.
  
  Le sue parole non erano altro che una scusa per non ammettere la *femminuccia* che c’era in lui.
  Seine Worte waren nur eine Ausrede, um die *Weichei*-Seite in ihm nicht zugeben zu müssen.
