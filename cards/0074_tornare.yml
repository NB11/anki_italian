Rang: 74
Wort: tornare
Wortart: vi
Wort mit Artikel: tornare
Femininum / Plural: ''
IPA: ''
Definition: zurückkehren, zurückkommen
Register: ''
Beispielsätze: |-
  Domani *tornerò* a casa presto.
  Morgen *komme* ich früh nach Hause *zurück*.
  
  Spero che *torni* presto anche tu!
  Ich hoffe, dass du auch bald *zurückkehrst*!
  
  Quando *sei tornato* dall'Italia?
  Wann bist du aus Italien *zurückgekommen*?
  
  *Torneremmo* volentieri, ma non abbiamo tempo.
  Wir *kämen* gern zurück, aber wir haben keine Zeit.
  
  Appena *tornerò* da scuola, ti chiamerò.
  Sobald ich aus der Schule *zurück bin*, rufe ich dich an.
