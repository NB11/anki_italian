Rang: 74
Wort: tornare
Wortart: vi
Wort mit Artikel: tornare
Femininum / Plural: ''
IPA: ''
Definition: zurückkehren, zurückkommen, heimgehen
Register: ''
Beispielsätze: |-
  Oggi *torno* a casa più tardi del solito.
  Heute *komme ich* später als gewöhnlich nach Hause.
  
  Sei sicuro di voler *tornare* indietro?
  Bist du sicher, dass du *zurückgehen* willst?
  
  Spero che *tornerai* presto da me.
  Ich hoffe, du *kehrst* bald zu mir zurück.
  
  Se avessi tempo, *tornerei* volentieri a visitare quella città.
  Wenn ich Zeit hätte, *würde ich* gerne wieder in diese Stadt reisen.
  
  Appena *tornerò* dal lavoro, ti aiuterò con i compiti.
  Sobald ich von der Arbeit *zurückkomme*, helfe ich dir mit den Hausaufgaben.
