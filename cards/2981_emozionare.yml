Rang: 2981
Wort: emozionare
Wortart: vt
Wort mit Artikel: emozionare
Femininum / Plural: ''
IPA: ''
Definition: emotional bewegen, erregen
Register: ''
Beispielsätze: |-
  Mi ha *emozionato* vedere come la popolazione ha ricostruito la città dopo il terremoto.
  Mich hat es *emotional bewegt*, zu sehen wie die Bevölkerung die Stadt nach dem Erdbeben wieder aufgebaut hat.
  
  Nonostante sia *emozionato*, cercherò di mantenere la calma durante l’esame.
  Obwohl ich *aufgeregt bin*, werde ich versuchen, während der Prüfung die Ruhe zu bewahren.
  
  La notizia della spedizione ha *emozionato* particolarmente il fotografo, che sogna di documentare quella regione.
  Die Nachricht von der *Expedition* hat den Fotografen besonders begeistert, der davon träumt, jenen Bereich zu dokumentieren.
  
  Mi aspettavo che l’incontro con l’associazione lo avrebbe *emozionato* meno di quanto non sia successo.
  Ich hatte erwartet, dass die Begegnung mit dem *Verein* ihn weniger bewegt hätte als es tatsächlich der Fall war.
  
  Se avessi saputo che avrebbe *emozionato* così tanto, avrei invitato anche la nonna a venire.
  Wenn ich gewusst hätte, dass es sie so *bewegen* würde, hätte ich auch die Oma gebeten zu kommen.
