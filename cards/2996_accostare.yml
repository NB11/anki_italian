Rang: 2996
Wort: accostare
Wortart: vt
Wort mit Artikel: accostare
Femininum / Plural: ''
IPA: ''
Definition: heranfahren, nähern
Register: ''
Beispielsätze: |-
  Il poliziotto si è fermato sul ciglio della strada per *accostare* il veicolo sospetto.
  Der Polizist ist am Straßenrand stehengeblieben, um das verdächtige Fahrzeug zu *heranfahren*.
  
  Se non *accosti* la barca con attenzione, perderemo tempo prezioso.
  Wenn du das Boot nicht sorgfältig *nährst*, verlieren wir wertvolle Zeit.
  
  L’autista ha dovuto *accostare* improvvisamente perché il bambino nella macchina accanto ha vomitato.
  Der Fahrer musste plötzlich *heranfahren*, weil das Kind im Auto nebenan erbrochen hat.
  
  Dopo aver *accostato* al marciapiede, ho trovato la chiave sotto la panchina.
  Nachdem ich am Gehweg *herangefahren* bin, habe ich den Schlüssel unter der Bank gefunden.
  
  Non mi sorprende che abbia scelto di *accostare* il suo racconto con un tono così drammatico.
  Es überrascht mich nicht, dass er seine Erzählung mit einem so dramatischen Ton *nähert*.
