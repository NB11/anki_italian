Rang: 3491
Wort: operaio
Wortart: n.m
Wort mit Artikel: l'operaio
Femininum / Plural: operai
IPA: ''
Definition: der Arbeiter, -
Register: ''
Beispielsätze: |-
  L'*operaio* sta riparando la macchina alle quattro del pomeriggio.
  Der *Arbeiter* repariert die Maschine um vier Uhr nachmittags.
  
  Gli *operai* che hanno perso il lavoro meritano un sostegno pubblico.
  Die *Arbeiter*, die ihren Job verloren haben, verdienen öffentliche Unterstützung.
  
  Se tu fossi stato un *operaio* come tuo padre, avresti capito le sue difficoltà.
  Wenn du ein *Arbeiter* wie dein Vater gewesen wärst, hättest du seine Schwierigkeiten verstanden.
  
  L'*operaio* che ho visto ieri al cantiere mi ha salutato calorosamente.
  Der *Arbeiter*, den ich gestern auf der Baustelle gesehen habe, hat mich herzlich gegrüßt.
  
  Soltanto l'*operaio* più esperto riuscì ad aggirare il problema tecnico.
  Nur der erfahrenste *Arbeiter* gelang es, das technische Problem zu umgehen.
