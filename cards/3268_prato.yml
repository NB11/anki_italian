Rang: 3268
Wort: prato
Wortart: n.m
Wort mit Artikel: il prato
Femininum / Plural: prati
IPA: ''
Definition: die Wiese, -n
Register: ''
Beispielsätze: |-
  I *prati* verdi erano pieni di fiori selvatici in primavera.
  Die grünen *Wiesen* waren im Frühling voller Wildblumen.
  
  Dopo la pioggia, i bambini amano correre nel *prato* del parco.
  Nach dem Regen rennen die Kinder gern über die *Wiese* im Park.
  
  Il contadino aveva seminato grano nel *prato* che poi trasformò in pascolo.
  Der Bauer hatte Weizen in der *Wiese* ausgesät, die er später in Weideland umwandelte.
  
  Abbiamo scelto un piccolo *prato* vicino al ruscello per il nostro picnic.
  Wir haben eine kleine *Wiese* nahe dem Bach für unser Picknick ausgewählt.
  
  Quando udì il rumore, si affrettò a tornare al *prato* dove aveva perso la sua maglia.
  Als er das Geräusch hörte, eilte er zurück auf die *Wiese*, wo er seinen Pullover verloren hatte.
