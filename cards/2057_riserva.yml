Rang: 2057
Wort: riserva
Wortart: n.f
Wort mit Artikel: la riserva
Femininum / Plural: riserve
IPA: ''
Definition: das Reservat, der Vorbehalt, die Reserve
Register: ''
Beispielsätze: |-
  È stata istituita una nuova *riserva* naturale nella zona umida.
  Es wurde ein neues Natur*reservat* in der Feuchtzone eingerichtet.
  
  Dopo la battuta, ho fatto una *riserva* di prudenza e non ho accettato subito.
  Nach dem Scherz gab ich eine vorsichtige *Rücksprache* und akzeptierte nicht sofort.
  
  In caso di emergenza, dobbiamo usare la *riserva* di carburante.
  Im Notfall müssen wir den Tank*vorrat* nutzen.
  
  La sua *riserva* di pazienza sembra infinita nonostante tutto.
  Sein Geduld*reservat* scheint unendlich trotz allem.
  
  Hanno avanzato una *riserva* sulla validità del contratto.
  Sie erhoben einen Vorbehalt bezüglich der Gültigkeit des Vertrags.
