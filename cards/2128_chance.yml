Rang: 2128
Wort: chance
Wortart: n.f
Wort mit Artikel: la chance
Femininum / Plural: le chance
IPA: ''
Definition: die Chance, -n
Register: ''
Beispielsätze: |-
  Se non provi almeno una volta, non avrai mai la *chance* di sapere se puoi farcela.
  Wenn du es nicht wenigstens einmal versuchst, wirst du nie die *Chance* haben zu wissen, ob du es schaffen kannst.
  
  Questa è l’ultima *chance* che ti do per dimostrare la tua lealtà.
  Das ist die letzte *Chance*, die ich dir gebe, um deine Loyalität zu beweisen.
  
  Nonostante tutto, lui vide in quella sconfitta una *chance* per migliorarsi.
  Trotz allem sah er in dieser Niederlage eine *Chance*, sich zu verbessern.
  
  Se avessi accettato quella proposta due anni fa, oggi avresti una *chance* completamente diversa.
  Hättest du diesen Vorschlag vor zwei Jahren angenommen, hättest du heute eine völlig andere *Chance*.
  
  Mi dispiace, ma per questa posizione non c’è alcuna *chance*: la decisione è già stata presa.
  Es tut mir leid, aber für diese Stelle gibt es keine *Chance*: Die Entscheidung ist bereits gefallen.
