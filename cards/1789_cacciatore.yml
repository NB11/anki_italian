Rang: 1789
Wort: cacciatore
Wortart: n.m
Wort mit Artikel: il cacciatore
Femininum / Plural: cacciatori
IPA: ''
Definition: der Jäger, -
Register: ''
Beispielsätze: |-
  Il *cacciatore* è uscito presto dalla baita per cercare tracce di orso.
  Der *Jäger* ist früh aus der Hütte gegangen, um Spuren von Bären zu suchen.
  
  Hanno assunto un *cacciatore* professionista per controllare la zona vicino al castello.
  Sie haben einen professionellen *Jäger* engagiert, um das Gebiet in der Nähe der Burg zu überwachen.
  
  Nonostante il divieto di caccia, il *cacciatore* ha sparato a un cervo nel bosco.
  Trotz des Jagdverbots hat der *Jäger* einen Hirsch im Wald erschossen.
  
  Se fosse un *cacciatore* esperto, saprebbe riconoscere le impronte di un lupo nel fango.
  Wenn er ein erfahrener *Jäger* wäre, würde er die Spuren eines Wolfes im Schlamm erkennen.
  
  Il *cacciatore*, che aveva visto lo sparo, ha chiamato la polizia per segnalare l’episodio.
  Der *Jäger*, der den Schuss gehört hatte, rief die Polizei, um den Vorfall zu melden.
