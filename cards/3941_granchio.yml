Rang: 3941
Wort: granchio
Wortart: n.m
Wort mit Artikel: il granchio
Femininum / Plural: granchi
IPA: ''
Definition: die Krabbe, -n; der Krebs, -e
Register: ''
Beispielsätze: |-
  Ho catturato un *granchio* rosso al mercato del pesce.
  Ich habe eine *Krabbe* am Fischmarkt gefangen.
  
  Non mangio mai un *granchio* che non ho visto muoversi prima.
  Ich esse nie eine *Krabbe*, die ich nicht vorher habe sich bewegen sehen.
  
  Se vuoi provare qualcosa di nuovo, assaggia un *granchio* speziato.
  Wenn du etwas Neues probieren möchtest, dann koste eine *Krabbe* mit Spezialgewürzen.
  
  Il *granchio* che hai preparato ieri era delizioso!
  Die *Krabbe*, die du gestern zubereitet hast, war köstlich!
  
  Nel parco vicino al mare ci sono molti *granchi* che si nascondono tra le rocce.
  Im Park in der Nähe des Meeres gibt es viele *Krebse*, die sich zwischen den Felsen verstecken.
