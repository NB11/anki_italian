Rang: 3535
Wort: intatto
Wortart: adj
Wort mit Artikel: intatto
Femininum / Plural: intatti (m.pl.), intatte (f.pl.)
IPA: ''
Definition: unversehrt, unbeschädigt
Register: ''
Beispielsätze: |-
  La scatola è rimasta *intatta* nonostante la caduta.
  Die Kiste ist trotz des Sturzes *unversehrt* geblieben.
  
  Ha conservato il ricordo di quella notte come qualcosa di *intatto*.
  Er hat die Erinnerung an jene Nacht wie etwas *Unversehrtes* bewahrt.
  
  Nonostante le difficoltà, la sua reputazione rimase *intatta*.
  Trotz der Schwierigkeiten blieb sein Ruf *unangetastet*.
  
  L'onore della famiglia deve rimanere *intatto*, disse il padre con fermezza.
  Die Ehre der Familie muss *unangetastet* bleiben, sagte der Vater mit Nachdruck.
  
  Il documento originale è arrivato *intatto* agli archivi storici.
  Das Originaldokument ist *unversehrt* in den historischen Archiven angekommen.
