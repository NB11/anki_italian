Rang: 1630
Wort: vomitare
Wortart: v
Wort mit Artikel: vomitare
Femininum / Plural: ''
IPA: ''
Definition: erbrechen
Register: ''
Beispielsätze: |-
  Dopo aver mangiato quella torta troppo grassa, ho iniziato a *vomitare* violentemente.
  Nachdem ich jenen zu *fetten* Kuchen gegessen hatte, begann ich heftig zu erbrechen.
  
  Mamma, per favore, stai attenta che il baby non *vomiti* la pizza che gli hai dato!
  Mama, bitte pass auf, dass das *winzige Kind* die Pizza, die du ihm gegeben hast, nicht erbricht!
  
  Se continui a *vomitare*, dovrò chiamare un’*ambulanza e fare una analisi* accurata.
  Wenn du weiter *erbrichst*, muss ich den Krankenwagen rufen und eine gründliche Analyse durchführen lassen.
  
  Nonostante il *traffico* intenso, il prete ha trovato il tempo di visitare il malato e pregare per lui.
  Trotz des starken *Verkehrs* fand der Priester Zeit, den Kranken zu besuchen und für ihn zu beten.
  
  L’ospedale offre una nuova terapia che dovrebbe aiutare chi soffre di *vomitare* frequenti dopo pasti pesanti.
  Das Krankenhaus bietet eine neue *Therapie*, die bei häufigem Erbrechen nach schweren Mahlzeiten helfen soll.
