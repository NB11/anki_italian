Beispielsätze: |-
  Quest'anno *viaggerò* in Italia con la mia famiglia.
  Dieses Jahr werde ich mit meiner Familie nach Italien *reisen*.
  
  Il *viaggio* da Berlino a Roma dura circa 14 ore in macchina.
  Die *Reise* von Berlin nach Rom dauert mit dem Auto etwa 14 Stunden.
  
  Hai già prenotato il *viaggio* di nozze?
  Hast du schon die Hochzeits*reise* gebucht?
  
  Durante il *viaggio* ho letto molti libri.
  Während der *Reise* habe ich viele Bücher gelesen.
  
  Vor il *viaggio* in Sicilia, dobbiamo preparare la valigia con cura.
  Vor der *Reise* nach Sizilien müssen wir den Koffer sorgfältig packen.
