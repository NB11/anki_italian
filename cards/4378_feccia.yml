Rang: 4378
Wort: feccia
Wortart: n.f
Wort mit Artikel: la feccia
Femininum / Plural: feccie
IPA: ''
Definition: der Abschaum, der Bodensatz
Register: ''
Beispielsätze: |-
  Dopo la festa in casa, *feccia* e avanzi coprivano il pavimento.
  Nach der Party in der Wohnung lag *Abschaum* und Abfall auf dem Boden.
  
  Questa birra ha un gusto strano, sembra ci sia della *feccia* sul fondo.
  Dieses Bier schmeckt komisch – es scheint *Bodensatz* am Boden zu sein.
  
  La *feccia* della società si nasconde spesso dietro false apparenze.
  Der *Abschaum* der Gesellschaft verbirgt sich oft hinter falschem Schein.
  
  Se non lavi bene la bottiglia, rimarrà della *feccia* anche dopo averla sciacquata.
  Wenn du die Flasche nicht gründlich spülst, bleibt *Bodensatz* auch danach haften.
  
  Hanno detto che la *feccia* del colonia è quella che dà il profumo caratteristico.
  Sie sagten, dass der *Abschaum* des Parfüms den typischen Duft verleiht.
