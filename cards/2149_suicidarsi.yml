Rang: 2149
Wort: suicidarsi
Wortart: v
Wort mit Artikel: suicidarsi
Femininum / Plural: ''
IPA: ''
Definition: sich selbst töten, Selbstmord begehen, Suizid begehen
Register: ''
Beispielsätze: |-
  Spero che non si *suicidi* mai a causa di problemi che sembrano insormontabili.
  Ich hoffe, dass er sich *niemals* aus Problemen, die unüberwindbar scheinen, selbst tötet.
  
  Dopo la sconfitta si era tanto disperato che aveva minacciato di *suicidarsi*.
  Nach der Niederlage war er so verzweifelt, dass er damit gedroht hatte, *sich das Leben zu nehmen*.
  
  Dicono che se uno si *suicida*, non si può più aiutarlo, purtroppo.
  Man sagt, wenn jemand *sich umbringt*, kann man ihm leider nicht mehr helfen.
  
  Avrebbe preferito *suicidarsi* piuttosto che continuare a vivere nella miseria.
  Er hätte es vorgezogen, *sich das Leben zu nehmen*, als weiter in Armut zu leben.
