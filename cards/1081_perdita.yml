Rang: 1081
Wort: perdita
Wortart: n.f
Wort mit Artikel: la perdita
Femininum / Plural: perdite
IPA: ''
Definition: der Verlust, -e
Register: ''
Beispielsätze: |-
  Dopo la *perdita* del suo cane, non usciva più di casa.
  Nach dem *Verlust* ihres Hundes ging sie nicht mehr aus dem Haus.
  
  Credo che la *perdita* di valore della nostra azienda sia irreversibile.
  Ich glaube, der *Wertverlust* unseres Unternehmens ist unumkehrbar.
  
  Se avessi saputo della *perdita* di quella pagina, avrei salvato il file prima.
  Wenn ich vom *Verlust* dieser Seite gewusst hätte, hätte ich die Datei vorher gespeichert.
  
  La polizia sospetta una *perdita* di dati sensibili dal dipartimento militare.
  Die Polizei vermutet einen *Datenverlust* aus der militärischen Abteilung.
  
  Nonostante la *perdita* di peso dopo la dieta, si sentiva ancora stanco ogni giorno.
  Trotz des *Gewichtsverlusts* nach der Diät fühlte er sich jeden Tag noch müde.
