Rang: 4377
Wort: disfare
Wortart: v
Wort mit Artikel: disfare
Femininum / Plural: ''
IPA: ''
Definition: zerlegen, abbauen, öffnen
Register: ''
Beispielsätze: |-
  Dopo il trasloco vorrei *disfare* subito tutti i pacchi per sistemare le cose.
  Nach dem Umzug möchte ich sofort alle Pakete *auspacken*, um die Dinge zu ordnen.
  
  Il tecnico sta cercando di *disfare* il guasto nella macchina fotografica.
  Der Techniker versucht, den *Defekt* in der Kamera zu beheben.
  
  Nonostante le difficoltà, hanno continuato a *disfare* il puzzle che era stato lasciato incompleto.
  Trotz der Schwierigkeiten haben sie weiter das Puzzle *auseinanderzunehmen*, das unvollendet geblieben war.
  
  Se *disfi* troppo presto il nodo, tutto si scioglierà di nuovo!
  Wenn du den Knoten zu früh *löst*, wird sich alles wieder lösen!
  
  L’artigiano sta per *disfare* la struttura di legno per controllare l’integrità delle travi.
  Der Handwerker wird gleich die Holzkonstruktion *zerlegen*, um die Stabilität der Balken zu prüfen.
