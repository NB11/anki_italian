Rang: 4127
Wort: inciampare
Wortart: vi
Wort mit Artikel: inciampare
Femininum / Plural: ''
IPA: ''
Definition: stolpern, straucheln
Register: ''
Beispielsätze: |-
  Ho fatto *inciampato* sul marciapiede perché non guardavo dove mettevo i piedi.
  Ich bin *gestolpert* über den Gehweg, weil ich nicht auf meinen Schritt geachtet habe.
  
  Se *inciampi* in questo gradino, potresti cadere e farti male.
  Wenn du *strauchelst* auf dieser Stufe, könntest du fallen und dich verletzen.
  
  Il cane ha *inciampato* nel suo guinzaglio e si è spaventato.
  Der Hund ist in seiner *Leine gestolpert* und hat sich erschreckt.
  
  Nonostante la scarsa illuminazione, lei è riuscita a evitare di *inciampare* nel buio.
  Trotz des schlechten Lichts konnte sie es vermeiden, im Dunkeln *zu straucheln*.
  
  Se avessi guardato meglio la griglia del pavimento, non avresti *inciampato*.
  Hättest du das Gitter des Fußbodens besser angesehen, wärst du nicht *gestolpert*.
Audio: ''
Notiz: ''
Dispersion: ''
