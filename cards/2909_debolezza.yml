Rang: 2909
Wort: debolezza
Wortart: n.f
Wort mit Artikel: la debolezza
Femininum / Plural: debolezze
IPA: ''
Definition: die Schwäche, -n
Register: ''
Beispielsätze: |-
  Non posso nascondere la mia *debolezza* per il cioccolato fondente.
  Ich kann meine *Schwäche* für dunkle Schokolade nicht verbergen.
  
  La sua unica *debolezza* è non saper resistere alle tentazioni.
  Seine einzige *Schwäche* ist, Versuchungen nicht widerstehen zu können.
  
  Ritenevo che la *debolezza* fisica fosse solo temporanea, invece persiste.
  Ich hielt die körperliche *Schwäche* für nur vorübergehend, stattdessen hält sie an.
  
  Se riconoscete una *debolezza* in voi stessi, lavorateci sopra!
  Wenn ihr eine *Schwäche* bei euch erkennt, arbeitet daran!
  
  Secondo me, non è una *debolezza* chiedere aiuto, ma un segno di intelligenza.
  Ich denke, Bitten um Hilfe ist keine *Schwäche*, sondern ein Zeichen von Intelligenz.
