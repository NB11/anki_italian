Rang: 1299
Wort: pessimo
Wortart: adj
Wort mit Artikel: pessimo
Femininum / Plural: ''
IPA: ''
Definition: sehr schlecht, miserabel
Register: ''
Beispielsätze: |-
  Il film che ho visto ieri era *pessimo*, non mi è piaciuto per nulla.
  Der Film, den ich gestern gesehen habe, war *schlecht*, er hat mir überhaupt nicht gefallen.
  
  Penso che il servizio in questo ristorante sia *pessimo*, ma pagano poco.
  Ich denke, der Service in diesem Restaurant ist *miserabel*, aber sie zahlen wenig.
  
  Se avessi saputo quanto era *pessimo* il concerto, non sarei mai venuto.
  Hätte ich gewusst, wie *schlecht* das Konzert war, wäre ich nie gekommen.
  
  È *pessimo* che tu non abbia avvertito gli altri del ritardo.
  Es ist *schlimm*, dass du die anderen nicht über die Verspätung informiert hast.
  
  Nonostante le recensioni *pessime*, ho deciso di leggere l’articolo per curiosità.
  Trotz der *schlechten* Bewertungen habe ich den Artikel aus Neugier gelesen.
