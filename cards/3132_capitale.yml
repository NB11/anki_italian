Rang: 3132
Wort: capitale
Wortart: n.f
Wort mit Artikel: la capitale
Femininum / Plural: capitali
IPA: ''
Definition: die Hauptstadt, -¨e
Register: ''
Beispielsätze: |-
  Roma è la *capitale* d'Italia da oltre duemila anni.
  Rom ist die *Hauptstadt* Italiens seit über zweitausend Jahren.
  
  Dopo la guerra, Berlino divenne la nuova *capitale* della Germania unificata.
  Nach dem Krieg wurde Berlin die neue *Hauptstadt* des wiedervereinigten Deutschlands.
  
  Credo che Parigi sia una delle *capitali* più affascinanti del mondo intero.
  Ich glaube, dass Paris eine der *Hauptstädte* der Welt ist.
  
  Prima di trasferirsi a Milano, viveva in una piccola città che non aveva nemmeno il suo *capitale* regionale.
  Bevor er nach Mailand zog, lebte er in einer kleinen Stadt, die nicht einmal eine eigene *Hauptstadt* der Region hatte.
  
  È indispensabile che ogni nazione abbia una *capitale* ben organizzata per attrarre turismo e investimenti.
  Es ist unerlässlich, dass jede Nation eine gut organisierte *Hauptstadt* hat, um Tourismus und Investitionen anzuziehen.
