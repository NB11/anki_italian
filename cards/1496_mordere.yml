Rang: 1496
Wort: mordere
Wortart: vt
Wort mit Artikel: mordere
Femininum / Plural: ''
IPA: ''
Definition: beißen, beißen, beißen
Register: ''
Beispielsätze: |-
  Il cane *morde* solo quando si sente minacciato.
  Der Hund *beißt* nur, wenn er sich bedroht fühlt.
  
  Se non ti fidi di lui, non *mordere* l’invito che ti ha fatto per il parco.
  Wenn du ihm nicht vertraust, *beiße* nicht in die Einladung, die er dir für den Park gemacht hat.
  
  Nonostante la violenza, il bimbo ha continuato a *mordere* il cioccolato.
  Trotz der *Gewalt* hat der Junge weiter in die Schokolade gebissen.
  
  Chi *morse* il pollo nel piatto senza avere il diritto di farlo?
  Wer hat in das Huhn auf dem *Teller* gebissen, ohne das Recht dazu zu haben?
  
  Sarebbe stato più saggio non *mordere* la carico di debiti altrui.
  Es wäre klüger gewesen, nicht in die *Schuldenlast* anderer zu beißen.
