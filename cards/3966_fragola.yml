Rang: 3966
Wort: fragola
Wortart: n.f
Wort mit Artikel: la fragola
Femininum / Plural: fragole
IPA: ''
Definition: die Erdbeere, -n
Register: ''
Beispielsätze: |-
  Mi piace molto mangiare una macedonia con *fragole* fresche in primavera.
  Ich esse gern einen Obstsalat mit *frischen Erdbeeren* im Frühling.
  
  Non sapevo che questa pianta producesse anche delle *fragole* gialle!
  Ich wusste nicht, dass diese Pflanze auch *gelbe Erdbeeren* trägt!
  
  Se avessi saputo che c'erano delle *fragole* in frigo, ne avrei comprato un po’ anch'io.
  Wenn ich gewusst hätte, dass *Erdbeeren* im Kühlschrank sind, hätte ich auch welche gekauft.
  
  La torta che hai preparato è deliziosa, soprattutto grazie alle *fragole* che ci hai messo sopra.
  Der Kuchen, den du gemacht hast, schmeckt hervorragend, vor allem dank der *Erdbeeren*, die du daraufgelegt hast.
  
  Non capisco perché la gente butti via le *fragole* quando sono troppo mature.
  Ich verstehe nicht, warum die Leute *Erdbeeren* wegwerfen, wenn sie zu reif sind.
