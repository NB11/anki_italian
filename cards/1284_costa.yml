Rang: 1284
Wort: costa
Wortart: n.f
Wort mit Artikel: la costa
Femininum / Plural: coste
IPA: ''
Definition: die Küste, -n; die Kosten Pl.
Register: ''
Beispielsätze: |-
  La *costa* toscana è famosa per i suoi paesaggi mozzafiato e i piccoli villaggi colorati.
  Die *türkische Küste* ist berühmt für ihre atemberaubenden Landschaften und farbenfrohen kleinen Dörfer.
  
  Non so se comprare questa casa in *costa*: il prezzo è troppo alto e non so se venderla sarà facile.
  Ich weiß nicht, ob ich dieses Haus an *der Küste* kaufen soll: der Preis ist zu hoch und ich weiß nicht, ob der Verkauf einfach sein wird.
  
  Ha organizzato una vacanza in *costa* per nonna che ha nato proprio oggi il suo ottantesimo compleanno!
  Sie hat einen Urlaub an *der Küste* für Oma organisiert, die heute genau ihren achtzigsten Geburtstag gefeiert hat!
  
  Le *coste* italiane del Mediterraneo sono molto diverse tra loro, sia per il paesaggio che per le tradizioni locali.
  Die *Küsten* Italiens im Mittelmeer sind sehr unterschiedlich, sowohl was die Landschaft als auch die lokalen Traditionen betrifft.
  
  Sai che la *costa* della Sicilia è lunga quasi 1000 chilometri? Ma non tutti sanno che molte spiagge sono permesso solo con accesso a pagamento.
  Weißt du, dass die *Küste* Siziliens fast tausend Kilometer lang ist? Aber nicht alle wissen, dass viele Strände nur gegen Entgelt betreten werden dürfen.
