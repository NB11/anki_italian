Rang: 1751
Wort: cima
Wortart: n.m
Wort mit Artikel: la cima
Femininum / Plural: cime
IPA: ''
Definition: der Gipfel, -
Register: ''
Beispielsätze: |-
  Dopo una lunga camminata siamo finalmente arrivati alla *cima* della montagna.
  Nach einem langen Marsch sind wir endlich am *Gipfel* des Berges angekommen.
  
  La *cima* dell’albero era coperta di neve, rendendo il paesaggio ancora più suggestivo.
  Die *Spitze* des Baumes war mit Schnee bedeckt, was die Landschaft noch eindrucksvoller machte.
  
  Vuoi che ti mostri la *cima* del gelato con questa guarnizione speciale?
  Soll ich dir die *Spitze* des Eises mit dieser besonderen Dekoration zeigen?
  
  Nonostante il vento forte, loro hanno deciso di raggiungere la *cima* del vulcano attivo.
  Trotz des starken Windes haben sie beschlossen, den *Gipfel* des aktiven Vulkans zu erreichen.
  
  La *cima* di questa torre è accessibile solo con una speciale autorizzazione.
  Die *Spitze* dieses Turms ist nur mit einer besonderen Genehmigung zugänglich.
