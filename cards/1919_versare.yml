Rang: 1919
Wort: versare
Wortart: vt
Wort mit Artikel: versare
Femininum / Plural: ''
IPA: ''
Definition: gießen, gießen, schütten
Register: ''
Beispielsätze: |-
  Devi *versare* l'acqua nella pentola prima che si scaldi.
  Du musst das*Wasser* in den Topf gießen, bevor es heiß wird.
  
  Il cameriere ha *versato* il vino rosso nel bicchiere con attenzione.
  Der Kellner hat den*Rotwein* vorsichtig ins Glas gegossen.
  
  Se *verserai* troppo olio, il sugo diventerà troppo grasso.
  Wenn du zu viel Öl *gießt*, wird die Sauce zu fettig.
  
  Ho visto che *versava* le lacrime osservando il tramonto.
  Ich sah, wie er Tränen *weinte*, während er den Sonnenuntergang betrachtete.
  
  Non appena avrai finito di *versare* il cemento, copri il secchio prima che si indurisca.
  Sobald du das*Zement* gegossen hast, decke den Eimer ab, bevor es hart wird.
