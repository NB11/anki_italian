Rang: 888
Wort: legare
Wortart: vt
Wort mit Artikel: legare
Femininum / Plural: ''
IPA: ''
Definition: binden, verbinden, verknüpfen
Register: ''
Beispielsätze: |-
  Devi *legare* la scatola con lo spago prima di buttarla.
  Du musst die Schachtel mit der Schnur *binden*, bevor du sie wegwirfst.
  
  Se non *leghi* il cane al palo, scapperà di nuovo!
  Wenn du den Hund nicht am Pfahl *bindest*, wird er wieder weglaufen!
  
  Lui ha *legato* la sua fortuna al successo di questo progetto.
  Er hat sein Glück mit dem Erfolg dieses Projekts *verbunden*.
  
  La polizia ha trovato una traccia che potrebbe aiutare a *legare* il colpevole al delitto.
  Die Polizei hat eine Spur gefunden, die helfen könnte, den Täter mit dem Verbrechen *zu verknüpfen*.
  
  Perché *lega* sempre la sua felicità al risultato degli esami?
  Warum *verknüpft* er sein Glück immer mit dem Ergebnis der Prüfungen?
