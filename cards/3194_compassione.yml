Rang: 3194
Wort: compassione
Wortart: n.f
Wort mit Artikel: la compassione
Femininum / Plural: compassioni
IPA: ''
Definition: das Mitleid, das Mitgefühl
Register: ''
Beispielsätze: |-
  Provo *compassione* per chi non ha una casa durante questi freddi inverni.
  Ich empfinde *Mitleid* mit denen, die in diesen kalten Wintern kein Zuhause haben.
  
  La *compassione* che hai mostrato verso di lui mi ha davvero commosso.
  Das *Mitgefühl*, das du ihm entgegengebracht hast, hat mich wirklich gerührt.
  
  Nonostante tutto, sentiva ancora *compassione* per chi lo aveva tradito.
  Trotz allem empfand er noch immer *Mitleid* für diejenigen, die ihn verraten hatten.
  
  Se avessi più *compassione*, non saresti così duro con gli altri.
  Wenn du mehr *Mitgefühl* hättest, wärst du nicht so hart zu anderen.
  
  È raro trovare persone che agiscono con tanta *compassione* nei confronti degli animali.
  Es ist selten, Menschen zu finden, die so viel *Mitgefühl* gegenüber Tieren zeigen.
