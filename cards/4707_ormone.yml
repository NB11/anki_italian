Wort mit Artikel: l'ormone
Femininum / Plural: ormoni
IPA: ''
Definition: das Hormon, -e
Register: ''
Beispielsätze: |-
  Il medico ha misurato il livello di *ormone* nel sangue del paziente.
  Der Arzt hat den *Hormon*spiegel im Blut des Patienten gemessen.
  
  Molti *ormoni* regolano il nostro metabolismo e le emozioni.
  Viele *Hormone* regulieren unseren Stoffwechsel und unsere Gefühle.
  
  Credevo che l'*ormone* della crescita fosse solo per i bambini, ma mi sbagliavo.
  Ich dachte, das Wachstums*hormon* gelte nur für Kinder, aber ich lag falsch.
  
  Se non ci fosse l'*ormone* che stimola la tiroide, il nostro corpo funzionerebbe male.
  Wenn es das Schilddrüsenstimulierenden *Hormon* nicht gäbe, würde unser Körper nicht richtig funktionieren.
  
  I ricercatori stanno studiando come alcuni *ormoni* influenzino il sonno e l'umore.
  Die Forscher untersuchen, wie einige *Hormone* Schlaf und Stimmung beeinflussen.
