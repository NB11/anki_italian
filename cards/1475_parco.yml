Rang: 1475
Wort: parco
Wortart: n.m
Wort mit Artikel: il parco
Femininum / Plural: parchi
IPA: ''
Definition: der Park, -s
Register: ''
Beispielsätze: |-
  Ogni domenica portiamo i *parchi* per fare un picnic con la famiglia.
  Jeden Sonntag gehen wir in *den Park*, um ein Picknick mit der Familie zu machen.
  
  Vuoi venire con me al *parco* vicino a casa tua? Ci sono molti alberi e panchine.
  Wollen Sie mit mir in *den Park* in Ihrer Nähe gehen? Es gibt viele Bäume und Bänke.
  
  Le *parchi* pubblici sono stati chiusi per purtroppo mancanza di fondi.
  Die öffentlichen *Parks* wurden leider wegen Geldmangels geschlossen.
  
  Quando ero piccolo, giocavo spesso nel *parco* dietro casa mia con i miei amici tedeschi.
  Als ich klein war, spielte ich oft in *dem Park* hinter meinem Haus mit meinen deutschen Freunden.
  
  Hanno proposto di ristrutturare il *parco* per renderlo più accessibile agli amici della cultura sociale.
  Sie haben vorgeschlagen, *den Park* umzubauen, um ihn gesellschaftlichen Initiativen zugänglicher zu machen.
