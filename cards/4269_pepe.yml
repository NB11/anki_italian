Rang: 4269
Wort: pepe
Wortart: n.m
Wort mit Artikel: il pepe
Femininum / Plural: pepe
IPA: ''
Definition: der Pfeffer, -
Register: ''
Beispielsätze: |-
  Nel piatto manca un pizzico di *pepe* per insaporire.
  In dem Gericht fehlt eine Prise Pfeffer, um es zu würzen.
  
  I cuochi aggiungono sempre del *pepe* nero alle loro ricette tradizionali.
  Die Köche fügen ihren traditionellen Rezepten immer schwarzen Pfeffer hinzu.
  
  Nonostante il sapore forte, questo piatto non contiene *pepe*, ma solo erbe aromatiche.
  Trotz des intensiven Aromas enthält dieses Gericht keinen Pfeffer, sondern nur Kräuter.
  
  Se vuoi un risultato più piccante, metti più *pepe* nella preparazione.
  Wenn du ein schärferes Ergebnis möchtest, gib mehr Pfeffer in die Zubereitung.
  
  Il *pepe* di Cayenna è molto più piccante rispetto al pepe normale.
  Pfeffer von Cayenne ist viel schärfer als normaler Pfeffer.
