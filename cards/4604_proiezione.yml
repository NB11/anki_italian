Rang: 4604
Wort: proiezione
Wortart: n.f
Wort mit Artikel: la proiezione
Femininum / Plural: proiezioni
IPA: ''
Definition: die Projektierung, der Filmvorführung, die Darstellung
Register: ''
Beispielsätze: |-
  La *proiezione* del film è prevista per le otto di sera.
  Die *Vorstellung* des Film ist für acht Uhr abends geplant.
  
  Hanno organizzato una *proiezione* speciale per celebrare il centenario della pellicola.
  Sie haben eine besondere *Projektion* organisiert, um das Jubiläum des Films zu feiern.
  
  Nonostante la *proiezione* fosse stata annullata, il regista rimase sul set per tutto il pomeriggio.
  Obwohl die *Darstellung* abgesagt worden war, blieb der Regisseur den ganzen Nachmittag auf dem Set.
  
  Mi piacerebbe assistere a una *proiezione* in lingua originale, ma purtroppo non è disponibile.
  Ich würde gerne an einer *Projektion* in Originalsprache teilnehmen, leider ist sie nicht verfügbar.
  
  La *proiezione* dell’ombra sulla parete cambiava a seconda dell’angolazione della luce.
  Die *Wiedergabe* des Schattens an der Wand änderte sich je nach dem Winkel des Lichts.
