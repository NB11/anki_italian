Rang: 3427
Wort: striscia
Wortart: n.f
Wort mit Artikel: la striscia
Femininum / Plural: strisce
IPA: ''
Definition: der Streifen, -
Register: ''
Beispielsätze: |-
  Sulla strada c'è una *striscia* gialla che indica il passaggio pedonale.
  Auf der Straße ist ein gelber *Streifen*, der den Fußgängerüberweg anzeigt.
  
  Ho visto una *striscia* di luce filtrare dalla finestra del seminterrato.
  Ich habe einen Licht*streifen* gesehen, der durch das Kellerfenster drang.
  
  In questa città ci sono molte *strisce* pedonali vicino alle scuole.
  In dieser Stadt gibt es viele Fußgänger*streifen* in der Nähe der Schulen.
  
  La *striscia* di verde lungo il fiume è stata recentemente ampliata.
  Der grüne *Streifen* entlang des Flusses wurde kürzlich erweitert.
  
  Mi sono accorto che sulla maglietta c'era una *striscia* di sporco che non si toglieva.
  Mir ist aufgefallen, dass auf dem T-Shirt ein Schmutz*streifen* war, der sich nicht entfernen ließ.
