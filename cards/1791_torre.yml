Rang: 1791
Wort: torre
Wortart: n.f
Wort mit Artikel: la torre
Femininum / Plural: torri
IPA: ''
Definition: der Turm, -¨e
Register: ''
Beispielsätze: |-
  Dalla *torre* del castello si vede tutta la valle sottostante.
  Vom *Turm* der Burg aus sieht man das ganze Tal darunter.
  
  Gli architetti hanno progettato una *torre* così alta che sembra tocca il cielo.
  Die Architekten haben einen *Turm* entworfen, der so hoch ist, dass er den Himmel zu berühren scheint.
  
  Se fossi in te, salirei sulla *torre* solo con una guida esperta.
  Wenn ich du wäre, würde ich den *Turm* nur mit einem erfahrenen Führer besteigen.
  
  La *torre* di Pisa è famosa per la sua pendenza, che attira turisti da tutto il mondo.
  Der *Turm* von Pisa ist berühmt für seine Neigung, die Touristen aus aller Welt anzieht.
  
  Hanno installato delle telecamere sulla *torre* per migliorare la sorveglianza del parco.
  Sie haben Kameras am *Turm* angebracht, um die Überwachung des Parks zu verbessern.
