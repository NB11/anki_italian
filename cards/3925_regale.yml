Rang: 3925
Wort: regale
Wortart: adj
Wort mit Artikel: regale
Femininum / Plural: ''
IPA: ''
Definition: königlich, prächtig
Register: ''
Beispielsätze: |-
  La coppia ha organizzato un pranzo *regale* per celebrare il loro anniversario.
  Das Paar hat ein *königliches* Mittagessen organisiert, um ihren Jahrestag zu feiern.
  
  Questo vino ha un sapore così *regale* che sembra uscito da una cantina storica.
  Dieser Wein hat einen so *prächtigen* Geschmack, als käme er aus einem historischen Weinkeller.
  
  Nonostante il *regale* aspetto della torta, il suo sapore era sorprendentemente semplice.
  Trotz des *königlichen* Aussehens des Kuchens war sein Geschmack überraschend einfach.
  
  Le stanze dell'albergo erano arredate in modo *regale*, con mobili antichi e dettagli sontuosi.
  Die Hotelzimmer waren auf *königliche* Art eingerichtet, mit antiken Möbeln und üppigen Details.
  
  Se avessi un budget illimitato, organizzeremmo una festa *regale* per il compleanno di nostro figlio.
  Wenn wir ein unbegrenztes Budget hätten, würden wir eine *prächtige* Feier zum Geburtstag unseres Sohnes organisieren.
