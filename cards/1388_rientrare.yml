Rang: 1388
Wort: rientrare
Wortart: vi
Wort mit Artikel: rientrare
Femininum / Plural: ''
IPA: ''
Definition: zurückkehren, heimkommen, nach Hause gehen
Register: ''
Beispielsätze: |-
  Ogni *rientro* a casa dopo un lungo viaggio mi riempie di gioia.
  Jede Rückkehr nach Hause nach einer langen Reise erfüllt mich mit Freude.
  
  Mio marito *rientra* sempre tardi la sera, ma oggi è arrivato presto perché aveva finito in anticipo al lavoro.
  Mein Mann kommt immer spät abends *zurück*, aber heute ist er früh angekommen, weil er früher Feierabend hatte.
  
  Se *rientri* direttamente dal lavoro, fermati al supermercato a comprare il latte, per favore.
  Wenn du direkt von der Arbeit *zurückkehrst*, könntest du bitte beim Supermarkt haltmachen, um Milch zu kaufen.
  
  L’ispettore federale *rientrò* nella sua abitazione dopo aver chiuso il caso del killer di Venezia.
  Der Bundesinspektor kehrte in seine Wohnung zurück, nachdem er den Fall des Mörders aus Venedig abgeschlossen hatte.
  
  Non appena avrò finito di lavorare, *rientrerò* a casa per preparare la cena insieme a te.
  Sobald ich mit der Arbeit fertig bin, werde ich *nach Hause zurückkehren*, um mit dir Abendessen zuzubereiten.
