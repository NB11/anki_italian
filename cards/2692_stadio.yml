Rang: 2692
Wort: stadio
Wortart: n.m
Wort mit Artikel: lo stadio
Femininum / Plural: stadi
IPA: ''
Definition: das Stadion, Stadien
Register: ''
Beispielsätze: |-
  Lo *stadio* di Milano è uno dei più grandi d'Europa.
  Das *Stadion* von Mailand ist eines der größten in Europa.
  
  I tifosi hanno riempito lo *stadio* in meno di un’ora.
  Die Fans haben das *Stadion* in weniger als einer Stunde gefüllt.
  
  Domani visiteremo lo *stadio* che è stato inaugurato l’anno scorso.
  Morgen werden wir das *Stadion* besichtigen, das vor einem Jahr eröffnet wurde.
  
  Se non avessimo prenotato i biglietti per tempo, non saremmo riusciti a entrare nello *stadio* affollato.
  Wenn wir die Tickets nicht rechtzeitig gebucht hätten, wären wir nicht in das überfüllte *Stadion* gelangt.
  
  In questo *stadio* si sono giocate alcune partite storiche della nazionale italiana.
  In diesem *Stadion* wurden einige historische Partien der italienischen Nationalmannschaft ausgetragen.
