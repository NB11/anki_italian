Rang: 3600
Wort: corruzione
Wortart: n.f
Wort mit Artikel: la corruzione
Femininum / Plural: corruzioni
IPA: ''
Definition: die *Korruption*, die *Bestechung*
Register: ''
Beispielsätze: |-
  Molti cittadini temono che la *corruzione* nei governi stia aumentando.
  Viele Bürger befürchten, dass die *Korruption* in den Regierungen zunimmt.
  
  L’inchiesta ha rivelato una rete di *corruzione* che coinvolgeva funzionari pubblici.
  Die Untersuchung deckte ein Netz von *Bestechung* auf, das öffentliche Amtsträger einbezog.
  
  Nonostante le accuse, l’onorevole ha negato qualsiasi forma di *corruzione*.
  Trotz der Anschuldigungen bestritt der *ehrenwerte* Abgeordnete jede Form von Korruption.
  
  Se scoprissero anche solo un caso di *corruzione*, le sue dimissioni sarebbero inevitabili.
  Wenn man auch nur einen Fall von *Bestechung* entdecken würde, wären seine Kündigungen unvermeidlich.
  
  La *corruzione* è un male che corrode la fiducia nelle istituzioni democratiche.
  Die *Korruption* ist ein Übel, das das Vertrauen in die demokratischen Institutionen untergräbt.
