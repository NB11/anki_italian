Rang: 3367
Wort: disgrazia
Wortart: n.f
Wort mit Artikel: la disgrazia
Femininum / Plural: disgrazie
IPA: ''
Definition: das Unglück, -e
Register: ''
Beispielsätze: |-
  Dopo la *disgrazia* che ha colpito la sua famiglia, ha deciso di partire per un viaggio lontano.
  Nach dem *Unglück*, das seine Familie getroffen hatte, beschloss er, eine weite Reise zu machen.
  
  La *disgrazia* è arrivata quando il ponte è crollato durante la tempesta.
  Das *Unglück* ereignete sich, als die Brücke während des Sturms einstürzte.
  
  Dicono che sia stata una *disgrazia* evitare di più, ma nessuno lo conferma.
  Man sagt, es war ein *Unglück*, mehr zu vermeiden, aber bestätigt wird es nicht.
  
  L’ospedale ha curato tutti i feriti della *disgrazia* stradale senza fare errori.
  Das Krankenhaus hat alle Verletzten des *Unglücks* auf der Straße fehlerfrei behandelt.
  
  Se non fosse per quella *disgrazia*, oggi lavorerei ancora nello stesso posto.
  Wäre jenes *Unglück* nicht gewesen, würde ich heute noch am selben Ort arbeiten.
