Rang: 3365
Wort: accertare
Wortart: vt
Wort mit Artikel: accertare
Femininum / Plural: ''
IPA: ''
Definition: feststellen, überprüfen, klären
Register: ''
Beispielsätze: |-
  Devi *accertare* la provenienza di questi documenti prima di usarli.
  Du musst die Herkunft dieser Dokumente *überprüfen*, bevor du sie benutzt.
  
  Si è rifiutato di *accertare* se la colpa fosse sua o di qualcun altro.
  Er weigerte sich, *festzustellen*, ob die Schuld bei ihm oder bei jemand anderem lag.
  
  Non appena avranno *accertato* la causa dell’incidente, ci informeranno.
  Sobald sie die Ursache des Unfalls *geklärt* haben, werden sie uns informieren.
  
  Avrei voluto *accertare* la verità, ma non ne ho avuto il tempo.
  Ich hätte die Wahrheit *feststellen* wollen, aber ich hatte keine Zeit dafür.
  
  Il medico ha provato a *accertare* quali fossero i sintomi più comuni.
  Der Arzt versuchte *festzustellen*, welche die häufigsten Symptome waren.
Audio: ''
Notiz: ''
