Rang: 4425
Wort: scintilla
Wortart: n.m
Wort mit Artikel: lo scintilla
Femininum / Plural: le scintille
IPA: ''
Definition: der Funke, -n
Register: ''
Beispielsätze: |-
  Ho visto *scintille* uscire dal camino mentre il fuoco bruciava con forza.
  Ich habe *Funken* aus dem Kamin sprühen sehen, während das Feuer stark brannte.
  
  Non c'è nemmeno *una scintilla* di speranza nel suo sguardo.
  Es gibt nicht einmal *einen Funken* Hoffnung in seinem Blick.
  
  Se non avessi usato il parafulmine, le *scintille* avrebbero incendiato il tetto.
  Hätte ich den Blitzableiter nicht benutzt, hätten die *Funken* das Dach entzündet.
  
  La sua risposta fu così secca che non rimase *scintilla* di tenerezza nelle sue parole.
  Seine Antwort war so schroff, dass nicht *ein Funke* Zärtlichkeit in seinen Worten blieb.
  
  Lo scienziato osservava attentamente come le *scintille* si diffondessero nel plasma ad alta temperatura.
  Der Wissenschaftler beobachtete genau, wie sich die *Funken* im Hochtemperaturplasma ausbreiteten.
