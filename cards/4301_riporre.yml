Rang: 4301
Wort: riporre
Wortart: vt
Wort mit Artikel: riporre
Femininum / Plural: ''
IPA: ''
Definition: zurücklegen, ablegen, einräumen
Register: ''
Beispielsätze: |-
  Non *ripongo* mai le chiavi nello stesso posto per non perderle.
  Ich *lege* meine Schlüssel nie an denselben Ort, um sie nicht zu verlieren.
  
  Dopo la riunione, il direttore ha *riposto* i documenti nella cassaforte.
  Nach der Besprechung hat der Direktor die Dokumente *im Safe verwahrt*.
  
  Sarebbe utile se *riponessi* finalmente i tuoi vestiti nell’armadio!
  Es wäre hilfreich, wenn du deine Kleidung *endlich in den Schrank räumst*!
  
  Nonostante la confusione, lei ha *riposto* tutti i libri nell’ordine giusto in pochi minuti.
  Trotz des Durcheinanders hat sie alle Bücher *ordnungsgemäß zurückgestellt*.
  
  Se tu avessi *riposto* le posate in quel cassetto, ora non dovremmo cercarle.
  Hättest du das Besteck *in dieser Schublade deponiert*, müssten wir es jetzt nicht suchen.
