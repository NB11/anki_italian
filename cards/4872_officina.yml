Rang: 4872
Wort: officina
Wortart: n.f
Wort mit Artikel: l'officina
Femininum / Plural: officine
IPA: ''
Definition: die Werkstatt, -stätten
Register: ''
Beispielsätze: |-
  Mario lavora come meccanico nella *officina* del suo quartiere.
  Mario arbeitet als Mechaniker in der *Werkstatt* seines Stadtviertels.
  
  Dopo l’incidente, la *officina* del compagno è rimasta chiusa per una settimana.
  Nach dem Unfall blieb die *Werkstatt* meines Freundes eine Woche lang geschlossen.
  
  Se avessi più tempo, imparerei a riparare la mia *officina* da solo.
  Wenn ich mehr Zeit hätte, würde ich meine *Werkstatt* selbst reparieren lernen.
  
  La *officina* dove lavora mio fratello è famosa per la qualità dei suoi lavori.
  Die *Werkstatt*, in der mein Bruder arbeitet, ist für die Qualität ihrer Arbeit bekannt.
  
  Non appena avrò i soldi, aprirò una *officina* specializzata in auto elettriche.
  Sobald ich das Geld habe, werde ich eine *Werkstatt* eröffnen, die sich auf Elektroautos spezialisiert.
