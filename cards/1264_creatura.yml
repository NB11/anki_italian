Rang: 1264
Wort: creatura
Wortart: n.f
Wort mit Artikel: la creatura
Femininum / Plural: creature
IPA: ''
Definition: das Wesen, -
Register: ''
Beispielsätze: |-
  Quella *creatura* sembra molto debole dopo la lunga camminata nella campagna.
  Jenes *Wesen* wirkt sehr schwach nach dem langen Spaziergang in der Landschaft.
  
  Il comandante ordinò di cercare qualsiasi *creatura* sospetta tra le rocce.
  Der Befehlshaber befahl, jedes *verdächtige* Wesen zwischen den Steinen zu suchen.
  
  Secondo la leggenda, la *creatura* abita sotto il tetto di questa vecchia casa.
  Laut der Legende wohnt das *Wesen* unter dem Dach dieses alten Hauses.
  
  Se avessi visto una *creatura* così strana, avrei dubitato della mia stessa vista!
  Hätte ich ein so seltsames *Wesen* gesehen, ich hätte an meinem eigenen Blick gezweifelt!
  
  La *creatura*, che tutti cercavano, era in realtà una semplice proprietà comune.
  Das *Wesen*, nach dem alle suchten, war in Wirklichkeit ein einfaches gemeinsames Eigentum.
