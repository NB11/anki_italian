Rang: 4793
Wort: eroico
Wortart: adj
Wort mit Artikel: eroico
Femininum / Plural: ''
IPA: ''
Definition: heldenhaft, heldenmütig
Register: ''
Beispielsätze: |-
  Il soldato ha compiuto un atto *eroico* per salvare i suoi compagni.
  Der Soldat hat eine *heldenhafte* Tat vollbracht, um seine Kameraden zu retten.
  
  Nonostante la paura, lei ha reagito in modo *eroico* davanti al pericolo.
  Trotz der Angst hat sie sich *heldenhaft* der Gefahr gestellt.
  
  Secondo me, la sua decisione di aiutare è stata *eroica*, ma un po’ teatrale.
  Ihrer Meinung nach war seine Entscheidung zu helfen *heldenhaft*, aber etwas theatralisch.
  
  Se fossi stato *eroico*, avrei affrontato la situazione senza esitazioni.
  Wäre ich *heldenhaft* gewesen, hätte ich die Situation ohne Zögern bewältigt.
  
  La storia racconta di un personaggio *eroico* che combatte contro un impostore crudele.
  Die Geschichte erzählt von einer *heldenhaften* Figur, die gegen einen grausamen Hochstapler kämpft.
