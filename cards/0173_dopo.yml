Rang: 173
Wort: dopo
Wortart: adv
Wort mit Artikel: dopo
Femininum / Plural: ''
IPA: ''
Definition: danach, nachher
Register: ''
Beispielsätze: |-
  Ho finito di lavorare e *dopo* sono andato al cinema.
  Ich habe aufgehört zu arbeiten und bin *danach* ins Kino gegangen.
  
  *Dopo* pranzo, vuoi fare una passeggiata?
  Willst du *nach* dem Mittagessen spazieren gehen?
  
  Non ricordo cosa ho fatto *dopo* quella sera.
  Ich erinnere mich nicht, was ich *danach* an diesem Abend gemacht habe.
  
  Possiamo incontrarci *dopo* le otto, va bene?
  Können wir uns *nach* acht Uhr treffen, ist das okay?
  
  Era stanco, ma *dopo* un caffè si è ripreso.
  Er war müde, aber *nach* einem Kaffee hat er sich erholt.
