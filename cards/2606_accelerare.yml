Rang: 2606
Wort: accelerare
Wortart: v
Wort mit Artikel: accelerare
Femininum / Plural: ''
IPA: ''
Definition: beschleunigen, schneller machen
Register: ''
Beispielsätze: |-
  Il treno sta *accelerando* perché il conducente vuole arrivare in orario.
  Der Zug ist am *Beschleunigen*, weil der Fahrer pünktlich ankommen will.
  
  Se la polizia ci ferma, dobbiamo *accelerare* per non perdere il nostro appuntamento.
  Wenn die Polizei uns anhält, müssen wir *beschleunigen*, um unseren Termin nicht zu verpassen.
  
  L’allenatore ci ha detto: «Dovete *accelerare* verso la meta per vincere la partita».
  Der Trainer hat zu uns gesagt: «Ihr *müsst* zur Ziellinie beschleunigen, um das Spiel zu gewinnen».
  
  Nonostante la fatica, ho dovuto *accelerare* perché il mio collega era già in ritardo.
  Trotz der *Mühe* musste ich beschleunigen, weil mein Kollege schon zu spät dran war.
  
  Gli scienziati stanno cercando di *accelerare* il processo di sviluppo del nuovo medicinale.
  Die Wissenschaftler versuchen, den *Prozess* der Entwicklung des neuen Medikaments zu beschleunigen.
