Rang: 1340
Wort: ala
Wortart: n.f
Wort mit Artikel: l'ala
Femininum / Plural: ali
IPA: ''
Definition: der Flügel, -
Register: ''
Beispielsätze: |-
  La *ala* dell’aeroplano era danneggiata dopo l’atterraggio d’emergenza a Pessimo tempo.
  Der *Flügel* des Flugzeugs war nach der Notlandung bei schlechtem Wetter beschädigt.
  
  Nonostante il *trucco* pesante sul viso, nessuno riuscì a nascondere la sua maestà naturale in quella foto particolare.
  Trotz des dicken *Make-ups* auf dem Gesicht konnte niemand ihre natürliche Erhabenheit in diesem besonderen Foto verbergen.
  
  Chi gridava con tanta forza che la *ala* del vento la portò quasi via dal giardino?
  Wer hat so laut geschrien, dass der *Flügel* des Windes sie fast aus dem Garten fortgerissen hätte?
  
  L’assistente dell’ispettore spiegò che l’*ala* dell’albergo, costruita nel secolo scorso, avrebbe presto ospitato una mostra sulla magia antica.
  Der Assistent des *Inspektors* erklärte, dass der Flügel des Hotels, im letzten Jahrhundert erbaut, bald eine Ausstellung über die alte Magie beherbergen würde.
  
  Sì, lassù si vedono le *ali* dell’uccello che vola verso la spiaggia, ma nessuno sa se guarirà dalla ferita che ha riportato ieri.
  Ja, dort oben sieht man die *Flügel* des Vogels, der zum Strand fliegt – doch niemand weiß, ob er von der Verletzung, die er gestern erlitt, genesen wird.
