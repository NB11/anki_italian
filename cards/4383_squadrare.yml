Rang: 4383
Wort: squadrare
Wortart: v
Wort mit Artikel: squadrare
Femininum / Plural: ''
IPA: ''
Definition: ausrichten, anpassen
Register: ''
Beispielsätze: |-
  Devi *squadrare* la porta perché entri perfettamente nella cornice.
  Du musst die Tür *ausrichten*, damit sie perfekt in den Rahmen passt.
  
  L’architetto ha *squadrato* il terreno prima di posizionare i mattoni.
  Der Architekt hat das Gelände *angepasst*, bevor er die Backsteine positionierte.
  
  Il falegname *squadra* sempre attentamente il legno prima di tagliarlo.
  Der Tischler richtet das Holz immer sorgfältig *aus*, bevor er es schneidet.
  
  Se non *squadri* bene le assi, il tavolo non resterà stabile.
  Wenn du die Bretter nicht gut *ausrichtest*, bleibt der Tisch nicht stabil.
  
  Ho provato a *squadrare* la foto, ma non è venuta dritta.
  Ich habe versucht, das Foto *auszurichten*, aber es ist nicht gerade geworden.
