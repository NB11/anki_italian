Rang: 4787
Wort: odorare
Wortart: v
Wort mit Artikel: odorare
Femininum / Plural: ''
IPA: ''
Definition: riechen, duften
Register: ''
Beispielsätze: |-
  Il profumo di questa *odorava* di fiori freschi e di primavera.
  Das Aroma von diesem *duftete* nach frischen Blumen und Frühling.
  
  Credo che tu stia cercando di *odorare* la mia pazienza!
  Ich glaube, du versuchst gerade, meine *Geduld* zu testen!
  
  Non appena entrai in cucina, potei subito *odorare* il pane appena sfornato.
  Sobald ich in die Küche trat, konnte ich sofort das frisch gebackene Brot *riechen*.
  
  Se avessi un cane, potrei *odorare* tutto ciò che tocca a terra.
  Wenn ich einen Hund hätte, könnte ich *alles* am Boden erschnuppern.
  
  Mi dissero che nel negozio vicino si poteva *odorare* l'aroma dei biscotti appena cotti.
  Sie sagten mir, dass man im Nachbarladen den *Duft* der frisch gebackenen Kekse riechen konnte.
