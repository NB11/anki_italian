Rang: 1204
Wort: combinare
Wortart: v
Wort mit Artikel: combinare
Femininum / Plural: ''
IPA: ''
Definition: kombinieren, veranlassen
Register: ''
Beispielsätze: |-
  Se vuoi *combinare* un viaggio perfetto, devi pianificare ogni dettaglio con attenzione.
  Wenn du eine perfekte Reise *kombinieren* willst, musst du jedes Detail sorgfältig planen.
  
  Lui ha *combinato* un pasticcio con le sue decisioni affrettate ieri sera.
  Er hat mit seinen übereilten Entscheidungen gestern Abend ein *Durcheinander* veranlasst.
  
  Non so come tu sia riuscito a *combinare* tutto questo lavoro in così poco tempo!
  Ich weiß nicht, wie du es geschafft hast, diese ganze Arbeit in so kurzer Zeit *zu kombinieren*!
  
  Magari *combinassero* una soluzione che accontenti tutti gli ospiti della festa.
  Vielleicht *würden* sie eine Lösung kombinieren, die alle Gäste der Feier zufriedenstellt.
  
  Aveva promesso che non avrebbe più *combinato* guai, ma questa volta ha davvero esagerato.
  Er hatte versprochen, nie wieder Ärger *zu verursachen*, aber dieses Mal hat er es wirklich übertrieben.
