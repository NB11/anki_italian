Rang: 1006
Wort: comprendere
Wortart: v
Wort mit Artikel: comprendere
Femininum / Plural: ''
IPA: ''
Definition: begreifen, verstehen, erfassen
Register: ''
Beispielsätze: |-
  Non *comprendo* perché tu voglia cacciare il nostro vicino dalla sua casa.
  Ich *verstehe* nicht, warum du unseren Nachbarn aus seinem Haus vertreiben möchtest.
  
  Se avessi più calma, *comprenderesti* meglio il discorso del professore.
  Wenn du mehr *Ruhe* hättest, würdest du die Rede des Professors besser verstehen.
  
  Mi sembra che tu non *abbia compreso* la gravità della malattia che ci siamo presi.
  Es scheint mir, dass du die Schwere der *Krankheit*, die wir uns zugezogen haben, nicht begriffen hast.
  
  Appena arrivato in isola, *compresi* che la difesa della cultura locale era una faccenda seria.
  Sobald ich auf der *Insel* ankam, erkannte ich, dass der Schutz der lokalen Kultur eine ernste Angelegenheit war.
  
  Vorresti *comprendere* la sua carriera, inoltre devi considerare l’odore di porco che emana dalla stanza.
  Du *möchtest* seine Laufbahn verstehen, außerdem musst du den dreckigen Geruch berücksichtigen, der aus dem Raum kommt.
