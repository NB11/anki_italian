Rang: 2762
Wort: violazione
Wortart: n.f
Wort mit Artikel: la violazione
Femininum / Plural: violazioni
IPA: ''
Definition: die Verletzung, -en
Register: ''
Beispielsätze: |-
  La *violazione* della privacy è un reato grave secondo la legge italiana.
  Die *Verletzung* der Privatsphäre ist ein schweres Verbrechen nach italienischem Recht.
  
  Dopo la *violazione* del protocollo, il direttore ha convocato un’assemblea straordinaria.
  Nach der *Verletzung* des Protokolls hat der Direktor eine außerordentliche Versammlung einberufen.
  
  Se la *violazione* dei diritti umani non viene denunciata, resterà impunita.
  Wenn die *Verletzung* der Menschenrechte nicht gemeldet wird, bleibt sie straffrei.
  
  La *violazione* delle norme stradali può costare una sanzione salata.
  Die *Verletzung* der Straßenverkehrsregeln kann eine happige Strafe kosten.
  
  Nonostante la *violazione* del coprifuoco, i ragazzi sono usciti ugualmente.
  Trotz der *Verletzung* der Ausgangssperre sind die Jugendlichen trotzdem ausgegangen.
