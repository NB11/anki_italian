Rang: 3706
Wort: finocchio
Wortart: n.m
Wort mit Artikel: il finocchio
Femininum / Plural: finocchi
IPA: ''
Definition: der Fenchel, -e
Register: ''
Beispielsätze: |-
  Nel giardino crescono diversi *finocchi* selvatici.
  Im Garten wachsen mehrere *Fenchel* wild.
  
  Ho preparato un piatto con *finocchio* gratinato e patate al forno.
  Ich habe ein Gericht mit *Fenchel* überbacken und Ofenkartoffeln zubereitet.
  
  È raro trovare *finocchi* freschi fuori stagione.
  Es ist selten, frischen *Fenchel* außerhalb der Saison zu finden.
  
  Mia nonna usava sempre il *finocchio* per insaporire le zuppe.
  Meine Oma verwendete immer *Fenchel*, um die Suppen zu würzen.
  
  Vorrei sapere se tra i *finocchi* che hai comprato ce n'è uno già marcio.
  Ich würde gerne wissen, ob von den *Fencheln*, die du gekauft hast, einer bereits faulig ist.
