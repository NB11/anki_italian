Rang: 565
Wort: compagnia
Wortart: n.f
Wort mit Artikel: la compagnia
Femininum / Plural: compagnie
IPA: ''
Definition: die Gesellschaft, die Begleitung
Register: ''
Beispielsätze: |-
  Ho invitato la mia migliore amica per fare *compagnia* a mia sorella durante il viaggio.
  Ich habe meine beste Freundin eingeladen, um meiner Schwester während der Reise *Gesellschaft* zu leisten.
  
  Nonostante la *compagnia* di quel cane, ho sempre paura dei cani grandi.
  Trotz der *Begleitung* durch diesen Hund habe ich immer Angst vor großen Hunden.
  
  Avrei preferito partire da solo, ma la *compagnia* di Marco mi ha convinto a restare.
  Ich wäre lieber allein losgegangen, aber die *Gesellschaft* von Marco hat mich überzeugt zu bleiben.
  
  Se avessi saputo che la *compagnia* di tuo fratello porta solo guai, non sarei venuto.
  Wenn ich gewusst hätte, dass die *Begleitung* deines Bruders nur Ärger bringt, wäre ich nicht gekommen.
  
  È incredibile come la *compagnia* giusta possa cambiare le cose circa ogni situazione.
  Es ist unglaublich, wie die richtige *Gesellschaft* fast jede Situation verändern kann.
