Rang: 1668
Wort: tacere
Wortart: vi
Wort mit Artikel: tacere
Femininum / Plural: ''
IPA: ''
Definition: schweigen, verstummen, schweigen
Register: ''
Beispielsätze: |-
  Dopo l'*ha tacit* per un’ora, alla fine ha parlato della situazione difficile.
  Nach dem er *geschwiegen* hatte, sprach er schließlich über die schwierige Situation.
  
  Se *tacerai* troppo a lungo, nessuno capirà il tuo punto di vista.
  Wenn du zu lange *schweigen* wirst, versteht niemand deinen Standpunkt.
  
  Nonostante la notizia fosse scioccante, ha preferito *tacere* e osservare la reazione degli altri.
  Obwohl die Nachricht schockierend war, entschied er sich zu *schweigen* und die Reaktion der anderen zu beobachten.
  
  Il politico *taceva* durante l’intervento del senatore, ma non era d’accordo con le sue parole.
  Der Politiker *schweigen* während des Redebeitrags des Senators, stimmte aber dessen Worten nicht zu.
  
  Mentre assisteva all’analisi dei dati, gli venne la nausea e dovette *tacere* per non vomitare nel corridoio.
  Während er der Datenanalyse beiwohnte, wurde ihm übel und er musste *schweigen*, um nicht im Flur zu erbrechen.
