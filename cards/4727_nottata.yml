Rang: 4727
Wort: nottata
Wortart: n.f
Wort mit Artikel: la nottata
Femininum / Plural: nottate
IPA: ''
Definition: die Nacht mit ihren Gefahren
Register: ''
Beispielsätze: |-
  La *nottata* era così buia che ho avuto paura di uscire da sola.
  Die *Nacht* war so dunkel, dass ich Angst hatte, allein hinauszugehen.
  
  Non ricordava nulla della *nottata*, ma sapeva che qualcosa non andava.
  Er erinnerte sich an nichts von der *Nacht*, aber er wusste, dass etwas nicht stimmte.
  
  Dopo la *nottata* trascorsa in bianco, decise di prendere un caffè forte.
  Nach der *Nacht* ohne Schlaf beschloss er, einen starken Kaffee zu trinken.
  
  Si lamenta sempre della *nottata* trascorsa al freddo durante il campeggio.
  Er beschwert sich ständig über die *Nacht*, die er beim Camping in der Kälte verbracht hat.
  
  Se la *nottata* fosse finita prima, non avrebbe perso l’aereo.
  Wenn die *Nacht* früher geendet hätte, hätte er das Flugzeug nicht verpasst.
