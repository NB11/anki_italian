Rang: 1839
Wort: alba
Wortart: n.f
Wort mit Artikel: l'alba
Femininum / Plural: albe
IPA: ''
Definition: die Morgendämmerung, der Sonnenaufgang
Register: ''
Beispielsätze: |-
  Ho visto una bellissima *alba* mentre camminavo lungo il fiume.
  Ich habe einen wunderschönen *Sonnenaufgang* gesehen, während ich am Fluss entlanglief.
  
  Se domani uscirai presto, potrai ammirare l’*alba* sul mare.
  Wenn du morgen früh hinausgehst, kannst du den *Sonnenaufgang* über dem Meer bewundern.
  
  L’*alba* era così luminosa che mi ha svegliato prima del solito.
  Die *Morgendämmerung* war so hell, dass sie mich früher als sonst geweckt hat.
  
  Non dimenticare di scattare una foto all’*alba*: è sempre magica.
  Vergiss nicht, ein Foto vom *Sonnenaufgang* zu machen: Er ist immer magisch.
  
  L’*alba* a Roma, con il Colosseo in controluce, è uno spettacolo indimenticabile.
  Die *Morgendämmerung* in Rom, mit dem Kolosseum im Gegenlicht, ist ein unvergessliches Schauspiel.
