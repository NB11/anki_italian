Rang: 2241
Wort: probabilità
Wortart: n.f
Wort mit Artikel: la probabilità
Femininum / Plural: probabilità
IPA: ''
Definition: die Wahrscheinlichkeit, -en
Register: ''
Beispielsätze: |-
  La *probabilità* che vinca è molto bassa, ma bisogna sperare.
  Die *Wahrscheinlichkeit*, dass er gewinnt, ist sehr gering, aber man muss hoffen.
  
  Nonostante l’impegno, la *probabilità* di successo rimane incerta.
  Trotz der Bemühungen bleibt die *Wahrscheinlichkeit* des Erfolgs ungewiss.
  
  Secondo gli studi, la *probabilità* di ammalarsi aumenta con l’età.
  Laut Studien steigt die *Wahrscheinlichkeit*, krank zu werden, mit dem Alter.
  
  Hanno assicurato che la *probabilità* di un incidente è minima.
  Sie versicherten, dass die *Wahrscheinlichkeit* eines Unfalls gering ist.
  
  La *probabilità* che tu riesca in questa impresa è davvero alta!
  Die *Wahrscheinlichkeit*, dass du es schaffst, ist wirklich hoch!
