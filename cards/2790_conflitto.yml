Rang: 2790
Wort: conflitto
Wortart: n.m
Wort mit Artikel: il conflitto
Femininum / Plural: i conflitti
IPA: ''
Definition: der Konflikt, -e
Register: ''
Beispielsätze: |-
  Il *conflitto* tra i due paesi è iniziato molti anni fa e ancora non si è risolto.
  Der *Konflikt* zwischen den beiden Ländern begann vor vielen Jahren und ist immer noch nicht gelöst.
  
  Nonostante i continui *conflitti* familiari, lei cerca sempre di mantenere la pace.
  Trotz der ständigen familiären *Konflikte* versucht sie stets, den Frieden zu wahren.
  
  Credi che gli animi si plachino solo quando il *conflitto* viene affrontato apertamente?
  Glaubst du, dass sich die Gemüter erst beruhigen, wenn der *Konflikt* offen angesprochen wird?
  
  Il governo ha promesso di risolvere il *conflitto* sociale con nuove politiche economiche.
  Die Regierung hat versprochen, den sozialen *Konflikt* mit neuen Wirtschaftspolitiken zu lösen.
  
  Il *conflitto* interiore di Marco era così forte che decise di prendersi una pausa dal lavoro.
  Der innere *Konflikt* von Marco war so stark, dass er sich eine Pause von der Arbeit nahm.
