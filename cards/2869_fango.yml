Rang: 2869
Wort: fango
Wortart: n.m
Wort mit Artikel: il fango
Femininum / Plural: fanghi
IPA: ''
Definition: der Schlamm, -e
Register: ''
Beispielsätze: |-
  Dopo la pioggia, *il fango* rende le strade impraticabili per le auto.
  Nach dem Regen macht *der Schlamm* die Straßen für Autos unpassierbar.
  
  I bambini adorano giocare con *il fango* nel giardino dopo un temporale.
  Die Kinder lieben es, mit *dem Schlamm* im Garten nach einem Gewitter zu spielen.
  
  Nonostante *il fango* sulle scarpe, lei decise di entrare in casa senza pulirle.
  Trotz *des Schlamms* an den Schuhen beschloss sie, ohne ihn zu entfernen, ins Haus zu gehen.
  
  Se continuerà a piovere, *il fango* potrebbe compromettere il raccolto di questa stagione.
  Wenn es weiterregnet, könnte *der Schlamm* die Ernte dieser Saison gefährden.
  
  Hanno trovato tracce di *fango* sulle scarpe dell’imputato, un elemento chiave nel processo.
  Sie fanden Schlammspuren an den Schuhen des Angeklagten, ein entscheidendes Element im Prozess.
