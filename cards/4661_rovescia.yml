Rang: 4661
Wort: rovescia
Wortart: n.f
Wort mit Artikel: la rovescia
Femininum / Plural: rovesce
IPA: ''
Definition: der Regenfall, -fälle
Register: ''
Beispielsätze: |-
  La *rovescia* improvvisa ha rovinato la nostra escursione in montagna.
  Der plötzliche *Regenfall* hat unsere Wanderung in den Bergen ruiniert.
  
  Hai visto che *rovescia* di acqua stamattina mentre andavo al lavoro?
  Hast du den *Regenfall* heute Morgen gesehen, als ich zur Arbeit ging?
  
  Non mi aspetto una *rovescia* così intensa durante l’estate.
  Ich erwarte keinen so heftigen *Regenfall* während des Sommers.
  
  Se ci fosse stata una *rovescia* più breve, avremmo potuto finire il picnic.
  Wenn es einen kürzeren *Regenfall* gegeben hätte, hätten wir das Picknick beenden können.
  
  La *rovescia* di ieri sera ha allagato il giardino per ore.
  Der *Regenfall* von gestern Abend hat den Garten stundenlang überflutet.
