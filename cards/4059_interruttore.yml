Rang: 4059
Wort: interruttore
Wortart: n.m
Wort mit Artikel: l'interruttore
Femininum / Plural: interruttori
IPA: ''
Definition: der Schalter, -
Register: ''
Beispielsätze: |-
  Ho dimenticato di spegnere l'*interruttore* della luce prima di uscire.
  Ich habe vergessen, den *Schalter* des Lichts auszuschalten, bevor ich gegangen bin.
  
  L'*interruttore* della televisione si è rotto improvvisamente durante lo spettacolo.
  Der *Schalter* des Fernsehers ist plötzlich während der Show kaputtgegangen.
  
  Non sapevo che ci fosse un *interruttore* nascosto dietro il pannello.
  Ich wusste nicht, dass es einen versteckten *Schalter* hinter dem Panel gab.
  
  Se premi l'*interruttore* rosso, la macchina si avvia automaticamente.
  Wenn du den roten *Schalter* drückst, startet der Apparat automatisch.
  
  Ha sostituito l'*interruttore* della lampada con uno più moderno solo ieri.
  Er hat den *Schalter* der Lampe erst gestern durch einen moderneren ersetzt.
