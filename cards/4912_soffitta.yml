Rang: 4912
Wort: soffitta
Wortart: n.f
Wort mit Artikel: la soffitta
Femininum / Plural: soffitte
IPA: ''
Definition: der Dachboden, -¨
Register: ''
Beispielsätze: |-
  Abbiamo trovato vecchi libri nella *soffitta* dei nonni.
  Wir haben alte Bücher auf dem *Dachboden* der Großeltern gefunden.
  
  La *soffitta* era piena di polvere e ragnatele.
  Der *Dachboden* war voller Staub und Spinnweben.
  
  Se avessi tempo, vorrei sistemare la *soffitta* per farci un ufficio.
  Wenn ich Zeit hätte, würde ich den *Dachboden* als Büro einrichten.
  
  Hanno trasformato la *soffitta* in un appartamento accogliente.
  Sie haben den *Dachboden* in eine gemütliche Wohnung verwandelt.
  
  Dalla *soffitta* si gode una vista spettacolare sulla città.
  Vom *Dachboden* aus hat man eine spektakuläre Aussicht auf die Stadt.
