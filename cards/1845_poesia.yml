Rang: 1845
Wort: poesia
Wortart: n.f
Wort mit Artikel: la poesia
Femininum / Plural: poesie
IPA: ''
Definition: das Gedicht, -e
Register: ''
Beispielsätze: |-
  La *poesia* che hai letto ieri era molto bella.
  Das *Gedicht*, das du gestern gelesen hast, war sehr schön.
  
  Credi che lui possa scrivere una *poesia* in pochi minuti?
  Glaubst du, dass er in wenigen Minuten ein *Gedicht* schreiben kann?
  
  Ho imparato a memoria questa *poesia* per il concorso scolastico.
  Ich habe dieses *Gedicht* für den Schulwettbewerb auswendig gelernt.
  
  Se avessi più tempo, scriverei una *poesia* su questa bellissima tempesta che stiamo osservando.
  Wenn ich mehr Zeit hätte, würde ich ein *Gedicht* über diesen wunderschönen Sturm schreiben, den wir gerade beobachten.
  
  La *poesia* che hai trovato nel diario di nonna è piena di significato.
  Das *Gedicht*, das du im Tagebuch deiner Oma gefunden hast, ist voller Bedeutung.
