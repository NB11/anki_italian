Rang: 3479
Wort: fallito
Wortart: adj
Wort mit Artikel: fallito
Femininum / Plural: ''
IPA: ''
Definition: gescheitert, fehlgeschlagen
Register: ''
Beispielsätze: |-
  Questo progetto è *fallito* perché non abbiamo avuto abbastanza tempo.
  Dieses Projekt ist *gescheitert*, weil wir nicht genug Zeit hatten.
  
  La ditta ha dichiarato *fallito* il suo più grande concorrente.
  Die *Firma* hat ihren größten Konkurrenten als gescheitert erklärt.
  
  Nonostante gli sforzi, la sua carriera è risultata *fallita*.
  Trotz seiner Bemühungen erwies sich seine Karriere als *gescheitert*.
  
  Dicono che il suo *fallito* tentativo di aprire un ristorante sia ancora oggetto di scherno.
  Man sagt, sein *gescheiterter* Versuch, ein Restaurant zu eröffnen, sei immer noch Gegenstand von Spott.
  
  Se il piano fosse *fallito*, avremmo dovuto cercare un sostituto migliore.
  Wäre der Plan *gescheitert*, hätten wir einen besseren Ersatz suchen müssen.
