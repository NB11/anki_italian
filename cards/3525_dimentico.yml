  Die ältere Dame war in den letzten Jahren sehr *vergesslich*.
  
  Non essere *dimentico* di chiamare tua madre, per favore.
  Sei nicht *vergesslich*, deine Mutter anzurufen, bitte.
  
  Pur essendo *dimentico*, Mario ha un cuore generoso.
  Auch wenn er *vergesslich* ist, hat Mario ein großzügiges Herz.
