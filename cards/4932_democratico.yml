Rang: 4932
Wort: democratico
Wortart: adj
Wort mit Artikel: democratico
Femininum / Plural: ''
IPA: ''
Definition: demokratisch
Register: ''
Beispielsätze: |-
  Questo processo decisionale è *democratico* e include tutti i cittadini.
  Dieser Entscheidungsprozess ist *demokratisch* und schließt alle Bürger ein.
  
  Vorremmo un sistema *democratico* che rispetti i diritti umani.
  Wir möchten ein *demokratisches* System, das die Menschenrechte respektiert.
  
  Anche se non sempre perfetto, il sistema *democratico* rimane il migliore.
  Auch wenn er nicht immer perfekt ist, bleibt das *demokratische* System das beste.
  
  I cittadini sperano in una riforma *democratica* della legge elettorale.
  Die Bürger hoffen auf eine *demokratische* Reform des Wahlgesetzes.
  
  È fondamentale che la società sia sempre *democratica* per evitare abusi di potere.
  Es ist entscheidend, dass die Gesellschaft immer *demokratisch* bleibt, um Machtmissbrauch zu vermeiden.
