Wort: sapere
Wortart: v
Wort mit Artikel: sapere
Femininum / Plural: ''
IPA: ''
Definition: wissen, können
Register: ''
Beispielsätze: |-
  Non *so* dove abita Marco.
  Ich *weiß* nicht, wo Marco wohnt.
  
  *Sai* cucinare una torta al cioccolato?
  *Kannst* du einen Schokoladenkuchen backen?
  
  Ho *saputo* la notizia solo ieri.
  Ich habe die Neuigkeit erst gestern *erfahren*.
  
  Vorrei *sapere* il tuo parere sulla faccenda.
  Ich möchte gerne deine Meinung zu der Angelegenheit *wissen*.
  
  Se *sapessi* la risposta, te la direi subito!
  Wenn ich die Antwort *wüsste*, würde ich sie dir sofort sagen!
