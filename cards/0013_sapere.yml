Rang: 13
Wort: sapere
Wortart: v
Wort mit Artikel: sapere
Femininum / Plural: ''
IPA: ''
Definition: wissen, können
Register: ''
Beispielsätze: |-
  Non *so* dove si trova la stazione.
  Ich *weiß* nicht, wo sich der Bahnhof befindet.
  
  *Sapeste* risolvere questo problema, vi darei un premio.
  *Wüsstet* ihr, dieses Problem zu lösen, würde ich euch einen Preis geben.
  
  Ho *saputo* della tua promozione solo ieri!
  Ich habe von deiner Beförderung erst gestern *erfahren*!
  
  *Sai* nuotare?
  *Kannst* du schwimmen?
  
  Se *avessi saputo* prima, ti avrei avvertito.
  Wenn ich es früher *gewusst hätte*, hätte ich dich gewarnt.
