Rang: 802
Wort: discutere
Wortart: v
Wort mit Artikel: discutere
Femininum / Plural: ''
IPA: ''
Definition: diskutieren, erörtern
Register: ''
Beispielsätze: |-
  Stasera *discuteremo* i dettagli del progetto insieme.
  Heute Abend werden wir die Details des Projekts zusammen *besprechen*.
  
  Perché non *discutiamo* di questa questione in modo civile?
  Warum *diskutieren* wir diese Angelegenheit nicht auf zivilisierte Weise?
  
  Ha *discusso* a lungo con il suo capo prima di prendere una decisione.
  Er hat lange mit seinem Chef *diskutiert*, bevor er eine Entscheidung traf.
  
  Vorrei *discutere* la possibilità di un aumento di stipendio.
  Ich möchte die Möglichkeit einer Gehaltserhöhung *erwägen*.
  
  Se avessi tempo, *discuterei* più a fondo di questo argomento con te.
  Wenn ich Zeit hätte, würde ich dieses Thema mit dir *besprechen*.
