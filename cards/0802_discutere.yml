Rang: 802
Wort: discutere
Wortart: vt
Wort mit Artikel: discutere
Femininum / Plural: ''
IPA: ''
Definition: diskutieren, besprechen, erörtern
Register: ''
Beispielsätze: |-
  Stasera *discuteremo* a lungo su questo problema con il tenente Henry.
  Heute Abend werden wir dieses Problem **mit dem Leutnant Henry* lange besprechen*.
  
  Nonostante il caos, sono riuscito a *discutere* tranquillamente con il giudice in merito alla pena.
  Trotz dem Chaos konnte ich mich **mit dem Richter* ruhig über die Strafe unterhalten*.
  
  Se avessi saputo dell’occasione, *avremmo discusso* prima dell’operazione.
  Wenn ich die **Gelegenheit* gekannt hätte, hätten wir uns vor der Operation unterhalten*.
  
  Il personale del club *discute* spesso di calcio durante le partite, ma stasera sembra calmo.
  Das **Clubpersonal* diskutiert oft über Fußball während der Spiele, aber heute Abend wirkt es gelassen*.
  
  L’esercito avrebbe *discusso* la strategia, ma il generale è scomparso all’improvviso.
  Das **Heer* hätte die Strategie erörtert, doch der General ist plötzlich verschwunden*.
