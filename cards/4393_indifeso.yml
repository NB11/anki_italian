Rang: 4393
Wort: indifeso
Wortart: adj
Wort mit Artikel: indifeso
Femininum / Plural: ''
IPA: ''
Definition: unverteidigt, schutzlos
Register: ''
Beispielsätze: |-
  Il bambino si sentiva *indifeso* di fronte alla rabbia del padre.
  Das Kind fühlte sich der Wut des Vaters gegenüber *schutzlos*.
  
  Le truppe furono *indifese* durante l’attacco nemico.
  Die Truppen waren während des feindlichen Angriffs *unverteidigt*.
  
  Nonostante le sue paure, rimase *indifeso* contro le critiche altrui.
  Trotz seiner Ängste blieb er den Kritik anderer gegenüber *schutzlos*.
  
  La città, *indifesa*, si arrese all’invasore senza opporre resistenza.
  Die Stadt, *unverteidigt*, ergab sich dem Eindringling, ohne Widerstand zu leisten.
  
  Molti animali si fingono *indifesi* per evitare i predatori, come fa l’opossum.
  Viele Tiere tun so, als wären sie *schutzlos*, um Raubtiere abzuschrecken, wie das Opossum es tut.
