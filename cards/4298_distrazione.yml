Rang: 4298
Wort: distrazione
Wortart: n.f
Wort mit Artikel: la distrazione
Femininum / Plural: distrazioni
IPA: ''
Definition: die Unachtsamkeit, -en
Register: ''
Beispielsätze: |-
  È successo per *distrazione*: ho rotto il bicchiere che volevo solo pulire.
  Es ist aus *Unachtsamkeit* passiert: Ich habe das Glas zerbrochen, das ich nur putzen wollte.
  
  La *distrazione* di Marco in ufficio è dovuta allo stress continuo che avverte.
  Die *Unachtsamkeit* von Marco im Büro beruht auf dem ständigen Stress, den er spürt.
  
  Senza *distrazione*, avresti notato che il termostato era già acceso.
  Ohne *Unachtsamkeit* hättest du bemerkt, dass das Thermostat schon eingeschaltet war.
  
  Spesso la *distrazione* porta a sbagliare, soprattutto quando si è stanchi.
  Oft führt *Unachtsamkeit* zu Fehlern, besonders wenn man müde ist.
  
  Ho letto che una *distrazione* anche minima può causare incidenti gravi al volante.
  Ich habe gelesen, dass selbst eine minimale *Unachtsamkeit* schwere Unfälle am Steuer verursachen kann.
