Rang: 3511
Wort: night
Wortart: n.f
Wort mit Artikel: la night
Femininum / Plural: notti
IPA: ''
Definition: die Nacht, -¨e
Register: ''
Beispielsätze: |-
  Durante la *notte* ho sognato di volare sopra la città.
  Während der *Nacht* habe ich davon geträumt, über die Stadt zu fliegen.
  
  Se esci di sera, indossa sempre un giubbotto, anche in questa *notte* fredda.
  Wenn du abends rausgehst, zieh immer eine Jacke an, auch in dieser *kalten Nacht*.
  
  Mia nonna raccontava sempre che una volta, in una *notte* di tempesta, aveva visto un fantasma vicino al fiume.
  Meine Großmutter erzählte immer, dass sie einmal in einer *stürmischen Nacht* einen Geist am Fluss gesehen hatte.
  
  Non appena calerà il sole, accenderemo le luci perché la *notte* è troppo buia per vedere qualcosa.
  Sobald die Sonne untergeht, werden wir das Licht anmachen, denn die *Nacht* ist zu dunkel, um etwas zu erkennen.
  
  È raro che un evento così importante si verifichi proprio in questa *notte* di luna piena.
  Es ist selten, dass ein so wichtiges Ereignis genau in dieser *Vollmondnacht* stattfindet.
