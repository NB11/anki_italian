Rang: 4986
Wort: grembo
Wortart: n.m
Wort mit Artikel: il grembo
Femininum / Plural: i grembi
IPA: ''
Definition: der Schoß, -¨e
Register: ''
Beispielsätze: |-
  La nonna ha tenuto il neonato nel suo *grembo* mentre cantava una ninna nanna.
  Die Oma hielt das Neugeborene in ihrem *Schoß*, während sie ein Schlaflied sang.
  
  Nonostante le difficoltà, ha trovato conforto nel *grembo* della famiglia.
  Trotz der Schwierigkeiten fand sie Trost im *Schoß* der Familie.
  
  Era così stanco che si rifugiò nel *grembo* della sua stanza per riposare.
  Er war so müde, dass er sich in den *Schoß* seines Zimmers zurückzog, um zu ruhen.
  
  Il pittore ha catturato l’intimità della madre con il bambino nel *grembo* nella sua opera più celebre.
  Der Maler fing die Intimität der Mutter mit dem Kind im *Schoß* in seinem berühmtesten Werk ein.
  
  Se non fosse per la sua pazienza, non avrebbe mai risolto quel problema nel *grembo* della discussione.
  Wenn es nicht seine Geduld gäbe, hätte er das Problem nie im *Schoß* der Diskussion gelöst.
