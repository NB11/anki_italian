Definition: ehrwürdig, verehrungswürdig
Register: ''
Beispielsätze: |-
  Il prete è una figura *reverenda* nella comunità.
  Der Priester ist eine *ehrwürdige* Figur in der Gemeinde.
  
  La sua presenza impone un rispetto *reverendo*.
  Seine Anwesenheit gebietet einen *verehrungswürdigen* Respekt.
  
  Lo stile di vita *reverendo* del monaco affascina molti visitatori.
  Der *ehrwürdige* Lebensstil des Mönchs fasziniert viele Besucher.
  
  Le sue parole hanno un tono *reverendo* che invita al silenzio.
  Seine Worte haben einen *verehrungswürdigen* Ton, der zum Schweigen einlädt.
  
  Nonostante la fama, rimane una persona *reverenda* e umile.
  Trotz seines Ruhms bleibt er eine *ehrwürdige* und demütige Person.
