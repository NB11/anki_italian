Rang: 1851
Wort: coincidenza
Wortart: n.f
Wort mit Artikel: la coincidenza
Femininum / Plural: coincidenze
IPA: ''
Definition: der Zufall, -fälle
Register: ''
Beispielsätze: |-
  Ho incontrato Maria per una *coincidenza* straordinaria mentre ero in vacanza a Roma.
  Ich habe Maria durch einen *Zufall* getroffen, während ich im Urlaub in Rom war.
  
  La *coincidenza* tra le due testimonianze ha convinto il giudice della colpevolezza dell’imputato.
  Die *Übereinstimmung* der beiden Aussagen hat den Richter von der Schuld des Angeklagten überzeugt.
  
  Senza questa *coincidenza*, non ti avrei mai conosciuto!
  Ohne diesen *Zufall* hätte ich dich nie kennengelernt!
  
  È solo una *coincidenza* se oggi piove e il tuo ombrello si è rotto, non credi?
  Das ist nur ein *Zufall*, dass es heute regnet und dein Schirm kaputtgegangen ist, oder?
  
  Avrei preferito che fosse lui a dirtelo, senza nessuna *coincidenza* che coinvolgesse gli altri.
  Ich hätte es vorgezogen, wenn er es dir selbst gesagt hätte, ohne dass ein *Zufall* die anderen einbeziehen würde.
