Rang: 548
Wort: battere
Wortart: v
Wort mit Artikel: battere
Femininum / Plural: ''
IPA: ''
Definition: schlagen, klopfen, schlagen
Register: ''
Beispielsätze: |-
  Devi *battere* le uova per fare una frittata, non semplicemente sbatterle!
  Du musst die Eier *schlagen*, um ein Omelett zu machen, nicht nur schütteln.
  
  Anche se non era d’accordo, alla fine ha accettato di *battere* il record mondiale.
  Obwohl er nicht einverstanden war, hat er schließlich zugestimmt, den Weltrekord *aufzustellen*.
  
  Mia nonna mi ha insegnato a *battere* il tappeto con un bastone per pulirlo a fondo.
  Meine Großmutter hat mir beigebracht, den Teppich mit einem Stock *zu klopfen*, um ihn gründlich zu reinigen.
  
  Se vuoi che il chiodo entri nel muro, *batte* molto più forte con il martello!
  Wenn du willst, dass der Nagel in die Wand geht, *schlag* viel kräftiger mit dem Hammer!
  
  L’arbitro ha deciso di *battere* il calcio d’inizio dopo la lunga revisione dell’arbitro aggiunto.
  Der Schiedsrichter hat beschlossen, den Anstoß *auszuführen* nach der langen Nachprüfung des vierten Schiedsrichters.
