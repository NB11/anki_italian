Definition: schlagen, klopfen
Register: ''
Beispielsätze: |-
  Devi *battere* le uova per fare la frittata.
  Du musst die *Eier* schlagen, um das Omelett zu machen.
  
  Il cuoco ha *battuto* il burro per renderlo più morbido.
  Der Koch hat die *Butter* geschlagen, um sie weicher zu machen.
  
  *Batman* batte sempre i cattivi nella sua città.
  *Batman* schlägt die Bösewichte immer in seiner Stadt.
  
