Rang: 131
Wort: lavorare
Wortart: v
Wort mit Artikel: lavorare
Femininum / Plural: ''
IPA: ''
Definition: arbeiten
Register: ''
Beispielsätze: |-
  Oggi *lavoro* in ufficio dalle otto alle diciassette.
  Heute *arbeite* ich im Büro von acht bis siebzehn Uhr.
  
  Avresti dovuto *lavorare* di più per ottenere quel posto!
  Du hättest mehr *arbeiten müssen*, um diese Stelle zu bekommen!
  
  Mio fratello *ha lavorato* per dieci anni all’estero.
  Mein Bruder *hat* zehn Jahre *im Ausland gearbeitet*.
  
  *Lavoriamo* insieme da quando ci siamo conosciuti all’università.
  Wir *arbeiten* seit unserem Kennenlernen an der Uni zusammen.
  
  Se *lavorassi* meno, avresti più tempo per la famiglia.
  Wenn du weniger *arbeiten würdest*, hättest du mehr Zeit für die Familie.
