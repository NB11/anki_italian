Rang: 4580
Wort: scossa
Wortart: n.f
Wort mit Artikel: la scossa
Femininum / Plural: scosse
IPA: ''
Definition: das Beben, - / das Rütteln, -
Register: ''
Beispielsätze: |-
  Dopo il terremoto, abbiamo sentito diverse *scosse* di assestamento durante la notte.
  Nach dem Erdbeben haben wir mehrere *Beben* während der Nacht gespürt.
  
  La *scossa* improvvisa ha fatto cadere tutti i bicchieri dal tavolo.
  Das plötzliche *Rütteln* ließ alle Gläser vom Tisch fallen.
  
  Spero che non ci saranno altre *scosse* dopo questa forte scossa sismica.
  Ich hoffe, dass es nach diesem starken *Beben* keine weiteren Beben gibt.
  
  Mentre camminavo per strada, una *scossa* mi ha fatto perdere l'equilibrio.
  Als ich auf der Straße ging, hat mich ein *Rütteln* aus dem Gleichgewicht gebracht.
  
  La scienza studia come prevedere le *scosse* telluriche prima che accadano.
  Die Wissenschaft untersucht, wie man *Beben* vor ihrem Eintreten vorhersagen kann.
