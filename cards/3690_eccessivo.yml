Rang: 3690
Wort: eccessivo
Wortart: adj
Wort mit Artikel: eccessivo
Femininum / Plural: ''
IPA: ''
Definition: übermäßig, übertrieben, zu stark
Register: ''
Beispielsätze: |-
  La quantità di zucchero nel dolce era *eccessiva* e ha rovinato tutto.
  Die Menge an Zucker im Kuchen war *zu hoch* und hat alles ruiniert.
  
  Nonostante le *eccessive* richieste dei clienti, il ristorante riuscì a mantenere la qualità.
  Trotz der *übertriebenen* Forderungen der Kunden konnte das Restaurant die Qualität halten.
  
  Penso che il suo entusiasmo sia *eccessivo* per una situazione così normale.
  Ich glaube, dass sein Enthusiasmus *übertrieben* für eine so normale Situation ist.
  
  Mi ha dato un consiglio *eccessivo* che non ho potuto seguire completamente.
  Er hat mir einen *übermäßigen* Rat gegeben, den ich nicht vollständig befolgen konnte.
  
  L’uso *eccessivo* di social media può avere effetti negativi sulla salute mentale.
  Der *übermäßige* Gebrauch von sozialen Medien kann negative Auswirkungen auf die psychische Gesundheit haben.
