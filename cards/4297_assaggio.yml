Rang: 4297
Wort: assaggio
Wortart: n.m
Wort mit Artikel: l'assaggio
Femininum / Plural: assaggi
IPA: ''
Definition: der Geschmack, die Probe, die Kostprobe
Register: ''
Beispielsätze: |-
  Vorrei fare *un assaggio* di questo vino per capire se è buono.
  Ich möchte *einen Geschmack* von diesem Wein nehmen, um zu prüfen, ob er gut ist.
  
  Dopo aver fatto *l'assaggio*, il sommelier ha confermato la qualità della bottiglia.
  Nach dem *Probevorgang* bestätigte der Sommelier die Qualität der Flasche.
  
  Mi hai fatto venire voglia di provare *questo assaggio* di formaggio regionale!
  Du hast mich darauf gebracht, *diese Kostprobe* von regionalem Käse zu probieren!
  
  L'assaggio è stato così buono che ho comprato un'intera bottiglia.
  Die *Kostprobe* war so gut, dass ich eine ganze Flasche gekauft habe.
  
  Nonostante l'*assaggio* iniziale, il sapore del pesce era ancora troppo forte per me.
  Trotz der anfänglichen *Probe* war der Geschmack des Fischs für mich immer noch zu intensiv.
