Rang: 778
Wort: tavolo
Wortart: n.m
Wort mit Artikel: il tavolo
Femininum / Plural: tavoli
IPA: ''
Definition: der Tisch, -e
Register: ''
Beispielsätze: |-
  Sul *tavolo* ci sono una bottiglia d'acqua e due libri interessanti.
  Auf dem *Tisch* stehen eine Flasche Wasser und zwei interessante Bücher.
  
  Potresti spostare il *tavolo* vicino alla finestra, per favore?
  Könntest du den *Tisch* bitte ans Fenster rücken?
  
  Non appena avrò finito di studiare, sparecchierò il *tavolo* dalla cena di ieri.
  Sobald ich mit *lernen* fertig bin, räume ich den Tisch vom Abendessen gestern ab.
  
  Mentre camminavamo nel parco, abbiamo visto un *tavolo* di legno abbandonato vicino all'albero.
  Während wir im Park spazierten, sahen wir einen verlassenen Holztisch in der Nähe des *Baumes*.
  
  Se avessi un *tavolo* più grande, potrei ospitare tutti i miei amici per la festa del ventunesimo compleanno!
  Wenn ich einen größeren *Tisch* hätte, könnte ich alle meine Freunde zum Geburtstagsfest des einundzwanzigsten Geburtstags einladen!
