Rang: 566
Wort: cristo
Wortart: n.m
Wort mit Artikel: il cristo
Femininum / Plural: i cristi
IPA: ''
Definition: der Christus, -, -se
Register: ''
Beispielsätze: |-
  Gesù è chiamato anche *Cristo* dai suoi seguaci.
  *Christus* wird von seinen Anhängern auch *Jesus* genannt.
  
  I cristiani celebrano la nascita di *Cristo* a Natale.
  Die Christen feiern die Geburt *Christus’/*des Christkindes* an Weihnachten.
  
  Dove si trova la statua di *Cristo* Redentore a Rio de Janeiro?
  Wo steht die Statue *des Christus* Erlösers in Rio de Janeiro?
  
  Molti credono che *Cristo* sia risorto dopo la crocifissione.
  Viele glauben, dass *Christus* nach der Kreuzigung auferstanden ist.
  
  L’opera *Il Cristo velato* è famosa per la sua scultura impressionante.
  Das Werk *Der verhüllte Christus* ist für seine beeindruckende Skulptur bekannt.
