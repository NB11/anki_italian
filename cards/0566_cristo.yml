Rang: 566
Wort: cristo
Wortart: n.m
Wort mit Artikel: il cristo
Femininum / Plural: i cristi
IPA: ''
Definition: Christus
Register: ''
Beispielsätze: |-
  Credo che il *cristo* sulla croce sia un simbolo di speranza per molti.
  Ich glaube, dass der *Christus* am Kreuz für viele ein Symbol der Hoffnung ist.
  
  Se avessi vissuto in quel tempo, avrei seguito il *cristo* ovunque fosse andato.
  Wenn ich damals gelebt hätte, wäre ich dem *Christus* überallhin gefolgt.
  
  Non è il *cristo* che ha rottolato via la pietra, ma un terremoto.
  Es war nicht der *Christus*, der den Stein weggerollt hat, sondern ein Erdbeben.
  
  Quando pensi alla storia del *cristo*, cosa ti colpisce di più?
  Wenn du an die Geschichte des *Christus* denkst, was beeindruckt dich am meisten?
  
  Il prete ha detto che solo il *cristo* può davvero perdonare i peccati dell’umanità.
  Der Priester sagte, dass nur der *Christus* die Sünden der Menschheit wirklich verzeihen kann.
