Wort mit Artikel: divorare
Femininum / Plural: ''
IPA: ''
Definition: verschlingen, fressen
Register: ''
Beispielsätze: |-
  I lupi *divorano* la preda in pochi minuti.
  Die Wölfe verschlingen die Beute in wenigen Minuten.
  
  Da quando è arrivato il nuovo direttore, la segretaria *divora* tutto il lavoro che prima facevo io.
  Seit der neue Direktor angekommen ist, verschlingt die Sekretärin jede Arbeit, die ich früher gemacht habe.
  
  Se non avessi *divorato* quel panino in un boccone, ora non avrei questi bruciori di stomaco.
  Hätte ich dieses Brötchen nicht in einem Bissen *verschlungen*, hätte ich jetzt kein Sodbrennen.
  
  Il suo sguardo *divora* ogni dettaglio del dipinto, come se volesse possederlo.
  Sein Blick *verschlingt* jedes Detail des Gemäldes, als wolle er es besitzen.
  
  Dopo la sconfitta, i tifosi non volevano altro che *divorare* il loro allenatore con gli occhi.
  Nach der Niederlage wollten die Fans nichts weiter, als ihren Trainer mit Blicken zu *verschlingen*.
