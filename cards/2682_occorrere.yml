Rang: 2682
Wort: occorrere
Wortart: vi
Wort mit Artikel: occorrere
Femininum / Plural: ''
IPA: ''
Definition: benötigen, erfordern
Register: ''
Beispielsätze: |-
  Mi *occorre* un consiglio prima di prendere questa decisione.
  Mir *wird* ein Rat benötigt, bevor ich diese Entscheidung treffe.
  
  Non ti *occorre* preoccuparti per così poco!
  Du *musst* dich für so wenig keine Sorgen machen!
  
  Per completare il progetto *occorreranno* almeno due settimane.
  Um das Projekt abzuschließen, *werden* mindestens zwei Wochen benötigt.
  
  Nonostante l’ora tarda, gli *occorse* ancora molto tempo per finire il lavoro.
  Trotz der späten Stunde *war* noch viel Zeit nötig, um die Arbeit zu beenden.
  
  Se ti *occorrono* ulteriori informazioni, chiedi pure alla segreteria.
  Falls dir noch weitere Informationen *benötigt werden*, frag einfach beim Sekretariat nach.
