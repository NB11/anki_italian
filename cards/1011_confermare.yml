Rang: 1011
Wort: confermare
Wortart: vt
Wort mit Artikel: confermare
Femininum / Plural: ''
IPA: ''
Definition: bestätigen, bekräftigen
Register: ''
Beispielsätze: |-
  Devo *confermare* la mia prenotazione al ristorante prima di partire per l'isola.
  Ich muss meine Reservierung im Restaurant bestätigen, bevor ich zur Insel fahren.
  
  Il poliziotto ha chiesto al testimone di *confermare* il dettaglio della testimonianza.
  Der Polizist bat den Zeugen, die Einzelheit der Aussage zu bestätigen.
  
  Se avessi saputo i fatti, avrei *confermato* la mia partecipazione immediatamente.
  Hätte ich die Fakten gewusst, hätte ich meine Teilnahme sofort bestätigt.
  
  La regina riferisce che vuole *confermare* la nomina del nuovo ministro degli esteri francese.
  Die Königin teilt mit, dass sie die Ernennung des neuen französischen Außenministers bestätigen will.
  
  Nonostante le difficoltà, riuscì a *confermare* la propria vittoria nella battaglia finale.
  Trotz der Schwierigkeiten gelang es ihm, seinen Sieg in der finalen Schlacht zu bekräftigen.
Audio: ''
Notiz: ''
