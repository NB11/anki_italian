Wort: arrivare
Wortart: vi
Wort mit Artikel: arrivare
Femininum / Plural: ''
IPA: ''
Definition: ankommen
Register: ''
Beispielsätze: |-
  Lui *arriva* sempre in ritardo alla riunione.
  Er *kommt* immer zu spät zum Meeting.
  
  Quando *siamo arrivati* a Roma, pioveva forte.
  Als wir in Rom *ankamen*, regnete es stark.
  
  Non *arriverai* mai in tempo se non ti sbrighi!
  Du wirst nie pünktlich *ankommen*, wenn du dich nicht beeilst!
  
  Spero che tu *arrivi* presto, abbiamo molto da discutere.
  Ich hoffe, dass du bald *ankommst*, wir haben viel zu besprechen.
  
  Loro non *sarebbero arrivati* senza il tuo aiuto.
  Sie *wären* ohne deine Hilfe nicht *angekommen*.
