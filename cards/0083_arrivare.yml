Rang: 83
Wort: arrivare
Wortart: vi
Wort mit Artikel: arrivare
Femininum / Plural: ''
IPA: ''
Definition: ankommen
Register: ''
Beispielsätze: |-
  Quando *arrivi* a casa, chiamami subito!
  Wenn du *ankommst* zu Hause, ruf mich sofort *an*!
  
  Ieri sera *sono arrivato* tardi alla stazione.
  Gestern Abend *bin ich* spät am Bahnhof *angekommen*.
  
  Credo che *arriverà* in ritardo anche oggi.
  Ich glaube, dass er/sie heute auch zu spät *ankommen wird*.
  
  Non *arriverà* mai in tempo per quella riunione.
  Er/sie wird nie rechtzeitig für dieses Meeting *ankommen*.
  
  Se *arriverai* presto, potrai prendere i biglietti migliori.
  Wenn du früh *ankommst*, kannst du die besten Tickets bekommen.
