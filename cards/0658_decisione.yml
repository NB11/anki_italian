Rang: 658
Wort: decisione
Wortart: n.f
Wort mit Artikel: la decisione
Femininum / Plural: decisioni
IPA: ''
Definition: die Entscheidung, -en
Register: ''
Beispielsätze: |-
  Ha preso una *decisione* difficile per tutta la famiglia.
  Er hat eine *entscheidung* für die ganze Familie getroffen.
  
  Qual è stata la tua *decisione* finale?
  Was war deine *endgültige Entscheidung*?
  
  Le *decisioni* importanti vanno discusse insieme.
  *Entscheidungen*, die wichtig sind, sollte man gemeinsam besprechen.
  
  Non ho ancora preso una *decisione* su dove andare in vacanza.
  Ich habe noch keine *Entscheidung* getroffen, wohin ich in den Urlaub fahren soll.
  
  La *decisione* del giudice è stata giusta secondo me.
  Die *entscheidung* des Richters war meiner Meinung nach richtig.
