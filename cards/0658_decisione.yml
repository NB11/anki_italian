Rang: 658
Wort: decisione
Wortart: n.f
Wort mit Artikel: la decisione
Femininum / Plural: decisioni
IPA: ''
Definition: die Entscheidung, -en
Register: ''
Beispielsätze: |-
  Dopo lunghe discussioni, abbiamo finalmente preso una *decisione* importante per il nostro futuro.
  Nach langen Diskussionen haben wir endlich eine *Entscheidung* für unsere Zukunft getroffen.
  
  Nonostante i rischi, la *decisione* di trasferirsi all'estero si è rivelata vincente per loro.
  Trotz der Risiken hat sich die *Entscheidung*, ins Ausland zu ziehen, für sie als richtig erwiesen.
  
  Ho letto che prendiamo la *decisione* sbagliata quando agiamo sotto l'effetto del dolore, vero detective?
  Ich habe gelesen, dass wir die *Entschlüsse* falsch treffen, wenn wir unter Schmerzen handeln, nicht wahr, Detective?
  
  La *decisione* di coprire metà del costo con il denaro risparmiato è stata molto saggia.
  Die *Entscheidung*, die Hälfte der Kosten mit dem gesparten Geld zu decken, war sehr klug.
  
  Spero che la *decisione* di dimostrare la sua innocenza senza prove non rovini tutto, ormai.
  Ich hoffe, dass die *Entscheidung*, seine Unschuld ohne Beweise zu beweisen, nicht alles ruiniert, mittlerweile.
