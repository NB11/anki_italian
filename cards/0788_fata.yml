Rang: 788
Wort: fata
Wortart: n.f
Wort mit Artikel: la fata
Femininum / Plural: le fate
IPA: ''
Definition: die Fee, -n
Register: ''
Beispielsätze: |-
  La *fata* ha magicamente trasformato la zucca in una carrozza.
  Die *Fee* hat den Kürbis magisch in eine Kutsche verwandelt.
  
  Credi nelle *fate* o nei folletti?
  Glaubst du an *Feen* oder Kobolde?
  
  Le *fate* vivono nei boschi incantati per secoli.
  Die *Feen* leben jahrhundertelang in verzauberten Wäldern.
  
  Non ho mai visto una *fata*, ma ne ho sentito parlare spesso.
  Ich habe noch nie eine *Fee* gesehen, aber ich habe oft von ihr hören.
  
  Se fossi una *fata*, volerei sopra le montagne ogni giorno.
  Wenn ich eine *Fee* wäre, würde ich jeden Tag über die Berge fliegen.
