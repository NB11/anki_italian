Rang: 788
Wort: fata
Wortart: n.f
Wort mit Artikel: la fata
Femininum / Plural: fate
IPA: ''
Definition: die Fee, -n
Register: ''
Beispielsätze: |-
  La *fata* ha trasformato il rospo in principe con un tocco della sua bacchetta magica.
  Die *Fee* verwandelte den Frosch mit einem Zauberstabschlag in einen Prinzen.
  
  Nelle fiabe spesso appare una *fata* buona che aiuta l’eroe in difficoltà.
  In Märchen erscheint oft eine gute *Fee*, die dem Helden in Schwierigkeiten hilft.
  
  Se tu avessi visto una *fata* stanotte, cosa avresti fatto?
  Wenn du heute Nacht eine *Fee* gesehen hättest, was hättest du getan?
  
  Credo che quella *fata* sia solo un’invenzione della sua fantasia, ma lui insiste che esiste davvero.
  Ich glaube, dass diese *Fee* nur eine Erfindung seiner Fantasie ist, aber er besteht darauf, dass sie wirklich existiert.
  
  La *fata* dai capelli azzurri è un personaggio famoso delle leggende medievali italiane.
  Die *Fee* mit den blauen Haaren ist eine berühmte Figur der italienischen mittelalterlichen Legenden.
