Rang: 1077
Wort: guida
Wortart: n.f
Wort mit Artikel: la guida
Femininum / Plural: guide
IPA: ''
Definition: die Führung, -en
Register: ''
Beispielsätze: |-
  La *guida* turistica ci ha mostrato i monumenti più importanti della città.
  Der *Führer* zeigte uns die wichtigsten Sehenswürdigkeiten der Stadt.
  
  Nonostante il traffico, la *guida* è riuscita a mantenere la calma e a portare tutti sani e salvi a destinazione.
  Trotz des *Verkehrs* behielt die Führerin die Ruhe und brachte alle sicher ans Ziel.
  
  Ho saputo che la *guida* dell’indagine è stata affidata a un esperto militare, dopo che l’indagine precedente aveva fallito.
  Ich habe gehört, dass die *Leitung* der Untersuchung einem militärischen Experten übertragen wurde, nachdem die vorherige Untersuchung gescheitert war.
  
  La *guida* del furgone sembrava nervosa dopo le continue richieste di sospendere la consegna, ma continuò a procedere spedita.
  Der *Fahrer* des Transporters schien nach den ständigen Bitten, die Lieferung zu unterbrechen, nervös, aber er fuhr weiter zügig fort.
  
  Mentre la *guida* ci spiegava la storia della regione, ho fatto una guardata fugace alla radio locale, dove trasmise un’intervista al direttore del museo.
  Während die *Führerin* uns die Geschichte der Region erklärte, warf ich einen flüchtigen Blickkontakt auf das örtliche Radio, das ein Interview mit dem Museumsdirektor ausstrahlte.
