Rang: 2430
Wort: whisky
Wortart: n.m
Wort mit Artikel: il whisky
Femininum / Plural: whisky
IPA: ''
Definition: der Whisky, -s
Register: ''
Beispielsätze: |-
  Al ristorante ho ordinato un bicchiere di *whisky* invecchiato di 12 anni.
  Im Restaurant habe ich ein Glas *Whisky* bestellt, der 12 Jahre gealtert ist.
  
  Il *whisky* prodotto in Scozia è famoso in tutto il mondo.
  Der in Schottland *produzierte* Whisky ist weltweit berühmt.
  
  Dopo una giornata difficile, potrebrei avere bisogno di un sorso di *whisky*.
  Nach einem anstrengenden Tag könnte ich einen Schluck *Whisky* gebrauchen.
  
  Non sapevo che ti piacesse il *whisky*, di solito bevi solo vino.
  Ich wusste nicht, dass du *Whisky* magst – normalerweise trinkst du nur Wein.
  
  Ha versato due dita di *whisky* in un bicchiere di cristallo per offrirne un po’ anche a me.
  Er hat zwei Fingerbreit *Whisky* in ein Kristallglas gegossen, um mir auch etwas anzubieten.
