Rang: 1833
Wort: bugia
Wortart: n.f
Wort mit Artikel: la bugia
Femininum / Plural: bugie
IPA: ''
Definition: die Lüge, -n
Register: ''
Beispielsätze: |-
  Non mi fido di lui perché racconta sempre *bugie*.
  Ich vertraue ihm nicht, weil er immer *Lügen* erzählt.
  
  Mi scusi, ma non credo che questa *bugia* sia necessaria.
  Entschuldigen Sie, aber ich glaube, diese *Lüge* ist nicht nötig.
  
  Ho detto una *bugia* a mia madre per non farla preoccupare.
  Ich habe meiner Mutter eine *Lüge* erzählt, um sie nicht zu beunruhigen.
  
  Se tu avessi detto la verità invece della *bugia*, non avremmo avuto questi problemi.
  Wenn du stattdessen die Wahrheit und nicht die *Lüge* gesagt hättest, hätten wir diese Probleme nicht.
  
  In questa *bugia* c'è qualcosa che non mi convince del tutto.
  An dieser *Lüge* ist etwas, das mich nicht ganz überzeugt.
