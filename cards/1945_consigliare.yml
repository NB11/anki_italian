Rang: 1945
Wort: consigliare
Wortart: vt
Wort mit Artikel: consigliare
Femininum / Plural: ''
IPA: ''
Definition: raten, empfehlen
Register: ''
Beispielsätze: |-
  Il medico *consiglia* di bere molta acqua ogni giorno.
  Der Arzt rät dazu, täglich viel Wasser zu trinken.
  
  Ti *consiglio* di prendere l’autobus invece della macchina per risparmiare benzina.
  Ich rate dir, stattdessen den Bus zu nehmen, um Benzin zu sparen.
  
  Non vorrei che lui *consigliasse* a tutti di seguirlo senza riflettere.
  Ich würde nicht wollen, dass er *allen* rät, ihm unbedacht zu folgen.
  
  Prima di partire, *consigliereste* voi di prenotare il volo con mesi di anticipo?
  Würdet ihr *empfehlen*, den Flug Monate im Voraus zu buchen?
  
  Se fossi in te, *consiglierei* di evitare quel ristorante: la qualità è pessima.
  An deiner Stelle würde ich *raten*, dieses Restaurant zu meiden: die Qualität ist miserabel.
