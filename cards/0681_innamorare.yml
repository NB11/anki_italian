Rang: 681
Wort: innamorare
Wortart: v
Wort mit Artikel: innamorare
Femininum / Plural: ''
IPA: ''
Definition: sich verlieben
Register: ''
Beispielsätze: |-
  Mi *sono innamorato* di quella ragazza al primo sguardo.
  Ich habe mich in dieses Mädchen auf den ersten Blick *verliebt*.
  
  Non vorrei *innamorarmi* mai più dopo questa delusione.
  Ich würde mich nach dieser Enttäuschung nie wieder *verlieben* *wollen*.
  
  *Innamorarsi* è facile, ma restare innamorati richiede impegno.
  Sich *zu verlieben* ist leicht, aber verliebt zu bleiben erfordert Mühe.
  
  Speravo che non ti *innamorassi* di un uomo così superficiale.
  Ich hoffte, dass du dich nicht in einen so oberflächlichen Mann *verliebst*.
  
  Se tu potessi *innamorarti* di me, sarebbe la cosa più bella del mondo.
  Wenn du dich in mich *verlieben* *könntest*, wäre das das Schönste der Welt.
