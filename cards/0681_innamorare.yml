Rang: 681
Wort: innamorare
Wortart: v
Wort mit Artikel: innamorare
Femininum / Plural: ''
IPA: ''
Definition: sich verlieben
Register: ''
Beispielsätze: |-
  Se vuoi *innamorarti* di qualcuno, devi conoscerlo bene prima.
  Wenn du dich in jemanden *verlieben* willst, solltest du ihn erst gut kennen.
  
  Credo che lui si sia *innamorato* di quella canzone dolce che ascolta ogni giorno.
  Ich glaube, er hat sich in dieses *süße* Lied verliebt, das er jeden Tag hört.
  
  Nonostante tutto, lei non vuole *innamorarsi* di nuovo per non soffrire ancora.
  Trotz allem will sie sich nicht wieder *verlieben*, um nicht noch einmal zu leiden.
  
  Spero che tu non ti *innamori* mai di una persona che ti fa del male spesso!
  Ich hoffe, du *verliebst* dich nie in jemanden, der dir oft wehtut!
  
  Anche se la relazione era sbagliata, lui non riuscì a *innamorarsi* di un’altra persona per mesi.
  Auch wenn die Beziehung falsch war, konnte er sich monatelang nicht in eine andere Person *verlieben*.
