Rang: 4085
Wort: lotto
Wortart: n.m
Wort mit Artikel: il lotto
Femininum / Plural: i lotti
IPA: ''
Definition: die Ziehung, -en
Register: ''
Beispielsätze: |-
  Non vedo l’ora che arrivi il *lotto* di oggi perché spero di vincere!
  Ich kann es nicht erwarten, bis die heutige *Ziehung* kommt, denn ich hoffe zu gewinnen.
  
  Hanno annunciato che il *lotto* successivo sarà trasmesso in diretta domani sera.
  Sie haben angekündigt, dass die nächste *Ziehung* morgen Abend live übertragen wird.
  
  Se non vince al *lotto* con questi numeri, non ci proverà mai più!
  Wenn er bei der *Ziehung* mit diesen Zahlen nicht gewinnt, wird er es nie wieder versuchen!
  
  Mi hanno detto che esiste un *lotto* speciale ogni venerdì con premi più alti.
  Man hat mir gesagt, dass es jeden Freitag eine besondere *Ziehung* mit höheren Preisen gibt.
  
  Nonostante abbia comprato dieci biglietti, non ha vinto nulla al *lotto* di ieri.
  Obwohl er zehn Lose gekauft hatte, hat er bei der gestrigen *Ziehung* nichts gewonnen.
