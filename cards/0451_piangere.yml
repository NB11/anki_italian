Wort: piangere
Wortart: v
Wort mit Artikel: piangere
Femininum / Plural: ''
IPA: ''
Definition: weinen
Register: ''
Beispielsätze: |-
  Non *piango* mai davanti agli altri.
  Ich *weine* nie vor anderen.
  
  Ha *pianto* tutta la notte dopo la notizia.
  Er/Sie hat die ganze Nacht *geweint* nach der Nachricht.
  
  Piansi quando seppi della sua morte.
  Ich *weinte*, als ich von seinem/ihrem Tod erfuhr.
  
  Se perderai il treno, *piangerai*!
  Wenn du den Zug verpasst, wirst du *weinen*!
  
  Avrei *pianto* dal dolore, se non avessi capito.
  Ich hätte vor Schmerz *geweint*, wenn ich es nicht verstanden hätte.
