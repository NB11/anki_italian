Rang: 1368
Wort: battuta
Wortart: n.f
Wort mit Artikel: la battuta
Femininum / Plural: battute
IPA: ''
Definition: der Witz, -e, der Spruch, -¨e
Register: ''
Beispielsätze: |-
  Mi piace molto questa *battuta*, è davvero divertente!
  Mir gefällt dieser *Witz* sehr, er ist wirklich lustig!
  
  L’ispettore non ha capito la *battuta* dell’assistente e ha fatto una faccia seria.
  Der Inspektor hat den *Spruch* des Assistenten nicht verstanden und machte ein ernstes Gesicht.
  
  Se mi dici una *battuta* volgare, mi vergogno davanti a tutti.
  Wenn du mir einen ordinären *Witz* erzählst, schäme ich mich vor allen.
  
  Hanno scritto una *battuta* spiritosa su un cartellone pubblicitario, chiaro che tutti l’hanno notata.
  Sie haben einen geistreichen *Spruch* auf ein Werbeplakat geschrieben, klar, dass ihn alle bemerkt haben.
  
  Quando sento una *battuta* nuova, la devo ripetere per ricordarla meglio.
  Wenn ich einen neuen *Witz* höre, muss ich ihn wiederholen, um ihn besser zu behalten.
