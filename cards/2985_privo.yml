Rang: 2985
Wort: privo
Wortart: adj
Wort mit Artikel: privo
Femininum / Plural: ''
IPA: ''
Definition: ohne, frei von
Register: ''
Beispielsätze: |-
  Dall’inizio della guerra, la città è *priva* di elettricità e acqua potabile.
  Seit Beginn des Krieges ist die Stadt *ohne* Strom und Trinkwasser.
  
  Sono *privo* di ogni speranza dopo la sconfitta della mia squadra preferita.
  Ich bin *ohne* jede Hoffnung nach der Niederlage meines Lieblingsteams.
  
  Nonostante fosse *privo* di forze, riuscì a completare la maratona.
  Obwohl er *ohne* Kraft war, schaffte er es, den Marathon zu beenden.
  
  L’ascensore è *privo* di manutenzione da almeno cinque anni, secondo l’avviso affisso.
  Der Aufzug ist *ohne* Wartung seit mindestens fünf Jahren, laut der angebrachter Benachrichtigung.
  
  Questo documento è *privo* di senso: sembra scritto da un folle.
  Dieses Dokument ist *ohne* Sinn: Es scheint von einem Verrückten geschrieben zu sein.
