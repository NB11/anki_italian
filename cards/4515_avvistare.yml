Rang: 4515
Wort: avvistare
Wortart: vt
Wort mit Artikel: avvistare
Femininum / Plural: ''
IPA: ''
Definition: entdecken, sichten
Register: ''
Beispielsätze: |-
  I pescatori hanno *avvistato* un banco di delfini vicino alla costa.
  Die Fischer haben einen Schwarm Delfine in der Nähe der Küste *gesichtet*.
  
  Nonostante la nebbia, il capitano riuscì a *avvistare* la nave in pericolo.
  Trotz des Nebels gelang es dem Kapitän, das havarierte Schiff zu *sichten*.
  
  Se *avvistassi* un animale sconosciuto, lo fotograferei immediatamente.
  Wenn ich ein unbekanntes Tier *sichten* würde, würde ich es sofort fotografieren.
  
  La polizia ha confermato di aver *avvistato* il fuggitivo nei pressi del bosco.
  Die Polizei bestätigte, den Flüchtigen in der Nähe des Waldes *gesichtet* zu haben.
  
  Gli scienziati sperano di *avvistare* esemplari rari durante la spedizione.
  Die Wissenschaftler hoffen, seltene Exemplare während der Expedition zu *sichten*.
