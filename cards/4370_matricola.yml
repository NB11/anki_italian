Rang: 4370
Wort: matricola
Wortart: n.m/f
Wort mit Artikel: la matricola
Femininum / Plural: le matricole
IPA: ''
Definition: der Studienanfänger, die Studienanfängerin, die Studienanfänger
Register: ''
Beispielsätze: |-
  La *matricola* ha frequentato il seminario di matematica con grande interesse.
  Der *Studienanfänger* hat das Seminar für Mathematik mit großem Interesse besucht.
  
  Non tutte le *matricole* partecipano alle attività di accoglienza organizzate dall’università.
  Nicht alle *Studienanfänger* nehmen an den Willkommensaktivitäten der Universität teil.
  
  Spero che la nuova *matricola* trovi presto un alloggio vicino all’ateneo.
  Ich hoffe, dass der neue *Studienanfänger* bald eine Unterkunft in der Nähe der Uni findet.
  
  Le *matricole* che hanno superato il test d’ingresso possono già iscriversi ai corsi avanzati.
  Die *Studienanfänger*, die den Aufnahmetest bestanden haben, können sich bereits für die Fortgeschrittenenkurse einschreiben.
  
  Chi è la *matricola* più motivata della tua facoltà secondo te?
  Wer ist Ihrer Meinung nach die *motivierteste* Studienanfängerin an Ihrer Fakultät?
