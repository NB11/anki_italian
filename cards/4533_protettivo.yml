Rang: 4533
Wort: protettivo
Wortart: adj
Wort mit Artikel: protettivo
Femininum / Plural: ''
IPA: ''
Definition: schützend, beschützend, sichernd
Register: ''
Beispielsätze: |-
  I genitori sono *protettivi* nei confronti dei loro figli.
  Die Eltern sind *schützend* gegenüber ihren Kindern.
  
  Questo programma antivirus è *protettivo* contro gli attacchi informatici.
  Dieses Antivirenprogramm ist *schützend* gegen Hackerangriffe.
  
  Il cane *protettivo* non smette di abbaiare se qualcuno si avvicina troppo alla porta.
  Der *beschützende* Hund hört nicht auf zu bellen, wenn sich jemand zu sehr der Tür nähert.
  
  Le misure *protettive* adottate dall'azienda hanno evitato una fuga di dati.
  Die von dem Unternehmen ergriffenen *sichernden* Maßnahmen haben einen Datenabfluss verhindert.
  
  I genitori vogliono essere *protettivi*, ma senza soffocare l'indipendenza dei figli.
  Die Eltern möchten *schützend* sein, ohne die Unabhängigkeit der Kinder zu ersticken.
