Rang: 434
Wort: adorare
Wortart: v
Wort mit Artikel: adorare
Femininum / Plural: ''
IPA: ''
Definition: anbeten, verehren, lieben
Register: ''
Beispielsätze: |-
  Gli *adoro* quando cucini la pasta.
  Ich *liebe es*, wenn du Nudeln kochst.
  
  Non *adorerei* stare in coda per due ore.
  Ich *würde es nicht ertragen*, zwei Stunden in der Schlange zu stehen.
  
  Dio viene *adorato* in molte chiese.
  Gott wird in vielen Kirchen *verehrt*.
  
  Che cosa *adori* di più della vita?
  Was *schätzt du am meisten* am Leben?
  
  Voglio *adorare* il sole ogni mattina con la mia tazza di caffè.
  Ich möchte die Sonne jeden Morgen mit meiner Tasse Kaffee *anbeten*.
