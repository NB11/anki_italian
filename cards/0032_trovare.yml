Beispielsätze: |-
  *Trovo* sempre difficile questa *trovare* soluzione.
  Ich *finde* diese Lösung immer schwierig zu *finden*.
  
  Non *ho trovato* il mio libro nella libreria.
  Ich *habe* mein Buch nicht im Regal *gefunden*.
  
  Dove credi che potrei *trovare* un buon ristorante?
  Wo glaubst du, könnte ich ein gutes Restaurant *finden*?
  
  Se *troverai* lavoro, potremo andare in vacanza.
  Wenn du Arbeit *findest*, können wir in Urlaub fahren.
  
  Spero che tu *abbia trovato* quello che cercavi.
  Ich hoffe, du *hast* das *gefunden*, was du gesucht hast.
