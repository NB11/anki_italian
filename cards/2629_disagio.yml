Rang: 2629
Wort: disagio
Wortart: n.m
Wort mit Artikel: il disagio
Femininum / Plural: disagi
IPA: ''
Definition: das Unbehagen
Register: ''
Beispielsätze: |-
  Sento un *disagio* quando devo parlare in pubblico.
  Ich spüre ein *Unbehagen*, wenn ich vor Publikum sprechen muss.
  
  Nonostante il *disagio*, ha continuato la sua presentazione con sicurezza.
  Trotz des *Unbehagens* führte sie ihre Präsentation sicher fort.
  
  Il *disagio* generale era dovuto alla mancanza di chiarezza nelle direttive.
  Das allgemeine *Unbehagen* lag an der fehlenden Klarheit in den Anweisungen.
  
  Avvertivano un *disagio* costante in quella stanza buia e silenziosa.
  Sie spürten ein ständiges *Unbehagen* in diesem dunklen, stillen Raum.
  
  Anche se ha cercato di nasconderlo, era evidente il *disagio* che provava.
  Auch wenn sie es zu verbergen versuchte, war das *Unbehagen*, das sie empfand, offensichtlich.
