Rang: 904
Wort: sinistra
Wortart: n.f
Wort mit Artikel: la sinistra
Femininum / Plural: sinistre
IPA: ''
Definition: die Linke, Links-
Register: ''
Beispielsätze: |-
  Gira *sinistra* all'incrocio e vedrai il ristorante.
  Bieg *links* an der Kreuzung ab und du wirst das Restaurant sehen.
  
  La macchia *sinistra* della camicia ha rovinato l'aspetto elegante.
  Der *linke* Fleck am Hemd hat das elegante Aussehen ruiniert.
  
  Nonostante l'ora tarda, tutte le luci dell'interno *sinistro* dell'edificio erano ancora accese.
  Trotz der späten Stunde brannten alle Lichter im *linken* Innenraum des Gebäudes noch.
  
  Se avessi seguito le indicazioni, non ti saresti perso e avresti trovato la *sinistra* che cercavi.
  Hättest du den Wegbeschreibungen gefolgt, hättest du dich nicht verlaufen und *die Linke* gefunden, die du suchst.
  
  La ragazza, che si era ferita il ginocchio cadendo, stringeva convulsamente un anello d'argento nella *sinistra*.
  Das Mädchen, das sich beim Sturz das Knie verletzt hatte, umklammerte krampfhaft einen silbernen Ring in der *linken* Hand.
