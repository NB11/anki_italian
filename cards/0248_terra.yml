Rang: 248
Wort: terra
Wortart: n.f
Wort mit Artikel: la terra
Femininum / Plural: terre
IPA: ''
Definition: die Erde, der Boden
Register: ''
Beispielsätze: |-
  La *terra* è molto fertile in questa regione.
  Der *Boden* ist in dieser Region sehr fruchtbar.
  
  Abbiamo camminato per giorni sulla *terra* arida del deserto.
  Wir sind tagelang über den *Boden* der Wüste gegangen.
  
  Questa *terra* produce ottimi pomodori.
  Dieser *Boden* bringt ausgezeichnete Tomaten hervor.
  
  Vor vent'anni questa *terra* era solo un campo incolto.
  Vor zwanzig Jahren war diese *Erde* nur ein Brachland.
  
  Dove hai nascosto i semi? Sotto la *terra*!
  Wo hast du die Samen versteckt? Unter der *Erde*!
