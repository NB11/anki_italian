Rang: 4145
Wort: checca
Wortart: n.m
Wort mit Artikel: il checca
Femininum / Plural: checche
IPA: ''
Definition: die Tunte, -n
Register: ''
Beispielsätze: |-
  Al matrimonio c'era anche *checca* del paesino, vestita in modo molto colorato.
  Auf der Hochzeit war auch die *Tunte* aus dem Dorf, sehr bunt gekleidet.
  
  Non mi importa se qualcuno chiama *checca* in modo dispregiativo, ognuno può dire ciò che pensa.
  Es ist mir egal, ob jemand die *Tunte* abwertend meint, jeder darf sagen, was er denkt.
  
  In quella serie televisiva *checca* è un personaggio molto divertente e simpatico.
  In dieser Fernsehserie ist die *Tunte* eine sehr lustige und sympathische Figur.
  
  Mi hanno detto che a Roma c'è un locale famoso dove ogni sera si esibisce una *checca* molto spiritosa.
  Man hat mir gesagt, dass es in Rom einen berühmten Laden gibt, wo jeden Abend eine sehr witzige *Tunte* auftritt.
  
  Se per caso incontrassi *checca* vestita da donna, non riderei di lei, ma cercherei di essere rispettoso.
  Falls ich zufällig die *Tunte* in Frauenkleidung treffe, würde ich nicht über sie lachen, sondern versuchen, respektvoll zu sein.
