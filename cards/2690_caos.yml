Rang: 2690
Wort: caos
Wortart: n.m
Wort mit Artikel: il caos
Femininum / Plural: i caos
IPA: ''
Definition: das Chaos
Register: ''
Beispielsätze: |-
  Dopo la festa c’era *caos* in tutta la casa.
  Nach der Party herrschte *Chaos* im ganzen Haus.
  
  Il *caos* alla stazione ha causato ritardi a tutti i treni.
  Das *Chaos* am Bahnhof hat zu Verspätungen bei allen Zügen geführt.
  
  Non sopporto questo *caos* mentale quando lavoro.
  Ich ertrage dieses mentale *Chaos*, wenn ich arbeite, nicht.
  
  Era *caos* totale in ufficio dopo la notizia della chiusura.
  Es herrschte totale *Chaos* im Büro nach der Nachricht über die Schließung.
  
  Se organizzi meglio, eviti il *caos* negli spostamenti.
  Wenn du besser organisierst, vermeidest du das *Chaos* bei den Fahrten.
