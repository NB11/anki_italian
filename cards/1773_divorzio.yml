Rang: 1773
Wort: divorzio
Wortart: n.m
Wort mit Artikel: il divorzio
Femininum / Plural: divorzi
IPA: ''
Definition: die Scheidung, -en
Register: ''
Beispielsätze: |-
  Dopo il *divorzio*, hanno venduto la casa insieme.
  Nach der *Scheidung* haben sie das Haus gemeinsam verkauft.
  
  Non sapevo che avessero chiesto il *divorzio* a gennaio.
  Ich wusste nicht, dass sie im Januar die *Scheidung* eingereicht hatten.
  
  Se avessero più pazienza, forse il *divorzio* non sarebbe necessario.
  Hätten sie mehr *Geduld*, wäre die Scheidung vielleicht nicht nötig.
  
  Il giudice ha stabilito le condizioni del *divorzio* con grande attenzione.
  Der Richter hat die Bedingungen der *Scheidung* mit großer Sorgfalt festgelegt.
  
  Credi che il *divorzio* sia sempre la soluzione migliore?
  Glaubst du, dass die *Scheidung* immer die beste Lösung ist?
