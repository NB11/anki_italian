Rang: 3362
Wort: estendere
Wortart: vt
Wort mit Artikel: estendere
Femininum / Plural: ''
IPA: ''
Definition: ausdehnen, erweitern
Register: ''
Beispielsätze: |-
  Gli scienziati vogliono *estendere* la ricerca su nuovi materiali magnetici.
  Die Wissenschaftler wollen die Forschung auf neue *magnetische* Materialien ausdehnen.
  
  Ho bisogno di *estendere* il vostro soggiorno qui, se possibile.
  Ich muss Ihren Aufenthalt hier *verlängern*, wenn möglich.
  
  Non era sua intenzione *estendere* la conversazione fino a tardi, ma è successo comunque.
  Es war nicht seine Absicht, das Gespräch bis spät in die Nacht *auszudehnen*, aber es passierte trotzdem.
  
  Il governo ha deciso di *estendere* le agevolazioni fiscali alle piccole imprese recentemente.
  Die Regierung hat beschlossen, die Steuervergünstigungen für kleine Unternehmen *zu erweitern*.
  
  Se tu riuscissi a *estendere* la tua influenza, potresti cambiare molte cose.
  Wenn du deinen Einfluss *erweitern* könntest, könntest du vieles ändern.
