Rang: 2654
Wort: plastica
Wortart: n.f
Wort mit Artikel: la plastica
Femininum / Plural: plastiche
IPA: ''
Definition: der Kunststoff, die Kunststoffe
Register: ''
Beispielsätze: |-
  L'azienda produce *plastiche* riciclate per ridurre l'inquinamento.
  Das Unternehmen produziert *Kunststoffe*, die recycelt werden, um die Verschmutzung zu reduzieren.
  
  Ho comprato una bottiglia di *plastica* per il picnic, ma è rotta.
  Ich habe eine *Plastikflasche* für das Picknick gekauft, aber sie ist kaputt.
  
  Se continuiamo a usare così tanta *plastica*, il pianeta soffrirà.
  Wenn wir so viel *Kunststoff* weiterverwenden, wird der Planet leiden.
  
  La *plastica* si decompone lentamente nell'ambiente, purtroppo.
  Der *Kunststoff* zersetzt sich leider langsam in der Umwelt.
  
  Vorrei una borsa che non sia di *plastica*, preferisco il cotone.
  Ich möchte eine Tasche, die nicht aus *Plastik* ist, ich ziehe Baumwolle vor.
