Rang: 2786
Wort: collana
Wortart: n.f
Wort mit Artikel: la collana
Femininum / Plural: collane
IPA: ''
Definition: die Kette, -n
Register: ''
Beispielsätze: |-
  Mia sorella ha ricevuto in regalo una *collana* d’oro per il suo compleanno.
  Meine Schwester hat zum Geburtstag eine *Kette* aus Gold erhalten.
  
  Non sapevo che quella *collana* appartenesse alla regina Isabella di Spagna.
  Ich wusste nicht, dass diese *Kette* der Königin Isabella von Spanien gehört hatte.
  
  Se vuoi far colpo su di lei, regalale una *collana* con un ciondolo a forma di cuore.
  Wenn du sie beeindrucken willst, schenke ihr eine *Kette* mit einem herzförmigen Anhänger.
  
  La polizia ha ritrovato la *collana* rubata in un banco dei pegni a Milano.
  Die Polizei hat die gestohlene *Kette* in einem Pfandhaus in Mailand wiedergefunden.
  
  Quando ero piccolo, mia nonna mi diceva che una *collana* di coralli avrebbe portato fortuna.
  Als ich klein war, sagte mir meine Großmutter, eine *Kette* aus Korallen würde Glück bringen.
