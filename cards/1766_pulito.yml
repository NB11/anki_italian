Rang: 1766
Wort: pulito
Wortart: adj
Wort mit Artikel: pulito
Femininum / Plural: ''
IPA: ''
Definition: sauber, rein
Register: ''
Beispielsätze: |-
  La stanza è stata pulita a fondo dopo la festa.
  Das Zimmer wurde nach der Feier gründlich *gereinigt*.
  
  Ho comprato un vestito nuovo perché quello vecchio non era più *pulito*.
  Ich habe mir ein neues Kleid gekauft, weil das alte nicht mehr *sauber* war.
  
  Sebbene sia stanco, lavo i piatti perché devono essere *puliti* domani.
  Obwohl ich müde bin, wasche ich das Geschirr, weil es morgen *sauber* sein muss.
  
  Se avessi più pazienza, aspetterei fino a quando tutto fosse perfettamente *pulito*.
  Wenn ich mehr Geduld hätte, würde ich warten, bis alles perfekt *sauber* wäre.
  
  Non sopporto quando qualcuno sporca un ambiente che sembrava appena *pulito*.
  Ich ertrage es nicht, wenn jemand eine Umgebung verschmutzt, die gerade noch *sauber* schien.
