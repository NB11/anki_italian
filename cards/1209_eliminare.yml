Rang: 1209
Wort: eliminare
Wortart: vt
Wort mit Artikel: eliminare
Femininum / Plural: ''
IPA: ''
Definition: beseitigen, entfernen, tilgen, löschen
Register: ''
Beispielsätze: |-
  Devi *eliminare* i文件 vecchi dal computer per liberare spazio.
  Du musst die alten Dateien vom Computer *entfernen*, um Platz zu schaffen.
  
  L'ha *eliminato* dalla lista degli invitati senza spiegare il motivo.
  Er hat ihn von der Gästeliste *gestrichen*, ohne den Grund zu erklären.
  
  Spero che riescano a *eliminare* questa discussione una volta per tutte.
  Ich hoffe, sie schaffen es, diese *Diskussion* endlich beizulegen.
  
  Se non pagherai in tempo, potrebbero *eliminarti* dal concorso.
  Wenn du nicht rechtzeitig zahlst, könnten sie dich vom Wettbewerb *ausschließen*.
  
  Dopo aver *eliminato* l'infezione con gli antibiotici, si è finalmente sentito meglio.
  Nachdem die Infektion mit den Antibiotika *beseitigt* wurde, fühlte er sich endlich besser.
