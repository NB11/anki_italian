Rang: 1352
Wort: provocare
Wortart: vt
Wort mit Artikel: provocare
Femininum / Plural: ''
IPA: ''
Definition: hervorrufen, auslösen, verursachen
Register: ''
Beispielsätze: |-
  La sua frase ha *provocato* una discussione particolare tra gli amici.
  Sein Satz hat eine *besonders* Diskussion unter den Freunden ausgelöst.
  
  L’ispettore temeva che quella decisione potesse *provocare* ulteriori problemi nazionali.
  Der Inspektor fürchtete, dass diese Entscheidung zusätzliche *nationale* Probleme hervorrufen könnte.
  
  Se non avessi *provocato* quella lite, ora non mi sento così in débito morale.
  Wenn ich nicht diesen Streit *verursacht* hätte, würde ich mich jetzt nicht so in Schuld fühlen.
  
  Il vento forte *provocò* la caduta di diversi rami degli alberi nel paradiso del giardino.
  Der starke Wind *löste* den Fall mehrerer Äste der Bäume im Paradies des Gartens aus.
  
  È chiaro che cercare di *provocare* una reazione negativa non porta a nulla positivo.
  Es ist klar, dass der Versuch, eine negative Reaktion zu *hervorrufen*, zu nichts Positivem führt.
