Rang: 745
Wort: paziente
Wortart: n.m
Wort mit Artikel: il paziente
Femininum / Plural: i pazienti
IPA: ''
Definition: der Patient, -en
Register: ''
Beispielsätze: |-
  Il *paziente* ha finalmente ricevuto la sua visita medica dopo settimane di attesa.
  Der *Patient* hat endlich seinen Arztbesuch nach wochenlangem Warten erhalten.
  
  Sei ancora *paziente* o vuoi che chiami qualcuno per aiutarti con il computer?
  Bist du noch *geduldig* oder soll ich jemanden rufen, der dir mit dem Computer hilft?
  
  Grazie al *paziente* che ha studiato il problema per ore, abbiamo risolto il codice difficile.
  Dank dem *Patienten*, der stundenlang das Problem untersucht hat, haben wir den kniffligen Code gelöst.
  
  Se fossi più *paziente* con tuo figlio, non lo licenzierebbe così in fretta!
  Wenn du *geduldiger* mit deinem Sohn wärst, würde er ihn nicht so schnell entlassen!
