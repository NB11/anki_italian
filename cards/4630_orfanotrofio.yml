Rang: 4630
Wort: orfanotrofio
Wortart: n.m
Wort mit Artikel: l'orfanotrofio
Femininum / Plural: orfanotrofi
IPA: ''
Definition: das Waisenhaus, -¨er
Register: ''
Beispielsätze: |-
  L’*orfanotrofio* in cui sono cresciuto era gestito da suore molto affettuose.
  Das *Waisenhaus*, in dem ich aufgewachsen bin, wurde von sehr liebevollen Nonnen geleitet.
  
  Dopo la guerra, molti *orfanotrofi* non avevano più abbastanza cibo per tutti i bambini.
  Nach dem Krieg hatten viele *Waisenhäuser* nicht mehr genug Essen für alle Kinder.
  
  Ha detto che preferirebbe chiudere l’*orfanotrofio* piuttosto che ridurre il personale.
  Er sagte, er würde das *Waisenhaus* lieber schließen, als das Personal zu reduzieren.
  
  L’*orfanotrofio* che aveva visto al telegiornale era stato fondato durante il secolo scorso.
  Das *Waisenhaus*, das er in den Nachrichten gesehen hatte, war im letzten Jahrhundert gegründet worden.
  
  Se non troviamo una soluzione, dovremo affidare quel bambino a un *orfanotrofio* statale.
  Wenn wir keine Lösung finden, müssen wir dieses Kind einem staatlichen *Waisenhaus* anvertrauen.
