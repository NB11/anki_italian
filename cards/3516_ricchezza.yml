Femininum / Plural: ricchezze
IPA: ''
Definition: der Reichtum, Reichtümer
Register: ''
Beispielsätze: |-
  La *ricchezza* di quell’uomo è impressionante.
  Der *Reichtum* dieses Mannes ist beeindruckend.
  
  Non tutte le *ricchezze* sono materiali, alcune sono spirituali.
  Nicht alle *Reichtümer* sind materiell, einige sind geistig.
  
  Con la sua *ricchezza* ha potuto aiutare molti bisognosi.
  Mit seinem *Reichtum* konnte er vielen Bedürftigen helfen.
  
  La *ricchezza* di questa regione attira molti turisti.
  Der *Reichtum* dieser Region lockt viele Touristen an.
  
  Se avessi la *ricchezza* di un re, comprerei una villa al mare.
  Wenn ich den *Reichtum* eines Königs hätte, würde ich mir eine Villa am Meer kaufen.
