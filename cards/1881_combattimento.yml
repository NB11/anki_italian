Rang: 1881
Wort: combattimento
Wortart: n.m
Wort mit Artikel: il combattimento
Femininum / Plural: i combattimenti
IPA: ''
Definition: der Kampf, die Kämpfe
Register: ''
Beispielsätze: |-
  Il *combattimento* tra i due pugili è stato molto emozionante.
  Der *Kampf* zwischen den beiden Boxern war sehr aufregend.
  
  Nonostante la ferite, il soldato continuò il *combattimento*.
  Trotz der *Wunde* führte der Soldat den Kampf fort.
  
  Vor *combattimento* gli atleti si concentrano per trovare la calma.
  Vor dem *Kampf* konzentrieren sich die Athleten, um Ruhe zu finden.
  
  L'arte marziale che pratico è un *combattimento* corpo a corpo.
  Die Kampfkunst, die ich praktiziere, ist ein *Kampf* Mann gegen Mann.
  
  I nemici si prepararono al *combattimento* aspettando l'alba.
  Die Feinde bereiteten sich auf den *Kampf* vor und warteten auf die Morgendämmerung.
