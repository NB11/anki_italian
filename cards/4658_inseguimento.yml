Rang: 4658
Wort: inseguimento
Wortart: n.m
Wort mit Artikel: l'inseguimento
Femininum / Plural: gli inseguimenti
IPA: ''
Definition: die Verfolgung, die Jagd
Register: ''
Beispielsätze: |-
  Dopo il furto, la polizia ha avviato *l'inseguimento* dei ladri.
  Nach dem Diebstahl hat die Polizei die *Verfolgung* der Diebe eingeleitet.
  
  Durante *l'inseguimento* per le strade strette, la moto ha perso il controllo.
  Während der *Jagd* durch die engen Straßen hat das Motorrad die Kontrolle verloren.
  
  Credi che *l'inseguimento* dei poliziotti sia sempre pericoloso?
  Glaubst du, dass die *Verfolgung* durch die Polizisten immer gefährlich ist?
  
  Sebbene avessero perso di vista il ladro, ripresero *l'inseguimento* più tardi.
  Obwohl sie den Dieb aus den Augen verloren hatten, nahmen sie die *Verfolgung* später wieder auf.
  
  Il documentario mostrava *l'inseguimento* di un lupo nella foresta invernale.
  Die Dokumentation zeigte die *Verfolgung* eines Wolfs im winterlichen Wald.
