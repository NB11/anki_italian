Rang: 798
Wort: stamattina
Wortart: adv
Wort mit Artikel: stamattina
Femininum / Plural: ''
IPA: ''
Definition: heute Morgen
Register: ''
Beispielsätze: |-
  Ho visto Maria *stamattina* al mercato mentre comprava delle mele.
  Ich habe Maria *heute Morgen* auf dem Markt gesehen, als sie Äpfel kaufte.
  
  *Stamattina* ho fatto colazione con il tenente prima di partire per il corso.
  *Heute Morgen* habe ich mit dem Leutnant gefrühstückt, bevor ich zum Kurs aufbrach.
  
  Credo che *stamattina* abbia fatto molto caldo, ma non ne sono sicuro.
  Ich glaube, *heute Morgen* war es sehr heiß, aber ich bin mir nicht sicher.
  
  Se non avessi fatto tardi, arriverei *stamattina* in tempo alla lezione.
  Wenn ich nicht zu spät gekommen wäre, *heute Morgen* rechtzeitig zum Unterricht.
  
  *Stamattina* ho letto sul giornale che il governo ha superato un'altra occasione storica.
  *Heute Morgen* habe ich in der Zeitung gelesen, dass die Regierung eine weitere historische Gelegenheit genutzt hat.
