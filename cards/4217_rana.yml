Rang: 4217
Wort: rana
Wortart: n.m
Wort mit Artikel: la rana
Femininum / Plural: rane
IPA: ''
Definition: der Frosch, Frösche
Register: ''
Beispielsätze: |-
  Nel *ranario* ci sono diverse specie di rane colorate.
  Im Froschteich gibt es verschiedene Arten von bunten Fröschen.
  
  Mentre tornavo a casa, ho visto una *rana* che saltava vicino al ruscello.
  Als ich nach Hause zurückkehrte, sah ich einen Frosch, der nahe dem Bach sprang.
  
  Se non avessimo pulito il laghetto, non ci sarebbero più le *rane* che cantano la sera.
  Wenn wir den Teich nicht gereinigt hätten, gäbe es keine Frösche mehr, die abends singen.
  
  Il naturalista ha spiegato che la *rana* è un animale protetto per legge in questa zona.
  Der Naturforscher erklärte, dass der Frosch ein gesetzlich geschütztes Tier in dieser Gegend ist.
  
  Non appena trovate una *rana* rara, chiamate subito il centro di recupero animali!
  Sobald ihr einen seltenen Frosch entdeckt, ruft sofort das Tierheim an!
