Rang: 4692
Wort: lastra
Wortart: n.f
Wort mit Artikel: la lastra
Femininum / Plural: lastre
IPA: ''
Definition: die Platte, -n
Register: ''
Beispielsätze: |-
  Dopo l'incidente, la *lastra* del tetto era incrinata ma non rotta.
  Nach dem Unfall war die *Platte* des Daches rissig, aber nicht gebrochen.
  
  Hanno sostituito la *lastra* di marmo con una nuova, più resistente.
  Sie haben die *Platte* aus Marmor durch eine neue, widerstandsfähigere ersetzt.
  
  Nella *lastra* di vetro si rifletteva la luce del tramonto in modo straordinario.
  Auf der *Platte* aus Glas spiegelte sich das Licht des Sonnenuntergangs auf außergewöhnliche Weise.
  
  Anche se la *lastra* di ghiaccio sembrava solida, non avrebbe retto il nostro peso.
  Obwohl die *Eisplatte* solide wirkte, hätte sie unser Gewicht nicht getragen.
  
  La *lastra* metallica che hanno montato è fondamentale per la struttura dell’edificio.
  Die metallene *Platte*, die sie montiert haben, ist für die Struktur des Gebäudes entscheidend.
