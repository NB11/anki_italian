Beispielsätze: |-
  L’acqua *marina* è più salata di quella di lago.
  Das *Meeres*wasser ist salziger als das von einem See.
  
  Abbiamo fatto una passeggiata lungo la costa *marina* dopo il tramonto.
  Wir sind nach dem *Sonnenuntergang* am Meeresufer spazieren gegangen.
  
  Questo pesce proviene da acque *marine* molto profonde.
  Dieser Fisch stammt aus sehr tiefen *Meeres*gewässern.
  
  La corrente *marina* è più forte oggi causa del forte vento di ieri.
  Die *Meeres*strömung ist heute wegen des gestrigen starken Windes stärker.
  
  Nonostante le condizioni *marine* avverse, la nave è partita comunque.
  Trotz der widrigen *Meeres*bedingungen ist das Schiff dennoch abgefahren.
