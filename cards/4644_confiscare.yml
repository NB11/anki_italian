Rang: 4644
Wort: confiscare
Wortart: vt
Wort mit Artikel: confiscare
Femininum / Plural: ''
IPA: ''
Definition: beschlagnahmen, konfiszieren
Register: ''
Beispielsätze: |-
  La polizia ha deciso di *confiscare* tutti gli oggetti rubati durante il blitz.
  Die Polizei hat beschlossen, alle gestohlenen Gegenstände zu *beschlagnahmen*.
  
  Se non rispetti le regole, ti farò *confiscare* il cellulare per una settimana.
  Wenn du die Regeln nicht einhältst, werde ich dir das Handy für eine Woche *abnehmen*.
  
  Il giudice ordinò di *confiscare* i beni dei trafficanti di droga per finanziare programmi sociali.
  Der Richter ordnete an, das Vermögen der Drogenhändler zu *konfiszieren*, um soziale Programme zu finanzieren.
  
  Nonostante le proteste, il governo minacciò di *confiscare* le terre coltivate illegalmente.
  Trotz der Proteste drohte die Regierung damit, die illegal bewirtschafteten Felder zu *enteignen*.
  
  L’agente spiegò che, secondo la legge, può *confiscare* qualsiasi cosa usata per commettere un reato.
  Der Beamte erklärte, dass er laut Gesetz alles *einziehen* darf, was zur Begehung einer Straftat benutzt wurde.
