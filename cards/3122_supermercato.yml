Rang: 3122
Wort: supermercato
Wortart: n.m
Wort mit Artikel: il supermercato
Femininum / Plural: supermercati
IPA: ''
Definition: der Supermarkt, -märkte
Register: ''
Beispielsätze: |-
  Ieri ho comprato le banane solo nel *supermercato* vicino a casa.
  Gestern habe ich Äpfel nur im *Supermarkt* um die Ecke gekauft.
  
  Se vai al *supermercato*, ricordati di prendere anche il latte.
  Falls du in den *Supermarkt* gehst, vergiss nicht, auch die Milch mitzunehmen.
  
  Il *supermercato* che preferisco è aperto 24 ore su 24.
  Der *Supermarkt*, den ich am meisten mag, hat 24 Stunden am Tag geöffnet.
  
  Hanno chiuso il *supermercato* all’angolo perché vendeva prodotti tossici.
  Sie haben den *Supermarkt* an der Ecke geschlossen, weil er giftige Produkte verkaufte.
  
  Non appena avrò finito di lavorare, andrò al *supermercato* a prendere quello che manca.
  Sobald ich mit der Arbeit fertig bin, gehe ich in den *Supermarkt*, um das zu besorgen, was fehlt.
