Rang: 3452
Wort: sfortunato
Wortart: adj
Wort mit Artikel: sfortunato
Femininum / Plural: ''
IPA: ''
Definition: unglücklich, Pech haben
Register: ''
Beispielsätze: |-
  È *sfortunato* perché ha perso il treno per un soffio.
  Er ist *unglücklich*, weil er den Zug um Haaresbreite verpasst hat.
  
  Se fossi in te, non mi *sforterei* tanto: non sempre si vince.
  An deiner Stelle würde ich mich nicht so *anstrengen* – man gewinnt nicht immer.
  
  È *sfortunato* l’uomo che non sa godersi la vita semplice che ha.
  Unglücklich ist der Mann, der nicht das einfache Leben genießen kann, das er hat.
  
  Anche se sei *sfortunato* oggi, domani potrebbe andare meglio.
  Auch wenn du heute *Pech hast*, könnte es morgen besser laufen.
  
  Credo che lui sia *sfortunato* in amore, ma non ne vuole parlare con nessuno.
  Ich glaube, er hat *Pech in der Liebe*, aber er will mit niemandem darüber reden.
