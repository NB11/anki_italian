Beispielsätze: |-
  La sua *passione* per la musica è contagiosa.
  Seine *Leidenschaft* für Musik ist ansteckend.
  
  Ho scoperto una nuova *passione*: dipingere ad acquerello.
  Ich habe eine neue *Leidenschaft* entdeckt: Aquarelle zu malen.
  
  Sebbene abbia avuto molte *passioni* nella vita, questa è la più duratura.
  Obwohl ich viele *Leidenschaften* im Leben gehabt habe, ist diese die langlebigste.
  
  Se non coltivi la tua *passione*, rischi di perderla nel frattempo.
  Wenn du deine *Leidenschaft* nicht pflegst, riskierst du, sie in der Zwischenzeit zu verlieren.
  
  È raro trovare qualcuno che condivida la mia stessa *passione* per i diamanti rari.
  Es ist selten, jemanden zu finden, der meine gleiche *Leidenschaft* für seltene Diamanten teilt.
