Rang: 4591
Wort: credibile
Wortart: adj
Wort mit Artikel: credibile
Femininum / Plural: ''
IPA: ''
Definition: glaubwürdig, vertrauenswürdig
Register: ''
Beispielsätze: |-
  Non trovo che la sua spiegazione sia *credibile*, ha troppe contraddizioni.
  Ich finde seine Erklärung nicht *glaubwürdig*, sie enthält zu viele Widersprüche.
  
  Se vuoi che ti credano, devi presentare prove *credibili* al giudice.
  Wenn sie dir glauben sollen, musst du dem Richter *glaubwürdige* Beweise vorlegen.
  
  Era così *credibile* nel suo ruolo che tutti hanno creduto fosse un attore professionista.
  Er war so *glaubwürdig* in seiner Rolle, dass alle glaubten, er sei ein Profischauspieler.
  
  Le fonti più *credibili* dicono che l’economia crescerà del 2% l’anno prossimo.
  Die *glaubwürdigsten* Quellen sagen, dass die Wirtschaft nächstes Jahr um 2 % wachsen wird.
  
  Nonostante le sue promesse, la sua offerta non mi sembra affatto *credibile* per risolvere il problema.
  Trotz seiner Versprechen erscheint mir sein Angebot überhaupt nicht *glaubwürdig*, um das Problem zu lösen.
