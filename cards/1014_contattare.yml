Rang: 1014
Wort: contattare
Wortart: vt
Wort mit Artikel: contattare
Femininum / Plural: ''
IPA: ''
Definition: kontaktieren, erreichen, anrufen
Register: ''
Beispielsätze: |-
  Se hai bisogno di aiuto, *contatta* immediatamente la polizia.
  Wenn du Hilfe brauchst, kontaktiere sofort die Polizei.
  
  Il regista ha deciso di *contattare* l’attore famoso per il suo nuovo film.
  Der Regisseur hat beschlossen, den berühmten Schauspieler für seinen neuen Film zu kontaktieren.
  
  Non so come *contattarti*: potresti dare il tuo numero di telefono?
  Ich weiß nicht, wie ich dich erreichen soll: kannst du mir deine Telefonnummer geben?
  
  Dopo aver litigato, Maria non vuole più *contattare* suo fratello.
  Nachdem sie sich gestritten hat, will Maria ihren Bruder nicht mehr kontaktieren.
  
  Appena arriverò all’isola, *contatterò* i miei amici che mi aspettano lì.
  Sobald ich auf der Insel ankomme, werde ich meine Freunde kontaktieren, die dort auf mich warten.
Audio: ''
Notiz: ''
Dispersion: ''
