Rang: 1843
Wort: trasportare
Wortart: vt
Wort mit Artikel: trasportare
Femininum / Plural: ''
IPA: ''
Definition: transportieren, befördern
Register: ''
Beispielsätze: |-
  Il camion serve per *trasportare* merci pesanti da una città all'altra.
  Der LKW dient dazu, schwere Güter von einer Stadt in die andere zu *transportieren*.
  
  Hanno *trasportato* il paziente in ospedale con un elicottero.
  Sie haben den Patienten mit einem Hubschrauber in das Krankenhaus *transportiert*.
  
  Se avessi una nave, potrei *trasportare* questi prodotti in America.
  Wenn ich ein Schiff hätte, könnte ich diese Produkte nach Amerika *transportieren*.
  
  Prima di partire, assicurati che qualcuno sappia dove *trasporti* questi documenti riservati.
  Bevor du losfährst, stelle sicher, dass jemand weiß, wohin du diese vertraulichen Dokumente *transportierst*.
  
  È vietato *trasportare* animali senza un certificato sanitario valido.
  Es ist verboten, Tiere ohne gültigen Gesundheitsschein zu *transportieren*.
