Rang: 3981
Wort: vela
Wortart: n.f
Wort mit Artikel: la vela
Femininum / Plural: vele
IPA: ''
Definition: das Segel, -
Register: ''
Beispielsätze: |-
  La *vela* della barca si è strappata durante la tempesta.
  Das *Segel* des Bootes ist während des Sturms gerissen.
  
  Se non vuoi bagnarti, stendi la *vela* sopra il letto.
  Falls du nicht nass werden willst, spanne das *Segel* über das Bett.
  
  Ho visto una barca a *vele* che navigava verso l’isola.
  Ich habe ein Boot mit *Segeln* gesehen, das zur Insel fuhr.
  
  Nonostante la *vela* fosse strappata, la barca riuscì a tornare in porto.
  Obwohl das *Segel* gerissen war, schaffte es das Boot, zurück in den Hafen zu kommen.
  
  Mi piacerebbe imparare ad andare a *vela* durante le vacanze estive.
  Ich würde gerne während der Sommerferien segeln lernen.
