Rang: 1041
Wort: cugino
Wortart: n.m
Wort mit Artikel: il cugino
Femininum / Plural: i cugini
IPA: ''
Definition: der Cousin, -s / die Cousine, -n
Register: ''
Beispielsätze: |-
  Il *cugino* di Marco lavora in banca a Milano.
  Der *Cousin* von Marco arbeitet in einer Bank in Mailand.
  
  Ho appena saputo che la *cugina* di mia madre si sposa il mese prossimo.
  Ich habe gerade erfahren, dass die *Cousine* meiner Mutter nächsten Monat heiratet.
  
  Ti presento mio *cugino*, che abita a Londra da dieci anni e lavora come segretario.
  Ich stelle dir meinen *Cousin* vor, der seit zehn Jahren in London lebt und als Sekretär arbeitet.
  
  Quando eravamo piccoli, io e il mio *cugino* passavamo ogni estate insieme al mare.
  Als wir klein waren, verbrachten mein *Cousin* und ich jeden Sommer am Meer zusammen.
  
  Se non fosse per il *cugino* di mio padre, non avrei mai trovato questo lavoro all'estero.
  Wenn es nicht den *Cousin* meines Vaters gäbe, hätte ich diese Arbeit im Ausland nie gefunden.
