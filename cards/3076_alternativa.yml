Femininum / Plural: alternative
IPA: ''
Definition: die Alternative, -n
Register: ''
Beispielsätze: |-
  Non vedo *alternative*: dobbiamo agire ora!
  Ich sehe *keine Alternative*: wir müssen jetzt handeln!
  
  La sua *alternativa* era partire o restare, ma quanti altri giovani si trovano nella stessa situazione?
  Ihre *Alternative* war zu gehen oder zu bleiben, aber wie viele andere junge Menschen stehen in derselben Situation?
  
