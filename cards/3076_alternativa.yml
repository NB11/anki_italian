  Wenn dir diese Lösung nicht gefällt, welche *Alternative* würdest du vorschlagen?
  
  Aveva studiato tutte le *alternative* possibili prima di prendere una decisione definitiva.
  Er hatte alle möglichen *Alternativen* studiert, bevor er eine endgültige Entscheidung traf.
  
  I ricercatori cercano un’***alternativa*** sostenibile al petrolio, ma il processo è molto complesso.
  Die Forscher suchen nach einer *nachhaltigen Alternative* zum Öl, aber der Prozess ist sehr komplex.
