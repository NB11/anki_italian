Rang: 4206
Wort: dado
Wortart: n.m
Wort mit Artikel: il dado
Femininum / Plural: dadi
IPA: ''
Definition: der Würfel, -
Register: ''
Beispielsätze: |-
  Per giocare a *Monopoli* servono due dadi per spostarsi sulle caselle.
  Zum Spielen von *Monopoli* braucht man zwei Würfel, um die Felder zu wechseln.
  
  L’hai visto il dado che ho usato per quella scommessa? Era truccato!
  Hast du den *Würfel* gesehen, den ich für diese Wette benutzt habe? Er war gezinkt!
  
  Ho trovato un dado antico nel tuo cassetto, sembra di valore.
  Ich habe einen alten *Würfel* in deiner Schublade gefunden – er scheint wertvoll zu sein.
  
  Se esci di casa senza controllare il dado, rischi di rovinare tutto!
  Wenn du ohne den *Würfel* zu prüfen das Haus verlässt, riskierst du, alles zu ruinieren!
  
  Era così sicuro che avrebbe vinto, ma il dado non gli ha dato ragione.
  Er war so sicher, dass er gewinnen würde, doch der *Würfel* gab ihm nicht recht.
