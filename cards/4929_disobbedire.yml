Rang: 4929
Wort: disobbedire
Wortart: v
Wort mit Artikel: disobbedire
Femininum / Plural: ''
IPA: ''
Definition: nicht gehorchen, widersprechen
Register: ''
Beispielsätze: |-
  Il bambino *disobbedisce* sempre ai suoi genitori quando gli viene detto di fare i compiti.
  Das Kind *gehorcht* seinen Eltern nie, wenn es die Hausaufgaben machen soll.
  
  Se *disobbedirai* ancora alle regole, verrai punito severamente.
  Wenn du weiterhin den Regeln *widersprichst*, wirst du hart bestraft.
  
  Nonostante avesse promesso di non farlo, Marco *ha disobbedito* alle istruzioni del capo.
  Obwohl er es versprochen hatte, hat Marco den *Anweisungen* seines Chefs nicht gehorcht.
  
  Avresti dovuto chiedere permesso, ma hai *disobbedito* proprio come al solito.
  Du hättest um Erlaubnis bitten müssen, aber du hast *dich widersetzt*, wie immer.
  
  È così testardo che preferisce *disobbedire* piuttosto che ammettere di aver sbagliato.
  Er ist so stur, dass er es vorzieht, zu *widersprechen*, als zuzugeben, dass er sich geirrt hat.
