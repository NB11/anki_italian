Rang: 4883
Wort: home
Wortart: n.m
Wort mit Artikel: il home
Femininum / Plural: gli homes
IPA: ''
Definition: das Zuhause, -s, Heim, -e
Register: ''
Beispielsätze: |-
  Il mio *home* è piccolo ma accogliente.
  Meine *Wohnung* ist klein, aber gemütlich.
  
  Ho trovato un *home* per i cani abbandonati.
  Ich habe ein *Zuhause* für die verlassenen Hunde gefunden.
  
  Vorresti visitare il mio *home* domani sera?
  Möchtest du morgen Abend mein *Zuhause* besuchen?
  
  Non c'è nessun *home* che mi piaccia più di questo.
  Es gibt keine *Wohnung*, die mir besser gefällt als diese.
  
  Se avessi più soldi, comprerei un *home* in campagna.
  Wenn ich mehr Geld hätte, würde ich ein *Heim* auf dem Land kaufen.
