Rang: 4329
Wort: pungere
Wortart: v
Wort mit Artikel: pungere
Femininum / Plural: ''
IPA: ''
Definition: stechen, beißen
Register: ''
Beispielsätze: |-
  Se non metti i guanti, le ortiche possono *pungere* le tue mani.
  Wenn du keine Handschuhe trägst, können die Nesseln deine Hände *stechen*.
  
  Il medico ha dovuto *pungere* la vescica per farla sgonfiare.
  Der Arzt musste die Blase *durchstechen*, damit sie sich entleert.
  
  Ho provato un dolore improvviso quando l'ago mi ha *punto* il dito.
  Ich spürte einen plötzlichen Schmerz, als die Nadel mir in den Finger *stach*.
  
  Avrei preferito che non mi avesse *punto* con quel rimprovero così severo.
  Ich hätte es vorgezogen, wenn er mich nicht mit diesem harten Vorwurf *getroffen* hätte.
  
  La vespa, quando si sente minacciata, può *pungere* anche più volte.
  Die Wespe kann, wenn sie sich bedroht fühlt, sogar mehrmals *zustechen*.
