Rang: 2297
Wort: detestare
Wortart: vt
Wort mit Artikel: detestare
Femininum / Plural: ''
IPA: ''
Definition: "*hassen*, *verabscheuen*"
Register: ''
Beispielsätze: |-
  Perché *detesti* così tanto quando qualcuno ti interrompe mentre parli?
  Warum *hasst* du es so sehr, wenn dich jemand unterbricht, während du sprichst?
  
  Se *detestassi* la confusione, non vivresti in una città grande.
  Wenn du *hassen* würdest, in einer großen Stadt zu leben.
  
  Ho sempre *detestato* quel film, ma oggi l’ho rivisto e mi è piaciuto.
  Ich habe diesen Film schon immer *verabscheut*, aber heute habe ich ihn mir nochmal angeschaut und er hat mir gefallen.
  
  Dicono che *detesterebbe* dover lavorare con lui dopo quello che è successo.
  Sie sagen, sie *würde es hassen*, nach dem, was passiert ist, mit ihm zusammenarbeiten zu müssen.
  
  Perché *detestano* che qualcuno tocchi le loro cose senza permesso?
  Warum *hassen* sie es, wenn jemand ihre Sachen ohne Erlaubnis anfasst?
