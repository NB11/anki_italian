Rang: 3568
Wort: fogna
Wortart: n.m
Wort mit Artikel: la fogna
Femininum / Plural: fogne
IPA: ''
Definition: der Abwasserkanal, -ä-e
Register: ''
Beispielsätze: |-
  Il comune ha chiuso la *fogna* che puzzava troppo.
  Die Gemeinde hat den *Abwasserkanal* geschlossen, der zu sehr stank.
  
  Mentre camminavo per strada, ho visto un topo che usciva da una *fogna*.
  Während ich die Straße entlangging, sah ich eine Ratte, die aus einem *Abwasserkanal* kam.
  
  Se non pulisci regolarmente la *fogna*, prima o poi si intaserà.
  Wenn du den *Abwasserkanal* nicht regelmäßig reinigst, wird er früher oder später verstopfen.
  
  Ho saputo che sotto il nostro quartiere passa una vecchia *fogna* abbandonata.
  Ich habe gehört, dass unter unserem Viertel ein alter, verlassener *Abwasserkanal* verläuft.
  
  La *fogna* che abbiamo trovato nel giardino era piena di immondizia e insetti.
  Der *Abwasserkanal*, den wir im Garten entdeckt hatten, war voller Müll und Insekten.
