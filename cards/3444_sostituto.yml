Rang: 3444
Wort: sostituto
Wortart: n.m
Wort mit Artikel: il sostituto
Femininum / Plural: i sostituti
IPA: ''
Definition: der Ersatz, -sätze
Register: ''
Beispielsätze: |-
  Il regista ha scelto un *sostituto* perché l'attore principale è ammalato.
  Der Regisseur hat einen *Ersatz* gewählt, weil der Hauptdarsteller krank ist.
  
  Vuoi che cerchi un *sostituto* per il direttore del reparto?
  Soll ich einen *Ersatz* für den Abteilungsleiter suchen?
  
  Il *sostituto* del sindaco ha parlato alla conferenza stampa della città.
  Der *Vertreter* des Bürgermeisters hat auf der Pressekonferenz der Stadt gesprochen.
  
  Senza un *sostituto* qualificato, la ditta rischia di perdere clienti importanti.
  Ohne einen qualifizierten *Ersatz* riskiert die Firma, wichtige Kunden zu verlieren.
  
  Il *sostituto* di matematica è stato severo, ma spiegava molto bene.
  Der *Vertretungslehrer* für Mathe war streng, aber er hat sehr gut erklärt.
