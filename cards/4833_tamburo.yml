  Ich habe gelernt, die *Trommel* bei meinem Großvater zu spielen, der Schlagzeuger war.
  
  Nonostante il *tamburo* fosse vecchio, produceva un suono meraviglioso.
  Obwohl die *Trommel* alt war, erzeugte sie einen wundervollen Klang.
  
  Vorrei comprare un nuovo *tamburo* per la mia band, ma costa troppo.
  Ich würde gerne eine neue *Trommel* für meine Band kaufen, aber sie kostet zu viel.
  
  Sai che il *tamburo* è uno degli strumenti più antichi del mondo?
  Weißt du, dass die *Trommel* eines der ältesten Instrumente der Welt ist?
