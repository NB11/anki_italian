Beispielsätze: |-
  Il governo *comunista* ha promosso una riforma economica radicale.
  Die *kommunistische* Regierung hat eine radikale Wirtschaftsreform vorangetrieben.
  
  Volevo leggere un romanzo che parli di una famiglia *comunista* in crisi.
  Ich wollte einen Roman lesen, der von einer *kommunistischen* Familie in der Krise erzählt.
  
  Se domani gli operai scioperano, sarà per idee *comuniste* o per salari bassi?
  Wenn die Arbeiter morgen streiken, wird es dann aus *kommunistischen* Überzeugungen oder wegen niedriger Löhne sein?
  
  La sua teoria, benché *comunista*, contiene spunti interessanti per l’economia moderna.
  Seine Theorie, obwohl sie *kommunistisch* ist, enthält interessante Ansätze für die moderne Wirtschaft.
  
  Credi che i giovani d’oggi apprezzino ancora l’ideale *comunista*?
  Glaubst du, dass junge Menschen heute noch das *kommunistische* Ideal zu schätzen wissen?
