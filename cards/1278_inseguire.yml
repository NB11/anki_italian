Rang: 1278
Wort: inseguire
Wortart: vt
Wort mit Artikel: inseguire
Femininum / Plural: ''
IPA: ''
Definition: verfolgen, hinterherjagen
Register: ''
Beispielsätze: |-
  La polizia sta *inseguendo* il ladro che è fuggito con il bottino.
  Die Polizei *jagt* den Dieb, der mit der Beute geflohen ist.
  
  Se *inseguissi* i tuoi sogni con più convinzione, forse li raggiungeresti.
  Wenn du deine Träume mit mehr Überzeugung *verfolgst*, erreichst du sie vielleicht.
  
  Il gatto *insegue* l’ombra sul muro con grande entusiasmo.
  Die Katze *jagt* den Schatten an der Wand mit großer Begeisterung.
  
  Non appena ho sentito l’urlo, ho capito che qualcuno lo stava *inseguendo* per la strada.
  Sobald ich den Schrei gehört habe, wusste ich, dass ihn jemand auf der Straße *verfolgte*.
  
  Dicono che il procuratore voglia *inseguire* questa pista prima che sia troppo tardi.
  Man sagt, der Staatsanwalt wolle diese Spur *verfolgen*, bevor es zu spät ist.
