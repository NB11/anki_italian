Beispielsätze: |-
  In *banco* c'è un biglietto con un messaggio misterioso.
  Auf der *Bank* liegt ein Zettel mit einer mysteriösen Nachricht.
  
  Gli studenti hanno sistemato i loro libri sul *banco* prima della lezione.
  Die Studenten haben ihre Bücher vor dem Unterricht auf den *Tisch* gestellt.
  
  Se non trovi posto all'università, prova a chiedere un *banco* in più in aula.
  Falls du keinen Platz an der Uni findest, versuche, nach einem *Tisch* mehr im Hörsaal zu fragen.
  
  Il *banco* di lavoro del falegname era coperto di segatura e attrezzi.
  Der *Werktisch* des Tischlers war voller Sägespäne und Werkzeuge.
  
  Ho chiesto al professore se potevo usare un altro *banco* perché quello era troppo piccolo per i miei appunti.
  Ich habe den Professor gefragt, ob ich einen anderen *Tisch* nutzen könnte, weil dieser zu klein für meine Notizen war.
