Rang: 1015
Wort: arresto
Wortart: n.m
Wort mit Artikel: l'arresto
Femininum / Plural: arresti
IPA: ''
Definition: die Verhaftung, der Arrest
Register: ''
Beispielsätze: |-
  L'*arresto* del famoso attore ha sorpreso tutti i suoi fan alla stazione.
  Die *Verhaftung* des berühmten Schauspielers hat alle seine Fans am Bahnhof überrascht.
  
  Se hai *arrestato* qualcuno, devi riferirlo immediatamente alla polizia.
  Wenn du jemanden *verhaftet* hast, musst du es sofort der Polizei melden.
  
  La polizia ha effettuato diversi *arresti* dopo la battaglia in centro.
  Die Polizei hat nach der Schlacht in der Innenstadt mehrere *Verhaftungen* vorgenommen.
  
  Nonostante la calma generale, il poliziotto ha deciso di procedere con l'*arresto*.
  Trotz der allgemeinen Ruhe hat sich der Polizist entschieden, die *Verhaftung* vorzunehmen.
  
  Il testimone ha dichiarato che non ha visto nulla che potesse giustificare l'*arresto*.
  Der Zeuge hat erklärt, dass er nichts gesehen hat, was die *Verhaftung* rechtfertigen könnte.
