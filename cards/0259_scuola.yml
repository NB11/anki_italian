Rang: 259
Wort: scuola
Wortart: n.f
Wort mit Artikel: la scuola
Femininum / Plural: scuole
IPA: ''
Definition: die Schule, -n
Register: ''
Beispielsätze: |-
  Oggi *la scuola* inizia alle otto.
  Heute beginnt *die Schule* um acht Uhr.
  
  Ho sposato una donna che ama molto *la scuola*.
  Ich habe eine Frau geheiratet, die *die Schule* sehr liebt.
  
  Non vado mai a *scuola* la domenica.
  Ich gehe nie *in die Schule* am Sonntag.
  
  Spero che domani *a scuola* non ci sia un compito in classe.
  Ich hoffe, dass es morgen *in der Schule* keine Klassenarbeit gibt.
  
  Le *scuole* italiane sono molto diverse da quelle tedesche.
  *Die Schulen* in Italien sind ganz anders als die in Deutschland.
