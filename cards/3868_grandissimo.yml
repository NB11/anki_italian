Wort mit Artikel: grandissimo
Femininum / Plural: ''
IPA: ''
Definition: riesig, enorm
Register: ''
Beispielsätze: |-
  La *grandissima* folla si è radunata per la partita di calcio.
  Die *riesige* Menge hat sich für das Fußballspiel versammelt.
  
  Se avessi visto la sua *grandissima* delusione, avresti capito tutto.
  Wenn du ihre *enorme* Enttäuschung gesehen hättest, hättest du alles verstanden.
  
