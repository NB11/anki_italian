  Trotz der späten Stunde war die Party noch *riesig* und laut.
  
  Mi ha chiesto se preferisco un premio *grandissimo* o tanti piccoli.
  Er fragte mich, ob ich einen *riesigen* Preis oder viele kleine bevorzuge.
  
  Era una soddisfazione vedere quell'omino trasformarsi in un *grandissimo* artista.
  Es war eine Befriedigung zu sehen, wie sich der kleine Mann in einen *riesigen* Künstler verwandelte.
