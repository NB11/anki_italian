Rang: 1101
Wort: esplodere
Wortart: vi
Wort mit Artikel: esplodere
Femininum / Plural: ''
IPA: ''
Definition: explodieren, detonieren
Register: ''
Beispielsätze: |-
  Il direttore ha ordinato di *esplodere* l’edificio perché era pericoloso.
  Der Direktor hat befohlen, das Gebäude zu sprengen, weil es gefährlich war.
  
  Se il gas non fosse stato spento in tempo, sarebbe potuto *esplodere* tutto il quartiere.
  Wäre das Gas nicht rechtzeitig abgestellt worden, hätte das ganze Viertel explodieren können.
  
  Credo che questa *esplosione* sia stata causata da un corto circuito nel locale tecnico.
  Ich glaube, diese Explosion wurde durch einen Kurzschluss im technischen Bereich verursacht.
  
  Appena ho sentito il rumore, ho capito che qualcuno aveva cercato di *esplodere* la bottiglia con della polvere da sparo.
  Sobald ich das Geräusch gehört hatte, wusste ich, dass jemand versucht hatte, die Flasche mit Schießpulver zu sprengen.
  
  Nonostante le proteste dei vicini, il sindaco ha deciso di *esplodere* l’albero secolare per costruire un parcheggio.
  Trotz der Proteste der Anwohner hat der Bürgermeister beschlossen, den uralten Baum zu sprengen, um einen Parkplatz zu bauen.
