Rang: 3449
Wort: casco
Wortart: n.m
Wort mit Artikel: il casco
Femininum / Plural: caschi
IPA: ''
Definition: der Helm, -e
Register: ''
Beispielsätze: |-
  Il *casco* da moto deve essere sempre allacciato correttamente per garantire la sicurezza.
  Der *Motorradhelm* muss immer richtig befestigt sein, um die Sicherheit zu gewährleisten.
  
  Non dimenticare di indossare il *casco*: la legge lo impone in molte regioni.
  Vergiss nicht, den *Helm* zu tragen: das schreibt das Gesetz in vielen Regionen vor.
  
  Mio fratello ha rotto il *casco* durante la caduta in bici, ma per fortuna non si è fatto male.
  Mein Bruder hat sich den *Helm* beim Sturz vom Fahrrad kaputt gemacht, aber zum Glück ist er nicht verletzt worden.
  
  Se non avessi il *casco*, non potresti neppure salire sullo scooter, vero?
  Wenn du keinen *Helm* hättest, dürftest du nicht mal auf den Roller steigen, oder?
  
  Il *casco* di protezione è indispensabile quando si lavora in cantiere.
  Der *Schutzhelm* ist unverzichtbar, wenn man auf einer Baustelle arbeitet.
