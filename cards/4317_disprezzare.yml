Rang: 4317
Wort: disprezzare
Wortart: v
Wort mit Artikel: disprezzare
Femininum / Plural: ''
IPA: ''
Definition: verachten, geringschätzen
Register: ''
Beispielsätze: |-
  Molti *disprezzano* chi non condivide le loro opinioni politiche.
  Viele *verachten* diejenigen, die ihre politischen Ansichten nicht teilen.
  
  Se tu *disprezzassi* le regole, verresti punito severamente.
  Wenn du die Regeln *verachten* würdest, würdest du hart bestraft werden.
  
  Lo Stato *disprezzò* le richieste di aiuto dei rifugiati durante la crisi.
  Der Staat *geringschätzte* die Hilfsersuchen der Flüchtlinge während der Krise.
  
  Credo che il pubblico lo *disprezzi* per la sua arroganza in televisione.
  Ich glaube, dass das Publikum ihn wegen seiner Arroganz im Fernsehen *verachtet*.
  
  Anche se l'aveva offesa, lei non volle *disprezzare* il suo tentativo di scusarsi.
  Obwohl er sie beleidigt hatte, wollte sie seinen Versuch, sich zu entschuldigen, nicht *geringschätzen*.
