Rang: 2334
Wort: denuncia
Wortart: n.f
Wort mit Artikel: la denuncia
Femininum / Plural: denunce
IPA: ''
Definition: die Anzeige, -n
Register: ''
Beispielsätze: |-
  Il poliziotto ha redatto la *denuncia* per furto ieri sera al commissariato.
  Der Polizist hat die *Anzeige* wegen Diebstahls gestern Abend auf dem Kommissariat aufgenommen.
  
  Nonostante le minacce, lei ha deciso di presentare la *denuncia* per proteggere i suoi diritti.
  Trotz der Drohungen hat sie sich entschieden, die *Anzeige* zu erstatten, um ihre Rechte zu schützen.
  
  La *denuncia* contro l’amministratore è stata archiviata per mancanza di prove concrete.
  Die *Anzeige* gegen den Verwalter wurde wegen fehlender konkreter Beweise zu den Akten gelegt.
  
  Se vuoi essere sicuro, controlla che la *denuncia* sia stata protocollata correttamente dall’ufficio competente.
  Falls du ganz sicher sein willst, prüfe, ob die *Anzeige* korrekt vom zuständigen Amt registriert wurde.
  
  Hanno presentato una *denuncia* contro il loro vicino perché rumoroso, ma senza risultato immediato.
  Sie haben eine *Anzeige* gegen ihren lauten Nachbarn eingereicht, aber ohne sofortiges Ergebnis.
