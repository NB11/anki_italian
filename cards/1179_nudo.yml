Rang: 1179
Wort: nudo
Wortart: adj
Wort mit Artikel: nudo
Femininum / Plural: ''
IPA: ''
Definition: nackt
Register: ''
Beispielsätze: |-
  Il bambino si tolse i vestiti ed entrò nel *nudo* bacino d'acqua.
  Das Kind zog sich aus und sprang in das *nackte* Wasserbecken.
  
  Camminando attraverso il bosco, li abbiamo trovati con le braccia *nude* per il freddo.
  Als wir durch den Wald gingen, fanden wir sie mit *nackten* Armen in der Kälte.
  
  Nonostante il clima invernale, lei preferiva camminare con le braccia *nude* per la convinzione che fosse salutare.
  Trotz des Winterklimas bevorzugte sie, mit *nackten* Armen zu laufen, in der Überzeugung, dass es gesund sei.
  
  Chiunque avesse osato attraversare quel *nudo* terreno senza protezione sarebbe stato punito severamente.
  Wer es gewagt hätte, dieses *nackte* Gelände ohne Schutz zu durchqueren, wäre streng bestraft worden.
  
  Il pittore volle rappresentare l'uomo nella sua essenza più *nuda*, senza veli di qualsiasi tipo.
  Der Maler wollte den Menschen in seiner reinsten *nackten* Form darstellen, ohne irgendwelche Schleier.
