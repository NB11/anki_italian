Rang: 1631
Wort: rock
Wortart: n.m
Wort mit Artikel: il rock
Femininum / Plural: i sassi
IPA: ''
Definition: der Felsen, -
Register: ''
Beispielsätze: |-
  Nel nostro viaggio in Italia abbiamo visto *sassi* enormi vicino al lago di Garda.
  Wir haben beim Italienreise *Felsen* in der Nähe des Gardasees gesehen.
  
  Se non *badi* alla strada, potresti sbattere contro un sasso sul traffico cittadino.
  Wenn du nicht auf die Straße *achtest*, könntest du gegen einen Felsen im Stadtverkehr fahren.
  
  È meglio non *camminare* sui sassi vicino al mare perché possono essere scivolosi, specialmente quando sono bagnati.
  Es ist besser, nicht auf den *Felsen* in der Nähe des Meeres zu laufen, weil sie rutschig sein können, besonders wenn sie nass sind.
  
  Il geologo ha detto che questi *sassi* risalgono all’era glaciale e contengono fossili interessanti.
  Der Geologe sagte, dass diese *Felsen* aus der Eiszeit stammen und interessante Fossilien enthalten.
  
  Mentre attraversavamo il *corridoio* stretto, ho notato che un sasso si era staccato dalla parete della montagna lì vicino.
  Während wir den engen *Flur* durchquerten, bemerkte ich, dass sich ein Felsen von der Bergwand in der Nähe gelöst hatte.
