Rang: 186
Wort: sperare
Wortart: v
Wort mit Artikel: sperare
Femininum / Plural: ''
IPA: ''
Definition: hoffen
Register: ''
Beispielsätze: |-
  Io *spero* che tu venga alla festa stasera.
  Ich *hoffe*, dass du heute Abend zur Party *kommst*.
  
  Non *speravamo* di trovare un ristorante così buono.
  Wir *hofften nicht*, so ein gutes Restaurant zu *finden*.
  
  *Speri* sempre di avere fortuna nel gioco?
  *Hoffst* du immer auf Glück beim Spiel?
  
  Se avessi più tempo, *sarei* riuscita a *sperare* meno.
  Wenn ich mehr Zeit hätte, *hätte* ich weniger *gehofft*.
  
  Non *speriamo* che piova domani, preferiamo il sole!
  Wir *hoffen nicht*, dass es morgen regnet, wir *bevorzugen* die Sonne!
