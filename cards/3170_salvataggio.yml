Rang: 3170
Wort: salvataggio
Wortart: n.m
Wort mit Artikel: il salvataggio
Femininum / Plural: i salvataggi
IPA: ''
Definition: die Rettung, -en
Register: ''
Beispielsätze: |-
  Grazie al *salvataggio* tempestivo, il gatto è sopravvissuto all'incendio.
  Dank der *Rettung* rechtzeitig überlebte die Katze das Feuer.
  
  Il *salvataggio* degli ostaggi è avvenuto senza spargimento di sangue.
  Die *Rettung* der Geiseln erfolgte ohne Blutvergießen.
  
  Se non fosse stato per il *salvataggio* dei pompieri, la famiglia avrebbe perso tutto.
  Wäre es nicht zur *Rettung* der Feuerwehrleute gewesen, hätte die Familie alles verloren.
  
  Hanno organizzato un *salvataggio* delle specie in via d'estinzione nel parco nazionale.
  Sie haben eine *Rettung* der vom Aussterben bedrohten Arten im Nationalpark organisiert.
  
  Il premio per il *salvataggio* più coraggioso sarà consegnato domani sera.
  Der Preis für die mutigste *Rettung* wird morgen Abend verliehen werden.
