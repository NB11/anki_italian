Rang: 1573
Wort: bosco
Wortart: n.m
Wort mit Artikel: il bosco
Femininum / Plural: boschi
IPA: ''
Definition: der Wald, Wälder
Register: ''
Beispielsätze: |-
  I *boschi* italiani sono molto belli in autunno.
  Die *Wälder* Italian sind im Herbst sehr schön.
  
  Il ministro ha promesso di proteggere i *boschi* dalla deforestazione.
  Der Minister hat versprochen, die *Wälder* vor der Abholzung zu schützen.
  
  Mentre passeggiavo, ho sentito un rumore strano tra gli alberi del *bosco*.
  Während ich spazierte, hörte ich ein seltsames Geräusch zwischen den Bäumen des *Waldes*.
  
  Se non avessimo rispettato gli accordi, sarebbe stato un *bosco* in più distrutto.
  Wenn wir die Vereinbarungen nicht eingehalten hätten, wäre es ein weiterer *Wald* gewesen, der zerstört worden wäre.
  
  L’esperto ha dichiarato che questo *bosco* è uno dei più antichi d’Europa.
  Der *Experte* erklärte, dass dieser Wald einer der ältesten Europas ist.
