Rang: 1127
Wort: peggio
Wortart: adj
Wort mit Artikel: peggio
Femininum / Plural: ''
IPA: ''
Definition: schlechter, schlimmer
Register: ''
Beispielsätze: |-
  La situazione è *peggiore* di quanto pensassi, soprattutto dopo il nuovo regolamento del dipartimento.
  Die Situation ist *schlechter* als gedacht, besonders nach der neuen Regelung des Fachbereichs.
  
  Nonostante l'aiuto dell'infermiere, il suo stato di salute è rimasto *peggiore* rispetto al giorno precedente.
  Trotz der Hilfe der Krankenschwester blieb sein Gesundheitszustand *schlechter* als am vorherigen Tag.
  
  Pensi che sia *peggiore* per lui accettare l'offerta di lavoro o rifiutarla del tutto?
  Glaubst du, es ist *schlimmer* für ihn, das Jobangebot anzunehmen oder komplett abzulehnen?
  
  Se non fissi bene l'obiettivo, il risultato sarà *peggiore* di quanto speri.
  Wenn du das Ziel nicht genau festlegst, wird das Ergebnis *schlechter* als erhofft.
  
  Dopo l'esplosione, la zona intorno alla piantata di alberi era in condizioni *peggiori* di prima.
  Nach der Explosion war die Umgebung um die gepflanzte Baumreihe in einem *schlechteren* Zustand als zuvor.
