Rang: 4997
Wort: predica
Wortart: n.f
Wort mit Artikel: la predica
Femininum / Plural: prediche
IPA: ''
Definition: die Predigt, -en
Register: ''
Beispielsätze: |-
  Il prete ha tenuto una *predica* molto lunga durante la messa.
  Der Priester hielt eine *Predigt* während der Messe.
  
  Non sopporto più quella *predica* noiosa sulla puntualità!
  Ich kann diese langweilige *Predigt* über Pünktlichkeit nicht mehr hören!
  
  Dopo la *predica* del professore, tutti hanno capito l’importanza della pazienza.
  Nach der *Predigt* des Professors verstanden alle die Wichtigkeit von Geduld.
  
  Se ascolti solo mezza *predica*, ti perderai il punto principale.
  Wenn du nur die Hälfte der *Predigt* hörst, wirst du den Hauptpunkt verpassen.
  
  La *predica* del nonno sulle tradizioni familiari ha commosso tutti i presenti.
  Die *Predigt* des Großvaters über Familientraditionen rührte alle Anwesenden zu Tränen.
