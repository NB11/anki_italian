Rang: 4763
Wort: strillare
Wortart: vi
Wort mit Artikel: strillare
Femininum / Plural: ''
IPA: ''
Definition: laut schreien, kreischen
Register: ''
Beispielsätze: |-
  Il bambino ha iniziato a *strillare* appena ha visto il cane rabbioso.
  Das Kind begann zu *kreischen*, sobald es den wütenden Hund sah.
  
  Secondo te, perché la cantante ha smesso di *strillare* durante il concerto?
  Warum hat die Sängerin deiner Meinung nach während des Konzerts aufgehört zu *kreischen*?
  
  Non appena avrò finito di *strillare*, potremo parlare seriamente.
  Sobald ich aufgehört habe zu *kreischen*, können wir ernsthaft reden.
  
  Il vigile è intervenuto perché i vicini continuavano a *strillare* tutta la notte.
  Der Polizist schritt ein, weil die Nachbarn die ganze Nacht weiter *kreischten*.
  
  Se avessi una voce così potente, potrei *strillare* come un cantante lirico!
  Wenn ich eine solche Stimme hätte, könnte ich wie ein Opernsänger *kreischen*!
