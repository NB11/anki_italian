Rang: 4901
Wort: fortemente
Wortart: adv
Wort mit Artikel: fortemente
Femininum / Plural: ''
IPA: ''
Definition: stark, sehr stark
Register: ''
Beispielsätze: |-
  La polizia ha reagito *fortemente* alla provocazione dei manifestanti.
  Die Polizei reagierte *stark* auf die Provokation der Demonstranten.
  
  Se non ti impegni *fortemente*, non otterrai risultati soddisfacenti.
  Wenn du dich nicht *sehr stark* engagierst, wirst du keine zufriedenstellenden Ergebnisse erzielen.
  
  Il paziente si sente *fortemente* stanco dopo l’operazione.
  Der Patient fühlt sich *stark* erschöpft nach der Operation.
  
  Il governo ha sottolineato che agirà *fortemente* contro la corruzione.
  Die Regierung betonte, dass sie *stark* gegen Korruption vorgehen wird.
  
  Ho rimpianto *fortemente* di non aver accettato quell’offerta di lavoro.
  Ich bedauerte *sehr stark*, dass ich dieses Jobangebot nicht angenommen hatte.
