Rang: 3610
Wort: inchiesta
Wortart: n.f
Wort mit Artikel: l'inchiesta
Femininum / Plural: inchieste
IPA: ''
Definition: die Ermittlung, -en
Register: ''
Beispielsätze: |-
  La polizia ha avviato un'*inchiesta* sulla corruzione globale.
  Die Polizei hat eine *Ermittlung* zur globalen Korruption eingeleitet.
  
  Secondo te, è possibile che abbiano chiuso l'*inchiesta* senza prove?
  Meinst du, sie konnten die *Ermittlung* ohne Beweise abschließen?
  
  L'*inchiesta* che hai avviato ha già dato i suoi frutti, secondo i giornali.
  Die *Ermittlung*, die du gestartet hast, hat laut den Zeitungen bereits Früchte getragen.
  
  Se l'*inchiesta* non fosse stata così discreta, forse avremmo saputo prima la verità.
  Wenn die *Ermittlung* nicht so diskret gewesen wäre, hätten wir vielleicht früher die Wahrheit erfahren.
  
  È importante che l'*inchiesta* venga portata avanti con grande attenzione.
  Es ist wichtig, dass die *Ermittlung* mit großer Sorgfalt weitergeführt wird.
