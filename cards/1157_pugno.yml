Rang: 1157
Wort: pugno
Wortart: n.m
Wort mit Artikel: il pugno
Femininum / Plural: pugni
IPA: ''
Definition: die Faust, -¨e
Register: ''
Beispielsätze: |-
  Il pugile ha sferrato un *pugno* potente per vincere il match.
  Der Boxer hat einen *Faustschlag* abgegeben, um den Kampf zu gewinnen.
  
  Mio cugino non vuole ammettere di aver dato un *pugno* al compagno di classe.
  Mein Cousin will nicht zugeben, dass er seinem Mitschüler einen *Faustschlag* verpasst hat.
  
  Mi hanno detto che hai dato un *pugno* alla porta per la rabbia, è vero?
  Man hat mir gesagt, dass du aus Wut gegen die Tür *geballt* hast – stimmt das?
  
  Se continui a stringere così forte il volante, rischi di dare un *pugno* al cruscotto!
  Wenn du das Lenkrad so fest umklammerst, könntest du bald gegen das Armaturenbrett *schlagen*!
  
  Il poliziotto ha testimoniato in tribunale di aver visto l’uomo tirare un *pugno* all’aggressore.
  Der Polizist hat vor Gericht ausgesagt, dass er gesehen habe, wie der Mann dem Angreifer einen *Faustschlag* versetzte.
