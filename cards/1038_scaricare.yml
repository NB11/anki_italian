Rang: 1038
Wort: scaricare
Wortart: vt
Wort mit Artikel: scaricare
Femininum / Plural: ''
IPA: ''
Definition: herunterladen, laden
Register: ''
Beispielsätze: |-
  Non *scaricare* mai file da siti poco sicuri per impedire di prendere un virus.
  Lade nie Dateien von unsicheren Websites *herunter*, um zu verhindern, eine Virus zu bekommen.
  
  Ho bisogno che tu *scarichi* immediatamente questo documento importante riferendo al padrone della faccenda.
  Ich brauche, dass du dieses wichtige Dokument *sofort* herunterlädst und es dem Herrn der Angelegenheit mitteilst.
  
  Se non fossi stato così lento, avresti *scaricato* tutti i dati prima dell’arresto del sistema.
  Wärst du nicht so langsam gewesen, hättest du alle Daten vor dem Systemabsturz *heruntergeladen*.
  
  Il tecnico ci ha confermato che sta cercando un modo per *scaricare* i file senza perdere valore.
  Der Techniker hat uns bestätigt, dass er nach einer Möglichkeit sucht, die Dateien ohne *Wertverlust* herunterzuladen.
  
  Non appena avrò finito di *scaricare* questo nuovo software, potremo parlare della prossima carriera.
  Sobald ich das neue Programm *heruntergeladen* habe, können wir über die nächste Karriere sprechen.
