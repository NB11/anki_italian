Rang: 2406
Wort: aumento
Wortart: n.m
Wort mit Artikel: l'aumento
Femininum / Plural: aumenti
IPA: ''
Definition: der Anstieg, -e, die Erhöhung, -en
Register: ''
Beispielsätze: |-
  C'è stato un *aumento* improvviso dei prezzi quest'anno.
  Es gab einen plötzlichen *Anstieg* der Preise dieses Jahr.
  
  Se chiedi un *aumento*, dovresti prepararti a giustificarlo.
  Wenn du eine *Erhöhung* verlangst, solltest du dich darauf vorbereiten, sie zu begründen.
  
  L'*aumento* delle temperature è preoccupante per molti scienziati.
  Die *Erhöhung* der Temperaturen beunruhigt viele Wissenschaftler.
  
  Hanno annunciato un *aumento* dello stipendio dal prossimo mese.
  Sie haben eine *Erhöhung* des Gehalts ab nächster Woche angekündigt.
  
  Nonostante l'*aumento* dei costi, la produzione è rimasta stabile.
  Trotz des *Anstiegs* der Kosten blieb die Produktion stabil.
