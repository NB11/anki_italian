Rang: 2015
Wort: limitare
Wortart: vt
Wort mit Artikel: limitare
Femininum / Plural: ''
IPA: ''
Definition: begrenzen, einschränken, beschränken
Register: ''
Beispielsätze: |-
  Il governo vuole *limitare* l'uso dei social media tra i giovani.
  Die Regierung will die Nutzung sozialer Medien bei Jugendlichen *begrenzen*.
  
  Non volevo *limitare* le tue possibilità, ma solo darti un consiglio.
  Ich wollte deine Möglichkeiten nicht *einschränken*, sondern dir nur einen Rat geben.
  
  Se non avete tempo, possiamo *limitare* la discussione ai punti essenziali.
  Wenn ihr keine Zeit habt, können wir die Diskussion auf die wesentlichen Punkte *beschränken*.
  
  Le nuove norme *limitano* l'accesso ai dati personali dei cittadini.
  Die neuen Vorschriften *begrenzen* den Zugriff auf persönliche Daten der Bürger.
  
  Bisogna *limitare* il consumo di zucchero per mantenere uno stile di vita sano.
  Man sollte den Zuckerkonsum *einschränken*, um einen gesunden Lebensstil zu führen.
