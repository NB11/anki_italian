Rang: 1395
Wort: disturbo
Wortart: n.m
Wort mit Artikel: il disturbo
Femininum / Plural: i disturbi
IPA: ''
Definition: die Störung, die Unterbrechung, das Problem
Register: ''
Beispielsätze: |-
  Se *disturbo* troppo spesso, la gente si arrabbierà con te.
  Wenn du zu oft *störst*, wird sich die Leute über dich ärgern.
  
  Il medico ha diagnosticato un *disturbo* del sonno dopo le mie lune.
  Der Arzt hat eine *Schlafstörung* nach meinen Nächten diagnostiziert.
  
  Nonostante il *disturbo* continuo, lui continuò a lavorare con calma.
  Trotz der anhaltenden *Störung* arbeitete er weiter ruhig.
  
  Credo che questo *disturbo* sia solo temporaneo, ma dovremmo verificare con il tecnico.
  Ich glaube, diese *Störung* ist nur vorübergehend, aber wir sollten es vom Techniker überprüfen lassen.
  
  Se avessi saputo che questo *disturbo* avrebbe causato tanta confusione, forse avrei fatto diversamente.
  Hätte ich gewusst, dass diese *Störung* so viel Verwirrung verursachen würde, hätte ich vielleicht anders gehandelt.
