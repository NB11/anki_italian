Beispielsätze: |-
  Ho dimenticato la *penna* sulla scrivania ieri sera.
  Ich habe den *Stift* gestern Abend auf dem Schreibtisch vergessen.
  
  Che *penna* elegante! È un regalo di compleanno?
  Was für ein eleganter *Stift*! Ist das ein Geburtstagsgeschenk?
  
