  Mein Sohn zeichnet den ganzen Tag mit seinem Lieblings*stift*.
  
  Se vuoi scrivere, prendi una *penna* blu dalla scatola.
  Wenn du schreiben möchtest, nimm einen blauen *Stift* aus der Schachtel.
  
  La *penna* che hai usato per il contratto è firmata dal direttore.
  Der *Stift*, den du für den Vertrag benutzt hast, ist vom Direktor unterschrieben.
