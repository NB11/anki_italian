Rang: 4082
Wort: interruzione
Wortart: n.f
Wort mit Artikel: l'interruzione
Femininum / Plural: interruzioni
IPA: ''
Definition: die Unterbrechung, -en
Register: ''
Beispielsätze: |-
  Durante la *interruzione* della corrente elettrica, abbiamo acceso le candele.
  Während der *Unterbrechung* des Stroms haben wir die Kerzen angezündet.
  
  Nonostante le frequenti *interruzioni*, il progetto è andato avanti.
  Trotz der häufigen *Unterbrechungen* ist das Projekt vorangekommen.
  
  L’*interruzione* improvvisa del discorso ha sorpreso tutti i presenti.
  Die plötzliche *Unterbrechung* der Rede hat alle Anwesenden überrascht.
  
  Penso che ci sarà un’*interruzione* del servizio domani mattina.
  Ich glaube, es wird morgen früh eine *Unterbrechung* des Dienstes geben.
  
  Se non avessimo avuto quell’*interruzione*, forse avremmo finito prima.
  Hätten wir diese *Unterbrechung* nicht gehabt, hätten wir vielleicht früher fertig werden können.
