Rang: 2553
Wort: tradimento
Wortart: n.m
Wort mit Artikel: il tradimento
Femininum / Plural: i tradimenti
IPA: ''
Definition: der Verrat, die Treulosigkeit, der Treuebruch
Register: ''
Beispielsätze: |-
  Non riesco a credere al suo *tradimento*; pensavo fosse una persona fidata.
  Ich kann seinen *Verrat* nicht glauben; ich hielt ihn für eine vertrauenswürdige Person.
  
  La storia del *tradimento* di Marco ha sconvolto tutti i suoi amici.
  Die Geschichte von Marcos *Treubruch* hat alle seine Freunde erschüttert.
  
  Se scoprissi un *tradimento*, preferirei affrontarlo di persona piuttosto che ignorarlo.
  Wenn ich einen *Verrat* entdeckte, würde ich ihn lieber persönlich konfrontieren, als ihn zu ignorieren.
  
  Credeva che il *tradimento* fosse un peccato imperdonabile, ma alla fine perdonò la sua compagna.
  Er glaubte, dass *Verrat* eine unverzeihliche Sünde sei, aber am Ende vergab er seiner Partnerin.
  
  Il *tradimento* dei dati personali da parte dell’azienda ha causato uno scandalo senza precedenti.
  Der *Verrat* der persönlichen Daten durch das Unternehmen hat einen beispiellosen Skandal verursacht.
