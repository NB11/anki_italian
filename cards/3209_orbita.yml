Rang: 3209
Wort: orbita
Wortart: n.f
Wort mit Artikel: l'orbita
Femininum / Plural: orbite
IPA: ''
Definition: die Umlaufbahn, -en
Register: ''
Beispielsätze: |-
  La Stazione Spaziale Internazionale *orbita* intorno alla Terra ogni 90 minuti.
  Die Internationale Raumstation kreist alle 90 Minuten um die Erde.
  
  Gli scienziati studiano le *orbite* di nuovi pianeti scoperti recentemente.
  Wissenschaftler untersuchen die Umlaufbahnen kürzlich entdeckter Planeten.
  
  Se non avessi spento il motore, il satellite avrebbe mantenuto la *sua orbita* per anni.
  Hätte ich den Motor nicht ausgeschaltet, hätte der Satellit seine Umlaufbahn jahrelang beibehalten.
  
  Credi che l’umanità riuscirà a colonizzare *un’orbita* terrestre bassa entro il 2050?
  Glaubst du, dass die Menschheit bis 2050 eine niedrige Erdumlaufbahn besiedeln kann?
  
  Nonostante il guasto, la navicella ha continuato a seguire l’*orbita* prestabilita grazie ai suoi sistemi automatici.
  Trotz des Defekts folgte die Raumkapsel dank ihrer automatischen Systeme weiter der vorgegebenen Umlaufbahn.
