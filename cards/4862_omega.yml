Rang: 4862
Wort: omega
Wortart: n.m
Wort mit Artikel: l'omega
Femininum / Plural: gli omega
IPA: ''
Definition: der Omega-Buchstabe, -n
Register: ''
Beispielsätze: |-
  La lettera *omega* è l'ultima dell'alfabeto greco.
  Der Buchstabe *Omega* ist der letzte des griechischen Alphabets.
  
  Non ho capito il significato simbolico di *omega* in quel contesto.
  Ich habe die symbolische Bedeutung von *Omega* in diesem Zusammenhang nicht verstanden.
  
  Se studi astronomia, incontrerai spesso il simbolo *omega*.
  Wenn du Astronomie studierst, wirst du oft das Symbol *Omega* antreffen.
  
  Ha scritto la parola *omega* in modo che tutti potessero leggere correttamente.
  Er hat das Wort *Omega* so geschrieben, dass es alle richtig lesen konnten.
  
  L'*omega* rappresenta la fine e il principio nella cultura greca antica.
  Das *Omega* steht für Ende und Anfang in der antiken griechischen Kultur.
