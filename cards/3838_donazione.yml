Rang: 3838
Wort: donazione
Wortart: n.f
Wort mit Artikel: la donazione
Femininum / Plural: donazioni
IPA: ''
Definition: die Spende, -n
Register: ''
Beispielsätze: |-
  La *donazione* di sangue è un gesto che salva vite umane ogni giorno.
  Die *Spende* von Blut ist eine Tat, die jeden Tag Menschenleben rettet.
  
  Hanno organizzato una raccolta fondi per finanziare una *donazione* di computer alle scuole locali.
  Sie haben eine Spendenaktion organisiert, um eine *Spende* von Computern an die örtlichen Schulen zu finanzieren.
  
  Se avessi più soldi, farei una *donazione* mensile a questa associazione benefica.
  Wenn ich mehr Geld hätte, würde ich eine monatliche *Spende* an diese Wohlfahrtsorganisation machen.
  
  La legge prevede agevolazioni fiscali per chi effettua una *donazione* a enti riconosciuti.
  Das Gesetz sieht Steuervergünstigungen für diejenigen vor, die eine *Spende* an anerkannte Einrichtungen tätigen.
  
  Nonostante la sua diffidenza, ha accettato la *donazione* di un sconosciuto senza chiedere spiegazioni.
  Trotz ihres Misstrauens nahm sie die *Spende* eines Fremden an, ohne nach Erklärungen zu fragen.
