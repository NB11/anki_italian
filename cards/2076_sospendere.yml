Rang: 2076
Wort: sospendere
Wortart: vt
Wort mit Artikel: sospendere
Femininum / Plural: ''
IPA: ''
Definition: aufhängen, unterbrechen, aussetzen
Register: ''
Beispielsätze: |-
  Il governo ha *sospeso* la legge a causa delle proteste popolari.
  Die Regierung hat das Gesetz *ausgesetzt* wegen der Volksproteste.
  
  Stai per *sospendere* il progetto o pensi di portarlo a termine?
  Wirst du das Projekt *unterbrechen* oder es zu Ende führen?
  
  Non volevo *sospendere* il nostro lavoro, ma purtroppo la luce è andata via.
  Ich wollte unsere Arbeit nicht *aussetzen*, aber leider ist das Licht ausgegangen.
  
  Se *sospendessero* le lezioni, gli studenti non imparerebbero nulla.
  Wenn sie den Unterricht *aussetzten*, würden die Schüler nichts lernen.
  
  Il direttore ha deciso di *sospendere* la trasmissione per problemi tecnici.
  Der Direktor hat beschlossen, die Sendung wegen technischer Probleme *zu unterbrechen*.
