Rang: 4519
Wort: pelliccia
Wortart: n.m
Wort mit Artikel: la pelliccia
Femininum / Plural: pellicce
IPA: ''
Definition: der Pelz, -e
Register: ''
Beispielsätze: |-
  Ho comprato una *pelliccia* di lusso per l'inverno.
  Ich habe einen *Pelz* aus Luxus für den Winter gekauft.
  
  La *pelliccia* del gattino era morbida e calda.
  Das *Fell* des Kätzchens war weich und warm.
  
  Anche se è estate, porto sempre una sciarpa di *pelliccia* finta.
  Obwohl es Sommer ist, trage ich immer ein falsches *Pelz*-Tuch.
  
  Le *pellicce* naturali sono vietate in molti paesi per proteggere gli animali.
  Natürliche *Pelze* sind in vielen Ländern verboten, um Tiere zu schützen.
  
  Nonostante il caldo, mi ha regalato una giacca con il collo in *pelliccia*.
  Trotz der Hitze hat er mir eine Jacke mit einem *Pelz*-Kragen geschenkt.
