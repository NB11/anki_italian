Rang: 4504
Wort: discrezione
Wortart: n.f
Wort mit Artikel: la discrezione
Femininum / Plural: le discrezioni
IPA: ''
Definition: die Diskretion, -en
Register: ''
Beispielsätze: |-
  Per risolvere il problema con *discrezione*, abbiamo parlato a bassa voce in un angolo appartato della stanza.
  Um das Problem mit *Diskretion* zu lösen, haben wir leise in einer abgelegenen Ecke des Raumes gesprochen.
  
  Nonostante la *discrezione* richiesta dal suo ruolo, a volte il direttore deve prendere decisioni impopolari.
  Obwohl die *Diskretion*, die sein Amt verlangt, manchmal muss der Direktor unpopuläre Entscheidungen treffen.
  
  La tua *discrezione* nel non rivelare i nostri piani è stata fondamentale per il successo della sorpresa.
  Deine *Diskretion*, unsere Pläne nicht zu verraten, war entscheidend für den Erfolg der Überraschung.
  
  In politica, si dice spesso che la *discrezione* sia più utile della sincerità.
  In der Politik sagt man oft, dass *Diskretion* nützlicher als Ehrlichkeit ist.
  
  Malgrado avesse sbagliato, lei ha agito con estrema *discrezione* per non compromettere la squadra.
  Obwohl sie einen Fehler gemacht hatte, handelte sie mit äußerster *Diskretion*, um das Team nicht zu gefährden.
