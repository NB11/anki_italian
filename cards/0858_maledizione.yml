Rang: 858
Wort: maledizione
Wortart: n.m
Wort mit Artikel: la maledizione
Femininum / Plural: maledizioni
IPA: ''
Definition: der Fluch, -¨e
Register: ''
Beispielsätze: |-
  La *maledizione* antica aleggia ancora sulla nostra famiglia, infatti tutti ne parlavano sottovoce.
  Der alte *Fluch* schwebt immer noch über unserer Familie, in der Tat redeten alle leise darüber.
  
  Se continui a trasformare tutto in modo così privato, prima o poi ne pagherai le *maledizioni*!
  Wenn du alles so privat *verwandelst*, wirst du irgendwann die Konsequenzen deines Handelns zu spüren bekommen!
  
  Il colonnello urlò: «Questa è una *maledizione* per chiunque osi tradire il suo giuramento!».
  Der Oberst schrie: «Das ist ein *Fluch* für jeden, der seinen Eid verrät!»
  
  Ho trovato una *maledizione* scritta su quel pezzo di giornale, e ora non so cosa fare con questa traccia.
  Ich habe einen *Fluch* auf diesem Zeitungsstück gefunden und weiß jetzt nicht, was ich mit dieser Spur anfangen soll.
  
  Nonostante la *maledizione*, lui continuò a respirare a pieni polmoni, come se fosse immune a ogni male.
  Trotz des *Fluches* atmete er tief ein, als wäre er gegen alles Übel immun.
