Rang: 4577
Wort: biliardo
Wortart: n.m
Wort mit Artikel: il biliardo
Femininum / Plural: i biliardi
IPA: ''
Definition: der Billardtisch, -e
Register: ''
Beispielsätze: |-
  Ieri sera abbiamo giocato a *biliardo* fino a tardi nel locale di mio zio.
  Gestern Abend haben wir bis spät in der *Billardtisch*-Bar bei meinem Onkel gespielt.
  
  Il *biliardo* moderno ha delle regole che non conoscevo affatto.
  Der moderne *Billardtisch* hat Regeln, die ich überhaupt nicht kannte.
  
  Quando ero piccolo, mio nonno mi insegnò a giocare a *biliardo* con maestria.
  Als ich klein war, lehrte mich mein Großvater, wie man *Billardtisch* meisterhaft spielt.
  
  Nel salone c'è un bellissimo *biliardo* antico che risale al secolo scorso.
  Im Salon steht ein wunderschöner *Billardtisch* aus dem vorherigen Jahrhundert.
  
  Dicono che il più grande *biliardo* d'Italia si trovi a Milano, ma non ci sono mai stato.
  Man sagt, der größte *Billardtisch* Italiens stehe in Mailand, aber ich war noch nie dort.
