Rang: 1414
Wort: male
Wortart: n.m
Wort mit Artikel: il male
Femininum / Plural: mali
IPA: ''
Definition: das Übel, die Übel
Register: ''
Beispielsätze: |-
  L’uomo ha combattuto contro *male* per tutta la vita.
  Der Mann hat gegen *das Übel* sein ganzes Leben lang gekämpft.
  
  Spesso *il male* si nasconde dietro una copertura falsa.
  Oft versteckt sich *das Übel* hinter einem falschen Schutz.
  
  Non credere a chi ti dice che *il male* non esiste.
  Glaube nicht, wer dir sagt, dass *das Übel* nicht existiert.
  
  Se *il male* si diffonde, diventa difficile da sconfiggere.
  Wenn *das Übel* sich verbreitet, wird es schwer zu besiegen.
  
  Chi lotta contro *il male* sa che non sarà una vittoria facile.
  Wer gegen *das Übel* kämpft, weiß, dass es kein einfacher Sieg sein wird.
