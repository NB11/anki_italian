Rang: 527
Wort: braccio
Wortart: n.m
Wort mit Artikel: il braccio
Femininum / Plural: bracci
IPA: ''
Definition: der Arm, -e
Register: ''
Beispielsätze: |-
  Mi fa male *il braccio* destro dopo aver giocato a tennis.
  Mir tut *der rechte Arm* weh, nachdem ich Tennis gespielt habe.
  
  Alzate *il braccio* se avete una domanda.
  Heben Sie *den Arm*, wenn Sie eine Frage haben.
  
  Da bambino, mio padre portava me e mio fratello tra *le braccia*.
  Als Kind trug mein Vater mich und meinen Bruder in *den Armen*.
  
  Non riesco a sollevare questo vaso con un solo *braccio*.
  Ich kann diese Vase nicht mit nur einem *Arm* heben.
  
  Se *il braccio* del robot si muoverà troppo velocemente, potrebbe danneggiare qualcosa.
  Wenn sich *der Arm* des Roboters zu schnell bewegt, könnte er etwas beschädigen.
