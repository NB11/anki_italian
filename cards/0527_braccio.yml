Rang: 527
Wort: braccio
Wortart: n.m
Wort mit Artikel: il braccio
Femininum / Plural: bracci
IPA: ''
Definition: der Arm, -e
Register: ''
Beispielsätze: |-
  Dopo aver alzato il *braccio* ho notato un gran dolore al gomito.
  Nachdem ich den *Arm* erhoben hatte, bemerkte ich einen starken Schmerz im Ellenbogen.
  
  Il re teneva il *braccio* destro sullo scettro mentre parlava con il presidente.
  Der *König* hielt seinen Arm auf dem Zepter, während er mit dem Präsidenten sprach.
  
  Ha fatto un gesto veloce con il *braccio* sinistro per indicare la direzione.
  Er machte eine schnelle *Arm*bewegung nach links, um die Richtung anzugeben.
  
  Credo che abbia rotto il *braccio* mentre giocava a pallone, non è vero?
  Ich glaube, er hat sich den *Arm* beim Fußballspielen gebrochen, stimmt das?
  
  Se avessi saputo che il *braccio* di questa sedia è così instabile, non l’avrei comprata.
  Wenn ich gewusst hätte, dass der *Arm* dieses Stuhls so instabil ist, hätte ich ihn nicht gekauft.
