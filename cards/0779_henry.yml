Rang: 779
Wort: henry
Wortart: n.m
Wort mit Artikel: il henry
Femininum / Plural: henry
IPA: ''
Definition: der Nachname Henry
Register: ''
Beispielsätze: |-
  Il signor *Henry* è un professore di storia molto rispettato nella nostra università.
  Der Herr *Henry* ist ein sehr respektierter Geschichtsprofessor an unserer Universität.
  
  Dove hai incontrato il professor *Henry*? Lo conosco solo di fama.
  Wo hast du Professor *Henry* kennengelernt? Ich kenne ihn nur vom Hörensagen.
  
  Se avessi saputo che il dottor *Henry* era in visita, avrei organizzato un incontro.
  Falls ich gewusst hätte, dass Doktor *Henry* zu Besuch ist, hätte ich ein Treffen organisiert.
  
  Non è colpa del signor *Henry* se l’esperimento è fallito; lui ci aveva avvertiti del pericolo.
  Es ist nicht die Schuld von Herrn *Henry*, dass das Experiment fehlgeschlagen ist; er hatte uns vor der Gefahr gewarnt.
  
  All’audizione ci sarà anche il direttore *Henry*, quindi porta con te il documento ufficiale.
  Beim Vortrag wird auch Direktor *Henry* anwesend sein, also bring das offizielle Dokument mit.
