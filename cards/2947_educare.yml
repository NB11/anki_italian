Rang: 2947
Wort: educare
Wortart: vt
Wort mit Artikel: educare
Femininum / Plural: ''
IPA: ''
Definition: erziehen, bilden, ausbilden
Register: ''
Beispielsätze: |-
  I genitori *educano* i figli con amore e pazienza ogni giorno.
  Die Eltern *erziehen* die Kinder mit Liebe und Geduld jeden Tag.
  
  Se *educhi* tuo figlio con fermezza, diventerà una persona responsabile.
  Wenn du deinen Sohn mit *Entschlossenheit erziehst*, wird er zu einem verantwortungsvollen Menschen.
  
  Credo che la scuola dovrebbe *educare* non solo all’istruzione, ma anche ai valori.
  Ich glaube, die Schule sollte nicht nur zur *Bildung*, sondern auch zu Werten erziehen.
  
  Avrei voluto *educare* meglio mio figlio, ma non ho avuto tempo.
  Ich hätte meinen Sohn besser *erziehen* wollen, aber ich hatte keine Zeit.
  
  Non è facile *educare* un cane che è stato maltrattato in passato.
  Es ist nicht einfach, einen Hund *auszubilden*, der in der Vergangenheit misshandelt wurde.
