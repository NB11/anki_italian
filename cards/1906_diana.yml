Rang: 1906
Wort: diana
Wortart: n.f
Wort mit Artikel: la diana
Femininum / Plural: diane
IPA: ''
Definition: die Scheibe, -n, das Ziel, -e
Register: ''
Beispielsätze: |-
  Il bersaglio del tiro con l'arco era la *diana* appesa al muro.
  Das Ziel des Bogenschießens war die *Scheibe*, die an der Wand hing.
  
  Dopo tre colpi, finalmente centrò la *diana* con precisione.
  Nach drei Schüssen traf er endlich die *Scheibe* mit Präzision.
  
  Nonostante la pioggia, la *diana* era ancora ben visibile sul bersaglio.
  Trotz des Regens war die *Scheibe* noch immer gut sichtbar auf dem Ziel.
  
  Chiunque sbagliasse il colpo avrebbe mancato la *diana* posizionata a venti metri di distanza.
  Wer den Schuss verfehlte, würde die *Scheibe* verfehlen, die zwanzig Meter entfernt stand.
  
  La *diana* era decorata con colori vivaci per attirare l'attenzione dei partecipanti.
  Die *Scheibe* war mit lebendigen Farben verziert, um die Aufmerksamkeit der Teilnehmer zu wecken.
