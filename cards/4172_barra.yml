Rang: 4172
Wort: barra
Wortart: n.f
Wort mit Artikel: la barra
Femininum / Plural: barre
IPA: ''
Definition: die Stange, -n, die Leiste, -n
Register: ''
Beispielsätze: |-
  Dopo l'incidente hanno installato una *barra* di sicurezza nel tunnel.
  Nach dem Unfall haben sie eine *Stange* der Sicherheit in dem Tunnel installiert.
  
  La *barra* del menu permette di accedere rapidamente alle funzioni principali.
  Die *Leiste* des Menüs ermöglicht den schnellen Zugriff auf die Hauptfunktionen.
  
  Non toccare quella *barra* metallica: scotta!
  Berühre nicht diese *Stange* aus Metall: Sie ist heiß!
  
  Hanno sostituito la vecchia *barra* della porta con una nuova in legno massiccio.
  Sie haben die alte *Leiste* der Tür durch eine neue aus massivem Holz ersetzt.
  
  La *barra* luminosa sul cruscotto si accende solo in caso di emergenza.
  Die *Leiste* auf dem Armaturenbrett leuchtet nur im Notfall auf.
