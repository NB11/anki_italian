Rang: 1366
Wort: esagerare
Wortart: v
Wort mit Artikel: esagerare
Femininum / Plural: ''
IPA: ''
Definition: übertreiben, aufbauschen
Register: ''
Beispielsätze: |-
  Se vuoi ottenere un effetto *esagerato*, non puoi ignorare l'importanza della luce in questa fotografia.
  Wenn du eine *übertriebene* Wirkung erzielen willst, kannst du das Licht in diesem Foto nicht ignorieren.
  
  L'ispettore ha insistito perché il testimone non *esagerasse* i dettagli della lotta tra i due uomini.
  Der Inspektor bestand darauf, dass der Zeuge die Details des *Kampfes* zwischen den beiden Männern nicht aufbauschte.
  
  Secondo me, hai *esagerato* con il vino: sono sicuro che verrà la nausea!
  Meiner Meinung nach hast du mit dem Wein clearly *übertrieben* – ich bin sicher, dir wird übel werden!
  
  Il killer non vuole *esagerare* con la violenza, altrimenti attirerà l'attenzione della polizia civile.
  Der Killer will mit der Gewalt nicht *zu weit gehen*, sonst zieht er die Aufmerksamkeit der zivilen Polizei auf sich.
  
  Dovevi *esagerare* un po' le tue doti di talento per impressionare il direttore dell'albergo, ma non troppo!
  Du hättest deine *Talente* ein bisschen übertreiben müssen, um den Hotelmanager zu beeindrucken – aber nicht zu sehr!
