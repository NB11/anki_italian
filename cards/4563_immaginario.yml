Rang: 4563
Wort: immaginario
Wortart: adj
Wort mit Artikel: immaginario
Femininum / Plural: ''
IPA: ''
Definition: eingebildet, imaginär, fiktiv
Register: ''
Beispielsätze: |-
  La storia che hai raccontato sembra *immaginaria* ma forse è vera.
  Die Geschichte, die du erzählt hast, scheint *eingebildet* zu sein, aber vielleicht ist sie wahr.
  
  Credi davvero che esistano creature *immaginarie* come i draghi?
  Glaubst du wirklich, dass es *fiktive* Wesen wie Drachen gibt?
  
  Lui vive in un mondo *immaginario* fatto di sogni e fantasia.
  Er lebt in einer *imaginären* Welt aus Träumen und Fantasie.
  
  Non è un problema *immaginario*: la siccità sta davvero peggiorando.
  Es ist kein *eingebildetes* Problem: die Dürre verschlimmert sich wirklich.
  
  Le sue paure *immaginarie* spesso lo bloccano nella vita reale.
  Seine *fiktiven* Ängste halten ihn oft im realen Leben auf.
