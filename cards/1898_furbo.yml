Rang: 1898
Wort: furbo
Wortart: adj
Wort mit Artikel: furbo
Femininum / Plural: ''
IPA: ''
Definition: schlau, raffiniert, durchtrieben
Register: ''
Beispielsätze: |-
  Non è *furbo* mentire solo per evitare un problema.
  Es ist nicht *klug*, nur um ein Problem zu vermeiden zu lügen.
  
  Secondo me, è stato *furbo* a non dire nulla al capo.
  Ich denke, es war *schlau* von ihm, dem Chef nichts zu sagen.
  
  Se fossi *furbo*, avresti già accettato l’offerta!
  Wärst du *schlau*, hättest du das Angebot längst angenommen!
  
  Abbiamo bisogno di qualcuno che sia abbastanza *furbo* per risolvere questa situazione.
  Wir brauchen jemanden, der *klug* genug ist, um diese Situation zu lösen.
  
  Quel bambino è così *furbo* che convince tutti a fare ciò che vuole.
  Dieses Kind ist so *raffiniert*, dass es jeden dazu bringt, zu tun, was es will.
