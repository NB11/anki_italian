Rang: 1248
Wort: incastrare
Wortart: vt
Wort mit Artikel: incastrare
Femininum / Plural: ''
IPA: ''
Definition: feststecken, einklemmen
Register: ''
Beispielsätze: |-
  Il meccanico *incastra* una chiave inglese tra le due parti del motore per bloccarle.
  Der Mechaniker *klemmt* einen Schraubenschlüssel zwischen die beiden Teile des Motors, um sie zu blockieren.
  
  Non *incastrare* mai il piede nel finestrino della macchina in movimento!
  *Klemme* niemals den Fuß im Fenster des fahrenden Autos ein!
  
  Se *incastrassi* il cassetto, dovresti usare un martello per liberarlo.
  Wenn du die Schublade *festklemmst*, müsstest du einen Hammer benutzen, um sie zu befreien.
  
  Il ladro ha *incastrato* il portiere con un secchio d’acqua per poter scappare.
  Der Dieb hat den Portier mit einem Eimer Wasser *festgenagelt*, um fliehen zu können.
  
  Non appena avrò *incastrato* questa vite, potremo continuare il lavoro.
  Sobald ich diese Schraube *festgezogen* habe, können wir mit der Arbeit weitermachen.
