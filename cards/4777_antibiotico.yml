Rang: 4777
Wort: antibiotico
Wortart: n.m
Wort mit Artikel: l'antibiotico
Femininum / Plural: gli antibiotici
IPA: ''
Definition: das Antibiotikum, Antibiotika
Register: ''
Beispielsätze: |-
  Il medico mi ha prescritto *l’antibiotico* perché ho un’infezione batterica.
  Der Arzt hat mir *das Antibiotikum* verschrieben, weil ich eine bakterielle Infektion habe.
  
  Se prendi *gli antibiotici* senza prescrizione, rischi effetti collaterali gravi.
  Wenn du *Antibiotika* ohne Rezept einnimmst, riskierst du schwere Nebenwirkungen.
  
  Mia nonna assumeva *l’antibiotico* solo in casi davvero estremi, mai per un semplice raffreddore.
  Meine Oma nahm *das Antibiotikum* nur in wirklich extremen Fällen ein, nie bei einer einfachen Erkältung.
  
  L’ospedale ha esaurito le scorte di *l’antibiotico* necessario per l’operazione.
  Das Krankenhaus hat den Vorrat an *dem Antibiotikum*, das für die Operation nötig ist, aufgebraucht.
  
  Credi davvero che *l’antibiotico* sia l’unica soluzione per la tua sinusite, o ci sono altre terapie efficaci?
  Glaubst du wirklich, dass *das Antibiotikum* die einzige Lösung für deine Nebenhöhlenentzündung ist, oder gibt es andere wirksame Therapien?
