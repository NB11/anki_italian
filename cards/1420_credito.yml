Rang: 1420
Wort: credito
Wortart: n.m
Wort mit Artikel: il credito
Femininum / Plural: i crediti
IPA: ''
Definition: der Kredit, -e
Register: ''
Beispielsätze: |-
  Alla banca ho chiesto un *credito* per comprare la casa.
  Bei der *Bank* habe ich einen Kredit für den Hauskauf beantragt.
  
  Il sindaco ha assunto il *credito* della vittoria al referendum.
  Der *Bürgermeister* hat sich den Verdienst am Referendumsergebnis angeeignet.
  
  Avendo perso il lavoro, non può più pagare il *credito*.
  Da er die Arbeit verloren hat, kann er den *Kredit* nicht mehr zurückzahlen.
  
  Nonostante il *credito* fosse alto, ha deciso di acquistare la nuova macchina.
  Trotz des hohen *Kredits* hat er sich dafür entschieden, das neue Auto zu kaufen.
  
  Se volessimo finanziare il viaggio, avremmo bisogno di un *credito* aggiuntivo.
  Wenn wir die Reise finanzieren wollten, bräuchten wir einen weiteren *Kredit*.
