Rang: 1293
Wort: lassù
Wortart: adv
Wort mit Artikel: lassù
Femininum / Plural: ''
IPA: ''
Definition: dort oben, da oben
Register: ''
Beispielsätze: |-
  Non vedo nulla *lassù*, è troppo buio per distinguere i dettagli.
  Ich sehe nichts *da oben*, es ist zu dunkel, um Details zu erkennen.
  
  Se vuoi un premio un giorno, *lassù* ci sono ancora più possibilità che qui.
  Wenn du eines Tages einen *Preis* gewinnen willst, gibt es dort oben noch mehr Chancen als hier.
  
  Non appena il motore si ferma, *lassù* non c’è più nessuno che possa aiutarti.
  Sobald der *Motor* stehen bleibt, gibt es dort oben niemanden mehr, der dir helfen kann.
  
  Ha giurato di non andare mai *lassù* perché aveva paura delle creature che abitano quelle montagne.
  Er hat geschworen, niemals *dorthin oben* zu gehen, weil er Angst vor den Wesen hatte, die in diesen Bergen leben.
  
  Mi hanno detto che *lassù* la vista è così bella da togliere il respiro, ma io preferisco la pianura.
  Man hat mir gesagt, dass die Aussicht *dort oben* so schön ist, dass einem die Luft wegbleibt, aber ich ziehe die Ebene vor.
