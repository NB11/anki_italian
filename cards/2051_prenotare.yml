Beispielsätze: |-
  Ho bisogno di *prenotare* un tavolo per due persone al ristorante questa sera.
  Ich muss heute Abend einen Tisch für zwei Personen *reservieren*.
  
  Se non *prenoti* con anticipo, non troverai più posti liberi al concerto.
  Wenn du nicht frühzeitig *reservierst*, findest du keine freien Plätze mehr beim Konzert.
  
  Stavo per *prenotare* una camera in un albergo economico, ma poi ho cambiato idea.
  Ich wollte gerade ein Zimmer in einem günstigen Hotel *reservieren*, aber dann habe ich meine Meinung geändert.
  
  Nonostante fosse molto occupato, è riuscito a *prenotare* un appuntamento dal medico entro due settimane.
  Trotz seiner vielen Termine gelang es ihm, einen Arzttermin innerhalb von zwei Wochen zu *reservieren*.
  
  Gli scienziati devono *prenotare* una sala per presentare i risultati della loro ricerca alla conferenza.
  Die Wissenschaftler müssen einen Saal *reservieren*, um die Ergebnisse ihrer Forschung auf der Konferenz vorzutragen.
