Rang: 1607
Wort: ostaggio
Wortart: n.m
Wort mit Artikel: il ostaggio
Femininum / Plural: ostaggi
IPA: ''
Definition: der Geisel, -n
Register: ''
Beispielsätze: |-
  Il sequestratore ha liberato *ostaggio* dopo lunghe trattative.
  Der Entführer hat die *Geisel* nach langen Verhandlungen freigelassen.
  
  Nonostante il pericolo, nessuno ha voluto *ostaggio* a rischio della propria vita.
  Trotz der Gefahr wollte niemand die *Geisel* auf Kosten des eigenen Lebens riskieren.
  
  Se avessimo saputo che era un poliziotto sotto copertura, non avremmo *ostaggio* trattato così male.
  Wenn wir gewusst hätten, dass es ein Polizist unter Tarnung war, hätten wir die *Geisel* nicht so schlecht behandelt.
  
  I negoziatori sperano che i banditi rilascino *ostaggio* entro domani mattina.
  Die Verhandlungsführer hoffen, dass die Banditen die *Geisel* bis morgen früh freilassen.
  
  Il governo ha condannato fermamente il rapimento di *ostaggio* in territorio straniero.
  Die Regierung hat die Entführung der *Geisel* auf fremdem Boden scharf verurteilt.
