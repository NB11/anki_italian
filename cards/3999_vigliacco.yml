Rang: 3999
Wort: vigliacco
Wortart: adj
Wort mit Artikel: vigliacco
Femininum / Plural: ''
IPA: ''
Definition: feige, hinterhältig
Register: ''
Beispielsätze: |-
  È stato *vigliacco* tradire un amico durante un momento di difficoltà.
  Es war *feige*, einen Freund in einem schwierigen Moment zu verraten.
  
  Se fossi in te, non mi comporterei da *vigliacco* con chi ti ha aiutato.
  Wenn ich du wäre, würde ich mich nicht *hinterhältig* gegenüber jemandem verhalten, der dir geholfen hat.
  
  Il suo atteggiamento *vigliacco* ha spinto gli altri a ribellarsi contro di lui.
  Seine *feige* Haltung hat die anderen dazu gebracht, sich gegen ihn aufzulehnen.
  
  Nonostante le apparenze, non tutti sono *vigliacchi*: alcuni preferiscono agire con coraggio.
  Trotz aller Anzeichen sind nicht alle *hinterhältig*: Manche handeln lieber mutig.
  
  Avrei voluto che non si fosse mostrato così *vigliacco* al momento della verità.
  Ich hätte mir gewünscht, dass er sich in dem entscheidenden Moment nicht so *feige* gezeigt hätte.
