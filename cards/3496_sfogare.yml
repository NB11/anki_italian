Rang: 3496
Wort: sfogare
Wortart: v
Wort mit Artikel: sfogare
Femininum / Plural: ''
IPA: ''
Definition: sich abreagieren, Luft machen
Register: ''
Beispielsätze: |-
  Dopo la lunga giornata di lavoro, mi piace *sfogarmi* correndo nel parco.
  Nach dem langen Arbeitstag gefällt es mir, mich beim Laufen im Park *abzureagieren*.
  
  Quando si sente arrabbiato, il protagonista del film si isola per *sfogarsi*.
  Wenn er wütend ist, zieht sich die Hauptfigur des Films zurück, um sich *Luft zu machen*.
  
  Se avessi un problema, preferiresti *sfogarti* con un amico o scrivere un diario?
  Wenn du ein Problem hättest, würdest du dich lieber bei einem Freund *abreagieren* oder ein Tagebuch schreiben?
  
  Gli ho detto che era meglio *sfogarsi* ora che rimpiangere tutto più tardi.
  Ich habe ihm gesagt, dass es besser ist, sich jetzt *Luft zu machen*, als später alles zu bereuen.
  
  Si mise a urlare per *sfogare* la frustrazione che aveva accumulato negli anni.
  Er begann zu schreien, um die Frustration *abzureagieren*, die er über Jahre angesammelt hatte.
