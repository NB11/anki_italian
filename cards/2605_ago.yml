Beispielsätze: |-
  Tre anni *fa* ho cambiato casa a Milano.
  Vor drei Jahren habe ich das Haus in Mailand gewechselt.
  
  Non vedo il mio migliore amico dal mese *scorso*, cioè da quattro settimane fa.
  Ich sehe meinen besten Freund seit dem letzten Monat, also seit vor vier Wochen, nicht.
  
  È da secoli che non mangiavo il tuo tiramisù, ma lo ricordo ancora come se fosse ieri *fa*!
  Seit Ewigkeiten habe ich dein Tiramisu nicht mehr gegessen, aber ich erinnere mich noch daran, als wäre es erst *gestern* gewesen!
  
  Il negozio chiudeva alle sedici, ma arrivai con dieci minuti di ritardo, cioè due minuti dopo le sedici *fa*.
  Der Laden schloss um sechzehn Uhr, aber ich kam mit zehn Minuten Verspätung an, also zwei Minuten nach *sechzehn Uhr*.
  
  Lo scorso *settembre* ho incontrato tua sorella, ma l'avevo già vista un'estate fa in piscina.
  Letzten September habe ich deine Schwester getroffen, aber ich hatte sie bereits einen Sommer *vorher* im Schwimmbad gesehen.
