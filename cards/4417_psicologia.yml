Rang: 4417
Wort: psicologia
Wortart: n.f
Wort mit Artikel: la psicologia
Femininum / Plural: psicologie
IPA: ''
Definition: die Psychologie, -n
Register: ''
Beispielsätze: |-
  La *psicologia* moderna studia i meccanismi della mente umana in modo molto dettagliato.
  Die moderne *Psychologie* untersucht die Mechanismen des menschlichen Geistes sehr detailliert.
  
  Nonostante abbia studiato *psicologia* per anni, ancora non capisco perché reagisci così.
  Obwohl ich seit Jahren *Psychologie* studiere, verstehe ich immer noch nicht, warum du so reagierst.
  
  Se avessi seguito un corso di *psicologia*, forse avresti compreso meglio le sue motivazioni.
  Wenn du einen Kurs in *Psychologie* besucht hättest, hättest du seine Beweggründe vielleicht besser verstanden.
  
  La *psicologia* sociale analizza come il comportamento individuale sia influenzato dal gruppo di appartenenza.
  Die soziale *Psychologie* analysiert, wie das individuelle Verhalten von der Zugehörigkeitsgruppe beeinflusst wird.
  
  Hanno arruolato uno psicologo per valutare l’impatto della *psicologia* positiva sul benessere dei dipendenti.
  Sie haben einen Psychologen eingestellt, um die Auswirkungen der positiven *Psychologie* auf das Wohlbefinden der Mitarbeiter zu bewerten.
