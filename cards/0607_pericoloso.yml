Rang: 607
Wort: pericoloso
Wortart: adj
Wort mit Artikel: pericoloso
Femininum / Plural: ''
IPA: ''
Definition: gefährlich
Register: ''
Beispielsätze: |-
  Quel quartiere alla *pericolosa* notte, quindi evitiamolo dopo il tramonto.
  Das Viertel ist nachts *gefährlich*, also meiden wir es nach Einbruch der Dunkelheit.
  
  Se non rispetti le regole di sicurezza, può risultare molto *pericoloso*!
  Wenn du die Sicherheits*regeln* nicht einhältst, kann das sehr gefährlich werden!
  
  Secondo la ricerca, guidare ubriachi è un’abitudine *pericolosa* che va assolutamente sradicata.
  Laut der *Forschung* ist Trunkenheit am Steuer eine gefährliche Gewohnheit, die unbedingt abgeschafft werden muss.
  
  È incredibile quanto possa essere *pericoloso* l’oceano se non si conoscono le correnti.
  Es ist *unglaublich*, wie gefährlich der Ozean sein kann, wenn man die Strömungen nicht kennt.
  
  Il soldato ha rischiato la vita per liberare la città da un regime *pericoloso* che opprimeva la popolazione da anni.
  Der Soldat hat sein Leben riskiert, um die Stadt von einem *gefährlichen* Regime zu befreien, das die Bevölkerung jahrelang unterdrückt hatte.
