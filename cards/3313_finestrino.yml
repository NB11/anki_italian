Rang: 3313
Wort: finestrino
Wortart: n.m
Wort mit Artikel: il finestrino
Femininum / Plural: finestrini
IPA: ''
Definition: das Seitenfenster, -
Register: ''
Beispielsätze: |-
  Durante il *finestrino* dell’aereo si vedeva solo nuvole grigie.
  Durch das *Seitenfenster* des Flugzeugs sah man nur graue Wolken.
  
  Il meccanico ha aperto il *finestrino* per controllare il livello dell’olio.
  Der Mechaniker hat das *Seitenfenster* geöffnet, um den Ölstand zu prüfen.
  
  Mi affacciai al *finestrino* per salutare i miei genitori che partivano per il campeggio.
  Ich lehnte mich aus dem *Seitenfenster*, um meinen Eltern zuzuwinken, die zum Campingplatz fuhren.
  
  Senza abbassare il *finestrino*, l’autista mi ha dato informazioni sulla strada sbagliata.
  Ohne das *Seitenfenster* herunterzulassen, hat mir der Fahrer falsche Informationen über die Straße gegeben.
  
  Se avesse chiuso il *finestrino*, il gatto non sarebbe scappato dalla scatola durante il viaggio.
  Wenn er das *Seitenfenster* geschlossen hätte, wäre die Katze nicht aus der Kiste während der Fahrt entkommen.
