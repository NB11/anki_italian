Rang: 3200
Wort: arruolare
Wortart: vt
Wort mit Artikel: arruolare
Femininum / Plural: ''
IPA: ''
Definition: rekrutieren, anwerben
Register: ''
Beispielsätze: |-
  Il generale decise di *arruolare* giovani soldati per la nuova campagna militare.
  Der General beschloss, junge Soldaten für die neue Militärkampagne zu *rekrutieren*.
  
  Se vuoi lavorare qui, dovrai prima *arruolarti* nel nostro progetto.
  Wenn du hier arbeiten möchtest, musst du dich erst in unser Projekt *einreihen*.
  
  L'esercito ha *arruolato* più di mille volontari lo scorso anno.
  Die Armee hat im vergangenen Jahr über tausend Freiwillige *angeworben*.
  
  Non tutti possono essere *arruolati*: è necessario superare dei test fisici.
  Nicht alle können *rekrutiert* werden: Man muss körperliche Tests bestehen.
  
  L'ambasciata sta cercando di *arruolare* esperti locali per migliorare la sicurezza nella regione.
  Die Botschaft versucht, lokale Experten zu *rekrutieren*, um die Sicherheit in der Region zu verbessern.
