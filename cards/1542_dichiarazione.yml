Rang: 1542
Wort: dichiarazione
Wortart: n.f
Wort mit Artikel: la dichiarazione
Femininum / Plural: dichiarazioni
IPA: ''
Definition: die Erklärung, -en
Register: ''
Beispielsätze: |-
  La *dichiarazione* dei redditi deve essere presentata entro aprile.
  Die *Steuererklärung* muss bis April eingereicht werden.
  
  Hanno fatto una *dichiarazione* pubblica sulla situazione politica.
  Sie haben eine öffentliche *Äußerung* zur politischen Lage gemacht.
  
  La polizia ha ricevuto una *dichiarazione* scritta dal testimone.
  Die Polizei hat eine schriftliche *Aussage* vom Zeugen erhalten.
  
  Dopo l’incidente, la sua *dichiarazione* è stata molto dettagliata.
  Nach dem Unfall war seine *Aussage* sehr detailliert.
  
  La *dichiarazione* di guerra fu letta alla radio alle 18:00.
  Die *Kriegserklärung* wurde um 18 Uhr im Radio verlesen.
