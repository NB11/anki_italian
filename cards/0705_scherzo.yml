Rang: 705
Wort: scherzo
Wortart: n.m
Wort mit Artikel: lo scherzo
Femininum / Plural: scherzi
IPA: ''
Definition: der Scherz, -e
Register: ''
Beispielsätze: |-
  Non fare uno *scherzo* così pesante al tuo migliore amico!
  Mach keinen so schweren *Scherz* an deinem besten Freund!
  
  Ha fatto uno *scherzo* a tutti durante la festa, ma nessuno si è arrabbiato.
  Er hat während der Party einen *Scherz* mit allen gemacht, aber niemand hat sich geärgert.
  
  Stavo leggendo un libro quando improvvisamente mi è venuto in mente un *scherzo* da fare a mio fratello.
  Ich las gerade ein Buch, als mir plötzlich ein *Scherz* einfiel, den ich meinem Bruder machen könnte.
  
  Se vuoi *scherzare*, dovresti almeno rispettare il prossimo! Hai detto una cosa che ha ferito i suoi sentimenti.
  Wenn du *scherzen* willst, solltest du wenigstens den Nächsten respektieren! Du hast etwas gesagt, das seine Gefühle verletzt hat.
