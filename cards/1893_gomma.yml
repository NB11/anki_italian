Rang: 1893
Wort: gomma
Wortart: n.m
Wort mit Artikel: la gomma
Femininum / Plural: gomme
IPA: ''
Definition: der Radiergummi, -s
Register: ''
Beispielsätze: |-
  Ho dimenticato la *gomma* a casa e non ho potuto correggere l'errore nel compito.
  Ich habe den *Radiergummi* zu Hause vergessen und konnte den Fehler in der Aufgabe nicht korrigieren.
  
  Quando hai perso la *gomma* nuova che ti avevo regalato per il compleanno?
  Wann hast du den neuen *Radiergummi* verloren, den ich dir zum Geburtstag geschenkt hatte?
  
  Non riesco a trovare la *gomma* adatta per cancellare l'inchiostro: ne ho provate tre diverse!
  Ich finde den passenden *Radiergummi* zum Ausradieren der Tinte nicht – ich habe schon drei verschiedene ausprobiert!
  
  Dicono che le *gomme* giapponesi siano le più efficaci, ma costano molto di più delle altre.
  Man sagt, dass japanische *Radiergummis* die effektivsten sind, sie kosten aber viel mehr als die anderen.
  
  Se vuoi cancellare questa parola, usa almeno due *gomme* di seguito: una per l'inchiostro e una per la matita.
  Wenn du dieses Wort löschen willst, nimm mindestens zwei *Radiergummis* hintereinander: einen für Tinte und einen für Bleistift.
