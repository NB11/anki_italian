Rang: 1596
Wort: lago
Wortart: n.m
Wort mit Artikel: il lago
Femininum / Plural: laghi
IPA: ''
Definition: der See, -e
Register: ''
Beispielsätze: |-
  Abbiamo visitato il *lago* stamattina.
  Wir haben den *See* heute Morgen besucht.
  
  Mi ha detto che ama il *lago* nelle Alpi poiché è noto per la sua acqua cristallina.
  Er hat mir gesagt, dass er den *See* in den Alpen liebt.
  
  Nonostante il tempo fosse brutto, sono andato a passeggiare al *lago*.
  Obwohl das Wetter schlecht war, bin ich am *See* spazieren gegangen.
  
  Hai mai visto un *lago* così silenzioso da essere affascinante?
  Hast du schon jemals einen *See* gesehen, der so still ist?
  
  I bambini erano pieni di gioia quando arrivarono al *lago* per nuotare.
  Die Kinder freuten sich, als sie zum *See* fuhren, weil sie dort baden wollten.
