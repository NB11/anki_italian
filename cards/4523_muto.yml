Rang: 4523
Wort: muto
Wortart: adj
Wort mit Artikel: muto
Femininum / Plural: ''
IPA: ''
Definition: stumm, schweigend, schweigsam
Register: ''
Beispielsätze: |-
  Il bambino rimase *muto* di fronte alla scena spaventosa che si svolgeva davanti ai suoi occhi.
  Das Kind blieb *stumm* angesichts der schrecklichen Szene, die sich vor seinen Augen abspielte.
  
  Nonostante le domande insistenti, rimase *muto* come un pesce.
  Trotz der beharrlichen Fragen blieb er *stumm* wie ein Fisch.
  
  È *muta* da quando ha ricevuto quella notizia sconvolgente.
  Sie ist *schweigend*, seit sie diese schockierende Nachricht erhalten hat.
  
  I testimoni rimasero *muti* di fronte all'evidenza dei fatti.
  Die Zeugen blieben *stumm* angesichts der offensichtlichen Fakten.
  
  Anche se avrebbe voluto parlare, la paura la rese *muta*.
  Obwohl sie hätte sprechen wollen, machte die Angst sie *sprachlos*.
