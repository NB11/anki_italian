Rang: 3235
Wort: misurare
Wortart: vt
Wort mit Artikel: misurare
Femininum / Plural: ''
IPA: ''
Definition: messen
Register: ''
Beispielsätze: |-
  Oggi dobbiamo *misurare* la stanza per sapere quanti metri quadrati sono.
  Heute müssen wir das *Zimmer* ausmessen, um zu wissen, wie viele Quadratmeter es sind.
  
  Se non hai il metro, puoi *misurare* la distanza con il passo.
  Wenn du kein Maßband hast, kannst du die *Entfernung* mit dem Schritt ausmessen.
  
  Il medico gli ha detto di *misurare* la pressione ogni mattina.
  Der Arzt hat ihm gesagt, er soll den *Blutdruck* jeden Morgen messen.
  
  Non so *misurare* la temperatura dell’acqua con le mani, ci vuole un termometro.
  Ich kann die *Temperatur* des Wassers nicht mit den Händen messen, dazu braucht man ein Thermometer.
  
  Hanno *misurato* la profondità del lago e hanno scoperto che è più profondo del previsto.
  Sie haben die *Tiefe* des Sees ausgemessen und festgestellt, dass er tiefer ist als erwartet.
