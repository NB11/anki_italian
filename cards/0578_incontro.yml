Rang: 578
Wort: incontro
Wortart: n.m
Wort mit Artikel: l'incontro
Femininum / Plural: incontri
IPA: ''
Definition: das Treffen, die Begegnung, -e
Register: ''
Beispielsätze: |-
  L'*incontro* con Maria è stato molto piacevole ieri sera.
  Das *Treffen* mit Maria war gestern Abend sehr angenehm.
  
  Non vedo l'ora del nostro prossimo *incontro* al parco.
  Ich freue mich schon auf unser nächstes *Treffen* im Park.
  
  Se avessi saputo del suo *incontro* con il direttore, ti avrei avvisato prima.
  Wenn ich von seinem *Treffen* mit dem Direktor gewusst hätte, hätte ich dich früher benachrichtigt.
  
  L'*incontro* tra i due politici ha risolto finalmente la questione riguardo alle tasse.
  Die *Begegnung* zwischen den beiden Politikern hat schließlich die Angelegenheit betreffend die Steuern geklärt.
  
  È incredibile come ogni *incontro* con lui finisca sempre in un guaio.
  Es ist unglaublich, wie jedes *Treffen* mit ihm am Ende immer in einem Problem endet.
