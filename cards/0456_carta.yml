Rang: 456
Wort: carta
Wortart: n.f
Wort mit Artikel: la carta
Femininum / Plural: carte
IPA: ''
Definition: das Papier, -e; die Karte, -n
Register: ''
Beispielsätze: |-
  Ho bisogno di una *carta* per scrivere una lettera.
  Ich brauche ein *Blatt Papier*, um einen Brief zu schreiben.
  
  La *carta* geografica mostra le montagne della regione.
  Die *Landkarte* zeigt die Berge der Region.
  
  Quale *carta* preferisci per l’invito, quella bianca o quella colorata?
  Welches *Papier* bevorzugst du für die Einladung, das weiße oder das bunte?
  
  Le *carte* da gioco sono sul tavolo, mischiale per favore!
  Die *Spielkarten* liegen auf dem Tisch, misch sie bitte!
  
  Spero che la *carta* d’identità sia ancora valida.
  Ich hoffe, dass der *Personalausweis* noch gültig ist.
