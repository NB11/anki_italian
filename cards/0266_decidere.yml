Rang: 266
Wort: decidere
Wortart: v
Wort mit Artikel: decidere
Femininum / Plural: ''
IPA: ''
Definition: entscheiden, beschließen
Register: ''
Beispielsätze: |-
  Non ho ancora *deciso* dove andare in vacanza.
  Ich habe noch nicht *entschieden*, wohin ich in den Urlaub fahren werde.
  
  Lei *decise* di studiare medicina all'ultimo momento.
  Sie *entschied* sich im letzten Moment, Medizin zu studieren.
  
  Se potessi, *deciderei* di trasferirmi in Italia.
  Wenn ich könnte, *würde* ich mich entscheiden, nach Italien auszuwandern.
  
  *Decidi* tu dove cenare stasera!
  *Entscheid* du, wo wir heute Abend essen gehen!
  
  Spero che tu *decida* di venire con noi.
  Ich hoffe, dass du dich *entscheidest*, mit uns zu kommen.
