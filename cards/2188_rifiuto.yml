Rang: 2188
Wort: rifiuto
Wortart: n.m
Wort mit Artikel: il rifiuto
Femininum / Plural: i rifiuti
IPA: ''
Definition: die Ablehnung, -en; die Weigerung, -en
Register: ''
Beispielsätze: |-
  Il consiglio comunale ha approvato una legge contro lo smaltimento illegale dei *rifiuti* tossici.
  Der Stadtrat hat ein Gesetz gegen die illegale *Entsorgung* von Giftabfällen beschlossen.
  
  Non posso accettare questo regalo: sarebbe un *rifiuto* della sua gentilezza.
  Ich kann dieses Geschenk nicht annehmen: Es wäre eine *Ablehnung* seiner Freundlichkeit.
  
  Quella famiglia ha sempre *rifiutato* di separarsi, nonostante le difficoltà finanziarie.
  Diese Familie hat sich immer geweigert, sich zu *trennen*, trotz finanzieller Schwierigkeiten.
  
  Nel *rifiuto* di firmare il contratto, lui ha visto un segno di debolezza.
  In der *Weigerung*, den Vertrag zu unterschreiben, sah er ein Zeichen von Schwäche.
  
  Se avessi saputo che era urgente, non avrei fatto *rifiuto* di aiutarti.
  Wenn ich gewusst hätte, dass es dringend war, hätte ich deine Bitte nicht ab*gelehnt*.
