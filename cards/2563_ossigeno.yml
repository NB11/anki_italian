Rang: 2563
Wort: ossigeno
Wortart: n.m
Wort mit Artikel: l'ossigeno
Femininum / Plural: ossigeni
IPA: ''
Definition: der Sauerstoff, -e
Register: ''
Beispielsätze: |-
  L'*ossigeno* è essenziale per la respirazione degli esseri viventi.
  Der *Sauerstoff* ist essenziell für die Atmung lebender Wesen.
  
  Ho bisogno di *ossigeno* perché la stanza è piccola e poco ventilata.
  Ich brauche *Sauerstoff*, weil der Raum klein und schlecht belüftet ist.
  
  Gli scienziati stanno studiando come produrre *ossigeno* su Marte.
  Die Wissenschaftler erforschen, wie man *Sauerstoff* auf dem Mars herstellen kann.
  
  Durante l’escursione in montagna abbiamo portato bombole di *ossigeno* per sicurezza.
  Während der Bergwanderung haben wir Sauerstoffflaschen zur Sicherheit mitgenommen.
  
  Se non ci fosse *ossigeno* sulla Terra, la vita come la conosciamo non esisterebbe.
  Wenn es auf der Erde keinen *Sauerstoff* gäbe, würde das Leben, wie wir es kennen, nicht existieren.
