Rang: 4507
Wort: congratularsi
Wortart: vr
Wort mit Artikel: congratularsi
Femininum / Plural: ''
IPA: ''
Definition: sich beglückwünschen
Register: ''
Beispielsätze: |-
  Mi *congratulo* con te per il tuo successo ottenuto ieri!
  Ich *beglückwünsche* dich zu deinem gestrigen Erfolg!
  
  Nonostante la sconfitta, non ci *congratuliamo* con loro per aver partecipato.
  Trotz der Niederlage *beglückwünschen* wir sie nicht für die Teilnahme.
  
  Se avessi vinto, mi sarei *congratulato* molto di più!
  Wenn ich gewonnen hätte, hätte ich mich viel mehr *beglückwünscht*!
  
  È importante *congratularsi* con chi si impegna molto.
  Es ist wichtig, sich bei jemandem, der sich sehr engagiert, zu *beglückwünschen*.
  
  Lei si era già *congratulata* con lui prima che arrivassi.
  Sie hatte sich bereits bei ihm *beglückwünscht*, bevor ich ankam.
