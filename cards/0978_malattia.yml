Rang: 978
Wort: malattia
Wortart: n.f
Wort mit Artikel: la malattia
Femininum / Plural: malattie
IPA: ''
Definition: die Krankheit, -en
Register: ''
Beispielsätze: |-
  La *malattia* improvvisa lo ha costretto a letto per una settimana.
  Die plötzliche *Krankheit* zwang ihn eine Woche ins Bett.
  
  Ho saputo che suo fratello soffre di una *malattia* cronica da anni.
  Ich habe gehört, dass sein Bruder seit Jahren an einer chronischen *Krankheit* leidet.
  
  Se *malattia* non fosse un problema così serio, potremmo goderci di più il nostro tempo insieme al ristorante.
  Wenn die *Krankheit* kein so ernstes Problem wäre, könnten wir mehr Zeit zusammen im Restaurant genießen.
  
  Nonostante la *malattia*, Maria ha partecipato alla conferenza con grande entusiasmo.
  Trotz der *Krankheit* nahm Maria mit großer Begeisterung an der Konferenz teil.
  
  Dicono che questa *malattia* si diffonda più velocemente in ambienti affollati.
  Man sagt, dass sich diese *Krankheit* in belebten Umgebungen schneller verbreitet.
