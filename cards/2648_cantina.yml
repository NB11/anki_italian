Rang: 2648
Wort: cantina
Wortart: n.f
Wort mit Artikel: la cantina
Femininum / Plural: cantine
IPA: ''
Definition: der Keller, -
Register: ''
Beispielsätze: |-
  Abbiamo trovato una bottiglia di vino vecchio nella *cantina* di casa.
  Wir haben eine Flasche alten Wein im *Keller* des Hauses gefunden.
  
  La *cantina* della villa è piena di barili di vino pregiato.
  Der *Keller* der Villa ist voller Fässer mit edlem Wein.
  
  Se cerchi il formaggio, guarda nella *cantina*, è lì che lo conserviamo.
  Wenn du den Käse suchst, schau in den *Keller*, dort lagern wir ihn.
  
  Dopo il terremoto, hanno ispezionato ogni *cantina* per controllare la stabilità.
  Nach dem Erdbeben haben sie jeden *Keller* auf Stabilität überprüft.
  
  Non entri nella *cantina* senza una torcia, è troppo buio lì dentro.
  Gehe nicht in den *Keller* ohne eine Taschenlampe, es ist dort drinnen zu dunkel.
