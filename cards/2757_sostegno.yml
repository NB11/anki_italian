Rang: 2757
Wort: sostegno
Wortart: n.m
Wort mit Artikel: il sostegno
Femininum / Plural: i sostegni
IPA: ''
Definition: die Unterstützung, die Hilfe
Register: ''
Beispielsätze: |-
  Ho bisogno del tuo *sostegno* per superare questo momento difficile.
  Ich brauche deine *Unterstützung*, um diese schwierige Zeit zu überstehen.
  
  Il *sostegno* che mi hai dato è stato fondamentale per la mia decisione.
  Die *Hilfe*, die du mir gegeben hast, war ausschlaggebend für meine Entscheidung.
  
  Senza *sostegno* psicologico, non avrebbe mai superato il trauma.
  Ohne *psychologische Unterstützung* hätte er das Trauma nie überwunden.
  
  Grazie al *sostegno* dei miei colleghi, il progetto è andato avanti senza problemi.
  Dank der *Unterstützung* meiner Kollegen ist das Projekt reibungslos vorangekommen.
  
  Se non avessi ricevuto questo *sostegno*, non sarei mai riuscito a laurearmi.
  Wenn ich diese *Hilfe* nicht erhalten hätte, hätte ich nie meinen Abschluss machen können.
