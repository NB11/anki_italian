Beispielsätze: |-
  Ho comprato un *canadese* berretto rosso per il viaggio a Toronto.
  Ich habe eine *kanadische* rote Mütze für die Reise nach Toronto gekauft.
  
  La squadra *canadese* ha vinto la medaglia d’oro alle Olimpiadi del 2021.
  Das *kanadische* Team gewann die Goldmedaille bei den Olympischen Spielen 2021.
  
  Nonostante le *canadesi* tradizioni siano molto rispettate, molti giovani preferiscono stili più internazionali.
  Obwohl die *kanadischen* Traditionen sehr respektiert werden, bevorzugen viele Jugendliche internationalere Stile.
  
  Se avessi saputo che il film era prodotto da una regista *canadese*, l’avrei visto volentieri!
  Wenn ich gewusst hätte, dass der Film von einer *kanadischen* Regisseurin produziert wurde, hätte ich ihn mir gerne angeschaut!
  
  I turisti ammirano sempre i paesaggi *canadesi*, soprattutto in autunno quando le foglie cambiano colore.
  Touristen bewundern immer die *kanadischen* Landschaften, besonders im Herbst, wenn sich die Blätter verfärben.
