Rang: 4112
Wort: ostacolare
Wortart: vt
Wort mit Artikel: ostacolare
Femininum / Plural: ''
IPA: ''
Definition: behindern, blockieren, erschweren
Register: ''
Beispielsätze: |-
  Non vuole che il suo *ostacoli* la ricerca della felicità.
  Er will nicht, dass ihr die Suche nach Glück *behindert*.
  
  La polizia ha provato a *ostacolare* le proteste dei cittadini.
  Die Polizei versuchte, die Bürgerproteste zu *blockieren*.
  
  Se non lo avessi *ostacolato*, avrebbe già finito il progetto.
  Hättest du ihn nicht *behindert*, hätte er das Projekt schon beendet.
  
  Vuole *ostacolare* ogni tentativo di pace nel paese.
  Er will jeden Versuch von Frieden im Land *zu vereiteln*.
  
  Perché *ostacoli* così spesso i suoi colleghi?
  Warum *behinderst* du so oft deine Kollegen? oder Warum blockierst du so oft deine Kollegen?
