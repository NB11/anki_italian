Rang: 4752
Wort: fantasticare
Wortart: v
Wort mit Artikel: fantasticare
Femininum / Plural: ''
IPA: ''
Definition: fantasieren, schwärmen
Register: ''
Beispielsätze: |-
  Da bambino *fantasticavo* spesso di diventare astronauta.
  Als Kind *fantasierte* ich oft davon, Astronaut zu werden.
  
  Mentre *fantasticava* ad occhi aperti, non sentì squillare il telefono.
  Während er *fantasierte*, bemerkte er nicht, dass das Telefon klingelte.
  
  Mi sembra che tu *fantastichi* troppo su questa situazione, dovresti essere più razionale.
  Es scheint mir, dass du zu sehr *fantasierst*; du solltest vernünftiger sein.
  
  Se *fantasticassi* meno e lavorassi di più, forse avresti successo.
  Wenn du weniger *fantasiertest* und mehr arbeiten würdest, hättest du vielleicht Erfolg.
  
  Pensavano che stesse *fantasticando*, invece aveva un piano ben preciso.
  Sie dachten, er *fantasiere* nur, dabei hatte er einen durchdachten Plan.
