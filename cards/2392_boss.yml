Rang: 2392
Wort: boss
Wortart: n.m
Wort mit Artikel: il boss
Femininum / Plural: i boss
IPA: ''
Definition: der Chef, -s, der Vorgesetzte, -n
Register: ''
Beispielsätze: |-
  Il *boss* della mia azienda è molto esigente con i dipendenti.
  Der *Chef* meines Unternehmens ist sehr anspruchsvoll mit den Mitarbeitern.
  
  I dipendenti hanno paura di licenziarsi perché il *boss* minaccia sempre di farlo.
  Die Mitarbeiter haben Angst zu kündigen, weil der *Chef* immer damit droht.
  
  Se il *boss* fosse più comprensivo, la produzione migliorerebbe.
  Wenn der *Chef* verständnisvoller wäre, würde die Produktion steigen.
  
  Il *boss* ha scelto proprio questa strategia per risolvere il problema.
  Der *Chef* hat genau diese Strategie gewählt, um das Problem zu lösen.
  
  Mi hanno detto che il *boss* andrà in pensione l’anno prossimo.
  Man hat mir gesagt, dass der *Chef* nächstes Jahr in Rente geht.
