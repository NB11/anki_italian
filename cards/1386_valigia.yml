Rang: 1386
Wort: valigia
Wortart: n.f
Wort mit Artikel: la valigia
Femininum / Plural: valigie
IPA: ''
Definition: der Koffer, -
Register: ''
Beispielsätze: |-
  Ho dimenticato la *valigia* nella stanza dell’albergo.
  Ich habe den *Koffer* im Hotelzimmer vergessen.
  
  L’ispettore ha aperto la *valigia* del sospetto senza permesso.
  Der Inspektor hat den *Koffer* des Verdächtigen ohne Erlaubnis geöffnet.
  
  Preparerò la *valigia* solo se finirò tutto il lavoro entro domenica.
  Ich werde den *Koffer* nur packen, wenn ich bis Sonntag all die Arbeit erledigt habe.
  
  Quando hai svuotato la *valigia*, ho trovato la tua camicia blu che cercavo!
  Als du den *Koffer* ausgepackt hast, habe ich dein blaues Hemd gefunden, wonach ich gesucht habe!
  
  L’albergo offre un servizio di trasporto delle *valigie* fino alla stanza, chiaramente senza costi extra.
  Das Hotel bietet einen *Transport* der Koffer bis ins Zimmer an, klar ohne zusätzliche Kosten.
