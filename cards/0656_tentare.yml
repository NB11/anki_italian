Rang: 656
Wort: tentare
Wortart: v
Wort mit Artikel: tentare
Femininum / Plural: ''
IPA: ''
Definition: versuchen, probieren
Register: ''
Beispielsätze: |-
  Provo *a* *tentare* un approccio diverso.
  Ich versuche *einen* anderen Ansatz *zu* *versuchen*.
  
  *Tentasti* di aprire la porta?
  Hast du versucht, die Tür *zu öffnen*?
  
  Se *tenterò* di nuovo, forse ci riuscirò.
  Wenn ich es *wieder versuchen werde*, vielleicht schaffe ich es.
  
  Non *tentiamo* di nasconderlo, è inutile.
  Wir *versuchen* nicht, es zu verheimlichen, das ist sinnlos.
  
  Avresti dovuto *tentare* prima di arrenderti.
  Du hättest *versuchen müssen*, bevor du aufgibst.
