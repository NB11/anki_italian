Rang: 656
Wort: tentare
Wortart: v
Wort mit Artikel: tentare
Femininum / Plural: ''
IPA: ''
Definition: versuchen, erproben
Register: ''
Beispielsätze: |-
  Non *tento* più di risolvere questa questione da solo, ormai ho bisogno di aiuto.
  Ich *versuche* nicht mehr, diese Frage allein zu lösen, mittlerweile brauche ich Hilfe.
  
  Se avessi più denaro, potrei *tentare* di aprire un negozio in centro.
  Wenn ich mehr *Geld* hätte, könnte ich erproben, ein Geschäft im Zentrum zu eröffnen.
  
  Il detective ha deciso di *tentare* una nuova strategia per risolvere il crimine.
  Der *Detektiv* hat beschlossen, eine neue Strategie zu versuchen, um das Verbrechen zu lösen.
  
  Nonostante il dolore, ha continuato a *tentare* di finire il lavoro prima della scadenza.
  Trotz des *Schmerzes* hat er weiter versucht, die Arbeit vor der Frist zu beenden.
  
  Mi hanno detto che è pericoloso *tentare* di scalare quella zona da solo.
  Man hat mir gesagt, es sei gefährlich, in dieser *Zone* allein zu versuchen, hochzuklettern.
