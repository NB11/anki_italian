Rang: 3929
Wort: gennaio
Wortart: n.m
Wort mit Artikel: il gennaio
Femininum / Plural: ''
IPA: ''
Definition: der Januar
Register: ''
Beispielsätze: |-
  Il *gennaio* è il primo mese dell'anno secondo il calendario gregoriano.
  Der *Januar* ist der erste Monat des Jahres laut dem gregorianischen Kalender.
  
  Quest'anno ho programmato un viaggio in montagna per *gennaio*, se il meteo lo permette.
  Dieses Jahr habe ich eine Reise ins Gebirge für *Januar* geplant, wenn das Wetter es zulässt.
  
  Non vedo l'ora che arrivi *gennaio* per festeggiare il nuovo anno con i miei amici.
  Ich kann es kaum erwarten, dass *Januar* kommt, um mit meinen Freunden Silvester zu feiern.
  
  In *gennaio* le giornate sono più corte, ma il freddo stimola la raccolta di idee per il nuovo anno.
  Im *Januar* sind die Tage kürzer, aber die Kälte regt das Sammeln von Ideen für das neue Jahr an.
  
  Se non avessi il lavoro fisso, andrei a sciare già a *gennaio* invece che a marzo.
  Wenn ich keine feste Arbeitsstelle hätte, würde ich schon im *Januar* Ski fahren gehen statt im März.
