Beispielsätze: |-
  Ho notato uno *sbaglio* nel tuo compito di matematica, ma l’insegnante dice che è tutto giusto.
  Ich habe einen *Fehler* in deiner Matheaufgabe bemerkt, aber der Lehrer sagt, dass alles richtig ist.
  
