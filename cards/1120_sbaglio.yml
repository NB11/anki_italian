  Trotz des *Fehlers* im Verfahren war das Endergebnis dennoch richtig.
  
  È meglio ammettere il proprio *sbaglio* piuttosto che incolpare gli altri, vero?
  Es ist besser, seinen *Fehler* einzugestehen, als andere zu beschuldigen, oder?
  
  Credo che tu abbia fatto uno *sbaglio* quando hai licenziato l’impiegato senza una ragione valida.
  Ich glaube, du hast einen *Fehler* gemacht, als du den Angestellten ohne triftigen Grund entlassen hast.
