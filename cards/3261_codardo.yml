Rang: 3261
Wort: codardo
Wortart: adj
Wort mit Artikel: codardo
Femininum / Plural: ''
IPA: ''
Definition: feige, ängstlich
Register: ''
Beispielsätze: |-
  È *codardo* chi scappa invece di affrontare le difficoltà.
  Er ist *feige*, der vor Schwierigkeiten flüchtet.
  
  Se fossi *codardo*, non avrei mai accettato questa sfida pericolosa.
  Wäre ich *feige*, hätte ich diese gefährliche Herausforderung nie angenommen.
  
  Nonostante la paura, non si è comportato *codardamente*: ha lottato fino alla fine.
  Trotz der Angst hat er sich nicht *feige* verhalten: Er kämpfte bis zum Ende.
  
  Dicono che sia un uomo *codardo*, ma io credo che stiano esagerando.
  Man sagt, er sei ein *feiger* Mann, aber ich glaube, sie übertreiben.
  
  Chi tradisce un amico per viltà è considerato *codardo* da tutti.
  Wer einen Freund aus Feigheit verrät, gilt von allen als *feige*.
