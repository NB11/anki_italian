Rang: 4828
Wort: rumoroso
Wortart: adj
Wort mit Artikel: rumoroso
Femininum / Plural: ''
IPA: ''
Definition: laut, geräuschvoll
Register: ''
Beispielsätze: |-
  La stanza era così *rumorosa* che non riuscivo a concentrarmi.
  Das Zimmer war so *laut*, dass ich mich nicht konzentrieren konnte.
  
  I bambini hanno reso l’aula estremamente *rumorosa* con le loro grida.
  Die Kinder haben den Klassenraum mit ihrem Geschrei extrem *geräuschvoll* gemacht.
  
  Nonostante il traffico *rumoroso* fuori, il meeting è andato avanti senza interruzioni.
  Trotz des *lauten* Verkehrs draußen verlief das Meeting ohne Unterbrechungen.
  
  Durante il concerto, la folla diventò così *rumorosa* che il cantante dovette chiedere silenzio.
  Während des Konzerts wurde die Menge so *geräuschvoll*, dass der Sänger um Ruhe bitten musste.
  
  Il treno ad alta velocità è meno *rumoroso* di quanto pensassi, ma la stazione rimane comunque caotica.
  Der Hochgeschwindigkeitszug ist weniger *laut*, als ich dachte, aber der Bahnhof bleibt trotzdem chaotisch.
