Rang: 3470
Wort: unito
Wortart: adj
Wort mit Artikel: unito
Femininum / Plural: ''
IPA: ''
Definition: vereint, verbunden
Register: ''
Beispielsätze: |-
  Una famiglia *unita* trascorre più tempo insieme.
  Eine *vereinte* Familie verbringt mehr Zeit miteinander.
  
  L'Italia è stata *unita* sotto un solo governo nel XIX secolo.
  Italien wurde im 19. Jahrhundert unter einer einzigen Regierung *vereint*.
  
  Nonostante i loro contrasti, rimasero *uniti* fino alla fine.
  Trotz ihrer Konflikte blieben sie bis zum Ende *verbunden*.
  
  I paesi europei sperano di restare *uniti* di fronte alle crisi.
  Die europäischen Länder hoffen, angesichts der Krisen *vereint* zu bleiben.
  
  Anche se dispersi, i gemelli si sentivano *uniti* da un legame speciale.
  Auch wenn sie getrennt lebten, fühlten sich die Zwillinge durch eine besondere Bindung *verbunden*.
