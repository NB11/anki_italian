Rang: 908
Wort: ridicolo
Wortart: adj
Wort mit Artikel: ridicolo
Femininum / Plural: ''
IPA: ''
Definition: lächerlich, absurd
Register: ''
Beispielsätze: |-
  Secondo me, quel film era *ridicolo* perché i dialoghi erano privi di senso.
  Meiner Meinung nach war dieser Film *lächerlich*, weil die Dialoge keinen Sinn ergaben.
  
  Come hai potuto indossare un vestito così *ridicolo* alla festa?
  Wie konntest du so ein *lächerliches* Kleid zur Party tragen?
  
  Se avessi saputo che sarebbe stato *ridicolo*, non ci sarei andato!
  Wenn ich gewusst hätte, dass es *lächerlich* werden würde, wäre ich nicht hingegangen!
  
  È *ridicolo* che tu abbia dimenticato il nostro anniversario per la terza volta!
  Es ist einfach *lächerlich*, dass du unseren Jahrestag zum dritten Mal vergessen hast!
  
  La sua spiegazione era così *ridicola* che tutti hanno cominciato a ridere apertamente.
  Seine Erklärung war so *lächerlich*, dass alle offen zu lachen begannen.
