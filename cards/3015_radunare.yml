Rang: 3015
Wort: radunare
Wortart: vt
Wort mit Artikel: radunare
Femininum / Plural: ''
IPA: ''
Definition: versammeln, sammeln
Register: ''
Beispielsätze: |-
  Il sindaco ha *radunato* tutti i cittadini in piazza per discutere della nuova norma.
  Der Bürgermeister hat alle Bürger auf dem Platz *versammelt*, um über die neue Regel zu sprechen.
  
  Senza volerlo, mi sono *radunato* con gli altri spettatori davanti al palco.
  Ohne es zu wollen, habe ich mich mit den anderen Zuschauern vor der Bühne *versammelt*.
  
  Il gruppo di escursionisti si era *radunato* intorno al fuoco per raccontare storie.
  Die Gruppe der Wanderer hatte sich um das Feuer *versammelt*, um Geschichten zu erzählen.
  
  Appena sentiamo il segnale, dobbiamo *radunare* tutti i documenti necessari.
  Sobald wir das Signal hören, müssen wir alle notwendigen Unterlagen *sammeln*.
  
  Nonostante la tempesta, gli scout sono riusciti a *radunare* i dispersi nel rifugio.
  Trotz des Sturms konnten die Pfadfinder die Vermissten im Schutzraum *versammeln*.
