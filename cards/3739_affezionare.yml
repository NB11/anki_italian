Rang: 3739
Wort: affezionare
Wortart: vt
Wort mit Artikel: affezionare
Femininum / Plural: ''
IPA: ''
Definition: jdn. sehr mögen, sich jem. zuwenden
Register: ''
Beispielsätze: |-
  Nonostante la distanza, la loro amicizia continua a *affezionare* entrambe le famiglie.
  Trotz der Entfernung *verbunden bleiben* beide Familien weiterhin sehr miteinander.
  
  Mi chiedevo se i cani riescano a *affezionare* le persone che li maltrattano.
  Ich fragte mich, ob Hunde *Sympathie gewinnen* können bei denen, die sie misshandeln.
  
  Anche dopo anni, il gatto ha continuato a *affezionarsi* solo a quella poltrona.
  Selbst nach Jahren *hat* die Katze sich zugewandt ausschließlich diesem Sessel.
  
  Se non sapessi *affezionarmi* in modo così intenso, forse non scriverei poesie.
  Wenn ich mich nicht so *innig zuwenden* könnte, schriebe ich vielleicht keine Gedichte.
  
  Lei aveva sempre temuto di non essere in grado di *affezionare* nessuno dopo la delusione subita.
  Sie hatte immer gefürchtet, nach der erlittenen Enttäuschung niemanden mehr *mögen zu können*.
