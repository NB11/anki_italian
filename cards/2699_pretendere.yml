Rang: 2699
Wort: pretendere
Wortart: v
Wort mit Artikel: pretendere
Femininum / Plural: ''
IPA: ''
Definition: fordern, verlangen, Anspruch erheben
Register: ''
Beispielsätze: |-
  Il capo *pretende* che tutti arrivino puntuali ogni mattina.
  Der Chef verlangt, dass alle pünktlich jeden Morgen *ankommen*.
  
  Non *pretendo* che tu capisca subito, ma ci proviamo.
  Ich *verlange* nicht, dass du es sofort verstehst, aber wir versuchen es.
  
  Perché *pretendi* sempre di avere ragione? Non è possibile!
  Warum *forderst* du immer, recht zu haben? Das ist unmöglich!
  
  Lui *pretendeva* di essere il migliore, ma nessuno gli credeva.
  Er *forderte*, der Beste zu sein, aber niemand glaubte ihm.
  
  Se *pretenderai* troppo, perderai l’amicizia di molti.
  Wenn du zu viel *fordern* wirst, verlierst du die Freundschaft vieler.
Audio: ''
Notiz: ''
Dispersion: ''
