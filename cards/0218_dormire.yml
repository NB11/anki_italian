Rang: 218
Wort: dormire
Wortart: vi
Wort mit Artikel: dormire
Femininum / Plural: ''
IPA: ''
Definition: schlafen
Register: ''
Beispielsätze: |-
  Non *dormo* bene quando fa troppo caldo.
  Ich *schlafe* nicht gut, wenn es zu heiß ist.
  
  Spero che tu *dorma* profondamente stanotte.
  Ich hoffe, dass du heute Nacht *schläfst*.
  
  Abbiamo *dormito* otto ore di fila ieri sera.
  Wir haben gestern Abend acht Stunden am Stück *geschlafen*.
  
  Dormirai meglio se spegni il telefono prima.
  Du wirst besser *schlafen*, wenn du das Handy vorher ausschaltest.
  
  Stavo per addormentarmi quando il telefono ha squillato.
  Ich war gerade dabei einzuschlafen, als das Telefon geklingelt hat.
