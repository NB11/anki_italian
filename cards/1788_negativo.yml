Beispielsätze: |-
  Non vuole *negativo* pensare alla sua situazione economica.
  Er will nicht *negativ* über seine wirtschaftliche Situation nachdenken.
  
  Il risultato del sondaggio è stato *negativo*, purtroppo.
  Das Ergebnis der Umfrage war leider *negativ*.
  
  Se continui a bere così, otterrai un effetto *negativo* sul tuo organismo.
  Wenn du so weiter trinkst, wirst du eine *negative* Auswirkung auf deinen Körper haben.
  
  Nonostante tutto, lei rimase sempre *negativa* riguardo alle sue possibilità di successo.
  Trotz allem blieb sie immer *negativ* bezüglich ihrer Erfolgschancen.
  
  Il giudizio della commissione è stato *negativo*, ma lui ha comunque provato.
  Das Urteil der Kommission war *negativ*, aber er hat es trotzdem versucht.
