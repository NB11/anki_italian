Rang: 3433
Wort: intromettere
Wortart: vr
Wort mit Artikel: intromettere
Femininum / Plural: ''
IPA: ''
Definition: sich einmischen
Register: ''
Beispielsätze: |-
  Non *ti intromettere* nelle questioni altrui, è scortese.
  Mische dich nicht in fremde Angelegenheiten ein, das ist unhöflich.
  
  Se *intromettessi* meno, le cose andrebbero meglio.
  Wenn du dich weniger einmischen *würdest*, würde es besser laufen.
  
  Ho visto che *intromettendosi* ha risolto il problema.
  Ich habe gesehen, wie er durch sein Eingreifen das Problem gelöst hat.
  
  È importante che non *ti intrometta* nei loro affari.
  Es ist wichtig, dass du dich nicht in ihre Angelegenheiten einmischst.
  
  Si lamenta sempre perché qualcuno *si intromette* nella sua vita privata.
  Er beschwert sich immer, weil sich jemand in sein Privatleben einmischt.
