Rang: 1246
Wort: premio
Wortart: n.m
Wort mit Artikel: il premio
Femininum / Plural: premi
IPA: ''
Definition: der Preis, -e
Register: ''
Beispielsätze: |-
  Se vinci la gara, riceverai un *premio* molto speciale.
  Wenn du das Rennen gewinnst, erhältst du einen *besonderen* Preis.
  
  Il *premio* Nobel per la pace è stato assegnato a una persona coraggiosa.
  Der Friedensnobelpreis wurde einer mutigen Person *verliehen*.
  
  Nonostante gli sforzi, non è riuscito a ottenere il *premio* che desiderava.
  Trotz seiner Anstrengungen gelang es ihm nicht, den *Preis* zu erhalten, den er sich wünschte.
  
  Hai sentito che hanno aumentato il *premio* per chi segnala i prodotti contraffatti al mercato?
  Hast du gehört, dass sie die *Belohnung* für denjenigen erhöht haben, der gefälschte Waren auf dem Markt meldet?
  
  Vorrei festeggiare il mio successo con un *premio* che rappresenti davvero il mio lavoro.
  Ich möchte meinen Erfolg mit einer *Auszeichnung* feiern, die wirklich meine Arbeit repräsentiert.
