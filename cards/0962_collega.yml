Rang: 962
Wort: collega
Wortart: n.m
Wort mit Artikel: il collega
Femininum / Plural: colleghi
IPA: ''
Definition: der Kollege, -n
Register: ''
Beispielsätze: |-
  Il *collega* di Marco lavora in un'altra azienda.
  Der *Kollege* von Marco arbeitet in einem anderen Unternehmen.
  
  Hanno assunto un nuovo *collega* nel reparto marketing.
  Sie haben einen neuen *Kollegen* in der Marketingabteilung eingestellt.
  
  Se non arrivi in tempo, il *collega* dovrà fare il tuo lavoro.
  Wenn du nicht rechtzeitig ankommst, muss der *Kollege* deine Arbeit übernehmen.
  
  È importante che il *collega* capisca bene le istruzioni.
  Es ist wichtig, dass der *Kollege* die Anweisungen gut versteht.
  
  I nostri *colleghi* tedeschi hanno organizzato una cena per noi.
  Unsere deutschen *Kollegen* haben für uns ein Abendessen organisiert.
