Rang: 2500
Wort: infezione
Wortart: n.f
Wort mit Artikel: la infezione
Femininum / Plural: infezioni
IPA: ''
Definition: die Infektion, -en
Register: ''
Beispielsätze: |-
  Dopo l’incidente, temevano una *infezione* nel sangue.
  Nach dem Unfall fürchteten sie eine *Infektion* im Blut.
  
  Il medico ha spiegato che questa *infezione* è molto contagiosa.
  Der Arzt erklärte, dass diese *Infektion* sehr ansteckend ist.
  
  Se non curi la *infezione*, potrebbe diventare cronica.
  Wenn du die *Infektion* nicht behandelst, könnte sie chronisch werden.
  
  Hanno trovato tracce della *infezione* nel suo cervello cerebrale dopo l’autopsia.
  Sie fanden Spuren der *Infektion* in seinem Gehirn nach der Autopsie.
  
  Nonostante i sintomi, non era ancora una *infezione* grave.
  Trotz der Symptome war es noch keine schwere *Infektion*.
