Rang: 1724
Wort: tendere
Wortart: v
Wort mit Artikel: tendere
Femininum / Plural: ''
IPA: ''
Definition: ausstrecken, spannen, neigen
Register: ''
Beispielsätze: |-
  Maria *tende* le braccia verso il sole per riscaldarsi.
  Maria streckt *die Arme* in Richtung Sonne, um sich zu wärmen.
  
  Nonostante la pioggia, abbiamo *teso* la fune tra gli alberi per stendere i panni.
  Trotz des Regens haben wir *das Seil* zwischen den Bäumen gespannt, um die Wäsche aufzuhängen.
  
  Ho notato che quel gatto *tende* a nascondersi sotto il letto ogni volta che sente un rumore.
  Ich habe bemerkt, dass die Katze dazu *neigt*, sich jedes Mal unter dem Bett zu verstecken, wenn sie ein Geräusch hört.
  
  Se avessi più tempo, *tenderei* la mano a chi ha bisogno di aiuto senza esitare.
  Wenn ich mehr Zeit hätte, würde ich *die Hand* ohne zu zögern denen reichen, die Hilfe brauchen.
  
  È importante che tu *tenda* sempre la biancheria al sole affinché si asciughi bene.
  Es ist wichtig, dass du die Wäsche immer in der Sonne *ausbreitest*, damit sie gut trocknet.
