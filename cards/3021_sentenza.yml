Rang: 3021
Wort: sentenza
Wortart: n.f
Wort mit Artikel: la sentenza
Femininum / Plural: sentenze
IPA: ''
Definition: das Urteil, -e
Register: ''
Beispielsätze: |-
  Il giudice ha pronunciato la *sentenza* dopo due ore di camera di consiglio.
  Der Richter hat das *Urteil* nach zwei Stunden Beratung verkündet.
  
  Nonostante le prove schiaccianti, l’avvocato spera ancora in una *sentenza* favorevole.
  Trotz der überwältigenden Beweise hofft der Anwalt noch auf ein *günstiges Urteil*.
  
  La corte ha emesso una *sentenza* storica che cambierà le leggi sul lavoro.
  Das Gericht hat ein historisches *Urteil* gefällt, das die Arbeitsgesetze ändern wird.
  
  Molti cittadini ritengono che la *sentenza* sia troppo severa nei confronti dell’imputato.
  Viele Bürger halten das *Urteil* für zu hart gegenüber dem Angeklagten.
  
  Se anche la *sentenza* fosse stata annullata in appello, il procuratore avrebbe comunque insistito per la condanna.
  Selbst wenn das *Urteil* in der Berufung aufgehoben worden wäre, hätte der Staatsanwalt trotzdem auf die Verurteilung bestanden.
