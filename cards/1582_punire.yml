Rang: 1582
Wort: punire
Wortart: vt
Wort mit Artikel: punire
Femininum / Plural: ''
IPA: ''
Definition: bestrafen, ahnden
Register: ''
Beispielsätze: |-
  Se continui a comportarti male, il professore ti *punirà* con una nota sul registro.
  Wenn du dich weiter schlecht benimmst, wird der Lehrer dich mit einem *Vermerk* im Klassenbuch bestrafen.
  
  La legge deve *punire* severamente chi commette reati gravi come la rapina.
  Das Gesetz muss diejenigen, die schwere Straftaten wie einen Raubüberfall begehen, *härter bestrafen*.
  
  Nonostante l’errore, Maria ha capito che sua sorella non meritava di essere *punita*.
  Trotz des Fehlers verstand Maria, dass ihre Schwester es nicht verdient hatte, *bestraft* zu werden.
  
  Gli sbirri hanno deciso di non *punire* il topo che ha rubato solo un pezzetto di formaggio.
  Die Bullen haben beschlossen, die Maus, die nur ein kleines Stück Käse gestohlen hatte, nicht *zu bestrafen*.
  
  Se avessi saputo le conseguenze, avrei evitato di *punire* mio figlio così duramente.
  Hätte ich die Konsequenzen gekannt, hätte ich vermieden, meinen Sohn so *hart zu bestrafen*.
