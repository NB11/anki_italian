Rang: 1952
Wort: bagaglio
Wortart: n.m
Wort mit Artikel: il bagaglio
Femininum / Plural: i bagagli
IPA: ''
Definition: das Gepäck, -e
Register: ''
Beispielsätze: |-
  Non dimenticare di controllare *il bagaglio* prima di partire.
  Vergiss nicht, das *Gepäck* vor der Abreise zu überprüfen.
  
  Ho perso *i bagagli* all'aeroporto di Roma.
  Ich habe das *Gepäck* am Flughafen Rom verloren.
  
  Se avessi saputo che sarebbe piovuto, avrei portato un ombrello per proteggere *il bagaglio*.
  Wenn ich gewusst hätte, dass es regnen würde, hätte ich einen Schirm mitgenommen, um das *Gepäck* zu schützen.
  
  I *bagagli* sono già stati caricati sull'autobus per l'albergo.
  Das *Gepäck* wurde bereits in den Bus zum Hotel geladen.
  
  Non appena avrò finito di preparare *il bagaglio*, potremo partire.
  Sobald ich damit fertig bin, das *Gepäck* zu packen, können wir aufbrechen.
