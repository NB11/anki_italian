Rang: 2340
Wort: barba
Wortart: n.m
Wort mit Artikel: la barba
Femininum / Plural: barbe
IPA: ''
Definition: der Bart, -bärte
Register: ''
Beispielsätze: |-
  Sai che Marco si è fatto crescere una *barba* molto lunga quest'anno?
  Weißt du, dass Marco sich dieses Jahr einen sehr langen *Bart* wachsen ließ?
  
  L'uomo con la *barba* bianca era il nonno del ragazzo.
  Der Mann mit dem weißen *Bart* war der Opa des Jungen.
  
  Ho visto un film in cui un pirata aveva una *barba* nera e folta.
  Ich habe einen Film gesehen, in dem ein Pirat einen schwarzen und buschigen *Bart* hatte.
  
  Avrei preferito tagliarmi la *barba* prima dell'intervista, ma non ne ho avuto il tempo.
  Ich hätte mir gern vor dem Vorstellungsgespräch den *Bart* abrasiert, aber ich hatte keine Zeit dafür.
  
  Dicono che tenere la *barba* lunga faccia sembrare più vecchio di quello che si è.
  Man sagt, dass ein langer *Bart* einen älter erscheinen lässt, als man ist.
