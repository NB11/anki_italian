Rang: 3109
Wort: insinuare
Wortart: v
Wort mit Artikel: insinuare
Femininum / Plural: ''
IPA: ''
Definition: andeuten, unterstellen, unterschieben
Register: ''
Beispielsätze: |-
  Non volevo *insinuare* nulla, ma la situazione sembra strana.
  Ich wollte nichts *andeuten*, aber die Situation scheint seltsam.
  
  Secondo lui, qualcuno cerca di *insinuare* che lui è responsabile.
  Seiner Meinung nach versucht jemand, ihm *unterzuschieben*, dass er schuld ist.
  
  Se *insinuassi* che lui ha fatto questo, mi crederesti?
  Wenn ich *andeuten* würde, dass er das getan hat, würdest du mir glauben?
  
  La politica ha *insinuato* che potrebbe esserci un accordo segreto.
  Der Politiker hat *unterstellt*, es könnte ein geheimes Abkommen geben.
  
  Non *insinuo* che tu abbia sbagliato, ma la tua versione non convince.
  Ich *unterstelle* dir nicht, dass du einen Fehler gemacht hast, aber deine Version überzeugt mich nicht.
Audio: ''
Notiz: ''
Dispersion: ''
