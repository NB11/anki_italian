Rang: 3996
Wort: tosse
Wortart: n.f
Wort mit Artikel: la tosse
Femininum / Plural: tosse
IPA: ''
Definition: der Husten
Register: ''
Beispielsätze: |-
  Dopo aver camminato sotto la pioggia, *tosse* molto.
  Nach dem Spaziergang im Regen habe ich *Husten*.
  
  Il medico dice che se *tosse* non passa entro una settimana, dobbiamo tornare.
  Der Arzt sagt, wenn der *Husten* nicht innerhalb einer Woche verschwindet, müssen wir zurückkommen.
  
  Ha la *tosse* così forte che non riesce a dormire la notte.
  Er hat *Husten* so stark, dass er nachts nicht schlafen kann.
  
  Mi hanno consigliato un rimedio naturale contro la *tosse* invernale.
  Man hat mir ein natürliches Mittel gegen den *Husten* im Winter empfohlen.
  
  Se avessi *tosse* stizzosa, berrei una tisana calda al miele.
  Wenn ich *Husten* hätte, der kratzt, würde ich einen warmen Honigtee trinken.
