Rang: 4029
Wort: terrificare
Wortart: v
Wort mit Artikel: terrificare
Femininum / Plural: ''
IPA: ''
Definition: in Panik versetzen, verrückt machen
Register: ''
Beispielsätze: |-
  Il rumore assordante *terrifica* gli abitanti del quartiere ogni sera.
  Der ohrenbetäubende Lärm lässt die Anwohner jeden Abend *in Panik* versetzen.
  
  Se sapessi che quel film *terrifica* tanto i bambini, non l’avrei mai scelto per loro.
  Wenn ich gewusst hätte, dass dieser Film die Kinder so *in Panik versetzt*, hätte ich ihn nie für sie ausgewählt.
  
  Non *terrificare* la popolazione con notizie infondate che circolano su internet.
  Die Bevölkerung sollst du nicht mit haltlosen Gerüchten *in Panik versetzen*, die im Internet kursieren.
  
  La notizia del licenziamento improvviso *terrifica* tutti i colleghi, che temono per il loro futuro.
  Die Nachricht über die plötzliche Entlassung lässt alle Kollegen *verrückt machen*, weil sie ihre Zukunft fürchten.
  
  Chiunque osasse *terrificare* gli animali nel parco sarebbe immediatamente denunciato.
  Wer es wagen würde, die Tiere im Park *in Panik zu versetzen*, würde sofort angezeigt werden.
