Rang: 4233
Wort: profumare
Wortart: vi
Wort mit Artikel: profumare
Femininum / Plural: ''
IPA: ''
Definition: duften
Register: ''
Beispielsätze: |-
  Questa *profuma* di vaniglia ed è davvero deliziosa.
  Dieses *duftet* nach Vanille und ist wirklich köstlich.
  
  Se la stanza *profumasse* di fiori freschi, mi sentirei molto meglio.
  Wenn das Zimmer nach frischen Blumen *duften* würde, ginge es mir viel besser.
  
  Dopo aver acceso la candela, tutta la sala cominciò a *profumare* di gelsomino.
  Nachdem die Kerze angezündet war, begann der ganze Saal nach Jasmin zu *duften*.
  
  Chiunque entri in questa pasticceria non può fare a meno di notare come *profumi* di dolci appena cotti.
  Wer diese Bäckerei betritt, kann nicht anders, als zu bemerken, wie sie nach frisch gebackenen Süßspeisen *duftet*.
  
  Nonostante l’odore *profumasse* di pulito, sapevo che qualcosa non andava in quella stanza.
  Obwohl der Geruch nach Sauberkeit *duftete*, wusste ich, dass etwas an diesem Raum nicht stimmte.
