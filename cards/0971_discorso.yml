Rang: 971
Wort: discorso
Wortart: n.m
Wort mit Artikel: il discorso
Femininum / Plural: discorsi
IPA: ''
Definition: die Rede, -n
Register: ''
Beispielsätze: |-
  Il *discorso* del sindaco è stato molto magnifico e ha convinto tutti i cittadini.
  Die *Rede* des Bürgermeisters war sehr herrlich und hat alle Bürger überzeugt.
  
  Nonostante litighi sempre con tuo marito, oggi avete fatto un *discorso* molto sereno.
  Auch wenn du dich immer mit deinem Mann streitest, habt ihr heute ein sehr *ruhiges* Gespräch geführt.
  
  Era inutile continuare il *discorso* perché lui non ascoltava nemmeno l’interesse degli altri.
  Es war *nutzlos*, das Gespräch fortzusetzen, weil er sich nicht einmal für die Interessen der anderen interessierte.
  
  L’attore ha tenuto un *discorso* così grandioso che il pubblico ha applaudito per cinque minuti.
  Der Schauspieler hielt eine so *herrliche* Rede, dass das Publikum fünf Minuten lang applaudierte.
  
  Vorresti registrare un *discorso* o preferisci scriverlo direttamente?
  Möchtest du eine *Rede* aufnehmen oder sie lieber direkt schreiben?
