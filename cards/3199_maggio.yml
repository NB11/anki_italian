Rang: 3199
Wort: maggio
Wortart: n.m
Wort mit Artikel: il maggio
Femininum / Plural: ''
IPA: ''
Definition: der Mai
Register: ''
Beispielsätze: |-
  In *maggio* le giornate sono più lunghe e il clima è generalmente piacevole.
  Im *Mai* sind die Tage länger und das Klima ist normalerweise angenehm.
  
  Quest'anno il *maggio* è stato molto piovoso, quindi non abbiamo potuto organizzare il picnic che avevamo previsto.
  Dieses Jahr war der *Mai* sehr regnerisch, sodass wir das geplante Picknick nicht durchführen konnten.
  
  Se avessimo prenotato prima, avremmo trovato un alloggio più economico per il *maggio*, ma ora è troppo tardi.
  Hätten wir früher gebucht, hätten wir eine günstigere Unterkunft für den *Mai* gefunden, aber jetzt ist es zu spät.
  
  Il *maggio* prossimo pensiamo di visitare la contea di Sussex, famosa per i suoi paesaggi incantevoli.
  Nächsten *Mai* möchten wir die Grafschaft Sussex besuchen, die für ihre bezaubernden Landschaften berühmt ist.
  
  Credo che *maggio* sia il mese ideale per visitare Roma, quando la città non è ancora troppo affollata.
  Ich glaube, der *Mai* ist der ideale Monat, um Rom zu besuchen, wenn die Stadt noch nicht zu überlaufen ist.
