Rang: 4589
Wort: squillare
Wortart: vi
Wort mit Artikel: squillare
Femininum / Plural: ''
IPA: ''
Definition: klingeln, läuten, ertönen
Register: ''
Beispielsätze: |-
  Il telefono *squilla* ogni volta che ricevo un messaggio.
  Das Telefon *klingelt* jedes Mal, wenn ich eine Nachricht bekomme.
  
  Ieri il campanello *ha squillato* alle sette di mattina.
  Gestern *hat* die Klingel um sieben Uhr morgens geläutet.
  
  Sarebbe utile se il telefono non *squillasse* durante la riunione.
  Es wäre nützlich, wenn das Telefon während der Besprechung nicht *ertönte*.
  
  Il cane si sveglia non appena *squilla* il telefono.
  Der Hund erwacht, sobald das Telefon *läutet*.
  
  Prima *squillò* la sveglia, poi finalmente mi alzai.
  Zuerst *klingelte* der Wecker, dann stand ich endlich auf.
Audio: ''
Notiz: ''
Dispersion: ''
