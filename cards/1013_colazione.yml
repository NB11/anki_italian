Rang: 1013
Wort: colazione
Wortart: n.f
Wort mit Artikel: la colazione
Femininum / Plural: colazioni
IPA: ''
Definition: das Frühstück, -e
Register: ''
Beispielsätze: |-
  Normalmente faccio *colazione* alle sette di mattina con caffè e biscotti.
  Normalerweise mache ich *Frühstück* um sieben Uhr morgens mit Kaffee und Keksen.
  
  Non hai ancora mangiato? Vuoi che ti prepari *colazione* anche per te?
  Hast du noch nicht gegessen? Soll ich dir auch *Frühstück* zubereiten?
  
  Dopo una lunga notte in bianco, la *colazione* era l’unica cosa che desideravo.
  Nach einer langen schlaflosen Nacht war das *Frühstück* das Einzige, was ich mir wünschte.
  
  Se domattina vorrai stare in forma, evita di saltare *colazione*!
  Wenn du morgen früh fit sein willst, vermeide es, das *Frühstück* auszulassen!
  
  Mi hanno detto che in Inghilterra la *colazione* è molto più abbondante che in Italia.
  Man hat mir erzählt, dass in England das *Frühstück* viel reichhaltiger ist als in Italien.
