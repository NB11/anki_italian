Rang: 2311
Wort: esimere
Wortart: vt
Wort mit Artikel: esimere
Femininum / Plural: ''
IPA: ''
Definition: entbinden, befreien
Register: ''
Beispielsätze: |-
  Il giudice ha *esonerato* l’imputato dalle accuse per mancanza di prove.
  Der Richter hat den Angeklagten von den *Vorwürfen* entbunden, da es an Beweisen mangelte.
  
  La scuola vuole *esimere* gli studenti dalle lezioni pomeridiane per i prossimi dieci giorni.
  Die Schule möchte die Schüler für die nächsten zehn Tage von den *Nachmittagsstunden* befreien.
  
  Mi hanno *esentato* dal pagamento delle tasse universitarie perché i miei genitori hanno redditi molto bassi.
  Ich wurde von der Zahlung der Studiengebühren *ausgenommen*, weil meine Eltern ein sehr geringes Einkommen haben.
  
  Il direttore ha deciso di *esimere* il dipendente dall’obbligo di timbrare il cartellino.
  Der Direktor hat beschlossen, den Mitarbeiter von der *Pflicht* zu entbinden, die Stechuhr zu nutzen.
  
  Nonostante la sua richiesta, non posso *esimere* il cliente dall’obbligo di fornire la documentazione richiesta.
  Trotz seiner Bitte kann ich den Kunden nicht von der *Verpflichtung* befreien, die geforderten Unterlagen vorzulegen.
