Rang: 1683
Wort: sterlina
Wortart: n.f
Wort mit Artikel: la sterlina
Femininum / Plural: sterline
IPA: ''
Definition: das Pfund Sterling, -
Register: ''
Beispielsätze: |-
  La *sterlina* britannica è una delle valute più forti al mondo.
  Die britische *Pfund Sterling* ist eine der stärksten Währungen der Welt.
  
  Ha usato una *sterlina* falsa per acquistare quel dipinto, che poi si è rivelato un falso.
  Er hat eine *falsche Pfund Sterling* verwendet, um dieses Gemälde zu kaufen, das sich dann als Fälschung herausstellte.
  
  Se avessi saputo che il costo era così alto, non avrei comprato quella *sterlina* commemorativa.
  Wenn ich gewusst hätte, dass die Kosten so hoch waren, hätte ich diese *Gedenk-Pfund Sterling* nicht gekauft.
  
  Nonostante il peggiorare della situazione economica, la *sterlina* ha mantenuto il suo valore.
  Trotz der Verschlechterung der wirtschaftlichen Lage hat die *Pfund Sterling* ihren Wert behalten.
  
  Il ministro ha annunciato che la *sterlina* subirà una svalutazione nei prossimi mesi.
  Der Minister hat angekündigt, dass die *Pfund Sterling* in den nächsten Monaten eine Abwertung erfahren wird.
