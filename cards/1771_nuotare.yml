Rang: 1771
Wort: nuotare
Wortart: vi
Wort mit Artikel: nuotare
Femininum / Plural: ''
IPA: ''
Definition: schwimmen
Register: ''
Beispielsätze: |-
  Ieri ho *nuotato* per un’ora nella piscina coperta.
  Gestern habe ich eine Stunde im Hallenbad *geschwommen*.
  
  Se non avesse paura dell’acqua, Marco *nuoterebbe* ogni estate al lago.
  Wenn er keine Angst vor Wasser hätte, würde Marco jeden Sommer am See *schwimmen*.
  
  Credo che tu *nuoti* molto meglio di quanto tu dica.
  Ich glaube, du *schwimmst* viel besser, als du behauptest.
  
  Mentre *nuotavo*, ho visto un pesce abbastanza grande vicino alla riva.
  Während ich *schwamm*, habe ich einen recht großen Fisch in Ufernähe gesehen.
  
  Dopo aver *nuotato*, mi sento sempre più rilassato e libero.
  Nach dem *Schwimmen* fühle ich mich immer entspannter und freier.
