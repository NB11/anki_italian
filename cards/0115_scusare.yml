Rang: 115
Wort: scusare
Wortart: vt
Wort mit Artikel: scusare
Femininum / Plural: ''
IPA: ''
Definition: entschuldigen
Register: ''
Beispielsätze: |-
  *Scusa* per il ritardo, non l’ho fatto apposta.
  Ich *entschuldige* mich für die Verspätung, das war nicht Absicht.
  
  Mi *scuserai* se non sono venuto alla festa ieri sera?
  *Wirst du* mir *entschuldigen*, wenn ich gestern Abend nicht zur Party gekommen bin?
  
  Avrei dovuto *scusarmi* prima, ma ero troppo timido.
  Ich hätte mich früher *entschuldigen* sollen, aber ich war zu schüchtern.
  
  Non mi *scusa* mai! È davvero fastidioso.
  Du *entschuldigst* dich nie! Das ist wirklich nervig.
  
  Se avessi sbagliato, *scusami* senza problemi.
  Wenn ich einen Fehler gemacht hätte, *entschuldige mich* einfach.
