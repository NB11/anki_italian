Rang: 1752
Wort: testimoniare
Wortart: v
Wort mit Artikel: testimoniare
Femininum / Plural: ''
IPA: ''
Definition: bezeugen, aussagen
Register: ''
Beispielsätze: |-
  Il testimone ha *testimoniato* in tribunale di ciò che ha visto.
  Der Zeuge hat vor Gericht *bezeugt*, was er gesehen hat.
  
  Anche se la situazione era difficile, ho deciso di *testimoniare* la verità.
  Obwohl die Situation schwierig war, habe ich beschlossen, die Wahrheit *auszusagen*.
  
  La polizia chiede che tu *testimoni* contro il sospettato domani mattina.
  Die Polizei verlangt, dass du morgen früh gegen den Verdächtigen *aussagst*.
  
  Se non avessi *testimoniato*, nessuno avrebbe mai saputo tutta la storia.
  Hätte ich nicht *bezeugt*, hätte niemand die ganze Geschichte erfahren.
  
  Nonostante la paura, lei è riuscita a *testimoniare* senza tremare.
  Trotz der Angst hat sie es geschafft, *auszusagen*, ohne zu zittern.
