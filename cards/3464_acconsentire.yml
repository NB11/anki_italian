Rang: 3464
Wort: acconsentire
Wortart: vi
Wort mit Artikel: acconsentire
Femininum / Plural: ''
IPA: ''
Definition: zustimmen, einwilligen, genehmigen
Register: ''
Beispielsätze: |-
  Il consiglio comunale dovrebbe *acconsentire* entro domani alla nuova legge regionale.
  Der Stadtrat sollte der neuen regionalen Gesetzgebung *zustimmen*.
  
  Nonostante la mia insistenza, mio padre non volle *acconsentire* al mio viaggio all’estero da solo.
  Trotz meinem Drängen wollte mein Vater nicht *einwilligen*, dass ich allein ins Ausland reise.
  
  Il direttore ha detto che acconsentirà a finanziare il progetto solo se i risultati saranno convincenti.
  Der Direktor hat gesagt, dass er das Projekt nur *genehmigen* wird, falls die Ergebnisse überzeugend sind.
  
  Se tu gli *acconsentissi*, ti aiuterebbe volentieri con la traduzione.
  Wenn du ihm *zustimmst*, würde er dir gern bei der Übersetzung helfen.
  
  Il giudice acconsentì alla richiesta del legale, rimandando il verdetto a settimana prossima.
  Der Richter *genehmigte* den Antrag des Anwalts und verschob das Urteil auf nächste Woche.
