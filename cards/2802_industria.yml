  Viele junge Leute suchen Arbeit in der *Technologieindustrie*, weil sie höhere Gehälter bietet.
  
  L’*industria* italiana è famosa in tutto il mondo per la sua qualità e creatività.
  Die *italienische Industrie* ist weltweit für ihre Qualität und Kreativität berühmt.
