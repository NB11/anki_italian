Rang: 3809
Wort: sol
Wortart: n.m
Wort mit Artikel: il sol
Femininum / Plural: i soli
IPA: ''
Definition: die Sonne
Register: ''
Beispielsätze: |-
  Il *sole* splendeva luminoso nel cielo blu di luglio.
  Die *Sonne* schien hell am blauen Himmel im Juli.
  
  Dopo la lunga pioggia, abbiamo finalmente rivisto il *sole* che riscaldava le strade.
  Nach dem langen Regen haben wir die *Sonne* endlich wieder die Straßen erwärmen sehen.
  
  Spero che domani, quando uscirò, il *sole* splenderà di nuovo.
  Ich hoffe, dass morgen, wenn ich ausgehe, die *Sonne* wieder scheinen wird.
  
  Era così buio nella stanza che non si vedeva neanche un raggio di *sole*.
  Es war so dunkel im Zimmer, dass man nicht einmal einen Strahl der *Sonne* sah.
  
  Se non avessimo inquinato tanto l’aria, il *sole* sarebbe ancora più potente come energia.
  Wenn wir die Luft nicht so stark verschmutzt hätten, wäre die *Sonne* als Energiequelle noch mächtiger.
