Rang: 2913
Wort: mancia
Wortart: n.f
Wort mit Artikel: la mancia
Femininum / Plural: mance
IPA: ''
Definition: das Trinkgeld, -er
Register: ''
Beispielsätze: |-
  In questo ristorante lasciano sempre una *mancia* ai camerieri.
  In diesem Restaurant geben sie den Kellnern immer *ein Trinkgeld*.
  
  Vor di pagare ho controllato che nella ricevuta ci fosse scritto l’importo della *mancia*.
  Vor dem Bezahlen habe ich überprüft, ob auf der Rechnung der Betrag des *Trinkgelds* stand.
  
  Se non lasci una *mancia*, il cameriere potrebbe essere maleducato con te.
  Wenn du *Trinkgeld* lässt, könnte der Kellner freundlicher zu dir sein.
  
  Abbiamo discusso se fosse giusto dare una *mancia* così alta in quel locale.
  Wir haben diskutiert, ob es richtig war, in diesem Lokal ein so hohes *Trinkgeld* zu geben.
  
  Chiunque entri in quel ristorante riceve una *mancia* automatica di cinque euro.
  Jeder, der dieses Restaurant betritt, erhält automatisch *ein Trinkgeld* von fünf Euro.
