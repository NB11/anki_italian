Rang: 3078
Wort: lampada
Wortart: n.f
Wort mit Artikel: la lampada
Femininum / Plural: lampade
IPA: ''
Definition: die Lampe, -n
Register: ''
Beispielsätze: |-
  Ho comprato *una lampada* nuova per il salotto perché la vecchia si è rotta.
  Ich habe eine *Lampe* neu gekauft, weil die alte kaputtgegangen ist.
  
  Dobbiamo spegnere *la lampada* prima di uscire, altrimenti sprechiamo energia elettrica.
  Wir müssen die *Lampe* ausschalten, bevor wir ausgehen, sonst verschwenden wir Strom.
  
  Nonostante il buio, lei ha acceso *lampade* di emergenza per poter continuare a lavorare.
  Trotz der Dunkelheit hat sie Notfall-*Lampen* eingeschaltet, um weiterarbeiten zu können.
  
  Se avessi più soldi, vorrei installare *lampade* a LED in tutta la casa per risparmiare.
  Wenn ich mehr Geld hätte, würde ich LED-*Lampen* im ganzen Haus installieren, um zu sparen.
  
  Il pittore ha scelto *la lampada* come oggetto principale del suo quadro per simboleggiare la luce della conoscenza.
  Der Maler hat die *Lampe* als Hauptgegenstand seines Bildes gewählt, um das Licht der Erkenntnis zu symbolisieren.
