Rang: 4440
Wort: cancelliere
Wortart: n.m./n.f.
Wort mit Artikel: il cancelliere
Femininum / Plural: cancellieri
IPA: ''
Definition: der Kanzler, - / die Kanzlerin, -nen
Register: ''
Beispielsätze: |-
  Il *cancelliere* ha annunciato nuove misure economiche durante la conferenza stampa.
  Der *Kanzler* hat neue wirtschaftliche Maßnahmen während der Pressekonferenz angekündigt.
  
  Chiunque critichi il *cancelliere* rischia di essere accusato di tradimento.
  Wer den *Kanzler* kritisiert, riskiert, des Verrats beschuldigt zu werden.
  
  Spero che il prossimo *cancelliere* sappia gestire meglio questa crisi.
  Ich hoffe, dass der nächste *Kanzler* diese Krise besser bewältigen kann.
  
  Il *cancelliere* ha firmato il decreto ieri sera, nonostante le proteste.
  Der *Kanzler* hat das Dekret gestern Abend unterzeichnet, trotz der Proteste.
  
  Se il *cancelliere* non avesse agito, la situazione sarebbe degenerata in pochi giorni.
  Hätte der *Kanzler* nicht gehandelt, wäre die Situation innerhalb weniger Tage eskaliert.
