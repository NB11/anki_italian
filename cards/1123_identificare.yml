Rang: 1123
Wort: identificare
Wortart: v
Wort mit Artikel: identificare
Femininum / Plural: ''
IPA: ''
Definition: identifizieren, erkennen
Register: ''
Beispielsätze: |-
  Gli investigatori sono riusciti a *identificare* il colpevole grazie alle impronte digitali sul furgone abbandonato.
  Die Ermittler konnten den Schuldigen anhand der Fingerabdrücke auf dem verlassenen Transporter *identifizieren*.
  
  Non riesco a *identificare* questo odore: proviene dalla cucina o dalla soffitta?
  Ich kann diesen Geruch nicht *erkennen*: kommt er aus der Küche oder dem Dachboden?
  
  L’avvocato ha giurato di *identificare* chi ha rubato i documenti ufficiali dal suo ufficio.
  Der Anwalt hat geschworen, denjenigen zu *identifizieren*, der die amtlichen Unterlagen aus seinem Büro gestohlen hat.
  
  Se non riesci a *identificare* la fonte del problema, non potrai risolverlo, disse il maestro al suo alunno.
  Wenn du die Quelle des Problems nicht *erkennen* kannst, wirst du es nicht lösen, sagte der Lehrer zu seinem Schüler.
  
  La polizia ha confermato che gli agenti hanno *identificato* almeno due proiettili sparati durante l’aggressione nel villaggio.
  Die Polizei bestätigte, dass die Beamten mindestens zwei Geschosse *identifiziert* haben, die während des Angriffs im Dorf abgefeuert wurden.
