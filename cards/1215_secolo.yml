Rang: 1215
Wort: secolo
Wortart: n.m
Wort mit Artikel: il secolo
Femininum / Plural: secoli
IPA: ''
Definition: das Jahrhundert, -e
Register: ''
Beispielsätze: |-
  In questo *secolo* la tecnologia ha cambiato completamente la nostra vita quotidiana.
  In diesem *Jahrhundert* hat die Technologie unser tägliches Leben komplett verändert.
  
  All’inizio del ventesimo *secolo* molti immigrati arrivarono negli Stati Uniti.
  Zu Beginn des zwanzigsten *Jahrhunderts* kamen viele Einwanderer in die USA.
  
  Credo che il prossimo *secolo* affronteremo nuove sfide ambientali.
  Ich glaube, dass wir im nächsten *Jahrhundert* neue Umwelt Herausforderungen bewältigen müssen.
  
  Durante il Rinascimento, l’Italia era al centro del mondo per cultura e arte e per quasi tre *secoli* ha dominato l’Europa.
  Während der Renaissance war Italien dank Kultur und Kunst fast drei *Jahrhunderte* lang das Zentrum Europas.
  
  Non potei credere di aver vissuto in tre diversi *secoli*: ero nato nel Novecento e ora sono nel Ventunesimo!
  Ich konnte nicht glauben, in drei verschiedenen *Jahrhunderten* gelebt zu haben: Ich wurde im 20. Jahrhundert geboren und bin jetzt im 21.
