Rang: 4171
Wort: altare
Wortart: n.m
Wort mit Artikel: l'altare
Femininum / Plural: altari
IPA: ''
Definition: der Altar, -e
Register: ''
Beispielsätze: |-
  L'*altare* della chiesa era adornato di fiori bianchi per la cerimonia.
  Der *Altar* der Kirche war mit weißen Blumen für die Zeremonie geschmückt.
  
  Non appena arrivammo, ci inginocchiammo dinanzi all'*altare* maggiore.
  Sobald wir ankamen, knieten wir vor dem Hoch*altar* nieder.
  
  Il prete benedì l'*altare* nuove prima di consacrarlo.
  Der Priester segnete den neuen *Altar*, bevor er ihn weihte.
  
  Dopo secoli intatti, l'*altare* fu finalmente restaurato dagli esperti.
  Nach Jahrhunderten unversehrt wurde der *Altar* endlich von Experten restauriert.
  
  Mentre passeggiavo, vidi un uomo inginocchiato all'*altare* laterale della cappella.
  Während ich spazierte, sah ich einen Mann, der vor dem Seit*altar* der Kapelle kniete.
