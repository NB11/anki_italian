Rang: 468
Wort: omicidio
Wortart: n.m
Wort mit Artikel: l'omicidio
Femininum / Plural: omicidi
IPA: ''
Definition: der Mord, -e
Register: ''
Beispielsätze: |-
  L'*omicidio* è un crimine molto grave secondo la legge.
  Der *Mord* ist nach dem Gesetz ein sehr schweres Verbrechen.
  
  Stai indagando su un *omicidio* avvenuto la scorsa settimana?
  Untersuchst du einen *Mord*, der letzte Woche passiert ist?
  
  Hanno accusato lui dell'*omicidio* della moglie.
  Sie haben ihn des *Mordes* an seiner Frau beschuldigt.
  
  Se scopriremo il vero colpevole, eviteremo un altro *omicidio*.
  Wenn wir den wahren Täter finden, verhindern wir einen weiteren *Mord*.
  
  Senza prove concrete non possiamo incriminarlo per *omicidio*.
  Ohne konkrete Beweise können wir ihn nicht wegen *Mordes* anklagen.
