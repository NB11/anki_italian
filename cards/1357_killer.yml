Rang: 1357
Wort: killer
Wortart: n.m
Wort mit Artikel: il killer
Femininum / Plural: killer
IPA: ''
Definition: der Killer, - / der Mörder, -
Register: ''
Beispielsätze: |-
  L'ispettore ha scoperto che il *killer* proveniva da una famiglia particolare, con un oscuro talento per la violenza.
  Der *Inspektor* stellte fest, dass der Mörder aus einer besonderen Familie stammte, mit einem dunklen Talent für Gewalt.
  
  Sai che l'assistente del *killer* è fuggito dopo aver visto l'atto criminale che aveva provocato?
  Weißt du, dass der *Assistent* des Mörders geflohen ist, nachdem er die kriminelle Handlung gesehen hatte, die er ausgelöst hatte?
  
  Se domani *sabato* non avrai voglia di rifare il letto, almeno non sprecare l'erba fresca che sta crescendo nel giardino.
  Wenn du am *Samstag* keine Lust hast, das Bett zu erneuern, verschwende wenigstens nicht das frische Gras, das im Garten wächst.
  
  È chiaro che il *killer* ha agito seguendo le indicazioni di qualcuno, ma nessuno sembra voler assumersi la propria opinione pubblicamente.
  Es ist *klar*, dass der Mörder jemandes Anweisungen gefolgt ist, doch scheint niemand bereit, öffentlich seine Meinung zu vertreten.
  
  Nonostante la distanza che li separava, il *killer* riuscì a rintracciare la sua vittima in meno di venti minuti a velocità folle.
  Trotz der *Entfernung*, die sie trennte, gelang es dem Mörder, sein Opfer in weniger als zwanzig Minuten mit irrwitziger Geschwindigkeit aufzuspüren.
