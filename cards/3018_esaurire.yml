Rang: 3018
Wort: esaurire
Wortart: v
Wort mit Artikel: esaurire
Femininum / Plural: ''
IPA: ''
Definition: aufbrauchen, erschöpfen
Register: ''
Beispielsätze: |-
  Se *esaurisci* tutte le energie prima di pranzo, non riuscirai a concentrarti nel pomeriggio.
  Wenn du alle *Energien* vor dem Mittag aufbrauchst, wirst du dich am Nachmittag nicht konzentrieren können.
  
  Il negoziante ha dovuto *esaurire* le scorte prima della chiusura estiva.
  Der Händler musste die *Bestände* vor dem Sommerurlaub erschöpfen.
  
  Credi che basti *esaurire* ogni possibilità per trovare una soluzione?
  Glaubst du, dass es reicht, jede *Möglichkeit* aufzubrauchen, um eine Lösung zu finden?
  
  Non appena *ho esaurito* il carburante, la macchina si è fermata in mezzo alla strada.
  Sobald ich den *Treibstoff* aufgebraucht habe, blieb das Auto mitten auf der Straße stehen.
  
  Per *esaurire* ogni dubbio, gli scienziati hanno ripetuto l’esperimento più volte.
  Um jeden *Zweifel* auszuräumen, haben die Wissenschaftler das Experiment mehrmals wiederholt.
