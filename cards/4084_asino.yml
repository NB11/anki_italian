Rang: 4084
Wort: asino
Wortart: n.m
Wort mit Artikel: l'asino
Femininum / Plural: gli asini
IPA: ''
Definition: der Esel, -
Register: ''
Beispielsätze: |-
  Mio fratello ha comprato *un asino* per lavorare nel campo.
  Mein Bruder hat einen *Esel* gekauft, um auf dem Feld zu arbeiten.
  
  Non essere *asino*! Leggi prima le istruzioni.
  Sei nicht so ein *Esel*! Lies erst die Anleitung.
  
  Se avessi *un asino*, potrei trasportare i materiali da costruzione in cantiere più facilmente.
  Wenn ich einen *Esel* hätte, könnte ich die Baumaterialien auf der Baustelle leichter transportieren.
  
  L’animale che vedi è un *asino* molto testardo.
  Das Tier, das du siehst, ist ein sehr *sturer Esel*.
  
  Anche se sembra *asino*, in realtà è molto intelligente quando si tratta di seguire le regole.
  Auch wenn er wie ein *Esel* wirkt, ist er in Wirklichkeit sehr klug, wenn es um das Befolgen von Regeln geht.
