Rang: 1320
Wort: venerdì
Wortart: n.m
Wort mit Artikel: il venerdì
Femininum / Plural: ''
IPA: ''
Definition: der Freitag, -e
Register: ''
Beispielsätze: |-
  Che ne pensi di organizzare una gita al mare *venerdì* prossimo?
  Was hältst du davon, einen Ausflug ans Meer am *Freitag* vorzuschlagen?
  
  Ho finalmente ricevuto la risposta: ci incontreremo *venerdì* sera alle otto in piazza.
  Ich habe endlich die Antwort erhalten: Wir treffen uns am *Freitag*abend um acht Uhr auf dem Platz.
  
  Ultimamente non vedo Marco, ma *venerdì* dovrebbe apparire al suo solito bar per un caffè.
  In letzter Zeit sehe ich Marco nicht, aber am *Freitag* sollte er in seiner Stammbar für einen Kaffee auftauchen.
  
  Se non parti oggi, non riuscirai ad arrivare in tempo per il concerto di *venerdì* sera!
  Wenn du nicht heute losfährst, schaffst du es nicht rechtzeitig zum Konzert am *Freitag*abend!
  
  La polizia ha confermato che l'uomo ucciso è stato trovato in un quartiere vicino alla spiaggia *venerdì* mattina presto.
  Die Polizei bestätigte, dass der erschlagene Mann am *Freitag* in einem Viertel nahe dem Strand gefunden wurde.
