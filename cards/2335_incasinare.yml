Rang: 2335
Wort: incasinare
Wortart: v
Wort mit Artikel: incasinare
Femininum / Plural: ''
IPA: ''
Definition: durcheinanderbringen, vermasseln
Register: ''
Beispielsätze: |-
  Se non *incasini* tutto, possiamo partire domani mattina.
  Wenn du nicht alles *durcheinanderbringst*, können wir morgen früh losfahren.
  
  Credo che abbia *incasinato* le pratiche per la pratica.
  Ich glaube, er hat die Unterlagen für den Ordner *vermasselt*.
  
  Non volevo *incasinare* le cose, ma non sapevo come fare altrimenti.
  Ich wollte die Sachen nicht *durcheinanderbringen*, aber mir fiel keine andere Lösung ein.
  
  Se *incasini* ancora i documenti, perderemo il volo.
  Wenn du die Dokumente noch einmal *vermasselst*, verpassen wir den Flug.
  
  Vorresti *incasinare* tutto solo perché sei arrabbiato con me?
  Willst du wirklich alles *durcheinanderbringen* nur weil du auf mich wütend bist?
