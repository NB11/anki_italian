Rang: 1617
Wort: traffico
Wortart: n.m
Wort mit Artikel: il traffico
Femininum / Plural: traffici
IPA: ''
Definition: der Verkehr, -e
Register: ''
Beispielsätze: |-
  A Roma *traffico* è sempre intenso, specialmente la mattina.
  In Rom ist der *Verkehr* immer intensiv, besonders am Morgen.
  
  Visto che *traffico* è insostenibile, abbiamo deciso di prendere il treno.
  Da der *Verkehr* unerträglich ist, haben wir beschlossen, den Zug zu nehmen.
  
  Nonostante il *traffico*, sono arrivato puntuale grazie al GPS sulla mia scrivania.
  Trotz des *Verkehrs* bin ich pünktlich angekommen dank des GPS auf meinem Schreibtisch.
  
  Se domani *traffico* sarà minore, potremo andare al lago per un picnic.
  Wenn morgen der *Verkehr* geringer ist, können wir zum See für ein Picknick gehen.
  
  Mi dispiace, ma con questo *traffico* non arriveremo in tempo per l’inizio dello spettacolo al teatro.
  Es tut mir leid, aber mit diesem *Verkehr* werden wir nicht rechtzeitig zur Vorstellung im Theater ankommen.
