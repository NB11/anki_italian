Rang: 3907
Wort: calendario
Wortart: n.m
Wort mit Artikel: il calendario
Femininum / Plural: calendari
IPA: ''
Definition: der Kalender, -
Register: ''
Beispielsätze: |-
  Dove ho messo *il calendario* del 2024? Non lo trovo più.
  Wo habe ich *den Kalender* von 2024 hingelegt? Ich finde ihn nicht mehr.
  
  Se avessi *il calendario* sottomano, potrei prenotare la visita dal medico senza problemi.
  Wenn ich *den Kalender* zur Hand hätte, könnte ich den Arzttermin problemlos buchen.
  
  Non dimenticare di aggiornare *il calendario* con le scadenze del progetto.
  Vergiss nicht, *den Kalender* mit den Projektfristen zu aktualisieren.
  
  In *calendario* sono segnati tutti i compleanni della famiglia, così non sfugge nessuno.
  In *dem Kalender* sind alle Geburtstage der Familie notiert, damit keiner vergessen wird.
  
  Mi hanno regalato *un calendario* con le foto delle Alpi: è così bello che lo appendo in ufficio.
  Man hat mir *einen Kalender* mit Alpenfotos geschenkt – er ist so schön, dass ich ihn im Büro aufhängen werde.
