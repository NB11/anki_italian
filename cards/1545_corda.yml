Rang: 1545
Wort: corda
Wortart: n.f
Wort mit Artikel: la corda
Femininum / Plural: corde
IPA: ''
Definition: das Seil, -e
Register: ''
Beispielsätze: |-
  La *corda* era troppo corta per legare il pacco.
  Das *Seil* war zu kurz, um das Paket zu binden.
  
  Gli alpinisti controllano sempre la *corda* prima di partire.
  Die Bergsteiger prüfen vor dem Aufstieg immer das *Seil*.
  
  Spero che la *corda* che ho comprato sia abbastanza resistente per l’arrampicata.
  Ich hoffe, dass das *Seil*, das ich gekauft habe, beim Klettern stabil genug ist.
  
  Nonostante la *corda* fosse sottile, riuscì a sostenere il peso dell’attrezzatura.
  Trotz des dünnen *Seils* hielt es das Gewicht der Ausrüstung aus.
  
  La *corda* che hai usato per il bucato si è sganciata e ora tutto è bagnato!
  Das *Seil*, das du zum Aufhängen der Wäsche benutzt hast, hat sich gelöst und jetzt ist alles nass!
