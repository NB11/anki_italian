Rang: 958
Wort: godere
Wortart: v
Wort mit Artikel: godere
Femininum / Plural: ''
IPA: ''
Definition: genießen
Register: ''
Beispielsätze: |-
  Quest’estate ho *goduto* di ogni momento della vacanza al mare.
  Diesen Sommer habe ich jeden Moment des Urlaubs am Meer *genossen*.
  
  Se avessi più tempo libero, *goderei* della compagnia dei miei amici ogni giorno.
  Wenn ich mehr Freizeit hätte, würde ich die Gesellschaft meiner Freunde jeden Tag *genießen*.
  
  Nonostante la riunione fosse chiusa, molti dipendenti volevano *godere* di un po’ di libertà.
  Obwohl die Besprechung *geschlossen* war, wollten viele Mitarbeiter ein bisschen Freiheit genießen.
  
  Credimi, nessuno sa *godere* della vita come fa tua sorella: sempre allegra e ottimista!
  Glaub mir, niemand weiß das Leben so zu *genießen* wie deine Schwester: immer fröhlich und optimistisch!
  
  Prima di lasciarci, mi invitò a *godere* della natura, perché ‘è l’unica cosa che non possiamo riprodurre in laboratorio’.
  Bevor wir uns verabschiedeten, lud er mich ein, die Natur zu *genießen*, denn ‘sie ist das Einzige, was wir nicht im Labor reproduzieren können’.
