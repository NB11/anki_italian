Rang: 4286
Wort: scheletro
Wortart: n.m
Wort mit Artikel: lo scheletro
Femininum / Plural: scheletri
IPA: ''
Definition: das Skelett, -e
Register: ''
Beispielsätze: |-
  Lo *scheletro* umano è composto da 206 ossa fondamentali.
  Das menschliche *Skelett* besteht aus 206 grundlegenden Knochen.
  
  Durante l'esplorazione, trovammo un *scheletro* di dinosauro nel deserto.
  Während der Erkundung fanden wir ein *Skelett* eines Dinosauriers in der Wüste.
  
  Il medico ha detto che quell'infortunio potrebbe compromettere la salute del mio *scheletro*.
  Der Arzt sagte, dass diese Verletzung die Gesundheit meines *Skeletts* gefährden könnte.
  
  Nonostante l'età, il suo *scheletro* è ancora molto robusto.
  Trotz des Alters ist sein *Skelett* noch sehr widerstandsfähig.
  
  Lo studio dell'*scheletro* ci aiuta a capire l'evoluzione della specie.
  Die Erforschung des *Skeletts* hilft uns, die Evolution der Spezies zu verstehen.
