Rang: 3837
Wort: omicida
Wortart: n.m
Wort mit Artikel: il omicida
Femininum / Plural: omicidi
IPA: ''
Definition: der Mörder, - / die Mörderin, -nen
Register: ''
Beispielsätze: |-
  L'*omicida* è stato arrestato dalla polizia dopo una lunga caccia all'uomo.
  Der *Mörder* wurde nach einer langen Fahndung von der Polizei verhaftet.
  
  Nonostante le prove schiaccianti, l'*omicida* continua a proclamare la sua innocenza.
  Trotz überwältigender Beweise beteuert der *Mörder* weiterhin seine Unschuld.
  
  Chi avrebbe mai pensato che il tranquillo vicino fosse un *omicida*?
  Wer hätte je gedacht, dass der ruhige Nachbar ein *Mörder* war?
  
  L'*omicida* ha confessato solo dopo aver visto le immagini della videosorveglianza.
  Der *Mörder* gestand erst, als er die Aufnahmen der Überwachungskamera sah.
  
  Se l'*omicida* fosse ancora in libertà, metterebbe in pericolo molti altri innocenti.
  Wenn der *Mörder* noch auf freiem Fuß wäre, würde er viele weitere Unschuldige gefährden.
