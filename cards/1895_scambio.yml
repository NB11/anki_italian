Beispielsätze: |-
  Lo *scambio* di opinioni è fondamentale per risolvere i conflitti.
  Der *Austausch* von Meinungen ist grundlegend, um Konflikte zu lösen.
  
  Hanno fatto uno *scambio* di libri alla festa del paese.
  Sie haben einen *Austausch* von Büchern auf dem Dorffest gemacht.
  
  Vorrei che ci fosse uno *scambio* culturale tra le nostre scuole.
  Ich wünschte, es gäbe einen kulturellen *Austausch* zwischen unseren Schulen.
  
  Lo *scambio* di valuta è molto più complicato di quanto pensassi.
  Der *Austausch* von Währungen ist viel komplizierter, als ich dachte.
  
  Gli *scambi* commerciali tra i due paesi sono aumentati del 20% quest'anno.
  Die Handels*austausche* zwischen den beiden Ländern sind dieses Jahr um 20% gestiegen.
