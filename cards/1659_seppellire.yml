Rang: 1659
Wort: seppellire
Wortart: vt
Wort mit Artikel: seppellire
Femininum / Plural: ''
IPA: ''
Definition: begraben, bestatten, beerdigen
Register: ''
Beispielsätze: |-
  Il *seppellisce* il suo cane nel giardino di casa con grande dolore.
  Er *beerdigt* seinen Hund im Garten mit großer Trauer.
  
  Dobbiamo *seppellire* queste vecchie versioni prima che qualcuno le trovi.
  Wir müssen diese alten *Versionen* beerdigen, bevor jemand sie findet.
  
  Se non *seppelliamo* presto il cadavere, attireremo solo insetti nel vicolo.
  Wenn wir die Leiche nicht bald *beerdigen*, locken wir nur Insekten in die Gasse.
  
  Il medico legale dice che è meglio *seppellire* il baby in un luogo sicuro.
  Der Gerichtsmediziner sagt, es ist besser, das *winzige* Baby an einem sicheren Ort zu beerdigen.
  
  Anche se volessi, non potrei *seppellire* questo segreto in nessuna crisi del mondo.
  Selbst wenn ich wollte, könnte ich dieses Geheimnis in keiner *Krise* der Welt beerdigen.
