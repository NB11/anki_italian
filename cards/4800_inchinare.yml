Rang: 4800
Wort: inchinare
Wortart: v
Wort mit Artikel: inchinare
Femininum / Plural: ''
IPA: ''
Definition: sich verbeugen
Register: ''
Beispielsätze: |-
  Quando incontri un anziano, è cortese *inchinarsi* leggermente.
  Wenn man einen Älteren trifft, ist es höflich, sich leicht zu *verbeugen*.
  
  Il servo si è *inchinato* profondamente di fronte al re.
  Der Diener hat sich tief vor dem König zu *verbeugen*.
  
  Mi piacerebbe *inchinare* il capo al suo coraggio eccezionale.
  Ich würde mich gern vor seinem außergewöhnlichen Mut *verbeugen*.
  
  Non è necessario *inchinarsi* se non si è a corte!
  Man muss sich nicht zu *verbeugen*, wenn man nicht am Hof ist!
  
  Si *inchinò* per raccogliere il fazzoletto che aveva fatto cadere.
  Er *verbeugte* sich, um das Tuch aufzuheben, das ihm heruntergefallen war.
