Rang: 545
Wort: riguardare
Wortart: v
Wort mit Artikel: riguardare
Femininum / Plural: ''
IPA: ''
Definition: betreffen
Register: ''
Beispielsätze: |-
  Questo problema *riguarda* tutti i dipendenti dell'azienda.
  Dieses Problem betrifft alle Mitarbeiter des Unternehmens.
  
  Non capisco perché *riguardassi* la tua scelta di non venire al viaggio.
  Ich verstehe nicht, warum dich deine Wahl, nicht mit auf die Reise zu gehen, *betraf*.
  
  Se *riguarderà* anche la salute, dovremo cambiare i nostri piani.
  Falls es auch die Gesundheit *betreffen wird*, müssen wir unsere Pläne ändern.
  
  È chiaro che la voce del direttore *riguardi* direttamente il progetto.
  Es ist klar, dass die Stimme des Direktors das Projekt direkt *betrifft*.
  
  Questo errore *riguarda* solamente te, quindi cerca di calmare gli animi.
  Dieser Fehler betrifft *nur* dich, also versuch, die Gemüter zu beruhigen.
Audio: ''
Notiz: ''
Dispersion: ''
