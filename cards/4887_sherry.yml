Beispielsätze: |-
  Vuoi un bicchiere di *sherry* o preferisci del vino rosso?
  Möchtest du ein Glas *Sherry* oder lieber Rotwein?
  
  Devi provare questo *sherry* invecchiato vent’anni: è straordinario!
  Du musst diesen *Sherry*, der zwanzig Jahre gereift ist, probieren: er ist außergewöhnlich!
  
  Non ho mai assaggiato un *sherry* così dolce prima d’ora.
  Ich habe noch nie einen so süßen *Sherry* probiert.
  
  Lo zio offre sempre un *sherry* ai suoi ospiti prima di cena.
  Der Onkel bietet seinen Gästen vor dem Abendessen immer einen *Sherry* an.
  
  Appena entrato, notai che il vino in cantina era tutto *sherry* e nessun altro tipo.
  Kaum war ich eingetreten, bemerkte ich, dass der Wein im Keller ausschließlich *Sherry* und keine andere Sorte war.
