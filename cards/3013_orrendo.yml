Rang: 3013
Wort: orrendo
Wortart: adj
Wort mit Artikel: orrendo
Femininum / Plural: ''
IPA: ''
Definition: entsetzlich, fürchterlich, grauenhaft, schrecklich
Register: ''
Beispielsätze: |-
  Il film che abbiamo visto ieri sera era *orrendo* al punto che ci siamo addormentati dopo mezz'ora.
  Der Film, den wir gestern Abend gesehen haben, war so *entsetzlich*, dass wir nach einer halben Stunde eingeschlafen sind.
  
  Nonostante l'avvertimento, ha deciso di frequentare quel *orrendo* gruppo di persone.
  Trotz der Warnung hat er beschlossen, sich mit dieser *fürchterlichen* Gruppe von Leuten zu umgeben.
  
  Pensavo che il cibo fosse normale, ma dopo il primo boccone mi sono accorto quanto fosse *orrendo*.
  Ich dachte, das Essen sei normal, aber nach dem ersten Bissen merkte ich, wie *grauenhaft* es war.
  
  Se avessi saputo che il risultato sarebbe stato *orrendo*, non avrei accettato di partecipare a quell'esperimento.
  Wenn ich gewusst hätte, dass das Ergebnis so *entsetzlich* ausfallen würde, hätte ich nie an diesem Experiment teilgenommen.
  
  La stanza era così *orrenda* che abbiamo deciso di non pagare la cauzione e siamo andati via senza discutere.
  Das Zimmer war so *schrecklich*, dass wir beschlossen, die Kaution nicht zu zahlen, und gingen ohne Diskussion.
