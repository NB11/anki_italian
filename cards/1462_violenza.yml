Rang: 1462
Wort: violenza
Wortart: n.f
Wort mit Artikel: la violenza
Femininum / Plural: violenze
IPA: ''
Definition: die Gewalt, -en
Register: ''
Beispielsätze: |-
  La polizia ha fermato due uomini che erano coinvolti in atti di *violenza* durante la manifestazione.
  Die Polizei hat zwei Männer festgenommen, die an Akten von *Gewalt* während der Demonstration beteiligt waren.
  
  Se tuo fratello continua a comportarsi così, finirà per fare *violenza* a qualcuno.
  Wenn dein Bruder sich weiterhin so benimmt, wird er noch *Gewalt* gegen jemanden anwenden.
  
  Credo che la *violenza* non sia mai la soluzione, ma purtroppo alcuni preferiscono rispondere con la forza.
  Ich glaube, dass *Gewalt* nie die Lösung ist, aber leider bevorzugen einige, mit Gewalt zu antworten.
  
  Dopo il litigio, si vergognava così tanto da non riuscire a guardare in faccia nessuno ed evitare così altre *violenze*.
  Nach dem Streit schämte er sich so sehr, dass er niemanden ansehen konnte und so weitere *Gewalt* vermied.
  
  Le autorità hanno promesso di porre fine a ogni forma di *violenza* nelle carceri dove detenuti e guardie devono vivere assieme.
  Die Behörden haben versprochen, jede Form von *Gewalt* in den Gefängnissen zu beenden, wo Häftlinge und Wärter zusammenleben müssen.
