Rang: 2590
Wort: giustificare
Wortart: vt
Wort mit Artikel: giustificare
Femininum / Plural: ''
IPA: ''
Definition: begründen, rechtfertigen
Register: ''
Beispielsätze: |-
  Devi *giustificare* le tue assenze con una certificazione medica.
  Du musst deine Fehlzeiten mit einer ärztlichen *Bestätigung* begründen.
  
  Non posso *giustificare* il tuo comportamento di fronte al capo.
  Ich kann dein Verhalten dem Chef gegenüber nicht *rechtfertigen*.
  
  L’avvocato ha cercato di *giustificare* il cliente in tribunale, ma invano.
  Der Anwalt versuchte, den Mandanten vor Gericht zu *entschuldigen*, doch vergeblich.
  
  Se non *giustifichi* la spesa, la contabilità non la approverà.
  Wenn du die Ausgabe nicht *begründest*, wird die Buchhaltung sie nicht genehmigen.
  
  Siate sinceri: non c’è modo di *giustificare* un simile ritardo.
  Seid ehrlich: Es gibt keine Möglichkeit, eine solche Verspätung zu *entschuldigen*.
Audio: ''
Notiz: ''
Dispersion: ''
