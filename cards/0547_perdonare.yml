Rang: 547
Wort: perdonare
Wortart: v
Wort mit Artikel: perdonare
Femininum / Plural: ''
IPA: ''
Definition: verzeihen, vergeben
Register: ''
Beispielsätze: |-
  Se *perdonare* qualcuno non è semplice, ma ci provo comunque.
  Wenn es nicht einfach ist, *jemanden zu verzeihen*, versuche ich es trotzdem.
  
  Nonostante l’errore, la professoressa ha detto che vuole *perdonare* tutti gli studenti.
  Trotz des *Fehlers* sagte die Lehrerin, sie wolle allen Schülern vergeben.
  
  Mi ha chiesto se *perdonavo* ancora le persone che mi avevano fregato a scuola.
  Er fragte mich, ob ich den Leuten, die mich in der *Schule betrogen* hatten, immer noch verzeihe.
  
  Spero che tu *perdonerai* i cavalli per il rumore che fanno di notte!
  Ich hoffe, du wirst den *Pferden* verzeihen wegen des Lärms, den sie nachts machen!
  
  Se avessi saputo che avrebbe *perdonato* la mia cattiva scelta, non avrei alzato la voce con lui.
  Hätte ich gewusst, dass er meine *schlechte Wahl* verziehen hätte, hätte ich nicht die Stimme gegen ihn erhoben.
