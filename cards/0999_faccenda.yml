Rang: 999
Wort: faccenda
Wortart: n.f
Wort mit Artikel: la faccenda
Femininum / Plural: faccende
IPA: ''
Definition: die Angelegenheit, -en
Register: ''
Beispielsätze: |-
  La *faccenda* del progetto è ancora in sospeso e non sappiamo come capitare.
  Die *Angelegenheit* des Projekts ist noch offen und wir wissen nicht, wie sie passieren wird.
  
  Dopo l'uscita dal ristorante, ho dovuto occuparmi di una *faccenda* urgente.
  Nach dem *Ausgang* aus dem Restaurant musste ich mich um eine Angelegenheit kümmern.
  
  Nonostante la sua calma, la *faccenda* si è complicata e ha dovuto chiamare la polizia.
  Trotz seiner *Ruhe* hat sich die Angelegenheit kompliziert und er musste die Polizei zurückrufen.
  
  La *faccenda* di cui ti parlo riguarda un attore famoso che vuole inventare una nuova carriera.
  Die *Angelegenheit*, von der ich dir erzähle, betrifft einen bekannten Schauspieler, der eine neue Laufbahn erfinden möchte.
  
  Se non risolvi questa *faccenda*, dovrai rischiare tutto il lavoro che hai fatto finora.
  Wenn du diese *Angelegenheit* nicht löst, wirst du alles, was du bisher gemacht hast, wagen müssen.
