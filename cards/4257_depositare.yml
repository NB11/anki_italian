Rang: 4257
Wort: depositare
Wortart: vt
Wort mit Artikel: depositare
Femininum / Plural: ''
IPA: ''
Definition: hinterlegen, deponieren, einzahlen
Register: ''
Beispielsätze: |-
  Ha bisogno di *depositare* tutti i soldi prima di partire per il viaggio.
  Er muss das ganze Geld *hinterlegen*, bevor er abreist.
  
  Vorrei *depositare* questo documento nella cassaforte dell'albergo.
  Ich möchte dieses Dokument im Hotelsafe *deponieren*.
  
  Non appena arrivo in banca, dovrò *depositare* l'assegno che ho ricevuto.
  Sobald ich in der Bank ankomme, muss ich den Scheck, den ich bekommen habe, *einzahlen*.
  
  La polizia ha ordinato di *depositare* tutte le armi prima di entrare nell'edificio.
  Die Polizei hat angeordnet, alle Waffen *abzugeben*, bevor man das Gebäude betritt.
  
  Se non *depositi* la cauzione entro domani, perderai il diritto all'affitto dell'appartamento.
  Wenn du die Kaution nicht bis morgen *hinterlegst*, verlierst du das Anrecht auf die Wohnung.
