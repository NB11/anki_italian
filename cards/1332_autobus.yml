Rang: 1332
Wort: autobus
Wortart: n.m
Wort mit Artikel: l'autobus
Femininum / Plural: gli autobus
IPA: ''
Definition: der Bus, -se
Register: ''
Beispielsätze: |-
  L'*autobus* numero 15 parte ogni mezz'ora dal quartiere vicino alla spiaggia dove vado spesso la domenica mattina.
  Der *Bus* Nummer 15 fährt alle halbe Stunde aus dem Viertel in der Nähe des Strandes, wo ich oft am Sonntagmorgen hingehe.
  
  Se perdi l'*autobus*, puoi sempre prendere la metropolitana, che costa quasi come un biglietto dell'autobus nel centro città.
  Wenn du den *Bus* verpasst, kannst du immer noch die U-Bahn nehmen, die fast so viel wie ein Busticket im Stadtzentrum kostet.
  
  Ho visto un *autobus* con una pubblicità che parlava di un prodotto nuovo, ma non ricordo di cosa si trattasse.
  Ich habe einen *Bus* mit einer Werbung gesehen, die über ein neues Produkt sprach, aber ich erinnere mich nicht mehr, worum es ging.
  
  Quando ero piccolo, mio padre mi portava spesso a fare un giro sull'*autobus* della linea 22 perché era molto breve e costava poco.
  Als ich klein war, brachte mich mein Vater oft mit dem *Bus* der Linie 22 mit, weil er sehr kurz war und wenig kostete.
  
  Mi dispiace, non posso partecipare alla gita di sabato perché l'*autobus* parte troppo presto e non ho voglia di alzarmi così presto al mattino.
  Es tut mir leid, ich kann nicht an der *Samstag*sexkursion teilnehmen, weil der Bus zu früh abfährt und ich keine Lust habe, morgens so früh aufzustehen.
