Rang: 4845
Wort: costituzione
Wortart: n.f
Wort mit Artikel: la costituzione
Femininum / Plural: costituzioni
IPA: ''
Definition: die Verfassung, -en
Register: ''
Beispielsätze: |-
  La *costituzione* italiana è entrata in vigore nel 1948.
  Die *Verfassung* Italiens trat 1948 in Kraft.
  
  Secondo la *costituzione*, tutti i cittadini sono uguali davanti alla legge.
  Laut der *Verfassung* sind alle Bürger vor dem Gesetz gleich.
  
  Hanno modificato la *costituzione* per includere nuovi diritti sociali.
  Sie haben die *Verfassung* verändert, um neue soziale Rechte aufzunehmen.
  
  Se la *costituzione* fosse stata rispettata, non ci sarebbero stati questi conflitti.
  Wenn die *Verfassung* eingehalten worden wäre, gäbe es diese Konflikte nicht.
  
  La *costituzione* prevede che ogni cittadino possa partecipare alla vita politica.
  Die *Verfassung* sieht vor, dass jeder Bürger am politischen Leben teilnehmen kann.
