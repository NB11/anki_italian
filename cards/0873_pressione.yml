Rang: 873
Wort: pressione
Wortart: n.f
Wort mit Artikel: la pressione
Femininum / Plural: pressioni
IPA: ''
Definition: der Druck, -e, -s
Register: ''
Beispielsätze: |-
  Ho notato che c'è una *pressione* troppo alta nel tubo dell'acqua.
  Ich habe festgestellt, dass es einen zu hohen *Druck* im Wasserrohr gibt.
  
  La *pressione* atmosferica diminuisce quando saliamo in montagna.
  Der atmosphärische *Druck* nimmt ab, wenn wir auf einen Berg steigen.
  
  Se la *pressione* non scende, dobbiamo chiamare un tecnico subito.
  Wenn der *Druck* nicht sinkt, müssen wir sofort einen Techniker rufen.
  
  Nonostante la *pressione* sociale, lui ha deciso di seguire il suo sogno privato di aprire un ristorante di pesce.
  Trotz des sozialen *Drucks* hat er sich entschieden, seinem privaten Traum zu folgen und ein Fischrestaurant zu eröffnen.
  
  Non capisco perché la *pressione* qui è sempre così instabile, sembra un segnale che qualcosa non va.
  Ich verstehe nicht, warum der *Druck* hier immer so instabil ist, es wirkt wie ein Signal, dass etwas nicht stimmt.
