Rang: 3971
Wort: innocuo
Wortart: adj
Wort mit Artikel: innocuo
Femininum / Plural: ''
IPA: ''
Definition: harmlos, ungefährlich
Register: ''
Beispielsätze: |-
  Questa pianta è *innocua* per gli animali domestici.
  Diese Pflanze ist *harmlos* für Haustiere.
  
  Non preoccuparti, il suo commento era del tutto *innocuo* e non voleva offendere nessuno.
  Keine Sorge, seine Bemerkung war völlig *harmlos* und sollte niemanden beleidigen.
  
  Il veterinario ha assicurato che il morso del cane era *innocuo* e non richiedeva cure specifiche.
  Der Tierarzt versicherte, dass der Hundebiss *harmlos* war und keine spezifische Behandlung erforderte.
  
  Sebbene sembrasse minaccioso, l’insetto si rivelò essere *innocuo* e innocente.
  Obwohl er bedrohlich wirkte, stellte sich das Insekt als *harmlos* und unschuldig heraus.
  
  Secondo lo studio, la maggior parte dei batteri presenti nell’aria è *innocua* per l’uomo.
  Laut der Studie ist der Großteil der in der Luft vorhandenen Bakterien *harmlos* für den Menschen.
