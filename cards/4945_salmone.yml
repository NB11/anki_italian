Rang: 4945
Wort: salmone
Wortart: n.m
Wort mit Artikel: il salmone
Femininum / Plural: salmoni
IPA: ''
Definition: der Lachs, -e
Register: ''
Beispielsätze: |-
  A cena mangeremo *salmone* alla griglia con contorno di verdure grigliate.
  Zum Abendessen werden wir *Lachs* vom Grill mit gegrilltem Gemüse essen.
  
  Ho acquistato del *salmone* affumicato per preparare dei canapè raffinati.
  Ich habe geräucherten *Lachs* gekauft, um feine Canapés zuzubereiten.
  
  Non è vero che *salmone* fa sempre ingrassare: dipende dalla preparazione.
  Es stimmt nicht, dass *Lachs* immer dick macht: Es kommt auf die Zubereitung an.
  
  Se avessi più tempo, vorrei imparare a cucinare *salmone* al forno con le erbe.
  Wenn ich mehr Zeit hätte, würde ich lernen, *Lachs* im Ofen mit Kräutern zu kochen.
  
  Il ristorante offre un piatto a base di *salmone* marinato con lime e miele, davvero delizioso.
  Das Restaurant bietet ein Gericht mit *Lachs*, mariniert mit Limette und Honig – wirklich köstlich.
