Rang: 729
Wort: ritornare
Wortart: vi
Wort mit Artikel: ritornare
Femininum / Plural: ''
IPA: ''
Definition: zurückkehren, zurückkommen
Register: ''
Beispielsätze: |-
  Dopo il lavoro ho voglia di *ritornare* a casa e rilassarmi.
  Nach der Arbeit habe ich Lust, nach Hause zu *kehren* und mich zu entspannen.
  
  Se non avessi perso le chiavi, non sarei dovuto *ritornare* alla stazione.
  Wenn ich nicht die Schlüssel verloren hätte, hätte ich nicht zur Station zurück*kehren* müssen.
  
  Anche se pioveva, siamo *ritornati* al parco per il compleanno di Marco.
  Auch wenn es geregnet hat, sind wir zum Geburtstag von Marco in den Park zurückge*kehrt*.
  
  Credo che domani *ritornerai* a trovare la tua anima gemella in quella sala da ballo.
  Ich glaube, dass du morgen deine Seelenverwandte in jenem Tanzsaal wiederfinden wirst.
  
  Mi hanno detto che lui vorrebbe *ritornare* ai suoi vecchi errori, ma non è possibile.
  Man hat mir gesagt, dass er zu seinen alten Fehlern zurück*kehren* möchte, aber das ist nicht möglich.
