Beispielsätze: |-
  Quando *ritorni* dalla vacanza, raccontami tutto!
  Wenn du *zurückkom*st aus dem Urlaub, erzähl mir alles!
  
  Dopo anni in Germania, è *ritornato* in Italia per lavorare.
  Nach Jahren in Deutschland ist er *zurückgekehrt* nach Italien, um zu arbeiten.
  
  Spero che *ritorni* presto a trovarci.
  Ich hoffe, dass du bald *zurückkommst*, um uns zu besuchen.
  
  Se *ritorni* a casa tardi, avvertimi!
  Wenn du *zurückkommst* spät nach Hause, warne mich!
  
  Dicono che *ritornerà* a casa per Natale.
  Sie sagen, dass er *zurückkehren* wird zu Hause für Weihnachten.
