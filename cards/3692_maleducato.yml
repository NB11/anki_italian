Rang: 3692
Wort: maleducato
Wortart: adj
Wort mit Artikel: maleducato
Femininum / Plural: ''
IPA: ''
Definition: unhöflich, ungebildet
Register: ''
Beispielsätze: |-
  Il bambino ha risposto in modo *maleducato* alla maestra, senza rispetto.
  Das Kind hat in *unhöflicher* Weise auf die Lehrerin geantwortet, ohne Respekt.
  
  Non mi piace affatto il suo comportamento, è sempre così *maleducato* con gli sconosciuti.
  Ich mag sein Verhalten überhaupt nicht, er ist immer so *unhöflich* zu Fremden.
  
  Se fossi stato più *maleducato* con il capo, avrei perso il lavoro già da tempo.
  Wenn ich unhöflicher zu meinem Chef gewesen wäre, hätte ich den Job schon längst verloren.
  
  Non ha nessuna educazione, è davvero un tipo *maleducato* in ogni situazione.
  Er hat überhaupt keine Erziehung, er ist wirklich ein *ungebildeter* Typ in jeder Situation.
  
  Anche se si comporta da *maleducato*, a volte ha dei momenti di gentilezza inaspettati.
  Auch wenn er sich *ungebildet* benimmt, hat er manchmal unerwartet freundliche Momente.
