Beispielsätze: |-
  Durante il viaggio nel West americano, abbiamo visitato un *ranch* dove allevano cavalli e mucche.
  Während der Reise im amerikanischen Westen haben wir einen *Ranchhof* besucht, auf dem Pferde und Kühe gezüchtet werden.
  
  Sogniamo di acquistare un *ranch* in Texas per vivere lontano dalla città.
  Wir träumen davon, einen *Ranchhof* in Texas zu kaufen, um fernab der Stadt zu leben.
  
  Mio zio gestisce un *ranch* da oltre vent'anni e non lo cambierebbe con nulla al mondo.
  Mein Onkel bewirtschaftet einen *Ranchhof* seit über zwanzig Jahren und würde ihn für nichts auf der Welt hergeben.
  
  Nonostante le difficoltà, loro hanno deciso di trasferirsi in un *ranch* isolato per iniziare una vita nuova.
  Trotz der Schwierigkeiten haben sie beschlossen, in einen abgelegenen *Ranchhof* umzuziehen, um ein neues Leben zu beginnen.
  
  Il documentario mostrava come i cowboy lavorano quotidianamente nel *ranch*: mungono le vacche, addestrano i cavalli e riparano le recinzioni.
  Die Dokumentation zeigte, wie Cowboys täglich auf dem *Ranchhof* arbeiten: Sie melken Kühe, züchten Pferde und reparieren Zäune.
