Rang: 22
Wort: venire
Wortart: vi
Wort mit Artikel: venire
Femininum / Plural: ''
IPA: ''
Definition: kommen
Register: ''
Beispielsätze: |-
  Domani *verranno* i miei genitori a cena.
  Morgen *werden* meine Eltern zum Abendessen *kommen*.
  
  Non *vengo* al cinema stasera, sono stanco.
  Ich *komme* heute Abend nicht ins Kino, ich bin müde.
  
  Se *venissi* presto, potremmo parlare un po’ prima della lezione.
  Wenn du früher *kämst*, könnten wir vor der Stunde noch ein bisschen reden.
  
  *Vieni* qui un momento, devo chiederti una cosa.
  *Komm* mal hierher, ich muss dich etwas fragen.
  
  Sono contento che tu sia *venuto* alla festa ieri.
  Ich freue mich, dass du gestern zur Feier *gekommen* bist.
