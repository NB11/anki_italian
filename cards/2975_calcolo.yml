Rang: 2975
Wort: calcolo
Wortart: n.m
Wort mit Artikel: il calcolo
Femininum / Plural: calcoli
IPA: ''
Definition: die Berechnung, -en
Register: ''
Beispielsätze: |-
  Ho fatto un *calcolo* preciso per determinare l'orbita della cometa.
  Ich habe eine *Berechnung* durchgeführt, um die Umlaufbahn des Kometen zu bestimmen.
  
  Secondo il *calcolo* del fisico, l'energia necessaria sarà enorme.
  Laut der *Berechnung* des Physikers wird die benötigte Energie enorm sein.
  
  Faremo un *calcolo* più dettagliato prima di prendere una decisione.
  Wir werden eine genauere *Berechnung* durchführen, bevor wir eine Entscheidung treffen.
  
  Il *calcolo* mentale è una competenza che si può migliorare con la pratica.
  Das Kopfrechnen ist eine Fähigkeit, die man durch Übung verbessern kann.
  
  Il tuo *calcolo* dei costi non tiene conto delle spese impreviste.
  Deine *Berechnung* der Kosten berücksichtigt die unerwarteten Ausgaben nicht.
