Rang: 1450
Wort: incazzarsi
Wortart: v
Wort mit Artikel: incazzarsi
Femininum / Plural: ''
IPA: ''
Definition: sich aufregen, wütend werden
Register: ''
Beispielsätze: |-
  Non *ti incazzare* per così poco, è solo un cambiamento normale.
  Reg dich nicht so *auf*, das ist doch nur eine normale Veränderung.
  
  Quando il sindaco ha parlato male della nostra pratica, tutti *ci siamo incazzati*!
  Als der *Bürgermeister* schlecht über unsere Praxis gesprochen hat, haben wir uns alle aufgeregt!
  
  Avrei *incazzato* se avessi saputo che mi hanno strappato la giacca nuova.
  Ich hätte mich *aufgeregt*, wenn ich gewusst hätte, dass man mir die neue Jacke zerrissen hat.
  
  Se non *ti incazzi* per ogni piccolezza, vivrai stupendo.
  Wenn du dich nicht über jede *Kleinigkeit* aufregst, wirst du ein wunderbares Leben führen.
  
  Dicono che domattina il giocatore si *incazzerà* perché non gli hanno rilasciato il credito per il viaggio.
  Man sagt, dass sich der *Spieler* morgen früh aufregen wird, weil man ihm den Kredit für die Reise nicht freigegeben hat.
