Rang: 3548
Wort: onestà
Wortart: n.f
Wort mit Artikel: la onestà
Femininum / Plural: onestà
IPA: ''
Definition: "die Ehrlichkeit, die Redlichkeit"
Register: ''
Beispielsätze: |-
  Per *onestà* non posso nascondere che ho perso il tuo libro.
  Aus *Ehrlichkeit* kann ich nicht verbergen, dass ich dein Buch verloren habe.
  
  La tua *onestà* è ciò che apprezzo di più in te.
  Deine *Redlichkeit* ist es, was ich an dir am meisten schätze.
  
  Se avessi avuto più *onestà*, non ci sarebbero state queste complicazioni.
  Hättest du mehr *Ehrlichkeit* besessen, gäbe es diese Komplikationen nicht.
  
  Nonostante tutto, mantenne la *onestà* fino alla fine.
  Trotz allem bewahrte er bis zum Ende seine *Redlichkeit*.
  
  Vorrei che la *onestà* fosse più comune in política.
  Ich wünschte, die *Ehrlichkeit* wäre in der Politik häufiger.
