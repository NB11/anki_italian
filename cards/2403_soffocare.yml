Rang: 2403
Wort: soffocare
Wortart: vt
Wort mit Artikel: soffocare
Femininum / Plural: ''
IPA: ''
Definition: ersticken, erdrosseln, unterdrücken
Register: ''
Beispielsätze: |-
  Non *soffocare* la tua creatività con troppe regole rigide.
  Ersticke deine Kreativität nicht mit zu vielen strengen Regeln.
  
  Il fumo delle sigarette può *soffocare* gli alveoli polmonari.
  Der Rauch der Zigaretten kann die Lungenbläschen *ersticken*.
  
  Se non apri la finestra, rischi di *soffocare* in questa stanza chiusa.
  Wenn du das Fenster nicht öffnest, wirst du in diesem geschlossenen Raum *ersticken*.
  
  La polizia ha cercato di *soffocare* le proteste con la forza.
  Die Polizei hat versucht, die Proteste mit Gewalt zu *unterdrücken*.
  
  Non vorrei che il calore eccessivo potesse *soffocare* la produzione di vino nel nostro cantina.
  Ich möchte nicht, dass die übermäßige Hitze die Weinproduktion in unserem Keller *unterdrückt*.
