Rang: 4632
Wort: scansione
Wortart: n.m
Wort mit Artikel: la scansione
Femininum / Plural: scansioni
IPA: ''
Definition: das Scannen, die *Scan*-Vorgänge
Register: ''
Beispielsätze: |-
  La *scansione* del documento è terminata in meno di un minuto.
  Das *Scannen* des Dokuments dauerte weniger als eine Minute.
  
  Dobbiamo fare una nuova *scansione* del quadro perché la prima era sfocata.
  Wir müssen eine neue *Scan*-Vorgang des Gemäldes machen, denn der erste war unscharf.
  
  Con questa app puoi fare la *scansione* di un documento direttamente dal telefono.
  Mit dieser App kannst du die *Scan*-Vorgang eines Dokuments direkt vom Handy aus machen.
  
  La *scansione* della retina serve per diagnosticare alcune malattie degli occhi.
  Die *Scan*-Vorgang der Netzhaut dient zur Diagnose bestimmter Augenkrankheiten.
  
  Dopo la *scansione* dei file, cancella quelli vecchi per liberare spazio.
  Nach der *Scan*-Vorgang der Dateien lösche die alten, um Speicherplatz freizumachen.
