Rang: 75
Wort: conoscere
Wortart: vt
Wort mit Artikel: conoscere
Femininum / Plural: ''
IPA: ''
Definition: kennen, wissen
Register: ''
Beispielsätze: |-
  Io *conosco* bene la città di Roma.
  Ich *kenne* die Stadt Rom gut.
  
  Lui ha *conosciuto* sua moglie a una festa.
  Er hat seine Frau auf einer Party *kennengelernt*.
  
  Conosci questo film? È molto bello!
  *Kennst* du diesen Film? Er ist sehr gut!
  
  Se *conoscessi* la risposta, te la direi subito.
  Wenn ich die *Antwort wüsste*, würde ich sie dir sofort sagen.
  
  Spero che tu possa *conoscere* i tuoi nuovi colleghi presto.
  Ich hoffe, dass du deine neuen Kollegen bald *kennenzulernen* wirst.
