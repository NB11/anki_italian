Rang: 1020
Wort: coltello
Wortart: n.m
Wort mit Artikel: il coltello
Femininum / Plural: coltelli
IPA: ''
Definition: das Messer, -
Register: ''
Beispielsätze: |-
  Ho bisogno di un *coltello* affilato per tagliare il pane in questo ristorante.
  Ich brauche ein *scharfes Messer*, um das Brot in diesem Restaurant zu schneiden.
  
  Mentre preparavo la cena, *coltello* è scivolato e ho rischiato di ferirmi.
  Während ich das Abendessen vorbereitete, *rutschte das Messer* und ich hätte mich fast verletzt.
  
  Non *coltello* sicuro che abbiamo trovato nel suo bagaglio potrebbe essere usato come arma.
  Das *unsichere Messer*, das wir in seinem Gepäck fanden, könnte als Waffe verwendet werden.
  
  Se vuoi aprire questa scatola, ti consiglio di usare un *coltello* più robusto di quello.
  Wenn du diese Kiste öffnen möchtest, rate ich dir, ein *robusteres Messer* als dieses zu verwenden.
  
  Ha confessato di aver usato il *coltello* per difendersi durante la battaglia nel sud.
  Er gestand, das *Messer* zur Selbstverteidigung während der Schlacht in der Südseite benutzt zu haben.
