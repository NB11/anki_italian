Rang: 2237
Wort: simbolo
Wortart: n.m
Wort mit Artikel: il simbolo
Femininum / Plural: simboli
IPA: ''
Definition: das Symbol, -e
Register: ''
Beispielsätze: |-
  In questa cultura, la colomba è un *simbolo* di pace.
  In dieser Kultur ist die Taube ein *Symbol* des Friedens.
  
  Non capisco il *simbolo* che hai disegnato sulla parete.
  Ich verstehe das *Symbol* nicht, das du an die Wand gezeichnet hast.
  
  L’*simbolo* della farmacia è una croce verde, non un serpente.
  Das *Symbol* der Apotheke ist ein grünes Kreuz, nicht eine Schlange.
  
  Se non riconosci il *simbolo*, chiedi spiegazioni al professore.
  Wenn du das *Symbol* nicht erkennst, frag den Professor nach einer Erklärung.
  
  Nel Medioevo, l’alchimia usava molti *simboli* che oggi risultano incomprensibili.
  Im Mittelalter benutzte die Alchemie viele *Symbole*, die heute unverständlich sind.
