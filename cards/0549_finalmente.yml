Beispielsätze: |-
  Dopo settimane di attesa, *finalmente* abbiamo ricevuto la lettera che attendevamo.
  Nach wochenlangem Warten haben wir *endlich* den Brief bekommen, auf den wir gewartet haben.
  
  Se non ti sbrighi, perderai l'appuntamento e *finalmente* dovrai aspettare ancora!
  Wenn du dich nicht beeilst, verpasst du den *Termin* und musst endlich wieder lange warten!
  
  Nonostante gli errori, il professore ha detto che hai fatto un buon lavoro, *finalmente*!
  Trotz der *Fehler* hat der Lehrer gesagt, dass du gute Arbeit geleistet hast – endlich!
  
  Ho perso la risposta che cercavo, ma *finalmente* l’ho trovata nella camera degli archivi.
  Ich hatte die *Antwort*, die ich gesucht habe, verloren, aber endlich habe ich sie im Fotoraum gefunden.
  
  Appena ho finito di sistemare la scena, *finalmente* ho potuto rilassarmi con un caffè.
  Sobald ich die *Szene* fertig eingerichtet hatte, konnte ich mich endlich mit einem Kaffee entspannen.
