Rang: 4525
Wort: fabbricare
Wortart: vt
Wort mit Artikel: fabbricare
Femininum / Plural: ''
IPA: ''
Definition: herstellen, produzieren
Register: ''
Beispielsätze: |-
  Questa fabbrica *fabbrica* automobili di lusso che vengono esportate in tutto il mondo.
  Diese Fabrik stellt Luxusautos her, die in die ganze Welt exportiert werden.
  
  Se avessi più tempo, *fabbricerei* un violino perfetto con le mie mani.
  Wenn ich mehr Zeit hätte, würde ich eine perfekte Violine mit meinen Händen herstellen.
  
  Il governo ha deciso di *fabbricare* nuovi satelliti per migliorare le comunicazioni.
  Die Regierung hat beschlossen, neue Satelliten herzustellen, um die Kommunikation zu verbessern.
  
  Non credo che lui stia cercando di *fabbricare* una scusa così banale, vero?
  Ich glaube nicht, dass er versucht, solch eine banale Ausrede zu *fabrizieren*, oder?
  
  Da quando hanno aperto il nuovo capanno, hanno iniziato a *fabbricare* attrezzi in legno di ottima qualità.
  Seitdem sie die neue Hütte eröffnet haben, sind sie dazu übergegangen, Werkzeuge aus hervorragendem Holz herzustellen.
