Rang: 1658
Wort: simpatico
Wortart: adj
Wort mit Artikel: simpatico
Femininum / Plural: ''
IPA: ''
Definition: nett, sympathisch, liebenswert, angenehm
Register: ''
Beispielsätze: |-
  Maria è una ragazza molto *simpatica* e tutti la apprezzano.
  Maria ist ein sehr *sympathisches* Mädchen und alle schätzen sie.
  
  Nonostante la crisi, i nostri partner sono rimasti *simpatici* come sempre.
  Trotz der *Krise* sind unsere sympathischen Partner wie immer geblieben.
  
  Vorresti che il tuo prete fosse più *simpatico* in chiesa?
  Möchtest du, dass dein *Priester* in der Kirche sympathischer wäre?
  
  Mi sembra che il suo modo di recitare sia diventato ancora più *simpatico* negli ultimi anni.
  Ich finde, sein *vortragender* Stil ist in den letzten Jahren noch sympathischer geworden.
  
  Non trovavo *simpatica* l’idea di dover scavare tutto il giorno nel magazzino umido.
  Ich fand die Idee nicht *sympathisch*, den ganzen Tag im feuchten Lager graben zu müssen.
