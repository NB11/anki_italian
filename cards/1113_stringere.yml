Rang: 1113
Wort: stringere
Wortart: v
Wort mit Artikel: stringere
Femininum / Plural: ''
IPA: ''
Definition: drücken, festhalten, umarmen; anziehen
Register: ''
Beispielsätze: |-
  Mi chiedi di *stringere* la mano al nuovo collega di lavoro?
  Du bittest mich, der neuen Kollegin der Hand zu *drücken*?
  
  Se non *stringi* bene il nodo, la bottiglia cadrà.
  Wenn du den Knoten nicht fest *hältst*, fällt die Flasche hinunter.
  
  Durante la vacanza abbiamo deciso di *stringere* amicizia con i vicini di furgone.
  Während des Urlaubs beschlossen wir, mit den Nachbarn im Transporter Freundschaft zu *schließen*.
  
  L’infermiere ha dovuto *stringere* il laccio per trovare la vena.
  Die Krankenschwester musste die Aderpresse *anlegen*, um die Vene zu finden.
  
  Nonostante il rumore, il giudice ha continuato a *stringere* l’udienza senza interrompersi.
  Trotz des Lärms setzte der Richter die Verhandlung fort, ohne sich zu *unterbrechen*.
