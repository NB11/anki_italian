Rang: 4627
Wort: diplomare
Wortart: v
Wort mit Artikel: diplomare
Femininum / Plural: ''
IPA: ''
Definition: abschließen, absolvieren
Register: ''
Beispielsätze: |-
  Oggi mi *ho diplomato* in un liceo classico dopo cinque anni di studio intenso.
  Heute habe ich mein Abitur an einem Gymnasium nach fünf Jahren intensiven Lernens *abgeschlossen*.
  
  Vor che tu ti *diplomi*, dovresti pensare a cosa fare dopo la scuola.
  Bevor du dein Studium *abschließt*, solltest du überlegen, was du nach der Schule machen wirst.
  
  Si dice che i ragazzi che *si sono diplomati* con lode abbiano più opportunità lavorative.
  Man sagt, dass Schüler, die ihr Abitur mit Auszeichnung *abgeschlossen* haben, mehr Jobchancen haben.
  
  Nonostante le difficoltà, sono sicuro che riusciremo a *diplomarci* entro la fine dell'anno scolastico.
  Trotz der Schwierigkeiten bin ich sicher, dass wir unser Abitur bis zum Ende des Schuljahres *absolvieren* werden.
  
  Se non avessi *diplomato* con una media alta, non avrei potuto iscrivermi all'università che volevo.
  Hätte ich mein Abitur nicht mit einem guten Notendurchschnitt *abgeschlossen*, könnte ich mich nicht an der Universität einschreiben, die ich wollte.
