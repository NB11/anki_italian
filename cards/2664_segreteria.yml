Rang: 2664
Wort: segreteria
Wortart: n.f
Wort mit Artikel: la segreteria
Femininum / Plural: segreterie
IPA: ''
Definition: das Sekretariat, -e
Register: ''
Beispielsätze: |-
  Ho chiamato in *segreteria* perché avevo bisogno di informazioni sul corso.
  Ich habe mich an das *Sekretariat* gewandt, weil ich Informationen zum Kurs brauchte.
  
  La *segreteria* telefonica era piena di messaggi lasciati dai colleghi.
  Die *Sekretariats*-Anrufbeantworter war voller Nachrichten von Kollegen.
  
  Domani mattina andrò alla *segreteria* dell’università per ritirare i documenti.
  Morgen Vormittag gehe ich zum *Sekretariat* der Universität, um die Dokumente abzuholen.
  
  Se non ricevi risposta, cerca nella *segreteria* del dipartimento.
  Falls du keine Antwort bekommst, schau im *Sekretariat* der Abteilung nach.
  
  La *segreteria* è rimasta aperta fino alle 18 anche questo pomeriggio.
  Das *Sekretariat* hat heute Nachmittag bis 18 Uhr geöffnet.
