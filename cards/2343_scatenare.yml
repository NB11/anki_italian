Rang: 2343
Wort: scatenare
Wortart: vt
Wort mit Artikel: scatenare
Femininum / Plural: ''
IPA: ''
Definition: auslösen, entfesseln
Register: ''
Beispielsätze: |-
  La notizia ha *scatenato* una protesta in piazza.
  Die Nachricht hat eine *Protest* auf dem Platz ausgelöst.
  
  Se continui così, rischi di *scatenare* una guerra tra noi!
  Wenn du so weitermachst, könntest du einen *Krieg* zwischen uns entfesseln!
  
  Ha bevuto troppo vino e ora la rabbia lo spinge a *scatenarsi* contro tutti.
  Er hat zu viel Wein getrunken und jetzt treibt ihn der Zorn dazu, gegen alle *sich zu entladen*.
  
  Non volevi *scatenare* questo casino, ma ora non sai più come rimediare.
  Du wolltest keinen *Chaos* auslösen, aber jetzt weißt du nicht mehr, wie du ihn beheben sollst.
  
  Il nuovo film di Scorsese sembra *scatenare* emozioni forti in ogni spettatore.
  Scorseses neuer Film scheint bei jedem Zuschauer starke *Gefühle* auszulösen.
Audio: ''
