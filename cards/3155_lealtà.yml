Rang: 3155
Wort: lealtà
Wortart: n.f
Wort mit Artikel: la lealtà
Femininum / Plural: lealtà
IPA: ''
Definition: die Loyalität, Treue
Register: ''
Beispielsätze: |-
  La *lealtà* del suo amico è fuori discussione, anche nei momenti più difficili.
  Die *Loyalität* seines Freundes steht außer Frage, selbst in den schwierigsten Momenten.
  
  Chi tradisce la *lealtà* verso la famiglia non merita rispetto.
  Wer die *Loyalität* gegenüber der Familie bricht, verdient keinen Respekt.
  
  Nonostante tutto, lui ha sempre dimostrato una *lealtà* incrollabile nei nostri confronti.
  Trotz allem hat er uns gegenüber stets eine unerschütterliche *Treue* bewiesen.
  
  La *lealtà* è un valore che non si compra né si vende, ma si guadagna ogni giorno.
  Die *Loyalität* ist ein Wert, den man nicht kaufen oder verkaufen kann, sondern den man jeden Tag verdient.
  
  Se non c'è *lealtà*, non può esistere una relazione duratura.
  Ohne *Loyalität* kann es keine dauerhafte Beziehung geben.
