Rang: 4683
Wort: umiliante
Wortart: adj
Wort mit Artikel: umiliante
Femininum / Plural: ''
IPA: ''
Definition: erniedrigend, demütigend
Register: ''
Beispielsätze: |-
  È stato un episodio *umiliante* per lui quando ha perso il lavoro davanti a tutti i colleghi.
  Es war eine *erniedrigende* Episode für ihn, als er vor allen Kollegen seine Arbeit verlor.
  
  La sconfitta così netta mi sembrava *umiliante*, anche se non volevo ammetterlo.
  Die so klare Niederlage erschien mir *demütigend*, auch wenn ich es nicht zugeben wollte.
  
  Se avessi saputo che la situazione sarebbe divenuta *umiliante*, avrei evitato di partecipare.
  Hätte ich gewusst, dass die Situation *erniedrigend* würde, hätte ich darauf verzichtet teilzunehmen.
  
  Nonostante *umiliante* sia una parola forte, a volte descrive bene certe esperienze.
  Auch wenn *demütigend* ein starkes Wort ist, beschreibt es manchmal Erfahrungen gut.
  
  Chi ha vissuto *umilianti* sconfitte sa quanto sia difficile dimenticare.
  Wer *erniedrigende* Niederlagen erlebt hat, weiß, wie schwer es ist, sie zu vergessen.
