Rang: 1125
Wort: risparmiare
Wortart: vt
Wort mit Artikel: risparmiare
Femininum / Plural: ''
IPA: ''
Definition: sparen, zurücklegen
Register: ''
Beispielsätze: |-
  Se vuoi *risparmiare* per il viaggio, devi ridurre le spese superflue ogni mese.
  Wenn du für die Reise *sparen* willst, musst du jeden Monat die überflüssigen Ausgaben reduzieren.
  
  Mi hanno detto che *risparmiare* energia aiuta l’ambiente e anche il portafoglio.
  Man hat mir gesagt, dass man durch das *Sparen* von Energie der Umwelt hilft und auch dem Geldbeutel.
  
  Mi dispiace, ma non possiamo *risparmiare* così tanto da comprare una casa quest’anno.
  Es tut mir leid, aber wir können nicht so viel *sparen*, dass wir dieses Jahr ein Haus kaufen können.
  
  Lui *risparmia* da anni per comprare una nuova radio per il suo ufficio al dipartimento di fisica.
  Er *spart* seit Jahren, um ein neues Radio für sein Büro in der physikalischen Abteilung zu kaufen.
  
  Anche se guadagni poco, cercate di *risparmiare* qualcosa ogni settimana per i college dei vostri figli.
  Auch wenn ihr wenig verdient, versucht, jede Woche etwas für die *College*-Gelder eurer Kinder zu sparen.
