Rang: 3572
Wort: ego
Wortart: n.m
Wort mit Artikel: l'ego
Femininum / Plural: egoi
IPA: ''
Definition: das Ich, das Selbst
Register: ''
Beispielsätze: |-
  L'*ego* di Marco è molto sviluppato.
  Das *Ich* von Marco ist sehr ausgeprägt.
  
  Non mi interessa il tuo *ego*, ma solo i fatti.
  Mich interessiert nicht dein *Ego*, sondern nur die Fakten.
  
  Secondo Freud, l'*ego* media tra desideri e realtà.
  Laut Freud vermittelt das *Ich* zwischen Wünschen und Realität.
  
  Ha tanto *ego* che non ascolta mai gli altri.
  Er hat so viel *Ego*, dass er anderen nie zuhört.
  
  L'*ego* può essere sia un aiuto che un ostacolo nella vita.
  Das *Ich* kann im Leben sowohl eine Hilfe als auch ein Hindernis sein.
