Rang: 4266
Wort: coincidere
Wortart: vi
Wort mit Artikel: coincidere
Femininum / Plural: ''
IPA: ''
Definition: zusammenfallen, übereinstimmen
Register: ''
Beispielsätze: |-
  Le sue vacanze *coincidono* con quelle di mio fratello.
  Seine Ferien *fallen* mit denen meines Bruders zusammen.
  
  Il convegno *coinciderà* con l’anniversario della fondazione della società.
  Die Konferenz wird mit dem Gründungsjubiläum der Firma *zusammenfallen*.
  
  Vuoi *coincidere* sempre con le opinioni di tutti?
  Willst du immer mit allen Meinungen *übereinstimmen*?
  
  Temevo che le due versioni non *coincidessero*, ma era solo una mia preoccupazione inutile.
  Ich befürchtete, dass die zwei Versionen nicht *übereinstimmen*, aber es war nur eine unbegründete Sorge.
  
  Se i dati *coincidono*, potremo procedere con l’analisi successiva.
  Wenn die Daten *übereinstimmen*, können wir mit der weiteren Analyse vorgehen.
