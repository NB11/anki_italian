Rang: 3284
Wort: vernice
Wortart: n.f
Wort mit Artikel: la vernice
Femininum / Plural: vernici
IPA: ''
Definition: die Farbe, -n, der Lack, -e
Register: ''
Beispielsätze: |-
  Ho comprato una *vernice* blu per ridipingere il tavolo della cucina.
  Ich habe *die Farbe* blau gekauft, um den Küchentisch neu zu streichen.
  
  Gli artigiani applicano la *vernice* con un pennello sottile per ottenere un risultato preciso.
  Die Handwerker tragen *den Lack* mit einem feinen Pinsel auf, um ein präzises Ergebnis zu erzielen.
  
  Se la *vernice* non si asciuga bene, il lavoro dovrà essere rifatto domani.
  Wenn *die Farbe* nicht gut trocknet, muss die Arbeit morgen noch einmal gemacht werden.
  
  Nel laboratorio di chimica stiamo studiando come la *vernice* reagisce a diverse temperature.
  Im Chemielabor untersuchen wir, wie *der Lack* auf verschiedene Temperaturen reagiert.
  
  Le pareti della stanza dei bambini sono coperte di *vernice* lavabile e resistente ai graffi.
  Die Wände des Kinderzimmers sind mit *der Farbe*, die abwaschbar und kratzfest ist, gestrichen.
