Rang: 1535
Wort: ingannare
Wortart: vt
Wort mit Artikel: ingannare
Femininum / Plural: ''
IPA: ''
Definition: betrügen, täuschen, hintergehen
Register: ''
Beispielsätze: |-
  Non è giusto *ingannare* le persone che si fidano di te.
  Es ist nicht richtig, die Menschen zu *betrügen*, die dir vertrauen.
  
  Se vuoi *ingannare* qualcuno, dovresti almeno essere più astuto di lui.
  Wenn du jemanden *täuschen* willst, solltest du wenigstens schlauer sein als er.
  
  Credo che lui stia cercando di *ingannare* la polizia con false informazioni.
  Ich glaube, dass er versucht, die Polizei mit falschen Informationen *zu täuschen*.
  
  Mi dispiace, ma dovrai *ingannare* la fame con qualcosa di semplice.
  Es tut mir leid, aber du wirst den Hunger mit etwas Einfachem *besänftigen* müssen.
  
  L’artista sa *ingannare* l’occhio con i suoi dipinti realistici.
  Der Künstler kann das Auge mit seinen realistischen Gemälden *täuschen*.
Audio: ''
Notiz: ''
