Rang: 1431
Wort: rilasciare
Wortart: v
Wort mit Artikel: rilasciare
Femininum / Plural: ''
IPA: ''
Definition: freilassen, freigeben, erlassen
Register: ''
Beispielsätze: |-
  Il giudice ha deciso di *rilasciare* il prigioniero dopo cinque anni di carcere.
  Der Richter hat beschlossen, den Gefangenen nach fünf Jahren Haft zu *freilassen*.
  
  Dopo il controllo di sicurezza, l’agente di frontiera mi ha permesso di *rilasciare* la dichiarazione doganale.
  Nach der Sicherheitskontrolle durfte der Grenzbeamte mir das Ausfüllen der Zollerklärung *erlauben*.
  
  Se non obbedisci, il cane potrebbe *rilasciare* i denti sul tuo braccio!
  Wenn du nicht gehorchst, könnte der Hund seine Zähne in deinem Arm *einzusetzen*!
  
  La banca ha promesso di *rilasciare* il credito entro la settimana prossima.
  Die Bank hat versprochen, den Kredit innerhalb der nächsten Woche zu *freigeben*.
  
  Nonostante le proteste della banda, le autorità hanno deciso comunque di *rilasciare* il permesso per la manifestazione.
  Trotz der Proteste der Bande hat die Behörde trotzdem beschlossen, die Genehmigung für die Demonstration zu *erteilt*.
