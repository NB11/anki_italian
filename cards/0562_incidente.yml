Rang: 562
Wort: incidente
Wortart: n.m
Wort mit Artikel: l'incidente
Femininum / Plural: incidenti
IPA: ''
Definition: der Vorfall, -fälle, der Unfall, -fälle
Register: ''
Beispielsätze: |-
  L'*incidente* è avvenuto ieri sera in autostrada.
  Der *Vorfall* ist gestern Abend auf der Autobahn passiert.
  
  Avete visto l'*incidente* a quella macchina?
  Habt ihr den *Unfall* mit diesem Auto gesehen?
  
  Ci sono stati molti *incidenti* a quel incrocio.
  Es gab viele *Unfälle* an dieser Kreuzung.
  
  Non vorrei che succedesse un altro *incidente*!
  Ich möchte nicht, dass noch ein *Vorfall* passiert!
  
  L'*incidente* è stato causato dalla nebbia.
  Der *Unfall* wurde durch den Nebel verursacht.
