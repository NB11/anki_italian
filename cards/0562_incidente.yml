Beispielsätze: |-
  L'*incidente* è avvenuto ieri sera in fretta vicino alla bocca della metropolitana.
  Der *Vorfall* geschah gestern Abend in Eile nahe dem U-Bahn-Eingang.
  
  Nonostante la voce alta del guardia, nessuno ha sentito il suo avvertimento riguardo l'*incidente*.
  Trotz der lauten *Stimme* des Wächters hat niemand seine Warnung bezüglich des Vorfalls gehört.
  
  Se avessi sistemato l'*incidente* prima, non avremmo perso tutto questo programma!
  Hätte ich den *Vorfall* früher behoben, hätten wir nicht dieses ganze Programm verloren!
  
  Chiunque pensi che l'*incidente* sia stato causato dal cattivo cibo si sbaglia di grosso.
  Wer glaubt, dass der *Vorfall* durch das schlechte Essen verursacht wurde, irrt sich gewaltig.
  
  Il medico ha detto che l'*incidente* potrebbe comportare una lunga revisione della salute del paziente.
  Der Arzt sagte, dass der *Vorfall* eine lange Nachprüfung des Gesundheitszustands des Patienten mit sich bringen könnte.
