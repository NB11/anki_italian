Rang: 2955
Wort: ciambella
Wortart: n.f
Wort mit Artikel: la ciambella
Femininum / Plural: ciambelle
IPA: ''
Definition: der Kranzkuchen, -
Register: ''
Beispielsätze: |-
  A colazione ho mangiato una *ciambella* con la marmellata.
  Zum Frühstück habe ich einen *Kranzkuchen* mit Marmelade gegessen.
  
  Nel forno c'è ancora una *ciambella* che si deve raffreddare.
  Im Ofen liegt noch ein *Kranzkuchen*, der abkühlen muss.
  
  Se avessi tempo, preparerei delle *ciambelle* fragranti per tutti i colleghi.
  Wenn ich Zeit hätte, würde ich duftende *Kranzkuchen* für alle Kollegen backen.
  
  Lei afferma che la migliore *ciambella* si trova in quella panetteria vicino al mare.
  Sie behauptet, der beste *Kranzkuchen* befindet sich in jener Bäckerei nahe dem Meer.
  
  Porta questa *ciambella* a tuo fratello, così non dovrà comprare nulla per la merenda.
  Nimm diesen *Kranzkuchen* zu deinem Bruder mit, dann muss er nichts für den Snack kaufen.
