Rang: 994
Wort: riferire
Wortart: v
Wort mit Artikel: riferire
Femininum / Plural: ''
IPA: ''
Definition: berichten, mitteilen, ausrichten, referieren
Register: ''
Beispielsätze: |-
  Il testimone ha *riferito* ai poliziotti ogni dettaglio del crimine che ha visto durante la battaglia.
  Der Zeuge hat den Polizisten jede Einzelheit des Verbrechens *berichtet*, die er während der Schlacht gesehen hat.
  
  Se avessi saputo la verità, *riferirei* immediatamente al capitano della Guardia per aiutare la difesa.
  Wenn ich die Wahrheit gekannt hätte, würde ich es dem Hauptmann der Garde sofort *melden*, um der Verteidigung zu helfen.
  
  Il direttore del laboratorio ci ha comunicato che dovremo *riferire* ogni risultato al nostro sceriffo entro questo periodo.
  Der Laborleiter hat uns mitgeteilt, dass wir dem Sheriff innerhalb dieses Zeitraums jedes Ergebnis *ausrichten* müssen.
  
  Nonostante l’odore di cucina provenisse dal ristorante, nessuno osava *riferire* al proprietario che la cucina era malata.
  Obwohl der Kochgeruch aus dem Restaurant kam, wagte es niemand, dem Besitzer zu *mitteilen*, dass die Küche krank war.
  
  Anche se non amo *riferire* ad altre unità, devo dire che il tuo turno di guardia è stato perfetto in questa caccia al gatto.
  Auch wenn ich es nicht mag, anderen Einheiten zu *berichten*, muss ich sagen, dass deine Wache in dieser Katzensuche perfekt war.
