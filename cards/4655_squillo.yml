Rang: 4655
Wort: squillo
Wortart: n.m
Wort mit Artikel: lo squillo
Femininum / Plural: squilli
IPA: ''
Definition: das Klingeln, Läuten
Register: ''
Beispielsätze: |-
  Ho sentito *lo squillo* del telefono mentre ero sotto la doccia.
  Ich habe *das Klingeln* des Telefons gehört, während ich unter der Dusche war.
  
  Che strano, non si sente *uno squillo* da quando hanno installato i nuovi altoparlanti!
  Komisch, dass man seit den neuen Lautsprechern *ein Klingeln* nicht mehr hört!
  
  Appena *lo squillo* della campanella è cessato, gli studenti sono usciti dalla classe rumorosamente.
  Sobald *das Läuten* der Glocke aufgehört hat, sind die Schüler laut aus dem Klassenzimmer gelaufen.
  
  Mi hanno detto che durante la proiezione del film non si sente *uno squillo*, perché è vietato dai regolamenti comunali.
  Man hat mir gesagt, dass man während der *Filmvorführung* ein Klingeln nicht hört, weil es von den städtischen Vorschriften verboten ist.
  
  Se non senti *lo squillo* della sveglia domattina, vuol dire che la batteria è scarica e va sostituita al più presto.
  Wenn du *das Klingeln* des Weckers morgen früh nicht hörst, dann ist die Batterie leer und muss so schnell wie möglich ersetzt werden.
