Rang: 2251
Wort: temperatura
Wortart: n.f
Wort mit Artikel: la temperatura
Femininum / Plural: temperature
IPA: ''
Definition: die Temperatur, -en
Register: ''
Beispielsätze: |-
  La *temperatura* di oggi è molto più alta rispetto a ieri.
  Die *Temperatur* von heute ist viel höher als gestern.
  
  Nonostante la *temperatura* sia scesa, il paziente non si sente meglio.
  Obwohl die *Temperatur* gesunken ist, fühlt sich der Patient nicht besser.
  
  Se la *temperatura* raggiungerà i 35 gradi, dovremo chiudere le finestre.
  Falls die *Temperatur* 35 Grad erreicht, müssen wir die Fenster schließen.
  
  Mi hanno detto che la *temperatura* ideale per conservare il vino è tra 12 e 14 gradi.
  Mir wurde gesagt, dass die *ideale Temperatur* für die Weinlagerung zwischen 12 und 14 Grad liegt.
  
  Magari questa *temperatura* rimanga costante per tutta la settimana!
  Wenn doch diese *Temperatur* die ganze Woche über konstant bleiben würde!
