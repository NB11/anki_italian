Rang: 1719
Wort: fotografia
Wortart: n.f
Wort mit Artikel: la fotografia
Femininum / Plural: fotografie
IPA: ''
Definition: das Foto, -s
Register: ''
Beispielsätze: |-
  Ho scattato una *fotografia* bellissima durante le vacanze al mare.
  Ich habe ein *Foto* während des Urlaubs am Meer gemacht.
  
  Mi piacciono tutte le *fotografie* che hai scelto per l’album.
  Mir gefallen alle *Fotos*, die du für das Album ausgewählt hast.
  
  Avrei voluto regalarti una *fotografia* di nostro nonno, ma purtroppo non ce l’ho più.
  Ich hätte dir gern ein *Foto* unseres Großvaters geschenkt, aber ich habe es leider nicht mehr.
  
  Non appena avrò sviluppato le *fotografie* di ieri, te le manderò via email.
  Sobald ich die *Fotos* von gestern entwickelt habe, schicke ich sie dir per E-Mail zu.
  
  Le *fotografie* in bianco e nero sono molto apprezzate dagli artisti contemporanei.
  Die *Fotos* in Schwarz-Weiß werden von zeitgenössischen Künstlern sehr geschätzt.
