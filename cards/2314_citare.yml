Rang: 2314
Wort: citare
Wortart: v
Wort mit Artikel: citare
Femininum / Plural: ''
IPA: ''
Definition: zitieren
Register: ''
Beispielsätze: |-
  Nel suo discorso, il professore ha *citato* un passo della Bibbia.
  In seiner Rede hat der Professor einen *Auszug* aus der Bibel zitiert.
  
  Se *citassi* più fonti, il tuo saggio sarebbe più convincente.
  Wenn du mehr Quellen *zitieren* würdest, wäre deine Arbeit überzeugender.
  
  Ho sentito che hanno *citato* il tuo cognome durante la riunione.
  Ich habe gehört, dass sie deinen *Nachnamen* während der Besprechung genannt haben.
  
  Il regista vuole *citare* una scena famosa di un film precedente nello sceneggiatura.
  Der Regisseur möchte eine berühmte Szene aus einem früheren Film im Drehbuch *zitieren*.
  
  Perfino in questa conclusione possiamo *citare* una frase di Dante che spiega bene il concetto.
  Sogar in diesem *Schluss* können wir einen Satz von Dante zitieren, der das Konzept gut erklärt.
