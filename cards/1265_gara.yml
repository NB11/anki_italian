Rang: 1265
Wort: gara
Wortart: n.f
Wort mit Artikel: la gara
Femininum / Plural: gare
IPA: ''
Definition: das Rennen, - / der Wettbewerb, -e
Register: ''
Beispielsätze: |-
  Ho partecipato a una *gara* di corsa ieri mattina.
  Ich habe an einem *Wettbewerb* des Laufens gestern Morgen teilgenommen.
  
  Nonostante il massimo sforzo, non ho vinto la *gara*.
  Trotz des *Höhepunkts* an Anstrengung habe ich den Wettbewerb nicht gewonnen.
  
  Il comandante ha disposto che la *gara* iniziasse alle nove precise.
  Der *Befehlshaber* hat verfügt, dass der Wettbewerb um genau neun Uhr beginnen sollte.
  
  Studenti di tutta Europa si sono incontrati per una *gara* di scienza comune.
  Schüler aus ganz Europa haben sich für einen gemeinsamen *Wettbewerb* der Wissenschaft getroffen.
  
  Se non voli via di *dritto*, rischi di incastrare l’ala nel tetto.
  Wenn du nicht geradeaus fliegst, riskierst du, mit dem Flügel im *Dach* festzustecken.
