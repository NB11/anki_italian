Rang: 618
Wort: ritardo
Wortart: n.m
Wort mit Artikel: il ritardo
Femininum / Plural: ritardi
IPA: ''
Definition: die Verspätung, -en
Register: ''
Beispielsätze: |-
  Il treno è arrivato con un *ritardo* di venti minuti.
  Der Zug ist mit einer *Verspätung* von zwanzig Minuten angekommen.
  
  Nonostante il *ritardo*, siamo riusciti ad arrivare in tempo alla riunione.
  Trotz der *Verspätung* sind wir rechtzeitig zum Treffen gekommen.
  
  Che cosa hai fatto in questo *ritardo*? Hai letto un buon libro o hai solo perso tempo?
  Was hast du während dieser *Verspätung* gemacht? Hast du ein gutes Buch gelesen oder hast du einfach Zeit verschwendet?
  
  Se ci fosse stato un *ritardo* ancora maggiore, avremmo perso il nostro appuntamento con lo zio.
  Falls es eine noch größere *Verspätung* gegeben hätte, hätten wir unser Treffen mit dem Onkel verpasst.
  
  Il *ritardo* del volo è dovuto alla forte nevicata che ha paralizzato l'aeroporto.
  Die *Verspätung* des Fluges ist auf den starken Schneefall zurückzuführen, der den Flughafen lahmgelegt hat.
