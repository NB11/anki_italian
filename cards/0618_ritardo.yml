Rang: 618
Wort: ritardo
Wortart: n.m
Wort mit Artikel: il ritardo
Femininum / Plural: ritardi
IPA: ''
Definition: die Verspätung, -en
Register: ''
Beispielsätze: |-
  Il *ritardo* del treno è di dieci minuti.
  Die *Verspätung* des Zuges beträgt zehn Minuten.
  
  Hai fatto *ritardo* di nuovo oggi?
  Bist du heute schon wieder in *Verspätung*?
  
  Arriverò con qualche minuto di *ritardo*.
  Ich werde mit einigen Minuten *Verspätung* ankommen.
  
  Scusa per il *ritardo*, ero bloccato nel traffico.
  Entschuldige die *Verspätung*, ich war im Stau stecken geblieben.
  
  Se non c'è *ritardo*, possiamo partire alle otto.
  Falls es keine *Verspätung* gibt, können wir um acht losfahren.
