Beispielsätze: |-
  Dopo l’infortunio, il medico gli ha consigliato esercizi *addominali* per rafforzare la muscolatura.
  Nach der Verletzung hat ihm der Arzt *Bauch-Übungen* empfohlen, um die Muskulatur zu stärken.
  
  Ho sempre trovato utile l’allenamento *addominale* per mantenere una postura corretta.
  Ich habe das *Bauchtraining* immer als nützlich empfunden, um eine korrekte Haltung beizubehalten.
  
  Malgrado la sua *addominale* debolezza, ha continuato a correre ogni mattina.
  Trotz seiner *bauchbedingten* Schwäche ist er jeden Morgen weitergelaufen.
  
  Lo *addominale* è una parte fondamentale dell’allenamento fitness per molte persone.
  Die *Bauchmuskulatur* ist für viele Menschen ein zentraler Bestandteil des Fitness-Trainings.
  
  Se non avessi trascurato gli esercizi *addominali*, ora non soffrirei di questi dolori.
  Wenn ich die *Bauchübungen* nicht vernachlässigt hätte, würde ich jetzt nicht unter diesen Schmerzen leiden.
