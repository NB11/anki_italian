Wort mit Artikel: perseguitare
Femininum / Plural: ''
IPA: ''
Definition: verfolgen, bedrängen
Register: ''
Beispielsätze: |-
  Il cane *perseguita* il gatto intorno al giardino.
  Der Hund *verfolgt* die Katze um den Garten herum.
  
  Spero che nessuno ti *persegui*t!
  Ich hoffe, dass dich niemand *bedrängt*!
  
  La polizia sta *perseguitando* i criminali da settimane.
  Die Polizei *verfolgt* die Verbrecher seit Wochen.
  
  È triste quando un artista viene *perseguitato* dalla stampa.
  Es ist traurig, wenn ein Künstler von der Presse *bedrängt* wird.
  
  Se mi *persegui*t ancora, andrò via!
  Wenn du mich nochmals *verfolgst*, gehe ich weg!
