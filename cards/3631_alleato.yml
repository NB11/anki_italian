Rang: 3631
Wort: alleato
Wortart: n.m
Wort mit Artikel: lo alleato
Femininum / Plural: gli alleati
IPA: ''
Definition: der Verbündete, -n
Register: ''
Beispielsätze: |-
  Dopo la seconda guerra mondiale, lo *alleato* più importante degli Stati Uniti fu il Regno Unito.
  Nach dem Zweiten Weltkrieg war der wichtigste *Verbündete* der USA Großbritannien.
  
  Nonostante le divergenze, gli *alleati* hanno sempre trovato un accordo nelle decisioni cruciali.
  Trotz der Meinungsverschiedenheiten haben die *Verbündeten* immer eine Einigung in den entscheidenden Beschlüssen gefunden.
  
  Se fossi stato un suo *alleato*, ti avrei aiutato senza esitare.
  Wäre ich dein *Verbündeter* gewesen, hätte ich dir ohne zu zögern geholfen.
  
  L’Italia ha sempre cercato nuovi *alleati* per rafforzare la sua posizione in Europa.
  Italien hat stets nach neuen *Verbündeten* gesucht, um seine Position in Europa zu stärken.
  
  È fondamentale che i nostri *alleati* sappiano che possiamo contare l’uno sull’altro.
  Es ist entscheidend, dass unsere *Verbündeten* wissen, dass wir uns aufeinander verlassen können.
