Rang: 1173
Wort: merito
Wortart: n.m
Wort mit Artikel: il merito
Femininum / Plural: meriti
IPA: ''
Definition: das Verdienst, -e
Register: ''
Beispielsätze: |-
  Questa vittoria è solo *merito* tuo, hai lavorato sodo!
  Dieser Sieg ist nur *dein Verdienst*, du hast hart gearbeitet!
  
  Non ci sono *meriti* in ciò che hai fatto, solo errori.
  Es gibt keine *Verdienste* in dem, was du getan hast, nur Fehler.
  
  Il premio riconosce il *merito* di anni di ricerca.
  Die Auszeichnung erkennt das *Verdienst* jahrelanger Forschung an.
  
  Credo che il suo successo sia *merito* anche della fortuna.
  Ich glaube, dass sein Erfolg auch *Glück* ist.
  
  A volte non si riceve il *merito* che si merita.
  Manchmal erhält man nicht die *Anerkennung*, die man verdient.
