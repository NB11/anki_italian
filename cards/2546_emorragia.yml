Rang: 2546
Wort: emorragia
Wortart: n.f
Wort mit Artikel: l'emorragia
Femininum / Plural: emorragie
IPA: ''
Definition: die Blutung, -en
Register: ''
Beispielsätze: |-
  Il medico ha diagnosticato un'*emorragia* interna dopo l'incidente.
  Der Arzt hat eine *Blutung* diagnostiziert nach dem Unfall.
  
  Nonostante l'*emorragia*, riuscì a mantenere la calma e chiamare i soccorsi.
  Trotz der *Blutung* gelang es ihm, ruhig zu bleiben und den Notdienst zu rufen.
  
  Se avverti un forte dolore alla testa accompagnato da un'*emorragia* dal naso, chiama subito l'ambulanza!
  Wenn du starke Kopfschmerzen verspürst, begleitet von einer *Blutung* aus der Nase, rufe sofort den Krankenwagen!
  
  L'*emorragia* cerebrale può essere molto pericolosa se non affrontata tempestivamente.
  Ein zerebraler *Hirnblutung* kann sehr gefährlich sein, wenn sie nicht rechtzeitig behandelt wird.
  
  Dopo l'operazione, il paziente ha perso molto sangue a causa di un'*emorragia* postoperatoria.
  Nach der Operation verlor der Patient viel Blut aufgrund einer postoperativen *Blutung*.
