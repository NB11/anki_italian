Rang: 2204
Wort: leccare
Wortart: vt
Wort mit Artikel: leccare
Femininum / Plural: ''
IPA: ''
Definition: ablecken, ablecken
Register: ''
Beispielsätze: |-
  Il cane *lecca* la sua ciotola per pulirla completamente.
  Der Hund *leckt* seine Schüssel sauber.
  
  Avrei voluto *leccare* quel gelato ma era troppo caldo.
  Ich hätte das Eis *ablecken* wollen, aber es war zu heiß.
  
  Non appena apre la porta, il gatto si avvicina per *leccarsi* il pelo.
  Sobald er die Tür öffnet, kommt die Katze, um sich das Fell *zu lecken*.
  
  Mi dispiace, ma non posso *leccare* quella superficie perché è sporca.
  Tut mir leid, aber ich kann diese Fläche nicht *ablecken*, weil sie dreckig ist.
  
  Se avessi tempo, *leccerei* il piatto fino a renderlo lucido come uno specchio.
  Wenn ich Zeit hätte, würde ich den Teller *so ablecken*, bis er spiegelt.
