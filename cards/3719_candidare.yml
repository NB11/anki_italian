Rang: 3719
Wort: candidare
Wortart: v
Wort mit Artikel: candidare
Femininum / Plural: ''
IPA: ''
Definition: kandidieren, sich bewerben
Register: ''
Beispielsätze: |-
  Dopo *candidarsi* alle elezioni, ha ottenuto un seggio in parlamento.
  Nach *sich zu bewerben* bei den Wahlen hat er einen Sitz im Parlament erhalten.
  
  Se *candidassi* per quella posizione, cosa pensi che diranno?
  Wenn du *dich bewerben* würdest für diese Stelle, was glaubst du, was sie sagen würden?
  
  È necessario *candidare* la propria azienda per ricevere finanziamenti pubblici.
  Es ist notwendig *Kredite zu bewerben* für das eigene Unternehmen, um öffentliche Finanzierungen zu erhalten.
  
  Anche se *candiderebbe* ogni anno, nessuno lo assume mai.
  Obwohl er *sich bewerben würde* jedes Jahr, stellt ihn niemand jemals ein.
  
  Hanno deciso di *candidare* il loro figlio per il consiglio scolastico.
  Sie haben beschlossen *ihren Sohn zu kandidieren* für den Schulrat.
