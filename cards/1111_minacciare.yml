Rang: 1111
Wort: minacciare
Wortart: vt
Wort mit Artikel: minacciare
Femininum / Plural: ''
IPA: ''
Definition: bedrohen, drohen
Register: ''
Beispielsätze: |-
  Il *minaccia* con una spada se non gli restituisci i soldi.
  Er *droht* mit einem Schwert, wenn du ihm das Geld nicht zurückgibst.
  
  Ho letto in un articolo che la polizia *minaccia* di interrompere la guida dell’università.
  Ich habe in einem Artikel gelesen, dass die Polizei *droht*, die Führung der Universität zu unterbrechen.
  
  Se continui a fare *rumore*, il maestro ti manderà nell’angolo nero della classe.
  Wenn du weiter *G*eräusche machst, wird dich der Lehrer in die schwarze Ecke des Klassenzimmers* schicken.
  
  Nonostante le teorie del direttore, molti dipendenti *minacciano* di procedere con un ricorso al tribunale.
  Trotz der *Theorien* des Direktors drohen viele Mitarbeiter, vor Gericht zu gehen.
  
  Persino il suo migliore amico gli aveva suggerito di non *minacciare* un infermiere per ottenere un passaggio a casa.
  Sogar sein bester Freund hatte ihm *empfohlen*, einen Krankenpfleger nicht zu bedrohen, um eine Mitfahrgelegenheit nach Hause zu bekommen.
