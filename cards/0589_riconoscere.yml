Rang: 589
Wort: riconoscere
Wortart: vt
Wort mit Artikel: riconoscere
Femininum / Plural: ''
IPA: ''
Definition: erkennen, wiedererkennen
Register: ''
Beispielsätze: |-
  Non *ho riconosciuto* il mio vicino quando l’ho visto in centro ieri.
  Ich habe meinen Nachbarn nicht *wiedererkannt*, als ich ihn gestern in der Innenstadt gesehen habe.
  
  Credo che *riconoscerò* subito l’uomo che mi ha aiutato l’anno scorso.
  Ich glaube, ich werde den Mann, der mir letztes Jahr geholfen hat, sofort *erkennen*.
  
  È difficile *riconoscere* i volti quando indossano una maschera.
  Es ist schwierig, Gesichter *wiederzuerkennen*, wenn sie eine Maske tragen.
  
  Se *riuscirò a riconoscere* le tracce, ti avvertirò immediatamente.
  Wenn ich die Spuren *erkennen* kann, werde ich dich sofort warnen.
  
  Mi dispiace, ma non *riconosco* la tua voce al telefono.
  Es tut mir leid, aber ich *erkenne* deine Stimme am Telefon nicht.
