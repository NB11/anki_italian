Rang: 4956
Wort: dimora
Wortart: n.f
Wort mit Artikel: la dimora
Femininum / Plural: dimore
IPA: ''
Definition: der Wohnsitz, -e, der Wohnort, -e
Register: ''
Beispielsätze: |-
  La *dimora* del direttore è una villa antica con un grande giardino.
  Der *Wohnsitz* des Direktors ist eine alte Villa mit einem großen Garten.
  
  Nonostante le difficoltà economiche, mantengono la loro *dimora* nel centro storico.
  Trotz wirtschaftlicher Schwierigkeiten behalten sie ihren *Wohnort* im historischen Zentrum.
  
  Spero che questa nuova *dimora* ci porti più serenità nel prossimo anno.
  Ich hoffe, dass dieser neue *Wohnsitz* uns im nächsten Jahr mehr Gelassenheit bringt.
  
  La *dimora* estiva dei miei nonni era affacciata sul mare.
  Der sommerliche *Wohnort* meiner Großeltern lag direkt am Meer.
  
  Dopo il trasferimento, hanno venduto la vecchia *dimora* in pochi mesi.
  Nach dem Umzug haben sie den alten *Wohnsitz* innerhalb weniger Monate verkauft.
