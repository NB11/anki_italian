Rang: 4725
Wort: bocciare
Wortart: vt
Wort mit Artikel: bocciare
Femininum / Plural: ''
IPA: ''
Definition: durchfallen lassen, eine Prüfung nicht bestehen
Register: ''
Beispielsätze: |-
  Il professore ha *bocciato* tre studenti perché non avevano studiato abbastanza.
  Der Lehrer hat *drei Schüler durchfallen lassen*, weil sie nicht genug gelernt hatten.
  
  Se non frequenti abbastanza le lezioni, ti *bocceranno* di sicuro!
  Wenn du die Vorlesungen nicht genug besuchst, wirst du *für sicher durchfallen*!
  
  Nonostante i suoi sforzi, lo *hanno bocciato* all'esame di guida per un errore banale.
  Trotz seiner Bemühungen hat man ihn *beim Führerschein durchfallen lassen* wegen eines dummen Fehlers.
  
  Vor di *bocciare* qualcuno, bisogna essere certi che non abbia alcuna chance di recuperare.
  Bevor man jemanden *durchfallen lässt*, muss man sich sicher sein, dass er keine Chance mehr hat.
  
  Lui giura che non *boccerà* mai suo figlio, ma tutti sanno che i professori sono inflessibili.
  Er schwört, dass er seinen Sohn *niemals durchfallen lassen* wird, aber alle wissen, dass die Lehrer unnachgiebig sind.
