Rang: 1054
Wort: peso
Wortart: n.m
Wort mit Artikel: il peso
Femininum / Plural: pesi
IPA: ''
Definition: das Gewicht, -e
Register: ''
Beispielsätze: |-
  Il *peso* di questa scatola è di cinque chili, quindi devi usare tutta la tua forza per sollevarla.
  Das *Gewicht* dieser Kiste beträgt fünf Kilogramm, deshalb musst du deine ganze Kraft einsetzen, um sie zu heben.
  
  Hai notato che il *peso* dell'uccello è così leggero che non riesce a decollare controvento?
  Hast du bemerkt, dass das *Gewicht* des Vogels so leicht ist, dass er nicht gegen den Wind abheben kann?
  
  Se non riduci il *peso* del tuo zaino, ti farai male alla schiena mentre cammini per lunghe distanze.
  Wenn du das *Gewicht* deines Rucksacks nicht reduzierst, wirst du dir beim langen Gehen den Rücken verletzen.
  
  Il medico ha detto che, nonostante il *peso* extra, dovresti continuare a fare esercizio fisico per migliorare la salute.
  Der Arzt hat gesagt, dass du trotz des zusätzlichen *Gewichts* weiterhin Sport treiben solltest, um deine Gesundheit zu verbessern.
  
  Hai già calcolato il *peso* totale di tutti gli oggetti che vuoi portare in viaggio?
  Hast du schon das Gesamt*gewicht* aller Gegenstände berechnet, die du auf Reise mitnehmen möchtest?
