Rang: 4992
Wort: bullo
Wortart: n.m
Wort mit Artikel: il bullo
Femininum / Plural: bulli
IPA: ''
Definition: der Schurke, -n, Rüpel, -
Register: ''
Beispielsätze: |-
  Quel *bullo* ha rubato la borsa della signora anziana.
  Jener *Schurke* hat die Tasche der alten Frau gestohlen.
  
  Non mi piacciono affatto le persone che si comportano da *bullo*.
  Ich mag Leute überhaupt nicht, die sich wie *Rüpel* benehmen.
  
  Se avessi un fratello minore, gli insegneresti a difendersi dai *bulli*?
  Wenn du einen jüngeren Bruder hättest, würdest du ihm beibringen, sich gegen *Schurken* zu wehren?
  
  Anche se ho raccontato l'accaduto, nessuno ha osato intervenire contro il *bullo*.
  Auch wenn ich die Vorfälle erzählt habe, hat sich niemand getraut, gegen den *Schurken* einzuschreiten.
  
  Li ho visti litigare, ma non volevo immischiarmi nella rissa tra i *bulli*.
  Ich habe gesehen, wie sie sich gestritten haben, aber ich wollte mich nicht in die Schlägerei zwischen den *Rüpeln* einmischen.
