Rang: 484
Wort: suonare
Wortart: vt
Wort mit Artikel: suonare
Femininum / Plural: ''
IPA: ''
Definition: spielen, klingeln
Register: ''
Beispielsätze: |-
  Marco *suona* la chitarra ogni sera.
  Marco *spielt* jeden Abend Gitarre.
  
  Avete *suonato* il campanello prima di entrare?
  Habt ihr *geklingelt*, bevor ihr reingekommen seid?
  
  Domani *suonerò* il pianoforte per te.
  Morgen werde ich *spielen* Klavier für dich.
  
  Se avessi tempo, *suonerei* la batteria ogni giorno.
  Wenn ich Zeit hätte, würde ich jeden Tag *spielen* Schlagzeug.
  
  Mi sembra che qualcuno *suoni* il violino qui vicino.
  Ich glaube, jemand *spielt* Geige hier in der Nähe.
