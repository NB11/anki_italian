Rang: 1245
Wort: spia
Wortart: n.m.
Wort mit Artikel: lo spia
Femininum / Plural: spie
IPA: ''
Definition: der Spion, -e, die Spionin, -nen
Register: ''
Beispielsätze: |-
  Il *spia* è stato catturato mentre fotografava documenti segreti nel suo ufficio.
  Der *Spion* wurde festgenommen, als er geheime Dokumente in seinem Büro fotografierte.
  
  Credi davvero che quella vicina sia una *spia* del governo?
  Glaubst du wirklich, dass diese Nachbarin eine *Spionin* der Regierung ist?
  
  Non appena ho visto la *spia* tra gli ospiti, ho chiamato la sicurezza.
  Sobald ich die *Spionin* unter den Gästen sah, rief ich die Sicherheitskräfte.
  
  Se fossi stato una *spia*, avrei usato un fucile per sorvegliare il nemico da lontano.
  Wenn ich ein *Spion* gewesen wäre, hätte ich ein Gewehr verwendet, um den Feind aus der Ferne zu beobachten.
  
  Le regole dicono che chiunque entri senza accesso autorizzato sarà considerato una *spia*.
  Die Regeln besagen, dass jeder, der ohne berechtigten *Zugang* eintritt, als Spion gilt.
