Rang: 4623
Wort: baule
Wortart: n.m
Wort mit Artikel: il baule
Femininum / Plural: bauli
IPA: ''
Definition: der Kofferraum, -¨e
Register: ''
Beispielsätze: |-
  Ho trovato le chiavi della macchina nel *baule* posteriore.
  Ich habe die Autoschlüssel im hinteren *Kofferraum* gefunden.
  
  Quando andremo in vacanza, dovremo sistemare tutto nel *baule* della jeep.
  Wenn wir in den Urlaub fahren, müssen wir alles in den *Kofferraum* des Geländefahrzeugs packen.
  
  Il meccanico ha aperto il *baule* e ha controllato il motore.
  Der Mechaniker hat den *Kofferraum* geöffnet und den Motor überprüft.
  
  Non riesco a chiudere il *baule*, perché c'è troppo dentro.
  Ich kann den *Kofferraum* nicht schließen, weil zu viel drin liegt.
  
  Se vuoi riporre la valigia, mettila nel *baule* più grande.
  Wenn du den Koffer verstauen möchtest, leg ihn in den größeren *Kofferraum*.
