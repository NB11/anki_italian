Rang: 3784
Wort: raffreddare
Wortart: v
Wort mit Artikel: raffreddare
Femininum / Plural: ''
IPA: ''
Definition: abkühlen, kühlen
Register: ''
Beispielsätze: |-
  Per *raffreddare* la stanza, ho aperto la finestra.
  Um das Zimmer *abzukühlen*, habe ich das Fenster geöffnet.
  
  Se avessi del ghiaccio, potrei *raffreddare* la bevanda in pochi minuti.
  Wenn ich Eis hätte, könnte ich das *Getränk* in wenigen Minuten abkühlen.
  
  Lo scienziato sta cercando un modo per *raffreddare* i reattori nucleari in caso di emergenza.
  Der Wissenschaftler sucht einen Weg, die Kernreaktoren im Notfall *abzukühlen*.
  
  Non appena la pasta è cotta, è importante *raffreddare* l'acqua prima di scolarla.
  Sobald die Nudeln gekocht sind, ist es wichtig, das Wasser *abzukühlen*, bevor man es abgießt.
  
  Sarebbe utile avere un dispositivo che riesca a *raffreddare* rapidamente qualsiasi superficie.
  Es wäre nützlich, ein Gerät zu haben, das jede Oberfläche schnell *abkühlen* kann.
