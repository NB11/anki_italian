Rang: 2238
Wort: punta
Wortart: n.f
Wort mit Artikel: la punta
Femininum / Plural: punte
IPA: ''
Definition: die Spitze, -n
Register: ''
Beispielsätze: |-
  La *punta* dell'ago è molto affilata.
  Die *Spitze* der Nadel ist sehr scharf.
  
  Ho trovato una *punta* di metallo nel terreno mentre giocavo in giardino.
  Ich habe eine *Spitze* aus Metall im Boden gefunden, während ich im Garten spielte.
  
  Non toccare la *punta* della spada, è pericolosa!
  Fass die *Spitze* des Schwerts nicht an, sie ist gefährlich!
  
  La *punta* del tetto è stata danneggiata dalla tempesta di ieri.
  Die *Spitze* des Daches wurde durch den Sturm von gestern beschädigt.
  
  Hanno deciso di costruire una torre con una *punta* dorata per attirare i turisti.
  Sie haben beschlossen, einen Turm mit einer goldenen *Spitze* zu bauen, um Touristen anzulocken.
