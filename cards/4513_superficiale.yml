Rang: 4513
Wort: superficiale
Wortart: adj
Wort mit Artikel: superficiale
Femininum / Plural: ''
IPA: ''
Definition: oberflächlich
Register: ''
Beispielsätze: |-
  La tua analisi è *superficiale* e non tiene conto dei dettagli importanti.
  Deine Analyse ist *oberflächlich* und berücksichtigt nicht die wichtigen Details.
  
  Nonostante le apparenze, il suo atteggiamento non era *superficiale*, ma profondamente riflessivo.
  Trotz der Erscheinungen war seine Haltung nicht *oberflächlich*, sondern tiefgründig durchdacht.
  
  Credono che le sue parole siano sincere, ma in realtà sono *superficiali* e vuote.
  Sie glauben, seine Worte seien aufrichtig, aber tatsächlich sind sie *oberflächlich* und leer.
  
  Aveva una conoscenza *superficiale* della materia, bastava solo per un esame facile.
  Er hatte ein *oberflächliches* Wissen über das Thema, genug nur für eine einfache Prüfung.
  
  Non fidarti troppo delle sue opinioni: sono troppo *superficiali* per essere affidabili.
  Vertraue seinen Meinungen nicht zu sehr: sie sind zu *oberflächlich*, um verlässlich zu sein.
