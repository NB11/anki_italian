Rang: 2952
Wort: massacrare
Wortart: v
Wort mit Artikel: massacrare
Femininum / Plural: ''
IPA: ''
Definition: massakrieren, niedermetzeln, abschlachten
Register: ''
Beispielsätze: |-
  Dopo la resa, i soldati avversari furono *massacrati* senza pietà.
  Nach der Kapitulation wurden die feindlichen Soldaten *massakriert*.
  
  Se continui così, *massacrerai* tutti i tuoi colleghi con le tue critiche.
  Wenn du so weitermachst, wirst du alle deine Kollegen mit deinen Kritiken *massakrieren*.
  
  Gli storici discutono se i mongoli abbiano *massacrato* intere popolazioni durante le loro conquiste.
  Die Historiker diskutieren, ob die Mongolen ganze Bevölkerungen während ihrer Eroberungen *massakriert* haben.
  
  Credo che nessuno voglia *massacrare* gli animali per puro divertimento.
  Ich glaube, dass niemand Tiere zum reinen Vergnügen *massakrieren* möchte.
  
  Spero che non *massacrino* più la mia macchina con quelle regolazioni sbagliate!
  Ich hoffe, dass sie mein Auto nicht weiterhin mit diesen falschen Einstellungen *massakrieren*!
