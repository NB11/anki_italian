Rang: 2140
Wort: tratto
Wortart: n.m
Wort mit Artikel: il tratto
Femininum / Plural: tratti
IPA: ''
Definition: der Abschnitt, -e; der Zug, -züge
Register: ''
Beispielsätze: |-
  Ho letto un *tratto* molto interessante di questo romanzo storico.
  Ich habe einen sehr interessanten *Abschnitt* dieses historischen Romans gelesen.
  
  Il *tratto* di strada che porta al museo è costeggiato da alberi secolari.
  Der *Abschnitt* der Straße, die zum Museum führt, ist von jahrhundertealten Bäumen gesäumt.
  
  Quel *tratto* di mare è noto per le sue acque cristalline e la ricca biodiversità.
  Dieser *Abschnitt* des Meeres ist für sein kristallklares Wasser und seine reiche Biodiversität bekannt.
  
  Nel *tratto* finale della corsa, ha aumentato notevolmente il ritmo.
  Im *Schlussabschnitt* des Rennens hat er das Tempo deutlich erhöht.
  
  I *tratti* distintivi di questa razza di cane sono le orecchie lunghe e il pelo setoso.
  Die charakteristischen *Merkmale* dieser Hunderasse sind die langen Ohren und das seidige Fell.
