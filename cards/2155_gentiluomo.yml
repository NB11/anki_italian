Rang: 2155
Wort: gentiluomo
Wortart: n.m
Wort mit Artikel: il gentiluomo
Femininum / Plural: gentiluomini
IPA: ''
Definition: der Gentleman, -s
Register: ''
Beispielsätze: |-
  Il *gentiluomo* ha aiutato la signora ad attraversare la strada.
  Der *Gentleman* hat der Frau geholfen, die Straße zu überqueren.
  
  Era un *gentiluomo* di altri tempi, sempre pronto a cedere il posto in tram.
  Er war ein *Gentleman* aus alten Zeiten, der im Tram immer seinen Platz abgab.
  
  Se fossi un *gentiluomo*, non lascerei mai una signora sola in un ristorante affollato.
  Wäre ich ein *Gentleman*, würde ich eine Dame nie allein in einem vollen Restaurant sitzen lassen.
  
  Il *gentiluomo* ha pagato il conto senza che nessuno glielo chiedesse.
  Der *Gentleman* hat die Rechnung bezahlt, ohne dass es jemand verlangt hätte.
  
  Un vero *gentiluomo* non si vanta mai dei suoi successi, ma li condivide con umiltà.
  Ein echter *Gentleman* rühmt sich nie seiner Erfolge, sondern teilt sie mit Bescheidenheit.
