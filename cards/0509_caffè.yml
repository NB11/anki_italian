Beispielsätze: |-
  Mi piace bere un *caffè* al mattino quando mi sveglio.
  Ich trinke morgens gern einen *Kaffee*, wenn ich aufwache.
  
  Dopo il pranzo ho ordinato anche un *caffè* macchiato per digerire.
  Nach dem Mittagessen bestellte ich mir einen *Kaffee* mit einem Schuss Milch, um die Verdauung zu fördern.
  
  Vuoi che ti prepari un *caffè* o preferisci un tè?
  Soll ich dir einen *Kaffee* zubereiten oder bevorzugst du einen Tee?
  
  Il *caffè* che hai acquistato al mercato era davvero squisito.
  Der *Kaffee*, den du auf dem Markt gekauft hast, war wirklich exquisit.
  
  Se vuoi stare sveglio, bevi un *caffè* forte, ma non esagerare!
  Wenn du wach bleiben willst, trink einen starken *Kaffee*, aber übertreib es nicht!
