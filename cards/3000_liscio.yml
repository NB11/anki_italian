Rang: 3000
Wort: liscio
Wortart: adj
Wort mit Artikel: liscio
Femininum / Plural: ''
IPA: ''
Definition: glatt, glatt (adj.)
Register: ''
Beispielsätze: |-
  La superficie del tavolo era così *liscio* che rifletteva perfettamente la luce.
  Die Oberfläche des Tisches war so *glatt*, dass sie das Licht perfekt reflektierte.
  
  Dopo aver speso tanto tempo a carteggiare, il legno è diventato *liscio* come la seta.
  Nachdem wir so viel Zeit mit Schleifen verbracht hatten, wurde das Holz so *glatt* wie Seide.
  
  Questa pista da sci è *liscissima* in primavera, ma d’inverno è ghiacciata.
  Diese Skipiste ist im Frühling *glatt*, aber im Winter vereist.
  
  Nonostante le difficoltà, il progetto è andato avanti *liscio*; tutto è andato secondo i piani.
  Trotz der Schwierigkeiten verlief das Projekt *glatt*; alles ging nach Plan.
  
  Se avessi usato meno detergente, i piatti sarebbero venuti *liscissimi* senza aloni.
  Hättest du weniger Reinigungsmittel verwendet, wären die Teller *glatt* ohne Schlieren geworden.
