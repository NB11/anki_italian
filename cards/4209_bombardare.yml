Rang: 4209
Wort: bombardare
Wortart: v
Wort mit Artikel: bombardare
Femininum / Plural: ''
IPA: ''
Definition: bombardieren
Register: ''
Beispielsätze: |-
  Durante la guerra, i soldati *bombardarono* la città per diversi giorni.
  Während des Krieges *bombardierten* die Soldaten die Stadt mehrere Tage lang.
  
  Se avessi saputo del pericolo, avrei *bombardato* di domande gli organizzatori.
  Wenn ich die Gefahr gekannt hätte, hätte ich die Organisatoren mit Fragen *bombardiert*.
  
  Gli aerei stanno *bombardando* i depositi di armi nemici.
  Die Flugzeuge *bombardieren* gerade die Waffenlager des Feindes.
  
  Perché stai *bombardando* il mio telefono con messaggi ogni due minuti?
  Warum *bombardierst* du mein Telefon alle zwei Minuten mit Nachrichten?
  
  I ribelli minacciano di *bombardare* la centrale elettrica se non verranno soddisfatte le loro richieste.
  Die Rebellen drohen, das Kraftwerk zu *bombardieren*, falls ihre Forderungen nicht erfüllt werden.
