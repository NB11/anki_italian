Rang: 664
Wort: missione
Wortart: n.f
Wort mit Artikel: la missione
Femininum / Plural: missioni
IPA: ''
Definition: die Mission, -en
Register: ''
Beispielsätze: |-
  La polizia ha ricevuto una *missione* segreta per fermare il traffico di droga in quella zona pericolosa.
  Die Polizei hat eine *Mission* erhalten, um den Drogenhandel in dieser gefährlichen Zone zu stoppen.
  
  Dopo aver completato la sua *missione*, il detective si è seduto al bar per bere un caffè con un contatto.
  Nach dem Abschluss seiner *Mission* setzte sich der Detektiv an die Bar, um einen Kaffee mit einem Kontakt zu trinken.
  
  Pensi che lui riesca a portare a termine questa *missione* senza problemi?
  Glaubst du, dass er diese *Mission* ohne Probleme abschließen kann?
  
  Anche se era stanco, ha accettato la *missione* perché sapeva che era necessario per tutti noi.
  Obwohl er müde war, nahm er die *Mission* an, weil er wusste, dass sie für uns alle notwendig war.
  
  Mentre cercava di evitare che la *missione* fallisse, ha dimostrato un grande coraggio intorno a quella decisione.
  Während er versuchte zu verhindern, dass die *Mission* scheiterte, zeigte er großen Mut bei dieser Entscheidung.
