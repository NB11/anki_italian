Rang: 3700
Wort: solitudine
Wortart: n.f
Wort mit Artikel: la solitudine
Femininum / Plural: solitudini
IPA: ''
Definition: die Einsamkeit, -en
Register: ''
Beispielsätze: |-
  Dopo tanti anni all’estero, prova ancora un senso di *solitudine* profonda.
  Nach so vielen Jahren im Ausland spürt sie noch immer ein tiefes Gefühl der *Einsamkeit*.
  
  La *solitudine* che aveva provato durante la malattia era insopportabile.
  Die *Einsamkeit*, die er während seiner Krankheit empfunden hatte, war unerträglich.
  
  Nonostante abbia molti amici, a volte avverte una forte *solitudine* interiore.
  Obwohl er viele Freunde hat, spürt er manchmal eine tiefe innere *Einsamkeit*.
  
  Con il passare del tempo, la *solitudine* diventa più facile da accettare.
  Mit der Zeit wird die *Einsamkeit* leichter zu akzeptieren.
  
  Vorrei sapere come superare questa *solitudine* che mi opprime ogni sera.
  Ich würde gerne wissen, wie ich diese *Einsamkeit* überwinden kann, die mich jeden Abend bedrückt.
