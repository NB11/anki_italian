Rang: 2328
Wort: ubriacare
Wortart: vt
Wort mit Artikel: ubriacare
Femininum / Plural: ''
IPA: ''
Definition: betrunken machen, berauschen
Register: ''
Beispielsätze: |-
  Non volevo *ubriacare* nessuno alla festa, ma il vino era troppo forte.
  Ich wollte niemanden auf der Party *betrunken machen*, aber der Wein war zu stark.
  
  Il medico dice che bere troppo caffè può *ubriacare* il sistema nervoso.
  Der Arzt sagt, dass zu viel Kaffee das Nervensystem *berauschen* kann.
  
  Se continui a bere così in fretta, ti *ubriacherai* prima di cena!
  Wenn du weiter so schnell trinkst, wirst du dich *betrunken machen*, bevor das Abendessen fertig ist!
  
  Era triste vedere come la povertà potesse *ubriacare* anche le anime più forti.
  Es war traurig zu sehen, wie die Armut sogar die stärksten Seelen *berauschen* konnte.
  
  Il regista ha deciso di non *ubriacare* il protagonista, nonostante la scena richiedesse molta tensione.
  Der Regisseur hat beschlossen, den Protagonisten nicht *betrunken zu machen*, obwohl die Szene viel Spannung erforderte.
