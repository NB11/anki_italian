Rang: 3507
Wort: mirare
Wortart: v
Wort mit Artikel: mirare
Femininum / Plural: ''
IPA: ''
Definition: zielen, anpeilen, anstreben
Register: ''
Beispielsätze: |-
  Gli arcieri *mirano* il bersaglio con attenzione prima di scoccare la freccia.
  Die Bogenschützen zielen auf das Ziel mit Aufmerksamkeit bevor sie den Pfeil abschießen.
  
  Se *mirassi* più in alto, potresti ottenere risultati migliori nel tuo lavoro.
  Wenn du höher *zielen* würdest, könntest du bessere Ergebnisse in deiner Arbeit erzielen.
  
  Ho notato che il cane *mira* sempre la mia borsa quando torno a casa.
  Ich habe bemerkt, dass der Hund immer auf meine Tasche *zielt*, wenn ich nach Hause komme.
  
  Per vincere la competizione, dobbiamo *mirare* all'eccellenza in ogni dettaglio.
  Um den Wettbewerb zu gewinnen, müssen wir nach der Vollkommenheit in jedem Detail *streben*.
  
  Nonostante le difficoltà, lei continua a *mirare* a un futuro migliore per sé e per la sua famiglia.
  Trotz der Schwierigkeiten strebt sie weiterhin nach einer besseren Zukunft für sich und ihre Familie.
