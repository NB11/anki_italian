Rang: 2783
Wort: boy
Wortart: n.m
Wort mit Artikel: il boy
Femininum / Plural: i ragazzi
IPA: ''
Definition: der Junge, -n
Register: ''
Beispielsätze: |-
  Il *ragazzo* legge un libro interessante ogni sera.
  Der *Junge* liest jeden Abend ein interessantes Buch.
  
  I *ragazzi* hanno vinto un trofeo al torneo di calcio.
  Die *Jungen* haben einen Pokal im Fußballturnier gewonnen.
  
  Mentre il *ragazzo* giocava in giardino, sua madre preparava la cena.
  Während der *Junge* im Garten spielte, bereitete seine Mutter das Abendessen vor.
  
  Se il *ragazzo* avesse studiato di più, avrebbe superato l'esame senza problemi.
  Wenn der *Junge* mehr gelernt hätte, hätte er die Prüfung problemlos bestanden.
  
  È importante che il *ragazzo* impari a rispettare gli altri.
  Es ist wichtig, dass der *Junge* lernt, andere zu respektieren.
