Rang: 1613
Wort: onda
Wortart: n.f
Wort mit Artikel: l'onda
Femininum / Plural: onde
IPA: ''
Definition: die Welle, -n
Register: ''
Beispielsätze: |-
  L’*onda* del mare era così alta che ha spaventato i fan sulla spiaggia.
  Die *Welle* des Meeres war so hoch, dass sie die Fans am Strand erschreckt hat.
  
  Nonostante la *crisi* economica, la qualità dei servizi è rimasta sufficiente.
  Trotz der *Krise* blieb die Qualität der Dienstleistungen ausreichend.
  
  Le *onde* del lago sono sempre più calme la mattina presto, specialmente in estate.
  Die *Wellen* des Sees sind morgens besonders früh im Sommer immer ruhiger.
  
  Ho visto un documentario affascinante sugli *stomaci* degli animali marini che filtrano le onde per nutrirsi.
  Ich habe eine *faszinierende* Dokumentation über die Mägen von Meerestieren gesehen, die Wellen filtern, um sich zu ernähren.
  
  Se non avessero *staccato* il cavo in tempo, il disastro sarebbe stato inevitabile, a causa dell’esplosione che avrebbe seguito un corto circuito.
  Hätten sie das Kabel nicht rechtzeitig *abgetrennt*, wäre die Katastrophe wegen der darauffolgenden Explosion unvermeidbar gewesen.
