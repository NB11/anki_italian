Rang: 4963
Wort: piombare
Wortart: v
Wort mit Artikel: piombare
Femininum / Plural: ''
IPA: ''
Definition: plötzlich fallen, hereinstürzen
Register: ''
Beispielsätze: |-
  Quando ho sentito la notizia, mi sono reso conto che un grave problema avrebbe potuto *piombare* su di noi.
  Als ich die Nachricht hörte, wurde mir klar, dass ein schwerwiegendes Problem über uns *hereinbrechen* könnte.
  
  Il gatto è *piombato* addosso al topo senza alcun preavviso.
  Die Katze ist ohne jede Vorwarnung über die Maus *hergefallen*.
  
  Se non avessi chiuso la porta, il vento avrebbe potuto *piombare* nella stanza e rovinare tutto.
  Wenn ich die Tür nicht geschlossen hätte, wäre der Wind möglicherweise *hineingestürzt* und hätte alles ruiniert.
  
  I problemi economici *piombarono* sulla famiglia senza preavviso, costringendola a vendere la casa.
  Die finanziellen Probleme *stürzten* über die Familie herein, ohne dass sie es erwartete, und zwangen sie, das Haus zu verkaufen.
  
  Non appena aprì il frigo, una nuvola di moscerini gli *piombò* addosso con un ronzio fastidioso.
  Sobald er den Kühlschrank öffnete, *fiel* ihm eine Wolke von Mücken mit einem lästigen Summen in den Nacken.
