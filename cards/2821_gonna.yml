Rang: 2821
Wort: gonna
Wortart: n.f
Wort mit Artikel: la gonna
Femininum / Plural: gonne
IPA: ''
Definition: die Taille, -n
Register: ''
Beispielsätze: |-
  Oggi indosso una *gonna* lunga e elegante per il matrimonio.
  Heute trage ich einen *Rock* für die Hochzeit.
  
  Le *gonne* a pieghe sono tornate di moda quest'anno.
  Die *Röcke* mit Falten sind dieses Jahr wieder in Mode.
  
  Vorrei sapere dove hai acquistato quella *gonna* così particolare.
  Ich würde gerne wissen, wo du diesen so besonderen *Rock* gekauft hast.
  
  Avresti dovuto provare la *gonna* prima di comprarla, ti sta stretta!
  Du hättest den *Rock* vor dem Kauf anprobieren sollen, er ist dir zu eng!
  
  In alcuni paesi la *gonna* è considerata un simbolo di rispetto o tradizione.
  In einigen Ländern gilt der *Rock* als Symbol für Respekt oder Tradition.
