Rang: 3746
Wort: gemma
Wortart: n.f
Wort mit Artikel: la gemma
Femininum / Plural: gemme
IPA: ''
Definition: der Edelstein, -e
Register: ''
Beispielsätze: |-
  Questa *gemma* è così rara che non esiste un prezzo per valutarla.
  Dieser *Edelstein* ist so selten, dass es keinen Preis gibt, um ihn zu bewerten.
  
  Nel museo abbiamo visto una collana con tre *gemme* preziose al centro.
  Im Museum haben wir eine Halskette mit drei *Edelsteinen* in der Mitte gesehen.
  
  Se avessi trovato la *gemma* nascosta, ora saresti milionario!
  Wenn du den versteckten *Edelstein* gefunden hättest, wärst du jetzt Millionär!
  
  Mentre cercavamo il tesoro, ci siamo imbattuti in una *gemma* incastonata nella roccia.
  Während wir nach dem Schatz suchten, stießen wir auf einen *Edelstein*, der im Felsen eingelassen war.
  
  Affinché la *gemma* risplenda davvero, deve essere tagliata con precisione.
  Damit der *Edelstein* wirklich strahlt, muss er präzise geschliffen werden.
