Rang: 2042
Wort: vergogna
Wortart: n.f
Wort mit Artikel: la vergogna
Femininum / Plural: vergogne
IPA: ''
Definition: die Scham, die Schande
Register: ''
Beispielsätze: |-
  Sento una forte *vergogna* quando sbaglio in pubblico.
  Ich spüre starke *Scham*, wenn ich mich in der Öffentlichkeit blamiere.
  
  È meglio provare *vergogna* che non provarla affatto.
  Es ist besser, *Scham* zu empfinden, als sie überhaupt nicht zu fühlen.
  
  Provo *vergogna* quando devo chiedere scusa per qualcosa che non ho fatto.
  Ich empfinde *Scham*, wenn ich mich für etwas entschuldigen muss, das ich nicht getan habe.
  
  La *vergogna* a volte ci aiuta a capire i nostri errori.
  *Scham* hilft uns manchmal, unsere Fehler zu erkennen.
  
  Nonostante la *vergogna*, ha confessato la verità al direttore.
  Trotz der *Scham* hat sie dem Direktor die Wahrheit gestanden.
