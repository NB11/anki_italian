Rang: 3640
Wort: assalto
Wortart: n.m
Wort mit Artikel: l'assalto
Femininum / Plural: assalti
IPA: ''
Definition: der Angriff, -e, der Überfall, -e
Register: ''
Beispielsätze: |-
  L'*assalto* alla banca è avvenuto alle tre di pomeriggio.
  Der *Angriff* auf die Bank ist um drei Uhr nachmittags passiert.
  
  Temevo che un *assalto* improvviso potesse interrompere la loro conversazione seria.
  Ich fürchtete, ein plötzlicher *Überfall* könnte ihr ernstes Gespräch unterbrechen.
  
  Gli studiosi stanno analizzando gli *assalti* dei lupi contro le pecore negli ultimi mesi.
  Die Wissenschaftler analysieren die *Angriffe* der Wölfe auf die Schafe in den letzten Monaten.
  
  Se avessimo saputo dell'*assalto* notturno, avremmo chiamato la polizia immediatamente.
  Hätten wir von dem nächtlichen *Überfall* gewusst, hätten wir sofort die Polizei gerufen.
  
  Chiunque pensi che un *assalto* a un museo sia semplice si sbaglia di grosso.
  Wer glaubt, ein *Angriff* auf ein Museum sei einfach, irrt sich gewaltig.
