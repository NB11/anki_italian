Rang: 4498
Wort: vulcano
Wortart: n.m
Wort mit Artikel: il vulcano
Femininum / Plural: vulcani
IPA: ''
Definition: der Vulkan, -e
Register: ''
Beispielsätze: |-
  L'isola è famosa perché ha tre *vulcani* attivi.
  Die Insel ist berühmt, weil sie drei *Vulkane* hat.
  
  Nonostante il pericolo, molti turisti salgono sul *vulcano* per vedere il panorama.
  Trotz der Gefahr steigen viele Touristen auf den *Vulkan*, um die Aussicht zu genießen.
  
  Se il *vulcano* dovesse eruttare, evacuerebbero immediatamente l'area circostante.
  Falls der *Vulkan* ausbrechen sollte, würde man das Umland sofort evakuieren.
  
  Ho sempre sognato di visitare l'Etna, il *vulcano* più alto d'Europa.
  Ich habe immer davon geträumt, den Ätna zu besuchen, den *Vulkan*, der Europas höchster ist.
  
  Gli scienziati studiano attentamente il *vulcano* per prevedere le sue eruzioni future.
  Wissenschaftler untersuchen den *Vulkan* genau, um seine zukünftigen Ausbrüche vorherzusagen.
