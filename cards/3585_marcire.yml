Rang: 3585
Wort: marcire
Wortart: vi
Wort mit Artikel: marcire
Femininum / Plural: ''
IPA: ''
Definition: faulen, verderben
Register: ''
Beispielsätze: |-
  Dopo due settimane di pioggia, la frutta nel cesto ha iniziato a *marcire*.
  Nach zwei Wochen Regen begann das Obst in dem Korb zu *verderben*.
  
  Se lasci i vestiti bagnati nel sacco, finiranno per *marcire*.
  Wenn du die nassen Kleidungsstücke in dem Beutel lässt, werden sie am Ende *faulen*.
  
  Nonostante abbia chiuso il barattolo ermeticamente, la marmellata ha iniziato a *marcire* dopo un mese.
  Obwohl ich das Glas hermetisch verschlossen hatte, begann die Marmelade nach einem Monat zu *verderben*.
  
  Ho notato che il legno della veranda sta iniziando a *marcire* a causa dell'umidità.
  Ich dachte, das Fleisch sei frisch, aber tatsächlich war es bereits hinter dem Kühlschrank *verderben*.
  
  Se l'aria non circola bene, anche i libri vecchi possono *marcire* negli scatoloni.
  Wenn die Luft nicht gut zirkuliert, können sogar alte Bücher in den Kartons *verderben*.
