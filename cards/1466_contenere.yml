Rang: 1466
Wort: contenere
Wortart: v
Wort mit Artikel: contenere
Femininum / Plural: ''
IPA: ''
Definition: enthalten, beinhalten
Register: ''
Beispielsätze: |-
  La *contiene* tutte le informazioni necessarie per superare l'esame.
  Sie *enthält* alle Informationen, die man braucht, um die Prüfung zu bestehen.
  
  Non sapevo che questo contenitore potesse *contenere* così tanto!
  Ich wusste nicht, dass dieser Behälter so viel *enthalten* kann!
  
  Se il regalo *conterrà* un libro, sarà perfetto per il mio compleanno.
  Wenn das Geschenk ein Buch *enthalten* wird, ist es perfekt für meinen Geburtstag.
  
  La busta *è contenuta* in quella cassetta, proprio come mi avevi detto.
  Der Brief *ist enthalten* in dieser Kiste, genau wie du es gesagt hattest.
  
  Vorrei che *contenesse* anche una poesia, così sarebbe ancora più speciale.
  Ich wünschte, es *enthielte* auch ein Gedicht, dann wäre es noch besonderer.
Audio: ''
