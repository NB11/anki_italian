Rang: 2502
Wort: frutta
Wortart: n.f
Wort mit Artikel: la frutta
Femininum / Plural: frutte
IPA: ''
Definition: das Obst, -arten
Register: ''
Beispielsätze: |-
  Durante l'estate mangiamo molta *frutta* fresca tutti i giorni.
  Wir essen jeden Tag viel frisches *Obst*.
  
  Nonostante la *frutta* nel frigorifero fosse matura, non l'abbiamo mangiata subito.
  Obwohl das *Obst* im Kühlschrank reif war, haben wir es nicht sofort gegessen.
  
  Se avessi tempo, comprerei della *frutta* biologica al mercato.
  Wenn ich Zeit hätte, würde ich *Obst* vom Bioladen kaufen.
  
  È importante che la *frutta* sia lavata bene prima di essere consumata.
  Es ist wichtig, dass *Obst* vor dem Verzehr gut gewaschen wird.
  
  La *frutta* che hai portato ieri era davvero deliziosa, grazie mille!
  Das *Obst*, das du gestern mitgebracht hast, war wirklich köstlich, vielen Dank!
