Rang: 1307
Wort: troia
Wortart: n.f
Wort mit Artikel: la troia
Femininum / Plural: troie
IPA: ''
Definition: die Hure, -n
Register: ''
Beispielsätze: |-
  In quella zona del quartiere *troia* erano frequenti, ma nessuno osava denunciarle.
  In diesem Viertel waren die *Huren* häufig, aber niemand wagte es, sie zu melden.
  
  L’hai vista anche tu la *troia* che ha gridato così forte al cinema?
  Hast du auch diese *Hure* gesehen, die im Kino so laut geschrien hat?
  
  Se non avessi frequentato certi ambienti, non avresti conosciuto una *troia* come lei.
  Wenn du nicht gewisse Kreise *besucht* hättest, hättest du keine solche Hure kennengelernt.
  
  Dicono che sia una *troia*, ma secondo me è solo una persona che lotta per sopravvivere.
  Man sagt, sie sei eine *Hure*, aber meiner Meinung nach ist sie nur eine Person, die ums Überleben kämpft.
  
  Quand’ero giovane, un poliziotto mi disse che per strada si vedeva spesso la *troia* che vendeva drink scadenti.
  Als ich jung war, sagte mir ein Polizist, dass man auf der Straße oft die *Hure* sah, die billige Getränke verkaufte.
