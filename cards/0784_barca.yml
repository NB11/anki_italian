Rang: 784
Wort: barca
Wortart: n.f
Wort mit Artikel: la barca
Femininum / Plural: barche
IPA: ''
Definition: das Boot, -e
Register: ''
Beispielsätze: |-
  Ho visto *la barca* che si allontanava lentamente all’orizzonte.
  Ich habe *das Boot* gesehen, das sich langsam am Horizont entfernte.
  
  Nel codice della nave c’era scritto il nome di *questa barca*.
  In *dem Code* des Schiffs stand der Name dieses Boots geschrieben.
  
  Se non trovi *la barca* giusta, potresti impazzire prima della partenza!
  Wenn du *das richtige Boot* nicht findest, könntest du vor der Abfahrt den Verstand verlieren!
  
  Credo che domani pioverà, quindi è meglio rimettere *le barche* in magazzino.
  Ich glaube, dass es morgen regnen wird, also ist es besser, *die Boote* wieder in den Lagerraum zu bringen.
  
  Il tenente ordinò che tutte *le barche* fossero controllate prima della missione.
  Der *Leutnant* befahl, dass vor dem Einsatz alle Boote überprüft werden sollten.
