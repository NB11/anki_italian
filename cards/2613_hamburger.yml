Beispielsätze: |-
  A pranzo ho mangiato proprio un *hamburger* delizioso al nuovo fast food vicino a casa.
  Zum Mittagessen habe ich genau einen leckeren *Hamburger* im neuen Fast-Food-Laden in der Nähe gegessen.
  
  Mio fratello lavora come cuoco e prepara gli *hamburger* più buoni della città.
  Mein Bruder arbeitet als Koch und macht die *besten Hamburger* der Stadt.
  
  Sul tavolo c’era un *hamburger* che nessuno aveva toccato perché era freddo.
  Auf dem Tisch lag ein *Hamburger*, den niemand angerührt hatte, weil er kalt war.
  
  Domani per cena vorrei cucinare degli *hamburger* alla griglia con patatine fritte.
  Morgen zum Abendessen möchte ich *Burger* grill und Pommes frites zubereiten.
  
  Se hai fame, prendi un *hamburger* dal frigorifero, ma controlla la data di scadenza.
  Wenn du hungrig bist, nimm einen *Hamburger* aus dem Kühlschrank, aber schau auf das Mindesthaltbarkeitsdatum.
