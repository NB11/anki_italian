Beispielsätze: |-
  Non *sordo* ma ipovedente, ha imparato a leggere con i caratteri in braille.
  Nicht *taub*, sondern sehbehindert hat er Brailleschrift gelernt.
  
  Il medico ha confermato che il paziente è *sordo* da entrambi gli orecchi.
  Der Arzt hat bestätigt, dass der Patient an *beiden* Ohren taub ist.
  
  Se fossi *sordo*, non potrei suonare il violino come te!
  Wenn ich *taub* wäre, könnte ich nicht wie du Geige spielen!
  
  È un miracolo che il neonato, che era *sordo* alla nascita, ora senta perfettamente.
  Es ist ein Wunder, dass das Neugeborene, das *taub* zur Welt kam, jetzt perfekt hört.
  
  Dicono che esistano musicisti *sordi* che compongono usando le vibrazioni della pelle.
  Man sagt, es gebe *taube* Musiker, die mit Hautvibrationen komponieren.
