Rang: 597
Wort: arrestare
Wortart: vt
Wort mit Artikel: arrestare
Femininum / Plural: ''
IPA: ''
Definition: verhaften, festnehmen
Register: ''
Beispielsätze: |-
  La polizia *arresta* il ladro in flagranza di reato.
  Die Polizei *verhaftet* den Dieb auf frischer Tat.
  
  Hanno *arrestato* il sospettato ieri sera.
  Sie haben den Verdächtigen gestern Abend *festgenommen*.
  
  Senza prove sufficienti non possiamo *arrestare* nessuno.
  Ohne ausreichende Beweise können wir niemanden *verhaften*.
  
  Arriverà la polizia e ci *arresterà* tutti!
  Die Polizei wird kommen und uns alle *verhaften*!
  
  Se *arrestassi* qualcuno ingiustamente, dovrei scusarmi.
  Wenn ich jemanden zu Unrecht *verhaften* würde, müsste ich mich entschuldigen.
