Rang: 597
Wort: arrestare
Wortart: vt
Wort mit Artikel: arrestare
Femininum / Plural: ''
IPA: ''
Definition: verhaften, festnehmen
Register: ''
Beispielsätze: |-
  La polizia ha deciso di *arrestare* l’uomo che ha commesso il furto.
  Die Polizei hat beschlossen, den Mann zu *verhaften*, der den Diebstahl begangen hat.
  
  Se continuerai a rubare, ti faranno *arrestare* prima o poi!
  Wenn du weiter stiehlst, werden sie dich früher oder später *verhaften*!
  
  I soldati volevano *arrestare* il generale perché aveva disobbedito agli ordini.
  Die Soldaten wollten den General *verhaften*, weil er den Befehlen nicht gehorcht hatte.
  
  Nonostante le prove, il giudice ha rifiutato di *arrestare* l’imputato senza ulteriori indagini.
  Trotz der Beweise weigerte sich der Richter, den Angeklagten ohne weitere Ermittlungen zu *verhaften*.
  
  I genitori mi hanno pregato di non *arrestare* mio fratello, anche se aveva rubato la loro carta di credito.
  Meine Eltern haben mich gebeten, meinen Bruder nicht zu *verhaften*, obwohl er ihre Kreditkarte gestohlen hatte.
