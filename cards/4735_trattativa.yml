Rang: 4735
Wort: trattativa
Wortart: n.f
Wort mit Artikel: la trattativa
Femininum / Plural: trattative
IPA: ''
Definition: die Verhandlung, -en
Register: ''
Beispielsätze: |-
  La *trattativa* per l’acquisto della casa è ancora in corso, nonostante le nuove offerte.
  Die *Verhandlung* für den Kauf des Hauses ist noch im Gange, trotz der neuen Angebote.
  
  Senza una *trattativa* seria, rischiamo di non trovare un accordo soddisfacente.
  Ohne eine ernsthafte *Verhandlung* riskieren wir, keine zufriedenstellende Einigung zu finden.
  
  Dopo mesi di *trattative*, finalmente hanno firmato il contratto.
  Nach Monaten der *Verhandlungen* haben sie endlich den Vertrag unterzeichnet.
  
  Le *trattative* tra i due paesi sembrano bloccate a causa di questioni politiche.
  Die *Verhandlungen* zwischen den beiden Ländern scheinen wegen politischer Fragen blockiert.
  
  Anche se le *trattative* falliscono, dobbiamo mantenere un atteggiamento costruttivo.
  Auch wenn die *Verhandlungen* scheitern, müssen wir eine konstruktive Haltung bewahren.
