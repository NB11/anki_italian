Wort mit Artikel: danzare
Femininum / Plural: ''
IPA: ''
Definition: tanzen
Register: ''
Beispielsätze: |-
  Stasera *danziamo* in una discoteca molto famosa.
  Heute Abend *tanzen* wir in einer sehr berühmten Diskothek.
  
  Se avessi più tempo, mi piacerebbe imparare a *danzare* il tango.
  Wenn ich mehr Zeit hätte, würde ich gerne *tanzen* lernen.
  
  Nonostante la pioggia, hanno deciso di *danzare* lo stesso.
  Trotz des Regens haben sie sich entschieden, trotzdem zu *tanzen*.
  
  Mi hanno detto che ieri sera tu *hai ballato* fino all’alba!
  Man hat mir gesagt, dass du gestern Abend bis zum Morgengrauen *getanzt* hast!
  
  Volevo *danzare* con te sotto le stelle, ma il DJ ha interrotto la musica.
  Ich wollte mit dir unter den Sternen *tanzen*, aber der DJ hat die Musik unterbrochen.
