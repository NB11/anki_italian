Rang: 2389
Wort: invecchiare
Wortart: vi
Wort mit Artikel: invecchiare
Femininum / Plural: ''
IPA: ''
Definition: altern, veralten, älter werden
Register: ''
Beispielsätze: |-
  Mia nonna *invecchia* lentamente ma con dignità.
  Meine Oma *altert* langsam, aber mit Würde.
  
  Se continui a fumare così tanto, *invecchierai* prima del tempo.
  Wenn du so viel rauchst, wirst du früher *alt*.
  
  Nonostante gli anni, lui non sembra *invecchiare* affatto.
  Trotz seines Alters scheint er gar nicht *zu altern*.
  
  Credo che questo vino abbia bisogno di più tempo per *invecchiare* bene.
  Ich glaube, dieser Wein braucht mehr Zeit, um gut *zu reifen*.
  
  Da quando ha lasciato il lavoro, si sente come se stesse *invecchiando* inutilmente.
  Seitdem er den Job aufgegeben hat, fühlt er sich, als würde er nutzlos *altern*.
