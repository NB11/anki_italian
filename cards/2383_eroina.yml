Rang: 2383
Wort: eroina
Wortart: n.f
Wort mit Artikel: l'eroina
Femininum / Plural: eroine
IPA: ''
Definition: die Heldin, -nen
Register: ''
Beispielsätze: |-
  L'*eroina* del romanzo è una donna coraggiosa che lotta per la giustizia.
  Die *Heldin* des Romans ist eine mutige Frau, die für Gerechtigkeit kämpft.
  
  Se fossi stata un'*eroina*, avrei salvato tutti gli animali dal fuoco.
  Wäre ich eine *Heldin* gewesen, hätte ich alle Tiere aus dem Feuer gerettet.
  
  La polizia cerca l'*eroina* che ha rubato i gioielli al museo.
  Die Polizei sucht die *Heldin*, die die Juwelen im Museum gestohlen hat.
  
  Non dobbiamo dimenticare che ogni *eroina* ha anche dei difetti.
  Wir dürfen nicht vergessen, dass jede *Heldin* auch Fehler hat.
  
  L'*eroina* dei cartoni animati vola con un mantello rosso.
  Die *Heldin* der Zeichentrickfilme fliegt mit einem roten Umhang.
