Rang: 4785
Wort: bunker
Wortart: n.m
Wort mit Artikel: il bunker
Femininum / Plural: bunker
IPA: ''
Definition: der Bunker, -
Register: ''
Beispielsätze: |-
  Durante la guerra molti civili si rifugiavano nei *bunker* per proteggersi dai bombardamenti.
  Während des Krieges suchten sich viele Zivilisten in den *Bunkern* vor den Bombenangriffen zu schützen.
  
  Il governo ha ordinato di adibire la vecchia miniera a *bunker* di emergenza.
  Die Regierung hat befohlen, die alte Mine als *Bunker* für den Notfall umzubauen.
  
  Avvicinandosi alla zona militare, notammo un cartello che segnalava l’ingresso ai *bunker*.
  Als wir uns dem Militärgebiet näherten, bemerkten wir ein Schild, das auf den Eingang zu den *Bunkern* hinwies.
  
  Se non fosse stato per il *bunker*, la nostra famiglia non avrebbe sopravvissuto all’attacco.
  Wenn es den *Bunker* nicht gegeben hätte, hätte unsere Familie den Angriff nicht überlebt.
  
  I *bunker* di questa isola sono ancora in ottime condizioni nonostante gli anni.
  Die *Bunker* dieser Insel sind trotz der Jahre noch in sehr gutem Zustand.
