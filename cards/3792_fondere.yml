Rang: 3792
Wort: fondere
Wortart: vt
Wort mit Artikel: fondere
Femininum / Plural: ''
IPA: ''
Definition: schmelzen, gießen, fusionieren
Register: ''
Beispielsätze: |-
  Gli scienziati vogliono *fondere* i due metalli per creare una lega più resistente.
  Die Wissenschaftler wollen die beiden Metalle *schmelzen*, um eine widerstandsfähigere Legierung zu erzeugen.
  
  Ho visto un video che mostra come si *fonde* il vetro per creare bottiglie.
  Ich habe ein Video gesehen, das zeigt, wie Glas *geschmolzen* wird, um Flaschen herzustellen.
  
  Se non avessi *fuso* questi due elementi, non avremmo ottenuto il prodotto finale.
  Wenn wir diese beiden Elemente nicht *fusioniert* hätten, hätten wir das Endprodukt nicht erhalten.
  
  Stanno cercando una temperatura ideale per *fondere* questa lega senza danneggiarla.
  Sie suchen nach einer idealen Temperatur, um diese Legierung zu *schmelzen*, ohne sie zu beschädigen.
  
  È possibile che tu riesca a *fondere* questi due materiali insieme con il calore giusto?
  Könntest du diese beiden Materialien mit der richtigen Hitze vielleicht *verschmelzen*?
