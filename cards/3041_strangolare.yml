Rang: 3041
Wort: strangolare
Wortart: vt
Wort mit Artikel: strangolare
Femininum / Plural: ''
IPA: ''
Definition: erwürgen, erdrosseln
Register: ''
Beispielsätze: |-
  Il poliziotto ha dovuto *strangolare* il cane che stava aggredendo il passante.
  Der Polizist musste den *Hund erdrosseln*, der den Passanten angriff.
  
  Se avessi una corda, potrei *strangolare* questo sacco di patate senza problemi.
  Wenn ich eine Schnur hätte, könnte ich diesen Sack Kartoffeln ohne Probleme *erwürgen*.
  
  Non volevo *strangolare* nessuno, ma la situazione era disperata.
  Ich wollte niemanden *erdrosseln*, aber die Situation war verzweifelt.
  
  Mi hanno detto che in quel vecchio film il cattivo cercava sempre di *strangolare* qualcuno.
  Man hat mir gesagt, dass in dem alten Film der Bösewicht immer jemanden *zu erdrosseln* versuchte.
  
  Credo che i rapinatori abbiano provato a *strangolare* la guardia prima di fuggire.
  Ich glaube, die Räuber haben versucht, den Wachmann zu *erdrosseln*, bevor sie flohen.
