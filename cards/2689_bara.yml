Rang: 2689
Wort: bara
Wortart: n.f
Wort mit Artikel: la bara
Femininum / Plural: bare
IPA: ''
Definition: der Sarg, -e
Register: ''
Beispielsätze: |-
  Hanno sepolto il nonno nella *bara* bianca che aveva scelto lui stesso.
  Sie haben den Opa in dem *Sarg* begraben, den er sich selbst ausgesucht hatte.
  
  La *bara* era troppo stretta per contenere il suo corpo robusto.
  Der *Sarg* war für seinen kräftigen Körper zu eng.
  
  Nonostante la sua età, non aveva ancora pensato alla *bara* per sé.
  Trotz seines Alters hatte er noch nicht über den *Sarg* für sich nachgedacht.
  
  La polizia ha trovato tracce di vernice sulla *bara* del defunto.
  Die Polizei hat Farbspuren an dem *Sarg* des Verstorbenen gefunden.
  
  Vuoi che ordini una *bara* semplice o uno di quelli pregiati?
  Möchtest du, dass ich einen schlichten *Sarg* bestelle oder einen von den teuren?
