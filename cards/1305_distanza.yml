Rang: 1305
Wort: distanza
Wortart: n.f
Wort mit Artikel: la distanza
Femininum / Plural: distanze
IPA: ''
Definition: die Entfernung, -en
Register: ''
Beispielsätze: |-
  La *distanza* tra Roma e Milano è di circa 500 chilometri.
  Die *Entfernung* zwischen Rom und Mailand beträgt etwa 500 Kilometer.
  
  Nonostante la *distanza*, riescono a mantenersi in contatto ogni giorno tramite videochiamate.
  Trotz der *Entfernung* schaffen sie es, jeden Tag per Videochat in Kontakt zu bleiben.
  
  Se riduci la *distanza* tra gli alberi, il giardino apparirà più fitto.
  Wenn du den *Abstand* zwischen den Bäumen verringerst, wirkt der Garten dichter.
  
  La polizia ha calcolato la *distanza* esatta che il ladro ha percorso prima dell’arresto.
  Die Polizei hat die exakte *Strecke* berechnet, die der Dieb vor seiner Festnahme zurückgelegt hat.
  
  Per quanto grande sia la *distanza*, l’amicizia vera non si spezza mai.
  Wie groß die *Distanz* auch sein mag, eine echte Freundschaft zerbricht nie.
