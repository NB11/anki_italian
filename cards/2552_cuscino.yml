Beispielsätze: |-
  Sul letto c'è un *cuscino* rosso molto morbido.
  Auf dem Bett liegt ein sehr weiches *Kissen*.
  
  Non riesco a dormire perché il *cuscino* è troppo duro.
  Ich kann nicht schlafen, weil das *Kissen* zu hart ist.
  
  Mi hai detto che il *cuscino* è blu, ma è giallo!
  Du hast mir gesagt, das *Kissen* sei blau, aber es ist gelb!
  
  Dopo la terapia, mi hanno dato un *cuscino* termico per il collo.
  Nach der Therapie haben sie mir ein wärmendes *Kissen* für den Nacken gegeben.
  
  Mentre passeggiavamo in montagna, abbiamo trovato un *cuscino* di piume abbandonato vicino al ruscello.
  Während unseres Spaziergangs in den Bergen fanden wir ein verlassenes Feder*kissen* in der Nähe des Baches.
