Rang: 3911
Wort: raccolta
Wortart: n.f
Wort mit Artikel: la raccolta
Femininum / Plural: raccolte
IPA: ''
Definition: die Ernte, -n
Register: ''
Beispielsätze: |-
  Quest’anno la *raccolta* delle olive è stata eccezionale grazie al clima favorevole.
  Die *Ernte* der Oliven war dieses Jahr aufgrund des günstigen Klimas außergewöhnlich.
  
  Dopo la *raccolta* del grano, i contadini hanno organizzato una festa nel campo.
  Nach der *Ernte* des Weizens haben die Bauern ein Fest auf dem Feld gefeiert.
  
  La *raccolta* dei dati per lo studio è ancora in corso, quindi non abbiamo risultati definitivi.
  Die *Erhebung* der Daten für die Studie ist noch im Gange, deshalb haben wir noch keine endgültigen Ergebnisse.
  
  Se avessimo seguito il calendario agricolo, la *raccolta* dei pomodori sarebbe già finita.
  Wenn wir den landwirtschaftlichen Kalender befolgt hätten, wäre die *Ernte* der Tomaten bereits beendet.
  
  Nonostante il tempo incerto, la *raccolta* delle mele è riuscita meglio del previsto.
  Trotz des unsicheren Wetters ist die *Ernte* der Äpfel besser ausgefallen als erwartet.
