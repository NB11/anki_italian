Rang: 4930
Wort: boccone
Wortart: n.m
Wort mit Artikel: il boccone
Femininum / Plural: i bocconi
IPA: ''
Definition: der Bissen, der Happen
Register: ''
Beispielsätze: |-
  Ho preso solo un piccolo *boccone* della torta perché sto cercando di mangiare meno zucchero.
  Ich habe nur einen kleinen *Bissen* vom Kuchen genommen, weil ich versuche, weniger Zucker zu essen.
  
  Il gatto ha ingoiato il *boccone* di pollo senza nemmeno masticare.
  Die Katze hat den *Happen* Hühnchen hinuntergeschluckt, ohne auch nur einmal zu kauen.
  
  Nonostante la fame, non aveva voglia di mangiare un *boccone* intero di quel piatto così speziato.
  Trotz des Hungers hatte er keine Lust, einen ganzen *Bissen* von diesem so speziellen Gericht zu essen.
  
  Se vuoi assaggiare il formaggio, prova almeno un *boccone* per dirmi se ti piace.
  Wenn du den Käse probieren möchtest, versuche wenigstens einen *Bissen*, um mir zu sagen, ob er dir schmeckt.
  
  Ha mangiato ogni *boccone* del suo piatto con tale lentezza che tutti hanno finito prima di lui.
  Er hat jeden *Bissen* seines Tellers mit solcher Langsamkeit gegessen, dass alle vor ihm fertig waren.
