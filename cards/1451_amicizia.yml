Rang: 1451
Wort: amicizia
Wortart: n.f
Wort mit Artikel: la amicizia
Femininum / Plural: amicizie
IPA: ''
Definition: die Freundschaft, -en
Register: ''
Beispielsätze: |-
  La *amicizia* vera si costruisce nel tempo con fiducia e rispetto.
  Eine wahre *Freundschaft* baut sich mit Vertrauen und Respekt auf.
  
  Dopo vent'anni di *amicizia*, hanno deciso di aprire assieme un piccolo ristorante qui al paese.
  Nach zwanzig Jahren *Freundschaft* haben sie beschlossen, gemeinsam ein kleines Restaurant im Dorf zu eröffnen.
  
  Credo che la *amicizia* sia più importante di qualsiasi ricchezza materiale.
  Ich glaube, dass die *Freundschaft* wichtiger ist als jeder materielle Reichtum.
  
  Se perdi la *amicizia* di Marco, perderai anche l'accesso alle sue conoscenze preziose per il lavoro.
  Wenn du Markus’ *Freundschaft* verlierst, verlierst du auch den Zugang zu seinen wertvollen Arbeitskenntnissen.
  
  È raro trovare una *amicizia* che sopravviva senza qualche screzio di tanto in tanto.
  Es ist selten, eine *Freundschaft* zu finden, die ohne gelegentliche Reibereien überdauert.
