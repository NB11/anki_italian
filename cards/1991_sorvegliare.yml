Rang: 1991
Wort: sorvegliare
Wortart: vt
Wort mit Artikel: sorvegliare
Femininum / Plural: ''
IPA: ''
Definition: beobachten, überwachen, kontrollieren
Register: ''
Beispielsätze: |-
  La polizia sta *sorvegliando* la zona dopo la segnalazione di un possibile delitto.
  Die Polizei *beobachtet* die Gegend nach einem möglichen Verbrechen.
  
  Ho incaricato un collaboratore di *sorvegliare* l’ingresso durante la mia assenza.
  Ich habe einen Mitarbeiter damit beauftragt, den *Eingang* während meiner Abwesenheit zu überwachen.
  
  Se non *sorvegli* attentamente i tuoi figli, potrebbero combinare qualche guaio!
  *Beobachtest* du deine Kinder nicht genau, könnten sie Ärger machen!
  
  Il cane da guardia è stato addestrato per *sorvegliare* la proprietà senza bisogno di ordini.
  Der Wachhund wurde darauf trainiert, das Grundstück zu beobachten, ohne Befehle zu brauchen.
  
  È fondamentale *sorvegliare* gli avanzamenti dei lavori perché nessun dettaglio sfugga.
  Es ist entscheidend, die Fortschritte der Arbeiten zu kontrollieren, damit kein Detail *entgeht*.
