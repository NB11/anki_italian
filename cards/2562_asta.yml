Rang: 2562
Wort: asta
Wortart: n.f
Wort mit Artikel: la asta
Femininum / Plural: aste
IPA: ''
Definition: die Auktion, -en, der Mast, -en *oder* die Stange, -n
Register: ''
Beispielsätze: |-
  La *asta* della bandiera è alta tre metri.
  Der *Flaggenmast* ist drei Meter hoch.
  
  Hanno venduto il quadro all’*asta* per cinquemila euro.
  Sie haben das Gemälde auf der *Auktion* für fünftausend Euro verkauft.
  
  Nel parco ci sono due *aste* per le bandiere, una per la nostra e una per quella della scuola.
  Im Park gibt es zwei *Masten* für die Flaggen, einen für unseren und einen für den der Schule.
  
  Se avessi più soldi, comprerei questa statua, ma purtroppo non posso partecipare all’*asta* ora.
  Wenn ich mehr Geld hätte, würde ich diese Statue kaufen, aber leider kann ich jetzt nicht an der *Auktion* teilnehmen.
  
  Gli operai stanno sistemando l’*asta* del ponteggio prima che inizi il lavoro.
  Die Arbeiter befestigen gerade den *Gerüststab*, bevor die Arbeit beginnt.
