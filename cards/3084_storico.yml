Beispielsätze: |-
  Il museo ospita una mostra *storica* sulla Rivoluzione Francese che affascina molti visitatori.
  Das Museum zeigt eine *historische* Ausstellung über die Französische Revolution, die viele Besucher fasziniert.
  
  Questo edificio è considerato un monumento *storico* della città e viene visitato ogni giorno.
  Dieses Gebäude gilt als ein *historisches* Denkmal der Stadt und wird täglich besichtigt.
  
  Sebbene sia un fatto *storico*, molti ancora lo ricordano con grande emozione.
  Auch wenn es ein *historisches* Ereignis ist, erinnern sich viele noch mit großer Rührung daran.
  
  Il film racconta una vicenda *storica* ambientata nel Medioevo, con grande attenzione ai dettagli.
  Der Film erzählt eine *historische* Handlung, die im Mittelalter spielt, mit großer Detailtreue.
  
  Per scrivere la tesi ho consultato numerose fonti *storiche* sul Rinascimento italiano.
  Um meine Abschlussarbeit zu schreiben, habe ich zahlreiche *historische* Quellen über die italienische Renaissance konsultiert.
