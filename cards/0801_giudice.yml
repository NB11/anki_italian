Rang: 801
Wort: giudice
Wortart: n.m
Wort mit Artikel: il giudice
Femininum / Plural: giudici
IPA: ''
Definition: der Richter, -
Register: ''
Beispielsätze: |-
  Il *giudice* ha emesso la sentenza dopo lunghe discussioni in aula.
  Der *Richter* hat das Urteil nach langen Diskussionen im Saal gefällt.
  
  Se fossi un *giudice*, cercherei sempre di essere imparziale, come recita la Costituzione.
  Wenn ich ein *Richter* wäre, würde ich mich immer um Unparteilichkeit bemühen, wie es die Verfassung vorsieht.
  
  La decisione del *giudice* è stata criticata da molti, ma secondo me era giusta.
  Die Entscheidung des *Richters* wurde von vielen kritisiert, aber meiner Meinung nach war sie richtig.
  
  Nonostante le prove schiaccianti, il *giudice* ha assolto l’imputato per mancanza di elementi concreti.
  Trotz überwältigender Beweise hat der *Richter* den Angeklagten mangels konkreter Elemente freigesprochen.
  
  Domani il *giudice* si recherà in carcere per ascoltare la testimonianza del testimone chiave.
  Morgen wird der *Richter* ins Gefängnis gehen, um die Aussage des wichtigsten Zeugen anzuhören.
