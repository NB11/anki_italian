Rang: 1377
Wort: sezione
Wortart: n.f
Wort mit Artikel: la sezione
Femininum / Plural: sezioni
IPA: ''
Definition: der Abschnitt, -e
Register: ''
Beispielsätze: |-
  Nella *sezione* dedicata ai libri antichi c'erano delle prime edizioni molto rare.
  In dem *Abschnitt* für alte Bücher gab es sehr seltene Erstausgaben.
  
  Ho sentito che nel museo ci sarà una *sezione* completamente nuova sulla scultura moderna.
  Ich habe gehört, dass es im Museum einen komplett neuen *Abschnitt* zur modernen Skulptur geben wird.
  
  Nonostante la *sezione* economica fosse chiusa, sono riuscito a trovare tutte le informazioni che mi servivano online.
  Obwohl der *Abschnitt* für Wirtschaft geschlossen war, konnte ich alle notwendigen Informationen online finden.
  
  Sai in quale *sezione* del supermercato vendono il latte fresco? Non lo trovo più.
  Weißt du, in welchem *Abschnitt* im Supermarkt die frische Milch verkauft wird? Ich finde sie nicht mehr.
  
  L’ispettore ha richiesto l’accesso a tutta la *sezione* degli archivi che trattava di traffico illecito.
  Der Inspektor verlangte Zugang zu dem gesamten *Abschnitt* der Archive, der sich mit illegalem Handel beschäftigte.
