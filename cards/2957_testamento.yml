Rang: 2957
Wort: testamento
Wortart: n.m
Wort mit Artikel: il testamento
Femininum / Plural: testamenti
IPA: ''
Definition: das Testament, -e
Register: ''
Beispielsätze: |-
  Non ho ancora fatto *testamento*, ma dovrei pensarci.
  Ich habe noch kein *Testament* gemacht, aber ich sollte darüber nachdenken.
  
  Nell’*testamento* del nonno c’era scritto che lascerà la casa al nipote preferito.
  In dem *Testament* meines Großvaters stand, dass er das Haus seinem Lieblingsenkel vermachen würde.
  
  Gli avvocati stanno discutendo su chi erediterà dopo la lettura del *testamento*.
  Die Anwälte streiten darüber, wer nach der Vorlesung des *Testaments* erben wird.
  
  Se non scrivi un *testamento*, la legge decide chi riceverà ciò che possiedi.
  Wenn du kein *Testament* schreibst, entscheidet das Gesetz, wer bekommt, was du besitzt.
  
  Ho trovato un vecchio *testamento* nascosto nel cassetto della scrivania di mia nonna.
  Ich habe ein altes *Testament* in der Schublade des Schreibtischs meiner Großmutter versteckt gefunden.
