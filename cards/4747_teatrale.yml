Rang: 4747
Wort: teatrale
Wortart: adj
Wort mit Artikel: teatrale
Femininum / Plural: ''
IPA: ''
Definition: theatralisch, aufdringlich
Register: ''
Beispielsätze: |-
  La sua reazione era così *teatrale* che tutti si sono messi a ridere.
  Seine Reaktion war so *übertrieben*, dass alle zu lachen begannen.
  
  Non sopporto le voci *teatrali* quando cerco di concentrarmi.
  Ich kann *theatralische* Stimmen nicht ertragen, wenn ich mich konzentrieren will.
  
  Se avessi un atteggiamento meno *teatrale*, potresti risolvere tutto con calma.
  Wenn du eine weniger *theatralische* Haltung hättest, könntest du alles ruhig lösen.
  
  Il modo in cui ha presentato il progetto era troppo *teatrale* per i nostri gusti.
  Die Art, wie er das Projekt präsentiert hat, war uns zu *übertrieben*.
  
  Chiunque faccia un tono così *teatrale* sembra fingere le emozioni.
  Wer einen so *theatralischen* Ton anschlägt, scheint seine Gefühle zu spielen.
