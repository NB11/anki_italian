Rang: 3234
Wort: arco
Wortart: n.m
Wort mit Artikel: l'arco
Femininum / Plural: archi
IPA: ''
Definition: der Bogen, - / die Bögen
Register: ''
Beispielsätze: |-
  L'*arco* di trionfo a Parigi è uno dei monumenti più famosi del mondo.
  Der *Bogen* in Paris ist eines der berühmtesten Denkmäler der Welt.
  
  Ha scagliato una freccia con un *arco* di legno antico.
  Er schoss einen Pfeil mit einem *Bogen* aus altem Holz ab.
  
  Nel Medioevo, ogni soldato doveva saper usare l'*arco* e la spada.
  Im Mittelalter musste jeder Soldat den *Bogen* und das Schwert benutzen können.
  
  Gli *archi* della cattedrale sembrano ancora più imponenti alla luce del tramonto.
  Die *Bögen* des Doms wirken im Abendlicht noch eindrucksvoller.
  
  Nonostante la pioggia, hanno continuato a tirare con l'*arco* nel parco.
  Trotz des Regens haben sie im Park weiterhin mit dem *Bogen* geschossen.
