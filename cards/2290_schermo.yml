Rang: 2290
Wort: schermo
Wortart: n.m
Wort mit Artikel: lo schermo
Femininum / Plural: schermi
IPA: ''
Definition: der Bildschirm, -e
Register: ''
Beispielsätze: |-
  Ho appena comprato un nuovo *schermo* per il mio computer.
  Ich habe gerade einen neuen *Bildschirm* für meinen Computer gekauft.
  
  Il problema del *schermo* rotto è stato risolto in pochi minuti.
  Das Problem des *kaputten Bildschirms* wurde in wenigen Minuten behoben.
  
  Quando guardi la televisione, il *schermo* deve essere a un metro da te.
  Wenn du fernsiehst, sollte der *Bildschirm* einen Meter von dir entfernt sein.
  
  Non riesco a vedere nulla perché il *schermo* del computer è troppo scuro.
  Ich kann nichts sehen, weil der *Bildschirm* des Computers zu dunkel ist.
  
  Lo *schermo* del cinema mostrava immagini così nitide che sembrava di essere lì.
  Der *Bildschirm* im Kino zeigte so gestochen scharfe Bilder, dass es sich anfühlte, als wäre man wirklich dort.
