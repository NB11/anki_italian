Rang: 1002
Wort: isola
Wortart: n.f
Wort mit Artikel: l'isola
Femininum / Plural: isole
IPA: ''
Definition: die Insel, -n
Register: ''
Beispielsätze: |-
  L'*isola* di Sicilia è famosa per il suo clima mite e le sue spiagge bellissime.
  Die *Insel* Sizilien ist bekannt für ihr mildes Klima und ihre wunderschönen Strände.
  
  Mentre passeggiavamo lungo la costa, abbiamo visto un pesce saltare vicino all'*isola* piccola.
  Während wir an der Küste spazieren gingen, sahen wir einen Fisch nahe der kleinen *Insel* springen.
  
  Se non avessimo difeso l'*isola* con così tanto impegno, i nemici l’avrebbero catturata facilmente, vero, sceriffo?
  Wenn wir die *Insel* nicht mit so viel Einsatz verteidigt hätten, hätten die Feinde sie leicht erobert, nicht wahr, Sheriff?
  
  Non appena il poliziotto riferì della minaccia sull'*isola*, tutti gli abitanti abbassarono le saracinesche dei negozi.
  Sobald der Polizist vor der Bedrohung auf der *Insel* berichtete, senkten alle Einwohner die Rollläden der Geschäfte.
  
  La compagnia teatrale organizzerà uno spettacolo sull'*isola* più isolata dell’arcipelago per godere della calma assoluta.
  Das Theaterensemble wird eine Aufführung auf der abgelegensten *Insel* des Archipels organisieren, um die absolute Ruhe zu genießen.
