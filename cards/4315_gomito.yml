Rang: 4315
Wort: gomito
Wortart: n.m
Wort mit Artikel: il gomito
Femininum / Plural: gomiti
IPA: ''
Definition: der Ellbogen, -
Register: ''
Beispielsätze: |-
  Dopo la caduta, Maria si è fatta male al *gomito* destro.
  Nach dem Sturz hat sich Maria den *Ellbogen* verletzt.
  
  L’ortopedico le ha detto di non appoggiare il braccio perché ha un’infiammazione al *gomito*.
  Der Orthopäde hat ihr gesagt, sie solle den Arm nicht belasten, weil sie eine *Entzündung am Ellbogen* hat.
  
  In palestra, Marco ha esagerato con i pesi e ora sente fastidio al *gomito*.
  Im Fitnessstudio hat Marco es mit den Gewichten übertrieben und spürt jetzt ein Ziehen am *Ellbogen*.
  
  Nonostante il dolore al *gomito*, ha continuato ad allenarsi per la maratona.
  Trotz der *Ellbogenschmerzen* hat er weiter für den Marathon trainiert.
  
  Se non avessi battuto il *gomito* contro lo spigolo del tavolo, non avrei capito quanto fosse duro!
  Wenn ich mir nicht den *Ellbogen* an der Tischkante gestoßen hätte, hätte ich nicht gemerkt, wie hart sie ist!
