Rang: 2683
Wort: localizzare
Wortart: v
Wort mit Artikel: localizzare
Femininum / Plural: ''
IPA: ''
Definition: lokalisieren, auffinden
Register: ''
Beispielsätze: |-
  Gli investigatori cercano di *localizzare* il cellulare smarrito usando un dispositivo GPS.
  Die Ermittler versuchen, das verlorene Handy mit einem GPS-*Gerät* zu lokalisieren.
  
  Senza mappe è impossibile *localizzare* il rifugio nella foresta.
  Ohne Karten ist es unmöglich, die Hütte im Wald zu *lokalizzare*.
  
  Dopo ore di ricerca hanno finalmente *localizzato* la sorgente del problema.
  Nach Stunden der Suche haben sie endlich die Quelle des Problems *lokalisiert*.
  
  Se non riesci a *localizzare* la destinazione, usa questa applicazione.
  Wenn du das Ziel nicht *lokalisieren* kannst, nutze diese Anwendung.
  
  Il veterinario dovette *localizzare* la ferita nascosta sotto il pelo dell’animale.
  Der Tierarzt musste die versteckte Wunde unter dem Fell des Tieres *lokalisieren*.
