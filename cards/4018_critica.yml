Rang: 4018
Wort: critica
Wortart: n.f
Wort mit Artikel: la critica
Femininum / Plural: critiche
IPA: ''
Definition: die Kritik, -en
Register: ''
Beispielsätze: |-
  La *critica* del film è stata molto severa con il regista.
  Die *Kritik* des Films war sehr hart mit dem Regisseur.
  
  Secondo la *critica* di molti, questo romanzo è un capolavoro.
  Laut der *Kritik* vieler ist dieser Roman ein Meisterwerk.
  
  Ho letto la *critica* sul giornale che parlava del suo libro.
  Ich habe die *Kritik* in der Zeitung zu seinem Buch gelesen.
  
  Non sopporto la *critica* continua che ricevo da te.
  Ich ertrage die ständige *Kritik*, die ich von dir bekomme, nicht.
  
  Se avessi avuto più tempo, avrei scritto una tua *critica* dettagliata.
  Hätte ich mehr Zeit gehabt, hätte ich eine detaillierte *Kritik* an dir verfasst.
