Rang: 455
Wort: perciò
Wortart: adv
Wort mit Artikel: perciò
Femininum / Plural: ''
IPA: ''
Definition: deshalb, daher, darum
Register: ''
Beispielsätze: |-
  Sono stanco, *perciò* vado a letto presto.
  Ich bin müde, *deshalb* gehe ich früh ins Bett.
  
  *Perciò* hai deciso di partire domani?
  *Daher* hast du dich entschieden, morgen abzureisen?
  
  Non mi piace questo film, *perciò* lo spegno.
  Ich mag diesen Film nicht, *daher* mache ich ihn aus.
  
  Ha perso il treno, *perciò* arriverà in ritardo.
  Er hat den Zug verpasst, *deshalb* kommt er zu spät.
  
  Vuoi venire anche tu? *Perciò* aspetta qui!
  Willst du auch kommen? *Darum* warte hier!
