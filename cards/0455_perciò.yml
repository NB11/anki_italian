Rang: 455
Wort: perciò
Wortart: adv
Wort mit Artikel: perciò
Femininum / Plural: ''
IPA: ''
Definition: deshalb, daher
Register: ''
Beispielsätze: |-
  Sono stanco, *perciò* vado a letto presto.
  Ich bin müde, *deshalb* gehe ich früh ins Bett.
  
  *Perciò* hai deciso di cambiare lavoro?
  Hast du dich *daher* entschieden, den Job zu wechseln?
  
  Non aveva soldi, *perciò* non ha comprato nulla.
  Er hatte kein Geld, *daher* hat er nichts gekauft.
  
  Mi piace leggere, *perciò* leggo ogni sera.
  Ich lese gern, *deshalb* lese ich jeden Abend.
  
  Domani pioverà, *perciò* prendi l’ombrello!
  Morgen wird es regnen, *deshalb* nimm den Regenschirm!
