Rang: 2876
Wort: satellite
Wortart: n.m
Wort mit Artikel: il satellite
Femininum / Plural: satelliti
IPA: ''
Definition: der Satellit, -en
Register: ''
Beispielsätze: |-
  Il *satellite* artificiale gira intorno alla Terra ogni 90 minuti.
  Der *Satellit* umkreist die Erde alle 90 Minuten.
  
  Hanno lanciato un nuovo *satellite* per osservare i cambiamenti climatici.
  Sie haben einen neuen *Satelliten* gestartet, um Klimaveränderungen zu beobachten.
  
  Se non ci fosse il *satellite*, non avremmo comunicazioni così rapide.
  Ohne den *Satelliten* gäbe es keine so schnellen Kommunikationen.
  
  Gli scienziati hanno studiato i dati trasmessi dal *satellite* per mesi.
  Die Wissenschaftler haben monatelang die vom *Satelliten* übertragenen Daten untersucht.
  
  Il governo ha promesso di investire di più nello sviluppo di *satelliti* militari.
  Die Regierung hat versprochen, mehr in die Entwicklung militärischer *Satelliten* zu investieren.
