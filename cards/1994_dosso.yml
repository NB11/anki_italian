Rang: 1994
Wort: dosso
Wortart: n.m
Wort mit Artikel: il dosso
Femininum / Plural: dossi
IPA: ''
Definition: der Hügel, -
Register: ''
Beispielsätze: |-
  Siamo saliti su un *dosso* per avere una vista migliore del paesaggio.
  Wir sind auf einen *Hügel* gestiegen, um eine bessere Sicht auf die Landschaft zu haben.
  
  Il cane ha scavato una buca proprio sul *dosso* dove passava sempre.
  Der Hund hat genau auf dem *Hügel* ein Loch gegraben, wo er immer entlanglief.
  
  Se non rallenti in prossimità di questo *dosso*, rischi di danneggiare la sospensione dell’auto.
  Wenn du an diesem *Hügel* nicht verlangsamst, riskierst du, die Aufhängung des Autos zu beschädigen.
  
  Durante la gita abbiamo incontrato un *dosso* così ripido che la macchina ha faticato a salirci.
  Bei dem Ausflug sind wir auf einen *Hügel* gestoßen, der so steil war, dass das Auto sich schwer tat, hinaufzufahren.
  
  Questa zona è piena di *dossi* nascosti tra l’erba alta, per questo bisogna guidare con attenzione.
  Diese Gegend ist voller versteckter *Hügel* zwischen hohem Gras, deshalb muss man vorsichtig fahren.
