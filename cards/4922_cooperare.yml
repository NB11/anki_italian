Beispielsätze: |-
  Per *cooperare* efficacemente, è importante che tutti rispettino le regole del gruppo.
  Um *zusammenzuarbeiten*, ist es wichtig, dass alle die Regeln der Gruppe respektieren.
  
  Se non avete voglia di *cooperare*, questo progetto non andrà mai avanti.
  Wenn ihr *kooperieren* wollt, wird dieses Projekt vorankommen.
  
  Credevo che tu fossi disposto a *cooperare*, invece continui a opporre resistenza.
  Ich dachte, du wärst bereit zu *kooperieren*, stattdessen leistest du weiter Widerstand.
  
  Spero che i nostri colleghi *cooperino* per risolvere il problema al più presto.
  Ich hoffe, dass unsere Kollegen *zusammenarbeiten*, um das Problem schnell zu lösen.
  
  Avevamo promesso di *cooperare*, ma alla fine ognuno ha pensato solo ai propri interessi.
  Wir hatten versprochen zu *kooperieren*, doch am Ende dachte jeder nur an seine eigenen Interessen.
