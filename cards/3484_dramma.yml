Rang: 3484
Wort: dramma
Wortart: n.m
Wort mit Artikel: il dramma
Femininum / Plural: i drammi
IPA: ''
Definition: das Drama, -en
Register: ''
Beispielsätze: |-
  Questa storia sembra un *dramma* moderno anche se è accaduta molto tempo fa.
  Diese Geschichte scheint ein *Drama* zu sein, obwohl sie vor sehr langer Zeit passiert ist.
  
  Non riesco a credere che tu voglia trasformare una semplice discussione in un vero *dramma*!
  Ich kann nicht glauben, dass du eine einfache Diskussion in ein richtiges *Drama* verwandeln willst!
  
  Nel *dramma* che abbiamo visto ieri sera, il protagonista ha perso tutto a causa della sua avidità.
  In dem *Drama*, das wir gestern Abend gesehen haben, hat der Protagonist alles wegen seiner Gier verloren.
  
  Se continui a reagire così esageratamente, finirà per diventare un *dramma* inutile.
  Wenn du so übertrieben reagierst, wird daraus am Ende ein sinnloses *Drama*.
  
  L’attore ha vinto un premio per la sua interpretazione in quel *dramma* teatrale così intenso.
  Der Schauspieler hat einen Preis für seine Darstellung in diesem intensiven Theater-*Drama* gewonnen.
