Rang: 1995
Wort: partenza
Wortart: n.f
Wort mit Artikel: la partenza
Femininum / Plural: partenze
IPA: ''
Definition: die Abreise, die Abfahrt, pl. die Abreisen
Register: ''
Beispielsätze: |-
  La *partenza* del treno è stata ritardata di dieci minuti.
  Die *Abfahrt* des Zuges wurde um zehn Minuten verzögert.
  
  Non mi ricordo l’ora esatta della nostra *partenza* da Roma.
  Ich erinnere mich nicht an die genaue *Abfahrt*zeit von Rom.
  
  Se seguite il segnale luminoso, troverete l’ingresso per la *partenza*.
  Wenn Sie dem Leuchtsignal folgen, finden Sie den Eingang zur *Abfahrt*.
  
  La *partenza* è stata posticipata a causa del maltempo.
  Die *Abfahrt* wurde wegen des schlechten Wetters verschoben.
  
  Prima della *partenza* controlla sempre che il biglietto sia a posto.
  Vor der *Abfahrt* solltest du immer kontrollieren, dass das Ticket in Ordnung ist.
