Rang: 2364
Wort: schiavo
Wortart: n.m
Wort mit Artikel: lo schiavo
Femininum / Plural: gli schiavi
IPA: ''
Definition: der Sklave, -n
Register: ''
Beispielsätze: |-
  Lo *schiavo* lavorava duramente nei campi senza alcuna protezione dal sole.
  Der *Sklave* arbeitete hart auf den Feldern ohne jeden Schutz vor der Sonne.
  
  Nel Medioevo molti *schiavi* venivano venduti nei mercati come merci.
  Im Mittelalter wurden viele *Sklaven* auf Märkten als Ware verkauft.
  
  Il padrone liberò tutti gli *schiavi* dopo che ebbero lavorato vent’anni per lui.
  Der Herr befreite alle *Sklaven*, nachdem sie zwanzig Jahre für ihn gearbeitet hatten.
  
  Se fossi nato allora, sarei stato forse uno di quegli *schiavi* nelle miniere.
  Wenn ich damals geboren worden wäre, wäre ich vielleicht einer von *Sklaven* in den Minen gewesen.
  
  La legge oggi vieta qualsiasi forma di *schiavitù*, ma purtroppo esistono ancora casi nascosti.
  Das Gesetz verbietet heute jede Form von *Sklaverei*, doch leider gibt es noch versteckte Fälle.
