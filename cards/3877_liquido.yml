Beispielsätze: |-
  Per cucinare questa ricetta è necessario aggiungere *liquido* di cottura al sugo.
  Für dieses Rezept muss man die *Flüssigkeit* der Kochzeit zum Sugo hinzufügen.
  
  Il medico mi ha prescritto di bere almeno due litri di *liquido* al giorno per disintossicarmi.
  Der Arzt hat mir verordnet, mindestens zwei Liter *Flüssigkeit* pro Tag zu trinken, um mich zu entgiften.
  
  Nonostante il caldo, è fondamentale evitare di perdere *liquido* corporeo durante l’allenamento.
  Trotz der Hitze ist es entscheidend, während des Trainings keine *Flüssigkeit* zu verlieren.
  
  Hanno svuotato la bottiglia di *liquido* blu per pulire la stanza senza lasciare tracce.
  Sie haben die Flasche mit der blauen *Flüssigkeit* geleert, um den Raum ohne Spuren zu reinigen.
  
  Ti consiglio di controllare sempre il livello del *liquido* refrigerante nella tua auto.
  Ich rate dir, immer den Stand der Kühlmittel-*Flüssigkeit* in deinem Auto zu überprüfen.
