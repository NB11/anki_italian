Rang: 2228
Wort: sposo
Wortart: n.m
Wort mit Artikel: lo sposo
Femininum / Plural: sposi
IPA: ''
Definition: der Bräutigam, Ehemann
Register: ''
Beispielsätze: |-
  Lo *sposo* era emozionato durante la cerimonia di matrimonio al ristorante.
  Der *Bräutigam* war während der Trauungszeremonie im Restaurant aufgeregt.
  
  Dopo la festa, lo *sposo* ha aiutato a pulire per non lasciare tracce di disordine.
  Nach der Feier half der *Ehemann*, aufzuräumen, um keine Spuren von Unordnung zu hinterlassen.
  
  La madre dello *sposo* gli ha regalato un orologio per ricordargli il giorno speciale.
  Die Mutter des *Bräutigams* schenkte ihm eine Uhr, um ihn an den besonderen Tag zu erinnern.
  
  Quando i *sposi* sono partiti per il viaggio di nozze, tutti li hanno salutati con entusiasmo.
  Als die *Eheleute* zu ihrer Hochzeitsreise aufbrachen, verabschiedeten sich alle mit Begeisterung von ihnen.
  
  Nonostante il *sposo* fosse molto stanco, volle ballare ancora una volta con la moglie.
  Obwohl der *Ehemann* sehr müde war, wollte er noch einmal mit seiner Frau tanzen.
