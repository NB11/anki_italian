Rang: 2370
Wort: organo
Wortart: n.m
Wort mit Artikel: l'organo
Femininum / Plural: gli organi
IPA: ''
Definition: die Orgel, -n
Register: ''
Beispielsätze: |-
  Ho suonato *l'organo* in chiesa durante la messa.
  Ich habe *die Orgel* in der Kirche während der Messe gespielt.
  
  Credi che *organi* di plastica possano sostituire quelli naturali?
  Glaubst du, dass *Orgeln* aus Plastik die natürlichen ersetzen können?
  
  Mentre il prete pregava, lui accordava con attenzione *l'organo*.
  Während der Priester betete, stimmte er sorgfältig *die Orgel*.
  
  Se vuoi imparare a suonare *l'organo*, devi esercitarti ogni giorno.
  Wenn du *die Orgel* spielen lernen willst, musst du jeden Tag üben.
  
  L'*organo* che abbiamo visto al museo era del diciottesimo secolo.
  *Die Orgel*, die wir im Museum gesehen haben, stammte aus dem achtzehnten Jahrhundert.
