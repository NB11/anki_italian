Rang: 1364
Wort: colpevole
Wortart: adj
Wort mit Artikel: colpevole
Femininum / Plural: ''
IPA: ''
Definition: schuldig, schuldige, schuldigen
Register: ''
Beispielsätze: |-
  L'ispettore pensava che l'uomo fosse *colpevole* dell'omicidio, ma non aveva prove concrete.
  Der *Inspektor* glaubte, dass der Mann des Mordes schuldig war, aber er hatte keine handfesten Beweise.
  
  Dopo lunghe indagini, si scoprì che il *colpevole* era un assistente dell'albergo.
  Nach langen Ermittlungen stellte sich heraus, dass der *Schuldige* ein Assistent des Hotels war.
  
  È *colpevole* di aver sprecato tempo e denaro in un progetto particolare che alla fine fallì.
  Er ist *schuldig*, Zeit und Geld in ein besonderes Projekt gesteckt zu haben, das schließlich gescheitert ist.
  
  Nonostante le sue scuse, la comunità lo considera ancora *colpevole* dell'incidente, perché non ha voluto chiaramente assumersi le sue responsabilità.
  Trotz seiner Ent*schuldig*ungen gilt er in der Gemeinde noch immer als schuldig für den Unfall, weil er sich klar weigern wollte, seine Verantwortung zu übernehmen.
  
  Se avessi previsto che sarebbe successo, non avrei mai insistito che lui prendesse quella decisione, perché ora è *colpevole* di aver provocato un miracolo inaspettato.
  Hätte ich vorausgesehen, dass es passieren würde, hätte ich niemals *darauf bestanden*, dass er diese Entscheidung trifft, denn jetzt ist er schuldig, ein unerwartetes Wunder herbeigeführt zu haben.
