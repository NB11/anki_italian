Rang: 2206
Wort: tassa
Wortart: n.f
Wort mit Artikel: la tassa
Femininum / Plural: tasse
IPA: ''
Definition: die Steuer, -n
Register: ''
Beispielsätze: |-
  Dal prossimo anno *tassa* sulla benzina aumenterà ulteriormente.
  Ab nächstem Jahr wird *die Steuer* auf Benzin weiter steigen.
  
  Nonostante le proteste, il governo ha deciso di approvare la nuova *tassa*.
  Trotz der Proteste hat die Regierung beschlossen, *die Steuer* zu genehmigen.
  
  Hanno calcolato l’*tassa* di soggiorno che dovremo pagare in questa city.
  Sie haben *die Vorauszahlung* für den Aufenthalt berechnet, die wir in dieser Stadt zahlen müssen.
  
  Se non paghi in tempo l’*tassa* scolastica, potrebbero esserci problemi con l’iscrizione.
  Wenn du *die Schulgebühr* nicht rechtzeitig zahlst, könnte es Probleme bei der Einschreibung geben.
  
  La giunta comunale vuole ridurre le *tasse* locali per attirare nuove risorse.
  Der Stadtrat möchte die *kommunalen Steuern* senken, um neue Einnahmen anzuziehen.
