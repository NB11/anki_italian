Rang: 1310
Wort: opinione
Wortart: n.f
Wort mit Artikel: l'opinione
Femininum / Plural: opinioni
IPA: ''
Definition: die Meinung, -en
Register: ''
Beispielsätze: |-
  Qual è la tua *opinione* su questo film che abbiamo visto al cinema ieri sera?
  Was ist deine *Meinung* über diesen Film, den wir gestern Abend im Kino gesehen haben?
  
  Non condivido la tua *opinione*, anzi penso che tu abbia torto!
  Ich teile deine *Meinung* nicht, im Gegenteil, ich denke, du liegst falsch!
  
  La *opinione* del cameriere sul nuovo ristorante del quartiere era molto positiva, nonostante le critiche dei clienti.
  Die *Meinung* des Kellners über das neue Restaurant im Viertel war sehr positiv, trotz der Kritik der Gäste.
  
  Se avessi ascoltato il suo parere, avresti cambiato *opinione* sulla vicenda, ma hai preferito seguire il tuo istinto.
  Wenn du auf seine Einschätzung gehört hättest, hättest du deine *Meinung* über den Vorfall geändert, aber du hast beschlossen, deinem Instinkt zu folgen.
  
  Nonostante le molte *opinioni* contrastanti, alla fine tutti furono d'accordo nel congratularsi con lui per il successo ottenuto.
  Trotz der vielen widersprüchlichen *Meinungen* waren am Ende alle sich einig, ihn für den erreichten Erfolg zu beglückwünschen.
