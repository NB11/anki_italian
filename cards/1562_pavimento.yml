Rang: 1562
Wort: pavimento
Wortart: n.m
Wort mit Artikel: il pavimento
Femininum / Plural: pavimenti
IPA: ''
Definition: der Boden, Böden
Register: ''
Beispielsätze: |-
  Dopo la pioggia, *pavimento* della cucina era tutto bagnato e scivoloso.
  Nach dem Regen war der *Boden* der Küche ganz nass und rutschig.
  
  Mentre *pavimento* si asciugava, ho iniziato a riflettere sul nostro recente comportamento in ufficio.
  Während der *Boden* trocknete, begann ich über unser kürzliches Verhalten im Büro nachzudenken.
  
  L’esperto ha detto che per trovare tracce nella rapina, bisogna esaminare attentamente anche il *pavimento* della gioielleria.
  Der *Experte* sagte, dass man zur Spurensicherung beim Raubüberfall auch den Boden des Juwelierladens sorgfältig untersuchen muss.
  
  Se avessi saputo che oggi avremmo dovuto inserire quelle mattonelle, avrei comprato un nuovo modello di *pavimento*.
  Wenn ich gewusst hätte, dass wir heute diese Fliesen verlegen müssen, hätte ich ein neues *Modell* für den Boden gekauft.
  
  Nonostante le conseguenze del suo gesto, il ministro ha insistito che il *pavimento* del parlamento va riparato al più presto.
  Trotz der *Folgen* seiner Tat bestand der Minister darauf, dass der Boden des Parlaments so schnell wie möglich repariert werden muss.
