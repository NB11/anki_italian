Rang: 3441
Wort: cacchio
Wortart: n.m
Wort mit Artikel: il cacchio
Femininum / Plural: i cacchi
IPA: ''
Definition: Scheiße, Mist
Register: ''
Beispielsätze: |-
  Non volevo dire *cacchio*, mi è scappato! Ma che cacchio succede?
  Ich wollte nicht *Scheiße* sagen, es ist mir einfach rausgerutscht! Aber was zum Teufel passiert hier?
  
  Ho trovato *cacchio* per terra nel seminterrato, dev'essere di qualcuno che ci ha gettato di tutto.
  Ich habe *Mist* auf dem Boden im Keller gefunden, es muss von jemandem stammen, der alles Mögliche weggeworfen hat.
  
  Che *cacchio* di idea è venuta in mente a Marco per buttare la bistecca nel lavandino? Era ancora bollente!
  Was zum *Henker* für eine Idee hatte Marco, das Steak in den Abwasch zu werfen? Es war noch kochend heiß!
  
  Ma secondo te, chi ha scritto questa *barzelletta* su Satana? Non è divertente, solo volgare.
  Aber wer, glaubst du, hat diesen *Witz* über Satan geschrieben? Das ist nicht lustig, nur vulgär.
  
  Se continui a stressare il tuo animale domestico in questo modo, ti ritroverai con *cacchio* di problemi più grandi di te!
  Wenn du dein *Haustier* weiterhin so stressst, wirst du dir teuflische Probleme einhandeln, die größer sind als du!
