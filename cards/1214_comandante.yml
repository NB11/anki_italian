Rang: 1214
Wort: comandante
Wortart: n.m
Wort mit Artikel: il comandante
Femininum / Plural: i comandanti
IPA: ''
Definition: der Befehlshaber, - / die Kommandant(in), -en
Register: ''
Beispielsätze: |-
  Il *comandante* ha ordinato di evacuare l'area immediatamente dopo l'attacco.
  Der *Kommandant* hat befohlen, das Gebiet unmittelbar nach dem Angriff zu evakuieren.
  
  Nonostante le difficoltà, il *comandante* è riuscito a mantenere la calma tra i soldati.
  Trotz der Schwierigkeiten gelang es dem *Kommandanten*, die Ruhe unter den Soldaten zu bewahren.
  
  Se fossi stato il *comandante*, avrei fortificato le posizioni prima dell'arrivo del nemico.
  Wäre ich der *Kommandant* gewesen, hätte ich die Stellungen vor der Ankunft des Feindes verstärkt.
  
  Il popolo sostiene il *comandante* perché crede nella sua capacità di guidare la nazione verso la pace.
  Das Volk unterstützt den *Kommandanten*, weil es an seine Fähigkeit glaubt, die Nation zum Frieden zu führen.
  
  Il *comandante* del reparto ha fatto sì che ogni soldato comprendesse l'importanza della missione.
  Der *Kommandant* der Einheit sorgte dafür, dass jeder Soldat die Bedeutung der Mission verstand.
