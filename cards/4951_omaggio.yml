Rang: 4951
Wort: omaggio
Wortart: adj
Wort mit Artikel: omaggio
Femininum / Plural: ''
IPA: ''
Definition: kostenlos, unentgeltlich, gratis
Register: ''
Beispielsätze: |-
  Il museo offre l’ingresso *omaggio* ogni prima domenica del mese.
  Das Museum bietet den Eintritt *kostenlos* jeden ersten Sonntag des Monats an.
  
  Abbiamo ricevuto un caffè *omaggio* con il nostro ordine.
  Wir haben einen Kaffee *zum Nulltarif* mit unserer Bestellung erhalten.
  
  Nonostante il prezzo basso, la qualità del prodotto non è *omaggio*.
  Trotz des niedrigen Preises ist die Qualität des Produkts nicht *umsonst*.
  
  Sei *omaggio* di essere venuto alla festa: grazie mille!
  Es ist *unentgeltlich*, dass du zur Feier gekommen bist: vielen Dank!
  
  I clienti apprezzano quando un ristorante offre un dessert *omaggio* dopo il pasto.
  Kunden schätzen es, wenn ein Restaurant ein Dessert *gratis* nach dem Essen anbietet.
