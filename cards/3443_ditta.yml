Beispielsätze: |-
  La *ditta* ha aperto una nuova filiale in Germania l'anno scorso.
  Die *Firma* hat letztes Jahr eine neue Niederlassung in Deutschland eröffnet.
  
  Dopo la crisi, molti dipendenti hanno perso il lavoro presso quella *ditta*.
  Nach der Krise haben viele Mitarbeiter ihre Stelle bei dieser *Firma* verloren.
  
  Chi credi che abbia finanziato questa *ditta* così innovativa?
  Wer glaubst du, hat diese so innovative *Firma* finanziert?
  
  Le *ditte* straniere devono rispettare anche le leggi locali.
  Ausländische *Firmen* müssen sich auch an die lokalen Gesetze halten.
  
  Se la *ditta* fallisce, perderemo molti clienti abituali.
  Wenn die *Firma* bankrottgeht, verlieren wir viele Stammkunden.
