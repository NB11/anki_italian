Rang: 852
Wort: ritrovare
Wortart: vt
Wort mit Artikel: ritrovare
Femininum / Plural: ''
IPA: ''
Definition: wiederfinden, zurückfinden
Register: ''
Beispielsätze: |-
  Dopo giorni di ricerche, sono riuscito a *ritrovare* il cane smarrito del mio vicino.
  Nach Tagen der Suche bin ich in der Lage gewesen, den verlorenen Hund meines Nachbarn wiederzufinden.
  
  Stamattina, mentre passeggiavo al parco, ho *ritrovato* per caso un vecchio diario del mio ex marito.
  Heute Morgen, während ich im Park spazieren ging, bin ich zufällig auf ein altes Tagebuch meines ehemaligen Mannes gestoßen.
  
  Il colonnello gli ordinò di *ritrovare* la traccia del bastardo che aveva iniziato il processo contro di loro.
  Der Oberst befahl ihm, die Spur des verdammten Mannes wiederzufinden, der das Verfahren gegen sie eingeleitet hatte.
  
  Spero che alla fine della guerra si possa *ritrovare* la pace e la libertà perduta.
  Ich hoffe, dass man am Ende des Krieges den verlorenen Frieden und die verlorene Freiheit wiedererlangen kann.
  
  Anche se è stato difficile, sono felice di aver *ritrovato* la salute dopo tanti mesi di sofferenza.
  Obwohl es schwer war, bin ich froh, nach so vielen Monaten des Leidens meine Gesundheit zurückgewonnen zu haben.
