Rang: 1107
Wort: ponte
Wortart: n.m
Wort mit Artikel: il ponte
Femininum / Plural: ponti
IPA: ''
Definition: die Brücke, -n
Register: ''
Beispielsätze: |-
  Il *ponte* sul fiume è molto antico e affascinante.
  Die *Brücke* über den Fluss ist sehr alt und faszinierend.
  
  Stanno costruendo un nuovo *ponte* per collegare i due quartieri.
  Sie bauen gerade eine neue *Brücke*, um die beiden Stadtteile zu verbinden.
  
  Se avessimo più tempo, attraverseremmo il *ponte* a piedi, anche se c'è molto traffico.
  Wenn wir mehr Zeit hätten, würden wir die *Brücke* zu Fuß überqueren, auch wenn viel Verkehr herrscht.
  
  Non so chi abbia progettato il *ponte* che abbiamo visto ieri, ma sembrava molto moderno.
  Ich weiß nicht, wer die *Brücke* entworfen hat, die wir gestern gesehen haben, aber sie schien sehr modern.
  
  L'ingegnere ha spiegato che il *ponte* resisterà a terremoti di magnitudo sette grazie alle nuove tecnologie.
  Der Ingenieur erklärte, dass die *Brücke* dank neuer Technologien Erdbeben der Stärke sieben standhält.
