Rang: 2541
Wort: umiliare
Wortart: vt
Wort mit Artikel: umiliare
Femininum / Plural: ''
IPA: ''
Definition: demütigen, erniedrigen
Register: ''
Beispielsätze: |-
  Non volevo *umiliare* nessuno, ma purtroppo il suo comportamento era inaccettabile.
  Ich wollte niemanden *demütigen*, aber sein Verhalten war leider inakzeptabel.
  
  Dopo che il gruppo si è rifiutato di obbedire, il capo ha minacciato di *umiliare* pubblicamente tutti loro.
  Nachdem sich die Gruppe weigerte zu gehorchen, drohte der Chef damit, alle öffentlich *zu demütigen*.
  
  Credo che lei si sia lasciata *umiliare* troppo spesso nella sua relazione passata.
  Ich glaube, dass sie sich in ihrer Vergangenheit zu oft hat *demütigen* lassen.
  
  Se avessi saputo che avrebbe reagito così male, non avrei mai osato *umiliare* il suo orgoglio.
  Hätte ich gewusst, dass sie so stark darauf reagiert, hätte ich es niemals gewagt, ihren *Stolz zu demütigen*.
  
  È incredibilmente difficile non *umiliare* chi ha fatto un errore, ma a volte è necessario per insegnare una lezione.
  Es ist unglaublich schwer, jemanden, der einen Fehler gemacht hat, nicht *zu demütigen*, aber manchmal ist es nötig, um eine Lehre zu erteilen.
