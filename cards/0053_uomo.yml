Rang: 53
Wort: uomo
Wortart: n.m
Wort mit Artikel: l'uomo
Femininum / Plural: uomini
IPA: ''
Definition: der Mann, Männer
Register: ''
Beispielsätze: |-
  L'*uomo* legge un libro interessante.
  Der *Mann* liest ein interessantes Buch.
  
  Quegli *uomini* parlano della politica italiana.
  Jene *Männer* sprechen über die italienische Politik.
  
  Un *uomo* alto entra nel negozio.
  Ein großer *Mann* betritt den Laden.
  
  Gli *uomini* sono più alti delle donne in questa stanza?
  Sind die *Männer* in diesem Raum größer als die Frauen?
  
  L'*uomo* che ho visto ieri era simpatico.
  Der *Mann*, den ich gestern gesehen habe, war sympathisch.
