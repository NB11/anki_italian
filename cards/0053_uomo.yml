Rang: 53
Wort: uomo
Wortart: n.m
Wort mit Artikel: l'uomo
Femininum / Plural: uomini
IPA: ''
Definition: der Mann, -er
Register: ''
Beispielsätze: |-
  L'*uomo* legge un libro in biblioteca.
  Der *Mann* liest ein Buch in der Bibliothek.
  
  Chi è quell'*uomo* alto vicino alla porta?
  Wer ist dieser *Mann* groß neben der Tür?
  
  Gli *uomini* parlano del progetto insieme.
  Die *Männer* sprechen über das Projekt zusammen.
  
  Vor dieci anni quell'*uomo* era molto timido.
  Vor zehn Jahren war dieser *Mann* sehr schüchtern.
  
  L'*uomo* che ho incontrato ieri era simpatico.
  Der *Mann*, den ich gestern getroffen habe, war sympathisch.
