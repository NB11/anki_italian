Rang: 4838
Wort: detonatore
Wortart: n.m
Wort mit Artikel: il detonatore
Femininum / Plural: i detonatori
IPA: ''
Definition: der Sprengzünder, -
Register: ''
Beispielsätze: |-
  Il *detonatore* è nascosto nella valigia.
  Der *Sprengzünder* steckt im Koffer.
  
  Hanno trovato un *detonatore* inesploso nel parco.
  Man hat einen *nicht detonierten Sprengzünder* im Park gefunden.
  
  Chiunque abbia maneggiato il *detonatore* rischia l'arresto immediato.
  Wer den *Sprengzünder* angefasst hat, riskiert sofortige Verhaftung.
  
  Se avessi saputo del *detonatore*, non avrei toccato nulla.
  Hätte ich vom *Sprengzünder* gewusst, hätte ich nichts angerührt.
  
  Il tecnico ha disattivato il *detonatore* con estrema attenzione.
  Der Techniker hat den *Sprengzünder* mit äußerster Vorsicht unschädlich gemacht.
