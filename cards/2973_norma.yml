Beispielsätze: |-
  Devi rispettare la *norma* se vuoi lavorare in questa fabbrica.
  Du musst die *Norm* einhalten, wenn du in dieser Fabrik arbeiten willst.
  
  Secondo la *norma* europea, tutti i prodotti devono essere testati.
  Laut der europäischen *Norm* müssen alle Produkte getestet werden.
  
  La *norma* che hai seguito non è più in vigore da quest'anno.
  Die *Norm*, die du befolgt hast, gilt seit diesem Jahr nicht mehr.
  
  Non capisco perché questa *norma* sia così severa con i piccoli negozianti.
  Ich verstehe nicht, warum diese *Norm* so streng mit kleinen Händlern ist.
  
  Appena ho appreso la nuova *norma* di sicurezza, ho controllato tutti gli impianti.
  Sobald ich die neue Sicherheits-*Norm* gelernt hatte, habe ich alle Anlagen überprüft.
