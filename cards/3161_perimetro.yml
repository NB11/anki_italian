Rang: 3161
Wort: perimetro
Wortart: n.m
Wort mit Artikel: il perimetro
Femininum / Plural: i perimetri
IPA: ''
Definition: der Umfang, -änge
Register: ''
Beispielsätze: |-
  Il *perimetro* di questo giardino è di venti metri.
  Der *Umfang* dieses Gartens beträgt zwanzig Meter.
  
  Abbiamo misurato il *perimetro* della stanza per capire se il divano ci entrava.
  Wir haben den *Umfang* des Zimmers gemessen, um zu sehen, ob die Couch hineinpasst.
  
  Vorresti sapere il *perimetro* di questo cerchio? Potrei calcolarlo subito.
  Möchtest du den *Umfang* dieses Kreises wissen? Ich könnte ihn sofort berechnen.
  
  Il *perimetro* del rettangolo è la somma di tutti i suoi lati.
  Der *Umfang* des Rechtecks ist die Summe aller seiner Seiten.
  
  Nonostante il *perimetro* fosse stato misurato con precisione, qualcosa nell'angolo sembrava sfuggire alla regola.
  Obwohl der *Umfang* präzise gemessen worden war, schien etwas in der Ecke sich der Regel zu entziehen.
