Rang: 856
Wort: beccare
Wortart: vt
Wort mit Artikel: beccare
Femininum / Plural: ''
IPA: ''
Definition: erwischen
Register: ''
Beispielsätze: |-
  Mio padre *becca* sempre il pesce al volo quando andiamo a pescare in montagna.
  Mein Vater erwischt *immer* den Fisch im Flug, wenn wir zum Angeln in die Berge fahren.
  
  Se continui così, *beccati* un bel processino per tradimento!
  Wenn du so weitermachst, kriegst *du* noch einen schönen Prozess wegen Verrats!
  
  Il colonnello volle *beccare* il traditore prima che potesse fuggire dal campo.
  Der Oberst wollte *den Verräter* erwischen, bevor er vom Feld fliehen konnte.
  
  Mia sorella è convinta che *beccare* un testimone sia la chiave per risolvere il mistero.
  Meine Schwester ist überzeugt, dass es der Schlüssel zur Lösung des Rätsels ist, *einen* Zeugen zu erwischen.
  
  Appena ho acceso la cucina, ho *beccato* il gatto sopra il tavolo con le zampe nel piatto!
  Sobald ich die Küche eingeschaltet hatte, *erwischte* ich die Katze auf dem Tisch mit den Pfoten im Teller!
