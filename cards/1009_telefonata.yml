Rang: 1009
Wort: telefonata
Wortart: n.f
Wort mit Artikel: la telefonata
Femininum / Plural: telefonate
IPA: ''
Definition: das Telefonat, -e
Register: ''
Beispielsätze: |-
  Ho ricevuto una *telefonata* da mia madre che mi ha raccontato del suo viaggio in Francia.
  Ich habe einen *Anruf* von meiner Mutter erhalten, die mir von ihrer Reise nach Frankreich erzählt hat.
  
  Nonostante il *telefonata* fosse breve, sono riuscito a capire l’essenziale.
  Trotz des kurzen *Telefonats* konnte ich das Wesentliche verstehen.
  
  Sai che quando ricevo una *telefonata* da mio fratello, di solito capita qualcosa di importante?
  Weißt du, dass ich meistens etwas Wichtiges zu berichten habe, wenn ich einen *Anruf* von meinem Bruder bekomme?
  
  Se avessi saputo che era lui, avrei risposto alla *telefonata* senza esitare.
  Hätte ich gewusst, dass er es war, hätte ich den *Anruf* ohne Zögern angenommen.
  
  La polizia ha registrato la *telefonata* minatoria per poi catturare il colpevole.
  Die Polizei hat den drohenden *Anruf* aufgezeichnet, um den Täter dann zu fassen.
