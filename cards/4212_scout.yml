Rang: 4212
Wort: scout
Wortart: adj
Wort mit Artikel: scout
Femininum / Plural: ''
IPA: ''
Definition: kundig, erfahren
Register: ''
Beispielsätze: |-
  L’esploratore era *scout* in molte spedizioni nel deserto.
  Der Entdecker war in vielen Expeditionen *erfahren*.
  
  Anche se è *scout*, dovrebbe controllare i dettagli prima della partenza.
  Auch wenn er *kundig* ist, sollte er die Details vor der Abfahrt überprüfen.
  
  Si sentiva *scout* abbastanza da gestire il progetto da solo, ma chiese aiuto.
  Er fühlte sich *erfahren* genug, das Projekt allein zu leiten, bat aber um Hilfe.
  
  La guida turistica si è dimostrata molto *scout* nel trovare i luoghi più nascosti.
  Die Reiseleiterin erwies sich als sehr *kundig*, um die verstecktesten Orte zu finden.
  
  Nonostante fosse *scout*, non riuscì a prevedere le complicazioni che sarebbero sorte.
  Trotz *erfahrener* Kenntnisse konnte er die auftretenden Komplikationen nicht vorhersehen.
