Rang: 66
Wort: quindi
Wortart: adv
Wort mit Artikel: quindi
Femininum / Plural: ''
IPA: ''
Definition: daher, also, folglich
Register: ''
Beispielsätze: |-
  Ho *finito* il lavoro, *quindi* vado a casa.
  Ich habe *beendet* die Arbeit, *also* gehe ich nach Hause.
  
  Non hai studiato, *quindi* non passerai l'esame.
  Du hast nicht *gelernt*, *daher* wirst du die Prüfung nicht bestehen.
  
  Piove, *quindi* prendiamo l'ombrello.
  Es regnet, *folglich* nehmen wir den Schirm.
  
  Sei stanco? *Quindi* vai a letto presto!
  Bist du müde? *Also* gehst du früh ins Bett!
  
  Abbiamo perso il treno e, *quindi*, abbiamo dovuto aspettare un'ora.
  Wir haben den Zug *verpasst* und mussten *daher* eine Stunde warten.
