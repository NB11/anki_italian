Rang: 66
Wort: quindi
Wortart: adv
Wort mit Artikel: quindi
Femininum / Plural: ''
IPA: ''
Definition: folglich, also, daher
Register: ''
Beispielsätze: |-
  Non ho fame, *quindi* non mangio.
  Ich habe keinen Hunger, *also* esse ich nicht.
  
  *Quindi* sei d’accordo con me?
  *Also* bist du mit mir einer Meinung?
  
  Piove molto, *quindi* prendo l’ombrello.
  Es regnet stark, *deshalb* nehme ich den Schirm.
  
  Luigi è stanco, *quindi* va a letto presto.
  Luigi ist müde, *deshalb* geht er früh ins Bett.
  
  Non ho capito la domanda, *quindi* chiedo spiegazioni.
  Ich habe die Frage nicht verstanden, *daher* bitte ich um Erklärungen.
