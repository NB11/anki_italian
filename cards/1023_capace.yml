Rang: 1023
Wort: capace
Wortart: adj
Wort mit Artikel: capace
Femininum / Plural: ''
IPA: ''
Definition: fähig, fähig sein
Register: ''
Beispielsätze: |-
  Sei *capace* di risolvere questo problema senza il mio aiuto?
  Bist du *fähig*, dieses Problem ohne meine Hilfe zu lösen?
  
  Lui è sempre stato *capace* di ascoltare con pazienza, anche nei momenti difficili.
  Er war immer *fähig*, geduldig zuzuhören, selbst in schwierigen Momenten.
  
  La squadra non era *capace* di attraversare il sud dell’isola senza una guida esperta.
  Das Team war nicht *fähig*, den Süden der Insel ohne einen erfahrenen Führer zu durchqueren.
  
  Se fossi stato *capace* di controllare il proprio sentimento, non avrebbe litigato con la regina.
  Wenn er fähig gewesen wäre, seine Gefühle zu kontrollieren, hätte er sich nicht mit der Königin *gestritten*.
  
  Nonostante la malattia, rimase *capace* di lavorare alla sua opera per giorni interi.
  Trotz der Krankheit blieb er *fähig*, tagelang an seinem Werk zu arbeiten.
