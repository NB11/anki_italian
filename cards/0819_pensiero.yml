Rang: 819
Wort: pensiero
Wortart: n.m
Wort mit Artikel: il pensiero
Femininum / Plural: i pensieri
IPA: ''
Definition: der Gedanke, -n
Register: ''
Beispielsätze: |-
  Il *pensiero* che hai appena espresso è molto interessante.
  Der *Gedanke*, den du gerade geäußert hast, ist sehr interessant.
  
  Non riesco a smettere di occuparmi dei miei *pensieri* inquieti.
  Ich kann nicht aufhören, mich mit meinen *Gedanken* zu beschäftigen, die mich beunruhigen.
  
  Credo che il *pensiero* positivo influenzi la nostra salute.
  Ich glaube, dass der *Gedanke* an Positives unser Wohlbefinden beeinflusst.
  
  Dopo la discussione, ho cambiato il mio *pensiero* sul governo reale.
  Nach der Diskussion habe ich meine Meinung über die *wahre* Regierung geändert.
  
  Nonostante le difficoltà, non ho abbandonato il mio *pensiero* di visitare la classe di Henry.
  Trotz der Schwierigkeiten habe ich meinen *Plan*, Henrys Klasse zu besuchen, nicht aufgegeben.
