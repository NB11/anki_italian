Rang: 819
Wort: pensiero
Wortart: n.m
Wort mit Artikel: il pensiero
Femininum / Plural: i pensieri
IPA: ''
Definition: der Gedanke, -n
Register: ''
Beispielsätze: |-
  Ho un *pensiero* che mi preoccupa molto.
  Ich habe einen *Gedanken*, der mir große Sorgen macht.
  
  Qual è il tuo *pensiero* riguardo a questa situazione?
  Was ist deine *Meinung* zu dieser Situation?
  
  I *pensieri* positivi aiutano a stare meglio.
  Positive *Gedanken* helfen, sich besser zu fühlen.
  
  Non riesco a liberarmi di questo *pensiero*.
  Ich kann diesen *Gedanken* nicht loswerden.
  
  Avevo un *pensiero* diverso su come risolvere il problema.
  Ich hatte einen anderen *Gedanken* darüber, wie man das Problem lösen könnte.
