Rang: 2920
Wort: cocaina
Wortart: n.f
Wort mit Artikel: la cocaina
Femininum / Plural: cocaine
IPA: ''
Definition: das Kokain, -e
Register: ''
Beispielsätze: |-
  La polizia ha trovato della *cocaina* nascosta nel bagagliaio dell’auto.
  Die Polizei hat *Kokain* versteckt im Kofferraum des Autos gefunden.
  
  Se vuoi provarla, devi sapere che fa *dipendenza*, lo dice francamente ogni esperto.
  Wenn du sie probieren willst, musst du wissen, dass sie *süchtig macht* — das sagt ehrlich gesagt jeder Experte.
  
  Nonostante il divieto, il commercio di *cocaina* continua a crescere in molte città.
  Trotz des Verbots geht der Handel mit *Kokain* in vielen Städten weiter.
  
  Si dice che questa *cocaina* pura non provochi danni immediati, ma è una mezza verità.
  Man sagt, dieses reine *Kokain* schade nicht sofort, aber das ist eine halbe Wahrheit.
  
  Ogni anno, migliaia di tossicodipendenti cercano aiuto per smettere con la *cocaina*, ma poche ce la fanno davvero.
  Jedes Jahr suchen Tausende Drogenabhängige Hilfe, um mit dem *Kokain* aufzuhören, aber nur wenige schaffen es wirklich.
