Rang: 1804
Wort: pietà
Wortart: n.f
Wort mit Artikel: la pietà
Femininum / Plural: pietà
IPA: ''
Definition: das Mitleid, die Barmherzigkeit
Register: ''
Beispielsätze: |-
  Provo una grande *pietà* per chi non ha una casa.
  Ich empfinde ein großes *Mitleid* für diejenigen, die kein Zuhause haben.
  
  La sua *pietà* verso gli animali era commovente.
  Ihr *Mitleid* gegenüber Tieren war rührend.
  
  Nonostante tutto, sentiva ancora un po’ di *pietà* per lui.
  Trotz allem empfand sie noch ein wenig *Mitleid* für ihn.
  
  La *pietà* dei genitori per i figli è un sentimento naturale.
  Das *Mitleid* der Eltern für ihre Kinder ist ein natürliches Gefühl.
  
  A volte la *pietà* può nascondere un senso di superiorità.
  Manchmal kann das *Mitleid* ein Gefühl von Überlegenheit verbergen.
