Wort: plasma
Wortart: n.m
Wort mit Artikel: il plasma
Femininum / Plural: plasmata
IPA: ''
Definition: das Plasma, Plasmata
Register: ''
Beispielsätze: |-
  Il medico ha prelevato un campione di *plasma* dal paziente per analizzarlo.
  Der Arzt hat eine Probe *aus dem Plasma* des Patienten entnommen, um sie zu analysieren.
  
  Nel laboratorio stanno studiando le proprietà del *plasma* ad alta temperatura.
  Im Labor untersuchen sie die Eigenschaften *von Plasma* bei hoher Temperatur.
  
  Se avessi saputo che il *plasma* era così importante, avrei fatto più attenzione.
  Wenn ich gewusst hätte, dass *Plasma* so wichtig ist, hätte ich besser aufgepasst.
  
  Il film parla di un esperimento che trasforma l’acqua in *plasma* in pochi secondi.
  Der Film handelt von einem Experiment, das Wasser in *Plasma* in wenigen Sekunden verwandelt.
  
  Nonostante l’incidente, il livello di *plasma* nel suo sangue è rimasto stabile.
  Trotz des Unfalls blieb der *Plasma*-Spiegel in seinem Blut stabil.
