Definition: aggressiv, angriffslustig
Register: ''
Beispielsätze: |-
  L'atteggiamento *aggressivo* del nuovo vicino ha spaventato tutti nel quartiere.
  Die *aggressive* Haltung des neuen Nachbarn hat alle im Viertel erschreckt.
  
  Nonostante la sua fama, non l'ho mai trovato *aggressivo* di persona.
  Trotz seines Rufs habe ich ihn noch nie *aggressiv* persönlich erlebt.
  
  Il cane sembrava *aggressivo*, ma in realtà era solo spaventato.
  Der Hund wirkte *aggressiv*, doch eigentlich hatte er nur Angst.
  
  Se fossi meno *aggressivo* con gli altri, avresti più amici.
  Wenn du weniger *aggressiv* zu anderen wärst, hättest du mehr Freunde.
  
  È meglio evitare persone dall'umore *aggressivo* nelle discussioni.
  Man sollte Menschen mit *aggressiver* Stimmung in Diskussionen meiden.
