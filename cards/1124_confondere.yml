Rang: 1124
Wort: confondere
Wortart: v
Wort mit Artikel: confondere
Femininum / Plural: ''
IPA: ''
Definition: verwechseln, durcheinanderbringen
Register: ''
Beispielsätze: |-
  Non *ho confuso* i due nomi simili, erano molto diversi.
  Ich habe die beiden ähnlichen Namen nicht *verwechselt*.
  
  Se *confondi* me con un altro, dimmelo subito!
  Wenn du mich mit jemand anderem *verwechselst*, sag es mir sofort!
  
  Nonostante lo *confondesse* spesso suo padre, Marco riuscì a laurearsi in tempo.
  Obwohl sein Vater ihn oft *durcheinanderbrachte*, schaffte Marco es, pünktlich seinen Abschluss zu machen.
  
  Non vorrei *confondere* le cose, ma il tuo obiettivo principale sembra diverso da quello che hai detto ieri.
  Ich möchte die Dinge nicht *durcheinanderbringen*, aber dein wichtigstes Ziel scheint anders zu sein als das, was du gestern gesagt hast.
  
  Ho visto che *confondi* sempre la destra con la sinistra quando guidi il furgone!
  Ich habe gemerkt, dass du beim Fahren des *Transporters* immer rechts mit links verwechselst.
