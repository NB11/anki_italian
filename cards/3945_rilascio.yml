Rang: 3945
Wort: rilascio
Wortart: n.m
Wort mit Artikel: il rilascio
Femininum / Plural: rilasci
IPA: ''
Definition: die Freilassung, -en
Register: ''
Beispielsätze: |-
  Dopo due anni di carcere, il prigioniero ha ottenuto il *rilascio* per buona condotta.
  Nach zwei Jahren im Gefängnis hat der Gefangene die *Freilassung* wegen guter Führung erhalten.
  
  Il giudice valuterà il *rilascio* condizionato del detenuto se seguirà tutte le regole.
  Der Richter wird die *bedingte Freilassung* des Häftlings bewerten, wenn er alle Regeln befolgt.
  
  La polizia ha annunciato il *rilascio* dei documenti richiesti dopo mesi di attesa.
  Die Polizei hat die *Freigabe* der angeforderten Unterlagen nach Monaten des Wartens angekündigt.
  
  Senza il *rilascio* di un certificato medico, non potrai partire per il viaggio.
  Ohne die *Ausstellung* eines ärztlichen Attests kannst du die Reise nicht antreten.
  
  Il ministro ha firmato il decreto per il *rilascio* delle nuove licenze ambientali.
  Der Minister hat das Dekret für die *Erteilung* der neuen Umweltlizenzen unterzeichnet.
