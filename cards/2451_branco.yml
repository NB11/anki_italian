Rang: 2451
Wort: branco
Wortart: n.m
Wort mit Artikel: il branco
Femininum / Plural: branchi
IPA: ''
Definition: die Herde, -n; die Bande, -n
Register: ''
Beispielsätze: |-
  Il *branco* di lupi ululava sotto la luna piena.
  Das *Heer* der Wölfe heulte unter dem Vollmond.
  
  I poliziotti hanno disperso un *branco* di manifestanti violenti.
  Die Polizisten haben eine *Gruppe* gewalttätiger Demonstranten zerstreut.
  
  Se *branco* di pecore attraversa la strada, rallenta la macchina!
  Wenn eine *Herde* Schafe die Straße überquert, musst du bremsen!
  
  Quello che hai visto non era un *branco* qualsiasi, ma una squadra organizzata.
  Was du gesehen hast, war keine gewöhnliche *Gruppe*, sondern ein organisiertes Team.
  
  Il *branco* dei giornalisti si è precipitato verso il politico appena è uscito dall’hotel.
  Die *Schar* der Journalisten stürmte auf den Politiker zu, sobald er das Hotel verließ.
