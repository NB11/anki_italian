Rang: 2304
Wort: esistenza
Wortart: n.f
Wort mit Artikel: l'esistenza
Femininum / Plural: esistenze
IPA: ''
Definition: die Existenz
Register: ''
Beispielsätze: |-
  Dopo la guerra molti si chiedevano se valesse la pena di continuare la *esistenza* in quelle condizioni.
  Nach dem Krieg fragten sich viele, ob es sich lohnte, unter diesen Bedingungen die *Existenz* fortzusetzen.
  
  L'*esistenza* di alcune tradizioni in questa regione risale a secoli fa.
  Die *Existenz* bestimmter Traditionen in dieser Region geht auf Jahrhunderte zurück.
  
  Credevo che la nostra *esistenza* fosse minacciata, ma poi tutto è tornato alla normalità.
  Ich glaubte, unsere *Existenz* sei bedroht, doch dann kehrte alles zur Normalität zurück.
  
  Nonostante le difficoltà economiche, hanno deciso di dare inizio a una nuova *esistenza* all'estero.
  Trotz der finanziellen Schwierigkeiten beschlossen sie, im Ausland ein neues *Leben* zu beginnen.
  
  La sua *esistenza* è stata segnata da eventi che nessuno avrebbe potuto prevedere.
  Seine *Existenz* war von Ereignissen geprägt, die niemand hätte vorhersehen können.
