Rang: 2210
Wort: sacrificare
Wortart: v
Wort mit Artikel: sacrificare
Femininum / Plural: ''
IPA: ''
Definition: opfern, sich hingeben
Register: ''
Beispielsätze: |-
  Nonostante le difficoltà, ha *sacrificato* molto del suo tempo per aiutare gli altri.
  Trotz der Schwierigkeiten hat er *geopfert* viel von seiner Zeit, um anderen zu helfen.
  
  Se *sacrificherai* i tuoi sogni per gli altri, presto ti pentirai.
  Wenn du deine Träume für andere *opferst*, wirst du es bald bereuen.
  
  Credo che tu stia per *sacrificare* troppe cose per questa relazione tossica.
  Ich glaube, dass du vorhast, zu viele Dinge für diese toxische Beziehung *zu opfern*.
  
  Avrebbe *sacrificato* la sua libertà pur di proteggere la sua famiglia.
  Er hätte seine Freiheit *geopfert*, nur um seine Familie zu schützen.
  
  Dicono che una persona *sacrifichi* la propria felicità per il bene collettivo, ma è davvero giusto?
  Sie sagen, dass eine Person ihr eigenes Glück für das Gemeinwohl *opfert*, aber ist das wirklich richtig?
