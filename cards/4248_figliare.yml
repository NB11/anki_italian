Rang: 4248
Wort: figliare
Wortart: v
Wort mit Artikel: figliare
Femininum / Plural: ''
IPA: ''
Definition: gebären, zur Welt bringen
Register: ''
Beispielsätze: |-
  La capra *figliava* gemelli due ore fa.
  Die Ziege hat *geboren* Zwillinge vor zwei Stunden.
  
  Se la cagna *figlierà* più di otto cuccioli, dovremo chiamare il veterinario.
  Wenn die Hündin *gebären* wird mehr als acht Welpen, müssen wir den Tierarzt rufen.
  
  Ho paura che la cavalla non *figli* mai un puledro sano.
  Ich habe Angst, dass die Stute nie ein gesundes Fohlen *zur Welt bringen* wird.
  
  I ricercatori studiano perché alcune specie non riescono più a *figliare* con regolarità.
  Die Forscher untersuchen, warum einige Arten nicht mehr regelmäßig *gebären* können.
  
  Mi dissero che la nostra gatta avrebbe *figliato* di notte, ma è successo alle tre del pomeriggio.
  Sie hatten mir gesagt, dass unsere Katze in der Nacht *gebären* würde, aber es ist um drei Uhr nachmittags passiert.
