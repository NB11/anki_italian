Rang: 2429
Wort: mucca
Wortart: n.f
Wort mit Artikel: la mucca
Femininum / Plural: mucche
IPA: ''
Definition: die Kuh, Kühe
Register: ''
Beispielsätze: |-
  La *mucca* mangia l'erba nel prato dietro la casa.
  Die *Kuh* frisst das Gras auf der Wiese hinter dem Haus.
  
  Ho visto una *mucca* nera mentre passeggiavo nel bosco.
  Ich habe eine schwarze *Kuh* gesehen, während ich im Wald spazierte.
  
  Se non avessimo la *mucca*, non avremmo il latte fresco ogni mattina.
  Wenn wir die *Kuh* nicht hätten, hätten wir jeden Morgen keine frische Milch.
  
  La *mucca* che hai comprato al mercato sembra molto robusta.
  Die *Kuh*, die du auf dem Markt gekauft hast, wirkt sehr robust.
  
  Dicono che la *mucca* di mio nonno producesse più latte delle altre.
  Man sagt, die *Kuh* meines Großvaters habe mehr Milch gegeben als die anderen.
