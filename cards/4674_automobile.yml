Rang: 4674
Wort: automobile
Wortart: n.m
Wort mit Artikel: l'automobile
Femininum / Plural: automobili
IPA: ''
Definition: das Auto, -s
Register: ''
Beispielsätze: |-
  Ho comprato *l’automobile* che hai visto ieri in quella concessionaria.
  Ich habe das *Auto* gekauft, das du gestern in diesem Autohaus gesehen hast.
  
  Se *l’automobile* non parte, dovrai chiamare un meccanico per controllare la batteria.
  Wenn das *Auto* nicht anspringt, musst du einen Mechaniker rufen, um die Batterie zu prüfen.
  
  Nonostante la pioggia, *l’automobile* ha percorso senza problemi i cento chilometri fino alla città vicina.
  Trotz des Regens ist das *Auto* die hundert Kilometer bis zur Nachbarstadt ohne Probleme gefahren.
  
  Credi che *l’automobile* di Marco sia più affidabile della mia? A me sembra che abbia già troppi chilometri.
  Glaubst du, dass Marcos *Auto* zuverlässiger ist als meins? Mir scheint, es hat schon zu viele Kilometer.
  
  Quando *l’automobile* sarà finalmente pronta, potremo partire per le vacanze estive senza ulteriori ritardi.
  Wenn das *Auto* endlich fertig ist, können wir ohne weitere Verspätungen in die Sommerferien fahren.
