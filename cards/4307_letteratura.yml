  Er hat einen Aufsatz über die *Literatur* der postkolonialen afrikanischen Länder geschrieben.
  
  Se avessi più tempo, avrei approfondito la *letteratura* russa del XIX secolo.
  Hätte ich mehr Zeit, hätte ich mich intensiver mit der *Literatur* des russischen 19. Jahrhunderts beschäftigt.
  
  La *letteratura* non solo riflette la società, ma può anche cambiarla profondamente.
  Die *Literatur* spiegelt nicht nur die Gesellschaft wider, sondern kann sie auch tiefgreifend verändern.
