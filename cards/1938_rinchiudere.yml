Rang: 1938
Wort: rinchiudere
Wortart: vt
Wort mit Artikel: rinchiudere
Femininum / Plural: ''
IPA: ''
Definition: einsperren, einschließen
Register: ''
Beispielsätze: |-
  La polizia ha *rinchiuso* il ladro in una cella isolata per evitare fughe.
  Die Polizei hat den Dieb in einer isolierten Zelle *eingeschlossen*.
  
  Se *rinchiudi* le api nel alveare, producono più miele.
  Wenn du die Bienen im Bienenstock *einsperrst*, produzieren sie mehr Honig.
  
  Speravo che non *rinchiudessero* il cane in giardino da solo, ma purtroppo l'hanno fatto.
  Ich hoffte, dass sie den Hund nicht allein im Garten *einsperren*, aber leider haben sie es getan.
  
  Il regista *rinchiude* i personaggi in un ambiente claustrofobico per trasmettere angoscia.
  Der Regisseur *schließt* die Charaktere in einer klaustrophobischen Umgebung ein, um Angst zu vermitteln.
  
  Avrei preferito che *rinchiudessi* quei documenti in cassaforte prima di partire.
  Ich hätte lieber *eingeschlossen*, dass du diese Dokumente vor der Abreise im Safe einsperrst.
