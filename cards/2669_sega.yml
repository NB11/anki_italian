Rang: 2669
Wort: sega
Wortart: n.f
Wort mit Artikel: la sega
Femininum / Plural: seghe
IPA: ''
Definition: die Säge, -n
Register: ''
Beispielsätze: |-
  Ho bisogno di una *sega* per tagliare questo legno duro.
  Ich brauche eine *Säge*, um dieses harte Holz zu schneiden.
  
  L’artigiano ripara la *sega* che si è rotta durante il lavoro.
  Der Handwerker repariert die *Säge*, die während der Arbeit kaputtgegangen ist.
  
  Non toccare la *sega*! Potresti ferirti gravemente.
  Fass die *Säge* nicht an! Du könntest dich schwer verletzen.
  
  La *sega* a nastro è più precisa della sega circolare.
  Die Bandsäge ist präziser als die Kreissäge.
  
  Se non affilerai la *sega*, taglierà male e impiegherai troppo tempo.
  Wenn du die *Säge* nicht schärfst, schneidet sie schlecht und du brauchst viel zu lange.
