Rang: 602
Wort: futuro
Wortart: n.m
Wort mit Artikel: il futuro
Femininum / Plural: i futuri
IPA: ''
Definition: die Zukunft
Register: ''
Beispielsätze: |-
  Il *futuro* è pieno di possibilità.
  Die *Zukunft* ist voller Möglichkeiten.
  
  Non so cosa riserverà il nostro *futuro*.
  Ich weiß nicht, was unsere *Zukunft* bringen wird.
  
  Credi che il *futuro* sarà migliore di oggi?
  Glaubst du, dass die *Zukunft* besser sein wird als heute?
  
  Pensiamo sempre al *futuro* dei nostri figli.
  Wir denken immer an die *Zukunft* unserer Kinder.
  
  In un lontano *futuro* forse vivrete su Marte.
  In einer fernen *Zukunft* werdet ihr vielleicht auf dem Mars leben.
