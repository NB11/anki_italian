Rang: 3177
Wort: garanzia
Wortart: n.f
Wort mit Artikel: la garanzia
Femininum / Plural: garanzie
IPA: ''
Definition: die Garantie, -n
Register: ''
Beispielsätze: |-
  Ho bisogno di una *garanzia* per questo prodotto, altrimenti non lo compro.
  Ich brauche eine *Garantie* für dieses Produkt, sonst kaufe ich es nicht.
  
  Il negoziante mi ha promesso che la *garanzia* copre i difetti di fabbrica.
  Der Händler hat mir versichert, dass die *Garantie* die Fabrikationsfehler abdeckt.
  
  Se non rispetti i termini della *garanzia*, perderai ogni diritto di reclamo.
  Wenn du die Bedingungen der *Garantie* nicht einhältst, verlierst du jedes Klagerecht.
  
  La *garanzia* decade se il prodotto viene modificato da terzi non autorizzati.
  Die *Garantie* verfällt, wenn das Produkt von nicht autorisierten Dritten verändert wird.
  
  Vorrei sapere se esiste una *garanzia* internazionale per questo elettrodomestico.
  Ich möchte wissen, ob es für dieses Elektrogerät eine internationale *Garantie* gibt.
