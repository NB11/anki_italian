  Ho trovato un articolo *interessante* sulla storia del nostro paese che volevo leggere insieme.
  Ich habe einen *interessanten* Artikel über die Geschichte unseres Landes gefunden, den ich gemeinsam lesen wollte.
  
  Se non ti sembra *interessante*, possiamo scegliere un altro film, non c'è bisogno di rimanere.
  Wenn es dir nicht *interessant* erscheint, können wir einen anderen Film wählen, wir müssen nicht bleiben.
