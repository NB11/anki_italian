Beispielsätze: |-
  Il documentario che ho visto ieri sera era davvero *interessante*!
  Die Dokumentation, die ich gestern Abend gesehen habe, war wirklich *interessant*!
  
  Secondo il consiglio dello zio, dovremmo visitare questo museo che è molto *interessante*.
  Auf den Rat meines Onkels hin sollten wir dieses Museum besuchen, das sehr *interessant* ist.
  
  Mi hanno detto che la ricerca di tuo zio sarà *interessante*, ma non so ancora quando inizierà.
