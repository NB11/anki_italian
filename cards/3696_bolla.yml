Rang: 3696
Wort: bolla
Wortart: n.f
Wort mit Artikel: la bolla
Femininum / Plural: bolle
IPA: ''
Definition: die Blase, -n
Register: ''
Beispielsätze: |-
  Dopo aver agitato la bibita, si è formata una *bolla* di gas in superficie.
  Nach dem Schütteln der Limonade hat sich eine *Blase* aus Gas an der Oberfläche gebildet.
  
  Il medico ha detto che la *bolla* sulla gengiva va monitorata attentamente.
  Der Arzt hat gesagt, die *Blase* am Zahnfleisch muss genau beobachtet werden.
  
  Durante la passeggiata lungo il fiume, abbiamo visto una *bolla* d’aria emergere dall’acqua.
  Während des Spaziergangs am Fluss haben wir eine *Luftblase* aus dem Wasser aufsteigen sehen.
  
  Se non chiudi bene la bottiglia, si formeranno delle *bolle* d’aria all’interno.
  Wenn du die Flasche nicht gut verschließt, entstehen *Blasen* in ihrem Inneren.
  
  La *bolla* di sapone si è disintegrata appena ha toccato il pavimento asciutto.
  Die *Seifenblase* ist zerplatzt, sobald sie den trockenen Boden berührt hat.
