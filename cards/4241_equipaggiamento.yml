Rang: 4241
Wort: equipaggiamento
Wortart: n.m
Wort mit Artikel: l'equipaggiamento
Femininum / Plural: gli equipaggiamenti
IPA: ''
Definition: die Ausrüstung, -en
Register: ''
Beispielsätze: |-
  Per andare in montagna servono scarpe robuste e un *equipaggiamento* adeguato.
  Für die Berge braucht man robuste Schuhe und die *richtige Ausrüstung*.
  
  L'*equipaggiamento* militare era stato preparato con grande attenzione al dettaglio.
  Die *militärische Ausrüstung* war mit großer Sorgfalt vorbereitet worden.
  
  Nonostante il *equipaggiamento* moderno, gli alpinisti hanno perso la via durante la tempesta.
  Trotz der *modernen Ausrüstung* verloren die Bergsteiger den Weg im Sturm.
  
  Ti ho consigliato di controllare il *equipaggiamento* prima della partenza, ma tu hai preferito trascurare il mio avvertimento.
  Ich habe dir geraten, die *Ausrüstung* vor der Abfahrt zu prüfen, aber du hast meine Warnung vernachlässigt.
  
  Anche se l'*equipaggiamento* è pesante, non rinuncerei a portarlo per nessuna ragione!
  Auch wenn die *Ausrüstung* schwer ist, würde ich sie um nichts auf der Welt zurücklassen!
