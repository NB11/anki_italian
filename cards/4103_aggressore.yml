Rang: 4103
Wort: aggressore
Wortart: n.m
Wort mit Artikel: l'aggressore
Femininum / Plural: gli aggressori
IPA: ''
Definition: der Angreifer, - / der Täter, -
Register: ''
Beispielsätze: |-
  L'*aggressore* è stato arrestato dalla polizia dopo una caccia durata due giorni.
  Der *Angreifer* wurde nach einer zwei Tage dauernden Jagd von der Polizei verhaftet.
  
  Chi ha visto chi ha aggredito la vittima? — Un passante ha identificato l'*aggressore* e ha chiamato i soccorsi.
  Wer hat gesehen, wer das Opfer angegriffen hat? — Ein Passant hat den *Täter* identifiziert und den Notruf gewählt.
  
  Se l'*aggressore* fosse stato più veloce, sarebbe riuscito a fuggire prima che arrivassero i carabinieri.
  Wenn der *Angreifer* schneller gewesen wäre, hätte er vor dem Eintreffen der Carabinieri fliehen können.
  
  Il giudice ha dichiarato l'*aggressore* colpevole di aggressione premeditata e lo condannerà a dieci anni di carcere.
  Der Richter hat den *Täter* der vorsätzlichen Körperverletzung für schuldig erklärt und zu zehn Jahren Haft verurteilt.
  
  Sebbene l'*aggressore* avesse un alibi, le prove del DNA lo hanno comunque incriminato.
  Obwohl der *Angreifer* ein Alibi hatte, haben ihn die DNA-Beweismittel trotzdem belastet.
