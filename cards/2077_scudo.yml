Rang: 2077
Wort: scudo
Wortart: n.m
Wort mit Artikel: lo scudo
Femininum / Plural: gli scudi
IPA: ''
Definition: der Schild, -e
Register: ''
Beispielsätze: |-
  Lo *scudo* del cavaliere era decorato con un leone dorato.
  Der *Schild* des Ritters war mit einem goldenen Löwen verziert.
  
  Hanno assegnato un premio speciale allo scudo più antico del museo.
  Sie haben eine Sonderauszeichnung dem *Schild* zugewiesen, der am ältesten im Museum ist.
  
  Se non proteggi lo *scudo* con una vernice speciale, si arrugginirà presto.
  Wenn du den *Schild* nicht mit einer speziellen Farbe schützt, wird er bald rosten.
  
  Dicono che lo *scudo* che trovarono sia appartenuto a un grande guerriero del passato.
  Man sagt, dass der *Schild*, den sie fanden, einem großen Krieger der Vergangenheit gehörte.
  
  Lo *scudo* moderno è spesso fatto di materiali più leggeri rispetto a quelli antichi.
  Der moderne *Schild* besteht oft aus leichteren Materialien als die alten.
