Rang: 797
Wort: sopportare
Wortart: vt
Wort mit Artikel: sopportare
Femininum / Plural: ''
IPA: ''
Definition: ertragen, aushalten
Register: ''
Beispielsätze: |-
  Non riesco più a *sopportare* questo rumore che proviene dalla strada!
  Ich kann diesen *Lärm* von der Straße nicht mehr ertragen!
  
  Se non cambi atteggiamento, dovremo *sopportare* le conseguenze, altrimenti perderai il lavoro.
  Wenn du deine Haltung nicht änderst, werden wir die *Folgen* aushalten müssen, sonst verlierst du die Arbeit.
  
  Ho sempre cercato di *sopportare* con calma ogni difficoltà, ma questa volta è stato troppo.
  Ich habe immer versucht, jede *Schwierigkeit* mit Gelassenheit zu überwinden, aber diesmal war es zu viel.
  
  Credevi che potessimo *sopportare* un monarca così ingrato per sempre?
  Hast du wirklich geglaubt, wir könnten einen so *undankbaren* Herrscher für immer ertragen?
  
  Le persone che *sopportano* le sofferenze senza lamentarsi sono davvero ammirabili.
  Die *Menschen*, die Leiden ohne zu klagen aushalten, sind wirklich bewundernswert.
