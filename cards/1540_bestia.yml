Rang: 1540
Wort: bestia
Wortart: n.f
Wort mit Artikel: la bestia
Femininum / Plural: bestie
IPA: ''
Definition: das Tier, -e; das Biest, -er
Register: ''
Beispielsätze: |-
  La *bestia* nel bosco ha spaventato tutti i personaggi del film horror.
  Die *Bestie* im Wald hat alle Figuren des Horrorfilms erschreckt.
  
  Se non tieni il gusto pulito, le *bestie* potrebbero avvicinarsi alla carota.
  Wenn du den *Geschmack* nicht sauber hältst, könnten sich die Tiere der Karotte nähern.
  
  Nonostante la *rabbia* del ministro, l’agenzia ha continuato a investire nelle capacità delle nazioni.
  Trotz des *Ärgers* des Ministers hat die Agentur weiterhin in die Fähigkeiten der Nationen investiert.
  
  L’angelo avrebbe voluto descrivere la *bestia*, ma il comportamento dell’uomo lo ha spaventato.
  Der Engel hätte die *Bestie* gerne beschrieben, doch das Verhalten des Menschen hat ihn erschreckt.
  
  Credimi, se non alzi un dono per la strega, lei attirerà ogni *bestia* del villaggio verso la tua gola.
  Glaube mir, wenn du der *Hexe* kein Geschenk erhebst, wird sie jedes Tier des Dorfes an deinen Hals locken.
