Rang: 4098
Wort: tendenza
Wortart: n.f
Wort mit Artikel: la tendenza
Femininum / Plural: tendenze
IPA: ''
Definition: die Tendenz, -en
Register: ''
Beispielsätze: |-
  La *tendenza* attuale è verso un maggiore utilizzo delle energie rinnovabili.
  Die *Tendenz* derzeitig geht zu einer größeren Nutzung erneuerbarer Energien.
  
  Nonostante la *tendenza* al ribasso, ho deciso di investire in quel settore.
  Trotz der *Tendenz* sinkend habe ich beschlossen, in diesen Bereich zu investieren.
  
  Ho notato una *tendenza* strana tra i giovani: preferiscono leggere libri cartacei.
  Ich habe eine *Tendenz* seltsam bei Jugendlichen bemerkt: Sie bevorzugen gedruckte Bücher.
  
  La *tendenza* economica degli ultimi anni mostra un costante aumento dei prezzi.
  Die *Tendenz* wirtschaftlich der letzten Jahre zeigt einen konstanten Anstieg der Preise.
  
  Se la *tendenza* continua così, presto non ci saranno più animali selvatici in quella zona.
  Wenn die *Tendenz* so weitergeht, wird es bald keine wilden Tiere mehr in diesem Gebiet geben.
