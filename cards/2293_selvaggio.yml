Definition: wild, ungebärdig
Register: ''
Beispielsätze: |-
  La *selvaggia* natura dell'Amazzonia affascina molti viaggiatori.
  Die *wilde* Natur des Amazonas fasziniert viele Reisende.
  
  Non credere a ciò che dicono di quel paese: è solo una *selvaggia* propaganda.
  Glaube nicht, was sie über dieses Land sagen: Es ist nur *wüste* Propaganda.
  
  I cuccioli di lupo sembrano *selvaggi*, ma in realtà sono molto timidi.
  Welpen wirken *wild*, doch eigentlich sind sie sehr scheu.
  
  Per quanto tu sia *selvaggia*, ricorda che le regole esistono.
  So *ungebärdig* du auch bist, vergiss nicht, dass es Regeln gibt.
  
  Il comportamento *selvaggio* dei ragazzi ha spaventato gli anziani del quartiere.
  Das *wilde* Verhalten der Jugendlichen hat die älteren Bürger des Viertels erschreckt.
