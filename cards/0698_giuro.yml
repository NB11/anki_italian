Rang: 698
Wort: giuro
Wortart: n.m
Wort mit Artikel: il giuro
Femininum / Plural: giuri
IPA: ''
Definition: der Eid, -e
Register: ''
Beispielsätze: |-
  Il giudice gli ha fatto prestare *giuro* di dire la verità in tribunale.
  Der Richter ließ ihn den *Eid* schwören, die Wahrheit vor Gericht zu sagen.
  
  Molti dei testimoni hanno rifiutato di prestare *giuro* per paura di ritorsioni.
  Viele Zeugen weigerten sich, den *Eid* aus Angst vor Repressalien abzulegen.
  
  Prima di partire per la missione, ogni soldato deve giurare *giuro* di obbedire agli ordini.
  Bevor sie zur Mission aufbrechen, muss jeder Soldat den *Eid* schwören, Befehlen zu gehorchen.
  
  Il testimone ha confermato che l'accusato non ha rispettato il *giuro* fatto al poliziotto.
  Der Zeuge bestätigte, dass der Angeklagte den *Eid*, den er dem Polizisten geschworen hatte, nicht eingehalten hat.
  
  Mentre il prete leggeva le frasi del *giuro*, la sposa tremava di emozione.
  Während der Priester die Zeilen des *Eids* vorlas, zitterte die Braut vor Rührung.
