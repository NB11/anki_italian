Rang: 698
Wort: giuro
Wortart: n.m
Wort mit Artikel: il giuro
Femininum / Plural: i giuramenti
IPA: ''
Definition: der Eid, -e
Register: ''
Beispielsätze: |-
  Faccio *un giuramento* solenne davanti a te.
  Ich lege *einen* feierlichen *Schwur* vor dir ab.
  
  Ripete *il giuramento* dopo di me.
  Wiederhole *den Eid* nach mir.
  
  Hanno violato *il giuramento* che hanno fatto.
  Sie haben *den Eid* gebrochen, den sie geleistet haben.
  
  Prima di partire, ha fatto *il giuramento* di tornare.
  Bevor er ging, legte er *den Schwur* ab, zurückzukehren.
  
  Non rompere *il giuramento*, è una cosa seria!
  Breche *den Eid* nicht, das ist eine ernste Sache!
