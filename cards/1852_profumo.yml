Rang: 1852
Wort: profumo
Wortart: n.m
Wort mit Artikel: il profumo
Femininum / Plural: profumi
IPA: ''
Definition: das Parfüm, -s, der Duft, -ü-e
Register: ''
Beispielsätze: |-
  Mio fratello ha ricevuto un *profumo* molto costoso per il suo compleanno.
  Mein Bruder hat ein sehr teures *Parfüm* zu seinem Geburtstag bekommen.
  
  Questo *profumo* si chiama "Notte d’Oriente" e profuma di spezie.
  Dieser *Duft* heißt "Nacht des Orients" und riecht nach Gewürzen.
  
  Quando hai spruzzato il *profumo*, ho subito riconosciuto il tuo odore.
  Als du das *Parfüm* aufsprühtest, habe ich sofort deinen Geruch erkannt.
  
  Nonostante il caldo, il *profumo* di lei rimaneva fresco tutto il giorno.
  Trotz der Hitze blieb der *Duft* von ihr den ganzen Tag frisch.
  
  Vorrei un *profumo* che ricordi la passeggiata al mare, con note di salsedine e alghe.
  Ich hätte gern ein *Parfüm*, das an den Spaziergang am Meer erinnert, mit Noten von Salz und Algen.
