Rang: 2792
Wort: distinguere
Wortart: v
Wort mit Artikel: distinguere
Femininum / Plural: ''
IPA: ''
Definition: unterscheiden, erkennen
Register: ''
Beispielsätze: |-
  Non riesco a *distinguere* i gemelli nella foto perché indossano vestiti uguali.
  Ich kann die Zwillinge auf dem Foto nicht *unterscheiden*, weil sie gleiche Kleidung tragen.
  
  Per *distinguere* un sapore amaro da uno dolce ci vuole molta attenzione.
  Um einen bitteren von einem süßen Geschmack zu *unterscheiden*, braucht es viel Aufmerksamkeit.
  
  Il direttore volle *distinguere* tra le varie proposte prima di prendere una decisione.
  Der Direktor wollte die verschiedenen Vorschläge *unterscheiden*, bevor er eine Entscheidung traf.
  
  Spero che tu possa *distinguere* il bene dal male senza difficoltà.
  Ich hoffe, dass du Gutes von Bösem ohne Schwierigkeiten *unterscheiden* kannst.
  
  Anche se la stanza è buia, lui riuscì a *distinguere* la forma della scrivania.
  Obwohl der Raum dunkel war, gelang es ihm, die Form des Schreibtischs zu *unterscheiden*.
