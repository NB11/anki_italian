Rang: 2949
Wort: indico
Wortart: adj
Wort mit Artikel: indico
Femininum / Plural: ''
IPA: ''
Definition: anzeigend, hinweisend
Register: ''
Beispielsätze: |-
  L'*indicatore* della benzina mostra che il serbatoio è quasi vuoto.
  Der *anzeigende* Tankanzeiger zeigt, dass der Tank fast leer ist.
  
  Nel manuale ci sono delle note *indicative* sui parametri di sicurezza.
  In der Anleitung gibt es *hinweisende* Notizen zu den Sicherheitsparametern.
  
  Quelle freccette rosse sono *indicative* di un pericolo imminente.
  Jene roten Pfeile sind *anzeigend* für eine drohende Gefahr.
  
  La sua risposta è stata *indicativa* del suo disinteresse.
  Seine Antwort war *hinweisend* auf sein Desinteresse.
  
  Gli esperti hanno fornito una stima *indicativa* dei danni causati dalla tempesta.
  Die Experten haben eine *anzeigende* Schätzung der durch den Sturm verursachten Schäden geliefert.
