Rang: 1008
Wort: padrone
Wortart: n.m
Wort mit Artikel: il padrone
Femininum / Plural: padroni
IPA: ''
Definition: der Herr, -en, der Besitzer
Register: ''
Beispielsätze: |-
  Il *padrone* ha deciso di vendere la sua vecchia casa al mercato nero.
  Der *Herr* hat beschlossen, sein altes Haus auf dem Schwarzmarkt zu verkaufen.
  
  Se non paghi l’affitto, il *padrone* ti sfratterà immediatamente.
  Wenn du die Miete nicht zahlst, wird der *Besitzer* dich sofort rausschmeißen.
  
  Il *padrone* del cane ha fatto il possibile per cavalare la sua paura degli odori forti.
  Der *Herr* des Hundes hat alles versucht, um seine Angst vor starken Gerüchen zu überwinden.
  
  Nonostante il *padrone* fosse malato, decise ugualmente di impedire che la battaglia scoppiasse tra i suoi servi.
  Trotz seiner *Krankheit* beschloss der Herr, den Streit zwischen seinen Dienern zu verhindern.
  
  Il *padrone* della fabbrica ricevette il rapporto del poliziotto riguardo all’incidente avvenuto nel reparto sud.
  Der *Besitzer* der Fabrik erhielt den Bericht des Polizisten über den Unfall in der Südabteilung.
