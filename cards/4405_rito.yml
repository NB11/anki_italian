Rang: 4405
Wort: rito
Wortart: n.m
Wort mit Artikel: il rito
Femininum / Plural: riti
IPA: ''
Definition: das Ritual, -e
Register: ''
Beispielsätze: |-
  La famiglia segue sempre lo stesso *rito* della colazione la domenica mattina.
  Die Familie folgt immer demselben *Ritual* beim Frühstück am Sonntagmorgen.
  
  Nonostante il caos intorno a loro, hanno mantenuto intatto il *rito* di accendere una candela ogni sera.
  Trotz des Chaos um sie herum haben sie das *Ritual*, jeden Abend eine Kerze anzuzünden, unversehrt bewahrt.
  
  Il *rito* della laurea prevede che lo studente indossi la toga e pronunci un giuramento.
  Das *Ritual* der Graduierung sieht vor, dass der Student das Talar trägt und einen Eid spricht.
  
  Sai che in India esistono *riti* di purificazione molto antichi e complessi?
  Weißt du, dass es in Indien sehr alte und komplexe *Rituale* der Reinigung gibt?
  
  Anche se non credi ai *riti*, dovresti rispettare quelli della cultura che ti ospita.
  Auch wenn du nicht an *Rituale* glaubst, solltest du die der Kultur, die dich aufnimmt, respektieren.
