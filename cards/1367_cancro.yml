Rang: 1367
Wort: cancro
Wortart: n.m
Wort mit Artikel: il cancro
Femininum / Plural: cancri
IPA: ''
Definition: der Krebs, -e
Register: ''
Beispielsätze: |-
  Il *cancro* è una malattia che colpisce milioni di persone ogni anno.
  Der *Krebs* ist eine Krankheit, die jedes Jahr Millionen von Menschen befällt.
  
  Dopo aver visto il referto, si è reso conto di avere un *cancro* al polmone.
  Nach dem Befund ist ihm klar geworden, dass er *Lungenkrebs* hat.
  
  I medici cercano sempre nuove cure per combattere il *cancro* al seno.
  Ärzte suchen ständig nach neuen Therapien, um *Brustkrebs* zu bekämpfen.
  
  È stato ricoverato in ospedale perché temeva di avere un *cancro*, ma fortunatamente era solo un’infezione.
  Er wurde ins Krankenhaus eingeliefert, weil er *Krebs* befürchtete – zum Glück war es nur eine Infektion.
  
  La ricerca scientifica ha bisogno di più finanziamenti per sconfiggere definitivamente il *cancro*.
  Die wissenschaftliche Forschung braucht mehr Förderung, um den *Krebs* endgültig zu besiegen.
