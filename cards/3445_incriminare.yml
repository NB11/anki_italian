Rang: 3445
Wort: incriminare
Wortart: vt
Wort mit Artikel: incriminare
Femininum / Plural: ''
IPA: ''
Definition: beschuldigen, anklagen
Register: ''
Beispielsätze: |-
  Il giudice ha deciso di *incriminare* l’uomo per frode finanziaria.
  Der Richter hat beschlossen, den Mann wegen Finanzbetrugs zu *beschuldigen*.
  
  Se non avessi visto il filmato, non ti avrei *incriminato* così ingiustamente.
  Wenn ich das Video nicht gesehen hätte, hätte ich dich nicht so ungerecht *angeklagt*.
  
  La polizia sta cercando prove per *incriminare* il sospettato in questo caso.
  Die Polizei sucht Beweise, um den Verdächtigen in diesem Fall zu *belasten*.
  
  Nonostante le accuse, molti credono che sia stato *incriminato* senza prove sufficienti.
  Trotz der Vorwürfe glauben viele, dass er ohne ausreichende Beweise *angeklagt* wurde.
  
  Se fossi nei suoi panni, non vorrei essere *incriminato* per un crimine che non ho commesso.
  Wenn ich an seiner Stelle wäre, möchte ich nicht für ein Verbrechen *belastet* werden, das ich nicht begangen habe.
