Rang: 2425
Wort: precipitare
Wortart: v
Wort mit Artikel: precipitare
Femininum / Plural: ''
IPA: ''
Definition: stürzen, fallen, eilen
Register: ''
Beispielsätze: |-
  Il vaso ha *precipitato* dalla finestra perché non era ben fissato.
  Die Vase ist aus dem Fenster *gefallen*, weil sie nicht richtig befestigt war.
  
  Temo che la situazione possa *precipitare* da un momento all'altro.
  Ich fürchte, die Lage könnte jederzeit *eskalieren*.
  
  Se non avessimo *precipitato*, avremmo perso il treno di sicuro.
  Wenn wir nicht *uns beeilt* hätten, hätten wir den Zug sicher verpasst.
  
  Le foglie secche *precipitano* a terra quando soffia il vento.
  Die trockenen Blätter *fallen* zu Boden, wenn der Wind weht.
  
  Non *precipitare* le decisioni prima di aver valutato tutte le opzioni!
  Hast du die Entscheidungen nicht *überstürzt*, bevor du alle Optionen bewertet hast!
