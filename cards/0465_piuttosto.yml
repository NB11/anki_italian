Rang: 465
Wort: piuttosto
Wortart: adv
Wort mit Artikel: piuttosto
Femininum / Plural: ''
IPA: ''
Definition: eher, lieber, ziemlich
Register: ''
Beispielsätze: |-
  Preferisco *piuttosto* una passeggiata al parco che una serata in discoteca.
  Ich *bevorzuge* *lieber* einen Spaziergang im Park als einen Abend in der Disco.
  
  È *piuttosto* difficile capire questa grammatica senza un esempio.
  Es ist *eher* *schwierig*, diese Grammatik ohne Beispiel zu verstehen.
  
  *Piuttosto* che restare a casa, usciamo a prendere un caffè.
  *Statt* zu Hause zu bleiben, gehen wir einen Kaffee trinken.
  
  Questo film è *piuttosto* noioso, non trovi?
  Dieser Film ist *ziemlich* *langweilig*, meinst du nicht?
  
  Se hai fame, *piuttosto* mangia qualcosa ora che aspettare troppo.
  Wenn du Hunger hast, *iss* lieber jetzt etwas, statt zu lange zu warten.
