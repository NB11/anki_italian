Beispielsätze: |-
  La *cattura* del ladro è avvenuta grazie a una telecamera nascosta.
  Die *Festnahme* des Diebes ist dank einer versteckten Kamera gelungen.
  
  Se avessi visto la *cattura* di quel pesce, avresti gridato di gioia!
  Wenn ich den *Fang* dieses Fisches gesehen hätte, hätte ich vor Freude geschrien!
  
