  Die Polizei lobte die schnelle *Festnahme* des Gesuchten und bezeichnete sie als außergewöhnlichen Erfolg.
  
  Non dimenticherò mai la *cattura* di quella farfalla rara nel mio giardino.
  Ich werde den *Fang* dieses seltenen Schmetterlings in meinem Garten nie vergessen.
