Rang: 885
Wort: cadavere
Wortart: n.m
Wort mit Artikel: il cadavere
Femininum / Plural: cadaveri
IPA: ''
Definition: die Leiche, -n
Register: ''
Beispielsätze: |-
  Hanno trovato *cadavere* nel bosco dopo settimane di ricerche.
  Sie haben die *Leiche* im Wald nach Wochen der Suche gefunden.
  
  Il colonnello ha ordinato di non toccare *cadavere* finché non arrivano gli esperti.
  Der Oberst befahl, die *Leiche* nicht anzufassen, bis die Experten eintreffen.
  
  Nonostante il *cadavere* fosse in avanzato stato di decomposizione, gli investigatori hanno trovato tracce importanti.
  Obwohl die *Leiche* sich in fortgeschrittenem Verwesungszustand befand, fanden die Ermittler wichtige Spuren.
  
  La stampa ha pubblicato articoli sensazionali su *cadavere* di un famoso imprenditore.
  Die Presse veröffentlichte sensationelle Artikel über die *Leiche* eines berühmten Unternehmers.
  
  Appena si è accorto della presenza di *cadavere*, ha chiamato immediatamente la polizia.
  Sobald er die Anwesenheit der *Leiche* bemerkte, rief er sofort die Polizei.
