Rang: 3318
Wort: penetrare
Wortart: v
Wort mit Artikel: penetrare
Femininum / Plural: ''
IPA: ''
Definition: eindringen, durchdringen
Register: ''
Beispielsätze: |-
  Il sole *penetra* attraverso le finestre e riscalda la stanza.
  Die Sonne lässt das *Licht* durch die Fenster *eindringen* und wärmt den Raum.
  
  Se avessi più tempo, *penetrerei* a fondo nel problema.
  Falls ich mehr Zeit hätte, würde ich tiefer in das Problem **eindringen**.
  
  La polizia ha scoperto che i ladri sono *penetrati* attraverso il soffitto.
  Die Polizei hat herausgefunden, dass die Diebe durch die Decke **eingedrungen** sind.
  
  È importante che tu *penetri* nella mente del personaggio per recitare bene.
  Es ist wichtig, dass du in die Gedanken der Figur **eindringst**, um gut zu spielen.
  
  L’acqua del fiume *penetra* lentamente nel terreno argilloso.
  Das Wasser des Flusses dringt langsam in den tonhaltigen **Boden** ein.
