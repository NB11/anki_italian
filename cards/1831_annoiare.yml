  Ich wollte die Gäste mit meiner Geschichte nicht *langweilen*.
  
  Questo film mi ha *annoato* da morire.
  Dieser Film hat mich zu Tode *gelangweilt*.
  
  Credo che la televisione *annoierà* molto i bambini.
  Ich glaube, das Fernsehen wird die Kinder sehr *langweilen*.
