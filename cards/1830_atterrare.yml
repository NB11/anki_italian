Rang: 1830
Wort: atterrare
Wortart: v
Wort mit Artikel: atterrare
Femininum / Plural: ''
IPA: ''
Definition: landen, landen
Register: ''
Beispielsätze: |-
  Il pilota è riuscito ad *atterrare* nonostante la tempesta.
  Der Pilot schaffte es, trotz des *Sturms* zu landen.
  
  Se vuoi che l’aereo *atterri* in orario, controlla sempre le previsioni del tempo.
  Wenn du möchtest, dass das Flugzeug pünktlich *landet*, solltest du immer die Wettervorhersagen prüfen.
  
  L’astronauta ha dichiarato di non sapere ancora dove avrebbe *atterrato* il modulo.
  Der Astronaut erklärte, er wisse noch nicht, wo das Modul *landen* würde.
  
  Nonostante le difficoltà, l’aereo è riuscito ad *atterrare* in una piccola pista di montagna.
  Trotz der *Schwierigkeiten* gelang es dem Flugzeug, auf einer kleinen Bergpiste zu landen.
  
  Dicono che l’autista abbia guidato male perché non sapeva che il camion *atterrasse* qui.
  Man sagt, der Fahrer habe schlecht gefahren, weil er nicht wusste, dass der LKW hier *landen* sollte.
