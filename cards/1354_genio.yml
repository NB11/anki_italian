Rang: 1354
Wort: genio
Wortart: n.m
Wort mit Artikel: il genio
Femininum / Plural: geni
IPA: ''
Definition: das Genie, Genies
Register: ''
Beispielsätze: |-
  Secondo la mia opinione, Leonardo da Vinci era un *genio* assoluto.
  Ich bin der Ahnung, dass Leonardo da Vinci ein absolutes *Genie* war.
  
  Se non avessi questo *genio* per la matematica, non avrei risolto il problema così chiaramente.
  Wenn ich nicht dieses *Genie* für Mathematik hätte, hätte ich das Problem nicht so klar gelöst.
  
  Il *genio* dell’arte moderna spesso nasce da una voglia di ribellione contro le regole.
  Das *Genie* der modernen Kunst entsteht oft aus einem Wunsch nach Rebellion gegen Regeln.
  
  Chiunque dubiti del *genio* di Mozart deve ascoltare almeno una sua sinfonia.
  Wer am *Genie* Mozarts zweifelt, sollte mindestens eine seiner Sinfonien anhören.
  
  Avrei voluto rifare il percorso di un *genio* come Albert Einstein, ma non è stato possibile.
  Ich hätte gern den Weg eines *Genies* wie Albert Einstein nachverfolgt, aber es war nicht möglich.
