Rang: 1308
Wort: sabato
Wortart: n.m
Wort mit Artikel: il sabato
Femininum / Plural: sabati
IPA: ''
Definition: der Samstag, -e
Register: ''
Beispielsätze: |-
  La prossima settimana vorrei andare al *sabato* al cinema con gli amici.
  Nächsten *Samstag* möchte ich mit Freunden ins Kino gehen.
  
  Non lavoro di *sabato*, perché preferisco dedicarmi alla famiglia.
  Am *Samstag* arbeite ich nicht, weil ich mich lieber meiner Familie widme.
  
  Volevo invitarti a cena già la *scorsa sabato*, ma alla fine siamo stati al ristorante pesante che hai scelto.
  Ich wollte dich schon am *vergangenen Samstag* zum Abendessen einladen, doch wir waren in dem schweren Restaurant, das du ausgewählt hattest.
  
  Sai che *sabato* mattina andremo alla spiaggia a frequentare un corso di vela? Ho già contattato il cameriere che offre il drink utile per la sicurezza.
  Wusstest du, dass wir am *Samstag*morgen am Strand einen Segelkurs besuchen? Ich habe schon den Kellner kontaktiert, der das nützliche Getränk für die Sicherheit anbietet.
  
  Se non piove, il *sabato* prossimo organizzeremo una gara nel quartiere con tutte le creature del giardino, per raccogliere fondi contro la magia dei trucci.
  Falls es nicht regnet, werden wir nächsten *Samstag* einen Wettbewerb im Viertel mit allen Kreaturen aus dem Garten organisieren, um gegen die Magie der Schminke zu sammeln.
