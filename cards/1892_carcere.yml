Rang: 1892
Wort: carcere
Wortart: n.m
Wort mit Artikel: il carcere
Femininum / Plural: carceri
IPA: ''
Definition: das Gefängnis, -se
Register: ''
Beispielsätze: |-
  Il detenuto è stato trasferito in un altro *carcere* per motivi di sicurezza.
  Der Häftling wurde aus Sicherheitsgründen in ein anderes *Gefängnis* verlegt.
  
  Se avessi rubato, non vorrei finire in *carcere*!
  Wenn ich gestohlen hätte, möchte ich nicht im *Gefängnis* landen!
  
  I diritti dei prigionieri nel *carcere* di massima sicurezza sono spesso discussi.
  Die Rechte der Gefangenen im *Gefängnis* der höchsten Sicherheitsstufe werden oft diskutiert.
  
  Prima di commettere un reato, non pensi mai al *carcere* che ti aspetta.
  Vor einem Verbrechen denkt man nie an das *Gefängnis*, das einen erwartet.
  
  Il giudice ha stabilito che il colpevole sconterà la pena in *carcere* per cinque anni.
  Der Richter hat festgelegt, dass der Schuldige seine Strafe im *Gefängnis* für fünf Jahre absitzen wird.
