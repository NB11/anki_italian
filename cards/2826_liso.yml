Rang: 2826
Wort: liso
Wortart: adj
Wort mit Artikel: liso
Femininum / Plural: lisi
IPA: ''
Definition: glatt, abgenutzt
Register: ''
Beispielsätze: |-
  I jeans *lisci* sembrano più vecchi di quelli nuovi, ma sono comodissimi da indossare.
  Die *glatten* Jeans wirken älter als die neuen, aber sie sind sehr bequem zu tragen.
  
  Dopo tanti lavaggi, la camicia è diventata completamente *liscia* e senza pieghe.
  Nach vielen Wäschen ist das Hemd völlig *glatt* und ohne Falten geworden.
  
  Nonostante la *liscia* superficie del lago, il pescatore riuscì a tirare su una trota.
  Trotz der *glatten* Oberfläche des Sees gelang es dem Angler, eine Forelle zu fangen.
  
  Se vuoi che il maglione rimanga *liscio*, non metterlo nell’asciugatrice a temperatura alta.
  Wenn du möchtest, dass der Pullover *glatt* bleibt, lege ihn nicht in den Trockner bei hoher Temperatur.
  
  La *liscia* pelle delle sue mani tradiva anni di duro lavoro all’aria aperta.
  Die *glatte* Haut seiner Hände verriet Jahre harter Arbeit im Freien.
