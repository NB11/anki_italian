Rang: 924
Wort: peggiore
Wortart: adj
Wort mit Artikel: peggiore
Femininum / Plural: ''
IPA: ''
Definition: schlechter, schlimmer
Register: ''
Beispielsätze: |-
  Il *peggiore* incubo della mia vita è stato quando ho fatto un errore terribile al lavoro e ho perso l’*esperienza’.’
  Der *schlimmste* Albtraum meines Lebens war, als ich einen schrecklichen Fehler bei der Arbeit gemacht und die Erfahrung verloren habe.
  
  Credi che il *peggiore* nemico dell’uomo sia la paura o la superbia?
  Glaubst du, dass der *schlechteste* Feind des Menschen die Angst oder der Hochmut ist?
  
  Nonostante il *peggiore* temporale, il professore è riuscito a concentrare i suoi studenti sulle equazioni più complesse del corso.
  Trotz des *schlimmsten* Sturms gelang es dem Professor, seine Studenten auf die komplexesten Gleichungen des Kurses zu konzentrieren.
  
  Se avessi saputo che sarebbe stato il *peggiore* viaggio della mia vita, non avrei mai accettato quel prezzo così basso per l’hotel in centro.
  Hätte ich gewusst, dass es die *schlimmste* Reise meines Lebens werden würde, hätte ich nie diesen so niedrigen Preis für das Hotel mitten im Zentrum angenommen.
  
  In quella condizione di isolamento, il *peggiore* incubo di Marco era sentire voci che lo accusavano di ogni errore del passato.
  In dieser *Lage* der Isolation war Marco’s schlimmster Albtraum, Stimmen zu hören, die ihn für jeden Fehler der Vergangenheit beschimpften.
