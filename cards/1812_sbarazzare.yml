Rang: 1812
Wort: sbarazzare
Wortart: vt
Wort mit Artikel: sbarazzare
Femininum / Plural: ''
IPA: ''
Definition: loswerden, beseitigen
Register: ''
Beispielsätze: |-
  Devo *sbarazzarmi* di questi vecchi vestiti prima di trasferirmi.
  Ich muss diese alten Kleidungsstücke *loswerden*, bevor ich umziehe.
  
  Se non *sbarazzi* la stanza dai mobili vecchi, non puoi affittarla.
  Wenn du die Wohnung nicht von den alten Möbeln *befreit*, kannst du sie nicht vermieten.
  
  Hanno *sbarazzato* il giardino dalle erbacce usando solo acqua bollente.
  Sie haben den Garten von Unkraut befreit, indem sie nur kochendes Wasser verwendeten.
  
  Ti consiglio di *sbarazzarti* di quella vecchia televisione: occupa troppo spazio.
  Ich rate dir, diesen alten Fernseher *loszuwerden* – er nimmt zu viel Platz ein.
  
  Dopo il divorzio, non aveva il coraggio di *sbarazzarsi* di nessuna delle loro cose.
  Nach der Scheidung hatte sie nicht den Mut, sich von irgendeinem ihrer gemeinsamen Dinge zu *befreien*.
