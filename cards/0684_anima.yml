Rang: 684
Wort: anima
Wortart: n.f
Wort mit Artikel: l'anima
Femininum / Plural: anime
IPA: ''
Definition: die Seele, -n
Register: ''
Beispielsätze: |-
  La *anima* umana è misteriosa e profonda.
  Die *Seele* des Menschen ist geheimnisvoll und tief.
  
  Credi che gli animali abbiano un’*anima*?
  Glaubst du, dass Tiere eine *Seele* haben?
  
  La sua *anima* era piena di tristezza dopo quella perdita.
  Seine *Seele* war voller Traurigkeit nach diesem Verlust.
  
  Non sapevo che avessi un cuore così tenero nell’*anima*!
  Ich wusste nicht, dass du ein so sanftes Herz in deiner *Seele* hast!
  
  Le *anime* dei morti non trovano pace, dice la leggenda.
  Die *Seelen* der Toten finden keinen Frieden, sagt die Legende.
