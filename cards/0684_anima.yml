Rang: 684
Wort: anima
Wortart: n.f
Wort mit Artikel: l'anima
Femininum / Plural: anime
IPA: ''
Definition: die Seele, -n
Register: ''
Beispielsätze: |-
  L'*anima* umana è spesso rappresentata come immortale nelle leggende di tutto il mondo.
  Die *Seele* des Menschen wird in Legenden weltweit oft als unsterblich dargestellt.
  
  Dopo la morte del nonno, sento che la sua *anima* mi accompagna ogni giorno.
  Seit dem Tod meines Großvaters spüre ich, dass mich seine *Seele* jeden Tag begleitet.
  
  Molti credono che la *anima* possa rinascere in un altro corpo secondo la dottrina del karma.
  Viele glauben, dass die *Seele* nach dem Gesetz des Karma in einem anderen Körper wiedergeboren werden kann.
  
  Ha detto che l'*anima* di questo luogo è carica di storia e mistero, ovviamente.
  Er hat gesagt, dass die *Seele* dieses Ortes voller Geschichte und Geheimnis ist, offensichtlich.
  
  Nonostante la *anima* ferita, riuscì a dimostrare una grande forza interiore durante la prova.
  Trotz ihrer *verletzten Seele* bewies sie eine große innere Stärke während des Tests, um zu beweisen.
