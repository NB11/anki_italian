Beispielsätze: |-
  L’attività *illegale* è punita dalla legge.
  Die *illegale* Tätigkeit wird vom Gesetz bestraft.
  
  Non vorremmo che il nostro progetto fosse considerato *illegale*.
  Wir möchten nicht, dass unser Projekt als *illegal* gilt.
  
  Ha commesso un gesto *illegale* senza rendersene conto.
  Er hat eine *illegale* Handlung begangen, ohne es zu merken.
  
  Le autorità hanno sequestrato merci *illegali* al confine.
  Die Behörden beschlagnahmten *illegale* Waren an der Grenze.
  
  Sarebbe meglio denunciare qualsiasi attività *illegale* alle forze dell’ordine.
  Es wäre besser, jede *illegale* Aktivität den Sicherheitsbehörden zu melden.
