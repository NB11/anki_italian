Rang: 2951
Wort: cassetto
Wortart: n.m
Wort mit Artikel: il cassetto
Femininum / Plural: i cassetti
IPA: ''
Definition: die Schublade, -n
Register: ''
Beispielsätze: |-
  Ho trovato la chiave nel *cassetto* della scrivania.
  Ich habe den Schlüssel in der *Schublade* des Schreibtischs gefunden.
  
  Stai cercando qualcosa nello *cassetto* sbagliato.
  Du suchst etwas in der *falschen Schublade*.
  
  Mio figlio ha svuotato tutti i *cassetti* per trovare il suo giocattolo.
  Mein Sohn hat alle *Schubladen* ausgeräumt, um sein Spielzeug zu finden.
  
  Questo *cassetto* non si apre, è bloccato da anni.
  Diese *Schublade* lässt sich nicht öffnen, sie ist seit Jahren blockiert.
  
  Prima di partire ho controllato che ogni *cassetto* fosse chiuso bene.
  Bevor ich ging, habe ich überprüft, dass jede *Schublade* gut geschlossen war.
