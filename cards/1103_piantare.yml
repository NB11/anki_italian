Rang: 1103
Wort: piantare
Wortart: vt
Wort mit Artikel: piantare
Femininum / Plural: ''
IPA: ''
Definition: pflanzen, anpflanzen
Register: ''
Beispielsätze: |-
  Ogni primavera il giardiniere *pianta* nuovi fiori nel parco vicino al locale della gelateria.
  Jeden Frühling pflanzt der Gärtner neue Blumen im Park neben dem lokalen Eiscafé.
  
  Se vuoi avere pomodori freschi, devi *piantare* i semi in primavera e curarli con attenzione.
  Wenn du frische Tomaten haben willst, musst du die Samen im Frühling pflanzen und sie sorgfältig pflegen.
  
  Il contadino ha *piantato* gli alberi da frutto dieci anni fa e ora raccoglie i primi frutti.
  Der Bauer hat vor zehn Jahren die Obstbäume gepflanzt und erntet jetzt die ersten Früchte.
  
  Nonostante il terreno sia povero, riuscì a *piantare* una vigna che produce vino eccellente.
  Trotz des armen Bodens gelang es ihm, einen Weinberg zu pflanzen, der hervorragenden Wein produziert.
  
  Gli ambientalisti suggeriscono di *piantare* più alberi per combattere il freddo invernale e l’inquinamento urbano.
  Umweltaktivisten schlagen vor, mehr Bäume zu pflanzen, um der winterlichen Kälte und der städtischen Verschmutzung entgegenzuwirken.
