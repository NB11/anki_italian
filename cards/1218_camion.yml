Rang: 1218
Wort: camion
Wortart: n.m
Wort mit Artikel: il camion
Femininum / Plural: i camion
IPA: ''
Definition: der Lastwagen, -
Register: ''
Beispielsätze: |-
  Il *camion* si fermò improvvisamente vicino all'area di sosta.
  Der *Lastwagen* hielt plötzlich in der Nähe der Rastfläche.
  
  Quanti *camion* hai contato durante il tiro?
  Wie viele *Lastwagen* hast du während des Schusses gezählt?
  
  Stavolta il *camion* è arrivato con due ospiti a bordo.
  Dieses Mal kam der *Lastwagen* mit zwei Gästen an Bord.
  
  Pensavo che il *camion* fosse diretto verso il nord, ma ha preso un'altra direzione.
  Ich dachte, der *Lastwagen* wäre nach Norden gefahren, aber er nahm eine andere Richtung.
  
  Se vuoi procurare un *camion* per il trasporto, dobbiamo ridurre i costi al massimo.
  Wenn du einen *Lastwagen* für den Transport besorgen willst, müssen wir die Kosten auf ein Minimum verringern.
