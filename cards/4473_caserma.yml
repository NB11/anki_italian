Rang: 4473
Wort: caserma
Wortart: n.f
Wort mit Artikel: la caserma
Femininum / Plural: caserme
IPA: ''
Definition: die Kaserne, -n
Register: ''
Beispielsätze: |-
  I soldati dormono nella *caserma* vicino alla piazza principale.
  Die Soldaten schlafen in der *Kaserne* nahe dem Hauptplatz.
  
  Nonostante il clima freddo, la *caserma* rimane sempre riscaldata per legge.
  Trotz des *Klima*s bleibt die Kaserne dank Gesetz immer beheizt.
  
  Quando ho visitato il museo, una *caserma* del 1800 era esposta come capolavoro dell'epoca.
  Als ich das Museum besuchte, wurde eine *Kaserne* aus dem Jahr 1800 als Meisterwerk der Epoche ausgestellt.
  
  Se domani troveremo un sigillo sull'entrata della *caserma*, dovremo immediatamente avvisare il comando.
  Falls wir morgen ein *Siegel* am Eingang der Kaserne vorfinden, müssen wir sofort das Kommando benachrichtigen.
  
  Era così buio che anche le luci della *caserma* non si distinguevano nello sfondo della notte.
  Es war so dunkel, dass sich selbst die Lichter der *Kaserne* vor dem Hintergrund der Nacht nicht abhoben.
