Rang: 3761
Wort: delusione
Wortart: n.f
Wort mit Artikel: la delusione
Femininum / Plural: delusioni
IPA: ''
Definition: die Enttäuschung, -en
Register: ''
Beispielsätze: |-
  Non ho ancora superato *la delusione* per la sconfitta della mia squadra in finale.
  Ich habe die *Enttäuschung* über die Niederlage meiner Mannschaft im Finale noch nicht überwunden.
  
  È una *delusione* grande quando scopri che qualcuno ti ha mentito senza motivo.
  Es ist eine große *Enttäuschung*, wenn du herausfindest, dass dich jemand ohne Grund belogen hat.
  
  La *delusione* sarebbe stata minore se avessimo saputo in anticipo come sarebbero andate realmente le cose.
  Die *Enttäuschung* wäre geringer gewesen, wenn wir im Voraus gewusst hätten, wie die Dinge wirklich verlaufen würden.
  
  Spero che questa volta non ci sia nessuna *delusione* dopo tutto il lavoro che abbiamo fatto insieme.
  Ich hoffe, dass es diesmal nach all der gemeinsamen Arbeit keine *Enttäuschung* gibt.
  
  Nonostante *la delusione* per il risultato, continua a lavorare sodo e non si arrende mai.
  Trotz der *Enttäuschung* über das Ergebnis arbeitet sie weiter hart und gibt nie auf.
