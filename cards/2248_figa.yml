Rang: 2248
Wort: figa
Wortart: n.f
Wort mit Artikel: la figa
Femininum / Plural: fighe
IPA: ''
Definition: die Muschi, die Fotze, der Sack
Register: ''
Beispielsätze: |-
  La *figa* era completamente depilata prima della cerimonia.
  Die *Muschi* war vor der Zeremonie komplett rasiert.
  
  Non riesco a credere che lui abbia osato toccare la *figa* della mia fidanzata!
  Ich kann nicht glauben, dass er es gewagt hat, die *Fotze* meiner Freundin anzufassen!
  
  Se continui a guardare la *figa* in quel modo, finirà male.
  Wenn du weiter so auf die *Muschi* starrst, wird das ein böses Ende nehmen.
  
  Lei aveva detto che la *figa* le faceva male dopo l’allenamento, ma non ha voluto dirmi perché.
  Sie hatte gesagt, dass die *Fotze* ihr nach dem Training wehtat, aber sie wollte mir nicht sagen, warum.
  
  Nonostante tutti i problemi, quella *figa* era ancora liscia come la seta.
  Trotz aller Probleme war diese *Muschi* immer noch seidig glatt.
