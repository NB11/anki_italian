Rang: 4004
Wort: paragonare
Wortart: vt
Wort mit Artikel: paragonare
Femininum / Plural: ''
IPA: ''
Definition: vergleichen, gegenüberstellen, gleichsetzen
Register: ''
Beispielsätze: |-
  Non è giusto *paragonare* la sua situazione alla mia senza conoscere tutti i dettagli.
  Es ist nicht richtig, seine Situation einfach mit meiner zu *vergleichen* ohne alle Details zu kennen.
  
  Se *paragoni* queste due foto da vicino, noterai subito le differenze.
  Wenn du diese zwei Fotos *gegenüberstellst*, wirst du sofort die Unterschiede bemerken.
  
  Non vorrei essere *paragonato* con qualcuno che non ha il nostro stesso impegno.
  Ich möchte nicht mit jemandem *gleichgesetzt* werden, der nicht unser gleiches Engagement hat.
  
  Gli studiosi hanno *paragonato* l’evoluzione umana a quella di altri mammiferi.
  Die Forscher haben die menschliche Entwicklung mit der anderer Säugetiere *vergleichen*.
  
  Non puoi *paragonare* la sua esperienza lavorativa con la tua: lui ha lavorato in un altro settore.
  Du kannst seine Berufserfahrung nicht mit deiner *vergleichen*: Er hat in einem anderen Bereich gearbeitet.
