Rang: 3591
Wort: psicologo
Wortart: n.m
Wort mit Artikel: lo psicologo
Femininum / Plural: psicologi
IPA: ''
Definition: der Psychologe, -n, die Psychologin, -nen
Register: ''
Beispielsätze: |-
  Lo *psicologo* che ho consultato mi ha aiutato molto con i miei problemi di ansia.
  Der von mir konsultierte *Psychologe* hat mir sehr mit meinen Angstproblemen geholfen.
  
  Spero che mio figlio diventi un *psicologo* perché ha molta empatia.
  Ich hoffe, mein Sohn wird *Psychologe*, denn er hat viel Empathie.
  
  Nonostante le lunghe sedute, il *psicologo* non riuscì a risolvere la sua profonda infelicità.
  Trotz langwieriger Sitzungen konnte der *Psychologe* seine tiefe Unzufriedenheit nicht beheben.
  
  Avrei voluto frequentare un corso di laurea in psicologia, ma alla fine ho scelto ingegneria.
  Ich hätte gerne Psychologie studiert, aber am Ende habe ich mich für Ingenieurswesen entschieden.
  
  Molti *psicologi* ritengono che l'onestà sia fondamentale per instaurare un rapporto di fiducia con i pazienti.
  Viele *Psychologen* sind der Ansicht, dass Ehrlichkeit entscheidend ist, um ein Vertrauensverhältnis zu den Patienten aufzubauen.
