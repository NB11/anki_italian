Rang: 2897
Wort: distruzione
Wortart: n.f
Wort mit Artikel: la distruzione
Femininum / Plural: distruzioni
IPA: ''
Definition: die Zerstörung, -en
Register: ''
Beispielsätze: |-
  La *distruzione* della foresta è stata causata dagli incendi degli ultimi anni.
  Die *Zerstörung* des Waldes wurde durch die Brände der letzten Jahre verursacht.
  
  Secondo gli scienziati, senza azioni immediate la *distruzione* dell'ambiente sarà irreversibile.
  Laut den Wissenschaftlern wird die *Zerstörung* der Umwelt ohne sofortiges Handeln irreversibel sein.
  
  Hanno assistito alla *distruzione* totale della città dopo il terremoto.
  Sie haben die totale *Zerstörung* der Stadt nach dem Erdbeben miterlebt.
  
  Se non fermiamo lo spreco delle risorse, la *distruzione* degli ecosistemi sarà inevitabile.
  Wenn wir die Verschwendung der Ressourcen nicht stoppen, wird die *Zerstörung* der Ökosysteme unvermeidbar sein.
  
  La guerra ha portato con sé solo fame e *distruzione* ovunque si volgesse lo sguardo.
  Der Krieg brachte nur Hunger und *Zerstörung* überall mit sich, wohin man auch blickte.
