Rang: 3738
Wort: specializzare
Wortart: v
Wort mit Artikel: specializzare
Femininum / Plural: ''
IPA: ''
Definition: spezialisieren, spezialisieren auf
Register: ''
Beispielsätze: |-
  Mi sono *specializzato* in medicina interna dopo la laurea.
  Ich habe mich auf *Innere Medizin* spezialisiert.
  
  Vorresti *specializzarti* nell’insegnamento delle lingue straniere?
  Möchtest du dich auf *Fremdsprachenunterricht* spezialisieren?
  
  Non basta *specializzarsi* senza considerare le possibilità lavorative.
  Es reicht nicht, sich zu *spezialisieren*, ohne die Berufschancen zu bedenken.
  
  Se ti *specializzi* nell’arte moderna, troverai più opportunità.
  Wenn du dich auf *moderne Kunst* spezialisierst, findest du mehr Möglichkeiten.
  
  Spero di *specializzarmi* in neurochirurgia tra qualche anno.
  Ich hoffe, mich in *Neurochirurgie* zu spezialisieren, in ein paar Jahren.
