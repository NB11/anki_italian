  Ich bin stundenlang durch die *Zone* gelaufen, ohne jemandem zu begegnen.
  
  La *zona* che ti ho indicato sulla mappa non è sicura dopo il tramonto.
  Die *Zone*, die ich dir auf der Karte gezeigt habe, ist nach Einbruch der Dunkelheit nicht sicher.
  
  È meglio mantenere una certa distanza da questa *zona* se non vuoi avere problemi.
  Es ist besser, einen gewissen Abstand von dieser *Zone* zu halten, wenn man keine Probleme haben möchte.
