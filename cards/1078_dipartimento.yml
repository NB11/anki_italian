Rang: 1078
Wort: dipartimento
Wortart: n.m
Wort mit Artikel: il dipartimento
Femininum / Plural: dipartimenti
IPA: ''
Definition: die Abteilung, -en, der Fachbereich, -e
Register: ''
Beispielsätze: |-
  Mi sono iscritto al *dipartimento* di fisica perché mi affascina la sua reputazione.
  Ich habe mich für das *Fachbereich* Physik eingeschrieben, weil mich sein Ruf fasziniert.
  
  Appena ho saputo della promozione di Marco, ho subito avvertito il *dipartimento* delle risorse umane per congratularmi.
  Sobald ich von Marcos Beförderung erfahren habe, habe ich umgehend die *Personalabteilung* informiert, um mich zu gratulieren.
  
  Se avessi studiato con più impegno, forse oggi sarei direttore di un *dipartimento* così prestigioso.
  Hätte ich mich mehr angestrengt, wäre ich vielleicht heute Direktor einer so angesehenen *Abteilung*.
  
  Secondo la legge, ogni *dipartimento* deve rispettare le norme di sicurezza sul lavoro secondo le quali ho lavorato per anni.
  Laut Gesetz muss jeder *Fachbereich* die Arbeitsschutzbestimmungen einhalten, nach denen ich jahrelang gearbeitet habe.
  
  Il professor Rossi, che ha diretto per decenni questo *dipartimento*, è stato recentemente premiato per la sua carriera eccezionale.
  Professor Rossi, der diesen *Fachbereich* jahrzehntelang geleitet hat, wurde kürzlich für seine außergewöhnliche Karriere ausgezeichnet.
