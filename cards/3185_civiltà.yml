Rang: 3185
Wort: civiltà
Wortart: n.f
Wort mit Artikel: la civiltà
Femininum / Plural: civiltà
IPA: ''
Definition: die Kultur, die Zivilisation, die Gesellschaft
Register: ''
Beispielsätze: |-
  La *civiltà* romana ha lasciato molte testimonianze storiche in Europa.
  Die *römische Kultur* hat viele historische Zeugnisse in Europa hinterlassen.
  
  In questa città la *civiltà* sembra essere scomparsa per sempre.
  In dieser Stadt scheint die *Zivilisation* für immer verschwunden zu sein.
  
  Bisogna preservare la *civiltà* e il rispetto reciproco, anche in tempi difficili.
  Man muss die *Gesellschaft* und den gegenseitigen Respekt bewahren, auch in schwierigen Zeiten.
  
  Dopo la guerra, la *civiltà* dovette essere ricostruita da zero.
  Nach dem Krieg musste die *Zivilisation* von Grund auf neu aufgebaut werden.
  
  Secondo alcuni filosofi, la *civiltà* moderna sta perdendo il suo senso di comunità.
  Laut einigen Philosophen verliert die *moderne Gesellschaft* ihr Gemeinschaftsgefühl.
