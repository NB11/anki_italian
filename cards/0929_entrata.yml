Rang: 929
Wort: entrata
Wortart: n.f
Wort mit Artikel: l'entrata
Femininum / Plural: entrate
IPA: ''
Definition: der Eingang, -¨e
Register: ''
Beispielsätze: |-
  L'*entrata* principale dell'edificio è sorvegliata da una guardia armata.
  Der *Eingang* des Gebäudes wird von einem bewaffneten Wächter bewacht.
  
  Dopo aver sentito un grido orribile, ho controllato se l'*entrata* posteriore fosse chiusa.
  Nachdem ich einen *schrecklichen* Schrei gehört hatte, überprüfte ich, ob der hintere Eingang geschlossen war.
  
  La coppia ha prenotato una stanza che dà direttamente sull'*entrata* dell'hotel, molto rumorosa.
  Das *Paar* hat ein Zimmer gebucht, das direkt am Eingang des Hotels liegt und sehr laut ist.
  
  Nonostante l'*entrata* fosse bloccata dal cadavere, l'eroe riuscì a fuggire attraverso un passaggio segreto.
  Obwohl der *Eingang* von der Leiche blockiert war, konnte der Held durch einen geheimen Durchgang entkommen.
  
  Se avessimo avuto più tempo, avremmo avvertito qualcuno dell'*entrata* posteriore prima della riunione.
  Hätten wir mehr Zeit gehabt, hätten wir jemanden vom hinteren *Eingang* vor der Besprechung gewarnt.
