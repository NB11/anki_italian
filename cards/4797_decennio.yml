Rang: 4797
Wort: decennio
Wortart: n.m
Wort mit Artikel: il decennio
Femininum / Plural: decenni
IPA: ''
Definition: das Jahrzehnt, -en
Register: ''
Beispielsätze: |-
  Negli ultimi *decenni* la tecnologia ha fatto passi da gigante.
  In den letzten *Jahrzehnten* hat die Technologie riesige Fortschritte gemacht.
  
  Non mi stupisce che dopo un *decennio* di lavoro qui tu sia stanco.
  Es überrascht mich nicht, dass du nach einem *Jahrzehnt* Arbeit hier müde bist.
  
  Spero che nei prossimi *decenni* il clima globale migliori.
  Ich hoffe, dass sich das globale Klima in den nächsten *Jahrzehnten* verbessert.
  
  Questo *decennio* è stato caratterizzato da grandi cambiamenti sociali.
  Dieses *Jahrzehnt* war von großen gesellschaftlichen Veränderungen geprägt.
  
  Se avessimo previsto le crisi finanziarie di questo *decennio*, avremmo agito diversamente.
  Hätten wir die Finanzkrisen dieses *Jahrzehnts* vorhergesehen, hätten wir anders gehandelt.
