Rang: 3917
Wort: libretto
Wortart: n.m
Wort mit Artikel: il libretto
Femininum / Plural: libretti
IPA: ''
Definition: das Libretto, -ti
Register: ''
Beispielsätze: |-
  Ho comprato il *libretto* dell’opera per studiarlo con calma a casa.
  Ich habe das *Libretto* der Oper gekauft, um es in Ruhe zu Hause zu studieren.
  
  Nel *libretto* sono scritti i nomi di tutti i personaggi principali della commedia.
  In dem *Libretto* sind die Namen aller Hauptfiguren des Theaterstücks geschrieben.
  
  Se non hai capito bene la trama, consulta il *libretto* che trovi sul tavolo.
  Wenn du die Handlung nicht verstanden hast, schau in das *Libretto*, das auf dem Tisch liegt.
  
  Il regista ha modificato alcune parti del *libretto* per adattarle alla nuova scenografia.
  Der Regisseur hat einige Teile des *Librettos* geändert, um sie an die neue Bühnengestaltung anzupassen.
  
  Anche se non hai una grande conoscenza musicale, leggere il *libretto* ti aiuterà a seguire lo spettacolo.
  Auch wenn du keine großen musikalischen Kenntnisse hast, wird dich das Lesen des *Librettos* durch die Aufführung begleiten lassen.
