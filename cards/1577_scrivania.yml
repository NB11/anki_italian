Rang: 1577
Wort: scrivania
Wortart: n.f
Wort mit Artikel: la scrivania
Femininum / Plural: scrivanie
IPA: ''
Definition: der Schreibtisch, -e
Register: ''
Beispielsätze: |-
  La *scrivania* di mio nonno è ancora piena di libri vecchi e fotografie ingiallite.
  Der *Schreibtisch* meines Großvaters ist immer noch voller alter Bücher und vergilbter Fotos.
  
  Dopo aver finito il suo romanzo, l’autore ha firmato una *scrivania* per ogni libraio che lo ha sostenuto.
  Nach Fertigstellung seines Romans hat der Autor jedem Buchhändler, der ihn unterstützt hat, einen *Schreibtisch* signiert.
  
  Non appena avrò trovato un lavoro stabile, comprerò una *scrivania* ergonomica per evitare dolori alla schiena.
  Sobald ich einen festen Job gefunden habe, kaufe ich mir einen ergonomischen *Schreibtisch*, um Rückenschmerzen zu vermeiden.
  
  Nel laboratorio scientifico ogni *scrivania* è dotata di un microscopio per studiare meglio i campioni.
  Im wissenschaftlichen Labor ist jeder *Schreibtisch* mit einem Mikroskop ausgestattet, um die Proben besser zu untersuchen.
  
  La *scrivania* del direttore era talmente ingombra di documenti da sembrare un deserto di carta, ma lui trovava tutto grazie alla sua ottima organizzazione.
  Der *Schreibtisch* des Direktors war so überhäuft mit Dokumenten, dass er wie eine Papierwüste wirkte, doch er fand alles dank seiner hervorragenden Organisation.
