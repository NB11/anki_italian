Rang: 2319
Wort: drogare
Wortart: v
Wort mit Artikel: drogare
Femininum / Plural: ''
IPA: ''
Definition: "*drogen*, *rauschgift nehmen*"
Register: ''
Beispielsätze: |-
  Non dovresti *drogare* tuo figlio con così tante medicine.
  Du solltest deinen Sohn nicht mit so vielen Medikamenten *betäuben*.
  
  Se lo scoprono, rischiano di essere arrestati per *drogare* gli animali da laboratorio.
  Wenn man sie erwischt, riskieren sie, wegen *Drogenmissbrauchs* an Versuchstieren verhaftet zu werden.
  
  Lui ha giurato che non avrebbe mai più *drogato* le sue performance sportive.
  Er hat geschworen, dass er seine sportlichen Leistungen nie wieder *dopen* würde.
  
  Non è chiaro chi abbia deciso di *drogare* l’acqua durante la festa.
  Es ist unklar, wer beschlossen hat, das Wasser während der Feier *mit Drogen zu versetzen*.
  
  Se *drogassi* troppo spesso, perderesti ogni capacità critica.
  Wenn du zu oft *Drogen nimmst*, würdest du jede kritische Fähigkeit verlieren.
