Rang: 3849
Wort: ossessione
Wortart: n.f
Wort mit Artikel: la ossessione
Femininum / Plural: ossessioni
IPA: ''
Definition: die Besessenheit, der Zwang, der Fixstern
Register: ''
Beispielsätze: |-
  La sua *ossessione* per i libri rari lo ha portato a spendere tutto il suo stipendio.
  Seine *Besessenheit* für seltene Bücher hat ihn dazu gebracht, sein ganzes Gehalt auszugeben.
  
  Credi che abbia un'*ossessione* pericolosa per le auto d'epoca?
  Glaubst du, er hat eine *Besessenheit* für Oldtimer, die gefährlich ist?
  
  Nonostante l'*ossessione* per l'ordine, non è mai riuscito a tenere la sua stanza pulita.
  Trotz seiner *Besessenheit* für Ordnung schaffte er es nie, sein Zimmer sauber zu halten.
  
  L'*ossessione* che nutriva per quella canzone gli ricordava i giorni della gioventù.
  Die *Besessenheit*, die er für diesen Song hegte, erinnerte ihn an seine Jugendtage.
  
  Se hai un'*ossessione* per la perfezione, non finirai mai il lavoro.
  Wenn du eine *Besessenheit* für Perfektion hast, wirst du die Arbeit niemals beenden.
