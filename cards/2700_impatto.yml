Rang: 2700
Wort: impatto
Wortart: n.m
Wort mit Artikel: l'impatto
Femininum / Plural: impatti
IPA: ''
Definition: die Auswirkung, -en, die Wirkung, -en, die Folge, -n
Register: ''
Beispielsätze: |-
  L'*impatto* ambientale di questa fabbrica è preoccupante.
  Die *Auswirkung* der Fabrik auf die Umwelt ist besorgniserregend.
  
  Non ho ancora valutato l'*impatto* di questa decisione sulla mia carriera.
  Ich habe den *Einfluss* dieser Entscheidung auf meine Karriere noch nicht bewertet.
  
  Con quale *impatto* economico dovremo subire questa legge?
  Welche *wirtschaftlichen Folgen* werden wir durch dieses Gesetz erleiden müssen?
  
  L'*impatto* psicologico sul vincitore della lotteria era visibile.
  Die *psychische Auswirkung* auf den Sieger der Lotterie war sichtbar.
  
  Dopo l'*impatto* del meteorite si formò un cratere enorme.
  Nach dem *Aufprall* des Meteoriten entstand ein riesiger Krater.
