Rang: 3246
Wort: tristezza
Wortart: n.f
Wort mit Artikel: la tristezza
Femininum / Plural: tristezze
IPA: ''
Definition: die Traurigkeit, die Trauer
Register: ''
Beispielsätze: |-
  Non riesco a spiegare la *tristezza* che provo in questo momento.
  Ich kann die *Traurigkeit*, die ich gerade empfinde, nicht erklären.
  
  La *tristezza* negli occhi del bambino mi ha colpito profondamente.
  Die *Trauer* in den Augen des Kindes hat mich zutiefst getroffen.
  
  Sebbene abbia perso il lavoro, cerco di non lasciarmi sopraffare dalla *tristezza*.
  Auch wenn ich den Job verloren habe, versuche ich, mich nicht von der *Traurigkeit* überwältigen zu lassen.
  
  La sua *tristezza* era così profonda che nessuno osava disturbarlo.
  Seine *Trauer* war so tief, dass sich niemand traute, ihn zu stören.
  
  Nonostante la *tristezza* del momento, riuscì a sorridere per non amareggiarti.
  Trotz der *Traurigkeit* der Situation gelang es ihm, zu lächeln, um dich nicht zu verärgern.
