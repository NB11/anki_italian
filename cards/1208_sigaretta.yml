Rang: 1208
Wort: sigaretta
Wortart: n.f
Wort mit Artikel: la sigaretta
Femininum / Plural: sigarette
IPA: ''
Definition: die Zigarette, -n
Register: ''
Beispielsätze: |-
  Mio nonno vuole smettere di fumare, quindi ha deciso di rinunciare alle *sigarette* stasera per praticità.
  Mein Opa will mit dem Rauchen aufhören und hat sich dafür entschieden, dieses Mal *aus Prinzip* auf die Zigaretten zu verzichten.
  
  La *sigaretta* che ho trovato in tasca è già spenta, ma forse puoi accenderla con l’orologio se lo smonti.
  Die *Zigarette*, die ich in der Tasche gefunden habe, ist schon aus, aber vielleicht kannst du sie mit der Uhr anmachen, wenn du sie auseinanderbaust.
  
  Se vuoi concedere un favore a un ospite, offre almeno un caffè o una *sigaretta*, non solo un ospite nudo in salotto!
  Wenn du einem Gast einen Gefallen tun willst, biete ihm wenigstens einen Kaffee oder eine *Zigarette*, nicht nur einen nackten Gast im Wohnzimmer!
  
  Nonostante il giudice abbia detto che fumare in quest’area è illegale, alcuni piloti continuano a tirare fuori le *sigarette* dal taschino.
  Auch wenn der Richter gesagt hat, dass Rauchen in diesem *Bereich* illegal ist, holen einige Piloten weiter Zigaretten aus der Brusttasche.
  
  Dopo aver passato l’estate al nord, dove il freddo riduce ogni movimento, era assurdo che qualcuno osasse accendersi una *sigaretta* in pubblico.
  Nach dem Sommer im *Norden*, wo die Kälte jede Bewegung hemmt, war es absurd, dass jemand es wagte, in der Öffentlichkeit eine Zigarette anzuzünden.
