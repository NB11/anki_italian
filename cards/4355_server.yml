Rang: 4355
Wort: server
Wortart: n.m
Wort mit Artikel: il server
Femininum / Plural: server
IPA: ''
Definition: der Server, -
Register: ''
Beispielsätze: |-
  Il *server* principale della nostra azienda è stato aggiornato ieri sera.
  Der *Hauptserver* unseres Unternehmens wurde gestern Abend aktualisiert.
  
  Durante il seminario abbiamo parlato dell'importanza di proteggere i *server* da attacchi informatici.
  Während des Seminars sprachen wir über die Wichtigkeit, die *Server* vor Cyberangriffen zu schützen.
  
  Non riesco ancora a capire perché il *server* abbia smesso di rispondere proprio mentre caricavo il file.
  Ich verstehe immer noch nicht, warum der *Server* genau in dem Moment nicht mehr reagiert hat, als ich die Datei hochgeladen habe.
  
  Se il *server* dovesse andare offline di nuovo, dovremmo chiamare l'amministratore di sistema immediatamente.
  Falls der *Server* erneut offline gehen sollte, müssten wir sofort den Systemadministrator anrufen.
  
  I tecnici stanno controllando i *server* per verificare se il problema è hardware o software.
  Die Techniker überprüfen gerade die *Server*, um festzustellen, ob das Problem hardware- oder softwarebedingt ist.
