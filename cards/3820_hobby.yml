Rang: 3820
Wort: hobby
Wortart: n.m
Wort mit Artikel: il hobby
Femininum / Plural: hobby
IPA: ''
Definition: das Hobby, -s
Register: ''
Beispielsätze: |-
  Il mio *hobby* preferito è suonare la chitarra il pomeriggio.
  Mein bevorzugtes *Hobby* ist, nachmittags Gitarre zu spielen.
  
  Da quando ho scoperto questo *hobby*, la mia vita sociale è migliorata molto.
  Seitdem ich dieses *Hobby* entdeckt habe, hat sich mein soziales Leben stark verbessert.
  
  Nonostante il *hobby* richieda molto tempo, riesco a gestirlo bene insieme agli studi.
  Obwohl das *Hobby* viel Zeit erfordert, schaffe ich es, es neben dem Studium gut unterzubringen.
  
  Se avessi più tempo libero, vorrei dedicarmi a un altro *hobby*, magari il disegno.
  Wenn ich mehr Freizeit hätte, würde ich mich einem anderen *Hobby* widmen, vielleicht dem Zeichnen.
  
  È proprio vero che il *hobby* più bello è quello che si condivide con gli amici di infanzia?
  Ist es wirklich wahr, dass das schönste *Hobby* dasjenige ist, das man mit seinen Freunden aus der Kindheit teilt?
