Rang: 2284
Wort: folla
Wortart: n.f
Wort mit Artikel: la folla
Femininum / Plural: folle
IPA: ''
Definition: die Menschenmenge, -n
Register: ''
Beispielsätze: |-
  La *folla* era così numerosa che non riuscivo a muovermi.
  Die *Menschenmenge* war so groß, dass ich mich nicht bewegen konnte.
  
  Dopo il concerto, la *folla* è uscita lentamente dal palco.
  Nach dem Konzert verließ die *Menschenmenge* langsam die Bühne.
  
  Nonostante la *folla*, siamo riusciti a trovare un tavolo libero al ristorante.
  Trotz der *Menschenmenge* gelang es uns, einen freien Tisch im Restaurant zu finden.
  
  La *folla* urlava quando il calciatore ha segnato il gol della vittoria.
  Die *Menschenmenge* jubelte, als der Fußballspieler das Siegtor schoss.
  
  Ho visto persone che cercavano di evitare la *folla* nelle strade affollate.
  Ich sah Leute, die versuchten, der *Menschenmenge* auf den überfüllten Straßen auszuweichen.
