Rang: 1490
Wort: affarsi
Wortart: vr
Wort mit Artikel: affarsi
Femininum / Plural: ''
IPA: ''
Definition: sich vertraut machen, sich einleben
Register: ''
Beispielsätze: |-
  Dopo il trasloco, mi ci *affascio* lentamente alla nuova città.
  Nach dem Umzug gewöhne ich mich langsam an die neue Stadt.
  
  Non *affarsi* alla cultura italiana può rendere difficile la vita quotidiana.
  Sich nicht an die italienische Kultur zu *gewöhnen* kann das Alltagsleben erschweren.
  
  Anche se è difficile, *affarsi* alle nuove tecnologie è necessario al giorno d’oggi.
  Auch wenn es schwerfällt, sich an neue Technologien zu *gewöhnen* ist heute notwendig.
  
  Lui cerca di *affarsi* alle regole del parco largo vicino a casa sua.
  Er versucht, sich an die Regeln des *weiten* Parks in der Nähe seines Hauses zu gewöhnen.
  
  Se non ti *affassi* in fretta, perderai l’opportunità di conoscere meglio gli altri.
  Wenn du dich nicht schnell *gewöhnen* wirst, verpasst du die Chance, die anderen besser kennenzulernen.
