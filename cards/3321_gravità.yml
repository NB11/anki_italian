Rang: 3321
Wort: gravità
Wortart: n.f
Wort mit Artikel: la gravità
Femininum / Plural: gravità
IPA: ''
Definition: die Schwerkraft, die Gravitation
Register: ''
Beispielsätze: |-
  La *gravità* sulla Luna è molto inferiore rispetto a quella sulla Terra.
  Die *Schwerkraft* auf dem Mond ist viel geringer als die auf der Erde.
  
  Secondo Einstein, la *gravità* non è una forza ma una curvatura dello spazio-tempo.
  Laut Einstein ist die *Gravitation* keine Kraft, sondern eine Krümmung der Raumzeit.
  
  Se non fosse per la *gravità*, gli oggetti fluttuerebbero costantemente nello spazio.
  Ohne die *Schwerkraft* würden Gegenstände ständig im Weltraum schweben.
  
  Gli scienziati stanno studiando come la *gravità* influenzi la formazione delle galassie.
  Wissenschaftler untersuchen, wie die *Gravitation* die Entstehung von Galaxien beeinflusst.
  
  La scoperta della *gravità* come forza universale rivoluzionò la fisica moderna.
  Die Entdeckung der *Gravitation* als universale Kraft revolutionierte die moderne Physik.
