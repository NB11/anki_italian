Rang: 721
Wort: silenzio
Wortart: n.m
Wort mit Artikel: il silenzio
Femininum / Plural: i silenzi
IPA: ''
Definition: die Stille, das Schweigen
Register: ''
Beispielsätze: |-
  Non riesco a concentrarmi con tutto questo *silenzio* nella stanza.
  Ich kann mich nicht konzentrieren mit all der *Stille* im Raum.
  
  Ho notato un improvviso *silenzio* quando la squadra avversaria ha segnato.
  Ich bemerkte ein plötzliches *Schweigen*, als die gegnerische Mannschaft traf.
  
  Se avessi un momento di *silenzio*, potrei riflettere meglio sulla mia decisione.
  Wenn ich einen Moment der *Stille* hätte, könnte ich besser über meine Entscheidung nachdenken.
  
  Il *silenzio* della notte era rotto solo dal canto degli uccelli.
  Die *Stille* der Nacht wurde nur vom Gesang der Vögel unterbrochen.
  
  Non sopporto il *silenzio* forzato durante le spiegazioni del professore.
  Ich ertrage das erzwungene *Schweigen* während der Erklärungen des Professors nicht.
