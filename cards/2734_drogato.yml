Rang: 2734
Wort: drogato
Wortart: n.m
Wort mit Artikel: il drogato
Femininum / Plural: drogati
IPA: ''
Definition: der Drogenabhängige, -n
Register: ''
Beispielsätze: |-
  Quel *drogato* è stato arrestato dalla polizia durante una rissa nel parco.
  Dieser *Drogenabhängige* wurde von der Polizei bei einer Schlägerei im Park festgenommen.
  
  Non so come aiutare quel ragazzo che si è trasformato in un *drogato* dopo la morte della madre.
  Ich weiß nicht, wie ich diesem Jungen helfen soll, der nach dem Tod seiner Mutter zum *Drogenabhängigen* geworden ist.
  
  Se avessi saputo che era un *drogato*, non lo avrei mai invitato a casa mia.
  Wenn ich gewusst hätte, dass er ein *Drogenabhängiger* ist, hätte ich ihn nie zu mir nach Hause eingeladen.
  
  I medici dicono che curare un *drogato* non è semplice e richiede molta pazienza.
  Ärzte sagen, dass die Behandlung eines *Drogenabhängigen* nicht einfach ist und viel Geduld erfordert.
  
  Nonostante fosse un *drogato*, era riuscito a mantenere un lavoro stabile per anni.
  Trotz seiner Drogenabhängigkeit hatte er jahrelang einen stabilen Job behalten.
