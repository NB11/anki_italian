Rang: 4102
Wort: sufficienza
Wortart: n.f
Wort mit Artikel: la sufficienza
Femininum / Plural: le sufficienze
IPA: ''
Definition: die Genüge, die Suffizienz
Register: ''
Beispielsätze: |-
  Non ho raggiunto *la sufficienza* in matematica e dovrò ripetere l'esame.
  Ich habe die *Suffizienz* in Mathe nicht erreicht und muss die Prüfung wiederholen.
  
  L'insegnante ha sottolineato che *la sufficienza* è un voto dignitoso, non un fallimento.
  Die Lehrerin betonte, dass die *Genüge* eine angemessene Note ist, kein Scheitern.
  
  Per ottenere il diploma, devi avere *una sufficienza* in tutte le materie principali.
  Um das Diplom zu bekommen, musst du in allen Hauptfächern die *Suffizienz* erreichen.
  
  Credevo di aver studiato abbastanza, ma alla fine non ho raggiunto *la sufficienza* in storia.
  Ich dachte, ich hätte genug gelernt, aber am Ende hatte ich die *Suffizienz* in Geschichte nicht erreicht.
  
  Dicono che *la sufficienza* sia tutto ciò che serve per non essere bocciati, ma io aspiro a di più.
  Sie sagen, dass die *Genüge* alles ist, was man braucht, um nicht durchzufallen, aber ich strebe nach mehr.
