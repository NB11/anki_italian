Rang: 288
Wort: permettere
Wortart: vt
Wort mit Artikel: permettere
Femininum / Plural: ''
IPA: ''
Definition: erlauben, zulassen
Register: ''
Beispielsätze: |-
  La legge *permette* di viaggiare in tutta Europa senza visto.
  Das Gesetz *erlaubt* es, in ganz Europa ohne Visum zu reisen.
  
  Mi *permetteresti* di uscire stasera?
  *Würdest du mir erlauben*, heute Abend auszugehen?
  
  Il capo non *ha permesso* di prendere ferie in agosto.
  Der Chef *hat nicht erlaubt*, im August Urlaub zu nehmen.
  
  Pensavo che tu *permettessi* questa decisione.
  Ich dachte, du *hättest* diese Entscheidung *erlaubt*.
  
  Spero che la scuola *permetta* di usare il telefono in classe.
  Ich hoffe, dass die Schule *erlaubt*, in der Klasse das Handy zu benutzen.
