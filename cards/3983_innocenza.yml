Rang: 3983
Wort: innocenza
Wortart: n.f
Wort mit Artikel: l'innocenza
Femininum / Plural: innocenze
IPA: ''
Definition: die Unschuld
Register: ''
Beispielsätze: |-
  L'*innocenza* di quel bambino commuove tutti.
  Die *Unschuld* des Kindes rührt alle zu Tränen.
  
  Nonostante le accuse, la sua *innocenza* fu dimostrata in tribunale.
  Trotz der Anschuldigungen wurde seine *Unschuld* vor Gericht bewiesen.
  
  Pensi davvero che la *innocenza* possa sopravvivere in un mondo così corrotto?
  Glaubst du wirklich, dass die *Unschuld* in einer so korrupten Welt überleben kann?
  
  La *innocenza* perduta non si recupera mai del tutto.
  Die verlorene *Unschuld* holt man nie ganz zurück.
  
  Se avessi saputo della sua *innocenza*, non avrei dubitato nemmeno per un secondo.
  Hätte ich von seiner *Unschuld* gewusst, hätte ich nicht einen Moment gezweifelt.
