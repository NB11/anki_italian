Rang: 2943
Wort: franco
Wortart: adj
Wort mit Artikel: franco
Femininum / Plural: ''
IPA: ''
Definition: offen, freimütig, direkt
Register: ''
Beispielsätze: |-
  È *franco* nel dire la sua opinione, anche quando non piace agli altri.
  Er ist *offen* in seiner Meinung, auch wenn sie anderen nicht gefällt.
  
  Mi sembra *franca* la sua risposta, non ha nascosto nulla.
  Seine Antwort wirkt auf mich *freimütig*, er hat nichts verheimlicht.
  
  Sii *franco* con me: ti è piaciuto il regalo o no?
  Sei *ehrlich* zu mir: Hat dir das Geschenk gefallen oder nicht?
  
  Nonostante la situazione, ha mantenuto un tono *franco* e diretto.
  Trotz der Situation blieb er in einem *offenen* und direkten Ton.
  
  Se fossi *franco* con i tuoi amici, loro apprezzerebbero la tua sincerità.
  Wärst du *offen* zu deinen Freunden, würden sie deine Ehrlichkeit schätzen.
