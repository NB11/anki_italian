Rang: 2597
Wort: gang
Wortart: n.m
Wort mit Artikel: il gang
Femininum / Plural: i *ganci*
IPA: ''
Definition: der *Gang*, -ä-e
Register: ''
Beispielsätze: |-
  Ho trovato un *gancio* nel muro per appendere la giacca.
  Ich habe einen *Haken* an der Wand gefunden, um die Jacke aufzuhängen.
  
  Il *gancio* della cintura si è rotto proprio mentre uscivo.
  Der *Gurtverschluss* ist genau in dem Moment kaputtgegangen, als ich gehen wollte.
  
  Mia nonna usa il *gancio* della porta per appendere le chiavi.
  Meine Oma benutzt den *Haken* an der Tür, um die Schlüssel aufzuhängen.
  
  Bisogna controllare che ogni *gancio* della gru sia ben saldo.
  Man muss sicherstellen, dass jeder *Haken* des Krans fest sitzt.
  
  Se il *gancio* non regge, il quadro cadrà.
  Wenn der *Haken* nicht hält, wird das Bild herunterfallen.
