Rang: 2090
Wort: conquistare
Wortart: vt
Wort mit Artikel: conquistare
Femininum / Plural: ''
IPA: ''
Definition: erobern, erobern
Register: ''
Beispielsätze: |-
  I romani hanno *conquistato* gran parte dell'Europa antica.
  Die Römer haben einen großen Teil des antiken *Europa* erobert.
  
  Non credo che vincerà, ma potrebbe *conquistare* il nostro cuore con la sua musica.
  Ich glaube nicht, dass er gewinnt, aber er könnte mit seiner Musik unser *Herz* erobern.
  
  Dopo anni di guerra, il generale sperava di *conquistare* la pace per il suo popolo.
  Nach Jahren des Krieges hoffte der General, *Frieden* für sein Volk zu erobern.
  
  Se vuoi *conquistare* la reputazione di esperto, devi pubblicare libri autorevoli.
  Wenn du den *Ruf* eines Experten erobern willst, musst du maßgebliche Bücher veröffentlichen.
  
  Tutti credevano che il nuovo prodotto avrebbe *conquistato* il mercato mondiale, ma è fallito.
  Alle dachten, das neue Produkt würde den *weltweiten Markt* erobern, aber es scheiterte.
