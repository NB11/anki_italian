Rang: 2345
Wort: testimonianza
Wortart: n.f
Wort mit Artikel: la testimonianza
Femininum / Plural: testimonianze
IPA: ''
Definition: die Aussage, -n; der Beweis, -e
Register: ''
Beispielsätze: |-
  La *testimonianza* dell’imputato è stata fondamentale per la sentenza del giudice.
  Die *Aussage* des Angeklagten war entscheidend für das Urteil des Richters.
  
  Dopo aver riletto la sua *testimonianza*, l’avvocato ha deciso di chiamare un altro testimone.
  Nachdem er seine *Aussage* noch einmal überdacht hatte, beschloss der Anwalt, einen weiteren Zeugen zu rufen.
  
  La polizia ha bisogno di almeno due *testimonianze* coerenti per aprire un’indagine.
  Die Polizei benötigt mindestens zwei übereinstimmende *Aussagen*, um eine Ermittlung zu eröffnen.
  
  Secondo la *testimonianza* del suo vicino, non è mai rientrato a casa quella sera.
  Laut der *Aussage* seines Nachbarn ist er an diesem Abend nie nach Hause zurückgekehrt.
  
  Se non avessimo avuto la *testimonianza* di Marco, tutto sarebbe rimasto oscuro.
  Hätten wir Marco *Aussage* nicht gehabt, wäre alles im Dunkeln geblieben.
