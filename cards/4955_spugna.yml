Rang: 4955
Wort: spugna
Wortart: n.f
Wort mit Artikel: la spugna
Femininum / Plural: spugne
IPA: ''
Definition: der Schwamm, -e
Register: ''
Beispielsätze: |-
  Dopo aver lavato la macchina, ho asciugato le macchie con *una spugna* morbida.
  Nach dem Waschen des Autos habe ich die Flecken mit *einem Schwamm* abgetupft.
  
  Non mangiare quella *spugna*: è solo per lavare i piatti!
  Iss *den Schwamm* nicht! Der ist nur zum Abwasch.
  
  Ho comprato *spugne* nuove perché le vecchie erano troppo sporche.
  Ich habe *Schwämme* gekauft, weil die alten zu dreckig waren.
  
  Usa *una spugna* per distribuire uniformemente il detergente sulla superficie.
  Verwende *einen Schwamm*, um das Reinigungsmittel gleichmäßig auf der Fläche zu verteilen.
  
  Anche se la *spugna* era umida, la metto comunque nel secchio della lavaggio per non perderla.
  Auch wenn *der Schwamm* nass ist, lege ich ihn trotzdem in den Wäscheeimer, damit ich ihn nicht verliere.
