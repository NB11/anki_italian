Rang: 796
Wort: consegnare
Wortart: vt
Wort mit Artikel: consegnare
Femininum / Plural: ''
IPA: ''
Definition: übergeben, aushändigen
Register: ''
Beispielsätze: |-
  Devi *consegnare* il pacco alla signora Rossi entro domani.
  Du musst das Paket der Frau Rossi bis morgen *abgeben*.
  
  Il postino ha *consegnato* la lettera che aspetto da settimane.
  Der Briefträger hat den Brief, den ich seit Wochen erwarte, *zugestellt*.
  
  Se non *consegnerai* il modulo in tempo, perderai la possibilità di iscriverti.
  Falls du das Formular nicht rechtzeitig *abgibst*, verlierst du die Gelegenheit, dich anzumelden.
  
  Il corriere mi ha chiamato per dirmi che ha *consegnato* il pacco al vicino di casa per errore.
  Der Kurier hat mich angerufen, um zu sagen, dass er das Paket aus Versehen beim Nachbarn *abgegeben* hat.
  
  Nonostante le difficoltà, hanno *consegnato* i documenti in tempo utile per la procedura.
  Trotz der Schwierigkeiten haben sie die Unterlagen rechtzeitig für das Verfahren *abgeliefert*.
