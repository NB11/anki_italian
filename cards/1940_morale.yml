Rang: 1940
Wort: morale
Wortart: adj
Wort mit Artikel: morale
Femininum / Plural: ''
IPA: ''
Definition: moralisch, sittlich
Register: ''
Beispielsätze: |-
  È *morale* aiutare gli altri senza aspettarsi nulla in cambio.
  Es ist *moralisch*, anderen zu helfen, ohne etwas dafür zu erwarten.
  
  Non pensavo fosse così *morale* prendere quella decisione.
  Ich hätte nicht gedacht, dass es so *moralisch* ist, diese Entscheidung zu treffen.
  
  La società deve essere più *morale* nel trattare i più deboli.
  Die Gesellschaft muss *moralischer* mit Schwächeren umgehen.
  
  Credi che sia *morale* mentire per salvare un amico?
  Glaubst du, es ist *moralisch*, für einen Freund zu lügen?
  
  Il loro comportamento *morale* ha ispirato molti nella comunità.
  Ihr *moralisches* Verhalten hat viele in der Gemeinschaft inspiriert.
