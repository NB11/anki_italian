Rang: 1067
Wort: trattenere
Wortart: vt
Wort mit Artikel: trattenere
Femininum / Plural: ''
IPA: ''
Definition: zurückhalten, unterdrücken, aufhalten
Register: ''
Beispielsätze: |-
  Il poliziotto ha *trattenuto* il sospettato per interrogarlo.
  Der Polizist hat den Verdächtigen *festgehalten*, um ihn zu verhören.
  
  Non riesco a *trattenermi* dal ridere quando vedo quel video.
  Ich kann mich einfach nicht *zurückhalten*, wenn ich dieses Video sehe.
  
  Il medico ha consigliato di *trattenere* il respiro per alcuni secondi.
  Der Arzt hat empfohlen, für einige Sekunden den Atem *anzuhalten*.
  
  Se avessi più fiducia, non lasceresti che la paura *trattenga* i tuoi sogni.
  Wenn du mehr *Vertrauen* hättest, würde dich die Angst nicht von deinen Träumen abhalten.
  
  Il cane ha *trattenuto* l’osso tra le zampe mentre cercava un posto tranquillo.
  Der Hund hat den *Knochen* zwischen den Pfoten festgehalten, während er nach einem ruhigen Platz suchte.
Audio: ''
Notiz: ''
Dispersion: ''
