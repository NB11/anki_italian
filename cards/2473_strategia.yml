Beispielsätze: |-
  La *strategia* vincente è sempre quella di studiare con costanza.
  Die *Strategie* zum Erfolg ist immer, mit Beständigkeit zu lernen.
  
  Nonostante la *strategia* fosse perfetta, il progetto è fallito.
  Obwohl die *Strategia* perfekt war, ist das Projekt gescheitert.
  
  Quale *strategia* adotteresti se fossi al posto del direttore?
  Welche *Strategie* würdest du wählen, wenn du an der Stelle des Direktors wärst?
  
  La polizia ha elaborato una nuova *strategia* per combattere il crimine organizzato.
  Die Polizei hat eine neue *Strategie* ausgearbeitet, um die organisierte Kriminalität zu bekämpfen.
  
  La sua *strategia* di investimento si basa su un’analisi approfondita del mercato.
  Seine *Strategie* der Geldanlage basiert auf einer gründlichen Analyse des Marktes.
