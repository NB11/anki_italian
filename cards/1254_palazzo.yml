Rang: 1254
Wort: palazzo
Wortart: n.m
Wort mit Artikel: il palazzo
Femininum / Plural: palazzi
IPA: ''
Definition: der Palast, -Paläste
Register: ''
Beispielsätze: |-
  Questo *palazzo* del XV secolo è stato trasformato in un museo moderno.
  Dieser *Palast* aus dem 15. Jahrhundert wurde in ein modernes Museum umgewandelt.
  
  Nel *palazzo* di fronte ci abita un famoso scrittore.
  In dem *Palast* gegenüber wohnt ein berühmter Schriftsteller.
  
  Se avessi più soldi, comprerei un intero *palazzo* in centro!
  Wenn ich mehr Geld hätte, würde ich einen ganzen *Palast* in der Innenstadt kaufen!
  
  Il *palazzo* che abbiamo visitato ieri risale all’epoca dei Medici.
  Der *Palast*, den wir gestern besichtigt haben, stammt aus der Zeit der Medici.
  
  Chiunque volesse affittare un appartamento in questo *palazzo* dovrebbe pagare un affitto molto alto.
  Wer eine Wohnung in diesem *Palast* mieten möchte, müsste eine sehr hohe Miete zahlen.
