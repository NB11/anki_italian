Rang: 1936
Wort: delitto
Wortart: n.m
Wort mit Artikel: il delitto
Femininum / Plural: i delitti
IPA: ''
Definition: das Verbrechen, -
Register: ''
Beispielsätze: |-
  La polizia sta cercando di risolvere *delitto* accaduto ieri sera.
  Die Polizei versucht, das *Verbrechen* von gestern Abend zu lösen.
  
  Se avessi saputo tutto, avrei denunciato il *delitto* immediatamente.
  Wenn ich alles gewusst hätte, hätte ich das *Verbrechen* sofort angezeigt.
  
  Nonostante le apparenze, questo *delitto* non è stato premeditato.
  Trotz des *Scheins* war dieses Verbrechen nicht vorsätzlich geplant.
  
  Il giudice ha sottolineato che per ogni *delitto* deve esserci una pena giusta.
  Der Richter betonte, dass es für jedes *Verbrechen* eine gerechte Strafe geben muss.
  
  Chiunque commetta un *delitto* contro l’umanità sarà perseguito a livello internazionale.
  Wer ein *Verbrechen* gegen die Menschlichkeit begeht, wird international verfolgt.
