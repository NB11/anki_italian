Rang: 2806
Wort: pastore
Wortart: n.m
Wort mit Artikel: il pastore
Femininum / Plural: pastori
IPA: ''
Definition: der Hirte, -n
Register: ''
Beispielsätze: |-
  Il *pastore* guidava le sue pecore ai pascoli verdeggianti ogni mattina.
  Der *Hirte* trieb seine Schafe jeden Morgen zu den grünen Weiden.
  
  Credo che il *pastore* stia chiamando le sue pecore con una melodia che sembra triste.
  Ich glaube, dass der *Hirte* seine Schafe mit einer Melodie ruft, die traurig klingt.
  
  Se fossi un *pastore*, vivrei in una piccola casa vicino al gregge.
  Wenn ich ein *Hirte* wäre, würde ich in einem kleinen Haus nahe der Herde leben.
  
  Il *pastore* che ho visto ieri aveva una pecora nera, che non ho mai distinguere tra le altre.
  Der *Hirte*, den ich gestern gesehen habe, hatte ein schwarzes Schaf, das ich among den anderen nie unterscheiden konnte.
  
  Sebbene non sia più un *pastore*, ricordo ancora il suono del suo flauto che risuonava tra le colline.
  Obwohl ich kein *Hirte* mehr bin, erinnere ich mich noch an den Klang seiner Flöte, die zwischen den Hügeln widerhallte.
