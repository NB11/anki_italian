Rang: 914
Wort: levare
Wortart: v
Wort mit Artikel: levare
Femininum / Plural: ''
IPA: ''
Definition: entfernen, wegschaffen
Register: ''
Beispielsätze: |-
  Devi *levare* la pentola dal fuoco prima che bruci il sugo.
  Du musst den Topf *entfernen* vom Herd, bevor die Soße anbrennt.
  
  Se non avverti la polizia, non possiamo *levare* questo cadavere dal passaggio.
  Wenn du die Polizei nicht *benachrichtigst*, können wir die Leiche nicht aus dem Durchgang entfernen.
  
  L’eroe era pronto a *levare* il suo anello per aiutare la comunità, ma il professore lo fermò.
  Der Held war bereit, seinen Ring abzulegen *entfernen*, um der Gemeinschaft zu helfen, doch der Professor hielt ihn auf.
  
  Anche se la condizione dell’edificio era grave, gli operai riuscirono a *levare* tutti i detriti in tempo.
  Selbst unter den schweren Bedingungen des Gebäudes gelang es den Arbeitern, allen Schutt *zu entfernen*.
  
  Chi *leverebbe* mai un anello prezioso a una persona del genere? È una scelta che non rispetterei mai!
  Wer würde jemals einem solchen Menschen einen wertvollen Ring *wegnehmen*? Das ist eine Entscheidung, die ich niemals respektieren würde!
