Rang: 931
Wort: congratulazione
Wortart: n.f
Wort mit Artikel: la congratulazione
Femininum / Plural: congratulazioni
IPA: ''
Definition: die Glückwunsch, -¨e
Register: ''
Beispielsätze: |-
  Desidero esprimere le mie *congratulazioni* a te per il tuo magnifico lavoro al progetto.
  Ich möchte dir meine *Glückwünsche* für deine großartige Arbeit am Projekt aussprechen.
  
  Dopo aver appreso della tua promozione, abbiamo organizzato una riunione per farti le nostre *congratulazioni*.
  Sobald wir von deiner Beförderung erfahren haben, haben wir ein Treffen organisiert, um dir unsere *Glückwünsche* auszusprechen.
  
  Nonostante le condizioni avverse, il nostro *eroe* locale è riuscito a salvare il cane rimasto intrappolato sotto le macerie dell'edificio.
  Trotz der widrigen *Bedingungen* gelang es unserem lokalen Helden, den Hund zu retten, der unter den Trümmern des Gebäudes eingeklemmt war.
  
  Se avessi saputo che eri incinta, ti avrei mandato le mie più sincere *congratulazioni* subito!
  Wenn ich gewusst hätte, dass du *schwanger* bist, hätte ich dir sofort meine aufrichtigsten Glückwünsche geschickt!
  
  Dopo aver ricevuto l'anello di fidanzamento, la coppia ha celebrato con un'enorme festa a cui tutti hanno partecipato.
  Nach Erhalt des Verlobungsrings feierte das *Paar* mit einer riesigen Feier, an der alle teilnahmen.
