Rang: 2703
Wort: emettere
Wortart: vt
Wort mit Artikel: emettere
Femininum / Plural: ''
IPA: ''
Definition: ausstoßen, emittieren
Register: ''
Beispielsätze: |-
  L'azienda *deve emettere* un comunicato ufficiale entro domani.
  Das Unternehmen muss eine offizielle *Mitteilung* innerhalb von morgen ausgeben.
  
  Dopo l'incidente, le autorità hanno ordinato di *emettere* un bollettino di sicurezza.
  Nach dem Unfall haben die Behörden beschlossen, einen Sicherheits*bericht* auszugeben.
  
  Se avessi più dati, potrei *emettere* un giudizio più preciso.
  Wenn ich mehr Daten hätte, könnte ich ein präziseres *Urteil* fällen.
  
  Il laboratorio sta per *emettere* i risultati dell'analisi del sangue.
  Das Labor wird gleich die Ergebnisse der Blut*analyse* bekanntgeben.
  
  Hanno deciso di *emettere* un avviso di sicurezza per tutti i cittadini.
  Sie haben beschlossen, eine Sicherheits*warnung* für alle Bürger zu erlassen.
