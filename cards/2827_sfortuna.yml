Rang: 2827
Wort: sfortuna
Wortart: n.f
Wort mit Artikel: la sfortuna
Femininum / Plural: sfortune
IPA: ''
Definition: das Pech, das Unglück
Register: ''
Beispielsätze: |-
  Nonostante *sfortuna*, è riuscito a vincere la partita.
  Trotz *Pechs* gelang es ihm, das Spiel zu gewinnen.
  
  Se *sfortuna* ci perseguita, dobbiamo reagire con coraggio.
  Wenn *Unglück* uns verfolgt, müssen wir mutig reagieren.
  
  Credi che la *sfortuna* sia un caso o una punizione divina?
  Glaubst du, *Pech* ist Zufall oder eine göttliche Strafe?
  
  Era una *sfortuna* che non avessimo previsto il temporale.
  Es war ein *Unglück*, dass wir den Sturm nicht vorhergesehen hatten.
  
  La *sfortuna* lo ha fatto cadere proprio quando tutto sembrava andare bene.
  Das *Pech* ließ ihn genau dann stürzen, als alles gut zu laufen schien.
