Rang: 1760
Wort: conservare
Wortart: vt
Wort mit Artikel: conservare
Femininum / Plural: ''
IPA: ''
Definition: bewahren, aufbewahren
Register: ''
Beispielsätze: |-
  Devi *conservare* questi documenti in un luogo sicuro prima che qualcuno li rubi.
  Du musst diese Dokumente an einem sicheren Ort *aufbewahren*, bevor jemand sie stiehlt.
  
  Ho *conservato* la ricetta di mia nonna per molti anni senza mai sbagliare un ingrediente.
  Ich habe das Rezept meiner Großmutter jahrelang *aufbewahrt* und nie eine Zutat falsch verwendet.
  
  Se non *conservi* correttamente il tuo vino, perderà tutto il suo sapore nel giro di pochi mesi.
  Wenn du deinen Wein nicht richtig *lagerst*, verliert er in wenigen Monaten seinen ganzen Geschmack.
  
  La ditta sta cercando un modo per *conservare* i cibi senza usare conservanti artificiali.
  Das Unternehmen sucht nach einer Möglichkeit, Lebensmittel ohne künstliche *Konservierungs*stoffe zu lagern.
  
  Senza che nessuno lo sapesse, lui *conservava* dentro di sé quella foto che lo rendeva felice ogni volta che la guardava.
  Ohne dass es jemand wusste, *hütete* er dieses Foto in sich, das ihn jedes Mal glücklich machte, wenn er es betrachtete.
