Rang: 1756
Wort: posta
Wortart: n.f
Wort mit Artikel: la posta
Femininum / Plural: poste
IPA: ''
Definition: die Post / die Briefe
Register: ''
Beispielsätze: |-
  La *posta* è arrivata tardi a causa dello sciopero dei postini.
  Die *Post* ist wegen des Streiks der Postboten zu spät angekommen.
  
  Ho trovato una lettera interessante nella *posta* di oggi.
  Ich habe einen interessanten Brief in der heutigen *Post* gefunden.
  
  Domani mattina passerò in ufficio a ritirare la *posta*.
  Morgen früh gehe ich ins Büro, um die *Post* abzuholen.
  
  Mi hai mandato una cartolina dalla *posta* italiana?
  Hast du mir eine Postkarte aus der italienischen *Post* geschickt?
  
  Se non arriva la *posta*, non potrò spedire il pacco.
  Wenn die *Post* nicht kommt, kann ich das Päckchen nicht verschicken.
