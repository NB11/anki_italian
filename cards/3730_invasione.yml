Rang: 3730
Wort: invasione
Wortart: n.f
Wort mit Artikel: l'invasione
Femininum / Plural: invasioni
IPA: ''
Definition: die Invasion, -en
Register: ''
Beispielsätze: |-
  Gli storici discutono se la *invasione* dei barbari abbia segnato la fine dell’Impero Romano.
  Die Historiker diskutieren, ob die *Invasion* der Barbaren das Ende des Römischen Reiches markiert hat.
  
  Con la *invasione* del territorio nemico, il generale sapeva che avrebbe scatenato una guerra lunga.
  Mit der *Invasion* des feindlichen Gebiets wusste der General, dass er einen langen Krieg auslösen würde.
  
  Hanno avvertito che una *invasione* di locuste è MOLTO probabile quest’anno.
  Sie haben gewarn dass eine *Heuschreckeninvasion* in diesem Jahr sehr wahrscheinlich ist.
  
  La *invasione* del loro rifugio da parte delle guardie ha colto tutti di sorpresa.
  Die *Invasion* ihres Unterschlupfes durch die Wachen hat alle überrascht.
  
  Senza un piano strategico, ogni *invasione* può trasformarsi in un massacro.
  Ohne strategischen Plan kann sich jede *Invasion* in ein Massaker verwandeln.
