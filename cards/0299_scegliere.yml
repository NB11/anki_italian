Rang: 299
Wort: scegliere
Wortart: vt
Wort mit Artikel: scegliere
Femininum / Plural: ''
IPA: ''
Definition: aussuchen, auswählen, wählen
Register: ''
Beispielsätze: |-
  Domani *sceglierò* un regalo per mamma.
  Morgen werde ich *ein Geschenk* für Mama *auswählen*.
  
  Hai *scelto* il ristorante per stasera?
  Hast du *das Restaurant* für heute Abend *ausgesucht*?
  
  Avrei *scelto* un altro film, ma loro volevano questo.
  Ich hätte *einen anderen Film* *ausgewählt*, aber sie wollten diesen.
  
  Non so cosa *scegliere*: il blu o il verde?
  Ich weiß nicht, was ich *wählen soll*: blau oder grün?
  
  È importante *scegliere* le parole con attenzione in una lettera formale.
  Es ist wichtig, die *Wörter* in einem formellen Brief *mit Bedacht auszuwählen*.
