Rang: 2112
Wort: trascorrere
Wortart: v
Wort mit Artikel: trascorrere
Femininum / Plural: ''
IPA: ''
Definition: verbringen, verleben, Zeit *verbringen*
Register: ''
Beispielsätze: |-
  Quest'estate vogliamo *trascorrere* due settimane in montagna.
  Diesen Sommer wollen wir zwei Wochen in den Bergen *verbringen*.
  
  Se avessi più tempo libero, *trascorrerei* le serate leggendo un libro.
  Wenn ich mehr Freizeit hätte, würde ich die Abende mit dem Lesen eines Buches *verbringen*.
  
  Mia nonna mi ha raccontato che da giovane *trascorreva* le vacanze al mare ogni anno.
  Meine Großmutter hat mir erzählt, dass sie in ihrer Jugend die Ferien jedes Jahr am Meer *verbracht* hat.
  
  Nonostante la pioggia, siamo riusciti a *trascorrere* una giornata piacevole al museo.
  Trotz des Regens haben wir es geschafft, einen schönen Tag im Museum zu *verbringen*.
  
  Spero che domani tu possa *trascorrere* un po' di tempo con noi, così ci aggiorniamo sulle novità!
  Ich hoffe, dass du morgen etwas Zeit mit uns *verbringen* kannst, damit wir uns über die Neuigkeiten austauschen können!
