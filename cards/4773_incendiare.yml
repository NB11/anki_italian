Rang: 4773
Wort: incendiare
Wortart: vt
Wort mit Artikel: incendiare
Femininum / Plural: ''
IPA: ''
Definition: anzünden, in Brand stecken
Register: ''
Beispielsätze: |-
  Se non spegni subito quella candela, rischi di *incendiare* tutta la casa!
  Wenn du diese Kerze nicht sofort ausmachst, riskierst du, das ganze Haus in *Brand* zu stecken.
  
  I pompieri hanno scoperto che qualcuno aveva *incendiato* l’edificio deliberatamente.
  Die Feuerwehrleute haben herausgefunden, dass jemand das Gebäude vorsätzlich in *Brand* gesteckt hatte.
  
  Vuoi davvero *incendiare* la tua reputazione con una sola frase sconsiderata?
  Willst du wirklich deinen Ruf mit nur einem unbedachten Satz in *Brand* stecken lassen?
  
  Quando ero bambino, mi divertivo a *incendiare* foglie secche nel giardino di mio nonno.
  Als ich ein Kind war, habe ich mich damit vergnügt, trockene Blätter im Garten meines Großvaters in *Brand* zu stecken.
  
  L’uomo aveva minacciato di *incendiare* la biblioteca se non avesse ricevuto il denaro entro domani.
  Der Mann hatte gedroht, die Bibliothek in *Brand* zu stecken, falls er das Geld bis morgen nicht erhielte.
