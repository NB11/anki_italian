Rang: 2830
Wort: solare
Wortart: adj
Wort mit Artikel: solare
Femininum / Plural: ''
IPA: ''
Definition: sonnig, strahlend
Register: ''
Beispielsätze: |-
  Preferisco studiare alla mattina quando il sole è ancora *solare* e la luce non è troppo calda.
  Ich lerne lieber am Morgen, wenn die Sonne noch *strahlend* ist und das Licht nicht zu heiß wird.
  
  Devi scegliere un abito *solare* per il matrimonio, qualcosa che risalti anche sotto il sole cocente.
  Du musst ein *strahlendes* Kleid für die Hochzeit wählen, etwas, das sogar unter der glühenden Sonne auffällt.
  
  Il suo sorriso era così *solare* che tutti si sentivano immediatamente più felici in sua compagnia.
  Ihr Lächeln war so *strahlend*, dass sich alle in ihrer Nähe sofort glücklicher fühlten.
  
  Nonostante il tempo incerto, il giorno della festa fu *solare* e perfetto per celebrare all'aperto.
  Trotz des unsicheren Wetters war der Tag des Festes *sonnig* und perfekt für die Feier im Freien.
  
  Se solo avessi una giornata *solare* in più per terminare il progetto che sto scrivendo da settimane!
  Wenn ich doch nur einen weiteren *sonnigen* Tag hätte, um das Projekt zu beenden, an dem ich seit Wochen schreibe!
