Rang: 592
Wort: pulire
Wortart: v
Wort mit Artikel: pulire
Femininum / Plural: ''
IPA: ''
Definition: putzen, reinigen
Register: ''
Beispielsätze: |-
  Devo *pulire* la cucina dopo aver cucinato.
  Ich muss die Küche *reinigen* nach dem Kochen.
  
  Chi *ha pulito* il pavimento ieri?
  Wer hat den Boden *geputzt* gestern?
  
  *Puliamo* la casa prima dell'arrivo degli ospiti.
  *Reinigen wir* das Haus vor der Ankunft der Gäste.
  
  Se non *pulissi* spesso, l'appartamento sarebbe disordinato.
  Wenn ich nicht oft *putzen* würde, wäre die Wohnung unordentlich.
  
  Spero che tu *abbia pulito* bene la tua stanza.
  Ich hoffe, dass du dein Zimmer gut *gereinigt* hast.
