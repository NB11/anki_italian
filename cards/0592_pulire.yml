Rang: 592
Wort: pulire
Wortart: v
Wort mit Artikel: pulire
Femininum / Plural: ''
IPA: ''
Definition: putzen, saubermachen
Register: ''
Beispielsätze: |-
  Devo *pulire* la casa perché è piena di polvere da una settimana.
  Ich muss die Wohnung *reinigen*, weil sie seit einer Woche voller Staub ist.
  
  Se *pulirai* il bagno, ti offrirò un caffè come premio.
  Wenn du das Badezimmer *putzt*, gebe ich dir einen Kaffee als Belohnung.
  
  Ero così stanco che non avevo la forza di *pulire* le scale stamattina.
  Ich war so müde, dass ich heute Morgen nicht die Kraft hatte, die Treppe zu *reinigen*.
  
  Dopo che avrai finito di *pulire* la stanza, potrai uscire con i tuoi amici.
  Nachdem du das Zimmer *aufgeräumt* hast, kannst du mit deinen Freunden ausgehen.
  
  Credo che il direttore voglia che *puliamo* gli uffici entro oggi, insomma non è normale!
  Ich glaube, der Chef erwartet, dass wir die Büros heute *säubern* — schließlich ist das nicht üblich!
