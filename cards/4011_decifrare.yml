Rang: 4011
Wort: decifrare
Wortart: vt
Wort mit Artikel: decifrare
Femininum / Plural: ''
IPA: ''
Definition: entschlüsseln
Register: ''
Beispielsätze: |-
  Gli esperti stanno cercando di *decifrare* il codice segreto della guerra fredda.
  Experten versuchen, den geheimen Code der Nachkriegszeit zu *entschlüsseln*.
  
  Vorrei *decifrare* questo messaggio scritto a mano, ma la calligrafia è illeggibile.
  Ich möchte diese handschriftliche Nachricht *entschlüsseln*, aber die Schrift ist unleserlich.
  
  Secondo te, chi ha provato a *decifrare* la formula matematica prima di noi?
  Wer hat deiner Meinung nach die mathematische Formel vor uns zu *entschlüsseln* versucht?
  
  Il custode ha promesso che avrebbe *decifrato* il meccanismo del vecchio orologio entro domani.
  Der Wärter hat versprochen, den Mechanismus der alten Uhr bis morgen zu *entschlüsseln*.
  
  Nonostante la confusione, riuscì a *decifrare* il significato reale del dibattito.
  Trotz der Verwirrung gelang es ihm, die *eigentliche* Bedeutung der Debatte zu entschlüsseln.
