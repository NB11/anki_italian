Rang: 2016
Wort: orecchio
Wortart: n.m
Wort mit Artikel: l'orecchio
Femininum / Plural: orecchi
IPA: ''
Definition: das Ohr, -en
Register: ''
Beispielsätze: |-
  Mi fa male *l’orecchio* sinistro da ieri mattina.
  Mein *linkes Ohr* tut mir seit gestern Morgen weh.
  
  Non capisco cosa dice: avvicinati e parlami nell’*orecchio*!
  Ich verstehe nicht, was er sagt: komm näher und sprich mir ins *Ohr*!
  
  Ha un’infezione all’*orecchio* e deve prendere dei farmaci per guarire.
  Er hat eine Ohr*infektion* und muss Medikamente nehmen, um zu heilen.
  
  Se senti un fischio nell’*orecchio*, consulta uno scienziato specializzato.
  Wenn du ein Pfeifen im *Ohr* hörst, konsultiere einen spezialisierten Wissenschaftler.
  
  Il medico le ha detto che deve evitare di bagnare *l’orecchio* per almeno una settimana.
  Der Arzt hat ihr gesagt, dass sie mindestens eine Woche lang vermeiden soll, das *Ohr* nass werden zu lassen.
