Rang: 1959
Wort: raro
Wortart: adj
Wort mit Artikel: raro
Femininum / Plural: ''
IPA: ''
Definition: selten, rar
Register: ''
Beispielsätze: |-
  È *raro* che un pelo cada dal mantello del cane ogni giorno.
  Es ist *selten*, dass ein Fell täglich ausfällt.
  
  Nonostante il *penny* che ho trovato per strada, la mia fortuna rimane rara.
  Trotz des *Cents*, den ich auf der Straße fand, bleibt mein Glück selten.
  
  Il governatore ha affermato che questo incarico è *raro* e richiede grande responsabilità.
  Der Gouverneur behauptete, dass dieser *Auftrag* selten ist und große Verantwortung erfordert.
  
  Avrei voluto che la *cintura* fosse raramente necessaria, ma purtroppo non è così.
  Ich hätte gewünscht, dass der *Gürtel* selten nötig wäre, aber leider ist das nicht so.
  
  Dopo aver *versato* le lacrime, si sentiva raramente in pace con la propria coscienza.
  Nachdem sie die *Tränen* vergossen hatte, fühlte sie sich selten mit ihrem Gewissen im Reinen.
