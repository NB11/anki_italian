Rang: 706
Wort: casino
Wortart: n.m
Wort mit Artikel: il casino
Femininum / Plural: casini
IPA: ''
Definition: das Chaos, der Wirbel, der Lärm
Register: ''
Beispielsätze: |-
  A Roma c'è *casino* per le strade durante il Capodanno!
  In Rom herrscht *Chaos* auf den Straßen an Silvester!
  
  Quel *casino* di traffico mi ha fatto arrivare tardi a lavoro.
  Dieser *Wirbel* mit dem Verkehr hat mich zu spät zur Arbeit kommen lassen.
  
  Non volevo quella decisione, ma alla fine ho fatto un *casino* enorme.
  Ich wollte diese *Entscheidung* nicht, aber am Ende habe ich ein Durcheinander verursacht.
  
  Se continui così, faremo un *casino* tale che nessuno ci capirà più.
  Wenn du so weitermachst, schaffen wir ein *Chaos*, sodass niemand uns mehr versteht.
  
  Mi hanno detto che in quel quartiere c'è sempre *casino* a causa delle armi.
  Man hat mir gesagt, dass in diesem Viertel immer *Lärm* herrscht wegen der Waffen.
