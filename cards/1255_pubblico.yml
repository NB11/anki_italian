  Il comandante ha ordinato di evacuare il *pubblico* immediatamente a causa del vento improvviso.
  Der *Befehlshaber* befahl, das Publikum sofort wegen des plötzlichen Winds zu evakuieren.
  
  Lo show teatrale ha suscitato dubbi nel *pubblico* riguardo alle sue reali intenzioni.
  Die Theater*schau* hat im Publikum Zweifel über seine wahren Absichten hervorgerufen.
