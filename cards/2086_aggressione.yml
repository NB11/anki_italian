Rang: 2086
Wort: aggressione
Wortart: n.f
Wort mit Artikel: l'aggressione
Femininum / Plural: aggressioni
IPA: ''
Definition: der Angriff, -e, der Übergriff, -e
Register: ''
Beispielsätze: |-
  L'*aggressione* improvvisa ha scosso tutta la città, costringendo le autorità a intervenire con urgenza.
  Der plötzliche *Angriff* hat die ganze Stadt erschüttert und die Behörden gezwungen, dringend einzugreifen.
  
  Nonostante le minacce, non ha mai risposto con l'*aggressione*, preferendo sempre il dialogo.
  Trotz der Drohungen hat er nie mit *Angriffen* geantwortet, sondern immer das Gespräch gesucht.
  
  L'*aggressione* subita dal ragazzo ha provocato una grande indignazione tra i compagni di scuola.
  Die *Aggression*, die der Junge erlebt hat, hat unter seinen Mitschülern große Empörung ausgelöst.
  
  Se ci sarà un'*aggressione* nel quartiere, la polizia ha promesso di aumentare i pattugliamenti.
  Falls es zu einer *Aggression* im Viertel kommt, hat die Polizei versprochen, die Streifen zu verstärken.
  
  Il governo ha condannato ogni forma di *aggressione* contro i civili, definendola inaccettabile.
  Die Regierung hat jede Form von *Angriffen* auf Zivilisten verurteilt und als inakzeptabel bezeichnet.
