Rang: 4040
Wort: noleggiare
Wortart: vt
Wort mit Artikel: noleggiare
Femininum / Plural: ''
IPA: ''
Definition: mieten, ausleihen
Register: ''
Beispielsätze: |-
  Vorrei *noleggiare* una macchina per il fine settimana, ma non so se è ancora disponibile.
  Ich möchte das Auto für das Wochenende *mieten*, aber ich weiß nicht, ob es noch verfügbar ist.
  
  Non appena arriviamo in città, dobbiamo *noleggiare* degli sci se vogliamo sciare domani.
  Sobald wir in der Stadt ankommen, müssen wir die Skier *ausleihen*, wenn wir morgen ski fahren wollen.
  
  Ha detto che avrebbe *noleggiato* una barca per la gita, ma alla fine ha cambiato idea.
  Er hat gesagt, er würde das Boot für den Ausflug *mieten*, aber am Ende hat er seine Meinung geändert.
  
  Se avessi più soldi, *noleggerei* un elicottero per sorvolare la città.
  Wenn ich mehr Geld hätte, würde ich den Helikopter über die Stadt *mieten*.
  
  È meglio *noleggiare* una bicicletta che prendere l'autobus, dato che il traffico è insopportabile.
  Es ist besser, das Fahrrad zu *mieten*, als den Bus zu nehmen, da der Verkehr unerträglich ist.
