Rang: 1876
Wort: raccomandare
Wortart: vt
Wort mit Artikel: raccomandare
Femininum / Plural: ''
IPA: ''
Definition: empfehlen, raten, nahelegen
Register: ''
Beispielsätze: |-
  Il dottore mi ha *raccomandato* di riposare per una settimana dopo l'operazione.
  Der Arzt hat mir *empfohlen*, eine Woche nach der OP zu ruhen.
  
  Non *raccomanderei* a nessuno di attraversare quella strada di notte, è troppo pericolosa.
  Ich würde *niemanden* raten, diese Straße nachts zu überqueren, sie ist zu gefährlich.
  
  La guida ci ha *raccomandato* di provare il ristorante all'angolo, dicono che i piatti siano originali.
  Der Guide hat uns *empfohlen*, das Restaurant an der Ecke auszuprobieren, dort sollen die Gerichte original sein.
  
  Se avessi tempo, ti *raccomanderei* di visitare quel museo: secondo me è il più interessante della città.
  Wenn ich Zeit hätte, würde ich dir *empfehlen*, dieses Museum zu besuchen – meiner Meinung nach ist es das interessanteste der Stadt.
  
  Mi hanno detto che il direttore *raccomanda* sempre di firmare i documenti prima di andare via, per evitare problemi.
  Man hat mir gesagt, dass der Direktor immer *darauf besteht*, die Dokumente vor dem Gehen zu unterschreiben, um Probleme zu vermeiden.
