Rang: 1319
Wort: sparo
Wortart: n.m
Wort mit Artikel: lo sparo
Femininum / Plural: spari
IPA: ''
Definition: der Schuss, Schüsse
Register: ''
Beispielsätze: |-
  Ho sentito *sparo* mentre passeggiavo vicino al quartiere.
  Ich habe *Schuss* gehört, während ich im Viertel spazieren ging.
  
  Il poliziotto ha sparato un *sparo* in aria per allertare la folla.
  Der Polizist hat *Schuss* in die Luft abgefeuert, um die Menge zu warnen.
  
  Nonostante il pericolo, ha continuato a sparare *spari* per difendersi.
  Trotz der Gefahr feuerte er weiter *Schüsse* ab, um sich zu verteidigen.
  
  Lo *sparo* che abbiamo udito proveniva dal giardino vicino.
  Der *Schuss*, den wir gehört haben, kam aus dem nahegelegenen Garten.
  
  Dicono che all’alba ci siano stati tre *spari* nella zona industriale.
  Man sagt, dass es bei Tagesanbruch drei *Schüsse* in der Industriezone gegeben hat.
