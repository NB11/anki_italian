Rang: 162
Wort: mangiare
Wortart: v
Wort mit Artikel: mangiare
Femininum / Plural: ''
IPA: ''
Definition: essen, fressen
Register: ''
Beispielsätze: |-
  Oggi *mangio* un panino al prosciutto.
  Heute *esse* ich ein Schinkenbrot.
  
  Hai *mangiato* tutto il dolce ieri sera?
  Hast du gestern Abend den ganzen Kuchen *gegessen*?
  
  Se avessi fame, *mangerei* volentieri una pizza.
  Wenn ich Hunger hätte, *würde* ich gerne eine Pizza *essen*.
  
  Credo che lui *mangi* sempre troppo velocemente.
  Ich glaube, er *isst* immer zu schnell.
  
  Non volevamo *mangiare* al ristorante, ma alla fine abbiamo cambiato idea.
  Wir wollten nicht im Restaurant *essen*, aber schließlich haben wir es uns anders überlegt.
