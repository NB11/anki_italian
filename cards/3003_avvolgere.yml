Rang: 3003
Wort: avvolgere
Wortart: vt
Wort mit Artikel: avvolgere
Femininum / Plural: ''
IPA: ''
Definition: einwickeln, einhüllen, umwickeln
Register: ''
Beispielsätze: |-
  Per proteggere la *avvolgere*mo il regalo con della carta velina.
  Um das Geschenk zu *schützen*, werden wir es mit Seidenpapier einwickeln.
  
  Il mago *avvolse* la sua assistente in un panno nero e scomparve dal palco.
  Der Zauberer *hüllte* seine Assistentin in ein schwarzes Tuch und verschwand von der Bühne.
  
  Se avessi del cellophane, potrei *avvolgere* questi libri senza spedirli in scatola.
  Wenn ich Frischhaltefolie hätte, könnte ich diese Bücher *einwickeln*, ohne sie in eine Kiste zu schicken.
  
  Il tecnico *avvolge* i cavi elettrici nel nastro isolante per evitare cortocircuiti.
  Der Techniker *wickelt* die Elektrokabel in Isolierband, um Kurzschlüsse zu vermeiden.
  
  Mi hanno detto che chi *avvolge* troppo in fretta i regali spesso sbaglia i pacchi.
  Man hat mir gesagt, dass jemand, der Geschenke zu *schnell einwickelt*, oft Fehler beim Verpacken macht.
