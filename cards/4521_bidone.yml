Rang: 4521
Wort: bidone
Wortart: n.m
Wort mit Artikel: il bidone
Femininum / Plural: bidoni
IPA: ''
Definition: der Mülleimer, - / der Abfalleimer, -
Register: ''
Beispielsätze: |-
  Ho buttato la bottiglia vuota nel *bidone* della carta.
  Ich habe die leere Flasche in den *Mülleimer* für Papier geworfen.
  
  Non dimenticare di chiudere bene il *bidone* prima di andare via!
  Vergiss nicht, den *Abfalleimer* gut zu schließen, bevor du gehst!
  
  Questo *bidone* è troppo pesante per me, mi aiuti a svuotarlo?
  Dieser *Mülleimer* ist zu schwer für mich, hilfst du mir, ihn zu leeren?
  
  Malgrado fosse quasi pieno, il *bidone* dell'organico era ancora aperto.
  Obwohl er fast voll war, stand der *Abfalleimer* für Biomüll noch offen.
  
  Dante gettò la sua corona nel *bidone* dei ricordi dimenticati.
  Dante warf seine Krone in den *Mülleimer* vergessener Erinnerungen.
