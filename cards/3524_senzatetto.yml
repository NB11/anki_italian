Rang: 3524
Wort: senzatetto
Wortart: n.m
Wort mit Artikel: il senzatetto
Femininum / Plural: i senzatetto
IPA: ''
Definition: der Obdachlose, -n
Register: ''
Beispielsätze: |-
  In questa città ci sono molti *senzatetto* che vivono per strada ogni notte.
  In dieser Stadt gibt es viele *Obdachlose*, die jede Nacht auf der Straße leben.
  
  Ho visto un *senzatetto* che chiedeva l’elemosina vicino alla stazione centrale.
  Ich habe einen *Obdachlosen* gesehen, der nahe dem Hauptbahnhof bettelte.
  
  Dopo la pioggia tutti i *senzatetto* cercano riparo sotto i ponti e nei portoni chiusi.
  Nach dem Regen suchen alle *Obdachlosen* Schutz unter Brücken und in geschlossenen Eingängen.
  
  Se volessi aiutare, potrei donare cibo ai *senzatetto* che dormono nel parco.
  Wenn ich helfen wollte, könnte ich den *Obdachlosen*, die im Park schlafen, Essen spenden.
  
  Spero che un giorno nessun bambino debba crescere come *senzatetto*.
  Ich hoffe, dass ein Kind niemals als *Obdachloser* aufwachsen muss.
