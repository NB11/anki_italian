Rang: 4634
Wort: fax
Wortart: n.m
Wort mit Artikel: il fax
Femininum / Plural: i fax
IPA: ''
Definition: das Fax, -
Register: ''
Beispielsätze: |-
  Ho ricevuto *il fax* stamattina con le specifiche del progetto.
  Ich habe *das Fax* heute Morgen mit den Projektvorgaben erhalten.
  
  Non appena avrai finito di scrivere, invia *il fax* alla segreteria.
  Sobald du fertig geschrieben hast, schicke *das Fax* an das Sekretariat.
  
  Dice che *il fax* che ti ho mandato non è arrivato ancora?
  Sagt er, dass *das Fax*, das ich dir geschickt habe, noch nicht angekommen ist?
  
  Se non hai la stampante, puoi inviare *fax* tramite il computer.
  Wenn du keinen Drucker hast, kannst du *Faxe* über den Computer versenden.
  
  Hanno mandato *un fax* urgente, ma non si capiva nulla a causa dello scarso contrasto.
  Sie haben *ein Fax* dringend geschickt, aber man verstand nichts wegen des schwachen Kontrasts.
