Rang: 3863
Wort: presentimento
Wortart: n.m
Wort mit Artikel: il presentimento
Femininum / Plural: i presentimenti
IPA: ''
Definition: das Vorgefühl, -e
Register: ''
Beispielsätze: |-
  Ho un *presentimento* che oggi pioverà tutto il giorno.
  Ich habe eine *Ahnung*, dass es heute den ganzen Tag regnen wird.
  
  Il suo *presentimento* si rivelò corretto quando arrivò la notizia.
  Ihr *Vorgefühl* bewahrheitete sich, als die Nachricht eintraf.
  
  Aveva un brutto *presentimento* prima dell'esame, ma andò bene.
  Sie hatte ein schlechtes *Vorgefühl* vor der Prüfung, aber es lief gut.
  
  Non credere ai tuoi *presentimenti*: a volte ingannano.
  Glaube deinen *Vorgefühlen* nicht: Manchmal täuschen sie.
  
  Il *presentimento* della madre la spinse a chiamare il figlio al telefono.
  Der *Vorgefühl* der Mutter veranlasste sie, ihren Sohn anzurufen.
