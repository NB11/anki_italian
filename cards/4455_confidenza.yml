Rang: 4455
Wort: confidenza
Wortart: n.f
Wort mit Artikel: la confidenza
Femininum / Plural: le confidenze
IPA: ''
Definition: das Vertrauen, die Zuversicht
Register: ''
Beispielsätze: |-
  Dopo anni di *confidenza* reciproca, hanno finalmente deciso di sposarsi.
  Nach Jahren des *Vertrauens* zueinander haben sie sich endlich entschieden zu heiraten.
  
  La polizia ha perso la *confidenza* nel testimone perché ha cambiato versione.
  Die Polizei hat das *Vertrauen* in den Zeugen verloren, weil er seine Aussage geändert hat.
  
  Ho sempre avuto *confidenza* nella capacità di Luca di risolvere ogni problema.
  Ich habe immer *Vertrauen* in Lukas Fähigkeit gehabt, jedes Problem zu lösen.
  
  È meglio non dare *confidenza* a persone che non conosci bene, anche se sembrano amichevoli.
  Man sollte *Vertrauen* in Menschen, die man nicht gut kennt, nicht geben, selbst wenn sie freundlich wirken.
  
  La *confidenza* che mia sorella ha nelle sue possibilità è impressionante, nonostante gli ostacoli.
  Das *Vertrauen*, das meine Schwester in ihre Möglichkeiten hat, ist beeindruckend, trotz der Hindernisse.
