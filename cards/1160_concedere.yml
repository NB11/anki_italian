Rang: 1160
Wort: concedere
Wortart: vt
Wort mit Artikel: concedere
Femininum / Plural: ''
IPA: ''
Definition: gewähren, erteilen, einräumen
Register: ''
Beispielsätze: |-
  Il giudice ha *concesso* la libertà provvisoria all’imputato.
  Der Richter hat dem Angeklagten die vorläufige *Freiheit* gewährt.
  
  Non *concedere* a nessuno il permesso di entrare senza autorizzazione!
  Erlaube *niemandem*, ohne Erlaubnis einzutreten!
  
  Il direttore *concesse* una pausa più lunga del solito perché tutti erano stanchi.
  Der Direktor gewährte eine längere *Pause* als sonst, weil alle müde waren.
  
  Dopo lunghe trattative, gli ufficiali *hanno concesso* un termine più lungo per consegnare i documenti.
  Nach langen Verhandlungen haben die Beamten eine längere *Frist* zur Abgabe der Unterlagen eingeräumt.
  
  Se mi avessi spiegato meglio, ti avrei *concesso* il beneficio del dubbio.
  Hättest du mir das besser erklärt, hätte ich dir den *Zweifel* genommen.
