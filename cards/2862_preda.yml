Rang: 2862
Wort: preda
Wortart: n.f
Wort mit Artikel: la preda
Femininum / Plural: prede
IPA: ''
Definition: die Beute, -
Register: ''
Beispielsätze: |-
  Il leone ha catturato una *preda* dopo una lunga caccia.
  Der Löwe hat eine *Beute* nach einer langen Jagd gefangen.
  
  Molte specie animali diventano *preda* dei cacciatori illegali.
  Viele Tierarten werden zur *Beute* von Wilderern.
  
  Avevano la *preda* in mente quando hanno organizzato il viaggio nella giungla.
  Sie hatten die *Beute* im Sinn, als sie die Reise in den Dschungel organisierten.
  
  Se non fossi stato attento, saresti diventato *preda* di quel truffatore.
  Wenn du nicht aufgepasst hättest, wärst du zur *Beute* dieses Betrügers geworden.
  
  La *preda* più pericolosa non è sempre quella che sembra più debole.
  Die gefährlichste *Beute* ist nicht immer die, die am schwächsten erscheint.
