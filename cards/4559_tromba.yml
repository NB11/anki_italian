Rang: 4559
Wort: tromba
Wortart: n.m
Wort mit Artikel: la tromba
Femininum / Plural: trombe
IPA: ''
Definition: die Trompete
Register: ''
Beispielsätze: |-
  Il musicista suonava *tromba* in un concerto jazz ieri sera.
  Der Musiker spielte gestern Abend *Trompete* in einem Jazzkonzert.
  
  Non appena ho sentito la *tromba*, ho capito che era l’inizio dello spettacolo.
  Sobald ich die *Trompete* hörte, wusste ich, dass der Auftritt begann.
  
  Se potessi scegliere uno strumento, vorrei imparare a suonare la *tromba*.
  Wenn ich ein Instrument wählen könnte, würde ich gern *Trompete* spielen lernen.
  
  La *tromba* d’allarme ha risuonato in tutta la fabbrica durante l’incendio.
  Die *Trompete* des Alarms ertönte im gesamten Werk während des Brandes.
  
  Mentre passeggiavo per il parco, ho udito un suono di *tromba* che veniva da lontano.
  Während ich durch den Park ging, hörte ich das Klang einer *Trompete* in der Ferne.
