Rang: 4733
Wort: avanzo
Wortart: n.m
Wort mit Artikel: l'avanzo
Femininum / Plural: avanzi
IPA: ''
Definition: der Rest, -e; der Überschuss
Register: ''
Beispielsätze: |-
  Dopo la festa avanzano sempre dei *avanzi* di cibo.
  Nach der Feier bleiben immer Reste von Essen übrig.
  
  L’*avanzo* del pranzo lo metto nel frigo per domani.
  Den Rest des Mittagessens stelle ich für morgen in den Kühlschrank.
  
  Non buttiamo via l’*avanzo* della pasta, possiamo usarlo domani!
  Wir werfen die Reste der Nudeln nicht weg, wir können sie morgen noch verwenden!
  
  Questo *avanzo* di tessuto servirà per un nuovo progetto.
  Dieser Stoffrest wird für ein neues Projekt reichen.
  
  Se ci sono degli *avanzi*, li congeliamo per non sprecare.
  Falls es Reste gibt, frieren wir sie ein, um nichts zu verschwenden.
