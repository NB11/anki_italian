Rang: 3770
Wort: zucca
Wortart: n.f
Wort mit Artikel: la zucca
Femininum / Plural: zucche
IPA: ''
Definition: der Kürbis, -se
Register: ''
Beispielsätze: |-
  La *zucca* è un ingrediente fondamentale nella zuppa di Halloween.
  Die *Kürbis* ist eine grundlegende Zutat in der Halloween-Suppe.
  
  Ho comprato due *zucche* per decorare la casa durante l’autunno.
  Ich habe zwei *Kürbisse* gekauft, um das Haus im Herbst zu dekorieren.
  
  Mentre cucinavo, mia nonna mi ha raccontato che nella sua infanzia si usavano le *zucche* anche per fare delle lanterne.
  Während ich kochte, erzählte mir meine Oma, dass man in ihrer Kindheit *Kürbisse* auch für Laternen verwendete.
  
  Se non fosse stato per l’invasione degli insetti, le *zucche* nel mio orto sarebbero cresciute ancora più grandi.
  Wenn es nicht den Insektenbefall gegeben hätte, wären die *Kürbisse* in meinem Garten noch größer geworden.
  
  Vorrei sapere se, secondo te, è meglio coltivare delle *zucche* giganti o piuttosto delle varietà più piccole ma più dolci.
  Ich würde gerne wissen, ob du der Meinung bist, dass es besser ist, *Kürbisse* mit Riesengröße anzubauen oder lieber kleinere Sorten, die aber süßer sind.
