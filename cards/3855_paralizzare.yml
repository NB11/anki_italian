Rang: 3855
Wort: paralizzare
Wortart: v
Wort mit Artikel: paralizzare
Femininum / Plural: ''
IPA: ''
Definition: lähmen, blockieren, paralysieren
Register: ''
Beispielsätze: |-
  Il dolore improvviso cominciò a *paralizzare* il suo braccio destro.
  Der plötzliche Schmerz begann seinen rechten Arm zu *lähmen*.
  
  Se non risolviamo subito il problema, rischiamo di *paralizzare* l’intero reparto.
  Wenn wir das Problem nicht sofort lösen, riskieren wir, die ganze Abteilung zu *blockieren*.
  
  Il governo sta cercando di *paralizzare* la protesta con nuove leggi restrittive.
  Die Regierung versucht, die Proteste mit neuen restriktiven Gesetzen zu *paralysieren*.
  
  Dopo l’incidente, era come se la paura avesse iniziato a *paralizzarlo*.
  Nach dem Unfall war es, als hätte die Angst begonnen, ihn zu *lähmen*.
  
  Per *paralizzare* il sistema, basta disattivare un solo componente essenziale.
  Um das System zu *paralysieren*, reicht es, eine einzige essentielle Komponente abzuschalten.
Audio: ''
Notiz: ''
Dispersion: ''
