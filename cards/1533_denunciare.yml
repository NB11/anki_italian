Rang: 1533
Wort: denunciare
Wortart: vt
Wort mit Artikel: denunciare
Femininum / Plural: ''
IPA: ''
Definition: anzeigen, anzeigen, melden
Register: ''
Beispielsätze: |-
  Se hai visto un crimine, devi *denunciare* immediatamente la polizia.
  Wenn Sie ein Verbrechen gesehen haben, müssen Sie es sofort *der Polizei anzeigen*.
  
  Il politico ha minacciato di *denunciare* il ministro per corruzione se non si dimette.
  Der Politiker hat gedroht, den Minister wegen Korruption *anzuzeigen*, falls er nicht zurücktritt.
  
  Dopo aver raccolto le prove, gli avvocati hanno deciso di *denunciare* la multinazionale per frode.
  Nachdem sie die Beweise gesammelt hatten, beschlossen die Anwälte, das Unternehmen wegen Betrugs *anzuzeigen*.
  
  Nonostante la paura, la giornalista ha trovato il coraggio di *denunciare* gli abusi subiti in prigione.
  Trotz ihrer Angst fand die Journalistin den Mut, die Misshandlungen, die ihr im Gefängnis widerfahren sind, *anzuzeigen*.
  
  Hanno promesso che, se le prove saranno sufficienti, *denunceranno* l’intera organizzazione criminale entro una settimana.
  Sie haben versprochen, dass sie, sobald die Beweise ausreichen, die gesamte kriminelle Organisation innerhalb einer Woche *anzeigen* werden.
