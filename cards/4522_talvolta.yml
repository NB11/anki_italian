Rang: 4522
Wort: talvolta
Wortart: adv
Wort mit Artikel: talvolta
Femininum / Plural: ''
IPA: ''
Definition: manchmal, gelegentlich
Register: ''
Beispielsätze: |-
  Quando ero piccolo, *talvolta* mangiavo troppo e poi mi pentivo.
  Als ich klein war, habe ich *manchmal* zu viel gegessen und es danach bereut.
  
  *Talvolta* mi domando se ho fatto la scelta giusta, ma di solito non mi pento.
  *Gelegentlich* frage ich mich, ob ich die richtige Wahl getroffen habe, aber meistens bereue ich es nicht.
  
  Sono sicuro che *talvolta* esageri, ma non è un problema se capita di rado.
  Ich bin sicher, dass du *manchmal* übertreibst, aber es ist kein Problem, wenn es selten vorkommt.
  
  Nonostante sia molto occupato, *talvolta* riesco a trovare un po' di tempo per leggere.
  Obwohl ich sehr beschäftigt bin, schaffe ich es *manchmal*, eine kurze Zeit zum Lesen zu finden.
  
  Se *talvolta* ti senti stanco, è normale dopo una lunga giornata di lavoro.
  Wenn du dich *gelegentlich* müde fühlst, ist das nach einem langen Arbeitstag normal.
