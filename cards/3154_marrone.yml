Rang: 3154
Wort: marrone
Wortart: n.m
Wort mit Artikel: il marrone
Femininum / Plural: i marroni
IPA: ''
Definition: die Kastanie, -n
Register: ''
Beispielsätze: |-
  Mi piacciono molto le scarpe che ho visto nel negozio, hanno un bel colore *marrone*.
  Mir gefallen sehr die Schuhe, die ich im Laden gesehen habe, sie haben eine schöne *Kastanien*-Farbe.
  
  Nel parco vicino a casa mia ci sono tanti alberi che fanno le *castagne*.
  In dem Park in meiner Nähe gibt es viele Bäume, die *Kastanien* tragen.
  
  Ho comprato un maglione *marrone* che mi sta proprio bene!
  Ich habe einen *kastanienbraunen* Pullover gekauft, der mir wirklich gut passt!
  
  Se vuoi un abito elegante, scegli un completo *marrone* scuro.
  Wenn du einen eleganten Anzug möchtest, wähle einen dunklen *braunen* Anzug.
  
  I topi preferiscono i frutti delle piante che producono le *castagne*, ma non sempre trovano quelli più gustosi.
  Mäuse bevorzugen die Früchte der Pflanzen, die *Kastanien* tragen, aber nicht immer finden sie die schmackhaftesten.
