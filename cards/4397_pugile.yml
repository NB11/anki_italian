Rang: 4397
Wort: pugile
Wortart: n.m
Wort mit Artikel: il pugile
Femininum / Plural: i pugili
IPA: ''
Definition: der Boxer, -
Register: ''
Beispielsätze: |-
  Mio fratello maggiore è diventato *pugile* professionista l’anno scorso.
  Mein älterer Bruder ist letztes Jahr *Boxer* geworden.
  
  Il *pugile* ha vinto il match per k.o. al terzo round.
  Der *Boxer* hat den Kampf durch K. o. in der dritten Runde gewonnen.
  
  Se fossi più forte, mi allenerei per diventare *pugile* come lui.
  Wenn ich stärker wäre, würde ich trainieren, um *Boxer* wie er zu werden.
  
  Il *pugile* che hai visto ieri in palestra è un campione mondiale.
  Der *Boxer*, den du gestern in der Turnhalle gesehen hast, ist ein Weltmeister.
  
  Nonostante la sconfitta, il *pugile* rimase rispettato per la sua disciplina.
  Trotz der Niederlage blieb der *Boxer* wegen seiner Disziplin geachtet.
