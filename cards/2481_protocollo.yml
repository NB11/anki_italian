Rang: 2481
Wort: protocollo
Wortart: n.m
Wort mit Artikel: il protocollo
Femininum / Plural: i protocolli
IPA: ''
Definition: das Protokoll, -e
Register: ''
Beispielsätze: |-
  Nella riunione abbiamo discusso del *protocollo* di sicurezza che deve essere seguito alla lettera.
  In der Besprechung haben wir das *Protokoll* der Sicherheit besprochen, das genau eingehalten werden muss.
  
  Se non rispetti il *protocollo*, rischi di compromettere l'intera procedura.
  Wenn du das *Protokoll* nicht befolgst, gefährdest du das gesamte Verfahren.
  
  Secondo il *protocollo*, ogni documento deve essere firmato dal responsabile.
  Laut dem *Protokoll* muss jedes Dokument von der verantwortlichen Person unterschrieben werden.
  
  Hanno trovato un *protocollo* degli anni '80 nell'archivio della polizia.
  Sie haben ein *Protokoll* aus den 1980er-Jahren im Polizeiaktenschrank entdeckt.
  
  Il nuovo *protocollo* prevede una fase di controllo aggiuntiva prima dell'approvazione finale.
  Das neue *Protokoll* sieht eine zusätzliche Kontrollphase vor der endgültigen Freigabe vor.
