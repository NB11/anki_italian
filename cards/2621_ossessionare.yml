Rang: 2621
Wort: ossessionare
Wortart: vt
Wort mit Artikel: ossessionare
Femininum / Plural: ''
IPA: ''
Definition: besessen machen
Register: ''
Beispielsätze: |-
  Questo film mi *ossessiona* da settimane, non riesco a smettere di pensarci.
  Dieser Film macht mich seit Wochen *besessen*, ich kann nicht aufhören, daran zu denken.
  
  Se non smetti di *ossessionarti* con quel progetto, finirai per esaurirti.
  Wenn du nicht aufhörst, dich mit diesem Projekt zu *besessen* zu machen, wirst du dich erschöpfen.
  
  Era talmente *ossessionato* dal desiderio di vincere che trascurava tutto il resto.
  Er war von dem Wunsch zu gewinnen so *besessen*, dass er alles andere vernachlässigte.
  
  Credo che la sua arte *ossessioni* le persone perché mostra verità scomode.
  Ich glaube, seine Kunst *besessen* die Menschen, weil sie unbequeme Wahrheiten zeigt.
  
  Nonostante la distanza, lui continua a *ossessionarla* con le sue chiamate ogni giorno.
  Trotz der Entfernung macht er sie jeden Tag mit seinen Anrufen *besessen*.
