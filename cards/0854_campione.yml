Rang: 854
Wort: campione
Wortart: n.m
Wort mit Artikel: il campione
Femininum / Plural: campioni
IPA: ''
Definition: die Probe, -n; der Sieger, -; das Muster, -
Register: ''
Beispielsätze: |-
  Il *campione* di laboratorio deve essere conservato in frigorifero.
  Die *Probe* im Labor muss im Kühlschrank aufbewahrt werden.
  
  Nonostante sia ex giudice, non vuole discutere il *campione* del processo.
  Obwohl er ein *ehemaliger* Richter ist, will er nicht über die Proben des Prozesses sprechen.
  
  Ho perso il *campione* di tessuto che mi serviva per il compito di biologia.
  Ich habe das *Muster* des Stoffes verloren, das ich für die Biologie-Hausaufgabe brauchte.
  
  Se vuoi partecipare, porta un *campione* della tua migliore musica al concorso.
  Wenn du teilnehmen möchtest, bringe eine *Probe* deiner besten Musik zum Wettbewerb mit.
  
  Apprezzo molto il tuo *campione* di pensiero filosofico, anche se lo trovo difficile da applicare nella realtà.
  Ich *schätze* dein Muster philosophischen Denkens sehr, auch wenn ich es für schwer anwendbar in der Realität halte.
