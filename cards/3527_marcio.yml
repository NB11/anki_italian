Rang: 3527
Wort: marcio
Wortart: adj
Wort mit Artikel: marcio
Femininum / Plural: ''
IPA: ''
Definition: faul, verfault, verdorben
Register: ''
Beispielsätze: |-
  Il pane che hai lasciato fuori per due giorni è *marcio*.
  Das Brot, das du zwei Tage draußen hast liegen lassen, ist *faul*.
  
  Non mangiare quel pesce, sembra *marcio*!
  Iss den Fisch nicht, er sieht *verfault* aus!
  
  Tutti i frutti che erano caduti a terra erano diventati *marci*.
  Alle Früchte, die zu Boden gefallen waren, waren *verdorben* geworden.
  
  Se il legno diventa *marcio*, va sostituito immediatamente.
  Wenn das Holz *faul* wird, muss es sofort ersetzt werden.
  
  Credo che quel vino sia *marcio*, ha un odore strano.
  Ich glaube, der Wein ist *verdorben*, er riecht komisch.
