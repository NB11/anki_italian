Rang: 558
Wort: regola
Wortart: n.f
Wort mit Artikel: la regola
Femininum / Plural: regole
IPA: ''
Definition: die Regel, -n
Register: ''
Beispielsätze: |-
  Segui sempre *la regola* di non parlare con la bocca piena durante i pasti.
  Folge immer der Regel, nicht mit vollem Mund zu sprechen.
  
  Non sapevo che ci fossero così tante *regole* nel gioco che hai scelto!
  Ich wusste nicht, dass es so viele Regeln in dem Spiel gibt, das du gewählt hast.
  
  Se vuoi vincere, dovrai pensare fuori dalle *regole* normali, magari anche fregare un po’.
  Wenn du gewinnen willst, musst du außerhalb der normalen Regeln denken, vielleicht auch ein bisschen schummeln.
  
  La *regola* generale è di non ridere quando qualcuno inciampa, ma tu proprio non riesci a trattenerti!
  Die allgemeine Regel ist, nicht zu lachen, wenn jemand stolpert, aber du kannst dich einfach nicht zurückhalten!
  
  Qualunque *regola* che comporta tanta fretta, secondo me, è destinata a rovinare l’effetto positivo.
  Jede Regel, die so viel Eile mit sich bringt, wird meiner Meinung nach den positiven Effekt zerstören.
