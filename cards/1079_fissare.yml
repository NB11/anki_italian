Rang: 1079
Wort: fissare
Wortart: vt
Wort mit Artikel: fissare
Femininum / Plural: ''
IPA: ''
Definition: fixieren, anstarren, starren
Register: ''
Beispielsätze: |-
  Il direttore *fissa* la telecamera con uno sguardo nervoso.
  Der Direktor starrt die Videokamera mit einem *nervösen* Blick an.
  
  Gli animali nel laboratorio non osano *fissare* gli studenti militari.
  Die Tiere im Labor wagen es nicht, die *militärischen* Studenten anzustarren.
  
  Ho giurato di non *fissare* più la bottiglia di vino vuota.
  Ich habe geschworen, die leere Weinflasche nicht mehr *anzustarren*.
  
  Ha *fissato* la pagina del libro per venti minuti senza leggere una parola.
  Er hat die Seite des Buches zwanzig Minuten *fixiert*, ohne ein Wort zu lesen.
  
  Se continueranno a *fissare* il sole direttamente, rischiano danni agli occhi.
  Wenn sie die Sonne weiterhin direkt *fixieren*, riskieren sie Schäden an den Augen.
