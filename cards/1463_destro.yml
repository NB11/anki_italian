Rang: 1463
Wort: destro
Wortart: adj
Wort mit Artikel: destro
Femininum / Plural: ''
IPA: ''
Definition: rechts, recht
Register: ''
Beispielsätze: |-
  La mano *destra* è più forte di quella sinistra per la maggior parte delle persone.
  Die *rechte* Hand ist für die meisten Menschen stärker als die linke.
  
  Ho perso il portafoglio nella tasca *destra* della mia giacca preferita.
  Ich habe die Geldbörse in der *rechten* Tasche meiner Lieblingsjacke verloren.
  
  Se vuoi definire il lato *destro* dell’edificio, guarda la corte interna.
  Wenn du die *rechte* Seite des Gebäudes festlegen willst, schau in den inneren Hof.
  
  Mi ha detto che il suo gatto ha un occhio *destro* di colore diverso.
  Er hat mir gesagt, dass seine Katze ein *rechtes* Auge in einer anderen Farbe hat.
  
  Prima di giungere alla stazione, svoltiamo a *destra* verso l’azienda vicino all’aeroporto?
  Sollen wir *rechts* abbiegen zum Unternehmen nahe dem Flughafen, bevor wir am Bahnhof ankommen?
