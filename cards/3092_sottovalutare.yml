Rang: 3092
Wort: sottovalutare
Wortart: vt
Wort mit Artikel: sottovalutare
Femininum / Plural: ''
IPA: ''
Definition: unterschätzen, verharmlosen
Register: ''
Beispielsätze: |-
  Non *sottovalutare* mai l’importanza di una buona preparazione prima di un esame.
  Unterschätze nie die Wichtigkeit einer guten Vorbereitung vor einer Prüfung.
  
  Se avessi *sottovalutato* il problema prima, ora non saremmo in questa situazione.
  Hätte ich das Problem früher *unterschätzt*, wären wir jetzt nicht in dieser Situation.
  
  È pericoloso *sottovalutare* i rischi di un’attività estrema come il bungee jumping.
  Es ist gefährlich, die Risiken einer Extremsportart wie Bungee-Jumping zu *unterschätzen*.
  
  Molti *sottovalutano* l’impegno necessario per imparare una lingua straniera fluentemente.
  Viele *unterschätzen* den Aufwand, der nötig ist, um eine Fremdsprache fließend zu lernen.
  
  Dicono che il destino ci metterà alla prova, ma non dobbiamo *sottovalutare* le nostre capacità.
  Sie sagen, das Schicksal wird uns auf die Probe stellen, doch wir dürfen unsere Fähigkeiten nicht *unterschätzen*.
