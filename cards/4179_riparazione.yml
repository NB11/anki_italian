Rang: 4179
Wort: riparazione
Wortart: n.f
Wort mit Artikel: la riparazione
Femininum / Plural: riparazioni
IPA: ''
Definition: die Reparatur, -en
Register: ''
Beispielsätze: |-
  Dopo l’incidente abbiamo dovuto fare una *riparazione* urgente alla macchina.
  Nach dem Unfall mussten wir eine *Reparatur* am Auto dringend durchführen.
  
  Senza la *riparazione* del tetto, l’appartamento diventerà inabitabile.
  Ohne die *Reparatur* des Daches wird die Wohnung unbewohnbar.
  
  La *riparazione* del computer è costata quasi quanto un modello nuovo.
  Die *Reparatur* des Computers hat fast so viel gekostet wie ein neues Modell.
  
  Ho chiamato un tecnico perché la *riparazione* del telefono richiede pazienza.
  Ich habe einen Techniker angerufen, weil die *Reparatur* des Telefons Geduld erfordert.
  
  Le officine offrono anche servizi di *riparazione* rapida per piccoli guasti.
  Die Werkstätten bieten auch schnelle *Reparatur*-Dienste für kleine Schäden an.
