Rang: 4311
Wort: scontrare
Wortart: v
Wort mit Artikel: scontrare
Femininum / Plural: ''
IPA: ''
Definition: zusammenstoßen, kollidieren
Register: ''
Beispielsätze: |-
  I due treni sono *scontrati* vicino alla stazione perché il semaforo non funzionava.
  Die beiden Züge sind *zusammen*gestoßen*, weil die Ampel nicht funktionierte.
  
  Se *scontreremo* le mani, creeremo uno strano suono che sembra quello di un applauso.
  Wenn wir die Hände *zusammen*schlagen*, entsteht ein seltsames Geräusch, das wie Klatschen klingt.
  
  Il camionista ha cercato di evitare l’ostacolo, ma purtroppo ha *scontrato* un albero lungo la strada.
  Der LKW-Fahrer hat versucht, das Hindernis zu umfahren, aber leider ist er gegen einen Baum gefahren.
  
  Quando i due rivali si sono finalmente incontrati, non si sono salutati, ma si sono semplicemente *scontrati* con lo sguardo.
  Als sich die beiden Rivalen schließlich trafen, begrüßten sie sich nicht, sondern *stießen* sich nur mit den Blicken zusammen.
  
  Nel libro si racconta che i due personaggi storici si *scontrarono* più volte a causa di ideologie opposte.
  Im Buch wird erzählt, dass sich die beiden historischen Figuren mehrmals aufgrund gegensätzlicher Ideologien *gegenseitig blockierten*.
