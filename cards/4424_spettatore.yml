Rang: 4424
Wort: spettatore
Wortart: n.m
Wort mit Artikel: lo spettatore
Femininum / Plural: gli spettatori
IPA: ''
Definition: der Zuschauer, -
Register: ''
Beispielsätze: |-
  In teatro ci sono *spettatori* che applaudono entusiasti dopo lo spettacolo.
  Im Theater gibt es *Zuschauer*, die begeistert nach der Vorstellung applaudieren.
  
  Lo *spettatore* che aveva prenotato il posto migliore è arrivato in ritardo.
  Der *Zuschauer*, der den besten Platz gebucht hatte, kam zu spät.
  
  Se tu fossi *spettatore*, ti piacerebbe vedere un film in lingua originale?
  Wenn du *Zuschauer* wärst, würdest du einen Film in Originalsprache sehen wollen?
  
  Gli *spettatori* che fischiano durante lo spettacolo non sono educati.
  Die *Zuschauer*, die während der Vorstellung pfeifen, sind nicht höflich.
  
  Lo *spettatore* che aveva perso l’inizio dello spettacolo ha dovuto aspettare che finisse la prima scena.
  Der *Zuschauer*, der den Anfang der Vorstellung verpasst hatte, musste warten, bis die erste Szene zu Ende war.
