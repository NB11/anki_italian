Rang: 3254
Wort: aglio
Wortart: n.m
Wort mit Artikel: lo aglio
Femininum / Plural: agli
IPA: ''
Definition: der Knoblauch, -e
Register: ''
Beispielsätze: |-
  Il soffritto non è perfetto senza un po' di *aglio* tritato.
  Die Suppenbasis ist nicht perfekt ohne ein bisschen *Knoblauch*.
  
  Sai che ho *aglio* in polvere anche per la pasta?
  Weißt du, dass ich auch Knoblauchpulver für die Nudeln habe?
  
  Nonostante l'*aglio* che mangi, non hai l'alito cattivo!
  Trotz des Knoblauchs, den du isst, hast du keinen Mundgeruch!
  
  Se vuoi evitare l'*aglio*, puoi sostituirlo con le erbe aromatiche.
  Wenn du den Knoblauch vermeiden willst, kannst du ihn durch Kräuter ersetzen.
  
  Mi hanno regalato un sacchetto di *agli* biologici dal mercato locale.
  Man hat mir einen Beutel biologischen *Knoblauchs* vom Wochenmarkt geschenkt.
