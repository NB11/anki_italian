Rang: 4135
Wort: indirizzare
Wortart: vt
Wort mit Artikel: indirizzare
Femininum / Plural: ''
IPA: ''
Definition: adressieren, lenken, leiten
Register: ''
Beispielsätze: |-
  Ti prego di *indirizzare* la lettera al nuovo indirizzo prima di inviarla.
  Bitte *adressiere* den Brief an die neue Adresse, bevor du ihn abschickst.
  
  Il sindaco vuole *indirizzare* gli investimenti verso il cantiere pubblico.
  Der Bürgermeister will die Investitionen in die öffentliche Baustelle *lenken*.
  
  Se non sapessi dove andare, ti aiuterò a *indirizzare* le tue preoccupazioni verso una soluzione.
  Wenn du nicht wüsstest, wohin du gehen sollst, würde ich dir helfen, deine Sorgen zu einer Lösung zu *leiten*.
  
  Il professore ha spiegato che dobbiamo *indirizzare* la nostra ricerca su temi attuali.
  Der Professor hat erklärt, dass wir unsere Forschung auf aktuelle Themen *ausrichten* müssen.
  
  Hanno deciso di *indirizzare* gli aiuti umanitari ai paesi colpiti dalla guerra.
  Sie haben beschlossen, die humanitäre Hilfe in die von Krieg betroffenen Länder zu *leiten*.
