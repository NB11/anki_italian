Rang: 2560
Wort: shock
Wortart: n.m
Wort mit Artikel: lo shock
Femininum / Plural: shock
IPA: ''
Definition: der Schock, -s
Register: ''
Beispielsätze: |-
  Il suo comportamento ha causato *uno shock* a tutti i presenti.
  Sein Verhalten hat bei *allen Anwesenden* einen Schock ausgelöst.
  
  Dopo l’*shock* del fallimento, decise di cambiare vita.
  Nach dem *Schock* des Scheiterns beschloss sie, ihr Leben zu ändern.
  
  Non riesco a credere che sia successo davvero: è stato uno *shock* troppo grande!
  Ich kann nicht glauben, dass es wirklich passiert ist – das war ein zu großer *Schock*!
  
  Hanno subito *uno shock* emotivo quando hanno saputo la notizia.
  Sie erlitten einen emotionalen *Schock*, als sie die Nachricht erfuhren.
  
  L’*shock* della guerra ha lasciato tracce profonde nella sua personalità.
  Der *Schock* des Krieges hat tiefe Spuren in seiner Persönlichkeit hinterlassen.
