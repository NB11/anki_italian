Rang: 4681
Wort: spray
Wortart: n.m
Wort mit Artikel: lo spray
Femininum / Plural: spray
IPA: ''
Definition: das Spray, -s
Register: ''
Beispielsätze: |-
  Ho comprato dello *spray* per i capelli perché i miei sono troppo crespi.
  Ich habe *Spray* für meine Haare gekauft, weil sie zu strubbelig sind.
  
  Non toccare il *spray* mentre spruzza, altrimenti si rovina tutto!
  Fass das *Spray* nicht an, während es sprüht, sonst wird alles ruiniert!
  
  Domani comprerò dello *spray* insetticida per il giardino, ci sono troppe zanzare.
  Morgen kaufe ich *Spray* gegen Mücken für den Garten, es gibt zu viele.
  
  Se vuoi ravvivare la pianta, spruzzale uno strato sottile di *spray* fogliare ogni settimana.
  Wenn du die Pflanze beleben willst, sprühst du jede Woche eine dünne Schicht *Spray* auf die Blätter.
  
  Nello *spray* per il deodorante ci sono spesso alcol e profumi sintetici, che possono irritare la pelle.
  In *Spray*-Deos sind oft Alkohol und synthetische Duftstoffe enthalten, die die Haut reizen können.
