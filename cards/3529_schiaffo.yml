Rang: 3529
Wort: schiaffo
Wortart: n.m
Wort mit Artikel: lo schiaffo
Femininum / Plural: schiaffi
IPA: ''
Definition: die Ohrfeige, -n
Register: ''
Beispielsätze: |-
  Non sopporto quando qualcuno mi dà uno *schiaffo* senza motivo.
  Ich ertrage es nicht, wenn mir jemand einfach eine *Ohrfeige* gibt.
  
  Se hai fatto un errore così grave, meriti proprio uno *schiaffo*!
  Wenn du so einen schweren Fehler gemacht hast, hast du dir wirklich eine *Ohrfeige* verdient!
  
  Ho ricevuto uno *schiaffo* così forte che mi ha girato la testa per un attimo.
  Ich habe eine *Ohrfeige* bekommen, die so stark war, dass mir für einen Moment schwindelig wurde.
  
  Nonostante tutto, non mi pento di aver dato uno *schiaffo* a quel bullo.
  Trotz allem bereue ich nicht, dem Tyrannen eine *Ohrfeige* gegeben zu haben.
  
  Mi hai detto che non avresti mai alzato un dito su di me, e invece mi hai dato uno *schiaffo*!
  Du hast mir gesagt, du würdest mich nie schlagen, und dann gibst du mir eine *Ohrfeige*!".
