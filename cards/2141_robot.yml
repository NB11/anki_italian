Rang: 2141
Wort: robot
Wortart: n.m
Wort mit Artikel: il robot
Femininum / Plural: robot
IPA: ''
Definition: der Roboter, -
Register: ''
Beispielsätze: |-
  Il *robot* costruito da Luca è in grado di svolgere compiti molto delicati.
  Der *Roboter*, der von Luca gebaut wurde, kann sehr heikle Aufgaben erfüllen.
  
  Ho visto un *robot* che aiuta gli anziani nelle case di riposo.
  Ich habe einen *Roboter* gesehen, der älteren Menschen in Pflegeheimen hilft.
  
  Se avessi un *robot*, lo userei per sistemare la stanza senza fatica.
  Wenn ich einen *Roboter* hätte, würde ich ihn benutzen, um das Zimmer mühelos aufzuräumen.
  
  Il tecnico ha detto che il *robot* non funziona perché la batteria è scarica.
  Der Techniker sagte, dass der *Roboter* nicht funktioniert, weil die Batterie leer ist.
  
  Credo che il *robot* che abbiamo ordinato arriverà domani mattina.
  Ich glaube, dass der *Roboter*, den wir bestellt haben, morgen früh ankommt.
