Rang: 3035
Wort: nuvola
Wortart: n.f
Wort mit Artikel: la nuvola
Femininum / Plural: nuvole
IPA: ''
Definition: die Wolke, -n
Register: ''
Beispielsätze: |-
  Quando vedi una *nuvola* così scura, preparati alla pioggia.
  Wenn du eine so dunkle *Wolke* siehst, bereite dich auf Regen vor.
  
  Ho sempre sognato di viaggiare tra le *nuvole* su un dirigibile.
  Ich habe immer davon geträumt, zwischen den *Wolken* in einem Luftschiff zu reisen.
  
  Nonostante la *nuvola* di incertezza, abbiamo deciso di procedere con il progetto.
  Trotz der *Wolke* der Unsicherheit haben wir beschlossen, mit dem Projekt fortzufahren.
  
  Se domani non ci sarà nessuna *nuvola*, potremo organizzare una gita in montagna.
  Wenn morgen keine *Wolke* am Himmel sein wird, können wir einen Ausflug ins Gebirge machen.
  
  La *nuvola* di fumo che si alzava dal camino attirava l’attenzione di tutti i passanti.
  Die *Wolke* aus Rauch, die aus dem Schornstein aufstieg, zog die Aufmerksamkeit aller Vorbeigehenden auf sich.
