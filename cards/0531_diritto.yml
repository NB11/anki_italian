Rang: 531
Wort: diritto
Wortart: n.m
Wort mit Artikel: il diritto
Femininum / Plural: diritti
IPA: ''
Definition: das Recht, -e
Register: ''
Beispielsätze: |-
  In Italia, *diritto* di voto è un diritto fondamentale.
  In Italien ist das Wahlrecht ein grundlegendes *Recht*.
  
  Ha perso il *diritto* di guidare dopo l’incidente.
  Er hat sein *Recht* zu fahren nach dem Unfall verloren.
  
  Vorrei sapere se ho il *diritto* a un rimborso.
  Ich möchte wissen, ob ich ein *Recht* auf Rückerstattung habe.
  
  Non è giusto che tu non abbia nessun *diritto* in questa situazione.
  Es ist nicht fair, dass du in dieser Situation kein *Recht* hast.
  
  Hanno modificato il *diritto* del lavoro per proteggere i dipendenti.
  Man hat das Arbeits*recht* geändert, um die Arbeitnehmer zu schützen.
