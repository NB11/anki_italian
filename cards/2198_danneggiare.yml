Rang: 2198
Wort: danneggiare
Wortart: v
Wort mit Artikel: danneggiare
Femininum / Plural: ''
IPA: ''
Definition: schaden, beschädigen, beeinträchtigen
Register: ''
Beispielsätze: |-
  Se *danneggi* la macchina, dovrai pagare la riparazione.
  Wenn du das Auto *beschädigst*, musst du die Reparatur zahlen.
  
  Hanno *danneggiato* il dipinto durante il trasloco, ma per fortuna è ancora riconoscibile.
  Sie haben das Gemälde während des Umzugs *beschädigt*, aber es ist zum Glück noch erkennbar.
  
  L’inquinamento può *danneggiare* gravemente la salute dei polmoni.
  Verschmutzung kann die Gesundheit der *Lunge* stark beeinträchtigen.
  
  Credi che la democrazia possa *danneggiarsi* con le fake news?
  Glaubst du, die Demokratie kann durch Fake News *geschädigt* werden?
  
  Se *danneggiassi* il contratto, perderesti tutti i diritti che ti spettano.
  Wenn du den Vertrag *beschädigen* würdest, würdest du alle dir zustehenden Rechte verlieren.
