Rang: 4624
Wort: poveraccio
Wortart: n.m
Wort mit Artikel: il poveraccio
Femininum / Plural: poveracci
IPA: ''
Definition: armer Teufel, elender Kerl
Register: ''
Beispielsätze: |-
  Guarda *poveraccio*, ancora una volta solo al bar da solo con il suo bicchiere di vino rosso!
  Schau mal *den armen Teufel*, schon wieder allein in der Bar mit seinem Glas Rotwein!
  
  Quel *poveraccio* ha perso tutto al gioco d’azzardo e ora chiede l’elemosina per strada.
  Dieser *elende Kerl* hat alles im Glücksspiel verloren und bettelt jetzt auf der Straße.
  
  Se avessi saputo che eri un *poveraccio* come lui, non ti avrei mai prestato quei soldi.
  Wenn ich gewusst hätte, dass du ein *armer Teufel* bist wie er, hätte ich dir das Geld nie geliehen.
  
  Il *poveraccio* ha lavorato dodici ore al giorno senza mai lamentarsi, ma nessuno gli ha mai detto grazie.
  Der *arme Kerl* hat zwölf Stunden am Tag gearbeitet, ohne sich jemals zu beschweren, aber niemand hat sich jemals bei ihm bedankt.
  
  Speriamo che domani il *poveraccio* trovi finalmente un lavoro dignitoso e possa smettere di vivere in questa miseria.
  Hoffentlich findet der *elende Kerl* morgen endlich eine anständige Arbeit und kann aufhören, in diesem Elend zu leben.
