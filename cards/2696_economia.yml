Rang: 2696
Wort: economia
Wortart: n.f
Wort mit Artikel: la economia
Femininum / Plural: economie
IPA: ''
Definition: die Wirtschaft, -en
Register: ''
Beispielsätze: |-
  La *economia* italiana sta crescendo lentamente negli ultimi anni.
  Die *Wirtschaft* Italiens wächst in den letzten Jahren langsam.
  
  Dopo la crisi, molti datori di lavoro hanno dovuto licenziare molti dipendenti e la *economia* ne ha sofferto molto.
  Nach der Krise mussten viele Arbeitgeber viele Angestellte entlassen und die *Wirtschaft* hat darunter stark gelitten.
  
  Se la *economia* non migliora presto, il governo dovrà introdurre nuove riforme.
  Wenn sich die *Wirtschaft* nicht bald verbessert, muss die Regierung neue Reformen einführen.
  
  Gli economisti hanno previsto che la *economia* subirà un calo nei prossimi mesi.
  Die Ökonomen haben vorhergesagt, dass die *Wirtschaft* in den kommenden Monaten einen Rückgang erleiden wird.
  
  Nonostante le difficoltà, la *economia* locale sta cercando di adattarsi alle nuove condizioni di mercato.
  Trotz der Schwierigkeiten versucht die lokale *Wirtschaft*, sich an die neuen Marktbedingungen anzupassen.
