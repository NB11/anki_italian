Rang: 4376
Wort: sabotare
Wortart: vt
Wort mit Artikel: sabotare
Femininum / Plural: ''
IPA: ''
Definition: sabotieren, untergraben
Register: ''
Beispielsätze: |-
  I *sabotano* deliberatamente il progetto per far fallire la sua carriera.
  Sie *untergraben* gezielt das Projekt, um seine Karriere zu Fall zu bringen.
  
  Abbiamo scoperto che qualcuno ha *sabotato* i server della nostra azienda.
  Wir haben herausgefunden, dass jemand die *Server* unseres Unternehmens untergraben hat.
  
  Se non *sabotassi* le sue idee, forse qualcuno le ascolterebbe veramente.
  Wenn ich seine Ideen nicht *untergraben* würde, würde ihm vielleicht wirklich jemand zuhören.
  
  Il governo accusa gli oppositori di *sabotare* le infrastrutture critiche per destabilizzare il paese.
  Die Regierung wirft den Oppositionellen vor, die kritischen Infrastruktur *zu untergraben*, um das Land zu destabilisieren.
  
  Le vecchie fotografie *sabotano* la nostra memoria, rendendo difficile distinguere la verità dalle illusioni.
  Die alten Fotos *untergraben* unser Gedächtnis und machen es schwer, Wahrheit von Illusionen zu unterscheiden.
