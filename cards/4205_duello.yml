Rang: 4205
Wort: duello
Wortart: n.m
Wort mit Artikel: il duello
Femininum / Plural: duelli
IPA: ''
Definition: der Zweikampf, -kämpfe
Register: ''
Beispielsätze: |-
  Nel Medioevo un *duello* era spesso l'unico modo per risolvere una disputa legale.
  Im Mittelalter war ein *Zweikampf* oft die einzige Möglichkeit, eine rechtliche Streitigkeit zu lösen.
  
  Nonostante i rischi, molti accettano la sfida di un *duello* pur di difendere il proprio onore.
  Trotz der Risiken nehmen viele die Herausforderung eines *Zweikampfs* an, um ihre Ehre zu verteidigen.
  
  Se vuoi che il *duello* avvenga in modo equo, dovresti scegliere un’arma che entrambi padroneggiano.
  Falls der *Zweikampf* fair ablaufen soll, müsstest du eine Waffe wählen, die beide beherrschen.
  
  Il film racconta la storia di due amici che finiscono per affrontarsi in un *duello* all’alba.
  Der Film erzählt die Geschichte zweier Freunde, die sich schließlich bei einem *Zweikampf* bei Tagesanbruch gegenüberstehen.
  
  La legge vieta i *duelli* in molti paesi, considerando questa pratica come un reato grave.
  In vielen Ländern verbietet das Gesetz *Zweikämpfe* und betrachtet diese Praxis als schweres Verbrechen.
