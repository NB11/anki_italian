Rang: 1662
Wort: armare
Wortart: vt
Wort mit Artikel: armare
Femininum / Plural: ''
IPA: ''
Definition: bewaffnen, ausrüsten, bewaffnen
Register: ''
Beispielsätze: |-
  Il capitano decise di *armare* la nave prima della partenza per proteggerla dai pirati.
  Der Kapitän beschloss, das Schiff vor der Abfahrt zu *bewaffnen*, um es vor Piraten zu schützen.
  
  Se avessimo saputo del pericolo, avremmo *armato* i soldati molto prima.
  Wenn wir die Gefahr gekannt hätten, hätten wir die Soldaten viel früher *bewaffnet*.
  
  Il governo sta cercando di *armare* le forze di polizia contro il traffico illegale.
  Die Regierung versucht, die Polizeikräfte gegen den illegalen *Verkehr* zu bewaffnen.
  
  Per eseguire *armare* l’esercito in così poco tempo servono molti mezzi.
  Um das Militär in so kurzer Zeit zu *bewaffnen*, braucht es viele Ressourcen.
  
  Anche se non volevano, dovettero *armare* i volontari per difendere il villaggio dai ladri.
  Auch wenn sie es nicht wollten, mussten sie die Freiwilligen *bewaffnen*, um das Dorf vor den Dieben zu verteidigen.
