Rang: 1868
Wort: caricare
Wortart: vt
Wort mit Artikel: caricare
Femininum / Plural: ''
IPA: ''
Definition: laden, aufladen, beladen
Register: ''
Beispielsätze: |-
  Devo *caricare* la batteria del mio telefono perché è quasi scarica.
  Ich muss die Batterie meines Handys *aufladen*, weil sie fast leer ist.
  
  Mio fratello lavora nel porto e spesso deve *caricare* e scaricare le merci dai carri.
  Mein Bruder arbeitet im Hafen und muss oft die Waren von den *Wagen* beladen und entladen.
  
  Se non avessi dimenticato lo zaino, anch’io *caricherei* la macchina fotografica per scattare alcune foto all’alba.
  Wenn ich den Rucksack nicht vergessen hätte, würde ich auch die Kamera *laden*, um einige Fotos beim Sonnenaufgang zu machen.
  
  Il camionista promise che avrebbe *caricato* tutto il necessario prima di partire per il viaggio lungo.
  Der LKW-Fahrer versprach, dass er alles Nötige *laden* würde, bevor er zur langen Fahrt aufbrach.
  
  Nonostante le difficoltà, gli operai riuscirono a *caricare* il macchinario pesante sul treno merci.
  Trotz der *Schwierigkeiten* gelang es den Arbeitern, die schwere Maschine auf den Güterzug zu laden.
