Beispielsätze: |-
  Quando vedi *lo stop*, devi fermarti immediatamente.
  Wenn du den *Stopp* siehst, musst du sofort anhalten.
  
  L’agente ha chiesto di *stoppare* la macchina per un controllo di routine.
  Der Beamte hat den Fahrer gebeten, das Auto für eine Routinekontrolle *an*zuhalten.
  
  Nel traffico cittadino ci sono troppi *stop* che rallentano il cammino.
  Im Stadtverkehr gibt es zu viele *Halte*, die den Weg verlangsamen.
  
  Se non rispetti *lo stop*, potresti causare un incidente grave.
  Wenn du den *Stopp* ignorierst, könntest du einen schweren Unfall verursachen.
  
  Il cartello *stop* era coperto dalla neve, ma il conducente l’ha comunque visto.
  Das *Stopp*-Schild war vom Schnee verdeckt, doch der Fahrer hat es trotzdem erkannt.
