Rang: 1511
Wort: costume
Wortart: n.m
Wort mit Artikel: il costume
Femininum / Plural: costumi
IPA: ''
Definition: das Kostüm, -e
Register: ''
Beispielsätze: |-
  Per *costume* di Halloween indosserò un abito da strega con un cappello a punta.
  Für das *Kostüm* an Halloween werde ich ein Hexenkostüm mit spitzer Mütze tragen.
  
  Ho comprato un *costume* in prestito da un’agenzia di travestimenti perché non volevo spendere troppo.
  Ich habe ein *Kostüm* als Leihgabe von einer Verkleidungsagentur gemietet, weil ich nicht zu viel ausgeben wollte.
  
  Il *costume* che hai scelto è molto adatto alla festa, ma forse troppo stretto per ballare.
  Das *Kostüm*, das du ausgewählt hast, passt sehr gut zum Fest, ist aber vielleicht zu eng zum Tanzen.
  
  Spero che il *costume* da clown che ho ordinato online arrivi in tempo per il compleanno di mio figlio.
  Ich hoffe, dass das Clown-*Kostüm*, das ich online bestellt habe, rechtzeitig zum Geburtstag meines Sohnes ankommt.
  
  Se avessi un *costume* adatto, potrei partecipare anche io alla sfilata di carnevale, ma ora non lo trovo più!
  Wenn ich ein passendes *Kostüm* hätte, könnte ich auch an der Karnevalsumzug teilnehmen, aber jetzt finde ich keins mehr!
