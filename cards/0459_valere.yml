Femininum / Plural: ''
IPA: ''
Definition: gelten, wert sein
Register: ''
Beispielsätze: |-
  Questo coupon *vale* venti euro.
  Dieser Gutschein *gilt* zwanzig Euro.
  
  Per questo lavoro *valgono* le tue competenze.
  Für diese Arbeit *zählen* deine Fähigkeiten.
  
  Se ne *valesse* la pena, ci andrei.
  Wenn es sich *lohnen* würde, würde ich hingehen.
  
  I principi che *valgono* per tutti devono essere rispettati.
  Die *geltenden* Prinzipien für alle müssen eingehalten werden.
  
  Quanto *vale* la tua opinione per te?
  Wie viel *wertschätzt* du deine eigene Meinung?
