Rang: 3380
Wort: festival
Wortart: n.m
Wort mit Artikel: il festival
Femininum / Plural: i festival
IPA: ''
Definition: das Festival, -s
Register: ''
Beispielsätze: |-
  Il *festival* si terrà in settembre, come ogni anno.
  Das *Festival* findet im September statt, wie jedes Jahr.
  
  Dopo avere partecipato al *festival*, ero così stanco che sono andato a letto presto.
  Nach der Teilnahme am *Festival* war ich so erschöpft, dass ich früh ins Bett ging.
  
  Ho visto che hanno annunciato il programma del prossimo *festival*.
  Ich habe gesehen, dass sie das Programm des nächsten *Festivals* angekündigt haben.
  
  Se organizzeranno un *festival* jazz, ci andrò sicuramente.
  Falls sie ein Jazz-*Festival* organisieren, werde ich sicher hingehen.
  
  Nonostante la pioggia, il *festival* è andato avanti come previsto.
  Trotz des Regens ging das *Festival* wie geplant weiter.
