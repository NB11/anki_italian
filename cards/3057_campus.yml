Rang: 3057
Wort: campus
Wortart: n.m
Wort mit Artikel: il campus
Femininum / Plural: campus
IPA: ''
Definition: der Campus, Campusse
Register: ''
Beispielsätze: |-
  Gli studenti si incontrano spesso nel *campus* dell'università per studiare insieme.
  Die Studenten treffen sich oft auf dem *Campus* der Universität, um zusammen zu lernen.
  
  Se non avessi perso il treno, sarei arrivato al *campus* in anticipo.
  Wenn ich den Zug nicht verpasst hätte, wäre ich *auf dem Campus* früher angekommen.
  
  Il rettore vuole che tutti i dipartimenti siano centralizzati in un unico *campus* moderno.
  Der Rektor möchte, dass alle Abteilungen in einem modernen *Campus* zentralisiert werden.
  
  Mentre passeggiavo nel *campus*, ho visto un gruppo di ricercatori discutere animatamente.
  Während ich über den *Campus* spazierte, sah ich eine Gruppe von Forschern heftig diskutieren.
  
  Domani organizzeremo una festa all'aperto nel *campus* per celebrare la fine dell'anno accademico.
  Morgen werden wir eine Gartenparty auf dem *Campus* veranstalten, um das Ende des akademischen Jahres zu feiern.
