Rang: 478
Wort: fondo
Wortart: n.m
Wort mit Artikel: il fondo
Femininum / Plural: i fondi
IPA: ''
Definition: der Boden, Grund
Register: ''
Beispielsätze: |-
  Ho trovato le chiavi *sul fondo* della scatola.
  Ich habe den Schlüssel *am Boden* der Schachtel gefunden.
  
  Il *fondo* del mare è coperto di sabbia.
  Der *Grund* des Meeres ist mit Sand bedeckt.
  
  Questo vino ha un *fondo* di frutta matura.
  Dieser Wein hat eine *Note* von reifem Obst.
  
  Bis *al fondo* di questa pagina trovi la risposta.
  Bis *zur Seite* unten findest du die Antwort.
  
  I *fondi* europei sostengono molti progetti in Italia.
  Die *Mittel* aus Europa unterstützen viele Projekte in Italien.
