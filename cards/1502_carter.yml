Rang: 1502
Wort: carter
Wortart: n.m
Wort mit Artikel: il carter
Femininum / Plural: carter
IPA: ''
Definition: die Tasche, -n
Register: ''
Beispielsätze: |-
  Ho comprato un nuovo *carter* per la mia bici.
  Ich habe eine neue *Tasche* für mein Fahrrad gekauft.
  
  Nel *carter* ci sono ancora gli attrezzi che ho usato ieri.
  In der *Tasche* sind noch die Werkzeuge, die ich gestern benutzt habe.
  
  Se non trovi il tuo *carter*, cerca vicino al parco dove eri diretto.
  Wenn du deine *Tasche* nicht findest, such in der Nähe des Parks, in den du gerade unterwegs warst.
  
  Stavo per *carter* quando ho sentito una voce familiare alle mie spalle.
  Ich war dabei, meine *Tasche* zu nehmen, als ich eine vertraute Stimme hinter mir hörte.
  
  Il ladro ha rubato il *carter* pieno di documenti importanti!
  Der Dieb hat die *Tasche* mit den wichtigen Dokumenten gestohlen!
