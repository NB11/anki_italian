Rang: 4468
Wort: ironico
Wortart: adj
Wort mit Artikel: ironico
Femininum / Plural: ironici, ironiche
IPA: ''
Definition: "*ironisch*, sarkastisch"
Register: ''
Beispielsätze: |-
  Il commento del professore era *ironico* e tutti hanno riso.
  Der Kommentar des Professors war *ironisch* und alle haben gelacht.
  
  Se avessi saputo che la sua risposta era *ironica*, non mi sarei arrabbiato.
  Wenn ich gewusst hätte, dass seine Antwort *ironisch* war, hätte ich mich nicht geärgert.
  
  Credo che il tuo tono sia un po’ troppo *ironico* per questa situazione.
  Ich finde, dein Tonfall ist ein bisschen zu *ironisch* für diese Situation.
  
  Era così *ironico* che nessuno sapeva se parlava sul serio o no.
  Er war so *ironisch*, dass niemand wusste, ob er es ernst meinte oder nicht.
  
  Sebbene la situazione fosse drammatica, lui rimase *ironico* fino alla fine.
  Obwohl die Situation dramatisch war, blieb er bis zum Ende *ironisch*.
