  Sie haben angekündigt, dass der *Ausflugsplan* wegen des schlechten Wetters, das sie befürchteten, geändert wird.
  
  Nonostante l'errore che ha rovinato tutto, il direttore ha infine deciso di riprendere il *programma* originale.
  Trotz des *Fehlers*, der alles ruiniert hatte, hat der Direktor schließlich beschlossen, den ursprünglichen Plan wieder aufzunehmen.
