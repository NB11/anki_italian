Beispielsätze: |-
  Ho un *programma* molto intenso per questa settimana, quindi non posso accettare altri impegni.
  Ich habe einen *sehr intensiven Plan* für diese Woche, deshalb kann ich keine weiteren Termine annehmen.
  
  Nel *programma* della conferenza ci sono due relatori americani che parleranno circa le nuove tecnologie.
  Im *Konferenzprogramm* gibt es zwei amerikanische Redner, die über neue Technologien sprechen werden.
  
