Rang: 2211
Wort: accogliere
Wortart: vt
Wort mit Artikel: accogliere
Femininum / Plural: ''
IPA: ''
Definition: aufnehmen, empfangen, willkommen heißen
Register: ''
Beispielsätze: |-
  L’hotel *accoglie* i suoi ospiti con grande gentilezza ogni venerdì.
  Das Hotel *empfängt* seine Gäste mit großer Freundlichkeit jeden Freitag.
  
  Se avessi saputo che dovevo *accogliere* tutti, avrei organizzato una festa più grande.
  Wenn ich gewusst hätte, dass ich alle *aufnehmen* sollte, hätte ich eine größere Party organisiert.
  
  Il commissario vuole *accogliere* le testimonianze di tutti i presenti prima di partire.
  Der Kommissar möchte die *Aussagen* aller Anwesenden aufnehmen, bevor er geht.
  
  Spero che domani mi *accoglieranno* con un sorriso come al solito.
  Ich hoffe, dass sie mich morgen wie gewohnt mit einem Lächeln *empfangen* werden.
  
  Per *accogliere* la primavera, abbiamo decorato il balcone con fiori colorati.
  Um den Frühling *willkommen zu heißen*, haben wir den Balkon mit bunten Blumen geschmückt.
Audio: ''
Notiz: ''
Dispersion: ''
