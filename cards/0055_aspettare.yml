Rang: 55
Wort: aspettare
Wortart: vt
Wort mit Artikel: aspettare
Femininum / Plural: ''
IPA: ''
Definition: warten auf, abwarten
Register: ''
Beispielsätze: |-
  Devo *aspettare* l’autobus per mezz’ora.
  Ich muss *auf* den Bus eine halbe Stunde *warten*.
  
  *Aspetta* un attimo, arrivo subito!
  *Warte* mal kurz, ich komme gleich!
  
  Avevo *aspettato* per due ore quando finalmente è arrivato.
  Ich hatte *zwei Stunden gewartet*, als er endlich ankam.
  
  Vuoi *aspettare* qui o preferisci venire con me?
  Willst du *hier warten* oder möchtest du mit mir kommen?
  
  Spero che tu *aspetti* con pazienza quello che sto per dirti.
  Ich hoffe, du *wartest geduldig*, was ich dir gleich sage.
