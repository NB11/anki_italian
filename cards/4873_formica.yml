Rang: 4873
Wort: formica
Wortart: n.f
Wort mit Artikel: la formica
Femininum / Plural: formiche
IPA: ''
Definition: die Ameise, -n
Register: ''
Beispielsätze: |-
  Ho visto *formica* che trasportava una foglia tre volte più grande di lei su un gradino del parco.
  Ich habe die *Ameise* gesehen, die ein Blatt transportierte, das dreimal so groß war wie sie selbst auf einer Stufe des Parks.
  
  Se non avessimo usato la colla, non saremmo riusciti ad attaccare il bordo del foglio, *formica* compresa.
  Wenn wir den Kleber nicht verwendet hätten, hätten wir den *Saum* des Blattes nicht befestigen können, nicht einmal die Ameise.
  
  Ogni estate, nel mio giardino, le *formiche* invadono la cucina e rubano tutto il cibo che trovano.
  Jeden Sommer dringen im meinem Garten die *Ameisen* in die Küche ein und stehlen alles Essen, das sie finden.
  
  Avevo paura che le *formiche* potessero danneggiare il cibo, ma in realtà erano innocue.
  Ich hatte Angst, dass die *Ameisen* das Essen beschädigen könnten, aber eigentlich waren sie harmlos.
  
  Nonostante la *formica* fosse così piccola, riuscì a sollevare un pezzo di pane molto più pesante di lei.
  Obwohl die *Ameise* so klein war, schaffte sie es, ein Stück Brot zu heben, das viel schwerer war als sie selbst.
