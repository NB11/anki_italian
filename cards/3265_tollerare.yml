Rang: 3265
Wort: tollerare
Wortart: vt
Wort mit Artikel: tollerare
Femininum / Plural: ''
IPA: ''
Definition: erdulden, tolerieren, hinnehmen
Register: ''
Beispielsätze: |-
  Non riesco a *tollerare* questo rumore fastidioso ogni mattina.
  Ich kann dieses lästige Geräusch jeden Morgen nicht *ertragen*.
  
  Se *tollerassi* di più la critica, vivresti più serenamente.
  Wenn du Kritik mehr *ertragen* würdest, würdest du gelassener leben.
  
  Ha *tollerato* la sua assenza per anni senza lamentarsi.
  Er hat ihre Abwesenheit jahrelang ohne Klagen *ertragen*.
  
  Non *tolleriamo* che si parli male di noi alle nostre spalle.
  Wir *ertragen* es nicht, wenn man schlecht über uns hinter unserem Rücken redet.
  
  Mi sorprende che tu riesca a *tollerare* un capo così ingiusto, capace di perseguitare i dipendenti.
  Es wundert mich, dass du einen so ungerechten Chef *ertragen* kannst, der seine Mitarbeiter verfolgt.
Audio: ''
Notiz: ''
Dispersion: ''
