Rang: 231
Wort: sparare
Wortart: v
Wort mit Artikel: sparare
Femininum / Plural: ''
IPA: ''
Definition: schießen, abfeuern
Register: ''
Beispielsätze: |-
  Il poliziotto ha *sparato* in aria per fermare la folla.
  Der Polizist hat *geschossen* in die Luft, um die Menge zu stoppen.
  
  *Sparerò* un colpo in onore del vincitore.
  Ich werde einen *Schuss* zur Ehre des Siegers *abfeuern*.
  
  Non vorrei *sparare*, ma devo difendermi!
  Ich möchte nicht *schießen*, aber ich muss mich verteidigen!
  
  Hanno *sparato* a un cinghiale nel bosco vicino.
  Sie haben auf einen Wildschwein im Wald *geschossen*.
  
  Se avessi un’arma, *sparerei* senza esitare.
  Wenn ich eine Waffe hätte, würde ich *abfeuern* ohne zu zögern.
