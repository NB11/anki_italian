Rang: 1249
Wort: stampa
Wortart: n.f
Wort mit Artikel: la stampa
Femininum / Plural: stampe
IPA: ''
Definition: der Druck, -e
Register: ''
Beispielsätze: |-
  La *stampa* è diventata molto veloce grazie alle nuove tecnologie.
  Der *Druck* ist dank neuer Technologien viel schneller geworden.
  
  Lui ha sempre ammirato la *stampa* di questo pittore famoso.
  Er hat den *Druck* dieses berühmten Malers schon immer bewundert.
  
  Nonostante l’errore, la *stampa* del documento era comunque leggibile.
  Trotz des Fehlers war der *Druck* des Dokuments trotzdem lesbar.
  
  Se avessi una macchina fotografica, scattarei una foto della *stampa* antica nel museo.
  Wenn ich eine Kamera hätte, würde ich ein Foto des *Drucks* im Museum machen.
  
  Dal balcone si vedeva la *stampa* di una nave che si allontanava dal porto.
  Vom Balkon aus sah man den *Druck* eines Schiffes, das sich vom Hafen entfernte.
