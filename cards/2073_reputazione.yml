Rang: 2073
Wort: reputazione
Wortart: n.f
Wort mit Artikel: la reputazione
Femininum / Plural: reputazioni
IPA: ''
Definition: der Ruf, -e
Register: ''
Beispielsätze: |-
  La *reputazione* di quella azienda è ormai rovinata dopo lo scandalo finanziario.
  Der *Ruf* dieser Firma ist nach dem Finanzskandal ruiniert.
  
  Nonostante abbia fatto un errore, non ha perso la sua *reputazione* di persona onesta.
  Trotz des Fehlers hat sie ihren *Ruf* als ehrliche Person nicht verloren.
  
  Hanno cercato di migliorare la *reputazione* del ristorante con una campagna pubblicitaria su Instagram.
  Sie haben versucht, den *Ruf* des Restaurants mit einer Werbekampagne auf Instagram zu verbessern.
  
  Se vuoi mantenere la tua *reputazione*, non dovresti accettare compromessi tanto facilmente.
  Wenn du deinen *Ruf* bewahren willst, solltest du nicht so leicht Kompromisse eingehen.
  
  La *reputazione* del professore è tale che tutti gli studenti vogliono seguire i suoi corsi.
  Der *Ruf* des Professors ist so gut, dass alle Studenten seine Kurse besuchen möchten.
