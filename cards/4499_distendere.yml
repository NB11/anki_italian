Rang: 4499
Wort: distendere
Wortart: v
Wort mit Artikel: distendere
Femininum / Plural: ''
IPA: ''
Definition: ausstrecken, entspannen
Register: ''
Beispielsätze: |-
  Dopo una lunga giornata di lavoro, mi piace *distendere* le gambe sul divano davanti alla televisione.
  Nach einem langen Arbeitstag gefällt es mir, die Beine *auszustrecken*.
  
  Nonostante lo stress, riuscì a *distendere* i muscoli con un massaggio rilassante.
  Trotz des Stresses gelang es ihm, die Muskeln mit einer entspannenden Massage *zu entspannen*.
  
  Se vuoi *distendere* la mente, prova a meditare per almeno dieci minuti al giorno.
  Wenn du den Geist *entspannen* möchtest, versuche, täglich mindestens zehn Minuten zu meditieren.
  
  L’allenatore consigliò agli atleti di *distendere* il corpo prima della partita per evitare infortuni.
  Der Trainer riet den Athleten, den Körper vor dem Spiel *auszustrecken*, um Verletzungen zu vermeiden.
  
  Quando arrivò la notizia, lei cercò di *distendere* l’atmosfera con una battuta ironica, ma nessuno rise.
  Als die Nachricht eintraf, versuchte sie, die Stimmung mit einem *ironischen* Spruch zu entspannen, aber niemand lachte.
