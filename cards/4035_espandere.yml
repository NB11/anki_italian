Rang: 4035
Wort: espandere
Wortart: v
Wort mit Artikel: espandere
Femininum / Plural: ''
IPA: ''
Definition: ausweiten, erweitern, expandieren
Register: ''
Beispielsätze: |-
  L'azienda ha deciso di *espandere* i suoi mercati all'estero per aumentare i profitti.
  Das Unternehmen hat beschlossen, seine Märkte ins Ausland zu *expandieren*, um die Gewinne zu steigern.
  
  Se vuoi *espandere* le tue conoscenze, ti consiglio di leggere libri in italiano ogni giorno.
  Wenn du deine Kenntnisse *expandieren* möchtest, rate ich dir, täglich italienische Bücher zu lesen.
  
  Il governo vorrebbe *espandere* i fondi per la ricerca scientifica, ma il parlamento ha posto il veto.
  Die Regierung hätte die Mittel für die wissenschaftliche Forschung gerne *expandiert*, doch das Parlament hat ein Veto eingelegt.
  
  Non appena avranno finito di *espandere* la rete ferroviaria, i viaggi diventeranno molto più rapidi.
  Sobald sie das Schienennetz *expandiert* haben, werden die Reisen viel schneller werden.
  
  Dubito che riusciranno a *espandere* la loro influenza in una zona così instabile.
  Ich bezweifle, dass sie ihren Einfluss in einer so instabilen Region *expandieren* können.
