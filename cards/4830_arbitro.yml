Rang: 4830
Wort: arbitro
Wortart: n.m
Wort mit Artikel: l'arbitro
Femininum / Plural: arbitri
IPA: ''
Definition: der Schiedsrichter, -
Register: ''
Beispielsätze: |-
  L'*arbitro* ha fischiato la fine della partita dopo un fallo evidente.
  Der *Schiedsrichter* hat das Spiel nach einem klaren Foul abgepfiffen.
  
  Se non ci fosse l'*arbitro*, i giocatori litigherebbero in continuazione.
  Wenn es den *Schiedsrichter* nicht gäbe, würden die Spieler ständig streiten.
  
  L'*arbitro* ha concesso il rigore dopo aver consultato il VAR.
  Der *Schiedsrichter* hat nach Konsultation des VAR einen Elfmeter gegeben.
  
  Mi hanno detto che l'*arbitro* di ieri sera era stato biasimato per le sue decisioni.
  Man hat mir gesagt, dass der *Schiedsrichter* von gestern Abend für seine Entscheidungen kritisiert wurde.
  
  L'*arbitro* deve mantenere la calma anche quando i tifosi urlano.
  Der *Schiedsrichter* muss ruhig bleiben, selbst wenn die Fans schreien.
