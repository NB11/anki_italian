Rang: 1236
Wort: ubriaco
Wortart: adj
Wort mit Artikel: ubriaco
Femininum / Plural: ''
IPA: ''
Definition: betrunken, besoffen
Register: ''
Beispielsätze: |-
  Non bevo mai alcolici perché non voglio essere *ubriaco* in pubblico.
  Ich trinke nie Alkohol, weil ich nicht *betrunken* in der Öffentlichkeit sein möchte.
  
  Stasera al massimo mi limiterò a un bicchiere di vino, non voglio rischiare di essere *ubriaco* dopo la serie.
  Heute Abend werde ich mich auf ein Glas Wein beschränken, ich will nicht *betrunken* nach der Serie sein.
  
  Se fossi *ubriaco*, non sarei in grado di guidare il mio camion fino a casa.
  Wenn ich *betrunken* wäre, könnte ich meinen Lastwagen nicht bis nach Hause fahren.
  
  La polizia ha fermato un uomo che guidava *ubriaco* e ha sequestrato il suo fucile.
  Die Polizei hat einen Mann angehalten, der *betrunken* gefahren ist, und seine Flinte beschlagnahmt.
  
  Dopo aver bevuto troppo, Marco era così *ubriaco* che non riusciva a combinare due parole.
  Nachdem Marco zu viel getrunken hatte, war er so *betrunken*, dass er nicht einmal zwei Wörter zusammenbringen konnte.
