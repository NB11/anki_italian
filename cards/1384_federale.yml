  Die *Bundes*-wahlen finden im nächsten Mai statt.
  
  Abbiamo visitato una mostra sull'organizzazione *federale* degli Stati Uniti.
  Wir haben eine Ausstellung über die *bundes*-Organisation der USA besucht.
  
  Il sistema *federale* permette alle regioni di gestire meglio le risorse locali.
  Das *Bundes*-System ermöglicht es den Regionen, Ressourcen besser zu verwalten.
