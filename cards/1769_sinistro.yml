Rang: 1769
Wort: sinistro
Wortart: adj
Wort mit Artikel: sinistro
Femininum / Plural: ''
IPA: ''
Definition: linkisch, ungeschickt, tückisch
Register: ''
Beispielsätze: |-
  Ha un modo *sinistro* di camminare, sembra che stia per cadere.
  Er hat eine *linkische* Art zu gehen, als würde er gleich umfallen.
  
  Quel rumore *sinistro* veniva dall'attico da giorni.
  Dieses *tückische* Geräusch kam tagelang vom Dachboden.
  
  Avrei preferito non assistere a una scena così *sinistra*.
  Ich hätte diese so *ungeschickte* Szene lieber nicht mitbekommen.
  
  Il suo sorriso *sinistro* mi fece venire i brividi.
  Sein *tückisches* Lächeln ließ mich erschaudern.
  
  Non giudicare le sue azioni solo perché ti sembrano *sinistre*.
  Bewerte seine Handlungen nicht nur, weil sie dir *linkisch* erscheinen.
