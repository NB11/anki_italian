Rang: 3635
Wort: tatto
Wortart: n.m
Wort mit Artikel: il tatto
Femininum / Plural: i tatuaggi
IPA: ''
Definition: die Tätowierung, -en
Register: ''
Beispielsätze: |-
  Ho fatto *tattoo* un drago sul braccio perché mi piace l’arte orientale.
  Ich habe ein *Tattoo* eines Drachen auf dem Arm gestochen, weil mir asiatische Kunst gefällt.
  
  Non sopporto chi ha *tatuaggi* su tutta la faccia.
  Ich kann es nicht leiden, wenn jemand *Tätowierungen* im ganzen Gesicht hat.
  
  Si dice che il *tattoo* si sbiadisca con il tempo se non viene curato bene.
  Man sagt, dass sich das *Tattoo* mit der Zeit verblasst, wenn man es nicht gut pflegt.
  
  L’uomo che ho visto ieri al parco aveva un *tattoo* molto particolare: una balena sulla schiena.
  Der Mann, den ich gestern im Park gesehen habe, hatte ein sehr besonderes *Tattoo*: einen Wal auf dem Rücken.
  
  Quando ero piccolo, volevo fare un *tattoo*, ma mia madre mi ha convinto a lasciar perdere.
  Als ich klein war, wollte ich mir ein *Tattoo* stechen lassen, aber meine Mutter hat mich überredet, davon abzusehen.
