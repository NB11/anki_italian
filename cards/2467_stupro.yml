Rang: 2467
Wort: stupro
Wortart: n.m
Wort mit Artikel: lo stupro
Femininum / Plural: stupri
IPA: ''
Definition: die Vergewaltigung, -en
Register: ''
Beispielsätze: |-
  Lo *stupro* è un crimine orribile che devasta le vittime per tutta la vita.
  Die *Vergewaltigung* ist ein schreckliches Verbrechen, das die Opfer ein Leben lang zerstört.
  
  L’imputato è accusato di avere commesso uno *stupro* anni fa, ma non ci sono prove definitive.
  Der Angeklagte wird beschuldigt, vor Jahren eine *Vergewaltigung* begangen zu haben, doch es gibt keine endgültigen Beweise.
  
  Nel libro si descrive uno *stupro* avvenuto durante la guerra, che ha segnato profondamente una comunità.
  In dem Buch wird eine *Vergewaltigung* beschrieben, die während des Krieges stattfand und eine Gemeinschaft tief prägte.
  
  Se avessi saputo che sarebbe successo uno *stupro*, avrei agito diversamente per proteggere quella persona.
  Wenn ich gewusst hätte, dass es zu einer *Vergewaltigung* kommen würde, hätte ich anders gehandelt, um diese Person zu schützen.
  
  È evidente che lo *stupro* viola i diritti umani fondamentali e va combattuto con ogni mezzo.
  Es ist offensichtlich, dass die *Vergewaltigung* grundlegende Menschenrechte verletzt und mit allen Mitteln bekämpft werden muss.
