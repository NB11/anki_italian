Beispielsätze: |-
  In *marzo* le giornate iniziano a farsi più lunghe e la natura sboccia.
  Im *März* werden die Tage länger und die Natur blüht auf.
  
  Quest'anno il concerto si terrà a fine *marzo* a Milano.
  Dieses Jahr findet das Konzert Ende *März* in Mailand statt.
  
  Mentre studiavo per l'esame, mi sono accorta che *marzo* era già alle porte.
  Während ich für die Prüfung lernte, merkte ich, dass *März* schon vor der Tür stand.
  
  Se avrò finito il progetto per *marzo*, potrò partire per le vacanze.
  Wenn ich das Projekt bis *März* fertig habe, kann ich in den Urlaub fahren.
  
  Spero che in *marzo* i prezzi dei voli aerei scendano almeno del 10%.
  Ich hoffe, dass die Flugpreise im *März* mindestens um 10% sinken.
