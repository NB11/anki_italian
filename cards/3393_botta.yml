Rang: 3393
Wort: botta
Wortart: n.f
Wort mit Artikel: la botta
Femininum / Plural: botte
IPA: ''
Definition: der Schlag, Hieb, Stoß
Register: ''
Beispielsätze: |-
  Ho sentito una *botta* forte quando ho sbattuto il ginocchio contro il tavolo.
  Ich habe einen *Schlag* gespürt, als ich mein Knie gegen den Tisch gestoßen habe.
  
  Nonostante la *botta* alla testa, ha continuato a giocare senza lamentarsi.
  Trotz des *Schlags* am Kopf spielte er weiter, ohne sich zu beschweren.
  
  Se ricevi una *botta* del genere, dovresti fare una radiografia.
  Wenn du so einen *Schlag* abbekommst, solltest du ein Röntgenbild machen lassen.
  
  La *botta* che gli ha dato il padre lo ha fatto cadere a terra.
  Der *Schlag*, den ihm der Vater versetzte, ließ ihn zu Boden gehen.
  
  Avrei voluto evitare quella *botta*, ma non potevo più scappare.
  Ich hätte jenen *Schlag* gern vermieden, aber ich konnte nicht mehr fliehen.
