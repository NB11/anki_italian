Rang: 1615
Wort: pane
Wortart: n.m
Wort mit Artikel: il pane
Femininum / Plural: pani
IPA: ''
Definition: das Brot, -e
Register: ''
Beispielsätze: |-
  Ho comprato *pane* fresco dal panettiere vicino alla mia casa.
  Ich habe *Brot* vom Bäcker in meiner Nähe gekauft.
  
  Non dimenticare di comprare anche *pane* integrale, la qualità è migliore.
  Vergiss nicht, auch *Vollkornbrot* zu kaufen, die Qualität ist besser.
  
  Se non mangi abbastanza *pane*, avrai fame presto, non è sufficiente per la cena.
  Wenn du nicht genug *Brot* isst, wirst du bald Hunger haben, es reicht nicht fürs Abendessen.
  
  Mi hanno detto che il *pane* di quel forno è noto per essere il migliore in città.
  Man hat mir gesagt, dass das *Brot* aus dieser Bäckerei als das beste in der Stadt bekannt ist.
  
  Nonostante la fame, non ho mangiato *pane* perché dieta, ma ho mangiato una mela quasi sufficiente.
  Trotz des Hungers habe ich *Brot* nicht gegessen, weil ich eine Diät mache, aber einen Apfel habe ich praktisch gegessen.
