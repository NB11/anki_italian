Rang: 1222
Wort: tetto
Wortart: n.m
Wort mit Artikel: il tetto
Femininum / Plural: i tetti
IPA: ''
Definition: das Dach, -¨er
Register: ''
Beispielsätze: |-
  Quest'anno *tetto* della casa è stato riparato più volte per il vento forte.
  Dach dieses Hauses wurde dieses Jahr wegen des starken Winds mehrmals repariert.
  
  Nonostante lo *tetto* rotto, l'appartamento era ancora abitabile, almeno per qualche settimana.
  Trotz des kaputten Daches war die Wohnung noch bewohnbar, zumindest für ein paar Wochen.
  
  Stavolta non oseremo salire sul *tetto* perché il vento soffia troppo forte.
  Dieses Mal werden wir es nicht wagen, auf das Dach zu steigen, weil der Wind zu stark weht.
  
  Il *tetto* della serra è fatto di vetro per permettere alla luce di entrare, ma trattiene il calore.
  Das Dach des Gewächshauses besteht aus Glas, damit Licht eindringen kann, aber die Wärme hält.
  
  Se il *tetto* non fosse fatto di pietra, la casa non resisterebbe all’inverno rigido del nord.
  Wenn das Dach nicht aus Stein wäre, würde das Haus dem harten Winter des Nordens nicht standhalten.
