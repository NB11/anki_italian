Rang: 3596
Wort: round
Wortart: n.f
Wort mit Artikel: la round
Femininum / Plural: le *round*
IPA: ''
Definition: die Runde, -n
Register: ''
Beispielsätze: |-
  Il *round* finale della partita è stato molto combattuto.
  Die *Runde* war sehr hart umkämpft.
  
  Dopo tre *round*, l'atleta era esausto e si è arreso.
  Nach drei *Runden* war der Athlet erschöpft und gab auf.
  
  Se vuoi partecipare al concorso, devi iscriverti entro il prossimo *round* di domande.
  Wenn du am Wettbewerb teilnehmen willst, musst du dich bis zur nächsten *Runde* der Fragen anmelden.
  
  Durante il *round* di interviste, lo psicologo ha notato che il candidato era leggermente ansioso.
  Wahrend der *Runde* der Interviews bemerkte der Psychologe, dass der Bewerber leicht ängstlich war.
  
  Il regolamento prevede che, dopo il secondo *round*, ci sia una pausa di dieci minuti.
  Die Regeln sehen vor, dass nach der zweiten *Runde* eine zehnminütige Pause folgt.
