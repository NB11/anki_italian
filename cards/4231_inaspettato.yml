Rang: 4231
Wort: inaspettato
Wortart: adj
Wort mit Artikel: inaspettato
Femininum / Plural: ''
IPA: ''
Definition: unerwartet, plötzlich
Register: ''
Beispielsätze: |-
  La notizia della vittoria della squadra è stata *inaspettata*.
  Die Nachricht vom Sieg der Mannschaft war *unerwartet*.
  
  Nonostante le previsioni ottimistiche, l’esito dell’incontro si è rivelato *inaspettatamente* favorevole.
  Trotz der optimistischen Prognosen stellte sich das Ergebnis des Treffens *unerwartet* günstig heraus.
  
  Abbiamo ricevuto una risposta *inaspettata* alla nostra domanda durante il colloquio.
  Wir erhielten eine *unerwartete* Antwort auf unsere Frage während des Gesprächs.
  
  Sei stato davvero *inaspettato* con quel regalo, non me l’aspettavo proprio!
  Du warst wirklich *unerwartet* mit diesem Geschenk, das hätte ich nie erwartet!
  
  Il suo arrivo *inaspettato* al funerale ha commosso tutti i presenti.
  Seine *unerwartete* Ankunft bei der Beerdigung hat alle Anwesenden gerührt.
