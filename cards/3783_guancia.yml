Rang: 3783
Wort: guancia
Wortart: n.f
Wort mit Artikel: la guancia
Femininum / Plural: guance
IPA: ''
Definition: die Wange, -n
Register: ''
Beispielsätze: |-
  La *guancia* di Maria era arrossata per il freddo intenso.
  Die *Wange* von Maria war vor der Kälte gerötet.
  
  Non mi sono mai fatto un tatuaggio sulla *guancia* perché temo il dolore.
  Ich habe mir noch nie ein Tattoo auf die *Wange* stechen lassen, weil ich die Schmerzen fürchte.
  
  Quando rideva, spuntavano due fossette sulle sue *guance*.
  Wenn sie lachte, bildeten sich zwei Grübchen auf ihren *Wangen*.
  
  Il medico le disse che aveva un leggero gonfiore sotto la *guancia* sinistra.
  Der Arzt sagte ihr, sie habe eine leichte Schwellung unter der linken *Wange*.
  
  Mi accarezzò la *guancia* con un dito, come per verificare se fossi reale.
  Er strich mir mit einem Finger über die *Wange*, als wollte er prüfen, ob ich wirklich da war.
