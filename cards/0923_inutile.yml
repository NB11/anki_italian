Definition: nutzlos, überflüssig
Register: ''
Beispielsätze: |-
  Questa *inutile* discussione ci sta facendo perdere tempo prezioso.
  Diese *nutzlose* Diskussion lässt uns wertvolle Zeit verlieren.
  
  Nonostante gli avvertimenti, ha ripetuto il suo *inutile* tentativo di convincerlo.
  Trotz der Warnungen unternahm er einen weiteren *überflüssigen* Versuch, ihn zu überzeugen.
  
  Era *inutile* cercare di aprire quella porta chiusa, ma ci provammo lo stesso.
  Es war *nutzlos*, zu versuchen, diese verschlossene Tür zu öffnen, aber wir taten es trotzdem.
  
  Tutti capirono quanto sarebbe stato *inutile* opporsi al suo progetto dopo le sue parole.
  Alle verstanden, wie *nutzlos* es gewesen wäre, sich seinem Plan nach seinen Worten zu widersetzen.
  
  Se credi che sia *inutile* studiare, allora non otterrai mai un buon risultato.
  Wenn du glaubst, dass Lernen *nutzlos* ist, wirst du nie ein gutes Ergebnis erzielen.
