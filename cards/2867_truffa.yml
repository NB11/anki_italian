Rang: 2867
Wort: truffa
Wortart: n.f
Wort mit Artikel: la truffa
Femininum / Plural: truffe
IPA: ''
Definition: der Betrug, -e
Register: ''
Beispielsätze: |-
  La polizia ha scoperto una nuova *truffa* online che coinvolge pagamenti falsi.
  Die Polizei hat einen neuen *Betrug* im Internet entdeckt, der falsche Zahlungen betrifft.
  
  Se hai pagato per quella pubblicità, hai fatto una *truffa* a te stesso!
  Wenn du für diese Werbung bezahlt hast, hast du dich selbst *betrogen*!
  
  Ha denunciato la *truffa* solo dopo aver perso tutti i suoi risparmi.
  Er hat den *Betrug* erst angezeigt, nachdem er all seine Ersparnisse verloren hatte.
  
  Nonostante le prove, lui continua a negare qualsiasi *truffa*.
  Trotz der Beweise leugnet er weiterhin jeden *Betrug*.
  
  Questa *truffa* finanziaria è così sofisticata che molti non se ne accorgono nemmeno.
  Dieser finanzielle *Betrug* ist so raffiniert, dass ihn viele gar nicht bemerken.
