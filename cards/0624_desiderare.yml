Rang: 624
Wort: desiderare
Wortart: v
Wort mit Artikel: desiderare
Femininum / Plural: ''
IPA: ''
Definition: wünschen, begehren, möchten
Register: ''
Beispielsätze: |-
  Se *desideri* visitare l'Italia, ti consiglio di partire in primavera.
  Wenn du *möchtest* Italien zu besuchen, rate ich dir, im Frühling abzureisen.
  
  Ha *desiderato* salutare la sua famiglia prima di partire per la guerra.
  Er *hat* es sich erwünscht, seine Familie vor dem Krieg zu begrüßen.
  
  Nonostante il dolore, *desideravo* rivedere quegli occhi una volta ancora.
  Trotz des Schmerzes *wünschte* ich mir diese Augen noch einmal zu sehen.
  
  Sarebbe *desiderato* che tutti mantenessero la loro parola data.
  Es wäre *erwünscht*, dass alle ihr gegebenes Wort einhalten.
  
  Perché *desideri* sempre sapere i segreti degli altri, invece di vivere la tua vita?
  Warum *begehrst* du immer die Geheimnisse der anderen zu kennen, statt dein eigenes Leben zu leben?
