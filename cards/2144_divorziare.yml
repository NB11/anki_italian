Rang: 2144
Wort: divorziare
Wortart: vi
Wort mit Artikel: divorziare
Femininum / Plural: ''
IPA: ''
Definition: sich scheiden lassen
Register: ''
Beispielsätze: |-
  Mi dispiace, ma io e mia moglie abbiamo deciso di *divorziare* dopo anni di litigi.
  Es tut mir leid, aber meine Frau und ich haben beschlossen, uns *scheiden zu lassen* nach Jahren des Streits.
  
  Se non riesci a *divorziare* legalmente in Italia, dovrai consultare un avvocato specializzato.
  Wenn du dich nicht *scheiden lassen kannst* in Italien, musst du einen spezialisierten Anwalt konsultieren.
  
  Credi che potrebbe *divorziare* dal marito solo perché non lava i piatti?
  Glaubst du, sie könnte sich *scheiden lassen* vom Ehemann nur weil er das Geschirr nicht spült?
  
  Dopo che sua moglie ebbe minacciato di *divorziare*, l'uomo decise di cambiare atteggiamento.
  Nachdem seine Ehefrau gedroht hatte, sich *scheiden zu lassen*, beschloss der Mann, sein Verhalten zu ändern.
  
  Quando avrà il coraggio di *divorziare*, finalmente vedrà se lei lo ama davvero o solo per i suoi soldi.
  Wenn er den Mut hat, sich *scheiden zu lassen*, wird er dann erst sehen, ob sie ihn wirklich liebt oder nur wegen seines Geldes.
