Femininum / Plural: ''
IPA: ''
Definition: sitzen
Register: ''
Beispielsätze: |-
  Mi piace *sedere* al parco quando il sole splende.
  Ich *sitze* gerne im Park, wenn die Sonne scheint.
  
  Hai *seduto* sulla poltrona tutto il pomeriggio?
  Hast du den ganzen Nachmittag auf dem Sessel *gesessen*?
  
  Se non ti dispiace, vorrei *sedermi* vicino alla finestra.
  Wenn es dir nichts ausmacht, möchte ich mich ans Fenster *setzen*.
  
  Dove avete *seduto* durante la conferenza?
  Wo habt ihr euch während der Konferenz *gesetzt*?
  
  Temevo che il divano fosse troppo duro, ma si *siede* molto comodamente.
  Ich fürchtete, dass die Couch zu hart wäre, aber man *sitzt* darauf sehr bequem.
