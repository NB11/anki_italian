Rang: 1813
Wort: maledire
Wortart: vt
Wort mit Artikel: maledire
Femininum / Plural: ''
IPA: ''
Definition: verfluchen, schmähen
Register: ''
Beispielsätze: |-
  Se continui a comportarti così, lo *maledirò* per sempre!
  Wenn du dich weiterhin so benimmst, werde ich ihn *verfluchen*.
  
  Il prete volle *maledire* la casa che era stata costruita su terreno consacrato.
  Der Priester wollte das Haus, das auf geweihter Erde gebaut worden war, *verfluchen*.
  
  Stavo per *maledire* il cane che aveva rovinato il mio giardino, quando mi ricordai che era solo un cucciolo.
  Ich war dabei, den Hund, der meinen Garten ruiniert hatte, zu *verfluchen*, als mir einfiel, dass er nur ein Welpe war.
  
  Nonostante tutto, non ho mai sentito nessuno *maledire* la sorte quando ha perso la partita.
  Trotz allem habe ich noch nie gehört, dass jemand das Schicksal *verflucht* hat, als er das Spiel verlor.
  
  Il regista decise di *maledire* l’attore che aveva dimenticato la battuta nel mezzo del concerto.
  Der Regisseur beschloss, den Schauspieler, der den Text mitten im Konzert vergessen hatte, zu *verfluchen*.
