Rang: 1271
Wort: pollo
Wortart: n.m
Wort mit Artikel: il pollo
Femininum / Plural: polli
IPA: ''
Definition: das Huhn, Hühner
Register: ''
Beispielsätze: |-
  Mio nonno alleva *polli* nel cortile della campagna.
  Mein Opa züchtet im *Hof* der Landschaft Hühner.
  
  Chi ha rubato il *pollo* dal frigorifero?
  Wer hat das *Huhn* aus dem Kühlschrank gestohlen?
  
  Se mangerai troppo *pollo*, avrai mal di stomaco.
  Wenn du zu viel *Huhn* isst, wirst du Bauchweh haben.
  
  Il *pollo* che abbiamo cucinato ieri era delizioso, vero?
  Das *Huhn*, das wir gestern gekocht haben, war doch lecker, oder?
  
  Nonostante il *pollo* fosse ancora crudo, l'ho mangiato per errore.
  Obwohl das *Huhn* noch roh war, habe ich es aus Versehen gegessen.
