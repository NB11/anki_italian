Rang: 1619
Wort: analisi
Wortart: n.f
Wort mit Artikel: l'analisi
Femininum / Plural: analisi
IPA: ''
Definition: die Analyse, -n
Register: ''
Beispielsätze: |-
  L'*analisi* del sangue ha rivelato un valore troppo alto del colesterolo.
  Die *Analyse* des Blutes hat einen zu hohen Cholesterinwert ergeben.
  
  Mi hanno chiesto di fare un'*analisi* approfondita dei dati raccolti finora.
  Sie haben mich gebeten, eine gründliche *Analyse* der bisher gesammelten Daten durchzuführen.
  
  Dopo l'*analisi* del progetto, il committente ha deciso di finanziare solo una parte.
  Nach der *Analisiere* des Projekts hat der Auftraggeber beschlossen, nur einen Teil zu finanzieren.
  
  Le *analisi* condotte dal laboratorio confermano la presenza di sostanze tossiche nel terreno.
  Die vom Labor durchgeführten *Analysen* bestätigen das Vorhandensein giftiger Stoffe im Boden.
  
  Senza un'*analisi* accurata non possiamo capire le cause del disastro ambientale.
  Ohne eine sorgfältige *Analyse* können wir die Ursachen der Umweltkatastrophe nicht verstehen.
