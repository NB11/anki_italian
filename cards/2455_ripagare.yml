Rang: 2455
Wort: ripagare
Wortart: vt
Wort mit Artikel: ripagare
Femininum / Plural: ''
IPA: ''
Definition: zurückzahlen, erstatten
Register: ''
Beispielsätze: |-
  Vorrei *ripagare* il favore che mi hai fatto la settimana scorsa.
  Ich möchte dir den Gefallen, den du mir letzte Woche getan hast, *zurückzahlen*.
  
  Nonostante tutto, alla fine decise di *ripagare* la fiducia che gli avevano dato.
  Trotz allem beschloss er am Ende, das Vertrauen, das man ihm *gegeben hatte*, zu erstatten.
  
  Se avessi rubato qualcosa, dovresti *ripagare* con il doppio del valore, secondo la legge.
  Wenn du etwas gestohlen hättest, müsstest du den doppelten Wert *zurückzahlen*, laut Gesetz.
  
  Vuoi davvero *ripagare* la gentilezza con la maleducazione? È veramente evidente che non è il modo giusto!
  Willst du wirklich die Freundlichkeit mit Unhöflichkeit *zurückzahlen*? Es ist offensichtlich überhaupt nicht der richtige Weg!
  
  Prometto che un giorno ti *ripagherò* per tutto il supporto che mi hai dato negli anni difficili.
  Ich verspreche dir, dass ich dir irgendwann alles Unterstützung, die du mir in den schwierigen Jahren *gegeben hast*, zurückzahlen werde.
