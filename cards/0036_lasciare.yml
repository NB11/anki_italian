Beispielsätze: |-
  Non *lasciare* la porta aperta, per favore!
  Lass die Tür bitte *nicht* *offen*!
  
  Ieri ho *lasciato* le chiavi a casa.
  Gestern habe ich die Schlüssel *zu Hause gelassen*.
  
