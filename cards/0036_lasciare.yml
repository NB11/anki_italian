Rang: 36
Wort: lasciare
Wortart: v
Wort mit Artikel: lasciare
Femininum / Plural: ''
IPA: ''
Definition: lassen, verlassen, aufhören
Register: ''
Beispielsätze: |-
  Devo *lasciare* la casa alle otto di mattina.
  Ich muss das *Haus* um acht Uhr morgens *verlassen*.
  
  *Lasciami* in pace, per favore!
  *Lass* mich bitte in Ruhe!
  
  Ha *lasciato* il lavoro senza preavviso.
  Er hat die Arbeit ohne Vorwarnung *gekündigt*.
  
  Se potessi, *lascerei* tutto e partirei per l’Italia.
  Wenn ich könnte, würde ich *aufgeben* und nach Italien fahren.
  
  È importante non *lasciare* le chiavi in macchina.
  Es ist wichtig, die Schlüssel nicht im Auto *liegen zu lassen*.
