Rang: 3030
Wort: invadere
Wortart: vt
Wort mit Artikel: invadere
Femininum / Plural: ''
IPA: ''
Definition: eindringen, überfallen, überziehen
Register: ''
Beispielsätze: |-
  I soldati hanno deciso di *invadere* il territorio nemico di notte per evitare di essere scoperti.
  Die Soldaten beschlossen, das feindliche Gebiet nachts zu *überfallen*, um nicht entdeckt zu werden.
  
  Se non avessimo agito, la malattia avrebbe potuto *invadere* tutto il corpo in poche settimane.
  Wenn wir nicht gehandelt hätten, hätte die Krankheit den ganzen Körper in wenigen Wochen *befallen* können.
  
  Il governo teme che i social media possano *invadere* la privacy dei cittadini se non vengono regolamentati.
  Die Regierung fürchtet, dass soziale Medien die Privatsphäre der Bürger *verletzen* könnten, wenn sie nicht reguliert werden.
  
  Gli storici discutono se sia stato necessario *invadere* quel regno per stabilire la pace.
  Die Historiker diskutieren, ob es notwendig war, jenes Königreich zu *erobern*, um den Frieden herzustellen.
  
  Finché non smettiamo di *invadere* gli habitat naturali, le specie animali continueranno a scomparire.
  Solange wir nicht aufhören, natürliche Lebensräume zu *zerstören*, werden Tierarten weiterhin verschwinden.
