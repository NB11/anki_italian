Rang: 2166
Wort: patata
Wortart: n.f
Wort mit Artikel: la patata
Femininum / Plural: patate
IPA: ''
Definition: die Kartoffel, -n
Register: ''
Beispielsätze: |-
  Per preparare la cena ho bisogno di tre *patate* piccole e due carote.
  Für das Abendessen brauche ich drei kleine *Kartoffeln* und zwei Karotten.
  
  Non sapevo che cucinare le *patate* al forno fosse così semplice.
  Ich wusste nicht, dass das Backen von *Kartoffeln* so einfach ist.
  
  Se avessi più tempo, ti insegnerei come coltivare le *patate* nel giardino.
  Wenn ich mehr Zeit hätte, würde ich dir zeigen, wie man *Kartoffeln* im Garten anbaut.
  
  Ha detto che le *patate* fritte della tavola calda sono le migliori della città.
  Er hat gesagt, die Pommes der Imbissbude seien die besten der Stadt.
  
  Mentre sbucciavo le *patate*, ho trovato un insetto nascosto tra di loro.
  Während ich die *Kartoffeln* schälte, entdeckte ich ein Insekt, das sich zwischen ihnen verbarg.
