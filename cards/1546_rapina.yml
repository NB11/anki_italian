Rang: 1546
Wort: rapina
Wortart: n.f
Wort mit Artikel: la rapina
Femininum / Plural: rapine
IPA: ''
Definition: der Raubüberfall, -e
Register: ''
Beispielsätze: |-
  La polizia sta indagando sulla *rapina* avvenuta ieri sera in banca.
  Die Polizei untersucht den *Raubüberfall*, der gestern Abend in der Bank stattfand.
  
  Se vedi una *rapina* in corso, chiama immediatamente il 113!
  Wenn du einen *Raubüberfall* beobachtest, rufe sofort die 113 an!
  
  Hanno rubato tutto durante la *rapina* al negozio di elettronica.
  Bei dem *Raubüberfall* im Elektronikgeschäft wurde alles gestohlen.
  
  La *rapina* è fallita perché il ladro ha fatto cadere la corda con cui aveva legato il cassiere.
  Der *Raubüberfall* scheiterte, weil der Dieb das Seil fallen ließ, mit dem er die Kassiererin gefesselt hatte.
  
  Nonostante la *rapina*, il proprietario del ristorante ha deciso di non denunciare la polizia, per non perdere tempo.
  Trotz des *Raubüberfalls* entschied sich der Restaurantbesitzer, es nicht der Polizei zu melden, um keine Zeit zu verlieren.
