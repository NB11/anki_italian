Rang: 884
Wort: naturalmente
Wortart: adv
Wort mit Artikel: naturalmente
Femininum / Plural: ''
IPA: ''
Definition: natürlich, selbstverständlich
Register: ''
Beispielsätze: |-
  Cosa pensi di questa decisione? *Naturalmente* non sono d'accordo, ma rispettiamo il giudizio del colonnello.
  Was hältst du von dieser Entscheidung? *Natürlich* bin ich nicht einverstanden, aber wir respektieren das Urteil des Obersts.
  
  Domani parto per Milano, e *naturalmente* ho già chiamato un taxi per l'aeroporto.
  Morgen fliege ich nach Mailand, und *natürlich* habe ich schon ein Taxi zum Flughafen bestellt.
  
  Se avessi saputo che era così urgente, *naturalmente* ti avrei aiutato senza esitare.
  Hätte ich gewusst, dass es so dringend war, hätte ich dir *natürlich* sofort geholfen.
  
  Non è affatto colpa tua, ed è *naturalmente* meglio così, dato che non volevi accettare quel lavoro tanto stressante.
  Es ist *natürlich* nicht deine Schuld und eigentlich besser so, da du diese stressige Arbeit eigentlich ablehnen wolltest.
  
  Dunque, *naturalmente* il professore si accorse subito della differenza tra la traccia teorica e la pratica in laboratorio.
  Also bemerkte der Professor *natürlich* sofort den Unterschied zwischen der theoretischen Spur und der Praxis im Labor.
