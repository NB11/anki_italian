Rang: 1132
Wort: lupo
Wortart: n.m
Wort mit Artikel: il lupo
Femininum / Plural: lupi
IPA: ''
Definition: der Wolf, -¨e
Register: ''
Beispielsätze: |-
  Il *lupo* ulula nella foresta durante la notte.
  Der *Wolf* heult im Wald in der Nacht.
  
  Nonostante il *lupo* fosse affamato, non attaccò gli animali del villaggio accanto.
  Trotz dass der *Wolf* hungrig war, griff er die Tiere des Dorfes nebenan nicht an.
  
  Gli scienziati avevano osservato il *lupo* per mesi prima di poterlo identificare con certezza.
  Die Wissenschaftler hatten den *Wolf* monatelang beobachtet, bevor sie ihn sicher identifizieren konnten.
  
  Se avessi saputo che il *lupo* era così vicino, non avrei portato il cane a passeggiare nel bosco.
  Wenn ich gewusst hätte, dass der *Wolf* so nah war, hätte ich den Hund nicht im Wald spazieren führen.
  
  Il *lupo*, che era stato avvistato vicino al ponte, sparì improvvisamente tra gli alberi della montagna.
  Der *Wolf*, der in der Nähe der Brücke gesichtet worden war, verschwand plötzlich zwischen den Bäumen des Berges.
