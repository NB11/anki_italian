Rang: 1894
Wort: centesimo
Wortart: n.m
Wort mit Artikel: il centesimo
Femininum / Plural: centesimi
IPA: ''
Definition: der Cent, -s
Register: ''
Beispielsätze: |-
  Ho speso solo *un centesimo* in più del previsto.
  Ich habe nur *einen Cent* mehr ausgegeben als geplant.
  
  Mi sono accorto che mi mancava *un centesimo* nel portafoglio.
  Mir ist aufgefallen, dass mir *ein Cent* im Geldbeutel fehlte.
  
  Se non avessi perso *quel centesimo*, oggi potrei comprare il biglietto.
  Wenn ich *diesen Cent* nicht verloren hätte, könnte ich heute das Ticket kaufen.
  
  Anche *un solo centesimo* conta quando si tratta di aiutare i bisognosi.
  Auch *ein einzelner Cent* zählt, wenn es darum geht, Bedürftigen zu helfen.
  
  Ho controllato cento volte se nel vassoio c’era *un centesimo* rimasto.
  Ich habe hundertmal überprüft, ob in der Schale noch *ein Cent* übrig war.
