Rang: 2937
Wort: scacco
Wortart: n.m
Wort mit Artikel: lo scacco
Femininum / Plural: gli scacchi
IPA: ''
Definition: das Schach, -¨er
Register: ''
Beispielsätze: |-
  Mio figlio ha imparato a giocare a *scacco* a sei anni.
  Mein Sohn hat mit sechs Jahren *Schach* spielen gelernt.
  
  Dopo venti mosse lo scacchista ha subito *scacco* matto.
  Nach zwanzig Zügen hat der Schachspieler *Schachmatt* erlitten.
  
  Se vuoi vincere, devi evitare di subire *scacco* in apertura.
  Wenn du gewinnen willst, musst du vermeiden, in der Eröffnung *Schach* zu bekommen.
  
  Il libro spiega i principi fondamentali dello *scacco*, anche per principianti.
  Das Buch erklärt die grundlegenden Prinzipien des *Schachs*, sogar für Anfänger.
  
  Nonostante la sua bravura, in questa partita ha ricevuto un *scacco* inaspettato.
  Trotz seiner Fähigkeit hat er in dieser Partie einen unerwarteten *Schachschlag* erhalten.
