Rang: 1875
Wort: sorriso
Wortart: n.m
Wort mit Artikel: il sorriso
Femininum / Plural: sorrisi
IPA: ''
Definition: das Lächeln, das Lachen
Register: ''
Beispielsätze: |-
  Con un *sorriso* così bello, conquisti tutti i cuori.
  Mit einem *Lächeln* so schön eroberst du alle Herzen.
  
  Non posso credere che tu abbia perso il *sorriso* dopo quella difficoltà!
  Ich kann nicht glauben, dass du dir das *Lächeln* nach dieser Schwierigkeit verloren hast!
  
  Mi dispiace, ma quel suo *sorriso* forzato tradiva la vera emozione.
  Es tut mir leid, aber dieses erzwungene *Lächeln* verriet die wahre Emotion.
  
  Avrei voluto che mi regalassi un *sorriso* invece di quella bugia.
  Ich hätte mir ein *Lächeln* gewünscht statt dieser Lüge.
  
  Appena ho visto il *sorriso* di babbo, ho capito che era tutto a posto.
  Sobald ich das *Lächeln* von Papa sah, wusste ich, dass alles in Ordnung war.
