  Morgen mache ich einen *Sprung* im Park, um den Bürgermeister zu treffen.
  
  Nonostante il disturbo, ho completato il *salto* in un centinaio di secondi.
  Trotz der *Störung* habe ich den Sprung in etwa hundert Sekunden geschafft.
  
  Se avessi più coraggio, farei un *salto* con l’aeroplano!
  Wenn ich mehr Mut hätte, würde ich einen *Sprung* mit dem Flugzeug machen!
  
  Il *salto* che ho visto al torneo è stato il più stupendo della mia vita!
