Rang: 2130
Wort: diffondere
Wortart: v
Wort mit Artikel: diffondere
Femininum / Plural: ''
IPA: ''
Definition: verbreiten, ausbreiten
Register: ''
Beispielsätze: |-
  La notizia del suo matrimonio si è *diffusa* in pochi minuti tra tutti i colleghi.
  Die Nachricht von seiner Hochzeit hat sich in wenigen Minuten unter allen Kollegen *verbreitet*.
  
  Non vorrei *diffondere* voci infondate sul tuo conto, ma la gente ne sta già parlando.
  Ich möchte keine unbegründeten Gerüchte über dich *verbreiten*, aber die Leute reden schon darüber.
  
  Si spera che questa campagna riesca a *diffondere* una maggiore consapevolezza sull’uso dei social media.
  Man hofft, dass diese Kampagne dazu beitragen kann, ein größeres Bewusstsein für die Nutzung sozialer Medien zu *verbreiten*.
  
  Il profumo si è *diffuso* per tutta la casa in pochi secondi e ha attirato l’attenzione di tutti.
  Der Duft hat sich in wenigen Sekunden im ganzen Haus *ausgebreitet* und die Aufmerksamkeit aller auf sich gezogen.
  
  Se non vogliamo *diffondere* il panico, dobbiamo agire in modo calmo e razionale.
  Wenn wir keine Panik *verbreiten* wollen, müssen wir ruhig und rational handeln.
