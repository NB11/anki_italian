Rang: 2572
Wort: spogliare
Wortart: vt
Wort mit Artikel: spogliare
Femininum / Plural: ''
IPA: ''
Definition: ausziehen, abstreifen
Register: ''
Beispielsätze: |-
  Ogni sera *spoglio* il cane dopo la passeggiata per togliere le foglie secche dal pelo.
  Jeden Abend ziehe ich den Hund nach dem Spaziergang aus, um trockene Blätter aus dem Fell zu entfernen.
  
  Se *spogli* la pianta di tutte le foglie, non potrà più fare la fotosintesi.
  Wenn du der Pflanze *entblätterst*, kann sie keine Photosynthese mehr betreiben.
  
  Il mago promise di *spogliare* il tesoro di tutti i suoi incantesimi per renderlo accessibile agli uomini.
  Der Zauberer versprach, den Schatz von allen Verzauberungen zu befreien, damit er den Menschen zugänglich wird.
  
  Non appena arrivò a casa, si mise a *spogliare* gli scatoloni del trasloco uno dopo l'altro.
  Sobald sie zu Hause ankam, begann sie, die Umzugskartons nacheinander auszupacken.
  
  Avrebbe voluto *spogliare* se stesso di ogni responsabilità, ma sapeva che era impossibile.
  Er hätte sich gern aller Verantwortung entledigt, aber er wusste, dass es unmöglich war.
