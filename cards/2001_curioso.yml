Rang: 2001
Wort: curioso
Wortart: adj
Wort mit Artikel: curioso
Femininum / Plural: ''
IPA: ''
Definition: neugierig, seltsam
Register: ''
Beispielsätze: |-
  La *curiosità* dei bambini è sempre curiosa ma a volte troppo invadente.
  Die Neugier der Kinder ist immer *neugierig*, aber manchmal zu aufdringlich.
  
  È *curioso* che tu non abbia visto il film che tutti consigliano.
  Es ist *seltsam*, dass du den Film nicht gesehen hast, den alle empfehlen.
  
  Ho fatto una domanda *curiosa* che nessuno sapeva chiarire.
  Ich habe eine *seltsame* Frage gestellt, die niemand klären konnte.
  
  Sarebbe *curioso* se non piovesse domani, ma non ci conto.
  Es wäre *komisch*, wenn es morgen nicht regnen würde, aber ich rechne nicht damit.
  
  La polizia sta cercando un uomo *curioso* che chiedeva informazioni sulla divisione delle proprietà.
  Die Polizei sucht einen *seltsamen* Mann, der nach der Aufteilung von Eigentum fragte.
