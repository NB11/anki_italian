Rang: 2558
Wort: gemello
Wortart: n.m
Wort mit Artikel: il gemello
Femininum / Plural: i gemelli
IPA: ''
Definition: der Zwilling, -e
Register: ''
Beispielsätze: |-
  Il medico ha rilevato che il paziente ha un *gemello* identico al fratello.
  Der Arzt hat festgestellt, dass der Patient einen *Zwilling* hat, der seinem Bruder identisch ist.
  
  Non sapevo che avessi un *gemello* finché non ci siamo incontrati per caso in biblioteca.
  Ich wusste nicht, dass du einen *Zwilling* hast, bis wir uns zufällig in der Bibliothek trafen.
  
  I *gemelli* di Marco sono nati prematuri, ma ora stanno benissimo.
  Die *Zwillinge* von Marco sind zu früh geboren, aber jetzt geht es ihnen bestens.
  
  Se avessi un *gemello*, potremmo condividere tutto e non saremmo mai soli.
  Wenn ich einen *Zwilling* hätte, könnten wir alles teilen und wären nie allein.
  
  Nonostante siano *gemelli*, hanno personalità completamente diverse e non si assomigliano molto.
  Trotz ihrer *Zwilling*senschaft haben sie völlig unterschiedliche Persönlichkeiten und ähneln sich kaum.
