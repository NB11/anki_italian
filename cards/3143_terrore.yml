Rang: 3143
Wort: terrore
Wortart: n.m
Wort mit Artikel: il terrore
Femininum / Plural: terrori
IPA: ''
Definition: die Angst, -¨e
Register: ''
Beispielsätze: |-
  Quando il ragazzo ha visto il leone allo *terrore* lo ha sopraffatto.
  Als der Junge den Löwen gesehen hat, überkam ihn die *Angst*.
  
  Nonostante il *terrore* che provava, la cantante ha continuato il concerto.
  Trotz der *Angst*, die sie empfand, führte die Sängerin das Konzert fort.
  
  Hanno vissuto mesi di *terrore* durante l'isolamento forzato.
  Sie lebten monatelang in der *Angst* vor der erzwungenen Isolation.
  
  Se non avessi sottovalutato il *terrore*, avresti evitato tanti problemi.
  Hättest du die *Angst* nicht unterschätzt, hättest du viele Probleme vermieden.
  
  Il *terrore* nel suo sguardo era così intenso che tutti lo notarono.
  Die *Angst* in seinem Blick war so intensiv, dass sie alle bemerkten.
