Rang: 573
Wort: consiglio
Wortart: n.m
Wort mit Artikel: il consiglio
Femininum / Plural: consigli
IPA: ''
Definition: der Rat, Ratschlag, -e
Register: ''
Beispielsätze: |-
  Ti do un *consiglio*: studia ogni giorno!
  Ich gebe dir einen *Rat*: lerne jeden Tag!
  
  Ho ricevuto un buon *consiglio* dall’insegnante.
  Ich habe einen guten *Ratschlag* von der Lehrerin erhalten.
  
  Vor ogni decisione chiedi un *consiglio* ai tuoi genitori.
  Frage vor jeder Entscheidung deine Eltern um *Rat*.
  
  Non sempre i *consigli* degli amici sono utili.
  Die *Ratschläge* der Freunde sind nicht immer hilfreich.
  
  Mi servirebbe un *consiglio* su come scegliere l’università.
  Ich bräuchte einen *Rat*, wie ich die Universität auswählen soll.
