Rang: 573
Wort: consiglio
Wortart: n.m
Wort mit Artikel: il consiglio
Femininum / Plural: consigli
IPA: ''
Definition: der Rat, -¨e, der Ratschlag, -¨e
Register: ''
Beispielsätze: |-
  Secondo te, quale *consiglio* devo dare al mio amico per il suo nuovo lavoro?
  Welchen *Rat* soll ich meinem Freund für seinen neuen Job geben?
  
  La professoressa mi ha dato un ottimo *consiglio* riguardo agli studi universitari.
  Die Professorin hat mir einen ausgezeichneten *Ratschlag* bezüglich des Studiums gegeben.
  
  Non ho seguito il *consiglio* che mi hai dato l’anno scorso, e ora me ne pento.
  Ich habe den *Rat*, den du mir letztes Jahr gegeben hast, nicht befolgt, und jetzt bereue ich es.
  
  Se avessi ascoltato il *consiglio* dei suoi genitori, non si sarebbe trovato in questa situazione difficile.
  Wenn er den *Ratschlag* seiner Eltern befolgt hätte, wäre er nicht in dieser schwierigen Situation.
  
  Mi dispiace, ma il mio *consiglio* è che tu dica la verità, nonostante tutto.
  Es tut mir leid, aber mein *Rat* ist, dass du die Wahrheit sagst, trotz allem.
