Rang: 1240
Wort: ignorare
Wortart: vt
Wort mit Artikel: ignorare
Femininum / Plural: ''
IPA: ''
Definition: ignorieren, nicht beachten
Register: ''
Beispielsätze: |-
  Non *ho ignorato* i suoi avvertimenti, ma ora rimpiango la mia scelta.
  Ich habe seine Warnungen *ignoriert*, aber jetzt bereue ich meine Entscheidung.
  
  Se *ignori* il dolore alla schiena, rischi di farti male ancora di più.
  Wenn du den Schmerz im Rücken *ignorierst*, riskierst du, dich noch schlimmer zu verletzen.
  
  È assurdo che tu *ignori* una richiesta così importante per il mercato.
  Es ist absurd, dass du eine so bedeutende Bitte für den Markt *ignorierst*.
  
  Quando *ignorarono* i voti degli studenti, l’insegnante dovette cambiare stile.
  Als sie die Noten der Schüler *ignorierten*, musste die Lehrerin ihren Stil ändern.
  
  Non posso credere che *ignori* un evento così importante come il tuo nato!
  Ich kann nicht glauben, dass du ein so wichtiges Ereignis wie deinen Geburtstag *ignorierst*!
