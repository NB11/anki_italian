Rang: 629
Wort: droga
Wortart: n.f
Wort mit Artikel: la droga
Femininum / Plural: droghe
IPA: ''
Definition: das Rauschgift, die Droge
Register: ''
Beispielsätze: |-
  Non *droga* mai la tua mente con pensieri negativi.
  Vergifte* nie* deinen Geist mit negativen Gedanken.
  
  La *droga* fa male alla salute.
  Das Rauschgift schadet der Gesundheit.
  
  Che *droghe* assumi abitualmente?
  Welche Drogen nimmst du regelmäßig ein?
  
  Prima della *droga* era una persona molto diversa.
  Vor der Droge war er eine ganz andere Person.
  
  Non toccare quelle *droghe*, sono illegali!
  Fass diese Drogen nicht an, sie sind illegal!
