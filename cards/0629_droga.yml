Rang: 629
Wort: droga
Wortart: n.f
Wort mit Artikel: la droga
Femininum / Plural: droghe
IPA: ''
Definition: die Droge, -n
Register: ''
Beispielsätze: |-
  La polizia ha trovato una *droga* illegale nel suo zaino durante l'incontro al centro della città.
  Die Polizei hat eine *Droge* in seinem Rucksack während des Treffens im Zentrum der Stadt gefunden.
  
  Se hai bisogno di *droghe* per camminare, dovresti contare sulla tua forza, non su sostanze artificiali.
  Wenn du *Drogen* zum Laufen brauchst, solltest du dich auf deine Kraft verlassen, nicht auf künstliche Substanzen.
  
  Il detective sospetta che qualcuno abbia nascosto la *droga* nel segreto del suo studio.
  Der Detektiv vermutet, dass jemand die *Droge* in das Geheimnis seines Studios versteckt hat.
  
  Nonostante il dolore che provava, decise di non assumere *droghe* e cercò una soluzione naturale.
  Trotz des Schmerzes, den er fühlte, beschloss er, keine *Drogen* einzunehmen, und suchte nach einer natürlichen Lösung.
  
  Se vuoi mantenere la tua posizione nella relazione, evita di usare *droghe* che danneggiano il tuo cervello.
  Wenn du deine Position in der Beziehung aufrechterhalten willst, solltest du *Drogen* vermeiden, die dein Gehirn schädigen.
