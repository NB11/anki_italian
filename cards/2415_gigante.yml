Wort mit Artikel: gigante
Femininum / Plural: ''
IPA: ''
Definition: riesig, gewaltig, riesengroß
Register: ''
Beispielsätze: |-
  Il palazzo sembrava *gigante* nella nebbia del mattino.
  Das Gebäude schien im Morgennebel *riesengroß*.
  
  Se fossimo partiti prima, avremmo evitato il traffico *gigante* in autostrada.
  Wären wir früher losgefahren, hätten wir den *riesigen* Stau auf der Autobahn vermieden.
  
  Nonostante le difficoltà, mantenne una fiducia *gigante* nel suo progetto.
  Trotz der Schwierigkeiten behielt er ein *riesiges* Vertrauen in sein Projekt.
  
  L’elefante africano è un animale *gigante* rispetto agli altri della savana.
  Der afrikanische Elefant ist im Vergleich zu den anderen Tieren der Savanne ein *riesiges* Tier.
  
  Con un gesto *gigante*, il pittore coprì tutta la tela di colori vivaci.
  Mit einer *gewaltigen* Geste bedeckte der Maler die gesamte Leinwand mit leuchtenden Farben.
