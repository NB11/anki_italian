Rang: 3368
Wort: luminoso
Wortart: adj
Wort mit Artikel: luminoso
Femininum / Plural: ''
IPA: ''
Definition: hell, leuchtend, strahlend
Register: ''
Beispielsätze: |-
  Il cielo era così *luminoso* che gli uccelli hanno smesso di cantare.
  Der Himmel war so *hell*, dass die Vögel aufgehört haben zu singen.
  
  Secondo te, quale lampada è più *luminosa* di questa?
  Welche Lampe ist deiner Meinung nach *heller* als diese hier?
  
  La stanza sembra ancora più *luminosa* da quando hanno montato le nuove finestre.
  Das Zimmer wirkt noch *heller*, seit sie die neuen Fenster eingebaut haben.
  
  Se avessi una torcia più *luminosa*, potremmo trovare l’uscita più in fretta.
  Hätten wir eine *hellere* Taschenlampe, könnten wir den Ausgang schneller finden.
  
  L’artista ha scelto una palette di colori *luminosi* per questa serie di quadri.
  Der Künstler hat für diese Gemäldeserie eine Palette *strahlender* Farben gewählt.
