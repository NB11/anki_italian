Rang: 2336
Wort: scemo
Wortart: n.m
Wort mit Artikel: il scemo
Femininum / Plural: gli scemi
IPA: ''
Definition: der Idiot, -en
Register: ''
Beispielsätze: |-
  Non è *scemo*, semplicemente non capisce le cose come te.
  Er ist kein *Idiot*, er versteht Dinge einfach nicht wie du.
  
  La gente rideva di lui chiamandolo *scemo* per tutta la vita.
  Die Leute lachten ihn aus und nannten ihn ihr ganzes Leben lang einen *Idioten*.
  
  Se fossi *scemo*, non avrei mai risolto questo problema così complicato.
  Wenn ich ein *Idiot* wäre, hätte ich dieses komplizierte Problem nie gelöst.
  
  Denunciò chi lo aveva chiamato *scemo* davanti a tutta l’aula.
  Er erstattete Anzeige gegen denjenigen, der ihn vor dem gesamten *Hörsaal* einen Idioten genannt hatte.
  
  Pensavo fosse intelligente, ma alla fine si è rivelato un *scemo* senza speranza.
  Ich dachte, er sei klug, doch am Ende stellte er sich als hoffnungsloser *Idiot* heraus.
