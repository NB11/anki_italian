Wort mit Artikel: imprevedibile
Femininum / Plural: ''
IPA: ''
Definition: unvorhersehbar, unberechenbar
Register: ''
Beispielsätze: |-
  Il comportamento *imprevedibile* del suo cane mi ha sorpreso tutti.
  Das *unvorhersehbare* Verhalten seines Hundes hat uns alle überrascht.
  
  Anche se sembra calmo, il suo atteggiamento è *imprevedibile* in situazioni di stress.
  Auch wenn er ruhig wirkt, ist sein Verhalten in Stresssituationen *unberechenbar*.
  
  Secondo il meteorologo, il tempo rimarrà *imprevedibile* per tutta la settimana.
  Laut dem Meteorologen bleibt das Wetter die ganze Woche *unvorhersehbar*.
  
  Non affidarti a decisioni *imprevedibili* quando devi gestire un’azienda.
  Vertraue nicht auf *unberechenbare* Entscheidungen, wenn du ein Unternehmen leitest.
  
  La sua reazione *imprevedibile* ha rovinato la sorpresa che avremmo dovuto fare.
  Seine *unvorhersehbare* Reaktion hat die Überraschung zerstört, die wir vorbereitet hatten.
