Rang: 3789
Wort: yen
Wortart: n.m
Wort mit Artikel: lo yen
Femininum / Plural: gli yen
IPA: ''
Definition: das Verlangen, die Sehnsucht
Register: ''
Beispielsätze: |-
  Ho sempre avuto *lo yen* per viaggiare in Giappone, fin da quando ero bambino.
  Ich hatte immer *die Sehnsucht* nach Japan zu reisen, schon als Kind.
  
  Dopo aver visto quel film, mi è venuto *lo yen* di imparare il giapponese.
  Nach diesem Film bekam ich *das Verlangen*, Japanisch zu lernen.
  
  Nonostante *lo yen* di partire, ho dovuto rimandare il viaggio per lavoro.
  Trotz *des Verlangens* abzureisen, musste ich die Reise wegen der Arbeit verschieben.
  
  Lo *yen* per la cultura giapponese è cresciuto dopo aver letto quel romanzo.
  *Die Sehnsucht* nach japanischer Kultur wuchs, nachdem ich diesen Roman gelesen hatte.
  
  Se non fosse per *lo yen* di vedere il monte Fuji, non sarei mai partito.
  Wäre es nicht *die Sehnsucht*, den Fuji zu sehen, wäre ich nie losgefahren.
