Beispielsätze: |-
  Il problema *centrale* di questa città è la mancanza di trasporti pubblici efficienti.
  Das *zentrale* Problem dieser Stadt ist das Fehlen effizienter öffentlicher Verkehrsmittel.
  
  Credo che la soluzione più *centrale* sia quella di ascoltare tutti gli abitanti del quartiere.
  Ich glaube, dass die *beste* Lösung darin besteht, alle Bewohner des Viertels anzuhören.
  
  Nonostante la *centrale* inondazione, gli abitanti del paese hanno lottato con coraggio.
  Trotz der *schwerwiegenden* Überschwemmung kämpften die Dorfbewohner mutig weiter.
  
  La polizia ha arrestato il *centrale* trafficante dopo mesi di indagini segrete.
  Die Polizei hat den *Haupt*-Drogenhändler nach monatelangen Geheimermittlungen verhaftet.
  
  Se vuoi parlare con il direttore, devi andare alla sede *centrale* dell’azienda.
  Wenn du mit dem Direktor sprechen willst, musst du zur *Haupt*-Niederlassung des Unternehmens gehen.
