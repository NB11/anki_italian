Rang: 522
Wort: lettera
Wortart: n.f
Wort mit Artikel: la lettera
Femininum / Plural: lettere
IPA: ''
Definition: der Brief, -e
Register: ''
Beispielsätze: |-
  Ho ricevuto una *lettera* dal presidente della società.
  Ich habe einen *Brief* vom Präsidenten der Gesellschaft erhalten.
  
  Mia sorella mi ha scritto una *lettera* molto lunga ieri sera.
  Meine Schwester hat mir gestern *Abend* einen sehr langen Brief geschrieben.
  
  La *lettera* che hai spedito è arrivata solo dopo tre settimane di viaggio.
  Der *Brief*, den du geschickt hast, kam erst nach drei Wochen Reise an.
  
  Vorrei che tu leggessi questa *lettera* ad alta voce, per favore.
  Ich möchte, dass du diesen *Brief* bitte mit lauter Stimme vorliest.
  
  Non ho ancora aperto la *lettera* che è arrivata stamattina al fondo della scatola.
  Ich habe den *Brief* noch nicht geöffnet, der heute Morgen ganz unten in der Schachtel lag.
