Rang: 4976
Wort: box
Wortart: n.m
Wort mit Artikel: il box
Femininum / Plural: box
IPA: ''
Definition: die Kiste, -n
Register: ''
Beispielsätze: |-
  Ho comprato *box* in legno per organizzare la mia collezione di libri.
  Ich habe eine *Holzkiste* gekauft, um meine Büchersammlung zu organisieren.
  
  Guarda! Il gatto si è nascosto dentro *box* di cartone vicino alla porta.
  Schau mal! Die Katze hat sich in einer *Pappkiste* neben der Tür versteckt.
  
  Se non ti serve più quella *box*, posso regalartela domani.
  Wenn du diese *Kiste* nicht mehr brauchst, kann ich sie dir morgen schenken.
  
  Dopo il trasloco, ci sono ancora tre *box* da aprire nella camera da letto.
  Nach dem Umzug gibt es noch drei *Kisten*, die im Schlafzimmer geöffnet werden müssen.
  
  La *box* dei ricordi contiene fotografie, lettere e piccoli oggetti del passato.
  Die *Kiste* der Erinnerungen enthält Fotos, Briefe und kleine Gegenstände aus der Vergangenheit.
