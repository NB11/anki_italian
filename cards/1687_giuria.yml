Rang: 1687
Wort: giuria
Wortart: n.f
Wort mit Artikel: la giuria
Femininum / Plural: giurie
IPA: ''
Definition: die Jury, -s
Register: ''
Beispielsätze: |-
  Secondo il parere della *giuria*, questo film è eccellente e merita un premio.
  Laut der Meinung der *Jury* ist dieser Film hervorragend und verdient einen Preis.
  
  Mio zio, che è un ex senatore, ha lavorato per anni in una *giuria* per i diritti civili.
  Mein Onkel, der ein ehemaliger *Senator* ist, arbeitete jahrelang in einer Jury für Bürgerrechte.
  
  La *giuria* ha impiegato due giorni per prendere una decisione sul vincitore del concorso.
  Die *Jury* brauchte zwei Tage, um eine Entscheidung über den Gewinner des Wettbewerbs zu treffen.
  
  Se non fossi stato così nervoso, forse avresti potuto esprimere meglio la tua opinione alla *giuria*.
  Wenn du nicht so nervös gewesen wärst, hättest du deine Meinung vielleicht besser der *Jury* mitteilen können.
  
  Nonostante le critiche, la *giuria* ha confermato il vincitore che era stato scelto a febbraio.
  Trotz der Kritik bestätigte die *Jury* den Gewinner, der im Februar ausgewählt worden war.
