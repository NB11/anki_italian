Rang: 2354
Wort: congelare
Wortart: v
Wort mit Artikel: congelare
Femininum / Plural: ''
IPA: ''
Definition: gefrieren, einfrieren
Register: ''
Beispielsätze: |-
  In montagna d’inverno l’acqua dei fiumi può *congelare* molto velocemente.
  Im Gebirge kann das Wasser der Flüsse im Winter sehr schnell *gefrieren*.
  
  Se non metti il latte in frigo, il giorno dopo potrebbe *congelare* e rovinarsi.
  Wenn du die Milch nicht in den Kühlschrank stellst, könnte sie am nächsten Tag *einfrieren* und verderben.
  
  Il medico ha detto che se non assumiamo subito la medicina, la situazione potrebbe *congelare* e diventare critica.
  Der Arzt hat gesagt, wenn wir das Medikament nicht sofort einnehmen, könnte sich die Situation *verschlimmern* und kritisch werden.
  
  Ho sentito che in Canada alcuni laghi arrivano a *congelare* per mesi durante l’inverno.
  Ich habe gehört, dass in Kanada manche Seen im Winter monatelang *gefrieren*.
  
  Nonostante il caldo, il vino nel giardino della nonna era ancora così freddo che rischiava di *congelare* le labbra!
  Trotz der Hitze war der Wein im Garten meiner Oma so eiskalt, dass er sich fast *auf den Lippen festgefroren* hätte!.
