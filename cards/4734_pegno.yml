Rang: 4734
Wort: pegno
Wortart: n.m
Wort mit Artikel: il pegno
Femininum / Plural: pegni
IPA: ''
Definition: das Pfand, -e
Register: ''
Beispielsätze: |-
  Il negoziante ha chiesto un *pegno* di cinquanta euro per affittare la fotocamera.
  Der Verkäufer hat eine *Pfand* von fünfzig Euro für die Vermietung der Kamera verlangt.
  
  Nonostante il ritardo, ho pagato il *pegno* senza discutere perché era scritto nel contratto.
  Trotz der Verspätung habe ich das *Pfand* ohne Diskussion bezahlt, weil es im Vertrag stand.
  
  Se perdi il biglietto, perderai anche il *pegno* che hai versato all’ingresso.
  Wenn du das Ticket verlierst, verlierst du auch das *Pfand*, das du beim Eintritt hinterlegt hast.
  
  Il *pegno* per la bicicletta era troppo alto secondo molti clienti.
  Das *Pfand* für das Fahrrad war nach Meinung vieler Kunden zu hoch.
  
  Prima di partire, controlla che il *pegno* ti venga restituito senza trattenute inutili.
  Bevor du gehst, prüfe, dass das *Pfand* dir ohne unnötige Abzüge zurückgegeben wird.
