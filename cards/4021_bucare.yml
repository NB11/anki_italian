Rang: 4021
Wort: bucare
Wortart: v
Wort mit Artikel: bucare
Femininum / Plural: ''
IPA: ''
Definition: "*durchstechen*, *durchbohren*, *löchern*"
Register: ''
Beispielsätze: |-
  Ho *bucato* il pneumatico con un chiodo per strada.
  Ich habe *durchgestochen* den Reifen mit einem Nagel auf der Straße.
  
  Se non *bucate* il foglio con la graffetta, non potrete firmarlo!
  Wenn ihr *durchbohrt* das Blatt mit der Büroklammer, könnt ihr es nicht unterschreiben!
  
  La polizia temeva che qualcuno avrebbe *bucato* i pneumatici delle macchine in segno di protesta.
  Die Polizei fürchtete, dass jemand *löchern* würde die Reifen der Autos als Protestzeichen.
  
  Non appena il custode avrà *bucato* la porta per far passare l'aria, spegniamo il riscaldamento!
  Sobald der Aufseher *durchgestochen* hat die Tür um Luft durchzulassen, schalten wir die Heizung aus!
  
  Gli scienziati stanno cercando un nuovo materiale che non si lasci *bucare* facilmente.
  Die Wissenschaftler suchen ein neues Material, das sich nicht so leicht *durchbohren* lässt.
