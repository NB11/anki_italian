Rang: 2470
Wort: archivio
Wortart: n.m
Wort mit Artikel: l'archivio
Femininum / Plural: gli archivi
IPA: ''
Definition: das Archiv, -e
Register: ''
Beispielsätze: |-
  L’*archivio* della biblioteca contiene libri molto antichi.
  Das *Archiv* der Bibliothek enthält sehr alte Bücher.
  
  Nel *archivio* digitale ho trovato tutti i documenti necessari.
  In dem digitalen *Archiv* habe ich alle notwendigen Dokumente gefunden.
  
  Hanno aperto un nuovo *archivio* per i dati storici della città.
  Sie haben ein neues *Archiv* für die historischen Daten der Stadt eröffnet.
  
  Se vuoi informazioni sulla storia locale, cerca nel *archivio* comunale.
  Wenn du Informationen zur Lokalgeschichte suchst, schau im städtischen *Archiv* nach.
  
  L’*archivio* è stato danneggiato dall’alluvione dello scorso anno.
  Das *Archiv* wurde von der Flut vor einem Jahr beschädigt.
