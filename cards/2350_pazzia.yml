Rang: 2350
Wort: pazzia
Wortart: n.f
Wort mit Artikel: la pazzia
Femininum / Plural: pazzie
IPA: ''
Definition: der Wahnsinn, -e
Register: ''
Beispielsätze: |-
  La tua *pazzia* mi ha davvero sorpreso ieri sera alla party!
  Dein *Wahnsinn* hat mich gestern Abend auf der Party wirklich überrascht.
  
  Hanno definito la sua *pazzia* un atto di coraggio eroico.
  Sie bezeichneten seinen *Wahnsinn* als eine heldenhafte Tat des Mutes.
  
  Se continui a bere così, la *pazzia* sarà l’unica conclusione possibile.
  Wenn du so weitermachst, wird *Wahnsinn* die einzige mögliche Schlussfolgerung sein.
  
  Nonostante la *pazzia* del piano, il gruppo decise di programmare l’azione per domani.
  Trotz des *Wahnsinns* des Plans beschloss die Gruppe, die Aktion für morgen zu planen.
  
  La *pazzia* di quel spacciatore gli costò molti anni di prigione, secondo la testimonianza del testimone.
  Der *Wahnsinn* dieses Drogenhändlers kostete ihn viele Jahre im Gefängnis, laut der Aussage des Zeugen.
