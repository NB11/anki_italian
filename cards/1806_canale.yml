Rang: 1806
Wort: canale
Wortart: n.m
Wort mit Artikel: il canale
Femininum / Plural: canali
IPA: ''
Definition: der Kanal, -e
Register: ''
Beispielsätze: |-
  Il *canale* principale della città è bloccato dai lavori stradali.
  Der *Hauptkanal* der Stadt ist durch die Straßenarbeiten blockiert.
  
  Ho seguito un documentario sui *canali* della laguna di Venezia.
  Ich habe eine Dokumentation über die *Kanäle* der Lagune von Venedig gesehen.
  
  Mi hanno detto che il *canale* di scolo non funziona da settimane.
  Mir wurde gesagt, dass der *Abflusskanal* seit Wochen nicht funktioniert.
  
  Sperano di riaprire il *canale* entro la fine del mese.
  Sie hoffen, den *Kanal* bis Ende des Monats wieder zu öffnen.
  
  Il tecnico ha spiegato che questi *canali* trasportano acqua piovana.
  Der Techniker erklärte, dass diese *Kanäle* Regenwasser transportieren.
