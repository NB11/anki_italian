Rang: 1187
Wort: voto
Wortart: n.m
Wort mit Artikel: il voto
Femininum / Plural: i voti
IPA: ''
Definition: die Note, -n
Register: ''
Beispielsätze: |-
  Il professore ha dato un *voto* molto basso allo studente perché non ha studiato abbastanza.
  Der Lehrer hat dem Schüler eine *Note* gegeben, weil er nicht genug gelernt hat.
  
  Se non migliorerai il tuo comportamento, riceverai un altro *voto* negativo in condotta.
  Wenn du dich nicht besserst, bekommst du eine weitere *Note* in Betragen.
  
  Nonostante lo studio intenso, il suo *voto* finale è stato deludente; chissà cosa pensava il professore!
  Trotz intensivem Lernen war seine *Note* enttäuschend; wer weiß, was der Lehrer dachte!
  
  Il *voto* di laurea è determinante per trovare un buon lavoro, soprattutto in settori come il diritto o la medicina.
  Die *Note* des Abschlusses ist entscheidend für einen guten Job, besonders in Bereichen wie Jura oder Medizin.
  
  Dopo aver corretto tutti gli elaborati, il commissario ha consegnato i *voti* agli studenti con un sorriso soddisfatto.
  Nachdem alle Arbeiten korrigiert waren, überreichte der Prüfer den Schülern die *Noten* mit einem zufriedenen Lächeln.
