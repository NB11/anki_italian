Rang: 1674
Wort: uguale
Wortart: adj
Wort mit Artikel: uguale
Femininum / Plural: ''
IPA: ''
Definition: gleich, identisch
Register: ''
Beispielsätze: |-
  Il tuo modo di pensare è *uguale* al mio.
  Deine Denkweise ist *gleich* wie meine.
  
  Credo che il prezzo sia *uguale* in tutti i negozi.
  Ich glaube, der Preis ist *identisch* in allen Geschäften.
  
  Nonostante le differenze, le loro opinioni sono quasi *uguali*.
  Trotz der Unterschiede sind ihre Meinungen fast *gleich*.
  
  Ha ordinato una pizza *uguale* a quella che abbiamo mangiato ieri.
  Er hat eine Pizza *identisch* mit der bestellt, die wir gestern gegessen haben.
  
  Se non fosse *uguale*, non lo riconoscerei nemmeno.
  Wäre es nicht *gleich*, würde ich es nicht einmal erkennen.
