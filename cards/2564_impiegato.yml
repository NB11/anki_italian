Beispielsätze: |-
  L’*impiegato* sta lavorando al computer da tre ore senza sosta.
  Der *Angestellte* arbeitet seit drei Stunden ununterbrochen am Computer.
  
  Se fossi stato un *impiegato*, avrei preso ferie in settembre.
  Wenn ich ein *Angestellter* gewesen wäre, hätte ich im September Urlaub genommen.
  
  L’azienda cerca *impiegati* con esperienza nel marketing digitale.
  Die Firma sucht *Angestellte* mit Erfahrung im digitalen Marketing.
  
  Nonostante la sua giovinezza, il *impiegato* era già il responsabile del reparto.
  Trotz seiner Jugend war der *Angestellte* bereits Abteilungsleiter.
  
  Il *impiegato* che hai incontrato ieri è andato in pensione a giugno.
  Der *Angestellte*, den du gestern getroffen hast, ist im Juni in Rente gegangen.
