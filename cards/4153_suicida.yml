Rang: 4153
Wort: suicida
Wortart: adj
Wort mit Artikel: suicida
Femininum / Plural: ''
IPA: ''
Definition: selbstmörderisch, selbstzerstörerisch
Register: ''
Beispielsätze: |-
  Quella decisione è stata davvero *suicida* per l’azienda.
  Diese Entscheidung war wirklich *selbstzerstörerisch* für das Unternehmen.
  
  Non posso credere che tu abbia considerato un piano così *suicida*!
  Ich kann nicht glauben, dass du einen so *selbstmörderischen* Plan in Betracht gezogen hast!
  
  La sua velocità sulla strada era *suicida*, tanto che tutti gli urlavano di fermarsi.
  Seine Geschwindigkeit auf der Straße war *selbstmörderisch*, sodass alle ihn anflehten, anzuhalten.
  
  Per quanto *suicida* possa sembrare, lui continuò a correre verso il pericolo.
  So *selbstzerstörerisch* es auch erscheinen mag, er rannte weiter in Richtung Gefahr.
  
  I medici hanno definito *suicida* il suo comportamento con la salute negli ultimi anni.
  Ärzte haben sein Verhalten in Bezug auf seine Gesundheit in den letzten Jahren als *selbstmörderisch* eingestuft.
