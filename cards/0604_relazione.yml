Rang: 604
Wort: relazione
Wortart: n.f
Wort mit Artikel: la relazione
Femininum / Plural: relazioni
IPA: ''
Definition: die Beziehung, -en, der Bericht, -e
Register: ''
Beispielsätze: |-
  La *relazione* tra i due paesi è migliorata dopo l'incontro diplomatico.
  Die *Beziehung* zwischen den beiden Ländern hat sich nach dem diplomatischen Treffen verbessert.
  
  Ho letto la *relazione* annuale della compagnia con grande attenzione.
  Ich habe den jährlichen *Bericht* der Firma mit großer Aufmerksamkeit gelesen.
  
  Secondo la *relazione* del medico, dovresti riposare di più.
  Laut dem *Bericht* des Arztes solltest du dich mehr ausruhen.
  
  La *relazione* che hai scritto è molto dettagliata e completa.
  Die *Beziehung*, die du geschrieben hast, ist sehr detailliert und vollständig.
  
  Vuoi che riveda la *relazione* prima di inviarla al direttore?
  Möchtest du, dass ich die *Beziehung* vor dem Senden an den Direktor noch einmal überprüfe?
