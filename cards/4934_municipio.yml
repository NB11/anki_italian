Rang: 4934
Wort: municipio
Wortart: n.m
Wort mit Artikel: il municipio
Femininum / Plural: i municipi
IPA: ''
Definition: die Gemeindeverwaltung, -en
Register: ''
Beispielsätze: |-
  Dove si trova la sede del *municipio* di Milano?
  Wo befindet sich der *Sitz* der Gemeindeverwaltung von Mailand?
  
  Il nuovo sindaco ha promesso di riformare l’organico del *municipio* entro l’anno.
  Der neue Bürgermeister hat versprochen, den *Personalbestand* der Gemeindeverwaltung bis Jahresende zu reformieren.
  
  Ho fatto la fila per ore all’ufficio del *municipio*, ma alla fine ho risolto tutto online.
  Ich habe stundenlang an der *Gemeindeverwaltung* Schlange gestanden, aber am Ende habe ich alles online erledigt.
  
  Secondo il regolamento, ogni cittadino dovrebbe recarsi almeno una volta all’anno al *municipio* per aggiornare i dati personali.
  Laut Vorschrift sollte jeder Bürger mindestens einmal im Jahr zur *Gemeinde* gehen, um seine persönlichen Daten zu aktualisieren.
  
  Il *municipio* ha emanato una nuova ordinanza che vieta l’uso di plastica monouso nel centro storico.
  Die *Gemeindeverwaltung* hat eine neue Verordnung erlassen, die die Nutzung von Einwegplastik in der Altstadt verbietet.
