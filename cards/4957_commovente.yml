Rang: 4957
Wort: commovente
Wortart: adj
Wort mit Artikel: commovente
Femininum / Plural: ''
IPA: ''
Definition: rührend, bewegend, ergreifend
Register: ''
Beispielsätze: |-
  Il film che abbiamo visto ieri sera era davvero *commovente* e molti sono scoppiati a piangere.
  Der Film, den wir gestern Abend gesehen haben, war wirklich *rührend* und viele brachen in Tränen aus.
  
  Nonostante la sua comicità, la scena finale risultò inaspettatamente *commovente* per il pubblico.
  Trotz ihrer Komik wirkte die letzte Szene für das Publikum unerwartet *bewegend*.
  
  Mi ha scritto una lettera così *commovente* che non ho saputo trattenere le lacrime.
  Er hat mir einen so *ergreifenden* Brief geschrieben, dass ich die Tränen nicht zurückhalten konnte.
  
  La notizia del suo successo ha reso il finale della storia ancora più *commovente* di quanto avessimo immaginato.
  Die Nachricht von ihrem Erfolg machte das Ende der Geschichte noch *rührender*, als wir es uns vorgestellt hatten.
  
  Quando il cantante ha dedicato la canzone alla madre, la platea è rimasta in silenzio *commovente* per un lungo momento.
  Als der Sänger das Lied seiner Mutter widmete, herrschte für einen langen Moment *ergreifende* Stille im Saal.
