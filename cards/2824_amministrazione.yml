Rang: 2824
Wort: amministrazione
Wortart: n.f
Wort mit Artikel: l'amministrazione
Femininum / Plural: amministrazioni
IPA: ''
Definition: die Verwaltung, -en
Register: ''
Beispielsätze: |-
  L'*amministrazione* comunale ha approvato il nuovo regolamento sulla raccolta differenziata.
  Die städtische *Verwaltung* hat die neue Regelung zur Mülltrennung verabschiedet.
  
  Durante la crisi economica, l'*amministrazione* ha dovuto tagliare molti servizi pubblici.
  Während der Wirtschaftskrise musste die *Verwaltung* zahlreiche öffentliche Dienstleistungen kürzen.
  
  Se vuoi partecipare alla gestione del condominio, candidati alla prossima *amministrazione* condominiale.
  Wenn du an der Hausverwaltung mitwirken möchtest, kandidiere bei der nächsten *Wohnungsverwaltung*.
  
  L'*amministrazione* del magazzino è stata affidata a un software specializzato.
  Die Lager*verwaltung* wurde einer spezialisierten Software anvertraut.
  
  Nonostante i problemi, l'*amministrazione* locale continua a garantire l'assistenza sanitaria per tutti.
  Trotz der Probleme sorgt die lokale *Verwaltung* weiterhin für die medizinische Versorgung aller.
