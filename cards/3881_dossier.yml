Rang: 3881
Wort: dossier
Wortart: n.m
Wort mit Artikel: il dossier
Femininum / Plural: i dossier
IPA: ''
Definition: die Akte, -n
Register: ''
Beispielsätze: |-
  Il *dossier* che hai preparato è molto dettagliato e ben organizzato.
  Die *Akte*, die du vorbereitet hast, ist sehr detailliert und gut organisiert.
  
  Non riesco a trovare quel *dossier* tra i documenti sulla scrivania.
  Ich kann diese *Akte* nicht unter den Dokumenten auf dem Schreibtisch finden.
  
  Il poliziotto ha aperto il *dossier* e ha iniziato a sfogliarne le pagine con attenzione.
  Der Polizist hat die *Akte* geöffnet und begann sorgfältig die Seiten durchzublättern.
  
  Se avessi saputo che c’era un *dossier* su di me, avrei chiesto spiegazioni.
  Wenn ich gewusst hätte, dass es eine *Akte* über mich gibt, hätte ich nach Erklärungen gefragt.
  
  I *dossier* dei pazienti devono essere custoditi con massima riservatezza.
  Die *Akten* der Patienten müssen mit höchster Vertraulichkeit verwahrt werden.
