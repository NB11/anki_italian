Rang: 1859
Wort: istante
Wortart: n.m
Wort mit Artikel: l'istante
Femininum / Plural: gli istanti
IPA: ''
Definition: der Augenblick, -e
Register: ''
Beispielsätze: |-
  Ho aspettato un *istante* prima di rispondere.
  Ich habe einen *Augenblick* gewartet, bevor ich geantwortet habe.
  
  In quell’*istante*, il telefono ha squillato improvvisamente.
  In diesem *Augenblick* hat das Telefon plötzlich geklingelt.
  
  Non dimenticherò mai questo *istante* di felicità.
  Ich werde diesen *Augenblick* des Glücks nie vergessen.
  
  Se solo avessi capito in quell’*istante* il suo vero intento!
  Wenn ich nur in diesem *Augenblick* seine wahre Absicht verstanden hätte!
  
  Resta immobile per un *istante* e ascolta il silenzio intorno a te.
  Bleib einen *Augenblick* regungslos und höre auf die Stille um dich herum.
