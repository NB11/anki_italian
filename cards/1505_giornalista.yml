Rang: 1505
Wort: giornalista
Wortart: n.m
Wort mit Artikel: il giornalista
Femininum / Plural: giornalisti
IPA: ''
Definition: der Journalist, -en
Register: ''
Beispielsätze: |-
  Il *giornalista* ha scritto un articolo molto interessante sul parco cittadino.
  Der *Journalist* hat einen sehr interessanten Artikel über den Stadtpark geschrieben.
  
  Mia sorella è diventata *giornalista* perché ama indagare e raccontare storie.
  Meine Schwester ist *Journalistin* geworden, weil sie es liebt zu recherchieren und Geschichten zu erzählen.
  
  Se avessi più tempo, mi piacerebbe lavorare come *giornalista* sportivo.
  Wenn ich mehr Zeit hätte, würde ich gerne als Sport*journalist* arbeiten.
  
  Il *giornalista* che ho incontrato ieri mi ha domandato della mia amicizia con quella famiglia.
  Der *Journalist*, den ich gestern getroffen habe, hat mich nach meiner Freundschaft mit dieser Familie gefragt.
  
  Spero che tu diventi un *giornalista* famoso, perché hai proprio le capacità adatte.
  Ich hoffe, dass du ein berühmter *Journalist* wirst, denn du hast genau die richtigen Fähigkeiten.
