Rang: 4079
Wort: coordinare
Wortart: vt
Wort mit Artikel: coordinare
Femininum / Plural: ''
IPA: ''
Definition: koordinieren, abstimmen
Register: ''
Beispielsätze: |-
  Devo *coordinare* gli orari di tutti i partecipanti per l'incontro di domani.
  Ich muss die Termine aller Teilnehmer für das Treffen morgen *koordinieren*.
  
  Se *coordinassi* meglio le risorse, i risultati sarebbero ottimali.
  Wenn du die Ressourcen besser *koordinierst*, wären die Ergebnisse optimal.
  
  Il regista ha *coordinato* con precisione ogni dettaglio dello spettacolo.
  Der Regisseur hat jeden einzelnen Punkt der Aufführung präzise *koordiniert*.
  
  Senza sapere chi *coordina* l'evento, non possiamo procedere.
  Ohne zu wissen, wer die Veranstaltung *koordiniert*, können wir nicht weitermachen.
  
  Chiara si è incaricata di *coordinare* i volontari per la raccolta fondi.
  Chiara hat sich darum gekümmert, die Freiwilligen für die Spendensammlung zu *koordinieren*.
