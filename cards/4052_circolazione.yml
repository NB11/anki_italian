Rang: 4052
Wort: circolazione
Wortart: n.f
Wort mit Artikel: la circolazione
Femininum / Plural: circolazioni
IPA: ''
Definition: der Verkehr, die Zirkulation
Register: ''
Beispielsätze: |-
  A Roma la *circolazione* è sempre caotica durante l’ora di punta.
  In Rom ist der *Verkehr* immer chaotisch während der Stoßzeit.
  
  A causa dello sciopero dei trasporti, la *circolazione* è ridotta a un terzo.
  Wegen des *Streiks* der Verkehrsmittel ist die Zirkulation auf ein Drittel reduziert.
  
  Ho notato che la *circolazione* del sangue è migliorata da quando faccio sport regolarmente.
  Ich habe bemerkt, dass die *Zirkulation* des Blutes sich verbessert hat, seitdem ich regelmäßig Sport mache.
  
  Se vuoi evitare la *circolazione* del traffico, prendi la tangenziale invece del centro storico.
  Wenn du den *Verkehr* umgehen willst, nimm die Umgehungsstraße statt der Innenstadt.
  
  La *circolazione* di questa notizia falsa ha causato panico tra gli abitanti del quartiere.
  Die *Zirkulation* dieser falschen Nachricht hat Panik unter den Bewohnern des Stadtteils verursacht.
