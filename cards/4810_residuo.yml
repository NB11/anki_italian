Rang: 4810
Wort: residuo
Wortart: n.m
Wort mit Artikel: il residuo
Femininum / Plural: i residui
IPA: ''
Definition: der Rückstand, -stände
Register: ''
Beispielsätze: |-
  Dopo la pioggia c'è sempre *residuo* di sporco sulla strada.
  Nach dem Regen bleibt oft *Rückstand* von Dreck auf der Straße.
  
  Bisogna controllare se ci sono *residui* di pesticidi nei frutti.
  Man muss prüfen, ob *Rückstände* von Pestiziden in den Früchten vorhanden sind.
  
  Le industrie devono ridurre i *residui* tossici che producono.
  Die Industrie muss die *toxischen Rückstände* reduzieren, die sie herstellt.
  
  Il *residuo* della polvere si accumula soprattutto sui mobili alti.
  Der *Staubrückstand* sammelt sich vor allem auf den hohen Möbeln an.
  
  Anche se lapiamo bene, qualche *residuo* rimane sempre.
  Auch wenn wir gut abspülen, bleibt immer *ein Rest* übrig.
