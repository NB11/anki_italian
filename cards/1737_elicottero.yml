Rang: 1737
Wort: elicottero
Wortart: n.m
Wort mit Artikel: l'elicottero
Femininum / Plural: elicotteri
IPA: ''
Definition: der Hubschrauber, -
Register: ''
Beispielsätze: |-
  Vedo un *elicottero* che sorvola la città; è molto rumoroso.
  Ich sehe einen *Hubschrauber*, der über der Stadt fliegt; er ist sehr laut.
  
  Domani prenoterò un volo in *elicottero* per ammirare le Alpi da vicino.
  Morgen buche ich einen *Hubschrauber*flug, um die Alpen aus der Nähe zu bewundern.
  
  L'*elicottero* della polizia è atterrato sul tetto dell'ospedale.
  Der *Hubschrauber* der Polizei ist auf dem Dach des Krankenhauses gelandet.
  
  Se avessi più soldi, comprerei un *elicottero* personale per viaggiare ovunque.
  Wenn ich mehr Geld hätte, würde ich mir einen privaten *Hubschrauber* kaufen, um überall hinzureisen.
  
  L'*elicottero* che hai visto ieri trasportava dei turisti verso il mare.
  Der *Hubschrauber*, den du gestern gesehen hast, transportierte Touristen ans Meer.
