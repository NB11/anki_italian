Rang: 4594
Wort: reciproco
Wortart: adj
Wort mit Artikel: reciproco
Femininum / Plural: ''
IPA: ''
Definition: gegenseitig, wechselseitig
Register: ''
Beispielsätze: |-
  Abbiamo un *reciproco* rispetto per le reciproche opinioni.
  Wir haben *gegenseitigen* Respekt für die anderen Meinungen.
  
  Il loro amore era così *reciproco* che nessuno dei due dubitava dell'altro.
  Ihre Liebe war so *wechselseitig*, dass keiner von beiden an dem anderen zweifelte.
  
  Penso che la fiducia nel gruppo debba essere *reciproca* per funzionare davvero.
  Ich denke, dass das Vertrauen in der Gruppe *gegenseitig* sein muss, um wirklich zu funktionieren.
  
  È importante che il sostegno tra colleghi sia *reciproco* in momenti di difficoltà.
  Es ist wichtig, dass die Unterstützung zwischen Kollegen in schwierigen Momenten *wechselseitig* ist.
  
  Non sempre l'odio è *reciproco*; spesso uno prova rancore, mentre l'altro nemmeno se ne accorge.
  Hass ist nicht immer *gegenseitig*; oft empfindet einer Groll, während der andere es nicht einmal bemerkt.
