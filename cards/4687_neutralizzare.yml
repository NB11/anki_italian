Wort mit Artikel: neutralizzare
Femininum / Plural: ''
IPA: ''
Definition: neutralisieren, unschädlich machen
Register: ''
Beispielsätze: |-
  Gli scienziati sono riusciti a *neutralizzare* il virus in laboratorio.
  Die Wissenschaftler konnten das Virus im Labor *unschädlich machen*.
  
  Se non *neutralizzi* subito l'odore, la stanza resterà insopportabile per giorni.
  Wenn du den Geruch nicht sofort *unschädlich machst*, bleibt der Raum tagelang unerträglich.
  
  Hanno usato un prodotto chimico per *neutralizzare* gli effetti dell'acido.
  Sie haben ein chemisches Produkt verwendet, um die Auswirkungen der Säure *unschädlich zu machen*.
  
  Il medico ha prescritto un farmaco per *neutralizzare* la tossina nel sangue.
  Der Arzt hat ein Medikament verschrieben, um das Gift im Blut *unschädlich zu machen*.
  
  L'esercito aveva l'ordine di *neutralizzare* ogni minaccia prima dell'attacco.
  Die Armee hatte den Befehl, jede Bedrohung vor dem Angriff *unschädlich zu machen*.
