Rang: 1750
Wort: dipingere
Wortart: vt
Wort mit Artikel: dipingere
Femininum / Plural: ''
IPA: ''
Definition: malen, streichen
Register: ''
Beispielsätze: |-
  Mio figlio *dipinge* ogni settimana un nuovo quadro per la sua camera.
  Mein Sohn malt jede Woche ein neues Gemälde für sein Zimmer.
  
  Se avessi tempo, vorrei *dipingere* un paesaggio con le Alpi in inverno.
  Wenn ich Zeit hätte, würde ich gerne eine Landschaft mit den Alpen im Winter *malen*.
  
  Gli artisti del Rinascimento sapevano *dipingere* con una precisione straordinaria.
  Die Künstler der Renaissance wussten, wie man mit außergewöhnlicher Präzision *malt*.
  
  Stavo per *dipingere* la parete di blu, ma mio marito ha cambiato idea.
  Ich war dabei, die Wand blau zu *streichen*, aber mein Mann hat seine Meinung geändert.
  
  Non appena avrò finito di *dipingere*, potremmo appendere il quadro sopra il caminetto.
  Sobald ich fertig bin zu *malen*, könnten wir das Bild über den Kamin hängen.
