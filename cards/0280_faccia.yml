Rang: 280
Wort: faccia
Wortart: n.f
Wort mit Artikel: la faccia
Femininum / Plural: facce
IPA: ''
Definition: das Gesicht, -er
Register: ''
Beispielsätze: |-
  La *faccia* di Maria è molto espressiva.
  Das *Gesicht* von Maria ist sehr ausdrucksstark.
  
  Non gli piace vedere la sua stessa *faccia* allo specchio.
  Er mag es nicht, sein eigenes *Gesicht* im Spiegel zu sehen.
  
  Che brutta *faccia* che hai questa mattina!
  Was für ein *Gesicht* du heute Morgen hast!
  
  Vorrei vedere la *faccia* di Luca quando gli dirò la notizia.
  Ich möchte das *Gesicht* von Luca sehen, wenn ich ihm die Neuigkeit erzähle.
  
  Le *facce* dei bambini erano piene di stupore durante lo spettacolo.
  Die *Gesichter* der Kinder waren voller Staunen während der Vorstellung.
