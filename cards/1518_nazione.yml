Rang: 1518
Wort: nazione
Wortart: n.f
Wort mit Artikel: la nazione
Femininum / Plural: nazioni
IPA: ''
Definition: die Nation, -en
Register: ''
Beispielsätze: |-
  La *nazione* italiana è famosa per la sua cultura e la sua cucina.
  Die *Nation* Italien ist berühmt für ihre Kultur und Küche.
  
  Molti giovani desiderano andare all’estero perché la loro *nazione* è troppo piccola per le loro ambizioni.
  Viele junge Leute wollen ins Ausland gehen, weil ihre *Nation* zu klein für ihre Ambitionen ist.
  
  Se difendiamo i nostri confini, proteggiamo anche l’identità della nostra *nazione*.
  Wenn wir unsere Grenzen verteidigen, schützen wir auch die *Identität* unserer Nation.
  
  Ho lavorato per un’agenzia che si occupa di affari internazionali tra la *nazione* tedesca e quella italiana.
  Ich habe für eine Agentur gearbeitet, die sich mit internationalen Geschäften zwischen der *Nation* Deutschland und Italien beschäftigt.
  
  La *nazione* deve basare le sue decisioni sulle esigenze dei cittadini, non solo su interessi economici.
  Die *Nation* muss ihre Entscheidungen an den Bedürfnissen der Bürger ausrichten, nicht nur an wirtschaftlichen Interessen.
