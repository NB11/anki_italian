Rang: 837
Wort: rifiutare
Wortart: v
Wort mit Artikel: rifiutare
Femininum / Plural: ''
IPA: ''
Definition: ablehnen, verweigern, ausschlagen
Register: ''
Beispielsätze: |-
  Nonostante *rifiutare* il premio, il giudice lo accettò lo stesso.
  Trotz der *Ablehnung* des Preises nahm der Richter ihn trotzdem an.
  
  Se tu *rifiutassi* l'offerta, perderesti un'occasione unica.
  Wenn du das *Angebot* ablehnen würdest, würdest du eine einzigartige Chance verpassen.
  
  Hai visto che il colonnello ha *rifiutato* di parlare con i giornalisti?
  Hast du gesehen, dass der Oberst sich *geweigert* hat, mit den Journalisten zu sprechen?
  
  Speravo che tu non *rifiutassi* di aiutare il tuo ex quando ne aveva bisogno.
  Ich hatte gehofft, dass du dich *weigerst*, deinem Ex zu helfen, als er es brauchte.
  
  Certamente *rifiuterei* di vivere in una società che non apprezza la libertà.
  Bestimmt würde ich eine *Gesellschaft* ablehnen, die die Freiheit nicht wertschätzt.
Audio: ''
Notiz: ''
