Rang: 4414
Wort: archiviare
Wortart: v
Wort mit Artikel: archiviare
Femininum / Plural: ''
IPA: ''
Definition: archivieren, speichern
Register: ''
Beispielsätze: |-
  Ho bisogno di *archiviare* questi documenti prima di andare via.
  Ich muss diese Dokumente *archivieren*, bevor ich gehe.
  
  Se non *archivi* correttamente i file, potresti perderli.
  Wenn du die Dateien nicht richtig *archivierst*, könntest du sie verlieren.
  
  L'informatico *ha archiviato* tutti i dati sensibili del server.
  Der Informatiker hat alle sensiblen Daten des Servers *archiviert*.
  
  Vorrei che tu *archiviassi* anche i vecchi verbali della riunione.
  Ich möchte, dass du auch die alten Protokolle der Sitzung *archivierst*.
  
  Appena trovo un attimo, *archivierò* tutte le email ricevute questa settimana.
  Sobald ich einen Moment finde, werde ich alle diese Woche erhaltenen E-Mails *archivieren*.
