Rang: 2031
Wort: team
Wortart: n.m
Wort mit Artikel: il team
Femininum / Plural: team
IPA: ''
Definition: die Mannschaft, -en
Register: ''
Beispielsätze: |-
  Il *team* di calcio ha vinto la partita dopo una sfida molto combattuta.
  Das *Fußballteam* hat das Spiel nach einer sehr hart umkämpften Herausforderung gewonnen.
  
  Ho appreso che il nostro *team* è stato assegnato a un nuovo territorio per la ricerca.
  Ich habe erfahren, dass unser *Team* einem neuen Gebiet für die Forschung zugewiesen wurde.
  
  Credo che, senza il sostegno del *team*, non avremmo rilevato l'errore così in fretta.
  Ich glaube, dass wir den Fehler ohne die Unterstützung des *Teams* nicht so schnell festgestellt hätten.
  
  Se il *team* non fosse così stretto, potremmo risolvere il problema più agevolmente, disse il professor durante la riunione.
  Wenn das *Team* nicht so eng zusammenarbeiten würde, könnten wir das Problem leichter lösen", sagte der Professor während der Besprechung.
  
  Nonostante la cerimonia di premiazione fosse prevista per domani, il *team* ha già festeggiato la vittoria con un gelato in mano.
  Obwohl die Preisverleihungszeremonie erst für morgen geplant war, hat das *Team* den Sieg schon mit einem Eis in der Hand gefeiert.
