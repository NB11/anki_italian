Rang: 1297
Wort: giardino
Wortart: n.m
Wort mit Artikel: il giardino
Femininum / Plural: giardini
IPA: ''
Definition: der Garten, -¨
Register: ''
Beispielsätze: |-
  Ho visto un *giardino* bellissimo dietro quella casa rossa.
  Ich habe einen *wunderschönen Garten* hinter diesem roten Haus gesehen.
  
  Se vuoi coltivare rose, il *giardino* posteriore è perfetto perché prende molto sole.
  Wenn du Rosen anbauen möchtest, ist der *hintere Garten* ideal, weil er viel Sonne abbekommt.
  
  Nonostante il temporale di ieri, il *giardino* del palazzo non ha subito danni gravi.
  Trotz des Sturms von gestern hat der *Garten* des Palasts keine schweren Schäden erlitten.
  
  Mi piacerebbe frequentare un corso di giardinaggio, ma non ho ancora il *giardino* necessario per praticare.
  Ich würde gern einen Gartenseminar besuchen, aber ich habe noch keinen *Garten*, um es zu üben.
  
  Gli architetti hanno progettato un *giardino* che sembra un bosco incantato, con fontane e ponticelli.
  Die Architekten haben einen *Garten* entworfen, der wie ein verzauberter Wald wirkt – mit Brunnen und kleinen Brücken.
