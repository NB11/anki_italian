Rang: 3047
Wort: basket
Wortart: n.m
Wort mit Artikel: il basket
Femininum / Plural: cesti
IPA: ''
Definition: der Korb, -körbe
Register: ''
Beispielsätze: |-
  Ho comprato un *basket* nuovo per la palestra perché quello vecchio era rotto.
  Ich habe einen *neuen Korb* für das Fitnessstudio gekauft, weil der alte kaputt war.
  
  Nel *basket* ci sono tre mele e due pere.
  In dem *Korb* sind drei Äpfel und zwei Birnen.
  
  Dovresti svuotare il *basket* della carta quando è pieno.
  Du solltest den *Papierkorb* leeren, wenn er voll ist.
  
  Ha vinto la medaglia d’oro perché il suo tiro nel *basket* è stato perfetto.
  Er hat die Goldmedaille gewonnen, weil sein Wurf in den *Korb* perfekt war.
  
  Se non svuoti il *basket*, le bucce di banana attireranno le formiche.
  Wenn du den *Mülleimer* nicht leerst, werden die Bananenschalen Ameisen anlocken.
