Rang: 3959
Wort: rivolta
Wortart: n.f
Wort mit Artikel: la rivolta
Femininum / Plural: rivolte
IPA: ''
Definition: der Aufstand, -stände
Register: ''
Beispielsätze: |-
  La *rivolta* dei contadini fu repressa brutalmente.
  Die *Revolte* der Bauern wurde brutal niedergeschlagen.
  
  Mentre scoppiò la *rivolta*, la polizia iniziò i preparativi.
  Während der *Aufstand* brach aus, begann die Polizei mit den Vorbereitungen.
  
  Viene accusato di aver fomentato la *rivolta*, ma le prove mancano.
  Er wird beschuldigt, die *Revolte* angezettelt zu haben, doch die Beweise fehlen.
  
  Se il governo aumentasse le tasse, scoppierebbe di sicuro una *rivolta*.
  Wenn die Regierung die Steuern erhöhen würde, gäbe es sicher eine *Revolte*.
  
  La *rivolta* che ha guidato è entrata nella storia.
  Die *Revolte*, die er angeführt hat, ist in die Geschichte eingegangen.
