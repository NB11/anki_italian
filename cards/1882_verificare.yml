Rang: 1882
Wort: verificare
Wortart: vt
Wort mit Artikel: verificare
Femininum / Plural: ''
IPA: ''
Definition: prüfen, überprüfen, kontrollieren
Register: ''
Beispielsätze: |-
  Prima di partire, *verifico* sempre che tutte le finestre siano chiuse.
  Vor der Abfahrt prüfe ich immer, ob alle Fenster geschlossen *sind*.
  
  Il meccanico ha *verificato* che la ruota non fosse danneggiata.
  Der Mechaniker hat überprüft, ob das *Rad* nicht beschädigt ist.
  
  Ho bisogno che tu *verifichi* questi documenti prima di firmarli.
  Ich brauche, dass du diese Dokumente vor dem Unterschreiben prüfst.
  
  Se *verificassi* meglio, avresti trovato l’errore prima!
  Wenn du besser kontrolliert hättest, hättest du den Fehler eher gefunden!
  
  Nonostante abbia *verificato* cento volte, la firma non corrisponde al documento originale.
  Obwohl ich hundertmal überprüft habe, stimmt die *Unterschrift* nicht mit dem Originaldokument überein.
