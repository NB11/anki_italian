Rang: 601
Wort: terribile
Wortart: adj
Wort mit Artikel: terribile
Femininum / Plural: ''
IPA: ''
Definition: schrecklich, furchtbar, fürchterlich
Register: ''
Beispielsätze: |-
  Questo *terribile* incidente è avvenuto a causa della negligenza.
  Dieser *schreckliche* Vorfall ist durch die Nachlässigkeit passiert.
  
  Se non avessi temuto le conseguenze, forse non avresti agito così *terribilmente*.
  Wenn du die Konsequenzen nicht *gefürchtet* hättest, hättest du dich vielleicht nicht so furchtbar verhalten.
  
  Mi hanno detto che la situazione era *terribile*, ma non immaginavo fino a che punto.
  Man hat mir gesagt, die Situation sei *schrecklich*, aber ich konnte mir nicht vorstellen, wie sehr.
  
  Secondo il generale regolamento, non è normale avere così *terribili* problemi.
  Laut der *allgemeinen* Vorschrift ist es nicht üblich, so fürchterliche Probleme zu haben.
  
  Hanno liberato alcuni prigionieri, ma il loro stato è ancora *terribile*.
  Sie haben einige Gefangene befreit, doch ihr Zustand ist immer noch *schrecklich*.
