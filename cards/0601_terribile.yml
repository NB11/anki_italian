Rang: 601
Wort: terribile
Wortart: adj
Wort mit Artikel: terribile
Femininum / Plural: ''
IPA: ''
Definition: schrecklich, furchtbar
Register: ''
Beispielsätze: |-
  È successo un *terribile* incidente in autostrada ieri sera.
  Ein *schrecklicher* Unfall ist gestern Abend auf der Autobahn passiert.
  
  Non ho mai visto un film così *terribile* in vita mia!
  Ich habe noch nie einen so *furchtbaren* Film in meinem Leben gesehen.
  
  La situazione economica diventa sempre più *terribile* ogni giorno.
  Die wirtschaftliche Situation wird jeden Tag immer *schrecklicher*.
  
  Secondo me, il suo atteggiamento è *terribile*. Non si può più lavorare con lui.
  Ich finde sein Verhalten *furchtbar*. Man kann nicht mehr mit ihm arbeiten.
  
  È *terribile* quanto sia difficile trovare un buon medico al giorno d’oggi.
  Es ist *schrecklich*, wie schwer es heute ist, einen guten Arzt zu finden.
