Rang: 2953
Wort: scioccare
Wortart: vt
Wort mit Artikel: scioccare
Femininum / Plural: ''
IPA: ''
Definition: schockieren, entsetzen
Register: ''
Beispielsätze: |-
  Le sue parole mi hanno *scioccato*.
  Seine Worte haben mich *schockiert*.
  
  Ti *scioccherà* sapere la verità.
  Es wird dich *schockieren*, wenn ich dir die Wahrheit sage.
  
  Ero *scioccato* quando ho sentito la notizia.
  Ich war *geschockt*, als ich die Nachricht hörte.
  
  Vuole *scioccare* gli spettatori con la sua performance.
  Er will die Zuschauer mit seiner Performance *schockieren*.
  
  Se vedrai il film, senz’altro ti sentirai *scioccato*.
  Falls du den Film siehst, wirst du dich bestimmt *schockiert* fühlen.
