Rang: 3866
Wort: banconota
Wortart: n.f
Wort mit Artikel: la banconota
Femininum / Plural: banconote
IPA: ''
Definition: der Geldschein, -e
Register: ''
Beispielsätze: |-
  Ho trovato una *banconota* da cinquanta euro per terra mentre portavo fuori il bucato.
  Ich habe einen *50-Euro-Schein* auf dem Boden gefunden, während ich die Wäsche rausgebracht habe.
  
  Allo sportello della banca mi hanno detto che quella *banconota* era falsa, quindi non l’ho accettata.
  Am Schalter der Bank hat man mir gesagt, dass dieser *Geldschein* gefälscht war, also habe ich ihn nicht angenommen.
  
  Se avessi un milione di euro, spenderei ogni *banconota* con attenzione per non sbagliare i conti.
  Wenn ich eine Million Euro hätte, würde ich jeden *Geldschein* sorgfältig ausgeben, um mich nicht zu verrechnen.
  
  Nonostante la precisione con cui ho contato, mi sono accorto che nella mia tasca mancava una *banconota* da dieci euro.
  Trotz der *Genauigkeit*, mit der ich gezählt habe, ist mir aufgefallen, dass in meiner Tasche ein 10-Euro-Schein fehlte.
  
  Secondo le indicazioni della polizia, il ladro ha rubato solo una *banconota* dal portafoglio della vittima.
  Laut den *Hinweisen* der Polizei hat der Dieb nur einen Geldschein aus dem Portemonnaie des Opfers gestohlen.
