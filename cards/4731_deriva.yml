Rang: 4731
Wort: deriva
Wortart: n.f
Wort mit Artikel: la deriva
Femininum / Plural: derive
IPA: ''
Definition: die Trift, Abdrift
Register: ''
Beispielsätze: |-
  La *deriva* della nave era troppo pericolosa con quel vento forte.
  Die *Trift* des Schiffes war bei diesem starken Wind zu gefährlich.
  
  Hanno fatto di tutto per evitare la *deriva* economica del paese.
  Sie haben alles versucht, um die *Abdrift* der Wirtschaft des Landes zu vermeiden.
  
  Nonostante gli avvertimenti, la *deriva* delle barche continuò per tutta la notte.
  Trotz der Warnungen setzte sich die *Trift* der Boote die ganze Nacht fort.
  
  Secondo le previsioni, la *deriva* dei ghiacci polari accelererà nei prossimi anni.
  Laut den Prognosen wird sich die *Abdrift* des Polareises in den kommenden Jahren beschleunigen.
  
  La *deriva* dei profughi verso l’Europa è un fenomeno che va regolamentato.
  Die *Trift* der Flüchtlinge nach Europa ist ein Phänomen, das geregelt werden muss.
