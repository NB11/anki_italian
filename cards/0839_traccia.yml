Rang: 839
Wort: traccia
Wortart: n.f
Wort mit Artikel: la traccia
Femininum / Plural: tracce
IPA: ''
Definition: die Spur, -en; die Fährte, -n
Register: ''
Beispielsätze: |-
  Dopo la pioggia, abbiamo trovato *tracce* di animali vicino al fiume.
  Nach dem Regen haben wir *Spuren* von Tieren in der Nähe des Flusses gefunden.
  
  La polizia sta analizzando le *tracce* di DNA prelevate sulla scena del crimine.
  Die Polizei analysiert *Spuren* der DNA, die am Tatort gesichert wurden.
  
  Secondo gli scienziati, ogni *traccia* di vita su Marte sarebbe una scoperta straordinaria.
  Laut Wissenschaftlern wäre jede *Spur* von Leben auf dem Mars eine außergewöhnliche Entdeckung.
  
  Il giudice ha chiesto di consegnare tutte le *tracce* del processo, compresi i documenti riservati.
  Der Richter verlangte die Herausgabe aller *Unterlagen* des Prozesses, einschließlich der vertraulichen Dokumente.
  
  Nonostante le molte *tracce* lasciate dal nemico, non siamo riusciti a scoprire il suo nascondiglio.
  Trotz der vielen *Fährten*, die der Feind hinterlassen hatte, konnten wir sein Versteck nicht ausfindig machen.
