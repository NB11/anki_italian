Rang: 3326
Wort: finto
Wortart: adj
Wort mit Artikel: finto
Femininum / Plural: ''
IPA: ''
Definition: gefälscht, falsch, unecht
Register: ''
Beispielsätze: |-
  Questa borsa sembra di pelle, ma è *finta*.
  Diese Tasche scheint aus Leder zu sein, aber sie ist *gefälscht*.
  
  Non dare fiducia a chi indossa una divisa *finta* per ingannare gli altri.
  Glaube niemandem, der eine *gefälschte* Uniform trägt, um andere zu täuschen.
  
  Apparentemente era un documento ufficiale, ma era un *finto* certificato.
  Scheinbar war es ein offizielles Dokument, aber es war ein *falscher* Ausweis.
  
  Ha comprato un Rolex *finto* per meno di cento euro al mercato nero.
  Er hat eine *gefälschte* Rolex für weniger als hundert Euro auf dem Schwarzmarkt gekauft.
  
  Se scopri che il vino è *finto*, non berlo assolutamente!
  Wenn du feststellst, dass der Wein *gefälscht* ist, trinke ihn auf keinen Fall!
