Rang: 1604
Wort: gloria
Wortart: n.f
Wort mit Artikel: la gloria
Femininum / Plural: glorie
IPA: ''
Definition: der Ruhm, die Ehre
Register: ''
Beispielsätze: |-
  Dopo la vittoria, il calciatore ha ricevuto *gloria* e applausi dal pubblico.
  Nach dem Sieg erhielt der Fußballer *Ruhm* und Applaus vom Publikum.
  
  La *gloria* dell’antica Roma è ancora nota in tutto il mondo.
  Der *Ruhm* des antiken Roms ist immer noch weltweit bekannt.
  
  Se tu avessi seguito le regole, non avresti perso *gloria* ma solo un po’ di tempo.
  Wenn du die Regeln befolgt hättest, hättest du nicht *Ehre* verloren, sondern nur etwas Zeit.
  
  Credo che la vera *gloria* non dipenda dai soldi ma dalla felicità dei propri cari.
  Ich glaube, dass der echte *Ruhm* nicht von Geld abhängt, sondern vom Glück der Liebsten.
  
  La *gloria* dei suoi successi svanirà presto, se continuerà a peccare senza pentirsi.
  Der *Ruhm* seiner Erfolge wird bald vergehen, wenn er weiterhin sündigt ohne Reue.
