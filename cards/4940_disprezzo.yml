Rang: 4940
Wort: disprezzo
Wortart: n.m
Wort mit Artikel: il disprezzo
Femininum / Plural: i disprezzi
IPA: ''
Definition: die Verachtung, die Geringschätzung
Register: ''
Beispielsätze: |-
  Provo un immenso *disprezzo* per chi tradisce la fiducia degli altri.
  Ich empfinde eine immense *Verachtung* für jemanden, der das Vertrauen anderer missbraucht.
  
  Il suo gesto di ignorare i poveri suscitò un *disprezzo* generale in tutta la comunità.
  Ihre Tat, die Armen zu ignorieren, löste in der gesamten Gemeinde eine *Geringschätzung* aus.
  
  Nonostante il *disprezzo* che aveva per lui, continuò a rispettare le sue decisioni.
  Obwohl sie eine *Verachtung* für ihn empfand, respektierte sie weiterhin seine Entscheidungen.
  
  Da quando ha saputo dell'inganno, il suo *disprezzo* non ha fatto che aumentare ogni giorno.
  Seit sie von der Täuschung wusste, ist ihre *Geringschätzung* jeden Tag weiter gewachsen.
  
  Il *disprezzo* verso le regole della società lo portò a compiere azioni che lo isolarono completamente.
  Die *Verachtung* für die Regeln der Gesellschaft führte dazu, dass er Handlungen beging, die ihn vollständig isolierten.
