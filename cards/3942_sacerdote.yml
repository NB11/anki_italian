Rang: 3942
Wort: sacerdote
Wortart: n.m
Wort mit Artikel: il sacerdote
Femininum / Plural: sacerdoti
IPA: ''
Definition: der Priester, -
Register: ''
Beispielsätze: |-
  Il *sacerdote* ha celebrato la messa domenicale alle 11:00 nella chiesa del paese.
  Der *Priester* hat die sonntägliche Messe um 11:00 in der Dorfkirche zelebriert.
  
  Nonostante le critiche, il *sacerdote* continuò a predicare con grande convinzione.
  Trotz der Kritik predigte der *Priester* weiter mit großer Überzeugung.
  
  Se avessi saputo che volevi diventare *sacerdote*, ti avrei regalato questo libro sulle eresie medievali.
  Wenn ich gewusst hätte, dass du *Priester* werden willst, hätte ich dir dieses Buch über mittelalterliche Häresien geschenkt.
  
  Il *sacerdote*, che tutti rispettavano per la sua saggezza, decise di dimettersi dopo trent'anni di servizio.
  Der *Priester*, den alle für seine Weisheit respektierten, entschied sich nach dreißig Dienstjahren zum Rücktritt.
  
  I fedeli pregarono affinché il *sacerdote* potesse guarire in fretta dalla malattia che lo aveva colpito.
  Die Gläubigen beteten, dass der *Priester* von der Krankheit, die ihn befallen hatte, schnell genesen möge.
