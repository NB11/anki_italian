Rang: 1488
Wort: scienza
Wortart: n.f
Wort mit Artikel: la scienza
Femininum / Plural: scienze
IPA: ''
Definition: die Wissenschaft, -en
Register: ''
Beispielsätze: |-
  La *scienza* moderna ci aiuta a capire meglio il mondo che ci circonda.
  Die *Wissenschaft* hilft uns, die Welt um uns besser zu verstehen.
  
  Ho studiato a fondo la *scienza* dei materiali per il mio dottorato.
  Ich habe mich intensiv mit der *Wissenschaft* der Materialien für meine Promotion beschäftigt.
  
  Se avessi più tempo, mi piacerebbe approfondire la *scienza* dell'alimentazione.
  Wenn ich mehr Zeit hätte, würde ich mich gerne mit der *Wissenschaft* der Ernährung beschäftigen.
  
  Nonostante le difficoltà, la *scienza* non smette mai di progredire.
  Trotz aller Schwierigkeiten macht die *Wissenschaft* niemals Halt.
  
  La *scienza* ha dimostrato che l'inquinamento influisce sul clima.
  Die *Wissenschaft* hat bewiesen, dass die Verschmutzung das Klima beeinflusst.
