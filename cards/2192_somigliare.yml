Rang: 2192
Wort: somigliare
Wortart: vi
Wort mit Artikel: somigliare
Femininum / Plural: ''
IPA: ''
Definition: ähneln, gleichen
Register: ''
Beispielsätze: |-
  Questo dipinto *somiglia* molto allo stile di Picasso degli anni '30.
  Dieses Gemälde *gleicht* sehr Picassos Stil aus den 1930er Jahren.
  
  I suoi occhi verdi mi *somigliano* a quelli di mia nonna quando rideva.
  Ihre grünen Augen *ähneln* denen meiner Großmutter, wenn sie lachte.
  
  Non *somigli* affatto a tuo fratello, nonostante siate cresciuti insieme.
  Du *ähnelst* deinem Bruder überhaupt nicht, obwohl ihr zusammen aufgewachsen seid.
  
  Il nuovo direttore *somiglia* in modo impressionante al commissario responsabile dell’indagine precedente.
  Der neue Leiter *gleicht* dem Kommissar, der für die vorherige Ermittlung zuständig war, verblüffend.
  
  Non appena avrò finito, un esperto *somiglierà* il caso per trovare punti in comune con altri crimini simili.
  Sobald ich fertig bin, wird ein Experte den Fall *ähneln*, um Gemeinsamkeiten mit anderen ähnlichen Verbrechen zu finden.
