Beispielsätze: |-
  La *banca* apre alle otto di mattina.
  Die *Bank* öffnet um acht Uhr morgens.
  
  Ho bisogno di andare alla *banca* per prelevare dei soldi.
  Ich muss zur *Bank*, um Geld abzuheben.
  
  Questa *banca* offre tassi di interesse molto bassi.
  Diese *Bank* bietet sehr niedrige Zinssätze.
  
  Le *banche* italiane sono state colpite dalla crisi economica.
  Die *Banken* in Italien waren von der Wirtschaftskrise betroffen.
  
  Vor di andare al lavoro, passo sempre dalla *banca*.
  Bevor ich zur Arbeit gehe, gehe ich immer zur *Bank*.
