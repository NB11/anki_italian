Rang: 755
Wort: banca
Wortart: n.f
Wort mit Artikel: la banca
Femininum / Plural: banche
IPA: ''
Definition: die Bank, -en
Register: ''
Beispielsätze: |-
  Ho perso il mio portafoglio vicino alla *banca* di Piazza Dante.
  Ich habe meine Geldbörse in der Nähe der *Bank* an der Piazza Dante verloren.
  
  La *banca* offre un tasso d’interesse molto vantaggioso quest’anno.
  Die *Bank* bietet dieses Jahr einen sehr vorteilhaften Zinssatz an.
  
  Se non avessi investito in quella *banca*, ora non sarei in difficoltà.
  Wenn ich nicht in diese *Bank* investiert hätte, stünde ich jetzt nicht in Schwierigkeiten.
  
  Non è sicuro lasciare i soldi incustoditi nella *banca* dopo l’orario di chiusura.
  Es ist nicht sicher, das Geld nach Ladenschluss unbewacht in der *Bank* zu lassen.
  
  Sai che domani apriranno una nuova *banca* proprio vicino a casa tua?
  Weißt du, dass morgen eine neue *Bank* direkt in deiner Nähe eröffnet?
