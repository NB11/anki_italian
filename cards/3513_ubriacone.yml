Rang: 3513
Wort: ubriacone
Wortart: n.m
Wort mit Artikel: il ubriacone
Femininum / Plural: gli ubriaconi
IPA: ''
Definition: der Trunkenbold, -e
Register: ''
Beispielsätze: |-
  Non dare ascolto a *ubriacone* quando ti dà consigli assurdi.
  Höre nicht auf den *Trunkenbold*, wenn er dir unsinnige Ratschläge gibt.
  
  Quella sera non ricordavo come fossi arrivato a casa da *ubriacone* che ero.
  An diesem Abend erinnerte ich mich nicht, wie ich als *Trunkenbold* nach Hause gekommen war.
  
  Dicono che quel vecchio sia diventato *ubriacone* dopo la pensione.
  Man sagt, dass dieser alte Mann nach der Rente zum *Trunkenbold* geworden ist.
  
  Se continui a bere così, diventerai un *ubriacone* come lui.
  Wenn du weiter so trinkst, wirst du ein *Trunkenbold* wie er werden.
  
  Non lo frequenterei più, è solo un *ubriacone* che non si dà pace.
  Ich würde ihn nicht mehr treffen, er ist nur ein *Trunkenbold*, der keine Ruhe findet.
