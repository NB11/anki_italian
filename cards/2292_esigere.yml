Rang: 2292
Wort: esigere
Wortart: v
Wort mit Artikel: esigere
Femininum / Plural: ''
IPA: ''
Definition: fordern, verlangen, erzwingen
Register: ''
Beispielsätze: |-
  Il contratto *esige* che tu firmi qui entro domani.
  Der Vertrag *fordert*, dass du hier bis morgen unterschreibst.
  
  Hanno *esatto* il pagamento immediato della merce.
  Sie haben die sofortige Zahlung der *Ware* gefordert.
  
  Non *esigiamo* che tu venga, ma sarebbe gradito.
  Wir *verlangen* nicht, dass du kommst, aber es wäre schön.
  
  La polizia *esigerà* una spiegazione dettagliata di ciò che è successo.
  Die Polizei wird eine detaillierte Erklärung darüber, was passiert ist, *fordern*.
  
  Se *esigerete* troppo, perderete i clienti.
  Wenn ihr zu viel *fordert*, verliert ihr die Kunden.
Audio: ''
Notiz: ''
Dispersion: ''
