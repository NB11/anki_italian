Rang: 3118
Wort: sindrome
Wortart: n.m
Wort mit Artikel: la sindrome
Femininum / Plural: sindromi
IPA: ''
Definition: das Syndrom, -e
Register: ''
Beispielsätze: |-
  La *sindrome* di Down è una condizione genetica nota da secoli.
  Das *Syndrom* von Down ist eine seit Jahrhunderten bekannte genetische Erkrankung.
  
  Dopo gli esami, il medico ha diagnosticato una rara *sindrome* neurologica al paziente.
  Nach den Untersuchungen diagnostizierte der Arzt dem Patienten ein seltenes neurologisches *Syndrom*.
  
  Credeva che la sua stanchezza fosse solo stress, ma in realtà soffriva di una *sindrome* da affaticamento cronico.
  Er dachte, seine Müdigkeit sei nur Stress, aber eigentlich litt er unter einem chronischen Erschöpfungs*syndrom*.
  
  Nonostante i sintomi, gli studiosi hanno escluso la presenza della *sindrome* di Asperger nel bambino.
  Trotz der Symptome schlossen die Forscher das Vorliegen des Asperger-*Syndroms* beim Kind aus.
  
  La ricerca ha dimostrato che la *sindrome* metabolica colpisce sempre più giovani a causa della dieta scorretta.
  Die Forschung hat gezeigt, dass das metabolische *Syndrom* aufgrund falscher Ernährung immer mehr junge Menschen trifft.
