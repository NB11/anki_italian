Beispielsätze: |-
  Nel parco vicino a casa mia c'è un campo dove si gioca spesso al *baseball*.
  Im Park in meiner Nähe gibt es einen *Baseball*-Platz, auf dem oft gespielt wird.
  
  Mio fratello ha detto che domani inizierà a giocare a *baseball* nella sua nuova squadra.
  Mein Bruder hat gesagt, dass er morgen in seiner neuen Mannschaft mit dem *Baseballspielen* beginnt.
  
  Per fortuna abbiamo trovato un locale che vende magliette con il logo del *baseball*.
  Zum Glück haben wir ein Geschäft gefunden, das T-Shirts mit dem *Baseball*-Logo verkauft.
  
  Se vuoi imparare a lanciare bene la palla da *baseball*, devi esercitarti ogni giorno.
  Wenn du den *Baseball* gut werfen lernen willst, musst du dich jeden Tag üben.
  
  Il *baseball* è uno sport che richiede molta pazienza e coordinazione.
  Der *Baseball* ist eine Sportart, die viel Geduld und Koordination erfordert.
