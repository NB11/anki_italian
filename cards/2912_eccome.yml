Rang: 2912
Wort: eccome
Wortart: adv
Wort mit Artikel: eccome
Femininum / Plural: ''
IPA: ''
Definition: doch, und ob
Register: ''
Beispielsätze: |-
  Vuoi sapere se mi piace il gelato? *Eccome*!
  Willst du wissen, ob mir Eis schmeckt? *Doch*!
  
  Hai dubbi che abbia ragione? *Eccome* no!
  Zweifelst du, dass ich recht habe? *Doch* nicht!
  
  Se pensi che sia facile, ti sbagli di grosso! *Eccome* che è complicato.
  Wenn du glaubst, das sei einfach, liegst du falsch! *Doch* ist es kompliziert.
  
  Credi che non mi importi di te? *Eccome* che ci tengo!
  Glaubst du, es wäre mir egal? *Doch* liegt mir etwas daran!
  
  Dimmi un po’, sei stanco? *Eccome* che lo sono!
  Sag mal, bist du müde? *Doch* bin ich es!
