Rang: 1445
Wort: eccitare
Wortart: v
Wort mit Artikel: eccitare
Femininum / Plural: ''
IPA: ''
Definition: erregen, aufregen, erregen
Register: ''
Beispielsätze: |-
  I *eccitano* molto i concerti dal vivo perché l'energia della folla è contagiosa.
  Mich *erregen* Konzerte sehr, weil die Energie der Menge ansteckend ist.
  
  Non volevamo *eccitare* gli animi durante la discussione politica.
  Wir wollten die Gemüter *nicht aufregen* während der politischen Diskussion.
  
  Se avessi saputo che la notizia lo avrebbe *eccitato* così tanto, non gliel’avrei mai raccontata.
  Wenn ich gewusst hätte, dass die Nachricht ihn so *erregen* würde, hätte ich sie ihm nie erzählt.
  
  Il sindaco ha promesso di *eccitare* la partecipazione dei cittadini alle decisioni centrali della città.
  Der Bürgermeister hat versprochen, die Teilnahme der Bürger an den *zentralen* Entscheidungen der Stadt anzuregen.
  
  Si dice che certi film *eccitino* più delle serie tv, ma io preferisco quelle stupende produzioni recenti.
  Man sagt, dass manche Filme mehr *erregen* als Serien, aber ich bevorzuge diese wunderbaren neuen Produktionen.
