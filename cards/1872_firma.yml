Rang: 1872
Wort: firma
Wortart: n.f
Wort mit Artikel: la firma
Femininum / Plural: firme
IPA: ''
Definition: die Unterschrift, -en
Register: ''
Beispielsätze: |-
  Devo controllare la *firma* sul contratto prima di firmare.
  Ich muss die *Unterschrift* auf dem Vertrag vor dem Unterschreiben überprüfen.
  
  Non riconosco questa *firma* sull’assegno.
  Ich erkenne diese *Unterschrift* auf dem Scheck nicht wieder.
  
  La *firma* del testimone è richiesta per validare il documento.
  Die *Unterschrift* des Zeugen ist nötig, um das Dokument zu validieren.
  
  Ha dimenticato di apporre la sua *firma* sul modulo.
  Er hat vergessen, seine *Unterschrift* auf das Formular zu setzen.
  
  La *firma* del direttore è fondamentale per l’approvazione del progetto.
  Die *Unterschrift* des Direktors ist entscheidend für die Genehmigung des Projekts.
