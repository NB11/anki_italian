Rang: 4737
Wort: razionale
Wortart: adj
Wort mit Artikel: razionale
Femininum / Plural: ''
IPA: ''
Definition: vernünftig, rational
Register: ''
Beispielsätze: |-
  Ha preso una decisione *razionale* nonostante l'emozione.
  Er hat eine *vernünftige* Entscheidung trotz der Emotion getroffen.
  
  Per risolvere il problema serve un approccio più *razionale*.
  Um das Problem zu lösen, braucht es einen *rationaleren* Ansatz.
  
  Il suo modo di pensare è sempre stato molto *razionale* e poco emotivo.
  Seine Denkweise war immer sehr *rational* und wenig emotional.
  
  Non è *razionale* spendere tutti i soldi in una volta sola.
  Es ist nicht *vernünftig*, alles Geld auf einmal auszugeben.
  
  Se fossi *razionale*, non avresti accettato quelle condizioni.
  Wärst du *rational*, hättest du diese Bedingungen nicht akzeptiert.
