Rang: 4131
Wort: corrispondenza
Wortart: n.f
Wort mit Artikel: la corrispondenza
Femininum / Plural: corrispondenze
IPA: ''
Definition: die Korrespondenz, -en, die Briefwechsel
Register: ''
Beispielsätze: |-
  Ho ricevuto una lettera di *corrispondenza* da un amico che vive in Canada.
  Ich habe einen *Briefwechsel* von einem Freund erhalten, der in Kanada lebt.
  
  La *corrispondenza* tra noi è diventata sempre più rara negli ultimi anni.
  Der *Briefwechsel* zwischen uns ist in den letzten Jahren immer seltener geworden.
  
  Vuoi che controlli la *corrispondenza* mentre sei in vacanza?
  Möchtest du, dass ich den *Briefwechsel* kontrolliere, während du im Urlaub bist?
  
  La *corrispondenza* commerciale deve essere sempre archiviata con cura.
  Die geschäftliche *Korrespondenz* muss immer sorgfältig archiviert werden.
  
  Era una *corrispondenza* intensa, fatta di lettere e cartoline ogni settimana.
  Es war ein intensiver *Briefwechsel*, jede Woche voller Briefe und Postkarten.
