  Spesso le sfide ci *comportano* a migliorare.
  Oft *führen* uns Herausforderungen dazu, uns zu verbessern.
  
  Se non ti *comporti* bene, non uscirai.
  Wenn du dich nicht *gut benimmst*, wirst du nicht ausgehen.
