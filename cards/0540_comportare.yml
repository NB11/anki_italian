Beispielsätze: |-
  Questo *comporta* un rischio che non possiamo ignorare.
  Das *beinhaltet* ein Risiko, das wir nicht ignorieren können.
  
  Se non rispetti le regole, *comporterà* delle conseguenze serie.
  Wenn du die Regeln nicht befolgst, *wird* das ernste Konsequenzen beinhalten.
  
  Non credere che sia tutto rose e fiori: ogni scelta *comporta* dei sacrifici.
  Glaube nicht, dass alles einfach ist: Jede *Wahl* beinhaltet Opfer.
  
  Questa decisione *comporterebbe* un cambiamento radicale per tutti noi.
  Diese Entscheidung *würde* einen radikalen Wandel für uns alle beinhalten.
  
  Sappiamo che accettare l'invito *comporta* delle responsabilità aggiuntive.
  Wir wissen, dass das Annehmen der Einladung zusätzliche *Verantwortungen* beinhaltet.
