Rang: 647
Wort: compagno
Wortart: n.m
Wort mit Artikel: il compagno
Femininum / Plural: compagni
IPA: ''
Definition: der Kamerad, -en, der Genosse, -n
Register: ''
Beispielsätze: |-
  Il *compagno* di classe mi ha aiutato con i compiti di matematica.
  Der *Mitschüler* hat mir bei den Matheaufgaben geholfen.
  
  Nonostante la sconfitta, il *compagno* di squadra non ha perso la fiducia.
  Trotz der Niederlage hat der *Mitspieler* das Vertrauen nicht verloren.
  
  Se avessi un *compagno* così leale, non mi sentirei mai solo.
  Wenn ich einen solch *treuen Begleiter* hätte, würde ich mich nie einsam fühlen.
  
  Il *compagno* di viaggio che ho conosciuto in treno parlava tre lingue fluentemente.
  Der *Reisebegleiter*, den ich im Zug kennengelernt habe, sprach drei Sprachen fließend.
  
  Dobbiamo ringraziare il nostro *compagno* per il successo del progetto, che ha coordinato con grande abilità.
  Wir müssen unserem *Kollegen* für den Erfolg des Projekts danken, der es mit großer Fähigkeit koordiniert hat.
