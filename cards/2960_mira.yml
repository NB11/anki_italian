Beispielsätze: |-
  Il cecchino prese accuratamente *mira* al bersaglio.
  Der Scharfschütze nahm das *Ziel* sorgfältig ins Visier.
  
  Con il binocolo riuscì a vedere chiaramente la *mira* sulla nave.
  Mit dem Fernglas konnte er das *Ziel* auf dem Schiff deutlich erkennen.
  
  Hanno mancato *mira* di poco, ma il colpo è stato comunque efficace.
  Sie haben das *Ziel* knapp verfehlt, doch der Schuss war trotzdem wirksam.
  
  La *mira* del fucile era stata regolata con precisione.
  Das *Ziel* des Gewehrs war präzise eingestellt worden.
  
  Dopo lunghe discussioni, la *mira* comune è diventata più chiara.
  Nach langen Diskussionen wurde das gemeinsame *Ziel* klarer.
