Rang: 2991
Wort: rappresentante
Wortart: n.m
Wort mit Artikel: il rappresentante
Femininum / Plural: rappresentanti
IPA: ''
Definition: der Vertreter, -
Register: ''
Beispielsätze: |-
  Il *rappresentante* della ditta ha firmato il contratto ieri.
  Der *Vertreter* der Firma hat den Vertrag gestern unterzeichnet.
  
  Vorremmo che il *rappresentante* ci spiegasse i dettagli del progetto.
  Wir möchten, dass der *Vertreter* uns die Details des Projekts erklärt.
  
  Sai chi sarà il *rappresentante* dell’Italia alla conferenza di domani?
  Weißt du, wer der *Vertreter* Italiens bei der Konferenz morgen sein wird?
  
  I *rappresentanti* dei lavoratori hanno presentato le loro richieste al direttore.
  Die *Vertreter* der Arbeiter haben ihre Forderungen dem Direktor vorgelegt.
  
  Se fossi un *rappresentante*, viaggerei molto di più.
  Wenn ich *Vertreter* wäre, würde ich viel mehr reisen.
