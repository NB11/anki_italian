  Es ist eine *tragische* Geschichte, die davon erzählt, wie menschliches Mitgefühl in Extremsituationen verschwinden kann.
  
  Se avessi saputo quanto era *tragica* la sua situazione, sarei intervenuto molto prima!
  Wenn ich gewusst hätte, wie *tragisch* seine Situation war, hätte ich viel früher eingegriffen!
