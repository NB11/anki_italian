  Trotz der *tragischen* Situation versuchte er, die Ruhe zu bewahren und eine Lösung zu finden.
  
  Credi che la sua morte sia stata davvero *tragica* o solo un caso sfortunato?
  Glaubst du, sein Tod war wirklich *tragisch* oder nur ein unglücklicher Zufall?
  
