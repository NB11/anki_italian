Rang: 4709
Wort: ergastolo
Wortart: n.m
Wort mit Artikel: lo ergastolo
Femininum / Plural: ergastoli
IPA: ''
Definition: die lebenslange Freiheitsstrafe, der lebenslange Zuchthaus
Register: ''
Beispielsätze: |-
  Lo Stato italiano ha ridotto la pena dell'*ergastolo* per i reati meno gravi.
  Der italienische Staat hat die Strafe *Lebenslange Freiheitsstrafe* für weniger schwere Verbrechen reduziert.
  
  Molti detenuti non si rassegnano all'idea di finire i loro giorni in *ergastolo*.
  Viele Gefangene resignieren nicht bei der *Aussicht auf lebenslange Freiheitsstrafe*.
  
  Secondo il codice penale, il *ergastolo* si sconta senza possibilità di libertà condizionale.
  Laut dem Strafgesetzbuch wird die *lebenslange Freiheitsstrafe* ohne Aussicht auf Bewährung verbüßt.
  
  Chi commette un delitto efferato rischia inevitabilmente l'*ergastolo*.
  Wer ein grauenhaftes Verbrechen begeht, riskiert unweigerlich *lebenslangen Zuchthaus*.
  
  L’avvocato difensore spera che la corte non applichi l’*ergastolo* per il suo cliente.
  Der Verteidiger hofft, dass das Gericht *lebenslange Freiheitsstrafe* gegen seinen Mandanten nicht verhängt.
