Rang: 1138
Wort: pausa
Wortart: n.f
Wort mit Artikel: la pausa
Femininum / Plural: pause
IPA: ''
Definition: die Pause, -n
Register: ''
Beispielsätze: |-
  Dopo tre ore di lavoro, ho bisogno di una *pausa*.
  Nach drei Stunden Arbeit brauche ich eine *Pause*.
  
  La *pausa* pranzo dura solo mezz'ora, ma possiamo mangiare una fetta di torta nella sala vicino all'angolo della caffetteria.
  Die Mittagspause dauert nur eine halbe Stunde, aber wir können ein Stück *Kuchen* im Raum neben der Ecke der Cafeteria essen.
  
  Nonostante il freddo pungente, abbiamo approfittato della *pausa* per fare due passi nel parco.
  Trotz der stechenden Kälte haben wir die *Pause* genutzt, um zwei Schritte im Park zu gehen.
  
  Quando il proiettile ha attraversato la stanza, tutti hanno interrotto il lavoro e cercato riparo senza alcuna *pausa*.
  Als das Geschoss den Raum durchquerte, unterbrachen alle die Arbeit und suchten ohne eine *Pause* Schutz.
  
  Se avessi saputo che la *pausa* sarebbe stata così breve, avrei suggerito di lavorare in un altro college con orari più flessibili.
  Hätte ich gewusst, dass die *Pause* so kurz sein würde, hätte ich vorgeschlagen, in einem anderen College mit flexibleren Zeiten zu arbeiten.
