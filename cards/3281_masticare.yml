Rang: 3281
Wort: masticare
Wortart: v
Wort mit Artikel: masticare
Femininum / Plural: ''
IPA: ''
Definition: kauen
Register: ''
Beispielsätze: |-
  Mio fratello *mastica* lentamente la sua bistecca perché gli manca un dente.
  Mein Bruder *kaut* sein Steak langsam, weil ihm ein Zahn fehlt.
  
  Se non *masticassi* bene, non potresti gustare appieno il sapore di questo piatto speziato.
  Wenn du nicht gut *kauen* würdest, könntest du den Geschmack dieses scharfen Gerichts nicht richtig genießen.
  
  Ho visto che il bambino *masticava* una gomma da masticare durante la lezione.
  Ich habe gesehen, wie das Kind während der Stunde einen Kaugummi *kaute*.
  
  Appena avrò tempo, *masticherò* con calma questo pane appena sfornato che profuma di noci.
  Sobald ich Zeit habe, werde ich dieses frisch gebackene Brot, das nach Nüssen riecht, gemächlich *kauen*.
  
  Mi hanno detto che chi *masticava* troppo velocemente spesso aveva problemi di digestione.
  Man hat mir gesagt, dass diejenigen, die zu schnell *kau*en*, oft Verdauungsprobleme haben.
