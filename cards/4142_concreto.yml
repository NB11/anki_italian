  Ich wollte ein *konkretes* Beispiel, um meinen Schülern das Konzept zu erklären.
  
  La polizia ha trovato prove *concrete* contro l’accusato, non solo indizi.
  Die Polizei hat *konkrete* Beweise gegen den Angeklagten gefunden, nicht nur Indizien.
  
  Penso che il tuo piano sia fattibile: è *concreto* e ben strutturato.
  Ich denke, dein Plan ist machbar – er ist *konkret* und gut strukturiert.
