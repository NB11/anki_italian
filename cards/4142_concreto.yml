Beispielsätze: |-
  Abbiamo bisogno di una soluzione *concreta* per risolvere il problema.
  Wir brauchen eine *konkrete* Lösung, um das Problem zu lösen.
  
  Il suo discorso è stato troppo astratto; non ho capito nulla di *concreto*.
  Seine Rede war zu abstrakt; ich habe nichts *Konkrete*s verstanden.
  
