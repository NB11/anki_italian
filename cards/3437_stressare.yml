Rang: 3437
Wort: stressare
Wortart: v
Wort mit Artikel: stressare
Femininum / Plural: ''
IPA: ''
Definition: stressen, überlasten, beanspruchen
Register: ''
Beispielsätze: |-
  Il capo *stressa* troppo gli impiegati con le scadenze impossibili.
  Der Chef *stressiert* die Mitarbeiter mit unmöglichen Fristen zu sehr.
  
  Dopo che ho *stressato* la mia auto per mesi, ora deve andare dal meccanico.
  Nachdem ich mein Auto monatelang *gestresst* habe, muss es jetzt in die Werkstatt.
  
  Mi dispiace, ma non volevo *stressarti* con tutte queste domande!
  Es tut mir leid, aber ich wollte dich mit all diesen Fragen nicht *stressen*!
  
  Se non smetti di *stressare* quella povera ragazza, andrà a piangere da qualche parte.
  Wenn du nicht aufhörst, *das arme Mädchen zu stressen*, wird sie irgendwohin laufen, um zu weinen.
  
  Hanno *stressato* l’impianto di riscaldamento fino a romperlo, ora fa un freddo cane in casa.
  Sie haben die Heizungsanlage bis zum Kaputtgehen *gestresst* – jetzt ist es eiskalt im Haus.
