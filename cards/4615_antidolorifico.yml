Rang: 4615
Wort: antidolorifico
Wortart: n.m
Wort mit Artikel: il antidolorifico
Femininum / Plural: antidolorifici
IPA: ''
Definition: das Schmerzmittel, -
Register: ''
Beispielsätze: |-
  Dopo l'*antidolorifico*, ho finalmente potuto dormire senza dolore alle gambe.
  Nach dem *Schmerzmittel* konnte ich endlich ohne Schmerzen in den Beinen schlafen.
  
  Il medico mi ha prescritto un *antidolorifico* più forte perché quello leggero non faceva effetto.
  Der Arzt hat mir ein stärkeres *Schmerzmittel* verschrieben, weil das leichte nicht wirkte.
  
  Se avessi preso un *antidolorifico* prima, ora non soffrirei così tanto per il mal di testa.
  Hätte ich früher ein *Schmerzmittel* genommen, würde ich jetzt nicht so sehr unter Kopfschmerzen leiden.
  
  Questo *antidolorifico* è molto efficace, ma attenzione a non prenderlo a stomaco vuoto!
  Dieses *Schmerzmittel* ist sehr wirksam, aber pass auf, dass du es nicht auf nüchternen Magen nimmst!
  
  Nonostante l'*antidolorifico*, il dolore alle articolazioni non si è attenuato nemmeno di poco.
  Trotz des *Schmerzmittels* hat sich der Gelenkschmerz nicht im Geringsten verringert.
