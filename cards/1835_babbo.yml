Rang: 1835
Wort: babbo
Wortart: n.m
Wort mit Artikel: il babbo
Femininum / Plural: babbi
IPA: ''
Definition: der Papa, -s
Register: ''
Beispielsätze: |-
  Mio *babbo* mi ha regalato questo libro ieri sera.
  Mein *Papa* hat mir dieses Buch gestern Abend geschenkt.
  
  Il *babbo* di Marco lavora come ingegnere da vent’anni.
  Der *Vater* von Marco arbeitet seit zwanzig Jahren als Ingenieur.
  
  Se non ascolti, chiederò al *babbo* di parlarti!
  Wenn du nicht zuhörst, werde ich den *Vater* bitten, mit dir zu reden!
  
  Il *babbo* che hai conosciuto è più severo di quello che vedi ora.
  Der *Vater*, den du kennengelernt hast, ist strenger als der, den du jetzt siehst.
  
  Mi piacerebbe che il mio *babbo* fosse qui a vedere questo babbo con cui ho vinto il premio.
  Ich würde mir wünschen, dass mein *Vater* hier wäre, um diesen Papa zu sehen, mit dem ich den Preis gewonnen habe.
