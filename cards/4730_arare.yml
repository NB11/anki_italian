Rang: 4730
Wort: arare
Wortart: v
Wort mit Artikel: arare
Femininum / Plural: ''
IPA: ''
Definition: pflügen
Register: ''
Beispielsätze: |-
  I contadini *arano* i campi ogni primavera per preparare la semina.
  Die Bauern *pflügen* die Felder jeden Frühling, um die Aussaat vorzubereiten.
  
  Se non avessi *arato* quel terreno, ora sarebbe incolto.
  Wenn ich dieses Feld nicht *gepflügt* hätte, läge es jetzt brach.
  
  Dicono che quest'anno *arerebbero* tutto il campo a mano.
  Man sagt, sie würden dieses Jahr das gesamte Feld von Hand *pflügen*.
  
  Ho visto un trattore che *arava* vicino al fiume mentre passeggiavo.
  Ich sah einen Traktor, der am Fluss entlang *pflügte*, während ich spazieren ging.
  
  Spero che domani riescano finalmente a *arare* questo pezzo di terra.
  Ich hoffe, dass sie es morgen schaffen, dieses Stück Land endlich zu *pflügen*.
