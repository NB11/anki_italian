Rang: 1726
Wort: saluto
Wortart: n.m
Wort mit Artikel: il saluto
Femininum / Plural: saluti
IPA: ''
Definition: der Gruß, -e
Register: ''
Beispielsätze: |-
  Quando incontro un amico, gli faccio un *saluto* caloroso.
  Wenn ich einen Freund treffe, gebe ich ihm einen *warmen Gruß*.
  
  Nonostante il *saluto* freddo, lei accettò l’invito a cena.
  Trotz des *kühlen Grußes* nahm sie die Einladung zum Abendessen an.
  
  Mi è rimasto impresso il suo *saluto* affettuoso di quando eravamo piccoli.
  Sein *herzlicher Gruß* aus unserer Kindheit ist mir unvergesslich geblieben.
  
  Prima di partire, mi ha mandato un *saluto* veloce tramite messaggio.
  Bevor er ging, schickte er mir einen *schnellen Gruß* per Nachricht.
  
  Ho ricevuto tanti *saluti* da persone che non vedevo da anni.
  Ich habe so viele *Grüße* von Leuten erhalten, die ich seit Jahren nicht gesehen habe.
