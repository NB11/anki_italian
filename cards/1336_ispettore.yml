Rang: 1336
Wort: ispettore
Wortart: n.m
Wort mit Artikel: l'ispettore
Femininum / Plural: gli ispettori
IPA: ''
Definition: der Inspektor, -en
Register: ''
Beispielsätze: |-
  L’*ispettore* ha accomodato tutti gli ospiti nel giardino.
  Der *Inspektor* hat alle Gäste im Garten untergebracht.
  
  Se vuoi partecipare alla riunione, devi parlare con l’*ispettore* nazionale.
  Wenn du am Meeting *teilnehmen* möchtest, musst du mit dem nationalen Inspektor sprechen.
  
  L’*ispettore* ha telefonato perché qualcuno aveva minacciato la maestà.
  Der *Inspektor* hat angerufen, weil jemand die Majestät bedroht hatte.
  
  Dicono che l’*ispettore* abbia rintracciato il killer a cento metri di distanza.
  Man sagt, der *Inspektor* habe den Mörder in hundert Metern Entfernung aufgespürt.
  
  L’*ispettore* chiede se qualcuno abbia visto qualcosa di particolare lassù.
  Der *Inspektor* fragt, ob jemand etwas Besonderes da oben gesehen hat.
