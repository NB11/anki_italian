Rang: 4282
Wort: rapitore
Wortart: n.m
Wort mit Artikel: il rapitore
Femininum / Plural: rapitori
IPA: ''
Definition: der Entführer, -
Register: ''
Beispielsätze: |-
  La polizia ha arrestato il *rapitore* dopo una lunga caccia all'uomo.
  Die Polizei hat den *Entführer* nach einer langen Fahndung festgenommen.
  
  Se fossi in te, non sottovaluterei il *rapitore*: è molto pericoloso.
  Wenn ich du wäre, würde ich den *Entführer* nicht unterschätzen: Er ist sehr gefährlich.
  
  Credi che il *rapitore* abbia agito da solo o ci sia qualcuno dietro di lui?
  Glaubst du, dass der *Entführer* allein gehandelt hat oder jemand dahintersteckt?
  
  Non appena avremo prove sufficienti, processeremo il *rapitore* per sequestro di persona.
  Sobald wir genug Beweise haben, werden wir den *Entführer* wegen Freiheitsberaubung anklagen.
  
  Il *rapitore* ha chiamato la famiglia della vittima per chiedere il riscatto.
  Der *Entführer* hat die Familie des Opfers angerufen, um das Lösegeld zu verlangen.
