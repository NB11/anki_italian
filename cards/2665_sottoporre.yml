Rang: 2665
Wort: sottoporre
Wortart: vt
Wort mit Artikel: sottoporre
Femininum / Plural: ''
IPA: ''
Definition: unterwerfen, einreichen
Register: ''
Beispielsätze: |-
  Il medico ha deciso di *sottoporre* il paziente a ulteriori esami clinici.
  Der Arzt hat beschlossen, den Patienten weiteren klinischen *Untersuchungen* zu unterziehen.
  
  Dopo aver preparato la documentazione, dobbiamo *sottoporre* il progetto alla commissione.
  Nachdem wir die Unterlagen vorbereitet haben, müssen wir das Projekt der Kommission zur *Genehmigung* vorlegen.
  
  Se *sottoponi* la richiesta entro domani, potrai ancora partecipare al concorso.
  Wenn du den Antrag bis morgen *einreichst*, kannst du noch an dem Wettbewerb teilnehmen.
  
  Nonostante le critiche, hanno comunque *sottoposto* la legge al voto del parlamento.
  Trotz der Kritik haben sie das Gesetz trotzdem zur *Abstimmung* im Parlament vorgelegt.
  
  Prima di firmare il contratto, vorrei *sottoporre* alcuni punti alla tua attenzione.
  Bevor ich den Vertrag unterschreibe, möchte ich dir einige Punkte zur *Prüfung* vorlegen.
