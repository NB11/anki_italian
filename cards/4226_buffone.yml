Rang: 4226
Wort: buffone
Wortart: n.m
Wort mit Artikel: il buffone
Femininum / Plural: buffoni
IPA: ''
Definition: der Hanswurst, -e; der Narr, -en
Register: ''
Beispielsätze: |-
  Quel *buffone* fa ridere tutti con le sue battute stupide.
  Jener *Hanswurst* lässt alle mit seinen dummen Sprüchen lachen.
  
  Non mi fido di quell’uomo, è un vero *buffone*!
  Ich vertraue jenem Mann nicht, er ist ein echter *Narr*!
  
  Se avessi un po’ più di umorismo non faresti il *buffone* in ogni situazione.
  Wenn du ein bisschen mehr Humor hättest, würdest du nicht in jeder Situation der *Hanswurst* sein.
  
  Era così *buffone* che tutti lo chiamavano solo per divertirsi.
  Er war so ein *Narr*, dass alle ihn nur zum Spaß riefen.
  
  Credi davvero che sia un *buffone*? In realtà è molto serio.
  Glaubst du wirklich, er sei ein *Hanswurst*? Eigentlich ist er sehr ernst.
