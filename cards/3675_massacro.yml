Rang: 3675
Wort: massacro
Wortart: n.m
Wort mit Artikel: il massacro
Femininum / Plural: massacri
IPA: ''
Definition: das Massaker, -
Register: ''
Beispielsätze: |-
  Il *massacro* avvenuto durante la guerra è ricordato ogni anno il 4 novembre.
  Das *Massaker*, das während des Krieges stattfand, wird am 4. November jedes Jahr erinnert.
  
  Dopo il *massacro* nella città vecchia, la polizia ha aumentato la sorveglianza.
  Nach dem *Massaker* in der Altstadt hat die Polizei die Überwachung verdoppiert.
  
  Chi è responsabile del *massacro* che ha scosso l’opinione pubblica europea?
  Wer ist verantwortlich für das *Massaker*, das die europäische Öffentlichkeit erschüttert hat?
  
  Se avessero ascoltato le vittime del *massacro*, forse sarebbe successo qualcosa di diverso.
  Wenn sie auf die Opfer des *Massakers* gehört hätten, wäre vielleicht etwas anderes passiert.
  
  Nonostante le prove schiaccianti, nessuno ha ancora confessato il *massacro* degli anni ’90.
  Trotz überwältigender Beweise hat noch niemand das *Massaker* der 90er Jahre zugegeben.
