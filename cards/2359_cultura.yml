Rang: 2359
Wort: cultura
Wortart: n.f
Wort mit Artikel: la cultura
Femininum / Plural: culture
IPA: ''
Definition: die Kultur, -en
Register: ''
Beispielsätze: |-
  La *cultura* italiana è famosa in tutto il mondo per la sua arte e la sua cucina.
  Die *Kultur* Italiens ist weltweit für ihre Kunst und Küche berühmt.
  
  Nelle università si studiano non solo le *culture* antiche, ma anche quelle contemporanee.
  An Universitäten wird nicht nur die *Kultur* der Antike, sondern auch die moderne untersucht.
  
  Dopo quel viaggio, la sua *cultura* generale è migliorata moltissimo.
  Nach dieser Reise hat sich sein Allgemein*wissen* deutlich verbessert.
  
  Se vuoi capire questo romanzo, devi conoscere la *cultura* di cui parla l'autore.
  Wenn du diesen Roman verstehen willst, musst du die *Kultur* kennen, von der der Autor spricht.
  
  È noto che ogni *cultura* ha le sue tradizioni, anche se alcune sembrano strane agli stranieri.
  Es ist bekannt, dass jede *Kultur* ihre eigenen Traditionen hat, auch wenn sie Ausländern seltsam erscheinen.
