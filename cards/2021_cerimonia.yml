Beispielsätze: |-
  Ieri *cerimonia* di laurea è stata molto emozionante.
  Gestern war die *Abschlusszeremonie* sehr bewegend.
  
  Durante la *cerimonia* di premiazione, tutti hanno applaudito con entusiasmo.
  Bei der *Auszeichnungzeremonie* haben alle begeistert applaudiert.
  
  Penso che la *cerimonia* sarà rinviata a causa della pioggia.
  Ich glaube, die *Feierlichkeit* wird wegen des Regens verschoben.
  
  Ha organizzato una *cerimonia* privata per festeggiare il suo anniversario.
  Sie hat eine private *Zeremonie* organisiert, um ihren Jahrestag zu feiern.
  
  Nonostante tutto, la *cerimonia* è andata avanti come previsto.
  Trotz allem ging die *Feier* planmäßig weiter.
