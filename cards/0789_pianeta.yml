Rang: 789
Wort: pianeta
Wortart: n.m
Wort mit Artikel: il pianeta
Femininum / Plural: pianeti
IPA: ''
Definition: der Planet, -en
Register: ''
Beispielsätze: |-
  Il nostro *pianeta* ha bisogno di più rispetto per l'ambiente.
  Unser *Planet* braucht mehr Respekt für die Umwelt.
  
  Gli scienziati hanno scoperto un nuovo *pianeta* simile alla Terra.
  Die Wissenschaftler haben einen neuen, der Erde ähnlichen *Planeten* entdeckt.
  
  Se non proteggiamo il *pianeta*, da qui a cinquant'anni ci saranno grandi pericoli.
  Wenn wir den *Planeten* nicht schützen, wird es in fünfzig Jahren große Gefahren geben.
  
  Credi che esistano altri *pianeti* abitati come il nostro?
  Glaubst du, dass es andere bewohnte *Planeten* wie unseren gibt?
  
  Il governo sta cercando di ridurre l'inquinamento del *pianeta* con nuove leggi ambientali.
  Die Regierung versucht, die Verschmutzung des *Planeten* mit neuen Umweltgesetzen zu verringern.
