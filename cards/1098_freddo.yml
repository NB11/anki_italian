Rang: 1098
Wort: freddo
Wortart: n.m
Wort mit Artikel: il freddo
Femininum / Plural: freddi
IPA: ''
Definition: die Kälte, -
Register: ''
Beispielsätze: |-
  Ieri sera ha fatto un *freddo* insopportabile, quindi abbiamo acceso il riscaldamento.
  Gestern Abend war die *Kälte* unerträglich, also haben wir die Heizung eingeschaltet.
  
  In questo *freddo* invernale, solo gli uccelli più resistenti riescono a sopravvivere.
  Bei dieser winterlichen *Kälte* überleben nur die robustesten Vögel.
  
  Se non avessimo chiuso la finestra, il *freddo* avrebbe rovinato la torta ancora calda.
  Wenn wir das Fenster nicht geschlossen hätten, hätte die *Kälte* den noch warmen Kuchen ruiniert.
  
  Il *freddo* di gennaio è diverso da quello di dicembre, soprattutto per chi vive al nord.
  Die *Kälte* im Januar unterscheidet sich von der im Dezember, besonders für diejenigen, die im Norden leben.
  
  È meglio aspettare che il *freddo* diminuisca prima di uscire con il furgone.
  Es ist besser zu warten, bis die *Kälte* nachlässt, bevor man mit dem Transporter losfährt.
