Rang: 2978
Wort: psichiatra
Wortart: n.m.f
Wort mit Artikel: lo psichiatra
Femininum / Plural: gli psichiatri
IPA: ''
Definition: der Psychiater, - / die Psychiaterin, -nen
Register: ''
Beispielsätze: |-
  Lo *psichiatra* ha diagnosticato un disturbo d'ansia al paziente dopo una lunga seduta.
  Der *Psychiater* hat nach einer langen Sitzung eine Angststörung beim Patienten diagnostiziert.
  
  Nonostante le critiche, il professor Rossi rimane uno dei migliori *psichiatri* in Italia.
  Trotz der Kritik bleibt Professor Rossi einer der besten *Psychiater* in Italien.
  
  Se avessi un problema psicologico, mi rivolgerei subito a uno *psichiatra* competente.
  Hätte ich ein psychisches Problem, würde ich mich sofort an einen kompetenten *Psychiater* wenden.
  
  È fondamentale che il *psichiatra* ascolti con attenzione i racconti del paziente.
  Es ist entscheidend, dass der *Psychiater* den Schilderungen des Patienten aufmerksam zuhört.
  
  Molti pazienti si fidano di più di uno *psichiatra* donna che di uno uomo, secondo recenti studi.
  Viele Patienten vertrauen laut aktuellen Studien einer Psychiaterin mehr als einem Psychiater.
