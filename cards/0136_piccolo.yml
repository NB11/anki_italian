Wort: piccolo
Wortart: adj
Wort mit Artikel: piccolo
Femininum / Plural: ''
IPA: ''
Definition: klein, winzig, gering
Register: ''
Beispielsätze: |-
  Il cane *piccolo* abbaia meno del cane grande.
  Der *kleine* Hund bellt weniger als der große Hund.
  
  Abbiamo comprato una casa *piccola* in campagna.
  Wir haben ein *kleines* Haus auf dem Land gekauft.
  
  È *piccolo* il problema di cui parliamo ogni giorno?
  Ist das *kleine* Problem, über das wir jeden Tag sprechen?
  
  I *piccoli* errori spesso hanno grandi conseguenze.
  Die *kleinen* Fehler haben oft große Konsequenzen.
  
  Se fossi *piccolo* come lui, farei lo stesso.
  Wenn ich so *klein* wie er wäre, würde ich dasselbe tun.
