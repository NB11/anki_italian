Rang: 4679
Wort: scenata
Wortart: n.f
Wort mit Artikel: la scenata
Femininum / Plural: scenate
IPA: ''
Definition: der Wutanfall, -¨e, der Ausraster
Register: ''
Beispielsätze: |-
  Non sopporto quando fai una *scenata* inutile per ogni minima cosa.
  Ich kann nicht ertragen, wenn du bei jeder Kleinigkeit einen *Wutanfall* machst.
  
  Dopo la *scenata* di ieri, hanno finalmente capito che non si può continuare così.
  Nach dem *Wutanfall* von gestern haben sie endlich verstanden, dass es so nicht weitergehen kann.
  
  Se non smetti subito di fare questa *scenata*, andrò via senza di te.
  Wenn du nicht sofort mit dem *Ausraster* aufhörst, gehe ich ohne dich weg.
  
  Ha fatto una *scenata* tremenda perché non trovava le sue chiavi, ma poi si sono rivelate nella sua tasca.
  Sie hat einen riesigen *Wutanfall* gemacht, weil sie ihre Schlüssel nicht fand, doch dann lagen sie in ihrer Tasche.
  
  Ogni volta che discutiamo, finisce sempre in una *scenata* inutile e poi ci pentiamo entrambi.
  Immer wenn wir streiten, endet es jedes Mal in einem sinnlosen *Wutanfall*, und dann bereuen wir es beide.
