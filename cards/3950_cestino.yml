Rang: 3950
Wort: cestino
Wortart: n.m
Wort mit Artikel: il cestino
Femininum / Plural: cestini
IPA: ''
Definition: der Mülleimer, - / der Abfalleimer, -
Register: ''
Beispielsätze: |-
  Ho buttato la *cestino* della carta nel bidone della raccolta differenziata.
  Ich habe den *Mülleimer* für Papier in die gelbe Tonne geworfen.
  
  Dove hai messo il *cestino* per le bottiglie di plastica?
  Wo hast du den *Abfalleimer* für Plastikflaschen hingestellt?
  
  Non avresti dovuto gettare i rifiuti nel *cestino* della cucina!
  Du hättest den Abfall nicht in den *Mülleimer* in der Küche werfen dürfen!
  
  Il *cestino* che hai comprato è troppo piccolo per la nostra spazzatura.
  Der *Mülleimer*, den du gekauft hast, ist zu klein für unseren Müll.
  
  Se non svuoti regolarmente il *cestino*, puzza nel corridoio.
  Wenn du den *Abfalleimer* nicht regelmäßig leerst, stinkt es im Flur.
