Rang: 3704
Wort: pilotare
Wortart: vt
Wort mit Artikel: pilotare
Femininum / Plural: ''
IPA: ''
Definition: steuern, fliegen
Register: ''
Beispielsätze: |-
  Mio fratello vuole *pilotare* un aereo di linea dopo la laurea.
  Mein Bruder möchte ein Linienflugzeug *steuern* nach dem Studium.
  
  Se avessi i soldi, *piloterei* io stesso l'elicottero durante il viaggio.
  Wenn ich das Geld hätte, würde ich *fliegen* den Hubschrauber selbst während der Reise.
  
  Nonostante la tempesta, l'equipaggio continuò a *pilotare* con precisione eccezionale.
  Trotz des Sturms setzte die Crew das *Fliegen* mit außergewöhnlicher Präzision fort.
  
  Dicono che saper *pilotare* richieda anni di addestramento e grande attenzione.
  Man sagt, dass das *Steuern* jahrelange Ausbildung und große Aufmerksamkeit erfordert.
  
  Appena atterrato, l'aereo cominciò a *pilotare* verso il gate con movimento fluido.
  Sobald gelandet, begann das Flugzeug, sich mit geschmeidiger Bewegung zum Gate *zu steuern*.
