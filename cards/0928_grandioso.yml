Definition: großartig, herrlich, prächtig
Register: ''
Beispielsätze: |-
  Questa *grandiosa* opera d’arte ha attirato l’attenzione di tutto il professore di storia dell’arte.
  Dieses *großartige* Kunstwerk hat die Aufmerksamkeit des gesamten Kunstgeschichte-Professors erregt.
  
  Ho vissuto un’esperienza *grandiosa* durante il mio viaggio in Italia lo scorso anno.
  Ich habe eine *herrliche* Erfahrung während meiner Italienreise letzten Jahr gemacht.
  
  Se avessimo saputo dell’incontro *grandioso* a Parigi, ci saremmo uniti naturalmente!
  Wenn wir von dem *herrlichen* Treffen in Paris gewusst hätten, wären wir selbstverständlich dabei gewesen!
  
  Il film parlava di un eroe che compiva sempre atti *grandiosi*, anche nelle condizioni più difficili.
  Der Film erzählte von einem Helden, der immer *großartige* Taten vollbrachte, selbst unter den schwierigsten Bedingungen.
  
  Nonostante le critiche, la sua performance rimase *grandiosa* e memorabile per tutti i membri della giuria.
  Trotz der Kritik blieb seine Leistung *herrlich* und unvergesslich für alle Mitglieder der Jury.
