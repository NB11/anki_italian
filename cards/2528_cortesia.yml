Rang: 2528
Wort: cortesia
Wortart: n.f
Wort mit Artikel: la cortesia
Femininum / Plural: cortesie
IPA: ''
Definition: die Höflichkeit, die Freundlichkeit
Register: ''
Beispielsätze: |-
  La *cortesia* è una qualità che tutti apprezzano.
  Die *Höflichkeit* ist eine Eigenschaft, die alle schätzen.
  
  Gli ho scritto una mail piena di *cortesia* per ringraziarlo del suo aiuto.
  Ich habe ihm eine Mail voller *Höflichkeit* geschrieben, um mich für seine Hilfe zu bedanken.
  
  Se avessero mostrato un minimo di *cortesia*, non se ne sarebbero andati così presto.
  Wenn sie ein Minimum an *Höflichkeit* gezeigt hätten, wären sie nicht so früh gegangen.
  
  Nonostante tutto, lui ha sempre reagito con estrema *cortesia*.
  Trotz allem hat er immer mit äußerster *Höflichkeit* reagiert.
  
  Le chiesi un favore con tanta *cortesia* che accettò senza esitare.
  Ich bat sie so *höflich* um einen Gefallen, dass sie ohne zu zögern zustimmte.
