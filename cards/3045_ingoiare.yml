Rang: 3045
Wort: ingoiare
Wortart: v
Wort mit Artikel: ingoiare
Femininum / Plural: ''
IPA: ''
Definition: schlucken, herunterschlucken
Register: ''
Beispielsätze: |-
  Devi *ingoiare* la pillola intera con un po' d'acqua.
  Du musst die Tablette ganz mit etwas Wasser *schlucken*.
  
  Ha *ingoiasto* il boccone troppo in fretta e si è soffocato.
  Er hat den Bissen zu schnell *heruntergeschluckt* und sich verschluckt.
  
  Mi dispiace, ma dovrai *ingoiare* questo rospo e accettare le condizioni.
  Tut mir leid, aber du wirst diesen *Frosch* schlucken müssen und die Bedingungen akzeptieren.
  
  Se non *ingoierai* le tue preoccupazioni, non potrai mai guarire completamente.
  Wenn du deine Sorgen nicht *schluckst*, wirst du niemals vollständig gesund werden können.
  
  Nonostante tutto, riuscì a *ingoiare* il suo orgoglio e chiese scusa.
  Trotz allem schaffte er es, seinen *Stolz* zu schlucken, und entschuldigte sich.
Audio: ''
Notiz: ''
