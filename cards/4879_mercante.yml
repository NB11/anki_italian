Rang: 4879
Wort: mercante
Wortart: n.m
Wort mit Artikel: il mercante
Femininum / Plural: mercanti
IPA: ''
Definition: der Händler, -
Register: ''
Beispielsätze: |-
  L’amico di mio *mercante* è molto simpatico e sempre disponibile.
  Der Freund meines *Händlers* ist sehr nett und immer hilfsbereit.
  
  Se fossi un ricco *mercante* viaggerei tutto il mondo.
  Wenn ich ein reicher *Händler* wäre, würde ich um die ganze Welt reisen.
  
  Il *mercante* che ho incontrato al mercato vendeva spezie preziose da ogni parte del mondo.
  Der *Händler*, den ich auf dem Markt getroffen habe, verkaufte wertvolle Gewürze aus aller Welt.
  
  Prima di diventare un ricco *mercante*, aveva lavorato come semplice apprendista.
  Bevor er ein reicher *Händler* wurde, hatte er als einfacher Lehrling gearbeitet.
  
  È incredibile quanti *mercanti* siano scomparsi con l’arrivo dei grandi magazzini.
  Es ist unglaublich, wie viele *Händler* mit der Ankunft der großen Kaufhäuser verschwunden sind.
