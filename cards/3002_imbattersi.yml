Rang: 3002
Wort: imbattersi
Wortart: vi
Wort mit Artikel: imbattersi
Femininum / Plural: ''
IPA: ''
Definition: stoßen auf, treffen auf
Register: ''
Beispielsätze: |-
  Mentre camminavo nel bosco, mi sono *imbattuto* in un ragno gigante!
  Während ich im Wald ging, bin ich auf eine riesige *Spinne* gestoßen!
  
  Non volevo che tu ti *imbattessi* in questa realtà così dura.
  Ich wollte nicht, dass du auf diese so harte Realität stößt.
  
  Durante la spedizione, gli esploratori si sono *imbattevi* in resti di antiche civiltà.
  Während der Expedition stießen die Entdecker auf Überreste antiker Kulturen.
  
  Se ti *imbatterai* in un problema, chiedi aiuto al consulente.
  Wenn du auf ein Problem *triffst*, frag den Berater um Hilfe.
  
  È sorprendente quanto spesso ci si *imbatta* in persone che ci somigliano.
  Es ist verblüffend, wie oft man auf Menschen stößt, die uns ähneln.
Audio: ''
Notiz: ''
Dispersion: ''
