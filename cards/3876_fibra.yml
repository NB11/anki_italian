Rang: 3876
Wort: fibra
Wortart: n.f
Wort mit Artikel: la fibra
Femininum / Plural: fibre
IPA: ''
Definition: die Faser, -n
Register: ''
Beispielsätze: |-
  La *fibra* muscolare si danneggia facilmente durante gli sforzi intensi.
  Der *Muskelfaser* wird bei intensiver Anstrengung leicht beschädigt.
  
  Per mantenere la salute, è importante assumere una quantità sufficiente di *fibre* nella dieta.
  Um gesund zu bleiben, muss man genug *Ballaststoffe* mit der Nahrung aufnehmen.
  
  Il tessuto che hai scelto contiene una *fibra* molto resistente all'usura.
  Der Stoff, den du gewählt hast, enthält eine besonders *Faser*, die sehr widerstandsfähig gegen Abnutzung ist.
  
  Nonostante la sua età, il nonno ha ancora molta *fibra* nello sguardo.
  Trotz seines Alters hat der Großvater noch viel *Faser* in seinem Blick.
  
  Le *fibre* ottiche permettono una trasmissione dei dati molto più veloce del rame.
  Die *Glasfasern* ermöglichen eine Datenübertragung, die viel schneller ist als die über Kupfer.
