Rang: 4203
Wort: bontà
Wortart: n.f
Wort mit Artikel: la bontà
Femininum / Plural: bontà
IPA: ''
Definition: die Güte, die Milde
Register: ''
Beispielsätze: |-
  La *bontà* di questa torta è davvero straordinaria.
  Die *Güte* dieses Kuchens ist wirklich außergewöhnlich.
  
  Credo che la *bontà* di carattere sia più importante del successo.
  Ich glaube, dass die *Milch* des Charakters wichtiger ist als der Erfolg.
  
  La *bontà* di questo vino si sente anche dopo anni.
  Die *Güte* dieses Weins spürt man auch nach Jahren.
  
  Hai notato la *bontà* con cui ha aiutato quella persona anziana?
  Hast du die *Güte* bemerkt, mit der er dieser alten Person geholfen hat?
  
  Nonostante tutto, la *bontà* del suo cuore rimane immutata.
  Trotz allem bleibt die *Güte* ihres Herzens unverändert.
