Rang: 2485
Wort: corrompere
Wortart: vt
Wort mit Artikel: corrompere
Femininum / Plural: ''
IPA: ''
Definition: bestechen, korrumpieren
Register: ''
Beispielsätze: |-
  L’avvocato ha provato a *corrompere* il giudice per ottenere una sentenza favorevole.
  Der Anwalt versuchte, den Richter zu *bestechen*, um ein günstiges Urteil zu erhalten.
  
  Mi hanno detto che hai lasciato che ti *corrompesse* con una promozione, ma io non lo farei mai.
  Man hat mir gesagt, dass du dich mit einer Beförderung hast *korrumpieren* lassen, aber ich würde das nie tun.
  
  Se avessi saputo che volevano *corrompere* anche l’agente della polizia, non avrei accettato la loro proposta.
  Wenn ich gewusst hätte, dass sie sogar den Polizisten *korrumpieren* wollten, hätte ich ihren Vorschlag nicht angenommen.
  
  È *corrotto* dal potere e non si accorge nemmeno di quanto sta diventando dipendente dalle lusinghe degli altri.
  Er ist von der Macht *korrumpiert* und bemerkt nicht einmal, wie abhängig er von den Schmeicheleien anderer wird.
  
  Lo ha accusato di aver cercato di *corrompere* un funzionario pubblico, ma non ci sono prove concrete.
  Er warf ihm vor, versucht zu haben, einen Beamten zu *korrumpieren*, aber es gibt keine handfesten Beweise.
