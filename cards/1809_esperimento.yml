Rang: 1809
Wort: esperimento
Wortart: n.m
Wort mit Artikel: l'esperimento
Femininum / Plural: esperimenti
IPA: ''
Definition: das Experiment, -e
Register: ''
Beispielsätze: |-
  Gli scienziati hanno condotto un *esperimento* molto importante ieri.
  Die Wissenschaftler haben gestern ein *Experiment* durchgeführt.
  
  È necessario ripetere questo *esperimento* per verificare i risultati.
  Man muss dieses *Experiment* wiederholen, um die Ergebnisse zu überprüfen.
  
  Nonostante l’insuccesso, non vogliono rinunciare a questo *esperimento* così promettente.
  Trotz des Misserfolgs wollen sie auf dieses so vielversprechende *Experiment* nicht verzichten.
  
  Se avessi più tempo, effettuerei un *esperimento* sugli effetti della temperatura.
  Wenn ich mehr Zeit hätte, würde ich ein *Experiment* zu den Auswirkungen der Temperatur durchführen.
  
  L’*esperimento* che stanno preparando potrebbe rivoluzionare il settore.
  Das *Experiment*, das sie vorbereiten, könnte den Sektor revolutionieren.
