Rang: 3840
Wort: vecchietto
Wortart: n.m
Wort mit Artikel: il vecchietto
Femininum / Plural: vecchietti
IPA: ''
Definition: der kleine Alte, der Greis
Register: ''
Beispielsätze: |-
  Il *vecchietto* legge il giornale seduto sulla panchina del parco ogni mattina.
  Der kleine Alte liest die Zeitung, die er auf der Parkbank sitzt, jeden Morgen.
  
  Ho incontrato un *vecchietto* al mercato che vendeva noci vecchie di vent'anni.
  Ich habe *einen kleinen Alten* auf dem Markt getroffen, der Nüsse verkaufte, die zwanzig Jahre alt waren.
  
  Vorrei sapere se hai visto il *vecchietto* che abita nel primo appartamento del palazzo? È sparito da tre giorni.
  Ich möchte wissen, ob du *den kleinen Alten* gesehen hast, der in der ersten Wohnung des Gebäudes wohnt? Er ist seit drei Tagen verschwunden.
  
  Anche se il *vecchietto* non sente bene, continua a lamentarsi ogni volta che qualcuno alza la voce.
  Auch wenn *der kleine Alte* schlecht hört, beschwert er sich jedes Mal, wenn jemand die Stimme erhebt.
  
  Mi hanno detto che il *vecchietto* del terzo piano, che era stato ricoverato per un'ernia, è tornato a casa ieri.
  Man hat mir gesagt, dass *der kleine Alte* aus der dritten Etage, der wegen eines Bruchs im Krankenhaus war, gestern nach Hause zurückgekehrt ist.
