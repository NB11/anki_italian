Rang: 2868
Wort: multa
Wortart: n.f
Wort mit Artikel: la multa
Femininum / Plural: multe
IPA: ''
Definition: die Strafe, -n, das Bußgeld, -er
Register: ''
Beispielsätze: |-
  Ho ricevuto una *multa* perché guidavo troppo veloce.
  Ich habe eine *Strafe* bekommen, weil ich zu schnell gefahren bin.
  
  Se non paghi la *multa* entro trenta giorni, ci saranno ulteriori interessi.
  Wenn du das *Bußgeld* nicht innerhalb von dreißig Tagen bezahlst, gibt es zusätzliche Zinsen.
  
  La polizia ha deciso di ritirare la *multa* dopo che ho presentato ricorso.
  Die Polizei hat beschlossen, das *Bußgeld* zurückzuziehen, nachdem ich Einspruch eingelegt habe.
  
  Ho paura che mi facciano una *multa* per il parcheggio sbagliato.
  Ich habe Angst, dass sie mir ein *Bußgeld* wegen Falschparkens geben.
  
  La *multa* che ho ricevuto per eccesso di velocità era davvero salata.
  Das *Bußgeld*, das ich wegen Geschwindigkeitsüberschreitung bekommen habe, war richtig happig.
