Rang: 3512
Wort: maresciallo
Wortart: n.m
Wort mit Artikel: il maresciallo
Femininum / Plural: i marescialli
IPA: ''
Definition: der Feldwebel, -
Register: ''
Beispielsätze: |-
  Il *maresciallo* della polizia ha fermato l’auto per un controllo di routine.
  Der *Feldwebel* der Polizei hielt das Auto für eine Routinekontrolle an.
  
  Non appena sentì gridare, il *maresciallo* corse verso la scena del crimine.
  Sobald er einen Schrei hörte, stürmte der *Feldwebel* zur Tatortszene.
  
  Se fossi stato un *maresciallo*, avrei gestito quella situazione diversamente.
  Wäre ich ein *Feldwebel* gewesen, hätte ich diese Situation anders gehandhabt.
  
  Il capitano ordinò al *maresciallo* di radunare tutti i soldati prima dell’alba.
  Der Hauptmann befahl dem *Feldwebel*, alle Soldaten vor Sonnenaufgang zu versammeln.
  
  Anche se il *maresciallo* era stanco, continuò a supervisionare le operazioni senza lamentarsi.
  Obwohl der *Feldwebel* müde war, überwachte er die Operationen weiter, ohne sich zu beschweren.
