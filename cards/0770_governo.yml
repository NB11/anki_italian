Rang: 770
Wort: governo
Wortart: n.m
Wort mit Artikel: il governo
Femininum / Plural: governi
IPA: ''
Definition: die Regierung, -en
Register: ''
Beispielsätze: |-
  Il *governo* ha approvato una nuova legge che molti cittadini criticano.
  Die *Regierung* hat ein neues Gesetz verabschiedet, das viele Bürger kritisieren.
  
  Non credo che il *governo* riesca a risolvere questa crisi da solo.
  Ich glaube nicht, dass die *Regierung* diese Krise allein lösen kann.
  
  Se il *governo* non agisce, la situazione potrebbe peggiorare ulteriormente.
  Falls die *Regierung* nicht handelt, könnte sich die Situation weiter verschlimmern.
  
  Il premier ha annunciato che il *governo* presenterà un piano economico domani.
  Der Premierminister hat angekündigt, dass die *Regierung* morgen einen Wirtschaftsplan vorstellen wird.
  
  Era necessario che il *governo* intervenisse prontamente durante l’emergenza.
  Es war notwendig, dass die *Regierung* während des Notfalls schnell eingriff.
