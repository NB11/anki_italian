Rang: 4340
Wort: architetto
Wortart: n.m
Wort mit Artikel: l'architetto
Femininum / Plural: gli architetti
IPA: ''
Definition: der Architekt, -en
Register: ''
Beispielsätze: |-
  L'*architetto* ha progettato una casa moderna che sembra galleggiare sulle colline.
  Der *Architekt* hat ein modernes Haus entworfen, das über den Hügeln zu schweben scheint.
  
  Chi ha chiamato l'*architetto* per la ristrutturazione della villa?
  Wer hat den *Architekten* für die Renovierung der Villa angerufen?
  
  Se fossi un *architetto*, disegnerei ponti che collegano le città più importanti.
  Wenn ich ein *Architekt* wäre, würde ich Brücken entwerfen, die die wichtigsten Städte verbinden.
  
  L'*architetto* ha spiegato che le sue idee derivano da studi di letteratura contemporanea.
  Der *Architekt* erklärte, dass seine Ideen aus Studien zeitgenössischer Literatur stammen.
  
  Sebbene l'*architetto* sia ormai defunto, i suoi edifici testimoniano ancora il suo genio innovativo.
  Auch wenn der *Architekt* inzwischen verstorben ist, bezeugen seine Gebäude noch immer sein innovatives Genie.
