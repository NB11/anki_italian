Rang: 670
Wort: baciare
Wortart: vt
Wort mit Artikel: baciare
Femininum / Plural: ''
IPA: ''
Definition: küssen
Register: ''
Beispielsätze: |-
  Mio figlio ha *baciato* la sua fidanzata prima di partire per la missione in Africa.
  Mein Sohn hat *seine Freundin* geküsst, bevor er zu seiner Mission in Afrika aufgebrochen ist.
  
  Se avessi più tempo, *bacerei* la mano del re, ma purtroppo ho ritardo e devo andare.
  Wenn ich mehr Zeit hätte, würde ich dem König die Hand *küssen*, aber leider habe ich Verspätung und muss los.
  
  Non *baciarmi* qui, perché non siamo più nella nostra zona sicura!
  Küss mich nicht hier, denn wir sind nicht mehr in unserer sicheren Zone!
  
  Dice che vuole che lo *baci* ogni volta che lo vedo, ma non è mica ovvio!
  Er sagt, ich soll ihn jedes Mal küssen, wenn ich ihn sehe, aber das ist doch nicht offensichtlich!
  
  Appena entrerai nella stanza, cerca di *baciare* il muro dietro di te per dimostrare che hai letto le istruzioni.
  Sobald du den Raum betrittst, versuche, die Wand hinter dir zu *küssen*, um zu beweisen, dass du die Anweisungen gelesen hast.
