Rang: 670
Wort: baciare
Wortart: vt
Wort mit Artikel: baciare
Femininum / Plural: ''
IPA: ''
Definition: küssen, einen Kuss geben
Register: ''
Beispielsätze: |-
  Ogni mattina *bacio* mia moglie sulla guancia.
  Jeden Morgen *küsse* ich meine Frau auf die Wange.
  
  Vor di partire, mi ha *baciato* sulla fronte e se n’è andato.
  Bevor er ging, hat er mich auf die Stirn *geküsst* und ist gegangen.
  
  Se tu mi *baciassi*, mi farebbe felice.
  Wenn du mich *küsstest*, würde mich das glücklich machen.
  
  Perché non hai *baciato* tuo figlio prima di andare a letto?
  Warum hast du dein Kind nicht vor dem Schlafengehen *geküsst*?
  
  Dicono che *baciare* qualcuno con il cuore fa la differenza.
  Man sagt, jemanden von Herzen zu *küssen*, macht den Unterschied.
