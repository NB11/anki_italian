Rang: 4527
Wort: ricatto
Wortart: n.m
Wort mit Artikel: il ricatto
Femininum / Plural: i ricatti
IPA: ''
Definition: die Erpressung, -en
Register: ''
Beispielsätze: |-
  Il *ricatto* è un reato grave che può distruggere la reputazione di una persona.
  Die *Erpressung* ist ein schweres Verbrechen, das den Ruf einer Person zerstören kann.
  
  Hanno ricevuto una lettera di *ricatto* in cui chiedevano denaro entro una settimana.
  Sie erhielten einen *Erpressungs*brief, in dem sie aufgefordert wurden, innerhalb einer Woche Geld zu zahlen.
  
  Se continui a *ricattarmi*, dovrò rivolgermi alla polizia.
  Wenn du mich weiterhin *erpresst*, werde ich mich an die Polizei wenden müssen.
  
  La polizia indaga su un caso di *ricatto* che sembra essere collegato ad attività criminali organizzate.
  Die Polizei ermittelt in einem *Erpressungs*fall, der mit organisierter Kriminalität in Verbindung zu stehen scheint.
  
  Penso che *ricattare* qualcuno sia una delle cose più meschine che si possano fare.
  Ich glaube, jemanden zu *erpressen*, gehört zu den gemeinsten Dingen, die man tun kann.
