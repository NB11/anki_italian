Femininum / Plural: ''
IPA: ''
Definition: sagen, meinen
Register: ''
Beispielsätze: |-
  Che cosa *dici* di questo film? Mi *dice* che ti è piaciuto molto.
  Was *sagst* du zu diesem Film? Er *sagt* mir, dass er dir sehr gefallen hat.
  
  Non volevo *dire* quella cosa, scusami!
  Ich wollte *sagen* das nicht, entschuldige mich!
  
  Spero che tu mi *dica* la verità.
  Ich hoffe, dass du mir die Wahrheit *sagst*.
  
  Hai *detto* che vieni domani, ma non mi hai confermato nulla.
  Du hast *gesagt*, dass du morgen kommst, aber du hast mir nichts bestätigt.
  
  Se *dire* la verità, non mi fido più di lui.
  Um die Wahrheit zu *sagen*, ich vertraue ihm nicht mehr.
