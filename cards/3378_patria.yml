Rang: 3378
Wort: patria
Wortart: n.f
Wort mit Artikel: la patria
Femininum / Plural: patrie
IPA: ''
Definition: das Vaterland, die Heimat
Register: ''
Beispielsätze: |-
  La *patria* è dove si nasce e si cresce con amore.
  Das *Vaterland* ist der Ort, wo man geboren wird und mit Liebe aufwächst.
  
  Molti emigrati sentono nostalgia della *patria* che hanno lasciato.
  Viele Auswanderer empfinden *Heimweh* nach der Heimat, die sie verlassen haben.
  
  Dopo anni all'estero, decise di tornare nella sua *patria* d'origine.
  Nach Jahren im Ausland beschloss er, in sein ursprüngliches *Vaterland* zurückzukehren.
  
  Le radici della cultura si trovano nella *patria* dei nostri antenati.
  Die Wurzeln der Kultur liegen im *Vaterland* unserer Vorfahren.
  
  Anche se vive all'estero, non perde mai il legame con la *patria*.
  Auch wenn er im Ausland lebt, verliert er die Bindung an das *Vaterland* nie.
