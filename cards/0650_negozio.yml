Beispielsätze: |-
  Il *negozio* di alimentari è aperto tutti i giorni.
  Der *Laden* für Lebensmittel hat täglich geöffnet.
  
  Dove hai comprato quella borsa? Al *negozio* in centro?
  Wo hast du diese Tasche gekauft? In dem *Geschäft* im Zentrum?
  
  Non mi piace quel *negozio*, perché i prezzi sono troppo alti.
  Ich mag jenes *Geschäft* nicht, denn die Preise sind zu hoch.
  
  Abbiamo visitato diversi *negozi* per trovare un regalo adatto.
  Wir haben verschiedene *Läden* besucht, um ein passendes Geschenk zu finden.
  
  Se avessi tempo, aprirei un *negozio* di libri usati.
  Wenn ich Zeit hätte, würde ich ein *Geschäft* für gebrauchte Bücher eröffnen.
