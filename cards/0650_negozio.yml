Rang: 650
Wort: negozio
Wortart: n.m
Wort mit Artikel: il negozio
Femininum / Plural: negozi
IPA: ''
Definition: das Geschäft, -e
Register: ''
Beispielsätze: |-
  Vorrei *negozi* più grandi, ma quello piccolo in centro ha tutto quello che cerco.
  Ich möchte *Geschäfte* groß, aber das kleine in der Mitte hat alles, was ich suche.
  
  Dopo la chiamata del detective, abbiamo capito che il *negozio* era una copertura per attività illegali.
  Nach dem Anruf des Detektivs verstanden wir, dass das *Geschäft* eine Tarnung für illegale Aktivitäten war.
  
  Se avessi più tempo, andrei a vedere quel *negozio* di musica vicino alla stazione.
  Wenn ich mehr Zeit hätte, würde ich zu diesem *Geschäft* für Musik in der Nähe des Bahnhofs gehen.
  
  Mentre camminavo per la zona, ho notato un *negozio* con una vetrina molto interessante.
  Während ich durch die Zone lief, fiel mir ein *Geschäft* mit einer sehr interessanten Schaufensterdekoration auf.
  
  Ovviamente, il *negozio* più vicino è sempre chiuso quando ho bisogno di qualcosa di urgente.
  Offensichtlich ist das nächstgelegene *Geschäft* immer geschlossen, wenn ich etwas Dringendes brauche.
