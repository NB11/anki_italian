Rang: 1269
Wort: motore
Wortart: n.m
Wort mit Artikel: il motore
Femininum / Plural: motori
IPA: ''
Definition: der Motor, -en
Register: ''
Beispielsätze: |-
  Il *motore* del camion si è rotto improvvisamente durante il viaggio.
  Der *Motor* des Lastwagens ist plötzlich während der Fahrt kaputtgegangen.
  
  Ho comprato un *motore* nuovo per la mia barca, perché quello vecchio era troppo debole.
  Ich habe einen neuen *Motor* für mein Boot gekauft, weil der alte zu schwach war.
  
  Gli ingegneri stanno testando il *motore* elettrico per migliorare l’uso della energia.
  Die Ingenieure testen den elektrischen *Motor*, um den Gebrauch der Energie zu verbessern.
  
  Se non avessi sostituito il *motore*, la macchina non avrebbe mai funzionato correttamente.
  Wenn ich den *Motor* nicht ersetzt hätte, hätte das Auto nie richtig funktioniert.
  
  Nonostante il rumore, il *motore* del nostro palazzo comune non ha mai dato problemi.
  Trotz des Lärms hat der *Motor* unseres Gemeinschaftshauses nie Probleme gemacht.
