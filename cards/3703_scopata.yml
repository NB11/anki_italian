Rang: 3703
Wort: scopata
Wortart: n.f
Wort mit Artikel: la scopata
Femininum / Plural: scopate
IPA: ''
Definition: der Geschlechtsverkehr, der Beischlaf, der Fick
Register: ''
Beispielsätze: |-
  Dopo mesi di *scopate* notturne, hanno finalmente deciso di parlarne apertamente.
  Nach Monaten mit nächtlichen *Geschlechtsverkehr* haben sie sich endlich entschlossen, offen darüber zu sprechen.
  
  La loro relazione è basata solo sulla *scopata* occasionale, senza alcun sentimento.
  Ihre Beziehung basiert nur auf gelegentlichen *Beischlaf*, ohne Gefühle.
  
  Nonostante le apparenze, quella *scopata* a casa sua non era mai stata programmata.
  Trotz der Äußerlichkeiten war dieser *Geschlechtsverkehr* bei ihr nie geplant worden.
  
  Mi ha confessato che la prima volta è stata una *scopata* di una notte tra amici.
  Er hat mir gestanden, dass das erste Mal ein *Beischlaf* in einer Nacht zwischen Freunden war.
  
  Se la *scopata* non porta a nulla di serio, perché perderci tempo?
  Wenn der *Geschlechtsverkehr* zu nichts Ernsthaftem führt, warum Zeit damit verschwenden?
