Rang: 4210
Wort: brandy
Wortart: n.m
Wort mit Artikel: il brandy
Femininum / Plural: i brandy
IPA: ''
Definition: der Branntwein, -e
Register: ''
Beispielsätze: |-
  Dopo cena, abbiamo bevuto un *brandy* per digerire meglio.
  Nach dem Abendessen haben wir einen *Branntwein* getrunken, um die Verdauung zu fördern.
  
  Il nonno custodiva una collezione di *brandy* molto pregiati in cantina.
  Der Großvater bewahrte eine Sammlung sehr edler *Branntweine* im Keller auf.
  
  Se avessi saputo della tua passione, ti avrei regalato un *brandy* invecchiato vent’anni.
  Wenn ich von deiner Leidenschaft gewusst hätte, hätte ich dir einen 20 Jahre alten *Branntwein* geschenkt.
  
  Nel 1945, molti soldati americani ricevevano *brandy* come premio per il coraggio.
  1945 erhielten viele amerikanische Soldaten *Branntwein* als Auszeichnung für ihren Mut.
  
  Mentre preparavo il dolce, ho sentito la tentazione di aggiungere una goccia di *brandy* alla salsa.
  Während ich den Nachtisch zubereitete, spürte ich die Versuchung, einen Tropfen *Branntwein* in die Sauce zu geben.
