Rang: 1500
Wort: corrente
Wortart: n.m
Wort mit Artikel: la corrente
Femininum / Plural: correnti
IPA: ''
Definition: der Strom, die Ströme
Register: ''
Beispielsätze: |-
  La *corrente* elettrica è molto forte oggi, quindi stai attento.
  Der *Strom* ist heute sehr stark, pass also auf.
  
  Non toccare il filo perché potrebbe essere sotto *corrente*!
  Fass die Schnur nicht an, sie könnte unter *Strom* stehen!
  
  Mi sono accorto che la *corrente* d’aria in questa stanza è insopportabile.
  Ich habe gemerkt, dass der *Luftstrom* in diesem Raum unerträglich ist.
  
  Se non chiudi la porta, entrerà aria fredda e ci sarà una *corrente* fastidiosa.
  Wenn du die Tür nicht schließt, kommt kalte Luft rein und es entsteht ein lästiger *Luftzug*.
  
  Mio nonno mi ha raccontato di quando il mulino funzionava grazie alla *corrente* del fiume.
  Mein Opa hat mir erzählt, wie die Mühle dank des *Stromes* des Flusses funktionierte.
