Rang: 1944
Wort: abbattere
Wortart: vt
Wort mit Artikel: abbattere
Femininum / Plural: ''
IPA: ''
Definition: fällen, umwerfen, abschießen
Register: ''
Beispielsätze: |-
  Hanno dovuto *abbattere* l'albero vecchio perché minacciava di cadere sul tetto.
  Sie mussten den alten Baum *fällen*, weil er drohte, auf das Dach zu fallen.
  
  Se non *abbatterai* il prezzo, nessuno comprerà i tuoi prodotti.
  Wenn du den Preis nicht *senken* wirst, wird niemand deine Produkte kaufen.
  
  L'uccello che *abbatté* il cacciatore era davvero raro.
  Der Vogel, den der Jäger *abschoss*, war wirklich selten.
  
  Credi che dovremmo *abbattere* questa legge economica che non funziona più?
  Meinst du, wir sollten dieses wirtschaftspolitische Gesetz *abschaffen*, das nicht mehr funktioniert?
  
  Mi dispiace, ma il governo ha deciso di *abbattere* l'intero settore per risparmiare.
  Es tut mir leid, aber die Regierung hat beschlossen, den gesamten Bereich *stillzulegen*, um zu sparen.
