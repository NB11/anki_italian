Rang: 1091
Wort: completo
Wortart: adj
Wort mit Artikel: completo
Femininum / Plural: ''
IPA: ''
Definition: komplett, vollständig, voll
Register: ''
Beispielsätze: |-
  Il treno è *completo*, non ci sono più posti liberi.
  Der Zug ist *vollständig*, es gibt keine freien Plätze mehr.
  
  Dopo tre ore di studio, il mio cervello era *completamente* stanco.
  Nach drei Stunden Studieren war mein Gehirn *vollständig* erschöpft.
  
  La squadra ha vinto il torneo con una vittoria *completa* sui rivali.
  Die Mannschaft hat das Turnier mit einem *vollen* Sieg über die Rivalen gewonnen.
  
  Vor la due diligenza del direttore, l'ufficio era *completo* di documenti.
  Vor der Ankunft des Direktors war das Büro *vollständig* mit Dokumenten gefüllt.
  
  Se il modulo non è *completo*, non verrà accettato dalla segreteria.
  Wenn das Formular nicht *vollständig* ist, wird es vom Sekretariat nicht angenommen.
