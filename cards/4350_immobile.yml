Rang: 4350
Wort: immobile
Wortart: adj
Wort mit Artikel: immobile
Femininum / Plural: ''
IPA: ''
Definition: bewegungslos, stillstehend
Register: ''
Beispielsätze: |-
  Il cane rimase *immobile* quando vide lo sconosciuto entrare in casa.
  Der Hund blieb *bewegungslos*, als er den Unbekannten das Haus betreten sah.
  
  Nonostante il rumore assordante, il gatto rimase *immobile* sul divano.
  Trotz des ohrenbetäubenden Lärms blieb die Katze *stillstehend* auf dem Sofa.
  
  Se il paziente dovesse diventare *immobile* per più di un’ora, chiamare immediatamente il medico.
  Falls der Patient länger als eine Stunde *bewegungslos* bleiben sollte, sofort den Arzt rufen.
  
  La macchina fotografica catturò l’attimo in cui l’airone rimase *immobile* sull’acqua prima di volare via.
  Die Kamera fing den Moment ein, in dem der Reiher *stillstehend* auf dem Wasser blieb, bevor er davonflog.
  
  Era così stanco che rimase *immobile* per ore, senza accorgersi del tempo che passava.
  Er war so erschöpft, dass er *bewegungslos* stundenlang blieb, ohne zu merken, wie die Zeit verging.
