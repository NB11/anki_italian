Rang: 1021
Wort: legale
Wortart: adj
Wort mit Artikel: legale
Femininum / Plural: ''
IPA: ''
Definition: legal, rechtlich
Register: ''
Beispielsätze: |-
  Devi sempre chiedere un consiglio *legale* prima di firmare un contratto così importante.
  Du solltest immer einen *rechtlichen* Rat einholen, bevor du einen so wichtigen Vertrag unterschreibst.
  
  Il *legale* della società ci ha spiegato tutte le clausole del documento.
  Der *Rechtsberater* des Unternehmens hat uns alle Klauseln des Dokuments erklärt.
  
  Non è *legale* parcheggiare qui: il vigile ha già scritto una multa.
  Hier zu parken ist nicht *legal* – der Polizist hat schon ein Knöllchen geschrieben.
  
  Anche se il *legale* della difesa ha fatto del suo meglio, il colpevole è stato catturato.
  Auch wenn der *Verteidiger* sein Bestes gab, wurde der Schuldige gefasst.
  
  Chiunque voglia fondare un’associazione deve seguire le norme *legali* del paese.
  Wer einen Verein gründen möchte, muss die *gesetzlichen* Vorschriften des Landes einhalten.
