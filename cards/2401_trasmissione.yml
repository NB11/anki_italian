Wort mit Artikel: la trasmissione
Femininum / Plural: trasmissioni
IPA: ''
Definition: die Sendung, -en
Register: ''
Beispielsätze: |-
  Oggi *trasmissione* del telegiornale è stata molto interessante.
  Heute war die *Sendung* der Nachrichtensendung sehr interessant.
  
  Non ho visto la *trasmissione* a cui hai accennato ieri.
  Ich habe die *Sendung*, auf die du gestern angespielt hast, nicht gesehen.
  
  Mi hanno detto che la *trasmissione* in diretta inizierà tra dieci minuti.
  Man hat mir gesagt, dass die *Sendung* live in zehn Minuten beginnt.
  
  La *trasmissione* di Radio Maria si ascolta bene anche in macchina.
  Die *Sendung* von Radio Maria hört man auch im Auto gut.
  
  Spero che la *trasmissione* che hai registrato non sia già scaduta.
  Ich hoffe, dass die *Sendung*, die du aufgenommen hast, nicht schon abgelaufen ist.
