Rang: 4977
Wort: nanna
Wortart: n.m
Wort mit Artikel: la nanna
Femininum / Plural: le nanne
IPA: ''
Definition: der Schlaf (Kindersprache)
Register: ''
Beispielsätze: |-
  Dopo pranzo, il bambino chiede sempre la *nanna* perché è stanco.
  Nach dem Mittagessen bittet das Kind immer um *den Schlaf*, weil es müde ist.
  
  Ho riposato per un’ora, ho fatto una *nanna* bellissima sotto il sole.
  Ich habe eine Stunde geruht, habe ein *Nickerchen* im Sonnenschein gemacht.
  
  Mentre la mamma cucinava, la bimba si è addormentata nella sua *nanna*.
  Während die Mama kochte, ist das Mädchen in ihrem *Schlaf* eingeschlafen.
  
  Non disturbare il piccolo, sta finalmente prendendo la *nanna* dopo la febbre!
  Stör das Kleine nicht, es nimmt endlich *den Schlaf* nach dem Fieber!
  
  Se non fai la *nanna* ora, domani sarai stanco e nervoso.
  Wenn du jetzt nicht *den Schlaf* nimmst, bist du morgen müde und gereizt.
