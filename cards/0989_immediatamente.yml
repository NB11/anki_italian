Rang: 989
Wort: immediatamente
Wortart: adv
Wort mit Artikel: immediatamente
Femininum / Plural: ''
IPA: ''
Definition: sofort
Register: ''
Beispielsätze: |-
  Appena sentì l'allarme, il poliziotto *uscì immediatamente* dalla stazione per intervenire.
  Sobald er den *Alarm* hörte, verließ der Polizist sofort den Bahnhof, um einzugreifen.
  
  Nonostante la calma, il sceriffo sapeva che doveva *agire immediatamente* per evitare danni maggiori.
  Trotz der *Ruhe* wusste der Sheriff, dass er sofort handeln musste, um größere Schäden zu vermeiden.
  
  Se non *scriverai immediatamente* i tuoi appunti, rischi di dimenticare dettagli importanti durante l’esame.
  Wenn du deine Notizen nicht sofort aufschreibst, riskierst du, wichtige *Einzelheiten* während der Prüfung zu vergessen.
  
  Dopo che il *gatto* si mise a correre per il laboratorio, l’attore lo catturò e lo mise in una stia.
  Nachdem die *Katze* durch das Labor lief, fing der Schauspieler sie ein und setzte sie in einen Käfig.
  
  Non appena il testimone vide l’episodio, volle *denunciare immediatamente* ciò che aveva visto al poliziotto incaricato del caso.
  Sobald der *Zeuge* die Szene sah, wollte er dem zuständigen Polizisten sofort melden, was er beobachtet hatte.
