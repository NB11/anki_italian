Rang: 4749
Wort: servitore
Wortart: n.m
Wort mit Artikel: il servitore
Femininum / Plural: servitori
IPA: ''
Definition: der Diener, -
Register: ''
Beispielsätze: |-
  Il *servitore* portò il vino in modo molto discreto durante la cena.
  Der *Diener* brachte den Wein während des Essens sehr diskret.
  
  Il nobile era circondato da numerosi *servitori* che si occupavano di ogni suo bisogno.
  Der Adlige war von zahlreichen *Diener*n umgeben, die sich um jeden seiner Wünsche kümmerten.
  
  Se avessi un *servitore* come nei romanzi, non dovrei fare nulla da solo!
  Wenn ich einen *Diener* wie in Romanen hätte, müsste ich nichts allein tun!
  
  Il *servitore* che aveva servito la famiglia per anni fu licenziato improvvisamente senza spiegazioni.
  Der *Diener*, der der Familie jahrelang gedient hatte, wurde plötzlich ohne Erklärung entlassen.
  
  Nonostante le critiche, il *servitore* rimase fedele al suo padrone fino alla fine.
  Trotz der Kritik blieb der *Diener* seinem Herrn bis zum Ende treu.
