Rang: 4368
Wort: mattone
Wortart: n.m
Wort mit Artikel: il mattone
Femininum / Plural: mattoni
IPA: ''
Definition: der Backstein, -e
Register: ''
Beispielsätze: |-
  L’*mattone* che ho trovato nel giardino era vecchio e polveroso.
  Der *Backstein*, den ich im Garten gefunden habe, war alt und staubig.
  
  Per costruire il muro ci vogliono almeno duecento *mattoni*.
  Für die Mauer braucht man mindestens zweihundert *Backsteine*.
  
  Ho comprato una scatola di *mattoni* colorati per decorare il camino.
  Ich habe eine Schachtel bunter *Backsteine* gekauft, um den Kamin zu dekorieren.
  
  Il muratore ha posizionato con cura ogni *mattone* prima di applicare la malta.
  Der Maurer hat jeden *Backstein* sorgfältig positioniert, bevor er den Mörtel auftrug.
  
  Se non sistemiamo questo *mattone* storto, il muro potrebbe crollare.
  Wenn wir diesen schiefen *Backstein* nicht korrigieren, könnte die Mauer einstürzen.
