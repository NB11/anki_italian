Rang: 4304
Wort: risentire
Wortart: v
Wort mit Artikel: risentire
Femininum / Plural: ''
IPA: ''
Definition: erneut hören, wieder spüren
Register: ''
Beispielsätze: |-
  Dopo la pausa, ho *risentito* la musica con un brivido di nostalgia.
  Nach der Pause habe ich die Musik mit einem Schauer der Nostalgie *wieder gehört*.
  
  Se *risentirai* quel dolore al ginocchio, consulta subito un medico!
  Wenn du diesen Knieschmerz *wieder spürst*, such sofort einen Arzt auf!
  
  Mi pare che tu *risenta* ancora dell’influenza di ieri.
  Ich habe den Eindruck, dass du noch unter der Grippe von gestern *leidest*.
  
  Non appena *risentirò* la sua voce, capirò se è davvero lui.
  Sobald ich seine Stimme *wieder höre*, werde ich wissen, ob er es wirklich ist.
  
  Aveva perso la vista, ma non poteva *risentire* l’odore delle rose che un tempo amava.
  Er hatte das Augenlicht verloren, konnte aber den Duft der Rosen, die er einst liebte, nicht *wieder riechen*.
