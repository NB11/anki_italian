Rang: 4373
Wort: domicilio
Wortart: n.m
Wort mit Artikel: il domicilio
Femininum / Plural: i domicili
IPA: ''
Definition: der Wohnsitz, -e
Register: ''
Beispielsätze: |-
  Mio cugino ha trasferito il *domicilio* da Milano a Berlino l'anno scorso.
  Mein Cousin hat den *Wohnsitz* von Mailand nach Berlin verlegt.
  
  Non appena avrai trovato un *domicilio* stabile, potrai richiedere il permesso di soggiorno.
  Sobald du einen festen *Wohnsitz* gefunden hast, kannst du die Aufenthaltserlaubnis beantragen.
  
  Il tribunale ha ordinato di comunicare tempestivamente qualsiasi cambio di *domicilio*.
  Das Gericht hat angeordnet, jeden Wohnsitzwechsel umgehend mitzuteilen.
  
  Anche se il loro *domicilio* era in campagna, passavano i fine settimana in città.
  Auch wenn ihr *Wohnsitz* auf dem Land war, verbrachten sie die Wochenenden in der Stadt.
  
  Per l'iscrizione all'università è necessario indicare un *domicilio* ufficiale in città.
  Für die Immatrikulation müssen Sie einen offiziellen *Wohnsitz* in der Stadt angeben.
