Rang: 4069
Wort: imitare
Wortart: v
Wort mit Artikel: imitare
Femininum / Plural: ''
IPA: ''
Definition: nachahmen
Register: ''
Beispielsätze: |-
  I bambini *imitano* spesso i gesti degli adulti perché li ammirano.
  Kinder *ahmen* oft die Gesten von Erwachsenen nach, weil sie sie bewundern.
  
  Se vuoi imparare una lingua nuova, devi *imitare* la pronuncia dei madrelingua.
  Wenn du eine neue Sprache lernen willst, musst du die Aussprache der Muttersprachler *nachahmen*.
  
  Nonostante il suo talento, non riuscì a *imitare* perfettamente lo stile di quel cantante famoso.
  Trotz seines Talents gelang es ihm nicht, den Stil jenes berühmten Sängers *nachzuahmen*.
  
  La polizia ha dovuto *imitare* la voce del sequestratore per ottenere la conferma dell’identità.
  Die Polizei musste die Stimme des Entführers *nachahmen*, um die Bestätigung der Identität zu erhalten.
  
  Secondo alcuni studiosi, gli animali non *imitano* solo per sopravvivere, ma anche per comunicare con il gruppo.
  Laut einigen Forschern *ahmen* Tiere nicht nur zum Überleben nach, sondern auch, um mit der Gruppe zu kommunizieren.
