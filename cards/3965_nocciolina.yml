Rang: 3965
Wort: nocciolina
Wortart: n.f
Wort mit Artikel: la nocciolina
Femininum / Plural: noccioline
IPA: ''
Definition: die Haselnuss, -nüsse
Register: ''
Beispielsätze: |-
  Ho trovato *noccioline* sparse sul pavimento della cucina.
  Ich habe *Haselnüsse* auf dem Küchenboden verstreut gefunden.
  
  Mi piacciono molto le *noccioline* tostate, sono le mie preferite!
  Ich mag geröstete *Haselnüsse* sehr, sie sind meine Favoriten!
  
  Non sapevo che tu coltivassi *noccioline* nel tuo giardino!
  Ich wusste nicht, dass du *Haselnüsse* in deinem Garten anbaust!
  
  Spero che la raccolta delle *noccioline* quest'anno sia abbondante.
  Ich hoffe, dass die *Haselernte* dieses Jahr reichlich ausfällt.
  
  Ha aperto un pacchetto di *noccioline* salate e le ha mangiate tutte in un secondo.
  Er hat eine Tüte mit salzigen *Haselnüssen* geöffnet und sie in Sekunden aufgegessen.
