Rang: 3440
Wort: animo
Wortart: n.m
Wort mit Artikel: l'animo
Femininum / Plural: animi
IPA: ''
Definition: die Seele, der Mut
Register: ''
Beispielsätze: |-
  Dopo la sconfitta, gli atleti hanno perso *l'animo* per continuare.
  Nach der Niederlage haben die Athleten den *Mut* verloren, weiterzumachen.
  
  Con *l'animo* acceso dalla rabbia, ha rotto il contratto.
  Mit der von Wut *erfüllten Seele* hat er den Vertrag gebrochen.
  
  È un uomo senza *animo*, non prova mai emozioni.
  Er ist ein Mensch ohne *Seele*, er empfindet nie Gefühle.
  
  Abbiamo bisogno di *animo* per affrontare questa situazione difficile.
  Wir brauchen *Mut*, um diese schwierige Situation zu bewältigen.
  
  Se non avessi *l'animo* di un poeta, non scriverei versi così belli.
  Wenn ich nicht die *Seele* eines Dichters hätte, würde ich keine so schönen Verse schreiben.
