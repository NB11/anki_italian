Rang: 960
Wort: odore
Wortart: n.m
Wort mit Artikel: l'odore
Femininum / Plural: odori
IPA: ''
Definition: der Geruch, -üche
Register: ''
Beispielsätze: |-
  Non mi piace affatto l’*odore* dei fiori appassiti in questa stanza chiusa.
  Ich mag den *Geruch* der welken Blumen in diesem geschlossenen Raum überhaupt nicht.
  
  Avresti dovuto notare che c’era un *odore* strano di bruciato quando sei entrato in cucina, ma lui sembra non essersene accorto.
  Du hättest den *Geruch* von etwas Verbranntem bemerken müssen, als du die Küche betratest, aber er scheint es nicht bemerkt zu haben.
  
  Mi chiedo se questo *odore* persistente nel laboratorio dipenda dalla sostanza che stiamo analizzando o da qualcos’altro.
  Ich frage mich, ob dieser anhaltende *Geruch* im Labor von dem Stoff abhängt, den wir analysieren, oder von etwas anderem.
  
  Quando aprirono la porta, furono accolti da un *odore* così orribile che dovettero richiudere immediatamente per non vomitare.
  Als sie die Tür öffneten, wurden sie von einem so *schrecklichen* Geruch empfangen, dass sie sie sofort wieder schließen mussten, um nicht zu erbrechen.
  
  Sai che a volte un *odore* può evocare ricordi così vividi che sembrano quasi reali? È come se il tempo non fosse mai passato.
  Weißt du, dass ein *Geruch* manchmal so lebendige Erinnerungen wecken kann, dass sie fast real wirken? Es ist, als wäre die Zeit nie vergangen.
