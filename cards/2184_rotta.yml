Rang: 2184
Wort: rotta
Wortart: n.f
Wort mit Artikel: la rotta
Femininum / Plural: rotte
IPA: ''
Definition: der Bruch, die *Bruchstücke*
Register: ''
Beispielsätze: |-
  Dopo la tempesta, abbiamo trovato una *rotta* nel muro della nostra casa.
  Nach dem Sturm haben wir einen *Riss* in der Wand unseres Hauses gefunden.
  
  Il meccanico ha detto che la *rotta* nel tubo dell'acqua era piccola ma pericolosa.
  Der Mechaniker sagte, der *Bruch* im Wasserrohr sei klein, aber gefährlich.
  
  Se noti una *rotta* nel parabrezza, dovresti sostituirlo immediatamente.
  Wenn du einen *Riss* in der Windschutzscheibe bemerkst, solltest du sie sofort austauschen.
  
  Hanno scoperto una *rotta* nella loro amicizia dopo quella discussione.
  Sie entdeckten einen *Bruch* in ihrer Freundschaft nach diesem Streit.
  
  La *rotta* nel ghiaccio ha reso pericoloso attraversare il lago.
  Der *Bruch* im Eis machte es gefährlich, den See zu überqueren.
