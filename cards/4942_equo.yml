Wort: equo
Wortart: adj
Wort mit Artikel: equo
Femininum / Plural: ''
IPA: ''
Definition: fair, gerecht, angemessen
Register: ''
Beispielsätze: |-
  Il giudice ha trovato una soluzione *equa* per risolvere la disputa tra i due colleghi.
  Der Richter fand eine *faire* Lösung, um den Streit zwischen den beiden Kollegen zu beenden.
  
  Non credo che sia *equo* pagare lo stesso stipendio a tutti, indipendentemente dal lavoro svolto.
  Ich glaube nicht, dass es *gerecht* ist, denselben Lohn für alle zu zahlen, unabhängig von der Arbeit.
  
  Se vuoi un rapporto *equo* tra lavoro e vita privata, devi stabilire dei limiti chiari.
  Wenn du eine *ausgewogene* Work-Life-Balance möchtest, musst du klare Grenzen setzen.
  
  Il contratto prevede condizioni *eque* per entrambi i contraenti.
  Der Vertrag sieht *angemessene* Bedingungen für beide Vertragsparteien vor.
  
  Nonostante le differenze, il loro accordo fu *equo* e soddisfacente per entrambe le parti.
  Trotz der Unterschiede war ihre Vereinbarung *fair* und zufriedenstellend für beide Seiten.
