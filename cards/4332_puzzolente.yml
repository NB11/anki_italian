Rang: 4332
Wort: puzzolente
Wortart: adj
Wort mit Artikel: puzzolente
Femininum / Plural: ''
IPA: ''
Definition: stinkend, übelriechend
Register: ''
Beispielsätze: |-
  L’odore *puzzolente* proveniva dal bidone della spazzatura.
  Der *übelriechende* Geruch kam aus der Mülltonne.
  
  Dopo averlo annusato, ho capito che era *puzzolente*.
  Nachdem ich es gerochen hatte, merkte ich, dass es *stinkend* war.
  
  Questa carne sembra *puzzolente*: meglio non mangiarla.
  Dieses Fleisch sieht *übelriechend* aus – besser essen wir es nicht.
  
  Se continuate a tenere la scatola chiusa, diventerà *puzzolente*.
  Wenn ihr die Kiste weiter geschlossen haltet, wird sie *stinken*.
  
  Era così *puzzolente* che tutti hanno fatto una smorfia.
  Es roch so *übel*, dass alle das Gesicht verzogen.
