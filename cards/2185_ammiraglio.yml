Rang: 2185
Wort: ammiraglio
Wortart: n.m
Wort mit Artikel: l'ammiraglio
Femininum / Plural: gli ammiragli
IPA: ''
Definition: der Admiral, -e
Register: ''
Beispielsätze: |-
  L'*ammiraglio* ha diretto la flotta durante la battaglia navale.
  Der *Admiral* hat die Flotte während der Seeschlacht geleitet.
  
  Il commissario *ammiraglio* è stato molto rispettato nella sua carriera.
  Der Kommissar *Admiral* wurde in seiner Karriere sehr geachtet.
  
  Senza un *ammiraglio* esperto, sarebbe difficile vincere la guerra.
  Ohne einen erfahrenen *Admiral* wäre es schwer, den Krieg zu gewinnen.
  
  L'*ammiraglio* si è dimesso dopo lo scandalo di corruzione.
  Der *Admiral* trat zurück nach dem Korruptionsskandal.
  
  Chi *ammiraglio* sarà scelto per la prossima missione?
  Wer als *Admiral* wird für die nächste Mission ausgewählt?
