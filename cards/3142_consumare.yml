Rang: 3142
Wort: consumare
Wortart: vt
Wort mit Artikel: consumare
Femininum / Plural: ''
IPA: ''
Definition: verbrauchen, konsumieren, essen
Register: ''
Beispielsätze: |-
  Se *consumi* troppi dolci, rischi di prendere peso.
  Wenn du zu viele *süße* Sachen isst, riskierst du zuzunehmen.
  
  L'amministratore ha deciso di *consumare* tutte le riserve prima della chiusura.
  Der Verwalter hat beschlossen, alle Ersparnisse vor dem Abschluss zu verbrauchen.
  
  Non vorrei *consumare* tutta la benzina in un solo viaggio.
  Ich möchte nicht den gesamten Sprit *verbrauchen* auf einer einzigen Fahrt.
  
  Ha *consumato* tre caffè prima dell'incontro importante, ma non aveva sonno.
  Er hat vor dem wichtigen Meeting drei Kaffees getrunken, aber trotzdem keine Müdigkeit gespürt.
  
  Se avessi saputo che il vino era *consumato* entro la data, non l'avrei comprato.
  Wenn ich gewusst hätte, dass der Wein innerhalb des Zeitraums zu verbrauchen war, hätte ich ihn nicht gekauft.
