Rang: 4056
Wort: affrettare
Wortart: v
Wort mit Artikel: affrettare
Femininum / Plural: ''
IPA: ''
Definition: beschleunigen, eilen
Register: ''
Beispielsätze: |-
  Devi *affrettare* il passo se non vuoi perdere il treno!
  Du musst *beschleunigen* deine Schritte, wenn du den Zug nicht verpassen willst!
  
  Senza *affrettarsi*, non arriveremo mai in tempo all’appuntamento.
  Wenn wir uns nicht *beeilen*, kommen wir nie pünktlich zum Termin.
  
  Il comando gridò ai soldati di *affrettare* la marcia, poiché il nemico avanzava.
  Der Befehlshaber brüllte den Soldaten zu, den *Marsch zu beschleunigen*, da der Feind vorrückte.
  
  Nonostante *affrettasse* i preparativi, la festa riuscì perfettamente.
  Obwohl er die Vorbereitungen *beschleunigte*, gelang das Fest perfekt.
  
  Se avessimo *affrettato* la decisione, avremmo evitato molte complicazioni.
  Hätten wir die Entscheidung *beschleunigt*, hätten wir viele Komplikationen vermieden.
