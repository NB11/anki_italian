Rang: 1087
Wort: obiettivo
Wortart: n.m
Wort mit Artikel: l'obiettivo
Femininum / Plural: obiettivi
IPA: ''
Definition: das Ziel, -e, der Zweck, -e, die Absicht, -en
Register: ''
Beispielsätze: |-
  Il *obiettivo* principale del progetto è ridurre l'inquinamento locale.
  Das *Hauptziel* des Projekts ist es, die örtliche Umweltverschmutzung zu reduzieren.
  
  Non *obiettivo* di arrivare primo, ma di godermi la gara.
  Ich habe nicht die *Absicht*, Erster zu werden, sondern mich am Rennen zu erfreuen.
  
  Hai raggiunto il *tuo obiettivo* di perdere tre chili?
  Hast du dein *Gewichtsverlustziel* von drei Kilo erreicht?
  
  L'*obiettivo* di questa indagine era scoprire chi aveva sospettato il direttore.
  Das *Ziel* dieser Untersuchung war es herauszufinden, wer den Direktor verdächtigt hatte.
  
  Non mollare: il *tuo obiettivo* è più vicino di quanto credi!
  Gib nicht auf: dein *Ziel* ist näher, als du glaubst!
