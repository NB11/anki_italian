Rang: 4188
Wort: tentazione
Wortart: n.f
Wort mit Artikel: la tentazione
Femininum / Plural: tentazioni
IPA: ''
Definition: die Versuchung, -en
Register: ''
Beispielsätze: |-
  Non riesco a resistere alla *tentazione* di mangiare un altro pezzo di torta.
  Ich kann der *Versuchung* nicht widerstehen, ein weiteres Stück Kuchen zu essen.
  
  Era una *tentazione* troppo forte per lui, così ha accettato il lavoro all’estero.
  Es war eine zu *Versuchung*, die er nicht ablehnen konnte, also nahm er die Stelle im Ausland an.
  
  Dicono che la *tentazione* più grande sia quella di non provare mai a cambiare.
  Man sagt, die größte *Versuchung* sei es, nie zu versuchen, sich zu ändern.
  
  Ogni volta che passo davanti alla pasticceria, avverto la *tentazione* di entrare.
  Immer wenn ich an der Konditorei vorbeikomme, spüre ich die *Versuchung*, einzutreten.
  
  Per quanto mi sforzi di ignorarla, la *tentazione* di controllare le notifiche mi perseguita tutto il giorno.
  So sehr ich mich auch bemühe, sie zu ignorieren – die *Versuchung*, die Benachrichtigungen zu checken, verfolgt mich den ganzen Tag.
