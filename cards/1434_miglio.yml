Rang: 1434
Wort: miglio
Wortart: n.m
Wort mit Artikel: il miglio
Femininum / Plural: miglia
IPA: ''
Definition: die Meile, -n
Register: ''
Beispielsätze: |-
  L'aereo ha percorso *miglia* in meno di due ore.
  Das Flugzeug hat in weniger als zwei Stunden ***Meilen*** zurückgelegt.
  
  Se corri alla velocità di un *miglio* al minuto, arriverai in tempo.
  Wenn du mit einer Geschwindigkeit von einer ***Meile*** pro Minute läufst, kommst du rechtzeitig an.
  
  Non so quanti *miglia* abbia fatto il mio cane stamattina.
  Ich weiß nicht, wie viele ***Meilen*** mein Hund heute Morgen gelaufen ist.
  
  Il limite di velocità su questa strada è di ottanta *miglia* all'ora.
  Die Geschwindigkeitsbegrenzung auf dieser Straße beträgt achtzig ***Meilen*** pro Stunde.
  
  Ha percorso *miglia* e miglia finché non è arrivato alla meta.
  Er hat ***Meile** um *Meile** zurückgelegt, bis er am Ziel ankam.
