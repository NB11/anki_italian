Beispielsätze: |-
  Quando viaggio, porto sempre con me il *passaporto* e i biglietti aerei.
  Wenn ich reise, trage ich immer meinen *Reisepass* und die Flugtickets bei mir.
  
  Non ho trovato il *passaporto* da nessuna parte, ma ho controllato tre volte!
  Ich habe meinen *Reisepass* nirgendwo gefunden, obwohl ich schon dreimal nachgeschaut habe!
  
  Se avessi perso il *passaporto* all’aeroporto, avrei avuto seri problemi.
  Wenn ich meinen *Reisepass* am Flughafen verloren hätte, hätte ich ernsthafte Probleme gehabt.
  
  Spero che durante il viaggio il *passaporto* non si stropicci o si bagni.
  Ich hoffe, dass mein *Reisepass* während der Reise nicht zerknittert oder nass wird.
  
  Il *passaporto* scade tra sei mesi, quindi devo rinnovarlo al più presto.
  Mein *Reisepass* läuft in sechs Monaten ab, also muss ich ihn bald erneuern.
