Rang: 964
Wort: calma
Wortart: n.f
Wort mit Artikel: la calma
Femininum / Plural: calme
IPA: ''
Definition: die Ruhe, die Stille
Register: ''
Beispielsätze: |-
  Dopo la *calma* della notte, all'alba tutto sembra più chiaro.
  Nach der *Ruhe* der Nacht scheint bei Tagesanbruch alles klarer.
  
  Nonostante il caos intorno, la sua *calma* mi ha sorpreso.
  Trotz des Chaos um mich herum hat mich seine *Ruhe* überrascht.
  
  Se avessi un po' di *calma*, potremmo discutere senza urlare.
  Wenn wir etwas *Ruhe* hätten, könnten wir uns ohne Schreien unterhalten.
  
  Il medico consiglia di mantenere la *calma* anche nelle situazioni di emergenza.
  Der Arzt rät, auch in Notfällen die *Ruhe* zu bewahren.
  
  Credevo che la sua *calma* fosse solo apparente, ma mi sbagliavo.
  Ich dachte, seine *Ruhe* sei nur vorgetäuscht, doch ich lag falsch.
