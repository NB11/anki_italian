Rang: 4618
Wort: ricorrere
Wortart: vi
Wort mit Artikel: ricorrere
Femininum / Plural: ''
IPA: ''
Definition: zuflucht suchen, zurückgreifen
Register: ''
Beispielsätze: |-
  Quando ho perso il portafoglio, ho dovuto *ricorrere* alla polizia per denunciare il furto.
  Als ich die Geldbörse verloren hatte, musste ich mich an die *Polizei* wenden, um den Diebstahl zu melden.
  
  In caso di emergenza, spesso *ricorriamo* all’ospedale più vicino senza pensare ai costi.
  Im Notfall *greifen* wir oft auf das nächstgelegene Krankenhaus zurück, ohne an die Kosten zu denken.
  
  Gli esperti consigliano di *ricorrere* a fonti affidabili quando si cercano notizie sul cambiamento climatico.
  Experten raten, bei der Suche nach Nachrichten über den Klimawandel auf *vertrauenswürdige Quellen* zurückzugreifen.
  
  Se non troviamo una soluzione immediata, dovremo *ricorrere* a un prestito bancario.
  Wenn wir keine sofortige Lösung finden, müssen wir uns an einen *Bankkredit* wenden.
  
  Per risolvere il problema, *ricorrerà* alla sua esperienza pluriennale nel settore.
  Um das Problem zu lösen, wird er sich auf seine *langjährige Erfahrung* im Bereich stützen.
