Rang: 3930
Wort: disciplina
Wortart: n.f
Wort mit Artikel: la disciplina
Femininum / Plural: discipline
IPA: ''
Definition: die Disziplin, -en
Register: ''
Beispielsätze: |-
  Per mantenere la *disciplina* in classe, il professore usa un sistema di premi e punizioni.
  Um die *Disziplin* im Unterricht zu halten, verwendet der Lehrer ein Belohnungs- und Bestrafungssystem.
  
  La *disciplina* militare richiede obbedienza assoluta ed è molto rigorosa.
  Die militärische *Disziplin* verlangt absoluten Gehorsam und ist sehr streng.
  
  Nonostante la *disciplina* ferrea, alcuni allievi faticano a rispettare le regole.
  Trotz der strengen *Disziplin* fällt es einigen Schülern schwer, die Regeln zu beachten.
  
  La *disciplina* sportiva è fondamentale per raggiungere risultati di alto livello.
  Die sportliche *Disziplin* ist grundlegend, um Spitzenleistungen zu erreichen.
  
  Hanno perso la *disciplina* durante la conferenza per via delle continue interruzioni.
  Sie verloren die *Disziplin* während der Konferenz aufgrund der ständigen Unterbrechungen.
