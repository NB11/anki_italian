Rang: 4855
Wort: poverino
Wortart: n.m
Wort mit Artikel: il poverino
Femininum / Plural: poverini
IPA: ''
Definition: der Arme, Jammermännchen
Register: ''
Beispielsätze: |-
  Guarda *poverino*, non ha neanche un coperto per la notte!
  Sieh dir den *Armen* an, er hat nicht mal eine Unterkunft für die Nacht!
  
  Se avessi saputo che era così triste, gli avrei parlato più spesso, *poverino*!
  Wenn ich gewusst hätte, dass er so traurig war, hätte ich öfter mit ihm geredet, der *Arme*!
  
  È tutto solo in quella stanza enorme, ma il *poverino* non dice nulla.
  Er ist ganz allein in diesem riesigen Raum, aber der *Arme* sagt nichts.
  
  Quando lo vidi piangere, mi si strinse il cuore: era davvero un *poverino*.
  Als ich ihn weinen sah, schnürte es mir das Herz zusammen: er war wirklich ein *Jammermännchen*.
  
  Nonostante abbia fatto del suo meglio, alla fine si rivelò un *poverino* in quella situazione difficile.
  Trotz aller Bemühungen erwies er sich am Ende als ein *Armer* in dieser schwierigen Lage.
