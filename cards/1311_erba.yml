Rang: 1311
Wort: erba
Wortart: n.f
Wort mit Artikel: l'erba
Femininum / Plural: erbe
IPA: ''
Definition: das Gras, das Kraut
Register: ''
Beispielsätze: |-
  L'*erba* nel mio giardino è cresciuta troppo alta ultimamente.
  Das *Gras* in meinem Garten ist in letzter Zeit zu hoch gewachsen.
  
  Il contadino taglia l'*erba* ogni sabato mattina per mantenere il prato ordinato.
  Der Bauer mäht das *Gras* jeden Samstagmorgen, um den Rasen ordentlich zu halten.
  
  Sai che l'*erba* sintetica sta diventando sempre più popolare nei quartieri cittadini?
  Wusstest du, dass künstliches *Gras* in den Stadtteilen immer beliebter wird?
  
  Se vuoi coltivare il basilico, ti consiglio di non metterlo vicino all'*erba* perché potrebbe competere per i nutrienti.
  Wenn du Basilikum anbauen willst, rate ich dir, es nicht neben dem *Kraut* zu pflanzen, weil es sonst um Nährstoffe konkurrieren könnte.
  
  Nonostante la siccità, l'*erba* in questo parco è rimasta sorprendentemente verde e rigogliosa.
  Trotz der Trockenheit blieb das *Gras* in diesem Park überraschend grün und üppig.
