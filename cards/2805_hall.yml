Rang: 2805
Wort: hall
Wortart: n.m
Wort mit Artikel: la hall
Femininum / Plural: le hall
IPA: ''
Definition: die Halle, -n
Register: ''
Beispielsätze: |-
  Hanno affittato una *hall* per il convegno scientifico di quest'anno.
  Sie haben eine *Halle* für die wissenschaftliche Konferenz dieses Jahres gemietet.
  
  Mentre aspettavo, ho notato un manifesto alla parete della *hall* che parlava di un nuovo tour teatrale.
  Während ich wartete, bemerkte ich ein Plakat an der Wand der *Halle*, das über eine neue Theater-Tour kündigte.
  
  La *hall* dell'albergo era così spaziosa che ci siamo potuti accomodare tutti senza problemi.
  Die *Halle* des Hotels war so geräumig, dass wir uns alle problemlos ausbreiten konnten.
  
  Se volessimo organizzare una festa con cento invitati, ci servirebbe una *hall* più grande di questa.
  Wenn wir eine Feier mit hundert Gästen organisieren wollten, bräuchten wir eine *Halle*, die größer ist als diese hier.
  
  Non appena entrerete nella *hall*, vedrete subito la reception sulla destra.
  Sobald Sie die *Halle* betreten, sehen Sie sofort die Rezeption auf der rechten Seite.
