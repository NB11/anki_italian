Rang: 1277
Wort: spezzare
Wortart: vt
Wort mit Artikel: spezzare
Femininum / Plural: ''
IPA: ''
Definition: brechen, zerbrechen, splittern
Register: ''
Beispielsätze: |-
  Se *spezzare* il pane in piccoli pezzi, diventa più facile da mangiare.
  Wenn du das Brot in kleine Stücke *brichst*, wird es einfacher zu essen.
  
  Ultimamente il vento *spezza* rami secchi in modo improvviso, non credi?
  In letzter Zeit *bricht* der Wind trockene Äste plötzlich, meinst du nicht?
  
  Il procuratore dovette *spezzare* un silenzio pesante prima di annunciare il premio.
  Der Staatsanwalt musste eine schwere Stille *brechen*, bevor er den Preis verkündete.
  
  Ha promesso di *spezzare* gli schemi classici della gara per renderla più avvincente.
  Er hat versprochen, die klassischen Muster des *Wettbewerbs* zu durchbrechen, um ihn spannender zu machen.
  
  Anche se l’uso del motore era preciso, qualcuno volle *spezzare* la fiducia nel progetto.
  Auch wenn der Einsatz des *Motors* präzise war, wollte jemand das Vertrauen in das Projekt zerbrechen.
