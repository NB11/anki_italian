Rang: 4602
Wort: complotto
Wortart: n.m
Wort mit Artikel: il complotto
Femininum / Plural: complotti
IPA: ''
Definition: die Verschwörung, -en
Register: ''
Beispielsätze: |-
  Il giudice ha scoperto che c’era un *complotto* per rovesciare il governo.
  Der Richter hat herausgefunden, dass es eine *Verschwörung* gab, um die Regierung zu stürzen.
  
  Secondo le fonti, i *complotti* contro di lui continuano, anche se nessuno li prende sul serio.
  Laut den Quellen gehen die *Verschwörungen* gegen ihn weiter, obwohl niemand sie ernst nimmt.
  
  Se credi che ci sia un *complotto*, dovresti presentare delle prove concrete, non solo sospetti.
  Wenn du glaubst, dass es eine *Verschwörung* gibt, solltest du konkrete Beweise vorlegen, nicht nur Verdächtigungen.
  
  I servizi segreti hanno sventato un *complotto* terroristico prima che potesse essere attuato.
  Der Geheimdienst hat eine terroristische *Verschwörung* vereitelt, bevor sie umgesetzt werden konnte.
  
  Nonostante le accuse, molti ritengono che si tratti di un *complotto* ordito da suoi rivali politici.
  Trotz der Anschuldigungen glauben viele, dass es sich um eine *Verschwörung* handelt, die von seinen politischen Rivalen inszeniert wurde.
