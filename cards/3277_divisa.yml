Rang: 3277
Wort: divisa
Wortart: n.f
Wort mit Artikel: la divisa
Femininum / Plural: divise
IPA: ''
Definition: die Uniform, -en
Register: ''
Beispielsätze: |-
  La polizia indossa sempre la propria *divisa* durante il servizio.
  Die Polizei trägt immer ihre *Uniform* während des Dienstes.
  
  Le *divise* dei vigili del fuoco sono di colore rosso intenso.
  Die *Uniformen* der Feuerwehrleute sind knallrot.
  
  Non sarebbe giusto se ogni dipendente potesse scegliere la *divisa* che preferisce.
  Es wäre nicht fair, wenn jeder Angestellte die *Uniform* wählen könnte, die er bevorzugt.
  
  Durante le celebrazioni, abbiamo visto delle *divise* storiche in un museo.
  Bei den Feierlichkeiten haben wir historische *Uniformen* in einem Museum gesehen.
  
  Se non rispetti il codice della *divisa*, potresti ricevere una sanzione.
  Wenn du den *Uniform*-Kodex nicht einhältst, könntest du eine Strafe erhalten.
