Rang: 1697
Wort: disco
Wortart: n.m
Wort mit Artikel: il disco
Femininum / Plural: dischi
IPA: ''
Definition: die Schallplatte, -n, die Platte, -n
Register: ''
Beispielsätze: |-
  Mio zio ha una collezione di *dischi* jazz degli anni '60.
  Mein Onkel hat eine Sammlung von *Schallplatten* aus den 1960ern.
  
  La *disco* è danneggiata e non gira più come dovrebbe.
  Die *Platte* ist beschädigt und dreht sich nicht mehr richtig.
  
  Sai dove posso trovare un *disco* dei Beatles in edizione originale?
  Weißt du, wo ich eine *Platte* der Beatles in Originalausgabe finden kann?
  
  Durante il viaggio abbiamo ascoltato un *disco* che parlava di viaggi nello spazio.
  Während der Fahrt haben wir eine *Platte* gehört, die von Reisen im Weltraum handelte.
  
  Se rompi il *disco* di tuo fratello, devi sostituirglielo, oltre a scusarti.
  Wenn du die *Platte* deines Bruders kaputt machst, musst du ihm nicht nur eine neue besorgen, sondern dich auch entschuldigen.
