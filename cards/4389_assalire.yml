Rang: 4389
Wort: assalire
Wortart: vt
Wort mit Artikel: assalire
Femininum / Plural: ''
IPA: ''
Definition: angreifen, überfallen
Register: ''
Beispielsätze: |-
  Il malvivente ha deciso di *assalire* la banca nel pomeriggio.
  Der Verbrecher beschloss, die Bank am Nachmittag zu *überfallen*.
  
  Se fossi in pericolo, vorrei che qualcuno mi *assalisse* con un buon consiglio.
  Wäre ich in Gefahr, würde ich mir wünschen, dass mich jemand mit einem guten Rat *angreift*.
  
  Il cane ha *assalito* il postino non appena ha aperto il cancello.
  Der Hund hat den Briefträger *überfallen*, sobald das Tor geöffnet wurde.
  
  Gli scienziati temono che un virus sconosciuto possa *assalire* gli organismi umani.
  Die Wissenschaftler fürchten, dass ein unbekannter Virus die menschlichen *Organismen* angreifen könnte.
  
  Non appena il ladro ha visto la polizia, ha iniziato a *assalire* il portafoglio nelle tasche della vittima.
  Sobald der Dieb die Polizei sah, begann er, das Portemonnaie in den Taschen des Opfers zu *überfallen*.
