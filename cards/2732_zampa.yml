Rang: 2732
Wort: zampa
Wortart: n.f
Wort mit Artikel: la zampa
Femininum / Plural: zampe
IPA: ''
Definition: die Pfote, -n
Register: ''
Beispielsätze: |-
  Il cane ha le *zampe* enormi che sembrano fatte per correre.
  Der Hund hat riesige *Pfoten*, die wie fürs Laufen gemacht scheinen.
  
  Non appena ho aperto la porta, il gatto è sgusciato via con una *zampa* ferita.
  Sobald ich die Tür geöffnet hatte, ist die Katze mit einer verletzten *Pfote* davongeschlüpft.
  
  Mi chiedevo se quella creatura avesse davvero le *zampe* come quelle di un orso.
  Ich fragte mich, ob dieses Wesen wirklich *Pfoten* wie die eines Bären habe.
  
  Quando il cane è caduto, ho sentito un rumore secco: si era rotto una *zampa* posteriore.
  Als der Hund stürzte, hörte ich ein lautes Knacken: Er hatte sich eine hintere *Pfote* gebrochen.
  
  Nonostante il dolore, l’animale ha provato a camminare appoggiandosi solo alla *zampa* anteriore sinistra.
  Trotz des Schmerzes versuchte das Tier, sich nur auf die linke vordere *Pfote* zu stützen.
