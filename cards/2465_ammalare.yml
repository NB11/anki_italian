Rang: 2465
Wort: ammalare
Wortart: vi
Wort mit Artikel: ammalare
Femininum / Plural: ''
IPA: ''
Definition: krank werden
Register: ''
Beispielsätze: |-
  Se *ammalerai*, dovrai restare a casa per una settimana.
  Wenn du *krank wirst*, musst du eine Woche zu Hause bleiben.
  
  Non mi sono *ammalato* mai durante l'inverno.
  Ich bin *noch nie* im Winter krank geworden.
  
  Temo che il bambino si *ammali* se mangia troppi dolci.
  Ich fürchte, das Kind *wird krank*, wenn es zu viele Süßigkeiten isst.
  
  Spero che non ti *ammalassi* durante il viaggio in montagna.
  Ich hoffe, du *wirst nicht krank*, während du in den Bergen reist.
  
  È evidente che si *ammalerà* spesso se non indossa una sciarpa.
  Offensichtlich *wird er oft krank*, wenn er keinen Schal trägt.
