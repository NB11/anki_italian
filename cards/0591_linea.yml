Rang: 591
Wort: linea
Wortart: n.f
Wort mit Artikel: la linea
Femininum / Plural: linee
IPA: ''
Definition: die Linie, -n
Register: ''
Beispielsätze: |-
  La *linea* blu sulla mappa indica il percorso della metropolitana.
  Die *Linie* blau auf der Karte zeigt den Weg der U-Bahn.
  
  Ho tracciato una *linea* retta per dividere il foglio in due parti uguali.
  Ich habe eine *Linie* gerade gezogen, um das Blatt in zwei gleiche Teile zu teilen.
  
  Nonostante la confusione, è riuscito a seguire la *linea* del discorso del professore.
  Trotz der Verwirrung gelang es ihm, der *Linie* der Rede des Professors zu folgen.
  
  La *linea* di confine tra i due paesi è stata spostata dopo l’incidente diplomatico.
  Die *Grenzlinie* zwischen den beiden Ländern wurde nach dem diplomatischen Zwischenfall verschoben.
  
  Se vuoi sapere dove andare, segui semplicemente la *linea* gialla sul pavimento.
  Wenn du wissen willst, wohin du gehen sollst, folge einfach der *Linie* gelb auf dem Boden.
