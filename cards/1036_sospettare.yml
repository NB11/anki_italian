Rang: 1036
Wort: sospettare
Wortart: v
Wort mit Artikel: sospettare
Femininum / Plural: ''
IPA: ''
Definition: verdächtigen, mutmaßen
Register: ''
Beispielsätze: |-
  Il detective *sospetta* che l’uomo della stazione sia coinvolto nel delitto.
  Der Detektiv *verdächtigt*, dass der Mann vom Bahnhof in die Straftat verwickelt ist.
  
  Non *sospetteresti* mai che tua sorella possa rischiare la carriera per un sentimento.
  Du *würdest* nie verdächtigen, dass deine Schwester ihre Karriere für ein Gefühl riskiert.
  
  È importante *sospettare* anche di chi sembra innocente, secondo l’investigatore.
  Es ist wichtig, auch diejenigen zu *verdächtigen*, die unschuldig erscheinen, laut dem Ermittler.
  
  Se avessi *sospettato* prima, avremmo impedito il disastro.
  Hätte ich früher *verdächtigt*, hätten wir die Katastrophe verhindern können.
  
  Gli agenti *sospettano* che qualcuno abbia commesso un errore durante l’indagine.
  Die Beamten *verdächtigen*, dass jemand während der Untersuchung einen Fehler begangen hat.
