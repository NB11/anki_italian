Rang: 1313
Wort: ghiaccio
Wortart: n.m
Wort mit Artikel: il ghiaccio
Femininum / Plural: ghiacci
IPA: ''
Definition: das Eis, die Eise
Register: ''
Beispielsätze: |-
  In inverno preferisco bere il caffè con *ghiaccio*, anzi, anche in estate mi piace così.
  Im Winter trinke ich lieber Kaffee mit *Eis*, im Gegenteil, auch im Sommer mag ich es so.
  
  Il *ghiaccio* che hai messo nel bicchiere si scioglierà in pochi minuti.
  Das *Eis*, das du ins Glas gegeben hast, wird in wenigen Minuten schmelzen.
  
  Hanno trovato un blocco enorme di *ghiaccio* mentre facevano una passeggiata al polo.
  Sie haben einen riesigen Block *Eises* gefunden, während sie einen Spaziergang am Pol machten.
  
  Se non aggiungi *ghiaccio* alla bevanda, rischi di bruciarti la lingua.
  Wenn du kein *Eis* zum Getränk gibst, riskierst du, dir die Zunge zu verbrennen.
  
  Nonostante il *ghiaccio* sul sentiero, siamo riusciti ad arrivare in cima alla montagna senza scivolare.
  Trotz des *Eises* auf dem Pfad sind wir zum Gipfel des Berges gekommen, ohne auszurutschen.
