  La stanza degli ospiti è *libera*, puoi dormirci stanotte.
  Das Gästezimmer ist *frei*, du kannst heute Nacht dort schlafen.
  
  Se fossi *libero* domani, verrei volentieri alla tua festa.
  Wenn ich morgen *frei* wäre, würde ich gerne zu deiner Party kommen.
