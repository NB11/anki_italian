Definition: Satelliten-, satellitenbezogen
Register: ''
Beispielsätze: |-
  La comunicazione *satellitare* è essenziale per le trasmissioni televisive in diretta.
  Die *satellitenbasierte* Kommunikation ist essenziell für Live-Fernsehübertragungen.
  
  Hanno installato un sistema di posizionamento *satellitare* per monitorare il veicolo.
  Sie haben ein *Satelliten*ortungssystem installiert, um das Fahrzeug zu überwachen.
  
  Nonostante le interferenze, il segnale *satellitare* rimane stabile.
  Trotz der Störungen bleibt das *Satelliten*signal stabil.
  
  Chi vuole prenotare una cena con vista *satellitare* dovrebbe chiedere informazioni al ristorante.
  Wer ein Abendessen mit *Satelliten*blick buchen möchte, sollte sich im Restaurant erkundigen.
  
  Le immagini *satellitari* mostrano chiaramente l'avanzamento dei lavori in cava.
  Die *Satelliten*bilder zeigen eindeutig den Fortschritt der Arbeiten im Steinbruch.
