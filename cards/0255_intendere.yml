Rang: 255
Wort: intendere
Wortart: v
Wort mit Artikel: intendere
Femininum / Plural: ''
IPA: ''
Definition: beabsichtigen, vorhaben, meinen
Register: ''
Beispielsätze: |-
  Cosa *intendo* con questa frase?
  Was *meine* ich mit diesem Satz?
  
  *Intendiamo* partire domani mattina alle sette.
  Wir *beabsichtigen*, morgen früh um sieben loszufahren.
  
  Non ho *inteso* dire che eri malato.
  Ich habe nicht *beabsichtigt* zu sagen, dass du krank warst.
  
  Se *intendesse* qualcosa di diverso, me lo dica subito!
  Falls Sie *vorhätten* etwas anderes zu tun, sagen Sie es mir bitte sofort!
  
  *Intenderesti* venire con noi al concerto stasera?
  Hättest du *vor*, mit uns heute Abend zum Konzert zu kommen?
