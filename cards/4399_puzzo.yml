Rang: 4399
Wort: puzzo
Wortart: n.m
Wort mit Artikel: il puzzo
Femininum / Plural: puzzi
IPA: ''
Definition: der Gestank, -e
Register: ''
Beispielsätze: |-
  Ho sentito un *puzzo* terribile quando sono entrato nella stanza.
  Ich habe einen *fürchterlichen Gestank* wahrgenommen, als ich in den Raum kam.
  
  Non sopporto questo *puzzo* di vernice fresca in casa.
  Ich ertrage diesen *Geruch* von frischer Farbe zu Hause nicht.
  
  Se senti un *puzzo* di gas, apri subito le finestre!
  Wenn du einen *Gestank* nach Gas riechst, öffne sofort die Fenster!
  
  Questo formaggio è andato a male e ha un *puzzo* insopportabile.
  Dieser Käse ist verdorben und stinkt unerträglich.
  
  Il *puzzo* che viene dalla cucina è davvero disgustoso.
  Der *Gestank*, der aus der Küche kommt, ist wirklich ekelhaft.
