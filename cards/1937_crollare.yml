Rang: 1937
Wort: crollare
Wortart: vi
Wort mit Artikel: crollare
Femininum / Plural: ''
IPA: ''
Definition: einstürzen, zusammenbrechen
Register: ''
Beispielsätze: |-
  Il vecchio ponte di legno *crollerà* durante la prossima tempesta se non lo rinforzano subito.
  Die alte Holzbrücke wird beim nächsten Sturm *einstürzen*, wenn sie sie nicht sofort verstärken.
  
  Dopo mesi di proteste, finalmente il governo *è crollato* sotto il peso delle critiche.
  Nach monatelangen Protesten ist die Regierung unter dem Gewicht der Kritik *zusammengebrochen*.
  
  Questo edificio sembra solido, ma *crollerebbe* al primo terremoto, ne sono sicuro.
  Dieses Gebäude wirkt stabil, aber es würde beim ersten Erdbeben *zusammenbrechen*, dessen bin ich sicher.
  
  Pensavo che la squadra avrebbe vinto, ma alla fine *è crollata* sotto la pressione del pubblico.
  Ich dachte, das Team würde gewinnen, aber am Ende *brach es* unter dem Druck des Publikums zusammen.
  
  Se *crollassi* il soffitto, ci troveremmo in un guaio enorme, quindi controlliamo bene le travi!
  Wenn die Decke *einstürzen* würde, hätten wir ein riesiges Problem, deshalb überprüfen wir die Balken sorgfältig!
