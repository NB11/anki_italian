Rang: 2758
Wort: mezzogiorno
Wortart: n.m
Wort mit Artikel: il mezzogiorno
Femininum / Plural: i mezzogiorni
IPA: ''
Definition: der Mittag, -e
Register: ''
Beispielsätze: |-
  A *mezzogiorno* il sole scotta di più che al mattino.
  Um *Mittag* brennt die Sonne stärker als am Morgen.
  
  Avevo un appuntamento fissato per le 12, ma non sono riuscito ad arrivare in tempo a *mezzogiorno*.
  Ich hatte einen Termin um 12 Uhr vereinbart, schaffte es aber nicht, pünktlich um *Mittag* anzukommen.
  
  Se domani non piove, andrò al mare già di *mezzogiorno* per approfittare del tempo libero.
  Wenn es morgen nicht regnet, gehe ich schon um *Mittag* ans Meer, um die freie Zeit zu nutzen.
  
  Fra tre ore sarà *mezzogiorno*, e finalmente potremo mangiare qualcosa di caldo.
  In drei Stunden ist *Mittag*, und endlich können wir etwas Warmes essen.
  
  Anche se partiamo all’alba, stiamo guidando da così tanto tempo che temo arriveremo a *mezzogiorno* stanchi morti.
  Auch wenn wir bei Tagesanbruch losfahren, fahren wir schon so lange, dass ich fürchte, wir werden um *Mittag* völlig erschöpft ankommen.
