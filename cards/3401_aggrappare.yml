Rang: 3401
Wort: aggrappare
Wortart: v
Wort mit Artikel: aggrappare
Femininum / Plural: ''
IPA: ''
Definition: sich festklammern, festhalten
Register: ''
Beispielsätze: |-
  Il gatto si è *aggrappato* al maglione mentre cercavo di spostarlo.
  Die Katze hat sich an dem *Pullover festgeklammert*, während ich versuchte, sie zu bewegen.
  
  Non *aggrapparti* alla ringhiera, potresti cadere!
  Klammer dich nicht am Geländer *fest*, du könntest fallen!
  
  Anche se aveva paura, non volle *aggrapparsi* a nessuno dei suoi compagni di viaggio.
  Auch wenn er Angst hatte, wollte er sich an keinem seiner Mitreisenden *festhalten*.
  
  Si *aggrappò* al volante per non essere sbalzato fuori dalla macchina.
  Er *klammerte* sich am Steuer fest, um nicht aus dem Auto geschleudert zu werden.
  
  L’alpinista si *aggrappò* alla corda con tutte le sue forze per non scivolare.
  Der Bergsteiger *klammerte* sich mit aller Kraft an das Seil fest, um nicht abzurutschen.
