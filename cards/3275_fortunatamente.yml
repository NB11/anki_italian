Rang: 3275
Wort: fortunatamente
Wortart: adv
Wort mit Artikel: fortunatamente
Femininum / Plural: ''
IPA: ''
Definition: glücklicherweise
Register: ''
Beispielsätze: |-
  Ho superato l’esame *fortunatamente* senza bisogno di ripeterlo.
  Ich habe die Prüfung *glücklicherweise* ohne Wiederholung bestanden.
  
  *Fortunatamente* che avevi portato l’ombrello, perché ha iniziato a piovere all’improvviso.
  *Glücklicherweise* hattest du den Schirm dabei, denn plötzlich fing es an zu regnen.
  
  Anche se la situazione era complicata, siamo riusciti a trovare una soluzione, *fortunatamente*!
  Obwohl die Lage kompliziert war, konnten wir *glücklicherweise* eine Lösung finden!
  
  Avrei fallito il colloquio, ma *fortunatamente* mi hanno chiamato per una seconda possibilità.
  Ich hätte das Vorstellungsgespräch vermasselt, aber *glücklicherweise* haben sie mich zu einer zweiten Chance eingeladen.
  
  Non mi aspettavo di superare il test, ma *fortunatamente* ce l’ho fatta al primo colpo.
  Ich hatte nicht erwartet, die Prüfung zu bestehen, aber *glücklicherweise* habe ich es beim ersten Mal geschafft.
