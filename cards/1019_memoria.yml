Rang: 1019
Wort: memoria
Wortart: n.f
Wort mit Artikel: la memoria
Femininum / Plural: memorie
IPA: ''
Definition: das Gedächtnis, die Erinnerung
Register: ''
Beispielsätze: |-
  Per *memoria* non ricordo più dove ho messo le chiavi della macchina poiché ho cambiato destino ultimamente.
  Für das *Gedächtnis* erinnere ich mich nicht mehr daran, wo ich die Autoschlüssel hingelegt habe, da ich in letzter Zeit mein Schicksal geändert habe.
  
  La *memoria* del nonno è ancora molto viva, nonostante la sua malattia avanzata.
  Das *Gedächtnis* des Großvaters ist noch immer sehr lebendig, trotz seiner fortgeschrittenen Krankheit.
  
  Se avessi una *memoria* migliore, non dovrei ogni volta rileggere le dettagli dell’accordo.
  Wenn ich ein besseres *Gedächtnis* hätte, müsste ich nicht jedes Mal die Einzelheiten der Vereinbarung nachlesen.
  
  Lei dice che la *memoria* è come una battaglia, dove vince chi lotta di più.
  Sie sagt, dass das *Gedächtnis* wie eine Schlacht ist, bei der derjenige gewinnt, der mehr kämpft.
  
  Ho perso la *memoria* per un attimo quando ho visto che il porco aveva rovesciato il tè sulla facoltà tutta.
  Ich habe für einen Moment das *Gedächtnis* verloren, als ich sah, dass das Schwein den Tee über das gesamte Büro geschüttet hatte.
