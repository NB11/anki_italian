Beispielsätze: |-
  Usava sempre un linguaggio *figurato* per rendere le sue spiegazioni più chiare.
  Er verwendete immer eine *übertragene* Sprache, um seine Erklärungen klarer zu machen.
  
  Nel suo discorso c’era un’espressione *figurata* che nessuno aveva capito.
  In seiner Rede gab es einen *im übertragenen* Ausdruck, den niemand verstanden hatte.
  
  Non prendere alla lettera le parole *figurate*: spesso hanno un significato diverso.
  Nimm die *übertragenen* Worte nicht wörtlich: Sie haben oft eine andere Bedeutung.
  
  Il poeta ama giocare con le immagini *figurate*, rendendo i versi più vivi.
  Der Dichter liebt es, mit *übertragenen* Bildern zu spielen und macht die Verse so lebendiger.
  
  Quella frase *figurata* mi ha fatto sorridere, anche se non era poi così divertente.
  Dieser *übertragene* Satz ließ mich lächeln, obwohl er nicht besonders lustig war.
