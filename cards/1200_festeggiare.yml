Rang: 1200
Wort: festeggiare
Wortart: v
Wort mit Artikel: festeggiare
Femininum / Plural: ''
IPA: ''
Definition: feiern
Register: ''
Beispielsätze: |-
  Stavolta *festeggiamo* il compleanno del nonno a casa sua, non in un ristorante.
  Dieses Mal *feiern* wir den Geburtstag des Opas bei ihm zu Hause, nicht in einem Restaurant.
  
  Dopo aver superato l’esame, Marco vuole *festeggiare* tutta la notte con gli amici.
  Nach der bestandenen Prüfung will Marco die ganze Nacht mit Freunden *feiern*.
  
  Credo che la squadra abbia deciso di non *festeggiare* ancora la vittoria, perché il risultato non è definitivo.
  Ich glaube, die Mannschaft hat beschlossen, den Sieg noch nicht zu *feiern*, weil das Ergebnis nicht endgültig ist.
  
  Se avessi vinto la lotteria, avrei invitato tutti a *festeggiare* insieme a me.
  Wenn ich die Lotterie gewonnen hätte, hätte ich alle eingeladen, mit mir zu *feiern*.
  
  Non appena il sindaco avrà annunciato la notizia, il popolo inizierà a *festeggiare* per le strade della città.
  Sobald der Bürgermeister die Nachricht verkündet hat, wird das Volk beginnen, auf den Straßen der Stadt zu *feiern*.
