Rang: 4444
Wort: sbucare
Wortart: vi
Wort mit Artikel: sbucare
Femininum / Plural: ''
IPA: ''
Definition: hervorspringen, auftauchen
Register: ''
Beispielsätze: |-
  Non appena il topo ha visto il gatto, è riuscito a *sbucare* da dietro il mobile.
  Sobald die Maus die Katze gesehen hat, konnte sie hinter dem Möbel *hervorspringen*.
  
  Dalla fessura della porta è *sbucato* un foglio con una minaccia anonima.
  Aus dem Türspalt ist ein Zettel mit einer anonyme Drohung *aufgetaucht*.
  
  Se non avessi *sbucato* dall’angolo proprio in quel momento, la palla mi avrebbe colpito!
  Wenn ich nicht genau in diesem Moment aus der Ecke *aufgetaucht* wäre, hätte mich der Ball getroffen!
  
  Miracolosamente il segugio è *sbucato* dal bosco senza essere stato visto dai cacciatori.
  Auf wundersame Weise ist der Jagdhund aus dem Wald *aufgetaucht*, ohne von den Jägern gesehen worden zu sein.
  
  Appena il sole è sorto, i primi raggi hanno fatto *sbucare* fuori gli scoiattoli dal loro nascondiglio.
  Sobald die Sonne aufgegangen ist, haben die ersten Strahlen die Eichhörnchen aus ihrem Versteck *hervorspringen* lassen.
