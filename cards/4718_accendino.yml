Rang: 4718
Wort: accendino
Wortart: n.m
Wort mit Artikel: l'accendino
Femininum / Plural: accendini
IPA: ''
Definition: das Feuerzeug, -e
Register: ''
Beispielsätze: |-
  Non trovo il mio *accendino*, lo cerchi tra i cuscini del divano?
  Hast du dein *Feuerzeug* schon unter den Kissen des Sofas gesucht?
  
  L’ha spento con un soffio e ha nascosto l’*accendino* nella tasca della giacca.
  Er hat es mit einem Hauch ausgeblasen und das *Feuerzeug* in der Jackentasche versteckt.
  
  Se non hai fiammiferi, usa l’*accendino* che ho lasciato sul tavolo della cucina.
  Falls du keine Streichhölzer hast, nimm das *Feuerzeug*, das ich auf dem Küchentisch liegen gelassen habe.
  
  Mi ha detto che il suo *accendino* è antico, ma non ha mai verificato se funzionasse ancora.
  Er hat mir erzählt, sein *Feuerzeug* sei alt, hat aber nie überprüft, ob es überhaupt noch funktioniert.
  
  Ho comprato un *accendino* nuovo proprio perché quello vecchio aveva il serbatoio rotto e perdeva benzina.
  Ich habe mir ein neues *Feuerzeug* gekauft, weil das alte einen kaputten Tank hatte und Benzin auslief.
