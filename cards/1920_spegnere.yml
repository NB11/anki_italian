Rang: 1920
Wort: spegnere
Wortart: vt
Wort mit Artikel: spegnere
Femininum / Plural: ''
IPA: ''
Definition: ausmachen, ausschalten
Register: ''
Beispielsätze: |-
  Puoi *spegnere* la luce quando esci dalla stanza?
  Kannst du das Licht *ausschalten*, wenn du den Raum verlässt?
  
  Ho dimenticato di *spegnere* il forno prima di uscire.
  Ich habe vergessen, den Ofen *auszumachen*, bevor ich gegangen bin.
  
  Se non *spegnerete* il motore, il serbatoio si svuoterà presto!
  Wenn ihr den Motor nicht *ausmacht*, wird der Tank bald leer sein!
  
  È probabile che il tecnico debba *spegnere* l’impianto elettrico per fare la manutenzione.
  Wahrscheinlich muss der Techniker die *Elektroanlage ausschalten*, um die Wartung durchzuführen.
  
  Non appena avrai *spento* il computer, potrai andare a casa.
  Sobald du den Computer *ausgeschaltet* hast, kannst du nach Hause gehen.
