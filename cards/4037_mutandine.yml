Rang: 4037
Wort: mutandine
Wortart: n.f
Wort mit Artikel: le mutandine
Femininum / Plural: mutandine
IPA: ''
Definition: die Unterhose, -n
Register: ''
Beispielsätze: |-
  Mi sono dimenticata di mettere le *mutandine* sotto il vestito nuovo.
  Ich habe vergessen, die *Unterhose* unter dem neuen Kleid anzuziehen.
  
  Non trovi che le *mutandine* di seta siano più delicate di quelle di cotone?
  Findest du nicht, dass die *Unterhose* aus Seide zarter ist als die aus Baumwolle?
  
  Se hai freddo, mettiti delle *mutandine* più spesse.
  Wenn dir kalt ist, zieh dir eine dickere *Unterhose* an.
  
  Le *mutandine* che hai comprato ieri erano in saldo?
  Waren die *Unterhosen*, die du gestern gekauft hast, im Angebot?
  
  Non riesco a decifrare perché tu abbia nascosto le *mutandine* nel cassetto della scrivania.
  Ich kann nicht begreifen, warum du die *Unterhose* in der Schreibtischschublade versteckt hast.
