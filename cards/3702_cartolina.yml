Rang: 3702
Wort: cartolina
Wortart: n.f
Wort mit Artikel: la cartolina
Femininum / Plural: cartoline
IPA: ''
Definition: die Postkarte, -n
Register: ''
Beispielsätze: |-
  Mi ha mandato una *cartolina* dal mare per farmi invidiare.
  Er hat mir eine *Postkarte* aus dem Urlaub geschickt, um mich neidisch zu machen.
  
  Sulla *cartolina* c’era una foto bellissima della costa greca.
  Auf der *Postkarte* war ein wunderschönes Foto der griechischen Küste zu sehen.
  
  Se vuoi che ti risponda, spediscimi una *cartolina* con il tuo indirizzo.
  Wenn du möchtest, dass ich dir antworte, schick mir eine *Postkarte* mit deiner Adresse.
  
  La *cartolina* che ho ricevuto oggi è piena di bei ricordi della mia infanzia.
  Die *Postkarte*, die ich heute bekommen habe, steckt voller schöner Erinnerungen an meine Kindheit.
  
  Le *cartoline* di città sono spesso più colorate di quelle di mare.
  Stadt-*Postkarten* sind oft farbenfroher als die vom Meer.
