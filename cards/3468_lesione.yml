Rang: 3468
Wort: lesione
Wortart: n.f
Wort mit Artikel: la lesione
Femininum / Plural: lesioni
IPA: ''
Definition: die Verletzung, -en
Register: ''
Beispielsätze: |-
  Dopo la caduta dalla bicicletta, il medico ha riscontrato una *lesione* al ginocchio.
  Nach dem Sturz vom Fahrrad hat der Arzt eine *Verletzung* am Knie festgestellt.
  
  Se non curi bene questa *lesione*, potrebbe infettarsi e diventare molto dolorosa.
  Wenn du diese *Verletzung* nicht gut pflegst, könnte sie sich entzünden und sehr schmerzhaft werden.
  
  Il calciatore si è fatto male durante la partita e ora teme una *lesione* ai legamenti.
  Der Fußballspieler hat sich während des Spiels verletzt und befürchtet nun eine *Verletzung* der Bänder.
  
  Anche se la *lesione* sembra lieve, è meglio farsi visitare da uno specialista.
  Auch wenn die *Verletzung* harmlos aussieht, ist es besser, einen Facharzt aufzusuchen.
  
  Hanno scoperto che la *lesione* era più grave di quanto pensassero inizialmente.
  Sie haben festgestellt, dass die *Verletzung* schwerwiegender war, als sie anfangs angenommen hatten.
