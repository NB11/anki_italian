Rang: 3255
Wort: ingiusto
Wortart: adj
Wort mit Artikel: ingiusto
Femininum / Plural: ''
IPA: ''
Definition: ungerecht
Register: ''
Beispielsätze: |-
  È *ingiusto* che tu debba lavorare tutto il weekend mentre gli altri sono in vacanza.
  Es ist *ungerecht*, dass du das ganze Wochenende arbeiten musst, während die anderen im Urlaub sind.
  
  Mi sembra *ingiusta* la decisione del professore di bocciare tutti senza spiegare i motivi.
  Mir scheint die Entscheidung des Professors, alle durchfallen zu lassen, ohne die Gründe zu erklären, *ungerecht*.
  
  Se non rispetti le regole del gioco, è *ingiusto* pretendere che gli avversari ti perdonino.
  Wenn du die Spielregeln nicht respektierst, ist es *ungerecht*, zu verlangen, dass die Gegner dir verzeihen.
  
  Era così *ingiusto* che lo chiamassero bugiardo senza prove reali.
  Es war so *ungerecht*, dass sie ihn ohne echte Beweise einen Lügner nannten.
  
  Spero che la giustizia possa correggere questa sentenza considerata *ingiusta* da molti cittadini.
  Ich hoffe, dass die Justiz dieses Urteil, das von vielen Bürgern als *ungerecht* angesehen wird, korrigieren kann.
