Rang: 946
Wort: corre
Wortart: v
Wort mit Artikel: corre
Femininum / Plural: ''
IPA: ''
Definition: laufen, rennen
Register: ''
Beispielsätze: |-
  Ogni mattina *corre* per dieci chilometri.
  Jeden Morgen *läuft* er zehn Kilometer.
  
  Se non *corri* subito, perderai il treno!
  Wenn du nicht *rennst*, verpasst du den Zug!
  
  Stavo per *correre* al parco quando ho ricevuto la chiamata.
  Ich wollte gerade zum Park *laufen*, als ich den Anruf bekam.
  
  Hanno detto che *corriamo* troppo lentamente rispetto agli altri.
  Sie sagten, dass wir im Vergleich zu den anderen zu langsam *laufen*.
  
  Vorrei che lui *corresse* più veloce per vincere la gara.
  Ich wünschte, er würde schneller *laufen*, um das Rennen zu gewinnen.
