Rang: 2722
Wort: principio
Wortart: n.m
Wort mit Artikel: il principio
Femininum / Plural: principi
IPA: ''
Definition: der Anfang, -¨e
Register: ''
Beispielsätze: |-
  Dal *principio* della storia capisco che sarà un lieto fine.
  Vom *Anfang* der Geschichte verstehe ich, dass es ein glückliches Ende geben wird.
  
  Non conosciamo ancora il *principio* della fisica che ha reso possibile questo esperimento.
  Wir kennen das *Prinzip* der Physik, das dieses Experiment erst möglich gemacht hat, noch nicht.
  
  All’inizio della riunione, il direttore ha ricordato il *principio* fondamentale dell’azienda: la soddisfazione del cliente.
  Zu Beginn der Sitzung erinnerte der Direktor an das grundlegende *Prinzip* des Unternehmens: die Kundenzufriedenheit.
  
  Se segui questo *principio* nella vita, tutto diventa più semplice.
  Wenn du dieses *Prinzip* im Leben befolgst, wird alles einfacher.
  
  Molti scienziati hanno lavorato su un nuovo *principio* per produrre energia pulita.
  Viele Wissenschaftler haben an einem neuen *Prinzip* zur Erzeugung sauberer Energie gearbeitet.
