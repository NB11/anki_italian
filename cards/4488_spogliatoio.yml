Beispielsätze: |-
  Dopo l’allenamento, gli atleti vanno nello *spogliatoio* per cambiarsi.
  Nach dem Training gehen die Sportler in den *Umkleideraum*, um sich umzuziehen.
  
  Il *spogliatoio* era così sporco che ho deciso di pulirlo prima della partita.
  Der *Umkleideraum* war so schmutzig, dass ich mich entschloss, ihn vor dem Spiel zu reinigen.
  
  Mi piacerebbe avere uno *spogliatoio* personale in palestra, ma non so se è possibile.
  Ich hätte gern einen persönlichen *Umkleideraum* im Fitnessstudio, aber ich weiß nicht, ob es möglich ist.
  
  Non appena il direttore dello stadio ci ha mostrato il nuovo *spogliatoio*, abbiamo capito che ci aspettava un’esperienza fantastica.
  Sobald uns der Stadiondirektor den neuen *Umkleideraum* zeigte, war uns klar, dass uns ein fantastisches Erlebnis erwartete.
  
  Questo *spogliatoio* è stato progettato per essere accessibile anche a persone con disabilità.
  Dieser *Umkleideraum* wurde so konzipiert, dass er auch für Menschen mit Behinderungen zugänglich ist.
