Femininum / Plural: i tornado
IPA: ''
Definition: der Tornado, -s, der Wirbelsturm, -¨e
Register: ''
Beispielsätze: |-
  I meteorologi hanno avvertito che *tornado* potrebbe colpire la costa domani.
  Die Meteorologen warnten, dass *Tornado* die Küste morgen treffen könnte.
  
  La città è stata completamente *tornado* dalle raffiche di vento.
  Die Stadt wurde von den Windböen völlig *verwüstet*.
  
  Nonostante il *tornado*, alcuni edifici sono rimasti intatti grazie alla loro struttura moderna.
  Trotz des *Tornados* blieben einige Gebäude unversehrt dank ihrer modernen Bauweise.
  
  Se dovesse arrivare un altro *tornado*, la popolazione sarebbe meglio preparata.
  Falls ein weiterer *Tornado* kommen sollte, wäre die Bevölkerung besser vorbereitet.
  
  Dopo il passaggio del *tornado*, gli abitanti hanno iniziato a valutare i danni causati alle loro proprietà.
  Nach dem Durchzug des *Tornados* begannen die Einwohner, die Schäden an ihrem Eigentum einzuschätzen.
