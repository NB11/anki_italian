  Er hat das *Auto* ohne Probleme zur Mietwagenstation *zurückgebracht*.
  
  Perché non *riporti* tu le chiavi a Marco?
  Warum *bringst* du die *Schlüssel* nicht zu Marco *zurück*?
  
  Spero che tu *riporti* la calma in questa situazione difficile.
  Ich hoffe, dass du die *Ruhe* in dieser schwierigen Situation *zurückbringst*.
  
  Avrebbero dovuto *riportare* indietro lo zaino smarrito.
  Sie hätten den *Rucksack* zurückbringen *sollen*.
