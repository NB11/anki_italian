Rang: 552
Wort: riportare
Wortart: vt
Wort mit Artikel: riportare
Femininum / Plural: ''
IPA: ''
Definition: zurückbringen, zurückholen, wiederherstellen
Register: ''
Beispielsätze: |-
  Devi *riportare* il libro in biblioteca entro domani, altrimenti pagherai una multa.
  Du musst das Buch morgen *zurückbringen*, sonst zahlst du eine Strafe.
  
  Ho *riportato* alla memoria un bel ricordo della mia infanzia mentre guardavo le vecchie foto.
  Ich habe eine schöne Erinnerung an meine Kindheit *zurückgeholt*, als ich die alten Fotos ansah.
  
  Se non *riporti* la calma tra i colleghi, l’ambiente di lavoro diventerà insostenibile.
  Wenn du nicht die Ruhe *wiederherstellst* zwischen den Kollegen, wird die Arbeitsumgebung unerträglich.
  
  L’assistente ha *riportato* il documento originale dopo averlo fotocopiato per l’archivio.
  Die Assistentin hat das Originaldokument *zurückgebracht*, nachdem sie es fürs Archiv fotokopiert hatte.
  
  Spero che il governo *riporti* presto la fiducia dei cittadini dopo lo scandalo.
  Ich hoffe, dass die Regierung das Vertrauen der Bürger bald *wiederherstellt* nach dem Skandal.
