Rang: 1016
Wort: collo
Wortart: n.m
Wort mit Artikel: il collo
Femininum / Plural: colli
IPA: ''
Definition: der Hals, -¨e
Register: ''
Beispielsätze: |-
  Ogni mattina, il cantante allunga *il collo* per riscaldarsi prima dello spettacolo all’Opera di Roma.
  Jeden Morgen streckt der Sänger *den Hals*, um sich vor der Show an der Oper in Rom zu dehnen.
  
  Mentre attraversava la stanza, l’attrice si è girata di scatto e ha visto un topo che le correva sul *collo*.
  Als sie den Raum durchquerte, drehte sich die Schauspielerin plötzlich um und sah eine Maus, die über *ihren Hals* lief.
  
  Nonostante la calma apparente, il poliziotto sapeva che dietro la porta si nascondeva una battaglia senza *collo* da perdere.
  Trotz der scheinbaren Ruhe wusste der Polizist, dass sich hinter der Tür eine Schlacht verbarg, bei der man *keinen Hals riskieren* durfte.
  
  Il famoso ristorante parigino offre un menu degustazione con dettagli che sembrano *collo* d’oca confit, ma in realtà sono altro.
  Das berühmte Pariser Restaurant bietet ein Degustationsmenü mit Details, die wie confit *Hälse* von Gänsen aussehen, aber es handelt sich um etwas anderes.
  
  Se *il collo* ti fa male dopo la caduta, è meglio andare dal medico che controlli che non sia nulla di serio.
  Wenn *der Hals* dir nach dem Sturz wehtut, solltest du lieber zum Arzt gehen, der prüft, ob es nichts Ernstes ist.
