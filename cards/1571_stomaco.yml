Rang: 1571
Wort: stomaco
Wortart: n.m
Wort mit Artikel: lo stomaco
Femininum / Plural: stomaci
IPA: ''
Definition: der Magen, Mägen
Register: ''
Beispielsätze: |-
  Dopo aver mangiato troppo, il *stomaco* mi fa male da ore.
  Nach dem vielen Essen tut mir der *Magen* seit Stunden weh.
  
  Il medico mi ha detto che lo *stomaco* ha bisogno di riposo dopo l'operazione.
  Der Arzt hat gesagt, dass der *Magen* nach der Operation Ruhe braucht.
  
  Quando sento che il *stomaco* brontola, so che devo mangiare qualcosa di leggero.
  Wenn ich merke, dass der *Magen* knurrt, weiß ich, dass ich etwas Leichtes essen muss.
  
  Se avessi saputo che il *stomaco* si sarebbe ribellato dopo quella cena, non avrei accettato l'invito del ministro.
  Hätte ich gewusst, dass der *Magen* nach diesem Abendessen rebellieren würde, hätte ich die Einladung des Ministers nicht angenommen.
  
  Nonostante il *stomaco* pieno, ho trovato la forza di continuare il discorso sulle conseguenze politiche della nuova legge.
  Trotz des vollen *Magens* fand ich die Kraft, die politische Folgen des neuen Gesetzes weiter zu besprechen.
