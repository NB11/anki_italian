Rang: 1551
Wort: nastro
Wortart: n.m
Wort mit Artikel: il nastro
Femininum / Plural: nastri
IPA: ''
Definition: das Band, -¨er, das Bandmaß, -e
Register: ''
Beispielsätze: |-
  Ho comprato un *nastro* adesivo per chiudere la scatola.
  Ich habe ein *Klebeband* gekauft, um die Schachtel zu schließen.
  
  Non riconosci più il *nastro* che ti ho regalato ieri?
  Erkennst du das *Band*, das ich dir gestern geschenkt habe, nicht mehr?
  
  Se avessi un *nastro* più lungo, potrei misurare tutta la stanza.
  Wenn ich ein längeres *Maßband* hätte, könnte ich das ganze Zimmer ausmessen.
  
  Il *nastro* della metro è rotto, quindi dobbiamo prendere l’uscita a destra.
  Das *Förderband* der U-Bahn ist kaputt, also müssen wir den Ausgang auf der rechten Seite nehmen.
  
  Prima di partire, assicurati di avere un *nastro* per i bagagli, non si sa mai!
  Bevor du losfährst, stell sicher, dass du ein *Band* fürs Gepäck hast – man weiß ja nie!
