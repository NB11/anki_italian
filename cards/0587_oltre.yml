Definition: darüber hinaus, überdies
Register: ''
Beispielsätze: |-
  Non solo è intelligente, *oltre* è anche molto coraggioso.
  Er ist nicht nur klug, *darüber hinaus* ist er auch sehr mutig.
  
  Ho visitato Parigi e *oltre* a Londra ho programmato di andare a Berlino.
  Ich habe Paris besucht und *überdies* plane ich, nach Berlin zu fahren.
  
