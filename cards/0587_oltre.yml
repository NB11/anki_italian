  Wenn du dieses Problem lösen willst, bedenke *darüber hinaus* alles, was daraus entstehen könnte.
  
  La ricerca non riguarda *oltre* il normale, ma anche questioni generali del nostro programma.
  Die Forschung betrifft nicht *darüber hinaus* das Übliche, sondern auch allgemeine Fragen unseres Programms.
