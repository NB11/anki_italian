Rang: 3586
Wort: alterare
Wortart: v
Wort mit Artikel: alterare
Femininum / Plural: ''
IPA: ''
Definition: verändern, fälschen, stören
Register: ''
Beispielsätze: |-
  Se *alteri* troppo l’equilibrio della bilancia, i risultati non saranno affidabili.
  Wenn du das Gleichgewicht der Waage *veränderst*, sind die Ergebnisse nicht zuverlässig.
  
  Hanno *alterato* la ricetta originale aggiungendo zucchero in più.
  Sie haben das ursprüngliche Rezept *gefälscht*, indem sie mehr Zucker hinzugefügt haben.
  
  Spero che nessuno *alteri* i documenti durante il mio viaggio.
  Ich hoffe, dass niemand die Unterlagen während meiner Reise *verändert*.
  
  L’inquinamento può *alterare* gli ecosistemi in modo irreversibile.
  Verschmutzung kann Ökosysteme *stören* und zwar auf irreversible Weise.
  
  Se avessi saputo che potevi *alterare* la memoria, forse non ti avrei raccontato tutto.
  Wenn ich gewusst hätte, dass du das Gedächtnis *verändern* kannst, hätte ich dir vielleicht nicht alles erzählt.
