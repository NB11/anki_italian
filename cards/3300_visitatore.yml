Beispielsätze: |-
  Il *visitatore* ha dimenticato la sua borsa nella hall.
  Der *Besucher* hat seine Tasche in der Halle vergessen.
  
  Chi era quel *visitatore* che è appena andato via?
  Wer war dieser *Besucher*, der gerade gegangen ist?
  
  Se fossi un *visitatore*, ti piacerebbe vedere gli appartamenti moderni.
  Wenn ich ein *Besucher* wäre, würde ich dir die modernen Wohnungen zeigen.
  
  Hanno accolto il *visitatore* con grande entusiasmo.
  Sie haben den *Besucher* mit großer Begeisterung empfangen.
  
  È vietato l’ingresso ai *visitatori* senza autorizzazione.
  Der *Besucher*-Zutritt ohne Genehmigung ist verboten.
