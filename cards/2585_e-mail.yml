  Wenn du die Bestätigung bis morgen nicht bekommst, schreib die *E-Mail* noch einmal.
  
  Spero che questa *e-mail* ti aiuti a chiarire la situazione.
  Ich hoffe, dass diese *E-Mail* dir hilft, die Situation zu klären.
  
  La *e-mail* che hai scritto ieri contiene un errore di battitura.
  Die *E-Mail*, die du gestern geschrieben hast, enthält einen Tippfehler.
