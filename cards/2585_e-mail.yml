Beispielsätze: |-
  Ho appena inviato un messaggio con una *e-mail* molto importante al mio capo.
  Ich habe gerade eine Nachricht mit einer *E-Mail* an meinen Chef geschickt.
  
  Non riesco ad aprire la *e-mail* che mi hai mandato ieri pomeriggio.
  Ich kann die *E-Mail* nicht öffnen, die du mir gestern Nachmittag geschickt hast.
  
