Rang: 1387
Wort: ridare
Wortart: vt
Wort mit Artikel: ridare
Femininum / Plural: ''
IPA: ''
Definition: zurückgeben, zurückgeben lassen
Register: ''
Beispielsätze: |-
  Ho bisogno che tu mi *ridai* subito quel libro!
  Ich brauche, dass du mir *sofort* dieses Buch zurückgibst.
  
  Nonostante la sua promessa, non gli ha ancora *ridato* i soldi del debbito.
  Trotz seines Versprechens hat sie ihm das Geld der *Schuld* noch nicht zurückgegeben.
  
  Se troverai le chiavi, *ridammele* immediatamente!
  Wenn du die Schlüssel findest, *gib sie mir* umgehend zurück!
  
  Il killer era stato costretto a *ridare* la pistola al proprietario dell’albergo dopo il miracolo della sua cattura.
  Der *Killer* war gezwungen gewesen, die Pistole dem Besitzer des Hotels nach dem Wunder seiner Ergreifung zurückzugeben.
  
  Avrei *ridato* volentieri il regalo a mio zio, ma lui insisteva che lo tenessi per lieto fine!
  Ich hätte das Geschenk meinem Onkel gerne *zurückgegeben*, aber er bestand darauf, dass ich es für ein frohes Ende behalte.
