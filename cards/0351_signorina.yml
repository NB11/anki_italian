Rang: 351
Wort: signorina
Wortart: n.f
Wort mit Artikel: la signorina
Femininum / Plural: signorine
IPA: ''
Definition: das Fräulein, die junge Frau
Register: ''
Beispielsätze: |-
  La *signorina* Rossi è la mia insegnante di matematica.
  Die *Fräulein* Rossi ist meine Mathematiklehrerin.
  
  Hai visto quella *signorina* bionda vicino al banco?
  Hast du das *Fräulein* mit den blonden Haaren neben dem Tresen gesehen?
  
  La *signorina* ha ricevuto un mazzo di fiori dal suo fidanzato.
  Die *junge Frau* hat einen Blumenstrauß von ihrem Verlobten bekommen.
  
  Chiedi alla *signorina* se vuole un caffè.
  Frag das *Fräulein*, ob sie einen Kaffee möchte.
  
  Le *signorine* della classe stanno organizzando una festa per domani.
  Die *jungen Frauen* der Klasse organisieren morgen eine Party.
