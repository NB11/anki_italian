Rang: 2027
Wort: sciocco
Wortart: adj
Wort mit Artikel: sciocco
Femininum / Plural: ''
IPA: ''
Definition: albern, dumm, einfältig
Register: ''
Beispielsätze: |-
  Quel *sciocco* ragazzo non ha capito nulla dell’esercizio che gli abbiamo spiegato per un’ora.
  Dieser *alberne* Junge hat die Übung, die wir ihm eine Stunde lang erklärt haben, überhaupt nicht verstanden.
  
  È *sciocco* pensare che la fortuna risolva sempre i problemi, senza fare nulla.
  Es ist *dumm*, zu glauben, dass das Glück die Probleme immer löst, ohne etwas zu tun.
  
  Se avessi saputo che era così *sciocco*, non gli avrei mai affidato questo compito importante.
  Wenn ich gewusst hätte, dass er so *einfältig* war, hätte ich ihm diese wichtige Aufgabe nie anvertraut.
  
  Pensavo che il suo giudizio fosse sensato, ma mi ha dimostrato il contrario con un commento *sciocco*.
  Ich dachte, sein Urteilsvermögen sei vernünftig, aber er hat mir das Gegenteil mit einer *dummen* Bemerkung bewiesen.
  
  Nonostante sia *sciocco*, a volte le sue battute fanno ridere anche me, che di solito sono serio.
  Auch wenn er *albern* ist, bringen seine Scherze manchmal sogar mich zum Lachen, obwohl ich normalerweise ernst bin.
