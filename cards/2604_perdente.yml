Rang: 2604
Wort: perdente
Wortart: n.m
Wort mit Artikel: il perdente
Femininum / Plural: i perdenti
IPA: ''
Definition: der Verlierer, -
Register: ''
Beispielsätze: |-
  Dopo la sconfitta, è diventato un *perdente* agli occhi di tutti.
  Nach der Niederlage ist er zum *Verlierer* in den Augen aller geworden.
  
  Nonostante sia un *perdente* in questa partita, continuerà a giocare con passione.
  Auch wenn er in diesem Spiel ein *Verlierer* ist, wird er mit Leidenschaft weiterspielen.
  
  Quello che hai detto ha trasformato anche me in un *perdente*.
  Was du gesagt hast, hat mich ebenfalls zum *Verlierer* gemacht.
  
  Era un *perdente* fino a quando non ha trovato la strategia giusta.
  Er war ein *Verlierer*, bis er die richtige Strategie fand.
  
  I *perdenti* di questa competizione verranno premiati con una medaglia di partecipazione.
  Die *Verlierer* dieses Wettbewerbs erhalten eine Teilnahme-Medaille.
