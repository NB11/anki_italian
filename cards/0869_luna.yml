Rang: 869
Wort: luna
Wortart: n.f
Wort mit Artikel: la luna
Femininum / Plural: lune
IPA: ''
Definition: der Mond, -e
Register: ''
Beispielsätze: |-
  Mentre guardavo il cielo notturno, la *luna* sembrava più grande del solito.
  Während ich in den Nachthimmel blickte, war der *Mond* größer als sonst.
  
  Non ho mai visto una *luna* così brillante in questa zona.
  Ich habe noch nie einen so hellen *Mond* in dieser Gegend gesehen.
  
  Se domani sera il cielo è sereno, potremo ammirare la *luna* piena.
  Wenn der Himmel morgen Abend klar ist, werden wir den *Vollmond* bewundern können.
  
  La leggenda dice che la *luna* influenzi le maree e i raccolti.
  Die Legende besagt, dass der *Mond* die Gezeiten und Ernten beeinflusst.
  
  Studiando l’astronomia, ho imparato che senza la *luna* le giornate sulla Terra sarebbero molto diverse.
  Beim Studium der Astronomie habe ich gelernt, dass ohne den *Mond* die Tage auf der Erde ganz anders wären.
