Rang: 3557
Wort: improbabile
Wortart: adj
Wort mit Artikel: improbabile
Femininum / Plural: ''
IPA: ''
Definition: unwahrscheinlich
Register: ''
Beispielsätze: |-
  È *improbabile* che arrivino in tempo, dato che il traffico è intenso.
  Es ist *unwahrscheinlich*, dass sie pünktlich ankommen, da der Verkehr stark ist.
  
  Sarebbe *improbabile* che accettasse l’offerta senza discuterla.
  Es wäre *unwahrscheinlich*, dass er das Angebot ohne Diskussion annimmt.
  
  Pensavo che la sua vittoria fosse *improbabile*, ma ha stupito tutti.
  Ich dachte, sein Sieg sei *unwahrscheinlich*, aber er hat alle überrascht.
  
  Nonostante le difficoltà, il progetto sembra *improbabile* da realizzare.
  Trotz der Schwierigkeiten scheint das Projekt kaum *unwahrscheinlich* umsetzbar zu sein.
  
  È *improbabile* che cambi idea dopo tutto questo tempo.
  Es ist *unwahrscheinlich*, dass sie ihre Meinung nach so langer Zeit noch ändert.
