Rang: 2337
Wort: pianta
Wortart: n.f
Wort mit Artikel: la pianta
Femininum / Plural: piante
IPA: ''
Definition: der Baum, -äume
Register: ''
Beispielsätze: |-
  Ho comprato tre nuove *piante* per il balcone della cucina.
  Ich habe drei neue *Bäume* für den Küchenbalkon gekauft.
  
  Mentre passeggiavo nel parco, ho notato che una *pianta* era stata danneggiata dalla grandine.
  Während ich im Park spazieren ging, bemerkte ich, dass ein *Baum* von Hagel beschädigt worden war.
  
  Nonostante il freddo, la *pianta* sul davanzale è riuscita a sopravvivere.
  Trotz der Kälte schaffte es der *Baum* auf der Fensterbank zu überleben.
  
  Se avessi più tempo, vorrei piantare delle *piante* aromatiche in giardino.
  Wenn ich mehr Zeit hätte, würde ich gerne *Bäume* mit Kräutern im Garten pflanzen.
  
  La *pianta* che hai regalato a Maria cresce molto più velocemente delle altre.
  Der *Baum*, den du Maria geschenkt hast, wächst viel schneller als die anderen.
