Rang: 2004
Wort: sacro
Wortart: adj
Wort mit Artikel: sacro
Femininum / Plural: ''
IPA: ''
Definition: heilig, sakral
Register: ''
Beispielsätze: |-
  La cerimonia si svolgerà in una chiesa *sacra* del Medioevo.
  Die Zeremonie findet in einer *heiligen* Kirche aus dem Mittelalter statt.
  
  Per noi è *sacro* il rispetto dei valori familiari.
  Für uns sind die Werte der Familie *heilig*.
  
  Il pellegrino attraversò un luogo che era sempre stato considerato *sacro* dalla sua popolazione.
  Der Pilger durchquerte einen Ort, der von seiner Bevölkerung immer als *heilig* angesehen wurde.
  
  Nonostante i tempi moderni, alcuni riti rimangono ancora *sacri* per molte culture.
  Trotz der modernen Zeiten bleiben einige Bräuche für viele Kulturen noch immer *heilig*.
  
  Chiunque osi profanare un simbolo *sacro* rischia di essere punito severamente.
  Wer es wagt, ein *heiliges* Symbol zu entweihen, riskiert harte Strafen.
