Rang: 458
Wort: aria
Wortart: n.f
Wort mit Artikel: l'aria
Femininum / Plural: arie
IPA: ''
Definition: die Luft, die Melodie
Register: ''
Beispielsätze: |-
  Spero che oggi ci sia *aria* fresca in montagna.
  Ich hoffe, dass heute *frische Luft* in den Bergen ist.
  
  Questa *aria* è davvero rilassante, non trovi?
  Diese *Melodie* ist wirklich entspannend, oder?
  
  Non riesco ad aprire la finestra, fa troppo *aria* fredda qui dentro!
  Ich kann das Fenster nicht öffnen, es ist zu *kalt* hier drinnen!
  
  L’*aria* condizionata è rotta da ieri sera.
  Die *Klimaanlage* ist seit gestern Abend kaputt.
  
  Cantava un’*aria* bellissima durante l’opera.
  Sie sang eine *wunderschöne Melodie* während der Oper.
