Rang: 1317
Wort: decisamente
Wortart: adv
Wort mit Artikel: decisamente
Femininum / Plural: ''
IPA: ''
Definition: entschieden, eindeutig, klar
Register: ''
Beispielsätze: |-
  Ho *decisamente* ragione, non cambierò opinione.
  Ich habe *entschieden* recht, ich werde meine Meinung nicht ändern.
  
  Ultimamente mangiamo *decisamente* troppo poco verdura, anzi, quasi per nulla.
  In letzter Zeit essen wir *entschieden* zu wenig Gemüse, im Gegenteil, fast gar keines.
  
  È *decisamente* un artista, il suo talento è straordinario!
  Er ist *eindeutig* ein Künstler, sein Talent ist außergewöhnlich!
  
  Se *decisamente* non vuoi partecipare, almeno resta a casa, non creare problemi.
  Wenn du *klar* nicht teilnehmen willst, dann bleib wenigstens zu Hause und mach keine Probleme.
  
  Dopo aver lottato per mesi, ha *decisamente* sconfitto la malattia e guarito.
  Nach Monaten des Kampfs hat er die Krankheit *entschieden* besiegt und ist gesund geworden.
