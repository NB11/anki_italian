Rang: 415
Wort: matrimonio
Wortart: n.m
Wort mit Artikel: il matrimonio
Femininum / Plural: i matrimoni
IPA: ''
Definition: die Ehe, die Hochzeit
Register: ''
Beispielsätze: |-
  Il loro *matrimonio* è stato celebrato in una chiesa bellissima.
  Ihre *Ehe* wurde in einer wunderschönen Kirche gefeiert.
  
  Domani ci sarà il *matrimonio* di Marco e Sofia.
  Morgen findet die *Hochzeit* von Marco und Sofia statt.
  
  Hai già pensato a come organizzare il tuo *matrimonio*?
  Hast du schon daran gedacht, wie du deine *Hochzeit* organisieren möchtest?
  
  Il *matrimonio* civile è riconosciuto anche dallo stato.
  Die *Zivilehe* wird auch vom Staat anerkannt.
  
  Vor cinquant’anni questo *matrimonio* sembrava impossibile.
  Vor fünfzig Jahren schien diese *Ehe* unmöglich zu sein.
