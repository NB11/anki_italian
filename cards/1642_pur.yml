Rang: 1642
Wort: pur
Wortart: adv
Wort mit Artikel: pur
Femininum / Plural: ''
IPA: ''
Definition: auch, sogar, trotzdem
Register: ''
Beispielsätze: |-
  Ho *purtroppo* dimenticato il prete che doveva benedire la loro visione lì davanti al lago.
  Ich habe leider den Priester vergessen, der ihre Vision dort vor dem See *segnen* sollte.
  
  Sebbene il piatto fosse disgustoso, lui ha mangiato *purtroppo* tutto senza dire nulla.
  Obwohl das Gericht *ekelhaft* war, hat er alles leider gegessen, ohne etwas zu sagen.
  
  La terapia non ha funzionato e la sua situazione è *peggiorata pur* dopo settimane di trattamento.
  Die Therapie hat nicht funktioniert und seine Situation hat sich *trotzdem* nach Wochen der Behandlung verschlechtert.
  
  Voleva correggere l’errore, *ma pur* spiegando più volte, nessuno lo ha capito.
  Er wollte den Fehler *korrigieren*, aber auch wenn er es mehrmals erklärte, hat es niemand verstanden.
  
  Ha comprato una pizza *pur* sapendo che era grassa e danno danni alla salute.
  Er hat eine Pizza gekauft, *obwohl* er wusste, dass sie fettig ist und der Gesundheit schadet.
