Rang: 803
Wort: peccato
Wortart: n.m
Wort mit Artikel: il peccato
Femininum / Plural: i peccati
IPA: ''
Definition: die Sünde, -n
Register: ''
Beispielsätze: |-
  Il *peccato* originale è un concetto religioso importante.
  Die *Erbsünde* ist ein wichtiges religiöses Konzept.
  
  Non giudicare senza conoscere il suo *peccato*.
  Urteile nicht, ohne seine *Sünde* zu kennen.
  
  Avrei dovuto confessare quel mio *peccato* prima.
  Ich hätte meine *Sünde* vorher beichten sollen.
  
  Che *peccato* che tu non sia potuto venire!
  Was für ein *Schade*, dass du nicht kommen konntest!
  
  Dio perdona i *peccati* di chi si pente sinceramente.
  Gott vergibt die *Sünden* derer, die aufrichtig bereuen.
