Rang: 803
Wort: peccato
Wortart: n.m
Wort mit Artikel: il peccato
Femininum / Plural: i peccati
IPA: ''
Definition: die Sünde, der Fehler
Register: ''
Beispielsätze: |-
  Credo che il *peccato* più grande sia la menzogna.
  Ich glaube, dass die *Sünde* am größten ist die Lüge.
  
  Se avessi saputo che sarebbe successo, non lo *peccato* di non averti avvertito!
  Wenn ich gewusst hätte, dass es passieren würde, hätte ich nicht die *Strafe* dafür gezögert, dich zu warnen!
  
  È un *peccato* che tu non possa venire alla festa stasera.
  Es ist ein *Schmerz*, dass du heute Abend nicht zur Feier kommen kannst.
  
  Dicono che ogni *peccato* abbia una sua redenzione, ma non sempre è facile trovarla.
  Man sagt, dass jede *Sünde* ihre eigene Erlösung hat, aber sie ist nicht immer leicht zu finden.
  
  Nonostante il *peccato* di ignoranza, il giudice lo assolse per mancanza di prove.
  Trotz der *Schuld* der Unwissenheit sprach ihn der Richter mangels Beweisen frei.
