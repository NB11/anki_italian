Rang: 1621
Wort: magazzino
Wortart: n.m
Wort mit Artikel: il magazzino
Femininum / Plural: magazzini
IPA: ''
Definition: das Lager, -
Register: ''
Beispielsätze: |-
  Il *magazzino* della fabbrica contiene molte scorte di materiali.
  Das *Lager* der Fabrik enthält viele Materialvorräte.
  
  Abbiamo trovato un *magazzino* abbandonato vicino al bosco che attira molti visitatori.
  Wir haben ein verlassenes *Lager* in der Nähe des Waldes gefunden, das viele Besucher anlockt.
  
  Se non svuotiamo il *magazzino*, domani non ci sarà spazio per i nuovi prodotti.
  Wenn wir das *Lager* nicht leeren, gibt es morgen keinen Platz für die neuen Produkte.
  
  Il incendio nel *magazzino* è stato spento solo dopo tre ore di lavoro dei pompieri.
  Der Brand im *Lager* wurde erst nach drei Stunden Arbeit der Feuerwehr gelöscht.
  
  Ho ordinato di controllare il *magazzino* perché alcuni prodotti sembrano essere stati danneggiati dall'esplosione.
  Ich habe angewiesen, das *Lager* zu überprüfen, weil einige Produkte durch die Explosion beschädigt zu sein scheinen.
