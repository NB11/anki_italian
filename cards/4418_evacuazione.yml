Rang: 4418
Wort: evacuazione
Wortart: n.f
Wort mit Artikel: la evacuazione
Femininum / Plural: evacuazioni
IPA: ''
Definition: die Evakuierung, -en
Register: ''
Beispielsätze: |-
  A causa dell'*evacuazione* di emergenza, tutti gli inquilini sono usciti rapidamente dall'edificio.
  Wegen der *Evakuierung* verließen alle Mieter das Gebäude schnell.
  
  Se non ci fosse stata l'*evacuazione* ordinata, molti sarebbero rimasti bloccati nel palazzo.
  Ohne die geordnete *Evakuierung* wären viele im Gebäude steckengeblieben.
  
  Dopo l'*evacuazione* forzata, la polizia ha sequestrato alcune sostanze tossiche nel laboratorio.
  Nach der erzwungenen *Evakuierung* beschlagnahmte die Polizei einige giftige Substanzen im Labor.
  
  L'*evacuazione* del museo è avvenuta senza problemi grazie alla preparazione del personale.
  Die *Evakuierung* des Museums verlief ohne Probleme dank der Vorbereitung des Personals.
  
  Gli abitanti del quartiere chiedono che l'*evacuazione* venga ripetuta con cadenza periodica per sicurezza.
  Die Anwohner fordern, dass die *Evakuierung* regelmäßig zur Sicherheit wiederholt wird.
