Rang: 46
Wort: succedere
Wortart: vi
Wort mit Artikel: succedere
Femininum / Plural: ''
IPA: ''
Definition: geschehen, passieren
Register: ''
Beispielsätze: |-
  Cosa *sta succedendo* in quella stanza?
  Was *geschieht* gerade in diesem Raum?
  
  Mi dispiace, ma *è successo* un imprevisto.
  Es tut mir leid, aber *ist ein unerwartetes Problem passiert*.
  
  *Sucederà* qualcosa di bello se crediamo in noi stessi.
  *Es wird etwas Schönes geschehen*, wenn wir an uns glauben.
  
  Non so come *sia potuto succedere* un errore del genere.
  Ich weiß nicht, wie *ein solcher Fehler passieren konnte*.
  
  Se *succedesse* di nuovo, chiederò spiegazioni.
  Falls *es wieder passieren würde*, werde ich nach Erklärungen fragen.
