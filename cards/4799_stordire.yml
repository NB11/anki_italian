Rang: 4799
Wort: stordire
Wortart: v
Wort mit Artikel: stordire
Femininum / Plural: ''
IPA: ''
Definition: benommen machen, betäuben
Register: ''
Beispielsätze: |-
  Il rumore assordante di sopra mi ha fatto *stordire* completamente.
  Das ohrenbetäubende Geräusch von oben hat mich völlig *benommen* gemacht.
  
  Ho *stordito* il cane con un forte rumore per distrarlo.
  Ich habe den Hund mit einem lauten Geräusch *betäubt*, um ihn abzulenken.
  
  Se continui a gridare, rischi di *stordire* tutti i presenti.
  Wenn du weiter schreist, wirst du womöglich alle Anwesenden *benommen* machen.
  
  Il caldo estremo in questa stanza sta per *stordire* chiunque entri.
  Die extreme Hitze in diesem Raum wird jeden, der hereinkommt, *betäuben*.
  
  Si dice che l’odore del rum possa addirittura *stordire* una persona dopo un po’.
  Es soll sein, dass der Geruch von *Rum* eine Person nach einiger Zeit benommen machen kann.
