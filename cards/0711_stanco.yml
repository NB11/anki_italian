Rang: 711
Wort: stanco
Wortart: adj
Wort mit Artikel: stanco
Femininum / Plural: stanchi
IPA: ''
Definition: müde, erschöpft
Register: ''
Beispielsätze: |-
  Dopo il lungo viaggio sono così *stanchi* che non riescono nemmeno a mangiare.
  Nach der langen Reise sind sie so *müde*, dass sie nicht einmal essen können.
  
  Se avessi dormito di più, ora non mi sentirei così *stanco*.
  Wenn ich mehr geschlafen hätte, wäre ich jetzt nicht so *müde*.
  
  Nonostante la fronte sudata e il respiro affannato, Fabio si sentiva ancora *stanco*.
  Trotz der schwitzenden *Stirn* und der keuchenden Atmung fühlte sich Fabio immer noch erschöpft.
  
  Quando arrivammo, lui era già *stanco* della lunga discussione che avevamo avuto.
  Als wir ankamen, war er schon *müde* von der langen Diskussion, die wir geführt hatten.
  
  Andiamo a letto, sono troppo *stanco* anche per pensare a un altro regalo.
  Lass uns ins Bett gehen, ich bin zu *müde*, um überhaupt noch an ein weiteres Geschenk zu denken.
