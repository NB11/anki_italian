Rang: 711
Wort: stanco
Wortart: adj
Wort mit Artikel: stanco
Femininum / Plural: stanc-i
IPA: ''
Definition: müde, erschöpft
Register: ''
Beispielsätze: |-
  Sono *stanco* dopo otto ore di lavoro.
  Ich bin *müde* nach acht Stunden Arbeit.
  
  Sei sempre *stanca* quando non dormi abbastanza?
  Bist du immer *erschöpft*, wenn du nicht genug schläfst?
  
  Non essere *stanco* di imparare nuove cose!
  Sei nicht *müde* davon, neue Dinge zu lernen!
  
  Dopo la camminata, eravamo tutti molto *stanc-i*.
  Nach dem Spaziergang waren wir alle sehr *müde*.
  
  Spero che domani non sarai *stanco* per la gita.
  Ich hoffe, dass du morgen nicht *erschöpft* für den Ausflug bist.
