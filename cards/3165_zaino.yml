Rang: 3165
Wort: zaino
Wortart: n.m
Wort mit Artikel: lo zaino
Femininum / Plural: zaini
IPA: ''
Definition: der Rucksack, -säcke
Register: ''
Beispielsätze: |-
  Ho comprato *zaino* nuovo per il viaggio in Giappone.
  Ich habe einen *neuen* Rucksack für die Reise nach Japan gekauft.
  
  Dai, prendi *zaino* e vieni con noi in montagna!
  Komm, nimm den *Rucksack* und komm mit uns ins Gebirge!
  
  Non dimenticare di mettere il libro nello *zaino* prima di uscire.
  Vergiss nicht, das Buch in den *Rucksack* zu legen, bevor du gehst.
  
  Mio figlio ha perso *zaino* alla stazione; era pieno di quaderni e penne.
  Mein Sohn hat seinen *Rucksack* am Bahnhof verloren; er war voller Hefte und Stifte.
  
  Se domani piove, ricordati di portare *zaino* con l'impermeabile dentro.
  Wenn es morgen regnet, vergiss nicht, den *Rucksack* mit der Regenjacke darin mitzunehmen.
