Rang: 2752
Wort: bang
Wortart: n.m
Wort mit Artikel: il bang
Femininum / Plural: bang
IPA: ''
Definition: der Knall, detonazione
Register: ''
Beispielsätze: |-
  Ho sentito un *bang* improvviso provenire dal garage.
  Ich habe einen *plötzlichen Knall* aus der Garage kommen hören.
  
  Il poliziotto ha sparato un *bang* in aria per disperdere la folla.
  Der Polizist hat einen *Knall* in die Luft abgegeben, um die Menge zu zerstreuen.
  
  Se non fosse stato per quel *bang*, non avrei capito che era un problema serio.
  Wenn es nicht dieser *Knall* gewesen wäre, hätte ich nicht verstanden, dass es ein ernstes Problem war.
  
  Non mi piacciono i film pieni di *bang* inutili e violenza gratuita.
  Ich mag keine Filme, die voller *unnötiger Knalle* und sinnloser Gewalt sind.
  
  Ascolta! Sembra che ci sia stato un *bang* vicino alla ferrovia.
  Hör mal! Es klingt, als hätte es einen *Knall* in der Nähe der Eisenbahn gegeben.
