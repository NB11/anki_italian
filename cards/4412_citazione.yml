Rang: 4412
Wort: citazione
Wortart: n.f
Wort mit Artikel: la citazione
Femininum / Plural: citazioni
IPA: ''
Definition: das Zitat, -e
Register: ''
Beispielsätze: |-
  Nella sua *citazione* famosa, lo scrittore ha citato un proverbio antico.
  In seinem berühmten *Zitat* zitierte der Schriftsteller ein altes Sprichwort.
  
  Ho trovato una *citazione* di Dante nella Divina Commedia che mi ha colpito molto.
  Ich habe ein *Zitat* aus Dantes Göttlicher Komödie gefunden, das mich sehr beeindruckt hat.
  
  La professoressa ha chiesto agli studenti di *citazione* in classe un autore moderno.
  Die Lehrerin bat die Schüler, in der Klasse einen modernen Autor *zu zitieren*.
  
  Se vuoi rispondere a una domanda, puoi aggiungere una *citazione* appropriata dal testo.
  Wenn du eine Frage beantworten möchtest, kannst du ein passendes *Zitat* aus dem Text anführen.
  
  Non mi piace quando qualcuno usa troppo spesso le *citazioni* nei discorsi.
  Ich mag es nicht, wenn jemand in Reden zu oft *Zitate* verwendet.
