Rang: 1343
Wort: regalare
Wortart: vt
Wort mit Artikel: regalare
Femininum / Plural: ''
IPA: ''
Definition: schenken, verschenken
Register: ''
Beispielsätze: |-
  Vorrei *regalare* un libro a mio fratello per il suo compleanno la settimana prossima.
  Ich möchte meinem Bruder nächste Woche ein Buch zum Geburtstag *schenken*.
  
  Nonostante il pessimo servizio, il direttore dell’albergo volle *regalare* una notte gratuita agli ospiti insoddisfatti.
  Trotz des *miserablen* Service beschloss der Hotelmanager, den unzufriedenen Gästen eine kostenlose Nacht zu verschenken.
  
  Se avessi più tempo, ti *regalerei* un viaggio in un’isola tropicale, ma purtroppo debbo restare qui.
  Wenn ich mehr Zeit hätte, würde ich dir eine Reise zu einer tropischen Insel *schenken*, aber leider muss ich hier bleiben.
  
  Hanno detto che *regaleranno* una copia della loro magia natalizia a chiunque trovi la trappola nascosta nel giardino.
  Sie haben gesagt, dass sie die Abschrift ihrer *Magie* an jeden verschenken werden, der die versteckte Falle im Garten ausfindig macht.
  
  Mi dispiace, ma non posso *regalare* questa copia del dipinto perché è la sola che ho e devo venderla per pagare l’affitto.
  Es tut mir leid, aber ich kann diese *Kopie* des Gemäldes nicht verschenken, denn es ist die einzige, die ich habe, und ich muss sie verkaufen, um die Miete zu zahlen.
