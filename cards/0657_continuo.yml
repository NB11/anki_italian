Rang: 657
Wort: continuo
Wortart: adj
Wort mit Artikel: continuo
Femininum / Plural: ''
IPA: ''
Definition: fortwährend, durchgehend
Register: ''
Beispielsätze: |-
  Il *continuo* rumore dei miei vicini mi sta facendo impazzire!
  Das *fortwährende* Geräusch meiner Nachbarn macht mich verrückt!
  
  Abbiamo ricevuto una chiamata di emergenza per un traffico *continuo* sulla strada sopra di noi.
  Wir haben einen *Notruf* wegen eines dauernden Verkehrs über uns erhalten.
  
  Nonostante il ritardo, il treno è partito con un flusso *continuo* di passeggeri.
  Trotz der *Verspätung* ist der Zug mit einem ununterbrochenen Strom von Fahrgästen abgefahren.
  
  Lui parlava con un tono *continuo* di voce, quasi assonnato, come se fosse ormai abituato alla noia.
  Er sprach mit einem *monotonen* Tonfall, fast schläfrig, als wäre er mittlerweile an die Langeweile gewöhnt.
  
  La polizia ha bloccato la zona perché c’era una questione *continua* di crimini intorno al luogo del delitto.
  Die Polizei hat die *Zone* abgesperrt, weil es dort eine ständige Frage von Straftaten um den Tatort gab.
