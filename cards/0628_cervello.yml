Rang: 628
Wort: cervello
Wortart: n.m
Wort mit Artikel: il cervello
Femininum / Plural: cervelli
IPA: ''
Definition: das Gehirn, -e
Register: ''
Beispielsätze: |-
  Mi hanno detto che *cervello* di mio zio funziona ancora bene nonostante l'età.
  Sie haben mir gesagt, dass *das Gehirn* meines Onkels trotz des Alters noch gut funktioniert.
  
  Per risolvere questa questione complicata ci vuole un *cervello* davvero brillante!
  Um diese komplizierte *Frage* zu lösen, braucht es ein wirklich brillantes Gehirn!
  
  Nonostante la terribile situazione, mantenne la calma e usò il *cervello* per trovare una soluzione.
  Trotz der *schrecklichen* Lage blieb er ruhig und nutzte sein Gehirn, um eine Lösung zu finden.
  
  Il detective studiava ogni segno sulla scena del crimine, cercando di capire cosa fosse passato per il *cervello* del colpevole.
  Der Detektiv untersuchte jedes *Zeichen* am Tatort und versuchte zu verstehen, was durch das Gehirn des Täters gegangen war.
  
  Mia sorella ha sempre avuto un *cervello* matematico, quindi studiare ingegneria era la scelta perfetta per lei.
  Meine Schwester hatte schon immer ein mathematisches *Gehirn*, daher war ein Ingenieursstudium die perfekte Wahl für sie.
