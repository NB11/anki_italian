Rang: 4039
Wort: esercitazione
Wortart: n.f
Wort mit Artikel: la esercitazione
Femininum / Plural: esercitazioni
IPA: ''
Definition: die Übung, -en
Register: ''
Beispielsätze: |-
  Durante *l’esercitazione* di emergenza, tutti gli impiegati hanno evacuato l’edificio in meno di cinque minuti.
  Während der *Übung* haben alle Angestellten das Gebäude in unter fünf Minuten evakuiert.
  
  Nonostante le difficoltà, l’istruttore ha ripetuto *l’esercitazione* più volte perché nessuno commettesse errori.
  Trotz der Schwierigkeiten hat der Ausbilder die *Übung* mehrmals wiederholt, damit niemand Fehler macht.
  
  Se avessimo saputo che l’*esercitazione* sarebbe stata così intensa, avremmo portato più acqua con noi.
  Hätten wir gewusst, dass die *Übung* so intensiv sein würde, hätten wir mehr Wasser mitgenommen.
  
  L’*esercitazione* militare prevedeva anche un’esercitazione di tiro al poligono di tiro della caserma.
  Die militärische *Übung* umfasste auch ein Schießtraining auf dem Schießstand der Kaserne.
  
  Secondo il piano, *l’esercitazione* di evacuazione dovrebbe concludersi entro le tredici.
  Laut Plan soll die *Übung* zur Evakuierung bis dreizehn Uhr abgeschlossen sein.
