Rang: 3989
Wort: agnello
Wortart: n.m
Wort mit Artikel: l'agnello
Femininum / Plural: agnelli
IPA: ''
Definition: das Lamm, Lämmer
Register: ''
Beispielsätze: |-
  Al mercato ho comprato un *agnello* fresco per la domenica di Pasqua.
  Auf dem Markt habe ich ein frisches *Lamm* für Ostersonntag gekauft.
  
  Nonostante le difficoltà, il pastore riuscì a salvare tutti gli *agnelli* dalla tempesta.
  Trotz der Schwierigkeiten gelang es dem Hirten, alle *Lämmer* vor dem Sturm zu retten.
  
  Se vuoi un sapore delicato, prova a cucinare l’*agnello* con le erbe aromatiche.
  Wenn du einen zarten Geschmack möchtest, probier doch mal, das *Lamm* mit Kräutern zuzubereiten.
  
  Gli *agnelli* pascolano liberamente nei prati vicino al fiume, mentre i genitori li sorvegliano attentamente.
  Die *Lämmer* weiden frei auf den Wiesen nahe dem Fluss, während die Eltern sie aufmerksam beobachten.
  
  Mi dissero che l’*agnello* al forno era squisito, ma non mi piacque affatto il suo sapore forte.
  Man sagte mir, das gebratene *Lamm* sei köstlich, aber mir gefiel sein intensiver Geschmack überhaupt nicht.
