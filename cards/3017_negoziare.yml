Beispielsätze: |-
  Il governo sta cercando di *negoziare* un accordo con i sindacati per evitare lo sciopero.
  Die Regierung versucht, eine Einigung mit den Gewerkschaften zu *verhandeln*, um den Streik zu vermeiden.
  
  Dopo mesi di trattative, siamo finalmente riusciti a *negoziare* un prezzo soddisfacente per entrambi.
  Nach Monaten der Verhandlungen konnten wir endlich einen zufriedenstellenden Preis *aushandeln*.
  
  Se avessimo saputo *negoziare* meglio, non saremmo finiti in questa situazione difficile.
  Hätten wir besser *verhandelt*, wären wir nicht in diese schwierige Lage geraten.
  
  L'azienda ha incaricato un esperto di *negoziare* con i fornitori stranieri per ridurre i costi.
  Das Unternehmen hat einen Experten beauftragt, mit den ausländischen Lieferanten zu *verhandeln*, um die Kosten zu senken.
  
  I due litiganti si sono incontrati per *negoziare* i termini del contratto senza ricorrere ad avvocati.
  Die beiden Streitparteien trafen sich, um die Vertragsbedingungen *auszuhandeln*, ohne Anwälte hinzuzuziehen.
