Rang: 4421
Wort: imprigionare
Wortart: vt
Wort mit Artikel: imprigionare
Femininum / Plural: ''
IPA: ''
Definition: einsperren, gefangen halten
Register: ''
Beispielsätze: |-
  Il re decise di *imprigionare* il suo nemico per sempre nel sotterraneo del castello.
  Der König beschloss, seinen Feind für immer im Kerker *einzusperren*.
  
  Senza prove concrete, non puoi semplicemente *imprigionare* qualcuno solo per sospetto.
  Ohne konkrete Beweise kannst du nicht einfach jemanden *gefangen halten*.
  
  Gli archeologi pensano che un tempo qui ci fosse una prigione dove venivano *imprigionati* i prigionieri politici.
  Die Archäologen glauben, dass es hier einst ein Gefängnis gab, in dem politische Gefangene *eingesperrt* wurden.
  
  Se continuerai a *imprigionare* i tuoi sogni, non realizzerai mai nulla di grande.
  Wenn du deine Träume weiterhin *gefangen hältst*, wirst du nie etwas Großes erreichen.
  
  Nonostante le proteste, le autorità hanno deciso di *imprigionare* i manifestanti per ordine del giudice.
  Trotz der Proteste haben die Behörden beschlossen, die Demonstranten *einzusperren*.
