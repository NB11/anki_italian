Rang: 2121
Wort: insetto
Wortart: n.m
Wort mit Artikel: l'insetto
Femininum / Plural: insetti
IPA: ''
Definition: das Insekt, -en
Register: ''
Beispielsätze: |-
  In estate nel parco ci sono molti *insetti* che ronzano tra i fiori.
  Im Sommer gibt es im Park viele *Insekten*, die zwischen den Blumen summen.
  
  Ho trovato un *insetto* morto sotto il letto, chissà da quanto tempo è lì.
  Ich habe ein totes *Insekt* unter dem Bett gefunden, weiß nicht, wie lange es schon dort liegt.
  
  Nel mio giardino la scorsa settimana ho visto uno *insetto* che non conoscevo.
  In meinem Garten habe ich letzte Woche ein *Insekt* gesehen, das ich nicht kannte.
  
  Se non ci fossero gli *insetti*, molti fiori non potrebbero riprodursi.
  Wenn es keine *Insekten* gäbe, könnten sich viele Blüten nicht vermehren.
  
  Mi hanno detto che quel *insetto* è rarissimo e vive solo in alcune zone tropicali.
  Man hat mir erzählt, dass dieses *Insekt* sehr selten ist und nur in einigen tropischen Gebieten lebt.
