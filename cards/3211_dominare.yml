Rang: 3211
Wort: dominare
Wortart: v
Wort mit Artikel: dominare
Femininum / Plural: ''
IPA: ''
Definition: beherrschen, dominieren
Register: ''
Beispielsätze: |-
  Il duca vuole *dominare* la provincia confinante per allargare i suoi territori.
  Der Herzog will die angrenzende Provinz *beherrschen*, um sein Gebiet zu erweitern.
  
  Dopo anni di lotta, sembra che il malato abbia infine imparato a *dominare* la sua ira.
  Nach Jahren des Kampfes scheint der Kranke endlich gelernt zu *beherrschen*, seinen Zorn zu zügeln.
  
  Affinché il progetto riesca, sarà necessario che un esperto riesca a *dominare* ogni aspetto tecnico.
  Damit das Projekt gelingt, wird es notwendig sein, dass ein Experte jeden technischen Aspekt *beherrschen* kann.
  
  Se non imparerai a *dominare* il tuo appetito, non perderai peso.
  Wenn du deinen *Appetit* nicht zu beherrschen lernst, wirst du nicht abnehmen.
  
  La civiltà romana riuscì a *dominare* ampie regioni del Mediterraneo.
  Die römische *Zivilisation* gelang es, weite Teile des Mittelmeers zu beherrschen.
