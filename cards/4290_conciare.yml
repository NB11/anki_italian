Rang: 4290
Wort: conciare
Wortart: vt
Wort mit Artikel: conciare
Femininum / Plural: ''
IPA: ''
Definition: zerstören, ruinieren
Register: ''
Beispielsätze: |-
  Se *conci* la camicia con così tanto detersivo, finirà per rovinarsi del tutto.
  Wenn du das Hemd mit so viel Waschmittel *zerstörst*, wird es am Ende ganz ruiniert sein.
  
  Dopo la lite, ha detto che avrebbe *conciato* la macchina del vicino di parcheggio.
  Nach dem Streit sagte er, er würde das Auto des Nachbarn beim Parken *ruinieren*.
  
  Non volevo *conciare* la reputazione di nessuno, ma purtroppo è successo.
  Ich wollte den Ruf von niemandem *zerstören*, aber leider ist es passiert.
  
  Se continui a *conciare* quel divano così, dovrai comprarne uno nuovo.
  Wenn du das Sofa weiterhin so *zerstörst*, musst du dir ein neues kaufen.
  
  Il temporale ha *conciato* il giardino in poche ore, strappando ogni pianta.
  Der Sturm hat den Garten in wenigen Stunden *verwüstet*, wobei jede Pflanze ausgerissen wurde.
Audio: ''
Notiz: ''
