Rang: 1598
Wort: benedire
Wortart: v
Wort mit Artikel: benedire
Femininum / Plural: ''
IPA: ''
Definition: segnen
Register: ''
Beispielsätze: |-
  I genitori hanno *benedetto* il loro figlio prima della partenza.
  Die Eltern haben ihren Sohn vor der Abreise *gesegnet*.
  
  Nonostante tutto, il prete decise di *benedire* anche loro, peccatori maledetti.
  Trotz allem entschied sich der Priester, auch sie, die *verfluchten* Sünder, zu segnen.
  
  Chi oserebbe *benedire* un oggetto così disastroso come questo?
  Wer würde es wagen, einen so *katastrophalen* Gegenstand wie diesen zu segnen?
  
  Spero che la Chiesa mi permetta di *benedire* il mio modello preferito.
  Ich hoffe, dass die Kirche mir erlaubt, mein Lieblings*modell* zu segnen.
  
  Anche se non lo meriti, verrò a *benedirti* qui al lago stasera.
  Auch wenn du es nicht verdienst, werde ich kommen, um dich heute Abend am *see* zu segnen.
