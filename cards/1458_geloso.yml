Rang: 1458
Wort: geloso
Wortart: adj
Wort mit Artikel: geloso
Femininum / Plural: ''
IPA: ''
Definition: eifersüchtig
Register: ''
Beispielsätze: |-
  Marco è *geloso* perché la sua ragazza parla con un altro ragazzo.
  Marco ist *eifersüchtig*, weil seine Freundin mit einem anderen Jungen spricht.
  
  Se fossi *gelosa*, non lo sopporterei male, ma lui continua a guardare altre donne.
  Wenn ich *eifersüchtig* wäre, würde ich das nicht ertragen, aber er schaut weiterhin andere Frauen an.
  
  Dicono che nell’azienda ci sia chi si sente *geloso* del ruolo del nuovo responsabile.
  Man sagt, in dem Unternehmen gibt es welche, die sich *eifersüchtig* auf die Rolle des neuen Verantwortlichen fühlen.
  
  Anche se ti ho definito come la mia persona preferita, non essere *gelosa* degli altri.
  Auch wenn ich dich als meine bevorzugte Person *festgelegt* habe, sei nicht eifersüchtig auf die anderen.
  
  Non posso credere che ti sia *geloso* di un giocatore della squadra italiana che neanche conosci!
  Ich kann nicht glauben, dass du *eifersüchtig* auf einen Spieler der italienischen Mannschaft bist, den du nicht einmal kennst!
