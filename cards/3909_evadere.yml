Rang: 3909
Wort: evadere
Wortart: v
Wort mit Artikel: evadere
Femininum / Plural: ''
IPA: ''
Definition: entkommen, fliehen, entweichen
Register: ''
Beispielsätze: |-
  Il prigioniero è riuscito a *evadere* dalla prigione nonostante le guardie.
  Der Gefangene ist trotz der Wachen aus dem Gefängnis *entkommen*.
  
  Se non paghi la multa, potresti dover *evadere* dalle tasse per sempre.
  Wenn du die Strafe nicht bezahlst, könntest du den Steuern für immer *entweichen*.
  
  Paolo sogna di *evadere* dalla sua routine quotidiana con un viaggio esotico.
  Paolo träumt davon, mit einer exotischen Reise seiner täglichen Routine zu *entfliehen*.
  
  Il gas tossico cominciò a *evadere* dal serbatoio con un sibilo sinistro.
  Das giftige Gas begann mit einem unheimlichen Zischen aus dem Tank zu *entweichen*.
  
  Per *evadere* dalla realtà, molti si rifugiano nei social, ma alla fine tutto torna a galla.
  Um der Realität zu *entfliehen*, flüchten sich viele in soziale Medien, doch am Ende kommt alles wieder hoch.
