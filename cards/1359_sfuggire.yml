Rang: 1359
Wort: sfuggire
Wortart: vi
Wort mit Artikel: sfuggire
Femininum / Plural: ''
IPA: ''
Definition: entkommen, entgehen, ausweichen
Register: ''
Beispielsätze: |-
  Il ladro *è sfuggito* alla polizia correndo per le strade strette della città.
  Der Dieb ist der Polizei entkommen, indem er durch die engen Straßen der Stadt rannte.
  
  Secondo la mia opinione, la velocità a cui guidavi *sfuggiva* al controllo.
  Meiner Meinung nach entzog sich deine Geschwindigkeit jeder Kontrolle.
  
  Se *sfuggiremo* i debiti ancora una volta, perderemo la fiducia di tutti.
  Wenn wir uns erneut den Schulden entziehen, verlieren wir das Vertrauen aller.
  
  Il killer sapeva che la trappola *sfuggiva* a ogni suo piano, ma continuò a insistere.
  Der Killer wusste, dass sich die Falle jedem seiner Pläne entzog, aber er hörte nicht auf zu beharren.
  
  Lei avrebbe *sfuggito* quella discussione spiacevole se fosse rimasta a casa, ma volle venire.
  Sie hätte diese unangenehme Diskussion vermieden, wenn sie zu Hause geblieben wäre, aber sie wollte kommen.
