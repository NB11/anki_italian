Beispielsätze: |-
  Dopo la laurea in medicina, Marco ha scelto di specializzarsi in *chirurgia* plastica.
  Nach seinem Medizinstudium entschied sich Marco für die Spezialisierung auf *Chirurgie*.
  
  La *chirurgia* moderna permette di operare con tecniche sempre meno invasive.
  Die moderne *Chirurgie* ermöglicht Eingriffe mit immer weniger invasiven Methoden.
  
  Se avessi un tumore, preferiresti la radioterapia o una *chirurgia*?
  Hättest du einen Tumor, würdest du lieber Bestrahlung oder eine *Chirurgie* bevorzugen?
  
  È importante che il paziente conosca i rischi associati alla *chirurgia* che deve affrontare.
  Es ist wichtig, dass der Patient die Risiken kennt, die mit der anstehenden *Chirurgie* verbunden sind.
  
  Ho sentito che in questo ospedale hanno aperto un nuovo reparto di *chirurgia* pediatrica.
  Ich habe gehört, dass in diesem Krankenhaus eine neue Abteilung für Kinder-*Chirurgie* eröffnet wurde.
