Femininum / Plural: ''
IPA: ''
Definition: bilden, formen, ausbilden
Register: ''
Beispielsätze: |-
  Gli scultori *formano* le loro statue con grande maestria.
  Bildhauer *formen* ihre Statuen mit großer Meisterschaft.
  
  Se vuoi *formare* una nuova squadra, devi trovare giocatori motivati.
  Wenn du ein neues Team *bilden* willst, musst du motivierte Spieler finden.
  
  Il professore ha spiegato come *formare* correttamente le frasi in italiano.
  Der Professor hat erklärt, wie man Sätze im Italienischen korrekt *bildet*.
  
  Questo corso aiuta gli studenti a *formarsi* professionalmente.
  Dieser Kurs hilft den Studierenden, sich beruflich zu *bilden*.
  
  I chimici hanno cercato di *formare* un composto stabile, ma senza successo.
  Die Chemiker haben versucht, eine stabile Verbindung zu *bilden*, aber ohne Erfolg.
