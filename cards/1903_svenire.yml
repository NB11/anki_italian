Rang: 1903
Wort: svenire
Wortart: vi
Wort mit Artikel: svenire
Femininum / Plural: ''
IPA: ''
Definition: in Ohnmacht fallen
Register: ''
Beispielsätze: |-
  Ha iniziato a sudare e poi è *svenuto* improvvisamente alla stazione.
  Er fing an zu schwitzen und *fiel* dann plötzlich auf dem Bahnhof in Ohnmacht.
  
  Temo che possa *svenire* se non beve qualcosa di zuccherato.
  Ich fürchte, er könnte *ohnmächtig werden*, wenn er nichts Zuckerhaltiges trinkt.
  
  Dopo aver sentito quella notizia triste, molti sono *svenuti* per lo shock.
  Nach dieser traurigen Nachricht sind viele vor Schock *in Ohnmacht gefallen*.
  
  Se non mangi abbastanza, rischi di *svenire* durante l'allenamento.
  Wenn du nicht genug isst, könntest du beim Training *ohnmächtig werden*.
  
  Appena l'ho vista impallidire, ho capito che stava per *svenire*.
  Sobald ich sie erbleichen sah, wusste ich, dass sie gleich *in Ohnmacht fallen* würde.
