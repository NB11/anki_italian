Rang: 4609
Wort: ingrandire
Wortart: vt
Wort mit Artikel: ingrandire
Femininum / Plural: ''
IPA: ''
Definition: vergrößern, erweitern
Register: ''
Beispielsätze: |-
  Se vuoi *ingrandire* questa foto, usa un programma di fotoritocco.
  Wenn du dieses Foto *vergrößern* willst, nutze ein Bildbearbeitungsprogramm.
  
  Il sindaco ha deciso di *ingrandire* il parco pubblico per i cittadini.
  Der Bürgermeister hat beschlossen, den Stadtpark für die Bürger zu *erweitern*.
  
  Immagino che tu voglia *ingrandire* il tuo appartamento, ma non è facile trovare una casa più grande in questa zona.
  Ich nehme an, du möchtest deine Wohnung *vergrößern*, aber es ist nicht leicht, in diesem Viertel eine größere Wohnung zu finden.
  
  Senza permesso non potrai *ingrandire* il tuo ufficio oltre questo limite.
  Ohne Genehmigung darfst du dein Büro nicht über diese Grenze hinaus *erweitern*.
  
  Se avessi più soldi, avrei *inggrandito* la mia collezione di vinili molto prima.
  Wenn ich mehr Geld hätte, hätte ich meine Schallplattensammlung schon viel früher *vergrößert*.
