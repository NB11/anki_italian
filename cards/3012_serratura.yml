Beispielsätze: |-
  La *serratura* della porta era molto vecchia e difficile da aprire.
  Das *Schloss* der Tür war sehr alt und schwer zu öffnen.
  
  Se hai perso le chiavi, forse dovremmo chiamare un fabbro per aprire la *serratura*.
  Wenn du die Schlüssel verloren hast, sollten wir vielleicht einen Schlüsseldienst rufen, um das *Schloss* zu öffnen.
  
  Ho fatto sostituire la *serratura* perché era troppo usurata per funzionare bene.
  Ich habe das *Schloss* austauschen lassen, weil es zu abgenutzt war, um richtig zu funktionieren.
  
  La polizia ha trovato segni di scasso sulla *serratura* del negozio.
  Die Polizei hat Spuren eines Einbruchs am *Schloss* des Ladens gefunden.
  
  Vorrei una *serratura* digitale per la mia nuova casa, così da poterla controllare anche da lontano.
  Ich möchte ein *digitales Schloss* für mein neues Haus, damit ich es auch von unterwegs steuern kann.
