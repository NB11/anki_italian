Rang: 2988
Wort: cecchino
Wortart: n.m
Wort mit Artikel: il cecchino
Femininum / Plural: cecchini
IPA: ''
Definition: der Scharfschütze, -n
Register: ''
Beispielsätze: |-
  Il *cecchino* rimase immobile dietro il cespuglio per ore, aspettando il momento giusto.
  Der *Scharfschütze* blieb stundenlang regungslos hinter dem Busch und wartete auf den richtigen Moment.
  
  Ho letto un articolo che parlava di un *cecchino* che riuscì a colpire un bersaglio a due chilometri di distanza.
  Ich habe einen Artikel über einen *Scharfschützen* gelesen, der ein Ziel auf zwei Kilometer Entfernung traf.
  
  Se fossi stato un *cecchino*, avrei scelto una posizione più elevata per avere una visuale migliore.
  Wenn ich ein *Scharfschütze* gewesen wäre, hätte ich mir eine höhere Position gesucht, um einen besseren Blick zu haben.
  
  Il poliziotto che ha arrestato il *cecchino* è stato applaudito dalla popolazione locale.
  Der Polizist, der den *Scharfschützen* festnahm, wurde von der örtlichen Bevölkerung gefeiert.
  
  Nonostante il *cecchino* fosse ben nascosto, le sue impronte digitali vennero trovate sul fucile usato nel massacro.
  Trotz der Deckung des *Scharfschützen* wurden seine Fingerabdrücke auf dem Gewehr gefunden, das beim Massaker benutzt worden war.
