Rang: 1742
Wort: armato
Wortart: adj
Wort mit Artikel: armato
Femininum / Plural: armati (m.), armate (f.)
IPA: ''
Definition: bewaffnet
Register: ''
Beispielsätze: |-
  Il militare era *armato* di un fucile quando è arrivato alla base.
  Der Soldat war mit einem Gewehr *bewaffnet*, als er auf der Basis ankam.
  
  Nonostante fosse *armato*, decise di non usare la pistola per risolvere il conflitto.
  Obwohl er *bewaffnet* war, beschloss er, die Pistole nicht zu benutzen, um den Konflikt zu lösen.
  
  I due uomini erano *armati* e si affrontarono in una situazione molto tesa.
  Die beiden Männer waren *bewaffnet* und standen sich in einer sehr angespannten Situation gegenüber.
  
  Se fossi *armato*, non esiterei a difendere me stesso e la mia famiglia.
  Wenn ich *bewaffnet* wäre, würde ich nicht zögern, mich und meine Familie zu verteidigen.
  
  La polizia ha trovato un documento che dimostra che il sospetto era *armato* durante il fatto.
  Die Polizei hat ein Dokument gefunden, das belegt, dass der Verdächtige während der Tat *bewaffnet* war.
