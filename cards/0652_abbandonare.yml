Rang: 652
Wort: abbandonare
Wortart: vt
Wort mit Artikel: abbandonare
Femininum / Plural: ''
IPA: ''
Definition: verlassen, aufgeben, hinterlassen
Register: ''
Beispielsätze: |-
  Se non *abbandoni* questa abitudine, non perderai mai il dolore alla schiena.
  Wenn du diese Gewohnheit nicht *aufgibst*, wirst du den Schmerz im Rücken nicht los.
  
  Lui ha *abbandonato* la relazione senza dare spiegazioni.
  Er hat die *Beziehung* einfach aufgegeben, ohne Erklärungen zu geben.
  
  Mi dispiace, ma devo *abbandonare* questo negozio: ho fame e ho fretta!
  Es tut mir leid, aber ich muss dieses *Geschäft* verlassen: Ich habe Hunger und es eilt!
  
  Secondo il detective, l’uomo potrebbe aver *abbandonato* la posizione vicino al crimine.
  Laut dem Detektiv könnte der Mann seine *Position* in der Nähe des Verbrechens aufgegeben haben.
  
  Se *abbandoni* i tuoi sogni, chi altro li realizzerà?
  Wenn du deine Träume *aufgibst*, wer soll sie dann sonst verwirklichen?
