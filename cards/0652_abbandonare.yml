Beispielsätze: |-
  Non vorresti *abbandonare* questo progetto così presto?
  Möchtest du dieses Projekt nicht so schnell *aufgeben*?
  
  Marco ha *abbandonato* gli studi al terzo anno.
  Marco hat das Studium im dritten Jahr *aufgegeben*.
  
  Se non studi, *abbandonerai* la scuola presto.
  Wenn du nicht lernst, wirst du die Schule bald *aufgeben*.
  
  Vor anni lei aveva *abbandonato* la sua casa in campagna.
  Vor Jahren hatte sie ihr Haus auf dem Land *aufgegeben*.
  
  Spero che non *abbandonerai* i tuoi amici in questa situazione difficile.
  Ich hoffe, dass du deine Freunde in dieser schwierigen Situation nicht *verlässt*.
