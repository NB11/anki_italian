Rang: 4321
Wort: impaziente
Wortart: adj
Wort mit Artikel: impaziente
Femininum / Plural: ''
IPA: ''
Definition: ungeduldig, ungeduldig sein
Register: ''
Beispielsätze: |-
  Siamo *impazienti* di partire per le ferie estive.
  Wir sind *ungeduldig* auf die Sommerferien.
  
  Se fossi al suo posto, non sarei così *impaziente* con i bambini.
  Wenn ich an seiner Stelle wäre, wäre ich nicht so *ungeduldig* mit den Kindern.
  
  Nonostante la sua *impazienza*, ha atteso il suo turno con grande disciplina.
  Trotz seiner *Ungeduld* wartete er mit großer Disziplin an.
  
  Quando sentì che la risposta sarebbe arrivata solo dopo un mese, divenne *impaziente* e decise di chiedere personalmente.
  Als er hörte, dass die Antwort erst nach einem Monat kommen würde, wurde er *ungeduldig* und beschloss, persönlich nachzufragen.
  
  È *impaziente* perché il suo treno parte tra appena cinque minuti.
  Er ist *ungeduldig*, weil sein Zug in gerade fünf Minuten abfährt.
