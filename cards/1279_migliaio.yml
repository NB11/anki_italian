Rang: 1279
Wort: migliaio
Wortart: n.m
Wort mit Artikel: il migliaio
Femininum / Plural: migliaia
IPA: ''
Definition: die Tausend, tausend
Register: ''
Beispielsätze: |-
  In questa città ci sono *migliaia* di turisti ogni estate.
  In dieser Stadt gibt es *Tausende* von Touristen jeden Sommer.
  
  Ho un *migliaio* di cose da fare oggi, quindi non posso uscire.
  Ich habe *tausend* Dinge zu erledigen heute, also kann ich nicht ausgehen.
  
  Era convinto che il *migliaio* di euro che aveva speso fosse un buon investimento.
  Er war überzeugt, dass die *tausend* Euro, die er ausgegeben hatte, eine gute Investition waren.
  
  Nonostante *migliaia* di problemi, riuscì a portare a termine il progetto.
  Trotz *Tausender* von Problemen schaffte er es, das Projekt abzuschließen.
  
  Aveva risparmiato *migliaia* di dollari, ma decise di investirli nell’uso di energie rinnovabili.
  Er hatte *tausende* von Dollar gespart, aber beschloss, sie in den Gebrauch erneuerbarer Energien zu investieren.
