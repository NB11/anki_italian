Rang: 579
Wort: ricerca
Wortart: n.f
Wort mit Artikel: la ricerca
Femininum / Plural: ricerche
IPA: ''
Definition: die Forschung, -en, die Suche
Register: ''
Beispielsätze: |-
  La *ricerca* scientifica richiede molti anni di studio e pazienza.
  Die *Forschung* erfordert viele Jahre des Studiums und Geduld.
  
  Mi hanno detto che la *ricerca* di tuo fratello è finalmente terminata con successo.
  Man hat mir gesagt, dass die *Suche* deines Bruders endlich erfolgreich beendet wurde.
  
  Nonostante i guai finanziari, lui continua la *ricerca* sulla medicina.
  Trotz der finanziellen *Probleme* setzt er die Forschung an der Medizin fort.
  
  In questa biblioteca ci sono oltre cinquemila volumi di *ricerca* storica.
  In dieser Bibliothek gibt es über fünftausend Bände zur historischen *Forschung*.
  
  La *ricerca* dell’oro nel fiume ha portato a molti incidenti strani.
  Die *Suche* nach Gold im Fluss hat zu vielen seltsamen Vorfällen geführt.
