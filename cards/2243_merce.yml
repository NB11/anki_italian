Rang: 2243
Wort: merce
Wortart: n.f
Wort mit Artikel: la merce
Femininum / Plural: merci
IPA: ''
Definition: die Ware, -n, die Güter
Register: ''
Beispielsätze: |-
  Il commerciante ha ricevuto un ordine per cento unità della *merce* richiesta.
  Der Händler hat einen Auftrag für hundert Einheiten der *Ware* erhalten.
  
  La *merce* danneggiata è stata sostituita dal venditore senza problemi.
  Die *Güter* wurden vom Verkäufer problemlos ersetzt.
  
  Prima di spedire, controlla se la *merce* corrisponde all'ordine.
  Bevor du versendest, prüfe, ob die *Ware* der Bestellung entspricht.
  
  La dogana ha sequestrato la *merce* perché non erano state dichiarate correttamente.
  Der Zoll hat die *Ware* beschlagnahmt, weil sie nicht korrekt deklariert worden waren.
  
  Hanno trovato un carico di *merce* contraffatta nel container.
  Sie haben eine Ladung mit *falschen Waren* im Container gefunden.
