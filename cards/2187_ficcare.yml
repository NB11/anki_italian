Rang: 2187
Wort: ficcare
Wortart: vt
Wort mit Artikel: ficcare
Femininum / Plural: ''
IPA: ''
Definition: stecken, einführen
Register: ''
Beispielsätze: |-
  Non *ficcare* le dita nella presa elettrica, che è pericoloso!
  Steck bitte deine Finger nicht in die Steckdose, das ist gefährlich!
  
  Il ladro ha cercato di *ficcare* la chiave falsa nella serratura, ma è fallito.
  Der Dieb versuchte, den falschen Schlüssel *einzuführen*, aber es misslang.
  
  Se *ficcherai* troppo la mano nel forno, ti scotterai.
  Wenn du deine Hand zu tief in den Ofen *steckst*, wirst du dich verbrennen.
  
  Ha *ficcato* il libro nello zaino senza nemmeno guardare il titolo.
  Er hat das Buch einfach in den Rucksack *gesteckt*, ohne den Titel anzusehen.
  
  Spero che nessuno *ficchi* il naso nei miei affari privati!
  Ich hoffe, dass niemand seine Nase in meine privaten Angelegenheiten *steckt*!
Audio: ''
Notiz: ''
