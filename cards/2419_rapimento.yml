Rang: 2419
Wort: rapimento
Wortart: n.m
Wort mit Artikel: il rapimento
Femininum / Plural: rapimenti
IPA: ''
Definition: die Entführung, -en
Register: ''
Beispielsätze: |-
  I *rapimenti* di persona sono purtroppo una realtà in alcune zone del mondo.
  Die *Entführungen* von Personen sind leider in manchen Regionen der Welt Realität.
  
  Denunciarono il *rapimento* del figlio da parte di sconosciuti.
  Sie zeigten die *Entführung* des Sohnes durch Unbekannte an.
  
  Se non pagherai, minaccio di organizzare un altro *rapimento*, capito?
  Wenn du nicht bezahlst, drohe ich, eine weitere *Entführung* zu organisieren, verstanden?
  
  Il commissario sospetta che dietro il *rapimento* ci sia un'organizzazione criminale.
  Der Kommissar vermutet, dass hinter der *Entführung* eine kriminelle Organisation steckt.
  
  Molti film raccontano di *rapimenti* a scopo di riscatto economico.
  Viele Filme erzählen von *Entführungen* zu Lösegeldzwecken.
