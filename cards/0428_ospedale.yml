  Du solltest *ins Krankenhaus* gehen, wenn du hohes Fieber hast.
  
  Questo *ospedale* è specializzato in cardiologia.
  Dieses *Krankenhaus* ist auf Kardiologie spezialisiert.
  
  Gli infermieri lavorano ogni giorno *in ospedale*.
  Die Krankenpfleger arbeiten jeden Tag *im Krankenhaus*.
