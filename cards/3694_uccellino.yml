Beispielsätze: |-
  L'*uccellino* cantava felicemente sulla finestra stamattina.
  Der kleine Vogel sang heute Morgen fröhlich am Fenster.
  
  Ho visto un *uccellino* giallo che volava nel parco.
  Ich habe einen kleinen gelben Vogel gesehen, der im Park flog.
  
  Se avessi tempo, comprerei un *uccellino* per il mio balcone.
  Wenn ich Zeit hätte, würde ich mir einen kleinen Vogel für meinen Balkon kaufen.
  
  L'*uccellino* che ho trovato al parco era ferito e l'ho portato a casa.
  Der kleine Vogel, den ich im Park gefunden habe, war verletzt und ich habe ihn mit nach Hause genommen.
  
  Mentre passeggiavo, un *uccellino* si è posato sulla mia spalla per un attimo.
  Während ich spazierte, setzte sich ein kleiner Vogel für einen Moment auf meine Schulter.
