Rang: 2367
Wort: scadere
Wortart: vi
Wort mit Artikel: scadere
Femininum / Plural: ''
IPA: ''
Definition: ablaufen, verfallen
Register: ''
Beispielsätze: |-
  Il latte nel frigo è *scaduto* ieri.
  Die Milch im Kühlschrank ist *abgelaufen*.
  
  Ho paura che il mio visto stia per *scadere* tra due settimane.
  Ich habe Angst, dass mein Visum in zwei Wochen *verfällt*.
  
  Se il tuo abbonamento non *scade* entro la fine del mese, dovrai pagare una multa.
  Wenn dein Abo bis Monatsende nicht *abläuft*, musst du eine Strafe zahlen.
  
  Era necessario controllare tutte le date perché nessuno voleva che i documenti *scadessero* all'improvviso.
  Man musste alle Daten prüfen, weil niemand wollte, dass die Dokumente plötzlich *verfallen*.
  
  Appena ho visto la data sul barattolo di conserve, ho capito che non potevo più mangiarle – erano *scadute* da mesi!
  Sobald ich das Datum auf dem Glas gesehen habe, wusste ich, dass ich es nicht mehr essen konnte – es war seit Monaten *abgelaufen*.
