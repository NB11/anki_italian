Rang: 772
Wort: pena
Wortart: n.f
Wort mit Artikel: la pena
Femininum / Plural: pene
IPA: ''
Definition: die Strafe, -n; der Schmerz, -en
Register: ''
Beispielsätze: |-
  Dopo il furto, il giudice ha dato *pena* di due anni di reclusione al ladro.
  Nach dem Diebstahl hat der Richter eine *Strafe* von zwei Jahren Gefängnis verhängt.
  
  Nonostante la *pena* che provava, cercava di restare calmo in pubblico.
  Trotz der *Schmerzen*, die er spürte, versuchte er, in der Öffentlichkeit ruhig zu bleiben.
  
  Se non rispetti le regole, la *pena* sarà immediata!
  Falls du die Regeln nicht beachtest, wird die *Strafe* unverzüglich sein!
  
  La *pena* che sentiva per la perdita dell’amico era troppo grande per essere ignorata.
  Der *Schmerz*, den er wegen des Verlusts seines Freundes fühlte, war zu groß, um ignoriert zu werden.
  
  Nonostante *pena* di morte sia ancora in vigore in alcuni paesi, molti sostengono la sua abolizione.
  Obwohl die *Todesstrafe* in einigen Ländern noch in Kraft ist, fordern viele ihre Abschaffung.
