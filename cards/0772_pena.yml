Rang: 772
Wort: pena
Wortart: n.f
Wort mit Artikel: la pena
Femininum / Plural: pene
IPA: ''
Definition: die Strafe, -n, die Mühe
Register: ''
Beispielsätze: |-
  La *pena* per il reato è stata molto severa.
  Die *Strafe* für das Verbrechen war sehr hart.
  
  Con *pena* ti dico che non possiamo venire.
  Mit *Mühe* sage ich dir, dass wir nicht kommen können.
  
  Avete pagato la *pena* di sosta?
  Habt ihr die *Strafe* fürs Parken bezahlt?
  
  Non valeva la *pena* lavorare così tanto.
  Es hat sich nicht *gelohnt*, so viel zu arbeiten.
  
  Chi decide la *pena* per un omicidio?
  Wer entscheidet über die *Strafe* für einen Mord?
