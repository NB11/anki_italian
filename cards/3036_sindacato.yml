Rang: 3036
Wort: sindacato
Wortart: n.m
Wort mit Artikel: il sindacato
Femininum / Plural: sindacati
IPA: ''
Definition: die Gewerkschaft, -en
Register: ''
Beispielsätze: |-
  Il *sindacato* dei lavoratori ha organizzato uno sciopero per protestare contro i licenziamenti.
  Die *Gewerkschaft* der Arbeiter hat einen Streik organisiert, um gegen die Entlassungen zu protestieren.
  
  Ho sentito che il *sindacato* ha vinto una causa importante per i diritti dei dipendenti.
  Ich habe gehört, dass die *Gewerkschaft* einen wichtigen Fall für die Rechte der Angestellten gewonnen hat.
  
  Se non fosse per il *sindacato*, molte condizioni di lavoro sarebbero ancora peggiori.
  Wenn es die *Gewerkschaft* nicht gäbe, wären viele Arbeitsbedingungen noch schlimmer.
  
  Il *sindacato* locale sta raccogliendo firme per chiedere aumenti salariali.
  Die örtliche *Gewerkschaft* sammelt Unterschriften, um Lohnerhöhungen zu fordern.
  
  Non tutti i lavoratori vogliono unirsi al *sindacato*, ma molti lo appoggiano.
  Nicht alle Arbeiter wollen der *Gewerkschaft* beitreten, aber viele unterstützen sie.
