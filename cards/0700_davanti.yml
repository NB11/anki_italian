Rang: 700
Wort: davanti
Wortart: adv
Wort mit Artikel: davanti
Femininum / Plural: ''
IPA: ''
Definition: vorne, vorder
Register: ''
Beispielsätze: |-
  Il negozio si trova *davanti* alla chiesa, quindi è molto facile da trovare.
  Das Geschäft befindet sich *vorne* an der Kirche, also ist es sehr leicht zu finden.
  
  Spero che tu non debba affrontare questa decisione *davanti* a tutti gli invitati.
  Ich hoffe, dass du diese *Entscheidung* nicht vor allen Gästen treffen musst.
  
  Mentre camminavo *davanti* al bar, ho notato che qualcuno aveva bruciato una coperta sul marciapiede.
  Während ich *vorne* an der Bar vorbeiging, bemerkte ich, dass jemand eine Decke auf dem Gehweg verbrannt hatte.
  
  Per quanto tu lo vesta di nuovo, quell’idiota continuerà a calpestare le scarpe *davanti* all’ingresso.
  Egal wie sehr du ihn neu anziehst, dieser Idiot wird die Schuhe *vorne* am Eingang weiterhin zertreten.
  
  Il medico ordinò di coprire la ferita *davanti* e di evitare movimenti bruschi.
  Der Arzt verfügte, die Wunde *vorne* zu bedecken und plötzliche Bewegungen zu vermeiden.
