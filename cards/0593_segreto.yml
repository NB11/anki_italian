Rang: 593
Wort: segreto
Wortart: n.m
Wort mit Artikel: il segreto
Femininum / Plural: segreti
IPA: ''
Definition: das Geheimnis, -se
Register: ''
Beispielsätze: |-
  Ho un *segreto* da dirti, ma non puoi dirlo a nessuno.
  Ich habe ein *Geheimnis* für dich, aber du darfst es niemandem erzählen.
  
  Non mi piace quando qualcuno scopre i miei *segreti*.
  Ich mag es nicht, wenn jemand meine *Geheimnisse* errät.
  
  Quel luogo è pieno di *segreti* della storia antica.
  Dieser Ort ist voller *Geheimnisse* der alten Geschichte.
  
  Vuoi sapere qual è il mio *segreto* per imparare l’italiano?
  Möchtest du wissen, was mein *Geheimnis* ist, um Italienisch zu lernen?
  
  Tutti hanno dei *segreti*, anche le persone che sembrano trasparenti.
  Jeder hat *Geheimnisse*, auch die Menschen, die transparent wirken.
