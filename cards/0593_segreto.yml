Rang: 593
Wort: segreto
Wortart: n.m
Wort mit Artikel: il segreto
Femininum / Plural: segreti
IPA: ''
Definition: das Geheimnis, -se
Register: ''
Beispielsätze: |-
  Non *segreto* di Stato deve essere diffuso pubblicamente senza autorizzazione.
  Kein *Staatsgeheimnis* darf ohne Erlaubnis veröffentlicht werden.
  
  Dicono che abbia un *segreto* per vivere fino a cento anni, ma nessuno lo sa per certo.
  Sie sagen, er habe ein *Geheimnis*, um hundert Jahre zu leben, aber niemand weiß es genau.
  
  Se avessi saputo il *segreto* del suo successo, lo avrei usato anch’io!
  Wenn ich das *Geheimnis* seines Erfolgs gekannt hätte, hätte ich es auch genutzt!
  
  Prima di partire, mi ha confidato un *segreto* che mi ha fatto sorridere.
  Bevor er ging, vertraute er mir ein *Geheimnis* an, das mich zum Lächeln brachte.
  
  Il *segreto* della felicità non esiste, semplicemente bisogna viverla giorno per giorno.
  Das *Geheimnis* des Glücks gibt es nicht – man muss es einfach Tag für Tag leben.
