Rang: 4758
Wort: cappella
Wortart: n.f
Wort mit Artikel: la cappella
Femininum / Plural: cappelle
IPA: ''
Definition: die Kapelle, -n
Register: ''
Beispielsätze: |-
  La *cappella* del castello è famosa per i suoi affreschi del Quattrocento.
  Die *Kapelle* der Burg ist berühmt für ihre Fresken aus dem 15. Jahrhundert.
  
  Ho visitato una *cappella* isolata in mezzo ai boschi durante la mia escursione.
  Ich habe eine *Kapelle* mitten im Wald während meiner Wanderung besucht.
  
  La *cappella* principale della cattedrale ospita le spoglie di un santo molto venerato.
  Die Haupt-*Kapelle* des Doms beherbergt die Gebeine eines hochverehrten Heiligen.
  
  Durante la messa, tutti si sono radunati nella piccola *cappella* laterale.
  Während der Messe haben sich alle in der kleinen Seiten-*Kapelle* versammelt.
  
  Non appena ho varcato la porta, ho sentito la pace che emanava dalla *cappella* silenziosa.
  Sobald ich die Tür betrat, spürte ich den Frieden, der von der stillen *Kapelle* ausging.
