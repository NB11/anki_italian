Rang: 1792
Wort: custodia
Wortart: n.f
Wort mit Artikel: la custodia
Femininum / Plural: custodie
IPA: ''
Definition: die Aufbewahrung, die Hülle, die Verwahrung
Register: ''
Beispielsätze: |-
  Ho trovato una *custodia* per il telefono nella borsa.
  Ich habe eine *Hülle* für das Handy in der Tasche gefunden.
  
  La *custodia* dei documenti è fondamentale in banca.
  Die *Aufbewahrung* der Dokumente ist in der Bank von entscheidender Bedeutung.
  
  Non lasciare la *custodia* della macchina fotografica in macchina!
  Lass die *Hülle* der Kamera nicht im Auto!
  
  Abbiamo acquistato una *custodia* per la chitarra elettrica ieri.
  Wir haben gestern eine *Hülle* für die E-Gitarre gekauft.
  
  La *custodia* dei dati personali è protetta da password.
  Die *Verwahrung* der persönlichen Daten wird durch Passwörter geschützt.
