Rang: 1018
Wort: curare
Wortart: vt
Wort mit Artikel: curare
Femininum / Plural: ''
IPA: ''
Definition: heilen, behandeln, pflegen
Register: ''
Beispielsätze: |-
  Il *curare* delle ferite richiede pazienza e attenzione ai dettagli.
  Das *Heilen* von Wunden erfordert Geduld und Aufmerksamkeit für Details.
  
  Se avessi saputo prima, avrei *curato* meglio la faccenda.
  Wenn ich es früher gewusst hätte, hätte ich die Angelegenheit besser *behandelt*.
  
  I medici cercano di *curare* ogni malattia con metodi innovativi.
  Ärzte versuchen, jede Krankheit mit innovativen Methoden zu *heilen*.
  
  Nonostante il *curare* tempestivo, il paziente ha perso il colloquio di lavoro.
  Trotz der rechtzeitigen *Behandlung* hat der Patient das Vorstellungsgespräch verloren.
  
  Secondo le statistiche, chi *cura* bene i denti evita visite lunghe dal dentista.
  Laut Statistiken vermeidet, wer seine Zähne gut *pflegt*, lange Besuche beim Zahnarzt.
