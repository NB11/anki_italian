Rang: 935
Wort: fumare
Wortart: v
Wort mit Artikel: fumare
Femininum / Plural: ''
IPA: ''
Definition: rauchen
Register: ''
Beispielsätze: |-
  Non *fumare* in questo edificio chiuso, per favore!
  Rauche bitte nicht in diesem *geschlossenen* Gebäude.
  
  Ha smesso di *fumare* perché il medico gli ha detto che gli fa male.
  Er hat aufgehört zu *rauchen*, weil der Arzt ihm gesagt hat, dass es ihm schadet.
  
  Se *fumerai* troppo, rischi di ammalarti gravemente.
  Wenn du zu viel *rauchst*, riskierst du, schwer zu erkranken.
  
  Vorrei che tu non *fumassi* così spesso in questo ufficio.
  Ich wünschte, du würdest in diesem Büro nicht so oft *rauchen*.
  
  Appena arrivato all'hotel, ho visto alcuni membri della coppia che *fumavano* sul balcone.
  Kaum im *Hotel* angekommen, sah ich einige Mitglieder des Paares, die auf dem Balkon rauchten.
