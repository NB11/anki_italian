Rang: 4345
Wort: acquisire
Wortart: vt
Wort mit Artikel: acquisire
Femininum / Plural: ''
IPA: ''
Definition: erwerben, erlangen, gewinnen
Register: ''
Beispielsätze: |-
  Se vuoi *acquisire* una nuova lingua, devi studiare regolarmente.
  Wenn du *erlernen* willst, musst du regelmäßig üben.
  
  Hanno *acquisito* molti terreni negli ultimi anni per espandere l'azienda.
  Sie haben viele Grundstücke in den letzten Jahren *erworben*, um das Unternehmen zu erweitern.
  
  Si dice che un buon leader debba *acquisire* fiducia, non solo autorità.
  Man sagt, ein guter Anführer müsse *erwerben* Vertrauen, nicht nur Autorität.
  
  Nonostante le difficoltà, sono riusciti a *acquisire* il controllo della situazione.
  Trotz der Schwierigkeiten gelang es ihnen, *die Kontrolle* über die Situation zu gewinnen.
  
  Per *acquisire* questa certificazione, dovrai superare un esame molto complesso.
  Um diese Zertifizierung zu *erlangen*, wirst du eine sehr komplexe Prüfung bestehen müssen.
