Rang: 1591
Wort: attentare
Wortart: v
Wort mit Artikel: attentare
Femininum / Plural: ''
IPA: ''
Definition: versuchen zu töten, einen Anschlag verüben
Register: ''
Beispielsätze: |-
  Qualcuno ha tentato *attentato* contro il primo ministro ieri sera.
  Jemand hat einen *Anschlag* auf den Ministerpräsidenten gestern Abend versucht.
  
  Non puoi *attentare* alla sua vita solo perché ti ha offeso!
  Du kannst doch nicht auf sein *Leben* einen Anschlag verüben, nur weil er dich beleidigt hat!
  
  La polizia ha scoperto chi aveva *attentato* alla sede del partito.
  Die Polizei hat herausgefunden, wer einen *Anschlag* auf den Sitz der Partei verübt hatte.
  
  Se *attenterai* a qualcuno, andrai dritto in galera.
  Wenn du auf jemanden einen *Anschlag* verübst, landest du direkt im Gefängnis.
  
  Era un *attentato* folle, ma per fortuna non ci furono vittime.
  Es war ein wahnsinniger *Anschlag*, aber zum Glück gab es keine Opfer.
Audio: ''
Notiz: ''
Dispersion: ''
