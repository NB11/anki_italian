Rang: 2582
Wort: perquisire
Wortart: vt
Wort mit Artikel: perquisire
Femininum / Plural: ''
IPA: ''
Definition: durchsuchen, durchwühlen
Register: ''
Beispielsätze: |-
  La polizia ha dovuto *perquisire* l’appartamento per trovare le prove.
  Die Polizei musste die Wohnung *durchsuchen*, um die Beweise zu finden.
  
  Prima di partire, controlla che nessuno abbia bisogno di *perquisire* le valigie.
  Bevor ihr losfahrt, prüft, ob jemand die Koffer *durchwühlen* muss.
  
  Se avessi un mandato, potrei *perquisire* ogni stanza di questa casa.
  Wenn ich einen Durchsuchungsbefehl hätte, könnte ich jeden Raum dieses Hauses *durchsuchen*.
  
  Hanno *perquisito* l’intero edificio alla ricerca di armi nascoste.
  Sie haben das gesamte Gebäude nach versteckten Waffen *durchsucht*.
  
  Non capisco perché vogliano *perquisire* proprio la mia scrivania!
  Ich verstehe nicht, warum sie ausgerechnet meinen Schreibtisch *durchwühlen* wollen!.
