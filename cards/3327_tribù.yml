Rang: 3327
Wort: tribù
Wortart: n.f
Wort mit Artikel: la tribù
Femininum / Plural: tribù
IPA: ''
Definition: der Stamm, -Stämme
Register: ''
Beispielsätze: |-
  La *tribù* degli Apache era nota per la sua abilità nella caccia.
  Der *Stamm* der Apache war für sein Jagdgeschick bekannt.
  
  Le antiche *tribù* africane vivevano in armonia con la natura.
  Die alten afrikanischen *Stämme* lebten im Einklang mit der Natur.
  
  Nonostante le differenze, la nostra *tribù* ha sempre collaborato con la lega locale.
  Trotz der Unterschiede hat unser *Stamm* immer mit der hiesigen Liga zusammengearbeitet.
  
  Dicono che la *tribù* misteriosa abbia inciso profondamente sulla cultura del posto.
  Man sagt, der geheimnisvolle *Stamm* habe die Kultur des Ortes tief geprägt.
  
  Se vuoi davvero capire la loro *tribù*, devi conviverci per un po’ di tempo.
  Wenn du ihren *Stamm* wirklich verstehen willst, musst du eine Weile mit ihnen zusammenleben.
