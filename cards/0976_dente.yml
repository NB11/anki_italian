Rang: 976
Wort: dente
Wortart: n.m
Wort mit Artikel: il dente
Femininum / Plural: denti
IPA: ''
Definition: der Zahn, -e
Register: ''
Beispielsätze: |-
  Quando *dente* del giudizio mi fa male, devo andare dal dentista.
  Wenn mein *Zahn* (der Weisheitszahn) wehtut, muss ich zum Zahnarzt gehen.
  
  Ieri ho trovato un *dente* di squalo sulla spiaggia mentre passeggiavo.
  Gestern habe ich während meines Spaziergangs einen *Haizahn* am Strand gefunden.
  
  Nonostante il dolore, si rifiuta di farsi togliere il *dente* cariato.
  Obwohl es wehtut, weigert er sich, sich den *faulen Zahn* ziehen zu lassen.
  
  Se ti fa male un *dente* durante la notte, prendi un antidolorifico e chiama il dentista domani mattina.
  Wenn dir nachts ein *Zahn* wehtut, nimm ein Schmerzmittel und rufe morgen früh den Zahnarzt an.
  
  Il dentista ha detto che devo fissare un appuntamento per curare un *dente* che si muove.
  Der Zahnarzt sagte, ich müsse einen Termin vereinbaren, um einen *lockeren Zahn* behandeln zu lassen.
