Rang: 1657
Wort: amante
Wortart: n.m
Wort mit Artikel: l'amante
Femininum / Plural: gli amanti
IPA: ''
Definition: der Liebhaber, - / die ***-in, -nen
Register: ''
Beispielsätze: |-
  Non sapevo che avesse un *amante* all’insaputa della moglie.
  Ich wusste nicht, dass er *eine Geliebte* ohne das Wissen seiner Frau hatte.
  
  Quell’uomo è stato ucciso perché la moglie scoprì il suo *amante*.
  Jener Mann wurde getötet, weil seine Frau ihren *Geliebten* entdeckte.
  
  Si dice che il *amante* di questa storia sia ispirato a un personaggio reale.
  Man sagt, der *Liebhaber* dieser Geschichte sei von einer realen Person inspiriert.
  
  Anche se il loro rapporto è complicato, non vuole rinunciare al suo *amante*.
  Auch wenn ihre Beziehung kompliziert ist, will sie auf ihren *Geliebten* nicht verzichten.
  
  Il *amante* non si presentò alla funzione in chiesa perché era in crisi.
  Der *Geliebte* erschien nicht zur Funktion in der Kirche, weil er in einer Krise steckte.
