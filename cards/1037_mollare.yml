Rang: 1037
Wort: mollare
Wortart: v
Wort mit Artikel: mollare
Femininum / Plural: ''
IPA: ''
Definition: loslassen, aufgeben, verlassen
Register: ''
Beispielsätze: |-
  Non *mollare* mai la presa finché non sei sicuro di avere un appiglio sicuro.
  Gib *niemals* den Griff auf, bis du sicher bist, einen sicheren Halt zu haben.
  
  Se *molli* il tuo lavoro ora, perderai ogni possibilità di carriera.
  Wenn du deine Karriere jetzt *aufgebst*, verlierst du jede Chance auf eine Laufbahn.
  
  Dopo anni di battaglia, lui ha deciso di *mollare* tutto e partire per un’isola remota.
  Nach Jahren des *Kampfes* hat er beschlossen, alles aufzugeben und auf eine abgelegene Insel zu ziehen.
  
  Non *mollare* la bob finché non te lo dico io!
  Lass die *Puppe* los, bis ich es dir sage!
  
  Hai già *mollato* il tuo collo in quella situazione? Non sembri più così sicuro.
  Hast du etwa schon den *Hals* in dieser Angelegenheit riskiert? Du wirkst gar nicht mehr so überzeugt.
