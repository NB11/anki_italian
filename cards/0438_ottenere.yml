Wort: ottenere
Wortart: vt
Wort mit Artikel: ottenere
Femininum / Plural: ''
IPA: ''
Definition: erhalten, bekommen, erreichen
Register: ''
Beispielsätze: |-
  Vorrei *ottenere* il tuo aiuto per questo progetto.
  Ich möchte *deine Hilfe* für dieses Projekt *erhalten*.
  
  Ha *ottenuto* ottimi risultati agli esami.
  Er hat *ausgezeichnete Ergebnisse* in den Prüfungen *erhalten*.
  
  Per *ottenere* il visto, devi compilare molti documenti.
  Um *das Visum zu erhalten*, musst du viele Dokumente ausfüllen.
  
  Spero di *ottenere* una promozione entro l'anno prossimo.
  Ich hoffe, bis nächstes Jahr *befördert zu werden*.
  
  Se avessi studiato di più, avresti *ottenuto* un voto migliore.
  Hättest du mehr gelernt, hättest du *eine bessere Note erhalten*.
