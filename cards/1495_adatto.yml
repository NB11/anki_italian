Rang: 1495
Wort: adatto
Wortart: adj
Wort mit Artikel: adatto
Femininum / Plural: ''
IPA: ''
Definition: geeignet, passend, angemessen
Register: ''
Beispielsätze: |-
  Questo libro è *adatto* a bambini di tutte le età.
  Dieses Buch ist für Kinder jeden Alters *geeignet*.
  
  Dopo aver analizzato la domanda, ho trovato la soluzione più *adatta* per risolvere il problema.
  Nach der Analyse der Frage habe ich die *passendste* Lösung gefunden, um das Problem zu lösen.
  
  Non era *adatta* alla posizione perché non aveva le competenze richieste, nonostante la sua esperienza.
  Sie war für die Position nicht *angemessen*, weil ihr die geforderten Fähigkeiten fehlten, trotz ihrer Erfahrung.
  
  Se avessi saputo che non eri *adatto* a questo lavoro, non ti avrei mai proposto la collaborazione.
  Wenn ich gewusst hätte, dass du für diese Arbeit nicht *geeignet* warst, hätte ich dir niemals die Zusammenarbeit vorgeschlagen.
  
  I vestiti che hai scelto non sono *adatti* a una riunione così formale: cambiali immediatamente!
  Die Kleidung, die du ausgewählt hast, ist für eine so formelle Besprechung nicht *passend*: Ändere sie sofort!
