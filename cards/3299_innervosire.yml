Rang: 3299
Wort: innervosire
Wortart: vt
Wort mit Artikel: innervosire
Femininum / Plural: ''
IPA: ''
Definition: nervös machen, ärgern
Register: ''
Beispielsätze: |-
  Se continui a fare rumore, mi *innervosirai* ancora di più!
  Wenn du weiterhin Lärm machst, wirst du mich noch *nervöser machen*.
  
  Era così teso che si *innervosiva* per un nonnulla.
  Er war so angespannt, dass er sich schon über eine Kleinigkeit *aufregte*.
  
  Non vorrei che questa notizia lo *innervosisse*, ma dobbiamo parlargliene.
  Ich möchte nicht, dass diese Nachricht ihn *aufregt*, aber wir müssen mit ihm darüber sprechen.
  
  Mi hanno detto che dovevo dirti la verità, perché altrimenti ti saresti *innervosito* ancora di più.
  Man hat mir gesagt, ich sollte dir die Wahrheit sagen, sonst hättest du dich noch mehr *aufgeregt*.
  
  Se fossi in te, non farei nulla che possa *innervosirlo*, è già abbastanza provato ultimamente.
  Wenn ich du wäre, würde ich nichts tun, was ihn *nervös machen* könnte – er ist in letzter Zeit schon genug belastet.
