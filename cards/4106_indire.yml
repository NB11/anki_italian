Rang: 4106
Wort: indire
Wortart: v
Wort mit Artikel: indire
Femininum / Plural: ''
IPA: ''
Definition: anordnen, befehlen
Register: ''
Beispielsätze: |-
  Il medico *indice* un esame urgente per il paziente.
  Der Arzt *ordnet* eine dringende Untersuchung für den Patienten an.
  
  La polizia *indisse* una conferenza stampa per chiarire l’accaduto.
  Die Polizei *ordnete* eine Pressekonferenz an, um den Vorfall zu klären.
  
  Se *indicherai* correttamente i punti critici, il progetto avrà successo.
  Wenn du die kritischen Punkte *richtig anordnest*, wird das Projekt erfolgreich sein.
  
  Il giudice *indice* una nuova udienza per domani mattina.
  Der Richter *ordnet* eine neue Verhandlung für morgen früh an.
  
  Vorrei sapere chi ha *indotto* questo cambiamento nelle procedure.
  Ich möchte wissen, wer diese Änderung in den Verfahren *veranlasst hat*.
