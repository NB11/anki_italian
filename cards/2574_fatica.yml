Rang: 2574
Wort: fatica
Wortart: n.f
Wort mit Artikel: la fatica
Femininum / Plural: fatiche
IPA: ''
Definition: die Anstrengung, -en, die Mühe
Register: ''
Beispielsätze: |-
  Dopo *fatica* per settimane, finalmente ho finito il mio romanzo.
  Nach *Anstrengung* für Wochen habe ich endlich meinen Roman beendet.
  
  Nonostante la *fatica* fisica, il guardiano continuò il suo percorso ogni giorno.
  Trotz der *Mühe* körperlicher Art setzte der Wächter seinen Weg jeden Tag fort.
  
  La *fatica* mentale dello studio può essere alleviata con una breve pausa al parco.
  Die *Anstrengung* geistiger Art des Lernens lässt sich mit einer kurzen Pause im Park lindern.
  
  Questa *fatica* non vale lo stipendio che ricevi!
  Diese *Mühe* lohnt sich nicht für das Gehalt, das du bekommst!
  
  Se avessi saputo tutta la *fatica* che comporta, non avrei mai intrapreso questo lavoro.
  Wenn ich die ganze *Anstrengung* gekannt hätte, die damit verbunden ist, hätte ich diese Arbeit nie begonnen.
