Rang: 4224
Wort: virtù
Wortart: n.f
Wort mit Artikel: la virtù
Femininum / Plural: virtù
IPA: ''
Definition: die Tugend, -en, die Tüchtigkeit
Register: ''
Beispielsätze: |-
  La *virtù* di Maria è la sua bontà con tutti, anche con gli sconosciuti.
  Die *Tugend* von Maria ist ihre Güte mit allen, sogar mit Fremden.
  
  In un mondo pieno di tentazioni, mantenere la *virtù* non è facile.
  In einer Welt voller *Versuchungen* ist es nicht einfach, die Tugend zu bewahren.
  
  Secondo la sua convinzione, la *virtù* si può allenare come un muscolo.
  Laut seiner *Überzeugung* kann man die Tugend wie einen Muskel trainieren.
  
  Lo scout che ho incontrato al campeggio era un uomo di grande *virtù*.
  Der *erfahrene* Mann, den ich beim Camping traf, war ein Mann von großer Tüchtigkeit.
  
  Le *virtù* del vino di questa cantina sono state celebrate in tutto il paese.
  Die *Tugenden* des Weins aus dieser Kellerei wurden im ganzen Land gefeiert.
