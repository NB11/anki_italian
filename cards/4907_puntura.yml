Rang: 4907
Wort: puntura
Wortart: n.f
Wort mit Artikel: la puntura
Femininum / Plural: punture
IPA: ''
Definition: der Stich, -e
Register: ''
Beispielsätze: |-
  Dopo la *puntura* del medico, mi sono sentito meglio.
  Nach dem *Einstich* des Arztes habe ich mich besser gefühlt.
  
  La sostanza iniettata provoca una *puntura* immediata.
  Der injizierte Stoff löst einen sofortigen *Stechen* aus.
  
  Anche se la *puntura* era dolorosa, ho preferito non gridare.
  Auch wenn der *Einstich* schmerzhaft war, habe ich es vorgezogen nicht zu schreien.
  
  Le api usano la loro *puntura* solo per difendersi.
  Bienen verwenden ihren *Stachel* nur zur Verteidigung.
  
  Quando il ragno morde, sente la *puntura* solo dopo qualche ora.
  Wenn die Spinne beißt, spürt man den *Biss* erst nach einigen Stunden.
