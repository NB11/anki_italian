Rang: 3598
Wort: contenitore
Wortart: n.m
Wort mit Artikel: il contenitore
Femininum / Plural: contenitori
IPA: ''
Definition: der Behälter, -
Register: ''
Beispielsätze: |-
  Ho comprato un *contenitore* di plastica per conservare gli avanzi.
  Ich habe einen *Behälter* aus Plastik gekauft, um die Reste aufzubewahren.
  
  Nel laboratorio ci sono diversi *contenitori* riempiti con reagenti chimici.
  Im Labor gibt es mehrere *Behälter*, die mit chemischen Reagenzien gefüllt sind.
  
  Non trovare il *contenitore* giusto mi ha fatto perdere mezz’ora di tempo!
  Dass ich den richtigen *Behälter* nicht gefunden habe, hat mich eine halbe Stunde Zeit kosten lassen!
  
  Spero che questo *contenitore* sia abbastanza resistente da sopportare il viaggio.
  Ich hoffe, dass dieser *Behälter* stabil genug ist, um die Reise zu überstehen.
  
  Dopo aver usato il *contenitore* per gli alimenti, l’ho lavato accuratamente sotto l’acqua corrente.
  Nachdem ich den *Behälter* für Lebensmittel benutzt hatte, habe ich ihn gründlich unter fließendem Wasser gewaschen.
