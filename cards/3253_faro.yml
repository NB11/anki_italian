Rang: 3253
Wort: faro
Wortart: n.m
Wort mit Artikel: il faro
Femininum / Plural: fari
IPA: ''
Definition: der Leuchtturm, -e
Register: ''
Beispielsätze: |-
  Dall’alto del *faro* si vede tutto il porto.
  Vom Gipfel des *Leuchtturms* sieht man den ganzen Hafen.
  
  I *fari* della costa segnalano ai naviganti i pericoli.
  Die *Leuchttürme* an der Küste warnen die Schiffer vor Gefahren.
  
  Anche se il *faro* si è spento, molti turisti vengono a visitarlo.
  Selbst wenn der *Leuchtturm* nicht mehr leuchtet, besuchen ihn viele Touristen.
  
  Lo scienziato studia il funzionamento del *faro* antico.
  Der Wissenschaftler untersucht die Funktionsweise des alten *Leuchtturms*.
  
  Quando scende la notte, il *faro* si accende automaticamente.
  Wenn es dunkel wird, schaltet sich der *Leuchtturm* automatisch ein.
