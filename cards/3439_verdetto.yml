Rang: 3439
Wort: verdetto
Wortart: n.m
Wort mit Artikel: il verdetto
Femininum / Plural: verdettti
IPA: ''
Definition: das Urteil, -e
Register: ''
Beispielsätze: |-
  Il giudice ha annunciato il *verdetto* dopo tre giorni di udienza.
  Der Richter verkündete das *Urteil* nach drei Tagen Verhandlung.
  
  Nonostante le prove schiaccianti, il *verdetto* della giuria è stato di assoluzione.
  Trotz überwältigender Beweise lautete das *Urteil* der Geschworenen auf Freispruch.
  
  La fama delle sue sentenze aveva moltiplicato i dubbi sul *verdetto* più recente.
  Der Ruhm seiner Urteile hatte die Zweifel an dem jüngsten *Urteil* noch vergrößert.
  
  Se il *verdetto* non sarà favorevole, potremmo dover presentare appello entro una settimana.
  Falls das *Urteil* nicht günstig ausfällt, müssen wir möglicherweise innerhalb einer Woche Berufung einlegen.
  
  Nonostante il *verdetto* severissimo, molti pensavano che la condanna fosse eccessiva.
  Trotz des *Urteils* mit harter Strafe hielten viele die Verurteilung für übertrieben.
