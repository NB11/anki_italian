Rang: 2377
Wort: cardiaco
Wortart: adj
Wort mit Artikel: cardiaco
Femininum / Plural: ''
IPA: ''
Definition: herzbezüglich, das Herz betreffend
Register: ''
Beispielsätze: |-
  Il paziente ha un problema *cardiaco* che richiede un intervento immediato.
  Der Patient hat ein *Herzproblem*, das einen sofortigen Eingriff erfordert.
  
  Se avessi saputo che era un attacco *cardiaco*, avrei chiamato subito l'ambulanza.
  Wenn ich gewusst hätte, dass es ein *Herzanfall* war, hätte ich sofort den Krankenwagen gerufen.
  
  Nonostante i rischi *cardiaci*, continua a fare sport senza preoccuparsi.
  Trotz der *Herzrisiken* treibt er weiterhin Sport, ohne sich Sorgen zu machen.
  
  Mi hanno consigliato di evitare qualsiasi sforzo *cardiaco* dopo l'intervento.
  Sie haben mir geraten, nach der Operation jede *herzbelastende* Anstrengung zu vermeiden.
  
  È preoccupata perché la nonna soffre di *cardiache* aritmie da mesi.
  Sie macht sich Sorgen, weil ihre Oma seit Monaten unter *Herzrhythmusstörungen* leidet.
