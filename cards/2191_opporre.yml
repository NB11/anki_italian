Rang: 2191
Wort: opporre
Wortart: vt
Wort mit Artikel: opporre
Femininum / Plural: ''
IPA: ''
Definition: entgegenstellen, einwenden
Register: ''
Beispielsätze: |-
  Non possiamo *opporci* alla decisione del capo, altrimenti perdiamo il lavoro.
  Wir können uns *nicht der* Entscheidung des Chefs widersetzen, sonst verlieren wir die Arbeit.
  
  Se *opponessi* resistenza, ora non saresti in questa situazione difficile.
  Wenn du *Widerstand geleistet hättest*, wärst du jetzt nicht in dieser schwierigen Situation.
  
  È inutile *opporre* scuse a chi non vuole ascoltare nessuna ragione.
  Es ist sinnlos, *Einwände vorzubringen*, wo niemand zuhören will.
  
  Il governo ha deciso di *opporre* il veto alla legge proposta dal parlamento.
  Die Regierung hat beschlossen, ihr *Veto gegen* das vom Parlament vorgeschlagene Gesetz einzulegen.
  
  Nonostante tutti i problemi, loro continuano a *opporre* una calma apparente.
  Trotz aller Probleme *leisten* sie einen scheinbar ruhigen Widerstand.
