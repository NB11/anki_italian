Rang: 402
Wort: raccontare
Wortart: vt
Wort mit Artikel: raccontare
Femininum / Plural: ''
IPA: ''
Definition: erzählen, berichten, schildern
Register: ''
Beispielsätze: |-
  Mi piace *raccontare* storie ai miei figli la sera.
  Ich *erzähle* abends gern meinen Kindern Geschichten.
  
  Non ha voluto *raccontare* nulla del suo viaggio in Giappone.
  Er hat nichts über seine Reise nach Japan *berichten* wollen.
  
  Raccontami esattamente cosa è successo ieri in ufficio!
  *Erzähl* mir genau, was gestern im Büro *passiert ist*!
  
  Chi ti ha *raccontato* questa notizia falsa?
  Wer hat dir diese *falsche Nachricht erzählt*?
  
  Avrei voglia di *raccontare* una favola a mio nipote domani sera.
  Ich *würde* meinem Enkel morgen Abend gern ein Märchen *vorlesen*.
