Rang: 1031
Wort: animale
Wortart: n.m
Wort mit Artikel: l'animale
Femininum / Plural: animali
IPA: ''
Definition: das Tier, -e
Register: ''
Beispielsätze: |-
  Ho visto *animale* molto raro mentre attraversavo la foresta invece di disturbare il padrone della stazione.
  Ich habe das sehr seltene *Tier* gesehen, während ich den Wald durchquerte, statt den Besitzer des Bahnhofs zu stören.
  
  Se vuoi indovinare la razza dell'*animale*, devi osservare ogni dettaglio del suo pelo e della sua memoria.
  Wenn du die *Art* des Tiers erraten willst, musst du jedes Detail seines Fells und seines Gedächtnisses beobachten.
  
  Il veterinario curava l'*animale* ferito ma temeva che la malattia potesse impedire la sua guarigione immediata.
  Der *Tier*arzt behandelte das verletzte Tier, befürchtete aber, dass die Krankheit seine sofortige Heilung verhindern könnte.
  
  Quando il testimone ha riferito di aver visto un *animale* sconosciuto, nessuno gli ha dato fiducia senza ulteriori indagini.
  Als der *Zeuge* berichtete, ein unbekanntes Tier gesehen zu haben, schenkte ihm niemand Vertrauen ohne weitere Untersuchungen.
  
  Nonostante la battaglia tra le diverse razze di *animali*, la regina ha dichiarato che avrebbe protetto tutte le specie senza commettere errori legali.
  Trotz der Schlacht zwischen den verschiedenen *Arten* von Tieren erklärte die Königin, sie werde alle Arten schützen, ohne rechtliche Fehler zu begehen.
