Rang: 3564
Wort: campanello
Wortart: n.m
Wort mit Artikel: il campanello
Femininum / Plural: i campanelli
IPA: ''
Definition: die Glocke, -n, die Klingel, -n
Register: ''
Beispielsätze: |-
  Ho sentito suonare *il campanello* della porta, ma nessuno ha aperto.
  Ich habe *die Klingel* der Tür gehört, aber niemand hat geöffnet.
  
  Mentre preparavo la cena, *il campanello* ha squillato improvvisamente.
  Während ich das Abendessen vorbereitete, hat *die Glocke* plötzlich geläutet.
  
  Se non senti *il campanello*, chiama il portiere tramite l’interfono.
  Wenn du *die Klingel* nicht hörst, rufe den Torwart über die Sprechanlage.
  
  Era così silenzioso che abbiamo quasi dimenticato di installare *il campanello*.
  Es war so leise, dass wir fast vergessen haben, *die Klingel* anzubringen.
  
  Ero convinto che *il campanello* fosse guasto perché non funzionava nessuno dei tasti.
  Ich war überzeugt, dass *die Glocke* defekt war, weil keine der Tasten funktionierte.
