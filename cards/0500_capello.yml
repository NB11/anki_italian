Rang: 500
Wort: capello
Wortart: n.m
Wort mit Artikel: il capello
Femininum / Plural: capelli
IPA: ''
Definition: das Haar, -e
Register: ''
Beispielsätze: |-
  I *capelli* di Maria sono molto lunghi e lisci.
  Die *Haare* von Maria sind sehr lang und glatt.
  
  Non *capelli* ti si sono staccati quando hai pettinato tuo fratello ieri mattina?
  Sind dir *Haare* ausgefallen, als du gestern Morgen deinen Bruder gekämmt hast?
  
  Vorrei tingere questi *capelli* di rosso, ma mio padre non vuole.
  Ich würde diese *Haare* gern rot färben, aber mein Vater will das nicht.
  
  Nonostante la calvizie, lui porta sempre i *capelli* corti e ordinati.
  Trotz seiner Glatzenbildung trägt er immer kurze und gepflegte *Haare*.
  
  Ti ricordi quando da piccoli ci lamentavamo perché nostra madre ci tagliava i *capelli* troppo corti?
  Erinnerst du dich, wie wir uns als Kinder immer beschwerten, weil unsere Mutter uns die *Haare* zu kurz schnitt?
