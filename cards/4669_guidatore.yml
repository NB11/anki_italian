Rang: 4669
Wort: guidatore
Wortart: n.m
Wort mit Artikel: il guidatore
Femininum / Plural: guidatori
IPA: ''
Definition: der Fahrer, -
Register: ''
Beispielsätze: |-
  Il *guidatore* ha parcheggiato la macchina in modo perfetto nonostante lo spazio stretto.
  Der *Fahrer* hat das Auto trotz des engen Raums perfekt geparkt.
  
  Chiunque voglia guidare deve avere una patente valida, ha ricordato il *guidatore* al suo allievo.
  Wer fahren möchte, muss einen gültigen Führerschein haben, erinnerte der *Fahrer* seinen Schüler.
  
  Sebbene piovesse molto, il *guidatore* proseguiva con attenzione sulla strada scivolosa.
  Obwohl es stark regnete, fuhr der *Fahrer* vorsichtig auf der rutschigen Straße weiter.
  
  La polizia ha fermato il *guidatore* perché non rispettava i limiti di velocità sulla statale.
  Die Polizei hat den *Fahrer* angehalten, weil er auf der Landstraße die Geschwindigkeitsbegrenzungen nicht einhielt.
  
  Se fossi un *guidatore* esperto, guiderei senza esitare in caso di emergenza.
  Wenn ich ein erfahrener *Fahrer* wäre, würde ich im Notfall ohne Zögern fahren.
