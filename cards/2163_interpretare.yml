Rang: 2163
Wort: interpretare
Wortart: v
Wort mit Artikel: interpretare
Femininum / Plural: ''
IPA: ''
Definition: interpretieren, deuten, auslegen
Register: ''
Beispielsätze: |-
  Non riesco a *interpretare* il suo silenzio: è arrabbiata o solo stanca?
  Ich kann ihr Schweigen nicht *interpretieren*: ist sie wütend oder nur müde?
  
  Gli attori devono *interpretare* i personaggi con grande intensità per emozionare il pubblico.
  Die Schauspieler müssen die Figuren mit großer Intensität *interpretieren*, um das Publikum zu rühren.
  
  Secondo lo storico, molti dipinti del Rinascimento possono essere *interpretati* come simboli della lotta tra bene e male.
  Laut dem Historiker können viele Gemälde der Renaissance als Symbole des Kampfes zwischen Gut und Böse *interpretiert* werden.
  
  Se vuoi *interpretare* correttamente questa melodia, devi seguire lo spartito nota per nota.
  Wenn du diese Melodie richtig *interpretieren* willst, musst du die Noten genau befolgen.
  
  La polizia ha chiesto agli esperti di *interpretare* le prove trovate sulla scena del crimine.
  Die Polizei hat die Experten gebeten, die Beweise, die am Tatort gefunden wurden, zu *interpretare*.
