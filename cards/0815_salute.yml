Rang: 815
Wort: salute
Wortart: n.f
Wort mit Artikel: la salute
Femininum / Plural: salute
IPA: ''
Definition: die Gesundheit
Register: ''
Beispielsätze: |-
  La *salute* è la cosa più importante.
  Die *Gesundheit* ist das Wichtigste.
  
  Mi raccomando, bevi abbastanza acqua per la tua *salute*!
  Pass auf, trink genug Wasser für deine *Gesundheit*!
  
  Secondo il medico, la tua *salute* è migliorata molto.
  Laut dem Arzt hat sich deine *Gesundheit* stark verbessert.
  
  Senza *salute*, tutto il resto perde valore.
  Ohne *Gesundheit* verliert der Rest seinen Wert.
  
  Vor la *salute* di suo padre, Marco ha ridotto molto il lavoro.
  Wegen der *Gesundheit* seines Vaters hat Marco die Arbeit stark reduziert.
