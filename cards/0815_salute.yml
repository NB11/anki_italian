Rang: 815
Wort: salute
Wortart: n.f
Wort mit Artikel: la salute
Femininum / Plural: salute
IPA: ''
Definition: die Gesundheit, das Wohlbefinden
Register: ''
Beispielsätze: |-
  Dopo la corsa ho bevuto molta acqua per mantenere la *salute*.
  Nach dem Laufen habe ich viel Wasser getrunken, um meine *Gesundheit* zu erhalten.
  
  Il *salute* di Marco è migliorato molto dopo l’operazione.
  Marco*s *Gesundheit* hat sich nach der Operation stark verbessert.
  
  Prego che tu possa godere di una *salute* invidiabile per molti anni.
  Ich hoffe, dass du *Gesundheit* genießen kannst, die beneidenswert ist, für viele Jahre.
  
  La *salute* pubblica è una priorità per il governo di questo paese.
  Die *Gesundheit* der Öffentlichkeit ist eine Priorität für die Regierung dieses Landes.
  
  Conviene sempre prendersi cura della propria *salute*, prima che sia troppo tardi.
  Es ist ratsam, stets auf seine eigene *Gesundheit* zu achten, bevor es zu spät ist.
