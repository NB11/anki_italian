Rang: 4662
Wort: imminente
Wortart: adj
Wort mit Artikel: imminente
Femininum / Plural: ''
IPA: ''
Definition: bevorstehend, drohend
Register: ''
Beispielsätze: |-
  La minaccia *imminente* ha costretto la città a evacuare.
  Die *drohende* Gefahr hat die Stadt zur Evakuierung gezwungen.
  
  Avrei voluto partire domani, ma un pericolo *imminente* me lo ha impedito.
  Ich hätte morgen abreisen wollen, aber eine *bevorstehende* Gefahr hat es mir unmöglich gemacht.
  
  Il meteorologo ha avvertito che una tempesta *imminente* colpirà la costa entro poche ore.
  Der Meteorologe hat gewarnt, dass ein *bevorstehender* Sturm die Küste in wenigen Stunden treffen wird.
  
  Nonostante il pericolo *imminente*, i pompieri sono arrivati in tempo per salvare tutti.
  Trotz der *drohenden* Gefahr sind die Feuerwehrleute rechtzeitig angekommen, um alle zu retten.
  
  Se ci fosse stato un allarme *imminente*, avremmo reagito diversamente.
  Wenn es eine *bevorstehende* Warnung gegeben hätte, hätten wir anders reagiert.
