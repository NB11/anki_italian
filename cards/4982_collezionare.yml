Rang: 4982
Wort: collezionare
Wortart: vt
Wort mit Artikel: collezionare
Femininum / Plural: ''
IPA: ''
Definition: sammeln, sammelte, gesammelt
Register: ''
Beispielsätze: |-
  Da quando ero bambino, mi piace *collezionare* francobolli rari di tutto il mondo.
  Seit ich ein Kind bin, sammle ich seltene Briefmarken aus der ganzen Welt.
  
  Nonostante il mercato sia instabile, molti continuano a *collezionare* opere d’arte come investimento.
  Obwohl der Markt instabil ist, sammeln viele Kunstwerke als Investition.
  
  Se avessi più tempo, vorrei *collezionare* dischi in vinile degli anni ’80.
  Wenn ich mehr Zeit hätte, würde ich Schallplatten aus den 80ern *sammeln*.
  
  È inutile *collezionare* cose che non si usano mai; prima o poi finiranno in soffitta.
  Es ist sinnlos, Dinge zu *sammeln*, die man nie benutzt; irgendwann landen sie auf dem Dachboden.
  
  Anche se sua moglie non approva, lui continua ostinatamente a *collezionare* modellini di automobili.
  Auch wenn seine Frau es nicht billigt, sammelt er weiterhin hartnäckig Modellautos.
