Rang: 2697
Wort: vacca
Wortart: n.f
Wort mit Artikel: la vacca
Femininum / Plural: vaccche
IPA: ''
Definition: die Kuh, Kühe
Register: ''
Beispielsätze: |-
  Al mattino presto, in campagna si sente il muggito della *vacca*.
  Am frühen Morgen hört man auf dem Land das Muhen der *Kuh*.
  
  Nonostante il freddo, la *vacca* pascolava tranquillamente nel prato.
  Trotz der Kälte weidete die *Kuh* ruhig auf der Wiese.
  
  Se non avessimo *vaccce* sane, l’economia agricola ne soffrirebbe molto.
  Wenn wir keine gesunden *Kühe* hätten, würde die Landwirtschaft darunter leiden.
  
  È raro trovare una *vacca* con una macchia bianca così perfetta sul manto.
  Es ist selten, eine *Kuh* mit einem so perfekten weißen Fleck auf dem Fell zu finden.
  
  Dopo la pioggia, la *vacca* si strusciava contro il muro della stalla per scaldarsi.
  Nach dem Regen rieb sich die *Kuh* an der Stallwand, um sich zu wärmen.
