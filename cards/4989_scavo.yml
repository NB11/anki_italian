Rang: 4989
Wort: scavo
Wortart: n.m
Wort mit Artikel: lo scavo
Femininum / Plural: gli scavi
IPA: ''
Definition: die Ausgrabung, -en
Register: ''
Beispielsätze: |-
  Lo *scavo* archeologico ha portato alla luce antichi reperti romani.
  Die archäologische *Ausgrabung* brachte antike römische Funde ans Licht.
  
  Dopo mesi di lavoro, lo *scavo* è finalmente terminato con successo.
  Nach Monaten der Arbeit endete die *Ausgrabung* endlich erfolgreich.
  
  Gli studiosi hanno discusso i risultati dello *scavo* per giorni.
  Die Wissenschaftler diskutierten tagelang über die Ergebnisse der *Ausgrabung*.
  
  Se lo *scavo* non fosse stato così profondo, non avremmo trovato nulla.
  Wenn die *Ausgrabung* nicht so tief gewesen wäre, hätten wir nichts gefunden.
  
  Spero che lo *scavo* nel terreno vicino al municipio riveli nuove sorprese.
  Ich hoffe, dass die *Ausgrabung* auf dem Gelände nahe der Gemeindeverwaltung neue Überraschungen zutage fördert.
