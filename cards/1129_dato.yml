Rang: 1129
Wort: dato
Wortart: n.m
Wort mit Artikel: il dato
Femininum / Plural: dati
IPA: ''
Definition: die Angabe, -n
Register: ''
Beispielsätze: |-
  Il *dato* raccolto è fondamentale per la ricerca scientifica.
  Die *Angabe*, die gesammelt wurde, ist entscheidend für die wissenschaftliche Forschung.
  
  Secondo il *dato* ufficiale, la temperatura media è aumentata di due gradi.
  Laut der *Angabe* der Behörden ist die Durchschnittstemperatur um zwei Grad gestiegen.
  
  Non capisco questo *dato*; forse mi manca una conoscenza precedente.
  Ich verstehe diese *Angabe* nicht; vielleicht fehlt mir ein vorheriges Wissen.
  
  Se avessi saputo il *dato* corretto, avrei preso una decisione migliore.
  Wenn ich die richtige *Angabe* gekannt hätte, hätte ich eine bessere Entscheidung getroffen.
  
  Il tribunale ha richiesto tutti i *dati* relativi al caso per verificare la situazione.
  Das Gericht hat alle *Angaben*, die mit dem Fall zusammenhängen, angefordert, um die Lage zu überprüfen.
