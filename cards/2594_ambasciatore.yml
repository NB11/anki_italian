Rang: 2594
Wort: ambasciatore
Wortart: n.m
Wort mit Artikel: l'ambasciatore
Femininum / Plural: gli ambasciatori
IPA: ''
Definition: der Botschafter, -
Register: ''
Beispielsätze: |-
  L'*ambasciatore* italiano ha incontrato il presidente per discutere della pace.
  Der italienische *Botschafter* traf den Präsidenten, um über den Frieden zu sprechen.
  
  Chi ha visto l'*ambasciatore* alla cerimonia ieri?
  Wer hat den *Botschafter* bei der Zeremonie gestern gesehen?
  
  Spero che l'*ambasciatore* arrivi in tempo per la conferenza.
  Ich hoffe, dass der *Botschafter* rechtzeitig zur Konferenz kommt.
  
  L'*ambasciatore*, che aveva vissuto molti anni all'estero, parlava perfettamente cinque lingue.
  Der *Botschafter*, der viele Jahre im Ausland gelebt hatte, sprach perfekt fünf Sprachen.
  
  Se l'*ambasciatore* avesse saputo dell'incidente, avrebbe avvertito immediatamente il ministero.
  Falls der *Botschafter* von dem Vorfall gewusst hätte, hätte er sofort das Ministerium benachrichtigt.
