Rang: 3417
Wort: avenue
Wortart: n.f
Wort mit Artikel: la avenue
Femininum / Plural: avenue
IPA: ''
Definition: die Allee, -n
Register: ''
Beispielsätze: |-
  Camminavamo lungo la *avenue* principale della città, ammirando le vetrine dei negozi.
  Wir liefen entlang der *Hauptallee* der Stadt und bewunderten die Schaufenster der Läden.
  
  Se prendi la prima *avenue* a destra, arriverai al parco in cinque minuti.
  Wenn du die erste *Allee* rechts nimmst, erreichst du den Park in fünf Minuten.
  
  Ricordo che, quand'ero piccolo, mio padre mi portava sempre in *avenue* a vedere i fuochi d'artificio.
  Ich erinnere mich, dass mein Vater mich als Kind immer zur *Allee* mitnahm, um das Feuerwerk zu sehen.
  
  La *avenue* alberata era così affollata che quasi non si poteva passare.
  Die baumbestandene *Allee* war so überfüllt, dass man kaum durchkam.
  
  Nonostante il traffico intenso, loro decisero di fare una passeggiata sulla *avenue* commerciale.
  Trotz des starken Verkehrs beschlossen sie, einen Spaziergang auf der *Einkaufsallee* zu machen.
