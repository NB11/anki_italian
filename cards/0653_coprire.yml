Rang: 653
Wort: coprire
Wortart: vt
Wort mit Artikel: coprire
Femininum / Plural: ''
IPA: ''
Definition: bedecken, abdecken, zudecken
Register: ''
Beispielsätze: |-
  Stasera *coprirò* il letto con un lenzuolo pulito.
  Heute Abend werde ich das Bett mit einem sauberen Laken *bedecken*.
  
  Il vulcano ha *coperto* il paese di cenere.
  Der Vulkan hat das Dorf mit Asche *zugedeckt*.
  
  Ha *coperto* la pentola con il coperchio prima di spegnere il fuoco.
  Er hat den Topf mit dem Deckel *abgedeckt*, bevor er das Feuer ausschaltete.
  
  Non *coprirmi* di vergogna davanti a tutti!
  Bedecke mich nicht vor allen mit *Schande*!
  
  Spero che tu *copra* le tue spalle quando esci la sera.
  Ich hoffe, du *deckst* deine Schultern zu, wenn du abends rausgehst.
