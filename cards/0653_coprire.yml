Rang: 653
Wort: coprire
Wortart: vt
Wort mit Artikel: coprire
Femininum / Plural: ''
IPA: ''
Definition: bedecken, abdecken, zudecken, verhüllen
Register: ''
Beispielsätze: |-
  Ho deciso di *coprire* il tavolo con una tovaglia rossa per la cena.
  Ich habe beschlossen, den Tisch mit einer *roten* Decke zu bedecken.
  
  Se non *copri* i piatti, la polvere entrerà nella cucina.
  Wenn du die Teller nicht *zudeckst*, kommt Staub in die Küche.
  
  La polizia vuole *coprire* le prove del crimine prima che arrivino i giornalisti.
  Die Polizei will die Beweise des Verbrechens *bedecken*, bevor die Journalisten ankommen.
  
  Anche se il bambino ha la febbre, non vogliamo *coprire* la finestra perché ha bisogno di aria fresca.
  Obwohl das Kind Fieber hat, wollen wir das Fenster nicht *bedecken*, weil es frische Luft braucht.
  
  Per *coprire* i costi del viaggio, dovrai trovare un lavoro part-time.
  Um die Kosten der Reise zu *decken*, wirst du einen Nebenjob finden müssen.
