Rang: 3870
Wort: multiplo
Wortart: adj
Wort mit Artikel: multiplo
Femininum / Plural: ''
IPA: ''
Definition: mehrere, vielfach, vielfältig
Register: ''
Beispielsätze: |-
  Il numero 12 è un numero *multiplo* di 3 e di 4.
  Die Zahl 12 ist ein *Vielfaches* von 3 und 4.
  
  Ci sono molte soluzioni possibili, ma solo alcune sono *multipli* validi del problema.
  Es gibt viele mögliche Lösungen, aber nur wenige sind gültige *Vielfache* der Aufgabe.
  
  Ho notato che la risposta è un *multiplo* della domanda iniziale.
  Ich habe bemerkt, dass die Antwort ein *Vielfaches* der ursprünglichen Frage ist.
  
  Per risolvere l'equazione, cerca un sistema in cui il risultato sia un *multiplo* dei termini dati.
  Um die Gleichung zu lösen, suche ein System, in dem das Ergebnis ein *Vielfaches* der gegebenen Terme ist.
  
  I numeri *multipli* di 5 terminano sempre con 0 o 5.
  Die *Vielfachen* von 5 enden immer mit 0 oder 5.
