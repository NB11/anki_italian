Rang: 3948
Wort: gelosia
Wortart: n.f
Wort mit Artikel: la gelosia
Femininum / Plural: gelosie
IPA: ''
Definition: die Eifersucht
Register: ''
Beispielsätze: |-
  Provo *gelosia* quando lui guarda troppo le altre donne.
  Ich spüre *Eifersucht*, wenn er zu viele andere Frauen ansieht.
  
  La *gelosia* può rovinare anche i rapporti più solidi.
  Die *Eifersucht* kann sogar die stabilsten Beziehungen zerstören.
  
  Credi che sia normale provare *gelosia* per un amico?
  Glaubst du, es ist normal, *Eifersucht* gegenüber einem Freund zu empfinden?
  
  Quella *gelosia* irrazionale l’ha spinto a comportamenti estremi.
  Diese irrationale *Eifersucht* trieb ihn zu extremen Handlungen.
  
  Nonostante la *gelosia*, alla fine ha capito che non c’era motivo di dubitare.
  Trotz *Eifersucht* verstand er am Ende, dass es keinen Grund gab, zu zweifeln.
