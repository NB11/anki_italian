Rang: 2814
Wort: can
Wortart: n.m
Wort mit Artikel: il can
Femininum / Plural: i cani
IPA: ''
Definition: der Hund, -e
Register: ''
Beispielsätze: |-
  Il *cane* abbaia ogni mattina quando sente il postino arrivare.
  Der *Hund* bellt jeden Morgen, wenn er den Briefträger kommen hört.
  
  Non *can* è un animale domestico come il gatto.
  Ein *Hund* ist kein Haustier wie die Katze.
  
  Se avessi tempo, mi piacerebbe avere un *cane* da accudire.
  Wenn ich Zeit hätte, würde ich gern einen *Hund* versorgen.
  
  I *cani* sono animali molto socievoli, se ben educati.
  *Hunde* sind sehr gesellige Tiere, wenn sie gut erzogen sind.
  
  Il vicino ha adottato due *cani* dal canile la settimana scorsa.
  Der Nachbar hat vergangene Woche zwei *Hunde* aus dem Tierheim adoptiert.
