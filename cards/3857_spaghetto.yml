Beispielsätze: |-
  Nel piatto ci sono *spaghetti* al pomodoro e basilico fresco.
  Auf dem Teller sind *Spaghetti* mit Tomatensauce und frischem Basilikum.
  
  Mio nonno mi ha insegnato a cuocere gli *spaghetti* al dente.
  Mein Großvater hat mir beigebracht, die *Spaghetti* bissfest zu kochen.
  
  Se aggiungi troppo sale all’acqua, anche gli *spaghetti* diventeranno immangiabili.
  Wenn du zu viel Salz ins Wasser gibst, werden sogar die *Spaghetti* ungenießbar.
  
  Gli *spaghetti* sono così lunghi che sporgono dal piatto!
  Die *Spaghetti* sind so lang, dass sie über den Teller hinausragen!
  
  Dopo aver cucinato gli *spaghetti*, ho dovuto sciacquare la pentola con acqua calda.
  Nachdem ich die *Spaghetti* gekocht hatte, musste ich den Topf mit heißem Wasser ausspülen.
