Rang: 537
Wort: considerare
Wortart: v
Wort mit Artikel: considerare
Femininum / Plural: ''
IPA: ''
Definition: bedenken, erwägen, überlegen
Register: ''
Beispielsätze: |-
  Devo *considerare* tutte le possibilità prima di prendere una decisione.
  Ich muss alle Möglichkeiten *überlegen*, bevor ich eine Entscheidung treffe.
  
  Mi hanno convinto a *considerare* un viaggio in Italia per l'estate prossima.
  Sie haben mich überredet, eine Reise nach Italien für nächsten Sommer zu *bedenken*.
  
  Stiamo *considerando* l'idea di acquistare una casa più grande.
  Wir erwägen die Idee, ein größeres Haus zu kaufen.
  
  Se tu *considerassi* la mia situazione, capiresti perché ho fretta.
  Wenn du meine Situation *bedenken* würdest, würdest du verstehen, warum ich in Eile bin.
  
  Hanno *considerato* ogni dettaglio prima di firmare il contratto.
  Sie haben jeden *Details* vor dem Unterschreiben des Vertrags in Betracht gezogen.
Audio: ''
Notiz: ''
Dispersion: ''
