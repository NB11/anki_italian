Rang: 2067
Wort: torturare
Wortart: vt
Wort mit Artikel: torturare
Femininum / Plural: ''
IPA: ''
Definition: quälen, martern, foltern
Register: ''
Beispielsätze: |-
  Gli inquisitori medievali *torturavano* gli eretici per costringerli a confessare.
  Die mittelalterlichen Inquisitoren *quälten* die Ketzer, um sie zum Geständnis zu zwingen.
  
  Se non avessi rispettato le regole, avrei *torturato* me stesso con i sensi di colpa.
  Wenn ich die Regeln nicht befolgt hätte, hätte ich *mich* mit Schuldgefühlen gequält.
  
  Il dittatore faceva *torturare* i prigionieri politici senza alcuna pietà.
  Der Diktator ließ politische Gefangene ohne jede Gnade *foltern*.
  
  Dicono che gli antichi romani *torturassero* gli schiavi per estorcere informazioni.
  Man sagt, die alten Römer *quälten* Sklaven, um Informationen zu erpressen.
  
  Spero che nessuno abbia il coraggio di *torturare* un animale innocente!
  Ich hoffe, dass niemand den Mut hat, ein unschuldiges Tier zu *quälen*!
