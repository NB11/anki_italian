Rang: 1828
Wort: difficoltà
Wortart: n.f
Wort mit Artikel: la difficoltà
Femininum / Plural: difficoltà
IPA: ''
Definition: die Schwierigkeit, -en
Register: ''
Beispielsätze: |-
  Nonostante le *difficoltà*, siamo riusciti a finire il progetto in tempo.
  Trotz der *Schwierigkeiten* haben wir es geschafft, das Projekt rechtzeitig abzuschließen.
  
  Hai notato che la *difficoltà* di questo esercizio è aumentata rispetto all'ultima volta?
  Hast du bemerkt, dass die *Schwierigkeit* dieser Übung im Vergleich zum letzten Mal gestiegen ist?
  
  Mi dispiace, ma a causa delle *difficoltà* finanziarie non possiamo procedere con l'acquisto.
  Es tut mir leid, aber aufgrund der *Schwierigkeiten* können wir den Kauf nicht tätigen.
  
  Se avessi conosciuto la *difficoltà* di questa situazione, avrei agito diversamente.
  Hätte ich die *Schwierigkeit* dieser Situation gekannt, hätte ich anders gehandelt.
  
  La *difficoltà* maggiore non era nel lavoro stesso, ma nelle condizioni in cui bisognava svolgerlo.
  Die größte *Schwierigkeit* lag nicht an der Arbeit selbst, sondern in den Bedingungen, unter denen sie erledigt werden musste.
