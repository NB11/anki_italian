Rang: 1857
Wort: moltissimo
Wortart: adj
Wort mit Artikel: moltissimo
Femininum / Plural: ''
IPA: ''
Definition: sehr viel, überaus
Register: ''
Beispielsätze: |-
  Ho mangiato *moltissimo* ieri sera a cena.
  Ich habe gestern Abend beim Abendessen *sehr viel* gegessen.
  
  È *moltissimo* che aspetto questo pacco, la consegna dovrebbe essere già arrivata!
  Ich warte *sehr viel* auf dieses Paket, die Lieferung hätte längst da sein müssen!
  
  Non mi sembra *moltissimo* che tu abbia ragione in questa discussione.
  Ich glaube nicht, dass du in dieser Diskussion *sehr viel* recht hast.
  
  Se avessi *moltissimo* tempo libero, imparerei a disegnare veramente bene.
  Wenn ich *sehr viel* Freizeit hätte, würde ich lernen, wirklich gut zu zeichnen.
  
  È così *moltissimo* che sei tornato sano e salvo dall'esperimento in Antartide!
  Es ist *so überaus* toll, dass du gesund und munter vom Experiment in der Antarktis zurückgekehrt bist!
