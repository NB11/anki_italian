Rang: 875
Wort: sentito
Wortart: adj
Wort mit Artikel: sentito
Femininum / Plural: ''
IPA: ''
Definition: gehört, gefühlt
Register: ''
Beispielsätze: |-
  Ho *sentito* un dolore improvviso al braccio sinistro.
  Ich habe einen plötzlichen Schmerz im linken Arm *gehört*.
  
  È una notizia *sentita* dal cuore, non solo dalla mente.
  Das ist eine Nachricht, die aus dem Herzen *gefühlt* wurde, nicht nur aus dem Verstand.
  
  Il colonnello ha dato un ordine che nessuno ha trovato *sentito* correttamente.
  Der Oberst hat einen Befehl gegeben, den niemand richtig *verstanden* hat.
  
  Dunque, hai *sentito* anche tu questa pressione interna che non ti abbandona?
  Also, hast auch du diesen inneren Druck *gefühlt*, der dich nicht loslässt?
  
  Nonostante il caos, l’immagine che ho ricevuto è rimasta *sentita* distintamente.
  Trotz des Chaos blieb das Bild, das ich erhalten habe, deutlich *wahrgenommen*.
