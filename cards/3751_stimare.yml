Rang: 3751
Wort: stimare
Wortart: v
Wort mit Artikel: stimare
Femininum / Plural: ''
IPA: ''
Definition: schätzen, schätzen, würdigen
Register: ''
Beispielsätze: |-
  Gli storici *stimano* che la popolazione romana abbia raggiunto un milione di abitanti nel II secolo d.C.
  Die Historiker *schätzen*, dass die römische Bevölkerung im 2. Jahrhundert n. Chr. eine Million erreicht hat.
  
  Vorrei *stimare* il valore di questa collezione, se possibile.
  Ich möchte gerne den Wert dieser Sammlung *einschätzen*, wenn möglich.
  
  I critici *stimano* che il romanzo di Calvino sia un capolavoro della letteratura italiana.
  Die Kritiker *würdigen*, dass Calvino›s Roman ein Meisterwerk der italienischen Literatur ist.
  
  Non *stimeresti* mai abbastanza il lavoro dei volontari in questa associazione!
  Man *würdigt* die Arbeit der Freiwilligen in diesem Verein nie genug!
  
  Gli scienziati *stimano* che il cambiamento climatico avrà effetti drastici entro trent'anni.
  Wissenschaftler *schätzen*, dass der Klimawandel innerhalb von dreißig Jahren drastische Auswirkungen haben wird.
