Rang: 1274
Wort: matto
Wortart: adj
Wort mit Artikel: matto
Femininum / Plural: ''
IPA: ''
Definition: verrückt, wahnsinnig
Register: ''
Beispielsätze: |-
  Quell’uomo è *matto*: crede di poter volare!
  Jener Mann ist *verrückt*: er glaubt, fliegen zu können.
  
  La polizia ha arrestato un uomo che gridava *matto* per strada.
  Die Polizei hat einen Mann verhaftet, der *wahnsinnig* auf der Straße schrie.
  
  Nonostante sia così *matta*, riesce sempre a trovare soluzioni geniali.
  Obwohl sie so *verrückt* ist, findet sie immer geniale Lösungen.
  
  Se fossi *matto*, comprerei un palazzo solo per mostrarlo agli amici.
  Wenn ich *wahnsinnig* wäre, würde ich einen Palast nur kaufen, um ihn Freunden zu zeigen.
  
  È *matto* che tu abbia spedito quella richiesta senza controllare i dettagli!
  Es ist *verrückt*, dass du diesen Antrag abgeschickt hast, ohne die Details zu prüfen.
