  Ich habe gelesen, dass die *Länge* der durchschnittlichen Lebensdauer von Hunden zehn Jahre beträgt.
  
  Se vuoi cambiare la *lunghezza* della gonna, chiedi a tua madre.
  Wenn du die *Länge* des Rocks ändern möchtest, frag deine Mutter.
  
  La *lunghezza* dell’asta era tale che non entrava nella porta.
  Die *Länge* der Stange war so groß, dass sie nicht durch die Tür passte.
