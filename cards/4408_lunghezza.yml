Definition: die Länge, -n
Register: ''
Beispielsätze: |-
  La *lunghezza* di questo tavolo è esattamente due metri.
  Die *Länge* dieses Tisches beträgt genau zwei Meter.
  
  Devi misurare la *lunghezza* del tessuto prima di tagliarlo.
  Du musst die *Länge* des Stoffes messen, bevor du ihn schneidest.
  
