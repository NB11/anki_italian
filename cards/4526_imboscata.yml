Rang: 4526
Wort: imboscata
Wortart: n.m
Wort mit Artikel: l'imboscata
Femininum / Plural: imboscate
IPA: ''
Definition: die Falle, -n
Register: ''
Beispielsätze: |-
  I soldati caddero in un'*imboscata* vicino al fiume.
  Die Soldaten fielen in eine *Falle* nahe dem Fluss.
  
  Era un'*imboscata* ben preparata dai nostri nemici.
  Es war eine gut vorbereitete *Falle* unserer Feinde.
  
  Se non avessimo cambiato percorso, avremmo evitato l'*imboscata*.
  Hätten wir den Weg nicht geändert, hätten wir die *Falle* vermieden.
  
  Nonostante il pericolo, riuscì a sfuggire all'*imboscata*.
  Trotz der Gefahr gelang es ihm, der *Falle* zu entkommen.
  
  L'*imboscata* fu organizzata con l'aiuto di un traditore.
  Die *Falle* wurde mit Hilfe eines Verräters organisiert.
