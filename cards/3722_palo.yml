Rang: 3722
Wort: palo
Wortart: n.m
Wort mit Artikel: il palo
Femininum / Plural: pali
IPA: ''
Definition: der Pfahl, -¨e
Register: ''
Beispielsätze: |-
  Il *palo* della recinzione si è rotto durante la tempesta.
  Der *Pfahl* des Zauns ist während des Sturms kaputtgegangen.
  
  Gli operai stanno piantando dei *pali* per sostenere il nuovo ponte.
  Die Arbeiter pflanzen gerade *Pfähle*, um die neue Brücke zu stützen.
  
  Nonostante il freddo, la mia gatta si è acciambellata vicino al *palo* del lampione.
  Trotz der Kälte hat sich meine Katze in der Nähe des *Pfahls* der Straßenlaterne zusammengerollt.
  
  Se vuoi appendere il quadro, devi prima piantare un *palo* nel muro.
  Wenn du das Bild aufhängen möchtest, musst du zuerst einen *Pfahl* in die Wand schlagen.
  
  Il *palo* della luce, che era stato installato male, è caduto per la furia del vento.
  Der *Pfahl* der Laterne, der schlecht installiert worden war, ist durch die Wut des Windes umgefallen.
