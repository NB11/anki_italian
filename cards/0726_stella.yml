Rang: 726
Wort: stella
Wortart: n.f
Wort mit Artikel: la stella
Femininum / Plural: stelle
IPA: ''
Definition: der Stern, -e
Register: ''
Beispielsätze: |-
  La *stella* più luminosa si chiama Sirio.
  Der *hellste Stern* heißt Sirius.
  
  Hai mai visto una *stella* cadente?
  Hast du schon mal einen *Stern* fallen sehen?
  
  Le *stelle* brillano nel cielo notturno.
  Die *Sterne* leuchten am Nachthimmel.
  
  Vor di andare a letto, guardo sempre le *stelle*.
  Bevor ich schlafen gehe, schaue ich immer die *Sterne* an.
  
  Credi che le *stelle* influenzino il nostro destino?
  Glaubst du, dass die *Sterne* unser Schicksal beeinflussen?
