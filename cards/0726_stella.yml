Rang: 726
Wort: stella
Wortart: n.m
Wort mit Artikel: la stella
Femininum / Plural: stelle
IPA: ''
Definition: der Stern, -e
Register: ''
Beispielsätze: |-
  La *stella* polare è molto luminosa nel cielo notturno.
  Der *Polarstern* leuchtet sehr hell am Nachthimmel.
  
  Durante il compleanno di Maria, abbiamo visto tantissime *stelle* cadenti.
  Während Marias *Geburtstag* haben wir unzählige Sterne fallen sehen.
  
  Mi hanno detto che se fai un giuro sotto una *stella* cadente, si avvera un desiderio.
  Man hat mir gesagt, wenn man unter einem *fallenden Stern* einen Schwur leistet, geht ein Wunsch in Erfüllung.
  
  Vorrei appendere nel mio salotto una foto dove si vedono la *stella* di Natale e la luna piena.
  Ich würde gerne in meinem Wohnzimmer ein Foto aufhängen, auf dem der *Weihnachtsstern* und der Vollmond zu sehen sind.
  
  Gli astronomi studiano le *stelle* per capire l'origine dell'universo.
  Die Astronomen erforschen die *Sterne*, um den Ursprung des Universums zu verstehen.
