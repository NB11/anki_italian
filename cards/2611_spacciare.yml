Rang: 2611
Wort: spacciare
Wortart: v
Wort mit Artikel: spacciare
Femininum / Plural: ''
IPA: ''
Definition: handeln, dealen, schmuggeln, vertreiben
Register: ''
Beispielsätze: |-
  Hanno arrestato un uomo che *spacciava* droga in centro.
  Sie haben einen Mann festgenommen, der in der Innenstadt *drogen gehandelt* hat.
  
  Se non la smetti di *spacciare*, finirai in prigione, credimi.
  Wenn du nicht aufhörst zu *schmuggeln*, landest du im Gefängnis, glaub mir.
  
  Il ragazzo che *spacciava* a scuola è stato espulso.
  Der Junge, der an der Schule *Deals gemacht* hat, wurde verwiesen.
  
  Avrei smesso di *spacciare* molto tempo fa, ma avevo bisogno di soldi.
  Ich hätte längst aufgehört zu *handeln*, aber ich brauchte Geld.
  
  Chiunque *spacci* in questa zona rischia di essere beccato dalla pattuglia.
  Wer in diesem Gebiet *dealt*, riskiert, von der Patrouille erwischt zu werden.
Audio: ''
Notiz: ''
Dispersion: ''
