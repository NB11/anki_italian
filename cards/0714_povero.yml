Rang: 714
Wort: povero
Wortart: adj
Wort mit Artikel: povero
Femininum / Plural: ''
IPA: ''
Definition: arm, bedauernswert, bedürftig
Register: ''
Beispielsätze: |-
  La *povera* ragazza non aveva abbastanza soldi per comprare un regalo al suo compleanno.
  Das *arme* Mädchen hatte nicht genug Geld, um ein Geschenk zu ihrem Geburtstag zu kaufen.
  
  Se fossi al posto tuo, aiuterei quella *povera* anima in difficoltà.
  Wenn ich an deiner Stelle wäre, würde ich dieser *bedauernswerten* Seele in Not helfen.
  
  Nonostante le difficoltà, ha sempre cercato di *meritare* una seconda opportunità nella vita.
  Trotz der Schwierigkeiten hat sie immer versucht, sich eine zweite *Chance* im Leben zu verdienen.
  
  Credo che la *povera* donna abbia bisogno di un medico più che di parole rassicuranti.
  Ich glaube, die *bedürftige* Frau braucht einen Arzt mehr als beruhigende Worte.
  
  Era così *povero* che non poteva nemmeno permettersi una birra al bar dopo il lavoro.
  Er war so *arm*, dass er sich nicht einmal ein Bier in der Bar nach der Arbeit leisten konnte.
