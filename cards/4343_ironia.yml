Rang: 4343
Wort: ironia
Wortart: n.f
Wort mit Artikel: l'ironia
Femininum / Plural: ironie
IPA: ''
Definition: die Ironie, -n
Register: ''
Beispielsätze: |-
  Non ho potuto fare a meno di ridere per tanta *ironia* della sorte.
  Ich konnte nicht anders, als über so viel *Ironie* des Schicksals zu lachen.
  
  La *ironia* di questa situazione non sfugge a nessuno.
  Die *Ironie* dieser Situation entgeht niemandem.
  
  Se avessi saputo la *ironia* nascosta in questa frase, l’avrei evitata!
  Hätte ich die versteckte *Ironie* in diesem Satz gekannt, hätte ich ihn vermieden!
  
  La *ironia* è un’arma a doppio taglio che molti usano senza rendersene conto.
  Die *Ironie* ist eine zweischneidige Waffe, die viele einsetzen, ohne es zu merken.
  
  Mi colpì profondamente la *ironia* amara delle sue parole, che sembravano sincere ma nascondevano il contrario.
  Mich berührte die bittere *Ironie* seiner Worte, die aufrichtig klangen, aber das Gegenteil verbargen.
