Beispielsätze: |-
  Il regime *sovietico* fu uno dei più importanti del XX secolo.
  Das *sowjetische* Regime war eines der wichtigsten des 20. Jahrhunderts.
  
  Durante la Guerra Fredda, molti paesi temevano l’influenza *sovietica*.
  Während des Kalten Krieges fürchteten viele Länder den *sowjetischen* Einfluss.
  
  Credi che il cinema *sovietico* abbia influenzato quello occidentale?
  Glaubst du, dass das *sowjetische* Kino das westliche beeinflusst hat?
  
  Le repubbliche *sovietiche* dichiararono l’indipendenza tra il 1990 e il 1991.
  Die *sowjetischen* Republiken erklärten zwischen 1990 und 1991 ihre Unabhängigkeit.
  
  Nonostante le critiche, l’economia *sovietica* riuscì a crescere in certi periodi.
  Trotz der Kritik schaffte es die *sowjetische* Wirtschaft in bestimmten Perioden zu wachsen.
