Rang: 4915
Wort: incatenare
Wortart: v
Wort mit Artikel: incatenare
Femininum / Plural: ''
IPA: ''
Definition: anketten, fesseln
Register: ''
Beispielsätze: |-
  La polizia è riuscita a *incatenare* il ladro alla ringhiera prima che potesse fuggire.
  Die Polizei gelang es, den Dieb am Geländer *anzuketten*, bevor er fliehen konnte.
  
  Se non lo *incatenano*, il cane scapperà di nuovo nel giardino del vicino.
  Wenn sie ihn nicht *anketten*, wird der Hund schon wieder in den Garten des Nachbarn laufen.
  
  Ho deciso di non *incatenare* la mia libertà per un lavoro che non mi soddisfa affatto.
  Ich habe beschlossen, meine Freiheit nicht für einen Job *anzuketten*, der mich überhaupt nicht zufriedenstellt.
  
  Nonostante avesse minacciato di *incatenare* lui stesso il cane, alla fine dovette lasciarlo libero.
  Obwohl er gedroht hatte, den Hund selbst *anzuketten*, musste er ihn am Ende doch freilassen.
  
  Vorrei tanto *incatenare* questo momento di felicità perché non passi mai!
  Ich wünschte, ich könnte diesen Moment des Glücks *anheften*, damit er nie vorbeigeht!
