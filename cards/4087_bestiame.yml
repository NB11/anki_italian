Rang: 4087
Wort: bestiame
Wortart: n.m
Wort mit Artikel: il bestiame
Femininum / Plural: i bestiami
IPA: ''
Definition: das Vieh, die Herde
Register: ''
Beispielsätze: |-
  Il *bestiame* pascola tranquillamente nel prato.
  Das *Vieh* weidet friedlich auf der Wiese.
  
  I contadini hanno venduto tutto il *bestiame* prima dell'inverno.
  Die Bauern haben das gesamte *Vieh* vor dem Winter verkauft.
  
  Nonostante la siccità, le mandrie di *bestiame* sembrano in buona salute.
  Trotz der Dürre wirken die Herden von *Vieh* gesund.
  
  Il governo ha stanziato fondi per proteggere il *bestiame* dalle malattie.
  Die Regierung hat Mittel bereitgestellt, um das *Vieh* vor Krankheiten zu schützen.
  
  Dopo anni di espansione, ora il *bestiame* è diminuito a causa della mancanza di pascoli.
  Nach Jahren der Ausweitung ist das *Vieh* nun aufgrund fehlender Weiden zurückgegangen.
