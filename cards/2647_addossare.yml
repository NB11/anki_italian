Rang: 2647
Wort: addossare
Wortart: vt
Wort mit Artikel: addossare
Femininum / Plural: ''
IPA: ''
Definition: aufbürden, überstülpen
Register: ''
Beispielsätze: |-
  Non *addossare* tutte le responsabilità a me, non è giusto!
  Schieb nicht alle *Verantwortung* auf mich, das ist nicht fair!
  
  Il governo ha *addossato* al cittadino la colpa della crisi economica.
  Die Regierung hat dem Bürger die *Schuld* an der Wirtschaftskrise angelastet.
  
  Vuoi *addossare* anche le spese di viaggio al mio budget limitato?
  Willst du mir jetzt auch noch die Reisekosten auf mein *begrenztes Budget* aufbürden?
  
  Si è *addossato* un incarico troppo pesante solo per impressionare l’autore del romanzo.
  Er hat sich eine zu schwere Aufgabe *aufgebürdet*, nur um den Autor des Romans zu beeindrucken.
  
  Dopo la sconfitta, i tifosi hanno *addossato* al portiere la responsabilità della tensione in curva.
  Nach der Niederlage haben die Fans dem Torwart die *Verantwortung* für die Spannung in der Kurve angelastet.
