Rang: 2349
Wort: risata
Wortart: n.f
Wort mit Artikel: la risata
Femininum / Plural: risate
IPA: ''
Definition: das Gelächter, die Lache
Register: ''
Beispielsätze: |-
  Non appena ha sentito la barzelletta, la classe scoppiò in una *risata* fragorosa.
  Sobald er den Witz hörte, brach die Klasse in ein *Gelächter* aus.
  
  La sua *risata* argentina è inconfondibile tra tutte le altre.
  Ihr argentinisches *Lachen* ist unverkennbar unter allen anderen.
  
  Chi ha interrotto la *risata* con quel silenzio improvviso?
  Wer hat das *Lachen* mit dieser plötzlichen Stille unterbrochen?
  
  Se avessi saputo che sarebbe finita così, avrei evitato di scatenare quella *risata* generale.
  Hätte ich gewusst, dass es so enden würde, hätte ich dieses allgemeine *Gelächter* vermieden.
  
  Benché sia una persona seria, a volte una semplice battuta gli strappa una *risata* inaspettata.
  Obwohl er eine ernste Person ist, entlockt ihm manchmal ein simpler Witz ein unerwartetes *Lachen*.
