Rang: 3001
Wort: temporaneo
Wortart: adj
Wort mit Artikel: temporaneo
Femininum / Plural: ''
IPA: ''
Definition: vorübergehend, zeitweilig
Register: ''
Beispielsätze: |-
  Lavoro qui come impiegato *temporaneo* per sostituire qualcuno in ferie.
  Ich arbeite hier als *temporärer* Angestellter, um jemanden im Urlaub zu vertreten.
  
  Abbiamo affittato un appartamento *temporaneo* vicino alla stazione.
  Wir haben eine *vorübergehende* Wohnung in der Nähe des Bahnhofs gemietet.
  
  La soluzione che hai proposto è *temporanea*, ma ci aiuterà fino a domani.
  Deine vorgeschlagene Lösung ist *zeitweilig*, aber sie wird uns bis morgen helfen.
  
  Sono stato assunto con un contratto *temporaneo* che scadrà a giugno.
  Ich wurde mit einem *befristeten* Vertrag eingestellt, der im Juni endet.
  
  Dovremmo trovare una sistemazione più stabile, ma per ora è *temporanea*.
  Wir sollten eine stabilere Unterkunft finden, aber vorerst ist sie *vorübergehend*.
