Rang: 2566
Wort: cuoco
Wortart: n.m
Wort mit Artikel: il cuoco
Femininum / Plural: cuochi
IPA: ''
Definition: der Koch, Köche
Register: ''
Beispielsätze: |-
  Mio padre è *cuoco* in un ristorante stellato Michelin.
  Mein Vater ist *Koch* in einem Michelin-Sternen-Restaurant.
  
  La cucina italiana è famosa per i *cuochi* che sanno preparare la pasta fresca.
  Die italienische Küche ist berühmt für *Köche*, die frische Pasta zubereiten können.
  
  Se fossi *cuoco*, aprirei un ristorante vegetariano in campagna.
  Wenn ich *Koch* wäre, würde ich ein vegetarisches Restaurant auf dem Land eröffnen.
  
  Il *cuoco* che ha preparato questo piatto è un maestro della cucina moderna.
  Der *Koch*, der dieses Gericht zubereitet hat, ist ein Meister der modernen Küche.
  
  Non dimenticherò mai la sera in cui il *cuoco* del paese mi ha insegnato a fare la pizza nel forno a legna.
  Ich werde den Abend nie vergessen, an dem mich der *Koch* des Dorfes gelehrt hat, Pizza im Holzofen zu machen.
