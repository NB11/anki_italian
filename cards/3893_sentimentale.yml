Rang: 3893
Wort: sentimentale
Wortart: adj
Wort mit Artikel: sentimentale
Femininum / Plural: ''
IPA: ''
Definition: sentimental, gefühlvoll
Register: ''
Beispielsätze: |-
  Paolo è un ragazzo molto *sentimentale* e scrive poesie d’amore.
  Paolo ist ein sehr *sentimentaler* Junge und schreibt Liebesgedichte.
  
  La loro relazione è troppo *sentimentale* per i miei gusti.
  Ihre Beziehung ist mir zu *sentimental*.
  
  Ho ricevuto un *sentimentale* telegramma dalla nonna per il mio compleanno.
  Ich habe ein *sentimentales* Telegramm von Oma zu meinem Geburtstag erhalten.
  
  Non mi piacciono le persone che diventano troppo *sentimentali* in pubblico.
  Ich mag keine Menschen, die in der Öffentlichkeit zu *sentimental* werden.
  
  Anche se non lo ammetterebbe mai, dentro di sé è molto *sentimentale* riguardo alla famiglia.
  Auch wenn er es nie zugeben würde, ist er innerlich sehr *sentimental* was die Familie angeht.
