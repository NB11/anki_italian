Rang: 4654
Wort: fortezza
Wortart: n.f
Wort mit Artikel: la fortezza
Femininum / Plural: fortezze
IPA: ''
Definition: die Festung, -en
Register: ''
Beispielsätze: |-
  La *fortezza* diroccata sulla collina attira molti turisti ogni estate.
  Die verfallene *Festung* auf dem Hügel zieht jeden Sommer viele Touristen an.
  
  Sebbene costruita secoli fa, la *fortezza* resiste ancora alle intemperie.
  Obwohl vor Jahrhunderten erbaut, widersteht die *Festung* noch immer den Unwettern.
  
  Non sarebbe saggio assalire la *fortezza* senza prima studiare le sue difese.
  Es wäre unklug, die *Festung* anzugreifen, ohne vorher ihre Verteidigungsanlagen zu studieren.
  
  Nella *fortezza* medievale si svolgono spesso rievocazioni storiche molto affascinanti.
  In der mittelalterlichen *Festung* finden häufig sehr faszinierende historische Nachstellungen statt.
  
  Chi progettava una *fortezza* doveva considerare attentamente la posizione strategica.
  Wer eine *Festung* plante, musste die strategische Lage sorgfältig bedenken.
