Rang: 2808
Wort: acquistare
Wortart: vt
Wort mit Artikel: acquistare
Femininum / Plural: ''
IPA: ''
Definition: kaufen, erwerben
Register: ''
Beispielsätze: |-
  Se vuoi *acquistare* un computer nuovo, aspetta le prossime promozioni in negozio.
  Wenn du einen neuen Computer kaufen willst, warte auf die nächsten Rabattaktionen im Geschäft.
  
  Il sindaco ha deciso di *acquistare* nuove attrezzature per la scuola dell'asilo.
  Der Bürgermeister hat beschlossen, neue Ausstattungen für den Kindergarten zu erwerben.
  
  Avrei voluto *acquistare* quel libro, ma purtroppo era vietato venderlo ai minorenni.
  Ich hätte das Buch gerne gekauft, aber leider war es verboten, es an Minderjährige zu verkaufen.
  
  Nonostante il conflitto tra i due paesi, continuano a *acquistare* prodotti l’uno dall’altro.
  Trotz des Konflikts zwischen den beiden Ländern kaufen sie weiterhin Produkte voneinander.
  
  Se avessi più soldi, *acquisterei* una villa al mare per godermi la pace.
  Wenn ich mehr Geld hätte, würde ich mir eine Villa am Meer kaufen, um die Ruhe zu genießen.
