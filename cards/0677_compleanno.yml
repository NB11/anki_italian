Rang: 677
Wort: compleanno
Wortart: n.m
Wort mit Artikel: il compleanno
Femininum / Plural: compleanni
IPA: ''
Definition: der Geburtstag, -e
Register: ''
Beispielsätze: |-
  Quando è il tuo *compleanno*? Non vedo l'ora di festeggiare con i miei amici.
  Wann ist *dein* Geburtstag? Ich freue mich schon darauf, mit meinen Freunden zu feiern.
  
  Per il *compleanno* di Marco abbiamo organizzato una grande festa con musica, dolci e tanti regali.
  Zu Marcos Geburtstag haben wir eine große Party mit Musik, Süßigkeiten und vielen Geschenken organisiert.
  
  Se non festeggi mai il tuo *compleanno*, rischi di dimenticare date importanti come quella della morte di un caro amico.
  Wenn du *deinen* Geburtstag nie feierst, vergisst du vielleicht wichtige Daten wie den Tod eines guten Freundes.
  
  Quest'anno vorrei regalare a mio padre un viaggio invece di un semplice *compleanno* con la torta e le candeline.
  Dieses Jahr möchte ich meinem Vater eine Reise schenken statt einem *einfachen* Geburtstag mit Kuchen und Kerzen.
  
  Il *compleanno* di mia nonna cade sempre nello stesso giorno, la terza domenica di luglio, come da solito.
  Der Geburtstag meiner Oma fällt immer auf denselben Tag, den dritten Sonntag im Juli, wie *gewöhnlich*.
