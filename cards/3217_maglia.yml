Rang: 3217
Wort: maglia
Wortart: n.m
Wort mit Artikel: la maglia
Femininum / Plural: maglie
IPA: ''
Definition: der Pullover, - / der Strickpulli, -s
Register: ''
Beispielsätze: |-
  Indosso una *maglia* blu mentre lavoro in giardino.
  Ich trage einen *Pullover* im Garten.
  
  Dove hai comprato quella *maglia* che indossi oggi?
  Wo hast du den *Pullover* gekauft, den du heute trägst?
  
  Se avessi tempo, ti aiuterei a scegliere una *maglia* più calda per l’inverno.
  Wenn ich Zeit hätte, würde ich dir helfen, einen *wärmeren Pullover* für den Winter auszusuchen.
  
  Ha promesso di regalargli una *maglia* di lana per Natale, ma poi ha cambiato idea.
  Sie versprach, ihm einen *Wollpullover* zu Weihnachten zu schenken, aber dann änderte sie ihre Meinung.
  
  Nonostante la *maglia* fosse troppo stretta, si rifiutava di cambiarla.
  Obwohl der *Pullover* zu eng war, weigerte sie sich, ihn zu wechseln.
