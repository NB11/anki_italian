Rang: 4518
Wort: epidemia
Wortart: n.f
Wort mit Artikel: l'epidemia
Femininum / Plural: epidemie
IPA: ''
Definition: die Epidemie, -n
Register: ''
Beispielsätze: |-
  L'*epidemia* di influenza ha colpito soprattutto gli anziani.
  Die *Epidemie* von Grippe hat vor allem ältere Menschen getroffen.
  
  Credi che l'*epidemia* possa diffondersi anche nelle aree rurali?
  Glaubst du, dass die *Epidemie* sich auch in ländliche Gebiete ausbreiten könnte?
  
  Nonostante le misure adottate, l'*epidemia* non accenna a diminuire.
  Trotz der ergriffenen Maßnahmen zeigt die *Epidemie* keine Anzeichen des Nachlassens.
  
  Gli esperti temono che l'*epidemia* possa avere effetti gravi sulla sanità pubblica.
  Experten befürchten, dass die *Epidemie* schwerwiegende Auswirkungen auf das öffentliche Gesundheitswesen haben könnte.
  
  Era il 2020 quando scoppiò l'*epidemia* che avrebbe cambiato il mondo.
  Es war das Jahr 2020, als die *Epidemie* ausbrach, die die Welt verändern sollte.
