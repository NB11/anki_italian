Rang: 4204
Wort: dessert
Wortart: n.f
Wort mit Artikel: il dessert
Femininum / Plural: i dessert
IPA: ''
Definition: die Nachspeise, -n
Register: ''
Beispielsätze: |-
  Dopo cena, di solito ordiniamo *il dessert* al ristorante.
  Nach dem Abendessen bestellen wir normalerweise die *Nachspeise* im Restaurant.
  
  Nonostante fosse tardi, hanno servito *un dessert* delizioso che richiedeva almeno un’ora di preparazione.
  Obwohl es spät war, haben sie eine *Nachspeise* serviert, die mindestens eine Stunde Vorbereitung benötigte.
  
  Se avessi più tempo, preparerei *un dessert* alla frutta per tutti gli ospiti.
  Wenn ich mehr Zeit hätte, würde ich eine *Nachspeise* aus Obst für alle Gäste zubereiten.
  
  Il cameriere ci ha consigliato *il dessert* della casa, che si è rivelato una vera delizia.
  Der Kellner hat uns die *Nachspeise* des Hauses empfohlen, die sich als wahre Köstlichkeit erwies.
  
  Credo che *il dessert* più apprezzato sia la panna cotta con salsa al caramello.
  Ich glaube, die *Nachspeise*, die am meisten geschätzt wird, ist die Panna cotta mit Karamellsauce.
