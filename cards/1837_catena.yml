Rang: 1837
Wort: catena
Wortart: n.f
Wort mit Artikel: la catena
Femininum / Plural: catene
IPA: ''
Definition: die Kette, -n
Register: ''
Beispielsätze: |-
  La *catena* d'oro era molto pesante ma bellissima.
  Die *goldene Kette* war sehr schwer, aber wunderschön.
  
  Hanno trovato una *catena* arrugginita nel vecchio cassetto.
  Sie haben eine *verrostete Kette* in der alten Schublade gefunden.
  
  Se non controlli la *catena*, il cancello potrebbe rompersi.
  Wenn du die *Kette* nicht kontrollierst, könnte das Tor kaputtgehen.
  
  La *catena* di trasmissione della bicicletta si è spezzata durante la salita.
  Die *Kette* des Fahrrads ist während der Steigung gerissen.
  
  Mi hanno detto che la *catena* del pesce è più lunga dei pesci stessi!
  Man hat mir gesagt, dass die *Kette* des Fischs länger ist als die Fische selbst!
