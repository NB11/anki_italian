Rang: 1261
Wort: basta
Wortart: n.m
Wort mit Artikel: il basta
Femininum / Plural: i basti
IPA: ''
Definition: es ist genug
Register: ''
Beispielsätze: |-
  Non ne posso più, *basta* con queste proposte assurde!
  Ich kann nicht mehr, es ist *genug* mit diesen verrückten Vorschlägen!
  
  Dimmi quando è *basta*, così possiamo fermarci.
  Sag mir, wenn es *genug* ist, dann können wir aufhören.
  
  Per favore, non chiedere più scusa: *basta* così.
  Bitte hör auf, dich zu entschuldigen – es ist *genug* so.
  
  Se mangi tutto questo cioccolato, poi ti verrà il mal di pancia e *basta*!
  Wenn du all diese Schokolade isst, wirst du Bauchschmerzen bekommen und das ist *genug*!
  
  Dopo anni di lavoro, il collega gli disse: «*Basta*, ho voglia di cambiare vita».
  Nach Jahren der Arbeit sagte ihm der Kollege: „Es ist *genug*, ich möchte mein Leben ändern.“
