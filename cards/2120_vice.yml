IPA: ''
Definition: der Stellvertreter, -
Register: ''
Beispielsätze: |-
  Il *vice* direttore ha preso una decisione importante durante la seduta di ieri.
  Der *Stellvertreter* des Direktors hat während der gestrigen Sitzung eine wichtige Entscheidung getroffen.
  
  Conosci il *vice* preside della nostra scuola? È molto severo.
  Kennst du den *Stellvertreter* unseres Rektors? Er ist sehr streng.
  
  Il *vice* campione del mondo non riuscì a vincere l'ultima gara, ma la prossima volta ce la farà!
  Der *Stellvertreter* des Weltmeisters schaffte es beim letzten Rennen nicht zu gewinnen, aber nächstes Mal schafft er es bestimmt!
  
  Non appena il presidente ha annunciato le sue dimissioni, il *vice* è stato chiamato a sostituirlo.
  Sobald der Präsident seinen Rücktritt bekannt gab, wurde der *Stellvertreter* aufgefordert, ihn zu ersetzen.
  
  Il *vice* allenatore ha spiegato la strategia della prossima puntata di allenamento.
  Der *Stellvertreter* des Trainers erklärte die Strategie für das nächste Training.
