Wort mit Artikel: il riguardo
Femininum / Plural: i riguardi
IPA: ''
Definition: die Rücksicht, -en; die Hinsicht, -en
Register: ''
Beispielsätze: |-
  Non ha *riguardo* per gli animali, è molto crudele.
  Er hat *keine Rücksicht* auf die Tiere, er ist sehr grausam.
  
  La tua critica non ha *riguardo* per le mie intenzioni positive.
  Deine Kritik nimmt *keine Rücksicht* auf meine positiven Absichten.
  
  Per colpa della tua mancanza di *riguardo*, la camera è di nuovo in caos!
  Wegen deiner Rücksichtslosigkeit ist das *Zimmer* schon wieder im Chaos!
  
  La polizia ha fatto domande con *riguardo* al furto in questo quartiere.
  Die Polizei stellte Fragen *im Hinblick* auf den Diebstahl in diesem Viertel.
  
  Hai proprio bisogno di un po’ più di *riguardo* verso il prossimo!
  Du brauchst wirklich ein bisschen mehr *Rücksicht* für deine Mitmenschen.
