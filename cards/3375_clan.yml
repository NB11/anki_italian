Rang: 3375
Wort: clan
Wortart: n.m
Wort mit Artikel: il clan
Femininum / Plural: clan
IPA: ''
Definition: der Clan, -s
Register: ''
Beispielsätze: |-
  Il *clan* mafioso controlla ancora molti quartieri della città.
  Die *Mafia-Familie* kontrolliert immer noch viele Stadtteile.
  
  Durante la guerra, diverse famiglie formarono un *clan* per resistere al nemico.
  Während des Krieges bildeten mehrere Familien eine *Sippe*, um dem Feind zu widerstehen.
  
  Non voglio avere nulla a che fare con quel *clan*, sono troppo loschi.
  Ich möchte nichts mit diesem *Clan* zu tun haben, die sind zu zwielichtig.
  
  Il *clan* dei Borgia era noto per la sua crudeltà nel Rinascimento.
  Die *Borgia-Sippe* war im Renaissance bekannt für ihre Grausamkeit.
  
  Sembra che il *clan* si sia sciolto dopo anni di lotta interna.
  Es scheint, dass sich die *Sippe* nach Jahren des internen Streits aufgelöst hat.
