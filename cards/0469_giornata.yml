Rang: 469
Wort: giornata
Wortart: n.f
Wort mit Artikel: la giornata
Femininum / Plural: le giornate
IPA: ''
Definition: der Tag, -e
Register: ''
Beispielsätze: |-
  La *giornata* era *in*soleggiata e *ho* deciso *di* fare *una* passeggiata.
  Der *Tag* war sonnig und ich habe beschlossen, einen Spaziergang zu machen.
  
  Che *giornata* stupenda! Non *vedo* l’ora *di* tornarci.
  Was für ein toller *Tag*! Ich kann es kaum erwarten, dorthin zurückzukehren.
  
  Domani *avrò* una *giornata* molto impegnata *al* lavoro.
  Morgen werde ich einen sehr anstrengenden *Tag* bei der Arbeit haben.
  
  Se *fosse* stata *una* *giornata* meno faticosa, *sarei* uscito *con* gli amici.
  Wenn es ein weniger anstrengender *Tag* gewesen wäre, wäre ich mit Freunden ausgegangen.
  
  Durante *questa* *giornata* di festa, *mangeremo* tutti insieme *al* ristorante.
  An diesem Feiertags-*Tag* werden wir alle zusammen im Restaurant essen.
