IPA: ''
Definition: die Abtreibung, -en
Register: ''
Beispielsätze: |-
  La legge italiana disciplina anche *l’aborto* terapeutico in casi estremi.
  Das italienische Gesetz regelt auch die *Abtreibung* in extremen Fällen.
  
  Molte donne si sentono in difficoltà quando devono affrontare *l’aborto* per motivi socioeconomici.
  Viele Frauen fühlen sich unsicher, wenn sie aus sozioökonomischen Gründen eine *Abtreibung* vornehmen müssen.
  
  Se non fosse stato per *l’aborto*, la sua vita sarebbe stata completamente diversa.
  Wäre die *Abtreibung* nicht gewesen, wäre ihr Leben völlig anders verlaufen.
  
  Credi che la società debba discutere di più su *l’aborto* senza pregiudizi?
  Glaubst du, dass die Gesellschaft mehr über *Abtreibung* ohne Vorurteile sprechen sollte?
  
  Il medico le spiegò che *l’aborto* spontaneo non era colpa sua, ma una complicazione naturale.
  Der Arzt erklärte ihr, dass die *fehlgeburt* nicht ihre Schuld war, sondern eine natürliche Komplikation.
