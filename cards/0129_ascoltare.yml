Definition: hören, zuhören, anhören
Register: ''
Beispielsätze: |-
  Devi *ascoltare* attentamente le istruzioni.
  Du musst den Anweisungen *zuhören*.
  
  Ho *ascoltato* questa canzone almeno dieci volte.
  Ich habe diesen Song mindestens zehnmal *gehört*.
  
  Stasera *ascolteremo* un concerto in diretta.
  Heute Abend werden wir ein Konzert in *live* hören.
  
  Perché non *ascolti* mai i consigli degli altri?
  Warum hörst du nie auf die Ratschläge anderer?
  
  Vorrei che tu *ascoltassi* più attentamente ciò che dico!
  Ich wünschte, du würdest genauer *zuhören*, was ich sage!
