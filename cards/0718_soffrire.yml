Rang: 718
Wort: soffrire
Wortart: vt
Wort mit Artikel: soffrire
Femininum / Plural: ''
IPA: ''
Definition: leiden, erdulden, aushalten
Register: ''
Beispielsätze: |-
  Mio nonno *soffre* di una malattia cronica da anni.
  Mein Opa *leidet* seit Jahren an einer chronischen Krankheit.
  
  Hai mai *sofferto* di mal di testa frequenti?
  Hast du jemals unter häufigen Kopfschmerzen *gelitten*?
  
  Spero che non dovrai *soffrire* mai per amore.
  Ich hoffe, dass du nie wegen der Liebe *leiden* wirst.
  
  Se avessi saputo la verità, non avrei *sofferto* così tanto.
  Wenn ich die Wahrheit gewusst hätte, hätte ich nicht so sehr *gelitten*.
  
  Dicono che chi *soffre* di insonnia debba evitare il caffè la sera.
  Man sagt, wer unter *Schlaflosigkeit* leidet, sollte abends keinen Kaffee trinken.
