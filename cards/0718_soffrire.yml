Rang: 718
Wort: soffrire
Wortart: v
Wort mit Artikel: soffrire
Femininum / Plural: ''
IPA: ''
Definition: leiden, erleiden
Register: ''
Beispielsätze: |-
  Dopo la caduta, *soffriva* di forti dolori alla gamba destra.
  Nach dem Sturz *litt* er unter starken Schmerzen am rechten Bein.
  
  Credi che *soffrirò* molto dopo questa visita dal dentista?
  Glaubst du, dass ich nach diesem *Besuch* beim Zahnarzt viel leiden werde?
  
  Se non *soffriamo* insieme, non possiamo unire le nostre anime nel dolore.
  Wenn wir nicht zusammen *leiden*, können wir unsere Seelen im Schmerz nicht vereinen.
  
  Ho *sofferto* molto quando ho saputo dell’attacco alla città di notte.
  Ich habe viel *gelitten*, als ich vom Angriff auf die Stadt in der Nacht erfuhr.
  
  Nonostante *soffra* da anni di questa malattia, non ha mai perso la speranza di guarire.
  Obwohl er seit Jahren an dieser *Krankheit* leidet, hat er nie die Hoffnung auf Heilung verloren.
