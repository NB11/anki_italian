Rang: 3434
Wort: satana
Wortart: n.m
Wort mit Artikel: il satana
Femininum / Plural: satan
IPA: ''
Definition: der Teufel, Satan, Dämon
Register: ''
Beispielsätze: |-
  Molti dicono che *Satana* sia la personificazione del male assoluto.
  Viele sagen, dass *der Teufel* die Verkörperung des absoluten Bösen ist.
  
  L’investigatore sospetta che dietro quel crimine ci sia proprio *Satana*.
  Der Ermittler vermutet, dass hinter diesem Verbrechen genau *Satan* steckt.
  
  Se non credi in Dio, come potrai mai temere *Satana*?
  Wenn du nicht an Gott glaubst, wie kannst du dann *den Teufel* fürchten?
  
  Nelle leggende medievali *Satana* viene spesso raffigurato con corna e coda.
  In mittelalterlichen Legenden wird *der Teufel* oft mit Hörnern und Schwanz dargestellt.
  
  Dicono che chi invoca *Satana* finisce per perdere la sua anima immortale.
  Man sagt, dass, wer *den Teufel* anruft, am Ende seine unsterbliche Seele verliert.
