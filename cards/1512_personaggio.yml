Rang: 1512
Wort: personaggio
Wortart: n.m
Wort mit Artikel: il personaggio
Femininum / Plural: personaggi
IPA: ''
Definition: die Figur, -en
Register: ''
Beispielsätze: |-
  Il *personaggio* principale di questo romanzo è molto misterioso e affascina tutti i lettori.
  Die *Hauptfigur* dieses Romans ist sehr geheimnisvoll und fasziniert alle Leser.
  
  Ho incontrato un *personaggio* famoso alla conferenza stampa ieri mattina.
  Ich habe einen *bekannten* Charakter bei der Pressekonferenz gestern Morgen getroffen.
  
  Non mi piacciono i *personaggi* troppo violenti nei film, preferisco quelli pacifici che cercano la pace.
  Ich mag keine *Gewalt* ausübenden Figuren in Filmen, ich bevorzuge friedliche, die nach Frieden streben.
  
  Spero che il regista abbia scelto un *personaggio* adatto a questo ruolo così complesso.
  Ich hoffe, dass der Regisseur eine *geeignete* Rolle für diese so komplexe Figur gewählt hat.
  
  Questo film parla di un *personaggio* che vuole scoprire la verità sulla sua identità.
  Dieser Film handelt von einer *Figur*, die die Wahrheit über ihre Identität herausfinden will.
