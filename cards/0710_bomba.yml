Rang: 710
Wort: bomba
Wortart: n.f
Wort mit Artikel: la bomba
Femininum / Plural: bombe
IPA: ''
Definition: die Bombe, -n
Register: ''
Beispielsätze: |-
  La polizia ha trovato una *bomba* davanti alla stazione.
  Die Polizei hat eine *Bombe* vor dem Bahnhof gefunden.
  
  Se non risolvi questa *bomba* di problema, resterai senza lavoro!
  Wenn du dieses *Bomben*-Problem nicht löst, bleibst du ohne Job!
  
  Hanno usato una *bomba* a mano per aprire il caveau.
  Sie haben eine Hand*granate* benutzt, um den Tresor zu öffnen.
  
  La notizia della *bomba* ha scosso l’intera città per giorni.
  Die Nachricht von der *Bombe* hat die ganze Stadt tagelang erschüttert.
  
  Aveva promesso di stare attento, ma ha fatto una *bomba* di decisione!
  Er hatte versprochen, aufzupassen, aber er hat eine *Bomben*-Entscheidung getroffen!
