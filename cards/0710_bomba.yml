Rang: 710
Wort: bomba
Wortart: n.f
Wort mit Artikel: la bomba
Femininum / Plural: bombe
IPA: ''
Definition: die Bombe, -n
Register: ''
Beispielsätze: |-
  Hanno trovato una *bomba* inesplosa nel centro della città.
  Sie haben eine *ungesprengte Bombe* im Stadtzentrum gefunden.
  
  Non toccare quella *bomba*! Potrebbe esplodere.
  Fass diese *Bombe* nicht an! Sie könnte explodieren.
  
  Le *bombe* sganciate durante la guerra hanno causato enormi danni.
  Die während des Krieges abgeworfenen *Bomben* verursachten enorme Schäden.
  
  Secondo le notizie, la polizia ha disinnescato diverse *bombe*.
  Laut den Nachrichten hat die Polizei mehrere *Bomben* entschärft.
  
  Se vediamo una *bomba*, dobbiamo avvertire subito le autorità.
  Wenn wir eine *Bombe* sehen, müssen wir sofort die Behörden warnen.
