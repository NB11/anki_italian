Rang: 2610
Wort: frequenza
Wortart: n.f
Wort mit Artikel: la frequenza
Femininum / Plural: frequenze
IPA: ''
Definition: die Häufigkeit, -en
Register: ''
Beispielsätze: |-
  La *frequenza* con cui viaggi in Italia è davvero notevole.
  Die *Häufigkeit*, mit der du nach Italien reist, ist wirklich bemerkenswert.
  
  Nonostante la *frequenza* delle lezioni, non ho ancora imparato tutto il vocabolario.
  Trotz der *Häufigkeit* des Unterrichts habe ich das gesamte Vokabular noch nicht gelernt.
  
  Vorresti sapere la *frequenza* con cui il treno arriva in ritardo?
  Möchtest du die *Häufigkeit* wissen, mit der der Zug zu spät kommt?
  
  La *frequenza* cardiaca è un parametro importante per la salute.
  Die *Häufigkeit* des Herzschlags ist ein wichtiger Parameter für die Gesundheit.
  
  Ha aumentato la *frequenza* delle visite dal medico dopo quell’incidente.
  Er hat die *Häufigkeit* der Arztbesuche nach diesem Unfall erhöht.
