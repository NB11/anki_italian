Rang: 4586
Wort: giardiniera
Wortart: n.f
Wort mit Artikel: la giardiniera
Femininum / Plural: giardiniere
IPA: ''
Definition: das Gemüsebeet, -e; der Küchengarten, -¨
Register: ''
Beispielsätze: |-
  La nonna cura con amore il suo *giardino* in primavera e pianta le giardiniere di zucchine vicino al recinto.
  Oma pflegt im Frühling liebevoll ihren Garten und pflanzt die *Gemüsebeete* mit Zucchini nahe dem Zaun an.
  
  Ho comprato un setaccio per raccogliere i semi delle *giardiniere* che ho lasciate marcire nel mio orto.
  Ich habe ein Sieb gekauft, um die Samen der *Küchengärten* zu sammeln, die ich im meinem Beet habe verrotten lassen.
  
  Nonostante le temperature estreme, le *giardiniere* di pomodori hanno resistito grazie alle coperture di plastica.
  Trotz extremer Temperaturen hielten die *Gemüsebeete* mit Tomaten dank der Plastikabdeckungen stand.
  
  Se non innaffi regolarmente le *giardiniere*, le piante di basilico appassiranno entro una settimana.
  Wenn du die *Küchengärten* nicht regelmäßig gießt, werden die Basilikumpflanzen innerhalb einer Woche welken.
  
  La fiera agricola mostrava anche attrezzi innovativi per coltivare le *giardiniere* in modo più efficiente rispetto al passato.
  Auch innovative Werkzeuge zur effizienteren Bewirtschaftung der *Gemüsebeete* im Vergleich zu früher wurden auf der Landwirtschaftsmesse gezeigt.
