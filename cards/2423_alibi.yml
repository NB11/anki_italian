Rang: 2423
Wort: alibi
Wortart: n.m
Wort mit Artikel: l'alibi
Femininum / Plural: alibi
IPA: ''
Definition: das Alibi, -s
Register: ''
Beispielsätze: |-
  L'avvocato ha presentato un *alibi* molto convincente per il suo cliente.
  Der Anwalt hat ein sehr überzeugendes *Alibi* für seinen Mandanten vorgelegt.
  
  Se non hai un *alibi*, come puoi dimostrare che eri altrove in quel momento?
  Wenn du kein *Alibi* hast, wie kannst du dann beweisen, dass du zu dieser Zeit woanders warst?
  
  Gli investigatori stanno cercando di verificare se il *alibi* di quel testimone sia falso.
  Die Ermittler versuchen zu überprüfen, ob das *Alibi* dieses Zeugen falsch ist.
  
  Nonostante il *alibi* perfetto, la polizia non crede ancora alla sua innocenza.
  Trotz des perfekten *Alibis* glaubt die Polizei ihm immer noch nicht.
  
  Ha costruito un *alibi* così solido che nessuno riusciva a smontarlo.
  Er hat ein *Alibi* so solide aufgebaut, dass es niemand widerlegen konnte.
