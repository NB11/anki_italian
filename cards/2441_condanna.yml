Rang: 2441
Wort: condanna
Wortart: n.f
Wort mit Artikel: la condanna
Femininum / Plural: condanne
IPA: ''
Definition: die Verurteilung, -en
Register: ''
Beispielsätze: |-
  La *condanna* del tribunale è stata molto dura per l’imputato.
  Das *Urteil* des Gerichts war sehr hart für den Angeklagten.
  
  Nonostante le prove, la *condanna* è stata annullata per un vizio di forma.
  Trotz der Beweise wurde die *Verurteilung* wegen eines Formfehlers aufgehoben.
  
  Vorresti sapere se la *condanna* sarà definitiva o se ci sarà un appello?
  Möchtest du wissen, ob die *Verurteilung* endgültig sein wird oder ob es eine Berufung geben wird?
  
  Dopo dieci anni, l’imputato ha ottenuto la revisione della sua *condanna*.
  Nach zehn Jahren erhielt der Angeklagte eine Überprüfung seiner *Verurteilung*.
  
  La *condanna* a morte è ancora in vigore in alcuni paesi.
  Die *Todesstrafe* ist in einigen Ländern noch in Kraft.
