Rang: 824
Wort: pesce
Wortart: n.m
Wort mit Artikel: il pesce
Femininum / Plural: pesci
IPA: ''
Definition: der Fisch, -e
Register: ''
Beispielsätze: |-
  A *pesce* è saltato fuori dall'acqua e ha preso la mia esca.
  Ein *Fisch* ist aus dem Wasser gesprungen und hat meinen Köder genommen.
  
  Se vuoi cucinare un pranzo leggero, prova questa ricetta con del *pesce* fresco.
  Wenn du ein leichtes Mittagessen kochen möchtest, probiere dieses Rezept mit frischem *Fisch*.
  
  Nonostante il *pesce* fosse crudo, lo abbiamo mangiato volentieri al ristorante giapponese.
  Obwohl der *Fisch* roh war, haben wir ihn im japanischen Restaurant gerne gegessen.
  
  Il nonno di Henry ha sempre detto che catturare un *pesce* grosso è una questione di pazienza e fortuna.
  Henrys Großvater hat immer gesagt, dass das Fangen eines großen *Fisches* eine Frage von Geduld und Glück ist.
  
  In questa zona del mare, i pescatori locali trovano spesso *pesci* di dimensioni straordinarie.
  In diesem Meeresgebiet finden die örtlichen Fischer oft *Fische* von außergewöhnlicher Größe.
