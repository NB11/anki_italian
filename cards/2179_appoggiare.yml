Rang: 2179
Wort: appoggiare
Wortart: v
Wort mit Artikel: appoggiare
Femininum / Plural: ''
IPA: ''
Definition: stützen, lehnen, anlehnen
Register: ''
Beispielsätze: |-
  Mi piace *appoggiare* la testa sul divano quando guardo un film.
  Ich lehne meinen Kopf gerne auf das Sofa, wenn ich einen Film schaue.
  
  Appoggia il libro sulla scrivania prima di uscire!
  *Stütze* das Buch auf dem Schreibtisch ab, bevor du gehst!
  
  Ha *appoggiato* la scala al muro con attenzione.
  Er hat die Leiter sorgfältig an die Wand gelehnt.
  
  Se non *appoggi* bene il piede, rischi di scivolare.
  Wenn du den Fuß nicht richtig abstützt, rutschst du leicht aus.
  
  Il governo dovrebbe *appoggiare* maggiormente le piccole imprese per crescere.
  Die Regierung sollte kleine Unternehmen stärker *unterstützen*, damit sie wachsen können.
