Rang: 1188
Wort: video
Wortart: n.m
Wort mit Artikel: il video
Femininum / Plural: video
IPA: ''
Definition: das Video, -s
Register: ''
Beispielsätze: |-
  Ho registrato un *video* della festa con il cellulare ieri sera.
  Ich habe gestern Abend mit dem Handy ein *Video* von der Feier aufgenommen.
  
  Quel regista sta girando una nuova serie di *video* per YouTube.
  Jener Regisseur dreht gerade eine neue Serie von *Videos* für YouTube.
  
  Se non troviamo il *video*, non possiamo sostenere la nostra tesi al convegno.
  Wenn wir das *Video* nicht finden, können wir unsere These auf der Konferenz nicht stützen.
  
  Chissà perché hanno cancellato il *video* che hai caricato ieri attraverso il loro sito!
  Wer weiß, warum sie das *Video* gelöscht haben, das du gestern über ihre Website hochgeladen hast!
  
  Mentre osservava le sue impronte digitali, gli è venuto in mente che il *video* della sicurezza avrebbe potuto aiutare a risolvere il caso.
  Während er ihre Fingerabdrücke betrachtete, fiel ihm ein, dass das Sicherheits-*Video* den Fall hätte lösen können.
