Beispielsätze: |-
  Ha detto che *letteralmente* gli si è fermato il cuore quando ha visto il risultato.
  Er hat gesagt, dass ihm *buchstäblich* das Herz stehengeblieben ist, als er das Ergebnis gesehen hat.
  
  La polizia sostiene che l’attentato sia avvenuto *letteralmente* nel bel mezzo della cerimonia.
  Die Polizei behauptet, dass der Anschlag *buchstäblich* mitten in der Zeremonie stattgefunden hat.
  
  Se *letteralmente* non si può respirare, allora il locale è affollato oltre ogni limite.
  Wenn man *buchstäblich* keine Luft mehr bekommt, dann ist der Raum überfüllt.
  
  Ho letto che il nuovo grattacielo si estende *letteralmente* verso il cielo.
  Ich habe gelesen, dass das neue Hochhaus sich *buchstäblich* in den Himmel erstreckt.
  
  Quando ha saputo la notizia, è rimasto *letteralmente* senza parole.
  Als er die Nachricht hörte, ist ihm *buchstäblich* die Sprache weggeblieben.
