Rang: 3214
Wort: carrozza
Wortart: n.f
Wort mit Artikel: la carrozza
Femininum / Plural: carrozze
IPA: ''
Definition: die Kutsche, -n
Register: ''
Beispielsätze: |-
  Nel *carrozza* del duca c'erano molti baffi ben curati.
  In der *Kutsche* des Herzogs waren viele gepflegte Schnurrbärte.
  
  Ho trovato un frammento di vetro antico dentro la *carrozza* abbandonata.
  Ich habe ein altes *Glasstück* im Inneren der verlassenen Kutsche gefunden.
  
  Se avessimo più tempo, esploreremmo le *carrozze* storiche del museo ferroviario.
  Wenn wir mehr Zeit hätten, würden wir die historischen *Kutschen* des Eisenbahnmuseums erkunden.
  
  Nonostante la chiusura forzata, il *carrozza* reale è rimasto intatto per secoli.
  Trotz der Zwangsschließung blieb die königliche *Kutsche* jahrhundertelang unversehrt.
  
  La *carrozza* che attendeva alla stazione era decorata con simboli di antiche civiltà.
  Die *Kutsche*, die am Bahnhof wartete, war mit Symbolen alter Kulturen verziert.
