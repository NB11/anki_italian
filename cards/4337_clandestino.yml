Beispielsätze: |-
  L’immigrazione *clandestina* è un problema che preoccupa molti paesi europei.
  Die *illegale* Einwanderung ist ein Problem, das viele europäische Länder beschäftigt.
  
  Hanno organizzato un incontro *clandestino* per evitare di essere scoperti dalla polizia.
  Sie haben ein *heimliches* Treffen organisiert, um nicht von der Polizei entdeckt zu werden.
  
  Se avessi saputo che il documento era *clandestino*, non lo avrei mai firmato.
  Wenn ich gewusst hätte, dass das Dokument *illegal* war, hätte ich es nie unterschrieben.
  
  La loro relazione *clandestina* è durata anni senza che nessuno lo sapesse.
  Ihre *geheime* Beziehung dauerte jahrelang, ohne dass es jemand wusste.
  
  In alcuni paesi, la stampa *clandestina* diffonde notizie censurate dal governo.
  In einigen Ländern verbreitet die *illegale* Presse Nachrichten, die von der Regierung zensiert werden.
