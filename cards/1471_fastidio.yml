Rang: 1471
Wort: fastidio
Wortart: n.m
Wort mit Artikel: il fastidio
Femininum / Plural: i fastidi
IPA: ''
Definition: die Belästigung, die Plage, die Störung, -en
Register: ''
Beispielsätze: |-
  Mi dà *fastidio* quando qualcuno mastica rumorosamente durante una conferenza.
  Mich stört es, wenn jemand während einer *Veranstaltung* laut kaut.
  
  Non ho più *fastidio* alle ginocchia da quando ho iniziato la terapia con il nuovo farmaco.
  Ich habe keine *Schmerzen* mehr in den Knien, seit ich die neue Medizin nehme.
  
  Se continui a fare *fastidio* al cane, dovrò allontanarti dalla piscina.
  Wenn du dem Hund weiter *Ärger* machst, muss ich dich vom Pool weglassen.
  
  Ha provato a nascondere il *fastidio* che provava per la decisione della giuria, ma si vedeva benissimo.
  Er versuchte, den *Unmut* über den Beschluss der Jury zu verbergen, aber es war offensichtlich.
  
  Il *fastidio* che provo nei confronti della sua arroganza è ormai insopportabile.
  Die *Abneigung*, die ich gegenüber seiner Arroganz empfinde, ist mittlerweile unerträglich.
