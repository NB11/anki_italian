Rang: 693
Wort: lezione
Wortart: n.f
Wort mit Artikel: la lezione
Femininum / Plural: lezioni
IPA: ''
Definition: die Lektion, -en
Register: ''
Beispielsätze: |-
  La *lezione* di italiano comincia alle otto di mattina.
  Die *Italienischlektionen* beginnen um acht Uhr morgens.
  
  Ho perso la *lezione* di storia perché avevo fame e non ho mangiato nulla.
  Ich habe die *Geschichtsstunde* verpasst, weil ich Hunger hatte und nichts gegessen habe.
  
  Se non avessi sbagliato, ora potrei seguire la *lezione* senza problemi.
  Wenn ich mich nicht geirrt hätte, könnte ich der *Unterrichtsstunde* jetzt problemlos folgen.
  
  Dopo aver finito la *lezione*, andrò a bere una birra con gli amici al bar.
  Nach *Abschluss der Lektion* gehe ich mit Freunden ein Bier in der Bar trinken.
  
  Mi auguro che la *lezione* di domani sia più interessante di quella di ieri.
  Ich hoffe, dass die *Stunde* von morgen interessanter ist als die von gestern.
