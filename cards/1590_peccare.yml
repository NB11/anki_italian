Rang: 1590
Wort: peccare
Wortart: vi
Wort mit Artikel: peccare
Femininum / Plural: ''
IPA: ''
Definition: sündigen
Register: ''
Beispielsätze: |-
  Alcuni credono che *peccare* sia inevitabile nella vita moderna.
  Manche glauben, dass *sündigen* im modernen Leben unvermeidbar ist.
  
  Se non *peccassi* mai, forse non capirei la debolezza degli altri.
  Wenn ich nie *sündigen* würde, vielleicht würde ich die Schwäche anderer nicht verstehen.
  
  Ha confessato di aver *peccato* per la prima volta a diciotto anni.
  Er hat gestanden, zum ersten Mal mit achtzehn *gesündigt* zu haben.
  
  Dio non ci obbliga ad *peccare*, ma ci lascia liberi di scegliere.
  Gott zwingt uns nicht, *zu sündigen*, aber lässt uns frei wählen.
  
  Anche se i preti *peccano* come tutti, molti li seguono lo stesso.
  Auch wenn Priester *sündigen* wie alle, folgen ihnen viele trotzdem.
