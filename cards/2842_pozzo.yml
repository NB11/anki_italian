Rang: 2842
Wort: pozzo
Wortart: n.m
Wort mit Artikel: il pozzo
Femininum / Plural: pozzi
IPA: ''
Definition: der Brunnen, -
Register: ''
Beispielsätze: |-
  Nel giardino c'è un *pozzo* molto antico.
  Im Garten gibt es einen sehr alten *Brunnen*.
  
  Ha attinto l'acqua dal *pozzo* con un secchio di legno.
  Er hat das Wasser mit einem Holzeimer aus dem *Brunnen* geschöpft.
  
  Non sapevo che in questa zona esistesse ancora un *pozzo* nascosto tra i cespugli.
  Ich wusste nicht, dass es in dieser Gegend noch einen versteckten *Brunnen* zwischen den Büschen gibt.
  
  Speriamo che il *pozzo* non sia inquinato dopo le recenti piogge.
  Wir hoffen, dass der *Brunnen* nach den recente Regenfällen nicht verschmutzt ist.
  
  L'ingegnere ha proposto di chiudere il *pozzo* per motivi di sicurezza.
  Der *Ingenieur* hat vorgeschlagen, den Brunnen aus Sicherheitsgründen zu schließen.
