Rang: 1597
Wort: visione
Wortart: n.f
Wort mit Artikel: la visione
Femininum / Plural: visioni
IPA: ''
Definition: die Vision, -en, die Vorstellung, -en
Register: ''
Beispielsätze: |-
  Dopo aver letto quel romanzo, ho avuto una *visione* molto chiara di come sarebbe il futuro.
  Nach dem Lesen dieses Romans hatte ich eine sehr klare *Vorstellung*, wie die Zukunft aussehen würde.
  
  La *visione* del regista sul film è stata così affascinante che tutti i fan hanno applaudito.
  Die *Vision* des Regisseurs zum Film war so faszinierend, dass alle Fans applaudiert haben.
  
  Secondo alcuni studiosi, la *visione* di Leonardo da Vinci era avanti di secoli rispetto al suo tempo.
  Laut einigen Wissenschaftlern war die *Vorstellung* von Leonardo da Vinci Jahrhunderte seiner Zeit voraus.
  
  Se hai una *visione* chiara dei tuoi obiettivi, sarà più facile soddisfare la qualità della tua vita.
  Wenn du eine klare *Vision* deiner Ziele hast, wird es einfacher sein, die Qualität deines Lebens zu befriedigen.
  
  Ho parlato della mia *visione* del progetto con il professionista, ma lui ha detto che è solo un’idea irrealizzabile.
  Ich habe meine *Vision* für das Projekt mit dem Profi besprochen, aber er sagte, es sei nur eine unrealistische Idee.
