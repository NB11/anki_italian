Rang: 505
Wort: camera
Wortart: n.f
Wort mit Artikel: la camera
Femininum / Plural: telecamere
IPA: ''
Definition: die Kamera, -s
Register: ''
Beispielsätze: |-
  Ho acquistato una nuova *camera* per il mio viaggio in Giappone.
  Ich habe eine neue *Kamera* für meine Reise nach Japan gekauft.
  
  Mentre ero in bagno, ho sentito suonare il campanello della *camera* di sicurezza.
  Während ich im Bad war, habe ich die Klingel der Überwachungs*kamera* gehört.
  
  Il ladro è stato catturato perché c'era una *camera* che lo riprendeva.
  Der Dieb wurde gefasst, weil es eine *Kamera* gab, die ihn aufnahm.
  
  Per documentare il nostro viaggio, abbiamo portato con noi due *camere* professionali.
  Um unsere Reise zu dokumentieren, haben wir zwei professionelle *Kameras* mitgenommen.
  
  La *camera* di sorveglianza ha registrato ogni movimento nella stanza, perciò ci sentiamo più sicuri.
  Die Überwachungs*kamera* hat jede Bewegung im Raum aufgezeichnet, deshalb fühlen wir uns sicherer.
