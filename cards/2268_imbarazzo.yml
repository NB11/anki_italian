Rang: 2268
Wort: imbarazzo
Wortart: n.m
Wort mit Artikel: lo imbarazzo
Femininum / Plural: gli imbarazzi
IPA: ''
Definition: die Verlegenheit, die Peinlichkeit, die Befangenheit
Register: ''
Beispielsätze: |-
  Ho provato molto *imbarazzo* quando ho inciampato davanti a tutti.
  Ich habe große *Verlegenheit* empfunden, als ich vor allen gestolpert bin.
  
  È un *imbarazzo* che non sappia come comportarmi in questa situazione.
  Es ist eine *Peinlichkeit*, dass ich nicht weiß, wie ich mich in dieser Situation verhalten soll.
  
  Sentiva tanto *imbarazzo* che avrebbe voluto scomparire.
  Er hatte so große *Befangenheit*, dass er am liebsten verschwunden wäre.
  
  Nonostante l’*imbarazzo*, riuscì a finire il discorso senza arrossire.
  Trotz der *Verlegenheit* gelang es ihm, die Rede ohne zu erröten zu beenden.
  
  Se provi *imbarazzo* per qualcosa, parlarne spesso aiuta a superarlo.
  Wenn du *Peinlichkeit* für etwas empfindest, hilft es oft, darüber zu sprechen.
