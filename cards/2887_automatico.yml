Rang: 2887
Wort: automatico
Wortart: adj
Wort mit Artikel: automatico
Femininum / Plural: ''
IPA: ''
Definition: automatisch
Register: ''
Beispielsätze: |-
  Le porte dell’ascensore sono *automatiche* e si aprono senza bisogno di premere pulsanti.
  Die Aufzugtüren sind *automatisch* und öffnen sich ohne Knopfdruck.
  
  Nonostante l’*automatico* cambiamento delle marce, la macchina consuma ancora troppo carburante.
  Trotz des *automatischen* Gangwechsels verbraucht das Auto immer noch zu viel Benzin.
  
  Se il sistema non funziona *automaticamente*, dovremo avviarlo manualmente ogni volta.
  Falls das System nicht *automatisch* funktioniert, müssen wir es jedes Mal manuell starten.
  
  Preferisco le lavatrici *automatiche* perché non devo stare lì a controllare ogni fase del lavaggio.
  Ich bevorzuge *automatische* Waschmaschinen, weil ich nicht jede Phase der Wäsche überwachen muss.
  
  Il controllo *automatico* dei freni aiuta a prevenire molti incidenti sulle strade bagnate.
  Die *automatische* Bremsregelung hilft, viele Unfälle auf nassen Straßen zu verhindern.
