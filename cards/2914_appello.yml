Rang: 2914
Wort: appello
Wortart: n.m
Wort mit Artikel: l'appello
Femininum / Plural: appelli
IPA: ''
Definition: der Aufruf, -e, die Berufung, -en
Register: ''
Beispielsätze: |-
  Ha perso l'*appello* per il concorso di luglio perché è arrivato tardi.
  Er hat den *Aufruf* für den Wettbewerb im Juli verpasst, weil er zu spät gekommen ist.
  
  L'*appello* dei vincitori è stato pubblicato ieri sulla bacheca della scuola.
  Die *Liste* der Gewinner wurde gestern am Schwarzen Brett der Schule veröffentlicht.
  
  Se non rispondi all'*appello*, verranno segnalate le tue assenze.
  Wenn du nicht auf den *Aufruf* antwortest, werden deine Absenzen gemeldet.
  
  Ci sarà un altro *appello* per i ritardatari domani mattina alle otto.
  Es wird einen weiteren *Aufruf* für die Säumigen morgen früh um acht geben.
  
  Nel suo discorso, il professore ha fatto *appello* alla responsabilità degli studenti.
  In seiner Rede hat der Professor die Verantwortung der Studenten in den *Aufruf* aufgenommen.
