Rang: 3678
Wort: inginocchiarsi
Wortart: vi
Wort mit Artikel: inginocchiarsi
Femininum / Plural: ''
IPA: ''
Definition: sich hinknien, knien
Register: ''
Beispielsätze: |-
  Ogni mattina si *inginocchia* davanti al letto per pregare.
  Jeden Morgen kniet er sich vor dem Bett hin, um zu beten.
  
  Dopo la caduta, lui si dovette *inginocchiare* per raccogliere i libri sparsi.
  Nach dem Sturz musste er sich hinknien, um die verstreuten Bücher aufzuheben.
  
  Benchè fosse stanco, il cavaliere si *inginocchiò* di fronte al re senza esitare.
  Obwohl er müde war, kniete sich der Ritter ohne Zögern vor den König.
  
  Se non trovi l’anello, *inginocchiati* e guarda bene sotto il divano!
  Wenn du den Ring nicht findest, knie dich hin und schau genau unter das Sofa!
  
  Non appena arrivò la notizia, la nonna si *inginocchiò* a terra con le lacrime agli occhi.
  Sobald die Nachricht kam, kniete sich die Großmutter mit Tränen in den Augen auf den Boden.
