Rang: 1376
Wort: direttamente
Wortart: adv
Wort mit Artikel: direttamente
Femininum / Plural: ''
IPA: ''
Definition: direkt, unmittelbar
Register: ''
Beispielsätze: |-
  Il treno arriverà *direttamente* alla stazione senza fermate intermedie.
  Der Zug wird *direkt* am Bahnhof ankommen ohne Zwischenstopps.
  
  Ho inviato la lettera *direttamente* al direttore, senza passare per la segreteria.
  Ich habe den Brief *direkt* an den Direktor geschickt, ohne über die Verwaltung zu gehen.
  
  L’ispettore ha voluto parlare *direttamente* con il colpevole, senza intermediari.
  Der Inspektor wollte *direkt* mit dem Schuldigen sprechen, ohne Mittelsmänner.
  
  Questo vino viene *direttamente* dal vigneto di mio zio in Toscana.
  Dieser Wein kommt *direkt* aus dem Weinberg meines Onkels in der Toskana.
  
  Se hai una voglia particolare, vai *direttamente* nella pasticceria all’angolo.
  Wenn du einen besonderen Wunsch hast, geh *direkt* in die Konditorei an der Ecke.
