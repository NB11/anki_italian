Rang: 2114
Wort: isolare
Wortart: v
Wort mit Artikel: isolare
Femininum / Plural: ''
IPA: ''
Definition: isolieren, absondern, trennen
Register: ''
Beispielsätze: |-
  Per *isolare* la stanza dal freddo, abbiamo montato uno strato di lana di roccia.
  Um den Raum vom Kälte *zu isolieren*, haben wir eine Schicht aus Steinwolle angebracht.
  
  Il governo intende *isolare* il paese dalle tensioni internazionali.
  Die Regierung beabsichtigt, das Land von den internationalen Spannungen *abzusondern*.
  
  Se non avessimo *isolato* il circuito elettrico, ci sarebbe stato un corto circuito.
  Hätten wir den Stromkreis nicht *isoliert*, wäre es zu einem Kurzschluss gekommen.
  
  Gli scienziati stanno cercando un metodo per *isolare* il virus in laboratorio.
  Die Wissenschaftler suchen nach einer Methode, um das Virus im Labor *abzusondern*.
  
  Non è giusto *isolare* qualcuno solo perché la sua opinione è diversa dalla nostra.
  Es ist nicht fair, jemanden *auszugrenzen*, nur weil seine Meinung anders ist als unsere.
