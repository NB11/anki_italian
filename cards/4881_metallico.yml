Rang: 4881
Wort: metallico
Wortart: adj
Wort mit Artikel: metallico
Femininum / Plural: ''
IPA: ''
Definition: aus Metall, metallisch
Register: ''
Beispielsätze: |-
  La scatola che hai in mano è di plastico, ma io preferisco quella *metallica*.
  Die Schachtel, die du in der Hand hast, ist aus Kunststoff, aber ich bevorzuge die *metallische*.
  
  Il suono *metallico* del tamburo risuonava nella piazza vuota.
  Der *metallische* Klang der Trommel hallte auf dem leeren Platz wider.
  
  Se avessi un bicchiere *metallico*, potrei bere l'acqua senza preoccuparmi.
  Wenn ich ein *metallisches* Glas hätte, könnte ich das Wasser bedenkenlos trinken.
  
  Nonostante la sua apparenza robusta, la struttura era realizzata con un materiale *metallico* molto leggero.
  Trotz ihres robusten Aussehens war die Struktur aus einem *metallischen* Material gefertigt, das sehr leicht war.
  
  Ha insistito per comprare un ombrello *metallico* anche se costava molto di più.
  Er bestand darauf, einen *metallischen* Regenschirm zu kaufen, obwohl er viel teurer war.
