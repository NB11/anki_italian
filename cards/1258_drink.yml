Rang: 1258
Wort: drink
Wortart: n.m
Wort mit Artikel: il drink
Femininum / Plural: i drink
IPA: ''
Definition: das Getränk, -e
Register: ''
Beispielsätze: |-
  Al *drink* della sera preferisco un bicchiere di vino rosso.
  Zum *Getränk* am Abend bevorzuge ich ein Glas Rotwein.
  
  Vuoi un *drink* analcolico o preferisci qualcosa di alcolico?
  Möchtest du ein *alkoholfreies Getränk* oder etwas mit Alkohol?
  
  Ho ordinato un *drink* speciale che non conoscevo prima.
  Ich habe ein besonderes *Getränk* bestellt, das ich noch nie kannte.
  
  Nel *drink* c’erano troppe calorie, quindi ho chiesto dell’acqua.
  In dem *Getränk* waren zu viele Kalorien, also habe ich Wasser bestellt.
  
  Se vuoi un *drink* rinfrescante, prova quello alla frutta che ho visto al mercato.
  Wenn du ein *erfrischendes Getränk* möchtest, probier das mit Obst, das ich auf dem Markt gesehen habe.
