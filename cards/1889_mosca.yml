Rang: 1889
Wort: mosca
Wortart: n.f
Wort mit Artikel: la mosca
Femininum / Plural: mosche
IPA: ''
Definition: die Fliege, -n
Register: ''
Beispielsätze: |-
  Ho visto una *mosca* che ronzava intorno alla frutta sul tavolo.
  Ich habe eine *Fliege* gesehen, die um die Früchte auf dem Tisch summte.
  
  Non riesco a dormire perché questa *mosca* non smette di ronzare vicino alla mia testa.
  Ich kann nicht schlafen, weil diese *Fliege* nicht aufhört, in der Nähe meines Kopfes zu summen.
  
  Se continui a lasciare il cibo in giro, attirerai *mosche* in cucina.
  Wenn du weiterhin Essen herumliegen lässt, wirst du *Fliegen* in der Küche anlocken.
  
  La *mosca* che ho catturato ieri con la ragnatela era enorme!
  Die *Fliege*, die ich gestern mit dem Spinnennetz gefangen habe, war riesig!
  
  Quando ero bambino, mi divertivo a inseguire le *mosche* con un retino.
  Als ich ein Kind war, habe ich mich damit amüsiert, *Fliegen* mit einem Kescher zu jagen.
