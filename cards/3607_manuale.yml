Rang: 3607
Wort: manuale
Wortart: n.m
Wort mit Artikel: il manuale
Femininum / Plural: manuali
IPA: ''
Definition: das Handbuch, -bücher
Register: ''
Beispielsätze: |-
  Ho comprato un *manuale* di grammatica italiana per prepararmi all'esame.
  Ich habe ein *Handbuch* der italienischen Grammatik gekauft, um mich auf die Prüfung vorzubereiten.
  
  Nel *manuale* di istruzioni c'è un capitolo dedicato alla sicurezza.
  In dem *Handbuch* mit den Anweisungen gibt es ein Kapitel zur Sicherheit.
  
  Se non capisci qualcosa, consulta pure il *manuale* che ti ho regalato.
  Wenn du etwas nicht verstehst, sieh einfach in dem *Handbuch* nach, das ich dir geschenkt habe.
  
  Nonostante le mie aspettative, il *manuale* non era così utile come speravo.
  Trotz meiner *Erwartungen* war das Handbuch nicht so nützlich, wie ich gehofft hatte.
  
  Il professore ha consigliato un *manuale* più aggiornato per studiare la storia moderna.
  Der Professor hat ein aktuelleres *Handbuch* empfohlen, um die moderne Geschichte zu studieren.
