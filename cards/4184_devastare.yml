Rang: 4184
Wort: devastare
Wortart: vt
Wort mit Artikel: devastare
Femininum / Plural: ''
IPA: ''
Definition: verwüsten, verheeren
Register: ''
Beispielsätze: |-
  L'uragano ha *devastato* interi villaggi lungo la costa.
  Der Hurrikan hat ganze Dörfer entlang der Küste *verwüstet*.
  
  Se non avessimo speso così tanto, la banca non avrebbe *devastato* il nostro conto.
  Hätten wir nicht so viel ausgegeben, hätte die Bank unser Konto nicht *leer geräumt*.
  
  È terribile pensare che una singola decisione possa *devastare* l’economia di un paese.
  Es ist schrecklich, sich vorzustellen, dass eine einzige Entscheidung *die Wirtschaft eines Landes ruinieren* kann.
  
  Gli ho detto che, qualora avesse continuato così, avrebbe *devastato* la sua reputazione per sempre.
  Ich habe ihm gesagt, dass er bei weiterem solchen Verhalten seinen Ruf *für immer ruinieren* würde.
  
  La guerra *devastò* non solo le città, ma anche le speranze di una generazione intera.
  Der Krieg *verwüstete* nicht nur die Städte, sondern auch die Hoffnungen einer ganzen Generation.
