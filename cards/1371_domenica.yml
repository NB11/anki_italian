Rang: 1371
Wort: domenica
Wortart: n.m
Wort mit Artikel: la domenica
Femininum / Plural: domeniche
IPA: ''
Definition: der Sonntag, -e
Register: ''
Beispielsätze: |-
  Ogni *domenica* vado a trovare i miei nonni che abitano in campagna.
  Sonntags* gehe ich meine Großeltern besuchen, die auf dem Land wohnen.
  
  Spero che domani *domenica* non piova perché abbiamo organizzato una gita in barca!
  Ich hoffe, dass es morgen Sonntag* nicht regnet, denn wir haben einen Ausflug mit dem Boot geplant.
  
  Il prossimo fine settimana, se non *domenica*, penso di andare al mare.
  Nächstes Wochenende, falls es nicht Sonntag* ist, möchte ich ans Meer fahren.
  
  Da quando si è trasferita in città, lei sente la mancanza delle passeggiate nella natura di ogni *domenica*.
  Seit sie in die Stadt gezogen ist, vermisst sie die Sonntags*spaziergänge in der Natur.
  
  Gli sposi hanno scelto proprio la *domenica* del 15 luglio per celebrare il loro matrimonio nel parco.
  Die Brautleute haben ausgerechnet den Sonntag* des 15. Juli gewählt, um ihre Hochzeit im Park zu feiern.
