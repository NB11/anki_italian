Beispielsätze: |-
  Credo che l'acqua di questa *pura* sorgente sia la migliore che abbia mai bevuto.
  Ich glaube, das Wasser dieser *reinen* Quelle ist das beste, das ich je getrunken habe.
  
  Anche se era stanco dopo il viaggio, il suo sorriso rimaneva *puro* come quello di un bambino.
  Auch wenn er nach der Reise müde war, blieb sein Lächeln *rein* wie das eines Kindes.
  
  La polizia ha trovato un documento di identità *puro*, senza alcuna alterazione.
  Die Polizei fand einen *reinen* Personalausweis ohne jede Veränderung.
  
  Nonostante le difficoltà, la sua fede rimase *pura* e inalterata.
  Trotz der Schwierigkeiten blieb sein Glaube *rein* und unverändert.
  
  Se mescoli il latte con l'acqua, il risultato non sarà più *puro*.
  Wenn du Milch mit Wasser mischst, wird das Ergebnis nicht mehr *rein* sein.
