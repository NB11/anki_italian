Rang: 823
Wort: puro
Wortart: adj
Wort mit Artikel: puro
Femininum / Plural: puri
IPA: ''
Definition: rein, pur
Register: ''
Beispielsätze: |-
  L'acqua di questa montagna è *pura* e cristallina.
  Das Wasser aus diesem Berg ist *rein* und kristallklar.
  
  Non credere a tutto ciò che senti, a volte le notizie non sono *pure* e semplici.
  Glaube nicht alles, was du hörst, manchmal sind die Nachrichten nicht *rein* und einfach.
  
  Vor diete *pure* di frutta esistono, ma non sono salutari a lungo termine.
  Es gibt *reine* Obstdiäten, aber sie sind langfristig nicht gesund.
  
  Che sia *puro* caso o destino, ci siamo incontrati di nuovo dopo tanti anni.
  Ob es *reiner* Zufall oder Schicksal ist, wir haben uns nach so vielen Jahren wieder getroffen.
  
  A volte la verità è troppo *pura* per essere accettata da tutti.
  Manchmal ist die Wahrheit zu *rein*, um von allen akzeptiert zu werden.
