Rang: 3082
Wort: partorire
Wortart: v
Wort mit Artikel: partorire
Femininum / Plural: ''
IPA: ''
Definition: gebären, zur Welt bringen
Register: ''
Beispielsätze: |-
  La mucca ha *partorito* un bellissimo vitellino ieri mattina.
  Die Kuh hat gestern Morgen ein wunderschönes Kalb *zur Welt gebracht*.
  
  Se non fosse per il veterinario, non so se la cagna avrebbe potuto *partorire* senza problemi.
  Wäre da nicht der Tierarzt, ich weiß nicht, ob die Hündin hätte *gebären* können ohne Probleme.
  
  Ti ricordi quando quella famosa attrice ha *partorito* in diretta televisiva?
  Erinnerst du dich, als diese berühmte Schauspielerin während einer Live-Sendung *geboren* hat?
  
  Nonostante le complicazioni, la madre è riuscita comunque a *partorire* una bambina sana e forte.
  Trotz der Komplikationen hat die Mutter trotzdem ein gesundes und starkes Mädchen *zur Welt gebracht*.
  
  Se avessero saputo prima che rischiava di non poter *partorire*, avrebbero organizzato tutto diversamente.
  Wenn sie vorher gewusst hätten, dass sie möglicherweise nicht *gebären* könnte, hätten sie alles anders organisiert.
