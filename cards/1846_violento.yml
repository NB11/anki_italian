Rang: 1846
Wort: violento
Wortart: adj
Wort mit Artikel: violento
Femininum / Plural: ''
IPA: ''
Definition: gewalttätig, brutal
Register: ''
Beispielsätze: |-
  Il *violento* temporale ha distrutto molti alberi nella foresta.
  Der *gewalttätige* Sturm hat viele Bäume im Wald zerstört.
  
  Non sopporto le persone *violente* che non sanno comunicare pacificamente.
  Ich kann Menschen, die *gewalttätig* sind und nicht friedlich kommunizieren können, nicht ertragen.
  
  Se fossi stato meno *violento* con tuo fratello, ora non litighereste.
  Wenn du weniger *gewalttätig* zu deinem Bruder gewesen wärst, würdet ihr euch jetzt nicht streiten.
  
  Le immagini *violente* nei film dovrebbero avere un limite per evitare di influenzare i giovani.
  Gewalttätige Szenen in Filmen sollten Grenzen haben, um Jugendliche nicht zu beeinflussen.
  
  È meglio evitare delle situazioni dove potresti diventare *violento*, anche sotto provocazione.
  Man sollte Situationen vermeiden, in denen man *gewalttätig* werden könnte, selbst unter Provokation.
