Rang: 3620
Wort: supervisore
Wortart: n.m
Wort mit Artikel: il supervisore
Femininum / Plural: supervisori
IPA: ''
Definition: der Vorgesetzte, -n
Register: ''
Beispielsätze: |-
  Il *supervisore* ha approvato la nostra relazione senza obiezioni.
  Der *Vorgesetzte* hat unseren Bericht ohne Einwände genehmigt.
  
  Non mi piace quando il *supervisore* controlla ogni dettaglio del mio lavoro.
  Ich mag es nicht, wenn der *Vorgesetzte* jedes Detail meiner Arbeit kontrolliert.
  
  Se fossi stato il *supervisore*, avrei assegnato il progetto a te.
  Wäre ich der *Vorgesetzte* gewesen, hätte ich dir das Projekt zugeteilt.
  
  Il *supervisore* di cui parli lavora in un altro edificio.
  Der *Vorgesetzte*, von dem du sprichst, arbeitet in einem anderen Gebäude.
  
  Non appena il *supervisore* entrerà in ufficio, ti avviserò.
  Sobald der *Vorgesetzte* ins Büro kommt, werde ich dich informieren.
