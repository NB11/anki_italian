Rang: 3994
Wort: disperazione
Wortart: n.f
Wort mit Artikel: la disperazione
Femininum / Plural: disperazioni
IPA: ''
Definition: die Verzweiflung, -en
Register: ''
Beispielsätze: |-
  Dopo la sconfitta, la *disperazione* era dipinta sui volti dei tifosi.
  Nach der Niederlage war die *Verzweiflung* auf den Gesichtern der Fans zu lesen.
  
  Nonostante la *disperazione*, continuò a lottare fino all'ultimo secondo.
  Trotz der *Verzweiflung* kämpfte er bis zur letzten Sekunde weiter.
  
  Se non troviamo una soluzione, la *disperazione* ci accompagnerà per sempre, sennò la situazione peggiorerà drasticamente.
  Wenn wir keine Lösung finden, wird uns die *Verzweiflung* für immer begleiten, sonst wird sich die Situation dramatisch verschlimmern.
  
  La *disperazione* che provava era visibile anche a distanza di anni.
  Die *Verzweiflung*, die er empfand, war selbst Jahre später noch sichtbar.
  
  In preda alla *disperazione*, prese una decisione che avrebbe cambiato tutto per sempre.
  In der *Verzweiflung* traf er eine Entscheidung, die alles für immer verändern würde.
