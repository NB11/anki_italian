  Stamattina ho ricordato un *sogno* bellissimo che ho fatto.
  Heute Morgen habe ich einen wunderschönen *Traum* erinnert, den ich hatte.
  
  Non tutti i *sogni* diventano realtà, purtroppo.
  Nicht alle *Träume* werden leider Wirklichkeit.
