Rang: 4219
Wort: condotta
Wortart: n.f
Wort mit Artikel: la condotta
Femininum / Plural: condotte
IPA: ''
Definition: das Verhalten, die Führung, -en
Register: ''
Beispielsätze: |-
  La *condotta* di Luigi in questa situazione è stata esemplare nonostante le critiche del suo avversario.
  Das *Verhalten* von Luigi in dieser Situation war vorbildlich trotz der Kritik seines Gegners.
  
  Nonostante la sua *condotta* impeccabile, fu accusato di corruzione dal telegiornale della sera.
  Trotz seines makellosen *Verhaltens* wurde er vom Abend-Nachrichtensendung der Korruption beschuldigt.
  
  La polizia sta indagando sulla *condotta* del diplomatico durante il ricevimento ufficiale.
  Die Polizei untersucht das *Verhalten* des diplomatisch Vertreters während des offiziellen Empfangs.
  
  Se avessi seguito una *condotta* più responsabile, oggi non dovremmo affrontare queste complicazioni.
  Hättest du ein verantwortungsbewussteres *Verhalten* an den Tag gelegt, müssten wir heute nicht diese Komplikationen bewältigen.
  
  La *condotta* che hai tenuto durante la riunione ha deluso tutti quanti, perfino i tuoi più fedeli ammiratori.
  Das *Verhalten*, das du während der Besprechung an den Tag gelegt hast, hat alle enttäuscht, sogar deine treuesten Bewunderer.
