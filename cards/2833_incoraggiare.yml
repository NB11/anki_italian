Rang: 2833
Wort: incoraggiare
Wortart: vt
Wort mit Artikel: incoraggiare
Femininum / Plural: ''
IPA: ''
Definition: ermutigen, anspornen
Register: ''
Beispielsätze: |-
  Il professore *incoraggia* sempre gli studenti a porre domande durante la lezione.
  Der Lehrer ermutigt die Schüler immer, während der Stunde Fragen zu stellen.
  
  Se non avessi *incoraggiato* quella decisione, ora saremmo in una situazione peggiore.
  Wenn ich diese Entscheidung nicht *angestachelt hätte*, wären wir jetzt in einer schlimmeren Lage.
  
  I genitori *incoraggiano* la figlia a seguire le sue passioni, anche se non sono redditizie.
  Die Eltern *bestärken* ihre Tochter darin, ihren Leidenschaften zu folgen, auch wenn sie nicht lukrativ sind.
  
  Ti prego di *incoraggiare* anche gli altri a partecipare all’iniziativa di beneficenza.
  Bitte *ermutige* auch die anderen, an der Wohltätigkeitsinitiative teilzunehmen.
  
  Nonostante la sconfitta, l’allenatore continuò a *incoraggiare* la squadra con parole piene di speranza.
  Trotz der Niederlage *bestärkte* der Trainer die Mannschaft weiterhin mit hoffnungsvollen Worten.
