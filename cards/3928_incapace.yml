Rang: 3928
Wort: incapace
Wortart: adj
Wort mit Artikel: incapace
Femininum / Plural: ''
IPA: ''
Definition: unfähig, inkompetent
Register: ''
Beispielsätze: |-
  È *incapace* di risolvere anche il problema più semplice.
  Er ist *unfähig*, selbst das einfachste Problem zu lösen.
  
  Penso che tu sia *incapaci* di mantenere un segreto così importante.
  Ich glaube, ihr seid *inkompetent*, ein so wichtiges Geheimnis zu bewahren.
  
  Se non si impegna di più, resterà *incapace* per sempre.
  Wenn er sich nicht mehr anstrengt, wird er *unfähig* bleiben.
  
  Nonostante abbia studiato tanto, si sente *incapace* quando deve parlare in pubblico.
  Obwohl er viel gelernt hat, fühlt er sich *inkompetent*, wenn er vor Publikum sprechen muss.
  
  Sarebbe *incapace* di tradire la sua fiducia, lo so per certo.
  Er wäre *unfähig*, dein Vertrauen zu verraten, das weiß ich genau.
