Beispielsätze: |-
  Molti *yankee* amano il baseball più di qualsiasi altro sport.
  Viele *Yankees* lieben Baseball mehr als jede andere Sportart.
  
  Sebbene sia italiano, suo marito è un *yankee* e ama il football americano.
  Obwohl sie Italienerin ist, ist ihr Mann ein *Yankee* und liebt American Football.
  
  Non mi aspetto che un *yankee* capisca subito le regole della pallavolo italiana.
  Ich erwarte nicht, dass ein *Yankee* die Regeln des italienischen Volleyballs sofort versteht.
  
  I *yankee* hanno un detto: "Time is money", ma noi preferiamo un ritmo più lento.
  *Yankees* haben einen Spruch: „Time is money“, aber wir bevorzugen einen langsameren Rhythmus.
  
  Se incontrassi un *yankee* in un ristorante italiano, probabilmente parlerebbe della pizza, non della sua colazione a base di pancakes.
  Falls ich einen *Yankee* in einem italienischen Restaurant treffen würde, würde er wahrscheinlich über Pizza reden, nicht über sein Frühstück mit Pfannkuchen.
