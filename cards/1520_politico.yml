Rang: 1520
Wort: politico
Wortart: adj
Wort mit Artikel: politico
Femininum / Plural: ''
IPA: ''
Definition: politisch, staatsbezogen
Register: ''
Beispielsätze: |-
  La decisione *politica* del governo ha scatenato rabbia tra i cittadini.
  Die *politische* Entscheidung der Regierung hat Ärger bei den Bürgern ausgelöst.
  
  Vorrei capire meglio il pensiero *politico* di questo personaggio storico.
  Ich möchte die politische Haltung dieser historischen Figur besser verstehen.
  
  Tutte le sue azioni sono state basate su principi *politici* molto chiari.
  Alle seine Handlungen basierten auf klaren politischen Prinzipien.
  
  Nonostante l'incubo della guerra, molti hanno mantenuto una posizione *politica* ferma.
  Trotz des Albtraums des Krieges haben viele eine feste politische Haltung bewahrt.
  
  Gli scienziati hanno esaminato le capacità *politiche* dei leader per comprendere il loro comportamento.
  Wissenschaftler haben die politischen Fähigkeiten der Führer untersucht, um ihr Verhalten zu verstehen.
