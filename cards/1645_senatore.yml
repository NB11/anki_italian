Rang: 1645
Wort: senatore
Wortart: n.m
Wort mit Artikel: il senatore
Femininum / Plural: senatori
IPA: ''
Definition: der Senator, -en
Register: ''
Beispielsätze: |-
  Il *senatore* ha parlato per due ore senza fermarsi durante la conferenza.
  Der *Senator* hat während der Konferenz zwei Stunden lang ohne Pause gesprochen.
  
  Vorrei sapere se il *senatore* che abbiamo incontrato ieri sia ancora in carica.
  Ich würde gerne wissen, ob der *Senator*, den wir gestern getroffen haben, noch im Amt ist.
  
  Anche se il *senatore* fosse d'accordo, la legge non passerebbe mai senza il sostegno del partito.
  Selbst wenn der *Senator* zustimmen würde, würde das Gesetz nie ohne die Unterstützung der Partei durchkommen.
  
  Mi hai detto che il *senatore* abita lì vicino, vero? Ho bisogno di parlargli per quella versione del progetto.
  Du hast mir gesagt, dass der *Senator* in der Nähe wohnt, stimmt's? Ich muss mit ihm über diese Version des Projekts sprechen.
  
  Il *senatore*, che tutti ritenevano corrotto, ha presentato una spiegazione così convincente che persino gli avversari hanno smesso di gridare.
  Der *Senator*, den alle für korrupt hielten, lieferte eine so überzeugende Erklärung, dass sogar seine Gegner aufgehört haben zu schreien.
