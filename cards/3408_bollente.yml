Definition: kochend heiß, glühend
Register: ''
Beispielsätze: |-
  Attenzione! L'acqua del tè è ancora *bollente*!
  Achtung! Der Tee ist noch *kochend heiß*!
  
  Il caffè *bollente* mi scotta la lingua ogni mattina.
  Der *glühend* heiße Kaffee verbrennt mir jeden Morgen die Zunge.
  
  Dopo averlo bevuto, mi sono accorto che il latte era *bollente*.
  Als ich es getrunken hatte, merkte ich, dass die Milch *kochend heiß* war.
  
  Quando avrai finito di prepararlo, versa l'acqua *bollente* sulle foglie del tè.
  Wenn du damit fertig bist, gieße das *kochend* heiße Wasser über die Teeblätter.
  
  Era così *bollente* che ho dovuto soffiare più volte prima di berlo.
  Er war so *glühend* heiß, dass ich mehrmals pusten musste, bevor ich ihn trinken konnte.
