Rang: 4403
Wort: mantello
Wortart: n.m
Wort mit Artikel: il mantello
Femininum / Plural: mantelli
IPA: ''
Definition: der Umhang, -ä-e
Register: ''
Beispielsätze: |-
  Il cavaliere indossava un *mantello* rosso durante la battaglia per proteggersi dal freddo.
  Der Ritter trug einen *Umhang* bei der Schlacht, um sich vor der Kälte zu schützen.
  
  Nel museo ho visto un *mantello* appartenuto a un famoso generale romano.
  Im Museum habe ich einen *Umhang* gesehen, der einem berühmten römischen General gehörte.
  
  Quando sono uscito, ho preso il *mantello* dall’attaccapanni perché fuori pioveva.
  Als ich rausging, habe ich den *Umhang* vom Kleiderständer genommen, weil es draußen regnete.
  
  Se avessi un *mantello* magico, volerei sopra la città ogni mattina.
  Wenn ich einen magischen *Umhang* hätte, würde ich jeden Morgen über die Stadt fliegen.
  
  Ha cucito un *mantello* per suo figlio con dei pezzi di stoffa avanzata dal laboratorio.
  Sie hat ihrem Sohn einen *Umhang* aus übrig gebliebenem Stoff aus dem Labor genäht.
