Rang: 4130
Wort: pullman
Wortart: n.m
Wort mit Artikel: il pullman
Femininum / Plural: pullman
IPA: ''
Definition: der Reisebus, -se
Register: ''
Beispielsätze: |-
  Abbiamo prenotato un *pullman* per andare a Parigi domani mattina alle otto.
  Wir haben einen *Reisebus* für die Fahrt nach Paris morgen früh um acht gebucht.
  
  Il *pullman* che ci ha portati a Firenze era molto confortevole, con poltrone reclinabili.
  Der *Reisebus*, der uns nach Florenz gebracht hat, war sehr komfortabel mit verstellbaren Sitzen.
  
  Se non ci fosse stato il *pullman*, avremmo dovuto prendere due treni diversi.
  Wenn es den *Reisebus* nicht gegeben hätte, hätten wir zwei verschiedene Züge nehmen müssen.
  
  Sai che nel nostro *pullman* c'è anche la connessione Wi-Fi? È davvero pratico.
  Weißt du, dass in unserem *Reisebus* sogar eine WLAN-Verbindung ist? Das ist wirklich praktisch.
  
  Ho letto che i *pullman* a due piani sono sempre più diffusi in Europa.
  Ich habe gelesen, dass *Reisebusse* mit zwei Etagen in Europa immer beliebter werden.
