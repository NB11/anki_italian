Rang: 2438
Wort: pacchetto
Wortart: n.m
Wort mit Artikel: il pacchetto
Femininum / Plural: i pacchetti
IPA: ''
Definition: das Päckchen, -
Register: ''
Beispielsätze: |-
  Ho ricevuto un *pacchetto* con una scatola di cioccolatini dentro.
  Ich habe ein *Päckchen* mit einer Schachtel Pralinen darin erhalten.
  
  Non aprire ancora il *pacchetto*, aspetta che arrivi anche il tuo fratello!
  Öffne die *Päckchen* noch nicht, warte, bis auch dein Bruder kommt!
  
  Mi hanno mandato un *pacchetto* misterioso senza mittente.
  Man hat mir ein mysteriöses *Päckchen* ohne Absender geschickt.
  
  Se trovi un *pacchetto* abbandonato, avvisa immediatamente la polizia!
  Wenn du ein verlassenes *Päckchen* findest, benachrichtige sofort die Polizei!
  
  I *pacchetti* arrivano sempre in ritardo quando spedisco con questa compagnia.
  Die *Päckchen* kommen immer zu spät, wenn ich mit dieser Firma verschicke.
