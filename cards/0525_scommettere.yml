Rang: 525
Wort: scommettere
Wortart: v
Wort mit Artikel: scommettere
Femininum / Plural: ''
IPA: ''
Definition: wetten, setzen
Register: ''
Beispielsätze: |-
  Voglio *scommettere* cento euro sulla partita di calcio.
  Ich möchte *hundert Euro* auf das Fußballspiel *wetten*.
  
  Lui *ha scommesso* che vincerai la corsa.
  Er *hat gewettet*, dass du das Rennen *gewinnst*.
  
  Non *scommetterei* mai su un cavallo così lento!
  Ich würde nie auf ein so langsames Pferd *wetten*!
  
  Lei *scommette* sempre sui numeri fortunati.
  Sie *setzt* immer auf ihre Glückszahlen.
  
  Se *scommettessi* di più, perderesti molti soldi.
  Wenn du mehr *wetten würdest*, würdest du viel Geld verlieren.
