Rang: 525
Wort: scommettere
Wortart: v
Wort mit Artikel: scommettere
Femininum / Plural: ''
IPA: ''
Definition: wetten, tippen
Register: ''
Beispielsätze: |-
  Ogni mattina *scommetto* dieci euro che pioverà entro sera.
  Jeden Morgen *wette* ich zehn Euro, dass es bis zum Abend regnen wird.
  
  Gli studenti hanno *scommesso* che la professoressa non avrebbe corretto il compito in tempo.
  Die Schüler haben *gewettet*, dass die Lehrerin die Aufgabe nicht rechtzeitig korrigieren würde.
  
  Se *scommettessi* su di me, non perderesti mai, perché conosco il mercato.
  Wenn du *wetten* würdest, würdest du nie verlieren, denn ich kenne den Markt.
  
  Ho sentito che hanno *scommesso* una cena intera al ristorante sulla partita di stasera.
  Ich habe gehört, sie haben ein ganzes Abendessen im Restaurant auf das heutige Spiel *gesetzt*.
  
  Dopo la discussione, mio fratello volle *scommettere* che avrebbe trovato un errore nel mio rapporto finanziario.
  Nach der Diskussion wollte mein Bruder *wetten*, dass er einen Fehler in meinem Finanzbericht finden würde.
