Rang: 4975
Wort: artiglio
Wortart: n.m
Wort mit Artikel: l'artiglio
Femininum / Plural: artigli
IPA: ''
Definition: der Kralle, -n
Register: ''
Beispielsätze: |-
  Il leone ha afferrato la preda con un *artiglio* poderoso.
  Der Löwe hat die Beute mit einer *Kralle* gepackt.
  
  Il gatto ha ferito il cane con i suoi *artigli* affilati.
  Die Katze hat den Hund mit ihren scharfen *Krallen* verletzt.
  
  Mentre camminavo nel bosco, ho visto un animale con *artigli* lunghi e ricurvi.
  Während ich im Wald spazierte, sah ich ein Tier mit langen, gebogenen *Krallen*.
  
  Se non tagli le unghie al gatto, potrebbe graffiare i mobili con gli *artigli*.
  Wenn du den Katzen die Krallen nicht schneidest, könnte sie mit den *Krallen* die Möbel zerkratzen.
  
  Gli studiosi hanno analizzato la struttura degli *artigli* del lupo per capire la sua dieta.
  Die Wissenschaftler haben die Struktur der *Krallen* des Wolfes analysiert, um seine Ernährung zu verstehen.
