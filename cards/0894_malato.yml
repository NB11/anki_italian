Rang: 894
Wort: malato
Wortart: adj
Wort mit Artikel: malato
Femininum / Plural: ''
IPA: ''
Definition: krank, erkrankt
Register: ''
Beispielsätze: |-
  Mario è *malato* da una settimana e non va a lavoro.
  Mario ist seit einer Woche *krank* und geht nicht zur Arbeit.
  
  Se mangi troppo gelato, ti sentirai *malata* dunque prendine poco.
  Wenn du zu viel Eis isst, wirst du dich *krank* fühlen, also nimm wenig.
  
  Nonostante fosse *malato*, è venuto alla festa con un foulard sulla pelle pallida.
  Trotz *krank* zu sein, ist er mit einem Schal auf der blassen Haut zur Feier gekommen.
  
  Credo che il professore si sia *malato* perché ha la pressione troppo alta dopo lo stress.
  Ich glaube, der Professor ist *krank* geworden, weil er nach dem Stress zu hohen Druck hat.
  
  Vorrei che tu non fossi *malato* questo fine settimana, così possiamo andare a raccogliere fiori insieme.
  Ich wünschte, du wärst nicht *krank* an diesem Wochenende, sodass wir zusammen Blumen pflücken können.
