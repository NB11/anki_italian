Rang: 3861
Wort: telegramma
Wortart: n.m
Wort mit Artikel: il telegramma
Femininum / Plural: telegrammi
IPA: ''
Definition: das Telegramm, -e
Register: ''
Beispielsätze: |-
  Ho ricevuto un *telegramma* dal sindaco per congratularsi della mia promozione.
  Ich habe ein *Telegramm* vom Bürgermeister erhalten, um mich zu meiner Beförderung zu beglückwünschen.
  
  Non appena spedisci il *telegramma*, chiamami così confermo la ricezione.
  Sobald du das *Telegramm* abschickst, rufe mich an, damit ich den Empfang bestätige.
  
  Il fattorino arrivò trafelato con un *telegramma* urgente per la polizia.
  Der Bote kam außer Atem mit einem dringenden *Telegramm* für die Polizei.
  
  Nel 1980 il *telegramma* era ancora uno dei modi più rapidi per comunicare a distanza.
  1980 war das *Telegramm* immer noch eine der schnellsten Möglichkeiten, um über große Entfernungen zu kommunizieren.
  
  Se non fossi stato attento, avresti tralasciato il *telegramma* nascosto tra le carte.
  Hättest du nicht aufgepasst, hättest du das versteckte *Telegramm* zwischen den Papieren übersehen.
