Rang: 3463
Wort: dolcetto
Wortart: n.m
Wort mit Artikel: il dolcetto
Femininum / Plural: dolcetti
IPA: ''
Definition: die kleine Süßigkeit, -en, das Stückchen Dessert
Register: ''
Beispielsätze: |-
  Mi piace mangiare un *dolcetto* dopo cena, soprattutto se è al cioccolato.
  Ich esse gern ein *Stückchen Dessert* nach dem Abendessen, besonders wenn es Schokolade enthält.
  
  Al mercato ho comprato cinque *dolcetti* alle mandorle, uno per ogni nipote.
  Auf dem Markt habe ich fünf *kleine Süßigkeiten* mit Mandeln gekauft, eine für jedes Enkelkind.
  
  Nonostante la dieta, ho ceduto alla tentazione e ho preso un *dolcetto* alla crema.
  Trotz der Diät habe ich der Versuchung nachgegeben und ein *Stückchen Dessert* mit Creme genommen.
  
  Se vuoi qualcosa di leggero, prova i *dolcetti* alla frutta invece dei dolci pesanti.
  Wenn du etwas Leichtes möchtest, probier die *kleinen Süßigkeiten* mit Obst statt der schweren Süßspeisen.
  
  Il nonno racconta sempre che, da piccolo, riceveva come premio un *dolcetto* ogni volta che aiutava in cucina.
  Der Opa erzählt immer, dass er als Kind jedes Mal ein *Stückchen Dessert* als Belohnung bekam, wenn er in der Küche half.
