Beispielsätze: |-
  Il cielo è diventato *scuro* prima della tempesta.
  Der Himmel wurde vor dem Sturm *dunkel*.
  
  Non mi piacciono le stanze con le pareti *scure*: preferisco quelle chiare.
  Ich mag Räume mit *dunklen* Wänden nicht – ich ziehe helle vor.
  
  Se la stanza fosse più *scura*, forse non vedremmo l’ombra che si muove lì in fondo.
  Wenn der Raum *dunkler* wäre, würden wir vielleicht den Schatten sehen, der sich dort hinten bewegt.
  
  Non posso *scuro* cosa accadrà domani, ma spero che finisca tutto bene.
  Ich kann *dunkel* vorhersagen, was morgen passieren wird, aber ich hoffe, dass alles gut endet.
  
  Il suo viso era talmente *scuro* di rabbia che nessuno osava parlargli.
  Sein Gesicht war so *dunkel* vor Wut, dass niemand es wagte, mit ihm zu sprechen.
