Rang: 312
Wort: toccare
Wortart: v
Wort mit Artikel: toccare
Femininum / Plural: ''
IPA: ''
Definition: berühren
Register: ''
Beispielsätze: |-
  Non *tocchi* il fuoco, è pericoloso!
  *Berühren* Sie das Feuer nicht, es ist gefährlich!
  
  Ieri *ho toccato* il fondo della scatola con la mano.
  Gestern *berührte* ich mit der Hand den Boden der Schachtel.
  
  Vuoi *toccare* la mia gatta? È molto timida.
  Möchtest du meine Katze *berühren*? Sie ist sehr scheu.
  
  Se *toccherai* quel pulsante, si accenderà la luce.
  Wenn du *den* Knopf *berührst*, geht das Licht an.
  
  Perché *tocchi* sempre le mie cose senza chiedere?
  Warum *berührst* du immer meine Sachen, ohne zu fragen?
