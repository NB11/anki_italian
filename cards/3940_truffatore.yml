Rang: 3940
Wort: truffatore
Wortart: n.m
Wort mit Artikel: il truffatore
Femininum / Plural: truffatori
IPA: ''
Definition: der Betrüger, - / die *Betrügerin, -nen
Register: ''
Beispielsätze: |-
  Il giudice ha condannato il *truffatore* a cinque anni di prigione.
  Der Richter hat den *Betrüger* zu fünf Jahren Gefängnis verurteilt.
  
  Questa volta il *truffatore* è stato più furbo di tutti.
  Dieses Mal war der *Betrüger* schlauer als alle anderen.
  
  Chiunque abbia denunciato il *truffatore* merita un premio.
  Wer den *Betrüger* angezeigt hat, verdient eine Belohnung.
  
  Se scopro che mi hanno ingannato, presenterò denuncia contro il *truffatore*.
  Wenn ich herausfinde, dass man mich betrogen hat, erstatte ich Anzeige gegen den *Betrüger*.
  
  Sembra che il *truffatore* si nasconda in un paese vicino alla frontiera.
  Es scheint, als würde sich der *Betrüger* in einem Land nahe der Grenze verstecken.
