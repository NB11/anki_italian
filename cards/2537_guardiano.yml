Rang: 2537
Wort: guardiano
Wortart: n.m
Wort mit Artikel: il guardiano
Femininum / Plural: guardiani
IPA: ''
Definition: der Wächter, -
Register: ''
Beispielsätze: |-
  Il *guardiano* controlla gli ingressi della prigione ogni ora.
  Der *Wärter* kontrolliert die Eingänge des Gefängnisses jede Stunde.
  
  Ho parlato con un ex *guardiano* della miniera che mi ha raccontato storie incredibili.
  Ich habe mit einem ehemaligen *Bergwerkswärter* gesprochen, der mir unglaubliche Geschichten erzählt hat.
  
  Credi davvero che quel *guardiano* abbia accettato la mazzetta per chiudere un occhio?
  Glaubst du wirklich, dass dieser *Wachtposten* das Schmiergeld angenommen hat, um ein Auge zuzudrücken?
  
  Se il *guardiano* non avesse chiamato i soccorsi, l’uomo sarebbe affondato nella confusione del cimitero.
  Wenn der *Friedhofsaufseher* nicht die Rettungskräfte gerufen hätte, wäre der Mann im Durcheinander des Friedhofes untergegangen.
  
  I *guardiani* del tempio non obbediscono agli ordini del nuovo comitato, poiché ritengono che la tradizione sia sacra.
  Die *Tempelwärter* gehorchen den Anweisungen des neuen Ausschusses nicht, da sie die Tradition für heilig halten.
