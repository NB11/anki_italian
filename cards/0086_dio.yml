Rang: 86
Wort: dio
Wortart: n.m
Wort mit Artikel: il dio
Femininum / Plural: dei
IPA: ''
Definition: der Gott, Götter
Register: ''
Beispielsätze: |-
  Credo che *il dio* degli antichi romani fosse Giove.
  Ich glaube, dass *der Gott* der alten Römer Jupiter war.
  
  *Gli dei* greci e romani avevano poteri straordinari.
  *Die Götter* der Griechen und Römer hatten außergewöhnliche Kräfte.
  
  Se *dio* esiste, allora tutto è possibile.
  Wenn *Gott* existiert, dann ist alles möglich.
  
  Gli scienziati non possono provare l’esistenza di *un dio*.
  Wissenschaftler können die Existenz *eines Gottes* nicht beweisen.
  
  Vorrei pregare *il dio* della mia infanzia, ma oggi non ci credo più.
  Ich würde gern *den Gott* meiner Kindheit anbeten, aber heute glaube ich nicht mehr daran.
