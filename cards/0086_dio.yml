Rang: 86
Wort: dio
Wortart: n.m
Wort mit Artikel: il dio
Femininum / Plural: dei
IPA: ''
Definition: der Gott, Götter
Register: ''
Beispielsätze: |-
  Credo che *dio* esista in molte religioni.
  Ich glaube, dass *Gott* in vielen Religionen existiert.
  
  Gli antichi greci onoravano diversi *dei*.
  Die alten Griechen verehrten verschiedene *Götter*.
  
  Spero che *Dio* mi aiuti in questa situazione difficile.
  Ich hoffe, dass *Gott* mir in dieser schwierigen Situation hilft.
  
  Non so perché gli uomini abbiano creato la figura del *dio*.
  Ich weiß nicht, warum die Menschen die Figur des *Gottes* erschaffen haben.
  
  Se *dio* vuole, riuscirò a superare questo esame.
  Wenn *Gott* es will, schaffe ich diese Prüfung.
