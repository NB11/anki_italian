Rang: 1207
Wort: limite
Wortart: n.m
Wort mit Artikel: il limite
Femininum / Plural: limiti
IPA: ''
Definition: die Grenze, ¨-e
Register: ''
Beispielsätze: |-
  Non puoi superare *il limite* di velocità sulla strada principale.
  Du darfst die *Geschwindigkeit** auf der Hauptstraße nicht überschreiten.
  
  Stavolta ho raggiunto *il limite* della mia pazienza con te!
  Dieses Mal habe ich die *Grenze** meiner Geduld mit dir erreicht!
  
  Ci sono *limiti* che non dovresti mai oltrepassare, neppure per un amico.
  Es gibt *Grenzen*, die du niemals überschreiten solltest, nicht einmal für einen Freund.
  
  Il pilota ha superato *i limiti* della fisica con quel volo sperimentale.
  Der Pilot hat die *Grenzen* der Physik mit diesem Testflug überschritten.
  
  Secondo la legge, *un limite* di alcol nel sangue è previsto per chi guida.
  Laut Gesetz ist die *Grenze* des Alkohols im Blut für Fahrer vorgesehen.
