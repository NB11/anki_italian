Rang: 2919
Wort: pompa
Wortart: n.f
Wort mit Artikel: la pompa
Femininum / Plural: pompe
IPA: ''
Definition: die Pumpe, -n
Register: ''
Beispielsätze: |-
  La *pompa* dell'acqua nel nostro giardino non funziona più da ieri.
  Die *Pumpe* des Wassers in unserem Garten funktioniert seit gestern nicht mehr.
  
  Credi che dovremmo sostituire questa *pompa* o provare a ripararla?
  Glaubst du, wir sollten diese *Pumpe* ersetzen oder versuchen, sie zu reparieren?
  
  Mentre la *pompa* era in funzione, abbiamo sentito un rumore strano provenire dal seminterrato.
  Während die *Pumpe* in Betrieb war, haben wir ein seltsames Geräusch aus dem Keller gehört.
  
  Se la *pompa* non verrà aggiustata entro domani, rischiamo di restare senza acqua corrente tutto il giorno.
  Wenn die *Pumpe* bis morgen nicht repariert wird, riskieren wir, den ganzen Tag ohne fließend Wasser dazustehen.
  
  Ho comprato una nuova *pompa* per il laghetto del giardino, sperando che risolva il problema della filtrazione.
  Ich habe eine neue *Pumpe* für den Gartenteich gekauft, in der Hoffnung, dass sie das Problem der Filtration löst.
