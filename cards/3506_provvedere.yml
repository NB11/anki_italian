Rang: 3506
Wort: provvedere
Wortart: v
Wort mit Artikel: provvedere
Femininum / Plural: ''
IPA: ''
Definition: sorgen für, sich kümmern um, erledigen
Register: ''
Beispielsätze: |-
  Il sindaco ha promesso di *provvedere* immediatamente alla sistemazione delle strade danneggiate dal terremoto.
  Der Bürgermeister hat versprochen, sich sofort um die Reparatur der durch das Erdbeben beschädigten Straßen zu *kümmern*.
  
  Non appena avrai finito di mangiare, dovresti *provvedere* a sparecchiare la tavola.
  Sobald du mit dem Essen fertig bist, solltest du *für* das Abräumen des Tisches sorgen.
  
  Se vuole partecipare alla competizione, dovrà prima *provvedere* a compilare il modulo di iscrizione.
  Wenn er am Wettbewerb teilnehmen möchte, muss er zuerst *für* die Ausfüllung des Anmeldeformulars sorgen.
  
  La nonna mi ha insegnato che è importante *provvedere* ai propri doveri prima di divertirsi.
  Meine Oma hat mir beigebracht, dass es wichtig ist, seine Pflichten *zu erledigen*, bevor man sich vergnügt.
  
  Appena ho saputo del problema, ho deciso di *provvedere* personalmente alla soluzione.
  Sobald ich von dem Problem erfahren hatte, beschloss ich, mich persönlich um die *Lösung* zu kümmern.
