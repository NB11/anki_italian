Rang: 4532
Wort: fondatore
Wortart: n.m
Wort mit Artikel: il fondatore
Femininum / Plural: fondatori
IPA: ''
Definition: der Gründer, -
Register: ''
Beispielsätze: |-
  Il *fondatore* dell’azienda ha fatto una donazione enorme alla università.
  Der *Gründer* des Unternehmens hat eine riesige Spende an die Universität gemacht.
  
  Chi era il *fondatore* della Repubblica di Venezia nel IX secolo?
  Wer war der *Gründer* der Republik Venedig im 9. Jahrhundert?
  
  Spero che il *fondatore* della nostra associazione non abbandoni il progetto.
  Ich hoffe, dass der *Gründer* unseres Vereins das Projekt nicht aufgibt.
  
  I *fondatori* della biblioteca pubblica hanno ricevuto una medaglia per il loro impegno.
  Die *Gründer* der öffentlichen Bibliothek erhielten eine Medaille für ihr Engagement.
  
  Se avessi saputo chi era il *fondatore* di quella teoria, ti avrei parlato prima.
  Wenn ich gewusst hätte, wer der *Gründer* dieser Theorie war, hätte ich dir früher davon erzählt.
