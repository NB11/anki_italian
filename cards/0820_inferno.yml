Rang: 820
Wort: inferno
Wortart: n.m
Wort mit Artikel: l'inferno
Femininum / Plural: inferni
IPA: ''
Definition: die Hölle, -n
Register: ''
Beispielsätze: |-
  Non vorrei finire nell'*inferno* per quello che ho fatto.
  Ich möchte nicht in der *Hölle* enden für das, was ich getan habe.
  
  L'*inferno* che hai vissuto negli anni '70 sembra uscito da un film.
  Die *Hölle*, die du in den 70ern erlebt hast, wirkt wie aus einem Film.
  
  Dicono che i mostri abitino nell'*inferno*, ma io non ci credo.
  Man sagt, dass die *Ungeheuer* in der Hölle leben, aber ich glaube das nicht.
  
  Se non cambierai idea, finirà come nell'*inferno* dei dannati!
  Wenn du deine Meinung nicht änderst, wird es enden wie in der *Hölle* der Verdammten!
  
  L'*inferno* sulla Terra è quando non hai più speranza.
  Die *Hölle* auf Erden ist, wenn man keine Hoffnung mehr hat.
