Rang: 820
Wort: inferno
Wortart: n.m
Wort mit Artikel: l'inferno
Femininum / Plural: inferni
IPA: ''
Definition: die Hölle, -n
Register: ''
Beispielsätze: |-
  L'*inferno* dantesco è descritto in modo molto drammatico.
  Die *Hölle* in Dantes Werk wird sehr dramatisch beschrieben.
  
  Hai mai letto "Il Divin Commedia" dove si parla dell'*inferno*?
  Hast du schon "Die Göttliche Komödie" gelesen, in der von der *Hölle* die Rede ist?
  
  Questo posto sembra un vero *inferno* di caldo!
  Dieser Ort wirkt wie ein wahrer *Höllen*ofen!
  
  Gli antichi credevano che l'*inferno* fosse pieno di demoni.
  Die Alten glaubten, die *Hölle* sei voller Dämonen.
  
  Non vorrei mai finire nell'*inferno* per i miei peccati!
  Ich möchte auf keinen Fall wegen meiner Sünden in der *Hölle* enden!
