Rang: 1503
Wort: assomigliare
Wortart: vi
Wort mit Artikel: assomigliare
Femininum / Plural: ''
IPA: ''
Definition: ähneln, gleichen
Register: ''
Beispielsätze: |-
  Il cane *assomiglia* molto al suo padrone, hanno le stesse espressioni del viso.
  Der Hund *ähnelt* seinem Besitzer stark, sie haben dieselben Gesichtszüge.
  
  Non *assomigliate* per niente! Tu sei alto e lui è basso.
  Ihr *gleicht* euch überhaupt nicht! Du bist groß und er ist klein.
  
  Questa ragazza *assomiglia* alla protagonista del film che abbiamo visto ieri sera.
  Dieses Mädchen *ähnelt* der Hauptfigur des Films, den wir gestern Abend gesehen haben.
  
  Se il nuovo modello *assomiglia* troppo a quello vecchio, nessuno lo comprerà.
  Wenn das neue Modell dem alten zu sehr *gleicht*, wird es niemand kaufen.
  
  Mi sembra che questo vino *assomigli* a quello che abbiamo bevuto al ristorante vicino al parco l’estate scorsa.
  Ich glaube, dieser Wein *gleicht* dem, den wir im Sommer im Restaurant neben dem Park getrunken haben.
