Rang: 342
Wort: sbagliare
Wortart: v
Wort mit Artikel: sbagliare
Femininum / Plural: ''
IPA: ''
Definition: sich irren, sich täuschen, falsch machen
Register: ''
Beispielsätze: |-
  Mi *sbaglio* spesso a scrivere questa parola.
  Ich *irre* mich oft, wenn ich dieses Wort *schreibe*.
  
  Hai *sbagliato* la risposta, cerca di nuovo.
  Du hast *falsch* *geantwortet*, versuche es noch einmal.
  
  Se non ti *sbagli*, dimmi pure la verità.
  Wenn du dich nicht *irrt*, sag mir einfach die Wahrheit.
  
  Credo di *sbagliare* spesso con i verbi irregolari.
  Ich *täusche* mich oft bei den unregelmäßigen Verben.
  
  Non ti preoccupare, *sbaglierai* anche tu qualche volta.
  Mach dir keine Sorgen, du wirst dich auch mal *irren*.
