Rang: 1389
Wort: fuga
Wortart: n.f
Wort mit Artikel: la fuga
Femininum / Plural: fughe
IPA: ''
Definition: die Flucht, -en
Register: ''
Beispielsätze: |-
  L'ispettore ha scoperto che il criminale era in *fuga* da due giorni.
  Der *Inspektor* hat herausgefunden, dass der Verbrecher seit zwei Tagen auf der Flucht war.
  
  Per evitare la *fuga* di informazioni segrete, è stata installata una nuova copertura nella cella.
  Um die *Flucht* geheimer Informationen zu verhindern, wurde in der Zelle eine neue Abdeckung installiert.
  
  Era così fiero della sua *fuga* dal carcere che rideva mentre parlava ai federali.
  Er war so *stolz* auf seine Flucht aus dem Gefängnis, dass er lachte, während er mit den Bundesbeamten sprach.
  
  Se prevedi una *fuga* di notizie, dovresti rinforzare la sicurezza al più presto.
  Wenn du eine *Flucht* von Nachrichten voraussiehst, solltest du die Sicherheit so schnell wie möglich verstärken.
  
  La *fuga* dei maiali dal recinto ha causato un vero caos nel mattino di domenica.
  Die *Flucht* der Schweine aus dem Gehege hat an diesem Sonntagmorgen für ein echtes Chaos gesorgt.
