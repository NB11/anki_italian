Rang: 1180
Wort: cappello
Wortart: n.m
Wort mit Artikel: il cappello
Femininum / Plural: cappelli
IPA: ''
Definition: der Hut, -¨e
Register: ''
Beispielsätze: |-
  In questo negozio vendono *cappelli* molto eleganti per l’estate.
  In diesem Laden verkaufen sie sehr elegante *Hüte* für den Sommer.
  
  Mi hanno detto che indossare un *cappello* troppo stretto fa male ai capelli.
  Man hat mir gesagt, dass das Tragen eines zu engen *Hutes* den Haaren schadet.
  
  Nonostante il freddo, Marco ha perso il suo *cappello* da nessuna parte.
  Trotz der Kälte hat Marco seinen *Hut* nirgends gefunden.
  
  Se non metti il *cappello*, ti scotterai al sole!
  Wenn du den *Hut* nicht aufsetzt, wirst du dich in der Sonne verbrennen!
  
  Il nonno ha regalato al nipote un *cappello* antico che conserva come un tesoro.
  Der Großvater hat seinem Neffen einen alten *Hut* geschenkt, den er wie einen Schatz hütet.
