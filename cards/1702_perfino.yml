Rang: 1702
Wort: perfino
Wortart: adv
Wort mit Artikel: perfino
Femininum / Plural: ''
IPA: ''
Definition: sogar, selbst
Register: ''
Beispielsätze: |-
  Non mi piace *perfino* l’odore di questo cibo.
  Ich mag nicht *sogar* den Geruch dieses Essens.
  
  Ha *perfino* accettato di aiutarti, nonostante tutto.
  Er hat *sogar* zugestimmt, dir zu helfen, trotz allem.
  
  Non ho *perfino* il coraggio di dirglielo in faccia!
  Ich habe *sogar* nicht den Mut, es ihm ins Gesicht zu sagen!
  
  Dicono che *perfino* i bambini sanno risolvere questo problema.
  Sie sagen, dass *sogar* Kinder dieses Problem lösen können.
  
  Se non ti piace, lascialo stare, *perfino* se tutti lo vogliono.
  Wenn es dir nicht gefällt, lass es bleiben, *selbst* wenn es alle wollen.
