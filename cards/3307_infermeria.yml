Rang: 3307
Wort: infermeria
Wortart: n.f
Wort mit Artikel: la infermeria
Femininum / Plural: infermerie
IPA: ''
Definition: das Krankenzimmer, -
Register: ''
Beispielsätze: |-
  Durante la *infermeria* scolastica, gli studenti vengono curati da un’infermiera.
  Während der *Krankenzimmer*-Zeit werden die Schüler von einer Krankenschwester betreut.
  
  Se ti senti male, vai subito in *infermeria*!
  Wenn du dich unwohl fühlst, geh sofort ins *Krankenzimmer*!
  
  Dopo la *infermeria* dove ha avuto la febbre, Marco ha perso la sua appuntamento dal dentista.
  Nach dem *Krankenzimmer*, in dem er Fieber hatte, hat Marco seinen Termin beim Zahnarzt verpasst.
  
  Durante il viaggio scolastico, ci hanno portato in *infermeria* perché un ragazzo aveva nausea.
  Während des Schulausflugs brachte man uns ins *Krankenzimmer*, weil ein Junge Übelkeit hatte.
  
  Nonostante la *infermeria* fosse affollata, il personale medico riuscì a gestire ogni emergenza con calma.
  Obwohl das *Krankenzimmer* überfüllt war, schaffte es das medizinische Personal, jede Notlage gelassen zu bewältigen.
