Rang: 746
Wort: ballo
Wortart: n.m
Wort mit Artikel: il ballo
Femininum / Plural: balli
IPA: ''
Definition: der Tanz, die Tänze
Register: ''
Beispielsätze: |-
  Stasera andiamo a un *ballo* in piazza.
  Heute Abend gehen wir zu einem *Tanz* auf dem Platz.
  
  Che bello il *ballo* di ieri sera!
  Was für ein toller *Tanz* gestern Abend war das!
  
  Non ho mai imparato a fare il *ballo* del tango.
  Ich habe den *Tanz* des Tangos nie gelernt.
  
  In questo locale si fanno molti *balli* diversi.
  In diesem Lokal gibt es viele verschiedene *Tänze*.
  
  Sai chi ha inventato questo *ballo* moderno?
  Weißt du, wer diesen modernen *Tanz* erfunden hat?
