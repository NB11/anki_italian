Beispielsätze: |-
  Ieri sera ho incontrato Maria al *ballo* organizzato dalla scuola.
  Gestern Abend traf ich Maria beim *Tanz*, der von der Schule organisiert worden war.
  
  Nonostante la forma sia perfetta, preferisco non partecipare al *ballo* di stasera.
  Obwohl die *Form* perfekt ist, ziehe ich es vor, nicht am heutigen Tanzabend teilzunehmen.
  
  Mi hanno detto che al *ballo* di Carnevale ci sarà anche un dj famoso.
  Man hat mir erzählt, dass es beim Karnevals*ball* auch einen berühmten DJ geben wird.
  
  Se non ti unisci a noi al *ballo*, resterai solo a soffrire in silenzio.
  Wenn du dich unserem *Tanz* nicht anschließt, wirst du allein leiden müssen und schweigend.
  
  Il *ballo* che hai visto alla tv era in realtà una messa in scena per una campagna pubblicitaria.
  Der *Tanz*, den du im Fernsehen gesehen hattest, war eigentlich eine Inszenierung für eine Werbekampagne.
