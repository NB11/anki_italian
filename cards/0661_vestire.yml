Rang: 661
Wort: vestire
Wortart: vt
Wort mit Artikel: vestire
Femininum / Plural: ''
IPA: ''
Definition: kleiden, anziehen
Register: ''
Beispielsätze: |-
  Ieri ho visto un uomo che stava per *vestire* il suo neonato con un completo elegante.
  Gestern sah ich einen Mann, der dabei war, sein Neugeborenes mit einem eleganten Anzug zu *kleiden*.
  
  Vorrei sapere come si usa questo tessuto per *vestire* una bambola antica.
  Ich möchte wissen, wie man diesen Stoff verwendet, um eine antike Puppe zu *kleiden*.
  
  Nonostante il dolore alla schiena, continuò a *vestire* suo figlio ogni mattina.
  Trotz der Rückenschmerzen *kleidete* sie jeden Morgen ihren Sohn.
  
  Credi che sia necessario *vestire* la bambola in modo simile alla bambola di tua sorella?
  Glaubst du, es ist nötig, die Puppe ähnlich wie die deiner Schwester zu *kleiden*?
  
  Se avessi tempo, ti aiuterei a *vestire* queste statuine per la collezione di tuo nonno.
  Wenn ich Zeit hätte, würde ich dir helfen, diese Figuren für die Sammlung deines Großvaters zu *kleiden*.
