Rang: 331
Wort: resto
Wortart: n.m
Wort mit Artikel: il resto
Femininum / Plural: i resti
IPA: ''
Definition: der Rest, -e
Register: ''
Beispielsätze: |-
  Ho *speso* tutto il mio denaro e mi è rimasto solo un piccolo *resto*.
  Ich habe all mein Geld ausgegeben und es ist nur ein kleiner *Rest* übrig.
  
  Non buttare via gli *resti* del cibo, potremmo mangiarli domani.
  Wirf die *Reste* des Essens nicht weg, wir könnten sie morgen essen.
  
  Quanto *resto* ti hanno dato alla cassa?
  Wie viel *Restgeld* hast du an der Kasse bekommen?
  
  Dopo la festa, c’erano gli *resti* di cibo dappertutto.
  Nach der Feier lagen überall *Essensreste* herum.
  
  Il *resto* della classe è già uscito dall’aula.
  Der *Rest* der Klasse ist schon aus dem Klassenzimmer gegangen.
