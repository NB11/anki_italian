Rang: 612
Wort: sopra
Wortart: adv
Wort mit Artikel: sopra
Femininum / Plural: ''
IPA: ''
Definition: darüber, oben
Register: ''
Beispielsätze: |-
  Metti il libro *sopra* il tavolo della cucina.
  Lege das Buch *über* den Küchentisch.
  
  Dovresti stare *sopra* di loro per finire il progetto in tempo.
  Du solltest *über* ihnen sein, um das Projekt rechtzeitig abzuschließen.
  
  Non so cosa ci sia *sopra* quel tetto, ma sembra pericoloso.
  Ich weiß nicht, was *über* diesem Dach ist, aber es sieht gefährlich aus.
  
  Ho appeso la foto *sopra* il camino, dove tutti possono vederla.
  Ich habe das Foto *über* den Kamin gehängt, damit alle es sehen können.
  
  Andiamo di sopra, perché il cane abbaia *sopra* la porta del giardino.
  Lasst uns nach oben gehen, weil der Hund *über* der Gartentür bellt.
