Rang: 612
Wort: sopra
Wortart: adv
Wort mit Artikel: sopra
Femininum / Plural: ''
IPA: ''
Definition: darüber, oben
Register: ''
Beispielsätze: |-
  Il libro è *sopra* il tavolo.
  Das Buch liegt *über* dem Tisch.
  
  Abbiamo parlato *sopra* quel problema ieri.
  Wir haben *über* dieses Problem gestern gesprochen.
  
  Mi puoi passare la penna? È *sopra* lo scaffale.
  Kannst du mir bitte den Stift geben? Er liegt *über* dem Regal.
  
  Lei ha una maglia rossa *sopra*.
  Sie hat ein rotes Oberteil *an*.
  
  Dove hai messo la chiave? – *Sopra* il frigorifero!
  Wohin hast du den Schlüssel gelegt? – *Auf* den Kühlschrank!
