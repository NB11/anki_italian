Beispielsätze: |-
  Marco ha uno stile di vita molto *sportivo*: va in palestra ogni giorno e gioca a calcio il fine settimana.
  Marco führt einen sehr *sportlichen* Lebensstil: Er geht jeden Tag ins Fitnessstudio und spielt am Wochenende Fußball.
  
  Nonostante il tempo *sportivo*, siamo andati a camminare in montagna.
  Trotz des *sportlichen* Wetters sind wir in die Berge gewandert.
  
  Mi hanno regalato una bici *sportiva* per il mio compleanno, perfetta per le lunghe distanze.
  Sie haben mir ein *sportliches* Fahrrad zum Geburtstag geschenkt, perfekt für lange Strecken.
  
  Se avessi più tempo, frequenterei un corso *sportivo* per imparare il nuoto subacqueo.
  Wenn ich mehr Zeit hätte, würde ich einen *sportlichen* Kurs belegen, um Tauchen zu lernen.
  
  Il suo atteggiamento *sportivo* durante la partita ha fatto vincere la squadra, nonostante le avversità.
  Seine *sportliche* Haltung während des Spiels hat das Team zum Sieg geführt, trotz der Widrigkeiten.
