Rang: 2323
Wort: complice
Wortart: n.m
Wort mit Artikel: il complice
Femininum / Plural: complici
IPA: ''
Definition: der Komplize, -n
Register: ''
Beispielsätze: |-
  Il poliziotto ha arrestato non solo il ladro, ma anche il suo *complice*.
  Der Polizist hat nicht nur den Dieb, aber auch seinen *Komplizen* verhaftet.
  
  Se fossi in te, non fiderei di un *complice* così inaffidabile.
  Wenn ich du wäre, würde ich einem so unzuverlässigen *Komplizen* nicht vertrauen.
  
  Il giudice ha stabilito che senza prove concrete contro il *complice* la condanna non è possibile.
  Der Richter hat festgestellt, dass ohne konkrete Beweise gegen den *Komplizen* ein Schuldspruch nicht möglich ist.
  
  Hanno trascorso tutta la notte a pianificare il colpo, scegliendo ogni dettaglio con un *complice* fidato.
  Sie haben die ganze Nacht damit verbracht, das Verbrechen zu planen, wobei sie jedes Detail mit einem vertrauenswürdigen *Komplizen* besprachen.
  
  È assurdo che tu lo difenda: era il suo *complice* principale nel traffico di droga!
  Es ist absurd, dass du ihn verteidigst: Er war sein hauptsächlicher *Komplize* im Drogenhandel!
