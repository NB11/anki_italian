Rang: 1375
Wort: confessare
Wortart: v
Wort mit Artikel: confessare
Femininum / Plural: ''
IPA: ''
Definition: gestehen, beichten
Register: ''
Beispielsätze: |-
  L’ispettore *confessa* di aver sbagliato nell’indagine, ma nessuno lo ascolta più.
  Der Inspektor *gesteht*, sich im Fall geirrt zu haben, aber niemand hört ihm noch zu.
  
  Ho tanta voglia di andare al mare, ma devo prima *confessare* questa mia debolezza a mia madre.
  Ich habe so ein Verlangen, ans Meer zu fahren, aber ich muss meiner Mutter diese Schwäche *gestehen*.
  
  Nonostante tutto, lui continuò a *confessare* la sua colpevolezza, senza mai provare a negare.
  Trotz allem fuhr er fort, seine Schuld zu *bekennen*, ohne je zu versuchen, sie abzustreiten.
  
  Se tu non *confessassi* i tuoi debiti, nessuno ti aiuterebbe a trovare una soluzione.
  Wenn du deine Schulden nicht *gestehst*, hilft dir niemand, eine Lösung zu finden.
  
  Dopo anni di silenzio, finalmente *ha confessato* la sua fonte d’ispirazione per il capolavoro.
  Nach Jahren des Schweigens *hat* er endlich die Quelle seiner Inspiration für das Meisterwerk bekannt.
