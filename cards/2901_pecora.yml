Rang: 2901
Wort: pecora
Wortart: n.f
Wort mit Artikel: la pecora
Femininum / Plural: pecore
IPA: ''
Definition: das Schaf, -e
Register: ''
Beispielsätze: |-
  La *pecora* bruca tranquillamente l'erba nel prato.
  Das *Schaf* grast ruhig im Gras des Feldes.
  
  Quando hai visto l'ultima volta una *pecora* in questa zona?
  Wann hast du hier zum letzten Mal ein *Schaf* gesehen?
  
  Se avessi un gregge, vorrei che ogni *pecora* fosse nera come quella che ho visto ieri.
  Wenn ich eine Herde hätte, würde ich wollen, dass jedes *Schaf* schwarz ist wie jenes, das ich gestern gesehen habe.
  
  Nonostante il freddo, le *pecore* restano fuori al pascolo tutto l'inverno.
  Trotz der Kälte bleiben die *Schafe* den ganzen Winter draußen auf der Weide.
  
  La fattoria dove vivo ha così tante *pecore* che non riesco a contarle tutte.
  Der Bauernhof, auf dem ich lebe, hat so viele *Schafe*, dass ich sie nicht alle zählen kann.
