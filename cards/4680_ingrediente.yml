Rang: 4680
Wort: ingrediente
Wortart: n.m
Wort mit Artikel: l'ingrediente
Femininum / Plural: gli ingredienti
IPA: ''
Definition: die Zutat, -en
Register: ''
Beispielsätze: |-
  Per preparare questa ricetta, servono almeno cinque *ingredienti* freschi.
  Für dieses Rezept braucht man mindestens fünf frische *Zutaten*.
  
  Non dimenticare di controllare la lista degli *ingredienti* prima di andare al supermercato.
  Vergiss nicht, die Liste der *Zutaten* zu prüfen, bevor du zum Supermarkt gehst.
  
  Ho aggiunto un *ingrediente* segreto alla mia salsa di pomodoro, ma non ti dico quale!
  Ich habe meiner Tomatensauce eine geheime *Zutat* hinzugefügt, aber ich verrate nicht welche!
  
  In questa dieta sono esclusi alcuni *ingredienti* come il glutine e i latticini.
  Bei dieser Diät sind bestimmte *Zutaten* wie Gluten und Milchprodukte ausgeschlossen.
  
  Quando hai finito di mescolare la pasta, aggiungi semplicemente gli *ingredienti* rimanenti.
  Sobald du den Teig fertig gerührt hast, gibst du einfach die restlichen *Zutaten* hinzu.
