Rang: 4099
Wort: compatibile
Wortart: adj
Wort mit Artikel: compatibile
Femininum / Plural: ''
IPA: ''
Definition: kompatibel, verträglich
Register: ''
Beispielsätze: |-
  Questo software non è *compatibile* con il tuo sistema operativo.
  Diese Software ist nicht mit *deinem* Betriebssystem kompatibel.
  
  Ti consiglio una stampante *compatibile* con entrambi i telefoni.
  Ich empfehle dir einen Drucker, der mit *beiden* Handys kompatibel ist.
  
  Il medico ha detto che questo farmaco è *compatible* con l’allattamento.
  Der Arzt hat gesagt, dass dieses Medikament mit *dem* Stillen kompatibel ist.
  
  Non sapevo che queste due marche fossero così *compatible* tra loro.
  Ich wusste nicht, dass diese zwei Marken so gut *miteinander* kompatibel sind.
  
  Per essere *compatible* con gli standard europei, dobbiamo modificare il design.
  Um *den* europäischen Standards zu entsprechen, müssen wir das Design anpassen.
