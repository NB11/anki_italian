Beispielsätze: |-
  Dove hai messo *la mappa* che ti ho regalato ieri?
  Wo hast du die *Karte* hingelegt, die ich dir gestern geschenkt habe?
  
  Non riesco a riconoscere i nomi dei paesi su questa *mappa* così vecchia.
  Ich kann die Namen der Länder auf dieser so alten *Karte* nicht erkennen.
  
  Se *la mappa* non funziona, possiamo usare l’app sul telefono per navigare.
  Wenn die *Karte* nicht funktioniert, können wir die App auf dem Handy zum Navigieren nutzen.
  
  Hanno appeso *una mappa* gigante del mondo in classe per studiare la geografia.
  Sie haben eine riesige *Karte* der Welt im Klassenraum aufgehängt, um Geografie zu lernen.
  
  Nonostante *la mappa* fosse sbagliata, siamo riusciti a raggiungere la nostra meta senza problemi.
  Trotz der falschen *Karte* sind wir ohne Probleme an unser Ziel gelangt.
