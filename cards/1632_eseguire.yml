Rang: 1632
Wort: eseguire
Wortart: vt
Wort mit Artikel: eseguire
Femininum / Plural: ''
IPA: ''
Definition: ausführen, durchführen
Register: ''
Beispielsätze: |-
  L’esercito deve *eseguire* gli ordini senza discutere.
  Die Armee muss die Befehle *ohne zu hinterfragen ausführen*.
  
  Hai *eseguito* tutti i compiti che ti avevo assegnato? Potresti avere un vantaggio se finisci prima.
  Hast du alle Aufgaben *ausgeführt*, die ich dir gegeben hatte? Du könntest einen Vorteil haben, wenn du früher fertig wirst.
  
  Il medico sta per *eseguire* una terapia molto delicata al paziente, quindi dobbiamo stare attenti.
  Der Arzt wird gleich eine sehr heikle *Therapie* am Patienten durchführen, also müssen wir aufpassen.
  
  Gli scienziati hanno *eseguito* le analisi sul campione, ma nessuno ha reagito come previsto.
  Die Wissenschaftler haben die *Analysen* an der Probe durchgeführt, aber niemand hat so reagiert, wie erwartet.
  
  Se non *esegui* subito le istruzioni, rischi di peccare di negligenza, e non è solamente una crisi di fiducia.
  Wenn du die Anweisungen nicht sofort *ausführst*, riskierst du, dich der Nachlässigkeit schuldig zu machen – und das ist nicht nur eine Vertrauenskrise.
