Rang: 2391
Wort: rapido
Wortart: adj
Wort mit Artikel: rapido
Femininum / Plural: ''
IPA: ''
Definition: schnell, zügig
Register: ''
Beispielsätze: |-
  Abbiamo preso un treno *rapido* per arrivare in tempo alla stazione.
  Wir haben einen *schnellen* Zug genommen, um pünktlich am Bahnhof anzukommen.
  
  Se fossi *più rapido*, non avresti perso l’aereo!
  Wenn du *schneller* wärst, hättest du das Flugzeug nicht verpasst!
  
  È *rapido* nel risolvere i problemi, ma a volte trascura i dettagli.
  Er ist *zügig* bei der Problemlösung, aber manchmal vernachlässigt er die Details.
  
  Vorrei un metodo *più rapido* per pulire la casa, perché non ho molto tempo.
  Ich würde eine *schnellere* Methode zur Hausreinigung bevorzugen, weil ich nicht viel Zeit habe.
  
  Anche se il percorso è *più rapido*, preferisco quello panoramico.
  Obwohl die Strecke *schneller* ist, bevorzuge ich die mit der Aussicht.
