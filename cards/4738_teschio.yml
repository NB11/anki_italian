Rang: 4738
Wort: teschio
Wortart: n.m
Wort mit Artikel: il teschio
Femininum / Plural: teschi
IPA: ''
Definition: der Schädel, -
Register: ''
Beispielsätze: |-
  Il medico ha analizzato il *teschio* del paziente con attenzione.
  Der Arzt hat den *Schädel* des Patienten aufmerksam analysiert.
  
  Nel romanzo, il detective trova un *teschio* nascosto sotto il pavimento.
  Im Roman findet der Detektiv einen versteckten *Schädel* unter dem Boden.
  
  Hai visto quel film dove lo *teschio* parlante terrorizza tutti?
  Hast du diesen Film gesehen, in dem der sprechende *Schädel* alle terrorisiert?
  
  Nonostante la sua età, la memoria del nonno sui *teschi* antichi era ancora vivida.
  Trotz seines Alters war die Erinnerung des Großvaters an antike *Schädel* noch sehr lebendig.
  
  Gli archeologi hanno scoperto un intero sito con centinaia di *teschi* in una grotta.
  Die Archäologen haben eine ganze Stätte mit hunderten von *Schädeln* in einer Höhle entdeckt.
