Rang: 2274
Wort: distretto
Wortart: n.m
Wort mit Artikel: il distretto
Femininum / Plural: distretti
IPA: ''
Definition: der Bezirk, -e
Register: ''
Beispielsätze: |-
  Il *distretto* di Milano è molto trafficato durante l’ora di punta.
  Das *Stadtviertel* von Mailand ist zur Stoßzeit sehr belebt.
  
  Abita in un *distretto* residenziale della città, lontano dal caos del centro.
  Er wohnt in einem *Wohnviertel* der Stadt, weit entfernt vom Trubel der Innenstadt.
  
  Il sindaco ha promesso di riqualificare il *distretto* industriale abbandonato.
  Der Bürgermeister hat versprochen, das verlassene *Gewerbegebiet* aufzuwerten.
  
  Non è difficile trovare un buon ristorante in questo *distretto* turistico.
  In diesem *Touristenbezirk* ist es nicht schwer, ein gutes Restaurant zu finden.
  
  Il nuovo centro commerciale sarà costruito in un *distretto* che era prima una zona agricola.
  Das neue Einkaufszentrum wird in einem *Bezirk* gebaut, der vorher eine landwirtschaftliche Zone war.
