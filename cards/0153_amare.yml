Rang: 153
Wort: amare
Wortart: v
Wort mit Artikel: amare
Femininum / Plural: ''
IPA: ''
Definition: lieben
Register: ''
Beispielsätze: |-
  Io *amo* molto la mia famiglia.
  Ich *liebe* meine Familie sehr.
  
  Hai mai *amato* qualcuno così profondamente?
  Hast du jemanden je so tief *geliebt*?
  
  Lei disse che avrebbe sempre *amato* la musica jazz.
  Sie sagte, sie würde Jazzmusik immer *lieben*.
  
  Se *amassi* la natura, non inquineresti così tanto.
  Wenn du die Natur *liebst*, würdest du nicht so viel verschmutzen.
  
  Dicono che gli italiani *amino* la buona cucina.
  Man sagt, Italiener *lieben* gutes Essen.
