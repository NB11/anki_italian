Rang: 2969
Wort: foglia
Wortart: n.f
Wort mit Artikel: la foglia
Femininum / Plural: foglie
IPA: ''
Definition: das Blatt, -ätter
Register: ''
Beispielsätze: |-
  La *foglia* d’autunno cadde lentamente a terra, danzando nel vento freddo.
  Das *Blatt* des Herbstes fiel langsam zu Boden und tanzte im kalten Wind.
  
  Ho notato che ogni *foglia* del mio bonsai ha una forma unica e affascinante.
  Ich habe bemerkt, dass jedes *Blatt* meines Bonsai eine einzigartige und faszinierende Form hat.
  
  Se raccogliessi tutte le *foglie* in giardino, potremmo farci un mucchio per il compost.
  Wenn du alle *Blätter* im Garten aufsammelst, könnten wir einen Haufen für den Kompost daraus machen.
  
  La *foglia* che hai in mano sembra appartenere a una quercia, ma non ne sono sicuro.
  Das *Blatt*, das du in der Hand hältst, scheint zu einer Eiche zu gehören, aber ich bin mir nicht sicher.
  
  Non appena la *foglia* toccò l’acqua del lago, cominciò a galleggiare come se fosse leggerissima.
  Sobald das *Blatt* das Wasser des Sees berührte, begann es zu treiben, als wäre es federleicht.
