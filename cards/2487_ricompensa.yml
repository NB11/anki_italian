Rang: 2487
Wort: ricompensa
Wortart: n.f
Wort mit Artikel: la ricompensa
Femininum / Plural: ricompense
IPA: ''
Definition: die Belohnung, -en
Register: ''
Beispielsätze: |-
  Hanno promesso una *ricompensa* a chiunque fornisca informazioni utili alla polizia.
  Sie haben eine *Belohnung* für jeden versprochen, der der Polizei nützliche Informationen liefert.
  
  Non accettare denaro come *ricompensa* per azioni che mettono in pericolo altri.
  Nimm kein Geld als *Belohnung* für Handlungen an, die andere gefährden.
  
  La *ricompensa* che hai ricevuto non corrisponde all’impegno che hai profuso in questo progetto.
  Die *Belohnung*, die du erhalten hast, entspricht nicht dem Einsatz, den du in dieses Projekt gesteckt hast.
  
  Se troverai il cane smarrito, ci sarà una *ricompensa* generosa per te!
  Wenn du den verlorenen Hund findest, gibt es eine großzügige *Belohnung* für dich!
  
  La corte ha stabilito che la *ricompensa* prevista dal contratto è da considerarsi nulla.
  Das Gericht hat festgestellt, dass die im Vertrag vorgesehene *Belohnung* als nichtig gilt.
