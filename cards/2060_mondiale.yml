  Trotz der *weltweiten* Konkurrenz ist unsere Marke gewachsen.
  
  Se non agiranno ora, le conseguenze *mondiali* saranno disastrose.
  Wenn sie jetzt nicht handeln, werden die *global*en Folgen verheerend sein.
  
