Rang: 988
Wort: stazione
Wortart: n.f
Wort mit Artikel: la stazione
Femininum / Plural: stazioni
IPA: ''
Definition: der Bahnhof, -¨e
Register: ''
Beispielsätze: |-
  Devo andare alla *stazione* per prendere il treno che parte tra mezz'ora.
  Ich muss zum *Bahnhof* gehen, um den Zug zu nehmen, der in einer halben Stunde abfährt.
  
  Mentre aspettavo alla *stazione*, ho visto un episodio interessante di una serie famosa su uno schermo pubblicitario.
  Während ich am *Bahnhof* wartete, sah ich eine interessante Folge einer berühmten Serie auf einem Werbe-Bildschirm.
  
  Se non avessi perso il treno, non avrei dovuto recuperare il biglietto alla *stazione* di Firenze.
  Wenn ich den Zug nicht verpasst hätte, müsste ich das Ticket nicht am *Bahnhof* in Florenz nachholen.
  
  È meglio arrivare in anticipo alla *stazione*, perché i treni spesso partono in orario anche sotto la pioggia.
  Es ist besser, frühzeitig am *Bahnhof* anzukommen, denn die Züge fahren oft pünktlich, selbst bei Regen.
  
  Dicono che alla *stazione* centrale ci sia un laboratorio dove si studiano gli odori per aiutare i cani a trovare i fuggitivi, oltre a tutto il resto.
  Man sagt, dass es am *Hauptbahnhof* ein Labor gibt, in dem Gerüche erforscht werden, um Hunden bei der Suche nach Flüchtigen zu helfen, neben all den anderen Dingen.
