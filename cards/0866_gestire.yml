Rang: 866
Wort: gestire
Wortart: vt
Wort mit Artikel: gestire
Femininum / Plural: ''
IPA: ''
Definition: verwalten, führen
Register: ''
Beispielsätze: |-
  Devo *gestire* un grande progetto con tre colleghi, ma nessuno sembra sapere come gestire i conflitti.
  Ich muss ein großes Projekt mit drei Kollegen verwalten, aber keiner scheint zu wissen, wie er die Konflikte verwalten soll.
  
  La società ha assunto un manager esperto per *gestire* l’azienda in modo più efficiente.
  Die Gesellschaft hat einen erfahrenen Manager eingestellt, um das Unternehmen effizienter zu führen.
  
  Se non *gestisci* bene il tuo tempo, non riuscirai mai a finire tutti i compiti.
  Wenn du deine Zeit nicht gut verwaltest, wirst du die Aufgaben niemals beenden können.
  
  Ho visto che *gestiva* anche i bilanci della famiglia, oltre a quelli della società.
  Ich habe gesehen, dass er sogar die Haushaltsbücher der Familie verwaltete, neben denen der Gesellschaft.
  
  Dunque, vuoi *gestire* tu l’interno della casa o preferisci che lo faccia io?
  Also, willst du das Innere des Hauses verwalten oder soll ich das lieber machen?
