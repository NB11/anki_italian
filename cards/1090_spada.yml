Rang: 1090
Wort: spada
Wortart: n.m
Wort mit Artikel: la spada
Femininum / Plural: spade
IPA: ''
Definition: das Schwert, -er
Register: ''
Beispielsätze: |-
  Nel Medioevo, ogni cavaliere portava con sé una *spada* come simbolo di potere.
  Im Mittelalter trug jeder Ritter ein *Schwert* als Symbol der Macht.
  
  Nonostante l'allenamento, non riuscì a sollevare la *spada* che aveva trovato nel magazzino.
  Trotz des Trainings gelang es ihm nicht, das *Schwert* anzuheben, das er im Lagerhaus gefunden hatte.
  
  Se avessi una *spada* magica, la userei per proteggere la città dagli invasori.
  Wenn ich ein magisches *Schwert* hätte, würde ich es benutzen, um die Stadt vor den Eindringlingen zu schützen.
  
  Il museo espone una *spada* del Seicento che apparteneva a un famoso condottiero.
  Das Museum zeigt ein *Schwert* aus dem siebzehnten Jahrhundert, das einem berühmten Condottiere gehörte.
  
  Prima di partire per la vacanza, vuole vendere quella *spada* che ha ereditato dal nonno.
  Bevor er in den Urlaub fährt, möchte er jenes *Schwert* verkaufen, das er vom Großvater geerbt hat.
