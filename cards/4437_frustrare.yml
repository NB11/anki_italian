Rang: 4437
Wort: frustrare
Wortart: vt
Wort mit Artikel: frustrare
Femininum / Plural: ''
IPA: ''
Definition: enttäuschen, frustrieren
Register: ''
Beispielsätze: |-
  Il professore ha *frustrato* tutti gli studenti perché non ha spiegato bene la lezione.
  Der Lehrer hat uns alle *enttäuscht*, weil er die Lektion nicht gut erklärt hat.
  
  Se continui a lavorare così, rischi di *frustrare* anche i colleghi più pazienti.
  Wenn du so weitermachst, könntest du sogar die geduldigsten Kollegen *frustrieren*.
  
  È inutile che tu ti *frustri* per qualcosa che non dipende da te.
  Es hat keinen Sinn, dass du dich über etwas *frustriert*, das nicht von dir abhängt.
  
  I genitori temevano che il nuovo insegnante avrebbe *frustrato* i figli con le sue richieste troppo elevate.
  Die Eltern fürchteten, der neue Lehrer würde ihre Kinder mit seinen zu hohen Anforderungen *frustrieren*.
  
  Nonostante le difficoltà, lui non si lasciò *frustrare* e continuò a lottare per i suoi sogni.
  Trotz der Schwierigkeiten ließ er sich nicht *frustrieren* und kämpfte weiter für seine Träume.
