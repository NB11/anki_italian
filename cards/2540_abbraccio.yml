Rang: 2540
Wort: abbraccio
Wortart: n.m
Wort mit Artikel: l'abbraccio
Femininum / Plural: gli abbracci
IPA: ''
Definition: die Umarmung, -en
Register: ''
Beispielsätze: |-
  Dopo la lunga separazione, hanno scambiato un affettuoso *abbraccio* e si sono promessi di non lasciarsi mai più.
  Nach der langen Trennung haben sie eine zärtliche *Umarmung* ausgetauscht und sich geschworen, sich nie wieder zu trennen.
  
  Se avessi saputo che sarebbe venuta, mi sarei preparato per un caloroso *abbraccio* invece di stare qui impacciato.
  Wenn ich gewusst hätte, dass sie kommt, hätte ich mich auf eine herzliche *Umarmung* vorbereitet, statt hier steif dazustehen.
  
  Mentre il bambino piangeva, la nonna lo prese in braccio e gli diede un tenero *abbraccio* che lo calmò all’istante.
  Während das Kind weinte, nahm die Oma es in die Arme und gab ihm eine sanfte *Umarmung*, die es sofort beruhigte.
  
  Nonostante il litigio, lei non riuscì a resistere e gli gettò le braccia al collo in un *abbraccio* spontaneo e impetuoso.
  Trotz des Streits konnte sie nicht widerstehen und warf ihm die Arme um den Hals in einer impulsiven *Umarmung*.
  
  Quando lui tornò a casa dopo dieci anni all’estero, l’aspettava un forte *abbraccio* da parte di tutta la famiglia riunita.
  Als er nach zehn Jahren im Ausland nach Hause zurückkehrte, erwartete ihn eine herzliche *Umarmung* von der gesamten versammelten Familie.
