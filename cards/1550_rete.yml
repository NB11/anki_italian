  Hätten wir das *Sicherheitsnetz* nicht verloren, hätten wir den Unfall vermieden!
  
  La *rete* televisiva ha trasmesso uno spettacolo che ha sconvolto tutta Italia.
  Das *Fernsehnetz* hat eine Show ausgestrahlt, die ganz Italien erschüttert hat.
  
  Mia sorella lavora in una banca che ha appena realizzato una nuova *rete* informatica.
  Meine Schwester arbeitet in einer *Bank*, die gerade ein neues Computernetz aufgebaut hat.
