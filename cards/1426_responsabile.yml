Rang: 1426
Wort: responsabile
Wortart: adj
Wort mit Artikel: responsabile
Femininum / Plural: responsabili
IPA: ''
Definition: verantwortlich, zuständig
Register: ''
Beispielsätze: |-
  Il sindaco è *responsabile* della sicurezza del paese.
  Der Bürgermeister ist für die Sicherheit des Landes *verantwortlich*.
  
  Dobbiamo trovare chi è *responsabile* di questo cambiamento improvviso.
  Wir müssen herausfinden, wer für diese plötzliche *Veränderung* verantwortlich ist.
  
  Lei si è dimostrata *responsabile* nonostante le difficoltà.
  Sie hat sich trotz der Schwierigkeiten *verantwortlich* gezeigt.
  
  Se non sei *responsabile*, non puoi gestire una squadra così grande.
  Wenn du nicht *verantwortlich* bist, kannst du kein so großes Team leiten.
  
  Credo che tu sia la persona più *responsabile* per questo progetto.
  Ich glaube, dass du die *verantwortlichste* Person für dieses Projekt bist.
