Rang: 1534
Wort: angelo
Wortart: n.m
Wort mit Artikel: l'angelo
Femininum / Plural: angeli
IPA: ''
Definition: der Engel, -
Register: ''
Beispielsätze: |-
  L'*angelo* volava sopra la città illuminata dalla luna.
  Der *Engel* flog über die vom Mond erleuchtete Stadt.
  
  Spero che tu non sia un *angelo*, perché devo chiederti una cosa importante.
  Ich hoffe, du bist kein *Engel*, denn ich muss dir etwas Wichtiges fragen.
  
  Negli anni passati, solo pochi hanno visto l'*angelo* che scendeva dal cielo.
  In den vergangenen Jahren haben nur wenige den *Engel* gesehen, der vom Himmel herabstieg.
  
  Se fossi un *angelo*, vivrei nel paradiso, ma purtroppo non è così.
  Wäre ich ein *Engel*, würde ich im Paradies leben, aber leider ist das nicht der Fall.
  
  Il pittore ha dipinto un *angelo* con le ali dorate, che sembra reale.
  Der Maler hat einen *Engel* mit goldenen Flügeln gemalt, der fast echt wirkt.
