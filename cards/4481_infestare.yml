Rang: 4481
Wort: infestare
Wortart: v
Wort mit Artikel: infestare
Femininum / Plural: ''
IPA: ''
Definition: befallen, überziehen, verseuchen
Register: ''
Beispielsätze: |-
  I topi hanno *infestato* la cantina di zio Mario, rovinando tutto il cibo.
  Die Mäuse haben den Keller von Onkel Mario *befallen*, das ganze Essen ruiniert.
  
  Il malato teme che i parassiti *infestino* il suo corpo, nonostante le medicine.
  Der Kranke fürchtet, dass Parasiten seinen Körper *verseuchen*, trotz der Medikamente.
  
  Durante l'estate, le zanzare *infestano* spesso questi luoghi paludosi.
  Im Sommer *überziehen* Mücken oft diese sumpfigen Orte.
  
  Se non pulisci regolarmente, muffe e batteri potrebbero *infestare* il frigorifero.
  Wenn du nicht regelmäßig putzt, könnten Schimmel und Bakterien den Kühlschrank *befallen*.
  
  I piranha *infestano* questi fiumi solo quando le acque sono basse, ma è pericoloso avvicinarsi.
  Piranhas *überziehen* diese Flüsse nur bei Niedrigwasser, aber es ist gefährlich, sich zu nähern.
