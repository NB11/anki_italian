Rang: 396
Wort: fottere
Wortart: v
Wort mit Artikel: fottere
Femininum / Plural: ''
IPA: ''
Definition: ficken, *vulgär* betrügen, verarschen
Register: ''
Beispielsätze: |-
  Lui *fotte* spesso la fidanzata la mattina.
  Er *fickt* oft seine Freundin am Morgen.
  
  Non *fottete* gli animali per nessuna ragione!
  *Betrügt* die Tiere um keinen Preis!
  
  Mi hanno *fottuto* con un affare falso.
  Sie haben mich mit einem *faulen* Deal *übers Ohr gehauen*.
  
  Secondo te, *fotterà* ancora tutto e tutti?
  Meinst du, er wird *alles und jeden betrügen*?
  
  Se continui così, te la *fotti* da solo!
  Wenn du so weitermachst, *verarschst* du dich *selbst*!".
