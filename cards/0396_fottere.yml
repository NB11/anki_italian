Beispielsätze: |-
  Lui *fotte* spesso la fidanzata la mattina.
  Er *fickt* oft seine Freundin am Morgen.
  
  Non *fottete* gli animali per nessuna ragione!
  *Betrügt* die Tiere um keinen Preis!
  
