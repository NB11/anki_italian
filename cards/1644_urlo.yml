Rang: 1644
Wort: urlo
Wortart: n.m
Wort mit Artikel: lo urlo
Femininum / Plural: urli
IPA: ''
Definition: der Schrei, -e
Register: ''
Beispielsätze: |-
  Lo *urlo* del baby teneva sveglia tutta la marina.
  Der *Schrei* des Babys hielt die ganze Nachbarschaft wach.
  
  Ho sentito un *urlo* che veniva dal corridoio, sembravo un ladro in fuga.
  Ich habe einen *Schrei* gehört, der aus dem corridoio kam.
  
  L’*urlo* dell’ambulanza segnalava un’emergenza in centro.
  Der *Schrei* der ambulanza signalisierte einen Notfall.
  
  All’improvviso ha lanciato un *urlo* che ha fatto voltare tutti gli ospiti del ristorante disgustoso.
  Plötzlich hat sie einen *Schrei* ausgestoßen, der alle erschreckte.
  
  L’*urlo* del professore ha interrotto l’analisi silenziosa degli studenti durante la lezione.
  Der *Schrei* des Professors unterbrach die stille analisi der Studenten.
