Beispielsätze: |-
  Il *signore* che abita qui è molto gentile.
  Der *Herr*, der hier wohnt, ist sehr nett.
  
  Ho incontrato il *signore* Rossi ieri sera.
  Ich habe gestern Abend den *Herrn* Rossi getroffen.
  
  Chi è quel *signore* che parlava con te?
  Wer ist dieser *Herr*, der mit dir gesprochen hat?
  
  Il *signore* dovrebbe firmare qui, per favore.
  Der *Herr* sollte hier unterschreiben, bitte.
  
  I *signori* Bianchi sono arrivati proprio ora.
  Die *Herren* Bianchi sind gerade angekommen.
