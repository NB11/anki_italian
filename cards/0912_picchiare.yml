Rang: 912
Wort: picchiare
Wortart: v
Wort mit Artikel: picchiare
Femininum / Plural: ''
IPA: ''
Definition: schlagen, schlagen, prügeln
Register: ''
Beispielsätze: |-
  Non *picchiare* mai un animale, è crudele.
  Schlage nie ein Tier, das ist grausam.
  
  Se lo *picchi*, lui chiamerà la polizia.
  Wenn du ihn *schlägst*, wird er die Polizei rufen.
  
  Il bullo ha minacciato di *picchiare* il nuovo compagno di classe.
  Der Schläger hat gedroht, den neuen Mitschüler zu *schlagen*.
  
  Hanno detto che non avresti *picchiato* nessuno, ma ti hanno visto.
  Sie sagten, du würdest niemanden *schlagen*, doch sie haben dich gesehen.
  
  Mi dispiace che tu sia stato costretto a *picchiare* qualcuno per difenderti.
  Es tut mir leid, dass du gezwungen warst, jemanden zu *schlagen*, um dich zu verteidigen.
Audio: ''
Notiz: ''
Dispersion: ''
