Rang: 3958
Wort: scontato
Wortart: adj
Wort mit Artikel: scontato
Femininum / Plural: ''
IPA: ''
Definition: abgezinst, herabgesetzt, ermäßigt, selbstverständlich
Register: ''
Beispielsätze: |-
  Il biglietto del cinema era *scontato* del 30% perché era un giorno feriale.
  Die Kinokarte war um 30% *ermäßigt*, weil es ein Wochentag war.
  
  Dopo aver lavorato tanto, la vittoria sembrava quasi *scontata*.
  Nach so viel Arbeit wirkte der Sieg fast *selbstverständlich*.
  
  Non dare per *scontato* che tutti la pensino come te.
  Nimm nicht *selbstverständlich* an, dass alle so denken wie du.
  
  Avresti dovuto prenotare prima, così il volo non sarebbe stato così *scontato*.
  Hättest du früher buchen sollen, dann wäre der Flug nicht so *abgezinst* gewesen.
  
  Anche se il prezzo era *scontato*, non ho comprato quella borsa scadente.
  Obwohl der Preis *herabgesetzt* war, habe ich diese billige Tasche nicht gekauft.
