Rang: 2087
Wort: puntata
Wortart: n.f
Wort mit Artikel: la puntata
Femininum / Plural: puntate
IPA: ''
Definition: die Folge, -n (einer Serie)
Register: ''
Beispielsätze: |-
  Questa sera trasmettono una nuova *puntata* della serie che mi piace tanto.
  Heute Abend kommt eine neue *Folge* der Serie, die ich so mag.
  
  Ho perso l'ultima *puntata* perché ero occupato con il lavoro.
  Ich habe die letzte *Folge* verpasst, weil ich mit der Arbeit beschäftigt war.
  
  Credo che la prossima *puntata* svelerà finalmente il mistero del personaggio scomparso.
  Ich glaube, dass die nächste *Folge* endlich das Geheimnis der verschwundenen Figur lüften wird.
  
  Aspetta che finisca questa *puntata*, poi usciamo insieme.
  Warte, bis diese *Folge* zu Ende ist, dann gehen wir zusammen weg.
  
  Non vedo l’ora di vedere come andrà a finire la *puntata* di stasera!
  Ich kann es kaum erwarten zu sehen, wie die heutige *Folge* endet.
