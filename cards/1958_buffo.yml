Rang: 1958
Wort: buffo
Wortart: adj
Wort mit Artikel: buffo
Femininum / Plural: ''
IPA: ''
Definition: komisch, lustig
Register: ''
Beispielsätze: |-
  Quel film era così *buffo* che mi sono rotto le costole dalle risate.
  Dieser Film war so *komisch*, dass ich mir fast die Rippen vor Lachen gerissen habe.
  
  Non avrebbe mai pensato che una situazione così grave potesse avere un finale *buffo*.
  Er hätte nie gedacht, dass eine so ernste Situation ein *lustiges* Ende haben könnte.
  
  Mio fratello ha fatto una domanda *buffa* che ha messo tutti in imbarazzo.
  Mein Bruder hat eine *komische* Frage gestellt, die alle in Verlegenheit gebracht hat.
  
  Se avessi visto la sua faccia mentre parlava, avresti riso anche tu di questo discorso così *buffo*.
  Wenn du sein Gesicht gesehen hättest, während er sprach, hättest du auch über diese *komische* Rede gelacht.
  
  È insolito che una tragedia si trasformi in qualcosa di *buffo*, ma qui è successo davvero.
  Es ist ungewöhnlich, dass sich eine Tragödie in etwas *Lustiges* verwandelt, aber hier ist es tatsächlich passiert.
