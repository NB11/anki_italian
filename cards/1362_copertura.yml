Rang: 1362
Wort: copertura
Wortart: n.f
Wort mit Artikel: la copertura
Femininum / Plural: coperture
IPA: ''
Definition: die Abdeckung, der Schutz
Register: ''
Beispielsätze: |-
  La *copertura* del tetto era stata danneggiata dalla grandine di ieri.
  Die *Abdeckung* des Daches war durch den Hagel von gestern beschädigt worden.
  
  Bisogna controllare che la *copertura* del serbatoio non abbia perdite prima di partire.
  Man muss sicherstellen, dass die *Abdeckung* des Tanks keine Undichtigkeiten hat, bevor man losfährt.
  
  Secondo la mia opinione, la migliore *copertura* per le ferite è quella a base di argento.
  Meiner *Meinung* nach ist die beste Abdeckung für Wunden die silberhaltige.
  
  Hanno proposto una *copertura* assicurativa che include anche i danni da alluvione.
  Sie haben einen Versicherungsschutz vorgeschlagen, der auch Hochwasserschäden abdeckt.
  
  La *copertura* dei costi di viaggio sarà garantita dall’azienda, purché tu presenti le ricevute.
  Die *Abdeckung* der Reisekosten wird vom Unternehmen übernommen, sofern du die Quittungen vorlegst.
