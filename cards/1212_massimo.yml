IPA: ''
Definition: das Maximum, der Höhepunkt
Register: ''
Beispielsätze: |-
  Il *massimo* della temperatura è stato raggiunto ieri alle 15.
  Das *Maximum* der Temperatur wurde gestern um 15 Uhr erreicht.
  
