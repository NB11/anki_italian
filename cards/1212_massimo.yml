  Il *massimo* della folla si è radunato vicino all’ingresso dello stadio.
  Die *Menge* der Zuschauer hatte sich nahe dem Stadion-Eingang versammelt.
  
  Dopo anni di studio, ha raggiunto il *massimo* delle sue possibilità.
  Nach Jahren des Lernens hat er das *Maximum* seiner Möglichkeiten erreicht.
