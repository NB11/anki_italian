Rang: 616
Wort: metà
Wortart: n.f
Wort mit Artikel: la metà
Femininum / Plural: le metà
IPA: ''
Definition: die Hälfte, der Teil, die Mitte
Register: ''
Beispielsätze: |-
  Ho divorziato perché *metà* della coppia non si impegnava abbastanza.
  Ich habe mich scheiden lassen, weil sich *die Hälfte* des Paares nicht genug engagierte.
  
  Dove hai messo la *metà* della torta che avanzava?
  Wohin hast du die *Hälfte* des übrig gebliebenen Kuchens getan?
  
  Verso le tre ho finito solo *la metà* del lavoro che mi aspettava.
  Gegen drei Uhr hatte ich erst *die Hälfte* der Arbeit, die auf mich wartete, erledigt.
  
  La *metà* dei turisti ha scelto di visitare il museo, l’altra preferiva il mare.
  *Die Hälfte* der Touristen entschied sich dafür, das Museum zu besichtigen, die andere zog das Meer vor.
  
  Non è giusto che tu tenga per te tutta la *metà* del patrimonio familiare!
  Es ist nicht fair, dass du den gesamten *Teil* des Familienvermögens für dich behältst!
