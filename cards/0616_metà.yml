Rang: 616
Wort: metà
Wortart: n.f
Wort mit Artikel: la metà
Femininum / Plural: metà
IPA: ''
Definition: die Hälfte, der Teil, der Abschnitt
Register: ''
Beispielsätze: |-
  L’Italia è divisa in *metà* dal fiume Po, che separa il nord dal sud.
  Italien ist durch den Fluss Po *in zwei Hälften* geteilt, der den Norden vom Süden trennt.
  
  Ho speso *metà* dei miei soldati per costruire questa fortezza.
  Ich habe *die Hälfte* meiner Soldaten ausgegeben, um diese Festung zu bauen.
  
  Vorrei che tu mi dicessi dove hai trovato *metà* della lista originale.
  Ich möchte, dass du mir sagst, wo du *die Hälfte* der ursprünglichen Liste gefunden hast.
  
  Prima dell’incontro, ho fatto un giro in *centro* per pulire la mia spalla dal segreto che portavo.
  Vor dem *Treffen* bin ich ins Zentrum gegangen, um meine Schulter vom Geheimnis zu befreien, das ich trug.
  
  Se avessi *metà* del coraggio di tuo zio, già sbrigheresti questa questione pericolosa!
  Wenn du *die Hälfte* des Mutes deines Onkels hättest, würdest du diese gefährliche Frage längst erledigt haben!
