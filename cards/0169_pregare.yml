Rang: 169
Wort: pregare
Wortart: v
Wort mit Artikel: pregare
Femininum / Plural: ''
IPA: ''
Definition: bitten, anflehen, beten
Register: ''
Beispielsätze: |-
  Ti *prego* di ascoltarmi con attenzione.
  Ich *bitte* dich, mir aufmerksam zuzuhören.
  
  Abbiamo *pregato* per il suo recupero.
  Wir haben für seine Genesung *gebetet*.
  
  Perché non lo *preghi* di aiutarti?
  Warum *bittest* du ihn nicht, dir zu helfen?
  
  Mi hanno *pregato* di restare ancora un po’.
  Sie haben mich *angefleht*, noch ein bisschen zu bleiben.
  
  Se avessi bisogno, *pregherei* qualcuno in chiesa.
  Wenn ich Hilfe bräuchte, würde ich in der Kirche *beten*.
