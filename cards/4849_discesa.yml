Rang: 4849
Wort: discesa
Wortart: n.f
Wort mit Artikel: la discesa
Femininum / Plural: discese
IPA: ''
Definition: der Abstieg, -e
Register: ''
Beispielsätze: |-
  La *discesa* dalla montagna è stata faticosa ma appagante.
  Der *Abstieg* vom Berg war anstrengend aber befriedigend.
  
  Dopo la *discesa* riposiamoci un po’ prima di continuare.
  Nach dem *Abstieg* sollten wir uns erstmal ausruhen, bevor wir weitermachen.
  
  Se non controlli la *discesa*, rischi di cadere!
  Wenn du den *Abstieg* nicht kontrollierst, kannst du stürzen!
  
  Ha scelto una *discesa* più ripida per sfuggire agli inseguitori.
  Er wählte einen steileren *Abstieg*, um den Verfolgern zu entkommen.
  
  La *discesa* lenta permette di godersi il panorama.
  Ein langsamer *Abstieg* ermöglicht es, die Aussicht zu genießen.
