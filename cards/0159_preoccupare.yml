Rang: 159
Wort: preoccupare
Wortart: v
Wort mit Artikel: preoccupare
Femininum / Plural: ''
IPA: ''
Definition: sich Sorgen machen
Register: ''
Beispielsätze: |-
  Mi *preoccupo* molto per gli esami di domani.
  Ich *mache* mir große Sorgen wegen der Prüfungen morgen.
  
  Ti *preoccuperei* tanto se non mi rispondessi presto.
  Ich würde mir *große Sorgen machen*, wenn du mir nicht bald antwortest.
  
  È normale *preoccuparsi* per la salute della famiglia.
  Es ist normal, sich um die Gesundheit der Familie *Sorgen zu machen*.
  
  Non *preoccuparti* per me, sto bene!
  *Mach* dir keine Sorgen um mich, es geht mir gut!
  
  Se non arrivano, mi *preoccuperebbero* molto.
  Wenn sie nicht ankommen, würde mich das sehr *beunruhigen*.
