Rang: 3671
Wort: radere
Wortart: v
Wort mit Artikel: radere
Femininum / Plural: ''
IPA: ''
Definition: rasieren, entfernen
Register: ''
Beispielsätze: |-
  Mario si *radono* la barba ogni mattina prima di andare al lavoro.
  Mario *rasiert* sich jeden Morgen die Barbe, bevor er zur Arbeit geht.
  
  Ho bisogno di qualcuno che mi *radi* i capelli molto corti.
  Ich brauche jemanden, der mir die Haare sehr kurz *rasiert*.
  
  Se non ti *radi* regolarmente, la pelle diventa ruvida.
  Wenn du dich nicht regelmäßig *rasierst*, wird die Haut rau.
  
  Il barbiere gli ha consigliato di non *radersi* con un rasoio elettrico.
  Der Friseur hat ihm geraten, sich nicht mit einem Elektrorasierer zu *rasieren*.
  
  Domani mattina dovrò *radermi* la nuca perché ho un collo troppo corto.
  Morgen früh werde ich mir den Nacken *rasieren* müssen, weil ich einen zu kurzen Hals habe.
Audio: ''
Notiz: ''
