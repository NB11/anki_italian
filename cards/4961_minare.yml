Rang: 4961
Wort: minare
Wortart: vt
Wort mit Artikel: minare
Femininum / Plural: ''
IPA: ''
Definition: anordnen, befehlen
Register: ''
Beispielsätze: |-
  Il muezzin *mina* i fedeli alla preghiera cinque volte al giorno.
  Der Muezzin *ordnet* die Gläubigen fünfmal täglich zum Gebet an.
  
  Il capitano *minò* la ritirata perché i soldati non erano pronti.
  Der Kapitän *befahl* den Rückzug, weil die Soldaten nicht bereit waren.
  
  Se non *minassi* la procedura correttamente, potremmo commettere degli errori.
  Wenn du das Verfahren nicht *anordnest*, könnten wir Fehler machen.
  
  Il giudice ha *minato* che il processo venga sospeso fino a nuovo ordine.
  Der Richter hat *befohlen*, dass das Verfahren bis auf Weiteres ausgesetzt wird.
  
  Gli antichi re *minavano* leggi che oggi ci sembrano ingiuste.
  Die alten Könige *ordneten* Gesetze an, die uns heute ungerecht erscheinen.
