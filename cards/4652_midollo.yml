Rang: 4652
Wort: midollo
Wortart: n.m
Wort mit Artikel: il midollo
Femininum / Plural: midolli
IPA: ''
Definition: das *Mark*
Register: ''
Beispielsätze: |-
  Il *midollo* osseo è essenziale per la produzione delle cellule del sangue.
  Das *Knochenmark* ist essenziell für die Produktion der Blutzellen.
  
  Dopo la caduta, il medico ha controllato se c’era una lesione al *midollo* spinale.
  Nach dem Sturz hat der Arzt überprüft, ob es eine Verletzung des *Rückenmarks* gab.
  
  In questa ricetta, il *midollo* di bue dà un sapore unico al brodo.
  In diesem Rezept verleiht das *Knochenmark* der Brühe einen einzigartigen Geschmack.
  
  I ricercatori stanno studiando come trapiantare il *midollo* per curare alcune malattie gravi.
  Die Forscher untersuchen, wie man *Knochenmark* transplantieren kann, um schwere Krankheiten zu heilen.
  
  Non sapevo che il *midollo* di questo frutto fosse commestibile!
  Ich wusste nicht, dass das *Mark* dieser Frucht essbar ist!
