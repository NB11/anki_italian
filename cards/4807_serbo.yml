  *Serben* haben eine sehr reiche und faszinierende Kultur.
  
  Nonostante sia nato a Belgrado, lui si sente soprattutto italiano.
  Obwohl er in Belgrad geboren wurde, fühlt er sich vor allem als *Serbe*.
  
  Durante il nostro viaggio abbiamo incontrato un gruppo di *serbi* molto ospitali.
  Während unserer Reise haben wir eine Gruppe sehr gastfreundlicher *Serben* kennengelernt.
