Rang: 4560
Wort: dilettante
Wortart: n.m/f
Wort mit Artikel: il dilettante
Femininum / Plural: i dilettanti / le dilettanti
IPA: ''
Definition: der Laie, -n / die *Dilettantin*, -nen
Register: ''
Beispielsätze: |-
  Non essere un *dilettante*, se vuoi ottenere risultati seri in questo campo.
  Sei kein *Laie*, wenn du in diesem Bereich ernsthafte Ergebnisse erzielen willst.
  
  Quella pittrice era considerata una semplice *dilettante* dalla critica ufficiale.
  Diese Malerin wurde von der offiziellen Kritik lediglich als *Dilettantin* eingestuft.
  
  Nonostante fosse un *dilettante*, riuscì a vincere il torneo locale grazie alla sua tenacia.
  Trotz seines *Dilettantismus* gewann er das lokale Turnier dank seines Durchhaltevermögens.
  
  Se avessi studiato di più, oggi non saresti un *dilettante* in questa materia.
  Hättest du mehr gelernt, wärst du heute kein *Laie* auf diesem Gebiet.
  
  I *dilettanti* spesso si appassionano più dei professionisti, ma manca loro la tecnica.
  Die *Laien* begeistern sich oft mehr als die Profis, aber ihnen fehlt das Können.
