Rang: 1890
Wort: contante
Wortart: n.m
Wort mit Artikel: il contante
Femininum / Plural: ''
IPA: ''
Definition: das Bargeld (nur Singular)
Register: ''
Beispielsätze: |-
  Ho pagato in *contante* perché non volevo lasciare tracce.
  Ich habe mit *Bargeld* bezahlt, weil ich keine Spuren hinterlassen wollte.
  
  Vor di pagare, ho controllato se avevo abbastanza *contante* nel portafoglio.
  Bevor ich bezahlte, habe ich überprüft, ob ich genug *Bargeld* im Geldbeutel hatte.
  
  La mancanza di *contante* in banca preoccupa molti economisti.
  Das *Fehlen* von Bargeld in der Bank beunruhigt viele Ökonomen.
  
  Se avessi *contante*, comprerei subito quel quadro che mi piace tanto.
  Wenn ich *Bargeld* hätte, würde ich sofort jenes Gemälde kaufen, das mir so gefällt.
  
  Dicono che in futuro si userà sempre meno *contante*, ma molti non sono d’accordo.
  Man sagt, in Zukunft werde man immer weniger *Bargeld* verwenden, aber viele sind anderer Meinung.
