Rang: 2161
Wort: commissario
Wortart: n.m
Wort mit Artikel: il commissario
Femininum / Plural: commissari
IPA: ''
Definition: der Kommissar, -e
Register: ''
Beispielsätze: |-
  Con l’aumento dei reati, *il commissario* ha deciso di aumentare le pattuglie notturne.
  Wegen der steigenden Kriminalität hat *der Kommissar* beschlossen, die nächtlichen Patrouillen zu verstärken.
  
  I cittadini hanno riferito al *commissario* che qualcosa di strano accadeva nel quartiere.
  Die Bürger haben *dem Kommissar* berichtet, dass etwas Seltsames im Viertel vorfiel.
  
  Spero che *il commissario* riesca a risolvere il caso prima che sia troppo tardi.
  Ich hoffe, dass *der Kommissar* den Fall lösen kann, bevor es zu spät ist.
  
  Quando arrivò la polizia, *il commissario* capì subito che si trattava di una faccenda delicata.
  Als die Polizei eintraf, erkannte *der Kommissar* sofort, dass es sich um eine heikle Angelegenheit handelte.
  
  Dietro sua richiesta, *il commissario* volle interrogare tutti i testimoni del delitto.
  Auf seine Bitte hin wollte *der Kommissar* alle Zeugen des Verbrechens verhören.
