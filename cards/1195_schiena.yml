Rang: 1195
Wort: schiena
Wortart: n.f
Wort mit Artikel: la schiena
Femininum / Plural: schiene
IPA: ''
Definition: der Rücken, -
Register: ''
Beispielsätze: |-
  Dopo aver portato la valigia pesante, mi fa male la *schiena* tutta la sera.
  Nach dem Tragen des schweren Koffers tut mir der ganze *Rücken* den ganzen Abend weh.
  
  Nonostante il dolore, Maria ha continuato a lavorare senza *schiena* dritta per giorni.
  Trotz der Schmerzen hat Maria tagelang ohne geraden *Rücken* weitergearbeitet.
  
  Chissà se il medico gli ha detto di massaggiare la *schiena* con quell’olio speciale?
  Wer weiß, ob der Arzt ihm gesagt hat, den *Rücken* mit diesem speziellen Öl zu massieren?
  
  Il pilota ha sostenuto di avere una *schiena* forte perché passava ore al volante ogni giorno.
  Der Pilot behauptete, einen starken *Rücken* zu haben, weil er stundenlang täglich am Steuer saß.
  
  Hanno rapito il socio solo perché voleva ridurre la *schiena* curva di tutti i dipendenti?
  Haben sie das Mitglied nur entführt, weil er den krummen *Rücken* aller Mitarbeiter verringern wollte?
