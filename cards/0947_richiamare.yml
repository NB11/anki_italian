Rang: 947
Wort: richiamare
Wortart: vt
Wort mit Artikel: richiamare
Femininum / Plural: ''
IPA: ''
Definition: zurückrufen, erinnern, auffordern
Register: ''
Beispielsätze: |-
  Il professore *richiamerà* gli studenti che non hanno studiato.
  Der Lehrer wird die Schüler *rufen*, die nicht gelernt haben.
  
  Mi sono dimenticato di *richiamare* mia sorella ieri sera.
  Ich habe vergessen, meine Schwester *zurückzurufen* gestern Abend.
  
  Se *richiami* il cane con un fischio, viene subito da te.
  Wenn du den Hund mit einem Pfiff *rufst*, kommt er sofort zu dir.
  
  L'allenatore ha *richiamato* la squadra perché non aveva giocato bene.
  Der Trainer hat die Mannschaft *zur Rede gestellt*, weil sie nicht gut gespielt hatte.
  
  Dobbiamo *richiamare* l'attenzione dei membri su questo problema urgente.
  Wir müssen die Mitglieder auf dieses dringende Problem *aufmerksam machen*.
