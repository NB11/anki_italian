Rang: 2320
Wort: stress
Wortart: n.m
Wort mit Artikel: lo stress
Femininum / Plural: gli *stressi*
IPA: ''
Definition: der Stress
Register: ''
Beispielsätze: |-
  Lo *stress* lavorativo lo sta esaurendo, non riesce più a dormire la notte.
  Der *berufliche Stress* raubt ihm die Kraft, er kann nicht mehr schlafen.
  
  Dopo l’incidente ha sofferto di un grave *stress* post-traumatico che lo ha costretto a lasciare il lavoro.
  Nach dem Unfall litt er unter einem schweren *posttraumatischen Stress*, der ihn zur Aufgabe seiner Arbeit zwang.
  
  Se continui ad accumulare *stress* senza rilassarti, rischi un esaurimento.
  Wenn du weiter so viel *Stress* anhäufst, ohne dich zu entspannen, riskierst du einen Burnout.
  
  Il medico gli ha consigliato di praticare yoga per ridurre lo *stress* quotidiano.
  Der Arzt hat ihm Yoga empfohlen, um den täglichen *Stress* abzubauen.
  
  Nonostante lo *stress* degli esami, Marco è riuscito a mantenere ottimi voti grazie alla sua organizzazione.
  Trotz des *Prüfungsstresses* hat Marco dank seiner Planung weiterhin herausragende Noten gehalten.
