Rang: 1522
Wort: dono
Wortart: n.m
Wort mit Artikel: il dono
Femininum / Plural: doni
IPA: ''
Definition: das Geschenk, -e
Register: ''
Beispielsätze: |-
  Ho ricevuto un *dono* molto speciale per il mio compleanno.
  Ich habe ein sehr *besonderes Geschenk* zu meinem Geburtstag bekommen.
  
  Il *dono* che hai scelto è davvero originale e pieno di gusto.
  Das *Geschenk*, das du ausgewählt hast, ist wirklich originell und voller Geschmack.
  
  Hai già aperto il *dono* che ti ho portato?
  Hast du schon das *Geschenk* geöffnet, das ich dir mitgebracht habe?
  
  Non sapevo cosa regalare, alla fine ho optato per un *dono* fatto a mano.
  Ich wusste nicht, was ich schenken sollte, schließlich habe ich mich für ein selbstgemachtes *Geschenk* entschieden.
  
  Vorrei sapere se il *dono* è già stato inserito nella lista dei regali accettati dall'agenzia.
  Ich möchte wissen, ob das *Geschenk* bereits in die Liste der von der Agentur angenommenen Geschenke eingefügt wurde.
