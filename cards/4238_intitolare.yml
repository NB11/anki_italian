Rang: 4238
Wort: intitolare
Wortart: vt
Wort mit Artikel: intitolare
Femininum / Plural: ''
IPA: ''
Definition: benennen, betiteln, nennen
Register: ''
Beispielsätze: |-
  Il regista ha deciso di *intitolare* il suo nuovo film "La vita è bella".
  Der Regisseur hat beschlossen, seinen neuen Film *zu benennen* "Das Leben ist schön".
  
  Si tratta di un documento che si *intitola* "Atto di nascita".
  Es handelt sich um ein Dokument, das *betitelt* ist mit „Geburtsurkunde“.
  
  Non sapevo come *intitolare* il mio racconto, così ho chiesto un consiglio alla professoressa.
  Ich wusste nicht, wie ich meine Erzählung *nennen* sollte, also habe ich die Lehrerin um Rat gefragt.
  
  Anche se è un libro breve, lo *intitolerò* "Il sogno infinito" perché parla di speranze.
  Auch wenn es ein kurzes Buch ist, werde ich es *„Die unendliche Hoffnung“* nennen, denn es handelt von Träumen.
  
  Per *intitolare* una via in suo onore, il comune ha indetto una cerimonia pubblica.
  Um eine Straße zu seinem Ehren *zu benennen*, hat die Kommune eine öffentliche Zeremonie einberufen.
