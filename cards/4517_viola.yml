Beispielsätze: |-
  Preferisco il colore *viola* rispetto al rosa chiaro.
  Ich bevorzuge die *Farbe* lila gegenüber hellem Rosa.
  
  Il cielo al tramonto era di un *viola* acceso che ricordava i tramonti di Firenze.
  Der Himmel bei Sonnenuntergang war in einem leuchtenden *Violett*, das an Sonnenuntergänge in Florenz erinnerte.
  
  Nonostante il parere contrario, ho scelto una maglietta *viola* per la festa.
  Trotz gegenteiliger Meinung habe ich mir ein *lila* T-Shirt für die Party ausgesucht.
  
  Vorrei sapere se questo tessuto sia una tonalità di *viola* o semplicemente scuro.
  Ich würde gerne wissen, ob dieses Gewebe ein *Violett*-Ton oder einfach nur dunkel ist.
  
  Il suo atteggiamento risultava *viola* sotto la luce della lampada ultravioletta.
  Sein Benehmen wirkte unter der ultravioletten Lampe *violett*.
