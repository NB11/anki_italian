Rang: 1428
Wort: addormentare
Wortart: vt
Wort mit Artikel: addormentare
Femininum / Plural: ''
IPA: ''
Definition: in den Schlaf wiegen
Register: ''
Beispielsätze: |-
  La mamma cerca di *addormentare* il neonato con una ninna nanna.
  Die Mutter versucht, das Baby mit einem Schlaflied *einzuschläfern*.
  
  Non riesco a *addormentarmi* perché il rumore del traffico mi tiene sveglio.
  Ich kann nicht *einschlafen*, weil der Verkehrslärm mich wach hält.
  
  Il dottore gli ha dato una medicina che lo *addormenterà* in pochi minuti.
  Der Arzt hat ihm ein Medikament gegeben, das ihn in wenigen Minuten *einschläfern* wird.
  
  Se ascolti la musica classica, riesci a *addormentarti* più facilmente dopo una giornata stressante.
  Wenn du klassische Musik hörst, kannst du nach einem stressigen Tag leichter *einschlafen*.
  
  Stavo quasi per *addormentarmi* in ufficio, quando il telefono ha squillato improvvisamente.
  Ich war fast *eingeschlafen* im Büro, als plötzlich das Telefon klingelte.
