Rang: 4259
Wort: ricognizione
Wortart: n.f
Wort mit Artikel: la ricognizione
Femininum / Plural: ricognizioni
IPA: ''
Definition: die Aufklärung, -en, die Erkundung, -en
Register: ''
Beispielsätze: |-
  La polizia ha effettuato una *ricognizione* accurata della zona prima dell'arresto.
  Die Polizei hat eine gründliche *Aufklärung* der Gegend vor der Verhaftung durchgeführt.
  
  Secondo il generale, la *ricognizione* aerea rivelerà le posizioni nemiche.
  Laut dem General wird die *Erkundung* aus der Luft die feindlichen Stellungen preisgeben.
  
  Dopo la *ricognizione*, gli ufficiali discuteranno la strategia da adottare.
  Nach der *Aufklärung* werden die Offiziere die zu ergreifende Strategie besprechen.
  
  La squadra ha perso tempo durante la *ricognizione*, ma ha evitato un'imboscata.
  Das Team hat Zeit bei der *Erkundung* verloren, aber eine Falle vermieden.
  
  Se avessimo fatto una *ricognizione* migliore, avremmo trovato l'ingresso segreto.
  Hätten wir eine bessere *Aufklärung* betrieben, hätten wir den geheimen Eingang gefunden.
