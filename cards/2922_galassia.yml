Rang: 2922
Wort: galassia
Wortart: n.f
Wort mit Artikel: la galassia
Femininum / Plural: galassie
IPA: ''
Definition: die Galaxie, -n
Register: ''
Beispielsätze: |-
  La *galassia* Andromeda è la più vicina alla Via Lattea.
  Die *Galaxie* Andromeda ist die unserer Milchstraße am nächsten.
  
  Gli scienziati studiano come si formano le *galassie* dopo il Big Bang.
  Wissenschaftler untersuchen, wie sich *Galaxien* nach dem Urknall bilden.
  
  Se potessi viaggiare nello spazio, visiterei ogni singola *galassia* dell’universo.
  Würde ich durchs All reisen, würde ich jede einzelne *Galaxie* des Universums besuchen.
  
  Secondo una leggenda, gli alieni provengono da una *galassia* lontanissima.
  Laut einer Legende stammen Aliens aus einer *Galaxie*, die unendlich weit entfernt ist.
  
  Nonostante le distanze enormi, esistono miliardi di *galassie* simili alla nostra.
  Trotz der riesigen Entfernungen gibt es Milliarden von *Galaxien*, die unserer gleichen.
