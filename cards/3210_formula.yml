Rang: 3210
Wort: formula
Wortart: n.m
Wort mit Artikel: la formula
Femininum / Plural: formule
IPA: ''
Definition: die Formel, -n
Register: ''
Beispielsätze: |-
  La *formula* chimica dell'acqua è H₂O.
  Die chemische *Formel* für Wasser ist H₂O.
  
  Ho imparato a memoria la *formula* del teorema di Pitagora per l'esame di matematica.
  Ich habe mir die *Formel* des Satzes des Pythagoras auswendig für die Mathematikprüfung gemerkt.
  
  Nonostante la *formula* fosse corretta, il risultato del calcolo era sbagliato per un errore di approssimazione.
  Obwohl die *Formel* korrekt war, war das Rechenergebnis wegen eines Rundungsfehlers falsch.
  
  La *formula* magica, pronunciata dal mago, avrebbe dovuto risolvere tutti i problemi del regno.
  Die magische *Formel*, vom Zauberer ausgesprochen, hätte alle Probleme des Königreichs lösen sollen.
  
  Ti ricordi ancora la *formula* di conversione da gradi Celsius a Fahrenheit?
  Erinnerst du dich noch an die *Formel* zur Umrechnung von Grad Celsius in Fahrenheit?
