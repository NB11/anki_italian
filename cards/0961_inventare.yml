Rang: 961
Wort: inventare
Wortart: v
Wort mit Artikel: inventare
Femininum / Plural: ''
IPA: ''
Definition: erfinden, erschaffen, erdichten
Register: ''
Beispielsätze: |-
  Non è facile *inventare* una scusa che lo convinca.
  Es ist nicht leicht, eine *Ausrede* zu erfinden, die ihn überzeugt.
  
  Lo scrittore ha *inventato* un mondo fantastico per il suo nuovo romanzo.
  Der Autor hat eine fantastische Welt für seinen neuen Roman *erschaffen*.
  
  Se tu *inventassi* una macchina del tempo, dove andresti?
  Wenn du eine Zeitmaschine *erfändest*, wohin würdest du gehen?
  
  È inutile *inventare* scuse quando hai sbagliato davvero!
  Es ist *nutzlos*, Ausreden zu erfinden, wenn du wirklich einen Fehler gemacht hast!
  
  Spero che nessuno abbia *inventato* questa storia solo per farci preoccupare.
  Ich hoffe, niemand hat diese Geschichte nur *erdichtet*, um uns zu beunruhigen.
