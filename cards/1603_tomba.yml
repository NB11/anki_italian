Rang: 1603
Wort: tomba
Wortart: n.f
Wort mit Artikel: la tomba
Femininum / Plural: tombe
IPA: ''
Definition: das Grab, Gräber
Register: ''
Beispielsätze: |-
  L'arca sepolcrale nella *tomba* reale era decorata con oro e gemme preziose.
  Der Sarkophag im *Grab* war mit Gold und Edelsteinen verziert.
  
  Dicono che chi calpesta una *tomba* antica provochi una conseguenza inevitabile.
  Es heißt, wer ein altes *Grab* betritt, zieht eine unvermeidliche Konsequenz nach sich.
  
  Anche se sono un professionista dell’archeologia, non oso toccare la *tomba* ancora inesplorata.
  Selbst als *Profi* der Archäologie wage ich nicht, das noch unerforschte Grab zu berühren.
  
  La polizia ha trovato tracce di un furto vicino alla *tomba*: qualcuno ha rubato i reperti storici.
  Die Polizei fand Spuren eines *Diebstahls* in der Nähe des Grabs: Jemand hatte historische Funde gestohlen.
  
  Se non avvisiamo le autorità, rischiamo di peccare contro la legge e di danneggiare una *tomba* nota.
  Wenn wir die Behörden nicht warnen, *sündigen* wir gegen das Gesetz und beschädigen ein bekanntes Grab.
