Rang: 111
Wort: passare
Wortart: v
Wort mit Artikel: passare
Femininum / Plural: ''
IPA: ''
Definition: vorbeigehen, verbringen, passieren
Register: ''
Beispielsätze: |-
  Oggi *passo* dal supermercato dopo il lavoro.
  Heute *gehe* ich nach der Arbeit am Supermarkt *vorbei*.
  
  Ieri sera *abbiamo passato* una serata tranquilla a casa.
  Gestern Abend *haben* wir einen ruhigen Abend zu Hause *verbracht*.
  
  *Passi* mai davanti alla stazione centrale?
  *Gehst* du jemals am Hauptbahnhof *vorbei*?
  
  Se *passi* di qui domani, porta un caffè!
  Wenn du morgen hier *vorbeikommst*, bring einen Kaffee *mit*!
  
  Spero che domani *passi* tutto liscio.
  Ich hoffe, dass morgen alles *glattgeht*.
