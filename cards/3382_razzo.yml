Rang: 3382
Wort: razzo
Wortart: n.m
Wort mit Artikel: il razzo
Femininum / Plural: razzi
IPA: ''
Definition: die Rakete, -n
Register: ''
Beispielsätze: |-
  Il *razzo* è partito con un boato assordante dalla base di lancio.
  Die *Rakete* ist mit einem ohrenbetäubenden Knall von der Startrampe gestartet.
  
  Sai che l’agenzia spaziale vuole inviare un *razzo* su Marte entro il 2030?
  Weißt du, dass die Raumfahrtbehörde bis 2030 eine *Rakete* zum Mars schicken will?
  
  Quando ero piccolo, sognavo di costruire un *razzo* con mio fratello maggiore.
  Als ich klein war, träumte ich davon, mit meinem älteren Bruder eine *Rakete* zu bauen.
  
  Il governo ha stanziato milioni per finanziare lo sviluppo di un nuovo *razzo* riutilizzabile.
  Die Regierung hat Millionen bereitgestellt, um die Entwicklung einer neuen wiederverwendbaren *Rakete* zu finanzieren.
  
  Nonostante l’incidente, il *razzo* riuscì a raggiungere l’orbita prevista senza problemi.
  Trotz des Zwischenfalls erreichte die *Rakete* die geplante Umlaufbahn problemlos.
