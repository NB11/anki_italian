Wort mit Artikel: il mister
Femininum / Plural: i mister
IPA: ''
Definition: der Herr, -n
Register: ''
Beispielsätze: |-
  Buongiorno, *mister* Rossi! Come sta oggi?
  Guten Tag, *Herr* Rossi! Wie geht es Ihnen heute?
  
