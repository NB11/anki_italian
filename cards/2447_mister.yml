  Wenn ich der *Chef* wäre, würde ich diesen Vorschlag nicht annehmen.
  
  Ho incontrato il *mister* Smith al ristorante ieri sera.
  Ich habe den *Herrn* Smith gestern Abend im Restaurant getroffen.
  
  I *mister* delle nazioni europee si riuniranno domani a Bruxelles.
  Die *Minister* der europäischen Nationen werden sich morgen in Brüssel treffen.
