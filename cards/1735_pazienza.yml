Rang: 1735
Wort: pazienza
Wortart: n.f
Wort mit Artikel: la pazienza
Femininum / Plural: pazienze
IPA: ''
Definition: die Geduld, -
Register: ''
Beispielsätze: |-
  Non avere *pazienza* con chi non ascolta è normale.
  Es ist normal, *Geduld* mit denen zu verlieren, die nicht zuhören.
  
  Ho perso la *pazienza* perché non arrivava nessuno.
  Ich verlor die *Geduld*, weil niemand kam.
  
  Se vuoi ottenere qualcosa, devi avere *pazienza* e lavorare sodo.
  Wenn du etwas erreichen willst, musst du *Geduld* haben und hart arbeiten.
  
  Con *pazienza* e attenzione, riuscirai a finire il lavoro in tempo.
  Mit *Geduld* und Aufmerksamkeit wirst du die Arbeit rechtzeitig beenden können.
  
  È inutile arrabbiarsi! Abbiamo bisogno di *pazienza* per risolvere questo problema.
  Es bringt nichts, sich zu ärgern! Wir brauchen *Geduld*, um dieses Problem zu lösen.
