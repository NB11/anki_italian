Rang: 4452
Wort: accarezzare
Wortart: vt
Wort mit Artikel: accarezzare
Femininum / Plural: ''
IPA: ''
Definition: streicheln, liebkosen
Register: ''
Beispielsätze: |-
  Il nonno *accarezzava* dolcemente il pelo del gatto mentre leggeva il giornale.
  Der Opa *streichelte* sanft das Fell der Katze, während er die Zeitung las.
  
  Non volevo *accarezzare* il cane aggressivo, ma era troppo tardi per scappare.
  Ich wollte den aggressiven Hund *nicht streicheln*, aber es war zu spät, um zu fliehen.
  
  Se avessi tempo, *accarezzerei* il tessuto di questa giacca per sentirne la qualità.
  Wenn ich Zeit hätte, würde ich den Stoff dieser Jacke *streicheln*, um seine Qualität zu spüren.
  
  Ho notato che gli alunni *accarezzano* spesso la superficie liscia della scrivania quando sono nervosi.
  Mir ist aufgefallen, dass die Schüler oft die glatte Oberfläche des Tisches *streicheln*, wenn sie nervös sind.
  
  Nonostante le proteste, il custode continuò a *accarezzare* il gattino abbandonato dietro il cancello.
  Trotz der Proteste setzte der Wärter damit fort, das verlassene Kätzchen hinter dem Tor zu *streicheln*.
