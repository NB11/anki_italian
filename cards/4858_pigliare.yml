Rang: 4858
Wort: pigliare
Wortart: v
Wort mit Artikel: pigliare
Femininum / Plural: ''
IPA: ''
Definition: nehmen, greifen, fangen
Register: ''
Beispielsätze: |-
  Se *pigli* sempre le chiavi sbagliate, è meglio che ne facciamo una copia!
  Wenn du immer die *falschen* Schlüssel nimmst, lass uns lieber eine Kopie machen!
  
  Il gatto ha *pigliato* il topo con grande abilità.
  Die Katze hat die Maus mit großer *Geschicklichkeit* gefangen.
  
  Non *pigliate* i biscotti prima di cena; aspetta il dopo.
  Ihr sollt die Kekse nicht vor dem Abendessen *nehmen*, warte bis danach.
  
  Volevo *pigliare* il treno delle otto, ma ho fatto tardi.
  Ich wollte den Zug um acht Uhr *ergreifen*, aber ich bin zu spät gekommen.
  
  Perché mai avresti dovuto *pigliare* quella decisione così importante senza consultarmi?
  Warum hättest du diese so wichtige Entscheidung *treffen* sollen, ohne mich zu fragen?
