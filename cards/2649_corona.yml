Rang: 2649
Wort: corona
Wortart: n.m
Wort mit Artikel: la corona
Femininum / Plural: corone
IPA: ''
Definition: die Krone, -n
Register: ''
Beispielsätze: |-
  La *corona* del re era fatta di oro puro.
  Die Krone des Königs war aus purem Gold.
  
  Hanno trovato una *corona* antica nella cantina di quella villa.
  Sie fanden eine antike Krone im Keller dieser Villa.
  
  Se non rispetterai le regole, perderai la tua *corona*!
  Wenn du die Regeln nicht einhältst, wirst du deine Krone verlieren!
  
  La *corona* di spine è un simbolo religioso molto noto.
  Die Dornenkrone ist ein sehr bekannter religiöser Symbol.
  
  Vor l'istituto della regina fu incastonata una nuova *corona* sullo stemma.
  Vor dem Institut der Königin wurde eine neue Krone in das Wappen eingearbeitet.
