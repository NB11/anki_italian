Rang: 3806
Wort: sottovoce
Wortart: adv
Wort mit Artikel: sottovoce
Femininum / Plural: ''
IPA: ''
Definition: leise, mit gedämpfter Stimme
Register: ''
Beispielsätze: |-
  Il professore ha parlato *sottovoce* per non disturbare gli altri studenti che studiavano.
  Der Professor hat *leise* gesprochen, um die anderen Studenten nicht zu stören.
  
  Mentre cercava di dormire, la mamma gli ha detto *sottovoce* di non fare rumore.
  Während er versuchte zu schlafen, hat die Mutter ihm *mit gedämpfter Stimme* gesagt, keinen Lärm zu machen.
  
  Dopo la lite, hanno parlato *sottovoce* per non attirare l’attenzione dei vicini.
  Nach dem Streit haben sie *leise* gesprochen, um die Aufmerksamkeit der Nachbarn nicht zu erregen.
  
  Se *sottovoce* non bastasse, dovrai usare un tono ancora più basso.
  Wenn *mit gedämpfter Stimme* nicht reichen sollte, musst du den Ton noch tiefer wählen.
  
  Ha confessato *sottovoce* che non era ancora abituato alla nuova città.
  Er hat *leise* gestanden, dass er sich noch nicht an die neue Stadt gewöhnt hatte.
