Rang: 405
Wort: paese
Wortart: n.m
Wort mit Artikel: il paese
Femininum / Plural: i paesi
IPA: ''
Definition: das Land, Dorf
Register: ''
Beispielsätze: |-
  Il *paese* in cui vivo è molto tranquillo.
  Das *Land*, in dem ich lebe, ist sehr ruhig.
  
  Quanti *paesi* hai visitato l’anno scorso?
  Wie viele *Länder* hast du letztes Jahr besucht?
  
  Vor dieci anni questo *paese* era ancora piccolo.
  Vor zehn Jahren war dieses *Dorf* noch klein.
  
  Mi piacerebbe vivere in un *paese* di montagna.
  Ich würde gerne in einem Berg*dorf* leben.
  
  I *paesi* del Nord Italia sono molto belli d’inverno.
  Die *Dörfer* im Norden Italiens sind im Winter sehr schön.
