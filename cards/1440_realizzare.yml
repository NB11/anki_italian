Rang: 1440
Wort: realizzare
Wortart: v
Wort mit Artikel: realizzare
Femininum / Plural: ''
IPA: ''
Definition: erkennen, verwirklichen
Register: ''
Beispielsätze: |-
  Non riesco a *realizzare* che abbiamo vinto la partita!
  Ich kann nicht *erkennen*, dass wir das Spiel gewonnen haben!
  
  Per *realizzare* questo progetto servono almeno due anni.
  Um dieses Projekt zu *verwirklichen*, braucht man mindestens zwei Jahre.
  
  Dopo mesi di lavoro, finalmente ha *realizzato* il suo sogno di aprire un ristorante.
  Nach Monaten der Arbeit hat sie endlich ihren Traum, ein Restaurant zu eröffnen, *verwirklicht*.
  
  Mi sembra impossibile che lui non *realizzi* ancora la gravità della situazione.
  Es ist mir unmöglich, dass er die Schwere der Situation noch nicht *erkennt*.
  
  Se non cambi idea ora, non *realizzerai* mai i tuoi obiettivi.
  Wenn du jetzt deine Meinung nicht änderst, wirst du deine Ziele niemals *verwirklichen*.
