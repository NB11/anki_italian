Beispielsätze: |-
  Non ho chiuso *la finestra* prima di uscire, e ora la stanza è piena di moscerini.
  Ich habe *das Fenster* vor dem Gehen nicht geschlossen, und jetzt ist der Raum voller Mücken.
  
  Vorrei *finestre* più grandi in questa stanza per far entrare più luce.
  Ich möchte *Fenster* in diesem Raum, die mehr Licht hereinlassen.
  
  Mentre studiavo al computer, ho sentito un rumore strano provenire *dalla finestra*.
  Während ich am *Computer* studierte, hörte ich ein seltsames Geräusch vom Fenster kommen.
  
  Se non chiudi *la finestra*, il freddo entrerà e rischi di prendere un raffreddore
  Wenn du *das Fenster* nicht schließt, wird die Kälte hereinwehen und du riskierst, dir eine Erkältung zuzuziehen.
  
  Dopo aver organizzato la sorpresa per loro, ho aperto *la finestra* per far uscire l'odore del dolce che ho preparato.
  Nachdem ich die *Überraschung* für sie organisiert hatte, öffnete ich das Fenster, damit der Geruch des Kuchens, den ich gebacken hatte, entweichen konnte.
