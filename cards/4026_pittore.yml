Rang: 4026
Wort: pittore
Wortart: n.m
Wort mit Artikel: il pittore
Femininum / Plural: i pittori
IPA: ''
Definition: der Maler, -
Register: ''
Beispielsätze: |-
  Il *pittore* sta dipingendo un paesaggio profondamente ispirato alla natura.
  Der *Maler* malt gerade eine Landschaft, die tief von der Natur inspiriert ist.
  
  Hai mai visto un quadro di questo *pittore* che espone alla fiera di arte moderna?
  Hast du jemals ein Gemälde dieses *Maler*, das auf der modernen Kunstmesse ausgestellt wird, gesehen?
  
  Sarebbe meraviglioso se un *pittore* così talentuoso decidesse di trasferirsi qui per sempre.
  Es wäre wunderbar, wenn ein so begabter *Maler* beschließen würde, für immer hierher zu ziehen.
  
  Nei secoli passati molti *pittori* venivano finanziati da nobili famiglie per ritrarre i loro volti.
  In vergangenen Jahrhunderten wurden viele *Maler* von Adelsfamilien finanziert, um ihre Gesichter zu porträtieren.
  
  Se fossi un *pittore*, regalerei a mia madre un ritratto che somigliasse il più possibile a lei.
  Wenn ich ein *Maler* wäre, würde ich meiner Mutter ein Porträt schenken, das ihr so ähnlich wie möglich sieht.
