Rang: 728
Wort: metro
Wortart: n.m
Wort mit Artikel: il metro
Femininum / Plural: metri
IPA: ''
Definition: die U-Bahn, -en
Register: ''
Beispielsätze: |-
  Prendo *il metro* tutti i giorni per andare al lavoro perché è molto pratico.
  Ich nehme die *U-Bahn* jeden Tag zur Arbeit, weil sie sehr praktisch ist.
  
  Mi sono perso perché non ho notato lo schema delle linee della *metro* sulla piantina.
  Ich habe mich verlaufen, weil ich den Linienplan der *U-Bahn* auf dem Stadtplan nicht bemerkt habe.
  
  Se vuoi arrivare prima, scendi a *metro* Garibaldi e prendi il treno della ferrovia.
  Wenn du früher ankommen willst, steigst du an der *U-Bahn*-Station Garibaldi in die S-Bahn um.
  
  Domani organizzeremo una festa per il compleanno di Luca e ci incontreremo vicino alla *metro* centrale.
  Morgen organisieren wir eine Party zum Geburtstag von Luca und treffen uns in der Nähe der Haupt-*U-Bahn*.
  
  Il sindaco sta cercando di unire le diverse linee della *metro* per migliorare i collegamenti.
  Der Bürgermeister versucht, die verschiedenen Linien der *U-Bahn* zu verbinden, um die Verbindungen zu verbessern.
