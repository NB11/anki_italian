Rang: 556
Wort: guardia
Wortart: n.f
Wort mit Artikel: la guardia
Femininum / Plural: guardie
IPA: ''
Definition: der Wächter, die Wache, die Sicherheitskraft, -¨e
Register: ''
Beispielsätze: |-
  La *guardia* ha controllato il mio bagaglio ieri mattina alle sei.
  Die *Sicherheitskraft* hat mein Gepäck gestern Morgen um sechs kontrolliert.
  
  Mi dispiace, ma non posso venire perché devo fare la *guardia* questa notte.
  Es tut mir leid, aber ich kann nicht kommen, weil ich heute Nacht *Wache* schieben muss.
  
  Le *guardie* hanno trovato un pacco sospetto vicino all’ingresso del museo.
  Die *Wächter* haben ein verdächtiges Paket nahe dem Museumseingang gefunden.
  
  Se vedrai una *guardia* con un’uniforme scura, chiedi pure a lei informazioni.
  Falls du eine *Sicherheitskraft* mit dunkler Uniform siehst, frag ruhig sie nach Informationen.
  
  Spero che la *guardia* notturna non abbia notato il rumore che ho fatto mentre uscivo.
  Ich hoffe, dass die *Wache* nichts vom Lärm bemerkt hat, den ich beim Rausgehen verursacht habe.
