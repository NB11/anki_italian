Rang: 3991
Wort: fiocco
Wortart: n.m
Wort mit Artikel: il fiocco
Femininum / Plural: i fiocchi
IPA: ''
Definition: die Schleife, -n
Register: ''
Beispielsätze: |-
  Indossa una camicia bianca con un *fiocco* rosso alla cravatta.
  Er trägt ein weißes Hemd mit einer *roten Schleife* an der Krawatte.
  
  Le bambine adorano decorare i regali con *fiocchi* colorati.
  Die Mädchen lieben es, Geschenke mit *farbigen Schleifen* zu verzieren.
  
  Non appena avrò finito di impacchettare i pacchi, metterò un *fiocco* sopra ciascuno.
  Sobald ich fertig mit dem Einpacken der Pakete bin, werde ich *eine Schleife* daraufsetzen.
  
  Ha trovato un *fiocco* di neve perfetto sul davanzale della finestra.
  Sie hat *eine perfekte Schneeflocke* auf der Fensterbank gefunden.
  
  Se non leghi bene il *fiocco*, il pacco potrebbe disfarsi durante il viaggio.
  Falls du die *Schleife* nicht festbindest, könnte das Paket während der Reise aufgehen.
