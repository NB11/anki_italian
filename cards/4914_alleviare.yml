Rang: 4914
Wort: alleviare
Wortart: v
Wort mit Artikel: alleviare
Femininum / Plural: ''
IPA: ''
Definition: lindern, mildern, erleichtern
Register: ''
Beispielsätze: |-
  Il medico mi ha dato delle medicine per *alleviare* il dolore.
  Der Arzt hat mir Tabletten gegen die *Schmerzen* gegeben.
  
  Nonostante la pioggia, il giardino era bellissimo grazie al sole che riuscì a *alleviare* l’umidità.
  Trotz des Regens war der Garten wunderschön, weil die Sonne die *Feuchtigkeit* lindern konnte.
  
  Se avessi saputo che il mal di testa sarebbe *alleviare* dopo mezz’ora, non avrei chiamato il medico.
  Wenn ich gewusst hätte, dass der *Kopfschmerz* nach einer halben Stunde nachlassen würde, hätte ich den Arzt nicht gerufen.
  
  Il governo spera che nuove politiche *allevino* la disoccupazione nel prossimo anno.
  Die Regierung hofft, dass neue Maßnahmen die *Arbeitslosigkeit* mildern werden.
  
  È importante che tu *allevia* lo stress ogni tanto, altrimenti rischi di esaurirti.
  Es ist wichtig, dass du den *Stress* manchmal reduzierst, sonst riskierst du einen Zusammenbruch.
