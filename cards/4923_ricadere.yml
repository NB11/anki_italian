Rang: 4923
Wort: ricadere
Wortart: vi
Wort mit Artikel: ricadere
Femininum / Plural: ''
IPA: ''
Definition: wiederfallen, zurückfallen
Register: ''
Beispielsätze: |-
  Dopo la terapia la malattia ha *ricaduto*.
  Nach der Behandlung ist die Krankheit wieder *zurückgefallen*.
  
  Rischia di *ricadere* nelle sue cattive abitudini se non si concentra.
  Er wird in alte Fehler *zurückfallen*, wenn er sich nicht konzentriert.
  
  Dopo le vacanze si è *ricaduta* nella solita routine quotidiana.
  Nach dem Urlaub fühlte sie sich wieder in den Alltagstrott *zurückgefallen*.
  
  Se interrompi la terapia potresti *ricadere* nei vecchi problemi.
  Wenn du die Therapie unterbrichst, könntest du in alte Probleme *zurückfallen*.
  
  Sta cercando di non *ricadere* nelle vecchie abitudini mentali.
  Er versucht bewusst, nicht in die alten Denkweisen *zurückzufallen*.
Audio: ''
Notiz: ''
Dispersion: ''
