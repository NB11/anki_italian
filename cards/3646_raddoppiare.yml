Rang: 3646
Wort: raddoppiare
Wortart: v
Wort mit Artikel: raddoppiare
Femininum / Plural: ''
IPA: ''
Definition: verdoppeln, sich verdoppeln
Register: ''
Beispielsätze: |-
  Il prezzo della benzina *raddoppia* ogni volta che c'è una crisi mondiale.
  Der Preis für Benzin *verdoppelt sich* jedes Mal, wenn es eine weltweite Krise gibt.
  
  Se *raddoppierai* gli sforzi, potrai raggiungere il tuo obiettivo entro dicembre.
  Wenn du die Anstrengungen *verdoppelst*, wirst du dein Ziel bis Dezember erreichen.
  
  Mi hanno detto che la popolazione della città *raddoppiò* in soli dieci anni.
  Man hat mir erzählt, dass die Bevölkerung der Stadt sich in nur zehn Jahren *verdoppelt hat*.
  
  Sarebbe meglio che tu *raddoppiassi* le dosi del farmaco, ma prima chiedi al medico.
  Es wäre besser, wenn du die Dosen des Medikaments *verdoppeln würdest*, aber frag vorher den Arzt.
  
  La domanda di energia *raddoppia* durante i mesi invernali a causa del freddo.
  Die Nachfrage nach Energie *verdoppelt sich* in den Wintermonaten wegen der Kälte.
Audio: ''
Notiz: ''
Dispersion: ''
