Rang: 3388
Wort: invitato
Wortart: n.m
Wort mit Artikel: l'invitato
Femininum / Plural: gli invitati
IPA: ''
Definition: der Gast, Gäste
Register: ''
Beispielsätze: |-
  L'*invitato* ha portato un regalo molto generoso alla festa.
  Der *Gast* hat ein sehr großzügiges Geschenk zur Feier gebracht.
  
  Non ho ancora saputo se gli *invitati* potranno venire alla cerimonia.
  Ich habe noch nicht erfahren, ob die *Gäste* zur Zeremonie kommen können.
  
  Gli *invitati* si sono seduti vicino alla finestra luminosa per godere della vista.
  Die *Gäste* haben sich ans helle Fenster gesetzt, um den Blick zu genießen.
  
  Il direttore ha chiesto all'*invitato* di parlare dei risultati ottenuti.
  Der Direktor bat den *Gast*, über die erreichten Ergebnisse zu sprechen.
  
  Quando l'*invitato* è arrivato, la sala era già piena di persone che lo aspettavano.
  Als der *Gast* ankam, war der Saal bereits voller Leute, die auf ihn warteten.
