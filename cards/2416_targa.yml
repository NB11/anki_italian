Rang: 2416
Wort: targa
Wortart: n.m
Wort mit Artikel: la targa
Femininum / Plural: targe
IPA: ''
Definition: das Nummernschild, -er
Register: ''
Beispielsätze: |-
  La *targa* della mia auto è scaduta, quindi devo rinnovarla domani.
  Die *Nummernschild* meines Autos ist abgelaufen, also muss ich es morgen erneuern.
  
  Hanno rubato la *targa* della moto e ora non riesco a ritrovarla.
  Sie haben das *Nummernschild* des Motorrads gestohlen und jetzt kann ich es nicht mehr finden.
  
  Se non avessi perso la *targa*, ora potrei guidare senza problemi.
  Wenn ich das *Nummernschild* nicht verloren hätte, könnte ich jetzt problemlos fahren.
  
  La *targa* anteriore del camion era troppo sporca per essere letta.
  Das vordere *Nummernschild* des LKWs war zu schmutzig, um es zu erkennen.
  
  Mi hanno detto che la *targa* nuova arriverà tra una settimana.
  Man hat mir gesagt, das neue *Nummernschild* kommt in einer Woche.
