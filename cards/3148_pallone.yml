Beispielsätze: |-
  I ragazzi giocano con *pallone* ogni pomeriggio in disordine nel giardino.
  Die Jungen spielen jeden Nachmittag mit *dem Ball* im Chaos im Garten.
  
  Ha comprato un *pallone* nuovo per la squadra volontaria della sua città.
  Er hat einen neuen *Ball* für die ehrenamtliche Mannschaft seiner Stadt gekauft.
  
  Se non fosse così magro, non sarebbe riuscito a calciare *pallone* così forte!
  Wenn er nicht so *schlank* wäre, hätte er nicht so hart den Ball treten können!
  
  Secondo cassia, *pallone* non è solo un gioco, ma una vera arte.
  Laut *Kassie* ist der Ball nicht nur ein Spiel, sondern eine echte Kunst.
  
  Dopo l’atterraggio difficoltoso, i passeggeri hanno visto *pallone* rotolare fuori dall’aereo!
  Nach der schwierigen *Landung* sahen die Passagiere, wie der Ball aus dem Flugzeug rollte!
