Rang: 4716
Wort: sfamare
Wortart: vt
Wort mit Artikel: sfamare
Femininum / Plural: ''
IPA: ''
Definition: sättigen, ernähren
Register: ''
Beispielsätze: |-
  Questa minestra riesce a *sfamare* anche dieci persone con una sola pentola.
  Dieser Eintopf kann auch zehn Personen mit einem einzigen Topf *sättigen*.
  
  Se non mangi abbastanza, come vuoi che *sfami* la fame?
  Wenn du nicht genug isst, wie willst du dann den Hunger *stillen*?
  
  Il governo ha promesso di *sfamare* la popolazione durante la crisi, ma finora non ha mantenuto la parola.
  Die Regierung hat versprochen, die Bevölkerung in der Krise zu *ernähren*, aber bisher hat sie ihr Wort nicht gehalten.
  
  I volontari vorrebbero *sfamare* chi è rimasto senza casa dopo la frana, ma servono più viveri.
  Die Freiwilligen möchten alle *sättigen*, die nach dem Erdrutsch obdachlos geworden sind, aber es werden mehr Lebensmittel benötigt.
  
  Credo che la sua generosità possa *sfamare* anche chi non ha mai ricevuto aiuto prima.
  Ich glaube, dass seine Großzügigkeit selbst die *ernähren* kann, die zuvor noch nie Hilfe erhalten haben.
