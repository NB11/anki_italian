Rang: 3110
Wort: consapevole
Wortart: adj
Wort mit Artikel: consapevole
Femininum / Plural: ''
IPA: ''
Definition: bewusst, sich einer Sache bewusst
Register: ''
Beispielsätze: |-
  È *consapevole* che la sua scelta avrà delle conseguenze.
  Er ist sich *bewusst*, dass seine Entscheidung Konsequenzen haben wird.
  
  Non ero *consapevole* di aver dimenticato le chiavi a casa.
  Ich war mir nicht *bewusst*, dass ich die Schlüssel zu Hause vergessen hatte.
  
  Se fossi *consapevole* dei tuoi limiti, ti aiuterei volentieri.
  Wenn du dir deiner Grenzen *bewusst* wärst, würde ich dir gern helfen.
  
  Credo che sia *consapevole* del fatto che senza impegno non si va da nessuna parte.
  Ich glaube, dass er sich der Tatsache *bewusst* ist, dass man ohne Einsatz nirgendwo hinkommt.
  
  Sii *consapevole* delle tue parole, potrebbero ferire qualcuno.
  Sei dir deiner Worte *bewusst*, sie könnten jemanden verletzen.
