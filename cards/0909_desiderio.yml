Rang: 909
Wort: desiderio
Wortart: n.m
Wort mit Artikel: il desiderio
Femininum / Plural: desideri
IPA: ''
Definition: der Wunsch, -¨e
Register: ''
Beispielsätze: |-
  Il *desiderio* di viaggiare è molto forte in questa ragazza.
  Der *Wunsch*, zu reisen, ist bei diesem Mädchen sehr stark.
  
  Nonostante il *desiderio*, dovette rinunciare al viaggio per il lavoro.
  Trotz des *Wunsches* musste sie wegen der Arbeit auf die Reise verzichten.
  
  Se avessi saputo del tuo *desiderio*, ti avrei portato un regalo speciale.
  Wenn ich von deinem *Wunsch* gewusst hätte, hätte ich dir ein besonderes Geschenk mitgebracht.
  
  Il *desiderio* che provi per lui sembra reciproco.
  Der *Wunsch*, den du für ihn empfindest, scheint gegenseitig zu sein.
  
  Era difficile nascondere il *desiderio* di raccontare tutto alla polizia.
  Es war schwer, den *Wunsch*, alles der Polizei zu erzählen, zu verbergen.
