Rang: 3451
Wort: eredità
Wortart: n.f
Wort mit Artikel: l'eredità
Femininum / Plural: eredità
IPA: ''
Definition: das Erbe, -n
Register: ''
Beispielsätze: |-
  Nel suo testamento ha lasciato un’enorme *eredità* ai figli.
  In seinem Testament hat er ein enormes *Erbe* seinen Kindern hinterlassen.
  
  La *eredità* culturale di questa regione è molto ricca.
  Das kulturelle *Erbe* dieser Region ist sehr reichhaltig.
  
  Nonostante le difficoltà, è riuscito a gestire al meglio la sua *eredità*.
  Trotz der Schwierigkeiten ist es ihm gelungen, sein *Erbe* bestmöglich zu verwalten.
  
  Vorresti davvero rinunciare a tutta la tua *eredità* per pochi soldi?
  Würdest du wirklich dein gesamtes *Erbe* für ein paar Geldstücke aufgeben?
  
  Non appena avrà venticinque anni, potrà finalmente disporre della sua *eredità*.
  Sobald er fünfundzwanzig Jahre alt ist, kann er endlich über sein *Erbe* verfügen.
