Rang: 3500
Wort: drammatico
Wortart: adj
Wort mit Artikel: drammatico
Femininum / Plural: drammatici (m), drammatiche (f)
IPA: ''
Definition: dramatisch, spannungsvoll
Register: ''
Beispielsätze: |-
  La scena *drammatica* del film mi ha fatto piangere.
  Die *dramatische* Szene des Films hat mich zum Weinen gebracht.
  
  Non sapevo che la sua carriera fosse così *drammatica*.
  Ich wusste nicht, dass seine Karriere so *dramatisch* verlaufen ist.
  
  È stato un finale *drammatico*, pieno di suspense.
  Es war ein *dramatisches* Ende, voller Spannung.
  
  Vorrei vivere una vita meno *drammatica* di quella di mia sorella.
  Ich möchte ein weniger *dramatisches* Leben als das meiner Schwester führen.
  
  Il romanzo è così *drammatico* che non riesco a smettere di leggere.
  Der Roman ist so *dramatisch*, dass ich nicht aufhören kann zu lesen.
