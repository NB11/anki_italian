Rang: 1012
Wort: dichiarare
Wortart: v
Wort mit Artikel: dichiarare
Femininum / Plural: ''
IPA: ''
Definition: erklären, deklarieren
Register: ''
Beispielsätze: |-
  Dopo aver *dichiarato* i suoi sentimenti, lei si sentì sollevata e felice.
  Nachdem sie *ihre* Gefühle erklärt hatte, fühlte sie sich erleichtert und glücklich.
  
  Vuoi che *dichiarino* ufficialmente la loro vittoria alla fine della partita?
  Willst du, dass sie ihren Sieg am Ende des *Spiels* offiziell deklarieren?
  
  Ho appena saputo che l’attore famoso ha deciso di *dichiarare* il suo sostegno alla nuova legge ambientale.
  Ich habe gerade erfahren, dass der berühmte Schauspieler beschlossen hat, seine Unterstützung für das neue Umweltgesetz zu *erklären*.
  
  Se non *dichiari* subito la tua posizione, rischi di perdere credibilità con i colleghi.
  Wenn du deine Position nicht sofort erklärst, riskierst du, bei den Kollegen an Glaubwürdigkeit *zu verlieren*.
  
  Il testimone ha giurato di *dichiarare* tutta la verità in tribunale, nonostante le minacce del padrone dell’isola.
  Der Zeuge hat geschworen, in Gericht die ganze Wahrheit zu *erklären*, trotz der Drohungen des Inselherrn.
