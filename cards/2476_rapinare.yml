Rang: 2476
Wort: rapinare
Wortart: vt
Wort mit Artikel: rapinare
Femininum / Plural: ''
IPA: ''
Definition: berauben, überfallen, ausrauben
Register: ''
Beispielsätze: |-
  Hanno deciso di *rapinare* una banca nel centro della città.
  Sie haben beschlossen, eine Bank im Stadtzentrum zu *überfallen*.
  
  Il giudice ha affermato che *rapinare* un anziano è un crimine particolarmente vergognoso.
  Der Richter hat betont, dass es ein besonders schändliches Verbrechen ist, einen alten Mann zu *berauben*.
  
  Se *rapinerai* quel negozio, verrai immediatamente fermato dalla polizia.
  Wenn du jenes Geschäft *überfällst*, wirst du sofort von der Polizei festgenommen.
  
  È noto che alcuni detenuti abbiano *rapinato* diversi pacchetti di sigarette dall’archivio.
  Es ist bekannt, dass einige Häftlinge mehrere Päckchen Zigaretten aus dem Archiv *gestohlen* haben.
  
  Vorrei sapere chi abbia potuto *rapinare* quella povera famiglia, lasciandola senza nulla.
  Ich möchte wissen, wer diese arme Familie *beraubt* haben könnte und sie mittellos zurückgelassen hat.
