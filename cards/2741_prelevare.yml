Rang: 2741
Wort: prelevare
Wortart: vt
Wort mit Artikel: prelevare
Femininum / Plural: ''
IPA: ''
Definition: abheben, entnehmen
Register: ''
Beispielsätze: |-
  Ogni mattina devo *prelevare* 200 euro dal bancomat per le spese di casa.
  Jeden Morgen muss ich *200 Euro* vom Geldautomaten abheben für die Haushaltskosten.
  
  Hanno *prelevato* il denaro dal conto senza il mio consentire.
  Sie haben das Geld vom Konto ohne meine *Erlaubnis* abgehoben.
  
  Se non avessi *prelevato* quei soldi, ora non mi troverei in caos finanziario.
  Wenn ich dieses Geld nicht *abgehoben* hätte, stünde ich jetzt nicht in finanzieller Chaos.
  
  Vuoi che *prelevi* anche il resto della cauzione per il viaggio?
  Soll ich auch die restliche *Kaution* für die Reise abheben?
  
  Appena *prelievi* i documenti, portali subito all’ufficio competente.
  Sobald du die Unterlagen *abhebst*, bring sie sofort zum zuständigen Amt.
