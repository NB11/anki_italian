Rang: 4411
Wort: inappropriato
Wortart: adj
Wort mit Artikel: inappropriato
Femininum / Plural: ''
IPA: ''
Definition: ungeeignet, unangemessen, unpassend, unzutreffend
Register: ''
Beispielsätze: |-
  Indossare un *inappropriato* abbigliamento sportivo a un colloquio di lavoro è poco professionale.
  Das Tragen von *ungeeignet* Sportkleidung bei einem Vorstellungsgespräch ist unprofessionell.
  
  Il suo tono era così *inappropriato* che tutti si sono sentiti a disagio durante la riunione.
  Sein Ton war so *unangemessen*, dass sich alle während der Besprechung unwohl fühlten.
  
  Pensavo che fosse un *inappropriato* momento per fare una battuta, ma lui rideva comunque.
  Ich dachte, es wäre ein *ungeeigneter* Zeitpunkt für einen Scherz, aber er lachte trotzdem.
  
  Nonostante le sue scuse, il commento rimaneva *inappropriato* e offensivo per molti presenti.
  Trotz seiner Entschuldigungen blieb die Bemerkung für viele Anwesende *unangemessen* und beleidigend.
  
  Se avessi saputo che sarebbe stato così *inappropriato*, non avrei mai accettato quell’invito.
  Wenn ich gewusst hätte, dass es so *unpassend* wäre, hätte ich diese Einladung nie angenommen.
