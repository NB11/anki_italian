Definition: täglich, alltäglich; alltagstypisch
Register: ''
Beispielsätze: |-
  La mia routine *quotidiana* include una camminata di mezz'ora al parco.
  Meine *tägliche* Routine umfasst einen halben Stunde Spaziergang im Park.
  
  Devi evitare le notizie *quotidiane*: sono piene di interferenze, e non ti fanno pensare lucidamente.
  Du solltest die *täglichen* Nachrichten meiden: Sie stecken voller Störungen und lassen dich nicht klar denken.
  
  Anche se la vita sembra *quotidiana*, ogni giorno porta sorprese inaspettate.
  Auch wenn das Leben *alltäglich* wirkt, bringt jeder Tag unerwartete Überraschungen.
  
  Gli analisti prevedono che il mercato azionario avrà un andamento *quotidiano* molto volatile.
  Die *Analysten* prognostizieren, dass der Aktienmarkt ein sehr volatiles tägliches Verhalten zeigen wird.
  
  In questa zona, la vita *quotidiana* è stata turbata dall’epidemia che ha costretto tutti a restare chiusi in casa.
  In dieser Gegend wurde das *alltägliche* Leben durch die Epidemie gestört, die alle zwang, zu Hause zu bleiben.
