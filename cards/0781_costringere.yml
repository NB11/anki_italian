Rang: 781
Wort: costringere
Wortart: v
Wort mit Artikel: costringere
Femininum / Plural: ''
IPA: ''
Definition: zwingen, nötigen
Register: ''
Beispielsätze: |-
  Non *costringo* mai i miei figli a fare i compiti.
  Ich *zwinge* meine Kinder nie, Hausaufgaben zu machen.
  
  Ti hanno *costretto* ad accettare quel lavoro?
  Haben sie dich *gezwungen*, diese Arbeit anzunehmen?
  
  Mi sento *costretto* a dirti la verità.
  Ich *fühle mich gezwungen*, dir die Wahrheit zu sagen.
  
  Se non *costringiamo* i bambini a letto presto, non dormiranno abbastanza.
  Wenn wir die Kinder nicht *zwingen*, früh ins Bett zu gehen, schlafen sie nicht genug.
  
  Siamo stati *costretti* a cambiare i nostri piani all’ultimo momento.
  Wir wurden *gezwungen*, unsere Pläne im letzten Moment zu ändern.
