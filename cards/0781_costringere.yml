Rang: 781
Wort: costringere
Wortart: vt
Wort mit Artikel: costringere
Femininum / Plural: ''
IPA: ''
Definition: zwingen, nötigen
Register: ''
Beispielsätze: |-
  Il governo *costringe* i cittadini a rispettare le nuove leggi.
  Die Regierung zwingt die Bürger, die neuen Gesetze zu respektieren.
  
  Se non avessi *costretto* mio figlio a studiare, ora sarebbe in difficoltà.
  Wenn ich meinen Sohn nicht dazu gezwungen hätte zu lernen, hätte er jetzt Schwierigkeiten.
  
  Credo che la polizia abbia *costretto* il ladro a confessare con minacce.
  Ich glaube, die Polizei hat den Dieb mit Drohungen dazu gebracht, zu gestehen.
  
  Non vuole *costringere* nessun altro ad assumere questa responsabilità.
  Er will niemanden sonst dazu zwingen, diese Verantwortung zu übernehmen.
  
  Ti prego, non *costringermi* a fare questa operazione di nuovo!
  Bitte zwinge mich nicht, diesen Eingriff noch einmal durchzuführen!
