Rang: 1706
Wort: city
Wortart: n.f
Wort mit Artikel: la city
Femininum / Plural: città
IPA: ''
Definition: die Stadt, Städte
Register: ''
Beispielsätze: |-
  La *città* che hai scelto per le vacanze è molto affollata in estate.
  Die *Stadt*, die du für den Urlaub gewählt hast, ist im Sommer sehr voll.
  
  Nonostante l’affollamento, la *città* mantiene un’atmosfera accogliente per i turisti.
  Trotz des Gedränges behält die *Stadt* eine einladende Atmosphäre für Touristen.
  
  Se domani avessi più tempo, visiterei ogni museo della *città*.
  Wenn ich morgen mehr Zeit hätte, würde ich jedes Museum der *Stadt* besuchen.
  
  È un peccato che la *città* più antica d’Italia non attiri più l’attenzione dei viaggiatori.
  Es ist schade, dass die älteste *Stadt* Italiens die Aufmerksamkeit der Reisenden nicht mehr erregt.
  
  Quando arriveremo in *città*, cercheremo subito un albergo vicino alla stazione.
  Wenn wir in der *Stadt* ankommen, suchen wir sofort ein Hotel in der Nähe des Bahnhofs.
