Rang: 382
Wort: odiare
Wortart: v
Wort mit Artikel: odiare
Femininum / Plural: ''
IPA: ''
Definition: hassen
Register: ''
Beispielsätze: |-
  Non *odio* nessuno, ma a volte provo antipatia.
  Ich *hasse* niemanden, aber manchmal empfinde ich Abneigung.
  
  Se *odierai* quella persona, ti pentirai.
  Wenn du diese Person *hasst*, wirst du es bereuen.
  
  *Odio* quando piove senza motivo.
  Ich *hasse* es, wenn es ohne Grund regnet.
  
  Avrei *odiat*o doverlo fare, ma era necessario.
  Ich hätte es *gehasst*, das tun zu müssen, aber es war notwendig.
  
  Credi che *odieresti* anche te stesso in questa situazione?
  Glaubst du, du würdest in dieser Situation dich selbst *hassen*?
