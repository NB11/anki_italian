Rang: 4426
Wort: bonus
Wortart: n.m
Wort mit Artikel: il bonus
Femininum / Plural: i bonus
IPA: ''
Definition: die Prämie, der Bonus, die Zulage
Register: ''
Beispielsätze: |-
  Ho ricevuto un *bonus* di fine anno per il mio ottimo lavoro.
  Ich habe einen *Bonus* am Jahresende für meine hervorragende Arbeit erhalten.
  
  Se superi l’esame, ti darò un *bonus* di dieci punti.
  Wenn du die Prüfung bestehst, gebe ich dir einen *Bonus* von zehn Punkten.
  
  Il *bonus* mensile viene calcolato in base alle vendite.
  Die monatliche *Prämie* wird anhand der Verkäufe berechnet.
  
  Senza un *bonus* extra, non riesco a pagare l’affitto.
  Ohne eine zusätzliche *Zulage* kann ich die Miete nicht bezahlen.
  
  L’azienda offre dei *bonus* molto interessanti per chi lavora di notte.
  Die Firma bietet sehr interessante *Prämien* für diejenigen, die nachts arbeiten.
