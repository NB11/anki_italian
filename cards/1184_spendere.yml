Rang: 1184
Wort: spendere
Wortart: v
Wort mit Artikel: spendere
Femininum / Plural: ''
IPA: ''
Definition: ausgeben, verbrauchen
Register: ''
Beispielsätze: |-
  Domani *spenderò* almeno cento euro al supermercato perché devo comprare tutto l’occorrente per la pausa estiva.
  Morgen werde ich mindestens hundert Euro im Supermarkt *ausgeben*, weil ich alles für die Sommerpause besorgen muss.
  
  Nonostante abbia *speso* tutti i miei risparmi, non mi pento perché ho aiutato una persona in bisogno.
  Auch wenn ich all meine Ersparnisse *verbraucht* habe, bereue ich es nicht, weil ich jemandem in Not geholfen habe.
  
  Credo che lui *spenda* troppo in vestiti firmati, ma non posso giudicare le sue scelte di vita.
  Ich glaube, dass er zu viel für Markenkleidung *ausgibt*, aber ich kann seine Lebensentscheidungen nicht beurteilen.
  
  Se avessi un milione di euro, lo *spenderei* tutto in un viaggio intorno al mondo insieme alla nipote.
  Wenn ich eine Million Euro hätte, würde ich sie alles für eine Weltreise mit meiner *Nichte* ausgeben.
  
  Lei mi ha detto che vorrebbe *spendere* meno tempo sui social network ma poi perde ore a scorrere video inutili.
  Sie hat mir gesagt, dass sie weniger Zeit in sozialen Netzwerken *verbringen* möchte, aber dann verliert sie Stunden mit unnützen Videos.
