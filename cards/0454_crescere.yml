Rang: 454
Wort: crescere
Wortart: vi
Wort mit Artikel: crescere
Femininum / Plural: ''
IPA: ''
Definition: wachsen, zunehmen
Register: ''
Beispielsätze: |-
  Il bambino *cresce* molto in fretta.
  Das Kind *wächst* sehr schnell.
  
  *Crescerai* mai in un albero?
  Wirst du je zu einem Baum *wachsen*?
  
  Spero che la tua famiglia *cresca* in salute.
  Ich hoffe, dass deine Familie gesund *wächst*.
  
  I nostri figli sono *cresciuti* molto negli ultimi anni.
  Unsere Kinder sind in den letzten Jahren stark *gewachsen*.
  
  Se *crescessi* di più, potresti raggiungere il frutto.
  Wenn du mehr *wächstest*, könntest du die Frucht erreichen.
