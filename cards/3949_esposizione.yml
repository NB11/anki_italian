Rang: 3949
Wort: esposizione
Wortart: n.f
Wort mit Artikel: la esposizione
Femininum / Plural: esposizioni
IPA: ''
Definition: die Ausstellung, -en, die Präsentation
Register: ''
Beispielsätze: |-
  La *esposizione* d’arte moderna è stata visitata da migliaia di persone in gennaio.
  Die *Ausstellung* moderner Kunst wurde im Januar von tausenden Menschen besucht.
  
  Durante la conferenza si è discusso se questa *esposizione* valga davvero la pena di essere finanziata.
  Während der Konferenz wurde diskutiert, ob diese *Ausstellung* die Finanzierung wirklich wert ist.
  
  Se non curi meglio la *esposizione* dei dipinti, perderai presto il loro valore originale.
  Wenn du dich nicht besser um die *Präsentation* der Gemälde kümmerst, verlierst du ihren ursprünglichen Wert bald.
  
  L’artista ha richiesto che la *esposizione* dei suoi lavori avvenga solo in gallerie pop per raggiungere un pubblico giovane.
  Der Künstler verlangte, dass die *Ausstellung* seiner Werke nur in modernen Galerien stattfindet, um ein junges Publikum zu erreichen.
  
  Spero che la *esposizione* di quest’anno sulla innovazione industriale riesca a combaciare con le aspettative del comitato.
  Ich hoffe, dass die *Ausstellung* über die industrielle Innovation dieses Jahr die Erwartungen des Komitees erfüllen wird.
