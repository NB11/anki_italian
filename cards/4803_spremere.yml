Rang: 4803
Wort: spremere
Wortart: vt
Wort mit Artikel: spremere
Femininum / Plural: ''
IPA: ''
Definition: auspressen, ausdrücken, pressen
Register: ''
Beispielsätze: |-
  Devi *spremere* gli agrumi per ottenere il succo fresco.
  Du musst die *Zitrusfrüchte* auspressen, um den frischen Saft zu erhalten.
  
  Nel laboratorio, abbiamo imparato a *spremere* le mele correttamente.
  Im Labor haben wir gelernt, die Äpfel *auszupressen*.
  
  Se non *spremi* bene il tubetto, non esce il dentifricio.
  Wenn du die Tube nicht *ausdrückst*, kommt keine Zahnpasta heraus.
  
  Il nonno diceva sempre che per fare una buona marmellata bisognava *spremere* con pazienza.
  Opa pflegte immer zu sagen, dass man für eine gute Marmelade geduldig *auspressen* musste.
  
  La ricetta richiede di *spremere* mezzo limone prima di aggiungere gli zuccheri.
  Das Rezept verlangt, zuerst eine halbe Zitrone *auszupressen*, bevor man den Zucker hinzufügt.
