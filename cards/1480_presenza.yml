Rang: 1480
Wort: presenza
Wortart: n.f
Wort mit Artikel: la presenza
Femininum / Plural: presenze
IPA: ''
Definition: die Anwesenheit, -en
Register: ''
Beispielsätze: |-
  La *presenza* del pubblico ha reso la performance ancora più intensa.
  Die *Anwesenheit* des Publikums hat die Performance noch intensiver gemacht.
  
  Nonostante la *presenza* di molte persone, il locale sembrava vuoto.
  Trotz der *Anwesenheit* vieler Menschen wirkte das Lokal leer.
  
  Il responsabile ha confermato la *presenza* di tutti i giocatori, compreso il tedesco.
  Der Verantwortliche hat die *Anwesenheit* aller Spieler bestätigt, einschließlich des Deutschen.
  
  La sua *presenza* improvvisa ha sorpreso tutti quanti seduti al parco.
  Seine plötzliche *Anwesenheit* hat alle im Park sitzenden überrascht.
  
  L’artista non ha ancora stabilito se la *presenza* fisica sia necessaria per la mostra.
  Der Künstler hat noch nicht festgelegt, ob die körperliche *Anwesenheit* für die Ausstellung notwendig ist.
