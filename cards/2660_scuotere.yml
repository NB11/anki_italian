Rang: 2660
Wort: scuotere
Wortart: vt
Wort mit Artikel: scuotere
Femininum / Plural: ''
IPA: ''
Definition: erschüttern, schütteln
Register: ''
Beispielsätze: |-
  Il terremoto *ha scosso* violentemente la città, distruggendo numerose abitazioni.
  Das Erdbeben hat die Stadt *erschüttert*, zahlreiche Gebäude zerstört.
  
  Non volevo *scuotere* la busta, ma i documenti non volevano uscire.
  Ich wollte die Tüte *nicht schütteln*, aber die Dokumente wollten nicht herauskommen.
  
  Se avessi saputo che la notizia *scuote* così tanto le persone, avrei parlato diversamente.
  Wenn ich gewusst hätte, dass die Nachricht die Leute *so sehr erschüttert*, hätte ich anders gesprochen.
  
  Gli scienziati stanno cercando di capire come *scuotere* meno i pazienti durante le operazioni.
  Die Wissenschaftler versuchen zu verstehen, wie man Patienten während Operationen weniger *erschüttert*.
  
  A volte basta un semplice gesto per *scuotere* le convinzioni di una persona, anche se non sembra possibile.
  Manchmal reicht eine einfache Geste, um die Überzeugungen einer Person *zu erschüttern*, auch wenn es unmöglich scheint.
