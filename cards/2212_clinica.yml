Rang: 2212
Wort: clinica
Wortart: n.f
Wort mit Artikel: la clinica
Femininum / Plural: cliniche
IPA: ''
Definition: die Klinik, -en
Register: ''
Beispielsätze: |-
  La *clinica* è chiusa per ferie, quindi dovremo andare all'ospedale.
  Die *Klinik* ist wegen Urlaub geschlossen, also müssen wir ins Krankenhaus gehen.
  
  Vorrei prenotare una visita alla *clinica* per domani mattina.
  Ich möchte einen Termin in der *Klinik* für morgen früh vereinbaren.
  
  Hanno aperto una nuova *clinica* specializzata in pediatria vicino a casa mia.
  Sie haben eine neue *Klinik* für Kinderheilkunde in meiner Nähe eröffnet.
  
  Dopo l’incidente ha trascorso una settimana in *clinica* per la riabilitazione.
  Nach dem Unfall verbrachte er eine Woche in der *Klinik* zur Rehabilitation.
  
  La *clinica* privata costa molto, ma offre servizi eccellenti.
  Die private *Klinik* ist sehr teuer, aber sie bietet hervorragende Dienstleistungen.
