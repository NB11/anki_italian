Rang: 3407
Wort: severo
Wortart: adj
Wort mit Artikel: severo
Femininum / Plural: ''
IPA: ''
Definition: streng, hart, strikt
Register: ''
Beispielsätze: |-
  Il professore è *severo* con gli studenti che non studiano abbastanza.
  Der Lehrer ist *streng* mit Schülern, die nicht genug lernen.
  
  Se fossi un giudice, sarei più *severo* con i criminali violenti.
  Wäre ich Richter, wäre ich *härter* mit gewalttätigen Kriminellen.
  
  Nonostante le critiche, la madre rimase *severa* con i propri principi educativi.
  Trotz der Kritik blieb die Mutter *hart* bei ihren Erziehungsgrundsätzen.
  
  Il regolamento è *severo*: chi arriva in ritardo non potrà partecipare al torneo.
  Die *strenge* Regel besagt: Wer zu spät kommt, darf nicht am Turnier teilnehmen.
  
  Per quanto *severo* possa sembrare il direttore, tutti rispettano le sue decisioni.
  So *hart* der Direktor auch wirken mag, alle respektieren seine Entscheidungen.
