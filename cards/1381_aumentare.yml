Rang: 1381
Wort: aumentare
Wortart: v
Wort mit Artikel: aumentare
Femininum / Plural: ''
IPA: ''
Definition: erhöhen, steigern, zunehmen
Register: ''
Beispielsätze: |-
  Il prezzo del pane è *aumentato* del 10% questo mese.
  Der Preis des Brotes ist um 10 *Prozent* gestiegen.
  
  Se *aumenterai* le dosi, potresti avere effetti collaterali.
  Wenn du die Dosen *erhöhst*, könntest du Nebenwirkungen haben.
  
  La signora non sapeva che la sua pensione sarebbe *aumentata* così tanto.
  Die Dame wusste nicht, dass ihre Rente so stark *zunehmen* würde.
  
  Gli scienziati hanno confermato che il livello del mare sta *aumentando* velocemente.
  Die Wissenschaftler haben bestätigt, dass der Meeresspiegel schnell *steigt*.
  
  Non appena avrai *aumentato* le vendite, riceverai una promozione.
  Sobald du die Verkäufe *erhöht* hast, wirst du befördert werden.
Audio: ''
Notiz: ''
