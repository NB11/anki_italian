Rang: 3060
Wort: fetta
Wortart: n.f
Wort mit Artikel: la fetta
Femininum / Plural: fette
IPA: ''
Definition: die Scheibe, -n
Register: ''
Beispielsätze: |-
  Vuoi un'altra *fetta* di questo dolce squisito?
  Möchtest du noch ein*es* Stück von diesem leckeren Kuchen?
  
  Ho tagliato il pane in sei *fette* uguali per tutti.
  Ich habe das Brot in sechs gleiche Scheiben für alle geschnitten.
  
  Non appena avrò finito questa *fetta*, andrò a letto.
  Sobald ich diese Scheibe gegessen habe, gehe ich ins Bett.
  
  Le *fette* di salame che hai comprato sono troppo sottili!
  Die Scheiben Salami, die du gekauft hast, sind viel zu dünn!
  
  Mentre preparavo la cena, ho fatto cadere una *fetta* di formaggio sul pavimento.
  Als ich das Abendessen vorbereitet habe, ist mir eine Scheibe Käse auf den Boden gefallen.
