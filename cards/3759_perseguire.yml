Rang: 3759
Wort: perseguire
Wortart: vt
Wort mit Artikel: perseguire
Femininum / Plural: ''
IPA: ''
Definition: verfolgen, anstreben
Register: ''
Beispielsätze: |-
  L’azienda vuole *perseguire* l’obiettivo di ridurre le emissioni entro il 2030.
  Das Unternehmen will das Ziel *verfolgen*, die Emissionen bis 2030 zu reduzieren.
  
  Il detective ha deciso di *perseguire* la pista del ladro per giorni senza successo.
  Der Detektiv hat sich entschieden, die Spur des Diebes tagelang *zu verfolgen*, ohne Erfolg.
  
  Se non *perseguiamo* i nostri sogni, chi lo farà al nostro posto?
  Wenn wir unsere Träume nicht *anstreben*, wer wird es dann für uns tun?
  
  Gli scienziati stanno *perseguendo* una cura per questa malattia rara da anni.
  Die Wissenschaftler *streben* seit Jahren eine Heilung für diese seltene Krankheit an.
  
  Il politico ha promesso di *perseguire* la giustizia sociale in ogni sua decisione.
  Der Politiker hat versprochen, in jeder seiner Entscheidungen soziale Gerechtigkeit *anzustreben*.
