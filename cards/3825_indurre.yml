Rang: 3825
Wort: indurre
Wortart: vt
Wort mit Artikel: indurre
Femininum / Plural: ''
IPA: ''
Definition: veranlassen, bewirken
Register: ''
Beispielsätze: |-
  Il medico ha cercato di *indurre* il paziente a smettere di fumare con dati preoccupanti.
  Der Arzt versuchte, den Patienten mit besorgniserregenden Daten zum Aufhören zu *bringen*.
  
  Non è facile *indurre* un adolescente a studiare quando preferisce giocare a bowling.
  Es ist nicht einfach, einen Teenager zum Lernen zu *bewegen*, wenn er lieber Bowling spielt.
  
  Le parole di sua madre hanno *indotto* Luca a chiedere scusa.
  Die Worte seiner Mutter haben Luca dazu *veranlasst*, sich zu entschuldigen.
  
  Se qualcuno ti offre un barattolo di miele, potrebbe *indurti* a fidarti di più.
  Wenn dir jemand ein Glas Honig anbietet, könnte das dazu *führen*, dass du mehr Vertrauen schenkst.
  
  I genitori cercano sempre di *indurre* i figli a seguire le proprie tradizioni familiari.
  Eltern versuchen oft, ihre Kinder dazu zu *bewegen*, die Familientraditionen zu übernehmen.
