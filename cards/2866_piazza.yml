Rang: 2866
Wort: piazza
Wortart: n.f
Wort mit Artikel: la piazza
Femininum / Plural: piazze
IPA: ''
Definition: der Platz, -e
Register: ''
Beispielsätze: |-
  La *piazza* è piena di gente che aspetta l’inizio dello spettacolo.
  Der *Platz* ist voll von Leuten, die auf den Beginn der Vorstellung warten.
  
  Non mi piace quando ci sono troppi turisti nella *piazza* centrale.
  Ich mag es nicht, wenn zu viele Touristen auf dem *Hauptplatz* sind.
  
  Dicono che domani chiuderanno la *piazza* per lavori di restauro.
  Sie sagen, dass sie morgen den *Platz* wegen Restaurierungsarbeiten schließen werden.
  
  Se fossi in te, verrei alla *piazza* prima che arrivino tutti gli altri.
  Wenn ich du wäre, würde ich zum *Platz* kommen, bevor alle anderen ankommen.
  
  La *piazza* dove abbiamo mangiato ieri sera era meno affollata di quella vicino al duomo.
  Der *Platz*, wo wir gestern Abend gegessen haben, war weniger überfüllt als der Platz in der Nähe des Doms.
