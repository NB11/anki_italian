Rang: 1296
Wort: guarire
Wortart: vi
Wort mit Artikel: guarire
Femininum / Plural: ''
IPA: ''
Definition: heilen, gesund werden
Register: ''
Beispielsätze: |-
  Dopo settimane di riposo, il cane del vicino ha finalmente *guarito* dalla sua malattia.
  Nach wochenlanger Ruhe ist der Hund des Nachbarn endlich *geheilt* worden.
  
  Se frequentassi meno il quartiere malfamato, forse non avresti bisogno di *guarire* da così tanti problemi.
  Wenn du das zwielichtige Viertel weniger besuchen würdest, müsstest du dich vielleicht nicht von so vielen Problemen *heilen*.
  
  Il dottore mi ha assicurato che con questa medicina *guarirò* presto dal raffreddore.
  Der Arzt hat mir versichert, dass ich mit dieser Medizin bald von der Erkältung *geheilt* sein werde.
  
  Tutti dubitavano che quella creatura malata potesse *guarire*, ma ha superato ogni aspettativa.
  Alle zweifelten daran, dass dieses kranke Wesen *gesunden* könnte, doch es hat alle Erwartungen übertroffen.
  
  Anzi, se continuavi a *guarire* a questo ritmo, saresti operato prima del previsto!
  Im Gegenteil, wenn du in diesem Tempo *heilst*, wirst du früher als erwartet operiert!
