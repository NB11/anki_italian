IPA: ''
Definition: die Abteilung, -en
Register: ''
Beispielsätze: |-
  Lavoro nel *reparto* vendite da cinque anni.
  Ich arbeite im *Bereich* Verkauf seit fünf Jahren.
  
  Il *reparto* di emergenza ha bisogno di più personale.
  Die *Notaufnahme* braucht mehr Personal.
  
  Ho incontrato mio fratello proprio nel *reparto* dei giocattoli.
  Ich habe meinen Bruder genau in der *Spielwarenabteilung* getroffen.
  
  Se vuoi sapere come funziona, chiedi al responsabile del *reparto*.
  Wenn du wissen willst, wie es funktioniert, frag den *Abteilungsleiter*.
  
  Nonostante le difficoltà, il *reparto* è riuscito a completare il progetto in tempo.
  Trotz der *Schwierigkeiten* hat die Abteilung es geschafft, das Projekt rechtzeitig abzuschließen.
