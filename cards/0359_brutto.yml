Rang: 359
Wort: brutto
Wortart: adj
Wort mit Artikel: brutto
Femininum / Plural: brutti (m), brutte (f)
IPA: ''
Definition: hässlich, schlecht, unschön
Register: ''
Beispielsätze: |-
  Quel film era *brutto*, non mi è piaciuto affatto.
  Dieser Film war *schlecht*, er hat mir überhaupt nicht gefallen.
  
  Non vedere un *brutto* difetto nel tuo lavoro!
  Sieh keinen *hässlichen* Fehler in deiner Arbeit!
  
  Era un *brutto* periodo della sua vita.
  Das war eine *schlechte* Zeit in ihrem Leben.
  
  Le condizioni del tempo sono *brutte* oggi.
  Die Wetterbedingungen sind heute *unschön*.
  
  Penso che sia una *brutta* abitudine bere così tanto caffè.
  Ich finde, es ist eine *schlechte* Angewohnheit, so viel Kaffee zu trinken.
