Beispielsätze: |-
  Mio figlio *disegna* solo mostri perché è molto creativo.
  Mein Sohn *zeichnet* nur Monster, weil er sehr kreativ ist.
  
  Se avessi tempo libero, vorrei *disegnare* una mappa dettagliata della foresta.
  Wenn ich Freizeit hätte, würde ich gerne eine detaillierte Karte des Waldes *zeichnen*.
  
  L’artista ha *disegnato* il ritratto di una donna elegante che indossava un abito blu.
  Der Künstler hat das Porträt einer eleganten Frau *gezeichnet*, die ein blaues Kleid trug.
  
  Non appena finirò *disegnare* questo schema, potrò spiegarti come funziona la struttura.
  Sobald ich dieses Schema *gezeichnet* habe, kann ich dir erklären, wie die Struktur funktioniert.
  
  Che ne pensi? Dovrei *disegnare* un cerchio o un quadrato per rappresentare l’area di atterraggio?
  Was meinst du? Soll ich einen Kreis oder ein Quadrat *zeichnen*, um die Landezone darzustellen?
