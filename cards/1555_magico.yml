Beispielsätze: |-
  Questa *magica* sera sotto le stelle mi ha fatto sentire libero.
  Diese *magische* Abendstunde unter den Sternen ließ mich frei fühlen.
  
  Non appena ho toccato la bacchetta, l’atmosfera è diventata *magica*.
  Sobald ich den Zauberstab berührte, wurde die Atmosphäre *magisch*.
  
  Se avessi un potere *magico*, lo userei per aiutare gli altri.
  Hätte ich eine *magische* Kraft, würde ich sie nutzen, um anderen zu helfen.
  
  Il suo sorriso era così *magico* che tutti volevano essere suoi amici.
  Sein Lächeln war so *magisch*, dass alle seine Freunde sein wollten.
  
  Penso che il tuo consiglio sia *magico* per risolvere questo problema.
  Ich glaube, dein Rat ist *magisch*, um dieses Problem zu lösen.
