Wort mit Artikel: il forno
Femininum / Plural: forni
IPA: ''
Definition: der Backofen, -¨
Register: ''
Beispielsätze: |-
  Mia nonna impasta il pane che poi cuoce nel *forno* per due ore.
  Meine Oma knetet den Brotteig, der dann *im Backofen* zwei Stunden backt.
  
  Se spegni il *forno* troppo presto, la pizza non avrà la crosta croccante.
  Wenn du *den Backofen* zu früh ausschaltest, wird die Pizza nicht knusprig.
  
  Il *forno* a legna dà un aroma delizioso ai dolci che prepari.
  Der Holz*ofen* verleiht den Süßspeisen, die du zubereitest, ein köstliches Aroma.
  
  Nonostante il guasto, abbiamo usato il *forno* a microonde per scaldare il cibo rimasto.
  Trotz des Defekts haben wir die Mikrowelle als *Backofen* benutzt, um das übrige Essen zu erwärmen.
  
  Mi hanno detto che il *forno* di questo ristorante cuoce i panini in soli cinque minuti.
  Man hat mir gesagt, dass der *Backofen* dieses Restaurants die Brötchen in nur fünf Minuten backt.
