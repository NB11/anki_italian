Rang: 4657
Wort: ritirata
Wortart: n.f
Wort mit Artikel: la ritirata
Femininum / Plural: ritirate
IPA: ''
Definition: die Zurückziehung, der Rückzug
Register: ''
Beispielsätze: |-
  Il generale ha ordinato la *ritirata* delle truppe al confine.
  Der General hat den *Rückzug* der Truppen an die Grenze angeordnet.
  
  Dopo la sconfitta, la *ritirata* fu caotica e disorganizzata.
  Nach der Niederlage war der *Rückzug* chaotisch und unorganisiert.
  
  Non appena avvisi un pericolo, suona l’allarme per una *ritirata* immediata.
  Sobald du eine Gefahr bemerkst, läute sofort die Alarmglocke für einen *Rückzug*.
  
  Credo che la *ritirata* sia stata una scelta strategica saggia.
  Ich glaube, dass der *Rückzug* eine kluge strategische Wahl war.
  
  La *ritirata* dei volatili verso sud segna l’inizio dell’autunno.
  Der *Rückzug* der Vögel nach Süden markiert den Beginn des Herbstes.
