Rang: 3814
Wort: riscatto
Wortart: n.m
Wort mit Artikel: il riscatto
Femininum / Plural: i riscatti
IPA: ''
Definition: der Loskauf, -äu-e, die Auslösung, -en
Register: ''
Beispielsätze: |-
  Dopo settimane di prigionia, finalmente hanno accettato il *riscatto* per la sua liberazione.
  Nach Wochen der Gefangenschaft haben sie schließlich das *Auslösungsgeld* für seine Freilassung angenommen.
  
  Il governo sta cercando di negoziare il *riscatto* dei sequestrati in quel Paese in guerra.
  Die Regierung versucht, die *Freilassung* der Geiseln in diesem Kriegsland zu verhandeln.
  
  Per ottenere il *riscatto*, la famiglia ha dovuto vendere tutto ciò che possedeva.
  Um das *Loskaufgeld* zu bekommen, musste die Familie alles verkaufen, was sie besaß.
  
  Molti non capiscono perché abbia pagato un *riscatto* così alto per riavere il cane che aveva perso.
  Viele verstehen nicht, warum er ein so hohes *Lösegeld* gezahlt hat, um den Hund zurückzubekommen, den er verloren hatte.
  
  Il riscatto per quella collana antica è troppo alto perché io possa permettermelo.
  Das *Lösegeld* für diese antike Halskette ist viel zu hoch, als dass ich es mir leisten könnte.
