Rang: 4772
Wort: allergia
Wortart: n.f
Wort mit Artikel: la allergia
Femininum / Plural: allergie
IPA: ''
Definition: die Allergie, -en
Register: ''
Beispielsätze: |-
  Ho scoperto di avere una *allergia* alle noci dopo che mi sono sentito male a cena.
  Ich habe festgestellt, dass ich eine *Allergie* gegen Nüsse habe, nachdem ich mich beim Abendessen unwohl gefühlt habe.
  
  Nonostante la *allergia* al polline, esco ugualmente a passeggiare nel parco ogni mattina.
  Trotz der *Allergie* gegen Pollen gehe ich trotzdem jeden Morgen im Park spazieren.
  
  Se avessi saputo della tua *allergia*, non avrei comprato la torta con le fragole!
  Wenn ich von deiner *Allergie* gewusst hätte, hätte ich den Kuchen mit Erdbeeren nicht gekauft!
  
  La *allergia* della bambina ai detergenti è così forte che dobbiamo usare solo prodotti ipoallergenici.
  Die *Allergie* des Mädchens gegen Reinigungsmittel ist so stark, dass wir nur noch hypoallergene Produkte verwenden müssen.
  
  Chi soffre di *allergia* al glutine deve stare attento a tutto ciò che mangia al ristorante.
  Wer unter einer *Allergie* gegen Gluten leidet, muss bei allem, was er im Restaurant isst, sehr vorsichtig sein.
