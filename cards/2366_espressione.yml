Rang: 2366
Wort: espressione
Wortart: n.f
Wort mit Artikel: l'espressione
Femininum / Plural: espressioni
IPA: ''
Definition: der Ausdruck, -drücke
Register: ''
Beispielsätze: |-
  La *espressione* del suo volto mi ha fatto capire che era arrabbiato.
  Der *Ausdruck* seines Gesichts hat mir klar gemacht, dass er wütend war.
  
  Secondo me, la *espressione* 'vivere di rendita' non è più molto moderna.
  Meiner Meinung nach ist der *Ausdruck* 'von der Rente leben' nicht mehr sehr modern.
  
  Non mi piacciono le *espressioni* volgari in un contesto formale.
  Ich mag *Ausdrücke*, die vulgär sind, in einem formellen Kontext nicht.
  
  Ha usato una *espressione* molto poetica per descrivere il tramonto.
  Sie hat einen sehr poetischen *Ausdruck* verwendet, um den Sonnenuntergang zu beschreiben.
  
  La *espressione* 'avere le mani in pasta' deriva da un antico proverbio.
  Der *Ausdruck* 'die Hände im Teig haben' stammt von einem alten Sprichwort.
