Rang: 4223
Wort: ispezione
Wortart: n.f
Wort mit Artikel: l'ispezione
Femininum / Plural: ispezioni
IPA: ''
Definition: die Prüfung, -en, die Kontrolle, -n
Register: ''
Beispielsätze: |-
  L'*ispezione* della polizia ha rilevato delle irregolarità nel documento.
  Die *Polizeiprüfung* hat einige Unregelmäßigkeiten in dem Dokument festgestellt.
  
  Dopo l'*ispezione* tecnica, la macchina è stata dichiarata sicura.
  Nach der *technischen Kontrolle* wurde das Auto für sicher erklärt.
  
  Il ministro ha chiesto un'*ispezione* approfondita sugli impianti.
  Der Minister hat eine *gründliche Prüfung* der Anlagen verlangt.
  
  Senza un'*ispezione* regolare, non possiamo garantire la qualità.
  Ohne eine *regelmäßige Kontrolle* können wir die Qualität nicht garantieren.
  
  Hanno organizzato un'*ispezione* notturna per evitare interferenze.
  Sie haben eine *Nachprüfung* organisiert, um Störungen zu vermeiden.
