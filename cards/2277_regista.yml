Rang: 2277
Wort: regista
Wortart: n.m
Wort mit Artikel: il regista
Femininum / Plural: registi
IPA: ''
Definition: der Regisseur, -e
Register: ''
Beispielsätze: |-
  Il *regista* ha vinto un premio per il suo ultimo film al festival di Venezia.
  Der *Regisseur* hat einen Preis für seinen letzten Film beim Venedig-Festival gewonnen.
  
  Non sapevo che tuo fratello fosse un *regista* così famoso.
  Ich wusste nicht, dass dein Bruder ein so berühmter *Regisseur* ist.
  
  Se avessi più soldi, fonderei una casa di produzione per aiutare giovani *registi*.
  Wenn ich mehr Geld hätte, würde ich eine Produktionsfirma gründen, um junge *Regisseure* zu fördern.
  
  Il *regista* di questo spettacolo teatrale è molto severo con gli attori.
  Der *Regisseur* dieses Theaterstücks ist sehr streng mit den Schauspielern.
  
  Mi hanno detto che il *regista* ha cambiato idea sulla location delle riprese.
  Man hat mir gesagt, dass der *Regisseur* seine Meinung über den Drehort geändert hat.
