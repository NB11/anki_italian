Rang: 1072
Wort: furgone
Wortart: n.m
Wort mit Artikel: il furgone
Femininum / Plural: i furgoni
IPA: ''
Definition: der Transporter, -
Register: ''
Beispielsätze: |-
  Il *furgone* che ho comprato è molto spazioso per trasportare coltelli e attrezzi da lavoro.
  Der *Transporter*, den ich gekauft habe, ist sehr geräumig, um Messer und Arbeitsgeräte zu transportieren.
  
  Quando ero piccolo, mio padre guidava un *furgone* verde che usavamo per le nostre vacanze estive.
  Als ich klein war, fuhr mein Vater einen *Transporter* in Grün, den wir für unseren Urlaub im Sommer nutzten.
  
  Hanno arrestato un uomo che trasportava animali di una razza protetta nel *furgone* senza documenti.
  Sie verhafteten einen Mann, der *Tiere* einer geschützten Art in einem Transporter ohne Papiere transportierte.
  
  Se avessi più soldi, comprerei un *furgone* moderno per aprire un servizio di consegne locali.
  Wenn ich mehr Geld hätte, würde ich mir einen modernen *Transporter* kaufen, um einen örtlichen Lieferdienst zu eröffnen.
  
  Dicono che questo *furgone* sia stato usato per trasportare merci illegali, ma non ci sono prove concrete a riguardo.
  Man sagt, dieser *Transporter* sei für den Transport von illegalen Waren genutzt worden, aber es gibt keine konkreten Beweise dafür.
