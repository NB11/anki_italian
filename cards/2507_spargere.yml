Rang: 2507
Wort: spargere
Wortart: vt
Wort mit Artikel: spargere
Femininum / Plural: ''
IPA: ''
Definition: streuen, verteilen, verbreiten
Register: ''
Beispielsätze: |-
  Il contadino *sparge* il concime sul campo ogni mattina.
  Der Bauer *streut* jeden Morgen den Dünger auf das Feld.
  
  Se *spargessi* la voce che partirò, tutti lo saprebbero in un’ora.
  Wenn ich *verbreiten* würde, dass ich gehe, wüsste es jeder in einer Stunde.
  
  Ha *sparso* la farina sul tavolo per preparare la pasta fresca.
  Sie hat das Mehl auf den Tisch *verteilt*, um frische Nudeln zuzubereiten.
  
  Preferisco *spargere* questi fiori nel giardino piuttosto che buttarli via.
  Ich würde diese Blumen lieber im Garten *verstreuen* als sie wegzuwerfen.
  
  La polizia sospetta che qualcuno abbia *sparso* delle prove false per incastrare l’imputato.
  Die Polizei vermutet, dass jemand falsche Beweise *verteilt* hat, um den Angeklagten zu belasten.
