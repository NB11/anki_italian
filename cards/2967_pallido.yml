Rang: 2967
Wort: pallido
Wortart: adj
Wort mit Artikel: pallido
Femininum / Plural: ''
IPA: ''
Definition: blass, bleich
Register: ''
Beispielsätze: |-
  Dopo aver corso per un'ora, Marco aveva il viso *pallido* per la stanchezza.
  Nachdem er eine Stunde gelaufen war, hatte Marco ein *blasses* Gesicht vor Müdigkeit.
  
  La mattina dopo il funerale, la signora Rossi appariva ancora *pallida* e sconvolta.
  Am Morgen nach der Beerdigung erschien Frau Rossi immer noch *bleich* und erschüttert.
  
  Nonostante il sole, il neonato nella culla restava *pallido*, e la madre chiamò immediatamente il pediatra.
  Trotz der Sonne blieb das Neugeborene in der Wiege *bleich*, und die Mutter rief sofort den Kinderarzt.
  
  Se avessi visto quel film, anche tu saresti rimasto *pallido* come me.
  Wenn du diesen Film gesehen hättest, wärst du *bleich* geworden wie ich.
  
  È normale che alcune persone diventino *pallide* quando vedono il sangue, ma non è un motivo di preoccupazione.
  Es ist normal, dass manche Leute *bleich* werden, wenn sie Blut sehen, aber das ist kein Grund zur Sorge.
