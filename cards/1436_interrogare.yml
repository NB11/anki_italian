Rang: 1436
Wort: interrogare
Wortart: vt
Wort mit Artikel: interrogare
Femininum / Plural: ''
IPA: ''
Definition: befragen, verhören, interviewen
Register: ''
Beispielsätze: |-
  Il poliziotto decide di *interrogare* il testimone per chiarire i dettagli della fuga.
  Der Polizist entscheidet, den Zeugen zu *befragen*, um die Details der Flucht zu klären.
  
  Se fossi il sindaco, vorrei *interrogare* tutti quelli che gestiscono male la raccolta dei rifiuti al centro.
  Wenn ich der Bürgermeister wäre, würde ich alle *verhören*, die die Müllabfuhr in der Innenstadt schlecht organisieren.
  
  Gli insegnanti hanno *interrogato* gli studenti sugli argomenti trattati nel capitolo precedente.
  Die Lehrer haben die Schüler zu den Themen aus dem letzten Kapitel *befragt*.
  
  Non appena giungerà il responsabile, vorrà *interrogare* tutti i giocatori per capire chi ha rovinato l’incontro al centrale.
  Sobald der Verantwortliche ankommt, wird er alle Spieler *verhören*, um zu verstehen, wer das Spiel im Hauptstadion ruiniert hat.
  
  Spera che le autorità lo lasceranno in pace e non lo costringeranno a *interrogare* nessuno dopo il funerale.
  Sie hofft, dass die Behörden ihn in Ruhe lassen und ihn nach der Beerdigung zu niemandem *verhören* zwingen.
