Beispielsätze: |-
  Non *mentire* mai ai tuoi genitori!
  Lügen Sie *nie* Ihre Eltern *an*!
  
  Ha *mentito* per paura di essere punito.
  Er hat *gelogen*, aus Angst bestraft zu werden.
  
  Se *mentirò*, non mi crederà più nessuno.
  Wenn ich *lüge*, wird mir niemand mehr glauben.
  
  Perché *menti* su dove sei stato?
  Warum *lügst* du darüber, wo du warst?
  
  Non saprei se qualcuno *mentisse* per salvarmi la vita.
  Ich wüsste nicht, ob jemand *lügen* würde, um mein Leben zu retten.
