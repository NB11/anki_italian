Rang: 907
Wort: concentrare
Wortart: vr
Wort mit Artikel: concentrare
Femininum / Plural: ''
IPA: ''
Definition: konzentrieren, sich konzentrieren
Register: ''
Beispielsätze: |-
  Quando studio, cerco di *concentrarmi* il più possibile per ottenere buoni risultati.
  Wenn ich lerne, versuche ich mich so gut wie möglich zu *konzentrieren*, um gute Ergebnisse zu erzielen.
  
  Nonostante il rumore, il professore riusciva a *concentrarsi* sulle sue ricerche nel suo ufficio all'ultimo piano.
  Trotz des Lärms schaffte es der Professor, sich in seinem Büro im obersten Stock auf seine Forschungen zu *konzentrieren*.
  
  Avendo *concentrato* tutte le sue energie nel progetto, alla fine ha vinto il premio per l'innovazione.
  Da er alle seine Energien auf das Projekt *konzentriert* hatte, gewann er schließlich den Innovationspreis.
  
  Se *concentrassi* meno tempo sui dettagli inutili, potresti finire il lavoro più velocemente.
  Wenn du weniger Zeit auf unnötige Details *koncentrieren* würdest, könntest du die Arbeit schneller beenden.
  
  È fondamentale che tu *ti concentri* sulle domande più importanti durante l'esame, piuttosto che perderti in argomenti secondari.
  Es ist entscheidend, dass du dich im Examen auf die wichtigsten Fragen *konzentrierst*, statt dich in nebensächlichen Themen zu verlieren.
