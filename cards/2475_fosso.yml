Rang: 2475
Wort: fosso
Wortart: n.m
Wort mit Artikel: il fosso
Femininum / Plural: fossi
IPA: ''
Definition: der Graben, -¨
Register: ''
Beispielsätze: |-
  Hanno scavato *un fosso* per delimitare il campo.
  Sie haben *einen Graben* gegraben, um das Feld abzugrenzen.
  
  Non gettare la spazzatura in *fossi* vicino alla strada!
  Wirf den Müll nicht in *die Gräben* an der Straße!
  
  Il contadino ha trovato una moneta antica mentre puliva *il fosso* dietro la casa.
  Der Bauer hat eine antike Münze gefunden, während er *den Graben* hinter dem Haus reinigte.
  
  Se attraversi *i fossi* troppo veloce, rischi di cadere.
  Wenn du *die Gräben* zu schnell überquerst, könntest du stürzen.
  
  È evidente che *fossi* e fossati servono a proteggere i confini antichi.
  Es ist *offensichtlich*, dass Gräben und Wallgräben zum Schutz alter Grenzen dienten.
