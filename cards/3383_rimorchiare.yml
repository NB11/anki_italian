Rang: 3383
Wort: rimorchiare
Wortart: vt
Wort mit Artikel: rimorchiare
Femininum / Plural: ''
IPA: ''
Definition: abschleppen, ziehen
Register: ''
Beispielsätze: |-
  Il carro attrezzi è venuto per *rimorchiare* la mia auto che non partiva più.
  Der Abschleppdienst ist gekommen, um *mein Auto abzuschleppen*, das nicht mehr ansprang.
  
  Mentre guidavo, ho visto un poliziotto che stava *rimorchiando* un camion in panne.
  Während ich fuhr, sah ich einen Polizisten, der gerade *einen liegengebliebenen Lkw abschleppte*.
  
  Se non avessi *rimorchiato* quelle parole, forse non saremmo arrivati a questa conclusione.
  Wenn ich diese Worte nicht *zurückgezogen hätte*, wären wir vielleicht nicht zu dieser Schlussfolgerung gelangt.
  
  Ha detto che *rimorchierà* il suo progetto fallito con un nuovo finanziamento.
  Er sagte, dass er sein gescheitertes Projekt *mit einer neuen Finanzierung wieder aufgleist*.
  
  Senza il suo aiuto saremmo stati costretti a *rimorchiare* noi stessi la barca fino a riva.
  Ohne seine Hilfe hätten wir das Boot selbst *ans Ufer ziehen müssen*.
