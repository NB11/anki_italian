Rang: 1017
Wort: commettere
Wortart: vt
Wort mit Artikel: commettere
Femininum / Plural: ''
IPA: ''
Definition: begehen, verüben
Register: ''
Beispielsätze: |-
  Non vorrei *commettere* lo stesso errore due volte, quindi sto attento.
  Ich würde denselben Fehler nicht *begehen* wollen, also achte ich darauf.
  
  Il poliziotto ha detto che l’uomo ha *commesso* un reato grave secondo la legge.
  Der Polizist hat gesagt, der Mann hat eine schwere Straftat *verübt*.
  
  Penso che abbia *commesso* un errore a non accettare quella famosa offerta di lavoro.
  Ich glaube, er hat einen Fehler *begangen*, indem er dieses berühmte Jobangebot nicht angenommen hat.
  
  Se vuoi *commettere* una pazzia del genere, almeno informati bene prima!
  Wenn du so eine Dummheit *begehen* willst, dann informier dich wenigstens vorher gut!
  
  Gli investigatori stanno cercando di capire chi ha *commesse* questi dettagli oscuri nel documento.
  Die Ermittler versuchen herauszufinden, wer diese dunklen *Einzelheiten* in dem Dokument verübt hat.
