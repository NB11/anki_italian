Rang: 916
Wort: lanciare
Wortart: v
Wort mit Artikel: lanciare
Femininum / Plural: ''
IPA: ''
Definition: werfen, schleudern, werfen, werfen
Register: ''
Beispielsätze: |-
  Marco *lancia* la palla al suo cane che la prende al volo.
  Marco wirft den Ball seinem Hund, der ihn im Flug fängt.
  
  Se non avessi *lanciato* quel sasso, non avremmo causato nessun danno.
  Wenn ich diesen Stein nicht *geworfen* hätte, hätten wir keinen Schaden verursacht.
  
  Il professore ci ha detto che dovremmo *lanciare* le nostre idee in gruppo durante la riunione.
  Der Professor hat uns gesagt, dass wir unsere Ideen während der Besprechung in die Runde *werfen* sollten.
  
  Il ladro è riuscito a *lanciare* un grido per avvertire gli altri prima che lo catturassero.
  Der Dieb schaffte es, einen Schrei *auszustoßen*, um die anderen zu warnen, bevor sie ihn fassten.
  
  Nonostante il fallo dell'arbitro, il giocatore ha continuato a *lanciare* accuse contro la squadra avversaria.
  Trotz des Fehlers des Schiedsrichters fuhr der Spieler damit fort, der gegnerischen Mannschaft Vorwürfe zu *machen*.
