Beispielsätze: |-
  Quest’anno il *Natale* cade di domenica, quindi abbiamo un lungo weekend.
  Dieses *Jahr* fällt das Weihnachten auf einen Sonntag, also haben wir ein langes Wochenende.
  
  Durante il periodo *natalizio* visitiamo sempre i nostri nonni per mangiare insieme.
  Während der *Weihnachtszeit* besuchen wir immer unsere Großeltern, um gemeinsam zu essen.
  
  Se avessi più giorni di vacanza, potrei trascorrere il *Natale* a casa dei miei zii in campagna.
  Wenn ich mehr Urlaubstage hätte, könnte ich das *Weihnachten* bei meinen Onkeln auf dem Land verbringen.
  
  Dopo la festa del *Natale*, dobbiamo sistemare tutto e buttar via l’albero seccato.
  Nach dem *Weihnachtsfest* müssen wir alles aufräumen und den vertrockneten Baum wegwerfen.
  
  Quando ero più piccolo, credevo che Babbo *Natale* esistesse davvero, ma ora so che è solo una leggenda.
  Als ich *jünger* war, glaubte ich, dass der Weihnachtsmann wirklich existiert, aber jetzt weiß ich, dass es nur eine Legende ist.
