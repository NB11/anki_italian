Beispielsätze: |-
  Il *seme* di questo albero cresce molto lentamente.
  Der *Samen* dieses Baumes wächst sehr langsam.
  
  Nelle foreste tropicali ho trovato molti *semi* sconosciuti.
  In den tropischen Wäldern habe ich viele unbekannte *Samen* gefunden.
  
  Se non annaffierai la pianta, il *seme* non germoglierà.
  Wenn du die Pflanze nicht gießt, wird der *Samen* nicht keimen.
  
  Ho comprato dei *semi* di girasole al supermercato.
  Ich habe *Samen* von Sonnenblumen im Supermarkt gekauft.
  
  I *semi* di questa varietà resistono anche a temperature molto basse.
  Die *Samen* dieser Sorte widerstehen auch sehr niedrigen Temperaturen.
