Rang: 2673
Wort: egoista
Wortart: adj
Wort mit Artikel: egoista
Femininum / Plural: ''
IPA: ''
Definition: egoistisch
Register: ''
Beispielsätze: |-
  Non mi piace quando qualcuno è *egoista* e non condivide nulla.
  Ich mag es nicht, wenn jemand *egoistisch* ist und nichts teilt.
  
  Se fossi *egoista*, non aiuterei mai i miei amici in difficoltà.
  Wenn ich *egoistisch* wäre, würde ich meinen Freunden in Not niemals helfen.
  
  È chiaro che lui agisce in modo *egoista*, ignorando le necessità altrui.
  Es ist offensichtlich, dass er *egoistisch* handelt und die Bedürfnisse anderer ignoriert.
  
  Vorresti che fossimo tutti un po’ più *egoisti* per evitare di essere sfruttati?
  Würdest du wollen, dass wir alle ein bisschen *egoistischer* wären, um nicht ausgenutzt zu werden?
  
  Sebbene sia *egoista* in alcune situazioni, sa anche essere generoso quando conta.
  Auch wenn er in manchen Situationen *egoistisch* ist, weiß er auch großzügig zu sein, wenn es darauf ankommt.
