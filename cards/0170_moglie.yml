Rang: 170
Wort: moglie
Wortart: n.f
Wort mit Artikel: la moglie
Femininum / Plural: mogli
IPA: ''
Definition: die Ehefrau, -en
Register: ''
Beispielsätze: |-
  La *moglie* di Marco lavora in una banca.
  Die *Ehefrau* von Marco arbeitet in einer Bank.
  
  Avete già conosciuto la sua nuova *moglie*?
  Habt ihr schon seine neue *Ehefrau* kennengelernt?
  
  La *moglie* preparò una cena deliziosa per tutti noi.
  Die *Ehefrau* bereitete ein köstliches Abendessen für uns alle zu.
  
  Spero che la tua *moglie* stia meglio presto.
  Ich hoffe, dass deine *Ehefrau* bald wieder gesund wird.
  
  Le *mogli* dei colleghi erano tutte presenti alla festa.
  Die *Ehefrauen* der Kollegen waren alle auf der Feier anwesend.
