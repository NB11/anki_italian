Rang: 4432
Wort: bacino
Wortart: n.m
Wort mit Artikel: il bacino
Femininum / Plural: bacini
IPA: ''
Definition: das Becken, -
Register: ''
Beispielsätze: |-
  Il *bacino* del Mediterraneo è molto importante per il clima europeo.
  Das *Becken* des Mittelmeers ist sehr wichtig für das europäische Klima.
  
  Dopo la pioggia, l'acqua si è raccolta nel *bacino* artificiale vicino alla piazza.
  Nach dem Regen sammelte sich das Wasser in dem künstlichen *Becken* in der Nähe des Platzes.
  
  Il medico ha detto che il paziente ha un'infiammazione al *bacino* destro.
  Der Arzt sagte, der Patient habe eine Entzündung am rechten *Becken*.
  
  Prima di costruire la diga, hanno analizzato attentamente il *bacino* idrografico del fiume.
  Bevor sie den Damm bauten, haben sie das hydrographische *Becken* des Flusses genau analysiert.
  
  Nel *bacino* della cucina ci sono ancora dei piatti da lavare.
  In der Spüle der Küche liegen noch Geschirrteile, die gewaschen werden müssen.
