Rang: 4036
Wort: lori
Wortart: n.m
Wort mit Artikel: il lori
Femininum / Plural: i lori
IPA: ''
Definition: der Loris, -se
Register: ''
Beispielsätze: |-
  Sapevi che il *lori* è un piccolo primate notturno originario dell'Asia orientale?
  Wusstest du, dass der *Loris* ein kleiner nachtaktiver Primat aus Ostasien ist?
  
  Durante la nostra escursione abbiamo visto diversi *lori* appollaiati sui rami più alti degli alberi.
  Während unseres Ausflugs haben wir mehrere *Loris* auf den höchsten Ästen der Bäume sitzen sehen.
  
  Se non fosse per la critica degli ambientalisti, molti *lori* sarebbero ancora venduti illegalmente come animali domestici.
  Wenn es nicht die Kritik der Umweltschützer gäbe, würden viele *Loris* immer noch illegal als Haustiere verkauft werden.
  
  Mi hanno detto che gli *lori* si muovono molto lentamente perché si nutrono di linfa e non hanno bisogno di cacciare.
  Man hat mir gesagt, dass sich die *Loris* sehr langsam bewegen, weil sie sich von Baumsaft ernähren und nicht jagen müssen.
  
  Nonostante sia protetto, il commercio illegale di *lori* continua a minacciare la loro sopravvivenza necessariamente.
  Trotz des Schutzes bedroht der illegale Handel mit *Loris* weiterhin ihr zwangsläufiges Überleben.
