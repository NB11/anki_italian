Rang: 4979
Wort: umiliazione
Wortart: n.f
Wort mit Artikel: l'umiliazione
Femininum / Plural: umiliazioni
IPA: ''
Definition: die Demütigung, die Erniedrigung
Register: ''
Beispielsätze: |-
  L'*umiliazione* che ha subito davanti a tutti è stata molto dolorosa per lui.
  Die *Demütigung*, die er vor allen erlebt hat, war für ihn sehr schmerzhaft.
  
  Nonostante la sua timidezza, non voleva provare *umiliazione* durante la presentazione.
  Trotz seiner Schüchternheit wollte er *Erniedrigung* bei der Präsentation nicht erleben.
  
  Non capiva perché la sua domanda fosse stata accolta con tanta *umiliazione*.
  Er verstand nicht, warum seine Frage mit so viel *Demütigung* aufgenommen wurde.
  
  Se avesse rispettato le regole, avrebbe evitato l'*umiliazione* di essere espulso dalla gara.
  Wenn er die Regeln beachtet hätte, hätte er die *Demütigung* vermieden, aus dem Wettbewerb ausgeschlossen zu werden.
  
  Dopo l'*umiliazione* pubblica, si rifugiò in un angolo buio per piangere in silenzio.
  Nach der öffentlichen *Erniedrigung* zog er sich in eine dunkle Ecke zurück, um still zu weinen.
