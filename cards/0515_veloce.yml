Beispielsätze: |-
  Il treno è *veloce* e arriva puntuale.
  Der Zug ist *schnell* und kommt pünktlich an.
  
  Corri *più veloce* se vuoi arrivare prima!
  Lauf *schneller*, wenn du früher ankommen willst!
  
  Questa macchina è la più *veloce* del mercato.
  Dieses Auto ist das *schnellste* auf dem Markt.
  
  Non essere *veloce* a giudicare gli altri.
  Sei nicht *schnell* damit, andere zu beurteilen.
  
  Il cane è *veloce* come il vento mentre insegue la palla.
  Der Hund ist *schnell* wie der Wind, während er dem Ball hinterherrennt.
