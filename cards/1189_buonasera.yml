Rang: 1189
Wort: buonasera
Wortart: n.m
Wort mit Artikel: il buonasera
Femininum / Plural: buonasere
IPA: ''
Definition: der Guten Abend
Register: ''
Beispielsätze: |-
  Quando arrivi, di' semplicemente *buonasera* e sorridi.
  Wenn du ankommst, sag einfach *Guten Abend* und lächle.
  
  *Buonasera*, signora Rossi! Come sta oggi?
  *Guten Abend*, Frau Rossi! Wie geht es Ihnen heute?
  
  Non ho ancora avuto il tempo di augurarti *buonasera*, ma eccolo qui.
  Ich habe dir noch keine Zeit gefunden, dir *Guten Abend* zu sagen, aber hier ist es.
  
  Se entri tardi, usa *buonasera* invece di buongiorno dopo le 18.
  Wenn du später kommst, nutze *Guten Abend* statt Guten Morgen nach 18 Uhr.
  
  Appena varcò la soglia, gli venne spontaneo mormorare *buonasera* ai presenti.
  Sobald er die Schwelle überquerte, fiel es ihm ein, den Anwesenden *Guten Abend* zuzuflüstern.
