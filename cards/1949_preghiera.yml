Rang: 1949
Wort: preghiera
Wortart: n.f
Wort mit Artikel: la preghiera
Femininum / Plural: preghiere
IPA: ''
Definition: das Gebet, -e
Register: ''
Beispielsätze: |-
  Ogni mattina la *preghiera* che recito inizia con un segno di croce.
  Jedes Morgen beginnt das *Gebet*, das ich spreche, mit einem Kreuzzeichen.
  
  Se non avessi detto questa *preghiera* ieri sera, non mi sento così sereno oggi.
  Hätte ich gestern Abend nicht dieses *Gebet* gesprochen, würde ich mich heute nicht so ruhig fühlen.
  
  Lei spera che la sua *preghiera* venga ascoltata, anche se non è molto religiosa.
  Sie hofft, dass ihre *preghiera* erhört wird, obwohl sie nicht besonders religiös ist.
  
  Dopo la *preghiera* comune, ognuno può aggiungere una richiesta personale.
  *Gebete* nach sprechen darf jeder noch eine persönliche Bitte hinzufügen.
  
  Quando sentì la *preghiera* del nonno, capì quanto quei momenti fossero importanti per la famiglia.
  Als er das *Gebet* seines Großvaters hörte, wurde ihm klar, wie wichtig diese Momente für die Familie waren.
