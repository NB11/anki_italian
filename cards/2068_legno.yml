Rang: 2068
Wort: legno
Wortart: n.m
Wort mit Artikel: il legno
Femininum / Plural: legni
IPA: ''
Definition: das Holz, Hölzer
Register: ''
Beispielsätze: |-
  Ho bisogno di acquistare un *legno* di pino per costruire la libreria.
  Ich brauche ein *Stück Holz* aus Kiefer, um das Regal zu bauen.
  
  Quel mobile antico è fatto interamente di *legno* di ciliegio.
  Dieser antike Schrank besteht ausschließlich aus *Kirschholz*.
  
  I falegnami lavorano il *legno* con grande precisione.
  Die Tischler bearbeiten das *Holz* mit großer Präzision.
  
  Durante la tempesta alcuni alberi sono caduti e il *legno* ha bloccato la strada.
  Während des Sturms sind einige Bäume umgefallen und das *Holz* hat die Straße blockiert.
  
  Se vuoi risparmiare, prova a usare del *legno* di recupero per il tuo progetto.
  Wenn du sparen willst, versuche, in deinem Projekt *Recyclingholz* zu verwenden.
