Rang: 3400
Wort: aquila
Wortart: n.m
Wort mit Artikel: l'aquila
Femininum / Plural: aquile
IPA: ''
Definition: der Adler, -
Register: ''
Beispielsätze: |-
  L’*aquila* reale è un simbolo di forza e libertà.
  Der *Adler* ist ein Symbol für Stärke und Freiheit.
  
  Ho visto un film in cui un *aquilone* volava nel cielo come un aquila.
  Ich habe einen Film gesehen, in dem ein *Drachen* wie ein Adler am Himmel flog.
  
  Nonostante le difficoltà, l’*aquila* riuscì ad allargare le sue ali e spiccare il volo.
  Trotz der Schwierigkeiten gelang es dem *Adler*, seine Flügel auszubreiten und abzuheben.
  
  Se non ci fosse stato il vento, l’*aquila* non avrebbe esteso la sua caccia così lontano.
  Hätte es den Wind nicht gegeben, hätte der *Adler* seine Jagd nicht so weit ausgedehnt.
  
  L’*aquila* che hai visto ieri è quella stessa che governa questa valle da anni.
  Der *Adler*, den du gestern gesehen hast, ist derselbe, der dieses Tal seit Jahren regiert.
