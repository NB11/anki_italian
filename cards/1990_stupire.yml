Rang: 1990
Wort: stupire
Wortart: v
Wort mit Artikel: stupire
Femininum / Plural: ''
IPA: ''
Definition: erstaunen, überraschen
Register: ''
Beispielsätze: |-
  Non mi *stupisce* affatto che tu abbia vinto il premio, eri sempre il migliore.
  Es erstaunt mich überhaupt nicht, dass du den Preis gewonnen hast, du warst immer der Beste.
  
  Mi hanno detto che il nuovo film *stupirà* tutti quanti, ma secondo me è un po’ esagerato.
  Man hat mir gesagt, dass der neue Film alle *erstaunen* wird, aber ich finde das ein bisschen übertrieben.
  
  Spero che questa notizia non *stupisca* troppo tua sorella, dato che non se l’aspetta.
  Ich hoffe, dass diese Nachricht deine Schwester nicht zu sehr *erstaunt*, da sie es nicht erwartet.
  
  Sei davvero capace di *stupire* con le tue idee così innovative ogni volta che ti vedo
  Du schaffst es wirklich, mich jedes Mal mit deinen so innovativen Ideen zu *erstaunen*.
  
  Se non avessi visto con i miei occhi, non avrei mai creduto che potesse *stupire* così tanto una persona semplice come lui
  Hätte ich es nicht mit eigenen Augen gesehen, hätte ich nie geglaubt, dass es eine so einfache Person wie ihn so sehr *erstaunen* könnte.
