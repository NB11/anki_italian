Rang: 992
Wort: impedire
Wortart: v
Wort mit Artikel: impedire
Femininum / Plural: ''
IPA: ''
Definition: verhindern, unterbinden, blockieren
Register: ''
Beispielsätze: |-
  Il poliziotto volle *impedire* che il testimone lasciasse la stazione senza testimoniare.
  Der Polizist wollte verhindern, dass der Zeuge den Bahnhof verlässt, ohne auszusagen.
  
  Se non avesse abbassato il volume, la musica avrebbe *impedito* lo studio dell’attore.
  Wenn er die Lautstärke nicht reduziert hätte, hätte die Musik das *Studieren* des Schauspielers behindert.
  
  Nonostante le dettagliate difese, i ladri riuscirono a *impedire* che la polizia catturasse il bottino.
  Trotz der detaillierten Abwehrmaßnahmen gelang es den Dieben zu verhindern, dass die Polizei die Beute fing.
  
  La sua calda offerta avrebbe *impedito* che io litigassi con mio fratello durante il discorso.
  Sein großzügiges Angebot hätte verhindert, dass ich mich mit meinem Bruder während der Rede gestritten hätte.
  
  Gli scienziati stanno tentando di *impedire* che la malattia si diffonda nel laboratorio.
  Die Wissenschaftler versuchen zu verhindern, dass sich die Krankheit im Labor ausbreitet.
