Rang: 1419
Wort: corte
Wortart: n.f
Wort mit Artikel: la corte
Femininum / Plural: corti
IPA: ''
Definition: der Hof, -¨e
Register: ''
Beispielsätze: |-
  Il sindaco ha organizzato una festa nella *corte* del municipio per celebrare la vittoria delle elezioni.
  Der Bürgermeister hat ein Fest auf dem *Hof* des Rathauses organisiert, um den Wahlsieg zu feiern.
  
  Mentre passeggiavamo per il centro, abbiamo incrociato una banda di ragazzini che suonava nella *corte* di una scuola.
  Während wir durch die Innenstadt spazierten, begegneten wir einer Gruppe Jugendlicher, die auf dem *Hof* einer Schule spielten.
  
  Ho trovato la valigia proprio nella *corte* della casa dove ho trascorso la domenica scorsa.
  Ich habe den Koffer genau in dem *Hof* des Hauses gefunden, wo ich letzten Sonntag verbracht habe.
  
  Se non chiudi la porta della *corte*, il cane scapperà in giardino e distruggerà le piante.
  Wenn du die Tür des *Hofes* nicht schließt, wird der Hund in den Garten laufen und die Pflanzen zerstören.
  
  Dicono che la *corte* dei federali sia un luogo freddo e isolato, dove nessuno vuole finire.
  Man sagt, der *Hof* der Bundesbeamten sei ein kalter und isolierter Ort, an den niemand gelangen möchte.
