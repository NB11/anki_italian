Rang: 2857
Wort: avviare
Wortart: v
Wort mit Artikel: avviare
Femininum / Plural: ''
IPA: ''
Definition: starten, einleiten
Register: ''
Beispielsätze: |-
  Per *avviare* il computer premi semplicemente il pulsante di accensione.
  Um den Computer zu *starten* drückst du einfach den Ein-/Ausschalter.
  
  L’ingegnere ha suggerito di *avviare* un progetto pilota per testare la nuova tecnologia.
  Der Ingenieur hat vorgeschlagen, ein Pilotprojekt zu *einleiten*, um die neue Technologie zu testen.
  
  Non riesco a capire perché non hai ancora *avviato* la lavatrice!
  Ich verstehe nicht, warum du die Waschmaschine noch nicht *gestartet* hast!
  
  Se *avviassi* le pratiche ora, potremmo concludere tutto entro la settimana.
  Wenn du die Formalitäten jetzt *einleiten* würdest, könnten wir alles bis Ende der Woche abschließen.
  
  Non appena il direttore *avvierà* la riunione, ci spiegherà le nuove strategie aziendali.
  Sobald der Direktor die Sitzung *startet*, wird er uns die neuen Unternehmensstrategien erklären.
