Rang: 4671
Wort: equazione
Wortart: n.f
Wort mit Artikel: l'equazione
Femininum / Plural: equazioni
IPA: ''
Definition: die Gleichung, -en
Register: ''
Beispielsätze: |-
  Nonostante abbia provato per ore, non riesco ancora a risolvere questa *equazione* matematica.
  Trotz stundenlanger Versuche kann ich diese *Gleichung* immer noch nicht lösen.
  
  Nella relazione finale, il professore ha sottolineato che la *equazione* di stato è fondamentale per la termodinamica.
  In dem Abschlussbericht betonte der Professor, dass die *Gleichung* des Zustands für die Thermodynamik grundlegend ist.
  
  Avresti mai pensato che un problema di fisica potesse ridursi a una semplice *equazione* lineare?
  Hättest du je gedacht, dass ein Physikproblem auf eine einfache *lineare Gleichung* reduziert werden kann?
  
  L’ingegnere ha spiegato che, se modificassimo un solo parametro, l’intera *equazione* perderebbe di validità.
  Der Ingenieur erklärte, dass die gesamte *Gleichung* ihre Gültigkeit verlöre, wenn man nur einen einzigen Parameter ändere.
  
  Dopo aver letto il libro, mi è chiaro come la *equazione* di Schrödinger rivoluzionò la fisica quantistica.
  Nach der Lektüre des Buches ist mir klar, wie die *Schrödingergleichung* die Quantenphysik revolutionierte.
