Rang: 4984
Wort: frigorifero
Wortart: n.m
Wort mit Artikel: il frigorifero
Femininum / Plural: frigoriferi
IPA: ''
Definition: der Kühlschrank, -schränke
Register: ''
Beispielsätze: |-
  Ho comprato un *frigorifero* nuovo ieri perché quello vecchio non raffredda più abbastanza.
  Ich habe gestern einen *Kühlschrank* gekauft, weil der alte nicht mehr genügend kühlt.
  
  Non aprire lo sportello del *frigorifero* ogni cinque minuti, altrimenti la temperatura interna non si stabilizza!
  Öffne nicht alle fünf Minuten die *Kühlschrank*tür, sonst stabilisiert sich die Innentemperatur nicht!
  
  Mi hai detto che volevi sistemare il *frigorifero* ma è ancora lì in cucina, disconnesso!
  Du hast gesagt, du würdest den *Kühlschrank* reparieren, aber er steht noch unangeschlossen in der Küche!
  
  Nel caso trovassi qualcosa di interessante nel *frigorifero*, fammi sapere immediatamente!
  Falls du etwas Interessantes im *Kühlschrank* findest, lass es mich sofort wissen!
  
  Quando si rompe il *frigorifero*, l’intero appartamento puzza di cibo andato a male.
  Wenn der *Kühlschrank* kaputtgeht, stinkt die ganze Wohnung nach verdorbenem Essen.
