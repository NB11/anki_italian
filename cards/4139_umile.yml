Rang: 4139
Wort: umile
Wortart: adj
Wort mit Artikel: umile
Femininum / Plural: ''
IPA: ''
Definition: bescheiden, demütig
Register: ''
Beispielsätze: |-
  Nonostante il suo successo, rimane una persona *umile* e accessibile a tutti.
  Trotz seines Erfolgs bleibt er ein *bescheidener* und für alle zugänglicher Mensch.
  
  Credo che la sua risposta fosse *umile* ma allo stesso tempo molto saggia.
  Ich glaube, dass seine Antwort *demütig*, aber gleichzeitig sehr weise war.
  
  Se fossi stato più *umile*, non avresti fatto tanti errori.
  Wärst du *demütiger* gewesen, hättest du nicht so viele Fehler gemacht.
  
  È così *umile* che non si vanta mai dei suoi successi, anche grandi.
  Er ist so *bescheiden*, dass er sich nie seiner Erfolge rühmt, selbst großer.
  
  Penso che sia *umile* abbastanza da accettare critiche costruttive.
  Ich denke, er ist *bescheiden* genug, um konstruktive Kritik anzunehmen.
