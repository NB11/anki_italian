Rang: 3732
Wort: manicomio
Wortart: n.m
Wort mit Artikel: il manicomio
Femininum / Plural: manicomi
IPA: ''
Definition: die Irrenanstalt, -en
Register: ''
Beispielsätze: |-
  Dopo la guerra molti soldati finirono nel *manicomio* per le loro ferite mentali.
  Nach dem Krieg landeten viele Soldaten im *Irrenhaus* wegen ihrer seelischen Wunden.
  
  Il *manicomio* di quella città era noto per il suo approccio innovativo, ma anche per i suoi metodi discutibili.
  Die *Irrenanstalt* dieser Stadt war für ihren innovativen Ansatz bekannt, aber auch für ihre fragwürdigen Methoden.
  
  Hai mai visitato un *manicomio* abbandonato? È un’esperienza inquietante.
  Hast du schon mal eine verlassene *Irrenanstalt* besucht? Das ist ein beunruhigendes Erlebnis.
  
  L’infermiera disse che il comportamento del paziente avrebbe potuto portare direttamente nel *manicomio*.
  Die Krankenschwester sagte, das Verhalten des Patienten könnte ihn direkt ins *Irrenhaus* bringen.
  
  Nel *manicomio* non tutti i pazienti erano lì volontariamente: alcuni erano stati rinchiusi contro la loro volontà.
  In der *Irrenanstalt* waren nicht alle Patienten freiwillig dort: Einige waren gegen ihren Willen eingesperrt worden.
