Rang: 1224
Wort: pista
Wortart: n.f
Wort mit Artikel: la pista
Femininum / Plural: piste
IPA: ''
Definition: die Spur, -en, die Bahn, -en, die Piste, -n
Register: ''
Beispielsätze: |-
  Dopo la pioggia, *piste* di pneumatici erano visibili sulla strada.
  Nach dem Regen waren *Spuren* von Reifen auf der Straße sichtbar.
  
  In montagna, la *pista* da sci è ancora chiusa per valanga.
  Im Gebirge ist die *Piste* aus Sicherheitsgründen noch gesperrt.
  
  Non appena ho sentito le sue parole, ho capito che si trattava di *piste* sbagliate.
  Sobald ich seine Worte hörte, wusste ich, dass es sich um *falsche Spuren* handelte.
  
  La polizia ha ritrovato *piste* di sangue vicino al bosco, ma non ha ancora trovato il colpevole.
  Die Polizei hat *Blutspuren* in der Nähe des Waldes gefunden, aber den Täter noch nicht ermittelt.
  
  Durante la corsa, l’atleta ha perso il controllo e ha seguito una *pista* completamente diversa da quella prevista.
  Während des Rennens verlor der Athlet die Kontrolle und nahm eine *völlig andere Bahn* als die geplante.
