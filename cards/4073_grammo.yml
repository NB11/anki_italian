Beispielsätze: |-
  Questa ricetta richiede solo tre *grammi* di cannella.
  Dieses Rezept benötigt nur drei *Gramm* Zimt.
  
  Ho pesato esattamente cento *grammi* di farina per la torta.
  Ich habe genau hundert *Gramm* Mehl für den Kuchen abgewogen.
  
  Nel pacchetto ci sono venti *grammi* di zucchero in più rispetto a quanto dichiarato.
  In der Packung sind zwanzig *Gramm* Zucker mehr enthalten, als angegeben.
  
  Per preparare il dolce, ti servono almeno due etti e mezzo, cioè duecentocinquanta *grammi*.
  Um den Kuchen zuzubereiten, brauchst du mindestens zweihundertfünfzig *Gramm*.
  
  Nonostante abbia aggiunto mezzo *grammo* di sale, il sapore rimane troppo blando.
  Obwohl ich einen halben *Gramm* Salz hinzugefügt habe, schmeckt es immer noch zu fade.
