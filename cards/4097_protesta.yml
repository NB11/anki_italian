Rang: 4097
Wort: protesta
Wortart: n.f
Wort mit Artikel: la protesta
Femininum / Plural: proteste
IPA: ''
Definition: die Proteste
Register: ''
Beispielsätze: |-
  La *protesta* degli studenti contro le tasse universitarie è scoppiata improvvisamente.
  Die *Proteste* der Studenten gegen die Studiengebühren brachen plötzlich aus.
  
  Se non ci fosse stata la tua *protesta*, forse la legge sarebbe passata senza ostacoli.
  Wenn es deinen *Protest* nicht gegeben hätte, wäre das Gesetz vielleicht ohne Hindernisse durchgekommen.
  
  I cittadini aspettano da mesi una *protesta* più efficace contro l’aumento delle tariffe elettriche.
  Die Bürger warten seit Monaten auf einen wirksameren *Protest* gegen die Erhöhung der Stromtarife.
  
  Nonostante la violenza della *protesta*, le autorità hanno mantenuto un atteggiamento paziente.
  Trotz der Gewalt des *Protests* behielten die Behörden eine geduldige Haltung bei.
  
  Non mi stupirei se scoppiasse una nuova *protesta* domani, vista la situazione economica.
  Ich würde mich nicht wundern, wenn morgen ein neuer *Protest* ausbräche, angesichts der wirtschaftlichen Lage.
