Rang: 3724
Wort: dirigente
Wortart: n.m
Wort mit Artikel: il dirigente
Femininum / Plural: dirigenti
IPA: ''
Definition: der Leiter, der Manager
Register: ''
Beispielsätze: |-
  Il *dirigente* ha approvato il progetto dopo una lunga discussione.
  Der *Leiter* hat das Projekt nach einer langen Diskussion genehmigt.
  
  Non tutte le decisioni del *dirigente* erano state comprese dai dipendenti.
  Nicht alle Entscheidungen des *Managers* wurden von den Mitarbeitern verstanden.
  
  Se fossi *dirigente*, darei più tempo ai dipendenti per i progetti personali.
  Wenn ich *Leiter* wäre, würde ich den Mitarbeitern mehr Zeit für persönliche Projekte geben.
  
  Il *dirigente* che abbiamo incontrato ieri dirige una delle aziende più innovative d'Italia.
  Der *Manager*, den wir gestern getroffen haben, leitet eines der innovativsten Unternehmen Italiens.
  
  Credo che sarebbe un *dirigente* eccezionale, se decidesse di candidarsi alle elezioni.
  Ich glaube, er wäre ein *außergewöhnlicher Manager*, wenn er sich zur Wahl stellen würde.
