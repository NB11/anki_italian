Rang: 4695
Wort: lavandino
Wortart: n.m
Wort mit Artikel: il lavandino
Femininum / Plural: lavandini
IPA: ''
Definition: das Waschbecken, -
Register: ''
Beispielsätze: |-
  Nel bagno della mia nuova casa c'è *un lavandino* con due rubinetti, uno per l'acqua calda e uno per quella fredda.
  Im Bad meines neuen Hauses gibt es ein *Waschbecken* mit zwei Wasserhähnen, einem für heißes und einem für kaltes Wasser.
  
  Non riesco a trovare il detergente per *il lavandino* che ho appena comprato: hai un'idea dove potrebbe essere?
  Ich finde das Reinigungsmittel für das *Waschbecken* nicht, das ich gerade gekauft habe – hast du eine Ahnung, wo es sein könnte?
  
  Dopo aver montato *il lavandino* da solo, mi sono accorto che il sifone perdeva e ho dovuto chiamare un idraulico.
  Nachdem ich das *Waschbecken* selbst montiert hatte, stellte ich fest, dass der Siphon undicht war, und musste einen Klempner rufen.
  
  Spero che domani arrivi l'idraulico per sistemare anche *il lavandino* della cucina, che gorgoglia in modo preoccupante.
  Ich hoffe, dass morgen der Klempner kommt, um auch das *Waschbecken* in der Küche zu reparieren, das besorgniserregend gluckert.
  
  Se avessi più spazio, sostituirei *il lavandino* con uno più largo, così potrei lavarci anche le pentole più grandi senza problemi.
  Wenn ich mehr Platz hätte, würde ich das *Waschbecken* durch ein breiteres ersetzen, sodass ich auch größere Töpfe problemlos darin waschen könnte.
