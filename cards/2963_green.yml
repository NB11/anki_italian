Rang: 2963
Wort: green
Wortart: n.m
Wort mit Artikel: il green
Femininum / Plural: i verdi
IPA: ''
Definition: das *Grün*, -
Register: ''
Beispielsätze: |-
  Il colore *verde* è associato alla natura e alla primavera.
  Die Farbe *grün* ist mit Natur und Frühling verbunden.
  
  Vedi quel vestito di *verde* che indossa tua sorella?
  Siehst du das *grüne* Kleid, das deine Schwester trägt?
  
  Nonostante il *verde* predominante nel bosco, ho trovato un fiore blu raro.
  Trotz des vorherrschenden *Grüns* im Wald fand ich eine seltene blaue Blume.
  
  Se avessi un giardino, vorrei piantare solo alberi a foglie *verdi* tutto l’anno.
  Wenn ich einen Garten hätte, würde ich nur das ganze Jahr über Blätter in *grün* pflanzen.
  
  Il pittore ha usato diversi toni di *verde* per rappresentare il paesaggio collinare.
  Der Maler hat verschiedene *Grüntöne* verwendet, um die Hügellandschaft darzustellen.
