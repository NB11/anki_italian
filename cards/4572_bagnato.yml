Rang: 4572
Wort: bagnato
Wortart: adj
Wort mit Artikel: bagnato
Femininum / Plural: ''
IPA: ''
Definition: nass, feucht, durchnässt
Register: ''
Beispielsätze: |-
  Dopo il temporale, il marciapiede era *bagnato* e scivoloso.
  Nach dem Unwetter war der *nasse* Gehweg rutschig.
  
  Mi sono accorto che la mia camicia era *bagnata* solo quando ho aperto la valigia.
  Ich bemerkte erst, als ich den Koffer öffnete, dass mein Hemd *durchnässt* war.
  
  Se non chiudi la finestra, la stanza rimarrà sempre *bagnata* e fredda.
  Wenn du das Fenster nicht schließt, bleibt der Raum immer *feucht* und kalt.
  
  Devi asciugare i piatti prima che l'aria li renda di nuovo *bagnati*.
  Du musst das Geschirr trocknen, bevor die Luft es wieder *nass* macht.
  
  Nonostante la pioggia, l'artista riuscì a dipingere un paesaggio *bagnato* con dettagli straordinari.
  Obwohl es regnete, gelang es dem Künstler, eine *feuchte* Landschaft mit außergewöhnlichen Details zu malen.
