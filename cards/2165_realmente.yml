Wort mit Artikel: realmente
Femininum / Plural: ''
IPA: ''
Definition: wirklich, tatsächlich
Register: ''
Beispielsätze: |-
  Non è *realmente* colpa tua se hai perso quel documento importante.
  Es ist nicht *wirklich* deine Schuld, dass du jenes wichtige Dokument verloren hast.
  
