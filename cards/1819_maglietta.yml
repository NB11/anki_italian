Rang: 1819
Wort: maglietta
Wortart: n.f
Wort mit Artikel: la maglietta
Femininum / Plural: magliette
IPA: ''
Definition: das T-Shirt, -s
Register: ''
Beispielsätze: |-
  La *maglietta* che hai comprato ieri è molto bella.
  Das T-Shirt, das du gestern gekauft hast, ist sehr schön.
  
  Dove hai messo quella *maglietta* rossa con la scritta?
  Wo hast du das rote *T-Shirt* mit der Aufschrift hingelegt?
  
  Mi piacerebbe regalargli una *maglietta* con il logo della sua band preferita.
  Ich würde ihm gerne ein *T-Shirt* mit dem Logo seiner Lieblingsband schenken.
  
  Se la *maglietta* ti sta larga, possiamo andare a cambiarla al negozio.
  Wenn dir das *T-Shirt* zu weit ist, können wir es im Laden umtauschen.
  
  Ho visto in vetrina una *maglietta* che mi piace, ma costa troppo.
  Ich habe in der Auslage ein *T-Shirt* gesehen, das mir gefällt, aber es ist zu teuer.
