Rang: 2462
Wort: licenza
Wortart: n.f
Wort mit Artikel: la licenza
Femininum / Plural: licenze
IPA: ''
Definition: die Erlaubnis, -se
Register: ''
Beispielsätze: |-
  Non puoi usare questa sala senza *licenza* del direttore.
  Du kannst diesen Raum nicht ohne *Erlaubnis* des Direktors nutzen.
  
  La *licenza* di caccia scade tra due settimane, ricordatelo!
  Die *Jagdgenehmigung* läuft in zwei Wochen ab, denk daran!
  
  Se avessi avuto la *licenza* prima, avrei potuto aprire il negozio già l'anno scorso.
  Wenn ich diese *Genehmigung* früher gehabt hätte, hätte ich das Geschäft schon letztes Jahr eröffnen können.
  
  Senza *licenza* adeguata, non potremmo produrre questo tipo di sostanza in laboratorio.
  Ohne die passende *Genehmigung* könnten wir diese Art von Stoff im Labor nicht herstellen.
  
  Il giudice gli ha revocato la *licenza* perché ha infranto tutte le regole.
  Der Richter hat ihm die *Fahrerlaubnis* entzogen, weil er alle Regeln gebrochen hat.
