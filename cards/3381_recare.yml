Rang: 3381
Wort: recare
Wortart: v
Wort mit Artikel: recare
Femininum / Plural: ''
IPA: ''
Definition: bringen, verursachen, schaden
Register: ''
Beispielsätze: |-
  Se *recate* danno alla salute, dovreste smettere immediatamente.
  Wenn Sie der Gesundheit *Schaden* zufügen, sollten Sie sofort aufhören.
  
  Il medico ha spiegato che lo stress può *recare* seri problemi al cuore.
  Der Arzt erklärte, dass Stress dem Herz *ernsthafte* Probleme bringen kann.
  
  Non volevo *recare* disturbo, ma ho dovuto chiedere aiuto.
  Ich wollte keine *Störung* verursachen, aber ich musste um Hilfe bitten.
  
  Secondo la legge, chi *recasse* danni al patrimonio pubblico sarà punito severamente.
  Laut Gesetz wird bestraft, wer dem öffentlichen Eigentum *Schaden* zufügt.
  
  Se non stai attento, potresti *recare* danni irreparabili all’ambiente.
  Wenn du nicht aufpasst, könntest du der Umwelt *unwiederbringlichen Schaden* zufügen.
