Rang: 4173
Wort: prescrivere
Wortart: v
Wort mit Artikel: prescrivere
Femininum / Plural: ''
IPA: ''
Definition: verschreiben, anordnen
Register: ''
Beispielsätze: |-
  Il medico gli *prescrive* una dieta rigorosa dopo l'operazione.
  Der Arzt *verschreibt* ihm eine strikte Diät nach der Operation.
  
  Se avessi avuto più tempo, ti *avrei prescritto* un esame più approfondito.
  Hätte ich mehr Zeit gehabt, *hätte ich dir* eine gründlichere Untersuchung verschrieben.
  
  È fondamentale che il dottore *prescriva* i farmaci con attenzione.
  Es ist wichtig, dass der Arzt die Medikamente mit Bedacht *anordnet*.
  
  Hanno *prescritto* una terapia che sembra funzionare molto bene.
  Sie haben eine Therapie *verschrieben*, die sehr gut zu wirken scheint.
  
  Non *prescrivo* mai medicine senza prima aver parlato con il paziente.
  Ich *verschreibe* niemals Medikamente, ohne vorher mit dem Patienten gesprochen zu haben.
