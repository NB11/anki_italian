Rang: 2167
Wort: pisciare
Wortart: vi
Wort mit Artikel: pisciare
Femininum / Plural: ''
IPA: ''
Definition: pinkeln, urinieren
Register: ''
Beispielsätze: |-
  Non *pisciava* mai prima di uscire di casa, quindi arrivò in ritardo al colloquio.
  Er *pisste* nie vor dem Verlassen des Hauses, deshalb kam er zu spät zum Vorstellungsgespräch.
  
  Nonostante il mal di stomaco, riuscì a *pisciare* prima della partenza della truppa.
  Trotz der Magenschmerzen schaffte er es, *zu pinkeln*, bevor die Truppe abfuhr.
  
  Se *pissassi* in quella vasca, il proprietario chiamerebbe la polizia!
  Wenn du in diese Badewanne *pinkelst*, ruft der Besitzer die Polizei an!
  
  Il cane ha *pissato* su ogni albero del parco, lasciando una traccia chiara.
  Der Hund hat an jeden Baum im Park *gepisst*, eine klare Spur hinterlassend.
  
  Mi dispiace, ma qui il *pisciare* è severamente vietato, come indicato dal cartello.
  Es tut mir leid, aber hier ist das *Pinkeln* streng verboten, wie das Schild anzeigt.
