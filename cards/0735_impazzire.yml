Rang: 735
Wort: impazzire
Wortart: vi
Wort mit Artikel: impazzire
Femininum / Plural: ''
IPA: ''
Definition: verrückt werden, den Verstand verlieren
Register: ''
Beispielsätze: |-
  Dopo aver visto quel *impazzito*, ho capito che non era normale.
  Nachdem ich *den Verstand verloren* habe, habe ich verstanden, dass er nicht normal war.
  
  Se continui a gridare, finirà per *impazzire* del tutto!
  Wenn du weiter schreist, wird er *den Verstand komplett verlieren*!
  
  Marco è *impazzito* dalla gioia quando ha vinto la partita.
  Marco war *vor Freude völlig außer sich*, als er das Spiel gewonnen hatte.
  
  Credo che stia per *impazzire* se non gli diciamo la verità.
  Ich glaube, er wird *den Verstand verlieren*, wenn wir ihm nicht die Wahrheit sagen.
  
  Mentre ballava in sala, ho visto che per poco non *impazziva* per l’euforia.
  Während er in *dem Saal* tanzte, sah ich, wie er fast vor Begeisterung den Verstand verlor.
Audio: ''
Notiz: ''
