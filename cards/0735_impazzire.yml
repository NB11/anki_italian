Rang: 735
Wort: impazzire
Wortart: vi
Wort mit Artikel: impazzire
Femininum / Plural: ''
IPA: ''
Definition: wahnsinnig werden, verrückt werden
Register: ''
Beispielsätze: |-
  Non *impazzire* per una cosa del genere, è solo un piccolo problema.
  Werde doch nicht *verrückt* wegen so einer Kleinigkeit, es ist doch nur ein kleines Problem.
  
  *Impazzirò* se non smetti di fare rumore!
  Ich *werde wahnsinnig*, wenn du nicht aufhörst mit dem Lärm!
  
  Stavo per *impazzire* quando ho perso il treno.
  Ich wäre fast *wahnsinnig geworden*, als ich den Zug verpasst habe.
  
  Se continui così, *impazziranno* tutti in questa stanza.
  Wenn du so weitermachst, werden hier *alle verrückt*.
  
  Vorrei che non *impazzisse* ogni volta che la situazione si complica.
  Ich wünschte, er würde nicht *wann immer die Situation komplizierter wird*.
