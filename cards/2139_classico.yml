Wort: classico
Wortart: adj
Wort mit Artikel: classico
Femininum / Plural: ''
IPA: ''
Definition: klassisch, traditionell, üblich
Register: ''
Beispielsätze: |-
  Questo è un film *classico* del cinema italiano degli anni '60.
  Das ist ein *klassischer* Film des italienischen Kinos der 1960er Jahre.
  
  Non mi piacciono i gusti *classici* di gelato, preferisco quelli innovativi.
  Ich mag keine *klassischen* Eissorten, ich bevorzuge innovative.
  
  La ricetta *classica* della lasagna prevede la besciamella, ma alcune versioni moderne la sostituiscono.
  Das *klassische* Lasagne-Rezept sieht Béchamelsauce vor, aber einige moderne Varianten ersetzen sie.
  
  Ho letto un romanzo *classico* di Manzoni che mi ha affascinato con le sue descrizioni storiche.
  Ich habe einen *klassischen* Roman von Manzoni gelesen, der mich mit seinen historischen Beschreibungen fasziniert hat.
  
  La musica *classica* ha sempre il potere di trasmettere emozioni profonde in modo immediato.
  Die *klassische* Musik hat immer die Kraft, tiefe Emotionen auf unmittelbare Weise zu vermitteln.
