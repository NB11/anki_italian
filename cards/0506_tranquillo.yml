Rang: 506
Wort: tranquillo
Wortart: adj
Wort mit Artikel: tranquillo
Femininum / Plural: ''
IPA: ''
Definition: ruhig, still, leise
Register: ''
Beispielsätze: |-
  Dopo una *tranquilla* giornata di lavoro, mi sono rilassato sul divano.
  Nach einem *ruhigen* Arbeitstag habe ich mich auf dem Sofa entspannt.
  
  Vorrei un posto un po’ più *tranquillo* per leggere questo libro.
  Ich hätte gern einen etwas *ruhigeren* Platz, um dieses Buch zu lesen.
  
  Se fossi stato *tranquillo*, non avresti fatto questo errore!
  Wärst du *ruhig* geblieben, hättest du diesen Fehler nicht gemacht!
  
  Nonostante la confusione, lei rimase *tranquilla* e continuò a lavorare.
  Trotz des Lärms blieb sie *ruhig* und arbeitete weiter.
  
  È necessario che tu rimanga *tranquillo* anche sotto pressione.
  Es ist notwendig, dass du auch unter Druck *ruhig* bleibst.
