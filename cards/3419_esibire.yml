Rang: 3419
Wort: esibire
Wortart: vt
Wort mit Artikel: esibire
Femininum / Plural: ''
IPA: ''
Definition: zeigen, vorführen, zur Schau stellen
Register: ''
Beispielsätze: |-
  L’artista decide di *esibire* le sue opere in una galleria del centro.
  Der Künstler entscheidet sich, seine Werke in einer *Galerie* im Zentrum zu zeigen.
  
  Durante il torneo, ogni squadra dovrà *esibire* il proprio livello tecnico.
  Während des *Turniers* muss jede Mannschaft ihr technisches Niveau vorführen.
  
  Non volevo *esibire* la mia ignoranza in materia, per questo ho tacuto.
  Ich wollte meine Unwissenheit auf dem Gebiet nicht *zur Schau stellen*, deshalb habe ich geschwiegen.
  
  Ha *esibito* una pazienza straordinaria nonostante le critiche feroci.
  Er hat eine außergewöhnliche *Geduld* vorgeführt, trotz der scharfen Kritik.
  
  Se avessi saputo che avrebbe *esibito* il suo talento così apertamente, non sarei venuto.
  Wenn ich gewusst hätte, dass er sein *Talent* so offen zur Schau stellen würde, wäre ich nicht gekommen.
