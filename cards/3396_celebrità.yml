Rang: 3396
Wort: celebrità
Wortart: n.f/m
Wort mit Artikel: la celebrità
Femininum / Plural: celebrità
IPA: ''
Definition: der Prominente, der Star, -s
Register: ''
Beispielsätze: |-
  In Italia, la *celebrità* spesso partecipa a programmi televisivi famosi.
  In Italien nimmt der *Prominente* oft an bekannten Fernsehsendungen teil.
  
  Nonostante la sua *celebrità*, non ama farsi fotografare.
  Trotz seines *Ruhms* lässt er sich nicht gern fotografieren.
  
  Se avessi la sua *celebrità*, userei il potere per aiutare gli altri.
  Wenn ich seinen *Starstatus* hätte, würde ich meine Macht nutzen, um anderen zu helfen.
  
  È raro che una *celebrità* possa avere una vita privata completamente normale.
  Es ist selten, dass ein *Prominenter* ein völlig normales Privatleben führen kann.
  
  Anche dopo anni di *celebrità*, molti non si abituano alla fama.
  Selbst nach Jahren des *Ruhms* gewöhnen sich viele nicht an den Ruhm.
