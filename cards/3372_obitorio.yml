Rang: 3372
Wort: obitorio
Wortart: n.m
Wort mit Artikel: l'obitorio
Femininum / Plural: obitori
IPA: ''
Definition: die Leichenhalle, der Leichenkeller, die Pathologie
Register: ''
Beispielsätze: |-
  Dopo l'autopsia, il medico ha portato il cadavere nell'*obitorio* per ulteriori analisi.
  Nach der Obduktion hat der Arzt die Leiche in die *Leichenhalle* für weitere Untersuchungen gebracht.
  
  Non appena hanno trovato il corpo, lo hanno subito trasferito nell'*obitorio* della città più vicina.
  Sobald sie die Leiche gefunden hatten, haben sie sie sofort in die nächstgelegene *Pathologie* gebracht.
  
  Se vuoi sapere come funziona un *obitorio*, dovresti chiedere a un medico legale.
  Wenn du wissen möchtest, wie eine *Leichenhalle* funktioniert, solltest du einen Rechtsmediziner fragen.
  
  L'*obitorio* era freddo e silenzioso, come se il tempo si fosse fermato in quel luogo.
  Die *Leichenhalle* war kalt und still, als wäre die Zeit in diesem Ort stehengeblieben.
  
  Hanno chiuso l'*obitorio* per una settimana per lavori di ristrutturazione.
  Sie haben die *Pathologie* für eine Woche wegen Renovierungsarbeiten geschlossen.
