Rang: 3847
Wort: improvvisare
Wortart: v
Wort mit Artikel: improvvisare
Femininum / Plural: ''
IPA: ''
Definition: improvisieren
Register: ''
Beispielsätze: |-
  Il musicista ha *improvvisato* una melodia bellissima con il suo violino.
  Der Musiker hat eine wunderschöne Melodie *improvisiert*.
  
  Dato che non aveva la ricetta, ha dovuto *improvvisare* per la cena.
  Da er das Rezept nicht hatte, musste er für das Abendessen *improvisieren*.
  
  Se non avessi preparato nulla, avrei *improvvisato* qualcosa all'ultimo momento.
  Wenn ich nichts vorbereitet hätte, hätte ich etwas im letzten Moment *improvisiert*.
  
  Nonostante il caos, il regista riuscì a *improvvisare* una scena credibile.
  Trotz des Chaos gelang es dem Regisseur, eine glaubwürdige Szene zu *improvisieren*.
  
  Prima della prova generale, dovrai *improvvisare* la parte che non hai memorizzato.
  Vor der Generalprobe wirst du den Teil, den du nicht auswendig gelernt hast, *improvisieren* müssen.
