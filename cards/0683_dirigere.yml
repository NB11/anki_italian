Rang: 683
Wort: dirigere
Wortart: vt
Wort mit Artikel: dirigere
Femininum / Plural: ''
IPA: ''
Definition: leiten, führen, lenken, regieren
Register: ''
Beispielsätze: |-
  Il direttore vuole *dirigere* la nuova musica per il teatro.
  Der Regisseur will die neue *Musik* für das Theater leiten.
  
  Ovviamente, senza una decisione chiara non puoi *dirigere* un progetto così grande.
  Offensichtlich kannst du ohne eine klare *Entscheidung* ein solch großes Projekt nicht leiten.
  
  Ho visto che il poliziotto cerca di *dirigere* il traffico nella zona trafficata.
  Ich habe gesehen, dass der Polizist versucht, den Verkehr in der *Zone* zu lenken.
  
  Se avessi più esperienza, potresti *dirigere* questa azienda al posto mio.
  Wenn du mehr Erfahrung hättest, könntest du diese Firma an meiner Stelle leiten.
  
  Il professore ha spiegato che un buon leader sa *dirigere* la classe senza gridare.
  Der Professor hat erklärt, dass ein guter Lehrer die Klasse leiten kann, ohne zu schreien.
