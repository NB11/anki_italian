Rang: 683
Wort: dirigere
Wortart: vt
Wort mit Artikel: dirigere
Femininum / Plural: ''
IPA: ''
Definition: leiten, führen, dirigieren
Register: ''
Beispielsätze: |-
  Il professor Rossi *dirige* l'orchestra con grande passione.
  Professor Rossi *leitet* das Orchester mit großer Leidenschaft.
  
  Chi *dirigerà* la riunione domani?
  Wer *wird* die Besprechung *leiten* morgen?
  
  Avrei voluto *dirigere* un grande coro, ma non ne ho avuto l'occasione.
  Ich hätte gerne einen großen Chor *geleitet*, aber ich hatte nie die Gelegenheit dazu.
  
  Stanno cercando qualcuno che sappia *dirigere* un progetto così complesso.
  Sie suchen jemanden, der ein so komplexes Projekt *leiten* kann.
  
  È importante *dirigere* le energie verso obiettivi costruttivi.
  Es ist wichtig, die Energien auf konstruktive Ziele *zu lenken*.
