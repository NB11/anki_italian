Rang: 3684
Wort: dedurre
Wortart: vt
Wort mit Artikel: dedurre
Femininum / Plural: ''
IPA: ''
Definition: ableiten, schließen
Register: ''
Beispielsätze: |-
  Dai dati disponibili possiamo *dedurre* che la situazione sta migliorando.
  Aus den verfügbaren Daten können wir *schlussfolgern*, dass sich die Situation verbessert.
  
  Se analizzo bene le prove, riesco a *dedurre* chi sia il colpevole.
  Wenn ich die Beweise gut analysiere, kann ich *ermitteln*, wer der Täter ist.
  
  È necessario *dedurre* le tasse dal reddito lordo.
  Man muss die Steuern vom Bruttoeinkommen *abziehen*.
  
  Nessuno riuscì a *dedurre* nulla dal suo discorso vago.
  Niemand konnte aus seiner *ungenaue*n Rede irgendetwas ableiten.
  
  Gli investigatori hanno *dedotto* che l’omicidio fosse premeditato.
  Die Ermittler haben *geschlossen*, dass der Mord geplant war.
