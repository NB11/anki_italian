Rang: 3364
Wort: calcolare
Wortart: v
Wort mit Artikel: calcolare
Femininum / Plural: ''
IPA: ''
Definition: berechnen, errechnen, ausrechnen
Register: ''
Beispielsätze: |-
  Devi *calcolare* il risultato prima di presentare il compito al professore.
  Du musst das *Ergebnis berechnen*, bevor du die Aufgabe dem Professor präsentierst.
  
  La banca ci ha aiutati a *calcolare* il mutuo mensile.
  Die Bank hat uns geholfen, die monatliche *Rate zu berechnen*.
  
  Se avessi *calcolato* meglio i tempi, non avresti perso l’aereo.
  Hättest du die Zeiten besser *berechnet*, hättest du das Flugzeug nicht verpasst.
  
  Gli scienziati stanno cercando di *calcolare* l’impatto della gravità sul movimento dei pianeti.
  Die Wissenschaftler versuchen, den Einfluss der *Gravitation auf die Planetenbewegung zu berechnen*.
  
  Mi hanno detto che non posso sapere con precisione quanti litri di acqua *calcoleranno* per irrigare tutto il campo.
  Man hat mir gesagt, ich könne nicht genau wissen, wie viele Liter Wasser sie *bewässern werden*.
