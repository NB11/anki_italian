Rang: 938
Wort: episodio
Wortart: n.m
Wort mit Artikel: l'episodio
Femininum / Plural: episodi
IPA: ''
Definition: die Folge, -n, die Episode
Register: ''
Beispielsätze: |-
  Il terzo *episodio* della serie è ancora più avvincente del primo.
  Die dritte *Folge* der Serie ist noch spannender als die erste.
  
  Non capisco perché hai saltato questo *episodio*: era il migliore!
  Ich verstehe nicht, warum du diese *Episode* übersprungen hast: sie war die beste!
  
  Se avessimo seguito le istruzioni, avremmo risolto il caso nel quarto *episodio* invece che nell'ottavo.
  Wenn wir den Anweisungen gefolgt wären, hätten wir den Fall in der vierten *Folge* und nicht in der achten gelöst.
  
  Mi ricorda un *episodio* di quando ero malato e dovevo riposare in hotel per settimane.
  Das erinnert mich an eine *Episode*, als ich krank war und wochenlang in einem Hotel ausruhen musste.
  
  Naturalmente, non è colpa tua se l'*episodio* con il cadavere nel edificio chiuso è stato così orribile.
  Selbstverständlich trägst nicht du die Schuld daran, dass die *Episode* mit der Leiche im geschlossenen Gebäude so schrecklich war.
