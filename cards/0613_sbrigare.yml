Rang: 613
Wort: sbrigare
Wortart: vt
Wort mit Artikel: sbrigare
Femininum / Plural: ''
IPA: ''
Definition: erledigen, abwickeln
Register: ''
Beispielsätze: |-
  Devo *sbrigare* questa pratica prima di uscire, altrimenti perderò il treno.
  Ich muss diese Angelegenheit *erledigen*, bevor ich ausgehe, sonst verpasse ich den Zug.
  
  Se non ti affretti, non riuscirai a *sbrigarti* prima che arrivi la chiamata.
  Wenn du dich nicht beeilst, schaffst du es nicht, dich *abzuwickeln*, bevor der Anruf kommt.
  
  Mio zio aveva promesso di *sbrigarsi* con il bagaglio, ma ha finito per dimenticare metà delle cose.
  Mein Onkel hatte versprochen, sich *schnell um das Gepäck zu kümmern*, doch am Ende vergaß er die Hälfte der Sachen.
  
  Nonostante il dolore, *sbrigò* il lavoro entro sera per non deludere il suo capo.
  Trotz des Schmerzes *erledigte* er die Arbeit bis zum Abend, um seinen Chef nicht zu enttäuschen.
  
  Quando la polizia arrivò, il criminale aveva già provato a *sbrigarsela* scappando di nascosto.
  Als die Polizei eintraf, hatte der Verbrecher schon versucht, sich durch heimliches *Abhauen* aus der Affäre zu ziehen.
