Rang: 223
Wort: chiudere
Wortart: vt
Wort mit Artikel: chiudere
Femininum / Plural: ''
IPA: ''
Definition: schließen, zumachen
Register: ''
Beispielsätze: |-
  Devo *chiudere* la porta perché fa freddo.
  Ich muss die Tür *schließen*, weil es kalt ist.
  
  *Chiudi* la finestra, per favore!
  *Schließ* bitte das Fenster!
  
  Ha *chiuso* il negozio alle 19:00.
  Er hat das Geschäft um 19 Uhr *geschlossen*.
  
  Se *chiuderai* gli occhi, non vedrai nulla.
  Wenn du die Augen *schließt*, wirst du nichts sehen.
  
  Vorrei che tu *chiudessi* la bocca.
  Ich wünschte, du würdest den Mund halten.
