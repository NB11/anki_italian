Rang: 4904
Wort: pappagallo
Wortart: n.m
Wort mit Artikel: il pappagallo
Femininum / Plural: pappagalli
IPA: ''
Definition: der Papagei, -en
Register: ''
Beispielsätze: |-
  In quella gabbia c'è *un pappagallo* che ripete tutto ciò che sente.
  In diesem Käfig gibt es *einen Papagei*, der alles wiederholt, was er hört.
  
  Vorrei comprare *un pappagallo* dal mercato, ma sono troppo rumorosi.
  Ich würde gern *einen Papagei* vom Markt kaufen, aber sie sind zu laut.
  
  Il *pappagallo* del vicino ha imparato a dire la parola 'ciao' in tre lingue diverse.
  Der *Papagei* des Nachbarn hat gelernt, das Wort 'ciao' in drei Sprachen zu sagen.
  
  Se avessi un *pappagallo*, gli insegneresti a cantare o preferiresti che parlasse?
  Wenn ich *einen Papagei* hätte, würdest du ihm beibringen zu singen oder bevorzugst du, dass er spricht?
  
  Nonostante le cure, *il pappagallo* della signora anziana è morto la scorsa settimana dopo una malattia lieve.
  Trotz der Pflege ist *der Papagei* der alten Dame letzte Woche nach einer leichten Krankheit gestorben.
