Rang: 2729
Wort: rissa
Wortart: n.f
Wort mit Artikel: la rissa
Femininum / Plural: ri*sse
IPA: ''
Definition: die Schlägerei, -en, der Streit
Register: ''
Beispielsätze: |-
  Dopo che hanno sentito le urla, sono accorsi nel corridoio per vedere chi stesse per scatenare una *rissa*.
  Nachdem sie die Schreie gehört hatten, eilten sie in den *Flur*, um zu sehen, wer den Krawall anzetteln würde.
  
  La polizia ha dovuto interrompere la *rissa* che era scoppiata durante la partita allo stadio.
  Die Polizei musste den *Zusammenstoß*, der während des Spiels im Stadion ausgebrochen war, beenden.
  
  Se avessi assistito a quella *rissa*, avrei chiamato immediatamente la polizia per evitare che degenerasse.
  Hätte ich diesen *Handgemenge* mitbekommen, hätte ich sofort die Polizei gerufen, um zu verhindern, dass er eskaliert.
  
  Nonostante la *rissa* tra i due ragazzi, il professor Rossi ha cercato di mantenere la calma in classe.
  Trotz des *Streits* zwischen den beiden Jungen versuchte Professor Rossi, Ruhe ins Klassenzimmer zu bringen.
  
  Dicono che la *rissa* sia iniziata per un malinteso, ma nessuno sa davvero cosa sia successo.
  Man sagt, der *Handgemenge* habe mit einem Missverständnis begonnen, doch niemand weiß wirklich, was passiert ist.
