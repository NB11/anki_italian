Rang: 4999
Wort: hangar
Wortart: n.m
Wort mit Artikel: il hangar
Femininum / Plural: hangar
IPA: ''
Definition: die Halle, -n
Register: ''
Beispielsätze: |-
  Il *hangar* dell'aeroporto è enorme e può ospitare dieci aerei contemporaneamente.
  Der *Hangar* des Flughafens ist riesig und kann zehn Flugzeuge gleichzeitig aufnehmen.
  
  Hanno scelto un *hangar* abbandonato per girare il film, perché sembrava molto cinematografico.
  Sie haben einen verlassenen *Hangar* für den Film gewählt, weil er sehr filmbezogen wirkte.
  
  Dopo lo scalo, l'aereo è stato rimorchiato nel *hangar* per le riparazioni urgenti.
  Nach der Landung wurde das Flugzeug in den *Hangar* für dringende Reparaturen geschleppt.
  
  Mi piacerebbe visitare il *hangar* dove fu costruito il primo dirigibile italiano!
  Ich würde gerne den *Hangar* besichtigen, in dem das erste italienische Luftschiff gebaut wurde.
  
  Nonostante il freddo, abbiamo trascorso la notte nel *hangar* della fattoria, tra attrezzi e sacchi di granturco.
  Trotz der Kälte haben wir die Nacht im *Hangar* des Bauernhofs verbracht, zwischen Werkzeugen und Säcken mit Mais.
