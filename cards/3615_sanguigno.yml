Rang: 3615
Wort: sanguigno
Wortart: adj
Wort mit Artikel: sanguigno
Femininum / Plural: ''
IPA: ''
Definition: blutig, hitzig, temperamentvoll
Register: ''
Beispielsätze: |-
  Aveva un carattere *sanguigno* e parlava sempre a voce alta.
  Er hatte ein *temperamentvolles* Temperament und redete immer laut.
  
  La discussione divenne così *sanguigna* che dovettero intervenire.
  Die Diskussion wurde so *hitzig*, dass sie eingreifen mussten.
  
  Nonostante il suo atteggiamento *sanguigno*, sa essere anche molto gentile.
  Trotz seines *leicht aufbrausenden* Wesens kann er auch sehr liebenswert sein.
  
  La sua lettera era piena di toni *sanguigni* contro l'ingiustizia.
  Sein Brief war voller *leidenschaftlicher* Töne gegen das Unrecht.
  
  Anche nei momenti difficili manteneva un animo *sanguigno* e ottimista.
  Selbst in schwierigen Momenten bewahrte er sich eine *ungebrochene* und optimistische Seele.
