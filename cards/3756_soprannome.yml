Rang: 3756
Wort: soprannome
Wortart: n.m
Wort mit Artikel: il soprannome
Femininum / Plural: soprannomi
IPA: ''
Definition: der Spitzname, -n
Register: ''
Beispielsätze: |-
  Il suo *soprannome* tra gli amici è "Toro", perché è molto forte.
  Sein *Spitzname* unter den Freunden ist "Bulle", weil er sehr stark ist.
  
  Non sopporto quel *soprannome* che mi hanno affibbiato a scuola.
  Ich kann diesen *Spitznamen*, den sie mir in der Schule gegeben haben, nicht ertragen.
  
  Volevo chiederti: perché ti hanno dato il *soprannome* "Volpe"?
  Ich wollte dich fragen: Warum hat man dir den *Spitznamen* "Fuchs" gegeben?
  
  Quando ero piccolo, il mio *soprannome* era "Pasticcio", perché combinavo sempre guai.
  Als ich klein war, war mein *Spitzname* „Klecks", weil ich immer Unfug anstellte.
  
  Credo che abbia cambiato *soprannome* dopo essersi trasferito in un'altra città.
  Ich glaube, er hat seinen *Spitznamen* gewechselt, nachdem er in eine andere Stadt umgezogen ist.
