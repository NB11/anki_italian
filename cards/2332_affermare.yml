Rang: 2332
Wort: affermare
Wortart: vt
Wort mit Artikel: affermare
Femininum / Plural: ''
IPA: ''
Definition: behaupten, bestätigen
Register: ''
Beispielsätze: |-
  Lui *affermava* sempre di avere ragione, anche quando non era vero.
  Er *behauptete* immer, recht zu haben, selbst wenn es nicht stimmte.
  
  Nonostante le prove, il testimone continuò a *affermare* la sua versione dei fatti.
  Trotz der Beweise *behauptete* der Zeuge weiterhin seine Version der Tatsachen.
  
  Se tu *affermassi* di aver visto qualcosa, dovresti dirlo alla polizia.
  Wenn du *behaupten* würdest, etwas gesehen zu haben, müsstest du es der Polizei sagen.
  
  È importante che tu *affermi* la tua posizione con chiarezza durante l'intervista.
  Es ist wichtig, dass du deine Position bei dem Interview *bestätigst*.
  
  Dopo lunghe discussioni, riuscì a *affermare* che il progetto era fattibile.
  Nach langen Diskussionen gelang es ihm, *zu behaupten*, dass das Projekt machbar sei.
