Rang: 984
Wort: battaglia
Wortart: n.f
Wort mit Artikel: la battaglia
Femininum / Plural: battaglie
IPA: ''
Definition: die Schlacht, -n
Register: ''
Beispielsätze: |-
  La *battaglia* di Waterloo ebbe luogo nel 1815.
  Die *Schlacht* von Waterloo fand 1815 statt.
  
  Dopo che ebbero perso la *battaglia*, dovettero ritirarsi dal fronte.
  Nachdem sie die *Schlacht* verloren hatten, mussten sie sich von der Front zurückziehen.
  
  Se avessimo vinto la *battaglia*, avremmo conquistato l’intera regione.
  Wenn wir die *Schlacht* gewonnen hätten, hätten wir die gesamte Region erobert.
  
  Nonostante la loro resistenza, la *battaglia* fu persa in poche ore.
  Trotz ihres Widerstands wurde die *Schlacht* in wenigen Stunden verloren.
  
  La *battaglia* che hai visto al museo era lunga e sanguinosa.
  Die *Schlacht*, die du im Museum gesehen hast, war lang und blutig.
