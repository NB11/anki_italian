Rang: 1280
Wort: allarme
Wortart: n.m
Wort mit Artikel: l'allarme
Femininum / Plural: allarmi
IPA: ''
Definition: der Alarm, -e
Register: ''
Beispielsätze: |-
  Ho sentito *allarme* improvviso al piano di sotto.
  Ich habe den *plötzlichen Alarm* unten gehört.
  
  L'*allarme* antincendio si è acceso preciso alle 15:30.
  Der *Feueralarm* ist pünktlich um 15:30 angegangen.
  
  Chiamami non appena senti *allarme* nel vicinato!
  Ruf mich an, sobald du den *Alarm* in der Nachbarschaft hörst!
  
  Nonostante il permesso, hanno scatenato *allarme* falso.
  Trotz der *Erlaubnis* haben sie einen falschen Alarm ausgelöst.
  
  L'*allarme* non trovava altra soluzione che spegnere il motore.
  Der *Alarm* fand keine andere Lösung, als den Motor auszuschalten.
