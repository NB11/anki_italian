Rang: 3213
Wort: cognato
Wortart: n.m
Wort mit Artikel: il cognato
Femininum / Plural: cognati
IPA: ''
Definition: der Schwager, -
Register: ''
Beispielsätze: |-
  Mio *cognato* è venuto a trovarci ieri sera con sua moglie.
  Mein *Schwager* ist gestern Abend mit seiner Frau zu uns gekommen.
  
  Hai visto quel ragazzo con i baffi? È il *cognato* di Marco.
  Hast du den Jungen mit dem Schnurrbart gesehen? Das ist *Marcos Schwager*.
  
  Spero che mio *cognato* arrivi in tempo per la festa di compleanno.
  Ich hoffe, dass mein *Schwager* rechtzeitig zur Geburtstagsfeier kommt.
  
  Non sopporto più le battute del *cognato* di mia sorella, sono sempre di cattivo gusto.
  Ich halte die Witze *des Schwagers meiner Schwester* nicht mehr aus, sie sind immer geschmacklos.
  
  Se vuoi che ti aiuti con il trasloco, chiedilo direttamente al *cognato* di mio marito.
  Wenn du Hilfe beim Umzug brauchst, frag direkt *den Schwager meines Mannes*.
