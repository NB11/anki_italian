Rang: 1400
Wort: sindaco
Wortart: n.m
Wort mit Artikel: il sindaco
Femininum / Plural: sindaci
IPA: ''
Definition: der Bürgermeister, -
Register: ''
Beispielsätze: |-
  Il *sindaco* ha annunciato oggi un miracolo economico per la nostra città.
  Der *Bürgermeister* kündigte heute ein wirtschaftliches Wunder für unsere Stadt an.
  
  Chi è il *sindaco* che ha gestito meglio questa crisi? Lo riconoscete colpevole di tutto?
  Wer ist der *Bürgermeister*, der diese Krise am besten bewältigte? Erkennt ihr ihn als schuldig für alles?
  
  Domenica scorsa il *sindaco* ha partecipato alla lotta contro il cancro alla cella comunale.
  Letzten Sonntag nahm der *Bürgermeister* am Kampf gegen den Krebs im Rathaussaal teil.
  
  Se il *sindaco* non avesse garantito la copertura sanitaria, sarebbe scoppiato un disturbo civile.
  Hätte der *Bürgermeister* die medizinische Abdeckung nicht zugesichert, wäre eine bürgerliche Störung ausgebrochen.
  
  Il *sindaco* di Milano è famoso per le sue battute stupende, ma oggi ha parlato seriamente di fumo e salute.
  Der *Bürgermeister* von Mailand ist für seine wunderbaren Sprüche bekannt, aber heute sprach er ernsthaft über Rauch und Gesundheit.
