Rang: 4917
Wort: fischiare
Wortart: vi
Wort mit Artikel: fischiare
Femininum / Plural: ''
IPA: ''
Definition: pfeifen, zischen
Register: ''
Beispielsätze: |-
  Quando il direttore entra in aula, gli studenti *fischiano* per protesta.
  Als der Direktor das Klassenzimmer betritt, *pfeifen* die Schüler protestierend.
  
  Il pubblico ha *fischiato* durante tutto il concerto perché il cantante non era in forma.
  Das Publikum hat während des gesamten Konzerts *gepfiffen*, weil der Sänger nicht in Form war.
  
  Se avessi sbagliato così tanto, anche tu avresti *fischiato* dalla rabbia!
  Wenn ich so viel falsch gemacht hätte, hätte ich vor Wut auch *gepfiffen*!
  
  Non ci si aspetta che i bambini *fischino* alle volte che passa un cane in strada.
  Man würde nicht erwarten, dass Kinder jedes Mal *pfeifen*, wenn ein Hund auf der Straße vorbeiläuft.
  
  Non appena l’arbitro ha fischiato il rigore, il calciatore si è *fischiato* la maglia dalla frustrazione.
  Sobald der Schiedsrichter den Elfmeter *pfiff*, riss sich der Fußballspieler vor Frust das Trikot vom Leib.
