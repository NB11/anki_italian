Rang: 3322
Wort: navetta
Wortart: n.f
Wort mit Artikel: la navetta
Femininum / Plural: navette
IPA: ''
Definition: der Shuttle, die Fähre
Register: ''
Beispielsätze: |-
  La *navetta* spaziale partirà domani alle 15:00 per la stazione orbitale.
  Die *Raumfähre* startet morgen um 15:00 zur Raumstation.
  
  Ho perso l'ultima *navetta* per l'aeroporto, quindi ho dovuto prendere un taxi.
  Ich habe den letzten *Shuttle* zum Flughafen verpasst und musste ein Taxi nehmen.
  
  Dicono che la *navetta* in ritardo arriverà solo tra due ore, quindi possiamo bere un caffè.
  Man sagt, die verspätete *Fähre* kommt erst in zwei Stunden an, also können wir einen Kaffee trinken.
  
  La *navetta* che porta gli studenti alla mensa universitaria funziona ogni giorno dalle 12:00 alle 14:00.
  Der *Shuttle*, der die Studenten zur Universitätsmensa bringt, fährt täglich von 12:00 bis 14:00 Uhr.
  
  Se non arrivi in tempo alla fermata della *navetta*, dovrai aspettare quella delle 16:30.
  Wenn du nicht rechtzeitig zur *Fähre*-Haltestelle kommst, musst du auf die um 16:30 warten.
