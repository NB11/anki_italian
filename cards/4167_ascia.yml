Rang: 4167
Wort: ascia
Wortart: n.f
Wort mit Artikel: l'ascia
Femininum / Plural: ascie
IPA: ''
Definition: die Axt, -ä-e
Register: ''
Beispielsätze: |-
  L’*ascia* era l’unico strumento che aveva per tagliare la legna durante l’inverno.
  Die *Axt* war das einzige Werkzeug, das er hatte, um im Winter Holz zu hacken.
  
  Se non impugni bene l’*ascia*, rischi di farti male alle mani!
  Wenn du die *Axt* nicht richtig hältst, verletzt du dir leicht die Hände!
  
  L’artigiano restaurò il mobile antico con precisione, usando solo un’*ascia* affilata.
  Der Handwerker restaurierte das antike Möbelstück mit Präzision und setzte nur eine scharfe *Axt* ein.
  
  Avrei voluto comprare un’*ascia* nuova, ma alla fine ho preso quella usata di mio nonno.
  Ich hätte eine neue *Axt* kaufen wollen, aber am Ende nahm ich die alte von meinem Großvater.
  
  Il boscaiolo alzò l’*ascia* con forza e la abbassò con un colpo secco per spaccare il tronco.
  Der Holzfäller hob die *Axt* mit Kraft und ließ sie mit einem kräftigen Schlag auf den Stamm niederfahren.
