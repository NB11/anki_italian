Rang: 1793
Wort: sonno
Wortart: n.m
Wort mit Artikel: il sonno
Femininum / Plural: sonni
IPA: ''
Definition: der Schlaf, -
Register: ''
Beispielsätze: |-
  Dopo una lunga giornata di lavoro ho *sonno* e vorrei andare a letto presto.
  Nach einem langen Arbeitstag habe ich *Schlaf* und möchte früh ins Bett gehen.
  
  Nonostante il *sonno*, non riuscivo a dormire perché fuori c'era troppo rumore.
  Trotz des *Schlafs* konnte ich nicht schlafen, weil es draußen zu laut war.
  
  Se non avessi tanto *sonno*, verrei volentieri al cinema con te.
  Wenn ich nicht so viel *Schlaf* hätte, würde ich gerne mit dir ins Kino gehen.
  
  Ha chiuso gli occhi e subito è stato vinto dal *sonno*.
  Er schloss die Augen und wurde sofort vom *Schlaf* überwältigt.
  
  Il medico mi ha detto che il *sonno* non è solo riposo, ma è fondamentale per la salute.
  Der Arzt sagte mir, dass *Schlaf* nicht nur Erholung ist, sondern essenziell für die Gesundheit.
