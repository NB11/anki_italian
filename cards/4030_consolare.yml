Rang: 4030
Wort: consolare
Wortart: vt
Wort mit Artikel: consolare
Femininum / Plural: ''
IPA: ''
Definition: trösten, beruhigen
Register: ''
Beispielsätze: |-
  Il medico ha cercato di *consolare* la paziente dopo la notizia triste.
  Der Arzt versuchte die Patientin nach der traurigen Nachricht zu *trösten*.
  
  Mi *consolò* quando seppe che avevo perso il lavoro, anche se lui stesso era preoccupato.
  Er *tröstete* mich, als er erfuhr, dass ich meine Arbeit verloren hatte, obwohl er selbst besorgt war.
  
  Non credere a quello che dice quel maníaco: vuole solo *consolare* la sua coscienza dopo aver fatto del male.
  Glaub ihm nicht, was dieser *Spinner* sagt: Er will nur sein Gewissen beruhigen, nachdem er Böses getan hat.
  
  Se tu *consolassi* sempre tutti, nessuno imparerebbe a fare fronte alle difficoltà da solo.
  Wenn du immer alle *trösten* würdest, würde niemand lernen, selbst mit Schwierigkeiten umzugehen.
  
  Nonostante le parole di sua madre, Maria non riuscì a *consolarsi* per la perdita del suo gattino.
  Trotz der Worte ihrer Mutter konnte sich Maria über den Verlust ihres Kätzchens nicht *beruhigen*.
