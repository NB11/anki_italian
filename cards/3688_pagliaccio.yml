Wort mit Artikel: il pagliaccio
Femininum / Plural: i pagliacci
IPA: ''
Definition: der Clown, -s
Register: ''
Beispielsätze: |-
  Il *pagliaccio* ride mentre salta sul trampolino.
  Der *Clown* lacht, während er auf dem Trampolin springt.
  
  Ho visto un *pagliaccio* molto triste dietro le quinte.
  Ich habe einen sehr traurigen *Clown* hinter den Kulissen gesehen.
  
  Vorresti essere un *pagliaccio* per un giorno?
  Möchtest du für einen Tag ein *Clown* sein?
  
  Il *pagliaccio* che ha recitato ieri sera era davvero convincente.
  Der *Clown*, der gestern Abend aufgetreten ist, war wirklich überzeugend.
  
  Non tutti apprezzano lo scherzo del *pagliaccio*, alcuni lo trovano irritante.
  Nicht alle schätzen den Scherz des *Clowns*, manche finden ihn nervig.
