  Ich vertraue niemandem, nicht einmal einem *Unbekannten*, der nett wirkt.
  
  È meglio non parlare con *sconosciuti* che si avvicinano al parco di notte.
  Man sollte besser nicht mit *Unbekannten* reden, die sich nachts dem Park nähern.
  
  Dopo aver perso la carta d’identità in viaggio, sono rimasto *sconosciuto* a tutti.
  Nachdem ich meinen Personalausweis auf der Reise verloren hatte, war ich für alle ein *Unbekannter*.
