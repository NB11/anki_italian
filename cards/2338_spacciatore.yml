Rang: 2338
Wort: spacciatore
Wortart: n.m
Wort mit Artikel: lo spacciatore
Femininum / Plural: spacciatori
IPA: ''
Definition: der Drogenhändler, -
Register: ''
Beispielsätze: |-
  La polizia ha arrestato *lo spacciatore* che vendeva eroina nel parco.
  Die Polizei hat den *Drogenhändler* verhaftet, der im Park Heroin verkaufte.
  
  Se incontri *lo spacciatore* all'angolo della strada, chiama subito il 113!
  Wenn du den *Drogenhändler* an der Straßenecke triffst, ruf sofort die 113 an!
  
  Credo che *lo spacciatore* abbia già cambiato i suoi piani di fuga.
  Ich glaube, dass der *Drogenhändler* seine Fluchtpläne bereits geändert hat.
  
  Peccato che nessuno abbia denunciato *lo spacciatore* prima che fosse troppo tardi.
  Schade, dass niemand den *Drogenhändler* gemeldet hat, bevor es zu spät war.
  
  Il giudice ha dichiarato colpevole *lo spacciatore* dopo due giorni di udienza.
  Der Richter hat den *Drogenhändler* nach zwei Verhandlungstagen für schuldig erklärt.
