Rang: 4352
Wort: lodare
Wortart: v
Wort mit Artikel: lodare
Femininum / Plural: ''
IPA: ''
Definition: loben, preisen
Register: ''
Beispielsätze: |-
  Il professore *lodava* sempre gli studenti che partecipavano attivamente alle discussioni.
  Der Professor *lobte* immer die Studenten, die sich aktiv an den Diskussionen beteiligten.
  
  Se avessi fatto un buon lavoro, ti avrei *lodato* pubblicamente.
  Hätte ich eine gute Arbeit geleistet, hätte ich dich öffentlich *gelobt*.
  
  Nonostante l’errore, il direttore decise di *lodare* il suo impegno costante.
  Trotz des Fehlers beschloss der Direktor, seinen ständigen Einsatz zu *loben*.
  
  È raro che un politico *lodasse* apertamente le critiche costruttive al suo operato.
  Es ist selten, dass ein Politiker konstruktive Kritik an seiner Arbeit offen *lobte*.
  
  Ti ringrazio per *lodare* la mia pazienza, anche se non me la sento affatto di sentirmi speciale.
  Ich danke dir dafür, dass du meine Geduld *lobst*, auch wenn ich mich überhaupt nicht besonders fühle.
