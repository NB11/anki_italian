Rang: 4042
Wort: incaricare
Wortart: vt
Wort mit Artikel: incaricare
Femininum / Plural: ''
IPA: ''
Definition: beauftragen, beauftragen mit
Register: ''
Beispielsätze: |-
  Il sindaco ha *incaricato* la polizia di indagare sul furto.
  Der Bürgermeister hat die Polizei mit den Ermittlungen zum Diebstahl *beauftragt*.
  
  Vorrei *incaricare* te di organizzare la festa, se sei d'accordo.
  Ich möchte dich damit *beauftragen*, die Feier zu organisieren, wenn du einverstanden bist.
  
  Non appena avrò tempo, ti *incaricherò* di risolvere questo problema.
  Sobald ich Zeit habe, werde ich dich damit *beauftragen*, dieses Problem zu lösen.
  
  Sarebbe stato meglio *incaricare* qualcun altro, quello è un incarico troppo difficile.
  Es wäre besser gewesen, jemand anderen damit zu *beauftragen*, das ist ein zu schwieriger Auftrag.
  
  Lui mi ha *incaricato* di dirti che il progetto è stato approvato dal comitato.
  Er hat mich damit *beauftragt*, dir zu sagen, dass das Projekt vom Ausschuss genehmigt wurde.
