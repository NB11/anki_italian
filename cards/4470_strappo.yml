Rang: 4470
Wort: strappo
Wortart: n.m
Wort mit Artikel: lo strappo
Femininum / Plural: strappi
IPA: ''
Definition: der Riss, -e; die Zerrung, -en; der Ausriss
Register: ''
Beispielsätze: |-
  Dopo la corsa ho sentito un forte dolore al polpaccio, forse ho uno *strappo* muscolare.
  Nach dem Laufen spürte ich einen starken Schmerz in der Wade, vielleicht habe ich einen *Muskelriss*.
  
  Il medico mi ha consigliato di mettere ghiaccio e riposare se ho uno *strappo* alla schiena.
  Der Arzt hat mir geraten, Eis aufzulegen und mich auszuruhen, wenn ich mir einen *Muskelriss* am Rücken zugezogen habe.
  
  Hanno arrestato il ladro che aveva fatto uno *strappo* alla porta per entrarci.
  Sie haben den Dieb verhaftet, der einen *Einbruch* in die Tür gemacht hatte, um hineinzugelangen.
  
  Non fare sforzi eccessivi, altrimenti rischi uno *strappo* ai tendini!
  Überanstrenge dich nicht, sonst riskierst du einen *Sehnenriss*!
  
  Lo *strappo* alla camicia è stato causato da un gancio appeso male nel guardaroba.
  Der *Riss* im Hemd ist durch einen schlecht angebrachten Haken in der Garderobe entstanden.
