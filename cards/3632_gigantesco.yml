Definition: riesenhaft, gigantisch
Register: ''
Beispielsätze: |-
  La *gigantesca* balena nuotava placidamente nell'oceano.
  Der *riesenhafte* Wal schwamm ruhig im Ozean.
  
  Se non risolviamo presto questo problema, avremo una *gigantesca* crisi.
  Wenn wir dieses Problem nicht bald lösen, droht eine *gigantische* Krise.
  
  Ho visto un libro di *gigantesche* dimensioni nella biblioteca di mio nonno.
  Im Regal meines Großvaters habe ich ein *riesiges* Buch gesehen.
  
  La *gigantesca* statua della libertà è conosciuta in tutto il mondo.
  Die *riesenhafte* Freiheitsstatue ist weltweit bekannt.
  
  Nonostante l'incertezza, ha intrapreso un progetto *gigantesco* che potrebbe cambiare la sua vita.
  Trotz der Unsicherheit hat sie ein *riesiges* Projekt begonnen, das ihr Leben verändern könnte.
