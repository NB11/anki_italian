Rang: 692
Wort: ripetere
Wortart: vt
Wort mit Artikel: ripetere
Femininum / Plural: ''
IPA: ''
Definition: wiederholen
Register: ''
Beispielsätze: |-
  Devi *ripetere* le parole nuove tre volte per impararle bene.
  Du musst die neuen Wörter dreimal *wiederholen*, um sie gut zu lernen.
  
  Se non capisci, *ripeti* la domanda in un altro modo.
  Wenn du es nicht verstehst, *wiederholst* du die Frage auf eine andere Weise.
  
  Mi ha detto di *ripetere* l’esercizio a casa stasera.
  Er hat mir gesagt, die Übung heute Abend zu Hause zu *wiederholen*.
  
  Spero che tu non debba *ripetere* l’esame di matematica!
  Ich hoffe, du musst die Matheprüfung nicht *wiederholen*!
  
  Era così stanco che continuò a *ripetere* lo stesso errore senza accorgersene.
  Er war so müde, dass er immer denselben Fehler *wiederholte*, ohne es zu merken.
