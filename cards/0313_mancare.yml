Rang: 313
Wort: mancare
Wortart: vi
Wort mit Artikel: mancare
Femininum / Plural: ''
IPA: ''
Definition: fehlen, vermissen
Register: ''
Beispielsätze: |-
  Mi *mancano* molto i miei amici di Roma.
  Meine Freunde aus Rom *fehlen* mir sehr.
  
  Ci *è mancato* il tempo per visitare tutto il museo.
  Wir hatten einfach nicht die Zeit, das ganze Museum zu *besuchen*.
  
  *Mancava* solo un ingrediente per la ricetta perfetta!
  Nur eine Zutat *fehlte* noch für das perfekte Rezept!
  
  Ti *mancerebbe* venire con noi in montagna il prossimo weekend?
  *Würdest* du mit uns übers Wochenende in die Berge *kommen* wollen?
  
  Spero che non *manciate* di salutare i nonni prima di partire.
  Ich hoffe, ihr *vergesst* nicht, euch von Oma und Opa zu verabschieden, bevor ihr losfahrt.
