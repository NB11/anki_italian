Rang: 901
Wort: agire
Wortart: vi
Wort mit Artikel: agire
Femininum / Plural: ''
IPA: ''
Definition: handeln, wirken, agieren
Register: ''
Beispielsätze: |-
  Devi *agire* con prudenza in questa situazione delicata.
  Du musst mit Vorsicht *handeln* in dieser heiklen Situation.
  
  Se *agisse* in fretta, potrebbe evitare il disastro.
  Wenn er schnell *handelte*, könnte er die Katastrophe vermeiden.
  
  Gli scienziati stanno cercando di capire come *agisca* questo nuovo virus.
  Die Wissenschaftler versuchen zu verstehen, wie dieser neue Virus *wirkt*.
  
  Nonostante la sua rabbia, lei ha deciso di non *agire* impulsivamente.
  Trotz ihres Zorns beschloss sie, nicht impulsiv zu *handeln*.
  
  Se avessi *agito* prima, ora non saremmo in questa condizione.
  Hättest du früher *gehandelt*, wären wir jetzt nicht in dieser Lage.
