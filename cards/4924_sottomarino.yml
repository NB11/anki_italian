Rang: 4924
Wort: sottomarino
Wortart: n.m
Wort mit Artikel: il sottomarino
Femininum / Plural: i sottomarini
IPA: ''
Definition: das U-Boot, -e
Register: ''
Beispielsätze: |-
  Durante la Seconda guerra mondiale, il *sottomarino* tedesco U-47 riuscì a penetrare nella base navale di Scapa Flow.
  Während des Zweiten Weltkriegs drang das deutsche *U-Boot* U-47 in die Marinebasis Scapa Flow ein.
  
  Chiudendo gli occhi, immagino di essere su un *sottomarino* giallo che solca le acque cristalline del Mediterraneo.
  Mit geschlossenen Augen stelle ich mir vor, ich wäre auf einem gelben *U-Boot*, das durch die kristallklaren Gewässer des Mittelmeers fährt.
  
  Nonostante i progressi tecnologici, navigare con un *sottomarino* nucleare rimane una delle imprese più rischiose mai intraprese dall’uomo.
  Trotz technologischer Fortschritte bleibt die Navigation mit einem Atom-*U-Boot* eines der riskantesten Unternehmen, die der Mensch je unternommen hat.
  
  Se avessi tempo e soldi, comprerei un *sottomarino* di vetro per esplorare gli abissi da vicino.
  Wenn ich Zeit und Geld hätte, würde ich mir ein Glas-*U-Boot* kaufen, um die Tiefen aus nächster Nähe zu erkunden.
  
  I ricercatori hanno scoperto che il *sottomarino* usato per il film "Das Boot" è ancora conservato in un museo navale tedesco.
  Die Forscher haben herausgefunden, dass das *U-Boot* aus dem Film „Das Boot“ noch in einem deutschen Marinemuseum ausgestellt ist.
