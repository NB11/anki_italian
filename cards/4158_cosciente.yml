Rang: 4158
Wort: cosciente
Wortart: adj
Wort mit Artikel: cosciente
Femininum / Plural: ''
IPA: ''
Definition: bewusst, bei Bewusstsein
Register: ''
Beispielsätze: |-
  Dopo l’incidente, il paziente era ancora *cosciente* e poteva rispondere alle domande.
  Nach dem Unfall war der Patient noch *bei Bewusstsein* und konnte die Fragen beantworten.
  
  Nonostante la confusione, rimase perfettamente *cosciente* di ciò che stava accadendo intorno a lui.
  Trotz der Verwirrung blieb er vollkommen *bewusst*, was um ihn herum passierte.
  
  Se fossi *cosciente* delle tue azioni, non avresti mai fatto una cosa del genere!
  Wenn du dir deiner Handlungen *bewusst* wärst, hättest du so etwas nie getan!
  
  È raro trovare persone così *coscienti* delle proprie debolezze.
  Es ist selten, Menschen zu finden, die sich ihrer Schwächen so *bewusst* sind.
  
  Dobbiamo essere *coscienti* del fatto che ogni scelta ha delle conseguenze.
  Wir müssen *uns bewusst sein*, dass jede Entscheidung Folgen hat.
