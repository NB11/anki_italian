Rang: 2358
Wort: nobile
Wortart: adj
Wort mit Artikel: nobile
Femininum / Plural: ''
IPA: ''
Definition: vornehm, edel
Register: ''
Beispielsätze: |-
  Quella famiglia ha sempre avuto una reputazione *nobile*.
  Jene Familie hatte immer einen *edlen* Ruf.
  
  Se fossi un principe, mi comporterei in modo *nobile*.
  Wenn ich ein Prinz wäre, würde ich mich *vornehm* verhalten.
  
  Non tutti i ricchi sono persone *nobili*: conta anche il modo in cui usano il loro denaro.
  Nicht alle Reichen sind *edle* Menschen – es kommt auch darauf an, wie sie ihr Geld einsetzen.
  
  Vorrei vivere in una casa con arredi *nobili*, anche se non posso permettermeli.
  Ich würde gerne in einem Haus mit *edlen* Möbeln leben, auch wenn ich mir das nicht leisten kann.
  
  Il suo gesto *nobile* ha salvato la vita a molte persone durante l'incendio.
  Seine *edle* Tat hat während des Brandes vielen Menschen das Leben gerettet.
