Rang: 4058
Wort: marea
Wortart: n.f
Wort mit Artikel: la marea
Femininum / Plural: maree
IPA: ''
Definition: die Gezeiten (Pl.), Ebbe und Flut
Register: ''
Beispielsätze: |-
  Durante la *marea* alta, il mare invade la spiaggia senza pietà.
  Während der *Gezeiten* steigt das Meer erbarmungslos über den Strand.
  
  È necessario studiare il fenomeno delle *maree* per comprendere la sua influenza sul clima.
  Man muss das *Gezeiten*-Phänomen studieren, um seinen Einfluss auf das Klima zu verstehen.
  
  Se avessi saputo che la *marea* sarebbe stata così forte, non avrei costruito la diga così in fretta.
  Wenn ich gewusst hätte, dass die *Gezeiten* so stark würden, hätte ich den Deich nicht so schnell gebaut.
  
  Nonostante le previsioni, la *marea* di questa mattina non ha causato danni all’impianto portuale.
  Trotz der Vorhersagen hat die *Gezeiten* heute Morgen keine Schäden am Hafen verursacht.
  
  Dicono che chi osserva la *marea* per ore finisce per sentirsi affascinato dal ritmo dell’universo.
  Man sagt, wer die *Gezeiten* stundenlang beobachtet, fühlt sich irgendwann vom Rhythmus des Universums fasziniert.
