Rang: 3137
Wort: pompare
Wortart: v
Wort mit Artikel: pompare
Femininum / Plural: ''
IPA: ''
Definition: pumpen
Register: ''
Beispielsätze: |-
  Il meccanico deve *pompare* l'olio nel motore della macchina.
  Der Mechaniker muss das Öl in den Motor *pumpen*.
  
  Se non avessimo *pompa*to l'acqua, la cantina sarebbe allagata.
  Hätten wir das Wasser nicht *gepumpt*, wäre der Keller überflutet.
  
  Non crederai mai come hanno provato a *pompare* soldi falsi nel sistema!
  Du wirst nicht glauben, wie sie versucht haben, falsches Geld in das System *zu pumpen*!
  
  Chi sta cercando di *pompare* un virus nel nostro database?
  Wer versucht, einen Virus in unsere Datenbank *einzupumpen*?
  
  Avrei dovuto *pompare* più aria nelle gomme prima del viaggio.
  Ich hätte vor der Fahrt mehr Luft in die Reifen *pumpen* sollen.
