Rang: 1145
Wort: chissà
Wortart: adv
Wort mit Artikel: chissà
Femininum / Plural: ''
IPA: ''
Definition: wer weiß, vielleicht, womöglich
Register: ''
Beispielsätze: |-
  Voglio andare al mare ma *chissà* se troverò un taxi libero!
  Ich will ans Meer fahren, aber wer weiß, ob ich ein freies *Taxi* finde!
  
  Hai già finito il contratto? *Chissà* se il maestro lo approverà!
  Hast du den Vertrag schon fertig? Vielleicht wird der *Lehrer* ihn genehmigen!
  
  Dicono che il ponte sia pericoloso, ma *chissà* se è vero!
  Man sagt, die Brücke sei gefährlich, aber wer weiß, ob das stimmt!
  
  Abbiamo sbagliato la teoria, e *chissà* se qualcuno se ne accorgerà!
  Wir haben uns in der Theorie geirrt, und vielleicht merkt es *jemand* nicht einmal!
  
  Domani visiteremo la natura in montagna, ma *chissà* se il tempo sarà favorevole!
  Morgen werden wir die Natur im *Berg* besichtigen, aber wer weiß, ob das Wetter günstig sein wird!
