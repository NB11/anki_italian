Rang: 413
Wort: girare
Wortart: v
Wort mit Artikel: girare
Femininum / Plural: ''
IPA: ''
Definition: drehen, herumfahren, umherlaufen
Register: ''
Beispielsätze: |-
  Devi *girare* la manopola per accendere la luce.
  Du musst *den* Knopf drehen, um das Licht anzuschalten.
  
  L’estate scorsa abbiamo *girato* tutta l’Italia in macchina.
  Letzten Sommer sind wir mit dem Auto durch ganz Italien *gereist*.
  
  Perché *giri* sempre intorno al problema invece di affrontarlo?
  Warum *drehst* du dich immer um das Problem herum, statt es zu lösen?
  
  Se *giro* a sinistra qui, arrivo prima in centro?
  Wenn ich hier *abbiege*, komme ich schneller ins Zentrum?
  
  Avrei voluto *girare* un altro documentario, ma non c’era tempo.
  Ich hätte gern einen anderen Dokumentarfilm *drehen* wollen, aber es war keine Zeit.
