Rang: 985
Wort: naso
Wortart: n.m
Wort mit Artikel: il naso
Femininum / Plural: nasi
IPA: ''
Definition: die Nase, -n
Register: ''
Beispielsätze: |-
  Il *naso* di Marco è molto sensibile agli odori.
  Die *Nase* von Marco ist sehr geruchsempfindlich.
  
  Quando hai sentito un odore strano, hai seguito il tuo *naso*?
  Als du einen seltsamen *Geruch* wahrgenommen hast, hast du deiner Nase gefolgt?
  
  L’attore famoso ha abbassato il *naso* per rendere il suo personaggio più riconoscibile.
  Der berühmte Schauspieler hat die *Nase* gesenkt, um seine Figur besser erkennbar zu machen.
  
  Nonostante il danno, ha continuato a resistere e non ha rinunciato a lavare il *naso* ferito.
  Trotz des *Schadens* hat er weiter standgehalten und nicht darauf verzichtet, die verletzte Nase zu waschen.
  
  Hanno trovato un *gatto* che aveva perso l’orientamento dopo aver fumato vicino al laboratorio.
  Sie fanden eine *Katze*, die die Orientierung verloren hatte, nachdem sie neben dem Labor geraucht hatte.
