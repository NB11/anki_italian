Rang: 738
Wort: borsa
Wortart: n.f
Wort mit Artikel: la borsa
Femininum / Plural: borse
IPA: ''
Definition: die Tasche, -n
Register: ''
Beispielsätze: |-
  Dove hai messo *la borsa* che abbiamo comprato ieri al bar?
  Wo hast du *die Tasche* hingelegt, die wir gestern in der Bar gekauft haben?
  
  Nonostante il casino in sala, Maria riuscì a trovare la *borsa* sotto il tavolo.
  Trotz des *Chaos* im Saal gelang es Maria, die Tasche unter dem Tisch zu finden.
  
  Se non trovo *la borsa* con i documenti, perderò l’aereo e dovrò ripetere la lezione domani.
  Wenn ich *die Tasche* mit den Dokumenten nicht finde, verpasse ich das Flugzeug und muss die Lektion morgen wiederholen.
  
  Ho visto che hai una *borsa* nuova: è davvero meravigliosa!
  Ich habe gesehen, dass du eine neue *Tasche* hast: sie ist wirklich großartig!
  
  Avrei giurato di averla lasciata davanti alla metro, ma poi ho capito che era solo uno *scherzo* di Luca.
  Ich hätte schwören können, dass ich sie vor der *U-Bahn* liegen gelassen habe, aber dann merkte ich, dass es nur ein Scherz von Luca war.
