Rang: 621
Wort: simile
Wortart: adj
Wort mit Artikel: simile
Femininum / Plural: ''
IPA: ''
Definition: ähnlich, gleichartig
Register: ''
Beispielsätze: |-
  Il tuo disegno è *simile* al mio, ma non identico.
  Deine Zeichnung ist dem meinen *ähnlich*, aber nicht identisch.
  
  Credo che la tua idea sia *simile* alla mia, non trovi?
  Ich glaube, deine Idee ist meiner *ähnlich*, oder?
  
  Nonostante le differenze, le due soluzioni sono *simili* tra loro.
  Trotz der Unterschiede sind die beiden Lösungen einander *ähnlich*.
  
  Se avessi seguito il suo consiglio, avrei evitato un problema *simile* a quello di mio zio.
  Hätte ich seinen *Rat* befolgt, hätte ich ein Problem wie das meines Onkels vermieden.
  
  La situazione attuale è *simile* a quella che abbiamo vissuto cinque anni fa, quando abbiamo incontrato dei soldati pericolosi durante una ricerca in centro.
  Die aktuelle Situation ist derjenigen ähnlich, die wir vor fünf Jahren erlebten, als wir während einer *Forschung* im Zentrum auf gefährliche Soldaten trafen.
